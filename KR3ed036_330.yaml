body:
  text: 卷三百三十婦人諸疾門崩中漏下血暴下兼帶下附論夫婦人臟腑久冷素有赤白帶下復因衝任氣虛不能制約經血以致暴下二病兼作故謂經血暴下兼帶下也方鹿茸丸治婦人血傷帶下漸成勞疾鹿茸去毛酥炙白薇去苗覆盆子細辛去苗葉菴䕡子熟乾地黃焙山羊蛇床子炒白茯苓去黑皮各三分乾薑炮遠志去心當歸切炮芎藭桂心去粗皮續斷牡丹皮人參卷柏龍骨蒲黃各半兩上為末煉蜜和丸桐子大每服三十丸空腹溫酒下米飲亦得牡蠣散治帶下兼經水過多暴下片血不限年月遠近牡蠣龍骨肉蓯蓉酒浸切焙赤石脂石斛去根烏賊骨去甲黃耆銼各一兩半芍藥炒阿膠炒燥熟乾地黃焙牛角䚡灰各二兩乾薑炮裂當歸切焙白朮人參桑耳炙各一兩一分艾葉炒芎藭附子炮裂去皮臍各一兩上為散每服三錢平旦米飲調服日再澤蘭散出千金方治婦人血傷不止兼帶下不斷虛羸困倦補虛益氣調中止血澤蘭葉炙人參蜀椒去目並閉口者炒出汗各一兩厚朴去粗皮生薑汁炙桂去粗皮細辛去苗葉蕪荑仁微炒藁本去苗土乾薑炮當歸切焙代赭石山茱萸防風去蘆各半兩柏子仁炒芎藭牡蠣粉熟乾地黃焙甘草炙銼龍骨各三分上為散每服二錢溫酒調下米飲亦得一方加白芷無人參龍骨鹿茸丸出千金方治婦人血傷不止兼赤白帶下不絶面黃體瘦漸成勞疾亦治崩中去赤白鹿茸去毛酥炙白芷馬頭鬐毛燒灰蒲黃微炒小薊根續斷禹餘糧煅醋淬各二兩伏龍肝熟艾各一兩人參熟乾地黃焙烏賊魚骨去甲柏子仁微炒當歸切焙肉蓯蓉酒浸切焙黃耆炙銼白茯苓去黑皮各一兩半白馬蹄鎊三分上為末煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒或米飲不拘時黃耆丸治婦人血傷兼帶下臍腹冷痛腰痠疼肢體倦怠煩渴口燥黃耆銼熟乾地黃焙當歸切焙鹿茸去毛酥炙地榆卷柏去土茯神去木各一兩半木香代赭石白石脂艾葉芎藭桑寄生赤石脂沙參白龍骨訶黎勒皮各一兩上為散煉蜜和丸如梧子大每服三十丸米飲下空心日午臥時各一茯苓散出大全良方治婦人血傷兼帶下積久不止面黃體瘦漸成虛勞腰腳沉重胎氣多損白茯苓去黑皮木香杜仲去粗皮炙菖蒲熟乾地黃焙柏子仁研秦艽去苗土訶黎勒皮菟絲子酒浸別搗青橘皮去白焙赤石脂五加皮牛角䚡灰烏賊魚骨去甲艾葉切焙各一兩上為散每服二錢溫酒調下糯米飲亦得或有喘息用鯉魚糯米粥下藥牡丹皮湯出千金方治婦人血傷不止兼五色帶下牡丹皮熟乾地黃焙槲葉脈銼炒艾葉微炒各一兩半禹餘糧煅赤醋淬七次芎藭龍骨各一兩柏葉炙芍藥銼炒厚朴去粗皮生薑汁炙白芷伏龍肝青竹茹地榆銼各一兩阿膠炙令燥半兩上粗搗篩每服三錢水一盞煎至七分去滓空心日午臥時服相去如人行十里久再服牛角䚡散治婦人血傷不止兼帶下赤白腰背痛虛乏困倦熟布湯一方熟乾地黃散聖惠方治婦人血傷兼赤白帶下日夜不止悶絶頭目暈重熟布皮刀括取一把蟹爪銼二合甘草炙炒白茯苓去黑皮熟乾地黃焙桂去粗皮阿膠炙令黃燥芍藥銼炒當歸銼炒伏龍肝各一兩淡竹茹一把蒲黃輕炒二兩上粗搗篩每服二錢以水一盞半煎至一盞去滓服不拘時人參散治婦人血傷兼赤白帶下日久不止羸困人參五味子地榆艾葉燒灰牡蠣煅白茯苓去黑皮熟乾地黃焙龍骨煅續斷芎藭甘草炙銼各一兩上為散每服二錢溫酒調下水一盞煎至七分溫酒亦得空心日午臥時各一服茯神丸治婦人血傷兼帶下日久不止頭旋目眩心煩身熱腰腳疾重肢體瘦瘁茯神去木當歸切焙白芷桑耳炙芎藭赤石脂卷柏去土乾薑炮各一兩牡蠣粉地榆白龍骨一兩半上為末煉蜜和丸梧桐子大每服三十丸溫酒或米飲下空心日午臨臥各一服陽起石湯治婦人血海冷敗脫血帶下諸虛冷疾陽起石二兩別搗白茯苓去黑皮人參甘草炙銼赤石脂龍骨各三兩伏龍肝五兩生地黃細切焙一升附子炮裂去皮臍一兩續斷三兩上㕮咀每服三錢水一盞煎至七分去滓溫服早晨日午晚後各一服紫金散出大全良方治衝任虛損月水過多崩漏帶下淋瀝不斷腰腹重痛凡是五色帶疾並治之禹餘糧煅酸醋中淬如此者七次細研水飛挹干稱三兩赤石脂煅川芎龍骨煅石器研各一兩白芍藥附子熟地黃當歸各一兩乾薑炮肉桂各半兩上為細末每服二錢入麝香少許米飲調下空心食前一日二服一方有甘草小薊根湯治婦人月經過多或卒暴血傷不止或色如肝或成片者小薊根三兩當歸微炙阿膠炙令燥芎藭青竹茹續斷地榆根各一兩半伏龍肝二兩上粗搗篩每服三錢水一盞煎至七分去滓溫服日三龍骨飲治婦人經血暴下不止龍骨三兩青竹茹二兩乾薑炮一兩伏龍肝五兩槲葉十枚炙上粗搗篩每服五錢水一盞半煎至七分去滓溫服不拘時治婦人傷中血不止兼赤白帶下芍藥研一兩乾薑炮三分牛角䚡醋炙焦半兩上為散研勻每服二錢米飲調下治經血暴下兼帶下蒲黃二兩鬱金熟乾地黃焙各三兩上為散每服三錢空心米飲調下牛角䚡丸治婦人經血暴傷兼帶下久不止牛角䚡灰赤石脂各一兩半白龍骨三兩艾葉一分桑耳炙鹿茸去毛酥炙阿膠炙令燥乾薑炮各一兩上為末煉蜜和丸如桐子大每服二十丸空心食前煎黃耆湯或溫酒下牛角䚡散治婦人血傷兼赤白帶下黃牛角䚡酒炙側柏葉艾葉炒當歸切焙續斷炒地榆炒赤石脂研伏龍肝各一兩上為散每服三錢食前米飲或溫酒調下菟絲子丸治婦人血傷兼赤白帶下菟絲子酒浸一宿銼搗龍骨牡蠣焙艾葉炒赤石脂烏賊魚骨燒蘹香子微炒附子炮裂去皮臍各一兩上為末醋煮麵糊和丸如梧桐子大每服二十丸至三十丸空心食前醋湯下蘆薈丸治傷中赤白帶下蘆薈半兩赤石脂樗皮生薑汁炙地榆銼各一兩牛角䚡各三分禹餘糧醋淬阿膠炙燥各半兩側柏一兩一分上為末研勻煉蜜丸如梧桐子大每服二十丸陳米飲下龍骨散治婦人經血暴下兼赤白帶下不止龍骨一兩烏賊魚骨去甲鹿茸去毛酥炙續斷芍藥銼炒赤石脂肉蓯蓉酒浸切焙各三兩乾地黃炒一兩半上為散每服二錢空心服米飲調下二錢日再柏葉散治傷中下血兼帶下或白或赤臍下㽲痛側柏葉芍藥艾葉各三分熟乾地黃焙禹餘糧醋淬麒麟竭各一兩當歸銼焙牛角䚡炙各三分上為細末研勻每服二錢生薑米飲調下川芎散治婦人崩漏帶下諸方不效者川芎當歸生地黃伏龍肝龍骨芍藥蒲黃各一兩御米殼去蒂蜜浴炒焦四兩上為細末每服二錢溫酒或米飲調下食前地榆湯治婦人經血崩下兼帶下積久不瘥面目萎黃困倦羸瘦地榆當歸切焙阿膠炙燥黃耆銼各一兩半艾葉三分龍骨碎二兩上㕮咀如麻豆大每服三錢水一盞姜三片煎至七分去滓食前溫服寄生湯治婦人經血暴傷及帶下經久不止桑寄生雞蘇淡竹茹各一兩芍藥地榆各一兩半白龍骨二兩上㕮咀如麻豆大每服三錢水一盞煎至七分去滓食前溫服一方用附子三分無淡竹茹黃耆治婦人血傷兼帶下不止黃耆銼芍藥各二兩赤石脂四兩當歸切焙附子炮裂去皮臍熟乾地黃焙各二兩上為末煉蜜丸如梧桐子大每服三十丸溫酒下一方有乾薑無地黃血崩帶下用膠艾湯以海螵蛸炙黃刮碎和入同煎添固經丸並澤蘭丸杉節散出聖惠方治血傷兼帶下不止杉木節燒灰存性楮皮紙燒灰各等分一方作蠶紙上研令勻細每服二錢米飲調下黃芩湯治婦人經血暴下兼帶下赤白不止黃芩去黑心當歸切焙柏葉焙蒲黃微炒各半兩艾葉炒一分生乾地黃焙二兩上粗搗篩每服三錢水一盞煎至七分去滓溫服日三龍骨丸治婦人傷中血不止兼赤白帶下龍骨三分烏賊魚骨炙二分芍藥三分鹿茸酒炙三分熟乾地黃焙三分側柏葉三分上為末煉蜜和丸如梧桐子大每服二十丸生薑米飲下地龍散治婦人衝任氣虛經血暴下兼帶下地龍炒鬱金棕櫚燒令存性柏葉地黃汁胎髮泥裹燒過去泥上各等分搗羅為散每服三錢溫地黃汁酒調下不拘時候地黃散治婦人血傷帶下地黃銼炒當歸切焙黃耆銼阿膠炙令燥各一兩艾葉炒焙三分上粗搗篩每服三錢水一盞生薑三片煎至七分去滓溫服日三車前湯治經血暴下兼帶下車前子淡竹茹黃芩去黑心阿膠炙燥杵碎生地黃各一兩上將四味㕮咀以水二盞煎至一盞下膠攪煬頓服阿膠散治婦人血傷兼帶下不止阿膠炙燥柏葉焙乾當歸去蘆頭焙龍齒別搗細研各半兩禹餘糧醋淬細研一兩上為細散每服二錢用米飲調下早晨午時各一服立效散出經驗良方治血崩及赤白帶下晚蠶砂醋浸一宿焙乾稱當歸酒浸焙乾女子頭髮焙焦烏龍尾生薑自然汁浸焙乾各一兩即久塵灰舊棕葉燒存性二兩上為細末每服二錢熱酒調下芍藥酒浸方治婦人血傷兼赤白帶下芍藥黃耆生地黃各三兩艾葉一兩上四味㕮咀如麻豆大以絹袋盛浸酒一斗經宿後每食前隨量溫飲之蒲黃丸治婦人血傷赤白帶下不止蒲黃龍骨各三兩上為末煉蜜和丸如梧桐子大每服三十丸食前黃耆湯下地黃益母草湯治婦人血傷不止兼赤白帶下生地黃汁益母草汁各半碗上件取水半盞同煎至七分日三五服五倍子散治血崩帶下大艾一兩醋煮五倍子二兩炒末烏梅半兩去核川芎半兩上為末每服二錢空心米飲下兩服止治血下帶下香附子杵去皮二分童子尿浸一日夜艾葉三分米醋煮透曬乾上為末秫米糊丸梧桐子大每服五六十丸艾醋湯或醋湯下一方為末調服治崩中帶下並腸風瀉血及血痢以野豬外腎和皮燒灰不用絶過為末米飲下治崩中帶下腸風下血兼赤白痢用棕櫚燒灰存性為末湯破酒浸令淡調下三錢空心服治下閉血瘀女子帶下下血及婦人崩中用炒牛角䚡並燒灰酒服一方為末酒調服金不換散治婦人血海暴崩淋瀝不止硃砂二錢當歸飛羅面烏龍尾灶屋上垂塵是也各半兩上為細末每服二錢燒稱錘通紅投酒中用此藥酒調下食前服一婦人經候黑血凝結成塊左廂有血瘕水泄不止谷有時不化有時化後血塊暴下並水俱作是前後二陰有形血脫竭於下既久經候猶下調水泄日見三兩行食罷煩心不快飲食減少甚至瘦弱求治乃審而思之曰夫聖人治病必本四時升降浮沉之理權變之宜必先歲氣無伐天和無盛盛無虛虛遺人夭殃無致邪無失正絶人長命故仲景云陽盛陰虛下之則愈汗之則死大抵聖人立法且如升陽或發散之劑足助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒涼之氣此病是也當用此法治之升降浮沉之至理也天地之氣以升降浮沉乃從四時如治病不可逆之故經云順天者昌逆天者亡可不畏哉夫人之升降亦有四時天地之氣不可認止在外人亦體同天地也今經漏不止是前陰之氣血已脫下矣水泄又數年是後陰之氣血下陷已脫矣後陰者至有形之物也前陰者精氣之戶下竭是病人周身之氣血常行秋冬之令陰主殺此等收藏之病是也陽生陰長春是也在人之身冷氣升浮者穀氣上行是也既病人周身氣血皆不生長穀氣又不升其肌肉消少是兩儀之氣俱將絶既下元二陰俱脫血氣消竭假令當是熱證今下焦久脫此為寒矣此病久沉久降寒濕大勝當急救之瀉寒以熱降濕以燥大升大舉以助升長補養氣血不致偏竭聖人立治法濕氣大勝以所勝治之助甲木風上是也故經云風勝濕是以所勝平之也當先調和胃氣次用白朮之類以燥其濕是以而滋元氣如其不止後用風藥以勝濕此便是大舉大升以助春夏二濕之久陷下之治也血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉也皆以為補氣殊不知甘能生血此陽生陰長之理故先理胃氣人之身內谷為寶黃耆二錢人參一錢半有嗽去之炙甘草一分升麻半錢柴胡半錢白朮三錢當歸身一錢酒浸炒麵一錢半陳皮一錢生黃芩瀉盛暑之伏瘦金肺逆每服中加少許秋涼去之上㕮咀每一服稱一錢或二錢視食加減之如食少已定二錢內更減之不可令勝食每服水二大盞煎一盞去滓稍熱服如腹中痛每服加芍藥三分去皮中桂少許如渴或口乾加葛二分不計時候治暴下血以葫五枚去梗皮量多少入豆豉搗為膏可丸即丸梧子大以米飲下五六十丸無不愈者
