body:
  text: 卷一百二十九傷寒門辨傷寒熱病兩感證候夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以十日以上者何也夫巨陽者諸陽之屬也其脈連於風府故為諸陽主氣人之初傷於寒也則為病熱雖甚不死其兩感於寒而病者必死夫兩傷於寒病者一日則巨陽與少陰俱病故頭痛口乾煩滿而渴二日陽明與太陰俱病則腹滿體熱不食譫言三日則少陽與厥陰俱病則耳聾囊縮水漿不入口則不知人六日而死矣是為六經陰陽表裡者也陽為腑主表陰為臟主裡臟腑俱病故曰兩感三日而死者為一日兩經受病故曰兩感是表裡俱病故六日而死矣辨傷寒熱病不可治形候傷寒三部脈陰陽脈俱盛大汗出不解者不可治傷寒陰陽俱熱虛不止者不可治傷寒脈至乍數乍疏者不可治傷寒譫言妄語妄誕身熱脈浮大手足溫者生脈沉細手足遂冷者不可治傷寒咳而上氣其脈散者不可治傷寒熱盛脈浮大者生沉小者不可治傷寒已得汗脈沉小者生浮大者不可治傷寒譫語直視而喘者不可治傷寒下利厥逆躁不能臥者不可治傷寒發熱下利至厥不反者不可治傷寒病惡寒蜷而利手足逆者不可治傷寒五六日脈微細沉但欲臥汗出不煩時自吐利復煩躁不得臥寐者不可治傷寒六七日喘息高者不可治傷寒發汗不出若大灌發者不可治傷寒泄而腹滿甚者不可治傷寒目不明熱不已者不可治傷寒老人嬰兒熱而腹滿者不可治傷寒汗不出嘔血者不可治傷寒舌本爛熱不已者不可治傷寒咳血而衄汗不出出不至足者不可治傷寒髓熱者不可治傷寒熱而痙者不可治傷寒熱病腰折瘛瘲齒噤者不可治傷寒下利後脈絶手足厥冷脈不還不可治傷寒四逆惡寒脈不至其人不熱而躁者不可治熱病脈代者一日死熱病二三日身體熱腹痛頭痛食飲如故脈直而疾者至八日不可治熱病三四日腰以下不得汗脈大疾者生脈細小難得者不可治熱病四五日頭不熱腹不痛而吐脈來微細至十二日不可治熱病七八日其脈微小便如墨口乾脈代舌焦乾黑者不可治熱病七八日脈微小病人便血口中乾一日半而死熱病七八日脈不躁不數後三日中有汗三日不汗者死熱病八九日頭不疼身不痛目不赤色不變而反利脈來纍纍按不彈手時大心下堅者至十七日不可治熱病已得汗而脈尚躁盛此陰脈之極也死熱病脈常盛躁而不得汗者此陽脈之極也死脈盛躁得汗者生也熱病已得汗體熱不去者不可治熱病其人滾滾大熱脈細小者不可治熱病下利不止腹中痛甚者不可治辨可灸形證夫少陰病其人雖里和其病惡寒者宜灸之少陰病吐利手足逆而發熱脈不足者灸其少陰夫吐下手足厥無脈者當其厥陰灸之不溫反微喘者死傷寒六七日脈數手足厥躁煩不已灸厥陰不順者死辨不可灸形證凡微數之脈不可灸因熱為邪必致煩逆內有損骨傷筋血枯之患脈當以汗解反以灸之邪無所去因火而盛病當必重此為逆之治欲解者當發其汗而解也辨可火形證夫凡下利後下部中痛當溫之宜炒枳實若熬鹽等尉之辨病不可火形證夫傷寒寸口脈浮而弱即血氣虛胃氣微其脈浮則汗出如流珠衛氣微營氣虛故脈浮汗出也太陽病中風以火劫其汗風被火熱即令血氣流泆常有潮熱其身發黃陽盛即衄陰虛即小便難陰陽俱虛竭身體枯燥但頭汗出至頸而還腹滿微喘口乾咽爛或不大便其甚者噦手足躁擾循衣摸床若心下滿小便利者其人可治小便不利者不可治夫傷寒脈浮而以火逼劫汗即亡陽必驚狂臥起不安太陽病以火蒸之不得汗者其人必燥結若不結必下清血其脈躁者必發黃也夫太陽病而尉其背大汗必出火氣入胃胃中干竭必發荒語辨可水形證夫太陽病瘥後胃中乾燥不得眠睡渴欲飲水當稍稍飲之即愈若嘔吐熱在膈上思水者與五苓散即可飲水也夫傷寒七八日大渴欲飲水然當與之常令不足勿極意也夫凡傷寒病能飲水者為欲愈也若不渴而強與之因此成禍者其數多矣夫可水除煩使胃和常須少與勿令多若還不與無由作汗強與還因水致病非大渴不可與水渴不與水無由作汗則喘而殂也傷寒飲水是為欲愈之候若渴者與之過多或小渴而強與之飲腹中熱少一不能消停飲作害者多矣曰水結曰喘悸曰咳噎曰嘔噦曰腫滿曰下利曰小便不利安有不自水氣得之診視又當識此太陽病發汗後大汗出胃中燥不得眠其人欲飲水當少與之胃和則愈厥陰病渴欲飲水者與水則愈霍亂髮熱頭痛身疼熱多飲水者與五苓散嘔吐病在膈上後必思水者與豬苓湯水逆證見嘔吐條水結證見頭汗出條飲水多停心下氣上乘心則為悸水氣結於胸脅則為水結胸胃中虛冷則為嘔噦冷氣相搏為噎上迫於肺則為咳喘漬入腹中則為下利邪執所搏蓄於下焦則為小便不利小腹滿而裡急溢於皮膚則為腫重飲水過多者五苓散主之辨不可水形證夫凡發汗後飲水水灌之其人必喘水藥不得入口則為逆傷寒結胸為無熱證者宜與平和之藥若以水灌之益令熱不得出當汗而不汗即煩假令汗出後腹中痛可服和氣止痛之藥夫寸口脈浮大醫反下之此為大逆浮則無血大則為寒寒氣相搏即為腹鳴醫不知而反飲其水令汗大出水得寒氣必相搏其病必甚也夫傷寒五六日而渴欲飲未宜與也為腹中熱氣尚少不能消之便更作病深矣若大渴者宜與之也辨可溫形證大法冬宜熱藥夫凡病發熱頭痛脈浮數身有疼痛宜溫其表夫病腹滿下利嘔吐身體疼痛者宜溫其里夫太陽病下利不渴其臟有寒當宜溫之其人飲食入則吐手足寒脈弦遲此為中寒不可吐下也當溫之夫少陰病其脈沉者急當溫之下利不欲食者當宜溫之下利脈遲緊為痛未止下利脈浮大者此皆為虛宜溫之夫凡脈浮革者自腹鳴若渴之與水者必噦宜溫之夫病下之後續得下利水穀不止身體疼痛急當救里宜溫之與治中四逆附子湯諸溫藥之輩辨霍亂病證並治問曰病有霍亂者何答曰嘔吐而利名霍亂三焦者水穀之道路邪在上焦則吐而不利邪在下焦則利而不吐邪在中焦則既吐且利以飲食不節寒熱不調清濁相干陰陽乘隔遂成霍亂輕者止曰吐利重者揮霍撩亂名曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也發熱頭痛身疼惡寒者本是傷寒因邪入里傷於脾胃上吐下利令為霍亂利止里和復更發熱者還是傷寒必汗出而解傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必硬十三日愈所以然者經盡故也微為亡陽澀為亡血傷寒脈微澀則本是霍亂吐利亡陽亡血吐利止傷寒之邪未已還是傷寒卻四五日邪傳陰經之時裡虛遇邪必作自利本嘔者邪甚於上又利者邪甚於下先霍亂裡氣大虛又傷寒之邪再傳為吐利是重虛也故為不治若欲似大便而反失氣仍不利者利為虛不利為實欲大便而反失氣裡氣熱也此屬陽明便必硬也十三日愈者傷寒六日傳過三陰三陽後六日再傳經盡則陰陽之氣和大邪之氣去而愈也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也下利後亡津液當便硬能食為胃和必自愈不能食者為未和到後經中為復過一經言七日後再經也頗能食者胃氣方和過一日當愈不愈者暴熱使之能食非陽明氣和也惡寒脈微而復利利止而亡血也四逆加人參湯主之惡寒脈微而利者陽虛陰勝也利止則津液內竭故云亡血金匱玉函曰水竭則無血與四逆湯溫經助陽加人參生津液益血霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之頭痛發熱則邪自風寒而來中焦為寒熱相半之分邪稍高者居陽分則為熱熱多欲飲水者與五苓散以散之邪稍下者居陰分則為寒寒多不用水者與理中丸溫之理中丸方人參甘溫甘草甘平炙白朮甘溫乾薑辛熱以上各三兩內經曰脾欲緩急食甘以緩之用甘補之人參白朮甘草之甘以緩脾氣調中寒淫所勝平以辛熱乾薑之辛溫胃散寒上四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服加減法若臍上築者腎氣動也去朮加桂四兩脾虛腎氣動者臍上築動內經曰甘者令人中滿術甘壅補桂泄奔豚是相易也吐多者去朮加生薑三兩嘔家不喜甘故去朮嘔家多服生薑以辛散之下多者還用術悸者加茯苓二兩下多者用術以去濕悸加茯苓以導氣渴欲得水者加朮足前成四兩半津液不足則渴術甘以緩之腹中痛者加人參足前成四兩半裡虛則痛加人參以補之寒者加乾薑足前成四兩半寒淫所勝平以辛熱腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被胃虛則氣壅腹滿甘令人中滿是去朮也附子之辛以補陽散壅吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止里和也身痛不休表未解也與桂枝湯小和之外臺云里和表病汗之則愈吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之上吐下利裡虛汗出發熱惡寒表未解也四肢拘急手足厥冷陽虛陰勝也與四逆湯助陽退陰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之吐利亡津液則小便當少小便復利而大汗出津液不禁陽氣大虛也脈微為亡陽若無外熱但內寒下利清穀為純陰此以外熱為陽未絶猶可與四逆湯救之吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之吐已下斷津液內竭則不當汗出汗出者不當厥今汗出而厥四肢拘急不解脈微欲絶者陽氣大虛陰氣獨勝也若純與陽藥恐陰為格拒或嘔或躁不得復入也與通脈四逆湯加豬膽汁膽苦入心而通脈膽寒補肝而和陰引置湯藥不被格拒內經曰微者逆之甚者從之此之謂也吐利發汗脈平小煩者以新虛不勝穀氣故也內經曰食入於陰長氣於陽新虛不勝穀氣是生小煩辨陰陽易瘥後勞復病證並治傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之大病新瘥血氣未復餘熱未盡強合陰陽得病者名曰易男子病新瘥未平復而婦人與之交得病名曰陽易婦人新病瘥未平復男子與之交得病名曰陰易以陰陽相感動其餘毒相染著如換易也其人病身體重少氣者損動真氣也少腹裡急引陰中拘攣膝脛拘急陰氣極也熱上衝胸頭重不欲舉眼中生花者感動之毒所易之氣熏蒸於上也與燒裩散以導陰氣燒裩散方上取婦人中裩近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子裩當燒灰大病瘥後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子大五六枚病有勞復有食復傷寒新瘥血氣未平餘熱未盡早作勞動病者名曰勞復病熱少愈而強食之熱有所藏因其穀氣留傳兩陽相合而病者名曰食復勞復則熱氣浮越與枳實梔子豉湯以解之食復則胃有宿積加大黃以下之枳實梔子豉湯方枳實三枚炙苦寒梔子十四枚擘苦寒豉一升綿裹苦寒枳實梔子豉湯則應吐劑此云覆令微似汗出者以其熱聚於上苦則吐之熱聚於表者苦則發之內經曰火淫所勝以苦發之此之謂也上三味以清漿水七升空煮取四升納枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗傷寒瘥以後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之瘥後餘熱未盡更發熱者與小柴胡湯以和解之脈浮者熱在表也故以汗解脈沉者熱在裡也故以下解之大病瘥後從腰以下有水氣者牡蠣澤瀉散主之大病瘥後脾胃氣虛不能制約腎水水溢下焦腰以下為腫也金匱要略曰腰以下腫當利小便與牡蠣澤瀉散利小便而散水也牡蠣澤瀉散方牡蠣鹹平熬澤瀉鹹寒栝蔞根苦寒蜀漆辛平洗去腥葶藶苦寒熬商陸根熬辛酸鹹平海藻鹹寒洗去咸以上各等分鹹味湧泄牡蠣澤瀉海藻之咸以泄水氣內經曰濕淫於內平以苦佐以酸辛以苦泄之蜀漆葶藶栝蔞商陸之酸辛與苦以導腫濕上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸汗後陽氣不足胃中虛寒不納津液故喜唾不了了與理中丸以溫其胃傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒解後津液不足而虛羸餘熱未盡熱則傷氣故少氣氣逆欲吐與竹葉石膏湯調胃散熱竹葉石膏湯竹葉二把辛平石膏一斤甘寒半夏半升洗辛溫麥門冬一升甘平去心人參三兩甘溫甘草二兩甘平炙粳米半升甘微寒辛甘發散而除熱竹葉石膏甘草之甘辛以發散餘熱甘緩脾而益氣麥門冬人參粳米之甘以補不足辛者散也氣逆者欲其散半夏之辛以散氣逆上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈陽明旺於申酉戌宿食在胃故日暮微煩當下之以損宿谷辨不可發汗病脈證並治夫以為疾病至急倉猝尋按要者難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也諸不可汗不可下病證藥方前三陰三陽篇中經注已具者更不復出其餘無者於此以後經注備見脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠寸關為陽脈當浮盛弱反在關則裡氣不及濡反在巔則表氣不逮衛行脈外浮為在上以候衛微反在上是陽氣不足營行脈中沉為在下以候營澀反在下是無血也陽微不能固外腠理開疏風因客之故令汗出而躁煩無血則陰虛不與陽相順接故厥而且寒陽微無津液則不能作汗若發汗則必亡陽而躁經曰汗多亡陽遂虛惡風煩躁不得眠也動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣者築築然氣動也在右者在臍之右也難經曰肺內證臍右有動氣按之牢若痛肺氣不治正氣內虛氣動於臍之右也發汗則動肺氣肺主氣開竅於鼻氣虛則不能衛血血液妄行隨氣出於鼻為衄亡津液胃燥則煩渴而心苦煩肺惡寒飲水則傷肺故飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋傷肉瞤難經曰肝內證臍之左有動氣按之牢若痛肝氣不治正氣內虛氣動於臍之左也肝為陰之主發汗汗不止則亡陽外虛故頭眩筋傷肉瞤針經曰上虛則眩動氣在上不可發汗發汗則氣上衝正在心端難經曰心內證臍上有動氣按之牢若痛心氣不治正氣內虛氣動於臍之上也心為陽發汗亡陽則愈損心氣腎承心虛欲上凌心故氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食則反吐谷不得前難經曰腎內證臍下有動氣按之牢若痛腎氣不治正氣內虛動氣發於臍之下也腎者主水發汗則無汗者水不足也心中大煩者腎虛不能制心火也骨節苦疼者腎主骨也目運者腎病則目𥇀𥇀如無所睹惡寒者腎主寒也食則反吐谷不得前者腎水乾也王冰曰病嘔而吐食久又出是無水也咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得蜷臥不能自溫咽門者胃之系胃經不和則咽內不利發汗攻陽血隨發散而上必吐血也胃經不和而反攻表則陽虛於外故氣欲絶手足冷欲蜷而不能自溫諸脈得數動微弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相象根本異源動數之脈為熱在表微弱之脈為熱在裡發汗亡津液則熱氣愈甚胃中乾燥則大便難腹中乾胃燥而煩根本雖有表裡之異逆治之後熱傳之則一是以病形相象也脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還弦在上則風傷氣風勝者陽為之運動微在下則寒傷血血傷者里為之陰寒外氣怫鬱為上實里有陰寒為下虛表熱裡寒意欲得溫若反發汗亡陽陰獨故寒栗不能自還咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗蜷而苦滿腹中堅肺寒氣逆咳者則劇吐涎沫亡津液咽中必干小便不利膈中陽氣虛心中飢而煩一日一夜氣大會於肺邪上相擊晬時而發形如寒瘧但寒無熱虛而寒栗發汗攻陽則陽氣愈虛陰寒愈甚故蜷而苦滿腹中復堅厥脈緊不可發汗發汗則聲亂咽嘶舌萎聲不得前厥而脈緊則少陰傷寒也法當溫里而反發汗則損少陰之氣少陰之脈入肺中循喉嚨挾舌本腎為之本肺為之標本虛則標弱故聲亂咽嘶舌萎聲不得前諸逆發汗病微者難瘥劇者言亂目眩者死命將難全不可發汗而強發之輕者因發而重而難瘥重者脫其陰陽之氣言亂目眩而死難經曰脫陽者見鬼是此言亂也脫陰者目盲是此目眩也眩非玄而見玄是近於盲也咳而小便利若失小便者不可發汗汗出則四肢厥逆冷肺經虛冷上虛不能治下者咳而小便利或失小便上虛發汗則陽氣外亡四肢者諸陽之本陽虛則不與陰相接故四肢厥逆冷傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痓身強難以屈伸熏之則發黃不得小便灸則發咳唾傷寒當無汗惡寒今頭痛發熱微汗出自嘔則傷寒之邪傳而為熱欲行於里若反下之邪氣乘虛流於胸中為虛煩心懊憹如飢若發汗則虛表熱歸經絡熱甚生風故身強直而成痓若熏之則火熱相合消爍津液故小便不利而發黃肺惡火灸則火熱傷肺必發咳而唾膿夫脈沉數病在裡不可發汗無陽故也凡脈尺中遲不可發汗營氣不足血少故也凡脈微軟弱者不可發汗凡腹中有動氣在左右不可發汗凡諸動脈微弱者不可發汗汗則小便難腹中乾煩躁也凡失血者不可發汗發汗必恍惚心亂凡咽燥者不可發汗凡積熱在臟不宜發汗汗則必吐口中爛生瘡凡下利水穀忌攻其表汗出必脹滿咳嗽小便利者不可攻其表汗出即逆不堪者脈微遲溫濕虛煩壞病惟經水忽來兼失血臍間動氣並如之病在表脈浮者可汗表證具發渴脈不浮是表猶帶里也未可汗傷寒不可汗條例最多其可汗大抵脈證全在表表固汗然汗太早太過或津液泄變生焉當時誤汗則為亡陽為譫語為可下厥上竭等證其害人又速設或誤汗真武湯救解羸者去芍藥有熱去附子籲此救兵也謹之謹之表中風寒里則不消里病表熱者雖無陽證可以小辛之劑微汗而溫散之微脈弱為亡陽不可汗桂枝二越婢一湯尺脈遲為血少營氣不足不可發汗先以黃耆建中湯養血俟其脈不遲即小柴胡湯桂枝二越婢一湯和解風溫濕溫各有本條虛煩似傷寒不惡寒身不疼脈不緊不可汗下竹葉湯或小柴胡湯壞病者吐汗下溫不解知犯何逆以法治之並不可汗小柴胡湯衄血下血雖脈浮緊無汗然衄欲愈下者亦欲愈不愈用桂枝湯不可發汗腹中左右上下動氣築觸不可汗下證治論用柴胡桂枝湯動在左發汗則頭眩汗不止筋惕肉瞤為逆先服防風白朮牡蠣湯汗止建中湯與之動在右發汗衄而渴心苦煩飲吐先五苓散次竹葉湯動在上發汗氣上衝心棗根湯動在下發汗心中大煩骨節疼頭痛目運入食吐用大橘皮湯止吐次建中湯下利清穀用理中湯或大便不通者皆不可汗惡寒脈浮此為表證若渴則邪欲入里不可汗夫咽乾喉塞亡血淋家衄家瘡家動氣並不可汗證治論皆用小柴胡湯厥逆不可汗當歸四逆湯辨可發汗脈證並治大法春夏宜發汗春夏陽氣在外邪氣亦在外故可發汗凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也汗緩緩出則表裡之邪悉去汗大出則邪氣不除但亡陽也陽虛為無津液故不可重發汗凡服湯發汗中病便止不必盡劑凡云可發汗無湯者丸散亦可用要以汗出為解然不如湯隨證良驗聖濟經曰湯液主治本乎腠理壅鬱除邪氣者於湯為宜金匱玉函曰水能淨萬物故用湯也夫病脈浮大問病者言但便硬爾設利者為大逆硬為實汗出而解何以故脈浮當以汗解經曰脈浮大應發汗醫反下之為大逆便硬難雖為裡實亦當先解其外若行利藥是為大逆結胸雖急脈浮大猶不可下下之即死況此便難乎經曰本發汗而復下之此為逆若先發汗治不為逆下利後身疼痛清便自調者急當救表宜桂枝湯發汗外臺云里和表病汗之則愈太陽病脈浮數者宜發汗也太陽病脈浮大數者宜發汗也陽明病脈遲汗多而微惡寒者外未解宜發汗陽明病脈浮數者宜發汗太陽病常汗微微自出更宜發汗凡脈浮而緊者浮則為風緊則為寒宜發汗太陽病下之微喘者外未解也宜發汗太陽病發熱汗出而惡寒宜發汗辨發汗後病脈證並治發汗多亡陽譫語者不可下與柴胡桂枝湯和其營衛以通津液後自愈胃為水穀之海津液之主發汗多亡津液胃中燥必發譫語此非實熱則不可下與柴胡桂枝湯和其營衛通行津液生則胃潤譫語自止辨不可吐夫太陽病惡寒而發熱自汗出而反不惡寒熱關上脈細數者不可吐之夫少陰病其人欲食入則吐心中溫溫欲吐復不能吐手足寒脈弦遲乾嘔此膈上有寒飲不可吐之當宜溫也諸四逆者不可吐之諸虛羸不可吐之新産者不可吐之病者惡寒而不欲近衣不可吐之辨可吐大法春宜吐春時陽氣在上邪氣亦在上故宜吐凡用吐湯中病即止不必盡劑也要在適當不欲過也病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之利則止胸上諸實或痰實或熱鬱或寒結胸中鬱而痛不能食欲使人按之反有涎唾者邪在下按之氣下而無涎唾此按之反有涎唾者知邪在胸中經曰下利脈遲而滑者內實也今下利日十餘行其脈反遲寸口脈微滑是上實也故可吐之玉函曰上盛不已吐而奪之宿食在上脘者當吐之宿食在中下脘者則宜下宿食在上脘則當吐內經曰其高者因而越之其下者引而竭之病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之凡服湯吐者中病便止不必盡劑也大法春夏宜吐凡病頭不強痛寸口脈浮胸中痞滿上衝喉咽不得息此為有痰當宜吐之傷寒胸滿痰逆乾嘔熱嗽及肺壅唾膿等宜吐之夫宿食在胃脘宜吐之辨不可下病脈證並治脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞硬陽微下之陽氣已虛陰氣內甚故心下痞硬動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在右肺之動也下之傷胃動肺津液內竭咽燥鼻乾者肺屬金主燥也頭眩心悸者肺主氣而虛也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷動氣在左肝之動也下之損脾而肝氣益勝復行於脾故腹內拘急食不下動氣更劇也雖有身熱以裡氣不足故臥則欲蜷動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在上心之動也下之則傷胃內動心氣心為火主熱針經曰心所生病者掌中熱肝為臟中之陰病則雖有身熱臥則欲蜷作表熱裡寒也心為臟中之陽病則身上浮冷熱汗自泄欲得水自灌作表寒裡熱也二臟陰陽寒熱明可見焉動氣在下不可下下之則腹脹滿猝起頭眩食則下清穀心下痞也動氣在下腎之動也下之則傷脾腎氣則動寒乘脾故有腹滿頭眩下利則心下痞之證也咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身急痛下利日數十行咽中閉塞胃已不和也下之則閉塞之邪為上輕復傷胃氣為下重至水漿不下臥則欲蜷身急痛下利日數十行知虛寒也諸外實者不可下下之則發微熱亡脈厥者當臍握熱外實者表熱也汗之則愈下之為逆下后里虛表熱內陷故發微熱厥深者熱亦深亡脈厥者則陽氣深陷客於下焦故當臍握熱諸虛者不可下下之則大渴求水者易愈惡水者劇金匱玉函曰虛者十補勿一瀉之虛家下之為重虛內竭津液故令大渴求水者陽氣未竭而猶可愈惡水者陽氣已竭則難可制脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也虛家下之是為重虛難經曰實實虛虛損不足益有餘此者是中工所害也微則為咳咳則吐涎下之則咳止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前內經曰感於寒則受病微則為咳甚則為泄為痛肺感微寒為咳則脈亦微也下之氣下咳雖止而因利不休利不休則奪正氣而成危惡胸中如蟲齧粥入則出小便不利兩脅拘急喘息為難者裡氣損也頸背相引臂為不仁極寒反汗出身冷如冰者表氣損也表裡損極至陰陽俱脫眼睛不慧語言不休難經曰脫陽者見鬼脫陰者目盲陰陽脫者應不能食而谷多入者此為除中是胃氣除去也口雖欲言舌不得前氣已衰脫不能運也脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為亡血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋瀝小腹甚硬小便則尿血也弱在關則陰氣內弱濡在巔則陽氣外弱浮為虛浮在上則衛不足也故云陽虛陽虛不固故腠理汗出惡寒數亦為虛數在下則營不及故云亡血亡血則不能溫潤臟腑故數而痛振而寒栗微弱在關邪氣傳裡也裡虛遇邪胸下為急喘而汗出脅下引痛振寒如瘧此里邪未實表邪未解醫反下之裡氣益虛邪熱內陷故脈數發熱狂走見鬼心下為痞此熱陷於中焦者也若熱氣深陷則客於下焦使小便淋澀小腹甚硬小便尿血也脈濡而緊濡則衛氣微緊則營中寒陽微衛中風發熱而惡寒營緊胃氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭猝起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施吸水灌其身客熱應時罷栗栗而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還衛冷營寒陽微中風發熱惡寒微嘔心煩醫不溫胃反為有熱解肌發汗則表虛亡陽煩躁心下痞堅先里不足發汗又虛其表表裡俱虛竭猝起頭眩客熱在表悵怏不得眠醫不救里但責表熱汲水灌洗以卻熱客熱易罷裡寒益增栗而振寒復以重被覆之表虛遂汗出愈使陽氣虛也巔頂也巔冒頂體振寒小便難者亡陽也寒因水發下為清穀上為嘔吐外有厥逆內為躁煩顛倒不安雖欲極救不可得也本草曰病勢已過命將難全脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便利而大汗出法應衛家當微今反更實津液四射營竭血盡干煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死衛為陽營為陰衛氣強實陰血虛弱陽乘陰虛下至陰部陰部下焦也陽為熱則消津液當小便赤而難今反小便利而大汗出者陰氣內弱也經曰陰弱者汗自出是以衛家不微而反更實營竭血盡干煩而不眠血薄則肉消而成暴液者津液四射也醫反下之又虛其里是為重虛孤陽因下而又脫去氣血皆竭胃氣內盡必下如汙泥而死也脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可下下則必煩利不止數為熱止則邪氣結於經絡之間正氣不得復行於表則卻結於臟邪氣獨浮於皮毛下之虛其里邪熱乘虛而入裡虛叫熱必煩利不止脈浮大應發汗醫反下之此為大逆浮大屬表故不可下病欲吐者不可下嘔多雖有陽明證不可攻之為邪猶在胸中也太陽病外證未解不可下下之為逆表未解者雖有里證亦不可下當先解外為順若反下之則為逆也經曰本發汗而復下之此為逆也若先發汗治不為逆夫病陽多者熱下之則硬陽熱證多則津液少下之雖除熱復損津液必便難也或謂陽多者表熱也下之則心下硬無陽陰強大便硬者下之則必清穀腹滿無陽者亡津液也陰強者寒多也大便硬則為陰結下之虛胃陰寒內甚必清穀腹滿傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加溫針則衄傷寒則無汗發熱頭痛微汗出者寒邪變熱欲傳於裡也發汗則亡陽增熱故不識人若以火熏之則火熱傷氣內消津液結為裡實故喘不得小便心腹滿若反下之則內虛津液邪欲入里外動經絡故短氣小便難頭痛背強若加溫針益陽增熱必動其血而為衄也傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其候也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則身發黃若尉之則咽燥若小便利者可救之小便難者為危殆脈陰陽俱緊則清邪中上濁邪中下太陽少陰俱感邪也惡寒者少陰發熱者太陽脈欲厥者表邪欲傳裡也惡寒甚者則變熱翕翕汗出喉中痛以少陰之脈循喉嚨故也熱多者太陽多也目赤脈多者睛不慧以太陽之脈起於目故也發汗攻陽則少陰之熱因發而上行故咽中傷若復下之則太陽之邪因虛而內陷故兩目閉陰邪下行為寒多必便清穀陽邪下行為熱多必便膿血熏之則火熱甚身必發黃尉之則火熱輕必為咽燥小便利者為津液未竭猶可救之小便難者津液已絶則難可制而危殆矣傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則兩目閉貪水者脈必厥其聲嚶咽喉塞若發汗則戰栗陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出若發汗則口中傷舌上白苔煩躁脈數實不大便六七日後必便血若發汗則小便自利也傷寒發熱寒變熱也口中勃勃氣出熱客上膈也頭痛目黃血不可制者熱蒸於上也千金曰無陽即厥無陰即嘔貪水者必嘔則陰虛也惡水者厥則陽虛也發熱口中勃勃氣出者咽中已熱也若下之亡津液則咽中生瘡熱因裡虛而下若熱氣內結則手足必厥設手足溫者熱氣不結而下行作協熱利下重便膿血也頭痛目黃者下之熱氣內伏則目閉也貪水為陰虛下之又虛其里陽氣內陷故脈厥聲嚶咽喉閉塞陰虛發汗又虛其陽使陰陽俱虛而戰栗也惡水為陽虛下之又虛胃氣虛寒內甚故里冷不嗜食陽虛發汗則上焦虛燥故口中傷爛舌上白苔而煩躁也經曰脈數不解合熱則消穀喜飢至六七日不大便者此有瘀血此脈數實不大便六七日熱蓄血於內也七日之後邪熱漸解迫血下行必便血也便血發汗陰陽俱虛故小便利下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯主之脈大為虛以未應下而下之利因不休也浮者按之不足也革者實大而長微弦也浮為虛革為寒寒虛相搏則腸鳴與當歸四逆湯補虛散寒夫傷寒脈濡而弱陽氣不足不可下之下之則心下痞津液內竭咽燥鼻乾也夫傷寒脈浮而緊浮則為風緊則為寒風則傷營寒則傷衛營衛俱病骨節煩疼當發其汗而不可下也夫傷寒脈浮濡弱不得發汗無陽故也陽亡虛尺中弱澀者不可下夫傷寒結胸證其脈浮大不可下下之即死矣夫太陽與陽明合病喘促胸滿不可下夫太陽與少陽合病心下堅頸項強而眩不可下也夫四逆病厥者不可下也夫病欲吐者不可下也夫病發於陽而反下之熱入咽作結胸也夫太陰病其人腹滿吐食不可下下之益甚夫少陰病當心下堅滿不可下之後利不止者死夫病在裡而脈實者可下里證悉具若惡寒若脈不實是里猶帶表也未可下之傷寒不可下條例最多其可下者大抵脈證全在裡也里固可下然下之太早太過或者水穀脫而變生焉至於當汗而誤下則為痞氣為懊憹為結胸等證其害人又速耳設或誤下則理中湯丸以救解之或里煩則少加烏梅或轉損厥逆則兼與四逆湯輩籲此救兵也謹之謹之脈來細小固不可下若細小而牢緊又可下也脈浮病在表不可下結胸脈浮大不可下脈細虛或遲緩或尺部澀弱凡此皆為血氣衰不可下也惡寒者表之虛證雖陽明惡寒則與太陽合病屬表可汗不可下若少陰證惡寒則溫之嘔吐者雖有陽明證謹不可下小柴胡加生薑主之小便自利汗出者津液竭糞雖硬屬陽明但用蜜導而出也豬膽汁亦可導也脾約證大便堅小便清者熱不在裡雖不大便不可下桂枝湯汗之少陰證小便白為下焦虛寒用四逆湯大便堅小便少者津液還入胃必先硬後溏不久自出惟水便如常乃可下之有表證脈帶浮或惡寒或猶生寒熱並不可下不轉失氣謂不下泄也不下泄則先硬後溏不可下大抵陽明燥糞欲下之先與小承氣湯若轉失氣則必先溏後硬更進一劑不轉失氣則止又陽明譫語潮熱脈疾與小承氣湯不轉失氣則與小柴胡湯若次日又不大便而脈澀則為裡虛黃耆建中湯主之凡陽證而脈澀謹不可下頭汗出為津液少胞中虛不可下惟陽明譫語血熱頭汗則可下諸虛少血厥逆喉閉嘔吐亡陽陰實動氣皆不可下虛加附子湯厥逆當歸四逆湯咽喉閉塞烏扇湯嘔吐小半夏加桔梗湯無陽陰實而大便硬者下之必清穀腹滿但用蜜導左動氣下之則腹滿拘急氣愈動身雖熱反欲蜷先甘草乾薑湯次小建中湯右動氣下之則津液竭咽鼻乾頭眩心悸竹葉湯上動氣下之則掌握熱煩汗出欲灌水竹葉湯下動氣下之則腹滿清穀心痞頭眩甘草瀉心湯辨可下病脈證並治大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之為言蕩也滌蕩腸胃溉灌臟腑推陳燥結卻熱下寒破散邪疫理導潤澤枯稿悅人皮膚益人血氣水能淨萬物故勝丸散中病即止者如承氣湯證云若一服利而止後服又曰若一服譫語止更莫復服是不盡劑也謂此下利三部脈皆平按之心下硬者急下之宜大承氣湯下利者脈當微厥今反和者此為內實也下利三部脈平者已為實而久按之心下硬故知賊邪甚也故宜大承氣湯下之下利脈遲而滑者內實也利未欲止當下之宜大承氣湯金匱要略曰滑則穀氣實下利脈遲而滑者胃有宿食也脾胃傷食不消水穀是致下利者云內實若但以溫中厚腸之藥利必未止可與大承氣湯下去宿食利自止矣問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯寸以候外尺以候內浮以候表沉以候里寸口脈浮大者氣實血虛也按之反澀尺中亦微而澀者胃有宿食裡氣不和也與大承氣湯以下宿食下利不欲食者以有宿食故也當下之與大承氣湯傷食則惡食故不欲食如傷風惡風傷寒惡寒之數也下利瘥後至其年月日復發者以病不盡故也當復下之宜大承氣湯乘春則肝先受之乘夏則心先受之乘至陰則心先受之乘秋則肺先受之假令春時受病氣必傷肝治之難愈邪有不盡者至春時元受月日內外相感邪必復動而痛也下利為腸胃疾宿積不盡故當下去之下利脈反滑當有所去下之乃愈宜大承氣湯脈經曰脈滑者為病食也下利脈滑則內有宿食故云當有所去與大承氣湯以下宿食病腹中滿痛者此為實也當下之宜大承氣湯金匱要略曰病者腹滿按之不痛為虛痛為實可下之腹中滿痛者裡氣壅實也故可下之傷寒後脈沉沉者內實也下解之宜大柴胡湯傷寒後為表已解脈沉為里未和與大柴胡湯以下內實經曰傷寒瘥以後更發熱脈沉實者以下解之脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可以下之宜大承氣湯金匱要略曰脈雙弦者寒也經曰運為在臟脈雙弦而遲者陰中伏陽也必心下硬大則為陽緊則為寒脈大而緊者陽中伏陰也與大承氣湯以分陰陽夫少陰病得之口燥咽乾宜急下之夫傷寒病人腹滿不大便者亦然夫傷寒病腹中滿痛者為寒當宜下之夫傷寒脈數而滑者有宿食當下之則愈夫傷寒六七日目中瞳子不明無外證大便難微熱者此為實宜急下之夫太陽病七八日脈微浮者其人發狂此下焦有熱小腹當堅而滿小便自利下血乃愈瘀熱在裡故也宜下之夫陽明病但頭汗出其身無汗小便不利渴引水漿此為瘀熱在裡身必發黃宜急下之夫傷寒有熱而小腹滿者小便反利此為有蓄血當宜下之夫傷寒病五六日不大便繞臍痛煩躁汗出者此為有結汗出後則暫解日晡則復發脈實者當宜下之夫傷寒七八日身黃如橘小便不利其腹微滿者宜下之夫陽明病其人多汗津液越出胃中有熱大便必堅宜下之夫傷寒大下後六七日不大便煩熱不解腹滿如痛者此有宿食宜下之夫傷寒病小便不利大便乍難乍易時有微熱不能臥此胃中內有結燥故也宜下之備列加減方此以下諸方於隨卷本證下雖已有緣止以加減言之未甚明白似於覽者檢閲未便今復校勘備列於後桂枝加葛根湯方葛根四兩芍藥二兩甘草二兩生薑三兩切大棗十二枚擘桂枝三兩去皮上六味以水一斗先煮葛根減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法桂枝加厚朴杏子湯方於桂枝湯方內加厚朴二兩杏仁五十個去皮尖余依前法桂枝加附子湯方於桂枝湯內加附子一枚炮去皮破八片余依前法術柏湯方附於此方內去桂枝加白朮四兩依前法桂枝去芍藥湯方於桂枝湯方內去芍藥余依前法桂枝去芍藥加附子湯方於桂枝湯方內去芍藥加附子一枚炮去皮破八片余依前法桂枝麻黃各半湯方桂枝一兩十六銖去皮芍藥生薑切甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四個湯浸去皮尖及兩仁者上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合桂枝二麻黃一湯方桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩六銖切杏仁十六個去皮尖甘草一兩二銖炙大棗五枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再白虎加人參湯方於白虎湯方內加人參三兩餘依白虎湯法桂枝去桂加茯苓白朮湯方於桂枝湯方內去桂枝加茯苓白朮各三兩餘依前法煎服小便利則愈葛根加半夏湯方於葛根湯方內加入半夏半升余依葛根湯法桂枝加芍藥生薑人參新加湯方於桂枝湯方內更加芍藥生薑各一兩人參三兩餘依桂枝湯法服梔子甘草豉湯方梔子豉湯方內加入甘草二兩餘依前法得吐止後服梔子生薑豉湯方梔子豉湯方內加生薑五兩餘依前法得吐止後服柴胡加芒硝湯方小柴胡湯內加芒硝六兩餘依前法服不解更服桂枝加桂湯方桂枝湯方內更加桂二兩共五兩餘依前法柴胡桂枝湯方桂枝去皮黃芩人參各一兩半甘草一兩炙半夏二合半芍藥一兩半大棗六枚擘生薑一兩半切柴胡四兩上九味以水七升煮取三升去滓溫服附子瀉心湯方大黃二兩黃連黃芩各一兩附子一枚炮去皮臍破別煮取汁上四味切三味以麻沸湯三升漬之須臾絞去滓納附子汁分溫再服生薑瀉心湯方生薑四兩切甘草三兩炙人參三兩乾薑一兩黃芩三兩半夏半升洗黃連一兩大棗十二枚擘上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服甘草瀉心湯方甘草四兩黃芩三兩乾薑三兩半夏半升洗大棗十二枚擘黃連一兩上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服黃芩加半夏生薑湯方於黃芩湯方內加半夏半升生薑一兩半余依黃芩湯法服桂枝加大黃湯方桂枝三兩去皮大黃一兩芍藥六兩生薑三兩切甘草二兩炙大棗十二枚擘上六味以水七升煮取三升去滓溫服一升日三服桂枝加芍藥湯方於第二卷桂枝湯方內更加芍藥三兩通前共六兩餘依桂枝湯法服四逆加吳茱萸生薑湯方當歸三兩芍藥三兩甘草二兩炙通草二兩桂枝三兩去皮細辛三兩生薑半斤切吳茱萸二升大棗二十五枚擘上九味以水六升清酒六升和煮取五升去滓溫分五服一方水酒各四升四逆加人參湯方於四逆湯方內加人參一兩餘依四逆湯法服四逆加豬膽汁湯方於四逆湯方內加入豬膽汁半合余依前法服如無豬膽以羊膽代之釋音
