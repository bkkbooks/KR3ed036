薑汁盡入茴香內以好青鹽二兩同炒赤取出焙燥碾羅為末無灰酒煮糊丸梧子大每日空心食前服三十丸溫酒米飲任下此藥專實脾胃以其有鹽引入下部遂大治小腸疝氣服之屢有效尋常治疝氣藥多是疏導久而未有不為害者此藥用薑汁專一發散而無疏導之害所以妙也郭廷圭知縣云舊苦此疾歲不下五七發服藥一料病根遂除今已十五六年不作治小腸氣久年痼疾一服見效出存仁方用蘿蔔子一兩以大斑蝥七個去頭翅足入內同炒令香以紙裹定候冷去斑蝥不用為末酒糊丸如梧桐子大每服十丸炒薑湯吞下食前木賊散出瑞竹堂方治小腸疝氣木賊不拘多少去節先用鍋子燒熱後再火炒上為末空心熱酒調下沸湯調服亦可星斗丸一名吳茱萸丸治小腸疝氣痛吳茱萸二兩酒浸二兩醋浸二兩童子小便浸二兩米泔浸或鹽炒上分作四處浸一日至二日漉出曬乾碾為細末用生蘿蔔剖開皮作蓋子取肉空將此藥末裝在內蓋了用線扎定甑內蒸熟令爛同和為丸空心溫酒下鹽湯亦得大有神效如遇無蘿蔔時以澤瀉代之用一兩茱萸四錢一處和丸一方煮麵糊為丸空心下治小腸疝氣腫不止鼠黏子不拘多少銀器內炒黃上為末每服五錢熱酒調下揉動煨棗方出直指方治小腸氣痛不可忍用斑蝥一個去頭足並翅入棗中線系濕紙包置慢火中煨令香熟去斑蝥空腹食棗以桂心蓽澄茄煎湯送下葫蘆巴散出直指方治小腸攻刺用葫蘆巴炒一兩為末每服二錢茴香炒紫用熱酒沃蓋取酒調下治小腸氣用血師一兩米醋一升以火燒血師通赤淬入醋中以淬竭為度搗羅如面用湯調下一大錢即瘥如神血師即代赭石立神丹治小腸氣用香附子不拘多少去毛炒再去毛用無灰酒煮盡銼碎為細末薄荷酒糊丸如梧桐子大每服二十丸或三十丸空心日午鹽湯或酒下蔥白尉方治小腸脹小便難不急治則殺人芫花方治小腸氣小腹疼痛芫花醋炒焦木通銼青橘皮去白切胡椒大黃煨銼辣桂去粗皮各半兩上為末酒煮麵糊丸如小豆大丹砂末為衣每服十丸至十五丸空心食前生薑熱酒下三茱丸出危氏方治小腸氣外腎腫痛服之病自泄氣中出川楝子一兩用斑蝥十四個好者摘去翅嘴同炒赤色去斑蝥黑牽牛一兩炒熟青皮青鹽茴香微炒各三兩山茱萸吳茱萸食茱萸各二兩破故紙一兩七錢炒香熟上為末醋麵糊丸如梧桐子大每服三五十丸先吃炒桃仁十五個以酒或鹽湯下空心食前炒茴香酒下亦得周仲舉苦腎癰服此藥得效巴戟散治小腸疝氣巴戟天去心楝實取肉麩炒木香蘹香子炒附子炮裂去皮臍各一兩上為散每服二錢空心溫酒調下楝實散同前楝實取肉麩炒蘹香子炒京三稜煨銼蓬莪朮煨銼各等分上為散每服一錢蔥酒調下治小腸氣川楝子一對面糊燒沒藥二錢乳香八角茴香舶上茴香各三錢當歸二錢上㕮咀好酒煎空心服又方紅曲末菴䕡末香附末橘核末上件熱酒調空心服降真丸治小腸氣發動附子去皮臍生青橘皮湯浸去白木香芎藭各等分上為末濃糯米飲和丸如梧桐子大每服七丸至十丸生薑湯下日三白朮散治小腸氣白朮楝實取肉各二兩青鹽一分上細銼慢火炒黑色留性搗羅為散每服二錢熱酒調日三治小腸氣由小腸內疼痛忽衝入兩肋忽攻腰背小便黃赤忽即不通大腸祕熱其痛難忍悶絶欲死宜吃此方一名桃仁膏出護命方舶上茴香一兩半炒桃仁一兩炒熟去皮尖並雙仁者上先杵茴香一味為細末卻入桃仁在內重杵令細爛每服三錢熱蔥酒調下和滓非時吃氣壯盛者服三錢救痛散出衛生家寶方治小腸疝氣築心疼痛不可忍者木香煨肉豆蔻麵裹煨各半兩京三稜煨茴香炒馬藺花醋炒金鈴子去核稱各一兩上為末每服一大錢熱酒調下如痛時服之立效鱉甲煎丸出衛生家寶方治小腸氣發不可忍並治淋此藥極有應驗鱉甲三兩用水浸三日三夜去裙米醋蘸炙令脆為末桃仁一百粒湯浸去皮尖炒黃細研硇砂湯化去石煎成霜稱三分以上三味用釅醋四升砂盆中慢火熬成膏更入後藥厚朴去皮生薑汁炙陳皮去白神麯炒肉桂去皮各一兩肉豆蔻四個檳榔二兩柴胡去苗半兩上後七味為末再溫前膏和丸梧桐子大每服二十丸至三十丸以細切生蔥熱酒下忌生冷油膩濕面抵聖碧霞丹出衛生家寶方治男子小腸疝氣諸藥不效者茴香炒川楝子去皮核全蠍糯米炒去足梢刺北亭去石銅緑研阿魏研青皮硫黃元胡索葫蘆巴炒上等分為末煨蔥研為丸緑豆大每服七丸煨蔥熱酒下立效附子散出衛生家寶方治小腸疝氣絶妙附子一兩炮去皮尖臍胡椒半兩川楝子十個炒去核舶上茴香半兩炒馬藺花半兩醋半盞煮乾上件為末空心溫酒調下一錢服軟痃丸治丈夫小腸氣攻刺及脅肋下成塊堅硬不消婦人血刺血塊攻注衝心疼痛不可忍者硇砂兩半飛研白礬三分飛研硫黃一兩飛研細硃砂一兩飛研細陽起石一兩用冷水浸七日取出研面細當歸半兩附子二兩生去皮臍茴香一兩木香三分煨丁香一分上為末酒糊丸如緑豆大每服三五丸煨生薑溫酒下神仙導氣散治小腸氣發作疼痛不可忍者並腳氣等疾甘遂二兩半木香一兩半銼碎上件一處入水二升文武火熬令乾為細末每服二錢用豬腰子一隻入藥末在內以濕紙裹煨熱細嚼溫米飲下臨臥服更量虛實加減忌甘草三日橘核散治寒濕腰痛小腸氣壯筋骨暖下元五靈脂去砂石用醋少許炒乾元胡索破故紙茴香鹽炒黃色菴䕡草去梗生用黑牽牛生用橘核以上七味各一兩糖球子四兩生用俗呼為山果子川楝子去核半兩研生用上件為細末每服二錢熱酒調下不拘時候如聖散治小腸疝氣發作無時疼莫能忍牛膝一兩酒浸一宿焙乾肉蓯蓉一兩酒浸一宿焙乾葫蘆巴半兩巴戟半兩去心南木香半兩不見火日曬乾破故紙半兩微炒桂心半兩不見火乾山藥半兩蓽澄茄半兩川附子一兩炮去皮臍切作骰子塊川烏頭半兩炮去皮尖切作骰子塊黑牽牛半兩蚖青三十個川楝子一兩每個作四片酒煮十沸焙乾上將川楝子川附子川烏頭同黑牽牛蚖青於銀器中慢火炒令黃色火不可緊去牽牛蚖青只將附子烏頭川楝同前藥為細末酒糊為丸如桐子大每服五十丸至百丸空心溫酒或鹽湯下華亭人朱其姓為吳與稅官日傳此方云妙凡有氣疾皆能治之木香飲治小腸氣痛詩訣曰小腸氣痛腰先曲無淚叫啼空眼哭口乾腳冷上唇乾額上汗珠濕漉漉川楝子十個巴豆七粒炒令土黃色去巴豆入茴香半兩元胡索半兩南木香二錢使君子三錢上為末米飲調下大人小兒皆用發灰酒治小腹切痛屬小腸病元豐中丞相王邵公病小腹痛不止聖旨宣差太醫攻治終是不效丸藥之至熱硫黃附子五夜叉丸用之不瘥駙馬張都尉令取婦人油頭髮燒作灰酒服二錢即時痛除尋氣丸治小腸疝氣偏墜疼痛甘遂二錢炒石燕子雌雄各一個斑蝥三個去翅足炒上件為細末酒煮麵糊為丸如緑豆大每服三丸麝香溫酒送下空心食前臨臥服忌熱物一時忌甘草一日神效胡桃酒治小腸氣及婦人外癰上以好胡桃一枚火內燒成灰細研以熱薄荷酒調下絶妙胡桃丸治小腸氣胡桃肉浸去皮研核焙二味為末破故紙大棗煮去皮核焙二味為末上件等分拌勻以棗和丸如梧桐子大食前溫酒下四五十丸一方為散每服二錢酒調下食前服
