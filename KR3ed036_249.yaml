body:
  text: 卷二百四十九㿗疝門陰腫痛附論夫陰痛者由腎氣虛損為風邪所侵氣流入於腎經與陰氣相擊真邪交爭故令陰痛但冷者則痛挾熱則腫也陰腫者由風熱客於腎經流於陰腎虛不能宣故腫也陰猝腫痛者蓋亦由腎氣虛弱暴邪氣傳入陰中冷熱相薄故猝然而痛也痛甚則邪勝邪勝則熱勝熱勝則腫皆猝然而作也方沉香散治陰猝腫痛不消發歇疼痛沉香丹參赤芍藥白蒺藜微炒枳殼麩炒微黃去瓤赤茯苓去皮各三分檳榔一兩上為散每服三錢水一盞煎六分去滓食前溫服木香散治陰猝腫痛攻注腹脹滿悶木香防風去蘆頭各半兩赤茯苓去皮檳榔各一兩牡丹澤瀉郁李仁湯浸去皮微炒各三分上為散每服二錢溫酒調下一方無郁李仁丹參散治陰猝腫脹或疼痛丹參檳榔各一兩蘹香子青橘皮去白各半兩上為散每服二錢溫酒一盞調下食前服之治陰忽腫痛桃仁湯浸去白尖雙仁麩炒微黃苦楝子蘹香子沒藥各一兩上為散每服食前熱酒調下二錢桂枝加味湯治外腎吊痛自左乳根起如蜘蛛絲許吊縮外腎拘變不得屈伸其脈沉弦緊澀上以桂枝湯加澤瀉川烏炮青鹽茴香等分薑棗煎服之再用炮附子葫蘆巴酒炒川楝肉炒茴香炒四味等分為末酒者豶豬腰子去筋膜研細入酒少許為丸如梧桐子大酒下四五十丸食前服宣胞丸治外腎腫痛黑牽牛一兩半生半熟青木香一兩斑蝥七枚用青木香炒香用五枚斑蝥川木通一兩炒上為末用酒糊為丸如梧桐子大每服三十丸酒送下鹽湯亦可治陰風冷所傷疼痛出聖惠方白蒺藜微炒去刺附子炮裂去皮臍蘹香子微炒上等分為散每服食前以酒調下二錢治陰痛不可忍出聖惠方硇砂一兩細研安放罩子上堀一坑子燒令通赤後蓋用醋一大盞以來澆在坑子內便安罩子著裡面用盆蓋四面擁之二七日取出刮取硇砂細研木香一分末肉豆蔻末一分上都細研糯米飲和丸如梧桐子大每服煎蘹子湯下七丸相次三二服取瘥又方出聖惠方銅緑苦楝樹向陽根銼木香以上各等分上為末煮麵糊和丸如梧桐子大不拘時溫酒下五丸又方出聖惠方苦楝子三兩附子炮製去皮臍硇砂以酒熬成膏各一兩上為末以硇砂膏和丸如緑豆大不拘時溫酒下五丸雞屎礬散出聖惠方治陰腫雞屎礬火前茶龍牙草各三分上為散雞子清調塗腫處日三易之雞翎散出聖惠方治陰猝腫雞翎六莖燒灰蛇床子一兩炒上為散每服一錢溫酒調下如左邊腫即取雞右翎右邊腫取左翎姚方無蛇床子治囊腫大如升用蛇床子末和雞子黃敷之又方治外腎偏大腫痛用大黃末醋調塗干即易之塗敷方治陰卵猝腫痛桂去粗皮一分上為末稀麵糊調塗腫處頻易以效為度一方以水調塗黑豆尉方治久坐卑濕忽陰囊虛腫氣上築以米醋炒黑豆青布袋盛尉心腹更以椒蔥湯淋泄腰胯厚衣蓋下部然後服諸藥竹皮湯出危氏方治交接勞復陰囊痛入腹中上刮竹青皮一升以水三升煮一半去滓分三服立愈治囊腫大如升用馬齒莧搗取汁塗之治蚯蚓吹腎囊腫上用鹽湯洗以炒鹽包尉痛處治外腎腫硬拈地衣草為末用津唾勻於握內揉溫烙痛處即安治陰腫出本草用梁上塵醋和塗之治猝外腎偏疼出肘後方用皂莢和皮為末調敷之良海藻丸出聖惠方治虛勞損腎陰疼痛海藻一兩洗肉蓯蓉三分酒浸去皮炙乾牡蠣木香牛膝去苗硫黃研各半兩蘹香子沉香天雄炮裂去皮臍各三分上為末入硫黃都研令勻煉蜜和搗五七百杵丸如梧桐子大每服食前溫酒下三十丸鹽湯亦得冬青湯治腫不下冬青葉小柏甘草上等分煎湯五升瓶盛湯浸三兩時必下神效方治腎囊腫大上用黑牽牛一兩淨炒黃色香熱為度次將舶上硫黃末拌牽牛入內須要不見硫黃將牽牛紙襯於地上一宿碾末用宿蒸餅糊為丸每日空心鹽湯下三十丸量證加減雄黃散出聖惠方治陰腫大如升核痛不可忍用雄黃一兩碎研綿裹甘草一兩生切用水一斗煮取二升洗之忌海藻菘菜千金用礬石二兩肘後用礬石二兩治陰冷漸漸冷氣入陰囊腫滿恐死日夜疼悶不得眠以取生椒擇之令淨以布帛裹著囊令厚半寸須臾熱氣大通日再易之取消瘥一方兼治虛勞陰腫冷痛礬石丸出肘後方治陰中痛礬石二分大黃一分熬甘草末上用綿裹如棗以導之取瘥治腎囊腫大出經驗良方淡豆豉二兩斑蝥四十九個去頭足茴香一兩炒上為散酒糊為丸梧桐子大每服三十丸鹽酒送下治猝陰痛如刺汗出如雨出千金方小蒜韭根楊柳根各一斤上合燒以酒灌之及熱水氣蒸之即愈滲濕湯出海上方治陰腫痛蒼朮制乾薑白朮白茯苓陳皮甘草各一兩上㕮咀薑棗煎空心服吳松坡嘗有此疾右邊囊腫光而微疼始服瀉腎之藥其腫疼愈甚續服腎著湯一料而痊愈蓋此證因濕氣得之愈利則愈虛也一方出海上方治腎囊腫痛用八角茴香一兩用鹽合炒香熱和鹽分十服細嚼無灰酒送後服茱萸內消丸三兩分作十服空心服治陰痛方出千金方甘草石蜜上等分為末和乳塗之男子陰腫如斗大核痛人所不能治者出肘後方上用蕪菁根搗敷之有人陰冷冷氣漸入陰囊腫滿陰腫大如升核痛用搗莧菜根敷之又方醋和熱灰尉之又方出千金方用釜月下土雞子白和敷之一方車前子為末飲服之又方出千金方用醋和麵炙令熱尉之又方出千金方用煮大薊根汁服一升日三下過三即愈治腎囊腫痛用先以生料五苓散煎七分去滓熱服後以青木香丸一帖用斑蝥去頭翅一處微炒帶青黃色去斑蝥將藥丸又用鹽搓丸子後煎五苓散一帖加吳茱萸同煎至七分去滓送下前青木香丸服藥後如小便時用手托起陰囊小便了然後放下以上二方孫威儀用效治男子陰腫以荏子萁葉搗和醋封之女人綿裹內三四易治猝陰腎痛以燒牛屎末和酒敷之干即易治陰囊墜腫氣痛以槐皮煮汁淋之雄黃洗方治男子陰腫核痛不能療者方馬鞭草散出肘後方專治男子陰猝痛腫上用搗蕪菁根同馬鞭草敷並良蚯蚓散治陰腫痛上用水擂甘草調蚯蚓糞塗雞糞散出肘後方專治男子陰猝腫痛上用灶中黃土末以雞子黃和敷之蛇床子末和雞子黃敷之亦良療男女陰腫上以綿裹生大豆已搗者納之治男子陰腫大如升核痛不能治者出海上方上搗馬鞭草塗之立效療陰腫出海上方上以鐵精粉敷之蟾心方治外囊大心中暴躁陰下濕癢上吳茱萸煎湯熏洗即愈或以茱萸末置熱水洗亦可療虛勞陰腫痛皮癢出聖惠方上以桃仁去皮尖研末酒服彈丸許不過三服即瘥療惡毒瘡及陰卵或偏著一邊攣急痛牽小腸痛不可忍上以茴香搗取汁飲一升日三四服又取滓敷腫失笑散出濟生拔萃方治腎腫用荊芥穗一兩朴硝二兩為末蘿蔔同煎湯淋洗豬肝法治陰囊癢搔痛悶上用豬肝炙熱納陰中當有蟲著肝治偏腫出儒門事親茴香甘遂上各等分為末酒調二錢食前服又方出儒門事親治偏腫巴戟去心川楝炒茴香上等分為末溫酒調二錢服食前治陰痛不可忍出儒門事親吳茱萸二兩湯洗七次焙微炒檳榔一兩茴香一兩上為末醋糊為丸熱酒下十丸食前服治陰癢痛用車前子以水三升煮三沸去滓洗癢痛處便瘥導引法養生方云兩足趾向下柱席兩湧泉相枯坐兩足跟頭兩膝頭外扒手懸前向下盡勢七通去勞損陰膝冷小腸氣附論甲乙經曰少腹控睪引腰脊上衝心肺邪在小腸也又曰小腸疝者小腹痛腰脊控睪而痛夫小腸者連睪系屬於脊貫肝肺絡心系其經虛不足則風冷乘間而入邪氣既盛則有厥逆之證其氣上衝肝肺客冷散於肓結於臍控引睪丸上而不下痛引小腹甚則衝於心胸蓋其經絡之所繫屬然也方救生丹出御藥院方治男子婦人小腸寒氣上攻心腹痛並男囊偏腫痛消積聚補丹田京三稜三兩乾漆二兩半炒煙盡廣朮硃砂各二兩川茴香破故紙炒各一兩葫蘆巴炒川苦楝巴戟紅豆縮砂仁海蛤當歸半夏湯洗七次硇砂沒藥馬藺花炒芫花醋炒黃色以上各半兩水蛭一錢炒醋盡蛤蚧一對醋炙附子一兩半炮去皮臍紅娘子二錢粳米同炒粳米黃色去粳米不用上為末醋麵糊和丸如梧桐子大每服三五丸空心食前溫酒下鹽煎散治小腸氣吊腹中成陳刺痛兼治風證益智仁白芷白乾薑炮茴香炒甘草炙天台烏藥去心香附淨各一兩青皮一兩半檳榔麻黃去節川芎枳殼制各半兩上為末每服二錢鹽少許水煎食前服硇砂丸治控睪小腸氣痛硇砂一兩別研細水飛蓬莪朮炮銼楝實麩炒丁香蓽澄茄肉豆蔻去殼炮檳榔附子炮裂去皮臍巴戟天去心青橘皮湯浸去白焙蘹香子炒木香各半兩上除硇砂外搗羅為末以酒一升先取硇砂並飛硇砂水一盞熬及一升入諸藥再熬頻攪候得所丸如梧桐子大每服二十丸空心溫酒下加至三十丸木香導氣丸治男子小腸肚疼一切氣積以及下元虛冷脾胃不和並皆可服大有神效木香乳香丁香八角茴香川楝子去核破故紙葫蘆巴京三稜香附子甘草各一兩杜仲半兩上為末酒糊丸如梧桐子大每服三十丸至五十丸空心溫酒下鹽湯亦可日進三服延胡索丸一名煉陰丹治小腸受寒控睪小腹陰器下墜腫脹卵核偏大堅硬疼痛不可忍延胡索青橘皮湯浸去白焙海藻湯洗去咸焙乾葫蘆巴昆布湯洗去咸焙乾馬藺花蘹香子炒楝實肉炒各一兩木香半兩巴戟酒浸切焙一分一作大戟上為末入硇砂阿魏安息香三味各一分以醋二升化開去泥土以重湯煮令成膏和丸緑豆大每服二十丸燒綿灰酒下空心食前服一方入麝香一錢沒藥一分一方無葫蘆巴走馬茴香丸出德生堂經驗方治男子積年傷憊久冷及小腸疝痃氣疾復元丸出朱氏集驗方治釣腸病川楝子二十五個銼內作五分一分茴香炒一錢一分陳皮炒一錢一分黑牽牛炒二錢一分神麯炒一錢一分巴豆炒五分除去巴豆破故紙二錢代用上為細末煮少麵糊為丸取江水井水塘水田水圳水合煮湯吞下空心服丁香丸治小腸受寒控睪上而不下痛引少腹丁香木香狼毒蜀椒去目併合口炒出汗各一兩附子炮製去皮臍芍藥桔梗炒乾薑炮各半兩細辛去苗葉一兩半上為末煉蜜和丸如梧桐子大每服三十丸食前泡蘹香子酒下通氣散治小腸疝氣腰腹牽引疼痛及感風寒或因勞動腰痛並婦人吹奶心氣脾痛瘡癤已潰未潰悉治有功穿山甲銼碎用蛤粉炒腸去粉二兩重白牽牛二兩炒玄胡索去皮陳皮去白淨炒厚朴去皮甘草炙各一兩木香一兩半不見火舶上硫黃二兩炒黑牽牛半兩炒上為細末每服二錢空心溫酒調下病在上者食後化生丸治小腸疝氣痛上引腰臍身不能直木香三錢半不見火檳榔生用三稜煨莪朮煨川楝子肉煨陳皮芫花醋炒青皮各半兩巴豆十粒去皮上陳皮青皮同巴豆炒黃去巴豆不用為細末麵糊丸梧桐子大空心溫酒鹽湯任下三十丸乳香丸治小腸受邪睪丸控引上下臍腹痛丹砂研胡椒楝實麩炒去核當歸切焙木通銼馬藺子炒各半兩硇砂研海蛤各一分蘹香子炒一兩上為末用乳香一分研細以酒煮糊和諸末藥丸如桐子大每服二十丸溫酒或鹽湯下亦得空心食前三茱丸治小腸氣疼山茱萸石茱萸炒吳茱萸炒金鈴子去核炒青皮去白炒舶上茴香炒馬藺花炒小兒胎髮煅存性各一兩上為末酒糊丸如桐子大每服三五十丸鹽湯酒下蕩疝丸治小腸疝氣上而不下疼川楝子炒茴香炒破故紙炒各五錢青皮去皮牽牛頭末陳皮去白各三錢廣朮炮木香各四錢上為末酒糊丸如梧桐子大每服四十丸空心溫酒下青鹽散治小腸久積寒氣築痛青皮去白肉桂去皮乾薑炮各一錢半茴香炒南木香益智仁川烏炮各半錢甘草炙少許上㕮咀每服四錢水一大盞鹽一捻煎七分空心服加味通心飲治腎與膀胱實熱小腸氣痛小便不通瞿麥穗木通去皮節梔子去殼黃芩連翹甘草枳殼去瓤川楝子去核各等分上為散每服五錢水一盞半燈心二十莖車前草五莖同煎空心溫服玉藥丹治小腸氣疼痛不可忍欲絶青木香七錢半茴香蠍梢陽起石硇砂湯化去土火氣令淨硫黃研細各半兩白礬生二錢半黑附子炮去皮臍一兩上同研酒糊丸如梧桐子大於疾發時稱新綿二錢半燒灰與藥十五丸同研熱酒調下甚者加至二十丸即時氣定不上攻須臾即愈久有此疾日服十丸半月後小便中當有如桃膠即病根除矣吳茱萸散治小腸疝氣牽引臍腹疼痛腰曲不伸吳茱萸湯洗炒過半兩楝實四十九枚沉香半兩巴豆半兩雜令微破三味同炒後入楝實黃焦色去巴豆茱萸不用將楝實去核用木香馬藺花蘹香子炒各一分上除巴豆茱萸不用外搗羅為散每服二錢炒蔥酒調下空心夜臥發時服木香丸治小腸受寒氣控睪牽痛木香一兩石南肉蓯蓉酒浸切焙別為末菖蒲牛膝酒浸切焙別為末蘹香子炒楝實炒各二兩上除蓯蓉牛膝二味別作末外搗羅為末以酒三升熬蓯蓉牛膝成膏和藥丸如梧桐子大每服三十丸空心食前以紙裹蔥白一寸煨熟溫細嚼溫酒下蘹香子丸治小腸受邪痛引小腹蘹香子炒蓽澄茄川楝子炒各一兩木香一兩葫蘆巴青皮各三錢半檳榔一錢半上為末酒糊丸如梧桐子大每服四十丸蔥酒任下二茱丸出華他中藏經專治小腸氣痛石吳茱萸各一兩金鈴子取肉並皮一兩青皮去瓤舶上茴香馬藺花三味各等分上逐味於銀銚內炒令香為末酒糊丸如梧桐子大每疾作鹽酒下三五十丸年久不瘥五七服可除根七珍丹治小腸疝氣一切下部冷疾木香知母焙小茴香鹽炒陳皮去白枳殼去根川楝子甘草上等分為末煉蜜丸如梧桐子大每服三十五丸空心鹽酒下木香散治小腸受邪控睪牽痛木香馬藺花各半兩楝實巴豆各三十枚剝去皮同楝實炒候黑色去巴豆用楝實上除巴豆不用外搗研為細散每服三錢煎蔥酒調下鹽湯亦得空心食前服金鈴丸出華他中藏經治小腸氣立愈黑牽牛炒青皮去白良薑各等分川楝子半兩舶上茴香半兩玄胡索上為末生薑自然汁煮麵糊丸如梧桐子大硃砂為衣每服三十丸燒綿灰浸酒下不拘時喝起丸出瑞竹堂方治小腸氣又腰痛萆薢杜仲酥炒去絲葫蘆巴生芝麻炒破故紙炒小茴香以上各一兩鹽水浸一宿胡桃仁二兩湯泡去皮上將胡桃為末同前五味藥為末丸如梧桐子大每服三五十丸空心鹽湯鹽酒亦可沉附湯出直指方治腎虛無陽小腸氣痛頭額小腹外腎時冷兼治濕證附子生一錢沉香辣桂蓽澄茄甘草炙各半錢香附子一錢炒上銼為一服薑七片空心煎服川楝散治膀胱小腸氣痛臍下撮疼上衝心腹面色萎黃腳下隱痛四肢倦怠不思飲食夜多旋溺外腎瘙癢茴香楝實丸一名控引睪丸出衛生家寶方治小腸控睪證甲乙經云小腸病結於腰上而不下痛衝心肺所繫也茴香炒楝實麩炒去核食茱萸陳皮馬藺花醋炒各一兩芫花醋炒半兩上為末醋面和丸如梧桐子大每服三十丸至二十丸空心酒溫下食前服大蒜丸治一切小腸氣腎囊大川楝子取肉炒破故紙炒黑牽牛炒熟各二兩玄胡索一兩半青木香南木香楝細青香上用大蒜每瓣內夾巴豆一粒火內煨熱大蒜令香去皮及巴豆只用大蒜十頭擂細加前藥末丸如梧桐子大每服四五十丸用鹽酒送下空心食前木香散出百一選方治小腸氣方木香青皮去白玄胡索土茴香炒馬樣兒新瓦上焙乾上等分為末每服炒二錢空心溫酒調服忌滯氣食物如豆腐雞鴨子濕面薺菜病愈任意食無害楝實散治腹受邪控睪上不下而痛川楝子四兩銼作片巴豆甘草各一兩青鹽二錢半小茴香二錢半炒上將楝實與巴豆一處炒至川楝黃色不用巴豆前三味一處為末服一分溫酒空心調下治小腸氣或走氣陳皮蒼朮破故紙木通牽牛上等分水二盞煎一盞去渣再煎如或走氣去故紙枳殼一同煎空心冷服立愈祕傳茴香湯出德生堂經驗方治男子小腸心腹痛下元久冷婦人血氣刺痛等疾早晨常服大妙蒼朮一斤半甘草炙十二兩茴香炒一斤半乾薑十二兩鹽七兩後和藥再碾上為末每服一匙沸湯調服不拘時兼治小兒脾疳泄瀉捻金散出朱氏集驗方治奔豚小腸諸氣痛不可忍玄胡索川楝子炒全蠍炒舶上茴香炒各一兩附子半兩去皮臍生用上為末每服二錢痛作時熱酒調下甚者不過再服神效五復丸治小腸奔豚疝氣膀胱偏墜青木香丸海藻丸消疝丸內消丸安腎丸上前藥以母子大斑蝥七個小者十四個去翅頭足與丸子藥同炒以藥微裂為度乘熱為丸合封一日夜去斑蝥用復元通氣散空心鹽湯或酒調送丸子五十丸立效立安丸治小腸氣攻腹作疼川椒淡豆豉各七十粒巴豆十粒去殼油斑蝥六個去翅上為末醋糊為餅子用米醋一碗將餅子煮醋乾搜和丸如緑豆大每服十五丸空心冷鹽水下更量虛實加減丸數服治小腸氣痛不可忍者出醫方大成烏藥搗碎用酒浸一宿高良薑茴香舶上者各一兩青皮去皮二兩上為末每服二錢偶發時熱酒調下又方杏仁一兩舶上茴香一兩蔥白焙乾一兩同為末酒調嚼胡桃咽下治小腸氣撞腹痛面青唇黑欲死者出本事方木香一兩茵陳芫花甘遂各等分上為末每服二錢水一盞煎七分去滓溫服服此藥後應有甘草藥皆不得吃恐與甘遂相反故也其藥甚妙緣理處方屢有效驗又方出本事方川楝子茴香川烏炮破故紙各等分炒黃色上焙乾為末酒糊丸如梧桐子大每服二十丸鹽湯溫酒任下忌生冷動氣一切毒物沉香內消丸出德生堂經驗方治小腸疝氣陰囊腫大或左右腎偏結