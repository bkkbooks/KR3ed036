body:
  text: 卷三百五十五産後諸疾門咳嗽附論夫肺者主氣因産後血虛肺經一感微邪便成咳嗽或風或熱或寒或濕皆令人咳嗽也若産後吃鹽太早而咳嗽者難治産後血氣不通咳嗽者何答曰産後咳嗽多因食熱面壅納或熱病或有氣塊發時衝心痛氣急咳嗽四肢寒熱心悶口乾或時煩躁睡夢驚悸氣虛肢體無力宜服局方真黑神散五積散加棗煎服內經謂五氣所病在肺為咳嗽産後臟腑俱弱風寒乘虛而客於肺肺為華蓋位處於上其俞在背外合皮毛寒氣客之則先乘於肺肺感之故為咳嗽肺感微寒則成咳嗽而肺主氣因産後氣虛風冷客於肺故咳嗽也方桃仁散治産後咳嗽有時寒熱四肢乏力疼痛不思飲食桃仁去皮尖雙仁麩炒湯浸桑白皮各三分當歸炒白茯苓白朮人參甘草各三分鱉甲醋塗炙去裙襴紫菀洗去苗土木香桂心白芍藥子芩陳皮湯浸去白熟地黃各半兩柴胡一兩去苗上為散每服四錢水一鍾生薑半分棗三枚煎六分去滓溫服紫菀散治産後咳嗽四肢無力吃食減少紫菀半兩洗去土人參三分去蘆半夏半兩湯洗七次去滑白茯苓陳皮三分湯去白麥門冬一兩去心當歸黃耆一兩白芍藥半兩桂心半兩熟地黃一兩甘草一分五味子三分杏仁半兩湯浸去皮尖雙仁麩炒上為末每服四錢水一盞生薑半分棗三枚煎六分去滓不計時溫服天門冬散治産後咳嗽心膈不利涕唾稠黏四肢煩熱天門冬去心焙三兩前胡去蘆赤茯苓黃耆杏仁焙洗去皮尖雙仁火炒桑白皮各三分生地黃當歸微炒百合款冬花赤芍藥甘草各半兩上為散每服四錢水一盞半薑半分煎六分去滓不時溫服熟乾地黃散治産後虛羸四肢無力吃食減少常多咳嗽熟地黃桂心細辛杏仁去皮尖雙仁麩炒各半兩五味子人參白朮白茯苓百合當歸各三分甘草一分陳皮湯浸三分上為散每服四錢水一中盞薑半分棗三枚煎六分去滓不計時溫服人參散治産後虛乏短氣咳嗽不思飲食人參續斷白茯苓黃耆熟地黃白朮白薇五味子當歸芎藭各半兩麥門冬一兩去心甘草一分炙上為散每服四錢水一中盞生薑半分棗三枚煎六分去滓不計時候溫服款冬花散治産後咳嗽涕唾稠黏胸膈壅悶喘急不調四肢無力款冬花貝母煨桔梗紫菀去苗土旋覆花五味子海蛤天門冬去心赤茯苓甘草各半兩漢防己一分上為散每服四錢水一中盞生薑半分棗三枚煎六分去滓不時溫服百部丸治産後咳嗽連聲不絶痰涎壅盛百部焙半兩細辛去苗葉二兩貝母甘草紫菀桂各二兩白朮麻黃五味子各三兩杏仁去皮尖雙仁麩炒四兩上為末和勻煉蜜為丸如桐子大每服五十丸食前臨臥服犀角散治産後咳嗽吐血不止心中煩悶頭目旋悶犀角屑三分麥門冬去心一兩半生地黃一兩赤茯苓一兩雞蘇一兩馬兜鈴三分紫菀三分洗去土甘草半兩羚羊角屑三分竹茹一分上為散每服四錢水一中盞生薑半分煎六分去滓不計時服人參散治産後腹冷肺寒咳嗽鼻多清涕不欲飲食宜服人參白朮陳皮厚朴薑汁製乾薑白茯苓各三分紫菀洗去土苗桂心細辛甘草炙各半兩上為末每服四錢水一中盞生薑半分煎六分去滓不計時服療咳嗽多痰唾黏氣急前胡五味子紫菀貝母各六分桑白皮茯苓各三分淡竹葉三十片上㕮咀水二升煎取八合去滓食後分二服百部湯治産後咳嗽痰壅煩悶百部款冬花紫菀去土去苗貝母知母白薇杏仁去皮尖雙仁炒上等分為散每服三錢以水一盞煎七分去滓不拘時溫服二母散治惡露上攻入肺經咳嗽如傷風痰嗽服尋常傷風藥不效宜服知母貝母白茯苓人參各半兩桃仁杏仁去皮尖各一分上為末每服三錢水一盞半煎八分無時溫服如覺腹痛停服紫菀湯治産後咳嗽痰涎壅悶紫菀去苗土一兩貝母去心一兩人參一兩白茯苓二兩陳皮半兩杏仁去皮尖雙仁炒一兩半上為散每服三錢煎七分去滓溫服不拘時療産後咳嗽氣喘百部根苦梗各六分桑白皮二十分百合赤茯苓各八分上㕮咀水二升煮取七合去滓食後分三服皂莢丸治産後咳嗽痰盛頭目不利皂莢七梃不蛀者水浸挼取汁濾去皮丁香桂各半兩訶黎勒去皮半枚杏仁二十枚去皮尖雙仁炒上將四味搗為細末以皂莢水就銀石銚內煎如膏即將藥和攪為丸如桐子大每服十丸烏梅湯下不拘時半夏湯治産後咳嗽痰壅半夏半兩生薑汁浸一宿切焙貝母去心一兩柴胡一兩去苗甘草豬牙皂莢各半兩上為散每服二錢水一盞生薑五片煎七分去滓不計時服黃耆湯治産後肺氣虛寒咳嗽喘悶黃耆桔梗人參各半兩白茯苓半兩山芋半兩上搗篩每服三錢以水一盞煎七分去滓溫服不拘時柴胡湯治産後咳嗽喘急煩悶柴胡麻黃去根節煎掠去沫焙紫蘇莖葉陳皮杏仁去皮尖雙仁炒上等分粗搗篩每服三錢煎七分去滓不拘時服茱萸湯治産後肺寒及咳嗽不已吳茱萸湯浸焙三分桂一兩細辛一兩一分當歸二分杏仁去皮尖雙仁炒半兩上搗篩每服三錢以水一盞煎七分去滓不拘時服百花散治婦人産後咳嗽黃柏桑白皮用蜜塗浸火炙黃為度糯米二十粒款冬花燒灰六錢上為細末每服一二錢水一盞入糯米同煎至六分以款冬花攪在藥內同調溫服白散子治産後痰血結滯發為寒熱心胸如火煩躁服之神效大川烏去皮臍黃星半夏白附子各一兩羌活黃芩各五錢上生用銼散每服三錢生薑五片水一鍾半煎服旋覆湯治産後傷風感寒暑濕咳嗽喘滿痰涎壅塞並宜服之前胡麻黃杏仁去皮尖雙仁炒五味子淨茯苓甘草赤芍藥荊芥旋覆花半夏曲上等分為粗末每服四錢水一盞半薑五片棗三枚煎七分食前一服感冒寒熱頭痛不宜峻劑神仙百解散生料五積散集驗療産後感風傷寒咳嗽多痰唾黏甘草苦梗各六分款冬花四分麥門冬生地黃各半三分蔥白一握豉二合舊方無蔥白與豉上㕮咀水二升煮取八合去滓食後分二服治産後嗽逆三日不止欲死桂心半兩薑汁三合上同煎取二合以火先炙手摩令皆熱時塗藥汁盡妙治産後咳嗽燒車釭頭脂納酒中分溫三服咳逆附論夫肺主氣五臟六腑俱稟於氣産後則氣血俱傷臟腑皆損而風冷搏於氣氣則逆上而又脾虛聚冷胃中伏寒因食熱物冷熱氣相沖擊使氣厥而不順則咳噫也脾者為上中下三焦之關五臟之倉廩貯積水穀若陰陽氣虛使榮衛氣厥逆則致生斯病也經云咳噫者胃寒所生服藥無效灸期門三壯必愈期門穴乃胃之大絡方丁香散治産後心煩咳噫不止脾胃虛寒衛氣厥逆丁香白豆蔻仁各半兩伏龍肝一兩上為細末煎桃仁吳茱萸湯調下一錢如人行五里再服石蓮散治氣吃噫吐逆心怔目暈不思飲食石蓮肉炒兩半白茯苓一兩丁香半兩上為細末每服三錢米飲調下無時候羌活散治咳嗽羌活附子炮茴香炒各半兩木香白薑炮各一分上為粗末每服二錢以水一盞鹽一捻煎一二十沸熱服丁香散治産後咳逆石蓮肉十個去心焙白茯苓一兩丁香十枝上為末水半盞煎數沸服産後咳逆或患氣亂心煩用乾柿一個切碎以水一盞煎至六分熱服又方治産後咳逆經三五日不止欲死用古壁鏡窠三四個以水一小盞煎至一半熱服治婦人干逆用白芍藥為末薑五片煎服治婦人産後逆氣用青橘皮為末以蔥白童子小便煎湯調服之治産後咳逆不止狗膽一個硇砂丁香五靈脂各等分上為細末以狗膽丸如白大豆大每服一丸生薑水磨下霍亂附論夫産後霍亂氣血俱傷五臟六腑虛損或飲食不消觸冒風冷所致陰陽不順清濁相干氣亂於腸胃之間真邪相搏冷熱不調上吐下利故曰霍亂也經云渴而飲水者五苓散寒多不飲水者理中丸大段虛冷者加附子來復丹亦妙霍亂者由三焦氣不調清濁邪正相擾之間吐利不已心痛者吐腹痛者利吐利不已則轉筋四肢厥逆也方乾薑湯治産後霍亂吐利四肢逆冷虛煩乾薑炮三兩黃連去須三兩赤石脂三兩當歸三兩半夏研為末生薑汁作餅子五兩赤茯苓一兩甘草炙桂龍骨火燒紅枳殼去瓤麩炒人參附子泡去皮臍各二兩上銼如麻豆每服五錢以水一盞半生薑五片煎八分去滓食前溫服厚朴湯治産後霍亂吐利四肢逆冷虛煩厚朴去皮薑製高良薑人參白朮各二兩麥門冬去心赤茯苓桂甘草各兩半紫蘇莖葉全用炮陳皮各一兩一分吳茱萸一兩去滑微炒上搗篩每服三錢以水一盞半生薑五片煎八分去滓食前溫服人參散治産後霍亂吐利胃虛煩躁人參白朮當歸麥門冬去心厚朴薑製草豆蔻芎藭白茯苓訶黎勒皮沉香各三分甘草半兩上為散每服三錢水一中盞生薑半分棗三枚煎至六分去滓不計時服藿香散治産後霍亂吐利煩渴不已藿香香薷白朮麥門冬去心厚朴薑製葛根人參各三分桂心半兩蘆根一兩白豆蔻半兩甘草一分炙上為散每服三錢水一鍾生薑半分竹葉三七片棗三枚煎六分去滓不計時服附子散療産後霍亂吐利不已手足逆冷腹痛煩渴附子白朮當歸吳茱萸桂心人參丁香橘紅甘草各半兩上為細末粥飲調下二錢無時即理中丸加減虛冷甚者兼來復丹木香丸治産後吐利食物不化腹脅疼痛木香三兩炮白豆蔻十二枚炮去皮草豆蔻十二顆去皮小蒜切半兩菖蒲炒一兩神麯炒一兩干椿根白皮麥芽各一兩半阿魏一錢別研入上為末酒和麵為丸如桐子大每服二十丸食前煎橘皮湯下白茯苓散治産後霍亂吐瀉心神煩悶腹內疼痛四肢厥逆不時燥渴白茯苓三分麥門冬去心三分草豆蔻當歸藿香人參高良薑芎藭甘草各半兩上為散每服四錢水一中盞生薑半分煎六分去滓不計時服香薷散治産後霍亂吐利煩渴心胸滿悶香薷前胡麥門冬人參白朮甘草炙半夏湯浸七次陳皮湯浸去白皮訶黎勒皮各半兩上為末每服三錢水一中盞生薑半分煎六分去滓不計時溫服丁香散治産後胃氣虛弱因飲食不節致成霍亂丁香肉豆蔻當歸白朮縮砂去皮人參厚朴薑製陳皮湯浸去白皮三分甘草半兩炙銼上為散每服三錢水一中盞生薑半分棗三枚煎六分去滓不計時服厚朴散治産後霍亂吐瀉不止厚朴去皮薑汁製陳皮湯浸去白瓤人參各一兩肉豆蔻去殼紅豆蔻桂心白朮乾薑甘草各半兩上為散每服三錢水一中盞生薑半分煎六分去滓不計時服當歸散治産後霍亂吐利腹中疼痛當歸白豆蔻去皮木香白朮高良薑白芍藥各半兩甘草半兩厚朴一兩薑製吳茱萸一分湯洗七次上為末每服二錢粥飲調下不計時厚朴湯治産後霍亂吐利肢體逆冷厚朴去皮薑汁製陳皮去白當歸桂各二兩甘草人參附子炮裂去皮臍各一兩白朮三兩上為散每服三錢以水一盞煎七分去滓食前溫服藿香湯一名木瓜散治産後霍亂吐利腹痛轉筋煩悶藿香葉當歸人參五味子各一兩白朮赤茯苓黃耆各一兩半木瓜二兩上為散每服五錢以水一盞半煎八分去滓溫服一方用薑煎溫中散治産後霍亂不止吐瀉之疾人參白朮當歸草豆蔻仁乾薑各一兩厚朴二兩上為細末每服三錢水煎服白朮散治産後霍亂吐利腹痛煩渴手足逆冷白朮橘紅麥門冬人參乾薑甘草各半兩上為細末每服四錢生薑五片水一盞煎七分去滓溫服白朮湯治産後霍亂吐利不思飲食白朮赤茯苓人參各一兩甘草一兩厚朴薑汁製枳殼各一兩半麩炒上為散每服五錢水一盞半煎八分去滓不拘時服厚朴湯治産後霍亂吐利厚朴制薑汁一兩陳皮去白瓤半兩藿香去枝梗高良薑當歸各三分上為散每服三錢以水一盞煎七分去滓溫服不拘時葛根湯治産後霍亂吐利煩渴不食葛根人參白朮桔梗白茯苓各半兩上為散每服三錢以水一盞半