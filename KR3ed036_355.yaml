二兩炒黃連去須六兩阿膠炒別為末當歸各三兩上除阿膠外搗羅為末用多年陳醋消膠令熔和為丸並手丸如梧桐子大每服二十丸陳米飲下日再服甚者加丸數地榆飲治産後赤白痢久不止臍腹疼痛地榆酸石榴皮各一兩黃連三兩當歸炒三兩上為粗散每服三錢水一盞煎至七分去滓食前溫服膠豉湯治産後虛冷下痢並血液轉瀉腹痛阿膠一兩搗碎豉一兩薤白七莖切生薑切一兩上為散水二大盞煎二分去滓食前分三服厚朴湯治産後下部冷痛厚朴一兩半薑汁炙乾薑三分黃連一兩去半微炒當歸一兩銼上為散每服三錢水一鍾煎六分去滓溫服日三四服犀角散治産後熱毒痢犀角屑一兩苦參一兩黃連一兩黃柏一兩上為末每服二錢粥飲下日三四服桃膠丸治産後下痢赤白裡急後重疼刺等症桃膠瓦上焙乾沉香蒲黃隔紙炒等分上為末每服二錢粥飲調下日三四服黃連丸療産後冷熱痢黃連六兩烏梅三兩乾薑一兩上為細末煉蜜如梧桐子大空心米飲下三十丸忌食豬肉赤散治産後下痢赤石脂代赭各三兩桂心一兩上為末酒服方寸匕日三服十日愈粥飲下亦可三聖散治産後赤白痢不止烏魚皮炒燒綿灰血餘灰拌醋各等分上為細末每服一錢煎石榴皮湯調下熱服舒眉丸治痢痛五靈脂蒲黃炒各等分麝香少許上為末煉蜜丸如梧桐子大每服一丸醋湯下牛䚡散治産後血痢不止黃牛角䚡三兩半燒灰橡實一兩炒側柏葉半兩炒上為散每服二錢米飲空心調下服桂薑散治産後冷痢疾桂去粗皮薑汁炙阿膠炙當歸各半兩上為細末空心米飲調下二錢日再服神麯散療婦人生産多臍下冷數痢瘦不能食令人腹發花色方曲二升寬器中熬令香發即止熟地黃五升淨洗白朮五兩上為末每日以好酒服兩大匙無酒米飲及乳下亦得服訖飯食沒藥散沒藥一兩木香二兩阿膠一兩搗碎上為末每二錢粥飲調下二錢日三四服治産後赤白痢日夜數十行買子木一兩生藕肥長者一尺一挺搗絞取汁益麻綟頭上水二小盞煎上件二味藥至一大盞去滓用藕汁相和更煎三五沸分為三服治産後痢下膿血腹痛臭樗根一兩微炙地榆一兩半甘草半兩炙上為末煉蜜丸梧桐子大每服三十丸食前粥飲下療産後氣痢不止日夜十餘次者青木香三分訶子酥炙黃去核八分上為細末空心米飲調下方寸匕一方用縮砂仁三味等分為細末入蜜一匙米飲調下二錢療産後痢而渴飲無度數麥門冬十二分烏梅二十個上細切以水一升煮取七合細呷治産後瀉下血不止上用艾葉半兩炙熟老生薑半兩濃煎湯一服立止茱萸丸治産後赤白痢日久臍腹疼痛吳茱萸一兩黑豆汁浸干黃連去須一兩半上為末煉蜜丸如梧桐子大每服二十丸煎芍藥湯下空心食前服甘草散治産後下痢赤白久不瘥甘草半生半炙黃連炒各二兩上為散每服二錢溫漿湯調下食前服木香散治産痢不止木香三分訶黎勒皮一兩半上為散研勻每服二錢米飲調下乳薑散治産後冷痢疾上以乾薑二兩炮搗羅為細末以人乳汁和作餅以慢火炙令黃熟研為細末每服空心陳米飲調下三錢匕又方治産後赤白痢蔥白一握餘糧兩合好豉煎吃了當時除治産後痢久不瘥倉米一合當歸一兩上以水一大盞煎六分去滓分為二服治産後下痢白多赤少腹痛不止甘草半兩炙川烏頭半兩去皮臍上水一大盞煎取半盞食前分二服産後諸痢方上煮薤白食之又方上以羊腎脂炒薤白空心服食尤佳又方上炙肥羊肉食之療産後血痢小便不通臍腹痛上用生馬齒莧搗取汁三合煎一沸下蜜一合調頓服療産後血不止上用臭樗根六分為末水和丸如棗核大面捏作餛飩每度煮二七個熱吞之療産後痢日久津液枯竭四肢浮腫口乾舌燥上以冬瓜一枚黃泥裹厚五寸煨令爛熟去皮攪汁服之瘥治産後大小便血痢上用發灰為末米飲調一錢空心服治産後血痢上用生薑不拘多少切成小棋子大片以面搜球子慢火炒令黃色為末米飲調下三錢空心服治臨産而痢上用梔子燒灰空心調下一匙太甚者不過五服治産後痢無不效上用蒼耳子葉為汁溫服半盞日三四服治産後瀉痢上用龍牙草根焙乾不拘分兩搗為細末用米飲調下一錢治産後痢上用沒石子一個燒為末和酒服方寸匕冷即酒服熱即飲下治産後虛及痢上用雞子醋煮服之一方用黃腳雞子一枚水攪取兩服合水服之治産後下痢腰腹痛上用野雞一隻作餛飩食之治産後痢上用鱟魚骨尾其尾長二尺燒為黑灰為末酒下先服生地黃汁蜜煎訖然後服之無不斷也春蕨散治産後痢疾上用新生蕨菜不拘多少陰乾為細散每日空心陳米飲調下三錢匕蕓薹散治産後下痢久不止上用蕓薹不拘多少淨洗爛煮飽食佳一方用子二兩微炒為末每服一錢粥飲調下治産後痢無不瘥用劉寄奴一兩為末每服二錢陳米飲調下産後積多因食葷太早作瀉謂之新産痢腹痛不止有死無生惟神仙感應丸救之庶活萬一治産後産前痢上用敗龜一枚米醋搗為末米飲調下硇砂丸治一切積滯化氣消食補益真氣産後逐敗血補虛至善硇砂揀通無石者別研如粉天雄用無灰酒煮五七百沸候乾去皮金鈴子去皮核當歸淨各二兩巴戟檳榔木香舶上茴香炒附子炮沉香阿魏各半兩米醋磨成膏入諸藥肉蓯蓉一兩上為細末以無灰酒煮白麵糊丸如梧桐子大每服三十丸空心日午溫酒下吾家婦人常病下痢日久甚困篤百方不瘥士人李潛善醫曰蓐中痢與他痢不同常痢可用苦澀藥止之蓐中痢生於陰虛不足澀之則血愈不行痢當更甚陰脫附論夫婦人産努力太過太過致陰下脫如脫肛狀及陰下挺出逼迫腫痛舉動房勞皆能發作清水續續小便淋露方玉龍湯治婦人産後用力太過産門突出又以四物湯入龍骨真者為末少許煎空心連進二服麻油湯熏洗療陰下脫出皂莢去皮子半夏洗大黃細辛各四分蛇床子六分右搗散薄絹袋盛如指大內陰日二易又以羊脂已煎過塗上以鐵精敷脂上多少令調以火炙布令暖以尉之研磁石酒服方寸匕日三服當歸散治陰下脫當歸黃芩各一兩芍藥半兩一分牡蠣一兩二錢半蝟皮燒存性二錢半上為末每服二錢溫酒或米飲調下忌登高舉重治産後陰脫此因産婦勞力而致陰下挺出腫痛五倍子蛇床子荊芥枳殼上味煎湯洗硫黃湯治産勞玉門開而不閉硫黃四兩吳茱萸菟絲子蛇床子各一兩上為銼散每服四錢水一碗煎數沸去滓洗玉門日再洗治子宮不收荊芥穗藿香葉臭椿樹皮各等分上將前藥煎湯熏子宮即入療婦人陰下挺出蜀椒烏頭白芨各二分上搗篩以方寸匕用綿裹內陰中入三寸腹中熱明旦更著瘥止一方無蜀椒治婦人産後陰下脫蜀椒一升吳茱萸二升戎鹽半雞子大上三味搗以綿裹如雞子大內陰中日一易二十日愈硫黃散治産後勞傷陰脫硫黃烏賊骨各半兩五味子一分千金翼用三銖一方無之上為細末研令極細摻患處日三易治子宮脫出萆麻葉有九角葉者好飛過白礬各等分上為細末以紙片攤藥末於紙上托紙藥於脫處用手徐托肛門處便入治婦人子宮出痛不可忍上用五倍子白礬為末溫湯泡洗又先用淡竹葉根煎湯洗後仍用此末藥摻立效治婦人陰挺下脫蛇床子五兩烏梅十四個上銼碎水五升煮取三升去滓熱洗日五次療産後陰下脫方鱉頭二個陰乾葛根一斤當作一兩上為末酒服方寸匕日三服陰脫洗尉方治産後陰門開而不閉蛇床子炒五倍子各等分上煎湯乘熱以舊衣帛蘸藥洗治婦人産後子宮脫出用酸漿草俗名老鴉酸草煎湯用草坐不開孔才熏收一半稍溫下手洗並收入而安治婦人子宮出痛不可忍用萆麻子塗頂心如吸入即洗去藥亦妙治婦人瘣疾用溫水先洗軟卻用飛鼠糞燒煙燻之又方用黃柏一兩為末浸冷水洗治産後陰腫下脫腸出玉門不閉用石灰一斗熬令黃以水三斗投灰中放冷澄清取一斗二升暖洗一方可燒草以水二斗投灰中坐須臾收入療産後陰下脫用兔頭燒作末敷之瘥治産後陰脫用車釭頭脂燒作灰內酒中分溫三服治産後陰脫下用慎火草一斤陰乾以酒五升煮取汁分溫四服治産後陰下脫療陰腫以鐵精粉推內之又灸臍下橫文二七壯治産後陰下脫用人屎炒令赤以酒服方寸匕每日三治婦人産後陰下脫取蛇床子一升布裹炙尉之亦療産後陰中痛治陰脫以鐵精羊脂二味攪令稠布裹炙熱尉推內之瘥治産後陰痛以訶黎勒和蠟燒熏及熱煎湯熏通手後洗不語附論夫産後不語者何答曰人心有七孔三毛産後血虛氣弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語也方七寶散治産後不語敗血閉於心竅神志不能守舍又心氣閉則舌強不語川芎人參石菖蒲生地黃各一兩細辛一錢防風半錢硃砂半錢別研上為細末每服一錢薄荷湯調下不拘時地黃以當歸代之效尤甚孤鳳散治産後閉目不語用白礬細研每服一錢以熱水調下乍見鬼神附論夫産後乍見鬼神者何答曰心主身之血脈因産傷耗血脈心氣則虛敗血停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語顛錯醫人不識呼為風邪如此治之必不得愈但服調經散每服加龍腦一撮得睡即安方調經散治血虛經閉心神煩躁渾身疼痛或時見怪沒藥琥珀並細研桂心各一錢芍藥炒當歸各一分細辛半錢麝香少許上為末每服半錢薑汁溫酒各少許調七珍散一名七寶散治産後乍見鬼神甘草小麥大棗湯治婦人臟躁喜悲傷欲哭象如神靈所作數欠伸甘草三兩小麥一升大棗一枚上三味以水六升煮取三升溫分三服亦補脾氣調經散産後血虛心無所主煩躁不安乍見鬼神言語顛錯沒香琥珀並細研桂心各一兩芍藥當歸各一分麝香研細辛各半兩上為末每服半錢薑汁同溫酒調下諸疾
