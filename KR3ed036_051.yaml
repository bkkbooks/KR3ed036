body:
  text: 卷五十一面門面䵟𪒟附論夫䵟𪒟之黑點如烏麻斑如雀卵稀則棋布密則不可容針皆由風邪客於皮膚痰飲浸漬其形外著或飽食安坐無所作為若養生方所謂積聚不消之病使人面目黧皯是也散之固有常劑若乃塗澤蠲除朝夕從事者又安可己面䵟𪒟者由臟腑有痰飲或皮膚受風邪致令氣血不調則生黑䵟五臟六腑十二經脈皆上於面夫血之行俱榮表裡又或痰飲積於臟腑風邪入於腠理使氣血不和或澀或濁不能榮於皮膚故變生黑䵟若皮膚受風邪外治則瘥若臟腑有痰飲內療則愈也方防風膏治面䵟𪒟塗之能令光潤防風藁本辛夷芍藥當歸白芷牛膝商陸細辛密陀僧芎藭獨活葳蕤木蘭皮蕤仁各二一兩杏仁丁香雞舌香零陵香珍珠屑麝香油一斤獐髓鹿髓各一斤牛髓一斤蠟四兩上先將髓以水浸令白取出除珍珠屑麝香外余藥並銼碎次將油髓蠟入鍋中熬令消入諸藥用文火煎之若白芷色黃量稀稠得所以新綿濾去滓方將珍珠屑麝香別研為細末入前汁中熬成膏貯瓷器內臨臥塗面上旦起以溫水洗去避風日妙長春散治風䵟粉刺常用光澤麵皮甘松藁本藿香白附子細辛廣陵香小陵苓茅香白檀三奈子川芎白芷各二兩白丁香白芨白蘞各三兩栝蔞根楮實各四兩滑石半斤韶腦半斤兩牽牛四兩皂角二三斤半緑豆一升上為細末加白麵一斤和勻一處後韶腦再和勻用甚妙治面䵟𪒟粉刺及麵皮皺定年方白芨二兩半白朮五兩白芷細辛白附子防風白茯苓白石脂土瓜根蕤仁葳蕤各三兩白礬藁本芎藭各一兩半當歸一兩白玉屑琥珀末珍珠末鍾乳粉各半兩上搗羅為細末取雞子白並蜜等分和捻作挺子入布袋盛懸掛門上陰乾六十日後如鐵即堪用再搗研為末每夜用漿水洗面即以豬脂調藥塗之經六十日面如新剝雞子治外膏主面䵟𪒟白芷白蠟各二兩白附子辛夷防風烏頭零陵香藿香葳蕤各半兩藁本商陸麝香各六錢麻油一合羊脂五合牛脂鵝脂各一升上薄切醋漬浹洽一宿但合煎候白芷色黃膏成以皂莢湯洗面敷之白瓜丸治面䵟𪒟令色光白白瓜子仁三兩陳橘皮三分白芷藁本遠志杜蘅車前子當歸雲母粉白石脂各一兩天門冬細辛柏子仁栝蔞根黃丹各半兩上搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服不計時候以溫酒下三十丸治粉滓䵟𪒟皴疱及茸毛令面悅澤光潤如十四五時方黃耆白朮白蘞葳蕤土瓜根商陸蜀水花鷹屎白防風白芷細辛青木香白附子芎藭杏仁各二兩上為末以雞子白和作挺陰乾石上研取漿水夜塗面旦以水洗之細絹羅如粉佳一方無土瓜根玉容散治面上熱刺䵟𪒟牽牛二兩香白芷川芎藿香甘松藁本各半兩栝蔞根七錢半楮桃兒豬牙皂角各二兩阿膠細辛各二錢半零陵香一兩上為細末每用一錢如洗面藥用早晨晚夕各用一次藿香散治去䵟洗髭藿香葉零陵香皂角檀香沉香各一兩香白芷二兩白丁香黃白膠丁香各七錢龍腦二錢半糯米一升上為細末每日如常使用洗髭發手面百日令光悅澤潤硃砂紅丸子治面色不瑩淨及䵟𪒟面黑皺硃砂白朮白蘞白附子吳白芷白殭蠶木香各半兩鍾乳粉二兩白茯苓密陀僧白芨各二錢半上為細末用阿膠半兩熬成膏子入上項藥末一處就成丸如梧桐子大如常用溫水蜜少許磨化開調塗面上次日早晨用溫湯水洗之甚妙洗面去䵟𪒟主悅白方豬𦚟豆粉四升冬瓜半斤皂莢五梃細辛白朮防風白蘞白芷各二兩商陸三兩上用土瓜根一兩搗絹羅取大豬蹄一具煮令爛作汁和散為餅曝乾再搗為末羅取與洗不過一年悅白一方每夜用少許洗手面令光滑玉容散治面上諸䵟𪒟及滅瘢痕白附子冬瓜子韶腦各二錢半楮桃兒二錢白殭蠶白蘞成煉鍾乳粉各半兩白芨一兩半麝香一錢上為極細末用豆漿調勻稀稠得所臨臥塗患處明旦溫淡漿水洗去白附子膏治皯䵴令面悅澤亦治䵟𪒟白附子青木香丁香各一兩商陸根一兩細辛三兩酥半斤羊脂三兩密陀僧一兩金牙三兩上以酒三升漬一宿煮取一升去滓納酥煎一升膏成夜塗面上旦起溫水洗不得見大風日瘥又先以內酥羊脂煎成膏入金牙密陀僧攪令勻盛不津器中夜臥塗之尤佳一方無丁香治面䵟𪒟令悅白方出聖惠方雄黃一兩半雌黃一兩硃砂珍珠白芨白殭蠶各三兩白茯苓一兩膩粉半兩密陀僧一兩上搗羅為末入研了藥更研令勻細旋取以豬脂面脂等分調攪令勻每先以澡豆將水洗淨拭乾塗之勿衝風向火鍾乳粉散治䵟𪒟去黯子玉女粉白芨各二錢半細辛末輕粉各半錢密陀僧一錢半白附子鍾乳粉白蘞各二錢上同研勻細用孩兒乳汁調塗患處或溫水調亦得臨臥用次日以溫水洗去豬蹄膏治洗面䵟白芷玄豆栝蔞白芨白蘞零陵香藿香鵝梨上用豬蹄一付刮去黑皮切作細片用慢火熬如膏黏用羅子濾過再入鍋中用蜜半盞同梨入藥末一處再熬滴水不散方成以絹濾過臨臥塗面次日漿水洗面沉香膏治面䵟𪒟沉香牛黃薰陸香玉屑各三分丁香水銀各一分雌黃鷹屎各半兩先將三味香搗羅為末次將玉屑牛黃雌黃入乳鉢中研令細方與水銀及諸藥同研令極細入白蜜調和令稀稠得所入瓷瓶中盛每至臨臥時塗面䵟𪒟處兼治䵴皯面蘇合煎治面皯黯蘇合香麝香白附子紫菀蜀水花各二兩青木香三兩雞舌香鸕鷀屎各一兩上先取糯米二斗折炊一斗生用一斗合醇酢用水一斛五斗稍稍澄取汁合得一斛煮並令沸以綿裹諸藥用著沸漿中煎得三升藥熟以澡豆洗皯處令燥以敷皯上日再欲敷藥常以酢漿水洗面然後塗藥塗藥至三四合皯處當小急痛皯處微微剝去便白以漿水洗淨敷玉屑膏訖白粉之若急痛勿怪癢勿搔之但以粉粉上而按抑癢處滿百日可用脂胡粉取瘥茯苓膏治面䵟黯令悅澤光白潤好及手皴豬蹄兩具白粱米一升白茯苓商陸各五兩葳蕤一兩白芷藁本各三兩上羅勻用前藥汁三斗並研杏仁一升合煮一斗五升去滓瓷瓶盛貯內甘松零陵香末各一兩入膏中攪令勻綿冪之每夜取塗手面一方用桃仁一升合煮亦治面皯皰白附丹治男子婦人面生黑瘢點白附子二兩白芨白蘞白茯苓密陀僧石脂定粉各等分上為末先用洗面藥洗淨臨臥用人乳汁如無用牛乳或雞子清調如合就用乳將藥末丸如龍眼大陰乾逐旋用漿水磨開敷之一方無石脂治面上䵟𪒟瘢點方白附子一兩白蘞白芷密陀僧赤茯苓胡粉各半兩上為末每用時先以熱水洗面臨臥時以牛乳和塗之人乳亦可杏仁膏治面䵟𪒟塗之令光白潤澤杏仁雄黃瓜子白芷各一兩上除白蠟外併入乳鉢中研令細入油半斤並藥鍋中以文火煎之候稠凝即入白蠟又煎攪勻納瓷盒中每日先塗藥後敷粉大去䵟𪒟桃仁澡豆主悅澤去䵟𪒟方桃仁一升蕪菁子一兩蓽豆麵二升白朮六合土瓜根七合上搗羅為細散卻以酥漿水洗手面白附子治去面䵟𪒟白附子香附子白檀馬珂紫檀各一兩上為末白蜜和如杏仁大陰乾臨用以水研塗面旦以溫水洗卻忌風油七日面色如蓮花治面多䵟𪒟皮肉粗澀令人不老方硃砂雄黃各三兩水銀霜半兩黃鷹糞一升上胡椒二兩上細研如粉以面脂和淨洗面每夜塗之以手細摩令熱明旦不廢作妝然須五日一洗面塗不過三遍所有惡物一切皆除數倍少嫩慎風日不敷神祕玉容散治面黑䵟𪒟皮皺皴方白附子密陀僧牡蠣白茯苓芎藭各二兩上為末和羖羊乳夜塗面以手摩之旦用漿水洗不過五六度一重皮脫䵟瘥矣一方以酥調敷治面䵟𪒟永除根本方烏雌雞胡粉膩粉英粉鷹糞白各一兩上藥都細研令勻臨臥時淨洗面於手掌內以津唾調塗面上或早晨用亦得塗卻後一日不得洗面不過三五上面色潔白治䵟𪒟烏靨令面潔白方馬珂三兩白附子鷹屎白珊瑚各一兩上研成粉和勻用人乳調每夜取敷面明旦溫漿水洗之桃花圓治面黑䵟令人潔白光悅方桃葉二兩桂心烏喙甘草各一兩上為末丸如大豆許每服十丸日二服十日易形一方有白附子甜瓜杏仁各一兩為七味治面䵟𪒟風刺方苦參一斤赤芍藥冬瓜子各四兩玄參二兩上為末每用一錢用手洗面上治面上有瘢子方大風子膩粉麝香荊芥上為末空心洗面上治面䵟𪒟方雞子二枚胡粉丁香各一兩上先以醋一升浸七日後取雞子白調香粉令勻以漿水洗面敷之佳礬石散治面䵟𪒟白礬石硫黃白附子各六銖上為末以酢一盞漬三日夜淨洗面敷之莫見風日慎三七日可如白雪羊乳膏治面上䵟𪒟內外兼治甘草二兩白羊乳三升羊𦚠二具上相和一宿先以酢將洗面水布拭之夜敷藥兩遍明旦以豬蹄湯洗卻每夜洗之又方桂心蜜石鹽各等分上為末相和夜調塗之治去䵟𪒟方白礬末白丁香鷹粉各等分上為末以唾津調敷羊髓膏治面䵟𪒟塗之令光白潤澤羖羊脛骨髓二兩丹砂半兩雞子白二枚上先將髓並丹砂入乳鉢中研令極細以雞子白調和令勻入盒中盛每用時先以漿水洗面後塗之治黑䵟令人面色好方白殭蠶黑牽牛細辛各等分上為末如澡豆用之洗面又浴小兒胎穢良治面黑䵟𪒟皮皺皴方益母草灰五升落梨灰三升石灰一斗上研細於盆內先著石灰上用紙蓋漸入熱水候濕透石灰於紙上留取水五升將此水煮稀糯米粥拌前件二味灰作球於炭火內燒令通赤取去候冷搗羅為末依前將粥拌更燒如此七遍後更以牛乳拌又燒兩遍然後搗羅為末每夜先洗面了以津唾調少許塗之平旦以熱漿水洗面去斑皺䵟𪒟極妙杏仁膏治面黑皴皺黶黑䵟𪒟渣疱粉刺疵痣黃黑不白光淨凡是面上之病皆主之杏仁雞子白上相和如餅煎麵入夜塗面明旦以米泔洗之一方溫酒洗之治粉滓䵟𪒟方白蘞十二銖白石脂六銖上搗篩以雞子白和夜臥塗面旦以井花水洗卻治䵟𪒟斑及去瘢痕方雲母粉杏仁各等分上細研入銀器中以黃牛乳拌略蒸過夜臥時塗面上旦以漿水洗之治面䵟𪒟方雞子一枚硃砂末一兩上先研硃砂為末入雞子中封固口與雞卵同令雞伏候雞雛出即取塗面效不過五度一方以白雞腹下伏之如前法取用但云雞子令麵皮急而光滑丹砂發紅色也治䵟令人面皮白方鹿角尖乾薑一兩上搗乾薑以和鹿角汁攪使調每夜先以暖漿水洗面軟帛拭乾取上白蜜塗面以手摩使蜜盡不黏手為候然後塗藥平明還以暖漿水洗之二三日顏色驚人塗藥不用過見風日妙尤佳治面皯黯方茯苓白石脂各等分上為末和蜜塗之日三除七黑治面黑䵟𪒟皮皺皴方杏仁一兩膩粉半兩上以雞子白和勻夜用敷面經宿拭去甚妙治䵟𪒟斑點兼去瘢痕方桃花杏花各一升上以東流水浸七日相次洗面三七遍極妙一方加當歸治䵟𪒟斑點方皂莢末半升杏仁半兩上都研令細每夜用唾調塗之治面䵟𪒟內外兼治方上成煉松脂為末溫酒服三合日三服盡三升無不瘥又方出聖惠方上以白附子為末酒和敷之即落一方以水和塗之亦治面皯皰治人面䵟𪒟黑膚色粗陋皮厚狀醜上以羖羊脛骨為末以雞子白和敷之旦以白淨粱米泔洗之日三白如雪治去䵟𪒟方上以白殭蠶為細末先以肥皂洗淨面卻以藥末如洗之良又方上以胡粉黃連二味為末搽之丹砂方治面䵟𪒟塗之令光白潤澤上以丹砂一兩研細入蜜少許更研如膏入盒中盛每至臨臥塗面明旦以漿水洗之一方以水和丹砂末服方寸匕男七日女二七色白如雪益母草塗方治面䵟𪒟令光白潤澤退皴皺上以益母草灰一升以醋和為細團以炭火煅七度後入在乳鉢中研細用蜜和勻入盒中每至晚臥時先以漿水洗面而後塗之大妙又方以草煮湯洗之一方麵湯和酒七遍洗面用之治面䵟黑子方上取李核中仁去皮細研以雞子白和如稀餳塗至晚每以淡漿水洗之後塗胡粉不過五六日有效避風治血䵟面皺靨子令人面潤澤有光上取蕪菁子爛研入常用面脂中良又方上用菾菜子以醋浸之揩面令潤澤有光治面多䵟𪒟或似雀卵色者上用苦酒漬術常以拭之面即漸漸除之治面䵟𪒟黑子方上以雄黃一兩細研入豬脂和每夜塗之效治䵟黯斑方上以密陀僧用乳煎塗面佳兼治㾴鼻皰一方以人乳調塗面每夜用之治面䵟𪒟黑膚色粗陋皮厚狀醜方上用杏仁酒浸皮脫搗碎絹袋盛夜取拭面亦治面皯又方上用酒浸雞子三枚密封四七日成敷面如白雪治面皯黯方上用桃花冬瓜子各等分搗以蜜和敷面治面黑䵟𪒟皮皴方羖羊膽牛膽各一枚上以醋一合和煎二三沸夜臥塗之攀風黃耆膏整容去風黃耆當歸防風檀香栝蔞香白芷各半兩甘松零陵香川芎甘草生乾地黃木香藁本白蘞各一兩赤芍藥杏仁麻油一斤上件藥除油外十六味皆銼碎焙乾入油內慢火熬一伏時去諸藥不用再稱熬若油每一兩入明蠟四錢再於火上化開蠟熬少時用新綿子濾去滓盛於瓷器內熬時不得用銅鐵器須銀石器內熬七香嫩容散去風刺䵟𪒟黑牽牛炒二兩香白芷零陵香甘松栝蔞根各二兩茶子四兩皂角末四兩上件為細末如常用之藁本散治面多䵟𪒟風刺藁本黑牽牛黑豆小盞皂角上為細末如澡豆常用之石菖蒲散治面上䵟𪒟風刺瘡靨石菖蒲甘草白茯苓淡豆豉皂角上各等分為末臥時先以皂角洗面揩拭令極干用雞子清汁塗面上至來早將此藥澡豆洗之五倍子膏治面上風刺䵟𪒟漏蘆五倍子黃柏各一兩上為細末臨臥蜜調塗如小赤瘡即以面油調敷瑩肌如玉散治有䵟𪒟及粉刺之類並去垢膩潤澤肌膚皂角三斤糯米一升六合緑豆楮實子白芨白丁香縮砂升麻各半兩甘松七錢三賴子三錢上同為細末如糯米緑豆粉末及皂角末一處攪拌勻用之甚效去䵟𪒟出本草以山菰菰根搗塗面上去面䵟出本草以孝子衫襟燒灰敷之治面䵟出本草以小萍子是溝渠間者為末敷之去面䵟以橡斗子中仁碎為粉和大豆澡面良面皯皰附論夫面皯皰者生渣疱細起如粟谷狀由風熱相搏而生蓋諸陽在於頭面風熱乘之結而不散故成皯皰養生方說醉不可露臥及飲酒熱未解冷水洗面令人發麵瘡輕為渣疱是也方五香散治皯皰黶黯黑暈赤氣令人白光潤方黃耆白茯苓葳蕤杜若商陸大豆黃卷各二兩白芷當歸白附子冬瓜仁杜蘅白殭蠶辛夷仁香附子丁子香蜀水花旋覆花防風木蘭芎藭藁本皂莢白膠杏仁天門冬土瓜根白朮梅肉酸漿水萍各二兩蓽豆豬𦚠二具上治下篩取洗面二十七日白一年與衆別王屑膏治面皯皰玉屑珊瑚木蘭皮辛夷各一兩半白附子芎藭白芷各一兩冬瓜子仁四兩桃仁半斤商陸半斤牛脂二兩豬脂四兩白狗脂一斤上除玉屑珊瑚及諸般脂外並細銼先於銀鍋中以文火銷諸般脂令熔後下諸藥同煎三上三下令白芷色黃為度濾去滓下玉屑珊瑚末攪令勻於瓷器中盛每夜塗面神效治面皯方雄黃雌黃光明砂密陀僧珍珠峭粉白殭蠶白芨茯苓水銀上研和令勻少減取和豬脂面脂攪令調每夜用澡豆漿水洗去勿衝風火又方以李子仁和雞子白塗則落麝香膏治面皯皰令光白麝香附子當歸芎藭細辛杜蘅白芷芍藥各一兩豬脂一斤上先將豬脂入鍋中化成油余並銼如小麥大入脂油中以文火煎稀稠得所濾去滓麝香攪令勻傾入瓷盒中收每塗藥先以漿水洗面治面皯方芍藥茯苓杏仁防風細辛白芷各一兩白蜜一合上為散先以水銀霜敷面三日始取前件白蜜以和散藥每至夜中敷之不得向風日向曉任意作粉常用妙每夜先以漿水洗面後敷之枸杞子散治面皰敷面枸杞子白茯苓杏仁防風細辛白芷各一兩上為細散先以膩粉敷面三日即以白蜜一合和散藥夜臥時先用漿水洗面了敷之不得見風日能常用大佳治面上雀子斑及皯皰方白蘞生礬石白石脂杏仁上研和雞子白夜臥塗面上旦用井花水洗之治面皯皰令人悅白方栝蔞子白石子雀屎麝香上搗篩別研麝香雀屎白石脂和合取生菟絲苗汁和之如薄泥先用澡豆洗去面上垢膩次以藥塗皯上日夜三四度平旦溫漿水洗之亦治面黑斑駁冬葵子散治面皯皰令光白少年氣血盛面皰甚者冬葵子柏子仁白茯苓冬瓜子上搗細為散每服二錢匕溫酒調下食後臨臥時服之礬石散治面皯皰令光白礬石白石脂白蘞杏仁上併為散以雞子白調令勻入瓷盒中盛臨臥時先用漿水洗面後塗藥明旦以井水洗之白蘞亦作白藍黃連散治面皯皰令光白黃連木蘭皮大豬肚上將二味搗羅為末納豬肚中縫合口入五斗米瓶內蒸熟取出細切曝乾搗羅為末每服二錢溫水調空心臨臥服麻黃散治面皯皰麻黃甘草杏仁各三兩上搗篩酒下一錢日三服羊乳膏治面皯羊膽膏治面皯皰及産婦黑疱如雀卵色羊膽豬脂三合細辛三分上相和煎成膏每夜塗面旦以漿水洗之亦治令麵皮光澤治面皯皰方黃連三兩蛇床子四合上搗末以面脂和塗面日再瘥治面皯皰及産婦黑疱如雀卵色桃花冬瓜仁各一兩上搗為末以蜜調敷之治面皯如雀卵色以羖羊膽一枚酒二升煮三沸塗之日三度瘥浮水膏治面皯皰令光白用水萍曝乾五兩搗羅為末以蜜調和稀稠得所入瓷盒中盛每臥時塗面本草按浮萍淪之亦可飲少許汁良治少年面上起細疱治面皯皰及産婦黑疱如雀卵色䵟𪒟斑方用白茯苓末蜜和敷之治面皯用桂心生薑末蜜和敷之治面皯皰及産婦黑疱如雀卵色用七月七日取露蜂子於漆碗中以少酒漬取汁重濾過以明粉相和塗之治面皰方生地三斤枸杞根一十斤上先搗枸杞次搗地黃曝乾合篩空心酒服方寸匕日三久服顏如童子此祕方也治男女疱面生瘡方黃連二兩牡蠣三兩上搗羅以粉瘡上頻敷之即瘥一方以水和如泥敷之妙治面上疱子方水銀臘月豬脂各一兩上相和熟研令水銀星盡向夜塗之平明拭淨三四度瘥又方鷹糞白半兩胡粉一分上細研以蜜和敷面上治少年面上起細疱方雞子二枚好酒一升上瓷瓶子內盛密封頭候七日取出雞子去殼每夜塗面上旦以溫漿洗之治面及鼻病渣疱木蘭皮一斤梔子仁一斤上搗散食前以漿水服方寸匕日三良一方食後用蜜湯下治面渣疱方用鸕鷀屎一升為末以臘月豬脂和勻夜敷之亦治䵟𪒟治面皯皰年少氣盛用麋脂塗拭面上日再塗之瘥治面上疱子方用川大黃末以水調每夜塗之木蘭膏治面渣疱木蘭皮防風白芷辛夷木香牛膝獨活藁本芍藥白附子杜蘅當歸細辛芎藭麝香臘月豬脂二斤上除麝香豬脂外並銼碎先將豬脂入鍋中令銷下諸銼藥以文火煎三上三下候白芷塊子黃色膏成用新綿濾去滓入麝香攪勻稀稠得所瓷盒盛每臨臥時先以溫漿水洗面後塗膏日三次白芷膏治面渣疱白芷白附子各三分芎藭防風半兩丁香白蕪荑木蘭皮細辛藁本零陵香松花麝香各一兩分熊脂三斤上除麝香熊脂外並銼碎入淨器中以酒二升浸一宿先將熊脂入銅鐺中化令銷次下酒中諸藥以文火煎之三上三下候白芷黃色膏成用新綿濾去滓入麝香攪勻稀稠得所瓷盒盛每臨臥時先以澡豆溫漿水洗面後塗膏大效防風散治肺臟風毒及過飲成渣疱防風一兩石膏三兩小荊子梔子仁薺苨枸杞子白蒺藜各一兩甘草半兩上為細末每服二錢溫水調下食後二服杏仁膏治面渣疱杏仁研一兩硫黃研一分密陀僧研半兩硇砂研一錢白鵝脂二兩上除鵝脂外再同研如粉入鵝脂油更研令勻傾入瓷盒子坐煻灰火中養之攪令稀稠得所成膏每臨臥以紙拭疱令乾塗之治猝得面皰方土瓜根水銀胡粉青羊脂等一分上為粉和敷面疱旦以漿水洗之極妙白附子散治面靤癢腫白附子青木香由跋各二兩麝香三分上為散以水和塗面一方用細辛二兩尤佳白膏治面渣疱疥癰惡瘡附子十五枚蜀椒一升野葛一尺五寸上羅勻以酢漬一宿豬膏一斤煎令附子色黃去滓塗日三治面皰及黑方醇酒三升牛膽羖羊膽各一具上合煮三五沸敷之治面上渣靤皯黯䵴方蒺藜子梔子仁各一斤上搗合如泥以醶漿和如泥臨臥以塗面上日未出便洗瘥雄黃散治面上生細疱瘡方雄黃峭粉水銀各等分上以臘月豬脂和以敷靤上瘥止治年少氣盛面生疱瘡方薺苨肉桂各二兩上為末以酢漿服方寸匕日一服亦治䵟𪒟及滅瘢去黑痣治面渣疱皯𪒟方用木蘭皮一斤以三年酢漬令浸百日曝乾為末溫酒服早午晚日三次以漿水服之又以為末敷之治滅瘢治面皯皰及産婦黑疱如雀卵色上以雞卵醋浸令壞敷面皯後以漿水洗之治面皯一名杏仁膏治面皯黯令悅白潤好及手一名茯苓膏治䵴皯面一名治白䵟𪒟方白附子膏方見面䵟𪒟類治面皯皰令悅白潤好及治手皺方治少年面上起細疱挼浮萍拓之亦可飲少許汁良治面黑皯出本草以冬瓜藤燒灰洗之治面皯出本草以干肺炙食之治面白皯瘢出本草以續隨葉汁敷之又莖中白汁剝人面去䵟𪒟甚效麵粉渣附論夫面渣者是粉刺也面上有渣如米粒此由膚腠受於風邪搏於津脈之氣因虛而作亦云敷之胡散入虛肌使之然也方治粉刺面生䵟䵴方黃耆白朮白蘞葳蕤各二兩半商陸鸕鷀糞鷹糞各一兩防風芎藭白芷細辛各一兩半木香一兩白附子杏仁各一兩半上為末以雞子白都和作梃子曝乾以漿水研塗面夜敷朝洗之妙治面上粉刺悅澤容顏方硫黃密陀僧乳香膩粉白殭蠶杏仁各等分上同研如粉以牛酥調稀稠得所暖漿水洗面了拭乾塗之勿使皂角三五度瘥治面上粉刺及面瘡方黃連粳米赤豆各五分吳茱萸一分胡粉水銀各六分上搗黃連等下篩先於掌中研水銀使極細和藥使相入以生麻油總稀稠得所洗瘡拭乾敷之但是瘡即療神驗一方無胡粉赤膏治婦人面粉渣光明砂四分麝香二分牛黃半分水銀四分雄黃三分上研如粉面脂一升納藥中和攪令勻如敷面脂法香漿水洗塗藥避風經宿粉渣如蔓荊子狀自落大效防風散治面上風刺粉刺防風輕粉荊芥各二三分密陀僧乳香各一錢上為細末每夜遇晚用藥一錢塗面上以乳汁調敷之次日空心再用鹽荊芥湯洗之治面上瘢跡一切風刺粉刺雀斑方白附子密陀僧白茯苓白芷胡粉各等分上為細末以羊汁調塗敷至天明漿水洗面不過五七次亦治風瘡治面上粉刺及黑䵟方硃砂雄黃密陀僧各一兩麝香半兩粉霜半兩上研細用面脂調夜臥時勻以塗面至明以溫漿水洗之肥皂丸治男子婦人風刺粉刺雀斑面上細瘡南星朴硝各半兩巴豆七枚白梅肉一兩上為細末和勻將肥皂一個酌量大小入藥在肥皂內麻線扎定濕紙煨香熟取出入消風散一貼爛搗成膏丸如彈子大每日用之洗欲入諸香隨意加之治風刺粉刺瘡麻子風黑䵟等疾方殭蠶白附子白芷藁本各一兩上為末如常面藥洗之五參圓治去酒刺面瘡人參丹參各一錢苦參沙參玄參各一兩上為末用胡桃仁五錢重杵碎為丸如梧桐子大每服三十丸茶湯送下日進三服食後服紅膏治面上粉刺硃砂一兩麝香牛黃各半兩雄黃三分上細研令勻以面脂和為膏勻敷面上避風經宿粉刺自落白蘞膏治麵粉渣白蘞白石脂杏仁各半兩上為末更研極細雞子白調和稀稠得所瓷盒盛每臨臥塗面上明旦以井花水洗之良療面及鼻酒渣方出肘後方珍珠胡粉水銀各等分上豬脂和塗又鸕鷀屎和臘月豬脂塗亦大驗神效敷面旦起以水洗之治粉刺方出百一選方雄黃硫黃蛇床子各等分上為細末臨睡時洗面了用真酥一匙塗之治婦人面上粉刺方滑石半兩黃蠟一錢巴豆五個上各為細末每用少許如常法洗面治婦人頰上瘡瘥後每年不發黃礬石二兩胡粉一兩水銀一兩半上搗篩先以片許豬脂於瓷器內熟研水銀令銷盡更加豬脂並礬石胡粉使黏稠洗面瘡以塗上又別熬胡粉令黃塗膏訖則以粉數日即瘥治猝病餘面如米粉方白蘞杏仁半分雞矢白一分上搗下以蜜和之雜水以揩面良丹砂散治面渣如麻子丹砂桃花各五兩先將桃花研令如膏次入砂同研極細每服一錢空心井水調下日三服十日至二十日太白小便當出黑汁萱草膏治麵粉渣痞癗萱草花曝乾七兩白蜜二兩上搗羅萱草花極細與蜜調研令勻入瓷盒俟每旦洗面後多少塗面上石粟膏治麵粉渣痞癗如麻子石灰二兩粟米二兩上將灰羅細同粟米納瓶中以水浸經三日取出如膏曝乾重研如粉以面脂調勻入瓷盒中盛每洗面訖拭塗之治面皯及粉渣上三年大酢二升漬雞子五枚七日雞子當軟如泥去酢瀉著瓷器中以胡粉兩雞子許和研如膏蓋口蒸之於五斗米下熟藥成封之勿泄氣夜欲臥時研塗面靤粉刺上旦以漿水洗面每日如此百日瘥勿見風效亦治粉刺及䵟治面及鼻病酒渣方用馬蘭子花杵敷之佳治麵粉滓方上熬礬石以清酒和敷之不過三上一方熬汁盡為末酒塗之亦治猝病餘面如米粉又去粉刺又方出聖惠方用生菟絲苗搗汁塗不過三上一方菟絲子汁玉女粉治面上風刺粉刺面䵟黑白斑駁用益母草不拘多少銼搗曬乾燒灰湯和燒數次與粉相似每用以乳汁調先刮破風刺後敷藥上一方洗面用之又以醋漿水和燒通赤如此五次細研夜臥時如粉塗之治大粉痣方出海上方用黑牽牛為末對入面藥中洗面能去粉痣治粉刺方用茺蔚子燒益母灰為末以麵湯溲燒之洗面遍治面上風刺亦制硫黃極妙又方以糵米末共米醋和敷亦使皮膚澤為熱不及麥糵也又方以蜂子取其未成頭足時炒食之又酒漬以敷面令面悅白治去酒刺面瘡用蜜一兩白丁香一十粒浸在蜜里早晨夜晚點在面上酒刺自落治鼻㾴贅子及面上雀兒斑黃丹硇砂巴豆餅藥各三錢上為末入生礦石灰末一匕雞子清調勻酒㾴用鵝翎刷上雀兒斑竹針刺破挑藥點之才覺痛微腫可洗治粉刺䵟黑白斑駁上羖羊膽五枚取汁以好酒一升相和煎令稠以塗面上日三度土瓜膏治麵粉渣痞癗用土瓜根二兩搗為細散以漿水和研成膏入瓷盒中盛每臨臥以漿水洗面後少許治婦人粉刺面上黑子上以黑牽牛不拘多少以童子小便浸令軟爛研極細先以生薑自然汁塗患處卻以藥塗之詰旦用溫酒洗淨甚者不過三效面體疣目附論夫風邪入於經絡血氣凝滯肌肉弗澤發為疣目或在頭面或在手足或布於四體其狀如豆如結筋綴連數十鼠乳相類故謂之疣目方治一切疣贅瘢靨方風化石灰粉爐炭灰桑柴灰各一錢砒霜硇砂各一分黃礬半分上將砒霜等三味研令極細入前膏內調勻用布揩破塗之似有白痂即以新羅松子油調塗之治疣目及痣等方桑柴灰四升附子兩棵硇砂一分糯米五十粒上搗為末入煎內調令勻每取少許點疣目上即自落兼破一切腫毒要作頭者當上用此藥腫毒即破也治面及身上生疣目方膩粉一兩巴豆一枚上細研以針輕撥破疣目上點之成瘡自落後用黃連末敷之便乾治去疣目方松脂柏脂上等分合和塗之一宿失矣兼治疵痣治面及身上生疣目方用蠟紙一片炙令熱上以硫黃末少許摻令勻緊卷以火燒點疣目上待有沸聲便撥卻已去根也治疣目及痣靨子方用糯米五十粒於濕石灰里埋之以米爛為度用針撥破疣目敷之經宿自落亦治靨子治去疣目方出聖濟總録用豬脂於癢處揩之令少出血即瘥神驗不加又方出聖惠方用灰二兩以苦酒漬七日滴汁點疣目上即落作小瘡子即瘥亦治疵痣又方出聖濟總録用牛口中涎數塗疣目上自落亦治疵痣又方出聖濟總録用艾作炷於疣目上灸之三壯即除又方以鹽塗疣上令牛舐之不過三度又方以屋溜下水塗之效或云以墨塗之不過三度又方以朔藋赤子挼使壞疣目上亦令塗之又方出聖惠方以蜘蛛網絲繞纏之自落良一方棘叢間花蜘蛛絲尤良又方以石硫黃掃疣目上六七遍除以醋調塗即瘥亦治疵痣又方七月十五日正中時望中以禿條帚掃疣目上三七遍瘥又方取月盡日平旦井花水月生一日煮作湯灶突北面南自洗咒曰日盡水月初湯灶突北千疣死百疣亡凡七度洗及咒甚良妙又方用布紙一張於床下即以筆點疣下還點紙一干無問多少皆一一點每點即咒曰紙亦散點一遍訖乃深埋點紙於屋漏下久當疣散又方月晦日夜於廁前取故草二七莖別二七過粉疣目上訖咒曰今日月晦疣驚或明日朝乃棄勿反觀之又方取亡人枕若席物拭之亡人近彌易去也又方取七月七日以大豆一合拭疣目上三過訖使病疣目人種豆著南向屋東頭第二霤中豆生四葉以熱湯沃殺疣目便失又方上盜取一酘酒醅以摩疣目上咒曰疣疣不知羞一酘酒醅洗你頭急急如令咒滿七遍即自愈又方用杏仁二十枚燒令黑研如膏塗疣目上治疣目耳瘑瘡出本草以烏雞膽日三敷銷黑痣疣贅出本草取浣衣黃灰蒿藜荻三種灰火水蒸以點之即去不可廣用爛人皮肉桑薪灰功勝浣衣黃灰及炭灰治人面卒得赤黑丹如疥狀不急治遍身即死用燒鹿角末豬膏和塗之療面目身猝得赤斑或癢或瘭子腫起不即治之甚殺人以羖羊角燒為灰研令極細以雞子清和塗之極神驗無雞子和塗之甚妙治面目猝得赤黑丹如疥狀不急治遍身即死若白丹者方取白瓷瓦末豬脂和塗之靨痣附論夫黑痣者蓋風邪搏於血氣變化所生也夫人血氣充盛則皮膚潤悅不生疵瑕若損則生點痣然黑痣者是風邪變其血氣所生也若生而有之者非藥可治也凡面及體生黑點謂之黑痣亦云黑子也傷其上皮令裁破以藥點之此名三灰煎方灰煎治疣贅瘢痕疵痣及癰疽惡病等石灰一斗五升溫桑灰四斗柞櫟灰四斗上合九斗五升以沸湯令浥浥調濕納甑中蒸之從平旦至日中還取釜中沸湯七斗就甑三淋之澄清納銅器中煎令至夜斟量餘五鬥汁微火徐徐煎取一升洗亂髮干之如雞子大納汁中即消盡又取五色彩剪如韭葉大量五寸著藥中亦消盡又令不強藥成以白罌子貯之煎時不令婦人小兒雞犬見亦治其諸瘤其血瘤附左右胡脈及懸癰舌本險處可不令消消即血出不止殺人宜詳慎之治出黑子方大丁香剛子各等分上以研塗黑處神手膏治專去痣石灰一兩斑蝥七個上蘸苦竹麻油少許卻和勻石灰揭調然後入釅醋少許攪和不拘多少先用刀剔破痣入藥於內塗之糯米膏出靨子石灰木炭灰三錢上件稱勻以水少許調令稀稠得所瓷甑內盛以竹篦子攤平然後揀好糯米二十粒每粒立種之如蓮蓬樣每粒插一半在灰內以好紙遮蓋盞口無令透氣候四五日取起一二粒著在灰內者若化作粥漿可用如未便候一二日如取靨子先洗淨過以竹針削作針燈上燎過其尖稍利先輕手於靨周圍略撥動即以竹針輕批糯米漿汁勻布撥動處靨上不用須臾微赤不痛不作膿三數日即作痂勿剝任其自落不作瘢痕其靨自除治出靨方用蕎麥秸一擔不爛者燒灰存性入石灰半斤同灰一齊過冷火滅然後以熱水淋灰淋下灰水用鐵器內煮以漆匙攪成膏子於靨上點出或先以草莖刺破亦可七白丸治面上靨色並雀斑白附子白芨白蘞白芷白殭蠶白茯苓白朮各等分上為末以雞子清調作錠子陰乾每用漿水摩敷面上以時換敷七日見效加密陀僧治面上黑痣及贅方雄黃硫黃珍珠末白礬蘭茹藜蘆各半兩巴豆三枚上為末都研令勻以黑漆和合如膏於上點之當成瘡自落及去面䵟皮中紫點其不奈漆人用雞子白和塗之良治赤疵及黑痣去靨穢乾漆一兩巴豆三枚炭灰雄黃雌黃白礬各一兩上為末都研令勻以黑漆和合如膏於上點之當瘡自落及去面䵟皮中紫點其不耐漆人用雞子白和塗之良五灰煎治黑子去疣贅石灰朔藋灰桑灰炭灰菌灰各一升上以水溲蒸令氣匝仍取釜中沸淋取清汁五升許於銅器中東向灶煎之不得令雞犬小兒女子穢惡人見膏成凝強細砂糖即堪用量以點之治去痣方糯米一百粒石灰巴豆三粒餅藥少許上入瓷瓶同窨三日以竹籤挑粟米許點痣自然蝕落亦治去瘢治點痣方硇砂石灰斑蝥巴豆各等分上用餅藥調每用粟米大點上治黑子及贅方生藜灰五升生桑灰五升石灰三升半上合和令調蒸之令溜取甑下湯一斗從上淋之盡湯取汁於鐵器中煎減半更閒火煎以雞羽搖中即然斷藥成欲去黑子疣贅先小用石灰桑灰淋汁熬成膏草莖刺破點新水沃之及油膩等物治面靨方先以草梃掐斷於靨上劃破微有血出銅緑細末貼之三日不洗面瘡痂起自然無了如厚靨或青靨須再起一遍方盡無瘢痕治黑痣生於身面上用藜蘆灰五兩水一碗淋灰汁於銅器中盛以重湯煮令如黑膏以針微撥破痣處點之者不過兩次神驗治黯點方用桑灰艾灰各三升以水三升淋之重淋三遍以五色帛納汁中合煎令可丸以敷黯上則爛脫乃以膏塗之兼治疣目甚妙治點痣藥用鹼入水熬數沸下好灰調如粥相似入瓷器內上鋪白連紙一層用糯米五十粒頓於紙上用物合了放在暖處次日看米如膏點痣用針撥破點上米膏治點靨子方取落梨灰少許淋取灰汁於銅器中重湯煎如黑錫以針微撥破靨子令藥得發動點之大者不過一點治黑子去疣贅方用續隨子熟時壞破之以塗其上便落神效灰煎治疣贅黑疵痣靨穢瘡疽息肉結瘤用炭灰三升湯拌令濕徹以熟湯漬令半日後則還之淋之稍點湯不得太速下即灰汁不驗候汁下得二三升即納一小鐺中煎一兩沸即別取一大兩風化石灰為佳恐中濕者須熬令極熱納灰汁中和煎以杖箄攪之勿住手候如煎餅面少許細細取成膏急瀉著一瓷器中攪令冷不然須臾乾燥不堪用常候此煎十分有一分堪久停但有傷損肉色須臾變赤黑色痛如火燒狀如灸瘢發時即肉病凹為效後經二十餘日病自然脫落無瘢痕欲衝風冷遠行貼烏膏亦神效痂亦易落瘡未瘥間忌小豆姜縱有瘢亦不凸出烏膏極妙治赤痣用黑大蒜和䱉血塗之治去痣靨小瘤子方用石灰化鹼各等分為細末先以針挑破卻用水調藥點上些小在患處三日三上即去如無滅用麥杆灰灶灰淋水同石灰調依前用一方天色冷溫用治去靨子方亦治血䵟面皺用蔓荊子研末入面脂中及去皺治去痣靨用石灰炭灰上熬令熱放糯米於灰上候米化即用米點之美容膏治遍滿頭面大小諸靨子或遍身體者料炭灰桑柴灰蕎麥蘸灰各半兩上灰用熱湯淋取一升熬至五分又用獨角仙一個紅娘子半錢糯米四十九粒石灰一兩上為末將前項灰調汁如麵糊相似在瓷盒內土底埋五七日取出使用取瘢痕靨內刺破用細竹籤子點之放藥用濕紙搽藥再點至三上見瘢痕時令水淋洗忌姜醋無肉之物如聖膏出楊氏方黑豆梗灰蕎麥秸灰茄梗灰桑柴灰礦灰炭灰上件各等分為末水三碗淋取汁將淋下再淋兩次慢火熬膏每用少許針刺破靨子敷之治去面上靨子黑痣方上夜以暖漿水洗面以生布揩靨子令痛水研白栴檀香取濃汁塗靨子上旦復以暖漿水洗之次以鷹屎白敷其上亦治黑子治黑靨子及紋刺用石灰水調一盞如稠粥揀好糯米粒全者半置灰中半灰外經宿灰中米色變如水精若人手面上有黑靨子及紋刺先微以針頭撥動置少許如水精者於其上經半許靨汁自出剔去藥不用但不得著水三二日愈治疣痣黑子出本草以諸灰雜石灰熬煎以點之治痣子方出本草用苦菜折之取白乳之出常點痣子自落治黑痣面䵟潤毛用大豆黃卷一升炒令香為末空心暖酒下一匙大豆黃卷者乃黑豆芽也
