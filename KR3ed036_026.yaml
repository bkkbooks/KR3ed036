body:
  text: 卷二十六肺臟門總論夫肺主魄魄臟者任物之精也為上將軍使在上行所以肺為五臟之華蓋並精出入謂之魄魄者肺之藏也鼻者肺之官肺氣通於鼻鼻和則能知香臭矣循環紫宮上出於頰候於鼻下而下覆乎諸臟榮華於發外主氣內主胸與乳相當左乳庚右乳辛肺重三斤三兩六葉兩耳凡八葉有十四童子七女子守之神名鴻主藏魄號為魄臟隨節應會故云肺臟氣氣舍魄在氣為咳在液為涕肺氣虛則鼻息利少氣實則喘喝胸憑仰息肺氣虛則夢見白物見人斬血藉藉得其時則夢見兵戰肺氣盛則夢恐懼哭泣厥氣客於肺則夢飛揚見金鐵之器奇物凡肺臟象金與大腸合為腑其經手太陰與陽明為表裡其脈浮相於季夏王於秋秋時萬物之所終宿葉落柯萋萋枝條其兀然獨在其脈為微浮衛氣遲榮氣數數則在上遲則在下故名曰毛陽當陷而不陷陰當升而不升為邪所中陽中邪則卷陰中邪則緊卷則惡寒緊則為慄寒慄相博故名曰瘧弱則發熱浮乃來出旦中旦發暮中暮發臟有遠近脈有遲疾周有度數行有漏刻遲在上傷毛採數在下傷下焦中焦有惡則見有善則匿陽氣下陷陰氣則溫陽反在下陰反在巔故名曰長而且留秋脈如浮秋脈肺也西方金也萬物之所以收成也故其氣來輕虛而浮來急去散故曰浮反此者病何如而反其氣來毛而中央堅兩傍虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人氣逆而背痛慍慍然不及則令人喘呼吸少氣而咳上氣見血下聞病音凡肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本肺脈來不上不下如循雞羽曰肺病肺脈來如物之浮如風吹毛曰肺死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病肺藏氣氣舍魄喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏手太陰氣絕則皮毛焦太陰者行氣溫皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷者則爪枯毛折毛折者則氣先死丙篤丁死火勝金也肺死臟浮之虛按之弱如蔥葉下無根者死秋金肺旺其脈微澀而短曰平反得大而緩者是脾之乘肺母之歸子為虛邪雖病易治反得沉濡而滑者是腎之乘肺子之乘母為實邪雖病自愈反得浮大而洪者是心之乘肺火之剋金為賊邪大逆十死不治反得弦細而長者是肝之乘肺木之陵金為微邪雖病則瘥肝乘肺必作虛右手關前寸口陰絕者無肺脈也苦短氣咳逆喉中塞噫逆刺手陽明治陽右手關前寸口陰實者肺實也苦少氣胸中滿膨膨與肩相引刺手太陰治陰肺脈來泛泛輕如微風吹鳥背上毛再至曰平三至曰離經病四至脫精五至死六至命盡手太陰脈也肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血痛引腰背胸若鼻息肉不通緩甚為多汗微緩為痿漏風頭以下汗出不可止大甚為脛腫微大為肺痹引胸背起腰內小甚為飧泄微小為消痹滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸肢腋之間下不勝其上其能喜酸肺脈搏堅而長當病唾血其濡而散者當病漏汗至今不復散發白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也黃帝問曰經脈十二而手太陰之脈獨動不休何也手太陰在寸口中岐伯對曰足陽明胃脈也胃者五臟六腑之海胃脈在足趺上大趾間上行三寸骨解中是其精氣上注於肺肺氣從太陰而行之其行之也以息往來故人一呼脈再動一吸脈亦再動呼吸不已脈動不止黃帝問曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑胃居其大五味入於口藏於胃以養五臟氣氣口者太陰是也臟腑之氣味皆出於胃變見於氣口氣口屬腑臟主即呼寸口者也扁鵲曰肺有病則鼻口張實熱則喘逆胸憑仰息其陽氣壯則夢恐懼等虛寒則咳息下利少氣其陰氣壯則夢涉水等肺在聲為哭在變動為咳在志為憂憂傷肺精氣並於肺則悲味主秋結滿而血者病在胸及以飲食不節得病者取之合故命曰味主合病先發於肺喘咳三日之肝脅痛支滿一日之脾閉塞不通身痛體重五日之胃腹脹十日不已死冬日入夏日出病在肺下晡慧日中甚夜半靜假令肺病南行若食馬肉及獐肉得之不者當以夏時發得病以丙丁日也宜服赤藥凡肺病之狀必喘咳逆氣肩息背痛汗出尻陰股膝攣髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經手太陰足太陽之外厥陰內少陰血者肺脈沉之而數浮之而喘苦洗洗寒熱腹滿腸中熱小便赤肩背痛從腰以上汗出得之房內汗出當風肺病其色白身體但寒無熱時時咳其脈微遲為可治宜服五味子大補肺湯瀉肺散春當刺少商夏刺魚際皆瀉之季夏刺太淵秋刺經渠冬刺尺澤皆補之又當灸膻中百壯背第三椎二十五壯邪在肺則皮膚痛發寒熱上氣氣喘汗出咳動肩背取之膺中外腧背第三椎之旁以手痛按之快然乃刺之取之缺盆中以越之形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行肺傷其人勞倦則咳唾血其脈細緊浮數皆吐血此為躁擾嗔怒得上肺傷氣壅所致也肺中風者口燥而喘身運而重冒而腫脹肺中寒者其人唾濁涕肺水者其人身體腫而小便難時時大便鴨溏肺脹者虛而滿喘咳目如脫狀其脈浮大趺陽脈浮緩少陽脈微緊微為血虛緊為微寒此為鼠乳診得肺積脈浮而手按之辟易脅下時時痛逆背相引痛少氣善忘目瞑結癰皮膚寒秋愈夏劇主皮中時痛如蝨緣之狀甚者如針刺之狀時癢色白也肺病身當有熱咳嗽短氣吐出膿血其脈當短澀今反浮大其色當白而反赤者此是火之剋金為大逆十死不治商音人者主肺聲也肺聲哭其音磬其志藥其經手太陰厥逆陽明則榮衛不通陰陽反祚陽氣內系陰氣外傷傷則寒寒則虛則厲風所中噓吸戰掉語聲嘶塞而散下氣息短憊四肢僻弱面色青白遺失便利甚則不可治依源麻黃續命湯主之又言音喘急短氣好唾此為火剋金陽系陰陰氣沉陽氣升升則實實則熱熱則狂狂則閉眼悸言非常所說口赤而張飲無時度此熱傷肺肺化為血不治若面赤而鼻不欹可治也白為肺肺合皮白如豕膏者吉肺主鼻鼻是肺之餘其人金形相比於上商白色小頭方面小肩背小腹小手足發動身輕精瘦急心靜悍性喜為吏耐秋冬不耐春夏春夏感而生病主手太陰廉廉然肩膺厚薄正疏則肺應之正白色小理者則肺小小則少飲不病喘喝粗理者則肺大大則虛虛則寒喘鳴多飲善病胸喉痹逆氣巨肩反膺陷喉者則肺高高則實實則熱上氣肩急咳逆合腋張脅者則肺下下則逼賁迫肝善脅下痛鼻寒或壅而涕生息肉好肩背厚者則肺堅堅則不病咳上氣肩背薄者則肺脆脆則易傷於熱喘息鼻衄肩膺好者則肺端正端正則和利難傷膺偏敧者則肺偏傾偏傾則病胸偏痛鼻亦偏疾凡人分部陷起者必有病生大腸陽明為肺之部而藏氣通於內外部亦隨而應之沉濁為內浮清為外若外病內入則所部起內病里出則所部陷外入前治陽後治陰內出前治陰後治陽實瀉虛補陽主外陰主內凡人死生休否則藏神前變形於外人肺前病鼻則為之孔開焦枯若肺前死鼻則為之梁折孔閉青黑色若天中等分墓色應之必死不治看色深淺斟酌賒促遠不出一年促不延時月肺疾少愈而卒死何以知之曰赤黑如拇指黶點見顏頰上此必卒死肺絕三日死何以知之口張但氣出而不還面白目青是謂亂經飲酒當風風入肺經膽氣妄泄目則為青雖有天救不可復生面黃目白如枯骨死吉凶之色在於分部順順面見赤白入鼻必病不出其年若年上不應三年之中禍必應也秋金肺脈色白主手太陰脈也秋取經腧秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體陰氣未勝未能深入故取腧以瀉陰邪取合以虛陽邪陽氣始衰故取於合其脈本在寸口之中掌後兩筋間二寸中應在腋下動脈其脈根於太倉太倉在臍上三寸一分是也秋三月者主肺大腸白氣貍病也其源從太陽系手太陰太陰受淫邪之氣則經絡壅滯毛皮緊豎發泄邪生則臟腑傷溫隨秋受厲其病相反若腑虛則為陰邪所傷乍寒乍熱損肺傷氣暴咳嘔逆若臟實則為陽毒所損體熱生班氣喘引飲故曰白氣貍病也扁鵲云灸心肺二俞主治丹毒白貍病當依源為療調其陽理其陰則臟腑之病不生矣夫六極者天氣通於肺地氣通於嗌風氣應於肝雷氣動於心穀氣感於脾谷素問作谷雨氣潤於腎六經為川腸胃為海九竅為水注之氣所以竅應於五臟五臟邪傷則六腑生極故曰五臟六極也肺實附論夫右手寸口以前脈陰實者手太陰經也蓋肺實則生熱熱則陽氣盛病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔狀胸中滿膨膨與肩相引名曰肺實熱也扁鵲云肺實熱則喘逆胸憑仰息咽中不利手太陰經為熱氣所加故為肺實之病甚則口赤鼻張引飲無度與背生瘡以至股陰膝腨脛皆痛右手寸口氣口以前脈陰陽俱實者手太陰與陽經俱實也病苦頭痛目眩驚狂喉痹痛手臂卷唇吻不收肺與大腸俱實也方煮散方治肺與大腸俱實令人氣憑滿茯苓麻黃各六錢黃耆大青桂心各三錢細辛杏仁各五錢石膏二兩丹參半兩五味子甘草貝母橘皮芎藭各一兩枳實二枚上為散帛包裹以井花水一升五合煮取七合為一服日再瀉肺散治酒客勞倦或汗出當風喜怒氣舍於肺面目黃腫起即頭眩咳逆上氣時忽忽欲絕心下弦急不能飲食或唾膿血胸痛引背支滿欲嘔五味子百部各二兩半茯苓附子蓯蓉當歸石斛遠志續斷各一兩細辛甘草各七分防風蜀椒紫菀桂心款冬花乾薑各一兩半桃仁六十枚杏仁三十枚上搗篩以酒煎服方寸匕早午晚日三服後稍加二匕黃耆煮散治肺氣盛實其氣上蒸發多痰心胸煩躁往往咯血黃耆銼桑根白皮銼杏仁去皮尖雙仁炒紫菀去苗土貝母去心黃芩去黑心麻黃去根節麥門冬去心焙升麻羌活去蘆頭蛤蚧酥炙各一分胡黃連一錢上為散每服三錢水一盞生薑一大片拍碎煎至九分去滓食後臨臥溫服若人病咯血先當吃上面清心氣方兩三盞天門冬煎治肺熱實咳嗽涕唾稠黏氣促急不思食生天門冬二兩去心以水一升煮爛候水盡細研紫菀去土一兩貝母去心三兩桔梗白茯苓去黑皮桑白皮根銼木通銼各一兩半白蜜二兩土酥一兩生地黃汁四合藕汁生麥門冬汁各三合上為末先下地黃麥門冬藕汁煎五六沸次下天門冬並蜜煎五六沸次下紫菀等末攪勻次下酥慢火煎攪如餳傾於盒中待凝每服一匙食後夜臥細細嚥之日三五服清肺飲子治渴而小便閉邪熱在氣分也茯苓三錢豬苓三錢澤瀉五錢琥珀半錢燈心二分木通七分通草二分車前草炒二錢瞿麥半錢萹蓄七分白朮三錢桂半錢上為細末每服五錢水一盞半煎至一盞帶熱服或銼如豆作湯煎服亦可八正散或五苓散皆得用之一方無術桂麻黃引氣湯治肺勞實氣喘鼻張面目苦腫麻黃杏仁生薑半夏各五分紫蘇四分白前亦作白朮細辛桂心各三兩橘皮二分石膏八兩竹葉切一升上羅勻以水一斗煮取三升去滓分三服龍腦丸治胸中鬱熱肺喘嗽口臭喉腥或口甜丈夫衄婦人熱血崩並皆治之龍腦薄荷五兩淨葉真蒲黃一兩麥門冬去心二兩阿膠一兩甘草一兩人參一兩川當歸一兩半黃耆一兩半木通一兩生乾地黃三兩柴胡好者去苗半兩上為末煉蜜丸如桐子大每服二十丸病上焦食後用熱水吞下微嚼破更好病下焦空心服小兒加減與之此藥大有奇效不可盡述葉氏清膈丸治肺氣上壅氣促迫塞面赤痰實咽嗝不利頭