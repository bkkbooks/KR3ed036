body:
  text: 卷二百五十九食治門食治水腫病附論夫腎主於水脾胃俱主於土土性剋水脾與胃合胃為水穀之海若胃虛不能傳化使水氣滲溢經絡浸漬腑臟脾得水濕則病不能制於水故氣獨歸於腎三焦不瀉經絡閉塞水溢於皮膚而令腫也宜以食治之方赤小豆羹方出聖惠方治水氣腹大臍腫腰痛不可轉動赤小豆五合桑根白皮三兩銼白朮二兩鯉魚一頭三斤者洗制如常上水一斗都一處煮候魚熟取水魚盡食之其豆亦宜吃勿著鹽味其汁入蔥白生薑橘皮入少醋調和作羹食之甚效鯉魚粥方出聖惠方治水腫利小便鯉魚一頭可重一斤去腸淨洗商陸二兩銼赤小豆三合紫蘇莖葉二兩上於淨鍋內著水五大盞都煮候魚爛熟空腹食之其汁入蔥白生薑橘皮及少醋調和作羹食之其豆亦宜吃甚妙海蛤索餅方出聖惠方治水腫海蛤搗研如面一兩甘遂三分為末絹羅如面郁李仁湯浸去皮微炒研一兩一分上以桑根白皮一兩用水二升煮如嫩即加干棗三十枚擘破同煮取一升去滓取入前件藥和如作索餅法煮令熟看冷暖得所空腹服食須臾快利小便甚多勿怪黑豆粥方出聖惠方治水氣利小便除浮腫黑豆半斤桑枝銼半升構枝銼半升上以水五大盞煮取二大盞去滓每取汁一盞入米一合煮作粥空心食之又方出聖惠方鯉魚一頭可重一斤去鱗腸肚淨洗赤小豆半升淘令淨冬麻子半升水研濾取汁一升上先以水四大盞煮魚豆欲熟入麻子汁更煮十餘沸出魚空腹食之其豆汁並宜食之又方出聖惠方商陸汁三合生薑汁一合生地黃汁三合上相和煎三五沸每取二合攪粥半盞空心食之羊肉臛方出聖惠方治水腫羊肉細切三兩商陸去皮切半斤上先以水三大盞煮商陸至二升去滓下肉煮入蔥豉鹽等作臛如常法任意食之商陸赤者有毒慎不可用白雞湯方出聖濟總録治腹大小腫利小便白雞一隻赤小豆一升上治如食法以水三升煮豆並雞候熟食之其汁稍飲令盡麻子粥方出聖惠方治風水腹大臍腫腰痛不可轉動亦治腳氣腫暴咳嗽小便澀痛虛勞補益冬麻子搗取汁半升粳米三合上以冬麻子汁和米入薑蔥豉椒等煮作稀粥空腹食之又方出聖惠方郁李仁一兩半搗卻以水和取汁薏苡仁二合上以郁李仁汁煮薏苡仁作粥空腹食之未愈更服餅子方出聖惠方治水氣面及腹微腫及未曾服藥者郁李仁湯浸去皮炒熟二兩甘遂酥炒令熟三分上搗羅為末用大麥面一兩藥末一兩水和作餅子濕紙裹煨熟空腹服食須臾快利即止商陸粥方出聖濟總録治水氣用商陸去皮銼二兩以水三升煮取一升去滓入細粟米一合煮成粥空腹食之微利為度燒冬瓜方出聖濟總録治卒腫滿身面皆洪大用黃土厚泥冬瓜火燒令熟去土食之豬肝方出聖濟總録治浮腫脹滿不下食心悶腳氣腫用豬肝一具切作胾臠著蔥豉姜椒鹽等令乘熟食之腳氣腫細切豬肝水洗拭乾大蒜食之良治腳腫氣轉上入腹垂死方出聖惠方用赤小豆一升淘令淨以水三升煮熟去豆取其汁浸腳即重暖用之其豆食之亦妙治十腫水病不瘥垂命方出聖惠方用猯豬肉半斤細切以粳米三合水三升入蔥豉及椒姜作粥每日空腹食之又方出聖惠方用青頭鴨一隻剝去毛足頭及腸洗淨和粳米煮之令熟著五味薑蔥豉任意食之治水氣浮腫小便澀方出聖惠方用鯉魚一頭重一斤者治如食法煮令熟取汁入冬瓜蔥白作羹食之一日盡再作食治水氣浮腫腹脹小便澀方出聖濟總録用水牛蹄一隻治如食法煮熟銼碎作羹空腹食之水牛皮細切蒸熟姜醋食之亦可食治腳氣附論夫腳氣者晉魏以前名為暖風古來無腳氣名後以病從腳起初發因腫滿故名腳氣耳又有不腫而緩弱者行即卒倒漸至不仁毒氣陰上攻心便至危困禍不旋踵然寬延歲月即緩風毒氣得其總稱矣此病狀證尤多經方備證今宜以食治之方橘皮粥方出聖惠方治腳氣心胸壅悶氣促不食陳橘皮一兩湯浸去白焙紫蘇莖葉一兩大腹皮子三枚桑根白皮一兩生薑三分切粳米二合上細銼以水三大盞煮取一盞半去滓下米煮粥空心食之郁李仁粥方出聖惠方治腳膝痹氣大便風澀郁李仁二十一顆湯退去皮研如膏粳米三合揀淨淘蜜一合生薑搗汁半合上以水一升煮粳米令熟次入郁李仁姜蜜等空腹食之如食不盡即候日中再食之檳榔粥方治腳氣喘悶大腸壅澀白檳榔熟水磨一顆粳米淨淘一合生薑汁半合蜜一合上以水半升煮米令熟次下蜜並檳榔生薑等汁同煮為粥空腹食之蓯蓉羹方出聖濟總録治丈夫失精虛損陽氣衰腳腰疼痛無力肉蓯蓉溫水洗去土細切一兩白羊腎一對去脂膜切蔥白七莖擘羊肺二兩切上入五味汁作羹空腹食之炙肚方出聖濟總録治下焦風冷腰腳疼痛豬肚一枚制如食法切為臠酒半升蔥白七莖切細上以五味醬等拌炙熟空腹食之鯉魚羹方出聖惠方治腳氣衝心煩躁言語錯謬鯉魚一枚制如食法蓴菜四兩蔥白二合上調和豉汁煮作羹食之一方無蔥白馬齒莧方出聖惠方治腳氣頭面浮腫心腹脹滿小便澀少馬齒莧洗淨四兩粳米一合醬汁半合上以水三大盞先煮粳米次下馬齒莧候菜熟入醬汁調和食之日宜一次鹿蹄方出聖惠方治腳氣風冷濕痹四肢攣急腳痛不得踐地鹿蹄一具淨洗銼碎牛膝葉銼碎半斤上以豉汁五升先煮鹿蹄令熟次入牛膝葉及蔥白五寸拍破兼入椒薑末各一錢同煮至二升調和漸漸食之牛膝粥方出聖惠方治風濕下注腰膝無力疼痛牛膝葉切一斤粟米五合上以豉汁相和煮作粥入少五味調和空腹食之恐食不盡兩度食之紫蘇子粥方出聖惠方治腳氣浮腫脹滿不下食及小便不通紫蘇子三合粳米一合上以水三大盞研取汁去滓入淨淘粳米一合煮粥初熟時入豉椒姜各少許攪和空腹食之生粟子方出聖惠方治腳氣腎虛腰腳無力宜吃用粟子不限多少布袋盛懸令乾每日平明吃十有餘顆次吃豬腎粥佳獖豬肝方出聖惠方治腳氣上衝入腹用獖豬肝一具去脂膜細切以蒜齏五味調和空心食之如食不盡分為三兩遍食亦得又方出聖惠方用水牛犢子頭蹄治如食法蒸令極熟停冷任性食之豉心方出聖惠方治風毒腳氣膝脛攣急骨節痛用豉心五升九蒸九曝以酒一斗半浸經宿每取用一小盞攪粥食之楮皮粥方出聖惠方治腳氣用楮白皮微炙細切三升以水三升煎取一升半去滓澄清入白粳米一合淘淨煮粥空心服食治五淋附論夫五淋者石淋勞淋血淋氣淋膏淋是也此皆由腎虛而膀胱熱也腎虛則小便數膀胱熱則水澀則淋瀝不宣故謂之淋也小便數又多者此由下焦虛冷故也腎主水與膀胱為表裡腎氣衰不能制於津液脬內虛冷水下不禁故令小便數而多也宜以食治之方酥粥方出聖濟總録治小便淋痛真酥一兩白茯苓二兩搗如麻子粒大滑石三兩搗如麻子粒大生薑一兩濕紙裹灰火煨蔥白三七莖去須葉細切上先以水四升煮後四味至二升以生絹濾去滓取清更入漿水一升粟米三合淘淨煮作粥候粥將熟方入酥攪勻取熟空心任意食之生地黃粥方出聖惠方治小便出血磣痛生地黃汁二合蜜三合車前子葉取汁三合米一合上先以水一大盞半煮成粥次入諸藥汁及蜜更煎三兩沸分為二服粟酥粥方出聖惠方治小便不通粟米一升淨淘酒一升酥無好酥以熟油一兩代之蔥白一握細切上用漿水五升煮粟米為粥將熟下酒並酥蔥更煮取熟令病人空腹恣意食之或腹痛無害但行三五十步即通為妙青頭鴨羹方出聖惠方治小便淋瀝澀少疼痛青頭鴨一隻淨去毛並腸肚骨等細切萊蔔四兩細切即是蘿蔔冬瓜去皮瓤細切四兩蔥白四兩細切上濃煎豉汁二斗煮鴨肉候熟入冬瓜等三味更煮取熟更入鹽醋空心任意食之車前子葉羹方出聖惠方治熱淋及小便出血莖中痛車前子葉擇取一斤細切蔥白一握細切粟米三合淘淨上以豉汁五升煮令沸先下米煮熟次下車前子葉蔥白和作羹入少鹽醋空腹食之或煮為粥亦得葵菜粥方治諸淋小便赤澀莖中疼痛葵菜擇取葉並嫩心三斤細切粟米三合淨淘蔥白去須葉一握細切上以水五升先煮葵菜至三升絞去葵菜取汁下米並蔥白更入濃煎豉汁五合同煮為粥空心頓食之不盡分為兩度一日取盡冬麻子粥方治五淋小便澀少疼痛冬麻子二合葵子一合米三合上研二味以水二大盞淘絞取汁和米煮粥著蔥白熟食之良真酥粥方一方漿水粥治熱淋小便不利真酥一兩粟米三合淨淘淡漿水三升上以漿水煮米作粥候粥將熟下酥更煮取熟適寒溫空腹恣意食之冬瓜羹方治五淋小便疼痛壯熱腹脹氣悶冬瓜去皮瓤一斤細切蔥白一握細切冬麻子一升先研碎上以水三升漉麻子成漿生絹濾取汁煮冬瓜蔥白作羹候熟入少許鹽醋空心食之青小豆方治小便不通淋瀝青小豆半升冬麻子三合搗碎以水三升淘絞取汁陳橘皮一分末上以冬麻子汁煮橘皮及豆令熟食之鳧葵粥方治熱淋小便不利鳧葵擇取一二斤細切即水中荇葉也粟米半升洗淨淘上先用鹽豉汁五升煎令沸下米煮十餘沸下鳧葵煮作粥空心任意量多少食之蔥白粥方治小便不通蔥白去須葉一大握細切爛研生布絞取汁白粳米兩合淨淘又青粱米亦得上以水二升半煮米作粥候粥將熟下蔥汁更煮取熟空心溫食之良久即通榆皮索餅方治淋小腹結痛小便不通榆皮去粗皮細切一兩白麵四兩上以水二升煮榆皮至五合絞去滓取汁和麵作索餅於濃煎鹽豉汁中熟煮空心食之續以熱蔥茶投之粳酥粥方治久淋不瘥宜食真酥三合蕪荑仁微炒銼搗末三錢半上先取白粳米半升淨淘量水多少煮粥候熟下酥並蕪荑末攪勻任意食之食不盡分作兩度葡萄煎方治熱淋小便澀少磣痛瀝血葡萄絞取汁五合藕汁五合生地黃汁五合蜜五兩上相和煎如稀餳每於食前服二合黃雌雞肉粥方治膀胱虛冷小便數不禁補益五臟黃雌雞一隻去毛腸臟粳米一升黃耆一兩銼熟乾地黃一兩銼上同煮令極熟去藥及劈去雞骨取汁並肉和米煮粥入鹽醬一如食法調和空腹食之作羹及餛飩任意食之亦得生薯藥羹方治下焦虛冷小便多數瘦損無力生薯藥半斤切薤白半斤去須切上於豉汁中煮作羹如常調和食之治小便數方生山芋半斤削去皮薤白切一握上以豉汁煮羹入五味如常法空腹食一方有小豆葉嫩者可無薤白食之治小便數下焦虛冷方羊肺細切一具羊肉切四兩上入五味作羹空腹食之一方去羊肉治小便數下焦虛冷方用生山芋半斤削去皮拍破慢火煎酒二升候酒沸下山芋入鹽椒蔥白空腹食之小豆葉羹方治小便數多用小豆葉一斤細切於豉汁中煮調作羹食之小便數方出聖惠方用雞腸菜一斤豉汁中入五味煮羹食之治小便赤澀臍下急痛方出聖惠方用牛犢蹄煮熟熱吃甚利小便食治一切痢疾附論夫一切痢者由榮衛不足腸胃虛冷冷熱之氣乘虛入胃客於腸間腸虛即泄也此皆由飲食生冷脾胃虛弱不能制於水穀故糟粕不結聚而變為痢也宜以食治之方豬肝方出聖濟總録治冷勞下痢膿血瘦怯不能食獖豬肝一具水洗去筋膜令淨切作柳葉片鱉甲去裙襴米醋慢火炙一兩柴胡去毛三分甘草炙銼烏梅肉炒人參各半兩白朮三分胡黃連一兩乾薑炮陳橘皮湯浸去白訶黎勒炮去核蕪荑炒各半兩上除肝外搗羅為末將肝與藥末拌和令藥在肝上即旋串慢火炙令香熟空腹食之如渴即將藥末煎湯服亦得效炙肝散方出聖惠方治積冷氣痢下膿血肌瘦不能飲食豬肝一具去筋膜木香人參去蘆頭白朮黃連去須微炒乾薑炮製銼訶黎勒煨用皮陳橘皮湯浸去白焙蕪荑以上各半兩烏梅肉三分微炒上搗細羅為散將肝切作片子以藥末一兩摻令勻即旋以串子炙令香熟空腹食之如渴即煎人參湯溫服之食羊肉方出聖惠方治勞傷泄痢暖腰腹縮小便精羊肉八兩切作餡肉蓯蓉微炒二錢半蒔蘿末半兩乾薑炮製二錢半附子炮製去皮臍細切半兩胡椒蓽茇訶黎勒炮去核各一錢蕪荑微炒半兩白麵五斤上搗羅八味為末以肉並藥末等相和拌勻分作四劑每劑以麵裹之撮合微拍令扁用濕紙裹入煻灰火中煨令熟空心食之以飽為度羊脂粥方出聖惠方治赤白痢久不瘥困劣煩渴甚者羊脂一兩豬脂一兩黃牛脂三兩蔥薤每五莖切去須生薑一分切蒔蘿末一錢漢椒去目及閉口者微炒搗末半錢上先將脂等與蔥薤生薑同炒次用水入粳米三合煮成粥入蒔蘿椒末攪勻空腹頓食之六味鱠方出聖濟總録治冷痢白如鼻涕臍腹切痛不可食鯽魚去鱗切鱠十兩乾薑炮蓽茇陳橘皮湯浸去白焙胡椒炒蒔蘿各三分上除魚外為細末先將豉汁八合煎令熟次入藥末五錢再攪和煮乘熱空心頓服豬肝饆饠方出聖惠方治冷勞氣痢瘦甚豬肝一具勿著水去筋膜切作柳葉片子乾薑炮製蕪荑微炒陳橘皮湯浸去白炒令淡黃色各一兩訶黎勒炮去核縮砂仁各二錢上除豬肝外搗羅為末糝肝片上拌令勻用麵裹作饆饠以三重濕紙裹安於煻灰火中煨取熟空心飽食之黍米粥方出聖惠方治諸痢不瘥黍米二合蠟一兩羊脂一兩阿膠一兩搗碎炒令黃燥色為末上煮黍米作稀粥臨熟投阿膠蠟羊脂攪令消空腹食之粳米飲出聖濟總録治冷痢寒結不散日夜無度倉粳米淨淘控干四合薤白七莖羊腎脂五兩豉用水四升煎取去滓澄清上熬腎脂煎薤白令熟入豉汁與米同煮空腹食之蠟薤餅方出聖惠方治赤白痢及水痢白蠟一兩一分雞子三枚取黃薤白五莖細研白麵三兩上以雞子黃與薤白麵等調作餅子用蠟代油煎取熟空心食之豬子餅方出聖濟總録治脾胃氣虛下痢瘦弱豬子肝一葉蕪荑仁研胡椒為末各一錢乾薑炮為末半兩上薄切肝糝三味藥麵裹更以紙裹水濕慢灰火中煨熟去面空腹食之食羊肉方出聖濟總録治休息痢羊肉去筋膜取精者薄切令作片子四兩胡粉胡黃連各半兩大棗煮去核並皮二十顆上除羊肉外先研棗如泥卻別碾胡黃連作末並胡粉一處和棗作圓以濕紙包裹於煻火煨令熟取出搗羅為末每服三錢半勻摻羊肉片子中將濕紙裹煨令香熟食之不過三服效阿膠棋子方治泄痢阿膠炙燥為末四兩乾薑炮製為末半兩薤白煮爛細研七莖上以面五兩拌薄切如棋子大煮熟空腹食少入五味調和亦得赤石脂面方治冷痢不止赤石脂細研雲母粉各半兩面五兩上以水拌和切作條子煮熟分兩服食之著鹽醋椒蔥亦得羊肝𩛩子方治水痢羊肝細切五兩蕪荑微炒少許薤白細切七莖上入少五味以白麵裹依食作𩛩子候熟空心食之胡椒餛飩方治氣痢胡椒乾薑炮各半兩訶黎勒皮四枚上搗羅為末取精羊肉四兩細切和藥以麵裹作小餛飩子煮熟空腹食之以飽為度粥飲方治諸痢疾水泄霍亂並泄血後困頓不識人宜補虛正氣黃耆細切二兩人參一兩米二合上銼二味如麻豆大以水三升同煎取二升去滓下米煮粥服之鯽魚鱠方治赤白痢小鯽魚一斤如常鱠法蒜醋椒姜鹽各少許上先將魚切作薄片以蒜齏椒鹽姜拌和食之不用別物兼之一方煮熟蒜齏空心食之大蒜雞子方治休息痢大蒜剝去皮二顆雞子二枚上先將蒜放鐺中取雞子打破沃蒜上以盞子蓋候蒜熟空腹食之下過再服撥粥方治赤白痢休息氣痢久不瘥者薤白一握去須細切白麵四兩蔥白一握去須細切上和麵調令勻臨湯以筋旋撥入鍋中熟煮空腹食之附子粥方治冷痢飲食不下附子一分炮製去皮臍乾薑一分炮製銼上為細末每日空腹煮粥納藥二錢食之以瘥為度粳米粥方治脾胃氣弱食不消化痢下赤白不止粳米二合曲末一兩微炒上煮粥空腹食之亦主小兒無辜痢葛粉飲方治血痢日夜百餘行宜服葛粉二兩蜜一合上以新汲水二中盞攪令勻空腹分兩度服之羊肉食方治水痢注瀉羊肉去皮膜六兩煮熟倉米淘淨炒香搗末三兩上薄切羊肉以倉米末拌摻隨意食不拘時羊腎方治赤白痢羊腎一對去膜淨洗切細如小豆大白麵三兩上羊腎以白麵拌和同煮入豉鹽醋等候熟空心頓食之木耳粥方治赤白痢兼治腸胃滑白木耳洗細切二兩白粳米淘淨三合上相和以豉汁煮粥任下蔥椒鹽等空腹食之蔥粥方治赤白痢蔥切細二莖粳米淘淨三合上以水熟煮乘溫空腹食之小麥曲粥方治赤白痢不止脾胃氣虛弱食不消用水將曲麥煮作粥空心食之亦治小兒無辜痢加減多少食之薤粥方治脾胃虛冷下白膿痢及水穀痢薤白銼七莖粳米淨淘三合上相和煮粥任下椒姜等攪勻令熟空腹食之鯽魚方治赤白痢鯽魚肉薄切六兩作鱠粳米二合上和鱠五味作粥空心食之豬子肝方出聖惠方治脾胃氣虛兼下痢瘦弱日夜不記行數一方無蕪荑用縮砂仁二兩豬子肝一具去筋膜切作柳葉片子蕪荑微炒碾作末二錢半上取肝以蕪荑末摻令勻以麵裹入煻灰火中煨令熟去面只取肝空心頓食之水瀉冷勞氣痢細切醋煮熟蕪荑末調和空心食之治水痢不瘥方出聖惠方用林檎十顆以水一大盞煮取六分去滓每服一二合攪粥食之良陳米湯方出聖濟總録治吐痢後大渴飲水不止用陳食米淘淨三合以水二升半煎至六合空心食之日晚再煎食雞子餅方出聖濟總録治水痢臍腹疼痛用雞子三枚打去殼醋炒熟入面少許和作餅子炙熟空腹食之乾薑餅子方出聖濟總録治冷痢瀉不止食物不消用乾薑炮為末一兩以面五兩拌和作餅子燒熟空腹食之炙肝散出聖濟總録治氣痢用訶黎勒皮一兩分為三服搗羅為末取羊肝批作片子勿使相離以藥末入肝葉中炙熟食之以瘥為度羸瘦加蕪荑末少許相和食治五痔諸疾附論夫痔疾有五若肛邊生肉如鼠奶出孔外時時膿血者名牡痔若肛邊腫痛生瘡者名牝痔亦名漏痔若肛邊有核腫痛及寒熱者名腸痔若因便而清血隨出者名血痔若大便難肛邊生瘡癢痛出血者名脈痔此五者中於風寒之氣或房室不節或醉飽過度勞於氣血而經脈流溢滲入腸間衝於下部之所致也宜以食治之方黃耆粥方治五痔下血不止黃耆一兩細切粳米二合上以水二盞煎黃耆取一盞半去滓下米煮粥空腹食之又方出聖惠方蒼耳苗葉一斤細切粳米三合上於豉汁中入米煮粥少加鹽蔥白空腹食之作羹亦可牛脾粥方出聖濟總録治諸痔臘月牛脾細切一具米三升上每用牛脾三兩米三合煮粥食之牛脾一具盡即瘥桑耳粥方出聖惠方治痔病下血不止桑耳四兩米三合上以水三升煎桑耳取汁二升去滓著鹽椒蔥投入米煮粥空腹食之又方出聖惠方杏仁一兩湯浸去皮尖雙仁研入水一大盞絞汁粳米二合上於杏仁汁中投米煮作粥空心食之野豬肉方出聖惠方治久患腸風下血肛門疼痛用野豬肉二斤切作臠入椒鹽蔥白串炙令熟空腹食之馬齒菜粥方出聖濟總録治腸風五痔熱血血痢用馬齒菜每日作齏食之及下米作粥淡食一方馬齒菜二大握粳米三合拌煮治五痔及殺諸蠱方出聖惠方用鰻鱺魚切如食法切作片以鹽椒蔥白調和炙熟食之治五痔瘻瘡方出聖惠方用鴛鴦一隻治如食法煮令熟細切以五辛和食作羹亦妙治五痔下血不止肛腸疼痛方出聖惠方用野貍一隻去皮骨腸胃及骨薄切片著少面並椒薑蔥白鹽醋調和炙熟食之或作羹食皆效又方出聖惠方用鴝鵒一隻去毛腸肚炙令熟食之作羹亦得又方出聖惠方用木槿花半斤新者於豉汁中入椒鹽醋蔥相和煮令熟空腹食之又方用篇竹葉半斤切入豉汁中煮作羹少加鹽醋椒薑蔥白調和空心食之治野雞痔下血不止肛邊疼痛方出聖惠方用鯉魚一頭治如食法細切作鱠以蒜醬鹽醋食之桑耳羹臛方出聖濟總録治諸痔用桑耳不拘多少取作羹臛調和令羹熟空腹隨飯食之糯米粥方出聖濟總録治肺痿勞嗽胸膈痛大便祕澀糯米淨淘二合檳榔炮銼搗取末一分大麻子兩合郁李仁湯浸去皮研成膏一分上先研大麻子令爛以水三升與大麻仁攪勻生絹濾取汁煮糯米作粥將熟入檳榔末郁李仁膏攪勻空心食之牽牛粥方出聖惠方治大便壅澀面目虛腫水氣及四肢牽牛子炒熟搗取末半兩別取生者搗取末半兩同研勻旋用白粳米淘淨三合生薑細磨二錢上先用水三升煮粥次入炒熟牽牛末五錢併入姜攪勻空心食須臾轉下滯物檳榔粥方出聖濟總録治大腸風祕風毒下注腳膝煩痛檳榔水磨盡一枚真酥半匙生薑自然汁半盞上相和以白米煮粥入蔥薤白更煮數沸入前三藥同煮至熟空心頓服食未利晚食前再作胡荽餅方出聖惠方治腸風瀉血胡荽淨擇五兩作齏胡餅三枚市買者上以胡餅裹胡荽食之不用別吃物一兩服血止麻子粥方出聖濟總録治腸風祕結大麻子半斤附子二兩炮製去皮臍別搗末上將麻子淘淨曝乾搗羅為末每服二兩水一升半研勻細布絞取汁入附子末一錢再相和粟米一合同煮粥空心食不得用漆匙烏梅粥方出聖濟總録治腸風下血煩渴烏梅捶碎十顆粟米淘淨少許上以水八合浸一宿去烏梅取汁煮粥每日空腹頓食之糯米粥方治大便祕澀用水三升研麻子生絹濾取汁煮米作粥空心食之桃花面方治大便不通燥結腸內脹痛新桃葉二兩半或用乾者四兩搗末白麵半斤上水和勻薄切如常食煮熟空心淡食之至午時腹中鳴當下惡物三五日內忌熱毒炙爆食治吐血食治蛔蟲食治飴粥食治養老附論夫安身之本必須於食救病之道唯憑於藥不知食宜者不足以全生不明藥性者不能以除病故食能排邪而安臟腑怡神養生以資血氣故為人子者不可不知此道也是故君父有疾即先命食以療之食療不愈然後命藥故孝子須深知食藥二性也論曰人子養老之道雖有水陸百品珍膳每食必忌於雜五味相撓食之不已為人作患是以食啖鮮者務令簡少飲食當令節儉若貪味傷多老人腸胃虛薄多則不消膨脹短氣必至霍亂夏至以後秋分之前勿進肥濃美臛酥油乳酪則無他慮矣所以老人多疾者皆由少時春夏取涼食飲太冷其魚鱠生菜生肉腥冷之物多損於人直宜斷之唯乳酪酥蜜恆宜溫之而食此大利益老年若卒多食之亦令人腹脹泄痢可漸食之每日常宜淡食勿食太鹹物方牛乳法出聖惠方凡牛乳性平補血脈益心長肌肉令人身體康強潤澤面目光悅志氣不衰故為人子者常須供之以為常食一日勿闕恆使恣意充足為度此物勝肉遠矣補虛養老以藥水飲取乳服食鍾乳一斤上好者細研人參三兩去蘆頭甘草五兩炙微赤銼熟地黃三兩黃耆三兩杜仲三兩去粗皮肉蓯蓉六兩白茯苓五兩麥門冬四兩去心薯蕷六兩石斛三兩去根銼上搗細羅為散以水三斗先煮粟米七升為粥納散一兩攪令勻和少冷水與渴牛飲之令足不足更飲水一日余時患渴可飲清水平旦取牛乳服之生熟任意牛須三歲以上七歲以下純黃色者為上余色者為下其乳恆令犢子飲之若犢子不飲者其乳動氣不堪服也慎蒜豬魚生冷陳臭其乳牛清潔養之洗刷飲飼須如法用心看之烏麻散方耐老駐顏用烏麻任多少以水拌勻勿使太濕蒸令氣遍日下曝乾又蒸又曝往返九遍干搗去皮作末空腹以溫水或酒調下二錢晚食前再服漸漸不飢久服不老耐寒暑食治妊娠附論夫凡初有妊娠四肢沉重不多飲食脈理順時是欲有胎如是經三二日便覺不通則結胎也其或心中憒憒頭目眩暈四肢沉重懈怠不能執作惡聞食氣欲啖酸鹹果實多臥少起是謂惡食其至三月以上皆大劇吐逆不能自勝舉如有前候者便依此飲食將息既得食力體強胃盛足以養胎子母安健也方鯉魚湯方治妊娠胎臟壅熱不能下食心神躁悶鯉魚一頭長一尺者治如食法生薑一兩切豆豉一合蔥白一握去須切上以水五升煮魚等令熟空腹和汁食之一方加糯米煮之鯉魚粥方治妊娠內傷動胎腹裡㽲痛宜服安胎鯉魚一頭重一斤者去鱗鰭及腸胃細切去骨苧根二兩乾者淨洗銼糯米五合上以水三碗先煎苧根取汁二碗去滓下米並魚煮粥入五味空腹食之豉湯方治妊娠傷寒頭痛豉一合蔥白一握去須切生薑一兩切上以水一大盞煮至六分去滓分溫二服阿膠粥方治妊娠下血阿膠半兩炙黃為末龍骨末一分艾葉末一分上用糯米二合入藥以水煮作粥空腹食之糯米阿膠粥方治妊娠胎動不安糯米三合阿膠一兩搗碎炒令黃燥搗為末上先煮糯米作粥臨熟下膠末攪勻食之烏雌雞肉粥方妊娠安胎及治風寒濕痹腰腳痛烏雌雞一隻切細取肉粳米三合上切雞肉於豆豉汁中和米煮粥入鹽椒蔥白空腹食之或作羹及餛飩索餅食之亦得丹雄雞肉索餅方養胎臟及治胎漏下血心煩口乾丹雄雞一隻取肉切作臛白麵一斤上溲麵作索餅和臛任意食之鹿角末豉湯方治妊娠損動下血苦煩滿豉一合鹿角末一分上以水一大盞煮豉取汁六分內鹿角末攪勻分為二服地黃粥方治妊娠下血如故名曰漏胎胞干胎斃生地黃汁三合糯米三合上煮糯米作粥臨熟下地黃汁攪調令勻空腹食之竹瀝粥方治妊娠恆苦煩悶此名子煩宜吃淡竹瀝三合粟米三合上以米煮作粥臨熟下竹瀝攪令勻停冷食之單飲竹瀝三二合亦佳治妊娠損動腹痛方用冬麻子二合搗碎以水一大盞煎至七分去滓分作二服治妊娠腰痛方用黑豆二合以酒二大盞煮取一盞去滓食前分溫三服麥門冬粥方治妊娠反胃嘔逆不下食生麥門冬去心淨洗切細研爛絞取汁一合白粳米淨淘二合薏苡仁揀淨去土一合生地黃肥者四兩淨洗切細研爛取汁三合生薑汁一合上以水三盞先煮粳米薏苡仁二味令百沸次下地黃麥門冬生薑汁相和煎成稀粥空心溫服如嘔逆未定晚後更煮食之鹿頭肉粥方出聖濟總録治妊娠四肢虛腫喘急脹滿鹿頭肉半斤蔓荊實去土一兩高良薑蘹香子炒香令熟各半兩上除鹿肉外搗羅為末每服四錢先以水五盞煮鹿肉候水至三盞去肉下白粳米一合同藥末候米熟下少五味調和得所分作三次服一日食盡雞臛方出聖濟總録治妊娠四肢虛腫喘急兼嘔逆不下食黃雌雞一隻去頭足毛皮腸胃等洗淨去血脈於沸湯中掠去腥水高良薑一兩桑根白皮揀淨銼一兩半黃耆銼揀一兩上後三味與雞同煮候雞熟去藥取雞留汁將雞細擘去骨將汁入五味調和入雞肉再煮令滋味相入了隨性食之不計早晚食不妨別服藥餌鯉魚羹方出聖濟總録治妊娠傷動胎氣不安鮮鯉魚一頭治如食法黃耆銼炒當歸切焙人參生地黃各半兩蜀椒揀十粒炒生薑一分陳橘皮湯浸去白一分粳米一合上銼八味令勻細納魚腹中用綿裹合以水三升煮魚熟將出去骨取肉及取魚腹中藥同為羹少下鹽醋熱啜汁吃效苧麻粥方出聖濟總録治妊娠胎不安腹中疼痛宜常食生苧麻根一兩洗淨煮取汁二合白糯米二合大麥面一合陳橘皮浸去白炒半兩末上和一處以水煮似常作粥稀稠得所熟後方入鹽花少許平分二服空腹熱食之陳橘皮粥方出聖濟總録治妊娠冷熱氣痛連日不可忍陳橘皮湯浸去白焙一兩苧麻根括去土曬乾一兩高良薑末三錢白粳米揀淨半合上除粳米外搗羅為散每服五錢匕先以水五盞煎至三盞去滓入粳米半合鹽一錢煮作常式粥食之空心一服至晚更一服小豆飲出聖濟總録治妊娠漏胎血盡即子死赤小豆半升蜀椒去目及閉口炒出汗十四枚烏雌雞一隻理如食法上以水二升煮雞豆椒令熟取汁時時飲之未瘥更作服之豉心粥方出聖濟總録治諸種瘦疾往來寒熱豆豉心二合以百沸湯泡細研柴胡去葉三錢末桃仁湯浸去皮尖研三十枚極細上先將豆豉心桃仁二味以白米三合水三盞似常式煮粥候欲熟時入柴胡末三錢攪勻食之半夏撥刀方出聖濟總録治初妊娠惡阻擇食痰逆服諸湯藥皆無效半夏以湯洗七遍後以生薑汁半盞煮半夏令汁盡再炒乾一兩人參半兩上為末入小麥面六兩以水挼作丸子切如撥刀以新生雞子二枚去殼湯內煮旋以箸剔破入蔥薤白各三五莖擘破以鹽醬調和候湯沸下撥刀煮令熟任意分三次熟食之山芋面方出聖濟總録治妊娠惡阻嘔逆及頭痛食物不下生山芋一尺於沙盆中研令盡以葛布絞濾過苧麻根一握上研勻入大麥面三兩和溲切細如棋子法於蔥薤羹汁內煮熟旋食之又方出聖濟總録木瓜一枚大者切蜜二兩上以水一處煮令木瓜爛於沙盆內細研入小麥面二兩攪令勻入薄杆切為棋子每日空心用白沸湯煮將半盞和汁淡食之蔥粥方出聖濟總録治妊娠數月未滿損動蔥三莖糯米三合上以蔥煮糯米粥食之效如産後血暈用之亦效雞子羹出聖濟總録治妊娠胎不安雞子一枚阿膠炒令燥一兩上以清酒一升微火煎膠令消後入雞子一枚鹽一錢和之分作三服相次服蘇麻粥出鮑氏方治子煩悶甚蘇子三錢半大麻仁去殼淨半兩上研極細水煮粥大便和煩自去食治産後附論夫妊娠十月既足百骨皆坼肌肉開解然後能生百日之內猶名産母時人將謂一月便為平復豈不謬乎若飲食失節冷熱乖理血氣虛損因此成疾藥餌不和更增諸病令宜以飲食調治庶為良矣方益母草汁粥方出聖惠方治産後虛勞血氣不調腹肚結痛血暈昏憒心熱煩躁不多食益母草汁二合生地黃汁二合藕汁二合生薑汁半合蜜二合白粱米一合水淘研令細上先以水一大盞煮米作粥次下諸藥汁更煎三兩沸每服吃二合日三服鯽魚熟鱠方出聖惠方治産後虛冷下痢腹痛食少鯽魚二斤作鱠蒔蘿陳橘皮去瓤焙蕪荑乾薑炮胡椒五味等分搗羅為末上煎豉汁中煮鱠臨熟合宜下料五味調和空心食之地黃粥方出聖惠方治産後瘀血及癥結疼痛無力生地黃汁二合生薑半兩取汁粳米三合上以米作粥臨熟入二味汁攪和令勻空心食之冬麻子粥方出聖惠方治産後腹中積血及中風汗出益氣肥健利小便冬麻子一合以水研取汁三升薏苡仁一合搗碎粳米二合上用冬麻子汁煮二味作粥空心食之粟米粥方出聖惠方治産後血氣虛弱不能下食粟米三合羊肉半斤去脂膜揀取四兩細切上以水五大盞下米羊肉同煮欲熟入鹽醋椒蔥更煮粥令熟空心食之豬心羹方出聖惠方治産後中風血氣驚邪憂恚悖逆豬心切一枚蔥白一握去須細切上以豉汁鹽椒米同作羹食之鯽魚粥方出聖惠方治産後赤白痢臍下痛不下食鯽魚一斤粟米三合別煮粥上用濕紙裹煨熟去骨細研候粥熟下魚入鹽醋調和空心食之豬蹄羹方出聖惠方治産後虛損少乳豬蹄一具切粟米三合上一如常法入五味作羹食之豬肝羹方出聖惠方治産後乳不下閉悶妨痛豬肝一具粟米三合上一如常法作羹粥空心食之薤白粥方出聖惠方治産後赤白痢腰臍痛薤白一握切粟米二合上作粥空心食之治産後虛羸無力腹肚冷痛血氣不調頭中風冷汗出不止方出聖惠方用白羊肉一斤細切調和作醃臘及羹空心食之治産後風怯瘦病五勞七傷心虛驚悸方出聖惠方用爛煮羊頭於豉汁中入五味調和空心食之治産後下痢腰痛方出聖惠方用艾葉搗粗羅為末如常作餛飩空心服之羊肉粥方出聖濟總録産後七日後宜吃白羊肉去脂膜細切四兩粳米淨淘三合生地黃汁三合桂去粗皮銼末一分上以水煮肉並米熟後入地黃汁並桂末令得所以五味調和空心任意食之冬瓜撥刀方出聖濟總録治産後血壅消渴日夜不止冬瓜研取汁三合小麥面四兩地黃汁二合上溲和如常面切為撥刀先將獐肉四兩細切用五味調和煮汁熟切漉去獐肉取汁下撥刀面煮令熟不拘多少任意食之龜肉臛方出聖濟總録治産後乳汁不下龜肉洗切二兩羊肉洗切三兩獐肉洗切三兩上水不拘多少入五味煮作臛食之黃雌雞飯方治産後虛羸補益遍身疼痛黃雌雞一隻去毛腸肚骨生百合淨洗擇一顆白粳米飯一盞上將粳米百合入在雞腹內以綿縫定用五味汁煮雞令熟開肚取百合粳米飯和雞汁調和食之雞肉食之亦妙黃雌雞羹方治産後虛損黃肥雌雞一隻理如食法粳米半升蔥白五莖切上依常法以五味調和為羹任意食之脯雞糝方治産後心虛驚悸遍身疼痛黃雌雞一隻去毛頭足腸胃淨洗以小麥兩合以水五升煮雞半熟即取出雞去骨蜀椒去目併合口炒汗出取末一錢柴胡去苗二錢乾薑末半錢粳米三合上先取水煮雞及米令爛入蔥薤椒姜柴胡末等次入五味鹽醬煮取熟任意食之豬肚羹方治産後積熱勞極四肢乾瘦飲食不生肌肉豬肚一枚洗淨先以小麥煮令半熟取出肚細切另安一處黃耆銼碎半兩人參三分粳米三合蓮實銼碎一兩上以水五升煮豬肚入人參黃耆蓮實候爛去滓藥並肚澄其汁令清方入米煮將熟入蔥白五味調和作粥任意食之鮑魚羹方治産後乳汁不下鮑魚肉切細半斤麻子仁別研一兩末香豉別研半合蔥白切碎三莖上先取鮑魚肉以水三升煮熟後入麻仁豉蔥白等煮作羹任意食之豬蹄粥方治産後乳不下母豬蹄一隻制如食法以水三盞煮取二盞去蹄骨王瓜根洗切木通銼碎漏蘆去蘆頭各一錢上除豬蹄汁外粗搗篩每服三錢以煮豬蹄二盞先煎藥至一盞半去滓入蔥豉五味等並白米一合半合作粥任意食之滑石粥方治産後小便不利淋瀝滑石半兩別研瞿麥穗一兩粳米三合上以水三升先煎瞿麥取二升半濾去滓將汁入米煮如常粥熟入鹽少許蔥白三寸方入滑石末煮令稀稠得所分作三度服之豬蹄羹方治産後乳汁不下母豬蹄淨洗兩隻木通銼作寸段一兩半上先將木通以水五升煎取四升去木通和豬蹄入五味如常煮法煮熟作羹任意食之又豬蹄羹方治産後乳無汁豬蹄洗淨一具粳米淨淘一合上水不拘多少以五味煮作羹任意食之作粥亦得豬腎臛方治産後風虛勞冷百骨節痛身體煩熱豬腎一對去脂膜薄切羊腎一對去脂膜薄切上以五味並蔥白豉臛如常食之不拘時生藕汁方治婦人蓐中好食熱面酒肉變成渴燥生藕汁半盞生地黃汁半盞上相和溫暖分為三服茯苓粥方治産後無所苦欲眠而不得眠白茯苓去黑皮取末半兩粳米二合上以米淘淨煮粥半熟即下茯苓末粥熟任意食之必得睡也燒豬肚方治婦人産後赤白痢腰腹㽲痛不能下食豬肝四兩蕪荑末一錢上以豬肚薄切糝蕪荑末於肝葉中五味調和以濕紙裹三五重煻灰火煨熟去紙食之一方溲麵裹紫莧粥方治産前後赤白痢紫莧葉細切一握粳米三合上以水先煎莧菜取汁去滓下米煮粥空心食之立瘥鯽魚羹方治産後乳無汁鯽魚一斤蠐螬五枚上依常煮羹食後食之牛肉羹方治産後無乳汁用牛鼻肉洗淨切小片以水煮爛後入五味如常羹法任意食之鹿肉臛方治産後無乳汁用鹿肉洗切四兩水三碗以五味煮肉作臛任意食之生藕汁飲出聖濟總録治産後惡血不利壯熱虛煩生藕汁半盞地黃汁半盞淡竹葉一握切以水一盞半煎取半盞蜜一匙上同煎沸熟溫分三分日二夜一藥茶食治五臟
