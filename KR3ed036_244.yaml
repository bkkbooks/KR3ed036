body:
  text: 卷二百四十四腳氣門腳氣腫滿附論腳氣風濕毒氣客搏腎經腎者胃之關也關門不利則聚水而生病水性就下故令腎氣不化小便不利濕寒之氣下注足脛腫脹不消故謂之腳氣腫滿方牛膝丹參酒治腳氣入冬即苦腳痹弱或筋骨痛不能屈伸皮膚𤸷痹不仁手腳指節腫滿悶或四肢腫腰脛直牛膝丹參薏苡仁炒生乾地黃各半兩五加皮白朮各五兩側子炮裂去皮臍萆薢赤茯苓防風去蘆各四兩獨活石斛去根各六兩茵芋用嫩葉桂天雄炮去皮臍人參芎藭石楠葉炙各三兩細辛去苗葉升麻各三兩磁石煅酒淬七次一斤生薑五兩上銼如小豆大用絹袋盛以無灰酒五斗浸一七日密封勿令通氣日滿空心取半盞溫飲之日五服不飲酒者頻煩少服以知為度風飲湯出千金方專療兩腳痛腫或不仁拘急屈不得行麻黃二兩去節吳茱萸一兩碎獨活二兩秦艽一兩石膏一兩碎杏仁二十枚雙仁去皮碎白朮三兩茯苓二兩桂心人參細辛各一兩乾薑一兩半碎防風去蘆防己芎藭甘草各一兩炙附子一兩半炮上切以水一斗六升煮取三升分三服取汗佳沉香丸治風毒腳氣上衝臟腑散入四肢虛腫無力雄黑豆一小升圓者淘附子二兩炮裂去皮臍吳茱萸湯浸焙炒青橘皮湯浸去白焙各八兩生薑四兩切碎以上五味用葛布作袋盛納大鍋中以水一斗煮令水盡泣干取袋中豆焙乾搗羅為末餘四味並不用更入後藥沉香銼白附子炮肉蓯蓉去粗皮切焙巴戟天去心各二兩牛膝銼酒浸焙海桐皮銼炙獨活去蘆頭各一兩芎藭澤瀉銼山芋生乾地黃切焙羌活去蘆頭各一兩上除不用四味外搗羅為末拌令勻煉蜜和丸如梧桐子大每服二十丸空心以溫酒下近晚再服麻黃湯出千金方凡若腫已消仍有此候者急服此湯麻黃去節射干人參茯苓防己前胡去苗枳實各二兩半夏薑製犀角羚羊角青木香橘皮杏仁炮去皮尖揀雙仁炒升麻各一兩生薑五兩獨活三兩吳茱萸一斤上㕮咀以水一斗二升煮取四升分五服相去二十里久中間少進粥以助胃氣此湯兩日服一劑取病氣退乃止以意消息之若熱盛喘煩者加石膏六兩生麥門冬一升去吳茱萸若心下堅加鱉甲一兩茯苓散治腳氣腫滿赤茯苓去黑皮三兩葶藶紙上炒半兩人參防風去叉甘草炙銼桂去粗皮白朮狼毒銼醋炒蜀椒去目並閉口者炒出汗乾薑炮赤小豆炒各一兩大戟半兩肉蓯蓉酒浸切焙豬苓去黑皮女萎各三分上為散每服一錢溫酒調下日二服以小便利為度沉香大腹皮散出御藥院方能治腳氣腫滿沉重疼痛筋脈不利此症皆由濕氣鬱滯經絡所致服之宜通經絡使上下無礙血氣和平腿腳輕利為效沉香檳榔烏藥木通並銼茴香紫蘇子甘草桑白皮銼並微炒荊芥穗陳皮各一兩白茯苓去黑皮紫蘇葉各一兩連皮大腹子三兩枳殼麩炒去瓤半兩乾木瓜去瓤二兩半上為粗末每服五錢水一盞生薑五片蘿蔔五大片同煎至七分去滓食前溫服日進三服十日後一服病愈即止如無蘿蔔用子一錢微炒搗碎同煎代之如大便乾燥即服加減神功丸木瓜丸治久患腳氣心腹煩滿腳膝浮腫木瓜切六兩人參二兩桂去粗皮一兩半木香沉香各一兩厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙柴胡去苗各一兩半赤芍藥二兩高良薑一兩檳榔銼三兩吳茱萸湯浸焙炒一兩上搗羅為末煉蜜和丸如梧桐子大每服三十丸酒送下不拘時候溫服搜風丸出仁存方專治腳氣腫痛大便不通黑牽牛子二兩生用檳榔大腹皮青皮皂角木香防風去蘆大黃羌活去蘆枳實川烏烏藥各半兩上為末煉蜜為丸如梧桐子大每服五十丸酒下食前服茱萸飲治腳氣脛膝腫急腰脾𤸷痹心煩氣喘吳茱萸醋炒二兩人參赤茯苓去黑皮各三兩桑根白皮銼陳橘皮湯浸去白焙大腹皮連皮銼大黃銼炒細辛去苗葉檳榔銼羌活去蘆頭杏仁湯浸去皮尖並雙仁炒各二兩蜀椒去目併合口者炒出汗三兩上搗篩每服五錢水一盞半生薑五片同煎至八分去滓溫服空心食前日再微利為度大腹皮散出聖惠方能治腳氣風毒頭面腳膝浮腫心腹壅悶大腹皮一兩銼防風半兩去蘆頭羌活半兩桑白皮一兩銼赤茯苓一兩郁李仁一兩湯浸去皮微炒羚羊角三分木通三分銼檳榔一兩枳殼一兩麩炒木香半兩紫蘇莖葉一兩上為散每服四錢以水一中盞生薑半分煎至六分去滓食前溫服羚羊散出聖惠方能治腳氣風毒腫滿心腹痰壅煩躁不能下食羚羊角屑三分桑白皮三分炒獨活半兩枳殼三分炒去瓤川大黃一兩銼碎半夏半兩湯浸七次去滑前胡一兩去蘆頭木香半兩酸棗仁三分去皮尖湯浸郁李仁一兩湯浸去皮尖檳榔一兩甘草一兩炙上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服羌活丸治腳氣腫滿行步艱難羌活去蘆頭天麻各一兩防風去蘆白殭蠶炒白附子炮牛黃研各半兩犀角鎊羚羊角鎊丹砂研各三分雄黃研三分天南星小煮半日切作片子焙乾三分上為末搗研煉蜜和丸如皂子大每服兩丸不計時候薄荷湯嚼下檳榔湯治腳氣虛腫氣滿不食檳榔銼防己桂去粗皮各一兩麻黃去根節二兩陳橘皮湯浸去白焙一兩半杏仁去皮尖雙仁炒秦艽去苗土附子炮製去皮及臍各半兩葛根二兩甘草炙銼一兩半上銼如麻豆大每服五錢水一盞半生薑三片去滓不拘時候溫服犀角丸治風毒腳氣上衝散入四肢虛腫無力犀角鎊二兩檳榔銼白朮芎藭羌活去蘆頭人參去蘆赤茯苓去黑皮木瓜防風去蘆牛膝銼酒浸焙石斛去浮皮及根銼焙各一兩上搗羅為末煉蜜和為丸如梧桐子大每服二十丸空心溫酒下日晚再服續斷丸治腳氣腫滿不仁屈伸痹攣或上攻心腹脹滿不思飲食續斷黃耆銼杜仲去粗皮炙銼牛膝酒浸切焙蘹香子炒羌活去蘆頭白附子炮木瓜乾者白蒺藜炒楝實去核炒各二兩上搗羅為末酒煮麵糊為丸如梧桐子大每服二十丸牛膝酒下空心食前服葶藶丸療水氣及腳並虛腫方葶藶子七分生用牽牛子澤漆葉海藻洗去鹽炙昆布如上炙桑根白皮炙甘遂熬椒目郁李仁各三分去皮桂心一分上搗篩蜜和為丸如梧桐子大每服十五丸日再服加至二十丸其藥用桑白皮切五合赤小豆一合通草一兩切以水二升煮取一升下藥忌生蔥治腳氣虛腫干瀉方方出廣南四時攝生論京芎羌活蘿蔔子上等分為散每服二錢先用緑豆一合蒜大者五瓣生薑七片以水同煮罨至爛去姜蒜先吃豆一半後便用豆汁調散次服相去更余吃飲豆壓之檳榔散出活人書治腳腫橘葉一大握沙木一握小便半盞酒半盞同以上藥煎上煎數沸調檳榔末二錢食後服茯苓湯治腳氣上攻身體腫滿小便赤澀赤茯苓去黑皮桑白皮銼防己陳橘皮湯浸去白皮各一兩半旋覆花半兩杏仁湯浸去皮尖雙仁炒麻黃去根節紫蘇莖葉白朮各一兩上搗篩每五錢先以水煮黑豆取汁一盞半入生薑半分同煎至八分去滓溫服不拘時候桑白皮湯治遍身腫小便澀及腳腫烏豆五升桑白皮切四升二物以水二斗煮取一斗半去滓橘皮二兩大麻子仁一升炒蜀升麻二兩杏仁去皮尖二兩豬苓二兩丹參三兩生薑二兩切上切將七物納前桑皮豆汁中煮取四升朝二服相去如三食久藥消進食食消又更進二服檳榔散出衛生家寶方專治腳氣動腳膝腫滿雞心檳榔十個陳皮一兩去白上為末分作十服煎木瓜湯調下蘇子散出衛生家寶方專治腳氣腫疼檳榔子蘇紫蘇子大黃厚朴以上各等分生用上為散每服四錢水一盞半煎至七分溫服以利為度未利再服生地黃酒治腳氣腫滿煩疼少力生地黃幹一斤杉木節五兩牛蒡子一斤去皮丹參二兩牛膝五兩去苗大麻仁半斤防風三兩去叉獨活地骨皮各三兩上銼用生絹袋盛以酒三斗浸六七日每於食前隨性飲之茯苓散出聖惠方能治腳氣腫滿入小便相引兩脅煩悶膀胱裡急停積水不得宣通時復心憒如醉赤茯苓三分桑白皮三分銼紫蘇莖葉三分漢防己半兩郁李仁一兩湯浸去皮檳榔一兩木香半兩羚羊角屑半兩紅雪半兩上為散每服四錢水一中盞入半分姜煎至六分去滓不計時候溫服芍藥湯治腳氣腫滿胸膈否塞吐逆不下食赤芍藥防己枳殼去瓤麩炒二兩獨活去蘆頭防風去蘆桂去粗皮葛根銼各一兩半半夏湯洗去滑薑汁製一兩上搗篩每服三錢水一盞生薑五片同煎至六分去滓空心日午近晚溫服萬靈丸治腳氣腿腫破氣消毒紅曲白膠香破故紙炒蠶砂炒烏頭炮木鱉子牽牛半生半熟五靈脂各半兩上為末蘇木汁麵糊為丸如梧桐子大每服三十五丸溫水送下旋覆花湯治腳氣腫上衝心胸煩悶氣急旋覆花犀角鎊各一兩前胡去蘆頭桑根白皮紫蘇莖葉杏仁去皮尖雙仁炒赤茯苓去黑皮各一兩半上搗篩每服三錢水一盞生薑三片同煎至六分去滓不拘時溫服丁香湯治風毒腳氣上衝散在四肢虛腫無力丁香陳曲炒令黃沉香銼木香各二兩紫蘇子炒三兩乾木瓜焙乾五兩吳茱萸浸洗焙乾炒黃一兩上搗篩每服三錢以水一盞煎至七分去滓空心溫服近晚再服防己湯治腳氣攣痹或四肢攣腫不可屈伸防己桂去粗皮麻黃去根節湯煮掠去沫焙各三兩桑根白皮銼炒芍藥各二兩白茯苓去黑皮四兩甘草炙銼兩半上搗篩每服四錢水一盞半入大棗二枚同煎至七分去滓空心日午晚後各一服服訖汗出粉之勿見風冷旋覆飲子治腳氣𤸷痹不仁兩腳餒弱腳腫無力重者小腹氣滿胸中痞塞見食即嘔或兩手大拇指不遂或兩腳大拇指不遂或小便澀第一療氣滿嘔逆不下食旋覆花橘皮各三兩生薑二兩紫蘇莖一握茯苓三兩香豉一升大棗十枚掰上切以水八升煮取二升四合分三服服後相去十里久日服一劑服五劑上氣即下小便澀者加桑白皮四兩慎冷豬肉蒜面魚黏食如其服此飲二三劑氣下訖即須服大犀角湯當服小便利為度如其胸隔中氣滿者加半夏四兩湯洗待腹內氣和腳腫欲消皮膚猶如隔帛者宜服犀角麻黃湯一二劑五日後再服之忌之蔥醋物防己散出聖惠方治腳氣腫滿小便不利喘促不食漢防己半兩赤茯苓三分檳榔一兩桑白皮三分銼木通三分銼豬苓三分去黑皮紫蘇莖葉三分上為散每服四錢以水一中盞入生薑半分蔥白二七寸煎至六分去滓不計時候溫服大腹皮散出聖惠方能治腳氣腫滿腹脹大小便祕澀大腹皮一兩檳榔一兩木香半兩木通二兩銼桑白皮二兩郁李仁一兩湯浸去皮炒牽牛子一兩炒上為散每服四錢以水一中盞入生薑半分蔥白二七寸煎至六分去滓不計時候溫服以利為度除濕丸出楊氏家藏方治腳氣腫滿疼痛行履艱難大便不通小便赤澀甘遂銼碎炒黑色大戟銼碎炒黑色威靈仙赤芍藥以上四味各一兩防風去蘆頭半兩白麵半兩干胭脂一兩上件除白麵胭脂外共為細末次研胭脂同面諸藥研勻滴水為丸如梧桐子曬乾沸湯內煮浮漉去滓再服再曬二十丸至三十丸溫白水送下或生薑汁沖湯放溫送下忌茶食前服黑豆丸治腳氣腎脾俱虛皮膚腫滿黑豆一合炒令熟桑根白皮炙銼一兩半大腹皮三枚並皮細銼木通陳橘皮去白炒各一兩一分紫蘇莖葉細銼一兩上搗篩每服五錢以水一盞半生薑一分掰破煎至七分去滓空心溫服日午近晚各一服甘豆湯出胡氏方專治腳腫此乃腳氣黑豆一兩甘草半兩上同煎湯服之郭鎮廷圭知縣云昔年大學士每入闈中多患腳腫至腹則死前後如此者非一人後有人施此方服之皆愈蓋神方也木通散出聖惠方專治腳氣遍身腫滿喘促煩悶木通一兩銼紫蘇葉一兩豬苓一兩去黑皮桑白皮檳榔銼赤茯苓各二兩上為散每服四錢以水一中盞入生薑半分蔥白二七寸煎至六分去滓不計時溫服旋覆花湯治腳氣腫上攻心腹旋覆花犀角鎊赤茯苓去黑皮陳橘皮湯浸去白焙紫蘇莖葉各二兩上搗篩每五錢水一盞半生薑五片棗三枚掰破同煎至一盞去滓溫服更與後犀角丸相間服犀角丸犀角鎊蒺藜子炒去角五味子牛膝酒浸切焙枳殼去瓤麩炒杏仁浸去皮尖雙仁炒甘草炙銼人參木通銼車前子研桑根白皮各一兩上為末煉蜜和丸如梧桐子大每服二十丸溫酒下木瓜煎丸出御藥院方專治腳氣腫滿不仁或時作痛甜瓜子天麻薏苡仁各一兩乳香別研白龍骨各半兩炒上為細末與乳香拌勻用大木瓜一枚酒一升同熬膏子搗和為丸如無新木瓜以乾木瓜二兩為末丸如梧桐子大每服五十丸熬膏子亦可煎紫蘇葉湯下或溫酒下亦可空心食前服紫蘇湯治腫滿小便少者湯方紫蘇莖二兩甘草炙橘皮各一兩半生薑三兩檳榔五枚碎合皮核搗細節待湯成下則溫和服之一方皮掰核碎和煎快利上切以水五升煮取二升分三服相去十里久若能長服之永令氣消下忌海藻菘菜檳榔散出聖惠方專治腳氣頭面虛腫胸腹煩悶檳榔桑白皮銼紫蘇葉蘿蔔子微炒訶黎勒皮各一兩上為散每服四錢以水一中盞入生薑半分蔥白二七寸煎至六分去滓不計時候溫服皂角膏出仁存方治腳氣腫痛大便壅閉杜仲炒萆薢大黃黑牽牛半生半炒上等分以皂角為末煎膏為丸如梧桐子大每服三四十丸竹瀝酒吞服稍止仍用調氣血藥搜風丸出仁存方專治腳氣腫滿大便不通大黃檳榔枳實各半兩黑牽牛二兩生上為末糊丸如梧桐子大每服五十丸飯湯下食前服加減四物湯出海上方專治腳氣流注四肢手指腫痛不可屈伸川當歸洗酒浸一宿焙乾稱白芍藥熟乾地黃洗焙乾稱附子去皮生用上等分為粗末每服三錢水一大盞生薑三片煎至七分去滓溫服整痛膏治腳氣腫痛行履無力及打撲傷折痛不可忍草烏去皮尖生用乾薑生用五靈脂生用各一兩浮麥炒黑焦一分上搗羅為細末每用醋一盞入藥三錢熬成膏紙上攤藥敷痛處又取麥麩醋拌和得所銚子內炒熱帛裹尉疼處如患腳氣先燒磚熱將藥在腳心貼定尉之引腳中氣消腫止痛大豆桑白皮湯療腳氣遍身腫大豆三大升以水二斗煮取五升去豆桑根白皮一握切檳榔二七枚劈茯苓二兩切上將三物以前豆汁浸經宿煮取二升絞去滓添酒二合納藥中隨多少服之或不利即剩服利多量減服之忌炸物茯苓湯治腳氣腰脊膝浮腫赤茯苓去黑皮乾薑炮澤瀉各二兩桂去粗皮三分上搗篩每服三錢水一盞煎至六分去滓空心日午近晚溫服檳榔湯出御藥院方專治濕毒腳氣腫滿小便少者檳榔銼二兩桑根白皮三兩黑豆半升上搗篩每服五錢水一盞半煎取一盞去滓溫服日三夜一一方生薑半兩切焙又一方若冷脹加吳茱萸二升生薑二兩用亦良治腳氣虛腫出海上方蔓荊子炒地骨皮枸杞子半兩上為粗末水二大碗煎沸淋洗桑白皮湯治腳氣胕腫桑根白皮二兩杏仁去皮尖雙仁炒一兩檳榔生三兩銼上搗篩每服五錢水一盞半煎至一盞去滓空心日午近晚溫服麻豆方療遍身腫小便澀腳腫烏豆一斗水四斗煮取一斗半去豆桑根白皮切五斗大麻子二升炒研碎上以豆汁入藥煎取六升一服一升日二服三日令盡五加皮丸出瑞竹堂方專治男子婦人腳氣骨節皮膚腫濕疼痛進飲食行有力不忘事五加皮四兩酒浸春三日夏二日冬四日遠志去心用皮四兩春秋三日夏二日冬四日用酒浸透易剝皮上曬乾為末春秋冬止用浸藥酒為糊夏別酒為糊丸如梧桐子大每服四五丸空心溫酒送下療腳氣浮腫心腹滿脹大小便不通氣急喘息者以郁李仁十二分搗碎水研取汁薏苡仁搗得如粟米取三合以汁煮米作粥空腹食之佳治腳氣初發從足起至膝脛骨腫疼者方出千金方上取萆麻葉切搗蒸薄裹之日二三易即消萆麻子似牛蜱蟲故云萆麻也若冬月無萆麻取蒴藋根搗碎和酒糟三分根一分合蒸熱封裹腫上如前法日二即消亦治風腫不仁頑痹治腳氣腳面腫痛出百一選方上先以肉案上刮砧搽腫處然後以熱麩炒豉纏之以帛子扎定經宿盡消治腳氣流注四肢手指腫痛不可屈伸出百一選方上用四物湯去地黃加附子入姜煎服如常法遇疾作時服之必愈治腳氣上攻流注四肢結成腫核不散赤熱焮痛及一切腫毒出百一選方甘遂為細末以水調敷腫處上濃煎甘草一味服之其腫即散二物本相反須兩人買各處安頓切不可相和清流士子韓詠苦此一服痛去七八再服而愈云得之一牛馬牙人醫者之意正取其相反故以甘遂敷其外而以甘草引於內所以作效如磁石引針之義療腳氣腫滿方上以老杉木及節煎水漿洗腳去腫滿大驗一方出海上方專治腳氣疼腫香附子一兩銼略炒去毛上每服二錢鹽少許水一盞半煎至八分送下小七香丸空心服近效方出危氏方上凡腳氣初作兩足伸屈之間或拘牽或痠疼或有腫赤用香蘇散香薷散加蒼朮木瓜大蓼橘葉川椒蔥白煎水傾在盆內衣被覆足熏一時取汁再淋洗不可頻用治腳氣連腿腫滿久不瘥變為腫方上用黑附子一兩去皮臍生用搗為散生薑汁調如膏塗附腫上藥干再調塗之腫消為度治腳氣腫痛上用蓼水煮漬腳將之立消煮紅草濃汁漬之多瘥凡有患腰腳腫氣及虛腫者用苦瓠甘瓠食之永瘥治腳氣從足至膝脛腫骨疼者上用蒴蓼根碎和酒醋共三分根一分合蒸熟封裹腫上二三日即消亦治不仁方用莖葉埋熱灰中令熱敷腫上瘥治腳氣數發通身腫滿氣急者方上取大麻子一升碎以小便二升煮取一升去滓頓服之一方療腳氣初發從足起至膝脛腫骨疼者上用生豬肝一具細切以淡蒜齏食之令盡若不盡者令再食之用治腫已入脛至小便澀小腹脹者出千金方上取烏㹀牛尿一升日二服消乃止千金翼云羸瘦人二分尿一分牛乳各煮乳結乃服之其牛溺當以銅氣取新者為佳純黃者亦可用治腳氣但腫不悶經服利藥法令人渴但腫縱不服利藥亦渴宜利方又取大麻子熬令香利水研取一大升別以三大升水煮一大升赤小豆取一升汁即入麻汁更煎三五沸渴即飲之冷熱任取安穩飢時啖豆亦佳兩利小便止渴消腫大良殼葉及桑白皮熬炙為飲飲之亦良腫盛力弱不堪大藥者取牛乳一小升烏牛尿一小升無烏牛尿用黃牛者亦得和調分三服相去十里久小便大利腳腫即頓消若一劑不除隔一二日更服氣力好者依前服羸弱者每日平旦惟一服六七合以瘥乃止忌雜肉大麻子酒療腳氣上腫小腹痹上大麻子一升碎研清酒三升漬三宿溫服隨性兼療頭分補益此一方傳用大良治腳氣腫滿方上大豆一升以水四升煮之令熟去滓取桑根白皮切一大升和豆汁重煎之厚薄如酪布絞去滓空心服日再服治腳紅腫方上取小豆一升和殼楮心一握熟煮吃二三升即瘥如湯沃雪良方治男子婦人小兒積年腳氣腫痛及腹肚蠱腫痛服之痛止腫消上商陸不拘多少切碎腳腫痛用無灰酒煮熟候酒溫連商陸飲如蠱腫同米煮粥吃風引大豆湯一名風引湯專治腳氣足脛胕腫上氣遍身疼脹枳殼散宜春秋服消腫利小便兼補療氣虛冷脹不能食治熱毒攻腳氣腫痛欲死者用好酒煮苦參漬之敗毒散出如宜方專治春月少年有熱坐臥濕地兩腳腫痛人參茯苓去皮甘草炙前胡去蘆川芎羌活獨活桔梗去蘆柴胡去枳殼各等分麩炒上㕮咀姜薄荷煎熱服加蒼朮加陳米名倉廩散加地骨皮天麻名羌活散四金丸出如宜方專治濕氣留滯腳腿腫浮早輕晚重草烏生薑半斤研姜同草烏一處交盛一宿蔥六兩同研蒼朮交盛一宿蒼朮制上為末糊丸如梧桐子大每服五十丸空心服治風毒腳氣若脛已滿捏之沒指者出肘後方見本門風毒氣類治風毒腳氣脛腫捻之則陷方又方出肘後方以大豆三升水一斗煮取九升納清酒九升又煎取九升稍稍飲之小便利則腫歇也有風引白雞竹瀝獨活諸湯及八分石斛狗脊諸散並別在大方中金牙酒最為治之要今載其方出肘後方蜀椒茵芋金牙莽乾地黃細辛防風去蘆附子地膚蒴藋升麻各四兩人參三兩羌活一斤牛膝五兩上十四物切以酒四斗漬七日飲二三合稍加之亦治口不能言腳屈至良又有側子酒亦效煨腎散出鮑氏方專治五種腳氣陽毒乾腳氣兩足赤腳骨熱痛頭暈疼痛陰毒風證一處痛骨腫堅硬如石不可行溫證兩膝下惡瘡膿水不幹嗽喘上充四肢冷麻衝心證口張目直身急哽不言如中風腎臟證足疼腰硬痛並治之丁香木香檳榔大黃甘遂黑牽牛桔梗等分上為末雄豬石一副切開入之加川椒鹽蔥頭三個濕紙包煨香熟出火毒細食酒下石腎也三白散出鮑氏方專治腳偏大如桂皮肉不仁時發寒熱陳蘿蔔子地枯蔞即蘿蔔種三白葉生溪澗邊葉如藍頂上三葉白上為末糊丸每服五十丸空心下又方出朱氏集驗方專治腳已止但腫不消不能行履無名異不拘多少一半生用一半火煅如煅自然銅法上生熟半和為細末醋調塗背如前法敷腫處方得之本州益陽縣坡底歐楊文炳渠本得之異人祕藏三十年今始一傳謹用刊行與衛生君子共之幸毋見方輕藥昔巢君嘗以聖散子方授之東坡先生指江水為盟約不傳人東坡益之乃以傳龐公安當著在方冊使巢君之名與此方同為不朽今傳炳之方刊以散施亦使文炳之名與此方相為長久也此係寧鄉米步彭氏刊施本又方治腳氣腫上見用大豆不拘多少洗淨煮熟留湯與小七香丸同細嚼以所煮湯下治腳氣腫腹滿虛脹出本草用落雁木以粉木同煮汁蘸洗治腳氣疼腫殺蠱蟲風瘙以扶移皮和五木皮煮作湯捋洗腳氣痰壅頭痛附論夫風毒腳氣盛陰陽否隔則氣脈閉塞津液不通水飲停在胸中而結成痰也其候胸腹脹滿身體疼重多唾嘔逆心火風痰相引上衝於頭則令頭痛治之宜兼以消風除痰之劑方羚羊角散治腳氣上攻胸膈痰盛頭目眩痛羚羊角鎊白蘚皮黃耆銼白檳榔煨銼山梔子仁各三錢羌活去蘆頭甘草炙銼沃實炒茯神去木桂去粗皮海桐皮銼附子炮製去皮臍大黃銼醋炒郁李仁炒去皮酸棗仁炒麻黃去根節湯煮掠去沫焙獨活去蘆頭芎藭防風去蘆各一兩葛根取粉枳殼麩炒去瓤地骨皮車前子炒各三分上為散拌勻空心晚食前溫酒調下二錢至三錢旋覆花丸治風毒腳氣壅熱生痰頭項強痛旋覆花微炒薏苡仁炒升麻赤茯苓去黑皮地骨皮各一兩白檳榔煨銼五枚前胡去蘆頭微炙防風去蘆芍藥羌活去蘆頭麥門冬去心焙大麻子仁別研如膏馬牙硝別研各二兩半枳殼去瓤焙炒羚羊角鎊白蒺藜炒去角黑參各三錢上為末入馬牙硝大麻仁膏相和煉蜜為丸如梧桐子大食後溫漿水下二十丸日二夜一獨活酒方治腳氣痰壅頭痛喘悶胸膈心背痛淨天門冬去心焙黃耆去蘆甘菊花焙防風去蘆天雄炮裂去皮毛臍側子炮製去皮臍防己白朮炒赤茯苓去黑皮川牛膝枸杞子焙各三兩磁石生搗研九兩生薑切五兩生大地黃七兩貫衆銼後去黃末二兩上㕮咀如麻豆生絹袋盛以無灰酒五斗浸七日開封初飲二三合漸加常令酒力相接百合湯治風毒腳氣痰厥頭痛百合旋覆花去枝葉桑根白皮銼木通銼前胡去蘆頭赤茯苓去黑皮防己檳榔銼半夏湯洗去滑焙郁李仁湯浸去皮尖炒別研桃仁湯浸去皮尖雙仁麩炒別研防風去蘆防葵木香陳橘皮湯浸去白焙各一兩上搗篩每服三錢水一盞半入生薑半分同煎至七分去滓食前溫服日三半夏散治腳氣上衝心胸痰壅頭痛目眩背膊煩痛不欲飲食半夏一兩湯洗去皮滑