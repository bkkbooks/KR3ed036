body:
  text: 卷二百六嘔吐門總論夫吐家脈來陽緊陰數其人食已即吐陽浮而數亦為吐寸口脈緊而芤緊即為寒芤即為虛寒虛相搏脈為陰結而遲其人即噎關上數其人則吐趺陽脈微而澀微即下痢澀即吐逆谷不得入趺陽脈浮者胃氣虛寒氣在上虛氣在下二氣並爭但出不入即嘔而不得食恐怖如死寬暖即瘥嘔而脈弱小便復利身有微熱見厥難治凡服湯嘔逆不復入者先以甘草三兩水三升煮取二升服之得吐但服之不吐亦佳消息定然後服飲余湯即流利便不吐也凡嘔者多食生薑此是嘔家聖藥病者胃中寒心下酸淡四肢厥冷食即嘔吐名曰寒嘔或因食多致傷胃氣或因病曾經汗下致胃氣虛冷之所為也如病者胃中挾熱煩躁聚結涎沫食入即吐名曰熱嘔或因胃熱伏暑及傷寒伏熱不解濕疸之類皆熱之所為也病者素盛今瘦膈中瀝瀝有聲食入即嘔食與飲並出名曰痰嘔或因涎結氣鬱於胃口或因酒食甜冷聚飲之所為也病者心腹脹悶四肢厥冷惡聞食臭食入即嘔朝食暮吐暮食朝吐名曰食嘔皆因飲食傷脾宿穀不化之所為也病者心下飽滿食即嘔血名曰血嘔此由瘀蓄冷血積聚胃口之所為也病者心悶胸膈脹滿氣逆於胸膈間食入即嘔嘔盡卻快名曰氣嘔胃者足陽明合榮於足今隨上氣逆結於胃口故生嘔病也病者身背皆熱肘臂攣痛其氣不續膈間壓悶食之則先吐而後下名曰滿氣此因上焦傷寒風開其腠理上焦之氣剽悍滑疾遇開即出經氣失道邪氣內著故有是證病者下焦實熱大便不通氣逆不續嘔氣不禁名曰走哺此下焦氣起於胃口下別入回腸注於膀胱並與胃傳糟粕而下大腸令大小便不通故知下焦實熱之所為也凡先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家又傷寒瘥後餘熱在胃嘔者依傷寒後證治之若腳弱髀痛而嘔者此腳氣內攻宜急依腳氣門治之更有婦人懷娠惡阻嘔吐亦各從其門類或中毒而嘔以解毒藥解之酒家嘔吐當以解醒藥解之其如三焦漏氣走哺嘔吐則見嘔吐門泄利則見下利門各從其類也嘔不得輕用利藥唯腹滿則視其前後何部不利利之即愈病源云嘔吐者皆由脾胃虛弱受於風邪所為也在胃則嘔膈間有停飲胃內有久寒則嘔而吐其狀長太息心裡淡淡然或煩滿而大便難或溏泄並其候養生方云八月勿食薑一云被霜瓜向冬發寒熱及溫病食欲吐或心中停飲不消或為反胃仲景傷寒論夫嘔家有癰膿者不可治嘔其膿嘔儘自愈若先嘔後渴者為欲解也先渴後嘔者為水停在心下屬飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲此證多用小半夏加茯苓湯脾胃虛受於風邪故令新谷入胃不能傳化故之氣與新谷相搏胃氣則逆胃逆則脾脹脾脹則氣逆復遇冷折之則噦也右手關上脈沉而虛者善病噦也夫中脘有飲則嘈有宿食則酸食後噫醋吞酸皆宿食證俗謂之咽酸是也夫人受天地之氣以生莫不以胃為主蓋胃受水穀脾主運化生氣以充四體者也若脾胃無所傷則無嘔吐之患其或飲食失節溫涼不調喜餐腥膾乳酪或貪食生冷肥膩露臥濕處當風取涼動擾於胃胃脘既病矣則脾氣停滯清濁不分中焦為之痞塞遂成嘔吐之患然此特論飲食過傷及風涼冷濕之所由致者又如憂思所感宿寒在胃中脘伏痰胃受邪熱瘀血停積亦能令人嘔吐故診其脈代者霍亂代而絶者亦霍亂也霍亂脈大者可治微細者不可治脈遲氣短劣不欲言者亦不可治胃虛之人或為寒氣所中或為暑氣所幹或為飲食所傷或氣結而痰聚皆令人嘔吐又有瘀血停於胃口嘔吐之間雜以涎血當辨其脈證施以治法中寒則脈沉緊四肢厥冷飲食不下當以溫暖之藥調之挾暑則脈弦數煩躁而渴又當清涼之停食則消化之痰聚則順氣溫胃停積者多由憂思過度損傷經絡其脈實而大者難治虛細者易愈諸嘔吐酸皆屬於熱此上焦受外來客邪也胃氣不受外邪故嘔傷寒論云嘔多雖有陽明證不可攻之是未傳入里三陰不曾受邪也亦可見此證在上也仲景以生薑半夏治之以雜病論之嘔吐酸水者甚則酸水浸其心不任其苦其次則吐出水令上下牙酸不能相對以大辛熱劑療之必減吐酸水嘔出水酸味者收氣也西方肺金旺也寒水乃金之子子能令母實故用大咸熱之劑瀉其子以辛熱為之佐而瀉肺之實以病機之法作熱攻之者誤矣蓋雜病醋心濁氣不降欲為中滿寒藥豈能治之哉嘔吐出於胃氣之不和人所共知也然有胃寒有胃熱有痰水有宿食有膿血有氣攻又有所謂風邪入胃凡是數者可不完其所自來哉寒而嘔吐則脈沉緊四肢厥冷法當溫暖之濕熱嘔吐則喜冷惡熱煩躁中干法當清涼解之病水證唾沫怔忪先渴後嘔與之消痰逐水輩宿食症者胸腹脹滿醋悶吞酸與之消食去積輩腥氣燥氣熏炙噁心此膿血之聚經所謂嘔家有癰膿不須治嘔膿儘自愈是爾七情內郁關膈不卒此氣攻之症所謂諸鬱於胃則嘔吐是爾若夫風邪入胃人多不審率用參朮助之攔住寒邪於此尤關利害其或惡聞食臭湯水不下粥藥不納此則翻胃之垂絶者也辨之不早其何以為對治乎且夫足陽明之經胃之絡脈也陽明之氣行則順今逆而上行謹不可泄固也然嘔吐者每每大便祕結上下壅遏氣不流行盍思所以區畫而利導之也如汗後水藥不入口者逆嘔而脈弱小便復利身微熱而手足厥冷者虛寒之極也識者憂焉蓋人之陰陽升降三焦調順脾胃和勻乃能腐熟水穀變化糟粕傳注行道下走腸間若脾胃虛冷水穀不化則陰陽痞隔三焦不調濁陰之氣不能下行奔衝於上故發為嘔吐然咳逆之病有得之於膈實者有生於中滿者有發於下焦者種種雖不同悉本胃氣逆則嘔吐也蓋胃者水穀之道路胃氣宣通則上焦如霧中焦如漚下焦如瀆名曰平胃既虛弱水穀停滯致三焦格拒升降不勻其氣虛滿得食則嘔而又有朝食暮吐暮食朝吐者有食已即吐者有嘔吐水穀不得前者有但嘔而無所出者有先嘔卻渴者有先渴卻嘔者嘔家本渴而反不渴者其本其治各各不同假令內格嘔逆食不得入是有火也病嘔而吐食久反出是無火也舉此二者乃知嘔吐之名則一治療之法各異雖治法有冷熱虛實之別要當以安其胃氣為本使陰降陽升平勻嘔逆之病順而愈矣嘔吐附論夫嘔者胃氣上而不下也譬之逼瓶小口頓溉不入乃升氣所礙人病嘔吐其理如此蓋脾胃氣弱風冷干動便留停積飲食不化胃氣虛脹心下淡淡其氣上逆故嘔吐也方沉香煎丸治嘔吐除中滿痞氣痰逆噁心宿昔成積面黃腹脹臟腑不調水穀不化調順脾胃阿魏醋浸開白麵同作餅炙令黃半兩巴豆去皮心膜研細新瓦上攤去油盡一分沉香銼丁香木香胡椒沒藥研丹砂別研水飛高良薑檳榔麵裹煨熟去面青橘皮去白瓤焙硫黃別研水飛硇砂明淨者以石器慢火熬研水飛過用各一兩縮砂去皮吳茱萸取陳久者湯浸取沉者炒各半兩上除研藥外為末再入研藥令勻煉蜜丸如緑豆大瓷盒貯封每服二丸食前臨臥溫生薑橘皮湯下更量虛實大小加減柴胡湯治療兩脅妨悶嘔逆不下食柴胡茯苓各八分橘皮人參桔梗各六分厚朴八分炙紫蘇五分生薑十六分甘草五分炙訶黎勒皮七枚去瓤上切以水八升煮取二升五合絞去滓分三次溫服服後相去如人行六七里進一服止吐則忌海藻菘菜酢物豬肉等物之類治嘔吐厥逆不思飲食白朮丁香甘草炙銼陳橘皮去白焙木香各半兩銼大腹子銼枳殼去瓤麩炒訶黎勒炮去核各三分草豆蔻去皮一兩上粗搗篩每服三錢水一盞入生薑五片同煎至七分去滓空心溫服白朮散治嘔吐酸水結氣築心白朮茯苓各八分吳茱萸四分橘皮六分蓽茇四分檳榔十分人參六分大黃十分厚朴八分炙上搗篩為散空腹煮薑棗湯服下每日二服每服一匕漸加至二匕半覺熱即少飲食三兩口壓之忌酢物桃李雀肉等物茯苓散治脾胃虛弱不思飲食嘔吐茯苓知母白朮枳殼麩炒去瓤人參去蘆甘草微炒銼蘆根切半夏湯洗七次去滑各一兩上粗搗篩每服三錢水一盞入生薑七片薤白二寸切同煎至七分去滓不拘時候溫服半夏丸治久吐不止半夏一兩乾薑半兩上為末白麵糊丸如梧桐子大不計時候以陳皮湯下治嘔逆痰壅出本草用若耽苗子煮汁服亦可生搗絞汁服加味治中湯出危氏方治體虛感冒雨濕嘔吐人參白朮乾薑青皮陳皮各一兩藿香半夏各五錢甘草二錢上銼為散生薑三片紅棗二枚煎服前胡湯治嘔吐不下食前胡去蘆麥門冬去心焙人參淡竹茹芍藥陳橘皮去白焙半夏湯洗七次焙各等分上銼如麻豆大拌勻每服三錢水一盞生薑三片煎至七分去滓食前溫服小麥湯出千金方治嘔吐不止小麥一升人參厚朴各四兩甘草一兩青竹茹二兩半生薑汁二合茯苓二兩上羅勻以水八升煮取三升去渣分三服木香白朮湯出濟生拔粹方治嘔而吐食謂持實擊強是無積也胃強而乾嘔有聲無物脾強而吐食持實擊強是以腹中痛當以此和之一名丁香半夏湯丁香木香各一錢半夏曲一兩白朮五錢檳榔二錢茯苓五錢炙甘草四錢上為末濃煎生薑芍藥湯調下一二錢有積而痛手按之愈痛無積者按之不痛一方無丁香柴胡湯療遍體煩痛頭痛吃食嘔逆不得食柴胡十分茯苓八分枳實六分炙生薑八分去皮切白朮八分麥門冬八分去心甘草六分炙上切以水六升煮取二升三合絞去渣溫服分三服每服相去如人行六七里進一服內消不利忌海藻菘菜酢物桃李雀肉熱面炙肉油膩和胃湯治食飲不下嘔逆清水面目虛腫人參二兩茅根一兩甘草炙半兩竹茹三分木通銼三分赤茯苓去黑皮一兩半半夏湯洗七次焙一兩上粗搗篩每服三錢水一盞生薑三片棗二枚擘破煎至七分去滓溫服丁香丸出傳信適用方治因食冷物凝滯胃間嘔吐不止大丁香半兩木香三錢胡椒二錢藿香三錢乾薑二錢甘草三錢肉桂三錢上為末蒸餅糊丸如緑豆大焙乾時時干嚼不必飲湯水水入則愈吐如覺痿弱更加附子隨意人參丸治嘔吐服後半夏丸雖覺漸損然病根不除欲多合後丸又慮毒藥不可久服欲不服藥又恐病勢滋蔓人參白朮各五兩生薑屑八兩厚朴炙細辛各四兩橘皮三兩桂心二兩上搗篩為末蜜和丸如梧桐子大米飲下初服十丸日二服稍稍加至二十丸欲與後半夏丸間服亦得忌桃李雀肉生蔥生菜半夏丸治嘔吐積冷在胃嘔逆不下食半夏一升小麥曲一升上搗半夏為散以溲麵丸如彈子大以水煮冷麵熟則是藥成初吞四五丸日二服稍稍加至十四五丸旋煮旋服服此覺病減欲更重合服亦佳忌羊肉餳柴胡知母飲治嘔吐不下食頭痛身熱柴胡去苗一兩知母焙半兩蘆根銼三分檳榔一兩人參半兩陳橘皮半兩上為散每服三錢水一盞生薑五片同煎至六分去滓熱服軟紅丸治嘔吐冷積丹砂研五錢砒霜研半錢強胭脂一錢巴豆七粒取霜上研細熔臘少許入油三兩滴水和藥為劑以油單裹之大人旋丸如緑豆大小兒如芥子濃煎槐花甘草湯放溫下一丸忌熱食半時久人參丸治嘔吐不下食人參三兩半夏湯洗七次焙乾二兩前胡去蘆銼一兩鉛丹研半兩上細末煮棗肉丸如梧桐子大每服二十丸生薑湯下食後服豆蔻子湯治嘔吐逆不下食腹中氣結豆蔻子七粒研碎生薑五兩甘草炙一兩人參一兩上切以水四升煮取一升五合去渣溫服分二服每服相去如人行五六里進一服內消忌海藻菘菜人參散出危氏方治吐逆及治瀉後煩渴常服調中和氣白茯苓人參各半兩乾薑一兩一錢藿香木香甘草各一錢半黃耆一錢半上為末每服三錢水一盞煎七分去滓溫服如瀉後渴者每服加滑石末二錢同煎服藿香安胃散出御藥院方治嘔吐不止藿香葉一兩半夏二兩洗陳皮二兩去白厚朴一兩薑製蒼朮三兩泔浸甘草二兩炙上為粗散每服五錢以水一盞半生薑五片棗二枚同煎去滓溫服厚朴散治嘔吐不止消痰下氣厚朴去粗皮銼薑汁浸一宿炒四兩甘草銼炒二兩陳橘皮湯浸去白炒六兩生薑二斤洗淨切片焙乾炒令紫色草豆蔻去皮銼細炒二兩上為散每服二錢沸湯入鹽點服脾氣等疾每服三錢水一盞生薑二片棗二枚擘破煎至六分溫服枇杷葉散出本事方治嘔吐利膈枇杷葉去毛人參各一錢茯苓半兩茅根二兩切半夏一錢切上銼細為散每服四錢水一盞半生薑七片慢火煎至七分去滓入檳榔末半錢和勻服之三乙承氣湯出經效良方治嘔吐水漿不入或食已即吐六便祕或利而不鬆快時覺腹滿者或下痢赤白而嘔吐食不下者或大腸小腸膀胱結而不通上為嘔吐膈食者川大黃錦紋者用厚朴削去粗皮枳殼芒硝各半兩甘草一兩上為粗末每服四錢水一盞生薑五片煎至六分卻入硝細細啜服未利再服熱甚者此一劑分大半作一服未利再服半劑若更熱甚者一劑即作一服熱勢極甚者亦有並二服作為一服方得利而效者臨時消息以利為度生蘆根飲療嘔吐病有兩種一者積熱在胃嘔逆不下食一者積冷在胃亦嘔逆不下食二事正反須細察之必其食飲寢處將息傷熱又素無冷病年壯力強膚肉充滿此則是積熱在胃致此嘔逆如將息食飲寢處不熱又素有冷病年衰力弱膚肉瘦悴此則是積冷在胃嘔逆不下食生蘆根切一升麥門冬一升去心青竹茹一升生薑汁五合茯苓五兩上切以水八升煮取二升半去渣加竹瀝六大合分三服每服相去如人行十里久始服一劑若重合服亦佳忌酢物五味丸治嘔吐前生蘆根飲雖可然未能全除者服此茯苓五兩人參三兩麥門冬一升去心青竹茹一升生薑屑六兩上搗篩蜜和為丸如梧桐子大煎蘆根飲下之初服十五丸日二服稍加至三十丸忌酢物枇杷葉散出御藥院方治脾胃氣虛嘔逆吐食枇杷葉去毛陳皮去白瓤各等分上為粗末每服五錢水一盞半生薑半分棗一枚擘破同煎至一盞去滓溫服不拘時候日進三服附子散出肘後方治冷氣嘔逆及吐食上附子生去皮臍一枚切作四片用生薑汁五合浸一宿取出火上炙乾入生薑汁浸良久又蘸薑汁炙直候薑汁干搗羅為散每服二錢米飲調下不拘時候紫粉丸治嘔吐不下食上針沙以醋浸一宿去醋便帶醋炒直候並銚子絶紅色無煙然後乃止放冷研令細更用酣團火內燒令通赤取候冷再研極細以白麵糊丸如梧桐子大每服四十丸用溫粥飲下之服此藥訖便須啜一盞粥已不吐如未定再服之次定若與小兒服即小丸之更隨兒大小豫之治嘔吐不止出淡寮方脾氣虛弱多嘔吐粥藥才食留不住及反胃脾虛嘔吐不止諸藥不效者上證用胡椒五十粒雞舌香十粒即母丁香也併為細末白湯半盞調藥送靈砂數粒便愈酒磨丸一名效磨丸出肘後方治吐逆粥飲不下及治丈夫婦人吐逆連日不止上用五靈脂狗膽汁和丸如雞頭子大每服一枚煎熱生薑酒半升磨化再湯尉極熱先煮溫粥半盞持在手病人乘熱飲藥便以粥送下宜用左手與患人藥吃不得嗽口右手急將粥與病人吃不令太多治嘔吐不止者出經驗良方上用來復丹以湯泡半夏為末一同研和為丸生薑湯下五十丸立止治水逆嘔吐出經效良方上用生料五苓散去桂煎熟去滓入生薑自然汁細細服之小半夏加茯苓湯治水氣嘔吐半夏一升生薑半斤茯苓三兩一方四兩上以水七升煮取一升五合分溫再服金匱云嘔家用半夏以去水水去則嘔止治嘔吐大便祕結虛冷者上用靈砂或養正丹溫而利之又蘇合香丸用四分感應丸用六分夾研作細丸薑汁泡沸湯下此亦溫利若大便熱結用蜜煮凝捻作指鋌納後利導之或用獖豬膽一枚取汁滴入醋少許以筆蘸灌於後部或燒皂角於桶內熏穀道或連根蔥白一握漢椒五十粒搗細作餅焙熱和輕粉掩臍續以蔥椒煎湯熏穀道治嘔吐百藥不瘥上用生薑一兩切緑豆大醋漿七合銀器煎取四合空腹和滓旋呷之治嘔吐風氣又吐後轉筋上將木瓜煮汁飲之甚良若腳膝筋急痛煮木瓜令爛研作漿粥糕令裹痛處冷易一宿三五度便瘥煮木瓜時入一半酒同煮之小藿香散出本事方治心下悶亂嘔吐不止水漿不入有熱結者服之丁香乾薑枇杷葉藿香葉赤茯苓甘草上各等分為散每服三錢水二盞生薑三片煎至七分去渣服之人參飲治嘔不能食人參八分厚朴六分炙橘皮六分白朮生薑各八分上切以水四大升煮取一升五合分溫三服忌桃李雀肉等物又凡服湯嘔逆不入腹者方上先單煮炙甘草三兩以水三升煮取二升服之得吐但更服不吐益好消息定然後服余湯則流利更不吐也忌海藻菘菜犀角人參飲子出千金方治嘔逆胃氣虛邪風熱不下食犀角人參各二兩薤白五兩粟米一合上㕮咀以水四升半煮取一升七合下米煮令米熟分四服如人行相去七里久進一服治嘔吐胸膈痞滿不通出百一選方枳實去瓤白茯苓銼各半分上煎四味大理中丸一丸作一服或俞仙人降氣湯十五味治嘔吐出肘後方白檳榔一棵煨橘皮一分炙為末上以水一盞煎半盞服治天行後嘔逆不下食食入即出上取羊肝如食法作生淡食不過三度即止療無故嘔逆酸水不止或連三五口每食後如此上用羊屎十顆好酒兩合煎取一合頓服即愈如未定更服看病者大小加減之六七歲即五顆治嘔逆不能食出肘後方上訶黎勒皮二兩去核搗為末蜜丸如梧桐子大空心服二十丸日二服一方用訶子去核薑湯下治天行嘔逆不可食食即吐上以雞卵一枚煮三五沸取出以水浸之外