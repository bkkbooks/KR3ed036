名生薑橘皮湯治乾嘔噦手足厥冷者橘皮四兩生薑半斤上羅勻以水七升煮取三升分三服不止更合服之治乾嘔吐逆涎沫出者方半夏生薑各等分上羅勻將水一升半煮取七合頓服之日三治卒乾嘔不息甘草人參各半兩上用生薑四兩水六升煮取二升分為三服治乾嘔乾薑六分附子四分炮搗上用苦酒丸如梧桐子大每服三丸日三服治病人乾嘔方上取羊乳汁飲一杯治乾嘔方上酒浸馬屎一宿取汁服之治卒乾嘔不息上搗葛根汁服一升瘥一方用雞子破布濾去白吞黃數枚瘥治乾嘔頭痛食不下上用生雞子一顆開頭去白取黃著米醋拌煻火頓服醋盡熱飲未定更服不過三度瘥治嘔吐噦若手足厥冷者上蘆根三片濃煮汁飲之嘔噦附論夫噦者咳逆也古方則謂之噦凡吐利後多作噦大率胃實則噫胃虛則噦此由胃中虛膈上熱故噦或至八九聲相連收氣不回至於驚人者若傷寒久病者得此甚惡內經所謂壞病者是也津減者知監器之漏聲嘶者知琴絃之絶落葉者知稿木之摧舉此三物衰傷之徵以此故知噦是病深之候也亦有噦而心下堅痞眩悸者以膈間有水所為其他病則各有治法脾胃俱虛受於風邪故令新谷入胃不能傳化故谷之氣與新谷相干胃氣相逆而嘔胃逆則脾脹脾脹則氣逆因遇冷折之則噦也右手關上脈沉而虛者病善噦也食入於口而聚於胃脾胃散精氣以養四肢臟腑氣和乃能俾助於中若脾胃氣虛不能傳化水穀之精與新谷相干脾胃氣痞滿脹復遇冷折之故令噦逆也方丁香茱萸湯治胃虛噦嘔吐逆膈咽不通丁香五錢吳茱萸一錢黃耆二錢草豆蔻一錢去皮人參一錢甘草柴胡橘皮半夏升麻當歸乾生薑蒼朮麥糵各等分上銼為末如麻豆大每服半兩水二盞煎一盞去渣食前熱服忌冷物一方無半夏生薑胡麻飲治嘔噦人參胡麻仁橘皮枇杷葉各等分上羅勻水一斗煮枇杷葉取五升下藥煮取三升內麻仁稍飲之橘皮湯療嘔吐不止陳橘皮生薑甘草枇杷葉各等分上切以水五升煮取二升五合絞去滓分溫三服每服相去如人行六七里進一服內稍忌海藻菘菜治嘔噦用小麥面醋和作丸二三十個以沸湯煮別盛漿二斗內丸於湯內漉出又內於漿中看外熱氣稍減乘熱吞三四個其噦定即不吞甚者加至七八丸尚未定晚後飯前再吞之治嘔噦及霍亂後噁心用葡萄根濃煮汁細細飲之蘆根方出千金方治嘔噦用蘆根切以水一斗二升煮取四升分四服一方兼以童便一兩合不過三服則瘥療嘔噦出肘後方用生櫻薁藤斷之當汁出器盛取飲一升生葛藤尤佳小半夏加茯苓湯出肘後方治嘔噦谷不得下眩悸棗肉丸出永類鈐方治脾胃虛冷嘔噦半夏生薑湯出活人書一名半夏湯治噦欲死治乾嘔若手足厥冷者宜食生薑此是嘔家聖藥治氣厥嘔吐不得息方出千金方豉半夏各二兩生薑二兩人參前胡桂心甘草各一兩上㕮咀以水九升煮取三升分三服又方出千金方大棗十五枚附子一枚橘皮二兩豉一升生薑甘草各一兩上㕮咀以水九升煎取二升分溫日分三服治卒嘔噦厥逆方出千金方上飲新汲冷水三升佳治嘔逆出本草以蓮實仁六枚炒令黃色研末冷熟水半盞和服便止療卒噦方用枳實三枚炙去瓤㕮咀之取三家乳一升以羊脂五兩煎枳實令沸復內乳令沸去渣含咽之薤白湯出肘後方治人忽噁心不已薤白半斤茱萸一兩豉半斤米一合棗四枚枳實二枚鹽少許上為細末丸如彈子大水三升煮取一升半分為三服一方出肘後方但多咬豆蔻子及咬檳榔亦佳治噦方出千金方用煮豉三升飲汁佳又方出千金方用薑汁空腹飲一升治噁心方出千金方用苦瓠瓤並子一升捶碎以酒水三升煮取一升頓服須臾吐並下如蝦蟆衣三升又方出千金方用麻子一升熬令香熟搗取酒三升熟研濾取一升飲盡日二服盡一石瘥一切病自能飲食不能酒任性多少又方出千金方用小便服百日佳治噦用牛口中齝涎草絞取汁服療卒噦不止方出肘後方上痛抓眉中央閉氣瘥又方出肘後方用物刺鼻中若以少許皂角內鼻中令嚏則差又方出肘後方用粢米粉二升井花水服之止嘔噦出本草以甜糟三歲者下有酒以物盛之服三聖散出聖濟總録治噦逆不止丁香四十九粒胡椒十四粒半夏七枚大者先以錐子鑽透心後用麻線穿過井花水浸七日一日一夜換水後焙乾上為細末大人生薑湯調下小兒箸頭蘸生薑汁後點藥少許立愈再甚不過三服石蓮丸出聖濟總録治胃寒嘔逆石蓮肉去心附子炮裂去皮臍乾薑炮各一兩上為末粟米粥丸如緑豆大蜀椒湯下十丸止勿再服小丁沉丸出聖濟總録治噦逆不止飲食不下丁香沉香木香檳榔白豆蔻去皮各半兩麝香一錢另研人參二兩桂去粗皮白茯苓去皮二兩甘草半兩炙銼乾薑一兩炮訶黎勒一兩去核青橘皮去白炮半兩白朮四兩上為末煉蜜丸如小彈子大每服一丸炒生薑鹽湯嚼下無時沉香烏藥丸出聖濟總録治噦逆不止不思飲食沉香烏藥銼青橘皮去白焙白朮銼炒白芷白茯苓去黑皮五味子甘草炙銼人參各等分上為末煉蜜和丸如雞頭子大每服一丸至二丸食前生薑紫蘇湯嚼下理中散出聖濟總録治胃中氣冷腹脹噦逆不思飲食方見脾臟門脾氣腹脹滿類案原方乾薑炮人參白朮各一兩甘草炙銼吳茱萸湯洗焙乾炒檳榔銼各半兩陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各一兩蓽茇半兩上搗羅為散每服一錢匕生薑湯點服食前日三豆蔻湯出聖濟總録治脾胃俱虛噦逆上氣草豆蔻去皮木香甘草炙銼乾薑炮高良薑縮砂去皮益智去皮陳皮湯浸去白白朮各等分上㕮咀每服三錢水一盞生薑三片煎八分去滓溫服無時白朮湯出聖濟總録治胃氣受冷氣逆奔沖噦逆不定白朮銼甘草炙銼莎草根炮去毛各一兩草豆蔻五枚大者去皮炒乾薑炮陳曲炮麥糵炒各半兩上㕮咀每服三錢水一盞生薑三片大棗二枚擘破煎七分去滓熱服不拘時候降氣丸出聖濟總録降陽氣於下使陰氣上升升降無礙陰陽調適飲食運化諸疾不生牽牛子二十兩面炒熟取十兩蓽澄茄十兩檳榔銼二兩木香四兩赤茯苓去黑皮二兩半補骨脂十兩上為末水煮麵糊為丸如梧桐子大每服二十丸溫水下不拘時候丁香湯出聖濟總録治胃冷噦逆不思飲食丁香甘草炙銼陳曲炒各半兩草豆蔻去皮炒一兩陳橘皮去白焙一兩木香炮三分上羅勻每服三錢水一盞生薑五片煎至七分去滓溫服無時人參湯出聖濟總録治噦逆不止人參白朮白茯苓藿香各半兩甘草一分炙銼上羅勻每服三錢水一盞生薑五片煎七分去滓溫服羌活湯出聖濟總録治風冷乘脾胃致噦逆不止羌活去蘆附子炮去皮臍蘹香子炒各半兩木香乾薑炮各一分上羅勻每服三錢水一盞鹽一捻煎八分去滓稍熱服無時厚朴煮散出聖濟總録一名調胃散治噦逆不止噁心氣不下降方見脾臟門兼理脾胃類按原方半夏制甘草炙厚朴去皮陳皮去白藿香以上各等分上為末每服一錢生薑三片棗二枚水一中盞同煎溫服食前一方無棗煎服乾薑丸出聖濟總録治脾胃俱虛內挾風冷噦逆上氣乾薑炮一兩半附子炮裂去皮臍胡椒桂去粗皮各半兩上為末煉蜜和丸如梧桐子大每服十五丸加至二十丸食前濃米飲下如噦嘔冷沫濃煎生薑橘皮湯下豆蔻散出聖濟總録治胃寒噦嘔不止草豆蔻去皮銼八分甘草四兩炙銼陳橘皮去白焙一兩生薑和皮切片用一斤上和勻入銀器內用水過藥三指許慢火熬令水盡取出焙乾為末每服一錢沸湯點之夏月煎作冷熱水服水銀膏出聖濟總録治諸般噦逆水銀不結沙子硫黃細研太陰玄精石各一兩細研上用釅醋五升文武火煎成稠膏瓷盒內盛旋丸如梧桐子大每服七丸艾葉湯下不拘時候枇杷葉散出聖濟總録治噦逆不止飲食不下枇杷葉炙拭去毛四兩陳橘皮湯浸去白焙五兩甘草炙銼三兩上㕮咀每服三錢水一盞生薑三片棗一枚煎七分去滓稍熱服無時兩順煮散出聖濟總録治脾胃俱虛脹滿噦逆高良薑木香另搗上為散每服高良薑一錢木香半錢水一盞煎七分去滓溫服不計時候勿用鐵器煎附香煮散出聖濟總録治噦不止附子一枚重一兩者訶黎勒三七枚上用同蛤粉炒令附子裂去臍尖訶黎勒去核為末每服二錢水一盞煎八分去滓溫服治胃口冷噦逆不已出聖濟總録大棗一枚青州者去核胡椒七粒入棗內合定上用濕紙裹煨熟以紙襯地上出火毒去紙空心細嚼溫酒送下粥投之即效陳皮乾薑湯治噦逆不止陳皮通草乾薑炮甘草炙各二兩桂心去粗皮人參一兩上㕮咀每服四錢水一盞煎六分溫服溫中白朮丸治胃寒嘔噦白朮二兩半半夏二兩乾薑一兩丁香半兩上為末薑汁丸如梧桐子大每服三十丸生薑湯送下大半夏湯治胃寒嘔逆半夏薑製白朮各五兩人參半兩上為粗末每服五錢水三盞煎至一盞入蜜一匙候溫去滓服妙功藏用丸出宣明論又名神芎丸亦名顯人丸治嘔噦不食痿弱難運血溢血淋滿悶不通或泄利三焦壅滯傳化失常功不可述並宜服之大黃黃芩黃連各半兩黑牽牛荊芥穗滑石各三兩防風一分川芎一兩木香二分官桂三分去皮上為末滴水丸如小緑豆大每服二十丸至三十丸生薑湯下日三服溫水亦得
