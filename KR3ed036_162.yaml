服三錢水一盞入黃蠟如棗核許同煎至八分去滓大溫臨臥服之寧神丹治遠年近日咳嗽喘滿不得眠臥或因風寒入腠理不得眠者並皆醫療防風一斤烏梅肉桔梗甜葶藶各半斤人參知母紫蘇葉各四兩上為細末麻黃膏子為丸如彈子大每服一丸水一盞半煎至四五沸化開如不開時用匙勺研開臥時熱服汗出為度煎藥可用銀石沙瓷器內不用銅鐵器服藥後忌房室驢馬肉雁雞豬肉魚鴨等又忌濕面油膩發病等物及嗔怒熬麻黃湯法用麻黃五斤去根切作二寸水洗過用長流水三斗運取於銀石器內同麻黃熬水至五升將麻黃就於水內一把搓盡去麻黃將麻黃水用羅子隔去淨再於銀石沙器內熬成膏點些入水中不散為度將前項藥末同麻黃膏子相和勻杵一千之上然後為丸治咳嗽喘氣不得眠臥宜服桑白皮一兩銼木通一兩銼桔梗三分去蘆頭紫蘇苗三分大腹皮一兩銼款冬花半兩郁李仁三分湯浸去皮上為散每服三錢水一中盞生薑半分煎至五分去滓不拘時候溫服治咳嗽晝夜不得眠臥咽喉作聲川烏頭半兩炮裂去皮臍桔梗半兩去蘆頭根乾薑半兩炮前胡三分去蘆頭射干半兩五味子半兩川椒半兩去目及閉口者炒出汗上為末煉蜜和搗二三百杵丸如半棗大每服一丸含咽津日進三服四服治咳嗽不得眠臥杏仁三兩湯浸去皮尖雙仁麩炒研如膏黃耆一兩銼酸棗仁一兩微炒青橘皮半兩湯浸去白瓤甘草半兩炙微赤黃桑白皮一兩銼上件藥除杏仁外搗羅為末入杏仁膏拌勻煉蜜和搗三百杵丸如梧桐子大每服二十丸不拘時以粥飲下一方有麻黃青龍散出御藥院方一名橘皮五味子湯治咳嗽上氣不得臥及嘔吐人參去蘆頭陳皮去白五味子紫蘇葉各一兩上為末每服三錢水一盞生薑三片煎至七分去滓溫服不拘時知母丸治遠年近日一切咳嗽不得眠臥者知母貝母甜葶藶炒黃色杏仁去皮研各等分上為細末用餳糖籠內蒸七遍與藥末相合為丸如豌豆大每服三十丸淡薑湯下蜜湯亦可安眠散治一切咳嗽夜不得臥眠罌粟殼去蒂瓤杏仁烏梅甘草上等分㕮咀每服半兩白水煎臥服定喘餅子治咳嗽虛喘悶氣不眠白礬貝母苦葶藶並生各一兩上為細末每服一錢白麵合作餅子慢火燒熟細嚼生薑湯下食後日進二服葶藶子散治咳嗽引氣不得臥或遍體氣腫或面腫或足腫上氣並主之葶藶子三升微火炒上搗篩為散以清酒五升漬之冬七日夏三日初服如桃大日三夜一冬日二夜二量其氣力取微利一二為度如患急困者不得待日滿亦可以綿紬絞即服其葶藶單莖面上葉端出角粗且短又有一種苟芥草葉近根下作奇生節細長取時必須分別前件乃二種也殭蠶湯治嗽喘喉中如鋸不能眠臥五味子湯治咳嗽晝減夜加不得眠臥睡時即吐逆五味子蒺藜子炒去角麻黃去根節熬掠去沫焙桑根白皮銼白石脂杏仁去皮尖雙仁炒百合各一兩半貝母煨去心款冬花枳殼去瓤麩炒紫菀去苗土柴胡去苗各一兩旋覆花半兩桂去粗皮半兩上為散每服五錢水一盞半入生薑五片粳米五十粒煎取八分去滓溫服不拘時候無憂丸治年深日遠咳嗽延喘夜臥不安經霜桑葉經霜萆麻葉御米殼去蒂蜜炒各一兩上為細末煉蜜為丸如彈子大每服一丸食後白湯化下日進一服治咳嗽不得眠杏仁去皮尖人參胡桃肉生薑各等分上擂成膏加熟蜜丸如彈子大臨睡嚼一丸又方一名治痰喘方治咳嗽不得眠咳嗽熏法
