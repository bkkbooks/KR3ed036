body:
  text: 卷三百四十妊娠諸疾門熱病附論夫冬時嚴寒觸冒傷之藏於肌骨夏至乃發壯熱又為暑病暑病即熱病也此寒氣蘊積發即有毒若妊娠遇之多致傷墮也非節之氣傷於妊婦熱毒之氣侵損胞胎遂有墮胎漏血俱害子母之命也方催生湯妊娠熱病六七日極熱煮胎治兒死身冷不能自出須用暖胎藥用黑神散不若用催生湯蒼朮桔梗橘紅白芷桂心粉草當歸乾薑制朴芍藥半夏川芎枳殼各四兩南木香真杏仁上每服三錢水一盞半薑棗煎大半盞服柴胡散治妊娠熱病骨節煩痛頭疼壯熱若不止則損胎柴胡家葛根知母梔子仁甘草各半兩石膏大青黃芩升麻各三兩上㕮咀每服四錢水一盞蔥白三寸煎至六分去滓不拘時溫服人參散治妊娠熱氣乘於心脾津液枯少煩躁壅熱口舌乾渴人參麥門冬赤茯苓地骨皮家葛根黃芩犀角屑各三兩甘草半兩上㕮咀每服三錢水一盞煎至六分去滓溫服人參黃耆散治妊娠身熱煩躁口乾食少人參黃耆家葛根秦艽麥門冬各二兩知母二分甘草半兩赤茯苓一兩上㕮咀每服四錢水一盞姜三片淡竹葉十四片煎至六分去滓溫服大黃飲子治妊娠熱病六七日熱入腹中大小便閉澀煩熱川大黃石膏知母前胡赤茯苓各三錢梔子仁甘草黃芩各七兩上㕮咀每服半兩水一大盞生地黃一分煎六分去滓無時溫服黑神散一名烏金散一名肉桂散治熱病胎死腹中此病因母患熱病至六七日以後臟腑極熱熏煮其胎是以致死緣兒死身冷不能自出但服黑神散暖其胎須臾胎即自出何以知其胎之已死但看産母舌青者是其候也及治敗血不散乍寒乍熱桂心當歸芍藥甘草乾薑生乾地黃各一兩黑豆炒去皮二兩附子半兩上為細末每服二錢空心溫酒調下一方無附子用蒲黃夫妊娠謂之重身二命系焉將理失宜皆能損胎不特病熱熏煮所致或因頓僕驚恐出入觸犯及素有癥瘕積聚壞胎最多候其舌青即知子死養胎論曰面青舌赤母死子生唇青吐涎子母俱斃又有雙懷二胎或一死一生其候尤難知自非臨期審視未易預逆不可不備學也然以黑神散溫胎謂若補助産母使其氣正免致虛邪之困頓胎自下矣催生湯殊勝黑神散葛根散治妊娠數月胸膈煩躁唇口乾渴四肢壯熱少食葛根黃芩人參葳蕤黃耆麥門冬甘草各等分上㕮咀每服四錢水一盞竹茹一塊如錢大煎至七分去滓溫服無時知母散治妊娠煩躁悶亂口乾及胎臟熱知母麥門冬甘草各半兩黃芩赤茯苓各三分上㕮咀每服四錢水一盞煎至七分去滓入竹瀝一合更煎二沸溫服一方用竹茹一塊無竹瀝人參飲子治妊娠熱病壯熱頭痛嘔吐不止不食心胸煩悶經云熱病與中暑相似但熱病者脈盛中暑者脈虛人參竹茹家葛根各一兩蘆根二兩麥門冬一兩半知母三分上㕮咀每服四錢水一盞入連根蔥白三寸煎至七分去滓溫服梔子仁飲子治妊娠熱病出斑黑色小便如血氣急欲絶胎欲落梔子仁升麻石膏生乾地黃各二兩黃芩大青各一兩上㕮咀每服半兩蔥白七寸豉四十九粒水一盞煎至五分去滓無時溫服救急有杏仁無地黃石膏一方加青黛無大青又方以陳皮如雞子大酒煮服救妊婦危困治妊娠熱病六七日熱入腹大小便祕澀煩熱上以牛糞水調塗腹上勿令乾縮脾飲解伏熱除煩渴消暑毒止吐痢霍亂之後服熱藥太多致煩躁者草果仁四兩烏梅肉三兩甘草二兩半上㕮咀每服半兩水一碗生薑十片煎至八分服以熱水溫冷任意柴胡石膏湯治妊娠傷暑頭痛惡寒身熱躁悶四肢疼痛項背拘急口舌乾燥柴胡四兩甘草二兩石膏八兩上㕮咀每服二錢水一盞姜五片煎至六分去滓溫服若氣虛體冷加人參四兩治妊娠熱病蔥白五兩豆豉一升上以水六升煮取二升分二服取汗葵子湯療妊娠得病六七日以上身熱入臟大小便不利安胎除熱葵子仁二升滑石四兩上以水五升煮取一升去滓取服須臾當下便愈蔥豉湯治妊娠熱病煩躁口乾小便澀赤治妊娠熱病方以車轄脂酒服一方用水調服半匙又方以清羊屎水調塗腹上勿令乾又方上以水服伏龍肝一雞子大亦可調為泥塗臍下治大熱煩悶者用葛根汁二升分三服如人行五里久進一服一方水煮葛根服勿用野葛根傷胎又方以燒大棗七枚為末酒和服又方出千金方用槐實燒灰取方寸匕酒和服治妊娠熱病胎死腹中下之用烏雞一隻去毛細銼以水三升煮取二升去雞通手用衣帛蘸摩臍下胎自出鹿角湯治妊娠熱病胎死腹中用鹿角屑一兩水一碗蔥白五莖豆豉半合同煎至六分去滓溫分二服良效一名鹿角散治妊娠得病應服湯藥者先搗小豆一升細篩雞子黃和如鵝子大為二餅熟炙先令啖盡食頃乃服余藥不爾多傷胎治妊娠熱病用水底泥泥心下三寸立愈治妊娠三四月日常時煎燥忽煩悶不識人去大腑熱然後吃此方鉤藤桔梗桑寄生麥門冬茯苓知母防風各等分上細搗羅為末每服五錢水一碗煎取八分食後去滓吃連吃一盞亦無妨但大腑熱即可連吃也時氣附論夫四時之間忽有非節之氣如春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反暖非其節而有其氣而一氣之至無人不傷長少雖殊病皆相似者多夾於毒也言其時普行此氣故云此時氣也妊娠遇之重者致傷胎也方麥門冬散治妊娠五月至十月足患時氣五六日不得汗口乾多吃冷水熱氣上衝喘息悶亂麥門冬知母茅根各一兩石膏三兩葛根元參川升麻甘草赤芍藥麻黃川大黃子芩人參赤茯苓遠志各半兩上搗粗羅為散每服四錢水一盞入淡竹茹一分生薑半分煎至六分去滓不計時候溫服秦艽散治妊婦時氣五六日不得汗口乾多吃冷水狂語嘔逆秦艽柴胡各一兩赤茯苓前胡甘草犀角屑家葛根川升麻黃芩各半兩石膏二兩上㕮咀每服四錢水一盞姜半分淡竹茹一分煎至六分去滓無時溫服一方加人參又方敗毒散升麻葛根湯皆可用之麻黃散治妊娠五月或七八月卒患時氣煩熱口乾心躁頭痛四體煩疼不得安臥麻黃石膏赤芍藥甘草葛根黃芩麥門冬各一兩柴胡半兩上搗篩為散每服四錢水一盞生薑半分煎至六分去滓不計時候溫服遠志散治妊娠時氣五六日未得汗口乾狂語亂見鬼神吃食不得遠志甘草麻黃各半兩麥門冬薯蕷葛根升麻各一兩石膏二兩上搗篩為散每服四錢水一盞入生薑半分煎至六分去滓不拘時候溫服葛根飲子治妊婦時氣煩熱口乾頭痛家葛根麻黃各半兩石膏一兩豉一合白朮半合梔子仁六七枚蔥白二莖上細切以水二大盞煎至一盞三分去滓無時分溫三服汗出為效治妊娠時氣頭痛腰背強壯熱升麻青黛前胡梔子仁黃芩各二兩石膏八分家葛根三兩上㕮咀以水五升煎取二升半去滓分為三服浮萍方治妊娠時氣大熱令子不落護胎浮萍川朴硝蛤粉藍根各等分大黃微炒上為末水調敷臍上安胎解煩熱極妙一名護胎救生散十全方治妊娠患時疾黃芩鬱金各一兩白朮一分上為末每服一大錢加藍根少許水一中盞煎至七分服一方地黃水下汗出效未得汗再服即瘥又妊婦患時疾用雞卵墜井至泥隔宿取出吞之必無虞矣一方無白朮消熱飲子治妊婦時氣六七日熱甚大小便不利宜服此川芒硝一兩葵子三兩上以水二大盞煎至一盞三分去滓不計時候分溫三服以利為效治妊娠而得時病令胎不傷上以黃芩三兩搗末取雞子白三枚水和煮攪之吹去沫取三升去滓令勻再服伏龍肝方治妊娠時氣身大熱令子不落護胎方用伏龍肝研令極細水調塗臍下二寸干則易瘥即止泔清亦可水調服或酒調服一方取井水泥塗心下三寸干則易竹瀝方治妊娠時氣未能服藥且單用上取竹瀝一大盞不計時候分為三服汗出當解治妊娠得時氣令胎不傷方上取雞子以絹袋盛投井中浸令極冷敲破吞之服六七枚至佳治妊娠六七月感時氣煩熱口乾煩躁頭痛麻黃散主之麻黃一錢赤芍藥柴胡各半錢甘草三分半計二錢三分半銼作二服姜三片水一盞煎八分溫服煩渴附論夫足太陰脾之經也其氣通於口手少陰心之經也其氣通於舌若妊娠之人臟腑氣虛營衛不理陰陽隔絶熱氣乘於心脾津液枯少故令心煩而口乾也妊娠面赤口苦舌乾心煩腹脹者何蓋緣恣情飲酒因食桃梨李羊雞面魚鱣腥毒物至令百節痠痛大小便結澀可服歸涼節命散方羚羊角散治妊娠煩躁體熱口乾肢節疼痛少思飲食羚羊角犀黃芩麥門冬人參赤芍藥木通以上各三分柴胡一兩黃耆甘草各半兩上搗篩為散每服四錢以水一盞煎至六分去滓不拘時溫服升麻散治妊娠煩躁體熱口乾四肢疼痛吃食減少川升麻柴胡各一兩知母三分梔子仁黃耆甘草黃芩麥門冬枳殼各半兩上搗篩為散每服三錢水一盞入竹茹一分煎至六分去滓不計時候溫服赤茯苓散治妊娠心膈氣壅滯煩躁口乾食少赤茯苓黃耆柴胡各一兩紫蘇葉人參陳橘皮大腹皮甘草各半兩前胡三分上搗為散每服四錢以水一盞煎至六分去滓不計時候溫服地骨皮散治妊娠煩躁體熱疼痛口乾食少地骨皮黃芩人參黃耆葳蕤麥門冬甘草赤芍藥各半兩柴胡一兩上搗篩為散每服四錢水一盞入生薑半分淡竹葉二七片煎至六分去滓不計時候溫服歸涼節命散治妊娠恣情飲酒因食桃李果魚羊雞面腥膻毒物致令百節痠疼大小便結澀面赤口苦舌乾心煩腹脹川芎苧根白芍藥麥門冬當歸白朮各一兩糯米半合甘草半兩上㕮咀每服四錢水一盞半煎至一盞去滓溫服不拘時候一方有荊芥無麥門冬黃連散治妊娠心熱煩躁口乾舌澀多渴黃連栝蔞根地骨皮葳蕤犀角屑黃芩川升麻甘草各一兩上搗篩為散每服三錢水一盞煎至六分去滓不拘時候溫服治妊娠體熱煩躁口乾吃食減少宜服此方人參葛根黃耆秦艽麥門冬赤茯苓以上各一兩知母三分甘草半兩上搗篩為散每服四錢水一盞入生薑半分淡竹葉二七片煎至六分去滓不計時候溫服知母散治妊娠口乾煩渴上焦壅熱赤茯苓黃芩黃耆各一兩半麥門冬一兩知母一兩甘草一分桑白皮半兩上㕮咀每服四錢用水一盞半竹瀝一合同煎不以時候服治妊娠心熱煩躁口乾舌澀多渴梔子仁麥門冬黃耆生乾地黃各三分秦艽一兩甘草一分上搗篩為末每服三錢以水一盞煎至六分去滓不計時候溫服栝蔞子散治妊娠心煩躁熱口乾頭目不利栝蔞子黃耆枳殼各一兩人參甘草各半兩石膏二兩上搗篩為散每服三錢水一盞入竹葉二七片同煎至六分去滓不計時候溫服治妊娠口乾煩渴上焦壅熱黃耆知母地骨皮犀角屑嫩葛各二分上㕮咀每服四錢水一盞半竹瀝一合同煎不以時候服之治妊娠心熱煩躁口乾舌澀多渴青竹茹一兩麥門冬半兩甘草一錢炙上以水一大盞煎至七分去滓不計時候分溫二服霍亂吐瀉附論夫陰陽清濁相干謂之氣亂氣亂於腸胃之間為霍亂也但飲食過度觸冒風冷使陰陽不和致清濁相干腸胃虛者受之故霍亂也霍亂者先心痛則先吐先腹痛則先利心腹俱痛則吐利併發有頭痛體疼發熱而吐利者亦為霍亂所以然者挾風而有實故也風折血氣皮膚閉密血氣不得宣通致令壯熱風邪乘其經脈氣上衝於頭則頭痛風氣入於腸胃腸虛則泄利胃逆則吐逆故為吐利也吐利甚則煩臟腑虛故也又手足逆冷陽氣暴竭謂之四逆也妊娠而病之吐利甚者則傷胎也方白朮散治妊娠霍亂吐瀉過多傷冷胎臟不安白朮白茯苓草豆蔻陳橘皮厚朴各一兩芎藭當歸各三分人參乾薑各半兩上搗篩為散每服四錢水一盞入棗三枚煎至六分去滓不計時候稍熱服藿香散