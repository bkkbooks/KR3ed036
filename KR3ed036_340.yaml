搗羅為散米飲調下二錢食前服縮胎散治妊娠下痢赤白心腹㽲痛小便澀方枳殼二兩香附子二兩甘草一兩半上為末孕婦未産前日常服如茶點之能縮胎生産絶易須百沸湯點服罌粟湯治婦人妊娠痢疾裡急後重百藥不效罌粟殼甘草烏梅上等分㕮咀白水煎服立效療妊娠血痢以阿膠二兩以酒一升半煮取一升頓服大小便祕澀附論夫妊娠大小便不通者因臟腑氣實而生於熱熱者隨停之處則成病也若熱結於大腸則大便不通結於小腸則小便不通若大小腸俱為熱所結故煩滿而大小便皆不通也又云小腸有熱熱入於內脬熱結甚者令小便不通則心脅小腹氣澀而喘急也陳無擇云妊娠胎滿逼胞多致小便不利者或心腎氣不足不能使胞冷清濁相干為諸淋病致小便不通名曰轉胞又胎滿尿出不知時名曰遺尿治之各有方方檳榔散治妊娠大小便不通心腹脹滿妨悶不欲飲食手足煩熱檳榔赤茯苓大腹皮木通郁李仁北五味各一兩桑寄生甘草苦梗各一兩上為粗末每服三錢水一盞煎至六分溫服一方無五味子歸涼節命散治妊娠恣情飲酒或食生果魚羊雞面毒物致令百節痠痛大小腑祕澀面赤口苦心煩腹脹梔子湯治妊娠大小便不通臍腹脹痛梔子仁一兩半石膏四兩黃芩一兩半澤瀉二兩柴胡一兩半赤芍藥二兩葳蕤一兩半車前草切半兩上粗搗篩每服四錢匕水一盞半淡竹葉十片同煎至八分去滓食前服柴胡通塞湯治妊娠大小便不通下焦熱結柴胡黃芩陳橘皮澤瀉羚羊角各三兩梔子仁一兩石膏一兩大黃銼炒一兩上粗搗篩每服四錢匕水一盞入生地黃一分拍破豉半分同煎至七分去滓食前溫服治妊娠大小便不通熱閉心膈腹脅妨悶妨害飲食大黃木通檳榔各一兩枳殼三分大腹皮二枚訶黎勒四個半生半煨上為末以童子小便一盞蔥白二寸同煎至六分調下二錢不拘時候車前子湯治妊娠大小便俱不通車前子五兩木通四兩黃芩二兩郁李仁二兩半大黃二兩上粗搗篩每服四錢匕水一盞半煎至八分去滓食前溫服大腹皮散治妊娠大小便祕澀浮腫枳殼大腹皮甘草赤茯苓各等分上為細末每服二錢濃煎蔥白湯下不拘時候冬葵根湯治妊娠大小便不通七八日以上腹脹煩悶冬葵根乾者一握洗冬即用子車前草一兩乾者切木通細銼三兩大黃銼炒半兩上粗搗篩每服五錢水一盞半煎至八分去滓食前溫服茅根湯治妊娠大小便不通結悶氣急脹滿欲死茅根碎銼滑石車前子微炒大黃銼碎微炒各一兩半上粗搗篩每服四錢水一盞半煎至八分去滓食前溫服木通湯治妊娠大小便不通下部脹滿坐臥不安木通銼碎二兩滑石三兩大麻仁一兩大黃銼碎生用二兩上粗搗篩每服四錢水一盞半煎至七分去滓空心溫服榆白皮湯治妊娠大小便不通榆白皮細銼一兩半桂去粗皮一兩銼碎甘草一兩半炙滑石三兩上粗搗篩每服四錢水一盞半煎至七分去滓食前溫服冬葵子湯治妊娠大小便不通冬葵子二兩微炒大黃一兩銼炒上粗搗篩每服三錢水一盞煎至七分去滓食前溫服冬葵根汁方治妊娠大小便不通生冬葵根洗二斤細切爛搗生細布捩取汁三合生薑四兩洗切爛研生細布絞取汁半合上和令勻分三服空心日一服未利再服又未利盡三服治妊娠小便不通臍下妨悶虛羸大便祕車前子一兩大黃半兩上為細末每服三錢空心蜜調下葵子湯治妊娠得病六七日以上身熱入臟大小便不利安胎除熱用葵子研為末酒調下治婦人雙身大小便不利用八正散大作劑料去滑石加葵菜子煎服經曰膀胱不利為癃者小便閉而不通也如正八散加木香取效更捷經曰膀胱氣化則能出焉然後五苓散三五服則愈也治妊娠大小便不通用豬脂如半雞子大碎切以酒半升暖令沸投豬膏內更煎一兩沸分三服食前溫服未通再服治妊娠大小便不利方用甘遂煨令黃搗細羅為散每服不計時候以水調下一錢匕治大小便赤澀大腹皮枳殼甘草各一錢赤茯苓三錢銼作三服水一盞半煎一盞將郁李仁二錢半去皮尖同煎五七沸空心連服通為度如不通必是大腑熱祕可服後藥枳殼一錢大黃二錢甘草一錢三味為細末作三服濃煎蔥白湯調下雖通小便復澀脹煩熱不得睡臥而反倚息心胞系戾不得溺者病名轉胎可服八味丸治妊娠大腑祕熱非時腰痛行履不得方杏仁桔梗升麻枳殼前胡各一分大腹皮一兩上為細末每服二錢水一盞二分煎三四服食後臨臥徐徐去滓服治妊娠小便不利大腑熱小便時水道中疼痛不可忍方葶藶子麥門冬知母柴胡茯苓芎藭升麻枳殼杏仁各一分冬葵子三銖上細杵羅為末每服二錢水一盞煎取九分食後臨臥去滓吃大腑熱服後方麥門冬升麻大黃杏仁各一分大腹皮一兩上細杵羅為末每服三錢水一盞二分煎取一盞食後臨臥徐徐去滓吃治妊娠通身瘙癢漸次面目渾身四肢俱腫心躁不安大小腑祕熱宜服此方吃此藥了小便通盡平復如故更不須吃後面方若尚餘數分小便未通即吃後面通小腸方黃芩山梔杏仁前胡升麻知母桔梗大黃枳殼葶藶各等分上細杵羅為末每二錢水一盞蔥白三枚同煎四五沸瀉出去滓溫和食後吃
