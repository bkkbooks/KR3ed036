body:
  text: 卷三百三十七妊娠諸疾門養胎胎教附論夫至精才化一氣方凝始受胞胎漸成形質子在腹中隨母聽聞自妊娠之後則須行坐端嚴性情和悅常處淨室多聽美言令人讀誦詩書陳禮說樂耳不聞非言目不視惡事如此則生男女福壽敦厚忠孝賢明不然則男女既生則多鄙賤不壽而愚此所謂因外象而內感也昔太姒妊文王目不視惡色耳不聽惡聲口不談惡言世傳胎教之道是謂此也前論亦略敘之矣然則婦人有終身無子者何也按巢氏病源云婦人無子者蓋有三焉一者墳墓不嗣二者夫婦年命相剋三者夫疹婦病皆令無子若夫疹婦病可以服藥而後能有子余皆不可致也今觀是說亦未盡善有人以婦人無子問西京常器之者乃曰女人自少多病服燥藥無節使天癸耗動且早故終身無子又有問襄陽宋大亨者亦然然則婦人妊娠有兩胎者何也余按古今方書並無論及此者惟巢氏論云陽施陰化精氣有餘故生二胎且謂成一胎之理其精有幾耶今觀婦人有兩胎者其精神氣宇略無小異至於數有兩胎或間成兩胎者有俱男俱女者有一男一女者道藏經云有求子法云婦人月信初止後一日三日五日值男女旺相日陽日陽時交合有子多男若男女稟受皆壯則多子一有怯弱則少子以此推之理可概見焉又婦人妊娠男女之別何也按顱囟經云陽盛發陰當孕成男六腑諸經皆舉其陽陰盛發陽當孕成女六腑諸經皆舉其陰巢氏病源云三陽所會則生男三陰所會則生女葛洪肘後方云男從父氣女從母氣聖濟經云天之德地之氣陰陽之至和相為流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之而成女易稱乾道成男坤道成女此男女之別也凡妊娠有疾投以湯藥有傷胎破血者之忌何也內經云婦人重身毒之奈何岐伯答曰有故無殞衰其大半而已也蓋妊娠有疾不可不投藥也必在醫者審度疾勢輕重量度藥性高下處以中庸不必多品視其疾勢已衰藥宜便止則病去母安子亦無損復何懼於攻治哉凡婦人妊娠十月其說見於古書有不同者多矣按巢氏病源論婦人妊娠一月名始胚足厥陰脈養之二月名始膏足少陽脈養之三月名始胎當此之時血不流行形象始化未有定儀見物而變欲子端正莊嚴可常令見貴人不可見狀貌醜惡人也欲生男宜操弓矢乘牡馬欲生女宜著珥璫施環佩欲子美好玩白璧觀孔雀欲子賢能宜看詩書務和雅手心主養之四月始受水精以成血脈手少陽脈養之五月始受火精以成其氣足太陰脈養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月五臟六腑關節人神皆備此其大略也又五臟論有稱耆婆者論一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月遊其魂兒能動左手八月遊其魄兒能動右手九月三轉身十月受氣足更有稱張仲景者亦然又顱囟經云一月為胎胞精血凝也二月為胎形成胚也三月陽神為三魂四月陰靈為七魄五月五行分五臟也六月六律定六腑也七月精開竅通光明也八月元神具降真靈也九月宮室羅布以定生人也十月受氣足萬象成也今推究數說之理如五臟論者類皆淺陋不經往往妄托其名至於三藏佛書且語涉怪誕漫不可考今按顱囟經三捲雲中古巫方所撰隋人巢氏亦嘗序之今巢氏論婦人妊娠乃不見言之聖濟經源化篇亦獨取顱囟經更不言巢氏論者何哉嬰童寶鑑集云小兒方論起自巫方黃帝云吾不能察幼小賴國有巫方能知小兒之壽夭耳及觀巢氏論小兒候亦云中古有巫方立小兒顱囟經以占壽夭世所相傳者有少小方焉巢氏論小兒則取於顱囟經則是未盡其理故不言之若聖濟經者但取其文句不若巢氏之論其間有胎教之法為可取所以巢氏論妊娠至三月始胎之時欲令見貴人莊嚴若操弓矢施環佩觀孔雀讀詩書之類豈非胎教之理乎嘗試推巢氏所論妊娠脈養之理若足厥陰肝脈也足少陽膽脈也為一臟腑之經余皆如此且四時之令必始於春木故十二經之養始於肝也所以一月二月手心主心胞絡脈也手少陽三焦脈也屬火而夏旺所以胎養在三月四月也屬手少陰心手太陽小腸者以君主之官無為而尊也足太陰脾脈也足陽明胃脈也屬土而旺長夏所以胎養而五月六月手太陰肺脈也手陽明大腸脈也屬金而旺秋所以養胎在七月八月足少陰腎脈也屬水而旺冬所以養胎在九月又況母之腎臟繫於胎是母之真氣子之所賴也至十月兒於母腹之中受足諸臟氣脈所養然後待時而生此論奧微而有至理余書所論皆不能及也觀此則知巢氏之論世更有明之者亦未有過於巢氏之論矣余因述其說又曰王氏脈經云產育人倫莫不愛重今世希見論者且謂夫婦配合陰陽奇偶乾道成男坤道成女天元一氣既已妊娠自可將護胎息無犯禁忌生子必賢明壽考今人嗜欲為樂輕棄性命反又房勞如鳥獸御之亦有時蓋房勞絡脈滿而經脈虛運動之間胎氣亦隨經絡所損難產傷胎墮子皆從此得然間有一降生悖惡壽夭則患胎驚變生諸病難救療豈不痛哉又曰妊娠臟腑筋脈濡滯關節壅塞切忌晝寢不可等閒服藥針灸思慮悲憂驚恐胎孕須要頻頻行步寬緩日行三千步用溫水濯足澡浴不可盆防水氣衝胎可保無危八九個月食葵菜臨產日飲粥飯或爛煮雌雞取汁煮溫飽食則氣順下必易分娩自然無病飢渴氣乏大冷太熱物損又云孫真人大率妊娠唯在抑陰助陽素問陰搏陽別謂之有子蓋關前為陽關後為陰尺中之脈按之搏手而不絕也妊子也婦人平居陽氣微盛無害及其妊子則方閉經隧養胎氣若陽盛搏之則經血旺行胎乃不固素問陰虛陽搏謂之崩其抑陽助陰之方甚多然胎前藥唯惡群隊若陰陽交雜別生他病唯是內補丸佐之使陽不至強陰不至弱陰陽調勻有益胎嗣此前人未嘗論及二味熟乾地黃四兩酒浸當歸二兩酒浸將息以全人命更得明醫喻於人幸莫大焉氣質生成章云具天地之性集萬物之靈陰陽平均氣質完備咸其自爾然而奇偶異數有衍有耗剛柔異用或強或羸血營氣衛不能逃於消息盈虛之理則稟質之初詎可一概論耶是以附贅垂疣駢拇枝指侏儒跛蹩形氣所賦有如此者瘡瘍癰腫聾盲喑啞瘦瘠疲瘵氣形之病有如此者然則胚胎造化之始精遺氣變之後保衛輔翼固有道矣天有五氣各有所湊地有五味各有所入所湊有節適所入有度量凡所畏忌悉知戒慎資物為養者理固然也故寢興以時出處以節可以高明可以周密使霧露濕邪不得乘間而入因時為養者理宜然也故必調喜怒寡嗜欲作勞不妄而氣血從之皆所以保攝妊娠使諸邪不得干焉苟為不然方授受之時一失調養則內不足以為中之守外不足以為身之強氣形弗克而疾疚困之若食兔缺唇食犬無聲食雜魚而生瘡癬之屬皆以食物不戒之過也心氣大驚而癲疾腎氣不足而解顱脾胃不和而羸瘦心氣虛乏而神不足之屬皆以氣血不調之故也誠能食飲知所戒推而達之五味無所傷誠能於氣血知所調推而達之邪氣無所乘茲乃生育相待而成者故曰天不人不因人妊娠之人有宿挾疴瘵而後有娠或有娠時節適乖理致生疾病並令腑臟衰損氣力虛羸令胎不長故須服藥去其疾病蓋其氣血以扶養胎者也妊娠將理無方脾胃不足飲食減退不能行營衛化精微養衝任故令胎臟內弱子氣不足生化稍虧巢元方謂母病療母則胎安是也若使脾胃和而能飲食水穀化而運氣血則何慮胎氣不長也又云人由受氣至於有生十二經脈迭相滋養猶之物也得寒溫之正土地之宜無物不長凡胎處胞中或有萎燥者蓋由妊婦所稟怯弱不足自周陰陽血氣偏系非冷即熱胞胎失於滋利所以萎燥而不長也日月雖過不能生育亦有後時致失者惟宜資母血氣俾陰陽調通本末相應則胎從而有養矣又云妊娠一月謂之始形二月謂之始膏三月謂之始胎當是之時血脈不流形象始化男女於此儀則未分緣感而應所以孕婦欲令見榮貴端正之人不欲見傴僂侏儒之輩及猿猴犬馬怪禽異獸夜臥宜息心靜慮慎勿亂思恐形異夢而感不祥也妊婦所以擇食者蓋假五氣五味生成五臟氣味各隨所喜而歸之陰陽應象論曰酸生肝苦生心甘生脾辛生肺咸生腎此五臟假五味以生也六節藏象論曰臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎此五臟假五氣以成形也若形藏未備則隨其不足而孕婦必欲其氣味食之蓋陽為氣陰為味氣化則精生味化則形長誠以人之生也氣本於天形本於地內經謂天食人以五氣地食人以五味正此之謂若夫天地既分形質不完者皆孕婦擇食之時不得其氣味故視斜覷短偏瞽雙盲手攣足跛腰傴背僂此肝形之不備也言遲語吃或啞或聵神氣昏塞此心形之不備也胸背凸凹舌短唇缺此脾形之不備也毫毛疏薄髮鬢禿落或毫毛通白皮膚偏赤此肺形之不備也毛髮焦黃形體黑小五硬五軟數歲不能行此腎形之不備也由是孕婦擇食假其氣味生成五臟一有不備病輒隨之譬猶陶冶成器一或苦窳是水火之濟不調豈曰工之良哉方烏雌雞湯治妊娠一月名始胚飲食精熟酸美受御宜食大麥毋食腥辛是謂才正妊娠一月足厥陰脈養不可針灸其經足厥陰內屬於肝肝主筋及血一月之時血行痞澀不為力事寢必安靜無令恐畏妊娠一月陰陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服烏雌雞一隻制如食法茯苓阿膠各二兩甘草生薑各一兩吳茱萸一升麥門冬五合人參芍藥白朮各三兩上㕮咀以水一斗二升煮雞取汁六升去雞下藥煎取三升內酒三升並膠烊盡取三升放溫每服一升日三補胎湯大全良方若曾傷一月胎者當預服此方細辛一兩防風二兩乾地黃白朮各三兩生薑四兩吳茱萸大麥各五合烏梅一升上㕮咀以水七升煮取二升半分三服先食服寒多者倍細辛茱萸熱多渴者去之加栝蔞根二兩若有所思去大麥加柏子仁三合一方有人參一兩忌生菜蕪荑桃李雀肉等物艾葉湯一名雞艾湯出千金方治妊娠二月名始膏無食辛燥居必靜處男子勿勞百節皆痛是為胎始結妊娠二月足少陽脈養不可針灸其經足少陽內屬於膽主精二月之時兒精成於胞里當慎護驚動也妊娠二月始陰陽踞經有寒多壞不成有熱即萎悴中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱艾葉丹參當歸麻黃各二兩人參阿膠各三兩甘草六兩生薑六兩大棗十二枚上㕮咀以酒三升水一斗煮減半去滓內膠煎取三升分三服一方用烏雌雞一隻宿肥者治如食法割頭取血內三升酒中相和雞以水一斗二升先煮取汁去雞內藥煎取三升內血酒並膠煎取三升分溫三服忌海藻菘菜黃連湯出千金方若曾傷二月胎者當預服此黃連人參各一兩吳茱萸五合生地黃五兩一方用阿膠上㕮咀以酢漿七升生薑三兩煮取三升分四服日三夜一每十日一修合若頗覺不安加烏梅一升加烏梅者不用漿直用水一方用當歸半兩忌豬肉冷水蕪荑雄雞湯出千金方妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虛是為外象而內感者也妊娠三月手心主脈養不可針灸其經手心主內屬於心無悲哀思慮驚動妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁嗔怒喜頓僕動於經脈腹滿繞臍苦痛或腰背痛卒有所下雄