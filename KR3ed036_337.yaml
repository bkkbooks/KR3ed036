稍飲之當胎所腹上當汗出如牛鼻狀雖有所見胎雖不安者十餘日輒一服此令胎長大甚平安轉女為男附論天地者形之大也陰陽者氣之大也惟形與氣相資而立未始偏廢男女媾精萬物化生天地陰陽之形氣寓焉語七八之數七少陽也八少陰也相感而流通故女子二七天癸至男子二八天癸至則以陰陽交合而兆始故也語九十之數九老陽也十老陰也相包而賦形故陰窮於十男能圍之陽窮於九女能方之則以陰陽相生而成終故也元氣孕毓皆始於子自子推之男左旋積歲三十而至巳女右旋積歲二十而至巳巳為正陽陰實從之自巳懷壬男左旋十月而生於寅女右旋十月而生於申申為三陰寅為三陽而生育之時著矣其稟賦也體有剛柔脈有強弱氣有多寡血有盛衰皆一定而不易也以至分野異域則所產有多寡之宜吉事有祥則所夢各應其類是故荊楊薄壤多女雍冀厚壤多男熊羆為男子之祥蛇虺為女子之祥是皆理之可推也胎化之法有所謂轉女為男者亦皆理之自然如食牡雞取陽精之全於天產者帶雄黃取陽精之全於地產者操弓矢藉斧斤取剛物之見於人事者氣類潛通造化密移必於三月兆形之先蓋方儀則未具陽可以勝陰變女為男理固然也又云張華博物志曰妊娠必謹所感感於善者生子必善感於惡者生子必惡故不欲令見惡物異禽毒獸切忌驢馬犬兔龜鱉鵝鴨無鱗魚黏膩難消化物蕈薑乳餅等屬用醬和藿食損胎難產惟務簡靜動止有節三個月之後聽誦經典詩書諷詠靜處養心目不視惡色耳不聽惡聲如此生子必賢明端正忠孝壽考也方丹參丸出千金方治婦人始覺有娠養胎並轉女為男丹參續斷芍藥白膠白朮柏子仁甘草各二兩人參芎藭乾薑各三兩吳茱萸橘皮當歸各十八銖白芷冠纓燒灰各一兩乾地黃一兩半蕪荑十八銖犬卵一具干東門上雄雞頭一枚上為末蜜和丸如梧桐子大酒服十丸日再稍加至二十丸又方出千金方用原蠶屎一枚以井花水服之日三服轉女為男者蓋陽施陰化所以有娠遇三陰所會多生女子但懷娠二月名曰始膏精氣成於胞里至於三月謂之始胎血脈不流象形而變是時男女未定故令於未滿三月間服藥方術轉令生男也出千金方以斧置妊娠床下系刃向下勿令人知恐不信者令待雞抱卵時依此置於窩下一窩盡出雄雞神效如此雖未試亦不可不知者一法覺三月尿雄雞浴處凡受胎三月逐物變化故古人立胎教能令生子良善長壽忠孝仁義聰明無疾蓋須十月之內常見好景象毋近邪僻真良教也如有觸忤傷胎治各有法又自初覺有娠出千金方取弓弩弦一枚縛婦人腰下滿百日去之一法絳囊盛帶婦人左臂紫宮玉女秘法妊娠三月以前取雄雞尾尖上長毛三莖潛安婦人臥席下勿令知之驗又法取夫發及手足甲潛安臥席下勿令知之妊娠才滿三月要男法出千金方以雄黃半兩衣中帶之要女者以雌黃帶之一方絳囊盛帶之惡阻附論夫妊娠惡阻病者產寶謂之子病巢氏病源謂之惡阻若婦人稟受怯弱或有風氣或有痰飲既妊娠便有是病其狀顏色如故脈息和順但覺肢體沉重頭目昏眩擇食惡聞食氣好食酸鹹甚者或作寒熱心中憒悶嘔吐痰水胸膈煩滿恍惚不能支持不拘初娠皆然但疾有輕重耳輕者不服藥亦不妨重者須以藥療之宜服半夏茯苓湯茯苓丸二方專治阻病然此二藥比來少有服者半夏有動胎之性蓋胎初結慮易致寒熱發作不可不謹也張仲景傷寒論云婦人傷風續得寒熱發作有時此為熱入血室有用黃龍湯小柴胡湯去半夏此蓋為妊婦而設焉宜以白朮散或人參丁香散人參橘皮湯醒脾飲子試之亦效皆不用半夏動胎等藥服者知之水飲停積結聚為痰人皆有之少者不能為害多則成病妨害飲食乃至嘔逆妊娠之病若嘔逆甚者傷胎也原疾之由皆胃氣不調或風冷乘之冷搏於胃故成斯病也亦惡阻之一也又曰婦人所食穀味化為血氣下為月水凡妊娠之初月水乍聚一月為腜二月為胚三月為胎胎成則男女分方食於母而口以焉則腜胚之時血氣未用五味不化中氣壅實所以脾胃不思穀味聞見於物故噁心有所阻也其病心中憒悶頭重目眩四肢怠惰惡聞食氣是矣妊娠之初經隧內閉以氣養血當是之時腸胃茹沮洳散入焦膈若素有痰飲則飲與血搏食飲輒吐頭目旋暈憎聞食氣喜啖酸鹹四肢倦怠不勝持多臥少起厭厭困懶名曰惡阻已產之後胞外余血敗瘀流利名曰惡露蓋惡者不善不淨之義阻者阻節之義血搏痰飲伏於胞絡難除也當漸消之露者露水之露內裹於胞臟隨胎而至不可遲也當急逐之由是之故胎前曰惡阻產後曰惡露古人命名深有意也惡阻病者心中憒悶頭重目眩四肢沉重懈惰不欲執作惡聞食氣欲啖鹹酸多睡少起世云惡食是也乃至滿三月四月日巳上大劇吐逆者不能自勝舉也此由婦人本虛羸血氣不足氣力又弱兼當風取冷太過心下有痰水挾之而有娠血既已閉水積於臟氣不宜故心煩憒氣逆則嘔吐血既不通經絡痞澀則四肢沉重挾風則頭眩故有胎而病惡阻也所謂欲有胎者其人月水尚來而顏色肌肉如常但加沉重憒悶不欲食飲不知患所在脈理順續四時平和即是欲有胎也如此已經二月日也方半夏茯苓湯出千金方治妊娠阻病心中憒悶空煩吐逆惡聞食氣頭眩體重四肢百節疼痛沉重多臥少起惡寒汗出漸極黃瘦半夏生薑各三十銖乾地黃茯苓各十八銖橘皮旋覆花細辛人參芍藥芎藭桔梗甘草各十二銖上㕮咀以水一斗煮取三升分三服若病阻積月日不得治及服藥冷熱失候病變客熱煩渴口生瘡者去橘皮細辛加前胡知母各十二銖若變冷下痢者去幹地黃入桂心十二銖若食少胃中虛生熱大便閉塞小便赤少者加大黃十八銖去地黃加