篩每服三錢以水一盞入生薑一分拍破棗二枚煎至六分去滓溫服食前人參湯治妊娠一兩月惡食手足煩悶人參知母焙枳殼麩炒去瓤令黃黃芩去黑皮各一兩大腹一枚並皮子用銼碎上㕮咀每服三錢以水一盞生薑半分切煎至七分去滓溫服食後日二前胡飲治初妊娠惡阻食即吐逆頭痛顛倒寒熱前胡去蘆頭細辛去苗葉白茯苓去黑皮甘草炙厚朴去粗皮塗生薑汁炙煙出七遍各半兩上為粗末每服二錢水一盞生薑一分切同煎至六分去滓溫服不拘時日二服一方加人參名前胡湯麥門冬飲出聖惠方治妊娠阻病胎不安寒熱嘔逆氣滿不思飲食麥門冬去心焙人參白茯苓去黑皮亦作赤阿膠炙令燥各一兩甘草炙銼三分上為粗末每服三錢匕以水一盞入生薑一分拍碎棗二枚同煎至六分去滓食後溫服日二一方加陳橘皮姜橘湯治妊娠惡阻嘔吐涎痰不能食生薑一兩一分陳橘皮去白焙青竹茹各半兩前胡去苗三分檳榔銼二枚上銼如麻豆每服三錢水一盞煎至七分去滓溫服不拘時茯苓丸出肘後方療妊娠惡阻嘔吐顛倒垂死不自勝持服之即效茯苓人參各一兩肉桂熬甘草炙枳殼炙各半兩上搗篩蜜和丸每服二十丸加至三十丸日三服古今療胎病方有類十首不問虛實冷熱胎死者活此方緣妊娠忌桂所以熬白朮散出十便良方治惡阻吐清水甚害十餘日粥漿不入者白朮一兩人參半兩丁香二錢半甘草一錢上為末每服二錢水一盞姜五片煎至七分溫服醒脾飲子出永類鈐方治妊婦阻病嘔逆不食甚者中滿口中無味或作寒熱草豆蔻以濕紙裹灰火中煨令紙干取出去皮用厚朴制各半兩乾薑三分甘草一兩一分上為細末每服二大錢水一大盞棗二枚生薑三片煎至八分去滓呷服病輕者只一二服便能食舊有橘紅二兩治寒熱瘧痢不食後人去橘皮以乾生薑代乾薑治老人氣虛大便秘少津液引飲別有奇效一方用乾薑去橘皮亦名醒脾飲子治阻病極為神驗四七湯出如宜方治妊娠三月惡阻為病氣鬱生痰半夏五兩洗七次白茯苓四兩厚朴三兩薑汁製紫蘇二兩上㕮咀每服四錢用水一盞半姜五片棗一枚煎至七分去滓不拘時候人參丁香散出大全良方治妊娠惡阻胃寒嘔逆翻胃吐食及心腹刺痛人參半兩丁香藿香葉各一分上為散每服三錢水一盞煎至七分去滓溫服無時人參半夏丸出聖惠方治妊娠惡阻病醋心胸中冷腹痛吐逆不喜飲食半夏湯泡七次人參乾生薑各半兩上為細末以生地黃汁浸蒸餅為丸如梧桐子大每服四十丸米飲送下不拘時候小地黃丸出保慶集方治妊娠酸心吐清水腹痛不能食人參乾薑炮各等分上為末用生地黃汁丸如梧桐子大每服五十丸米湯下食前服之濟生方加製半夏等分治妊娠忽下黃汁如膠或如出豆汁出大全良方苧根切二升去黑皮銀一斤上以水九升煎取四升每服入酒二升或一升煎藥取一升分作二服治阻病出仁存方用香附子末熱湯調服參橘散出醫方集成治妊娠三月惡阻吐逆不食或心虛煩悶赤茯苓橘皮去白各一兩麥門冬去心白朮厚朴薑製人參甘草炙各半兩上㕮咀每服四錢水一盞姜七片竹茹少許煎七分去滓溫服赤茯苓散出楊氏家藏方治妊娠惡阻心胸煩悶頭暈噁心四肢昏倦嘔吐痰水惡聞食氣赤茯苓去皮半夏湯洗七遍陳橘皮去白桔梗去蘆頭乾地黃洗焙各一兩白朮川芎人參去蘆頭赤芍藥各三分旋覆花甘草炙各半兩上㕮咀每服三錢水一盞半生薑三片煎至一盞去滓熱服不拘時候人參調中湯出楊氏家藏方調脾肺氣治胸脅滿悶四肢煩熱及妊娠阻病心胸注悶嘔逆不思飲食人參去蘆頭甘草炙各半兩枳殼麩炒去瓤厚朴薑汁製白朮白茯苓去皮各一兩柴胡去苗細辛去葉土藿香葉去土陳橘皮去白各三分上件為㕮咀每服三錢水一盞生薑三片同煎至七分去滓溫服食前李氏家傳快氣湯出產經自初妊娠惡阻便可服此寬中快氣抑陽輔陰入月滑胎易產枳殼五兩縮砂香附子甘草各二兩上各淨秤同炒為末湯調服溫真人方出產經枳殼五兩川當歸木香各一兩甘草各一兩上為末湯調服膠艾湯出指南方治妊娠胞阻阿膠川芎甘草炙各二兩艾葉當歸各三兩上為粗末每服五錢水二盞煎至一盞去滓溫服覺冷痛加乾薑二兩
