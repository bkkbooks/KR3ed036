body:
  text: 卷八十九諸風門中風治中風論夫中風者蓋五臟俱虛乃得是病醫者不治其本先以治風藥如續命湯排風之類投之間有見牙關緊急便下靈寶硃砂牛黃之屬以㗜鼻吐涎無所不至有一於此不復得為全人矣蓋續命排風湯中有杏仁麻黃之類若投一劑一表而虛必為左癱右瘓之人矣良由真氣乘虛應表而出筋脈乾枯也大凡治風之藥往往性涼未宜遽服若醫者察證辨脈的知是中風之候亦有痰厥類中風者宜先服生附子湯加黑豆三十粒煎得痰涎不作口眼歸正能辨人事然後以朮附湯加木香煎服間服六味順氣散月餘候補正氣血脈息稍勻尚有風痰餘證然後服續命排風以驅逐之以此救療百無一失中風甚不難治蓋內外之證分明唯在醫者謹其始耳或初得疾便有熱證亦須開關調氣化涎消滯未宜遽用太熱之藥更在詳審之也安樂後宜清居絶欲若更能不食毒物則必保天年矣如欲調氣化涎宜先服六味順氣散六味順氣散出衛生寶鑑方白朮五兩微炒黃白茯苓三兩人參三兩陳皮三兩半去白麩炒青皮二兩去白甘草二兩炮再麩炒上為細末每服三大錢水一盞半棗子一枚姜二片煎至七分溫服日三四服羌桂湯治中風有汗及一切風壅加倍桂枝極佳川羌活二三兩銼桂枝一兩銼芍藥五兩銼甘草二兩半炙上為粗散每服四錢水一盞半生薑五片棗二枚同煎七分去滓溫服日三服不拘時候治男子婦人雞爪風等疾手足搖動不能舉物服兩料全安方見川芎散犀角升麻湯出衛生寶鑑治中風麻痹不仁鼻額間痛唇口頰車髮際皆痛不可開口雖言語飲食亦相妨左額頰上如糊手觸之則痛此乃足陽明經受風毒血微滯而不行故也犀角一兩二錢半升麻一兩防風羌活各七錢川芎白附子黃芩各半兩白芷半兩甘草二錢半上為細末每服五錢水二盞煎至一盞去滓溫服食後日三服足陽明胃也經云腸胃為市如市𠪨無所不有也六經之中血氣俱多腐熟飲食故飲食之毒聚於腸胃故此方以犀角為主解飲食之毒也陽明經絡環唇挾口起於鼻交額中循頰車上耳前過客主人循髮際至額顱故王公所患此一經絡也以升麻佐之余藥皆滌除風熱黃芩升麻專入胃經為使也稀涎散出經驗良方治風涎不下喉中作聲狀如牽鋸半夏大者十四枚生切片豬牙皂角一條炙上作一服水二盞煎一盞去滓入薑汁少許溫服不能咽徐徐灌之奪命通關散出衛生寶鑑治中風涎上不省人事躑躅花川芎華陰細辛龍腦薄荷上五味等分日乾碾為末用少許以筆管吹入鼻中如噴嚏乃可救急將生附子一枚須重一兩以上者去皮薄切入厚朴切連皮老生薑十大片水一碗半同煎至半碗通口灌服小續命湯出淡寮方本草序例云有男子年六十腳生瘡因食肉不安醫利得愈時出外中風汗出頭面暴腫紫黑色多睡耳輪上有浮胞小瘡黃汁出乃與小續命湯倍加羌活服之而愈治中風氣逆有痰涎衛生寶鑑蘇合姜調灌下咽次用省風小續命湯多增木麝二香煎往往中風之證多因喜怒不常或飲食停滯或怒氣傷神思慮過多損於心臟用局方蘇合香丸三丸生薑自然汁化開灌下咽喉次用局方省風小續命湯各加麝香木香依法煎服一方無麝香附子酒出三因方治中風冷痰癖脹滿諸痹大附子一枚去皮臍切作四片上用醇酒一升春浸五日夏三日秋冬七日每服一合日二三服以痹住為效未知再作淡寮方云凡中風一時諸證蜂起則為困篤倉卒之間藥不可入名醫多用蘇合香丸擦起牙關或以生半夏皂角末吹入鼻竅或灌陳霜梅汁收其痰或服真清油調麝香以疏通其氣又或用麝香煎五積散為之兼行要藥倘或不然殆至風氣日增不得安愈凡中風人湯食不下不能咽藥口噤不開即用黑豆二三升以青布緊裹熱醋鍋內蘸稍熱尉病人前後心胸膺脊令風氣散其口自開然後藥易下耳或炒鹽醋或用微熱灰尉皆可稀蘞丸出風科集驗方治中風口眼喎斜時吐涎沫語言謇澀手足緩弱豨蘞草一名水杴草一名火杴草生於沃壤間帶豬苓氣者是臣訥云江陵府節度使進豨蘞丸方臣有弟訴年三十一中風床枕五年百醫不瘥有道人鍾針者因睹此患曰可餌豨蘞丸必愈其藥多生沃壤高三尺許節葉相對其葉當夏五月以來收每去地五寸剪刈以溫水洗泥土摘其葉及枝頭凡九蒸九曝不必大燥但取蒸為度仍熬搗為末丸如梧桐子大空心溫酒或米飲下二三十丸服至二千丸所患忽加不得憂慮是藥攻之力服至四千丸必得復故五千丸當復丁壯臣依法修合與訴服果如其言鍾針又言此藥與本草所述功效相異蓋出處盛在江東彼土人呼豬為狶呼臭為蘞氣緣此藥如豬蘞氣故以為名但經蒸曝蘞氣自泯每當服後須飯三五匙壓之五月五日採者佳奉宣付醫院詳録治男子女人中風出本草以羊乳和脂作羹食之治中風急喉痹欲死者出本草用白殭蠶以火焙乾令黃色搗篩為末用生薑自然汁調灌喉中效治中風面目相引偏僻牙車急舌不可轉出本草用桂心以酒煮取汁故布蘸㩉病上正即止左喎㩉右右喎㩉左常用大效瓊田草出本草治中風用瓊田草根葉生搗羅蜜為丸服之治三十年風不效者出本草以松葉一斤細切之以酒一斗煮取三升頓服汗出立瘥療暴中風出本草用緊細牛蒡根取時須避風以竹刀或荊刀刮去土用生布拭搗絞取汁一大升和灼然加好蜜四大合溫分為兩服每服相去五六里初服得汗汗出便瘥此方得之嶽鄂鄭中丞鄭頃年至潁陽因食一頓熱肉便中暴風外孫盧氏為潁陽尉有此方當時便服得汗隨瘥神效牛蒡根本草名惡實一名鼠黏草治鍍金燒粉人多患風者出本草須飲酒並食肥豬肉及服鐵漿可御其毒又方出本草用紅藍子一升搗碎以無灰酒一大升八合拌了曝令乾重搗篩蜜丸如梧桐子大空腹酒下四十丸紅藍子乃紅花子也療中風才覺不問輕重便須吐涎然後次第治之用羌活五大兩以水一大斗煎取五升去滓更入好酒半升和之以牛蒡子半升炒下篩令極細以前湯酒斟酌調服取吐如已昏眩即灌之更不可用下藥及針灸但服用補治湯餌自瘥葉氏十味銼散出醫方集成治中風血弱臂痛連及筋骨舉動艱難附子三兩炮去皮臍當歸去土洗切黃耆炙白芍藥各二兩川芎不見火防風去蘆白朮各一兩半肉桂去粗皮不見火一兩茯苓熟地黃洗淨用少酒蒸令乾焙之各七錢半上㕮咀每服四錢水一盞姜八片棗三枚煎食後臨臥服治中風心煩恍惚或腹中痛滿或時絶而復蘇者出本草取釜下土五升搗末以冷水八升和之取汁盡服之口已噤者強開以筒灌之使得下入便愈甚效神力圓出經效濟世方治手足失力麻痹悶肭打撲風血凝滯走疰作痛及癱緩等疾乳香沒藥當歸洗淨去蘆頭以上各半斤兩草烏好酒浸春夏三日秋冬五日去皮晏木威靈仙各一兩五靈脂二兩上為末用好酒煮麵糊丸如梧桐子大食後臨臥用溫酒下五丸旋加至七八丸服藥後忌熱物少時亦豫家常用甚效治中風語澀四肢拘急産後婦人亦宜服之上羌活三兩為粗末每服五錢水酒各半盞煎至六分去滓不拘時候溫服治中風傷寒頭痛用蒼耳根葉生搗和小兒尿絞取汁冷服一升日三服甚驗治中風面浮腫喉咽不通用蔥葉作羹粥及炸作齏食之良治小中風用銅緑不拘多少細治如粉醋和圓如雞頭大才覺中者便用薄荷酒磨下一丸須臾便吐其涎如膠令人以手拔之候吐罷神效治中風頭眩心肺浮熱手足無力筋骨煩痛言語似澀一身動搖用烏驢頭一枚燖洗如法蒸令極熟細切更於豉汁內煮著五味調點少酥食之效肝中風附論內經謂以春甲乙中風為肝風蓋體虛之人腠理開疏肝氣不足風邪乘之筋脈拘攣手足不收言語謇澀項背強直多汗惡風有善悲嗌乾喜怒時增女子者有頭目瞤兩脅痛行常傴僂嗜甘如阻婦狀者有但踞坐不得低頭繞兩目連額上色微青唇青面黃者治法宜灸肝俞百壯遂服續命湯若大青黑面一黃一白者此為肝已傷不可復治數日而斃矣方龍腦丸出聖惠方治肝臟中風口眼不正四肢抽掣語澀昏沉龍腦半兩研入犀角屑半兩秦艽半兩去苗防風半兩去蘆頭麻黃一兩去根節漢防己半兩天雄半兩炮裂去皮臍茵芋半兩甘菊花半兩赤箭一兩獨活半兩白殭蠶半兩微炒桂心半兩芎藭半兩當歸半兩銼微炒羚羊角屑半兩鹿角膠半兩搗碎炒令黃燥乳香半兩研入烏蛇一兩半酒浸去骨皮炒令黃乾蠍半兩生用牛黃一分研入硃砂一分研入麝香一分研入上為末入研了藥令勻煉蜜和搗三五百杵為丸如梧桐子大每服十丸以薄荷溫酒下不計時候服牛黃散出聖惠方治肝臟中風筋脈攣急口眼喎斜言語謇澀神思昏憒牛黃一分研入龍腦一分研入烏犀角屑半兩天麻半兩防風半兩去蘆頭麻黃三分去根節羚羊角屑半兩甘菊花半兩蔓荊子半兩桑螵蛸半兩微炒桂心半兩細辛半兩側子半兩炮裂去皮臍獨活半兩白殭蠶半兩微炒烏蛇二兩酒浸去皮骨炒令黃乾蠍半兩生用阿膠半兩搗碎炒令黃燥蟬殼一分微炒硃砂一分研入麝香一分研入上為末次入研了藥更研令勻每服一錢以豆淋酒調下不計時候服赤箭丸出聖惠方治肝臟中風攻手足緩弱無力口眼喎斜精神不定行步艱難赤箭半兩天雄半兩炮裂去皮臍犀角屑半兩天南星半兩炮裂白花蛇肉半兩酥拌微炒獨活半兩防風半兩去蘆頭芎藭半兩白附子半兩炮裂川升麻半兩白朮半兩白殭蠶半兩微炒桑螵蛸半兩微炒當歸半兩銼微炒細辛半兩酸棗仁半兩微炒萆薢半兩牛黃一分研硃砂一分研入麝香一分研龍腦一分研上為末研入牛黃等令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以豆淋酒下二十丸忌濕面豬肉羊血毒魚等天麻丸出聖濟總録治肝臟中風筋脈不利四肢攣痹天麻二兩苦參二兩菖蒲二兩細辛去苗葉二兩赤箭二兩地榆銼二兩人參二兩牛膝湯浸去苗焙二兩半桂去粗皮一兩半防風去叉二兩赤芍藥二兩芎藭一兩當歸切焙二兩附子炮裂去皮臍一兩陳橘皮湯浸去白焙乾一兩半木香一兩酸棗仁二兩獨活去蘆頭一兩藁本去土二兩威靈仙去土二兩上為細末煉蜜和丸如梧桐子大每服二十丸溫酒下日二服不計時候羚羊角散出聖惠方治肝中風筋脈拘急言語謇澀頭項強直四肢不利心膈煩壅頭目旋眩羚羊角屑三分防風半兩去蘆頭犀角屑半兩麻黃三分去根節前胡半兩去蘆頭人參半兩去蘆頭旋覆花半兩赤芍藥半兩芎藭三分桂心三分羌活三分當歸三分銼微炒漢防己半兩赤茯苓半兩枳殼三分麩炒微黃去瓤黃芩半兩蔓荊子半兩甘菊花半兩甘草半兩炙微赤銼酸棗仁三分微炒上為散每服三錢水一中盞生薑半分煎至六分去滓入竹瀝一合更煎二三沸不計時候溫服羌活散出聖惠方治肝中風筋脈拘急口眼偏斜四肢疼痛羌活三分天麻三分芎藭三分酸棗仁三分微炒鹿角膠三分搗碎炒令黃燥蔓荊子三分羚羊角屑三分人參三分去蘆頭白附子三分炮裂牛膝三分去苗肉桂三分去皴皮薏苡仁三分烏蛇肉三分醋拌微炒萆薢三分犀角屑三分白蘚皮三分地骨皮三分柏子仁三分防風三分去蘆頭上為末每服不計時以豆淋酒調下一錢忌雞豬魚蒜等附子散出聖惠方治肝中風上攻頭目旋暈心驚悸悶四肢拘急附子一兩炮裂去皮臍酸棗仁半兩微炒防風半兩去蘆頭羚羊角屑半兩白蘚皮半兩茯神三分薯蕷三分黃芩半兩龍齒一兩芎藭半兩天麻半兩黃耆半兩銼枳殼半兩麩炒微黃去瓤上為散每服三錢水一中盞生薑半分煎至六