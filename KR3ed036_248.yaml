湯浸去白瓤焙羊肉半斤細切蓽茇半兩上件藥除羊肉外為散以水三大盞合煮取兩大盞半去滓不拘時稍熱服一小盞椒附散出聖惠方治寒疝心腹痛如刺不下飲食自汗出氣欲絶川椒去目及閉口者微炒出汗乾薑炮裂銼共半兩附子炮製去皮臍檳榔白朮青橘皮湯浸去白瓤各二兩上為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不拘時稍熱服高良薑羊肉湯出聖惠方治寒疝心腹痛及脅肋裡急不下飲食高良薑銼赤芍藥銼當歸銼微炒桂心各一兩羊肉一斤半細切上件除羊肉外為散水五大盞合煮取兩盞半去滓不拘時稍熱服一小盞附子丸療寒疝下牽小腹心腹痛附子二兩炮去皮桃仁三兩去皮尖微焙蒺藜子一升去角尖熬上為末蜜和丸如梧桐子大空心酒下十丸漸加十五丸及二十丸日再服忌生菜熱面炙肉筍蒜豬魚治寒疝心腹痛四肢逆冷不欲食出聖惠方高良薑銼當歸銼微炒桂心各一兩上為細末不拘時熱酒送下一錢當歸湯出金匱方治寒疝心腹痛裡急當歸切三兩生薑切五兩羊肉去脂膜切作片一斤上以水一斗煮取五升去滓每服一盞不拘時日三夜二若寒多者加生薑皮一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之治寒疝心腹脅引痛諸藥不可近者出本草以烏頭五枚大者去芒角及皮四破以白蜜一升煎令透潤取出焙乾搗篩又以熱蜜丸如梧子大冷鹽湯吞下二十丸永除又法用煎烏頭蜜汁以桂枝湯五合解之飲三合不知加五合其知者如醉此為中病寒疝積聚附論夫積聚者由寒氣在內所生也血氣虛弱風邪搏於腑臟寒多氣澀則生積聚也積者陰氣五臟所生如發不離其部故上下有所窮也聚者陽氣六腑所成也故無根本上下無所留止但諸臟腑受邪初未能為積聚邪氣留滯不去乃成積聚其為病也或左右脅下如覆杯或臍上下如臂或胃脘間覆大如盤羸瘦少氣或灑淅寒熱四肢不收飲食不為肌膚或纍纍如桃李或腹滿嘔泄寒則痛故云寒疝積聚也其脈弦而緊積聚浮而牢積聚牢強急者生虛弱急者死也方續命散一名食茱萸丸治寒疝積聚邪氣往來厥逆搶心痛羸瘦少氣胸脅滿不嗜食食茱萸二兩芍藥細辛去苗葉前胡去蘆頭各一兩一分乾薑炮烏頭炮裂去皮臍各二兩半紫菀去苗葉黃芩去黑心白朮白薇芎藭人參生乾地黃焙各一兩一分一方用熟地黃蜀椒去目及閉口炒出汗桂去粗皮各二兩半上為末煉蜜和丸如梧桐子大每服七丸米飲或溫酒下食前服一方無黃芩有當歸忌生冷油膩滑物桂心湯治寒疝積聚心腹疼痛結塊不消桂去粗皮大黃略炮皮桔梗銼炒附子炮裂去皮臍木香白朮當歸切焙檳榔赤芍藥各一兩芎藭高良薑銼炒枳實去瓤麩炒共半兩上㕮咀如麻豆大每服三錢水一盞煎七分去滓溫酒服不拘時芫花丸出聖惠方治寒疝積聚動搖大者如鱉小者如杯乍來乍去在於胃脘大腸不通風寒則腸鳴心下寒氣上搶胸脅支滿芫花二兩醋拌炒令乾椒目川大黃銼碎微炒細辛川烏頭炮裂去皮臍赤芍藥赤茯苓桂心木香各一兩半夏湯洗七次去滑桔梗去蘆頭吳茱萸湯浸七次焙乾炒各半兩上為末煉蜜和搗三二百杵丸如梧桐子大每服以溫酒下七丸日三服當下如泥其病即愈鱉甲湯治寒疝積聚心腹結痛飲食不下鱉甲醋炙去裙襴京三稜炮銼大黃銼炒各一兩當歸切焙桂去粗皮赤芍藥木香枳殼去瓤麩炒訶黎勒炮去皮檳榔各半兩銼上為散每服三錢水一盞生薑三片煎七分去滓溫服不拘時候桔梗丸治寒疝邪氣往來堅固積聚不散多寒不得臥苦汗出大小便不利桔梗銼炒藜蘆去蘆頭炙各半兩葶藶子紙上熬厚朴去粗皮生薑汁塗炙銼附子去皮臍炮製各一兩一分人參沙參桂去粗皮各三分杏仁去皮尖雙仁炒五十枚特生礬石一兩燒半日許上為末煉蜜和丸如梧桐子大每服五丸或七丸米飲或溫酒下日三桔梗丸出聖惠方治心腹牢強寒疝邪氣往來堅固積聚苦寒煩悶不得眠臥夜苦汗出大便堅小便不利食不生肌桔梗去蘆頭甜葶藶微炒令香藜蘆去蘆頭微炙桂心厚朴去粗皮塗生薑汁炙令香熟附子炮裂去皮臍當歸銼微炒鱉甲塗醋炙微黃去裙襴川大黃銼碎微炒各一兩杏仁五十枚湯浸去皮尖雙仁麩炒微黃上為末煉蜜和搗三二百杵丸如梧桐子大每於食前溫酒下十五丸檳榔湯治寒疝積聚結塊攻注心腹脹滿檳榔生銼芎藭桔梗銼炒當歸切焙桂去粗皮赤芍藥白朮木香各半兩大黃銼碎微炒一兩上為散每服二錢匕水一盞煎六分去滓溫服不拘時木香湯治寒疝積聚來去攻擊疼痛不欲飲食木香訶黎勒皮炮檳榔銼厚朴去粗皮塗生薑汁炙青橘皮湯浸去白焙各半兩赤茯苓去黑皮三分白朮人參桂去粗皮各一兩上為散每服三錢水一盞生薑三片煎七分去滓溫服不拘時鱉甲丸出聖惠方治寒疝積聚固結不通繞臍切痛腹中脹滿風入五臟憂患所積用力不節筋脈勞傷羸瘦不能飲食鱉甲一兩塗醋炙微黃去裙甘草炙微赤銼甜葶藶微炒令香桂心川烏頭炮製去皮臍川大黃銼碎微炒芎藭赤芍藥檳榔各半兩上為末煉蜜和搗三二百杵丸如梧桐子大每服食前生薑橘皮湯下二十丸白朮湯治寒疝凝結積聚不散攻注腹內疼痛不下飲食白朮二兩赤茯苓去黑皮枳殼去瓤麩炒人參桔梗銼炒桂去粗皮京三稜炮製檳榔銼各一兩上為散每服三錢水一盞煎七分去滓溫服不拘時檳榔湯治寒疝積聚胸腹堅急脹滿不思飲食檳榔生銼桃仁去皮尖雙仁炒郁李仁炒去皮京三稜炮各一兩桂去粗皮青橘皮湯浸去白焙各半兩上為散每服三錢水一盞生薑三片煎七分去滓溫服不拘時候附子丸治寒疝冷氣心腹積聚繞臍切痛飲食不下附子炮製去皮臍吳茱萸湯浸七次焙乾微炒細辛藁本川烏頭炮製去皮臍檳榔各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每服以燒酒下二十丸日三四服蘹香子丸一名香橘散治寒疝積聚臍腹疼痛兩脅脹滿及一切冷氣刺痛皆治蘹香子炒檳榔炮銼京三稜炮銼青橘皮湯浸去白鹽炒黃各半兩木香一分上為散每服二錢入鹽少許沸湯點服不拘時香豉丸療積年腹內宿結疝冷氣及諸癖症等香美爛豉曝乾微蒸令香即止小芥子揀去土石微蒸令香即止各一升上為末煉蜜為丸空腹酒服二十丸漸加至三十丸日二服初服半劑以來腹中微繞痛勿怪之是此藥攻病之候陰疝附論黃帝針經曰足厥陰之脈環陰器抵少腹是動則病丈夫㿗疝即陰疝也嗜欲傷腎腎水涸竭無以滋榮肝氣故留滯內結發為陰疝之病也世俗論陰疝者為腎餘氣殊不知邪實又本於肝經也治法宜瀉邪氣之實補肝經之虛方昆布丸治陰疝腫大偏墜昆布洗去咸炙海藻洗去咸炙蒺藜子炒去角蕪荑仁炒檳榔銼各一兩半枳殼去瓤麩炒大麻仁研各二兩木香黃耆銼訶黎勒炮去核各三分陳橘皮去白炒桃仁去皮尖雙仁炒研菟絲子酒浸一宿別搗各一兩上為末和勻煉蜜丸如梧桐子大每服三十丸空心食前溫酒或鹽湯下葫蘆巴煮散治陰疝攻痛葫蘆巴沉香馬藺花蓬莪朮煨銼蘹香子炒各半兩楝實取肉麩炒木香薑黃檳榔銼桂去粗皮各一兩附子炮裂去皮臍三分甘草炙銼半兩上為散每服三錢水半盞煎七分空心食前和滓溫服葫蘆巴丸治陰疝氣攻疼痛葫蘆巴補骨脂白豆蔻去皮青橘皮去白焙萆薢茴香子炒附子炮製去皮臍肉蓯蓉酒浸切焙牛膝酒浸切焙桂去粗皮防風去蘆菟絲子酒浸搗各一兩上為末酒煮麵糊為丸如緑豆大每服二十丸空心生薑鹽湯下桃仁湯治陰疝牽引小腹痛桃仁去皮尖雙仁炒吳茱萸湯洗焙乾炒陳橘皮去白切焙桂去粗皮海藻湯洗去咸炙各一兩白茯苓去黑皮羌活去蘆頭蒺藜子炒去角各一兩半檳榔十枚銼上為散每服五錢水一盞半生薑五片煎八分去滓溫服不拘時川烏頭丸出聖惠方治陰疝積聚繞臍腹疼痛飲食不下川烏頭炮製去皮臍京三稜煨銼桂心木香郁李仁湯洗去微銼各一兩吳茱萸湯浸七次焙乾微炒細辛甘草炙微赤銼藁本各半兩上為末煉蜜和搗三二百杵丸如梧桐子大每服二十丸生薑湯下川烏頭散治陰疝腹腰痛手足逆冷身體疼痛針灸諸藥所不能任者川烏頭十枚炮裂去皮臍桂枝二兩上為散每服二錢水一盞生薑半分煎八分下蜜半合更煎三沸令熱食前和滓溫服椒附丸治陰疝腫痛上攻臍腹蜀椒去目併合口炒出汗一兩附子炮裂去皮臍桂去粗皮巴戟天去心桃仁去皮尖雙仁炒研芎藭當歸切炒各半兩上為末煉蜜丸如梧桐子大每服二十丸空心日午夜臥溫酒下木香丸治陰疝急脹疼痛卵腫木香陳橘皮去白炒萊蔔子炒青橘皮去白炒桂去粗皮各一兩牽牛子炒二兩上為末煉蜜丸如梧桐子大每服二十丸溫酒下以利為度二氣丸治陰疝上而不下臍腹疼痛石硫黃研黑鉛各一兩上以鉛於銚內熔成汁次下硫黃炒煙焰透移下候冷取出研為細末糯米糊丸如梧桐子大每服二十丸溫酒下蒺藜湯出衛生寶鑑治陰疝牽引小腹痛諸厥疝即陰疝也吸噓勞痛不可忍之蒺藜子炒去角附子炮製去皮臍山梔子各一兩上㕮咀如麻豆每服五錢水一盞半煎八分去滓食前溫服控睪證茴香楝實丸亦治沙參散治陰疝牽引疼痛沙參一兩半桂去粗皮半兩桃仁四十九枚去皮尖雙仁炒研上為散每服二十丸溫酒調下不拘時應痛丸治陰疝撮痛不可忍者韭子炒芎藭上等分為末煉蜜丸如梧桐子大每服三十丸空心溫酒下陰疝腫縮附論夫陰疝腫縮者寒邪客於厥陰之經而陽氣不能自溫故令諸筋拘急陰器緊縮而腫痛也肝者筋之合也筋者聚於陰器而絡於舌本脈不榮即筋縮急則引卵與舌故舌卷卵縮者皆厥陰為病也方硇砂丸治陰疝腫縮疼痛硇砂研木香各半兩楝實去核炒蘹香子炒京三稜炮各一兩上為末煉蜜丸如梧桐子大每服二十丸空心酒下消腎丸治下部腎囊腫脹攻擊疼痛牽牛半斤取頭末四兩二兩炒熱二兩生用香附子淨一兩半兩炒半兩生用破故紙一兩半兩炒半兩生用青木香一兩半兩炒半兩生用川楝子半兩半炒半生用上為細末用大蒜二十個半煨半生爛搗三五百下杵丸如梧桐子大每服五十丸空心蔥鹽湯下取大便三二行不利再加如利即減忌濕面狼毒丸治陰疝腫縮疼痛氣欲絶狼毒炙二兩防葵炮附子炮製去皮臍各二兩上為末煉蜜丸如梧桐子大每服十丸溫酒下空心日午臨臥服黃連丸治陰疝腫縮黃連去須熟艾炙杏仁去皮尖白研各半兩上為末煉蜜丸如梧桐子大每服二十丸用鹽湯下空心服萵苣尉方治陰疝腫縮疼痛萵苣切半斤皂莢銼碎三梃蜀椒去目及閉口者炒出汗一兩上三味少用水煮令相得不可大稀乘熱用布三兩重裹尉腫處冷即易頻尉自消雄黃洗方治陰疝腫縮痛人所不能忍及陰腫大如斗核痛者雄黃研甘草各一兩礬石研二兩上為末每用藥一兩熱湯五升隨手洗腫處良久再暖洗至冷候汗出瘥集驗方無礬石只二味雞翅灰散治陰疝腫縮雞翅左右俱用不限多少燒灰上細研為散每服二錢溫酒調下不拘時槐子丸治陰疝腫縮槐子炒一兩上為末煉蜜丸如梧桐子大每服二十丸溫酒下空心服蔓荊散塗方治陰疝腫縮蔓荊根不拘多少銼碎上為散溫水調塗腫處或以絹布縛之以瘥為度車前子塗方治陰疝腫縮車前子不拘多少上為末湯調塗腫處一方酒調服之狼毒丸治男子陰猝縮入腹急痛欲死名陰疝狼毒四兩防風二兩附子三兩上為末煉蜜丸如梧桐子大每服三丸日夜三度治男子陰疝用槐白皮煎淋浴
