body:
  text: 卷二百四十八㿗疝門心疝附論夫疝者痛也由陰氣積於內寒氣不散上衝心故使作痛謂之心疝也其痛也或如錐刀所刺或隱隱而疼或四肢逆冷或唇口變青皆其候也內經謂診得心脈而急病名心疝小腹當有形也心為牡臟小腸為之使故曰小腹當有形也夫臟病必傳於府今心不受邪病傳於府故小腸受之為疝而痛當有形也世之醫者以疝為寒濕之疾不知心氣之厥亦能為疝心疝者當兼心氣以治之方牡丹丸治心疝心痛如錐所刺牡丹皮桂去皮芍藥烏頭炮去皮細辛甘草炙木香吳茱萸湯浸焙炒檳榔各二兩上為末煉蜜丸如梧子大每服三十丸溫酒下不拘時赤芍藥丸出聖惠方治心疝心腹病刺疼痛脅下脹滿赤芍藥去蘆桔梗去蘆頭細辛桂心川椒去目及閉口微炒出汗乾薑炮製附子炮裂去皮臍木香檳榔各一兩上為末煉蜜和搗三百杵丸如梧桐子大每服以熱酒下三十丸日四五服木香散治心疝心痛不可忍木香羌活去蘆頭檳榔生銼牡丹皮當歸切炒桂去皮青橘皮湯浸去白皮炒蓬莪朮煨各一兩上為散每服二錢沸湯或溫酒調下不拘時蓬莪朮散治心疝痛肢體虛冷蓬莪朮煨檳榔生銼附子炮裂去皮臍甘草銼桂去粗皮胡椒半兩芎藭白朮各三分上為末每服二錢水一盞煎七分溫服不拘時桃仁丸出聖惠方治心疝心痛四肢逆冷面色青黑桃仁湯浸去皮尖雙仁麩炒微黃沒藥安息香乳香麝香細研桂心木香吳茱萸湯浸七次焙乾微炒各一分上為末都研令勻用蒸餅和丸如小豆大不拘時以燒酒嚼下二十丸治心疝心腹中如錐刀所刺疼痛出聖惠方巴豆木香檳榔各半兩附子去皮臍生用川烏頭去皮臍生用各一兩乾漆搗碎炒令煙盡桃仁湯浸去皮尖雙仁麩炒黃蓬莪朮各三分上件藥先以巴豆附子烏頭等三味以水煮一日久取出各去皮巴豆去心膜一處搗如泥諸藥別搗羅為末相和入醋麵糊丸緑豆大不拘時醋湯下五丸芍藥丸治心疝心脅痛及繞臍痛芍藥桔梗去蘆炒細辛去苗葉蜀椒去目閉口炒去汗桂心去皮乾薑炮各三分附子炮裂去皮臍半兩上為末煉蜜丸如梧桐子大每服二十丸溫酒或鹽飲下不拘時木香散治心疝心脅痛及繞臍痛芍藥桔梗去蘆頭細辛去苗葉蜀椒去目合口炒去汗桂去皮乾薑各五分附子炮去皮臍一兩案原缺製法及服法牡丹丸治疝氣心腹痛牡丹桂心川烏頭炮裂去皮臍木香吳茱萸湯浸七次檳榔各一兩上為末煉蜜和搗三二百杵丸如緑豆大每服以溫酒服十丸日四五服硃砂丸治心疝心腹中㽲刺疼痛不可忍硃砂細研半兩桂心半兩桃仁湯浸去皮尖雙仁麩炒黃半兩附子炮製去皮臍一兩麝香半分細研巴豆二十一枚去皮心研紙煨去油上為末麵糊和丸如梧桐子大每服醋湯下二丸治心疝發作有時激痛難忍者以射罔吳茱萸等分搗末蜜丸如麻子大服二丸日三服勿熱食一方以茱萸一升射罔如彈子大一丸合搗以雞子白和丸如小豆大服二丸即止紫桂丸治陰寒交攻心疝疼痛桂去粗皮半兩當歸焙三分吳茱萸湯洗焙一兩上為末醋煮麵糊丸如梧桐子大每服二十丸炒生薑鹽酒下米飲亦得日三服治心疝攻刺心腹疼痛腹脅虛脹宿食不消或時吐逆少思飲食硃砂細研水飛過半夏湯洗七次去渣共一兩川烏頭半兩去皮臍生用上為細末醋煮麵糊和丸如小豆大不拘時以生薑橘皮湯下二溫散治心疝冷痛不可忍附子炮裂去皮臍蓬莪朮煨銼各一兩上為散每服一錢用熱酒調下不拘時婦人醋湯下治三十年心疝神效方射干半兩吳茱萸二兩湯浸七次焙乾微炒上為末煉蜜和丸如緑豆大每服五丸以粥飲下日三服藥勢欲盡乃可吃熱食良木香散治心疝小腹痛悶欲絶者木香陳皮各一兩良薑乾薑訶子皮赤芍藥枳實各半兩草豆蔻川芎黑牽牛各三錢上為末每服二錢水一盞煎至七分去滓溫服厥疝附論夫內經謂黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風夫疝疾隱而難見陰沉而伏也今脾虛風寒客於膜腹之間不能通行水穀之氣結而成積使氣道厥而不通故謂之厥疝方蘹香丸治厥疝上攻腹痛無時蘹香子炒吳茱萸湯浸焙乾炒桂去粗皮胡椒楝實銼碎麩炒延胡索各半兩虻蟲去翅足炒海蛤芫花醋炒焦硇砂研木香各一兩上為末煮酒麵糊和丸梧桐子大每服十丸鹽酒下食前山茱萸丸治厥疝上搶心腹冷痛山茱萸吳茱萸湯洗焙乾食茱萸楝實銼碎麩炒馬藺花蘹香子焙青橘皮湯浸去白焙陳橘皮湯浸去白焙乾薑炮京三稜炮各三兩附子一枚重兩半者炮裂去臍皮上為末醋煮麵糊和丸如梧桐子大每服二十丸酒或鹽湯下空心服細辛丸治厥疝冷逆攻心腹痛細辛去苗葉芍藥吳茱萸湯浸焙乾炒人參白朮桂去粗皮乾薑炮甘草炙銼當歸切焙附子炮裂去皮臍各一兩上為末稀麵糊為丸梧桐子大空心米飲下三十丸日三服木香湯治厥疝氣逆上攻心腹冷痛木香檳榔生銼烏頭炮裂去皮臍細辛去苗葉當歸切焙吳茱萸湯浸焙乾炒枳殼去瓤麩炒甘草炙各一兩上㕮咀如麻豆大每服三錢水一盞煎至七分去滓溫服不拘時吳茱萸湯出宣明論治厥疝腹中陰冷痛積氣上逆吳茱萸湯洗焙乾炒二兩烏頭炮裂去臍皮細辛去苗葉各三分當歸切焙高良薑銼炒乾薑炮桂去粗皮各一兩上銼如麻豆大每服五錢水三錢煎一盞去滓溫服日三服當歸乾薑湯治厥疝腹中冷痛當歸切焙乾薑炮附子炮裂去皮臍人參甘草炙細辛去苗葉芍藥各一兩上㕮咀如麻豆大每服三錢水一盞煎七分去滓溫服不拘時卒疝附論夫卒疝者腎臟虛弱之人形寒飲冷暴受邪氣傳入經脈蓋以少陰腎經與太陽膀胱二經合為表裡猝然感邪寒熱相搏則經脈不得流通氣道結澀而脹滿致臍腹牽引於陰暴發疼痛或自汗出悶絶不省難可堪忍故名卒疝也方蘹香煮散治卒疝攻小腹疼痛蘹香子炒枳殼去瓤麩炒木香芍藥厚朴去粗皮生薑汁炙陳皮桂去粗皮青橘皮湯浸去白焙乾薑炮裂人參白茯苓去黑皮京三稜各半兩生地黃各三分上為散每服三錢匕水一盞蔥白二寸鹽少許煎七分熱服木香丸治卒疝腹痛不可忍木香桂去粗皮檳榔銼蓬莪朮煨蘹香子炒桃仁去皮尖雙仁研膏各三分萊蔔子炒青橘皮湯浸去白焙各半兩厚朴去粗皮生薑汁炙一兩上將八味搗羅為末入桃仁膏和勻酒煮麵糊丸梧桐子大每服二十丸空心溫酒下食前茱萸湯治卒疝攻臍腹痛汗出悶絶吳茱萸湯浸焙乾炒半兩細辛去苗葉附子炮裂去皮臍人參白茯苓去黑皮桂去粗皮半夏生薑汁製干當歸上㕮咀如麻豆大每服三錢水一盞生薑一片大棗二枚擘破煎七分去滓溫服不拘時乾薑湯治卒疝繞臍腹猝暴疼痛乾薑炮裂白茯苓去黑皮椒去目並閉口者炒出汗附子炮裂去皮臍桂去粗皮芎藭當歸切片芍藥各一兩上㕮咀如麻豆大每服二錢水一盞煎七分去滓溫服不拘時蜀椒散治卒疝心痛如刺繞臍腹中盡痛自汗出氣欲死薑朮散治卒疝小腹中相引疼痛不可忍蒼朮米泔浸切炒乾薑炮製馬藺花芫花醋炒焦五靈脂去皮烏頭炮製去皮臍各一兩上為末醋煮麵糊丸如梧桐子大每服十丸食前溫酒或鹽湯下當歸湯治卒疝腹痛裡急當歸焙生薑芍藥各二兩羊肉切去脂膜半斤上將三味細切先以水五升煮羊肉爛熟去肉以汁煮藥俟熟去滓澄清每服一盞不拘時走馬湯出聖惠方治卒疝無故心煩腹痛陰縮手足厥逆並治飛尸鬼擊尸疰兼治中惡心痛腹脹大便不通巴豆三個去皮心炒杏仁三個去皮心炒上味綿纏捶令碎熱湯二合捻取白汁飲之當下老少量與服之尤妙療鬼擊及尸疰當蓄此藥用之驗忌野豬肉蘆筍等物寒疝夫寒疝為病陰冷內積胃氣不行結於腹內故遇寒則發其狀惡寒不欲食手足冷繞臍痛自汗出遇寒則發其脈弦緊是也疝之為病隨臟氣虛實感傷外邪寒泣風散暑郁濕著絞刺擊搏無有定處倉猝之際痛不堪忍世人稱為橫弦堅弦膀胱小腸氣賊風入腹等名義不同症狀則一寒則溫之風則散之暑則利之濕則燥之各有成法方四制茱楝香殼丹出德生堂方專治小腸疝氣陽事衰敗下元虛冷吳茱萸一兩分作四分一分裝豬胞尿帶尿者酒浸煮一分醋浸一分童子小便浸一分鹽炒澤瀉四兩川楝子四十九個巴豆二十個炒黃去巴豆枳殼去瓤炒木香陳皮青皮茴香鹽炒石菖蒲炒檳榔三稜煨桃仁去皮炒萆薢蓬莪朮煨官桂白茯苓乳香各三兩別研荔枝核四十九枚上為細末酒糊為丸如梧桐子大每服五十丸空心鹽湯或酒下常服闢除邪氣食前空心服治腎經虛寒腫痛諸種疝氣吳茱萸湯出聖惠方治寒疝腰腹痛胸中冷氣上搶心脅支滿不得臥面目痛風寒悸栗多驚不能飲食食已即嘔寒熱往來吳茱萸湯浸七次焙乾微炒半夏浸七次去滑乾薑炮製銼人參去蘆頭當歸銼碎微炒赤芍藥各三分細辛紫菀去苗土附子炮裂去皮熟乾地黃前胡去蘆頭赤茯苓白朮桂心木香各一兩甘草炙微銼旋覆花各半兩訶黎勒一兩半用皮上為末煉蜜和搗三二百杵丸如梧桐子大不拘時生薑湯下二十丸補腎湯出醫方集成治寒疝入腹上實下虛小腸疼痛時復泄瀉胸膈痞滿不進飲食常服溫脾補腎人參茯苓白朮一兩黃耆附子炮裂去皮臍各一兩沉香四錢木瓜一兩半羌活半兩甘草炙芎藭各一分紫蘇三錢上為末每服三錢水一盞姜三片棗一枚煎七分去滓食前服嘔加半夏半兩添水作盞半姜七片煎治脅下風氣作塊寒疝發則連小腹痛湊心其積屬肝在右脅下故病發則右邊手足頭面昏痛不思飲食止頭痛乾葛一兩麻黃三分側子一個川芎防風枳實芍藥桂枝羌活甘草當歸各四錢上為末每服四錢水一盞半姜三片同煎七分去滓通口服日三四服有汗避風木香湯方治寒疝攻注胸脅滿痛汗出木香三分檳榔銼細辛去苗葉赤茯苓去黑皮人參芍藥當歸切焙桂去粗皮前胡去蘆頭青橘皮湯浸去白焙各一兩上為散每服三錢水一盞煎七分去滓溫服不拘時茱萸內消丸出和劑方治腎與膀胱經虛為邪氣所搏結或寒疝伏留不去臍腹㽲痛刺小腸氣奔豚痃癖痛不可忍陰核偏大腎囊壅腫結硬牽急重大滋長㿋癢疼痛時有黃水腰腿沉重足脛腫滿行步艱難纍經治療不見減瘥服之漸漸內消不動大腸亦不搜絞補虛消疝溫養腎經此藥不熱無毒若至心服餌其效如神吳茱萸湯浸七次焙陳皮去白川楝子蒸去皮核肉桂去粗皮不見火馬藺花醋炙青皮去白山藥焙茴香炒山茱萸去核各二兩木香不見火一兩上為末酒糊丸梧桐子大每服三十丸至五十丸空心溫酒或鹽湯吞下桂心丸治寒疝胸脅支滿食飲不化臍腹㽲痛及嘔逆風痙臍強急不得俯仰桂去粗皮五分吳茱萸湯浸焙乾炒三兩白薇一兩烏頭防葵各半兩蜀椒去目及閉口者炒白芷各三分乾薑炮芎藭各一兩上為末煉蜜丸如梧桐子大每服十丸溫酒下食前一方忌生蔥豬肉冷水茴香丸出儒門事親書治冷氣攻刺疝氣疼痛腎虛腳弱茴香八兩炒川楝子炒川烏炮去皮臍威靈仙洗去土防風去蘆陳皮各三兩地龍一兩去土微炒烏藥五兩赤小豆八兩上為末酒糊為丸每服三五丸茶酒下蓬莪朮湯治寒疝四肢冷逆氣弱汗出蓬莪朮炮附子炮製去皮臍桂去粗皮檳榔芍藥各一兩芎藭白朮各三分乾薑半兩炮上銼如麻豆大每服三錢水一盞煎七分去滓溫服不拘時人參湯治寒疝冷痛氣弱汗出不欲食人參白茯苓去黑皮各一兩蜀椒去目及閉口者炒出汗乾薑炮半兩附子炮裂去皮臍檳榔白朮青皮湯浸去白焙各一兩上為末銼如