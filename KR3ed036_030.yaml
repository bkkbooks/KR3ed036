body:
  text: 卷三十腎臟門腎勞附論夫腎勞者勞傷腎也腎傷則少精腰背痛難俯仰小便不利時有餘瀝陰痛囊濕生瘡小腹急滿厥逆下冷皆其候也經所謂強力入水久坐濕地傷腎之一端爾凡腎勞病者補肝氣而益之肝平則感於腎矣人逆冬氣則足少陰不藏腎氣沉濁順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣方補益蓯蓉獺肝丸治腎虛勞氣腰痛耳聾目黃睛痛面常青黑四肢羸弱煩悶痰飲氣攻肢節痠痛肉蓯蓉酒浸切焙乾二兩獺肝酥炙一具柴胡去苗秦艽去苗土當歸切焙石斛去根白茯苓去黑皮澤瀉附子炮裂去皮臍各一兩半遠志去心巴戟天去心各二兩蒺藜子炒去角熟乾地黃焙厚朴去粗皮生薑汁炙五味子炒桂去粗皮桃仁去皮尖雙仁炒丁香木香山芋芍藥陳橘皮浸去白焙赤石脂研檳榔銼白朮炒乾薑炮郁李仁湯去皮尖研甘草炙銼牡丹皮炙銼蜀椒去目及合口者炒出汗山茱萸芎藭牡蠣煅研人參各一兩黃耆銼炒二兩半上為末煉蜜和丸如梧桐子大每服四十丸空心酒下地黃煎丸出聖惠方治腎臟勞損添精補髓益氣養神駐顏調血脈令人輕健生地黃五十斤揀擇好者洗搗取汁枸杞子巴戟薯蕷鹿茸去毛塗酥炙令微黃各二兩肉蓯蓉三兩酒浸一宿刮去皺皮炙乾無灰酒三十斤以上二味於銅鍋中慢火熬成膏入後藥山茱萸五味子茯神續斷補骨脂微炒遠志去心蛇床子附子炮裂去皮臍石斛去根銼覆盆子黃耆銼芎藭牛膝去苗木香桂心人參去蘆頭菟絲子酒浸一宿焙別搗為末沉香以上各一兩半上搗羅為末入前煎和用木杵臼搗五七百杵丸如梧桐子大每日空心及晚食前以溫酒下四十丸沉香散治五勞七傷腎氣虛乏沉香白蒺藜炒去角補骨脂炒令香巴戟天去心酸棗仁炒五味子炒澤瀉磁石煅醋淬七度桂去粗皮陳橘皮去白焙人參枳殼去瓤麩炒牛膝酒浸切焙芍藥石斛去根鱉甲醋炙去裙襴各一兩檳榔桑螵蛸炙各三兩肉蓯蓉酒浸切焙當歸切焙柴胡去苗黃耆銼炒各二兩芎藭三兩附子炮裂去皮臍一兩半上細銼每服五錢水一盞半生薑五片煎至八分去滓空心溫服巴戟丸出聖惠方治腎勞腰腳痠疼肢節苦痛目視䀮䀮心中恍惚夜臥多夢覺則口乾食不得味恆多不樂常有恚怒心腹脹滿四體痹疼多吐酸水小腹冷痛尿有餘瀝大便不利悉皆主之久服延年不老萬病除愈巴戟一兩肉蓯蓉一兩酒浸刮去皺皮炙乾菟絲子一兩酒浸一宿焙乾別搗為末熟乾地黃天雄炮裂去皮臍沉香各一兩天門冬一兩半去心焙五味子柏子仁牛膝去苗遠志去心石斛去根銼薯蕷防風去蘆頭白茯苓人參去蘆頭石楠覆盆子石龍芮萆薢銼五加皮續斷蛇床子杜仲去粗皮炙令微黃銼各三分上為末煉蜜和搗五七百杵丸如梧桐子大每服以溫酒下三十丸空心及晚食前服忌生冷油膩腥魚陽起石丸治腎勞虛損腰腳痠疼小腹時痛小便滑數面色黧黑陽起石飛過龍骨研各一兩遠志去心山芋巴戟天去心附子炮裂去皮臍牛膝酒浸切焙四兩杜仲去粗皮炙赤石脂牡蠣煅各二兩蛇床子三兩肉蓯蓉酒浸切焙四兩石斛去根黃耆銼五味子續斷萆薢菟絲子酒浸別焙地骨皮五加皮卷柏各二兩半上為細末煉蜜和丸如梧桐子大每服二十丸溫酒下空心食前服補腎丸治虛勞腎氣虛足膝腰痛陽氣衰弱小便數囊冷濕尿有餘瀝精自出陰痿不起悲恚消渴麥門冬去心焙遠志去心乾薑炮防風去叉桂去粗皮烏喙炮裂去皮臍萆薢枸杞根牛膝去苗酒浸切焙葳蕤防葵肉蓯蓉酒浸切焙棘刺菟絲子酒浸一宿別搗厚朴去粗皮生薑汁炙石龍芮山芋各等分上為末煉蜜和雞子白為丸如梧桐子大每服十丸食前溫酒下加至二十丸日三豬肝丸治腎虛勞氣腰胯疼痛腳膝無力耳中虛鳴夜多小便飲食減少女人血勞面色萎黃心腹刺痛經脈不利豬肝一具去膜切以米醋二斗煮令極爛柴胡去苗澤瀉檳榔銼附子炮裂去皮臍熟乾地黃焙當歸炙銼各二兩蜀椒去目及閉口者炒出汗桃仁去皮尖雙仁炒令微黃研蒺藜子炒去角牛膝酒浸切焙木香秦艽去苗土桂去粗皮蕪荑炒乾薑炮黃連去須炒各一兩上除肝外搗羅為末取肝入砂盆內研爛同藥末入臼內搗三五千下滴余醋並熟蜜和拌衆手丸如梧桐子大每服四十丸空心溫酒下肉蓯蓉丸治腎勞心忪乏力夜多夢泄肌瘦發熱口內生瘡臍腹冷痛肉蓯蓉酒浸切焙一兩巴戟天去心半兩石斛去根半兩牛膝酒浸切焙附子炮裂去皮臍羌活去蘆頭各一兩桔梗炒遠志去心萆薢獨活去蘆頭枳殼去瓤麩炒黃耆銼各半兩熟乾地黃焙當歸切焙各一兩海桐皮銼一分上為末煉蜜和丸如梧桐子大每服二十丸米飲或溫酒下食前服磁石丸出聖惠方治腎虛勞損臥多盜汗小便餘瀝陰濕痿弱名曰勞極宜服磁石燒醋淬七遍細研水飛五味子鹿茸去毛塗醋炙令黃菟絲子酒浸一宿焙乾別搗為末蛇床子車前子白茯苓桂心肉蓯蓉酒浸一宿刮去皺皮炙乾黃耆銼防風去蘆頭陽起石細研水飛過附子炮裂去皮臍山茱萸熟乾地黃各一兩上為末煉蜜和搗三五百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸晚食前再服茯苓散治腎勞虛損羸乏咳逆短氣四肢煩疼耳鳴骨間熱小便赤色腰背疼痛無力白茯苓人參去蘆頭甘草炙微赤銼防風去蘆頭黃耆銼芎藭麥門冬去心當歸牛膝去苗五味子各一兩白芍藥磁石搗碎水淘去赤汁各一兩羚羊角屑半兩地骨皮三分桂心半兩上為散每服四錢以水一中盞煎至六分去滓空心及晚食前溫服羊腎湯出聖惠方治腎勞虛寒面腫垢黑腰脊痛不能久立屈伸不利夢寐驚悸上氣小腹裡急痛引腰脊四肢苦寒小便或白濁宜服當歸人參去蘆頭白芍藥各一兩熟乾地黃一兩黃耆半兩銼杜仲去粗皮炒令微黃芎藭遠志去心白茯苓石斛去根銼五味子桂心續斷各一兩麥門冬一兩半去心焙磁石三兩搗碎水淘去赤汁上為散每服用羊腎一對切去脂膜以水一大盞半煎至一盞去腎下藥末五錢入生薑半分棗三枚煎至五分去滓空心及晚食前溫服杜仲散出聖惠方治腎勞腰脊疼不可俯仰屈伸杜仲去粗皮炙令黃銼生乾地黃當歸各一兩丹參赤茯苓芎藭續斷五加皮牛膝去苗桂心枳殼麩炒微黃去瓤各半兩甘草炙微赤銼羚羊角屑各一分上為散每服四錢以水一中盞入淡竹茹一分生薑半分煎至六分去滓食前溫服羊腎湯出聖惠方治腎勞虛損面黑耳聾腰腳疼痛小便滑數宜服磁石搗碎水淘去赤汁白茯苓桂心石菖蒲附子炮裂去皮臍五味子當歸芎藭石斛去根銼桑螵蛸微炒各半兩杜仲去粗皮炙令微黃銼半兩上為散每服用羊腎一對切去脂膜以水一大盞半煎至一盞去腎下藥末半兩入生薑半分煎至五分去滓空腹溫服晚食前再服黃耆散出聖惠方治腎勞虛損耳聽無聲四肢滿急腰背轉動強難宜服黃耆銼磁石搗碎水淘去赤汁各二兩白茯苓澤瀉牛膝去苗薯蕷羚羊角屑杜仲去粗皮炙令微黃銼沉香熟乾地黃各一兩鱉甲一兩半塗酥炙令黃去裙襴甘草半兩炙微赤銼上為散每服三錢以水一中盞入生薑半分煎至六分去滓食前溫服忌生冷油膩莧菜鱉甲散出聖惠方治腎勞熱四肢腫滿小腹急痛顏色黑黃關格不通宜服鱉甲二兩塗酥炙令微黃去裙襴赤芍藥桂心漢防己赤茯苓木通銼枳殼麩炒微黃去瓤各三分羚羊角屑澤瀉各半兩前胡去蘆頭桑根白皮銼大麻仁各一兩上為散每服四錢以水一中盞煎至六分去滓食前溫服忌莧菜蛇床子丸治腎勞陰下生瘡濕癢蛇床子炒三分續斷山芋肉蓯蓉酒浸切焙附子炮裂去皮臍桑寄生遠志去心菟絲子酒浸一宿別搗莨菪子酒浸令芽生新苗土炒各半兩上除菟絲子外搗羅為末拌勻煉蜜和丸如梧桐子大每服二十丸空腹鹽湯下海藻丸治腎勞陽氣虛乏陰囊腫癢海藻洗去咸炙一兩肉蓯蓉酒浸切焙天雄炮裂去皮臍蘹香子炒各三分木香沉香銼牡蠣煅牛膝酒浸切焙硫黃研各半兩上為末煉蜜和丸如梧桐子大每服空腹鹽湯下二十丸日午再服菟絲子丸出聖惠方治腎虛勞損腰疼少力補益駐顏宜服菟絲子酒浸三日曝乾別搗三兩車前子鹿茸去毛塗酥炙令微黃肉蓯蓉酒浸一宿刮去皺皮炙乾桂心附子炮裂去皮臍牛膝去苗各二兩杜仲三兩去粗皮炙令黃銼熟乾地黃五兩上為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸鱉甲湯療腎勞熱四肢腫急小腹滿痛顏色黑黃關格不通鱉甲炙麻黃去節升麻前胡羚羊角屑黃芩各三兩薤白切一升桑根白皮五兩香豉一升熬綿別裹上切以水一斗煮取三升去滓分三服忌莧菜乾地黃散一名地黃湯出聖惠方治腎勞實熱脹滿四肢黑色耳聾多夢見大水腰脊離解宜服生乾地黃二兩赤茯苓玄參石菖蒲人參去蘆頭黃耆銼各一兩遠志去心甘草煮甘草炙微赤銼各半兩上為散每服三錢水一中盞煎至六分去滓食前溫服羊腎湯治腎勞虛損寒熱耳鳴好唾善欠腰腳痿弱方見羊骨補腎湯遠志丸治腎勞虛損夢寐驚悸小腹拘急面色黧黑小便白濁腰脊疼痛遠志去心桂去粗皮杜仲去粗皮炙枳殼去瓤麩炒白茯苓去黑皮各半兩熟乾地黃焙菟絲子酒浸一宿別搗各一兩上除菟絲子外搗羅為末和勻煉蜜為丸如梧桐子大每服三十丸空腹溫酒下磁石湯治腎勞虛寒飢不欲食面色黧黑磁石煅醋淬五七遍一兩半黃耆銼三分杜仲去粗皮炙一兩白石英碎一兩一分五味子炒一兩白茯苓去黑皮三分白朮一兩半上粗搗篩每服五錢水一盞半煎一盞去滓食前溫服日再胡黃連散治虛勞嗜欲過傷腎氣衰竭咳嗽唾涎瘦弱不能食胡黃連獺肝炙蕪荑仁醋焙黑秦艽去苗土白朮銼各一分柴胡去苗鱉甲去裙襴醋炙各半兩上為散每服三錢取豬腎一隻小便一合清酒二合沸浸小便與腎入藥以碗蓋候溫通口即服豬腎不用黃耆飲治腎勞盜汗噓吸少氣黃耆白朮白茯苓去黑皮五味子各一兩半熟乾地黃焙牡蠣煅各二兩大棗七枚去核上㕮咀每服五錢水一盞半煎至八分去滓食前溫服日三補虛杜仲丸治腎虛勞損腰疼少力杜仲去粗皮桂去粗皮枳殼去瓤麩炒白茯苓去黑皮各一兩乾薑炮半兩菟絲子酒浸一宿別搗遠志去心各二兩上為末煉蜜和丸如梧桐子大每服三十丸食前溫酒或棗湯下五味子丸治腎勞虛損精氣不足面黑耳聾小便白濁五味子白茯苓去黑皮車前子巴戟天去心肉蓯蓉酒浸切焙菟絲子酒浸一宿別搗各一兩上為末煉蜜和杵三五百下丸如梧桐子大每服三十丸空腹晚食前溫酒下蓯蓉丸治腎勞氣虛筋骨羸弱腹中急痛肉蓯蓉酒浸切焙葫蘆巴乾薑炮牛膝酒浸切焙各一兩蘹香子炒木香各一分上為末醋煮麵糊和丸如梧桐子大每服二十丸食前溫酒送下補益乾地黃丸治腎勞精氣滑泄熟乾地黃三兩鹿茸去毛酥炙遠志去心山茱萸各一兩半蛇床子半兩菟絲子酒浸別搗二兩上為末煉蜜和丸如梧桐子大每服三十丸食前酒下桃仁湯治腎勞虛損心腹脹滿骨節煩疼桃仁湯浸去皮尖雙仁麩炒二兩白朮一兩芎藭附子炮裂去皮臍各三分蓽澄茄半兩上銼如麻豆每服二錢水一盞入生薑三片鹽少許同煎取七分去滓食前少熱服日三菟絲子丸治腎勞囊濕生瘡陰痿失精小便頻數菟絲子酒浸別搗牡蒙柏子仁蛇床子炒肉蓯蓉酒浸切焙各一兩上為末煉蜜丸如梧桐子大每服二十丸空心溫酒下日午再服伸煮散治腎勞熱妄怒腰脊不可俯仰屈伸丹參牛膝葛根杜仲乾地黃甘草豬苓各二兩半茯苓遠志