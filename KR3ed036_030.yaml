痿依全方夏減桂附一半冬春秋三停減一痰去精走全減桂附只服六味地黃丸血虛陰衰熟地黃為君精滑山茱萸為君小便或多或少或赤或黃白茯苓為君小便淋澀澤瀉為君心虛腸胃間積熱心火盛心火不足牡丹皮為君皮膚燥澀乾山藥為君以上但言為君者其分兩用乾地黃分兩同乾地黃卻依立為臣分兩同或曰八味地黃丸久服可為地仙今老者服之而腹痛少者服之而發瘡或小便頻數或小便結澀或眼昏精滑瀉其故何哉蓋八物條事非其制度非方之罪今貨地黃以緑礬豆豉浸蒸易失其性乾地黃性本涼加以礬石性冷此老人所以腹痛附子多是重三四錢此是漏濫側子大熱有毒此少者所以發瘡小便頻數澤瀉生也小便結澀山茱萸不去核也今具八味條事於後地黃生者去土水中浮者為天黃中者為人黃沉者為地黃先將地黃蒸良久天黃人黃搗汁取蒸地黃投其汁中候冷如此齊三曝乾酒浸一宿蒸曝乾山藥竹刀剖去皮布巾抓干切作片子將皂角刺上曝乾茯苓為末水飛過掠去筋膜曝乾澤瀉切成塊子酒浸一宿略蒸山茱萸酒浸良久取肉去核每十斤得肉二斤二兩黑附子緊實重七錢鍋內以烈炭火炮裂去皮臍牡丹皮去心及粗皮酒浸一宿桂削去外粗皮不可焙上搗為末不可犯銅器如是修合服之而仙復何疑哉久服去附子揀淨五味子代之溫經湯聖濟總録治腎虛脹寒氣不宣利攻腹內及背腰脊髀痛附子炮裂去皮臍杜仲去粗皮切炒牛膝酒浸別焙各一兩乾薑炮桂去粗皮續斷補骨脂炒各三分上㕮咀每服三錢水一盞生薑二片煎至七分臨熟入鹽一捻去滓空心食前溫服萆薢丸聖濟總録治腎虛脹氣攻腰腹髀痛萆薢銼熟乾地黃焙天雄炮裂去皮臍各一兩桂去粗皮蜀椒去目並閉口炒出汗細辛去苗葉續斷銼各三分上為末煉蜜和丸如梧桐子大每服三十丸溫酒或鹽湯下空心日午夜臥各一鹿茸丸聖濟總録治腎脹虛寒痛引臍腹腰髀鹿茸去毛酥炙半兩桂去粗皮三分黃耆銼澤瀉芍藥桑寄生補骨脂炒各一兩上為末煉蜜和丸如梧桐子大每服三十丸空心溫酒或鹽湯下腎著附論夫腎著之病形如水狀其人不渴小便自利飲食如故惟身體及腹重如帶數千錢腰以下冷如坐水中蓋腎經虛弱外受風冷內有水濕風水相搏內著於腎故成此病或有作勞汗出衣里冷濕久久得之者以濕氣著而不去故名腎著也方杜仲酒出千金方治腎著腰中疼痹沉重兼治五種腰疼杜仲去粗皮炙乾薑炮熟地黃焙萆薢羌活去蘆頭天雄炮裂去皮臍肉桂去粗皮蜀椒去目並閉口者炒出汗芎藭秦艽去苗土烏頭炮裂去皮臍細辛去苗葉各三兩五加皮石斛去根各五兩續斷栝蔞根地骨皮去土桔梗炒甘草炙防風去叉各一兩上㕮咀用酒二斗浸四宿每服一盞不拘時飲常令酒力相續為效腎著散聖濟總録治腰背疼重小腹拘急小便難耳聾腳冷羊腎一對作脯令燥炙之磁石醋淬一兩半人參二兩桑根白皮炙銼防風去叉天雄炮裂去皮臍玄參赤茯苓去黑皮各三兩續斷一兩三分熟乾地黃焙一兩阿膠炒外臺作燥白務肉蓯蓉酒浸切焙乾漆炒煙出龍骨天門冬去心焙各半兩上為散每服三錢煎大麥湯調下食前服麻黃湯出聖濟總録治腎著腰冷腹重痛腳膝無力麻黃去根節附子炮裂去皮臍木香芎藭羌活去蘆頭當歸銼米炒檳榔銼防風去叉牛膝去苗酒浸焙燥天麻銼人參赤茯苓去黑皮各一兩上㕮咀每服三錢水一盞生薑三片棗二枚擘同煎至七分去滓溫服腎著散出千金方治證與後腎著湯同杜仲桂心各三兩甘草澤瀉牛膝乾薑各二兩白朮茯苓各四兩上治下篩為粗末散一服三方寸匕酒一升煮五六沸去滓頓服日再七勝丸出聖濟總録治腎著腰冷痹腹急痛腳膝疼不可行腳氣等疾威靈仙去土當歸酒浸切焙附子炮裂去皮臍天麻各一升桂去粗皮牛膝去苗酒浸焙乾薑炮各半斤上為細末酒煮麵糊丸如梧桐子大每服二十丸日二夜一溫酒下丹參丸出聖濟總録治腎著腹重痛腰冷痹丹參洗杜仲去粗皮切炒牛膝去苗酒浸切焙續斷各三兩桂去粗皮乾薑炮各二兩上為細末煉蜜丸如梧桐子大每服三十丸溫酒下無時桑寄生散出千金方治腎著桑寄生洗切牡丹皮洗切鹿茸去毛酥炙桂去粗皮各一兩上為細散每服二錢匕溫酒調下腎著湯出千金方腎著之為病其人身體重腰冷如水洗狀不渴小便自利飲食如故是其證也從作勞汗出衣里冷濕久久得之腰以下冷痛腰重如帶五千錢一名甘草湯甘草二兩乾薑二兩茯苓白朮各四兩上㕮咀以水五升煮取三升分三服腰中即溫又治體虛甚效治內外腎釣痛出本草用吳茱萸同鹽研窨之神驗干則浸窨腎臟積冷氣攻心腹疼痛附論夫腎臟積冷氣攻心腹痛者腎虛寒冷之氣久積於內陽氣不足其經厥逆上干心絡與正氣交擊故令心腹痛也方鹿茸丸出王氏博濟方治腎臟虛積冷氣攻心腹疼痛及膀胱氣痛鹿茸酒浸炙去毛肉蓯蓉酒浸切焙各二兩人參補骨脂炒石斛去根木香白朮炒厚朴去粗皮生薑汁炙牛膝去苗酒浸切焙續斷蘹香子炒當歸切焙芎藭附子炮裂去皮臍熟乾地黃焙桂去粗皮蓽澄茄澤瀉檳榔銼陳橘皮去白焙桃仁去皮尖雙仁炒巴戟天去心五味子各一兩赤石脂研龍骨研蜀椒去目及合口者炒出汗各半兩上為末煉蜜丸如梧桐子大每服二十丸加至三十丸溫酒或鹽湯下蛜𧌴丸出聖惠方治腎臟積冷氣攻心腹疼痛四肢逆冷面色青黃或時嘔吐不思飲食蛜𧌴木香當歸銼微炒附子炮裂去皮臍硇砂蘹香子各三分肉桂去粗皮硃砂細研陽起石酒煮半日細研水飛過阿魏麵裹煨面熟為度自然銅細研檳榔乾薑炮製銼磁石燒醋淬七遍搗碎細研水飛過桃仁湯浸去皮尖雙仁麩炒微黃各半兩硫黃一兩半水銀一兩上為末將硫黃水銀同結為砂子細研入諸藥末和勻醋煮麵糊和搗三二百杵丸如緑豆大每服不計時候以熱酒下二十丸硇砂丸出聖惠方治腎臟積冷下焦久虛邪冷氣攻心腹疼痛汗出口乾陰縮聲散手足逆冷硇砂一兩細研乾蠍微炒蘹香子自然銅細研肉豆蔻去殼磁石燒醋淬七遍搗碎水飛過各三分阿魏研桃仁湯浸去皮尖雙仁麩炒微黃青橘皮湯浸去白瓤微炒木香白附子炮製安息香川烏頭炮裂去皮臍附子炮裂去皮臍各半兩上為末入研了藥令勻以醋煮麵糊和丸如梧桐子大每服不計時候以生薑酒下十丸至十五丸牛膝丸出聖濟總録治腎臟虛冷氣攻心腹疼痛及腰膝冷痹眼花耳鳴四肢沉重食減色昏牛膝去苗切酒浸焙附子炮裂去皮臍補骨脂炒桂去粗皮萆薢當歸切焙山茱萸芎藭石斛去根續斷細辛去苗葉木香炮各半兩上為末煉蜜為丸如梧桐子大空心鹽湯下三十丸沉香阿魏丸出聖濟總録治腎臟風虛勞氣奔沖悶亂沉香銼阿魏研桃仁湯浸去皮尖雙仁炒研檳榔銼蓬莪朮炮銼各半兩青橘皮去白米醋浸吳茱萸醋炒青木香蘹香子炒各一兩硇砂三兩細研湯泡紙濾取清入銀石器內煎成霜研入藥上為末煉蜜為丸如梧桐子大每服二十丸炒生薑鹽湯下白豆蔻散出聖惠方治腎臟積冷氣攻心腹疼痛兩脅脹滿不飲食白豆蔻去皮蘹香子檳榔木香附子炮裂去皮臍青橘皮湯浸去白瓤焙硫黃細研各半兩乾薑炮製銼吳茱萸湯浸七遍焙乾微炒各一分上為散不計時候以熱酒調下一錢硫黃丸出聖惠方治腎臟積冷氣攻心腹疼痛面色青黃四肢逆冷硫黃細研飛過檳榔木香附子炮裂去皮臍桂心葫蘆巴吳茱萸湯浸七遍焙乾炒令熟各一兩乾薑炮製銼半兩蘹香子二兩上為末用醋煮軟飯和搗百餘杵丸如梧桐子大每服不計時候以熱酒下二十丸沉香飲出聖濟總録治腎臟積冷氣攻心腹痛四肢逆冷不思飲食或吐冷沫面青不樂沉香芍藥洗焙檳榔銼青橘皮浸去白切焙附子炮裂去皮臍蘹香子炒各一兩桂去粗皮吳茱萸湯洗焙乾炒各半兩上㕮咀每服三錢水一盞煎至七分去滓不拘時溫服葫蘆巴丸出聖濟總録治腎臟虛積冷氣攻心腹疼痛冷汗出四肢少力面色黧黑葫蘆巴炒山芋澤瀉各一兩吳茱萸湯洗焙乾乾薑炮當歸切焙牡蠣粉附子炮裂去皮臍各半兩上為末酒煮麵糊和丸如梧桐子大每服三十丸空心食前溫酒下附子煎出聖濟總録治脾腎虛冷臍腹冷痛大便時泄腹脹羸瘦附子炮裂去皮臍訶黎勒皮甘草銼牛膝切各一兩硫黃舶上者碎蘹香子炒乾薑各半兩上先將硫黃甘草納絹袋扎頭次將諸藥粗搗銀石器內以水一斗慢火同煎不得入生水頻看候煎至一大碗汁取出濾去滓分作四盞每日空心一盞溫米飲調下即用飯壓之如欲丸甘草不用搗諸藥為末煉蜜丸如梧桐子大生薑鹽湯下十丸至十五丸亦得木香煎出聖惠方治腎臟積冷氣攻心腹疼痛發歇不定木香桂心青橘皮湯浸去白瓤炒附子炮裂去皮臍桃仁湯浸去皮尖雙仁麩炒微黃各一兩乾蠍微炒阿魏麵裹煨面熟為度各半兩上搗細羅為散用童子小便二大盞煎藥成膏收於不津器中每服不計時候以熱酒生薑調下一茶匙阿魏丸出聖惠方治腎臟積冷氣攻心腹疼痛不可忍阿魏麵裹煨面熟為度硇砂自然銅細研各一分桃仁去皮尖雙仁湯浸麩炒微黃木香乾蠍微炒白礬燒灰各半兩上為末用醋煮麵糊和丸如緑豆大每服以生薑熱酒下二十丸不計時候服硇砂丸出聖濟總録治腎臟積冷氣攻心腹疼痛不止硇砂研木香各半兩楝實銼蓬莪朮炮烏頭炮裂去皮臍各一兩桃仁三十枚湯浸去皮尖雙仁研膏上搗羅五味為末入桃仁同研令勻酒煮麵糊和丸如緑豆大每服三十丸生薑鹽湯下溫酒亦得附子丸出聖濟總録治腎臟虛冷心腹疼痛小便滑數耳鳴目暗附子炮裂去皮臍二兩巴戟天去心龍骨研蘹香子炒各一兩乾薑炮三分木香半兩上為末酒煮麵糊丸如梧桐子大每服二十丸鹽酒或鹽湯任下空心食前服補骨脂丸出聖濟總録治腎臟虛冷氣攻心腹疼痛臍下㽱刺腰膝沉重行步無力不思飲食補骨脂炒二兩葫蘆巴炒青橘皮去白炒蘹香子炒各一兩沉香半兩檳榔銼三分上為末煉蜜為丸如梧桐子大每服二十丸溫酒或鹽湯下空心食前服巴戟丸聖濟總録治腎臟久虛心腹冷痛飲食無味腰膝痠疼煩憊少力時多夢泄耳內虛鳴巴戟天去心補骨脂炒蘹香子舶上者炒木香各半兩桂去粗皮附子炮裂去皮臍鹽炒各一兩上為末用酒煮麵糊為丸如梧桐子大每服二十丸空心食前鹽酒或鹽湯任下沉香飲出聖惠方治腎臟虛冷氣攻心腹疼痛腰背急強少思飲食身熱足冷沉香葫蘆巴銼炒楝實去核炒蘹香子炒木香附子炮裂去皮臍切各半兩上㕮咀每服三錢水一盞酒三分同煎七分去滓空腹溫服沉香散治腎臟虛積冷氣攻心腹疼痛四肢逆冷不思飲食沉香檳榔青橘皮湯浸去瓤焙各一兩蘹香子炒吳茱萸湯浸七遍焙乾微炒各半兩附子一兩半炮裂去皮臍上為散每服不計時候以熱酒調下一錢硇砂散治腎臟積冷氣攻心腹疼痛喘促悶亂欲絶或出冷汗聖惠方硇砂木香青橘皮湯浸去白瓤焙桂心蓽澄茄各一兩蘹香子二兩上為散每服以生薑汁少許熱酒一中盞攪和令勻調下一錢不計時候服木香散聖惠方治腎臟積冷氣攻心腹疼痛或吐冷沫不思飲食木香丁香乳香蘹香子硫黃細研入各半兩桂心三分上搗細為散入研了藥令勻每服以炒生薑熱酒調下一錢不拘時候服之雄黃丸出聖惠方治腎臟積冷氣攻心腹疼痛氣欲絶雄黃硃砂各一分黃丹半兩麝香一錢巴豆十粒去皮心研紙裹壓去油上藥同研如粉用軟飯和丸如緑豆大每服不計時候以熱酒下五丸硫黃丸出聖惠方治腎臟虛冷氣攻心腹疼痛狀如錐刀所刺宜服此方硫黃一兩細研水飛過硃砂細研水飛過木香蘹香子各一分硇砂半兩上搗羅為末都研令勻用軟粟飯和丸如梧桐子大每服不計時候以熱酒下二十丸天雄丸出聖濟總録治腎臟虛積冷氣攻心腹疼痛少力行步艱難不思飲食天雄炮裂去皮臍二兩蘹香子炒山芋蜀椒去目及合口者炒出汗各一兩上為末用羊腎一對切去皮膜細研酒面同煮成膏候冷拌前藥為丸如梧桐子大每服二十丸至三十丸溫酒鹽湯任下空心食前服麝香丸治腎臟積冷氣攻心腹疼痛頻發不止麝香細研阿魏麵裹煨面熟為度各半兩乾蠍三分微炒桃仁五十枚湯浸去皮尖雙仁麩炒微黃上為末煉蜜和丸如緑豆大每服不計時候以熱酒下二十丸硇砂丸聖惠方治腎臟積冷氣攻心腹疼痛面青足冷宜服硇砂二兩桃仁一兩湯浸去皮尖雙仁研如膏上先以酒一小盞煎硇砂十餘沸候消化澄濾取清去砂石後卻入銚子內與桃仁膏旋旋添酒煎約入酒一大盞以來煎成膏用蒸餅末和丸如梧桐子大每服不計時候以熱酒下二十丸玉粉丹出本草經驗方治元臟氣虛久冷腹痛虛瀉生硫黃五兩青鹽一兩上細研以蒸餅為丸如緑豆大每服五丸熱酒空心服以食壓之緑玉丹出聖惠方治腎臟積冷氣攻心腹疼痛不可止青古錢三十文燒醋淬七遍後於淨地上遍糝硇砂末二兩令勻用盒子合二七日刮取硇砂研為末用熱醋浸蒸餅和丸如緑豆大每服不計時候以熱生薑酒下五丸或七丸補骨脂丸出王氏博濟方治脾腎久冷積氣成塊或發疼痛補暖大木瓜一個去皮瓤入硇炒一兩去砂石蒸令極熟爛補骨脂炒薯蕷蘹香子官桂去皮青橘皮去白木香檳榔以上各一兩荊三稜半兩醋浸一宿炒令黃肉豆蔻去殼半兩上為末以木瓜為丸如梧桐子大空心鹽湯溫酒任下二十丸二氣散出朱氏集驗方治腎經停冷氣滯力弱大附一個生用不去皮臍切作三分為片子令薄大茴香六兩淨洗過濾干分作三分每分二兩第一度用附子一分茴香二兩一分同炒令茴香黃色香熟用瓦瓶盛貯厚紙封蓋安在冷處一宿次日除附子以茴香為末空心鹽酒調下第二度如第一度分兩炒法存性皆如之但次早除附子一半其一半附子同茴香為細末如前法服之第三度凡分兩炒法存性皆如前二度之法但次早全用附子同茴香為細末亦如前法服之外餘一分半附子又可合別藥用
