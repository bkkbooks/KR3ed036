body:
  text: 卷三百四十一妊娠諸疾門大便不通附論夫妊娠腸胃有風加之挾熱津液不足氣道否澀故令腸胃枯燥大便不通甚則呼吸奔喘腹脹乾嘔方羌活丸治妊娠熱在臟腑大便祕澀羌活二兩半大麻仁三兩檳榔五枚防風枳殼各一兩大黃一兩半木香一兩上搗羅六味為末與麻仁同研勻煉蜜和丸如梧桐子大每服二十丸溫水下食前服日三以微利為度檳榔丸治妊娠大便熱結旬日不通檳榔一兩木香半兩大黃二兩青橘皮焙半兩牽牛子二兩用一半生一半炒上為末煉蜜和劑更於臼內塗酥杵勻丸如梧桐子大每服二十丸空心下溫水服麻仁丸治妊娠大便不通腹病不能食養津液潤腸胃大麻仁四兩人參訶黎勒各二兩大黃半兩上先搗後三味為末次入麻仁煉蜜和劑更於臼內塗酥杵勻丸如梧桐子大每服三十丸空心溫水下大便通即止疏氣黃耆丸治妊娠大便不通黃耆枳殼各一兩威靈仙二兩上為末用麵糊和丸如小豆大每服三十丸溫水下不拘時未通稍加之治妊娠大便祕澀大全良方枳殼三兩防風二兩甘草炙一兩上為細末沸湯點服一二錢空心日三枳殼丸治妊娠大便結塞不通臍腹硬脹不能安臥氣上喘逆枳殼一兩半大黃二兩半上為末煉蜜和丸如梧桐子大每服二十丸空心米湯下未通再服以通為度潤腸丸治妊娠大便不通腹脅堅脹枳殼大麻仁各一兩上再研勻煉蜜和丸如梧桐子大每服三十丸食前溫服下生薑湯亦得蔥膠湯治妊娠大便不通蔥白一莖切牛皮膠二片上以水一盞半煎令膠熔化去滓頓服之治虛羸大便祕枳殼制阿膠炒等分上為末煉蜜和劑杵二三千下丸如梧桐子大另研滑石末為衣溫水下二十丸半日來未通再服三十丸止於五十丸小便不通附論夫妊娠小腸夾熱熱結胞內使氣道否澀故小便不通令人腹脅脹滿臍下氣痛是其證也方茯苓湯治妊娠小便不通赤茯苓白朮郁李仁杏仁旋覆花各一兩檳榔五枚銼上粗搗篩每服二錢匕水一盞煎至七分去滓空心服大黃飲子治妊娠子淋小便不通木通丸治妊娠小便不通及胞轉臍下脹痛木通黃芩冬葵子生乾地黃焙各二兩上為末用麵糊和丸如梧子大每服二十丸燈心湯下食前服冬葵子散治妊娠小便不通小腹脹滿冬葵子微炒榆白皮細銼滑石研阿膠炙令燥各一兩上為散每服二錢匕溫水調服不拘時四味葵根湯治妊娠小便不通臍下滿痛冬葵根一握去土冬即用子車前子木通各三兩阿膠二兩上粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服鯉魚湯治妊娠小便不利身重惡寒起則眩暈及水腫苦參丸治妊娠小便難飲食如故當歸貝母苦參各三兩滑石半兩上細末蜜丸如小豆大以米飲下三十丸不拘時服榆白皮散治妊娠小便不通心神悶亂小腹急痛榆白皮銼王不留行滑石各一兩上為細散每服二錢匕煎燈心湯調下豬苓湯治妊娠小便不通臍下硬痛豬苓木通桑根白皮銼各一兩上粗搗篩每服三錢匕水一盞入燈心同煎至七分去滓食前溫服治妊娠小便不通臍下妨悶心神煩亂葵子榆白皮切各一兩蔥白七莖上以水二大盞煎取一盞三分去滓分三服一方無蔥白又方葵子赤茯苓蘧麥以上各一兩上搗細羅為散每服不計時候以溫水調下一錢又方葵子滑石寒水石各一兩上搗為散每服三錢水一盞蔥白七寸煎六分去滓無時候溫服冬葵子散治妊娠小便不利身重惡寒起則眩暈及水腫王子亨云妊娠小便不通特避寒藥冬葵子二錢赤茯苓二錢上為末每服三錢米飲調服無時候利則住服如不通恐是轉胞加發灰少許神效一方無茯苓有榆白皮若有妊娠婦腹脹小便不利吐逆諸醫雜進溫脾胃寬氣去脹等劑服之反吐藥物不納轉加脹滿揍心驗之胎死腹中又服諸下胎藥不能通解舉家憂惶因得鯉魚湯論曰腳腫俗呼為皺腳亦有通身腫滿心胸急脹名曰胎水遂去妊婦心前衣服看之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此證蓋緣懷身腹大妊婦不自知覺人人皆以謂身娠如此不以為胎水病醫人何以得知故此書論病須自家覺察大腸與膀胱水不出入淋瀝急數尿前痛大便赤裡急如痢以手按胸間至臍方可出不然小便逆上出而不禁其浮腫先以涼藥疏利卻用上藥治妊娠卒然小便不利滑石末杏仁等分上先搗杏仁令爛次入滑石末以軟飯搗和為丸如小豆大每服二十丸蔥白湯送下療妊娠卒不得小便用杏仁二十個去皮尖熬令變色搗丸如豆大燈心煎湯吞七粒即利又方以滑石末水和泥臍下二寸小便即利未利更塗之又方用車前草汁調滑石塗臍四畔方四寸熱即易之治妊娠小便不通臍下妨悶心神悶亂用紫菀去苗為末井花水調下二錢一方用紫草蔓荊實散治妊娠小便澀不通利用蔓荊實二兩搗羅為散每服二錢溫水調服空心午前各一服衛生寶鑑濃煎蔥白湯調下治妊娠卒小便不通蔓荊子二兩上搗細羅為散每服不計時候煎蔥白湯調下一錢治妊娠小便不通利方用蕪菁子七合為末水和服方寸匕日三治妊娠遍身浮腫吃前方子未得全效小便未得通快宜服此方若遍身不腫止小便不通一兩日亦可服此藥一二盞山梔知母前胡升麻麥門冬冬葵子葶藶桔梗各等分上細杵羅為末每服三錢水一盞二分蔥白五莖煎同取一盞後和滓吃遺失不禁附論夫腎主水入胞為小便腎氣和平乃能約制溲出以時若妊娠腎虛胞冷不能約制故小便利下而多也其證令人背項憎風小腹急痛治法當加以扶養胎氣之劑方熟乾地黃丸治妊娠小便不禁臍腹疼痛熟地黃焙巴戟天去心肉蓯蓉酒浸一宿切焙五味子山茱萸醋浸一宿炒蒺藜子炒去角萆薢蜀椒去目及閉口者炒取紅山芋續斷各一兩菟絲子酒浸別搗杜仲去粗皮炙各一兩沉香一分上為細末煉蜜和丸如梧子大每服十五丸食前溫酒下椒菊丸治妊娠小便日夜頻數蜀椒去目及合口炒取紅二兩甘菊花肉蓯蓉酒浸一宿切焙菖蒲各一兩巴戟天去心遠志去心黃耆銼附子炮裂去皮臍各半兩上為細末酒煮麵和丸如桐子大每服二十丸空心食前溫酒下菟絲子丸治妊娠小便利日夜無度菟絲子酒浸焙乾別搗二兩菖蒲肉蓯蓉酒浸切焙各一兩蛇床子酒浸三日河水淘焙乾五味子洗焙各半兩防風去叉遠志去心各一分上為末煉蜜和丸搗三百杵丸如桐子大每服十丸空心溫酒下溫氣除寒補下丸治妊娠小便利葫蘆巴酒浸焙龍骨研菖蒲各半兩遠志去心一兩半補骨脂炒益智去皮肉蓯蓉酒浸一宿切焙各一兩上為細末煉蜜和丸如桐子大每服三十丸空心溫酒下桑螵蛸湯治妊娠小便滑數桑螵蛸炒人參各一兩鹿茸去毛酥炙黃耆銼各二兩牡蠣粉一兩半甘草炙銼半兩上為搗粗篩每服三錢水一盞生薑三片大棗二枚擘煎至七分去滓食前溫服雞䏶胵散治妊娠遺尿雞䏶胵十具炙乾熟乾地黃焙當歸焙各半兩牡蠣粉黃耆銼各一兩厚朴去粗皮生薑汁炙三分上搗羅為散每服二錢匕食前溫酒調下鹿茸丸治妊娠下焦冷氣少腹疼痛小便多鹿茸一兩白龍骨三分桑螵蛸半兩牡蠣粉二兩上為末酒煮麵糊和丸如梧子大每服二十丸空心食前溫酒下艾葉丸治妊娠小便利少腹痛艾葉炙乾薑各一兩厚朴益智各半兩上為末煉蜜和丸如桐子大每服三十丸米飲湯下以飯壓之秦椒丸治妊娠小便利秦椒六兩蘹香子炒一兩黃蠟四兩上搗羅二味為末熔蠟和丸如桐子大每服二十丸空心用溫酒下白薇散治妊娠小便無度尿不知出時胎漏故也白薇白芍藥各一兩上搗羅為散每服一錢匕食前溫酒調下日三雞翎酒療妊娠尿不知出時胎漏故也用雞翎燒灰末溫酒調服方寸匕桑螵蛸散治妊娠小便不禁用桑螵蛸十二個炙為細末每服三錢空心食前米飲調下治小便利燒遺尿人薦草灰服之瘥治小便遺失阿膠三錢牡蠣四錢鹿茸四錢上銼末挑三分水一盞半煎至一盞空心細末米飲調亦得瘧疾附論夫妊娠病瘧者由夏傷於暑客於皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱正邪相擊陰陽交爭陽盛則熱陰盛則寒陰陽相雜寒熱俱歇若邪動氣至交爭則復發故瘧休作有時其發寒時節漸晏者此由風邪客於風府循膂而下衛氣至一日一夜常大會於風府故發日晏其發日早者衛氣之行風府日下一節二十一日至尾骶二十二日入脊內上注於伏沖之脈其行九日出於缺盆之內其氣既上故發更早其間日發者由風邪內搏五臟橫連募原其道遠其氣深其行遲不能日作故間日蓄積乃發也妊娠而發者則寒熱之氣相迫傷於胎故多損動也又云凡懷孕婦人病瘧可煎白虎湯小柴胡柴胡飲子等藥如大便結硬可用大柴胡湯下微利過不可大吐瀉恐傷其孕也經曰夏傷於暑秋必痎瘧方松羅散治妊娠患瘧發時憎寒壯熱口乾多吃冷水腹內㽲刺疼痛不止松羅半兩鱉甲半兩恆山半兩烏梅肉七枚硃砂漢防己各一兩澤瀉半兩麥門冬一兩知母連翹各半兩黃丹石葦虎杖各一分生乾薑一兩上搗細羅為散每服不計時候以溫酒調下二錢清脾湯治妊娠作瘧熱多者青皮厚朴白朮草果各二錢柴胡茯苓半夏黃芩甘草人參各等分常山一半上銼散每服四錢生薑五片地骨皮少許煎不時溫服或加麥門冬去心二十粒如未即效宜服勝金丸阿膠散阿膠一兩半赤芍藥當歸柴胡黃芩白茯苓白朮各一兩麥門冬一兩半甘草半兩上搗篩為散每服四錢水一盞入蔥白二莖煎至六分去滓不計時候溫服人參散治妊娠瘧疾頭疼憎寒壯熱面黃不思飲食人參知母麥門冬柴胡桑寄生白茯苓厚朴各一兩甘草半兩上搗篩為散每服四錢水一盞煎至六分去滓不計時候溫服驅邪散妊娠瘧疾者何故蓋營衛虛弱脾胃不足或感風寒或傷生冷轉成瘧疾急服驅邪散莫待吐逆見物不思卒難醫療高良薑白朮草果仁橘紅藿香葉縮砂仁白茯苓各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片棗一枚煎至八分去滓不拘時候七寶散治男子婦人一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少一日一發或一日兩三發或連日或間日發或三四日一發不問鬼瘧不伏水土山嵐瘴氣似瘧者一治婦人妊娠六七日而患瘧疾皆可服之常山厚朴青皮陳皮甘草檳榔草果去皮各等分上㕮咀每服半兩於未發隔夜用水一碗酒一盞煎至一大盞濾出露一宿卻將滓再用酒水更依前煎一次去滓別以碗盛貯亦露一宿來日當發之早蕩溫面東先服頭藥少歇再服藥滓大有神效嘗治一婦妊娠六七個月而染瘧疾先寒後熱六脈浮緊衆醫用藥柴胡桂枝無效因言此疾非常山不愈也衆醫不肯因循數日病難無計黽勉治之遂用七寶散一服愈黃帝問曰婦人重身毒之奈何岐伯曰有故無殞帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止豈不以審藥之性味明治療之方處以中病與疾適好於半而止之勿過則何疑余於攻治哉當歸散治妊娠患瘧憎寒體顫當歸白芍藥茯苓枳殼白朮各一兩鱉甲一兩甘草銼一兩上搗篩為散每服四錢水一盞煎至六分去滓不計時溫服知母散治妊娠瘧疾憎寒壯熱口乾煩悶知母白茯苓麥門冬柴胡各一兩烏梅三分大青甘草各半兩上搗篩為散每服四錢水一盞煎至六分去滓不計時候溫服治妊娠患瘧疾湯恆山二兩甘草一兩黃芩三兩烏梅十四枚石膏八兩上㕮咀以酒水各一升半合漬藥一宿煮三四次去滓初服六合次服四合後服二合凡三服一方有麥門冬去心一兩無石膏名恆山散忌海藻菘菜生蔥黃