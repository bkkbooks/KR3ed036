歸地黃芍藥川芎藁本防風白芷各一兩細辛五錢上為粗末水煎服治破傷風手中戰掉不已者硃砂別研南星薑製獨活去皮各二錢人手足指甲燒絶煙六錢上為細末分作三分酒調服之立效治破傷風魚鰾二兩燒灰全蠍七個江子五粒燒灰筋聚不以多少燒灰上為細末每服一二錢用好酒調下天南星散出楊氏家藏方治破傷風遊入四肢口不能語及四肢強硬蜈蚣一條全去頭足炒黃天南星生用防風生用草烏去皮尖生用各等分上為細末每服一錢熱酒調下不拘時候雄黃散出保命集治破傷風南星一三錢半夏五錢天麻五錢雄黃二錢半上為末每服一錢以酒調下有涎於藥中可加大黃下之地榆防風散出保命集治破傷風中風半表半裡頭微汗身無汗不可發汗宜服地榆防風地丁馬齒莧各等分上為末米飲下三錢白朮湯治破傷風大汗不止筋攣搐搦白朮乾葛一兩升麻二兩黃芩半兩上為細散水二盞煎一盞服治破傷風出儒門事親書烏梢蛇頭尾一個兩頭尖四個全蠍四個上為細末另用石灰五升柴灰五升沸湯五升淋灰水澄清下藥熬之鐵鍋器內攪成膏子如稠用唾津調先用溫漿洗淨瘡口後塗藥即時藥行吐黃水一日以新水漱口即愈玉真散一名奪命散一名防風散出三因方治風自諸瘡入破傷風及金刃傷打撲傷損天南星防風各等分沒藥半兩另研上為細末破傷風以藥敷貼瘡口然後以溫酒調下一錢如牙關緊急角弓反張用藥二錢童子小便調下或因鬥毆相打內有傷損以藥二錢溫酒調下打傷至死但心頭微溫以童子小便灌下二錢並進三服天南星為防風制服之不麻出黃水盡為效一日一次換一方無沒藥或以醋作靨急貼瘡上一方用清油調塗瘡上昔張知府宰清流日以此二方授直聽醫者救欲死者數人凡居官者不可無此二方極效治破傷風口噤身強直出海上名方藿香草烏頭生用去皮尖黃耆上等分為細末每服一字至半錢熱酒調下後用藥貼瘡口治破傷風白芷南星防風上各等分為末乾摻瘡口亦可水煎服之神應丸一名救命丹治緊急破傷風身體沉重或角弓反張搐搦不省人事半夏一兩半草烏頭三兩巴豆一兩去殼並生用上為細末好棗四兩換水煮爛剝去皮同藥搗成劑丸如蓮子大緊者無灰酒磨一丸慢者半丸吐涎或瀉勿疑輕者不須服更審量老幼歲數虛實加減之天南星丸治破傷風牙關緊急口噤不開口面喎斜肢體弛緩天南星一枚及三分者炮地龍五條醋炙土虺蛇一條去頭尾腸皮骨醋炙上為末醋煮麵糊丸如緑豆大每服三丸至五丸生薑酒下稀蔥粥投汗出即瘥昔宮使明名光祖向任統制官嘗重傷服此得效乾蠍丸治破傷風乾蠍酒炒天麻各半兩蟾酥二錢湯浸化如稀糊上將二味搗羅為末用蟾酥糊丸如緑豆大每服一丸至二丸豆淋酒下甚者加三丸至五丸定命散治破傷風項頸緊硬身體強直蜈蚣一條全者白花蛇項後取烏蛇項後取各二寸酒洗浸去皮骨並酒炙上為細散每服二錢匕至三錢匕煎酒小沸調服守宮丸出聖惠方治破傷風身如角弓反張及筋脈拘急口噤守宮炙乾去足七枚膩粉半分天南星一兩酒浸三日爆干以上二味搗為末上同研勻細薄荷麵糊丸如緑豆大每服斡口開以酒灌下七丸有汗出得解更與一服再汗即瘥一方加白附子一兩煉蜜為丸守宮一名闢宮子烏頭散治破傷風發熱頭痛噁心煩悶草烏頭生用去蘆頭白礬生用蜀椒去目並閉口者生用各一分上為細末瘡口未合以津唾調塗覺清水出是效三味追風散烏頭生去皮臍一枚雄黃研一分麝香研一分上為細散每服一錢匕以溫酒調下銀花散治破傷風打撲內損天南星大者半生半炮白附子半生半炮防風去蘆頭各等分上為細散每服二錢匕重者童子小便調下稍輕熱酒調下如外傷用此藥貼瘡口仍依法服之如破傷風先以小便溫洗瘡口次用藥干貼追出風毒立愈勢稍惡口噤者亦童子小便調斡開口灌之如斗打至死但心頭微暖者並灌二服即活常須合下以備急用天南星散治諸般風及治攧撲損傷中風天南星雄黃烏頭尖各等分上同研為細末乾摻上或揉微破敷之治破傷風無問表裡角弓反張地膚子炒八錢秋蟬二個麝香少許上為末酒調服每服二錢雄黃散出保命集治破傷風牙關緊急草烏頭去皮防風為末雄黃別研上等分每服一字熱酒調灌之亦治洗頭風噤了牙關者如破傷風身體強硬更用天南星二兩防風一兩為末先以熱小便洗瘡貼之有紫汗出效一方里和可服里不和不可服治破傷風出神效方儒門事親白芷生用草烏尖生用去其皮各等分上為末每服半錢冷酒一盞入蔥白少許同煎服之如人行十里以蔥白熱粥投之汗出立愈甚者不過二服治破傷風見血出濟生拔粹方半兩當歸蠍二錢合來捶碎酒同煎直須軟爛連柤吃一切傷瘡保萬全香膠散出三因方治破傷風口噤強直狀如中風魚膠燒七分留性麝香少許上為細末每服一二錢用酒調下如不飲酒只用米湯調下又一方以蘇木煎調下麝香散治破傷風麝香研乾蠍各一二分上為末敷患處令追風速愈生大豆治破傷風神效黑豆四十個味甘辛硃砂二十文上同研為末以酒半盞調一錢字下闢宮子丸出聖惠方治破傷風身體拘急口噤眼亦不開闢宮子一條一名守宮酒浸三日曝乾搗羅為末膩粉半分上同研令勻以煮槐膠和丸如緑豆大不計時候拗口開以溫酒灌下七丸逡巡汗出瘥未汗再服治破傷風出儒門事親書病人耳塞並爪甲上刮末唾津調塗瘡口上立效無瘡口者難用又方用白麵燒鹽各一撮新水調塗瘡上又方用蝦䗫二兩半切爛為泥入花椒一兩同酒炒熟再入酒二盞半熱服之如重車行五里地通身汗出神效治破傷風腫方出千金方取杏仁研為膏厚塗患處仍燃麻燭遙炙之治因瘡腫痛者皆中水中風寒所作腫入腹則殺人方出千金方溫桑灰汁漬冷復溫之常令熱神效治破傷風欲死者用蜈蚣碾為細末搽牙吐去涎沫立瘥治破傷風出瑞竹堂方無問新舊石灰驗瘡大小盡干塗之不須封裹神效治破傷風迷悶不省人危急者但氣絶心腹溫可治用避陰槐樹枝皮旋用刀刻取一塊連粗皮在外安在破傷處用艾蘸於槐皮上灸百炷不妨如瘡口痛者灸至不痛不痛者灸至痛然後用火摩不拘時候又方出瑞竹堂方治緊急破傷風用黃蠟一塊以熱酒化服之立瘥與前玉真散一對連用牡蠣散出三因方治破傷風口噤強直以牡蠣取末粉敷瘡口仍以末二錢煎甘草湯調下獨聖散治破傷風用蘇枋木不拘多少搗羅為細散每服三錢匕酒調服之立效一方用巴豆七粒碎同用必效散治破傷風身項強硬不知人事兼治打撲損傷一名海神散用鰾膠白色者不拘多少於新瓦上用炭火爆焦黑色為度搗羅為細散每服三錢匕熱酒調下如不省灌之一方用童子小便調服亦可急風散治破傷風腰背反折項強直牙關緊急用草烏頭不拘多少用釅醋煮十餘沸漉出曝乾如此十遍為度搗羅為細散每服一錢字溫酒調下白殭蠶散治破傷風身腫牙關不開用白殭蠶直者不拘多少生研為末每用以生薑自然汁調以雞翎於瘡口掃之勿令乾斯須腫拓皮皺為效仍用生薑汁調半錢匕服一方治癮疹及大腸風祕以酒調服之一方治風痰生薑汁一茶腳溫水調灌之治破傷風用燈心草爛嚼和唾貼之以帛裹血立效治狗咬破傷風以人參不拘多少桑柴火上燒令煙絶用盞子合研末摻瘡上立效治破傷風用大黃末一兩加干大糞作三服以好酒服之以利三五行為度治破傷風瘡口作白痂無血者殺人最急治之用雄雀糞直者研細熱酒調半錢服之舒筋法治破傷後筋攣縮不能伸他病筋縮亦可用以大竹管長尺余鑽一竅系以繩掛於腰間坐貼舉足搓袞之勿計工程久當有效此方出夷堅志言之有理曾試自有效治破傷風黃明膠燒存性調二錢以好酒調之追風散治破傷風蟬蛻去土不以多少上件為細末摻在瘡口上毒氣自散治破傷風燒鰾三錢為灰熱酒調下口噤挑開灌下一方入麝香少許又方生天南星一個為細末水調塗四面水出為效赤散子治破傷風雄黃少許草烏頭四個天南星十個上為細末患者看瘡口大小以新水調塗之用紙覆面蓋如瘡忍痛即以半夏散治之半夏半兩黑附子半兩天南星半兩蟬殼三十個藿香少許烏蛇一分取肉炙上件六味同為末每服一字錢豆淋酒調下如瘡上忍痛即並吃三服立效如不忍痛即不與吃蜈蚣散蜈蚣一對鰾五錢左盤龍五錢炒煙盡為度野蛤糞是也上件為細末每服一錢清酒調下治法依前和用里和至愈可服但有里證不可服次當下之前蜈蚣散四錢巴豆霜半錢燒飯為丸如緑豆大每服一丸漸加六七丸清酒調蜈蚣散少許送下以宣利為度內外風去可常服羌活湯緩緩而治不拘時候服之羌活湯者治半在表半在裡也治一切破傷風水毒腫痛不可勝忍用麝香末一字錢納在破傷瘡口中用舊罩翠紙裹定取出盡膿水便效硃砂丸治破傷風目瞪口噤不語手足搦搐項筋強直不能轉側發則不識人硃砂研半夏洗川烏頭各一錢雄黃五錢鳳凰苔三錢麝香少許上為細末棗肉為丸如梧桐子大每服一丸或二丸冷水下以吐為度天麻丸治破傷風天麻三錢川烏頭三錢去皮生用草烏頭一錢半雄黃一錢半上為細末酒糊為丸如梧桐子大每服十丸溫酒送下不拘時候立效散治破傷風及沐發中風極效方上以亂髮如雞子大無油器中熬焦黑研為末以好酒一盞沃之何首烏末二錢同攪候溫灌之下咽喉過一二刻再灌立效除風破血以草石蠶浸酒服草石蠶生高山石上根如箸上有毛節如蠶葉似卷柏治破傷風防風天南星上二味等分為末每服三二匙童子小便五升煎至四升服愈即止治破傷風入瘡強直天南星防風上等分為末以醋調作靨貼之
