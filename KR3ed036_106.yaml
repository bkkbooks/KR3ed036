仁三分大黃一兩枳實芍藥厚朴各半兩一方用大黃枳殼一斤得合二兩厚朴四兩杏仁六錢一字麻仁一兩二錢半芍藥一兩乃均制合理用當以推理治肺臟風毒熱壅鼻塞口乾大便祕出本草方枳殼麩炒去瓤川朴硝川大黃各一兩牛蒡子炒半兩芎藭二分郁李仁湯浸去皮一兩半上為末每服一大錢蜜水調下忌一切熱毒等物搜風散出本事方治大便祕結風盛祕澀青皮去白威靈仙去頭洗各二兩大黃生一兩大戟一兩牛蒡子新瓦炒二兩上為散每服一錢人壯實每服三錢蜜酒調服畢漱口大麻仁丸治大腸風壅祕澀不通大麻仁研如泥五兩芎藭一兩一錢附子去皮臍生半兩大黃碎銼酥炒一兩甜硝半兩上為末煉蜜丸如梧桐子大每服三十丸溫酒下大黃丸出聖濟總録治風氣大腸澀結寬胸膈消壅滯大黃銼炒一兩木香一分牽牛子生用郁李仁湯浸去皮各二兩上為末煉蜜和搗數百下丸如梧桐子大每服二十丸茶清下度病人臟腑虛實臨時加減二仁丸出危氏方專治虛人老人風祕不可服大黃藥者杏仁去皮尖麩炒黃麻仁各另研枳殼去瓤麩炒訶子慢火炒捶去核上等分為末煉蜜丸如梧桐子大每服三十丸溫水下加減神功丸和劑局方治三焦氣澀心腹痞悶六腑風熱大便不通腰腿疼痛肩背重悶頭昏面熱口苦咽乾心胸煩躁睡臥不安及治腳氣並素有風人大便結燥訶黎勒牽牛微炒大麻仁另搗如膏各四兩人參去蘆一兩上為末入麻仁搗研勻煉蜜丸如梧桐子大每服四十丸溫水或米飲食後臨臥服如大便不通可倍丸數一方有大黃無牽牛溫酒亦得地龍丸治風氣壅滯大腸祕澀地龍去土牽牛子半生半炒苦參各一兩烏頭生去皮尖半兩上為末醋煮稀麵糊丸如梧桐子大每服十五丸至二十丸空心夜臥米飲下凌霄花根丸治大腸虛冷風祕凌霄花根去皮洗焙三兩皂莢子五十枚烏藥銼人參各半兩上為末煉蜜丸如緑豆大每服十五丸溫水下一日進二服妙黑神丸治大腸祕澀不通風結巴豆一兩麩炒去皮心摸出油硫黃研一分乾薑炮半兩皂莢三梃不蚛者燒令煙絶與硫黃同研上搗乾薑為末與三味研勻用蒸餅去皮湯浸搦干紙裹煨透和藥搗勻丸如梧桐子大每服三丸空心生薑湯下加至四丸為妙雄黃丸治風熱氣壅大便不通雄黃研鬱金末各一兩巴豆半兩去皮心膜研如膏生面二兩上同研細滴水丸如梧桐子大每服二丸至三丸食後臥時生薑湯下量虛實加減檳榔散治風熱大便不通檳榔二枚銼朴硝研大黃銼炒青橘皮湯浸去皮焙各一兩上為末每服二錢食後臨臥蔥蜜湯調下蜜膩散出聖濟總録治風熱盛大小腸祕澀大黃煨銼搗末牽牛子生杵為末甘遂微炒黃搗為末上稱大黃牽牛末各三錢甘遂末一錢入膩粉半錢同研勻每服二錢匕濃煎蜜湯調下食前服威靈仙散出護命方治老人風氣壅盛大腸祕澀五六日方大便一次天陰日盛頭旋目暗發作無時宜服此方威靈仙一兩酒浸切焙芎藭羌活去蘆各半兩上為散每服二錢匕空心蔥湯調下不轉第二日再服祛風順氣香枳散余居士選奇方治大腸祕澀枳殼去瓤麩炒防風去叉各一兩銼甘草炙銼半兩上搗為散每服二錢匕沸湯點服空心食前各一服郁李仁散出聖濟總録治風熱氣祕郁李仁去皮尖炒陳橘皮去白酒一盞煮乾京三稜炮銼各一兩上為散每服三錢匕空心煎熱水調下麻仁丸出濟生拔萃方治風祕大便不通枳殼去瓤麩炒川芎各等分麻仁泥子減半上為末煉蜜丸如梧桐子大溫水下食前牛黃丸治大腸風熱祕牛黃細研一分大黃銼炒二兩巴豆去皮心膜麩炒研新瓦上取霜半兩上為末酒煮麵糊丸如緑豆大每服五丸臨臥米飲下量虛實加減檳榔丸出聖濟總録治風祕大便不通發燥引飲檳榔銼兩枚為細末黑牽牛子四兩搗取末二兩上拌勻煉蜜和丸如梧桐子大每服二十丸溫薑湯下不計時候看臟腑虛實加減治大腸有風大便祕結及氣祕尊年之人宜服危氏方皂角炙去子枳殼去瓤麩炒各等分上為末煉蜜丸如梧桐子大每服七十丸空心米飲下一方飯為丸亦可濃磨沉香湯下枳殼飲傳信適用方治老人大便風祕不通蹇澀妨悶或用蜜導之類不能通者用枳殼水浸去瓤麩炒為末每服一大錢入阿膠三斤生薑五斤蔥白五莖水一盞煎至六分去滓入蜜少許空心溫服次用蔥白十莖爛研塗臍中卻以手蘸蔥湯自內其腰間浴尉至小腹下少頃氣透即通治風祕風科集驗用阿膠麩炒研為細末煎服三錢匕氣實者木香最宜老年人服一方阿膠一斤煎蔥白湯下治有風大便祕澀及關格不通用不蛀皂角燒灰為末每服一錢米飲調下一方去皮子炙黃為末蔥蘸內肛內立通吹亦可一方治風祕用不蛀皂角當中砍一寸許去黑皮以沸湯半盞泡上用盞蓋定候通口服之先辦少粥通後即食名風祕湯攢宮有一老人患八九日不通有木匠授與此方只一服見效一方燒碗蓋置於桶內熏下部即通妙白殭蠶散治大腸風祕方見白殭蠶丸治心風祕本草水銀一兩藕節八個上研搗藕節令細次入水銀同研成砂子丸如雞頭每服二丸磨刀水下一二服瘥大黃丸出聖惠方治風壅腸澀滯川大黃一兩半銼微炒大麻仁一兩半車前子一兩半菟絲子三分酒浸三日曬乾別搗為末郁李仁湯浸去皮尖微炒一兩半枳殼一兩半麩炒微黃防風三分去蘆獨活三分山茱萸三分薯蕷三分檳榔一兩牛膝去苗三分上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服夜臨臥時以溫漿下三十丸通祕散楊氏家藏方治風祕大便澀香白芷不拘多少焙乾上為細末每服二錢蜜水少許溫米飲調下連進二服即通賊風附論夫邪之中人有四從所不勝來者謂之賊邪與冬至之日疾風南來名曰賊風其義一也聖人於虛邪賊風避之有時以邪從所不勝來故謂之虛邪以其竊害中和之氣故謂之賊風其證痛而不熱則不能俯仰轉動不熱則身內索冷欲得熱尉即小寬也加以風冷則骨節深痛按之徹骨或遇冷氣相搏則結瘰癧或偏枯風熱相搏則變附骨疽方追風散聖惠方治中賊風口噤昏沉半身不遂風毒入臟口面喎斜天南星炮裂白附子炮裂附子去皮臍炮裂烏蛇肉酒浸炙微黃天麻白殭蠶微炒各一兩乾蠍微炒羌活防風去蘆頭半夏湯浸洗七遍去滑蛇床子藁本白芷蔓荊子犀角屑各二分牛黃細研半兩威靈仙半兩麻黃細銼一兩麝香細研一分上搗細羅為散入研了藥都研令勻每服不計時候以溫酒調一錢秦艽散出聖惠方治賊風入腹短氣心下煩熱手足疼痛四肢不舉口噤不能語秦艽去苗一兩羚羊角屑防風去蘆頭葛根銼赤芍藥漢防己附子炮裂去皮臍細辛赤茯苓各三分當歸銼微炒人參去蘆頭甘草炙微赤銼木通銼桂心白朮各半兩上粗搗羅為散每服四錢以水一鍾煎至五分去滓入竹瀝一合更煎一兩沸不拘時候溫服麻黃湯治中賊風急強大呼不自知覺身體盡痛麻黃去根節煎掠去沫焙黃芩去黑皮芎藭當歸切焙紫石英甘草炙銼桂去粗皮遠志去心獨活去蘆頭桔梗炒各一兩防風去叉石膏碎各二兩乾薑炮一兩半杏仁二十五枚去皮尖雙仁微炒上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時日三夜一茵芋飲出聖惠方治賊風入腹腹中拘急煩亂恍惚妄語迷惑不知人事口噤不開臥則驚悸口乾惡風時時失精身體沉重茵芋烏頭炮裂去皮臍乾薑炮細辛去苗葉黃芩去黑皮桂去粗皮天雄炮裂去皮臍防風去叉白茯苓去黑皮一兩一作赤茯苓秦艽去苗土防己當歸焙甘草炙各二兩上銼如麻豆每服五錢匕水一盞半入竹瀝少許煎八分去滓溫服大續命湯出聖惠方治中賊風急強大呼身體疼痛麻黃去根節煎掠去沫焙三兩石膏碎防風去叉各二兩乾薑焙一兩半黃芩去黑心芎藭甘草炙白朮遠志去心獨活去蘆頭各一兩紫石英半兩杏仁二十五枚去皮尖雙仁炒上粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時良久再服一方治中風急強大呼不自知覺身體強直者有桂無白朮名桂枝湯漢防己散出聖惠方治賊風身體拘急舌強難言手足不遂漢防己黃芩各一兩麻黃去根節石膏各一兩半赤芍藥芎藭防風去蘆頭羌活附子炮裂去皮臍當歸銼微炒各三分杏仁湯浸去皮尖雙仁麩炒微黃白朮各半兩上粗搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服羚羊角散出聖惠方治賊風身體緩弱手足不遂言語謇澀精神恍惚羚羊角麻黃去根節杏仁湯浸去皮尖雙仁麩炒微黃各一兩石膏二兩人參去蘆頭赤芍藥各半兩芎藭漢防己桂心附子炮裂去皮臍防風去蘆頭各三分上粗搗篩為散每服三錢以水一中盞煎至六分去滓不計時候溫服葛根湯治中風半身不遂口面喎斜言語不便生葛根切半夏湯洗七遍各四兩生薑五兩與半夏同搗炒乾獨活去蘆頭桂心去粗皮二兩半防風去叉當歸芍藥甘草炙各一兩附子炮裂去皮臍半兩上銼如麻豆大每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓溫服日二夜一杏仁飲一名西州續命湯治中賊風身體不收不知痛處猝語不得手足拘急腰痛引頭目眩欲倒臥即反張脊不著席脈動不安恍惚恐懼上氣嘔逆等症麻黃散出聖惠方治賊風身體及心脅疼痛四肢不利麻黃去根節一兩半當歸銼微炒桂心各一兩芎藭茵芋萆薢銼乾薑炮製銼各半兩黃芩甘草炙微赤銼各三分上粗搗羅為散每服三錢以水六分煎至三分次入酒四分更煎三兩沸去滓不計時候溫服桂心散出聖惠方治賊風心腹拘急四肢疼痛腹滿欲死桂心防風去蘆頭芎藭甘草炙微赤炒銼檳榔各三分乾薑炮製銼吳茱萸湯浸七遍焙乾微炒枳殼麩炒微黃去瓤各半兩秦艽去苗一兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服側子散出聖惠方治賊風毒氣攻注四肢疼痛發動不可忍側子炮裂去皮臍當歸銼微炒桂心赤芍藥附子炮裂去皮臍防風去蘆頭檳榔甘草炙微銼各一兩麻黃去根節二兩上粗搗篩每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服甘草飲治賊風入腹角弓反張口噤舌強目視不明不能言語舉體不仁或心腹疼痛甘草炙黃芩去黑心附子一枚炮裂去皮臍人參芎藭防風去叉麻黃去根節防己各一兩上銼如麻豆每服五錢用水一盞半入生薑三片煎至六分去滓空心食前溫服一方加芍藥一兩麻黃飲治賊風入五臟四肢心脅急痛咽乾口噤麻黃去根節當歸切焙芎藭甘草炙乾薑炮各二兩黃芩去黑心一兩杏仁三十枚去皮尖雙仁炒上粗搗每服五錢許酒半盞水一盞煎至一盞去滓宜空心服之秦艽丸一名桂心湯治賊風入腹搶心拘急四肢不遂腹滿欲死者當歸湯出三因方治賊風口噤角弓反張痙者療諸賊風腫脾風入五臟恍惚莽草一斤烏頭附子躑躅各三兩上以苦酒一升浸一宿豬脂四斤煎三上三下絞去滓向火以手摩病上三百度應手即瘥耳鼻病可以綿裹納之兼療諸疥癬雜瘡烏頭膏出聖惠方治賊風身體不遂偏枯口喎僻及傷寒身強直烏頭炮野葛去心各五兩莽草一斤上㕮咀以好酒浸令淹漸再宿三日浸之以不中水豬肪五斤煎成膏和藥作東向露灶以葦薪煎三上三下藥成去滓有病者向火摩三千遍汗出即愈若觸露鼻中塞對火摩頭頂鼻中即通藥不可入口眼也倉公酒出鮑氏方治賊風口噤角弓反張當歸防風各三分獨活一兩半麻黃一兩一錢細辛半兩附子一個上為散每服四錢水酒各半盞煎口不開者抉開納藥一服蘇二服少汗三服大汗愈防風散出指南方治賊風口喎防風一兩羌活半兩甘草一分上為粗末每服五錢水二盞煎一盞去滓入麝香一字溫服治賊風出本草用曾經辛苦鐵燒赤投酒中熱服之即是勞鐵也去賊風風痹出本草用穭豆炒令黑及熱納酒中漸漸飲之治賊風反折出本草以赤銅屑熬使極熱投酒中服五合日一又燒赤銅五斤納酒二斗中百遍服甚驗治賊風以稱錘燒令赤投酒中及熱飲之治賊風風痹破血出本草以雞屎和黑豆炒浸酒服一用雞子和豆淋酒服治賊風出本草以薄荷煮汁服治中風口偏不語者倉茱萸子二升豉三升上二味酒五升共煮四五沸冷服半升日三四服得汗即瘥止血除賊風用烏氈燒為灰酒下二錢許治賊風毒腫及麻痹用莽草濃煎湯淋洗又方用麻子炒令香搗碎以童子小便浸取汁服之麻子乃今人績布麻種子也又方用生大豆炒令黑色熱投酒中漸漸服之
