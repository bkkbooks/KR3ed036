body:
  text: 卷一百六諸風門風痱附論夫氣血虛甚風邪乘之內外不得通泄其病為痱風痱之狀身體不痛四肢不收神智不亂時能言者是也字書謂病痱而廢肉非其肉者以身體無痛四肢不收而無所謂也夫風痱者猝不能語口噤手足不遂而強直者是也治之以伏龍肝五升為末冷水八升如絞取汁飲之能盡為善古人立方皆清病根冷熱治之今人臨急造次搜尋即用故多不驗所以欲用方者先定其冷熱乃可檢方用無不效湯藥既爾丸散亦然凡此風之動也必由熱盛故有葛汁竹瀝等諸冷藥焉學者不可不仔細識其方意也然其人無密室者不可與療以強人居室不密者尚中風邪況服藥之人乎方防風湯治風痱四肢不收言語謇澀防風去叉銼獨活去蘆頭防己秦艽去苗黃耆芍藥白朮芎藭遠志去心各二兩石膏碎三兩升麻二兩石斛去根銼三兩丹參牛膝去心酒浸切焙甘草炙銼天門冬去心焙羚羊角鎊屑五加皮地骨皮人參茯苓去木厚朴去粗皮生薑汁炙五次各二兩陳橘皮湯浸去白焙麻黃去節先煎掠去沫焙乾熟乾地黃焙乾各一兩半薏苡仁炒一兩半上㕮咀每以六錢水三盞煎至一盞半去滓分溫二服空心夜臥服之若覺心中煩熱每煎將熟別入竹瀝一合更煎三沸溫服獨活散治風痱心熱煩悶四肢不仁獨活秦艽去苗防風去蘆頭生乾地黃羚羊角屑各二分漢防己石膏麻黃去根節各一兩黃耆銼赤芍藥人參去蘆頭茯神白朮芎藭遠志去心川升麻丹參甘草炙微赤銼五加皮地骨皮天門冬去心薏苡仁各半兩上㕮咀每服四錢以水一中盞入生薑半分煎至五分去滓不計時溫服葛根散治風痱言語不轉四肢軟弱上焦煩壅心氣不利葛根銼麻黃去根節赤芍藥防風去蘆頭黃芩漢防己桂心白朮人參去蘆頭獨活芎藭川升麻牛膝去苗陳橘皮湯浸去白瓤焙羚羊角屑五加皮各一兩石膏二兩上粗搗篩為散每服四錢匕以水一中盞入生薑半分煎至五分去滓入淡竹瀝半合更煎五分沸不計時候服大有效伏龍肝湯治風痱猝不能語口噤手足不隨而強直者宜用伏龍肝五升末水八升和攪取汁飲之能盡為善保壽丸治風痱身體不痛四肢不收神志不亂時能言者牛黃研丹砂研雄黃研犀角鎊天麻蟬殼去土乾薑炮白殭蠶炒半夏湯洗十次焙天麻星炮烏蛇酒浸去皮骨炙白附子炮當歸切焙麝香研各半兩膩粉一分上為細末用槐膠三兩以長流水浸三日取搗令爛入藥末不語搜和丸如雞頭子大常服一丸茶酒嚼下少有風疾用槐柳桃蔥白各十莖細銼同鹽漿水濃煎下二丸浴後服二丸衣被蓋汗出立瘥産後中風忽中急風豆淋酒及梨汁薄荷汁化下五丸立效風痰酒痰偏宜服之天麻地榆丸治風痱身體不痛四肢不收神志不亂天麻地榆元參金鈴子烏藥烏頭去皮臍生用防風去叉乳香研麝香研龍腦研丹砂研水飛沒藥研各一兩自然銅研一復時極細為度半兩上除乳香等別研外余藥焙乾搗羅為細末入前研藥拌勻煉蜜和丸杵千下如雞頭大每服三丸至五丸空心日午臨臥茶酒化下嚼吃亦得麻黃散治風痱身體不收不能言語冒昧不識人麻黃去根節三兩漢防己桂心各二兩獨活秦艽去苗細辛芎藭黃芩當歸杏仁湯浸去皮尖雙仁麩炒微黃各二兩乾薑炮製銼甘草炙銼微黃各半兩上㕮咀每服四錢以水一中盞煎至六分去滓不計時候稍熱頻服以汗出為度羚羊角散出聖惠方治風痱筋脈緩弱言語謇澀羚羊角屑桂心茯神麻黃去根節葛根銼附子炮裂去皮臍當歸銼微炒酸棗仁五加皮各一兩川升麻枳殼麩炒微黃去瓤獨活各一兩半上㕮咀每服四錢以水一中盞入生薑半分煎至五分去滓不計時候溫服麻黃湯出聖濟總録治風痱身體不能自收不能言語冒昧不知人獨活湯一名獨活煮散出聖惠方治風痱肢體緩弱言語謇澀冒昧不識人獨活去蘆頭四兩芎藭芍藥各三兩當歸切焙乾人參各二兩防風去叉葛根銼白茯神去黑皮一作赤防己各三兩石膏碎七兩羚羊角鎊屑麥門冬去黑皮各二兩甘草炙銼一兩半白朮二兩半磁石燒赤醋淬五次三兩桂去粗皮二兩上粗搗篩每服五錢以水二盞入生薑一棗大切生地黃一錢切杏仁五枚去皮尖碎研同煎至一盞去滓溫服空心午時夜臥各一服一方有赤茯苓無杏仁同煎名芎藭散西州續命湯出千金方治中風痱一作入藏身體不知自收口不能言冒昧不識人拘急背痛不得轉側麻黃六兩石膏四兩桂心二兩甘草芎藭乾薑黃芩當歸各一兩杏仁三十枚上㕮咀以水一斗二升煮麻黃再沸掠去末後下諸藥煮取四升初服一升猶能自覺者勿熱眠臥可厚覆少少汗出已漸減衣勿復大覆熱眠矣前眠不汗者後服一升汗後稍服五合一服安穩乃服勿頓服也汗出則愈勿復服飲食如常無禁忌勿見風並治上氣咳逆若面目大腫但得臥服之乃善凡服此湯不下者入口噓其背湯則下過矣病人先患冷汗者不可服此湯若虛羸人但當稍與五合為佳間有輒用此湯與産婦及羸人而有死者皆為頓服三升過多且湯濁不清故也但得清澄而稍稍服微取汗者皆無害也一方治風痱身體不能自收者有人參無黃芩一方治風癔邪氣入臟者入竹瀝半合煎服竹瀝湯出千金方治四肢不收心神恍惚不知人不能言竹瀝二升生葛汁一升生薑汁三合上相合溫暖分三服平旦日晡夜合一服服訖覺四體有異似好次進後湯方竹瀝一升生葛汁五合芎藭防己附子人參芍藥甘草桂心各一兩生薑四兩羚羊角三兩石膏六兩杏仁四十枚麻黃防風各一兩半上㕮咀以水七升煮減半納瀝煮取二升五合分三服取汗間五日更服一劑頻與三劑漸覺稍損仍進後藥竹瀝三升防風升麻羚羊角防己桂心芎藭各二兩麻黃三兩上㕮咀以水四升合竹瀝煮二升半分三服兩日服一劑常用加獨活三兩最佳頻進三劑若手足冷者加生薑五兩白朮二兩若不除更進後方竹瀝一升甘草一根二兩人參芎藭獨活升麻各一兩防風麻黃芍藥各一兩半生薑石膏附子一方作杏仁十四枚羚羊角防己桂心黃芩白朮各二兩上㕮咀以水八升煮減半納瀝煮取二升半分三服相去如人行十里久更服若有氣者加橘皮牛膝五加皮各一兩凡風痱服前湯得瘥訖可常服煮散悉除餘風防風防己獨活秦艽黃耆芍藥人參白朮茯神芎藭遠志升麻石斛牛膝羚羊角丹參甘草厚朴天冬五加皮地骨皮黃芩翼作薯蕷桂心各一兩橘皮乾地黃生薑麻黃各三兩檳榔翼作甘草藁本翼作附子杜仲翼作麥門冬烏犀角各二兩翼作山茱萸薏苡仁一升石膏六兩一云三兩上搗篩為粗散和攪令勻每服以水三升藥三兩煮取一升綿濾去滓頓服之取汗旦服若覺心中煩熱以竹瀝代水煮之獨活散一名天麻散出聖惠方治風痱言語謇澀四肢不收獨活去蘆頭天麻各三兩白蘚皮地骨皮人參麥門冬去心焙薏苡仁防風去叉赤芍藥惡實炒甘草炙各一兩阿膠炙令燥蟬殼炒羚羊角屑附子炮去皮臍桑根白皮銼各半兩上為散每服溫酒調下二錢許不拘時候白蘚皮散一名白蘚皮湯出聖惠方治風痱四肢緩弱心神煩悶不能言太一神精丹出簡易方治風痱尸厥鬼疰飛尸雄黃油煎七日雌黃丹砂光瑩者曾青磁石各一兩金牙石六錢上各研細將雄黃雌黃丹砂醋浸三日曾青用好酒於銅器中浸紙封曝百日急用七日亦得如天陰以火焙乾六味同研勻用砂盒盛令藥滿得三分許一比准盒子大小先以赤石脂末固封縫外用六乙泥固濟訖須候透干以晴明六合吉日合別泥作三個柱子高五寸令平穩如立鼎足狀安盒子下置火三斤遂旋添炭常令及五斤只在盒底不得過口五日為度放冷水中浸盒子候泥透剝去泥將盒子輕手取開其藥精英五色盡在蓋上亦有三色者絶白為上研細棗肉丸如粟米大每一粒飲服如口噤牙緊去前兩齒灌下即蘇合六乙泥法礬石黃泥裹燒一伏時研細蚯蚓糞鹹土鹽黃礬遠看如金絲色精明其色本緑各用一兩以黃泥裹火燒通赤如血取研黃泥一斤上同為末以紙筋一處搗和成泥風毒風祕附論夫風祕之病以大腸祕澀不通大腸者肺之腑通行水穀傳導所出若三焦不和風熱所搏則腸胃乾燥津液虛少糟粕結聚傳導不行令人心煩腹滿便祕不通也方羚羊角丸治熱毒風大便祕澀及心風健忘肝風眼暗羚羊角鎊人參羌活去蘆頭苦參銼防風去叉元參丹參大黃銼大麻仁別研為膏升麻梔子仁麥門冬去心焙龍齒研各一兩茯神去木黃連去須枳殼去瓤麩炒犀角鎊天門冬去心焙郁李仁去皮雙仁研生乾地黃各三分上為末與麻仁龍齒郁李仁膏同研勻煉蜜丸如梧桐子大空腹每服溫酒下二十丸加至三十丸羚羊角丸出聖惠方治風熱壅滯調氣利大腸羚羊角屑三分人參去蘆頭訶黎勒皮檳榔黃耆銼各半兩獨活川大黃銼碎微炒一兩枳殼去瓤麩炒微黃三分烏蛇酒浸去皮骨炙令微黃郁李仁浸去皮尖微炒各一兩半大麻仁一兩半赤茯苓地骨皮各二分上為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫水下三十丸以利為度麻仁丸出和劑方順三焦和五臟潤腸胃除風氣治冷熱壅結津液耗少大便祕難或閉塞不通若年高氣弱及有風人大便祕澀枳殼去瓤麩炒白檳榔煨半生菟絲子酒浸別末薯蕷防風去叉枝山茱萸車前子肉桂去粗皮各一兩半木香羌活各一兩郁李仁去皮別搗大黃半蒸半生麻仁別搗研各四兩上為細末入別研藥勻煉蜜丸如梧桐子大每服十五丸至二十丸溫水臨臥服之檳榔丸出聖濟總録治風氣內結大腸不利及四肢瘡疹瘙癢夜臥不安檳榔銼一兩麥糵黑牽牛子六兩搗取粉三兩防風去叉何首烏苦參大黃各二兩並生用陳橘皮湯浸去白焙三兩木香一兩羌活去蘆頭一兩皂莢十梃不蚛者以水五升挼取濃汁去滓熬為膏上為細末以皂莢膏和丸如梧桐子大每服二十丸至三十丸鹽酒下搜風散出聖濟總録治風氣中脘不利大便祕澀牽牛子二兩生一兩炒大黃銼半兩郁李仁去皮尖半兩芎藭一兩枳殼去瓤麩炒一兩麻子仁一分檳榔銼一枚木香一分防風去叉旋覆花各一兩青橘皮湯浸去白焙一分上為散每服二錢許臨臥生薑茶調老小加減服搜風丸出聖濟總録治腸胃風壅大便祕澀牽牛子半斤半生半炒枳殼去瓤麩炒青橘皮湯浸去白焙桂去粗皮芎藭白芷羌活去蘆頭防風去叉各二兩大黃銼炒麻仁各六兩上為末煉蜜丸如梧桐子大食前茶清下十丸如大便祕滯食後臨臥荊芥湯下三十丸加減服麻仁丸出聖惠方治大腸風熱祕澀氣壅悶大麻仁三兩羚羊角屑枳殼麩炒微黃去瓤芎藭木香各一兩鱉甲塗酥炙令黃去裙襴二兩半獨活檳榔川大黃銼碎微炒郁李仁湯浸去白尖微炒各二兩牽牛子二兩半一半炒一半生用上為細末煉蜜和搗三五百杵丸如梧桐子大每服食前以溫水下三十丸以利為度忌莧菜疏風散出直指方治風毒祕結枳殼制半兩防風羌活獨活檳榔白芷威靈仙蒺藜炒去刺麻仁炒別研杏仁湯浸去皮尖炒別研甘草炙各一兩上銼散每服二錢半生薑五片蜜一匕水一盞半慢火煎服戟香散治大腸風祕結澀不通大戟炒木香乾薑炮陳橘皮湯浸去白焙各一兩牽牛子五兩取細末二兩大黃銼炒羌活去蘆芎藭各半兩神麯炒訶黎勒皮各一分桂去粗皮三分上為散每服二錢生薑茶清調下臨臥服皂角丸出危氏方專治有風人臟腑祕澀豬牙皂角枳殼去瓤羌活桑白皮檳榔杏仁制另研麻仁別研防風川白芷陳皮去白上等分為末蜜丸如梧桐子大每服三十五丸溫水下蜜湯亦可犀角散出聖惠方治大腸風熱祕澀不通