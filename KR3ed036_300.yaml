皮葛根銼各一分薏苡仁甘草炙銼各半兩上粗搗篩每服五錢水一盞半煎至八分去滓食後服獨活散治唇上生惡核腫由脾胃熱壅滯獨活三分川升麻三分沉香三分桑寄生三分連翹三分犀角屑三分漢防己三分川大黃三分銼碎微炒甘草半兩炙微赤銼上為散每服三錢水一中盞煎至六分去滓不計時候溫服治唇生腫核塗貼松脂半兩川大黃一分白蘞一分赤小豆一分胡粉一分上為細末以雞子清調塗貼於上薏苡仁湯治風腫在脾唇口瞤動或生結核或為浮腫薏苡仁炒防己赤小豆炮甘草炙各等分上㕮咀每服四錢水一盞半生薑三片煎至八分去滓溫服不拘時候黃連散治脾胃積熱風冷乘之唇腫結核升麻黃連去須龍膽各一兩上搗羅為散綿裹如彈子大臨臥以新汲水浸過含化咽津惡實散治唇腫生核惡實炒烏梅去核各半兩甘草炙銼一分上搗羅為散每服三錢童子小便一盞煎至三五沸和乘熱含漱冷吐日三又方治唇生核上用豬屎平量一升投水絞取汁溫服又方治唇生核腫痛如彈牛膝燒灰存性研上先以針刺出惡血次用藥少許以新汲水調塗核上此藥亦能治緊唇即瘥以燒灰細研為末糝敷緊唇又方療唇里忽生丸核稍大上以刀鋒決之令血出瘥手足諸瘡手足凍瘡附論夫經絡氣血得熱則淖澤得寒則凝澀冬時嚴寒氣血凝聚不流則皮肉不溫瘃凍焮赤痛腫而成瘡輕則潰爛重則損壞肢節也戴人女僮足有寒瘍俗云凍瘡戴人令服舟車丸浚川散大下之其瘡遂愈人或疑之戴人曰心火降則寒消何疑之有方香霜膏治凍瘡重繭瘡香油瀝青黃丹百草霜上先下香油後落瀝青次下百草霜後用黃丹成者為膏藥雉腦膏出聖濟總録治凍面凍耳並諸凍瘡久不瘥年年發歇先癢後痛後腫破黃水及血出不止雄雉腦一枚搗爛黃蠟與腦等分清油比蠟減半上同於慢火上熬成膏去滓以瓷器收如面油逐漸塗摩羊肉湯出聖濟總録治寒凍腫癢羊肉蔥並細切各半斤上二味以水五升煎至三升去滓溫洗日三兩度又方出聖濟總録上用蔥葉一枝細切以水三升煎至二升去滓溫洗日三兩度丹脂散出危氏方治足凍瘡上以黃丹用豬脂調敷豬蹄脂散出德生堂經效方治爛瘡因凍者上以豬後懸蹄燒研細豬脂和敷粉膠散出海上方治凍瘃瘡上用干小粉炒焦存性為熔牛膝調攤紙上貼之好米醋調尤妙如聖散出德生常經驗方治凍瘡皮膚破爛痛不可忍者上用大黃為細末新水調掃瘡又方出百一選方治凍瘡上用臘月雀腦子燒灰研末油調塗瘡口上一方用雀腦血敷之一方先用茄子根濃煎湯洗以鵲兒腦髓塗之或用茄子莖葉苦者煮湯洗之定痛散治凍瘡焮赤黃汁出及瘥後瘢痕疼痛黃柏四兩去粗皮塗蜜慢火炙令黃色上為細末蜜水調攤軟紙花子上貼患處又方出神效方上用山藥少許於新瓦上磨為泥塗瘡口上治凍瘡不瘥者用熱湯洗之效柏藥散出聖濟總録治凍瘡手足指欲墮及耳欲落柏葉炙乾為末四兩杏仁去皮研四十粒頭髮一拳大鹽半兩研乳香研一分黃蠟一兩油一升上先煎油沸次下五味藥以發消盡為度次下黃蠟攪勻瓷器中收先以熱小便洗瘡以綿拭乾後以藥塗即以軟綿裹勿令寒氣侵入每日一洗一換如瘡漸瘥即三四日一換白蘞散出聖濟總録治大人小兒凍手皴裂成瘡白蘞三分白芨末半兩油麻二合生搗上藥蒸蘆服一個爛研與藥拌勻以酒調成膏先以童子小便洗瘡後塗之牛膠散出聖濟總録治寒凍足跟開裂血出疼痛上以牛皮膠燒灰細研為末以唾調塗之車膏塗方出聖濟總録治手足凍瘡腫爛上以車膏熬令熱塗瘡上又方脂和蜜調勻塗敷日三兩上橄欖散出海上名方治凍腳瘡上用橄欖核燒存性為末入輕粉油調塗治寒凍手足破裂出聖濟總録上用生薑拍碎二兩以淘飯飲三升和煎至二升乘熱熏洗患處日三五度又方出聖濟總録上以白餳五兩燒灰細研敷瘡上日三五度治手足凍腫爛出聖濟總録上取西瓜藤半筋細銼以水三升煮汁浸洗日三兩度治凍指瘃欲墮出千金方上用馬屎三升以水煮令沸漬半日愈治凍瘡及折傷瘡上用臘月老鼠一個麻油煎爛攪取油為膏敷瘡亦妙又方出肘後方上用兔髓及腦灰生敷之又治手足皸裂神效又方上用雄芭蕉根白者雄赤者雌為末濕則糝之干則油調又方出楊氏家藏方上以黃柏為細末用乳汁調於瘡上破者干糝神效一方用雞子清調塗一方燒灰存性研細經驗方云豫每入冬雙足皸瘃艱於穿履久患此苦醫云只用蘆蔔茄根蕓薹煎湯洗灌其效且爾今年之作尤甚忽使臣強德中獻是方一夕而即愈豫有此妙方可謂萬金良藥惜乎得之晚不得早以惠人小膏子出王氏博濟方治凍耳兼療濕癬丹參一兩黃蠟半兩豉一合蔥白五莖清油三兩上先將油煎三兩沸次入參豉煎令焦即濾去然後入蠟勻攪入瓷盒子內盛每患即塗之三兩上瘥二黃散出家藏經驗方治毒瘡凍瘡黃柏皮黃連上等分為細末並不見火先以甘草湯洗了瘡用藥末三錢輕粉少許生麻油調稀稠得所敷之如瘡濕不用麻油只干糝之余盛年冬月時耳珠凍瘡橍則瘡成去靨則流血偶吳道人過門扣之用此藥兩日而愈治凍瘡出本草取用秫米嚼敷之治凍瘡出本草以松葉炙罨之佳治凍瘡風濕瘡出本草以柏葉炙罨之治凍瘡出本草用糟浸洗療凍瘡出本草取蒿雀腦塗凍瘡手足不皸其雀肉極熱補益人也治腳上凍成瘡腫上用大黃為末煎湯熱洗一月愈治凍腳上用烏頭一枚炮生熟得所為末水洗糝代指附論代指者先腫焮然痛色不黯緣爪甲邊結膿劇者爪皆脫落此謂之代指病也但得一味冷藥汁溻漬之佳若熱盛服漏蘆及溻漬之即愈蓋爪者筋之餘筋骨熱盛注於指端故其指先腫熱焮痛結聚成膿甚則爪甲脫落世或謂之淪指又代甲其實一也此病類於指疽然無蘊毒故色不黯黑雖久亦不殺人方漏蘆湯出聖濟總録治代指筋骨臟腑中熱焮腫痛漏蘆去蘆頭升麻大黃銼炒黃芩去黑心各一兩玄參三分上粗搗篩每服五錢水一盞半竹葉二七片同煎至一盞下芒硝末一錢再煎去滓空心溫服如利去芒硝藍花湯出聖濟總録治代指腫痛藍花漏蘆去蘆頭大黃銼炒升麻黃芩去黑心各一兩上粗搗篩每服五錢水一盞半竹葉二七片煎至一盞下芒硝末一錢再煎一沸去滓空心溫服如利去芒硝皂霜散治惡指皂角南星拒霜葉草烏上等分為末米醋調敷留口出毒升麻湯出聖濟總録治代指雖無蘊毒筋骨中熱氣尚盛升麻甘草各半兩上細銼以水二升煎去滓下芒硝末半兩攪勻溫浸指上數十遍冷即再煎浸以瘥為度梔子湯治代指梔子仁甘草各一兩上細銼以水二升煎至一升半去滓令溫浸指上日三五度瘥草硝散出仁存方治代指結膿指爪甲脫者上用甘草二兩㕮咀以水五升煮取一升半漬之一方用芒硝亦可煎湯淋洗愈鹽脂湯出千金方治指痛欲脫上用豬脂和鹽煮令稍熱納指中一食久住千金翼加乾薑醬蜜塗方出千金方治代指掣痛手足不可忍者醬汁一合蜜一兩上和煎令沸稍熱敷日五七上即瘥一方用醬水醬水漬方出聖濟總録治代指腫痛上取醬水一升以鹽半兩和煎令沸溫浸患指日三五度瘥一方用醬水調蜜敷之地龍散出仁存方治代指手指甲頭腫取肉刺上用地龍乾者不拘多少搗羅為細散以豬膏調敷患指日三兩上瘥一方用泥敷之一方無豬膏硇砂膏出千金方治代指上以唾和白硇砂先搜面作碗子盛唾次著硇砂如棗許以爪著指中一日即瘥麻黃湯出聖濟總録治代指上用麻黃二兩去根銼以水二升煎至一升半去滓溫浸患指日三五度瘥熱蘸湯出聖惠方治代指為五臟氣流注十二經脈熱沖手指上以熱湯急蘸五七度次以冷水浸之又復如此三遍塗羊膽即瘥未成膿者此方甚效或以豬膽盛代指纏之亦得一用牛膽粟米粉治代指發症上用粟米粉不拘多少在鐵鐺中熬赤以衆人唾調塗患指烏梅醋法出仁齊直指方治代指手指甲頭腫取肉刺上用烏梅去肉殼只用仁研細米醋調得所入指漬之或和敷之治代指手指忽腫痛不已者名為代指上以毛雜黃土作泥指五分厚納煻灰中煨之令熱可忍泥干即易不過數度瘥如皮不皴者更為之又方出肘後方治代指上刺指熱飯中二七遍又方出千金方治代指上以麻沸湯漬之又方出千金方治代指上取萎黃蔥葉煮沸漬之又方出千金方治代指上以蜀椒四合水一升煮三沸漬之又方出聖惠方治代指上先刺去膿血炙魚鮓皮令溫以纏裹固匝痛止便愈又方出傳信適用方治代指上拒霜葉為末加消風散調塗自散其毒又方治代指上以黑豆爛嚼敷之或燒灰敷之亦可又方出聖惠方治代指上用地榆二兩細銼以水三升煎至二升去滓溫浸患指冷即再暖又方出聖惠方治代指發疣上用鹽不拘多少小便調塗患指上以故帛裹之一二日鈹針刺血再塗即瘥又方出聖濟總録治代指卒腫痛不可忍上用酒糟不拘多少取晝夜裹之又方上用酒糟不拘多少以瓶子一枚先裝灰火了入菌子於上以紙裹瓶口作一孔子將指頭入熏瘡又方出肘後方治代指甲頭腫取肉刺上取土中蚯蚓和豬脂搗如泥敷之一方無豬脂又方出肘後方上燒鐵令熱勿令赤以灼之又炙指頭痛處七壯愈治惡指入癰上用糞堆上蠐螬蟲一個截頭中一段安患處以艾炙之和麵調圍患處拔毒散出衛生家寶方治毒瘡生於手指赤腫堅硬俗呼為髮指徹疼痛不可忍者泥蜂窠巖壁間採之乳香少許研上為末用釅米醋調塗之干即再上醋痛立止治惡指俗雲天蛇風蜈蚣一條火上燒上以煙燻病指一二次即安療代指出本草以蠟松膠相和火炙籠代指即瘥肉刺附論肉刺者生於足指間形如硬胝與肉相附隱痛成刺由靴履急窄相摩而成方松脂膏出聖惠方治肉刺白膠柏木上者松脂各一兩黃蠟半兩上於火上熔成膏冷貼用物系定無食膏出聖惠方治肉刺肥皂莢一挺無食子三枚上燒令煙斷細研以酸米醋於沙盆中別磨皂角如糊和末敷之立效薰硫散出聖惠方治肉刺薰陸香石硫黃上等分同研令勻塗肉刺上以燒叉烙之效楓香脂膏出聖惠方治肉刺豬脂一兩楓香脂一分上先研豬脂令爛次入楓香末和成膏挑剔刺處令淨以藥敷之效一方有白膠香乳香散出聖惠方治肉刺久不瘥松脂乳香各一分上同研細先用針撥破敷之密封緊硇砂散治取肉刺上以硇砂少許和膠香令勻貼之根即出羊腦膏出聖惠方治取肉刺上用刀薄刮之以新酒醅和羊腦敷之一宿常以綿裹之並羊髓敷之又方出聖惠方治肉刺結硬上用針挑破以雞子白點三兩度即落下又方出聖惠方治肉刺結硬上用白芥子搗如粉以醋調敷之密封緊經宿揭去自然落下又方出聖惠方上以黑木耳取貼之自消爛不痛宜以湯洗微刮去上者乃用之治手足甲忽然長倒生肉刺如錐痛不可忍吃葵菜自愈出本草方治八月九月中刺手足犯惡露腫多殺人以桑枝三條刮瘡自爛仍取薤白敷瘡上以布帛裹之若有腫者更取用薤白佳治反腳指間有肉刺瘡出本草以黑蝨敷根出之也治肉刺結硬用羊髓敷之立效甲疽附論足三陰經皆起於足氣血阻而不行潰於指甲之間能成甲疽凡以經絡之所流注非特肌肉之病也故或得於剪甲傷肌或得於甲長侵肉或得於履局之不適使血氣阻遏不通故腐潰為疽久則浸淫瀾指上引於腕膝之間而瘡疱者是已然病在四末不必治其內惟塗敷滌濯去惡而除穢及適其行履則愈方蝦蟆散出聖惠方治甲疽皮厚腫痛蝦蟆灰半兩杏仁七枚熬黑研如泥黃連末半分雄黃半錢細研白礬半錢膩粉半分鹿角七寸燒令熟細研麝香半錢細研蚺蛇膽半錢上相和細研以臘月豬脂調如膏先以甘草蛇床槐白皮煎湯洗瘡拭乾敷藥以油單裹外更著綿帛裹之三日其肉刺剩甲皆當自落三日一換豬蹄湯治甲疽及諸癰疽惡瘡有息肉豬蹄一隻生者白蘞白芷狼牙芍藥各三兩黃連黃芩大黃獨活各二兩上㕮咀如豆先以水三斗煮豬蹄水至一斗二升去蹄後入藥更煮至五升候溫洗瘡日三度白礬散出聖惠方治男女風血毒氣攻手足指甲疽瘡久不瘥胬肉裹指甲疼痛出血不定宜用此縮肉乾瘡白礬石膽各半兩麝香一分硃砂一分麒麟竭一分上取白礬石膽於鐵器內一處以炭火煅過入麝香麒麟竭硃砂同研令細用少許干糝瘡上以帛子纏定日兩度換之白礬散出聖惠方治甲疽白礬燒灰一兩麝香蘆薈蚺蛇膽各半分上研細先以漿水洗瘡干敷之洗瘡日三兩上瘥為度馬齒散出聖惠方治甲疽牆上馬齒草陰乾一兩木香丹砂研細鹽研細各一分上除丹砂鹽外銼碎拌令勻於尉斗內以皮灰火燒過取出細研即加丹砂鹽末再研勻旋取敷瘡上日三兩度緑硝煎出聖惠方治甲疽或因剔甲傷肌或因甲長侵肉遂成瘡腫痛後緣窄靴研損四邊腫焮黃水出浸淫相染五指俱爛漸漸腳跌泡漿四邊起入火燒瘡日夜倍增醫方所不能療者上用緑礬五兩形色似朴硝而緑色置於鐵板上聚灰封之囊袋吹令火熾其礬即沸流出色赤如熔金汁者是真也候沸定汁盡去火待冷取出研為細末似黃色收之先以鹽湯洗瘡帛裛干用此末敷之或有蟲有黃水當日洗汁斷瘡干若患痛急即塗少酥令潤每日一遍鹽湯洗濯有膿處常洗使淨其痂幹不須近每洗干敷藥如初但急痛即塗酥五日即覺上痂漸剝起赤依前洗敷藥十日即瘡漸漸剝盡痂落軟處或更生白膿泡即搽破敷藥自然總瘥張侍郎得此病臥經六十日困頓不可復言京中醫並經造問皆隨意處方無效驗惟此法得效如神故録之海上方云研細先以黃丹洗瘡挹干糝於瘡上愈多愈好著藥訖以軟帛寬裹之當日見效若患痛急即以酥少許塗之令潤敷藥每日一次鹽湯洗常令淨十日可愈蛇黃散出聖惠方治甲疽蛇蛻置淨瓷器中以燭焰爇之大著去燭勻燒令焦取一兩用之臭黃一兩緑礬一分燒熟上研如粉以銅盒子貯之先以熱小便二升置於銅鈔鑼中嚼三十枚杏仁吐於小便中攪令相得以瘡卻浸之候癢即以銅篾子洗撥去膿血取爛帛挹之候乾還以銅篾子敷散令滿以故帛虛裹瘡指入大襪中每日一洗依前法用每洗待藥軟即撥去藥恐咬落瘡筋切慎房室及運動氣力忌面蒜酒一切物無妨䕡茹膏治甲疽日夜倍增赤肉生甲邊裹甲者䕡茹黃耆各二兩豬脂上㕮咀如豆苦酒浸一宿與豬脂一處微火煎取三合絞去滓以塗瘡上日三兩度其赤肉即消散緑礬散出危氏方治甲疽瘡緑礬半兩燒熟蘆薈一錢半麝一錢上研如粉絹袋盛藥納所患處指袋中綿扎定瘥為度蛇黃散出海上方治甲疽腫爛生腳指甲邊赤肉努出時瘥時發又治嵌甲生入肉常血疼痛雄黃半兩生用蛇蛻燒灰存性一分上同研如粉先以溫泔洗瘡上軟以尖刀子割去甲角拭乾藥敷上用軟帛裹半日許藥溫即易一日即除痛便止一方用漿水洗淨以橘刺破處淋洗貼藥一方有黃耆無雄黃乳香敷方出海上名方治甲疽胬肉裹甲膿血疼痛不瘥乳香研膽礬燒灰敷上等分研極細時時敷之大凡此疾須是剔去甲不療亦愈或已成瘡久不瘥即用此方一方二味燒研末敷之一方用礬燒灰敷瘡鬼針散出千金方治割甲侵肉不瘥上以鬼針草苗搗汁並鼠黏子根和臘月豬脂敷之牡蠣散治甲疽胬肉裹甲膿血疼痛不瘥上用牡蠣頭研為末每服二錢研靛花酒調下如癰盛已潰者以末敷之仍更服藥並一日三服烏梅散治甲疽多年不瘥胬肉膿血疼痛上用烏梅十枚燒灰研為散敷瘡上日三易一方用鹽梅燒灰敷爛裹亦可石膽方出永類鈐方治甲疽上以石膽一兩於火上燒令煙盡研末敷瘡上不過四五度立瘥治甲傷損痛不可忍出永類鈐方上用煨蔥白貼患處熟帛扎之立效治甲疽腫爛生腳指甲邊赤肉胬出時瘥時發方見䕡茹膏治甲疽瘡出聖惠方上以莧濃煮汁著少鹽浸腳一兩日瘥用根亦得治割甲侵肉不瘥出海上方用硇砂礬石為末裹之以瘥為度生甲疽瘡及雜瘡者並甲煎搗之治甲疽夫甲疽之狀瘡皮厚甲錯剝起是也其瘡赤癢痛恆欲搔之兼有汗出其初皆是風邪襲於血氣所生其瘡里亦有蟲也上用白礬燒灰細研敷之嵌甲皴裂附論夫皴裂者由肌肉虛冬時觸冒風露為風冷皸拆手足破故謂之皴裂也方丹粉膏治腳踏地不可忍疼麻油四兩黃丹二兩白膠香半兩光粉一兩敗荷二錢為末乳香二錢沒藥半兩上如膏藥煎得所滴水中可丸為度丸用時如鼠糞大敷即生浮皮回神膏治手足皴裂如蒸梨狀雖春夏亦如此生薑汁紅糟豬脂鹽上研爛炒熟搽入皸拆內一時雖疼少頃便皮軟皸合三二次搽即安椒鹽湯治手足皴痛芎藭蜀椒二分白芷防風鹽各一兩上㕮咀以水四升煎取濃塗之或豬脂煎更良白艾膏治斷根皸裂上用頭髮一大握桐油一碗於瓦器內熬候油沸頭髮熔爛入白芷松香末出火攤冷以瓦器收貯不容灰每用百沸湯泡洗皸裂拭乾敷其上或加少水粉豬實散治皴裂皮膚豬桃兒土瓜根商陸上等分為細末每日早晨用少許如常搽患處用桃仁膏出御藥院方治皴裂皮膚上用桃仁不以多少湯浸去皮尖研如泥同蜜少許一處用溫水化開塗摩患後用玉屑膏塗貼玉屑膏出御藥院方治手指面頰肌膚皴澀不澤輕粉定粉各三錢密陀僧二錢上為細末用皂角子取白仁以熱漿水浸成膏子調藥稀硬得所塗患處燒發散出永類鈐方治腳拆俗名腳皸上打銀作𩛿糖加麻油煎燒頭髮為灰和勻用水洗淨腳用油澆入瘡縫內馬蹄湯治斷根皸馬蹄下者燒灰貓兒毛燒灰男子頭垢燒灰上和勻清油調塗用絹綿護定休著水極能定疼除根先以藜根及莖樟木葉湯洗令淨潔黃蠟膏出海上方治腳皴裂上用油一兩男子發同化濾過發粗再化黃蠟半兩同煎以油黑為度磁器盛之每用先以熱湯洗去皮藥貼之黃蠟膏出百一選方治冬月手足拆裂上用清油半兩盞內慢火煎沸入黃蠟一塊同煎熔入光粉五倍子末少許熬令稠紫色為度先以熱湯洗火上烘乾即用藥敷薄紙貼之其痛立止入水亦不落若合藥入粉多則硬而成塊旋以火炙動挑敷亦不妨一方無五倍子不龜手方出百一選方治手足皸裂如蒸梨狀雖春夏亦如此瀝青二兩黃蠟一兩上為熬攪勻於器中貯先以熱酒洗令皮軟拭乾將藥以慢火上熬令熔之敷軟帛蓋定一敷即瘥一云加黃耆防風各一兩黃丹膏治腳拆俗名腳皸上用巴豆二十一粒去殼清油二兩煎黑色去豆用黃丹一兩半入油慢火熬攪勻作膏煎冬橘葉湯洗淨塗之蠶礬散治腳裂上用出蛾兒蠶繭裝細礬炭火上燒沸候過將繭並礬研細香油調敷之咸齏汁治腳無冬夏常拆裂上以咸齏汁三升熱暖浸洗一日兩三次治手足皸裂出百一選方上以五倍子一味為細末先以淨紙拭乾麻油調敷又方出百一選方治手足皸裂上以頭垢敷之即不痛久自合取其膩也又方治斷根皸裂上用臘月鵝膏椒數粒熬過收用時取出敷裂處一方白鵝尾罌搽之又方治皸裂上用無名異為細末真桐油調塗即可下水不痛又方出海上方治腳根皸裂痛不可忍者上用五倍子為末同牛骨髓調小瓷器埋地中七日取出填縫內即安又方出海上方治腳根開裂痛不可忍者上用青萍於新瓦上焙乾為末搽之極妙瘡口乾則用油調又方出聖惠方治手皴劈破裂血出疼痛上用豬脂著熱酒中洗之慎風冷又方出醫方集成治手足皴痛上煮茄子根洗之又方出聖惠方治手足皴裂上用冬月冒涉凍凌面目手足瘃壞椒四合水煮去滓漬半食頃出令燥須臾復浸干塗羊脂豬髓腦極妙又方出肘後方治手足皴裂血出疼痛上若冬月冒涉凍凌面目手足瘃壞及熱疼痛皆治取豬腦髓著熱酒中以洗瘥又方治山野人患手足皸拆出儒門事親上用白芨不拘多少細嚼以塗之有效一方為末水調塗又方治手足皸裂血出痛上用蔥葉萎黃及籜煮以漬洗之即瘥又方治冬月手足拆裂上用治瘧勝金丸研細清油調敷之又方出聖惠方治人足無冬夏怕皸裂名曰尸腳上用雞糞一升以水五升煮至三升停溫令浸腳半日瘥亦用屎忌踏酒吐及婦人穢血又方出聖惠方治手足皸裂成瘡上羊髓熬成油入黃丹攪勻令凝遍塗之三五上瘥又方出聖惠方治手足皸裂成瘡豬脂五合乾薑末二兩上相合煎四五沸候令熱得所內指於中浸之又方出聖惠方治手足皸裂成瘡上取蓼子一升以水七升煎五七沸放溫淋數次即瘥又方出聖惠方治皸裂手指節欲落卻令合上用萊州青石作器物者以刀子細刮取末欲落指節相掛文縷相當便以石末厚覆其上帛緊裹之其痛當時定不過十餘日平復矣又方出聖惠方治皸裂破疼痛上炙松葉尉之兼煮松葉洗之不過三兩度瘥又方出聖惠方治人腳無冬夏常拆裂上以煬膠干故帛貼上又方出聖惠方治涉冰凍面手足瘃壞上以麥並蜀椒濃煮及熱浸洗又煮蔥茱萸亦佳一方用麥葉濃煎汁熱洗之一作麥窠潤肌方出衛生寶鑑治手足皴澀皮膚裂開疼痛不能迎風入手珠小青四兩白黃蠟八錢乳香二錢上三味於鐵鐺內用文武火熬先下瀝青去鐺內隨手便下黃蠟乳香次入清麻油一二匙候瀝青漸熔微微熬動放大淨水盆子其旁以攪藥用鐵鉀滴一二點於水中試之須堅凝則再入油如硬軟合宜用新綿濾於水中摺疊於水中試之揉扯以白為度油鐺旋旋入之勿令軟了以磁器內盛之或油紙裹亦得每用不以多少先於火上炙裂了口熱卻捏合裂子藥亦火上炙軟塗於裂子上用紙少許貼之自然合矣神降散出仁濟直方治走皮㿐桑寄生一小把本臭桑根取皮一握白芷黃連上煎湯溫和以帛蘸洗候露出盡拭乾後敷藥鷹爪黃連滿文皂角去皮核燒存性麻竹大籜燒存性厚黃柏爪樟葉干白芷上逐件為末等分麻油調敷自然生神效謹勿吃醋治手足皴裂出永類鈐方五倍子白芨阿膠珠等分為末津調得所塗羊髓調尤佳療手足皴裂而出血痛出本草以酒挼豬胰洗並服治手足瘒瘃出本草以鷓鴣脂膏塗之令不龜治手足利筋脈出本草以木瓜根葉煮湯淋足脛可以已蹶又截其木干之作桶以濯足尤益五指筋攣附論夫五指攣急者是筋急攣縮不屈伸者筋得風熱則弛縱得風冷則攣急也方淋蘸防風湯出聖惠方治手指風冷所傷攣急防風去蘆頭附子去生枳殼去穰柳蚛末杉木桂心羌活蜂房川椒去目木鱉子仁白芷白礬各半兩細辛三分上細銼每用一兩以水兩大碗入生薑一兩煎至一碗去滓溫蘸手指冷即重暖用之羚羊角散治五指攣急疼痛連臂膊拘急羚羊角屑羌活防風去蘆頭當歸銼微炒芎藭天麻各三分桂心細辛五加皮各半兩附子炮裂去皮臍麻黃去根節薏苡仁各一兩上為散細末每服不計時候以溫酒調下二錢附子湯治五指攣急淋蘸手附子去皮臍生用防風去蘆頭枳殼去穰羌活白芷甘草銼生用蜂房各半兩川椒二兩去目上為散每用一兩以水三大碗入生薑一兩桑一握黑豆一合同煎令豆熟去滓看冷暖得所避風淋蘸手足水冷重暖用之芎芷湯治手指傷風冷筋脈攣急川椒去目芎藭各半兩白芷防風去蘆頭乾薑各一分上銼以水二大盞煎令濃濾去滓塗之日五七度瘥
