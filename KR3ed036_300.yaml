body:
  text: 卷三百上部瘡門口糜附論膀胱移熱於小腸膈腸不便上為口糜夫小腸之脈絡心循咽下膈抵胃陰陽和平水穀入胃小腸受之通調水道下輸膀胱今熱氣厥逆膀胱移熱於小腸胃之水穀不得傳輸於下則令腸膈塞而不便上則令口生瘡而糜爛也大抵心胃壅熱則必熏蒸於上不可概以敷藥當求本以治之方柴胡澤瀉湯治腸熱口糜生瘡柴胡去苗澤瀉陳橘皮浸去白炒黃芩去黑心枳實麩炒旋覆花升麻芒硝別研各三兩生地黃汁一升上除芒硝外㕮咀如麻豆大每服五錢水二盞煎取一盞去滓下芒硝末半錢食後溫服大青丸治口糜生瘡久不瘥及心脾中熱乍發乍退大青去根甘草炙銼枳殼去瓤麩炒苦參銼各三分黃連去須生乾地黃焙升麻各一兩上為末煉蜜和丸如梧桐子大每服二十丸食後熱水下日二服大黃散治口糜生瘡久不瘥大黃燒灰火煨銼甘草炙銼黃柏炙銼各一兩密陀僧研滑石研各一兩上為散每用一錢綿裹含有涎即吐升麻丸治口糜生瘡升麻黃連去須黃柏炙銼杏仁湯浸去皮尖雙仁各一兩上為末研杏仁如膏煉蜜三兩以藥末並杏仁膏和為丸如彈子大每服一丸含化咽津紫金散治大人小兒口糜生瘡大黃湯治口糜生瘡大黃銼一兩芒硝研黃連去須黃柏炙各半兩上搗篩每服三錢水一盞煎至六分去滓入蜜半匙酥少許細呷含咽柴胡湯出宣明論治口糜生瘡損爛小腸有熱脹滿柴胡去苗地骨皮各一兩上搗篩每服三錢水一盞煎至六分去滓細含咽之病人熱實者加大黃朴硝可瀉治口瘡糜爛生蜜塗方上用生蜜使頻用塗瘡上三五次即愈一方用大黃一兩切如指頭大以蜜煎五七沸候冷取出每含一塊咽津治諸人口爛者出危氏方上用巴豆二粒帶皮搗與麵糊為膏貼在顱門上即一夜便可取瘡在顱門上永不發杏仁餅子出三因方一名杏粉膏治口糜生熱瘡以涼藥敷之不愈者杏仁湯浸去皮尖雙仁十四枚別細研膩粉一錢上和研如膏每餅如錢眼大鉛丹為衣先用鹽湯漱口含一餅涎出即吐應驗臨臥時細嚼涎出少頃吐之勿咽一方臨臥敷瘡上黃柏散治口糜生瘡黃柏蜜塗炙乾去火毒白殭蠶直者置新瓦上下以火爆蠶絲斷出火毒上為細散糝瘡及舌上吐涎逆調論云膀胱移熱於小腸膈腸不便上為口糜心胃壅熱水穀不轉下傳小腸導赤散去小腸熱五苓散瀉膀胱熱故以導赤散調五苓散主之出衛生寶鑑方胡黃連散出衛生寶鑑方治口糜胡黃連五分藿香一錢細辛三錢宣黃連三錢上為末每用半錢干糝口內漱津吐之舌瘡附論舌生瘡者心脾經蘊熱所致也蓋以口屬心心者火脾者土火積熱傳之脾土二臟俱蓄熱毒不得發散攻衝上焦故令口舌之間生瘡腫痛方升麻煎出千金方舌主心臟熱即應舌生瘡裂破引唇揭赤服泄熱蜀升麻射干各三兩柏葉切一升大青二兩苦竹葉切地黃汁各五合赤蜜八合生玄參汁三合生蘆根薔薇根白皮各五兩上㕮咀以水四升煮取一升去滓下玄參汁一兩沸次下地黃汁兩沸次下蜜煎取一升七合綿裹取汁安舌上含細細咽之升麻柴胡湯出危氏方治心脾虛熱上攻舌上生瘡舌強頰兩邊腫痛柴胡升麻芍藥梔子仁木通各一兩黃芩大青杏仁去皮尖各三分石膏煅二兩上為銼散每服四大錢水一盞姜五片煎七分去滓食後服日三夜一渣重煎服玄參升麻湯出濟生方治心脾壅熱舌上生瘡木舌舌腫或連頰兩項腫痛玄參赤芍藥升麻犀角桔梗管仲黃芩甘草各等分上㕮咀每服四錢以水一盞半煎至七分去滓服不以時一方有姜五片鉛丹膏治舌上生瘡生地黃汁三合蜜三合鉛丹一兩半杏仁去皮尖雙仁別研如面七十粒上和一處調勻銀器內煮用槐枝攪不得住手看色紫即成取出每用少許口內含化吐津烏黃散出仁齊直指方療卒腫舌瘡上用烏賊魚骨蒲黃等分為末敷舌上良吻瘡附論病源足太陰為脾之經其氣通於口足陽明為胃之經手陽明為大腸之經此二經並夾於口其腑臟虛為風邪濕熱所乘氣發於脈與津液相搏則生瘡常濕爛有汁世謂之肥瘡亦名燕口瘡口吻瘡者有其瘡發於唇吻之間疼痛微腫此由脾胃有熱隨氣熏發上攻於口唇與津液相搏所致也唇舌焦燥口破生瘡者蓋心脾受熱所致也以水浸黃連暖而飲之或用黃連阿膠丸以粳米飲吞下此要藥至於大渴而不可御合少與柏葉湯熱劑之法無以逾此然此特隨機應變而已就根本論之則水火相濟蠟苓丸為宜也方芎辛丸出千金方吻治口瘡梔子甘草各十八銖細辛二十銖芎藭一兩桂心二十銖上為末蜜丸食後服七丸日再服瘥止芎芷丸出千金方治口吻瘡芎藭白芷橘皮桂心棗肉各一兩半上為末蜜和為丸食後服一十五丸又含之以瘥為度此方甚驗芎藭丸治口吻瘡芎藭二兩白芷陳橘皮浸去皮白黃連去須各半兩上為末煉蜜丸如梧桐子大每服二十丸甘草湯下不拘時亂髮灰散治口吻生瘡及口旁惡瘡亂髮灰黃連去須故絮灰各一兩乾薑炮半兩上為散再研勻不拘多少敷瘡上日三五次以瘥為度桑脂散治口吻瘡上用桑條嫩枝於鐵上燒灰待用鵝脂和敷之檳粉散治口吻邊生瘡浸淫不效一名立效散檳榔燒存性輕粉少許上為細末入敷瘡口上立愈一方用蒸飯甑上滴淚調敷之烏金散治口吻瘡上取蜣螂三枚燒灰細研為散敷之治口吻瘡用越瓜為灰敷之治口吻瘡取經年葵根欲腐者彌佳燒作灰及熱敷之治口吻瘡用楸白皮濕貼之三四度瘥一方用葉為末敷瘡治吻瘡用新炊飯了甑及熱以唇口向甑唇上尉之二十七下三兩日瘡止治口吻惡瘡及喉中口舌生瘡上用黃柏以蜜塗炙研羅為末敷瘡上效亦以削如鴨舌含之杏仁散治口吻生瘡杏仁一分湯浸去皮尖雙仁鉛霜半分麝香少許上先研杏仁令細次入鉛霜麝香研令勻用少許敷瘡上瘥檳榔散治口吻生白瘡上檳榔二枚燒灰存性細研敷之妙日三五度治燕吻方以白楊枝鐵上燒取脂及熱敷之又方以木履尾納煻灰中令熱取掛兩吻各二十七遍治吻上燕口瘡取百家箸頭燒為灰敷瘡上治吻上饞瘡取㭢几上屑燒敷之瘥治小吻瘡用桑葉研取白汁敷之唇瘡附論濟生方云唇者脾之所主胃者脾之所合其經起於鼻環於唇其支脈絡於脾胃受邪則唇為之病蓋風勝則揭燥勝則乾熱勝則裂氣鬱則生瘡血少則瀋而無色治之之法內則當理其脾外則當敷以藥無不效者矣夫脾與胃合足陽明之經胃之脈也其經起於鼻環於唇其支脈入絡於脾脾胃有熱氣發於唇則唇生瘡也方潤脾膏治脾熱唇焦枯無潤生天門冬切生地黃汁一升生麥門冬葳蕤各四兩豬膏三升細辛甘草芎藭白朮各二兩黃耆升麻各三兩上㕮咀諸藥苦酒淹一宿綿裹藥臨煎下生地黃汁與諸藥合煎取膏鳴水氣盡去滓取細細含之白蘞膏治唇瘡白蘞白芨各一兩黃耆牡丹皮芍藥丁香各一分白蠟三兩麝香另研乳香另研各一分上將白蘞等六味為㕮咀用芝麻油半斤先煎十餘沸下銼藥有焦色即以綿濾去滓慢火再煎十餘沸下蠟不住手攪離火候凝盛於磁器中下麝乳攪勻每用少許塗患處日三五上即瘥藁本散治唇瘡生肌藁本去苗土半兩芎藭半兩細辛去苗葉半兩桂去粗皮一分當歸焙乾一分杏仁湯浸去皮尖雙仁一分雄黃研一分上為細散次入雄黃拌勻敷瘡上日三五次硫黃散治唇瘡及緊唇瘡久不瘥硫黃研白礬枯研丹砂研水銀麝香研黃柏為細末各一分上研候水銀星盡用臘月豬脂和如泥先拭唇令淨後以膏塗之日三五上即瘥黃柏散治繭唇黃柏一兩五倍子二錢密陀僧少許甘草少許上除黃柏外為末水調勻敷於黃柏上火炙三五次炙盡藥末為度將黃柏薄片臨睡貼之天明即愈皆效散療疳蟲蝕唇鼻齒口及余處石硫黃研乾漆熬文蛤燒作灰上等分絹篩之每用取胡桃大麝香棗核大研和先拭去惡物血等然後敷之日三次五倍子散治口唇生瘡五倍子去心中蟲槐花各等分上為細末每用蜜調敷唇上如瘡口乾以蔥涎調塗之錢脂膏出聖惠方治唇黑腫痛癢不可忍上用大錢四文於石上以臘月豬脂磨取汁塗之又方出千金方上用竹弓彈出惡血取瘥亂蜂膏出千金方治唇黑腫痛癢不可忍上燒亂髮灰及蜂房六畜毛作灰豬脂和敷之亦治瀋唇治唇生瘡亦治唇緊裂破成瘡出千金方上以垢敷之日三度即頭垢或屠家肉案上垢燒灰塗之治唇邊生瘡連年不瘥出聖惠方上以八月藍葉十片絞取汁洗不過三日瘥治唇瘡出聖惠方上以東壁上土研敷之瘥又方出聖惠方上胭脂用油調塗之瘥又方出聖惠方又方上用白英去皮酥炙色焦為末貼瘡上蟲出即瘥又方出聖惠方上用大麻子燒灰為末用井花水調塗唇上治唇瘡及緊唇瘡上以雞子一枚煮熟取白為泥貼瘡上又方出聖惠方上蟹腹底白皮一分燒灰研為末貼之效治瀋唇唇常瘡爛黑腫疼痛不可忍上以鯉魚血磨墨相調塗之一方用膽汁磨墨塗之瘥又方出聖惠方上以白礬熬沸為末和胡粉敷之瘥治唇吻瘡出肘後方上用刮㭢幾屑若枯屑火燒以敷之栗荴灰敷之並良又方出聖惠方上取乾蟾燒灰細研敷之黃連散出聖惠方治吻惡瘡黃連一分去須乾薑半分炮治上為細末每用少許敷瘡上不過三上瘡瘥一方有膩粉治唇生瘡出千金方上以胡粉敷之治唇生瘡上以晚蠶蛾一分碾為末每取少許敷瘡上瘥海帶散出危氏方治緣唇瘡海帶不拘多少上為散臨臥貼一兩宿瘥唇緊附論唇緊之候其本與唇瘡間瘡未及瘥熱積在胃復為風濕所搏致令唇發腫瘡緊而痛濕潰出黃水久而不愈謂之緊唇經脈論足陽明之脈所生病曰唇緊者蓋陽明胃之脈夾口環唇風熱所客則為緊唇之病方書謂緊唇亦為瀋唇用酸漿水洗去白痂臨臥點緑袍散如或不愈貼赴筵散又不愈貼鉛白霜散則安愈矣方甲煎唇脂治唇裂口臭可先以麻搗泥泥兩口好瓷瓶容一斗以上各厚半寸曝令乾甘松香五兩艾納香苜蓿香茅香各一兩藿香三兩陵零香四兩上六味先以酒一升水五升相和作湯洗香令淨切碎又以酒水各一升浸一宿明旦取一斗五升烏麻油六味納其中微火煎之三上三下去滓納上件一口瓶中令少許不滿然後取上色沉香三斤雀頭香蘇合香各三兩白膠香白檀香各五兩麝香甲香丁香各一兩上先酒水相和作湯洗香令淨各別搗碎不用絶細以蜜二升酒一升和香納上件瓷瓶中令實滿以綿裹瓶口又以竹篾交橫縛之勿令香出先掘地埋上件油瓶令口與地平以香瓶合覆油瓶上令兩口相當以麻搗泥泥兩瓶口際令牢密可厚半寸許用糠壅瓶上厚五寸燒之火欲盡即加糠三日三夜勿令火絶計糠十二石訖停二日令冷出之別煉蠟八筋煮數沸納紫草十二兩煎數十沸取一莖紫草向爪甲研看紫草骨白出之又以綿濾過與前相合令調乃內硃砂粉六兩攪令相得少冷未凝之間傾置竹筒中用紙裹麻纏之待凝冷解開任意用之計此可得五十鋌甲煎口脂出千金方治唇白無血色及口臭燒香澤法沉香甲香丁香麝香檀香蘇合香薰陸香零陵香白膠香藿香甘松香澤蘭各六兩上胡麻油五升先煎油令熱乃下白膠香藿香甘松澤蘭少時下火綿濾內瓷中余入八種香搗作末以蜜和勿過濕納著一小瓷瓶中令滿以綿裹口十字絡之以小瓶覆大瓶上兩口相合密泥泥之乃掘地埋油瓶令口與地平乃聚干牛糞燒之一方用糠火燒之七日七夜不須急滿十二日火尤佳待冷出之即成其瓶並須熱泥勻厚一寸曝乾乃可用順脾養肌散治唇緊山芋桂去粗皮白芷甘草白朮各一兩人參訶子肉白茯苓黃耆木香各半兩肉豆蔻兩枚上為細末每