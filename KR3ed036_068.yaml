body:
  text: 卷六十八牙齒門蟲蝕牙齒附論字書謂凡動皆風蟲以風動化血手陽明支脈入於齒其經虛損骨髓不榮風邪乘之攻入於齒毒氣與濕相搏而生蟲故云蟲蝕牙齒也其狀齒根有竅或作疼痛甚則搖動宣露浮腫作臭世俗亦呼為蛀牙夫牙齒蟲者是蟲蝕牙齒而令疼痛也皆牙齒根有孔穴蟲居其內蝕一牙齒盡又度蝕余牙齒也方牢牙膏治齒疳蝕齒及唇鼻風疼齒腫宣露豬脂五兩羊脂二兩野駝脂一兩黃蠟三分半鹽炒半兩雄黃研二一兩莨菪子炒一分丁香二十枚白芷半兩黃柏去粗皮熬青木香三分細辛去苗葉一分蜀椒去目及閉口炒出汗肉桂去粗皮半分松節一分沉香半兩乳香研半兩麝香研一兩芎藭三分藁本去苗土三分當歸銼焙半兩升麻三分莎草根炙半兩甘草炙半兩上為細散入研藥重細研如面然後取三般脂煎熔入藥匙攪勿住手待至欲凝即膏成以瓷器貯之臘日合妙當於靜處勿令雞犬婦人見之每取少許敷齒上良礬石散治牙齒疼痛風齲蟲蝕挺出搖落者白礬熬枯藜蘆去蘆頭防風去叉細辛去苗葉乾薑炮白朮蜀椒去目及閉口者炒出汗蛇床子微炒附子炮裂去皮臍甘草炙銼上為細末溫酒調三錢熱漱冷吐勿咽汁日三兩次為粗末酒煎亦佳細辛散出和濟方治風蚛牙疼牙齦宣爛牙齒動搖腮頰浮腫皆能治之紅椒去目炒鶴蝨牙皂蓽茇縮砂去殼各半兩荊芥去梗細辛去苗各一兩白芷草烏各二兩上為細末每用少許於痛處擦之有涎吐出不得吞少時用溫酒漱口頻頻擦之立有神效七香散出聖濟總録治風蚛牙疼及牙宣蔓荊實去皮荊芥穗地骨皮防風去叉莎草根炒去毛白芷各一分草烏頭三枚麝香研少許上為散每用三錢水一盞煎沸熱含冷吐升麻散出余居士選奇方治風蚛牙疼齒根動搖升麻細辛去土葉蓽茇胡椒川芎甘草去土一作甘松香白芷川椒各等分上為細末每用少許擦患處良久漱口若甚者用沸湯調二錢乘熱漱涎去立愈又方出海上方治風蚛牙疼草果蟬殼地松白殭蠶蜂房牛膝荊芥細辛各等分上銼碎用水一碗煎至半碗去滓稍熱漱至溫少停吐去再漱誤咽不妨神效治牙齒風蚛疼痛出聖濟總録烏頭炮裂去皮臍芎藭甘草炙銼地骨皮細辛去苗葉白芷高良薑各等分上為散以揩默於痛處出涎以溫水漱三五度即瘥乳香膏出御藥院方治蟲蛀牙齒疼痛去蟲止痛乳香雄黃細辛淨皂角炙存性各一錢莽草麝香各半兩上為細末溶黃蠟和成錠子看蟲竅大小塞在竅內只用少許綿子填之有津即吐誤咽不妨食後或臨臥蓽茇散出海上方治風蛀牙疼不可忍者名曰當面可良薑蓽茇白芷細辛蜂窠鶴蝨各三錢上為細末以擦之如牙蛀用飯一粒藥含之即效芎藭散療心氣虛寒口臭沖人又蟲齒痛芎藭八分白芷七分甘草五分炙桂心四分杜蘅四分當歸五分上搗篩為末以酒和方寸匕服之二服蝦蟆散出聖惠方治牙齒蚛痛有蟲蝦蟆端午日取一枚燒灰青黛半兩細研柑子皮半兩微炙乾薑半兩麝香一分細研薑黃半兩細研上都研令細每用綿裹入蟲孔中以瘥為度治蛀牙疼出本事方川烏草烏各一個白附子半兩附子臍尖三七個硃砂少許別研上為末每服二錢酒水各半盞同煎至七分候冷服臨臥時服不得再吃熱物治風蛀牙疼細辛蓽茇草烏頭良薑胡椒各等分上為㕮咀白水煎熱漱口效麝香散出聖惠方治牙齒蚛痛日夜不止齒齦臭爛麝香雄黃白礬燒灰石膽川升麻各一分上搗細羅為散綿裹一字納蚛孔中並以乳汁調少許塗齒齦爛處治牙齒蚛有蟲疼痛不可忍出聖惠方硇砂雄黃石灰炒令黃色蝦蟆頭燒灰以上四味各一分巴豆五粒去皮心紙裹壓去油上先研巴豆如麵糊次入諸藥細研以水浸蒸餅和丸如緑豆大有蚛孔者以新綿裹一粒致於蚛孔中有涎即吐卻其痛立止如要牙落者輕以刀子撥破牙根令血出取丸子一粒研揩在齒根下一宿即落也附子丸出聖濟總録治久患牙疼及齒蚛附子去皮臍一兩生用胡椒蓽茇黃蠟各一分上為末熔蠟和丸如桐子大每綿裹一丸以患牙咬之如蚛安在蚛竅內治牙齒風蚛疼痛出聖濟總録豬牙皂角炙去皮子露蜂房炒蜀椒去目併合口炒細辛去苗葉等分上為散每服一錢水一盞煎沸熱含冷吐不拘時治蚛牙有孔疼痛出聖濟總録巴豆一粒去皮炒石亭脂少許研乾薑少許為末麝香研少許上為細末熔蠟和丸如芥子大每用綿裹一丸納蚛孔中赴筵散出醫方集成治風牙蚛牙攻腫疼痛晝夜不止痛不可忍睡臥不安牙齦宣露動搖欲脫或腮頷浮腫齦爛血出並能療之良薑去蘆草烏去皮細辛去土葉荊芥去梗上各二兩碾為末每用少許於痛處擦之有涎吐出不得吞咽良久用溫鹽湯灌漱其痛即止常使揩牙用揩牙腐炭末一錢相和常用止牙宣闢口氣永無牙疾雄黃散治蟲牙痛雄黃二錢乳香沒藥各一錢麝香半錢上為細末熔黃蠟為丸安在牙蟲蝕竅中蓽茇散出海上方治風蛀牙疼鶴蝨良薑蓽茇草烏各等分上為末用青鹽碾細逐旋拌勻每用少許於疼處擦之候有涎即吐出用溫水灌漱即愈藥汁不可咽又方出海上方治蚛牙一切風蛀疼痛不止者防風荊芥蜂窠有蛹者佳烏梅各等分上煎熟乘大熱漱吐出勿咽冷再熱漱之一方無防風經驗方陳氏云此方余少年用之見效又方出海上方石膏煅末八錢白芷白茯苓各二錢半鼠尾細辛上等分和勻臨睡盥漱用手指點蘸揩牙根患處即愈蠍附散出淡氏方治風蚛牙疼腫癢動搖牙齦潰爛宣出血口氣等疾蠍梢一三枚不去毒附子臍蜈蚣頭去嘴毒川烏頭尖各二個上為末先用竹杖刺痛牙齦次以紙捻紝藥一粟米許在痛處甚者不過三兩次效一方以水蘸藥揩患處開口瀝涎出以溫水漱之治血風蛀牙出危氏方雄黃乳香各一錢研為粉麻黃半錢白芷一錢上為末先以荊芥穗咬住痛處口涼去之次用皮紙捻津濕之點藥少許隨痛塞耳內鶴蝨丸出直指方治蟲蝕齒痛豬牙皂角三枚川椒一錢半生明礬鶴蝨各一錢上為末蒸飯搜丸如麻子大納於孔中有涎吐之巴豆丸出聖惠方治牙齒蟲蝕有蚛孔疼痛不可忍巴豆一枚醋煮令熱去皮硫黃一字麝香一字上都研令勻消黃蠟和丸如粟米大綿裹一丸納蚛孔中白礬丸出聖惠方治牙齒被蟲蝕有蛀孔疼痛牙齒根朽爛白礬灰黃丹各一錢蝙蝠糞五十粒巴豆一粒微炒去皮上同研細以軟粟米飯和丸如粟米大曬乾丸有蛀蚛孔疼痛不可忍者以丸於痛處咬之立定韭子丸出聖惠方治牙齒有蚛蟲疼痛甚者韭子一兩乳香一分臭黃一分乾蠍半兩上搗羅為末消黃蠟成汁和丸如彈子大即以瓷瓶子內先著灰火燒一丸用紙蓋以筆管引煙出熏牙蚛孔處其蟲盡出或將藥瓶於水碗中安著其蟲盡下撲在水中青鹽散出聖濟總録治牙齒蛀蚛牢牙祕精補益漱咽青鹽龍骨生各四兩濕雞頭一升以青鹽拌一宿炒令通黑上為散平旦及臨臥先漱口令淨以藥散如常揩齒良久以溫酒漱咽烏頭散出王氏博濟方治風蚛牙疼烏頭二枚坐正角炙生者去皮臍乾薑生用去皮甘草二味各用一棗子大上為散每用半字含水搐鼻左疼搐右右疼搐左瘥為度乳香丸出聖濟總録治蛀牙疼痛不可忍者乳香研胡椒阿魏各等分上為末煎皂莢子膠和丸如緑豆大每用裹一丸安在蚛牙內吐涎以瘥為度蜂房湯出聖濟總録治牙齒痛有蟲蜂房一枚炙碎擘豉四十九粒蜀椒去目併合口二七粒上水二盞半煎十餘沸去滓熱含冷吐服此藥若有腫尤易見效蜀椒湯出聖濟總録治牙齒蟲疼痛蜀椒去目並閉口者桂去粗皮各一兩白礬燒灰半兩上搗篩每用三錢水一盞煎三五沸去滓熱含冷吐瘥為度立止散出聖濟總録治風牙疼肥皂莢去皮子取肉草烏頭不去尖各一兩乳香研一錢上為末薄麵糊丸梧桐子大用一丸入蚛孔中涎出即吐治風蛀牙齒疼出海上方草烏頭槐花蓽茇上等分碾為末每用半錢蘸擦痛處用醋湯漱之掃痛丸出經驗方治風蚛牙疼引太陽穴痛川烏半兩泡鶴蝨一兩焙乾良薑一兩以青鹽炒半兩上為末風牙痛牙上炒鹽同前藥擦蛀牙痛白梅肉同前藥丸塞之細辛散出海上方治蛀牙細辛草烏尖乳香各等分上為細末溶黃蠟為條用時就火丸塞孔中良久效無孔即咬於痛處有涎即吐之鉛白霜散出宣明論方治牙齒腐蝕氣臭出血及口瘡鉛白霜銅緑白礬枯等分上細研干貼患處良久溫漿水漱之小兒不消漱之蜂房散出直指方治蟲蛀牙痛直殭蠶蜂房炒二件各等分樟腦半分上為末皂角肉按濃漿煮少頃和作小丸塞痛處治牙被蟲蝕有蚛孔痛不可忍方出聖惠方豬牙皂莢一挺川椒一七粒莽草葉七片上搗羅為末以棗肉和丸如黍米大每用一丸以綿裹納蚛孔中痛定後去藥乳香散出傳信適用方治牙疼蛀蚛風虛上攻連腦疼痛乳香一分補骨脂炒半兩上搗研為散每用少許揩疼處有蛀眼則用軟飯和藥作錠子塞蛀孔中其痛立止傳信方云余昔患此諸藥不效唯此方最妙麝香散出聖濟總録治蟲蝕牙齒片片自落麝香石膽各一分上為散每用一字摻敷患處日三以瘥為度地龍丸出十便良方治牙齒蟲痛乾地龍末三分麝香研一分上和勻熔蠟丸如麻子大每有牙蟲孔即以一丸納之候藥發熱蟲死立瘥一方治牙齒宣露挺出不出蠟每用一字摻於齒根下白虎散出聖濟總録治一切風蚛牙痛不可忍者砒霜鉛丹各一分上先取砒霜細研人青蔥梢內輕輕扎定次入杆草內如縛粽子樣以草火燒過取砒如金色一錠子次取鉛丹同研勻細每用時以燈心點藥一米許入於耳內左則左用右則右用二白丸出聖濟總録治齒痛蚛孔白殭蠶炒白礬熬枯各半兩上為細末以臘月豬脂丸納於蟲孔中莽草散出千金方治齒有孔不得食面腫莽草七葉豬椒附根皮長四寸者七枚上㕮咀以漿三升煮取一升滿口含倦即吐卻日二三度信效散一名麝香散出宣名論治風熱上客陽明之經牙齒疳蝕齦宣腐臭血出色黃氣腐注悶動搖疼痛作發有時兼解金石一切毒藥上好鹹土不以多少麝香真好者少許上熱湯淋取汁去滓用清汁銀石器中熬煮刮下再與麝香同研勻擦於瘡上以紙貼神效乳香膏出百一選方治蚛牙痛孔有蟲不可忍光明白礬枯過滴乳香各等分上為細末熔蠟量多少和膏旋丸看蚛牙孔子大小填之其痛立止神效又方入染臘胭脂少許和令深桃花色只作散遇牙痛用一字以紙揩擦良久乃溫鹽湯漱口又方以飯和丸青鹽散出百一選方治風蚛牙疼痛不可忍每用少許揩牙患處吐涎及咽津不妨青鹽四兩川烏頭二兩去尖劈碎如骰子大上乾鍋內用熟炭火煅候煙出盡存性取出埋地內三日碾細揩患處如煅時以木杖子攪之不得犯鐵卻將一盞蓋乾鍋子口上或用瓷罐子煅亦可每揩藥先用荊芥湯漱口揩了亦然治風蚛等牙出經驗良方象斗子五個以青鹽在內火煅鹽袋內皂莢一條火煅存性上為細末先用荊芥湯漱訖卻以前藥就痛處擦之去涎日三五次治風蛀牙疼不可忍腮頰浮腫出海上方莽草芫花上等分水煎十餘沸通口灌風涎壅出即效治蟲蚛牙痛川巴豆肉三枚明乳香一錢上同研溶蠟為丸麻子大每服一丸塞孔危氏方云有紅川椒無川巴豆肉又方一名椒豆膏出朱氏集驗方治蚛牙疼痛紅川椒末一錢大巴豆肉一粒上研細蒸飯丸如麻子大以薄綿包塞孔昔有人蚛牙痛不可忍號呼之聲徹於四鄰用藥不效有道人獻此方用之即安治牙蛀痛方出直指方蠶紙燒存性直殭蠶炒各等上為末敷良久鹽湯漱口金針丸治蟲牙疼不可忍骨碎皮乳香上等為末麵糊為丸如豆大塞蟲牙孔莽草散出聖惠方治牙齒蟲蝕有蚛孔莽草五錢山椒皮一握上搗羅每用三錢以酒水各半盞煎五七沸去滓熱含冷吐治蚛牙疼痛一名定痛散出肘後方用附子一枚生去皮臍搗為末熔蠟如粟大每服用綿裹一丸納蚛孔中蟲出一方為末用生薑調擦患處良久溫鹽湯盥漱治蟲牙齒出千金方以莨菪子三合如無蔥子韭子並得以青錢七文燒令赤取小口罌子令可口含得者將錢納罌子中取一撮許莨菪子安錢上令炮烢聲仍與半合許水淋令氣上從罌出將口令氣莫出熏齒冷復更作取三合藥盡為濟非止蟲齒得瘥或風齒齲齒中病悉主之口中多津即吐之一方為末納孔中以蠟封之或丸納之亦可又方出千金方用白楊切一升水三升煮取一升含之又方出肘後方用米醋一升煮枸杞根白皮一升取半升含之蟲立出又方出衛生家寶方取桃仁少許以叉頭穿向燈上燒之煙出經少時吹滅即納入口安蟲齒上咬之不過五度六度一方作胡桃仁又方出千金方治疳蟲蝕齒根用地龍置石上著一撮鹽須臾化為水以面蘸取卻待凝厚取以納病齒上又以皂莢去皮塗上蟲即出又方出千金方用䋃麻子燭燼研以井水塗之又方出千金方以黑羖羊脂莨菪子各等分先燒鐵鋤斧鑿令赤內其中煙出以布單覆頭令煙氣入口熏之治蛀牙腫痛出華他中藏方用不蛀皂角一錠去皮子卻用巴豆每用皂子處安巴豆一粒用鹽泥固濟燒灰研為細末用剜耳子抄少許填入蛀牙治蛀牙出仁存方用乳香如小豆大安痛牙上燒銅箸令熱淬香上令溶立止
