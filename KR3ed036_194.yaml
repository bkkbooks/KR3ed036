body:
  text: 卷一百九十四水病門水腫胸滿氣急附論內經論水病謂其本在腎其末在肺又曰肺為喘呼腎為水腫氣痞滿塞於胸中故有胸中滿急之證蓋由腎虛既成聚水之病上攻於肺肺布葉舉在於胸背者胸中之腑也方防己丸主治水氣腫滿肺氣喘急咳嗽胸脹滿悶坐臥不得喉中作聲心胸痞滯防己白前五味子紫菀去苗土各半兩馬兜鈴桑根白皮去皮陳橘皮浸焙去白各一兩甘草炙銼一分杏仁五十枚浸炒去皮尖雙仁上搗羅為末煉蜜和丸如梧桐子大每服十五丸至二十丸溫生薑湯下不拘時候澤瀉丸專治水氣腿股腫滿喘促咳嗽坐臥不得澤瀉芫花炒郁李仁炒去皮尖牽牛子炒頭末防己苦葶藶炒各一錢滑石研大戟炒各三分銼海蛤研甘遂炒檳榔銼各半兩上搗羅為末煉蜜和丸如梧桐子大每服二十丸食前煎陳皮湯送下茯苓杏仁煎療氣忽發滿胸中氣急者茯苓四兩杏仁四兩去皮尖橘皮三兩上切以水九升先煮諸藥取三升去滓內竹瀝生薑汁蜜等和勻微火煎取四升一服四合日再夜一忌海藻菘菜酢物十聖丸專治水病喘促上氣消腫滿大戟炒桑白皮炒切甘遂炒甜葶藶紙上炒巴豆去皮心炒各半兩損隨子去皮檳榔銼烏頭去皮臍細慢火炒令焦黑煙出為度各一分杏仁去皮心雙仁炒三分牽牛子炒二兩三分上為末蜜丸如雞頭大每服一丸生薑湯化下更量病勢加減療氣忽發滿腹急者方豬腎一具生破去膜桑根白皮五兩茯苓四兩澤漆葉三兩防己三兩澤瀉三兩橘皮三兩大豆三升淨郁李仁一升研甘遂三兩煮上切以水一斗三升先煮豬腎桑根白皮澤漆葉大豆取八升去滓內余藥煎取二升七合分為三服忌醋物甘遂湯出聖惠方治水腫胸滿氣急上喘大小便澀甘遂炒一兩半赤茯苓去皮郁李仁浸去皮尖研黃芩去心杏仁去皮尖雙仁炒各二兩澤瀉陳橘皮浸去白炒乾澤漆微炒各二兩上搗篩每服五錢水二盞煎至一盞半去滓分溫三服一方用朴硝一方煎桑根白皮湯調下藥末一錢以利為效療氣忽發心滿胸急者方桑白皮四兩橘皮三兩茯苓四兩杏仁三兩甘遂澤瀉各三兩黃芩四兩赤小豆一升上切以水九升煮取二升半分三服忌酢物一方有甘草三兩又方青羊腎一具桑根白皮四兩茯苓四兩橘皮三兩李根白皮四兩黃耆三兩玄參三兩生薑四兩上切以水九升煮取二升七合分三服忌酢物黃耆丸出聖濟總録治水氣消腫定喘黃耆銼甘遂炒青橘皮浸焙去白麥糵大戟炒陳橘皮浸去白焙陳神麯炒各半兩上為末煉蜜為丸如梧桐子大每服十丸煎木通桑根白皮湯下苦葶藶丸出聖濟總録治水氣喘滿小便赤澀腰腿浮腫不得眠臥苦葶藶一兩三分紙上炒杏仁三錢浸去皮尖炒研陳橘皮湯浸去白焙四錢防己一兩赤茯苓去黑皮紫蘇葉郁李仁湯浸去皮尖炒研各半兩上搗羅為末與二味研者和勻煉蜜丸如梧桐子大每服二十丸食後煎橘皮湯下日再煎紫蘇湯下亦可郁李仁湯出聖惠方治水腫胸滿氣急郁李仁浸去皮尖炒桑根白皮炙赤小豆炒各三兩紫蘇一兩半橘皮二兩茅根切四兩上搗篩每服五錢水三盞煎至一盞去滓溫服葶藶散出危氏方治因飲水漿多感冷濕胸腹脹滿瀝咯有聲喘急氣促面色黃芫花炒赤甘遂大戟黑牽牛炒取為末上各等分為末每服一錢先將紅棗十枚煎湯一盞溫調再單飲棗湯送下平旦服病不除明日更服加半錢利後稀粥自養但服加味控涎丸方見喘急茯苓湯專治水腫胸中氣滿喘急赤茯苓去皮杏仁去皮尖雙仁炒各四兩陳橘皮浸去白炒二兩上搗篩每服五錢水三盞煎至一盞去滓溫服日再服水隨小便下療氣忽發滿胸急者大棗三十枚打破上以水四升煮取二升內蜜和調不得過甜不得過酸稍含咽之水腫咳逆上氣附論內經謂水腫肺為喘呼氣逆不得臥蓋腎主水肺主氣腎虛不能制水水氣脹滿上乘於肺肺得水而浮故上氣而咳嗽古方有曰腫從水起上氣而咳名曰白水其病在肺方烏腎丸出聖惠方治水氣腫滿咳逆上氣烏腎半兩蛤蚧一對塗酥微炒木通半兩漢防己半兩檳榔半兩大戟三分陳橘皮三分海藻半兩炒洗去咸木香半兩當歸半兩銼碎微炒郁李仁三分湯浸去皮尖微炒續隨子一分海蛤半兩細研肉桂半兩去皺皮赤茯苓半兩赤芍藥半兩上為末煉蜜為丸如小豆大每日五更初以桑根白皮湯下三十丸大白前湯出聖濟總録治水氣咳逆上氣通身洪腫短氣脹滿晝夜臥不得腹中鳴大小便不通食不下而不甚渴白前一兩半紫菀去土二兩半夏湯洗七次二兩銼焙乾去滑生澤漆根微炒一兩上四味搗篩每服五錢水一盞半煎至一盞去滓入內後藥桂去皮一兩半人參二分白朮赤茯苓去皮各二兩葶藶散專治十種水氣喘急坐臥不得小便淋澀方見神助散褚澄漢防己散出千金方治水腫上氣漢防己澤漆葉石葦澤瀉各五兩桑根白皮白朮丹參赤茯苓橘皮通草各三兩郁李仁五合上治下篩為粗散每服五錢以水一升煎至八合去滓頓服一日三服取小便利為度大棗散專治遍身浮腫肺脹上氣不得臥大小便澀先服大棗散後服海蛤丸後三年不得食肉入房不爾病必重發治陽中風下利嘔逆短氣不惡寒熱汗出發作有時頭痛心痞硬引脅下痛兼下水腫腹肋脹並酒食積腸垢積滯痃癖腎積蓄熱極痛上氣久不已並風熱燥甚結於下焦大小便不通實熱腰痛出聖濟總録芫花炒一分甘遂炙半分大戟去皮一分上搗羅為散每服一錢匕以大棗十枚水一盞半煮棗三二十沸去棗調藥空心頓服當利勿止三服後服海蛤丸人實更加服隨虛實加減海蛤丸出聖濟總録海蛤別研赤茯苓去皮各一兩狼毒三分桑根白皮炙銼玄參微炙各一兩膩粉半兩薏苡仁陳橘皮浸炒去白防己葶藶炒研杏仁湯浸去皮尖雙仁炒各一兩上除海蛤外搗羅為末同海蛤再研勻煉蜜丸如小豆大每服空心用橘皮湯下三十丸日三服五日後覺齒癢即住藥齒腫口瘡即是瘥候白前湯出聖濟總録治水氣咳逆上氣通身浮腫短氣脹滿晝夜倚壁不得臥其喉中作水雞聲白前十至三分紫菀去土一兩半半夏洗七次三兩澤漆根炒栝蔞一枚去皮白朮一兩桂去皮一兩半人參乾薑各半兩吳茱萸浸一宿炒二兩上搗篩每服用五錢水三盞入棗三枚生薑一塊拍破煎至一盞半去滓分二服當小便利或微溏腫即減防己湯出聖濟總録治水氣咳逆上氣四肢浮腫坐臥不安防己半兩桑根白皮銼木通銼赤茯苓去皮各一兩澤漆郁李仁浸去皮炒甜葶藶各半兩隔紙炒紫色陳橘皮浸去白焙二兩上搗篩每服五錢水一盞半棗四枚擘破同煎至七分去滓食後溫服黃耆湯治水氣面浮咳嗽氣促黃耆三分柴胡去苗赤芍藥炒赤茯苓去皮各半兩陳橘皮浸去白焙麥門冬去心焙惡實炒甘草炙各三分上搗篩每服三錢水二盞煎至七分去滓溫服不拘時候治水氣浮腫咳逆上氣宜服此方甜葶藶三分紙炒杏仁湯浸去皮尖雙仁炒微黃赤芍藥秦艽去皮漢防己麻黃郁李仁桑根白皮甘草各半兩上篩為散每服三錢以漿水一盞煎至六分去滓溫服三日四服杏仁散出聖惠方治水氣腫盛咳逆上氣小便赤澀杏仁一兩湯浸去皮尖雙仁炒微黃茅根一兩半赤茯苓一兩陳橘皮一兩湯浸去白桑根白皮二兩郁李仁二兩湯浸去皮微炒澤漆葉二兩川芒硝一兩木通一兩上為散每服四錢水一中盞生薑半分煎至五分去滓空心溫服如人行十里當下黃水一二升為效鯉魚湯出聖濟總録治水腫腹大喘咳胸滿不得臥鯉魚一個重三斤去鱗腸肚桂去皮紫菀去苗土各二兩防己黃芩去黑心硝石研如粉人參各二兩上除魚搗篩先用東流水五升煮魚令爛熟去魚內藥末五錢煮赤小豆一合大棗三枚擘破生薑三片候豆熟去滓溫服日三夜一治水腫咳逆上氣坐臥不得宜服此方出聖惠方甜葶藶一兩令紫色隔紙炒橘皮一兩湯浸去白焙甘遂半兩炒微黃牽牛子一兩炒微黃郁李仁半兩用湯浸去皮上搗羅為末煉蜜和丸如梧桐子大每服煮赤小豆飲或大麻子飲下十丸日三服以大小便利為度又方出聖惠方海蛤一兩細研甜葶藶一兩隔紙炒紫色漢防己一兩銼杏仁湯浸去皮尖三分雙仁炒微黃甘遂一兩炒令微黃桑根白皮一兩銼上搗為末以棗肉和搗三二百杵為丸如梧桐子大每服於食前煎大麻子湯下七丸白前湯治水腫咳逆上氣身體浮腫短氣脹滿晝夜倚壁不得臥咽喉中作水雞聲白前紫菀半夏大戟各三兩上㕮咀以水一斗浸一宿明旦煮取三升三服水腫小便澀附論水氣小便澀者由榮衛不調經絡痞澀脾腎虛弱使水氣流溢於皮膚四肢腎與膀胱有熱故也凡此二經俱主於水水行於小腸入脾為小便也今熱氣在於臟腑水行則澀故令小便澀方海蛤丸主下水氣治小便澀身腫氣悶妨食昆布洗橘皮赤茯苓漢防己海蛤研郁李仁桑根白皮澤漆炙檳榔杏仁各四分去皮尖雙仁炙大黃六分葶藶二十分微炙熬令黃上搗篩蜜丸米飲服梧桐子大十五丸日二服加至二十五丸以小便利為度忌熱面冷滑大酢海蛤丸出聖濟總録治水腫腹滿四肢黃瘦喘促小便澀海蛤二兩研木香訶黎勒皮防己厚朴去粗皮生薑汁炙旋覆花各一兩白檳榔銼鱉甲去裙襴醋浸炙郁李仁去皮研各一兩半桂去皮半兩上為末煉蜜為丸如梧桐子大每服二十丸煎大腹皮湯送下海蛤丸出聖惠方治大腹水腫四肢洪滿小便澀少海蛤一兩研甜葶藶一兩隔紙炒令黃色赤茯苓一兩去皮桑根白皮一兩銼郁李仁一兩湯浸微炒防己一兩銼陳橘皮一兩湯浸去白甘遂半兩炒微黃上搗羅為末別搗葶藶如泥納藥末中和勻煉蜜和丸搗二三百杵丸如梧桐子大每服二十丸以粥飲下日三四服又方出聖惠方檳榔一兩牽牛子一兩微炒赤茯苓一兩桑根白皮一兩銼甜葶藶一兩隔紙炒黃色漢防己半兩上為末別搗葶藶如泥納藥末中和搗三二百杵丸如梧桐子大每服二十丸粥下日三服以瘥為度漢防己散出聖惠方治水氣四肢腫滿上氣喘急小便祕澀漢防己一兩木通一兩桑根白皮一兩銼赤茯苓一兩甘草半兩銼炙微赤大腹皮半兩銼牽牛子二兩微炒上搗羅為散每服三錢以水一中盞入生薑半分蔥白七寸煎至六分去滓不計時候溫服商陸丸出聖惠方治水腫利小便消脹滿商陸一兩川芒硝半兩甘遂一分微炒黃川大黃半兩銼碎微炒芫花半兩醋拌炒上為末煉蜜和搗三二百杵丸如梧桐子大每服食前粥飲下三丸以利為度瞿麥散出聖惠方治水氣面目腿膝腫硬小便赤澀瞿麥一兩滑石一兩漢防己一兩川大黃一兩銼微炒川芒硝一兩上為散每服三錢水一中盞煎至六分去滓不計時候溫服又方出聖惠方木通二兩銼桔梗一兩去蘆頭赤芍藥一兩桑根白皮一兩甜葶藶一兩上為散每服五錢水一大盞煎至五分去滓不計時候溫服大戟散出聖惠方治水氣腫滿大小便澀大戟一兩湯浸去白微炒陳橘皮一兩湯浸去白商陸一兩銼木通一兩銼瞿麥一兩銼上為散每服三錢水一盞煎至六分去滓空腹溫服如未通即良久再服水銀丸出聖惠方治水氣腹脹氣促小便澀水銀一兩用炒內研令星盡甜葶藶一兩用隔紙炒令紫色椒目半兩微炒去汗浮萍草半兩滑石二兩上為末研入水銀令勻煎皂莢子膠和丸梧桐子大每服十五丸蔥湯下日三服香蘇散出衛生寶鑑治水氣虛腫小便赤澀陳皮一兩去白防己木通紫蘇葉各半兩上為散每服二錢水二盞生薑三片同煎至六分去滓溫服食前日二治水氣小便澀身體虛腫宜服此方出聖惠方烏桕皮一兩炙木通一兩銼檳榔一兩上為細末每服二錢粥飲下不計時候塗臍膏出德生堂治水腫小便絶少地龍生者好研豬苓針砂煅紅研上各一兩為末擂蔥涎研成膏敷臍中約一寸高以闊絹帛縛定出小便多為度日二更入甘遂同為末尤妙治水氣小便澀喘息氣促四肢無力宜服此方沙牛尿一斗訶黎勒皮半斤搗末上先以牛尿於銅器中煎至二升入訶黎末熱令硬軟得所丸如梧桐子大每服茶酒任下三十丸日三服當下水及惡物為效治水氣洪腫小便澀方出聖惠方芫花根一兩銼炒上為末每服空心以溫水調下一錢匕得小便大利瘥治水腫煩渴小便赤澀方冬瓜白穰不限多少上以水煮令熟和淡食之治水氣遍身腫小便赤澀方甜葶藶二兩隔紙炒令紫色上搗如膏煮棗肉和丸如梧桐子大每服三十丸煎桑根白皮湯下日三四服治氣喘促浮腫小便澀用杏仁一兩去皮尖熬研和米煮粥極熟空心吃二合十金散治小便不利水氣流滯膀胱用浮萍草日乾為末服方寸匕日一二服蠱病附論內經謂脾風傳之腎經名曰疝瘕少腹膀胱積熱而痛出白一名曰蠱夫脾受風邪傳於腎經邪熱內爍故其症少腹冤熱而痛出白其情不守久而弗治適以喪己志也水之精為志志既喪則情從之左傳謂惑以喪志為蠱者如此方大沉香尊重丸方治蠱症腹滿水腫遍身氣逆嘔噦喘急小便赤澀大便不調一切中滿下虛危困病證其效不可盡述滑石三錢沉香丁香人參檳榔車前子葶藶各二錢青皮白牽牛枳實炒木通各四錢胡椒木香海金砂蠍尾去毒茯苓肉蓯蓉各一分蘿蔔子六錢炒白丁香一錢半別研郁李仁湯浸去皮一兩二分上為細末生薑自然汁打糊為丸如豌豆大每服二十丸生薑湯下不拘時候日進三服忌鹽魚菜肉麵食單服米粥常治水蠱用尊重丸為正散腫丸為副日各二服如蠱脹腹肚高腫有些小青筋少腹痛者單服此藥一方加陳皮無價散治諸般蠱氣青皮陳皮桑白皮炒豬苓車前子焙澤瀉續隨子甜葶藶炒樟柳根大戟白牽牛末甘遂川椒木香木通去皮銼郁李仁各等分上件為末每服三錢用蔥白二根切水二盞煎至五分去滓溫服檳榔散治男子婦人蠱氣及下元腿膝虛腫檳榔白茯苓白附子白朮芫花蓬朮大戟甘遂黑牽牛巴戟青皮京三稜炒肉桂茴香各等分上為末每服一錢用樟柳根煎湯調服一更前後取腳上水二更煎升麻湯下取面上水三更煎赤小豆湯下取手上水四更煎桑白皮湯下取肚中水五更煎茶酒下取膜中水治蠱證茯苓二兩茯神二兩豬苓一兩乾山藥三兩人參三兩白酒麴半兩神麯半兩麥門冬半兩牽牛半兩為末乾生薑二兩上樟柳根去皮淨咀作片子水浸一宿天明換水煮乾爛就搗研曬乾與前藥搗篩對半一同分兩為末生薑汁蔥頭自然汁打糊為丸如梧桐子大每服三十丸或四五十丸不拘時候拓腫神應丸治男子婦人諸腫蠱毒肚脹如鼓脾癖癥瘕氣塊上喘氣急咳嗽喘息不得睡服此藥得自祕傳用之三稜莪朮青皮各一兩乾漆燒一兩芫花七錢半大戟一錢硇砂一錢巴豆去殼取霜研一錢上前藥和一處用好米醋一大碗慢火煎至醋乾為度取出曬乾碾為末醋糊為丸如梧桐子大每服四五十丸用生薑湯五更空心下隨用椒目六兩白蘿蔔子半斤炒香熟用手帕盛藥尉患身上俱腫處如冷則再取出炒熱仍尉至再至三直至小大便行後方住尉後如去大便多要食溫稀粥一盞補之即止肉蓯蓉丸治蠱病小腹冤熱而痛便溺出白肉蓯蓉去皮酒浸焙白茯苓去皮黃耆銼澤瀉五味子龍骨牡蠣火煅研當歸切焙各一兩上為末煉蜜丸如梧桐子大每日服三十丸用溫酒送下空心服日午臨臥各一服萬安散治蠱病大黃雷丸木香各一兩苦葶藶樟柳根各半兩黑牽牛白牽牛各一兩半檳榔七枚上為末每服五錢用熟蜜五錢酒一盞調服空心食前大建中湯出宣明論治蠱病小腹急脹痛便溺失精溲而出白液黃耆銼遠志去心當歸去蘆頭澤瀉各三兩銼焙芍藥炒人參龍骨甘草各二兩上銼如麻豆大每服五錢匕水二盞生薑三片大棗三枚擘破煎至一盞去滓溫服不拘時候澤瀉丸治蠱病小腹冤熱而痛精氣不守溲便出白澤瀉銼補骨脂炒巴戟天去心五味子焙石斛去根赤芍藥人參甘草各等分上為末煉蜜丸如梧桐子大每服三十丸溫酒或鹽湯下空心日午臨臥各一服乾地黃丸治蠱病精氣不守便溺出白小腹冤熱而痛熟地黃焙半兩鍾乳粉半兩龍骨菟絲子酒浸一宿別搗磁石火煅醋碎七次芍藥黃芩去黑心各一兩上為末酒煮麵糊為丸如梧桐子大每服二十丸溫酒或鹽湯下空心日晚各一服無憂散出儒門事親治腹肚蠱脹大便不利木香半兩白朮半兩桑白皮陳皮木通銼黃耆各半兩銼官桂半兩一方用胡椒療氣忽發滿胸急者方豬腎一具去脂膜桑根白皮五兩茯苓四兩澤漆葉三兩防己三兩澤瀉三兩橘皮三兩大豆三升半郁李仁一升碎甘遂三兩煮上切以水一斗三升先煮豬腎桑根白皮澤漆葉大豆取汁八升去滓內余藥煎取二升七合分為三服忌酢物又方甘遂炒一兩半赤茯苓去皮郁李仁浸去皮尖研黃芩去黑心杏仁湯浸去皮尖雙仁炒各二兩澤漆葉二兩陳橘皮浸去白焙二兩澤瀉微炒二兩上搗篩每服五錢水三盞煎至一盞半去滓分溫二服一方用朴硝一方煎桑白皮湯調下末一錢以利為效療氣忽發滿胸急者桑白皮四兩橘皮四兩杏仁三兩甘遂三兩澤瀉三兩黃芩四兩赤小豆一升上切以水九升煮取二升半分三服忌酢物一方有甘草三兩又方青羊腎一具桑根白皮四兩茯苓四兩橘皮三兩李根白皮四兩黃耆三兩玄參三兩生薑四兩上切以水九升煮取二升七合分三服忌酢物黃耆丸出聖濟總録治水氣消腫定喘黃耆銼甘遂炒青橘皮浸焙去白麥糵大戟炒上為末煉蜜丸如梧桐子大煎木通桑根白皮湯下苦葶藶丸出聖濟總録治水氣喘急小便赤澀腰腿浮腫不得眠臥苦葶藶紙上炒一兩三分杏仁湯浸去皮尖雙仁炒研三錢陳橘皮湯浸去白焙四錢防己一兩赤茯苓去黑皮紫蘇葉郁李仁湯浸去皮尖炒研各半兩上七味搗羅五味為末與二味研者和勻煉蜜丸如梧桐子大每服二十丸食後煎橘皮湯下日再仙方萬安散治男子婦人不以老幼一切沉深積塊氣蠱水蠱食蠱小腸膀胱奔豚疝氣偏墜木腎腳氣十膈五噎翻胃吐食脾痛氣喘痰飲咳嗽肺脹吐血咯血淋血者諸般瘡癬腸風瀉血婦人赤白帶下經脈不調或後或前血崩積聚黑牽牛三兩生熟各半熟黃色不用焦黃雷丸三個生用大黃二兩生用管仲三兩檳榔三兩生用上為細末每服四錢重者五錢用沸湯浸至明晨服服畢細嚼生薑三片過藥一時刻取下病源各隨所傷如亂絲馬尾或如血蠱或如蛇蝦蟆之類各種各樣不齊此藥不動真氣四時著病皆可服之十歲者分作二服老幼衰弱臨時加減忌魚腥三五日治男子婦人蠱氣及下元腿膝虛腫豬苓茯苓漢防己木通陳皮各等分上為末每服四錢水一盞半用燈心十莖同煎至七分去滓溫服如服至四服小便通為驗權木丸治男子婦人通身蠱脹不能動作南康蛤粉一兩豬苓半兩澤瀉半兩真平胃散一兩上為細末同平胃散蛤粉和勻用大蒜連皮灰火煨香熟搗爛和丸如梧桐子大每服三十丸至五十丸用溫水送下日三服忌魚腥冷物濕面四妙丸出危氏方治氣血滯於腹內蠱脹如鼓坐臥喘急不安枳殼四兩去穰切作兩脂面大塊分四處一兩用蒼朮炒去蒼朮一兩用蘿蔔子一兩同炒黃去蘿蔔子一兩用乾漆一兩炒黃去幹漆一兩用茴香一兩同炒去茴香再將枳殼研細末上用所去四味藥以水二碗煎至一碗去滓煮枳殼末麵糊丸梧桐子大每服五十丸食後米飲下中經丸治蠱脹中虛腫滿不思飲食神麯炒乾薑炮各一兩麥糵炒一兩吳茱萸半兩湯洗七次焙乾上為細末麵糊為丸梧桐子大每服三十丸溫酒送下食前日晚連進三服苦蒿梨丸治水蠱氣苦蒿梨木香蘿蔔子各等分上為細末酒糊為丸梧桐子大每服三二十丸空心溫酒送下硃砂守病丸專治積聚一切蠱氣返食證人言一兩巴豆去皮燒熟一兩芫花一兩醋炙上為細末如皂角子大每服三丸空心溫酒一盞送下治蠱脹用皂角剪丸二兩重宣瀉五六次後用香綿散香綿散生漆滓一兩半春蠶綿三兩重麝香五錢上以漆滓放在鐵鍋炒做灰綿用剪細入此鍋內同漆滓炒作灰同碾為末後將麝香研細勻入飯飲湯調下好酒亦得枳殼丸治蠱脹枳殼芫花各等分上用釅醋浸芫花透將醋再煮枳殼爛擂芫花末和為丸如梧桐子大每服數丸溫白湯送下治蠱用雞屎醴酒調服之消蠱湯出直指方治氣作蠱脹但腹滿而四肢頭面不腫紫蘇莖葉縮砂肉豆蔻枳殼青皮陳皮京三稜蓬朮檳榔辣桂白豆蔻仁蓽澄茄木香各一分半夏制蘿蔔子生各一分半甘草炙一分半上銼每服三錢薑棗煎服石燕子丸治婦人男子氣蠱血蠱之疾石燕子四個煅木通大戟海金砂石葦苦楝根豬苓海藻扁竹茴香白牽牛海蛤瞿麥通草元胡各半兩上為細末燈心竹葉煎湯打麵糊為丸梧桐子大每服五十丸用燈心竹葉湯送下食前奪命方丹治氣蠱勞蠱血蠱筋蠱水蠱麝香一錢半大黃生用五錢黑牽牛半兩甘遂二錢澤瀉半兩香附子二錢上為細末每服一錢用白樟柳根汁半盞無灰酒半盞調藥末頓熱空心服之此藥後三日內不可食魚腥鹽醬濕面發氣等物年齡在六十歲以上與十五以下者只可服半貼大便取下惡物為效香棗丸出瑞竹堂方治蠱氣腹滿蠱病有十種皆可服用苦丁香為細末用熟棗肉和搗為丸梧桐子大每服三十丸煎棗湯送下空心服三服必愈治蠱氣方用環腸草不拘多少曬乾為末水煎服以小便通利為度五蠱丸出聖濟總録治百病及諸蠱病雄黃椒目炒莽草真珠研巴豆出油盡芫花醋浸炒焦鬼臼礬石燒令汁枯藜蘆去蘆頭微炒獺肝各一分蜈蚣一條附子炮裂去皮臍半兩斑蝥去翅足炒十枚上為末煉蜜丸如小豆大瓷盒密收每食後服一丸如未效增一丸以利為度當有蟲出形狀不可具載蟲下後七日內切宜將攝凡服此藥一劑蟲出不浸百病盡除勿食五辛又蛇毒甚者合五蠱丸未及且以大豆漬酒絞汁服半升瘥又酒服桔梗角末方寸匕日三服中毒甚則不能開口斡口開與之藥藥下心頭當悶燥須臾即蘇如此服七日後宜食豬脾臟補養今所録蛇蠱方在卷末者緣蛇毒狀似水病治之且謂水藥不驗楊馨所傳地仙徒郁先生神方一十五首皆治之楊馨云曾有親識患水病洪腫滿悶狀危頃刻必死旦服此藥至暮獲安病痊後不忍棄其藥滓以絹袋盛之凡煎防己湯須用臼鐺於火中合之燒令通赤揩磨取淨免有油膩又於藥名二十味中各取一字合成四句歌之庶使年久不忘歌云胡牽犀藶海漢茯戟通桑青黃訶麝目郁橘紫防榔紫蘇煮散出聖濟總録治水氣紫蘇葉防己去皮桑根白皮切白朮銼碎各等分上為散如茶法煎三兩沸臍熱即去白朮加甘草切又有蛇毒蠱狀與水病相似四肢如故小便不甚澀但腹急腫而蠱脹食不下凡醫多誤作水氣治之宜詳細審查當服太上五蠱丸枳殼丸出衛生寶鑑方治久患五膈氣積噎塞氣血結滯腹脹成蠱身瘦面黃肚急如鼓兼治脾積食蠱厚朴去皮一斤用大黃二兩生薑四兩大棗五十枚川烏一兩以水煮棗爛為度只用厚朴枳殼麩炒去穰上為末每服厚朴八錢枳殼二錢入定粉三錢膩粉二錢同碾令勻每服半錢匕熱米飲調下日進三服不計時候連服三日重者不過五日遂下惡物瘀血為應次以和胃健脾藥補之木香丸出楊氏家藏方治蠱脹推氣退腫法曲四兩炒乾薑一兩肉桂去皮一兩砂仁三十粒巴豆二十五粒去皮木香一兩陳橘皮去白一兩檳榔半兩縮砂一兩黑牽牛一大升用無灰酒半升浸一宿取出焙乾上件為細末用獖豬肚一枚淨洗將前件牽牛盛在內用無灰酒五升慢火煮之酒盡肚爛取出於臼中搗極爛和前藥末一處杵為丸如緑豆大每服五十丸空心日午臨臥溫酒送下更量虛實加減之蘿蔔子丸出楊氏家藏方治蠱氣脹滿四肢虛腫上氣喘急小便祕澀蘿蔔子四兩炒令黃雷丸二兩炒黃白附子一兩半去黑皮檳榔半兩陳橘皮去白二兩茅根三兩炒黃上件為末酒煮糊為丸如緑豆大每服十丸至三十丸橘皮湯送下又周益公陰德録治蠱腫祕方永類鈐方用膽礬治水腫以出於信州或蒲州明亮如翠璃似鴨嘴者為佳用米醋煮制勝針鐵矣蓋膽礬亦銅之精液以其味辛酸補肝膽利脾胃應對證佐以臣使之藥安魂魄消水腫此妙方也得者當珍寶之故老嘗授以疏順飲即二十四味流氣飲加減送下沉香丸治水氣縮砂飲出朱氏集驗方治氣脹氣蠱等病如神蘿蔔子研自然汁浸縮砂炒乾又浸又炒不壓蘿蔔浸數日炒乾上以縮砂為細末每服一大錢米飲調下治蠱病出本草用薺花根搗末以飲服方寸匕水蠱附論夫水蠱之狀腹脹皮膚粗黑搖動有聲此由脾腎氣虛濕氣淫溢久不瘥則害人如蠱之毒故謂之水蠱也無比丸出聖濟總録治水蠱通身腫滿京三稜煨銼牽牛子膽礬研檳榔銼芫花醋浸炒各一兩膩粉一分續隨子硇砂研木香各半兩珠粉研三分大棗三十枚湯內略煮過去皮核取肉爛研上除膽礬硇砂棗肉外同搗羅為細末用釅醋二大升先下硇砂膽礬棗肉於銀石器內煎五七沸次下諸藥末一處攪勻慢火候可丸丸如豌豆大每服十丸丈夫溫酒下婦女醋湯下檳榔丸治蠱病檳榔郁李仁各一兩續隨子甘遂各半兩炒黃䕡茹八錢樟柳根黑牽牛大黃各一兩木通海金砂各半兩滑石一兩上為細末麵糊為丸梧桐子大每服三十丸溫酒送下如瀉白粥補之常服只十丸至十五丸忌鹽醋油醬油膩生冷麵粉忌半年中隔丸出聖濟總録治水蠱腹脹消腫滿痞氣芫花醋浸炒黃甘遂炒黃為末大戟炒各一兩澤瀉銼青橘皮湯浸去白木香各半兩硇砂研乳香研各一兩巴豆去皮膜去油研二十枚上搗研為末煉蜜和丸如緑豆大每服三丸至五丸溫酒下檳榔丸治水蠱檳榔郁李仁各一兩樟柳根黑牽牛大黃各一兩木通海金砂各半兩滑石一兩上為細末麵糊為丸梧桐子大每服三十丸溫酒下如瀉白粥補之常服只吃十丸至十五丸忌鹽醋油醬油膩生冷麵食半年瓠穰煎方出聖濟總録治水蠱遍體洪腫用瓠穰一枚以水二升煮一炊頃去滓煎至堪可以為丸即丸如小豆大每服米飲下十丸取小便利利後作小豆羹食之勿飲水楮枝煎方治蠱病水腫用楮枝銼半斤以水五升煎至二升半去滓取汁入黑豆末半升同煎成汁每服一匙空腹不拘時服之一方加細桑枝同煎分氣散出聖濟總録治水蠱腹腫利小便甘遂炒商陸銼炒白牽牛炒各半兩檳榔銼一枚木香一分白丁香研五十個膩粉研一錢上搗研為散每服半錢匕溫酒調下實者加至一錢匕大黃湯大黃銼炒一兩半麥門冬去心焙三分甘遂微炒茅根銼黃連去須各一兩貝母三分上粗搗篩每服二錢匕水一盞煎至七分去滓溫服瞿麥湯出聖濟總録治水腫腹脹滿急小便不通縱有而黃赤瞿麥穗車前子滑石碎茅根銼甘遂微炒苦參上等分搗篩每服三錢匕以水二盞煎至七分去滓溫服日三以利為度海蛤丸出聖濟總録治水蠱腹脹喘嗽利水氣海蛤燒炙半兩滑石研凝水石研各一兩白丁香研五十五個膩粉粉霜各一分上一處杵勻麵粉糊和餅子以濕紙裹燒熟搗羅為末薄麵糊和丸如緑豆大溫酒下二十丸經驗白朮散治水蠱氣蠱病白朮一兩苦葶藶一兩穿山甲五錢蛇蛻一條全黑牽牛末二兩土牛兒一個土坑內燒焙乾上件為末每服三錢好酒調下葶藶湯出聖濟總録治水蠱身體洪腫喘滿葶藶紙上炒令黃紫色搗末一兩上以水二盞入葶藶五錢匕大棗十枚擘破同煎至一盞去滓分為二服以利為度後服葶藶丸葶藶丸葶藶子三兩紙上炒紫色牽牛子炒一兩半海藻洗去咸炒一兩澤漆一兩昆布洗去咸炒一兩豬苓去皮一兩上搗羅為末煉蜜和丸小豆大每服米飲下十五丸日再稍加至二十丸治積年水蠱宜服此方出聖惠方大戟半兩炒銼甘遂半兩甜葶藶半兩巴豆十四枚炒熟去皮油赤小豆五十五粒上為細末以煮棗肉和丸梧桐子大每服空心粥飲下三丸當日小便利水為效結水湯治水蠱內腫即冷外腫即熱氣急無力黃連去須大黃銼碎炒各二兩甘遂微炒葶藶炒紫色各一兩上搗篩每服二錢水一盞半煎至七分去滓溫服日二椒目丸出聖濟總録治水蠱遍身洪腫椒目炒去汗牡蠣研各二兩葶藶二兩甘遂二兩上等分為末煉蜜和丸如小豆大每服米飲下十丸取利利後食白米粥補之治水蠱木香黑牽牛炒飛面炒黃色各四兩白牽牛炒四兩上為細末用年深陳米煎湯和丸作成餅子如當三錢大每服一餅子用陳皮湯送下食前日進二服忌魚雞面等物水銀丸治大腹水蠱堅硬如石宜利小便方水銀一兩以煮棗肉研令星盡川芒硝一兩甜葶藶五兩炒紫上件藥相和搗一千杵丸梧桐子大每服空腹服十丸粥飲下瘥後食牛羊肉自補稍飲之治腹腫重大動搖有水聲皮膚黑色名曰水蠱宜服此方青蛙二枚乾者塗酥微炒螻蛄七枚乾者炒苦葫蘆半兩炒上為細末每日空心以溫酒調下二錢不過三服瘥鼠尾草丸出肘後方治水蠱亦治卒大腹水病鼠尾草馬鞭草各五斤上用水五斗煮取二斗去滓煎成膏為丸小豆大以輕粉為衣每服米飲下三丸至六丸禁食肥肉勿食生冷治腹大動搖水聲皮膚粗黑如似腫狀名為水蠱出肘後方白茅根一大把切小豆三升赤者上件以水三升煮乾去茅根食豆水隨小便下又方出聖惠方用鬼扇搗絞取汁服如雞子大即下水更服取水盡若渴研麻子汁飲之為良又方出肘後方治腹脹大動搖有水聲皮膚黑名水蠱巴豆九十枚去心皮炒黃杏仁九十枚去皮尖炒令黃上搗和服如小豆大一枚以水下為度勿飲酒佳忌食野豬肉蘆筍又方用茲彌草三十斤水三石煮取一石去滓更湯上煎令可丸丸如皂莢子大每服三丸至五六丸水隨小便去即食糜粥養之惡實丸出聖濟總録治水蠱身體洪腫用惡實微炒一兩為末麵糊和丸梧桐子大每服十丸米飲下勿嚼破主腹腫大動搖有水聲皮膚黑名曰水蠱巴豆九十枚去心皮熬黃搗丸如小豆大每服一丸以利為度勿飲酒治水蠱出百一選方用商陸根赤者杵爛貼臍心以絹繫縛定病自小水而出去商陸有二種白者不可用一方用生薑搗和取汁調五苓散取下惡水即愈二聖散一名二氣散治水氣蠱脹滿白牽牛黑牽牛各三兩上為末用大麥面四兩同一處為燒餅臨臥用茶一盞下降氣為效治水蠱腹脹出百一選方上取加味散四桂散細末等分和勻依法煎服紹興術士朱蓑衣名甫苦此疾醫者只令服加味散久之不效葛丞相授此法即安治水蠱出本草用山豆根末酒下二錢
