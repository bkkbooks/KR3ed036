服二錢匕服用胡桃仁一枚分作二服研細溫酒調下久患不過五七服瘥夜臥更深服神妙湯出聖濟總録熏洗痔疾萆薢栝蔞根甘草五倍子豉蔥白切上等分研每服一二兩水兩碗煎數沸盆盛坐熏痔候通手洗黃耆丸治牝痔下血黃耆枳實炙各三兩烏蛇炙當歸赤石脂蝟皮各二兩炙上末蜜丸空腹服酒下如桐子大二十丸日二服密陀僧散出聖惠方治五痔下血疼痛不可忍密陀僧半兩細灰橡實半兩肉豆蔻半兩去殼地龍一兩微炒榼藤子一兩檳榔半兩上為散每服食前以粥飲調下一錢六神丸出聖濟總録治五痔腫痛鶴蝨金星石煅酒淬二次各一兩蚖青五十個去足翅生用白莢仁一百個磁石煅醋淬十次鉛丹研各二兩上為末用荷葉四五重裹於飯甑上蒸一饋取出研勻別取白礬一分泡水和丸桐子大每服十丸麝香酒下臨臥時連三服未效再一二服治外痔亦治惡瘡瘑瘡真珠雄黃雌黃各一兩竹茹二兩豬膏一斤上為末內豬膏中和調又切亂髮半雞子大東向煎三上三下發焦出其痔先用鹽湯拭洗干後敷寬腸丸散治年深日近痔疾當歸荊芥枳殼香附甘草各等分上為末米飲調下二錢玉龍膏白礬指頭大膽礬硫黃各如二豆大硇砂五粒豆大砒指頭大上同入黑盞內火煅過候冷取出入乳香末黃丹各半錢硃砂三錢研勻每服少許油調塗一日三次至三四日其痔瘤皆黑色便不用只用催落藥治痔瘡雄黃半錢細研沒藥二錢半明淨者白礬半熟半生五倍子炮過五靈脂一錢去石煉退頭煙上研為極細末用紙花子貼瘡上五灰散出肘後方治五痔不問內外牝牡寒溫勞濕悉主之鱉甲治牡痔蝟皮治牝痔豬左懸蹄甲治腸痔蜂房治脈痔蛇蛻治氣痔各等分上燒存性隨證倍一分為末水花調二錢空心臨臥一服一方有麝香無蝟皮粥飲調下一方亦以敷瘡上五劑不瘥更服一名鱉甲散各半兩炙用取痔千金方出家藏經驗方可用甘草節同蔥白煎湯用新筆頭點藥水輕輕洗淨休破了痔頭成漏難治砒霜黃明三錢白礬明淨者十兩虢丹一錢水飛過炒蠍梢以梢尾全者七個洗淨瓦上焙乾草烏頭末一錢小而緊清者去皮揀生用上用熟便鐵銚炭火煅紅放冷揩拭淨先下白礬燒令滾沸次下砒霜拌勻攪合候沸定三兩次了礬干煙盡為度放地上出火毒研為末方入草烏虢丹蠍梢同研收於新瓦罐內埋地內干處二日取出如痔痛旋加乳香沒藥末少許入於前藥內如用先以甘草水或蔥水輕輕洗淨休破了以生芝麻油調或蜜調毛翎掃痔頭或用筆點藥少許於痔上坐臥以痔頭向空處椅子開穴坐草席亦開穴以肛門坐空處待黃水自然滴下十日內干又五七日內其瘡干痂自落連根去了生好肉平復登廁於野處不可登後架坑上恐舊糞觸了忌房事油膩等物一月遠者不出十日可取盡近者化為水連根去生好肉臨安曹五醫痔本刀鑷人因黃院子薦引為宋高宗取用此方愈後官至觀察使一士夫內卿亦苦此十餘年如四五枚櫻桃大血出如箭因過金陵遇醫董謙之用此藥斷絶根經驗方云昔隆慶府安住一內子久患得此方調治遂除其根重謝之後每調官不敢相忘必多治饋董感其意慨然以方授之力勸祕藏安屢制以施人無不效者僕聞而求之不可不傳熏洗方出經驗良方槐花半兩蓮房一個五倍子三個研細荊芥五錢地榆皮半兩上為末每服半兩水一碗瓦器煎入朴硝白礬各三錢先熏後洗之五灰膏出危氏方治臟腑一切蘊毒發為痔瘡不問遠年近日形如雞冠蓮花核桃牛乳或內或外並皆治之蕎麥灰半鬥荊柴老杉枝山白竹薊柴上以四件柴竹截作一尺許長以斧劈破成片每取一束曬乾於火上燒過置壇內為炭防為風所化候燒盡卻以水於鍋內煮出炭汁又用酒漏以布帛實其竅置蕎麥灰於酒漏內以所煮四般炭汁淋之然後取汁於鍋內慢火熬汁約取一小碗候冷入石灰虢丹相和成膏以瓦罐貯之上用石灰敷面不令走氣臨用時卻去石灰冷水調開令病者以水洗淨痔瘡仰臥搭起一足先以濕紙於瘡四圍貼護卻用竹篦挑藥塗痔上須臾痛息用紙揩去藥再塗如此三四遍要痔瘡如墨樣黑方止以水洗淨每日常置冷水一盆以蔥湯和之洗三五遍六七日膿穢出盡其瘡自消治痔方槐花半斤豬臟使五個盛線縛砂鍋煮熱取出槐花焙為末薄荷百藥煎當歸黃連各五兩為末上面糊丸桐子大每服五十丸至百丸空心米湯送下上馬散出楊氏家藏方治五種痔疾初可以消散痛不可行坐者朴硝薄荷荊芥枳殼蓮房各等分上㕮咀每服用一兩水三升煎三五十遍熏洗痔上未效再用即愈治因痔疾阻大便祕結出本事方牽牛四兩瓦炒青皮二兩威靈仙大戟大黃各一兩上為末量人大小每服一二錢用蜜酒調下須用熟水漱口服敷痔方斑蝥十個輕粉半錢馬牙硝三十枚紅椒一錢黃皮半錢上為末先用皂角荊芥洗令淨拭乾用麻油調藥聖五丹出直指方治痔雄黃葉子雌黃朴硝緑礬明白礬各半兩上件各別磕碎以銀鍋一入雄黃二入雌黃三入朴硝四入緑礬五入白礬圓瓦片蓋定炭火煅一日夜看青煙盡有紅煙上方好候冷取出紙襯傾地用盆出火毒一日夜入乳香沒藥各一錢同研極細每抄一匙煎甘草湯調外用雞翎掃藥末蓋之日一次夜一次自然乾硬而脫逐日須用蔥白煎入朴硝溫洗軟帛拭乾然後敷藥治痔豬膽膏豬膽七枚各取汁以建盞藏炭火熬成膏用單紙攤敷須用鮮槐根取白皮煎湯溫洗然後敷藥沒藥散出聖濟總録治五痔消毒沒藥一兩黃礬白礬溺白垽火煅各半兩麝香一錢研上研令勻每用時先以蔥湯洗拭淨以藥干敷花乳石散出聖濟總録治五痔花乳石一兩煅研乳香去石研膽礬研夜明砂地龍去土細末上等分研勻用時先以甘草湯洗痔淨以藥干敷令痔消釋黃柏散塗痔漏黃柏鉛丹黃連膩粉白礬上等分為散先煎蔥湯洗後用藥散一錢匕塗之久患不過三度一方無膩粉唾津調塗五物湯出聖濟總録熏洗諸痔莨菪子二兩白礬一兩通明者半兩生用半兩鐵器內盛慢火煅過硼砂馬牙硝各一分以上四味一處先碾碎朴硝五兩同前四味一處研上用百沸湯一大碗藥末五錢匕浸熏洗痔痛處食後夜臥以衣覆護只留痔瘡處仍避風緑雲湯出聖濟總録治痔疾已用藥淋泄了貼痔卷柏樗根白皮貫衆地骨皮朴硝各一兩上搗篩每用十五錢匕蔥二枝水五升煮至四升去滓乘熱泄之二黃散出聖濟總録塗痔黃柏一兩黃蜀葵花一分生乾地半兩白芨半兩青黛二塊上五味為散先泄了用朴硝水調塗之干即易之以瘥為度療五痔衆醫所不能療神方出肘後方雷丸半斤熬虻蟲半兩石南草半兩藁本二兩豬後懸蹄十四枚燒令焦上搗下以羊髓脂調和先食飲服十五丸日再劇者夜又一服十四日癢止更八日膿血盡鼠乳悉愈滿六十日終不發也忌魚豬肉大神效硫黃散出聖惠方治五痔疼痛久不瘥硫黃一兩蛇黃一兩全星者火燒令赤淬白礬一兩鰻鱺頭一枚鯽魚大者一頭開肚去腸入四味在內以麻皮纏泔泥包之令乾燒煙盡取出上研如粉每服食前粥引下二錢日三龍涎散龍骨密陀僧花蕊石黃柏各一分上為末每用少許干敷上生肌洗法出三因方海桐皮蛇床子各一兩香南藤蔥白切各三兩上水一斗藥五兩煎減半去滓候溫著手輕洗以絹拭一法用槐白皮煎淋泄取佳治痔瘡方當歸蓮花蕊各一兩牽牛頭末四兩紅土少許上用新瓦上焙乾為末每四錢好酒調下利三五行為度如不利來日再依前服比及服藥休吃夜飯來日早空心辰時前後先食熟肉四兩約至巳午時前後服藥大有神效卯時即止治痔方苦參四兩半血竭四錢椿樹皮二兩乾者芫荽子約二合淨上㕮咀水半碗酒半盞煎六分臨發空心服熏藥麻花三錢蜈蚣一條水銀粉一錢半婆娑石二錢青氣礬二錢明礬二錢雌黃二錢雄黃半錢血竭一錢上將青明雌火煅存性研細加血蠍雄黃為末敷之用唾調敷治痔良方功如神白礬黃丹焰硝各等分斑蝥不拘多少上先用黃丹斑蝥同炒焦取斑蝥煎湯了去斑蝥將已炒黃丹及白礬焰硝入在湯中洗而後熏冷時盛貯再暖熏而復洗須臾加丹礬硝三件洗三次過五日其疾自干浴此湯一次用時須加三件烏玉丸治內外翻花痔大黃一兩炮厚朴二錢半枳殼一兩豬牙皂角半兩上為末擂芝麻丸桐子大每服三十丸用米湯下治痔方出本事方信砒一兩燒煙盡穀精草三錢白礬一錢硇砂三錢上為末綿塊點藥撲上如痔干可用水調敷聖惠方痔藥白礬血餘石竹各半兩胡椒二十粒上用瓦罐盛泥固濟猛火煅通紅取出去泥用藥細研為末五更時用不語津調敷痔頭上不過三服效治內痔大腸頭痛仙茅白朮卷柏各一兩郁李仁三錢上為末每服一錢薄荷酒送下治諸痔疾本事方塗杉朴硝大黃側柏各等分上㕮咀瓦罐內煎二十沸於罐上坐堪下手則洗之效又方本事方枳殼甘草荊芥香附子炒去毛上等分為末每服二錢米泔湯調下清涼散一名當歸湯治諸痔熱證大便閉結熏洗方出危氏槐花荊芥枳殼艾葉各等分上㕮咀煎入白礬或明礬泡熏洗佳神驗散出聖濟總録治痔當歸焙一兩白礬二兩桑蛾二兩黃紫色者木耳二兩上為散每服一錢匕粟米粥調下空心服異功散一名犀灰散出敷信適用方治五種痔疾腸風瀉血外痔內痔及脫肛下部四邊胬肉如乳並皆治之黃牛䚡角一枚碎蛇蛻皮一條白者豬牙皂角五根鯪鯉甲半兩上入磁瓶內黃泥封固候乾先以小火燒令煙出後用大火煅令通紅為度取出攤冷為散先用胡桃肉一枚分作四分取一分臨臥時研如粉溫酒送下便睡先引出蟲至五更時用溫酒服藥散二錢匕至辰時更一服雖患年深久不過三服瘥永除根木瓜丸出聖濟總録治痔木瓜一兩切成片曬乾為末三分中留一分下藥檳榔二枚為末白礬一兩甜硝一分上用生面旋起酵作一蒸餅料拍勻裹藥置火上炙其餅香熟乃去餅搗藥二百杵如藥干即以麵糊潤之為丸桐子大每服二十丸空心木瓜湯下其藥仍不可見鐵犯火木香散出聖濟總録貼痔木香檳榔大者黃連各一分莽草半兩上為散每服五錢匕水二碗煎二三沸薰洗後用溫水調勻以紙花子貼之四妙散出聖濟總録治蓮花痔瘻及雞冠痔等貼痔白芨白蘞木鱉桑螵蛸各半兩上為散湯磨乳香調令稀稠得所攤故帛上貼之次日連皮拆下更無瘡瘢效四香湯出聖濟總録治男子婦人久患痔不論有瘡無瘡莎草根一兩黑狗脊半兩甘松黃熟香上好極香者各一分上搗篩每使五錢匕水一碗煎五七沸盛在深盆中便令患者於上面坐圍衣被熏之勿透氣候下得手便淋泄患處直候藥冷即止不得揩拭便蓋覆臥一時許若泄了臨臥將被以火焙稍緩妙槐子酒千金方治五痔十年者槐子二斗槐東南枝細銼一石槐東南根細銼三石上大釜中安十六斛水煮取五斛澄取清更煎取一石六斗炊二斛黍米上曲二十斤釀之攪令調封泥七日酒熟取清飲適性常令小小醉合時更煮滓取汁淘米及洗器不得用水須知此事忌生水故也一方有槐柏皮細銼一石大豆帛方出千金方治穀道癢痛繞緣腫起里許欲生肉突出喚腸散外痔不用草烏生一個白姜一指大白礬一錢飛上為末乳香一錢研勻每用半錢蔥涎調塗於肛門內不久其痔自取落三神丸治僧痔道痔僧覺海少年患痔其行業比冰霜緣乃飽食久坐知痔疾不必酒色過度矣枳殼炒皂角燒存性五倍子等分上為末蜜丸桐子大每服二三十丸溫水食前服洗痔方防風當歸川芎各等分上銼細水煎去滓令熟溫淋洗瘡用軟帛拭乾敷煎藥治翻花痔久不瘥地骨皮乳香各一兩麝香三分炒末上為末每服二錢米飲送下兼米飲敷瘡上泄藥馬蹄香蒼朮荊芥各二兩上銼細以水三升煎數沸先噓後洗熏法出千金方治五痔蝟皮方三指大切熏黃棗大研熟艾雞子大上為末用瓦器以灰實一半如燒香法安長桶內坐其上熏之煙氣從口出為佳凡三度熏永瘥勿犯風冷忌雞魚等物貼藥蜀葵子半兩蟬蛻五個檳榔一個末上棗子三枚取肉細搜和藥如覺硬滴少蜜研成膏量大小貼於病處治痔蓮子散呂子厚患此纍年用之立效蓮子十四個草芽茶十四個乳香隨意入上搗了以紙裹煨透先以黃連湯洗患處然後以藥生貼之三黃丸治痔黃連黃柏槐花炒變色各等分上搗末麵糊為丸每三十丸米飲下酒亦可立效散治風窠爛痔苦參卷柏澤蘭葉各一兩上焙為末每服二錢無灰酒調下治痔神方黃葵陰乾風化朴硝各等分腦子少許上以蜒蚰置器中摻藥末於上令作水以桑葉貼之立愈治痔良方白蓮花蕊白牽牛頭末芫荽子各三錢上入土朱少許為末空心熱酒調敷乳香丸治內外痔枳殼檳榔各四兩皂角子四十個炒熱上為末用水糊丸桐子大每服二十丸酒下米湯亦可食前寬腸丸黃連枳殼百藥煎各等分上為末用水糊丸桐子大每服三十丸用米湯下治諸痔痛大蜈蚣一條大青州棗三個白礬一塊如棗大上蜈蚣白礬為末用棗肉丸分作二丸燒煙用竹筒透引煙燻痔治痔方白礬乳香泥礬少許上為末用好醋二升熬成膏痔上貼理痔方五靈脂四錢膩粉半兩麝香三字上為末先用甘草湯後用唾津調抹痔上痔濕作干糝熏痔方官桂三錢蛇床子五錢蛇蛻一條上為末每服用一錢煎湯熏洗收痔方白蘞白芨各一兩黃皮二兩上末輕粉麝香各少許麻油調敷立效治痔疾腸風半夏湯泡洗七次黃耆枳殼上為末薑汁糊丸如桐子大每服三十丸溫酒空心下椿皮丸臭椿皮刮去粗皮焙乾四兩蒼朮枳殼各一兩上為末醋糊丸桐子大空心食前米飲下三四十丸清心湯諸痛癢瘡瘍皆屬於心心主血熱諸痔受病之原黃連一兩茯神去木赤茯苓各五錢上為末蜜丸桐子大每服一百丸食前米飲下止宜食白米粥疏腸胃能消丸治五痔腫痛下血不止或營衛滯澀身體疼痛大便風閉不通威靈仙十兩木香一兩上為末蜜丸桐子大每服五十丸荊芥湯下不拘時勝金丸治痔疾雌黃半兩研白礬一兩研麝香一錢研上研勻酸醋半盞銀器中慢火煎至一半傾乳鉢內研令勻再傾入器內熬成膏更入麝香少許研更入蒸餅心少許和丸緑豆大每服夜臥溫漿水下十丸仍用一丸手心中漿水調開塗痔上三年者三五服瘥應痛散治痔荊芥穗桑根白皮地榆各一兩上為散每三錢匕水一碗同臭橘二枚拍破煎三五沸傾入就熏瘡下的手方可洗仍服後藥至聖丸臭橘一斤去瓤核銼枳殼半斤黃連去須五兩上麩五升於銀石器內慢火炒令麩黑放地去火毒不用麩將藥為末用皂角一百枚去黃以水一升於器內煮令熟爛如膏與前藥末同件和丸桐子大每服二十丸溫米飲下不拘時日二
