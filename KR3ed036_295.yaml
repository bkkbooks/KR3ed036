body:
  text: 卷二百九十五痔漏門諸痔附論夫內經謂因而飽食筋脈橫解腸癖為痔夫痔病之源亦多矣此獨舉飽食一端者蓋飲食人之大欲存焉推此則其他可觸類而知也五痔者一曰牡痔二曰牝痔三曰脈痔四曰腸痔五曰血痔肛邊發露肉珠狀如鼠乳時時滴漬膿血曰牡痔肛邊生瘡腫痛突出一枚數日膿潰即散曰牝痔腸口大顆發癗且痛且癢出血淋瀝曰脈痔腸內結核有血寒熱往來登溷脫肛曰腸痔若血痔則每遇大便清血隨下而不止若酒痔則每遇飲酒發動瘡腫痛而流血若氣痔則憂恐鬱怒適臨乎前立見腫痛大便艱難強力則肛出而不收矣治法大抵以解熱調血順氣先之蓋熱則血傷血傷則經滯經滯則氣不周行氣與血俱滯乘而墜入大腸此其所以為痔也諸痔出血肛門間別有小竅下如血線不與便物共道痔久不愈必至穿穴瘡口不合漏無已時此則變而為漏矣蓋腸風臟毒之與痔漏同出而異名也歲積月纍淫蝕腸頭濕爛可畏此蟲為之害也其間執劑又當為之殺蟲也又有腸風痔脈痔雌雄痔皆五痔之別名也其狀初生悉在肛邊或如鼠乳或結小核癢痛注悶甚者身熱惡寒諸方論之皆因房酒過度久嗜甘肥不慎醉飽以合陰陽勞擾血脈腸癖滲漏沖注下部肛邊生瘡變為痔疾治法始覺痔作便服通氣丸槐角丸熱實者服諸利湯疏利臟腑及浴洗熏尉以取內消切忌酒面辛熱房室肥膩稍縱嗜欲腐潰膿血或逗流淫汁歲月已深穿穴成漏者即須用寸金鋌子三五次痊愈其次服餌調節謹慎合宜未有不瘥者矣方蝟皮丸治崩中及痔方出千金方蝟皮人參茯苓白芷禹餘糧乾地黃槐耳續斷各三兩蒲黃黃耆當歸艾葉橘皮白蘞甘草各二兩白馬蹄酒浸一次炙令黃牛角䚡各四兩鰻鱺魚頭二十枚豬蹄懸甲二十一枚炙上為末蜜丸梧子大酒服二十丸日再稍加鹿茸丸出聖濟總録治諸痔漏牡痔脈痔腸痔血痔等鹿茸酒浸炙令黃附子炮裂去皮臍龍骨碎研黃耆炙銼桔梗炒生乾地黃牛膝去苗酒浸焙芍藥人參白茯苓去黑皮各一兩一分枳殼去瓤麩炒當歸切焙蝟皮炙焦芎藭槐子微炒白礬煅令汁盡黃連去須各一兩半蒲黃炒一兩桂去皮三分上為末煉蜜丸梧子大每服三十丸空心煎柏葉湯下日晚再服神效散治洗痔凡富貴之人多因嗜欲酒色過度喜怒不常致生痔漏或如鼠乳連珠或糞門腸頭腫流膿漏血其痛如割不可忍者但是諸腫痔漏及腸風下血此藥治之苦參川椒苦葫蘆芫荽子槐花枳殼荊芥金銀花小茴香白芷連翹獨活麻黃牡蠣煅威靈仙椿樹皮各二兩加老黃茄子二個尤妙上㕮咀每服五錢水六七碗蔥白三莖煎五七沸服洗法先以盆盛藥水上銼先蒸後洗卻以烏龍膏貼之臨臥時再以藥滓熬水如前洗之如此三五次夜則以膏藥貼之常服葛花酒蒸香連丸多有驗槐子丸出千金方治燥濕痔痔有雌雄皆主之槐實丸出聖濟總録治五種痔疾方槐實一兩黃耆銼枳實麩炒貫衆白朮肉豆蔻仁防風去叉荊芥穗樗莢去皮炒紫色苦參厚朴麝香芎藭皂角子黃炒各半兩上搗羅為末麵糊調丸如桐子大食前米飲下三十丸晚再服之蝟皮丸直指方治諸痔出血裡急疼痛槐花微炒艾葉炒黃枳殼治地榆當歸川芎黃耆白芍藥白礬煅貫衆各半兩蝟皮一兩炙焦頭髮燒三分各存性豬後啼垂甲十枚盈尺皂角一錠去弦核醋炙黃上件藥搗羅為末煉蜜丸如桐子大每服五十丸食前米飲下療五痔下血不止方槐子五色龍骨槲葉炙令紫色乾薑芎藭當歸茜根吳茱萸各六分白蘞五分附子炮五分黃耆五分大黃二兩豬懸蹄甲十四枚炙發灰四分上搗末蜜丸如桐子大空腹飲下二十丸日二漸加至四十丸若恐多服以意減之忌生冷炙豬魚蒜黃耆丸療痔黃耆青葙子漏蘆鱉甲炙狼牙各五分黃柏四分豬懸蹄甲七枚炙蝟皮四分炙白礬十分燒去汁蚖青去足翅斑蝥去足翅炒地膽去足翅炒蜈蚣各十條炒犀角屑八分上為末蜜丸桐子大空腹米飲服二丸日二增之以知為度忌一切油膩莧菜治五痔衆醫不能愈者秦艽白芷厚朴紫參乳發紫菀各一兩雷丸藁本各二兩石南䗪蟲各半兩貫衆三兩虻蟲半兩豬後懸蹄十四枚上為末以羊髓脂煎和丸桐子大每服空腹米飲下十五丸日二服若劇者夜一服四日後覺肛邊癢則止八日後膿血盡鼠乳悉瘥滿六十日則終身不復發能久服益善忌魚豬肉等物治痔丸直指方諸痔通用阿膠炒酥黃連貫衆各半兩盈尺皂角去核醋炙蝟皮炙焦蜂房炒焦蛇皮略燒皂角刺略燒穿山甲插入熱灰中令焦豬後蹄甲燒以上各存性當歸川芎槐花各用二錢半上為末米醋糊丸桐子大每服七十丸調氣用枳殼散下消血熱荊芥煎湯下食前服立聖丸聖濟總論治五痔及腸風下血槐花枳殼去瓤麩炒二兩半五倍子去灰土黃耆蜜炙切槐莢各二兩豬垂蹄甲二十一枚以上並各炒焦揀令淨木賊二兩半何首烏米泔浸軟以竹刀切作片子焙乾於石臼內搗末稱和入諸藥臭橘一百枚刺蝟皮一枚皂莢針四兩榼藤子三枚炒上四味各用藏瓶一枚盛用鹽泥固濟各留一穴出煙以炭火燒守候逐件煙盡退火各放冷取出研細皂子各三兩上為末蜜丸桐子大每服五十丸至百丸溫酒空心服烏蛇散聖濟總論治諸痔大腸下血烏蛇去皮骨酒浸炙蝟皮酒浸炙各半兩槐子炒天麻黃耆銼桑黃酒炙枳殼炒各一兩桂去粗皮附子炮裂去皮臍當歸焙切赤芍藥炙各三分白礬燒令汁枯半兩麝香研二錢上為散空心陳米飲調下二錢匕日晚再服溫酒亦得蝟皮丸聖惠方治五痔下血疼痛裡急不可忍蝟皮一兩炙令焦黃槐子仁二兩微炒龍骨二兩槲葉一兩微炒乾薑半兩炮裂銼熟地黃幹一兩當歸一兩微炒茜根一兩附子一兩炮裂去皮臍芎藭半兩檳榔一兩黃耆一兩銼吳茱萸半兩湯浸七次焙乾上為末蜜丸如桐子大每食前以粥飲下三十丸至四十丸止治痔腫硬發歇疼痛久不瘥宜服此方聖惠方雷丸一兩紫參半兩當歸一兩白芷半兩槐子仁一兩微炒亂髮一兩燒灰貫衆三兩黃耆一兩銼䗪蟲一分炒微黃石南三分虻蟲一分去翅足炒令微黃藁本一兩豬後懸蹄甲七枚炙令黃焦上為末蜜丸如桐子大每服食前以粥飲下三十丸釣腸丸危氏方治久新諸痔肛邊腫硬或生瘡癢時有膿血又治腸風下血及肛門脫出並宜服之亦治男子婦人下血栝蔞二枚燒存性蝟皮二個碎銼罐內燒存性雞冠花銼微炒五兩白礬微燒緑礬枯白附子生用天南星生用枳殼去瓤麩炒附子去皮臍生用訶子煨去皮各二兩半夏二兩胡桃取仁十五個燒存性不油者入罐內上為末以醋糊丸桐子大每服二十丸空心臨臥溫酒下遠年不瘥者服十日見效久服永除根並治腸風等疾一方用雞內金無胡桃槐子丸出聖惠方治五痔下血不止槐實龍骨去土研槲葉乾薑炮當歸銼炒茜根黃耆銼炒吳茱萸湯洗焙乾炒各一兩半附子炮裂去皮臍一兩一分大黃蒸三度炒二兩半豬懸蹄十四枚炙上為末蜜丸如桐子大每服空心米飲下二十丸日二服治五痔下血不止衆治無效宜服此方出聖惠方石南一兩半槐實一兩半微炒黃耆一兩半貫衆一兩微炒附子一兩炮裂去皮臍蝟皮一枚燒灰黃礬一兩燒灰烏蛇三兩酒浸去皮骨酥塗炙黃白礬一兩燒灰發灰一兩露蜂房一兩炙微黃枳殼一兩麩炒上為末蜜丸桐子大每空腹及晚食煎桑枝湯下三十丸如聖散出聖濟總録治諸痔白蝟皮二枚燒雞冠花炒皂莢針炙各二兩栝蔞一枚燒胡桃十枚燒槐花二兩炒皂莢二兩酥炙黃耆炙枳殼麩炒各二兩白礬緑礬各二兩半水飛上為散每服二錢匕酒和下或作丸服如聖丸出聖濟方治五種痔疾枳殼去瓤麩炒威靈仙去土陳橘皮去白各一兩續斷炒白礬飛過當歸炒乾薑炮附子炮去臍皮生地焙用熟乾地黃連翹炒槐莢子各半兩炒香為度取莢內子上為末蜜丸桐子大每服十丸陳粟米飲下空心食前日二服如年深者加丸數疼痛甚者當日見效黑神散出王氏博濟方治腸風痔疾羌活去蘆頭黃耆黃荊實蔓荊實狗脊火燎去毛枳殼去瓤麩炒檳榔栝蔞以盛盡藥為度不拘枚數去子留瓤上除栝蔞外等分為末入栝蔞中盛於沙盒或瓦罐子內鹽泥固濟煅通赤候冷取出藥末更別用藥如後荊芥子白蕪荑二味與前等分木香比前減半上為散每服一錢匕空心茶酒調下日三蝟皮散出聖濟總録治五痔蝟皮炙鱉甲醋炙當歸銼焙一兩半黃耆銼焙槐實炒大黃蒸三度炒各二兩露蜂房炙蛇皮炙藁本去苗土桂去粗皮各一兩一分豬後懸蹄十四枚炙上件藥搗羅為散每於空腹煮白粥飲調下三錢匕服日二治五痔及脫肛出千金方槐白皮二兩豬脂半斤漆子桃仁各十枚巴豆七枚薰草一名薰陸辛夷甘草白芷各半兩野葛六銖上㕮咀煎三上三下去滓以綿沾膏塞孔中日四五次蟲死瘥止癢痛大佳一方無野葛黃耆丸出濟生方治五痔出血疼痛榼藤煨用肉半兩川續斷酒浸黃耆去蘆貫衆附子炮去皮臍黃礬別研蝟皮燒灰當歸去蘆酒浸阿膠蛤粉炒各一兩麝香別研一字上為末米糊丸桐子大每服七十丸空心米飲送下氣壯多熱之人免服皂刺丸出直指方治痔痛而復癢皂莢刺二兩燒煙盡存性防風槐花蛇床白礬白蒺藜炒去刺枳殼蜣螂各半兩蜂房五倍子各一分上為末醋調草粉糊丸小豆大每服五十丸以苦楝根煎湯下仍用童子尿熱入白礬末沉洗肛門誥後丸出聖濟總録治痔連翹附子泡去皮臍桂去粗皮槐莢白礬枯飛杜仲去皮炒枳殼去瓤麩炒黃耆銼當歸切焙藁本去土上件藥等分為末蜜丸桐子大每服十丸米飲下空心日二藜蘆湯出聖濟總論洗痔藜蘆附子莽草蛇床羌活獨活當歸苦參芍藥各一兩蜀椒去目半兩上搗篩每服兩撮生絹袋盛桑松柏枝各一握生薑一塊拍破銀石器中以水三碗煎熟去滓傾入器中乘熱熏候溫洗之黃耆丸出聖惠方治五痔下血不止疼痛壅塞不通黃耆一兩蝟皮一兩炙令焦黃當歸一兩微炒桂心二分槐子仁二兩白礬枯一兩麝香一分細研入枳殼二兩炒黃附子一兩炒去皮臍白花蛇一兩酒浸炙微黃上為末蜜丸桐子大每服食前煎柏葉湯下三十丸拔毒散敷掃痔腫毒處大黃黃柏白芨石膏黃芩各五錢白蘞黃連梔子各三錢朴硝五錢上末用井花水調塗宣毒散丸苦參荊芥當歸川芎玄參白芷各半兩牽牛兩半烏蛇一條青黛半兩上先將牽牛巴豆肥白者去殼十粒慢火燒令色黑去巴豆不用則用牽牛同前九味為末將煨熟大蒜擂細看稀稠得所丸時糊丸桐子大每服空心以鹽酒送下一十丸如神丸一名烏蛇丸出聖濟總録治腸風五痔烏蛇酒浸去皮骨炙大黃濕紙裹煨防風去蘆各二兩黃耆銼秦艽去苗枳殼去瓤炒蝟皮炙黑焦陳皮浸去白焙土蒺藜炒去角各一兩半上為末蜜丸桐子大每日空心酒下三十丸夜臥更服當日血止痛定丁香爛飯丸治痔丁香木香廣朮三稜丁皮各二分上為末水浸蒸餅丸如桐子大每服三十丸食後白湯下乳香丸出和劑方治諸痔下血肛邊生肉或結核腫痛或生瘡癢痛或大便難肛腸脫出又治腸風下血無問新久及諸漏根在臟腑悉能治之枳殼麩炒牡蠣火煅蓽澄茄芫青去頭翅足炒黃色大黃蒸焙鶴蝨炒各半兩白丁香乳香研各一兩上為末粟米糊丸梧桐子大每服十丸至十五丸如治腸風茶清下諸痔煎薤白湯下諸漏煎鐵屑湯下並煎服一方無白丁香枳殼黃耆丸出經驗良方治痔枳殼黃連各五兩白雞冠花黃耆各一兩荊芥二兩半上為末糊丸每服三十丸荊芥湯下洗痔訶子散訶子甘草大黃荊芥白芷山賴子藿香防風各等分上藥煎湯洗治男子婦