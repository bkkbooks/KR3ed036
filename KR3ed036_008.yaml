日有奇主位少羽水客氣厥陰木中見火運火木同德而行順化地氣正風乃至萬物反生霿霧以行其病關閉不禁心疼陽氣不藏而咳宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻是歲天符為執法火氣自平若有邪氣則中執法民有急卒之病經所謂中執法者其病速而危也己卯歲圖陽明燥金司天少陰君火在泉中見少宮土運歲土不及氣化運行後天天地之氣上見陽明左間太陽右間少陽故天氣急而其政切下見少陰左間太陰右間厥陰故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤其為氣也清熱之氣持於氣交風化清化勝復同是謂邪氣化度也清化九雨化五熱化七是謂正化度也金火合德其在天也上應太白熒惑其在物也歲谷白丹間谷命太徵者歲物所宜則介蟲靜羽蟲育地氣所制則介蟲耗寒毒不生其耗白甲品羽蟄蟲乃見流水不冰民病咳嗌塞寒熱發暴振慄癃閉清先而勁毛蟲乃死熱後而暴介蟲乃殃然金為天氣火為地氣火能勝金土運間之其邪乃微天氣微虛宜資其化源以助金氣兼安其運土無使受邪食白丹之谷以安其氣食間氣之谷以去其邪歲宜以咸瀉之以苦泄之以辛汗之清之散之運同清氣宜多地化治之常也歲半之前天氣陽明主之燥淫所勝則木乃脫草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木蘞生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛目眛眥瘍瘡痤癰病本於肝診在足太衝之脈法宜平以苦溫佐以酸辛以苦下之歲半之後地氣少陰主之熱淫於內則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大法宜治以鹹寒佐以甘苦以酸收之以苦發之歲運之化土不及紀曰卑監是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而秕也其氣散其用靜定其動瘍痛分潰癰腫其發濡滯其化兼所不勝四維有埃云潤澤之化則春有鳴條鼓折之政若四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其藏脾其病內舍心腹外在肌肉四肢復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息氣客於脾食少失味治宜以甘和調中初之氣自戊寅年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣太陰土中見土運氣與運同風不勝濕地氣遷陰始凝肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕邪不能為害是氣也司氣以涼用涼無犯二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣少陽火中見土運二火同治陽乃布民乃舒物乃生榮厲大至民善暴死宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆雖有火邪不能為害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣陽明金中見土運火生土土生金下生上天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣太陽水中見土運土運得位太陽居之寒雨降病暴僕振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿便血宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒邪不能為害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣厥陰木中見土運客氣勝運春令反行草乃生榮民氣和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風化不能為邪終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陰火中見土運氣能生運陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱邪不能為害此六氣之常也歲氣之交天氣勝則有少陽之復地氣勝則有太陽之復其治各依其勝復法庚辰歲圖太陽寒水司天太陰濕土在泉中見太商金運歲金太過氣化運行先天天地之氣上見太陽左間厥陰右間陽明故天政所布其氣肅下見太陰左間少陽右間少陰故地氣靜而其令徐寒臨太虛寒政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散遠於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下水土合德上應辰星鎮星其谷玄黅歲氣之化寒化一清化九雨化五正化度也鱗蟲靜倮蟲育歲物所宜也鱗蟲不成燥毒不生地氣制之也寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歲水為天氣土為地氣中見金運土能勝水天化為虛金運統之土生金金生水以下生上天化雖虛氣運相生其邪乃微宜先資化源以助天氣之虛抑其金運扶其木氣無使暴過而生其疾食玄黅之谷以全其真避虛邪之氣以安其正歲宜以苦熱調上以甘熱調下以辛溫調中運同寒濕以燥熱化治之常也歲半之前天氣太陽主之若寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣腋腫心澹澹大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炱渴而欲飲病本於心診在手神門脈法宜平以辛熱佐以甘苦以咸瀉之歲半之後地氣太陰主之若濕淫於內則埃昏岩谷黃反見黑至陰之交民病飲積心痛頭痛喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別法宜治以苦熱佐以酸淡以苦燥之以淡泄之歲運之化金太過者紀曰堅成是謂收引天氣潔地氣明陽氣隨陰氣化燥行其政物以司成收氣繁布化洽不中其化成其氣削其政肅其令銳切其德霧露蕭颯其動暴折瘍疰其變肅殺凋零其病喘暍胸憑仰息其化兼其所勝故曰歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹甚而喘咳逆氣肩背痛下連股膝髀腨胻足皆病收氣峻則病暴痛胠脅不可反側咳逆甚而血溢診在足太衝脈其治悉以辛溫調中初之氣自己卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位少角木客氣少陽火中見金運客氣勝運地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆雖有火邪不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位太徵火客氣陽明金中見金運氣與運同大涼至民乃慘草乃遇寒火氣遂抑病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍雖有燥邪不能為害是氣也無犯司氣之涼三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位太徵火客氣太陽水中見金運水勝火天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷雖有寒邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位少宮土客氣厥陰木中見金運木勝土金反制之又遇太陰交司風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻雖有風邪不能為害五之氣自秋分日申初至小雪日午初凡六十日有奇主位太商金客氣少陰火中見金運歲運得位客火勝之陽復化草乃長乃化乃成民乃舒宜調少陰之客之咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆雖有熱化不能為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位少羽水客氣太陰土中見金運土生金金生水其化順地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻雖有濕邪不能為害此六氣之化也是歲天氣勝者太陰復之地氣勝者厥陰復之其治皆如治復之法辛巳歲圖厥陰風木司天少陽相火在泉中見少羽水運歲水不及氣化運行後天天地之氣上見厥陰左間少陰右間太陽故天氣擾而其政撓下見少陽左間陽明右間太陰故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太商者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復行於中雨化風化勝復同邪氣化度也風化三寒化一火化七正化度也風化為司天苦化在泉玄化為司運柔化清化為間氣灼化為居氣其在物也毛蟲靜羽蟲育是為歲物所宜介蟲耗寒毒不生是為地氣所制然歲氣天化虛地化盈宜資化源以助天氣之木化源雖虛水運在中水能生木邪乃微也必贊其運水無使邪勝以辛涼調上以鹹寒調下畏火之氣無妄犯之歲半之前厥陰主之若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈其法平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後少陽主之若火淫於內則焰明郊野寒熱更至民病注泄赤白少腹疼溺赤甚則血便其法治以鹹冷佐以苦辛以酸收之以苦發之歲運之化水不及紀曰涸流是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其生埃郁昏翳其病痿厥堅下其化兼所不勝四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其藏腎其病內舍腰脊骨髓外在谿谷腨膝皆以苦和調中初之氣自庚辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣陽明金中見水運金勝木水運間之寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣太陽水中見水運氣與運同寒不去華雪水冰殺氣施行霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷是氣也無犯司氣之寒三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣厥陰木中見水運歲運之水制火而生木故天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宮土客氣少陰火中見水運溽暑濕熱相持於左之上民病黃癉而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太商金客氣太陰土中見水運客土刑運燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣少陽火中見水運歲運得位而畏火司令陽乃大化蟄蟲來見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆此六氣之化也歲氣之交天氣勝者則有陽明之復地氣勝者則有太陽之復觀其勝復各依其法治之壬午歲圖少陰君火司天陽明燥金在泉中見太角木運歲木太過氣化運行先天熱化為天氣柔化為左間蒼化為右間故天政所布其氣明辛化為地氣藏化為左間明化為右間故地氣肅而其令切寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上其為化也熱化二風化八清化四是為正化度也其在物也羽蟲靜介蟲育是乃歲物所宜毛蟲耗濕毒不生是乃地氣所制歲氣之交火在天金在地火勝金天氣盈地氣虛木運助火天氣大盈其盈為勝宜於年前先取化源以平火氣必抑其運木資其歲勝無使暴過而生其病食丹白之谷以全真氣食間氣之谷以闢虛邪歲宜咸以耎之而調其上甚則以苦發之酸以收之而安其下甚則以苦泄之運同天氣以寒清化故曰其化上鹹寒中酸涼下酸溫藥食宜也歲半之前少陰主之熱淫所勝則怫熱至火行其令民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嘔嚏溺色變甚則瘡瘍胕腫肩背臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診在手尺澤脈法宜平以鹹寒佐以苦甘以酸收之歲半之後陽明主之燥淫於內則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱法宜治以苦溫佐以甘辛以苦下之歲運之化木太過紀曰發生是謂啟陳土疏泄蒼氣達陽和布化陰氣乃遷生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩癲疾其德鳴靡啟坼其變振拉摧拔其病怒其化兼其所勝故歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹肢滿甚則忽忽善怒眩冒巔疾化氣不正生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚診在足衝陽之脈其治宜以酸涼初之氣自辛巳年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣太陽水中見木運歲運當位寒水居之地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽乃郁民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣厥陰木中見木運氣與運同陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風化不能為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陰火中見木運火居火位木化資之天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱邪不能為害四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣太陰土中見木運土居其位溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉鼽衄飲發宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕化不能為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陽火中見木運木生火畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆雖有火邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣陽明金中見木運金勝木燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹甚則寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥邪不能為害此六氣之化也歲氣之交熱氣勝者必有太陽之復燥氣勝者必有少陽之復其治皆如治復之法癸未歲圖太陰濕土司天太陽寒水在泉中見少徵火運歲火不及氣化運行後天濕化為天氣丹化為司氣灼化為居氣故地氣上騰陰專其政而其政肅咸化為地氣動化為左間清化為右間故天氣下降陽氣退避而其令寂大風時起原野昏霧白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太角者寒化雨化勝復同邪氣化度也雨化五火化二寒化六正化度也陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行倮蟲靜鱗蟲育是為歲物所宜羽蟲不成熱毒不生是為地氣所制故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急是歲濕土在上寒水在下土能制水天氣盈地氣虛宜取化源以平土氣益其歲氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮坼而水血交流必贊其陽火令御甚寒運異寒濕其化宜少用燥熱故曰其化上苦溫中鹹溫下甘熱藥食宜也歲半之前太陰主之濕淫所勝則沉陰且布雨變枯槁民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足大溪之脈法當平以苦熱其濕上甚則熱治以苦溫佐以甘辛以汗為散而止歲半之後太陽主之寒淫於內則凝肅慘慄民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫法宜治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之歲運之化火不及紀曰伏明是謂勝長長氣不宣藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其病昏惑悲忘其化兼所不勝夏有炳明光顯之化則冬有嚴肅霜寒之政若有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其藏心其病內舍膺脅外在經絡故曰歲火不及寒乃盛行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美民病胸中痛脅肢滿兩脅痛膺背肩胛間及兩臂內痛甚則屈不能伸髖脾如別復則大雨且至民病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身其法悉以鹹溫調中初之氣自壬午年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣厥陰木中見火運風木得位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻雖有風化不能為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣少陰火中見火運君火自居其位不司氣化是謂灼化大火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆雖有熱化不能為邪三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣太陰土中見火運歲火當位濕化郁之天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻雖有濕邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宮土客氣少陽火中見火運氣與運同畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆雖有火邪不能為害是氣也無犯司氣之熱五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少商金客氣陽明金中見火運氣與運同慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病膚腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍雖有燥化不能為邪終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位太羽水客氣太陽水中見火運水當其位而能勝火寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒熱持於氣交而為疾也宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷雖有寒化不能為邪此六節之氣也氣交之化天氣勝者則有厥陰之復地氣勝者則有太陰之復各依其勝復法治之
