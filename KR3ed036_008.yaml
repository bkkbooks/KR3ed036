body:
  text: 卷八運氣圖甲戌歲圖太陽寒水司天太陰濕土在泉中見太宮土運歲土太過氣化運行先天太宮下加太陰太過而加同天符又土運臨戌是謂歲會氣之平也平土之歲命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其谷稷其果棗其實肉其蟲倮其畜牛其物膚其色黃其味甘其音宮其數五其在人也其藏脾其主口其養肉其病痞此歲運所主也天地之氣上見太陽左間厥陰右間陽明故天政所布其氣肅下見太陰左間少陽右間少陰故地氣靜而其令徐水土合德則上應辰星鎮星其谷玄黅寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉痿足痿不收濡瀉血溢歲半之前天氣太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後地氣太陰主之太陰之化從本雨濕甚者地氣之應也寒化六溫化五是為正化之日倮蟲育鱗蟲靜是為歲物所宜也鱗蟲不成燥毒不生其味鹹其氣熱是為地氣所制也平土之歲本不資化源以運與地氣臨於戌歲土氣極盛先資化源以助於水所謂抑其運氣扶其不勝無使暴過而生其疾也食玄黅之谷以全其真避歲之虛邪以安其正以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒濕化宜燥熱治之常也初之氣自癸酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見土運少陽中治以行春令地氣遷氣乃溫草乃早榮民乃厲溫病乃作身熱頭疼嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陰火中見土運火能生土土能生金氣位相和陽復化陰乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣太陰土中見土運氣與運符會地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪是氣也不可犯涼司氣以涼故也歲氣雖平或有邪氣則中執法經曰中執法者其病速而危也乙亥歲圖厥陰風木司天少陽相火在泉中見少商金運歲金不及氣化運行後天上角與正角同諸同正歲氣化運行同天厥陰在上左間少陰右間太陽故天氣擾而其政撓少陽在下左間陽明右間太陰故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太宮太羽者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復形於中熱化寒化勝復同所謂邪氣化日也風化八清化四火化二所謂正化度也毛蟲靜羽蟲育是乃歲物所宜介蟲耗毛蟲不育寒毒不生是乃地氣所制然木為天氣火為地氣金運在中地氣勝運運化勝天其化不絕天氣虛地氣盈宜資化源以助木氣兼贊歲運無使邪勝歲半之前天氣厥陰主之厥陰以中氣為化當是時風從火化者天氣之和也若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而疼上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈法宜平以辛涼佐以苦辛以甘緩之以酸瀉之歲半之後地氣少陽主之少陽之化從本若火淫於內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則便血法宜治以鹹冷佐以苦辛以酸收之以苦泄之歲運之化金不及紀曰從革是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用燥切其化兼所不勝夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有冰雹霜雪之復其眚西其病內舍膺脅肩背外在皮毛復則寒雨暴至陰厥且格陽反上行頭腦戶痛延及顛頂發熱甚則心痛治宜以酸和調中初之氣自甲戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣陽明金中見金運氣與運同居於木位與厥陰交司而行春令金木氣齊寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍是氣也司氣以涼用涼無犯二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣太陽水中見金運金水相得寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣厥陰木中見金運火勝金金勝木其化不絕天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宮土客氣少陰火中見金運又值在泉少陽交司之時溽暑至濕熱相搏爭於左之上民病黃癉而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少商金客氣太陰土中見金運歲運之金得位與土相和其化燥濕更勝沉陰乃布寒氣及體風雨乃行宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位太羽水客氣少陽火中見金運畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆六氣之常也歲氣之化天氣勝者陽明覆之地氣勝者太陰復之其治各依其勝復法丙子歲圖少陰君火司天陽明燥金在泉中見太羽水運歲水太過氣化運行先天水運臨子是謂歲會氣之平也平水之氣命曰靜順之紀藏而無害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其谷豆其果慄其實濡其蟲鱗其畜彘其色黑其味鹹其物濡其音羽其數六其在人也其藏腎其主二陰其養骨髓其病厥此歲運之化也天地之氣上見少陰左間太陰右間厥陰故天政所布其氣明下見陽明左間太陽右間少陽故地氣肅而其令切交司之氣以寒交暑天地之氣以熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽衄嚏欠目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上蓋火為天氣金為地氣水運在中熱化二寒化六清化四正化度也羽蟲靜介蟲育歲物之宜也毛蟲耗羽蟲不生地氣制之也燥熱相加天氣盈地氣虛歲有平水不取化源唯抑運氣資其歲勝無使暴過而生病也食丹白之谷以全真氣食間氣之谷以闢虛邪味宜以鹹寒調上以酸溫安下運同地氣宜以溫熱化歲半之前天氣少陰主之少陰有本標之化其應寒熱得中歲半之後地氣陽明主之陽明以中氣為化其應溫燥相半當其時而至者為平和非其時而至者為淫勝初之氣自乙亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣太陽水中見水運氣與運同水居木位水木相和奉少陰之政而行春令地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷則寒不為邪是氣也用寒遠寒無犯司氣之寒二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣厥陰木中見水運水木相得陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之歲穀食丹間穀食稻則風不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陰火中見水運火居火位歲水間之天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲穀食丹間穀食豆則熱不為邪四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣太陰土中見水運土居其位溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉鼽衄飲發宜治太陰之客以甘補之以苦瀉之以甘緩之歲穀食白間穀食麻則濕不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陽火中見水運畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫歲水制之其病乃微宜治少陽之客以咸補之以甘瀉之以咸耎之歲穀食白間穀食豆則火不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣陽明金中見水運水當其位以金相和燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之歲穀食白間穀食黍則燥不為邪是歲也水氣之平由於歲會為行令邪或中之民有持久之病經所謂中行令者其病徐而持也丁丑歲圖太陰濕土司天太陽寒水在泉中見少角木運歲木不及氣化運行後天委和之紀曰上宮與正宮同諸同正歲氣化運行同天此言天氣平也天地之氣上見太陰左間少陽右間少陰故地氣上騰而其政肅下見太陽左間厥陰右間陽明故天氣下降而其令寂陰專其政陽氣退闢大風時起原野昏霧白埃四起云奔南極寒雨數至物成於差夏濕寒合德上應鎮星辰星其谷黅玄故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行民病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急清化熱化勝復同邪氣化度也雨化五風化三寒化一正化度也歲物所宜則倮蟲靜鱗蟲育地氣所制則羽蟲耗熱毒不生故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之也間谷命太徵太商者然土為天氣水為地氣土勝水天氣盈地氣虛宜取化源以平天氣益其歲氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精以苦燥之溫之甚則發之泄之不發不泄則濕氣外溢肉潰皮柝而水血交流必贊其陽火令御其寒從氣之異少其判也歲半之前天氣太陰主之太陰所至其令濕若濕淫所勝則沉陰且布雨變枯槁民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太谿之脈法宜平以苦溫佐以甘辛以汗為散而止