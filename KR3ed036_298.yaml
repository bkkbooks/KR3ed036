原方雞冠花椿根皮各等分上為末煉蜜丸梧桐子大每服三十丸白礬丸治氣痔下血必效丸治氣痔脫肛不收或生乳時時血出久不瘥者糝藥方治氣痔脫肛良久乃收海螵蛸研染胭脂研各半兩上為末同研勻先以湯洗略拭乾糝藥少許治氣痔下血肛邊疼痛出聖惠方硫黃一兩細研木香一兩末上為細末令勻每服食前以粥飲調下一錢又方出聖惠方地榆一兩銼檳榔一兩上為細末每於食前以粥飲調下一錢又方出聖惠方槐木耳二兩微炒乾薑一兩炮製銼上㕮咀每服三錢以漿水一鍾煎至六分去滓每於食前溫服又方出聖惠方槐殼樹一兩銼微炒槐花一兩微炒上為細末每於食前以粥飲調下一錢治氣痔以鯪鯉甲燒一兩存性肉豆蔻仁三個同為末米飲調下二錢服膿血甚者加蝟皮一兩燒入中病即已不必盡劑久痔附論夫久痔者由臟腑久積風熱毒流注於大腸乃成斯疾也復遇下元冷憊腎臟勞傷氣血不調三焦壅塞熱毒流滯而搏於血入於大腸故令下血肛邊腫癢或生瘡瘻連滯經久瘥而復發故名久痔也槐子丸出聖惠方療五痔數年不瘥燥濕痔有雌雄為病苦者有乾燥腫疼者有崩血無數者有鼠乳附核者有腸中返癢者三五年皆殺人忌飲酒及作勞色犯之即發槐子乾漆熬杉木根皮各四兩似茱萸秦艽黃芩白蘞青木香牡蠣煅龍骨附子炮八角者雷丸蒺藜子白芷桂心雞舌香各二兩黃耆二兩上為末蜜為丸一服二十丸日三服忌豬肉冷水雞魚蒜生蔥千金翼有丁香茱萸根皮聖惠方有楝樹根白皮無杉根木皮黃耆煉蜜為丸梧桐子大食前粥飲下雷礬丸治五痔瘻血日久眾藥不瘥者雷礬二兩紫芝白芷紫菀各二兩貫眾五兩秦艽去苗土厚朴去粗皮生薑汁炙各一兩藁本去苗土二兩亂髮灰三兩䗪蟲炒石南炒各半兩豬懸蹄炙焦十兩上為末煉羊脂丸梧桐子大每服二十丸空心煎米飲下日晚再服黃耆膏出聖惠方黃耆一兩半銼漏蘆一兩半黃柏一兩半銼槐子仁半兩木通一兩半銼苦參一兩半銼貍骨一兩半銼雄黃三分細研虎骨三分搗為末硫黃一兩細研麝香一錢研細蜣螂末半兩上件藥以臘月豬脂三斤煉諸藥二十餘沸以布絞去滓更入鐺煉一兩沸及以綿綾過以瓷盒盛之下雄黃等攪令勻故帛上貼之日兩三度換蟲出即愈矣烏蛇膏出聖惠方治痔疾年月深遠旁生孔竅有頭膿血出瘡癢難忍烏蛇一兩燒灰馬齒一兩燒灰蝟皮一兩燒灰乳發三分燒灰黃礬三分研細斑蝥三分去翹足糯米拌炒黃色杏仁四十枚去皮搗如膏麝香一分研細豬脂一斤臘月的豬牙皂莢一分炙搗末水銀三分和明粉點水研令星盡上都研極細先煎豬脂候溶濾去滓入諸藥煎二三十沸欲成之入麝香攪令勻更煎三兩復入蠟三兩候冷放置瓷盒內每以少許貼於痔上一日三二度用之安息香丸治久患腸風痔瘻諸疾安息香一分阿魏半分乳香一錢三味一處研丹砂一分雄黃龍腦麝香各二錢密陀僧煅二錢砒霜一分研細更入綠豆末二錢同研巴豆三粒去皮心膜水一大碗浸一日六度換出細研出油上先將安息香等三味一處入瓷器內用重湯煮或於飯甑上蒸一次再入淨缽內爛研成膏入諸藥一處搜和丸如綠豆大每服一丸空心服腸風瀉血五痔漏膿血不止或生鼠乳並以好茶下卒心痛生薑湯食積陳麵湯心腹諸氣溫酒婦人心痛血氣當歸酒飲瀉水冷諸利飯飲瘧疾桃心湯下治痔瘡久不瘥者洗藥桃條柳條槐條桑條艾葉荊芥茄根蒼耳根萱草根各等分上每用三兩㕮咀水五碗煎三十沸去滓洗次用貼藥五倍子五個灰火炮香白芷二錢輕粉二錢黃丹二錢麝香少許上為細末勻瘡干蔥白汁調搽濕則干貼之白蘞散一名赤小豆散治十年痔如鼠乳膿出下血劇者方見赤小豆散龍骨皮丸一名螺皮丸治五痔連年不止兼痔瘻方見螺皮丸硃砂丸出聖惠方治久痔有頭疼痛化為瘡口膿水不絕硃砂三分細研砒霜半兩巴豆一粒去皮心研紙煨壓去油麝香一分細研阿魏一分麵裹煨面熟為度安息香一分乳香一分細研上為細末以湯浸蒸餅和丸綠豆大每日空心以枳殼湯下一丸不過十日瘥小槐子丸治大腸積冷久痔不瘥槐子仁二兩微炒龍骨一兩白礬一兩燒令汁盡硫黃一兩細研枳殼二兩麩炒微黃乾漆一兩搗碎炒令赤桑木耳一兩微炒上為細末煉蜜丸搗三二百杵丸梧桐子大每於食前以粥飲下二十丸治痔疾有頭數年不瘥出聖惠方鰻鱺魚頭一兩炙黃木香一兩麝香一兩細研砒霜一分細研粉腳一兩細研白礬一兩燒令汁盡豬牙皂莢三分炙黃焦上為細末陳臘為丸蓮子大用綿裹一丸內下部中覺腹內欲轉暫且忍之待忍不及即上盆子當下惡物每日用之以痔頭消為度熨方出聖惠方治痔疾有頭多年不瘥頻發疼痛坐立不得雄黃一分醋石榴皮一分皂莢一分杏仁一分湯浸去皮尖藜蘆一分去頭柳蛀屑三分葵草一分上為粗散以油拌炒令熟綿裹熨痔上五七度瘥槐子丸一名小槐實丸治五痔十年不瘥大黃湯治數十年五痔下血如雞肝肛邊結核鼠乳肛中疼痛大黃銼炒五兩滑石三兩半芒硝研桑根白皮銼黃芩去黑心杏仁湯浸去皮尖雙仁炒各一兩上搗篩每服一錢匕以酒一盞水水一盞棗三枚擘破同煎一盞去滓空心溫服微利一兩行為度未利再服蝟皮散治丈夫婦人五痔年久不瘥蝟皮一個燒灰研雄鱉頭三個燒灰研醋石榴皮地榆枳殼槐花各一兩上除二味燒灰外各細銼一處炒令黑色為末與灰研勻每服二錢匕溫酒調下食前服貫眾散治腸風痔瘻久不瘥貫眾三兩雞冠花五兩甘草炙一兩烏梅去核炒黃連炒各二兩麝香當門子二個細研上為細末每服二錢匕米飲調下更分一半藥末以麵糊丸如綠豆大每服二十丸米飲下相間食前服之白礬丸治久痔腸胃風冷及瘻膿血不止等榼藤子散治腸風五痔久不瘥榼藤子燒存性茺蔚子炒各半兩地榆臭椿根蜜炙焦色白礬燒令汁盡各一兩上為細末每服二錢匕溫酒一小盞入麝香一字同調下空心食前服芍藥丸治腸風痔瘻久不瘥芍藥地龍去土炒大黃銼炒威靈仙各一兩木鱉子上為細末三分中減一分米醋一盞熬成膏和丸二分如桐子大每服五丸茶清下空心食前服萬金散治久患痔疾椿根銼一兩楝實去核麵炒胡粉炒各半兩藁本去苗土一分臭橘皮去瓤切炒二兩上為細末每服一錢匕熱酒調下半夜時服天明再服後用續隨子不計多少搗為末煎湯淋洗三五次黃連丸治痔疾積年不瘥或腸風瀉血黃連去須蕪荑仁榼藤子白礬各一兩皂莢炙去皮子一兩半上為細末以粟米糊研丸梧桐子大空心米飲下二十丸日晚再服以瘥為度天雄膏冷痔瘡久不瘥者追風毒去疼痛天雄去皮臍一枚天南星一枚天麻半兩丹砂四分黃蠟半兩上並生為末丸先用生油少許熔黃蠟次入諸藥熬成膏每使時用舊綿攤藥貼瘡甚驗獨聖散治年深痔疾不止用黃土如石者半兩燒令紫色細研末以膩粉一錢藥末二錢半拌勻臨臥時酒調下蟲出是見效矣比金散治久痔用蜀葵花葉夏月收者焙乾為散每服二錢匕溫酒調五服效熏痔立效方治痔瘻久不瘥者蛇蛻四兩細剪令碎蟬蛻四兩細剪令碎白礬二兩生研皂莢二挺為末上拌勻分為六貼每月一貼瓷碗內如燒香法盛入桶內燒令煙就上熏之煙盡即止熏痔必效散治痔漏久不瘥者鯪鯉甲二兩細銼黃牛角䚡四寸細銼鉛丹一兩研乳香一分研上為末拌勻每用三五匕如燒香法坐盆器內用版蓋上開竅坐就瘡熏之煙盡即止蜂窠膏治痔瘻累經熏洗未效者蜂窠燒灰秤半兩研蚰蜓一個大者研作膏水銀粉秤一兩研鉛丹秤一錢研上將三味研為末和勻膏內更入麝香半錢匕同研令勻每用少許敷瘡槐枝酒方出聖惠方治痔疾數年不瘥槐枝葉二斗細研槐子仁二升搗碎蒼耳莖葉細銼一斗上件藥入於釜中以水一石煮取五斗去滓澄青看冷暖入曲末五斤糯米五斗蒸令熟都拌和入甕如法蓋覆候酒熟任性溫飲之常令似醉久服神效白礬丸出聖惠方治痔疾多年不瘥下部腫硬疼痛宜服白礬二兩燒令汁盡附子一兩炮裂去皮桑黃一兩銼微炒上為細末以軟飯和丸如梧桐子大每於食前以粥飲下十丸不換金散治腸風痔瘻瀉血久不瘥槐實及時採炒臭椿根皮銼曝乾荊芥穗各一兩上為細末每服一錢匕用粟米飲調下年深者服二錢匕日三服槐白丸治腸風痔瘻久不瘥槐白皮四兩用煮棗肉四兩火上旋塗慢火炙乾絕為度槐花炒白礬燒令汁盡各二兩上為末煉蜜丸梧桐子大每服五十丸米飲湯下空心日三服白礬丸治五痔連年不瘥及瘻下膿血不止白礬燒灰赤石脂各一兩附子炮裂去皮臍一兩半上為末煉蜜丸梧桐子大每服二十丸空心煎乾薑湯下臨晚食前再服黑紙捻方出楊氏家藏方治痔瘻久不瘥除瘡口內黑肉密陀僧煅黃連去須瀝青等分上為末用紙作捻以津唾蘸藥末捻入竅內覺微癢即住不可盡捻也熏痔方治久痔不瘥臭椿皮炮干二兩枳殼去皮三兩蛇蛻半兩上搗篩用一小罐盛以厚紙一張蓋口系定上剪一小眼子文武火煨熱氣從眼子內出便騎罐熏之如熏得熱痛以燈盞內油塗之如此熏三五度立效烏金散治久患痔瘡疼痛不可忍者烏驢乳屋上塵煤是也細研陳臘茶末各一兩膩粉一字上細末敷痔上乾者以油調塗之一兩次即消治痔疾多年不瘥下部腫硬疼痛宜服細墨二兩乾薑二兩炮製銼上為末以軟飯和丸梧桐子大每於食前黃耆枳殼湯下二十丸以瘥為度神驗熏藥方出聖惠方治痔瘻積年不可忍者鰻鯉魚半斤五月五日採曝乾搗為末蜣螂三枚為末上件藥取成熟艾和藥末以青布卷之安瓷瓶中著火燒坐向瓶上熏之其蟲及惡汁並出不復再發金針散出御藥院方治久痔及腸下血疼痛諸藥不瘥者皂莢刺赤紅者炙破故紙杵碎紙上炒香各等分上為細末每服二錢溫酒調下食前服大效丸一名白礬丸治痔疾不瘥乳香散治五痔年深不瘥乳香二錢沒藥一錢二味同研上細末用小雞子一枚打開去黃以清拌藥再入雞子殼中以紙封飯甑中蒸熟空心服盡一枚如年深者十數枚安麝香散治遠年痔疾有膿血出不可忍者麝香半錢研田螺一個燒灰研上細研末用蔥湯洗次用藥敷之白玉丹出三因方治久年腸痔下血百藥不效者凝水石不拘多少煨紅研細水飛再入窠中煅上糯米糊丸如梧桐子大陳米飲下五十丸只用一服愈又單方服白梅亦效治痔瘡不問三十年久遠瘡皆可片腦不拘多少點在蝸牛內一宿蝸牛肉化為水以鵝羽蘸瘡上用寒水石為末井花水空心調下半錢服半月除根治痔瘡久不瘥者用活蜈蚣一二條頭尾足俱全者放於香油中用瓷器盛貯托定不用留瓶口七七四十九日久留日數不妨但蘸油點痔上不過十餘次即愈石燕散出肘後方治腸風痔瘻三十年不瘥面色痿黃飲食無味及患臟腑傷重泄瀉暑月常瀉不止及諸般淋瀝久患消渴婦人月水不調赤白帶下多年不瘥應是臟腑諸疾皆治之用石燕不拘多少淨洗每日空心取一枚放堅硬無釉缽溫水磨服之如彈子大者分三服晚食前再服欲作散搗研為細末水飛過取白汁如泔乳者澄去水曝乾以瓷石協去杵頭鐵屑後入硬堅瓷缽內以硬乳捶研每服半錢至一錢清飯飲調下溫水亦得此方偏痔久年腸風等疾須常服勿令歇服及一月勿歇即愈榼藤子散治痔瘻久不愈用榼藤子不拘多少為散先以蜜調少許塗瘻痔瘡上次用溫酒調下一錢匕食前服之硃砂丸治久痔生瘡出血不止白礬半兩雄黃半兩硃砂半兩以上三味入瓷盒子內水調蚌粉固口縫外用鹽泥固濟候炭火燒通赤取出放地上去火毒後入下項藥麝香一兩別研穿山甲一兩置瓦上炙令黃赤色肥皂一枚去子焙上件為細末煮麵和為丸如梧桐子大硃砂為衣每服十丸溫酒下食前
