body:
  text: 卷二百九十八痔漏門牡痔附論夫內經謂飲食自倍腸胃乃傷因而飽食筋脈橫解傷癖為痔蓋飽甚則腸胃滿腸胃滿則筋脈橫解故癖而為痔其狀肛邊生鼠乳或癢或痛膿血時下謂之牡痔聖惠方云痔肛邊生鼠乳者人臟腑空虛內有積熱不得宣泄流於大腸之間結聚所成也此皆下元虛冷腎臟勞傷是風邪毒熱在內不散蘊蓄日久因茲生病亦由飲食不節醉飽無忌恣食雞豬久坐濕地情欲紛擾久忍大便是陰陽不和關格壅塞風熱之氣下衝肛腸故令腸頭生肉如鼠乳或似櫻桃或如大豆時時下血往往出膿亦曰牡痔也方皂莢丸出聖惠方治痔肛邊生鼠乳及大腸疼痛坐臥不得皂莢十挺不蚛肥長一尺者湯浸去皮塗酥炙令黃焦去子黃耆一兩銼枳殼一兩炒微麩黃麝香半兩細研入當歸一兩銼桂心一兩槐耳一兩微炒槐子一兩微炒附子二兩炮製去皮臍白礬二兩半燒灰蝟皮一兩焦炙令黃烏蛇二兩酒浸去皮骨炙微黃檳榔一兩鱉甲一兩塗醋炙令黃去裙襴川大黃一兩銼碎微炒上為末煉蜜丸和搗五七百杵丸如梧桐子大每日空心及晚食前以溫粥飲下三十丸鱉甲丸出聖濟總錄治牡痔肛邊生肉如鼠乳時出膿血鱉甲去裙襴醋炙生乾地黃焙黃連去須連翹蝟皮炙焦續斷銼附子炮裂去皮臍槐實炒白礬熬令汁枯各一兩蠐螬炙五枚栝蔞去皮黃耆乾薑炮各三分上為細末煉蜜丸梧桐子大每服二十丸食前早晚米飲下取瘥為度治痔有乳結核作渴疼痛風盛熱實一名槐角子丸出本事方皂角醋炙黃耆荊芥穿山甲灰炒木香露蜂房蝟皮鱉甲醋炙桔梗芍藥各二錢半大黃半兩上為細末煉蜜為丸梧桐子大每服三十丸溫湯下食前日三服一方加槐子蝟皮丸出聖濟總錄治牡肛邊生鼠乳疼痛寒熱兼痔腸漏蝟皮炙焦槐木耳炙附子泡裂去皮臍當歸銼炒赤芍藥桑根白皮銼白礬灰楮根白皮銼各一兩上為末煉蜜丸梧桐子大每服三十丸食前粥飲下雷丸丸一名鶴蝨丸治牡痔生乳瘡方見鶴蝨丸槐子丸出聖濟總錄治牡痔因醉飽筋脈橫解腸癖成痔每下鮮血槐實微炒三兩蝟皮炙焦當歸切焙附子炮裂去皮臍連翹乾薑炮續斷黃耆上為末煉蜜丸梧桐子大每服十五丸空心米飲下日晚再服稍加至三十丸槐皮膏出千金方治痔疾下部癢痛肛邊內結如鼠乳腫硬疼痛槐皮楝實各五兩甘草白芷各一兩桃仁六十枚當歸三兩赤小豆二合上七味㕮咀以成煎豬膏一斤微火煎白芷黃藥成摩瘡上日再並導下部煮白丸一名玉屑丸治痔疾有頭生於肛邊如鼠乳及生瘡痛癢不止下膿血冷疼後重方見大腸門腸風下血類案原方槐根白皮去粗皮苦楝根去皮各三兩椿根白皮四兩天南星半夏各半兩威靈仙一兩寒食麵三兩上為末滴水丸梧桐子大干之每服三十丸案此處缺方名及證狀菩薩草三分黃連五分去須黃柏三分銼膩粉一錢白礬半兩燒灰地龍三分微炒麝香三分銼上為細末入膩粉麝香和勻先以鹽漿水洗痔後以散敷之日三四度用枳殼丸出聖濟總錄治牡痔肛邊生鼠乳出膿血枳殼去瓤麩炒防風酒浸一宿去火焙槐花麩炒荊芥穗薄荷甘草炙各半兩上為細末煉蜜丸梧桐子大每服二十丸米飲下不拘時日三服乳香散出王氏博濟方治牡痔生瘡乳香豬牙皂莢銼鯪鯉甲各二兩箬葉去頭粗梗四兩銼黃牛角尖長二寸者一對銼蛇蛻一條頭尾全者上入在沙罐子內蓋口泥鹽固濟曬乾用十二斤炭火煅候碧煙出去火放冷取出細研每服二錢以胡桃一個取肉細研拌藥空心酒調下吃五服見效天靈膏出聖濟總錄治牡痔有頭疼楚不可忍或有瘡漏濕天靈蓋酥炙薰陸香各半兩葵根各半兩李根蔥根各一分研細麝香一錢研上為末豬脂或膠水調和如膏攤故紙上貼之一日三易瘥藜蘆膏出聖惠方治痔疾肛邊生鼠乳藜蘆半兩去蘆頭川大黃半兩銼碎黃連半兩去須銼楝子十四枚搗碎巴豆三枚去皮心研桃仁十四枚湯浸去皮尖雙仁上以豬脂五合煎二三十沸綿濾去滓放冷以塗痔上當歸餅出聖惠方治牡痔有頭痛楚不可忍當歸四兩杏仁去皮尖雙仁研半兩白芷去粗皮各三兩蕓薹子研二兩上二味為末與杏仁蕓薹子和勻以醋面調捻作餅子似錢大坐之藥干頻易以瘥為度治大腸久積風毒痔下血不止肛邊生鼠乳疼痛久不瘥出聖惠方蝦蟆一枚櫸樹上菌子一個鰻鯉魚頭一兩黃牛角䚡一兩葫荽子一合上為細末水煎白膠香和丸彈子大於瓶內如燒香法一丸熏下部瘥石榴散出聖濟總錄治牡痔肛邊生鼠乳醋石榴一枚大者黃連宣州者去須白礬熬各一兩穀精草半兩炒焦上先石榴割下蓋子去裡面子三分取出一分次將黃連白礬同拍碎入在石榴內卻用蓋子掩定濕紙裹膠泥固濟炭火煅赤候冷去泥與穀精草同研極碎入麝香一錢匕空心熱酒調下荊槐散出聖濟總錄治鼠乳痔便血疼痛不可忍者荊芥穗槐花炒枳殼麩炒去瓤黃連銼各等分上為細末每服二錢匕米飲調下不拘時穿山甲散出直指方治痔肛邊生鼠乳或成瘡痛楚穿山甲撮取後段尾根盡處一兩炙焦存性鱉甲半兩酒炙酥麝香半錢細研上為末每服一錢半用臘茶半匙夾和沸湯調下防風煎湯調下亦得留滓塗痔又方單用穿山甲一方無鱉甲黃耆湯下大豆帛方治痔下部癢痛肛邊生鼠乳腫氣成核者棗白皮散治牡痔有頭者或出似雞頭狀漸作瘡有惡物不化棗白皮二兩細研酥半兩鯪鯉甲散治牡痔肛邊生鼠乳成瘡痛甚鱉甲散出聖惠方治肛邊生鼠乳氣壅疼痛鱉甲去裙襴醋炙三兩檳榔銼二兩上為細末每服二錢匕食前粥飲調下蔥桃湯出聖濟總錄治牡痔熏洗蔥根桃葉各一握上切搗以水三升煎數沸去滓入盆內熏洗日三兩度豬蹄灰丸治牡痔生鼠乳肛門癢痛不可忍膿血出不絕豬懸蹄骨焰火上燒灰研一兩水銀三大豆許上先取水銀用蒸棗肉二枚入豬蹄灰和為丸雞頭實大先用鹽湯洗下部內一丸夜臥時再用以瘥為度礬香膏出聖濟總錄治牡痔出膿血疼痛不可忍白礬半兩木香炮搗灰一分上用雞子白調成膏敷之槐子丸出聖惠方治痔疾鼠乳生肛邊煩熱疼痛槐子二兩微炒黃芩一兩上為細末水浸蒸餅和丸如梧桐子大每食前桑葉湯下二十丸虎骨膏出聖惠方治痔疾肛邊生鼠乳癢痛不可忍虎頭骨一兩炙令黃犀角屑一兩上為細末以豬蹄和為膏塗痔上日三五度用之馬蹄灰方出聖濟總錄治牡痔䘌蟲用馬蹄一兩燒灰細研末以豬脂調塗紙上納下部中日三五易即瘥治鼠乳痔出肘後方用蒲黃末空心酒下方寸匕日三服一方粥飲下一錢治鼠奶痔用牛角䚡燒作灰空心酒服方寸匕治痔疾肛邊生鼠乳癢痛不可忍者出聖惠方用大鯉魚腸三條炙令香以紙裹一條更互熨下部中一炊久蟲當自出又方出聖惠方豬牙皂角一兩去皮炙令黃搗羅為末以豬脂和丸如棗核大上以赤錫裹一丸內入穀道當積滯惡血有頭者日消矣又方出聖惠方用蜘蛛絲纏系痔鼠乳頭不覺自落赤小豆散治牡痔生鼠乳膿血出赤小豆一兩黃耆銼牡蠣粉赤芍藥白蘞黃芩去黑心桂去粗皮附子炮裂去皮臍各半兩上羅為散每服三錢匕食前粥飲調下久者溫酒調下牝痔附論夫牝痔者由大腸久虛為風熱留滯腸胃痞澀津液不流邪熱之氣上攻肺臟下注肛腸不能宣散故成斯疾也此皆恣食生冷飲酒食毒之久停滯臟腑傳流腸間故令下血生瘡腫痛故名牝痔也又名酒痔也方檳榔散出聖惠方治風氣稽留下部結牝痔生瘡下血腫痛檳榔銼炒瞿麥穗澤瀉酒浸防風甜葶藶隔紙炒各半兩藁本去苗土滑石碎各半兩木香芫花醋浸炒令焦各二兩乾漆炒令煙出各半兩陳橘皮湯浸去白炒郁李仁各半兩去皮上為細散每服方寸匕溫酒調下不拘時日三地榆散出直指方治痔生瘡腫痛地榆黃耆枳殼檳榔川芎黃芩赤芍藥槐花羌活各半兩白蘞蜂房炒焦甘草各一兩炙上銼每服三錢水一盞半新米一撮煎服榼藤散出聖惠方治痔下血不止生瘡疼痛榼藤子一兩取仁鱉甲二兩塗醋酒黃當歸三分銼微炒黃耆一兩銼槐子一合微炒川大黃一兩銼碎微炒露蜂房三錢微炒蛇蛻皮一兩燒灰藁本半兩桂心半兩豬後懸蹄甲七枚炙令焦黃上為細末每於食前以粥飲下二錢鱉甲散出聖惠方治痔下部生瘡腫下血不絕肚痛不止鱉甲一兩塗醋炙令黃去裙襴黃耆一兩銼枳殼一兩半麩炒微黃去瓤當歸一兩銼微黃桔梗三分微炒去蘆頭赤芍藥三分槐子二兩微炒桑甘一兩微炒生薑屑半兩焙乾上為細末每於食前以粥飲調下二錢黃耆散出聖惠方治痔下部生瘡腫毒膿血不止黃耆二兩銼熟小豆一兩熟炒附子炮裂一兩去皮臍白蘞一兩桂心一兩赤芍藥三分黃芩三分槐木耳一兩微炒枳實一兩麩微炒黃上為細末每於食前以溫粥調下二錢大黃散出聖惠方治酒痔下血如肝肛邊生瘡疼痛因醉飽氣壅即發川大黃一兩銼碎微炒枳殼一兩麩炒微黃去瓤生乾地黃一兩桑根白皮一兩銼黃耆一兩銼羚羊角屑一兩當歸一兩赤小豆花一兩上為散每服四錢水一鍾煎至六分去滓不計時溫服黃耆丸出聖惠方治酒痔風熱壅滯大腸下血疼痛黃耆一兩銼蒺黎子三分微炒去刺蝟皮一兩炙令黃枳殼二兩麩炒去黃瓤檳榔一兩烏蛇一兩酒浸去骨炙微黃川大黃三分銼碎枳炒大麻仁一兩皂角莢子仁半兩炒黃上為細末煉蜜丸梧桐子大每服食前桑根白皮湯下三十五丸赤小豆散出聖惠方治酒痔大腸中久積熱毒下血疼痛赤小豆一兩炒熟黃耆一兩銼白蘞半兩桂心半兩赤芍藥半兩黃芩三分生地黃一兩當歸三分銼微炙上為細末每於食前以槐子仁湯調下二錢露蜂房煎出聖濟總錄露蜂房槐皮各三兩楝實五十枚桃仁去皮尖雙仁五十枚白芷二兩豬脂一斤赤小豆搗碎上除豬脂外銼碎以醋拌一宿先熬脂令湯下調藥煎候芷赤黑色紙絞銼碎去滓瓷盒盛空心溫酒調下一杯許晚再服再以紙裹似棗核大納下部中日二換即瘥地榆湯出聖惠方地榆銼黃耆細銼枳殼去瓤麩炒檳榔銼當歸切焙黃芩去心黑赤芍藥各一兩上為細末每服四錢匕水一煎食前去滓溫服艾葉散治痔下血葛根湯出直指方治酒痔白葛根枳殼炒半夏制茯苓生乾地黃杏仁各半兩黃芩甘草炙各一分上銼碎每服三錢黑豆百粒姜五片白梅一個煎服黃耆散出聖惠方治酒痔肛腸痛下血不止黃耆一兩銼赤芍藥枳殼一兩麩炒黃去瓤當歸一兩炒微黃槐子仁一兩微炒黃桑雞一兩煅炙白蛇一兩酒浸去皮骨塗醋炙令黃色上為末每於食前煎黃耆湯調下二錢黃耆丸治牝痔下血及治血痔黃耆細銼枳實去瓤麩炒各三兩烏蛇酒浸炙去皮骨當歸切焙赤石脂蝟皮炙焦各二兩上細末煉蜜丸梧桐子大每服二十丸空心酒下日二蝸牛散出聖惠方治痔生瘡腫痛下血不止蝸牛五枚炙令黃螻蟈三枚炙令黃赤石脂一分白龍骨一分麝香細研一分入蠐螬三枚炙令黃上為細末每服食前用粥飲調一錢椿根散出聖惠方治牝痔下血不止疼痛大腸風冷臭椿根銼地榆銼黃耆銼伏龍肝研各一兩當歸切焙三分上為細末每服食前以粥飲調下二錢匕治酒痔肛邊生腫痛及下血不止鵝不食草半兩去泥焙乾雞冠花半兩微炙鬱金半兩麝香半兩細研當歸三分銼微炒上為細末每於食前粥飲調下二錢黃耆丸出聖惠方治酒痔風熱壅滯大腸風冷下血疼痛黃耆一兩銼枳殼麩炒一兩去瓤微黃烏蛇二兩酒浸去皮骨塗酥炙微黃當歸一兩微黃炒皂莢刺一兩炙黃上為細末煉蜜丸梧桐子大每服食前二十丸皂莢子散出聖惠方治牝痔下