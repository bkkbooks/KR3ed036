body:
  text: 卷三百四十五産後諸疾門産後諸疾附論凡婦人非止臨産須憂至於産後大須將慎危篤之至其在於斯勿以産時無他乃縱心恣意無所不犯犯時微若秋毫感病廣於嵩岱何則産後之病難治於余病也婦人産訖五臟虛羸惟得將補不可轉瀉若其有病不須駃藥若行駃藥轉更增虛就中更虛向生路遠所以婦人産後百日以來極須殷勤憂畏勿縱心犯觸及即便行房若有所犯必身反強直猶如角弓反張名曰蓐風則是其犯候也若似角弓命同轉燭凡婦人皆患風氣臍下虛冷莫不由此早行房故也凡婦人坐産畢且飲冷童子小便一盞不得便臥且宜閉目而坐須臾方可扶上床仰臥不得側臥宜屈膝未可伸足高倚床頭厚鋪茵褥遮圍四壁使無孔隙免被賊風兼時時令人以物從以擀至臍下使惡露不滯如此三日可止仍不可令多臥如多臥看承之人宜頻喚醒舊說産婦分娩了三日方可上床若三日上床則必就地睡臥又豈可令産婦近地氣乎才生産畢且先研醋墨三分服之一法云不可服醋墨有傷肺經成咳嗽之戒誠過慮也然醋墨本破凝結之血然不可用大釅之醋仍不可太多即不至傷肺然所在不同亦有不吃者更産後三日內令産婦嘗聞醋炭氣或燒乾漆煙若無干漆以破舊漆器燒之以防血迷血逆血暈不省之弊夏月宜於房外燒磚以醋沃置於房中夏月房中不須著火及煮粥煎藥之類分娩之後須臾且食白粥一味不可令大飽頻少與之為妙逐日漸增之煮粥時須是煮得如法不用經宿者又不可令溫冷不調恐留滯成疾仍時與童子小便一盞飲之亦須預備小便若遇夏月以薄荷養之新産後不問腹痛不痛有病無病以童子小便以酒和半盞溫服五七服妙一臘七日也之後方可少進醇酒並些小鹽味一法才産不得與酒緣酒引血逆入四肢兼産母臟腑方虛不禁酒力熱酒入腹必至昏悶七日之後少進些酒不可多飲如未出月間欲酒吃或服藥酒者可用淨黑豆一升炒至無煙以無灰酒五升燒淋仍加好羌活一兩洗淨拍破同浸尤妙當用此酒下藥或時時飲少許可以避風邪養氣血下惡露行乳脈也如産婦素不善飲酒或夏月之間亦不許強飲一臘之後恐吃物無味可爛煮羊肉或雌雞汁略用滋味作粥飲之或吃爛粥豬蹄肉忌母豬及白蹄豬肉不可過今江浙間産婦多吃熟雞子云補益亦風俗也三日之後方可少食溫麥面成腫疾因食麵早也凡吃物過多恐成積滯若未滿月不宜多語喜笑驚恐憂惶哭泣思慮恚怒強起離床行動久坐或作針線用力工巧恣食生冷黏粳米菜肥膩魚腥之物及不避防風寒脫衣洗浴或冷水洗濯當時未覺大損滿月凡言滿月者謂滿三月非三十日也不慎即成蓐勞手腳及腰腿痠重冷痛骨髓間颼颼如冷風吹雖有名醫亦不能療又不得夜間獨處緣去血心虛恐有驚悸切宜謹之所有血衣洗濯不得日中曬曝免致邪祟侵傷又不得濯足恐血氣攻下又不得刮舌傷心刷齒及就下低頭皆成血逆血暈此産家謹護之常法也滿月之後尤忌任意飲食觸冒風寒恣意喜怒梳頭用力高聲作勞工巧房欲及上高廁便溺之類如此節養攝至百晬始得血氣調和臟腑平復自安帖設不依此即致産後余疾矣産婦心下堅大如旋盤乃飲水所作名曰氣分蓋婦人童幼至天癸未行之間皆屬少陰天癸既行皆從厥陰論之天癸已絶乃屬太陰經也治胎産之病從厥陰經無犯胃氣及上二焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則營衛自和而寒熱止矣如發渴而用白虎氣弱而用黃耆血刺痛而用當歸腹中疼而加芍藥大抵産病天行從增損柴胡雜證從增損四物宜詳察脈證而用之方當歸散出大全良方療産後氣血俱虛慎無大補恐增客熱別緻他病常令惡露快利為佳及治腹痛當歸芍藥川芎黃芩各一兩白朮半兩上為細末溫童子小便或酒調下二錢如腹不痛若米飲調之炒加減四物湯便産須知治産後血虛發熱或日間明瞭暮則發熱憎寒當歸川芎生地黃柴胡上等分每服三錢水一大盞煎至六分去滓服薤白湯出千金方治産後胸中煩熱逆氣薤白半夏甘草人參知母各二兩石膏四兩栝蔞根三兩麥門冬半升上㕮咀以水一斗三升煮取四升去滓分五服日三夜二熱甚即加石膏知母各一兩一方無石膏療如覺煩熱便産須知用圓白半夏不拘多少淨洗湯泡七次為末如大豆納鼻中即醒醫學發明云産前寒熱小柴胡湯中去半夏謂之黃龍湯主之治血氣逆心煩滿出肘後方用生竹皮一斤水三升煮取一升半分為再服皂甲散治産後不蘇川楝皮皂角樹皮各一斤皂角核一合石蓮一合去心上為粗末煎湯乘熱以物為定熏通手洗於淨房中就熏洗處鋪薦席才洗了次帛挹干便吃玉露通真丸熱酒下二丸便仰睡芎歸湯一名立效散出百一選方治婦人産後忽兩乳伸長細小如腸垂墜直過小肚下痛不可忍危在須臾名曰乳懸兼治産後惡露不下腹痛或下血太多眩暈不能支吾妊娠胎動腹痛下血川芎當歸各二斤上將芎歸各半斤㕮咀於瓦器內用水濃煎不拘時候多少溫服余芎歸各一斤半銼作大塊用香爐慢火逐旋燒煙安在病人面棹子下要煙氣直上不絶令病人低頭伏棹子上將口鼻及病乳常吸烟氣直候用此一料藥盡看病證如何或未全安或略縮減再用一料如前法煎服及燒煙燻吸必安如此二料已盡雖兩乳略縮上而不能復舊者用冷水磨萆麻子一粒於頭頂心上塗片時即洗去則全安矣此通真子祕方一方加縮砂腹中刺痛加芍藥口乾煩渴加烏梅麥門冬發寒加乾薑白芍藥水停心下微有嘔逆加茯苓生薑虛煩不得眠加人參竹葉大便閉澀加熟地黃橘皮杏仁小便不利加車前子腹脅膨脹加厚朴血崩不止加香附子咳嗽痰多加紫菀半夏生薑腰痛腳痛加牛膝心下疼痛加延胡索惡血不下腰腹重痛加牡丹皮煎治婦人臨産服催生藥驚動太早未當離經而用力太過以致育膜有傷産後水道中垂出玉綿一條約三四尺長牽引心腹痛不可忍以手微動之則痛苦欲絶龍興鐵柱觀前有一産婦患此諸醫皆用失笑散雖略止痛而不能得肉線離脫後有一道人來問證因曰諸醫用失笑散盡不瘥但不能絶根乃買老薑三斤淨洗不去皮於石鉢內研爛用清油二斤拌勻入鍋內焙熟以油乾焦為度先用熟絹一段約五尺長折作結方令穩重婦人輕盛起肉線使之屈曲作一團納於水道中卻用絹袋兜裹油姜稍濕敷在肉線上熏覺姜漸冷又用尉斗火尉熱使之常有姜氣如姜氣已過除去又用心如此熏尉一日一夜其線已縮大半再用前法越兩日其肉線盡入腹中其病全安不復痛矣卻服失笑散芎歸湯補理道人云此乃魏夫人祕傳怪病方切不可使肉線斷作兩截一斷則不可治當歸散出大全良方治産後補虛益血當歸羌活各一兩延胡索半兩上為細末用豬腰子一隻切作片以水一盞入藥末二錢同煎至七分同腰子吃蓬莪朮散出大全良方治産後血海氣虛腹臟痛疼心胸注悶每遇經脈行或多或少及有塊積者莪朮桃仁去皮尖炒大黃濕紙煨當歸炒各一兩桂心川芎木香牡丹皮延胡索炒赤芍藥各半兩上為細末溫酒調一錢空心臨臥服療産後大虛心腹急痛血氣上搶心氣虛乏補益方出大全良方黃耆白朮當歸甘草人參各二兩生薑四兩上先以白羊肉三斤去膜以水一斗九升煮肉取汁五升後下諸藥更煎取三升分溫三服得勝丸治婦人産後血氣虛冷腰腹大痛便痢膿血川烏炮去皮一兩五靈脂二兩沒藥二錢上為細末醋糊為丸如豆大每服二三十丸食前酒下竹根湯出千金方治産後虛煩甘竹根細切一斗五升上以水二斗煮取七升去滓用小麥二升大棗二十枚復煮麥熟三四沸內甘草一兩麥門冬一升湯成去滓服五合不瘥更服取瘥短氣亦服之蘇麻粥便産須知治産後鬱冒多汗汗則大便祕難於用藥唯此粥最佳此粥不獨産婦可服老人諸虛人風祕皆可服昔有老人年八十四歲風祕臟腑壅血氣聚膈中腹脹噁心不喜食氣上攻頭目神昏進此藥氣血結糞自下諸病悉去紫蘇子大麻子淨洗各半兩上為細研用水再研濾汁一盞分二服煮粥食淡竹茹湯治産後虛煩頭痛短氣欲絶心中悶亂不解生淡竹茹麥門冬小麥各五升甘草一兩生薑三兩産寶用乾葛一兩大棗十四枚産寶用石膏三兩上㕮咀以水一斗煮竹茹小麥取八升去滓乃內諸藥煮取二升去滓分二服羸人分作三服若有人參入一兩若無人參內茯苓一兩半亦佳人參茯苓皆治心煩悶及心虛驚悸安定精神一劑不瘥更作苦氣逆者加半夏二兩芍藥梔豉湯出拔粹方治産後虛悶不得眠芍藥當歸梔子各五錢香豉半合上如前修産後傷寒便同下後變證治産後煩渴潮熱出危氏方用五苓散枇杷葉去白毛蜜塗炙麥門冬二十粒去心煎湯服方見寒暑濕門中暑類按五苓散原方澤瀉二兩半桂心一兩豬苓去皮赤茯苓去皮白朮去蘆各一兩半上為末每服二錢沸湯調下不拘時候服訖多飲熱湯汗出即愈治産後心悶手腳寒熱氣力欲絶血暈連心頭硬及寒熱不禁用接骨木破如算子一握以水一升煎取半升分溫二服或小便數惡血不止服之即瘥此木可煮三次其力一般此是起死人方治産後心悶手足煩熱奄奄氣欲絶血暈心頭硬作熱憎寒忍不禁出肘後方用續斷皮一握銼以水三升煎取一升分三服服如人行二三里再服無所忌此藥救産後垂死治産後心悶手足煩熱氣力欲絶血暈心頭硬及寒熱不禁出肘後方用延胡索炒搗為末酒服一錢亦治穢汙不盡腹滿千金三物黃芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黃芩一兩苦參二兩乾地黃四兩上以水八升煮取二升溫服一升多吐下蟲腎氣湯治婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系子戾故致此病但利小便則愈乾地黃八兩薯蕷四兩山茱萸四兩澤瀉茯苓三兩牡丹皮三兩桂枝附子炮各一兩上㕮咀以水六升煮取二升去滓分三服日三次人參當歸散出大全方治産後去血過多血虛則陰虛陰虛生內熱其證心胸煩悶呼吸氣短頭痛悶亂骨節疼痛晡時輒甚與大病虛煩相類急宜治之人參當歸生乾地黃桂心麥門冬去心各一兩白芍藥二兩上㕮咀每服四大錢水二盞先將粳米一合淡竹葉十片煎至一盞去米竹葉入藥並棗三枚煎至七分去滓溫服虛甚者用熟地黃食前服一方血熱甚者加生地黃産後榮血暴竭便産須知治婦人血噤失音沖惡用鑰匙以生薑醋小便煎服弱體人煎湯服亦得用大劑芎歸湯艾煎丸出衛生家寶方治婦人産後血海虛弱面無顏色腹痛身體倦怠艾葉去梗一斤乾薑半斤當歸四兩洗白芍藥半斤熟乾地黃四兩洗附子二個炮去皮尖切上五味各切細用米醋五升煮乾取出焙乾為末醋糊丸如桐子大每服三五十丸酒下不吃米飲食前忌生冷物又方小烏沉湯燒荔枝核灰研和服烏金散衛生家寶治婦人産後十八種疾宜預服不生諸病沒藥半兩生血餘半兩男子者燒灰紅花子一分生伏龍肝一分研當歸半兩微炒赤龍鱗半兩用魚鱗燒灰存性干柏葉一分爛杵香墨一分燒紅米醋淬凌霄半兩生上為末每服二錢熱酒下不拘時候酒不宜多延胡索散産經治産後血氣攻刺腹痛不止及新舊虛實痛不止當歸酒浸延胡索赤芍藥蒲黃紙隔炒桂不見火去皮乳香水研沒藥各五錢計七錢細末挑三錢酒調空心下四物湯産經治大産小産對證合服立效腹中刺痛惡物不下加當歸芍藥各半錢口乾欲飲水加栝蔞麥門冬去心各一錢發寒熱加乾薑牡丹芍藥各半錢水停心下微吐逆加木香豬苓茯苓防己各分半錢燥大渴加知母石膏各半錢虛寒狀類傷寒加人參柴胡防己各半錢因熱生風加川芎柴胡各半錢虛煩不得眠加人參竹葉各半錢大便祕加大黃半錢炒頭痛或身熱加柴胡黃芩各半錢小便澀加桃仁去皮尖炒半錢腹脹加厚朴枳實炮各半錢滑瀉加官桂附子各半錢嘔加人參白朮各半錢血崩加地黃蒲黃各一錢山蘄散楊氏家藏方治産後諸疾血氣作痛散堅塊逐惡血當歸洗過微炒沒藥亂髮用男子發入小藏瓶燒灰凌霄花各半兩紅花子伏龍肝甘柏木松煙墨燒各一分鯉魚鱗一兩燒上件為細末每服二錢熱酒調服食前黑神丸出楊氏家藏方治産後諸疾巴豆半兩以水兩碗煮盡去皮心出油白姜半兩炮肉桂半兩去皮黑附子半兩炮去皮上為末曲糊丸如蘿蔔子大每服三丸五丸冷茶下熱茶投之瀉下三五行了以粥止瀉出惡物百病皆除一日內忌熱食保生丸王氏博濟方治産前産後血氣風冷及是婦人所患一切疾病皆理療神驗金叉石斛一分另研秦艽官桂去皮乾地黃貝母防風糯米甘草炮乾薑細辛以上各一分當歸蜀椒去黑子只取皮大麻仁大豆卷黑豆皮是黃芩以上各二分石膏明淨者麒麟竭沒藥龍腦各一錢半上一十九味並須州土新好者細搗羅為末煉蜜六兩熟須入水一分同煉令水盡和藥為丸先杵五百下後丸如彈子大均可成七十二丸用湯使治病狀如後産前産後血風頭旋身戰用薄荷酒下月信不通當歸酒下赤白帶下溫酒下婦人臨産難産胎衣不下子死腹中橫産倒生死絶不語但看心頭熱氣在取一丸用京棗湯研灌口中但入喉立蘇神妙産後惡血不盡臍腹疼痛嘔吐發熱憎寒煩悶月候不調或多或少皮膚虛腫産血不止虛勞中風口噤不語半身不遂産前産後赤白痢大便祕澀口渴血暈狂語見鬼頭痛面色萎黃漸成勞瘦飲食無味以上病狀並用溫酒研下一丸服至五七丸臨産五臟不痛男女易生神驗難述催生當歸酒下治産後中風血暈生地黃同煎十沸研藥一丸灌之立瘥凡御風但五日一度爛嚼一丸空心熱酒下或浴後嚼一丸溫酒下小兒天吊驚風薄荷酒下一丸分作三服中風不語身急如板用消梨好瓤薄荷同研熱服一丸分作三服以衣被蓋但汗出相次揭衣被便當風坐臥立瘥其婦人身邊一切諸病但以溫酒及當歸薄荷同研一丸立瘥阿膠丸治産前産後神妙真阿膠四片火炙令熱為末蛇蛻皮一條燒灰熟艾半兩燒灰敗筆一管用頭燒灰大麥少許炙乾如無此花以麥糵上牙干代之亦得為末用上件五味藥一處碾研令細以軟糯米飲為丸如雞頭大如丸時黏手以少許面為丸如婦人有身十個月滿足者有諸般疾病用井花水磨下一丸産後有病用通靈散一字醋湯調磨下一丸此藥大安胎臟如築打著及胎死在腹中用醋湯下一丸産噫用千金散子一字熟水調下一丸産前産後被血衝心用黃散子半錢醋湯調下一丸産後遺瀝不止用燒鹽半錢無灰酒下一丸難産者三日至五日服此立下用通靈散子一字醋湯調下一丸如女人産時衣先下兒未見足踏衣生用通靈散一字調下一丸如兒先下衣未見須臾用醋湯下一丸如産後必用通靈散子一字調下一丸如漿破後經三五日不生用黃散子一錢酒調下一丸産前産後痢醋湯下一丸血氣用艾枝煎下一丸嬰粟米炒令黃為末是千金散真阿膠令黃為末是黃散子蛇蛻皮燒灰為末是通靈散常山飲子治産後血海虛竭發狂悶亂時作常山石膏大黃甘草炙鱉甲酥炙柴胡去苗上件五味各等分為末每服三錢水二盞煎至一盞放冷服兼治室女體熱紅脈不行犀角飲子治産後亡津液虛損時自汗出發熱困倦唇口乾燥犀角白朮麥門冬去心各半兩柴胡一兩枳殼炒去瓤地骨皮生地黃甘草炒當歸楝參茯苓去皮黃芩黃耆各七錢上為粗散每服三錢水一盞半浮小麥七十粒生薑三片煎取七分去滓溫服食遠牡丹皮散治産後寒熱臍下疼痛煩躁神效牡丹皮地骨皮海桐皮青皮陳皮天台烏藥沒藥二錢半上件六味羅為細末後入沒藥再研勻重羅過每服抄二錢水一盞煎至七分如寒多熱服如熱多寒服一日三服忌生冷硬醋滑物橘香丸治産後傷血津液暴竭大便閉澀橘紅杏仁各等分上為末蜜丸如梧桐子大每服七十丸空心米湯吞下六七日腹滿痛宜麻仁丸又宜食蘇麻粥葎草汁治産婦大喜傷心汗出汙衣赤色及膏淋尿血葎草不拘多少上搗取汁二升醋二合同勻飲一杯或濃煮汁飲亦治淋瀝尿血柑皮湯治産後發渴經脈過多發渴者亦治柑子皮焙乾上為末白湯調二錢許服其效莫述千金方云産後發渴速覓柑皮榴附飲治産後瀉酸石榴皮米醋炒香附等分上二味為末每服二錢米飲下枳朮丸治産後心腹堅大如盤水飲所作名曰氣分枳實一兩半白朮三兩上㕮咀每服四錢用水一盞半煎七分去滓服秦艽湯治偶傷風惡寒渾身疼痛熟地黃三分當歸白芍藥秦艽柴胡甘草地骨皮各一分半上計一兩二錢挑五錢水一盞半煎至八分日進三服熱退住服或四物湯加蘇木煎養氣活血丸治産後諸虛不足若傷血氣真元內弱四肢倦乏肌肉消瘦及下元虛損不入飲食或吐痢自汗或寒熱往來大艾葉炒出取細末五兩乾薑炮取細末二兩半以上共好醋二升半無灰好酒二升生薑自然汁一升將前姜艾末同調勻放器慢火熬成膏附子二兩半白芍藥白朮椒紅川芎當歸紫巴戟人參五味子各二兩上件藥搗羅為細末入前膏子並炒熟白麵二兩半同和為劑入杵臼內搗一千下丸如梧桐子大每服五十丸溫酒米飲食空心下沒藥散治産後百疾沒藥血竭各等分上細末每服二錢用童子小便合酒半盞煎一服溫調下才産一服上床良久再服其惡血自循下行更不衝上免生百疾小黑神散治産後産前皆可服大能活血定痛消逐利積亦治橫逆香白芷炮半兩百草霜細研二錢半上二味和勻每服二錢醋湯熱服如橫逆用童子小便好醋各一茶腳百沸湯四五分服一方等分白芷生用治腰脅痛濟生增損四物湯治産後陰陽不和乍寒乍熱惡露停滯亦令寒熱也但看小腹急痛為異當歸酒浸白芍藥川芎人參各一兩甘草炙半兩乾薑一兩上㕮咀每四錢姜三片水煎無時芍藥湯出保命集方治産後諸積不可攻當養血去熱其病自退宜服芍藥一斤黃芩茯苓各六兩上三味為粗末每服半兩水煎日三服去滓溫服治産後坐草多時寒熱所損腹中成塊忽衝心背臍腹疼嘔逆噁心不思飲食宜服此方須是大腑冷可吃也出護命方當歸一兩官桂桑寄生各半兩獨活豆蔻川芎各一兩細辛三株芫花醋炒黃黑色土器內炒十株上為細末修制芫花研為末每服衆藥末二錢芫花末半錢調勻為一服空心土器內煎蔥湯調下熱服治産後頭冷重項頸軟非時間頭面上肌肉痹大腑虛冷頗出後又或無糞或時泄瀉兩足沉重少精神行步無力面色黃瘦或産後未經百日經候通行忽因誤吃涼藥有此症候忽自懷孕時間通身寒冷至産後卻有此疾但合硫黃丸與此藥相間服仍服硫黃丸不妨也吃此一方了卻修合下面一方吃此兩方各吃一料出護命方防風藁本澤蘭獨活各一兩五味子川芎白芷當歸破故紙炒白朮石斛續斷各半兩上為細末煉蜜丸如梧桐子大早朝空心鹽湯下五十丸治産後亂吃物早傷損血氣身體虛弱飲食減少眼如貓兒眼出護命方當歸續斷官桂各半兩芍藥桔梗羌活芫花醋煮炒令黃黑川芎各一分牽牛炒細辛各三株上為細末每服四錢水一盞二分煎取一盞空心和滓吃只用土器內煎治産後肝氣虛弱風邪所中肝氣即虧不能生心心乏生氣非時驚恐但一切産後有虛冷中驚悸之候大腑虛冷此三藥不可缺一出護命方當歸石斛五味子川芎各半兩破故紙炒防風獨活藁本白朮各一分上為細末煉蜜梧桐子大早朝空心木瓜二斤鹽少許同煎湯下五十丸治産後肝虛中風其狀頭冷痛忽偏痛至晚即痛但頭痛時間頭骨內冷痛大腑不調吃食減少宜服此藥若是發熱頭痛即不可吃此方出護命方當歸防風桑寄生甘草細辛獨活川芎各一錢上為細末每服一錢半水一盞煎取九分如頭冷痛發作時即空心吃治産後正氣不足咽喉干口無津液飲食減少大腑不調又以虛弱之故不可涼其上膈宜服此生液寄生散出護命方桑寄生半兩人參一分甘草炙三株沉香一銖上為細末非時口含化咽津每服一錢八分水一盞煎取六分時吃亦得治産後大腑虛冷卻因用性發怒其氣上逆因而血暈其狀頭覺重痛昏昏如醉思睡語聲低小宜吃此方若是大腑熱並血暈時壯熱頭痛不可吃此藥自有方見上出肘後方麻黃去根延胡索川芎防風各一分官桂去皮半兩上作細末每服一錢半水一盞煎至九分非時去滓吃不要多吃病住即止藥治産後大腑虛冷因怒後成血暈吃前方藥未效卻更加壯熱頭痛面赤如醉宜吃此方出護命方牡丹皮去心荊芥穗羌活麻黃去根各一分上為末每服二錢水八分一盞煎一兩沸急瀉出食後徐徐去滓熱吃病減即住藥治婦人忽因經候行時忽因産後吃生冷不相當之物忽産後起早衝風傷損血氣俱病經候過多臨經候行時氣痛不可勝忍方凡婦人血氣痛俱可與此方出萬全護命方當歸續斷炙艾葉芍藥木香芫花以醋土器內炒微黃官桂各一分延胡索川芎牛膝各半兩獨活一分上細杵羅為末每服二錢半土鉢內煎蔥湯調下空心吃若吃數服未安其人必大腑熱每服添熟牽牛子半夏半錢吃治産後小遺登高廁早亂吃物早宮臟傷風飲食減少近十日遠經半月飲食不進才吃一口湯水即聞所吃湯水巡歷胸中方下入胃既入胃仍舊不出面色青黃形體困重宜服此方若得此病須是每日吃得一兩盞酒方可延得半月未死急宜治之細辛官桂川芎當歸各半兩羌活藿香各一分吳茱萸三銖甘草四銖炙上為細末每服三錢空心煎防風湯調下吃了渾身足手暖忽頭痛即連吃一二盞候通身發熱忽行下惡血物即便安樂也若人得此病須是依得上面題目方可吃此方治産後熱悶氣上衝變為腳氣者何答曰産臥血虛復因春夏取涼過多地之蒸濕因足履之而為腳氣之狀熱悶掣瘲驚怖心煩嘔吐氣上皆其候也服小續命湯二三服自愈醫人誤以逐敗血藥攻之則血去而疾盛增矣人參黃芩桂去皮麻黃去節防己川芎甘草白芍藥白朮各二分黑附子一錢炮防風一錢半上計一兩一錢半銼末作四服生薑五片水二盞煎一盞溫服評曰腳氣故是常病未聞産後能轉為者殊不知腳氣初得之不覺得因他病之後血氣方發産後既虛發則無疑小續命湯知其證加木瓜煎引入經絡治之切忌藥湯淋洗治産後壯熱頭痛頰赤口乾唇焦多煩渴燥昏悶不爽松花川芎石膏蒲黃等分上為末每服二錢水二合紅花一捻同煎七分去滓粥後溫溫細呷治産後下白涕不止方當歸白芷各一兩杜仲去皮萆薢菟絲子各半兩牡蠣火煅三分炙艾葉龍骨川芎各一分山茱萸半兩上為細末兩三次羅為飛塵空心鹽湯下三錢濟危上丹治産後所下過多虛極生風氣無所主唇青肉冷汗出目眩神昏命在須臾乳香研五靈脂糖心香潤水淘出涉生硫黃別研玄精石別研極細四味和為器微炒再研阿膠炒生卷柏焙桑寄生無以續斷代淨陳皮各等分上後四味細末和前地黃汁和丸梧子大每二十丸空心當歸酒下紫湯破血去風除氣防熱産後兩日尤宜服之用烏豆五升選擇令淨清酒一斗半炒豆令煙向繞投入酒中看酒赤紫色乃去豆量性服之可日三盞如中風口噤即加雞屎白二升和熬投酒中神驗治産後血病取廅藥及水煮服之治婦人産後冷血以穭豆炒令黑及熱投酒中漸漸飲之治産後疾以蓼蕎作羹食之良治婦人虛羸勞損因産後血氣結積腹內冷痛腸鳴下痢腰痛癥瘕崩中以淡菜燒食一頓令飽大效又名殼菜常時頻燒食若不宜人與少或先煮熟後除肉內兩邊鎖及毛了再入蘿蔔或紫蘇或冬瓜皮煮作臛食之治産後血氣暴虛汗出用淡竹瀝三合微暖服之須臾再服治産後惡露不下衝心腹中攪痛及經脈不通以細研乳頭香為末方寸匕酒煎蘇枋去滓調服立下惡物瘥治産後祕結膨脹不通轉氣急坐臥不安以大麥糵末一合和酒服食良久通轉驗治産後諸血氣以白馬屎汁溫服之治婦人産後腸中癢不可忍以針線袋安所臥褥下勿令知之治産後破血止血渴以小白芋煮食之飲其汁良治婦人産後腹中癢用箭竿及鏃安所臥席下勿令婦人知主産後諸疾結痛血上欲死以倒掛藤煮汁服之聚珍丸出朱氏集驗方治婦人小産後虛羸百節疼痛不進飲食百藥不效艾煎丸卷柏丸茴香丸烏雞煎丸巴戟丸上五藥合作一藥鹽湯溫酒任下兼服沉香荊芥散張氏方治幼婦初産傷水多有此證殺人最急鰾膠燒為末酒服滓敷傷處集驗方防風天南星等分上為末酒服仍以敷傷處南星為防風所制不能麻人海上方新産便用此方可無破傷風之患苦薺煎沸湯候通手淋洗又方馬齒莧煎湯熏洗治産後血痛如刀刺出大全良方熟地黃橘皮各等分上為末每服一錢粥飲調下尋常痛發可常服治産婦血滿腹脹痛血渴惡露不盡月閉止好血下惡血去鬼氣疼痛癥結出本草上取芒硝燒為末酒下或以酒煮服彌久著煙者佳治産後傷冷腰痛動不得者用大藋葉火燎厚鋪床上趁熱即臥於上冷復易之冬月取根杵碎炒及熱准前用産後調補附論凡産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯有痛甚切者不在此例後三兩日消息可服澤蘭丸比至滿月丸盡為佳不爾虛損不可平復也全極消瘦不可救者服五石澤蘭丸凡在蓐必須服澤蘭丸補之服法必七日外不得早服也若産後將息如法四肢安和無諸疾者亦須先服黑神散四服亦略備補益丸散之類不可過多又恐因藥致疾不可不戒如四物湯四順理中丸內補當歸丸當歸建中湯或産婦血盛初經生産覺氣悶不安者調七寶散服之若寧貼不須服若三日後覺壯熱頭痛胸腑氣刺者不可便作傷寒中風治之此是乳脈將行宜服玉露散一二服如無此證不須服若因床帳太暖或産婦氣盛或素多喜怒覺目眩暈如在舟中車內精神鬱冒者此是血暈即須服血暈藥一二服止仍須看承之人照管的當也或覺粥食不美虛困即服四順理中丸一二服若不如此不須服若於兩三日間覺腹中時時撮痛者此為兒枕作痛必須服治兒枕藥一二服若大便祕或小便澀切不可服通利藥以其無津液故也若通利之藥則滑泄不禁不可治也切須戒之若祕甚必欲通利者方可服和暖湯即通凡産後宜常進溫粥食多則熱熱則滯血七日之後方可與酒及些少鹽味爛煮羊肉豬蹄肉及豬肚等物忌母豬及白蹄豬宜烏雞及雞子暖血食物不宜過多及生冷肥膩恐成積滯大抵正産止是血臟空虛補其虛生好血化惡血保其臟氣去其風邪耳方地黃羊脂煎出千金方治婦人産後欲令肥白飲食平調羊肉湯出千金方治産後及傷寒大虛上氣腹痛兼微風肥羊肉二斤無羊肉用獐肉代茯苓黃耆乾薑各三兩甘草獨活桂心人參各二兩麥門冬七合生地黃五兩大棗十二枚上㕮咀以水二斗煮肉取水一斗內藥煮取三升半分四服日三夜一一方無干姜産後醋墨出大全良方以松煙墨不拘多少用炭火煨通紅以米醋淬之再煅再淬如此七度研令極細用絹羅過才産了吃醋墨三錢用童子小便調下四順理中丸出千金方治産後氣血俱傷五臟暴虛肢體羸乏少氣多汗才産直至百晬每日常服壯氣補虛調養臟氣蠲除余疾消穀嗜食兼治産後臟虛嘔吐不止甘草二兩人參白朮乾薑各一兩上為末蜜丸如梧桐子大每服十丸增至二十丸溫米飲下食前如才産了以童子小便打開點服七日內日三服産乳方云此乃大理中丸加甘草兩倍耳然其功比之四味等分大故不同蓋取甘味以緩其中而通行經絡之功最勝者也此産婦月內不可缺者出月不須服矣古方中有婦人補益之藥大澤蘭丸小白薇丸熟乾地黃丸大聖散之類其藥味稍衆而中下之家村落之地卒何以致且藥肆少有真者不若以四順理中丸易之其功較澤蘭丸之類主治頗多也産如未出月飲酒或吃藥宜造黑豆酒用淨黑豆一升炒令甚熟以無灰酒五升淋之仍入羌活一兩同浸尤妙時時飲之或用此酒下藥可以闢風邪養血去惡露行乳脈當歸人參散治産後虛損痿弱難以運動疼痛胸滿不思飲食當歸白朮黃芩芍藥大黃茯苓陳皮各半兩人參黃耆厚朴薑製川芎官桂各三錢甘草一兩枳殼四錢去瓤麩炒上末每服三錢水一盞半姜三片煎至六分去滓不拘時溫服如大便閉以此散下和中丸治新産婦用黑雄雞一隻理如食法和五味炒熟香即投二升酒中封口經宿取飲之令大肥白治新産婦用黑雌雞和烏油麻二升熬令黃香末入酒酒盡極效補中丸宜常服川芎白芍藥黃耆當歸人參陳皮各半兩白朮地黃各一兩上為末煉蜜丸如梧子大每服五十七丸溫水下滋血湯滋養榮血補婦人諸虛治血海久冷當歸川芎芍藥人參麥門冬牡丹皮阿膠各二兩琥珀三分別研酸棗仁炒粉草桂心各一兩半夏曲二兩半上為粗末每服三大錢水一盞姜三片煎七分去滓溫服一日三服大保生丸調和本氣主療諸疾滋補營衛久服之大有功益人參藁本白茯苓當歸生乾地黃各一兩赤石脂白芷延胡索肉桂白薇白芍藥川芎甘草牡丹皮沒藥各半兩上為細末煉蜜和丸如彈子大每服一丸溫酒化下空心食前服之滋陰丹養血和氣調順營衛充成肌膚活血駐顏久服大補衝任勻順月經神良不可具述熟乾地黃白茯苓人參各二兩甘菊花枸杞子黃耆丹參柏子仁炒白芍藥各一兩生乾地黃二兩上為細末蜜和丸如梧桐子大每服五十丸至六十丸米飲下空心日進二三服八珍湯和營調衛理順陰陽滋血氣進美飲食當歸川芎赤芍藥熟地黃人參茯苓甘草縮砂仁各等分上為粗末每服三錢水一大盞入生薑七片棗三枚去核同煎三五沸去滓放溫空心日三服人參養血丸治女人稟受怯弱血氣虛損常服補衝任調血脈宣壅破積退邪熱除寒痹緩中下堅脹安神潤顏色通氣散悶兼治婦人懷身腹中絞痛口乾不食崩傷眩暈及産出月羸瘦不復常者人參赤芍藥川芎菖蒲各一兩炒一作蒲黃當歸二兩熟地黃五兩烏梅肉三兩上為末蜜搜杵數千下丸如梧桐子大每服五十丸至百丸溫酒米湯任下食前服拱辰丹治當壯年而真氣猶怯此乃稟賦素弱非虛衰而然也溫燥之藥尤宜速戒勿謂手足厥逆便云陰多如斯治之不惟不能愈疾大病自此生矣滋益之方群品稍衆藥力細微難見功效但固天元一氣使水升火降則五臟自和百病自去此方主之鹿茸酥炙去毛皮角山茱萸新好有肉紅潤者川當歸各四兩麝香半兩別研上為末入麝香拌勻酒煮麵糊為丸如梧桐子大每服百粒或五十粒溫酒鹽湯下暖宮丸當歸川芎禹餘糧醋淬七次各一兩附子炮去皮桂心各二兩上為細末酒糊丸如梧桐子大空心酒服三十丸日進二三服增至五七十丸治産後更無他狀肥羊肉一斤去脂當歸二兩生薑六兩黃耆四兩上羊肉切以水一斗煮取八升以肉汁煮三味取二升五合溫分四服若覺惡露下不盡加桂心三兩如惡露下多加川芎三兩如覺有氣加細辛二兩覺有熱加生地黃汁二合佚庵劉尚書第五子太常少卿叔謙之內李氏中統三年春欲歸寧父母不得而情動於中又因勞役四肢困倦躁熱惡寒時作疼痛不欲食食則嘔吐氣弱短促怠惰嗜臥醫作傷寒以治之解表發汗次日傳變又以大小柴胡之類治之至十餘日之後病證愈劇主家云前藥無效莫非他病否醫曰此傷寒六經傳變至再經盡當得汗而愈翌日見爪甲微青黑色足脛至腰如冰冷目上視而睹不轉睛咽嗌不利小腹冷氣上衝心而痛嘔吐不止氣息欲絶以為不救召豫治之具說病證及所服之藥豫診其脈沉細而微此中氣不足妄作傷寒治之發表攻裡中氣愈損壞證明矣太夫人泣下避席曰病故危困君盡心救治豫先以辛熱之藥㕮咀一兩作一服至夜藥熟而不能飲續續灌之下一口飲至半夜稍有呻吟之聲身體漸溫忽索粥飲至旦食粥兩次又煎服投之至日高衆醫皆至診之曰脈已生證已回矣衆喜而退越三日太夫人曰病人大便不利或曰以脾約丸潤之可也豫曰前證用大辛熱之劑陽生陰退而愈若以大黃之劑下之恐寒不協轉生他證衆以為不然遂以脾約丸二十丸潤之至夜下利兩行異日面色漸青精神困弱嘔吐復作豫再以辛熱之劑溫之而愈名曰溫中益氣湯出衛生寶鑑附子炮去皮臍五錢乾薑炮五錢丁香二錢藿香二錢吳茱萸一錢半炙甘草三錢當歸一錢草豆蔻二錢益智仁二錢人參一錢半白朮二錢陳皮一錢半白芍藥二錢內經曰寒淫於內治以辛熱佐以苦甘溫附子乾薑大辛熱助陽退陰故以為君草豆蔻益智仁丁香藿香吳茱萸辛熱溫中止吐為臣人參當歸白朮陳皮白芍藥炙甘草苦甘溫補中益氣和血脈協力為佐上件㕮咀每服五錢水二盞煎至一盞去滓溫服食前病久者服一兩益胃升陽湯出衛生寶鑑血脫益氣古聖人之良法也補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之一身在內穀氣為寶黃耆二錢人參一錢半炙甘草二錢升麻半錢柴胡半錢白朮三錢當歸身一錢炒曲一錢半陳皮一錢生黃芩半錢春夏少加秋冬去之上件㕮咀每服稱三錢或五錢視食加減之如吃食少已定三錢內更減之不可令勝食每服水二大盞煎至一盞去滓稍熱服如腹中痛每服加芍藥三分者一錢作十分內三分去皮加桂少許如渴或口乾加葛根二分不拘時候烏金散出大全良方治産後諸疾大補赤芍藥當歸乾薑蒲黃甘草熟地黃上各一分為末另入黑豆一合炒令香熟去皮除蒲黃與余藥一處杵為末於銀器中慢火炒藥紫色後入蒲黃如産後別無疾每日服一錢豆淋酒下更不生諸疾若稍有不安服即愈如産後血逆心悶腹搊痛一兩服立止烏雞煎出楊氏家藏方治産後將成勞傷氣血臟腑不和消瘦人無子息月水不調並宜服之鹿茸酒炙肉蓯蓉酒浸一宿切焙乾各三兩牛膝酒浸一宿杜仲去粗皮生薑汁浸炒山茱萸川芎覆盆子各一兩肉桂一兩續斷當歸熟地黃五味子各二兩白芍藥黃耆五加皮各一兩上件為細末用烏雞肉一斤酒煮爛研為丸如桐子大如硬入少酒糊和搜每服三十丸溫酒或米飲送下空心食前鹿茸補肝丸治産後勞傷血氣肝經不足頭運忪悸四肢懈倦翕翕氣短常服補五臟益肝血駐顏色鹿茸干熟地黃一兩半洗焙當歸洗焙白朮黃耆蜜炙附子炮去皮臍各一兩柏子仁石斛去根枳殼去瓤麩炒三分白茯苓去皮覆盆子酸棗仁炒沉香肉桂去粗皮各半上件為細末煉蜜為丸如梧桐子大每服五十丸溫酒或米飲下空心食前內金鹿茸丸治因産後勞傷血脈胞絡受寒小便白濁晝夜無度臍腹疼痛腰膝無力雞內金鹿茸黃耆蜜炙牡蠣火焙五味子附子炮去皮臍肉蓯蓉酒浸龍骨遠志去心桑螵蛸各等分上件為細末煉蜜為丸如梧桐子大每服三十丸溫酒或米飲下空心食前安胎和氣飲出如宜方治産後勞傷腸胃虛怯腹泄瀉腸鳴訶子白朮各一兩陳皮良薑木香白芍藥陳米甘草各半兩上㕮咀用水二盞加附子當歸人參煎至七分去滓溫服神仙四陪丸出危氏方治産後血氣不足顏色萎黃常服駐顏補血養氣安神開胃進食人參一兩白朮二兩川當歸二兩洗淨熟乾地黃四兩洗淨上為末煉蜜為丸如彈子大服一丸米飲嚼下如不欲嚼但丸如梧桐子大每服五十丸米飲溫酒皆得空心服也增損澤蘭丸出千金方治産後百病理血氣補勞方澤蘭甘草當歸芎藭附子乾薑白朮白芷桂心細辛各一兩防風人參牛膝各十兩柏子仁乾地黃石斛各三十六銖厚朴藁本蕪荑各半兩麥門冬一兩上二十味為末蜜和丸如梧桐子大每服十五丸至二十丸空心酒送下又方出肘後方用羊肉一斤水一斗一升煮取七升去肉內生薑五兩當歸三兩取三升分為四服産後惡露不下附論夫産後惡露不下者以臟腑宿挾虛冷或臨産受寒氣使經絡凝澀氣道不利故惡血凝積而不下也日久為結癖疝瘕之疾令人心腹脹滿疼痛寒熱之證生焉方四物湯出續易簡方治産後惡露不下當歸切焙川芎藭熟乾地黃焙芍藥上為粗末每服三四錢水一盞煎三五沸去滓空心溫服原本有生薑三片阿膠二片熟艾童子小便少許儒門方云加龍膽防己名一醉散治目赤暴發加蒲黃治娠婦漏血乾漆丸治産後惡血不下攻刺心腹疼痛乾漆搗碎炒煙出五靈脂沒藥牡丹皮去心陳曲炒各半兩菴䕡子延胡索桂去心當歸焙各一兩上搗研為末醋煮麵糊丸如梧桐子大不拘時候煎生薑醋湯下二十丸溫酒亦可沒藥丸一名麒麟竭丸出聖惠方治産後惡露不下腹痛臍下堅硬沒藥研當歸切焙劉寄奴延胡索桃仁去皮尖雙仁麩炒黃三分乾漆搗碎炒煙出麒麟竭大黃銼炒各一兩桂去粗皮烏藥銼赤芍藥各半兩上為末煉蜜丸如梧桐子大每服二十丸溫酒下不拘時候服琥珀湯治産後惡露不下氣攻心腹煩悶刺痛琥珀薑黃牛膝酒浸切焙虎杖牡丹皮各半兩當歸切焙生乾地黃焙桂去粗皮桃仁湯浸去皮尖雙仁麩炒各三兩芒硝一兩大黃銼焙一兩虻蟲去翅足炒黃一分上粗搗羅每服二錢水一盞煎取七分去滓溫服麥門冬飲治産後三日外惡露不多心下煩悶生麥門冬汁一合生藕汁三合白蜜半盞生薑半合生地黃汁三合益母草汁三合上相和煎沸放溫每服半盞如覺性寒即入清酒三合溫服牡丹皮湯一名桃仁散治産後惡露不下腹內疼痛牡丹皮去心桂去粗皮牛膝酒浸切焙各三分生乾地黃焙桃仁去皮尖雙仁炒蓬莪朮銼檳榔銼當歸切焙各一兩上粗搗每服三錢水一盞入生薑半分切煎至七分去滓稍熱服不拘時候也又方治産後惡露不下取赤馬通七枚以童便半盞相和稍取汁暖過服之用酒半盞和又方取水蛭燒作灰每服以牛膝酒調下一錢當歸散治産後月內惡露不下當歸切焙牛膝酒浸切焙蘇枋木銼桂去粗皮牡丹皮銼芍藥芎藭艾葉微炒生乾地黃銼延胡索桃仁湯浸去皮尖雙仁麩炒黃各半兩上粗搗篩每服三錢生薑一棗大拍破水半盞酒半盞同煎至七分去滓溫服不拘時候也藕汁飲治産後惡露不下或下未盡有熱藕汁半盞生地黃汁一盞生薑三分酒一盞上先煎地黃汁令沸次下藕汁與酒更煎三五沸放溫時時飲之羊肉飲治産後大腸祕惡露不下補虛羊肉一斤去脂切碎水三升煮肉汁一升半澄令清白茯苓去黑皮三分黃耆銼三分當歸切焙半兩桂去粗皮半兩麥門冬去心微炒三分甘草炙半兩大黃銼炒半兩上除肉外粗搗篩每服三錢以肉汁一盞半煎至七分去滓溫服芍藥湯治産後三四日惡露不下嘔吐不食身體壯熱芍藥二兩知母焙三兩當歸銼焙一兩紅蘭花三兩荷葉蒂三枚炙上粗搗篩每服五錢水一盞半入生薑五片煎至八分去滓再入蒲黃一錢生地黃汁半合煎六七沸去滓空心溫服相次再服之也蒲黃當歸散治産後三日或七日內敗血不散蒲黃當歸切焙芍藥澤蘭葉延胡索白蕪荑焙桂去粗皮等分上為細散每服二錢四日外熱酒調下四日內用童子小便調下柴胡地黃湯治産後惡露方下忽然斷絶晝日明瞭暮則譫語寒熱往來如見鬼狀此由熱入血室不即治之諸便不測北柴胡去蘆二兩半夏湯浸條參去蘆黃芩各一兩粉草五錢生乾地黃二兩上銼散每服四錢水一盞半生薑三片紅棗二枚煎服未效再服四物湯加北柴胡有痰加半夏治産後肚腹痛血不下用螃蟹並酒服之螃蟹腳爪破宿血止産後閃肚痛酒及醋湯煎服之治産後血不下用蒲黃三兩以水三升煎取一升頓服之血不下用酒煎治産後血不下用益母草搗絞汁每服一小盞入酒一合攪勻服治産後三四日惡血不下嘔逆壯熱皆由産後臟腑勞傷氣血虛損或胞絡狹瘀宿冷或産後當風取涼風冷乘虛而搏於血血壅則沸滯不宣積蓄在內故令惡露不下也一名蒲黃散芍藥十分知母八分生薑當歸蒲黃各四分紅花二分荷葉中心蒂七個生地黃汁上細切以水二升煎至七分去滓下蒲黃煎四沸分溫空心三服荷葉散療産後惡露不下腹中疼痛心神煩悶乾荷葉二兩鬼箭羽一兩桃仁半兩湯浸去皮尖雙仁麩炒微黃劉寄奴蒲黃各一兩上為粗末每服三大錢童子小便一大盞錢樣姜二片生地黃一分捶碎同煎至六分去滓無時熱服蕓薹散療産後惡露不下血結不散衝心刺痛將來才冒寒踏冷其血必來往心腹間刺痛有不可忍服之去塊但産後心腹諸疾並宜服之蕓薹子紙炒當歸桂心赤芍藥上各等分為末溫酒調服二平錢趕下惡物一方童子小便酒各半盞煎服産後惡露不下血氣壅痞脹痛不下食蘇木紫葛各一十二分芍藥當歸各八分桂心蒲黃各六分生地黃汁三合上㕮咀以水二升煎取七合下地黃汁分二服當歸血竭丸治婦人産後血物不下結聚成塊心胸痞悶及臍下堅痛也當歸炒銼血竭蓬莪朮炮芍藥各二兩五靈脂四兩上為細末醋麵糊為丸如梧桐子大每服四十丸溫酒下或粥飲下空心食前沒藥丹治産後惡物不下月候不行血刺腰腹急痛或一切傷垢沉積堅滿痞痛作發往來或燥熱煩渴喘急悶亂肢體疼倦大人小兒腹暴痛孕婦自利惡物過多不宜服燥熱極甚血液衰竭不可強行宜補氣養血細詳證用沒藥一錢當歸一兩牽牛二兩大黃一兩輕粉一錢官桂一分以上同為末硇砂一錢同研上研勻醋麵糊為丸如小豆大每服五丸至十丸溫水下以快利及積病下為度雖痢後病未痊者後再加取利止腹急痛煎乳香湯下乃止當歸散治婦人惡物不下當歸芫花炒上為末酒調三錢又方用好墨醋淬末之小便酒調益母草散治産後惡露不下在於腹中不散身體煩悶及腹內㽲刺疼痛不可忍益母草一兩赤芍藥桂心當歸銼微炒牛膝去苗川大黃銼碎微炒桃仁湯浸去皮尖雙仁麩炒微黃各半兩上搗篩為散每服三錢以水一鍾入生薑半分煎至六分去滓不計時候熱服當歸散治産後惡露不下氣攻心腹煩悶脅肋刺痛當歸三分銼微黃牡丹半兩牛膝半兩去苗薑黃半兩川大黃一兩銼微炒虻蟲一兩微炒黃去翅足生地黃三分琥珀半兩川芒硝一兩桃仁三分湯浸去皮尖雙仁麩炒黃肉桂三分去粗皮蒲黃三分虎杖半兩上搗粗羅為散每服三錢以水酒各半中盞入生薑半分煎至五分去滓不計時候稍熱服劉寄奴散治産後惡露不下腹內㽲刺痛疼日夜不止劉寄奴三分當歸三分銼微炒延胡索半兩蒲黃半兩肉桂三分去粗皮紅藍花半兩木香一分生乾地黃半兩焙桑寄生半兩赤芍藥半兩川大黃一兩銼微黃蘇枋木二分銼上搗粗羅為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候稍熱服蒲黃散治産後惡露不下心腹疼痛蒲黃一兩牛膝一兩去苗菴䕡子半兩桂心三分去粗皮鬼箭羽半兩川大黃半兩銼微黃桃仁三分當歸銼微炒上搗篩為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候稍熱服當歸散治産後惡露不下當歸三分銼炒微黃赤芍藥三分桂心三分川大黃三兩銼微炒桃仁一百二十個湯浸去皮尖雙仁麩炒微黃上搗粗羅為散每服四錢水一中盞煎至六分去滓不計時候熱服琥珀散治産後惡露不下疼痛琥珀半兩芫花一兩醋拌炒令乾虻蟲半兩微炒去翅足水蛭半兩微炒麒麟竭半兩沒藥一兩乾薑半兩炮製銼上搗細羅為散每服以酒一小盞醋半盞相和煎一兩沸不計時候調下二錢牛膝散治産後惡露不下致心腹疼痛煩悶牛膝一兩去苗琥珀三分桃仁一兩湯浸去皮尖雙仁麩炒黃羚羊角三分蒲黃半兩當歸三分銼微炒桂心半兩川大黃一兩銼微炒薑黃三分上搗羅為散每服以酒一盞入地黃汁一合煎三兩沸不計時服下一錢芫花散出聖惠方治産後惡露不下時或攻心腹疼痛不可忍芫花一兩醋拌炒令黃當歸一兩銼微炒薑黃一兩肉桂三分去粗皮蓬莪朮一兩凌霄花半兩醋拌微炒上搗細羅為散不計時候以熱酒調下一錢虻蟲散出聖惠方治産後惡露不下腹中疼痛不止虻蟲一百個水蛭一百個延胡索一兩赤鯉魚鱗二兩棕櫚皮一兩乾荷葉五片藕節一兩上搗碎一時入瓷瓶子內固濟了候乾燒令通赤冷了細研為散每服不計時溫酒調下一錢硇砂煎丸出聖惠方治産後惡露不下心腹脹疼硇砂一兩細研狗膽二個芫花一兩微炒以上二味用頭醋二升熬如調膏虻蟲半兩微炒去翅足水蛭半兩炒令黃麒麟竭半兩當歸半兩銼微炒琥珀三分上搗細羅為散入前膏中拌和為丸如梧桐子大每服不計時候以紅花酒下三丸鬼箭羽散出聖惠方治産後惡物不下鬼箭羽一兩當歸一兩銼微炒益母草半兩上搗羅為散每服以酒溫服下二錢治産後血閉不下用黃腳雞卵一枚打開取白加醋如白之半攪調吞之或産後勞力過度或下血頗多或微熱惡露來遲用馬尾大當歸洗一兩半上在未産前修製為末如遇産有疾即服若無疾但用童子小便調服令産婦月後並無他證果有神效治産後惡血不下兒枕不散小腹疼痛出大全良方細墨濃研半盞好醋半盞上入童子小便少許同煎至五七沸溫服不拘時沒藥一黑豆大細研治産後血少未經數日身下乾淨腹中余惡血未下非時氣痛攻心刺肋出護命方當歸芍藥牛膝牡丹皮去心各半兩芫花一兩楝子狼毒捶碎同芫花去器內醋煮乾炒黃黑色羌活獨活延胡索各一分上件藥先制芫花狼毒乳鉢內研令細更杵羅衆藥為末炒麵令熟都與藥末相滾令均滴熟水丸如梧桐子大非時薄醋湯下三十丸治産後余惡血未下因感風邪與熱血相搏壯熱頭痛面赤如醉人眼色痙急昏悶不醒身如在虛空見食即吐食不住腹宜吃此方出護命方麻黃去根三分麥門冬去心黃芩牡丹皮去心羌活大黃炮熟荊芥穗山梔射干各半兩官桂去皮一分上為細末不要熬只生杵每服二錢濃煎薄荷湯調下大腑祕熱出後不通煎前面藥二錢半取汁用調下牽牛末一錢半半夏末一字和滓吃大腑不熱不服牽牛半夏末琥珀地黃丸出永類鈐方治産後惡露不行憎寒發熱如瘧晝日明瞭暮則譫言當作熱入血室琥珀另研延胡索糯米炒去米當歸各一兩蒲黃四兩炒香生地黃裂汁留滓生薑各二斤研汁留滓生薑汁石器內炒地黃滓以地黃汁炒姜滓各令汁干上為末蜜丸彈子大空心當歸湯下兼服四物湯只用地黃加北柴胡煎未退再加小柴胡生地黃黃芩治産後血不出用懸鉤根皮濃煮汁服之
