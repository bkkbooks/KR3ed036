body:
  text: 卷四十四頭門總論夫人頭者諸陽之所聚諸陰脈皆至頸而還獨諸陽脈皆上至頭耳則知頭面皆屬陽部也且平居之人陽順於上而不逆則無頭痛之患陽逆於上而不順沖壅於頭故頭痛也風寒在腦邪熱上攻痰厥腎厥氣虛氣攻皆致頭痛但氣虛氣攻頭痛愈而復作延引歲月者多有之矣偏正頭風婦人氣盛血虛產後失血過多氣無所主皆致頭痛惟蠍附丸治氣虛氣攻頭痛尤合造化之妙其間所用附子取其助陽以扶虛鍾乳取其補陽以鎮墜全蠍取其鑽錐之義蔥白則取通行其氣湯使用以椒鹽蓋椒能下達鹽能引用使虛氣歸於其下對證用之無不作效者矣頭者諸陽之會上丹產於泥丸宮百神所集凡頭痛者乃是太陽受病上連風府眉角而痛者皆可藥愈或上穿風府陷入於泥丸宮而痛者是為真頭痛不可以藥愈夕發旦死旦發夕死責在根氣先絕也原其所因有中風寒暑濕而疼者有氣血飲食厥而疼者有五臟氣鬱厥而疼者治之之法當先審其三因三因既明則所施無不切當夫頭風者亦有陽氣虛弱及當風取涼外傷陽經致頭目昏痛眩不能起或頭皮腫癢或兩太陽穴痛眉稜骨痛嘔吐不可食起則頭眩或泥丸冷痹皆頭風證也頭面風者是體虛陽經脈為風所乘也諸陽經脈上走於頭面運動勞役陽氣發泄腠理開而受風謂之首風病狀頭面多汗惡風病甚則頭痛又新沐中風則為首風又新沐未乾不可以臥使頭重身熱反得風則煩悶診其脈寸口陰陽表裡互相乘如風在首久不瘥則風入腦則變為頭眩養生云飽食仰臥久成氣病頭風又云飽食沐發作頭風又云夏不用露面臥露墮面上令面皮厚喜成癬別有一種腦瀉亦緣風邪入於髓海凝滯不散化為膿輕則黃膿濁涕重則敗壞臭穢不可聞久而頭虛昏重莫舉亦有能致斃者治之之法不與頭風相類當用活血去膿補虛方可用內托散加川烏乾薑以酒調服仍用附子建中湯補虛更灸囟會通天穴左漏灸左右漏灸右脈訣云頭痛短澀應須死浮滑風痰皆易除頭痛附論夫諸陽之脈皆上行於頭面若人氣血俱虛風邪傷於陽輕入於腦中則令人頭痛也又有手三陽之脈受風寒伏留而不去者名厥頭痛厥者逆也言其脈厥逆而不順行逆壅而衝於頭故也又有入連在腦痛甚手足冷者名真頭痛由風寒之氣循風府而入於腦中故云入連在腦則痛不可忍其真頭痛不可療也又有風熱痰厥氣虛腎厥新沐之後露臥當風皆令人頭痛也方防風散出聖惠方治上焦風壅頭痛口乾煩熱防風一兩去蘆頭甘菊花一兩赤芍藥一兩石膏四兩葛根二一兩銼柴胡二兩去苗蔓荊子一兩甘草一兩炙微赤銼杏仁一兩湯浸去皮尖雙仁麩炒微黃上搗篩為散每服四錢以水一中盞入生薑半分煎至五分去滓入竹瀝半合更煎二三沸不計時候溫服忌炙爆熱面大蒜等上清散御藥院方治頭痛眉骨痛眼痛不可忍者川芎鬱金芍藥荊芥穗芒硝各半兩乳香沒藥薄荷葉各一錢腦子半錢上為細末每用一字鼻內搐之人參順氣散活人方治頭痛憎寒壯熱四肢疼痛麻黃去節一兩半乾葛甘草炙白朮人參桔梗去蘆香白芷各一兩乾薑炮片半兩上為末每服三錢水一盞姜三片蔥白二寸同煎連進取汗摩頂散一名附子摩頭散治風毒攻腦疼痛方見附子摩頭散麝香芽散治頭疼不已諸藥不效者茶芽一兩川芎細辛荊芥川烏甘草以上各半兩麝香少許上為粗末每服三錢水一盞半煎至八分去滓溫服食後神芎丸出危氏方治一切頭痛昏眩利咽膈能令遍身結滯通暢除痰飲解諸熱大黃黃芩各二兩黑牽牛炒白滑石各四兩黃連大川芎薄荷葉各半兩上為末水丸如小豆大溫水下十丸至十五丸日三服或煉蜜丸亦可六神散治頭痛眼睛痛雞蘇芎藭各二錢馬牙硝研石膏研乳香研各一錢龍腦研一字上為細末每用一字含水搐於鼻中芎藭湯治頭疼痛清氣芎藭五兩細辛去苗葉二兩半人參一兩半甘草炙三分半夏曲一分用生薑和半夏末作曲用上搗銼如麻豆每服三錢水一盞入生薑三片薄荷五葉同煎至七分去滓溫服不拘時候芎辛湯出三因方治一切頭疼但發熱者不宜服其餘痰厥飲厥腎厥氣厥等證偏正頭痛不可忍者只以此藥並如聖餅子服之不拘病退但多服自能作效若氣虛年高之人仍服養正丹黑錫丹並用此藥調鍾乳粉間服諸證頭痛簡捷之法無以逾此但頭疼多用石膏蓋取其能墜痰飲然恐性寒故以鍾乳粉代之腎厥頭疼尤得其治或疑鍾乳粉煅煉之藥則凡軟石膏煅過為末服之亦驗生附子生烏頭天南星乾薑細辛川芎各一兩甘草三分上㕮咀每服四錢水二盞姜三片茶芽少許煎至六分去滓食前服中脘素寒者不用茶芽若氣壅盛只用川芎一兩細辛半兩甘草二錢煎如前法一方治頭風以細辛二錢川芎白芷減半為細末搐入鼻中一方用高良薑曬乾不見火碾為細末口含冷水以少許搐入鼻中如此數搐即愈久患頭疼尤能作效一方治氣虛人頭疼以附子一隻生去皮切作數片用生薑自然汁一大盞浸一宿慢火炙乾再炙再蘸候滲盡薑汁為度高良薑等分為末臘茶調服名必效散一方用白芷四錢生烏頭一錢為末每服一字許茶湯調服有人患眼睛痛者先令含水次用此藥搐入鼻中其效尤驗治著濕者頭重眩暈用川芎白朮生附子各等分官桂甘草減半每服四錢姜十片煎服名芎術除眩湯千金方加防風一兩川芎羌活散治頭痛羌活二兩半細辛二兩川芎二兩藁本二錢荊芥二兩白芷半兩防風一兩半上為粗末每服二兩水煎去滓臨臥旋咽服旋覆花散出聖惠方治胸膈風壅上攻頭痛不止旋覆花半兩蔓荊子一兩石膏二兩枳殼二一兩麩炒微黃去瓤甘草半兩炙微赤銼甘菊花半兩上搗篩為末每服三錢水一中盞煎至六分去滓不拘時候溫服忌熱面炙爆物石膏丸出聖惠方治頭痛不止心神煩悶石膏一兩細研水飛馬牙硝半兩硫黃半兩太陰玄精石半兩雄黃半兩硃砂半兩上細研入麝香末一錢重研令勻用湯浸蒸餅和丸如梧桐子大每服五丸不計時候蔥茶下太陽丹出危氏方治頭疼傷寒感風氣積偏正夾腦一切頭疼及風壅痰盛得效方凡腦寒之病皆因邪攻於上焦令人頭痛晝夜引痛不能安寧川烏川芎白芷甘草各一兩石膏煅二兩腦子半錢上為末蜜為丸如指大硃砂為衣每服一丸薄荷湯嚼下食後得效方每兩作十八丸食後以生蔥茶嚼下或五丸以水磨爛塗患處一方出海上方治男子婦人一切頭痛不可忍者川芎藿香葉乾葛桔梗各半兩甘草一分軟石膏三二兩煅上㕮咀每服三錢水一盞半煎至一盞去滓溫服不拘時候連進二三服立止石膏散經驗方治頭疼不可忍如神效麻黃去根節秤一兩石膏一兩何首烏半兩乾薑七錢半川芎一兩上為細末每服四錢水一盞生薑三片同煎至七分去滓稍熱服極者三服必效白芷散一名搐藥鬱金散試效方治風熱頭痛石膏白芷各二錢薄荷葉芒硝各三錢鬱金一錢上為極細末口含水鼻內搐之烏罌散治諸種頭痛不可忍者川烏炮去皮臍罌粟殼去蒂蜜泡炒甘草橘皮各一半兩上粗搗每服三錢水一盞半煎至七分去滓溫服立效四川丸危氏方治頭疼如破大川烏一個生去皮臍川白芷川細辛去葉大川芎各一兩上為末韭菜自然汁丸黃丹為衣每服一丸細嚼蔥白淡清茶下寬中丸三因方治氣滯不快飲食不消胸膈痞塞凝痰聚飲狀如傷寒頭痛胸痞大附子炮去皮臍木香炮青皮大黃濕紙裹煨各等分上為末醋煮麵糊丸如梧桐子大每服十丸薑湯下頭疼甚則調救生散下天南星丸一名硫黃丸朱氏集驗方治厥頭痛齒痛骨寒胃脈同腎脈厥逆頭疼不可忍者硫黃研石膏研天南星炮焰硝各等分上為末麵糊丸如梧桐子大每服三十丸空心食前溫湯酒下藿香散三因方治傷風挾涎飲上厥頭疼偏正夾腦諸風藿香半兩川烏頭湯浸七次去皮尖一兩乳香三皂角子大草烏頭炮裂去皮尖一半兩上為末每服一字薄荷茶清調下食後服硫朱丹三因方治痰厥腎厥諸證頭疼百藥不效風頭痛太陽經受病上連風府眉角皆可藥治而愈如痛上穿風府又幹泥丸者是為真頭痛也藥不可愈腎厥頭痛或腦後有一道冷氣如冰厚衣被裹額上是也硫黃生研川烏去皮尖各半兩硃砂水飛二兩天南星一兩炮裂上為末薑汁煮糊丸如梧桐子大每服十五丸生薑薄荷湯下一方用硫黃硝石南星半夏制度治證如前玉真丸經驗良方治腎厥頭痛不可忍其脈舉之則弦按之則石堅生硫黃二兩別研石膏硬者不煅半夏湯泡七次一兩硝石別研各一兩上為細末研和勻生薑汁煮糊為丸如梧桐子大每服四十丸食前用薑湯或米湯下虛寒甚者去石膏用鍾乳粉一兩更灸關元百壯一名中黃丸素問云頭痛巔疾下虛攻實過在足少陰巨陽甚則入腎徇蒙招搖目瞑耳聾下實上虛過在足少陽厥陰甚則入肝下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝虛則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也故肝厥頭暈腎厥頭痛不同如此治肝厥有鉤藤散在一方治頭痛發歇不止出聖惠方蘿蔔一枚剜去中心留蓋子寒水石一兩硫黃一分細研膩粉一分上先將寒水石納蘿蔔中用蓋子蓋卻以泥裹候乾燒令通赤良久取出候冷去蘿蔔入二味藥同研令勻以湯浸蒸餅和丸如綠豆大每服五丸不計時候以新汲水下三生丸濟生方治痰厥頭痛半夏白附子天南星各等分上為細末生薑自然汁浸蒸餅為丸如綠豆大每服四十丸食後薑湯送下太白散仁存方治頭痛石膏煅二兩川芎半兩甘草一分上為末茶芽少許熱湯調二分食後服一方無甘草備急丸危氏方治積聚頭疼大黃乾薑巴豆去皮心出油上等分為末煉蜜為丸如豌豆大米飲下一丸羸人服半丸綠豆大以大便利為度楊梅散本事方定頭痛楊梅青硝石地龍干各等分上為細末搐鼻立效一方名附子散聖惠方治風毒攻注頭目痛不可忍者黑豆一合揀令淨附子一兩炮裂去皮臍別搗細篩為末生薑一兩與黑豆同炒豆熟為度上件藥以酒一大盞煎姜豆至七分去滓分為二服每服調附子末一錢不計時候服之又方聖惠方治頭痛不止丁香一分白芷半兩瓜蒂一兩上藥搗羅為散每用半字以來吹入鼻內即瘥一方出聖惠方治頭痛鼻塞頭目不利白殭蠶一分黃丹一分炒令紫色溺垽一分上搗羅為末用蔥白略以火煨令軟搗絞取汁先調藥末一遍曬令乾又調之如此三度丸如綠豆大每服五丸以冷茶下蠍附丸一名乳附全蠍散出澹寮方治氣虛頭痛大附子一枚全蠍二枚去毒鍾乳粉二三錢半上用附子剜去心安全蠍在附子內卻以余附為末同鍾乳粉面少許水和作劑包裹煨令熟併為細末蔥涎為丸如梧桐子大每服七十丸空心食前同椒鹽湯下一作散蔥茶湯下又方宣腦散川楝三分苦丁香二十個山梔子二個上為細末用一字鼻內搐之葫蘆巴散出三因方治氣攻頭痛如破葫蘆巴炮乾薑炮三稜銼醋浸一宿炒乾各一兩上為末每服二錢溫生薑湯或酒調下凡氣攻頭痛如破者或瘴瘧瘥後頭痛呼號服之即愈一方用生薑一方本事方治一切頭疼防風川芎各半兩附子七分重者一個炮去皮臍上為末每服一字荊芥薄荷茶調下一方本事方治丈夫婦人風虛頭疼氣虛頭疼婦人胎前產後傷風頭疼一切頭疼並皆治之茵陳五兩揀淨麻黃石膏煅留性各二兩上為末每服一錢臘茶調下食後服服畢仰臥霎時細辛散出聖散方治頭疼眼睛痛一方治頭痛不可忍童子小便一盞豉心半合上件藥同煎至五分去滓溫溫頻服恆山散出聖惠方治頭痛往來寒熱心膈痰壅宜服恆山一兩搗羅為末雲母粉一兩上件藥相和研令勻每服以溫水調下一錢良久當吐如吐未快即再服之一方用鹽湯調下治頭痛不止宜服出聖惠方伏龍肝一兩附子半兩炮裂去皮臍上搗羅為散每服以冷水調下二錢一方溫酒調下亦治齒痛又方一名烏頭散出聖惠方川烏頭一枚炮裂去皮臍搗令碎生薑一分切上以水一中盞煎至五分去滓入蜜半合相和服之又方出聖惠方胡粉半兩硫黃一兩分切上件藥同研令細以軟飯和丸如梧桐子大當頭痛時以冷水下五丸良久服之治頭痛鼻塞頭目不利宜服出聖惠方牛酥三分川朴硝二兩細研上藥同研令勻頻用少許點鼻內瘥又方出聖惠方附子一枚生去皮臍地龍一分上搗為末每用一字以生薑汁調塗兩眼角及頂上一方地龍膏又方出聖惠方龍腦半分鐵粉二兩上細研令勻每於食後以新汲水調下半錢薤根丸出經驗良方治頭疼眼痛如刀刺大川烏去皮尖微炒全蠍糯米炒各等分上為末薤根汁丸每服十五丸薄荷茶清食後下神砂丸出本事方治頭痛及腦風硫黃鹽各等分上為末水調生面為丸如梧桐子大每服十五丸用薄荷茶食前下荊芥酒亦得附子方出澹寮方治頭痛附子炮石膏煅各等分上為末入腦麝少許茶酒下半錢附芎散出本事方治風虛頭疼大川芎二個銼作四十片大附子一個和皮生為末上以水和附子末如面劑裹芎作四處如附子末少入少麵裹畢以針穿數孔用真腦麝熏有穴處內香後再捻合其穴如未覺內有香即再熏一炷細羅灰用銚子內熱灰炮熟末之每服半錢蔥茶湯下不拘時候芎術湯出御藥院方清神爽志祛風消積治頭目昏痛止鼻塞聲重川芎二兩半天台烏藥白朮二兩七錢半上為粗末每服三錢水一盞入生薑五片煎至七分去滓稍熱服或細末白湯點亦得芎烏散一名芎香散治男子氣厥頭疼婦人氣盛頭疼及產後頭痛悉主之鮑氏方川芎天台烏藥一作用香附代烏藥上等分為末每服二三錢臘茶清調服或用蔥茶湯調服食後止痛太陽丹出醫方大成川芎天南星各等分上為細末用蓮鬚蔥白搗爛調藥末貼於太陽痛處治氣攻上頭疼不可忍者蓖麻子乳香上搗貼太陽穴上如痛定急去頂上解開發出氣即去藥治頭痛不可忍方上用蒜一顆去皮研取自然汁令病人仰臥垂頭以銅箸點少許瀝入鼻中急令搐入腦眼中淚出瘥栝蔞方治熱病頭疼發熱進退用栝蔞一枚大者取瓤細銼置瓷碗中用熱湯一盞沃之蓋良久去滓不計時候頻服蜂房方治頭痛煩熱口乾小便赤少用蜂房十二分炙水二升煎取八合分為二服當利小便惡毒隨小便出又方治飲酒頭痛用竹茹三兩水五升煮取三升去滓令冷納打破雞子三枚攪調更煮三沸飲之朴硝方出百一選方治時氣頭痛不止方見朴硝散立效散專治氣虛頭痛用上春茶末調成膏置瓦盞內覆轉以巴豆四十粒作二次燒煙燻之曬乾用乳缽研爛為末每服一字別入好茶末食後點服治頭痛出肘後方用水調決明子貼太陽穴一方作枕去頭風明目葛根方治時氣頭痛壯熱上用生葛根淨洗搗取汁一大盞豉一合煎至六分去滓不計時候分作二服汗出即瘥未汗再服若心熱加梔子仁十枚同煎去滓服茗葉方出肘後方治猝頭痛如破非中冷非中風其病是胸膈有痰厥氣上衝所致名為厥頭痛吐之即瘥上用煮茗作飲二三升適冷暖飲一二升須臾吐吐畢又飲能如此數過劇者須吐量汁乃止不損人待渴即瘥治頭痛不可忍者是多風痰所致用梔子末和蜜濃敷舌上吐即止神效一方出肘後方治頭痛欲死上用硝石末吹鼻內愈當歸方出肘後方治頭痛欲裂上用當歸二兩清酒一升煮取六合飲至再服治年深日近太陽穴痛上用酒薄荷共磨貼太陽上芎辛丸出本事方治頭痛面赤煩悶咽乾上膈風痰頭目暈昏百節疼痛背項拘急川芎防風殭蠶獨活各一兩桔梗三兩天麻四兩細辛白附子羌活甘草各半兩薄荷荊芥各一兩半上為細末煉蜜和丸如彈子大每服一粒茶酒吞下食後龍腦丸治頭痛頭旋眼花及喉痹纏喉風等龍腦研丹砂研馬牙硝研各一分麝香研半錢上同研勻細於碟內盛用羊膽滴汁入藥中旋和成丸如黑豆大以淨合盛每用一粒以蘆管吹入鼻中以手小指推近鼻上兩鼻皆如此就枕仰臥少時候藥溶入腦涎唾從喉內出其病立瘥治頭痛或偏攻一邊痛不可忍出聖惠方苦參一分銼半夏一分桂心一分上為細末以米醋調如糊塗故帛上當痛處貼之神效石膏湯治頭痛石膏碎莎草根炒去木毛天麻藿香葉各一兩上粗搗篩每服三錢水一盞入臘茶半錢煎至七分去滓溫服不拘時候神朱石膏丸治頭痛石膏煅二兩芎藭一兩龍腦少許研上為細末用麵糊和丸如櫻桃大丹砂為衣細嚼一丸茶酒任下食後服烏星膏出肘後方治太陽穴痛不可忍川烏南星桂心上為末酒調塗敷痛處通頂散治頭痛鼻塞胸悶藜蘆研半兩黃連去須三分上為散每用少許搐入鼻中治猝頭痛如破上以鹽湯探吐不吐摘出又云生熟湯先作一升湯復投水一升及食鹽三合以此湯送之如未出盡更服二合湯二升良麝香散治頭痛不可忍吹鼻上用藜蘆和州者一莖曝乾搗為散入麝香如麻子大許研勻吹鼻中龍珠丸治頭痛目眩及喉痹纏喉風等上用長蚯蚓不拘多少五月五日取以龍腦麝香相和研勻丸如麻子大每用生薑汁塗鼻中逐邊各納一丸立愈治落枕方用香白芷為末搗生薑自然汁調敷患處次用厚衣被蓋頭飲少熱粥湯取汗出即愈導引法養生方云一手拓頤向上極勢一手向後長舒急努四方顯手掌一時俱極勢四七左右換手皆然拓頤手兩向共頭欹側轉身二七去臂膊頭風眠睡又云解發東向坐握固不息一通舉手左右導引手掩兩耳治頭風令發不白以手復捋五通脈也又云熱食枕手臥久成頭風目澀又云端坐伸腰左右傾頭閉目以鼻內氣除頭風自極七息止又云頭痛以鼻內徐吐出氣三十過休又云欲治頭痛閉氣令鼻極偃臥乃息汗出乃止又云叉兩手頭後極勢振搖一七手掌翻覆按之二七頭欲得向後仰之一時一勢欲得欹斜四角急挽之三七去頭腋膊肘風方石膏散治頭痛不可忍麻黃去根節石膏各一兩何首烏半兩乾葛七錢半上為細末每服三錢生薑三片水一盞半煎稍熱服寸金散出續易簡方治一切頭疼未為盡善若風熱痰作痛不已天麻川芎白芷藿香防風人參各半兩雄黃三錢研地龍去土秤一分甘草一分蠍炒一分上為細末每服半錢茶酒調下食後服立效若風寒客於頭中偏痛無時久久牽引兩目遂致失明宜用白附子一兩炮麻黃不去節川烏炮去皮尖天南星各半兩全蠍五個去毒乾薑炮硃砂水飛麝香各一兩為細末酒調一字服之去枕少時若偏頭風痛不可忍用細辛一兩雄黃半兩別研為細末每服用一字如左邊痛搐右鼻右邊痛搐左鼻瘥選奇湯治眉骨痛不可忍東垣先生蘭室秘藏方羌活二錢防風三錢甘草根二錢夏月生冬月炙黃芩一錢酒浸冬月不用此一味如能食熱痛加之上㕮咀每服三錢水二盞煎至一盞去滓稍熱食後時時服之太陽頭痛惡風寒川芎少陽頭痛脈弦細往來寒熱柴胡陽明頭痛自汗發熱惡寒白芷太陰頭痛必有痰體重或腹痛為痰癖半夏少陰頭痛手三部三陽經不流行而足寒氣逆為寒厥頭痛細辛厥陰頭項痛或吐痰沫厥冷其脈浮緩吳茱萸諸血虛頭痛川芎諸氣虛頭痛黃耆諸氣血俱虛頭痛黃耆以上俱出衛生寶鑑治頭痛傷風偏正夾腦太陽穴痛或涎痰不利出衛生寶鑑白芷細辛川芎各等分龍腦牛黃雄黃各少許上各為末用少許搐鼻大解暑毒可用黑錫丹出海上方治真頭痛茴香炒附子制葫蘆巴破故紙炒楝子巴戟以上六味各一兩木香沉香肉豆蔻制桂以上四味各半兩錫硫砂四兩上為末同砂子末酒糊丸如梧桐子大陰乾布袋擦令光瑩每服四十粒空心姜鹽湯下一方有陽起石麻黃吳茱萸湯出試效方治頭痛胸中痛食減少咽嗌不利右寸脈弦急麻黃半錢吳茱萸三分黃芩二分川芎一分羌活五分蔓荊子一分細辛一分藁本二分柴胡一分黃耆三分蒼朮一錢黃連一分半夏一分黃柏二分升麻三分紅花少許當歸二分上件搗細都作一服水二盞煎至一盞去滓稍熱食後服太陽經嚏藥出試效方防風二分羌活二三分紅豆三二個上為細末鼻內搐之紅豆散出試效方治頭重如山此濕氣在頭也麻黃苦丁香半錢紅豆半個羌活根燒連翹各三分上五味為細末鼻內搐之神效順氣和中湯出衛生寶鑑黃耆一錢半君人參一錢使白朮五分佐陳皮五分使當歸五分白芍藥五分使炙甘草七分佐升麻三分引柴胡三分引川芎二分使細辛二分使蔓荊子二分使上銼如麻豆大都作一服水二盞煎至一盞去滓溫服食後參謀柏德仲實年六十一歲壬子歲二月間患頭痛不可忍晝夜不得眠郎中曹通甫邀往視之其人云近在燕某患頭昏悶微痛醫作傷寒解之汗出痛轉加復並解二服痛尤甚遂還家每過郡邑醫藥雷同到今痛甚不得安臥惡風寒不喜飲食診其脈弦細而微氣短促懶語言內經曰春氣病在頭年高氣弱清氣不能上升頭面故昏悶本無表邪發汗數四清陽之氣愈虧損不能上榮亦不得外固所以頭苦痛苦風寒不喜飲食氣短弱宜升陽補氣頭痛自愈名之曰順氣和中湯內經曰陽氣者衛外而為固也今年高氣弱又加發汗衛外之氣愈損故以黃耆甘溫補衛實表為君人參甘溫當歸辛溫補氣補血芍藥酸寒收衛氣為臣白朮陳皮炙甘草苦甘溫養胃氣生髮陽氣上實皮毛肥腠理為佐柴胡升麻苦平引少陽陽明之氣上升通百脈灌溉周身者也川芎蔓荊子細辛溫體輕浮清利空竅為使也之減半再服而愈明年春赴召至六盤山曹郎中以古風贈云東垣李明之嘗以能醫鳴易水得奧訣為竭黃金籯一燈靜室窮內經黃帝拊掌岐伯驚日儲月積不易售半世但能三折肱所長用藥有活法舊方堆案白魚生不聞李延同居且同病一下一汗得其平乃知古人證合方後世方合證此理殊未明公心審是者誰子直以異己喧謗聲先生飲恨臥黃壤門生卓卓醫中英活人事業將與相一旦在己權非輕連年應召天策府廉臺草木皆欣榮好藏漆葉青黏散莫使樊阿獨植名大柴胡湯出指南方治頭痛柴胡黃芩芍藥甘草炙各三兩半夏二兩半湯洗七次大黃二兩枳實一兩麩炒去瓤上為粗末每服五錢水二盞姜十片棗二個同煎一盞去滓溫服苦茶散出指南方治頭痛用苦茶一合水三盞煎一盞半絞汁熱服愈草烏頭散出指南方治頭痛茶芽細辛各一兩草烏頭半兩炮上為粗末每服三錢水三盞煎至一盞去滓溫服玉壺丸出指南方治痰飲頭痛雄黃細研藜蘆去苗為末丹砂研巴豆去皮心出油礬石黃泥裹燒灰研如面細八角附子各等分上同研勻以清明吉日煉蜜和丸杵三五百下丸如豌豆大每服一粒米飲下早晨臨臥痰在胸上以熱物投之則吐積痰在下則利永除根本一服未知再服以知為度姜附湯出指南方治腎厥頭痛大附子不去皮臍生薑半兩上㕮咀以水一升煎至半升分三服清上瀉火湯出蘭室秘藏方燕京溫官人年少時氣弱常於氣海三里節次灸之約五七十壯至半老添熱厥頭痛雖冬天大寒猶喜寒風其頭痛則愈微來暖處或見煙火其痛復作五七年不愈皆灸之過也羌活根三錢防風七分柴胡根半錢藁本半錢細辛少許川芎二分升麻七分荊芥穗七二分蔓荊子三分黃連酒浸半錢黃芩酒浸一錢半黃耆一錢黃柏酒浸一半錢知母一錢半酒浸蒼朮三分炙甘草一錢生地黃半錢當歸身三分紅花少許甘草根半錢上件銼如麻豆大分作二服每服水二盞煎至一盞去滓稍熱服食後補氣湯出蘭室秘藏方服前藥之後服此藥黃耆八分炙甘草四分當歸身二錢升麻三分柴胡一分紅花少許上件銼如麻豆大每服秤五錢水二大盞煎至一盞去滓稍熱服食前白芷散朱氏集驗方治頭痛及目睛痛白芷四錢生烏頭一錢上為末每服一字茶調服有人患眼睛痛者先含水次用此藥搐入鼻中其效更速細辛丸出朱氏集驗方治頭痛久不瘥烏梅藁本川芎北細辛甘草各半兩上為末石膏半斤研細入鍋子內火煅過飛去石末滴石膏水和丸彈子大茶酒任下一丸無時候葛根蔥白湯出危氏方治頭痛不止葛根白芍藥知母各半兩川芎生薑各一兩蔥白一握上銼散水三升煎取一升半去滓每服一盞半熱服參蘇飲出如宜方治頭痛發熱咳嗽痰稠凝痰為熱木香枳殼桔梗甘草炙陳皮制各半兩紫蘇葉乾葛半夏制前胡人參茯苓各七錢半上藥㕮咀以姜七片棗一枚水二盞煎至一盞去滓熱服氣盛者去木香以參蘇飲對四物湯名茯苓補心湯治咳嗽有血本方又治婦人妊娠惡阻升麻葛根湯出如宜方治頭疼發熱肢體疼痛疑疹病升麻白芍藥葛根甘草各等分上㕮咀水煎溫服或鄰家有痘證亦宜服內用白芍藥甚穩金沸草散出如宜方治頭目昏疼發熱鼻塞清涕咳嗽痰稠荊芥穗四兩半夏制甘草各一兩麻黃制前胡旋覆花各三兩赤芍藥一兩上㕮咀薑棗煎熱服如頭久疼作苦及偏正頭疼宜川芎一兩香附二兩為末茶清調下子瞻記王荊公述治頭痛法軾聞荊公云僕平昔苦頭痛有道人教云取生萊菔汁一蜆殼許注鼻中移時立效果驗如神以此法治人不可勝數張粹道治頭痛法予與陳孚先史聖自應靈步月而歸龍德井至曉三人並頭痛粹道於筐箱中探得大烏頭二枚去皮急蒸過細切焙乾為末以好細茶滾過薑湯煎予與史各一服愈孚先二服方瘥加之吐逆故也藍機聖砭腦膏出江陽方治兩額角並頭頂痛桂附子半夏各等分並生用上以薑汁調膏貼之芎茶湯出聖惠方治氣虛頭痛上用好川芎半兩為末每服二錢臘茶清調下甚捷曾有婦人產後頭痛一服愈清香散出楊氏家藏方治三陽伏留風邪頭痛不可忍附子炮去皮臍白附子炮川烏頭炮去皮臍尖當歸洗焙上四味各一兩天竺黃天麻去苗肉桂去粗皮硃砂別研山藥以上五味各半兩腦子一錢別研麝香半錢別研上件為細末每服一錢薄荷茶調下不拘時候更生散出楊氏家藏方治風壅上攻頭疼目昏項背拘急白附子炮二兩天南星二兩同白附子研碎用新水浸三日每日換水取出焙乾羌活二三兩去蘆頭川芎二兩雄黃三錢別研水飛生腦子半錢別研硃砂三錢別研水飛麝香一錢別研白殭蠶一兩炒去系嘴上件為細末每服二錢溫酒調下茶調亦得食後服玉真丸出指南方治腎厥頭痛石膏火煅通赤放地上出火毒半夏各一兩硫黃半兩細研上為末研勻薑汁煮糊為丸如梧桐子大每服三十六粒食前生薑湯下中書左丞姚公茂年六十七歲宿有時毒至元戊辰春因酒再發頭面赤腫而痛耳前後尤甚胸中煩悶咽嗌不利身半已下皆寒足胻尤甚由是以床炕相接身半以上臥於床身半之下臥於炕飲食減少精神困弱脈得浮數按之弦細上熱下寒明矣內經云熱勝則腫春氣者病在頭難經云熱在頭身宜砭刺之取其易散故也遂於腫上約五十餘刺其血紫黑如露珠之狀頃時腫痛消散又於氣海穴中大艾炷灸百壯乃助下焦陽虛退其陰寒次於三里二穴中各灸三七壯治足胻冷亦引導熱氣下行故也遂處方云熱者寒之然病有高下治有遠近無越其制度君以黃芩黃連苦寒酒製炒亦為用以瀉其上熱桔梗甘草辛甘溫上升佐諸苦藥以治其熱柴胡升麻苦平味之薄者陰中之陽散發上熱以為臣連翹苦辛平以散結消腫當歸身辛溫和血止痛大黃苦寒酒煨引苦性上行至巔驅熱而下以為使也投劑之後腫痛全減大便利再服減大黃慎言語節飲食不旬日痊愈既濟解毒湯出衛生寶鑑治上熱頭目赤腫而痛胸膈煩悶不得安臥身半以下皆寒足胻尤甚大便微秘桔梗炙甘草黃芩酒製炒黃連酒製炒大黃煨二錢大便利勿用柴胡去苗升麻去腐當歸身各一錢連翹一錢上件銼如麻豆大都作一服水二盞煎至一盞去滓食後溫服忌酒濕面大料物之類及生冷硬物治頭痛出本草以石膏和蔥煎茶服治猝頭痛出本草以皂角末吹入鼻中令嚏則止治人初得頭痛出本草以人溺數升飲之亦多愈合蔥豉作湯彌佳治熱煩痰結頭痛明目鎮心出本草用戎鹽水研服之治頭痛利丈夫助陰力出本草用薯蕷為末和麵作餺飥食之及熱煮和蜜或為湯煎或為粉食之治頭重心燥背膊勞悶出本草以荔枝食之治病酒頭痛出本草以水豆花與豉同煮五味調和作羹食之石膏散出衛生寶鑑治頭痛川芎石膏研碎白芷上各等分為細末每服四錢茶清調下偏頭痛附論夫偏頭痛之狀由風邪客於陽經其經偏虛者邪氣湊於一邊痛連額角故謂之偏頭痛也夫偏頭痛者由人氣血俱虛客風入於諸陽之經偏傷於腦中故也又有因新沐之後露臥當風或讀書用心目勞細視經絡虛損風邪入於肝而引目系急故令頭偏痛也方芎犀丸治偏頭痛一邊鼻塞不聞香臭常流清涕或作臭氣一陣加芎蠍等遍服無效服此不十數服或作嚏突出一梃稠膿即愈石膏細研四兩生龍腦別研硃砂研飛四兩內一兩為衣生犀角一兩人參去蘆二兩茯苓去皮二兩川芎四兩阿膠碎炒一兩半細辛去苗二兩麥門冬去心三兩甘草炙二兩山梔子一兩上除別研藥後入併為末煉蜜丸每服一丸至二丸細嚼茶酒任下食後服搐藥治偏頭痛眼疾蒼耳即道人頭薄荷葉盆硝石膏各一錢亂文者水飛乳香華細辛貫眾各等分上為細末晨午夕三時搐之天南星散治偏頭痛南星半兩乾薑二錢白附子三錢麻黃一錢半全蠍三個硃砂一分麝香一分上為細末酒調服服後側臥令痛處半邊在下天南星散治偏頭痛天南星酸漿水煮透心軟切曝乾一兩菊花三分自然銅燒赤醋淬一兩防風半兩用水一盞同菊花自然銅防風三味煮水盡為度去防風自然銅不用只用菊花芎藭一兩上除二味不用外搗羅為細散每服半錢匕臘茶清少許調只作一口呷盡分作三咽點頭一咽四神散治偏頭痛地龍去土炒干蝦蟆燒灰存性各一錢藜蘆半錢龍腦研少許上除龍腦外搗羅為細散再研勻每用半字許先滿口含水男左女右搐半字入鼻內揉痛處良久痛定川芎散治偏頭疼神效甘菊花石膏川芎各三錢白殭蠶半錢生用上為細末每服三錢茶清調下一方無白殭蠶忌豬肉蕎麵細辛散治偏頭疼連牙齒風痛不可忍細辛去苗葉夏枯草各三錢蓽茇高良薑各一錢上為細散每用少許隨痛左右搐入鼻內如牙疼用時須開口流涎不得噴候涎盡以冷水點臘茶飲之神聖散治偏頭痛不可忍治偏頭痛方蚱蟬二枚生用乳香半分細研硃砂半分細研上以蟬研取汁都和丸如小豆大頭痛發時左邊痛內在左鼻中右邊痛內在右鼻中出青黃水為效白雪丹治偏頭痛硝石一兩硫黃一兩白礬一兩上以瓶子一個先下硝石次下硫黃後下白礬其瓶蓋上留一小竅先掘一地坑內更著水瓶子一個坐令安穩便將藥瓶坐於水瓶上用泥密固之以慢火逼之候竅中相次煙出盡即卻泥之後用大火煅令通赤候冷開瓶取出藥於紙上攤用甘草水灑地令濕以盆合之二日出火毒了細研用綠豆粉以水調和丸如梧桐子大每於食後以冷水下五丸丁香散治偏頭痛丁香一粒大者研棘針倒鉤者四十九枚燒灰存性為末麝香一皂子大上同研勻以紙捻搵藥隨痛左右搐之烏豆散治久患偏頭痛草烏頭尖一分生用赤小豆三十五粒麝香一分研上除麝香外為細末研勻每服半錢煎薄荷茶清放冷調下更於痛處一邊鼻內搐藥少許治偏頭痛方旋覆花半兩萆薢半兩銼虎頭骨半兩酥炙令黃上為細末欲發時以溫酒調下三錢衣蓋出汗立瘥又方一名吹鼻散生薑汁二合於瓷器中煅令乾為末桂心末一字麝香一字上同研令細每服用少許吹入鼻中即瘥烏金丸出聖惠方治偏頭痛皂莢二兩燒灰細研石膏二兩細研水飛過上都研令勻以軟飯和為丸如梧桐子大每服以薄荷湯下十五丸又方出聖惠方硇砂一分細研豉心一分入湯少許浸令軟上都搗和為丸如皂莢子大以綿裹露出一頭頭左邊痛將藥納左邊鼻中如右邊痛即納右邊鼻中即瘥治夾腦風及頭偏痛方出聖惠方蕓薹子一分川大黃三分上為細末每取少許吹鼻中後有黃水出其疾永瘥如有腫麻以釅醋調塗之亦效治頭偏痛不可忍方出聖惠方蓖麻子半兩去皮棗十五枚去核上都搗令勻塗在紙上用箸一隻卷之去箸納在鼻中良久取下清涕治偏頭痛方出聖惠方苦葫蘆子一合鬱金一顆上為細末用白絹子裹藥末一錢於新汲水內浸過滴向患處鼻中得黃水出瘥硫黃丸一名如神丸出聖惠方治頭痛並中暑硫黃一兩硝石一兩上同研入銚子內熔作汁候冷取出更入石膏末一兩又同研令細用軟粳米飯和丸如梧桐子大每服以溫水下五丸頻服之瘥一方空心臘茶下一丸如神陳州懷醫用藥如梧桐子大每服十五丸中暑者冰水下咽即灑然傷冷即以艾湯下通頂散出聖惠方治偏頭痛硝石一分滑石一分上於銚子內同研令黃色候冷細研為末每用少許吹入鼻中瘥立效散出聖濟總錄治偏頭疼地龍去土炒為末一兩麝香研少許上同研勻每服半錢糝紙上作紙捻於燈上燒隨痛左右熏鼻中乳香散出聖濟總錄治偏頭痛不可忍乳香如皂子大高良薑如指頭大上於火上燒煙燻鼻隨痛左右用之至靈散治偏頭痛治偏頭痛連睛頭痛出濟生拔萃石膏黍黏子炒上為末茶酒調下食前治婦人病頭痛出經驗良方上用香附子為末每服三錢臘茶調下食後日三五服一用建茶神妙方經驗良方治偏頭風痛上用生蘿蔔汁仰臥注鼻中左痛注左右痛注右左右頭痛兩鼻皆注數十年病皆能愈一方出海上方治偏頭風上用白芥子一兩研細醋面調攤紙上貼於痛處仙靈脾浸酒方治偏頭風手足不遂皮膚不仁宜服上用仙靈脾一斤好者細銼以生絹袋盛於不津器中用無灰酒二斗浸之以厚紙重重密封不通氣春夏三日秋冬五日後旋開每日隨性暖飲之常令醺醺不得大醉若酒盡再合服之無不效驗合時切忌雞犬見之又方出肘後方治偏頭痛上用京芎細銼酒浸服之佳一方用臘茶調下甚捷蓽茇方出朱氏集驗方治偏頭痛及風上以蓽茇為細末每用一字先令病人滿口含溫水然後用藥搐入鼻中效左邊疼令左鼻吸一字右邊疼令右鼻吸一字絕妙治偏頭疼方出聖濟總錄上以芫花不拘多少釅醋浸一宿焙乾搗羅為末或左邊疼即於左鼻吸藥或右邊痛即於右鼻吸藥一字入藥時先含水一口防流入喉內鼻中涕泣出即瘥川芎散治風盛煩壅鼻塞清涕熱氣攻眼下淚多眵齒間緊急作偏頭痛川芎柴胡各一兩半夏曲甘草炙甘菊細辛人參前胡防風各半兩上為粗末每服四錢水一盞生薑四片薄荷五葉同煎至七分去滓溫服通關散治偏頭疼一字散治偏頭疼不可忍者乳香別研延胡索盆硝別研以上三味各一錢川芎三錢雄黃三錢別研上件為細末每用少許左疼搐左鼻右疼搐右鼻即愈細辛散治偏頭痛細辛二一分川芎七分柴胡二錢炒黃芩一錢黃柏三錢酒洗生黃芩半錢瓦粉二錢甘草一錢半炙黃連七分酒浸芍藥半錢上為粗散每服二錢或三錢水一大盞半煎至一盞取清食後服之如聖散治眼目偏痛及頭風麻黃燒灰半兩盆硝二錢半麝香腦子各少許上件為細末鼻內搐之神效通關格下肺壅除上虛熱止偏頭疼進食藿香煮散方藿香楝子人參桔便枳殼去白麥門冬去心旋覆花去萼各半兩白朮半夏薑汁煮令透焙黃青橘皮木通草柴胡麻黃去根甘草各一分桑白皮二分上件藥並銼焙乾杵粗篩為煮散食後水一盞生薑二片煎兩錢取八分去滓熱服重煎一度服大腑秘則加郁李仁十五枚拍碎同煎食後服
