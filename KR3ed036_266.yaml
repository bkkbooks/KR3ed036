body:
  text: 卷二百六十六服餌門養性法附論扁鵲云黃帝説晝夜漏下水百刻凡一刻人百三十五息十刻一千三百五十息百刻一萬三千五百息人之居世數息之間信哉嗚呼昔人嘆逝何可不為善以自補邪吾嘗思一日一夜有十二時十日十夜百二十時百日百夜一千二百時千日千夜一萬二千時萬日萬夜一十二萬時此為三十年若長壽者九十年只得三十六萬時百年之內斯須之間數時之活朝菌蟪蛄不足為喻焉可不自攝養而馳騁六情追名逐利千詐萬巧以求虛文言沒齒而無厭故養性者知其如此於名利若存若亡於非名非利亦若存若亡所以歿身不殆也余慨時俗之多僻恣放逸以殞亡聊因暇日粗述養性篇用獎人倫之道好事君子與我同志焉夫養性者欲所習以成性性自為善不習無不利也性既自善內外百病自然不生禍亂災害亦無由作此養性之大經也善養性者則治未病之病是其義也故養性者不但餌露餐霞其在兼於百行周備雖絶藥餌足以遐年德行不充縱服玉液金丹未能延壽故老子曰善攝生者陸行不遇虎兕此則道德之佑也豈假服餌而祈遐年哉聖人所以製藥餌者以救過行之人也故愚者抱病歷而不修一行纏疴沒齒終無悔心此其所以故岐和長逝彭跗永歸良有以也稽康養性有五難名利不去為一難喜怒不除為二難聲色不去為三難滋味不絶為四難神慮精散為五難五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能回其天不夭其年也五者無於胸中則信義日躋道德日全不祈善而有福不求壽而自延此養生之大旨也然或有服膺仁義無嗜欲之纍者抑亦其亞歟黃帝問於岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時代異耶將人失之也岐伯曰上古之人其知道者法則陰陽和於術數飲食有常節起居有常度不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人則不然以酒為漿以妄為常以醉入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生藥起居無節故半百而衰也夫上古聖人之教也下皆為之虛邪賊風避之有時恬淡虛無真氣縱之精神內守病安從來是以其志間而少欲其心安而不懼其形勞而不倦氣從以順各從其欲皆得所願故甘其食美其服藥其俗高下不相慕故其民日朴是以嗜欲不能勞其目淫邪不能惑其心知愚賢不肖不懼於物合於道數故皆度百歲而不衰者其德全不危也是以人之壽天在於撙節若消息得所則長生不死恣其情欲則命同朝露也岐伯曰人年四十而陰氣自半也起居衰矣年五十體重耳目不聰明也年六十陰痿氣力大衰九竅不利下虛上實涕泣俱出故曰知之則強不知則老同出名異智者察同愚者察異愚者不足智者有餘有餘則耳目聰明身體輕強年老復壯壯者益理是以聖人為無為之事樂恬淡之味能從欲快志得虛無之守故壽命無窮與天地終此聖人之治身也春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩行以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變則奉長者少矣夏三月此謂蕃秀天地氣交萬物華實夜臥早起毋厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧則奉收者少矣冬至重病秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平勿外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄則奉藏者少矣冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫毋泄皮膚使氣亟奪此冬氣之應養臟之道也逆之則傷腎春為痿厥則奉生者少矣天有四時五行以生長化收藏五行御五位以生寒暑燥濕風人有五臟化為五氣以生喜怒憂思恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽故喜怒不節寒暑失度生乃不固人能依此攝養故得免其夭枉也仲長統曰王侯之宮美女兼千卿士之家侍妾數百晝則以醇酒淋其骨髓夜則房室輸其血氣耳聽淫聲目樂邪色宴內不出遊外不返王公得之於上豪傑馳之於不及至生産不時字育太早或童孺而擅氣或疾病而構精精氣薄惡血脈不充既出胞藏養護無法又蒸之以綿纊爍之以五味胎傷孩病而脆未及堅剛復縱情欲重重相生病病相孕國無良醫醫無審術姦佐其間過膠常有會有一疾莫能自免當今少百歲之人者豈非所習不純正也抱朴子曰或問所謂傷之者豈色欲之間乎答曰亦何獨斯哉然長生之要其在房中上士知之可以延年除病其次不以自伐若年當少壯而知還陰丹以補腦採七益於長俗者不服藥物不失一二百歲也但不得仙耳不得其術者古人方之於凌杯以盛渴羽苞之蕃人又且才所不逮而強思之傷力所不勝而強舉之傷深憂重患者傷也悲哀憔悴傷也喜樂過度汲汲所欲傷也戚戚所患傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沉醉中吐傷也飽食即臥傷也跳走踹乏傷也歡呼哭泣傷也陰陽不交傷也積傷至盡盡則早亡盡則非道也是以養性之道唾不至遠行不疾步目不極視耳不傾聽坐不久處立不至跛臥不至悸先寒而收先熱而解不欲極飢而食食不可過飽不欲極渴而飲飲不可過多飽食過多則結積聚渴飲過多則成痰瘕不欲甚勞不欲甚佚不欲流汗不欲多睡不欲奔走車馬不欲極目遠望不欲多啖生冷不欲飲酒當風不欲數數沐浴不欲廣志遠願不得規造異巧冬不欲極溫夏不欲窮涼不欲露臥星月不欲睡中用扇大寒大熱大風大霧皆不欲冒之五味不欲偏多故酸多則傷脾苦多則傷肺辛多則傷肝咸多則傷心甘多則傷腎此五味克五臟五行自然之理也凡言傷者亦可即覺也謂久即損壽耳是以善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有偃仰之方祛疾間邪有吐納之術流行營衛有補瀉之法節宣勞佚有豫奪之要忍怒以全陰抑喜以養陽然後先服草木以救虧缺然後服金丹以定無窮養性之理盡於此矣夫欲快意任懷自謂達誠知命不泥異端極情肆力不勞持久者聞此言也雖風之過耳電之經目不足喻也雖身枯於流連之中氣絶於綺紈之內而甘心焉亦安可告之以養性之事哉匪惟不信乃謂大訛也而望彼信之所謂以明鑑結蒙瞽以絲竹娛聾夫者也魏武與皇甫隆令曰聞卿年出百歲而體力不衰耳目聰明顏色和悅此盛事也所服食施行導引可得聞乎若有所傳想可密示封內隆上疏對曰臣聞天地之性惟人為貴人之所貴莫貴於生唐荒無始劫運無窮人生其間忽如電過每一思此惘然心熱生不再來逝不可追胡不抑情養性以自保惜今四海垂定太平之際會當須展才布德於萬年萬年無窮當由修道道甚易知但莫能行臣嘗聞道人王京己年一百七十八而甚丁壯言人當朝朝服食玉泉琢齒使人丁壯有顏色去三蟲而堅齒玉泉者口中唾也朝旦未起早嗽津令滿口乃吞之琢齒七十遍如此者乃名練精稽康云穰歲多病飢年少疾信哉不虛是以關中土地俗好儉嗇廚膳希羞不過菹醬而已其人少病而壽江南嶺表其處饒足海陸鮭鯖無所不備土俗多疾而人早夭北方仕子遊宦至彼遇其豐贍以為福佑所臻是以尊卑長幼恣口食啖夜長醉飽四體熱悶赤露眠臥宿食不消未逾期月大小皆病或患霍亂腳氣脹滿或寒熱瘧痢惡核丁腫或癰疽痔漏或偏風猥退不知醫療以至於死凡如此者比比皆是惟云不習水土都不知病之所由靜言思之可為太息者也學者先須識此以自戒慎抱朴子云一人之身一國之象也胸腹之位猶宮室也四肢之列猶郊境也骨節之分猶百官也神若君也氣若臣也血猶民也知治身則能治國也天愛其民所以安其國惜其氣所以全其身民散則國亡氣竭則身死死者不可生也亡者不可存也是以至人消未形之患治未病之疾醫之於無事之前不追於既逝之後夫人難養而易危也氣難輕而易濁也故能審威德所以保社稷割嗜欲所以固血氣然後真一存焉三一守焉百病卻焉年壽延焉真人曰雖常服餌而不知養性之術亦難以長生也養性之道常欲小勞但莫大疲及強所不能堪耳且流水不腐戶樞不蠹以其運動故也養性之道莫久行久立久坐久臥久視久聽蓋久視傷血久臥傷氣久立傷骨久坐傷肉久行傷筋也仍莫強食莫強酒莫強舉重莫憂思莫大怒莫悲愁莫大懼莫跳躍莫多言莫大笑勿汲汲於所欲勿悁悁懷怒恨皆損壽命若能不犯者則得長生也故善攝生者嘗少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少者養性之要道也多思則神殆多念則志散多欲則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則意溢多喜則忘錯昏亂多怒則百脈不足多好則專迷不理多惡則憔悴無歡此十二多不除則榮衛失度血氣妄行喪生之本也惟無多無少者幾於道矣是知勿外緣者真人初學道之法也若能如此者可居瘟疫之中無憂疑矣既屏外緣者會須守五神肝心脾肺腎從四正言行坐立言最不得浮思妄念心想欲事惡邪大起故孔子曰思無邪也嘗當習黃帝內視法存想思念令見五臟如懸磬五色了了分明勿輟也仍於每旦初起面向午辰兩手於膝上心眼觀氣上入頂下達湧泉旦旦如此名曰迎氣常以鼻引氣口吐氣小微吐之不得開口復欲得出氣少入氣多每欲食送氣入腹每欲食氣為主人也凡心有所愛不用深愛心有所憎不用深憎並皆損性傷神亦不用深贊亦不用深毀常須運心於物平等如覺偏陂尋改正之居貧勿謂常貧居富勿謂常富居貧富之中須守道勿以貧富易志改性識達道理似不能言有大德功勿自矜伐美藥勿離手善言勿離口亂想勿經心常以深心至誠恭敬於物慎勿詐善以悅於人終身為善為人所嫌勿得起恨事君盡禮人以為諂當以道自平其心道之所在其德不孤勿言行善不得善報以自怨尤居處勿令心有不足若有不足則自抑之勿令得起人知止足天遺其祿所至之處勿得多求多求則心自役而志苦若夫人之所以多病當由不能養其性平康之日恃為常然縱情恣欲心所欲得則便為之不拘禁忌欺罔幽明無所不作自言適性不知過後一一皆為病本及兩手摸空白汗流出口唱黃天無所運及皆此生平粗心不能自察一至於此但能少時內省身心則自知見行之中皆畏諸疴將如四百四病身手自造本非由天及一朝病發和緩不救方便誹謗醫藥無效神仙無靈故有智之士愛惜性命者常自思念深生恥愧誡動身心常修善事也至於居處不得綺靡華麗令人貪妄無厭乃患害之源但令雅素淨潔無風雨暑濕為佳衣服器械勿用珍玉金寶增長過失使人煩惱恨深廚膳勿使脯肉豐盈常令儉約為佳然行作鵝行步語則含鐘聲眼作獅子臥每日自詠歌云美食須熟嚼生食不粗吞我問居止處大宅總林村胎息守五臟氣至骨成仙又歌曰日食三了毒不嚼而自消錦繡為五臟身著糞掃袍修心既平又須慎言語讀誦嘗想聲在氣海中每日出入後勿言語讀誦寧待平旦也旦起欲專言善事不欲先計較錢財又食上不得語語而食者常患胸背痛亦不用寢臥多言笑寢不得語言者五臟如鐘聲不懸則不可發聲行不得語若欲語須住腳乃語行則令人失氣冬至日止可語不可言自言曰言答人曰語有人來問不可不答自不可發言也仍勿觸冷開口大語為佳語言既慎仍節飲食是以善養性者先飢而食先渴而飲食欲數而少不欲頓而多則難消也嘗欲令如飽中飢飢中飽耳蓋飽則傷肺飢則傷氣咸則傷筋酸則傷骨故每學淡食食常熱嚼使米脂入腹勿使酒脂入腹人之當食須去煩惱如食五味必不得暴填多令人神驚夜夢飛揚每食不用重肉喜生百病常須少食肉多食飯及少菹菜並勿食生藥生米小豆陳臭物勿飲濁酒食麵使塞氣空勿食生肉傷胃一切肉惟須煮入爛停冷食之食畢當漱口數過令人牙齒不敗口香熱食訖以冷酢漿漱口者令人口氣常臭作𧈟齒病又諸熱食鹹物後不得飲食酢漿水善失聲成尸咽凡熱食汗出勿當風發痙頭痛令人目澀多睡每食訖以手摩面及腹令津液通流食畢當行步躊躇計使十數里來行畢使人以手摩腹上數百遍則食易消大益人令人能飲食無百病然有所修為快也飽食即臥乃生百病不消成積聚飽食仰臥成氣痞作頭風觸寒來者寒未解即食熱食成刺風人不得夜食人云夜勿過醉飽食勿精思為勞苦事有損於氣虛損人常須日在己時食訖則不須飲酒終身無干嘔勿食父母本命所屬肉令人命不長勿食自己本命所屬肉令人魂魄飛揚勿食一切腦大損人茅屋漏水墮諸脯肉上食之成瘕約暴肉作脯不肯幹者害人祭神肉無故自動食之害人飲食上蜂行住食之必有毒害腹內有宿勿食鯪鯉魚肉害人濕食及酒漿臨上看視不見人物者不食之成卒注若已食腹脹者急以藥下之每十日一食葵滑所以通五臟擁氣又是菜之主不用合心食之又飲酒不欲使多多則速吐之為佳勿令至醉至醉即終身百病不除久飲酒者腐爛腸胃漬髓蒸筋傷神損壽醉不可以當風向陽令人發狂又不可當風臥不可令人扇涼皆即得病已醉不可露臥及臥黍穰中發癩瘡醉不可強食或發癰疽或發喑或生瘡醉飽不可以走車馬及跳躑醉不可以接房醉飽交接小者面皯咳嗽大者傷絶臟脈損命凡人飢欲坐小便若飽則立小便慎之無病人忍尿不便膝冷成痹忍大便不出成氣痔小便勿弩令兩足及膝冷大便不用氣及強弩令人腰痛目澀宜慎之佳凡遇山水塢中出泉者不可久居常食作癭病又深陰地冷水不可飲必作痎瘧飲食以調時慎脫著凡人早起著衣反者便著之吉衣光者當戶三振之日殃去吉濕衣及汗衣不可久著令人發瘡及風搔大汗能易衣佳不易衣者及洗之不爾令人小便不利凡大汗勿偏脫衣得偏風半身不遂春天不可薄衣令人傷寒霍亂食不消頭痛脫著既得須調處凡人臥春夏向東秋冬向西頭勿北臥及牆北亦勿安床凡遇眠勿歌詠不祥起上床坐先脫左足臥勿當舍脊下臥訖勿留燈燭令魂魄及六神不安多愁怨人頭邊勿安火爐日久引火氣上頭頭重目赤睛及鼻乾夜臥當耳勿有風吹人即耳聾夏不用露面臥令人面皮厚喜成癬勿作面風冬夜勿覆頭得長壽凡人眠勿以腳懸踏高處久成腎痹及損房室多足令人腎虛每見不能步直牆勿順牆臥風利吹人發癩及體重人汗勿跂床懸腳久成血痹兩足重腰疼又不得晝眠令人失氣臥勿大語損人氣力暮臥嘗習閉口口開即失氣且邪惡從口入久而成消渴及失血色屈膝側臥益人氣力勝正偃臥按孔子不尸臥故日睡而魘踧覺不魘凡人舒睡則有鬼痛魔邪凡眠先臥心後臥眼人臥一夜當作五度反覆常逐更轉凡人夜魔勿然燈喚之定死無疑暗喚之吉亦不得近前急喚夜夢惡不須説旦以水面東方噀之咒曰惡夢著草木好夢成寶玉即無咎矣又夢之善惡並勿説為吉衣食寢處皆適能順時氣者始合養生之道故善攝生者無犯日月之忌無失歲時之和須知一日之忌暮無飽食一月之忌晦無大醉一歲之忌暮無遠行終身之忌暮無燃燭行房暮護常氣也凡氣冬至起於湧泉十一月至膝十二月至股正月至腰名三陽成二月至膊三月至項四月至頂純陽用事陰亦仿此故四月十月不得入房避陰陽純用事之月也每冬至日於北壁下厚鋪草而臥云受元氣每八月一日以後即微火暖足勿令下冷無生意常欲使氣在下不欲泄於上春凍木旺衣欲下厚上薄養陽收陰繼世長生養陰收陽禍則滅門故曰冬時天地氣閉血氣伏藏人不可作勞出汗發泄陽氣有損於人也又云冬日凍腦春秋腦足俱凍此聖人之常法也春秋晏臥早起夏及秋侵夜乃臥早起冬欲早臥而晏起皆益人雖云早起莫在雞鳴前雖言晏起莫在日出後凡冬月忽有大熱之時夏月忽有大涼之時皆物受之人有患天行時氣者皆由犯此也即須調氣息使寒熱平和即免患也每當臘日勿歌舞犯者必凶常於正月寅日燒白髮吉凡寅日剪手甲午日剪足甲又燒白髮吉凡人居止之室必須周密勿令有細隙致有風氣得入小覺有風勿強忍久坐必須急急避之入居不及覺使人中風古來忽得偏風四肢不遂或如角弓反張或失音不語者皆由忽此耳身既中風諸病總集邪氣得便遭此致卒者十中有九是以屋須周密無得輕之慎焉慎焉所居之室勿塞井及水瀆令人聾盲凡在家及外行卒逢大飄風暴雨震雷昏暗大霧此皆是諸龍神鬼行動經過所致宜入室閉戶燒香靜坐安心以避之待過後乃出不爾損人或當時雖未苦於後不佳矣又陰霧中亦不可遠行凡家中有經像行來先拜之然後拜道長每行至則峻坐焉凡居家不欲數沐浴若沐浴必須密室不得大熱亦不得大冷皆生百病冬浴不必汗出沐浴後不得觸冷新沐發訖勿當風勿濕髮髻勿濕頭臥使人頭風眩悶發禿面黑齒痛耳聾頭生白屑飢忌浴飽忌沐沐訖須進少許食飲乃出夜沐發下食即臥令人心虛饒汗多夢又夫妻不用同日沐浴常以晦日浴朔日沐吉凡炊湯經宿用洗體成癬洗面無光洗腳即疼痛作甑畦瘡熱泔洗頭冷水濯之作頭風飲水沐頭亦作頭風時行病新汗解勿冷水洗浴損心包不能復凡居家常戒約內外長動有不快即須早道勿使隱忍以為無苦過時不知便為重病遂成不救小有不好即便按摩援捺令百節通利泄其邪氣凡人無問有事無事常須日別踏脊背四肢以及頭項若令熟踏即風氣時行不能著人此道要妙不可具論凡人居家及遠行隨身常有熟艾一升備急丸避鬼丸生肌藥甘濕藥疔腫藥水銀大黃芒硝甘草乾薑桂心蜀椒不能更蓄余藥此等常不缺少及一兩卷百一備急藥方並帶闢毒蛇蜂蠍等藥隨身也凡人自覺十日以上康健即須灸三數穴以泄風氣每日必須調氣補瀉按摩導引為佳勿以康健便為常然須安不忘危預防諸病已灸法常須避人神凡蓄手力細纍春秋皆須與轉瀉一度則不中天行時氣也服氣法附論神仙服氣之術古方不載黃庭內景玉函隱者雖有於世而學者莫得其要故服氣之法率多口傳心授或食從手至口或飲玉池之津或吐故納新導引按蹺或食日月或閉所通大抵氣以形載形以氣充氣形充符自然長久所謂保其氣和合彼太和者也法赤松子服氣法出聖濟總録序曰天道悠長萬品不齊人生為貴陰陽同皆天道坦坦修之不迷世何庸愚相隨徘徊生不及踵命殞身頽存亡相感哭泣悲哀何不服氣與仙同棲福莫大生禍莫大死子欲長生腹中當清長生不死腸中無滓是以食谷者智食氣者神故曰休糧絶食為生道陰陽還精為重寶能常行之脈壽考何為恣欲自使老神仙食氣常以春二月三月九日十八日二十七日若甲辰乙巳丙辰丁巳王相成滿日行之佳夫行氣欲于山林中幽寂處近東流之泉向陽之地沐浴蘭湯以丹書玉房為丹田方一寸玉房在臍下三寸是精念玉房內視丹田內氣致也行丹田氣先去鼻中毛偃臥兩足相去五寸兩臂去身亦五寸瞑目握固握固如嬰兒之卷手蒲蒻為枕高三寸若胸中有病枕高七寸病在臍下可去枕既行氣不復食生菜辛臭物矣絶谷行氣法出聖濟總録當食日減一口十日後可不食二日腹中或涓涓吞飢取好棗九枚方寸術餅九枚食之一日一夜不過此也不念食即勿啖也飲水日可五升亦可三升勿絶也口中常含棗核令人愛氣且生津液經曰道者氣也愛氣則得道得道則長生精者神也寶精則神明神明則長存行氣一名煉氣其法正臥徐漱醴泉咽之以鼻微微納氣徐引之勿令大極滿入五息已可吐一息屈指數之至九十息若身大煩滿者可頻伸頻伸訖復行之滿四九三百六十息為一周久久衆病自除吐氣既還欲吸之時先腹小吐微微往來如是再三更鼻引之不爾令人氣逆凡納氣則氣上升吐氣則氣下流久自覺氣周於身中若行氣未定意中疲倦便煉氣以九十息為一節三九二百七十息為一周行氣令怦怦滿臟無令氣大出閉氣於內九十息一咽咽未足者復滿九十息三九自足無頓數也當念氣使隨髮際上極及流四肢四肢自熱下至三星經曰行氣常以月一日至十五日念氣從手十指出十六日至三十日念氣從足十指出久自覺氣通手足行之不止身日輕強氣脈柔和營衛調暢長生之道在行氣靈龜所以長存服氣故也諸行氣之後或還欲食者初飲米汁粥日增一日以漸加之十日以後可食淖飯勿致飽也經曰行氣之法其初多不和調令人致逆四肢或冷既行之久日自益也四九三百六十息身如委衣骨節皆解久久乃覺氣行體中經營周身濡潤形體悅澤皮膚五臟六腑皆悉充滿百病除去凡初行氣之時先安身和體若氣未調身不安者且止和乃行之氣至則形安形安則鼻息調和鼻息調和則清氣來至清氣來至則自覺形熱形熱則頻汗出且勿便起安徐養氣務欲其久諸行氣無令意中有忿怒愁憂忿怒愁憂則氣亂氣亂則逆惟精思則正氣來至正氣來至則口中甘香口中甘香則津液自生津液自生則鼻息微長鼻息微長則五臟安五臟安則氣各順理如法為之長生久視也行氣之法以鼻微微引氣納之以口吐之此為長息納氣由吸也吐氣有六呼也吹也嘻也呵也噓也呬也呼也凡人之息一呼一吸無有此數行道之法時寒可吹時溫可呼吹以去熱呼以去風呵以去煩嘻以下氣噓以散滯呬以解極夫人之極卒多噓呬噓呬者長息之忌道家行氣之所惡也夫欲長生三一當明上一在泥丸中中一在絳宮中下一在丹田中修真之士當知此夜半至日中為生氣日中至人定為死氣常以生氣時常臥瞑目掘固閉口不息心數至二百乃口中微吐氣出之日增其數數得滿二百五下即絳宮守泥丸滿丹田成數得滿三百則華蓋明耳目徹身無疾邪不能幹長生不死也閉氣之法以鼻微微引納之數滿於口中微吐之小吐即更以鼻小引咽之如此再三可長吐之飢取飽止絶谷長久若閉氣數得至千五百則氣但從鼻入通行四肢不復從口出也行之不止仙道成矣行五行氣法出聖濟總録春以丙日時加巳食氣百二十數氣於心令心勝肺使肺不傷肝此養肝之時也春有九丙凡千八十食氣夏以戊日時加未食氣百二十以助脾令勝腎使腎不傷心數亦如上季夏庚日時加申食氣百二十以助肺令勝肝使肝不傷脾夏有三戊凡三百六十食氣秋以壬日時加亥食氣百二十以助腎令勝心使心不傷肺秋有九壬行亦如上冬以甲日時加寅食氣百二十以助肝令勝脾使脾不傷腎此五行食氣之要法也四時各有一千八十食各以養其臟周而復始令不相剋為之精者還自內見其五臟矣經曰道以精為寶施與則生人留己則生身生身則得生人則功遂天地有陰陽陰陽人所貴貴人之合於道愛之慎無費故精者血脈之川流守骨之靈神也是以精去則骨枯骨枯則身斃人以身為國以神為君以精為臣以氣為民故氣變則為精精化則為神神化為嬰兒嬰兒上為真人夫天有三光日月星人有三寶三丹田兩眉間卻入一寸為明堂二寸為洞房三寸為丹田此為上元其一赤子字元先一名帝卿心為絳宮中丹田此為中元其一真