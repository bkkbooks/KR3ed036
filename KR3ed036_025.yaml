去殼一分訶黎勒麵裹火煨取皮一兩吳茱萸湯浸焙乾炒防風去叉厚朴去粗皮生薑汁炙芎藭蒼朮米泔浸一宿切焙藿香葉獨活去蘆頭各一分石硫黃一兩別研上除硫黃外細搗羅為末同拌勻煉蜜為丸如梧桐子大空心米湯下三十丸人參湯治脾胃氣虛弱肌體羸瘦人參半夏湯洗七次去滑生薑汁製草豆蔻去皮大腹皮銼前胡去蘆頭陳橘皮湯浸去白焙桂去粗皮芍藥白茯苓去黑皮當歸切焙上各等分粗搗篩每服三錢匕水一盞半入生薑半分大棗二枚擘煎至八分去滓稍熱服不計時候思食補益人參散出聖惠方治脾胃氣虛弱不思飲食肌體羸瘦四肢無力人參去蘆頭白朮陳橘皮湯浸去白瓤焙五味子黃耆銼附子炮裂去皮臍各一兩桂心半兩木香半兩甘草一分炙微赤銼上件藥搗粗羅為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服調中思食丸治脾胃氣虛弱肌體羸瘦陳曲搗碎炒黃色陳橘皮湯浸去白瓤焙人參麥糵炒黃色鍾乳粉檳榔大者銼白朮半夏曲枳殼去瓤麩炒各半兩上除鍾乳別入外搗羅為末拌勻煉蜜為丸如梧桐子大每服二十丸溫米飲下食前服陳橘皮煎丸治脾胃虛弱面黃肌瘦腰膝疼痛寒痰嘔逆腹脅痃癖氣痛陳橘皮一斤用水浸去白焙乾杵為細末醋一斗熬成膏入後藥沉香銼二兩乾薑炮製桂去粗皮附子炮裂去皮臍各四兩蓽茇銼二兩當歸洗切焙乾取二兩京三稜炮熟銼二兩厚朴去粗皮生薑汁炙令黑色四兩上九味搗羅八味為細末用陳橘皮膏和丸如梧桐子大每服二十丸溫酒下不嚼陳米飲下亦得空心食前服附子丸出聖惠方治脾胃氣虛弱肌體羸瘦食不消化不能飲食附子一兩炮裂去皮臍桂心三分厚朴二兩去粗皮塗生薑汁炙令香熟甘草一分炙微赤銼當歸三分銼微炒小麥曲二兩微炒令黃川椒二兩去目及閉口炒出汗上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大不計時候以薑棗湯下二十丸忌生冷油膩犬肉團參丸治脾胃氣虛弱肌體羸瘦團參白朮山芋棗焙乾為末陳倉米炒黃色各一兩甘草炙一分草豆蔻去皮半兩上為細末煉蜜丸如櫻桃子大米飲嚼下一丸日三服山芋丸治脾胃氣虛弱肌體羸瘦補不足進飲食山芋銼一兩五味子淨揀三分黃耆細銼一兩白朮三兩人參一兩上為細末煉蜜為丸如梧桐子大每服二十丸或三十丸溫米飲下食前服香樸丸治脾胃氣虛弱面黃肌瘦小便頻數臍腹疼痛不能飲食沉香銼蘹香子炒各二兩厚朴去粗皮五兩附子去皮臍生用蜀椒取紅各二兩上除紅椒沉香蘹香子外二味用漿水六升青鹽三兩生薑三兩切作片子同於銀鍋中煮令水盡曝乾入紅椒沉香蘹香子搗羅為細末以水浸炊餅和丸如梧桐子大每服三十丸空心溫酒下蜀椒丸治脾胃氣虛弱多困羸瘦面黃口淡不思飲食蜀椒去目及閉口者十兩厚朴去粗皮用十兩以生薑汁炙令香熟細銼附子炮裂去皮臍銼碎二兩鹽花十兩上以水一斗於銀石器內以文武火熬候水盡為度焙乾同杵為末煉蜜並糯米粉同為糊和丸如梧桐子大每服二十丸至三十丸溫酒下空心服如大腸滑泄生薑米飲下椒樸丸出德生堂治脾胃虛冷不思飲食或足發虛腫或日漸羸瘦四肢衰倦吐利無節一應脾虛病脹皆可服蜀椒去目並閉口者厚朴去粗皮生薑汁炙透蘹香子炒青鹽淘去沙取淨各二兩上以水二升煮令乾焙燥搗羅為末麵糊為丸如梧桐子大每服三四十丸空心溫米飲下或鹽湯下病深者日三服諸方集多載椒樸丸有加附子者有加乾薑之類者皆不快捷此方精要與病相當如神慎勿增他藥予中表許君病脾逾年通身黃腫不能起全不嗜食其甥為本道轉運使日遣良醫治之都不效有傅主簿傳此方服十許日漸安自爾常服肌膚充實嗜飲美食兼人面色紅潤年六十餘日行數十里強力如少年凡藥之中病處人多不測看不上面自有奇功多因增益他藥卻致不驗此難可以意度也一方治通身黃腫不能起全不能食服之立愈粟附丸治脾胃氣虛弱四肢倦怠肌體瘦弱臟腑受濕大便頻數全不思飲食陳粟米一升附子一兩共得兩枚者上同於鍋銚內入水煮令附子透取出附子切作片子焙乾又別取陳粟米半升水淘令淨控干文武火炒令香熟同附子碾為末卻取元煮附子者粟米粥同和丸如梧桐子大每服三十丸至五十丸陳橘皮湯下空心食前服羊肉補真丸出楊氏家藏方治脾胃久虛榮衛氣澀精神昏悶肌體羸瘦全不入食羊肉曬乾者十兩當歸洗焙白朮神麯炒三味各二兩丁香茴香炒肉豆蔻麵裹煨香縮砂仁乾薑炮肉桂去粗皮以上六味各一兩糯米半升炒黃上件為細末次入羊肉末拌勻湯浸蒸餅為丸如梧桐子大每服三十丸至五十丸溫米飲下不拘時候健脾丸出楊氏家藏方治脾胃久虛心腹疼痛脅肋脹滿臟腑溏泄停飲食不消噁心嘔逆咳嗽上氣乾噦涎沫口苦無味肢體羸困全不思食丁香甘草各半兩肉豆蔻麵裹煨香細辛去葉土附子炮裂去皮臍肉桂去粗皮吳茱萸湯洗七次微炒乾薑炮以上六味各一兩厚朴去粗皮生薑汁製二兩上件為細末煮粟米飯為丸如梧桐子大每服五十丸米飲下空心食前服治脾胃腸澼出本草以邪蒿煮令熟醬醋食之脾胃壅熱嘔噦附論夫脾氣壅實胃中有熱則陽氣盛陽氣盛則胸膈煩滿痰飲積聚則成嘔噦此皆氣力強盛之人肌膚充滿脾胃之中久多積熱致上焦不利故令嘔噦也方枇杷葉散出聖惠方治脾胃氣壅痰滯嘔噦見食即吐枇杷葉一兩拭去毛炙微黃色木通半兩銼前胡半兩去蘆頭人參一兩去蘆頭麥門冬一兩去心麻仁半兩犀角屑半兩赤茯苓三分陳橘皮半兩湯浸去白瓤焙上件藥搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服麥門冬散出聖惠方治脾胃壅熱嘔噦不下食縱食良久即吐麥門冬二兩去心赤茯苓一兩人參一兩去蘆頭半夏一兩湯洗七遍去滑淨陳橘皮半兩湯浸去白瓤焙茅根二兩銼甘草半兩炙微赤銼前胡半兩去蘆頭枇杷葉一兩拭去毛炙微黃上件藥搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服陳橘皮散出聖惠方治脾胃壅熱嘔噦煩渴不下食陳橘皮一兩湯浸去白瓤焙羚羊角屑半兩麥門冬三兩去心人參一兩去蘆頭澤瀉半兩紫蘇莖葉一兩上件藥搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服又方出聖惠方陳橘皮一兩湯浸去白瓤焙人參一兩去蘆頭葛根一兩銼蘆根一兩銼麥門冬一兩去心枇杷葉半兩拭去毛微炙上件藥細銼和勻每服半兩以水一大盞入生薑半分煎至六分去滓不計時候溫服蘆根飲子出聖惠方治脾胃積熱胸膈煩壅嘔噦不下食蘆根二兩半銼麥門冬二三兩去心人參一兩去蘆頭黃耆一兩淡竹茹一兩陳橘皮一兩湯浸去白瓤焙上件藥細銼和勻每服一兩以水一大盞半入生薑三片半兩煎至一盞去滓入蜜一茶匙生地黃汁半合更煎一兩沸不拘時候分溫三服茅香散出聖惠方治脾胃壅熱嘔噦煩渴不止茅香花三分蘆根一兩銼麥門冬三分去心赤茯苓三分甘草半兩炙微赤銼枇杷葉三分拭去毛炙微黃上件藥搗篩為散每服三錢以水一中盞入生薑半分竹茹一分粳米五十粒煎至六分去滓不拘時候溫服人參飲子出聖惠方治脾胃壅熱氣滿不能食縱食嘔噦人參去蘆頭前胡去蘆頭各一兩生薑半兩粟米半合薤白七莖豉半合上件藥細銼和勻卻以水二大盞煎至一盞二分去滓不計時候分溫三服蘆根散出聖惠方治脾胃壅熱嘔噦不能下食心神煩亂蘆根二三兩銼人參一兩去蘆頭甘草半兩炙微赤銼麥門冬去心茯神各一兩上件藥搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓入生地黃汁半合更煎一兩沸不拘時候溫服治脾胃壅熱嘔噦不下食心膈煩躁宜服此方出聖惠方糯米半合水淘生研綠豆半合水淘生研生薑三分研取汁蜜一合新汲水五合上件藥相和研濾取汁入蜜調令勻不計時候分為三服
