body:
  text: 卷二十五脾臟門脾胃不和不能飲食附論夫內經言穀氣通於脾蓋虛則能受也脾胃之為倉廩者如此若其氣不和則腹內虛滿不能飲食治宜調其飲食適其寒溫則病自愈方神仙快活丸治婦人男子脾胃不和氣不升降腹脹腸鳴反胃吐食嘔吐酸水不思飲食心腹痞悶水穀不消漸成泄痢酒食所傷小兒奶癖桂花二錢木香丁香青皮陳皮各一分官桂二分蓽澄茄一分肉果一分砂仁四錢良薑五分白果一錢白芷二分甘松四分廣三稜四分檀香一分沉香一分茯苓六分香附子五分麝香一分益智六分大椒一十個紅豆四個藿香一兩上為細末甘草膏子為丸捻作丁香餅子又方蒼朮四兩炒黑色牽牛八錢京三稜一兩一錢蘿蔔子八錢皂角二定去皮弦皂角子仁二合上為細末白麵糊為丸如梧桐子大每服十丸先嚼餅子一個後將藥隨唾津嚥下十八味丁沉透膈湯出德生堂治脾胃不和中寒上氣脅肋脹滿心腹㽲痛痰逆噁心或時嘔吐飲食減少十膈五噎痞塞不通噫氣吞酸口苦失味主之白朮二兩香附炒人參縮砂仁各一兩丁香炙麥糵肉豆蔻煨白豆蔻木香青皮各半兩甘草炙一兩半半夏湯泡七次二錢半藿香厚朴薑汁炒各七分錢半神麯炒草果各二錢半沉香陳皮各七分半上㕮咀每服四錢水二大盞姜三片棗子一枚煎至八分去滓熱服一方加茯苓去肉豆蔻木香散治脾胃和氣消食乾木瓜焙五兩益智去皮桂去粗皮草豆蔻去皮紅豆蔻去皮乾薑炮高良薑陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各二兩甘草炙銼麥糵炒神麯炒各三分生薑一斤取自然汁丁香沉香各一兩鹽一斤上搗羅十四味為散研細入生薑自然汁並鹽拌勻以瓷器盛每服二錢匕沸湯點服木香煮散出御藥院方治脾胃不和不能飲食心胸痞悶口淡無味及解傷寒調順中焦木香人參白茯苓去黑皮半夏湯洗七次炒白朮厚朴去粗皮各一分將厚朴生薑一分同搗炒乾乾薑炮桂去粗皮枳實麩炒去瓤甘草炙銼各半兩陳橘皮湯浸去白焙乾一兩檳榔銼一枚草豆蔻去皮二錢枚訶黎勒煨去核五枚上㕮咀每服三錢匕水一盞煎至七分去滓熱服不拘時候大腹湯治脾胃不和不能飲食大腹銼神麯厚朴去粗皮生薑汁炒木香銼各一兩肉豆蔻去皮乾薑炮人參白茯苓去黑皮青橘皮湯浸去白焙桂去粗皮訶黎勒炮取皮大麥糵微炒半夏湯洗七遍去滑焙乾各半一兩京三稜炮銼一兩半上㕮咀每服三二錢匕水一盞入生薑三片棗二枚擘破同煎至七六分去滓稍熱食前服木香丸出宣明論和脾胃寬胸膈消痰逆止嘔吐進益美食官桂乾薑各半兩木香一分大黃蓬朮芫花醋拌濕炒下枳殼去瓤陳皮一作紅皮半夏二兩牽牛半斤取末四兩茴香炒巴豆四個上為末滴水為丸如小豆大每服三二十丸溫水送下紫蘇丸治脾胃不和痰唾嘔逆臍腹撮痛心胸痛悶調臟止瀉紫蘇葉桂去粗皮赤茯苓去皮縮砂去皮甘草炙銼各二兩沉香銼人參桔梗炒青橘皮湯浸去白焙陳橘皮湯浸去白焙各二一兩胡椒半兩上為末煉蜜和丸如彈子大每服一丸炒生薑鹽湯嚼下沉香湯治脾胃氣不和心腹㽲痛不能飲食沉香銼厚朴去粗皮生薑汁炙桂去粗皮益智去皮炒白朮青橘皮湯浸去白焙桔梗炒各一兩焙五味子一兩一分微炒附子炮裂去皮臍乾薑炮甘草炙銼各半兩上粗搗篩每服二錢匕水一盞入生薑三片同煎至七六分去滓稍熱食前服木香丸出聖惠方治脾胃不和腹脅脹滿時有㽲痛不思飲食木香一兩桂心一兩芎藭一兩羌活一兩附子一兩炮裂去皮臍川大黃一兩銼微炒檳榔一兩乾薑一兩炮裂銼郁李仁一兩湯浸去皮微炒牽牛子二兩半微炒香橘皮一兩湯浸去白瓤焙上為末煉蜜和搗三五百杵丸如梧桐子大每服空心以生薑橘皮湯下二十丸高良薑散治脾胃不和飲食減少腹中虛鳴高良薑一兩半陳橘皮去白焙二兩肉豆蔻去殼乾薑炮裂厚朴去粗皮薑汁炙銼五味子甘草炙銼白朮吳茱萸湯洗焙乾炒各一兩神麯炒半兩上搗羅為散每服二錢匕陳米飲調下半夏飲治脾胃不和不能飲食見食吐逆半夏一兩別搗末生薑自然汁和為餅焙乾同杵乾薑炮一兩棗肉焙附子炮裂去皮臍青橘皮湯浸去白焙各半兩陳橘皮湯浸去白焙紅豆蔻去皮各一兩木香半分草豆蔻去皮二枚上㕮咀每服一錢半匕水一盞蜜半匙煎至七分去滓稍熱服不拘時候均氣丸治脾胃不和心胸滿悶不能飲食痰逆吞酸少力頭目昏眩牡丹皮當歸切焙木香京三稜炮椎碎各一分半夏半兩別搗末生薑自然汁和為餅焙乾同杵青橘皮湯浸去白焙枳實去瓤麩炒各半兩檳榔銼一兩上為末煉蜜和丸如梧桐子大每服三五十丸空心食前鹽湯送下白朮丸治脾胃不和不能飲食白朮銼厚朴去粗皮生薑汁炙銼蒼朮去粗皮炒各半斤蕪荑四兩青橘皮去白焙甘草炙銼附子炮裂去皮臍各三兩乾薑炮裂二兩上為末煉蜜和丸如雞頭實大每服一丸空心米飲嚼下進食湯一名進食散治脾胃不和不思飲食虛冷嘔逆方見進食散八味煮散治脾胃氣虛不能飲食厚朴去粗皮生薑汁炙銼麥糵炒各二兩吳茱萸湯洗焙乾炒人參桂去粗皮蕪荑微炒陳橘皮湯浸去白焙各一兩蓽茇半兩上搗羅為散每服二錢匕水一盞入生薑三片棗一枚擘破同煎至六分去滓空心溫服七寶湯治脾胃不和腹中刺痛胃逆氣冷不能飲食草豆蔻五枚麵裹煨熟去面及皮白茯苓去黑皮人參各一兩大腹皮銼四枚訶黎勒炮去核五枚半夏二一分湯浸洗五度生薑汁浸一宿去薑汁炒黃甘草炙銼半兩上粗搗篩每服三錢匕水一盞入生薑三片大棗二枚擘破同煎至七分去滓溫服沉香湯治脾胃氣不和虛滿不能飲食沉香銼蘹香子炒青橘皮去白炒胡椒蓽澄茄楝實銼炒陳橘皮去白焙各一兩上粗搗篩每服三錢匕蔥白三寸擘破入酒並童子小便各半盞同煎至七分去滓溫服若氣甚虛弱脈息沉細不過數服氣正脈生了脾丸和脾胃寬胸膈消痰逆止嘔吐進益美食石燕子一枚燒紅醋淬七次舶上硫黃一兩白丁香七錢丁香七錢淨木香五錢使君子去殼一兩陳皮五錢上用三稜一兩㕮咀用巴豆五錢淨炒京三稜巴豆焦黃為度去巴豆不用同前藥為細末醋煮大黃末為丸如梧桐子大曬乾每服四十丸空心用隨意湯下小兒如黍米大每服一百丸見黑糞為效健中丸治脾胃不和不能飲食白朮厚朴去粗皮生薑汁炙各二兩木香訶黎勒去核肉豆蔻去皮芎藭各一兩上為末煮棗肉和丸如梧桐子大空心米飲送下三十丸草豆蔻湯治脾胃氣冷熱不和進食和氣草豆蔻去皮人參陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各一兩甘草炙銼桂去粗皮各半兩上粗搗篩每服三錢匕水一盞入生薑三片同煎至六分去滓食前溫服和胃丸治脾胃冷熱不和不能飲食胸膈滿悶痰唾吐逆及一切氣疾甘草生銼高良薑生各一兩藿香葉桂去粗皮丁香皮炙各一兩上為末煉蜜和杵三二百下丸如櫻桃大每服一丸鹽湯嚼下空心服厚朴湯治脾胃不和化癖氣調中臟及心下急懊厚朴去粗皮四兩生薑二兩用杵陰一二日曝乾陳橘皮湯浸去白焙三兩白朮四兩烏藥湯浸銼炒甘草炙銼各二兩上搗篩每服二錢匕水一盞入生薑三片大棗二枚擘破同煎至七分去滓溫服白豆蔻丸治脾胃不和不能飲食白豆蔻去皮一兩白朮乾薑炮各三分上為細末煉蜜和丸如梧桐子大每服二十丸煎薑棗湯下空心食前調中丸出御藥院方治脾胃不和內挾濕燠煩燥發渴不思飲食頭目昏眩小便不清胸膈痞悶脅肋膨脹赤茯苓豬苓並去皮陳皮去瓤白朮桔梗澤瀉黃芩大黃桂去粗皮各一兩枳殼麩炒去瓤葛根木通各一兩半半夏湯洗滑石各二兩黑牽牛生用六兩上為細末水煮薄麵糊為丸如梧桐子大每服二五十丸溫水送下不拘時調中益氣湯出濟生拔粹方夫脈弦洪緩而沉按之中之下得時一澀其證四肢滿悶肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦四肢懶倦口失滋味復難舒伸大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血見白膿胸滿短氣膈咽不通或痰嗽稠黏口中沃沫食入反出耳鳴耳聾目中流火視物昏花胬肉紅絲熱壅頭目不得安臥嗜臥無力不思飲食升麻二分黃耆一錢甘草五分蒼朮五分木香一分或二分氣不轉運者加之人參五分有嗽者去之柴胡二分二味為氣不足胃氣與脾氣下留乃補上氣從陰引陽橘皮二分如腹中氣不得運轉者更加二一分上件銼如麻豆大都作一服水二盞煎至一盞去渣帶熱服宿食消盡服之寧心絕思藥必神效蓋病在四肢血脈空服在旦是也如是顯熱燥是下元陰火蒸蒸發也加真生地黃二分黃柏三分如大便虛不得服或大便了而不了腹常逼迫皆血虛血澀也加當歸身如身體沉重雖小便數多亦加茯苓二分蒼朮一錢澤瀉五分黃柏三分此暫時從權而祛濕也不可常用兼足太陰己病也其脈亦終於心中故顯濕熱相合而生煩亂如胃氣不和加湯洗半夏半錢生薑三片有嗽加生薑生地黃二分以製半夏之毒痰厥頭疼非半夏不能除此足太陽經所作也一方作足太陰經也如無以上證只服黃耆一錢炙甘草半錢柴胡三分人參半錢有嗽者去蒼朮半錢黃柏二分酒洗橘皮如腹中氣不轉運更加一分木香一分或二分無此證者勿加只用橘皮三錢升麻三分二味為上氣不足胃氣與脾氣不弱乃補上氣從陰引陽上件銼如麻豆大依前煎服如兼燥熱加黃柏二分生地黃二分如無以上證只服前藥如夏月須加白芍藥三分春月腹中痛尤宜加如惡熱而渴或腹痛者加白芍藥半錢生黃芩二分如惡寒腹中痛加中桂三分去黃芩謂之桂枝芍藥湯亦如芍藥湯中加桂同煎如冬月腹痛不可用芍藥蓋大寒之藥也只加乾薑三二分或加半夏五七分以生薑少許制之如秋冬之月胃脈四道為衝任脈所逆脅下並少陽脈二道而反上行病名曰厥逆其證氣上衝咽不得息而喘息有音不得臥用吳茱萸半錢或一錢半湯洗去苦觀厥氣多少而用之亦於前藥中作一服服之如夏月有此證為大熱也此病隨四時為寒熱溫涼也宜以用黃連酒洗酒黃柏酒知母各等分為細末熟湯為丸如梧桐子大每服一百丸或二百丸白湯送下空心不令胃中停留以美肉食早膳壓之治飲食勞倦所得之病乃虛勞七損證也常宜以甘溫平之甘多辛少是其治也小獨聖丸出和劑方治脾胃不和飲食多傷心腹刺痛嘔噦噁心噎痞吞酸乾噫食臭腹脅脹滿不思飲食巴豆連皮秤半兩去皮心膜炒熟得三錢研硇砂少研飛一兩肉桂去粗皮一斤半夏湯洗七次丁皮舶上者烏梅去核乾薑炮當歸去蘆三稜煨搗碎各四兩上為細末入巴豆硇砂勻水煮麵糊為丸如麻子大每服三丸至五丸用溫水下食後服常服化滯氣利胸膈少逆消食人參煮散出和劑方治脾胃不和中脘氣滯心腹脹痛不思飲食宿寒留飲停積不消或因飲冷過度內傷脾氣嘔吐痰逆寒熱往來或時汗出又治腸胃冷濕泄瀉注下水穀不分腹中雷鳴脅肋虛滿兼療傷寒陰盛四肢逆冷人參四兩青皮去白十二兩甘草炙十兩乾薑炮六兩芍藥一斤三稜煨搗碎十三二兩丁香皮六兩茯苓去皮蒼朮去皮各半斤上為末每服二錢水一盞生薑五片棗三個同煎至七分食前空心溫服脾不磨方脾虛不磨塞心胸腹滿肚脹如物攻但將五膈煎三服可送尋常小理中傷脾方病後傷脾胸膈滿老人強食氣必短更兼少食噁心來草果寬中煎一碗上病後傷脾經令人胸膈氣短用寬中散二貼草果二個灰火炮銼水二大盞姜十片煎八分去滓作四服分氣紫蘇飲出醫方集成治男子婦人胸膈噎塞腹脅疼痛氣促喘急心下脹悶飲食不思嘔逆不止五味子去梗洗桑白皮多銼陳皮去白淨洗桔梗銼草果仁大腹皮甘草炙各三斤茯苓三斤上㕮咀為粗末秤二十斤淨入揀嫩枝葉乾紫蘇十五斤搗碎同一處拌勻每服四錢水一大盞姜三片入鹽少許煎至七分去渣空心食前常服和胃進食沉香磨脾散出醫方集成治脾胃虛寒心腹膨脹嘔逆噁心不思飲食或吐痰水沉香人參各二錢半丁香七錢半藿香葉去土一兩檀香甘草炙木香白豆蔻仁縮砂白朮肉桂去皮烏藥各半兩上㕮咀每服三錢水一盞姜三片鹽一捻煎八分溫服一方有半夏無白朮蟠蔥散出仁存方治男子婦人脾胃虛冷氣滯不行攻築心腹連脅肋刺痛胸膈痞悶背膊連項拘急疼痛不思飲食時或嘔逆霍亂轉筋腹冷泄瀉膀胱氣刺痛小腸及外腎腫痛及治婦人血氣攻刺癥瘕塊硬帶下赤白或發寒熱胎前產後惡血不止臍腹疼痛一切虛冷不思飲食並宜服之延胡索三兩蒼朮米泔浸一宿去皮甘草炙各半兩斤茯苓白者去皮蓬朮三稜煨青皮去白各六兩丁皮縮砂去皮檳榔各四兩肉桂去粗皮乾薑炮各二兩上為末每服二錢水一盞連根蔥白一莖煎七分空心食前稍熱服之進食散出醫方集成治脾胃虛寒或食生冷或飲食不節或因思慮傷動沖和之氣胸膈痞塞腹脹怠惰全不進食痰逆噁心大便溏泄半夏曲肉豆蔻麵裹煨草果仁高良薑銼炒麥糵炒附子炮去皮臍厚朴去皮薑汁炒丁香陳皮去白各一兩人參去蘆青皮去白甘草炙各半兩止㕮咀每服四錢水一盞姜五片棗子一枚煎至七分去滓溫服不拘時小理中湯出和劑方治脾胃不和中寒上衝胸膈逆滿心腹㽲痛飲酒過度痰逆噁心或時嘔吐心下虛脹膈塞不通飲食短少短氣羸困溫中逐水去濕又治腸胃冷濕泄瀉注下水穀不分腹中雷鳴霍亂吐利手足厥冷胸脾心痛逆氣結氣並皆治之蒼朮米泔浸焙五兩生薑五斤甘草生用十兩鹽炒十五兩上銼碎同碾淹一宿焙乾碾為末每服一錢沸湯點空心服棗湯出和劑方治脾胃不和乾嘔噁心腹脅脹滿不美飲食棗去核一斤生薑洗切五兩甘草炙銼三兩上拌勻用盆器盛貯以布蓋罨一宿焙乾搗為末每服一錢入鹽少許沸湯點服常服健脾胃順氣進飲食三倍湯出永類鈐方治脾胃不和胸膈悶滿飲食不化嘔逆噁心或霍亂或嘔吐心腹刺痛腸鳴泄痢水穀不分草豆蔻一兩去皮用肉甘草二一兩銼碎生薑五兩和皮切作片子鹽五兩炒上拌勻入瓷器內罨一宿焙乾為末沸湯點服每服二錢不拘時候丁香大丸子出楊氏家藏方和脾養胃溫中消食降氣快膈人參去蘆頭丁香木香白豆蔻仁甘草炙陳橘皮乾薑炮薑黃縮砂仁神麯炒麥糵炒各半兩紫蘇葉一兩上件為細末煉蜜為丸每一兩作一十丸每服一丸熱湯化下食前服沉香養脾丸出楊氏家藏方益脾養胃助氣溫中進飲食療吐利藥性和平不燥但是脾胃虛弱諸疾悉宜服之沉香半兩木香半兩縮砂仁一兩半丁香白朮肉豆蔻麵裹煨香熟人參去蘆頭甘草炙乾薑炮以上各一兩上件為細末煉蜜為丸每一兩作一十丸每服一丸或二丸細嚼熟水下不拘時候白朮茯苓丸出楊氏家藏方治脾胃不和胸膈痞悶心腹脹滿乾噦噫酸飲食不化腸鳴泄瀉酒癖停積嘔吐痰沫頭目昏暈白朮六兩赤茯苓去皮乾薑炮肉桂去粗皮半夏湯洗七遍枳實去瓤麩炒肉豆蔻麵裹煨香人參去蘆頭各二兩上為細末用神麯碾為糊丸如梧桐子大每服五十丸生薑湯下不拘時治胃氣不和飲食減少腹脅脹多飧泄舶上硫黃不以多少淨去砂石上細研千百遍令如飛塵蒸餅為丸如梧桐子大空心米飲下四十丸助脾氣令人能食以魴魚作鱠食之作羹食益人其功與鯽魚同通心經益脾胃出本草以紫蘇葉並莖煮飲食二香養胃丸出楊氏家藏方治脾胃不和心下虛痞不思飲食嘔吐痰逆噫氣吞口酸苦無味嗜臥體重腹脅刺痛丁香一分木香一分陳橘皮去白益智子縮砂仁甘草炙肉桂去粗皮檳榔肉豆蔻麵裹煨熟以上七味各半兩青橘皮去白四錢乾薑炮三錢上件為細末煉蜜為丸每一兩作一十丸每服一丸或二丸細嚼熱湯送下食前雙棗湯出楊氏家藏方治脾胃不和胸膈不快飲食停滯氣不升降腹脅脹痛嘔逆噁心並宜服之香附子去毛八兩青橘皮去瓤麩炒六兩甘草炙半兩上件為細末每服二錢棗二枚水一盞煎至七分或入鹽湯點亦得健脾散出楊氏家藏方治脾胃不和心腹疼痛嘔逆噁心陳橘皮去白七兩高良薑五兩炒乾薑三兩炮上件為細末每服二錢水一盞生薑三片棗一枚同煎至八分熱服不拘時候白豆蔻散出楊氏家藏方治脾胃不和中脘痞悶氣不升降痰逆噁心不思飲食沉香三分縮砂仁煨微炒白豆蔻微炒乾生薑以上三味各一兩木香人參去蘆頭白朮去皮白茯苓去皮丁香以上五味各一半兩上件為細末每服二錢水一盞入鹽一捻生薑三片煎至七分熱服或用鹽湯點亦得食前薑棗丸出楊氏家藏方安和脾胃進美飲食治中脘不快嘔吐無時乾生薑一斤大棗四斤去核溫水酒拌勻焙乾陳橘皮去白一兩上件為細末別用棗一斤生薑一斤切作片子同棗煮爛不用生薑只將棗去皮核取肉和前藥末丸如梧桐子大每服一百丸溫米飲送下空心食前香術散出楊氏家藏方和脾胃養三焦美飲食化痰飲破滯氣木香人參去蘆頭白朮白茯苓去皮草豆蔻仁陳橘皮去白肉桂去粗皮枳殼去瓤麩炒以上八味各半兩細辛去葉土神麯各一兩炒訶子六枚煨去核上件為細末每服三錢水一盞生薑三片鹽少許同煎至七分熱服空心豆蔻煮散出楊氏家藏方健脾和胃治嘔逆噁心不思飲食草豆蔻仁白朮白茯苓去皮以上三味各二兩高良薑三二兩