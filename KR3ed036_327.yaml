body:
  text: 卷三百二十七婦人諸疾門雜病附論夫三十六疾者十二症九痛七害五傷三痼不通是也何謂十二症是所下之物一曰狀如膏二曰如黑血三曰如紫汁四曰如赤肉五曰如濃痂六曰如豆汁七曰如葵羹八曰如凝血九曰如青血血似水十曰如米泔十一曰如月浣乍前乍卻十二曰經度不應期也何謂九痛一曰陰中痛傷二曰陰中淋瀝痛三曰小便即痛四曰寒冷痛五曰經來即腹中痛六曰氣滿痛七曰汁出陰中如有蟲齧痛八曰脅下分痛九曰腰胯痛何謂七害一曰竅孔痛不利二曰中寒熱痛三曰小腹急堅痛四曰臟不仁五曰子門不端引背痛六曰月浣乍多乍少七曰害吐何謂五傷一曰兩脅支滿痛二曰心痛引脅三曰氣結不通四曰邪思泄利五曰前後痼寒何謂三痼一曰羸瘦不生肌膚二曰絶産乳三曰經水閉塞病有異同其治之方儒門事親書云一富家婦人傷思慮過甚二年不寐無藥可療其夫求戴人治之戴人曰兩手脈俱緩脾受之也此脾主思故也乃與其夫以怒激之多取其財飲酒數日不處一法而去其人大怒汗出是夜困眠如此者八九日不寤自是而食進脈得其平矣又云項開令之妻病怒不欲食常好叫呼怒罵欲殺左右惡言不輟衆醫皆處藥幾半載尚爾其夫命戴人視之戴人曰此難以藥治乃使二娼各塗丹粉作伶人狀其婦大笑次日又令作角抵又大笑其旁常以兩個能食之婦誇其食美其婦亦索其食而為一嘗之不數日怒減食增不藥而瘥後得一子夫醫貴有才方足應變無窮又云李仲安宅四婦人病同日下湧劑置燠室中火兩盆其一婦發暈衆人皆驚戴人笑曰內火見外火故然舁之門外使飲冰雪水立醒時正雪晴戴人曰熱見寒則醒衆由是皆服非老手諳練必不能鎮衆人之驚也方熟乾地黃丸出簡易方治婦人風虛勞冷一切諸疾或風寒邪氣留滯經絡氣血冷瀝不能溫潤肌膚或風寒客於腹內則脾胃冷弱不能克消水穀或腸虛受冷大便時泄或子臟挾寒久不成胎月水不調乍多乍少或月前月後淋瀝不止或閉斷不通結聚癥瘕面色肌體減瘦飲食進退百節痠疼時發寒熱漸至羸損帶漏五色陰中冷痛時發腫癢月水將行臍腹先痛皮膚粗澀癮疹瘙癢麻痹筋攣面生皯𪒟發黃脫落目淚自出心忪目眩及産後勞損未復肌瘦寒熱顏色枯黑飲食無味漸至蓐勞皆療之熟乾地火燒醋紅淬七次細研防風去蘆肉蓯蓉酒浸一宿白茯苓去皮禹余火燒紅醋淬七次細研五味子揀淨柏子仁微炒別研芎藭各一兩半澤蘭去梗糧二兩一分厚朴去粗皮薑汁炒白芷乾薑炮山藥細辛去苗卷柏去根各一兩當歸去蘆酒浸炒藁本去蘆炒甘草炙各一兩六分人參蜀椒去目及閉口者微炒出汗牛膝去苗酒浸一宿蛇床子揀淨微炒續斷蕪荑炒杜仲去粗皮炙黃各三分赤石脂煅醋石膏煅醋研各二兩艾葉三分石斛去根肉桂去粗皮白朮各一兩一分紫石英煅醋淬研飛三兩上搗羅為末煉蜜和搗五七百杵丸如梧子大每服三十丸溫酒或米飲下空心食前服常服養血補氣和順榮衛充實肌膚調勻月水長年駐顏除風去冷令人有子溫平不熱無毒妊娠不宜服一方名大澤蘭丸治婦人虛損及中風並病疝瘕除中冷痛頭風入腦寒痹筋攣緩急血閉無子面上遊風去來目淚出多涕唾忽忽如醉或胃中冷逆胸中嘔不止及泄痢淋瀝或五臟六腑寒熱不調心下痞急邪氣咳逆或漏下赤白陰中腫痛胸脅支滿或身體皮膚中澀如麻豆苦癢痰癖結氣或四肢拘攣風行周身骨節疼痛目眩無所見或上氣惡寒灑淅如瘧或喉痹鼻齆風癇癲疾或月水不通魂魄不定飲食無味併産後內衄無所不治服之令人有子久赤白痢去熟地黃石膏麥門冬柏子仁加大麥糵陳曲龍骨阿膠黃連各一兩半有鍾乳加三兩良濟陰丹三稜二兩莪朮一兩切片煨蒼朮泔浸去皮枳殼去瓤大艾去根劉寄奴香附子淨敗薑各一兩半烏頭三合以上味用米醋三升煮乾取出焙乾為末當歸身一兩半蒲黃一兩隔紙炒生地黃酒浸熟地黃酒蒸各七錢半橘皮去白細紅者佳白芍藥各一兩半玄胡索炒五靈脂酒煮白朮煨各半兩牡丹皮淨去滑桂去粗皮赤芍藥片子薑黃青皮去白各一兩川芎七錢半上為末糯米粉谷醋打糊為丸沉香湯下蘇湯鹽湯亦可大聖散出和劑方治婦人血海虛冷久無子息急産後敗血衝心中風口噤子死腹中擘開口灌藥須臾生下便得無恙治墮胎腹中攻刺疼痛橫生逆産衣不下血癖血滯血崩血入四肢應血臟有患及諸腫風氣或傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾墮胎崩中不定因此成疾室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷消除百病兼療丈夫五勞七傷虛損等病澤蘭葉石膏研各兩卷柏去根白茯苓去皮防風去蘆厚朴去粗皮薑汁炙細辛去苗柏子仁微炒吳茱萸湯浸七次焙乾炒桔梗各一兩五味子揀淨人參藁本去苗乾薑炮白芷川椒去目及閉口者微炒出汗白朮黃耆去苗川烏炮去皮臍丹參各三分蕪荑微炒赤甘草炙川芎芍藥當歸各一兩三分阿膠碎炒燥白薇各半兩肉桂一兩一分生乾地黃一兩半上為細末每服二錢空心臨臥熱酒調下若急疾有患不拘時日三服效金叉煎出大全良方專治婦人諸疾産前後風虛痼冷手足僵痹豆淋酒化下血風頭痛産後中風荊芥酒化下産後痰涎咳嗽桑白皮湯化下經脈不調或前或後或多或少血氣攻刺腰脅重痛溫酒化下經脈不通産後血喘蘇木人參煎湯化下血崩不止赤白帶下側柏燒灰調酒下妊娠將理失宜或因驚動痛極妨悶漏胎下血膠艾煎湯化下臨産艱難乳香研酒化下子死腹中胎衣不下用朴硝三錢重研細童便和酒化下産後勞倦傷敗血氣寒熱如瘧遍身疼痛咳嗽盜汗地黃烏梅煎湯化下産後敗血浮腫薑汁少許和酒半盞化下産前服之則安胎臨産亦易産産後則逐去惡血不生諸疾用童便和酒調下常服活血駐顏大暖血海升降陰陽滋養榮衛或子宮久冷多病少子能常服之見效立致忌生冷油膩魚腥豬母白豬一切毒物當歸白芍藥川芎石斛酒炒香附子炒糯米炒各二兩降真香細銼熟地黃各四兩秦艽貝母去心羌活去蘆粉草乾薑炮北細辛牡丹皮大豆卷炮茴香炒枳殼去瓤麩炒延胡索白芷各一兩人參木香石膏煅沉香黃芩各半兩川椒三分交加修治八兩交加即用生地黃四兩絞汁留滓以生薑四兩取汁留滓用生地黃汁拌生薑滓炒乾用生薑汁拌生地黃滓炒乾為末用上為細末煉蜜為丸每兩作七丸依前服餌常服溫酒化下荊芥散治血風諸般疾産後並宜服諸疾除去荊芥雀腦芎各三兩當歸人參各半兩桂心牡丹皮羌活防風苦梗大腹皮甘草蒲黃白茯苓枳殼犀朴半夏杏仁款冬花各三分附子炮乾地黃鱉甲白芍藥北柴胡黃耆各一兩乾薑木香各半分沉香一分上為細末每服二錢薑三片棗一個水一盞煎至七分溫服南嶽魏夫人濟陰丹出三因方治婦人血氣久冷無子及數經墮胎皆因衝任之脈虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六疾積聚癥瘕臍下冷痛小便白濁以上疾證皆令孕育不成以致絶嗣此藥治産百病百日內常服除宿血生新血令人有孕亦生子充實亦治男子亡血諸疾桃仁去皮尖雙仁麩炒木香炮茯苓京墨燒各一兩蠶布燒藁本秦艽甘草人參桔梗炒石斛酒浸各二兩當歸桂心乾薑炮細辛牡丹皮去心川芎各半兩川椒去目及閉口者炒出汗山藥各三兩澤蘭葉熟地黃洗酒蒸焙香附子炒各四兩蒼朮米泔浸去皮大豆卷炒各半升糯米炒一升上為細末煉蜜丸每兩作六丸每服一丸細嚼溫酒送下淡醋湯調亦可空心食前服一方山藥川椒各三兩妙應丹一名延齡丹出三因方治婦人衆病無所不治晚蠶砂炒鯉魚鱗燒為末當歸去蘆石膏微研澤蘭去梗附子炮去皮臍木香炮各二兩熟乾地黃洗酒浸蒸焙川芎防風去蘆蕪荑炒馬牙硝炒人參黃耆川椒微炒柏子仁微炒別研蟬蛻去足洗焙白薇檳榔不見火各一兩厚朴去粗皮薑製藁本去苗白薑炮甘草炙赤各三兩紅花炒吳茱萸湯浸各半兩上為末煉蜜搜和杵數千下丸如彈子大每服一丸血瘕塊病綿灰酒下催生溫酒細嚼下血勞血虛桔梗酒下血崩棕櫚灰酒下血氣痛炒白薑酒下血風荊芥酒下血暈悶絶胎死腹中胞衣不下並用生地黃汁童便酒各一盞煎二服下常服醋湯溫酒化下並空心食前服地黃粥方治婦人血氣不調生地黃汁二合粟米一合粳米一合鹽花少許訶黎勒炮去核末各半兩上用水三升先煮二米將熟次入訶黎勒末地黃汁鹽花攪勻煮令稀稠得所分二服趁痛丸出宣明論方治一切走注疼痛婦人經脈住滯水腫腹脹甘遂大戟芫花黃牽牛各等分上為末以蕎麥麵同米和作餅子切為棋子煮熟服之得利為度每服一錢加減相虛實烏雞煎丸一名大烏雞丸出和劑方治婦人胎前産後諸般疾患並皆治之雄烏雞一個烏藥石床牡丹皮人參去蘆白朮黃耆各一兩蒼朮米泔浸切焙一兩半海桐皮二兩肉桂去粗皮附子炮去皮臍白芍藥蓬莪朮川烏炮熟乾地黃洗焙肉豆蔻草果各半兩紅花延胡索木香琥珀陳皮各半兩上細銼用烏雄雞一隻湯燖去毛及腸肚將上件藥安放雞肚中用新磁瓶好酒一斗同煮令乾去雞骨以油單盛焙乾為末煉蜜為丸如桐子大每服三十丸胎前産後傷寒蜜糖酒下胎前氣悶壯熱炒薑酒下白帶赤帶下生薑地黃酒下産後敗血注心童子小便炒薑酒吞下産後血塊填築心腹疼痛玄胡索酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛煎紅花酒下血氣攻刺心腹疼痛煎當歸酒下血運棕櫚燒灰酒調吞下血邪研硃砂麝香酒下血悶煎烏梅湯研硃砂下子宮久冷溫酒或棗湯下空腹日一服血風勞人參酒吞下腹㽱痛炒茴香鹽酒吞下血散四肢遍身虛浮黃腫赤小豆酒下常服溫酒醋湯任下並以食前服白堊龍骨芍藥各十八銖黃連當歸茯苓黃芩瞿麥白蘞石葦甘草牡蠣細辛附子禹餘糧藁本白石脂人參烏賊骨甘皮大黃以上各半兩上為末蜜和丸如梧子大空腹飲服十丸日再不知加之二十日知一月百病除若十二症倍牡蠣禹餘糧烏賊骨白石脂龍骨若九痛倍黃連白蘞甘草當歸若七害倍細辛藁本甘皮加川椒茱萸各一兩若五傷倍大黃石葦瞿麥若三痼倍人參加赤石脂礬石巴戟天各半兩合藥時隨病增減之小白薇丸出和劑方治女人衝任虛損子臟受寒久無子息及斷續不産此因上熱下冷百病滋生或月水崩下帶漏五色腰腹疼重面黃肌瘦或因産乳不能將護露廁大早或久坐濕地或冷風從下入血臟既虛或邪內乘或月水當行失於調攝傷動胞絡陰陽不和上焦虛陽壅燥下臟邪冷結狀致使胎孕不成冷極傷敗月水不勻飲食減少夜多盜汗面皯𪒟齒搖發落腳膝疼重舉動少力並宜服之覆盆子去根菖蒲微炒各三分白龍骨熟地黃川椒去目及閉口者微炒去汗各一兩白薇去苗一兩蛇床子炒乾薑炮細辛去苗當歸去蘆炒車前子芎藭各半兩遠志去心桃仁去皮尖麩炒黃白茯苓去皮藁本去苗人參卷柏去根白芷肉桂去粗皮各三分麥門冬去心焙一兩半上為細末煉蜜和丸如梧桐子大每服三十丸溫酒或米飲下空心食前常服壯筋骨益氣暖下臟除風冷令有子白堊丹出和劑方治婦人三十六病崩中漏下身瘦手足熱惡風怯寒咳逆煩滿抑息短氣心脅腰腹背肚與子臟相引痛漏下五色心常恐懼遇恚怒憂勞即發皆是內傷所致並皆治之牡蠣煅研白堊細辛去苗禹餘糧煅醋淬九次研烏賊魚骨燒灰白石脂煅龍骨煅研各一兩半瞿麥穗附子炮去皮臍芍藥石葦白蘞黃連去毛茯苓去皮肉桂去粗皮白芷當歸去苗乾薑炮人參甘草炙各一兩半川椒去目及閉口者炒出汗半兩上為末煉蜜丸如桐子大每服三十丸至五十丸空心溫酒下一方無人參琥珀澤蘭煎一名調經琥珀丸出和劑方治婦人三十八種血氣八風五痹七症八瘕心腹刺痛中風癱瘓手足痠疼乳中結瘀妊娠胎動死胎不出産衣不下敗血湊心頭旋眼花血疰四肢渾身浮腫衝任久虛絶産無嗣早晚服食或因有子經脈不調赤白帶下噁心嘔逆身體瘦倦懷胎八月一日一服胎骨易産紫巴戟去心糯米炒茴香牡丹皮去心劉寄奴草去根五味子去梗白芷五加皮去心金叉石斛去粗皮酒浸炒川當歸酒浸一宿川芎赤芍藥澤蘭葉去梗人參去蘆白芍藥附子炮去皮臍生乾地黃去蘆艾葉酒炒糯米糊調成餅焙乾為末熟乾地黃去土白朮各一兩上為細末煉蜜丸如彈子大每服一丸溫酒磨下漏胎刺痛煮糯米飲下寒熱往來四肢煩疼煎青蒿酒下婦人室女經血不通煎紅花酒下血暈不省人事童子便和暖酒下催生雞子清和酒下血氣血塊攻刺心腹燒稱錘淬酒下傷寒及中風口噤煎麻黃湯下用被蓋出汗即愈心驚悸及頭疼薄荷酒下咳嗽桑白皮湯下血風攻疰渾身瘙癢頭面麻痹炒黑豆浸酒下産前産後常服不生諸疾甚有神效烏金散出宣明論治婦人諸疾寒熱頭痛一切等疾烏金子肉桂蒲黃當歸虻蟲血餘灰水蛭鯉魚灰木香青皮皂角大者炙各半兩芍藥半兩芫花醋炒三兩巴豆一錢去油硃砂少許棕皮灰紅花各一兩川烏頭半兩上為末每服半錢加至一錢煎生薑湯下空心食前忌油膩等物加味五積散出危氏方厚朴去粗皮薑汁炒半夏洗揚芍藥枳殼去瓤木香肉桂各一兩陳皮白薑各一兩三錢蒼朮六兩米泔以炒桔梗香附子炒去毛茴香炒粉草人參茯苓去皮川芎當歸去尾川白芷各一兩上銼散生薑木瓜入鹽煎服陰證傷寒生薑附子血脈不勻紫蘇氣嗽烏梅薑調月經棗子薑補益血海蘇鹽産後生薑醋炒陳艾胃冷不納食陳皮縮砂赤白帶陳米冷氣疾木香茱萸心躁背筋急頭暈腰腳痠生乾地黃當歸脾虛蘇葉粉草月中被驚或因爭觸心頭結塊五隔五噎茴香棗子口苦舌乾吞酸噫氣此為胃冷生薑鹽腰痛桃仁木瓜杜仲川續斷身痛秦艽諸虛脾胃不和羸瘦冷氣蘇鹽冷瀉炒過生薑烏梅肉豆蔻陳米萬病紫菀丸出拔萃方療臍腹久患痃癖如碗大及諸黃病每地氣起時上氣衝心繞臍絞痛一切蟲咬十種水病十種蠱病反胃吐食嘔逆噁心飲食不消天行時病婦人多年月露不通或腹如懷孕多血天陰即發又治十二種風頑痹不知年歲晝夜不安夢與鬼交頭白多屑或哭或笑如鬼魅所著腹中脹悶腹痛服之皆效紫菀去苗土吳茱萸湯浸七次焙乾菖蒲柴胡去須厚朴薑製一兩桔梗去蘆茯苓去皮皂角去皮子等炙桂枝乾薑炮黃連去須八分蜀椒去目及合口者炒出汗用巴豆去皮膜出油研人參去蘆各半兩川烏炮去皮半兩加二錢羌活獨活防風各加等分上為細末入勻巴豆煉蜜丸如桐子大每服三丸漸加至五七丸生薑湯送下食後臨臥服初有孕者不宜服具引於後痔漏腸風用酒下赤白痢訶子湯下膿血痢米飲湯下墮傷血悶四肢不收酒下蛔蟲咬心檳榔湯下氣噎憂噎荷葉湯下打撲傷損酒下中毒帚灰甘草湯下一切風升麻湯下寸白蟲檳榔湯下霍亂乾薑湯下咳嗽杏仁湯下腰腎痛豆淋酒下陰毒傷寒溫酒下吐逆生薑湯下食飲氣塊面酒下時氣井花水下腳風陳皮湯下頭痛水下心痛溫酒下大小便不通燈草湯下因物所傷以本物湯下吐水藜蘆湯下氣病用乾薑湯下小兒天風吊搐防風湯下防己亦可小兒疳利蔥白湯下小兒乳食傷白湯下月信不通煎紅花酒下婦人腹痛川芎湯下懷孕半年後胎漏艾湯下有子氣衝心酒下産暈痛溫酒下血氣痛當歸酒下産後心腹脹滿豆淋湯下難産益智湯下産後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死菜子湯下又治小兒驚癇大人癲狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟等疾沉香煎丸丁香一兩南木香半兩訶子肉肉豆蔻陳皮甘草人參去蘆胡椒青皮生薑屑各五錢白豆蔻縮砂仁檳榔乾薑官桂各五錢半去皮沉香三錢半麝香二兩白朮四錢上為細末煉蜜為丸如棗子大每服一丸細嚼生薑湯下溫經酒亦可空心食前日進三服代灸散出和劑方治婦人産前後一切血疾血崩虛憊腹脅疼痛氣逆嘔吐冷血冷氣凝積塊硬刺痛泄下青白五色腹中虛鳴氣滿堅脹瀝血腰疼口吐清水頻産血衰顏色青黃勞傷劣弱月經不調下血墮胎血迷血運血瘕時發疼痛頭目眩暈惡血上心悶絶暈迷惡露不幹體虛多汗手足逆冷並宜服之茴香揀淨炒藿香丁香皮熟乾地黃洗焙肉桂去粗皮各一兩半甘草炙赤山藥當歸去蘆洗白朮白芷各八兩藁本去蘆乾薑炮川芎黃耆去苗各二兩木香一兩陳皮去白四兩白芍藥十兩上為細末每服三錢水一盞生薑錢大五片艾一團同煎至七分空心食前熱服溫酒調下亦得如産後下血過多加蒲黃煎服惡露不快加當歸紅花煎服水瀉加肉豆蔻末煎服嘔吐加藿香生薑煎服上熱下冷加荊芥煎但是腹中虛冷血氣不和並宜服産後每日一服則百病不生丈夫虛冷氣刺心腹疼痛尤宜服之龍鬚湯治胎前産後身疼保室論云身疼者肌體不實而受風邪客於經絡邪氣與正氣相搏交擊於骨之間故身疼而不動用龍鬚湯主之若妊娠而患身體疼者必因勞役過多致使然也不爾經絡受風寒愈痛丸防風湯主之産者必因勞後身疼而不能動轉者良由産後百節開張血脈流走氣弱則骨肉之間血多凝滯是故百節經脈緊急腰背不能轉側手足不能動搖身熱若納炭頭如釘錠醫者不識妄為傷寒發汗變生他證宜服牛膝洗去蘆酒浸一宿急用酒蒸熟為度當歸酒浸去蘆白朮防風去蘆獨活去蘆甘草各二錢半黃耆一兩蜜炙上㕮咀每服半兩井水五盞生薑十片薤白一握同煎至三盞去滓不拘時服交感地黃煎丸出三因方治婦人産前産後眼見黑花或即發狂如見鬼狀胞衣不下失音不語心腹脹滿水穀不化口乾煩渴寒熱往來口內生瘡咽中腫痛心虛怔悸夜不得眠産後中風角弓反張面赤牙關緊急崩中下血如豚肝狀臍腹㽱痛血多血少結為癥瘕恍惚暈迷四肢腫滿産前胎不安産後血刺痛並皆治之生地黃淨洗研以布制汁留滓以生薑汁炒地黃滓以地黃汁炒生薑滓至幹甚為末為度生薑淨洗爛研以布製取自然汁留滓各二斤延胡索拌糯米炒赤去皮當歸去苗琥珀別研各一兩蒲黃炒香四兩上為末蜜丸彈子大當歸湯化下一丸食前服勝金丸一名勝金丹出大全良方治婦人久虛無子産前産後一切病患兼療男子下虛無力此藥能安胎催生妊娠臨月服五七丸産時減痛婦人無子子宮冷如服二十丸男女自至又治積年血風腳手麻痹半身不遂赤白帶下血如山崩及治産後腹中結痛吐逆心痛子死腹中繞臍痛氣滿煩悶失蓋汗不出月水不通四肢浮腫無力血勞虛勞小便不禁中風不語口噤産後痢疾消渴眼前見鬼迷運敗血上衝寒熱頭痛面色痿黃淋瀝諸疾血下無度血痢不止飲食無味産後傷寒虛煩勞悶産後血瘕産後羸瘦凡婦人衆疾不論年月日深並皆治之一方名不換金丸治婦人諸虛不足心腹疼痛白芍藥藁本石脂赤白皆可川芎不見火牡丹皮當歸白茯苓人參白薇白芷桂心延胡索白朮米泔浸一宿各一兩沒藥甘草炙江西安撫司沒藥甘草減半上等分為末煉蜜丸如彈子大每服一丸溫酒化下初産了並用熱醋湯下空心食前此方系王承宣德祖傳渠家凡婦懷身便服此藥神妙常服尤好系在京師於能家傳一方有沉香無沒藥一方有附子無沉香白朮煎治胎前産後血氣諸疾木香五錢三稜莪朮白朮各一兩枳殼炒白茯苓當歸延胡索人參熟地黃洗牡丹皮甘草各半兩上為細末米糊丸如梧桐子大每服十五丸至二十丸常服溫酒吞下胎前渾身並腳手痛炒薑酒下胎前腹內痛並安胎紫草煎湯下胎前嘔逆吐食糯米飲下胎前飲食不得渾身倦怠豆淋酒下胎前渾身發熱甘草湯下胎前咳嗽煨薑鹽湯下胎前頭痛煨蔥茶下胎前産後瀉紫蘇薑酒下催生胎衣不下嚼蔥白三寸暖酒下産後赤白痢乾薑甘草湯下産後下血不止燒紗帽灰一錢調酒下無燒漆亦可産後渾身虛腫陳皮去白焙乾浸酒下頭痛薄荷茶下常服飯飲下赤白帶下燒棕櫚灰三錢調酒下久年血氣陳塊築心痛溫酒下炒薑酒下及良薑浸酒下皆可婦人室女經脈不通煎紅花蘇木酒下經脈不調或前或後或多或少煎當歸酒下大便小便祕結燈心湯下乳汁不行苦齏煮豬蹄羹下産後腰痛煎芍藥酒下保生丸養胎益氣安和子臟治妊娠將理失宜或因勞役胎動不安腰腹痛重胞阻漏胎惡露時下子臟挾疾久不成胎或受妊不能固養痿燥不長過年不産日月雖滿轉動無力或致損墮及臨産節適乖宜驚動太早産時未至惡露先下胎胞枯燥致令産難或橫或逆痛極悶亂連日不産子死腹中腹中冰冷口唇青黑吐出冷沫新産惡血上衝運悶不省喘促汗出及瘀血未盡臍腹㽱痛寒熱往來或因産勞損虛羸未復面黃體瘦心忪盜汗飲食不進漸成蓐勞八月常服壯氣血正胎産潤胎易産産後常服滋養血氣和調陰陽密腠理實腑臟治風虛除痼冷一名千金丸木麻仁去皮一兩半貝母黃芩大豆黃卷糯米一作粳米甘草微炒赤細研乾薑炮肉桂去粗皮石斛去根石膏細研各一兩當歸去蘆炒半兩秦椒微炒出汗一兩上為細末煉蜜和丸如彈子大每服並用溫酒或棗湯化下嚼亦得空心食前服一方用蒲黃一兩半夏丸治女人懷中十二疾一曰經水不時二曰經來如清水三曰經水不通四曰不周時五曰生不乳六曰絶無子七曰陰陽減少八曰腹苦疼如刺九曰陰中寒十曰子門相引痛十一曰經來凍如葵汁狀十二曰腰急痛凡此十二病得之時因與夫臥起月經不去或臥濕冷地及以冷水洗浴當時取快而後生百病或瘡痍未瘥便合陰陽及起早作勞衣單席薄寒從下起半夏赤石脂各一兩六銖蜀椒乾薑吳茱萸當歸桂心丹參白蘞防風各一兩雚蘆半兩上為末蜜和丸如梧桐子大每日空心酒服十丸三不知稍加以知為度龍骨散治腹下十二病絶産一曰白帶二曰赤帶三曰經水不調四曰陰胎五曰子臟堅六曰臟癖七曰陰陽患痛八曰內強九曰腹痛十曰臟閉十一曰五臟痠痛十二曰夢與鬼交宜服之龍骨二兩黃柏半夏皂中黃土桂心乾薑各二兩石葦滑石各一兩烏賊骨代赭各四兩白殭蠶五枚上治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹冷加黃柏二兩子臟堅加乾薑桂心各二兩以上各隨病增之服藥三月有子即住藥太過多生兩子當審方取好藥寡婦童女不可妄服皺血丸治婦人血海虛冷百病變生氣血不調時發寒熱或下血過多或久閉不通崩中不止帶下赤白癥瘕癖塊攻刺疼痛小腹緊滿脅肋脹痛腫重腳弱面黃體虛飲食減少漸成勞狀及經脈不調胎氣多損産前産後一切病患無不治療菊花去梗茴香香附酒浸一宿炒熟地黃當歸肉桂去粗皮牛膝延胡索炒芍藥蒲黃蓬朮各三兩上為末用烏豆一升醋煮候乾焙為末再入醋二碗煮至一碗留為糊丸如梧桐子大每服三十丸溫酒或醋湯下血氣攻刺炒薑酒下癥瘕疼痛當歸酒下忌鴨肉羊血此藥暖子宮能令有子又治皺血損調補衝任溫暖血海及胞