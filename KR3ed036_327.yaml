盜汗浮麥腸風下血槐角槐花枳殼荊芥黃芩大腹皮紅內硝地榆石楠皮白雞冠花為散煎一半為末空心鹽湯溫酒調下鼻衄吐紅竹青蒲黃藕節半夏丁香訶子桂花紅棗飛羅面白茅根蚌粉奶癰連翹茨菰子紅內硝白芷菰片荊芥牛膝山蜈蚣乳香沒藥漏蘆生地黃血風兩脅築心痛或盤腸或塊大黃蓽茇乳香動胎漏下不止黃耆側柏阿膠甘草續斷平常經血淋漓不斷或多或少或赤或白非時漏下可多服有效月水不通野苧根牛膝紅花蘇木陳酒同煎臨産小腹緊痛紅花滑石甘草燈心葵子枳殼大黃荊芥黃芩青皮滑石甘草瞿麥海金砂山梔子車前子安胎及胎漏下血阿膠大艾甘草蒲黃炒過産後腹痛血塊攻腸大艾沒藥好酒産後病眼北細辛荊芥羌活甘草菊花木賊石決明草決明女人赤眼頭風疾薄荷清茶赤眼生風防風黃芩産後浮腫氣虛急腹大喉中水雞聲牡丹皮荊芥白朮桑白皮赤小豆大腹皮杏仁半夏馬兜鈴生薑蔥白薄荷月水不調血崩或多或少或前或後嘔逆心膨陳艾黃耆血弱生風四肢痹痛行步艱難乳香人參沒藥麝香甘草五露子羌活獨活防風荊芥地龍南星白附子澤蘭為末蜜丸木瓜鹽湯下血氣膨脹甘草木香枳殼馬兜鈴葶藶紫蘇藿香地黃空心服補血住崩百草霜敗棕灰苴綿灰蒲黃炒過龍骨白堊血成塊地黃藕節黑血片人參白朮血片人參白朮血片龍骨青黃木瓜五色生麝香好酒鮮紅溫酒鹽酒風瘡赤腫荊芥牛蒡子何首烏甘草防風羌活鹽酒帶下肉桂黃耆百草霜甘草黑豆白朮玄胡索白堊龍骨空心鹽酒血寒甘草烏梅柴胡桃柳枝感風勞嗽款花知母阿膠半夏麻黃甘草馬兜鈴黃芩杏仁柴胡殭蠶訶子烏梅月經久閉肉桂甘草黃耆薑錢棗子木通紅花大便下血四肢寒膨脹及胃腸有風槐花枳殼漏蘆荊芥木香白雞冠花木通紅內硝紫草石榴皮陳皮黃芩青皮甘草白茅根槐角虛瀉人參川芎白芷蒲黃炒阿膠白朮茱萸續斷乾薑黑附子肉桂黃耆赤白芍甘草蜜丸鹽梅湯下白帶用龍骨酒煎産後痢腸風乳香龍骨茱萸木香肉桂蒼朮牡丹皮白薇人參甘草澤蘭大椒茴香煉蜜為丸木瓜酒下治帶下赤白痢陳米飲心腹膨炒薑酒血氣艾醋湯渾身勞倦為末炒薑陳青蒿鹽和調下虛證四肢黃甘草牡丹皮澤蘭白薇蒼朮桂心茴香蜜丸鹽湯酒下嘔逆飲食不入加白朮丁香甘草人參縮砂益智仁胡椒經行腹痛腰背痛蕓薹牛膝紅花吳茱萸菴䕡甘草銀器燈心熱服虛渴人參乾葛烏梅栝蔞根受胎小腸氣痛木香銀器胎前嗽枳殼甘草款花知母馬兜鈴半夏木通葶藶人參苦參麥門冬腳腫大腹皮赤小豆茯苓皮生薑皮産後不語失音訶子人參砂蜜百藥煎陰陽交合經脈行赤石脂黃耆肉桂百草霜敗棕灰肉豆蔻當歸木香龍骨白朮茯苓地榆藕節胎氣衝逆腰腳痹行步艱難枳殼甘草木通連翹荊芥地黃羌活獨活山梔子燈心空心服氣築小腹痛玄胡索煎服陳氏經驗方吳興周端仁郎中頃赴會試照囑一鄰云某本醫家凡婦人百病只以四物湯加茱萸無不效者産難及胎衣不下子死腹中入醋同煎凡用有效謹以此為報此藥不知起於何代或云自魏華他他之術精微方類單省傳稱他針灸不過數處千金方云自三代以來醫方藥論未有如此詳備其間有漢晉名公諸方産寶方乃朱梁節度巡官咱膺所撰其中有四物散後修入聖惠方自後醫者易散為湯善用者若馭良馬當隨意無不得所至馬命名醫於四物中增損品味隨意虛實寒燠皆得其效者然亦非止婦人之疾可用而已交加散出大全良方治胎前産後百病婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕産後中風尤妙及肌體黃瘦氣短羸怯生地黃一斤研取自然汁生薑十二兩研取自然汁上將地黃汁炒後入生薑汁勻炒俟稍干焙為細末每服三錢溫酒調下尋常服痛亦宜服産後尤不可缺一方或男女血熱心煩産後傷風以荊芥煎湯調下
