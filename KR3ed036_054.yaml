body:
  text: 卷五十四耳門勞聾附論夫勞聾者腎氣虛勞所致也足少陰腎經宗脈所聚其氣通於耳腎氣虛勞弱宗脈耗損則氣之所通安得聰徹而不瞶哉舊説謂因勞則甚要當節嗜欲慎起居而無損腎臟方補腎石斛丸治勞聾耳中久聵聵石斛去根附子炮裂去皮臍肉蓯蓉酒浸一宿切焙山茱萸洗微炒菟絲子酒浸一宿別研桂去粗皮澤瀉當歸切焙蛇床子炒巴豆去皮心膜炒黃色研如泥紙裹壓去油白茯苓去黑皮乾薑炮熟乾地黃焙菖蒲米泔浸一宿切焙芍藥細辛去苗葉遠志去心黃耆細銼各一兩防風去叉三分上除菟絲子外為末再入菟絲子末重羅煉蜜為丸如梧桐子大每服十五丸溫酒下日三肉蓯蓉丸治勞聾腎虛損腰腳無力面黑體瘦小便滑數肉蓯蓉一兩酒浸一宿刮去粗皮炙乾菖蒲一兩附子一兩炮裂去皮臍磁石一兩燒令赤醋淬七遍搗碎研水飛過巴戟一兩鹿茸一兩去毛塗酥炙微黃菟絲子一兩酒浸三日曝乾搗為末石斛一兩去根銼桂心一兩半桑螵蛸半兩微炒杜仲一兩去粗皮炙微黃銼牡蠣粉一兩補骨脂一兩微炒熟乾地黃一兩半上為末煉蜜為丸搗五七百杵丸如梧桐子大每服空心以溫酒下三十丸晚食前再服薯蕷丸治勞聾臟腑久虛腎氣不足肌體羸瘦腰腳無力薯蕷一兩熟乾地黃一兩附子一兩炮裂去皮臍桂心一兩天門冬一兩半去心焙石斛一兩去根節人參一兩去蘆頭遠志一兩去心肉蓯蓉一兩酒浸一宿刮去粗皮炙乾鹿茸一兩去毛塗酥炙微黃白茯苓一分鍾乳粉二兩菟絲子一兩酒浸三日曝乾別搗磁石一兩燒令赤醋淬七遍搗碎細研水飛過上為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸晚食前再服地黃丸治勞損耳聾大熟地黃洗焙當歸川芎辣桂大川椒出汗菟絲子酒浸三日曬乾搗末故紙炒白蒺藜炒杵去刺葫蘆巴炒杜仲薑製炒去絲白芷石菖蒲各一兩分磁石火燒醋淬七次研細水飛一分半上為細末煉蜜為丸如梧桐子大每服五十丸以蔥白溫酒空心吞下晚飯前又服內補丸治腎虛勞聾熟乾地黃焙附子炮裂去粗皮臍桂去粗皮肉蓯蓉酒浸一宿切焙鹿茸去毛酒浸一宿酥炙人參各一兩山芋一兩半柴胡去苗三分胡黃連一分遠志去心半兩細辛去葉苗半兩白茯苓去黑皮一分鍾乳鵝管者三二兩以甘草水煮三日研三日上除研藥余為細末再研勻煉蜜丸如梧桐子大空心溫酒下二十丸肉蓯蓉丸治勞聾積久耳鳴補腎磁石湯治勞聾耳中聵聵然磁石二兩醋淬七遍山茱萸洗炒芎藭菖蒲米泔浸一宿銼焙蔓荊子茯神去木白芷枳殼去穰麩炒黃甘草炙銼一兩陳橘皮湯浸去白焙各一兩天門冬去心一兩半地骨皮去土一兩半上粗搗篩每服三錢水一盞半入生薑半分切竹瀝二合同煎至七分去滓溫服日三萆麻子丸治勞聾虛鳴塞耳熟乾地黃散出聖惠方治勞聾腎氣不足耳無所聞熟乾地黃一兩半磁石一兩搗碎水衝去赤汁桂心一兩半人參一兩去蘆頭附子半兩炮去皮臍芎藭半兩蔓荊子一兩當歸一兩銼微炒牡丹皮半兩白茯苓一兩上為散每服先以水一大盞半入羊腎一對去脂膜切煎至一盞去腎入藥五錢棗三枚生薑半分同煎至五分去滓食前溫服菖蒲散出聖惠方治勞聾塞耳菖蒲半兩山茱萸半兩土瓜根半兩牡丹皮半兩牛膝半兩去苗附子半兩炮裂去皮臍萆麻子半兩去心磁石一兩燒令赤醋淬七遍搗碎細研上為末每用半錢用綿裹塞耳中一日一易之又菖蒲散出聖惠方治勞聾腎氣損耳無所聞菖蒲菟絲子酒浸三日曝乾別搗為末附子炮裂去皮臍山茱萸桂心各一兩肉蓯蓉一兩酒浸一宿刮去粗皮炙乾車前子半兩上為散每服以溫酒調下一盞空心及晚食前各二服菖蒲散治勞聾積久羊腎附子丸出聖惠方治勞聾附子一兩炮裂焙去皮臍磁石一兩燒令赤醋淬七遍搗碎研水飛過牛膝一兩去苗菟絲子一兩酒浸三日曝乾別搗為末肉蓯蓉一兩酒浸一宿刮去粗皮炙乾遠志一兩去心一方用菖蒲無遠志上為細末用羊腎五對去脂膜細切爛研入酒三升於銀鍋中微火煎如膏然後入藥末和搗二三百杵丸如梧桐子大空心及晚食前溫酒下三十丸鹽湯下亦得塞耳硫黃散治勞聾經久治勞聾滴耳出聖濟總録以童子小便少許灌入耳中即瘥暴聾附論夫猝耳聾者由腎氣虛為風邪所乘搏於經絡隨其血脈上入於耳正氣與邪氣相擊故令耳卒聾也方菖蒲膏出聖惠方治卒耳聾細辛菖蒲各六錢杏仁曲末各十錢上和搗為丸干即少著豬脂取如棗核大綿裹納耳中日一易小瘥一日夜易去日一塞之一方有蒲黃無菖蒲不用豬脂亦可又方出聖惠方龍腦二錢硝石二錢蔥涕少許蔥管二莖上藥並蔥涕同研納入蔥管中系定勿令漏氣於飯甑上蒸一炊後取汁滴入耳中菖蒲丸治猝聾不聞及痛石菖蒲萆麻子仁附子炮上等分為末蔥涎為丸如杏仁大綿裹塞耳中日二次透耳筒治耳鳴暴聾治猝耳聾出聖惠方龍腦半兩細研椒目半兩搗末杏仁一分湯浸去皮尖雙仁上研令勻綿裹如棗核大塞耳中日二易之草還丹出聖濟總録治失飢冒暑及風熱憂愁使耳暴聾或一耳塞因咽氣而開咽已復塞令人煩悶烏頭去皮臍黑豆各四兩鹽一兩上瓷瓶盛藥坐水中慢火煮令烏頭透取出細切與黑豆同焙為末煮麵糊丸如梧桐子大每服十五丸空心溫酒下菖蒲丸出聖惠方治耳猝痛及聾塞不聞聲治耳暴聾出海上名方雄黃一錢巴豆去殼一個上為末用蔥涎和作一錠子紙卷塞耳中又方出聖惠方巴豆一枚去心皮生用斑蝥一枚去翅足炒黃上同研令勻綿裹塞耳中瘥又方出聖惠方雞膏一合磁石半兩燒令赤醋淬七遍搗末上以雞膏和捻如棗核大綿裹塞耳中但單用雞膏亦佳治暴耳聾出寮療方用黃蠟不拘多少和茯苓嚼下良一方和嚼建茶送下又方出聖惠方用巴豆一粒蠟裹之用針刺蠟令內外通透塞耳中耳內忽腫痛出膿枯礬末吹之一方不用枯礬鼠膽丸出聖惠方治耳猝聾又方出本草以凌霄葉爛杵自然汁灌耳內瘥又方出本草以鯉魚腦髓煮粥服食良治卒聾及腎虛耳內作風水聲鐘聲出鮑氏方穿山甲六片蛤粉炒赤去粉蠍梢七個麝香少許上為末以蠟丸併入麻油一滴綿裹納耳內又方出鮑氏方蠟苓粥妙治暴耳聾上用雞心檳榔一個以刀子從臍剜取一眼子如錢眼大實以麝香坐於所患耳內從上以艾炷灸之不過三二次效暴熱耳聾附論夫耳者腎之候也若腎氣實則生熱熱則上焦壅滯經絡痞塞不得宣通邪熱之氣入於耳脈則令四肢滿急腰背強直胸脅切痛好忘不安耳無所聞也方犀角散出聖惠方治風毒壅熱胸心痰滯兩耳虛聾頭重目眩犀角屑甘菊花前胡去蘆頭枳殼麩炒微黃去瓤菖蒲各半兩麥門冬一兩去心澤瀉羌活木通銼生地黃各半兩甘草一分炙微赤銼上為散每服三錢水一中盞煎至五分去滓食後溫服茯神散出聖惠方治上焦風熱耳忽聾鳴四肢滿急昏悶不利宜服茯神一兩羌活蔓荊子薏苡仁防風去蘆頭黃耆銼各半兩菖蒲半兩麥門冬一兩去心焙五味子半兩甘草一分炙微赤銼上為散每服三錢水一中盞入生薑半分煎至五分去滓食後溫服羚羊角散出聖惠方治耳聾不聞言語利腎氣退熱羚羊角屑一兩沙參三分防風去蘆頭木通銼各三兩分旋覆花半兩澤瀉三分前胡三分去蘆頭菖蒲半兩牽牛子一兩半微炒上為散每服三錢水一中盞生薑半分煎至五分去滓食後溫服羚羊角散出聖惠方治腎氣實上焦風熱壅滯耳暴聾頭重羚羊角屑一兩白朮三分防風去蘆頭黃耆銼玄參澤瀉赤茯苓各三分赤芍藥三分甘草一分炙微赤銼上搗篩為散每服四錢以水一中盞入生地黃一兩竹葉二十七片同煎至六分去滓食後溫服大黃丸出聖惠方治風熱毒氣攻耳暴聾由腎氣實熱所致川大黃銼碎微炒梔子仁黃耆銼川升麻川朴硝黃連去須生乾地黃玄參各半兩磁石一兩燒醋淬七遍搗碎細研水飛過上為末煉蜜和丸如梧桐子大每服食後以溫酒下二十丸以利為度磁石散出聖惠方治暴熱耳聾心膈壅悶宜服此方磁石一兩搗碎水淘去赤汁木通銼一兩防風一兩去蘆頭枳殼三分麩炒微黃去瓤桑根白皮生乾地黃各一兩上為散每服五錢水一大盞煎至五分去滓空心溫服久聾附論夫久聾者腎臟虛血氣不足風邪停滯故也足少陰經宗脈所聚其氣通於耳若腎臟勞傷宗脈虛損血氣既衰風邪乘之致耳聾積久不瘥勞傷過甚邪氣溜滯故為久聾也方塞耳磁石丸出聖濟總録治久聾磁石煅醋淬七遍研半兩菖蒲狼牙木通銼食鹽研薰陸香研松脂研杏仁湯浸去雙仁皮尖炒研蠟熔入藥搗巴豆去皮殼炒研生地黃洗研各半兩上先搗前三味為末次同研諸藥搗三二百杵可丸即丸如棗核大綿裹塞耳中日一易塞耳木通丸出聖濟總録治久聾不瘥木通銼菖蒲磁石煅醋淬七遍研薰陸香研杏仁湯浸去雙仁皮尖炒研巴豆去皮殼炒研蠟各半兩附子炮裂去皮一分上除研外搗羅為末次將諸藥入鵝膏同搗可丸捻如棗核大綿裹塞耳中日一易萆麻子丸出直指方治久聾方萆麻子二三十個去油用遠志去心乳香各二錢皂角煨取肉半錢生地龍中者一條全蠍二個焙磁石火燒醋淬七次研細水飛二錢上為細末入蠟搗丸納入耳中治久聾出聖惠方松脂煉者一兩食鹽巴豆去皮心萆麻子去皮薰陸香杏仁各半兩湯浸去皮尖磁石三分細研上為細末以豬脂一兩黃蠟一兩先於銚子中銷令熔化後入諸藥攪令勻捻如棗核大中心通孔如米粒許以薄綿裹納耳中三日一易磁石丸出聖惠方治耳聾多時不瘥塞耳磁石一兩菖蒲半兩木通銼薰陸香杏仁去皮尖生用松脂各半兩上為末用黃蠟熔和丸如蓮子大長半寸可入耳門以細叉子穿孔塞耳中楓香丸出聖惠方治耳聾二十年不瘥者楓香半兩無薰陸香替以乳頭香更佳松脂三兩半黃蠟半兩婆律膏一蜆殼無以大麻脂一合小器中煎取一蜆殼替之胡桃仁半兩巴豆七枚去皮心微炒上搗楓香巴豆下松脂又搗次銷蠟下之搗令相和後下婆律膏胡桃仁熟搗如泥膏成丸如棗核大以綿裹日三兩度納耳中有汁出盡即愈一方有大麻油無胡桃仁塞耳麒麟竭丸出聖濟總録治久聾麒麟竭研鉛丹各二兩半研硝石研巴豆去殼各一分研上研勻蜜丸如棗核大新綿裹更塞耳中有膿出即拭去別換新綿裹再納避風以瘥為度桃仁膏出聖惠方治久聾桃仁三分湯浸去皮松脂三分椒目末一分半巴豆三七粒去皮心炒研上研如膏捻如棗核中穿一孔子綿裹塞耳中數日一易蠶香散出聖濟總録治耳聾久不瘥蠶紙已出者燒灰烏賊魚骨去甲染胭脂各一錢麝香研半錢上搗研為散滿塞耳中不動候自落未瘥再用天雄雞子方出聖惠方治三十年聾耳久不瘥天雄一分雞子附子各一枚上搗末取雞子開一孔取黃和藥納雞子中封合其頭還令雞復之藥成以綿裹塞耳中取瘥為度塞耳山茱萸丸出聖惠方治久聾山茱萸乾薑炮巴豆去皮殼炒別研各一兩上先搗前二味為末入巴豆同研令勻絞蔥汁和丸如棗核大綿裹塞耳中食頃干即易新藥塞之凡如此五日當小愈十日聞人聲瘥即止常以發塞耳孔避風一方用吳茱萸治耳久聾滴耳出聖惠方鼠脂半合青鹽一錢蚯蚓一條系頭捻取汁上以鼠脂蚯蚓汁調青鹽湯溫以綿蘸側臥捻滴耳中繼塞耳孔即瘥又方出聖惠方烏驢乳一合皂莢半挺為末蠟一兩上相和於銚子內熔成膏堪丸即丸如棗核大用針穿透安耳中一宿至來日看之有物下來在耳門中即取卻再用一兩度即瘥通氣散治久聾諸藥不效穿山甲炮螻蛄各五兩麝香一錢上以蔥涎和搗塞耳中或為細末每用少許以蔥管盛藥放耳中仍以耳聾類追風散搐鼻妙治耳久聾出聖惠方芫菁一枚巴豆一枚去皮萆麻子一枚去皮上細研以蜜二兩文武火熬半日不得令焦即不堪用只可為三丸以綿裹塞耳內仍留一綿頭垂下在外耳中膿出便可聞聲用時令熱為妙柘根酒出聖惠方治耳聾鳴汁出皆由腎寒或三十年不瘥柘根三十斤菖蒲切五斗各用水一石煮取五斗去滓澄清故鐵三二十斤燒赤水五斗浸三宿去鐵澄清上合一石五斗同米二石並曲二斗釀如常法酒熟一月封頭開清用磁石吸鐵者三斤搗為末納酒中浸三宿飲之日夜飲常飲取小醉而眠取聞人語乃止水銀方出聖惠方治久聾滴耳水銀一分蚯蚓生者一條上就樓蔥叢內以一莖去尖頭入水銀蚯蚓在內即系卻蔥頭勿令傾出候蚯蚓化為水即取滴耳中立愈楓香丸治耳久聾二膽方出聖惠方治耳久聾熊膽一分鼠膽二枚十二月收者上取水和旋取如緑豆大滴入耳中日一兩度瘥磁石酒出聖惠方治三十年久聾用故鐵三十斤以水七斗浸三宿取汁曲釀米七斗如常造酒法候熟取磁石一斤研末浸酒中三日乃可飲取醉以綿裹磁石納耳中覆頭臥酒醒去磁石即瘥又方出簡易方用菖蒲一寸九節者為末以萆麻子去殼研為膏丸如棗核大曬乾臨夜用綿裹塞耳中又方出聖濟總録用濕土瓜根截長半寸塞耳中向上以艾炷灸七壯每日易以瘥為度驢脂方治積年耳聾古吊脂方出聖惠方治久聾無問年歲不瘥者用古吊脂於琉璃瓶子中貯之以樟木合盛瓶每日一度滴半杏仁許入耳中此方極驗此物出南海福建有之瓶子若不著樟木襯之即當透卻驢髓方出聖惠方治耳聾無問年月及老小並治之用驢前腳脛骨打破於日陽中以瓷合子盛瀝取髓候盡收貯每用時以綿乳子點少許於所患耳內良久即須側臥候藥行其髓不得多用重者不過一兩度如新患點一上便有效其髓乏髓不堪白色者為上一方用針砂一合用水二合浸十日即取清水少許驢髓二味和攪勻每用少許滴在耳中用半個淨方磚燒令通赤用醋潑之將磁石末一兩鋪在上面著頭枕之至晚如此三度瘥大蒜方出直指方治耳聾久不效者用大蒜一瓣一頭剜一坑子以巴豆一粒去皮慢火炮令極熱入在蒜內用新綿裹定塞耳中不過三四次效栝蔞根方出本草治二三年耳聾方用栝蔞根細切三十斤水煮以釀酒如常法服之甚效治久年耳聾用磁石打作細塊綿裹塞耳中舊鐵丁五個燒紅淬入酒內溫飲澤瀉湯出聖濟總録治腎間有水耳聾經年不瘥澤瀉一兩半干熟地黃焙二兩五倍子丹參玄參防風去叉桂去粗皮人參當歸切焙各一兩半白茯苓去黑皮石斛去根地骨皮各二兩磁石煅醋淬七遍三兩牛膝去苗酒浸切焙甘草黃耆銼菖蒲米泔浸二宿銼焙各一兩半上粗搗篩每服三錢先以水三盞煮羊腎一隻取汁至一盞去羊腎下藥入生薑一棗核大拍碎大棗三枚去核同煎七分去滓食前溫服勝金透關散出衛生家寶方治多年久患耳聾不可治者服此十日內見效永除根本川烏頭一個炮去皮臍一方草烏用尖華陰細辛二件各二錢重膽礬半錢活鼠一個系定熱湯浸死破喉開取膽真紅色是上為末用鼠膽調和勻再焙令乾研細卻入麝香半字用鵝毛管吹入耳中吹時口含茶清候少時耳虛鳴附論夫耳者心之寄竅腎氣所通也腑臟和平則其竅通而無礙腎氣既虛風邪干之復以思慮勞心氣脈內結不得疏通則耳內焞輝與氣相擊而鳴或如鐘磬雷鼓或如蟬噪皆腎虛所致也腎氣通於耳足少陰腎之經宗脈之所聚勞動經血而血氣不足宗脈則虛風邪乘虛隨脈入耳與氣相擊故為耳鳴診其右手脈寸口名曰氣口以前脈浮則為陽手陽明大腸脈也沉則為陰手太陰肺脈也陰陽俱虛者此為血氣虛損宗脈不足病苦耳嘈嘈眼時妄見花此是肺與大腸俱虛也左手尺中名曰神門其脈浮為陽足太陽膀胱脈也虛者膀胱虛也腎與膀胱合病若耳鳴勿然不聞時惡風膀胱虛則三焦實也膀胱為津液之府若三焦實則克消津液故膀胱虛也耳鳴不止則變成聾方牛膝丸出聖濟總録治腎氣虛弱風邪干之上攻於耳常作蟬鳴以至重聽牛膝去苗海桐皮二味各半斤搗末用好酒五升放於銀石器內熬成膏蘹香子炒當歸切焙赤箭五加皮銼赤芍藥桂去粗皮麻黃去根節地龍炒木香獨活去蘆頭沒藥研乳香研防風去叉骨碎補麒麟竭沉香銼乾蠍炒去土天南星生用各一兩附子炮裂去皮臍烏頭炮裂去皮臍楝實芎藭各二兩麝香研半兩虎腦骨四兩酥炙上將前二味為膏後搗研二十四味為末入前膏內和搗三千杵丸如梧桐子大每服十丸至十五丸空心溫酒或鹽湯下保命丸出聖濟總録治耳內虛鳴熟乾地黃焙肉蓯蓉酒浸切焙桂心去粗皮附子炮裂去皮臍丁香菟絲子酒浸別搗人參各一兩白豆蔻去皮木香檳榔銼甘草炙各半兩鹿茸去毛酒浸一宿酥炙白茯苓去黑皮蒺藜子炒去角各三分上將十三味搗羅為末入菟絲末再羅煉白蜜丸如梧桐子大每服十五丸於空心食前溫酒下漸加丸數生地黃汁散出千金方治腎氣虛寒腰脊苦痛陰陽微弱耳鳴焦枯生地黃汁二升生天門冬汁白蜜各三升羊腎一具炙白朮麥曲各一斤甘草乾薑地骨皮各八兩桂心杜仲黃耆各四兩當歸五味子各三兩上為末納盆中取煎三物汁和研微火上暖盆取熱更研日曝乾常研令離盆酒服方寸匕日再肉蓯蓉丸出聖濟總録治男子患耳內虛鳴腰腎疼痛髀膝風冷食飲無味肉蓯蓉酒浸切焙石斛去根白朮五味子桂去粗皮巴戟天去心防風去叉人參各二兩白茯苓去黑皮澤瀉山茱萸各三兩熟乾地黃焙磁石煅醋淬七遍各四兩上搗羅為末煉蜜丸如梧桐子大每服三十丸空心食前溫酒下芎芷散出直指方治風入耳虛鳴白芷石菖蒲炒蒼朮陳皮細辛厚朴制半夏制辣桂木通紫蘇莖葉甘草炙各一錢分川芎三二分上銼散每服三錢薑五片蔥白二根水煎食後臨臥服乾地黃散出聖惠方治耳中蟬鳴熟乾地黃一兩防風一兩去蘆頭桑耳三分微炙枳殼三分麩炒微黃去瓤黃連一分去須杏仁三分湯浸去皮尖雙仁麩炒微黃木通三分銼黃耆三分銼檳榔三分茯神三分甘草三分炙微赤銼上為散每服三錢水一中盞生薑半分煎至五分去滓食前溫服地黃丸出聖濟總録治腎虛耳鳴熟乾地黃焙三兩黃耆銼焙山茱萸桑根白皮各二兩黃連去須羚羊角屑桂去粗皮當歸炒焙代赭各一兩芎藭天雄炮裂去皮臍各一兩半上搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫酒送下妙龍齒散出聖濟總録治腎虛熱毒乘虛攻耳致耳內常鳴如蟬聲不可專服補藥宜用此方龍齒人參遠志去心白茯苓去黑皮麥門冬去心焙各半兩丹砂研鐵粉研末飛龍腦研牛黃研麝香研各一分上搗研為散同再研勻細每服半錢匕食後夜臥溫熱水調下日三病愈即已白朮湯出千金方治腎熱面黑目白腎氣內傷耳鳴吼鬧短氣四肢疼痛腰背相引小便黃赤白朮五兩生薑六兩羊腎一具治如食法玄參四兩澤瀉二兩淡竹葉切半二升芍藥茯苓各三兩生地黃切一升上㕮咀以水二斗煮羊腎竹葉取一斗去滓澄之下藥煮取三升分三服不已三日更服一劑地黃湯出經驗良方治男子二十歲因瘡毒後腎經熱右耳聽事不真每心中不意則轉覺重虛鳴疼痛生乾地黃一兩半桑白皮一兩磁石搗碎水淘三二十次去盡赤汁為度二兩枳殼羌活防風黃芩木通甘草各半兩上粗末每服四錢水一盞半煎七分去滓日二三服不拘時候經驗方無磁石一味塞耳蔥菖蒲丸一名蔥涕丸治耳聾耳鳴塞耳並水入耳菖蒲獨活去蘆頭礬石熬令汁枯各一兩細辛去苗葉桂去粗皮各三兩分附子炮裂去皮臍一分木通銼三分當歸切焙甘草炙各半兩上搗羅為末以蔥汁同白鵝膏和丸如棗核大綿裹納耳中日三易之一名木通丸用白礬不用礬石山芋丸出聖濟總録治耳聾耳鳴山芋熟乾地黃切焙磁石煅醋淬七遍菊花微炒黃耆銼茯神去木木通銼各一兩升麻獨活去蘆頭各三分上為末煉蜜和丸如梧桐子大每服二十丸米飲下漸加九丸十丸麝香丸出衛生寶鑑方治耳內虛鳴麝香半錢分全蠍十四個貓兒薄荷十四葉裹麝香全蠍丸上焙乾上為細末滴水捏作挺子塞耳內極妙治耳鳴亦止諸痛出本草用骨碎補去毛細切後用生蜜拌蒸從巳至亥取出曝乾搗末用炮豬腎空心吃桂心湯一名磁石散嚴氏濟生方治腎氣不足耳聾耳中虛鳴桂去粗皮羌活去蘆頭黃耆銼各一分防風去叉半兩芍藥人參銼各一分半木通銼各一分半磁石煅醋淬七遍二兩上粗搗篩每服三錢以水三盞先煮羊腎一隻去腎取汁一盞然後下諸藥煎至七分去滓溫服魚腦膏出聖惠方治耳鳴耳聾宜此膏塞耳鯉魚腦六合當歸防風去叉細辛去苗葉附子去皮臍芎藭白芷各一分上除魚腦並銼碎銀器中和魚腦煎成膏去滓傾入閣中澄凝每以棗核大綿裹塞耳中一方無當歸白芷一方有菖蒲一分療耳鳴沸鬧出聖惠方吳茱萸巴豆去皮熬乾薑石菖蒲磁石細辛各一分上搗末以鵝膏和少許以綿裹塞耳中以鹽五升布裹蒸之以尉耳門令其暖氣通入耳內冷復易之如此數用瘥後常以亂髮卷以塞耳中慎風一方無磁石芎歸湯出直指方治耳鳴芎藭當歸華陰細辛各半兩辣桂石菖蒲白芷各三錢上銼細散每服三錢入紫蘇薑棗煎服如虛冷甚者酌量加生附子蓋腎者宗脈所聚耳為之竅血氣不足宗脈乃虛風邪乘虛隨脈入耳氣與之搏故為耳鳴先用生料五苓散加制枳殼橘皮紫蘇生薑同煎吞青木香丸散邪疏風下氣續以芎歸飲和養之當歸膏出聖惠方治耳鳴聾當歸細辛防風附子芎藭白芷各六銖錢上為末以雄鯉魚腦和煎三上三下膏香去滓以棗核許塞耳中以綿裹之魚腦用六合微火煉之黃耆丸出危氏方治腎虛耳鳴夜間睡著如打戰鼓覺耳內風吹更四肢抽掣疼痛黃耆獨莖者去蘆一兩白蒺藜炒瓦擦揚去細碎刺羌活去蘆各半兩黑附子大者一個羯羊腎一對焙乾上為細末酒糊丸如梧桐子大每服三四十丸空心晚食前煨蔥鹽湯下一方有破故紙無白蒺藜菖蒲浸酒出聖惠方治耳虛聾及鳴全蠍丸治腎氣虛耳中如風水鳴或如鐘磬聲猝暴聾者全蠍川椒巴豆去皮菖蒲松脂各等分上為細末熔蠟和丸筒子塞耳中一日一易妙芎藭膏出聖濟總録治耳鳴耳聾塞耳芎藭當歸細辛去苗葉白芷各等分上細銼以鯉魚腦六合和於銀器中煎成膏去滓傾入閣中澄凝以棗核大綿裹塞耳中一名鐵漿酒巴豆丸治耳鳴塞耳巴豆二枚去皮熬桃仁去皮熬二枚松脂大豆許上搗作二丸綿裹塞耳中青鹽下氣丸出仁存方治腎氣虛氣衝上耳鳴耳聾茴香炒木香蓽澄茄上等分為末外以青鹽為末加糯米糊為丸如梧桐子大鹽湯下每服三四十丸巴豆方治腎氣虛耳內如風水鳴或如鐘磬聲卒患耳聾巴豆菖蒲松脂各等分上以蠟熔為筒子納耳中日一易之神效磁石酒治耳聾耳鳴常如風水聲磁石搗碎綿裹半兩木通菖蒲米泔浸各一兩日切焙各半斤上㕮咀以絹囊盛用酒一斗浸寒七日暑三日每飲三合日再菖蒲散治耳內晝夜虛鳴塞耳八味丸出簡易方治耳聵及虛鳴用好全蠍四十九枚炒微黃為末每服三錢以溫酒調下仍服八味丸百粒空心只三兩服見效治耳中常鳴出聖惠方用生地黃截塞耳日十數易之以瘥為度一云以紙裹微火灰中煨用生烏頭方出聖惠方療耳聾鳴如流水聲久不治成聾用生烏頭淨洗削如棗核大以塞耳中日一易之三日愈亦療耳癢及猝風聾一方治耳中膿出用生薑汁蘸烏頭塞耳中尤良補腎丸一名肉蓯蓉丸一名羊腎丸出千金方治腎虛耳聾或勞煩傷氣中風虛損腎氣升而不降致耳內虛鳴山茱萸乾薑炮遠志去心巴戟芍藥澤瀉菟絲子酒浸桂心黃耆石斛乾地黃細辛附子炮當歸牡丹皮蛇床子甘草蓯蓉酒浸人參各二兩菖蒲一兩防風一兩半茯苓半兩羊腎二枚上為末以羊腎研細酒煮麵糊為丸如梧桐子大食前鹽酒任下三十丸至五十丸一方除菟絲子外為細末再入菟絲子末煉蜜為丸如梧桐子大食後溫酒服之皆因腎虛故作補腎方又作薄利九竅藥即瘥磁石散出聖濟總録治腎氣虛弱氣奔兩耳作聲甚則成聾磁石煅醋淬七遍熟乾地黃焙牡丹皮菖蒲米泔浸一宿銼白朮各一兩附子炮裂去皮臍白茯苓去黑皮人參芎藭大黃銼炒蔓荊子微炒桂去粗皮當歸切焙桑螵蛸切破炙各半兩羊腎一對薄切去筋膜炙乾上為散每服一錢溫酒調下日加至二錢不拘時候石斛丸出聖濟總録治腎虛耳內作聲或如蟬噪或如風水聲診其左手尺脈微而細右手關脈洪而大是其候也石斛去根黃耆銼地骨皮鹿茸去毛酒浸一宿酥炙附子炮裂去皮臍各一兩菟絲子酒浸別研山茱萸各一兩一分遠志去心熟乾地黃焙菖蒲米泔浸過一宿銼焙防風去叉各三分桂去粗皮半兩玄參一兩上將十二味搗羅為末入菟絲子末再羅煉蜜丸如梧桐子大每服三十丸空心溫酒下以瘥為度此藥妊娠人去桂附加蜀椒三分丹參半兩蓯蓉丸出仁存方治腎虛耳聾或風邪入於經絡耳內虛鳴肉蓯蓉酒浸切片焙吳茱萸去核石龍肉石菖蒲菟絲子淘淨酒浸蒸焙鹿茸燎去毛切片酒浸蒸石斛去根磁石煅醋淬七次水飛附子炮去皮臍各一兩全蠍去毒二個麝香一字旋入川羌活一兩去蘆上為末煉蜜丸如梧桐子大每服七十丸至一百丸空心鹽酒或鹽湯送下一方無茱萸補腎黃耆湯出聖濟總録治腎虛耳數鳴而聾黃耆銼人參紫菀去土甘草炙銼防風去叉當歸切焙麥門冬去心焙五味子各一兩乾薑炮桂去粗皮各一二兩芎藭一兩半上粗搗篩每服五錢匕先以水三盞煮羊腎一隻至一盞半去腎下藥入蔥白三寸切大棗三枚劈破煎至八分去滓空心食前下溫服桑螵蛸散出聖濟總録治腎氣虛弱氣奔兩耳鳴甚成聾桑螵蛸切破炙附子炮裂去皮臍人參白茯苓去黑皮當歸切焙桂去粗皮各半兩熟乾地黃焙牡丹皮白朮銼炒各一兩羊腎一對薄切去筋膜炙乾上搗羅為細散每服一錢匕空心食前溫酒調下日三加至二錢許為佳補腎鹿茸丸一名磁石丸出聖惠方治腎勞虛後耳常聞鐘磬風雨之聲鹿茸去毛酒浸一宿酥炙磁石煅醋淬七遍枳實去瓤麩炒各三二兩附子炮裂去皮臍山芋牡蠣熬各一兩半五味子一兩肉蓯蓉酒浸切焙一兩半巴戟天去心一兩楮實炒別研搗末三兩上將九味搗羅為末入楮實末再羅令勻煉蜜丸如梧桐子大每服二十丸至三十丸空心浸牛膝酒下一方無枳實有菟絲子耳疼痛附論夫患耳中策策痛者皆風入於腎之經也不治流入腎則猝變脊強背直痓也若因痛而腫即生痓也癰癤膿潰邪氣泄則不成痓也所以然者足少陰為腎之經宗脈之所聚其氣通於耳上焦有風邪入於頭腦流至耳內與氣相擊故耳中痛耳為腎候其氣相通腎候腰脊主骨髓故邪流入腎經則脊強背直也方生犀丸出聖濟總録治耳中策策疼痛犀角鎊屑牛黃研各一兩防風去叉半兩白附子炮烏蛇酒浸去皮骨炙天南星半夏湯洗二十四遍乾薑炮丹砂研沒藥研龍腦研乳香研桂去粗皮各一兩當歸銼焙二兩半麝香研半兩上為細末煉蜜和丸如梧桐子大空心酒下二十丸消毒膏治諸般耳疾疼痛不可忍者防風大黃梔子仁黃芩黃連另為末杏仁石菖蒲當歸白芷以上各三二錢腦麝一錢另研上為粗末用好豬脂一斤切碎煉去滓取淨油同前藥慢火煎候白芷黃色為度去滓淨再下黃連腦麝末攪勻密器收貯每用少許芍藥散出聖惠方治熱壅生風耳內痛與頭相連膿血流出赤芍藥白芍藥川芎當歸甘草大黃木鱉子各半兩上銼散每服四錢煎食後臨臥服香附膏出聖濟總録治耳中疼痛附子二枚去皮臍生用菖蒲礬石燒枯杏仁湯浸去皮尖雙仁炒各半兩麝香研二錢萆麻子六十粒去皮上先搗附子菖蒲礬石為細末次將萆麻子杏仁搗膏次研麝香同拌勻丸如棗核大以蠟裹用大針穿透塞於耳中日再用之白龍散治耳中猝然大痛治瘡生肌止痛滑石一兩研硼砂三錢輕粉一錢寒水石四兩燒半白研烏賊魚骨一兩研上為細末每用摻耳中又油調如糊滴耳中痛立止治耳痛黃芩三錢木香半錢桔梗一錢甘草一錢上作一服水煎去滓服治耳內疼穿山甲一二個土狗子二個上將土狗子夾在穿山甲內同炒焦黃色為度入麝香少許為細末吹一字許於耳中一方治耳聾並瘥又方出海上方以草烏削如棗核大蘸生薑自然汁塞耳內其痛立止一方不用薑汁又方出仁存方用鱓魚血滴數點入耳內愈白鹽方出危氏方治耳聾疼痛百合散出聖惠方治耳聾疼痛用百合不拘多少焙乾為細散食後溫水調下一錢匕日三服為妙治耳內極痛方出聖濟總録用鬱金末研細每服用一字以淨水調傾入耳內卻急傾出塞耳丹出聖濟總録治耳猝疼痛不能忍木香散出聖濟總録治耳風疼痛久聾不通用木香搗羅為細散用蔥黃心截了尖沾鵝脂在上蘸木香散深納耳中覺痛止待一時辰方取去日三五次杏仁膏出聖惠方治耳中汁出或痛有膿用杏仁炒令赤黑為末研成膏薄綿裹納耳中日三四度易之或亂髮裹塞之亦妙一方治耳猝痛或有水出用杏仁炒焦為末蔥涎搜和為丸以綿裹塞耳中熏耳亦可又治耳中腫兼有膿柳根方出本草治耳痛有膿不出及癰巴結聚以柳根細切熟捶封之帛掩燥即易之治耳猝疼痛出本草以鹽蒸尉之耳腫附論夫耳者腎之候心之寄竅若其經為風熱所客隨脈而上至於耳中氣聚不散邪熱攻衝結聚為腫甚則黃汁出而為暴聾之病也方木香散出聖惠方治兩耳腫木香防己芍藥玄參白蘞大黃銼炒芒硝黃芩去黑皮紫葛各一兩赤小豆三分上搗羅為散每搗生榆白皮取汁和少許塗帛上貼腫處消鹽花丸出聖惠方治兩耳腫時苦疼痛鹽花四錢甜葶藶二兩用河水洗微杏仁去皮尖雙仁炒二兩臘月豬脂二錢上除脂外各搗研極細一處研勻次入豬脂和丸如棗核大每用綿裹納耳中日一易納藥後忽覺耳痛有惡水出四體不安勿疑黃耆丸治兩耳腫膿水出不聞人語聲三物散出聖惠方治耳腫熱痛及暴覺腫者赤小豆大黃各半兩木鱉子仁一兩上為末再同研勻每服少許以生油旋調塗耳腫處五倍子方出海上方治耳瘡腫痛並耳瘡癃痛或生瘡用五倍子為細末冷水調塗濕則干糝礬石散出千金方治耳猝腫出膿並底耳及治耳聾不瘥有積蟲用礬石熬令汁枯半兩研細每以葦管吹少許入耳中日三四度或以綿裹如棗核大塞耳中亦得一方先以干鹽糝之次入礬末尤妙一方先以紙捻去耳中汁次以礬石末粉耳中次以石鹽末粉其上良久乃起不過再度永瘥一方不用鹽栝蔞方出聖惠方治耳猝腫治耳猝腫出聖惠方用楝實五合煉搗每用綿裹如棗核大塞耳中亦治耳內生瘡又方出聖惠方用商陸生者洗淨以刀子削如棗核納耳中日二易之杏仁膏治耳腫或痛有膿汁治耳猝風毒腫起出仁存方用柳樹上蠹蟲糞水化取清水調白礬少許滴入耳中甚妙治耳卒腫出聖惠方用牛蒡根淨洗細切絞汁一升於銀鍋內熬成膏塗於腫上
