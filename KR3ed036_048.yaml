body:
  text: 卷四十八頭門頭風白屑附論夫頭生白屑不問冬夏令人瘙癢世呼為頭風此本於肺熱也肺為五臟之蓋其氣上衝頭頂肺寒則腦液下而多鼻涕肺熱則熏蒸而多白屑復以風熱鼓作故癢而喜搔方旱蓮膏出聖惠方治頭風白屑長髮令黑旱蓮子草十斤搗絞取汁二升桐木白皮四兩松葉防風芎藭白芷辛夷仁藁本沉香秦艽商陸犀角屑青竹皮細辛杜若蔓荊子零陵香各二兩甘松天雄白朮升麻楓香脂各一兩生地黃十斤搗絞取汁五升烏麻油四升馬脂一升熊脂二升豬脂一升搗絞蔓菁子油一升桑根白皮三兩上除脂油外並細銼以蓮子地黃等汁入瓷瓶內浸一宿取出與豬脂油同入大鍋內微火煎候白芷黃色膏成去滓貯入不津器中先洗髮令淨候乾用藥塗摩明旦取桑根白皮二兩細銼以水一斗五升煮取一斗放溫洗髮每夜塗藥一次蓮子膏出聖惠方治頭風白屑長髮令黑蓮子草汁一斗二升松葉桐樹白皮桑根白皮防風去蘆頭芎藭白芷辛夷藁本零陵香沉香秦艽商陸犀角屑青竹茹細辛杜若蔓荊子以上各二兩甘松香白朮天雄去皮臍柏樹白皮楓香以上各一兩生地黃汁五升生油四升馬鬐膏一升熊脂二升蔓荊子油一升上細銼以蓮子草汁地黃汁浸藥一宿用脂膏油等微火煎三上三下以白芷色黃焦膏成濾去滓於瓷器中貯之每用時取棗樹根白皮銼三升以水一斗煮取五升去滓以沐頭了然後塗膏熱摩入肌肉甘松膏出千金方治頭中風癢白屑甘松香丁香白芷澤蘭桑白皮桑寄生大麻苜蓿杏仁蔓荊子辛夷仁芎藭防風莽草各一兩零陵香吳藿香細辛蜀椒各二三兩竹葉松葉柏葉各半升胡麻油臘豬脂各一升烏雞肪雁肪各一兩合上㕮咀以酢漬一宿納油膏中微火煎三上三下白芷色黃膏成去滓塗頭上日二夜一發生龍腦膏出聖濟總録治頭風癢白屑長髮令黑龍腦沉香白檀香蘇合香雞舌香零陵香丁香甘松木香藿香白芷白附子細辛當歸芎藭天雄辛夷甘菊花烏喙防風蔓荊實杏仁湯浸去皮尖秦椒去目及閉口各一兩烏麻油五升斤上除油外並細銼以新綿裹內鍋中入油同煎候白芷黃色膏成去渣滓以瓷盒收旋取以手摩頭頂髮際松脂膏出聖惠方治頭風癢白屑長髮令黑松脂白芷天雄莽草躑躅花各一兩秦艽獨活烏頭炮裂辛夷仁甘松零陵香沉香牛膝木香各三兩松葉杏仁湯浸去皮尖研藿香葉莎草根甘菊花蜀椒去目並閉口者芎藭各二兩上除杏仁外並細銼以醋三升都入瓷瓶內浸一宿取入大鐺用生麻油一斗與藥同以微火煎候醋氣盡膏成去滓貯入不津器中每日三度勻塗髮根生髮膏出千金方治頭中風癢白屑蔓荊子附子細辛續斷零陵香皂莢仁澤蘭防風杏仁藿香白芷各二松葉石南各二兩莽草一兩馬鬐膏豬脂松膏各二斤升熊脂三斤升上㕮咀以清醋三升漬藥一宿明旦以馬鬐膏等微火煎三上三下以白芷色黃膏成用澤發長髮膏出聖惠方治頭風白屑風癢蔓荊子附子去皮澤蘭防風杏仁去皮零陵香藿香芎藭天雄辛夷各一兩沉香二兩松脂白芷各三兩馬鬐膏松葉切熊脂各一兩生麻油四斤升上以苦酒漬一宿以脂等煎緩火三上三下白芷色黃膏成去滓濾收貯塗發頭風癢並白禿三兩度瘥白屑膏出千金方治生髮頭風癢並白禿烏喙莽草細辛續斷石南草辛夷仁皂莢澤蘭白朮防風白芷各二兩柏葉竹葉切各一斤豬脂五升生麻油七斤上以苦酒漬一宿以油脂煎候白芷色黃膏成濾捩收以塗頭髮先洗後用之一方有松葉塗頂膏出聖惠方治頭風癢白屑烏喙去皮生用莽草石南細辛皂莢去皮子續斷澤蘭白朮辛夷防風去蘆頭以上各二兩柏葉二斤松葉二斤豬脂四斤上細銼以酒一升浸一宿漉出以豬脂煎藥焦黃膏成去滓沐發了以塗之妙菊花湯出千金方治頭風白屑沐頭菊花獨活去蘆頭茵芋防風去皮細辛去苗葉蜀椒去目併合口者皂莢杜蘅莽草桂去皮各半兩上為末每用一兩煮湯沐頭治頭風白屑經久不瘥時時瘙癢方出聖惠方甘菊花桑根白皮附子去皮臍藁本松葉蓮子草蔓荊子零陵香桑寄生以上各三兩上細銼每用五兩以生絹盛用桑柴灰汁一斗煎令藥味出冷熱得所去藥袋沐頭避風不過五七度瘥防風荊芥散出聖濟總録治諸風及沐發未乾致頭皮腫癢多生白屑荊芥穗莎草根去毛各半兩斤甘草炙銼三兩半甘菊花揀半兩芎藭白芷羌活去蘆頭防風去叉各三兩上為細散每服一錢匕茶酒任調不拘時蔓荊實膏一名集香油出聖惠方治頭風白屑頭癢發落頭旋妨悶蔓荊子三合香附子三十個北地者佳附子零陵香羊躑躅花旱蓮子各一兩葶藶子一兩半以上七味細銼綿裹以鐵鏵半斤碎用用生鐵亦可上麻油一大斤浸七日取以塗發油干旋添藥氣盡更易一方無香附子可常用梳頭若發稀及禿落入鐵精二兩於油中旋取塗治頭風發落或頭癢腫白屑無問老少出聖惠方蔓荊子一升碎防風三兩寄生三兩秦椒一兩大麻仁一升白芷四兩上切以水一斗五升煮一斗去滓以洗頭三四度瘥加芒硝一升亦妙豬椒根湯出千金方豬椒根三兩麻黃根防風各二兩細辛茵陳各一兩上㕮咀以水三斗煮取一斗去滓溫以沐頭龍腦丸出聖濟總録治諸風白屑長髮令黑白龍腦二兩用銅鼎盛水五升入龍腦拌糯米五十粒石灰泥固濟銅鼎口文火煮半日候冷取出研如粉真珠二兩先用大紙二張以皂莢津漬過為袋盛之又用綿裹定入粟粳五斗安甑中蒸一晝夜捻破即研如粉干丹砂二兩如芙蓉者研如粉並雄黃粉同入銀鍋中用醋三升以文火煮一復時取出卻以溫水淘去醋味曝乾雄黃一兩研如粉琥珀二兩拾得芥子者搗研如粉上和勻內留三兩每夜臨臥漱口了揩齒咽津餘六兩再用白麵四兩作餅子紙二張裹煨熟取出研細與前藥六兩煉蜜和搗丸如梧桐子大每日空心取兩丸含化咽津後飲溫酒三五合若四十以上更加白龍骨一兩研如粉以水飛過曝乾綿裹蒸一飯久次入桑螵蛸一兩煨熟搗末並前末同煉蜜丸治頭風白屑生發白令黑方浮木子五升未識以九月九日以前採臨時搗末去子鐵精四兩零陵香二兩丁香子二兩上細切絹袋盛用麻油二升斤漬經二七洗頭干每日塗之沐頭湯出聖惠方治肺勞熱不問冬夏老少頭生白屑瘙癢不堪然肺為五臟之蓋其勞損傷肺氣衝頭頂致使頭癢多生白屑搔之隨手起人多患此皆從肺來世呼為頭風也大麻子秦椒各三升皂莢屑五合上熟研納泔中一宿漬去滓木棒攪百遍取撈乃用沐頭髮際更別作皂莢湯濯之天麻餅出聖濟總録治諸風頭多白屑天麻芎藭白芷各五兩上為細末煉蜜和勻每一兩分作三十餅每服一餅細嚼茶酒任下不拘時治屑方五苓散二兩半縮砂三五粒黃丹一錢炒黑焦色上為細末和勻井花水一大盞朝東侵晨服之立效治頭風白屑出聖惠方附子三兩去皮臍生用桑根白皮半斤銼蔓荊子八兩上都搗碎以水一斗二升煮取七升濾去滓密室中沐頭又方白芷五兩細銼雞子三枚去殼川芒硝三兩上以水七升先煎白芷取四升濾去滓停少冷納雞子及硝攪令勻密室中洗頭治風屑及燥癢無時出本事方香白芷零陵香各等分上為末乾摻於頭上候三五日後篦去再敷三二次終世不生治頭癢搔之白屑起大麻子三升搗研秦椒二升上搗納泔汁中漬之一宿明旦濾去滓溫水沐發乾用後方白芷一斤雞子三枚芒硝一升三味以水四升煮取三升去滓停少冷內雞子清及硝攪令調更溫令熱分為三度澤頭覺頭癢即作洗之不過三度永除治肺勞熱不問冬夏老少頭生白屑出千金方用蜀椒二升以水煮取汁沐發良又方出聖惠方用桑灰汁沐頭去白屑神良一方葶藶子煮湯以沐即愈昨葉何草方出聖惠方治頭風白屑用瓦松曝乾燒灰淋汁熱洗頭不過五七度又方治患頭上白屑用搗山豆根為末油浸塗小兒用乳汁調塗楮實方出肘後方治頭風白屑如麩粳用堅截楮木作枕六十日上易新者治風屑極燥癢無時此乃氣虛風邪侵於皮表而生焉須用此藥治之出醫方大成用黎蘆根不拘多少為末先洗頭須避風尤要候未至十分乾時用藥摻定須用藥末入發至皮方得緊縛之兩日夜次日全無亦不燥癢如尚有些少可再用一次效治洗頭髮白屑不生用水蘇燒作灰淋汁以煮汁洗頭令髮香白屑不生又收干釀酒及清酒常服之佳雞子沐湯出聖惠方治頭風搔之白屑起用新生烏雞子三枚以沸湯五升揚之使溫打破雞子納入攪令勻分為三度沐令發生去白屑風癢治頭風白屑出聖惠方用荊子一斤以水一斗煮至五升去滓稍熱洗頭一云蔓荊子又方出聖惠方用蠶砂燒灰淋取汁熱暖洗頭又方出聖惠方用烏羊糞燒灰淋取汁熱暖洗頭又方出聖惠方用牛蒡子並藥搗絞取汁熬令稍稠臥時塗頭至明即以皂莢湯洗之又方出聖惠方用羊蹄草根曝乾搗羅為末以羊膽汁調揩塗頭上永除根白鴿方主頭極癢不痛生瘡用白鴿屎五合以好醋和稀膏煮三兩沸日三二上敷之效又方出永類鈐方以川椒皂莢屑火麻子漬水作湯沐發去白屑去風屑出本草以豹頭骨燒灰沐頭治頭風白屑生髮出本草以結殺樹花香油敷頭結殺樹生西國去白屑出本草方以熊腦髓作油摩頭治頭風屑出本草方以驢頭汁洗之白禿附論夫蟯之為害因血氣虛乘風而上則能生瘡疽癬瘑疥無不為也瘡痂不去而癢鬢髮禿落無復生榮是為白禿方杜蘅膏一名松脂膏出千金方治白禿及癰疽百瘡杜蘅雄黃研木蘭皮銼礬石研大黃銼炒附子炮裂去皮臍石南秦艽去苗土真珠研苦參水銀松脂各六兩豬脂去膜五斤上先將草藥搗羅為細末次將石藥及水銀合研如粉方熬豬脂松脂化次下諸藥文武火煎令稀稠得所以新綿濾去滓瓷合盛貯每用先以泔漿水洗頭淨後塗藥木蘭皮膏出聖惠方治白禿及百瘡木蘭蔓荊子秦艽去苗附子去皮臍生用川大黃石南苦參以上各一兩白礬真珠末雄黃水銀松脂以上各半兩細研至水銀星盡上先以木蘭皮等七味細銼醋拌令勻經宿用煉了豬脂二升於鍋中煎令附子等焦黃為度以綿濾去滓後入白礬等五味更煎數沸離火候冷於瓷閣中盛日三度塗之五味子膏一名蛇床子膏出千金方治白禿髮落生白痂終年不瘥五味子肉蓯蓉切焙松脂蛇床子遠志去心各三兩菟絲子五兩以酒浸一宿焙雄黃研雞糞白雌黃研白蜜各一兩豬脂二斤上先將草藥搗羅為末次將石藥雞糞再研令如粉下豬脂松脂入鍋中同熬化後下諸藥文火煎稀稠得所以新綿濾去滓瓷合盛每用先桑柴灰汁洗頭令淨後塗藥不過三次發生防風丸出聖濟總録治白禿髮落防風去叉黃連去須生乾地黃焙各四兩蔓荊實九兩柑皮焙一兩半葳蕤二兩半茯神三兩半去木大黃銼炒甘草炙銼各二兩上為末煉蜜丸如梧桐子大每服二十丸空心粥飲下升麻膏出聖濟總録治白禿髮落升麻薺苨莽草各二兩白芷一兩防風去叉三兩蜣螂四枚別研馬鬐脂熊脂豹骨髓各半斤上先將草藥搗羅為末次將三味脂熬消後下諸藥以文火煎令稀稠得所綿濾去滓瓷合盛每用先以泔漿水洗頭淨後塗藥王不留行湯出千金方治白禿及頭面久瘡去蟲止痛王不留行桃東南枝東引茱萸根皮各五兩蛇床子蔓荊子苦竹葉蒺藜子各三升大麻仁一升上㕮咀以水二斗半煮取一斗洗瘡日再並療癰疽妒乳月蝕瘡爛皆治之松瀝煎方出千金方治頭瘡及白禿髮不生松瀝七合丹砂研二兩雄黃研取精二兩水銀研黃連各一兩礬石一兩燒一方無礬有鉛粉一兩燒上搗散內瀝中攪令調以塗之先以泔洗髮令淨及瘡令無痂然後敷藥日三後當作膿膿干更洗塗藥如此三次膿訖以甘草湯洗去藥毒可十度許洗即瘥治白禿瘡出十便良方烏頭末半兩生用硫黃半兩細研膩粉一分狗糞一兩白色者研巴豆一分生去皮研上同研令勻以生油調攪先用熱米泔洗又以熱漿水洗又用生甘草水洗淨然後剃卻發刮去痂令赤色便塗揩之令入肉便以故帛包裹兩日一上三上即驗後用冬瓜皮燒灰細研油調塗之即發生如常治白禿瘡白礬焙枯松脂膩粉五倍子黃丹一方用密陀僧上等分為末調柏油和香油調藥擦瘡上桃皮湯出聖濟總録治白禿髮落沐發方桃皮去粗黑色者銼三兩面豉炒研各半兩白米研一合上以水一斗煮取八升去滓放溫沐頭每日用之桃皮膏出聖濟總録治白禿髮落桃皮去粗黑者一兩五銼炒研以水一斗煮取汁五升去滓先溫吃半盞餘留洗頭豉半兩白麵炒半兩上先以桃皮汁洗頭卻以水調豉面末敷之治禿瘡黃蜀葵花大黃黃芩各等分上為細末好清油調搽治禿方柳細枝一握取皮水銀大如三豆皂莢一梃碎上用醋煎如餳以塗之水銀膏出聖惠方治白禿瘡不愈水銀一兩黃連二兩去須細墨一兩上先以黃連墨搗為散用不著水豬脂和水銀同研令墨盡用塗瘡上神效烏羊膏出直指方治頭白禿瘡及惡瘡獖豬糞臘月收取燒灰半兩檳榔二錢雄黃一錢上為末先以麻油調和鴨子清約頭大小作圓餅溫覆頭上引蟲不可熱覆不得動頭待十分癢忍不得令人急手揭起次用苦楝根煎湯淋洗拭淨濕則摻干則麻油輕粉調抹禿頭藥楝樹子經霜火煉作灰白礬各重半兩火上煉上研為細末擦瘡上治白禿方出聖惠方黑豆一合炒令微黃干桃花一兩上為散以臘月豬脂調塗瘡上用帛子包裹勿令見風治刺梨頭白瘡豬筒骨帶髓紫草上用香油熬藥焦色去藥入白礬輕粉在內擦瘡即生髮治白禿瘡裹鹽荷葉藤穰上銼碎水煎濃汁洗三五度瘥治禿頂方出千金方用蕪菁子為末以酢和敷之日三又方出千金方用麻子三升熬焦為末以豬脂和塗之發生為度治禿無發者方出千金方用黑椹二升納罌中日曝三七日化為水洗瘡上三七日發生神效治白禿方出肘後方上用羊肉濕脯炙令香及熱速搭上不過三四度癢勿搔之牛肉亦得又方出肘後方療白禿用新破豬肚去糞及熱速搭頭上須臾蟲出瘥出若不盡更作取令無蟲若癢慎勿搔當縛兩手日中臥午後去之又方出肘後方用皂莢湯淨洗干拭然後以陳久油滓塗之日三麻油亦可又方用煮桃皮汁飲之並洗頭外臺祕要有面豉和以敷一方用花為末和豬脂封上又方用曲豆豉兩種治下篩酢和敷上一作面一方以米泔淨洗用醋和敷之又方用大黑豆炒令焦為末和臘月豬脂熱暖匙抄封上後即裹著勿見風一方髑髏骨大豆各燒為末等分臘豬脂和如泥塗之必效治禿瘡方用童子小便暖洗之揩令血出取合鴿糞五合熬末和釅醋令稠塗之即瘥一方先以米泔淨洗用醋和敷之治禿方取三月三日桃花開口者陰乾與桑椹等分搗末豬脂和以灰汁洗後塗藥瘥治刺梨用百年屋下燕窠泥同奄翁窠為末麻油調先用米泔洗透用刀子剃去皮血出不妨用紙挹干敷藥或干敷亦可龍粉散治白禿瘡用乾地龍為細末入輕粉麻油調敷之白禿頭方用麻油膩粉調抹又方用雄豬膽汁半杯入法醋以雞羽敷掃藜蘆散治禿瘡貫衆一兩藜蘆二三錢漏蘆三錢上為細末先洗淨瘡乾擦瘡上候乾油調塗又方用藜蘆為末以臘月豬膏和塗之又五月漏蘆草燒作灰豬膏和便塗先用鹽湯洗乃敷又方用先洗淨好花椒末不以多少調敷三五次效又方治白禿瘡及發中生癬用取熊白脂敷之治白禿用白鴿糞搗細羅為末先醋米泔洗了敷之立瘥治大人小兒禿刺梨溜膿用獨核肥皂去核用砂糖填滿中放巴豆二枚麻繩扎定鹽泥固之火煅青煙起存性去泥入檳榔末輕粉五七分研勻用香油調敷先用熱湯泡灰汁洗淨再用溫水洗去軟帛挹干敷藥一宿便見效敷後不須再洗治癩頭用白膠香真珠麻油煎沸入細切蔥白黃丹先用清湯洗不拘多少敷療禿瘡用取虎膏敷之苦楝膏治大人小兒瘡禿及惡瘡用苦楝皮燒灰以豬脂調敷之治癩頭熱紅餅瘡方用生艾白芷大腹皮連根蔥各等分煎湯洗拭以生藍青葉入些生艾搗細蜜水為膏敷亦治惡瘡治頭禿用五靈脂白礬白芷青黛好草烏各一分為末麻油調敷決效散治風癢頭瘡貫衆三兩白芷一兩上為細末油調塗之細辛膏一名白屑膏治頭瘡有蟲變成白禿療白禿方羊蹄草根獨根者以三年醋研和如泥勿見風日及婦女雞犬以生布拭瘡令赤敷之治禿瘡法黃連木香百部各一兩分南椒二銖上為細末更入麝香少許輕粉十個砒硫黃水銀各三銖於乳鉢內研令細以生油塗瘡藥末敷之百部散出楊氏家藏方治大人小兒禿瘡金毛狗脊去毛黑狗脊蛇床子炒馬兜鈴銀各一兩硫黃秦艽百部各半兩上件為細末生麻油調塗瘡上治禿瘡出本草以象肉燒作灰和油塗之治濕癬白禿出本草以馬齒莧煎為膏塗之若燒灰敷之亦良主頭瘡白禿出本草可煎及已絞汁敷之治白禿瘡出本草以糞藍煎湯洗之治白禿瘡出本草用山豆根不拘多少以水研敷瘡上治發禿落出本草以馬鬐膏塗頭上治白禿生髮出本草以白馬脂五兩在瘡上稍稍封之治白禿瘡出本草以駁馬不乏者尿數數暖洗之十遍瘥治頭瘡白禿出本草以馬尿洗之治頭極癢不痛出瘡出本草用楸葉根不拘多少以搗絞汁塗之治頭瘡白禿殺蟲及治腫毒出本草以莽草與白蘞赤小豆為末雞子白調如糊塗之並塗腫上干即更易治頭瘡白禿出本草取雞窠中草和白頭翁草燒灰豬脂敷之赤禿附論夫諸陽脈皆在於頭風熱乘之則陽邪熾盛發於頭皮腦絡之間細瘡遍密赤色有汁癢痛浸淫乃至發落故名赤禿方旱蓮汁出聖濟總録治赤禿髮落塗方旱蓮草三兩鐵粉一分上先將旱蓮草搗絞取汁次入鐵粉研令極細入閣中每用先以泔漿洗頭次塗之牛羊角灰出千金方治赤禿髮落塗方牛羊角等分燒灰上研如粉以豬脂調敷之一方無羊角馬蹄灰出千金方治赤禿髮落塗方用馬蹄燒灰研如粉用臘月豬脂調塗之椹汁方出千金方治赤禿髮落塗方用黑椹一斗瓷瓶中密封於北簷下埋之一百日即變為水每用先淨洗頭次塗之發即生一方桑灰汁洗頭令淨搗椹敷之日中曝頭睡楸葉汁出聖惠總録方治赤禿髮落塗方用楸葉一兩搗絞取汁敷之治禿髮復生出海上方用香油水各和一半以銀叉攪之使油水相入擦敷頭上發則復生又方用取狗乳塗之治頭赤禿方出千金方用搗黑椹子取汁每服一中盞日三服又方出聖惠方用豬毛燒灰細研以豬脂和敷之又方出聖惠方用油磨錢衣塗之即生
