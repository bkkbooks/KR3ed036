body:
  text: 卷一百二十八傷寒門辨陽明脈證並治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也陽明胃也邪自太陽經傳之入府者謂之太陽陽明經曰太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯即是太陽陽明脾約病也正陽陽明者胃家實是也邪自陽明經傳入腑者謂之正陽陽明經曰陽明病脈遲雖汗出不惡寒其身必重短氣腹滿而喘有潮熱者外欲解可攻裡也手足濈濈然汗出者此大便已硬也大承氣湯主之即是正陽陽明胃家實也少陽陽明者發汗利小便已胃中燥煩實大便難是也邪自少陽經傳之入腑者謂之少陽陽明經曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃即是少陽陽明病也陽明之為病胃家實也邪傳入胃熱毒留結則胃家為實華他曰熱毒入胃要須下去之不可留於胃中是知邪在陽明為胃家實也問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也本太陽病不解因汗利小便亡津液胃中乾燥太陽之邪入腑轉屬陽明古人登廁必更衣不更衣者通為不大便不更衣則胃中物不得泄故為內實胃無津液加之蓄熱大便則難為陽明裡實也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也陽明病為邪入腑也邪在表則身熱汗出而惡寒邪既入腑則表證已罷故不惡寒但身熱汗出而惡熱也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也邪客在陽明當發熱而不惡寒今得一日猶不發熱而惡寒者即邪未全入腑尚帶表邪若表邪全入則更無惡寒必自汗出而惡熱也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也胃為水穀之海主養四旁四旁有病皆能傳入於胃入胃則更不復傳如太陽傳之入胃則更不傳陽明陽明病傳之入胃則更不傳少陽少陽病傳之入胃則更不傳三陰本太陽初得病時發其汗汗先出不徹因轉屬陽明也傷寒傳經者則一日太陽二日陽明此太陽傳經故曰轉屬陽明傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也傷寒發熱無汗嘔不能食者太陽受病也若反汗出濈濈然者太陽之邪轉屬陽明也經曰陽明病法多汗傷寒三日陽明脈大傷寒三日邪傳陽明之時經曰尺寸俱長者陽明受病當二三日發陽明氣血俱多又邪並於經是以脈大傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也浮為陽邪緩為脾脈傷寒脈浮緩太陰客熱邪在三陽則手足熱邪在三陰則手足寒今手足自溫是知系在太陰也太陰土也為邪蒸之則色見於外當發身黃小便自利者熱不內蓄不能發黃至七八日大便硬者即太陰之邪入府轉屬陽明也傷寒轉系陽明者其人濈然微汗出也傷寒則無汗陽明法多汗此以傷寒兼邪轉系陽明故濈然微汗出陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也脈浮在表緊為裡實陽明中風口苦咽乾腹滿微喘者熱傳於裡也發熱惡寒者表仍未解也若下之里邪雖去表邪復入於裡又亡津液故使腹滿而小便難陽明病若能食名中風不能食名中寒陽明病以飲食別受風寒者以胃為水穀之海風為陽邪陽殺穀故中風者能食寒為陰邪不殺穀故傷寒者不能食陽明病若中寒不能食小便不利手足濈然汗出此欲作痼瘕必大便初硬後溏所以然者以胃中冷水穀不別故也陽明中寒不能食者寒不殺穀也小便不利者津液不化也陽明病法多汗則周身汗出此手足濈然而汗出而身無汗者陽明中寒也痼瘕者寒氣結積也胃中寒甚欲留結而為痼瘕則津液不得通行而大便必硬者若汗出小便不利者為實也此以小便不利水穀不別雖大便初硬後必溏也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈陽病客熱初傳入胃胃熱則消穀而欲食陽明病熱為實者則小便當數大便當硬今小便反不利大便自調者熱氣散漫不為實也欲食則胃中谷多內經曰食入於陰長氣於陽谷多則陽氣勝熱消津液則水少經曰水入於經其血乃成水少則陰血弱金匱要略曰陰氣不通即骨疼其人骨節疼者陰氣不足也熱甚於表者翕翕發熱熱甚於里者蒸蒸發熱此熱氣散漫不專著於表裡故翕翕如有熱狀奄忽也忽然發狂者陰不勝陽也內經曰陰不勝其陽者則脈流薄疾並乃狂陽明蘊熱為實者須下之愈熱氣散漫不為實者必待汗出而愈故云濈然而汗出解也水穀之等者陰陽氣平也水不勝穀氣是陰不勝陽也汗出則陽氣衰脈緊則陰氣生陰陽氣平兩無偏勝則愈故云與汗共並脈緊則愈陽明病欲解時從申至戌上四月為陽土旺於申酉戌向旺時是為欲解陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦不能食胃中本寒攻其熱復虛其胃虛寒相搏故噦也經曰關脈弱胃氣虛有熱不可大攻之熱去則寒起此之謂也陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也陽明病脈遲則邪方入里熱未為實也食入於陰長氣於陽胃中有熱食難用飽飽則微煩而頭眩者穀氣與熱氣相搏也兩熱相合消搏津液必小便難利者不能發黃言熱得泄也小便不利則熱不得泄身必發黃疸黃也以其發於穀氣之熱故名谷疸熱實者下之則愈脈遲為熱氣未實雖下之腹滿亦不減也經曰脈遲尚未可攻陽明病法多汗反無汗其身如蟲行皮中狀者以此久虛故也胃為津液之本氣虛津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃氣久虛也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明病法多汗反無汗而小便利者陽明傷寒而寒氣內攻也至二三日嘔而咳支厥者寒邪發於外也必苦頭痛若不咳不嘔手足不厥者是寒邪俱攻裡而不外發其頭亦不痛也陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛陽明病身不重痛但頭眩而不惡寒者陽明中風而風氣內攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則咳咽門者胃之系咳甚則咽傷故必咽痛若胃氣不逆則不咳其咽亦不痛也陽明病無汗小便不利心中懊憹者身必發黃陽明病無汗而小便不利者熱蘊於內而不得越心中懊憹者熱氣鬱蒸欲發於外而為黃也陽明病被火額上微汗出小便不利者必發黃陽明病則為內熱被火則火熱相合而甚若遍身汗出而小便利者熱得泄越不能發黃今額上小汗出而小便不利則熱不得越鬱蒸於胃必發黃也陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出浮為在經緊者裡實脈浮而緊者表熱裡實也必潮熱發作有時若脈但浮而不緊者止是表熱也必盜汗出盜汗者睡而汗出也陽明病裡熱者自汗表熱者盜汗陽明病口燥但欲漱水不欲咽者此必衄陽明之脈起於鼻絡於口陽明裡熱則渴欲飲水此口燥但欲漱水不欲咽者是熱在經而里無熱也陽明氣血俱多經中熱甚迫血妄行必作衄也陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也先亡津液使大便硬小便數少津液分別大便必自下也傷寒嘔多雖有陽明證不可攻之嘔者熱在上焦未全入腑故不可下陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病腹滿者為邪氣入腑可下之心下硬滿則邪氣尚淺未全入腑不可便下之得利止者為邪氣去正氣安正氣安則愈若因下利不止者為正氣脫而死陽明病面合赤色不可攻之必發熱色黃小便不利也合通也陽明病面色通赤者熱在經也不可下之下之虛其胃氣耗其津液經中之熱乘虛入胃必發熱色黃小便不利也陽明病不吐不下心煩者可與調胃承氣湯吐後心煩謂之內煩下後心煩謂之虛煩今陽明病不吐不下心煩即是胃有鬱熱也與調胃承氣湯以下鬱熱陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病脈遲若汗出多微發熱惡寒者表未解也若脈遲雖汗出而不惡寒者表證罷也身重短氣腹滿而喘有潮熱者熱入腑也四肢諸陽之本津液足為熱蒸之則周身汗出津液不足為熱蒸之其手足濈然而汗出知大便已硬也與大承氣湯以下胃熱經曰潮熱者實也其熱不潮是熱未成實故不可便與大承氣湯雖有腹大滿不通之急亦不可與大承氣湯與小承氣湯微和胃氣大承氣湯方大黃四兩苦寒酒洗厚朴半斤苦溫炙去皮枳實五枚苦寒炙芒硝三合鹹寒內經曰燥淫所勝以苦下之大黃枳實之苦以潤燥除熱又曰燥淫於內治以苦溫厚朴之苦下結燥又曰熱淫所勝治以鹹寒芒硝之咸以攻蘊熱上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上火微一兩沸分溫再服得下余勿服小承氣湯方大黃四兩厚朴二兩炙去皮枳實三枚大者炙大熱結實者與大承氣湯小熱微結者與小承氣湯以熱不大甚故於大承氣湯去芒硝又以結不至堅故不減厚朴枳實也以上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病潮熱大便微硬者可與大承氣湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也潮熱者實得大便微硬者便可攻之若不硬者則熱未成實雖有潮熱亦未可攻若不大便六七日恐有燥屎當先與小承氣湯漬之如有燥屎小承氣湯熱勢緩不能宣泄必轉氣下失若不轉失氣是胃中無燥屎但腸間少硬耳止初頭硬後必溏攻之則虛其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虛寒相搏氣逆則噦其後卻發熱者則熱氣乘虛還腹聚於胃中胃燥得熱必大便復硬而少與小承氣湯微利與和之故以重云不轉失氣不可攻內慎之至夫實則譫語虛則鄭聲鄭聲重語也內經曰邪氣盛則實精氣奪則虛譫語由邪氣盛而神識昏也鄭聲由精氣奪而聲不全也譫語者言語不次也鄭聲者鄭音不正也論語云惡鄭聲之亂樂又曰放鄭聲遠佞人鄭聲淫佞人殆言鄭聲不正也今新瘥氣虛人聲轉者是所謂重語者也若聲重亦聲轉也直視譫語喘滿者死下利者亦死直視譫語邪勝也喘滿為氣上脫下利為氣下脫是皆主死發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死亡陽胃燥譫語者脈短津液已絶不可復治脈自和為主氣未衰而尤可生也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服若吐若下皆傷胃氣不大便五六日上至十餘日者亡津液胃氣虛邪熱內結也陽明旺於申酉戌日晡所發潮熱者陽明熱甚也不惡寒者表證罷也獨語如見鬼狀者陽明內實也以為熱氣有餘若劇者是熱氣甚大也熱大甚於內昏冒正氣使不識人至於循衣摸床惕而不安微喘直視傷寒陽勝而陰絶者死陰勝而陽絶者死熱劇者為陽勝脈弦為陰有餘澀為陰不足陽熱雖劇脈弦知陰未絶而猶可生脈澀則絶陰不復可治其邪熱微而未至於劇者但發熱譫語可與大承氣湯以下胃中熱經曰凡服下藥中病即止不必盡劑此以熱未劇故云若一服利則止後服陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服亡津液胃燥大便硬而譫語雖無大熱內結亦須與小承氣湯和其胃氣得一服譫語止則胃燥以潤更莫復與承氣湯以本無實熱故也陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也陽明病譫語發潮熱若脈沉實者內實者也則可下若脈滑疾為裡熱未實則未可下先與小承氣湯和之湯入腹中轉失氣者中有燥屎可更與小承氣湯一升以除之若不轉失氣者是無燥屎不可更與承氣湯至明日邪氣傳時脈得沉實緊牢之類是裡實也反得微澀者裡氣大虛也若大便利後脈微澀者止為裡虛而猶可此又不大便脈反微澀是正氣內衰為邪所勝故云難治陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯下之譫語潮熱為胃熱當消穀引食反不能食者胃中有燥屎而胃中實也若能食者胃中虛熱雖硬不得為有燥屎雜病虛為不欲食實為欲食傷寒則胃實熱甚者不能食胃中虛熱甚者能食與雜病為異也大承氣湯以下燥屎逐結熱陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈陽明病熱入血室迫血下行使下血譫語陽明病法多汗以奪血者無汗故但頭汗出也刺期門以散血室之熱隨其實而瀉之以除陽明之邪熱散邪除熱營衛得通津液得復濈然汗出而解汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯胃中有燥屎則譫語以汗出為表未罷故云風也燥屎在胃則當下以表未和則未可下須過太陽經無表證乃可下之若下之早燥屎雖除則表邪乘虛復陷於裡為表虛里實胃虛熱甚語言必亂與大承氣湯卻下胃中邪熱則止傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語邪氣入內之時得沉脈而喘滿里證具也則當下之反發其汗令津液越出胃中乾燥大便必難久則屎燥胃實必發譫語三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之腹滿身重難以反側口不仁譫語者陽明也針經曰少陽病甚則面微塵此面垢者少陽也遺尿者太陽也三者以陽明證多故出陽明篇中三陽合病為表裡有邪若發汗攻表則燥熱益甚必愈譫語若下之攻裡表熱乘虛內陷必額上汗出手足逆冷其自汗出者三陽經熱甚也內經曰熱則腠理開營衛通汗大泄與白虎湯以解內外之熱二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯本太陽病並於陽明名曰並病太陽證罷是無表證但發潮熱是熱並陽明一身汗出為熱越今手足漐漐汗出是熱聚於胃也必大便難而譫語經曰手足漐然而汗出者必大便已硬也與大承氣湯以下胃中實熱陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之脈浮發熱為邪在表咽燥口苦為熱在經脈緊腹滿而喘汗出不惡寒反惡熱重身為邪在裡此表裡俱有邪猶當加解之若發汗攻表表熱雖除而內熱益甚故躁而憒憒反譫語憒憒者心亂經曰營氣微者加燒針則血不行更發熱而躁煩此表裡有熱若加燒針則損動陰氣故怵惕煩躁不得眠也若下裡熱雖去則胃中空虛表中客邪之氣乘虛陷於上焦煩動於膈使心中懊憹而不了了也舌上苔黃者熱氣客於胃中舌上苔白知熱氣客於胸中與梔子豉湯以吐胸中之邪若渴欲飲水口乾舌燥者白虎加人參湯主之若下後邪熱客於上焦者為虛煩此下後邪熱不客於上焦而客於中焦者是為乾躁煩渴與白虎加人參湯散熱潤燥若脈浮發熱渴欲飲水小便不利者豬苓湯主之此下後客熱客於下焦者也邪氣自表入里客於下焦三焦俱帶熱也脈浮發熱者上焦熱也渴欲飲水者中焦熱也小便不利者邪客下焦津液不得下通也與豬苓湯利小便以瀉下焦之熱也豬苓湯方豬苓去皮甘平茯苓甘平阿膠甘平滑石碎甘寒澤瀉甘鹹寒各一兩甘甚而反淡淡味滲泄為陽豬苓茯苓之甘以行小便鹹味湧泄為陰澤瀉之咸以泄伏水滑利竅阿膠滑石之滑以利水道上五味以水四升先煮四味取二升去滓納下阿膠煬消溫服七合日三服陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也針經曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺天熱衣厚則為汗是汗溺一液也汗多為津液外泄胃中乾燥故不可與豬苓湯利小便也脈浮而遲表熱裡寒下利清穀者四逆湯主之浮為表熱遲為裡寒下利清穀者裡寒甚也與四逆湯溫里散寒若胃中虛冷不能食也飲水則噦噦者咳逆是也千金曰咳逆者噦逆之名胃中虛冷得水則水寒相搏胃氣逆而噦脈浮發熱口乾鼻燥能食者則衄脈浮發熱口乾鼻燥者熱在經也能食者里和也熱甚於經迫血為衄胃中虛冷陰勝也水入於經其血乃成飲水者助陰氣逆為噦發熱口乾陽勝也食入於陰長氣於陽能食者助陽血妄為衄三者偏陰偏陽之疾也陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之表未罷而下者應邪熱內陷也熱內陷者則外無熱而手足寒今外有熱而手足溫者熱雖內陷然而不深故不作結胸也心中懊憹飢不能食者熱客胸中為虛煩也熱自胸中熏蒸於上故但頭汗出而身無汗與梔子豉湯以吐胸中之虛煩陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之陽明病潮熱為胃實大便硬而小便數今大便溏小便自可則胃熱未實而水穀不別也大便溏者應氣降而胸脅滿去今反不去者邪氣猶在半表半裡之間與小柴胡湯以去表裡邪陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明病腹滿不大便舌上苔黃者為邪熱入腑可下若脅下硬滿雖不大便而嘔舌上白苔者為邪未入腑在表裡之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗出而解陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治浮大為陽風在表也弦則為陰風在裡也短氣腹滿脅下及心痛風熱壅於腹中而不通也若寒客於內而痛者按之則寒氣散而痛止此以風熱內壅故雖久按而氣亦不通陽明病鼻乾不得臥自汗出者邪在表也此鼻乾不得汗而嗜臥者風熱內攻不幹表也一身面目悉黃小便難有潮熱時時噦者風熱攻於胃也陽明之脈出大迎循頰車上耳前過客主人熱勝則腫此風熱在經故耳前後腫刺之經氣通腫則小差如此者外證罷則可攻若外證不解雖過十日脈續浮者邪氣猶在半表半裡與小柴胡湯以和解之若其脈但浮而不弦又無諸里證者是邪但在表也可與麻黃湯以發其汗若不尿腹滿加噦者關格之疾也故云不治難經曰關格者不得盡其命而死陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導津液內竭腸胃乾燥大便因硬此非結熱故不可攻宜以藥外治而導引之蜜煎導方蜜七合一味納銅器中微火煎之稍凝似飴狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈遲汗出多當責邪在裡以微惡寒知表未解與桂枝湯和表陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明傷寒表實脈浮無汗而喘也與麻黃湯以發汗陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳湯主之但頭汗出身無汗劑頸而還者熱不得越也小便不利渴引水漿者熱甚於胃津液內竭也胃為土而色黃胃為熱蒸則色奪於外必發黃也與茵陳湯逐熱退黃茵陳蒿湯方茵陳蒿六兩苦微寒梔子十四枚擘苦寒大黃二兩去皮苦寒小熱之氣涼以和之大熱之氣寒以取之茵陳梔子之苦寒以逐胃燥宜下必以苦宜補必以酸大黃之苦寒以下瘀熱上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之內經曰血並於下亂而喜忘此下本有久瘀血所以喜忘也津液少大便硬以蓄血在內屎雖硬大便反易其色黑也與抵當湯以下瘀血陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯下後心中懊憹而煩者虛煩也當與梔子豉湯若胃中有燥屎者非虛煩也可與大承氣湯下之其腹微滿初硬後溏是無燥屎此熱不在胃而在上也故不可攻病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也不大便五六日者則大便必結為燥屎也胃中燥實氣不得下通故繞臍痛煩躁發作有時也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯雖得陽明證未可便為裡實審看脈候以別內外其脈實者熱已入腑為實可與大承氣湯下之其脈浮虛者是熱未入腑猶在表也可與桂枝湯發汗則愈大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯大下之後則胃弱不能消穀至六七日不大便則宿食已結不消故使煩熱不解而腹滿痛是知有燥屎也與大承氣湯以下除之病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯小便利則大便硬此以有燥屎故小便不利而大便乍難乍易胃熱者發熱喘冒無時及嗜臥也此燥屎在胃故時有微熱喘胃不得臥也與大承氣湯以下燥屎食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也上焦主內胃為之市食谷欲嘔者胃不受也與吳茱萸湯以溫胃氣得陽反劇者上焦不納也以治上焦法治之吳茱萸湯方吳茱萸一升洗辛熱人參三兩甘溫生薑六兩切辛溫大棗十二枚擘甘溫內經曰寒淫於內治以甘熱佐以苦辛吳茱萸生薑之辛以溫胃人參大棗之甘以緩脾上四味以水七升煮取二升去滓溫服七合日三服太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散太陽病脈陽浮陰弱為邪在表今寸緩關浮尺弱邪氣漸傳裡則發熱汗出復惡寒者表未解也傳經之邪入里里不和者必嘔此不嘔但心下痞者醫下之早邪氣留於心下也如其不下者必漸不惡寒而渴太陽之邪轉屬陽明也若吐若下若發汗後小便數大便硬者當與小承氣湯和之此不因吐下發汗後小便數大便硬若是無滿實雖不更衣十日無所苦也候津液還入胃中小便數少大便必自出也渴欲飲水者少少與之以潤胃氣但審邪氣所在以法救之如渴不止與五苓散是也脈陽微而汗出少者為自和也汗出多者為太過脈陽微者邪氣少汗出少者為適當故自和汗出多者反損正氣是汗出太過也陽脈實因發其汗出多者亦為太過太過為陽絶於里亡津液大便因硬也陽脈實者表熱甚也因發汗熱乘虛蒸津液外泄致汗出太過汗出多者亡其陽陽絶於里腸胃中乾燥大便因硬也脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶浮芤相搏陰陽不諧胃氣獨治鬱而生熱消爍津液其陽為絶趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之趺陽者脾胃之脈診浮為陽知胃氣強澀為陰知脾為約約者儉約之約又約束之約內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸於膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通陽潤燥麻仁丸麻子仁二升甘平芍藥半斤酸平枳實半斤炙苦寒大黃一斤去皮苦寒厚朴一斤炙去皮苦寒杏仁一斤去皮尖熬別作脂甘溫內經曰脾欲緩急食甘以緩之麻子杏仁之甘緩脾而潤燥津液不足以酸收之芍藥之酸以斂津液腸燥胃強以苦泄之枳實厚朴大黃之苦下燥結而泄胃強也上六味為末煉蜜為丸桐子大飲服十丸日二服漸加以知為度太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之蒸蒸者如熱熏蒸言甚熱也太陽病三日發汗不解則表邪已罷蒸蒸發熱胃熱為甚與調胃承氣湯下胃熱傷寒吐後腹脹滿者與調胃承氣湯內經曰諸脹腹大皆屬於熱熱在上焦則吐吐後不解復腹脹滿者邪熱入胃也與調胃承氣湯下其胃熱太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈吐下發汗皆損津液表邪乘虛傳裡大煩者邪在表也微煩者邪入里也小便數大便因硬者其脾為約也小承氣湯和之愈得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯針經曰脈軟者病將下弱為陰脈當責邪在裡得病二三日脈弱是日數雖淺而邪氣已入里也無太陽證為表證已罷無柴胡證為無半表半裡之證煩躁心下硬者邪氣內甚也胃實熱甚則不能食胃虛熱甚至四五日雖能食亦當與小承氣湯微和之至六日則熱甚與大承氣湯一升若不大便六七日小便多者為津液內竭大便必硬則可下之小便少者則胃中水穀不別必初硬後溏雖不能食為胃實以小便少則未定成硬亦不可攻須小便利屎定硬乃可攻之傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯內經曰諸脈者皆屬於目傷寒六七日邪氣入里之時目中不了了睛不和者邪熱內甚上熏於目也無表裡證大便難者裡實也身大熱者表熱也身微熱者裡熱也針經曰熱病目不明熱不已者死此目中不了了睛不和則證近危惡也須急與大承氣湯下之陽明發熱汗多者急下之宜大承氣湯邪熱入腑外發熱汗多者熱迫津液將竭急與大承氣湯以下其腑熱發汗不解腹滿痛者急下之宜大承氣湯發汗不解邪熱傳入腑而成腹滿痛者傳之迅也是須急下之腹滿不減減不足言當下之宜大承氣湯腹滿不減邪氣實也經曰大滿大實自可除下之大承氣湯下其滿實若腹滿時減非內實也則不可下金匱要略曰腹滿時減復如故此為寒當與溫藥是減不足言也陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明土少陽木二經合病氣不相和則必下利少陽脈不勝陽明不負是不相剋為順也若少陽脈勝陽明脈負者是鬼賊相剋為正氣失也脈經曰脈滑者為病食也又曰滑數則胃氣實下利者脈當微厥今脈滑數知胃有宿食與大承氣湯以下除之病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀飢至六七日不大便者有瘀血宜抵當湯七八日邪入腑之時病人無表裡證但發熱雖脈浮數亦可與大承氣湯下之浮為熱客於氣數為熱客於血下之邪熱去而浮數之脈相當解若下後數脈去而脈但浮則是營血間熱並於衛氣間也當為邪氣獨留心中則飢邪熱不殺穀潮熱發渴之證此下之後浮脈去而數不解則是衛氣間熱合於營血間也熱氣合併迫血下行胃虛協熱消穀喜飢血至下焦若大便利者下血乃愈若六七日不大便則血不得行蓄積於下為瘀血與抵當湯以下去之若脈數不解而下不止必協熱而便膿血也下後脈數不解而不大便者是熱不得泄蓄血於下為瘀血也若下後脈數不解而下利不止者為熱得下泄迫血下行必便膿血傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之金匱要略曰黃家所起從濕得之汗出熱去則不能發黃發汗已身目為黃者風氣去濕氣在也脾惡濕濕氣內著脾色外奪者身目為黃若瘀血在裡發黃者則可下所以寒濕在裡故不可下當從寒濕法治之傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之當熱甚之時身黃如橘子色是熱毒發泄於外內經曰膀胱者津液藏焉氣化則能出小便不利小腹滿者熱氣甚於外而津液不得下行也與茵陳湯利小便退黃逐熱傷寒身黃髮熱者梔子柏皮湯主之傷寒身黃胃有瘀熱當須下去之此以發熱為熱未實與梔子柏皮湯解散之梔子柏皮湯方梔子一十五個苦寒甘草一兩甘平黃柏二兩上三味以水四升煮取一升半去滓分溫再服傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之濕熱相交民多病疸疸黃也傷寒為寒濕在表發黃為瘀熱在裡與麻黃連軺赤小豆湯除熱散濕麻黃連軺赤小豆湯方麻黃二兩甘溫去節赤小豆一升甘平連軺二兩連翹房也苦寒大棗十二枚甘溫杏仁四十個甘溫去皮尖生梓白皮一升苦寒生薑二兩辛溫切甘草二兩炙甘平內經曰濕上甚而熱治以苦溫佐以甘辛以汗為故止此之謂也又煎用潦水者亦取其水味薄則不助濕氣以上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分溫三服半日服盡辨少陽病脈證並治第九少陽之為病口苦咽乾目眩也足少陽膽經也內經曰有病口苦者名曰膽疸甲乙經曰膽者中精之腑五臟取決於膽咽為之使少陽之脈起於目鋭眥少陽受邪故口苦咽乾目眩少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽之脈起於目眥走於耳中其支者下胸中貫膈風傷氣風則為熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽為半表半裡以吐除煩吐則傷氣氣虛者悸以下除滿下則亡血血虛者驚傷寒脈弦細頭病發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩悸經曰三部俱弦者少陽受病脈細者邪漸傳裡雖頭痛發熱為表未解以邪客少陽為半在表半在裡則不可發汗發汗亡津液胃中乾燥少陽之邪因傳入胃必發譫語當與調胃承氣湯下之胃和則愈不下則胃為少陽木邪干之故煩而悸本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯太陽轉入少陽是表邪入於裡脅下硬滿不能食往來寒熱者邪在半表半裡之間若已經吐下脈沉緊者邪陷入腑為裡實尚未可吐下而脈沉緊為傳裡雖深未全入腑外猶未解也與小柴胡湯以和解之若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之少陽之邪在表裡之間若妄吐下發汗溫針損耗津液胃中乾燥木邪干胃必發譫語若柴胡證不罷者則不為逆柴胡湯證罷者壞病也詳其因何治之逆以法救之三陽合病脈浮大上關上但欲眠睡目合則汗關脈以候之少陽之氣太陽之脈浮陽明之脈大脈浮上關上知三陽合病膽熱則睡少陰病但欲眠睡目合則無汗以陰不得有汗但欲眠睡目合則汗知三陽合病膽有熱也傷寒六七日無大熱其人躁煩者此為陽去入陰故也表為陽里為陰邪在表則外有熱六七日邪氣入里之時外無大熱內有躁煩者表邪傳裡也故曰陽去入陰傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也傷寒四日表邪傳裡里不和則不能食而嘔今反能食而不嘔是邪不傳陰但在陽也傷寒三日少陽脈小者欲已也內經曰大則邪至小則平傷寒三日邪傳少陽脈當弦緊今脈小者邪氣微而欲已也少陽病欲解時從寅至辰上內經曰陽中之少陽通於春氣寅卯辰少陽木生之時辨太陰脈證並治第十太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰為病陽邪傳裡也太陰之脈布胃中邪氣壅而為腹滿上不得降者嘔吐而食不下下不得上者自利益甚時腹自痛陰寒在內而為腹痛者則為常痛此陽邪干里雖痛而亦不常痛但時時腹自痛也若下之則陰邪留於胸中為結硬經曰病發於陰而反下之因作痞太陰中風四肢煩疼陽微陰澀而長者為欲愈太陰脾也主營四末太陰中風四肢煩疼者風淫末疾也表邪少則微里向和則澀而長長者陽也陰病見陽脈則生以陰得陽則解故云欲愈太陰病欲解時從亥至醜上脾為陰主旺於醜亥子向旺故云解時太陰病脈浮者可發汗宜桂枝湯經曰浮為在表沉為在裡太陰病脈浮者邪在經也故當汗散之自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩自利而渴者屬少陰為寒在下焦自利不渴者屬太陰為寒在中焦與四逆等湯以溫其臟傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也太陰病至七八日大便硬者為太陰入腑傳於陽明也今至七八日暴煩下利十餘行者脾家實腐穢去也下利煩躁者死此以脾氣和逐邪下泄故雖暴煩下利日十餘行而利必自止本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之表邪未罷醫下之邪因乘虛傳於太陰裡氣不和故腹滿時痛與桂枝湯以解表加芍藥以和里大實痛者桂枝加大黃湯主之大實大滿自可除下之故加大黃以下大實太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也腹滿痛者太陰病也脈弱其人續自便利則邪雖在裡未成大實欲與大黃芍藥攻滿痛者宜少與之以胃氣尚弱易為動利也辨少陰病脈證並治第十一少陰之為病脈微細但欲寐也少陰為病脈微細為邪氣傳裡深也衛氣行於陽則寤行於陰則寐邪傳少陰則氣行於陰而不行於陽故但欲寐少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐心煩者表邪傳裡也若腹滿痛則屬太陰此但欲寐則知屬少陰五六日邪傳少陰之時自利不渴者寒在中焦屬太陰此自利而渴為寒在下焦屬少陰腎虛水燥渴欲引水自救下焦虛寒不能制水小便色白也經曰下利欲飲水者以有熱故也此下利雖渴然以小便色白明非裡熱不可不察病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利脈陰陽俱緊為少陰寒法當無汗反汗出者陽虛不固也故云亡陽以無陽陰獨是屬少陰內經曰邪客少陰之絡令人嗌痛不可內食少陰寒甚是當咽痛而復吐利少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也咳而下利裡寒而亡津液也反以火劫強責少陰汗者津液內竭加火氣煩之故譫語小便難也少陰病脈細沉數病為在裡不可發汗少陰病始得之反發熱脈沉者為邪在經可與麻黃附子細辛湯發汗此少陰病脈細沉數為病在裡故不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之脈微為亡陽裡虛不可發汗脈弱澀為亡陽裡虛復不可下少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰病脈緊者寒甚也至七八日傳經盡欲解之時自下利脈暴微者寒氣得泄也若陰寒勝正陽虛而泄者則手足厥而脈緊不去今手足反溫脈緊反去知陽氣復寒氣去故為欲解下利煩躁者逆此正勝邪微雖煩下利必自止少陰病下利若利自止惡寒而蜷臥手足溫者可治少陰病下利惡寒蜷臥寒極而陰勝也利自止手足溫者里和陽氣得復故為可治少陰病惡寒而蜷時自煩欲去衣被者可治惡寒而蜷陰寒甚也時時自煩欲去衣被為陽氣得復故云可治少陰中風脈陽微陰浮者為欲愈少陰中風陽脈當浮而陽脈微者表邪緩也陰脈當沉而陰脈浮者裡氣和也陽中有陰陰中有陽陰陽調和故為欲愈少陰病欲解時從子至寅上陽生於子子為一陽醜為二陽寅為三陽少陰解於此者陰得陽則解也少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯經曰少陰病吐利躁煩四逆者死吐利手足不厥冷者則陽氣不衰雖反發熱不死脈不至者吐利暴虛也灸少陰七壯以通其脈少陰病八九日一身手足盡熱者以熱在膀胱必便血也膀胱太陽也少陰太陽為表裡少陰病至八九日寒邪變熱復傳太陽太陽為諸陽主氣熱在太陽故一身手足盡熱太陽經多血少氣為熱所乘則血散下行必便血也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥止竭為難治但厥無汗熱行於里也而強發汗虛其經絡熱乘經虛迫血妄行從虛而出或從口鼻或從目出諸厥者皆屬於下但厥為下厥血亡於上為上竭傷氣損血邪甚正虛故為難治少陰病惡寒身蜷而利手足逆冷者不治針經曰多熱者易已多寒者難治此內外寒極純陰無陽故云不治少陰病吐利躁煩四逆者死吐利者寒甚於里四逆者寒甚於表躁煩則陽氣欲絶是便死矣少陰病下利止而頭眩時時自冒者死下利止則水穀竭眩冒則陽氣脫故死少陰病四逆惡寒而身蜷脈不至不煩而躁者死四逆惡寒而身蜷則寒甚脈不至則真氣絶煩熱也燥亂也若憤躁之躁從煩至躁為熱來有漸則猶可不煩而躁是氣欲脫而爭也譬猶燈將滅而暴明其能久乎少陰病六七日息高者死腎為生氣之源呼吸之門少陰病六七日不愈而息高者生氣斷絶也少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死陰氣方盛至五六日傳經盡陽氣得復則愈反更自利煩躁不得臥寐則正氣弱陽不能復病勝臟故死少陰病始得之反發熱脈沉者麻黃附子細辛湯主之少陰病當無熱惡寒反發熱者邪在表也雖脈沉以始得則邪氣未深亦當溫劑發汗以散之麻黃附子細辛湯麻黃二兩去節甘熱細辛二兩辛熱附子一枚炮去皮破八片辛熱內經曰寒淫於內治以甘熱佐以苦辛以辛潤之麻黃之甘以解少陰之寒細辛附子之辛以溫少陽之經上三味以水一斗先煮麻黃減二升去上沫納藥煮取三升去滓溫服一升日三服少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也二三日邪未深也既無吐利厥逆諸里證則可與麻黃附子甘草湯微汗以散之麻黃附子甘草湯方麻黃二兩去節甘草二兩炙附子一枚炮去皮麻黃甘草之甘以散表寒附子之辛以溫熱氣上三味以水七升先煮麻黃一兩沸去上沫納諸藥煮取三升去滓溫服一升日三服少陰病得之二三日已上心中煩不得臥黃連阿膠湯主之脈經曰風傷陽寒傷陰少陰受病則得之於寒二三日以上寒極變熱之時熱煩於內心中煩不得臥也與黃連阿膠湯扶陰散熱黃連阿膠湯方黃連四兩苦寒黃芩一兩苦寒芍藥二兩酸平雞子黃二枚甘溫阿膠三兩甘溫陽有餘以苦除之黃芩黃連之苦以除熱陰不足以甘補之雞黃阿膠之甘以補血酸收也泄也芍藥之酸收陰氣而泄邪熱上五味以水五升先煮三物取二升去滓納膠煬盡少冷納雞子黃攪令相得溫服七合日三服少陰病得之一二日口中和其背惡寒者當灸之附子湯主之少陰客熱則口燥舌乾而渴口中和者不苦不燥是無熱也背為陽背惡寒者陽氣弱陰氣勝也經曰無熱惡寒者發於陰也灸之助陽消陰與附子湯溫經散寒附子湯方附子二枚破八片去皮辛熱茯苓三兩甘平人參二兩甘溫白朮四兩甘溫芍藥三兩酸平辛以散之附子之辛以散寒甘以緩之茯苓人參白朮之甘以補陽酸以收之芍藥之酸以扶陰所以然者偏陰偏陽則為病火欲實水當平之不欲偏勝也上五味以水八升煮取三升去滓溫服一升日三服少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰腎水而主骨節身體疼痛肢冷脈沉者寒成於陰也身疼骨痛若脈浮手足熱則可發汗此手足寒脈沉故當與附子湯溫經少陰病下利便膿血者桃花湯主之陽病下利便膿血者協熱也少陰病下利便膿血者下焦不約而裡寒也與桃花湯固下散寒桃花湯方赤石脂一斤一半全用一半篩末甘溫乾薑一兩辛熱粳米一升甘平澀可去脫赤石脂澀以固腸胃辛以散寒乾薑之辛以散裡寒粳米之甘以補正氣上三味以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈余勿服少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之二三日以至四五日寒邪入里深也腹痛裡寒也小便不利者水穀不別也下利不止便膿血者腸胃虛弱下焦不固也與桃花湯固腸止利也少陰病下痢便膿血者可刺下焦血氣留聚腐化則為膿血刺之以利下焦宣通血氣少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之吐利手足厥冷則陰寒氣甚煩躁欲死者陽氣內爭與吳茱萸湯助陽散寒少陰病下利咽痛胸滿心煩者豬膚湯主之少陰之脈從腎上貫肝膈入肺中則循喉嚨其支別者從肺出絡心注胸中邪自陽經傳於少陰陰虛客熱下利咽痛胸滿心煩也與豬膚湯調陰散熱豬膚湯方豬膚一斤甘寒豬水畜也其氣先入腎少陰客熱是以豬膚解之加白蜜以潤燥除煩白粉以益氣斷利上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯陽邪傳於少陰邪熱為咽痛服甘草湯則瘥若寒熱相搏為咽痛者服甘草湯若不瘥與桔梗湯以和少陰之氣甘草湯方甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩辛甘微溫甘草二兩甘平桔梗辛溫以散寒甘草味甘平以除熱甘梗相合以調寒熱上二味以水三升煮取一升去滓分溫再服少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之熱傷於絡則經絡乾燥使咽中傷生瘡不能言語聲不出者與苦酒湯以解絡熱愈咽瘡苦酒湯方半夏洗破如棗核大十四枚辛溫雞子一枚去黃內上苦酒著雞子谷中甘微寒辛甘散之半夏之辛以發音聲甘以緩之雞子之甘以緩咽痛酸以收之苦酒之酸以斂咽瘡上二味納半夏著苦酒中以雞子殼置刀鐶中安火上令三沸去滓少少含咽之不瘥更作三劑少陰病咽中痛半夏散及湯主之甘草湯主少陰客熱咽痛桔梗湯主少陰寒熱相搏咽痛半夏散及湯主少陰客熱咽痛也半夏散及湯方半夏洗辛溫桂枝去皮辛熱甘草炙甘平以上各等分內經曰寒淫所勝平以辛熱佐以甘苦半夏桂枝之辛以散經寒甘草之甘以緩正氣以上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三服下火令小冷少少咽之少陰病下利白通湯主之少陰主水少陰客寒不能制水故自利也白通湯溫里散寒白通湯方蔥白四莖辛溫乾薑一兩辛熱附子一枚生用去皮破八片辛熱內經曰腎苦燥急食辛以潤之蔥白之辛以通陽氣姜附之辛以散陰寒上三味以水三升煮取一升去滓分溫再服少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生少陰病下利脈微為寒極陰勝與白通湯復陽散寒服湯利不止厥逆無脈乾嘔煩者寒氣大甚內為格拒陽氣逆亂也與白通湯和豬膽汁湯以和之內經曰逆而從之從而逆之又曰逆者正治從者反治此之謂也服湯脈暴出者正氣因發泄而脫也故死脈微續者陽氣漸復也故生白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚生去皮破八片人尿五合鹹寒豬膽汁一合苦寒內經曰若調寒熱之逆冷熱必行則熱物冷服下嗌之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此和人尿豬膽汁鹹苦寒物於白通湯熱劑中要其氣相從則可以去格拒之寒也以上三味以水三升煮取一升去滓納膽汁人尿和令相得分溫再服若無膽亦可用少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之少陰病二三日則邪氣猶淺至四五日邪氣已深腎主水腎病不能制水水飲停為水氣腹痛者寒濕內甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕勝而水穀不別也內經曰濕勝則濡泄與真武湯益陽氣散寒濕真武湯方茯苓三兩甘平芍藥三兩酸平附子一枚炮去皮破八片辛熱生薑三兩切辛溫白朮三兩甘溫脾惡濕甘先入脾茯苓白朮之甘以益脾逐水寒淫所勝平以辛熱濕淫所勝佐以酸平附子芍藥生薑之酸辛以溫經散濕上五味以水八升煮取三升去滓溫服七合日三服後加減法若咳者加五味子半升細辛乾薑各一兩氣逆咳者五味子之酸以收逆氣水寒相搏則咳細辛乾薑之辛以散水寒若小便利者去茯苓小便利則無伏水故去茯苓若下利者去芍藥加乾薑二兩芍藥之酸泄氣乾薑之辛散寒若嘔者去附子加生薑足前成半斤氣逆則嘔附子補氣生薑散氣千金曰嘔家多服生薑此為嘔家聖藥少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之下利清穀手足厥逆脈微欲絶為裡寒身熱不惡寒面色赤為外熱此陰甚於內格陽於外不相通也與通脈四逆湯散陰通陽通脈四逆湯方甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖蔥味辛以通陽氣腹中痛者去蔥加芍藥二兩芍藥之酸通寒利腹中痛為氣不通也嘔者加生薑二兩辛以散之嘔為氣不散也咽痛者去芍藥加桔梗一兩咽中如結加桔梗則能散之利止脈不出者去桔梗加人參二兩利止脈不出者亡血也加人參以補之經曰脈微而利亡血也四逆加人參湯主之久病皆與方相應者乃可服之少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆者四肢不溫也傷寒邪在三陽則手足必熱傳到太陰手足自溫至少陰則邪熱漸深故四肢逆而不溫也及至厥陰則手足厥冷是又甚於逆四逆散傳陰之熱也四逆散方甘草炙甘平枳實破水漬炙乾苦寒柴胡苦寒芍藥酸微寒內經曰熱淫於內佐以甘苦以酸收之以苦發之枳實甘草之苦以泄裡熱芍藥之酸以收陰氣柴胡之苦以發表熱上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下痢肺寒氣逆則咳五味子之酸收逆氣乾薑之辛散肺寒並主下痢者肺與大腸為表裡上咳下痢治則頗同悸者加桂枝五分悸者氣虛而不能通行心下築築然悸動也桂猶圭也引導陽氣若熱以使小便不利者加茯苓五分茯苓味甘而淡用以滲泄腹中痛者加附子一枚炮令坼裡虛遇邪則痛加附子以補虛泄利下重者先以水五升煮薤白煮取三升去滓以散三方匕納湯中煮取一升半分溫再服泄利下重者下焦氣滯也加薤白以泄氣滯少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之下利不渴者裡寒也經曰自利不渴者屬太陰以其臟寒故也此下利嘔渴知非虛寒心煩不得眠知協熱也與豬苓湯滲泄小便分別水穀經曰復不止當利其小便此之謂歟少陰病得之二三日口燥咽乾者急下之宜大承氣湯傷寒傳經五六日邪傳少陰則口燥舌乾而渴為邪漸深也今少陰病得之二三日邪氣未深入之時便作口燥咽乾者是邪熱已甚腎水乾也急與大承氣湯下之以全腎也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰腎水也青肝色也自利色青為肝邪乘腎難經曰從前來者為實邪以腎蘊實邪必心下痛口乾燥也與大承氣湯以下實邪少陰病六七日腹脹不大便者急下之宜大承氣湯此少陰入腑也六七日少陰之邪入腑之時陽明內熱壅甚腹滿不大便也陽明病土勝腎水則干急與大承氣湯下之以救腎水少陰病脈沉者急溫之宜四逆湯既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者不云急溫此少陰有脈沉而云急溫者彼雖寒甚然而證已形見於外治之則有成法此初頭脈沉未有形證不知邪氣所之將發何病是急與四逆湯溫之少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯傷寒表邪傳裡至於少陰少陰之脈從肺出絡心注胸中邪既留於胸中而不散者飲食入口則吐心中溫溫欲吐陽受氣於胸中邪既留於胸中則陽氣不得宣發於外是以始得之手足寒脈弦遲此是胸中實不可下而當吐其膈上有寒飲亦使人心中溫溫而手足寒吐則物出嘔則物不出吐與嘔別焉胸中實則吐而物出若膈上有寒飲則但乾嘔而不吐也此不可吐可與四逆湯以溫其膈少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之脈微為亡陽澀為亡血下利嘔而汗出亡陽亡血也津液不足里有虛寒必數更衣反少者溫其上以助其陽也炙之以消其陰辨厥陰病脈證並治第十二厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止邪傳厥陰則熱已深也邪自太陽傳至太陰則腹滿而嗌乾未成渴也邪至少陰者口燥咽乾而渴未成消也至厥陰成消渴者熱甚能消水故也飲水多而小便少者謂之消渴木生於火肝氣通心厥陰客熱氣上撞心心中疼熱傷寒六七日厥陰受病之時為傳經盡則當入腑胃虛客熱飢不欲食蛔在胃中無食則動聞食臭而出得食吐蛔此熱在厥陰經也若便下之虛其胃氣厥陰木邪相乘必吐下不止厥陰中風脈微浮為欲愈不浮為未愈經曰陰病見陽脈而生浮者陽也厥陰中風脈微浮為邪氣還表向汗之時故云欲愈厥陰病欲解時從醜至卯上厥陰木也旺於卯醜寅向旺故為解時厥陰病渴欲飲水者少少與之愈邪至厥陰為傳經盡欲汗之時渴欲得水者少少與之胃氣得潤則愈諸四逆厥者不可下之虛家亦然四逆者四肢不溫也厥者手足冷也皆陽氣少而陰氣多故不可下虛家亦然下之是為重虛金匱玉函曰虛者十補勿一瀉之傷寒先厥後發熱而利者必自止見厥復利陰氣勝則厥逆而利陽氣復則發熱利必自止見厥則陰氣還勝而復利也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也始發熱邪在表也至六日邪傳厥陰陰氣勝者作厥而利厥反九日陰寒氣多當不能食而反能食者恐為除中除去也中胃氣也言邪氣大甚除去胃氣胃欲飲食自救故暴能食此欲勝也食以索餅試之若胃氣絶得面則必發熱若不發熱者胃氣尚在也恐是寒極變熱因暴熱來而復去使之能食非除中也金匱要略曰病人素不能食而反暴思之必發熱後三日脈之其熱續在者陽氣勝也期之旦日或夜半愈若旦日不愈後三日脈數而熱不罷者為熱氣有餘必發癰膿經曰數脈不時則生惡瘡傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒脈遲六七日為寒氣已深反與黃芩湯寒藥兩寒相搏腹中當冷冷不消穀則不能食反能食者除中也四時皆以胃氣為本胃氣已絶故云必死傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹傷寒先厥而利陰寒氣勝也寒極變熱後發熱下利必自止而反汗出咽中痛其喉為痹者熱氣上行也發熱無汗而利必自止利不止必便膿血者熱氣下行也熱氣下而不上其喉亦不痹也傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤前厥後發熱者寒極生熱也前熱後厥者陽氣內陷也厥深熱深厥微熱微隨陽氣陷之深淺也熱之伏深必須下去之反發汗者引熱上行必口傷爛赤內經曰火氣內發上為口糜傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈陰勝則厥陽勝則熱先厥五日為陰勝至六日陽復勝熱亦五日後復厥者陰復勝若不厥為陽全勝故自愈經曰發熱四日厥反三日復熱四日厥少熱多其病為愈凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也手之三陰三陽相接於手十指足之三陰三陽相接於足十指陽氣內陷陽不與陰相順接故手足為之厥冷也傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非為蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得復而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利方臟厥者死陽氣絶也蛔厥雖厥而煩吐蛔已則靜不若臟厥而躁無暫安時也病人臟寒胃虛蛔動上膈聞食臭出因而吐蛔與烏梅丸溫臟安蟲烏梅丸方烏梅三百個味酸溫細辛六兩辛熱乾薑十兩辛熱黃連一斤苦寒當歸四兩辛溫附子六兩炮辛熱蜀椒四兩去汗辛熱桂枝六兩辛熱人參六兩甘溫黃柏六兩苦寒肺主氣肺欲收急食酸以收之烏梅之酸以收陽氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒淫於內以辛潤之以苦堅之當歸桂枝細辛之辛以潤內寒寒淫所勝平以辛熱薑附之辛熱以勝寒蛔得甘則動得苦則安黃連黃柏之苦以安蛔上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血指頭寒者是厥微熱少也默默不欲食煩躁者邪熱初傳裡也數日之後小便色白裡熱去欲得食為胃氣已和其病為愈厥陰之脈挾胃貫膈布脅肋厥而嘔胸脅煩滿者傳邪之熱甚於里也厥陰肝主血後數日熱不去又不得外泄迫血下行必致便血病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也手足厥不結胸者無熱也小腹滿按之痛下焦冷結也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血先熱後厥者陽氣邪傳裡也發熱為邪氣在表至四日後厥者傳之陰也後三日復傳陽經則復熱厥少則邪微熱多為陽勝其病為愈至七日傳經盡熱除則愈熱不除者為熱氣有餘內搏厥陰之血其後必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒陰勝者先厥至四日邪傳裡重陰必陽卻熱三日七日傳經盡當愈若不愈而復厥者傳作再經至四日則當復熱若不復熱至五日厥不除者陰勝於陽其病進也傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死傷寒六七日則正氣當復邪氣當罷脈浮身熱為欲解若反脈微而厥則陰勝陽也煩躁者陽虛而爭也灸厥陰以復其陽厥不還則陽氣已絶不能復正而死傷寒發熱下利厥逆躁不得臥者死傷寒發熱邪在表也下利厥逆陽氣虛也躁不得臥者病勝藏也故死傷寒發熱下利至甚厥不止者死金匱要略曰六腑氣絶於外者手足寒五臟氣絶於內者利下不禁傷寒發熱為邪氣獨甚下利至甚厥不止為腑臟氣絶故死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒至七日為邪正爭之時正勝則生邪勝則死始不下利而暴忽發熱下利汗出不止者邪氣勝正陽氣脫也故死傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒五六日邪氣當作裡熱之時若不結胸而腹濡者里無熱也脈虛者亡血也復厥者陽氣少也不可下下之為重虛故死金匱玉函曰虛者重瀉真氣乃絶發熱而厥七日下利者為難治發熱而厥邪傳裡也至七日傳經盡則正氣勝邪當汗出而解反下利則邪氣勝裡氣虛則為難治傷寒脈促手足厥逆者可灸之脈促則為陽虛不相續厥逆則為陽虛不相接灸之以助陽氣傷寒脈滑而厥者里有熱也白虎湯主之滑為陽厥氣內陷是裡熱也與白虎湯以散裡熱也手足厥寒脈細欲絶者當歸四逆湯主之手足厥寒者陽氣外虛不溫四末脈細欲絶者陰血內弱脈行不利與當歸四逆湯助陽生陰也當歸四逆湯方當歸三兩辛溫桂枝三兩辛熱芍藥三兩酸寒細辛三兩辛熱大棗二十五個甘溫甘草二兩炙甘溫通草二兩甘平內經曰脈者血之府也諸血者皆屬心通脈者必先補心益血苦先入於心當歸之苦以助心血心苦緩急食甘以緩之大棗甘草通草之甘以緩陰血上七味以水八升煮取三升去滓溫服一升日三服若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之茱萸辛溫以散久寒生薑辛溫以行陽氣大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗出則熱當去熱反不去者亡陽也內拘急下利者寒甚於里四肢疼厥逆而惡寒者寒甚於表與四逆湯復陽散寒大汗若大下利而厥冷者四逆湯主之大汗若大下利內外雖殊其亡津液損陽氣則一也陽虛陰勝故生厥逆與四逆湯因陽退陰病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散手足厥冷者邪氣內陷也脈緊牢者為實邪氣入腑則脈沉今脈乍緊知邪結在胸中為實故心下滿而煩胃中無邪則喜飢以病在胸中雖飢而不能食與瓜蒂散以吐胸中之邪傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也金匱要略曰水停心下甚者則悸厥雖寒勝然以心下悸為水飲內甚先與茯苓甘草湯治其水而後治其厥若先治厥則水飲浸漬入胃必作下利傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之傷寒六七日邪傳厥陰之時大下之後下焦氣虛陽氣內陷寸脈遲而手足厥逆下部脈不至厥陰之脈貫膈上注肺循喉嚨在厥陰隨經射肺因亡津液遂成肺痿咽喉不利而唾膿血也金匱要略曰肺痿之病從何得之被快藥下利重亡津液故得之若泄利不止者為裡氣大虛故云難治與麻黃升麻湯以調肝肺之氣麻黃升麻湯方麻黃二兩半去節甘溫升麻一兩一分甘平當歸一兩一分辛溫知母苦寒黃芩苦寒葳蕤甘平各十八銖石膏碎綿裹甘寒白朮甘溫乾薑辛熱芍藥酸平天門冬去心甘平桂枝辛熱茯苓甘平甘草炙甘平各六銖玉函曰大熱之氣寒以取之甚熱之氣以汗發之麻黃升麻之甘以發浮熱正氣虛者以辛潤之當歸桂姜之辛以散寒上熱者以苦泄之知母黃芩之苦涼心去熱津液少者以甘潤之茯苓白朮之甘緩脾生津肺燥氣熱以酸收之以甘緩之芍藥之酸以斂逆氣葳蕤門冬石膏甘草之甘潤肺除熱上十四味以水一斗先煮麻黃一兩沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也傷寒四五日邪氣傳裡之時腹中痛轉氣下趨少腹者裡虛遇寒寒氣下行欲作自利也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之傷寒邪自傳表為本自寒下醫反吐下損傷正氣寒氣內為格拒經曰格則吐逆食入口即吐謂之寒格更復吐下則重虛而死是更逆吐下與乾薑黃連黃芩人參湯以通寒格乾薑黃連黃芩人參湯方乾薑辛熱黃連苦寒黃芩苦寒人參甘溫各三兩辛以散之甘以緩之乾薑人參之甘辛以補正氣苦以泄之黃連黃芩之苦以通寒格上四味以水六升煮取二升去滓分溫再服下利有微熱而渴脈弱者今自愈下利陰寒之疾反大熱者逆有微熱而渴裡氣方溫也經曰諸弱發熱脈弱者陽氣得復也今必自愈下利脈數有微熱汗出今自愈設復緊為未解下利陰病也脈數陽脈也陰病見陽脈者生微熱汗出陽氣得通也利必自愈諸緊為寒設復脈緊陰氣猶勝故云未解下利手足厥逆無脈者灸之不溫若脈不還反微喘者死下利手足厥逆無脈者陰氣獨勝陽氣大虛也灸之陽氣復手足溫而脈還為欲愈若手足不溫脈不還者陽已絶也反微喘者陽氣脫也少陰負趺陽者為順也少陰腎水趺陽脾土下利為腎邪干脾水不勝土則為微邪故為順也下利寸脈反浮數尺中自澀者必清膿血下利者脈當沉而遲反浮數者里有熱也澀為無血尺中自澀者腸胃血散也隨利下必便膿血清與圊通脈經曰清者廁也下利清穀不可攻表汗出必脹滿下利者脾胃虛也胃為津液之主發汗亡津液則胃氣愈虛必脹滿下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死沉為在裡弦為拘急裡氣不足是主下重大則病進此利未止脈微弱數者邪氣微而陽氣復為欲自止雖發熱止由陽勝非大逆也下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利清穀脈沉而遲里有寒也面少赤身有微熱表未解也病人微厥針經曰下虛則厥表邪欲解臨汗之時以里先虛必鬱冒然後汗出而解也下利脈數而渴者今自愈設不瘥必清膿血以有熱故也經曰脈數不解而下不止必協熱便膿血也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利後脈絶手足厥冷者無陽也晬時周時也周時厥愈脈出為陽氣復則得生若手足不溫脈不還者為陽氣絶則見死也傷寒下利日十餘行脈反實者死下利者裡虛也脈當微弱反實者病勝臟也故死難經曰脈不應病病不應脈是為死病下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利清穀為裡寒身熱不解為外熱汗出陽氣通行於外則未當厥其汗出而厥者屬氣大虛也與通脈四逆湯以固陽氣熱利下重者白頭翁湯主之利則津液少熱則傷氣氣虛下利致後重也與白頭翁湯散熱厚腸白頭翁湯方白頭翁二兩苦寒黃連苦寒黃柏苦寒秦皮苦寒各三兩內經曰腎欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之上四味以水七升煮取二升去滓溫服一升不愈更服一升下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯下利腹滿者里有虛寒先與四逆湯溫里身疼痛為表未解利止里和與桂枝湯攻表下利欲飲水者以有熱故也白頭翁湯主之自利不渴為臟寒與四逆湯以溫臟下利飲水為有熱與白頭翁湯以涼中下利譫語者有燥屎也宜小承氣湯經曰實則譫語有燥屎為胃實下利為腸虛與小承氣湯以下燥屎下利後更煩按之心下濡者為虛煩也宜梔子豉湯下利後不煩為欲解若更煩而心下堅者恐為谷煩此煩而心下濡者是邪熱乘虛客於胸中為虛煩也與梔子豉湯吐之則愈嘔家有癰膿者不可治嘔膿盡自愈胃脘有癰則嘔而吐膿不可治嘔得膿盡嘔亦自愈嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔而脈弱為邪氣傳裡嘔則氣上逆而小便當不利小便復利者裡虛也身有微熱見厥者陰勝陽也為難治與四逆湯溫里助陽乾嘔吐涎沫頭痛者吳茱萸湯主之乾嘔吐涎沫者裡寒也頭痛者寒氣上攻也與吳茱萸湯溫里散寒嘔而發熱者小柴胡湯主之經曰嘔而發熱者柴胡證具傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也大吐大下胃氣極虛復極發汗又亡陽氣外邪怫鬱於表則身熱醫與之水以發其汗胃虛得水虛寒相搏成噦也傷寒噦而腹滿視其前後知何部不利利之則愈噦而腹滿氣上而不下也視其前後部有不利者即利之以降其氣前部小便也後部者大便也
