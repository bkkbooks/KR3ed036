細研上為細散入研了藥都研令勻每於食後以薄荷湯調下一錢茯神散治心風狂言恍惚恐懼茯神杏仁湯浸去皮尖雙仁麩炒微黃川升麻白蘚皮沙參去蘆頭龍齒遠志去心犀角屑各一兩石膏二兩上為散每服三錢水一中盞生薑半分煎至六分去滓食後溫服真珠散治心風狂語神思不安如見鬼神真珠細研水精細研鉛霜細研琥珀細研牛黃細研各一分人參去蘆頭為末硃砂細研各一兩雄黃半兩細研金銀箔各五十片細研上藥都研令勻每於食後薄荷湯調下半錢發狂者用車轂中脂如雞子熱溫淳苦酒以投脂裹攪令消服令盡龍齒丸治心神狂越多喜善笑如邪祟龍齒遠志去心生乾地黃焙白茯苓去黑皮天門冬去心焙山芋防風去叉五味子車前子麥門冬去心焙地骨皮去土人參各等分上為末煉蜜丸如梧桐子大每日空心竹葉湯下二十丸日再服龍膽丸治心實熱驚悸善笑龍膽山梔子仁白薇茯神去木大黃銼炒各二兩麥門冬去心焙三兩人參甘草炙銼各一兩半羚羊角鎊玄參各二兩半上為末煉蜜丸如梧桐子大每服食後煎棗湯下三十丸升麻湯出楊子建護命方治心氣實熱神思不安常思狂走喜笑無度坐臥不安診其心脈浮洪實大升麻黃芩去黑心白茯苓去黑皮麥門冬去心焙大黃銼炒羌活去蘆頭木香犀角鎊沉香銼玄參硃砂各等分上搗篩每服三錢水一盞於銀器內煎八分去滓食後服玄參湯治心實熱驚悸喜笑心神不安玄參白薇茯神去木山梔子仁羚羊角鎊各八兩石膏碎五兩人參一兩生地黃洗控干五兩上㕮咀如麻豆大每服五錢水一盞半煎八分去滓入竹瀝一合再煎三兩沸不拘時服丹砂丸出王氏博濟方治心神恍惚自語自笑舉止不常丹砂研乳香研酸棗仁去皮研各半兩上再合研令勻酒麵糊和丸如梧桐子大冷水下十丸不拘時服丹砂酒出百一選方治心神不定好登高臨險言語不避親疏時時自笑高聲叫呼舉止無常大便祕小便赤解衣露體不能安處虛言妄語亂説神鬼方丹砂半兩成塊者麝香二錢上同研細和勻用無灰酒二升於瓷瓶內浸以慢火煨時用銀箸攪令熱每服隨患人平時飲酒多少令至醉候患人睡著急用厚衣被蓋之汗出病愈若患人不能多飲只用丹砂一分麝香半錢酒一升制如前法時時飲之以盡為度心神已定卻服補心氣藥即愈呂少張淳熙壬寅丁家難積憂之後遂成狂陽之疾服此一劑即定繼以蕤仁之類心氣藥七日而安瘳碩夫知府云治心恙方肉桂去粗皮荊芥穗藿香葉去土薄荷葉去土藁本洗去土焙乾香白芷麻黃去根不去節焙沒藥別研天麻去苗牛膝洗切南星焙甘松去土烏藥川芎各三兩焙乳香二兩別研上細末合和糯米糊為劑每兩作十五丸男子女人一切風疾每服一丸磨化茶酒任下不拘時猝中不語口眼喎斜左癱右瘓煨蔥酒下傷風頭疼夾腦風生蔥茶下四肢頭面虛腫炒豆淋酒下風熱腫痛生薑薄荷汁同調酒送下胸膈痰實旋暈昏悶臘茶清下渾身癮疹蜜湯下下臟風攻耳內蟬鳴煨豬腰子細嚼溫酒送下腰疼腿痛乳香酒下風毒攻眼冷淚昏暗菊花茶下乾溼腳氣木瓜酒下婦人血氣攻刺當歸酒下血風疼痛醋湯下蕊珠丸出經驗良方治心恙豬心一個取血硃砂一兩為衣青靛花一匙上先將青靛曝乾次取豬心血一處同研爛次入硃砂末丸如梧桐子大每服二十丸茶酒下不拘時甚者不過三服朱雀丸出醫方大成治心神不定恍惚不樂火不下降時復振跳常服消陰火全心氣茯神二兩去皮沉香半兩上為末煉蜜丸如小豆大每服三十丸食後人參湯下一醉散一名一醉膏出永類鈐方治心恙用無灰酒二碗真麻油四兩和勻用楊柳枝二十條逐條攪一二百下換遍柳條直候油酒相乳入如膏煎至七分碗狂者強灌之令睡熟或吐或不吐覺來即愈獨效苦丁香散出永類鈐方治忽患心疾癲狂不止得之驚憂之極痰氣上犯心包當治其源以苦丁香即瓜蒂半兩為末每服一錢重井花水調滿一盞投之得大吐之後熟睡勿令人驚起凡吐能令人目翻吐時令閉雙目或不省人事則令人以手密掩之信乎深痼之疾必投瞑眩之藥吐不止以生麝香少許溫湯調即解治驚勞失志方出千金方甘草桂心各二兩龍骨防風麥門冬牡蠣遠志各一兩茯神五兩大棗二十枚上㕮咀以水八升煮取二升分二服相去如人行五里久再進服遠志丸出十便良方治因驚言語顛錯不能服溫藥硃砂半兩入麝香少許同研金箔五片遠志南星白附子白茯苓酸棗仁人參各半兩上為末煉蜜和丸如梧桐子大硃砂為衣每服三十丸薄荷湯送下食後臨臥服一方無人參茯神散出十便良方茯神熟乾地黃白芍藥川芎當歸桔梗白茯苓遠志人參各等分上為末每服二錢水一盞燈心棗同煎七分不拘時服宋明遠教授母七十四歲因戎馬驚疾如上證服此方得效治心風出百一選方張德明閣中失心數年服此而愈再作服第二方遂安並治受邪狂言妄語不定水銀半兩生薄荷一大握和水銀如泥細研建茶好者研一分麝香一錢半夏一兩以生薑汁煮三五十沸取出作塊子切更煮令熟焙乾搗為細末上藥都入在薄荷泥內更研千百轉丸如芥子大金銀湯下十五丸臨臥時服三日再進一服第二方一名硃砂丸出余居士選奇方硃砂乳香各一兩並別研人參白茯苓茯神琥珀各半兩石菖蒲半兩小而節密者酸棗仁溫酒浸半日去殼紙上炒令香熟一分以一兩半浸去殼只得一分仁遠志酒浸半日新布裹推去心焙乾半兩以一兩隻得半兩肉上為末煉蜜為丸如梧桐子大每服二十丸食後酒下日進二服如不能飲酒以棗湯下可常服治失心方蛇含石代赭石各四兩並煅通紅醋淬鐵粉二兩麝香二錢硃砂五錢一半入料一半為衣上為末用糯米粉二兩作糊為丸分作二百六十丸每服一二丸棗湯送下寧志膏出直指方治因驚失心心氣虛耗神不守舍恐怖驚惕恍惚健忘睡臥不寧夢涉危險赤白濁甚一切心疾並皆治之寧神定志安眠止痛人參酸棗仁湯浸去皮各一兩辰砂半兩滴乳香一錢乳鉢坐水研一方無乳香上為末煉蜜和杵丸如彈子大每服一丸薄荷湯化下一方治心臟虧虛神志不守恐怖驚惕常多恍惚易於健忘睡臥不寧夢涉危險一切心疾並皆治之用溫酒棗湯亦可空心臨臥化下一方溫人參湯化下荊芥湯亦可又云人有弟婦緣兵火失心制此方與之一服二十粒愈又多傳服之皆驗治失心方黃丹硝石各二兩上煅硝石成汁以皂角逐小段子投其中直候無火方止去皂角以黃狗肝一具用竹刀切作片子摻藥末數錢於中同煮食之張德明傳秦太師以治徐履之疾鬱金丸出海上方治失心及心恙風蟬肚鬱金真川者七兩明礬二兩上為末薄荷糊為丸如梧桐子大每服六十丸湯水任下有患癲狂者三服見效數年者亦愈至人授此初服心胸間有物脫去神氣灑然再服而蘇此經憂痰絡心竅所致也辰砂丸出指南方治狂妄語言不避親疏此由憂思過甚辰砂一兩上以琉璃器盛露四十九夜細研入牛黃一分蠟汁丸如豌豆大每日空心新水下一丸水晶湯出指南方水晶半兩沉香遠志去心各一錢人參一錢麥門冬去心二錢石菖蒲茯神各二錢金一兩上㕮咀以水一升煮至半升空心服金露丸出和劑方治痰迷心竅恍惚狂言婦人痰血上衝或歌或笑言語狂亂並皆治之生乾地黃焙貝母去心各一兩巴豆去心膜醋煮二十沸焙乾取一兩過其數死黃連洗焙二兩桔梗去蘆柴胡去蘆吳茱萸湯洗七次防風去蘆紫菀去苗菖蒲米泔浸一夕乾薑炮白茯苓去皮蜀椒去目出汗厚朴去皮薑製枳殼去白麩炒鱉甲米醋煮黃人參去蘆甘草炙甘松淨洗各一兩草烏頭炮用二兩芎藭去蘆桂心不見火各一兩上為末以麵糊丸如梧桐子大每服五丸心中痰患薑湯下心痛酸石榴皮湯下口瘡蜜湯下頭痛石膏湯蔥茶下一切脾氣橘皮湯下水瀉氣瀉陳皮湯下赤白痢甘草乾薑湯下胸膈噎悶通草湯下婦人血氣當歸酒下疝氣嵐氣小腸氣及下墜附子湯下傷冷腹痛酒食所傷酒疸黃疸結氣痞塞鶴膝並用鹽湯酒下洗心散出如宜方治心熱語亂煩渴眼澀口苦唇焦白朮一兩半麻黃當歸芍藥甘草各三兩木香煨荊芥穗大黃麵裹煨各六兩上為末生薑薄荷湯加神砂末服排風湯出如宜方治風虛冷濕閉塞諸經恍惚妄言白朮白蘚皮川芎白芍藥當歸肉桂防風杏仁制甘草各一兩川獨活麻黃茯苓各三兩上㕮咀四錢薑七片棗二枚煎溫服育神散出如宜方治虛弱多驚怔忡語言不節人參白朮茯苓茯神去木當歸乾薑炮遠志制紫菀茸赤石脂桂心紅芍藥龍骨各半錢上㕮咀薑棗煎食後服吞雄朱丸礬丹出如宜方治癲狂走妄語見鬼無問冷熱國丹晉礬等分上作磚爐一窠可容二兩許安丹在下礬在上以炭五斤燒令盡取出細研以不經水豬心血為丸如緑豆大每服一十丸或二十丸用陳皮湯吞下又宜牛黃清心丸雄朱丸治狂邪發無常披頭大叫欲殺人不避水火出千金方用苦參以蜜丸如梧桐子大每服十丸薄荷湯下煉砂丹出指南方辰砂天仙子擇淨各一二兩上以水一碗銀器內煮令天仙子芽出去天仙子不用將辰砂研令極細滴蜜和丸如豌豆大空心人參湯下一丸
