body:
  text: 卷四十大腸腑門大便不禁附論夫大腸為傳導之官掌化糟粕魄門為之使若其臟寒氣虛不能收斂致糟粕無所制約故遺屎不時治之宜澀固津液方論所謂澀可去脫是也陳曲丸治大便不禁腹內㽲痛陳曲末炒白茯苓去黑皮黃連去須炒黃柏去粗皮炙乾薑炮附子炮去皮臍龍骨各一兩赤石脂甘草炙銼人參當歸切焙各一兩上為末煉蜜丸如梧桐子大每服十五丸空心米飲下日再服救陽丸治大便不禁手足厥冷面色青白吳茱萸湯浸焙乾乾薑炮赤石脂蜀椒去目閉口者炒出汗硫黃飛過龍骨桂去粗皮附子炮去皮臍天雄炮去皮臍陽起石煅醋淬研上等分為末稀糊為丸如梧桐子大每服十五丸米飲下空心食前漸加丸數鹽湯亦得龍骨湯治大便不禁真氣羸弱龍骨阿膠炙燥乾薑炮黃連去須炒各一兩粳米三合炒熟附子炮去皮臍甘草炙銼黃芩去黑心芍藥各三分石榴一枚大者切另搗入上㕮咀每服五錢水一盞半煎一盞去滓空心溫服日再地榆丸治大便不禁地榆一兩白龍骨赤石脂沒石子熟艾去梗炒橡實殼炒各半兩黃柏去粗皮炙三分上為末煉蜜丸梧桐子大每服三十丸空心米飲下日再附子湯治下焦虛寒大便不禁附子炮去皮臍半兩黃連去須炒二兩阿膠炙燥三分甘草炙銼乾薑炮各半兩赤石脂厚朴去粗皮薑汁炙各一兩上㕮咀每服五錢水盞半煎一盞去滓空心溫服日再石榴皮湯治虛寒客於下焦腸滑洞泄困極欲死酸石榴皮炒乾薑炮各一兩黃柏去粗皮炙阿膠炙燥各三分上㕮咀每服四錢水一盞煎四分去滓空心溫服或無黃柏用黃連亦得厚朴豆蔻湯治大便不禁白肉豆蔻去殼炮半一兩龍骨白朮銼炒三分厚朴去粗皮薑汁炙銼一兩上㕮咀每服五錢水一盞半生薑三片煎至一盞去滓空心溫服朝真丸治虛損泄瀉大便失禁硫黃一兩研飛青鹽一錢研晉礬熬枯研一兩上研勻水浸炊餅丸緑豆大每服十五丸至二十丸溫酒下空心食前或用丹砂為衣亦得福建丸治大便不禁並腸鳴附子去皮臍銼一兩厚朴去粗皮二兩同附子用生薑汁浸一宿於磁瓦器內炒上為末用酒煮陳曲末為糊丸梧桐子大每服十五丸至二十丸生薑鹽湯下空心食前服石硫黃湯治虛冷大便不禁氣脫神昏石硫黃明者細研紫筍茶焙乾研末各一兩上水一盞下硫黃末半錢匕筍茶一錢匕煎六分去滓溫服不拘時日三大理中丸出危氏方治大便虛滑不禁人參白朮乾薑甘草各等分上為末煉蜜丸如梧桐子大每一丸用平胃散一貼煎化服便止加鹽梅煎尤妙脫肛附論夫肛門者主大行道肺大腸候也號為通事令史重十二兩長一尺二寸廣二寸二分應十二時若臟傷熱則肛門閉塞大行不通或腫縮入生瘡若腑傷寒則肛門開大行洞瀉肛門凸出良久乃入熱則通之寒則補之虛實和平依經調之四十八難曰病之虛實出者為虛入者為實肛門之脫虛也蓋實則溫溫則內氣充而有所蓄虛則寒寒則內氣餒而不能收況大腸之厚薄膏脂之肥瘠亦視夫內氣之虛實何如耳大凡脫肛須以溫湯洗令和軟然後摩挲而入治法以收斂行之其有産婦用力過多及小兒叫號努氣久痢不止風邪所襲亦有此證凡腸頭作癢即是腹中有蟲生取苦楝根煎湯熏洗仍以干艾生薑煎服其脫肛腸風痔瘻者登溷不可用舊紙若包裹湯藥雜物尤不可用才有一毫染汙其間立見痛腫如此急以溫湯滌之患在肛腸登溷後須用一洗下痢脫肛者因大腸虛弱冷氣偃之至圊不能便極力於下肛門脫出故謂之脫肛溫其臟則愈古方有坐湯溫尉之藥皆良法也脫肛一證氣聚不散也裡急而不得出外脹而不得入先以枳殼散作劑又以枳殼燒灰存性細末摻敷或津唾調敷氣散則腫消矣仍用生薑汁調五苓散如膏入新水研散略煎吞黃連阿膠丸此論肛門挾熱而腫脹也其或腸中虛薄不收則理中湯釣腸丸養臟湯輩主之烏鰂骨木賊草敷之豬肝散出千金方大腸寒應肛門寒則洞泄肛門滯出豬肝一斤熬令燥黃連阿膠芎藭各二兩烏梅肉五兩艾葉一兩上為末每服二錢溫酒調下白米飲亦可食前日再服金鳳膏治痔瘡破者脫肛鮮魚膽一個龍腦一錢麝香五分飛礬五分黃連末少加些炒上為末用鮮魚膽調塗五六次立效鱉甲丸出聖惠方治脫肛皆因久痢大腸虛冷所致肛門為大腸之候大腸傷於寒下痢用力其氣逆則肛門脫出雖一年下痢脫肛不收腹中冷痛者服此可安鱉甲醋炙一方用鱉頭蝟皮炙桂心各一兩磁石二兩煅醋淬上為細末蜜丸緑豆大米飲下五丸量人大小加減服一方為散食前粥飲服治脫肛出神效方曼陀羅花子蓮殼一對橡實十六個上搗碎水煎三五沸入朴硝熱洗其肛自上香膽丸治痔漏脫肛方見痔瘻門諸痔類荊芥散出直指方治脫肛大香附荊芥穗各半兩縮砂二錢五分上為末每服三錢食前新水煎數沸即服小兒通用一方無縮砂洗縮砂湯出直指方治大腸虛而挾熱脫肛紅腫縮砂黃連木賊上為末每服二錢米飲調下治大腸虛冷大便後肛門洞出出聖惠方鱉頭一枚塗酥炙令焦鐵精一兩研莨菪子一兩水淘去浮者浸去毛芽取出候乾炒上為末每服二錢食前粥飲下肛上更用炙故麻鞋底尉之治大便風冷脫肛兼腰痛不可忍出十便良方一名三神丹石灰白礬黃丹各一兩上研以油和為餅子新瓦上燒令通赤放冷細研又和又燒如此三度為末入麝香末一分更研勻每服一錢食前艾葉粥飲調下治脫肛不瘥出聖惠方鱉頭一枚燒灰蒲黃半兩白蘞一兩上為末敷於肛上按抑令入日三四度瘥治脫肛瀉血不止出聖惠方石耳五兩炒白礬一兩燒灰密陀僧一兩上為末水浸蒸餅丸梧桐子大每服二十丸食前粥飲下蝟皮散一名鱉頭散治肛門脫出或因用力太過或因洞泄不收出千金方磁石四兩桂心一尺蝟皮一枚上為末飲服方寸匕日一服即縮慎舉重及急帶衣斷房室周年乃佳肘後方治女人陰脫出外用生鱉引出頭一枚齊甲裁之炙焦搗末為四味亦治脫肛仍用破草鞋底炙上面尉按入壁土散出千金方治肛門滯出故屋東壁土一升碎皂莢三挺各長一尺二寸上搗土為末挹粉肛頭出處次取皂莢炙暖更遞尉取入即止又方出千金方治脫肛出鱉頭故敗麻履底各一枚上將鱉頭燒為末敷肛門滯出頭次將履底按入即不出矣治脫肛出醫方大成一名槐花散槐花槐角上等分炒香黃為末用羊血蘸藥炙熱食前以酒送下或云以豬膘去皮蘸藥炙服治大人小兒脫肛不收出經驗良方一名香荊散荊芥一兩五分皂角三枚上用末煎湯洗了用鐵漿塗即入亦治痔及治婦人子宮出亦如此用治大人小兒腸頭出出經驗良方百草霜五倍子上為末醋熬成膏子以鵝毛敷上即入蛇床散出經驗良方治脫肛蛇床子甘草各一兩上為末熱湯調服一錢日進三服又方出永類鈐方白雞冠花防風各等分上為末糊丸空心米飲下百丸荊芥散治脫肛香茸丸一名麝香丸治脫肛方見泄痢門腸滑下腸垢類案原方麝香半兩鹿茸炙二兩上為末醋煮麵糊丸如梧桐子大每服三十丸粥飲下不拘時候日三服一方煮棗瓤和丸治脫肛方見枳殼散治積痢隨肛出千金方上枳實石上磨令滑鑽安柄蜜塗炙令暖尉之冷更易取縮入止治赤白痢脫肛用木瓜一握百藥煎一塊陳白梅三個以水一碗煎至半碗無時服治大腸虛冷脫肛及痢後脫肛出聖惠方干蝸牛子一百枚炒為末磁石二兩搗碎淘去赤汁上水一大盞煎磁石五錢至五分去滓調蝸牛子末一錢服之日三服一方為末每服二錢空心米飲調下日午再服治脫肛瀉血不止出聖惠方附子一兩燒熟地上用盞蓋出火毒桑黃一兩炙上為末煉蜜丸梧桐子大每服二十丸食前粥飲下治脫肛不縮出聖惠方石榴皮茜根各一握上㕮咀好酒一大盞煎至七分去滓溫二服治脫肛不收赤石脂白礬半生半熟上為末擦洗敷之用淨物托進肛門治腸頭挺出用蝦蟆皮一片燒灰敷出處一方瓶內燒熏治肛門滯出出千金方用炙故麻履底按令入頻按入永瘥治肛門脫出出千金方用女萎一升以器中燒坐上熏之即入治脫肛腸出熱痛出千金方一名蒲黃膏用蒲黃二兩以豬脂和敷肛上內之二三度即愈用粉亦良治腸脫肛出轉久不可收入出經驗良方用生栝蔞根為粉以豬脂膏溫塗隨手抑按自能縮入又方生搗汁溫服以豬肉汁洗手挼之令暖自能入一方用栝蔞治脫肛歷年不愈出聖惠方用生鐵五斤水一斗煮取五升出鐵以汁洗日再無不瘥並燒礬石敷之則亦良木賊散出直指方治脫肛不熱用木賊不拘多少燒灰存性為末摻肛門上按之治脫肛出經驗良方用磨刀水下鐵漿以毛翎塗少許於肛門上卻以磁石煎湯空心服半盞許一方用磨刀水洗又方出經驗良方用貼水荷葉焙為細末好酒調下二錢又將荷葉一片將藥末二錢放在葉上令病人在葉上坐即入又方出經驗良方用淡竹葉不拘多少濃煎湯洗立效治痔漏脫肛出肘後方用虎脛骨兩節酥蜜二兩塗骨上炙令赤搗末水浸蒸餅為丸如梧桐子大侵晨溫酒服二十丸隔晚先利過大腸然後服一方治肛門凸出燒虎骨末水服方寸匕日三服良治大腸脫肛用草果萆麻子去殼捶碎解頭上髻發開留此藥於腦上髻發中少縛定待腸頭收上門邊即急去了藥若婦人産後衣不下用此藥去殼捶碎縛兩腳底心即下火炮湯用苧根不拘多少搗爛煎湯熏洗治脫肛痔病等證用蔥鹽湯洗之卻將薄荷煎細研蔥白涕汁去滓入蜜調煎貼患處用油單紙敷藥貼之坐臥亦可鱉頭散出千金方治脫肛大腸久積虛冷每因大便脫肛收不能入用鱉頭慢炙焦黃自死者尤佳為末塗敷腸頭用軟紙襯輕輕按入仍以方寸匕食前米飲調下一方如不愈以鱉頭血塗之又方燒令煙絶杵末敷肛上手按挼之一方用鞋底按入即不出磁石散出直指方治脫肛用磁石半兩入煎沸醋中凡七次為末每服一錢空心米飲調下酒服亦可次用鐵片燒通紅放冷同蔥根煎湯洗淨托上鐵粉散出直指方治大腸本虛風毒客熱一乘之脫肛紅腫用鐵粉研細入白蘞末夾和敷挼之即按入又方鐵粉以少許摻之按令即愈橡斗膏出直指方治脫肛用橡斗子燒存性豬脂和敷挼之石灰方出直指方治大腸積冷久年脫肛及治每因大便脫肛挼不入用石灰炒熱以帛包裹肛坐其上冷又另換仍以海螵蛸末敷之文蛤散出仁存方治大腸寒用力過多肛門脫出不收及小兒叫喚久痢後皆使脫肛悉治之用五倍子不拘多少為末水煎汁浸洗更入白礬蛇床子尤佳洗後用赤石脂為末以少許摻在芭蕉上頻用托入或長出尺余者以兩床相接中空一尺以瓷瓶盛藥水支架起與床平令病者仰臥以其所脫浸在瓶中換藥逐日如此浸縮盡為度用海螵蛸為末塗肛上亦可一方不用蛇床子治大人小兒脫肛每天冷及換冷食即暴痢不止肛則下脫久療不瘥者用紫堇草春間收紫堇花二斤曝乾搗為末加磁石末七兩相和研細塗肛上內入即使人噀冷水於面上即吸入腸中每日一塗藥噀面不過六七度即瘥又以熱酒半斤和散一方寸匕空腹服之日再漸加至二方寸匕以知為度五歲以下小兒即以半杏子許散和酒令服之亦佳忌生冷陳倉米等治脫肛用防己實焙乾為末如煎茶法煎服又方出直指方一名桑螺膏用緣桑螺燒末和豬膏敷之立縮此螺全似蝸牛黃小雨後好緣桑葉一方亦可干作末敷之治大腸脫肛久積虛冷每因大便脫肛收不得用蝸牛生研敷上即收一方燒灰豬脂和敷則縮治下部脫肛用莨菪子焦炒研細末敷之紫蕺膏出醫方大成治臟熱肛門脫出用紫蕺一大握又名魚腥草擂爛如泥先用朴硝水洗淨肛門用芭蕉葉托入卻用藥貼於臀下穩坐自然收入治腸隨肛出用羊脂以鐵精粉敷其上乃以布裹脂炙令溫挼內仍以酒服磁石末一錢日三服之獨虎散出直指方治脫肛不收用五倍子半兩末井水三碗入瓷瓶內慢火煎半續入朴硝荊芥穗各一錢乘熱熏洗仍以五倍子末敷之治脫肛用龜血灰亦治之一方用甲灰治脫肛出糞門三五寸者出德生堂方用陳茶熬水溫洗去穢垢卻用田螺大者二三枚水中養一日去盡泥用黃連末少許揭起螺靨入藥末在田螺內候化成水卻用雞翎蘸藥掃上再以軟帛托入肛門內自然再不舉發治大腸風冷下血不止脫肛腫痛出聖惠方用野貍一頭以大瓷瓶一個可容得者內於瓶中以厚泥固濟候乾以大火燒之才及煙盡住火候冷取出入麝香末半兩研令勻於瓷器中收之每於食前溫粥飲調下二錢治脫肛不縮出聖惠方用生韭一斤細切以酥拌炒令熟分為兩處以軟帛裹更互尉之冷即再易以入為度又方出聖惠方用五花構子葉不拘多少陰乾為末每服二錢食前粥飲下兼塗腸頭亦瘥又方出聖惠方用蛇床子一兩炒為末貼之治脫肛腸出出經驗良方用黃連研細末冷水調常塗腸頭治卒大便脫肛出肘後方用豆醬清合酒塗之硇砂丸治冷熱不和下部痛裡急後重虛滑或結澀腸頭脫出硇砂飛一兩硫黃研白礬研各一分以上三味同研勻用萊蔔一枚重五兩者割開留元蓋子剜作坑子填上件末在內將元蓋用竹籤定以面劑十五兩裹了開地坑一個方一尺鋪馬糞厚三寸安面球在上更以馬糞蓋之發火燒候通黑即止去面將萊蔔藥和爛搗如膏更入後藥肉豆蔻去殼葫蘆巴各半兩訶黎勒皮附子蘹香子一分炒補骨脂炒各一兩上六味為末通前藥膏同搗滴好酒少許和納令勻丸如梧桐子大每服十五丸至二十丸空心食前溫米飲下赤石脂散出聖惠方治大腸風冷久痢不瘥脫肛赤石脂龍骨白石脂各一兩當歸半兩銼炒蓬莪朮肉豆蔻去殼黃連去須炒白芍藥厚朴各半兩去粗皮薑汁炙上為散每服二錢粥飲食前調下卷柏散出聖惠方治久病痢不瘥脫肛卷柏一兩龍骨訶黎勒煨用皮黃連去須炒縮砂去皮肉豆蔻去殼蓽茇白石脂各一兩上為末每服二錢食前粥飲調下地榆芍藥湯治泄痢膿血乃至脫肛蒼朮八兩地榆三兩卷柏三兩芍藥三兩上㕮咀每服一兩水一大盞半煎一盞溫服龍骨丸治諸痢疾脫肛久不止龍骨艾葉炒各一兩鱉頭骨二枚塗酥炙令焦黃研上為散每服二錢食前粥飲調下黑聖散治瀉痢日久脫肛疼痛用大蜘蛛一枚以瓠子葉兩重裹以線系定盒子內燒令黑色勿太過細研入黃丹少許研勻每先用白礬蔥椒煎湯洗浴拭乾後將藥摻在軟帛上將手挼托上肛頭即不下訶子皮散蘭室祕藏方癸卯冬樞密院判白文舉家老僕面塵脫色神氣特弱長跪曰病脫肛日久服藥未驗近日復下赤白膿痢作裡急後重白多赤少不任其苦余乃曰此非肉食膏粱必多蔬食或胃氣不節其寒一也天氣雖寒衣蓋猶薄其寒二也況天氣應時其寒三也不禁而腸頭脫下者寒也真氣不禁形質不收乃血滑脫也此乃寒滑氣泄不固故形質下脫也當療之以澀去其脫而除其滑微酸之味固氣上收以大熱之劑而除寒補陽以補氣之藥升陽益氣御米殼去花萼蜜炒半錢訶子煨去核七分乾薑炮六分橘皮半錢上為末分作二服每服水二盞煎至一盞和滓空心溫服一服減半再服痊愈治腸頭出出本草用胡荽子搗醋煮尉腸頭出甚妙治脫肛出本草用甑帶煮汁服治卒脫肛出本草燒蜘蛛為灰末敷肛上治脫肛出本草以年久筆頭燒灰水服之治肛帶出出本草切胡荽子一升燒以煙燻肛即入治脫肛用益母草炙令香浸酒服之益母草生少澤山谷葉如澤蘭莖赤高二三尺是也肛門有蟲發癢附論夫肛門有蟲者由胃弱腸虛而蟯蟲下乘之也肛門為大腸候蟯蟲者九蟲之一蟲也在胃腸間若臟腑氣實則蟲不妄動胃弱腸虛則蟯蟲乘之重者成瘡或蟲從肛門溢出輕者慢蝕肛門但癢也蜣螂丸出聖惠方治肛門癢或出膿血傍有蟲生孔竅內蜣螂七枚五月五日收去足翅炙為末新牛糞半兩好肥羊肉一兩炒令香上都搗如膏丸如蓮子大炙令熱以新綿薄裹納下部中半日少吃飯即大便蟲俱出三五度永瘥又方出聖惠方白蒺藜半兩炒硫黃一分細研豬牙皂角一兩燒灰上為末入硫黃同研勻用蔥薤汁丸如蓮子大綿裹一丸納下部中日二三易又方出聖惠方雄黃胡粉各半兩上研以棗肉丸如蓮子大以綿裹一丸納下部中日再易之肛門赤痛附論夫肛門大腸之候其氣虛為風熱所乘熱氣擊搏故令肛門赤痛也檳榔散出聖惠方治大腸風壅氣毒攻肛門赤腫疼痛檳榔川大黃炙各一兩沉香赤芍藥防風去蘆芎藭犀角屑甘草炙銼各半兩枳殼二分麩炒去瓤上㕮咀每服四錢水一中盞煎至六分去滓食前溫服牛蒡子散出聖惠方治大腸風毒肛門赤痛令人煩熱坐臥不安牛蒡子炒川大黃銼炒各一兩黃耆銼白蒺藜炒去刺枳殼麩炒去瓤三分當歸銼炒芎藭甘草炙銼各半兩上㕮咀每服四錢水一中盞煎至六分去滓食前溫服大黃散出聖惠方治大腸風熱所攻肛門赤腫川大黃銼炒黃芩黃耆玄參各一兩丹參三分赤芍藥半兩枳殼一兩麩炒去瓤上為末每服二錢食前溫粥飲調下治大腸風壅氣毒攻肛門赤腫疼痛出聖惠方枳殼麩炒去瓤芎藭沉香各半兩川朴硝一兩五錢川大黃一兩銼炒甘草一兩炙上為末每服半錢食前清粥飲調下又方出聖惠方皂莢樹白皮一兩塗酥炙甘草半兩炙銼枳殼二分麩炒去瓤上為末每服二錢食前粥飲調下治䘌穀道赤腫痛又癢方用杏仁杵作膏敷之一方熬令黃搗以綿塗導之又方出本草用雄黃塗在上良治肛門腫痛用木鱉子去殼取肉四五枚研如泥安新瓷器或木盆內以沸湯衝動熏洗了取少許塗患處又方出海上名方用枳殼燒熏煎枳殼洗服枳殼末為上藥地榆散出御藥院方治肛門痛癢或腫地榆荊芥穗蛇床子蒴藋苦參各等分上㕮咀每用藥一匙水一碗煎二三沸去滓通手避風處洗患處三黃丸出危氏方治肛門腫痛或下鮮血黃連黃芩大黃上為末煉蜜丸如梧桐子大每服四十丸熟水吞下
