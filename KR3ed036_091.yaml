body:
  text: 卷九十一諸風門腎中風附論腎風之狀多汗惡風脊痛不能正立其色炲隱曲不利診在肌上其色黑夫身之本在腎受五臟六腑之精氣以養百骸九竅腎受風則諸陽之氣不能上至於頭面故有面龐然浮腫之證陽氣虛者則多汗惡風腎主骨骨不強則脊痛不能立精神衰弱則隱曲之事不利肌上黑色如炲色又踞而腰疼不可俯仰或為冷痹或為偏枯耳鳴聲濁志意昏沉善恐多忘皆腎風之證視脅左右未有黃色如餅粢大者尚可治急灸腎俞百壯服續命湯若齒黃赤黑髮直面土色者不可復治矣方萆薢散出聖惠方治腎臟中風踞而腰痛腳膝偏枯皮膚頑痹語聲謇澀兩耳虛鳴舉體乏力面無顏色志意不樂骨節痠疼宜服萆薢一兩銼茵芋半兩杜仲半兩去粗皮炙微黃銼石龍芮半兩石南半兩天雄三分炮裂去皮臍狗脊半兩躑躅半兩微炒獨活三分麻黃三分去根節乾蠍半兩微炒當歸半兩銼微炒附子三分炮裂去皮臍甘菊花三分桑螵蛸半兩微炒菖蒲半兩赤箭三分麝香半兩細研牛膝三分去苗木香三分芎藭三分上為細散每服食前以溫酒調下二錢蛜𧌴丸出聖惠方治腎臟中風腳膝麻痹無力腰背強直疼痛言語不利面色萎黑肌體羸瘦蛜𧌴三分微炒白附子三分炮裂防風三分去蘆頭天麻三分黃耆三分銼天雄三分炮裂去皮臍白花蛇一兩酒浸去皮骨炙微黃萆薢三分桂心一兩獨活三分丹參三分當歸三分銼微炒安息香一兩海桐皮三分銼補骨脂三分微炒仙靈脾三分牛膝一兩去苗雄黃半兩細研水飛過麝香半兩細研肉蓯蓉三分酒浸一宿刮去皮炙令乾上為末煉蜜和丸搗三五百杵丸如梧桐子大每服以溫酒下三十丸日二服獨活散出聖惠方治腎臟中風腰脊疼痛不得俯仰兩腳冷痹緩弱不遂頭昏耳聾語音渾濁四肢沉重獨活一兩附子一兩炮裂去皮臍防風半兩去蘆頭芎藭半兩萆薢半兩銼菖蒲半兩天麻一兩桂心一兩黃耆半兩銼當歸一兩銼微黃細辛半兩山茱萸半兩白朮半兩甘菊花半兩牛膝半兩去苗枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼丹參半兩上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服天麻丸出聖惠方治腎臟氣虛風邪所中腰腳緩弱無力視聽不聰腰脊痠痛臍腹虛冷顏色不澤志意昏沉天麻一兩半附子一兩炮裂去皮臍巴戟一兩鹿茸二兩去毛塗酥炙微黃菖蒲一兩石斛一兩半去根節蛜𧌴一兩微炒萆薢一兩銼肉桂一兩去粗皮牛膝一兩去苗天雄一兩炮裂去皮臍獨活一兩丹參一兩當歸一兩銼微炒杜仲一兩去粗皮炙微黃銼肉蓯蓉一兩半酒浸一宿刮去皴皮炙令乾磁石二兩燒令通赤醋淬七遍細研水飛過上為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以溫酒下二十丸天雄散出聖惠方治腎臟風邪所傷語音謇急腰脊不可轉側腳膝緩弱疼痹頭旋耳鳴身體沉重無力天雄一兩炮裂去皮臍石龍芮三分獨活三分附子三分去蘆頭麻黃一兩去根節茯神三分杜仲三分去粗皮炙微黃銼萆薢三分銼丹參三分桂心一兩羌活三分五味子三分細辛三分牛膝三分去苗當歸三分銼微炒人參三分去蘆頭枳殼半兩麩炒微黃去瓤上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服石斛浸酒出聖濟總録治腎中風下注腰腳痹弱利關節堅筋骨除頭面遊風補虛勞益氣力石斛去根二十四兩黃耆炙一二兩半丹參微炒一兩牛膝去苗三兩生薑三兩人參一兩半杜仲去粗皮銼炒五味子各二兩白茯苓去黑皮二兩山茱萸二兩山芋二兩萆薢微炒二兩枸杞子微炒一升半防風去叉一兩半細辛去黃葉炒一兩薏苡仁炒半升天門冬去心焙三兩上細銼如麻豆用生絹囊盛以酒五斗於淨瓷器中浸七宿初溫服三合日三夜一漸加至六七合一升常有酒氣不至大醉側子散出聖惠方治腎虛中風腰腳緩弱頑痹不仁顏色蒼黑語音渾濁志意不定頭目昏疼腰背強痛四肢拘急體重無力側子一兩炮裂去皮臍麻黃一兩去根節漢防己三分當歸三分銼微炒海桐皮五分銼牛膝三分去苗羌活一兩防風三分去蘆頭白朮三分桂心一兩甘菊花三分羚羊角屑三分附子一兩炮裂去皮臍茵芋三分五加皮三分甘草半兩炙微赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服腎瀝湯出千金方腎虛為厲風所傷語音謇吃不轉偏枯胻腳跛謇緩弱不能動口喎言音混濁便利耳聾塞腰背相引羊腎一具黃耆芎藭桂心人參當歸防風甘草五味子各一兩玄參芍藥茯苓各一兩二錢半磁石一兩七錢地骨皮五錢生薑二兩上銼散以水一斗煮羊腎取五升下諸藥取二升分三服海桐皮散出聖濟總録治腎中風踞而腰痛腳腫疼重耳鳴面黑志意不樂海桐皮銼五加皮去粗皮銼萆薢炒各一兩薏苡仁炒一兩虎骨塗酥炙令黃枳殼去瓤麩炒牛膝去苗酒浸切焙赤芍藥各一兩半惡實炒半兩防風去叉續斷杜仲去粗皮銼炒郁李仁湯退去皮尖並雙仁炒用熟乾地黃焙各一兩上為散每服二錢溫酒調漸加至三錢空腹食前各一杜仲丸出聖濟總録治腎中風腰腳不遂骨節痠痛筋脈拘急行履艱難兩脅牽痛杜仲去粗皮炒三分萆薢微炒一兩半酸棗仁炒一兩牛膝當歸切焙三分防風去叉一兩丹參微炙三分赤芍藥三分桂去粗皮半兩石斛去根銼三分附子炮裂去皮臍半兩肉蓯蓉酒浸切焙一兩一分檳榔煨一兩郁李仁湯浸去皮尖炒三分上為末煉蜜丸如梧桐子大空心用溫酒下三十丸防風湯出聖濟總録治腎中風腰腳痿痹不仁骨髓痠疼不能久立漸覺消瘦防風去叉一兩半羌活去蘆頭一兩黃耆炙銼二兩半五加皮銼一兩半牛膝去苗酒浸切焙桂去粗皮各一兩半赤芍藥一兩半酸棗仁炒一兩半麻黃去節煎掠去沫焙一兩一分丹參一兩一分木通銼一兩半當歸切焙檳榔煨銼各一兩上粗搗篩每服三錢匕以水一盞煎至七分去滓空心溫服及晚食前再服吳茱萸丸出聖濟總録治腎中風惡風多汗面浮腫腰脊痛不能正立面色枯黑吳茱萸一分湯浸焙乾炒用山茱萸牛膝去苗酒浸切焙石斛去根半兩細辛去苗一分芎藭附子炮裂去皮臍各一分羌活去蘆頭一分白茯苓去黑皮一分獨活去蘆頭一分木香一分萆薢半兩菟絲子酒浸另搗半兩上為末用醇酒半盞煉蜜半盞拌和丸如梧桐子大空心日午臨臥鹽湯或鹽酒下三十丸一方無細辛白花蛇丸出聖濟總録治腎中風腰膝骨髓疼痛轉動不得白花蛇酒浸去皮炙並去骨用肉半兩羌活去蘆頭半兩乾蠍去土酒炒一分防己半兩桂去粗皮半兩白附子炮一分附子炮半兩去皮臍乾薑炮一分麻黃去節煎掠去沫焙乾半兩芎藭半兩蜀椒去目並閉口者炒出汗一分烏頭炮裂去皮臍一分上為末煉蜜和丸如梧桐子大每服空心溫酒下十丸至十五丸如要出汗先浴後服藥熱酒或蔥酒下汗出避風風病皆治防風丸出聖濟總録治腎中風腰胯重疼腳膝無力胸中氣滿兩脅膨脹防風去叉一兩一分白茯苓去黑皮酸棗仁炒三分五味子三分桂去粗皮半兩肉蓯蓉酒浸切焙一兩一分石斛去根銼三分人參三分山茱萸三分檳榔銼三二分熟乾地黃焙半兩上煉蜜丸如梧桐子大空腹棗湯下三十丸至五十丸紫蘇大腹皮飲治腎臟風毒攻手足沖脾胃四肢急脹項筋疼痛有時寒熱或手足虛腫及生瘡來去氣不定紫蘇葉一兩桑白皮一兩木通一兩茴香半兩羌活獨活木瓜荊芥青皮吳茱萸各半兩枳殼三兩麩炒大腹子末和皮用上每服四錢蔥白二寸姜五片水一盞半煎七分日三服牛黃天麻散出聖濟總録治腎中風腰脊疼強不得俯仰言語謇澀志意不定人參一兩牛黃研一兩天麻一兩天雄三分生枸杞子三分白附子一錢兩乾薑半兩生羌活去蘆頭一兩上為散每日三服食前溫酒調下一錢匕天雄浸酒出聖濟總録治腎中風筋急兩膝不得屈伸手不為用起居增劇惡風寒通身流腫生瘡凡風冷疾病在膝腰攣急緩縱悉理之天雄炮裂去皮臍茵芋去粗莖各三兩防風去叉蜀椒去目並閉口者炒出汗各半兩乾薑炮一兩羊躑躅炒一兩半附子炮裂去皮臍烏頭炮裂去皮臍各二兩上銼如麻豆用生絹囊貯以酒一斗五升浸之春夏五日秋冬七日開取每服一合漸加至一合半空心臨臥各一服盡酒將滓曝令乾搗細羅為散每服半錢漸加至一錢匕服時候如前治腎臟風蛇床子吳茱萸乾薑牡蠣灰以上各等分上為細末瘡發時用唾津手內調藥均用雙手患處拓之為妙治腎臟風毒氣遍身虛腫出經效濟世方炒緑豆為末溫酒調三錢澤瀉湯出指南方治腎風面腫澤瀉半兩天雄用黑豆一合同煮令熟不用豆刮去皮臍半兩防風一兩枳實白蒺藜炒杵去刺各半兩上為粗末每服五錢水二盞煎至一盞去滓服黃耆湯出指南方治腎風毒足腫黃耆炒蒺藜炒枳實各一兩赤小豆二兩炒牽牛取粉一兩上為細末每服二錢米飲調下治腎家風益精氣出本草以枸杞根皮細銼面拌作飯煮熟吞之去腎風氣尤良胃中風附論胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大蓋胃者水穀之海五臟六腑之大源因於食寒失衣則風邪易感故其證頸多汗惡風者以人迎胃脈之所動也食飲不下膈塞不通腹善滿者其經循腹裡其病在中焦也失衣則䐜脹者重感於風邪傷肌肉也食寒則泄者風寒交傷於胃故泄注也形瘦者精不營也腹大者氣不通也或由新食熱竟入水自漬令人大腹而為水病或因醉取風而為漏風故少氣口乾喜渴近衣則身如火燒臨食則汗流如雨骨節懈惰不欲自勞斯其證矣方胃風湯出濟生拔粹方治虛風證能食麻木牙關急搐目內蠕瞤胃中有風面腫香白芷一錢二分升麻二錢葛根一錢蒼朮一錢炙甘草一錢半柴胡三分蔓荊子一分羌活三分黃柏三分麻黃半錢不去節當歸身一錢草豆蔻三分棗四枚乾生薑三分藁本三分上銼如麻豆大分二服每服水大盞內二盞煎至一盞去滓食後熱服溫中厚朴湯出聖濟總録治久風入客腸胃腹脹泄利厚朴去粗皮生薑汁炙當歸切焙乾薑炮桂去粗皮赤茯苓去黑皮白朮各二兩人參桔梗去蘆頭炒各一兩甘草炙半兩上粗搗篩每服三錢許以水一盞煎取七分去滓早晚食前溫湯服之豆蔻丸出聖濟總録治胃虛中風其病狀頸項多汗惡風飲食不下膈塞不通腹善滿失衣則䐜脹食寒則泄形瘦而腹大肉豆蔻去殼半兩羌活去蘆頭防風去叉桔梗去蘆頭炒各一兩分薏苡仁人參陳橘皮湯浸去白焙獨活去蘆頭草豆蔻去皮芎藭各半兩甘草炙木香各一分上為細末煉蜜丸如梧桐子大每服三十丸至四十丸米飲下日三夜一白豆蔻丸出聖濟總録治胃受風冷腹脹妨悶不思飲食白豆蔻去皮乾薑炮桂去粗皮甘草炙各半兩訶黎勒煨去核人參各三分厚朴去粗皮生薑汁炙白朮陳橘皮湯浸去白焙各一兩上為細末煉蜜丸如梧桐子大每服二十丸生薑棗湯下日四五服不拘時厚朴橘皮湯出聖濟總録治風邪干胃水穀不化便利而完出也病名飧泄厚朴去粗皮生薑汁炙半兩陳橘皮湯浸去白焙甘草炙銼芎藭肉豆蔻去殼赤茯苓去黑皮防風去叉吳茱萸湯洗焙乾炒羌活去蘆頭各一兩上為散每服三錢匕水一盞煎至七分去滓溫服空心食前厚朴煮散出聖濟總録治胃風冷氣攻心脹滿疼痛飲食不消四肢羸瘦厚朴去粗皮生薑汁炙訶黎勒煨各一兩半木香蒼朮米泔浸一宿切焙枳殼去瓤麩炒當歸切焙桔梗去蘆頭炒各一兩陳橘皮湯浸去白焙二兩上為散每服三錢匕水一盞棗一枚去核煎至七分