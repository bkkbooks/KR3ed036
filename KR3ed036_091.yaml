氣虛眩暈止用本方若頭目昏疼肌肉瞤動氣息短急及癲癇等患多由痰氣所致此藥尤宜亦有用天麻代附子者氣盛人用天南星八錢木香二錢㕮咀分二服每服水二大盞生薑十四片煎至六分去滓溫服名星香飲氣虛人用生附子半兩木香二錢㕮咀分二服每服水二大盞生薑十四片煎至六分去滓溫服名附香飲用天南星生附子等分㕮咀每服三四錢加南木香少許水二盞姜十四片煎至七分去滓服治中風麻痹兼療手足十指疼痛名星附湯用附子烏頭天雄三味等分生用薄切每一兩生薑對半用水三盞煎一盞半去滓溫服治中風風涎不省人事名三建湯一方用附子一枚重七錢者天雄一枚一兩重者天南星一枚一兩重者並生用去皮臍蠍梢半兩㕮咀生薑煎服治中風涎潮牙關緊急不省人事宜服此藥名雄附省風湯用附子天南星各一兩生用全蠍半兩川芎防風各一分㕮咀姜煎服治諸風卒中涎潮痰厥神昏名大醒風湯用天南星四兩生用防風二兩甘草一兩㕮咀每五錢水二盞姜十片煎七分去滓溫服治中風口噤全不能語左癱右瘓口眼喎斜半身不遂手足頑麻諸風痰作頭目眩暈並皆治之若氣不和加木香二錢半頭目如蟲行者加全蠍一錢頭眩疼痛者加天麻半兩煎臨熟入麝香少許名三奇湯資壽方用附子南星各一枚八錢以上重者生去皮臍㕮咀以水四升姜三十片同煎候水減半即濾去滓調藥蠍梢白殭蠶炒黃去絲觜各三錢為末分三服治中風語澀涎盛四肢不舉用附子一個羌活烏藥各一兩㕮咀每半兩水四盞慢火煎至二盞去滓分二服治中風偏發名羌活散用熟附子乾薑等分㕮咀每服四錢水二盞煎至六分去滓溫服中風口噤四肢強直失音不語或卒然暈倒口吐涎沫狀如暗風手足厥冷或復煩躁名姜附湯用熟附子人參各半兩茴香炒茯苓山藥各一分甘草炙乾薑炮各七錢半㕮咀生薑鹽煎治因房室虛乏為風所中惡風多汗身痛骨痿曰內風名附子湯風之為病善行數變其中人也卒其眩人也暈激人涎浮昏人神亂倉卒之間何者為治治者不過烏附南星木香輩最為切用亦須審量其人氣體虛盛然後投藥則萬不失一諸方用藥皆相近但略有少差耳並集於三生飲下以候選擇不省人事者以蘇合香丸擦牙灌以生薑自然汁天仙膏出危氏方治男子女人卒暴中風口眼喎斜天南星草烏頭各一枚白殭蠶七枚白芨二錢上細末生鱔血調敷喎處覺正便用溫水洗去救生命散治卒中風白礬半夏湯洗去滑焙天南星三味等分生用上為細散每服以好酒一盞藥末二錢匕生薑三片煎七分通溫灌之當吐涎扶令正坐經一復時不得令臥如臥則涎難出良久再依法煎藥一錢後常服只半錢牽正散出醫方大成治卒暴中風口眼喎斜半身不遂白附子殭蠶去觜足全蠍去毒炒各等分上為末每服一錢溫酒下不計時三化湯出德生堂治諸卒中風不省人事痰喘上壅一切危急之證大便祕結至五七日不利宜服之大黃牽牛朴硝各五錢上㕮咀量人虛實加減一服水一盞半煎一盞卻下硝煎一二沸去滓溫服不拘時稀涎散一名救急稀涎散出危氏方治卒中風昏昏若醉心神瞀悶四肢不收或倒僕不省或口角似斜微有涎出斯須不治便致殞絶此由風涎潮於上膈塞氣不通宜用救急皂莢加豬牙肥實不蛀者削去黑皮四枚白礬一兩通瑩者上研細為散每服半錢重者三錢匕溫水調下不大嘔吐只是微微涎稀冷出或一升二升當時省覺次緩調治不可急攻過則傷人弱者不可吐用養正丹三十丸研細南木香煎湯調下仍與南星附子豁痰歸經雞心檳榔亦能疏風順氣二聖湯海上名方治卒中風先用不蛀皂角揉汁蘸華陰細辛末擦牙關即開後用二聖湯白殭蠶半兩直者去絲嘴炒黃色為末附子一隻重半兩以上者生去皮臍尖上將附子切作八塊用水二大盞生薑三十片同煎至一大盞去滓分作兩處調白殭蠶末一半服不醒再服追風餅子海上名方治卒中風語澀痰盛四肢不舉恍惚志意不定去痰逐風邪一名二生散治體虛有風受虛濕身如在空中附子一枚去皮臍天南星一枚各重八錢以上並生用上為末不須羅用生薑研自然汁和作八餅子每服一餅水一盞半生薑二十片同煎至八分去滓溫服不拘時候治卒中手足不遂海上名方上用麥麩五升入烏頭皮尖一升連翹半升同於甑炊令大熟鋪在席下以手足不遂處臥之令熱氣蒸熏候出汗為度日用三次只使原藥再蒸用之候兩日外別換新藥如無烏頭皮尖只用烏頭半升不去皮尖碾作粗末㗜鼻法治卒暴中風昏塞不省牙關緊急藥不得下咽者上以細辛洗去土葉豬牙皂角去子各一錢為細末每用少許以紙捻蘸藥入鼻候噴嚏然後進藥一方以半夏末㗜鼻八毒膏一名裴公八毒膏出朱氏集驗方治卒中風毒腹中絞刺痛飛尸入藏及魘寐不寤尸厥奄忽不知人宿食不消溫酒服如棗核大得下止若毒氣甚咽喉閉塞不能咽者折齒內蔥葉口中以膏灌蔥葉中令下病腫者向火摩腫上若歲中多溫欲省病及行霧露中酒服之內鼻中亦得蜀椒當歸雄黃丹砂各三兩烏頭巴豆各一升薤白一升莽草四兩上㕮咀苦酒三升漬一宿用豬脂五斤東向灶葦薪火煎之五上五下候薤白黃色絞去滓研雄黃丹砂如粉內之攪至凝乃止膏成盛不津器中諸蜈蚣蛇蜂等毒者以膏置瘡上病在外悉敷之摩之以破除日合一方用礜石一兩蜈蚣二枚肘後不用巴豆莽草名五毒膏禹功散出危氏方治卒暴昏憒不知人事牙關緊硬藥不下咽黑牽牛末一錢茴香末二錢半上用生薑自然汁調前藥少許灌之鼻中立醒一方用黑牽牛並木香尤佳治急中風口閉涎上欲垂死者一服即瘥出本事方江子二粒去皮膜白礬一塊如大拇指大研之上於新瓦上煅令江子焦赤為度為末煉蜜丸如雞頭大每服一丸用綿裹放患人口中近喉處良久吐痰立愈石膏散治若暴中風自汗出如水者治卒中風海上名方上急取頂心發一撮即撒之以省人事為度麻黃膏出宣明論治中風不省人事卒然倒地用旺相日乙卯日採麻黃一稱揀去根一寸長取東流水三石三斗以無油膩鐺量大小盛五七斗者可先煮五沸掠去沫逐漸添水盡至三五斗以來漉去麻黃淘在盆中澄定良久用細羅子濾去滓取清者鐺內再熬至一斗再澄再濾取汁再熬至升半為度只是勤攪勿令著底恐焦了熬時忌雞犬陰人見澄時須蓋覆不得飛入塵土其膏放一二年不妨如膏稠用水解熬再勻服之甚效生薑生附湯出三因方治卒中風涎潮昏塞不知人並治血瘀冷癖氣胸滿嘔沫頭痛飲食不消用大附子一枚生去其皮臍切八片以水二碗生薑一兩切同煎至一大盞去滓溫冷服不拘時候滓再煎服忌豬肉冷水一法加沉香一錢一法加辰砂末少許凡中風無問冷熱虛實皆可服蓋能正氣消痰散風神效天南星膏出楊氏家藏方治卒暴中風口眼喎斜用南星不以多少為末生薑自然汁調攤紙上左喎貼右右喎貼左正便洗去治卒暴中風啞中忽然倒地不省人事左癱右瘓口眼喎斜凡中風人不可便食風藥中氣人不可便食氣藥或覺有此證諸藥未服者服此藥出風科集驗方用真好麝香末三錢研極細以麻油不拘多少調令稀薄可飲為度即令患人一服頓盡如牙關緊即拗開灌入候少蘇醒然後服紫湯方紫湯方用川獨活刷洗去沙土薄切以豆淋酒濃煎汁服之纍服至一二片無害服此二藥永無手足偏廢語言謇澀之患見得是中風只服小續命湯之類見得是中氣只服勻氣藥自然無事武義唐丞季潤名手肙犬作漢東教官得之太守張少衛名玠屢試有效季潤亦以治數人矣云麻油麝香又勝麝香煎五積散皂莢膏治卒中風口喎杏仁膏治卒中風頭面皆腫研杏仁膏敷之又用松柏葉浸酒或用松節煎酒及用松脂湯煉二三十次為末酒為丸服之並瘥活鼠方治卒中風腰脊反張牙關口噤四肢強直治卒中風昏憒若醉痰涎壅盛四肢不收出聖惠方用砒霜如緑豆大研以新汲水調下水許用熟水投大吐即愈若未吐時再服延壽丹出聖濟總録治卒中惡風涎潮昏重口眼喎斜四肢嚲曳口噤不省丹砂研膩粉研鐵粉研白附子各二兩蛇黃煅醋淬生金生銀並銼末各一分麝香別研一兩一分附子炮裂去皮臍各九兩重牛黃別研一兩一分巴豆打碎用新汲水浸七日逐日換水日足以紙裹壓出油羌活牛膝去苗酒浸切焙蠍梢炒天南星生用各三兩上為細末煉蜜和粟米飯丸如雞頭實大中惡風嚲曳及諸癇疾薄荷酒磨下一丸年老半丸小兒驚癇十歲以上一丸分四服四歲以下一丸分五服新生小兒一丸分七服並用蜜水磨下如中風發直面如桃花色口眼俱閉喉中作聲汗出如油及汗出不流多要下泄或瀉血者並是惡候更不用服唯口噤眼開者藥下立瘥纏喉風壅塞氣息不通生薑薄荷酒急化下一丸治卒中風急煎五積散候熟入麝香一錢熱服連進三服汗透便輕快如目前未便效卻別下藥終易為力不為廢人每見人中風便進靈寶丹無不死者唯是進此藥後徐進他藥無害回陽湯一名是齊回陽湯出百一選方治丈夫婦人無問老幼卒暴風中氣中左癱右瘓手足不遂語言謇澀口眼喎斜筋脈攣縮半身不舉不省人事屢用果有神效漢陽章教授名楫傳乾薑炮益智仁大川烏炮去皮臍以上各一兩青皮半兩附子一隻七八錢重者生用去皮臍上為㕮咀每服稱半兩水二大盞生薑十片棗子一枚入鹽少許同煎七分去滓空心食前溫服並滓再煎治男子婦人中風涎潮於心卒然中倒當即時扶入暖室中扶策正坐當面作好醋炭熏之令醋氣衝入口鼻內長久其涎潮聚於心者自收歸舊輕者即時蘇省重者亦省人事惟不可吃一滴水湯入喉也如吃湯水則其涎永繫於心絡不能去必成廢人今只以醋炭熏之既得涎離於心漸漸蘇省後以生料五積散加麝香煎服之出淡寮方至寶丹出衛生寶鑑治卒中風急不語中惡氣卒中諸物毒暗風卒中熱疫毒陰陽二毒嵐瘴毒誤中水毒産後血暈口鼻血出惡血攻心若煩躁心肺積熱霍亂吐利風注轉筋大腸風澀神魂恍惚頭目昏眩眠睡不安唇口焦乾傷寒狂語小兒急驚風熱卒中皮瘙癢客忤不得眠睡煩躁驚風搐搦以上無不療者辰砂五兩水飛生犀鎊五兩麝香二兩半研玳瑁五兩鎊牛黃二兩半研龍腦三兩一半研龍齒五兩水飛人參五兩銀箔一百片入藥琥珀五兩安息香五兩用酒半升熬膏雄黃一兩半水飛金箔一百二十片一百片為衣余片入藥天南星三兩半用水煮軟切作片子法酒浸二升半浸蒸七日焙乾上件為細末用安息香膏次煉一處搜和為劑旋丸如桐子大每服三丸五丸煎人參湯下小兒一丸至兩丸亦用人參湯下勝金丹出衛生寶鑑治中風涎潮卒中不語合吐利者當服此吐利風涎青薄荷半斤豬牙皂角二兩同薄荷用水二升挼取汁候汁盡將大銀石器瓦器慢火熬成膏瓜蒂末一兩硃砂一兩另研細留少許為衣粉霜半兩另研洛粉一錢水銀重粉是也以上四物研勻細入在前膏內上拌和入臼內杵二三千下丸如櫻桃大以硃砂為衣每服一丸酒磨下急即研細酒調灌之鼻中如前覺有證狀每於四孟月服一丸自余有病可服家寶通神丹出衛生家寶治卒中風左癱右瘓口眼喎斜偏正頭痛夾腦等風及小兒一切驚風五靈脂二兩初一日用薑汁壓至初五日調井花水去粗滓入藥乾蠍一分如殭蠶制度大川烏二兩去皮研為細末入藥草烏三分如川烏制度沒藥半兩用井花水磨膏入藥天南星一分用薑汁壓一宿曬乾碾羅為末白殭蠶一分洗過碾末入藥硃砂三分飛過半入藥半作衣麝香半分用法酒發一宿碾細入藥木香半兩碾末入藥輕粉一分滴乳香半兩用井水磨為膏入藥上衆藥末合和勻合時須用端午日或臘日以臘水煮麵糊搜和搗千下丸如雞頭子大每服一丸及生薑一片薄荷一葉食後茶湯嚼下或酒亦得香附湯出衛生家寶治卒暴中風涎潮目瞑口面歪斜偏風癱瘓精神昏憒便利不禁數服立效大附子一個重八錢生去皮尖木香半兩濕紙裹煨熟甘草一分炙上銼細碎分二服每服用水二大盞生薑二十片煎至七分去滓空心溫服大凡中風首用此藥通關順氣多服取效自可永瘥四神湯出衛生家寶治卒中風牙關緊急不省人事極妙附子一兩去皮尖生用木香一兩五靈脂二錢半真麝香一錢別研後入上銼碎每服二大錢水二盞生薑二十片煎至七分去滓放溫斡開口灌一服定省未知再服才開口略能言即不須服徐徐與粟粥蛇黃散出危氏方治暗風忽然仆地不知人事良久方醒蛇黃不以多少米醋燒淬七次上為細末每服二錢溫酒下數服便愈年深者亦效通關散出危氏方治卒暴中風昏塞不省牙關緊急藥不得下咽喉細辛薄荷葉牙皂去子雄黃各一錢上研為末每用少許銅管吹入鼻中候噴嚏然後進藥或用白梅擦牙更以菖蒲末著舌下牙關即開倉卒可用之治卒風毒腫氣急痛出本草以柳白皮一斤銼以酒煮令熟帛裹尉腫上冷再煮易之甚妙也開關散一名破棺散出本草治急中風目瞑牙噤無法下藥者用天南星搗為末白龍腦二件各等分研自五月五日午時合患者只使一錢至半錢以中指點末揩齒三二十揩在牙左右其口自開始得下藥治卒中風不語舌根強硬出本草陳醬五合三年者妙人乳汁五合二件相和研以生布絞取汁不計時候少少與服良久當語附香飲一名附香散治一切卒中風偏痹經絡不通手足緩弱臂膝痠疼凡風證始作脈息不洪數者先宜服此藥及治風氣流注手足十指浮痛麻木附子生四錢木香二錢上㕮咀分兩服每服用水一盞半姜十片煎取微溫服虛人可用星香飲出肘後方治證如前一方治中風有熱氣實者服之南星八錢木香二錢上銼分二服每用水一盞半姜十片煎至六分溫服氣盛人用此一方治中風痰盛服熱藥不得者名星香湯醒風湯治卒中風倒地牙緊眼閉者用皂角捶碎泡湯八分碗令濃入透明白礬末二錢挑牙關開灌之以鵝毛掃藥上舌痰出即愈治痰涎卒中不語銅緑二兩性平微毒麝香一分性溫味辛上銅緑淨洗於乳鉢內研細以水化去石澄清將銅緑粉慢火熬令乾取辰日辰時於辰位上修合再研細入麝香同研以糯米糊丸如彈子大陰乾如卒中者每丸作二服用薄荷酒研下癱瘓一切風用硃砂酒化下喉吐涎出沫青碧色瀉下惡物瘥治卒中風生薑八兩味辛性微溫附子四兩生用味辛性大熱有大毒上二味細切以水五升煮取二升分為二服忌豬肉冷水
