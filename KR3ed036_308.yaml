body:
  text: 卷三百八諸蟲獸傷門蜂螫附論夫蜂有大小故其螫人毒有輕重輕者或疼痛移時或經日而愈重者至悶絶遍身皆腫當亟用咒禁之術以取速效仍以消毒等藥塗敷之蜂類甚多而方家不具顯其名唯地中大土蜂有毒一中人便即倒悶舉體洪腫諸藥治之皆不能卒止舊方都無其法雖然不致殺人有禁術封唾亦頗微效又有瓠瓜蜂抑亦其次余者猶善耳方雄黃麝香散治竹中青蜂螫人方上以雄黃麝香乾薑等分搗篩以射罔和之著小竹筒帶之行急便用敷瘡兼治衆蛇虺之毒神良蜜脂煎治蜂螫毒不出痛不定白蜜臘月豬脂各兩匙許雄黃細研三錢上先將蜜並脂煎沸傾在瓷盆中入雄黃攪轉通口旋飲之蜜蠟膏治蜂螫方豬脂蜜各五合蠟二兩上和煎如膏候冷以塗之一方和煎稍稍食之豬皮塗方治蜂螫用以豬皮生者取汁塗敷螫處蜂房膏治蜂螫疼痛蜂房銼蒼耳各半兩上為末用藍青汁調摩塗螫處一方無蒼耳生珠散治沙蜂叮上以水磨生珠塗又磨雄黃塗桑白皮塗方治蜂螫用桑根白皮生者持取汁敷螫處角灰散治蜂螫用牛角燒灰二兩為散苦酒調敷螫處又斷葫揩之青蒿塗方治蜂螫用青蒿生者一兩細切搗研厚塗螫處治蜂螫毒方出千金方用取瓦子磨其上唾二七遍置瓦子故處治蜂螫出千金方用燒蜂房為末豬膏和塗之先煮蜂房洗之又燒塗之又方出千金方用酥脂塗之立愈又治豆蜂螫人又方出千金方用燒牛屎灰苦酒和塗之又方出千金方用以齒垢塗之又破蜘蛛塗之又方出千金方用淳酢沃地取泥塗之又方出千金方用嚼鹽塗之又方出千金方用人尿新者洗之或以尿泥塗之一方用人屎洗之又方出千金方用反手捻地上土敷之治蜂蠆毒出經驗良方用野芋葉搽之如不便急以手就頭爬垢膩敷之或用鹽搽治明蜂叮出百一選方用生薑汁塗又苦蕒汁塗之治蜂螫出德生堂方用於地上尋小竹或木棒兒正南北安頓者取在手就寫十字先從南畫至北次從東畫至西然後於十字中心掏一捻土敷在痛處立止屢曾用之治不可曉須至誠乃驗治蜂螫出肘後方用芋葉梗汁敷之沈存中筆談云處士劉湯隱居王屋山嘗於齋中見大蜂胸為蛛網絲縛之為蜂所螫墜地俄頃蛛鼓腹欲裂徐徐行入草齧芋梗微破以瘡就齧處磨之良久腹漸消輕躁如故自後人有為被蜂螫者挼芋頭梗敷之則愈治蜂螫出十便良方用薄荷挼貼之瘥又方出朱氏集驗方用蛇皮以蜜塗之炙令熱以貼螫處效又以醬汁塗蛇皮熱封之甚妙治蜂蠆螫人用搗常思草絞取汁以洗瘡又方用取屋溜下土水和敷之立愈又方出肘後方用破烏雞敷之治蜂螫毒痛不可忍用挼藍青藍及搗莖實塗之又方出聖惠方用蒼耳挼取汁塗之治蜂螫取蠮螉窠細研醋調塗之治蜂叮上以冬瓜葉搗敷之治毒蜂螫上取被螫人所居正東上著地草須是頭尾正東西者取中間五寸勿動散著頭炙點所傷處三點依舊著原取處勿亂卻東西即瘥孫真人云見一切毒螫之物不得起噁心向之亦不得殺之後必遭螫治亦難蜘蛛蜈蚣咬附論凡蜘蛛蜈蚣所傷輕者焮腫疼痛甚則潰而成瘡自非外以藥塗敷內以藥疏導未易得愈方四神膏治蜘蛛咬痛皂莢蕪荑雄黃青鹽上等分為末和勻蜜調塗咬處頻易甚效棗葉散治蜘蛛作瘡棗葉柏葉各五月五日採陰乾生鐵衣晚蠶砂上各等分搗散以生麻油和如泥先灸咬處塗之瘥棗柏膏出聖惠方治蜘蛛咬生瘡諸治不瘥棗葉柏葉晚蠶砂上等分搗為末以生油和如泥先炙咬處復用葉塗之良蕪荑散出聖惠方治蜘蛛咬遍身成瘡立效方白蕪荑一錢皂莢十挺青鹽半分上為末煉蜜和丸如皂莢子大每有傷著處用蜜調一丸敷在瘡上神效雄黃膏一名藍汁膏出聖惠方治蜘蛛咬遍身成瘡及治蟲豸咬傷雄黃一分麝香一錢藍汁一大盞上細研投於藍汁中以塗咬處立瘥若是毒蜘蛛咬即便細細服其藍汁神異之效香油方出千金方治蜘蛛咬毒方用人屎敷又油澱敷又炮薑貼之又猢猻屎敷之黃蠟方出百一選方治蜈蚣毒蟲咬用桑枝汁同鹽調搽痛處或用熔黃蠟滴患處肉赤為度一方以桑白皮搗敷之良柳白散出聖惠方治蜘蛛咬作瘡諸治不瘥方柳白皮一兩半夏一兩上並燒為灰細研以水調塗之膩粉散出聖惠方治蜈蚣咬人方膩粉半兩麝香少許上相和研勻生薑汁調塗咬處一方無麝香地龍散出聖惠方治蜘蛛咬遍身成瘡立效方用青蔥葉一莖去尖頭作孔子以地龍一枚置蔥葉中緊捏兩頭勿令通氣動搖之候為水塗之所傷便瘥神驗麝香散出聖惠方用棗葉一合入麝香末半錢麻油調塗之立愈韭根散出聖惠方用韭根一根去土入麝香一錢同研敷之雄黃散治蜈蚣咬痛用雄黃研細一分用桑根白皮自然汁調敷咬處桑根散出十便良方治蜈蚣咬蒜汁塗方用蒜洗切細研桑根白皮汁和塗咬處胡粉散出千金方治蜘蛛咬毒方用烏麻油和胡粉如泥塗上干則易之吳茱萸散出百一選方治蜈蚣傷用嚼爛吳茱萸一味搽之立效一方用搗爛蝦蟆塗之雄黃散出百一選方用生薑汁調膩粉敷之其痛立止一方薑汁雄黃塗貼亦良薤白方出聖惠方治蜘蛛咬用嚼薤白敷雄黃亦可遍身腫服藍汁桑葉方出經驗良方治蜈蚣諸蟲咬方先用輕低土搽之用大蒜桑葉罨於傷處如無用油豉罨傷處或藍塗罨傷處亦效麻鞋履底炙以揩之即瘥巴豆膏出經驗良方治蜈蚣及蟲咬傷痛方用爛研巴豆一粒豬脂膏少許調塗瘡口立愈一方用胭脂膏少許白礬散治蜘蛛並蜈蚣咬傷用露筋草其根洗淨焙乾搗粗為末用白礬水調貼苦參散治蜈蚣咬人痛不止用頭垢膩和苦參末酒調敷之椒蔥散出聖惠方治蜈蚣咬方胡蔥一握搗如泥椒一合用水煮椒汁洗之後封胡蔥泥於咬處即瘥治蜘蛛咬遍身成瘡立效方出聖惠方用井花水研硼砂塗之甚效又方出聖惠方用蝙蝠糞生油研塗之治蜘蛛咬作瘡諸治不瘥出聖惠方生油少許豉一合用先將油塗咬處即以豉搗作團拭之若見絲入豉中即效又方出聖惠方用蝦蟆頭炙令黃為末油調塗之立效又方出聖惠方用鹽和油調塗之數揩之神驗又方出聖惠方用獼猴糞為末油調塗之瘥人家養者不治不可用又方出聖惠方用竹筒子長三寸許籠咬處煎酸漿水瀉於筒子冷即易之以瘥為度仍取桃枝葉銼煮湯洗之尤驗又方出聖惠方用嚼續隨子敷之立瘥又方出聖惠方用驢馬腳底臭尿泥塗咬處不過三兩度瘥治蜈蚣咬方用蠟少許將筆管坐所咬處熔臘滴向管內令到瘡上三四滴便止羊乳飲出聖惠方治蜘蛛咬人令遍身生絲及中人毒用羊乳一味飲之愈貞元十年崔員外從質云目擊有人為蜘蛛所咬腹脹大如有娠遍體生絲其家棄之乞食於道遇僧教飲羊乳未幾而平復矣此方妙治蜘蛛咬遍身成瘡立效方出聖惠方用上好春酒任意飲之取醉使人翻轉身勿令一面臥恐酒毒入人腸胃須臾蜘蛛見於瘡中小如粟米自坐盡即瘥雞冠血塗方出聖惠方治蜈蚣咬用雄雞冠血塗之立止附子膏出聖惠方治蜈蚣咬痛用附子一枚生用去皮臍就沙盆內以醋少許磨濃少許塗之治蜈蚣毒蟲咬出廣南衛生方用皂角於咬處上用艾灸之熱即去之無不效治蜈蚣傷出醫方集成用大捻紙燈一個濃蘸麻油點著了於咬處照熁之毒氣自出盡入油煙中也又方出百一選方用右手大指中指托地上於中指盡處掏少許土敷之勿令患者知此亦厭勝法耳又方出百一選方用菖蒲細嚼以敷咬處立愈又方出百一選方用頭髮煙燻或燒灰搽傷處又方治蜈蚣咬法蜈蚣有赤足者螫人黃足者甚痛用大蜘蛛一枚放所咬處令收其毒曾試用之既齧痛果即定蜘蛛雖著身稍遠必徑尋其處而齧之漸覺腹脹蓋為毒氣所攻頃投水中不爾即死一方云用冷水在旁如蜘蛛死即投水中救活易之以痛止為度甚妙兼蠍螫尤佳必效方治蜘蛛咬著疼痛用鹽豉炒乾為細末每用油調塗之必效治蜈蚣蜘蛛毒用紅蚯蚓擂爛敷之立效治蜈蚣毒出百一選方用雞糞塗之一云烏白雞屎水調塗之一用燒雞糞塗之用酒一用醋治蜘蛛咬出十便良方用雄黃末敷又遍身飲羊乳愈蘭汁尤佳治蜈蚣咬出聖惠方用蝸牛搽取汁滴入咬處治蜘蛛咬瘡用合歡皮葉並去垢搗為末和鐺下墨生油調塗治蜘蛛咬用蠮螉燒末油和敷咬瘡上此物能食蜘蛛亦取其相伏也治蜘蛛咬瘡用蜂子燒末油和敷之按土蜂赤黑色此物能食蜘蛛治蜘蛛咬用山豆根為末吐唾和塗之治蜈蚣咬人痛不止出十便良方用嚼鹽沃土及以鹽湯浸瘡極妙其蜈蚣有赤足者螫人黃足者痛甚一方治蜘蛛螫蜈蚣螫用鹽熱塗之治蜈蚣螫人用蛇含草挼敷之治蜈蚣蜘蛛毒出十便良方用醋磨生鐵敷之治蜘蛛咬作瘡出聖惠方用蘿摩草搗如泥封之日二三敷毒化作膿膿出頻著勿停又方出肘後方用羊桃葉搗敷之立愈又方中蜈蚣毒出十便良方用蒜切作兩斷以揩之又以蒜磨地取泥塗一方治蜈蚣咬痛不止用獨頭蒜摩螫處又嚼塗之立瘥治蜈蚣螫人用挼藍汁以漬之即瘥蜈蚣不甚齧人齧亦微殊輕於蜂當時小痛易歇脫為所中幸可以此療之藥皆用赤足者螫人乃痛於黃足者是其毒烈故也又方取屋中土以水和敷之又方用趕雄雞令走以雞嘴氣呵之數易雞立瘥又方用錫炙令熱以尉之不越十度即瘥治蜈蚣蛇咬出傳信適用方用蚰蜒一條塗咬處痛立止一方去殼治蜘蛛毒出肘後方用荊葉袋貯敷瘡腫上又方出肘後方用射罔塗腫上血出乃瘥又方出肘後方用合口椒並葉搗敷之無不瘥治蜘蛛咬作瘡諸治不瘥用面圍咬處羊乳於上絲出即瘥治蜘蛛毒出肘後方用切菜刀燒赤烙之治蜈蚣咬用刮指甲末貼即不痛治蜘蛛咬用久臭人溺於甕中浸所咬處仍以烏雞屎炒浸酒服不然恐毒人治蜘蛛瘡用木韭根新者同雄黃研塗之杏仁膏治蜈蚣傷上爛嚼杏仁敷之或以人尿汁敷尤良治蜈蚣咬傷宜用山胡椒加鹽搽又方治蜘蛛中人毒以汗垢搽又方汗垢加嫩楓葉搽中蜈蚣毒者用桑汁白鹽塗亦效又畏蛞蝓不敢過所行之路觸其身蜈蚣即死故取治蜈蚣毒也治蜈蚣咬以腐木末和醋敷之亦搗取汁敷咬處良治中蜈蚣毒者以烏雞屎水調塗咬處效大蒜塗之亦效治蜘蛛咬以赤翅蜂燒令黑和油塗之亦取蜂窠土醋和為泥敷蜘蛛咬處當得絲出瘥治蜘蛛蟲等咬以鐵鏽和蒜磨敷之治蜘蛛咬以黑驢者溺及乳以物盛之浸瘡或先用醋泔汁洗瘡然後亦取驢尿處臭泥敷之亦佳一方無乳亦得治蜘蛛咬以生鐵煅後飛淘去粗赤汁烘乾同蒜磨生油敷之治蜘蛛咬恐毒入肉用蔓荊末和油敷亦搗為末酒服蔓荊園中無蜘蛛是其相畏也治蜘蛛咬瘡以土蜂窠燒末麻油和敷之一方用醋和為泥敷之解蜈蚣蛇蟲毒用鹽挼桑葉敷上治蜘蛛蠶咬取蘿摩子汁點瘡上解蜘蛛毒藍青麝香少許上為末敷毒處蠼螋尿瘡附論凡蠼螋蟲尿人影著處便令人病瘡其狀身中忽有處瘮痛如芒刺亦如刺蟲所螫後起細㾦癗作聚如茱萸子狀四邊赤中央有白膿如黍粟亦令人皮肉急舉身惡寒壯熱劇者連起竟腰脅胸治之法初得之摩犀角塗之止其毒治如火丹法余以武德中六月得此疾經五六日覺心悶不佳以他法治不愈又有人教畫地作蠼螋形以刀子細細盡取蠼螋腹中土就中以唾和成泥塗之再塗即愈方知天下萬物相感莫曉其由矣方白善方療蠼螋尿用雞子和白善敷之浸淫為廣以大蒜磨研書墨塗之赤小豆散出千金方治蠼螋尿瘡及諸惡瘡用槐白皮半斤切以苦酒二升漬半日刮去瘡處以洗日五六次仍以赤小豆為末用苦酒和敷之燥復易小兒以水和一方醋二升浸半月洗之日五六度甘草敷方治蠼螋尿瘡用甘草一兩為末韭汁調敷之雞子膏出直指方治蠼螋蟲又名八腳蟲隱於壁間以尿射人遍體生瘡如湯火傷用烏雞翎毛燒灰雞子白和塗之一方云麻油調敷雞食百蟲故能治之或用燕糞水調敷或南向燕窠自東取土末之新水調敷治蠼螋尿方出千金方用羖羊髭燒灰臘月豬脂和封之又方出千金方用搗豉封之又方出千金方用酢和胡粉塗之一方豬膏塗之又燒蒲灰敷之治蠼螋尿瘡方出千金方用燒鹿角為末以苦酒和敷瘡上已有汁者燒道旁弊蒲席敷之一方醋調塗之一方油調塗之又方出千金方用嚼大麥以敷之日三又方出千金方用熟嚼梨葉以水和塗疼處燥復易之一方研爛敷之一方以梨子汁敷之並瘥又方出千金方用搗馬鞭草爛敷上燥復易之又方出千金方用吳茱萸東行根下土酢和塗之楝枝灰方出肘後方治蠼螋尿瘡及諸惡瘡用楝木枝皮燒灰為末如瘡濕即干敷瘡乾醋調敷之用和豬膏亦可皂莢脂方出聖惠方治蠼螋尿瘡久不愈用豬牙皂莢炙令脂止乘熱以脂塗之治蠼螋毒出海上名方用豬牙皂莢炙令焦同螟蛉窠水調塗之治蠼螋尿瘡出肘後方用食鹽三升水一斗煮取六升以綿浸湯淹瘡上治蠼螋蟲溺人影亦隨所著作瘡出肘後方用雞腸草取汁敷之效一方生挼敷三四度效治蠼螋尿繞腰者用煎敗漿汁塗之瘥治蠼螋尿瘡繞身匝即死出千金方用燕窠中土豬脂苦酒和敷之土蜂窠水調敷亦佳一方無酒療蠼螋尿繞腰欲死用敗蒲扇煮汁塗之治蠼螋溺人影發瘡如熱痱而大繞腰匝不可療蠼螋如小蜈蚣色青黑長足用扁豆葉搗塗之即瘥療蠼螋尿瘡用鵲巢中土以苦酒和敷之療蠼螋尿瘡表裡相當一名浸淫瘡用豬牙車骨年久者捶破燒令脂出及熱塗之療蠼螋尿瘡習習然黃水出者出聖惠方用韭搗汁取以塗之又方出聖惠方用煮甘草湯洗之又方出聖惠方用嚼桂塗之又方用絞馬尿汁洗之又方出聖惠方用嚼麻子塗之又方用令患人於日裡立側近作沸湯微取以淋患人影令當所患瘡六七度仍遣人熟嚼蒜以噀患人影中患處口中余蒜氣即直噀患人瘡上愈治蠼螋尿人成瘡初如粉粟漸大如豆更大如火烙漿疱疼痛至甚出肘後方用草茶並臘茶俱可生油調敷瘡上其痛藥至立止妙一方用燈盞內油調塗又方出聖惠方用取衆人尿處爛泥塗之治蠼螋尿方出聖惠方用白礬滴醋於鏽生鐵上磨並鐵鏽刮下塗之治蠼螋瘡及諸惡瘡以槐白皮醋浸半日洗之治蠼螋溺瘡取磨刀石泥敷瘡有效治蠼螋溺瘡以故蓑衣結燒灰和油敷之佳治蠼螋溺瘡用豬膏莓碎敷之治蠼螋叮上用刀就地畫八卦又用刀裁至天面腳了取中間身上土津調塗小豆末敷方治蠼螋尿痛汁出用小豆為末敷瘡上頻易之一方酒調塗之射工中人附論夫江南有射工毒蟲一名短狐一名蜮其蟲形如甲蟲外臺云正黑狀如大飛生有一長角在口前如弩簷臨其角端曲如弓弩以氣為矢因水勢以射人或聞其在水中鉍鉍作聲要須得水沒其口便射人也此蟲畏鵝鵝能食之其初始證候先惡寒噤瘮寒熱筋急仍似傷寒亦如中尸便不能語朝旦小蘇晡夕輒劇寒熱悶亂此是其證始得三四日當急治之治之稍遲者七日皆死初未有瘡但惡寒噤瘮其成瘡似蠼螋尿亦似瘭疽瘡射工中瘡有三種其一種瘡正黑如黶子皮周邊悉赤或衣犯之如有芒刺痛其一種作瘡久乃穿或脯間寒熱其一種如火灼熛起似此者最急數日殺人備急方云有四種其一種突起如石癤狀俱能殺人多令人寒熱屈伸張口閉目也凡山水有毒蟲人涉水中人有影而無物其診法初得之惡寒微似頭痛目眶疼心中煩懊四肢振焮腰背百節皆強兩膝痛或翕翕而熱但欲睡旦醒暮劇手足逆冷至肘膝二三日腹中生蟲食人下部肛中有瘡不痛不癢令人不名不急治過六七日下部出膿潰蟲上食人五臟熱盛毒煩下利不禁八九日雖良醫不能治矣覺得之急早視其下部若有瘡正赤如截肉者陽毒最急若瘡如鯉魚齒者為陰毒猶小緩要皆殺人不過二十日也欲知是中水與非者當作五六升湯以小蒜五升㕮咀投湯中消息勿令大熱去滓以浴之是水毒身體當發赤斑無異者非也當以他病治之本草云水弩射工短狐等蟲生於山水間含沙射人影而成疾如瘧狀及如天行病者名曰沙病今人謂沙子症然亦本非射工水弩之毒不過山嵐瘴氣感而成疾今以繩搽之所皆是太陽經脈所過之處則邪氣出而病愈矣江西袁州一河其間多生水弩彼人云其蟲射人人中之即病故以綿揩身上或揩著如針刺則以針挑去令血出其病即愈然彼人終日食此水及於此浴緣此蟲聞水動則射人彼人欲入此水則先以石打水動後方入水則其蟲已射不能中人方五香散出千金方治江南毒氣惡核射工暴腫生瘡甲香犀角鱉甲升麻薰陸香烏翣丁香沉香黃連青木香羚羊角黃芩甘草牡蠣各四分黃柏六分吳茱萸三分上為細末中射工毒及諸毒皆水服方寸匕日三升以水和少許洗之仍以雞子白和塗腫上干則易一方無青木香犀角散一名甲香散出聖惠方治射工毒腫生瘡犀角磅甲香射干木香乳香丁香黃連升麻鱉甲醋炙牡蠣羚羊角甘草炙銼黃芩去黑心各一兩黃柏去粗皮吳茱萸湯洗曬乾各半兩上除乳香研外搗為散和勻每服二錢水調下日三兼以雞子白調塗瘡毒良野葛膏出千金方主射工惡核卒中惡毒方野葛一升巴豆烏頭蜀椒各五合茵芋躑躅附子丹砂各一兩雄黃大黃各一兩上為細末以不中水豬膏三斤煎三上三下去渣納丹砂雄黃末攪至凝以棗核大摩痛上勿近眼凡合名膏皆毋令産婦女人小兒雞犬六畜見之惟宜清淨治卒中射工水弩毒方其毒有四種惟如灼人肉熛起作瘡者此種最急並皆殺人居溪傍隰毒之地天大雨或逐人行潦流入人家而射人宜養鵝鵝見即食人行將純白鵝以闢之白鴨亦善帶好生犀角佳也治療射工毒方出聖惠方用以白梅皮裹豉母蟲至六七枚勿住取水浮走豉母蟲一枚置口中便瘥豉蟲已死者亦起蟲有毒應不可吞治水毒中人一名中溪一名中濕一名水病似射工而實無物用小蒜三升㕮咀於湯中莫令大熱熱即無力去渣適寒溫以浴若身體發赤斑者無異升麻散出千金方治人忽中水毒手足指冷或至肘膝者方吳茱萸一斤生薑切一升半犀角升麻橘皮各二兩烏梅十四個上㕮咀以水七升煮取二升令二服治溪毒沙蝨用馬齒莧搗絞汁一升漸以敷瘡上佳治中射工毒用白鵝血飲之又以血塗之身桃葉方治吐俗療溪毒方上初覺便取溪蒜豨蘞桃葉銼一斛蒸使遍熱出布席上解衣臥上厚覆衣被大汗良久出拭之勿見風則瘥已五六日恐毒入腹不可先爾應先服藥東間諸山有大木名埋檀枝葉上似梨冬不凋剝取白皮重疊如紙捶破煮服一斗日夜六七過無生者預取干之亦單用桕根白蘘荷根藍青汁並佳若卒無根葉亦可單用藍汁服之亦可都合煮取汁漬之若患腹中痛恐轉成蠱啖人腹臟者取豬脂二升熬令燥水一斗絞取汁稍稍服之雄黃硃砂方出千金方療溪毒雄黃硃砂常山各等分上五月五日午時使童子便搗合之取敷瘡上巴豆方出肘後方治卒中射工水弩毒上取鼠婦蟲豉各七合巴豆三枚去心合豬脂但以此藥塗之升麻散一名犀角散出千金方治射工中人瘡有三種一種瘡正黑如黶子狀周遍悉赤如有刺痛一種作瘡經久乃穿晡間寒熱一種如火灼煙起此為最急數日殺人此病人寒熱方犀角屑二兩川升麻一兩射干一兩上搗為散每服四錢以水一中盞煎至六分去滓不計時候溫服射干散一名和氣散出聖惠方治證同前射干川升麻各二兩上銼以水三大盞煎至一盞去滓適寒溫盡服其滓敷瘡上一方用烏扇根三兩研末治射工及疰氣發無常處用白芥子為丸服之或搗為末醋和塗之隨手有驗中射工溪毒以蔥和鹽研置敷之犀角塗方治射工毒上以犀角不拘多少以水磨塗所患處又取細末與麝香同研水調一錢服之梅桃散出千金方治人忽中水毒手足指冷或至肘膝者方上取梅若桃葉搗絞取汁三升許或干以少水絞取汁飲之小兒不能飲以汁敷乳頭飲之熊膽散治水弩射人用熊膽塗之更以雄黃同酒磨服之即愈解毒散出瑞竹堂方治毒蛇射工沙蝨等傷著人眼黑口噤手足直強毒氣入腸腹服之效白礬研甘草各等分上為末每服二錢冷水調下皂莢膏出肘後方治射工傷人敷瘡皂莢一挺長一尺二寸者捶碎以醋一升煎如餳以滓敷於瘡上又方出聖惠方用馬齒莧不拘多少爛搗取汁飲一盞又爛搗敷毒上日四五易治射工中人去毒方出聖惠方用胡蔥不拘多少細切爛搗以拓瘡上灸十壯即瘥一方用胡蒜治射工中人寒熱或發瘡偏在一處有異於常者方出千金方用鬼臼葉一把漬苦酒中熟搗絞取汁服一升日三或用醋又方出千金方用吳茱萸莖葉一握斷去前後取握中熟搗以水二升煮取七合頓服一方用葫切貼瘡灸七壯又方出千金方用蜈蚣大者一枚火炙為末苦酒和以芥菜子研細勻入敷之又方出千金方用赤莧菜熟搗絞取汁每服一升日四五服以滓敷之又方出千金方用白雞屎取白頭者三枚餳和塗中毒處治射工中人已有瘡者但惡寒噤瘮及其成瘡似蠼螋尿亦似風疽出千金方用疥子爛搗勻酒和厚塗瘡上半日痛便止醋調亦可治人忽中水毒手足指冷或至肘膝者方出千金方用浮萍草曝乾為末酒浸服方寸匕又方出千金方用搗蒼耳汁服一升又以綿裹杖沾汁導下部日三瘥又方出千金方用搗蓼一把以酒和絞取汁一升飲之不過三服瘥外臺肘後作梨葉又方出千金方用搗藍一把水解以塗浴面目身體令遍又方出千金方用搗蛇莓根為末水飲之並導下部生者用汁凡夏月行常多齎此藥屑入水以方寸匕投水上流無所畏又闢射工凡洗浴以少許投水盆中即無毒治射工毒用獨頭蒜切之厚三分以來貼瘡上炙之令熱氣射入即瘥治水弩射人出千金方用臘月豬膏和鹽塗腳足指間趺上及著鞋處蛭不得著人已著者灸斷其道治療中毒方用大母連根搗作屑服之亦可投水搗絞汁飲一二升並導下部生蟲者夏月常行多齎此屑欲入水浴先以少屑投水上流便無所畏又闢射工家中雖以器盛水浴亦常以此屑投水中大佳治溪毒每春月多得亦如京都傷寒之狀呼為溪瘟未必皆是射工輩爾亦盡患瘡痢但寒熱煩疼不解便死用東向三禹步即以手左一攪取水將蒜一把熟搗以酒漬之去渣可飲三兩杯當吐得吐便瘥此方甚妙治療溪毒出肘後方用五加根燒末以酒若漿服方寸匕又方用燒鮫魚皮以飲服方寸匕立瘥又方出肘後方用荊葉搗汁飲之佳又方出肘後方用搗漆菰以塗之腰背諸處漆菰生冬間細葉如蒜狀又方用烏蒜一枚搗以酒和服半升得吐即瘥一名烏韭山中甚多療溪毒下部生瘡已決洞者出肘後方用伏米一升鹽五升水一石作糜坐中即愈又方出肘後方用桃葉艾葉搗熟以水漬之絞取濃汁去滓著盆中坐有白蟲出瘥又方出肘後方用鹽和皂莢末搗綿裹導之一方無鹽亦可又方出肘後方用牡丹屑末以飲服方寸匕日三治療溪毒及沙蝨毒出千金方用大蒜十枚合皮安熱灰中炮令熱切斷頭以炷所著毒處盡十片復以艾灸瘡上七壯則良又方用搗蓼取汁服一二升又以塗周匝瘥又方用雄牛膝根一把搗水酒共一升漬絞取汁飲之日三雄牛膝莖白紫色者是治水弩子方川烏頭一兩半生炮半熟去皮臍巴豆一兩去皮心生用硃砂半兩銼研上先將烏頭末後入二味再研用生薑自然汁煮麵糊丸如緑豆大以硃砂滾過無灰水下三丸未轉再服治水弩子貼瘡方蚌蛤厚者一合燒為灰黃丹一兩麝香一分上同研細用油調塗瘡上以帛子蓋之治溪毒射工取溪鬼蟲口邊角帶之其蟲出於有溪毒處山林間亦名射工蟲治溪毒射工以荻皮絞取汁服滓敷瘡上血出治溪毒沙蝨水弩射工蟈短狐蝦鬚等病用鶚鴟鳥至病人邊則能咬人身訖以物盛之當有砂石出也亦可燒末及毛作灰服之鶚鴟鳥如鴨眼大赤嘴斑山水毒處即生此鳥也此數病俱是山水間蟲含砂射人影亦有無水處患者夜臥常以手摩身體覺辣痛處熟視當有赤點如針頭急搓之以芋葉入肉刮卻視有細砂石以蒜封瘡頭上不爾少即寒熱瘡漸深也其蝦鬚瘡桂嶺獨多著者十活一二唯有早覺者當有芋草及大芋甘蔗葉入內鉤之深盡根蒜封可瘥須臾即根入至骨其根拔出如蝦鬚亦有如疔腫最惡者生人幽隱處自餘六病或如瘧及天行初著寒熱亦有瘡出者亦有無瘡者要當出得砂石沙蝨毒附論沙子病江南舊無今所在皆有之其證如傷寒頭痛嘔惡悶亂須臾能殺人多用麻繩搽頭及膊間出紫點則愈或用針膝後委中穴出血則愈山水間多有沙蝨其蟲甚細不可見人入水浴及汲水澡浴此蟲在水中著人及陰雨日行草中即著人便鑽入皮里其診法初得之皮上正赤如小豆黍粟以手摩赤上痛如刺過三日之後令人百節強疼痛寒熱赤上發瘡此蟲漸入至骨則殺人凡在山澗水澡浴畢當以巾拭身中數遍又以故帛拭之一過乃敷粉也今東間無不有此浴洗畢以巾拭蠖蠖如芒毛針刺熟看見處仍以竹簪挑拂去之比見嶺南人初有此者只以茅葉刮去乃小傷皮膚為佳仍數塗苦苣菜汁瘥已深者用針挑取得蟲子正如疥蟲著爪上映光方見行動也挑不得便就上灸三四炷則蟲死病除若止兩三處不能為害多處不可盡挑灸若挑灸其上猶覺惛惛是病已太深便應依土俗作方術出之並作諸藥湯以浴皆得一二升出都盡乃止若無方術痛飲番酒取醉亦佳如其無則依此方為療並雜用前中溪毒射工法急救七日中宜瘥不爾則續有飛蟲來入攻啖心臟便死飛蟲白色如韭葉大長四五寸初著腹脅腫痛如刺則破雞㩉之蟲出雞㩉或三四數過取盡乃止兼須服麝香犀角護其內作此療之彼土有中之者不少呼此病為呼𤸷沙蟲誤音沙作𤸷讀如烏長尾𤸷𤸷音也盜者言此蟲能招呼沙蝨入人體內東間山行無處不有其蟲著人肉不痛不即覺者久久便生子在人皮中稍攻人則為瘻山行宜竹管盛鹽數視體足見者以鹽塗之便脫雜少石灰尤良亦斷血而闢水瘟又云所謂蜂蠆作於懷袖賁育為之驚恐言其小而有毒起乎不意也世人呼蝘蜓為蠆子而未嘗中人乃言不可螫人雷鳴乃放想亦當極有毒書家呼蝘蜓為守宮本草云守宮即是蜥蜴如依東方朔言則兩種物矣今蜥及蛇醫音醫母並不螫人蜥蜴有五色具者亦云是龍不可殺之令人震死今又有一小烏蟲子尾有翅世人呼為甲蟲而尾似車錂兩蠆尾後復言此蟲是蠆未詳其正矣方麝香散治沙蝨麝香少許辰砂少許上細研為末以鹽塗之瘥羊脂膏出千金方治沙蝨毒麝香大蒜上合搗以羊脂和著小筒中帶行欲用取敷瘡上如聖散治療沙蝨毒上用少許射罔敷瘡上過五日不瘥當用巴豆湯服之一日輒以巴豆一枚二日則二枚計為數並去皮心以水三升煮取一升盡服之未瘥即便可作服之治沙蝨毒出千金方用斑蟊二枚一枚熱為末服之一枚燒令煙絶為末著瘡中又方用白蒿草苣菜汁敷之瘥治療沙蝨用鹽五合以水一斗煮一沸以漬洗瘡上又方若初著有赤點如米以鹽和麝香塗之瘥治初中沙蝨有赤點如米良久即如刺在肉中者用竹葉刮之令血出仍斷大蒜摩之即瘥闢蝨方水銀不拘多少上以茶末拌在手心以津唾研和令不見星搽在綿帶子上繫於有蝨處每一條帶約三個月無蝨闢狗蚤方韶腦不拘多少上以薄紙裹之放在枕邊或被下即無也治蝨咬水磨硃砂敷雄黃醋磨塗治諸溪毒沙蝨以白蘘荷煮汁服之治沙蝨毒以射罔敷之佳治溪沙蝨用搗蒜貼之熱醋浸之經年者良治沙蝨水弩用蜣螂十枚端午日收乾者佳杵末油調敷之闢蚊子上用皂角蒼朮干浮萍等分為末飯丸彈大令乾燒之闢蚊闢蝨狗蚤上用駝糞白鱔魚骨為末燒之永無凡新屋未居先燒之直至屋壞亦無
