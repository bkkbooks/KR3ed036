body:
  text: 卷二百七十四諸瘡腫門諸疔瘡反花瘡附論夫瘡生惡肉久則反出於瘡外故謂之反花瘡其初如一飯粒破之血出餘毒尚熾惡肉隨生根深而膿潰此皆風熱毒氣之所作也方胭脂散出直指方治反花瘡胭脂貝母各一分硼砂沒藥各半分胡粉一分上研細先以溫漿水拭後敷藥甘草塗敷方出聖濟總録治反花瘡甘草半生半熟礬石灰人中白密陀僧各半兩上為末入童子小便半盞以微灰火熬用竹篦攪成膏取塗瘡上日三五次胭脂塗敷方出聖惠方治反花瘡胭脂一兩胡粉一兩半上相和研令勻先以鹽湯洗瘡淨帛搵干用藥敷之三五上治反花瘡方出聖惠方以鼠尾草根細切不拘多少熱搗和豬脂封貼瘡上即愈藜蘆敷方出聖濟總録治反花瘡藜蘆末豬脂上相和調糊塗瘡上日三五度惡實根塗敷方出聖濟總録治反花瘡並治積年諸瘡不瘥者惡實根末四兩豬脂上調和如糊塗瘡上日三四度又方出聖惠方燕糞胡粉各一兩上搗細羅為散先以溫漿水洗瘡後以藥敷之治反花瘡久不瘥方出聖惠方用鵓鴿三兩炒黃為散先以溫漿水洗瘡搵干以藥敷之馬齒莧塗方出危氏方取馬齒莧搗爛令細塗瘡上日五度一方燒灰以豬脂調塗之治反花瘡方出千金方取蜘蛛膜貼瘡上干即易之瘥止治反花瘡方以柳枝葉三斤銼水五升煎至二升去滓再煎如餳塗敷瘡上日三五度一方以清油單煎柳枝令焦黃去滓候冷塗之治反花瘡方出聖濟總録以硇砂細研塗敷上日三五度治反花瘡方以蒼耳藥搗攪取汁服三合並塗瘡日三五次治反花瘡方出本草以鬼屎刮取和油塗之生陰濕地如屎亦如地錢黃白色者治反花瘡方出本草以掬天皮和油塗之浸淫瘡附論夫心惡熱風熱蘊於心經則神志躁鬱氣血鼓作發於肌膚而為浸淫瘡其狀初生甚微癢痛汁出漸以周體若水之浸淫泆不止故曰浸淫其瘡自出日流散四肢者輕毒氣已升出故也從四肢反入於口則重以毒復入於內故也方水沉膏乳香輕粉白蘞赤蘞各二錢雄黃半錢白芨黃丹烏魚骨各一錢上為細末後將草藥一處再為末先用熱絹子放在水上浸少時取出量大小調藥攤於絹子上貼瘡口上三二日勿敷之升麻湯出聖濟總録治心有風熱生浸淫瘡遍體升麻大黃銼炒黃芩枳實芍藥各一兩甘草炙當歸各半兩上粗搗篩每服五錢用水一盞半入燈心一握煎至一盞去滓空心晚食前服苦瓠散出聖惠方治浸淫瘡表裡相當多苦瓠一兩蜂房蛇蛻各半兩大豆半兩梁上塵一兩上制下篩以粉為粥和敷紙上貼之日三一方無大豆胡粉散出聖惠方治浸淫瘡多汁胡粉研炒黃甘草䕡茹黃連去須以上各半兩上搗細羅為散日三四上以敷之戌鹽塗敷方出聖惠方治浸淫瘡戎鹽半兩大黃一兩䕡茹心一分上為細末以酒調塗敷瘡上日三五度治面上耳邊生浸淫瘡有黃水出久不愈名辨香瘡羖羊須荊芥干棗去核各二錢上燒灰存性研勻入膩粉半錢同研極細每用許清油調搽先以溫熱湯洗淨拭乾塗藥三二次必效又治大人小兒兩吻瘡立效丸治浸淫瘡疼痛動臟腑雄黃一兩雌黃五錢沒藥半兩巴豆一兩去皮不出油另研乳香五錢木香一兩上為細末麵粉丸如桐子大每服五丸夏月清茶下冬月溫水食後下又方出千金方治浸淫瘡以豬牙車骨年久者捶破燒令脂出熱塗之雞冠血塗方出聖濟總録治猝得浸淫瘡早不治則繞身周匝能殺人外臺云浸淫瘡轉廣有汁多起於心以雄雞冠上刺血塗敷日三五度牛屎汁塗方出聖濟總録治浸淫及濕瘑丹毒以牛屎新者絞汁敷之或取乾者燒煙燻之亦佳治猝得浸淫瘡有汗多發於心不早治散周身則殺人出肘後方以秫米熬令黃黑杵末以敷之療猝毒氣攻身或腫或赤痛癢並分散上下周匝煩毒欲死方出聖惠方以生鯽魚切之如膾以鹽和搗敷之若通身即多作敷遍病上干復易之此為浸淫瘡也備急同一方用豆豉和搗敷之或醬清調用魚燒灰為之亦療馬瘡苦楝散又名苦楝膏出聖惠方治浸淫瘡及大人小兒禿惡瘡上以苦楝根日乾存性或用皮亦得為末豬脂調敷濕則摻先用苦楝參大腹皮煎湯洗一云取皮並枝燒作灰敷上治猝得浸淫瘡有汗多出於心不早治周匝身則殺人出聖惠方取胡燕窠中末水和敷之治浸淫瘡出本草以瞿麥搗敷之治浸淫惡瘡用胡麻子生嚼敷之治浸淫瘡繞身至心者死用燕子窠中草燒灰為末酒調服之冷瘡附論夫形不足者溫之以氣氣能養形故也周官瘍醫掌腫瘍潰瘍金瘍折瘍有五氣養之之法蓋以氣不足則血不行血不行則經久不瘥所謂冷瘡是也蓋諸瘡既潰風冷之氣入於榮衛傷於肌肉故冷瘡而不痛癢治宜溫肌養血滌汙除膿則愈方豬骨膏出聖濟總録治諸瘡口氣冷不瘥豬筒骨二個取髓松脂通明者研二錢乳香研黃連去須為末白芨為末各五分同研上搗研熔蠟和為膏不拘時敷之乳香膏治諸冷瘡久不瘥乳香一兩食鹽末一兩半松脂杏仁湯浸去皮研各一兩五錢生地汁三兩白羊腎脂半斤蠟三兩上先熬脂令沸下杏仁生地黃汁蠟煎候蠟熔盡入香鹽松脂煎以柳棍攪勻瓷盒盛取敷瘡上日三兩度蕪荑散出聖惠方治冷瘡久不瘥蕪荑一兩微炒藜蘆一兩去蘆大黃半兩青礬半兩雄黃五錢苦參三分附子三分上為末先以溫水洗瘡去痂拭乾生油調塗之烏賊魚骨散出聖惠方治冷瘡發歇疼痛膿水不止生肌烏賊魚骨一兩燒黃連一分檳榔一枚訶梨勒皮一分白龍骨一錢五分赤石脂一錢五分麝香一錢上為細散於瓦鉢內入麝龍骨赤石脂相和研勻每用時先暖鹽漿水洗瘡拭乾後以散敷日二用之葶藶膏出聖濟總録治一切瘡久冷葶藶一兩蜣螂五枚馬牙蟲五枚蟬殼五枚斑蝥五枚麝香一錢上搗研為末煉蜜和為膏以故帛上攤貼日三次瘥為度二黃散治冷瘡不愈雌黃雄黃密陀僧定粉膩粉各一分乳香少許上研細乳香同研蜜調敷之六灰煎膏出聖濟總録治諸冷瘡紫肉久不瘥石灰五升蒺藜灰白頭翁灰白柞灰如無以草腐蒿灰代之桑灰藜蘆各半斤上相和於瓦甑內蒸一食時取釜中湯淋下灰汁二升於銅器中煎成膏以瓷盒盛先以鹽湯洗瘡後取塗敷即瘥蔥白湯治諸瘡風冷腫痛皆因瘡腫坐於水中及風冷所至或反脹腫入腹則能殺人蔥白切蜀椒去目及合口者用薤白各半斤香豉二合防風三兩芎藭一兩半上銼碎取一長項瓷甕納藥於甕中下水二升以故帛及紙三兩重密封甕口以繩縛之然後納甕於釜中以水煮之甕中氣沸當中通氣以瘡當氣上射之瘡中黃水出盡即止日三兩度再煮甕令熱用之以瘥為度亂髮熏方治冷瘡亂髮雞屎蠟各二兩大麻子大豆各二合青布一尺二寸上先用發安青布上次用雞屎蠟麻豆等如果餅角可粗如臂長一尺以繩縛之取一瓦著煻灰火置藥於瓦中更以一瓦覆上以繩縛定塞一頭孔其煙只一頭出以瘡當煙上射之令瘡中黃水出盡乃止或汗出勿觸風熏了熔熱蠟注瘡中即瘥檳榔散治冷瘡雞心檳榔木香硫黃薑黃各半兩吳茱萸麝香一字上搗末麻油調敷有膿乾摻檳榔散治冷瘡不瘥檳榔半兩甘草鬱金木香黃連各半兩麝香一字上為細末令勻先取砒霜少許安上用生油調敷有膿乾摻日再換丹砂散治冷瘡長肌肉止疼痛丹砂一分麝香一分陳石灰一分鉛丹一分豬筒骨一枚上搗羅為散每用一錢干敷之乳香散治瘡冷及膝脛生瘡年深筋骨攣躄膿血不瘥乳香一錢紫藤香末一錢安息香灰半錢人指甲灰五分硇砂一字上細研令勻用油單裹包令人懷中貼肉懷十日取再研令勻患者以溫水洗瘡以紙捻子尖上點藥少許深納瘡中外面以帛裹縛令定一夜當取出惡物如魚腸之類自然生肉雄黃散治冷瘡暖瘡口雄黃研百合乳香研黃柏去皮炙牆上爛白蜆子小蚌蛤子是各一分上為細散先用漿水煎甘草濕柳枝湯溫洗拭乾敷之乳香散治冷瘡暖瘡口止疼痛乳香研末麝香黃蜀葵花搗白小豆搗黃柏上等分搗為細散干敷瘡口附子散治冷瘡夜發歇疼痛附子半兩炮裂去皮臍川椒一分去目白礬三分燒汁盡研細膩粉二錢雄黃一分細研上附子椒二味為末次入白礬膩粉雄黃相和勻每使以清油調令得所瘡日二換木香散治冷瘡或在頂上或在脅間年深未瘥木香乳香各一分母丁香一枚麝香少許上搗研為散用雞子一枚打作眼子取清和藥二錢卻入空殼內濕紙蓋了飯上炊熱分作四服每日空心午間臨臥各一服爛嚼蠟茶下金黃散治冷瘡經久不愈雄黃栝蔞根五倍子等分上為散先用溫漿洗瘡了干貼如瘡口久不合者洗了用巴豆一米許紝瘡內待血出後敷此藥治冷瘡疼痛不止方蛇床子一兩乳香半兩薤白臨時切上為末入薤白搗看稀稠得所可瘡上貼之治積年風冷疼痛方麝香一分乳香一分龍骨一分上細研用黃蠟臨時看口大小於湯內熔蠟如軟面入前藥相和熱貼在瘡口上不過三兩度又方治冷瘡日夜發歇疼痛龍骨一兩炙蜂窠一兩炙蛇床子半兩炙上研令勻以生油調塗日二換之桑灰洗方出聖濟總録治冷瘡以水淋桑柴灰汁溫浸洗日三五度即瘥棗肉浸洗方出聖濟總録用棗肉二斤以水五升煮取三升浸之洗瘡以瘥為度生肌散出聖濟總録治一切瘡口不合以秦艽淨洗焙乾為細末貼之便生肌肉冷露瘡出應驗方用細茶同藿葉一處煮一般燒灰油調照瘡大小攤在葉上貼之炙藥餅出聖濟總録治冷瘡諸瘡中風冷氣膿出痛急薤白切一合商陸切二合上以鹽半兩相和熟搗令細研作餅子厚如錢安瘡口上以艾炷灸令熱氣射瘡中即水出再灸水出盡即止餅子干頻頻換之以瘥為度熱瘡附論凡熱瘡起便生白膿黃爛瘡起即淺但出黃汁名肥瘡又有洪燭瘡身上忽生瘭漿如沸湯灑劇者偏頭面赤有胸脅腰腹腫緩通體如火熱而瘭起者是也治之急服漏蘆湯下之外以升麻膏敷之其間敷升麻膏若無效一依敷丹方熱瘡本於熱盛風氣因而乘之故特謂之熱瘡蓋陽盛則表熱形勞則腠疏風邪得入相搏於皮膚之間血氣之內聚而不散故蘊結為瘡赤根白頭輕者瘭漿汁出甚者腐為膿血熱少於風則癢熱盛於風則痛而腫方內塞散一名防風散出聖惠方治大瘡熱退膿血不止瘡中肉虛疼痛排膿防風去叉白茯苓去黑皮白芷桔梗銼炒遠志去心甘草炙人參芎藭當歸切焙黃耆銼炒以上各一兩肉桂去粗皮五錢附子二個炮裂去皮臍厚朴去粗皮生薑汁炙三分赤小豆五合酒浸熬之上搗羅為散酒調下二錢日三度一方無酒用黃耆湯調下白蘚皮散出聖濟總録治遍身熱毒瘡及皮膚瘙癢發躁白蘚皮子芩川升麻玄參白蒺藜微炒去刺桔梗去蘆頭前胡去蘆頭百合甘草炙微赤銼梔子仁各半兩馬牙硝一兩麥門冬一兩半去心焙上為散每於食後以薄荷湯調下二錢黃耆湯出聖濟總録治瘡退風熱黃耆銼一兩半生地黃四兩甘草炙銼麥門冬去心焙芍藥黃芩去黑心各一兩半石膏碎芎藭大黃銼炒人參當歸切焙一兩上銼如麻豆每服五錢用水一盞半竹葉七片煎至一盞去滓空心溫服日晚再服犀角散出聖惠方治熱毒攻皮膚生瘡疼痛犀角屑木香川升麻吳藍玄參子芩羚羊角屑防風去蘆頭白蒺藜微炒去刺枳殼麵炒黃去瓤甘草炙微赤銼各一兩麝香一錢研細入上為細散每於食後煎竹葉湯調下二錢白蒺藜散出聖惠方治熱毒瘡瘙癢心神壅躁白蒺藜微炒去刺白蘚皮防風去蘆頭子芩玄參赤芍藥梔子仁桔梗去蘆頭川大黃麥冬去心焙前胡去蘆甘草炙微赤銼各一兩上為細散每於食後煎薄荷湯調下二錢木蘭皮膏出聖濟總録治熱瘡木蘭皮芍藥射干蛇床子各一兩白芷黃連去須一兩五錢黃柏去皮黃芩去黑心狼牙山梔子各一兩豬脂二斤上除脂外細銼如麻豆大先熬脂令沸下藥煎候白芷黃赤色以綿濾去滓瓷盒盛塗瘡上日三五度即瘥甘家松脂方出肘後方療熱瘡出黃膿不痂無瘢松脂白膠香薰陸香各一兩當歸蠟一兩半甘草一兩切豬脂羊腎脂各半合生地黃半合上以松脂等末納脂膏地黃汁中微火煎令黃下蠟絞去滓塗布貼瘡極有驗祕不能敷此是半劑蛇床子散出聖濟總録治熱瘡蛇床子乾地黃各半兩苦參洗大黃生木通銼白芷洗黃連去須各一兩狼牙半兩上搗羅為散旋取臘月豬脂調塗敷瘡上日三五度赤小豆散出聖惠方治熱毒瘡腫痛赤小豆糯米各三兩松脂黃柏微炙銼白礬灰萵苣子三合黃丹微炒密陀僧各半兩細研上為末研勻用生油調日三兩次塗之芎藭散一名大黃散出聖惠方治熱瘡多膿汁芎藭大黃生白蘞芍藥黃連去須槐皮銼龍骨火燒各半兩上搗羅為散塗敷瘡上日三五度一方無芎藭紫金散出聖惠方治一切熱毒瘡紫草黃芩漏蘆車前子黃柏各半兩銼赤小豆糯米各一合炒焦上為末以生油調令稀稠得所日三塗之人參龍骨散出千金方凡患腫皆因宿熱所致須服冷藥瘥後有患冷痢不止者人參龍骨赤石脂甘草乾薑各三兩附子一枚上㕮咀以水八升煮取二升半分三服每服八合麥門冬湯治體卒生熱瘡麥門冬去心焙二兩豉炒一分人參三分桑根白皮銼一兩五錢肉桂去皮五錢甘草炙銼一兩上粗搗篩每服五錢用水一盞半蔥白三寸切同煎至一盞去滓空心溫服晚再服紫草膏出直指方治熱瘡紫草茸黃連黃柏漏蘆各半兩赤小豆緑豆粉各一兩上搗細入麻油為膏日三敷常服黃連阿膠丸清心又方出直指方治熱瘡淫濕南星半夏黃柏黃連各一分五倍子煅虢丹各半分上細末糝癢加煅白礬更癢加雄黃熱證平血飲出危氏方治遍身生瘡膿血爛腫極痛且癢乾葛赤芍藥升麻各一兩粉草五錢天麻加蟬蛻加上銼散與人參敗毒散合和生薑薄荷生地黃麥門冬去心煎不拘時候大效膩粉膏出聖惠方治熱毒膩粉胡粉細研黃連去須為末甘草生為末各一兩松脂半兩豬脂六兩煉了者上先以豬脂煎松脂化後去滓下四味攪勻瓷合盛用每日三四度塗之狼牙湯出聖惠方治熱毒惡瘡淋洗狼牙赤芍藥白芷黃柏丹參各五兩川大黃三兩生用上細銼分為六貼每度一貼以水四升煎取二升半去滓看冷暖洗之日三度黃芩湯治表熱實身體生瘡或發瘡癤大小便不利梔子仁半兩知母焙甘草炙銼黃芩去黑心各一兩大黃銼炒二兩上粗搗篩每服五錢水一盞半煎至一盞去滓入芒硝一錢空心溫服以利為度未利再服二參丸出聖濟總録治熱瘡玄參苦參烏頭炒裂去皮臍用之何首烏各一兩丁香一分上搗羅為末麵糊丸如梧桐子大每服二十丸至三十丸空心鹽湯日三服金露散出瘡科精要治時氣熱毒瘡黃柏一兩白芨白蘞雄黃各二錢半寒水石生一兩半上為細末無根水調以紙花貼或掃亦妙密陀僧散出聖惠方治熱毒惡瘡潰爛久不生肌密陀僧雄黃雌黃定粉各半兩膩粉三錢上研為末先用柳枝一握生甘草一兩捶碎以漿水二升煎六七沸去滓稍熱淋洗瘡後以藥敷之竹茹膏出醫方大成真麻油二兩青木香半兩青竹茹一小團杏仁二七粒去皮尖上用藥入麻油慢火煎令杏仁色黃去滓入松脂末半兩熬成膏子每用少許搽瘡上四聖丸出傳信適用方治熱毒風瘡何首烏蔓荊子苦參荊芥穗各一兩上研為細末酒糊為丸如梧桐子大每服二十丸至三十丸溫酒送下水銀膏出聖惠方治熱毒瘡亦治頭中惡瘡水銀並胡粉入少水研星令盡胡粉松脂各二兩豬脂半斤煉了者上先以豬脂煎松脂令消次下水銀胡粉攪勻瓷器中盛旋取塗瘡日二胡洽云療兒頭面瘡加黃連二兩亦療得禿瘡大黃散出聖濟總録治熱毒瘡腫大黃銼炒赤小豆各三兩石灰一兩上搗羅為散用酸醋調塗敷瘡上日三五度即瘥大黃散出聖濟總録治熱瘡大黃生為末硝石研各半兩黑膠一分上先搗大黃硝石為末用醋半合熔膠煬調散子如糊塗敷患上日三五度即瘥又方出直指方治熱止痛收汁先用大腹皮苦參白芷煎湯泡荊芥洗次用藥地榆苦參白芷黃連等分上為細末入真蚌粉乾摻更痛加去皮緑豆治身體生瘡熱毒似火燒爛赤方出聖惠方胡粉黃連去須各一兩膩粉各一錢上為末用摻瘡上日四五度又方出聖惠方密陀僧細研胡粉細研各一兩黃連二兩去須為末上研勻先以溫水洗去瘡痂拭乾日三四度敷之黃連散出仁存方治風熱毒氣客搏肌膚成瘡癢痛不止黃連一兩輕粉一錢上為細末入輕粉和勻瘡乾燥生油調塗有膿汁干捻在患處一日兩三上黃連湯出聖濟總録治熱不散體生細瘡黃連去須四兩芒硝四兩上先將黃連以水一斗煎取七升去滓下芒硝乘溫洗瘡上冷即再暖洗日三五次以瘥為度治皮膚熱生瘡及皮熱方苦參地龍去土上等分為末醋糊丸每服三十丸空心酒下溫漿亦可青金散治一切熱毒膿窩瘡青黛一兩寒水石一兩煅過蘇為度上為細末用香油調搽茄子角方出聖濟總録治熱瘡先取生茄子一枚割去二分令口小再去瓤三分似一罐子合於腫上角即消如已膿再用以瘥為度地榆根湯出聖濟總録治熱瘡以生地榆根二斤洗切細銼以水一斗煎出五升去滓溫洗瘡上冷即溫日二度瘥治熱瘡方搗蕪荑和豬脂塗瘥白金散治風攻注毒便及手足生熱瘡疼痛有黃水出者用桂府滑石為細末先用虎杖甘草豌豆各等分約半兩許二碗水煎上項藥煎至一碗去滓微熱淋洗瘡水冷拭乾上摻滑石末冷通便睡至明決愈治遍身熱毒瘡痛而不癢手足尤甚黏著衣被夜不得睡及治頭瘡出危氏方多取菖蒲為末布於席上使病者恣臥其間仍以衣被覆之五七日瘡愈疹瘡爛用艾黏亦可一方用末敷瘡上苦參丸出醫方大成治肺受熱毒遍身生瘡及治火丹用苦參為末粟米飯和丸梧桐子大每服五十丸米湯送下或為末水調敷丹上治熱毒赤瘡子心神煩熱出聖惠方用梔子仁二兩以少酥拌微炒為細散每於食後以溫水調下二錢硝石水漬方出肘後方治服丹石人有熱瘡疼痛不可忍用硝石研末以紙捻作繩如指大纍起圍腫上取硝石填令滿以匙抄新汲冷水澆令濕候覺寒冷不痛即止日三四次瘥為度密陀僧散出楊氏家藏方治熱毒攻注遍身生瘡臭穢不可近者黃連去須密陀僧火煅另研香白芷白蘞以上各半兩膩粉半錢上為細末先以鹽湯洗瘡次用生油調藥以翎毛敷之五參丸出淡寮方凡瘡無有不屬腎心者赤而痛乃心經熱癢而黑乃心腎虛皆當兼服此藥人參杜參玄參苦參沙參各等分上為細末麵糊丸熟水吞下本草無杜參一方用紫參即沙參之紫花者亦名杜蒙羚羊角散出朱氏集驗方治一切膿泡熱瘡及發背羚羊角黃耆生熟地黃川芎當歸芍藥上等分㕮咀每服三錢水一盞煎八分空心服鹿角丸出朱氏集驗方治療同前鹿角銼黃耆炙上等分卻入羚羊角一半蜜丸地黃酒下趙龍學病虛服之剛劑多劉立之云必有瘡疾服此藥後不發止遍身發細瘡用生地黃汁解白餅酒常服兼進前方服之遂無事蓋鹿角散血羚羊角消膿兼用鍾乳粉鹿茸為丸服之治熱瘡出本草以蚯蚓屎鹽研敷之治熱瘡出本草以田中螺肉搗碎敷瘡上治熱瘡解諸毒出本草以藍靛敷之治熱瘡出本草以水萍搗汁敷之治身皮瘡熱氣出本草以牛扁作湯浴之治大飈熱瘡及疥瘡出本草以活螄搗碎敷之治火心瘡出本草以慎火草根濃研取汁塗患處痱瘡附論夫經謂汗出見濕乃生痤痱蓋熱盛汗出陽氣發泄而腠理疏反以寒水洗浴則熱氣內鬱於皮腠之間輕則為痱重則為痤也世俗通謂之痱子瘡其狀皮肉如毫針所刺遍體細瘡如麩片愈而復發者是也方玉粉散出御藥院方治熱汗浸漬成瘡腫癢焮痛定粉一兩蛤粉九兩五錢石膏白石脂白龍骨各半兩滑石粟米粉二兩寒水石燒通赤於淨地上放冷出火毒一兩上為末再研極細勻每用藥干搽患處七寶散出御藥院方治熱汗浸漬成瘡癢痛不已黃耆當歸防風荊芥穗地骨皮木通各三兩白礬上為粗末每用藥一兩水三碗煎五六沸濾去滓稍熱淋泄患處拭乾避風少時先師東垣老人論此方城北獨柳店之客舍有推江軸者皮膚皴裂不任痛兩手不能執轅足不能履地而輒止宿因制此藥與敷之即效明日遂行自此屢用屢效赤石脂散出聖惠方治痱子磨破成瘡宜止痛生肌赤石脂細研一兩黃柏去粗皮銼臘茶末各半兩白麵二兩龍腦半錢上搗研為細末每用時綿搵撲之葛粉方治夏月痱子及熱瘡葛粉三兩石灰微炒半兩甘草生用為末一兩上研細末每服用時綿搵撲之滑石粉方治夏月痱盛滑石研緑豆粉研棗葉乾者為末各一兩上合研為細末遍敷之治熱痱瘡方干炭灰半合石灰半合微炒棗葉半斤上為細散先以溫漿水洗瘡後以藥敷之瘥蛤粉散治夏月抓破皮膚成瘡蛤粉白礬各少許胡桃一個燒灰上研細油調塗之龍腦粉方治痱瘡癢痛龍腦一錢粟米粉五兩上研細末先用棗葉湯洗後綿搵撲之玉女英治夏月痱瘡癢痛一名痱子滑石粉緑豆粉四兩微炒滑石半兩研上拌勻如粉綿撲之楝花粉敷方治痱子瘙癢以苦楝花不拘多少焙乾為細末入蚌粉滑石末各少許研勻日頻敷之丹惡散治夏月痱瘡取舊屋梁上刮取舊赤白羅末敷之治暑月肌膚瘡爛或因搔皮汗出瘡出水汗出坐臥濕地多是大暑傷肌膚取干壁蜆揉細末敷之隨手即瘥治夏月沙痱子癢痛用新汲水挪蒿汁調蛤粉敷之雪水尤妙又方以剪草汁調蛤粉敷之剪刀草即慈菰葉也治熱痱瘡以棗汁揩之和葛根汁尤妙亦治熱瘡一方棗葉乾為末和葛粉敷之治暑月汗漬腋下赤腫及痱瘡以蠟和蚌粉敷之立瘥瓦木上以雞毛羽掃取收瓷瓶中持久亦不壞可用或用霜亦可一方加滑石緑豆粉同和勻無雪水則用新汲水調塗或日乾撲之又方用升麻煎湯洗仍須先飲一盞如神治痤痱法用黃瓜一枚切作段子搽痱子上玉粉散治痱痤寒水石四兩火煅紅取出地上去火毒井泉石二兩生用腦子半錢上件細研新水調敷干撲亦得治痱子用冬瓜切摩甚良治痱瘡英粉方用粟米浸纍日令敗研澄取之敷瘡尤佳
