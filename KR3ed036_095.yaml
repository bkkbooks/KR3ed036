帛裹之每夜服藥後尉不遂處速效冷即用酒拌炒熱用之乳香煎丸治柔風四肢不收裡急不能仰乳香研一兩麝香研半兩天麻二兩沒藥研地榆玄參烏頭生去皮臍甜瓜子各一兩上將五味搗羅為末入研藥和勻別用麻黃去根節二兩搗羅為末以酒一升慢火熬為膏更入煉蜜同和藥丸如梧桐子大每服十五丸至二十丸溫酒下荊芥湯亦得羌活湯一名葛根湯出聖惠方治柔風身體疼痛四肢緩弱欲起不隨並治産後中風四肢不能收攝羌活去蘆頭熟乾地黃焙桂去粗皮葛根銼芍藥麻黃去根節先煮掠去沫焙甘草炙各一兩半上搗篩每服五錢匕水一盞清酒一盞入生薑半分切碎煎取一盞去滓溫服日二夜一一方有芎藭一兩用棗三枚同煎忌生冷油膩豬雞魚等物附子煎治柔風四肢不收腹中拘急附子炮裂去皮臍五兩黑豆洗一升天雄炮裂去皮臍五兩防風去叉三兩以上四味將三味細研並豆用酒一斗五升煮候豆爛絞去滓取汁更用天麻芎藭各五兩上共六味將後二味搗羅為散與前豆藥汁同煎如稀餳每日空心熱湯或溫酒調服一匙頭紫葛散治柔風四肢不收腹內拘急兼治婦人産後中風葛根銼防風去叉羌活去蘆頭各一兩甘草炙銼黃連去須各半兩上為散每服二錢匕溫酒調下檳榔湯治柔風四肢不能收攝並風毒腳氣行履不得檳榔煨七枚銼黑豆小者炒二升桑根白皮炙銼二兩郁李仁去皮尖炒半兩上粗搗篩每服五錢匕水一盞半入生薑半分切碎煎至一盞去滓空心臨臥溫服地膚子散治柔風肢體弛緩不收裡急不能養息兼治婦人産後中風地膚子炒二兩紫葛銼一兩半白頭翁銼炒一兩上為散每服二錢半加至三錢匕溫酒調下蓯蓉丸治柔風舉體無力四肢緩弱不能行立肉蓯蓉酒浸切焙牛膝去苗酒浸切焙菟絲子酒浸別搗各一兩上為末用白麵二兩附子生去皮臍為末一兩共用酒煮為丸如梧桐子大每服二十丸食前溫酒下石膏散治柔風身體疼痛白汗出石膏別研如粉一兩甘草炙銼三分上為散每服二錢匕溫酒調下日四服不拘時仙人杖浸酒方治柔風腳膝痿弱久積風毒上衝肩膊胸背疼痛婦人産後中風用仙人杖一斤四兩先刮去土皮銼枸杞根白皮是也用生絹囊貯以酒二斗浸七日每日溫飲一盞至二盞不拘時酒欲盡再入五升依前浸服兼治一切熱毒風附子湯一名煮豆法出十便良方治柔風筋骨緩弱不能行立及治頭風用附子炮去皮臍一兩㕮咀如麻豆大以水五升緑豆五合同煮至三升絞去滓每服半盞細細飲之空心日午臨臥服柳蚛煮糞尉方治柔風筋骨疼痛手腳拳攣用柳蚛糞二升甑上炊一飯頃如無柳蚛糞用大豆五斗蒸熟攤於床上著舊夾衣蓋襯令人臥蒸尉所患處牛蒡酒出聖惠方治柔風久不瘥四肢緩弱牛蒡子生乾地黃枸杞子各三兩牛膝五兩去苗上藥細銼用生絹袋盛以好酒二斗於瓷器內浸密封春夏七日秋冬二七日後每日空心溫服一小盞晚食後再服常令醺醺為妙風嚲曳附論夫人假水穀之精化為氣血周流一身使四肢相隨筋脈相續猶挈衣領無所不從若脾胃虛弱水穀不化筋脈無所稟養復遇風邪外搏膚腠流傳筋脈縱緩則肢體嚲曳嚲則偏而不舉曳則弛而不隨是皆不能收攝也方赤箭丸出聖惠方治風邪所攻肌膚虛弱手足嚲曳筋脈不利赤箭二兩天雄去皮臍丹參川烏頭去皮臍天南星獨活防風去蘆頭五加皮桂心白花蛇肉芎藭白附子牛膝去苗仙靈脾白殭蠶桑螵蛸檳榔細辛酸棗仁乾蠍野狐肝蒺藜子萆薢銼各一兩麻黃一兩半去根節牛黃半兩細研硃砂一兩細研水飛過麝香半兩細研龍腦半兩細研上並生用都搗羅為末研了藥都研令勻煉蜜和搗五七百杵丸如梧桐子大每服食前以溫酒下二十丸忌生冷油膩毒滑魚肉羊血犀角丸出聖惠方治風嚲曳手腳不能收攝肌膚頑痹筋脈不利心神恍惚骨節疼痛犀角屑羚羊角屑各半兩牛黃細研麝香細研各半兩天麻白附子炮裂各一兩蟬殼牛膝去苗防風去蘆頭各半兩附子一兩炮裂去皮臍桂心當歸芎藭羌活白殭蠶微炒五加皮各半兩烏蛇肉二兩酒浸炙微黃薏苡仁半兩麻黃去根節硃砂細研水飛過各一兩遠志半兩去心金箔五十片細研銀箔五十片細研仙靈脾道人頭各一兩地骨皮半兩上搗羅為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服食前以溫酒下二十丸漸加至三十丸忌生冷羊血生犀天麻丸治一切風手足嚲曳肢體麻痹不仁及骨節疼痛口面偏斜痰涎語澀心忪驚悸並宜服之犀角鎊一兩天麻酒炙二兩地榆去苗玄參丁香烏頭炮裂去皮臍烏藥木香丹砂研各一兩乳香研龍腦研麝香研牛黃研真珠研琥珀研自然銅火煅醋淬各半兩安息香一兩細研酒化慢火熬綿濾去砂石再熬成膏用麻黃去根節一兩白花蛇酒浸一宿去皮骨炙一兩蠍梢一分炒天南星用牛膽內匱者防風去叉各半兩上除別研膏外為細末再合研令勻將安息香膏更別煉蜜和丸如櫻桃大每服一丸以溫酒或荊芥薄荷湯嚼下丸如梧桐子大二十丸溫酒下亦得當歸散治毒風嚲曳手足不遂身體緩弱或風入五臟精神恍惚多言善忘有時恐怖肢節煩疼頭眩心悶腹滿不食當歸羚羊角屑各三分黃芩川烏頭半兩炮裂去皮臍赤芍藥遠志去心各半兩獨活三分五味子防風去蘆頭芎藭各半兩麻黃一兩去根節秦艽三分去苗桂心石斛去根銼人參去蘆頭白茯苓各半兩黃耆銼半兩五加皮三分石膏一兩杏仁三分湯浸去皮尖雙仁麩炒微黃甘草炙微赤銼半兩上搗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候稍熱服忌生冷豬雞犬肉毒魚滑物天麻丸治一切風手足嚲曳肢體不仁及骨節疼痛口面偏斜痰涎語澀心忪驚悸犀角鎊一兩天麻酒炙二兩獨活去蘆頭人參丁香木香烏藥麻黃去根節各一兩牛膝研龍腦研琥珀研乳香研真珠研麝香研各一分天南星牛膽匱者防風去叉各半兩白花蛇酒浸去皮骨炙三分蠍梢炒一分芎藭一兩安息香一兩酒化研去砂石熬成膏上除研化外為細末再研令勻入安息香膏並煉蜜和丸如梧桐子大每服二十丸溫酒下荊芥湯亦得不拘時候仙靈脾丸治風嚲曳手足麻痹屈伸不得仙靈脾牛膝去苗芎藭各一兩牛黃一分細研麻黃去根節一兩烏蛇肉二兩酒浸炙微黃天麻莽草一兩微炒白附子炮裂各一兩天雄半兩炮裂去皮臍防風去蘆頭獨活去蘆頭當歸一兩銼微炒硃砂半兩細研桂心一兩細辛半兩白殭蠶微炒一兩麝香一分細研上搗羅為末都研令勻煉蜜和搗三五百杵丸如梧桐子大每服食前以豆淋酒下十丸忌毒滑魚肉羊血等獨活散治卒中惡風口噤不能言四肢嚲曳緩弱疼痛風經五臟恍惚恚怒無常獨活二兩白芍藥白朮葛根銼白茯苓防風去蘆頭茵芋細辛甘草炙微赤銼漢防己芎藭酸棗仁桂心人參去蘆頭各一兩五加皮二兩麻黃二兩去根節川烏頭一兩炮裂去皮臍上搗粗羅為散每服四錢以水一中盞煎至五分去滓入竹瀝一合更煎一兩沸不計時候稍熱服側子丸治毒風嚲曳四肢不收或攣急頑痹側子一兩炮裂去皮臍白附子炮裂天南星炮裂白殭蠶微炒漢防己萆薢銼躑躅花酒拌炒乾牛膝去苗芎藭各半兩烏蛇肉酒浸炙微黃天麻各一兩羚羊角屑半兩細研牛黃細研麝香細研一分硫黃細研乾蠍微炒各半兩桂心半兩上搗羅為末研入牛黃麝香等以水煮槐膠三兩更入少熟蜜同和搗五七百杵丸如梧桐子大每服食前以溫酒研下十丸忌生冷油膩毒滑魚肉天南星丸治一切風手足麻痹嚲曳或即腫癢疼痛天南星臘月牛膽匱者三分白芷一兩半麻黃去根節一兩防風去叉一兩半羌活去蘆頭獨活去蘆頭芎藭天麻白芍藥桔梗銼炒細辛去苗葉白殭蠶炒各半兩甘草炙一分半乾薑炮一分龍腦研一錢麝香研一分上除研外為細末和令勻煉蜜丸如杏核大丹砂為衣每服一丸細嚼以薄荷溫酒下不計時候傷寒頭目昏痛肢節疼者薄荷茶下並吃三兩服尤妙小八風散治風虛百病肢體嚲曳不遂人參去蘆頭當歸天雄炮裂去皮臍附子炮裂去皮臍防風去蘆頭獨活各一兩川椒半兩去目及閉口者微炒去汗用天門冬一兩半去心焙乾薑三分炮裂銼山茱萸五味子各半兩麻黃半兩去根節前胡一兩去蘆頭白芷三分莽草半兩微炙上搗細羅為散每服不計時候以溫酒調下二錢忌生冷油膩鯉魚豬肉附子湯治風嚲曳手足不遂身體不能俯仰附子炮裂去皮臍乾薑炮甘草炙防風去叉獨活去蘆頭各一兩半石膏碎白茯苓去黑皮白朮芎藭柴胡去苗當歸酒浸切焙人參各一兩杏仁去皮尖雙仁炒研二十枚細辛去苗葉一兩上銼如麻豆大每服五錢匕水酒共一盞半煎至一盞去滓溫服日三羸弱者只用水煎服羚羊角湯治風嚲曳及癱緩不遂等疾羚羊角鎊一兩半防風去叉半兩防己杏仁去皮尖雙仁炒研各一兩半側子炮裂去皮臍半兩五加皮二兩磁石生杵碎八兩乾薑炮芍藥麻黃去根節各一兩半薏苡仁二兩芎藭秦艽去苗土甘草炙各半兩上㕮咀如麻豆大每服三錢匕水一盞煎至七分去滓溫服日三夜一防風散出聖惠方治風奄忽不能言四肢嚲曳皮肉痛癢不知防風去蘆頭獨活各三兩芎藭赤茯苓當歸葛根銼桂心各一兩麻黃去根節附子炮裂去皮臍各二兩細辛漢防己甘草炙微赤銼各一兩上搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服獨活湯治風嚲曳肢體不能收攝天麻丸出王氏博濟方治中風嚲曳手足不收口眼不正語言謇澀大治筋骨疼痛天麻附子炮裂去皮臍乾蠍全者炒白殭蠶直者炒芎藭牛膝去苗酒浸切焙各一兩乾薑炮甘草炙各半兩上為細末煉蜜丸如梧桐子大每服二十丸溫酒下常服大治筋骨至妙獨活湯治中風手足嚲曳不能言獨活去蘆頭二兩甘草炙桂去粗皮生葛根芍藥栝蔞實各一兩上銼如麻豆每服五錢匕以水一盞半生薑三片煎取一盞去滓溫服日三夜一羚羊角丸治中風手足嚲曳語澀羚羊角鎊一兩犀角鎊三分羌活去蘆頭防風去叉各一兩薏苡仁炒秦艽洗各二兩上為末煉蜜丸如梧桐子大每服二十丸煎竹葉湯下漸加至三十丸姜附湯一名乾薑附子湯治風嚲曳肢體緩弱不相繼續百部散治中風嚲曳攣躄不能起百部一兩烏頭炮裂去皮臍一兩牛膝去苗切酒灑焙乾白朮各半兩上為細散每服一錢匕溫酒調下漸加至二錢匕日三夜一烏龍丸一名大聖丹治中風手足嚲曳口眼喎斜語言謇澀步履不正神效敗龜丸一名敗龜散治中風手足顫掉嚲曳蘇木煎丸出經驗方治中風手足嚲曳或麻痹不仁羌活獨活川芎各一兩附子二兩醋酒浸一宿炮裂去皮臍雄黃二錢研入上別用好大蘇木一兩銼搗碎以米醋法酒各一升銀石器中慢火熬至半升以來濾去滓和上件藥末入臼杵五七百下丸如小豆大粒每服七丸加至十丸十五丸煎開化了蘿蔔根湯下中風手足不遂用海桐皮並金銀煎湯下空心時服三服神效
