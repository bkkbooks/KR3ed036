body:
  text: 卷九十五諸風門風腳軟附論夫腳軟者腎氣不足風濕所乘也腎主腰腳若其氣不足則骨髓虛弱榮衛乏竭重以風濕內攻流注於腳故令膝腕樞紐不利步履無力也方烏頭丸出聖濟總録治風腳膝軟腕樞紐不用烏頭一斤劈破以冷水浸兩宿洗淨去臍不去皮用新黑豆一升與烏頭同煮自早至夜以豆爛為度取烏頭去皮薄切焙乾後與諸藥同杵為末其豆亦同炒別研與末用防風去叉白附子炮裂獨活去蘆頭海桐皮銼羌活去蘆頭桑螵蛸炮製烏藥銼芎藭白頭翁當歸銼焙狼毒烏賊魚骨去甲牛膝去苗酒浸天南星炮裂各二兩威靈仙去苗葉白殭蠶炒各二兩半白花蛇酒浸取肉焙二兩半乾蠍炒一兩半上為細末用前黑豆末醋煮麵糊和拌得所入臼內杵五七百下丸如梧桐子大每日空心溫酒或鹽湯下二十丸透骨丸出聖濟總録治風腳軟不能行步附子一枚重七錢者麵裹炮裂去皮臍草烏頭去皮二兩半蠍地龍白項者炒白殭蠶炮乾蠍全者各三十枚炒五靈脂骨碎補乾者去毛麻黃去根節各一兩以上九味同為末麝香半錢丹砂水銀硝石朴硝各一兩馬牙硝乳香沒藥各一分甜硝一分龍腦半錢以上十味同細研上拌和令勻用飛羅面二兩無灰酒二兩煮糊為丸每一丸重一錢三字以布袋盛掛當風處年深不妨若腳手麻軟每服半丸滴酒研爛用生薑汁一茶匙麝香少許好酒一盞相和溫過早晚各一服五日見效若卒中暗風取兩丸研入生薑汁半盞麝香半分好酒四盞分溫四服初服如一食久下第二服漸見手開即下第三服見遍身汗出即下第四服若口開而不能合不可治仙靈脾散出聖惠方治風腳膝軟弱筋骨緩縱致不能行立仙靈脾天雄炮裂去皮臍石斛去根銼天麻牛膝去苗麻黃去根節各一兩芎藭五加皮萆薢銼丹參桂心當歸防風去蘆頭羌活各三分虎脛骨塗酥炙令黃檳榔各一兩上細羅為散每服食前以溫酒調下一錢忌生冷油膩豬雞肉側子丸出聖惠方治風腳膝軟弱行立不得及補益腎臟強壯骨髓利風毒除緩弱側子炮裂去皮臍安息香各一兩半天麻獨活石斛去根節杜仲去粗皮炙微黃銼鹿茸去毛塗酥炙微黃牛膝去苗附子炮裂去皮臍當歸威靈仙五加皮丹參海桐皮銼各一兩肉桂去皴皮二兩虎脛骨塗酥令黃二兩上為末煉蜜和丸搗三五百杵丸如梧桐子大每服以豆淋酒下三十丸漸加至四十丸空心及晚食前服天雄散出聖惠方治風毒攻腎臟流注腳膝軟弱無力或時疼痛天雄炮裂去皮臍石斛去根銼麻黃去根節赤箭牛膝去苗薏苡仁檳榔各一兩羌活萆薢銼防風去蘆頭赤芍藥當歸木香枳殼麩炒微黃去瓤各三分肉桂去皴皮一兩半上搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓食前溫服之海桐皮浸酒方出聖濟總録治風毒腳膝軟弱行立不得海桐皮五加皮獨活天雄炮裂去皮臍石斛去根桂心防風去叉當歸杜仲去粗皮炙微黃仙靈脾萆薢牛膝去苗薏苡仁生乾地黃各二兩虎脛骨塗酥炙令黃三兩上細銼以生絹袋盛用清酒二斗春夏浸七日秋冬浸二七日每日時時暖飲一小盞常令醺醺不得大醉重者不過兩劑若酒盡旋旋添之以藥味盡即止獨活散治風毒攻兩腳軟弱無力行立艱難獨活石斛去根銼海桐皮銼防風去蘆頭當歸附子炮裂去皮臍羚羊角屑芎藭牛膝去苗五加皮仙靈脾桂心漢防己各一兩上搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓食前溫服忌生冷油膩毒魚滑物烏金煎方出聖惠方治風腳膝軟弱骨節疼痛肢節無力行步艱難黑豆二升茄子根三斤碎研銼以水三斗與豆同煮至爛熟去滓更煎取汁五升入後藥味桂心羌活芎藭酸棗仁微炒防風去蘆頭虎脛骨塗酥炙令黃萆薢銼當歸仙靈脾牛膝去苗各一兩附子炮裂去皮臍二兩上為末入於前二味汁中以慢火煎柳木篦攪勿令住手可一炊時止盛於瓷器中每日早晨以暖酒調下一茶匙日晚再服仙靈脾煎丸出聖惠方治風腳膝軟弱不能步履骨節無力時有疼痛宜服仙靈脾威靈仙牛膝去苗桑根白皮各五兩黑豆一升上五味細銼以水二斗煮至一斗濾去滓再煎至五升入後藥味天雄炮裂去皮臍天麻酸棗仁微炒安息香各二兩肉桂去皺皮虎脛骨塗酥炙令黃各三兩當歸二兩上為末入前煎藥汁中以慢火熬令稠以柳木篦不住手攪候可丸即丸如梧桐子大每日空心及晚食前以溫酒下三十丸忌生冷油膩豬雞肉牛膝飲出聖濟總録治風冷傷中兩足俱軟筋緩不能收攝或兩足手不能舉浮腫者牛膝酒浸切焙乾薑炮草烏頭生用烏頭炮裂去皮臍黑豆炒赤小豆地龍炒樟柳根各一兩附子炮裂去皮臍防風去叉各半兩山慈菰一兩半上銼如麻豆每以藥半兩好酒一大盞貯瓷器內同煎至七分去滓每日早晚旋溫五分服漸加至一盞如覺麻木即減分數以知為度蒴藋煎丸出聖惠方治風腳膝軟弱步履不得骨節疼痛蒴藋葉汁二升海桐皮銼牛膝去苗羌活當歸側子炮裂去皮臍桂心仙靈脾石斛去根銼郁李仁湯洗去皮尖微炒各一兩上為末先以好酒二升和蒴藋汁於銀鍋中熬令稠和諸藥末搗三二百杵丸如梧桐子大每日空心及晚食前以溫酒下二十丸桑枝煎方出聖惠方治風腳膝軟弱桑枝銼二升黑豆一升附子生用銼碎五兩茄子根銼一升以上四味用水三斗煮至一斗濾去滓再煎取五升入後藥末石斛去根銼天雄炮裂去皮臍天麻芎藭牛膝去苗桂心各二兩上為末入前汁中於銀鍋內慢火熬用柳木篦不停手攪候如膏盛於瓷閣中每日空心以熱酒調下一茶匙晚食前再服尤妙海桐皮酒治風冷流於膝行立不得海桐皮五加皮獨活去蘆頭防風去叉枳殼去瓤麩炒杜仲去粗皮炙各一兩牛膝去苗薏苡仁各二兩生地黃半斤上細銼綿裹以無灰酒二升春夏浸七日秋冬二七日每日空腹溫服一大盞日三常令酒氣不絶重者不過兩劑瘥巴戟天飲出聖濟總録治冷痹腳膝疼痛行履不得巴戟天去心三兩五加皮三兩牛膝切酒浸焙石斛去根萆薢甘草炙銼各一兩半防風去叉白茯苓去黑皮各一兩三分附子炮裂去皮臍二兩上銼如麻豆大每服三錢匕以水一盞入生薑一分拍碎煎取六分去滓空心溫服巴戟酒出聖濟總録治風痹腳軟弱急痛行履不能巴戟天生去心牛膝生去苗石斛生去根各二兩蜀椒去目並閉口者炒出汗生薑羌活去蘆頭當歸各三兩上㕮咀如麻豆大以生絹袋盛用酒一斗五升浸每日三度暖服隨性多少旋添酒候藥味薄即止白朮丸治風虛腳弱無力肌瘦不能食白朮牛膝去苗酒浸切焙巴戟天去心菟絲子酒浸別搗各一兩半熟乾地黃焙三兩桂去粗皮一兩上為末煉蜜和丸如梧桐子大空心晚食前溫酒下二十丸漸加至三十丸木瓜丸出聖濟總録治風腳軟膝腕樞紐不用步履不能木瓜大者一枚切去蓋子入硇砂半兩在內卻蓋合蒸熟去皮用附子炮裂去皮臍羌活去蘆頭白附子炮裂木香各一兩沒藥半兩上先以五味搗羅為末與木瓜同搗成劑丸如梧桐子大每日空心鹽湯下二十丸至三十丸附子羌活散出余居士選奇方治風腳軟筋骨緩弱行履不得附子去皮臍檳榔銼芎藭羌活去蘆頭各一兩上為細散每服一錢匕空心日午煎緑豆湯調下萆薢丸治風冷下注腰腳痿弱步履無力萆薢微炒八兩牛膝去苗酒浸切焙四兩菟絲子酒浸別搗二兩上搗細末煉蜜和丸如梧桐子大空腹溫酒下二十丸漸加至三十丸附子丸治風冷腰腳痿弱𤸷痹不仁附子炮裂去皮臍二兩乾薑炮黃耆銼各一兩上為末先以牛乳一升二合慢火煎至六合入藥末慢火再煎可丸即丸如梧桐子大每服空心食前溫酒下二十丸加至三十丸日三服十日後知痛天雄煎丸出聖惠方治風腳膝軟弱筋骨拘急疼痛天雄二兩半生半炮裂去皮臍牛膝二兩去苗躑躅花選其好者以酒浸一宿來日取出於甑內蒸一炊飯久卻熬令乾又入酒中更浸少時更蒸如此三度即止曬乾後即用一兩半上為末以安息香一兩生蜜五兩熬令稠和前藥末令軟硬得所搗三二百杵丸如梧桐子大每日空心及晚食前以溫酒下十丸何首烏丸治風腳軟腰膝疼行履不得遍身瘙癢石髓丸治風內補舉動步履不穩大腑傳送間或冷祕食不美非時呵缺倦怠皆可服進健脾胃助陽氣快胸膈美飲食壯筋骨悅顏色和五臟久服不炎上牛膝一兩天麻半兩續斷半兩人參大防風各半兩巴戟十八銖五味子十銖杜仲半兩附子半兩菟絲子一兩虎脛骨半兩陽起石半兩當歸半兩白朮一兩鹿茸大芎各十八銖上各依法制了碎銼焙乾為細末以西山木瓜二十枚去皮瓤片切用羊筋髓二兩雄羊腰子二枚去筋膜片切好酒半斤細切入青鹽八銖椒末少許好蓯蓉一兩洗切銚內煮令軟沙盆內和研膏用杵牛膝等末至硬軟得所丸如梧桐子大每服五十丸至八十丸空心鹽酒米湯任下皆可日二服四斤丸補治風強腳膝蓯蓉天麻牛膝各一斤共酒五升浸一宿木瓜去瓤一斤上件焙乾為細末煉前浸藥酒如膏用和丸如梧桐子大空心湯酒任下三十丸如浸藥酒少和不盡更添酒煉之活血丹若一邊足膝無力漸漸瘦細肌肉不澤上牽脅肋下連筋急不能行步此由大病之後數亡津液血少不榮氣弱不能運行肝氣虧損肝虛無以養筋肋不榮則乾急而痛亦不能舉乾地黃二兩當歸白芍藥續斷白朮各一兩上為細末酒煮麵糊為丸如梧桐子大溫酒下三十丸漸加至五十丸治風軟腳出本草以丹參酒浸服可逐奔馬治遊風腳手軟痹出本草以人肝藤煮服之亦生研服亦敷病上一名承露仙治風軟腳用龜殼炙之為末酒服之風不仁附論夫風不仁者由榮氣虛衛氣實風寒入於肌肉使血氣行不宣流凝痹結滯皮膚𤸷厚無所覺知內經曰皮膚不榮故為不仁其狀搔之皮膚如隔衣是也診其寸口脈緩則皮膚不仁脈虛數者生牢急疾者死方苦參散出聖濟總録治風皮膚𤸷痹不仁積年疥癬補諸不足苦參粉蒺藜子炒去角石南葉面脂微炙芎藭細辛去苗葉白朮秦艽去苗土白蘞防己芍藥甘草炙遠志去心沙參白茯苓去黑皮人參石膏搗研如粉前胡去蘆當歸切焙獨活去蘆黃耆銼乾薑炮山茱萸各一兩附子炮裂去皮臍防風去叉各二兩蜀椒去目並閉口者炒出汗半兩羚羊角用上一半鎊二兩上拌和再羅為散每服一錢半至二錢匕漸加至三錢匕空腹酒調下須臾以食壓之日再以知為度大八風烏蛇散治風不仁皮膚𤸷麻手足攣急烏蛇酒浸去皮骨炙青葙子防風去叉獨活去蘆麻黃去根節先煎掠去沫焙桔梗炒秦艽去土各一兩一分羌活去蘆頭一兩當歸切焙細辛去苗葉桂去粗皮各三兩芎藭白芷微炒各二兩半白芍藥蒺藜子炒去角人參天麻各二兩附子炮裂去皮臍二兩半上搗羅極細每服二錢匕空心溫酒調下日三微汗為度烏蛇散治頑麻風搔之皮膚不知癢痛烏蛇肉五兩酒浸炙令黃白天麻桂心防風去蘆麻黃去根節白殭蠶微炒苦參銼赤茯苓威靈仙枳殼麩炒微黃去瓤天蓼各二兩羌活躑躅花酒拌令勻炒乾人參去蘆赤芍藥芎藭各半兩白蒺藜二分微炒去刺上細羅為散每服空腹及晚食前以溫酒調下二錢忌豬雞肉烏頭摩風膏治風痛及皮膚不仁筋脈拘急川烏頭生用去皮臍防風去蘆桂心白芷藁本川椒去目吳茱萸白朮細辛芎藭白附子藜蘆莽草羌活各半兩黃蠟五兩煉了豬脂一斤生薑三兩上件藥細銼先以豬脂內鐺中煎之次入諸藥煎令白芷色黃候藥味出盡以新布絞去滓更以綿濾過拭鐺令淨重入膏於鐺中慢火熬之次下黃蠟令消去火待稍凝收於瓷器中每有痛處於火邊熁手承熱取膏摩之一二百遍以手澀為度犀角丸療百病鬼注惡風入皮膚浮淫夜夜流移無有常處四肢不仁牽引腰背腹脹滿心痛逆胸滿不得飲食呼吸短氣寒熱羸瘦夜喜惡夢與鬼神交咳嗽膿血皆可療之犀角屑桂心羚羊角屑牛黃研鬼臼各二分獺肝三分炙雄黃四分研丹砂四分研貝齒十分炙研巴豆三十粒熬去心蜈蚣一枚去頭足炙真珠四分研射干麝香研附子炮各一分上為末蜜和丸如胡豆每服平旦二丸酒飲並得日三忌豬肉冷水生蔥血物蘆筍白花蛇丸治風不仁皮膚𤸷厚搔之如隔衣白花蛇酒浸去皮骨炙乾蠍去土炒仙靈脾天雄炮去皮臍天麻桂去粗皮麻黃去根節鹿角膠炙令燥萆薢各一兩炮桑螵蛸炒茵芋烏頭炮裂去皮臍天南星炮各半兩雄黃研麝香研各一分上細搗羅為末外又用大麻仁三兩為細末入無灰酒慢火熬成膏與前藥末和搗五百杵丸如梧桐子大每服二十丸薄荷酒下不拘時候服羌活散治風不仁手腳𤸷麻疼痛羌活去蘆獨活去蘆防風去叉蔓荊實人參蒺藜子炒去角白茯苓去黑皮芍藥枳殼去瓤麩炒芎藭阿膠炙令燥天蓼威靈仙去苗土各半兩上為末每服二錢匕空心豆淋酒調下溫酒亦得或煉蜜丸如梧桐子大豆淋薄荷酒下十五丸至二十丸白頭翁丸治頑麻風及腰腳疼痛白頭翁去蘆頭蒸五遍焙乾當歸羌活川大黃銼碎微炒苦參銼獨活防風牛膝去苗仙靈脾枳殼麩炒微黃去瓤桂心晚蠶蛾微炒各半兩烏蛇肉二兩酒浸炙微黃上為細末煉蜜和丸如梧桐子大每服食前以溫酒調下十丸漸加至二十丸追風丸治風不仁榮衛滯澀筋脈緩縱萆薢馬藺花骨碎補去毛狗脊去毛各一兩半黃耆銼五靈脂炒楓香脂研地龍去土炒各一兩草烏頭生用二兩半乳香研半兩沒藥研一分上為末米醋煮麵糊丸如梧桐子大每服十丸加至十五丸茶酒任下初服五六丸漸加之八風湯療五緩六急不遂身體不仁下重腹中雷鳴失小便方防風芍藥茯苓各二兩黃耆當歸人參乾薑各一兩獨活四兩甘草一兩炙大豆二升附子大者炮一枚上㕮咀以水一斗清酒二升合煮取三升分三服忌海藻菘菜豬肉冷酒水酢物烏鴉丸出聖濟總録治風虛皮膚不仁頭目昏痛利咽膈解昏倦昏倦烏鴉一隻燒為灰麝香別研一分虎骨酥炙白殭蠶炒防風去叉乾蠍去土炒白附子炮藿香葉烏蛇酒浸去皮骨炙各半兩上除別研外搗羅為末入研者拌勻煉蜜丸如梧桐子大每服十丸加至十五丸溫酒下茶清亦得不拘時候一字散出聖濟總録治風不仁手足𤸷麻及婦人血風頭面虛腫遍身風疥芎藭烏頭生去皮臍麻黃去根節地龍炒防風去叉羌活去蘆頭白附子炮天麻各半兩草烏頭去皮尖半錢上為細散每服一字食後蔥白薄荷茶調下溫酒亦得牛膝天麻丸治風不仁遍身𤸷麻皮膚瘙癢頭目昏倦秦艽散一名升麻湯治榮氣虛為不仁皮膚搔之如隔衣狀天南星丸出聖惠方治手足頑麻風天南星炮裂天麻烏蛇肉酒浸炙微黃赤茯苓各一兩白附子炮裂白殭蠶微炒硃砂細研各半兩羌活三分乾蠍一分微炒上為末入硃砂更研令勻煉蜜和丸如梧桐子大每服食前以溫酒下二十丸忌羊血烏蛇丸出聖惠方治身體頑麻風烏蛇酒浸去皮骨炙令微黃白花蛇酒浸去皮骨炙令微黃各二兩防風去叉細辛天麻獨活肉桂去粗皮枳殼麩炒微黃去瓤苦參銼各一兩上為末煉蜜和丸如梧桐子大每服食前以溫酒下二十丸牛膝散出聖濟總録治風不仁皮膚𤸷痹氣血虛風邪溫痹牛膝酒浸切焙白殭蠶生用天南星生用海桐皮銼各一兩麝香研丹砂研各一分狼毒醋煮銼焙半兩附子炮裂去皮臍一兩上為散和勻再研每服二錢匕熱豆淋酒調下不拘時候烏頭丸出聖惠方治頑麻風川烏頭半斤用黑豆二升水二升煮以黑豆爛熟為度切作片子曝乾天麻黃耆銼當歸銼微炒羌活肉桂去粗皮防風去蘆頭各二兩上為末用生薑自然汁六兩蜜十二兩相攪令勻和丸如緑豆大每日空心以溫酒下十丸晚食前再服茵芋酒療新久風體不仁屈曳或拘急腫或枯焦皆主之茵芋狗脊躑躅花生用烏頭生用附子生用各三兩天雄一兩生用上㕮咀以酒一斗絹囊盛藥浸之冬八九日夏五六日初服半合不知增之以知為度忌豬肉冷水五參散出聖濟總録治風不仁皮膚𤸷麻繞腰遍身似蛇皮黑癮旋生旋沒通身𤸷痹人參沙參丹參玄參堅者苦參各一兩白花蛇酒浸去皮骨炙一兩半上為細末每服二錢匕食前夜臥溫酒調下加至三錢匕摩風膏出聖濟總録治皮膚𤸷痹不知痛癢去風毒龍骨二兩虎骨酒炙三兩當歸切焙桂去粗皮各一兩四味同為末苦酒二升皂莢去黑皮炙為末八兩上為末先將苦酒別取皂莢十挺挼取汁去滓入鐺中煎減半即入皂莢末熬次入前四味候如稀餳入瓷合盛患者旋取揩摩身體附子散一名六味附子湯治中風手臂不仁口面喎斜方見附子湯烏頭丸出聖濟總録治風不仁膝脛𤸷痹兼治皮肉身體諸風烏頭炮裂去皮臍半兩附子炮裂去皮臍浸一兩半麻黃去根節先煎掠去沫焙乾二兩上為細末煉蜜丸如梧桐子大每服五丸加至七丸溫酒下空心午時夜臥各一服若不用防風只生用三味為末麵糊丸如大麻豆大每服三丸至五丸酒下服後不可熱食皂莢膏摩方出聖惠方治身體手足有頑麻風皂莢肥者五梃川烏頭一兩烏蛇肉二兩硫黃三分細研上件藥以酒三升浸皂莢經二宿挼取汁入鍋中同烏頭烏蛇等煎至一升濾去滓更熬令稠離火入硫黃末攪令勻旋取摩頑處即效乳香丸出聖濟總録治風冷榮衛不行四肢疼痛皮膚不仁乳香一分熔過研乾蠍青色緊小者去土炒三分烏頭生去皮臍二兩黑豆同炒以豆汗出為度去豆不用上搗羅二味為末用醋半升慢火熬成膏下乳香末攪勻候可丸如緑豆大每服十丸溫