body:
  text: 卷一百四十五傷寒門傷寒後心虛驚悸附論夫傷寒後虛損心氣不足致多驚悸此由邪熱乘於心也心主於血心主於神血脈亂則神氣不定故令驚悸也又云傷寒病後心氣不足風邪乘之則令精神不寧恍惚驚悸此由憂愁思慮致心氣虛邪氣內乘故神氣不得安定而生驚悸也方白茯苓散出聖惠方治傷寒後心虛驚悸或時妄語四肢煩熱肌體羸瘦白茯苓石膏人參去蘆頭熟乾地黃各一兩半夏湯洗七次去滑黃芩桂心麥門冬去心各半兩遠志去心三分上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓下飴糖一分攪令勻不計時候溫服紫石英散出聖惠方治傷寒後心虛驚悸煩悶及咽喉不利面目忽赤忽黃虛羸少力紫石英細研桂心紫菀洗去苗土白茯苓各一兩麥門冬去心焙一兩半人參去蘆頭黃耆銼各一兩甘草炙微赤銼半兩熟乾地黃二兩上為散入石英和勻每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服人參散出聖惠方治傷寒後心虛驚悸恍惚不安人參去蘆頭茯神去木各一兩陳橘皮三分湯浸去白瓤焙杏仁湯浸去皮尖雙仁麩炒微黃一分上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服聖濟方無棗三枚煎至半盞名人參茯神湯龍齒散出聖惠方治傷寒後心虛驚悸煩熱口乾頭項時疼龍齒一兩子芩防風去蘆頭茯神各三分川升麻大青各半兩人參三分去蘆頭石膏一兩上為散每服三錢水一中盞煎至六分去滓入竹瀝半合攪勻不計時候溫服遠志散出聖惠方治傷寒後心虛驚悸恍惚多忘或夢驚魘及諸不足遠志去心人參去蘆頭龍齒茯神紫石英細研赤石脂當歸銼微炒桂心甘草炙微赤銼白朮白芍藥紫菀洗去苗土防風去蘆頭各一兩麥門冬去心焙一兩半上為散入石英相和勻每服五錢水一大盞入棗三枚煎至五分去滓不計時候溫服茯神散出聖惠方治傷寒後虛羸心氣乏弱驚悸多忘茯神黃耆銼菖蒲各一兩白芍藥人參去蘆頭各一半兩遠志去心三分上為散每服三錢以水一中盞入棗三枚煎至六分去滓不計時候溫服龍齒丸出聖惠方治傷寒後伏熱在心心虛驚悸龍齒人參去蘆頭茯神生乾地黃各一兩遠志去心鐵粉細研各三分半兩防風去蘆頭三分麥門冬一兩半去心焙黃連去須三分馬牙硝細研三分麝香半分細研上為細末都研令勻煉蜜和丸如梧桐子大每服二十丸竹葉金銀湯下不計時候防風丸出聖惠方治傷寒後心虛驚悸精神昏亂煩悶四肢沉重不能飲食防風一兩半去蘆頭茯神一兩半人參一兩半去蘆頭天門冬一兩半去心焙黃連半兩去須豉一合白朮二兩土炒上為細末煉蜜和丸如梧桐子大每服二十丸粥飲下不計時候人參丸出聖惠方治傷寒後心虛驚悸臥起不安吃食減少人參去蘆頭茯神各三分黃連去須一兩麥門冬去心焙一兩白朮三分土炒柏子仁三分去油枳殼三分麩炒微黃去瓤黃耆三分銼甘草三分炙微赤銼陳橘皮半兩湯浸去白瓤焙厚朴半兩去粗皮塗生薑汁炙香熟龍齒三分上為末煉蜜為丸如梧桐子大每服三十丸粥飲下不計時候定志丸出聖惠方治傷寒後或用心力勞倦四肢煩弱心虛驚悸翕翕短氣茯神一兩遠志半兩去心麥門冬一兩半去心焙人參三分去蘆頭熟乾地黃一兩甘草半兩炙微赤銼黃耆三分銼桂心半兩牛膝半兩去苗澤瀉半兩上為末煉蜜為丸如梧桐子大每服三十丸以粥飲下不計時候酸棗仁丸出聖惠方治傷寒後心虛驚悸發即恍惚不定眠臥不安酸棗仁三分微炒枸杞子三分甘菊花三分白茯苓三分人參三分去蘆頭防風三分去蘆頭桂心三分柏子仁三分遠志半兩去心天門冬去心焙一兩半赤石脂一兩龍齒一兩上為末煉蜜為丸如梧桐子大每服三十丸粥飲下不計時候黃耆丸出聖惠方治傷寒後心虛驚悸恍惚不定黃耆銼人參去蘆頭各半兩龍齒一兩茯神三分鐵粉一兩細研金銀箔各五十片細研防風半兩去蘆頭遠志半兩去心熟乾地黃三分上為細散入鐵粉金銀箔都研令勻煉蜜和丸如梧桐子大每服二十丸粥飲下不計時候龍齒丸出聖惠方治傷寒後心虛驚悸神氣不定龍齒一兩人參去蘆頭一兩虎睛一對酒浸一宿微炙茯神一兩犀角屑一兩龍膽一兩去蘆頭鬼臼三分去苗桂心一兩防風半兩去蘆頭遠志去心三分甘草一分炙微赤銼麝香細研一錢上為末入麝香研令勻煉蜜為丸如梧桐子大每服三二十丸不計時候金銀湯下羚羊角丸出聖惠方治傷寒後心肺壅熱背膊煩悶心虛驚悸眼澀口乾羚羊角三分川升麻梔子仁各一兩玄參三分麥門冬去心焙龍齒各一兩半金銀箔各五十片與馬牙硝同研令細茯神一兩半知母一兩防風一兩去蘆頭子芩一兩赤芍藥一兩大麻仁一兩半別研如膏馬牙硝二兩細研上為細末入金銀箔馬牙硝麻仁同研令勻煉蜜和丸如梧桐子大每服三十丸竹葉湯下不計時候人參湯治傷寒病後壅熱心忪驚悸人參三分犀角屑甘草炙黃芩去黑心玄參堅者秦艽去苗土地骨皮各半兩上粗搗篩每服三錢匕水一盞煎至五分去滓下竹瀝一合攪勻食後溫服茯神湯治傷寒後心熱煩悶睡多驚悸茯神去木三分犀角屑龍齒各一兩麥門冬去心焙一兩升麻半兩玄參堅者半兩竹茹一兩芍藥三分馬牙硝一兩半上粗搗篩每服三錢匕水一盞煎至五分去滓下地黃汁一合攪令勻食後溫服麥門冬飲治傷寒後心忪驚悸煩熱口乾麥門冬去心焙一兩龍齒三分山梔子仁玄參堅者各半兩芍藥三分木通銼一兩人參茅根各三分上粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓下生藕地黃汁各一合攪勻食後分溫二服犀角湯出濟生拔萃方治傷寒後伏熱在心怔忪驚悸不得眠睡犀角屑半兩茵陳蒿三分茯神去木二兩山梔子仁半兩芍藥一兩半麥門冬去心焙一兩半生乾地黃焙二兩上粗搗篩每服五錢匕水一盞半入生薑半分拍碎竹葉三七片同煎至七分去滓食後溫服前胡湯治傷寒後驚悸不定前胡去蘆頭茯神去木人參各一兩遠志去心一兩半甘草炙一分上粗搗篩每服二錢匕水一盞同煎至七分去滓溫服不計時候麥門冬湯治傷寒後心虛忪悸麥門冬去心焙茯神去木菊花人參各一兩甘草炙半兩上粗搗篩每服三錢匕水一盞煎至半盞去滓溫服紫石英湯治傷寒後驚悸煩悶虛羸少力紫石英研桂去粗皮紫菀去苗土白茯苓去黑皮麥門冬去心焙人參黃耆銼各一兩甘草炙半兩上粗搗篩每服五錢匕水一盞半入棗三枚擘破同煎至七分去滓溫服不計時候龍骨湯治傷寒後心氣虛悸恍惚多忘或夢寐驚魘龍骨研人參茯神去木紫石英研赤石脂當歸切焙乾薑炮桂去粗皮甘草炙白朮芍藥紫菀去苗土防風去蘆各一兩遠志去心焙半兩上粗搗篩每服五錢匕水一盞半入棗三枚擘破同煎至七分去滓食前溫服茯神丸治傷寒後或用心力勞倦四肢羸弱心忪驚悸吸吸短氣補虛茯神去木麥門冬去心焙熟乾地黃焙各一兩牡丹皮人參黃耆銼各三分桂去粗皮甘草炙牛膝去苗澤瀉各半兩上搗羅為末煉蜜和搗三百杵丸如梧桐子大食前溫酒下二十丸傷寒後夾勞附論夫傷寒後氣血未實臟腑尚虛餘毒之氣猶存淹延時日不瘥肌體羸瘦肢節痠痛壯熱憎寒心煩盜汗上氣咳嗽嘔逆痰涎飲食不消腹中癖塊口乾舌澀毛折骨萎面色青黃氣力乏弱此皆由虛損致成夾勞也又云傷寒瘥後復夾勞者由病人先有夙疾因汗下之後榮衛虛弱氣不復常形體羸劣時有盜汗寒熱不常喘咳痰唾鼻中臭氣飲食不消肢體痠痛面黃頰赤不即治之即致危殆方前胡散治傷寒後夾勞寒熱作時咳嗽盜汗四肢疼痛頰赤面黃心胸不利前胡一兩去蘆頭白蘚皮柴胡去苗桑根白皮銼大腹皮銼黃耆銼訶黎勒皮白朮青橘皮湯浸去白瓤焙各三分半夏二兩湯洗七次去滑甘草半兩炙微赤銼上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服柴胡散治傷寒後夾勞骨節煩疼時有寒熱咳嗽頭目疼痛柴胡去苗貝母煨令微黃白朮半兩人參去蘆頭赤芍藥石膏各一兩黃芩三分知母梔子仁半兩杏仁一兩湯浸去皮尖雙仁麩炒微黃鱉甲一兩炙上為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服熟乾地黃散治傷寒後夾勞骨節疼痛不能飲食四肢少力熟乾地黃一兩黃芩三分白芍藥一兩五味子三分桂心半兩甘草半兩炙微赤銼當歸半兩銼微炒半夏湯洗七次去滑半兩人參半兩去蘆頭上為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服鱉甲散治傷寒後夾勞四肢煩熱骨節疼痛不思飲食時時咳嗽心胸痰壅鱉甲一兩半塗醋炙令去裙襴柴胡一兩半去苗秦艽半兩去苗紫菀半兩洗去苗土桔梗三分去蘆頭麻黃三分去根節知母三分桃仁一兩湯浸去皮尖雙仁麩炒微黃半夏半兩湯洗七次去滑桂心半兩黃耆三分銼陳橘皮半兩湯浸去白瓤焙上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服柴胡散治傷寒後夾勞體瘦少力四肢疼痛心膈痰壅時有咳嗽不思飲食柴胡一兩去苗鱉甲一兩塗醋炙令黃去裙襴白朮三分人參三分去蘆頭天門冬一兩去心桑根白皮半兩銼枳殼半兩麩炒微黃去瓤桂心半兩當歸半兩銼微炒百合三分紫菀三分洗去苗土桔梗半兩去蘆頭款冬花半兩麥門冬半兩去心陳橘皮半兩湯浸去白瓤焙黃芩半兩枇杷葉三分拭去毛炙令黃甘草半兩炙微赤銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服紫蘇散治傷寒後夾勞脾胃氣虛心腹煩悶骨熱憎寒飲食不多咳嗽痰涎頭旋腦悶小便黃赤紫蘇莖葉一兩赤茯苓三分麥門冬半兩去心木香半兩人參一兩去蘆頭陳橘皮三分湯浸去白瓤焙紫菀半兩洗去苗土柴胡三分去苗桂心三分當歸三分銼微炒半夏三分湯洗七次去滑白朮半兩知母半兩桑根白皮半兩銼犀角屑半兩三分黃芩半兩檳榔半兩枳殼三分麩炒微黃去瓤上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服犀角散出聖惠方治傷寒後夾勞煩熱四肢疼痛不欲飲食犀角屑三分赤茯苓三分枳殼三分麩炒微黃去瓤柴胡一兩半去苗白朮三兩鱉甲一兩半塗醋炙令黃去裙襴知母半兩赤芍藥三分甘草半兩炙微赤銼上為散每服五錢以水一盞入生薑半分煎至五分去滓不計時候溫服秦艽散出聖惠方治傷寒後夾勞黃瘦體熱四肢煩疼不欲飲食秦艽一兩去苗人參三分去蘆頭鱉甲一兩塗醋炙令黃去裙襴白朮一兩半夏半兩湯洗七次去滑五味子半兩甘草半兩炙微赤銼柴胡一兩去苗黃芩半兩桔梗半兩去蘆頭麥門冬半兩去心黃耆一兩銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服旋覆花散出聖惠方治傷寒後夾勞胸膈痰壅不思飲食氣攻背膊腰脊痠疼旋覆花一兩半夏三分湯洗七次去滑麥門冬半兩去心知母半兩甘草半兩炙微赤銼赤芍藥半兩柴胡三分去苗人參半兩去蘆頭陳橘皮半兩湯浸去白瓤焙百部半兩赤茯苓三分前胡一兩去蘆頭上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服木香丸出聖惠方治傷寒後夾勞四肢無力脾胃氣弱飲食無味肩背疼痛木香半兩鱉甲一兩塗醋炙令黃去裙襴白茯苓三分柴胡一兩去苗半夏半兩湯洗七次去滑桔梗三分去蘆頭枳殼三分麩炒微黃去瓤五味子半兩陳橘皮三分湯浸去白瓤焙黃耆半兩銼桃仁一兩湯浸去