草一兩炙青蒿子一兩半如無用茵陳蒿上為粗末每服五大錢水二盞烏梅半個兩同以慢火煮至一盞去滓露一宿於發作前一日進一服於發作前一時再進一服即愈傷寒後發豌豆瘡滅瘢痕附論夫傷寒之病發豌豆瘡者皆是熱毒所為其毒氣中於臟腑餘毒之氣衝於肌肉而生瘡疹及其病折則瘡愈而毒氣尚未全散故瘡痂雖落其瘢猶黶或凹凸肉起宜用消毒滅瘢之藥以敷之方鷹糞白膏出聖惠方治傷寒發豌豆瘡瘥後瘢痕不沒宜塗鷹糞白半合辛夷一兩白附子一分杜若二兩細辛二兩上搗碎以酒一升浸一宿入羊髓五兩慢火煎五七沸去滓盛於瓷盒中每用時先以新布揩瘡瘢令熱後以藥薄塗之朴硝膏出聖惠方治傷寒發豌豆瘡初瘥宜塗川朴硝一兩細研如粉豬膽一枚用汁上相和調為膏用摩瘡瘢上勿令動著任瘡痂自落白芷膏出聖惠方治傷寒發豌豆瘡瘥後滅瘢宜塗白芷當歸各一兩雞屎白五兩上用豬脂七兩麻油三兩以慢火煎白芷當歸色黃去滓後納雞屎白攪和煎如膏入瓷器內盛每日塗摩瘡瘢上白蘞膏出聖惠方治傷寒豌豆瘡瘥後滿面瘡瘢久不沒宜塗白蘞三分礬石半兩生用白石脂一分杏仁一分兩湯浸去皮尖雙仁研如膏上為細散次入杏仁膏研令勻後入新雞子白一枚酥二兩相和研為膏入瓷器中盛每夜取塗面上來日以溫漿水洗之豬蹄湯洗方出聖惠方治傷寒生豌豆瘡新瘥後滿面瘡瘢豬蹄一兩川芎藭葳蕤桑白皮白朮白茯苓商陸白芷以上各半兩上細銼先以水二斗煮豬蹄至一斗五升去豬蹄下藥煎至八分去滓每夜洗之白附子膏出聖惠方治傷寒生豌豆瘡瘥後瘢痕不消宜塗白附子密陀僧燒為粉川芎藭白茯苓各半兩上為細散更研令極細以酥調敷瘡瘢上一方有牡蠣栝蔞子膏治傷寒生豉豆瘡瘥後瘢痕赤腫不消宜塗栝蔞子一升湯浸擘取仁細研如膏白石脂一兩搗羅為末麝香一分細研雄雀糞半兩白色者細研上研令勻用菟絲子苗研取自然汁調如膏夜間先煎蔥白湯洗面後塗藥明旦以暖漿水洗之玉屑膏出聖惠方治傷寒熱毒發豌豆瘡瘥後滿面瘢痕玉屑密陀僧附子生去皮臍搗為細末珊瑚以上各一兩上研令細每度以藥末二錢用真牛酥調勻夜臥塗面來日以溫漿水洗之又方出聖惠方鷹糞白一二兩半白殭蠶二兩上先搗殭蠶為末次將鷹糞白同研如粉以白蜜調如稀餳塗於瘢上日二易之又方出聖惠方杏仁一兩湯泡去皮尖雙仁研為膏雞子白二枚上相和調如稀餳每夜塗瘡瘢上至旦以漿水洗之又方出聖惠方雞子七枚煮熟用黃亂髮一兩剪碎上同於銚子內炒令發消盡成油用薄綿濾入瓷盒中盛夜臥時塗摩之又方出聖惠方馬齒莧自然汁五合蛤粉二兩細研上相合和令勻每日塗於瘡瘢上又方出聖惠方升麻二兩白蜜三兩上用水一大盞煎升麻取半盞濾去滓下蜜更煎良久候冷旋旋取塗摩瘡瘢上
