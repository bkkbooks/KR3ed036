豆大亦可已試有良驗白花蛇散出鮑氏方治九瘻瘰癧生於項腋之間寒熱交作或不痛者白花蛇酒浸去皮骨焙乾二兩生犀角半錢青皮半兩黑牽牛半兩半生半炒上為細末加膩粉半錢研勻每服二錢五更糯米飲下已時當下惡物十日再一服忌食發風熱物已成瘡一月有效後用四聖散補之海藻洗石決明煅羌活瞿麥各等分上各等分為末米飲下二錢日三治瘰癧痔漏瘡出本草單方以蟾蜍糞油敷之治瘻瘡根結核瘰癧毒腫出本草單方以射干塗肉四畔漸漸近瘡習習逐病至骨瘡若有熟膿及黃水出者塗之若無膿水有生血及傷肉破者即不可塗塗則殺人治瘰癧鼠瘻瘡出本草單方上以夏枯草初生嫩時採之須浸洗淘去苦水作菜食之治瘰癧瘻瘡及風頑疥癬出本草單方以鱉甲炙燒酒浸服之治癰瘡腫瘻繫結等出本草單方以山慈菰根醋磨敷之治瘰癧成瘻孔者出本草單方上取露蜂房二枚炙為末臘月豬脂和塗孔上即瘥治瘰癧五痔瘻癯瘤瘡根惡腫出本草單方上以石黃空青桂心各四兩乾薑一兩為末鐵片闊五寸燒赤以藥置鐵片上用磁碗以豬脂塗碗底藥飛上得冷即可如此五度隨瘡孔大小以藥加兒屎內孔中以面封之三度根即出也無孔者鐵皮內之轉脈瘻附論夫轉脈瘻者因飲酒大醉夜臥不安多驚欲嘔轉側失枕之所生也始發之時在於頸項脈轉身如振使人寒熱其根在於小腸也方斑蝥白芷丸出千金方治轉脈瘻始發於頸項濯濯脈轉轉苦驚惕身振寒熱此得之因驚臥失枕其根在小腸以斑蝥主之白芷為之佐斑蝥去頭足翅糯米拌炒以黃為度白芷緑青大黃各三兩升麻鍾乳甘草防風地膽去頭足翅糯米拌炒以黃為度續斷麝香礬石各一兩人參當歸桂心各二兩白朮麥門冬各一兩上為細末煉蜜和丸如大豆大酒服十丸日三勿食生菜慎房室百日外臺祕要無大黃桂心麥門冬白朮鍾乳斑蝥丸出聖惠方治轉脈瘻發於頸腫痛寒熱出膿水斑蝥一分去頭足翅糯米拌炒米黃為度人參三分去蘆頭地膽一分去頭足翅糯米拌炒米黃為度當歸三兩川升麻三分麥門冬去心一分焙白朮三分川大黃三分微炒鍾乳粉三分桂心三分甘草一分銼炙微赤防風半兩去蘆續斷三分麝香一分白礬一兩燒令汗盡上為細末後入研了藥令勻煉蜜搗三二百杵丸如梧桐子大每服以酒下十丸日三服連翹散一名連翹丸出聖惠方治轉脈瘻發於頸項間寒熱有膿方見本門寒熱類風瘻附論夫風瘻者由風邪結聚所成或得諸風不即瘥變化而作瘻也其得風者是因瘡遇冷膿汁不盡乃成也其風在經脈者初生之時其狀如腫有似覆手搔之則皮脫赤汁出乍腫乍減漸漸生根結實附著骨間不知首尾後潰成瘻若至五十日不消不潰變成石腫名為石癰久則不治令人寒熱惡氣入腹絶悶刺心及咽項皆腫不早治即死也神效斑蝥丸出聖惠方治風瘻赤腫出膿汁不止斑蝥去頭足翅糯米拌炒以黃為度一分連翹三兩玄參三分烏蛇三分去皮骨酒浸一宿炙令黃漏蘆三分荏子三分空青三分細研燒過川大黃一兩銼碎微炒牛蒡子一兩半微炒黑豆黃一分上為細末入空青研令勻煉蜜合丸搗二三百杵丸如緑豆大每日空心及晚食前夜臥時以溫酒下五丸漸加至十丸露蜂房膏出聖濟總録治風瘻消腫化膿槲皮散出聖惠方治風瘻赤腫化膿水疼痛槲皮一分炙黃玄參一分蟬殼五枚苦參一分銼斑蝥二十枚去頭足翅糯米拌炒以米黃為度白殭蠶四十九枚微炒赤上為細末每日空心以鹽湯調下二錢良久以鹽茶投之小便內當取下惡物赤小豆散治風瘻結腫常出惡膿水蜂窠膏治風瘻結腫常出惡膿水蟻瘻附論夫蟻瘻者由飲食有蟻精氣毒入五臟流出經絡多著頸項濈濈然小腫核細而乃遍於身體也方鯪鯉甲散治蟻瘻鯪鯉甲一兩炙令黃色礬石一兩泥裹炒半日赤足蜈蚣一枚炙令黃色雄雞膊黃皮一具炙乾上為細末以三年好醋調敷於瘡口上治蟻瘻雄黃雌黃各等分上件藥研細敷瘡上死蛇鼠膏治蟻瘻鼠瘻用死蛇腹中鼠取臘月豬脂煎候焦去滓敷之一方用死鼠燒灰為末敷瘡亦可又方用大鮓鮆燒耕垡土令赤以苦酒浸垡土時合壁土令熱以鮆鮓著壁土展轉令熱敷瘡口上鯪鯉甲膏治蟻瘻用鯪鯉甲二七枚燒為末以豬膏和敷瘡上鯉魚鱣魚亦可用之又方用半夏一枚搗為末鴨脂和敷瘡口上一方無鴨脂以水調敷之又方用雄雞糞燒為灰細研敷瘡口上日三度用之鯷鐸塗敷方治蟻瘻用鯷鐸燒灰研細以醋調如糊塗敷瘡口上日三度立即瘥又方用螻蛄以酒研細塗敷瘡口上日三五度即瘥治蟻瘻用水蘇搗碎敷之治蟻瘻孔容針亦有三四孔者方用蝟皮蝟肝蝟心燒灰為末酒服一錢半一方炙黃為末服之治蟻瘻惡瘡上取黃褐鴜鳥五味淹炙食之鴜形如鳩緑褐色聲如小兒吹竽冷瘻附論夫冷瘻者亦是因瘡得風冷久不瘥故成瘻膿汁不絶故為冷瘻也方生肌丁香膏治冷瘻瘡及瘰癧疼痛丁香三分沒藥三分安息香三分麝香一分研細當歸三分乳香三分細研附子三分去皮臍白芷三分桂心三分雄雀糞四十粒蕪荑仁二分黃丹三分微炒麻油一斤上件藥都細銼入油以慢火煎候白芷黃焦色去滓入黃丹更微煎攪勻勿住手膏成收於不津器中頻取貼之一方無安息香白芷丹朱膏治冷瘻及諸瘻瘡丹砂三分細研川大黃一兩雄黃二兩細研苦參一兩黃連一兩去須莽草三分䕡茹一兩礬石三兩細研雌黃三分細研上件藥細銼入臘月豬脂一升二合以慢火煎黃連等藥焦絞去滓再入丹砂雄黃礬石雌黃末更煎攪勻入瓷器中盛好取貼之雄黃膏治積年冷瘻黃水不止雄黃硫黃研細各一分頭髮黃蠟各半兩上用麻油二兩煎熬頭髮熔盡去滓次入雄黃硫黃碎片黃蠟慢火上桑枝頻攪為膏攤生絹上貼用藥先以赤耳草頭煎湯洗或露蜂房白芷煎湯常洗常貼之青黛散治多年冷瘡瘻青黛一分細研麝香一分細研莨菪子一分䕡茹一分上為末都研勻用一捻內瘡孔中後用雄黃膏貼之治冷瘻及諸瘻瘡出聖惠方蜣螂三枚麝香一錢研細松脂一兩地膽一枚上為細末入蜜少許和捻作餅子先淨洗瘡口再貼以瘥為度治冷瘻及疽瘡一切癬數年不瘥者出聖惠方附子一分生用為末硫黃半分細研膩粉一分上件都研勻以生油調塗之甚有效治冷瘻及諸瘻瘡出聖惠方皂莢一兩藜蘆一兩上件藥燒為灰細研漸漸敷之又方出聖惠方硃砂一分砒黃一分上件藥同研令細以粳米飯和為丸如麻子大填入瘡口內旬日便瘥乳香丸出仁齊直指方治冷瘻白淨滴乳香一分牡蠣半分上為細末雪糊糕和丸如麻子大每服三十丸道地川白姜生用煎湯空心送下久瘻附論夫久瘻者是諸瘻連滯經久不瘥或暫瘥後復發或移易三兩處更相應通故為久瘻也方五方帛膏出聖惠方治積年瘻瘡及一切惡瘡救急者五方帛各一分亂髮二兩洗淨黃芩一兩紫菀洗去苗土莨菪子假釣棘針乳香各二兩石鹽一兩黃蠟二兩麝香一兩細研黃丹七兩胡粉二兩生麻油一升松脂一兩與乳香著油同搗水銀一兩並胡粉點少許水研令星盡用上件藥各搗研曝乾將油先入鐺中煉煙少出即下五方帛亂髮用活火煎發帛消盡然後下黃芩等四味良久下松脂乳香二味又攪良久下麝香黃蠟又熟攪次下黃丹胡粉石鹽水銀又微用火急攪勿住手取一碗冷水點著硬即收之每用攤放帛上貼之日二三換截𤷍散出外科精要治年深𤷍瘻瘡黃連半兩去須白蘞白芨黃丹各一兩輕粉一錢龍腦麝香各半錢別研密陀僧一兩上為細末和勻干糝或捻上以膏貼之生肌散出濟生拔粹方寒水石銼滑石烏魚骨龍骨各一兩定粉密陀僧白礬皮干胭脂各半兩上研為細末干糝瘡口上黃耆丸治漏瘡連年不瘥出膿水不止黃耆銼牡丹皮各三分犀角鎊甘草銼炙各一兩玄參惡實炒木通銼各一兩半上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒送下日再服之治久瘻核易三四處皆生瘡孔者出聖惠方烏蛇一兩半酒浸去皮骨炙令微黃蒺藜子三兩曲頭棘針半兩馬齒莧三分牆上者佳頭髮半兩燒灰雄黃一分細研緋帛半兩燒灰上件都搗研為細末以酒調下內瘡中看干即更著以瘥為度平肌散出仁齊直指方治漏瘡久不瘥令露干則可用老狗頭骨露蜂房生髮各存性燒一分新桑白皮半分上為細末入麝香輕粉少許津唾調敷干則糝之露蜂房散出仁齊直指方治年久漏瘡或暫瘥復發或移於別處多孔露蜂房炙黃三分穿山甲炙焦龍骨各五分上為末入麝香少許以臘月豬脂調敷濕則干糝治久瘻移易三四五處皆生瘡孔者出聖惠方蝙蝠糞一兩半白殭蠶半兩雄蠶蛾半兩乳香半兩蜀茶末半兩上為細末敷瘡上以瘥為度久漏方出仁齊直指方上用九孔蜂房炙黃為末以臘月豬脂研敷候收汁以真龍骨降真香節細末入少許乳香內瘡孔中又捷效方出危氏方用信石新瓦上火煅過為末以津液潤紙探子蘸少許推入瘡孔內如瘡孔多不可齊上藥免使害人烏藥膏出聖濟總録治諸瘻久不瘥烏藥二兩為末豬膽三枚上以膽汁和烏藥末令勻以薄綿裹內瘡口日三五度神助散出危氏方治瘻瘡十餘年不瘥檳榔黃連去須上等分為細末先用活鱔魚一條擲於地候鱔魚盤曲以竹針五七枚貫之覆瘡良久取視當有白蟲數十如針著鱔上取去復覆之如此五六度即已用藥量多少覆之一方敷藥明日以干艾作湯投白湯三二錢洗不一月痊愈蓋老人血氣冷必候艾力以佐陽而艾性亦能殺蟲洗瘡一月蟲喘動氣血亦隨之故瘡不可即合則結痛難當實蟲所為也治瘻瘡多年不瘥出於胸前或脅筋腳脛間者無不效方出聖惠方用江淮多年破船上泥縫脂灰不限多少搗羅為末以雞子清和作團用炭火燒令通赤待冷仍前團燒之如此三遍即搗細為末入麝香蜂窠膏治久瘻生九孔者又方出聖惠方用梔子燒成灰細研以羊髓調塗之治遠年漏瘡黍葉裹敷瘡日三五度又方用栝蔞根搗羅為末塗敷瘡上日三五度殭蠶塗敷方治遠年漏瘡不瘥用殭蠶炒搗為末塗敷瘡口以熟艾作炷灸之初癢痛惡膿出後清血出便用蠶末塞瘡口內以帛裹定三奇散出衛生家寶治漏瘡經久不生肌肉臭爛不止麒麟竭黃連去須白礬各半兩上為末敷於瘡上用膏藥寬貼之蜣螂丸出衛生家寶治惡漏瘡經久不瘥惡肉內潰蜣螂蟲自死者一分燒為灰巴豆一枚去殼燒為灰微存性上碾細以津和丸如麻子大內一丸入漏瘡孔內治漏瘡孔成了膿水淋漓經時不瘥用之立驗出衛生家寶降真香三兩雄黃一兩有牆壁者研水飛過躑躅花半兩麝香少許別研上為末用紙捻子蘸上藥紝瘡竅中覺痛即止治漏腮膿水淋漓不止出衛生家寶上用豬蹄殼以鹽封泥固濟燒為灰研末以麻油輕粉調塗瘡口三兩上即瘥
