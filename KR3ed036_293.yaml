body:
  text: 卷二百九十三瘰癧門諸瘻附論夫漏者諸瘻之潰漏也狼瘻鼠瘻螻蛄瘻蜂瘻蚍蜉瘻蠐螬瘻瘰癧瘻轉脈瘻浮疽瘻所謂九瘻也狼瘻者由大怒傷陰氣上而不下所致也鼠瘻者由飲食之間有蟲鼠餘毒所致也螻蛄瘻者因食果瓜蟲啖之所致也蜂瘻者因喜飲水即得蜂毒所致也蚍蜉瘻者因中寒毒腹中臚脹所致也蠐螬瘻者恐懼憂思哭泣不止所致也浮疽瘻者恚結馳思往返變化所致也轉脈瘻者大醉驚嘔轉側失枕所致也瘰癧瘻者則瘰癧諸證論之為詳三因方云狼瘻根於肝得之憂怒鼠瘻根於胃得之食鼠毒螻蛄瘻根於大腸得之食果蜂瘻根於脾得之飲流水有蜂毒蚍蜉瘻根於腎得之食中有蚍蜉毒蠐螬瘻根於心得之喜怒哭泣浮疽瘻根於膽得之思慮瘰癧漏根於腎得之新沐發轉脈瘻根於小腸得之驚臥失枕此等因證文義不明未知所始若以理例較之怒根在肝鼠毒在胃食瓜果在大腸蜂水在脾姑且通俗易曉如轉脈瘻因驚根當在膽卻云在小腸浮疽瘻因思慮根當在脾卻云在膽瘰癧因沐發亦不當在腎名義不通似難考據又況哭泣得蠐螬之名思慮得浮疽之名此尤不可曉也其外更有風瘻冷瘻蠍瘻蟻瘻蜣螂瘻蚯蚓瘻蝦蟆瘻等名狀不一諒皆出於土俗隨象命名耳難以考據治法觀其未著於肌肉而外為膿血者從本引末可使衰去針之灸之敷之角之從其所因宣通本臟皆有成法甲乙針經寒熱瘰癧論黃帝問曰寒熱瘰癧在於頸腋者皆何氣所生岐伯對曰此皆鼠瘻寒熱之氣也稽留於脈而不去者鼠瘻之本皆在於臟其末上於頸腋之間其浮於脈中未著於肌肉而外為膿血者去易問曰去之奈何對曰請從其末引其本可使衰去而絶其寒熱審安其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已決其生死法反其人目視之其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此赤脈不下貫瞳子者可療大抵外傷四氣內窘七情與夫飲食乖常染觸蠢動含靈之毒未有不變為瘻瘡穿孔一深膿汁不盡得冷而風邪並之於是涓涓而成瘻矣漏喜發於項腋亦喜發於陰僻肛門之間療治失時即生寒熱不特瘻能為漏凡癰疽諸發隨所在處苟有宿膿敗肉朽骨停蓄其間皆一切漏瘡之萌櫱也聖惠云瘻病初發之由不同至瘻成於狀亦異病源所載復有三十六種經方不依次第顯其名目也又有蜣螂蚯蚓等諸瘻非九瘻之名此即應是三十六種瘻之數也但瘻病之生或因寒暑不調故血氣壅結所作或因飲食不節狼鼠之精入於臟腑毒流筋脈變化而生皆能使血脈結聚寒熱相交久則成膿而潰漏也其生身體皮肉者亦始有結腫與石癤相似所可異者其腫之中按之壘壘者有數核喜發於頸邊或兩邊俱起便是瘰證也亦發兩腋下及兩顳顬之間初作喜不痛不熱若不早治即生寒熱也所發之處有輕重重者有二一則發口上齶有結核大小無定或如桃李大此蟲之窠止在中發口下無有核結而穿成瘡又蟲毒之居或縱橫無定故瘻發身體亦有數處其相應通者多死治法用祛寒濕散風冷為急收水次之生肌又次之藿香厚朴半夏橘皮蒼朮細辛川芎白芷以官桂乾薑一半佐之此足以祛寒濕散風冷矣然近年漏者色則淡紅或帶微腫或留小核久則上而槁白內而黑爛淫蟲惡臭生焉近者不過前藥數品而久者復其元陽亦當以數品加減而用之如其不當用而輕用又恐熱氣乘虛變移結核夤緣相通而孔竅為尤甚若夫收水一節蓋水屬腎也腎虛不能傳道而後水溢於腎水溢則滲漉於漏瘡行腎之水無如黑牽牛取米入豬腎慢火煨熟隨以溫酒下之則借腎入腎一縱一擒兩得其便惡水既泄不復淋漓繼以當歸黃芩川芎官桂川續斷葫蘆巴等修治細末佐以發灰空心溫酒調下仍以安腎丸山藥丸兼而濟之庶幾腎得所養真元凝合夫然後以龍骨牡蠣人齒犬牙加之血竭乳麝發灰內外相維生肌必矣然新肉方生又當以胬肉豬蹄米飯為養不維滋味益腎而陽明之生肌肉亦藉穀氣以充之此則自本自根之論也凡項邊腋下先作瘰癧者欲作瘻也宜禁五辛酒面及諸熱食凡瘻者似石癰瘰癧纍然作癧子有核在兩頸及腋下不痛不熱治者皆煉石散敷其外內服五香連翹湯下之已潰者如治癰法諸瘻結核未破火針針之結核中無不瘥也內經云陷脈為瘻留連肉腠脈得寒即下陷凝滯肌肉故曰留連肉腠肉冷亦能為膿血故為冷瘻須用溫藥陷脈散專治瘻瘡及二三十年癭瘤或大或小如杯盂經久不瘥致有漏潰令人骨肉消盡或堅或軟或潰令人驚惕寐臥不安體中掣痛愈而復作者宜用之濟生方云稽云瘻瘡當探其深淺渠在北地時有一人害瘻瘡於脅間稽以榆皮細枝刮去皮取線以綿裹其尖以線牢系之以榆皮探瘡中之穴乃自脅而達於腰在皮膚之間遂於病者腰間以針決破用追毒丹三粒納於瘡中三日即潰而脅間之漏遂止其膿悉自腰間針孔中出膿盡則肌肉遂愈即服狗寶丸敷烏龍膏乳香膏生肌散並如治癰疽法方蝟皮散出聖濟總録治諸漏蝟皮半枚炙焦蜀椒去閉口者去子炒出汗當歸切焙露蜂房炙焦地榆醋炙各三分斑蝥去足翅糯米炒黃蛇蛻銼炒烏賊骨去甲葛上亭長去頭足翅糯米拌炒各半兩鯪鯉甲炙焦四兩䕡茹一兩細辛去苗葉半兩樗雞四枚四兩蜈蚣去黃足炒一枚蜥蜴去頭足炙一枚薏苡仁乾漆炒煙出用蒺藜子炒去角桂去粗皮漏蘆去蘆頭木通銼附子炮製去皮臍牡丹皮龍膽土瓜根各三分鶴骨酒炙貍骨酒炙雄黃研細蛇床子大黃銼炒苦參各一兩半上為細末每服二錢半空心溫酒調下日曉再服漸加至三錢半治九瘻方出千金方蝟皮半枚鯪鯉甲樗雞各四枚蜥蜴蜈蚣各一枚蜀椒附子當歸蜂房地榆桂心通草乾漆牡丹薏苡仁蒺藜子漏蘆一作藋蘆龍膽一作龍骨土瓜各二分斑蝥四分蛇床子苦參大黃雄黃蛇蛻䕡茹細辛各二分鶴骨六分上為末每服五分溫酒調下以知為度日二服治九瘻方出千金方空青商陸知母貍骨桔梗防風荏子礬石黃芩白芷芍藥甘草生雄黃白朮礬石地膽斑蝥雌黃各等分上為末煉蜜丸如豆大每服三丸三十日知四十日愈六十日平復百日內戒房事一方為散醋調服一刀圭日三老少減半服續斷散出仁齊直指方治漏活血益腎氣續筋脈榼藤子去積麻炙當歸川芎川續斷洗曬黃耆微炙葫蘆巴煅紫荊皮生乾地黃洗曬牡蠣粉各半兩木香辣桂各三錢甘草炙二錢上為末每服二錢空心溫酒調下或加發灰佐之溫解散出仁齊直指方治濕散漏瘡風冷藿香厚朴制半夏橘皮蒼朮細辛川芎白芷各二分辣桂川白姜生甘草炙各一分上為散每服三錢水一盞生薑棗子煎服蝟肝膏出聖濟總録治諸癧癭遍腫堅硬或潰膿血不絶蝟皮炙熟二兩芍藥芎藭細辛去葉各半兩牛脂五錢當歸切焙蠟黃連去須黃芩去黑心松脂各一兩上除牛脂蠟松脂外搗為細末先熬脂令沸下蠟松脂銷熔即下諸藥末攪令勻以瓷合盛塗瘡上日三度換陷脈散出三因方治漏瘡及三二十年癭瘤或大如杯盂久而不瘥致有漏潰令人骨肉消盡或堅或軟或潰令人驚惕寐臥不安體中掣痛愈而復作乾薑炮琥珀研大黃附子炮去皮各一兩丹參三錢石硫黃研白石英鍾乳粉研烏賊魚骨研各半兩上為末貯以瓷合韋囊勿令泄氣若瘡濕即敷無汁即煎豬脂和敷之以干為度或死肌不消加芒硝二兩益佳一法用胡燕屎一枚芫青丸出千金方治一切瘻斑蝥四十枚豉四十九枚芫青二十枚生大豆黃地膽各十枚蜈蚣一條半犀角牛黃各棗核大上為末煉蜜和丸如桐子大每服二丸須臾多作酸漿粥冷飲之病從小便出尿盆中相視如有蟲形狀又似膠汁此病出也間日一服飲粥如常小弱者隔三四日候無蟲出瘡漸瘥特忌油膩一切器物皆須灰洗乃作食一方以溫酒服之一方虛悶者可煮食蔓菜羹後仍作二十日將息便不須服麝香散治漏瘡麝香研突厥白蜣螂密陀僧研石灰研青蒿心膩粉硫黃研各半兩上搗研拌勻先以鹽漿水洗瘡用散子填滿瘡口以帛縛定三兩日若有惡物除去依前換藥如無不用換不過三兩次即瘥葛上亭長丸出聖濟總録治諸漏葛上亭長地膽斑蝥三味並去頭足翅糯米炒各二十枚鼠婦六十枚炙衣中白魚四十枚真珠研各一分檳榔銼二枚雄黃研上為末煉蜜為丸如桐子大每服三錢空心溫酒下日晚再服漸加五丸芫青散出聖惠方治瘻有九種雖久不瘥不過此方芫青四十枚去頭足翅熬海藻昆布各八分並洗雄黃研八分貍骨炙三分牡蠣煅四分地膽二十枚熬青木香三分上為細末酒服一錢匕日二服病從小便出如爛筋忌生冷麵食豬肉陳臭等物桂附丸出三因方治氣瘻冷瘻諸瘡附子炮製米醋中浸再炮淬三五次去皮臍桂心厚朴薑製粉草炙白朮各一兩木香一分乳香二錢別研上為細末煉蜜為丸如桐子大空腹米飲下二三十丸青金錠子出外科精要治諸惡瘡膿出不快及多年疳瘻瘡愈而復發白丁香銅青硼砂粉霜各五分輕粉一匙龍腦一匙麝香一匙上為細末麵糊為丸捻作錠子每用紝入瘡口中膿水出之甚快治漏瘡滑石輕粉赤石脂海螵蛸膩粉乳香明礬上各等分研細末以筒子吹藥入漏孔內一夜再用耳鑷子取出孔內敗肉再用荊芥湯洗淨仍復如前用藥天靈蓋膏出聖惠方治一切瘻瘡天靈蓋一分淨洗塗酥炙黃虎下頷骨一分炙黃臘月豬脂四兩附子一分炮炙去皮臍人參一兩去蘆頭鐵精一分川烏頭一兩炮製去皮臍上為細末用豬脂和令稀稠得所四畔塗之不得侵瘡口麝香丸治漏瘡紝瘡麝香研石膽研膩粉研杏仁去皮尖雙仁炒各一分香鼠一枚去腸胃洗淨炙乾巴豆一粒去皮心膜出油盡上為末用麵糊和丸如黍米大紝在瘡內一日一二次通治諸瘻方斑蝥一枚一方云三分去頭足翅杜蘅枳殼根酸棗根虎薊根貓薊根各一把上搗細末蜜和丸每日一服加棗一枚以丸著瘡口中漏瘡方真龍骨蜂房炙黃各三錢黃丹煅降真節五倍子枯骸骨瓦煅各一錢上為細末敷之凡惡核漏瘡並戒怒氣不然核大而漏則水多也安息膏出存仁方治膿水不絶骨中疼痛成漏安息香花乳石火煅紅血竭乳香各半錢麝香減半上為細末用蠟少許入麻油些小同熔開將藥捻作米粒大依前方看大小深淺逐件屑入藥於瘡孔中以滿為度藥透內從內生肉一二日退出一粒漸生肉漸退出出盡則瘡中自然平復其功效如神如瘡口冷痛淺闊只用少許干敷治漏瘡木香丁香乳香麝香研各三錢黑牽牛頭末上分作十服每服烏雞子一個去其黃用白調藥再入雞子殼內用頂蓋頭紙糊定於飯甑上蒸熟取出細嚼溫酒下之日進一服空心下未效再服即愈斑蝥散出聖濟總録治諸漏斑蝥七枚去頭足翅糯米拌炒真珠研桂去皮水銀與衆藥研零星蓋各半兩葛上亭長去足翅糯米炒七枚上為末每服半錢匕午後空心米飲調下小便有所出便瘥乳麝雲母膏出仁齊直指方治漏瘡有效穿山甲浸一宿去肉用一百片真蚌粉四兩同炒候香熟起炮出粉以甲為末上入麝香末一錢夾雲母膏十五貼為丸如桐子大每服三十丸溫酒下後以鹿角膠調鹽酒服神授丸生地黃膏出仁齊直指方治漏通用露蜂房炙黃五倍子木香各三錢滴浮香二錢輕粉一匙上為細末用生地黃一握搗細和為膏攤生絹貼瘡蛇蛻散出仁齊直指方治漏瘡血水不止蛇皮洗焙焦五倍子龍骨各一分川續斷洗酒炒三分上為細末入麝香少許唾津調敷人牙散出仁齊直指方治漏瘡惡瘡生肌里干則可用人牙油發二味燒存性雄雞肉各等分上為末入麝香輕粉少許濕則干糝干則麻油調敷生肉膏出肘後方療瘻楝白皮二兩鼠肉二兩薤白三兩當歸二兩生地黃五兩上五味以臘月豬膏三斤煎薤白色黃成膏敷瘡孔上令生肉也斑蝥散出千金方治一切瘻及瘰癧生於項上結腫有膿並皆治之斑蝥十枚去頭足翅糯米炒黃為度真珠半兩細研蝟皮半兩炙黃雄黃一分細研上為細末每日空心溫酒調下半錢午後再服日三白花蛇散出三因方治九瘻及瘰癧發於項腋之間憎寒發熱或痛或不痛白花蛇酒浸軟去皮焙乾二兩犀角半錢黑牽牛半兩一半生一半熟炒青皮半兩上為末每服二錢膩粉半錢研勻五更糯米飲調下以利下惡物為度十餘日再進一服可絶根源如已成瘡一月可效忌發風壅熱物治一切瘻出千金方斑蝥三十枚雄黃桂心犀角各一兩上為末溫酒一錢匕調下日再服病當從小便出鍛落鐵屑膏出千金方治一切瘻方鍛落屑虎糞狗頰車連齒膏炙鹿皮合毛燒為灰各等分上為末以豬膏和內瘡中須臾即易日五六度一方無鹿皮有鹿角治漏瘡胭脂血竭輕粉各一錢麝香半錢上為末干敷之又方五倍子一兩青黛臘茶各半兩麝香少許上為細末於瘡上干糝或用生油調敷輕粉少許尤妙芫青散出聖濟總録治諸瘻腫芫青斑蝥葛上亭長三味並去足翅糯米炒各一枚桂去粗皮一兩上為散每服半錢匕空心酒調下日晚再服更宜灸陽明絡脈在肩前申頭二寸陷中有青脈至上向臥交兩臂勿令開隨其年之老少乃夾取之而灸即瘥治諸瘻涓涓出膿血日夜疼痛不止漸加羸瘦宜服此方出千金方赤小豆白蘞牡蠣燒赤細研黃耆各等分上為散每服三錢匕酒一盞半煎至一盞去滓不拘時候黑靈散出仁齊直指方治漏瘡通用露蜂房銼二分牡蠣粉虢丹硫黃研各一分上同炒令煙盡為細末入發一分麝香少許拌和敷患處麝能引藥透達亦殺蟲鐵屑膏出仁齊直指方治露干漏瘡可用鍛落鐵屑半兩鹿角燒灰一兩真輕粉一錢狗頭連齒骨炙黃一兩上為細末用豬脂敷調熏漏瘡方出仁齊直指方艾葉五倍子白膠苦楝根等分上銼如燒香法置長桶內坐熏瘡處角鷹散出仁存方角鷹屎乳香蔥白上等分為末先用鹽水洗瘡口看大小以燈心探入瘡口隨其深淺納藥入明日骨內蟲及惡水自出不過兩次治一切漏瘡惡瘡能生肌止痛出余居士選奇方人牙不拘多少燒過麝香各少許上都研勻濕則干糝干則用生油調敷藜蘆塗敷方出聖惠方治諸漏浮核不盡及諸惡瘡癰疽息肉在於肌膚內者藜蘆以雞子三枚取白塗炙令乾䕡茹雄黃研各一兩上研為細末塗敷息肉日上五度即瘥敷瘡上不得入眼治漏藥出御藥院方獨角仙一個火去殼河南出者佳甜葶藶砒各半錢同研上研細煉蜜為錠子每用臨時覷瘡口大小旋捏作餅子塞在瘡口內其蟲俱出即時見效斑蝥丸出聖惠方治一切瘻方斑蝥四十枚去頭足糯米拌炒令米黃為度地膽三十枚去頭足翅糯米拌炒令米黃為度蜥蜴三枚炙上搗千杵蜜和丸如大豆每二丸空心臨晚溫酒下神驗伏翼糞丸出聖惠方治一切瘻瘡及治久瘻伏翼糞四兩微炒斑蝥三分去頭足翅糯米拌炒令米黃皂莢子一兩炒黃一作皂莢花上搗為細末煉蜜和丸如桐子大每日空心以莢白皮塗酥炙微黃搗末煎湯下一丸服至三丸病根並從小便中出馬齒莧膏出聖惠方治一切瘻馬齒莧乾者臘月燭燼各等分一作臘月鼠灰上為末以臘月豬脂和其瘡先以暖泔清淨洗拭乾然後以藥敷之日三又方出千金方干牛屎幹人屎各等分上為末先用綿冪瘡上綿著屎蟲聞屎香即出若癢即舉綿去之更別取屎綿著如前蟲盡乃止蜂窠膏出千金方治瘻作瘡孔治瘻心胸以下者方松脂武都雄黃各三兩上為末和塊刀子刮為散飲服一方寸匕日三服不瘥再合附子塗敷方治漏瘡晝開出膿夜復合附子一枚搗末鯽魚一個去肚腸上將附子末納魚肚中滿以泥固濟炭上火燒通赤取出去泥研細為末冷敷瘡口內日用三五次以瘥為度伊蘭草塗敷方治漏瘡伊蘭草七葉狗頭骨三兩燒過上為末塗敷瘡口內日一換之以瘥為度巴豆塗敷方治漏瘡巴豆一分去心皮出油盡用肥棗十枚去核皮上研細以水一斗煮稀稠放布中絞出取汁塗敷瘡上日一次地鱉散治漏瘡乾地鱉末麝香各研少許上研勻乾摻或貼隨乾溼治之蝕瘻藥生油發燒留性四錢白芨一錢上為細末摻敷之治瘻方上用槲木皮長一尺闊六寸去黑皮細切以水一斗煮取五升去滓納白糖十挺煎取一升三分服以銅器吐出看視之病可瘥矣治一切瘻出聖惠方用死蛇白礬各一兩燒灰細研敷之又方螻蛄一十四枚燒為灰研如粉上以雄豬脂和作膏著瘡中治一切瘻出千金方用煉成松脂末填瘡孔令滿日三四度七日瘥大有神驗又方出千金方用霜下瓠花曝乾為末敷之洗漏瘡方出危氏方治漏瘡孔中多有惡穢常須避風洗淨用露蜂房白芷煎湯洗或用大腹皮苦參煎湯洗如洗畢俟水出拭乾先用東向石榴皮曬為末乾摻以殺淫蟲少頃敷藥即愈苦瓠方出千金方治一切瘻及蟻螻瘻大妙用苦瓠四枚大如盞者各穿一孔如指大置湯中煮十數沸取一竹筒長一尺一頭內瓠孔中一頭注瘡孔上冷則易之數遍止治一切瘻出千金方用煮鹽花以面擁病上內鹽花面匡中厚二寸其下桑葉三重藉鹽俟冷熱得所可忍冷則無益熱則破肉一日一度俟瘻癧根株勢消則止若已作瘡者搗穄谷為末粉之一方用鹽面燒灰敷之槲皮煎出千金方治一切瘡瘻用槲北陰白皮三十斤銼碎以水一石煮取一斗去滓煎如糖又取毛廁上雌雄鼠糞各十四枚燒令汁盡為末內煎中又溫酒一升投煎中合攪之羸人服五合當有蟲出治一切瘻出千金方用搗土瓜根敷之燥則易不拘時節杏仁塗膏出千金方治一切瘻用死蛇去皮肉取骨為末和封瘡上生油調方得大痛杏仁研膏摩之一方死蛇和臘月豬脂燒灰為末內孔中一方單用死蛇灰醋和敷一方治蛇瘻用蛇蛻皮燒灰臘豬脂和封之又方出千金方用燒死蜣螂為末醋和塗乾摻亦得一方用鹽湯洗瘡塗敷一方蜣螂屎為末敷之治一切瘻方出千金方用故布裹鹽如彈丸大燒赤為末酒調服又方出千金方用白馬屎絞取汁每服合水合屎取汁亦可又方出千金方用豬脂一升酒五合煎沸頓服一方用臘豬脂塗敷瘡二次用紙貼之治一切惡瘻中冷應肉方出聖惠方用正月雄狐屎陰乾搗末汲水和服一錢食前服治一切冷瘻方出聖惠方用所吐蛔蟲燒為灰先用甘草湯洗去瘡然後著灰無不瘥者須慎口味治膿瘻方出聖惠方用桃花末以豬脂合封之佳治漏瘡用嚼五倍子和血竭末塞之治脅下生漏瘡如牛眼之狀膿血不止用鹽少許安白牛耳內然後取耳中垢以敷瘡上即瘥如不用鹽牛耳不癢即難取垢治漏瘡口子不幹用蝦蟆肝不見水拭乾用銀篦子觸碎搽入口子內外用尋常膏藥貼之久之即干其肝肉即變為好肉啄酒散治瘻有頭出膿水不止治漏方上以巴豆用青紅紙各一張拭去油研麝香紝入瘡內少許卻用紅紙作捻子蘸藥末入瘡口內填滿瘡孔如四邊有紅點是漏瘡未發卻用銅箸或銀叉尖按破用前藥搽之後用黃連黃丹龍骨雄黃四味封口七八日可治漏瘡用多年海船底土泥石灰為末以烏雞子清調火煅為末敷之自然生肌提出元藥朝生暮落花敷方治漏瘡用朝生暮落花陰乾為末取塗敷瘡上日三次雞子塗敷方出肘後方治諸漏亦治鼠瘻用雞子三枚蒸熟去殼白取黃炒黑色先用鹽湯洗瘡後塗日三五次即愈一方治下血不止肌體黃瘦四肢無力宜服此方又方用取新生鼠屎一百日以來者收置密器中取塗敷瘡口日二度即瘥豬腎酒治通行漏中惡水自大腸出用牽牛碾細去皮取末一分入豬腎中以綿扎青竹葉包用慢火煨熟空心溫酒嚼下治瘻著口裡用取東行楝根細銼水煮濃汁合之數內吐卻咽治瘻瘡用鴛鴦肉以清酒炙食之則美麗又主夫婦不和作羹臛私與食即相憐愛又方治諸瘻瘡喉嚨痛及喉痹並宜煎服用通草或礬亦得急含之一方治項上瘤漏用通草根煎服治瘻有九種不過此方用芥子搗碎以水及蜜和滓敷喉上下干易之治瘻用鯉魚腸切作五斷火上炙之洗瘡拭乾以腸封之冷即易自暮至旦干止覺癢開看有蟲出即瘥效驗方療瘻久不瘥用牡蠣數兩搗之湯和適寒溫取一升許敷瘡上冷易經宿者佳生肉膏療瘻用桑新灰三升水四升淋之復重淋之取三升石灰熬令黃內灰汁中以兩重帛裹絞去滓更煎煎去二升勿用急火煎隨瘻孔深淺初時作散服而瘥孔若深四寸新藥與孔里薤白使糯安藥薤白入藥孔里若深四寸隨瘻根而灸兩處四十壯切勿灸瘻孔隨深淺去膿散與膏安著瘡孔里十五過少遷延日月取瘥肉滿膿亦斷神妙無比通治諸瘻方上以八月多取斑蝥蟲即內苦酒中半日許曝乾使取六七枚著銅器中蒸火上熬令熟搗作屑巴豆一粒去皮熬之又取黃犬背上毛三七枚亦熬作屑好朱一錢五分匕都合好以苦酒頓服之蟲當盡出若一服未效先時可預服三兩劑後日服遠不過三兩劑可瘥又方若先著下部邊或上出耳後頸項諸處者苦參切五升以苦酒一斤浸三四日宜服一斗亦如之以知為度不過三四度必瘥槲皮膏療瘻用槲白皮切取五升以水八升煮令冷絞出滓重令成膏日服半盞漸加至一盞許亦敷瘡上無忌患瘡唯宜煮飯苜蓿鹽醬又不得多食之療諸瘻方用葶藶子搗細羅取加白蜜和丸每於著藥先溫泔洗著瘡孔中以丸內之若塞以物道開日三度瘡痛是瘥候勿停藥又方先以泔清溫洗以綿拭之取葵葉微火暖貼之瘡出膿用二三百藥膿出盡即生肉忌雜物諸魚蒜房事治瘻方用桃葉枝煎湯淨洗瘡即內瘡孔中大有效驗治諸惡瘻方用杏仁二兩去皮以水研取汁每二合溫服一方治一切瘻治諸瘻用甜瓜根搗篩為末敷之至瘥慎口治石瘻兩頭出者其壯堅實令人寒熱方用大錍針破之次用鼠粒葉二分為末和雞子白一枚封之又方用搗槐子和井花水封之治蜣螂瘻方用黑牛屎燒灰臘豬脂和敷之先用鹽湯洗瘡一方用干牛屎為末敷之癢即撥去根厚封瘥乃止一方用熱牛屎塗之數易應有蜣螂出亦治鼠瘡治蚯蚓瘻方雞屎蚯蚓屎上為末用牡豬下頷髓和敷之治蠍瘻五六孔皆相通者方用搗茅根汁著孔中又方用半夏搗篩為末以甲煎調塗一分治蝦蟆瘻方用五月五日蛇頭及野豬脂同水衣封之甚佳治蚯蚓瘻用胡粉不拘多少以豬脂和調塗摩瘡上日再塗即瘥治蛙瘻螲蟷瘻方用取母豬屎燒灰臘月豬膏和敷之當出蟲如雀形溫經丸治陷脈瘻厚朴薑製官桂去皮白朮炙甘草炙乾薑炮木香各一兩附子一兩醋浸炮淬七次去皮臍上為細末煉蜜和丸如桐子大每服三十丸食後米飲湯下鴨脂膏治蚯蚓瘻鴨脂三兩胡粉三兩巴豆去殼研去油盡半兩上先熔脂入二味調如膏每日三五度塗瘡上即瘥內瘻方用黃皮白皮搗為丸綿裹內下部中良效又方治瘡有漏孔即以桑蟲五枚焙乾末糝之即愈治一切漏瘡方甘草草果上等分碎切煎湯洗瘡口又方馬骨敗龜殼各等分上為細末用麻油調敷瘡口如藥不細則瘡疼又方皂角刺天蘿乾者各等分上燒留性為細末加燒酒調下用大箸挾燒服三錢治瘻用馬莧草搗揩之治瘻以紫荊木煮汁服之療下瘻上取鼠尾草濃煮取汁令作丸服之亦用作飲治毒腫下瘻上以紫珠草汁服之療諸瘻瘡及妒乳癰腫上以白狗骨燒屑敷之治瘻瘡及溪毒疔腫出根上以狗屎和臘月豬脂敷之治諸蟲瘻惡瘡上取木通花上粉內瘡中甚良治瘻上煎桃根枝湯淨洗瘡孔大效治瘻瘡上以壁錢蟲滴汁敷瘡上治惡瘡瘻上以斑蝥去頭翅足炒末敷之治惡瘡瘻以敷絡回和百丈青雞桑灰等為末敷瘡瘻治癰腫疽瘻瘰癧以毛蓼杵碎內瘡中引膿血生肌亦可煮湯洗瘡口治疽瘻惡瘡以楊楂木葉水煮汁洗瘡立愈治瘡瘻以鱔魚斷取血塗之治瘡瘻上取黃藥根研服之亦可塗瘡上治瘻瘡以多年鵲巢燒灰敷之良治風腫瘻瘡以驢屎熬尉之狼瘻附論夫狼瘻者由寒暑不調飲食有毒或大怒氣上不下之所生也始發之時在於頸項有根出缺盆上轉連耳本其根在肝也方神效蝟皮散治狼瘻出膿水不絶寒熱肢節煩疼蝟皮一枚炙黃川椒三分去目及合口者微炒出汁附子三分炮製去皮臍當歸三分銼微炒露蜂房三分微炒地榆三分銼木通三分銼苦參一兩銼斑蝥半兩去頭足翅以糯米拌炒米黃為度鯪鯉甲四枚炙令甲黃桂心半兩細辛半兩樗雞三分炙黃川大黃一兩銼碎微炒蜈蚣一兩微炒雄黃一兩半研細蛇床子一兩蛇蛻半兩燒灰蜥蜴一枚炙黃薏苡仁三分䕡茹一兩牡丹三分龍膽三分去蘆頭雞骨一兩炙黃土瓜根三分雚蘆三分白蒺藜三分微炒去刺上為細末每於食前以溫酒調下一錢以瘥為度空青商陸散治狼瘻始發於頸腫無頭有根起於缺盆之上連延耳根腫大此得之憂恚氣上不得下其根在肝一作在肺空青主之商陸為之佐空青蝟腦各三分蝟肝一具干之芎藭半分獨活黃芩鱉甲婦人蓐草商陸斑蝥乾薑地膽當歸茴香礬石各一分川椒三十粒上搗篩為末酒下方寸匕日三服十五日服之外臺祕要為商陸丸空青散治狼瘻發於頸耳疼痛出膿水空青半兩炙過細研蝟腦半兩蝟肝一具微炙芎藭半兩獨活三分黃芩半兩乾薑一分炮銼當歸半兩微銼炒斑蝥一分去頭足翅糯米拌炒以黃為度鱉甲三分塗醋炙令黃去裙襴川椒五十粒去目及閉口者微炒出汗蘹香子一分白礬一兩燒灰上為細末每服一錢食前溫酒調下空青丸空青燒過細研商陸知母貍骨炙黃桔梗去蘆頭礬石泥裹燒半日細研防風去蘆頭荏子白礬燒令汁盡蛇蛻皮燒炙白芷赤芍藥斑蝥以上各等分斑蝥去頭足翅糯米拌炒令米黃為度上為細末煉蜜和丸如桐子大每日空心以醋湯下三丸芫青丸治狼瘻芫青二十枚去頭足翅糯米拌炒令黃色地膽十枚去頭足翅糯米拌炒令黃色斑蝥十枚去頭足翅糯米拌炒令黃色生犀角屑如棗大黑豆黃五十枚炒熟牛黃如棗大研細蜈蚣一枚去足大者炙令焦黃上前件六味為末入牛黃研令勻煉蜜和丸如桐子大和服藥隔夜少食每日空心以溫酒下二丸須臾可煮醋漿水薄粥稍稍飲之其瘻有形狀皆從小便中出至心甚虛悶可煮蔓荊菜羹食之少壯人隔日一服弱人隔兩三日一服服藥後瘡瘥蟲盡為度若瘥將息一月藥欲其盡須預合勿使斷絶藥氣鯪鯉甲散出聖惠方治狼瘻鯪鯉一兩鶻鳥嘴半兩蝟皮一枚犬牙一分蜈蚣一枚上件藥入瓦爐子內燒煙絶便以盆合之勿令成灰候冷研令細以臘月豬脂煉過調敷瘡上日二換之鼠瘻附論夫鼠漏者由飲食不擇蟲蛆毒變化入於腑臟出於脈稽留脈內而不去使人寒熱其根在胃出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也方黃耆散出聖濟總録治鼠瘻黃耆銼白礬燒灰附子炮製去皮臍各半兩當歸切焙防風去叉栝蔞根芎藭黃芩去黑心貍骨酒炙甘草炙各二兩大黃銼炒乾薑炮露蜂房炙各一兩細辛去苗一兩斑蝥芫青二味並去翅足糯米炒各五枚上為末每服一錢匕空心溫酒調下日再服貍骨知母散出千金方治鼠瘻始發於頸無頭尾如鼷鼠使人寒熱脫肉此得之食於鼠毒不去其根在胃貍骨主之知母為之佐貍骨知母桂心鯪鯉甲山龜殼甘草雄黃乾薑各等分上治下篩飲服方寸匕日三仍以蜜和內瘡中無不瘥先灸作瘡後以藥敷之已作瘡不用灸貍骨散出聖惠方治鼠瘻瘰癧寒熱貍骨酒炙一分躑躅炒龍骨王不留行當歸切焙土瓜根鼠姑各半兩外臺祕要作鼠粒子上為末每服二錢匕食移溫酒調下日晚再服一方有蝟皮無貍骨名蝟皮散鯪鯉甲散出聖惠方治鼠瘻發起無頭尾如鼷鼠使人寒熱脫肉此得之食鼠毒不去其根在胃鯪鯉甲炙焦鱉甲醋炙甘草炙桂去粗皮炙雄黃研乾薑貍骨酒炙各半兩上為末每服二錢匕酒調下日再服又法以蜜為丸內瘡中日一度易之一方無貍甲骨煉蜜和作餅子量大小貼日二次換之鰻鱺魚丸出聖惠方療鼠瘻鰻鱺魚四兩炙令焦野豬皮四兩炙令焦瞿麥一兩斑蝥二十枚去頭足翅熬巴豆五枚去皮炒黃臘月豬脂五分五月五日蟾蜍一個炙上搗野豬皮下篩合諸藥更搗下篩納鰻鱺魚以膏和搗千杵平旦未食服如桐子大二枚覺寒熱不覺暮復投明日旦起更服三丸稍稍增之慎勿食熱食煩悶殺人蟲當從小便出以物盛之尿中蟲有百數細不可見亦從大便出此方神驗服之自愈忌豬肉蘆筍五白膏一名漏蘆膏出千金方治鼠瘻及瘰癧白馬屎白牛屎白豬屎白羊屎白雞屎各一升漏蘆二斤上各於石上燒作灰研絹篩之以豬膏一升三合煎亂髮一兩半令極沸蘆消乃內諸末微火上煎五六沸藥成去瘡痂以鹽湯洗新帛拭乾然後敷膏洗無痂猶須洗日再若著膏當以帛裹上勿令中風冷也神驗外臺祕要有藁本二斤療鼠瘻方出肘後方山龜殼炙桂心雄黃乾薑貍骨甘草炙上等分為散飲服方寸匕日三蜜和內瘡中無不愈先灸作瘡後與藥乃佳忌生蔥及海藻菘菜松脂煎療鼠瘻松脂硫黃狼毒各二兩豬腦一具白蘞二兩上熬豬腦取汁狼毒白蘞㕮咀以水三升煮取一升內腦汁中煎得五合細研硫黃松脂下篩內中攪令相得綿裹內瘡中七日知二七日病除神效療鼠瘻方石南生地黃雌黃茯苓黃連各二兩上作散敷瘡日再忌豬肉蕪荑療頸項鼠瘻纍纍者方貝母乾薑藁本桂心蜀椒各一分炒出汗上搗下篩先食吳茱萸一分以酒服一撮忌生蔥赤小豆散出聖惠方治鼠瘻及出膿水項強頭低四肢寒熱赤小豆一合炒熟白蘞一兩露蜂房一兩燒灰蛇皮二條燒灰上為細末每服食前以溫酒調下一錢死鼠膏出聖惠方治鼠瘻死鼠一枚中形者亂髮松脂二兩黃丹六兩炒令紫色上件藥用油一斤以文火煎鼠發候消以綿濾去滓同入鐺中然後下松脂黃丹以柳木篦攪令勻膏成於瓷器中盛每日塗貼日二易之外正膏治鼠瘻死貓兒骨酒和醋炙一片長三寸皂莢去皮子醋炙一枚木鱉子去殼生用二十粒重粉半錢研上為末每用三錢匕用米醋熬成膏敷之如一兩日未效即用溫酒調二錢匕服畢以衣被蓋出汗即瘥馬齒莧膏出聖惠方治一切癰疽皆是瘡瘻根本所患癰之後膿汁不止冷即是鼠瘻是成漏者急須療之馬齒莧五升切槲白皮一斤水五升煮取一升澄清麝香半臍乾之仍研作末杏仁半升油煎令黑搗如膏上以瓷器貯之合和以三四重帛密系口病已成瘡者以泔清淨洗拭乾煎作貼子塗藥貼著瘡上日三易若未作瘡如作瘰癧子者以艾一升薑黃如棗大乾漆如棗大入釜共熬然後以艾和三味作炷灸三壯馬靈丹烏魚骨二錢半狗脊骨二錢半輕粉二錢半銅緑二錢半上用戊日生人不犯紅日竹紙包執大效斑蝥散出聖惠方治鼠瘻著頸上生小者如杏大者如桃斑蝥十枚去頭足翅糯米拌炒以黃為度牡丹三分海藻一兩去鹹味焙乾上為末每日空心及臨臥時以蔥白湯調下半錢病根當從小便中出如魚脬利後只可吃粥一方有牡蠣無牡丹酒調服忌蒜仙人曉散出聖濟總録治鼠瘻黑貓骨取一兩燒灰存性甘草炙為末三分麝香別研半分上研細分作六服每服臨臥時溫酒調下療鼠瘻及諸惡瘡方苦參三斤露蜂房五兩曲三升上以水三斗浸藥三宿去滓黍米二升釀熟飲日三一方有蝟皮一具又方治老鼠瘡久不瘥用臘月八日醋浸川烏五個五月初五日午時烏頭切作三十五塊同與醋浸三十五日後卻用三味胡椒三十枚麥門冬三十粒川烏搗爛為末上為末黃臘為丸忌用鐵器用黃丹用丙午日合黃臘為丸如鼠糞大右臥左點左臥右點之即可死蛇鼠膏治鼠瘻槲皮煎治鼠瘻貓腦骨散出聖惠方治鼠瘻案此處缺方名及症狀半夏一兩搗羅研細末鯸鮧魚脂一兩煎好了上一處調如膏旋取塗瘡上狐頭散出聖惠方治鼠瘻野狐頭一枚炙令黃貍頭一枚炙令黃上搗為末先將水洗拭乾以豬脂調敷之杏仁塗膏治鼠瘻方見本門諸瘻方治鼠瘻瘡方出聖惠方死鼠一枚中形者亂髮如雞子大一枚上以臘月豬脂一斤煎二味令消盡濾去滓膏成分作二分一分稍稍塗瘡一分稍稍酒服之將瘥鼠子從瘡中出良驗療鼠瘻方烏頭炮附子炮各二兩上㕮咀著五升醇苦酒中浸之待乾復內苦酒中燥復內以苦酒浸盡曝令乾搗末酒服方寸匕日三忌豬肉冷水等療鼠瘻方馬齒礬石燒真珠粉上等分為末厚塗瘡上不過三次即愈療鼠瘻方出肘後方礬石三分燒斑蝥一分去頭足翅熬上為細末用酢醬服半匙須臾瘻蟲從小便出麝香塗方出聖惠方療鼠瘻穿穴成瘡痛不可忍麝香研雌黃研一作雄黃上等分研為末取蝦蟆背白汁和塗瘡孔中日一度一方用酥調和內瘡孔中治鼠瘻方出聖惠方用糞燒為灰研細敷上又方出聖惠方用瓠花曝乾搗羅為末敷之地黃膏出千金方治鼠瘻瘡瘥後復發不愈出膿血不止用不中水豬脂㕮咀生地黃內脂中令脂與地黃足相淹和煎六七沸其瘡先用桑灰汁洗去惡水次以地黃膏敷瘡上日一易之治鼠瘻方出千金方上取蛇腹所吞鼠燒灰末服方寸匕日再不過三服此大驗但難過耳並敷瘡中佳外臺祕要有蝦蟆一方蝮蛇腹中所吞鼠曝乾研末敷之治鼠瘻腫核痛未成膿者出肘後方用柏葉敷著腫上熬鹽著葉上尉之令熱氣下即消治鼠瘻已有核膿血出者出肘後方用白蘚皮煎汁服一升當吐出鼠子便愈治鼠瘻腫核極痛若有瘡口出膿水者出肘後方用蜘蛛二七枚燒灰敷之良治鼠瘻用新鼠屎一百粒以粒藏入密器中五六十日杵碎以敷瘡孔中又方用蝮蛇磨著物皆透治鼠瘻鼠齒齧人瘡用貍頭骨燒灰敷之療鼠瘻方用五月五日樓桃搗末先以鹽湯洗拭乾以末敷瘡上療鼠瘻要方出肘後方用柞木皮五升酒一斗煮熟去皮煎汁令得二升服之盡有宿肉出愈療鼠瘻久不瘥方用狼鼠不拘多少常作羹粥任意吃之必驗療鼠瘻兼治螻蛄瘻用槲葉搗末敷腫上炒熱鹽尉之即消良效治鼠瘻腫核疼痛若已有瘡口膿血出者出肘後方用牛熱屎敷之日三有蜣螂出又方用貓貍一物作羹食之空心進當有死鼠出其功甚效一方又當生吞其功彌效一方單用貓作羹食之雞子塗敷方出肘後方治鼠瘻治鼠瘻惡瘡用蟾酥眉脂以麻油調塗立效治卒得鼠瘻有瘰癧未發瘡而速熱者出肘後方用搗烏雞足並車前草敷之治老鼠瘡久不瘥用綿絮燒灰瘡乾者用油調敷濕者乾末糝之又方用龜心焦土碎研香油調敷之斑烏散出衛生家寶方治瘰癧鼠瘻斑蝥何首烏糯米上等分同炒令黃色去斑蝥用二藥為末酒調服取蟲出如鼠能動其病自愈五靈脂散出衛生家寶塗瘡口五靈脂炒為細末油調塗瘡口治鼠瘻出本草上用死蜣螂燒研末苦酒調敷數遍即愈鹽湯先洗治鼠瘻瘡出本草上以通草煎服之摩亦可療諸毒鼠瘻出本草以玄參又名馥草酒漬飲之療鼠瘻瘰癧出本草取臘月豬脂調塗之治鼠瘻用雞卵一枚下半蒸半日取出炒黃令黑色先拭瘡上汗令乾以炒煮雞子黃內瘡孔中三度即瘥又方用堇菜乾為末和油煎成膏搽瘻上三度即瘥堇菜野生非人所種名堇葵葉似柏子如米花紫色螻蛄瘻附論夫螻蛄瘻者由食果蓏子不避有蟲即便啖之外絶於綱內絶於腸有毒不去變化所生也始發之時在於頸上狀如蝸形癮疹而出其根在大腸也方荏子桔梗丸出千金方治螻蛄瘻始發於頸項狀如腫此得之食瓜果實毒不去其根在大腸荏子主之桔梗為之佐荏子龍骨各半兩附子一兩蜀椒一百粒桂心桔梗乾薑礬石獨活芎藭各一分上為末以棗十枚合搗醋漿和丸如豆大溫漿下五丸漸加至十丸丹參散出聖惠方治螻蛄瘻生於項門腫硬疼痛丹參二兩蒴藋根二兩甘草半兩炙微赤銼秦艽一兩去苗獨活一兩牛蒡子一兩躑躅花半兩川椒半兩去目及閉口者微炒出汗牛膝一兩去苗上㕮咀每服三錢水一盞煎至六分去滓每日空心及晚食前服之桂心丸出聖惠方治螻蛄瘻疼痛出膿水桂心一分黃耆半兩銼礬石燒灰研一分芎藭一分大黃半兩銼碎微炒烏啄半兩炮去尾川椒一百粒去目及閉口者微炒出汗虎頸骨半兩塗酥炙黃色者上為細末煉蜜和丸如緑豆大每日空心及晚食前以溫漿水下二丸亭長散出聖惠方治螻蛄瘻亭長六枚去頭足翅糯米拌炒以黃為度川大黃半兩銼碎微炒細辛半兩桂心一分鯪鯉一兩炙令微黃楓樹中蟲糞二指撮上為細末每日空心溫酒調下一錢晚食前再服馬齒莧膏治螻蛄瘻治螻蛄瘻出聖惠方用槲葉燒灰細研以泔別漬槲葉取汁洗瘡拭乾內少許灰於瘡中蜂瘻附論夫蜂瘻者由飲食勞倦渴乏多飲流水即得蜂毒不去變化所生也始發之時其根在頸瘰癧三四處俱腫以潰生瘡狀如癰形瘥而復生其根在脾也方雄黃黃芩散出千金方治蜂瘻始發於頸瘰癧三四處俱相連以潰此得之飲流水有蜂毒不去其根在脾雄黃主之黃芩為之佐雄黃黃芩各一兩蜂房一具鱉甲茴香吳茱萸乾薑各半兩蜀椒三百粒上搗篩敷瘡口上日一度十日止外臺祕要無雄黃黃芩五香散出聖惠方治蜂瘻發於頸項纍纍相連腫痛沉香一兩半丁香一兩木香一兩半薰陸香一兩半川升麻一兩半連翹一兩半麝香一分細研上件藥搗細羅為散同研藥令勻每服一錢以水一中盞煎至六分每日空心及晚食前溫服露蜂散出聖惠方治蜂瘻有頭露蜂房一枚鱉甲一分吳茱萸一分川椒一百粒乾薑一分雄黃一分研細上為細末研入雄黃以生油調塗瘡口上日三度皂莢丸出聖惠方治蜂瘻生於項間三五相連如彈子亦腫痛皂莢八兩以四兩捶碎以新汲水二升浸一宿搗絞取汁四兩去皮以酥一兩塗炙令黃焦牛蒡子蝸牛牽牛子微炮以上各半兩上為細末取前皂莢汁於銀缸中以慢火熬至一升以後入二味藥更熬為丸如桐子大每服二十丸以藿香湯下每日空心及晚食前服之索豆散出聖惠方治蜂瘻索豆二兩炒熟白蘞一兩牡蠣一兩燒灰上為細末每服以溫酒調下一錢日三服治蜂瘻方出聖惠方用人屎蛇蛻皮灰臘月豬脂和敷之一方有麝香蜂窠膏出千金方治蜂瘻用蜂窠燒灰炙黃為末亦可用臘月豬膏和敷孔中一方療鼻內肉外查瘤膿血出者是蜂瘻單方用蜂房炙焦為末酒調一錢服粥飲調亦得空心日一服蜂瘻初生狀如桃而癢搔之則引大如雞子如覆手者出聖惠方用熬鹽尉之三宿四日瘥如不瘥至百日成瘻其狀大如四五寸又廣三寸中生蜂作孔乃有數百治法以石硫黃隨多少燃燭燒令汁出著瘡孔中須臾皮中見蜂數十唯蜂盡即瘥又方出聖惠方用死蜣螂燒為灰細研醋和塗之又方出聖惠方用鴉頭燒灰細研敷之蚍蜉瘻附論夫蚍蜉瘻者因寒腹中膨脹所得寒毒不去變化所生也始發之時在於頸項使人壯熱若傷寒有似疥癬瘻孔出膿血其根在腎也方礬石防風散出千金方治蚍蜉瘻始發於頸項初發時有如傷寒此得之食中有蚍蜉毒不去其根在腎礬石主之防風為之佐礬石防風知母雌黃桃白皮乾地黃獨活青黛斑蝥各一分去頭足翅糯米拌炒以黃為度白芷松脂一作白脂芍藥海藻當歸各一分白朮四分蝟皮四分蜀椒一百粒去目及閉口者微炒出汗上治下篩飲每服一錢匕日三服外臺祕要無礬石防風礬石散出聖濟總録治蚍蜉瘻始發於頸項如患傷寒狀此因吃食中蚍蜉毒其根在腎須早治之白礬燒為汁令枯半兩李白皮桃白皮獨活去蘆頭知母焙生乾地黃一分雄黃研一分蝟皮炒焦白朮各三分青黛研斑蝥去翅足頭糯米拌炒以黃為度白芷桐皮蜀椒一百粒去目及合口者微炒出汗芍藥海苔當歸焙各一分上為細末每日空心溫酒調下一錢日三桃白皮散出聖惠方治蚍蜉瘻初發於頸項上身體壯熱後卻成瘡出膿水疼痛桃白皮半兩銼川大黃半兩銼碎微炒知母半兩乾生地黃半兩雌黃一分細研蝟皮一兩炙令黃獨活半兩青黛一分細研川椒一百粒去目及合口者微炒令出汗白芷一分松脂一分赤芍藥一分海苔一分上為細末都研細令勻每日空心及晚食前溫粥調下一錢治蚍蜉瘻出聖惠方龜膽三枚犬牙三枚炙令黃色琥珀半兩虺蛇頭一枚炙令黃雄黃豬牙三枚炙令黃色上為細末以醋和勻敷瘡口一宿神驗赤小豆散出聖惠方治蚍蜉瘻蠐螬瘻附論夫蠐螬瘻者由恐懼憂愁思慮哭泣不止餘毒變化所生也始發之時在於頸項無頭尾如棗核或移動皮中使人寒熱心滿其根在心也方礬石白朮散出千金方治蠐螬瘻始發於頸下無頭尾如棗核塊纍移在皮中使人寒熱心滿此得之因喜怒哭泣其根在心礬石主之白朮為之佐礬石白朮空青當歸各三分細辛一兩蝟皮一作干蝟肉斑蝥一分去頭足翅糯米拌炒以黃為度枸杞一作根地膽各一分去頭足翅糯米拌炒以黃為度干烏腦脂二豆大許上治下篩以酢醬服方寸匕日三病在上側轉臥在下高枕臥使藥下流忌生菜桃李雀肉生血等發物玄參散出聖惠方治蠐螬瘻結核腫痛玄參二兩川升麻二兩獨活二兩漢防己一兩甘菊花一兩連翹三兩犀角屑