body:
  text: 卷五十八口門總論夫口者足太陰之經脾之所主五味之所入也蓋五味入口藏於脾胃為之運化津液以養五氣五氣者五臟之氣也節宣微爽五臟之氣偏勝由是諸疾生焉且咸則為寒酸則停滯澀則因燥淡則由虛熱則從苦從甘也口臭者乃腑臟臊腐之不同蘊積於胸膈之間而生熱沖發於口也口瘡者脾氣凝滯風熱加之而然醫療之法各隨其所因以治之口乾附論夫手少陰心之經也其氣通於舌是太陰脾之經也其氣通於口腑臟虛熱熱之氣乘心脾津液竭燥故令口舌乾燥也診其右手寸口脈名曰氣口以前脈沉為陰手太陰肺之經也其脈虛者病苦少氣不足以息咽乾無津液故也又右手關上脈浮為陽足少陽膽之經也其脈實者病苦腹中滿飲食不可咽乾燥也方葛根湯治口舌乾焦葛根銼甘草炙各半兩人參三二分赤茯苓去黑皮一分兩黃耆銼一兩天門冬去心焙三兩桂去粗皮三分犀角屑生乾地黃芎藭各半兩麻黃去根節一兩牛黃研一分地骨皮銼半兩麥門冬去心焙一兩上粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候杏仁散出聖惠方治心胃中客熱唇口乾燥或生瘡杏仁湯浸去皮尖雙仁麩炒微黃麥門冬去心赤茯苓黃連去須梔子仁黃芩地骨皮薔薇根各一兩犀角屑三分甘草半兩炙微赤銼川大黃一兩銼碎微炒上為散每服三錢以水一中盞入淡竹葉十四片煎至六分去滓每於食後溫服牛黃丸出聖惠方治心脾壅熱口舌乾燥兼煩渴牛黃三分細研黃連二兩去須黃芩芎藭梔子仁馬牙硝細研甘草各一兩炙微赤研川大黃三二兩銼碎微炒麥門冬一兩半去心焙硃砂半兩細研水飛過麝香一錢細研上為末同研令勻煉蜜和丸如彈子大每於食後及夜臥時煎竹葉湯研下一丸干棗湯治口舌乾焦干棗去核焙貝母去心各一兩半生乾地黃焙胡桃瓤各三二兩陳橘皮去白焙牛膝酒浸切焙葛根銼鱉甲去裙襴醋炙桑根白皮柴胡去苗各一兩上粗搗篩每服五錢匕水二盞半煎至一盞去滓溫服不拘時候酸棗丸治虛勞口乾酸棗一升酸石榴子烏梅各五合栝蔞實葛根甘草各三兩麥門冬四兩覆盆子三合上為末以蜜丸含如棗大以潤為度茯苓湯治心熱舌乾煩躁白茯苓去黑皮大黃銼炒升麻麥門冬去心焙遠志去心人參葛根銼甘草炙銼各半兩上粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時栝蔞根散出聖惠方治風熱口中乾燥舌裂生瘡栝蔞根三分牛黃二一分細研白殭蠶微炒白蘚皮川大黃各半兩銼碎微炒子芩胡黃連各三分滑石一分上為細散入牛黃研令勻每服不計時候煎淡竹葉湯調下二錢甘草丸治口中熱干甘草人參半夏生薑烏梅肉各一兩半棗膏二兩半上為末蜜丸如彈子大旋含咽日三一方無生薑用石膏栝蔞根湯治口乾渴燥栝蔞根二兩石膏碎二兩分鉛丹研三分赤石脂白石脂各半兩澤瀉三分上粗搗篩每服五錢水二盞半煎至一盞去滓入胡粉半錢分溫二服不拘時甘草丸出聖惠方治口舌乾燥煩熱甘草炙微赤銼人參去蘆頭烏梅肉各三分微炒麥門冬一兩半去心焙栝蔞根三分寒水石一兩上為末煉蜜和丸如彈子大每服含一丸咽津柴胡散治口舌乾燥心膈痰壅柴胡去苗一兩地骨皮赤茯苓去黑皮枳殼去瓤麩炒旋覆花各半兩上為散每服二錢生薑湯調下三服不拘時杏仁煎出聖惠方治口熱舌焦乾杏仁去皮尖雙仁研半兩生薑汁一合甘草炙銼為末半兩棗去皮核三十枚蜜五合上先下薑汁與蜜煎令煬後入藥煎赤色如餳每取一丸如棗核大含化一枚日宜四五丸甘露丸出聖惠方解壅毒退風熱治口舌乾燥寒水石二斤燒令通赤攤於地上出毒一宿鉛霜三分細研馬牙硝三兩分細研龍腦三分細研甘草三分炙微赤銼上為末再入乳鉢內研令極細用糯米飯和丸如彈子大每於食後以新汲水磨下半丸干棗杏仁丸治口舌乾燥干棗肉焙杏仁去皮尖雙仁研烏梅肉焙甘草炙銼各一兩上為末煉蜜丸如彈子大每服一丸不拘時候含化含化丸出聖惠方治上焦煩熱口舌乾燥心神頭目不利宜服石膏半斤細研水飛過寒水石半斤研如面白蜜半斤上以水四大盞煎取一大盞半綿濾過入蜜同煎令稠丸如雞頭實大常含一丸咽津又方出聖惠方麥門冬汁五合蜜三合棗肉三十枚上相和納瓷瓶中於飯甑上蒸一炊久取出每服一茶匙含咽津一方治虛勞口乾以蜜二升和令任意服治口乾除熱下氣方石膏五合碎蜜一二升上以水三升煮石膏取三升納蜜煮取二升去滓含如棗核大咽汁盡更含之麥門冬湯治口舌乾燥心熱麥門冬去心焙栝蔞根各一兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候治口乾方用羊脂若豬脂雞子大擘之納半升酢中漬一宿絞取汁含之瘥治虛勞口乾用羊脂如雞子大醇酒半升棗七枚擘合漬七日取棗食之立愈玄明粉出危氏方治實熱煩渴口乾燥作煩者及干喉風立效上用朴硝十斤防風一斤煎水泡溶卻用布並花葉紙澄濾七遍卻於霜下露天露一夜卻取納牙硝再用防風水淋漕淨用瓦鉢熬煎成鹽卻再入鼎內用鹽泥固濟炭火燒一時通紅為度出火去毒研為末每一斤用甘草三兩每服一茶匙溫熟水調如實熱煩渴口乾燥作煩者可略加硼砂腦子入口噙化干喉風立效主口乾以桑梨蜜煮食之口臭附論夫口臭者由五臟六腑不調壅滯之氣上攻胸膈然腑臟之臊腐不同蘊積胸膈之間而生熱沖發於口故令臭也張子和云趙平尚家一男子年二十餘歲病口中氣出臭如發廁雖親戚莫肯對語戴人曰肺金本主腥金為火所煉火主焦臭故如是也久則成腐腐者腎也此極熱則反兼水化也病在上宜湧之先以茶調散湧而去其七分夜用舟車丸浚川散下五七行比旦而臭斷嗚呼人有病口臭而終其老者世訛以為肺系偏而與胃相通故臭此妄也方含香丸治口臭去熱毒風調和臟腑雞舌香芎藭各一兩藿香甘松香當歸桂心白芷青桂香各半兩零陵香木香各三分香附子十枚肉豆蔻去殼白檳榔各五枚丁香麝香各一分細研上為末入麝香研勻煉蜜和丸如楝實大常含一丸咽津升麻散出聖惠方治口氣川升麻三兩甘草炙銼藁本白芷芎藭甘松香各半兩防風去蘆頭丁香露蜂房炙黃木香各三分當歸三分細辛地骨皮各一分東引柳枝心一二兩曬乾上為細散每取一錢以綿裹含咽津五香丸出聖惠方治口臭去熱毒夫口者脾之候心脾感熱蘊積於胃變為腐臊之氣腐聚不散隨氣上出熏發於口故令臭也沉香一兩丁香一兩薰陸香三分麝香研半分木香三分羚羊角屑三分黃連三分犀角屑三分甘草炙銼一兩鬼臼半兩黃芩去黑心半兩梔子仁半兩上為末煉蜜和丸如梧桐子大每服七丸漿水下日二服加至十丸雞舌香丸出聖惠方治口臭去熱毒雞舌香藿香木香草豆蔻仁白芷各半兩零陵香甘松香莎草根去毛各一分當歸肉桂去粗皮芎藭各三分檳榔銼五枚上為末煉蜜和丸如雞頭大綿裹含化咽津以瘥為度青黛散治口臭濕疳蝕齒欲落唇頰穿破青黛研甘草炙銼各一兩雄黃研苦參細辛去苗葉各半兩丹砂研莨菪子微炒青礬石燒令汁盡白礬石燒令汁盡附子炮裂去皮臍藜蘆去蘆頭麝香研各一分上為散先以綿拭令淨後用藥貼之五香丸出聖惠方治口及身臭令香止煩散氣豆蔻丁香藿香零陵香青木香一作木香白芷桂心各一兩香附子檳榔各二兩甘松香當歸各半兩上為末蜜和丸常含一丸如大豆許咽汁日三夜一亦可常含咽之五日口香十日遍體香二七日衣被香三七日下風人聞香四七日洗手水落地香五七日把他人手亦香慎五辛下氣去臭一方有麝香無甘松香含香丸治口臭闢除邪惡冷氣零陵香一兩甘松洗淨焙二兩沉香銼三兩乳香四兩研木香五兩草豆蔻仁六兩檳榔銼七兩肉桂去粗皮八兩赤茯苓去黑皮九兩甘草炙銼十兩上為末煉蜜為丸如小彈子大臨臥及五更初含化一丸下注丹田能生津液語音清爽顏色悅澤鬢髮烏黑止小便明目益智補虛勞除冷氣久服一生無患豆蔻丸治口臭肉豆蔻去殼紅豆蔻去皮草豆蔻去皮白豆蔻去皮丁香甘草炙銼人參赤茯苓去粗皮各半兩細辛去苗葉一分肉桂去粗皮一兩上為末煉蜜和丸如雞頭大每用一丸含化咽津甘露飲出經驗方治男子婦人小兒胃中客熱口臭齒齦宣露膿血目瞼腫但欲合不思飲食或飢煩不欲食赤眼口舌咽中有瘡及瘡疹已未發皆可服熟乾地黃洗去土生乾地黃枇杷葉去毛令淨山茵陳去根天門冬去心麥門冬去心枳殼去瓤麩炒黃芩石斛去蘆甘草炙各等分上為末每服二錢水一盞煎至七分去滓食後臨臥溫服小兒一服分二服仍量歲數加減與之此方得自一品之家其家用犀角一味甚有道理百發百中豫旅中有一僕牙宣口臭牙齒漸至頽落豫與二服頓愈服之無不效者本事方前集所未載此方緣得之不易今不欲為之己有不能廣利一切謹附此與衆共之明醫者見之必加歎賞一方有犀角無麥門冬含香丸一名丁香丸出聖惠方治口氣臭穢宜常服之丁香半兩甘草三兩芎藭一兩細辛桂心各一兩半上為末蜜丸如彈子大臨臥服二丸一方如梧桐子大每服不計時候煎竹葉湯下二十丸治口香去臭方瓜子仁芎藭藁本當歸杜蘅各六銖細辛半兩防風二兩上藥搗篩食後飲服方寸匕日三服五日口香十日身香二十日肉香三十日衣香五十日遠聞香一方加白芷十八銖沉香散沉香升麻白芷藁本去苗土細辛去苗葉丁香各半兩寒水石研二兩上為散每日早取柳枝咬枝頭令軟托藥揩齒暖水漱復以綿揩之令淨藁本散治口臭生瘡藁本去苗土芎藭各半兩細辛去苗葉肉桂去粗皮當歸切焙杏仁湯浸去皮尖雙仁生用雄黃研各一分上為散每用一錢匕敷瘡上日三度七寶散治口臭揩齒令香鍾乳研丹砂研海水沫研白石英研真珠末研麝香研珊瑚研各一分上為散再研細以柳木篦子咬頭令軟托藥揩齒芎藭散治心虛寒口臭蟲蝕齒痛芎藭白芷各一兩甘草炙銼三分肉桂去粗皮杜蘅各半兩當歸切焙三分上為散食前暖酒調下一錢匕一日二服三十日體皆香即瘥抵聖散治口臭齒疳脫落漏齦膿出不止銅緑膽礬各一錢蟾酥七片膩粉兩個子鉛丹半錢砒霜一錢上研勻先以熱湯漱口次貼一字表裡拭之候涎出盡別用鹽湯漱口升麻散出聖惠方治口臭及𧈟齒川升麻一兩半細辛藁本防風去蘆頭芎藭甘草各半兩炙銼上為末每用少許敷齒齦上即瘥治臟腑蘊熱上熏發為口臭出十便良方用芎藭不以多少銼小塊子含化咽津治口臭方一名香附子丸出危氏方用香附子炒去毛為末每早晚揩少許牙上一方為末一半醋糊為丸一半白湯調吞下又方治口臭棗肉八兩芎藭白芷橘皮桂心各四兩上為末次納棗干則加蜜和丸如大豆許旦服十丸食前食後常含之或吞之七日大香又方桂心木蘭皮沉香各一兩芎藭一兩半陳橘皮半兩湯浸去白瓤焙上為細散每於食前以暖酒調下一錢細辛散治口臭血不止細辛去苗葉雞舌香各一分菖蒲三分乾薑炮製棗肉焙乾各半兩上為末每用半錢綿裹如杏仁大含咽津日三服丁香丸治口臭穢丁香三錢甘草炙一錢芎藭二錢白芷半錢各不見火上為細末煉蜜為丸如彈子大綿裹一丸噙咽津又方治口臭桂心甘草細辛橘皮各等分上等分治下篩以酒服一錢匕瘥又方橘皮二十銖桂心十八銖木蘭皮一兩大棗二十枚上件研篩酒服方寸匕日三次久服身香亦可以棗肉丸服二十丸如梧桐子大稍加至三十丸一方有芎藭十八銖又方芎藭白芷陳橘皮湯浸去白瓤焙桂心各一兩上為末以棗肉兼入少煉了蜜和丸如梧桐子大每於食前以溫水下二十丸細辛散治口臭細辛甘草炙銼桂心各一兩上為細散每服不計時候以熟水調下一錢一方有橘皮酒服一錢匕瘥口香去臭方一名芎藭散出聖惠方甘草三十銖白芷十八銖芎藭二十四銖上件羅篩以酒服方寸匕日三服三十日口香一方為末以綿裹含咽津瘥一方蜜丸如彈子大噙咽又方大棗瓜子仁松根白皮上件研篩以酒服方寸匕日二服一百日衣被香丁香散出聖惠方治口臭𧈟齒丁香研二十枚白礬燒灰香附子各三分上為散用先揩齒次以散一錢敷之一方用鹽揩齒後用藥治口臭穢出聖惠方甘草炙銼松根皮瓜子仁各一兩微炒上為末煮棗肉和丸如梧桐子大每服以熟水下二十丸礬石散出海上名方治口臭𧈟齒白礬燒灰一分麝香少許上細研為末貼患處日三五上一方用青鹽少許調搽吐出涎為度治心氣不足口臭出經驗良方益智子去殼甘草少許上為末時復干舐咽之更以沸湯調服立效治口氣出百一選方香白芷七錢甘草五寸上為細末食後井花水調下一錢芎芷膏出濟生方治口氣熱臭香白芷川芎各等分上為細末煉蜜為丸如雞頭大食後臨臥噙化一丸治口中臭方桂心古今録驗用細辛甘草各等分上為末臨臥以指撮調酒服二十日香又方蜀椒桂心各等分上為末酒服三指撮許生香膏出三因方治口氣熱臭用干甜瓜子去殼一味研細蜜熬少許調成膏食後含化或敷在齒上尤妙一方空心洗漱訖含一丸如棗核大亦用敷齒治口臭方用象膽每夜和水研少許綿裹貼齒根上每夜含之平明暖水洗口如此三五度瘥一方用象牙香薷方出聖惠方治口臭用香薷一把水一斗煎取三升稍稍含之又方治口臭常以月旦日未出時從東壁取步七步回頭向垣立含水噀壁七遍口即香又方出肘後方用細辛豆蔻含之甚良又方出聖惠方用濃煮細辛汁含之久乃吐之又方出聖惠方用井花水三升正朝含之漱口吐廁中良數度即瘥又方出聖惠方用熬大豆令焦及熱酢沃取汁含之又方出聖惠方用密陀僧為末每服一錢用醋半盞調勻漱口治口痛用高腳地銅盤馬蹄香赤梗蜜桶藤以酒搗取汁雞毛刷取出涎即愈治口臭及𧈟齒腫痛出聖惠方用干甜瓠子搗羅為末蜜和丸如半棗大每日空心淨漱口了含一丸兼取少許塗在齒齦上亦妙梁濟民膏出衛生寶鑑方梁而飲因勞心過度肺氣有傷以致氣出腥臭唾涕稠黏咽嗌不和口苦幹燥以加減瀉白散治之桑白皮二錢地骨皮一錢半炙甘草一錢半知母七分黃芩五分五味子二十個麥門冬五錢桔梗一錢半上㕮咀都作一服水二盞煎至一盞去滓溫服食後每一日三二服忌酒濕面及辛之物難經云心主五臭入肺為腥臭此其一也因洪飲大熱之氣所傷滋溢心火刑于肺金以桑白皮地骨皮苦微寒降肺中伏火而補氣故以為君以黃芩知母苦寒治氣息腥臭清利肺氣為臣肺欲收急食酸以收之以五味子之酸溫以收肺氣麥門冬甘苦寒治涕唾稠黏口舌乾燥為佐桔梗辛溫體輕浮治痰逆利咽膈為使也雞蘇丸出如宜方治口臭心脾熱柴胡二兩錢麥門冬制四兩黃耆炙一兩阿膠制一二兩生地黃末六兩後入膏蒲黃微炒雞蘇一斤即龍腦薄荷甘草炙一半兩人參二兩木通三兩同柴胡銼湯浸過一二宿半斤絞汁後入膏上除別研藥後入外並搗羅為細末將好蜜一二斤先煉一二沸然後下生地黃末不住手攪時時入絞出者木通柴胡汁慢慢熬成膏勿令焦然後將其餘藥末同和為丸如豌豆大每服二十丸嚼破熟水下肺熱口臭口中如膠瓦干發渴小便多出永類鈐方地骨皮桑白皮生黃耆山梔子馬兜鈴上甘草煎食後噙咽升麻黃連丸出東垣蘭室祕藏方治多肉口臭不欲聞穢惡氣使左右不得近升麻半兩黃連去須三二兩生甘草三錢生薑半兩取自然汁連花青皮半兩黃芩去腐酒洗二兩白檀二錢如無藿香一錢代之上同為極細末水浸蒸餅為丸如彈子大每服一丸或二丸細嚼白湯下治口臭以梅曝乾為臘含之可以香口治口氣臭以雞舌香含之抱朴子云應郡漢官侍中年老口臭帝賜雞舌香含之日華子云雞舌香治口氣所以三省故事郎官含雞舌香欲其奏事對答其氣芬芳也唇口面皴附論夫唇口面皴者為寒時觸冒風冷冷折腠理傷其皮膚故令皴襞經絡之氣諸陽之會皆在於面其脈有環唇夾於口者若血氣實者雖徑風嚴寒不能傷之虛則腠理開而受風邪故得風冷而皴襞也又冬時以暖湯洗面及向火外假熱氣衝於腠理而觸風冷亦令病皴也方生地黃煎出聖惠方一名潤脾膏治脾熱唇焦枯無潤澤生地黃汁生天門冬汁各半升葳蕤生麥門冬各二兩去心細辛甘草生銼芎藭白朮各一兩黃耆升麻各一兩半上細銼綿裹酒浸一宿以豬脂二斤煎令藥色焦黃綿濾去滓納鍋中後下地黃天門冬汁熬令稠瓷器中盛每服不拘時候含咽半匙治唇面皴出聖惠方蠟羊脂硃砂各半兩研細甲煎一合紫草半分銼上先將蠟於銅鍋中微火煎稍熔下羊脂煎一沸次下甲煎紫草硃砂等更煎三兩沸濾去滓以竹筒貯之候凝任意使用妙治遠行唇口面皴出十便良方一名豬脂膏用豬脂熟煎以合器盛每至夜間常塗唇及面上或於野宿睡臥唇面不皴治冬月唇乾折出血方出海上方一名桃仁膏用桃仁爛搗以豬脂調塗於唇上效治緊唇面皰出聖惠方以馬齒莧水煮洗之治唇緊方取鱉甲及頭燒灰作末以敷之
