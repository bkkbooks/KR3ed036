body:
  text: 卷二百五膈噎門膈氣宿食不消附論夫飲食入於胃而化於脾脾胃和調則水穀易腐若脾胃虛寒即傳化不時新陳蘊積況膈氣之人氣道久澀是以噫氣酸臭痞滿噎塞而苦宿食不消也方麥糵散治膈氣宿食不消麥糵四兩炒芎藭白芷蘹香子炒烏藥各一兩半莎草根炒去毛桔梗炒縮砂去皮紅豆陳橘皮湯浸去白焙蓬莪朮炮厚朴去粗皮生薑汁炙熟人參各一兩白朮三兩桂去粗皮訶黎勒皮半兩蒼朮米泔水浸一宿麩炒三兩木香二錢上為散每服二錢陳米飲或鹽湯調下不計時候厚朴湯治膈氣宿食不消厚朴去粗皮銼兩半生薑汁浸一宿炒草豆蔻去皮桂去粗皮高良薑五味子各半兩青橘皮湯浸去白焙甘草炙麥糵炒柴胡去苗人參麻黃去根節煮掠去沫焙神麯炮訶黎勒炮去核各一兩益智炒去皮二兩乾薑炮一分烏頭炮裂去皮臍二兩陳橘皮湯浸去白焙一兩上粗篩每服三錢以水一盞姜三片棗二枚擘破同煎至七分去滓稍熱服不計時候人參茯苓湯治膈氣宿食不消痰毒氣虛飲食無味壯熱憎寒霍亂吐逆人參二兩赤茯苓去黑皮一兩半訶黎勒皮附子炮裂去皮臍黃耆前胡去蘆頭枇杷葉拭去毛麻黃去根節益智子去皮白朮陳橘皮肉桂去粗皮乾薑炮甘草炙各一兩上粗搗篩每服三錢水一盞生薑三片棗二枚擘破同煎至七分去滓溫服如脾泄氣利及傷寒三日外要出汗並三服衣被蓋出汗不計陰陽一切食毒傷寒並能療之蓽澄茄散治膈氣壅滯脾胃虛弱宿食不消四肢乏力蓽澄茄一兩草豆蔻半兩去皮人參半兩去蘆頭白朮三分木香半兩大腹皮三分銼荊三稜半兩微煨銼五味子半兩細辛一兩甘草半兩炙微赤銼訶黎勒皮一兩高良薑半兩銼半夏半兩湯洗七次去滑青橘皮半兩湯浸去白瓤焙上為散每服三錢以水一盞入生薑半分棗二枚同煎至六分去滓不計時候稍熱服參曲散出聖濟總録治膈氣宿食不消氣攻兩脅刺痛口內唾痰心胸不快人參白茯苓去黑皮枳殼去瓤麩炒桂去粗皮木香甘草炙白朮京三稜煨熟白檳榔銼神麯炒黃訶黎勒皮乾薑炮厚朴去粗皮生薑汁炙熟各三分上為散每服二錢入鹽點湯空心食前服厚朴散出聖惠方治膈氣脾胃久冷宿食不消心腹虛脹四肢瘦弱宜服厚朴一兩去粗皮薑汁炙沉香三分青橘皮湯浸二宿去白瓤焙檳榔半兩丁香半兩訶黎勒皮一兩半桂心半兩草豆蔻一兩去皮白朮三分人參三分去蘆頭高良薑三分銼木香三分甘草一分炙微黃銼上為散每服四錢以水一盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服人參湯出聖惠方治膈氣壅滯不下飲食或宿食不消人參一兩去蘆頭木香半兩檳榔半兩乾薑三分炮白朮一兩枳殼半兩麩炒微黃去瓤桂心一兩青橘皮三分湯浸去白焙京三稜一兩微煨銼甘草半兩炙微赤銼訶黎勒皮一兩赤茯苓一兩厚朴二兩去粗皮塗薑汁炙令香熟上為散每服三錢水一盞煎至六分去滓不計時候稍熱服草豆蔻散治膈氣壅滯不下飲食或宿食不消人參三分去蘆頭細辛半兩赤茯苓半兩草豆蔻三分去皮厚朴二兩去粗皮塗薑汁炙令香熟青橘皮三分去白焙訶黎勒皮一兩益智子半兩去皮半夏半兩湯浸七次去滑甘草一分炙微赤銼丁香一分檳榔三分上為散每服三錢水一盞入生薑半分煎六分去滓不計時候稍熱服訶黎勒湯出聖惠方治膈氣脾胃積冷宿食不消心胸不利訶黎勒皮一兩人參三分去蘆頭白朮三分黃耆三分銼神麯一兩炒微黃木香二分桂心三分麥糵三分炒微黃高良薑三分炒草豆蔻三分去皮陳橘皮半兩湯浸去白瓤焙上為細末不拘時候以生薑湯調下一錢草豆蔻散治膈氣宿食不消草豆蔻去皮高良薑炮神麯炒木香各一兩訶黎勒炮去核陳橘皮湯浸去白焙桂去粗皮烏梅肉炒麥糵炒甘草炙各半兩上為末每服二錢入鹽點湯空心食前服建中湯出王氏博濟方治膈氣宿食不消胸膈痞滿心腹脹痛陰陽不和臍腹撮痛草豆蔻去皮神麯炒麥糵炒陳橘皮湯浸去白焙白朮厚朴去粗皮炙香熟乾薑炮各一兩木香各半兩蘹香子炒上粗搗篩每服三鍾入生薑三片棗二枚擘破水一盞同煎至七分去滓溫服不計時候一方為末入鹽煎湯下空心常服磨脾湯出聖濟總録治膈氣宿食不消溫脾胃除積冷木香人參附子炮裂去皮臍赤茯苓去黑皮甘草各二兩乾薑炮神麯炒麥糵炒草豆蔻去皮各一兩上為散每服二錢入鹽點服不計時候木香散出聖惠方治膈氣胸中不利宿食不化木香一兩桃仁半兩湯浸去皮尖雙仁麩炒草豆蔻一兩去皮訶黎勒皮二兩桂心一兩檳榔一兩白朮三分麥糵三分炒微黃甘草二分微炒上為散每服四錢水一盞入生薑半分煎六分去滓不拘時候稍熱服人參散治胸膈氣滯脾胃虛冷飲食不消面無顏色人參一兩去蘆頭赤茯苓一兩白朮一兩麥糵一分炒微黃訶黎勒皮一兩縮砂半兩去皮木香半兩吳茱萸一兩湯浸七次焙乾微炒附子一兩炮裂去皮臍上為散每服不計時候以粥飲調下一錢訶黎勒丸治膈氣心胸妨悶不能下食食不消化訶黎勒皮一兩半檳榔一兩桂心一兩甘草半兩炙微赤銼木香一兩白朮一兩陳橘皮三兩湯浸去白焙前胡一兩半去蘆頭五味子一兩上為末以棗肉和搗三二百杵丸如梧桐子大每服不計時候以生薑湯棗湯下三十丸神麯丸出聖惠方治膈氣不下飲食不能消化神麯四兩炒微黃麥糵四兩炒微黃厚朴二兩去粗皮生薑汁炙令香熟桂心一兩陳橘皮一兩半湯浸去白焙檳榔一兩乾薑一兩炮訶黎勒皮一兩上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候生薑湯下二十丸蘇湯散治氣胸中不快酒食不消飲食不快宜治脾元一切虛中積滯肉豆蔻丁香沉香硇砂各一分京三稜蓬莪朮燒存性各一兩上為末烏梅肉丸如麻子大每服十四粒空心熱紫蘇湯下附子丸出聖濟總録治膈氣宿食不消散寒邪溫脾胃丹砂研細如粉留一半末為衣附子炮裂去皮臍各一兩檳榔銼碎半兩杏仁二十八枚去皮尖雙仁另研成膏丁香一錢上研極細和勻煉蜜為丸如梧桐子大丹砂為衣每服三丸至五丸先嚼棗二枚裹藥丸乾咽後生薑湯下不計時候養胃丸出聖濟總録治膈氣宿食不消丁香半斤白朮人參各十一兩厚朴去皮銼作小塊一斤生薑五斤用自然汁於銀石器內同厚朴文武火煮盡薑汁炒令乾上為末煮棗肉和丸如梧桐子大每服三十丸空心食前服米飲下硇砂丸出聖濟總録治膈氣宿食不消消滯即進飲食山萸木香肉豆蔻去皮檳榔銼各半兩硇砂一兩研碎以漿水一大盞化去沙泥熬盡漿水卻入好酒半升重熬如膏上為細末以硇砂膏搜和令勻卻以好酒半盞煮麵糊為丸如梧桐子大每服十丸至十五丸食後良久溫酒下膈氣妨悶附論夫膈氣妨悶者由憂恚思慮冷熱不調氣結胸中上下痞滿致飲食噎塞津液不通虛冷之氣攻迫咽喉故令妨悶也方大腹皮散出聖惠方治膈氣心胸壅滯妨悶大腹皮銼赤茯苓白朮丁香陳橘皮湯浸去白瓤焙芎藭草豆蔻去皮木香各一兩甘草一分炙微赤銼人參去蘆頭桂心以上各半兩厚朴去粗皮塗生薑汁炙令香熟上粗搗篩為散每服三錢水一盞入生薑半分煎至六分去滓不計時候稍熱服白朮散出聖惠方治膈氣不散胸中噎塞不下食時妨悶白朮半兩半夏一兩湯洗七次去滑赤茯苓一兩大腹皮一兩銼人參三分陳橘皮一分湯浸去白瓤焙枇杷葉一兩拭去毛炙微黃木香半兩前胡二兩去蘆頭厚朴一兩去粗皮塗薑汁炙令香熟檳榔一兩上為散每服三錢水一盞入生薑半分煎至六分去滓不計時候稍熱服檳榔散出聖惠方治膈氣心胸妨悶不下飲食檳榔三分前胡一兩去蘆頭桂心半兩郁李仁三分湯浸去皮炒草豆蔻半兩去皮川大黃一兩銼碎微炒枳殼三分麩炒微黃去瓤乾薑半兩炮木香三分甘草一分炙微赤銼上為散每服三錢水一盞生薑半分煎至六分不計時候稍熱服紫蘇散出聖惠方治膈氣胸中妨悶痰壅不下食紫蘇葉三兩陳橘皮一兩湯浸去白瓤焙半夏一兩湯洗七次去滑枳殼三分麩炒微黃去瓤柴胡三兩去苗檳榔一兩赤茯苓一兩桂心一兩上為散每服三錢水一盞入生薑半分煎至六分去渣不計時候稍熱服枳殼丸出聖惠方治膈氣脹滿吃食妨悶腳手疼煩漸加羸瘦四肢無力枳殼一兩麩炒微黃去瓤木香一兩檳榔一兩麥門冬一兩半去心焙羚羊角屑一兩赤芍藥一兩赤茯苓二兩前胡二兩去蘆頭上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以粥米飲下三十丸訶黎勒丸出聖惠方治膈氣心腹妨悶不能下食訶黎勒皮二兩檳榔一兩木香一兩陳橘皮一兩湯浸去白瓤焙五味子一兩川芒硝一兩上為末以酒煮麵糊丸如梧桐子大每服不計時候煎薑棗湯下二十丸桃仁散出聖惠方治膈氣心胸妨悶常欲嘔吐湯水不下桑根白皮一兩銼桃仁一兩湯浸去皮尖雙仁麩炒黃木香半兩上為散每服三錢水一盞入生薑半分煎至六分去滓不計時候稍熱服膈氣心腹痞滿附論夫膈氣心腹痞滿者由寒氣在於胸膈逆滿咽喉噎塞不通噫聞食臭心腹脹滿此皆榮衛不和陰陽隔絶臟腑痞澀壅而不宣通故令心腹痞滿也方訶黎勒散出聖惠方治膈氣心腹痞滿胃氣虛弱不能飲食訶黎勒皮一兩人參三分去蘆頭京三稜三分微炒銼草豆蔻一兩去皮陳橘皮一兩湯浸去白瓤白朮三分甘草半兩炙微赤銼赤茯苓三分檳榔三分桂心三分乾薑三分炮製銼上為細末每服不計時候煎生薑橘皮湯調下一錢白朮散出聖惠方治膈氣心腹痞滿四肢拘急體重白朮三分木香半兩訶黎勒皮三分甘草一分炙微赤銼桂心三分丁香半兩人參半兩去蘆頭陳橘皮一兩湯浸去白瓤焙厚朴一兩薑汁炙草豆蔻一兩去皮上為細末每服不計時候煎生薑木瓜湯調下一錢柴胡散出聖惠方治膈氣心腹痞滿不下飲食肩背壅悶四肢煩疼柴胡二兩去苗枳殼一兩麩炒微黃白朮一兩甘草半兩炙微赤銼赤茯苓二兩檳榔二兩陳橘皮二兩湯浸去白瓤焙赤芍藥一兩訶黎勒皮二兩上為粗散每服四錢水一盞入生薑半分煎至六分去滓不計時候稍熱服赤茯苓丸出聖惠方治膈氣咽喉噎塞心腹痞滿不下飲食胸背俱悶赤茯苓一兩桂心一兩乾薑三分炮甘草半兩炙微赤銼陳橘皮一兩湯浸去白訶黎勒皮二兩半枳殼一兩麩炒微黃羚羊角屑一兩檳榔一兩上為末煉蜜和搗三二百杵丸如彈子大每服一丸不計時候常含一丸咽津如患甚即將一丸煎湯研破服亦可沉香丸出聖惠方治膈氣脾胃久冷心腹痞滿吃食無味面色痿黃沉香半兩丁香半兩木香半兩檳榔半兩桂心一兩訶黎勒皮一兩川大黃半兩銼碎微炒肉豆蔻半兩去殼麝香一分細研上為末入麝香研令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以薑棗湯嚼下十丸人參丸出聖惠方治膈氣心腹痞滿不下飲食或時嘔吐四肢不和人參二兩去蘆頭桂心一兩赤茯苓一兩訶黎勒皮一兩甘草一分炙微赤銼乾薑半兩炮檳榔一兩陳橘皮一兩湯浸去白焙上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候薑湯下三十丸枇杷葉散出聖惠方治膈氣吐涎痰食不消化心腹痞滿雷鳴枇杷葉一兩拭去毛炙微黃人參二兩去蘆頭檳榔半兩桔梗一兩去蘆頭半夏一兩湯洗七次去滑陳橘皮二兩湯浸去白瓤焙上為散每服三錢水一盞入生薑半分煎至六分去滓不計時候溫服枳殼散治久患膈氣心腹痞滿咽喉噎塞不下飲食宜服此方枳殼一兩麩炒微黃去瓤訶黎勒皮一兩半上為散每服不計時候煎生橘皮