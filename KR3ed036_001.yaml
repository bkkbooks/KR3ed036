body:
  text: 卷一方脈總論辨男女形生神育論嘗讀齊大夫褚氏遺書首論受形則曰男女之合二情交暢陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先入陰血後參精開裹血血入居本而女形成矣陰陽均至非男非女之身精血散分駢胎品胎之兆復其說如經所謂男子為陽得陰而生先生右腎為命之門女子為陰得陽而長先生左腎為命之門命門者元精之所舍男子以藏精女子以系胞男女所以有別者亦由陰陽先後所本有異也欲知陰陽所本之異者於腎取焉可也男子始生居命門於右腎屬乎陽而應日主三魂降精赤而鎮丹元丹元者精舍也上赤下黑左青右白中央黃運其中三陽之正氣太一之真精名曰弱水內有元龜所以呼吸元氣運行百脈為三焦之原而應於衛也衛為陽行於膏故男子命門取乎右腎至於左腎屬乎陰而應月主七魄降精黑而鎮金關此蓋陽以陰為本必稟生而在右者也乃若女子所生則居命門於左腎屬乎陰而應月主七魄降精黑而鎮元宮元宮者胞胎所繫也上黑下赤左白右青中央黃運其中三陰之正氣太一之真精名曰原泉內有螣蛇所以呼吸元氣運行百脈為三焦之原而應於榮也榮為陰行於脈故女子命門在乎左腎至於右腎則屬乎陽而應日主三魂降精赤而鎮玉關此蓋陰以陽為本必稟生而在左者也按藏教父母及子有相感業神乃入胎依地水火風衆緣和合漸得生長一七日如藕根二七日如稠酪三七日如鞋襪四七日如溫石五七日有風觸胎名曰攝提兩臂兩脛及頭五種相現六七日有風名旋轉兩手兩腳四相現七七日及八七日手足十指二十四相現九七日眼耳鼻口及下二穴大小便處九種相現十七日有風名普門吹令堅實及生五臟十一七日上下氣通十二七日大小腸生十三七日漸知飢渴飲食滋味皆從臍入十四七日身前身後左右二邊各生二百五十條脈十五七日又生二十條脈一身之中共有八百吸氣之脈至是皆具十六七日有風名甘露為安置兩眼通諸出入息氣十七七日有風名毛拂能令眼耳鼻口咽喉胸臆一切合入之處皆得通滑十八七日有風名無垢能令六根清淨十九七日眼耳鼻舌四根成就得三種報曰身曰命曰意二十七日有風名堅二腳二手二十指節乃至一身二百大骨及諸小骨一切皆生二十一七日有風名生起能令生肉二十二七日有風名浮流能令生血二十三七日生皮二十四七日皮膚光恍二十五七日血肉滋潤二十六七日發毛爪甲皆與脈通二十七七日發毛爪甲悉皆生就母所飲食行住坐臥兒皆辛苦二十八七日生屋園池河等八想二十九七日各隨其業或黧或白三十七日黧白相現三十一七日至三十四七日漸得增長三十五七日肢體具足三十六七日不樂住腹三十七七日生不淨具穢黑暗三想三十八七日有風名藍花能令長舒兩臂轉身向下次有一風名趨下能令頭下足上以向生門如是處胎始終三十有八七日於胞胎中自然生十一種風開通整合使之筋脈肌骨機關孔竅皆得流通然後得成為人然則父母生育功侔造化其為恩也豈曰小哉又以道書言之玉清之氣生人上一是為泥丸上清之氣生人中一是為絳宮太清之氣生人下一是為丹田玄元始合為九氣生人九戶二十四氣生人二十四體三百六十神生人三百六十骨節八十一分神生人八十一關節東方七宿屬陽明生人三魂西方七宿屬陰精生人七魄南方七宿屬丹元生人天氣北方七宿屬北極生人玄津無量妙一結為子戶天中王氣上為腦精每一月即有一天之氣下添如是一月郁單無量天真胞命黃演之氣下添乃至第九月無想無結無愛天嶽府命元自是氣不添夫九氣既添又有六甲之神相為保衛而全成之夫所謂六甲神者甲子水神為之調暢血脈潤澤三焦甲戌土神為之調理肌肉使不偏枯甲申金神為之緊固爪齒養育真牙甲午火神為之和悅五臟混合百神甲辰風神為之保固胎息呼吸陰陽甲寅木神為之濯煉筋骨通貫百骸信知婦人妊娠謂之六甲者豈有他哉五臟六腑筋骨髓腦皮膚血脈精藏水藏二萬八千形彰一萬二千精光三萬六千出入八萬四千毛竅莫不各有其神主之然則人生天地中豈可不凝神守真而保其天之所以與我者哉豫以釋老之言並前賢遺論輯而書之非臆說也男女動靜說嘗觀清淨經云天清地濁男動女靜降本流末而生萬物又讀周子太極圖曰陽動陰靜動極復靜靜極復動一動一靜互為其根則知清濁者天地之位動靜者男女之機也男子為陽陽主動動中有靜女子為陰陰主靜靜中有動是以上古天真論女子二七天癸至任脈通太衝脈盛月事以時下至七七則任脈虛太衝脈衰少地道不通形壞而無子丈夫二八腎氣盛精氣溢瀉陰陽和故有子至八八則齒髮去以此知男女陰陽之質不同天癸精血之形亦異陰靜血滿月溢則行靜極復動也陽動氣合時泄而止動極復靜也四大奧論嘗歷覽諸家方論探求醫之妙理復讀佛書見經中多引醫為喻有云醫善巧方普救一切人則知醫之心即佛之心也診療之際可不明其所以乎蓋人之生寓形宇內假合四大以為身四大者何地水火風也其生也由此而成其死也由此而滅從本不實故也人之生死既系乎此則為醫者正當明死生之理以究其疾痛之源可也夫發毛爪齒皮肉筋骨腦髓面色皆屬乎地若地大不和則發焦毛拔爪枯齒槁皮緩肉脫筋急骨痿髓竭腦轉面垢色敗此病之源於地大者也唾涕膿血津液涎沫痰淚精氣大小便利皆屬乎水若水大不和則多唾鼽涕膿潰血溢津液不收涎沫流出痰壅淚盈精走氣泄大小不淨盈流於外此病之源於水大者也至於暖氣則歸火動轉則歸風若火大不和為煩為熱為焦渴為癰瘍為狂走為癃閉若風大不和則偏枯隨為四肢癱瘓為口眼喎斜為筋脈攣急為癢為痛為痹為𤸷火大風大病故不同四者和合則一身安榮有一不和皆能為病況於離散者乎矧乎四大之身人所均有而不自覺知醫之神師亦祕而不示於人惟佛書則言之詳矣蓋佛為大醫王了達生死故能洞明此理豫因得以經中所說一貫乎醫後之來者毋以豫言為迂如以豫言為迂是亦以佛氏為迂矣五常大論太和絪縕天地設位化生萬物而人位乎其中三才立矣夫人之一身與天地同流上部法天主胸以上至頭之有疾中部法人主膈以下至臍之上有疾下部法地主臍以下至足之有疾髓者精之根命之元也精者血之本神之苗也萃五味之英集五氣之和融結而為之夫五臟皆有精而內舍於腎以育百骸諸骨皆有髓而上屬於腦以鎮諸陽故腎為精之舍腦為髓之海也頭者諸陽之會上丹産於泥丸內則百神之所輯為一身之元首也手之三陽從手至頭足之三陽從頭至足六陽之脈會於頭間是以頭痛多屬於陽也陰病亦有頭痛者蓋諸陰之脈皆行至頸胸中而還不上循頭獨厥陰肝脈上入頏顙連目系上出額與督脈會於顛內經曰頭痛顛疾過在足少陽厥陰甚則入肝又有病頭痛連齒時發時止數歲不已者由寒氣內至骨髓骨髓者以腦為主腦逆故令頭痛齒亦痛此腎所生病也諸陰經病無頭痛唯肝腎二經有者由此故也面者人神之牖也上部五嶽分別五官以屬五臟目者肝之官主鑑辨五色鼻者肺之官主吸引五臭口者脾之官主嗜食五穀舌者心之官主品嘗五味耳者腎之官主分別五音五官既具則一身之精神皆備於面矣內經云女子六七面皆焦丈夫六八面焦由陽明氣衰於上也以其手陽明之脈直而上頸貫頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔足陽明之脈起於鼻交頞中傍約太陽之脈下循鼻外入上齒縫中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱難經云人面獨能耐寒者以其諸陽之脈皆上至頭耳黃帝於面焦發墮獨言陽明而不言諸陽者蓋諸陽之脈雖上循頭而不若陽明之脈維絡於面也合二經而考之可識經脈之循環驗氣血之消長也苟情動於中邪淫於外形色有變皆見於面不可概舉頸項者諸陽輻湊之地六陽之脈皆自肩頸出入缺盆下絡五臟所以古人取人迎動脈於頸間以候五臟六腑之氣有餘不足也其為病則不一或頸項強痛不可回轉或頸項痛而嗌乾或頸項痛連入缺盆則各隨其經脈所屬而為病焉至於九瘻瘰癧癭瘤多生於頸項者亦由經脈之所聚也肩者六陽之脈與陽維之會皆走於肩而相交會循肩上下因知肩為諸陽之道塗筋骨之樞會故能任重負戴背中之府諸陽受氣於胸中轉行於背經云人身之陰陽者背為陽故五臟六腑之腧皆在於背也臑者臂節也穴名曰天府肘者手腕也穴名曰尺澤臂者從肩至掌統而言之也夫手之三陰三陽皆循臂前後廉上下往來或由中而行故為病大同而小異用藥亦可以兼理灸之刺之則各隨其經也腋者掖也手三陰之脈與足少陽之脈循腋上下故為病則腋下腫痛靈樞經曰手太陰之脈從肺系橫出腋下手少陰之脈從心系卻上肺出腋下手厥陰之脈循胸出脅下抵腋下足少陽之脈則從缺盆下腋循胸中過季脅凡此四經或橫出腋下或循腋上下別行各有其道也有患狐臭漏腋者古方共為一病以理考之其證不一狐臭者多因勞逸汗漬以手摸而臭致清氣道中受此宿穢吸上泥丸散入百脈多相沾染漏腋者由食啖五辛大過而有所發致腠理不密其汗則自腋泄出浥浥而濕浣衣數重皆透臭不可近狐臭漏腋皆腋中之疾雖不傷人命而害人身奉親事君乃至交遊皆非所宜修身之士務為清潔者偶得此患不可不思有以去之脅者左右腋下也肋者脅骨也肝膽二經交會於此是以脅痛多屬肝膽也難經云臟會季脅季脅在軟肋之際其端有穴名曰章門直臍傍二寸八分是脾之分足少陰厥陰所會也凡熱病在內者則取其穴之所會以去其疾也膈者革也自心肺之下有膜與脊脅腹周回相著如幕以遮蔽濁氣不上熏於心肺所謂膻中者臣使之官喜樂出焉膻中在兩乳間為氣之海以分布陰陽志和氣達則喜樂由生又云膈原之下中有父母膜原之上者氣海居焉氣者生之原命之主故氣海為之父母膜原謂心肺之間也臍者齊也根源本始生成之處沖和凝結之氣通而稟受生焉有生生不窮之義及其形質已具分誕有期則如匏瓜桃李臍乾而蒂脫矣是以號為神闕前當腸胃後直腎俞為天地中分黃庭云兩部水王對生門又云後有密戶前生門生門者臍也嬰兒在母腹中取氣於臍管母呼亦呼母吸亦吸正與密戶相對所謂臍者如此況臍之上下左右乃腸胃盤曲會聚之所經所以言五臟之動氣發於臍之上下左右也足陽明衝脈皆挾臍而督脈貫臍中央臍或凸出者水氣積於脾元臍腹㽲痛者寒邪傷於下臟不可不知腰挾脊而居前與臍平為前後分足少陰之脈貫脊足太陽之脈抵腰故腰者腎之外候腰半以上同天之陽腰半以下同地之陰腰為陰陽之界也腰當人身之中任擎折俯仰之勞設或氣鬱於內邪干於外皆致腰痛當以脈之真誕驗之至於房勞疲力耗竭精氣墜墮惡血留滯經絡與正氣衝擊傴僂身重腫痛引脅謂之瀝血腰痛或作勞汗出衣里冷濕久久得之腰冷如身重不渴小便自利食飲如故腰以下如帶五千錢謂之腎著治之各有法內經云腰者腎之腑轉搖不能腎將憊矣難經云大腸小腸會為闌門言闌約水穀從其別者也其谷自小腸承受於闌門以分別也其水則滲灌入於膀胱上口而為溲便若谷之滓穢則自闌門而傳道於大腸故曰下焦在膀胱上口以分別清濁也內經云北方黑色入通於腎開竅於二陰二陰者腎之外竅也前曰溲便精血亦自此道出故男子水令居下火令居上女子水令居上火令居下所以男子由此分而為火水未濟之卦女子由此分而為水火既濟之卦也後曰肛門肛門猶車之𨊧也為肺下口號為通事吏難經云下極為魄門魄門者肛門也重十二兩大八寸徑二寸太半長二尺八寸受谷九升三合八分合之一熱則肛門腫縮閉塞不通寒則肛門脫出腸鳴洞泄狐惑傷寒證云蟲食其肛下唇有瘡諸證不同學者宜審之七衝門四十四難曰七衝門何在然唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大腸小腸會為闌門下極為魄門故曰七衝門也易老曰魄門對飛門其證俱狐惑之病以下衝上故曰七衝門也余依丁公主論甚當辨云幽門不通上衝吸門不開噎塞不便燥祕氣不得上下治在幽門閉大便不通通幽湯主之髀股者足腿也膝者脛頭也膕者足腕也腨者足肚也一名腓腸趺足面也足之六經流注之地足之三陽從頭走足足之三陰從足至腹三陽之脈行足外廉皆循股也三陰之脈行足內廉皆循髀也唯膕中腨內陰陽上下行乎其間至於膝則太陰陽明之脈皆循股而入膝少陰之脈則出膝內廉也足趺者足面系鞋之所骨間動脈應指名曰衝陽足陽明胃脈氣之所發也傷寒必皆診者以察其胃之有無也肝膽之脈雖亦循趺上下但所行各異其道十二經脈包羅一身無所不至昔紂妃妲姬冬月見二少年朝涉謂紂曰一老生之子一少生之子紂曰何以知之妲姬曰少生者耐寒髓滿脛也老生者畏寒髓不滿脛也紂斫其脛而觀之信然因知人之虛實由稟受之各異也內經曰腎生髓髓生肺子母之義孫真人以髓應肝膽蓋不失其本也夫髓為精之根精為血之本命之元身之主也五臟像位肝名龍煙字含明號將軍之官於五行為木故其體狀有枝葉也重四斤四兩有七葉左三葉屬甲為陽右四葉屬乙為陰夫人夜臥則血歸於肝上朝於目有童子玉女身掛青衣手執青拂每夜三更繞身巡看一回卻朝青帝肝神七人老子名曰明堂宮蘭臺府從官三千六百人肝神名藍藍其位居於左以應東方蒼龍之木旺於春七十二日墓在未其數三八上應歲星下合震卦律中太蔟心名丹元字守靈號帝王之尊為一身之主於五行為火故其體狀圓赤如蓮苞未開之質也重十二兩盛精汁三合劉子曰心行於光上智人心有七孔三毛中智人心有五孔二毛下智人心有三孔一毛愚人心有一孔而大愚混濁者有一孔而小矣或癡憨之輩雖有心而無孔故神出入無門者衆矣有童子身掛緋衣手執紅拂每夜三更而出繞身巡看一回卻歸離宮百神安靜心神九人大尉名絳宮太子南極老人元先之身其從官三千六百人心神名詬詬其位處上焦以應南方朱雀之火旺於夏七十二日墓在戌其數二七上應熒惑下合離卦律中中呂脾名常在字魂停號諫議之官於五行為土故其形像馬蹄居胃之上以消磨水穀也重二斤三兩扁廣二寸長五寸有散膏半斤主裹血溫五臟有童子身掛中宮之衣手執黃拂每夜三更繞身一回卻朝土主故令百神安靜脾神五人玄光玉女其從官三千六百人其臟為中州以應中央戊己之土寄旺於辰戌丑未之月各一十八日正旺於長夏墓在辰其數五十上應鎮星下合坤卦律中黃鐘肺名晧華字虛成號相傅之官於五行為金故位處上焦狀如懸磬而五音之聲皆從肺出也重二斤三兩六葉兩耳凡八葉童子十四人身掛素衣手執玉節守氣巡遊於身卻回素宮百神始得安靜其神八人太和君名曰玉堂宮尚書府從官三千六百人肺神名鴻鴻其臟居高為五臟華蓋其治在右以應西方白虎之金旺於秋七十二日墓在醜其數四九上應太白下合兌卦律中夷則腎名玄冥字育嬰號作強之官於五行為水處於下為臟之根身之本也腎有兩枚重一斤一兩其左為腎屬壬右者為命門屬癸女子以右者為腎左者為命門男子命氣為根傳丹田屬壬癸之位女子命氣為根傳血海通三焦屬坎離之位有二童子身著皂裳手執壬癸之幡繞身巡看一回卻朝北帝令元神安靜其神六人司徒司空司命司隸校尉廷尉卿腎神名𣿖𣿖腎兩枚形如豆相併而曲附於脊膂外有脂裹內白外黑以應北方壬癸之水旺於冬七十二日墓在辰其數一六上應辰星下合坎卦律中應鐘六腑像位膽者謂青腸肝之府也號中正之官在肝之短葉間重二兩三銖盛精汁三合其神五人太乙道君居紫房宮中其從官三千六百人膽神名灌灌或入夜間恐懼大張眼時弩目視之其妖自息故得膽神相助其威如此旺墓應合與肝同也小腸謂赤腸心之府也號受盛之官居胃之下重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲盛谷二斗四升水六升二合合之大半其神二人元梁使者小腸神名潔潔旺墓應合與心同也胃者謂黃腸脾之府也號曰太倉主圍受食物為水穀之海六腑之大原也與脾相連重二斤十四兩紆曲屈伸長二尺六寸盛谷二斗水一斗五升其神十二人五元之氣諫議大夫胃神名且且旺墓應合與脾同也大腸謂白腸肺之府也為傳道之司號監倉之官居小腸之右重二斤十二兩長二丈一尺廣四寸徑一寸半當臍右回十六曲盛谷一斗水七升半其神二人元梁使者大腸神名洞洞旺墓應合與肺同也膀胱謂黑腸腎之府也號州都之官居大腸之側臍之下應丹田人之根也重九兩二銖縱廣九寸名曰水漕又名玉海盛滿九升九合一作胞胞者𩎘也以虛受水為津液府故云膀胱者胞之室也旺墓應合與腎同也三焦者元氣之別使也主持諸氣有位無形其經屬手少陽此外府也號決瀆之官上焦者在心下下膈在胃上口主內而不出中焦者在胃中脘不上不下主腐熟水穀下焦者在臍下當膀胱上口主出而不內以傳道也故經云三焦者水穀之道路氣之所終始也或難曰扁鵲以心主與三焦為表裡心主者心胞絡也叔和以命門與三焦為表裡命門者右腎也二人之論何相戾歟豫辨之曰心為五臟之君而居上部腎乃一身之根而處下元真心不受邪而下有胞絡腎有二枚而右為命門上下相應與三焦俱為相火上焦其治在膻中膻中者三焦之所會下焦其治在氣衝氣衝者元氣之別府是以三焦始於氣衝終於膻中也扁鵲以心主與三焦相為表裡者心主非正臟而三焦亦非正腑但以三焦之經屬手少陽心胞之經屬手厥陰二經俱屬於手陰陽相配合耳叔和以命門與三焦相為表裡者腎為精之舍三焦為精之府命門雖系一臟外別無經與腎俱屬足少陰之經與足太陽膀胱相為表裡以此推之三焦之氣與命門通而三焦之經不與命門合也扁鵲之論為正至於中焦在胃中脘主腐熟水穀其精華則流而為榮衛其糟粕則轉而為滓穢蓋胃為水穀之海三焦為水穀之道路以此而知三焦之氣各隨其所屬部分而為之應又何疑焉五臟相涉肝者木也腎為之母心為之子脾為之匹肺為之主也肝之為病則有目脅指爪筋血諸證皆氣合血類從病由是生焉肝之竅在目目為肝之官而五臟之精華皆上注於目骨之精為瞳子屬腎筋之精為黑眼屬肝血之精為絡果屬心氣之精為白眼屬肺肉之精為約束屬脾其筋骨血肉氣之精與脈併為系繫上屬於腦後出於項中至於目決其面者為兌足少陽經脈之所起屬於膽近鼻上為外眥足太陽經脈之所起屬膀胱下為內眥足陽明經脈之所起屬於胃以此知五臟精華三陽經氣互相交涉灌注於目所主不同也肝之為病必脅下痛引少腹又膽脹者必兩脅痛口中苦善太息蓋肝之經抵少腹布肋膽之經循脅裡出氣街是以脅痛之證屬肝與膽也內經曰肝之合筋也其榮爪也肝中寒兩肩不舉身無膏澤喜轉筋爪甲枯黑春差秋劇筋受寒則筋不能動十指爪皆痛肝外榮於筋故筋病不已傳之於肝靈樞經云膽之厚薄以爪甲驗之爪甲色黃則膽厚爪色紅則膽薄爪色青堅則膽急爪色赤軟大者膽緩爪直色白無約者膽直爪色多敗者膽結也故知肝應膽膽應爪互有所屬焉中藏經云若手足爪甲青黑呼罵口不息者謂之筋絶筋絶不治九日死難經云足厥陰氣絶則筋急筋急則引舌與卵故舌卷卵縮此筋先死庚日篤辛日死龐老云諸病及被毒爪甲青黑者死候也心者火也肝為之母脾為之子肺為之匹腎為之主也心之一氣相屬如舌與血脈胸發等症皆中外相應經絡流注而生病焉心氣通於舌舌為心之官而心之本脈繫於舌根脾之脈絡繫於舌旁肝脈循陰器而絡於舌本凡此三經或為風寒濕所中皆使人舌捲縮而不能言至於心熱則舌破裂而生瘡肝壅則舌出血如湧脾閉則白胎如雪諸證各異治之當隨其臟之所屬不可不知內經云心之合脈其榮色也心中寒則令人勞倦頭面赤蓋心合脈榮於色也靈樞經云小腸厚薄則以皮之厚薄與脈之緩急驗之皮厚則脈厚脈厚則小腸厚皮薄則脈薄脈薄則小腸薄皮緩則脈緩脈緩則小腸大而長皮急則脈急脈急則小腸結也故知小腸應心心應皮所以然也難經云手少陰氣絶則脈不通不通則血不流血不流則色澤去故面黑如黧此血先死壬日篤癸日死內經云諸臟受病懸脈絶者死候也脾者土也心為之母肺為之子腎為之匹肝為之主也脾之氣候相屬如唇口頤頷咽門肌肉中外相應也脾氣通於口口為脾之官五味入口藏於胃脾主行精華分布津液於五臟五臟之氣偏勝味必偏應於口脾熱口甘膽熱口苦勞鬱則口臭凝滯則生瘡煩躁則澀宿食則酸寒則咸虛則淡夫口乃一身之都門出入榮養之要道節宣微爽病必生焉豈得但於脾之一經言也內經云脾之合肉也其榮唇也胃應脾脾應肉肉與脾胃合肉堅則胃厚肉瘦則胃薄肉之緊緩疏密與胃相應也胃病肉色變臟腑有病皆從肉生肉熱應臟肉寒應腑肉虛則坐席不安身色變動實則坐席不動喘氣迫促脾之有疾皆驗於唇唇者脾之外候燥則干干則裂風則瞤動寒則揭氣鬱則生瘡血枯則瀋而無色若以經脈變涉言之手陽明之脈挾口環唇足陽明之脈亦挾口環唇足厥陰之脈循唇內凡此三經或自下而上或自上而下環繞於唇也龐老云經逆則榮衛不通陰陽反作內外傷系致虛消瘦口噤唇黑者不治又言聲憂懼舌卷短縮此木剋土陽繫於陰陰伏陽起起則實實則熱熱則悶亂體重唇黃聲吒者不治難經云足太陰氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死中藏經云凡病見唇乍干乍黑者死肺者金也脾為之母腎為之子肝為之匹心為之主也肺為五臟上蓋主持諸氣通息於鼻鼻居面部之中嶽位而尊上透泥丸下應於肺夫人一日一夜呼吸出入通計一萬三千五百息從鼻往來未嘗間斷故鼻為肺竅主吸引五臭衛養五臟內經云五氣入鼻藏於心肺上使五色修明音聲能彰難經云心主臭肺主聲鼻者肺之竅而反知香臭其意何也肺者西方金也金生於巳巳者南方火也火者心心主臭故令鼻知香臭此五行相因而成也又肺之偏正以鼻驗之鼻正肺正鼻偏肺偏豐怯厚薄皆相應也內經云肺之合皮也皮者一身之包裹為肺之外候難經云形寒飲冷則傷肺肺病則皮膚痛灑灑然寒熱上喘氣自汗出也靈樞經云大腸厚薄驗之於皮皮厚大腸厚皮薄大腸薄皮熱應肺皮寒應大腸蓋肺主皮而大腸應皮也難經云手太陰氣絶則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折皮枯毛折則毛先死丙日篤丁日死凡五臟真脈見色不澤毛折乃死腎者水也肺為之母肝為之子心為之匹脾為之主也腎之所主乃精髓骨腦腰齒脊前後二陰髀股膕腨足跟足心所生病也腎開竅於二陰而氣通於耳難經云肺主聲耳者腎之候而反聞聲其意何也腎者北方水也水生於申申者西方金也金者肺肺主聲故令耳聞聲此五行相因而成也內經云腎之合骨也其榮發也腎應骨骨與腎合妊娠七月始受木精以成骨故曰無使身勞動居處必暖飲食避寒常食粳稻以密腠理是故養骨以堅齒今人立身以來嗜欲才過則骨立羸瘠肩聳脊露齒則焦黑搖動而痛莫不由稟受之際有所感動而然夫腎應骨而齒者骨之干資髓以養表而出之人受形於胞胎七月而骨齒成穀氣未行則居於斷槽中及其時至則齒生而嗜食囟合而能言亦造化生成自然之序且人一身之消長以齒候之內經云女子七歲腎氣盛齒更髮長至三七則腎氣平均故真牙生而長極七七則齒髮去矣丈夫八歲腎氣盛齒更髮長至三八則腎氣平均故真牙生而長極八八則齒髮去矣夫資身之器齒為最勞自能食以至終身咀判百品略無少鈍此亦神奇古人每旦以鹽湯漱滌而扣啄則彌堅亦衛生之道也大抵腎衰則齒豁動搖精固則齒堅齊密內丹訣云任督二脈為一身陰陽之海五氣真元此為機會而齦交二穴在唇內齒上縫為任督二脈之會一身之要世人罕知之至於漱煉為服此藥仙經云一物含五彩永作仙人祿言其備五行之英華總二脈之交會自古真人祕此二穴訣在於口不傳文字針經云足陽明之脈入上齒縫中手陽明之脈入下齒縫中是以胃氣虛則上齒卒痛大腸壅則下齒或浮胃有流熱則齒腫大腸經虛則齦宣二經之脈俱循於齒故病如是難經云足少陰氣絶則枯黑少陰者冬脈也伏行而溫於骨髓骨髓不溫即肉不著骨骨肉不相親即肉濡而卻故齒長而發枯無潤澤者骨先死戊日篤己日死中藏經云凡病齒忽黑者三十日即死臟腑配天地論韓子曰形而上者謂之天形而下者謂之地介於其兩間者謂之人人受天地之中以生莫不稟二氣以成形是以六氣緯空五行麗地人則默而象之故足厥陰肝居於巳手厥陰右腎居於亥巳亥為天地之門戶故風木化焉足少陰腎居於子手少陰心居於午子午得天地之正中故君火位焉足太陰脾居於未手太陰肺居於醜丑未為歸藏之標本故濕土守焉足少陽膽居於寅手少陽三焦居於申寅申握生化之始終故相火麗焉足陽明胃居於酉手陽明大腸居於卯卯酉為日月之道路故燥金行焉足太陽膀胱居於辰手太陽小腸居於戌辰戌為七政之魁罡故寒水注焉此三才應奉二氣相須不刊之說殆如指掌至於五行六氣遞相資生亦莫不有自然之序如厥陰風木生少陰君火君火生太陰濕土濕土生少陽相火相火生陽明燥金燥金生太陽寒水順天道而右旋所謂運行也或問君火生土土復能生相火火復生金其義何在此生成之道也相火既已發焰熅熅灰滅非土不成未見虛空能聚火金在礦非火不能煅出所以洛書火七居西屋金九居南屋蓋互顯其成能也若以一性而推之無所不備故木焚則為火絞則為水石擊則為火邃則為水洲渚之內江河競注大海之中火光常起此皆性之本有也又何疑土中火火中金夫木火土金水此乃常度人皆知之至於風暑濕燥寒謂之揆度鮮有能明其狀者故以木比風以火比暑以土比濕以金比燥以水比寒仍以上下二氣而配手足三陰三陽則謂之奇度又況五行各各不同有正氣有太過有不及天地氣化既然人之臟腑亦然感而為病或外邪或本氣或稟賦必當推類而調之血榮氣衛論人之一身所以得全其性命者氣與血也蓋氣取諸陽血取諸陰血何以為榮榮行脈中滋榮之義也氣何以為衛衛行脈外護衛之義也人受穀氣於胃胃為水穀之海灌溉經絡長養百骸而五臟六腑皆取其氣故清者為榮濁者為衛二氣周流不息一日一夜脈行五十度平旦以來復會於肺口所謂陰陽相貫如環之無端則是二氣者常相隨而不相離也夫惟血榮氣衛常相流通則於人何病之有一窒礙焉百病由此而生矣故氣之作恙發而為寒熱恚怒喜憂愁聚而為積痞疝瘕症痃癖上為頭旋中為五膈下為臍間動氣或喘促或咳噫聚則中滿逆則足寒凡此者氣使之然也血之為患其妄行則上衄其衰涸則虛勞蓄之在上其人忘蓄之在下其人狂逢寒則筋不榮而攣急挾熱則毒內瘀而發黃在小便者為淋痛在大便者為腸風其餘婦人月事進退漏下崩中病尤不一凡此血使之然也夫血譬則水也氣譬則風也風行水上有血氣之象焉蓋氣者血之帥也氣行則血行氣止則血止氣溫則血滑氣寒則血凝氣有一息之不運則血有一息之不行病出於血調其氣猶可以導達病原於氣區區調血何加焉故人之一身調氣為上調血次之是先陽後陰之意也若夫血有敗瘀滯泥乎諸氣則氣之道路未免有所壅遏又當審所先而決去之經所謂先去其血而後調之不可不通其變矣然而調氣之劑以之調血而兩得調血之劑以之調氣而乖張如木香官桂細辛厚朴以至烏藥香附莪朮三稜之類治氣可也治血亦可也若以當歸地黃輩施之血證無以逾此然其性纏滯每於胃氣有虧胃既虧則五臟六腑之氣亦餒矣善用藥者其間量劑而佐助之大凡治病當識本末假如嘔吐痰涎胃虛不食以致發熱若與涼劑退熱則胃氣愈虛熱愈不退惟先以助胃止吐為本則其熱自退縱熱不退但根胃氣已正亦可施以解熱之劑又有傷寒發大熱屢經寒涼疏轉其熱仍前但用調胃氣自然無事雖然心為血之主肝為血之藏肺為氣之主腎為氣之笥知血之出於心而不知血之納於肝知氣之出於肺而不知氣之納於腎用藥模稜往往南轅而北轍矣假如血痢作恙以五苓門冬等劑行其血以巴豆大黃等劑逐其積而其痛獨存者血之所藏無以養也必佐以川芎或川歸湯輩則其痛止假如喘咳氣鳴以姜橘枳梗蘇桔調其氣以南星半夏細辛豁其痰而終不下降者氣之所藏無以收也必佐以補骨脂或安腎丸輩則其氣歸元病有標本治有後先綱舉而目斯張矣經云腎間氣五臟六腑之本十二經脈之根呼吸之門生氣之原也學診例凡欲診脈先調自氣壓取病人息以候其遲數過與不及所謂以我醫彼知與神會則莫之敢違凡診脈須先識脈息兩字脈者血也息者氣也脈不自動為氣使然所謂長則氣治短則氣病也凡診須識人迎氣口以辨內外因其不與人迎氣口相應為不內外因所謂關前一分人命之主凡診須先識五臟六經本脈然後方識病脈歲主臟者氣候逆傳陰陽有時與脈為異此在謂也凡診須認取二十四字名狀與關前一分相符推說證狀與病者相應使無差忒庶可依源治療總論脈式經云常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻乃可診有過之脈或有作為當停寧食頃俟定乃診釋曰停寧俟定即不拘於平旦況倉卒病生豈待平旦經云切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰可以參決死生之分釋曰切脈動靜者以脈之潮會必歸於寸口三部診之左關前一分為人迎以候六淫為外所因右關前一分為氣口以候七情為內所因推其所自用背經常為不內外因三因雖分猶乃未備是以前哲類分二十四字所謂七表八里九道七表者浮芤滑實弦緊洪八里者微沉緩澀遲伏濡弱九道者細數動虛促結代革散雖名狀不同證候差別皆以人迎氣口一分而推之與三部相應而說證故脈贊曰關前一分人命之主左為人迎右為氣口神門決斷兩在關後沉細為暑濕皆外所因喜則散怒則激憂澀思結悲緊恐沉驚動皆內所因看與何部相應即知何經何臟受病方乃不失病機也但經所述謂脈者血之府也長則氣治短則氣病數則心煩大則病進文藻雖雅義理難尋動靜之辭有博有約博則二十四字不濫絲毫浮沉遲數總括紀綱故知浮為風為虛沉為濕為實遲為寒為冷數為熱為燥風濕寒熱屬於外虛實冷燥屬於內內外既分三因迥別學者宜詳覽不可憚煩也經中所謂視精明者蓋五臟精明聚於目精全則目明神定則視審審視不瞭則精明敗矣直視上視眩瞑眊瞑皆可兼脈而論病狀也所謂察五色者乃氣之華也赤欲如帛裹朱不欲如赭白欲如璧之澤不欲如堊青欲如蒼玉之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如炭五色精敗壽不久矣所謂觀五臟有餘不足候之五聲五音者臟之音中之守也中盛則氣勝中衰則氣弱故聲如從室中言者是氣之澀也言微終日乃復言者是氣之奪也譫妄不避善惡者神明之亂也鄭聲言意不相續陰陽失守也故曰得守者生失守者死所謂六腑強弱以候形之盛衰者頭者精明之府頭傾視深精神奪矣背者胸之府背曲肩隨胸將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府曲伸不能筋將憊矣骨者髓之府行則振掉骨將憊矣倉廩不藏者腸胃不固也水泉不止者膀胱不藏也得強者生失強者死此等證醫者要問在脈難明惟證易辨是故聖人垂教學者宜兼明之不可忽也診脈要法素問診脈與針經皆同取右寸口又名氣口氣口者肺部也在天者也為十二經皆朝於肺肺者相也天元之氣皆朝於此乃從天而下至地也難經診法從地上合於天何以知其然也始於春終於冬乃弦洪毛石四法一少陽二陽明三太陽四太陰五少陰六厥陰又說左手脈行陽道右手脈行陰道脈分表裡太過不及仲景傷寒診法自外之內左寸為始一足太陽寒二足陽明燥三足少陽火四足太陰濕五足少陰熱六足厥陰風以上六經皆足之六經在北方寒水東方風戌醜之位故始於傷寒病發於春為溫病無奇邪者不為外邪所傷此足六經皆以奇邪之火為附經者也叔和脈訣說左遷逆行天度為病故入式歌曰左心小腸肝膽腎右肺大腸脾胃命也圖解脈訣入式左心小腸肝膽腎左寸動脈所主洪手少陰心經脈手太陽小腸脈左關動脈所主弦足厥陰肝經脈足少陽膽經脈左尺動脈所主沉細足少陰腎經脈右肺大腸脾肺命右寸動脈所主澀手太陰肺經脈手陽明大腸脈右關動脈所主緩足太陰脾經脈足陽明胃經脈右尺動脈所主洪數手厥陰心包絡脈手少陽三焦相火脈寸左心小腸右肺大腸關左肝膽右脾胃尺左腎膀胱右心包絡三焦尺盛有病寸為陽借言男關尺為陰借言女說無病寸如陰女至此寸弱而此說順也尺弱有病寸為陽借言男關尺為陰借言女說無病尺如陽男至此寸盛而此說順也春夏背陽在上抱陰在下春夏背陽而抱陰春升夏浮順春夏不升浮反秋冬背陰在上抱陽在下秋冬背陰而抱陽秋降冬沉順秋冬不沉降反左寸關尺左尺屬腎水所主者異右寸關尺右尺屬相火受病則同男曰作強之官女曰技巧之官男子內結七疝女子帶下瘕聚三十六難曰臟各有一耳腎獨有兩何也然腎兩者非皆腎也其左者為腎右者為命門命門者精神之所舍元氣之所繫也男子以藏精女子以系胞故腎有二也潔古云男子女人皆以左為腎右為命門男藏精氣海也女系胞血海也所主者異受病一也論脈本始人稟天地五行之氣以生受父母陰陽之氣以成是以有五臟六腑四肢十二經三百六十五穴以象五運六氣四時十二月周天之度陰陽變化與天地同流乖其氣逆其理則陰陽交錯腑臟偏毗脈行遲速榮衛失度百病從生非脈無以探賾索隱所謂脈者乃天真之一氣是故上古聖人論理人形列別臟腑端絡經脈會通六合各從其經氣血所發各有腧名所以善診脈者靜意視義觀識之變於冥冥之中以神合神忽然獨悟口弗可言先別陰陽審清濁次之分部視喘息聽聲音而察病所生所謂陰陽者至者為陽謂隨呼而出也去者為陰謂隨吸而入也動者為陽鼓擊躁急也靜者為陰來去沉沉默默也數者為陽謂一呼一吸六至也遲者為陰謂往來不滿三至也於三部九候之內察其脈形有獨異者謂獨大獨小獨疾獨遲獨不應四時者乃受病之所也凡人稟形氣有中適有躁靜各各不同氣脈潮動亦各隨其性韻故呼而脈再至吸而脈再至呼吸之間復一至合為五至此為中適者也春秋中日夜正等其呼而脈至多吸而脈至少或吸而脈至多呼而脈至少此則皆不同為冬夏日夜長短之異也凡氣脈呼吸晝夜變通效於四時然於呼吸定息應五至之限無有虧僻猶晷刻與四時長短而歲功日數無異也若人狀貌有羸有壯其呼吸雖相接續而晝夜息度隨其漏刻是謂呼吸象晝夜變通效於四時也脈論十二經其實一脈也界為十二分而已何以知之手太陰起於中焦出於大指之端手陽明起於大指之端上挾鼻孔足陽明起於鼻交入大指間出其端足太陰起於大指之端注於心中手少陰起於心中入掌內循小指手太陽起於小指之端斜絡於目內眥足太陽起於目內眥至小指外側足少陰起於小指之下注胸中手厥陰起於胸中循小指次指出其端手少陽起於小指次指之端至目鋭眥足少陽起於目鋭眥入大指循歧骨內出其端足厥陰起於大指叢毛之際上注肺中以此考之故知其血氣通流相貫未嘗間斷終而復始如環無端不然何以云流注也然必始於中焦者何也扁鵲云焦者原也人受天地之中以生所謂沖氣其天五之氣始自中原播於諸脈寅時注於肺卯時注於大腸辰時注於胃巳時注於脾午時注於心未時注於小腸申時注於膀胱酉時注於腎戌時注於心包絡亥時注於三焦子時注於膽丑時注於肝寅時復注於肺上合雞鳴下應潮水其氣與天地同流加一至則熱減一至則寒上魚為溢入尺為覆古人處百病決死生候此而已東方甲風膽乙木肝南方丙熱小腸丁火心西南方戊濕胃己土脾西方庚燥大腸辛金肺北方壬寒膀胱癸水腎甲乙丙丁戊己庚辛壬癸風木熱火濕土燥金寒水肝膽小腸心胃脾大腸肺膀胱腎丙三焦相火父氣也無狀有名丁命門包絡母氣也後天之根甲丙戊庚壬氣溫熱涼寒升浮降沉在天為天元一氣又為寒暑燥濕風火在人為六腑又為呼吸榮衛乙丁己辛癸味辛甘淡鹹苦酸散緩急軟堅收在地為三陰三陽又為金木水火土在人為五臟又為皮肉筋骨脈帝曰地之為下否乎岐伯曰地為人之下太虛之中者也帝曰馮乎岐伯曰大氣舉之也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故燥熱在上溫氣在中風寒在下火遊行其間寒暑出入故令虛而生化也人亦應之故心肺在上脾胃在中肝腎在下三焦元氣遊行其間通行十二經脈如經行至肺之分野以肺經言之至肝之分野以肝經言之之類是也若名命氣以氣命處主生化氣血維養神明者也衰則從火化神氣衰矣黃帝曰脈行逆順奈何岐伯曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹以上說十二經之血脈左遷非元氣真氣穀氣三焦之氣右遷也數者皆胃氣之別名也或曰腎臟對分之者是分男女之異耶願聞其說答曰男子婦人之脈豈有異乎舉世之人皆當以左手尺脈常弱右手尺脈常盛為得其平何者蓋左尺屬壬癸寒水膀胱腎之脈有水之體者然也難經曰按之至骨舉指來疾者腎也以此推之其為弱也明矣若右尺屬丙丁熱火三焦包絡之脈有火之體者然也難經曰浮而大散者心也以此推之其為強亦明矣右手尺脈男子主藏精施化婦人主胞胎有孕所主雖異所受則同俱為生化之原此三焦相火包絡十二經之元氣也故當常盛此男子婦女尺脈俱同而無異者也二脈乃真水真火之大要也惟命所稟於此根焉命之所繫於此司焉天地陰陽氣血強弱於此見焉大矣哉脈之在人其所主有如此者故經云微妙在脈不可不察也或曰左手頭指乃心與小腸動脈所主何云火之子願聞其說答曰左手頭指火之子者直指命門三焦相火在於左手寸口心君之位用事明君主無為相火代之內經云君火以明相火以位者是也脈經云手少陰之脈起自心中出屬心系心系者命門包絡三焦相火之別稱也顛倒右手尺脈於上為天部次於左手心脈之右以看之其理皎然若將兩手攙抄於前俱仰其手掌左手居外右手居里則木火土金水五行相序而經論四時之令無差忒矣六微旨大論曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之是次列五行相生之理也皆所以明顛倒右手尺脈次心火之右無疑矣三焦相火及包絡之脈人之元氣也周身何處無之是明相火用事主持陰陽之氣神明之府已叔和正為生育之本在下故言火之子也六經所屬心部在左手寸口屬手少陰經與小腸手太陽經合肝部在左手關上屬足厥陰經與膽足少陽經合腎部在左手尺中屬足少陰經與膀胱足太陽經合肺部在右手寸口屬手太陰經與大腸手陽明經合脾部在右手關上屬足太陰經與胃足陽明經合右腎在右手尺中屬手厥陰心包絡與三焦手少陽經合手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目其直者復從心系卻上肺出腋下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵小腸挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支復從肝別貫膈上注肺足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎合手少陽於䪼下交頰車下頸合缺盆下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者從跗上入大指循岐骨內出其端還貫入爪甲出三毛足少陰之脈起於小指之下斜趨足心出然谷之下循內踝之後別入跟中上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下貫臀內入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外後廉下合膕中下貫腨內出外踝之後循京骨至小指外側端手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉循臑內前廉上肩出髃骨之前廉上出柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中足陽明之脈起於鼻交額中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入大指外間出其端手厥陰之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘內下臂行兩筋之間入掌中循中指出其端其支者從掌中循小指次指出其端手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰出䪼其支者從耳後入耳中出走耳前過客主人交頰至目鋭眥
