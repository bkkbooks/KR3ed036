失音天南星丸治中風手足不遂筋脈攣急行履艱難口眼喎斜時發搐搦天南星炮天麻附子炮裂去皮臍乾蠍全者去毒炒藿香葉白殭蠶直者炒白附子炮各半兩上為末酒煮麵糊和丸如梧桐子大每服五丸至十丸薄荷溫酒下空心食前服天麻散治中風倒臥不識人及口面喎斜天麻麒麟竭白殭蠶微炒乾蠍微炒防風去蘆頭犀角屑各一兩麝香細研二錢上搗細羅為散每服不計時候以溫酒調下二錢升麻湯治中風口眼喎斜升麻防風去叉麻黃去根節掠去沫焙乾各一兩芎藭羚羊角屑鎊各一兩半桂去粗皮三分上粗搗篩每服十錢匕以水三盞煎至二盞去滓入竹瀝一合更煎三沸分溫三服空心一服夜並二服相去如人行五里良久更服以衣覆令汗出避外風天雄散治中風口面喎引目不合又令耳有風聲而聵面骨冷疼風眩頭疼天雄炮裂去皮臍細辛去苗葉微炒各一兩半山茱萸二兩半乾薑炮二兩半山芋防風去叉各三兩半上為散每服溫酒調下三錢匕漸加至五錢匕日再服勻氣散治中風口眼喎斜烏藥一兩白朮四兩旱蓮草甘草炙青皮去瓤沉香各五錢上㕮咀水一大盞紫蘇葉木瓜五片生薑三片大棗一枚同煎至七分去滓加鹽少許空心服忌濕面鮮魚等物防風湯治中風挾暑卒然暈倒面色青黑四肢緩弱喜呻缺口喎斜四肢不仁好笑防風去叉澤瀉桂心杏仁麩炒去皮尖乾薑炮甘草炙各等分銼散上每服四錢水一大盞半煎七分去滓食前服追風丸治中風口喎磁石煅醋淬十遍稱一分研石硫黃研一錢萆麻子十五枚去皮研干萵苣根三錢蕓薹子半兩上為末用醋麵糊和臨時旋為丸手心內安之用湯碗壓左喎安右手右喎安左手候口中正即去之乾薑附子湯治中風口面喎斜白聖散治中風口面喎斜天雄炮裂去皮臍山茱萸炒過候冷各二兩山芋三兩乾薑炮一分上為散每服用熟豆淋酒半盞調下二錢匕患重者加至三錢匕烏姜丸治諸中風口眼喎斜川烏草烏乾薑良薑各一兩上切碎以好醋一碗煮醋盡細切慢慢炒乾為細末醋麵糊為丸如梧桐子大每服五七丸茶清送下食前日進三服忌熱食一時人參丸治中風口眼喎斜手足無事語不謇澀止緣坐臥處對耳有竅為風所中筋牽過一邊連眼皆緊睡著一眼不合者服此藥二十日內眼口皆正人參草烏頭生去皮尖牛膝去油酒浸焙乾各一兩上為細末水煮麵糊為丸如梧桐子大每服十丸炒黑豆淋酒下二服聖子散治中風口喎伏龍肝牡蠣燒附子炮裂去皮臍取中心者用各等分上為散用三歲烏雞冠血調半錢匕如口喎向左邊即塗藥在右口角若喎向右邊即塗藥在左口角才見口正當即便急洗去藥遲洗即卻牽過口角慎之一方治中風著人面引口偏著人耳車急不轉加白礬治風入臟使人喑啞卒死口眼相引牙車急舌不轉喎僻者用伏龍肝散和雞冠血及鱉血塗之干即易及灸吻邊橫文赤白際逐左右隨年壯報之至三報三日不瘥更服之一字散治賊風吹著口眼喎斜烏頭生用青礬各半兩上為細散每用一字搐入鼻中取出涕吐涎大豆酒出千金方治卒中風口喎不正吳茱萸湯殺鬼毒中賊風口偏不語者蒜塗方治口眼喎斜用橡斗盛蒜泥塗合骨穴左喎左貼右喎右貼扯正即止之石灰膏出仁存方治中風口眼喎斜用石灰一合醋炒如泥斜向右塗左向左塗右立正即洗去一方水和又方出聖惠方用栝蔞擂爛絞取汁和大棗面搜作餅炙令熱尉如正便止不令太過治一切風口眼偏斜一名假蘇丸用青荊芥一斤青薄荷一斤一處砂盆內研生絹絞去滓用汁於瓷器內慢火同煎成膏余滓三分去一分粗滓不用將二分滓日乾為末以膏和為丸如梧桐子大每服二十丸日進三服忌動風物溫酒下萆麻膏治口眼喎斜不正大萆麻子一十四枚正東南枝上取七枚正西枝上取七枚巴豆七枚去皮上為泥成膏子後加麝香半錢一處和成膏子左患搐安藥於右手勞宮穴內用紙七重蓋定藥丸上碗坐在藥上碗用熱沸水蒸之如右患用左手略坐一時用手托碗便正也一方無麝香又方出聖惠方鱉甲烏頭各一兩生用上為末以醋調塗如正便拭去一方無醋治口喎用大豆麵三斤炒令焦酒三升淋取汁頓服一日一服一用黑豆麵治中風口偏不正以生鹿肉生艽同搗敷之專看正即速除之治偏風左患右貼右患左貼松葉酒出千金方治中風口面喎斜亦治三年中風不較者用青松葉一斤細銼搗如大豆木石臼中搗令汁出用生絹袋貯以清酒一斗浸二宿近火煅一宿初服半斤漸加至一斤頭面汗出即止或無酒只用水浸亦可油麻酒治中風口面喎斜用胡麻炒搗粗羅一斤生絹袋貯取酒一斗五升浸七日後每服三合稍稍服之加至四五合以瘥為度一方治癧瘍風用生麻油細嚼以熱酒空心服之蠶砂浸酒治中風口面喎斜口角流涎用蠶砂微炒搗碎五升以生絹囊貯取酒一斗五升浸經七日飲之三合至五合令常有酒氣以瘥為度治中風口面喎斜不正用雄雞血煎熱塗之正則止或新取者血使塗之亦佳塗緩處一邊為良蜘蛛摩方出聖惠方治中風口喎用蜘蛛大者一枚摩其偏緩頰車上及耳前候視正則止亦可向火摩之或取蜘蛛大網絲成團如彈子摩之亦可白魚膏治中風口面喎斜用衣中白魚七枚摩偏緩一邊才正便止恐太過凡患急邊緩邊皆有病先摩緩邊次摩急邊急邊少用治偏風口面喎斜一切熱毒風攻頭面用芭蕉根不以多少於甑內蒸兩次久取出爛研絞取自然汁每日飯後取二合生蜜一匙頭以酒調之頓服日再服治卒中風口喎不正及手臂不仁取空青末如豆大一枚含之即愈咽之亦可皂角膏出千金方治中風口喎不正語則牽急四肢如余無他苦此由居處不便因臥而孔風入耳客於陽明之經宜敷之用大皂角五兩去皮子下篩以三年米酢和左喎塗右右喎塗左干更塗之治中風口眼喎斜及治風頭旋腦轉出聖惠方用樹東南枝上蟬殼七月七日收不以多少細研如粉入寒食麵用醋調為糊如左喎塗右口角右斜塗左口角候口正急以溫水洗去藥治患風牽引眼目及口角喎斜出危氏方用鱔魚一條以針刺頭上血左斜塗右右斜塗左以平正即洗去鱔御風膏一名萆麻膏出聖惠方治口眼喎斜由中風傳入陽明經也用東西枝上萆麻子七粒去殼研碎塗在手心中以一盂子置在手心萆麻子上用熟水置盂中正則急取盂子左癱塗右手心右癱塗左手心口眼才正急洗去藥只隨病處左右貼亦可又治産難者爛研塗兩腳心生下便洗去一方用萆麻子十四粒爛研以油調得所左喎塗右右喎塗左枳殼方出聖惠方治中風口僻眼急以枳殼刮取上青為末欲至瓤上者得茹五升微火灼去濕氣以酒三升漬微火暖令得藥味隨性飲之一方治風氣滯壅腰腳疼痛用枳殼為末溫漿服之治中風口喎出聖惠方用巴豆七枚去皮爛搗左喎塗右手心右喎塗左手心仍以暖水一盞安向手心須臾便正即洗去藥並頻抽掣中指桂心方出千金方治中風面目相引偏僻牙車急舌不可轉積年痰飲漸成風口眼喎斜語不通蘇合薑汁調半盞青州丸子有神功年久痰飲停滯胸膈忽然痰涎壅盛手足頑麻口眼喎斜語言不正急用麝香蘇合香丸三粒生薑汁調開送下青州白丸子五粒如不能吞將白丸子研細灌下為妙口眼喎斜是中風筋疼煩熱遍身中急煎五匙加芍藥蘇合香丸速有功出溫氏隱居方風寒濕氣流於經絡忽然手足頑麻口眼喎斜項強筋痛遍身煩熱未可便用風藥宜煎局方三五七散加薑汁一盞服後用芍藥三錢用水三盞生薑十片煎至一盞半去滓作三次調蘇合香丸三丸服留滓再煎治風蒸手足疼痛口眼喎斜大腑祕熱痰涎滿口出護命方秦艽去沙半兩芎藭半兩天南星炮半兩當歸半兩荊芥穗半兩麝香三分天竺黃升麻各半兩木香一分麻黃去根十銖上細杵羅為末每服一錢半食後濃煎薄荷湯調下續命丹出衛生寶鑑治男子婦人卒中諸風口眼喎斜言語謇澀牙關緊急咳嗽吐逆睡臥不安川芎羌活天南星薑製川烏頭炮去皮臍肉桂白蘚皮當歸防風硃砂海桐皮熟地黃地榆虎骨鉛白霜烏蛇肉生乾蠍天麻各一兩牛黃雄黃各二錢輕粉一錢麻黃去根節四兩以好酒二升煮至一升不用麻黃用酒上為末麻黃酒汁蜜半斤同熬成膏與前藥末為丸如彈子大每服一丸豆淋酒下或蔥汁下不拘時候服犀角防風湯出衛生寶鑑治一切諸風口眼喎斜手足嚲曳語言謇澀四肢麻木並皆治之犀角防風各一兩荊芥連翹黃芩當歸桔梗薄荷全蠍炒各半兩麻黃七錢半不去節甘草炙天麻羌活大黃各一錢白朮四錢石膏一兩半獨活七錢細辛四錢山梔子七錢滑石三兩以上為粗末每服五錢水二盞入生薑十餘片同煎至一盞去滓稍熱服未汗再服如是病人臟氣虛則全去大黃服之至聖保命金丹出衛生寶鑑治中風口眼喎斜手足嚲曳言語謇澀四肢難舉精神昏憒痰涎並多生地黃七錢大黃半兩錦紋者佳蒲黃薄荷去土牛黃研龍腦研硃砂水飛各二錢半麝香一錢研青黛板藍根各三錢貫衆一兩去土真珠一錢半研以上除麝香龍腦珠子牛黃硃砂外搗為末蜜為丸如雞頭仁大每服一丸細嚼茶清送下或新水送下或病人嚼不得用薄荷湯化下無時此藥鎮墜痰涎大有神效用金箔為衣牛黃通膈湯出衛生寶鑑牛黃三錢另研大黃一兩甘草炙一兩朴硝三錢另研以上都作末每服一兩水二盞除牛黃朴硝外煎至一盞濾去滓入牛黃朴硝一半調服以利三兩行為度未利再服量虛實加減服之三蚣散治諸口眼喎斜蜈蚣一蜜炙一酒浸一紙裹煨熟共三條各去屎南星三個每個切作四段逐個如蜈蚣法制白芷半兩上為細末入真麝香少許熱酒調一錢食後服肉桂尉法肉桂一兩刮去粗皮搗羅為末上酒一大盞調肉桂末令勻以慢火煎成膏去火良久用匙攤在一片帛上貼在腮上頻頻更用熱瓦子尉令熱透專看正即去桂膏患左貼右患右貼左秦艽升麻湯治中風手足陽明經口眼喎斜風寒四肢拘急升麻葛根炙甘草芍藥人參去蘆各半兩秦艽香白芷防風去蘆桂各三錢上件銼如麻豆大每服一兩水二盞連須蔥白三根各長二寸許煎至一盞去滓稍熱服食後服藥畢避風寒處臥得微汗即止消風散治口眼喎斜半身不遂多因下元虛弱為所乘先服順氣藥次服補藥卻用茶清消風散下青州白丸子而愈廣東談兄傳此方與友人何清之云此藥只服三日見效亦自有理天麻丸治男子婦人卒暴中風口眼喎斜天麻仁一錢半去苗栝蔞鬱金防風去蘆頭馬牙硝天竺黃甘草炙以上六味各一錢川烏頭黑參各半兩上件為細末入麝香少許煉蜜為丸每一兩作十丸每服一丸細嚼煎紫蘇湯下食後大聖鎮風金丹治卒患中風左癱右瘓口眼喎斜涎潮搐搦言語謇澀偏正頭風凡屬風疾悉皆治之每服一粒食後臨睡生薑自然汁磨化熱酒調服再飲少熱酒即就暖處覆以衣被候汗出即瘥病小者每粒分二服忌發風物孕婦不可服川烏頭四兩去皮臍稱全蠍一兩去毒生用晉礬二兩甘鍋內枯存性稱附子四兩炮去皮臍稱白蒺藜二兩炮去刺另研稱防風四兩去蘆頭稱五靈脂二兩去石別研白附子四兩生用白殭蠶二兩去絲嘴微炒硃砂半兩另研細稱沒藥二兩去石另研稱麝香半兩另研細稱上為細末以熟湯放冷磨京墨一兩成濃汁搜和合勻每溫劑一兩可停分作四丸只於風中干之不可日曬金箔為衣清涼丹治風熱壅實上攻頭面口眼喎斜語言不正肌肉瞤動面若蟲行及治傷寒熱盛狂言昏冒剛痓一切風熱並皆治之天南星四兩臘月黃牛膽制者牛黃三兩另研蠍梢去毒炒石膏以上二味各一兩半白花蛇酒浸取肉犀角屑防風去蘆頭甘草炙真珠末硃砂大黃以上七味各一兩腦子半兩另研上件為細末研勻煉蜜為丸每一兩作十丸薄荷湯化下食後臨臥服治中風口喎以葦筒子長五寸一頭刺於耳內四面以面蜜封塞不透風一頭以艾灸之七壯患右灸左患左灸右耳痛亦灸得
