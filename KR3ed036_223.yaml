body:
  text: 卷二百二十三諸虛門補虛駐顏色附論夫血氣者人之神又心者生之本神之變其華在面其充在血脈服藥以駐顏色當以益氣血為先倘不知此徒區區於膏面染髭之術去道遠矣方薯蕷丸出聖惠方用治風虛益顏色令人體健氣力強壯薯蕷肉蓯蓉酒浸一宿刮去皴皮炙乾熟乾地黃菟絲子酒浸三日熬干別搗為末附子炮裂去皮臍赤石脂各二兩牛膝去苗五味子澤瀉山茱萸白茯苓巴戟柏子仁炒桂心人參去蘆頭白朮乾薑炮裂銼各一兩上件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大每日空心溫酒下十丸加至四十丸枸杞子丸出聖惠方大補虛損益顏色久服輕身不老強力倍志養精氣壯筋骨枸杞子二兩熟乾地黃人參去蘆頭茯神附子炮裂去皮臍覆盆子五味子薯蕷菟絲子酒浸三日曝乾別搗為末肉蓯蓉酒浸一宿銼去皴皮炙乾石斛去根銼山茱萸桂心各一兩上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸鍾乳丸出聖惠方能補益臟腑悅澤顏色聰耳明目輕身益力鍾乳粉三分巴戟牛膝去苗甘菊花石斛去根銼續斷防風去蘆頭枸杞子羌活桂心覆盆子酒浸焙雲母粉各二兩熟乾地黃磁石燒醋淬七遍搗碎細研水飛過各三兩上件藥搗羅為末入鍾乳磁石雲母粉等研令勻煉蜜和搗三五百杵丸如梧桐子大每日空心以溫酒下三十丸附子丸出聖惠方能補益駐顏去風利氣暖腰膝充肌膚強志力久服變白髮令黑齒落更生延年不老附子半斤炮裂去皮臍另搗羅為末牛膝三兩去苗生地黃一十斤搗絞取汁拌附子末日中曬令乾肉蓯蓉二兩半酒浸一宿刮去皴皮炙乾白蒺藜一兩半微炒去刺五味子乾薑炮裂銼桂心天麻鹿角膠搗碎炒令黃燥各二兩乾漆一兩搗碎炒令煙出上件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大每日空心溫酒下三十丸漸加至四十丸骨補丸治下元傷憊駐顏悅色黃狗脊骨一條兩頭去兩節截為五段取硇砂一兩細研以漿水一升調攪令消化作水下脊骨在汁中浸三宿後用炭火炙乾以汁刷之汁盡為度肉蓯蓉酒浸切焙桂去粗皮附子炮裂去皮臍乾薑炮各一兩蛇床子炒牛膝酒浸焙乾各半兩鹿茸一隻酥炙陽起石火煅研為粉五味子胡椒各半兩上搗羅十味為末和前狗脊骨末用棗肉五兩酥一兩相和攪搗一二千杵軟硬得所丸如小豆大曝乾每日鹽湯下一十丸服一月其精溫暖兩月精結實三月精祕不泄益顏色壯筋力百病不生十精丸服之半年面如童顏頭白反黑四肢輕健百節歸神枸杞子天之精益壽熟地黃地之精和氣桂心木之精和骨菊花日月之精明目定志和血山茱萸土之精補丹田菟絲子金之精和筋骨暖水臟補丹田酒浸三日另研肉蓯蓉水之精補丹田水臟酒浸漢椒火之精去汗碾開明目暖水臟柏子仁陰陽之精定志白茯苓正之精定顏和血散水消渴上各等分為細末酒糊為丸如梧桐子大每服三十丸空心溫酒送下鹽湯亦可婦人醋湯服大有神效一方用乾山藥土之精不用山茱萸地黃煎丸出聖惠方能補暖臟腑久服輕身益顏色強志力補虛損生地黃五斤肥好者苣蕂子微炒附子炮裂去皮臍補骨脂微炒各三兩牛膝去苗威靈仙鹿角膠搗碎炒令黃燥桂心乾漆搗碎炒令煙出二兩生黃精三斤以上二味淨洗於木臼中爛搗絞取汁旋更入酒三升於銀鍋中以慢火熬成膏上為末入地黃黃精煎中和搗五七百杵丸如梧桐子大每日空心溫酒下三十丸晚食前再服楮實丸出聖惠方能補益元臟療一切氣疾暖脾腎久服令人身輕悅顏色壯筋骨楮實微炒半升鹿茸塗酥炙去毛附子炮裂去皮臍牛膝去苗酒浸切焙巴戟天去心石斛去根各四兩乾薑炮桂去粗皮各二兩上為細末煮棗肉和杵一千下丸如梧桐子大每服三十丸溫酒或鹽湯下一方用麋角無鹿茸煉蜜為丸忌豆豉汁生蔥容顏不老丹方一斤生薑半斤棗二兩白鹽三兩草丁香沉香各半兩四兩茴香一處搗煎也好點也好修合此藥勝如寶每日早晨飲一杯一世容顏長不老枸杞煎出聖濟總録用去萬病通神明安五臟延年駐顏枸杞汁地黃汁各三升麥門冬汁半升杏仁湯浸去皮尖雙仁研如膏一升人參搗末白茯苓去黑皮搗末各三兩上以銀鍋慢火先熬前四味如稀餳入人參茯苓末拌勻又煎候如膏入瓷合盛每服半匙酒溫和服之日二枸杞丸出聖濟總録能補真氣壯丹田悅顏色充肌膚枸杞子十兩甘菊花四兩桂去粗皮一兩半白茯苓去黑皮茯神去木熟乾地黃焙各一兩上為細末煉蜜五兩入薄荷汁半盞同熬得所和丸如梧桐子大每服二十丸空心食前溫酒下巴戟丸出聖濟總録用益真氣長肌肉悅顏色美食明目巴戟天去心甘菊花擇各二兩熟乾地黃焙一兩半枸杞子蜀椒去木並閉口者炒出汗各一兩附子炮裂去皮臍半兩上為細末煉蜜丸如梧桐子大每服十五丸溫酒或鹽湯下空心食前桃仁煎出千金方桃仁為末蜜各一兩酥半斤胡麻一升末牛乳五斤地黃十二斤取汁上合煎如餳旋服沉香鹿茸丸出傳信適用方能補益下元滋養真氣明目駐顏色治諸虛不足久服大效沉香一兩大附子炮裂去皮臍二兩鹿茸燎去毛酥炙三兩蓯蓉酒浸洗四兩菟絲子洗淨酒浸五兩熟地黃洗淨酒浸焙乾六兩上為細末煉蜜為丸如梧桐子大每服三五十丸空心食前溫酒吞下不老丹蓮子肉一斤酒浸三日曬乾藕節一斤八兩去土曬乾白茯苓一斤半去皮枸杞子半斤生用熟地黃四兩九節菖蒲四兩生用上為細末煉蜜丸如梧桐子大每服三十丸空心溫酒下地黃煎丸出聖惠方能補益駐顏常服黑髭發填骨髓令人耐老生地黃五斤搗絞取汁入蜜半斤以慢火熬成膏熟乾地黃杏仁湯浸去皮尖麩炒微黃研膏各半斤牛膝去苗訶黎勒皮各五兩上為末以地黃煎都和更搗一二千杵丸如梧桐子大每日空心以溫酒下五十丸晚食前再服丹砂油出聖濟總録可悅顏色丹砂研蜜煉各二兩麝香研龍腦研各一分上將丹砂以水飛過澄去清水入後三藥一處合和入一新竹筒內別用鐺一口黑豆五升安藥筒子在豆內四圍令固以火煮候豆變熟為度將柳枝子攪候成油取出用瓷盒盛每日空心溫酒下半錢山芋丸出聖濟總録用補丹田悅顏色長肌膚進飲食山芋仙靈脾各一兩車前子酒浸潤經宿焙乾菟絲子酒浸經宿別搗焙乾各三兩上為細末煉蜜和丸如梧桐子大每服十五丸溫酒或鹽湯下食前秦椒散出聖濟總録主變白延年駐顏秦椒去目並閉口微炒出汗白芷旋覆花各五兩桂去粗皮二兩上為細末每服一錢每日空腹以井華水調下三靈丸出聖濟總録主延年駐顏松脂煉成者別研煉法再後甘菊花去莖葉白茯苓去黑皮各二斤上除松脂外搗羅為細末松脂煉蜜和搗千餘杵丸如彈子大每服一丸溫酒空心嚼下駐春丹出瑞竹堂主縮小便美顏色好白茯苓四兩水飛去皮及沙細研為末白麵一斤另頓人參一兩不用銅鐵捶碎川椒一合以木砑碎去目青鹽一匙頭上為粗末水二大碗煎至一碗與茯苓白麵和勻如臂大文武火燒熟三日服一料一月服十料半年之後當減三料每月止服七料又半年再減三料每月止服四料若兩日一次見小便乃見功效也如此不必常服含化丹砂丸出聖惠方能治風鎮心卒驚除邪久服悅澤顏色充益肌膚返老輕身延年益氣其功不可備述硃砂細研水飛過馬牙硝各一兩硝石半兩上同研如面入一小瓷瓶子中盛以油蠟紙三重固濟瓶口重湯中煮常令如魚眼沸水耗即添熱水至夜亦如白日不得歇火三七日滿開瓶子其二硝並在瓶子四面收取治熱毒風及鎮心神明眼其硃砂在瓶中心取出細研盒子中盛固濟養之一日使以一斤火煅之令通赤候冷開取出細研每一兩砂煮棗肉和丸作三百六十丸每日含化一丸咽津如要多合但依分兩酌度為妙也忌羊血鹹水凡砂丸出聖惠方主治百病安五臟堅筋骨駐顏容久服聰耳明目卻老延年充益肌膚能耐寒暑真辰州上色硃砂十兩作小石塊子者春蜜秋蜜各三升上用大竹一截可三尺來去卻青皮一重留底節將砂入筒內投蜜漬之坐竹筒安大鼎內架定用水煮竹筒以炭火慢煮日夜專看伺之蜜耗旋添蜜自五月五日午時日夜煮至七月七日住取出用暖水浴過入一絳紗袋子懸於一通油瓷瓶內勿令著底及四邊以繩子系口懸於一淨井內去水面五寸以來不用著水七日七夜滿取出將砂於乳鉢內研一千遍建一高臺置乳鉢於臺上朝太陽氣用紗籠罩卻免鳥雀糞也夜即朝太陰氣遇雨即收卻每日研一千遍後即於臺上直至九月九日即止用青州棗瓤和丸如緑豆大於瓷器中盛每日空心面東置一丸於舌上以自然津液咽之忌羊血鹹水二氣丹出聖濟總録主壯元氣駐顏色破久冷丹砂雄黃各一兩上研細用瓦盒子一隻入藥在內先用赤石脂封口後搗紙筋泥固濟陰乾次用粗瓷碗一口盛藥盒子又用陰乾浮萍草三兩擁定更以一瓷碗覆之內外用紙筋泥固濟亦候陰乾然後於地上掘一小坑坐定碗足令穩用炭半稱簇定頂上煅令通赤去火候冷取藥細研又用天南星半兩為末煮糊丸如梧桐子大取瓦盆一隻盛水半盆以竹篩子安盆上攤藥日內曬乾每日空心以井華水吞下一丸服此藥一料盡後過三二月方可再服牛乳丸出聖濟總録主潤肌悅色養氣補臟腑黃牛乳一斤生薑汁四兩上以生薑汁和牛乳煮熟入椒紅末一分白茯苓人參末各半兩熬成膏為丸如梧桐子大每服二十丸晚食前溫水下煉松脂法出聖濟總録用松脂十斤以桑柴灰汁煮三五次候色白止即用布濾入冷水中其精者入水即凝其滓棄之將精者再以無灰酒一斗慢火微煮令軟再濾令色白如玉淨器密收合藥旋取用夏姬杏仁煎出千金方用杏仁三升納湯中去皮尖雙仁熟搗盆中水研取七八升汁以鐵釜置煻火取羊脂四斤就釜內磨消納杏仁汁溫之四五日色如金狀丸如彈日三服百日肥白易容人不能識也一方用杏仁熬黃去皮尖搗服如梧桐子大日三治枯瘦令人潤澤無所禁咳逆上氣喉中百病心下煩不得咽者得茯苓款冬紫菀併力大良其藥生熱熟冷喉中如有息肉者亦服之補虛損益顏色用薯蕷於砂盆中細研然後下於銚中先以酥一大匙熬令香次旋添酒一盞煎攪令勻空心飲之除百病好容色一云益顏色用桃花以酒漬飲之三月三採又桃仁服之長生枸杞子酒丸出肘後方專治補虛長肌肉益顏色肥健人能去勞熱生枸杞子五升酒二斗研搗勿碎浸七日漉去滓飲之初以三合為始後即任性飲之補益方用天門冬細切陰乾搗下篩酒調三錢每日五六進之二百日知可以強筋髓駐顏色與煉成松脂同蜜丸佳硃砂丸出聖惠方主治百病利五臟安魂定魄養心益氣悅澤顏色久服輕身不老延年長肌肉補丹田聰明耳目功力甚多真辰砂一十兩上用白砂蜜一十斤煉令去盡白沫用長項瓷甕子一枚貯上件蜜其硃砂用夾生絹袋子盛以線系懸於蜜甕子內去底二寸以來用三五重油單子封系甕子口後於靜室內泥灶一所灶上安一深大釜又用新磚一塊安在釜內以襯甕子底更用新磚一塊壓甕子口須用東流河水以文火晝夜不停煮七復時旁邊別泥一口小鍋子別煎水亦不住火常令水熱候藥釜內水耗則旋旋添此熱水常令甕子水及七八分以來煎之煮七復時候灶自冷將此硃砂淨洗令乾研三復時用糯米飯和丸如黃豆大每日空心以溫酒下五丸或三丸不論老小並宜服之煮煉藥時忌婦人雞犬見之此藥神功神效不可量也忌鹽水羊血雄黃丸出聖惠方能補益筋血延年駐顏益壯志氣久服可以無疾身輕骨健耳目聰明其功難以備載雄黃磁石硃砂硫黃各二兩牛黃一兩細研麝香半兩細研上件藥前四味各於乳鉢內細研水飛過於淨瓷器中貯之欲修合時須五月五日收採青艾嫩者約一擔以來擇取用水淨洗木臼中爛搗於淨布中絞取汁可五升以來先泥一爐置銀鍋以慢火煎令成膏斟酌稀稠得所即先下磁石攪令勻次下硃砂又攪令勻次下雄黃又攪令勻良久去鍋下火即下硫黃又攪令勻次下牛黃又攪令勻次下麝香須細意熟攪要藥味勻候可丸即丸如緑豆大每日空心以溫酒下五丸忌羊血蒼朮丸出經驗良方主烏髭鬢駐顏壯筋骨明耳目除風氣潤肌膚久服令人輕健上以蒼朮不拘多少用米泔水浸三兩日逐日換水候滿日取出刮去黑皮切作片子曝乾用慢火炒令黃色細搗末每一斤末用蒸過茯苓半斤煉蜜丸如梧桐子大每日空心或臨臥溫熟水下十五丸別用白朮六兩甘草末一兩拌和勻作湯點之下術丸妙忌桃李雀蛤及三白育真丹出楊氏家藏方用暖臟腑逐風寒利腰腳黑髭鬢駐顏容蒼朮四兩川烏頭楝肉各二兩破故紙龍骨茴香各半兩上為細末以酒糊丸如梧桐子大每服五十丸湯酒任下食前服滋養丸出衛生家寶方大能助心氣益顏色遠志二兩去心人參一兩去蘆白茯苓三兩山藥五兩柏子仁二兩石菖蒲半兩熟地黃四兩天門冬三兩麥門冬三兩龍骨一兩別研上為細末煉蜜為丸如梧桐子大每服三十丸溫酒鹽湯下食前服大黃耆散出衛生家寶方主治勞倦補虛益顏色填骨髓黃耆生細銼款冬花焙牛膝去頭酒浸一宿焙柴胡去蘆洗秦艽生青橘皮去白炒茴香舶上者炒木香水調麵裹炮忌傷火以上揀淨各半兩貝母大者七個湯泡七次杜仲酒浸一宿劈開滲盡酒炙色黃肉桂去皮不見火穿心巴戟去心生用甘草炙黃萆薢石斛以上各一分附子大者七錢重炮裂去皮尖上十六味精細洗焙為末每服二錢水一盞生薑三片棗子一枚同煎至七分傾向盞內以碗蓋出汗去滓溫服日進三服忌生冷油麵炙爆帶殼物空心食前服茸附丸出朱氏集驗方專治下元補傷憊駐顏悅色壯筋力去百病黃狗脊一條去兩頭截作五七段帶些肉用硇砂一兩研以漿水二升調勻方下脊骨在汁中浸三日炭火炙乾以汁盡令黃色搗細後入諸藥肉桂去皮附子炮菟絲子酒浸二日蒸焙乾杜仲薑製乾薑炮鹿角膠炒肉蓯蓉酒浸焙各一兩蛇床子炒葫蘆巴炒陽起石酒煮一日研各半兩鹿茸蜜炙一兩半黃狗內外腎一副酒煮焙乾上細末用棗肉五兩酥一兩相和杵千餘下丸如緑豆大日乾每日鹽湯下二十丸增益八味丸出朱氏集驗方能滋養肝腎益心血利足膝實肌膚悅顏色真男子衛生之良藥也此方專理肝心腎之血澤瀉則引諸藥以歸腎熟乾地黃酒蒸日乾稱鹿茸去毛去皮五味子各四兩山藥大塊者酒浸一日山茱萸去核大附子一兩者炮牛膝酒浸一宿各二兩白茯苓牡丹皮去骨澤瀉酒浸一宿各一兩半上為細末用真鹿角膠半斤銼細入銀石器內法酒丸如梧桐子大每服五十丸空心溫酒鹽湯下治中益心悅顏色安神益氣令人肥健其功甚驗出本草取新麥門冬去心搗熟絞取汁和白蜜銀器中重湯煮攪不停手候如飴乃成酒化溫服之除風補衰久服不老令人好顏色肥健益陽道溫中去痼疾出本草用菊花水飲之荊州記云酈縣菊水太尉胡廣久患風羸常汲飲此水後疾遂瘳令人好顏色出本草以百花上露飲之令人肥白美顏色以麋骨煮作汁釀酒飲之補虛損益顏色用薯蕷於砂盆中細研然後下銚中先以酥一大匙熬令香次旋添酒一盞煎攪令勻空心飲之治腹內虛冷久服駐顏用生椒擇去不拆者除其黑子用四十粒以漿水浸經一宿盡令口合空心新汲水下去積年冷暖臟腑久服則能駐顏黑髮明目令人思飲食妙悅顏色以桃蠹食之令人肌膚潤澤益顏色用小麥苗作齏吃井華水令人好顏色用井華水和硃砂服之補益輕身延年附論夫人稟中和氣生兩儀間處寒暑四時之宜法陰陽五行之度莫不精氣內朗形神外融保其根則表裡豐盈失其源則邪慝浸蕩是則萬靈之要所全者形一身之先所存者氣形全則群動莫能犯氣存則衆妙由是臻乃知人之於身貴哉大矣若能清虛靜泰少私寡欲外不勞形內無損志恬淡是務動靜隨宜保氣全神深根固蒂悟厚味之損性知一過之害生愛憎不惑於情憂喜不留於意泊然無憾而體氣和平故使形神相親表裡俱濟也苟或背其至理徇彼囂情耳聆繁潰之聲目亂玄黃之色思慮役其心嗜欲亂其志既不能御氣以全身又不能餌藥而延壽欲其膠固長世綿歷永年不可得也是以善攝生者興寢有度則夭札莫得時遷昧養命者丁壯是憑謂修短必以分定斯乃惑反觀之理而不明固本之言自取其亡良可為嘆設使齒髮云耄體力漸衰如能固性命之基餌補益之藥即何異江河欲竭引別派以還流燈燭將殘假他油而更朗固有益矣誠宜勉歟今所纂諸方補其衆疾莫不品藥之性去病之源續筋骨之衰盈治血脈之枯朽君臣合度功效可憑倘志服以惟勤則上壽而可並方應驗打老丹補丹田安魂魄壯筋骨暖下元添精髓身輕體健益壽延年除百病長生不老駐顏色不問男子婦人並服無忌白茯苓去皮甘菊花川芎乾山藥烏藥金鈴子覆盆子鍾乳粉研山茱萸雲母石火飛過研續斷去蘆頭肉蓯蓉酒浸一宿焙附子炮去皮臍蛇床子桂心天雄炮如無附子代之巴戟水浸去心鹿茸去毛遠志去心白朮麥門冬去心牡蠣煅生地黃玄參去蘆獨活去蘆柏子仁五味子乾薑炮澤瀉丹參去蘆紫菀去蘆黃耆去蘆蔓荊子去萼枸杞子牡丹皮密蒙花芍藥甘草炙苦參去皮石斛去根熟地黃去蘆杜仲炒人參去頭牛膝蓽茇赤石脂研天門冬去心沙參菟絲子酒浸一宿茴香藁本去毛揀淨以上各等分上為細末煉蜜和搗一千下丸如梧桐子大每服三十丸溫酒送下日進三服不拘時候服至六十日見效按方云薛侍郎使經泥川見一女子將老人捶之因問其故女子曰乃妾之子也薛問汝年幾何答曰一百六十七歲昔有伯父向隱居於華山一日歸見妾夫婦年老無子手足不遂令服此藥至一百日身輕體健氣力加倍手足頓愈變為童顏經一年乃有此子薛曰願聞此方女子遂以授之鹿馬寶元丹扶陽抑陰有益無損此方得之異人所傳珍珠琥珀硃砂金箔銀箔真玉屑珊瑚屑犀角屑取以上八味各等分隨意細研沉香木香丁香乳香檀香人參茯苓白朮芍藥縮砂桂花當歸川芎白芷甘草生白豆蔻各等分五香十一藥隨意多少研為細末早秈米晚粳米炒好糯米大粟米造面麥五穀美種各隨意多少勻均炒熟為末上曳刺白馬雄鹿宰者煮肉節次剔取鹿馬全體之骨槌碎熬髓收攢下待骨體全有卻用大鍋總熬去骨將髓汁換砂鍋或銀器內更熬鹿馬膂肉莖肉另鍋熬至糜爛同熬下髓汁擂和成膏先用前項寶香藥末拌合隨意用五穀炒碾末肉汁盡用拌和干少用好酒搜和為丸如彈子大不拘時隨意細嚼鹽酒鹽湯飯水咽下丸藥仍以麝香為衣蓋此方富貴巨家可用雖不效亦可見其平生所積金玉諸香藥鹿馬寶物為藥服之受用在腹中豈不勝留於不肖子孫之用古人留此方不過以警看錢愚夫耳神仙苣蕂子丸出德生堂用此藥安魂定魄改易容顏通神仙延壽命生骨髓扶虛弱展筋骨潤肌膚補益丹田接養真氣活血榮顏百病永除根本堅固水火既濟昔有一老人耳聾目昏年至七十無子服此藥後齒落更生發白再黑二妻生一十三子壽至一百餘歲常服身體輕健氣力倍加行走如飛生地黃熟地黃何首烏各四兩苣蕂子九蒸九曝二兩人參肉蓯蓉酒浸牛膝酒浸菟絲子酒浸天門冬去心酒浸破故紙酒浸炒巴戟去心酒浸乾山藥五味子楮實炙覆盆子淨鹿茸嫩紅色者生用柏子仁去殼另研酸棗仁去殼另研白茯苓西枸杞各一兩核桃一十枚去殼取仁另研爛後入藥內再研勻上為細末用棗一斤去皮核煮熟研爛與藥末和勻杵千餘下再揉得所為丸如梧桐子大每服五七十丸空心溫酒下鹽湯亦可丸數任意加減服後乾物壓之玉霜丸出和劑方主治真氣虛憊下焦傷竭臍腹弦急腰腳軟痛精神困倦面色枯槁或亡血盜汗遺瀝失精大便自利小便滑數肌肉消瘦陽事不舉久服續骨聯筋祕精堅髓延年保命卻老還童安魂定魄換肌祕氣輕身壯陽益壽延年天雄十兩長大者以酒浸七日了掘二地坑以半稱炭火燒坑通赤速去灰火令淨以醋二升潑在坑內候乾乘熱便入天雄在內以盆合土擁之經宿取出去皮臍磁石醋淬七次更多為妙蓯蓉去皮酒浸一宿炙乾石斛去根炙硃砂飛研澤瀉洗酒浸二宿炙牛膝去苗酒浸焙乾巴戟穿心者各二兩茴香炒肉桂去粗皮各一兩家韭子微炒菟絲子酒浸一伏時蒸過一日乾杵羅為末去輕浮者各五兩紫梢花如無以木賊代之三兩牡蠣火煅搗為粉鹿茸用麻茸連須骨者先燎去毛令洗淨約三寸以來截斷酒浸一伏時慢火炙令脆半兩白龍骨一斤黏舌者細研如粉水飛三度日中曬乾用黑豆一斗蒸一伏時以夾絹袋盛日曬乾上為細末煉酒蜜各半和丸如梧桐子大每服三十丸空心晚食前溫酒下常服補真氣壯陽又云臨臥冷酒下三十丸相次更飲冷酒一杯投之既濟丹出百一選方主升降水火神益血久服延年令人不老嫩鹿茸三兩酥炙牛膝酒浸一宿肉蓯蓉酒浸一宿熟乾地黃酒浸蒸當歸去蘆酒浸一宿枸杞子酒浸一宿酸棗仁微炒別研入沉香別研山藥炒遠志用甘草半兩煮去甘草不用茯神各一兩半附子二兩半炮去皮臍柏子仁別研入一兩半上焙乾為細末棗肉丸如梧桐子大每服五六十丸空心食前溫酒鹽湯送下草還丹出瑞竹堂今夫草還丹者不用金石不加燥熱不傷五臟只以草藥為用全在制度之妙得水火既濟之術奪丹砂燒煉之功大壯脾胃能進飲食且脾屬中央之土乃五臟之主一失調養則五臟俱虛百病由此而生此藥益精髓補腎經固元陽輕腰腳安五臟通九竅令人耳目聰明有一老人年七十以上常服此藥悅顏容烏髭發固牙齒能夜書細字延年益壽乃仙家之良劑平補大效有驗蒼朮四兩酒浸一兩醋浸一兩泔浸一兩鹽水浸一兩各一宿葫蘆巴一兩酒浸一宿破故紙一兩酒浸一宿覆盆子二錢揀淨茴香一錢肥新者川楝子一兩木香半兩堅實者山藥堅白者穿山甲酥炙黃地龍生土淨茯苓堅圓者枸杞子牛膝各三錢酒浸一宿上曬乾為末無灰酒糊為丸如梧桐子大每服三五十丸溫酒送下或鹽湯亦可乾物壓之空心服畢須行百步使藥力行日進二服瑞竹堂方云此方得之刑部令史王國寶字渠人隸事時有一僧窩藏強盜部擬死罪渠人出之後僧以此方謝囑云惟西平章有此方不可亂傳當珍藏之後渠人於西平章施方冊內再得此方藥味分兩制度相同乃平章常服藥巴戟丸出御藥院方主治男子虛弱長命身輕巴戟酒浸去心益智杜仲菟絲子酒浸茯苓遠志肉蛇床子乾山藥牛膝酒浸去苗續斷以上各一兩山茱萸五味子各一兩二錢肉蓯蓉酒浸七日二兩上為細末煉蜜為丸如梧桐子大每服二十丸或三十丸空心溫酒下服五日筋骨輕健百日面如童子手心如噀血明白肌體眼目清爽若要祕精加柏子仁三錢精虛加五味子一兩半陽道不興加續斷一兩半遠志丸明目益精長志倍力久服長生耐老遠志茯苓細辛菟絲子木蘭續斷人參菖蒲龍骨當歸芎藭茯神各五分上為細末蜜丸如梧桐子大每服七丸至十丸日二夜一滿三年益智麋角丸聰耳明目補心神安臟腑填骨髓理腰腳能久立發白更黑耄者還少諸麋角丸方凡有一百一十方此特出衆方之外容成子羔服而羽化麋角取當年新角連腦頂者為上再看角根有斫痕處亦堪用退角根下平者是不堪用造此藥取角五具或四具三具二具一具為一劑先去尖一大寸即各長七八寸取勢截斷量把鎊得即於長流水中以竹器盛懸浸可十宿如無長流水處即於淨盆中滿著水浸每夜易換即將出削去皴皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即干握出舊水置新絹上曝乾淨擇去惡物粗骨皮及鎊不勻者即以無灰美酒於大白瓷器中浸經兩宿其酒及器物隨藥多少其藥及酒俱入淨釜中初用武火煮一食久後即又著火微煎如蟹目沸以柳木棍長四尺闊三指徐攪不得住手困則易人時時更添美酒以成煎為度煎之皆須平旦下手不得經兩宿仍看屑似稀膠即以牛乳五大升酥一升以次漸下後藥仍以麋角一條炙令黃為散與下列諸藥同制之檳榔通草秦艽人參甘草肉蓯蓉菟絲子酒浸二宿待乾別搗各一兩上搗為散如不要補即不須此藥共煎可一食時候藥似稠粥即止火少時歇熱氣即投諸藥散相和攪令相得仍待少時漸稠黏堪作丸即以新器盛貯以衆手一時丸就如梧桐子大若不能衆手丸就旋暖漸丸亦得如黏手著少酥塗手其服餌之法空腹取果漿以下之如無三果漿酒下亦得初服三十丸日加一丸至五十丸為度日二服初服一百日內忌房室服經一月腹內諸疾自相驅逐有微利勿怪漸後多泄氣能食患氣者加枳實青木香如前各一大兩若先曾服丹石等藥即以三黃丸食上壓之令宣泄如飲酒食麵口乾鼻中氣粗眼澀即以蜜漿飲之即止如不止加三黃丸使微利諸如此一度發動以後方始調暢服至二百日面皺自展光澤一年齒落更生強記身輕若風日行數百里二年常令人肥飽少食七十以上卻成後生三年腸作筋髓預見光明四年常飽不食自見仙人三十以下服之不輟顏一定而不變其修合時須淨室中勿令雞犬女人孝子等見婦人服之佳昔道士戴寧古於城市中遇一醉人召飲遺一詩曰尾閭不禁滄溟竭九轉靈丹妙難說惟有斑龍項上珠可補玉堂關下血約九月九日於峨眉山相見寧古如期而往果於太虛岩下見之授以修養之術曰子血氣動蕩虛且竭矣宜先服麋角丸使血氣填補筋骨壯盛乃可用此術寧古始悟斑龍之句服之逾年體輕色潤壽至一百七十歲留方以遺後人蓯蓉散輕身益氣強骨髓補不足能使陰氣強盛方肉蓯蓉五味子遠志甘草各一斤慎火草切楮實乾漆各二斤生地黃三十斤取汁上以地黃汁浸一宿出曝乾復浸令汁盡為散空腹酒服方寸匕早午晚日三服三十日力倍常雖御十女無損禿雞散有房室人常服勿絶方蛇床子菟絲子遠志防風五味子巴戟杜仲蓯蓉上治下篩為細末每服方寸匕早晚一日二服無室勿服長生不老丹蒼朮一斤四兩酒浸四兩醋浸四兩鹽湯浸四兩米泔水浸蓮肉一斤用豬肚一個入蓮肉煮去肚不用五味子四兩茯苓四兩枸杞子四兩熟地黃四兩上為細末酒丸如梧桐子大每服三五十丸酒或鹽湯下萬年延壽丹川烏一兩蒼朮竹刀刮去皮用二兩好花椒二兩炒出汗小茴香二兩微炒白茯苓二兩南木香一兩上為細末酒糊為丸如梧桐子大每服八十丸溫酒鹽湯下空心服以乾物壓之茯苓丹延年益壽黑髭發大有補益白茯苓去粗皮淘淨陰乾為細末四兩頭面十二兩人參末三錢上入青鹽少許用滾水和成劑如指大以文武火燒熟驗數作十日服一月服三料夏加干蓮子肉一兩余月加乾山藥一兩瓊玉膏新羅人參二十四兩舂一千下為末生地黃一十六斤淨洗搗取汁白沙蜜一十斤白茯苓四十九兩木杵舂搗末上以人參茯苓為細末蜜用生絹濾過地黃取自然汁搗時不用鐵器取汁盡去滓用藥一處拌勻入銀石器或好瓷器內封如器物小分兩處盛用淨紙二三十重封閉入湯內以桑柴火煮六日如連夜火即三日夜取出用蠟紙數重包瓶口入井內去火毒一伏時取出再入舊湯內煮一日出水氣取出開封取三匙作三錢祭天地百神焚香設拜至誠端心每日晨以二匙溫酒化服不飲者白湯化下此膏填精補髓腐化為精萬神具足五臟盈溢髓實血滿發白變黑返老還童行步如奔馬日進數服終日不食亦不飢開通心志日誦萬言神職高邁夜無夢想人生二十七歲以前服此一料可壽三百六十歲四十五十歲以前服此一料可壽二百四十歲六十三歲以前服者可壽二百一十歲服此劑絶其欲修陰功成地仙以一料分五處可救五人癰疾分十處可救十人勞瘵修合之時沐浴志心勿輕示人每服二匙溫酒化下空心服之五子丸出王氏博濟方主通流五臟潤澤血脈反老成少補助元陽余甘子覆盆子酒浸焙菟絲子去浮者酒浸蒸熟焙五味子炒車前子酒浸焙各五兩上為末取二三月間枸杞嫩葉搗研取汁二大升和藥末令汁盡為度又取杏仁一升去皮尖與無灰酒同研取汁五升於銀石器中煎令杏仁無苦味然後下地黃汁半升真酥五兩鹿角膠末五兩同於前汁中略煎過次下五味子末以柳枝急攪之慢火熬可丸即並手丸如梧桐子大每日空心溫酒下三十丸如熱任意加減此藥又治金石藥毒胡桃丸出御藥院方主益精補髓強筋骨延年益壽悅心明目滋潤肌膚治年高人臟腑不燥結久服百病皆除破故紙杜仲萆薢胡桃仁各四兩上將三味搗羅為細末次入胡桃膏子拌勻再搗千餘下丸如梧桐子大每服三十丸至五十丸空心溫酒鹽湯下一方有柴胡無杜仲忌羊血軟硃砂延壽水仙丹出經效濟世方主治男子元氣虛損壯筋骨延年益壽能治百病兼治酒色損憊上攻頭面下注腰腳面色黃瘦多睡少力精神恍惚胸膈不利多倦怠夜多小便兼治婦人血氣血風等疾及瘴疾硃砂有牆壁者不拘多少細研水飛過清麻油三兩白芨一兩銼如皂子木通一兩銼上於器內煎油下藥二味熬令焦黑色去二藥不用更煎油如黑餳相似以箸點油置水中成小花子不散為度傾在盞中旋旋滴油和硃砂令軟硬得所如面劑用皂角數梃揉濃水一碗洗硃砂令油去盡再以新水揉洗使油盡淨後以水浸之旋丸如梧桐子大空心以新水下七丸忌葵菜若治小兒急慢驚風以薄荷水下一丸不可常服宰臣丁謂奏廣西轉運使李睦進到軟硃砂延壽水仙丹先乞下翰林醫官院詳驗說曰金石藥伏火者皆有毒不可服臣聞君有藥臣先嘗之以殘年衰老先將此依方服至一月果攪輕健倍加飲食此藥無毒服之能體膚滋潤神采悅澤奏請修合遍賜大臣皆有功效三仙丸又名長壽丸出楊氏家藏方有詩曰一烏二術三茴香久服令人壽命長善治耳聾並眼暗理脾健胃及膀胱順氣搜風輕腰膝駐顏活血鬢難蒼空心溫酒鹽湯下誰知凡世有仙方川烏一兩去皮尖銼如骰子大用鹽半兩炒黃去鹽茴香三兩炒香蒼朮二兩米泔浸一宿用竹刀刮去黑皮切用蔥白一握炒黃去蔥上各為細末酒和為丸如梧桐子大每服五十丸空心食前鹽湯下一日進二服忌豬羊血有人年八十鬚髮皆黑云自三十以前日進此藥一服自不變白二靈丹出御藥院方主補暖臟腑祛逐風冷利腰膝強筋骨黑髭發駐容顏性溫無毒久服輕身延年不老何首烏雌雄各半採刮搗俱不犯鐵用濃米泔一伏時漉出於銀器內先排棗一重各擘開上鋪何首烏一重又用棗一重復再鋪何首烏一重令盡次日清河水於藥上有水約五指用慢火熬煮候棗極爛並何首烏稍軟取出不用棗只揀何首烏入在清冷水中浸少時用竹刀刮去黑皮及兩面浮沫令淨竹刀切作薄片子慢火焙乾取淨稱一斤牛膝揀去蘆頭並細梢只取中間粗者折作半寸用好酒浸二宿取出焙乾淨半斤上拌和勻用石杵臼內搗羅為細末煉蜜和丸如梧桐子大每日空心溫酒或米飲下六十丸服至半月加至七八十丸又服至一月加至一百丸服至一百日前疾皆瘥一方用何首烏三斤用銅刀或竹刀切如棋子大木杵臼杵搗牛膝一斤去苗銼以黑豆一斗浸淘洗曝乾用甑一口先以豆薄鋪在甑底下然後薄鋪何首烏又鋪豆又薄鋪牛膝如此重重鋪令藥豆俱盡安於釜上蒸之令豆熟為度去黑豆取藥曝乾又換豆蒸之如此三遍去豆取藥候乾為末棗肉和丸如梧桐子大每服三十丸溫酒下食前服忌蘿蔔蔥蒜何首烏丸出御藥院方主補養五臟六腑強筋壯骨黑髭發堅固牙齒久服延年益壽駐顏色用何首烏同前法制度入石杵臼內搗為細末煉蜜和丸如梧桐子大每日空心溫酒或米飲送下六十丸服至半月加七八十丸又服一月加至一百丸服之百日前疾皆去一方棗肉為丸忌豬羊血肉及無鱗魚補肝散治人肥悅明目延年不老及治五勞七傷用冬瓜仁七升以絹袋盛之投三沸湯中須臾出曝乾如此三度止又以清苦酒漬經一宿曝乾為末酒服方寸匕又方取冬瓜子三五升退去皮搗為丸空腹三十丸令人白淨如玉安五臟平三焦溫中久服增年又治瘦病用牛髓以酒送之又和地黃汁白蜜作煎食又方用胡麻三升去黃黑者微炙令香杵為末下白蜜三升和調煎杵三百杵丸如梧桐子大每旦一服二十丸腸化為筋年若過四十以上服益血輕身微有頭痛無害上用逍遙草搗為末煉蜜為丸如梧桐子大酒服三十粒日三服百日瘥金髓煎用枸杞子不計多少逐日採摘紅熟者去嫩蒂子揀令潔淨便以無灰酒於淨器浸之須瓦器用酒浸以兩月為限用蠟紙封閉緊密勿令透氣候日數足漉出於新竹器內盛貯旋於沙盆中研令爛細然後以細布濾過候研濾皆畢去滓不用即並前漬藥酒及濾過藥汁攪勻量銀鍋內多少升斗作番次慢火熬成膏切須不住手用物攪恐黏底不勻候稀稠得所傾出用淨瓶器盛之勿令透氣每早晨溫酒下二大匙頭夜臥服之百日身中輕氣壯積年不廢可以羽化鹿角散輕身益氣強骨髓補絶傷用鹿角銼為屑白蜜五升淹之微火熬令小變曝乾更搗篩服之枸杞煎出千金方主補虛羸久服輕身不老以九月九日取生濕枸杞子一升清酒浸六日煮五六沸取出熟研濾取汁令極淨曝乾搗末和前汁微火煎令可丸酒服二方寸匕日二加至三匕或為丸服三十丸菖蒲丸治臟腑衰憊面色萎黃牙齒疏落眼目昏暗及腰腳痠疼四肢困乏口苦舌乾久服延年益壽補益精氣和榮衛以九節菖蒲葉細如劍脊者八月取連根陰乾不退根以米泔浸硬竹刀刮去黑皮約一斤以淘洗黑豆一斗分一半鋪甑中候過熟去豆取菖蒲即將一半豆鋪覆炊之良久將釜水仍灑甑中候過熟去豆取菖蒲薄切焙乾搗羅為末浸炊餅和丸如梧桐子大每服三十丸空心溫酒或鹽湯下或稍加丸數亦可草靈丹出御藥院方主實髓壯筋輕身益血久服令人面色光澤反老為童齒落更生發白再黑補腎益真滋榮衛聰耳明目生地黃二斤細切用無灰酒一斗夜浸晝曬酒盡為度陰乾鹿茸去毛酥炙黃牛膝酒浸七日陰乾肉蓯蓉酒浸七日研如泥陰乾各二兩桂心蛇床子酒浸七日陰乾菟絲子酒浸七日研細陰乾遠志各一兩大棗百枚煮熟去皮核陰乾上為末煉蜜為丸如梧桐子大每日空心溫酒下三十丸服至周年去三十六風二十四氣無病不效有不測之功一方作酒蜜麵糊為丸輕身療病出本草拂取松花酒服松花似蒲黃者輕身養氣令人強健出本草用蓮的摩以為飯如粟飯食之又可為粥金鎖丹出瑞竹堂服此藥延年益壽不老添精和血注顏身輕壯筋骨養神氣效不可盡述遠志去心焙蛇床子酒浸微炒鹿茸各一兩半炒黃晚蠶蛾二錢紫梢花續斷各一錢海馬二對銼炒黃色黑牽牛取頭末二錢穿山甲五片炙黃木香麝香乳香各二錢半川茴香三錢上為細末酒糊為丸如梧桐子大每服五十丸空心溫酒送下七日可便見效何仙姑慶世丹出衛生家寶方世如有人抱一切危疾及癱瘓痛楚久在床褥旦暮齊心服之靈神必護一名四神丹能還精定魂魄安五臟和六腑添智慧烏髮黑髭去八邪一名還精丹能補五臟不安四肢少力口乾氣虛神亂骨節疼痛毛髮焦枯一名護命丹此藥稟天地之氣感得洞府仙岩間有神仙降靈居處立便去邪一名延靈丹如有惡疾居體不安行履艱難飲食不進或寢寐不安或痛連筋骨或十生九死服之是疾皆除駐顏色長肌膚耳目聰明四體強健延年益智枸杞子仙經云此藥是星之精益血海足筋骨補氣安神菊花仙經云是水之精服之耳目聰明去頭濕手軟利九竅通三焦去萼用遠志療胃膈痞悶去驚邪潤肌膚壯筋骨須用硬物椎破取去心車前子仙經云是鎮星之精益胃安意魄注顏去夜驚妄想巴戟仙經云是黃龍之精去心疾補血海輕身延年不老生地黃用乾者去蘆頭仙經云是太陰之精開心神去邪養脾胃五千榮衛神覆盆子仙經云是神門之精助陽輕身安五臟三萬六十神白朮仙經云是太陽之精能正氣止吐逆消食化痰溫榮衛蓯蓉用有肉者其藥一百一年一生入小腸補下元酒浸七日菖蒲細小九節者能升智慧添神明暖下元補虛減小便牛膝治濕腳氣腰膝疼痛去蘆頭酒浸七日地骨皮菟絲子酒浸七日晝夜曬乾炒令黃色為度續斷治五勞七傷細辛療百病順氣益血海去苗用何首烏性溫無毒上各用本土所生者等分逐藥擇洗搗羅為末煉蜜為丸如梧桐子大每服二十丸至三十丸空心食前溫酒下服一月百病不生服一年至二年返老還童顏貌若蓮花是病皆除元是神仙之術交藤丸出華他中藏經方能駐顏長算祛百病交藤根何首烏也用一斤赤白者茯苓五兩牛膝二兩上蜜丸如梧桐子大每服酒下三十丸忌食豬羊血延壽酒出華他中藏經方主療百疾黃精四斤天門冬三斤松葉六斤枸杞五斤蒼朮四斤上用水三杓煮一日如釀酒法空心服之輕身益力強骨髓補陽道鹿角燒為丹服之至妙出本草以鹿角寸截於瓷器中或瓦器中用泥裹大火燒之一日如玉粉亦可炙令黃末細羅酒服之益人變白不老出本草以南藤磨服之令人肌體輕健唐太妃所服方也出本草以生鐵漬水服餌者日取飲旋入新水日久鐵上生黃膏則力愈勝仙家輕身方出本草用雁腹中蓮子空腹食十枚身輕能登高涉遠雁食糞于田野中者佳輕身益氣出本草以枸杞莖葉及子服之延年方出本草以旱藕餌之唐書云姜撫言終南山有旱藕餌之延年狀類葛粉帝作湯餅賜大臣駐年方出本草以雞頭實作粉食之是長生之藥也小兒食之不長大延年益氣悅心明目補添筋骨治一切遺精滑精以破故紙十兩淨揀去皮洗過搗篩令細用胡桃瓤二十四兩湯浸去皮細研如泥即入前末更以好蜜和攪令勻如飴糖盛於瓷器中旦日以暖酒二合調藥一匙服之便以飯壓如不飲酒人以暖熟水調亦可服但禁食蕓薹羊血余無忌昔唐相國自序云豫為南海節度年七十有五越地卑濕病發忽內外衆疾俱作陽氣衰絶服乳石補益之藥百端不應元和七年有訶陵國船主事摩訶知豫病狀遂傳此方並藥豫初疑而未服摩訶稽顙固請遂服之經七八日而覺應驗遂爾常服其功神驗十年二月罷郡歸京録方傳之止泄除睡強筋益氣力久服輕身長年令人不飢變白去老取南旱蓮葉搗碎漬汁浸粳米九蒸九曝米粒緊小正黑珠袋盛之可適遠方日進一合不飢益顏色堅筋骨能行取汁炊飯名烏飯亦名烏草亦名牛筋草人言食之健如牛筋
