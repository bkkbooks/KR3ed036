body:
  text: 卷三百三金瘡門金瘡血不止附論夫血行脈中周行灌溉而無窮矣金刃所傷者深則其流湍激若海沸河決御之至難要在杜其沖溢之勢外觀其形內診其脈之如何若血出不斷其脈大而止者為難治若血出不止前赤後黑或黃或白肌肉腐臭寒冷喘急者亦為難治不可不察也夫金瘡去血其人若渴然每忍之常勿干食並肥之物以止渴慎勿鹹食若多飲粥輩則血溢出殺人不可救也又忌憤怒大言笑思想陰陽行動作勞勿多食鹹酸飲酒熱羹臛輩皆使瘡痛腫發甚者即死瘡瘥後猶爾出百日半年乃稍常耳凡金瘡傷天窗眉角腦戶臂里跳脈髀內陰股兩乳上下心鳩尾小腸及五臟六腑腧此皆是死處不可療也又破腦血出不能言語戴眼直視咽中沸聲口急唾出兩手妄舉亦皆死候不可療若腦出而無諸候者可療又瘡卒無汁者中風也瘡邊自出黃水者中水也並欲作痙候可急療不可止前赤後黑或白肌肉腐自寒冷緊急者其瘡難愈亦死也口血出不止則用方中止血藥敷之如洗開後瘡孔大甚且先用降真香龍骨沒藥摻之肉即生上瘡孔須用油單貼待膿血汁出莫待蔽塞如夏月用藥以薄荷葉貼瘡孔一日一度湯洗又用藥摻如肉上滿瘡口用手搦不痛如好肉一般即用收瘡口藥敷上卻莫貼待風稍著瘡口立收若未生實肉切不可先收瘡口裡面恐為患也夫金瘡血出不斷其脈大而止者三七日死金瘡血出不止前赤後黑或黃或白肌肉腐臭寒冷強急者其瘡雖愈亦難療也夫金刃中於經絡者出血必多腑臟空虛津液竭少無血氣以榮養故次補之也方當歸散一名內補散一名蓯蓉散出千金方治金瘡出血多虛竭此藥內補當歸銼微炒芎藭川椒去目及閉口去微炒出汗乾薑炮製銼白芍藥桂心甘草炙微赤銼黃芩吳茱萸湯浸七次焙乾微炒桑根白皮銼各半兩肉蓯蓉四兩酒浸一夜銼去粗皮炙令乾參去苗黃耆銼厚朴去粗皮塗薑汁炙令香熟各二兩上為細末每服以溫酒調下二錢日三四服一方有白芨無黃芩桑根白皮麻黃散出聖濟總錄治金瘡止血悶及疼痛麻黃去節兩半甘草炙白芷附子炮裂去皮臍乾薑炮當歸切焙續斷黃芩去黑心芍藥芎藭桂去粗皮各半兩上為散每服二錢匕溫酒調下空腹日午夜臥各一服可加至三錢匕內補芎藭散出聖惠方治金瘡傷筋骨疼痛下血多食少臟腑虛竭芎藭一兩半熟乾地黃當歸銼微炒白芍藥肉蓯蓉酒浸一宿刮去粗皮炙乾用以上各一兩蛇銜草乾薑炮裂銼各三分續斷二兩桂心附子炮裂去皮臍細辛各二分上為細末每服不計時候以溫酒調下二錢內塞散亦名黃耆散出聖惠方治金瘡去血多虛竭疼痛羸弱內補黃耆當歸芎藭白芷乾薑黃芩芍藥續斷各二兩附子半兩細辛一兩鹿茸三兩上制下篩先食酒服五分匕日三稍增至方寸匕一方無芍藥川大黃散出聖惠方治金瘡刀箭所傷血不止日夜疼痛川大黃銼生用甘草銼生用甘菊花旋覆花檳榔黃連去須白芷蔓荊花各一兩黃柏五兩銼桑根白皮二兩銼上為細末敷之神效蒲黃散出聖濟總錄治金瘡血出腹脹欲死甘草炙銼三分黃耆銼一兩蒲黃生乾地黃焙各一兩半當歸切焙芎藭白芷續斷各一兩上為散每服三錢匕空心溫酒調下日三四服血化為水而下若口噤斡開口與之仍加大黃一兩半龍骨散出聖惠方治金瘡出血不止龍骨烏樟根各三兩當歸銼微炒芎藭續斷熟乾地黃突厥白各一兩鹿茸半兩去毛塗酥炙令微黃上為末敷瘡上血即止如服即每服以溫酒調二錢日三服石灰散出聖惠方治金瘡血不止石灰二斗以童便浸五日細淘過大麻心桑葉各五兩檞葉一兩青蒿半斤刺薊益母草蕓薹子各六兩上以端午日收採相和石灰納臼中杵令爛後將各葉曬乾細研旋搗為散以敷瘡上一方無大麻心桑葉檞葉如神散出王氏博濟方治一切刀斧所傷血出不止並久患惡瘡龍骨研半兩虎骨炙研半兩丹砂研一錢鉛丹以火燒令通赤半兩膩粉一錢麝香研少許乳香一塊皂子大研上研極細一切瘡以黃連湯或鹽湯洗拭乾摻藥在瘡上不得以液沾著瘡口治金瘡出血不止方川芎續斷熟地黃各一兩鹿茸半兩塗酥去毛炙微黃烏樟根三兩突厥白一兩上搗為末敷瘡血即止如服溫酒調二錢日三服雄黑豆散出聖惠方治金瘡疼痛血不止雄黑豆半升緊小者是也柏葉半升銼蕓薹子桑根白皮銼烏賊魚骨各四兩黃連去須龍骨各二兩上為細末每用敷瘡上治金瘡下血出本草以青黛摩敷之治刀箭折傷生肌止血止痛出本草以會州白藥為末敷瘡上藥如白蘞出會州也金傷散出御藥院方治金刃箭鏃所傷血出不止及落馬打傷內綻血出亦皆治之白芨白蘞乳香各一兩龍骨半兩黃丹少許石灰半斤遠年者佳上為細末入黃丹有如淡紅色每用干捻在患處上用軟紙更以絹帛裹護之忌見水乾捻為妙定血散出楊氏家藏方治一切刀傷血出不止收斂瘡口天南星生槐花炒黃鬱金上三味各四兩半夏二兩生用沒藥另研乳香另研各二錢半上為細末以入沒藥乳香同研令勻如有傷處干貼瘡切忌水洗治金瘡出血多虛竭內補出千金方當歸三兩乾薑三分芍藥辛夷各五分甘草二分上制下篩酒服方寸匕日三夜一沒藥散出醫方大成治箭傷止血定痛定粉一兩枯白礬三錢另研沒藥另研風化石灰乳香另研各一兩上為末和勻摻上當歸散治金瘡去血多虛竭內補方當歸三兩芍藥細辛各五分乾薑三分甘草二分上為散以酒服方寸匕日三夜一忌海藻粉菜生菜黃連散出聖濟總錄治金刃所傷血出不止黃連去須檳榔銼生用木香白芷各半兩上為散摻所傷處血即止效如婦人血暈以童子小便調下一錢匕如臟毒瀉血以水煎服刀箭藥出聖濟總錄治金瘡血不止石灰遠年船上者燒一兩龍骨研半兩鉛丹炒三錢狗腦骨燒灰半兩上搗羅末敷瘡上風化散出聖濟總錄治金瘡止血定痛風化石灰一升乾薑三分生用生栗子末白藥各五兩上以端午日搗羅為末敷患處雄礬散出楊氏家藏方治金瘡血出不止雄黃別研乳香別研五倍子膩粉別研上等分為末依瘡口大小摻之血出立止其瘡不許封即干斂不痛一方有白礬黑散子出聖濟總錄治金瘡止血大黃三兩半童子小便浸三日後用紙裹碾巴豆一兩半漿水浸炒令黃半兩錢四十九文以解線系燒紅以酒五升淬盡羊脛炭一握七莖米醋五升淬盡用之上為細散隨傷損大小貼之疼痛立止瘡無瘢痕及能出箭頭止血大效婦人一切敗血極者可服一字溫酒調下神仙止血散龍骨一兩五色緊者訶子一兩白石脂半兩苧麻葉半兩系五月五日午時採來陰乾者上為細末水調服之如修合時不得令婦人雞犬見之灰韭散治金刃止血新石灰韭菜苧麻葉小秦王草上等分先搗三味爛汁著石灰再搗爛和成餅子亂草裹放背陰處用時碾碎末乾摻如神五月五日午時修合一方無小奇花治金刃或打傷血出不止出危氏方降真香末五倍子末銅末是銷下鏡面銅於乳缽內研細等分上拌勻敷傷損等處安豐手毆朱嵩碎首用此藥而愈黃金散治金刃傷止血定痛鬱金半夏各一兩風化石灰四兩上為末凡有傷損乾摻之治刀箭傷血出不止並折骨檳榔一個木香胡黃連各二錢重上為末敷瘡口上立止亦接得損骨傷中便貼之如研下指血來定速將藥裹定便得卻相連接治金瘡血不止疼痛出聖惠方生栗子一斤曬乾乾薑三分炮裂銼白芨五兩上於端午日搗細為散瓷器中貯每用時於瘡上敷之止血止痛極效治金瘡出血不止蒲黃一斤當歸二兩上制下篩酒服方寸匕日二桃紅散治金瘡出血石灰一升大黃四兩銼作骰子塊上同炒至石灰淡紅色去大黃用石灰加當歸海桐皮為末敷之南星散出聖濟總錄治刀刃所傷血出不止天南星三枚切焙鉛丹半錢上為散干貼立定檳榔散出聖濟總錄治金瘡出血痛甚桃紅散出聖濟總錄治金瘡或竹木所刺出血不止及疼痛乾葛粉染胭脂各一兩上研細乾摻在瘡上又用青絹以雞子清塗絹可瘡口大小仍先用篦子按去血令藥與肉平方以青絹蘸雞子清貼之石榴花散出聖惠方治金瘡傷破血流不止石榴花曝乾半兩一方用半斤石灰炒一斤半一方炒一斤上為散取少許敷瘡上捺少時血斷便瘥治金瘡血不止方出千金方煮桑根十沸服一升即止又方出千金方搗車前汁敷之血即絕連根取用亦效又方用柳絮封之又方以蜘蛛幕貼之血即止又方出聖惠方飲人屎五升愈治金瘡血不止取豉三升熱湯煮須食頃絞去滓納蒲黃三合頓服之蔥白方出朱氏集驗方治金瘡定痛止血以蔥白煨爛乘熱縛定痛血自止蔥冷再易後全無痕神驗傷者亦可以煨蔥白罨之使活一方以蔥葉炙取汁塗瘡上即止或用蔥莖葉煨熱爛研罯敷之亦治金瘡水入皸腫若為婦人所驚者取婦人中衣火烤令熱以熨瘡上張氏經驗方荊門軍點頭錄石城鄉人戴堯臣作尉試馬被馬勒拶於籬戴損大指甲離肉血淋將蔥白煨爛乘熱縛定痛與血隨止蔥冷再易遂不復痛後亦無痕跡小木匠姓雷腳跟為斧角所傷乘急用泥塞後攻注成腫發寒發熱不可立遂剔去舊土令血再出卻用煨蔥白敷之不移時痛住血止推官宋琢定驗兩處殺傷氣偶未絕亟令取蔥白鍋內炒熱以敷傷處繼而呻吟不已數日後傷合無事矣樂平人好鬥多傷樂平鮑宰每有殺傷公事未暇詰問先將蔥白敷傷損者活人甚眾大辟遂減傷損不必它求無蔥處以葉亦可只要炒熱為上時易為佳若傷多煨炮不及但以乾鍋內且烙且杵令涎出蔥熱用之為妙如聖千金散出衛生家寶方治金瘡出血痛不可忍海金砂生鬱金滑石各半兩上一處為末每服二錢用砂糖一塊新汲水調下不拘時候治金瘡血不止出儒門事親用薇末貼之立止治金瘡血出用孩兒茶亂末敷之隨愈治刀傷瘡血不止取楊梅樹皮嚼細安刀瘡上立愈治金瘡傷損血出出百一選方用生牛膽入石灰末候乾摻瘡即止以臘月牛膽入風化石灰懸當風處佳候乾用百草散治金瘡止血桑皮方治金瘡止血灰礦散出聖濟總錄治金瘡止血用古窯石灰紫礦各半兩同為散敷之灰彈散治金瘡止血速瘥治金瘡血不止兼痛方出聖惠方用麒麟竭末敷之止治金中經脈傷皮及諸大脈血出多心血冷則殺人出本草用炒鹽三撮酒調服之治金瘡止血生肌及惡瘡入水並無妨絕妙人號為上血竭也出聖惠方急刮真紫檀末敷之凡裹縛瘡用故布帛不寬不急如系衣帶即好一方用降真香為末敷之亦佳治金瘡止血止痛出刃方出肘後方用甑帶燒灰封其患處江南以蒲為甑帶取久者燒灰入藥味辛溫無毒甑帶久被蒸氣故能散氣通氣治金瘡血湧出取月水衣炙熱熨之又燒末敷之治金瘡血出不止以篩過石灰用旋殺豬血就盆內攪勻捻作餅篾穿熬干為末貼之治刀箭瘡止血並痛方出本草用茅香花罯之良一方以白茅針生挼敷瘡上治金瘡生膚止血出本草以研合子搗碎敷瘡上或云昔漢高祖戰時用此敷軍士金瘡故名研合子旋覆散治金瘡止血葛根飲治金瘡筋脈傷及諸大脈皆血出多不可止血冷則殺人方見箭鏃金刃入肉類治金瘡血不止痛出聖惠方用白芍藥一兩熬令黃杵令細為散酒或米飲下二錢並得初三服漸加一方為末敷之治金瘡血流破血出本草用莧煮汁飲之良治刀箭瘡有血不止方以小兒屎塗封之三日即瘥並不傷人五倍散出聖濟總錄治金瘡血不止亦治疳瘡以五倍子生用為散干貼血立定治金瘡血不止疼痛出聖惠方以龍骨搗末細研敷瘡上又方出千金方治金瘡血出不止以人精塗之神奇散出聖濟總錄