body:
  text: 卷二百八十諸瘡腫門諸疥附論夫瘡疥之為病雖苦不害人然而至難可者多矣素問云諸痛癢瘡皆屬於心多由心氣鬱滯或飲食不節毒蘊於腸胃發見於皮膚又方有所謂馬疥水疥乾疥種類不一生於手足乃至遍體或癢或痛或脹或腫或皮肉隱嶙或抓之凸起或㾦癗或膿水浸淫治之內當理心血祛散風熱外則加以敷洗理無不愈字書以疥有介守之義言疥雖微小然守形體而難治也是以疥有五名皆因風氣邪氣客於肌膚之間久則化而為蟲時則發作故為瘡腫焮赤痛癢者謂之大疥皮肉隱起結根搔之不痛謂之馬疥瘙癢皮起謂之乾疥三者為重以風熱深在肌肉故也若水疥㾦癗如瘭漿濕疥上面汁出特風熱淫於皮膚之間故淺而輕也然皆風熱之客故皆有蟲或以為蟯蟲內出理或然也治宜疏風滌熱當以熏浴敷塗之法與湯劑並行則善矣方神仙疥藥硫黃六兩雄黃三兩雌黃三兩天仙子三兩芫青二兩紅娘二兩寒水石二兩井泉石二兩桔白三兩黑狗脊八兩大風子仁三兩大黃三兩斑蝥二兩輕粉三錢蛇床子八兩人言三兩狼毒八兩川烏八兩藜蘆一兩上為細末生豬油調藥生絹袋盛之火炙即汁搽鼻間立效忌口苦參散出聖濟總録治遍身瘡疥風熱或痛或癢苦參三兩人參丹參沙參玄參各一兩秦艽去苗土一兩半白蘚皮升麻各一兩一分枳殼去瓤銼炒令黃色一兩梔子仁犀角屑二兩黃芩去黑心芍藥各一兩當歸切炒一兩半蒺藜子去尖炒一兩防風去叉一兩一分黃連去須一兩半白花蛇黃色去皮骨二兩上為散每服二錢用溫酒一盞調下日晚再服烏蛇散出聖濟總録治一切疥風癢瘑瘡等烏蛇酒塗灰去皮骨二兩羌活去蘆頭白蘚皮苦參枳實去皮麩炒蒺藜子炒去角人參黃芩去黑心山茱萸漏蘆牡蠣熬附子泡裂去皮臍白殭蠶玄參秦艽去苗土甘草炙銼防風去叉甘菊花搗各一兩上搗羅為細散每服五錢空心酒調下五參散出聖惠方治諸瘡風虛惡瘡人參去蘆頭玄參丹參沙參去蘆頭苦參各一兩蒺藜子炒杵去尖秦艽去苗土半兩梔子仁二分黃芩去黑心半兩烏蛇酒浸一兩獨活去蘆頭茯神去木山芋麻黃去根節細辛去苗葉防風去叉各半兩枳殼去瓤銼炒令黃色三分上搗羅為散每服三錢空心熱水調下日晚再服以瘥為度一方有甘菊花溫酒下名白蒺藜散升麻和氣飲出三因方治瘡疥發於四肢臀髀痛癢不常甚至憎寒發熱攻刺疼痛浸淫浮腫又癩風入臟陰下濕癢耳鳴眼痛並皆治之乾薑熟枳殼各半兩熟蒼朮桔梗升麻各一兩當歸乾葛茯苓白芷各二錢陳皮甘草各一兩半熟半夏芍藥各七錢半大黃蒸半兩上銼散每服四錢水一盞半薑三片燈心十五莖煎至七分去滓治疥瘡腰胯手足皆生疵疥者出千金方栝蔞根四兩黃連芍藥薔薇根雀李根皮黃柏各三兩苦參黃耆黃芩石龍芮二兩大黃當歸續斷各一兩上為末蜜丸如梧桐子大以薔薇飲服二十丸日二加至三十丸癢立止亦治癰疽疳疥白癬勿服又方治療瘑疥柿樹皮燒煙欲盡以缶蓋滅火研一兩荷葉如前法燒灰取一兩草烏去皮尖半兩硫黃半兩黃連半兩去須黃柏半兩去粗皮胡椒半兩雄黃研細半兩白蕪荑半兩研細辛半兩黃芩半兩白礬研三錢輕粉一錢上為細末和令勻濕瘡乾摻干瘡用烏桕油或酥或油蠟調塗夜間以手掌多搽藥有癢處即以手掌摩之一方有苦參無黃芩赤小豆散出聖濟總録治濕乾疥赤小豆三合炒乾納醋中如此七次人參甘草炙令赤色銼瞿麥穗白蘞當歸切焙黃芩去黑心豬苓去叉黑心各半兩防風去叉半兩黃耆銼薏苡仁升麻各三分上為細散每服三錢空心以粥飲調下日二夜一藜蘆膏出聖濟總録治瘡疥藜蘆去蘆頭一兩半石硫黃研豬牙皂莢乳香研各半兩附子一分杏仁去皮尖研三兩膩粉一分巴豆去殼研半分豬脂五兩酥二兩白礬研一分豬膽二枚上搗研九味為末先熬脂酥膽汁令沸即下諸藥末攪勻以瓷器盛每日塗摩三五度苦參散出聖濟總録治遍身瘡疥風毒瘙癢苦參白花蛇酒浸去皮骨炙各二兩黃連去須當歸切焙各三分人參玄參丹參沙參芍藥蒺藜子炒去角防風去叉各半兩上為細散每日不拘早晚溫酒調服二錢日一夜二妙功散出瑞竹堂方治疥瘡黃柏蛇床子白礬各等分上為細末用後藥煎油調搽清油二兩黃柏花椒巴豆數粒蔥三莖厚朴枳殼各少許上同清油一處熬數沸濾去滓將妙功散放於熱油內更加舊油燭一二枝放冷調搽赤小豆湯出仁存方治少年血氣俱熱遂生瘡疥變為腫滿或煩或渴小便不利赤小豆炒當歸去蘆炒商陸澤瀉連翹仁赤芍藥漢防己木豬苓去皮桑白皮炙澤漆以上各半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候熱甚者加犀角二錢半一方無漢防己當歸飲子出仁存方治心血凝滯內蘊風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦癗當歸白芍藥川芎生地黃白蒺藜荊芥穗各一兩何首烏黃耆甘草各半兩防風去蘆一兩上為細末每服四錢水一盞半生薑五片煎至八分去渣不拘時候溫服若於浴堂內服此藥就用胡桃仁七個去皮細嚼下飲酒一盞出汗神效治疥瘡獐腦白礬檳榔蕪荑剪草生硫黃蛇床子花椒細辛上用硫黃樟腦倍加如藥等分細研香油調敷瘡濕干敷一方加消風散又方治疥瘡雄黃硫黃黑狗脊白礬藁本蛇床子斑蝥巴豆各等分人言少許上為細末或烏桕油或豬脂調和為丸用氣呵手心熱將藥勻開搽之為驗一搽膏出仁存方治一切瘡疥雄黃黃連黃柏苦參蛇床鹿梨白礬剪草松糖上為末瘡干油調搽濕瘡干搽又方治疥瘡蛇床子一斤花椒全蠍各二兩五倍子百部白礬硫黃貝母各四兩上為細末香油調搽治癩頭疥瘡硫黃二錢半黃丹黃連藜蘆蕪荑五倍子各二分半黃柏一錢半穀雨前茶五錢上為末先將患處瘡擦用芝麻油調敷之治風疥瘡雄黃白硫黃狼毒人言蛇床子炒水銀輕粉末茶上為細末羊豬膏調塗之神異膏出仁存方治一切瘡疥全蠍七個去尾皂角一綻銼碎巴豆七粒去殼蛇床子取末三錢麻油一兩黃蠟五錢輕粉半字雄黃三錢另研上先將皂角全蠍巴豆煎油變色去三味出黃蠟化開取出冷定入雄黃蛇床輕粉和勻成膏先用苦參湯溫洗卻以藥搽瘡疥上神效一方加斑蝥七個去毒加蔥油煎又松葉煎湯淋洗神效苦參湯出危氏方苦參蛇床子白礬荊芥穗上各等分煎湯洗之治風疥及寒熱諸雜瘡方千年韭根好礬石雄黃藜蘆瓜蒂胡粉各一兩水銀三分上以柳木研水銀使星盡用豬脂一升煮藜蘆韭根瓜蒂三沸去滓入諸藥和勻調令相得即成以敷之神良一笑散治渾身疥癩瘙癢生惡瘡檳榔藁本硫黃苦參蛇床子五倍子白膠香各等分上為末濕者干搽乾者油調搽如頭上瘡便搽上不用剃甚者不過三五次平復如故大黃膏黃連十四銖藜蘆十二銖大黃一兩乾薑十四銖䕡茹十銖莽草十二銖羊躑躅十銖上搗篩以成煎豬脂二斤微火向東煎之三上三下膏成去痂汁盡敷之神效合時勿令婦人雞犬見之疥藥出百一選方雄黃硫黃地黃剪草蛇床子白礬飛亦得上等分為細末麻油一兩巴豆七粒同煎候巴豆焦去巴豆不用候油冷旋調藥搽藁本散治疥藁本蛇床子黃柏各半兩硫黃三錢半白礬五分輕粉炒一錢上同研勻油蠟為膏子搽之止疥一浴散出瑞竹堂方治疥瘡熱毒硫黃雄黃漢艽玄精石枯白礬各等分輕粉少許上欲治疥時早起空心飽食乾物勿食飲湯煎大防風通聖散一貼入白沙蜜二兩送神芎丸五七十丸入浴室內令汗出便休下湯浴將疥抓破用煎藥以清油搽之入浴室內洗就浴室內如此搽洗三次方才出浴更不須再搽藥合掌散治疥瘡䕡茹蛇床子各二兩苦參二錢生硫黃一錢雄黃輕粉各一錢上為細末香油調於手心擦之知熱鼻嗅之次將兩手交互合於大腿上安眠檳榔煎丸出聖濟總録治風毒疥一切風壅檳榔銼羌活去蘆頭枳殼去瓤麩炒獨活去蘆頭白牽牛微炒黑牽牛略炒各半兩上為末用大皂角一尺以上者一梃挼汁煎膏和丸如梧桐子大臨臥溫酒或熱水下三十丸量人虛實加減久患瘡疥服之即愈神捷散出聖濟總録治諸疥瘡吳茱萸一兩赤小豆四十九粒白蒺藜一兩白蕪荑仁半兩輕粉五錢石硫黃少許研上搗研為散令勻每用生油調藥半錢於手心內摩熱後遍揩周身有疥處便睡覺其疥自愈疥藥大風子舶上硫黃萆麻子白礬胡桃豬脂上為細末用生絹袋兒盛膏一處搽胡麻散出德生堂治心血凝滯內蘊風熱發見皮膚遍身瘡疥或癢或痛或膿水浸淫或發赤疹㾦癗胡麻十二兩荊芥苦參何首烏甘草炙威靈仙各六兩上為細末每服六錢酒調服茶清亦可隨證上下服六根散治蟲瘡疥鹿梨根黃柏根烏藥苦楝根不辣回根芫花根上為末麻油調敷之殺瘡藥出三因方羊蹄根生切二兩薑一分礬錢半硫黃一錢草烏頭一斤上以米泔淹一宿研極細入酸醋和勻入浴時抓破瘡敷之遲頃以溫湯洗去絶妙苦參散出衛生家寶方治遍身瘡疥經年不效苦參蔓荊子何首烏荊芥穗威靈仙各等分上為細末每服二錢食前酒調下日進三服忌發風物雞子塗方出聖濟總録治惡疥瘡雞子七枚炙熱取黃熬成膏膩粉亂髮灰白礬各一錢石硫黃研半兩上除雞子外研為末雞子膏和研令勻塗敷患處日三五度即瘥當歸丸治諸般瘡疥何首烏八兩草烏四兩苦參八兩赤土三錢半荊芥四兩上為細末醋糊為丸如梧桐子大每服六七十丸溫酒送下治疥瘡硫黃白礬薄荷石膏蛇床子上各等分生豬油調搽五龍散治諸疥瘡蛇床子炒花椒炒牙硝枯礬土硝各等分上為細末柏油調搽治風疥瘡何首烏蔓荊子蛇精草甘草荊芥上為末茶清調下忌胡椒酒日進三服治疥瘡全蠍檳榔藁本硫黃防風上為末油調掌中搽瘡上又方藜蘆一兩蛇床子銀硃枯白礬雄黃各二錢半上為末油調搽水黃膏出德生堂治一切疥瘡不用臭硫黃者有效真狼毒五錢倭黃三錢輕粉二錢水銀三錢末茶先研如泥上與前件藥三味俱為末入水銀內再碾為膏用一少許於手心搽捏時聞藥氣則瘡愈矣巴豆膏出聖惠方治一切疥瘡有蟲時作瘙癢巴豆七粒去皮研硫黃半兩細研白礬半兩燒灰蕪荑半兩豬脂三兩上為末煉豬脂成油入前藥末調和令勻每用蓮子大於手掌內搽塗之如意散出御藥院方治疥瘡時發癢痛乾漆生黑狗脊生輕粉研倭硫黃生研各一兩上為細末研藥令勻每用藥先微搔用生油調如稀糊搽患處一日三兩次合掌散出仁存方治疥瘡羌活獨活硫黃輕粉各二錢上為末用麻油腳敷塗手心中搽熱嗅了卻搽在瘡上硫黃散出仁存方治疥瘡硫黃荊芥穗黑狗脊蛇床子上為末油調成膏先以火灸瘡令癢抓破依前方嗅後搽瘡治疥瘡一名四聖膏出百一選方鹿梨根搗取不以多少生薑半之白礬隨意用吳茱萸看多少入上同於砂盆內入米醋爛研以淨器盛之候白醭生方可用遇浴時以代皂角不過一兩次即安若遍身生者尤宜用之治疥神效狼毒二錢細辛一錢水銀一錢輕粉半錢上為細末油蠟和劑作兩丸綿裹兩手將於周身疥多處放之一掃散治大人小兒諸般瘡疥白禿肥爛癢痛流水者如神香白芷五兩生不見人明礬五兩生臭硫黃一兩樟腦少許上為末香油調敷擦之再敷如此上三五次剋日見效用豬膏亦妙先以皂角蔥白煎湯洗淨後上藥治疥瘡海桐皮蛇床子雄黃硫黃上各等分為末香油調敷砒黃熏方出聖惠方治諸疥砒黃研雄黃研石硫黃研各半兩熟艾五兩末上同研和令勻將藥鋪在紙上令勻緊卷如餅饀樣用麵糊黏卻切為四段患人早食及大小便了當仰臥安藥於四口瓦內兩腋下兩腿下以火燒煙用水洗舊布單上以厚衣覆不令通風汗出至曉藥煙盡即去藥瓦以瘥為度烏頭散出聖濟總録治諸疥烏頭吳茱萸石硫黃莨菪子各一兩上為散用生油調如糊塗患處三五度即瘥硫黃塗敷方出聖濟總録治諸疥石硫黃研一錢蜀椒去目及合口者吳茱萸黃柏各一兩上搗研為散用生油調如糊塗敷疥上日二三異方疥瘡藥出經驗良方百發百中水銀滓五錢研細粉朴硝二錢天南星草烏各一錢上為末和勻用清油半盞又入連須蔥一根於油內煎令香熱去蔥將藥調塗患上治疥不拘久新方出本事方白蕪荑一兩檳榔吳茱萸各七兩硫黃二錢另研上為末麻油調抓破搽又方出直指方治諸疥干癢生明硫黃五錢黃丹樟腦各一錢輕粉半錢上為末干寒熱癢赤腫加荊芥三黃膏治疥瘡久不可者皂角三個斑蝥巴豆各二十個黃柏半兩上將臘脂一斤煎至藥黑色濾去滓次入硫黃雄黃末攪勻搽疥藥方蛇床子一兩香白芷二錢舶上硫黃一錢半上為細末香油調搽疥藥方寒水石舶上硫黃川椒蛇床子各等分上為細末小油調搽忌頭口雞鵝肉疥藥方羊尾子油二片大楓子二十個去皮白硫黃一錢楂肉三十個去尖上合做一處搗爛用生絹布袋裝每日掌在手中聞又方明礬制枯一錢蛇床子二錢半樟腦一錢明硫黃一錢上為末搽在九竅內臍中腋下等處神驗吸氣入吐自然好備急葛氏療疥方取楝根削去上皮切皂莢去皮子等分熟搗下篩脂膏和搔疥去痂以塗之護風勿使女人小兒雞犬見治疥瘡用黑神散酒調服畢即入混堂洗浴蕩即愈治瘡疥花椒三兩香油四兩烏桕油四兩舶上硫黃一錢上用香油浸椒一晝夜用鐵器以油熬椒慢火數沸候椒焦色去皮椒入桕油候油溫些入硫黃冷成膏搽瘡荊芥丸治疥瘡及風熱瘡以荊芥穗不拘多少為細末蒸爛入蘿蔔於木石器內爛搗為丸如梧桐子大每服三四十丸食後茶湯熟水任下服荊芥藥忌食無鱗魚熏疥方明信雄黃各半錢椒末一錢上研細用紙一方尺熟艾攤平摻勻捲成長錠瓦兩口合紙卷於紙卷頭點火慢慢煙燻被下緊擁衾被油塗眼耳目鼻無令透煙以熏氣至其人口鼻為效牽牛子丸治一切風熱疥瘡攻注牽牛子一兩一半瓦上炒一半生用蘹香子一兩微炒陳皮二兩水浸瓦上焙乾上為細末用生薑汁煮麵糊為丸如緑豆大每服空心臨臥用炒鹽湯下十丸丹參洗方治疥及風瘙苦癢成瘡丹參苦參各四兩蛇床子四兩上搗以水一斗煎取六升濾去滓溫洗瘡上用絹帛拭乾以藥塗摩三五度即瘥治疥瘡藥斑蝥蟲去嘴腳用三個為枯柴慢火與糯米一合和炒至米黃為度去米生硫黃一錢信石即白砒霜一錢上為末至夜滅燈時用清麻油調藥掌上合擦心熱以鼻遠吸其氣三四次卻搽蕩患處不問乾溼疥瘡卻不可抓破摩蕩瘡上至於偏僻處切不可搽仍忌鴨子及水洗神效治積年疥瘡不愈者名胡粉散水銀三錢又茶末少許於瓦器用津液搽化作末輕粉三錢狼毒一兩置水中以沉者取為末一半生用一半炒上用清油調生鐵衣名鐵鏽油磨塗疥癩若蜘蛛蟲等毒磨蒜兼敷之或沉清油出藥面一寸高浸藥過夜不見燈火只點清油塗瘡上仍以口鼻於藥盞上吸入藥氣諸疥方透明生硫黃半兩明白礬煅二錢半白葉一葉去中心骨燒存性上為末麻油輕粉調搽又方生明硫黃半兩爛石膏二錢黃丹一錢上為細末麻油調抹潤澤丸治遍身熱瘡疥大黃一兩黑牽牛半生半熟天仙子各一兩上為細末用皂角子為丸每服五七十丸溫水送下腎臟風發瘡疥雞心檳榔二個破開以黃丹三錢合在內用濕袋裹煨全蠍六個明硫黃四錢上為末入輕粉半錢麝香少許青黛末半錢於瓷器內收每用少許清油調抹兩掌掩外腎以兩掌掩兩乳各睡至醒次日又用經驗又疥方柏油明礬花椒各等分上為細末入香油調敷上數次立效一搽膏治一切疥瘡黃連淨蛇床子去皮石膏煅各等分上為末卻以輕粉硫黃各三錢並和為末真麻油調敷治埋頭疥瘡未出皮並小兒頭爛腳爛並背爛硫黃蛇床子等分上為細末用生豬油調藥搽鼻聞立效忌口一方搗為散同研令勻夜間欲臥時先以熟鹽漿水洗瘡取生麻油調塗之於避風處以綿被蓋之取汗為度快肌丸治遍身疥瘡不瘥威靈仙去土一兩半焙細末豬膽三枚上取膽汁和丸如梧桐子大每服二十丸荊芥湯下無時候何首烏洗瘡治乾溼疥滿身作瘡不可藥者及風癢瘡何首烏艾等分細銼上相度瘡多少用藥並水煎令濃於盆內盛洗之拭乾敷取艾煎膏治一切惡瘡疥方出聖濟總録黃柏末石灰研上等分研極細以生麻油和如薄麵糊淨洗瘡塗四五次瘥烏頭煎出聖濟總録治瘡疥甚者烏頭每個四破大豆一兩半上同入沙瓶煮及爛每服烏頭一片豆少許空心酒服下立效散出聖惠方治疥瘡經久不愈朴硝三兩研細如粉硫黃一分研極細上和勻臨臥清油調敷上一夜三次明日便愈一方用生麻油調塗烏頭丸出經驗良方川烏頭去皮尖一兩並生用荊芥穗二兩上為末米醋糊丸如梧桐子大每服三十丸溫酒或熟水送下日三服無時蟬蛻散出危氏方治疥瘡蟬蛻薄荷各一錢上為末五更酒調服入混堂浴蕩候臭汗出盡再以湯淋之枳殼丸出聖惠方治一切風熱生瘡疥枳殼四兩面炒微黃去瓤苦參八兩銼上為末蜜水和搗三二百杵丸如梧桐子大每於食後以溫酒下三十丸又方治疥瘡藜蘆海桐皮上各等分入明礬輕粉各少許油調搽治患疥丸十五年遇冬則為瘡昔有人患疥十五年遇冬則為瘡人教用後藥取愈出百一選方羊蹄根蛇床子根上片切如錢米泔浸二三宿漉出入生薑礬同研細裹以生布欲洗先搽洗良久以水澆三四次用即除根後數年再生用前法亦愈治疥癆等瘡出百一選方硫黃白礬上等分肥皂焙之羊蹄根又焙之同搗為丸浴時揩擦癢處微痛甚妙治疥瘡方出肘後方以巴豆十粒火炮過黃色去皮膜用順手研如面入酥少許膩粉少許同研勻抓破瘡以竹篦子點藥不得落眼裡及外腎上如煎剡著外腎以黃丹塗甚妙治療瘑疥出十便良方用雄黃一兩黃連松脂各一兩發灰如彈丸四物熔豬膏與松脂各熟搗以敷瘡上則大良又方出肘後方用油麻莖苦酒和磨硫黃塗之並佳又煮苦參飲之良熏疥法取艾如雞子大先以布裹亂髮於紙上置艾雄黃硃砂末杏仁末水銀各如杏仁許水銀於掌中以唾研塗紙上以卷末藥炙乾燒以熏之一云筒瓦一口一用安灰蓋上以繩束之用熏疥藥於腳頭被內置之少時火盡上隔日一熏不過再即瘥治疥癆傳信適用方用豬膏煉油石灰細羅二味以意度多少一處銚內炒以干為度先鋪紙在地卻傾所煉豬膏石灰於其上用盆蓋之出火毒一夜碾末乾擦治疥瘡出經驗濟世方用灰調草裹皂角燒為灰入硫黃同研為細末入好粉油調淨浴了用一分敷瘡上一分塗兩手心一分塗外腎臨臥蓋了用兩手捧外腎婦人掩玉門禁抓一夕芫花膏出聖惠方治瘡疥用芫花一味用豬脂煎候焦去滓常用搽疥上治疥一名硫黃散出百一選方用硫黃不以多少用尉斗煬熔成汁以荊芥穗手捻碎投之候乾冷碾為細末每用藥以手抓破擦藥在上即愈仍不作硫黃氣治遍身風癢生瘡疥出肘後方用蒺藜子苗煮湯洗之立瘥又方出肘後方用茵陳不計多少火煮濃汁洗之立瘥又方出肘後方用竹葉為末雞子白和之塗上不過三四立瘥治疥瘡方杵蟹敷之亦效治久疥方用兔骨同醋摩敷之治疥方出肘後方用羊蹄根熟搗和豬脂塗上或著鹽少許治疥瘡方用薤菜煎湯洗之佳搗如泥敷之亦可石菖蒲散治疥瘙癢用石菖蒲搗為末油調塗之又方治疥瘡久不瘥用狐肉空心服之腸肚性寒患瘡疥久不瘥羹臛食之又方出危氏方用大紅川椒去目水蘸濕半日夾北杏仁研膏搽手如前法亦效肘後療疥方出十便良方用石灰二升以湯五升浸去汁先用白湯洗瘡拭乾以此汁洗之有效治年久日近遍身瘡疥癮疹發㾦流膿出水或癢痛出德生堂方用好伏道艾如無止用好香艾先碾為細末再以米糊和作餅子曬乾再碾為末每服三錢酒調浴堂內服之自汗出此藥專治年久日近遍身瘡疥癮疹發㾦流膿出水或癢痛多苦者一服見效豫得內臺敷安之因患斯疾服此藥而愈豫集方特來見示傳流後世又方出聖惠方治一切疥風瘙搔之癢成瘡用硫黃一兩細研以生麻油調令勻塗之又方出聖惠方用苦參五兩銼以酒五升浸三日每於食後溫服一盅治瘡疥風疹出百一選方用野鴨白煮或燠作常食無時本草此物性冷而能解金石毒故也治疥方用葎草而本經亦闕主疥功用同韋丹主膏淋搗生汁三升酢二合相和空腹頓服䕡茹散出濟生拔粹方治疥經年不瘥水銀一錢好茶二錢䕡茹三錢輕粉少許上為細末每用不以多少小油調搽硫黃散出濟生拔粹方治疥硫黃川椒石膏白礬各等分上為細末生油調搽經驗狗脊膏出衛生寶鑑方治疥藥硫黃雄黃信川烏黑狗脊白礬各半兩巴豆三枚上為細末先用小油熬之次下黃蠟調勻搽之椒艾湯出楊氏家藏方去風濕遍身生瘡疥或下部濕癢腳氣等疾石菖蒲一兩銼川椒揀淨二錢半艾葉銼二錢半蔥白七握上件一處以水三升煎數沸淋泄藜蘆散出聖惠方治疥瘡用藜蘆一味不拘多少以鯽魚煎油塗之合掌散出簡易方治腎瘀氣毒兩腿入骨癢痛兩膀內疥瘡兩手膿瘡下指縫露白每日疼痛不可忍者檳榔四個全蠍二個白芷四塊草烏大者二個地龍四錢青葙子一合海桐皮一錢枯白礬硫黃各指大二塊麝香一字上研為末和勻香油調開臨睡時先於兩手心上塗藥搽熱用鼻嗅得心中覺有硫黃氣似此依前三次畢第四次需時要多然後以原塗藥之兩手心合著捧外腎睡不可放開睡熟為度重者不過三五度即愈更再不發一掃散出危氏方治一切疥瘡但相對而生者便是不問乾溼焮痛日近年深用之立效藜蘆皮二兩輕粉十兩好蛤粉一兩水粉一兩透明雄黃五錢上為末大鯽魚一個入香油煎候熟去魚攤冷調藥搽瘡未效可加信石末少許研杏仁十粒近陰處勿用治疥瘡家藏經驗方臘日空心用蒸餅搽豬脂食之一年不生瘡疥久服身體光滑令諸孫歲歲服之有效本草圖經曰黔人有治疥癩遍身諸藥不能及者生取白花蛇中節火燒一大磚石通紅沃醋令熱氣蒸騰便置蛇於上以盆覆一宿如此三過去骨取肉筆以五味令過熱與病者頓啖之瞑眩一晝夕乃醒瘡痂隨皮便退其人便愈用干蛇亦以眼不陷者為真也治惡瘡疥癆出華他中藏經巴豆十一粒油煎合沸去巴豆不用蛇床䕡茹上後二味等分為細末入輕粉少許用巴豆調敷之及揩癢處陳藏器云人患瘡疥多以水銀塗之水銀性滑重直入肉內宜謹之昔北齊徐五療蠻躄病以金物太多用之水銀得金當蝕金候金色白者是也如此數度並瘥洗風散出楊氏家藏方治大人小兒一切風熱毒氣攻注遍身瘡疥癮疹疼痛荊芥四兩苦參四兩防風去叉川芎當歸洗焙白蒺藜白芷地榆地骨皮黃柏八味各二兩上件㕮咀每用五錢水三升煎三五沸通手淋瀝患處浣肌散出楊氏家藏方治風熱客搏皮膚瘙癢癮疹㾦癗瘡瘍疥癬抓之出水浸淫不止或風氣遊走暴腫槐花另研荊芥穗各三兩大黃苦參當歸升麻白蒺藜枳殼去瓤皮六味各二兩射干一兩半上同焙乾碾為細末入楓香和勻每用五錢水三升同煎三五沸通手淋洗雙蛇丸出楊氏家藏方治遍身瘡疥或癢久不愈者白花蛇五兩烏蛇一條上二味用水洗淨控干去頭尾並項後二寸內不用其餘約二寸長截斷用無灰酒一斗錫一斤作塊子並二蛇同入酒內浸封固瓶口待十五日取出去皮骨焙乾為細末卻以原浸藥酒煮麵糊為丸如梧桐子大每服三十丸食前溫酒送下槐枝膏出楊氏家藏方治疥瘡瘙癢槐枝黃連去須黃柏三味各三兩巴豆五錢不去殼上用好麻油一斤入諸藥泄令黃色綿子濾去渣次入黃蠟四兩熬成膏子取去更入膩粉半兩攪勻擦之停抓散出楊氏家藏方治疥瘡瘙癢硫黃另研蕪荑仁剪草焰硝另研蛇床子黃連去須吳茱萸藜蘆八味各一分檳榔十枚炒鰍魚一枚熟去骨上件為細末用生麻油調敷之三物浴湯出楊氏家藏方治遍身瘡疥瘙癢山牡丹葉二斤鹿梨根二斤生薑一斤上件㕮咀作一次用水五斗煮三沸浴之久患瘡疥者不過三五次浴取效初用藥時亦不知覺浴至三五次皮膚覺痛即愈合掌丹出朱氏集驗方治瘡疥蛇床子藁本各一兩硫黃一分石亭脂老硫黃青色一錢麝香二分上用先前二味為細末卻細研後二味併入前末和勻生麻油調於無風處爬碎患處用少許在掌心合定候融暖化擦遍身患處內服四物湯調血氣祛風毒四物湯用生地黃赤芍藥當歸川芎加荊芥等分粗末水煎黃連散出朱氏集驗方治疥瘡萬無一失大椒黃柏皮黃連檳榔上為細末用巴豆二十粒煎麻油塗之巴豆煎至黑色為度妙應膏出華他中藏經治疥瘡䕡茹藜蘆上等分為細末油調煎焦黑去渣入黃蠟熱成膏塗搽八味散出聖濟總録治遍身瘡疥皮破而痛或瘙癢膿水塗敷方川椒去目吳茱萸湯洗焙乾炒青鹽研膩粉研石硫黃研白殭蠶炒柏皮各一兩麝香少許上搗研為散用豬膽汁調塗之濕則乾摻治疥瘙風瘡有蟲出本草以狗舌草為末和油塗之即瘥治惡瘡疥癩出本草以鯪鯉甲燒末敷之治瘡疥滅瘢痕以梅雨水洗之治癩取蝮蛇一枚及他蛇亦得燒座上當有赤蟲如馬尾出仍取蛇肉塞鼻之孔治惡瘡疥以桐油塗之治皮膚瘡疥以粟米泔酸洗之治疥瘡以狼跋子用苦酒摩敷之治客風疥瘡以菖蒲作末蒸熱裹窨甚驗治疥及諸瘡久不瘳生死肌除大熱以對蘆煮洗之治瘑疥及瘡癩以柏枝燒取脂敷之良治瘡疥風腫以椿木葉水煮汁洗之治皮膚瘡疥殺蟲用布里草根割取皮焙乾為末油和塗瘡上治瘡疥以冬瓜藤燒灰敷之療瘡疥及熱氣瘡癢用漏蘆根以苦酒磨敷之亦作湯浴也治身癢瘡以糞藍煎湯洗之治瘡疥以雞蘇煮汁服治瘡疥甚效用芥心草搗末敷治瘡疥痂息肉以丹砂水研塗之治惡瘡疥以生鐵煅後飛淘去粗赤汁烘乾用蒜磨生油敷之治瘡痍疥癩用萆麻子油研敷之乾疥附論夫乾疥者但癢瘙之皮起作干痂此風熱氣深在肌肉間故也方秦艽丸治遍身生疥干癢搔之皮起秦艽一兩去苗黃耆二兩銼烏蛇四兩酒浸去皮骨灸令微黃漏蘆一兩半去蘆頭防風一兩半去蘆頭黃連一兩半去須苦參二兩銼川大黃二兩銼碎微炒麻黃二兩去根節上為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後溫酒送下日進二服一方無麻黃名大黃丸皂莢膏治皮膚風濕熱生疥干癢宜塗之豬牙皂莢膩粉硫黃細研臭黃細研白礬灰黃蠟巴豆去皮烏豆生用吳茱萸已上各一分上為末細研令勻先入麻油三二合以慢火化蠟攪和令勻日二塗之黃耆丸治乾疥瘙癢久不瘥方黃耆二兩銼烏蛇四兩酒浸去皮骨炙令黃茵芋二兩川烏頭二兩炮裂去皮臍附子二兩炮裂去皮臍石南一兩秦艽二兩去苗上為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後以荊芥湯下以瘥為度黃連膏治諸疥干癢白礬一兩燒灰硫黃一兩細研黃連一兩半去須雌黃一兩細研蛇床子三分末上研令勻以煉豬脂和如餳每用先以鹽漿洗令淨拭乾塗之一方有胡粉名白礬散如聖散治肺臟風毒攻發皮膚血氣凝澀變生瘡疥瘙癢搔之皮起作痂增展侵引連滯不瘥活血脈潤皮膚散風邪止瘙癢蛇床子半兩黃連去須三分水銀同胡粉點水研令黑一分胡粉結沙子一兩上以生麻油稀滑每用藥時先以鹽漿水洗瘡令淨後以藥塗之干即便換不過三五度瘥一方有硫黃一分名水銀膏又方治疥瘡生干痂癢不止豬脂一斤巴豆半兩去皮研焙蠟半兩硫黃二分末上先煎豬脂令沸入巴豆次下蠟令熔化又下硫黃末攪令勻盛於瓦盒內日三五度塗之治疥瘡生干痂癢不止方皂莢一兩臭黃一兩上為細末以醋二升熬成膏塗之日三二易
