body:
  text: 卷三百三十四婦人諸疾門月水不利附論夫婦人月水不利者由勞傷血氣致令體虛而受風冷風冷客於胞內損傷衝任之脈手太陽少陰之經故也衝任之脈為經脈之海皆起於胞內手太陽小腸之經也手少陰心之經也此二經為表裡主下為月水風冷客於經絡搏於血氣血得冷則壅滯故令月水來不宣利也診其脈從寸口邪入上者名曰解脈來至狀如琴絃苦小腹痛月水不利孔竅生瘡又左手關上脈足厥陰經也沉為陰主月水不利腰腹痛尺脈滑血氣實經絶不利又脈左手尺脈來而斷絶者月水不利也又脈寸關調如故而尺脈絶而不至者月水不利當患小腹引腰痛氣滯上攻胞膈也方澤蘭丸出聖濟總録治婦人月水不利纍月不快身熱煩熱骨節沉重日漸羸瘦澤蘭葉鍾乳別研細辛去苗葉黃耆銼紫石英別研各三分大黃銼炒熟地黃焙遠志去心白芷苦參柏子仁微炒蜀椒去目並閉口者炒出汗白朮芎藭附子炮製去皮臍麥糵炒吳茱萸湯浸焙乾炒陳面炮前胡去蘆頭大棗去核炒各半兩丹參枳殼去瓤麩炒芍藥桔梗炒秦艽去苗土當歸沙參桂去粗皮厚朴去粗皮生薑汁炙石斛麥門冬去心焙各三分人參半兩上為細末煉蜜和丸如梧桐子大每服二十丸空心服溫酒下漸加至三十丸白薇丸出醫方大成治婦人月水不利四肢羸瘦吃食減少漸覺虛乏故令無子白薇白朮當歸白芍藥柏子仁桂心附子萆薢吳茱萸木香各半兩紫英一兩細辛川芎檳榔各半兩熟地黃二兩牡丹皮一兩人參石斛白茯苓澤蘭葉川牛膝各三分上為末煉蜜為丸如梧桐子大每服三十丸空心及晚食前溫酒下薏苡仁丸出聖濟總録治婦人月水不利胸脅痞滿臍腹刺痛手足煩熱宜服薏苡仁一兩乾薑炮製吳茱萸湯浸七次焙乾微炒附子炮製去皮臍大黃銼炒芍藥各一兩黃芩去黑心生乾地黃微炒當歸微炒桂去粗皮白朮各半兩蜀椒去目並閉口者炒出汗人參石葦去毛微炒各一分桃仁湯浸去皮尖雙仁麩炒黃色三十枚上為末煉蜜為丸如梧桐子大每服二十丸溫酒下三服當歸湯出聖濟總録治婦人經脈不利腰腹刺痛拘急少力嘔吐噁心怠惰多睡頭旋眼昏日漸羸瘦飲食減少當歸切焙紅藍花延胡索紫葳各一兩琥珀半兩研牡丹皮薑黃牡蒙鬼箭羽各三兩麒麟竭桃仁去皮尖雙仁麩炒菴䕡子藕節切焙沒藥研桂去粗皮各一兩上粗搗篩每服三錢水一盞同煎至七分去滓空心食前溫服如無牡蒙亦得大黃朴硝湯出千金方治經年月水不利胞中有風冷所致宜下之大黃牛膝各五兩朴硝牡丹甘草紫菀各三兩千金翼作紫葳代赭桃仁虻蟲水蛭乾薑細辛芒硝各二兩麻仁五合上㕮咀以水一斗五升去滓納硝令煬分五更為首相去一炊頃自下後將息忌見風當歸沒藥丸出聖濟總録治婦人血氣不調月水滯澀身體麻痹瘙癢疼痛飲食減少面黃肌瘦背脊拘急骨間痠痛多吐清水宜服沒藥研丁香各三兩木香一兩丁香皮桂去粗皮麒麟竭研玄胡索牡丹皮當歸乾漆炒煙出肉豆蔻各半兩檳榔一兩銼安息香乳香各一兩二味同搗末再用酒濾去滓銀器內熬膏上搗羅十二味為末以乳香膏和丸如膏少即入蜜丸如梧桐子大以雄黃為衣每服二十丸至三十丸溫酒或生薑湯下食前早晚各一服大保生丸治婦人月事沉滯寒熱往來日漸羸瘦不思飲食宜服人參藁本赤茯苓當歸白芷玄胡索肉桂去皮白薇赤芍藥川芎白朮甘草炙沒藥牡丹皮各半兩上為末煉蜜為丸如彈子大每服一丸細嚼溫酒送下空心食前如經事過多加赤石脂一兩如經事絶全去赤石脂若經水如水豆汁者依上等分治琥珀散出聖惠方治婦人月水不利攻臍腹疼痛口乾不食琥珀土瓜根當歸銼微炒藕節薑黃各一兩白朮桂心各半兩生乾地黃赤芍藥牛膝凌霄花菴䕡子各三分川大黃五分上為散每服三錢以水一盞煎至五分去滓每於食前溫服赤龍鱗散出聖惠方治婦人月水不利攻腹臍疼痛頭目昏悶赤鯉魚鱗二兩燒灰黑豆醋拌炒令焦羚羊角三兩炒令焦乳發灰一兩藉節一兩水蛭一分炒微黃桂心木香當歸銼微炒赤芍藥各一兩虻蟲一分炒微黃去翅足白殭蠶三分微炒麝香上為細散入麝香研令勻每於食前以熱酒調下一錢治婦人憂恚心下支滿膈中伏熱月經不利血氣上搶心欲嘔不可多食懈怠不能動出千金方大黃芍藥虻蟲各二兩土瓜根蜀椒黃芩白朮乾薑地骨皮一作炭皮芎藭各二兩桂心乾漆各一兩半上為末蜜丸如梧桐子大每服十丸日三不知加之牡丹散出聖惠方治婦人月水不利臍腹疼痛不欲飲食牡丹皮川大黃各二兩炒赤茯苓生地黃桃仁當歸桂心赤芍藥白朮各三分石葦去毛木香各四分上㕮咀每服三大錢水一盞薑三片煎至七分去滓空心溫服桃仁丸出聖濟總録治婦人月水不利氣血不和臍下疼痛面色萎黃體羸瘦飲食不下桃仁湯浸去皮尖雙仁麩炒黃牡丹皮當歸去蘆芎藭土瓜根銼芍藥桂去粗皮牛膝酒浸切焙各二兩防風去叉二兩甘草炙一兩上為末煉蜜和丸劑搏熱艾丸如梧桐子大每服三十丸空心溫酒下漸加至五十丸秦艽湯出聖濟總録治婦人虛勞月水不利百節痠疼壯熱少力心躁煩悶秦艽去蘆馬鞭草甘草炙銼柴胡去苗各一兩芎藭芍藥桂去粗皮各二兩荊芥穗三兩半夏半兩湯浸去滓生薑汁製炒黃白芷三分上為搗篩每服三錢水一盞烏梅一枚捏破生薑三片同煎至七分去滓溫服琥珀散一名三稜當歸散出危氏方治婦人月經壅滯每發心腹臍痛不可忍及治産後惡露不快血上搶心迷悶不省氣絶欲死三稜莪朮赤芍藥牡丹皮劉寄奴當歸熟地黃桂心甘菊花真蒲黃炒各一兩細銼上前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為細末每服三錢空心食溫酒下一方不用菊花蒲黃卻用烏藥延胡索亦佳若血氣痛只一服産後血衝心二服便下常服尤佳此藥易合宜多合以救人烏豆一升約用五兩牛膝散出聖惠方治婦人月水不利臍腹疼痛牛膝一兩桂心赤芍藥桃仁延胡索當歸牡丹皮川芎木香各三分上為末每服方寸匕溫酒調下食前牛膝丸出聖惠方治婦人月水不利臍腹疼痛不多飲食四肢消瘦牛膝去蘆一兩當歸銼微炒白朮芎藭桂心各半兩川大黃一兩銼微炒水蛭一分炒微黃鬼箭羽三分桃仁三分湯浸去皮尖雙仁麩炒微黃上為末煉蜜和丸如梧桐子大每於食前溫酒下二十丸鱉甲丸出聖濟總録治婦人月水不利臍腹疼痛身體疼倦鱉甲去裙襴醋炙芎藭貝母各三分去心稱苦參二兩赤芍藥焙各一兩牡丹皮熟乾地黃焙各一兩紫蘇子微炒一兩上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下漸加至三十丸桂心丸出聖惠方治婦人月水不利憂悒心下支滿血氣上攻心腹疼痛不得睡臥桂心赤芍藥土瓜根各半兩漢椒一分去目並閉口者微炒去汗黃芩乾漆搗碎炒令煙出當歸銼微炒各半兩川大黃一兩銼碎微炒上為末煉蜜和丸如梧桐子大每服於食前以溫酒下二十丸土瓜根丸出聖濟總録治婦人憂悒心下支滿氣脹腹熱月水不利血氣上攻心痛欲嘔煩悶土瓜根大黃銼炒令煙盡芍藥當歸切焙各半兩蜀椒去目並閉口炒出汗黃芩去黑心各一分乾漆炒令煙盡一分半上為末煉蜜和丸如梧桐子大空腹服五丸酒下每日二服沒藥散出聖惠方治婦人月水不利臍腹疼痛不可忍當歸銼微炒延胡索鬼箭羽琥珀菴䕡子各一兩上為散不計時候以熱酒調下一錢産後敗血攻心腹疼痛服之亦效金花散出聖濟總録治婦人月水不利體熱煩悶少腹腰腳沉重疼痛及産後惡露不快大便祕澀桂去粗皮威靈仙去土白芷當歸牡丹皮上等分為散和勻每服二錢煎陳麵湯調下治婦人月水不利結積無子方出肘後方大黃二兩桃仁二十枚芒硝當歸各一兩亂髮一加雞子一枚焙之上以酒六升煮取二升半納芒硝三分三服佳抵當湯出千金方治月經不利腹中滿時自減並男子膀胱滿急虎掌千金翼作虎杖大黃各二兩桃仁三十枚水蛭二十枚上以水三升煮取一升盡服之當下惡血為度菖蒲散治婦人月水澀滯陰中腫痛抵當湯一名水蛭飲出三因方治婦人經水不利水蛭銼炒虻蟲去翅足炒各三十枚桃仁三十七枚去皮尖大黃蒸三錢三字上為末每服四錢水一盞半煎七分去滓溫服血未利更服亦治男子有瘀血膀胱痛室女月水不通三聖丸治月經不利小腹急痛當歸酒浸去蘆乾漆炒煙盡各一兩大黃濕紙煨半兩上為細末醋糊為丸如梧桐子大每服三十丸空心當歸酒下沒藥丸治月經不利漸結成塊腹脹如蠱檳榔七個麵裹衣煨大戟半兩大黃一兩蒸上為細末醋糊為丸如梧桐子大每服半兩重臨臥細嚼茴香酒下取下惡物大黃散出聖濟總録治婦人月水不利或血瘀不通或腹堅硬如石如有妊狀大黃銼炒四兩芍藥二兩土瓜根銼一兩上為末煉服二錢溫酒下牡丹丸出聖濟總録治婦人月水不利或前或後乍多乍少腰疼腹痛手足煩熱唇口乾燥牡丹皮一兩一分苦參半兩貝母三分去心稱上為末煉蜜和劑搗熟丸如梧桐子大每服二十丸加至三十丸空腹米飲下日三次虎杖散出聖惠方治婦人月水不利虎杖三兩凌霄花沒藥各一兩上為細散不計時候以熱酒調下一錢鱉甲丸出聖惠方治婦人月水不利腹脅妨悶背腹煩疼鱉甲二兩醋塗炒令黃去裙襴川大黃銼微炒二兩琥珀一兩半上為末煉蜜和丸如梧桐子大每服於食前溫酒送下二十丸療婦人臍下憋逆氣脹滿月水不利血氣上攻欲嘔不得睡出永類鈐方當歸四錢乾漆二錢炒令煙盡上為末煉蜜和丸如梧桐子大空心溫酒下十五丸礬石兌丸出三因方治婦人經水閉不利臟腑堅癖不止中有乾血下白物礬石三分杏仁一分去皮尖麩炒上研杏仁令細入礬灰加少蜜為丸如棗綿裹內陰中未知再作之又方出聖惠方治婦人月水壅滯每發心腹臍疼痛不可忍又治産後惡露不快血上搶心迷悶不省氣絶欲死延胡索當歸各等分上為末每服三錢薑三片水一大盞煎七分去滓少熱服陳氏方有桂名如神湯最治腰痛雷公炮炙論只用延胡索一味治心痛僕詳此方大能治血氣腰腹疼痛面黃無力鉛霜散出聖濟總録治室女月水滯澀心煩恍惚用鉛白霜半兩細研為散每服一錢溫地黃汁一合調下如無地黃汁用生乾地黃煎湯下椒仁丸出衛生家寶方治先因經水斷絶後至四肢浮腫小便不通名曰血分經水不通則化為血血不通則復為水矣宜服此椒仁商陸橘皮桑皮各等分上為末麵糊為丸如梧桐子大每服三十丸米飲下以通為度六合湯出嚴氏濟生方治婦人室女經事不行腹中結塊疼痛腰痛腿痛白薇丸出聖惠方治婦人臟腑久冷腰膝疼痛背膊虛煩月水不利故令無子白薇赤石脂柏子仁各一兩白前當歸銼微炒附子炮裂去皮臍乾漆搗碎炒令煙出山茱萸牛膝去心厚朴去粗皮塗生薑汁炒令香熟防風去頭桂心白芷各半兩熟乾地黃三兩吳茱萸半兩湯浸七次焙黃微炒上為末煉蜜和搗百杵丸如梧桐子大每於空心及晚食前以溫酒下三十丸沉香湯出聖濟總録治室女榮衛凝澀月水不利或時頭目昏悶肢體拘急五心虛煩飲食進退多困少力沉香檳榔銼甘草炙各三分木香當歸切焙柴胡去苗人參桂去粗皮青橘皮湯浸去白焙白茯苓去黑皮陳橘皮湯浸去白焙生地黃各二兩鱉甲九齒者去裙襴醋炙一兩半上銼如麻豆大每服三錢水一盞入生薑大棗拍碎同煎至七分去滓溫服空心日夜各一延胡索散出聖濟總録治室女月水不利骨節痠痛頭面微浮筋脈拘急