蜈蚣二條上為末和丸如梧桐子大食遠服十丸日再稍加至二十丸崔氏無半夏麝干乾薑橘皮鬼督郵細辛白石英用麻黃二兩桑根白皮一兩半以煮棗湯送下蒺藜貝母湯治久咳嗽蒺藜炒去角貝母去心紫菀去苗土百合麻黃去根節天雄炮裂去皮臍枳殼去瓤麩炒赤石脂各一兩半桑根白皮銼桂去粗皮旋覆花微炒各三錢地榆五味子貫衆黃連去須各一兩黃芩去黑心半兩上粗搗篩每服五錢水一盞半入生薑三片煎至八分去滓溫服空心食前服款氣丸治久喘嗽痰肺氣腫浮郁李仁青皮去白陳皮去白檳榔木香杏仁去皮尖馬兜鈴炒人參澤瀉茯苓苦葶藶炒各二兩廣朮當歸黃耆牽牛取頭末各一兩半防己五錢上為細末生薑汁麵糊為丸如梧桐子大生薑湯下每服一二十丸至五七十丸食後服柴胡湯治咳嗽久不瘥柴胡延胡索百合枳殼去瓤麩炒麻黃去根節款冬花炒天雄炮去皮臍各一兩半桂去粗皮黃連去須一兩半地榆貝母去心煨各一兩黃芩去黑心半兩旋覆花炒三分錢杏仁十五枚去皮尖雙仁炒令黃代赭石一兩半上銼如麻豆每服三錢以水一盞煎取七分去滓溫服空心時五愈散深師療五臟咳積年劇則上氣不得臥喉中如有物醫所不療桂心細辛乾薑白菀甘草炙各三分錢蜀椒汁代赭通草款冬花芫花炒各三分錢伏龍肝紫菀牡蠣各三二分錢熬上搗篩以飴糖和之搗令調和如棗核一丸含之稍稍咽其汁盡復含令胸中熱為候不知以意加之其久病重者晝夜二十餘丸若一歲咳者一月愈十歲咳者百日愈忌海藻菘菜生蔥生菜等物款冬花丸療三十年上氣咳嗽款冬花六分錢桂心四分錢紫菀六分錢杏仁四分錢去皮尖雙仁炒細辛六分附子二兩炮藜蘆四二分錢乾薑六五分錢甘草六分錢炙防風八四分錢芫花二分錢熬川椒八分二錢研野葛四分三錢去心上搗篩蜜和丸如梧桐子大每服三丸稍加日三服忌生蔥辛鹹醋豬肉冷水海藻菘菜生菜貍肉等一方十四味有茯苓忌酢百合散治久咳嗽胸中氣不利百合一兩紫蘇三分錢炒桑根白皮一兩銼紫菀三分錢去苗土甘草半兩炙赤銼款冬花三分錢貝母三分錢煨微黃杏仁半兩浸去皮尖雙仁麩炒漢防己三分錢人參三分錢去蘆赤茯苓麻黃一兩去根節桔梗半兩去蘆頭上為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓不拘時候溫服桑白皮湯治男子婦人患咳嗽桑白皮一兩紫菀一兩百合一兩桔梗一兩半夏半兩薑汁製人參一兩知母半兩薑汁製貝母半兩阿膠一兩炒南星半兩薑汁製甘草半兩陳橘皮五分鍾乳粉一兩木香一兩上㕮咀每服半兩水二盞入生薑五片棗一枚煎至八分去滓下鍾乳粉一錢或半錢調勻熱服蛤蚧丸治久肺氣咳嗽涕唾稠黏上氣喘急蛤蚧一對頭尾俱全者塗酥炙微黃漢防己半兩貝母半兩煨黃甜葶藶半兩隔紙炒紫色桑白皮一兩銼蟬殼半兩豬苓半兩去黑皮赤芍藥半兩陳橘皮三分錢湯浸去白瓤人參去蘆頭半兩甘草一分炙赤銼五味子半兩上為細末煉蜜和搗五七百杵丸如梧桐子大每於食後用溫粥飲下三十丸貝母湯治諸嗽久不瘥貝母去心薑製半日焙黃芩生用乾薑各一兩陳皮五味子各一兩桑白皮半夏柴胡桂心各半兩木香甘草各一分錢上為粗末每服五錢水一盞半杏仁七枚去皮尖碎之生薑七片同煎至七分去滓熱服黃師文云戊申冬有蔣姓者其妻積年嗽制此方授之一服瘥以此治者諸嗽悉愈人參湯治遠年咳嗽麻黃去節三錢杏仁去皮尖一兩甘草四兩錢桑白皮北五味子罌粟殼陳皮各半兩麥門冬去心三錢北紫菀一兩人參四兩錢阿膠七錢上為末每服二錢以水一盞杏仁七粒去皮尖同煎七分空心服鹿角膠煎治久肺氣咳嗽鹿角膠四兩搗碎炒令黃赤茯苓一兩紫菀一兩去苗土紫蘇子二兩炒貝母一兩煨微黃百合一兩以上六味搗羅為末杏仁湯浸一兩去皮尖雙仁炒研膏生地黃汁五合生薑汁三合白蜜八兩牛酥五合上件藥以前六味藥都一處與地黃汁等相和攪令勻於銀器內以慢火煎成膏每於食後含半棗大咽津蛤蚧丸治久咳嗽蛤蚧一對雌雄頭尾全者酥炙人參半兩半夏湯洗七次切焙一兩杏仁湯浸去皮尖雙仁蜜拌炒黃研一兩栝蔞大者二枚去皮子取肉蒸酥熟研阿膠炙燥半兩青橘皮湯浸去白焙四錢干棗煮熟去皮核研二兩上件研外搗羅為末合研勻入生蜜少許和丸如梧桐子大每服十丸糯米飲或熟水下空心臨臥服阿膠散治久咳嗽阿膠炙燥人參杏仁湯浸去皮尖雙仁炒甘草炙銼黃耆半炙半生銼紫菀去苗土桔梗銼麩炒桑根白皮炙銼各一兩上為散末每服用豬𦚟子一枚蔥白三寸細切糝藥二錢入鹽花少許濕紙裹煨熟細嚼溫酒下空心服乳石散治久咳嗽鍾乳粉款冬花去梗甘草炙銼各半兩杏仁湯浸去皮尖雙仁麩炒研桂去粗皮各一兩栝蔞一枚去皮子用肉白礬枯半兩不蛀皂莢一梃炙去皮子以上三味同杵爛於新瓦上攤曝乾用上先搗前五味次搗三味同為細散每服二錢溫湯調送下八仙湯治久患氣嗽發即奔喘坐臥不安喉中氣欲絶馬兜鈴桑根白皮桔梗各二兩半麻黃去根節湯煮掠去沫焙白茯苓去黑皮柴胡去蘆頭陳橘皮湯浸去白焙各三一兩杏仁湯浸去皮尖雙仁炒一百枚上銼如麻豆每服五錢以水一盞半煎取八分去滓溫服頻服三兩劑瘥香豉丸療三十年咳嗽上氣短氣久冷五臟客熱四肢煩疼飲食減少時有發甚不能行步夜不得睡多夢香豉四分熟杏仁三分去皮尖雙仁炒紫菀二三分桂心三分甘草八分炙乾薑二分細辛三分吳茱萸二分上搗篩蜜和丸如梧桐子大每服四丸日三服不知增之能含嚼咽汁亦佳忌海藻菘菜生蔥生菜七星散一名川椒丸療三十年咳嗽肌體虛羸不思飲食川椒出汗桑根白皮芫花根皮款冬花紫菀代赭細辛伏龍肝各一兩上為散取作七分聚如扁豆大以竹筒口當藥上一一吸咽之令藥入腹中先食訖即服藥仰臥㕮咀日三服後三日不瘥復作七分聚以臠肉炙令熟展轉以藥聚上令藥悉在炙肉中仰臥㕮咀吞炙肉汁令藥力悉皆從喉中下藥即吞盡食肉在後凡所療治皆不及此食肉便愈若不愈復作如初法必愈牛羊肉鹿肉亦皆可用勿用豬肉忌生菜延年不用椒與芫花根余皆同密陀僧丸出聖惠方治積年肺氣喘嗽密陀僧二兩用綿裹以蘿蔔煮之一炊時銀箔五十片黃丹一兩炒令黃紫緑豆粉半兩膩粉半兩胡粉半兩炒令黃金箔五十片葛粉半兩上為末煮棗肉和丸如梧桐子大每臨睡時綿裹一丸含化咽津海藻丸出聖惠方治積年肺氣咳嗽氣奔海藻三錢湯浸去鹹味麥門冬一兩半去心焙昆布三錢湯浸去鹹味乾薑半兩炮裂銼細辛半兩文蛤半兩桂心半兩川椒半兩去目閉口者炒去汗上為末煉蜜和搗三五百杵丸如半棗大不計時候以綿裹一丸含咽津紫菀丸出御藥院方治遠年近日咳嗽痰涎不利紫菀去土款冬花去梗白前各二錢半人參甜葶藶炒烏梅肉各半兩御米殼去蒂蜜水拌勻炒黃熟一兩半上為細末煉蜜丸如梧桐子大每服四五十丸食後生薑湯送下枇杷葉丸一名紫菀膏治肺熱久嗽身如炙肌瘦悴成肺癆枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半上各如常製為末蜜丸如櫻桃大食後臨睡服一丸朱氏集驗方云昔有婦人患肺熱久嗽身如炙肌瘦悴將成肺癆服之未終劑而愈白前湯祕要方云肺氣嗽經久將成肺痿其狀不限四時冷熱晝夜嗽常不斷唾白如雪細沫稠黏喘息氣上乍寒乍熱發作有時唇口喉舌乾焦亦有時唾血者漸覺瘦悴小便赤顏色青白毛聳此亦成蒸有此狀者宜以白前等七味湯服之兼有麻黃等十味煎丸桑白皮等十味煎又云肺經氣嗽經久有成肺癰者其狀與前肺痿不多異但唾悉成膿出無多少病此者以白前湯中加半夏五兩錢黃耆三兩錢以水一升煮取二升六八合於麻黃丸中加黃耆五兩四錢苦參六兩三錢芍藥三兩五錢於桑白皮煎中加黃芩耆切三升錢共桑白皮地骨皮同煎又加水三升同煎忌羊肉餳等並一切鹹酸等物服之大有效驗白前三兩錢桑白皮三兩錢生地黃一六升錢茯苓五兩錢地骨皮四兩錢麻黃二兩一錢去節生薑六兩錢上藥切以水八升煮取二升六合去滓加竹瀝五合分溫四服食後溫服晝三夜一覺得力重合服五六劑佳隔三日服一劑忌醋蕪荑又依前白前等七味湯雖服覺可根本未除宜合麻黃等十味丸服之麻黃三二兩去節白前二兩桑白皮六三兩射干四二兩白薇三兩百部根五二兩乾地黃六兩地骨皮五兩橘皮三兩上件搗篩蜜和丸煮桑白皮飲下之初服十丸日再服稍加至十五丸丸如梧桐子大忌蕪荑又凡病在胸膈上者宜飽滿而在夜肺既居上此是病在上一晝夜服丸夜無憑準宜合桑白皮汁等十味煎每夜含咽之桑白皮切一二升錢地骨皮切三升錢以上用水七升熟煎取三升汁去滓澄清生地黃汁五升生麥門冬汁三二升生薑汁一升竹瀝三升生葛根汁三升白蜜一升牛酥三合大棗膏一升上先於微火上取生地黃汁以下生葛根汁以上和煎減半時乃納桑白皮等二物汁和煎之三分減一再用酥蜜棗膏攪之勿停手得如稠飴狀煎成訖置別器中服之每夜欲臥之時取一胡桃大含之細細咽汁稍加至雞子大欲晝日間丸服亦得忌蕪荑又欲飲氣嗽經久不已漸成水病其狀亦不限四時晝夜嗽不斷遇諸動嗽物便致困劇甚者乃至雙眼突出氣即欲斷汗出大小便不利吐痰飲涎洟沫無復窮限氣上喘息眉肩息每旦眼目浮腫不得平復有如此者宜合細辛等八味湯葶藶子十五味丸服之細辛半夏洗桂心桑白皮各五兩乾薑當歸各四兩芒硝六兩杏仁六合三錢去尖雙仁者研上藥切以水九升煮取三升去滓納芒硝分溫三服每服如人行十里久當得快利後好將息經三四日合丸服之忌生蔥生菜羊肉餳丸方葶藶子六合熬細辛五味子各五兩乾薑當歸各四兩桂心人參丁香大黃商陸根各三兩橘皮四兩桑白皮六兩皂莢肉二兩炙大腹子檳榔各十二枚麻黃二兩去節上藥搗篩蜜和丸煮桑白皮飲下初服十丸日再服稍加至十五丸如梧桐子大若利則減否則加以大便通滑為度時時得鴨溏亦佳忌生蔥生菜又依前細辛等八味湯葶藶子等十五味丸不覺可漸成水病餘一如前若更加大小便祕澀頭目身體浮腫亦合大幹棗三味丸服之大棗六十枚擘去核葶藶一升熬杏仁一升去皮尖雙仁者熬上藥合搗令如膏可作丸如硬燥不相著細細下蜜作丸如梧桐子大依還以桑白皮飲下之初服七八丸日再服稍稍加之以大便通為度病重者時令鴨溏佳飲下亦佳亦有以前三味煮湯服之又依前大棗等三味丸服雖覺氣暫歇然病根深固藥力微弱且停服大棗丸合巴豆丸五味細細服之蕩滌宿病巴豆仁二十枚研熬去心皮杏仁一百枚去皮尖雙仁研葶藶子六合熬大棗六十枚擘去核牽牛子五合熬上藥合搗一如前大棗丸法還以桑白皮飲下之服三四丸日再稍加利即減祕即加常以大便調為候病甚時時飲鴨溏亦佳忌蘆筍野豬肉治三十年咳嗽出千金方細辛款冬花防風紫菀各三兩藜蘆二兩川椒五合上㕮咀以藜蘆先著銅器中次紫菀次細辛款冬花次椒以大棗百枚間著諸藥間以水一斗二升微火煮令汁盡出棗曝令燥雞鳴時服半棗不知明旦服一棗以胸中溫溫為度若強人欲嗽吐者可稍增服之便吐膿囊裹結吐後勿令飲食咳愈止藥藥勢靜乃食不爾令人吐不已平肺散治久年咳嗽神效御米殼四兩碎蜜水和炒黃烏梅肉一兩半訶子皮人參各一兩貝母去心百合各半兩上為末每服三錢水一盞煎至七分食後臨臥熱服蘆筒散出御藥院方治年深日近咳嗽鐘乳石半錢枯白礬官桂去粗皮甘草炙各二錢佛耳草人參去蘆頭各三錢上為細末每服半錢夜臥抄在手內竹筒子吸咽後用清茶送下頻用三五服見效皺肺丸出百一選方治久嗽姚連判嶽傳款冬花人參五味子桂去皮紫菀白石英微帶青色者上等分為末用羯羊肺一具去皮尖杏仁半斤水同煮以肺爛為度去筋膜末與杏仁同研極細和衆藥候丸得成丸如梧桐子大陰乾每服五七十丸至百丸不妨糯米飯飲下食後臨臥服一方有鍾乳粉扁豆散出經驗良方治久嗽或暴感咯血成肺痿吐白涎胸膈滿悶白扁豆五錢炒枇杷葉去毛炙半夏去皮臍生用人參各二錢半白茅根七分錢半白朮各二錢半上㕮咀水三升生薑兩片煎至一升入檳榔末一錢和勻分作四服不拘時候一方無白茅根阿膠散出王氏博濟方治久咳嗽及勞嗽阿膠二兩如無以黃明膠四兩代並炒燥人參半兩杏仁二十粒去皮尖雙仁麩炒微黃黃蜀葵花款冬花各一兩甘草炙銼二錢上為散每服二錢空心熱糯米飲調下晚食前再服木乳散出聖惠方治久嗽不瘥皂角樹白皮二兩塗酥炙黃貝母一兩煨微黃枳殼一兩麩炒去瓤百合一兩麻黃一兩四錢去根節甘草半兩炙微黃銼上為散每服三錢以水一中盞入生薑半分煎至六分去滓溫服日進三四服紫蘇子丸出聖惠方治久咳嗽上氣不瘥紫蘇子一兩五味子一兩蘿蔔子一兩炒桑白皮一兩銼皂角三兩去黑皮塗酥炙黃甜葶藶二兩隔紙炒紫色上為細末蜜和搗二三百杵丸如梧桐子大每服以棗煮粥飲下二十丸三四服川椒丸治積年咳嗽川椒一兩去目微炒桑白皮一兩銼款冬花一兩紫菀一兩去苗土芫花皮根一兩去土代赭一兩細研上為細末同煮熟精羊肉研爛和丸如梧桐子大每服於食後以溫粥飲下二十丸定喘寧肺丸治男子婦人久患咳嗽肺氣喘促倚息不得睡臥纍年不瘥漸至面目浮腫並宜服之半夏南星青黛白礬枯各一兩信半兩上為細末用生薑水麵糊丸如緑豆大每服十丸漸加至二十丸用茶清放冷送下清音丹出經驗良方治久年咳嗽聲干人參二錢半桔梗知母玄胡索各半兩甘草四錢上為末煉蜜丸如小龍眼核大綿裹一丸臥時置口中使之自化異功散治久咳嗽陳粳米一升生薑半斤搗自然汁浸焙乾厚朴去粗皮塗生薑汁蜜炙二兩訶黎勒煨三枚小者檳榔銼一枚甘草半兩半生半炙銼上為末每服一錢米飲調下食後日三款冬花散治久咳嗽款冬花去梗阿膠炒燥各一兩天南星銼炒三分惡實炒一分甘草炙銼半兩上為散每服三錢水一盞煎至六分食後臥溫服款冬花煎出千金方治新久咳嗽款冬花乾薑末紫菀各三兩五味子一二兩芫花一兩熬令赤上㕮咀先以水九升煮三味取三升半去滓納芫花乾薑末加蜜二升合投湯中令調於銅器中微火煎令稠如糖每服半棗許日三服忌生蔥麻黃湯出古今録驗治三十年寒冷嗽咳逆上氣麻黃八分去節蜀椒四分炒出汗細辛三分藁本二一兩錢杏仁五二十枚去皮尖雙仁者碎上切以水七升煮取三升分為三服日三服忌生蔥菜麻黃湯出集驗良方治久患氣嗽發時奔喘坐臥不得並喉里呀呷聲氣欲絶方麻黃去節杏仁去皮尖雙仁研紫菀各三四兩錢柴胡橘皮各四三兩上切以水六升煮取二升半去滓分三分服一劑不瘥頻服三劑一方無紫菀用乾紫蘇葉柏子仁丸出聖惠方治久嗽肌體虛羸不思飲食宜服此方柏子仁二兩五靈脂一兩甜葶藶一兩隔紙炒令黃色蝦蟆頭一枚燒灰杏仁一兩去皮尖雙仁炒上為細末煉蜜和丸如梧桐子大每服以溫粥飲下三十丸至聖真人全功飲出聖惠方治久新咳嗽痰盛氣喘肺痿瘦悴不能坐臥服藥無效者服之立減如年深日久者連進取效款冬花二兩去梗淨炒罌粟殼刮去內皮淨肉並去蒂二兩用蜜少許陳皮一兩甘草一兩上四味一處微炒為粗末每服三錢水一盞半入生薑三片烏梅二個煎至八分去滓臨臥服之忌鹹酸酒面酢等物神功散出御藥院方治久咳嗽雄黃飛半兩款冬花甘草炙肉桂去粗皮各一兩上為細末入雄黃勻每服半錢吸入咽喉中不拘時候金不換散出仁存方治男子女人肺胃虛寒久嗽不已喘促滿悶咳嗽涎盛脅脹腰背倦痛或虛勞冷嗽唾紅涎及年遠日近一切喘咳疾諸藥不效者立效罌粟殼半兩制杏仁制甘草各三錢枳殼四錢上㕮咀每服三錢水一盞半姜三片烏梅半個煎七分去渣食後臨臥溫服杏仁散出百一選方治多年嗽葛邦美傳杏仁去皮尖用半夏湯泡天南星生用甘草生用上等分為粗末每服四錢水一盞半棗三個姜七片煎至七分食後服杏參膏治咳嗽久而不已者人參杏仁去皮尖胡桃去皮柿霜去皮各一兩上將杏仁胡桃擂細入熟蜜用人參柿霜為丸如彈子大每服一丸細嚼薑湯送下人參煎治積年咳嗽人參末一兩栝蔞取肉搗碎酥蜜各二兩上調勻盞子盛於飯上蒸九度每服一匙溫水化下日三服香豉湯治三十年咳逆上氣咽喉如水雞鳴或唾膿血不能療者香豉三升錢炒川椒一升錢炒出汗研乾薑一片豬肪半三斤兩上搗篩納肪藥中以水五升合豉等物熟煎每二合服之大效紫菀煎丸出聖惠方療咳嗽積年不瘥者胸膈干痛不利必效紫菀一大兩杏仁四十九枚去皮尖雙仁炒酥一大合蜜一大合上紫菀杏仁各別搗先煮酥蜜攪令和納紫菀杏仁研破塊煎十餘沸藥成出置瓷器中每日空腹服一彈丸細細含咽之忌酒面及豬肉等物甜葶藶丸出聖惠方治積年咳嗽肺氣不利喘急宜服此方臭黃一兩貝母一兩煨微黃亂髮半兩燒灰甜葶藶一兩隔紙炒令紫上為末熔蠟和丸如半棗大每夜綿裹一丸含咽下治久嗽不瘥方出千金方兔屎四十九粒硇砂二分胡桐淚一分上三味末蜜丸如梧桐子大每服三十丸以粥飲下日三服吐冷物盡即瘥訶子飲治久嗽語聲不出訶子去梗一兩杏仁一兩炮去皮尖通草二錢半上㕮咀每服四錢水一盞半煨生薑切五片煎八分去滓溫服食後芫花煎出千金方治新久嗽芫花乾薑各三兩白蜜三升上為末納蜜中令相和微火煎令如糜每服如棗核大一枚日三夜一以知為度欲利者多服以治冷飲嗽又治久嗽者以水五升煮芫花取三升去滓納姜加蜜合煎如糜服之貝母丸治久咳嗽貝母去心炒紫色四兩款冬花三兩紫菀去苗二兩上為末煉蜜和丸如梧桐子大每服三十丸食後生薑湯下香豉丸治三十年咳嗽上氣黑金散治久咳嗽喘息豬蹄合子黑者四十九個水浸洗淨天南星大者一枚銼款冬花帶蕊者末半兩上用瓶子一個放鋪豬蹄合子在內上以天南星勻蓋之合子鹽泥赤石脂封固濟火煅白煙出為度候冷取出入款冬花末並麝香一分龍腦少許同研每服一錢食後煎桑根白皮湯調下若年少即用生犀角中年即用羚羊角末各半分代豬蹄合子療治咳嗽積年不瘥者胸膈干痛不利必效出聖惠方莨菪二分以水淘去浮者水煮令芽出焙乾炒令黃黑色酥一雞子許大棗七枚上鐺中煎令酥盡取棗去皮食之日二治嗽不止者米殼一兩蜜炒黃甘草半兩炙五味子半兩半生半熟上為細末每服三錢水一盞杏仁七枚去皮尖同煎至七分食後臨臥服之治久嗽諸藥不效北螺青一錢細研黃蠟一錢燈頭燒灰杏仁十四枚去皮尖上用軟柿一枚入藥在內用紙十數重包煨香熟臨睡時服治久患咳嗽連四五十聲不止出千金方白蜜一斤生薑二斤取汁上先稱銅銚知斤兩訖納蜜復稱知數次納薑汁以微火煎薑汁盡惟有蜜斤兩在只旦服如棗大含一丸日三服禁一切雜食一方用熟湯調服阿膠飲一名膠豉湯治久咳嗽經年不瘥者阿膠炙燥一兩用黃明膠人參二兩上為散每服三錢豉湯一盞入蔥白少許同煎三沸放溫遇嗽時呷三五呷依前溫暖備嗽時再呷之延年療久咳不瘥豬腎一具去脂膜椒二十八顆開口者上取腎一顆上作十四孔每孔納椒兩顆納盡以水緩煮令熟割破細切啖之食盡有驗治三十年久嗽方出千金方上用百部根二十斤搗取汁煎如飴服一方寸匕每日三服又外臺方和飴一斤煎成以溫粥飲調下深師方以白蜜二升更煎五六沸服三合白散子出三因方治久年咳嗽不愈者上用附子二枚煨熟新水浸一時久去皮臍焙乾為末每服一錢白砂蜜二錢水一盞煎七分通口服治久嗽上氣一二十年不瘥者出本草上用伏翼除翅足燒焦為末米飲調服即飛鼠又方出危氏方治體氣素壯人久嗽即效上罌粟殼一味淨去筋膜蜜炙為末每服用蜜湯下又方出危氏方治羸弱人久嗽屢效上九尖拒霜葉為末用魚鮓蘸服又方出危氏方治久嗽漸成癆瘵上鳳尾草為末用魚鮓蘸服效又方出本草上用雉雞卵中白皮主久咳結氣以麻黃三分紫菀八分和丸服之立效萊蔔方治積年上氣咳嗽多痰喘促唾膿血上用萊蔔子一合研煎湯食前服之又方出本草治老嗽上以鴝鵒或作羹食之亦得或搗為散白蜜和丸並得治上件病取臘月臘日得者良有效非臘日得者不堪用黑馬蹄香散治久嗽馬屁勃丸治久嗽上用馬屁勃不以多少為細末煉蜜為丸如梧桐子大每服二十丸煎湯送下即愈又方療咳嗽積年不瘥者胸膈干痛不利上取莨菪子三指撮吞咽之日五六度療人久咳欲死上取厚榆皮削如指大去黑刻令如鋸長尺余納喉中頻出入當吐膿血即愈又方出聖惠方一名皂莢丸治咳嗽久不瘥神驗及治痰咳逆上氣時時唾濁上用皂莢五挺不蛀者去黑皮塗酥炙黃為細末煉蜜和丸如梧桐子大每於食後用桑白皮湯下十丸一以大棗膏和湯下又方一名吞煙法出聖惠方上用款冬花一兩為細末煉蜜和丸如半棗大以綿裹一丸含咽津日四五服一方以火燒令煙出口含取煙咽之治諸嗽不已遠年日久桃仁炒杏仁炒知母貝母桑白皮上等分㕮咀每服三大錢水一盞煎至七分去滓食後服百部煎治咳嗽久不已生百部汁生地黃汁生薑汁蜜生百合汁如無以藕汁代各一盞棗四兩去皮核上熬成膏每服一匙麥門冬熟水一盞化開空心日午臨臥各一服治嗽不止方一名紫菀湯出百一選方兼治痰嗽喘急紫菀款冬花各五錢百部二錢半上為散水一盞生薑三片烏梅一個煎至七分去滓酒服食後臨臥煎服又款冬花滓無風處點火吸咽一方不用酒治咳嗽款冬花石膏即寒水石火煅薄荷桂皮上等分為細末用蘆筒吸進夜服忌酒胡椒煎炒咸等物治老嗽出本草取故茅屋上塵多年煙火者和茅取之拂取上塵和石膏款冬花婦人月經衣帶為末以水和塗於茅上待乾納竹筒子中燒一頭以口吸含之入咽喉數數咽之無不瘥也治久嗽不愈肺間積虛熱久則成瘡故嗽出膿血曉夜不止喉中氣塞胸膈噎痛出本草蛤蚧阿膠生犀角鹿角膠羚羊角各二一兩上除膠外皆為屑次入膠分四服每服用河水三升於銀石器中慢火煮至半升濾去滓臨臥微溫細細呷之其滓候服盡再捶都作一服以水三升煎至半升如前服若病人久虛不喜水當遞減水張刑部子皋病久田樞密送此方遂愈杏仁湯出朱氏集驗方治積年咳嗽阿膠蛤粉炒罌粟殼蜜炙白礬飛過杏仁去皮尖上等分四味粗末三大錢水一盞姜三片棗二枚蔥白三寸煎六分臨臥少頃吃喚醒始服此藥治久嗽方出永類鈐方款冬花蕊人參北五味子炒紫菀桑白皮或加胡桃肉杏仁松子仁別研各等分上成末煉蜜作膏入生薑自然汁時時含化以潤之長幼用之有奇妙杏仁膏出衛生家寶方治久嗽不止肺氣滿急獖豬胰一個研杏仁半兩去皮尖蕤仁半兩去殼貝母半兩為末上爛研細用新瓷瓶盛以黃蠟一分蓋面上於甑上蒸令熟逐時服之至妙訶子飲出衛生家寶方治久嗽無語聲不出訶子三二兩去核生薑一兩煨熟燈心半兩上一處每服五錢重水一升煎取半升空心服藥隨意服之阿膠飲子出聖惠方治營衛俱虛久嗽不止發熱自汗氣短怔忪倦怠食少人參白朮當歸乾地黃芎藭芍藥甘草麥門冬五味子桑白皮茯苓各半兩阿膠一兩上搗篩為飲子每服五錢以水一盞半生薑五片同煎至七分去滓溫服不拘時候姜餳煎出必效方治咳嗽積年不瘥者胸膈干痛不利生薑五兩餳半斤上二味取姜刮去皮如棗子切之置餳中微火煎姜使熟分十回服之
