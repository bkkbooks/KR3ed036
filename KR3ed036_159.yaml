body:
  text: 卷一百五十九咳嗽門冷嗽附論夫形寒飲冷內外合邪因而客之則為肺嗽蓋肺主氣外合皮毛其經還循胃口故內外得寒皆能傷之而為冷嗽其證呼吸氣寒口如飲冰雪嘔唾冷沫胸中急痛晝靜夜甚得溫止遇寒即發是也方五味子湯治肺感寒咳嗽不止五味子炒人參黃耆銼阿膠炒令燥桂去粗皮干熟地黃焙各半兩紫菀去苗土乾薑炮裂杏仁湯浸去皮尖雙仁炒各一兩白朮紫蘇葉各三錢半上為散每服三錢以水一盞煎至七分去滓溫服不計時日三服中和湯治肺有風寒痰壅咳嗽麻黃去節杏仁去皮尖炒紫蘇子炒桑白皮炒赤茯苓去皮柴胡去蘆陳皮去白各半兩款冬花三分細辛甘草炙馬兜鈴各一分上㕮咀每服二錢水一盞煎七分去滓溫服肺寒湯治肺胃虛寒咳嗽痰盛呀呷有聲嘔吐停飲咽喉干痛上氣喘滿目寒虛浮自汗惡風語聲嘶破背寒中冷心下悸動噦逆噁心全不入食款冬花紫菀去苗土甘草炙桂心去粗皮麻黃去節五味子杏仁湯浸去皮尖炒半夏湯煮軟焙乾各二兩細辛去苗葉一兩乾薑炮二兩上為散每服三錢水一盞生薑五片大棗三枚同煎至七分去滓溫服不計時候款冬花散出醫方大成治寒熱相交肺氣不利咳嗽喘滿胸膈煩悶痰實涎盛喉中呀呷鼻塞清涕頭目眩暈肢體倦疼咽嗌腫痛款冬花去梗知母桑葉洗焙各十兩半夏湯洗七次薑汁製甘草各二十兩麻黃去根節阿膠碎炒如珠子杏仁去皮尖麵炒貝母去心麩炒各二十兩上為粗末每服二錢水一盞入生薑三片煎至七分去滓食後溫服一方用桑白皮無桑葉加味理中湯出醫方大成治肺胃俱寒咳嗽不已甘草炙半夏炙茯苓乾薑不炒白朮橘紅細辛北五味子人參各等分上㕮咀每服三錢水一盞薑棗煎食前服曾經解利者通用胡椒理中丸出醫方大成治寒嗽冷痰吐白涎沫續續不止不能飲食治肺虛感寒氣不宣通咳嗽喘急胸膈氣悶不進飲食嘔吐涎水款冬花去梗胡椒蓽茇陳皮乾薑甘草良薑細辛去葉各二兩白朮二兩半上為末蜜丸如梧桐子大每服十丸溫湯米飲任下不拘時酒下亦得杏仁煎出千金方治冷嗽上氣鼻中不利杏仁五合五味子款冬花各三兩紫菀乾薑各一兩桂心三兩麻黃二兩甘草四兩上以水一斗煮麻黃取四升治諸藥為末又納膠飴半斤白蜜一斤合用汁中攪令相得煎如飴先食服如半棗許日三服不知加之以知為度橘皮湯療春冬傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭痛陳皮紫菀麻黃去根杏仁當歸桂心甘草黃芩各等分上㕮咀每服五錢水煎乾薑湯治冷嗽乾薑二兩炮裂紫菀去苗土半兩麻黃去節三錢桂去粗皮一兩杏仁去皮尖雙仁麩炒三十枚甘草炙銼一兩五味子半兩上㕮咀如麻豆每服五錢水一盞半煎八分去滓溫服日三華蓋散出醫方大成治肺感寒邪咳嗽上氣胸膈煩滿項背拘急聲重鼻塞頭昏目眩痰氣不利呀呷有聲喘促不得睡臥者紫蘇子炒赤茯苓去皮桑白皮炙陳皮去白杏仁去皮尖炒麻黃去根節各一兩甘草炙半兩上為末每服二錢水一盞煎至七分去滓溫服食後隨意加製半夏棗及生薑煎亦得溫肺湯出余居士選奇方治冒寒咳嗽清涕自流麻黃不去節杏仁不去尖甘草生用桂枝微炒去皮溫姜炮各半兩五味子細辛去葉各一二兩錢上㕮咀每服二錢水一盞半姜五片蔥白五寸煎七分熱服阿膠湯治冷嗽阿膠炒令燥五味子麻黃去節陳橘皮湯浸去白焙各一兩甘草炙銼杏仁湯浸去皮尖雙仁炒各半兩上為散每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候五味子湯出三因方治夏秋之交皮膚為寒濕所薄寒氣內侵咳嗽晝夜不已陳皮二兩麻黃去節甘草炙杏仁去皮尖麩炒五味子白茯苓各一兩上為末每服三錢水一盞煎七分去滓帶熱服食後臨臥日三服一方有桂半兩加減麻黃湯出直指方治肺感寒邪咳嗽麻黃去節一兩辣桂甘草炙各半兩杏仁五十枚去皮尖微炒別研陳皮半夏制各半兩上細銼拌和杏仁每服三錢紫蘇三葉姜四片煎服細辛散治肺寒咳嗽喘滿細辛去苗葉甘草炙銼五味子各三兩赤茯苓去黑皮四兩乾薑泡裂三兩上為散每服二錢沸湯點服日三服五辛丸出醫學切問治寒嗽聲音不出丁香胡椒蓽茇良薑桂心各等分上為細末入炒鹽少許薑汁煮糊為丸雞頭子大每服三丸含化或細嚼熟水下亦得五拗湯出醫方大成治感寒咳嗽肺氣喘急麻黃不去節杏仁不去皮甘草生用荊芥穗各等分桔梗一錢上㕮咀生薑三片同煎溫服咽喉痛甚者煎熟後加朴硝少許一方去桔梗荊芥用半夏枳實等分四順散治肺寒久嗽乾薑炮裂甘草炙銼陳橘皮湯浸去皮瓤焙杏仁湯浸去皮尖雙仁炒別研上四味等分除杏仁外搗羅為末入杏仁再研勻每服一錢以沸湯點服空心食前日三服鍾乳湯出余居士選奇方治虛冷咳嗽痰盛等證鍾乳粉半夏天南星炮各一兩滑石三錢別研上將半夏南星碾為細末和鍾乳粉滑石令勻每服三錢生薑十片水二盞煎至八分食前溫服如稟受虛弱人以此藥下黑錫丹五十丸或四神丹二十粒無不效者紹興劉駐泊名汝翼遠客閩中年近六十素虛弱服此取效理中丸一名順味丸出直指方補肺止寒嗽人參乾薑白朮甘草炙各等分上為末煉蜜丸彈子大每一丸加炒阿膠五味子煎服金不換丸出經驗良方治大人小兒經久寒嗽化痰天南星半炮半生半夏半炮半生白礬半生半枯皂角半燒存性半生去皮上等分為末生薑汁煮糊為丸每服二十丸淡薑湯送下杏仁丸治冷嗽呼吸氣寒嘔吐冷涎胸中不利急痛杏仁一升去皮尖雙仁炒黃生薑一斤去皮切片曝乾陳橘皮湯浸去白焙五兩上為末煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒送下不拘時候又方出宣明論治諸寒嗽麻黃四兩官桂一兩蠟一錢上為末以蠟同煎每服一二錢溫服姜飴煎一名含化膏出千金方治冷嗽乾薑炮裂三兩為細末膠飴一斤上拌勻以瓷器盛置飯上蒸令極熟每服一棗大含化咽津日五夜三川薑丸出經效濟世方治寒嗽上用川薑炮過為細末熔餳為丸如彈子大含化之得於郭英達云其效如神後用之果然溫肺湯出百一選方治肺寒氣咳嗽聲重多涕發喘麻黃去節一兩錢五味子杏仁去皮尖炒甘草炙桂各半兩上每服三錢水一盞姜三片煎七分去滓食後服又一方用陳皮一方去桂名益肺散喘甚加馬兜鈴桑白皮夏月減麻黃壬子年春時行此疾姚知縣克溫名延袞去浙東得此方二服即愈因以見傳家間患此者服之皆驗鍾乳散出朱氏集驗方治寒嗽不止鍾乳粉人參阿膠炒上三味等分為末糯米飲下參芎湯出朱氏集驗方治男子婦人一切虛證冷嗽人參川芎甘草炙白朮白茯苓芍藥白豆蔻仁炒當歸酒浸焙黃耆蜜炙肉桂去皮各半兩罌粟殼蜜炙五味子各一兩上㕮咀每服三錢生薑三片棗二枚水一盞半煎至八分去渣空心服湘中黃應明三世用之有效款肺散出王氏博濟方治寒濕相交咳嗽不止胸膈悶亂痰涎並多麻黃二兩去根節炒貝母去心炒桑白皮各一兩銼炒柴胡一兩半去蘆炒杏仁一兩去皮尖炒款冬花一兩去塵炒糯米一兩上七味新好者杵為末每服一二錢水一盞煎至七分溫服不計時候平肺湯出本草治寒嗽平肺氣人參五味子黃耆白茯苓杏仁桂各一兩麻黃二錢上並銼碎每服二錢以水一盞煎至七分食後臨臥細熱呷才溫再暖熱呷之尤佳五味子湯出朱氏集驗方治寒嗽益肺五味子胡桃肉各一兩半生薑五兩去皮甘草杏仁各一兩上將五味子與四味於鉢中爛研如泥同加甘草末再研令得所入瓷閣中取沸湯調服加人參尤妙治冷嗽以櫚木煮汁熱服治上氣冷嗽以藍藤根煮服之熱嗽附論夫熱嗽之狀嗽而少涎由邪熱熏於上焦客於肺經使津液減少傳於咽嗌喉嚨不利隨其呼吸而咳嗽也肺主於氣氣為陽陽盛則生熱也皆臟腑不調經絡痞澀邪熱克於上焦氣道不利痰實積聚胸中煩滿故令咳嗽也方清肺飲治肺氣上熱咳嗽前胡荊芥桑白皮炒甘草炙枳殼制各三錢知母貝母去心炒腦荷赤茯苓北桔紫蘇阿膠炒杏仁去皮天門冬去心焙各半兩上銼每服三錢姜三片烏梅一枚食後煎服如更內實與解毒雄黃丸清肺丸治心肺伏熱咳嗽煩悶時有痰涎喉中介介咽嗌不利氣不宣暢並宜服之木香青黛研蛤粉研前胡人參去蘆頭黃連各半兩桔梗微炒枳殼麩炒各半兩薄荷半夏湯洗七次天南星生各一兩大黃生牽牛微炒各二兩上為細末滴水和丸如梧桐子大每服五十丸食後生薑湯送下麥門冬煎治暴熱咳嗽心胸煩悶口苦幹燥上焦壅滯並宜服之生麥門冬汁四合生地黃汁一升酥三合生薑汁二合白沙糖三合白蜜五合貝母二兩微煨黃五味子二兩赤茯苓二兩麝干一兩半杏仁二兩湯浸去皮尖雙仁麩炒研入膏上先搗羅貝母等四味為末入麥門冬汁杏仁膏等於銀鍋內都攪令勻以慢火煎成膏收不津器中不計時候取一茶匙含化咽津天門冬丸治肺氣暴熱咳嗽心胸不利或時煩喘天門冬去心焙二兩麝干桂去粗皮玄參遠志去心各半兩黃耆銼三分錢杏仁去皮尖雙仁麩炒栝蔞根百部紫菀去苗土馬兜鈴各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每服二十丸溫水下不拘時候日四五服百部丸治肺氣熱嗽胸膈煩悶百部黃耆銼杏仁去皮尖雙仁麩炒各一兩天門冬去心焙栝蔞根各五兩桂去粗皮一兩一分玄參二兩半紫菀去苗土馬兜鈴紫蘇並莖各四兩上為末煉蜜和丸如梧桐子大每服十五丸食後煎加烏梅半個生甘草六分溫湯下百部湯治熱咳嗽氣滿喘急百部百合桑根白皮銼柴胡去苗枳殼去瓤麩炒木通銼各一兩赤芍藥郁李仁去皮炒各三兩赤茯苓去黑皮二兩甘草炙銼半兩上為散每服五錢水一盞半生薑一片棗大一枚拍碎煎至七分去滓溫服不拘時候地黃湯治咳嗽大便不通壅熱口內生瘡生熟地黃焙各一兩麻黃去根節煎掠去末焙黃芩去黑心升麻赤茯苓去黑皮龍膽去土大黃銼炒黃連去須桑根白皮銼炒各半兩甘草炙銼一分上為散每服三錢水一盞煎至七分去滓服以利為度紫菀散治暴熱咳嗽氣促背膊勞痛飲食減少紫菀一兩去苗土麥門冬一兩去心川升麻一兩木通一兩半銼子芩一兩前胡一兩半去蘆頭赤茯苓二兩甘草五錢炙赤銼貝母一兩煨微黃大腹皮一兩上為散每服五錢水一大盞入生薑半分煎至六分去滓不拘時候溫服栝蔞丸治風熱咳嗽痰涎壅盛頭目不利鼻塞不通栝蔞一枚去節天南星炮半夏湯洗七次細辛去葉土寒水石防風去蘆頭當歸洗焙白礬各半兩上件除栝蔞外餘七味為末入在栝蔞內用紙數幅緊裹於飰上蒸兩次後再於新瓦上焙乾碾為細末醋糊為丸如緑豆大每服三二十丸生薑蜜湯送下食後柴胡散治肺暴熱大便不通時時咳嗽喘息促急柴胡一兩去苗甘草半兩炙赤銼桑白皮一兩銼鱉甲一兩醋炙黃去裙襴檳榔一兩旋覆花半兩川大黃二兩銼炒桔梗一兩去蘆上為散每服五錢水一大盞入生薑半分煎至五分去滓放溫不拘時服之金沸草散治上壅熱嗽聲重阿膠丸治客熱止嗽阿膠炒令燥三錢丹砂研半兩硼砂研五分人參三錢甘草炙銼半兩龍腦研三錢上為細末煉蜜和丸如梧桐子大每服十丸含化不拘時候華蓋湯治上喘咳嗽兼治膈熱一名華蓋散桑根白皮銼陳曲炒桔梗炒各一錢人參百合各三錢甘草炙銼杏仁去皮尖雙仁炒各半兩上為散每服二錢以水一盞煎至六分食後溫服一方用半夏半兩阿膠丸治風熱咳去涎利膈鎮心順肺阿膠炒令燥三錢人參赤茯苓去黑皮各半兩丹砂別研三