body:
  text: 卷二方脈總論辨奇經八脈法脈有奇經八脈者何謂也曰有陽維有陰維有陽蹺有陰蹺有沖有督有任有帶之脈凡此八脈皆不拘於經故曰奇經八脈也經有十二絡有十五凡此二十七氣相隨上下何獨不拘於經也曰聖人圖設溝渠通利水道以備不然天雨下降溝渠溢滿當此之時霪霈妄行聖人不能復圖此經脈滿溢經絡不能復拘也奇經者奇猶異也此之八脈與十二經不相拘制別道而行與正經有異故曰奇經其數有八故曰八脈也奇經八脈者既不拘於十二經皆何起何系督脈者起於下極之前並於脊裡上至風府入屬腦夫督脈者陽脈之海督之言都也是人陽脈之都綱也人脈比於水故云陽脈之海此奇經之一脈也任脈者起於中極之下以上毛際循腹裡上關元至喉咽夫任者妊也此是人之生養之本故曰任脈中極之下長強之上也此奇經之二脈也衝脈者起於氣衝並陽明之經夾臍上行至胸中而散夫衝脈陰脈之海也沖者通也言此脈下至於足上至於頭通受十二經之氣血故曰氣衝此奇經三脈也帶脈者起於季脅回身一周夫帶者言束也言總束諸脈使得調柔也季脅在肋下下接髖骨之間是也回是繞也繞身一周猶如腰帶焉此奇經之四脈也陽蹺脈者起於跟中循外踝上行入風池夫蹺者捷疾也言此脈是人行走之機要動足之所由也故曰蹺脈焉此奇經之五脈也陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈其陰蹺義與陽蹺同此奇經之六脈也陽維陰維者經絡於身溢蓄不能環流溉灌諸經者也故陽維起於諸陽會也陰維起於諸陰交也夫維者維持之義也言此脈為諸脈之綱維故曰維脈焉此是陰陽二脈是為奇經之七八脈也其受邪氣蓄則腫熱砭射之也凡九州之內有十二經水以流泄地氣人有十二經脈以應之亦所以流灌身形猶若氣血以養生身故比之於溝渠奇經之為病何如曰陽維維於陽陰維維於陰陰陽不能相維則悵然失志溶溶不能自收持夫悵然也其人驚驚即病維脈緩故令人不能自收持驚即失志喜忘恍惚也陽蹺為病陰緩而陽急陽蹺在外踝病即其脈當從外踝以上急內踝以上緩也陰蹺為病陽緩而陰急陰蹺在內踝病即其脈當從內踝以上急外踝以上緩也衝脈之為病逆氣而裡急衝脈從關元至咽喉故其脈為病逆氣而裡急也督脈之為病脊強而厥督脈在脊病則其脈急故令脊強也任脈之為病其內苦結男子為七疝女子為瘕聚任脈起於胞門子戶故其病結為七疝瘕聚也帶脈之為病苦腹滿腰溶溶若坐水中帶脈者回帶人之身體病則其脈緩故令腰溶溶也陽維為病苦寒熱陰維為病苦心痛陽為衛衛為氣氣主肺故寒熱陰為榮榮為血血主心故痛此奇經八脈之為病也又云衝脈者起於關元循腹裡直上至咽喉中任脈者起於胞門子戶夾臍上行至胃中二本雖不同亦俱有所據並可依用寸口脈來大而漸小者陰維也苦風痹癰時自發寸口脈來小而漸大者陽維也苦皮膚淫痛汗出惡寒寸口脈來緊細而長至關者任脈也苦繞臍及橫骨切痛診得任脈橫寸口遲者苦胸中有氣上搶心不得俯仰拘急診得陽維浮者暫起即目眩陽氣盛實苦肩息灑灑如寒診得陰維沉大而實者苦胸中痛脅下支滿心痛也診得陰維如貫珠者男子兩脅實腰中痛女子陰中痛為有熱也診得帶脈左右繞臍腰脊痛連陰股也兩手脈浮陰陽皆盛實者此為沖督之脈也沖督之脈者十二經之道路沖督用事者十二經不復朝見於寸口其人皆苦恍惚狂癡不定也兩手脈細微綿綿陰脈亦細微綿綿此為陰蹺陽蹺之脈尺脈俱浮直下此為督脈腰背強痛不得俯仰大人癩病小兒風癇也診得陽蹺病則急陰蹺病則緩尺寸牢直上下為沖胸中有寒疝也六經本脈體六經所以分手足陰陽者以足為本手為標如足厥陰風木肝與足少陽相火膽為表裡同在一處足太陰濕土脾與足陽明燥金胃足少陰君火腎與足太陽寒水膀胱皆相附近至於手三陰三陽相去頗遠蓋足陰陽本乎地奠方有常手陰陽法乎天變化無定足為常度手為揆度體常盡變故為奇度奇常揆度其道一也足厥陰肝脈在左關上弦細而長足少陰腎脈在左尺中沉濡而滑足太陰脾脈在右關上沉軟而緩足少陽膽脈在左關上弦大而浮足陽明胃脈在右關上浮長而澀足太陽膀胱脈在左尺中洪滑而長手厥陰心主包絡脈在右尺中浮弦而微手少陰心脈在左寸口洪而微實手太陰肺脈在右寸口澀短而浮手少陽三焦脈在右尺中洪散而急手陽明大腸脈在右寸口浮短而滑手太陽小腸脈在左寸口洪大而緊此手足陰陽六經脈體及其消息盈虛故化理不住運動密移與天地參同彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之應者乃氣候之至脈也故要論云厥陰之至其脈弦一云沉短而數少陰之至其脈鉤一云緊細而微太陰之至其脈沉一云緊大而長少陽之至大而浮一云乍疏乍數乍短乍長陽明之至短而澀一雲浮大而短太陽之至大而長本脈至脈雖識體狀又須推尋六氣交變南政北政司天在泉少陰之脈應與不應如要論所詮乙庚丙辛丁壬戊癸金木水火四運者皆曰北政少陰在泉故寸不應甲己土運德流四政譬如巡狩而居南面北謂之南政少陰在天故寸亦不應若北政厥陰在泉則右不應太陰在泉則左不應若南政厥陰司天則右不應太陽司天則左不應諸不應者反其診則見矣此乃常度合不應而反應是為太過合應而不應是為不及皆為外淫所因所以欲知少陰應否者以君火為萬物資始不可不知此且以一歲而論之若細推尋當以日論精微之道不可不知若歲主藏害自當揆度平治六經中傷病脈左手關前一分為人迎者以候寒暑燥濕風熱中傷於人其邪咸自脈絡而入以迎納之故曰人迎前哲方論謂太陽為諸陽主氣凡感外邪例自太陽始比考尋經似若不然風喜傷肝寒喜傷腎暑喜傷心包濕喜傷脾熱傷心燥傷肺以暑熱一氣燥濕同源故不別論以類推之風當自少陽入濕當自陽明入暑當自三焦入寒邪自太陽入故經曰陰為之主陽與之並別於陽者知病從來此之謂也足太陽傷寒左手尺中與人迎皆浮緊而盛浮者足太陽脈也緊者傷寒脈也盛者病進也其證頭項強腰脊痛無汗惡寒不惡風足陽明傷濕右手關上與人迎皆澀細而長澀者足陽明脈也細者傷濕脈也長者病襲也其證關節疼痛重腫而弱小便澀祕大便飧泄足少陽傷風左手關上與人迎皆弦浮而散弦者足少陽脈也浮者傷風脈也散者病至也其證身熱惡風自汗項強筋滿手少陽傷暑右手尺中與人迎皆洪虛而數洪者手少陽脈也虛者傷暑也數者病增也其證身熱惡寒頭痛狀如傷寒煩渴足太陰傷濕右手關上與人迎皆濡細而沉濡者足太陰脈也細者濕脈也沉者病著也其證身重腳弱關節煩疼冷痹脹滿足少陰傷寒左尺中與人迎皆沉緊而數沉者足少陰脈也緊者寒脈也數者病傳也其證口燥舌乾而渴皆惡寒反熱倦怠足厥陰傷風左關上與人迎皆弦弱而急弦者足厥陰脈也弱者風脈也急者病變也其證自汗惡風而倦小腹急痛手厥陰心包傷暑左右尺中與人迎皆沉弱而緩沉者心包脈也弱者傷暑也緩者病倦也其證往來寒熱狀如痎瘧煩渴眩暈背寒面垢此乃分布六經感傷外邪除燥熱外今敘此二氣以為徵兆若其傳變自當依六經別論所傷隨經説證施治或燥熱傷心肺當依經推明理例調治如四氣兼併六經交錯亦當隨其脈證審處別白或先或後或合或散在絡在經在表在裡四時之動脈與之應氣候以時自與脈期微妙在脈不可不察察之有紀從陰陽始始之有因從陰陽生此之謂也辨陰陽法脈有陰陽之法何謂也曰呼出心與肺吸入腎與肝呼吸之間脾受味也其脈在中浮者陽也沉者陰也故曰陰陽心肺俱浮何以別之曰浮而大散者心也浮而短澀者肺也腎肝俱沉何以別之曰牢而長者肝也按之濡軟舉指來疾者腎也脾者中州故其脈在中是陰陽之脈也脈有陽盛陰虛陰盛陽虛何謂也曰沉之損小浮之實大故曰陽盛陰虛浮之損小沉之實大故曰陰盛陽虛是虛實之意也陽脈見寸口浮而實大令輕手按之更減損小故曰陽虛重手按之反更實大故曰陽實也脈有一陰一陽一陰二陽一陰三陽有一陽一陰一陽二陰一陽三陰凡此六脈者謂浮沉長短滑澀也凡脈浮滑長者陽也沉澀短者陰也所言一陰一陽者謂脈來沉而滑也一陰二陽者謂脈來沉滑而長也一陰三陽者謂脈來浮滑而長時一沉也所言一陽一陰者謂脈來浮而澀也一陽二陰者謂脈來長而沉澀也一陽三陰者謂脈來沉澀而短時一浮也各以其經所在名病之逆順也浮大數動滑陽也沉澀弱弦微陰也長者為陽短者為陰陽脈見陰脈者逆陰脈見陽脈者順關前為陽關後為陰陽數即吐陰微即下陽弦即頭痛陰弦即腹痛論五臟六腑部位脈法左手寸口者心與小腸脈之所出也心屬南方丙丁火夏旺七十二日其脈來洪大而長炎升高泛形若在膚之中象南方火位經曰夏日在膚泛泛乎萬物有餘而易取也自立夏之初四月陽明旺氣候始入火位令其氣漸萌陰氣故脈雖浮大而微短也自仲夏之五月太陽旺火氣已盛脈上膚中輕手乃得其脈洪大而長也自夏至之後一陰生其脈來洪大而時滑也以迎陰氣而陽氣微下陰氣微上故卦乃天風姤是陰陽相接而運轉不離也至於季夏之月太陽旺而陽盛萬物長極陽氣有餘垂枝布葉皆下曲如鉤脈來疾而去遲其泛泛高虛洪大而長也心脈來微洪或洪大而長者或纍纍如連珠之狀如手循琅玕者皆平脈也脈來喘連而手偃曲者胃氣少曰病脈來前曲後直者如操帶之鉤謂氣絶曰死又曰真心脈至堅摶如循薏苡纍纍然其面色赤黑不澤毛折者亦死心脈息數勻和而微洪長大者臟腑皆無疾得本候也左手關上者肝與膽脈之所出也肝屬東方甲乙木春旺七十二日脈來弦長以象木形端直也經曰春應中規又曰春日浮如魚遊在波雖出而未全見也立春之正月少陽旺而萬物始生未有枝葉氣上微少故脈來乍數乍疏乍短乍長欲暢未暢進退無常尚存陰氣至仲春之月少陽旺其陽旋升枝葉漸長而脈濡弱而微長至季春之三月陽明旺其陽氣已升陰氣漸伏草木梢長其脈來濡弱而弦長息數均勻皆平和之候也診脈來濡弱而弦長如揭竿之梢者曰平脈來盈實而滑如循長竿者胃氣少曰病脈來急益徑如張弓弦胃氣絶曰死矣左手尺中者腎與膀胱脈之所出也腎屬北方壬癸水冬旺七十二日其脈來沉濡而滑也沉者陰也滑者象北方水位也經曰冬應中權又曰冬脈在骨蟄蟲周密君子在室故脈氣沉伏自立冬之初孟冬十月少陰旺陰氣方盛萬物收藏也水冰凝石脈伏行骨中當微沉而滑至仲冬十一月厥陰旺而陰氣將極故言厥陰也自冬至之後一陽生故陰氣極而陽氣迎接故卦乃地雷復脈當沉短至季冬十二月厥陰旺陰氣有餘陽氣自子位交接漸有升發之意其氣出於骨外近肉有力脈當微浮滑而沉也其脈來濡弱喘喘纍纍如小而鉤曰平和之候脈來如引葛按之益緊胃氣少曰病脈來發如斷索劈劈如彈石胃氣絶曰死矣右手寸口者肺與大腸脈之所出也肺屬西方庚辛金秋旺七十二日秋脈毛而萬物蕭索草木凋落其脈如風吹羽以應西方金肅殺之象也經曰秋應中衡又曰秋日下膚秋初七月太陰乘夏之餘陽氣升而陰氣未盛其脈來緊大而長若仲秋八月太陰旺而陽氣漸降陰氣漸上萬物漸凋草木漸枯脈當輕虛而浮澀也至季秋九月少陰旺西方金陰盛極萬物所終草木皆凋落脈來似榆莢虛軟滑以近水位也凡息數均勻不大不小浮短澀者皆臟腑無疾脈來靄靄如車蓋輕虛胃氣少曰病脈來蕭索如風吹毛羽紛紛散漫者胃氣絶曰死矣右手關上者脾與胃脈之所出也脾屬中央戊己土以四時寄旺十八日合七十二日應一歲三百六十之數脾者土也孤臟也其正旺於季夏脈應中矩平正之象也土能容納水穀變化津液溉灌肝心肺腎故脾胃為孤臟者以四時隨五脈之變其脈常得勻和緩慢之體應土位以存性厚重也故善不可得見惡乃見耳凡息數勻和脈來勻緩是謂脾胃安和之候又曰脈和柔相離如雞踐地緩息調和曰平脈如雀之啄如水之下漏皆肝腎乘胃則死腎來乘脾曰病又真藏脈至乍疏乍數色黃青不澤毛折者乃死矣右手尺中者命門與三焦脈之所出也右腎者腎有兩枚左為腎右為命門也故男子以藏精女子以藏月水然命門雖屬水乃腎之餘氣非純水位也以肺之金藏引導氣血相生長養蓋心主血血為榮血潮肝流入腎肺主氣亦潮腎順則收血化為精運入命門養於骨髓運真陽之氣上潮腦戶故命門者接元陽正氣上通三焦與子午君火交泰之兆合心包絡通陰陽變化之道路應五臟六腑之根源非腎脈之司也蓋命門中含真陽之氣常得陰中養陽之候然與腎旺七十二日故脈來大體不殊也冬沉濡而滑春弦滑夏洪滑秋微滑此謂和平之候亦應四時五行變化蓋命門之根本也變化精氣長養百骸溉灌腑臟無所不至而三焦之疾皆可見焉論四時脈及太過不及法春脈弦夏脈鉤秋脈毛冬脈石是王脈耶將病脈耶曰弦鉤毛石者四時之脈也春脈弦者肝東方木也萬物之始生未有枝葉故其脈之來濡弱而長故曰弦夏脈鉤者心南方火也萬物之所盛垂枝布葉皆下曲如鉤其脈來疾而去遲故曰鉤秋脈毛者肺西方金也萬物之所終草木花葉皆秋而落其枝獨在若毫毛也故其脈之來輕虛以浮故曰毛冬脈石者腎北方水位也萬物之所以藏也盛冬之時水凝如石故其脈之來沉濡而滑故曰石此四時之脈也如有變奈何曰春脈弦反者為病何謂反曰氣來實強是謂太過病在外氣來虛微是謂不及病在內氣來厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而徑益強如新張弓弦曰死春脈微弦曰平弦多胃氣少曰病但弦無胃氣曰死春以胃氣為本夏脈鉤反者為病何謂反曰氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來纍纍如環如循琅玕曰平來而益數如雞舉足者曰病前曲後直如操帶鉤曰死夏脈微鉤曰平鉤多胃氣少曰病但鉤無胃氣曰死夏以胃氣為本秋脈毛反者為病何謂反曰氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來靄靄如車蓋按之益大曰平不上不下如循雞羽曰病按之消索如風吹毛曰死秋脈微毛曰平毛多胃氣少曰病但毛無胃氣曰死秋以胃氣為本冬脈石反者為病何謂反曰氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來上大下鋭濡滑如雀之啄曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死冬脈微石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本胃者水穀之海也主稟四時故皆以胃氣為本是謂四時之變病死生之要會也脾者中州也其平和不可得而見衰乃見爾來如雀之啄如水之下漏是脾衰見也五臟所屬左寸外以候心內以候膻中右寸外以候肺內以候胸中左關外以候肝內以候膈中右關外以候脾內以候胃脘左尺外以候腎內以候腹中右尺外以候心包內以候腰五臟脈本體人之脈者乃脈之隧道也非氣使則不能行故血為脈氣為息脈息之名自是而分呼吸者氣之橐籥動應者血之波瀾其經以尺寸度之計十六丈二尺一呼脈再動一吸脈再動呼吸定息脈五動閏以太息則六動一動一寸故一息脈行六寸十息六尺百息六丈二百息十二丈七十息四丈二尺計二百七十息漏水下二刻脈行四丈二尺營周一身百刻之中得五十營故曰脈行陽二十五度行陰二十五度也息者以呼吸定之一日計一萬三千五百息呼吸進退既遲於脈故八息三分三毫三釐方行一寸八十三息三分三毫行一尺八百三十三息三分行一丈八千三百三十三息行十丈餘六丈二尺計五千六百一十七息通計一萬三千五百息方行盡十六丈二尺經絡氣周於一身一日一夜會於風府者是也脈屬陰陰行速猶太陰一月一周天息屬陽陽行遲猶太陽一歲一周天如是則應天常度故春肝脈弦細而急夏心脈浮大而洪長夏脾脈軟大而緩秋肺脈浮澀而短冬腎脈沉濡而滑各以其時而候旺相休囚脈息無不及太過之患故曰平人常氣稟於胃故四時必以胃氣為本取其資成也合本臟氣三分微似弦洪緩澀沉則為平脈若真臟脈見則不佳矣五臟傳變病脈右手關前一分為氣口者以候郁發與胃氣兼併過與不及乘克傳變也內氣鬱發食氣入胃淫精於脈自胃口出故候於氣口以五臟皆稟氣於胃胃者五臟之本臟氣不能自致於手太陰必因胃氣而致邪氣勝胃氣衰故病甚胃氣絶其臟獨見故死假如春肝脈弦多胃少曰肝病但弦無胃氣曰死若其乘克春雖有胃氣而有澀脈見則秋必病澀甚則今病夏心脈洪多胃少曰心病但洪無胃氣曰死如乘克見微沉則冬病沉甚則今病秋肺脈澀多胃少曰肺病但澀無胃氣曰死秋見洪為夏病洪甚為今病冬腎脈沉多胃少曰腎病但沉無胃氣曰死冬見濡為長夏病濡甚為今病長夏脾脈濡多胃少曰脾病但濡無胃氣曰死長夏見弦脈為春病弦甚為今病又如春肝脈合弦細而長太過則實強令人善怒忽忽眩冒癲疾不及則微虛令胸痛引背兩脅胠滿夏心脈合洪而微實太過則來去皆盛令人身熱膚痛為浸淫不及則來不盛去反盛令人煩心上咳唾下氣泄秋肺脈合浮而短澀太過則中實旁虛令人逆氣背痛慍慍然不及則毛而微令人呼吸少氣上咯血下喘聲冬腎脈合沉而緊實太過則如彈石令人解㑊脊背少腹痛不欲言不及則其去如數令人心懸如飢眇中青脊中痛少腹滿小便變長夏脾脈當沉而濡長太過則如水之流令人四肢不舉不及則如鳥之啄令人九竅不通名曰重強太過不及脈之大要迫近而微不可失機又人之五臟配木火土金水以養魂神意魄志生怒喜思憂恐故因怒則魂門弛張木氣奮激肺金乘之脈必弦澀因喜則神廷融泄火氣赫羲腎水乘之脈必沉散因思則意舍不寧土氣凝結肝木乘之脈必弦弱因憂則魄戶不閉金氣澀聚心火乘之脈必洪短因恐則志室不遂水氣旋卻脾土乘之脈必沉緩此蓋五情動不以正侮所不勝既不慕德反謂能乘而勝之侮反受邪此之謂也其病有五五五二十五變若其所傳授勝克流變又當詳而論之故經曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝如肝受氣於心傳於脾氣舍於腎至肺而死心受氣於脾傳於肺氣舍於肝至腎而死脾受氣於肺傳於腎氣舍於心至肝而死肺受氣於腎傳於肝氣舍於脾至心而死腎受氣於肝傳於心氣舍於肺至脾而死則知肝死於肺候於秋庚篤辛死余皆仿此又如甲乙主寅卯丙丁主巳午庚辛主申酉壬癸主亥子戊己主辰戌丑未一日一夜五分則可以占死者之早暮此病之次也然卒發者不必治於傳或其傳化不以次入者憂恐怒喜思令不得以其次故令人有大病矣此五臟傳變之大要也脈病名狀浮者按之不足舉之有餘與人迎相應則風寒在經與氣口相應則榮血虛損沉者舉之不足按之有餘與人迎相應則寒伏陰經與氣口相應則血凝腹藏遲者應動極緩按之久牢與人迎相應則沉寒凝滯與氣口相應則虛冷沉積數者去來促急一息數至與人迎相應則氣躁熱煩與氣口相應則陰虛陽盛虛者遲大而軟按之豁然與人迎相應則經絡傷暑與氣口相應則榮衛走散實者按舉有力不疾不遲與人迎相應則風寒貫經與氣口相應則氣血壅脈緩者浮大而軟去來微遲與人迎相應則氣熱入臟與氣口相應則怒急傷筋緊者動轉無常如紐單線與人迎相應則經絡傷寒與氣口相應則臟腑作痛洪者來之至大去之且長與人迎相應則寒壅諸陽與氣口相應則氣攻百脈細者指下尋之來往如絲與人迎相應則諸經中濕與氣口相應則五臟凝涎滑者往來流利有如貫珠與人迎相應則風寒潮溢與氣口相應則痰涎凝滯澀者參伍不調如雨沾沙與人迎相應則風濕寒痹與氣口相應則津汗血枯弦者端緊徑急如張弓弦與人迎相應則風走注痛與氣口相應則飲積冷疼弱者按之欲絶輕軟無力與人迎相應則風濕緩縱與氣口相應則筋絶痿弛結者往來遲緩時止更來與人迎相應則陰散陽生與氣口相應則積阻氣節促者往來急數時止復來與人迎相應則痰壅陽經與氣口相應則積留胃腑芤者中空旁實如按慈蔥與人迎相應則邪壅吐衄與氣口相應則榮虛妄行微者極細而軟似有若無與人迎相應則風暑自汗與氣口相應則微陽脫泄動者在關如豆厥厥不行與人迎相應則寒疼冷痛與氣口相應則心驚膽寒伏者沉隱不出著骨乃得與人迎相應則寒濕痼閉與氣口相應則凝思滯神長者往來流利出於三關與人迎相應則微邪自愈與氣口相應則臟氣平治短者按舉似數不及本部與人迎相應則邪閉經脈與氣口相應則積遏臟氣濡者按之不見輕手乃得與人迎相應則寒濕散漫與氣口相應則飧泄軟弱革者沉伏實大如按鼓皮與人迎相應則中風著濕與氣口相應則半産脫精散者有陽無陰按之滿指與人迎相應則淫邪脫泄與氣口相應則精血敗耗代者臟絶中止餘臟代動無問內外所因得此必死分寸關尺三部脈位法經曰凡寸關尺者脈之要會也從關至尺是尺內陰之所至也從關至魚際是寸口內陽之所至也故分寸為尺分尺為寸陰得尺內一寸陽得寸內九分尺寸終始以一寸九分也夫人之三部寸口在上關脈在中尺脈在下經云先言尺後言寸不從上而言反從下起者緣尺則是人性命之根本寸口者人身之本故有命然後有身所以先言尺澤蓋取命之根本然後及於身而言之也凡十二經脈有病之時先於尺澤寸口見之故尺寸者是脈之要會也從關至尺是尺內陰之所治者夫三部之脈取中而上下分之從關中至尺澤為內是屬陰故言內陰之所治也言尺澤者尺脈一寸之外餘脈下入不見如入深澤而沉故曰尺澤也凡診者若寸口關脈不見惟尺脈在者其人必不死亦如樹之有根枝葉雖枯其根氣元活故寸關者枝葉也尺澤者根本也從關至魚際是寸口內陽之所治者夫自關而向上分之上至寸口故言關至魚際者是長骨後際如魚之頸際故曰魚際也言從關上至魚際下占一寸屬陽是內陽之所治也然寸口雖占一寸而脈見九分者言陽數奇陰數偶故也是以關前屬陽故言九奇也關下屬陰故言寸偶也故分寸為尺者關以上雖取一寸而脈見九分故曰分寸為其先取一尺而言蓋先從根本言之故一尺內取一寸而脈一寸內取九分而診之故言分寸為尺從尺而取寸從寸而取分是也分尺作寸者從關以下至尺澤也蓋取脈長一寸而診之其一寸之脈蓋先取一尺之分而其中除卻九寸而更取一寸用之故言陰得尺內一寸陽得尺內九分從始至終寸尺位脈長一寸九分此則尺寸始終之法也凡寸後尺前兩境之內主於關為寸關尺也上部屬陽故法天下部屬陰故法地中部陰陽相兼故法人關者穿也言上可以穿其天下可以穿其地上下關通而取其中故言關也而分三部候天地人以法三才也凡古法定尺寸者皆先取一尺而言之從尺而取寸此則是其大綱也又凡脈長短不同其形各異又曰人長則脈長人短則脈短據此言之豈可執其一概必在醫者以意審詳今則以魚際骨下為寸口位占九分更下行一寸為尺部合成一寸九分中關為關部以安三指此之所定寸關尺蓋依難經永為楷式不可改移辨九候法黃帝曰余聞九針於夫子衆多博大不可勝數余願聞要道以屬子孫傳之後世著之骨髓藏之肝肺歃血而受不敢忘泄令合天道必有終始上應天光星辰曆紀下副四時五行貴賤更互冬陽夏陰以人應之奈何岐伯曰天地之數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾帝曰何謂三部岐伯曰有下部有中部有上部部各有三三候者有天有地有人也必指而導之乃以為真故下部之天以候肝地以候腎人以候脾帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣人以候心帝曰上部何以候之岐伯曰亦有天亦有地亦有人天以候頭角之氣人以候耳目之氣地以候口齒之氣三部各有天各有地各有人三而成天三而成地三而成人合則為九九分為九野為九藏故神藏五形藏四合為九藏五藏已敗其色必夭夭必死矣帝曰以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病以平為期帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆相失者皆死也分別脈病形狀凡診脈視其人大小長短及性氣緩急之脈皆如其人形性則吉反之者則凶夫脈者血之府也長則氣理短者氣病數則心煩大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少短而急者病在上長而緩者病在下弦而沉者病在內浮而洪者病在外滑而微浮病在肺下緊上虛病在脾長而弦者病在肝脈少血少病在心大而緊者病在腎脈實者病在內脈虛者病在外浮而大者風浮而澀者氣沉細疾者熱遲緊者為寒諸腑脈為陽主熱諸臟脈為陰主寒陽微則汗陰為自下陽數則口瘡陰數則惡寒陽芤則吐血陰芤則下血脈與肌肉相得久持之至者可下之弦小緊者可下之弦遲者宜溫藥緊數者可發汗寸口脈浮大而病者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口脈沉細者名曰陽中之陰病苦悲傷不樂惡聞人聲少氣時時汗出陰氣不通兩臂不舉尺脈沉細名曰陰中之陰苦兩脛痠疼不能久立陰氣衰小便餘瀝陰下濕癢尺寸脈牢而長關中無此為陰乾陽苦兩脛重小腹引腰疼寸口脈壯大尺中無此為陽干陰苦腰背痛陰中痛是脈浮而大為陽干陽苦小腹痛滿不能溺溺即陰中痛大便亦然寸口脈緊者中風風攻頭痛夫瘧脈自弦弦數多熱弦遲多寒初持脈如躁之狀久久按之細而牢苦腰腹相引痛不能食足脛重脈來乍大乍小乍短乍長為禍祟脈來但實者為心勞脈來洪大嫋嫋者為禍祟寸口脈弦中手短者頭痛脈來過寸口入魚際者遺尿脈來中手弦長者腰疼足脛痛脈來中手弦從上緊者肩背痛脈但數細心下熱盛脈盛滑緊者痛在外脈小實緊者痛在內脈小弱而浮滑久病脈澀浮而病新病脈沉而弦者其人有痃腹內痛脈來緩滑者熱在胃中脈來盛緊者腹脹脈弦急疝瘕小腹痛脈出魚際逆氣喘急脈來伏者霍亂脈來弦急疾者癖病脈來大緊疾者癲病脈浮而緩皮膚不仁風寒入肌肉脈沉而緊下焦寒得冷即大小便痛脈來遲而澀胃中塞有癥結脈來快而緊有積聚擊痛脈沉而細下焦寒小便數苦㽱痛下重痢脈滑而浮散者有風脈短而滑者病酒脈緊而滑者吐逆脈遲而緩者脾胃有寒脈弦而鉤脅下如刀刺狀如飛脈沉而遲腹藏有冷病脈浮而細滑傷於寒飲脈沉而數其人中酒冬時不治自愈脈滑者陽氣盛脈微而緊者有寒脈澀細而緊者痹病脈沉而滑為下重背膂痛脈短而數心痛必煩脈緊而數寒熱俱發必當下之乃愈脈微弱者有寒少氣脈遲緊者胃中有寒若不能食時時利者當難治脈弦而緊脅下痛脈大細滑中有短氣脈細小者血氣俱少脈澀者少血多氣脈滑者多血少氣脈大者血氣俱多兩手脈前部陽絶者苦心下寒內中熱脈洪大緊急病在外苦頭痛發癰腫脈細小緊急病在中寒疝瘕積聚腹中痛脈浮大中風頭重鼻塞脈微浮秋吉冬病脈來疾者為熱遲者為寒濕為鬼疰弦為切痛脈沉重而直前絶者腹間血病在內脈沉重而中散者因寒食成症脈沉而急病傷暑暴發虛熱脈來中散絶者病渴脈沉重前不至寸口徘徊絶者在肌肉遁尸脈纍纍如貫珠不前至有風寒在大腸伏留不去脈來纍纍而止不至寸口軟者結熱在小腸膜中而伏留不去脈微即陽氣不足虛熱汗出凡無陽即厥無陰即嘔陽微不能呼陰微不能吸呼吸不足胸中氣促前大後小即頭痛目眩前小後大即胸滿短氣上部有脈下部無脈其人當吐不吐者死陽邪來見浮洪陰邪來見沉細水穀來見實堅浮而滑者宿食洪大傷寒熱病弦小者寒癖浮滑之脈速疾者食不消脾不磨也關脈緊而滑者蛔蟲也三部或至或不至冷氣在胃中故令脈不通也尺脈沉滑者寸白蟲也脈緊而急者為遁尸脈緊而長過寸口者疰病關脈浮積聚熱在胃中尺脈浮者客熱在下焦諸浮諸緊諸弦諸沉諸澀諸滑若在寸口膈以上病若在關上胃以下病若在尺中腎以下病寸口脈沉胸中短氣若弦上寸口者宿食頭痛若有表有里者邪之所止得鬼病何謂表裡寸尺為表關上為里兩頭有脈關中絶不至也尺脈上不至關為陰絶寸脈下不至關為陽絶陰絶與陽絶皆死不可治也評寸脈法寸口脈沉緊若心下有寒時痛即有積邪寸口脈偏絶則臂偏不遂其人兩手俱絶者不可治寸口脈潎潎如魚上肥陽氣微寸口脈連連如蜘蛛絲陰氣衰寸口脈沉而緊病在中浮而盛病在外寸口脈沉而弱寒中疝瘕小腹痛寸口脈滑而遲不沉不浮不長不短者為無病寸口脈大而滑沉即為血實滑即為氣實血氣相搏入臟即死入腑自愈寸口脈弦而緊弦即衛氣不行惡寒水流走腸間寸口脈緊或浮膈上有寒肺下有水氣寸口脈沉滑者中有水氣血實目腫寸口脈雙弦兩脅下拘急而痛淅淅惡寒寸口脈浮而滑頭中痛寸口脈緩而遲緩即為虛遲則為寒虛寒相搏則欲溫食食冷即咽痛寸口脈遲而澀遲即為寒澀為少血寸口脈浮大按之反澀尺中亦微而澀故知有滯氣宿食寸口脈動而弱動即為驚弱即為悸寸口脈微弱氣血俱虛男子即吐婦人即下血寸口脈浮中風發熱頭痛寸口脈緊傷寒頭痛寸口脈緩皮膚頑痹不仁風寒入肌肉寸口脈滑陽氣實胸中壅吐逆寸口脈弦心中愊愊微頭痛胃管痛心下有水氣寸口脈弱陽氣虛自汗出寸口脈澀是胃氣少虛竭不足寸口脈芤即吐血微芤者衄血寸口脈伏胸中逆氣噎塞不通是諸氣上衝胸中也寸口脈沉胸中引脅痛胸膈有水氣寸口脈軟弱汗自出是虛損病寸口脈遲上焦有寒寸口脈實上焦生熱評關脈法關脈時來時去乍大乍小乍疏乍數者胃中寒熱羸弱不欲食如瘧狀關脈澀堅大實按之不減有力為中焦實有伏結在胃中關脈滑乍大乍小不勻必吐逆關脈浮大風在胃中張口肩息心下淡淡食即欲嘔關脈微浮有積熱在胃中嘔吐蛔蟲心神健忘關脈弦而長有痛如刀刺之狀在臍左右上下關脈浮氣虛腹滿不欲飲食關脈緊心下苦滿痛脈緊為實也關脈微胃中有冷氣心下拘急關脈數胃中有客熱關脈緩弱脾胃氣不足不能食關脈浮滑胃中有熱熱氣滿則不欲食食即吐逆關脈弦胃中有虛冷氣心下厥逆關脈弱胃氣虛胸中有客熱脈弱為大虛小熱有熱不可大攻之熱去即寒生關脈澀血氣逆冷為血虛也關脈芤大便下血關脈伏腹內有寒氣溏泄關脈洪胃中有熱必煩滿關脈沉心下有冷氣苦滿吞酸關脈軟苦虛冷脾氣弱里重下痢關脈遲胃中有寒病關脈實即脾胃氣塞熱盛腹滿評尺脈法尺脈弱下焦冷無陽氣尺脈牢小者足脛寒痿痹尺脈細溏泄下冷痢尺脈細而急者筋攣痹不能行尺脈大者熱在脬中小便赤痛尺脈按之不絶若與關脈相應和滑者男子氣血實婦人即為妊娠尺中來而斷絶者男子小腹有滯氣婦人月水不利尺脈浮下焦熱大小便難尺脈緊臍下及小腹結痛尺脈微厥逆小腹有寒氣尺脈數惡寒臍下熱痛小便赤黃尺脈緩腳軟下腫小便難有餘瀝尺脈滑血氣實經絡不利尺脈弦小腹疼腹中拘急尺脈澀足脛逆冷小便頻尺脈芤下焦虛小便脫血尺脈伏小腹痛寒疝瘕有水穀不化尺脈沉腰背痛尺脈軟腳弱風痹小便難尺脈遲下焦有寒尺脈緊臍下切痛尺脈微牢腰胯冷小腹痛小便不禁脈法贊肝心出左脾肺出右腎與命門具出尺部魂魄穀神皆見寸口左主司官右主司府左大順男右大順女關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈諸經損減各隨其部三陰三陽一云按察陰陽誰先誰後陰病治官官藏內也陽病治府府藏外也奇邪所舍如何捕取審而知之針入病愈脈有三部陰陽相乘榮衛氣血在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乘錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝弦皆有常經不失銖分出入升降漏刻周旋水下二刻一周循環當復寸口虛實見焉變化相乘陰陽相干風則浮虛寒則緊弦沉潛水畜支飲急絃動則為痛數則熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見中必有姦審察表裡三焦別焉知邪所舍消息診看料度臟腑獨見若神為子條記傳與賢人
