body:
  text: 卷三百四十八產後諸疾門產後血暈附論夫產後血暈者由敗血流入肝經眼見黑花頭目旋暈不能起坐甚至昏悶不省人事謂之血暈細酒調黑神散或清魂散最佳庸醫或作暗風中風治之必難愈凡暈血熱乘虛逆上湊心故昏迷不省氣迷欲絕是也然其由有三有用心使力過多而暈者有下血多而暈者有下血少而暈者其暈雖同其治特異當詳審之下血多而暈者但昏悶煩亂而已當以補血清心藥治之下血少而暈者乃惡血不下上搶於心心下滿急神昏口噤絕不知人當以破血行血藥治之古法有云產婦才分娩了預燒秤錘或江中黃石子硬炭燒令通赤置器中急於床前以醋沃之得醋可除血暈產後一月不妨時作為妙凡暈者皆是虛熱血氣奔逆腹中空所致欲分娩者第一須先取酸醋以塗口鼻仍置醋於旁使聞其氣兼細細飲之此為上法如覺暈即以醋噀面醒來即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏產母面即醒如無干漆以舊破漆器猛火燒熏之亦妙經行後迷悶者有去血多而悶去血多者是為血虛則心虛心虛則手足顫神魂亂則坐臥不安眼見黑花甚者迷悶去血少者是為血迷血迷則隨氣上流停留於心竅心下急滿無所歸神魂如醉不能言語產後迷悶者是為血暈血暈則虛而無所歸氣無所主氣血妄行掩觸心肺遂使眼花目眩神昏不知人事唇青肉冷口中絕氣雖數日有此證凡覺神昏悶絕宜服八寶丸治之產後血暈者是產母下血或少或多皆令五臟動運氣血未定敗血奔迸攻衝心肝若產去血過多則血虛氣極若下血氣逆則血隨氣上逼心也二者皆令人暈悶心煩滿急若血暈不止則斃矣若敗血攻於肝肝臟氣虛所以眼花心煩而欲絕也又云夫血暈煩悶氣欲絕者由產後出血過多血氣虛極因此而暈絕也又有下血少而氣逆極則血隨氣上衝於心亦令煩悶而滿急然亦當審其產婦血下多少則知其產後應暈與不暈也然暈不止則斃人凡產時當向坐臥之處須順四時若觸犯禁忌多令暈悶故血下或少或多是以產處若有觸犯多致災禍耳血暈眩暈須量虛實若宿有積飲阻病不除產後多致眩暈及血氣虛弱而使血逆上攻此又非清魂可療崔氏云凡暈者皆是虛熱血氣奔迸腹中空所致欲分娩者先取酸醋以塗口鼻仍以醋火淬於旁使聞其氣兼細細飲之此為上法可以免其暈也治血暈之證有三宜仔細辨證用藥若血少而暈者乃惡露不下上搶於心心下滿急神昏口噤不知人事宜破血行血之藥黑神散神妙若血多而暈者但神昏煩亂而已宜補血清心之藥芎歸湯神妙若下血少虛極羊肉湯當歸建中湯若身體素多風疾因產傷積氣血乘虛而暈四物湯加防風羌活若暈悶而熱多者獨活柴胡湯並治風痰若下多氣虛極暈昏不知人息欲絕暈不止則殺人方陳橘皮湯治產後惡血下多氣虛頭目旋暈沉沉默默不省人事調氣益血陳橘皮去白炒白朮切炒人參甘草炙銼黃耆銼酸石榴皮洗切熟乾地黃各半兩上粗篩分作三劑每劑用水五盞加生薑五片棗五枚擘同煎至三盞去滓時服一盞稍熱服未漚麻湯聖惠方治產後預防百病吃醋墨了便服此神效未漚麻一握去土一尺以上取枝及時陰乾赤芍藥三兩芎藭三分當歸三分銼微炒甘草三分炙微赤銼茯神三分陳橘皮一兩浸去白炒亂髮一兩半上搗羅為散每服四錢以水一鍾入生薑半分約煎至五分次入酒二合更煎三五沸去滓溫服治血暈至急宜服白瓷藥散聖惠方用白瓷藥燒令通赤乘熱搗碎令細不計時候以溫酒調下一錢當歸湯治產後敗血不盡衝心迷悶旋暈不語當歸切焙芎藭芍藥肉桂去粗皮生乾地黃微炒一分牛膝去苗酒浸切焙獨活去蘆頭劉寄奴各半兩上粗篩每服三錢水一盞入生薑五片煎至七分去滓溫服不拘時候玳瑁散治產後敗血不下上衝心腹疼痛玳瑁鎊三分蒲黃琥珀另研如粉好墨丹皮去心各半兩赤龍鱗燒灰即鯉魚皮延胡索當歸微炙芎藭各二兩上為散每服二錢用暖生薑酒調下淡醋湯亦得不拘時候服之荷葉蒂湯治產後血暈悶絕唇口青色不省覺者宜先用生雞子清一枚打勻灌入即定卻服此方荷葉蒂七枚蘇枋木銼碎三分牛膝去苗切焙乾延胡索各半兩芍藥半兩上粗搗篩每服三錢水一盞煎至六分去滓溫服如暈甚不省者開口灌之敗醬湯治產後惡血結聚血氣衝心暈垂死者敗醬羌活去蘆頭當歸微炙切芍藥芎藭苗瞿麥用穗子各一兩枳殼去瓤麩炒黃桂去粗皮各三分桃仁湯浸去皮尖雙仁麩炒黃色三十粒上粗搗篩每服三錢水一盞煎至六分去滓下馬牙硝半錢更煎數沸溫服空心相次再服利三二行惡血下為效延胡索湯治產後血暈延胡索芎藭各一兩牛膝去苗當歸切焙人參各二兩半生乾地黃二兩上粗搗篩每服三錢水一盞煎至七分去滓入白蜜一匙更煎令沸溫服相次再服琥珀煎治產後血暈無問冷熱悉主之琥珀一兩另研末生地黃汁一盞生薑汁一盞上先取地黃生薑汁二味相和緩火煎去一半別下無灰酒一盞又煎候如稀餳方取琥珀末入煎中熟攪置於瓷器中空心取半匙溫酒調服紅藍花湯治產後血下少暈悶嘔逆紅藍花蘇枋木各半兩銼上粗搗篩每服三錢水一盞煎取七分去滓溫服相次再服芍藥湯出大全良方治產後血暈悶不識人言語錯亂少氣者芍藥一分生乾地黃焙甘草炙令赤各一兩丹參半兩上粗搗篩每服三錢水一盞生薑一分切碎同煎至七分去滓下白蜜少許再煎令沸溫服相次更服當歸飲治產後血暈欲絕當歸微炙一兩鬼箭羽二兩上粗搗篩每服三錢酒一盞煎至六分去滓溫服相次再服延胡索散治產後血暈不識人延胡索劉寄奴當歸微炙各一兩上為散以溫酒二錢服之須臾便下芍藥湯治產後血暈絕不識人芍藥半兩末亂髮一兩燒灰上相和研令勻每服二錢以熱酒調服之須臾再服之立效也地黃湯治產後血暈心悶不識人神言鬼語氣急欲絕又方出大全良方荷葉三枝炙真蒲黃二兩甘草二兩生地黃汁半升白蜜一匙上細切以水三升煮取一升去滓入蒲黃蜜地黃汁暖服立愈妙赤馬通飲子出聖惠方治產後血暈狂語不識人狂亂童子小便五合生地黃汁一合赤馬通七枚紅雪八分上以上二味浸赤馬通絞去滓下紅雪溫為兩服一方無紅雪用當歸末半兩分三服獨行散出拔粹方治產後血暈昏迷不省悶絕衝心用五靈脂二兩半生半炒為末調溫酒衝下二錢口噤者拗開口灌之即愈一方用熟水調服若血崩不止用炒熟當歸酒同煎或水酒童便各半盞同煎又方水煎為膏加神麯末和丸桐子大空心溫酒下一方加荊芥等分為末童便調下又方出肘後方治產後血暈用神麯為末熟水調二錢亦治產難不瘥再服療產後血暈狂言煩渴不止出大全良方用生香附去毛為末每服二錢水一盞姜三片棗一個煎至七分溫服一方治用力過多血暈者宜服此調氣治產後血暈危困生地黃汁一大盞當歸一分銼赤芍藥一分銼上水三五六沸溫服如覺煩熱去當歸入童子小便半盞妙治產後血暈全不省人事極危殆者出大全良方用韭菜切斷盛在有嘴瓷瓶內煎熱醋沃之便密縛瓶口以瓶嘴向產婦鼻孔令醋氣透入須先扶病人起惡血衝心故有此證韭能去心之滯血加以醋氣運達之用無不效紅藍花酒出大全良方療血暈絕不識人煩悶言語錯亂惡血不盡腹中絞痛及治胎死腹中不下用紅藍花二兩為末分二服每服溫酒二盞童子小便二盞煮取一盞半候冷分為二服留滓再並煎一方無童便一方攙新水服如口噤斡開灌之如子死腹中服之立下療產乳暈絕方出大全良方用洗兒水飲三合良或以惡血服少許良半夏散出經驗良方療產後血暈用半夏不拘多少為末如豆大內鼻中即省亦療五絕作末搐鼻亦可又方出千金方用生赤小豆搗為末取東流水和服方寸匙不瘥再服救急同治產後血暈腹疼頭旋及臍腹痛一名沒藥散出聖惠方用沒藥為末每服一錢溫酒調下牡丹散出聖惠方治產後血暈悶絕狼狽若口噤則拗開灌之必妙牡丹皮大黃蒸芒硝各一兩冬瓜子半合桃仁三七粒去皮尖上銼為散每服五錢水三盞煎至盞半去滓入芒硝後又煎分二服欲產先煎下以備緩急金匱以此治腸癰但分兩稍異益母草散出仁存方治產後血暈心悶亂恍惚如見鬼生益母草汁三合根亦可生地黃汁三合童子小便一合雞子清一個上煎藥汁令熱入雞子清攪勻作一服蕓薹散治婦人產後血暈及九竅內血出煩渴不止欲死者此方可救血暈藥出百一選方產後便須準備用松煙墨二錢用火煅通紅窨滅火氣研為細末作一服溫酒調下京墨亦可治魂散一名芎藭湯出仁存方產後血暈者何答曰產後血暈因產血下過多血氣虛極是致暈悶甚則昏塞不知人氣息欲絕暈悶不止則能斃人若作暗風治之誠為謬矣且服清魂散自瘥如芎藭湯黑龍丹皆要藥也或以漆燒煙燻其鼻更於產婦房室中須用醋炭為佳澤蘭孫一作澤蘭葉人參去蘆各一兩川芎二兩甘草八錢一方無荊芥穗四兩上為末每服三錢熱湯調下痰盛加薑製半夏一錢生薑五片水一盞熱服口不開灌服一方熱湯溫酒各小半盞調勻急灌之下咽喉即眼開氣定自省人事一方無甘草評曰血暈當量虛實若因去血過多而暈宜芎藭湯若因痰阻未除宜茯苓半夏湯茯苓半夏湯治證同前半夏三兩茯苓熟地黃一兩八錢陳皮細辛人參芍藥川芎紫蘇桔梗甘草一兩二錢上以為散每服四大錢生薑七片煎空心服或血壅氣盛人宜牡丹散方內用大黃芒硝恐非產後可輕服者更不出方或曰奪命丹用大黃奚為而可答曰奪命丹兼用附子仍酒下五七小丸可以一時制勝牡丹散大劑煎服無擇翁且令先煎以備緩急謂之無擾可乎此方無擇親用之則可他人則不可烏金丸出楊氏家藏方治產後血暈及惡露未盡臍腹刺痛或胞衣不下腹脹喘滿斑蝥四十九枚血竭一分如無更加沒藥半兩代之沒藥半兩另研五靈脂半兩硇砂三錢上為細末用酒醋各一升慢火熬成膏搜沒藥丸如梧桐子大每服十丸至十五丸麝香熟酒送下不拘時候虎杖散出楊氏家藏方治產後血暈及兒枕疼痛惡露不行臍腹疼痛牡丹皮當歸洗焙白芍藥延胡索乾漆炒令煙盡羌活去蘆頭獨活香附炒紅花杖一名虎杖乾薑蒲黃肉桂去粗皮川芎甘草炙鬼箭以上各等分上為細末每服三錢水酒各半盞煎至七分於食前溫服治產後血暈用紅花或蘇枋木酒水濃煮汁飲治產後去血多眩暈須臾心悶氣絕出如宜方用舊漆器燒微煙逼面熏之卻不可太甚恐虛怯人不禁治產後血氣上衝心成血暈出聖惠方用穿山甲一兩童子小便浸一宿取出慢火炙令黃為散每服一錢狗膽少許熱酒調下隨時服之治產後血暈以苧麻與產婦枕之治產後血暈築心眩倒風縮欲死者出仁存方以荊芥穗搗篩每服用末二錢童子小便一盞酒調熱服立效如口噤者拗齒閉者灌鼻中皆效治產後血暈心氣絕以益母草研汁服一盞妙治產後血暈心悶氣絕出肘後方以童子小便濃研墨服一升一方用丈夫小便治產後血氣暈出聖惠方以醋用美清香稍稍含之即愈一方打破雞子一枚投熱醋中攪勻頓服立效治血暈出聖惠方以蘇木三兩細銼水五升煮取二升分再服瘥若無蘇木即以緋衣煮汁服亦可即蘇木酒煎服亦得產後血暈出海上名方以乾荷葉為細末溫酒調一錢服又方出海上名方用鰾膠燒灰存性為末三五錢童子小便調酒下川芎湯一名芎藭湯出危氏方治產後去血過多暈悶不省及傷胎去血多崩中去血多金瘡去血多拔牙齒去血多不止懸虛心煩眩暈頭重目暗耳聾舉頭欲倒宜服之治產後血暈悶兒枕痛等並宜餌此藥琥珀一兩鱉甲一兩三稜一兩延胡索半兩沒藥半兩大黃六銖上為散空心酒溫三二錢日再服神驗產後減大黃沒藥散出仁存方治產後血暈及血風衝心腹痛沒藥當歸各半兩穿山甲一兩上為末每服三錢狗膽汁少許煎酒調下童便尤佳紅藍花湯治產後血暈氣衝心悶絕紅藍花生乾地黃焙各一兩訶黎勒皮煨黃五枚上粗搗篩每服二錢以水酒共一盞煎至七分去滓服如人行三二里再服益母草散治產後血暈煩悶益母草乾者一兩藕節乾者人參各半兩上粗搗篩每服二錢水一盞生薑三片煎至七分再去滓溫服桂心散治產後血塊攻築頭目昏暈桂去粗皮薑黃各一兩上為散每服二錢以炒生薑酒調下不拘時候一方用酒調服羚羊角散出千金方治血暈心中煩悶兼腹痛羚羊角燒灰枳實去瓤麩炒黃色各一兩芍藥一兩半上粗羅為散煎酒令溫調一錢匕空心早晚各一服用童子小便及酒調下亦可天麻散治產後血暈天麻訶黎勒炮過用皮木香各一兩蕓薹子半兩微炒上粗篩每服二錢水一盞煎至七分去滓溫服相次再服沒藥酒方治產後血暈及腹痛用沒藥半兩酒三盞將沒藥磨盡每服一盞煎沸服續斷湯治產後血暈心腹硬乍寒乍熱以續斷三兩搗篩每服二錢以水一盞煎至七分再去滓溫服地黃飲治產後血暈心悶氣絕以生地黃嫩肥者搗取自然汁每服半盞煎沸服之如未效再服一方用酒相和頓服地黃散治產後下血過多氣虛血暈衝心悶亂不知人事生地黃切焙白芷延胡索白膠炙銼赤芍藥桂去粗皮白朮劉寄奴鱉甲醋炙丹參當歸焙各一兩荷葉二斤上為散每服三錢溫酒調下不拘時麝香散出聖惠方治產後敗血衝心暈悶及腹痛者麝香研半兩丹砂研半兩烏鴉毛臘月者燒灰研半兩墨半鋌煅豬胞子炮為灰五枚鯉魚鱗燒灰四兩蘇枋木銼兩半油發燒灰二兩上為末除前四味搗羅為散和勻每服二錢暖酒送下治產後血暈悶亂恍惚不語方生益母草汁一合地黃汁二合童子小便一合紫葛細研紅藍花各一兩上煎五七沸去滓溫服蘇枋飲治產後血暈腹悶氣喘急欲死蘇枋木二兩荷葉炙一枚芍藥一兩半桂去粗皮一兩鱉甲去裙酥炙一兩上銼為麻豆大以水五盞藕汁一合同煎取二盞除去滓入雪一兩分溫二服粥食前如人行三五里再服劉寄奴湯治產後百病血暈劉寄奴甘草各等分上銼如麻豆大每服五錢先以水二盞入藥煎至一盞後再入酒一盞去滓溫服紅藍花湯治產後血暈心煩悶紅藍花二兩紫葛一兩芍藥一兩上粗搗篩每服五錢水一盞半煎至八分去滓後再入生地黃汁半合更煎六七沸溫服不拘時赤馬通飲子出聖惠方治產後血暈惡血不行腹脹滿迷悶赤馬通五塊童子小便酒各五合上和攪馬通調絞取汁熱暖分溫服之紅藍花散出聖惠方治產後惡血不下血暈不識人紅藍花荷葉各等分上為散每服二錢用生薑汁調下一方用荷葉生薑湯下牛膝散治產後血暈悶及惡血不下牛膝去苗酒浸切焙當歸切焙芎藭各二兩劉寄奴一兩半芍藥桂去粗皮蒲黃紅藍花各一兩琥珀研生薑切焙乾各半兩上為散每服三錢溫酒調下或以水一盞煎至七分溫服亦得黑神散治產後血暈眼花黑暗不見物赤龍鱗炒亂髮燒灰烏賊魚骨燒灰各三分桂去粗皮乾薑延胡索牡丹皮訶黎勒皮芍藥芎藭各半兩當歸切焙生乾地黃水蛭炒一分上為散每服二錢炒生薑酒調下或炒黑豆小便調亦得大黃散治產後血暈血塊及傷折內損血瘀羊脛炭燒赤酒淬十次五兩大黃童子小便浸七日逐日易日足濕紙裹煨熱切焙巴豆去殼漿炙黃色焙各二兩半半兩錢燒赤醋淬為粉新水淘過取細三兩一分上為散研令勻每服半錢當歸一分童子小便煎濃稍溫調下產後血暈當逐血下口噤者斡開灌下後識人更一服累經生產有血積堅塊及敗血風勞寒熱諸疾當下如爛肝片亦無他疾墜擊內損當歸酒調下一字黑桂散治產後血暈煩悶或身體腫滿發狂瀉利寒熱等疾惟有喘者難瘥黑豆炒熟去皮二兩肉桂去粗皮當歸乾薑炮芍藥生乾地黃焙甘草蒲黃紙上炒各一兩上為散每服二錢溫酒調下日三服治產後血暈方上極酸醋和所產血一棗大服之井水噀面又方取童子小便磨安息香服亦妙又方取童子小便蒲黃一兩服亦用酸醋熏面吸氣妙治產後血暈不識人狂言亂語以童子小便磨狗膽灌之最妙治產暈心悶大困用鯽魚剝皮作鱠以齏食三兩口止又方取牆青衣一抄以水四小升煮取二升分服又生薑汁一小升地黃汁一小升酒一大升相和煎之五六沸分服每劑和大黃末一匙此方甚良治血暈絕不識人煩悶赤駁馬糞絞取汁一大盞溫者良若干者取新汲水半大盞和研絞取汁頓服亦主出血不止神驗治產乳暈絕覺暈即用三股麻繩長五六尺系產婦右腳膝上令人捉兩頭急挽得醒徐徐解之當歸湯治產後惡血下少氣逆頭目旋暈眼花心悶頭重不舉當歸洗切微炒芎藭桃仁去皮尖雙仁炒桂去粗皮芍藥牡丹皮各半兩上搗篩分三劑每劑用水五盞生薑五片棗五枚擘同煎取三盞去滓時服一盞溫服治產後血暈不知人事及狂語出聖惠方用麒麟竭一兩細研為末非時溫服酒調二錢治產後血暈絕出肘後方用細斷生雞肝內一斤熱酒中訖漉出滓停酒冷如人飲一服不能飲者可數口進治產防暈方出肘後方以先布炭燒地令熱即出炭以醇醋灑地令有醋氣於上產母必不暈也大效治產後血暈產後血暈病急搗紫花根擂汁和酒吃即時免災迍治產後血風出大全良方用大豆炒令煙出以酒一盞煎服並吃豆佳敗毒散出宣明論治婦人產後骨蒸血暈及男子往來寒熱大黃黃藥子紫河車赤芍藥甘草各等分上為末每服一錢如發熱冷水下如發寒生薑栝蔞湯一同煎下此藥偏治婦人生薑飲治產後惡血上掩心如見神鬼欲死者生薑汁生地黃汁上各取汁半盞相和一處煎取七分後下酒少許相和溫服花蕊石散產經治產後風欲絕緣敗血不盡血迷血暈惡血奔心胎死於腹中胎衣不下至死者但心頭熱急以童子小便一盞取下惡物如豬肝終身無血風無氣痰膈上有血化為黃水即吐出或小便中出也若先治胎衣則泛泛藥不能達若先治血悶則尋常之藥無此功無如此藥有兩全之效也花蕊一斤上赤硫黃四兩上相拌勻先用紙和膠泥固瓦罐子一個內可容藥候泥干入藥在內密泥封口納焙籠內焙令透熱便安在四方磚上書八卦五行用炭一秤籠疊周匝自巳午時從下生火令漸漸上徹有墜下火放火上直至經宿火令定取出研細以絹羅至細瓷合內盛依法用此藥便是療金瘡花蕊石散人可時時收蓄以防急難有一婦人產後胞衣不下血脹迷悶欲死伊親以趙大觀真花蕊石散用一帖用童便調灌藥下即醒衣與惡物即下無恙凡金瘡體出血者急以滲之其血化為黃水入臟腑熱煎童便入酒服產後敗血諸證並用童便調下黑神散出衛生寶鑑治婦人產後惡露不下胎衣不下攻衝心胸病滿或臍堅脹撮痛及血暈神昏眼黑口噤產後瘀血諸證並皆治之熟地黃一兩蒸七次生地黃一兩蒲黃紙襯炒當歸酒浸半日焙乾薑炮桂心白芍藥各一兩甘草二錢炙黑豆合半去皮上為細末每服二錢酒半盞童子小便半盞一同煎調服產後十八病內多用之一方治子死腹中用附子又一方無生地黃一熱病胎死二難產三胞衣不下四血暈五口乾心悶六乍寒七虛腫八乍見鬼神九月內不語十腫兼瀉更服調中湯十一遍身痛十二血崩更服芎藭湯十三加芍藥或四物湯十四兒枕痛兼服佛手散十五腹脹嘔逆不定十六產後口鼻黑色起及鼻衄不可治十七產後喉中氣喘急不可治十八中風口噤牙關緊角弓反張荊芥散以上諸證皆用黑神散仍辨證分曉兼與他藥此藥產後不可缺者不問有病無病進三五服亦佳服後若無病則不必多服曾有服過而生痰者來蘇散出濟生方治臥產氣暈不省人事本因用力太過脈理衰微精神困倦心胸痞悶眼暈口噤面青發直命在須臾急服靈藥木香不見火神麯銼炒陳皮去白麥糵炒黃耆去蘆生薑切焙阿膠銼合白芍藥各一錢糯米一合半苧根洗淨三錢甘草炙三錢上㕮咀每服四錢水一盞煎至八分去滓斡開口灌下連接再灌知人事可謂更生之方也一方有當歸消風散治眼花血暈視物不見京墨石膏茵陳甘草菊花防風荊芥阿膠白朮南木香上各等分為細末每二錢水二盞茶少許煎至八分溫服俟頭上微汗出立愈治催生落胎血暈用石蟹熟水磨服治產後血暈煩悶氣喘不識人出聖惠方用赤小豆三合炒熟為散不拘時候煎東流水調下二錢治產亂運絕方出千金方用神麯末水服方寸匕亦治產難又方出千金方含酸醋噴面即愈凡悶即噴之治產後血暈崩中卒下血用墨以醋磨服之烏金散出聖惠方治產後血暈下惡血不止疼痛當歸一兩銼微炒紅藍花一兩延胡索三分麝香一分細研桂半兩赤芍藥一兩羚羊角屑一分以上都搗細羅為散香墨一兩亂髮二兩水蛭一兩豬胎衣二兩鯉魚鱗四兩燒灰皂莢二兩黑豆糵一兩虻蟲一兩以上都入一瓶子內以泥封固即燒令煙盡去火候冷再取出細研上相和細研為散不計時候以童子小便調下一錢或熱酒調下亦得烏金散出聖惠方治產後血暈逐血止痛臘月烏一隻亂髮二兩豬胎小者一枚灶突墨一兩赤魚皮一兩以上五味內瓷瓶中蜜固濟候乾以炭火燒須令通赤待冷取出細研入後藥延胡索沒藥當歸銼微炒小麥糵微炒桂心琥珀蒲黃香墨各三分麝香半兩細研上搗細羅為散入前燒了藥同研令勻每服不計時候以豆淋酒調下二錢服烏金散出聖惠方治產後血暈逐惡血赤鯉魚鱗臘月收之一斤半油頭髮一斤半敗蒲半斤以上三味內瓷瓶中內蜜固濟候乾用炭火燒須令通赤待冷取出細研入後藥水蛭一兩半炒令黃虻蟲一兩去翅足微炒桂心一兩當歸一兩銼微炒琥珀一兩麝香半分細研上搗細羅為散入前燒了藥同研令勻細不計時候以溫酒調下二錢紅藍花散出聖惠方治產後惡血不盡血暈心悶紅藍花一兩當歸微炒蒲黃赤鯉魚鱗燒灰桂心一兩沒藥一兩上搗細羅為散不計時候以溫酒調下一錢赤龍鱗散出聖惠方治產後心悶下惡血赤鯉魚鱗四兩燒灰虻蟲半兩去翅微炒水蛭半兩微炒黃色蒲黃半兩亂髮四兩燒灰上都研為粉每服半錢以溫酒調下若口急再入干狗膽少許研入酒與藥相和服之日三五服以瘥為度忽麻散出聖惠方治產後血暈忽麻子蕓薹子訶黎勒皮木香各半兩益母草一兩上搗細羅為散每服一錢以童子小便一中盞煎至五分候和滓不計時候溫服之防熱紫湯方出聖惠方治產後血暈及闢風除血用黑豆三合炒令煙絕以清水三升服之盛取汁不計時候溫一盞服並吃豆佳逐血調中地黃酒服紫湯後便宜服累用有效出聖惠方生地黃汁一升生薑汁一合清酒二升上先煎地黃汁三五沸次入生薑汁並酒更煎一兩沸每服溫服一小盞日三服治產後血暈煩悶方出聖惠方紅藍花子一合棗蠹屑一合上以水二大盞煮取一盞二分去滓不計時候分溫四服又方出聖惠方用干馬齒莧三兩為散每服三錢以酒一中盞入鹽半盞煎至六分去滓不計時候稍溫服治血暈及臍腹攻刺痛出聖惠方用赤馬通酒絞汁溫服一小盞立效治血暈迷悶出聖惠方羚羊角燒灰一兩香墨半兩上相和細研不計時候煎薄荷湯調下二錢又方出聖惠方益母草汁一小盞生薑汁半合上相和一兩沸溫服赤馬通