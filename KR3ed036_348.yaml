以炭火燒須令通赤慢去火候冷取出搗細羅為散不計時熱酒下二錢當歸散出聖惠方治產後惡血不散攻心腹㽲痛當歸三分銼微炒赤芍藥一兩劉寄奴半兩芎藭三分紅花三分桂心半兩延胡索半兩沒藥半兩上搗細羅為散不計時候以熱酒調下二錢硇砂丸出聖惠方治產後惡血凝結不散刺腹脅㽲痛硇砂細研當歸銼微炒乾薑炮製銼沒藥芫花醋拌微炒蓬莪朮各一兩上搗細羅為散研入硇砂令勻在狗膽中以線系懸在灶後令乾取出更研以醋煮和丸如綠豆大不計時候以熱酒當歸酒下五丸沒藥丸出聖惠方治產後惡血攻刺腹內撮疼痛宜服利經脈止疼痛沒藥一兩肉桂三分去粗皮當歸銼微炒芫花醋拌炒令乾地黃炒令黃五靈脂乾漆搗碎炒煙出蒲黃各半兩上搗羅為末以醋麵糊和丸如梧桐子大不計時候以酒調下十丸菴䕡子丸出聖惠方治積聚惡血攻刺心腹及兩脅㽲痛菴䕡子延胡索肉桂去粗皮當歸銼微炒各一兩乾漆搗碎炒令煙出五靈脂沒藥牡丹皮神麯微銼各半兩上搗羅為末以醋煮麵糊為丸如梧桐子大不計時候煎生薑醋湯下二十丸溫酒下亦得硇砂丸出聖惠方治產後惡血氣腹中㽲刺疼痛硇砂半兩細研沒藥一分木香一兩桂心半兩當歸半兩銼微炒上搗羅為末研入硇砂令勻以醋煮麵糊和為丸如梧桐子大不計時候以生薑酒下十丸紅藍花湯出聖惠方治產後腹藏有惡血結滯㽲刺疼痛紅藍花半兩麒麟竭半兩硇砂一兩細研當歸一兩銼微炒令黃赤鯉魚鱗一兩燒灰青蛙一枚去腹肚炙令焦桂心一兩上搗羅為末先以醋五升於石鍋內煎令沸入諸藥末一同煎如膏取出於瓷合內盛不計時候以溫酒下一茶匙芫花丸出聖惠方治產後腹有積冷惡血凝滯攻心腹㽲痛不可忍者芫花二兩另搗末當歸一兩銼微炒硇砂一兩細研蓬莪朮三分桂心半兩川大黃一兩銼微炒上搗羅為末以醋一升熬芫花成膏加諸藥末和為丸如梧子大不計時候以醋湯下七丸治產後惡血積聚攻刺心腹疼痛方出聖惠方硇砂一兩乳香一兩上都研細用酒一升白蜜二兩攪拌令勻於銀石器內以慢火熬成膏不計時候以暖酒調下半匙治產後惡血㽲痛極甚方出聖惠方芫花醋拌炒令黑一兩灶突墨一兩案此方缺製法及服法又方出聖惠方用牛膝一兩半去苗以酒一大盞半煎至一盞去滓不計時候分溫三服又方出聖惠方用羌活一兩銼以酒一大盞煎至七分去滓分溫二服又方出聖惠方用吳茱萸一分湯浸七遍焙乾微炒以酒一大盞煎至六分去滓分溫二服
