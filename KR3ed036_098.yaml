body:
  text: 卷九十八諸風門中風百節疼痛附論夫中風百節疼痛者由體虛受風風邪中關節故令百節筋脈拘急疼痛寒熱更作不可屈伸此皆真氣怯弱不勝風邪真邪相搏所以痛也方麝香丸出聖濟總録治中風手足拘攣痰涎不利精神昏悶百節疼痛麝香牛黃並研蔓荊實去皮木香人參赤茯苓去黑皮芎藭獨活去蘆頭麻黃去根節海蛤牛膝酒浸切焙羌活去蘆頭附子炮裂去皮臍乾蠍炒去皮土防風去叉白殭蠶炒海桐皮銼龍齒煅敗龜酒浸炙萆薢赤箭酒炙酸棗仁炒甘菊花天南星炮桂去粗皮乾薑炮虎骨酒浸炙各一兩烏蛇酒浸去皮骨炙四兩上為末再同研勻煉蜜和丸如彈子大每服一丸薄荷酒下仙茅散出危氏方治臂膊手足頭目筋脈虛掣一切風證疼痛不可忍立有效仙茅無則好蒼朮代之一兩陳皮枳實炮厚朴制官桂秦艽各一錢當歸白茯苓白芍藥白芷川芎半夏餅各一錢半麻黃不去節二錢半沒藥甘草川烏炮各半兩白殭蠶乳香各二錢獨活二錢全蠍七枚麝香半錢上除桂芷麝乳沒余並炒轉色卻入不炒藥同為末每服三大錢炒大黑豆同木瓜葉浸酒旋溫酒服不拘時候羌活湯出聖濟總録治中風百節疼痛頭目昏眩及傷寒頭疼壯熱肢節疼痛肩背拘急羌活去蘆頭官桂去粗皮防風去叉各半兩天麻甘菊花旋覆花白附子炮甘草炙欒荊去葉俗謂之頑荊是也天南星水浸七日切作片子焙乾麻黃去根節烏頭鹽水浸一日切作片焙乾各四兩威靈仙六兩附子炮裂去皮臍蒼朮米泔浸一宿切炒各半斤陳橘皮湯浸去白焙半斤牽牛子搗取粉三兩上銼如麻豆每服三錢匕水一盞入薄荷七葉生薑三片同煎至七分去滓溫服羌活散出聖濟總録治中風百節疼痛寒熱更作不可俯仰搜風趁痛散出聖濟總録治中風身體筋脈骨節疼痛白附子炮附子炮裂去皮臍赤小豆天南星炮去臍狼毒海桐皮銼自然銅煅醋碎地龍炒去土各等分上為散每服半錢至一錢匕蔥酒調下豆淋酒亦得空心服白花蛇散出聖濟總録治中風肢節疼痛言語謇澀白花蛇酒浸炙去皮骨二兩何首烏去黑皮切牛膝三味用酒浸半日焙乾蔓荊實去黑皮各四兩威靈仙去土荊芥穗旋覆花各二兩上為末每服一錢匕溫酒調下空心臨臥時服三黃湯一名麻黃湯治中風手足拘攣百節疼痛煩熱心躁惡寒經數日不欲飲食加減芎桂散出三因方治中風四肢疼痛及兩足俱軟行履不便川烏頭三兩切作片水浸一宿切作算子條更以米泔浸一宿不洗曬乾麩炒微赤為度幹了稱川芎一兩半桂心一兩甘草炙乾薑炮各一分上為末每服二錢溫鹽酒調下日三服神術湯出聖濟總録治外傷風邪百節痠痛頭疼身重遍體發熱氣粗眼痛蒼朮銼碎四兩甘草麻黃去根節各三兩豬牙皂莢四梃去皮上並生用粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服厚被蓋出汗入蔥白三寸杏仁二枚碎豉七粒同煎服尤佳治諸風痛攻四肢百節黑豆炒去皮半升威靈仙二兩桑根白皮銼一兩上用醇酒一升半煎至八合去滓頓服又方出聖濟總録杏仁湯浸去皮尖雙仁炒黃研半兩虎骨酒塗炙黃取半兩為細末上用醇酒一升熱調頓服芍藥酒方一名虎骨酒出十便良方治風毒骨髓疼痛芍藥二分虎骨一兩炙上為細末夾絹袋盛酒三升漬五日每服二合日三服白頭翁酒出聖濟總録治諸風痛攻四肢百節用白頭翁草一握爛研以醇酒投之頓服又方出聖濟總録用生惡實根磨酒服痛止即住治中風筋攣附骨疼痛用羚羊角生磨和水塗腫上及惡瘡良虎骨散出十便良方治筋骨疼痛祛風邪通血脈治大風攻疰四肢筋骨疼痛遍身生瘡皮膚破爛大便祕黃小便黃赤宜服此方牡丹皮去心麻黃去根白花蛇酒浸如前法炙黃芩芍藥山梔牛蒡子根羌活荊芥穗細辛去葉虎杖乾蠍大黃秦艽各一分連翹半兩上為細末每服三錢水一盞煎一沸急瀉出食後去滓熱服治孫盈仲常患手足十指疼痛麻木其祖善醫云有風而非虛以此方治之而愈附子木香上二味銼為粗末用姜如常法煎木香隨氣虛實加減如治足弱去附子用烏頭治中風氣壅言語謇澀精神昏亂筋脈拘急犀角獨活湯方高士英職方傳云屢有效犀角屑獨活茯神人參石菖蒲川芎漢防己防風以上各一兩黑參一分酸棗仁半兩炒桂取有味處一分甘草炙一分上十二味為粗末每服四錢匕水一盞半生薑三片薄荷七葉同煎至七分去渣不計時候通口服再蘇丹出華他中臟經方治骨節疼痛言語不正行步艱難手足戰掉搐拽川烏頭二兩草烏頭一兩五靈脂四兩上為末滴水為丸如雞頭大每服一丸碎研入酒一盞生薑三片地黃三條乳香少許同煎至七分臨臥通口服吃了須摩擦患處令熱徹以助藥力如合時入乳香一大錢即煎時更不須入主風在骨節間及血瘀出本草以虎杖煮汁作酒服之治筋骨風急痛出本草以虎骨和通草煮汁空腹服半升被蓋臥之少時即汗出切忌熱食損齒一方治骨風毒以虎骨煮湯浴之良治中風手足不遂骨節煩疼心躁口面喎斜出本草取烏驢皮一領燖洗如法蒸令極熟切於豉汁中煮五味和再煮空心服之治筋骨急強中風出本草以羚羊角和五味子炒之投酒中經宿飲之治諸風筋骨攣縮及皮頑痹手足不遂無眉發疥癬諸疾在皮膚骨節者出本草入溫湯浴之浴幹當大虛憊可隨病與藥及飲食補養治中風骨節攣急五勞七傷及皮膚風用五加皮葉作蔬菜食之效風腰腳疼痛附論夫腰者腎之府也腎主腰腳其氣不足故腰腳濕痹有是風濕冷三氣相攻而成也氣勝則通行流轉不為留滯風濕冷氣勝則注於腰腳而與正氣交爭經脈蘊滯不能榮養於腰腳故屈伸步履皆痛是為濕痹風濕痹亦如蟲行覺則以手捫之復不痛春多入於筋肉間夏入人氣脈中秋入人皮膚內搔之濕癢生瘡冬多中人血脈腠理則為諸風矣本由外風邪入於經絡氣故也方乾蠍丸治元臟風氣攻注腰膝疼痛及一切風氣乾蠍去土微炒天麻羌活去蘆頭附子炮裂去皮臍檳榔銼沉香銼木香牛膝酒浸切焙狼毒切作塊先用醋煮三五沸焙乾銼白附子微炒桂去粗皮當歸切焙枳殼去瓤麩炒防風去叉巴戟天去心昆布洗去咸汁微炒牽牛子炒半熟人參高良薑蘿蔔子微炒蒺藜子炒去角肉豆蔻去殼沒藥白朮防己銼焙硇砂醋化浸去莢石煉霜各一兩獨活去蘆頭一兩阿魏一分上先將硇砂沒藥阿魏三味用好酒一升熬成膏余藥同搗羅為末煉蜜同膏和丸如梧桐子大每服五更後空心薄荷酒下二十丸向曉利一行即瘥虎骨散治風腰腳疼痛下注腳膝行步不得或腫癢或在兩膝腫痛久療不瘥漸致足脛細小少力虎脛骨酥炙二兩天麻木香羌活去蘆頭芎藭黃耆銼蒺藜子炒去角青橘皮去白切炒大腹皮桂去粗皮檳榔銼沉香銼白茯苓去黑皮桃仁去皮尖雙仁麩炒山芋乾葛銼海桐皮銼五味子敗龜醋浸炙白蘚皮各一兩肉蓯蓉酒浸切焙附子炮裂去皮臍各一兩半甘草炙半兩上為散每服二錢匕空心臨臥酒或溫酒鹽湯任下虎骨浸酒方治風氣攻注腰腳骨髓疼痛虎脛骨半斤酥塗炙微黃熟乾地黃二兩石斛去根獨活防風去蘆頭牛膝去苗丹參桂心當歸萆薢芎藭酸棗仁微炒山茱萸仙靈脾五加皮附子炮裂去皮臍骨碎補去毛川椒去目及閉口者微炒出汗白蒺藜微炒去刺以上各一兩烏蛇一條重半斤者酒浸去皮骨酥塗炙微黃色上細銼以生絹袋盛以好酒三斗於瓷甕中浸之密封經七日後每日空心日午近晚各溫服飲一盞常令醺醺以瘥為度忌生冷油膩豬雞黏滑物虎骨丸治肝腎臟風毒流注腰腳疼痛痹冷及筋骨拘急行履不得虎脛骨一兩酥塗炙令黃沉香乾蠍微炒天南星炮裂芎藭白附子炮裂赤芍藥硫黃細研川烏頭炮去皮臍白殭蠶微炒以上各半兩白花蛇二兩酒浸去皮骨炙令微黃天麻防風去蘆頭羌活桂心羚羊角屑以上各三分海桐皮麻黃去根節牛膝去苗以上各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下二十丸虎骨散治風腰腳冷痹疼痛行履不得虎脛骨一兩酥塗炙令黃敗龜酥塗炙令黃附子炮裂去皮臍各一兩牛膝去苗一兩芎藭天麻白附子炮裂各一兩防風去蘆頭一兩羌活乾薑炮製銼萆薢銼各半兩烏蛇一兩半酒浸去皮骨炙令微黃海桐皮桂心骨碎補去毛熟乾地黃當歸銼微炒各三分麝香三一分研入上為散入研了藥令勻每服食前以溫酒調下二錢忌生冷豬雞等物白花蛇浸酒方治風骨髓及腰腳疼痛行步稍難兼風毒攻注皮膚癢痛不知白花蛇一條重半斤者去皮骨炙黃虎脛骨一條酥塗炙微黃當歸芎藭各一兩半附子炮裂去皮臍桂心熟乾地黃防風去蘆頭山茱萸萆薢石斛去根牛膝去苗細辛去苗土天麻黃耆以上各二兩獨活三兩枳殼二兩麩炒微黃色去瓤肉蓯蓉二兩半酒浸一宿刮去粗皮用上細銼以生絹袋盛以好酒三斗於瓷甕子內密封浸七日後隨性暖飲常令醺醺勿令大醉其酒旋添酒味少薄即換藥忌生冷黏滑動風物防風湯治風濕腳膝腫痛防風去叉麻黃去根節先煎掠去沫焙石葦去毛桑根白皮絡石大腹皮芎藭生乾地黃各一兩半附子炮裂去皮臍二兩白朮桂心去粗皮羌活去蘆頭牡丹皮射干各一兩草豆蔻去皮四枚桃仁二十枚去皮尖雙仁炒上銼如麻豆每服五錢匕水一盞半生薑五片同煎取八分去滓溫服茄子根浸酒方出聖惠方治風毒攻注腰腳骨髓疼痛皮膚冷痹筋脈拘急屈伸不得茄子根二斤洗淨焙乾蒼耳子一升微炒搗碎鼠黏子一升微炒搗碎牛膝一斤去苗牛蒡子根一斤防風三兩去蘆頭萆薢桂心羌活秦艽去苗敗龜以上各二兩附子一兩炮去皮臍晚蠶砂半升大麻子一升虎脛骨酥塗炙微黃枸杞子一升半蒸半炒上細銼用生絹袋盛以無灰酒五斗浸之封閉勿令透氣經十日後開取開時不得面向瓶口每日空腹午時近夜各溫飲一盞常令醺醺為妙忌毒滑魚肉動風物續斷湯出聖濟總録治腎氣虛弱臥冷濕地風邪中之流入腰腳冷痹疼痛續斷杜仲去粗皮銼炒桂心去粗皮防風去叉牛膝酒浸切焙細辛去苗葉白茯苓去黑皮人參當歸切焙各二兩白芍藥二兩獨活去蘆頭芎藭秦艽去苗土生乾地黃焙甘草炙各三兩上粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服宜用蒴藋葉火燎厚安床上及熱臥上冷即易之冬月取根搗用一方用生薑三片棗一枚同煎空心服之虎骨湯出聖濟總録治風腰腳疼痛筋脈拘急虎頭骨牙齒炙三兩天雄炮裂去皮臍當歸切焙各二兩菝葜代赭醋煅碎黃耆桂心去粗皮羌活去蘆頭各一兩赤芍藥防風去叉芎藭桔梗絡石桑耳山茱萸各一兩半上銼如麻豆每服五錢匕水酒共一盞半入生薑一棗子大切煎取八分去滓溫服不拘時虎脛骨湯出聖濟總録治風毒腳膝痠痛履地不得嘔逆吐食憎寒沉重宜服之虎脛骨酥塗炙當歸焙附子炮裂去皮臍桔梗炒焦各一兩半赤石脂酸棗仁炒各一兩白芷桂心去粗皮白朮地榆木香黃連去須各半兩厚朴去粗皮塗生薑汁炙半兩肉豆蔻一枚去殼黃芩去黑心半兩上銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服牛膝丸出聖惠方治風腰腳疼痛冷痹筋骨無力牛膝去苗萆薢銼杜仲去粗皮炙令微黃色銼附子炮裂去皮臍乳香安息香石斛去根銼以上各一兩酸棗仁微炒防風去蘆頭丹參芎藭當歸銼微炒桂心羌活白茯苓以上各三分上為末煉蜜和搗三二百杵丸如梧桐子大每服空腹以酒下二十丸晚食前再服忌生冷油膩豬羊魚雞犬肉杜仲浸酒方出聖惠方治風冷腰腳疼痛屈伸不得杜仲去粗皮炙微黃蛇床子當歸