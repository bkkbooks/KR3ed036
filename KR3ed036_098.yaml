甑氣上逐旋以熱水從上淋下勿令滿溢直候首烏絶無氣味然後取下一匙頭白湯亦可此是藥之精英與常不同以好酒一升浸七宿曝乾於木臼內搗末蜜丸每日空心食前酒下三五十丸皂莢散出聖濟總録治風攻腰腳疼痛及腸壅氣滯用皂莢刺二握東南枝上者燒作灰存性搗羅為散每日空腹用溫酒調下一錢匕漸加至三錢匕一方治諸般癲風用豬牙皂莢燒灰酒服並瘥枳殼散一名枳殼方治風氣壅滯腰腳疼痛方見枳殼方豆豉飲治風毒腳膝攣急骨節痛用豉心五斗九蒸九曝以酒一斗取浸經宿空心隨意暖飲服之貼脅烏頭散治風腰腳冷痹疼痛烏頭三分去皮臍生用上為散以釅醋調塗於故帛上敷之須臾痛止治風血補衰老起陽強腰腳除痹變白逐冷氣排風邪去濕出本草以南藤煮汁服亦浸酒冬月用之治諸風腰膝疼痛不可踐地出本草以鹿蹄四隻燖洗如法熟煮了取肉於豉汁中著五味煮熟空腹食之治腰腳風血積冷筋急拘攣疼痛者用茄根五十根細切淨洗訖以水五斗煮取濃汁濾去滓更入小鐺器中煎至一升以來即入生栗粉同丸如梧桐子大每日早用糯米酒送三十丸近暮再服一月乃瘥男子女人通用皆效風走注疼痛附論夫風走注疼痛之病其痛無常處是也氣血流通筋脈和同則骨肉滑利一有不調風邪乘虛與血氣偕行使榮衛凝澀隨所注處悉為疼痛故謂走注痛也方骨碎補丸出聖惠方治一切風毒走注疼痛骨碎補桂心狗脊木香仙靈脾威靈仙山茄子當歸補骨脂微炒白附子炮裂虎脛骨酥塗炙令黃自然銅細研各一兩乾蠍微炒天南星炮裂沒藥硃砂細研甘草炙微赤銼各半兩白花蛇肉酒浸炙黃二兩附子炮裂去皮臍川烏頭炮裂去皮臍甜瓜子麻黃去根節芎藭赤芍藥羌活白芷各三分上為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服不計時候以溫酒下二十丸獨活散出楊子建護命方治走注風其病狀兩足疼痛腫起忽偏在一足痛行履不得其痛處遊走不定忽上項頭目昏亂忽走在右手忽走在左手忽在一手指頭上忽在一腳指頭上只有一點疼痛不可忍宜服此一方服了未轉加衆藥作四錢牽牛半夏作三錢共七錢為一服也其遊走痛處一點常赤色甚則遍身有赤色或攻項背或把腰膊或注腳下或攻胸脅腿骨與脛骨俱小惟有膝頭粗腫吃此藥後或在痛處指甲下或在腳指甲下破出得惡血或在鼻中出得惡血其病方可除根又有白虎風治之亦同此方服之便愈但有人患白虎風必常夢一貓一虎一牛一羊四足畜類等物或夢見小兒婦人女孩將花翠果食與己其疾與走注風十分相類但甚則下青糞並宜服此方獨活去蘆頭阿魏面少許和如薄餅子火上焙乾搗為末各一錢桂去粗皮大黃銼炒牛膝去苗銼羌活去蘆頭鱉甲醋炙當歸切焙乾蠍炒黃耆銼芎藭赤茯苓去黑皮木香麻黃去根節蔓荊子半夏洗去滑各一分吳茱萸炒一錢半荊芥穗二錢虎骨酥炙四錢芫花一兩狼毒捶碎以醋三升同芫花於石器內煮乾半兩白花蛇酒浸去骨炙乾仍用酒溫又幹如是者二十餘次搗用一兩麝香少許研牽牛子上將芫花狼毒二味別作一處為末牽牛子半夏二味亦別作一處為末其餘衆藥共作一處為末每服芫花狼毒末半錢半夏牽牛子末一錢衆藥末一錢半計三錢共作一服臨臥蔥湯調下海桐皮煎丸出聖惠方治風毒走注肢節疼痛不可忍海桐皮半斤牛膝去苗半斤以上二味並細銼以水一斗於大鍋中煎至一升用砂盆內爛研絞取濃汁即卻於銀鍋中漸漸入酒三升煎為膏附子炮裂去皮臍川烏頭炮裂去皮臍各二兩川大黃銼碎微炒三兩桃仁湯洗去皮尖雙仁麩炒微黃二兩虎脛骨酥塗炙黃四兩五加皮赤芍藥肉桂去粗皮麻黃去根節當歸赤箭地龍微炒木香獨活沒藥防風去蘆頭骨碎補乳香麒麟竭乾蠍天南星炮裂各一兩麝香細研半兩上為細末入麝香都研令勻入前膏和搗三五百杵丸如梧桐子大每服不計時候以溫酒送下二十丸忌食生油毒魚滑物麝香虎骨散出聖惠方治男子因氣虛血弱風毒邪氣乘虛攻注皮膚骨髓之間與氣相搏往來交擊痛無常處遊走不定或日輕夜重少得睡臥筋脈拘急不能屈伸皆治之虎脛骨酥炙敗龜板炙各半兩麒麟竭研赤芍藥沒藥研自然銅醋淬研白附子炮蒼耳子炒當歸去苗防風去苗骨碎補去毛肉桂去粗皮白芷各一分牛膝去苗酒浸五加皮川羌活去蘆檳榔川天麻各二錢半上入麝香在內為末每服二錢用熱水少許調服空心服之或溫酒調下亦可比服此藥之先煎生料五積散三服次日服此藥一方無麝香名虎骨散狼毒丸出聖惠方治風走注疼痛狼毒一分天南星附子各半兩上並生用臨搗合時以淨布裹捶碎用木臼內搗羅為末後以石鍋內煎釅醋成膏和丸如梧桐子大不拘時以冷酒下二丸如不飲酒用冷水下亦得治風走注疼痛不定隨痛處尉之出聖惠方黑豆五升芫花一斤生薑切半斤上都炒旋入醋拌用青布裹尉痛上更番炒尉以效為度虎骨丸出聖惠方治風毒走注疼痛不定虎脛骨酥塗炙黃二兩牛膝去苗天雄炮裂去皮臍天麻羌活各一兩白附子炮裂防風去蘆頭桂心酸棗仁微炒天南星炮裂硃砂細研各三分烏蛇酒浸去皮骨炙令微黃二兩桑螵蛸微炒桃膠各半兩槐膠當歸川大黃銼微炒各一兩麝香細研一分上為散入研了藥令勻煉蜜和丸如梧桐子大不計時候以溫酒下二十丸獨聖黑龍丸出聖濟總録治一切風氣走注四肢百節痠痛及閃肭肢節等疾甘松去土零陵香各半兩白殭蠶生用一兩莎草根炒去毛白附子生白芷麻黃去根節芍藥各一兩半半夏湯洗去滑焙乾一兩半墨二兩草烏頭炮去皮半斤天南星生烏頭炮裂去皮臍各二兩藿香葉一兩山芋一兩上為末以法酒二升米醋一升面二兩熬作糊丸如彈子大每服半丸用薄荷茶化下酒化亦得量虛實服之牛膝丸一名接骨丹出御藥院方治風氣下注腳膝無力筋骨痠疼或上攻頭目腫痛遍身疼倦壯熱並皆治之蓯蓉牛膝並酒浸防風去蘆萆薢切炒威靈仙去土海桐皮去粗皮自然銅醋浸七次金毛狗脊去毛川烏頭生去皮臍以上各一兩沒藥別研乳香別研各半兩地龍去土二兩骨碎補去毛四兩木鱉子去殼別研四兩上為細末酒麵糊為丸如梧桐子大每服五十丸溫酒送下食前服妙應丸一名青龍妙應丸出危氏方治諸風攣急遍體疼痛遊走無定百藥不效者穿山甲十五斤石灰炒去灰全蠍七個去毒麝香一字別研地龍去土一兩草烏生去皮一兩沒藥別研乳香別研各三錢松脂半兩蜈蚣七條生用五靈脂去砂石三錢白殭蠶薑汁炒半兩斑蝥七個糯米炒去頭足上為末酒糊丸如緑豆大以青黛為衣每服二十丸不拘時候溫酒送下忌食熱物木通丸出聖濟總録治風走注身體疼痛榮衛凝澀石斛一兩去根牛膝去苗酒浸一宿切焙一兩附子二枚共及一兩者炮裂去皮臍乾薑炮三分肉豆蔻四枚去皮面裹煨面熟為度檳榔銼四兩木香一分甘菊炒二兩石硫黃一分白花蛇酒浸去皮骨焙二兩枸杞子九蒸九曝炒黃二兩上為末以酒煮麵糊為丸如梧桐子大每服二十丸空心溫酒下如服了轉覺腦骨內疼甚者乃藥效婦人當歸酒下作細散每服一錢半溫酒粥飲任調下防風天麻散出宣明論治風麻痹走注肢節疼痛中風偏枯或暴喑不語內外風熱壅滯解昏眩出儒門事親防風天麻川芎香白芷草烏頭去蘆頭白附子荊芥穗羅淨當歸焙甘草各半兩滑石二兩羌活半兩上為末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度或煉蜜為丸如彈子大熱酒化下一丸或半丸細嚼白湯化下或細嚼酒下愈妙日三服此藥微有熱性甚能開發風熱鬱結以使氣血宣通而愈或風多熱少寒涼諸藥不能退者亦宜以開發或三服兩服不中效即卻服防風通聖散得熱勢稍減復與服之熱勢太甚者及目疾口瘡咽喉腫痛者不宜服之但宜退風熱辛寒之藥也少尤宜服之如意丸出聖濟總録治風毒走注筋骨疼痛草烏頭去皮臍五靈脂蘹香子炒青橘皮去白焙蕓薹子陳橘皮去白焙木鱉子去殼防風去叉生用各一兩巴豆四十九粒去皮心膜研出油斑蝥八十一個去頭足炒木香一分上為末用宿炊餅末以釅醋煮作糊和丸如緑豆大每服一丸酒下不計時骨碎補丸出聖濟總録治風毒走注疼痛骨碎補去毛一兩半威靈仙洗焙草烏頭炮去皮各二兩天南星炮地龍去土炒自然銅煅醋淬木鱉子去殼楓香脂各一兩沒藥乳香研各半兩上為末醋煮麵糊和丸如梧桐子大每服五丸溫酒下空心服之虎骨散出聖惠方治風走注疼痛不可忍虎脛骨白芷當歸漏蘆紫筍茶各一兩桂半兩硇砂醋化塗虎骨上慢火炙令黃半兩芫花醋拌炒令黑色地龍微炒各一分赤芍藥三分上細羅為散每服不拘時以溫酒調下一錢天麻丸出聖濟總録治風毒上攻下注遊走不定衝擊疼痛天麻地龍去土羌活去蘆頭獨活桂去粗皮附子去皮臍生用沒藥研荊芥穗各二兩麝香研一錢上為末生蜜和丸如櫻桃大瓷器內收每服一丸用荊芥臘茶嚼下如注破腳至甚者不過二十日上攻則食後服下注則食前服烏頭散出聖惠方治風走注疼痛及手足拘急頭痛不可忍川烏頭炮裂去皮臍乾薑炮製川椒去目及閉口者微炒出汗硃砂細研細辛桂心各半兩天雄炮裂去皮臍莽草微炙雄黃細研各一兩上細羅為散每服不拘時以溫酒調下半錢桂心散出聖惠方治風走注疼痛桂心地龍微炒白殭蠶微炒漏蘆威靈仙芎藭白芷當歸木香以上各半兩上細羅為散每服不拘時以熱酒調下二錢乾地黃丸出聖濟總録治走注疼痛生乾地黃焙白芷當歸切焙沒藥研防風烏頭炮裂去皮臍木香赤小豆炒各等分上為末水浸蒸餅心和丸如梧桐子大每服五丸冷酒下空心食前服日二應痛丸出聖濟總録治風毒內攻走注疼痛不定五靈脂黑色者炒地龍去土炒白芥子草烏頭去皮臍銼生用自然銅煅醋淬研各一兩乳香研半錢巴豆七枚去皮心膜醋煮黃色研上為末酒煮麵糊和丸如小豆大每服五丸溫酒下威靈仙丸出聖濟總録治風氣走注疼痛無常處威靈仙去苗土五靈脂各一兩烏頭炮裂去皮臍木鱉子去殼乳香研各半兩赤芍藥一分上為末滴酒和丸如梧桐子大每服七丸食前冷酒下加至十丸活絡丹治一切痛風走注渾身疼痛漢椒散出聖惠方治風走注疼痛及白虎歷節風等漢椒去目及閉口者微炒去汗油側子炮裂去皮臍各一兩桂心麻黃去根節當歸木香各一分上細羅為散每服不拘時以溫酒調下半錢治風走注疼痛不定隨痛處尉之出聖惠方芫花漢椒去目桑根白皮各二兩柳蚛屑半兩桂心一兩麩一升上為散用醋一升拌炒令熱以青布裹尉痛處冷即更入醋重炒依前尉之以瘥為度又方出聖惠方針砂五兩砒霜硇砂雌黃磁石各半兩麝香一分上為末臨時以醋拌炒令熟用熱帛裹尉患處立瘥羌活丸出王氏博濟方治風毒走注疼痛及體內多風疾者羌活獨活去蘆頭各二兩地龍去土炒一兩天麻三分烏頭炮裂去皮臍半兩上為末用生蜜和丸如梧桐子大每服二十丸薄荷湯或溫酒下食前服莎草根丸出聖濟總録治風走注循入經絡疼痛及腰膝苦疼莎草根用豬膽炒令香草烏頭用淨水浸一半生一半炒熟去皮尖各二兩威靈仙去土躑躅花劉寄奴各一分上為末用乳香沒藥各半兩研入醋煮麵糊和丸如梧桐子大火煅自然銅研為衣每服五丸漸加至十丸煨蔥酒下仙靈脾散治風走注疼痛往來不定仙靈脾威靈仙芎藭桂心蒼耳子各二一兩上細羅為散每服不拘時候以溫酒調下一錢神效膏治風走注疼痛上下不定隨痛處貼之牛皮膠水熔作膏一兩蕓薹子安息香附子生用去皮臍漢椒生用各半兩上細羅為散入膠中和成膏塗紙上隨痛處貼之立定烏頭丸治走注疼痛不可忍烏頭炮裂去皮臍乾蠍去土炒地龍去土炒躑躅花去心各等分上為末醋麵糊和丸如緑豆大每服五丸婦人當歸酒下男子荊芥酒下治風走注疼痛水銀一兩棗十五枚蒸熟取瓤和水銀研令星盡天南星炮裂三分乾蠍半兩羌活三分上為末入水銀棗一處研和丸如緑豆大別以膩粉拌令白色陰乾每服不拘時以豆淋酒下五丸一方無羌活趁痛丸治風毒留客日深氣虛邪實攻擊不定走注疼痛大戟刮去皮甘遂白芥子各一兩上為末用大麥面一兩和勻醋調作餅子慢火炙黃熟再搗羅用薄麵糊為丸如梧桐子大每服十丸漸加至十五丸空心冷酒下病痛甚不入大麥面亦得蕓薹子散治風毒走注疼痛如虎齧蕓薹子天南星草烏頭並生用各一兩上為散每用五錢匕量入生面以釅醋生薑汁生油各少許調成膏攤紙上厚一分貼痛處即止消毒膏治風毒走注疼痛筋脈攣急馬牙硝燒赤研一兩烏頭大者二枚燒存性三分研上同研令勻每用三錢匕白麵三錢入生薑汁一盞同熬成膏攤於帛子上熱貼日二換之治風走注疼痛地龍微炒一兩麝香細研入一分上細羅為散每服不拘時以溫酒調下一錢芥子膏治風毒走注疼痛及白虎歷節風用芥菜子為末雞子白調敷之一方治中風口噤舌本縮無雞子白用醋調塗頷下及敷頸周圍立效一方芥子同酢煮敷之虎骨木瓜丸治飲酒過度寒濕停滯經絡不和傷敗氣血走注筋骨疼痛晝靜夜甚或冒霧所傷亦致筋骨走注並婦人血風痛疼並皆治之虎骨酥炙南乳香研沒藥各一兩木瓜天麻蓯蓉牛膝以上四味各二兩用好酒浸十日取出焙乾上為細末將原浸酒作糊為丸如梧桐子大每服三十丸至五十丸空心食前溫酒送下日進二三服透骨膏治一切風濕走注疼痛生乾地黃馬鞭草各半斤吳茱萸白麵各三兩骨碎補敗姜屑各四兩乾生薑是也鱉甲二個炙蒲黃二兩上為細末用米醋調似膏子於火上溫熱攤於痛處用飯上蒸候藥冷再炒如此七次於避風處用地黃丸大治走注風及風氣四肢倦怠不思飲食出大全集謂之四聖丹熟地黃洗銼焙當歸洗銼焙玄參洗銼焙羌活洗銼焙揀節重者上四味各等分為細末煉蜜為丸如梧桐子大每服三十丸或溫酒或鹽湯空心食前服藥良久仍進飲食忌豬雞羊以羌活之故忌熱面以當歸之故忌蘿蔔以地黃之故忌豬羊血以耗藥力之故余皆不忌治走注風散血止痛以石蠶節搗篩末酒溫服之治走注風用建水草葉焙乾碾末暖酒服風入腹拘急切痛附論夫風入腹拘急切痛者風邪搏於陰經也風邪搏於陰經則腸縮蜷腸縮蜷則絀急風寒之氣與正氣相擊故里急而切痛也方竹瀝湯治風毒入人五內短氣心下煩熱手足煩疼四肢不舉皮肉不仁口噤不言竹瀝一斗九升防風茯苓秦艽各三兩當歸黃芩一方作芍藥人參芎藭一方作防己細辛桂心甘草升麻一方作通草麻黃白朮各二兩附子二枚蜀椒一兩葛根五兩生薑八兩上㕮咀以竹瀝煮取四升分五服初得病即須摩膏日再痹定止一方無麻黃蜀椒生薑大岩蜜湯出聖惠方治賊風腹中絞痛並飛尸遁注發作無時發即搶心脹滿脅下如錐刀刺並主少陰傷寒梔子十五枚甘草乾地黃細辛茯苓羊脂青羊角亦得吳茱萸芍藥小品用芎藭芎藭乾薑當歸桂心各一兩上㕮咀以水八升煮取三升去滓內脂令煬分三服溫酒服相去如人行十里頃若痛甚者加羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黃三兩一方不用梔子羊脂茯苓桂心名岩蜜湯一方無羊脂用水酒煎服名乾薑散乾地黃湯出聖濟總録治風入腹兼尸疰入腹心腹㽲痛氣短喘息不得宜服熟乾地黃切焙一兩當歸切焙一兩半芍藥一兩半甘草炙銼人參桂去粗皮附子炮裂去皮臍厚朴去粗皮塗生薑汁炙煙起各一兩細辛去苗葉乾薑炮裂各一兩半吳茱萸湯洗焙乾炒三分上粗搗篩每服三錢以水一盞煎去滓取七分空腹服日三夜一天雄散出聖惠方治風入腹臟腑中切痛心腹拘急天雄炮裂去皮臍當歸桂心木香各一兩雄黃細研地龍微炒乾蠍生用硃砂細研各半兩獨活三分麝香細研一分天南星微炒半兩上細羅為散入研了藥令勻每服不計時以生薑溫酒調下一錢烏頭散出聖惠方治風氣入腹拘急切痛煩悶不可過時川烏頭炮裂去皮臍黃芩各一兩乾薑炮銼人參去蘆頭天雄炮裂去皮臍甘草炙微赤銼各半兩當歸銼微炒白朮漢防己各三分細辛三分上為散每服三錢以水一中盞煎至六分去滓不計時候稍熱服之甘草湯出聖濟總録治風入腹中㽲痛並飛尸遁注發歇無時發則搶心腹脹滿脅下如錐刀刺甘草炙銼細辛去苗葉乾薑炮當歸切焙桂去粗皮白茯苓去黑皮赤芍藥吳茱萸湯浸焙炒乾熟乾地黃切各一兩上粗搗篩每服五錢匕以水一盞半入切羊脂少許同煎至八分去滓空心日午夜臥服人參湯一名茵芋散出聖惠方治風入腹拘急㽲痛人參一兩附子炮裂去皮臍一兩半麻黃去根節一兩半防己三分茵芋去苗一兩黃芩去黑心一兩防風去叉芎藭各三分甘草炙銼三分上粗搗篩每服三錢匕以水一盞生薑三片煎至七分去滓稍熱服不計時候附子散出聖惠方治風入腹㽲痛無時發則搶心脹滿拘急附子炮裂去皮臍細辛甘草炙微赤銼當歸銼微炒桂心赤芍藥生乾地黃青橘皮湯浸去白瓤微炒各一兩吳茱萸湯浸七遍焙乾微炒半兩上粗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服甘草飲出聖濟總録治風入腹心腹㽲痛脹滿拘急不得息並轉筋溫中止痛利大小便甘草炙銼防風去叉各一兩半吳茱萸湯浸焙炒赤芍藥當歸切焙細辛去苗葉乾薑炮各一兩熟乾地黃一兩一方作生上粗搗篩每服五錢匕以水一中盞半煎去滓取八分空腹溫服日二服一方有桂心無甘草名防風湯聖惠方名桂心散鬼箭湯出聖濟總録治風入腹攣急及賊風所中鬼箭羽如雞子大一塊甘草一尺炙銼石膏如雞卵一塊麻黃去根節煎掠去沫焙乾四兩上粗搗篩每服五錢匕水一盞半煎至八分去滓空心臨臥各一服慎外風一方㕮咀以東流水煮服之桂心湯出聖濟總録治風入腹五臟拘急四肢不遂腹滿欲絶桂去粗皮防風去叉黃芩去黑心乾薑炮裂秦艽去苗根吳茱萸湯浸焙炒甘草炙銼各一兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時候一方忌海藻菘菜生蔥烏頭湯出千金方治寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側叫呼發作有時使人陰縮手足厥逆烏頭十五枚要略用五兩大棗十枚甘草二兩芍藥四兩桂心六兩老薑一斤上㕮咀以水七升煮五味取三升去滓別搗烏頭去皮四破蜜二升微火煎令減五六分內湯中煮兩三沸去渣服一合日三間食強者三合以如醉狀為知不知增之一方無大棗赤芍藥散出聖惠方治風入腹攻五臟拘急不得轉側陰縮手足厥冷腹中㽲痛赤芍藥桂心甘草炙微赤銼防風去蘆頭芎藭各一兩烏頭炮裂去皮臍二兩上搗羅為散每服三錢以水一中盞入生薑半分棗二枚煎至六分去滓不拘時候稍熱服理中湯出聖濟總録治風入腹心腹㽲痛痰逆噁心或時嘔逆拘急隔塞不通人參乾薑甘草炙銼白朮各二三兩上粗搗篩每服三錢以水一盞煎至七分去滓稍熱服空心食前服治中風寒熱腹中絞痛以干鯽魚一頭作末三指撮以苦酒服之溫覆取汗良食鹽方治中風但腹中切痛以鹽半斤熬令水盡著口中飲熱湯二升得吐愈
