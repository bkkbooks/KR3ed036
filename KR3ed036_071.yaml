body:
  text: 卷七十一眼目門總論黃帝問曰余嘗上清冷之臺中陛而顧匍匐而前余私異之竊內怪之或獨冥視安心定氣久而不解披髮長跪俯而視復久之又不已卒然自止何氣使然岐伯對曰五臟六腑之精氣皆上注於目而為之睛睛之果者為眼骨之精為瞳子筋之精為黑眼血之精為其絡果氣之精為白眼肌肉之精為約束果契筋骨血氣之精而與脈併為系繫上屬於腦後出於項中故邪中於項因逢身之虛其入深則隨眼系以入於腦入於腦則轉轉則引目系急急則目眩以轉矣邪中其睛則其睛所中者不相比則睛散睛散則岐故見兩物目者五臟六腑之精也營衛魂魄之所營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽故陰陽合揣而精明矣目者心之使也心者神之舍也故神分精亂而不專卒然見非常之處精神魂魄不相得故曰惑帝曰余疑何其然也余每之東苑未嘗不惑去之則復余惟獨為東苑勞神乎何其異也岐伯曰不然夫心有所喜神有所惡卒然相感則精亂視誤故神惑神移乃復是故間者為迷甚者為惑夫心藏神肝藏魂腎藏志肝為中將取決於膽會氣於心而主於目目者五臟之精氣也五臟有病皆形於目目色赤病在心目色白病在肺目色青病在肝目色黃病在脾目色黑病在腎不可多者病在胸中陽氣失則目瞑陰氣絶者目盲肝氣通於目肝氣通和則辨五色肝有病則目奪精而眩肝中寒則目昏而瞳子痛邪傷肝則目青黑瞻視不明肝實熱則目痛如刺肝虛寒則目䀮䀮諦視生花肝勞寒則目澀閉不開肝氣不足則目盲暗風淚視物不明肝熱沖睛目眥赤痛生息肉及目睛黃膽與肝合膽虛為陰邪所傷目中生花肝熱則目中多赤痛淚出肝不利則目昏肝熱中風則目欲脫而淚出目熱則內外眥爛肝久熱實則目赤而生淫膚息肉故目者五臟之精氣所成也眼有五輪風輪血輪氣輪水輪肉輪五輪應於五臟隨氣之主也肝者在臟為肝其色青其味酸屬東方甲乙木也旺於春肝氣通於目左目屬甲為陽右目屬乙為陰肝生風眼有風輪也雖有其名形狀難曉與水輪相輔也心者在臟為心其色赤其味苦屬南方丙丁火也旺於夏心生血眼有血輪也血輪與肉輪相連也赤黑色是也此輪忌針脾者在臟為脾其色黃其味甘屬中央戊己土也旺於四季十八日脾生肉眼有肉輪也肉輪在外鬱郁黃白色今俗為白晴也肺者在臟為肺其色白其味辛屬西方庚辛金也旺於秋肺生氣眼有氣輪也氣輪在肉輪之下隱而不見也腎者在臟為腎其色黑其味鹹屬北方壬癸水也旺於冬眼有水輪也水輪在四輪之內為四輪之母能射光明能視萬物今呼為瞳仁也肝臟病者應於風輪風輪病即望風淚出睹物煙生夜退晝增磣痛畏日或如青衣拂拂時似飛蠅聯聯此是肝臟之疾宜治肝也心臟病者應於血輪血輪病即飛花兢起散亂縱橫胬肉漸漸沾睛兩眥淚淹赤爛此是心臟之疾宜治心也脾臟病者應於肉輪肉輪病即瞼內腫疼眥頭澀痛眼見飛絲繚亂又如毛髮縱橫夜半甚於昏黃日沒增於早起此是脾臟之疾宜治脾也肺臟病者應於氣輪氣輪病即忽如雲飛遮日逡巡卻漸分明或如雪影中花或似飛蠅相趁此是肺臟之病宜治肺也腎臟病者應於水輪水輪病即黑花簇簇霧氣紛紛昏視一物如見兩般睹太陽如同水底此是腎臟之疾宜治腎也夫眼目者法天地日月也天地清靜日月光明天地晦暝日月昏暗經云眼應於肝旺春三月作魂神宮眼為戶牖所通萬物無不視之好惡是非自然分別自少及老疾狀多般皆是攝養有乖致使眼目生患凡人多餐熟食或嗜五辛喜怒不時淫欲不節凌寒冒暑坐濕當風恣意叫呼任情號泣長夜不寐永日不眠極目視山登高望遠或久處煙火或博奕經時抄寫多年雕鏤繡畫燈下看字月中讀書用其眼力皆失光明也更有馳騁畋獵冒涉雪霜向日迎風晝夜不息皆是喪明之因也恣一時之快意為百疾之深源所以疾生眼目也諸凡養性之士必須慎焉若能終身保惜可使白首無患目者肝之外候也肝取木腎取水水能生木故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙暈眩烏輪赤暈刺痛浮漿此肝熱也膽生清淚枯黃繞睛此肝虛也瞳仁開大淡白偏斜此腎虛也瞳仁焦小或帶微黃此腎熱也一虛一實以此驗之然人知肝腎之氣相依而行孰知心者神之舍又所以肝腎之副焉所謂一而二二而三者也何則心主血肝藏血血能生熱凡熱沖發於眼皆當清心涼肝又不可專執水生木之説大抵拘急牽颼瞳青胞白癢而清淚不赤不疼是之謂風眼烏輪突起胞硬腫紅眵淚濕漿裡熱刺痛是之謂熱眼珠渾而淚胞腫而軟上壅朦朧酸澀微赤是之謂氣眼其或風與熱並則癢而浮赤風與赤搏則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類血氣不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而妒赤者為實熱兩眥呈露生胬肉者此心熱血旺白睛紅膜如傘紙者此氣滯血凝熱證瞳仁內湧白睛帶濕色浮而赤者冷證瞳仁青緑白睛枯稿氣沉而濁者眼熱經久復為風冷所乘則赤爛眼不赤但為痰飲所痓則作痛肝眼不順而挾熱所以羞明熱氣蓄聚而傷胞所以胞合又白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥點者其熱在脾脾主味五味之秀養諸中則精華髮見於其外肺主氣水火升降營衛流轉非氣孰能使之眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如腎家惡燥設遇虛證亦不過以當歸地黃輩潤養之輕用溫藥不可也肺能發燥肝亦好潤古方率用杏仁柿干飴糖沙蜜為佐果非潤益之意乎至於退翳一節尤關利害凡翳起於肺家受熱輕則朦朧重則生翳真珠翳狀如粹米者易散梅花翳狀如梅花片者難消雖翳自熱生然治法先退翳而後退熱者謂熱極生翳若先去熱則血為之冰而翳不能去其有赤眼與之涼藥過多又且滌之以水不反掌而冰凝眼特一團水耳水性清澄尤不可規規於點洗諺曰眼不點不瞎耳不斡不聾風眼腫則軟熱眼腫則硬傷風冷則淚出虛煩則昏蒙勞力則眥赤白腫則脾家受毒生瘡則風熱侵肺黃乃酒傷於脾血灌瞳仁及赤色俱是心家有熱羞明見紅花為肝冷黑花則腎虛青花膽有寒五色花為腎虛兼熱不可一概為治若虛不補而實不瀉亦難收效然上虛乃肝虛下虛乃腎虛肝虛則頭暈耳聾目眩腎虛則壅逆生花耳作蟬鳴尤宜補肝益腎其有熱淚交流兩瞼赤痛乃肝之極熱迎風有淚為腎虛客熱涼肝瀉腎必得其宜至於五臟各以類推虛則生寒實則生熱至如暴赤一證多因泛熱衝上或眠食失時飽食近火得之加以勞役失於調攝過食毒物變成惡證醫者不原本始但知暴赤屬陽或以散血之劑或以涼心之藥縱使退散遂致脾經受寒飲食不進頭目虛浮五臟既虛因成內障亦有見其不進飲食俾更服熱藥遂致三焦暴燥熱氣上攻昏澀眵淚或犯盛怒辛苦重勞遂生胬肉心氣不寧風熱交併變為攀睛證狀不一是為外障又若讀書博奕等過度而致疾者名曰肝勞不可即投以治肝之劑及作他證治之卒於莫效惟須閉目珍護不極遠視庶乎可瘳者若夫患風疹者必多眼暗先攻其風則暗自去婦人胎前産後用藥亦須避忌小兒所患切宜善治惟略加淋洗披鐮針灸端不可施猶須戒其用手頻揉或因茲睛破至於莫救有人患眼漸模糊狀與青盲相似而眼中一無所有此名黑盲如瞳子大者名曰烏風如瞳子翳緑者名曰緑翳青盲皆是虛風所作急須即療若眼自暗多時不復可療此疾之源皆從內肝管缺少眼孔不通所治也亦宜須初欲覺時即須速療之若已成病不復可療若因時病後得眼生白障者此名為翳也若因病後生肉者此為膚障也若眼赤癢淚出者為熱虛風若見黑煙赤光瞳子黑大者為烏風勞水動故宜服車前空青丸以消息之若或爾赤痛者此是天行眼痛風熱所作故應宜早急療之不者當生翳於後難療若人眼痛當黑珠生白翳並黑子等大如米如此之病者名為痛損眼此不易療診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病鼻洞者濁下不止傳為鼽瞢瞑目故得之氣厥足陽明有俠鼻入於面者名曰懸顱屬口對入系目本視有過者取之損有餘益不足反者益甚足太陽有通項入於腦者正屬目本名曰眼系頭目固痛取之在頂中兩筋間入腦乃別陰蹺陰陽相交陽入陰出陽交於兌眥陽氣盛則瞑目陰氣絶則眠凡人年四十五以後漸覺眼暗至六十以後還漸目明治之法五十以前可服瀉肝湯五十以後不可瀉肝目中有疾可敷石膽散藥等無病不可輒敷散但補肝而已自肝中有風熱令人眼目暗者當灸肝腧及服除風湯丸散數十劑當愈眼之病在腑則為表當除風散熱在臟則為里宜養血安神暴發者為表而易治久病者在裡而難愈除風散熱者瀉青丸主之養血安神者定志丸婦人則熟乾地黃丸主之凡眼藥率多涼劑必於食後服之或者徒泥其説往往食未下咽藥即入口是致食氣與藥氣衝搏釀積於脾胃之上不惟藥無其效且使脾家受冷旋至虛弱須當食歇片時俟胸膈稍寬然後隨意服之尤貴冷熱得所大熱則非肝肺所宜大冷則脾胃停積不化宜自酌量之耳凡點眼之藥腦麝之類通入關竅毛孔易至引惹風邪點眼之時向密室端坐然後以銅箸點少許藥放入眼內點畢以兩手對挼魚尾二穴次閣眼良久俟血脈稍定漸漸放開若是夜臥用藥則又不拘此法也或向當風去處或是點罷即開則風邪乘入血脈凝滯難散疾勢愈增切須致意五輪白屬肺氣之精氣輪黑屬肝筋之精風輪上下瞼屬脾胃肉之精肉輪大小眥屬心血之精血輪瞳仁屬腎骨之精水輪風輪病因喜怒不常作勞用心晝凝視遠物夜勤讀細書眼力既勞風輪內損其後眥頭尤澀睛內偏疼視物不明胞眩緊急宜去風藥血輪病因憂愁思慮悲喜煩勞內動於心外攻於目其候赤筋纏眥白障侵睛胞腫難開昏暗多澀日久不治失明愈深宜洗眼涼血藥肉輪病因多餐熟食好吃五辛遠道奔馳駐睛驟騎食飽耽睛積風痰壅其候胞眩赤腫暴赤昏蒙眼淚常盈倒睫澀痛瘀血侵睛宜疏醒脾藥氣輪病因凌寒冒暑愛飲寒漿肌體虛疏寒邪入內或痛或昏傳在白睛筋多腫赤視日如隔霧觀物似生煙日久不治變為白膜黑暗難開水輪病因勞役不止嗜欲無厭大驚傷神大怒傷志加之多食酒面好啖鹹辛因動腎經通於黑水冷淚鎮流於瞼上飛蠅相趂於睛前積聚風虛或澀或癢結成翳障多暗多昏宜補腎藥八廓天廓傳道肺大腸地廓水穀脾胃火廓抱陽心命門水廓會陰腎風廓養化肝雷廓關泉小腸山廓清靜膽澤廓津液膀胱天廓病因雲中射雁月下看書多食腥膻侵冒寒暑致天廓內有動視物生煙眥疼難開不能辨認地廓病因濕漬頭上冷灌睛眸致令有病眼眩緊急瘀血生瘡火廓病因心神恐怖赤脈侵眥血灌瞳仁熱淚如傾其證瞼頭紅腫睛內偏疼熱淚難開水廓病因大勞努力爭開擊棒開弓驟騎強力致令生病常多暗昏睛眩淚多風廓病因枕邊窗穴有風不能遮閉坐臥當之腦中邪風攻於風廓以致黑睛多癢而瞼常爛或昏暗多淚雷廓病因失枕睡臥或酒後行房血脈溢滿精宣閉滯風虛內聚上攻故令眥頭赤腫瞼上生瘡倒睫拳毛遮睛胬肉山廓病因撞刺磕損致令肉生兩瞼翳閉雙睛若不早治永沉昏暗瘀血侵睛澤廓病因春不宣解冬聚陽毒多吃脂肥過餐熱物致令腦脂凝聚血淚攻潮有如霧籠復見飛蜂繚繞黑花常滿難於瞻視肝虛眼附論夫肝虛眼其證不一有忽然發腫者有淚出不止者有睛生翳暈者有視物漠漠不能遠視者有精彩昏濁黑白不明而暈者蓋肝開竅於目腑臟精華之所聚也血氣既衰不足以營養故證狀之異如此龍木論云肝虛積熱外障眼初患之時忽然發腫赤澀淚出癢痛摩隱瞳仁黑睛漸生翳障或退或散或聚初時即輕如經一二年間漸重於目不明此皆因肝間勞熱所作毒風入腦眼中覺患切宜服藥將息不得燒炙頭面宜服瀉肝湯青葙子丸及硃砂煎點之立效歌曰用力勞心赤痛來睛疼怕日淚難開有時發動有時輟怨鬼愁神作禍災忽爾醫生還自可須知肝膈熱勞排急求湯藥旋除去根株莫遣臟中埋一眼初時生作患招呼後眼不相違今年發動輕輕過後歲應多轉轉危藥丸青葙須志服披鐮雙瞼血漼漼眼中宜點硃砂煎莫炙頭中即易為方還晴補肝丸治肝虛兩目昏暗衝風淚下白朮細辛去苗葉當歸切焙決明子微炒芎藭羌活去蘆頭五味子白茯苓去黑皮人參菊花防風去叉地骨皮苦參玄參車前子微炒桂去粗皮黃芩去黑心青葙子甘草炙銼上等分為末煉蜜和丸如梧桐子大每服三十丸米飲下加至四十丸不拘時候鎮肝丸出龍木方治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開堆眵多淚怕日羞明時發腫赤或生障翳並宜服之白茯苓去皮一兩甘菊花半兩甘草炙各半兩地骨皮去土半兩蔓荊子去白皮一兩人參一兩茺蔚子一兩遠志去心一兩地膚子一兩車前子半兩青葙子炒半兩柴胡去蘆半兩山藥半兩決明子一兩防風去蘆苗各一兩細辛去苗一分柏子仁炒半兩玄參半兩上為末蜜水煮糊丸如梧桐子大每服二十丸米飲下食後日三服柏子仁丸出聖濟總録治肝虛視物漠漠不能遠見睛輪昏暗澀痛翳暈時聚時散柏子仁研薏苡仁烏麻仁車前子枸杞子庵䕡子菟絲子酒浸別搗末各一兩蔓荊子青葙子五味子蛇床子桂去粗皮菊花山芋各半兩熟乾地黃焙肉蓯蓉酒浸切焙白茯苓去黑皮各一兩上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下龍腦青葙子丸出聖惠方治肝臟虛風時多冷淚眼目昏暗龍腦細研牛黃細研曾青燒細研各半兩青葙子人參去蘆頭車前子白茯苓芎藭羌活細辛天麻防風去蘆頭黃耆銼石決明細研水飛各一兩旋覆花三分麝香一分細研上為末研了藥都拌令勻煉蜜和搗三二百杵丸如梧桐子大每於食後煎下十丸瓜子散出千金方補肝治眼漠漠不明亦名十子散方冬瓜子青葙子茺蔚子枸杞子牡荊子蒺藜子菟絲子蕪菁子決明子地膚子柏子仁各二合牡桂櫻薁根各二兩蕤仁一合一云二兩車前一兩細辛半兩一云一兩半上治篩食後以酒服方寸匕日二神驗遠志丸出直指方治清益心肝明目退翳人參茯神去木蘆薈研琥珀蔓荊子各半兩川芎生地黃熟地黃洗焙茺蔚子各半兩蟬殼一兩酒洗曬全蠍五枚白蒺藜炒去刺細辛車前子遠志水浸去心乾薑汁蘸焙各七錢半上為細末煉蜜丸梧桐子大每服五十丸空心米粥飲下臨臥食後菖蒲湯下羌活散出龍木論鎮肝明目暴赤眼亦治赤眼一切內外障翳羌活川芎旋覆花防風各半兩甘草楮葉蒼朮泔浸過去皮白乾不見火桑葉並八月採陰乾稱以上各一兩甘菊花去梗楮實蟬蛻木賊各一兩上為末茶清調下二錢早晚食後臨臥各一服合時不得焙及犯鐵器此方取楮葉必無實者何也蓋陰陽二物相配有實者陽也無實取葉者陰也所以不得其真忌濕面及酒否則諸藥悉無效青葙子丸出龍木論治肝虛積熱外障青葙子二兩車前子細辛乾地黃菟絲子防風茺蔚子五味子人參澤瀉茯苓各一兩上為末煉蜜為丸如梧桐子大空心茶下十丸乾地黃丸出聖濟總録治肝虛淚出不止翳暈侵睛視物不遠或睛昏濁黑白不明熟乾地黃焙五味子蕤仁去皮研菟絲子酒浸一宿別搗車前子各一兩細辛去苗葉甘草炙銼防風去叉柏子仁研白茯苓去黑皮各半兩上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下羊肝丸出龍木論鎮肝明目甘菊花羌活柏子仁細辛官桂白朮五味子各半兩黃連三分羯羊肝一具新瓦盆中爆干更焙之肝若大止用一半上為細末煉蜜丸如梧桐子大空心溫水下三四十丸一方有地黃無柏子仁地黃丸一名菊花丸治用力勞心肝虛風熱攻眼赤腫羞明漸生翳膜兼肝腎風毒熱氣上衝目痛久視傷血血生肝故勤書則傷肝而目昏肝傷則目生風而熱氣上湊目昏益甚不宜專服補藥當益血鎮肝而目自明黃連決明子各一兩沒藥甘菊花防風羌活桂心光明硃砂各半兩熟乾地黃一兩半上為細末煉蜜丸如梧桐子大每服三十丸熟水下食後日三服補肝湯治肝虛兩脅滿痛筋脈拘急不得喘息兩目昏暗面多青色防風去叉苗細辛去苗葉柏子仁白茯苓去黑皮桂去粗皮甘草微炙銼山茱萸桃仁湯浸去皮尖雙仁炒蔓荊實去浮皮上等分粗搗篩每服五錢水一盞半大棗三枚劈破同煎至八分去滓溫服不拘時日再服甘草湯出聖濟總録治肝氣不足兩脅拘急疼痛寒熱目不明甘草炙銼防風去叉苗各一兩桂去粗皮烏豆一合細辛去苗葉各半兩蕤仁去皮一兩研爛白茯苓去黑皮各二兩上粗搗篩每服五錢水一盞半棗三枚劈破同煎至七分去滓食後臥時服檳榔湯出聖濟總録治肝虛寒眼目昏暗脅下痛脹滿氣急檳榔銼生用陳橘皮湯浸去白桔梗各一兩白茯苓去黑皮一兩半白朮二兩附子炮裂去皮臍桂去粗皮吳茱萸湯洗焙乾炒各半兩上粗搗篩每服五錢水一盞半入生薑一棗大劈碎煎至八分去滓溫服不拘時候若氣喘急加半夏半兩薑湯洗去滑芎藭甘草各一兩石決明丸治肝虛血弱目久昏暗石決明五味子菟絲子酒浸一宿別搗末各一兩細辛去苗葉知母焙山芋熟乾地黃焙各一兩半上為末煉蜜和丸如梧子大每服三十丸空心米飲下硃砂煎出龍木論治肝虛積熱外障龍腦一分乳香二分硃砂半兩細辛白芷黃連秦皮各一兩上為末以水浸一伏時去滓用汁以蜜五兩煎之點眼地黃丸出龍木論治男子婦人肝臟積熱肝虛目暗膜入水輪瞞睛眵淚眼見黑花視物不明混睛冷淚翳膜遮障腎臟虛憊肝受虛熱久近暴熱赤眼風毒氣眼乾溼腳氣清中消渴諸風氣等疾由腎氣虛敗者但服此能補肝益腎驅邪明目甚效生乾地黃洗焙熟乾地黃洗焙各一斤枳殼去瓤麩炒石斛去苗防風去苗各四兩杏仁去皮尖麩炒黃去油二兩牛膝酒浸二兩上為末煉蜜丸如梧桐子大空心溫酒鹽湯米飲任下三十丸忌動風物唐相李恭扈從在蜀患眼或澀或痛或生翳膜或見黑花如豆大纍纍數十不斷或如飛蟲翅羽百方不效僧智深云相公此病緣受風毒蓋五臟實則瀉其子虛則補其母母能令子實子能令母虛腎是肝母今腎受風毒故令肝虛則目視䀮䀮用藥與此地黃丸同但為末不犯鐵器空心豆淋酒下五十丸豆淋酒法用黑豆半升炒令煙出以酒三升沃之去豆用酒以此酒煮獨活即是紫湯也一方無防風流氣飲治肝經不足內受風熱上攻眼目昏暗視物不明常見黑花當風多淚怕日羞明推眵赤腫隱澀難開或生翳障倒睫拳毛眼眩赤爛及婦人血風眼時竹暴赤眼胞紫黑並宜服之菊花散出危氏方治肝受風毒眼目昏蒙漸生翳膜蟬蛻去足白蒺藜炒焦去刺羌活各三兩甘菊去萼四兩木賊去節童便內浸一宿曬乾三兩荊芥穗甘草各二兩上為末每服二錢食後茶清調下湯泡散治肝虛風熱攻眼赤腫羞明漸生翳障當歸尾赤芍藥黃連去須杏仁各五錢銅青二錢防風五錢薄荷葉三錢上銼散每用二錢極沸湯泡乘熱先熏後洗冷則再暖用日兩三次一方白鹽入少許閉目沃洗鹽亦散血還睛丸治肝臟虛血弱不能上助目力視物昏暗雷嚴丸出宣明論治男子婦人肝經不足風邪內乘上攻目暗淚出羞明怕日多見黑花翳膜遮睛瞼生風粟或癢或痛隱澀難開兼久患偏正頭風牽引兩目漸覺細小視物不明皆因腎水不能既濟於肝木此藥久服大補腎臟添目力肉蓯蓉巴戟浸一宿去皮心牛膝各一兩菊花枸杞子各二兩川椒三兩去目黑附子青鹽二錢兩以泔水三升同煮為度去皮臍一兩上為末先浸藥酒煮麵糊為丸如梧子大每服十丸空心酒下世人服藥不知多少根源往往不效五加皮湯出聖濟總録治肝虛受風筋脈拘急手足瘡痹目視不明五加皮銼玄參獨活去蘆頭桑白皮銼各一兩茯神去木麥門冬去心焙各一兩上粗搗篩每服五錢水一盞半煎至八分去滓投荊瀝半合再煎三兩沸空心晚食前溫服升麻湯出聖濟總録治肝虛中風頭疼目眩昏暗胸中客熱心煩悶升麻羚羊角鎊葛根銼前胡去蘆頭酸棗仁地骨皮各一兩上粗搗篩每服五錢水一盞半煎至七分去滓入竹瀝半合食後臨臥溫服瀉肝湯出龍木論治肝虛積熱外障黑參大黃黃芩知母芒硝各一兩桔梗二兩上為末以水一盞散一錢煎至五分食後去滓溫服還睛丸治肝虛眼目昏暗及一切眼病惡實炒半兩青鹽半兩蜀椒去目及閉口者一兩半醋石榴二個去皮以上四味用好酒二升於銀石器內慢火煎之俟酒干取出木賊半兩附子炮裂去皮臍一枚上為末醋煮麵糊丸如梧桐子大每服十五丸至二十丸空心食前鹽湯下補肝湯治肝氣不足甘草炙黃芩人參桂心各二兩上切用水六升煮取二升分三服忌海藻菘菜生蔥菊花散出聖濟總録治肝虛風毒氣眼多淚澀痛菊花半兩牛蒡子半兩炒甘草半兩炙微赤銼上為末每服一錢匕溫水調下金蓮子散一名湯泡散治肝虛風熱攻眼赤毒腫痛羞明漸形翳膜等疾春雪膏出龍木論治肝經不足內受風熱上攻眼目昏暗癢痛隱澀難開及堆眵赤腫怕日羞明不能遠視迎風有淚多見黑花並皆治之腦子二錢半蕤仁二兩去皮油殼稱取二兩細研去油上用生蜜六錢重將腦子蕤仁同搜和每用銅箸子或以金銀叉股時復點放眥頭治連眶赤爛以油紙塗膏貼之治悶氣血虛氣虛肝虛眼白俱赤日夜如雞啄生浮翳出經驗方老蚌殼燒灰木賊草焙銼為末等分點眼古錢煎治積年赤眼胎赤古銅錢三十文食鹽末二兩釅醋一升上將錢重以末食鹽填孔中令滿以五月五日午時於石上用炭火燒令極赤然後投醋中候冷傾向小瓷瓶中盛用紙三十九重封瓶口一日去一重每以銅箸蘸如黍米點目眥中治積年風赤眼出聖惠方取長明燈盞內油少許以銅錢一文於乳鉢內細細磨之令油凝鉢底覆卻以艾煙燻之一夜每以銅箸點之柴胡湯出聖濟總録治積年風毒瘀熱攻目赤痛柴胡川芎大黃微炒羚羊角鎊茯神去木各二兩黃芩炒一兩芍藥三兩石膏五兩上粗搗篩每服五錢水一盞半入竹葉七片煎至一盞去滓投入芒硝半字放溫空心頓飲以利為度如利頓去芒硝以粥止之如秋月肝弱不宜瀉肝宜加補藥不用此方藁本湯一名補肝湯出龍木論治積年風眼赤痛多熱淚歲月浸久暴風外障客熱之眼藁本去苗二兩芍藥天麻防風去艾細辛去苗各一兩白芷石決明搗為粉車前子各半兩上搗篩每服五錢水一盞半煎取一盞去滓食後溫服臥再服一方為散每服一錢空心米飲調下胡黃連煎治風毒久赤痛爛怕風磣痛不可忍龍腦膏出聖惠方治遠風赤爛胎爛及熱毒龍腦半錢空青半分大黃半兩黃連三分去須野駝脂半兩鵝脂三兩去滓熊膽一兩馬牙硝一錢另研上先將牙硝黃連大黃三味末納入脂中於微火上煎五七沸去滓次將龍腦熊膽空青末研令極細入前脂中攪令勻納瓷瓶中盛每用銅箸取一黍米大點目眥頭日兩三度用之五參散出聖濟總録治風毒眼赤痛久患不瘥苦參沙參丹參枳殼玄參紫參各一兩蒺藜子二兩上為細末每服二錢匕空心以溫酒調下疾甚者日三服點眼七寶飲治風熱上衝目赤疼久不瘥出聖濟總録珊瑚琥珀玉屑曾青紫貝硃砂雞子殼半兩上研極細點時仰臥以銅箸取一緑豆大點眼三五上點之洗眼方出聖惠方治年遠赤眼青鹽半兩決明子一兩半柴胡去苗一兩半秦皮防風去苗蛇銜草各一兩生乾地黃一兩半上銼以水一大碗煎至二盞半用絹濾過每取三合候冷洗眼日二三度烏麻油膏出聖惠方治胎赤眼三二十年風赤生烏麻油半雞子許著銅器內以細粗石磨之使濃下能流乃止熟艾二升杏仁一升黃連一兩雞糞一升亂髮小盞大一塊鹽一合上穿地作一坑子其形如瓶口外小里大先以火燒令乾於別處閉一小風孔以前六味藥重重布著坑中如艾炷用火燒之令煙卻將前所磨銅器蓋坑口煙盡即去銅器刮去煙令細研如粉瓷盒盛每以銅箸點如黍米大在目眥頭臨臥點妙治遠年風赤眼出聖惠方用構樹皮隨多少左搓合作繩盤著放在南牆下陰乾後於瓷碗內燒為白灰紙貼內收勿令灰塵入不計大小患目日二三度取粟米大點之穀精草散出聖濟總録治風毒赤眼無問新久穀精草去根一兩豉焙乾一合井中苔焙乾井泉石淨洗研半兩上為末散每服二錢空心以井華水調下點眼杏仁膏出聖濟總録治風毒積年赤兼翳膜膩粉一錢鹽緑研黃連為末杏仁湯浸去皮尖上和重研令勻真酥調如膏於銅碗中研勻於碗內以熟艾如雞子大掘小坑於內燒艾煙出便覆銅碗於坑子上蒸勿令泄氣候煙盡為度重研每服少時以綿裹用人乳汁浸一宿點目日三度蕤仁散出聖惠方治遠年風赤眼古文錢四十九文字竅分明先以青鹽二兩作末一行錢上用一行鹽末如此排盡鹽錢為度安於一淨磚上以火燒令通赤吹去灰塵蕤仁湯洗去赤皮黃連黃柏各二分上為散取前件鹽錢一處用水二大盞煎一鍾去滓更以帛濾過不計時候點之又方出聖惠方治眼風赤經年不瘥石膽鹽緑細辛研各一兩蕤仁半兩浸去皮尖上共研勻用生驢脂三兩研如膏內諸藥相和於瓷盒盛不計時候少許點之點眼小黃連膏治風毒赤爛不以年月久近發歇頻並視物淚出不止黃連蘆薈各研一兩龍腦別研半錢上先將黃連蘆薈末以新綿裹用水二盞於瓷器中以重火煮取汁三分二即將綿濾去藥入龍腦以瓷瓶子內收每日三兩上點之點眼方出聖濟總録治久患赤眼眥爛眶痛淚下不止視物昏暗鉛丹羅過一分朴硝研半兩蜜五兩上以銅器內慢火熬三十沸不住手攪乘熱以綿濾候冷點眼治遠年風赤眼腫痛方出聖惠方硼砂青鹽石膽各等分上用醋醬一盞於瓷器浸日中曝之候其藥著於器中四畔干刮取如粟米大夜臥時著兩眥不過三四度效杏仁膏出聖惠方治遠年風赤眼腫澀痛杏仁一合浸去皮尖鹽緑二分印成鹽一分上取杏仁先搗如膏放瓷器內次入鹽緑並印鹽相和蜜封至二七日後每夜臥時少許點眼四眥上每日兩三度黃連膏煎出聖惠方治遠年風赤宜點黃連二兩蕤仁二兩去皮硇砂一分上先取黃連以水三大盞煎取一盞綿濾去滓又取蕤仁以絹裹別以水一盞揉令漿盡卻和前黃連汁同煎似稀膏刮取攤瓷盒中後以新磚一塊上安艾如雞子大燒之以藥合覆蓋勿令煙出熏之以艾盡為度復研令勻每以銅箸取如緑豆大點之蕤仁點眼方治眼風赤經年不瘥蕤仁半兩去赤皮膩粉一分青錢一錢上相和細研如粉後以乳汁少許和研如膏遍塗於茶碗中以熟艾一塊如小雞子大掘地作一坑子安艾團內坑內燒之以藥茶碗蓋候煙盡為度取出入乳汁研成膏每次銅箸取少許點之治遠年風赤眼不瘥蛔蟲是小兒吐出者陰乾為末膩粉一錢石膽半錢上都細研如粉日點二三度點眼黃連膏出聖濟總録治積年風毒熱氣不散目角赤爛磣痛黃連去須研半兩馬牙硝研一錢上將黃連用水浸於日內曝令色濃以綿濾過後下硝末於黃連汁中又曝令乾細研每以一豆許水調點注目眥療積年風赤眼方取生油生豬脂胡粉各等分和研敷眼中二日內赤總除四順飲治遠年赤腫大便不通大黃一兩半川芎山梔仁赤芍藥朴硝各一兩當歸枳殼甘草炙各一兩上㕮咀每服二錢加生地黃三寸煎兼氣加香附痛加乳香沒藥目赤腫痛附論夫目赤腫痛者以心肺壅滯積熱不散邪氣毒氣干於足厥陰之經風熱交作上攻於目及兩瞼間故其色赤而腫痛宜祛風邪蠲熱氣疏瀹壅滯此眼先患赤腫疼痛及怕日淚澀難開忽生翳膜赤腫或初患一目不見以致兩目齊患此因作勞用力肝膈熱勞方紫金膏專治赤腫風爛眼目銅青研硇砂硼砂羚羊角雄黃青鹽琥珀明礬各七錢半當門子片腦膽礬深中青各八錢半玄精石黃連乳香水銀各半兩小丁香爐甘石一斤火炮七次醋淬七次石燕子二兩火煅醋淬七次金星石一兩七錢半煉通紅黃丹八兩銀星石一兩二錢半火煉海螵蛸一兩七錢半為末輕粉一錢沙糖三斤水三升上以水同蜜於鍋內熬沸去沫入黃丹以柳木篦急手攪勻約熬三兩沸卻下爐甘石又復攪入乳香硇砂又下雄黃次下丁香再入輕粉方下片腦依次第下藥文武火各熬二三沸須不住手攪勻成膏候黏手為度每用雞頭大沸湯化開浸湯半盞乘熱溫洗掃翳散治眼赤腫痛瘀肉攀睛視物茫茫及時行紅眼暴發者防風羌活川芎甘草蒺藜決明子各半兩柴胡玄參各二兩白芷荊芥瞿麥木賊木通赤芍梔子生地天花粉夏枯草薄荷穀精草各一兩五靈脂甘菊花蟬蛻白皮大黃各七錢半上㕮咀每服四錢水一盞半煎八分去滓食後服流氣飲治風熱攻眼赤眆痛梔子散治眼赤迎風淚出癢及胎赤障翳瞼急痛梔子仁半兩秦皮蔓荊子白芷細辛防風玄參決明子菥蓂子車前子各三分赤茯苓二分枳殼三分麩炒蕤仁三分湯浸去赤皮菊花黃芩各三分上搗為散於食前竹葉湯下一錢忌炙爆油膩生果熱面等物防風散治眼赤暴腫痛多眵淚宜服退上焦壅熱止痛消腫防風芎藭川升麻犀角屑羚羊角屑赤芍前胡各半兩細辛秦皮硃砂細研甘草炙微赤各一分牛黃二錢細研上搗羅為散入牛黃硃砂都研令勻食後煎地黃湯下羚羊角飲治肝臟風毒上衝眼赤腫痛難開頭額偏痛羚羊角屑一兩細辛去苗一分甘菊花葳蕤芎藭人參各三分赤芍藥黃芩梔子防風去叉甘草各半兩上粗搗篩每服三錢水一盞煎至六分去滓食後溫服石決明丸治眼腫赤痛石決明淨洗地膚子黃連青葙子大黃茺蔚子各一兩皂莢去黑皮黃芩人參甘草各三分上為末煉蜜和丸如梧桐子大每服食後淡漿水下三十丸臨臥時再服千金漏蘆湯治熱眼赤腫濛霧白芨漏蘆黃芩麻黃芍藥升麻白薇枳殼大黃甘草炙各等分上粗末每服三錢新汲水煎熱服通利為度祛毒散治赤眼及目睛腫痛不得眠睡射干山梔子當歸防己龍膽黃芩芎藭黃連石決明各一兩上為散每服一錢溫酒調下茶調亦可生犀飲治目赤侵黑腫痛兼白睛腫起犀角鎊黃芩葳蕤防風地膚子羚羊角甘草各一兩麥門冬黃連各一兩上銼如麻豆大每服三錢用水一盞煎至七分去滓入馬牙硝半錢食後服八寶飲治熱眼腫痛車前子龍膽草穀精草仙靈脾藁本威靈仙荊芥穗秦皮甘草各二錢半上細銼每服二錢食後煎服石決明散治患赤腫疼痛怕日淚澀難開忽生翳膜石決明一兩草決明炒羌活山梔子各半兩大黃煨荊芥一分木賊青葙子芍藥各等分上為末每服二錢麥門冬去心煎湯調食後服防風丸治目赤腫痛防風決明子人參車前子各一兩黃連菊花槐實炒藍實各一兩上為末煉蜜為丸如梧桐子大食後溫漿水下三十丸臨臥再服三十丸治赤暴眼上為白薑末水調貼腳心良黃連散治眼赤腫痛黃連蕤仁細辛梔子各一兩生乾地黃一兩甘草一兩半青鹽一二分苦竹葉二握上為散水三升煎一升去滓稍熱服洗眼不計時候上清龍膽散治赤眼腫痛漸生云膜川芎鬱金廣芩盆硝各三錢穀精草半錢龍骨麝香各一分乳香一錢半上為細末研勻鼻內少搐效玉柱膏治赤眼暴腫生翳硼砂龍腦馬牙硝青鹽輕粉熊膽各一錢並細研杏仁五枚去皮上一處再研煉蜜為膏每點粟米大眼眥頭水龍膏治赤眼腫痛翳膜黃連一分當歸乳香各二錢穀精草青鹽硼砂各一錢硇砂皂子大小塊枯礬龍腦上搗研為末一處和勻煉蜜四味於藥共入竹筒內蠟紙密封重湯內煮令蜜熟取綿濾過點粟米大眼眥頭不計時候決明子散治眼赤腫痛不可忍及生障決明子梔子仁地膚子茺蔚子藍葉朴硝各一兩川升麻一兩半石膏二兩上為散每服二錢水一盅入苦竹葉七片煎至六分去滓食後服大黃湯治肝經邪熱赤澀腫痛大黃梔子黃連龍膽鬱金黃柏甘草一兩上每服三錢用薑棗同煎和滓通口服補肝散一名還精散出龍木論治肝虛眼睛疼冷淚不止筋脈痛及羞明怕日氣翳退障夏枯草半兩香附子一兩上為末茶調下每服二錢無時候服治肝虛或當風眼淚出龍木論用臘月牯牛膽盛黑豆一百粒後百日開取食後夜間吞五七粒鎮肝明目黑豆盛浸不計多少枸杞方出龍木論治肝虛或當風眼淚用枸杞子最肥者二升搗破納絹袋置罐中以酒盛一斗浸訖密封勿泄氣三七日每日飲之勿醉治肝風虛熱目赤暗痛熱病後失明者出龍木論上用青羊肝或子肝薄切水浸服之極效小片吞之尤妙車前子丸出楊氏家藏方治肝氣虛下元不足目眼常昏或生翳障車前子一兩菟絲子酒浸取末一兩蔓荊子炒決明子揀淨炒白茯苓去皮黃連去須白芍藥五味各一兩地骨皮淨洗去土牛膝酒浸一宿焙乾黃耆三味各一兩二錢半附子炮去皮臍一兩上為細末煉蜜和丸如梧桐子大每服五十丸溫酒鹽湯下不拘時服補精丸出楊氏家藏方養肝益精滋榮目力菟絲子地黃各一斤車前子枸杞子白茯苓去黑皮甘菊花各半斤地骨皮半斤上搗羅為細末煉蜜丸梧桐子大每服溫酒鹽湯下五十丸食後服二妙散出楊氏家藏方養肝氣治目昏視物不明淚下方當歸熟乾地黃上等分搗羅為細散以無灰酒下二錢匕非時服養肝丸出經驗良方治肝血不足眼目昏花或生眵淚久視不明當歸去蘆酒浸車前子酒蒸焙防風去蘆白芍藥蕤仁別研熟地黃上等分為末煉蜜為丸如梧桐子大每服五六十丸溫熟水送下養肝丸出淡寮方治肝血不足眼目昏花或生眵淚久視無力當歸去蘆酒浸車前子酒蒸焙防風去蘆白芍藥蕤仁別研熟地黃酒焙川芎楮實子各等分上為細末煉蜜為丸如梧桐子大每服七十丸熱水送下不拘時候萬壽地芝丸出保命集治目能近視不能遠視局方中定志丸能遠視不能近視生薑四兩焙天門冬四兩去心枳殼三兩去瓤炒甘菊花二兩上為細末煉蜜丸如梧桐子大茶清或溫酒下一百丸食後此藥能愈大風熱治邪氣入肝眼痛又多見鬼物出本草以死人枕煮服之竟可埋枕於故處昔沈僧翼患此疾嗣伯曰邪氣入肝可覓死人枕煮服之竟可埋枕於故處如其言即愈夫邪氣入肝故使眼痛而見魍魎須邪物以釣之故用死人枕之氣因而去之故埋於冢間也
