大黃二兩黃芩山梔仁炒石決明煅草決明炒木賊去節桔梗密蒙花蟬蛻洗炒去嘴足蒺藜炒去刺赤芍藥青葙子龍膽草粉草炙羚角炒各一兩制焙上為末每服二錢食後服心熱燈心湯下後生昏花米飲下常服麥門冬湯下老者豬羊肝蘸吃肺熱桑白皮湯下灑淚夏枯草湯下小便不通車前子湯下鬱金湯出永類鈐方治赤腫痛大黃荊芥穗薄荷葉鬱金朴硝等分上為末雞子清或嫩芋根白者打爛調貼眉眶上及瞼腫加生地黃尤好痛加乳沒調糖煎散出楊氏家藏方治風熱毒氣上攻眼目赤腫疼痛視物不明隱澀難開龍膽草漢防己大黃荊芥穗赤芍藥當歸洗焙甘草炙防風去蘆以上八味各一兩川芎半兩上件㕮咀每服四錢水一盞入砂糖如彈子大同煎至七分去滓溫服食後服如聖水出楊氏家藏方治赤眼腫痛生瘡干艾葉燒灰炒半錢黃連去須搗細末半錢上件入新瓷器中用無油沸湯浸稀稠得所新汲水內沉令極冷入青古老錢一文浸兩時辰臨臥仰眠用古老錢蘸藥點眼候口中覺味即驗祛風散出朱氏集驗方治一切風熱上攻眼目赤腫羞明大黃黃芩地骨皮山梔子各半斤柴胡玄參赤芍藥荊芥薄荷防風甘草桑白皮上㕮咀每服三錢水一盞半赤腫加生地黃煎大人小兒小便祕澀心胞滿悶加枳殼羌活散出永類鈐方治一切風熱攻上頭目赤腫疼痛昏澀眵淚怕日羞明赤脈羌活獨活柴胡川芎黑參赤芍藥桔梗荊芥地骨皮薄荷各半兩大黃一兩桑白皮半兩山梔子黃芩各一兩上件各生用㕮咀每服重三錢水一盞半煎去滓無時服如有翳膜加蟬蛻密蒙花各半兩淚多則加木賊半兩目赤磣痛赤腫附論夫五臟六腑之精華皆上注於目若風熱搏於臟腑毒氣乘肝沖發於目則熱氣外泄淚下眵多目液暴燥故磣痛赤腫也方龍腦膏出聖濟總録治肝熱沖發於目赤痛赤腫磣痛山梔子去皮二兩甘草七錢生生乾地黃二兩熟乾地黃一兩黃連去須青葙子各八錢當歸四錢馬牙硝六錢決明子一合以上共搗為粗末青鹽四錢密陀僧半錢朴硝一兩一錢石決明一枚米泔浸三日刮洗乳香一錢硇砂一字硼砂蕤仁各二錢以上並細研燈心半束切碎鉛丹一兩三分羅過白蜜三斤以上同拌勻入瓷瓶子內用箬紙油封定勿令透氣坐在銅鍋內重湯煮一日取出絹濾去滓大棗十枚去核龍腦一錢麝香成顆者研膩粉各一字丹砂研二錢上除前膏外將後四味同研勻入前膏內攪令相得以干瓷器收之用銅箸如常法點眼其藥滓更以雪水二碗攪和入罐子依前法煮濾取清者點其滓焙乾入蔓荊子惡實各二兩炒過同為末每服一錢七分食後荊芥臘茶調下龍腦散出聖惠方治肝臟風熱眼目赤爛腫痛磣澀龍腦細研牛黃細研硃砂各一分細研天竺黃細研赤芍藥玄參甘菊花車前子決明子胡黃連柴胡去苗川升麻各半兩犀角屑羚羊角各二兩川大黃一兩炒甘草三分炙銼細辛一分上為散研令勻食後煎熱湯調下一錢七分忌炙爆熱面毒滑魚肉羌活散出聖濟總録治風毒氣攻注頭目昏眩磣澀疼痛及治皮膚瘙癢隱疹赤腫羌活獨活前胡去蘆並銼人參桔梗防風各去蘆頭芎藭細辛去苗荊芥穗甘菊花土蒺藜茯苓去皮枳殼麩炒去瓤石膏細研水飛甘草各一兩上除石膏外同杵為散再入石膏和勻每服二錢不計時候酒調下決明子方出聖濟總録治目赤翳膜磣痛熱淚不止決明子為末蕤仁研各六分象膽黃柏去皮為末秦皮為末各四分鹽緑研三分鯉魚膽去皮四枚烏賊骨去甲研貝齒燒研馬琦研各四分上各研細先以水三大升煎後五味至一升去滓重煎至半升即下前五味再以微水煎取三合用密器盛每服一大豆許以人乳和少少點眼中日二夜一度為效瀉肝散出聖濟總録治眼熱磣痛赤腫淚出昏暗柴胡去苗決明子升麻苦竹葉朴硝研各二兩澤瀉一兩大黃蒸梔子仁黃芩去黑心芍藥各三兩上為散每服五錢水一盞半煎至一盞去滓溫服以利為度決明湯出聖濟總録治眼燥澀痛睛如米磣石決明淨洗細辛去苗防風去叉車前子人參白茯苓去黑皮大黃炒令香熟桔梗炒各一兩茺蔚子二兩上為散每服五錢水一盞半煎至一盞去滓食後臨臥溫服日三服羚羊角湯出聖濟總録治肝腎虛熱氣壅攻衝眼磣澀赤脈羚羊角鎊屑半兩木通細銼玄參防風去叉各一兩芍藥一兩山梔子仁三分枳殼去瓤麩炒半兩馬牙硝為末浸湯澄下甜竹葉洗各一兩上除硝並竹葉外粗搗篩每服五錢水一盞半入竹葉十片煎取一盞去滓入硝末一錢於食後溫服臥時再服點眼方出聖濟總録治肝熱目赤腫磣痛黃連蕤仁各三兩秦皮去粗皮馬牙硝研決明子山梔仁黃柏去粗皮各一兩鉛丹研一分龍腦研一錢上除鉛丹並牙硝龍腦外併為粗末用蜜一斤四兩於瓷罐內拌和諸藥令勻將硝末摻於藥面上坐罐子於鍋內以水浸罐子內令深莫教浮動慢火煮令牙硝耗盡湯少旋添熱湯勿令湯淺次入鉛丹更煮一日取出放冷入龍腦封閉地坑內窨著如要用旋以生絹絞濾少許點如點久患障翳即五分藥膏別入淡竹瀝七分和勻點之車前子丸出聖濟總録治肝腎風熱目赤痛腫磣出胬肉車前子人參決明子微炒黃連黃芩去黑心大黃炒細辛去苗各一兩甘草炙半兩上為散末煉蜜和丸如梧桐子大食後溫漿水下三十丸臨臥再服中黃湯出聖濟總録治脾胃熱眼赤澀痛犀角鎊屑生麥門冬去心蘆根各一兩半淡竹葉十五片石膏甘草炙各二兩生地黃二合地骨皮三兩上㕮咀如麻豆大每服三錢水一盞半煎至一盞去滓溫服煎藥不得犯鐵器食前服地骨皮湯出聖濟總録治風毒沖目赤痛乾澀地骨皮升麻甘菊花防風去叉決明子炒細辛去苗各一兩竹葉洗上除竹葉外粗搗每服五錢水一鍾半入竹葉七片煎一盞去滓食後臨臥溫服象膽煎出聖濟總録治目赤障翳磣痛熱淚昏暗象膽鹽緑各研一兩防風去皮一兩半蕤仁去皮二兩石蜜一兩一分黃連去須二兩龍腦研半兩細辛去苗三分上除研藥各細切以水三大升煎取七合濾去滓下龍腦鹽緑更煎一二十沸於密器盛每取一二豆大許新汲水或人乳和點眼中良久閉目日夜各二次龍煙湯出聖濟總録治眼磣澀並針刺血痛昏暗生麥門冬去心一兩半熟地黃焙三兩木通一兩旋覆花大青茯神去木各一兩黃連去須半兩上銼如麻豆大每服三錢水一鍾半煎至一鍾去滓入芒硝半錢匕攪勻食前溫服食後再服蕤仁湯治目熱赤腫磣痛蕤仁去皮秦皮去粗皮防風去叉各一兩甘菊花擇半兩竹葉一握山梔子仁葳蕤各半兩上銼如麻豆大水五盞煎至兩盞半去滓熱淋冷頻暖淋洗煎藥不得犯鐵器蕤仁膏治目磣澀迎風淚出眥瞼赤爛生瘡癢痛不已蕤仁去皮一兩胡粉研一錢黃連為末一兩龍腦研一錢膩粉研一錢貝齒燒研一分真牛乳三兩上各研勻用銀石器熔乳訖然後下蕤仁等攪令勻煎數沸熟便以綿濾去滓用密器盛每取一麻子許點目大眥中日二度地骨皮散治風熱毒氣上攻眼目磣澀疼痛地骨皮去土羌活防風去叉土蒺藜去刺微炒甘草炙各一兩上為散每服二錢七分荊芥茶清調下患暴赤眼濃煎甘草湯下食後臨臥服解熱眼方治解熱消血明目大黃甘草當歸酒洗芍藥各一兩上為細末每服二錢湯調下食後服或以一錢湯泡洗尤妙大棗煎治目熱眥赤生赤脈侵睛息肉急痛閉不開磣痛大棗七枚去皮核黃連二兩淡竹葉切五合上以水二升煮竹葉取一升澄清取八合納棗肉黃連煎取四合去滓令淨細細以敷眼眥中忌豬肉羊肝丸解熱消血明目黃連淨為末杏仁去皮尖半兩白羊子肝一具去筋膜上臼內搗細衆手丸桐子大每七十粒食後臨臥溫米泔下日三服洗眼車前草散治目熱痛淚不止黃連煎治眼目暴赤磣澀疼痛甘蔗汁二合黃連搗碎為末半兩上於銅器以慢火養令汁涸去半以綿濾去滓每日兩度點之黃連點眼方治熱毒乘肝上衝於目堆眵赤痛磣澀疼痛用黃連去須搗末半兩以生竹筒一個留節可長六七寸以水三大合將黃連用新綿裹納竹筒中著古銅錢一文蓋筒口於炊飯甑中密蓋之待下饙即取出以綿濾過候冷納瓶中每以銅箸點少許著目眥頭日三度不可過多若治眼暗不過一匙瘥治眼熱痛淚不止用菥蓂子為末欲臥以銅箸點眼中當有熱淚及惡物出並去胬肉三四十夜點之甚效寒水散治目赤多眵磣痛用馬牙硝三兩研入新竹筒中密封入地埋四十九日取出更研每用一字用黑豆末少許以水調如糊後同藥調勻攤紙花子上貼太陽穴一方只用硝極細研夜臥銅箸取如黍米大點目眥旦以漿水洗
