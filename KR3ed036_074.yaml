body:
  text: 卷七十四眼目門暴赤眼附論夫暴赤眼者肝心壅熱散於血脈之中熱氣上炎攻衝眼目令暴赤隱澀痛疼風氣加之則癢悶也龍木論云暴赤眼後急生翳外障眼初患之時忽然目睛赤腫淚出或癢或痛此是肝心壅毒在胸膈之間更相擊發臟氣上攻致使然也切宜兼洗出血後飲蘆根飲子鎮肝丸歌曰忽然暴赤白睛紅輕者無妨甚者疼痛還是肝心二臟熱更須擊發使相攻蘆根飲子須通淺莫遣他時更復蹤丸散鎮肝吞半劑如斯治療有神功方好槐枝湯治赤目昏痛淚出隱悶槐枝銼二兩秦皮黃連去須蕤仁去皮馬牙硝黃柏去粗皮山梔子各半兩古字錢十四文淡竹葉一握細切食鹽一分上前藥粗搗篩每用五錢水二盞入錢煎至一盞半濾去滓放溫洗眼冷再暖洗蔓荊實丸一名羚羊角丸治肝臟風熱目暴赤隱澀腫痛犀角湯治肝心壅熱上攻眼目暴赤腫隱澀疼痛犀角鎊黃芩去黑心瞿麥穗黃連去須三分梔子仁各一兩車前子木通銼大黃炒柴胡去苗青葙子各一兩上粗搗篩每服五錢水一鍾半煎至七分入竹葉去滓入芒硝半錢食後放溫服臨臥再服石蜜煎出聖惠方治暴赤眼石蜜三兩半硃砂食鹽各細研川芒硝細辛石決明水飛過各細研烏賊魚骨各半兩鹽緑一分研蕤仁一兩半去赤皮黃連去須為末上研如粉以蜜調成膏瓷器中盛之每點如緑豆大納眼大眥中宜避風處鎮肝丸出龍木治暴赤眼後生翳膜外障羌活石決明各一兩藁本一兩半乾山藥細辛五味子車前子人參茯苓各一兩上為末煉蜜為丸如梧桐子大空心茶下一十丸犀角散出聖惠方治暴赤眼腫澀痛犀角屑子芩瞿麥黃連各三分去須梔子仁大黃炒車前子木通芒硝各一兩上搗篩為散每服三錢水一鍾半入竹葉二七片煎至六分去滓食後服之加味香蘇散出德生堂治時行赤眼暴發赤腫怕日羞明疼痛難忍紫蘇香附子陳皮甘草桑白皮生地黃蘇木蟬蛻黃芩各二兩上㕮咀每服五錢水一鍾半燈草二十莖同煎八分去滓不拘時候熱服仙靈脾丸出聖惠方治眼暴赤風熱衝上疼痛赤腫生翳仙靈脾甘菊花黃芩車前子玄參石膏決明子羚羊角屑各一兩蛇蛻皮一分燒灰上為末煉蜜和搗二三百杵丸如梧桐子大食後溫水下二十丸洗肝柴胡散出聖惠方治眼暴赤柴胡二兩半去苗川升麻黃芩羚羊角屑川大黃地骨皮各一兩決明子石膏各二兩甘草半兩炙微赤上為散每服三錢水一鍾煎至七分去滓食前溫服治眼暴赤最宜服之蕤仁膏治眼暴赤熱毒腫痛膜障瞳仁蕤仁去皮鉛丹重羅各半兩井鹽一分黃連去須一兩石膽半錢龍腦麝香各半錢蜜五兩上除龍麝蜜外先將蕤仁等重研如粉以水一升入蜜五兩同煎令稀稠得所用新綿濾去滓入龍麝末調和令勻瓷器盛每以銅箸點少許還睛散出御藥院治風赤暴赤眼生浮翳眛目胎赤眥爛澀癢腫痛山梔仁黃連黃柏各一兩細辛去苗杜仲炙各二兩秦皮四兩甘草炙半兩上粗搗篩每服五錢水三盞入竹葉七片燈心二十莖煎一二十沸去滓澄清早晨臨夜臥洗了避風一日兩三次冷則再暖洗每次可用兩服藥亦得龍膽草散出和劑方治眼赤暴腫痛風熱上衝疼連眶瞼眥赤爛瘀肉侵睛時多熱淚或因叫怒有損肝氣及久勞瞻視風沙土所入致成內外障翳及一切眼患悉皆治之蒺藜子炒去刺龍膽草各六兩甘草三兩赤芍藥半斤羌活防風去叉各二兩菊花去枝半兩茯苓去皮尖四兩上為末每服二錢食後臨臥溫酒調下四物龍膽湯治目赤暴發作雲翳疼痛不可忍熟地黃川芎芍藥當歸羌活防風各三錢龍膽草防己各二錢上為粗末水煎服清金散治暴赤隱澀疼痛眵淚不住仙靈脾取葉用惡實略炒木通黃芩去黑心藁本去土晚蠶砂炒甘草炙各一兩上為散每服二錢匕食後用砂糖水調下蘆根飲子治暴赤眼後生翳外障兼治胎風赤爛蘆根銼一兩大黃炒二兩防風去叉一兩黃耆銼一兩芒硝一兩黃芩去黑心黑參一兩半上為散以水一鍾每服五錢煎至五分食前去滓溫服之蕤仁散治眼暴赤蕤仁去皮黃芩秦皮各二兩梔子仁黃連去須犀角屑各一兩甘草半兩上為散每服三錢水二盞入竹葉七片同煎至六分去滓食後溫服杏仁膏治眼赤暴痛杏仁浸去皮尖研如膏黃連去須為末各半兩消梨汁三合膩粉一錢白蜜半合古銅錢五文上於銅器中慢火熬令沸煎取一半漸漸火逼如膏方去古錢每用半小豆點之菊花防風散治目暴赤及風毒眼菊花防風去叉甘草威靈仙去土黃連去須惡實各三分上為散每服一錢匕風毒蔥湯下赤目新汲水下日再服秦皮湯治眼暴赤積年瞼爛不瘥澀痛睛上有白膜秦皮蕤仁去皮黃連去須山梔子各半兩黃柏一兩大棗五枚去核上粗搗篩以水四升煎取二升去滓微暖數洗之冷則重暖余滓再煎洗大黃湯治眼暴赤爛痛大黃梔子仁各一兩茯神去木生麥門冬去心焙犀角鎊旋覆花各一兩半上銼如麻豆大以水五大盞煎至三盞下芒硝一兩煎至一盞去滓食後溫服日三次菊芎散治暴赤眼薄荷二兩菊花甘草川芎各一兩防風七錢白芷半兩上為細末食後茶少許沸湯點眼如傷風酒調服尤效生地黃湯出御藥院治男子婦人暴赤眼澀痛腫不開乾地黃決明子黃芩竹葉各三兩川黃連芍藥各半兩上為粗末大人用一錢水三盞煎至五七沸綿濾去滓乘熱洗冷即再暖洗可二三次只用一日換藥小兒藥量減數用洗治男子婦人暴患赤眼方當歸川芎各二兩黑豆一升箬葉燒灰半兩赤土一兩砂糖半兩上以水二升煮黑豆令熟去皮以豆入藥煎熟次入箬葉灰赤土砂糖同煎每服一盞食後溫服秦皮湯治眼暴腫痛秦皮黃連去須黃柏去粗皮甘草炙砂糖一彈子大上銼碎如麻豆大每服三錢水一盞入砂糖一處同煎一二十沸濾去滓稍熱洗如冷再暖可洗五度艾煙丸治暴赤眼黃連去須一兩半膽礬半豆許研鉛丹研半錢膩粉一分杏仁湯浸去皮尖雙仁炒研十四粒上同研勻入粟米粥和以艾煙燻之丸如雞頭大每用一丸以綿裹井華水浸點服歸連湯出經驗良方治暴赤洗眼當歸尾極細者黃連赤芍藥防風各等分杏仁七粒去皮尖男孩乳汁蒸過上以水半盞同蒸乘熱洗冷則再熱又洗冰膏似雪出德生堂治惡眼暴發眼赤腫內生翳膜者黃連黃柏黃藥子苦參朴硝各二兩上為末用茶牙水調貼太陽穴上干則再潤之日二三次洗目方治暴赤眼疼痛磣澀用楮樹嫩梢盡去葉並細毛放地上火燒著碗覆入一日置灰為末置碗內以沸湯浸澄清乘溫以指蘸洗又方出聖惠方用馬牙硝研為末安於照上以銅沙鑼承照梢則照夜露之令露滴梢下入鑼中收取點眼中絶妙八月半白露下時可合之治暴赤眼方出永類鈐方用升麻乾葛湯三貼每貼加蟬七個作三服如未退用敗毒散加大黃又不退卻用五膈寬中散酒調墜下氣氣順自愈療眼暴赤腫磣痛不得開淚出黃連黃柏蕤仁鹽緑芒硝各等分上搗篩和如黍米大納眥中忌豬肉龍腦膏子出聖惠方治風毒暴赤眼腫澀痛龍腦半錢秦皮黃連去須甘草炙馬牙硝煉過研各半錢上搗篩用水一大盞浸藥一宿以銀銚子煎五分用新綿濾過入龍腦攪勻瓷器盛之以銅箸點之蕤仁膏治眼暴赤腫痛並翳膜但瞳仁不損皆治之蕤仁去皮丹砂一分青錢十文斗子鹽鹽緑各半錢上取新好綿裹並錢於銀器中以井華水一盞浸經一宿如稀膏每臥即以綿於眼大眥頭點時經一宿點了即且停三兩日卻點即避風處三兩日不然有損無益點時深暗房中杏仁湯治暴赤眼澀痛腫疼杏仁十四枚黃連去須膩粉二錢砂糖一錢上於晨朝睡覺未語時口內將杏仁與黃連同嚼爛並余藥盡入絹內線系以沸湯浸洗之冷重暖過夜露之每用可洗五次黃連膏治暴赤眼痛渾暈隱澀黃連去須一分膩粉湯浸去皮尖一分蕤仁去皮半分上先將去皮蕤仁爛研如膏後入黃連膩粉同置一處研了後以新綿厚裹於外梨少許以新汲水三盞於淨器內澄濾二盞候至清取二分浸藥裹了良久濾汁仰臥將藥裹溫藥點眼十餘次青梅膏治暴赤眼澀痛青梅七枚古字錢七文鹽花一合黃連去須一兩上粗搗篩以水二升煎取一升去滓如稀膏入新瓶子內盛系勿令泄氣埋七日取出每日點目眥三次鉛丹膏治暴赤眼疼痛鉛以絹羅過黃連去須為末蕤仁去皮研半兩鹽花一分上以蜜二兩用文武火先煎蕤仁鹽待勻沸即下鉛丹黃連煎如膏瓷盒盛每次可用如半小豆大以新水調化箸點日二次連竹湯治風毒攻眼暴赤澀癢黃連竹葉各一兩秦皮一分半蛇蛻皮半分上細銼用水一升半煎取五合綿濾去滓夜臥時白絹蘸藥汁洗眼生明丸治眼目暴赤睛痛腫薄荷葉川芎各七錢半縮砂仁甘菊花各半兩上為細末煉蜜和丸每一兩作十五丸服一丸至二丸細嚼溫服水送下噙化散熱飲子治眼暴赤暴腫防風羌活黃芩黃連各一兩上㕮咀水煎食後溫服如大便祕澀加大黃一兩如痛甚加地黃當歸各一兩如煩躁不得眠睡加梔子一兩細辛湯治眼暴赤澀腫痛木賊大者去節半兩細辛淨洗半兩草烏一分龍膽草去根半兩上為散每服三錢水一大盞入黑豆半合煎一兩沸又入砂糖一塊如彈子大煎至八分去滓食後溫服忌煎爆油麵酢醬熱物及忌房色事赴筵散治暴赤眼朴硝一錢砂糖一彈子大膩粉一錢杏仁七個去皮上研如膏水半盞調濾過洗三五次竹葉湯治眼暴赤腫痛柴胡去苗蛇銜去根二兩黃連去須細辛去苗各一兩上粗搗篩每服五錢煎水一盞半入竹葉七片煎七分去滓入芒硝一字食後溫服洗眼秦皮湯治眼暴熱腫痛澀治眼毒風暴赤羞明不瘥方出聖惠方鵝梨三顆取汁黃丹一兩硇砂半分蜜二兩上入竹筒內盛坐湯鍋內煮一日為度後取出綿濾過以瓷器盛用箸點大效杏仁膏治風毒暴赤眼腫澀痛蕤仁膏治眼暴赤熱毒蕤仁去皮胡黃連各一分雞子一枚去黃留清上以綿裹納雞清中浸一宿搵眼日數次後則洗之大黃膏治暴赤眼大黃末半兩大麥面三錢雞子去黃留清不拘多少上調如膏敷上下瞼大黃膏治暴赤眼痛腦熱大黃解毒子木香各等分上搗羅漿水調如膏於生絹上貼瞼頻易之砂糖黃連膏治暴赤眼白砂糖黃連末各一兩大棗青州者七枚洗煮過去皮核上搗熟如膏以緑豆大用綿裹新汲水浸點之龍腦膏治暴赤眼龍腦少許麝香少許黃連去須一兩淨洗為末極細上以蜜調黃連為餅子塗在白瓦器上用艾四兩熏取末刮下入腦麝以瓷合盛用時取如皂莢子大以新汲水調點之乳香膏治暴赤眼甘草黃連去須各半兩黃柏去粗皮三分上搗篩為粗散以水二盞煎至七分濾去滓後入膩粉少許黃明乳香皂角子大兩塊研勻點之至明膏出御藥院方治暴赤疼痛淚出眵多熱氣上攻視物昏花黃連一兩當歸二錢蕤仁去皮一錢以上藥用水一大碗浸一時辰慢火熬至半碗澄濾去滓入白蜜半兩再重湯煮成膏綿濾過出火毒入後藥龍腦二錢青鹽一字南硼砂一錢上研極細與前藥一處同研令勻每用黃米粒大或一緑豆大每日點一次兩眼各點二箸碧霞引治赤眼暴發並赤瞎神效方銅緑白土芒硝各等分上為細末丸如皂角子大每用白湯研化一丸洗之療眼暴赤方雞舌香二七枚干棗二七枚黃連二七枚上以水半大升煎五六沸澄取清點目中瘥治赤眼暴作明礬銅青黃連末各等分上為細末水泡洗又方出聖惠方治風毒暴赤眼腫澀痛黃連一分為末蕤仁半兩湯泡去白赤皮青古錢七文上以甜淡漿水一大盞於銀器中用文武火熬如稀餳以新綿濾過浸瓷瓶中密封有患者以銅箸點之黃連膏治暴赤眼黃連不拘多少去須為末銀器內熬成膏用龍腦少許上入罐子內油單紙封之令緊沉於井底著泥處浸一宿取出點之香蠟膏治暴赤眼風熱癢痛黃連宣州者去須秦皮各一兩上粗搗篩臘月臘日井華水五更者一大碗煎藥二七日綿濾銀器內文武火煎盡水如膏入龍腦勻和瓷合每用倒流水化少藥候勻點之黃柏膏一名黃金膏治眼暴赤澀痛兼治一切眼退翳黃柏去粗皮為末蛇蛻微炒為末一兩上用醋漿水三盞於銅器內煎一盞稀稠以乳香和膏綿絹濾待冷瓷合盛點眼大眥地黃膏治暴赤眼腫痛生地黃淨洗研黑豆各二兩生搗末上搗成膏臨臥時以鹽湯洗眼後閉目以藥膏後罨目上至曉水潤青金散出旅舍方治暴赤眼澀痛難開黃連去須艾葉燒黑灰各二兩上搗羅為細末每貼用五錢湯浸澄清用新綿濾過乘熱洗眼兼治目始赤澀痛熱腫熱淚不止如目中有瘡即不可用神應散出御藥院治眼暴赤腫痛玄明粉生用風化爐甘石燒赤各等分上同研極細每用藥一粟米大以新水一匙調藥不拘時候點之杏連散治暴赤眼又方出聖惠方治風毒暴赤眼腫澀痛黃柏水洗過去皮一兩桑條三握洗過上於銀銚子內以水一大盞慢火煎至半盞新綿濾去滓於淨器內一兩度以水拔藥令冷點之數多為妙魚膽敷眼方出聖惠方治暴赤熱腫痛澀鯉魚膽十枚取汁膩粉上相和令勻瓷盒中盛之每服少許點之又方出聖惠方治眼暴赤腫痛粗黃連十枚取汁青州棗三枚上取河水一鍾令患人自含水黃連吐於銚子內有苦汁即咽之勿得吐也其棗擘開去核同煎至三分綿濾澄清入少許孩兒乳汁相和點之清金散治暴赤眼澀痛難開用芰荷根絞取汁點目眥中治眼暴赤方及磣澀薺菜根搗絞取汁點之暴赤眼方及治不得開目痛淚不止腫磣出千金方用附子一枚炮去皮臍粗搗碎如蠶沙許臨臥時置目眥中良以定痛為度一方用梢去赤皮治暴赤眼方用烏雞冠血以箸點目眥內日三度治暴赤眼方以新粉腳二斤以甑單一所淨紙二重襯甑單先安腳粉如淋灰法用沸湯潑落日方淋雨露地上勿著屋下來日早晨濾出滓用水於烈日內曬乾如鹽花入瓷瓶中盛後入龍腦點目神效治暴赤眼出傳信適用方用四物湯三錢以水一盞同煎至七分去滓溫服不拘時候一方加大黃如栗子大食後煎服五行方出危氏方治暴赤時行赤腫痛取黃柏以刀略去粗皮不拘多少濕紙裹黃泥包煨候泥干取出每用一彈子大紗帛包水一盞浸飯上蒸熟乘熱熏洗修制有金木水火土故命名一丸可用三二次治暴赤眼腫用桑葉為末裹紙內燒煙燻鼻效治暴赤眼用黃連取驢奶汁淹漬點甚效豬膽方治火眼用豬膽一個銅錢三文洗淨瓦盆內蒸漸干取膽丸如粟米安眼中又方用生薑切破夾黃連濕紙裹煨熟以乳汁蒸點眼洗眼方出聖惠方治眼猝患赤腫疼痛秦艽去苗黃連去須細辛干桑葉各一兩蕤仁一分浸去赤皮上為散用藥一兩水三大盞入青鹽二錢煎至兩盞濾去滓每暖三合洗眼日三度又方一名洗眼方出十便良方甘草細辛黃連各一兩去須上為散和勻每取一兩以水一大盞半入青鹽二錢煎至一盞濾去滓每暖三合洗眼日三度蕤仁煎一名黃連丸治暴赤眼熱淚不止疼痛隱悶黃連一分為末蕤仁三十枚去皮研細上為散末水和薄攤瓷器底更住覆之以熟艾一斤漸以火燒艾煙燻藥上艾盡為度刮丸如梧桐子大每以冷水少許化藥一丸澄清點之一方用肥棗開竅去核納藥於內以棗蓋之然後以帛裹定以大茶碗量水半碗煮候水得一雞子大即以綿濾過待冷卻點眼甚效亦治風眼淚癢或生翳或生赤眥砂糖膏出選奇方洗赤眼腦子三十文砂糖少許生薑自然汁上件同勻為膏臨時滴點之立愈杏仁湯出選奇方治暴赤眼黃連杏仁上等分同研勻以水調濾取汁入輕粉和勻點之湯調頓冷洗皆可用黃連湯出選奇方治暴赤眼乾薑淨洗黃連半兩杏仁各半兩上同搗為粗末綿包之沸湯泡閉目乘熱洗之生地黃湯出御藥院治眼暴赤才發或經一二日赤痛隱悶淡竹葉草決明黃芩各二兩生乾地黃二兩赤芍藥半兩上為粗末每用五錢水三盞煎五七沸絹濾去滓乘熱洗眼冷再暖洗之秦皮散出永類鈐方治暴腫赤障疼痛灑淚當歸黃芩川芎荊芥穗宣連羌活秦皮黃柏梔子赤芍藥蔓荊子各等分上銼細新汲水漉出沙灰用二大盞溫熱泡洗至寶金絲膏出永類鈐方治暴赤客熱一切外障當歸羌活生地黃黃柏秦皮蔓荊子川芎黃芩赤芍藥山梔子宣連大黃細辛上逐味修制擇稱各等分入淨銅鍋內用淨水浸過藥汁煮令透去滓取現在濃汁以上等結如砂糖與濃藥汁相停和入銅鍋內再煮令沸以兩重絹濾過銅器內煮成膏如綿四季減火色續入沒藥水飛過如面更加腦麝隨便多少皆佳系點眼膏或用湯泡溶洗亦可重明散出衛生寶鑑方治一切風熱之毒上衝眼目暴赤腫不住疼痛或生翳膜瘀肉隱澀羞明兩瞼赤爛爐甘石一斤火燒紅黃連湯蘸七次川椒二錢熬成膏爐甘石末用文武火焙乾黃連半兩盆硝三錢銅緑半兩蒲黃半兩豆粉四兩雄黃二錢上件上六味同爐甘石末用蜜羅過研細舌上嚼不磣為度後入腦子一錢南硼砂一錢研細用大豆養之每用少許以骨箸干拈點臥少時忌酒面諸雜魚肉辛熱之物治一切暴痛赤眼疼痛極甚或生翳膜外使點藥內吃此方護命方荊芥蔓荊子薄荷羌活牡丹皮黃芩當歸甘草梔子青葙子大黃決明子麥子獨活牛蒡子牽牛各一分半夏三錢上搗細杵羅為末每服二錢水一鍾先煎令沸方下藥輕攪便瀉出食後臨臥和滓服柴胡湯出朱氏集驗方治眼目暴赤腫痛柴胡蒼朮甘草各等分上為末白水煎如頭疼壯熱則用薑蔥煎已驗救苦丸出保命方治眼赤發痛不可忍者黃連一兩當歸二錢甘草一錢上同銼新水半碗浸一宿慢火熬至一半以綿濾