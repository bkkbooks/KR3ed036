方菖蒲細辛芎藭防風羌活乾薑官桂獨活半夏各一分吳茱萸四銖南椒去子三銖牽牛半兩上先杵牽牛半夏二味自作一處所餘眾藥並作一處杵為細末每服六錢牽牛半夏末二錢眾藥末四錢共作一服熱湯調下和滓吃若不吐如人行一二里更進一服又如人行一里更進一服尚未吐以指頭斡下喉中令吐出涎若不吐即下入胃亦安穩若不吐不下更不可治也風成熱中附論夫內經曰風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄乃為熱中而目黃夫風者陽氣也善行而數變風氣客於胃中內不得通外不得泄蒸鬱於中故謂之熱中陽明之脈起於鼻交額中下循鼻外熱氣循入故令人目黃也方銀液生犀丸出聖濟總錄治風邪蘊積傳為熱中犀角鎊銀箔一錢水銀結砂子牛黃研鬱金竹茹阿膠炙令燥各一分天麻琥珀研人參白茯苓去黑皮防風去叉紫石英研各半兩丹砂研一兩半天竺黃研天南星牛膽一兩龍腦研麝香研各一分上為細末煉蜜丸如雞頭實大每服一丸食後臨臥細嚼人參湯下雄黃散出聖濟總錄治風氣入中蘊積生熱口乾目黃時發潮燥雄黃研半兩丹砂研牛黃研丁香各一分桂去粗皮半兩天麻三分麝香研一兩天南星炮裂三分半夏為末生薑汁作餅曝乾麻黃去節煎去沫焙白殭蠶炒各三分龍腦一分先研如粉入麝香同研次入前三味同研附子炮裂去皮臍乾薑炮大黃銼醋炒各半兩上將十味搗羅為末與別研五味和勻每服半錢加至一錢匕空心夜臥溫酒調下汗出即愈金箔牛黃丸出聖濟總錄治風邪除熱中金箔十片研牛黃研龍腦研各一分犀角鎊琥珀研人參各一分丹砂研水飛過白茯苓去黑皮各二兩天麻白花蛇酒浸去皮骨炙各半兩白附子炮白殭蠶炒一兩甘草炙銼一兩上為末煉蜜和搗一千杵丸如櫻桃大以金箔為衣每服一丸細嚼溫薄荷湯下茶酒亦得常服半丸不拘時人參湯出聖濟總錄治風邪除熱中解煩渴鎮心神人參一兩半蘆薈白朮各半兩藁本去苗土半兩桔梗銼炒半兩白附子炮赤茯苓去黑皮菊花各一兩防風去叉三兩天麻酒浸焙三分龍腦研麝香研各一分上為末以麵糊為丸如梧桐子大每服十五丸食後煎黃耆荊芥湯下牛黃散出聖濟總錄治風熱久不散變成熱中煩渴目黃精神昏暗牛黃研甘草炙銼白附子炮白殭蠶炒犀角鎊羚羊角鎊丹砂研各一分天南星炮半分龍腦研一錢天麻半兩蠍梢三七枚炒上各搗研極細和勻每服一錢匕荊芥湯調下犀角天麻丸出聖濟總錄治風不散傳為熱中犀角鎊天麻酒浸切焙芎藭半夏為末生薑汁作餅焙乾菊花各半兩茯神去木人參羌活去蘆頭阿膠炙令燥丹砂研各一兩甘草炙銼三分上為細末煉蜜丸如皂子大每服一丸食後臨臥細嚼人參湯下遠志湯出聖濟總錄治風摶傷氣郁為熱中除目黃解煩渴遠志去心人參赤茯苓去黑皮犀角鎊桔梗銼炒前胡去蘆頭防風去叉麥門冬去心焙大腹皮黃耆銼各半兩上粗搗篩每服三錢匕水一盞半加一大棗拍碎煎至七分去滓食後溫服日再服內解散出聖濟總錄治風邪入中蘊瘀成熱頭昏目黃心膈注悶柴胡去苗黃芩去黑心葛根銼各一兩黃連去須一分石斛去根一分甘草炙銼一兩二分上為散每服半錢匙用柳枝蜜水調下薄荷蜜水亦得青龍散出宣明論治風邪傳化腹內瘀結而目黃風氣不得泄為熱中煩渴引飲仙靈脾生乾地黃焙防風去叉何首烏去黑皮末泔浸一宿切焙各一分荊芥穗一兩上為末每服一錢至二錢食後沸湯調下日三服
