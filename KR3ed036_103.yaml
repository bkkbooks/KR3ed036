稠膏下蜜三沸便取出上膏丸小豆大每服十丸至十五丸薑湯下小兒丸如麻子大水腫癇諸積快利為度仙術芎散出宣明論方治風熱壅塞頭目昏眩明耳目消痰飲清神川芎連翹黃芩山梔子菊花防風大黃當歸芍藥桔梗藿香葉各半兩蒼朮一兩石膏二兩甘草滑石各三兩荊芥穗薄荷葉縮砂仁各一兩上為末每服三錢水一盞煎至七分去滓溫服食後用細末點服亦得一方無藿香葉有寒水石清氣散出簡易方治風熱壅盛涎潮氣急煩躁不寧身熱作渴恍惚驚悸牛黃石膏各一兩半南星曲二兩大黃煨殭蠶炒去絲嘴粉草炙各半兩硃砂二錢別研腦子三錢別研上為末每服二錢食後新汲水調服清涼丹出簡易方治風熱壅實上攻頭目口眼喎斜語言不正肌肉瞤動面若蟲行一切風熱及治傷寒熱甚狂言昏冒剛痓並皆治之天南星四兩臘月用黃牛膽制者牛黃三兩別研蠍梢去毒炒石膏各一兩半犀角屑防風去蘆甘草炙真珠末白花蛇酒浸取肉硃砂別研大黃各一兩腦子半兩別研上為細末研勻煉蜜丸每兩作十丸每服一丸薄荷湯化下食後臨臥服治風氣取熱涎方出護命方荊芥穗麻黃去根薄荷連翹防風山梔子羌活獨活芍藥木香乾蠍殭蠶去絲各一兩牽牛半兩半夏三銖上細杵羅為末每服二錢食後煎薄荷湯調下和滓吃若是大腑秘熱膠痰滿口喉中咽藥不快者只請去滓吃候風氣少利即和滓吃也若是大腑秘不出後即用大黃一分半夏二銖牽牛一兩半共三味杵羅為細末令作一處每服用上面藥末三錢牽牛等末三錢共計六錢滴熱水和丸如梧桐子大為一服巳午時分用蔥湯下若是大腑不通忽穀道中通糞不得下者即用皂角牽牛二味杵羅為細末盛於筆管內於穀道中吹之剪指甲用指頭就穀道中撥取干糞下也治脾氣虛熱一肝熱有餘胃氣不足虛涎所積聚在胃口風氣一上潮涎並起其狀先聞津液滿口漸次心中潰亂聞有一物上觸咽喉即便噎塞滿悶不覺兩手相亂把拽頭上瘙癢忽風上時忙惶高聲叫啖逡巡仍遂平復此名虛涎無論大人小兒若得此病但大腑虛冷即吃此方若大腑秘熱不請吃此方卻只吃後方也草豆蔻細辛芎藭厚朴去粗皮薑汁炙各半兩防風羌活獨活薏苡仁黃橘皮天南星半夏殭蠶去絲檳榔牽牛肉豆蔻各一分上細杵羅為末煉蜜丸如梧桐子大早朝空心下四十丸食後吃後方大腑熱添牽牛半兩防風荊芥穗麻黃去根羌活獨活乾蠍薄荷連翹半夏三銖殭蠶去絲各一分上細杵羅為末每服一錢食後薄荷湯調下和滓吃治體氣虛弱多患心痛一發作有時不可勝忍忽時發疼痛重即悶絕不醒人事此名病涎多因疾病之後房事不節正氣虛弱脾胃不快滯氣不宣因而涎積致生此病宜服此藥若大腑熱小便赤大腑冷熱不和此涎之所積在肝不可吃熱藥不可吃治氣藥也出護命方當歸芍藥木香殭蠶去絲官桂去皮生使羌活各一分芫花二兩狼毒半兩捶碎用好醋兩碗同芫花土器內煮炒用苦竹箸攪令乾黃黑色不要焦亦不要生牽牛一兩半夏四銖上件修制芫花狼毒二味碎研如飛塵又羅牽牛半夏二味為細末所餘諸藥盡為細末每服六錢芫花狼毒末半錢牽牛半夏末二錢半諸藥三錢共計六錢作一服非時熱湯下和滓吃若未吐如人行一里更進一服尚未吐以指斡喉中吐出涎若不吐即下入胃也若大腑熱服之以疏通為度若轉了身上發熱即宜服此後方若只吐更不須轉也治病涎所積發為氣痛吃前面藥後尚餘心躁通身發熱大腑秘宜吃此藥出護命方荊芥穗羌活木香沉香殭蠶去絲天南星防風連翹牽牛以上各等分上細杵羅為末每食後時以熱湯調下二錢匙治肝心積熱風氣攻上胸中痰實滿口生涎舌上生瘡精神不爽胸中涎溢頭目昏滯大腑秘澀出護命方麻黃去根柴胡去毛羌活防風大黃炮熟荊芥穗芍藥連翹各一分牽牛半夏巴豆各半兩上將牽牛半夏巴豆三味同入瓶子內用濟火煅過放冷取出研為細末同入藥使以上細杵羅為末每服四錢食後薄荷湯調下以上涎病諸家別無方論但世人之病有殘傷性命之急者無甚於痰涎治之不可後時所有涎病根深一一具在藥方中分明雖是體候合得方中所說者病源方可修合進服但方中所論數條只言之大略忽更有非常不測之變更在仿類而求乃病者之幸甚烏犀丸出楊氏家藏方治一切風熱壅滯大便秘澀小便赤黃煩躁喘滿腰腳腫痛兼治腳氣黑牽牛四兩生用皂角一兩不蚛者炙令香刮去皮子細松煙墨半兩燒令煙斷上件為細末麵糊為丸如梧桐子大每服五十丸溫熱水送下臨臥取利一次更量虛實加減芎黃丸出楊氏家藏方治風熱壅盛頭昏目赤大便艱難川芎大黃錦紋者用無灰酒一碗慢火煮令酒盡焙乾各二兩上件為細末煉蜜為丸如梧桐子大每服二十丸溫熟水下食後羚犀散出楊氏家藏方治風熱上攻目赤頭疼口舌生瘡小便赤澀羚羊角屑犀角屑生乾地黃白朮防風去蘆頭人參去蘆頭甘草炙山梔子仁升麻荊芥穗上件各等分㕮咀每服三錢水一大盞生薑竹葉各五片同煎至六分去滓溫服食前空心柴胡防風湯出指南方治風熱柴胡防風梔子甘草桔梗薄荷各等分上為粗末每服五錢水二盞煎一盞去滓服生犀散出楊氏家藏方治一切風熱毒氣攻注遍體生瘡大黃半兩濕紙裹煨令熟山梔子半兩微炒甘草炙當歸去蘆頭連翹防風去蘆頭四味各一兩生犀角二錢半鎊上件併為細末每服二錢溫酒調下食後或因飲酒時每飲一杯入藥半錢瘡瘍本戒酒此反以酒引藥入經絡治病又不壞禁酒也地骨皮散出楊氏家藏方治風熱客於皮膚血脈凝滯身體頭面癮疹生瘡地骨皮三兩半生乾地黃二兩上件為細末每服二錢溫酒調下食後惺惺丸出十便良方治一切風熱煩躁口乾口