body:
  text: 卷五方脈藥性總論藥性總論論曰流變在乎病主治在乎物制用在乎人三者並明然後可以舉七方十劑之法也大小緩急奇偶復是七方也宣通補瀉輕重澀滑燥濕是十劑也是以制方之體欲成七方十劑之用者必本於氣味生成而成方焉其寒熱溫涼四氣者生乎天酸苦辛鹹甘淡六味者成乎地氣味生成而陰陽造化之機存焉是以一物之中氣味兼有一藥之內理性各殊故有形者為之味無形者為之氣若有形以無形治之喘急昏昧乃生無形以有形治之開腸洞泄乃起經所謂陰味出下竅陽氣出上竅王注曰味有質故下流便瀉之竅氣無形故上出呼吸之門故陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味王注曰氣化則精生味化則形長是以有生之人形精為本故地産養形形不足者溫之以氣生産養精精不足者補之以味形精交養充實不虧雖有苛疾弗能為害故溫之以氣者是溫之以肺補之以味者是補之以腎是以惟人為萬物之靈被萬物之養飲和食德以化津液以淫注脈以行之榮衛故經所謂陰之所生本在五味氣味合而服之以補精益氣所以為全生之術故五穀五畜五菜五果苦甘酸鹹辛此為補養之要也何則谷入於口而聚於胃胃為水穀之海喜谷而惡藥藥之所入不若穀氣此又以之先達故制病之法必以穀氣為先是以聖人論真邪之氣者謂汗生於穀不歸於藥石辨死生之候者謂安穀則生失谷則死是五臟皆以胃氣為本以此知五味能養形也雖攻毒邪亦猶之用兵蓋出於不得已也是以聖人發表不遠熱攻裡不遠寒辛甘發散為陽酸苦湧泄為陰故辛散酸收甘緩苦堅咸耎隨五臟之病證施藥性之品味然後及於奇偶大小緩急之制也故奇偶者四方四制之法四制者小大緩急也經謂氣有多少病有盛衰治有緩急方有大小故大小者君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也而又曰奇方云君一臣二君二臣三偶方云君二臣四君二臣六所以立方者四制之法奇偶四制何以明之假令小承氣調胃承氣為奇之小方也大承氣抵當湯為奇之大方也所為因其攻下而用之者如此桂枝麻黃為偶之小方葛根青龍為偶之大方所為因其發而用之者如此經所謂近者奇之遠者偶之身之表者為遠身之裡者為近汗者不以奇下者不以偶不以者不用也故補上制以緩補下制以急急則氣味厚緩則氣味薄故味厚者為陰薄是陰之陽為味不純粹者也故味所厚則泄之味所薄則通氣者也王注曰味厚則泄薄則通氣氣厚者為陽薄者為陽之陰故附子乾薑味大熱為純陽之藥為氣厚者也丁香木香味辛溫薄為陽之陰氣不純粹者也故氣所厚則發熱氣所薄則發泄經曰薄則發泄厚則發熱王注曰陰陽潤下故曰味薄則發發者陽氣炎上故氣厚則發熱味薄為陰少故湧泄氣薄為陽少故汗出是以論氣味之薄厚合奇偶之大小故腎肝在遠數多則其氣緩不能速達於下必大劑而數少取其迅急可以走下也心肺位近數少則其氣急不能發散於上必小劑而數多取其氣叢易散可以補上也王注曰肺服九心服七脾服五肝服三腎服一五臟乃生成之常數也若奇之不效則偶之是謂重方也偶之不去則反佐以取之所謂寒熱溫涼各從其病也王注曰是以聖人反其佐以同其氣令聲氣應合復令寒熱參合使其終異而使其潤燥而散堅剛強必折柔脆自消矣故逆者正治從者反治從少從多觀其事也張仲景曰少陰病下痢而脈微者與白通湯痢不止厥逆無脈並乾嘔煩者用白通加豬膽人尿成注曰若調寒熱之逆冷則必行熱物冷服下胃之後冷體既消熱性便發由是病氣隨愈嘔噦皆除情且不違而治大逆此加人尿豬膽汁鹹苦寒物於白通湯熱劑中要其氣相從可去挌拒之寒也經所謂熱因寒用寒因熱用塞因塞用通因通用必服其所主先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已此之謂也若病所遠而中道氣味之者食而過之無越其制度王注曰假如病在腎而心藥之氣味止於中道須急過之不得漫以腎藥凌之恐心肺益衰與上下遠近相悖是以聖人治上不犯下治下不犯上和中上下俱無犯故經所謂誅罰無過命曰大惑此之謂也有中外不相及則治其主病皆論標本不令失次也故從所來者為本其所受者為標是以內者內調外者外治內者調之不言其治外者治之不言其調經所謂上淫於下所勝平之外淫於內所勝治之此之謂也若從內之外盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內王注曰皆謂先除其根底後削其枝條也是故病發有餘本而標之先治其本故仲景曰傷寒醫下之續得下痢清穀身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯故里不足必先救之清便自調知裡氣已調然後急與桂枝湯以救表是謂病發本而標之先治本後治其標此以寒為本也故知標本者萬舉萬當不知標本者是謂妄行此之謂也雖本草曰上藥一百二十種為君應天中藥一百二十種為臣應人下藥一百二十五種為使應地若治病者特謂此三品之説末也經所謂有毒無毒所治為主適其大小為制也故主病者為之君佐君者為之臣應臣者為之使非上中下三品之謂也王注曰但能破積愈疼解急脫死則為良方非必要以先毒為是後毒乃非有毒為是無毒為非必量病輕重大小之治也帝曰三品何為也岐伯曰所以明善惡之殊貫也是以聖人有毒無毒服自有約故病有新久方有大小有毒無毒宜合常制大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法王注曰法謂前四約也余病不盡後再行之毒之小大如約而止必無太過是以上古聖人謂重身之毒有故無殞衰其大半而止故藥之性味本以藥治疾誠能處以中庸以疾適當且如半而止之亦何疑於致治哉此之謂也故非調氣而得者治之奈何有毒無毒何先何後願聞其道王注曰夫病生其類有四焉一者始因氣動而內有所成為積聚癥瘕瘤氣癭起結核癲癇之類是也二者始因氣動而外有所成謂癰腫瘡瘍痂疥疽痔掉瘛浮腫目赤熛疹胕腫痛癢之類是也三者不因氣動而生病於內為留飲澼食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類是也四者不因氣動而病生於外為瘴氣賊魅蠱毒蜚尸鬼擊沖薄墜墮風寒暑濕斫射刺割捶撲之類是也如此四類者有獨治內而可愈大小承氣陷胸抵當湯三化神祐藏用之類是也有兼治內而愈者大小柴胡通聖洗心涼膈黃連解毒之類是也有獨治外而愈者萬應膏拔毒散點眼藥生肌散之類是也有兼治外而愈者撥雲散苦參散千金內托散之類是也有先治內後治外而愈者熛疹丹毒瘡瘍疹麩瘡之類悉因三焦相火熱甚於內必先疏啓其中清涼苦寒之劑蕩滌臟腑或以砭射敷掃塗抹於外者是也有先治其外後治其內而愈者傷寒刺割破傷皆因風寒之邪從外之內先以發散其外發之不已量其淺深峻泄之有齊毒而攻擊者暴病大小便不利胎死堅積滿脹之類是也復有無毒而調引者痰滯氣痞胃虛脾弱氣不往來以通經利其氣之藥之類是也凡此之類方法所施或勝或復寒者熱之熱者寒之溫者清之散者收之高者抑之燥者潤之急者緩之剛者耎之衰者補之強者泄之堅者削之留者攻之客者除之勞者溫之溫養也結者散之燥者濡之損者溫之溫補也逸者行之勞者動之驚者平之平常也常見常聞上之吐之下之泄之摩之炙之浴之薄之劫之燔針劫刺其下開之發之適可為治各安其氣必清必淨則病氣衰去歸其所宗此治之大體也是以聖人法無定體體變布施藥不執方合宜而用故論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者在新病復起奈何治諸寒而熱者取之以陰熱而寒者取之以陽所謂求其屬也王注曰謂治之而病不衰退反因熱寒而隨生寒熱病之新者也謂其益火之原以消陰翳壯水之主以制陽光故曰求其屬也夫取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行若強腎之陰熱之猶可此論五味所歸五臟寒熱溫涼之主也嗚呼聖人之道久塞而後之人獨不能之也王注曰言少可以貫多舉淺可以料大何法之明也如此故非聖人之道孰能至於是耶是以治病之本須明氣味之厚薄七方十劑之法也方有七劑有十故方不七不足以盡方之變劑不十不足以盡劑之用方不對病非方也劑不蠲疾非劑也七方者大小緩急奇偶復也大方之説有二一則病有兼證而邪不專不可以一二味治之宜君一臣三佐九之類是也二則治腎肝在下而遠者宜分兩多而頓服之是也小方之説有二一則病無兼證邪氣專一可以君一臣二小方治之也二則治心肝在上而近者宜分兩微而頻頻少服之亦為小方之治也緩方之説有五有甘以緩之為緩方者為糖蜜甘草之類取其戀膈也有丸以緩之為緩方者蓋丸之比湯散藥力宣行遲故也有品味群衆之緩方者蓋藥味衆多各不能騁其性也有無毒治病之緩方者蓋藥性無毒則攻自緩也有氣味薄而緩方者藥氣味薄則常補於上比至其下藥力既已衰為補上治上之法也急方之説有四有急病急攻之急方者如腹心暴痛前後閉塞之類是也有急風蕩滌之用急方者謂中風不省口噤之類取劑蕩滌取其易散而施攻速者是也有藥有毒之急方者如上湧下泄奪其病之大勢者是也有氣味厚之急方者藥之氣味厚者直趨於下而力不衰也謂補下治下之法也奇方之説有二有單行之奇方者為獨一物是也有病近而宜用奇方者為君一臣二君二臣三數合於陽也故宜下不宜汗也偶方之説有二有兩味相配而為偶方者蓋兩味相合者是也有病遠而宜用偶方者君二臣四君四臣六數合於陰也故宜汗不宜下復方之説有二有二三方相合之為復方者如桂枝二越婢一湯之類是也有分兩均同之復方者如胃風湯各等分之類是也又曰重復之復二三方相合而用也反復之復謂奇之不去則偶之是也十劑者宣通補瀉輕重澀滑燥濕也宣者謂鬱而不散為壅必宣劑以散之如痞滿不通之類是也本草曰宣可去壅必宣劑以散之如薑橘之屬攻其里則宣者上也泄者下也湧劑則瓜蒂梔豉之類是也發汗通表亦同通者留而不行為滯必通劑以行之如水病痰癖之類是也本草曰通可去滯通草防己之屬攻其滯則通者行也甘遂滑石茯苓芫花大戟牽牛木通之類是也補者不足為弱必補劑以扶之如氣形羸弱之類是也本草曰補可去弱人參羊肉之屬實其里則補養也經所謂言而微終日乃復言者此奪氣也故形不足溫之以氣精不足補之以味是以膏粱理疾藥石蠲疾五穀五畜為能補養也瀉有餘為閉必瀉劑以逐之如腹脹脾約之類是也本草曰瀉可去閉即葶藶大黃之屬經所謂濁氣在上則生䐜脹故氣不施化而鬱不通所以葶藶大黃味苦大寒專能瀉熱去濕下氣仲景曰趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約故約束津液不得四布苦寒之劑通塞潤燥而能瀉胃強也輕者實則氣壅欲其揚也如汗不發而腠密邪勝而中蘊必輕劑以揚之本草曰輕可去實麻黃葛根之屬經所謂邪在皮者汗而發之其實者散而泄之王注曰陽實則發散重者怯則氣浮欲其鎮也如喪神守而驚悸氣上厥而巔疾必重劑以鎮之本草曰重可去怯即磁石鐵粉之屬經所謂厥痰為巔疾故驚乃重之所以鎮涎也故使其體重之物則下涎而用之也澀者滑則氣脫欲其收斂也如開腸洞泄便溺遺失必澀劑以收之本草曰澀可去脫則牡蠣龍骨之屬如寧神寧聖散之類是也滑者澀則氣著欲其利也如便難內閉必滑劑以利之本草曰滑可去著即冬葵榆皮之屬滑能養竅故潤利也燥者濕氣淫勝腫滿脾濕必燥劑以除之本草曰燥可去濕即桑白皮赤小豆之屬所謂濕甚於上以苦吐之以淡泄之是也濕者津耗為枯五臟痿弱榮衛涸流必濕劑以潤之本草曰濕可去枯即紫石英之屬故痿弱者用之王注曰心熱獨盛則火光上炎腎之脈常不行令火盛而上炎用事故腎脈亦隨火炎爍而逆上行也陰氣厥逆火復內炎陰上隔陽下不守位心氣通脈故生痿脈是故樞紐如折去而不相提挈脛筋縱緩而不能任用也可下數百行而愈故此七方十劑者乃太古先師設繩墨而取曲直何叔世方士出規矩以為方圓王注曰人之死者但曰命不謂方士愚昧而殺之是以物各有性以謂物之性有盡也制而用之將使之無盡物之用有窮也變而通之將使之無窮夫惟性無窮用無窮故施於品劑以佐使斯人其功用亦不可一而具也於是有因其性而為用者有因其所勝為制者有氣同則相求者有氣相剋則相制者有氣余而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性竄而引藥蟬之性脫而退翳虻飲血而用以治血鼠善穿而用以治漏所謂因其性而為用者也弩牙速産以機發而不括也杵粳下噎以杵築下也謂因其用而為使者也萍不沉水可以勝濕獨活不搖風可以治風所謂因其所勝而為之制也麻木谷而治風豆水穀而治水所謂氣相同則相求者也牛土畜乳可以止渴疾豕水畜心可以鎮慌惚所謂因其氣相剋則相制也熊肉振羸兔肝明視所謂因其氣有餘補不足也鯉之治水鶩之利水所謂因其氣相感則以意使者也蜂蜜成於蜂蜜溫而蜂寒油本生於麻麻溫而油寒茲同質而異性也蘼蕪生於芎藭蓬虆生於覆盆茲名異而實同者也如此之類不可勝舉故天地賦形不離陰陽形色自然皆有法象毛羽之類生於陽而屬於陰鱗介之類生於陰而屬於陽空青法木色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黑而主腎黃石脂法土色黃而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱明然後可以愈人之疾病不然則如無目夜遊無足登涉動致顛殞而欲愈疾者未之有也醫學發明論云病有逆從治有反治夫曰反治者是明四經各經之病源一經分手足四經內之病證便是八經治法亦然內經曰上下同法此之謂也手少陽三焦之經治法曰通因通用據病題止言手少陽三焦之經便有足少陽膽之經明見脈如箏弦無力如帶之類是也大抵為手足經氣血一般更為所主者同此則上下同法餘三反治仿此不必再解也夫聖人立通因通用之意謂少陽春也生化萬物之始也金石草木羽毛鱗介乃陰陽生化之端也天將興之誰能廢之故國有春分停刑之禁十二經有取決於膽之戒履端於始序則不愆故中風者病之長乃氣血閉而不行此最重病凡治風之藥皆辛溫上通天氣以發散為本始元氣始出地之根蒂也此手足少陽二經之病治有三禁不得發汗為風證多自汗不得下下之則絶其生化之源不得利小便利之則使陽氣下陷反行陰道實可戒也手少陰心之經乃寒因熱用蓋少陰之經真陰也其心為根本是真火也故曰少陰經標寒本熱是內則心火為本外則真陰為標其脈沉細按之洪大鼓甚而盛也心火在內則鼓甚洪大也真陰為標則脈得之沉細寒水之體也故仲景以大承氣湯酒製大黃煎乘熱服之以除標寒用大黃芒硝辛苦大寒之氣味以瀉本熱以此用藥可以為萬世法也足太陽膀胱之經乃熱因寒用且膀胱之本真寒其經老陽也太陽標有陽之名無陽之實謂其將變陰也其脈緊而數按之不鼓而空見外見虛陽而內有真寒也故仲景以薑附湯久久熱煎不溫服而頓服之亦是寒也薑附氣味俱陽加之久久熱煎重陽之熱瀉純陰之寒是治其本也不溫服而寒服以此假寒治太陽標之假陽也故為真假相對之治法也用藥處治者當按其脈之空虛則內伏陰寒之氣外顯熱證然大渴引飲目赤口乾面赤身熱四肢熱之真陽將絶於外則為陰寒所逐而欲先絶其燥欲坐井中也手太陰肺之經乃塞因塞用以歲氣言之主秋主收又況內傷飲食其物有形亦屬於陰也所主內而不出故物塞其中以食藥寒令不行也但脾胃有痞氣仲景治痞有五藥皆用黃連以泄之兼陽之物有形質也皆從陰物乃寒之類亦以大黃枳實陰寒之藥以下泄之舉斯二者是塞因塞用又為寒因寒用可以明知之矣以上四經反治之法為標本相反而不同為病逆而不順也故聖人立急治之法以應之雖然四經以其手足同法乃八經也其病為從治之法反治也正治者以寒治熱以熱治寒直折之也又經云為有陽明厥陰不從乎中也啓玄子注云以厥陰司天中見少陽陽明司天中見太陰當從少陽太陰處治潔古老人云殆不然也四反治中見有少陽太陰二經若舉此是重差也夫厥陰者為生化之源其支在卯二月之分前為陽後為陰陽明者為肅殺之司其支在酉八月之分前為寒水後為燥火且二八月者乃陰陽之門戶為在天地分陽分陰之際內經謂其分則氣異不見病傳之逆順不能立定法故曰疑之間者陽明厥陰也是厥陰陽明之體也至真要大論云兩陽合明故曰陽明在辰巳之間是生化之用也兩陰交盡故曰厥陰在戌亥之間是殞殺之用也其厥陰心包乃包絡十二經之總也經曰中有陽明生殺之本足陽明為水穀之海又經云萬物生於土而終於土是也標本俱陽諸經中皆有之故不能從標亦不能從其本且手陽明喜熱而惡清足陽明喜清而惡熱足厥陰為生化之源宜溫而惡清而手厥陰心包不繫五行是坤元一正之土雖主長生陰靜陽燥稟乎少陽元氣乃能生育也若獨陰不長以此明之是標本俱陰也足厥陰肝亦標本俱陰肝為五臟之一也受膽之氣乃能生長標蒂茅甲於地中其經乃陰之盡也陽明純陽厥陰純陰此二者標本不相及也故以寒治熱以熱治寒正治之法也當臨病斟酌若熱病以寒治寒病以熱治故曰從其中也今明正治假令手陽明有餘足陽明不足當以熱治寒若足陽明有餘手陽明不足當以寒治熱故曰以寒治熱以熱治寒謂就正治言之從中者以從合宜酌中處用藥也手足厥陰二經以此通而算之是手足周身十二經反正之治法也濟生拔粹云宣可以去壅薑橘之屬是也此大略言之蓋外感六經之邪欲傳入里三陰尚實而不受逆邪氣干胸中窒塞不通而或噦或嘔所謂壅也仲景云嘔多雖有陽明證不可攻之況乾噦者乎故單用生薑宣散必愈若嘔者有聲而有物邪在胃系未深入胃中以生薑橘皮治之或以藿香丁香半夏枳殼之類投之必愈此天分氣分虛無處一無所受今乃窒在仲景謂膈之上屬上焦於表或有形質之物因而越之則可若氣壅則不可用破氣藥也辛瀉氣越之者吐也亦無下之理若陰虛噦氣逆上窒塞嘔噦不定之病此地道不通也正當用生地黃當歸桃仁紅花之類和血涼血潤血兼用甘藥以補其氣微加大黃芒硝以通其閉大便利邪氣去則氣逆嘔噦自不見矣復有胃中虛熱穀氣久虛發而為嘔噦者但得五穀之陰以和之五穀皆屬陰或食或飲白湯皆止嘔噦則嘔噦自止且如小兒斑後餘熱不退痂不收斂大便不行是謂血燥則當以陰藥治血因而補之用清涼飲子通利大便而瀉其熱也潔古云涼風至而草木實夫清涼飲子乃秋風徹熱之劑傷寒家邪入於裡日晡潮熱大渴引飲譫語燥狂不大便是謂胃實乃可攻之夫胃氣為濕熱所傷以承氣湯瀉其土實元氣乃得周流承氣之名於此見矣今衰世人以苦寒瀉火故備陳之除熱瀉火非甘寒不可以苦寒瀉火非徒無益而反害之故諄諄及此至如孫真人言生薑嘔家之聖藥謂上焦氣壅表實而言之非以瀉氣而言之也若脾胃虛弱穀氣不行榮衛下流清氣不上胸中閉塞惟益氣推揚穀氣而已不宜瀉也若妄以瀉氣瀉血下之則轉增閉塞疼痛或變作結胸復不緩下其膈由此至危者多矣針經説呵欠噦唏振塞噫嚏嚲涕淚出太息涎下耳中鳴自齧舌頰唇視主病者補之此十二邪者皆奇邪之走空竅者也凡邪之所在皆為不足宜補而不宜瀉空竅者胃之清氣能通也胃既虛則谷不上行是氣路不利經云廉泉玉英者津液之道路也津液不上胸中氣路不開亦令人噦勿作外實以辛藥生薑之類瀉其壅滯蓋肺氣已虛而反瀉之是重瀉其氣必胸中如刀劙之痛與正結胸無異亦聲聞於外用藥之際可不慎哉通可以去滯通草防己之屬是也防己大苦寒能瀉血中大熱之滯也亦能瀉大便與大黃氣味同者皆可瀉血滯豈止防己而已通草甘淡能助西方秋氣下降利小便專瀉氣滯也小便氣化苦熱絶津液之源於肺經源絶則寒水斷流故膀胱受濕熱津液癃閉約縮小便不通宜以此治之其脈右寸洪弦而數左尺亦然其證胸中煩熱口燥舌乾咽嗌亦干大渴引飲小便淋瀝或閉塞不通脛酸腳熱此通草主之凡與通草同者茯苓澤瀉燈草豬苓琥珀瞿麥車前子之類皆可以滲泄利其滯也此雖泄氣滯小便不利於肺中有所未盡爾豫昔寓長安有王善夫病小便不通漸成中滿腹大堅硬如石壅塞之極腳腿堅脹破裂出黃水雙睛凸出晝夜不得眠飲食不下痛苦不可名狀其親戚輩求治病人始病不渴近添嘔噦所服治中滿利小便之藥甚多素問云無陽者陰無以生無陰者陽無以化膀胱津液之府氣化乃能出矣此病小便癃閉是無陰陽氣不化者也凡利小便之藥皆淡味滲泄為陽止是氣藥謂稟西方燥金之化自更隆也是陽中之陰非北方寒水陰中之陰所化者也此蓋奉養太過膏粱積熱損北方之陰腎水不足膀胱腎之室久而乾涸小便不化火又逆上而為嘔噦非膈上所生也獨為關非膈病也潔古曰熱在下焦填塞不便是治關格之法今病者內關外格之證悉具死在旦夕但治下焦乃可愈遂處以稟北方之寒水所化大苦寒氣味者黃柏知母各二兩酒洗之以肉桂為之引用所謂寒因熱用者也同為極細末煎熱水為丸如梧桐子大焙乾空腹令以沸湯下二百丸少時乘熱藥之須臾如刀刺前陰火燒之痛溺如暴泉湧出臥具盡濕床下成流顧盼之間腫脹消散故因記之或曰防己之性若何曰防己大苦寒能泄血中之濕熱通血中之滯塞補陰瀉陽助秋冬瀉春夏藥也比之於人則險而健者也險健小人幸災樂禍遇風塵之警則首為亂階然而見善亦喜逢惡亦怒如善用之亦可以敵凶暴之人保險固之地此瞑眩之藥聖人有所存而不廢耳大抵聞其臭則可惡下咽則令人身心為之煩亂飲食為之減少至於十二經有濕熱壅塞不通及治下疰腳氣除膀胱積熱而庇其基本非此藥不可其行經之仙藥無可代之者復有不可用者數事若遇飲食勞倦陰虛生內熱元氣穀氣已虧之病以防己泄大便則重亡其血此不可用一也如大渴人引飲是熱在上焦肺經氣分宜淡滲之此不可用二也若人久病津液不行上焦虛渴補以人參葛根之甘溫用苦寒之劑則速危此不可用三也若下有濕熱流入十二經致二陰不通然後可審而用之耳補可以去弱人參羊肉之屬是也夫人參之甘溫能補氣之虛羊肉之甘熱能補血之虛羊肉有形之物也能補有形肌肉人氣凡氣味與人參羊肉同者皆可以補之故云屬也人參補氣羊肉補形氣血者有無之象也以大言之具天地兩儀者也以小言之則人之陰陽氣血也以之養生則莫重於斯以天地物類論之則形者坤土也人之脾胃也乃生長萬物也地欲靜靜則萬物安坤元一正之土亙古不遷者也耕種之土乃五行運用者也動之有時春耕是也若冬時動之令天氣閉藏者泄地氣凝聚者散精氣竭絶萬化不安亦如人之勞役形體則大病生焉故曰不妄作勞則明當靜之時若勞役妄作則百脈爭張血脈沸騰精氣竭絶則九竅閉塞衛氣散解夫以人參甘草之類治其已病曷若救其未病為拔本塞源之計哉內經云志間少欲飲食有節起居有常減其思慮省語養氣庶幾於道何病之有如或不慎病形已彰若能調其脾胃使營氣旺清氣上升則四臟各得其所以氣論之天地人三焦之氣各異損其肺者益其氣損其脾者調其飲食適其寒溫黃耆之甘溫能補皮毛之氣人參之甘溫能補肺之氣甘草之甘平能補脾胃之中經絡之氣肺主諸氣氣旺則精自生形自盛血氣以平故曰陽生則陰長此之謂也血不自生須得生陽氣之藥血自旺矣是陽主生也若陰虛單補血血無由而生無陽故也仲景以人參為補血藥其以此與乃補氣補血之大略也瀉可以去閉葶藶大黃之屬是也此二味皆大苦寒葶藶氣味俱厚不減大黃又性過於諸藥以瀉陽分肺中之閉也亦能瀉大便為體輕象陽故也大黃之苦寒能走而不守瀉血閉也血閉者謂胃中壅積有形之物閉塞者也陽明病胃家實是也日晡潮熱大渴躁有形之熱故瀉其大便使通和汗出而愈矣一則治血病瀉大便一則瀉氣閉利小便若經絡中及毛分肉間但有疼痛一概用牽牛大黃下之乖戾甚矣通則不痛痛則不通痛隨利減當通其經絡則疼痛去矣如輕可以去實麻黃葛根之屬是也謂如頭痛當以細辛川芎之類通之則無所凝滯即痛隨利減也臂痛有六道經絡究其痛在何經絡之閉以行本經行其氣血氣血通利則愈矣若表上諸疼痛便下之則不可當詳細而辨之也輕可以去實麻黃葛根之屬是也夫六淫有餘之邪客於陽分皮毛之間腠理閉拒謂之實也實者謂榮氣不行之謂也宜以輕利開腠理致津液通氣也皮毛經絡寒邪之實去矣故二藥之體輕清成象象氣之輕浮也寒邪為實輕可以去之若大同而小異蓋麻黃微苦為陰之陽可入足太陽寒水之經其經皆下行本寒而又受外寒汗出乃愈當以發之葛根味甘溫可以發足陽明燥火之經身以前所受寒也非正發汗之藥謂陽明禁發汗利小便但解去經絡肌肉間寒邪其氣和汗自出矣麻黃專發汗去皮毛氣分寒邪葛根和解血分寒邪乃一陰一陽能瀉表實不能瀉裡實若飲食勞倦雜病自汗表虛之證認作有餘便用麻黃髮之汗大出則表益虛此蓋不知表虛宜補其亡陽其自汗秋冬用桂枝春夏用黃耆代之黃耆者能治虛勞自汗陽明胃主自汗小便數若以人參甘草之類補之脾胃實則衛氣行衛氣行則表自實表既實自汗何由而出清氣上行雖飧泄亦止矣此治其本也葛根雖為和解之藥亦不可用用之則重虛其表仲景所論內外不足自汗之證大禁發汗利小便若已經發汗寒邪未去雖發汗數多不可禁也寒邪已出重發其汗則脫人元氣若多汗小便赤澀不得利小便為汗奪津液故也汗家不得重發汗小便多不得重利小便聖人所以切禁此者為津液乃氣血之基本也一云亡陽一云脫血病人重發汗重利小便必脫六氣七神無依則必危困辨麻黃葛根之宜禁故兼及之用藥偏勝論天有四時春為始聖人作經謂之履端蓋履端於始序則不愆以時令考之生氣既至萬物萌動一有舛錯則物為暴陵人為夭傷故肅殺之令行於發生之月此養生之大禁也在人之身亦有四時焉和氣為養生之本凡聖經所載寒藥必燥熱之病乃可用之不當以時令為限也今人不問膏粱貴族及閭巷細民一切用寒涼藥以自戕伐不知庸醫誰倡此論至謂病字疾腳下加丙火也病無不熱然則疾字乃疾腳下加矢凡有疾者豈皆中箭乎此尤可笑者豫細為辨之夫寒物寒藥其性皆稟北方寒水之化而生蓋冬月寒氣盛主萬物悉皆殞絶而不見其為肅殺可知矣寒物寒藥既稟此化而生施之於人非肅殺之令乎況寒涼之劑入腹周身之火得水而升走陰燥之極欲坐井中陽已先亡醫猶不悟復指為熱重以寒藥投之其死也何疑焉與夫春初服宣藥欲疏以導三冬積熱不知月令有云二月之氣萌芽始發陽氣所養物乃條暢今反以寒藥行肅殺之令百穀草木方欲甲坼重為霜雪抑遏之雖欲發現其可得乎內經云春三月此謂發陳天地俱生萬物以榮大概謂人順春令當生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也即此觀之陽生陰殺久則與之俱化自取危亡信矣豈惟寒哉熱亦如之經云一陰一陽謂之道偏陰偏陽謂之疾聖濟經曰陽劑剛勝積熱燎原為消狂癰疽之屬則天癸竭而榮涸陰劑柔勝積若凝水為洞泄寒中之屬則真火微而衛散故大寒大熱之藥當從權用之以氣平而止如執而有所偏助令臟氣不平嗚呼死生之機捷若影響殆不可忽治寒以溫治熱以涼但中病即止矯枉則過正也蓋涼藥頻施必至於疲耎沉冷溫藥頻施必至於煩燥悶熱所貴酌量權度一毫無過用焉是為活法牽牛非神農藥也本草名醫續注云味苦寒能除濕利小便治下注腳氣此説氣味主治俱誤矣何以明之凡藥用牽牛者少則動大便多則泄下如水乃瀉氣之藥試取嘗之便得辛辣之味久而嚼之猛烈雄壯漸漸不絶非辛而何續注味苦寒果安在哉苦以為濕家瀉藥尤不知其的也何則能瀉氣中之濕熱不能除血中之濕熱況濕從下受之下焦主血是血中之濕宜苦寒之味今反以辛藥瀉之其傷必矣夫濕者地之別名有形者也若肺先受濕則宜用之或有濕無濕但傷食或動大便或有熱證或只常服克化之藥但用牽牛豈不誤哉殊不知牽牛辛烈瀉人元氣比之諸辛藥尤甚以辛之雄烈故也經云辛泄氣辛走氣辛瀉肺氣肺病者無多食辛況飲食失節勞役所傷是胃氣不行心火乘之腸胃受火邪名曰熱中經云脾胃主血當血中瀉火潤燥補血瀉胃經之濕熱及胸中熱是肺受火邪以黃芩之苦寒抑之以當歸之辛溫和血以生地黃苦寒涼血益血少加紅花之辛溫以瀉血絡以桃仁之辛溫油膩之藥除燥潤大便然猶不可專用須於補中益氣湯瀉陰火之藥內兼而用之何則上焦元氣已自虛弱若反用牽牛大辛辣氣味俱陽之藥以瀉水瀉氣可乎津液已不足口燥舌乾而重瀉其津液利其小便元氣傷竭致陰火愈甚今重為備言之牽牛感南政熱火之化所生者也血熱瀉氣差誤太甚若病濕勝濕氣不得施化致大小便不通則宜用之耳濕去則氣周流所謂五臟有邪更相平也經云一臟未平以所勝平之火能平金而泄肺者此之謂也近代錢氏瀉黃散中獨用防風比之餘藥過於兩倍者以防風辛溫令於土中瀉金不助濕者也經云從前來者為實邪謂子能令母實實則瀉其子此之謂以所勝者平之也古人有云牽牛不可耽嗜則脫人元氣經云秋不食薑令人瀉氣故夏月食薑不禁為氣正王之時夏宜以汗散火令其以汗出越其熱故秋月則禁之朱晦庵語録中有戒秋食薑則夭人天命戒之深也薑尚如此況牽牛乎故不可一概用之耳張仲景治七種濕證小便不利無一藥犯牽牛者仲景豈不知牽牛能瀉濕利小便為濕病之根在下焦是血分中氣病不可用辛辣氣藥瀉上焦太陰之氣故也仲景尚不敢輕用如此世醫一概用之可乎六經藥性防風甘純陽太陽經本藥身去上風梢去下風與乾薑藜蘆白蘞芫花相反芎藭辛純陽少陽經本藥治頭眩頭痛細辛辛純陽主少陰苦頭痛白芷辛純陽陽明經本藥兼治太陽陽明頭痛黃芩苦陰中微陽酒炒上頸主上部積血東垣曰泄肺火而解肌熱肺苦氣逆急食苦以泄之甘草生甘平炙甘溫純陽補血養胃梢去腎經之痛與遠志大戟芫花甘遂海藻相反當歸甘辛陽中微陰頭破血身行血尾止血治上酒浸治下酒洗糖色能潤腸與蒲黃海藻相反連翹苦辛陰中微陽諸客熱非此不能除又治手足少陽瘡瘻癰腫黃連苦純陽泄心火心下痞酒炒酒浸上頸以上與芫花菊花殭蠶款冬花相反蒼朮甘苦陽中微陰諸腫濕非此不能除足陽明太陰藥能健胃安脾羌活甘苦純陽太陽頸頭痛諸骨節疼痛非此不能除亦能溫膽太陽風藥也白朮苦甘溫陽中微陰脾苦濕急食苦以燥之利腰臍間血與蒼朮同用海云蒼白有止發之異生地黃甘寒陰中微陽涼血補血不足治頸以上酒浸惡貝母與蕪荑相反白芍藥甘酸陰中之陽白補赤散瀉肝補脾胃酒浸行經止中部腹痛與石斛硝石相反人參甘苦陽中微陰養血補胃氣瀉心火喘嗽勿用之短氣用之與藜蘆相反柴胡苦陰中之陽去往來寒熱膽痹非柴胡梢子不能除與皂莢藜蘆相反少陽厥陰行經藥也黃耆甘純陽益胃氣去肌熱止自汗諸痛用之與鱉甲相反葛根甘純陽止渴升陽解酒毒陽明經之本藥也澤瀉咸陰中微陽滲泄止渴泄伏水升麻甘苦陽中微陰主脾胃解肌肉間熱脾痹非升麻稍不能除手足陽明傷風引用之的藥也半夏苦辛陰中之陽除痰涎胸中寒痰治太陽痰厥頭痛與羊血鱉甲皂莢雄黃相反桔梗辛苦陽中之陰療咽喉痛利肺氣治鼻塞為舟楫之劑與草龍膽相反蔓荊子苦辛陰中之陽涼諸經血止頭痛主目睛內痛與石膏相反枳殼苦酸陰中微陽破氣泄肺中不利之氣枳實苦酸純陰去胃中濕熱消心下痛痞厚朴苦陰中之陽去腹脹厚腸胃梔子苦純陰去心中懊憹躁煩橘皮苦辛陰中之陽利肺氣有白則補無則瀉脾活絡治噦五味子酸陰中微陽治嗽補真氣與葳蕤烏頭相反知母苦陰中微陽涼腎經本藥上頸行經用酒炒乾薑辛純陽經曰寒淫所盛以辛散之見火後稍苦故止而不走也麻黃苦甘陰中之陽泄衛中實去榮中寒發太陽少陰之汗入手太陰藁本苦辛陽中微陰太陽經本藥治巔頂腦痛齒痛與葙子相反地榆甘酸苦陽中之陰微補治下部有血與麥門冬相反大黃苦純陰熱淫所盛以苦泄之酒浸入太陽經酒洗入陽明經其餘經不用酒其性走而不守獨活甘苦陰中之陽頭眩目暈非此不能除足少陰經藥吳茱萸辛陽中微陰溫中下氣腹痛溫胃與丹參硝石五石英相反郁李仁苦辛陰中之陽破血潤燥豉苦鹹純陰去心中懊憹傷寒頭痛煩躁黃柏苦辛陰中之陽治腎水膀胱不足諸痿厥腰膝無力防己辛苦陽中之陰泄濕氣與細辛相反川烏頭辛純陽去寒濕風痹血痹行經與半夏栝蔞相反與附子相同瞿麥辛陽中微陰利小便為君黍黏子辛純陽潤肺散氣主風毒腫利咽膈白豆蔻辛純陽散肺中滯氣主積冷止吐逆反胃消穀進飲食麥門冬甘陽中微陰治肺中伏火生脈保神強陰益精與苦參相反茯苓甘淡純陽滲泄止渴伐腎邪小便多則能止之澀則能利之白入辛壬癸赤入丙與白蘞地榆相反熟地黃甘苦陰中微陽大補血虛不足通血脈益氣力忌蘿蔔阿膠甘純陰補虛安胎止痛蘇木甘鹹陽中之陰破死血及血脹欲死者豬苓甘苦陽中之陰滲泄止渴又治淋腫肉桂甘苦純陽太陽本藥去胃中風藥秋冬下部腹冷非此不能除之湯液發汗用桂枝補腎內用肉桂忌生蔥草龍膽苦純陽瀉肝熱止眼睛疼酒浸上行木香辛純陽和胃氣療中下焦氣結滯刺痛須用檳榔為使石膏辛甘陰中之陽止陽明頭痛止消渴中暑潮熱甘遂甘純陽水結胸中非此不能除與甘草相反天南星苦與半夏同金鈴子酸苦陰中之陽心暴痛非此不能除神麯辛純陽益胃氣紅藍花苦陰中微陽入心養血又治血運惡血不盡絞痛地骨皮苦純陰涼骨熱酒浸解骨蒸非此不能除栝蔞根苦純陰心中苦渴非此不能除與乾薑牛膝相反秦艽苦陰中微陽治陽明經風濕痹仍治口瘡毒通草甘純陽瀉肺利小便通陰竅澀牡丹皮苦辛陰中微陽涼骨蒸又治腸胃積血衄血吐血手厥陰足少陰藥治無汗骨蒸也地骨皮苦手少陽足少陰藥治有汗骨蒸也琥珀甘純陽利小便清肺火消瘀血安魂魄薑黃辛牡蠣酸耎痞積又治帶下溫瘧瘡腫為軟堅收澀之劑梧桐淚咸瘰癧非此不能除草豆蔻辛純陽益脾胃去寒又治寒心胃痛巴豆辛純陽去胃中濕破癥瘕結聚斬關奪門之將不可輕用茯神甘純陽風眩心虛非此不能除蜀葵花咸陰中微陽治帶下赤治赤白治白檳榔辛純陽破氣滯泄胸中至高之氣苦參辛純陽氣沉去濕與菟絲子相反藿香甘苦純陽微陰補衛氣益胃氣進飲食又治吐逆霍亂青皮苦辛酸陰中之陽主氣滯破積結少陽經下藥也陳皮治高青皮治低甘菊花苦純陰養目血茵陳蒿苦甘陰中微陽治傷寒散黃丁香辛純陽去胃中之實治腎氣奔豚痛大棗甘純陽溫胃天門冬甘苦陽中之陰保肺氣治血熱侵肺上喘氣促生薑辛純陽益脾胃散風寒鬱金辛苦陰中微陽涼心京三稜苦甘陰中之陽破氣瀉真氣主老痹瘕氣結塊血脈不通氣虛不用高良薑辛純陽溫通脾胃款冬花辛純陽溫脾止嗽香附子甘苦陽中之陰快氣黑附子辛純陽治脾中大實腎中寒甚通行諸經與防風相反白芨苦甘陽中之陰止肺澀白蘞同蜀漆辛純陽破血射干苦甘陽中之陰去胃中癰瘡威靈仙甘純陽去風去大腸之風通十二經絡馬兜鈴苦陰中微陽利小便主肺熱安肺氣補肺燈草甘純陽利小便葫蘆巴苦純陽治元氣虛冷及腎虛冷白附子辛苦純陽溫中血痹行藥力主中風失音乃行而不止者也槐花苦純陰涼大腸之熱槐實苦同上沉香甘純陽補腎又能去惡氣調中東垣曰能養諸氣上而治天下而及泉與藥為使檀香甘苦陽中微陰主心腹霍亂中惡引胃氣上升進食乳香甘純陽定驚止痛川楝子甘純陽入心主上下部腹痛竹葉苦甘陰中微陽涼心經山茱萸酸陰中之陽溫肝又能強陰益精經云滑則氣脫澀則可以收之山茱萸之澀以收其滑蜀椒辛純陽明目又溫中止精泄硃砂苦純陰涼心熱非此不能除龍骨甘純陽固大腸脫赤石脂甘鹹陽中之陰固脫白石脂同芎藭辛純陽散諸經之風茜根苦陰中微陽去諸死血艾葉苦陰中之陽溫胃王不留行苦甘陽中之陰導引利主治瘡瘍苦寒以為君黃芩去心黃連去須黃柏去皮知母去須生地黃但用酒洗過用之以酒熱為因也甘寒以為佐黃耆人參甘草大辛以解結為臣結者散也連翹當歸去蘆藁本通經以為使手足三陽手走頭而頭走足手足三陰足走腹而腹走手足太陽膀胱經羌活藁本足少陽膽經柴胡足陽明胃經升麻葛根白芷足太陰脾經芍藥白者補赤破血足少陰腎經獨活桂足厥陰肝經柴胡手太陽小腸經羌活藁本手少陽三焦經柴胡手陽明大腸經白芷手太陰肺經白芷升麻蔥白亦能走經手少陰心經獨活手厥陰心包經柴胡辛溫和血去惡血當歸梢蘇木紅花牡丹皮專治胃流血凝血必先歲氣無伐天和春防風升麻夏黃芩知母白芍藥秋澤瀉茯苓冬桂桂枝補胃實胃進飲食橘皮人參甘草內實內熱者黃芩黃柏知母表虛表寒者黃耆人參桂枝內發在外氣虛氣弱者陳皮黃耆人參入脾氣實氣結者青皮厚朴木香沉香血虛者生地黃當歸身血實惡血積聚者當歸梢蘇木紅花散陰瘡之結聚排膿者肉桂入心引血化汗化膿出瘡毒消瘡腫黍黏子用半生半熟解表裡一名大力子牛蒡子惡實子瘡出膈以上須用防風上節羌活桔梗此一味為舟楫使諸藥不能下沉瘡出身中以下須用酒水各半盞煎瘡出堅而不潰者昆布王瓜根廣朮京三稜瘡痛甚者加用黃芩黃連黃柏知母上二經中但有瘡皆血結氣聚必用連翹瘡發而渴者加葛根瘡出而嘔吐者半夏薑屑瘡出而渴悶者黃連瘡出而飲水者澤瀉茯苓瘡出而大便不通者煨大黃大便結燥而難得者桃仁麻子仁郁李仁中焦有瘡須用黃連酒洗下焦有瘡須用黃柏知母防風俱酒洗先有燥熱而病瘡者蓋腎水受邪當補腎水之不足用黃柏知母因酒過多瘡者當除膀胱留熱用澤瀉防風尾瀉腎火補下焦元氣生甘草梢子補三焦元氣調和諸藥共力成功者炙甘草馬刀挾癭須用昆布王瓜根草龍膽馬刀未破而堅者須用廣朮京三稜地之濕氣濕寒傷之外郁壅絡不行外有大寒濕之邪而內必生大熱當以辛溫之藥及行本經藥通其皮毛壅滯內則苦寒之劑瀉其熱氣之不從是其治也病在上為天制度宜酒炒酒洗煎藥宜武宜清服之宜緩飲病在下為地煎藥宜文宜濃服之宜急飲去咽嗌近者奇之遠者偶之汗不可奇下不可偶補上治上緩緩者氣味薄能達其表劑小服而頻食後使氣味能達表達表上故曰治肺者九蓋服少而頻者也肺氣石膏辛血黃芩苦腎氣知母血黃柏地骨皮瀉腎火總治熱在外地為陰骨為里皮為表牡丹皮治包絡火無汗而骨蒸四物內加上二味治婦人骨蒸知母瀉腎火治熱在內有汗而骨蒸論用藥上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人有毒無毒斟酌其宜欲遏病補虛羸者本中經下藥一百二十五種為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度每一度應一日以成一歲倍其數合七百三十名也凡藥君臣佐使以相宣攝合和者宜合用一君二臣三佐四使又可一君三臣九佐使也又有陰陽配合子母兄弟根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和之時用意審視當用相須相使者良勿用相惡相反者有毒宜治可用相畏相殺者不爾勿合用也又有酸鹹甘苦辛五味又有寒熱涼溫四氣及有毒無毒陰乾曝乾採造時月生熟土地所出真偽陳新並各有法其相使相畏也請列之如下處方之日宜深究之上一百九十七種有相制使其餘皆無故不備録或曰古人用藥至少分兩亦輕瘥病極多觀君處方非不煩重分兩亦多而瘥病不及古人者何也答曰古者日月長遠藥在土中自養經久氣味真實百姓少欲稟氣中和感病輕微易為醫療今時日月短促藥力輕虛人多巧詐感病厚重難以為醫病輕用藥須少病重用藥即多此則醫之一隅何足怪也又古之醫者自解採取陰乾曝乾皆悉如法用藥必依土地所以治十得九今之醫者但診脈處方不悉採藥時節至於出處土地新陳虛實一皆不悉所以治十不得五六者實由於此夫處方者常須加意重復用藥藥乃用力若學古人徒自誤耳方來學者須詳熟之凡紫石英白石英硃砂雄黃硫黃等皆須光明映徹肌理鮮淨者為佳不然令人身體乾燥發熱口乾而死凡草石藥皆須土地堅實氣味濃烈不爾治病不愈凡狼毒枳實橘皮半夏麻黃吳茱萸皆欲得陳久者良其餘惟須精新也論合和問曰凡合和湯藥治諸草石蟲獸用水升數消殺之法則云何答曰凡草有根莖枝葉皮骨花實諸蟲有毛翅皮甲頭足尾骨之屬有須燒煉炮炙生熟有定一如後法順之者福逆之者殃或須皮去肉或須肉去皮或須莖根或須花實依方煉治極令淨潔然後升合稱兩勿令參差藥有相生相殺氣力有強有弱君臣相理佐使相持若不廣通諸經則不知有惡有好或醫自以意加減不依方法使諸草石強弱相欺入人腹中不能治病更加鬥爭草石相反使人迷亂力甚如刀劍若調和得所雖未能治病猶得安利五臟於病無所增劇例曰諸經方用藥所有熬煉節度皆腳注之今方則不然於此篇具條之更不煩方下別注也凡藥治擇熬炮訖然後稱之以充用不得生稱凡用石藥及玉皆碎如米粒綿裹內湯酒中凡鍾乳等諸石以玉槌水研三日三夜漂煉務令極細凡銀屑以水銀和成泥以礬石赤泥團之入火半日乃熟可用仍不得過之不煉生入藥使人破心肝凡朴硝礬石燒令汁盡乃入丸散芒硝朴硝皆絞湯訖內汁中更上火兩三沸煬盡乃服凡湯用丹砂雄黃者熟末如粉臨取內湯中攪令調和服之凡湯中用完物皆擘破干棗梔子之類是也用細核物亦打碎山茱萸五味子蕤仁核決明子之類是也細花子物正爾完用之旋覆花菊花膚子葵子之類是也米麥豆輩亦完用之凡橘皮吳茱萸椒等入湯不㕮咀凡諸果實仁皆去尖及雙仁者湯揉撻去皮仍切之用梔子者去皮用蒲黃者煮湯成下凡生麥門冬生薑入湯皆切三搗三絞取汁湯成去滓下之煮五六沸依如升數不可共藥煮之一法薄切用凡麥門冬皆微潤抽去心凡麻黃去節先別煮兩三沸掠去沫更益水如本數乃內余藥不爾令人煩寸斬之小草瞿麥五分斬之細辛白前三分斬之其中細銼也凡牛膝石斛等入湯酒拍碎用之石斛入丸散先以砧捶極打令碎乃入臼不爾搗不熟入酒亦然凡桂厚朴杜仲秦皮木蘭輩皆削去上虛軟甲錯取里有味者稱之茯苓豬苓削去黑皮牡丹巴戟天遠志野葛等皆捶破去心紫菀洗去土曝乾乃稱之薤白蔥白除青令盡並草石南茵芋澤蘭剔取葉及嫩莖去大枝鬼臼黃連皆除根毛石葦辛夷拭去毛辛夷又去心蜀椒去閉口者及目用大棗烏梅皆用去核鬼箭削去羽取皮凡茯苓芍藥補藥須白者瀉藥宜赤者凡菟絲子暖湯汰去沙土干漉暖酒漬經一宿漉出曝微白搗之不盡者更以酒漬經三五日乃出更曬微干搗之須臾悉盡極易碎凡用甘草厚朴枳實石南茵芋藜蘆皂莢之類皆炙之而枳實去穰藜蘆去頭皂莢去皮子凡用椒實微熬令汗出則有勢力凡湯丸用天雄附子烏頭烏喙側子皆煻灰炮令微坼削去黑皮乃稱之惟薑附湯及膏酒中生用生亦須削去皮乃稱之直破作七八片凡半夏熱湯洗去上滑一云十洗四破乃稱之以入湯若膏酒丸散皆煻灰炮之凡巴豆去皮心膜熬令紫色桃仁杏仁葶藶胡麻諸有脂膏藥皆熬黃黑別搗令如膏脂必視泯泯爾乃已成散稍稍下臼中合研搗令消散乃復都以輕絹篩之須盡又內臼中依法搗數百杵也湯膏中雖有生用者並搗破凡用麥糵曲米大豆黃卷澤蘭蕪荑皆後炒乾漆炒令煙斷用烏梅入丸散者熬之用熟艾者先炒細擘合諸藥搗令細散不可篩者內散中和之凡用諸毛羽齒牙蹄甲龜鱉鮫鯉等甲皮肉骨角筋鹿茸等皆炙之蛇蛻乃微炙凡用斑蝥等諸蟲皆去足翅微熬用桑螵蛸中破炙之牡蠣熬令黃色殭蠶蜂房微炒之凡湯中用麝香犀角鹿角羚角羊角牛黃須末如粉臨服內湯中攪令調和服之凡丸散用膠先炙使通體沸起燥乃可搗有不沸處更炙之斷下湯直爾用之勿炙諸湯中用阿膠皆絞湯畢內汁中更上火兩三沸令煬凡用蜜先火煎掠去沫令色微黃則丸經久不壞掠之多少隨蜜精粗遂至大稠於丸彌佳凡丸中用蠟煬投少蜜中攪調以和藥丸湯中用飴糖皆湯成下諸藥用酒者皆臨熟下之凡藥有宜丸者宜散者宜湯者宜酒漬者宜膏煎者亦有一物兼宜者亦有不入湯酒者並隨藥性不得違之古稱惟有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩十六兩為一斤此則神農之稱也吳人以二兩為一兩隋人以三兩為一兩今依四分為一兩稱為定方家凡云等分者皆是丸散隨病輕重所須多少無定銖兩三種五種皆悉分兩同等耳凡看古方類例最是朝代沿革升合分兩差殊數味皆用分兩不足較也第中間有用升合枚數大概不同升斗稱尺本自積黍自不可見度量衡卒亦難明今以錢譜推測粗定梗概凡度者分寸尺丈引本以一黍之廣為分十分為寸十寸為尺十尺為丈十丈為引觀今之尺數等不同如周尺八尺京尺長一尺六寸淮尺長一尺二寸約尺長一尺二寸五分並一小尺為率小尺既自三微起卻自可準唐武德年鑄開元錢八分當十二錢半得一尺排錢比之十二個已及一尺又不知唐用尺顧漢唐籥量並用尺寸分布尺寸如是不齊將何憑據博古君子必有説矣凡量者籥合升斗斛本以黃鐘籥容十二銖合籥為合重二十四銖今以錢準則六銖錢四個比開元錢三個重升斗斛皆疊而成數漢唐同用至宋紹興升容千二百銖則古文六銖錢二百個開元二百二十個以紹興一升得漢五升其餘移用不足計也凡衡者銖兩斤鈞石亦以黃鐘籥所容重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石每兩則古文六銖錢四個開元錢三個至宋廣稱以開元十個為兩今之三兩得漢唐十兩明矣千金本草皆以古三兩為今一兩古三升今為一升諸藥之類例尤為難辨且如半夏一升準五兩不知用何升何兩此修合制度要務不可不知漢銅錢質如周錢又曰半兩重如其文考文五年錢益移而輕乃更鑄四銖其文為半兩雜以鉛鐵錫非殽雜為巧則不得羸而姦或盜磨錢質取熔有司言錢輕重請郡國鑄五銖錢周郭有質令不得磨取熔則知漢以二半兩錢為兩重十銖明矣漢唐例以二十四銖為一兩唐末如修史人改作唐例亦不可知觀錢譜漢無六銖錢至唐方有分以五銖錢十六個正得開元錢十個重又以六銖錢十二個正得開元錢九個重則知開元錢每個已重八銖唐武德四年鑄開元通寶徑八分重二銖四纍積十錢為兩似難考據明食貨者必有説焉按藥書漢方湯液大劑三十餘兩小劑十有餘兩用水六升或七升多煎取二升三升並分三服若以古籥量水七升煎今之三十兩未淹得過況散末藥只服方寸匕作丸子如梧桐子大極至三十粒湯液豈得如此懸絶又如風引湯一劑計五十五兩每兩隻用三指撮水三升煮三沸去滓溫服一升看其煮制每隻三指撮末應料劑如此之多此又可疑也今以意説漢方當用半兩錢二枚為一兩且以朮附湯方較若用漢兩計一百八十銖得開元錢二十二個半重分三服已是今之七錢半重一服若以唐方準計三百三十銖得開元通寶錢四十二個重每服計今之十四錢重大略可知若以開元錢準得一百單五個重分三服每服計三百五錢重此猶是小劑況有大劑名半兩數之多者未易概舉留心此道幸少詳焉凡丸散云若干分兩是品諸藥宜少宜多之分兩非必止於若干之分兩也假令日服三方寸匕須瘥止是三五兩藥耳凡散藥有云刀圭者十分方寸匕之一準如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢匕者以大錢上坐金抄之若云半錢匕者則是一錢抄取一邊爾並用五銖錢也錢五者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺兩勺為一合以藥升分之者謂藥有虛實輕重不得用斤兩則以升平之藥升方作上徑一寸下徑六分深八分內散藥勿按抑之正爾微動令平調耳今人分藥不復用此凡丸藥有云如細麻大者即胡麻也不必扁但令較量大小相稱爾如黍粟者亦然以十六黍為一大豆也如麻子者即今大麻子準三細麻子也如胡豆者今青斑豆也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以二小豆準之如梧桐子者以二大豆準之以方寸匕散以蜜和得如梧桐子十丸為定如彈丸及雞子黃者以十梧桐子準之凡方云巴豆若干枚者粒有大小當先去心皮乃稱之以一分準十六枚附子烏頭若干枚者去皮畢以半兩準一枚枳實若干枚者去穰畢以一分準二枚橘皮一分準三枚棗有大小以三枚準一兩云乾薑一纍者以半兩為正本草云一兩為正凡方半夏一升者洗畢稱五兩為正椒一升三兩為正吳茱萸一升五兩為正菟絲子一升九兩為正蛇床子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升其子各有虛實輕重不可通以稱準皆取平升為正凡方云桂一尺者削去皮畢重半兩為正甘草一尺者重二兩為正云某草一束者重三兩為正一把者重二兩為正凡云蜜一斤者有七合豬膏一斤者一升二合凡湯酒膏藥舊方皆云㕮咀者謂稱畢搗之如大豆又使吹去細沫此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略今如㕮咀者乃得無末片而利調和也凡云末之者謂搗篩如法也凡丸散先細切曝燥乃搗之有各搗者有合搗者並隨方所言其潤濕藥如天門冬乾地黃輩皆先切曝乾獨搗令扁碎更出細擘曝乾若值陰雨可微火烘之既燥少停冷乃搗之凡濕藥燥皆火耗當先增分兩須得屑乃稱之為正其湯酒中不須如此凡篩丸藥用重密絹令細於蜜丸即易熟若篩散草藥用輕疏絹於酒中服即不泥其石藥亦用細絹篩令丸藥者凡篩丸散藥畢皆更合於臼中以杵搗之數百過視其色理和同為佳凡煮湯當取井花水令極淨潔升斗分量勿使多少煮之調和候火用心一如煉法凡煮湯用微火令小沸其水數依方多少大略二十兩藥用水一斗煮取四升以此為率皆絞去滓而後酌量也然則利湯欲生少水而多取汁者為病須快所以少水而多取汁補湯欲熟多水而少取汁者為病須補益是以多水而少取汁好詳視之不得令水多少湯熟用新布兩人以尺木絞之澄去垽濁分再服三服者第二第三服以紙覆令密勿令泄氣欲服以銅器於熱湯上暖之勿令器中有水氣凡漬藥酒皆須細切生絹袋盛之乃入酒密封隨寒暑日數視濕烈便可漉出不必待至酒盡也滓可曝燥微搗更漬飲之亦可散服凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人當依此用皆應先曝令燥也凡合膏先以苦酒漬令淹浹不用多炙密覆勿泄云晬時者周時也從今旦至明亦有止一宿煮膏當三上三下以泄其熱勢令藥味得出上之便匝匝滯乃下之取沸靜良久乃止寧熟不生其中有薤白者以兩頭微熬黃為候有白芷附子者亦令小黃色為度豬肪皆勿令經水臘月者彌佳絞膏亦以新布絞之若是可服之膏膏滓亦湛酒煮飲之可摩之膏膏滓則宜以傳病此蓋欲兼盡其藥力故也凡膏中有雄黃硃砂輩皆別搗細研如面須絞膏畢乃投中以物疾攪至於凝僵勿使沉聚在下不調也有水銀者於凝膏中研令消散胡粉亦爾凡搗藥法燒香灑掃淨潔不得雜語喧呼當使童子搗之務令細熟杵數可至千萬杵過多為佳凡合腎氣薯蕷及諸大補五石大麝香丸金牙散大酒煎膏等合時並勿令婦人小兒産母喪者痼疾六根不具足人及雞犬六畜等見之大忌切宜慎之其續命湯麻黃等諸小湯不在禁忌之限比來田野下里家因市得藥隨便市上雇人搗合非上諸市不如法至於石斛菟絲子等難搗之藥費人功力賃作搗者搗主悉盜棄之又為塵埃穢氣入藥中羅篩粗惡隨風飄揚衆口嘗之衆鼻嗅之藥之精氣一切都盡與朽木不殊又復服餌不能盡如法服盡之後及加虛損遂謗醫者處方不效夫如此者非醫之咎自緣發意甚誤宜熟思之凡藥皆不欲數數曬曝多見風日氣力即薄散宜熟知之諸藥未即用者候天大晴時於烈日中曝令大幹以新瓦器貯之泥頭密封須用開取即急封之勿令中風濕之氣雖經年亦如新也其丸散以瓷器貯蜜臘封勿令泄氣則三十年不壞諸杏仁及子等藥瓦器貯之則鼠不能得之也凡貯藥法皆須去地三四尺則土濕之氣不中也論服餌若用毒藥治病先起如黍粟病去即止不去倍之不去十之取去為度病在胸膈以上者先食而後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽滿而在夜凡服丸散不云酒水飲者本方如此是可通用也凡服利湯欲得侵早凡服湯欲得少熱服之即易消不吐若冷則嘔吐不下若大熱即破人咽喉務在用意湯酒必澄清若濁令人心悶不解中間相去如步行十里久再服若太促數前湯未消後湯來沖必當吐逆仍問病者腹中藥消散乃可進服凡服補益丸散者自非衰損之人皆可先服利湯瀉去胸腹壅積痰實然後可服補藥應服治風湯散皆須三五劑如有久滯風病即須倍此乃至五十餘日可瘥又當斟酌所宜傷寒時氣不拘旦暮當即亟治其服藥亦不可拘以常法庶使病易得愈不致傳變是以小兒女子得病益以滋甚者良有隱忍冀差不即治之也凡服湯法大約皆分為三服取三升然後乘病人穀氣強進一服最須多次一服漸少後一服最須少如此即甚安穩所以病人於後氣力漸微故湯須少凡服補湯欲得服三升半晝三夜一中間間食則湯氣溉灌百脈易得藥力凡服湯不得太緩太急也又須左右仰覆臥各一食頃即湯勢遍行腹中又於室中行皆可一百步許不宜出外即大益凡古方治疾全用湯法百千之中未有一用散者今世醫工湯散未辨且其説多異端承疑傳謬按湯法㕮咀為名切如麻豆散法治篩為治擇搗篩卒病賊邪須湯以蕩滌長病痼疾須散以漸漬此古人用湯液煮散之意也後世醫工惟務力省一切為散遂忌湯法傳用既久不知其非一旦用湯妄生疑訝殊不知前世用湯藥劑雖大但日飲不過三數服而且方用專一今人治病劑料雖薄而類藥競進每藥數服以古較今豈不今反多乎又昔人長服藥者多作煮散法蓋收其積日之功故每用一方寸匕為一服多不過三方寸匕然而須以帛裹煮時微微振動是古人之意豈須欲多服藥哉又服丸之法大率如梧桐子大二十丸多不過三十四十丸及服散者少則刀圭錢五多則方寸匕而已豈服湯特多煮散丸散則少乎後之世人既不知斤兩升合之制又不知湯液煮散之法今從舊例率定以藥二十五兩水一升小煮取今一升五合去滓垽分三服自餘利湯欲少水而多取數補湯欲多取水而少取數藥各依方下製法凡服湯三日常忌酒緣湯忌酒故也凡服治風湯第一服厚覆取汗若得汗即須薄服勿令大汗中間亦須間食不爾令人無力更益虛羸凡丸藥皆如梧桐子大補者十丸為始從一服漸加不過四十丸過亦損人云一旦三度服欲得引日多時不闕藥氣漸漬熏蒸五臟積久為佳不必頓服早盡為善徒棄名藥獲益甚少凡人四十以下有病可服瀉藥不甚須服補藥必若有所損不在此限四十以上則不可服瀉藥須服補藥五十以上四時勿闕補藥如此乃可延年得養生之術耳素問曰實則瀉之虛則補之不虛不實以經取之此其大略也凡有臟腑積聚無問少長須瀉則瀉凡有虛損無問少長須補即補以意量度而用之凡痔漏痔𧈟等藥皆慎豬雞魚油等味至老凡服瀉藥不過以利為度慎勿過多令人下利無度大損人也凡諸惡瘡瘥後皆百日慎口味不爾即瘡發也凡服酒藥欲得使酒氣相接無得斷絶絶則不得藥力多少皆以知為度不可令至醉及吐則大損人也凡服藥皆斷生冷酢滑豬犬雞魚油麵蒜及果實等其大補丸散切忌陳臭宿滯之物有空青忌食生血物天門冬忌鯉魚白朮忌桃李及魚肉葫荽大蒜青魚鮓等物地黃忌蕪荑甘草忌菘菜海藻細辛忌生菜菟絲子忌兔肉牛膝忌牛肉黃連桔梗忌豬肉牡丹忌葫荽藜蘆忌貍肉半夏菖蒲忌飴糖及羊肉恆山桂心忌生蔥生菜商陸忌犬肉茯苓忌醋物柏子仁忌濕面巴豆忌藜蘆魚羹及豬肉鱉甲忌莧菜凡風病通忌五辛甘滑生冷油膩之類凡傷寒時氣忌羊肉雜食及病瘥後尤忌肉食凡熱病新瘥及大病之後食豬肉及腹血肥魚油膩等必大下痢又食餅餌粟黍飴脯鱠炙棗栗諸果及堅實難消之物必更結熱以藥下之則胃中虛冷大痢不禁難救凡腳氣之病極須慎房室羊肉牛肉魚蒜蕺菜菘菜蔓荊瓠子酒面酥油乳糜豬雞鵝鴨有方用鯉魚頭等此並切禁不得犯之並忌大怒生果子酥酢之食又特忌食瓠子蕺菜犯之一世治不愈凡癥瘕癖積忌生冷酥滑物凡吐逆下利等忌生冷酥滑膩物凡噎塞脹滿及痼冷諸氣並忌生冷凡積熱忌魚酒熱面等凡咳嗽咯血吐血忌諸熱物凡痰飲忌酒酢凡消渴忌房室凡水氣忌羊頭蹄及鹽一切咸物凡服藥不可食生葫荽諸滑物及果實肥豬犬肉油膩羹魚鱠腥臊等物凡服藥忌見死尸及産婦穢汙觸之兼忌忿怒憂勞凡餌湯藥其粥食肉菜皆須大熟即易消與藥相宜若生則難消復損藥力仍須少食菜及硬物於藥為佳亦少進鹽醋乃善亦不得苦心用力及房室喜怒是以治病用藥力惟在食治將息得力大半於藥有益所以病者務在將息節慎節慎之治可以長生豈惟愈病而已凡服瀉湯及諸丸散酒等至食時須食者皆先與一口冷醋飲須臾乃進食為佳凡人忽遇風發身心頓惡或不能言有如此者當服大小續命湯及西州續命排風越婢等湯於無風及密室之中日夜四五勿計劑數多少亦勿慮虛常使頭面手足腹背汗出不絶為佳服湯之時湯消即食粥粥消即服湯亦少與羊肉臛將補若風大重者相續五日五夜服湯不絶即經二日停湯以羹臛自補將息四體若瘥即當停藥漸漸將息如其不瘥當更服湯攻之以瘥為度凡患風服湯非得大汗其風不去所以諸風方中皆有麻黃至於西州續命即用八兩越婢六兩大小續命或用一兩三兩四兩故知非汗不瘥所以治風非密室不得輒服湯藥徒自誤耳惟更加增未見損減矣凡年五十以上大虛者服三石更生慎勿用五石也四時常以平旦服一二升暖飲終身勿絶及一時勿用蒜油魚豬牛馬雞鴨等肉即無病矣
