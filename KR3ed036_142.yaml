默欲睡則不安咽喉干痛口內生瘡惡聞食氣時時下利鱉甲二分塗醋炙令黃去裙襴川升麻半兩葳蕤黃連去須當歸銼微炒赤芍藥桂心犀角屑貝齒茯神秦艽去苗甘草炙微赤銼各一分柴胡去苗麻黃去根節人參去蘆頭各半兩上為散每服不計時候以粥飲調下二錢赤小豆當歸散出金匱方治傷寒狐惑病脈數汗出微煩默默但欲臥三四日眼赤如鳩者得之七八日其面昏黃黑能食者膿已成也治之赤小豆三兩炒熟當歸一兩半銼微炒上為散每服不計時候以溫水調下二錢漿水服亦可治傷寒不經汗出變成狐惑毒氣下蝕肛門癢痛至甚或下膿血出聖惠方檳榔末杏仁硃砂上研令勻用黑餳和丸如棗核大先用椿根槐白皮各二兩以水一斗煎十餘沸去滓熏洗然後將藥納肛門中一日一易之傷寒身體疼痛附論夫太陽少陰厥陰皆有身痛當以外證與脈別之太陽證表未解脈浮緊法當身體痛宜麻黃湯以汗之脈浮緊當身體疼痛宜以汗解假令尺脈遲者不可發汗何以知其然榮氣不出血少故也尺脈遲者先以小建中湯以養之脈浮者麻黃湯主之太陽中濕一身盡痛發熱身黃小便不利病人中濕因而傷風風濕相搏一身痛腫是名風濕當於風濕中求之麻黃加朮湯主之若脈沉自利而身體痛者陰證也急當救里宜四逆湯附子湯真武湯之類以溫之大抵大便利而身體疼者當救里大便如常而體疼者急當救表此不可不知也或身重背強腹中絞痛咽喉不利身如被杖者當作陰毒治之又問發汗後身疼痛脈沉而遲當用何藥仲景有桂枝芍藥生薑人參新加湯蓋為此證也小建中湯兼治汗後身疼脈沉而遲者若霍亂吐瀉止而身疼痛不休者少與桂枝湯即愈金匱要略云瘡家雖身體痛不可發汗汗出則痓又問身癢者何也脈浮而遲遲為無陽不能作汗其身必癢太陽病七八日脈微而惡寒以陰陽俱虛不可更發汗更下更吐也小柴胡湯主之若重反發汗則氣虛必兩耳聾無聞可芍藥甘草附子湯素有熱人可黃耆建中湯面赤有熱者未欲解也以其不能得小汗出身必當癢宜桂枝麻黃各半湯歌曰脅痛多屬少陽家燥糞陽明並小柴里水痞堅須十棗陰脅引痛臟中乖脅肋痛滿者邪氣在半表半裡之間也邪方傳裡即將為實氣鬱不行法當和解若夫里水痛堅非下之不可也少陽病脅痛耳聾寒熱乾嘔或脅下堅滿並用小柴胡湯和解之陽明病之解傳入少陽脅下堅滿乾嘔小柴胡湯又陽明燥糞不大便脅下堅滿舌上胎滑小柴胡湯太陽病咳嗽乾嘔微利心下痞硬引脅下痛身涼汗出或時頭疼此為表解里有水十棗湯下之病者脅下痛素有痞積在於臍旁引小腹入陰筋俱作痛此為臟結不治身疼浮緊太陽臨自利肝並腎帶沉中濕毒因與風濕其餘霍亂本條尋局方大柴胡證云邪結在裡大便祕澀心腹痛硬者可服若身體疼痛是表證未解不可與之然則身體疼痛不脈沉不自利太陽之表證明矣其或自利脈沉此則陰證之身痛臟家之裡病云身痛大抵多是表證太陽身痛脈浮緊無汗麻黃湯以汗之或只脈遲者血不足也先用小建中湯以養之俟其尺脈浮即用麻黃湯病七八日脈細惡寒為陰陽俱虛吐汗下並不可治在其人素無熱可芍藥甘草附子湯素有熱可黃耆建中湯厥陰少陽身痛其脈沉必自利四逆湯真武湯附子湯中濕一身盡痛不可汗下但利小便有本條陰毒身痛如被杖腹中絞痛脈沉而疾有本條風濕一身痛重但微汗不可大發汗有本條發汗後身痛脈沉遲者桂枝加芍藥人參湯汗後身痛為寒邪在表脈沉遲為在裡用芍藥入榮人參安和真氣或用黃耆建中湯又汗後霍亂身痛不休少與桂枝湯方解肌湯治傷寒往來寒熱有時肢節煩疼者恆山二兩柴胡四兩知母甘草青蒿子桃枝各一兩桂生薑二兩烏梅十二枚蔥白薤白各三寸柳枝一握鱉甲醋炙去裙襴二兩上以水一斗二升煮取六升去滓再煮取三升溫服一升寒熱前後各一服亦治久瘧不用蔥薤亦良防風湯治少陽病筋牽急而疼痛發作有時此為痹也防風甘草各一兩炙天南星生薑二兩炙上以水四升煮取二升去滓溫服七合日三服六物解肌湯治傷寒發熱身痛葛根四兩茯苓三兩麻黃牡蠣生薑各二兩甘草一兩上㕮咀以水八升煮取三升分三服再服得汗通即止古今録驗無生薑甘草忌酢物參苓散治傷寒治百節疼一切虛勞氣疾並宜服之人參二兩茯苓一兩白朮二十兩銼桔梗十兩去蘆橘紅六兩香白芷三兩芍藥一兩當歸二兩去蘆川芎一兩半半夏一兩湯洗七次厚朴二兩去皮生薑汁製官桂去皮春夏三兩秋冬四兩枳殼四兩麩炒令黃同桂杵為末乾薑春夏一兩半秋冬二兩麻黃去根節春夏二兩秋冬三兩上件一處焙乾除官桂枳殼別杵外諸藥同搗粗末分作六分於大鐵鍋內以文武火炒令微赤黃為度不可令焦須是勻取出以淨紙襯安板床上候冷勿令侵塵土入前枳殼官桂川芎和勻杵為細末每服一錢水一盞生薑三片蔥二寸煎七分通口服不拘時候陽旦湯治傷寒肢節疼痛內寒外熱心下虛煩芍藥甘草各二兩乾薑黃芩各三兩桂心四兩大棗十五枚上㕮咀以水一斗煮取五升去滓溫服一升日三服夜再服令小汗出瘥黃耆建中湯治傷寒身痛尺脈遲及汗後身痛脈弱黃耆桂各一錢半白芍藥三錢甘草一錢上以水二錢薑五片棗二枚煎至八分去滓入稠餳一大匙再煎盡溫服舊有微溏或嘔者不用餳人參順氣散治丈夫婦人風虛氣弱榮衛不和肢節疼痛身體沉重頭目眩暈肩背拘急手足冷麻半身不遂口眼歪斜痰涎不利言語謇澀或脾胃不和心腹刺痛胸膈痞滿倦怠少力霍亂轉筋吐瀉不止胎前産後並宜服之乾薑人參各一兩川芎去蘆頭甘草炙白朮去蘆苦梗去蘆厚朴去粗皮薑汁製陳皮洗去白白芷麻黃去節乾葛去蘆各四兩上為細末每服二錢水一盞薑三片棗一枚薄荷五七葉同煎八分不拘時候如傷寒感風冷頭疼腰重咳嗽鼻塞加蔥白煎壞傷寒附論夫傷寒壞病者為三陰三陽俱受病訖毒氣未散留於臟腑令致病候多變故曰壞傷寒也本太陽病不解轉入少陽脅下牢滿乾嘔不能食往來寒熱其脈沉緊宜小柴胡湯寸口脈洪大數而滑洪大營氣盛滑數衛氣實榮盛則鬱怫可與出汗衛實即大便牢難三焦閉塞津液不通榮衛相搏心煩發熱兩目如火鼻乾面赤舌燥齒黃大渴故過經而成壞病也傷寒太陽病三日已發汗若吐若下若汗證仍不解者多變為壞病又太陽病轉入少陽已吐下發汗少陽證罷此為壞病知犯何逆以法治之此皆由傷寒病在諸經絡發汗吐下而病證不除又感異氣氣有寒暑燥濕風不同病變隨故謂之壞病又有傷寒過經再受熱邪留蓄臟腑病候多變者及傷寒解後虛羸少氣餘證未除者皆謂之壞病也方麥門冬散出聖惠方治傷寒壞病身體沉重無力昏昏如醉頭痛煩悶麥門冬三分去心百合三分麻黃三分去根節葛根半兩銼柴胡一兩去苗桔梗半兩去蘆頭木通三分銼甘草半兩炙微赤銼羚羊角半兩石膏二兩赤茯苓一兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服升麻散出聖惠方治壞傷寒經數日未解潮熱作時煩躁面赤川升麻三分鱉甲三分塗醋炙令黃去裙襴前胡半兩去蘆頭烏梅肉半兩枳殼三分麩炒微黃去瓤犀角屑三分黃芩三分甘草半兩炙微赤銼葛根三分銼上為散每服五錢以水一大盞煎至五分去滓入生地黃汁一合更煎一兩沸不計時候分為二服又方出聖惠方梔子仁三分川升麻三分黃芩一兩石膏一兩乾薑半兩炮裂銼上為散每服五錢水一大盞煎至五分去滓入生地黃汁一合更煎一兩沸不計時候分為二服前胡散出聖惠方治傷寒後已經十餘日潮熱不退身體沉重昏昏如醉恐成壞病前胡一兩去蘆頭百合一兩麻黃三分去根節葛根一兩銼麥門冬半兩去心石膏一兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服又方出聖惠方柴胡一兩去苗防風三分去蘆頭黃芩一兩葛根一兩銼甘草半兩炙微赤銼前胡一兩去蘆頭上為散每服五錢水一大盞煎至五分去滓不計時候溫服鱉甲散治壞傷寒經十日以來未解熱在胸膈煩悶不止鱉甲塗醋炙令黃去裙襴柴胡去苗川升麻以上各一兩烏梅肉一兩聖濟作半兩枳殼麩炒微黃犀角屑黃芩以上各一兩甘草半兩炙微赤銼上為散每服五錢水一大盞煎至五分去滓入生地黃汁半合更煎一兩沸不計時候分溫二服聖濟方水一盞半煎至八分去滓下地黃汁二合攪勻食後溫服名鱉甲湯犀角散出聖惠方治壞傷寒日數多後煩熱不退頰赤口乾犀角屑一兩柴胡三分去苗吳藍三分大青一兩川升麻一兩烏梅肉三分黃芩三分甘草半兩炙微赤銼上為散每服五錢水一大盞入竹葉三七片煎至五分去滓不計時候溫服麥奴丸出聖惠方治壞傷寒熱在胸中口不能語麥奴半兩灶下黃土半兩灶突中墨半兩梁上塵半兩麻黃一兩去根節川大黃半兩銼微炒黃芩半兩川朴硝一兩上為末煉蜜和丸如彈子大每服以新汲水研下一丸良久令極飲水不欲水但強飲之須臾必寒寒已當有汗出便愈宣毒麝香丸出聖惠方治壞傷寒心下結硬腹滿氣急大便不利體變如桃枝色熱結在內者麝香一分細研豬苓一分去黑皮川芒硝一兩柴胡半兩去蘆芫花一分醋拌炒乾川大黃一兩銼微炒梔子仁半兩上為末入麝香同研令勻煉蜜和丸如梧桐子大每服溫水下二十丸良久必利未利再服知母麻黃湯出永類鈐方治傷寒壞病瘥後或十數日或半月二十日終不惺惺精神昏語言錯又無寒熱醫或作鬼祟或作風疾多端治藥弗效或朝夕潮熱頰赤或似瘧皆由發汗不盡餘毒在心包絡間所致知母炒一兩半麻黃去根節煎掠去沫甘草炙銼芍藥黃芩去黑心各半兩桂去粗皮半兩盛暑中可減半上銼如麻豆大每服五錢水一盞半煎至五分去滓溫服半日內可相次三服溫服取汗再服若心煩不眠欲飲水者當稍與之令胃中和即愈未汗須再服升麻湯治傷寒壞病經數日未瘥諸藥不能除升麻鱉甲醋炙去裙襴枳殼去瓤麩炒犀角鎊葛根黃芩去黑心甘草炙銼前胡去蘆頭烏頭炮裂去皮臍各半兩上銼如麻豆大每服五錢水一盞半煎至八分去滓下地黃汁二合攪勻食後溫服麝香丸治傷寒壞病冷熱相搏心下結胸滿氣急大便不利體變黃青黑如桃枝色四肢逆冷熱結在內者不可服湯飲麝香研豬苓去黑皮朴硝研蕘花炒芫花醋炒各一分大黃銼炒商陸甘遂焙各半兩上搗研為末煉蜜和搗三五百杵丸如緑豆大每服十丸食前溫湯下良久必利未利再服黑奴丸治傷寒壞病頭與骨肉俱痛狂言妄語醫所不療者麻黃去根節黃芩去黑心各二兩甘草炙銼灶突墨芒硝各一兩豉一合炒上搗羅為末煉蜜和搗三五百杵丸如桐子大每服一丸新汲水研下不拘時候大效丸治傷寒壞病烏頭附子二味去皮臍為末用醋一升煎盡好酒一升再煎成膏後入諸藥烏蛇酒浸去皮骨炙細辛去苗葉厚朴去粗皮薑汁炙人參赤茯苓去黑皮桂去粗皮乾蠍炒木香乳香研草豆蔻去皮硼砂胡桐淚檳榔銼膩粉不灰木各一分上一十七味將十五味搗研為末入二味膏子內和搗丸如梧桐子大每服十丸如陽盛研牛黃膩粉水下如陰盛發厥心胸結痞煎柳枝湯下麥門冬湯治傷寒壞病經久不瘥潮熱不退身體沉重昏憒煩悶麥門冬去心焙赤茯苓去黑皮各一兩鱉甲去裙襴醋炙一兩甘草炙銼半兩上粗搗篩每服三錢七分水一盞烏梅一個小麥五十粒同煎至七分去滓溫服不拘時候前胡湯治傷寒壞病潮熱頰赤口乾煩躁神思昏塞經久不瘥前胡去蘆頭二兩柴胡去苗常山人參葛根銼各一兩甘草炙銼三分上粗搗篩每服三錢水一大盞烏梅一個槌碎生薑三片煎至七分去滓溫服不拘時候治傷寒八九日不瘥名為敗傷寒諸藥不能消者方名鱉甲散鱉甲炙蜀升麻前胡烏梅枳實炙犀角屑黃芩各一兩甘草一兩炙生地黃八合上切以水八升煮取三升分五服頻頻服若不解更服若頭面赤去黃芩用乾葛四兩無地黃用豉一升煮取三升分三服忌蕪荑治壞證傷寒病十餘日之後過經已下已汗而未愈者廬州郭醫名羽云渠義父李助教大名府善方脈嘗合以治四五人皆安其方得於天台一僧用藥甚異或謂其效在兜取殊不可曉紅娘子二七個去頭翅足細研大棗兩枚剝取肉上同研勻爛丸如理中丸大每服一丸以白水煎服先頭目次遍身覺微微有汗然後服小建中湯加黃耆病瘥即止郭醫但能記此説未嘗敢用大可不録以俟名醫用之回生散治傷寒失下或成壞證譫言妄語發黃發斑大便不通小便如血有燥糞蓄血舌縮神昏不能服大湯劑但服此藥一呷燥便下過濈然汗出而愈甘遂生用黑牽牛生取末稱郁李仁去皮檳榔生用大黃生用大戟六味各等分上件為細末每服一錢入輕粉一字以蜜水少許用柳枝調勻服之更量虛實加減不拘時候
