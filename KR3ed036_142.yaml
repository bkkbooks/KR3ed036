body:
  text: 卷一百四十二傷寒門傷寒發黃附論夫傷寒發黃者蓋濕熱相交民當病疸疸者黃也單陽而無陰者也傷寒至於發黃為疾之甚也濕也熱也甚者則發黃內熱已盛甚覆被火者亦發黃也邪風被火熱兩陽相熏灼其身必發黃陽明病被火額上汗出而小便不利者必發黃是由內有熱而被火致發黃者也陽明病無汗小便不利心下懊憹者必發黃是由陽明熱盛致發黃者傷寒發汗已身目為黃所以然者寒濕在裡不解故也以為不可下也於寒濕中求之是由寒濕致發黃也濕亦令黃也熱亦令黃也其能辨之乎二者非止根本有異而色澤亦自不同濕家之黃也必身黃似熏黃雖黃而色暗不明也至於熱盛之黃也必身黃如橘子色甚者勃勃出染著衣正黃如柏是其正黃色也由是觀之濕之與熱豈不異矣大抵黃家屬太陰太陰者脾之經也脾者主黃土色也脾經為濕熱蒸之則色見於外必發身黃經曰傷寒脈浮緩手足自溫者是為系在太陰太陰當發身黃者是矣熱須內盛若已自汗出小便利者則不能發黃必也頭汗出身無汗齊頸而還小便不利渴飲水漿此為瘀熱在裡身必發黃黃家為熱盛而治法亦自有殊傷寒八九日身如橘子色小便不利少腹滿者茵陳蒿湯主之此欲泄滌其熱也傷寒身黃髮熱者梔子柏皮湯主之此欲解散其熱也傷寒瘀熱在裡必發黃麻黃連翹赤小豆湯主之此欲解散其熱也此數者泄滌解散乃為之不同亦皆析火徹熱之劑也一或身黃脈沉結少腹硬而小便自利其人如狂者又為蓄血在下焦使之黃也必須抵當湯下之而愈黃家既是病之已極是以有不治之者多矣非止寸口近掌無脈鼻氣出冷為不治之疾又若形體如煙燻直視搖頭者是為心絶環口黧黑柔汗發黃是為脾絶皆不治之證醫者更詳視之又云黃家至日晡所發熱而反惡寒此為女勞得之當膀胱急小腹滿體盡黃額上黑足下熱因作黑疸其腹臚脹而滿欲作水狀大便必黑時溏泄此女勞疸非水也腹滿者難治傷寒發黃之狀身體盡變或如熏黃或如橘色是也凡陽明中風太陽中濕皆令人發黃蓋由得病無汗小便不利寒濕不散則熱結脾胃腠理閉塞瘀熱之氣與宿谷相搏而鬱蒸不能消散故大小便結澀不通令人身體面目皆變黃色其病腹滿一身盡疼發熱若其人小腹滿急眼睛澀疼鼻骨疼兩膊及項強腰背急者是也但得小便快利即漸愈仍不用大便多多即令人心脹又有急黃者身體黃甚卒然而發心滿氣喘命在須臾故名急黃有初得病便黃者或初不知是黃死後方變黃者此病亦由脾胃瘀熱本天行時氣所作也宜細變之但發熱心戰者乃是急黃之候歌曰小便自利大便黑血證無疑定發狂若是小便全不利黃名疸病疸名黃若血證宜抵當湯輕者桃仁承氣湯與犀角地黃湯黃疸茵陳湯茵陳五苓湯又歌曰太陽發熱渾身痛身目俱黃是濕家腹滿脈弦心脅痛陽明經里中風邪仲景云傷寒發汗已身目為黃所以然者以寒濕在裡不解故也只當以寒濕中求之發熱一身盡痛而身目俱黃者太陽中濕也腹滿鼻乾心脅痛潮熱身黃者陽明中風也欲發黃者急用瓜蒂末一字許搐鼻中治在頭疼濕家條下大抵發黃與濕家不利小便非其治也腹滿脈浮弦咳嗽潮熱小便難心脅疼短氣鼻中干不得汗嗜臥此陽明中風也大小柴胡加茯苓湯噦者湯中加茯苓也見小便難條下病人寒濕在裡不散熱蓄於脾胃腠理不開瘀熱與宿谷相搏鬱蒸不消化故發黃汗者南方暑濕近夏疸熱蓋疸者黃也古人以黃為疸濕熱相搏民多病疸甚為胕腫然後發黃與瘀血外證及脈俱相似但小便不利為黃小便自利為瘀血要之發黃之人脾蘊積發熱引飲脈必浮滑而緊數若瘀血證即如狂大便自利為瘀血要之發黃人身體發熱頭面汗出身無汗齊項而止渴引水漿小便不利如此必發黃茵陳蒿湯五苓加茵陳散主之茵陳蒿湯十分五苓散五分三散拌勻每服二錢溫水調下日三服病人服湯得小便利如皂子汁赤一宿腹減則黃從小便中出也古人云治濕不利小便非其治也大抵發黃者瘀熱在裡由小便不利而致也梔子柏皮湯麻黃連翹赤小豆湯可選而用之又方傷寒欲黃者急用瓜蒂末口含水搐一字許入鼻中出黃水甚驗即用茵陳蒿湯調五苓散服之最良又問白虎證亦熱發渴引飲水小便不利何以不發黃答曰白虎與發黃證相近遍身汗出此為熱越白虎證也頭以下都無汗黃證也又問太陽病一身盡痛發熱身如熏黃者何也太陽中濕也仲景云傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之又問病人脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得嗜臥一身及目悉黃小便難有潮熱時時咳嗽者何也少陽中風也小柴胡湯主之方麻黃醇酒湯出千金方治傷寒熱出表發黃疸用麻黃三兩以醇酒五升煮取一升半盡服之溫覆汗出即愈冬月寒時用清酒春月宜用水麻黃連翹赤小豆湯出千金方治傷寒瘀熱在裡身體必發黃麻黃連翹一方用連軺系根味苦寒甘草各二兩生薑三兩大棗十二枚杏仁三十枚赤小豆一升生梓白皮切二升上㕮咀以潦水一斗先煮麻黃去沫次納諸藥煎取三升分溫三服半日服之茵陳湯出千金方治傷寒七日八日內實瘀熱結身黃如橘小便不利腹微脹滿宜下之茵陳六兩大黃三兩梔子四十枚上㕮咀以水一斗二升先煮茵陳取五升去滓次納梔子大黃煎取三升分服一升日三小便當利如皂莢汁狀色正赤當腹減黃悉隨小便去也範汪用療谷疸小品方用石膏一斤大黃黃柏湯治發黃腹滿小便不利而赤自汗出此為表和裡實當下之大黃三兩黃柏二兩芒硝半兩梔子十五枚上㕮咀以水六升煮取二升去滓納芒硝復煎取一升先食頓飲之枳實大黃湯治傷寒飲酒食少飲多痰結髮黃酒疸心中懊憹而不甚熱或乾嘔枳實五枚大黃三兩豆豉半升梔子七枚上㕮咀以水六升煮取三升分三服心中熱疼懊憹皆主之治傷寒後二十日渾身眼如金色者上用黃蘆一兩銼碎水一升煎取三合空心服三五服安麻黃連翹湯出金匱方治傷寒瘀熱在裡身必發黃麻黃去根節湯煎去沫二兩連翹二兩杏仁去皮尖雙仁四十枚棗十二枚生薑二兩甘草一兩生梓白皮切一升上㕮咀如麻豆大每服五錢用潦水二盞煎取一盞去滓溫服不拘時消濕散治傷寒瘀熱在內濕氣鬱而不散熏發肌肉小便不利身體發黃利水道牽牛子炒半斤只取末二兩赤茯苓去黑皮木香陳橘皮湯浸去白焙各半兩上為散每服二錢煎蔥白湯調下不計時候秦艽湯治傷寒心胸堅硬腳手心熱即變為黃秦艽去苗土紫草去苗土白蘚皮黃芩去黑心梔子仁大黃銼炒各一兩上粗搗篩每服五錢用水一盞半煎至一盞去滓溫服日三服三黃散治傷寒發黃服藥瘥後未全除餘熱發動大黃銼炒黃芩去黑心黃連去須梔子仁苦參各一兩上搗羅為細散每服用米飲調下二錢日三服龍膽湯治傷寒發黃煩熱膚肉皆黃小便赤不利龍膽枳殼去瓤麩炒柴胡去苗梔子仁知母切焙地骨皮木通芍藥甘草炙羚羊角鎊麥門冬去心焙升麻各半兩上粗搗篩每服五錢用水一盞半煎至一盞去滓不拘時溫服黃芩湯治傷寒發黃或先服利藥未瘥者以內消湯以折熱氣黃芩去黑心茵陳蒿升麻各一兩梔子仁柴胡去苗龍膽各半兩犀角鎊一兩上粗搗羅每服五錢用水一盞半煎至一盞去滓入生地黃汁一合攪令勻不拘時溫服茵陳蒿大黃湯濟生拔粹方治傷寒發黃面目悉黃小便赤宜服茵陳蒿梔子仁柴胡去苗柏皮蜜炙各半兩黃芩去黑心升麻大黃銼炒各一兩龍膽半兩上粗搗篩每服五錢用水一盞半煎至一盞去滓早晚食後溫服茅根湯治傷寒發黃通身如金色者茅根洗銼梔子仁茵陳蒿地骨皮甘草炙各三兩上粗搗篩每服五錢用水一盞半生薑三片豉三七粒同煎至一盞去滓早晚食後溫服柴胡枳殼湯治傷寒發黃壯熱骨節煩疼兩脅下氣脹急硬痛不能忍柴胡去苗枳殼去瓤麩炒黃芩去黑心梔子仁茵陳蒿龍膽大黃銼炒甘草炙各半兩上粗搗篩每服五錢用水一盞半煎至一盞去滓早晚食後溫服茵陳黃芩湯出楊子建護命方治傷寒熱毒熾盛熏炙三焦攻擊皮膚通身發黃茵陳蒿黃芩去心梔子仁升麻秦艽去苗土牡丹皮荊芥穗麻黃去根節細辛去苗葉石膏碎知母焙各半兩黃連去須大黃銼炒各一分上粗搗篩每服三錢水一盞煎至七分去滓食後臨臥溫服葶藶丸治傷寒時氣發黃甜葶藶隔紙炒一分大黃銼炒半兩人參一兩上搗羅為末煉蜜和丸如梧桐子大每服溫水下二十丸以利為度急黃丸治傷寒熱毒所加卒然心中滿氣喘急發熱心戰大黃半兩生銼朴硝一分銼研上用水二大盞漬大黃一宿次旦煎至一盞去滓下朴硝攪令勻不計時候分溫三服利快瘥梔子仁湯治傷寒急黃梔子仁柴胡去苗朴硝別研茵陳蒿各半兩上除朴硝外各細銼用水三大盞煎二大盞去滓下朴硝攪令勻不計時候分溫三服取利為度治病人腹滿舌痿黃煩不得眠茵陳二兩白朮一兩甘草一兩上臼中杵為散沸湯和服方寸匕小便不利加茯苓二兩治傷寒時氣黃疸病煩熱以湯淋東壁土硝取汁頓服之治傷寒三五日忽有黃則宜服此取生烏麻油一盞水半盞雞子白一枚熟攪令相勻服之令盡茵陳五苓散出金匱方治傷寒溫濕熱病感冒後發為黃疸小便黑赤煩渴發熱不得安寧此蓋汗下太早服藥不對證因感濕熱病以致身發黃豫嘗用茵陳五苓散治之甚效用生料五苓散一兩加入茵陳半兩車前子一錢木通一錢半柴胡一錢半酒後得證加乾葛二錢作㕮咀並前藥和勻分作二服每服水一碗燈草五十莖同煎八分去滓食前服滓再煎連進數服小便清利為愈梔子柏皮湯方治傷寒身熱發黃者麻黃連翹赤小豆湯出拔粹方少陽陽明身熱不去小便自利而煩者身必發黃宜梔子柏皮湯麻黃連翹各一兩赤小豆一升上銼如麻豆大每服一兩水三盞煎至八分去滓溫服梔子柏皮湯出拔粹方治燥熱發黃大黃柏皮各三兩梔子十五個上銼如麻豆大每服一兩水二盞煎服發黃大便自利不止者加黃連黃柏皮各三兩生減大黃用之多效茵陳湯淡寮方治傷寒發汗有留熱身面皆黃多熱期年不愈醫作食黃治之病不去問之食不減尋與此藥五日減三分之一十日減三分之二二十日病悉去其方用山茵陳山梔子各三錢秦艽升麻各四錢上㕮咀以三錢為一服煎去滓食後服茵陳附子乾薑湯出衛生寶鑑治因涼藥過劑變為陰證身目俱黃四肢皮膚甚冷心下痞硬眼澀不欲開大便自利倦臥附子炮去皮臍三錢乾薑炮二錢茵陳蒿一錢三分半夏湯泡七次五分白茯苓去皮三分澤瀉五分枳實麩炒去瓤五分陳皮去白三分白朮四分草豆蔻麵裹燒熟去皮用仁二錢上銼如麻豆大都作一服水一盞半生薑五片煎至一盞去滓涼服不拘時候茵陳梔子黃連三物湯出活人書大便自利而黃茵陳三錢梔子黃連各二錢上以水二盞煎至八分去滓服治傷寒時氣黃疸病煩熱上用土硝湯淋取汁頓服之莊子云蛣蜣轉丸是也藏在土中掘地得之正丸如人捻作彌久者良治傷寒鼻塞黃疸用苦瓠煎取汁滴鼻中出黃水其塞遂通治傷寒五種黃用翹搖生搗絞汁服一升日二服即瘥又方用亂髮燒灰水服一寸匕日三服治伏熱結目黃不下食大小便澀用苦耽苗子煮汁服或生搗絞汁服傷寒百合附論夫傷寒百合病者謂百脈一宗悉致其病也其狀意欲食復不能食常默默欲得臥復不能臥欲出行復不能行飲食有時美亦有時不美如有寒復如無寒如有熱復如無熱