body:
  text: 卷十七心臟門心煩熱附論夫心煩熱之病手少陰經有餘所致也其不足則亦能令人虛煩大抵心屬火而惡熱其受病則易以生熱熱則血氣壅滯故為煩躁寢臥不得安寧口舌生瘡頭痛頰赤之類虛則熱氣內攻心神不寧亦為煩躁也方黃芩湯治心熱恍惚煩躁面赤小便澀黃芩去黑心貝母去心升麻麥門冬去心焙玄參紫菀去苗土柴胡去苗桔梗去蘆頭炒牡丹去心木香胡黃連等分上搗篩每服三錢水一盞煎七分去滓溫服不拘時鐵粉丸治心虛煩熱怔忪頭目昏眩夜臥不寧鐵粉二兩蛇蛻五尺炒焦黃連去須澤瀉犀角鎊各三分龍齒遠志去心各半兩麥門冬去心焙白茯苓去黑皮人參各一兩半上為末煉蜜和丸梧桐子大每服二十丸熟水下日三服烏犀湯治心臟煩熱睡即多驚心忪不欲見人犀角鎊八錢龍齒升麻各一兩麥門冬去心焙二兩茯神去木一兩半玄參一兩甜勾根銼焙三兩赤芍藥一兩半上搗篩每服三錢水一盞入馬牙硝半錢生地黃五七寸拍碎同煎至七分去滓溫服涼心丸治心熱煩躁紫河車三分蚤休是也人參白茯苓去黑皮各半兩遠志去心一錢麥門冬去心焙半兩丹砂別研一兩龍腦別研半兩金箔二十片與丹砂腦子同研上除別研外搗羅為末再同研勻煉蜜和丸如雞頭大每服一丸人參湯化下遠志湯治心虛多煩躁背膊煩悶面色變赤言語謬亂遠志去心一兩白茯苓去黑皮三分犀角鎊一兩半知母半兩芍藥一兩黃芩去黑心前胡去蘆頭各三分上搗篩每服三錢水一盞入生麥門冬汁半合煎至八分去滓不拘時溫服麥門冬湯治心煩躁口乾舌澀麥門冬去心焙二兩龍齒半兩玄參洗切梔子仁茅根各一兩木通二兩銼赤芍藥一兩上搗篩每服三錢水一盞煎至八分去滓不拘時溫服黃耆湯治心虛煩躁黃耆銼麥門冬去心焙栝蔞根銼各一兩黃連去須甘草茯神去木熟乾地黃洗切焙四兩上搗篩每服五錢水一盞半煎一盞去滓不拘時溫服瞿麥湯治心熱煩躁小便赤澀瞿麥穗麥門冬去心焙木通銼各一兩黃連去須甘草炙銼各半兩上搗篩每服三錢水一盞入竹葉十片同煎至七分去滓不拘時溫服黑豆湯治心膈虛煩燥渴至甚黑豆小者一升防風去叉二兩甘草炙銼麥門冬去心各一兩上除黑豆外並細銼用水七升煎取五升不拘時溫服從早至夜勻分作四服如渴不至甚者止用半劑地黃散治心經積熱煩郁生地黃汁三升蛤粉一斤鬱金銼二兩甘草炙銼三兩上將地黃汁拌和下三味令勻曝乾搗羅為散每服一錢用新汲水調下日三服食後臨臥地骨皮湯治心煩熱咽乾舌澀面赤潮熱地骨皮防風去蘆各一兩甘草炙銼半兩上搗篩每服三錢水一盞入竹葉五七片同煎至七分去滓不拘時溫服瀉心散出千金方治心受積熱譫言發狂逾牆上屋心氣不定吐血衄血大黃黃芩黃連各五錢上銼散每服四錢水一盞半煎服鎮心丹出家藏經驗方治心氣不足病苦驚悸不知人及膽寒不臥自汗心煩悶短氣喜怒悲哀悉不自知亡魂失魄狀若神靈所憑及治男子遺泄女子帶下光明辰砂研白礬煅汁盡各等分上為末水丸如雞頭大每服一丸煎人參湯下食後服治大熱心悶者用槐子燒末酒服方寸匕理心煩悶益氣力止渴用苦筍熟煮任性食之治心疸煩心中熱取茜根主之治心煩去熱取香薷煎湯作羹煮粥及生食並得治熱攻心煩躁恍惚以牛蒡根搗汁一升食後分為三服良治煩勞發汗通利關節以薄荷與薤杵汁服去心臟風熱安神丸出蘭室方一名硃砂丸治心煩懊憹心神顛倒兀兀吐食胸中氣亂而熱皆膈上血中伏火蒸蒸不安宜用權衡法以鎮陰火之浮行也以養上焦之元氣用甘草之甘溫補之以歸地為長生陰血之陰也以補其不足以黃連去心煩除溫熱之勝藥也以硃砂納浮溜之火而安神明也方見硃砂安神丸金花散出王氏博濟方治心腹壅熱熏蒸上焦致口氣生瘡連年不瘥黃連半兩炒令稍焦赤如年少即加少許人參半兩枳殼半兩去白麩炒微黃甘草半兩炙微赤半夏半兩以薑汁拍破浸一宿漉出焙乾上為末每服一錢入生薑三片煎六分食後臨臥時溫服火鬱湯出東垣蘭室方治五心煩熱是火鬱於地中四肢者土也心火下陷在脾土之中升麻根葛根柴胡根白芍藥等分上同㕮咀每服三錢或四錢水二大盞入連須蔥白三寸煎至一盞去滓稍熱服治心臟積熱口臭喉中氣壅精神恍惚心中煩躁面赤非時潮熱吃些咸物即噁心思吐少氣力小便赤澀大便祕熱楊子建萬全護命方黃芩貝母去心升麻玄參麻黃去根麥門冬去心紫菀柴胡去毛桔梗牡丹皮木香以上各一分胡黃連三銖上搗羅為細末每服二錢水一盞煎取八分食後去滓溫服柴胡升麻湯出試效方治男子婦人四肢發困熱筋骨熱表熱如火燎於肌膚捫之烙人手熱夫四肢者屬脾脾者土也熱伏地中此病多因血虛而得之也又有胃虛過食冷物郁遏陽氣於脾土之中並宜服之羌活升麻葛根白芍藥人參獨活各半兩柴胡三錢甘草炙三錢防風二錢半生甘草二錢上件㕮咀如麻豆大每服五錢水三盞煎至一盞去滓溫服忌寒冷之物火鬱湯出試效方治五心煩熱是火鬱於地中四肢者脾土也心火下陷於脾土之中鬱而不得伸故經云火鬱則發之是也升麻葛根柴胡白芍藥甘草炙各一兩防風半風上件㕮咀如麻豆大每服稱三錢或四錢水二盞入連須蔥白三寸煎至一盞去滓稍熱服之不拘時人參散出經驗方生心胃氣散滯郁新羅人參沉香白茯苓各半兩大麥糵一兩丁香一錢上為末每服二錢水一中盞生薑二片煎至六分去滓熱服空心食前大妙地黃散出衛生寶鑑治心臟積熱口乾煩渴頰赤舌澀生津液兼治汗後餘熱防風一兩地骨皮一兩甘草半兩人參三錢上為末每服三錢水一盞入青蒿五七葉同煎至七分去滓溫服如無青蒿用竹葉五七片涼補丸出衛生家寶方治心經積熱思慮過多一切漏精白濁等病久則飲食減少轉成勞傷此藥上涼心膈下補元陽肉蓯蓉薄切用酒浸一宿火焙乾澤瀉切焙乾石菖蒲菟絲子用酒浸一宿研爛焙乾黃耆火炙細銼為末川楝子細銼山茱萸以上七味各半兩熟乾地黃一兩淨洗焙乾為末上為細末煉蜜為丸如梧桐子大每服三十丸食前空心鹽酒鹽湯下如五淋病用豆淋酒服鐵粉丸出指南方治凡熱則脈洪數由脾氣上郁心經鐵粉二兩辰砂一兩牛黃天竺黃鉛白霜半兩天南星一兩上為末生薑煮麵糊為丸如梧桐子大薑湯下五丸療煩悶本草以白朮末水調方寸匕止心煩躁悶本草以藍汁服之一方塗五心主心悶煩熱本草頭風旋目眩心中漾漾欲吐猝失音及小兒心熱驚癇止消渴除痰令人不睡取荊莖條截於火上燒之兩頭以器承取瀝汁飲之治心脾熱舌頰生瘡方本草用柏皮以蜜勻炙與青黛各一分入生龍腦一字研勻當摻瘡上有涎即吐解煩悶本草以白粱粟經三五年陳者或呼為粢米作粉食之治心腹煩悶本草以乾薹用冷水研如泥飲之即止主大毒熱心腹煩滿本草以胡桐淚水和服之止煩悶本草用白冬瓜搗絞汁服之通利五臟本草用芥子微熬研之作醬食治胸中煩悶邪氣止渴本草以蟶煮食之於飯後食之佳與服丹石人相宜天行病後不可食切忌治支節筋骨煩熱毒及消脹腫本草取牛蒡子三七粒熟挼食前吞之十服後甚良細切根如小豆大拌麵作飯煮食尤良治熱攻心煩躁恍惚用黑豆味甘平半升淘淨以水二升煮取七合去滓食後服之心胸煩熱附論夫心氣盛實氣血壅澀陰陽不通營衛隔塞上焦壅滯故令心胸煩熱也方羚羊角散出聖惠方治心胸煩熱渴逆頭痛羚羊角屑柴胡去苗赤茯苓各一兩葛根銼赤芍藥甘草炙微赤銼梔子仁各半兩石膏二兩麥門冬三分去心黃芩半兩上為散每服三錢以水一中盞入竹葉七片豉三十粒煎至六分去滓不計時溫服麥門冬散出聖惠方治心胸煩熱眠臥不安或大小便不利口舌生瘡麥門冬去心黃芩各三分枳殼麩炒微黃去瓤大青黃連去須犀角屑川升麻小草甘草炙微赤銼各半兩川芒硝一兩上為散每服三錢水一中盞煎至六分去滓食後溫服真珠散出聖惠方治心胸煩熱口舌乾燥心神不利真珠粉琥珀末寒水石天竺黃馬牙硝鐵粉硃砂甘草末生用各半分栝蔞根一分上同研令細每服半錢不計時候竹葉湯放溫調下人參散出聖惠方治心胸煩熱不思飲食人參去蘆頭沙參去蘆頭赤茯苓黃耆銼地骨皮麥門冬去心柴胡去蘆頭羚羊角屑各一兩甘草半兩炙微赤銼上為散每服三錢水一中盞煎至六分去滓不拘時溫服地骨皮散出聖惠方治心胸中久積煩熱口乾頰赤地骨皮葳蕤玄參黃耆銼子芩麥門冬去心川升麻各一兩甘草半兩炙微赤銼上為散每服三錢水一中盞入竹葉七片煎至五分去滓入生地黃汁蜜各半合更煎一兩沸不計時溫服含化玉液丸出聖惠方治心胸煩熱口乾舌澀心神壅悶寒水石研石膏研如粉葛根栝蔞根赤茯苓各一兩烏梅肉半兩炒麥門冬一兩半去心焙龍腦一錢研入上為末入研了藥令勻煉蜜和丸如彈子大每服一丸薄綿裹含化咽津黃芩散出聖惠方治心胸煩熱頭疼目澀煩渴不止黃芩赤茯苓麥門冬去心各一兩石膏二兩甘草炙微赤銼葛根銼甘菊花各半兩上為散每服三錢水一中盞入豉二七粒淡竹葉二七片煎至五分去滓入生地黃汁一合更煎一兩沸不拘時溫服甘露散治心胸煩熱不得安定甘草不灰木各半斤上藥須是臘月內預辦修合取雪水浸過陰乾又投入水中如此三二十度後陰冷極干搗細羅為散每服不計時以新汲水調下一錢除胸膈熱痰用三白草搗絞汁服令人吐逆治胸中痞塞熱結者可多食好生梨即通止心中酸水以楂子食之去心胸煩熱熱風恍惚明目鎮心溫補久服好顏色變白去風不忘用大豆食罷生服半掬治服藥失度心中苦煩取生葛根汁飲之大良無生者搗乾葛末水服五合亦可煮服之利肢節去五臟中煩悶氣以蟹用醋食之八月後食之佳治胸中煩熱或渴心躁用葛粉四兩先以水浸粟米半升經宿漉出與葛粉相拌令勻煮熟食之除胸中實熱氣以鳧茨作粉食之解肌下膈去胸中煩以茵陳蒿研作飲服之心臟風熱附論夫心屬火主於血血實則生熱風邪搏於陽經傷於血脈榮氣不行心臟壅滯邪熱之氣稽留不散則令心胸煩亂語錯多驚故名風熱也方龍齒散出聖惠方治心臟風熱心神恍惚煩躁多驚不得眠臥龍齒細研甘草炙微赤銼甘菊花各半兩硃砂細研如粉犀角屑防風去蘆頭羌活細辛荊芥枳殼麩炒微黃去瓤天竺黃細研茯神沙參去蘆頭天麻川升麻子芩麥門冬去心焙羚羊角屑各一兩牛黃研入龍腦各一分錢細研上為細散入研了藥令勻每服食後煎竹葉湯調下一錢硃砂丸出聖惠方治心臟風熱多驚恍惚煩躁語澀硃砂細研水飛過龍齒細研天竺黃細研馬牙硝犀角屑人參去蘆頭茯神川升麻羚羊角屑天麻麥門冬去心焙獨活甘菊花子芩各一兩牛黃細研麝香細研各一分虎睛三對酒浸一宿微炙甘草半兩炙微赤銼金銀箔各一百片細研上為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時以荊芥湯嚼下十丸犀角散出聖惠方治心臟久積風熱臟腑壅滯口乾舌縮神思不安犀角屑硃砂細研如粉防風去蘆頭細辛天竺黃細研茯神龍腦細研各一分兩川大黃銼碎微炒羌活麥門冬去心焙赤芍藥白殭蠶微炒檳榔各一兩羚羊角屑甘草炙微赤銼梔子仁子芩各半兩麝香一錢細研上為細散入研了藥令勻每服不計時煎竹葉湯調下一錢鐵粉散出聖惠方治心臟風熱頭痛面赤心煩時多驚恐精神