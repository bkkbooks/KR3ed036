乾地黃四錢五味子菖蒲遠志石葦各三錢上藥治下篩食後或酒或水服方寸匕三十日力倍六十日氣力強意足歸脾湯出醫方大成治思慮過度勞傷心脾健忘怔忡白朮茯神去木黃耆去蘆龍眼肉酸棗仁炒去殼各一兩人參木香不見火各半兩甘草炙二錢半上㕮咀每服四錢水一盞半生薑五片棗二枚煎七分去滓溫服不拘時人參湯治善忘小便赤黃多夢亡人或夢居水中驚恐惕惕目視䀮䀮不欲聞人聲食不知味安神定志人參甘草炙各二兩半夏湯洗去滑七遍三兩龍骨炙遠志去心焙各六兩麥門冬去心石膏熟乾地黃各四兩上搗篩每服五錢水一盞半大棗二枚擘破小麥五十粒煎八分去滓入炙阿膠一片飴糖半匙再煎少頃食後溫服日三桂心湯出千金方治驚勞失志健忘桂去粗皮白龍骨炙防風去叉遠志去心麥門冬去心牡蠣燒研甘草炙各一兩茯神去木五兩上銼如麻豆每服五錢水一盞半入大棗二枚擘破煎八分去滓空心溫服日三遠志散出聖惠方補心定志益智明目遠志去心人參去蘆頭菖蒲熟乾地黃各一兩白茯苓決明子薯蕷各三錢桂心半兩上為細散食前以溫粥飲調下一錢養命開心益智方出千金方乾地黃人參茯苓各二兩蓯蓉菟絲子遠志各三兩蛇床子二兩分上藥治下篩服方寸匕日二忌兔肉余無忌加味茯苓湯出危氏方治痰迷心胞健忘失事言語如癡人參去蘆頭半夏湯洗陳皮去白一兩半白茯苓去皮一兩粉草五錢益智去殼香附子炒去毛各一兩上銼散每服四錢水一盞半姜三片烏梅半個同煎不拘時溫服七聖丸治健忘益心令人聰明白茯苓去黑皮二兩桂去粗皮遠志去心人參天門冬去心焙菖蒲地骨皮各一兩上為末煉蜜丸如梧桐子大食後茶酒下三十丸小定志丸出永類鈐方治心氣不定五臟不足甚者憂愁不樂忽忽喜忘朝瘥暮劇暮瘥朝發及因事有所大驚夢寐不祥登高涉險致神魂不安驚悸恐怯常服益心強志令人不忘菖蒲炒遠志去心薑汁淹各三兩茯苓茯神人參各一兩辰砂為衣上為末蜜丸如梧桐子大每服五十丸米湯下一方去茯神名開心散飲服二錢匕不以時人參煮散出楊子建護命方治久懷憂戚氣滯血澀失志健忘飲食無味精神錯亂心中不安方人參遠志去心桑寄生各半兩牡丹皮一錢木香一錢半沉香二錢上為散每服二錢水一盞煎八分溫服不拘時治多忘令人不忘方出千金方菖蒲二分茯神茯苓人參各五分遠志七分上為散酒服方寸匕日三夜一五日後令人聰明益智久服至老不忘又方千金方蓯蓉續斷各一分遠志菖蒲茯苓各三分上為散酒服方寸匕日三至老不忘遠志散治心熱健忘補心氣強力益志遠志去心黃連去須各八兩菖蒲三兩白茯苓去黑皮一兩半人參一兩半上為散食後酒調方寸匕日二夜一山芋丸治心臟氣虛恐怖驚悸恍惚健忘煩悶羸瘦山芋熟乾地黃焙黃耆銼各一兩菖蒲半兩遠志去心一兩半上為末煉蜜和丸如梧桐子大每服二十丸溫酒或米飲下不拘時候服龜甲散出千金方治善忘開心智強力益志龜甲炙龍骨一方用木通不用龍骨遠志去心菖蒲各半兩上為散酒服方寸匕日三常服令人大聰明一方食後水服治健忘方千金方天門冬遠志茯苓乾地黃各等分上為末蜜丸如梧桐子大酒服二十丸日三加至三十丸常服勿絶茯神散出聖惠方補心虛治健忘久服聰明益智茯神龍骨各三錢人參去蘆頭二錢熟乾地黃一兩菖蒲三錢遠志半兩去心麥門冬一兩去心上為散每服三錢水一中盞棗三枚煎六分去滓食前溫服豫知散出千金方治好忘久服聰明益智及治神思虛弱健忘龍骨白者虎骨酥炙遠志肉各等分上為散食後方寸匕日二一方酒服方寸匕一方生薑湯下又方出千金方以七月七日用麻勃一升人參二兩為末蒸令氣遍臨臥服一刀圭盡知四方之事一方以溫粥飲調下一錢治人心昏塞多忘喜誤出肘後方取商陸花陰乾百日搗末日暮水服方寸匕臥思念所欲事即於眼中自覺商陸花亦名樟柳花治好忘久服聰明益智出聖惠方常以五月五日取東向桃枝日未出時作三寸木人著衣帶中令人不忘矣一方戊子日取東邊桃枝二七枝縛著臥床中枕之不忘治人心昏塞多忘喜誤方出千金方以七月七日取蜘蛛網著衣領中勿令人知不忘治人心昏悶多忘喜誤出肘後方以丙午日取鱉甲著衣帶上良一用五月五日治人心昏塞多忘喜誤出千金方以丁酉日密自至市買遠志著巾角中還為末服之勿令人知一方著衣常帶令人不忘抱朴子云陵陽仲子服遠志二十年開書所視便記而不忘治好忘久服聰明益智出千金方以七月七日取菖蒲酒服方寸匕飲酒不醉好事者服而驗之不可犯鐵若犯之令人吐逆一方常以甲子日取石上菖蒲一寸九節者陰乾百日治下篩服方寸匕日三耳目聰明不忘療人心孔昏塞多忘喜誤出聖惠方取牛馬豬雞心干之末向日酒服方寸匕日三聞一知十養生方男子勿北首臥神魂不安多愁忘瓊方既濟丸出衛生家寶方治為事健忘神志不安夢寐驚悸不思飲食腎水無所滋養腰重腳弱行履少力精神恍惚小便頻數常服益心氣補丹田婦人常服有子白茯苓破故紙各一斤上為細末酒糊為丸如梧桐子大空心食前溫酒米飲下三四十丸排風湯出聖惠方治健忘茯苓茯神酸棗仁人參黃耆當歸白芍藥遠志各半兩甘草二錢蓮肉半兩上薑棗煎服琥珀丸出楊氏家藏方寧神養志安睡固精血悅澤顏色滋益營衛人參去蘆頭一斤切碎水二升銀鍋內熬去水一升濾過取人參汁再熬成膏和衆藥附子一枚重八錢炮去皮臍遠志湯浸去心沉香龍骨飛過琥珀別研上五味各一兩巴戟湯過去心防風去蘆頭半夏曲蓮子心紫石英研細飛過白茯苓去皮石菖蒲茯神去木熟乾地黃洗焙柏子仁乳香別研麥門冬去心牡蠣火煅取粉辰砂細研飛過酸棗仁炒以上十五味各半兩安息香酒煮去滓石熬成膏上件為細末次入辰砂乳香琥珀安息香膏子人參膏子和丸如梧桐子大每服五十丸日午及臨臥溫熟水送下定志丸出楊氏家藏方治怔忪健忘精神恍惚睡臥不寧一切心疾人參去蘆頭白茯苓去皮石菖蒲遠志去心龍齒酸棗仁鐵粉別研硃砂飛過麥門冬去心焙乾乳香麝香琥珀別研上件各等分為末入硃砂鐵粉同研勻絞生地黃汁浸蒸餅為丸如梧桐子大別用硃砂為衣每服二十丸溫熟水下養心丸出楊氏家藏方治憂慮太過健忘怔忪睡多恐惕夢涉險危自汗不止五心煩熱目澀昏暗夢寐失精口苦舌乾日漸羸瘦全不思飲食茯神去木人參去蘆頭綿黃耆酸棗仁去皮稱別研成膏以上四味各一兩熟乾地黃焙乾遠志去心五味子柏子仁別研成膏以上四味各半兩硃砂三分研細水飛上件為細末入二膏和勻研細煉蜜為丸如梧桐子大每服五十丸食後臨臥濃煎人參湯送下遠志丸出楊氏家藏方治憂愁思慮過多苦勞心神恍惚健忘睡臥不寧遠志去心石菖蒲茯苓去木以上三味各一兩天竺黃酸棗仁炒以上二味各半兩硃砂三錢別研犀角屑龍齒燒研以上二味各一錢上件除別研外併為細末煉蜜為丸如梧桐子大每服三十丸溫熟水送下食後臨臥服真珠丸出楊氏家藏方治心氣不足上焦壅熱涎壅上盛睡臥不寧身體發熱口燥咽乾真珠末白朮硃砂別研一半入藥一半為衣三味各半兩白茯苓去皮半兩人參去蘆頭一兩麝香別研腦子別研二味各一錢上件為末用豬心血為丸如梧桐子大硃砂為衣每服三十丸煎人參湯送下食後服主鎮安魂魄珠蜜方出本草煉真珠如大豆以蜜一蜆殼和一服與一豆許日三大宜小兒安魂鎮神令人聰明出本草採桑椹曝乾和蜜食之
