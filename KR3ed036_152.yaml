body:
  text: 卷一百五十二熱病門總論夫熱病者皆傷寒之類也冬傷於寒至春變為溫病至夏變為暑病者熱重於溫也肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥心熱病者先不樂數日乃熱熱爭則卒心痛煩熱欲嘔頭痛面赤無汗脾熱病者先頭重頰痛心煩欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒腎熱病者先腰痛脛酸大渴數飲身熱熱爭則項痛而強脛寒且酸足下熱不欲言肝熱病者左頰赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰赤腎熱病者頤先赤病雖未發見色者療之名曰治未病一曰汗不出大顴發者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔血者死六曰舌本爛熱不已者死七曰咳血而衄汗出不至足者死八曰髓熱者死九曰熱而痙者死凡有此候者皆不可治也熱病已得汗脈靜者生脈躁者難治熱病脈常盛躁而不得汗者此陽之極也得汗者生不得汗者難瘥熱病已得汗脈尚燥喘且即復熱喘盛者死熱病七八日脈不躁不數後三日當有汗若不汗者難治熱病七八日其脈微小者生脈代舌焦乾黑者死熱病已得汗常熱不去脈靜者生脈躁者難治熱者脈常躁此氣之極也亦死熱病腹滿常喘熱不退者死熱病多汗脈虛小者生緊實者死矣又云熱病者皆傷寒之類是也或愈或死皆以六七日之間其餘以十日以上者何不知其解願聞其故岐伯曰巨陽者諸陽之屬也其脈連於風府故諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病必不能免於死矣帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項疼腰背強二日陽明受之陽明主肌肉其脈夾鼻絡於目故身熱目痛鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於目故胸脅痛而耳聾三陽經絡皆受其病而未入於臟故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺繫於舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微開十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縮小腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰矣未滿三日可汗而已其滿三日可下而已熱病一日附論夫熱病一日病在太陽主表表謂皮膚也病在皮膚之間故頭項腰脊皆痛宜汗之則愈也方解肌散出聖惠方治熱病一日頭痛身熱四肢煩疼宜服麻黃去根節川升麻甘草炙微赤銼赤芍藥柴胡去苗桔梗去蘆頭杏仁湯浸去皮尖雙仁麩炒微黃各一兩上為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗未汗再服石膏散出聖惠方治熱病一日頭痛壯熱宜服石膏麻黃去根節各二兩黃芩桂心赤芍藥柴胡去苗各一兩上為粗散每服三錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗未汗再服葛根散出聖惠方治熱病一日頭痛項強身熱如火宜服葛根銼赤芍藥麻黃去根節石膏各二兩白芷柴胡去苗黃芩桂心各一兩上為粗散每服四錢以水一大盞入蔥白五寸生薑半分煎至五分去滓不計時候熱服衣覆取汗柴胡散出聖惠方治熱病一日頭痛壯熱煩悶宜服柴胡去苗赤芍藥葛根各一兩梔子仁黃芩各半兩石膏二兩上為散每服四錢用水一大盞蔥白二莖豉半合煎至五分去滓不計時候溫服梔子散出聖惠方治熱病一日頭痛壯熱心中煩悶宜服梔子仁黃芩各三分石膏葛根銼柴胡去苗麥門冬去心焙各一兩上為粗散每服四錢以水一中盞入豉五十粒蔥白二莖煎至五分去滓不計時候溫服麻黃散出聖惠方治熱病一日頭痛壯熱宜服麻黃一兩去根節川大黃三分銼碎微炒黃芩桂心甘草炙微赤銼赤芍藥各半兩上為細散每服不計時候以新汲水調三錢服後蓋衣取汗未汗再服治熱病一日壯熱頭痛宜服出聖惠方甘草一兩炙微赤銼生薑三分切栝蔞二枚大者細銼碗中盛之上先將甘草生薑以酒一大盞半煎至八分去滓熱投入栝蔞碗中絞取汁不計時候分溫二服衣覆取汗桃柳湯浴方出聖惠方治熱病一日身體壯熱頭痛骨肉酸楚背脊強口鼻乾手足微冷小便赤黃宜用桃枝並葉五片細銼柳枝並葉五片細銼上以水一石煮取一斗去滓帶熱避風處淋浴浴後於密室中刺頭並眼後兩邊及舌下血斷以鹽末塗針處便宜服葛豉粥葛豉粥方出聖惠方葛根二兩銼蔥白五莖並須白豉一合生薑一兩切上藥以水三大盞煎至一盞半去滓下粳米二合煮作粥承熱頓服衣蓋取汗麻黃粥方出聖惠方治熱病一日宜服發汗麻黃一兩去根節豉半合上藥用水一大盞半煎至一盞去滓下粳米半合煮作稀粥承熱頓服衣蓋取汗麻黃散出萬金護命方治熱病疫毒病一日兩日頭痛壯熱渾身發熱如火眼目昏眩項背強急診其脈寸口浮數總三部俱浮數宜發汗若洪大緊急有骨力即不可汗也但熱病疫毒病不可以時日為定只看脈氣可汗即汗可取即取不可差誤凡陽毒傷寒三日後其用藥取病與治熱病疫病只一般也惟初間兩日所治小有不同但傷寒在表須當發之熱病疫毒病往往有不須發也若見得不仔細須俟三日後方可下疏藥也治疫毒在表發汗方麻黃去根三分牡丹皮去心桔梗羌活獨活細辛荊芥穗各一兩上細杵羅為末每服五錢水一碗椒五十粒茶末半錢煎取濃汁用調下藥末非時和滓吃厚蓋衣被髮大汗一服安效治時行熱病初得出本草以菾菜搗絞汁飲之得瘥熱病二日附論夫熱病二日陽明受病病在肌肉故內熱鼻乾不得眠也故可摩膏火灸發汗而愈也方麻黃散出聖惠方治熱病二日頭痛壯熱肢節不利宜服麻黃二兩去根節川大黃銼碎微炒葛根銼桂心柴胡去苗赤芍藥各一兩甘草半兩炙微赤銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣蓋取汗前胡散出聖惠方治熱病二日口苦咽乾頭痛壯熱宜服前胡去蘆頭杏仁湯浸去皮尖雙仁麩炒微黃各一兩葛根銼桂心旋覆花各半兩麻黃二兩去根節上為散每服五錢以水一大盞入生薑半分蔥白五寸煎至五分去滓不計時候熱服衣覆取汗未汗再服桂枝散出聖惠方治熱病二日頭痛壯熱宜服桂枝葛根赤芍藥甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃各半兩麻黃三分去根節石膏一兩上為粗散每服三錢水一中盞入蔥白五寸生薑半分煎至五分去滓不計時候熱服衣覆取汗未汗再服柴胡散出聖惠方治熱病二日頭痛口苦雖經發汗未解可服柴胡去苗人參去蘆頭甘草炙微赤銼黃芩赤茯苓各一兩半夏半兩湯洗七次去滑上為粗散每服三錢以水一中盞入蔥白五寸生薑半分煎至六分去滓不計時候溫服令自有汗即解黃芩散黃芩三分麻黃去根節石膏各一兩川大黃銼碎微炒葛根銼桂心赤芍藥甘草炙微赤銼川朴硝各半兩上為細散每服不計時候以蔥豉湯調下二錢衣蓋取汗未汗再服治熱病二日發汗未解頭痛壯熱宜服此方出聖惠方麻黃去根節甘草炙微赤銼葛根各一兩上細銼和勻分為六服每服以水一大鐘入生薑半分煎至五分去滓不計時候熱服衣蓋取汗治熱病二日發汗後不解頭痛體熱宜服此方出聖惠方石膏一兩細研麻黃半兩去根節甘草一分炙微赤銼上並銼用水一大盞煎至五分去滓入雞子白一枚攪勻不計時候承熱頓服衣蓋取汗未汗再服熱病三日附論夫熱病三日諸陽傳病訖病猶在表未入於臟故胸脅痛耳聾可發汗而愈也方葛根散出聖惠方治熱病三日未得汗壯熱煩惱欲得飲水宜服葛根銼川大黃銼碎微炒黃芩桂心赤芍藥柴胡去苗各一兩麻黃二兩去根節梔子仁甘草炙微赤銼各半兩上為粗散每服四錢以水一中盞入生薑半分煎至五分去滓不計時候稍熱服令有汗為度大黃散出聖惠方治熱病三日發汗未解頭痛口乾心胸煩悶宜服川大黃銼碎微炒柴胡去苗麻黃去根節各一兩秦艽一兩半去苗石膏二兩甘草半兩炙微赤銼上為粗散每服四錢以水一中盞入生薑半分去滓不計時候稍熱頻服汗出為度柴胡飲子出聖惠方治熱病三日頭痛口苦寒熱往來宜服柴胡去苗木通銼赤芍藥各一兩半石膏二兩半搗甘草半兩炙微赤銼上為細銼和勻每服半兩用水一大盞煎至五分去滓不計時候溫服麻黃散出聖惠方治熱病三日頭疼壯熱宜服麻黃去根節知母葛根各一兩赤芍藥一兩半黃芩炙微赤銼白藥子梔子仁細辛柴胡去苗各半兩石膏二兩上為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候稍熱服衣蓋取汗發汗桂心散出聖惠方治熱病三日表猶未解壯熱頭目四肢不利宜服桂心赤茯苓澤瀉赤芍藥各半兩柴胡去苗葛根銼麻黃去根節各一兩甘草一分炙微赤銼上為粗散每服五錢以水一中盞入薄荷二七葉煎至六分去滓不計時候稍熱服衣蓋取汗未汗再服苦參散出聖惠方治熱病三日解毒氣苦參一兩銼黃芩二兩甘草半兩炙微赤銼上為粗散每服五錢以水一大盞煎至六分去滓入生地黃汁一合攪令勻不計時候分溫二服知母散出聖惠方治熱病三日經發汗熱退後尚寒熱往來不能飲食宜服知母一兩枳實麩炒微黃梔子仁各一兩半上為散每服五錢用水一大盞入豉少許煎至五分去滓不計時候溫服熱病四日附論夫熱病四日太陰受病太陰者三陰之首也三陽受病訖傳入於陰故毒氣入於胸膈其病咽喉干胸腹滿故可吐而愈也方苦參散出聖惠方治熱病四日結胸滿痛壯熱身體疼痛宜服令吐苦參銼常山各半兩上為散以水二中盞煎至一盞去滓不計時候盡飲之當吐即愈未吐再服瓜蒂散出危氏方治熱病四日咽喉干而腹滿胸有寒痰當吐諸亡血虛家不可與服瓜蒂一分赤小豆一兩上搗粗羅為散每服二錢以水一中盞煎至五分去滓不計時候溫服以吐為度一方用香豉半合同煎服一方治內傷為細末溫水調一錢以吐為度如傷之太重備急丸獨行丸皆急藥也倉卒無藥糟瓜頓吃亦一吐柴胡散出聖惠方治熱病四日壯熱四肢沉重吃食不下宜服柴胡去苗葛根銼川大黃銼碎微炒石膏前胡去蘆頭鱉甲塗醋炙微黃去裙襴各一兩赤芍藥黃芩各三分梔子仁甘草炙微赤銼各半兩川朴硝一分上粗搗羅為散每服五錢以水一大盞煎至五分去滓不計時候溫服麻黃散出聖惠方治熱病四日毒氣內攻身體痛壯熱頭重煩渴不止宜服麻黃去根節茵陳栝蔞根各一兩桂心細辛柴胡去苗甘草炙微赤銼各半兩川大黃三分銼碎微炒上粗搗羅為散每服五錢以水一大盞煎至五分去滓不計時候溫服葛根散出聖惠方治熱病四日發汗不瘥身體壯熱心膈煩悶不得睡臥宜服葛根銼石膏各二兩龍膽草去蘆頭大青桂心甘草炙微赤銼各半兩麻黃去根節葳蕤赤芍藥黃芩川升麻各一兩上為粗散每服四錢以水一大盞煎至五分去滓不計時候溫服竹茹散出聖惠方治熱病四日頭痛胸滿食即嘔逆宜服竹茹陳橘皮湯浸去白瓤焙葛根銼人參去蘆頭蘆根銼各一兩枇杷葉半兩拭去毛炙微黃上為散每服五錢以水一大盞入粳米一百粒生薑半分煎至五分去滓不計時候溫服人參散出聖惠方治熱病四日熱毒解後時來時往惡