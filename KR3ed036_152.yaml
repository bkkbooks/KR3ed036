治熱病汗後餘熱不除寒熱往來頭重體痛宜服此方出聖惠方葛根銼黃耆銼梔子仁柴胡去苗石膏各一兩地骨皮黃芩各三兩分甘草半兩炙微赤銼上為粗散每服三錢以水一中盞入豉三十粒煎至五分去滓不計時候溫服茵陳散出聖惠方治熱病汗後餘熱不解頭項出汗身上無汗瘀熱在內渴欲飲水小便不利宜服茵陳豬苓去黑皮桑根白皮銼木通銼甘草炙微赤銼各半兩梔子仁川大黃銼碎微炒秦艽去苗各三分柴胡去苗各一兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服之葛根散出聖惠方治熱病汗後餘熱不解往來寒熱不定宜服葛根銼赤芍藥各三兩麻黃去根節柴胡去苗麥門冬去心各一兩大青葳蕤黃芩甘草炙微赤銼各半兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服黃芩散出聖惠方治熱病後餘熱不解身體沉重宜服黃芩川升麻石膏麻黃去根節各一兩黃連去須三分梔子仁甘草炙微赤銼各一分上為粗散每服四錢以水一中盞煎至六分去滓不計時候溫服犀牛角散出聖惠方治熱病汗後餘熱不退頭痛唇乾宜服犀角屑知母川升麻麥門冬去心黃芩葛根銼各一兩黃連三分去須甘草半兩炙微赤銼石膏二兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服治熱病汗後餘熱不解宜服此方川升麻黃芩各三分黃連去須恆山各一兩上為散每服四錢以水一中盞煎至六分去滓空心溫服得吐即止未吐再服石膏散出聖惠方治熱病已得汗餘熱未退宜服石膏一兩半知母人參去蘆頭葳蕤甘草三分炙微赤銼上為粗散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服人參散出聖惠方治熱病汗後餘熱不除煩躁恍惚不安宜服人參去蘆頭梔子仁藍葉甘草炙微赤銼白蘚皮大青各一兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服治熱病口中苦下氣除熱喉中鳴煎方出千金方石膏半升蜜一升上二味以水三升先煮石膏二升次納蜜復煎取如餳含如棗核許盡復含之大良
