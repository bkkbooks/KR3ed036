body:
  text: 卷一百二十積熱痼冷門諸熱痼冷附論夫苟得其養無物不長苟失其養無物不消人之處世飲食為上湯藥次之惟其口腹是充嗜欲無節所以臟中停寒而為之沉痼也男子精流女子帶下骨寒腦冷氣乏血衰嘔吐噁心久泄暴下皆其證耳療治之法雖貴乎溫補不貴乎太剛惟於滋血養氣中佐以薑桂雄附為愈抑古人所謂精不足者補之以味繼此尤當加意焉若失熱劑剛燥極欲陽氣頓回吾恐腎水易涸心火獨炎識者應保其性方沉香蓽澄茄散出和劑方治下經不足內挾積冷臍腹弦急痛引腰背面色痿黃手足厥冷脅肋虛滿精神困倦臟腑自利小便滑數大能補護四十以上者宜服之附子炮去臍四兩沉香蓽澄茄葫蘆巴微炒肉桂去粗皮茴香舶上者微炒補骨脂微炒巴戟天去心木香川楝炮去核各一兩川烏炮去皮臍半兩桃仁去皮尖麩炒二兩上同為細末每服二錢水一大盞入鹽末少許煎八分去滓稍熱服之如盲腸小腸一切氣痛服之有效空心食前服艾硫丸出十便良方去邪養正補真益脾治髓冷血虛腰疼腳弱及傷冷心腹疼痛霍亂吐利自汗氣急下元久虛小便頻數婦人衝任不足月水愆期腹脅刺痛崩漏帶下全不思飲食兼治傷寒陰證手足厥冷脈微自汗熟艾十兩用糯米一升煎成粥澆在艾上用手拌令勻於日中曬乾乾薑十兩生硫黃附子各二兩上為細末麵糊丸如桐子大每服三十丸或五十丸溫米飲下食前附子理中丸出和劑方治脾胃冷弱心腹絞痛嘔吐泄利霍亂轉筋體冷微汗手足厥寒心下逆滿腹中雷鳴嘔吐噦不止飲食不進及一切沉寒痼冷並皆治之附子炮去皮臍人參去蘆乾薑炮甘草炙白朮各三兩上為細末煉蜜和丸每兩作一十丸每服一丸以水一盞化破煎至七分稍熱服之空心食前服一方小兒分作二三服大小以意加減紫沉煎丸出醫方大成治虛寒積冷伏滯陰氣心腹膨脹兩脅疼痛巴豆霜一分酒半升先入銀器內煮之硫黃滴水研極細青皮胡椒硇砂各一兩酒半升煮去石入巴豆納酒內熬如稀糊入沉香前項藥作一處熬成膏人參丁香阿魏酒半升研花盡沒藥搗碎酒半升化盡入匕酒檳榔官桂不見火各一兩乾薑三分良薑一兩水煮六七沸日乾木香不見火硃砂半兩別研沉香一兩使煉蜜一斤別研上為末次入硫黃硃砂二味研勻入前膏於臼內杵三千下丸如梧桐子大每服三十丸陳皮湯下如猝暴心痛醋嚼下立見效驗北亭丸出和劑方治脾元氣弱久積寒冷心腹脅肢脹滿刺痛面色青黃肌體瘦弱怠惰嗜臥食少多傷噫氣吞酸噦逆噁心腹中虛鳴大便泄利胸膈痞塞食飲不下嘔噦霍亂體冷轉筋及五膈五噎痃癖瘕聚翻胃吐食久痛久利並皆治之縮砂仁胡椒肉桂去粗皮厚朴去粗皮薑汁炙附子炮去皮臍川芎當歸去蘆頭銼碎陳皮去白乾薑炮甘草炙各四兩青鹽別研二兩白朮別搗末三兩入北亭即硇砂也醋淘炒研用三兩五味子揀一兩半阿魏醋化去砂石半兩上為末用銀石鍋內入好酒醋五升白沙蜜一十兩先下北亭阿魏青鹽三味並好頭面一升同煎稠黏便下藥末半斤以來更煎如稀麵糊漸漸入藥末煎得所離火取出更以干藥末和搜成劑更搗一千杵丸如梧桐子大每服十五丸微嚼破用生薑鹽湯下溫酒亦得空心服之忌羊血豉汁黑錫丹出和劑方治脾元久冷上實下虛胸中痰飲或上攻頭目徹痛目瞪昏眩及奔豚氣上衝胸腹連兩脅膨脹刺痛不可忍氣欲絶者及陰陽氣上下不升降飲食不進面黃羸瘦肢體浮腫五種水氣腳氣上攻及牙齦腫痛滿口生瘡齒欲落者兼治脾寒心痛冷汗不止或猝暴中風痰潮上膈言語艱澀神昏氣亂喉中痰響狀似癱瘓曾用風藥吊吐不出者宜用此藥百粒煎薑棗湯灌之壓下風涎即時蘇省風涎自利或觸冒寒邪霍亂吐瀉手足逆冷唇口青黑及男子陽事痿怯腳膝痠軟行步乏力臍腹虛鳴大便久滑及婦人血海久冷白帶自下歲久無子血氣攻注頭面四肢並宜服之兼療膈胃煩壅痰飲虛喘百藥不愈者常服克化飲食養精神生陽逐陰消磨冷滯除濕破癖不動真氣使五臟安寧六腑調暢百病不侵歌曰陰損陽衰實可傷縱調營衛亦難將氣羸血運痰生者試聽桑君為發揚又歌曰夫妻合會功成肆鈴子沉香一兩賒木附葫蘆陽起破桂茴肉豆等無差梧桐酒糊精修煉反老還童事可嘉沉香附子炮去皮臍葫蘆巴酒浸炒陽起石研細水飛肉桂去皮只須半兩茴香舶上者炒破故紙酒浸炒肉豆蔻麵裹煨金鈴子蒸去皮核木香各一兩黑錫去渣稱硫黃透明者結沙子各二兩上用黑盞或新鐵銚內如常法結黑錫硫黃砂子地上出火毒研令極細余藥並杵羅為末都一處和勻入研自朝至暮以黑光色為度酒糊丸如梧桐子大陰乾入布袋內搽令光瑩每服三四十粒空心姜鹽湯或棗湯下婦人艾醋湯下附子茴香散出醫方大成治氣虛積冷心腹絞痛肉豆蔻煨茴香炒木香白朮炒人參白茯苓乾薑炮各一兩附子大者一枝炮去皮臍丁香甘草炙各半兩上㕮咀每服三錢水一盞鹽少許煎七分空心服走馬茴香丸出御藥院方治丈夫積年傷憊久冷及治痃氣備急黑附子去皮臍桂葫蘆巴馬蘭花炒青橘皮去白舶上茴香川楝子炒乾薑炮巴戟去心破故紙各半兩上為末用酒打麵糊和劑為丸如緑豆大每服空心鹽湯下二十丸安息香丸治虛冷補元陽益氣血安息香天雄炮裂去皮臍硫黃研陽起石研附子炮裂去皮臍鍾乳研白礬熬令汁枯研木香蛇床子炒白龍骨研各一兩上為末更合研三日用黃狗外腎去筋膜細研依法酒熬成膏和劑丸如梧桐子大每服二十丸溫酒下金鎖正元丹出和劑方治真氣不足元臟虛弱四肢倦怠百節痠疼頭昏眩痛目暗耳鳴面色黃黑鬢髮脫落頭皮腫癢精神昏困手足多冷心胸痞悶繞臍切痛膝脛痠疼不能久立或足弱隱痛步履艱難腰背拘急不得俯仰腹痛氣刺兩脅虛脹水穀不消大便不調嘔逆噁心飲食減少恍惚多忘氣促喘乏夜多異夢心忪盜汗小便滑數遺精白濁一切元臟虛冷之病並能治之五味子一方用五倍子茯苓去皮各八兩紫巴戟去心十六兩補骨脂酒浸焙十兩肉蓯蓉淨洗焙乾葫蘆巴炒各一斤龍骨硃砂別研各三兩上為細末入研藥令勻酒糊為丸如梧桐子大每服十五丸至二十丸空心食前溫酒吞下或鹽湯亦得青硫丸治久冷峻補元臟硫黃一斤酒甘草水研三日附子炮裂去皮臍山茱萸各四兩白豆蔻去皮肉豆蔻去殼木香各二兩牛膝酒浸切焙三兩艾葉焙乾一兩上為末拌勻蒸木瓜肉和搗丸梧子大每服十丸至十五丸空心鹽湯下如腰腳疼痛用木瓜湯下益神丸補元臟治久冷硫黃酒甘草水研一日木香肉豆蔻去殼檳榔銼桂去粗皮附子炮裂去皮臍青橘皮湯浸去白焙乾薑炮各一兩上為末和勻用糯米粥丸如梧桐子大每服十丸至十五丸空心酒下烏金丸又名黑錫丸一名黑錫丹治脾元久冷上實下虛胸中痰飲或上攻頭目徹痛目常昏眩及奔豚氣奔沖胸腹連兩脅膨脹痛不可忍氣欲將絶陰陽氣上下不能升降飲食不進面黃羸瘦腹滿膨脹肢體浮腫泄瀉嘔逆自汗心忡小便頻數一切虛寒皆治黑錫二兩硫黃一兩木香一分附子一兩去皮臍舶上茴香一兩川楝肉半兩破故紙半兩肉豆蔻四個去殼上先將黑錫於銀石器內候熔飛煉數次澄下粗滓令盡次銼硫黃細末入在錫內攪和如膏以紙攤在地上出火毒以碗蓋一宿硫黃鬚先研令極細黑錫既熔連銚取起離火以所研硫黃傾在內急以火箸等物攪勻以碗覆之即硫黃不至飛去既傾出錫卻以破故紙於銚內惹錫並硫黃上為細末酒糊丸如桐子大每服三十丸或四十丸空心食前鹽湯下良久以食物壓之尤治元陽虛損精神耗弱等疾震靈丹出和劑方此丹不犯金石飛走有性之藥不僭不燥奪造化沖和之功大治男子真元衰憊五勞七傷臍腹冷痛肢體痠疼上盛下虛頭目昏眩心神恍惚血氣衰微及中風癱瘓手足不遂筋骨拘攣腰膝沉重容枯肌瘦目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜小腸淋瀝夜多盜汗久瀉久痢嘔吐少食八風五痺一切沉寒痼冷服之如神及治婦人血氣不足崩漏虛損帶下久冷胎臟無子服之無不愈者保元丹治老弱諸沉寒痼冷小便滑數大便時泄腰腿臍腹疼痛困倦瘦虛食減附子炮去皮臍肉豆蔻白朮山藥乾薑炮赤石脂各一兩肉桂半兩上為細末水糊為丸如梧子大每服三二十丸空心酒下痼冷丸出千金方治心腹痼冷白朮半兩神麯一兩炒令黃色川薑炮桂心各二錢川椒一錢炒香吳茱萸三錢洗上為細末蜜水糊為丸如梧子大食前米飲下五十丸或百丸一方為散米飲服方寸匕崔氏烏頭丸出和劑方治風冷邪氣入乘心絡或腑臟暴感風寒上乘於心令人猝然心痛或引背膂乍甚經久不瘥並宜服之附子炮去皮臍川烏炮去皮臍赤石脂各二一兩蜀椒去子及閉口者炒出汗肉桂去粗皮乾薑炮各二兩上為細末蜜和丸如梧桐子大每服三丸溫酒下覺至痛處痛去即止若不止加至五六丸以知為度若朝服無所覺至午時再服三丸夜又服三丸若久心痛每旦服三丸稍加至十丸盡一劑遂終身不發忌豬肉生蔥來復丹出和劑方此藥配類二氣均調陰陽奪天地衝和之氣乃水火既濟之方可冷可熱可緩可急善治營衛不交養心腎不升降上實下虛氣閉痰厥心腹冷痛臟腑虛滑不問男女老幼危急之證但有胃氣無不獲安補損扶虛救陰助陽溫脾湯出本事方治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不效宜先取去然後調治易瘥不可畏虛以養病也厚朴乾薑甘草桂心附子生各二兩大黃生四錢碎切湯一盞漬半日搦出滓煎湯時和滓下上細銼水二升半煎八合後下大黃汁再煎六合去滓澄去腳俟至晚分作三服溫溫自夜至曉令盡不受食前更以乾薑丸佐之乾薑丸出本事方乾薑巴豆去心炒黃研大黃人參各一兩上除巴豆余為末同研煉蜜丸如梧子大服前湯時用湯吞下一丸米飲亦得有人因憂愁中傷食結積在腸胃故發吐利自後至暑月稍傷則發暴下數日不已玉函云下利至隔年月日不期而發者此為有積宜下之止用溫脾湯次服乾薑丸後服白朮散白朮散出本事方白朮木香附子人參各等分上為細末每服二錢水一盞生薑三片棗一枚煎六分去滓服走馬寸金丸出傳信適用方治男子下元虛冷真氣怯弱肝腎客寒小腸氣痛牽引肋脅繞臍㽲痛不可忍者手足厥冷多出冷汗不能屈伸面色青黃時發時止立有神效玄胡索川當歸銼舶上茴香川楝子各一兩南木香半兩不炒干全蠍三個以上並炒令紫色上併為細末米醋糊丸桐子大每服二三十丸空心鹽酒下患久服一月可去根二氣丹出和劑方助陽消陰正氣溫中治內虛里寒冷氣攻擊心脅臍腹脹滿刺痛泄利無度嘔吐不止自汗時出小便不禁陽氣漸微手足厥冷及傷寒陰證霍亂轉筋久下冷痢少氣羸困一切虛寒痼冷並宜服之硫黃細研肉桂去皮為末各一兩分乾薑炮為末硃砂研為末各二錢附子一二個大者炮去皮臍為末半兩上並勻研細用麵糊為丸如梧桐子大每服三十丸煎艾鹽湯放冷下空心食前服浴體法治下元虛冷腰腹冷痛崩帶一切冷病椒目川烏細辛乾薑桂以上各等分上為粗末水煮澡浴下部為妙溫胃丸治沉寒痼冷嘔噦吐逆心胸噎痞減食洹東馬公正方京三稜焙切三分附子二個炮乾薑炮青皮桂各半兩上為細末醋糊為丸如豆大每服二三十丸米飲下金鎖正陽丹出本事方砒一兩火煨巴豆十粒去油烏頭一兩炮去皮臍木鱉六個去殼雄黃半兩上併為末用黃蠟瀝青好者各一兩半黃丹一兩硃砂一兩半細研溶熱入前項藥末乘熱丸如雞頭大每服一丸常服空心鹽湯下小腸氣痛炒茴香酒冷下木通煎湯下滑腸脫肛乾薑艾同煎酒溫下心氣痛燒鐵淬醋下二丸氣塊嚼乾柿子下一丸婦人經脈不行及産後諸疾當歸酒下眼多冷淚鹽椒煎湯下胸奴露宿丸出千金方治寒冷積聚礜石桂心附子乾薑各二兩上為末蜜丸如梧桐子大每服十丸日三服後稍加之大已寒丸出濟生拔粹方治久寒積冷臟腑虛弱心腹㽲痛脅肋脹滿泄瀉腸鳴自利自汗水穀不化陽氣暴衰陽氣獨盛手足厥冷傷寒陰盛神昏脈短四肢怠惰並服蓽茇肉桂各四斤乾薑高良薑各六斤上為細末水煮麵糊為丸如梧桐子大每服二十粒飲湯下食前此藥燥甚能治臟腑虛寒滑而下痢及泄瀉腸鳴水穀不化自非看得清切灼然臟寒泄瀉不可輕服多有泄瀉溏瀉之患用溫熱藥不止者宜用緊澀之劑可於斷下湯方中求之玉華白丹出和劑方清上實下助養根元扶衰救危補益臟腑治五勞七傷夜多盜汗肺痿虛損久嗽上喘霍亂轉筋六脈沉伏唇口青黑腹脅刺痛大腸不固小便滑數夢中遺泄肌肉瘦悴目暗耳鳴胃虛食減久虐久痢積寒痼冷諸藥不愈者玉抱肚出百一選方治停寒痼冷心腹刺痛常繫於臍腹間甚妙一方用針砂如法炒訖只入硇砂半兩並不用余藥針砂四兩鐵銚內火炒用木或竹棒兒不住手攪煙出盡為度放冷白礬半兩硇砂五一分錢粉霜五分上白礬等三味同研為細末與針砂拌和只作一服以水數點灑用匙拌攤令勻厚皮紙為貼闊二寸以上長四五寸貼之外以帛子包系疼處或常系臍下如覺太熱即以衣襯之若藥力過再灑水如前拌用其熱如初可用四五次藥力過退即將針砂再炒過別入余藥仍可用一方用雄黃半錢無粉霜大建中湯出千金方治心脅中大寒大痛嘔不能飲食飲食下咽自知偏從一面下流有聲泱泱然若腹中寒氣上衝皮起出見有頭足上下而痛其頭不可觸近蜀椒二合乾薑四兩人參二兩飴糖一升上㕮咀以水四升煮取二升去滓納糖微火煮令得一升半分三服服湯如炊三升米久可飲粥二升許更服當一日食糜溫服之養正丹出和劑方卻邪輔正助陽接真治元氣虛虧陰邪交蕩正氣乖常上盛下虛氣不升降呼吸不足頭旋氣短心神怯弱夢寐驚悸遍體盜汗腹痛腰疼或虛煩狂言口乾上喘翻胃吐食霍亂轉筋咳逆不定又治中風涎潮不省人事陽氣欲脫四肢厥冷如傷寒陰盛自汗唇青脈沉最宜服之及婦人産後血氣身熱月候不均帶下腹痛悉能治療常服清心火強腎水進飲食玉壺丸治元臟久冷益真氣進飲食壯筋骨駐顏烏頭大者炮裂去皮臍十五枚硇砂水飛研陽起石煅研各一兩硫黃半兩研上為末酒煮麵糊丸如梧桐子大每服十五丸空心鹽湯下婦人醋湯下露宿丸出千金方治遇冷氣心下結系嘔逆寒食不消並主傷寒晨夜觸寒冷惡氣附子烏頭桂心礜石各四兩上為末蜜丸如豆大以酒服三丸日三加至十丸藥耐寒冷忌熱食近火宜冷食飲治痼冷風眩寒中手足冷胃口寒臍下冷百病五勞七傷第一令人能食二強盛三益氣四有子神驗方出千金方大豆二升半烏頭一百五十枚生地黃一十五斤取汁上以除日㕮咀烏頭以酒一斗半和地黃汁浸烏頭至破日絞去滓納豆藥汁中至除日出曝之有汁更浸曝之至汁盡藥成初服從二豆起可至二十豆酒服之有病空腹服無病食後服四時合併得二月三月為上時藥令人能食益氣強盛有子發白更黑齒落重生先病熱人不可服茱萸硝石湯出千金方治久寒不欲飲食數十年澼飲吳茱萸八合硝石一升生薑一斤上以酒一斗水解令二斗煮藥取四升服二升病即下去勿更服也初下如泔後如汙泥若如沫滓吐者更可服之養如乳婦法溫胃散治痼冷溫脾止痛噦和氣橘皮二兩桂一兩乾薑炮半兩上為細末每服一錢薑湯調下空心服半夏湯出千金方治胸滿有氣心腹中冷半夏一升桂心四兩生薑八兩上㕮咀以水七升煮取二升一服七合日三服生薑湯出千金方溫中下氣生薑一斤甘草三兩桂心四兩上㕮咀以水六升煮取一升半一服五合日三服三聖丸一名三仙丸補男子下元虛弱冷氣詩曰一烏二術三茴香久服令人壽命長和血駐顏精神爽養神利氣助容光丹田補暖神緣住耳目聰明鬢不蒼每日常服十丸數空心溫酒共鹽湯治積年冷病方出千金方蜀椒二兩香豉一升上搗椒為末和豉更搗三千杵丸如彈子大食前酒服日再半硫丸出和劑方除積冷暖元臟溫脾胃進飲食治心腹一切痃癖冷氣及年高風祕或泄瀉等證並皆治之半夏湯洗七次焙乾為細末硫黃明淨好者研令極細用柳木槌子殺過上等分以生薑自然汁同熬入干蒸餅末攪和勻入臼內杵數百下丸如梧桐子大每服空心溫酒下或生薑湯下十五丸至二十丸婦人醋湯下或用蔥白一條生薑三片煎入阿膠二片溶開食前空心送下治諸冷極醫所不治出千金方用馬蘭子九升淨治去土空腹中服一合日三飲及酒下之服訖須臾以食壓之取瘥乃止金液丹出和劑方固真氣暖丹田堅筋骨壯陽道除久寒痼冷補勞傷虛損治男子腰腎久冷心腹積聚脅下冷癖腹中諸蟲失精遺溺形羸力劣腳膝疼弱冷風頑痹上氣衄咳逆寒熱霍亂轉筋虛滑下痢又治痔瘻濕䘌生瘡下血不止及婦人血結寒熱陰蝕疽痔洞陽丹出濟生方治陽虛陰盛手足厥冷暴吐大下脈細羸瘦傷寒陰證附子炮去皮臍鍾乳粉各二兩天雄炮去皮三兩川烏炮去皮四兩陽起石火煅一兩硃砂一兩別研細上為細末酒煮神麯糊為丸如梧桐子大每服五十丸空心溫酒鹽湯任下赤丸出千金方治氣厥冷茯苓桂心各四兩細辛一兩烏頭附子各二兩罔干如大棗一兩上為末內真朱為色蜜丸如麻子大空腹酒服一丸日再夜一不知加至二丸以知為度一方用半夏四兩不用桂又方出千金方治胸滿氣噫下部冷腹㽲痛半夏八兩制生薑六四兩橘皮四兩去白桂二兩吳茱萸五十粒湯泡洗一次上㕮咀用水十升煮取四升五服冷又再溫空心食前服人參湯出本事方治丈夫婦人小兒唇青面黃肚裡冷痛牽引小腹以至翻胃換食嘔吐口苦舌乾少寤多寐手腳不遂遠年近日一切脾胃冷病悉能除愈人參一兩茯苓一兩白者牡蠣一兩煅粉草一兩黃耆一兩鹽炙附子七錢以上重者炮去皮臍一半個上為細末每服三大錢鹽湯點服忌生冷油麵黏膩等物昔一婦人年四十餘歲患十年翻胃面目黃黑歷三十餘人醫不效取脾腧諸穴燒灸交通其疾愈甚服此藥不五七日間頓然無事堅忍服至一月逐去其根自是服之不三五服些小脾疾立便痊平能全胃氣生肌肉進飲食順營衛常服大有補益屢試屢驗幸毋忽焉又方出本事方浮椒二兩茴香一兩粉草一兩上為末每服二錢熱湯點服忌如前大已寒丸出御藥院方治中焦氣弱脾胃受寒飲食不美氣不調和退陰助陽除臟腑積冷心腹疼痛大便滑泄腹中雷鳴霍亂吐瀉手足厥逆便利無度及療傷寒陰濕形氣沉困自汗附子炮去皮臍川乾薑炮製高良薑銼炒吳茱萸炒桂去皮川烏頭炮裂去皮臍銼如豆大再炒令黃色為度以上各一兩上為細末醋煮麵糊丸梧桐子大每服五七十丸熱米湯下空心食前日進二服無忌接真湯出御藥院方治陰病手足厥冷臍腹疼痛真氣不足衰憊欲絶沉香丁香各二錢麝香一錢附子炮去皮臍四兩錢上為粗末水二盞生薑七片棗三枚去核煎至一盞去滓溫作一服硫黃丸治人之大冷夏月溫飲食不解衣者硫黃礜石乾薑茱萸桂烏頭附子椒仁人參細辛皂角當歸上等分隨人多少搗蜜丸如梧桐子大一服十丸至二十丸日三服若冷痢者加赤石脂龍骨即便愈也橘皮益智湯治痼冷在內陰氣交攻心痛如刺青橘皮湯浸去白焙益智去皮烏頭炮裂去皮臍威靈仙去土各一兩上銼如麻豆每服三錢水一盞生薑三片鹽少許煎六分去滓食前溫服日三雄朱丹出百一選方治宿寒痼冷飲食嘔逆久則羸弱變成勞瘵硃砂雄黃各二兩以上用沙盒一個先以牡丹皮二兩內外熏黃入藥於內以酸醋和臘茶作餅蓋定盒口用赤石脂固濟合縫又用赤石脂泥裹盒子一重再用黃泥紙筋又裹一重先以草火燒令乾次以炭火五斤漸漸添至一稱候火力稍消取出掘地坑一尺埋一宿去火毒取出研入後藥附子炮別為末胡椒肉桂赤石脂木香沉香蓽茇丁香白朮各一兩乳香半兩同赤石脂共研細上為末入前藥研勻以清酒二升三分熬去二分入附子末煮糊丸梧子大每服一十丸空心溫酒鹽湯任下蓽澄茄丸出王氏博濟方治丈夫元陽虛冷氣上衝心胸滿悶腹脅雷鳴或多攻刺嘔噦膨脹沉香丁香木香舶上茴香各半兩烏藥一兩白芷一兩一分葫蘆巴三分蓽澄茄一分上件八味同為末煉蜜為丸如彈子大每服一丸生薑鹽湯嚼下三建湯出永類鈐方除痼冷扶元氣凡寒邪外攻六脈沉微手足厥逆大小便滑數及中風涎潮不省人事傷寒陰證並治天雄炮去皮臍附子大川烏並炮各等分上㕮咀四錢水二盞姜十五片煎八分溫服無時一法加肉桂小麥椒附丸出永類鈐方治內挾積冷臍腹弦急痛引腰背時有盜汗小便滑數心腹脹滿附子炮半兩檳榔牽牛炒五味子各一兩川椒去子炒出汗半兩淨陳皮乾薑炮石菖蒲各一兩上銼碎好醋煮令乾焙令為末醋煮麵糊丸梧桐子大每服三十丸鹽湯酒空心下婦人血海冷當歸酒下泄瀉飯飲下冷痢薑湯下赤痢甘草湯下青城山葛真人秋乳丹出衛生家寶方治男子脾腎久弱下部一切痼冷之疾遺泄不禁小便滑數囊外濕癢及脾元不固飲食無味久而脾泄變為寒熱似瘧而多寒滑瀉白膿及婦人子宮久冷胎胞不固赤白帶下並宜服之秋石四兩鍾乳粉二兩真者雲母粉二兩牡蠣左顧者用黃泥固一指厚於文武火煨乾後以炭火煅通紅不以多少去外黑者用粉研細四兩寒水石半斤生研為粉納信砒一兩以一沙盒納盛得恰好上下以粉緊填信砒一兩外用紙筋黃泥固一重約半指厚陰乾以上十斤火一煅去盡砒煙取出放冷用白礬三兩內一兩飛過上六味同研極細用圓正半夏十兩為末水熟煮成稀糊為丸每服一二粒空心鹽湯下婦人醋湯下丸如梧子大候極干服一法用冷水滴為丸只要研極細陰乾復以甘鍋盛子瓦片子蓋頭大火一煅功力尤大半夏稀糊丸者平穩功力雖少久服見效三陽丹出衛生家寶方治男子氣弱丹田冷痛臟腑泄瀉婦人血海冷疼一切冷病並皆治之五月五日將新瓶一支收大艾葉一瓶按緊不令虛用好酒煮三升淋下瓶內以箬葉並紙扎縛了次又用泥封卻逐日將去日中曬至九月重陽日取開焙乾為細末用煮酒打麵糊修為丸如梧桐子大每服三十丸至四十丸空心用鹽湯吞下婦人醋湯下大有功效更不盡述金罌煎出衛生家寶方治男子氣弱丹田冷痛臟腑泄瀉婦人血海冷疼一切病並皆治之冬月採金罌子俗名雞頭罌未十分熟者不拘多少新羅中搽去刺以竹刀或銅刀破開剖去瓤淨洗曬略干搗碎瓷鍋中用水煎四五十沸濾去滓熬汁候濃如冰糖用雞頭肉為細末同熬成膏每服一匙頭許空心食前用溫酒下功效未易具述或無雞頭只以金罌煎調酒下亦得王海藏已寒丸出衛生家寶方治沉寒痼冷臍腹冷痛回陰返陽附子炮一兩乾薑炮一兩良薑七錢桂三錢茴香炒一兩茯苓五錢上件為細末醋打麵糊為丸如桐子大每服三五十丸溫酒送下食前金粟黃芽丹又名太乙紫霞丹出危氏方此丹養火不計歲年有起死回生之功蘊脫胎換骨之妙昔鍾呂陰三真人張柏子所煉皆此丹也粒至小功甚大應諸虛百損五勞七傷八風五痹沉寒痼冷水腫蠱氣久痢久瘧一切男女老幼困篤之疾百藥不能療者悉皆主之初服覺腹中微擾或欲吐瀉則是驅逐諸病無病則不動再服則不覺經云服丹之人能絶嗜欲斷五腥不食雞魚大蒜陳臭等物當為地仙矣若未免此服及一兩延壽二紀大率救憊扶危衛生伐病無出此丹之右服時以平旦取一粒在手內搓令暖置口中可加至十粒或用棗肉丸面東叩齒密念咒曰返我常歸我鄉服之千日朝虛皇一氣七遍以井花水或人參棗湯送下孕婦不可服此丹無方惟有丹母不知是何藥修煉得成修煉時以大硃砂一斤抽汞置丹母於鼎內以汞安於丹母上覆以真金簿五十片於靜室養火朝東北暮西南一月後開鼎如覺丹母傷火以濃煎沉香水浴一載後丹成如穀芽樣或如花果樣用銀剪刀剪下入大蘿蔔內蒸一伏時以蘿蔔深黑為度取出用玉石杵臼研為細末以木蜜為丸丸如栗大依前湯引服大有功效所惜者此丹母自北而南多為名宦巨室收藏不入醫家抽汞修煉家另有法小鐘乳丸出十便良方治虛冷鍾乳粉七錢分硫黃三錢末乾山藥一錢上為細末用棗肉和丸梧桐子大每服七八丸至十丸空心米飲或酒下養正金丹出十便良方治中下寒冷進飲食暖脾胃張會伯方硫黃去砂別研大附子乾薑丁香桂厚朴半夏肉豆蔻各二兩上為細末酒煮麵糊為丸如桐子大硃砂為衣每服二三十丸加至七八十丸空心米飲下老人服之尤佳蘿蔔丸出朱氏集驗方治諸冷積腹脹氣痛蘿蔔子五三兩沉香一錢半草豆蔻一錢半白朮半兩青皮五錢上除蘿蔔子為末別研麵糊丸十丸米飲下溫內丸治痼冷在內飲滯伏留陰盛陽虛穀氣衰微清濁不分腸胃虛弱寒濕相勝下利頻並飲食不入怠惰嗜臥煩悶不安常服溫益臟氣厚養腸胃厚朴薑汁製一斤乾薑炮甘草炙白朮草豆蔻去皮五味子訶黎勒皮陳橘皮去白各半斤上為末水煮麵糊為丸如梧桐子大每服五十丸不拘時候米飲下治入秋小腹多冷者出本草用古磚煮汁服之治冷三月三日採艾作煎服
