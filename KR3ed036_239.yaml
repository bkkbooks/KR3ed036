body:
  text: 卷二百三十九諸蟲門諸蟲附論夫人腹中有尸蟲此物與人俱生而為人大害尸蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一名伏蟲長四分二名蛔蟲長一尺三名白蟲長一寸四名肉蟲狀如爛杏五名肺蟲狀如蠶六名胃蟲狀如蝦蟆七名弱蟲狀如瓜瓣八名赤蟲狀如生肉九名蟯蟲至細微形如菜蟲狀伏蟲則群蟲之主也蛔蟲貫心殺人白蟲相生子孫轉多其母轉大長至四五丈亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸之間多則為痔劇則為癩因人瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無類婦人常多其蟲凶惡人之極患也常以白筵草沐浴佳根葉皆可用既是香草且是尸蟲所畏也凡欲服補藥及治諸病皆須去諸蟲並痰飲宿澼酲醒除盡方可服補藥不爾必不得藥力凡得傷寒及天行熱病腹中有熱又人食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒齦無色舌上盡白甚者唇里有瘡四肢沉重身體羸瘦忽忽喜眠當數看其上唇內有瘡唾血唇內有粟瘡者心內懊憹痛悶此蟲在上蝕也九蟲皆由臟腑不實脾胃俱虛雜食生冷甘肥油膩等物節宣不時腐敗停滯所以發動又有神志不舒精魂失守及五臟勞熱又病餘毒氣血積鬱而生或食果瓜與畜獸內臟遺留諸蟲子類而生蟲之為害嘔惡吐涎口出清水痛有去來乍作乍止寸白蟲色白形扁損人精氣力乏腰痛蟯蟲細如菜蟲能為痔瘻瘡癩疥癬癰疽等患寸白蟯蟲是三者皆九蟲數中之一物也外此又有兒童疳䘌昏睡煩躁鼻爛汁臭齒齦生瘡下利黑血蟲食下部為狐下唇有瘡蟲食其臟為惑上唇有瘡三蟲者謂長蟲赤蟲蟯蟲也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須其節從里潰然出盡乃佳若斷者相生未已更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛朝口吐清汁煩躁則是也其餘各種種不利人人胃中無不有者宜服九蟲丸以除之蛔蟲者是九蟲之一也長一尺亦有長五六寸或因腑臟虛弱而動或因食甘肥而動其發動則腹中痛發作積聚行來上下痛有休息亦攻心痛腹中熱口中喜涎及吐清水貫傷心者則死診其脈腹中痛其脈法當沉弱而弦今反洪而大則蛔蟲也方鶴蝨丸出聖惠方治積年常患諸蟲心痛吐水不能食鶴蝨附子炮裂去皮臍狼牙檳榔乾漆搗碎炒令煙出白朮甘草炙微赤銼陳橘皮湯浸去白瓤焙以上各一兩吳茱萸三分湯浸七遍焙乾微炒乾薑三分炮裂銼狼毒一兩半銼醋拌炒黃上為末煉蜜和搗三二百杵丸如梧桐子大不計時候以粥飲十五丸木香檳榔丸出直指方殺下諸蟲雞心檳榔一兩木香鶴蝨貫衆錫灰乾漆燒煙盡使君子肉各半兩輕粉二錢雷丸巴豆肉各二錢半上為細末飛白麵糊丸麻子大每服二十粒五更粥飲下或菖蒲石榴根煎湯下蝦蟆丸出直指方殺蟲大蝦蟆干一個炙令焦木香雞心檳榔貫衆桃仁水浸去皮苦楝根各三錢酸石榴根皮三錢蕪荑二錢鶴蝨二錢巴豆肉二錢半上為細末糯米粉糊丸麻子大每服十丸五更石菖蒲煎湯下雄砂丸出直指方殺諸蟲鶴蝨蕪荑乾漆炒令煙盡白殭蠶炒各三錢貫衆酸石榴根皮曝乾各半兩硃砂雄黃雷丸甘遂各一錢半上為細末粳米粉糊丸麻子大每服十丸五更粥飲下木香三稜散出瑞竹堂方治腹中有蟲面色痿黃一切積滯黑牽牛半生半炒多用大腹子多用檳榔雷丸錫灰醋炒三稜蓬莪朮木香大黃以上各一兩上為末每服三錢空心用蜜水調下或沙糖水亦可須先將燒肉一片口中嚼之休咽下吐出口中肉汁後服藥取蟲積丸檳榔半斤牽牛半斤雷丸兩半三稜二兩蓬朮二兩另銼同醋煮苦楝皮一兩大黃四兩皂角半斤隨意加木香上為末煎皂角膏子打糊丸如香黍大每服二錢四更時分冷茶清下小兒一錢下蟲白粥補大效追蟲丸雷丸一兩白蕪荑一兩炒檳榔一兩使君子肉半兩白朮半兩黑牽牛頭末一兩大黃錦文者一兩半當歸一兩上為末不可見火用麵糊為丸如桐子肉大每服三十丸小兒七丸或三丸量人虛實癆證桃柳頭湯五更下小兒沙糖湯空心下諸雜病薑湯送下勝金丸治蟲動心痛不可忍貫衆白殭蠶炒蕪荑乾漆炒煙盡檳榔銼桂去粗皮各一兩厚朴去粗皮薑汁炙透一兩半雷丸一兩半上為細末煉蜜丸梧桐子大每服十五丸空心食前溫漿水下初服三五日取下諸蟲乃效若蟲多即服藥十日以上方驗鶴蝨散治取男子婦人腹內諸積蟲積無時攻心疼痛及口中或大便時有蟲出者服之立效雷丸鶴蝨黑狗脊燒去毛使君子苦楝根檳榔各一兩加輕粉一錢上為末每服三錢蔥白五根熬湯調滴香油少許入藥內五更服如要服此藥隔夜不食夜飯次早五更空心燒豬肉二兩重吃後卻服藥若大便余時不行單用牽牛頭末三錢漿水調服取下蟲物有一托長余節節相連屢見效蒼朮澤瀉丸出拔粹方蓋三焦相火盛而制陽明燥金故木相侮土主生五蟲所以勝中有蟲也因多食熱物脾主大熱若瀉三焦火熱退則使金得氣而制木木既受制則五蟲不生而自愈矣蒼朮去皮四兩澤瀉枳實各二兩地榆一兩皂角子一兩秦艽二兩上為末燒飯為丸桐子大食前溫水下三十丸或酒米飲下一方無秦艽萬靈丸治取蟲宣積黑牽牛一斤取頭末十五兩生用京三稜五兩蓬朮煨三二兩大腹子一斤匾淨取七兩末生用如尖者是檳榔雷丸五兩炮廣木香五兩面裹煨乾為度上為末和勻用好紫色皂角半斤去皮弦切碎用水兩大碗浸一宿冬月兩宿撈去粗滓銅磁器內熬數沸白沫出為度放冷和藥必須用杵搗丸梧桐子大每服四錢重五更用沙糖水送下溫冷不妨至天明去利四五行者看取下是何蟲積溫白粥補之忌生冷腥硬之物孕婦勿服無憂散治男子女人小兒諸般蟲積已未成癥瘕痞疳及膀胱陰囊腎腫婦人血蟲如懷鬼胎月水不通並一切危急之證悉皆治之白牽牛取頭末二兩半淨白蕪荑用末二兩檳榔去皮用末二兩黑牽牛炒去烟頭末一兩大黃半兩生末雷丸去皮用末半兩上為末和勻一處每服四錢用蔥白七根熬湯五更服次早大便中方見藥力之效小兒或一錢二錢大小加減石榴根散治蛔蟲寸白等心腹疼痛東引石榴根一兩膩粉一錢芍藥銼炒三分陳橘皮去白焙半兩檳榔萆薢各一兩上搗細散每服二錢空心煎棗湯調服日晚再服白朮丸治諸蟲白朮四兩澤瀉二兩地榆枳實麩炒皂角子各一兩燒存性上為細末燒飯為丸桐子大米飲或白湯或溫酒下化蟲丸治腹中有塊起以手按之不見作聚往來痛無休止亦治心痛五更心嘈牙關強硬嘔吐涎沫清水及夢中齧齒面色青黃飲食雖多不作肌膚或寒或熱沉沉默默不知病之去處有蟲不療則子母相生無有休止長一尺則害人胡粉炒五錢鶴蝨三錢白礬五錢檳榔五錢苦楝根五錢上為細末麵糊丸如麻子大每服十五丸溫漿入生麻油一兩點打勻下溫米飲下亦得不拘時候其蟲細小者化為水大者自下檳榔丸出聖惠方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶檳榔鶴蝨桂心吳茱萸湯浸七遍焙乾微炒陳橘皮湯浸去白瓤焙以上各一兩上為末煉蜜和搗百餘杵丸如梧桐子大不計時以熱酒下三十丸一方療蛔蟲心痛以蜜湯下三十丸蟲出為度忌生蔥治諸蟲心痛出聖惠方酸石榴根桃白皮各一兩陳橘皮一分湯浸去白瓤焙高良薑半兩檳榔一兩上細銼和勻每服半兩水一盞煎至五分去滓不計時稍熱服之桃皮湯出千金方治蟯蟲蛔蟲及痔䘌蟲食下部生瘡桃皮艾葉各一兩槐子三兩大棗三十枚上羅勻以水三升煮取半升頓服之良一方粗篩每服三錢水一盞煎至六分空心食前夜臥各一服酒蠟膏出直指方殺諸蟲醇酒一盞蜜三一合蠟三錢蜀漆一兩上入銅銚內慢火同熬可丸即丸彈子大每服一丸溫酒化開拂曉服之蟲自下化蟲散出直指方雷丸二個雞心檳榔二個鶴蝨一錢使君子七個去殼上為細末入輕粉少許分作兩服當晚用豬精肉一兩切成片皂角漿浸一宿至五更微火炙熟又用些清油拭肉候溫取一服藥末搽於肉上略烘過空腹食之至巳刻蟲自下乃飲食一方無鶴蝨補金散出拔粹方治諸般蟲鶴蝨生雷丸定粉錫灰以上各等分上為末每服三錢空心小油調下又用豬肉一兩燒熟摻藥在上細嚼亦得用翎掃甘遂末一錢與前藥一處服之其蟲自下治諸蟲在胃中漸漸羸瘦出聖惠方雞子白蠟三分乾漆一兩半炒煙出為末蜜一合上藥放銅器中以慢火煎令可丸即丸梧桐子大每服空心服以粥飲下七丸漸加至十丸當下諸蟲變為黃水乾漆散治諸蟲病乾漆炒令煙出半兩雄黃研一分檳榔一枚銼訶黎勒煨去核一分上為末每服半錢入麝香少許用蔥汁生油調空心服青橘丸治諸蟲動發上連心痛青橘皮湯浸去白焙蕪荑微炒貫衆雷丸炮等分上為末煉蜜丸如梧桐子大每服二十丸食前橘皮湯下加至三十丸蟲下為度蕪荑散出直指方取諸蟲雞心檳榔三錢蕪荑二錢木香一錢上末為一服當晚先煎酸石榴根湯至五更吃炙肉一片嚼細引蟲上至喉以石榴根湯暖溫調藥服蟲自軟而下漆香散治大人小兒腹中蟲動痛發不止乾漆炒令煙出二兩雄黃研五錢麝香研一錢上先搗乾漆為末次入雄黃麝香再同研勻以密器盛之每服一錢苦楝根湯調下食前小兒以意加減皂莢丸治心痛如蟲咬皂莢炙黃去皮子杏仁去皮尖雙仁研各一兩上先搗研皂莢為末次與杏仁相和搗為丸如小豆大每服七丸粥飲下發時吃乾漆湯治蟲咬心痛乾漆炒煙盡一兩胡椒上搗篩每服一錢水一盞入蔥白一寸麝香少許煎七分去滓溫服檳榔丸出聖惠方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶鶴蝨一兩乾漆一兩搗碎炒令煙出上為末煉蜜和丸如梧桐子大每服十丸不計時以醋湯下又方出聖惠方東引石榴根一兩銼膩粉半兩上用水一大盞煎石榴根至五分去滓調膩粉以利下蟲為效制諸蟲方本事方白蕪荑檳榔各一兩上為細末蒸餅丸如梧子大每服十五丸至二十丸溫湯下治諸蟲心痛多吐四肢不和冷氣上攻心腹悶用鰻鱺魚淡炙令熟令患人三五度食之治心腹蟲痛脾胃虛冷氣並冷熱虛泄赤白痢等用肉豆蔻以白粥飲服治疳蟲本草以端午日取蟾蜍眉脂用硃砂麝香為丸如麻子大小孩子瘦者空心一丸如腦疳以奶汁調滴鼻中治疳蟲用苦參炒帶煙出為末飲下治熱病蛄毒令人喜寐不知痛處面赤如醉下利膿血當數視下其人下部大小之孔稷稷然赤則䘌瘡者也劇因殺人見人肝肺服藥不瘥可熏之出千金方以泥作小罌令受一升竹筒一枚如指大者以竹筒一頭橫穿入罌腹中一頭入人穀道中淺入可取熟艾如雞子大著罌中燃之於罌口吹煙令入人腹艾盡乃止大人可益艾小兒減之羸者不得多多亦害人日再熏不過三作蟲則死下斷亦可末燒雄黃如此熏之貫衆酒出直指方取寸白諸蟲五更嚼炙肉一片莫吞候蟲尋肉其頭向上卻吐出肉嚼使君子三個並輕粉一分吞下少頃以當晚所煎貫衆酒吞解毒雄黃丸七粒瀉下皆蟲也殺五臟蟲並諸蟲取側柏葉焙乾為末與川黃連同煎為汁服之道家多作柏葉湯常點益人古葉尤奇麻油治胸喉間覺有症蟲上下偏聞蔥豉食香此是發蟲油煎蔥豉令香二日不食張口而臥將油蔥豉致口邊蟲當漸出徐徐以物去之南粉散治腹中諸蟲令人腹痛多食泥土及油者用南粉二錢細研五更初用生油調下至食時蟲出盡砒黃丸治諸蟲痛用砒黃細研一兩以水浸炊餅心為丸如小豆大每服二丸煮肉湯下空心服金液丹出直指方壯陽道健胃氣除冷癖殺諸蟲用好硫黃十兩飛煉去砂石研細末入瓷盒水調赤石脂封口鹽泥固濟曬乾於地內埋小罐子盛滿水安瓷盒在上再用泥固濟慢火養七日七夜續加頂火一通候冷取出研末每一兩用蒸餅一兩湯浸握去水為丸梧桐子大每服三十丸空心米飲送下白金散治臟腑內一切蟲令人偏好食生物及面黃嘔吐或時心腹發痛但是蟲病悉治用狼毒不拘多少為細散每服一錢用餳一塊皂子大沙糖少許以溫水同化下臨臥放腹空心服之服藥時光腹微動氣食藥一服來日早取下蟲為效寸金散治大人小兒諸蟲為病及骨蒸熱癆羸瘦飛尸遁尸鬼疰室女經脈不行五心煩熱怠惰少力用乾漆不拘多少炒令煙出為細散每服一錢以生油溫水攪勻調服若治小兒每一斤再入白蕪荑仁三兩搗取細末更研鶴蝨半兩合研勻量兒大小亦用生油溫水調服清米飲亦得如是室女經脈不行服之必行其餘蛔蟲寸白蟲服無不效者蕪荑散肘後方治脾胃有蟲食即痛面黃無色疼痛無時必效方用石州蕪荑仁二兩麵炒令黃色為末非時米飲調二錢下即瘥又方用白蕪荑微炒一兩為末用沙糖丸梧子大服十丸治諸蟲咬心痛破宿血殺蟲陳藏器以獅子屎服之即蘇合香治諸蟲在臟腑久不瘥簡要濟衆以檳榔半兩炮搗為末每服一錢至二錢蔥蜜煎湯調下空心服妙應丸治諸蟲積惡物盡下檳榔大腹子各十兩淨取末一十二兩蕪荑淨一兩黑牽牛二斤半取淨末十二兩大黃淨五兩淨取末四兩雷丸淨一兩半取末一兩錫灰淨四兩木香一兩半淨末一兩上為末一處滴水為丸如小七香丸大每服四錢重五更時候用蔥白湯送下治大腸蟲出百十尺不斷斷之復生行坐不得傳信適用方用鶴蝨末水調五錢服之自愈治蟲心痛千金方用鶴蝨一味為末蜜和丸如梧子大每服四十丸蜜湯下日一服可加至五十丸一方為末溫酢和空腹服豆蔻散朱氏集驗方治腹痛嘔蟲陳皮甘草訶子使君子半夏各半兩沒石子各半兩厚朴制七錢木香肉豆蔻各二錢半上羅勻每服三錢姜三片棗三一枚水一盞煎七分其時湘中醫者陳必勝以此醫一女使遂除痼疾化蟲丸朱氏集驗方治諸蟲蕪荑錫灰神麯麥糵上等分為細末麻油為丸取月初五更空心用炙豬肉細嚼咽汁不吃肉汁引動蟲次用濃煎石榴根湯下丸子藥十丸又方出朱氏集驗方急以酒調好雄黃末敷之毒水流如涎大效又方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶楝樹東南根白皮一兩樹有子者上細銼以水一大盞煎至五分去滓空腹頓服雷金散出衛生寶鑑方取諸蟲雷丸末八分鬱金末七分黑牽牛末一錢半上為末和勻以生油調下以三兩匙飯壓之制蟲解勞悅澤肌膚去勞熱檳榔一兩半龍膽一兩乾漆半兩上為細末煉蜜丸如梧子大每服十丸至十五丸熟水吞下又方出本事方用定粉研每服一錢用麻油調五更服晚取下助肺殺諸蟲下氣令人能食消心腹間惡氣猝心痛冷氣食療方以榆子作醬食之良亦甚香美有少辛味陳者尤佳治疳蟲食人脊骨者出本草以鼠李根煮濃汁空心服一盞良如智丸出本草一名香附丸治蟲痛治腹中蟲毒用懸鉤根皮濃煮汁服之治病咽塞食不下有蟲毒者用小蒜齏大醋三升飲之當自痊可昔華他路逢車載一人病咽塞食不下呻吟他曰取店家蒜齏大醋三升飲之當自痊其病人遂依言飲之果吐大蛇一枚而即愈九蟲附論夫蟲與人俱生而藏於幽隱其為害也蓋本於正氣虧弱既食生冷復感風邪所以種種變化以至蕃息初若不足畏而其甚可以殺人善攝生者薄滋味節嗜欲早去三尸防患於未然彼九蟲亦將銷鑠於冥冥之中惟未進此道則攘孽剔蠹無使滋蔓蓋有藥存焉方貫衆丸出聖惠方治九蟲動作變生諸病貫衆石蠶微炒各一兩一分狼牙銼雚蘆微炒蜀漆白殭蠶微炒厚朴去粗皮薑汁炙銼各三分雷丸炮一兩半白蕪荑炒一兩上九味搗羅為末煉蜜和為劑更於臼內入酥少許杵令勻熟丸如梧桐子大每服十丸空心溫漿水下午時臨臥再服一方無厚朴一方有檳榔石榴枝湯治九蟲動作腹中刺痛口吐清水面色黑黃及蟲攻心痛者東引石榴枝三兩木香陳橘皮湯浸去白焙吳茱萸湯洗焙炒各一兩半大黃煨芍藥各二兩薏苡根二兩半上搗研如麻豆大每服五錢水盞半煎八分去滓空心溫服麝香丸治九蟲黃連去須一兩白蕪荑炒二兩干蝦蟆一枚酥炙令黃焦乾漆炒令煙出一兩雷丸炮半兩定粉研一兩半上為末入麝香少許再研羅勻用醋煮麵糊和丸梧桐子大每服溫水下十丸空心食前服麝香丸出聖惠方治九蟲麝香半兩細研犀角屑一兩雄黃半兩細研甘遂一兩煨令黃色巴豆半兩去心皮研壓去油硃砂半兩細研上為細末入巴豆及研了藥令勻煉蜜和丸如梧桐子大每服空心以溫水酒下五丸檳榔散出聖惠方治九蟲在臟日久相生轉多下蟲檳榔一兩蕪荑仁半兩狼牙一分白蘞一分鶴蝨一分紙上微炒過上為細散每服藥時不得吃夜飯候至四更以來將暖水一盞調下三錢其蟲瀉下雞子丸出肘後方治九蟲雞子去殼兩枚好漆綿濾過四兩蠟三兩粳米粉半斤上先取漆蠟入銅鐺中用慢火煎攪令得所次入粳米粉又攪令勻煎令凝候可丸即取鐺置坐黃土上才候稍溫即下雞子又攪令得所再置火上煎令可丸如小豆大宿勿食於空腹煎粟米飲下二十丸小兒五丸千金有茱萸根皮狼牙散聖惠方治九蟲在腸胃令人心煩吐逆下蟲狼牙鶴蝨紙上微炒過貫衆蕪荑仁以上各一兩上為細散每服以粥飲調下一錢良久再服蟲下為度蕪荑散出聖惠方治九蟲白蕪荑仁半兩狼牙半兩檳榔三分石榴根皮三分上細羅為散每日空心以熱酒調下二錢狗脊散出聖惠方治九蟲狗脊一兩芎藭一兩細辛一兩白蕪荑一兩上為細散三更後先吃牛肉乾脯三二兩五更初以粥飲調下三錢良久當有蟲下為度三蟲附論夫三蟲亦九蟲之數曰蛔曰赤曰蟯是也其發動諸病較之他種為甚蛔蟲又曰長蟲長一尺動則吐清水心痛貫心則死赤蟲狀似生肉動則腸鳴蟯蟲至細微形如菜蟲居胴腸間多則為痔極則為癩或生諸癰疽癬瘻瘑疥而其變甚多三蟲為患如此古人必析而治之意亦深矣方白蘞丸出聖惠方治三蟲發動心痛等疾白蘞碎銼狼牙去連苗處及土銼碎雚蘆微炙桃花貫衆擇去心須陳橘皮湯去白焙乾炒各三分白蕪荑微炒半兩上七味搗羅為細末煉蜜和為劑更於鐵臼內入酥杵令勻熟丸如小豆大每服二十丸隔宿勿食空腹漿水下至晚再服漸加至三十丸妊娠婦人勿服鱉甲丸治三蟲發痛面目黃不下食鱉甲去裙襴醋炙黃二兩白朮一兩半陳橘皮湯去白焙一兩木香狗脊去毛各一兩半檳榔炮四兩吳茱萸水浸兩宿每日三次換水洗去涎焙乾微炒一兩上七味搗羅為細末煉蜜和為劑置臼內入酥杵令勻熟丸如梧桐子大每日空腹服煎青橘皮湯下三十丸晚食前再服芎藭散出聖惠方治三蟲芎藭白芷雷丸煨桔梗炒各一兩上四味同搗羅為細散每服二錢匕用蜜並醋各少許勻調服或米泔汁調服亦可每日空腹日午近晚各一亦可蜜丸服之竹節丸出聖惠方治三蟲燒竹節雷丸各三分錫屑二分陳橘皮一分半上搗下篩蜜丸如梧桐子大一服八丸日三服三日斷根也一方溫水送下雚蘆散出肘後方治三蟲雚蘆炙黃四兩乾漆炒令煙盡二兩吳茱萸水浸兩日每日三次換水洗去涎焙乾微炒半兩上為細散每服二錢煎粟米稀粥調空心服一方先嚼淡干脯後服天門冬煎治三蟲保定肺氣去寒熱養肌膚益氣力利小便及諸暴中偏風濕痹強骨髓天門冬去心生用十斤白蜜七兩上先取天門冬細銼爛研如泥用酒一斤和攪取汁並蜜攪之令勻銅器中重湯上煎仍用竹篦攪候如餳每服如彈子大空腹溫湯服之或用生地黃汁一盞同煎妙亂髮灰散出聖惠方治三蟲並蟯蟲亂髮淨洗如雞子大燒灰丹砂研如面水飛過一兩上同研極細每服一錢醋調空心服之一方用真珠苦酒調服治蟯蟲雷丸散治三蟲雷丸炮一兩芎藭一兩上二味搗羅為細散每服一錢匕空腹煎粟米飲調下日午近晚各一服鶴蝨散出聖惠方治三蟲鶴蝨微炒二兩雚蘆微炒一兩上二味搗羅為細散每服一錢匕用豬羊肉臛汁調服空腹日午近夜各一服一方無雚蘆療三蟲方肘後方茱萸根取東引枝大者長一尺剝取白皮栝蔞四兩切一升上件細銼茱萸根以酒一升漬之一宿旦絞去滓隔宿勿食旦空腹先吃脯然後頓服之小兒分再三服亦療寸白蟲雚蘆散出肘後方治三蟲神效兼治蟯蟲蛔蟲攻心如刺痛吐清汁並寸白蟲用雚蘆微炒二兩為細散每服二錢隔宿勿食於清旦用羊肉臛汁調服之蟲自下一方飲臛和服檳榔湯治三蟲並寸白蟲用檳榔三枚灰火煨過粗搗篩用水三盞煎至一盞半去滓分三服空腹日午前近夜各一服其蟲盡下或和蔥白鹽豉同煮飲之亦佳一方治寸白蟲用檳榔二七枚治下篩以水二升半煮皮取一升半去滓納末頻服晚臥蟲出或不盡更服取瘥止宿勿食旦服之木香湯治三蟲心痛面黃不下食木香三錢檳榔煨三錢薏苡仁炒一兩陳橘皮去白焙三錢吳茱萸水浸焙乾炒一錢東引石榴根炙銼一兩半上羅勻每服二錢水一盞煎七分去滓溫服如人行三四里再服殺三蟲毒邪氣破老血出本草取竹肉以灰汁煮三度煉訖然後依常菜茹食之煉不熟者戟人喉出血手爪盡脫竹肉生苦竹枝上如雞子似肉臠應別有功人未盡識之一名竹實也治三蟲外臺祕要用桃葉絞汁一升飲導引法五臟蟲附論夫五臟蟲者緣臟真衰弱熱氣熏蒸而成之傳所謂肉腐出蟲魚枯生蠹理固如此其名狀之異見於九蟲敘可辨而察也方麥門冬丸出聖惠方治肺癆熱生蟲其形如蠶令人咳逆氣喘或謂憂隔氣隔恚隔寒隔熱隔皆從癆氣所生名曰膏肓病針灸不至麥門冬去心焙十兩蜀椒去目及閉口者炒出汗一兩人參一兩一分遠志去心附子炮裂去皮臍細辛去苗葉各一兩半甘草炙一兩半乾薑炮一兩桂去粗皮百部焙白朮黃耆銼細各一兩一分杏仁去雙仁皮尖焙乾麩炒令黃半兩上十三味搗羅為末煉蜜和更於鐵臼內塗酥杵令勻熟丸如酸棗子大含化稍稍咽津一方有檳榔一方無白朮前胡湯治脾勞有白蟲長一寸在脾為病令人好嘔胸中咳咳即嘔而不出前胡去蘆頭白朮銼赤茯苓去黑皮枳殼去瓤麩炒細辛去苗葉旋覆花去枚葉常山銼松蘿茶各一兩半龍膽去苗杏仁去雙仁皮尖麩炒各一兩上粗搗篩每服五錢水二盞入竹葉十片淨洗細切同煎至一盞去滓空心服吐之即瘥若腹中熱滿入芒硝半錢梔子仁一兩黃芩一兩半苦參一兩一方用枳實無枳殼雷丸丸出聖惠方治心臟勞熱傷心有長蟲名白蟲長一尺貫心為病雷丸灰火炮過陳橘皮湯浸去白焙桃仁去雙仁皮尖麩炒各一兩一分狼牙去連苗處淨刷去土銼一兩半貫衆大者去須半兩白蕪荑炒青葙子炒乾漆炒令煙出各一兩亂髮如雞子大一團燒為灰上除亂髮燒灰外余搗為末然後與亂髮灰同研令勻煉蜜和更於鐵臼內塗酥杵令勻熟丸如梧桐子大每服空心溫酒下十五丸至晚再服米飲亦得一方不用塗酥一方有殭蠶吳茱萸根皮貫衆散出千金方治腎勞熱四肢腫急有蟯蟲如菜中蟲生於腎中貫衆大者三枚去須乾漆炒令煙絶三兩吳茱萸水洗七遍焙乾炒一兩半白蕪荑炒槐白皮乾者各一兩銼胡粉炒黃色研一兩杏仁去雙仁皮尖麩炒令黃色半兩上除別研胡粉外搗羅為散更與胡粉同研令細每服二錢空心服用井華水調服日晚再服檳榔散出直指方治蟲多脾病乍去乍來嘔吐清沫雞心大檳榔貫衆各二分石菖蒲木香各一分甘草炙一錢上銼每三錢水煎空心吞蠶靈砂十丸或金液丹蓋靈沙金液有硫黃水銀能殺蟲也桑根白皮酒千金方治肺癆熱生蟲在肺為病桑根白皮東引者切一升狼牙去連苗處淨刷去土三兩吳茱萸根白皮東引者淨刷去土五合上細銼用酒七升煮取二升去滓分作三服每日空腹一服一方無狼牙茱萸根浸酒方出聖惠方治脾癆熱有白蟲在脾中為病令人好嘔吳茱萸根東引大者一尺銼大麻子八升淨揀陳橘皮湯浸去白炒二兩上先搗碎橘皮麻子如泥然後拌茱萸根用酒一斗浸一宿慢火上微煎絞去滓分作五服每服空心溫服蟲即下凡欲合藥時忌言合煞蟲藥一方以水煎服檳榔散楊氏家藏方治蟲動心痛檳榔雞心者一兩乾漆炒令煙出一兩石灰火煅放冷三兩上件為細末每服一錢用熱酒調放溫連二服不拘時候一方用杏仁輕粉最殺蟲殺腑臟蟲以槐花炒服治五種蟲以楝皮去其蒼者焙乾為末米飲下二錢匕蟯蟲附論夫蟯蟲是九蟲之一甚微細如今之蝸蟲亦由臟腑虛弱而致發動其始若不足慮者然其生化衆多攻心刺痛時吐清水在胃中侵蝕不已日加羸瘦甚則成痔瘻疥癬癰疽諸癩害人若此絶其本根勿使能殖則毒而治之所不可忽方石榴散出聖惠方治蟯蟲醋石榴根銼乾漆碎炒煙出狼牙去苗土鶴蝨檳榔銼各一兩上為細散每服二錢空心溫酒調下芫花散出聖惠方治蟯蟲芫花三分醋拌炒令乾狼牙三分雷丸三分桃仁三分湯浸去皮尖雙仁生用白蕪荑三分上為細散隔宿勿食平旦以粥飲調下一錢一方無白蕪荑又方聖惠方貫衆狗脊白蕪荑以上各一錢桃花半兩麝香一分研入上為細散每服二錢空心溫酒調下良久再服蜜香丸治蟯蟲密陀僧煅一兩麝香研半分硫黃研一分定粉研半兩上為細散醋煮麵糊丸梧桐子大每服十丸空心蕪荑湯下槐皮丸治蟯蟲在胃漸加羸瘦槐皮乾者銼桃仁去皮尖雙仁生用楝實去核生用各半兩上為末煉蜜豬膏丸如人指大以綿裹導下部中巴豆桃仁丸治蟯蟲巴豆五枚和皮燒令煙斷去皮心桃仁去皮尖雙仁炒二兩上同研極細丸如大麻子大每旦空心服溫漿水下大人兩丸小兒一丸蟲未下再服艾汁方治蟯蟲攻心如刺吐清水並寸白蟲候良久再服蟲當下以生艾葉並嫩心切二升搗研絞取汁兩盞許宿不食平旦先嚼干脯少許後頓飲汁不能盡即兩日服一方治蛔蟲旦取肥香脯一方寸片先吃令蟲聞香然後飲艾汁一盞當下蛔一方搗艾葉以苦酒煎服之良一方治寸白蟲隔宿勿食取好淡羊肉乾脯一二兩嚼咽汁令蟲聞香然後飲艾汁一盞又取水解一盞五更初先吃炙豬肉一片服之蒺藜散治蟯蟲上七月七日採蒺藜子並苗葉陰乾燒存性細研每服二錢食後煎蕪荑酒調下日三又治諸蟲方水銀膏治蟯蟲咬人下部癢上水銀一兩用蒸棗膏和丸如人指大綿裹臨臥納下部中一宿納藥時當留綿帶子在外一方水銀損腸宜慎之治蟯蟲方以好鹽末二兩苦酒半升合銅器中煮熬數沸宿不食空心頓服之治蟯蟲攻心如刺口吐清水並蛔蟲咬腹內痛用苦楝子取根銼水煮令濃赤黑色以汁合米煮作糜隔宿勿食來明旦飲一匙為始少時復食一匙米糜便下蟯驗或用楝皮去其蒼乾者焙為末米飲下二錢兼治五種蟲一方療蛔蟲但取肥香脯一片先吃令蟲聞香舉頭向上稍從一口為度始少進自然食一匙半升糜便下蛔一方用苦楝樹白皮水煎去滓熬成膏五更以溫酒調服半匙用銀器內熬蛔蟲附論夫蛔即九蟲敘所謂長蟲者今此析而治之蓋較之他蟲害人為多觀其發作冷氣臍腹撮痛變為嘔逆以至心中痛甚如錐刺昔人謂蛔厥貫心能殺人則所以治之不可緩也聖惠論曰蛔蟲者是九蟲內一蟲也長一尺亦有長五寸或因腑臟虛弱而動或甘肥而動則腹中痛發作種聚行上下痛無休息亦攻心痛喜吐涎及清水貫傷心者則死診其脈腹中痛當沉弱而弦今反脈洪而大則是蛔蟲也方烏梅丸治蛔厥令病者靜而復煩臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人自吐蛔兼治久痢烏梅一百五十個當歸川椒去目汗細辛附子炮去皮臍桂心人參黃柏各三兩乾薑炮五分黃連八兩上為末以苦酒漬烏梅一宿去核蒸之五斗米下熟搗成泥和藥相得納臼中與蜜杵一二千下丸如梧子大食前飲服十丸稍加至二十丸溫米飲下食前服當歸湯治蛔蟲心痛如錐刺時吐白蟲當歸切焙一兩桔梗銼炒一兩半陳橘皮去白微炒桂去粗皮人參各半兩赤芍藥三分鶴蝨去土微炒二分檳榔炮銼一分朴硝別研三分上除朴硝外粗搗篩入朴硝拌勻每服三錢水一盞煎至七分去滓空心服後半時辰再服蘼蕪丸治少小有蛔蟲結在肚腹中數發腹痛微下白汁吐而悶寒熱飲食不生肌皮肉痿黃四肢不勝舉蘼蕪貫衆雷丸山茱萸天門冬狼牙各八分雚蘆甘菊花各四分上為末蜜丸如大豆三歲飲服五丸五歲以上以意加之漸至十丸加雚蘆六分名雚蘆丸治老小及婦人等萬病腹內冷熱不通急滿痛胸膈堅滿手足煩熱上氣不得飲食身體氣腫腰腳不遂腹內狀如水雞鳴婦人月經不調無所不治集效丸出和劑方治因臟腑虛弱或多食甘肥致蛔蟲動作心腹絞痛發則種聚往來上下痛無休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥服之亦愈又治下部有蟲生痔癢痛木香鶴蝨炒檳榔訶子煨去核蕪荑炒研附子炒去皮臍乾薑炒各七錢半大黃銼炒一兩半上為末蜜丸如梧子大每服三十丸食前橘皮湯下婦人醋湯下當歸散治蛔蟲痛發作冷氣先從兩肋連胸皆撮痛欲變吐逆當歸切焙鶴蝨去土微炒各二兩陳橘皮去白微炒人參各一兩半檳榔炮銼三兩枳殼去瓤麩炒黃色芍藥各一兩半桂去粗皮一兩一分上為散每服二錢空心煎棗湯調下至晚再服雷丸散出聖惠方治九種心痛蟲痛為先雷丸炮一兩貫衆去須一兩半狼牙去蘆頭並土銼一兩當歸切焙一兩半檳榔炮銼一兩桂去粗皮一兩半鶴蝨去土炒一兩陳橘皮去白炒一兩上為散每服二錢空心煎粟米飲調下晚食前再服以大下蛔蟲為度一方用蜜湯下柴胡湯治蛔蟲心痛柴胡去苗一兩半當歸切焙食茱萸去枝莖各一兩芍藥一兩半厚朴去粗皮塗生薑汁炙熟銼一兩檳榔炮銼三枚郁李仁湯浸去皮三分上粗搗篩每服三錢水一盞煎至六分去滓食前溫服日三桔梗散治蛔蟲攻心痛桔梗銼炒當歸切焙芍藥各三分橘皮去白微炒半兩檳榔煨銼鶴蝨各一兩去土微炒萆薢銼炒各一兩上為散每服二錢空心煎生薑棗湯調下至晚再服鶴蝨散治疳蛔寸白蛔蟲等發作心腹㽲痛鶴蝨去土微炒三錢檳榔炮銼一兩二錢楝根皮結子東南引者以石灰如拳大水兩碗浸兩宿曝乾二兩半陳橘皮去白微炒半兩大麥糵炒一兩半牽牛子一半生用一半炒熟三兩糯米一合上為散每服二錢空腹煎粟米飲調下如未轉瀉即更服仍時時煎姜蜜湯熱投之治蛔蟲出本草用省藤煮汁服之桑根白皮湯出聖惠方治蛔蟲心痛每發連臍腹刺痛多吐涎沫桑根白皮細銼三兩醋石榴皮乾者一兩白蕪荑微炒檳榔炮銼厚朴去幹粗皮塗生薑汁炙熟各半兩上粗搗篩每服三錢水一盞入生薑一小塊擘破同煎至六分去滓空心服至晚再服石榴皮湯出聖惠方治蛔蟲心痛腹中㽲刺痛不可忍往往吐醋水酸石榴皮三分檳榔炮銼一分桃符一兩半碎銼分為五度用胡粉一分微炒別研上先粗搗篩前二味後以胡粉拌勻分為五服煎每服水一盞入桃符一分酒半盞同煎至七分去滓空心溫服至晚再服萆薢散治蛔蟲發作萆薢銼炒白蕪荑微炒狗脊去毛銼各一分上為散每服二錢溫酒調下欲服藥先隔一宿吃牛肉乾脯一片次日空心服藥蟲下即瘥麝香散治大人及小兒疳蛔腹中虛脹面目痿黃麝香銼研一分干蚯蚓慢火炙黃半兩干蝦蟆一枚塗脂抹粉酥炙黃赤色淨剔去骨並腹中惡物上先搗蚯蚓等物為散與麝香同研令勻細每服一錢空腹煎薏苡根湯調下高良薑湯治蛔蟲高良薑銼一分苦楝根皮乾者銼二兩胡椒三十粒上粗搗篩每服三錢水一盞煎至六分去滓空心服服訖臥少時未得吃食或吐或瀉即瘥雚蘆散出千金方治蛔蟲懊憹雚蘆炙黃碎銼乾漆搗碎炒令煙絶各二兩萹蓄去根及土乾者三分上為散每服一錢煎粟米飲調食前服日三漆煎丸出肘後方治蛔蟲蟯蟲在胃令人漸漸羸瘦清漆綿濾過一方用好鹽白蜜清酒各半升上同攪令勻於銅鍋中微火煎常令沸不住手攪候如膏可丸即止丸如雀卵大每服一丸隔宿不食空心溫酒化破服之蟲即下不下再服亦可丸如梧桐子大空心服酒下二十丸甘草粉蜜湯出金匱方治蛔蟲之為病令人吐涎心痛發作有時甘草二兩粉一兩蜜四兩上以水三升先煮甘草取二升去滓納粉蜜攪令和煎如薄粥溫服一升瘥即止檳榔煎一名必效散治蛔蟲並寸白蟲檳榔炮銼五枚酸石榴根皮入土五寸東引者去土細銼一升上先將檳榔粗搗與石榴根各均分作三度用每度用水二升半煎至一升半絞去滓入粟米一合煮如粥平旦空心頓吃利下蟲即效一方治寸白蟲為散淡豬肉汁調五更初服候半時辰再服一方石榴根煎湯調末服先將豬肉含口中咽津下去肉卻服藥狼牙散出肘後方治蛔蟲或攻心吐清水並療白蟲狼牙一兩蕪荑一兩上細羅為散每服空心先吃少淡羊肉乾脯即以溫酒調散二錢服之不過三四服永瘥治蛔蟲用麻蕡搗葉水絞取汁服五合治石蛔腹脹面黃極難療者用死人枕煮汁服之昔張景年十五歲腹脹面黃衆藥不能治以問徐嗣伯曰石蛔耳極難療當取死人枕煮汁服之得大蛔蟲頭堅如石者五六升病即瘥石蛔者醫療既癖蛔蟲轉堅世間無論藥不能遣所以須見鬼物驅之然後乃散故令煮死人枕服之治蛔蟲咬心痛面青口中沫出臨死者出本草取萹蓄葉十斤細切以水三石三斗煮如餳去滓適寒溫空心服一升蟲即下至重者再服仍通宿勿食來日平明服之治蛔蟲出本草以鼴鼠肉令人小兒食之療蛔蟲攻心如刺吐清汁出外臺祕要用雚蘆單末之豬肉臛和食之亦作羊肉臛和之日一頓服佳治蛔蟲取楝實沉苦酒中浸再宿用綿裹納穀道中入三寸一日易之治寸白蛔蟲用金櫻花止冷熱痢殺寸白蛔蟲等薏苡根湯出千金方治蛔蟲以薏苡根一握去土碎銼粗搗篩水三盞煎至一盞半去滓分二服空心先吃餳少許然後溫服一方治蛔蟲攻心腹痛蠶蛹汁方治蛔蟲取繅絲蠶蛹兩合爛研生布絞取汁空心頓飲之非繅絲時即須依時收取蠶蛹曝乾搗羅為末用時以意斟酌多少和粥飲服之鶴蝨散療蛔蟲並三蟲諸蟲出千金方取波斯鶴蝨三兩搗散以肥豬羊肉但得一色以蔥豉為臛汁每旦空腹以臛汁和一方寸白匕頓服稍多飲臛汁佳若不能散服即以蜜和為丸如梧桐子大一服十丸還以此臛汁下之如明旦服今晚即勿食明旦服藥訖還至巳時為佳要服此丸散使盡以後三十日勿雜食永瘥或以苦酒空心服之亦治諸蟲一方治延年蛔蟲出吐水心痛淡醋和服之或蜜丸平旦漿服一方治三蟲以豬羊肉臛汁調一錢空心服殺蛔蟲出本草以鹽麩子楝樹根白皮煎服殺腸中蛔蟲出本草用小麥熬煎末服療蛔蟲咬心痛取鶴蝨十兩搗篩蜜和丸如梧子大以蜜湯空腹吞四十丸日增至五十丸慎酒肉一方平旦漿水服二十丸又千金方為末溫醋下蟲當出桔梗散治蛔心痛桔梗炒三分當歸切焙一兩芍藥銼炒雷丸人參各三分貫衆半兩檳榔銼一兩半陳橘皮去白焙一兩上為細散每服二錢空心煎薑棗湯調下日晚再服漸加至三錢增損當歸湯治心痛發作痛無休止喜涎出是為蛔蟲亦治心腹蘊蘊然痛當歸切焙一兩半芍藥銼碎微炒三兩黃芩去黑心朴硝桔梗炒柴胡去苗各二兩升麻一兩半上羅勻每服三錢水一盞煎七分去滓溫服狗脊丸治蛔蟲心痛狗脊去毛一兩吳茱萸水浸一宿焙乾炒半兩陳橘皮去白焙三分蕪荑三分檳榔銼一兩半上為細末煉蜜和丸如小豆大每服二十丸食前橘皮湯下蕪荑散出聖惠方治大人小兒蛔咬心痛經云蟲貫心則殺人欲驗之大痛不可忍或吐清黃緑水淋沫或吐蟲出發無休止此是蛔心痛也宜速療之仁存方乾漆槌碎炒火煙盡一兩雷丸蕪荑各半兩上為細末每服二三錢溫水七分盞調和服不拘時甚者不過三服小兒每服半錢重薑黃散治蛔蟲心痛喜吐水衝刺痛不可忍或不能食面黃腹滿薑黃一兩三分雚蘆銼一兩鶴蝨微炒一兩一分上搗篩每服三錢水一盞煎七分又入酒一合更煎取沸空心服晚食熱飯即蟲下一服未盡更服鶴蝨飲治蛔咬心痛鶴蝨微炒苦楝根有子者良焙各一兩硇砂研如粉一兩上先以二味粗搗篩入研藥和勻每服三錢水二盞新匙一柄銼折同煎一盞下朴硝末一錢煎沸去滓空心服乳香散治蛔心痛乳香研一分鶴蝨炒三分檳榔銼一兩半上為細散每服三錢大麻子汁調下檳榔散治蛔咬心痛檳榔銼蜀椒去閉口及目炒出汗各半兩上為細散每服二錢米飲調下空心日晚各一服吳茱萸散治蛔心痛吳茱萸水浸一宿焙乾炒半兩鶴蝨微炒一兩半上為細散每服二錢空心溫酒調下鶴蝨檳榔湯療心痛不可忍似蛔者鶴蝨二兩小兒用一兩大腹檳榔二七枚切碎皮子上以豬肉汁六升煮檳榔取三升去滓納鶴蝨末先夜不食明旦空腹頓服須臾病下及吐水瘥神效七日禁生冷酢滑一方用暖火麻仁汁調下二錢又方發時取鹽一匕含口中水下立定蟲即出治蛔蟲用麻葉搗爛用水泡絞取汁五合服之麻葉乃今人績布者是也去蛔蟲用楝根煮汁作糜食之治蛔蟲用漏蘆杵為末以餅臛中服方寸匕治大人小兒蛔咬心痛心腹脹滿黃瘦用醋麻子搗為末每服一錢匕調服之甚效寸白蟲附論夫寸白蟲乃九蟲之一種也狀似絹邊葫蘆子因臟氣虛風寒濕冷伏於腸胃又好食生膾乾肉等所以變化滋多難於蠲治說者謂食牛肉飲白酒所致特一端爾亦未必皆緣此方檳榔散治蛔蟲寸白蟲蛔蟲檳榔銼一兩半當歸切焙鶴蝨各二分貫衆銼雷丸炮各半兩蕪荑仁微炒陳橘皮湯浸去白焙各三分上搗羅為散每服二錢空心煎棗湯調下至晚再服漸加至三錢利為度錫灰丸出直指方取寸白諸蟲錫灰研細末一兩雞心檳榔貫衆各半兩木香二錢半輕粉黃丹為末各二錢上為細末酒醋煮麵糊丸荔枝幹大每服一丸米泔浸軟日先吃飯了至黃昏不飢飽食時吃肉脯一片引蟲候少刻溫酒嚼下天明蟲出又吃韭菜治寸白蟲取寸白蟲出本事方錫灰一兩木鱉一兩蘆薈二十文黃丹十文輕粉十文上為末豬膏油丸如桐子大先齊一日晚莫吃飯次早五更溫水吞下分作二服取寸白蟲出本事方蕪荑十文雞心檳榔二個狼牙草半兩雷丸三文輕粉少許上為末每服二大錢四更時茶清調下隔夜點取茶四更時取清石榴根散治寸白蟲醋石榴根東行者去土五兩碎銼水二碗煎至一小碗去滓檳榔一顆生銼為末膩粉研半錢匕鉛丹炒半錢匕上先取檳榔末等三味細研令勻再溫石榴根汁調藥末五更頓服凡欲服藥清早先吃肥豬肉次便服藥檳榔散出聖惠方治寸白蟲以每月一日二三日服之餘日勿服檳榔銼二兩陳橘皮湯浸去白焙桑根白皮銼各三分蕪荑炒一兩上四味搗羅為散每一服一錢半以漿水一中盞濃煎醋石榴根湯調空心服欲服藥隔宿勿食侵早先取干脯一片細嚼咽汁少頃即服藥至晚蟲未下煮桑白皮汁服之治寸白蟲令化為水出聖惠方狗脊貫衆白蕪荑醋石榴根銼以上各一兩上為散每服半兩以漿水一大盞煎至五分去滓四更初溫服先於晚間不得吃夜飯又方出聖惠方狼牙白芨白蘞白蕪荑以上各一兩上為細散每日空心以溫酒調下二錢香附丸一名化蟲丸治葫蘆蟲亦治寸白蟲兼諸蟲木香為末一分附子生去皮臍為末硫黃研各半兩上先用密陀僧末半兩入醋熬成膏然後入三味藥末一處和丸如小豆大每服十五丸溫酒下食前服一方先以釅醋一升煎附子末為膏次入三味為丸冷茶下一方冷荊芥湯下頭日不晚食五更服為妙白蘞散出肘後方治寸白蟲為病令人眼無光澤腳膝少力蕪荑六分狼牙四分白蘞二分上治下篩以苦酒二合和一宿次早空腹服之一方漿水服二盞治寸白蟲出德生堂錫沙作銀泥者無即以黃丹代油和丸如梧桐子大蕪荑檳榔二味等分為末上濃煎石榴根汁半升下散三錢一方用黃丹丸五枚中夜服旦日下見蟲檳榔散一名寸白蟲飲子治寸白蟲石榴根銼陳橘皮湯浸去白焙桑根白皮各一兩上細銼分作三服每服水盞半煎至一盞去滓五更初調生檳榔末二錢至天欲明不瀉至曉又一服如蟲母未下再服或瀉不止吃冷粥止之石榴根湯治寸白蟲令人羸瘦醋石榴根東行者一大握銼蕪荑微炒二兩牽牛子微炒別搗末半兩上前二味粗搗篩每服五錢水一盞半煎至一盞去滓下牽牛子末半錢煎沸空心溫服如人行十里再服以快利蟲下為度橘皮丸治寸白蟲陳橘皮湯浸去白焙乾二兩蕪荑仁炒狼牙去苗銼各一兩半上為末煉蜜和為劑更杵令勻丸如梧桐子大每服三十丸食前溫漿水下日三服檳榔湯治寸白蟲檳榔銼一十四枚薤白細切一盞許鹽豉一盞許上先將檳榔粗搗篩與余物各分為三分煎每分以水三盞煎至一盞半去滓分三服隔宿勿食侵早空心一服如人行六七里一服蟲未下再服水銀丸治寸白蟲水銀錫白蠟與上二味結沙子各一分上熟研以糯米粥丸如皂子大每服溫酒夜嚼一丸次日食前取下蟲母瘥石榴根湯醋石榴根一握楝皮一兩檳榔三枚銼搗為末上除檳榔末外各細銼以水三盞煎至一盞半去滓入檳榔末攪勻分溫二服空心相繼服盡當有蟲出次煮薤粥補之療寸白蟲為水瀉出永除方棐子檳榔蕪荑各等分上為散溫酒服二錢先燒牛肉脯吃後服藥也治寸白蟲令化為水十全良方萆薢一兩銼甘草三兩炙銼微赤狗脊三兩上為細散每服二錢食前粥飲調下又方出聖惠方檳榔二枚一半生一半煨杏仁七枚湯浸去皮尖雙仁麩炒微黃醋石榴根一握銼上細銼水二大盞煎取一大盞去滓空心分溫二服凡欲出蟲時先坐暖屋兼食少淡羊肉乾脯微燒過爛嚼咽汁待引得蟲聚即服藥良久又候腹內似不安甚即轉動以快利為度後服蕪荑湯一小碗子補之永瘥又方出聖惠方麝香二錢細研蕪荑仁三分狗脊半兩上為細散入麝香研令勻於月朔日以淡漿水空心調下二錢良久再服從早至食時可三數服當以下蟲為度一方以蕪荑湯下又方出聖惠方狗脊一兩萆薢半兩銼貫衆半兩上為細散每服空心以蕪荑湯調下二錢以蟲出盡即止又方出聖惠方桑根白皮一兩銼檳榔半兩搗碎桃根白皮一兩銼上以水三中盞煎取二盞去滓隔宿勿食空心分溫二服蟲下治寸白蟲出肘後方胡麻一升熬令黃香胡粉一兩熬上為末明旦空腹以豬肉臛汁啖盡即瘥一方名胡粉丸療心痛不可忍似蛔者用生真胡麻一合胡粉半合熬搗先以豬肉脯一片空心腹啖咽汁勿咽肉後取前藥搜作丸以少清酒盛頓服盡十歲以上增減忌生冷豬肉魚雞蒜酢滑等七日若是蛔吐水者是也取寸白蟲出本事方畫粉密陀僧各等分上為末每服二錢用麻油調服空心下頃刻成涎取下療白蟲方出肘後方寸白者亦九蟲之一也長一寸而色白形小𥚹因臟腑虛弱而能發動或云飲白酒以桑枝貫牛肉炙食之並食生粟所成又食生魚後即飲乳酪亦令生之其發動則損人精氣腰腳疼弱此蟲生長一尺則殺人淳漆二合豬血三合上相和微火上煎之不著手成宿勿食空腹且先吃肥香脯一片服如大豆許一百丸日中蟲悉出亦主蛔蟲療白蟲並治三蟲出聖惠方東引茱萸根一大握切麻子半大升上先搗麻子極碎又盆中熟研以水一大升更和研絞取濃汁以浸茱萸根一宿明旦煮兩三沸頓服如不頓服分再服如至明旦欲服藥今日午後便不得食仍須先嚼一片肥干脯咽汁然後服藥服一劑去蟲不盡停一日更作服一劑永瘥後一月勿食脂膩魚肉必效不用脯余一方同銼搗用酒二升漬一宿去滓空腹暖頓服之聖功散療寸白蟲不拘遠年神效南木香檳榔各等分上為細末濃米飲調三錢許黎明空心先熟嚼炙豬肉之屬只咽汁吐去滓便服藥辰巳間蟲下其疾遂除此方簡易如是而取效神速諸名醫未知有此用之屢驗治寸白蟲令化為水出聖惠方楝根五兩銼粳米二合上藥以水三大盞煎楝根取汁二合盞去滓入米作粥煮隔宿勿食旦朝先吃淡羊肉乾脯令蟲舉頭便食其粥其蟲即盡下治寸白蟲出千金方用棐子四十九枚去皮平旦空腹服七枚七日服盡蟲消成水永瘥又云日食七顆七日滿蟲化為水一方以一百枚只默啖之食盡佳不能者但啖五十枚亦得經宿蟲消自下一方並治三尸蟲又方出千金方取吳茱萸北陰根干去土切一升以酒一升浸一宿平旦分二服凡茱萸皆用細根東引北陰者良若如指以上大不任用又方用石榴根如茱萸法亦可水煮又方出千金方研大麻取汁五升分五服亦可治小兒蛔蟲又方出千金方以好麻油二升煎令熟內蔥白三寸蔥白黑便熟冷頓服之又方出肘後方熬餳令十分燥作末以藥方寸匕納羊肉臛中服之又方出肘後方用桑根白皮切三升以水七升煮取二升宿勿食平旦空服頓服一升蟲立下桑白皮亦可用又方出千金方以金櫻根東行者二兩秫米二十粒水一升煎去滓半空心服須臾下蟲如神效一方用糯米三十粒又方出本事方以鉛錫灰炒雞子吃亦可或只用錫灰為末以棗肉丸如梧桐子大先齊一日次日五更吃炙肉一片次溫水下石榴湯出聖惠方治寸白蟲蛔蟲以酸石榴根南引者掘取洗淨細銼半升用水五升煎取半碗已下去滓五更腹空時先炙豬肉隨意吃下引蟲不可過飽然後溫服此藥只作一服蟲自取下吃白粥一日補之永絶根一方用東南引根並東引根有人服之一啜即下而愈一方取石榴東引根令患人以手大指與第三指滿握一握兩頭出者總留之又取干脯肥者如手大一片細銼以水四升漬之一宿明旦煮取一升去滓分三服如人行十里久每欲服先嚼脯一片然後飲藥並令人以手按所患人腹令藥易宣都服了有頃當日便蟲出服藥以月一日至五日以前是蟲頭向上服之得力無問多少皆得出盡若疑蟲未盡更合一劑永愈一方酸石榴東向根三五錢重用水一碗半煎八分隔宿煎來早用半精肥肉四塊令病人聞之頃食其肉次煎藥服若氣虛者覺如醉夢寢至申未間蟲下不過兩服蟲上旬頭向上下旬則無效又方一名玉粉散出仁存方熬胡粉令焦燥平旦先作肉以藥納肉中吃之大效或以生麻油調一錢服一名韶粉又方出肘後方用雷丸水浸軟去皮切焙乾為末每有病者五更初先食炙肉少許卻以稀粥調藥末服之即時下服之須上半月日蟲乃下治寸白蟲出仁存方用新生棐子五更初吃半升許其蟲去根取寸白蟲出本事方用苦綿菰子不拘多少研為末每服二錢好酒半盞空心調服治寸白蟲出大全良方用黑鉛灰炒四錢若服先吃豬肉脯少許一時來卻用砂糖濃水半盞調灰五更服蟲盡下白粥將息一日良余宣和中每覺心中多嘈雜意謂飲作又疑是蟲漫依良方所說服翌日下蟲二條一長二尺五寸頭匾闊尾尖鋭每寸作一節斑斑如綿紋一條皆寸斷矣千金方謂勞則生熱熱則生蟲心蟲曰蛔脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶五蟲皆能殺人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咯血斷嘶藥所不到治之為難有人說道臟中載諸蟲皆頭項下行唯自初一至初五以前頭上行故用藥者多取月朔以後蓋謂是也牙子治寸白蟲方出肘後方用狼牙五兩搗末蜜丸如麻子大宿不食明旦以漿一合服盡瘥治患中宿冷寸白蟲用山豆根為末每朝空心熱酒調三錢其蟲自出如小兒乳汁調半錢療心痛不可忍似蛔者黑鉛散一名青金散治寸白蟲纍取不盡久令人面黃心中如肌出肘後方用黑鉛沙子盡家銀塗是也研極細每服二大錢五更初肉汁調頓服至平明取下蟲立瘥一方以豬肉三兩片炙令香熟再三蘸藥細嚼米飲下空心食前檳榔散出三因方治寸白蟲用檳榔如雞心者一枚為末欲服藥隔宿不吃晚食放飢睡先用鹽醋等炙雜肉脯一片香熟次日五更令病人空腹嚼脯咽津卻吐出肉用溫米飲調檳榔末一錢頓服即睡至午前取下蟲方可食多者不過再服月一至初五以前服尤佳一方治諸蟲在臟腑久不瘥用茶蜜或蔥蜜湯調服一錢至二錢一方用水煎服一方二七枚為散水先煮其皮減半去滓納末頻服暖臥療白蟲方出肘後方用濃煮豬肉汁煎檳榔三十枚取三升服之蟲盡出又方出肘後方用熟煮豬脂血宿勿食明旦飽食之蟲當下又方以橘實破其上取皮中子搗合蜜丸如梧子大隔宿不食旦以醋漿水若米汁下三百丸然後食蟲並死下或以糜爛皮亦可丸服八十丸忌如常法又方出聖惠方用熟煮豬血以蕪荑鹽醋早晨飽啖蟲出盡即止又方出聖惠方治寸白蟲令化為水用狗脊三兩搗細羅為散每於空心以蕪荑湯調下二錢催取寸白蟲出本事方巴豆七粒去殼出油皂角去皮取末一錢用京墨磨醋糊為丸如桐子大只作二服五更初橘皮湯下取寸白蟲方出淡寮方鉛灰三錢雄黃半錢密陀僧半錢麝香一字檳榔一個上為細末用豬膏油香油亦可打卯餅入藥末小半於餅內用其卯餅於五更初時逐漸蘸藥細嚼吃盡未可吃飯食候至早食時服烏梅丸烏梅丸方出淡寮方用巴豆去油二粒蒸爛烏梅肉為丸分作二七粒飯飲吞下七粒稍久臟腑未轉再吞二粒凡取此蟲須斷葷腥三四日縱腹肚嘈雜亦當忍耐服藥後須以軟爛粥飯將息亦未須便吃葷腥若覺蟲下未盡或可斟酌再服藥取令盡為度仍須月初一二間服藥為妙化蟲散出衛生寶鑑取寸白蟲黃丹半兩炒過錫灰一兩羅過定粉二兩上件三味同研極細末每服稱一錢先燒肉五更吃了後用生油一口許調藥都一服至晚取下婦人有胎不可服李副統女子菊花年十三歲此藥一服取蟲一抄終身不發雷丸散余居士選奇方取寸白蟲檳榔雞心者一兩雷丸圓淨內白者研一兩忌火雄黃別研黃丹韶粉以上三味各半兩上件為細末每服一大錢油泡湯調服二更時服至五更時卻服後方雙粉散催之雙粉散余居士選奇方下寸白蟲兼取蛔蟲石灰一兩水化去火毒黃丹半兩韶粉半兩輕粉一錢上件為細末每服一大錢煎史君子湯調下五更初服如患蛔蟲二更時只服此藥不須服前方雷丸散治蛔蟲咬心心痛用苦楝根皮煎一大盞服治蛔蟲出本草用繅絲湯熱取一盞服之此方煮為繭汁為其殺蟲故也治蛔蟲攻心臍如刺口吐清水取雞子一枚開頭去黃以好漆納於中合和仰頭吞之蟲出治蛔蟲攻心腹痛出本草取薏苡根二斤切水七升煮取三升先食盡服之蟲死盡出療蛔蟲心痛積年久不瘥出本草用取苦酒五合燒青錢二文令赤安酒中則取雞子白一顆卻去錢瀉著酒中頓服瘥治蛔蟲攻心痛以史君子任意吃又方出仁存方以鹽醋煮馬齒莧一碗空腹食之少時當盡下一方生搗絞汁服當利下惡物療蛔蟲方出聖惠方以緑豆三升煮取濃汁麻子一大升研取汁一升以下然後取汁半升和豆汁一升更暖令溫正發即炙羊肉脯令熟先含咽汁三五咽即服之須臾即吐出或利其蟲已消如帛練帶三二百條如未盡更服即永絶一方服麻子汁效治蛔蟲咬心楚痛宛轉欲死方出聖惠方濃搗地黃汁和麵煮作冷淘不用著鹽醋盡意食之如一頓蟲不出即再服食治蛔蟲攻心如刺吐清水出聖惠方用龍膽一兩去頭銼水二盞煮取一盞去滓隔宿不食平旦一頓服療蛔蟲攻心取槐子樹上木耳燒灰為細末每服水調如棗許正發時服若不止飲熱水一升蛔蟲出療蛔蟲心痛噁心吐水用乾漆熬搗蜜和丸如梧子大每服十五丸日再服貫衆散出聖惠方治蛔蟲攻心吐如醋水痛不能止貫衆一兩鶴蝨一兩紙上微炒狼牙一兩麝香一錢細研蕪荑仁一兩龍膽一兩去蘆頭上細羅為散食前以淡醋湯調下二錢通大小腸治蛔蟲攻心痛白麻油一合大寒雞子兩顆平芒硝一兩味辛苦大寒惡麥句姜上三味攪勻服之少時即瀉治寸白蛔蟲取櫻桃東行根搗絞汁服之治寸白蟲用緑礬一塊枯之為末溫漿水一盞生油五七點同調五更初服治寸白蟲用銀泥錫一彈子大以生麻油和丸南粉為衣作餅子厚著竹紙裹尉斗火上焙乾出火毒候冷令病人五更初用丁香七粒同一餅細嚼冷酒咽下至曉腹痛如廁蟲盡出永不發䘌蟲附論夫五臟下唇內生瘡者其人喜眠此蟲在下蝕其下部人不能知可服此蝕蟲藥不爾䘌蟲殺人凡患濕䘌者多是熱病後或久下不止或有客熱結在腹中或易水土溫涼氣著多生此病亦有干䘌不甚泄利而下部瘡癢不問乾溼久則殺人凡濕得熱而苦利單煮黃連及艾葉苦參之屬皆可用之若病人齒齦無色舌上白者或喜眠煩憒不知痛癢處或有下利急治下部不曉此者但攻其上不以下部為意下部生蟲蟲蝕其肛肛爛見五臟便死燒艾於竹筒薰之方懊憹散出千金方治濕䘌瘡爛殺蟲除䘌方萹竹半兩雚蘆雷丸青葙女青桃仁各三兩上治下篩粥飲服方寸匕日三加至二匕亦酒服治濕䘌方青黛二兩黃連黃柏丁香各一兩麝香三分上治下篩以小棗大內下部中日一度重者棗大和車脂二三合灌下部日二次治濕䘌方取生薑刮去皮斷理切之極熟研取汁一升半又以水一升半合和相得平旦空腹服仍削生薑二枚如繭大以楸葉苦桃葉數重裹訖於煻灰火中燒令極熱納下部中食頃若濕盛者作三平旦頻服無有不瘥穀道䘌赤痛又癢方用杏仁熬令黃搗以綿塗導之又方用雄黃吹在上良治䘌蟲蝕下部出本草以泥作罌以竹筒如指大一頭坐罌缸中一頭下部孔中以雞子大艾一團燒之以泥作罌口吹之常令艾煙熏下部強人可益良久治濕䘌方出千金方黃連生薑各十兩艾葉八兩苦參四兩上羅勻以水一斗煮取三升分三服久者服三劑姜蜜湯出千金方治濕䘌生薑汁五合白蜜三合黃連三兩上以水二升別煮黃連取一升去滓納姜蜜更煎取一升二合五歲兒平旦空腹四合日三二杏仁湯出肘後方治䘌杏仁五十枚苦酒三升鹽一合上和煮五合頓服之小兒以意量服阿膠湯出千金方治䘌蟲蝕下部癢穀道中生瘡阿膠炙燥當歸切焙青葙子炒各一兩上粗搗篩每服五錢水一盞半入艾葉十餘片同煎至一盞去滓空腹午食前近晚各一治蟲蝕下部方出千金方胡粉雄黃上各等分為末著穀道中亦治小兒治蟲已蝕下部肛盡腸穿者取長腿蝦蟆青背者一枚雞骨一分燒為灰合吹下部令深入數用大驗治蟲狀如蝸牛食下部癢萹竹一把水二升煮煎五歲兒空腹服三五合隔宿合明早食之尤佳甚驗治下部蟲齧並三蟲出千金方杵梅桃葉一斛蒸之令極熱納小器中大布上坐蟲死或以桃葉汁飲一升療瘟癘疳䘌出本草以崑崙草搗汁單服一名草蒿即葙子苗也治百蟲入肉䘌蝕瘙疥出梅師方以繭滷汁浸瘡治疳䘌無問去處皆治之出梅師方以蝦蟆燒灰好醋作敷日三五度敷之瘥
