body:
  text: 卷一百七十二積聚門積聚心腹痛附論夫積者陰之氣五臟所生其痛不離其部故上下有所窮也聚者陽之氣六腑所成故無根本上下無所留止其痛無常處此皆由寒氣搏於臟腑與陰陽之氣相擊上下故心腹痛也診其寸口之脈沉而橫脅下有積腹中有橫積聚痛又寸口脈細沉滑者有積在脅下左右皆滿與背相引痛又云寸口脈緊而牢者脅下腹中有橫積結痛而泄痢脈微細者生浮者死方旋覆花湯出聖濟總録治冷積不去氣澀腹痛飲食不下旋覆花微炒三分當歸切焙黃連去須桑根白皮陳曲牛膝切焙芎藭射干龍骨白朮各一兩半枳殼去瓤麩炒桂去粗皮地榆各一兩杏仁湯浸去皮尖雙仁炒二十枚附子炮裂去皮臍赤石脂厚朴去粗皮生薑汁炒各二兩黃芩去黑心半兩黑豆一合草豆蔻去皮二枚桃仁去皮尖雙仁炒二十一枚上細末每服五錢水一盞半煎至八分去滓溫服訶黎勒丸出聖惠方治積聚心腹相引疼痛胸膈氣滯不能飲食訶黎勒皮一兩川大黃二兩銼研微炒烏頭一兩當歸一兩銼微炒木香一兩白朮一兩桂心一兩吳茱萸半兩湯洗七次焙乾微炒檳榔一兩蓬莪朮一兩青橘皮一兩湯浸去白焙神麯一兩微炒令黃上搗細末後將硇砂三兩用醋二升煎半去滓入前藥末四兩納硇砂醋中攪和勻於銀鍋內煎成膏和余藥末搗三二百杵丸梧桐子大每於食前以生薑橘皮湯下二十丸檳榔散出聖惠方治積聚心腹內疼痛檳榔一兩赤芍藥半兩枳殼半兩麩炒黃去瓤芎藭半兩赤茯苓一兩柴胡一兩去苗木香半兩川大黃一兩微炒當歸三分銼碎微炒甘草三分炙微赤陳橘皮一兩湯浸去白瓤焙桃仁半兩湯浸去皮尖炒上為粗散每服三錢水一中盞煎至六分去滓不拘時候稍熱服桂心散出聖惠方治積聚心腹痛面無潤澤日漸黃瘦桂心一兩川大黃一兩銼碎微炒桔梗一兩去蘆頭木香一兩附子一兩炮裂去皮臍白朮一兩高良薑半兩芎藭半兩當歸一兩銼微炒檳榔赤芍一兩枳實半兩上為細散每於食前溫酒調下五錢生薑湯下亦得青橘皮丸出聖惠方治積聚心腹疼痛全不飲食青橘皮二兩湯浸去白瓤焙當歸一兩微炒枳殼一兩麩炒黃乾漆一兩搗碎炒令煙出附子一兩炮裂去皮臍木香一兩白朮二兩桃仁一兩湯浸去皮尖雙仁麩炒黃桂心一兩川椒二兩去目及閉口者微炒出汗川大黃二兩銼碎微炒厚朴二兩生薑汁炙令香上為細末煉蜜和搗三二百杵如桐子大每服於食前以溫酒下三十丸丁香爛飯丸出瑞竹堂治食傷太陰又治猝心胃痛消食快氣丁香一錢香附子半兩甘草炙三錢甘松三錢去土稱砂仁三錢益智三錢荊三稜一錢炮木香一錢廣朮一錢炮上為細末湯浸蒸餅和丸如緑豆大每服三十丸白湯送下或細嚼亦可不拘時候或丸如桐子大亦可通命丸療心腹積聚寒中㽱痛迫滿脅下急繞臍痛大黃遠志黃耆麻黃去節甘遂鹿茸炙各四分杏仁六十枚去皮尖雙仁者熬香豆鼓一合熬芒硝三分巴豆五十枚去心皮熬上搗篩和以蜜丸如小豆先食三丸日再忌蘆筍野豬肉木香散出聖惠方治積聚心腹疼痛胸膈氣滯四肢無力不思飲食木香三分訶黎勒皮檳榔青橘皮各半兩湯浸去白瓤焙白朮一分赤苓人參一分去蘆頭桂心一分厚朴半兩去粗皮塗生薑汁炙令香熟上為細散每於食前以溫酒調下二錢生薑棗湯調下亦得大黃丸出聖惠方治積聚氣心腹妨悶疼痛川大黃一兩銼碎微炒當歸三分微炒芎藭三分訶黎勒皮檳榔各一兩川烏頭一兩炮裂去皮臍乾薑三分炮裂銼吳茱萸半兩湯浸七次焙乾微炒桃仁一兩湯浸去皮尖雙仁麩炒微黃上件藥搗羅為末煉蜜和搗三二百杵丸如桐子大不計時候溫酒下三十丸氣痞丸療寒氣痞積聚結不通繞臍切痛腹中脹滿胸逼如戳憂恚所積用力不節筋脈損傷羸瘦不能食飲此肉食之人強嗜力食益氣壯力烏頭炮甘草炙葶藶熬大黃芎藭芍藥柑皮炙各二分上搗篩蜜和丸如梧桐子大每服三丸日再不知漸加至五丸七丸一方桂二分去柑忌海藻菘菜豬肉冷水等一方有通草無柑皮烏頭丸療久寒積聚心腹繞臍切痛飲食不下烏頭炮甘草炙各三兩茱萸半兩細辛半夏洗三十次附子炮藁本各三兩上下篩蜜和丸如桐子大先食前服五丸日再不知稍增之忌羊豬肉冷水薑菜海藻菘菜化鐵丹出御藥院方治遠年近日沉積及內傷冷物心腹疼痛烏梅八枚不去核巴豆十六枚不去皮胡椒四十八粒青皮半兩陳皮半兩二味俱不去白上為細末醋麵糊和丸如緑豆大每服五七丸食後生薑水下若不化更加蓽澄茄半兩丁香二錢半服之更快巴豆丸出聖惠方治心風積聚時有疼痛巴豆二十枚去皮研紙包壓去油桔梗一兩去蘆頭杏仁二十枚湯浸去皮尖雙仁麩炒微黃藜蘆一兩去蘆頭炙黃皂莢二兩去皮塗酥炙令黃焦去子上藥先搗桔梗皂莢藜蘆等羅為末後細研巴豆杏仁如膏煉蜜搗三二百杵丸如小豆大每日虛心溫水下三丸如未覺即加至五丸萬靈丸治積聚滯氣胸膈痞悶心腹刺痛雄黃研大黃銼炒陳橘皮去白焙白牽牛末肉蓯蓉酒浸切焙青橘皮湯浸去白焙杏仁去皮尖雙仁炒乾漆炒煙出巴豆去皮心膜出油各半兩訶黎勒炮去核三分木香藿香葉天南星炮各一分胡椒半上為末用薄荷汁煮麵糊丸如緑豆大傷飲食生薑下三丸至五丸傷酒嚼燒生薑下十丸婦人血氣心痛酒煎當歸調沒藥末一錢匕下十丸百當膏出聖濟總録治一切積聚心腹疼痛年月深久者皆治一歲至百歲並可服丹砂膩粉研各半兩水銀鉛各一分二味炒紫牛黃研龍腦研粉霜研陽起研各一分黃蠟半兩巴豆肥者一百二十粒去皮心膜研出油取霜用蠍梢炒一分半夏一錢湯洗七次二味杵羅為末上合研極細勻熔蠟並熱蜜少許同和成膏旋丸如梧桐子大每服三丸至五丸量大小虛實加減服吐逆藿香湯下取熱積生薑蜜水下取冷積乳香湯下風涎薄荷湯下便利米飲下沉香丸治五積氣結面色萎黃心腹疼痛口吐酸水有時發咳積年不已沉香半兩丁香半兩木香半兩硇砂一分研巴豆霜半兩蓬莪朮煨銼桂去粗皮乾漆炒出煙乾薑炮青橘皮去白焙荊三稜煨銼白豆蔻去皮各一兩大黃一兩生為末用醋一升慢火熬成膏上搗研十二味為末入大黃膏和丸如梧桐子大每服五丸食後臨臥生薑湯下乙丑丸出聖濟總録治食積隱伏見時作攻心脅㽱刺疼痛硇砂細研湯內飛過去砂石熬取霜烏頭生用去皮臍為末各一兩沉香末五靈脂末去粗皮各半兩胡椒末乾薑末巴豆去皮心膜研各半兩乾漆末三分上除巴豆外同研勻次入巴豆再研極細同熟棗肉和作一塊用濕紙裹三五重用紙筋黃泥固濟約厚半指許用慢炭火十斤於乙丑日早漸進火燒令香為度以新盆器合候冷取出其焦紙灰不用搗爛看黃色再入熟棗肉和約千餘杵得所丸如梧桐子大每服三丸溫木瓜酒下木瓜湯下亦得不計時候服如瘕癖積塊及諸冷氣㽱刺疼痛或泄痢膿血食前服五丸至七丸看虛實加減狼毒丸出聖惠方治積聚氣結成塊段在腹下久不消散發咳疼痛狼毒細銼醋拌炒令乾芫花醋拌炒令乾乾漆搗碎炒令煙出雄雀糞微炒五靈脂鱉甲塗醋炙令黃去裙襴硫黃細研入硇砂不夾石者細研以上各一兩膩粉半兩研入上件藥搗為末入研藥令勻以醋煮麵糊和丸如梧桐子大每服空心以醋湯下三丸至五丸當利下惡物吳茱萸散出聖惠方治積聚氣心腹脹痛飲食減少四肢不和吳茱萸一兩湯浸七次焙乾微炒白朮一兩當歸一兩銼碎微炒枳實半兩麩炒微黃紫菀一兩湯浸去皮微炒桂心一兩檳榔一兩鱉甲一兩塗醋炙令黃去裙襴郁李仁一兩湯浸去皮微炒上為粗散每服四錢水一中盞生薑半分煎至六分去滓食前稍熱服縮砂丸出楊氏方溫中散滯消飲食治胸膈噎悶心腹冷痛大能暖化生冷果食夏月不可缺天南星湯浸七次去皮焙乾碎高良薑各四兩縮砂仁一兩上為細末生薑自然汁煮麵為丸如梧桐子大每服五十丸生薑湯下尉氣法出淡療法方大艾打爛砂石銚內多酒少醋炒令香熟上以二三絹袋盛藥更替乘熱搭腹上印尉一法只炒食鹽令極熱按尉痛處亦效軟犀丸出楊氏家藏方治久虛沉積心腹撮痛腸滑下痢臟腑不固日漸羸瘦沉香檀香各一分丁香木香肉豆蔻麵裹煨熟檳榔以上四味各半兩六味同為細末巴豆二十一粒去殼杏仁二十一枚去皮尖炙白丁香一字鷹糞白一字百草霜一字上件除前沉香等六味外將後巴豆等五味用鐵銚子內慢火炒至煙出無令太過不及候得所用一瓷盞放冷一宿研細與前藥末相和研勻用黃蠟一兩半麻油一兩同煉熔和藥成劑旋丸如緑豆大每服十丸至三十丸生薑湯下食後臨臥服異香紅丸子出楊氏家藏方治一切積聚心腹疼痛婦人血氣攻注常服消宿食破積氣沉香硇砂別研使君子去殼蓬莪朮泡切荊三稜硃砂別研木香以上七味各一分檳榔一枚大者肉豆蔻一枚大者母丁香五粒巴豆二十粒好者去皮心膜不出油研黑牽牛一兩炒熱取末半兩入藥余者不用蓽澄茄一分上件為細末麵糊為丸如緑豆大硃砂為衣每服三丸茴香湯下欲微利加至五七丸食後服賜方五香湯出楊氏家藏方治積寒攻衝腹脅疼痛木香沉香滴乳香別研藿香葉去皮吳茱萸湯浸七次以上五味各三兩麝香一兩別研上件除乳麝外為㕮咀以水五升煮取二升去滓入二香煎令再沸分三服一方寒熱頭痛加獨活四肢不舉無力口乾加桑寄生連翹兩脅脹痛加射干大黃大黃看虛實加減小便不利加通草不拘時候服治五臟癥結心腹積聚疼痛用戎鹽水消服之積聚宿食不消附論凡飲食入胃脾臟化之若腹有積聚攝養乖度飲食不時則脾胃愈弱飲食遲化故為宿食不消之病其狀噎噫食氣臭胃脹煩滿診其脈來實者是也人之有身藉五穀以生故胃以納之脾以克化之脾胃喜暖不宜以生冷傷之體虛者不善調養飢飽失時或過減飲食並一切生冷之物脾胃怯弱不能克化停蓄胃脘遂成宿滯輕則吞酸嘔惡胸滿噎噫或泄或痢其臭如抱壞雞子或米穀不化甚則積聚結而為癥瘕之病治之須究其源又須量人氣體虛實病症淺深投以藥餌病之淺者則消化之甚則必須推利而後調補脾胃或有挾寒熱之氣而泄者又當以脈證辨而料理凡一切冷食不消宿酒不散亦類傷寒身熱惡寒戰栗頭痛腰脊強不可用雙解散只可用導飲丸木香檳榔丸共六十丸量虛實加減利五七行所傷冷物宿食酒推蕩盡頭疼病自愈矣次以五苓散生薑棗用長流水煎取五六錢不可服酒症丸進食丸此藥巴豆有大毒故也凡一切沉積或有水不能食使頭目昏眩不能清利可茶調散吐之次服七宣丸木香檳榔丸膏粱之人起居間逸奉養過度酒食所傷以致中脘留飲脹悶痞塞必當服木香導飲丸治之若田野芻蕘之人食疏衣薄動作勞役若酒食所傷心腹滿悶醋心時吐酸水可用進食丸以共勝毒也病甚者每日泄三五次夫𣖫飪之邪從口入者宿食也蓋五味入口所以滋養五臟得之則生不得則死傷之則反為害所以宿食為雜病之先若五臟不平食不輸化血凝氣滯群症蜂起皆宿食所為也治之宜量臟腑虛實淺深為治養生方戒不得用巴豆令服青木香丸如有食癖非巴豆不克所謂擾乎可擾擾亦無擾方集香丸治傷生冷硬物不消荊三稜廣朮青皮陳皮益智茴香川楝子丁香各一兩巴豆和皮米炒焦黑色五錢上為細末醋和為丸每服五七十丸生薑湯下治一切氣宿食不消方上用訶黎勒一枚入夜含之至明嚼咽紫沉消積丸出華他方治久積伏滯胸膈膨脹心腹刺痛不化飲食及婦人血氣疼痛沉香銼阿魏醋化研巴豆霜各一兩硇砂研細一兩以上四味同研勻用蜜一斤酒二盞共熬成膏以瓷盒盛丹砂二兩硫黃研木香人參桂去粗皮胡椒各四兩丁香乾薑炮各二兩上將前四味蜜酒熬成膏余並搗羅為末用膏和搗千百杵丸如緑豆大每服五七丸溫橘皮湯下如心痛溫酒下婦人血氣痛當歸湯下一方有沒藥一兩鱉甲散出聖濟總録治肋下結塊連心腹痛食冷物即劇鱉甲去裙襴醋炙蒺藜子炒去角各二兩黃芩去黑半兩桂去粗皮一兩柴胡去苗桔梗炒當歸切焙牛膝醋浸切焙赤茯苓去黑皮芍藥大黃銼醋拌炒人參陳橘皮湯浸去白焙訶黎勒煨去核各二兩檳榔銼二分上搗羅為散每服二錢煮棗湯調下葛花解醒湯出德生堂方治宿食酒傷胸膈滿悶口吐酸水惡食嘔逆及年遠日久酒疸面眼俱黃不思飲食葛花白豆蔻砂仁木香神麯各五錢乾葛陳皮白朮青皮白茯苓澤瀉各二錢豬苓人參各一錢五分甘草三錢上為細末每服二錢臨臥沸湯調服汗出立效不損元氣而散酒積毒如瀉者加豆蔻煨二錢荊三稜散治積聚氣脾胃虛弱不能化谷及宿食不消腹脅痛荊三稜一兩煨銼桂心三分丁香半分益智三分去皮木香五錢大腹皮一兩銼前胡一兩去蘆白朮二分厚朴一兩去粗皮塗生薑汁炙令香熟乾薑半兩炮裂銼蓬莪朮二分郁李仁一兩湯浸去皮微炒青橘皮一兩湯浸去白瓤焙赤茯苓一兩川大黃一兩銼碎微炒上為粗散每服三錢水一中盞生薑半分棗三枚煎至六分去滓每服食前稍熱服藿香煮散治久積聚宿滯不消或翻胃吐逆噁心乾嘔及脾寒等疾藿香葉木香陳橘皮湯浸去白焙肉豆蔻去殼煨人參訶黎勒皮去黑皮白茯苓去黑皮甘草炙草豆蔻去皮麥糵炒厚朴去粗皮生薑汁炙各一兩高良薑銼炒五錢乾薑炒半兩上搗羅為散每服二錢水一盞生薑一塊打碎同煎至七分入鹽一捻熱服水瀉及腸風毒熱陳米飲調下神效感應丸治常服消宿食除積滯不動臟腑黑角沉磨木香檀香全丁香陳皮青皮黃連砂仁香附子去黑毛見白巴豆三百粒肥白者淨研為細末半夏水浸去面衣三稜略煨蓬朮大者煨各一兩肥烏梅肉重一百文上用瓷器一隻盛巴豆上以烏梅蓋之卻用陳米醋浸過與烏梅肉平於甑上蒸至極熟以巴豆紅色為度卻濾出研令極爛次用糯米棕和前件諸藥搜勻搗千百杵以黑色為度衆手丸如蘿蔔子大每服一十丸宿食不消陳皮湯下氣滯茴香湯下酒後嘔吐薑湯下法制生薑散治飲酒過多或生冷停滯嘔逆噁心不欲飲食生薑十兩切用青棒擂過白麵拌浥焙乾桂去粗皮青皮去白陳皮去瓤半夏生薑制白朮各一兩丁香木香去白蓽澄茄各二兩半白豆蔻縮砂仁白茯苓各一兩半甘草炙葛根各半兩上為細末每服三錢溫酒調下不拘時候仙方內消丸治酒食過傷脾胃青皮去白陳皮去白蒼朮米泔浸桂去皮三稜煨蓬朮煨乾漆炒出煙芫花醋煮草霜附子故紙炒皂角各三兩黑牽牛半兩半生半熟上為末醋和為丸如桐子大每服三十丸隨湯下一方加半夏三兩訶黎勒散出聖惠方治積聚宿食不消四肢羸瘦乏力訶黎勒一兩煨用皮附子一兩炮去皮臍草豆蔻一兩去皮白朮三分當歸半兩煨碎微炒人參半兩去蘆頭神麯一兩煨黃耆三分銼桂心一兩陳橘皮一兩湯浸去白瓤焙檳榔一兩郁李仁一兩湯浸去白微炒赤茯苓一兩上為粗散每服三錢水一中盞生薑半分棗三枚煎至六分去滓不拘時候稍熱服乳香丸出聖惠方治宿食不化心膈氣滯中焦不和及症癖積聚或多嘔逆並宜服之乳香半兩別研入木香半兩肉豆蔻半兩去殼當歸半兩微炒青橘半兩湯浸去白瓤焙荊三稜半兩煨銼乾漆半兩搗碎炒令煙出紫菀一兩去苗土乾薑一兩炮裂銼附子一兩炮裂去皮臍鱉甲一兩半塗醋炙令黃去裙襴硃砂一兩細研巴豆一兩去皮心研紙裹壓出油上藥除乳香硃砂巴豆外余藥並搗羅為末入研諸藥都研令勻每兩匙藥末用細蕎麵一匙相和更研令勻灑水為丸如緑豆大候乾以漿水煎令沸下藥丸子煮一兩沸候藥丸子浮上乃濾出於竹篩子內曬乾每服以溫湯下三丸或五丸若有久積聚常於臥時服五丸瘥木香丸出聖惠方治積聚氣脾胃虛冷宿食不消心腹氣滯脹滿疼痛木香三分銼白朮三分人參三分去蘆赤茯苓三分橘皮一兩去白吳茱萸半兩湯浸七次焙乾微炒乾薑半兩炮桂心三分訶黎勒一兩煨用皮檳榔一兩神麯一兩炒微黃大麥糵一兩炒微黃當歸半兩銼微炒川大黃一兩銼碎微炒桔梗半兩去蘆頭上為細末煉蜜和搗三二百杵丸如梧桐子大每於食前以溫酒下三十丸黑神丸出聖濟總録消積化氣進食木香硇砂研蓬莪朮煨銼荊三稜煨銼各半兩桂去粗皮附子炮裂去皮臍乾薑炮乾漆搗碎炒出煙大黃煨為末青橘皮湯浸去白焙墨燒過巴豆去皮心膜細研出油各一兩上以好醋一大碗先熬硇砂令沸又熬巴豆數沸次又加大黃末熬令成膏余藥並搗羅為末以膏杵和丸如萊蔔子大每服二丸至五丸茶酒任下如消食化氣生薑橘皮湯下小腸疝氣茴香酒下婦人血氣當歸酒下硇砂煎丸出聖濟總録治一切積聚停滯化氣消食補益真氣産後逐敗血補虛損硇砂揀通明無石者別研如粉當歸酒浸一宿去蘆頭切焙肉蓯蓉酒浸一宿薄切作片焙乾巴戟天酒浸一宿去心焙檳榔生各一兩楝實洗過切破四兩酒浸一宿候軟再以刀子刮割下瓤去皮核取用三兩蘹香子微炒木香沉香銼附子炮裂去皮臍天雄用酒煮五七百沸候軟刮下皮臍各一兩阿魏半兩米醋磨成膏入清茶上為細末以無灰酒煮麵和丸如梧桐子大每服三十丸空心日午溫酒下常有婦人病蓐中下痢日久甚困篤百方不瘥醫曰蓐中痢與他痢不同常痢可用苦澀藥只今蓐中痢生於血不足投澀藥則血愈不行痢當愈甚産後痢者宜投硇砂丸日三服痢頓減半次日遂愈此藥産後雖無病亦宜服之能養血去積滯應驗方治大人小兒百物所傷難經云脾氣通於口口和則知穀味矣心氣通於舌舌和則知五味矣知五穀味五味莫不由口舌而入胃也善攝生者謹於和調使飲食一入於胃隨消隨化則無滯留之患若稟受怯弱飢飽失時或過食五味魚腥乳酪強食生冷果菜停蓄胃脘遂成宿滯輕則吞酸嘔噦胸膈噫噎痞悶不食久則積聚結為癥瘕面黃羸瘦此皆宿滯不消而生疾大率才有停滯當量人虛實速宜克化之不可後時養成沉疴也青皮陳皮三稜蓬莪丁香木香檀香沉香麝香各一錢腦子半錢黃連三錢巴豆一百粒去皮心膜陳米醋半盞煮熟研令極細上為細末入巴豆合同麝香腦子十分和勻用糯米粽子取尖搜和勻成膏棒槌二十餘下丸如黍米大大人服三十丸小兒斟酌服之用陳皮湯任下臨臥服通神丸治積聚留飲宿食寒熱煩結長肌膚補不足蜀椒去目並閉口炒出汗附子炮裂去皮臍厚朴去粗皮生薑汁炙半夏湯浸七次焙各一兩杏仁湯浸去皮尖雙仁炒研如膏藶子紙上炒各三兩芒硝研五兩大黃銼炒九兩上除研外搗羅為末與杏仁芒硝研勻煉蜜丸如梧桐子大每服二十丸米飲下忌豬羊肉餳冷水小分氣丸治久積氣塊宿食不消胸膈痞悶痰逆噁心不思飲食臍腹刺痛醋心噎塞木香一兩檳榔銼陳橘皮湯浸去白焙楝實銼炒乾薑炮青橘皮湯浸去白各半兩蓬莪朮醋浸一宿煨一兩巴豆去皮心膜出油淨半夏湯浸一次去滑焙大黃煨銼各一分雄黃研一兩上為末醋煮麵和丸如緑豆大每服五丸至七丸溫生薑湯下食後臨臥服桂香勻氣湯治消積滯化宿食痰飲胸膈痞悶桂去粗皮丁香皮縮砂仁益智去皮炒檳榔銼陳橘皮湯浸去白焙一兩木香蓬莪朮煨各一兩烏梅和核一兩半青橘皮湯浸去白焙一兩巴豆去皮心膜研出油六十四粒上除巴豆外搗羅為末和勻煮麵和丸如麻子大每服七丸至十丸茶酒任下食後服乳香丸出聖濟總録丁香木香各一兩附子炮裂去皮臍五靈脂乾薑炮各半兩桂去粗皮芫花醋拌炒黃青橘皮湯浸去白焙各三分豬牙皂莢去皮酥炙一兩巴豆去皮心膜別研如膏新瓦上攤去油取霜一錢乳香一兩上除乳香五靈脂末巴豆以外八味搗羅為末入上三味拌勻煮陳面和丸如緑豆大每服二丸三丸生薑湯下量虛實加減食後臨臥服阿魏丸出濟生方治脾胃怯弱食麵或食生果停滯中焦不能克化致腹脹痛嘔惡不食或痢或祕悉主之阿魏酒浸化旋入官桂不見火蓬朮煨炮麥糵炒神麯炒青皮去瓤蘿蔔子炒白朮乾薑炮各半兩百草霜三錢巴豆去殼油三十粒上為細末和勻用薄糊為丸如緑豆大每服三十丸不拘時薑湯下面傷用麵湯下生果傷用麝香湯送下如意丸治消積化氣溫胃食後心膈妨悶威靈仙去苗土附子生去皮臍二味各半兩同為末用好醋半盞浸一宿硇砂細研一分巴豆十一粒去皮心膜出油二味同研用酒半斤醋半斤同煎與前二味同熬成膏木香半兩蓬莪朮煨銼半兩大黃銼炒三分青橘皮湯浸去白炒一兩神麯炒半兩丁香一分上將後六味為末以前四味膏和更別熬醋少許研墨汁同丸如緑豆大每服五丸七丸薑湯送下麝香丸出聖惠方治氣消食心腹氣痛麝香一分細研木香檳榔五靈脂半兩湯浸去白瓤焙巴豆半兩去皮心硫黃一兩上以生絹袋盛硫黃巴豆同納湯中煮懸袋於鐺上勿令著底可半日久去硫黃巴豆曬乾與木香四味加入麝香同研勻用水浸蒸餅和丸如緑豆大每服五丸以橘皮湯送下益智散出聖濟總録治脾胃虛冷積聚沉結宿食不化荊三稜煨銼益智去皮炒蓬莪朮煨銼白茯苓去黑皮各一兩青橘皮陳橘皮二味並湯浸去白焙人參銼甘草炙銼各半兩木香一分厚朴去粗皮生薑汁炙一兩一分上搗為散每服一錢入鹽少許沸湯點服不拘時候三臺丸出千金方療五臟寒熱積聚腹脹腸鳴而噫食不作肌膚甚者嘔逆若傷寒寒瘧已愈令不復發食後服五丸飲多者吞十丸長服令人大小便調和長肌肉病源云積聚而宿食不消者由腹臟為寒氣所乘脾胃虛冷故不能消化而為宿食也診其脈來長實心腹積聚飲食不消胃中冷故也大黃二兩熬熟硝一升葶藶一升煎前胡二兩厚朴一兩炙附子一兩炮茯苓半兩半夏一兩洗杏仁一升去皮炙炒細辛一兩上搗篩蜜和搗五千杵丸如桐子大酒服五丸稍加至十丸以知為度忌羊肉餳生菜酢物一方無厚朴硃砂丸出聖惠方治一切氣及消宿食硃砂三分細研木香一分檳榔半分阿魏半分皂莢一錢炙麝香半分肉豆蔻一分去殼巴豆二十枚去皮心以醋煮半日取出研令細上件藥為末都研令勻以糯米飯和搗三二百杵丸如麻子大每服不計時候以生薑橘皮湯下三丸至五丸快活丸黑牽牛半斤大麥芽半斤用巴豆三錢炒黃色去巴豆香附子四兩炒去毛青皮三兩半蘿蔔子四兩炒檳榔二兩蓬朮三稜醋炙各四兩大黃二兩生用上為細末水糊丸如梧桐子大每服七丸以淡生薑湯下木香丸治積聚宿食不消中脘痞滯煩悶氣促腹內刺痛噫氣不思飲食木香半分檳榔銼一兩陳橘皮湯浸去白焙半兩荊三稜煨一兩丁香一分乾薑炮一分蓬莪朮煨半兩巴豆去皮心膜出油半錢硇砂研飛半兩上除研外搗羅為末入巴豆硇砂合勻湯浸蒸餅丸如緑豆大每服二丸至三丸溫生薑橘皮湯下食後服黑虎丸出聖濟總録治諸積宿食不消芫花炒甘遂炒烏頭炮去皮臍荊三稜煨銼大戟炒銼牽牛子炒乾薑炒陳橘皮去白焙各半兩乾漆二兩炒出煙盡上為末以醋煮麵和丸如緑豆大每服二丸消食化氣溫水下取積滯米湯下溫病傷寒薑醋湯下氣痛艾湯下五臟氣虛炒蘹香子酒下瘧疾桃枝湯下婦人血氣勞氣醋湯下寸白蟲煎牛肉湯下巴豆丸出聖惠方治積聚宿食不消心腹脹滿疼痛巴豆半兩去皮心出油研入附子一兩炮裂去皮臍桂心一兩硫黃一兩半細研水飛過五靈脂一兩雄黃一兩細研水飛麝香一分細研乾薑一兩炮裂銼香墨半兩上為細末入巴豆都研令勻用糯米飯和丸如小豆大每服於食前以生薑橘皮湯下二丸丁香丸出聖惠方治積聚氣宿食留滯不能消化丁香半兩木香半兩巴豆一分去皮心出油研入硫黃半兩細研水飛硃砂半兩細研水飛膩粉一錢麝香一錢細研乳香半兩神麯一兩半別搗末上為細末都研令勻以酒煮神麯末和丸如緑豆大每服食前生薑橘皮湯下三丸治暴食宿食留飲不除腹中為患方出肘後方上用巴豆一枚去皮心熬之椒目十四枚豉十六粒合搏為丸服二丸當吐利不盡更服二丸服四神丸下之亦佳順氣丸治一切積氣宿食不消上用黑牽牛一斤取頭末用蘿蔔存頂蓋剜令空納藥末不許納實蓋頂紙封蒸熟取出藥末將蘿蔔擂碎取自然汁加白豆蔻末二三錢和丸如梧桐子大每服三十丸任意加減服之磨積消食治痞悶膨脹上以杏仁七粒去皮尖用巴豆一粒去殼同麩炒熟去巴豆不用每服細嚼三五枚溫湯送下食後臨臥服又方出肘後方上用椒目二兩巴豆一兩去皮心熬搏以棗膏丸如麻子大每服二丸痛止赤丸子出聖惠方化氣消食巴豆半兩用冷水浸一宿取出去皮心膜於紙上收干後將面作餅子攤巴豆在內如作夾子膏者面勿令薄熟湯內煮直候黃色漉出去面取巴豆於乳鉢內兩手研以細為度檳榔肉豆蔻去殼木香桂心乾薑炮裂銼青橘皮湯浸去白焙以上各半兩硃砂半兩細研上件為末入巴豆細研令勻以醋煮麵糊和丸如麻子大以硃砂末為衣滾過曬乾每服以橘皮湯下三丸硇砂煎丸出聖惠方治一切積滯氣脅膈不利飲食難化心腹結硬欲成癥瘕面色痿黃臍腹多痛硇砂一兩去夾石者研乾漆末一兩荊三稜一兩巴豆一兩去皮心研紙裹捶白以上四味用頭醋五升於瓷瓦器內以慢火熬三日成膏入後藥末川大黃一兩銼碎微炒附子一兩炮裂去皮臍香墨一兩青橘皮一兩湯浸去白焙當歸一兩銼微炒上件藥搗羅為末入前煎中相和搗一千杵丸如緑豆大每服一丸以溫酒下寬中丸專逐積滯化宿食利胸膈烏頭炮裂去皮臍吳茱萸湯浸焙良薑甘遂麩炒大黃梔子仁各半兩巴豆去皮心膜研出油四十九粒上為末用棗肉丸如緑豆大每服一丸生薑橘皮湯下檳榔丸出聖濟總録取積聚消宿食檳榔生銼二枚巴豆去皮心膜麩炒二十一粒牽牛子炒硇砂研一錢青橘皮湯浸去白焙半兩大黃濕紙包煨乾漆炒煙出各一兩上為末湯浸蒸餅丸如緑豆大以丹砂為衣每服一丸至二丸溫水下如要瀉取食積三五丸或七丸十丸量虛實加減空心煎蔥白湯下宜後服和氣人參湯出聖濟總録人參白茯苓去黑皮厚朴去粗皮薑汁炙肉豆蔻去殼甘草炙陳橘皮去白麩炒蘹香子炙木香白朮桂去粗皮各半兩上為細末每服二錢水一盞生薑三片棗一枚擘同煎至七分去滓溫服七星丸出聖惠方化氣消食巴豆一兩去皮心油煎令黃黑色去油硃砂細研檳榔木香乳香丁香肉豆蔻各半兩去殼上為末入硃砂巴豆等研勻以麵糊丸如麻子大每服以溫酒下五丸湯下亦得木香丸消食化氣利胸膈及積聚凝滯臟腑刺痛木香為末丁香為末巴豆去皮心膜研出油各半兩硇砂研半兩大棗去皮核烏梅去核為末各三十枚上先將水拌白麵作一薄餅以棗肉鋪餅上次以前四味藥末和勻復鋪棗肉上作饅頭裹就用炭火四圍炙燒候面焦黑約藥透取出地面上出火毒候冷打破去焦面不用將藥與烏梅末同搗稀麵糊丸如黃米大每服二丸至三丸食後生薑湯下或隨所傷物湯下黑丸子出永類鈐方治中脘有宿食吞酸噁心吐清水噫氣或心腹疼痛及中虛積聚飧泄赤白痢下烏梅肉七個百草霜三錢杏仁去皮尖別研三七枚巴豆去殼油二枚半夏湯泡七次九枚縮砂仁三七枚上為細末和勻用薄糊為丸如黍米大每服十五丸加至二十丸用熟水送下薑湯亦得更酌虛實增損丸數或因食生冷魚膾得病用治中湯送下亦得雞舌香散出德生堂治男子婦人陰陽不和臟腑虛弱中脘氣滯宿食停積留飲不消胸脅脹滿心脾引痛攻刺腹脅有妨飲食及治中酒吐酒停飲侵積嘔逆噁心噫氣吞酸良薑官桂香附芍藥各一兩甘草二兩半烏藥一兩上為細末每服二錢入鹽少許沸湯點服不拘時此藥治心氣疼大妙巴豆丸出聖惠方治冷氣破積聚消宿食巴豆一兩以漿水煮一日不住添熱水去皮心膜紙裹壓出油桂心一兩硫黃一兩研細水飛過木香一兩檳榔半兩附子半兩炮裂去皮臍上件為末入巴豆硫黃同研令勻用軟飯和丸如緑豆大每服以生薑湯下五丸木香丸治積聚宿食不化留滯成塊心腹疼痛脾倦多困日漸黃瘦木香三分蓬莪朮荊三稜三味煨銼各一兩丹砂研三分巴豆去皮心膜研出油二十粒上將前三味搗羅為末入巴豆丹砂醋煮麵糊丸如緑豆大每服三丸至五丸生薑橘皮湯下食後臨臥服治積聚宿食不消虛羸腹脹出聖惠方吳茱萸二兩湯浸七次焙乾微炒巴豆半兩去皮心研如膏紙包壓出油上件藥先搗羅茱萸為末以釅醋一大碗浸茱萸末一宿至來日於銀鍋內熬候茱萸似膏即入巴豆膏更熬候可丸即丸如緑豆大空心以溫酒下三丸如氣散惡物下即住服小丁香丸出聖惠方治積滯生冷留飲宿食止痰逆噁心霍亂嘔吐治心腹脹滿肋脅刺痛胸膈痞滿噎塞不通常服順脾胃進飲食五靈脂十二兩丁香三兩木香一兩半肉豆蔻去殼三十枚巴豆去皮出油二百一十粒上為細末入巴豆令勻麵糊和丸如黍米大每服五丸至七丸溫生薑湯下橘皮湯亦得食後服如霍亂吐逆煎桃葉湯冷下小兒吐逆不定三歲服三丸五歲以上服四丸用生薑桃葉湯下治積聚氣宿食留滯不能消化出聖惠方木香一兩青橘皮一兩湯浸去白瓤焙肉豆蔻三分去殼巴豆半兩去皮心出油研入神麯一兩微炒上為細末入巴豆研勻以醋煮飯丸如小豆大每服食前以生薑湯下三丸五福壽命丹治一切積氣及酒醉解醒專治酒痰寬胸利膈枸杞子生白礬枯各一兩天麻去節半兩半夏湯炮乾薑生各一兩半上為細末蒸餅生剜裹藥蒸熟去蒸餅皮將藥入臼中搗千下如干入酒些少丸如梧桐子大每服五七十丸生薑湯下日二服陷胸湯出千金方治胸中心下結積飲食不消栝蔞實大黃黃連各二兩甘草一兩上㕮咀以水五升煮取二升五合日三服加味青木香丸出危氏方治粢糕傷脾噫醋不食心腹作痛百藥不效宜用青木香丸三百粒白丁香十粒小酒麴二錢同為末入巴豆三粒更和研令勻蒸餅為丸如緑豆大每服二十丸漸加至三十丸生薑橘皮湯下宿滯既去其疾自安只用小酒麴木香二件為末鹽湯調服口有酒香是效治暴宿食留飲不除腹中為患方出肘後方大黃茯苓芒硝各三兩巴豆一兩上搗蜜丸如梧桐子大一服二丸不痛止木香枳朮丸治宿滯氣消飲食開胃進食木香一兩枳實炒一兩白朮二兩上為細末荷葉燒飯為丸如梧桐子大每服五十丸溫水送下治宿食不化嘔吐酸水胸膈痞悶冷氣腹痛肺寒咳嗽並皆治之陳皮去皮四兩生薑一兩半洗甘草一兩炙上㕮咀炒令黃赤乾研為末每服二錢鹽湯點服化滯丸專治飲食不消氣閉肚疼裡急後重白瀉男女並可服之黃丹一兩黃蠟一兩巴豆肉三錢上黃丹巴豆二味同細研用碗一個香油少許慢火化開蠟後三四次下前藥調勻滴入水不散為度都傾入水中取出每服如蘿蔔子大水大積者十五丸生薑湯下水小積者虛實隨加減用服硃砂丸治大人小兒百物所傷黃丹一兩白麵四兩巴豆五十粒去殼去油研細上三味合和一處用砂鍋炒黃色傾出煮數沸去水冷定入木香三錢硃砂二錢前後五味共搗數千下為丸如黍米大每服薑湯下大人三十丸小兒十五丸二歲三丸量病人虛實感應丸十六羅漢杏仁生八金剛巴豆四菩薩晉棗本方無分兩依方修合休要差萬兩黃金不如他巴豆去皮棗兒去核裝巴豆二個同杏仁紙裹水蘸濕燒熟杵一千餘下用油單紙包裹旋用每服如緑豆大五七丸空心送下看人虛實加減用黑神丸巴豆血餘灰百草霜上各分停蜜丸梧子大每服五七丸看人虛實與藥白朮丸治積聚宿食不消腹脅下妨悶血臌羸瘦骨節痠疼多有盜汗白朮一兩黃耆一兩銼牡蠣一兩燒為粉人參一兩去蘆頭赤茯苓一兩川烏頭一兩炮裂去皮臍乾薑半兩炮裂銼木香一兩當歸一兩銼微炒赤芍藥三分桂心一兩甘草半兩炙微赤銼防葵半兩鱉甲一兩塗醋炙令黃去裙襴紫菀半兩去苗檳榔一兩桔梗去蘆頭半兩枳殼一兩熬炒微黃去瓤上為細末煉蜜和搗三二百杵丸如梧桐子大每服於食前以溫酒下三十丸蠲痰丸磨積滯化氣寬中南星水煮一滾每個切作四塊半夏不切皂角切作段子生薑切皮明礬捶破各四兩將五味一處於炒罐內用水自卯時煮至酉時以南星內無白點為度有此不妨揀去皂角不用只將余藥切作薄片曬乾或焙乾為末杏仁湯泡去皮炙神麯麥芽青皮陳皮去角紫蘇皮乾葛枳殼去瓤香附子糖球子蘿蔔子微炒木香各二兩上為細末入前藥末拌勻以生薑自然汁同拌隔三四月藥成餅去皮搜碎打糊為丸如梧桐子大每服六七十丸臨臥白湯送下露宿丸療心腹積聚膈上下有宿食甘草三分炙大黃甘遂芫花熬大戟炙葶藶子熬各二分苦參硝石各一分巴豆半分去皮心熬上用細搗合蜜和丸如小豆大每服三丸當吐下不吐下稍益至五六丸以知為度先少服忌蒲藻蘆筍菘菜野豬肉治積聚宿食不消虛羸腹脹肥皂莢半兩炙去皮子搗為末甘遂三錢曬乾生搗羅為末牽牛子二錢生搗為末上件藥一處更研細如面患人二十以上用藥末一錢涼水濕拌用面杆作餛飩子十枚煮熟別用暖水嚼破下之良久方取下積聚如未轉即更以煎水調藥末半錢投之良久取下積食初服藥後患人如欲睡是藥力行量人虛實加減服之五靈脂丸化氣消食五靈脂一兩巴豆四十枚去皮心膜以濕紙五重裹於煻灰火內煨令熟取出細研壓出油木香半錢上件為末研巴豆令勻以麵糊和丸如緑豆大每服以橘皮湯下五丸消食方上用石燕在乳穴石洞中者冬月採之堪用余者不中治消食如常法取二十枚投酒二升中漬之三日後取出令飲三盞隨意多少甚益氣力香曲散治食過飽煩悶但欲臥而腹脹上熬曲令微香杵服方寸匕須大麥生曲佳無曲以糵亦得又凡人飲食過度生嚼蘿蔔咽之獨效散療食生冷雜物或寒時衣薄當風夜食便臥不消心腹煩滿疼痛脹急或食不化以火燒地令極熱即臥地覆被取汗愈消食丸出楊氏家藏方消食化積治久痢心膈不快腹脹不思飲食烏梅肉攣者五十枚捶碎炒令焦黃色巴豆五十枚生用去皮殼熬肉桂去粗皮半兩胡椒二十粒吳茱萸湯泡七次一兩上件為細末濃磨細松煙墨水浸蒸餅和劑令勻丸如緑豆大每服五七丸溫熟水送下如心腹痛醋湯下食後服救生丹消酒食化氣滯宣利胸膈丁香一分肉桂一分去皮大甘草銼七分燒存性面曲半兩燒存性木香一分巴豆十五個去皮用油煎令黃色為度上件六味一處杵為末以酒煮糊為丸如緑豆大茶酒任下三兩丸大黃丸治凡積滯氣餒食即不消風熱氣上衝宜服此利氣川大黃四兩銼碎微炒訶黎勒皮四兩人參三兩去蘆大麻子三兩上件藥搗羅為末煉蜜和丸如梧桐子大每服酒下十五丸老少以意增減服之以溏利為度青空湯出集驗方治傷酒食飽滿上青橘皮一兩湯浸去穰入鹽四銖炒為末熟湯下二錢類攻散出集驗方凡所食不消上取其餘類燒作末酒服方寸匕便去宿食即瘥張文仲備急同陸光祿説有人食桃不消化作病時無桃林間得稿桃子燒服之登時吐病即瘥麝香三稜丸出楊氏家藏方化生冷宿食散心腹脹悶止嘔吐噁心勻氣寬膈消痰美食荊三稜煨切二兩人參去蘆頭一兩白朮一兩丁香一兩陳橘皮去白半夏湯洗七次各二兩神麯炒黃沉香各半兩麝香半錢別研上件除麝香外並搗為細末次入麝香研令勻煮糊為丸如緑豆大每服三十丸溫生薑湯下食後服青鹽丸出衛生寶鑑治一切冷積作痛無時宿食不消及治一切酒食所傷巴豆三十個去皮心膜出油硇砂一兩鹽豉六十粒揀棗三十個青鹽一錢大椒三十粒細曲三錢上為細末入巴豆研令勻醋煮麵糊為丸如桐子大每服三十丸溫薑湯下空心食前服積在上食後服破積導飲丸出衛生寶鑑治內有積塊堅硬飲食不消化心下痞悶
