白米作粥半碗藥末四錢同米用慢火熬熟稀薄不用稠下薑汁一茶腳許蜜三大匙攪勻空腹啜之溫為佳如是中濕更入薏苡仁末二錢增米作一中碗此粥大治手足四肢不遂腫痛不能舉有此症者預服防之左氏云風淫末疾謂四肢為四末也脾主四肢因風邪客於肝則淫脾為肝克故疾在末穀氣引風濕之藥徑入脾經故四肢得安比湯劑極有力豫常制此方以授人服者良越婢湯治風濕疼痛腳弱不能行立麻黃一兩去根節白朮四兩石膏半兩大附子一個炮去皮尖甘草二兩炙上為粗散每服四錢水一盞半生薑七片棗子三個同煎一盞去滓溫服取汗此藥大能散風濕風盛麻痹者可服蠲痛丸治風寒濕痹筋骨重疼走注攻刺腰腳無力並宜服之草烏頭四兩去皮尖鹽炒煙天南星二兩生京墨半兩燒破故紙三兩炒沒藥一兩研地龍二兩去土五靈脂二兩炒乳香半兩研白膠香二兩熔開潑淨土上冷研上為末醋煮麵糊丸如梧桐子大每服十丸溫酒下漸加丸數服夏英公酒浸飲子治風疾防風細銼萆薢羌活秦艽牛膝敗龜虎骨桔梗晚蠶砂炒黃各二兩蒼耳五升去刺捶碎酥炙干茄根八兩洗銼蒸枸杞子炒五兩上十二味用好酒三斗浸瓶盛封蔽二七日開不得向面恐氣衝頭目每日空心午時及早晨各服一盞常令有酒氣一月除一切風毒濕痹癱瘓等疾神力丸出楊氏家藏方治風寒濕痹客搏經絡四肢拘攣腳膝疼痛筋骨無力及癱瘓嚲曳並宜服之牛膝去蘆酒浸焙乾何首烏蓯蓉酒浸焙乾川椒去目閉口炒各二兩木鱉子去殼天南星炮茴香炒防風去蘆萆薢附子炮去皮臍地龍去土微炒羌活去蘆烏藥金毛狗脊去毛白蒺藜炒去刺黃耆赤小豆覆盆子骨碎補去毛白附子以上十六味各一兩上銼為細末酒煮麵糊丸如梧桐子大每服三十丸至五十丸空心溫酒或鹽湯下牛膝丸出楊氏家藏方治諸風濕痹四肢拘攣腳膝疼痛腳氣等疾牛膝酒浸一宿焙乾川芎肉蓯蓉酒浸一宿焙乾羌活去蘆當歸焙麻黃去根節杜仲去皮薑汁浸銼炒赤芍藥木香沒藥別研乳香別研木瓜附子炮去皮臍萆薢大腹皮五加皮薏苡仁炒續斷上件等分為末同煉蜜為丸如梧桐子大每服三十丸溫酒送下空心食前石斛丸出楊氏家藏方治風濕客搏經絡筋骨疼痛四肢重痛石斛去根一兩牛膝酒浸一宿焙乾肉蓯蓉酒浸宿焙乾杜仲去粗皮薑汁浸炒各一兩金毛狗脊七錢半去毛木香一兩牡丹皮一兩人參去蘆七錢半黃耆一兩山茱萸七錢半防風去蘆半兩羌活去蘆七錢半川芎半兩檳榔一兩半熟地黃一兩半上研為細末煉蜜為丸如梧桐子大每服五十丸溫酒或鹽湯送下空心食前中行丸出楊氏家藏方治風濕毒氣客搏經絡流注作痛白芍藥五兩甘草三兩炙犀角屑三兩威靈仙去土一兩上研為細末煉蜜為丸如梧桐子大每服五十丸溫熱水下不拘時候服忌茶六月河中諸熱砂主風濕頑痹不仁筋骨攣腳疼痛冷氣襲癱瘓血脈斷絶出本草取干砂日曝令極熱伏坐其中冷則更易之取熱微通汗出隨病進藥及食忌風冷勞役治風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲以菖蒲採緊小似魚鱗者治篩一斤許以水及米泔浸各一宿乃刮去皮曝乾篩揚以糯米粥和勻更入熱蜜搜丸如梧桐子大綿葛袋盛置當風處冷干每以酒飲任下三十丸臨臥更服二十丸久服得效治風濕痹拘攣出本草以柴胡作湯浴之治風濕氣痹膝腳疼出本草用牛膝葉一斤切以米三合合豉汁中相和煮作粥和鹽醬空心食之治風濕瘙癮疹身癢痹出本草用蒴藋煎湯浴之亦以酒浸根梢食之治腰腎濕風痹常如水洗者出本草取鰻鱺魚以五味及米煮空心食之甚補有濕腳氣人服之良治大風濕痹不得屈伸出本草用赤車使者根以八月九月採之日乾浸酒服治四肢濕痹不得屈伸出本草菖蒲作湯浴之治男子婦人虛濕痹毒風痹痛去男子腰痛浴男女陰去風濕火蘊陽事主大風身癢出本草以蛇床子煎湯浴之即瘥治久風濕痹四肢拘攣骨肉疼痛用伏牛花湯浴之一名隔虎利花導引法養生方云任縱臂不息十二通愈足濕痹不任行腰脊痛又正臥疊兩手著背下伸兩腳不息十二通愈足濕痹不任行腰脊痛痹有偏患者患左壓右足患右壓左足久行手亦如足用行滿十二方止又云以手摩腹從足至頭正臥伸臂導引以手持引足住任臂閉氣不息十二通以療濕痹不可任腰脊痛
