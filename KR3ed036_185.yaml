body:
  text: 卷一百八十五諸痹門總論夫風寒濕三氣雜至合而為痹皆因體虛腠理空虛受風寒濕而成痹也痹之為病寒多則痛風多則行濕多則著在骨則重而不舉在脈則血凝而不流在筋則屈而不伸在肉則不仁在皮則寒逢寒則急逢熱則縱此皆所受邪氣而生也痹之為病總而言之凡有五焉筋痹脈痹皮痹骨痹肌痹是也其於春遇痹者為筋痹筋痹不已又遇邪者則移入於肝也其狀夜臥則驚飲多小便數夏遇痹者為脈痹則血脈不流令人萎黃脈痹不已又遇邪者則移入於心其狀心下鼓上氣卒然逆喘不通咽乾喜噫至陰遇痹者為肌痹肌痹不已後遇邪者則移入於脾其狀四肢懈惰發咳嘔吐秋遇痹者為皮痹皮痹則膚無所知覺皮痹不已後遇邪者則移入於肺其狀煩滿上氣奔而喘冬遇痹者為骨痹骨重不可舉不能遂骨痹不已又遇邪者則移入於腎其狀善脹診其脈大而澀為骨痹脈來急者亦為骨痹澀而緊者亦為骨痹又有風血痹陰邪入於經血故也外有支飲亦令人痹當隨證施治三因方云凡使人煩滿喘而吐者是痹客於肺心煩上氣嗌乾氣噫厥逆脹滿是痹客於心多飲小便數小腹痛如懷妊夜臥則驚是痹客於肝喜脹尻以代腫脊以代頭者是痹客於腎四肢懈惰發咳嘔沫上為大寒者是痹客於脾又有腸痹者飲數而小便不利中氣喘急時發飧泄又有胞痹者按之少腹內痛若沃以湯澀於小便上為清涕端效方云痹者閉也閉而不仁故曰痹寒勝則痛濕勝則重風淫走注往來衝擊而無常晝靜夜痛發渴腫滿細枯不能行走風濕寒濕風毒腳氣同病異名故也千金方云風痹濕痹筋痹脈痹肌痹皮痹胞痹各有證候形如風狀於脈別之脈微澀其證身體不仁也諸痹由寒濕風三氣並客於分肉之間迫切而為沫得寒則聚聚則排分肉肉裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則痹發發則如是此內不在藏而外未發於皮膚居分肉之間真氣不能周故為痹也其風最多者不仁則腫為行痹走無常處其寒多者則為痛痹其濕多者則為著痹冷汗濡但隨血脈上下不能左右去者則為周痹在肌中更發更止左以應在左右以應在右為偏痹也夫痹乃陽氣少陰氣多故令身寒從中出其陽氣多而陰氣少則痹且熱也諸痹風勝者則易愈在皮間亦易愈在筋骨間者則難痊也久痹入深令營衛澀經絡時疏則不知痛內經曰營衛虛皮膚不仁痹而不知痛可用蔚金散吐之次服導水丸寒經之藥泄之泄訖以辛溫之劑發散汗出後常服當歸烏附行經和血之藥則愈矣儒門事親書云郾城梁賈人年六十餘忽曉起梳髮覺左手指麻斯須手臂麻又一臂麻斯須頭一半麻比及梳畢從脅至足皆麻大便二三日不通往問他醫皆云風也或藥或針皆不解求治於戴人戴人曰左手三部脈皆伏比右手小三倍此枯澀痹不可純歸之風亦有火燥相兼乃命一通一泄一汗其麻立止以後以辛涼之劑調之潤燥之劑濡之惟小指次指尚麻戴人曰病根已去此餘烈也方可針溪谷者谷也骨空也一日晴和往針之用靈樞中雞足法向上臥針三進三引訖復卓針起向下臥針送入兩指皆然手熱如火其麻全去昔劉河間作原病或常以麻與澀同歸燥門中真知病幾者也諸痹風痹附論夫痹者為風寒濕三合而成也其狀肌肉頑麻或則疼痛此人體虛腠理開則受於風邪也病在陽曰風在陰曰痹陰陽俱病曰風痹也夫風痹病不可已者足如履冰時如湯入腹中股脛躁心頭痛傷痹腎時嘔眩自汗出傷心目眩傷肝悲恐短氣不樂傷肺不出三年死天麻丸出聖惠方治虛傷風手足無力肢體乾燥風痹不仁天麻一兩木香人參去蘆赤茯苓白芷羌活天蓼木芎藭當歸各半兩炒麻黃去節一兩烏蛇三兩酒浸黃去皮骨白附子半兩炮裂龍骨一分鹿角膠半兩杵碎炙令黃燥甘菊花生地黃細辛各半兩牛黃一分研麝香一分研上為細末煉蜜和搗五七百杵丸如梧桐子大每服不計時候以溫酒下十丸虎骨酒出仁存方治諸般風痹手足疼痛行步艱難腰膝緩弱久服身體輕健連動動快捷大行血氣通營衛補虛排邪大益真氣虎脛骨酥炙三兩半川附子炮去皮臍當歸酒浸焙蘆川芎川羌活去蘆川烏去皮尖赤芍藥獨活各二兩半杜仲炒斷絲二兩半萆薢白朮防風去蘆黃耆去蘆白茯苓去皮白蒺藜炒去刺人參去蘆天麻去苗川續斷各一兩淨上銼各項如麻子大以生絹袋子盛滿用無灰酒二升浸之密封春浸五日夏浸三日秋七日冬十日每服一盞溫暖空心服之芥草膏治風痹不仁風毒摩野葛膏內有巴豆若用多恐損皮肉芥草用葉當歸白芷防己蜀艽出汗去目者合口各三兩吳茱萸湯洗焙乾炒丹參芎藭商陸根切各四兩沉香木香零稜草雞舌香犀角屑各三兩附子去皮乾炒上銼以新綿裹內淨器苦酒三升浸經一宿取出用酥二斤同入鍋內以文武火煎上三下三使變色稀稠得所濾去滓裹攪勻傾瓷瓶中密封頭每有患旋以手摩敷之指令入皮肉野葛膏方見腳氣門腳氣雜治膏藥淋滯等類治諸風痹方出千金方一名黃芩湯麝香天麻丸出和劑方治風手足不遂或少力顫掉血脈凝澀肌肉頑麻遍體疼痛轉側無力筋脈拘攣不得屈伸紫背浮萍草干去土四兩麻黃去根二兩防風去蘆天麻去蘆各一兩以上四味為末沒藥別研極細硃砂研飛各一兩安息香別研細麝香研各一兩血竭上為末外將碾出藥同研拌勻濾白沙煉蜜與安息香同熬過搜成劑入臼搗杵熟為丸如彈子大每服一丸以溫酒或荊芥湯化下空心服患處微汗為效如不欲化服即丸如梧桐子大每服三十丸以前湯送下烏蛇丸出聖惠方治風痹手足緩弱不能舉伸烏蛇三兩酒浸炙黃去皮骨天南星炮製乾蠍微炒白附子炮白殭蠶炒桂心各一兩羌活麻黃各二兩去根節防風二兩去蘆上為細末煉蜜和搗三二百杵丸如梧桐子大每服十丸發計時候以酒淋熱豆下羌活丸出聖惠方治風痹營衛不行四肢疼痛羌活天麻各一兩附子一兩半炮去皮臍麻黃一兩去根節蛜螂三分炒桂心一兩烏蛇酒浸炙黃去皮二兩上為細末煉蜜和搗二三百杵丸如桐子大每服十丸溫酒不拘時下細辛散出聖惠方治中風痹頭目昏悶肢節疼痛羌活赤茯苓白朮芎藭柴胡去苗當歸各一兩炒麻黃二兩去根乾薑一兩半炮附子一兩炮防風去蘆獨活各一兩半石膏二兩杏仁去皮尖炒桂心甘草各一兩炙赤銼上為細末服四錢水一盞入生薑半分煎至六分去滓不計時候溫服白花蛇散出聖惠方治風痹關節不利手足頑麻白花蛇二兩酒浸炙黃去皮骨磁石燒酒淬七次研細白附子各一兩天麻狗脊萆薢銼側子炮去皮白殭蠶炒細辛防風去蘆芎藭白芷白蘚皮羌活蔓荊子各半兩上為散入磁石同研令勻每服不計時酒送下蛜𧌴丸出聖惠方治風寒入於肌肉血氣不宣肢體不仁牽引腰背風痹疼痛蛜𧌴一兩炒去足虎脛骨三分酒浸炙黃安息香川烏頭各三兩炮去皮白蒺藜炒去刺麻黃各一兩去根檳榔芎藭狗脊去毛赤茯苓各三分白花蛇二兩酒浸令黃去皮骨肉桂去皮赤箭枳實炒防風各三兩去蘆上為細末煉蜜和搗二三百杵丸如梧桐子大每服不計時候以薄荷酒下十丸羌活散出聖惠方治風痹手腳不仁羌活漢防己各一兩荊芥薏苡仁各二兩防風一兩麻黃一兩半去蘆酸棗仁一兩黃松節一兩半去皮附子一兩半去皮芎藭天麻各一兩半上為散每服不計時候以溫酒下二錢續斷湯出聖惠方治風痹後血氣未平復宜服續斷白芍藥黃耆人參川芎以上各一兩五味子半兩陳皮三分熟地黃一兩半甘草三分上搗篩作粗末每服五錢水一盞姜三片煎至八分去滓腹少空時服若筋脈攣急當加當歸一兩桂心五分麻黃散治風痹四肢懈惰不能自舉麻黃去節根防風去蘆附子炮去皮芎藭桂心黃芩赤芍藥人參去蘆秦艽去苗茵芋甘草各一兩炙微赤上為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服海藻酒出千金方治遊風行走無定腫或如核或如甌或著腹背或著臂或著腳悉主之海藻茯苓防風獨活附子白朮各三兩大黃鬼箭當歸各二兩上㕮咀以酒二斗浸五日初服二合漸加以知為度獨活散治風痹身體不舉常多無力獨活丹參各三分萆薢防風去蘆細辛人參乾薑炮銼天雄炮去皮牛膝去苗各一兩上為散每服不計時候以溫酒調下二錢白蘞散出千金方治風痹腫筋急輾轉易常處白蘞二分附子一分上搗下篩酒服半刀圭日三不知增至一刀圭身中熱行候十日便覺忌豬肉冷水麻黃散出聖惠方治風痹營衛不行四肢疼痛麻黃五兩去節根桂心二兩上為散以酒二升慢火煎如餳每服不計時以熱酒調下一茶匙頻服以汗出為度川烏丸出聖惠方治風痹營衛不行四肢疼痛川烏頭二兩去皮切碎以大豆炒候豆出汗即住乾蠍半兩微炒上為細末以釅醋一中盞煎熬成膏可丸即丸如緑豆大每服不拘時以溫酒下麻子治風痹皮頑上以麻蕡炒令香搗碎小便浸取汁服麻子乃今人績布麻種子也生大豆方治賊風痹癱瘓口噤腫及麻痹上以大豆炒令黑及熟投酒中漸漸飲之治風痹補腦上用地榆汁釀酒服之治風痹上取蜂房一枚炙令黃赤色為末每用一錢臘月豬脂勻調敷之良附子酒出鮑氏方治風寒及冷痰癖脹滿上用附子三枚重二兩炮裂去皮臍銼如麻豆大以醇酒五升浸五日每服一合去滓以唇口麻痹為度日再解風痹湯方見麻黃湯治風痹風邪頑麻或疼痛不定或汗多或不仁出余居士選奇方麻黃去節生薑白朮各一分石膏二十四個附子甘草薏苡仁白蘚皮各一分上為粗末分八帖水一升煎至七合不計時候服瘥為度忌豬肉面等毒物豬絡丸出楊氏家藏方治風痹氣滯血脈凝澀筋脈拘攣肢節腰膝強痛行履艱難沒藥別研乳香別研虎骨酥炙敗龜酥炙五靈脂當歸各二兩白附子炮天麻去苗酒焙全蠍炒天南星炮附子炮川烏頭炮去皮臍尖杜仲去皮臍炒地龍去土炒威靈仙去苗烏蛇去皮骨酒浸牛膝酒浸一宿肉蓯蓉酒浸炙硃砂別研續斷十四味各一兩上為細末酒煮麵糊為丸如梧桐子大每服三十丸食前溫酒下川烏煎出雞峰方治風痹骨節痛方老大芎不計多少上一味磨汁煎服一盞即安療風痹出本草以丹參漬酒飲之治風痹四肢攣急及主益人出本草煮五味根莖釀酒飲之治瘑癩風痹出本草用蒴藋煎湯浸洗去手足風痹出本草採霜後桑葉煮湯淋洗治風痹或折傷宿血瀝在骨間內痛不可忍及皮膚風瘙腫出本草以白楊皮和五木香為湯浸損處治風痹偏枯筋骨攣縮癱瘓皮膚不仁疼痛等出本草取桃樹枝葉搗碎大甑中蒸令熟鋪著床上展臥冷更易骨間風盡出當大汗補藥及美粥食避風冷勞役久患風痹腳膝疼痛皮膚不仁氣力衰弱久服好顏色變白不老出本草以石松浸酒服之及療大風瘻痹甚效治風痹出本草上用八月斷槐大枝復生嫩葉煮取汁釀酒服治風痹出本草以熊脂酒煉服之瘥歷節出本草以柏節煮釀酒服之治頑痹風瘙惡瘡毒腫死肌筋皮攣縮踠損筋骨出本草以野駝脂火炙摩之令熱入內一作駝骨治風痹及補衰弱去痼疾用菊花水如常造食法飲此水去南陽縣山谷中其水味甘乃是谷上左右皆生甘菊花壓其中歷世既久故水變作甘谷水臨此谷中居民皆不穿水井悉食其谷水無不壽者昔司空王暢太尉劉寬太傅袁隗皆常為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲之用諸公多患風痹及眩冒皆得愈風冷痹附論夫痹雖異狀然皆本於三氣寒氣多謂之冷痹其證令人腳膝痠疼行履艱難四肢𤸷麻身體俱痛甚則有一身不遂者虎