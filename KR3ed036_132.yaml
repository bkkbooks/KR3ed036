大每於食後煎桑根白皮湯下二十丸治傷寒汗後餘熱不除頭痛內熱出聖惠方麻黃一兩去根節甘草半兩炙微赤銼雞子一枚去殼上件藥細銼麻黃等二味水一大盞半先煎取一盞去滓下雞子攪令勻更煎三兩沸不計時候放微溫分二服治傷寒十日以上曾發汗未解煩熱不除大青二兩甘草炙微赤銼一兩麥門冬一兩去心上為末每服五錢水一大盞入豉半合煎至五分去滓不計時溫服柴胡飲子治解利大人小兒傷寒餘熱不已柴胡黃芩人參甘草升麻地骨皮赤茯苓赤芍藥草龍膽各半兩上㕮咀每服四錢水一盞加薄荷沙糖同煎七分溫服無時小兒分作三服人參散傷寒汗下後餘熱不退或煩或渴面赤者人參梔子藍葉甘草白蘚皮各半兩上銼細每服五錢水煎服治傷寒發汗後身上餘熱未退麻黃去根芍藥細辛牡丹皮去心前胡去毛官桂山茵陳荊芥穗桔梗麥門冬去心羌活各一分上細杵羅為末每服二錢食後熟湯調下木通散治傷寒汗下後足腫有濕氣不除者木通木香檳榔獨活各一兩丹參七錢上銼細每服五錢水煎服枳實芍藥乾薑甘草湯治傷寒汗下後氣逆利不止者寒也芍藥半兩甘草半兩枳殼麩炒半兩乾薑炮半兩上銼細每服五錢水煎服防葵散治傷寒汗下後臍左有動氣者防葵一兩木香五錢柴胡黃芩各半兩上銼細每服五錢水煎服枳殼散治傷寒汗下後臍上有動氣者枳殼五錢麩炒赤茯苓一兩當歸一兩京三稜炮一兩木香五錢訶黎勒五錢上為細末每服五錢沸湯點服前胡散治傷寒汗下後臍右有動氣者前胡赤茯苓各一兩大腹皮人參各五錢木香三錢檳榔大黃各三錢上為細末每服五錢沸湯點服茯苓散治傷寒下後臍下有動氣者赤茯苓一兩檳榔三錢桂心大腹皮川茴香炮炒良薑各五錢上為細末每服五錢沸湯點服如有不治轉為積熱治之難痊不可汗下也調中散治傷寒吃轉藥病熱已減然大腑餘熱出後終未快精神昏悶宜服此柴胡前胡各去毛桔梗貝母去心牡丹皮去心黃芩麻黃各一分枳殼只用青梔子各四銖升麻半兩甘草一分上細杵羅為末每服三錢水一盞煎兩三沸食後臨臥去滓任意服治傷寒汗後虛熱用葎草銼研取生汁飲一合愈傷寒煩躁附論夫傷寒煩躁者此由陰氣少陽氣勝故熱而煩滿也少陰病惡寒而有時自煩欲去其被者可治也病已解而反發暴煩者由病新瘥強食為脾胃尚虛不能消也故令微煩損谷即愈少陰病脈微細沉但欲臥汗出不煩時自吐五六日自利復煩躁不得臥寐者死發汗後下之脈平而小煩者此新虛不勝穀氣故也又云傷寒陽氣多陰氣少病發於陽經者故令煩躁其候身熱而煩渴引水漿若胃中乾燥者必譫語亦有少陰經煩躁者當辨傷寒煩躁者煩為擾擾而煩躁為憤躁之躁合而言之煩躁為熱也析而分之煩也躁也有陰陽之別焉煩陽也躁陰也煩為熱之輕者躁為熱之甚者有煩疼煩滿煩渴虛煩皆以煩為熱也有不煩而躁者為怫然便作躁悶此為陰勝格陽也雖大躁欲於泥水中臥但飲水入口者是也所謂煩躁者謂先煩漸至躁也所謂燥煩者謂先發躁而迤邐復煩者也煩躁之由又為不同有邪氣在表而煩躁者有邪氣在裡而煩躁者有因火劫而煩躁者有陽虛而煩躁者有陰盛而煩躁者皆不同也經曰當汗不汗其人煩躁太陽中風脈浮而緊不汗出而煩躁大青龍湯主之此是邪氣在表而煩躁者也病人不大便六七日繞臍痛煩躁發作有時此有燥屎也邪氣在裡而煩躁者也太陽以火熏之不得汗其人心躁太陽病二三日及躁火尉其背令人大汗出大熱入胃躁煩者火劫令煩躁者也少陽微發汗躁不得眠與下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之及發汗後若下之病仍不去煩躁者茯苓四逆湯主之者陽虛煩躁者也少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之者陰盛而煩躁者也諸如此者證之常也非逆也設或結胸證悉具煩躁者死發熱不利厥逆躁不得臥者死少陰病吐利煩躁四逆者死少陰病四逆惡寒而蜷脈不出不煩而躁者死少陰病五六日自利復煩躁不得寐者死是數者又皆為不治之證嗚呼煩躁為常有之疾復有諸不治之證臨病者測之又當熟審焉歌括云煩躁來時熱氣升陰為陽勝太陽經陽躁糞連臍痛腎微陽虛陰躁乘心心主火腎主水心熱則煩腎熱則躁傷寒煩躁則有陰陽虛盛之別為陰虛而陽盛則為煩陽虛而陰盛則為躁有先煩漸加躁者有先躁後復煩者煩其熱之輕躁則熱之甚也或邪在表或邪在裡或陽盛或陰盛或火邪條例不一當詳審而調理之太陽證煩躁寸關脈浮數身熱是也風寒俱勝其脈浮緊無汗而煩躁當汗不汗其人煩躁並用大青龍湯心中悸而煩躁小建中湯熱七八日渴欲飲水五苓散無熱但狂言煩五苓散水調之劇吐之自汗心煩小便數不可與桂枝湯只用芍藥甘草湯服桂枝後汗出煩渴其脈洪大白虎加人參湯陽明證煩躁以多日不大便有燥糞故臍痛而煩躁也以承氣湯隨輕重用之少陰證煩躁尺寸俱沉厥冷自利是也心煩不得臥黃連雞子湯黃連阿膠湯吐利厥冷心煩欲死吳茱萸湯茯苓四逆湯下利咽痛心中煩悶豬膚湯下痢嗽嘔煩渴不得眠豬苓湯惡寒而倦時而自煩欲去衣被大柴胡湯太陽病以火熏之而不得汗亦致煩躁或火尉其背令人汗出大熱入胃煩躁並黑豆煎湯解之汗後煩不得眠欲水者少與之小便不利與五苓散下後晝夜靜不嘔不渴凡表證脈沉微乾薑附子湯若兼懊憹即與梔子豉湯發汗若下之病仍不解而煩躁茯苓四逆湯吐汗下虛煩心下痞滿氣上衝胸頭眩經動身為振搖茯苓桂枝白朮甘草湯虛煩附入胸滿條瘥後胃弱不能勝谷亦致煩減谷則愈仍與小柴胡湯陰極發躁或陰毒用火尉久投熱藥以發躁者並不可誤用涼藥甚仍以熱劑可作四逆湯並返陰用身微熱煩躁而亦脈沉而微此名陰證似陽也陰發躁熱發厥物極則返也大率以脈為主諸數為熱諸遲為寒凡如此最驗也假令身熱煩躁面赤其脈沉而微者皆陰證也身微熱者裡寒故也煩躁者陰盛故也而戴陽者下虛故也若醫者不看脈與虛陽上膈躁誤以為實熱反涼藥則氣消成大病矣外臺祕要云陰盛發躁名曰陰躁欲坐井中宜以熱藥治之仲景少陰證面赤者四逆加蔥白主之身冷脈細沉疾煩躁而不飲水此名陰盛格陽也傷寒陰盛格陽者病人身冷脈細沉疾煩躁而不飲水者是也若欲引飲者非也不欲飲水者宜服下闢保止散須臾躁止得睡行出即瘥此藥通散寒氣然後熱氣上行汗出乃愈火焰散丹沙丸並主之傷寒陰盛格陽病人身冷脈細沉疾煩躁而不飲者又云大抵陰毒本因腎氣虛寒或因冷物傷脾外感風寒則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠四肢逆冷汗不止或多煩渴神恍惚若誤服涼藥則渴甚躁轉急有此病者便急服辛熱之藥或時鄭聲面赤指甲青黑若陰毒已染病熱困重六脈附骨取之則有按之即無但於臍中用蔥尉法或艾三日再手足不溫者不可治也守真云或下後熱不退或蓄熱內甚陽厥急深以至陽氣怫鬱不能營運於身表四肢以致遍身清冷痛甚不堪項背拘急目睛赤疼昏眩恍惚咽乾或痛燥渴虛汗嘔吐下利腹滿實煩冤悶亂喘其息聲以其虛熱極深而脈沉細欲絶者似未明其造化之理而煩傳於陰毒或失下熱極以至身冷脈微而昏冒將死欲急下之則殘陰暴絶陽氣後靜而立死不下亦死病人至此命懸頃刻然則治法當如何曰此當涼膈散或黃連解毒湯養陰退陽但欲虛熱漸漸宣散則心胸腹滿脈漸以生至於脈稍有力可以三一承氣湯微下之或解毒加大承氣湯尤良俗未明此故認作陰證是以陰陽失其治也素問五運行大論云岐伯曰氣有餘則制己所勝而侮所不勝不及則己所以不勝侮而乘之己所勝輕而侮之木余則制土輕侮於金氣不爭故本恃其餘而欺侮也又木少金勝土反傷木以木不及妄凌之也四季本同侮謂侮謾也而凌忽之也又云以火鍊金熱極反化為水又云亢則害承乃制犀角散出聖惠方治傷寒四肢煩躁頭疼口乾壯熱犀角屑甘草炙微赤銼枳殼麩炒微黃去瓤赤芍藥麥門冬去心焙赤茯苓葛根銼以上各半兩石膏二兩上搗篩為散每服四錢以水一中盞煎至六分去滓不計時候溫服麥門冬散出聖惠方治傷寒熱甚口乾煩躁不得汗麥門冬半兩去心人參半兩去蘆頭麻黃一兩去根節梔子仁三分生乾地黃半兩赤茯苓半兩甘草一分炙微赤銼木香一分黃芩一分上搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服升麻散出聖惠方治傷寒身體痠疼頭面如火心胸煩躁背膊壅悶不思飲食川升麻三分葛根一兩銼前胡一兩去蘆頭馬牙硝一兩子芩半兩知母半兩赤芍藥半兩犀角屑半兩甘草半兩炙微赤銼玄參半兩麥門冬去心一兩大腹皮一兩銼上搗粗羅為散每服五錢水一大盞煎至五分去滓不計時候溫服豬苓散出聖惠方治傷寒發汗後大下胃中干煩躁不得眠臥欲得飲水者少與飲之令胃和則愈豬苓去黑皮白朮澤瀉桂心各一兩赤茯苓二兩上搗細羅為散每服不計時候以清粥飲調下二錢知母散出聖惠方治傷寒頭疼鼻塞痰壅四肢壯熱憎寒恍惚煩躁知母一兩麥門冬一兩去心川升麻一兩桔梗半兩去蘆頭犀角屑半兩柴胡一兩去苗貝母半兩煨令微黃赤茯苓半兩地骨皮一兩木通半兩銼赤芍藥半兩甘草半兩微炙銼石膏二兩上搗羅為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服子芩散出聖惠方治傷寒身體疼痛頭面如火胸中煩躁背膊妨悶不思飲食子芩半兩麥門冬一兩去心葛根半兩銼川升麻一兩前胡一兩去蘆頭玄參半兩犀角屑半兩赤芍藥檳榔各半兩馬牙硝一兩上搗粗羅為散每服五錢以水一大盞煎至五分去滓不計時候溫服茵陳散治傷寒後復熱在心煩躁恍惚或多驚恐及不得眠臥茵陳茯苓梔子仁赤芍藥麥門冬去心黃芩以上半兩犀角屑一分生乾地黃一兩上搗粗羅為散每服五錢以水一大盞入生薑半分去滓不計時候溫服治傷寒得汗後身熱未退心神煩躁梔子仁甘草炙微赤銼黃柏銼各一兩上搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服治傷寒煩躁不得睡臥酸棗仁一兩微炒甘草一兩炙微赤銼豉一合上搗篩水一大盞半煎至一盞去滓不計時候分溫三服治傷寒未得汗發煩躁心悶麻黃一兩去根節甘草半兩炙赤銼桂心一兩麥門冬半兩去心杏仁半兩湯浸去皮尖雙仁麩炒微黃上搗粗羅為散每服五錢水一大盞煎至五分去滓稍熱服衣覆出汗如人行十里未有汗再服梔子仁散治傷寒五六日心膈煩躁壯熱不得臥梔子仁川升麻柴胡去毛石膏生乾地黃甘草炙微赤銼葛根銼以上各一兩上搗粗羅為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服一方無甘草名梔子升麻散不灰木散治傷寒得汗及未得汗煩躁悶亂不灰木二兩用牛糞火燒通赤延胡索子芩黃藥各半兩甘草三分炙微赤銼甘菊花半兩羌活半兩上搗細羅為散每服二錢用淡漿水一中盞煎至六分不計時候和滓服之葛根散治傷寒煩躁干逆葛根銼枳殼麩炒微黃去瓤川大黃銼碎微炒麥門冬去心甘草炙微赤銼檳榔以上各半兩上搗粗羅為散每服四錢水一中盞煎至六分去滓不計時候溫服茯苓四逆湯治傷寒汗下後病仍不解煩躁者白茯苓去黑皮四兩人參一兩附子一枚生去皮臍破八片甘草二兩乾薑一兩半上銼如麻豆每服五錢水一盞半煎至八分去滓溫服吳茱萸湯治傷寒少陰病吐利手足逆冷煩躁欲死者吳茱萸湯洗焙炒一升人參二兩上㕮咀每服五錢水一盞半生薑棗大切大棗二枚擘破煎至八分去滓溫服日三知母湯治傷寒煩躁不解脈大喘熱頭疼知母栝蔞根甘草微炙一兩石膏二兩上粗搗篩每服三錢水一盞入粳米少許煮米熟去滓溫服不拘時黃芩散治傷寒頭痛大熱煩躁黃芩去黑心玄參各二兩大黃銼炒甘草炙銼枳殼去瓤麩炒各一兩升麻一兩半焙上搗羅為散每服二錢匕熱水調下立愈大黃湯治傷寒心神煩躁壯熱狂言毒氣留於胸膈大黃銼炒黃連去須甘草炙各半兩銼麥門冬去心焙柴胡去苗各一兩上搗篩每服三錢匕水一盞入竹葉十片生薑三片煎至六分去滓溫服不拘時葛根散治傷寒煩躁退熱葛根銼黃耆銼甘草炙銼五兩石膏研三兩小梔仁八兩上搗研為散每服二錢匕新汲水入蜜調下大安丸治傷寒煩躁悶亂凝水石半斤煅赤黃土拌兩宿取水研末用菠薐汁和作餅陰乾再研又和又陰乾二次為度朴硝四兩甘草二兩炙銼為末上同研勻細再菠薐汁和丸難丸即入少許炊餅丸如彈子大又一等如梧桐子大每服一丸生地黃汁化下如復燥時即化大丸子作小丸子十五丸只一服定知緩急無地黃汁新汲水化下不灰木散治傷寒大熱煩躁悶亂不灰木二兩滑石研凝水石研板藍根甘草生用各一兩上搗研為散每服二錢匕用生米泔化乳糖大棗湯調下雞清散治傷寒煩躁悶亂不解用鬱金二枚生用一枚煨熟搗羅為散以新汲水一盞生雞子清一枚調勻頓服取利一行躁熱立定八石散治傷寒陽盛煩躁及下血中熱發躁代赭三兩凝水石甘草炙銼別為末不灰木各八兩金星石銀星石雲母石膏太陰玄精石各四兩陽起石一兩別生研上除陽起石甘草外餘八味固濟瓷罐中歇口約一稱炭火煅赤頻將代赭出醋中淬五度去火候冷取出濕地上紙襯盆合土蓋兩宿搗羅更細研三二日入陽起石甘草末拌勻每服半錢至一錢匕生薑蜜水或新汲水調下凝水石丸治傷寒躁悶口乾時渴狂言亂道凝水石半斤用炭火半稱燒半日取出放濕土上出火毒研兩日令極細以瓷器盛於井中浸一宿龍腦研硼砂各一分研甘草炙銼為末一分天竺黃半兩上研勻細糯米粥和丸如彈子大每服一丸生薑蜜水化下梅紅湯治傷寒煩躁狂言咽膈壅悶口乾多渴烏梅肉炒知母焙貝母去心藿香葉五味子蛤粉人參赤茯苓去黑皮大黃銼炒甘草炙銼各一兩上粗搗篩每服三錢匕水一中盞入小麥竹葉煎至六分去滓溫服必效散治傷寒熱甚狂躁悶亂欲發黃皮發瘡疹熱毒氣盛口乾煩躁生地黃草龍膽並碎絞取汁三停共一盞同浸橫絞甘草末一兩候汁進陰乾菠薐紫葉肥者去莖陰乾半兩龍腦一錢研牛黃半錢研上搗羅生地龍膽菠薐為末與龍腦牛黃合研每服二錢匕研林檎絞取汁新汲水相和調服如大段躁熱及欲發黃即別入龍腦少許相和雞子清調服小兒服或半錢鉛霜散治傷寒三日後心煩躁熱狂言鉛白霜一分馬牙硝一兩上研勻每服半錢生薑蜜水調下小兒一匙蘆根湯治傷寒陽毒五六日以上但胸中躁熱乾嘔躁悶蘆根一兩知母焙栝蔞根柴胡去毛黃芩去黑心各半兩甘草炙銼三分上粗搗篩每服二錢水一盞生薑三片煎至七分去滓溫服不拘時龍膽湯治傷寒溫病後煩躁龍腦葳蕤芍藥黃芩去黑心石膏麻黃去根節升麻甘草炙銼各三分葛根一兩桂去粗皮大青各半兩上粗搗每服三錢水一錢水一盞生薑一棗大拍碎煎至六分去滓溫服人參湯出聖濟總録治傷寒七八日汗後心煩躁渴人參黃芩去黑心柴胡去毛葛根銼各一兩山梔子仁甘草炙銼各三分上粗搗篩每服五錢水一盞半生薑棗大一枚拍碎煎至七分去滓不計時候溫服硝石丸出聖濟總録治傷寒煩躁身熱譫妄硝石半兩丹砂一分上細研糯米粥和丸如櫻桃大每服一丸生糯米汁入油一兩點化藥青柳枝打勻服神應散出聖濟總録治傷寒陰陽不順發煩悶亂氣虛干逆丹砂研石硫黃研各一錢上硝一錢蛤粉三錢半人參白茯苓去黑皮各一分上搗羅為散每服一錢用芝麻水調下不計時服紫金散治傷寒有熱煩躁不安者焰硝八兩硫黃四兩代赭石三兩甘草三兩焙上為散更於臼中治之生薑蜜水和方寸匕服之其躁即止知母湯治陽明病身冷而內煩者知母葛根白朮甘草各一兩炙上銼以水三升煮取一升五合去滓溫服五合治發熱惡寒大渴不止煩躁肌熱不欲近衣其脈洪大按之無力或目痛鼻乾者非白虎湯證也此血虛發躁故也黃耆一兩當歸身二錢上㕮咀水煎服治傷寒服藥搶心煩躁出本草以豉一升梔子仁四個銼水三升煎取一升分三服
