body:
  text: 卷一百八十消渴門渴利附論夫渴利者飲隨小便故也由少時服乳石石熱盛時房室過度致令腎氣虛耗下焦生熱熱則腎燥燥則渴腎氣虛不能傳制水液故隨飲小便其病變多發癰疽以其內熱小便利故也小便利則津液竭津液竭則經絡澀經絡澀則營衛不行營衛不行則由熱氣留滯故成癰疽也方前胡湯出聖濟總録治消渴渴利有熱小便澀前胡去蘆頭生乾地黃焙大黃銼炒各一兩黃芩去黑心梔子仁升麻芍藥栝蔞根石膏碎各三分麥門冬去心焙一兩一分桂心去粗皮一分枳實去瓤麩炒甘草炙各半兩上㕮咀每服四錢水一盞半入生地黃一分切碎同煎至八分去滓食前溫服日三竹葉湯出千金方治渴利虛熱引飲不止消熱止渴竹葉切二升地骨皮生地黃切各一升栝蔞根石膏各八兩茯神一作茯苓葳蕤知母生薑各四兩生麥門冬一升半大棗三十枚上㕮咀水一斗二升煮取四升分四服調中湯治腎虛熱渴小便多除風濕理石毒止小便去皮膚瘡升麻甘草炙菝葜各四兩玄參知母漏蘆各五分茯苓三分牡蠣煅枳實炙黃連各六分上為末飲服方寸匕日再服以瘥為度忌豬肉海藻菘菜酢物竹葉湯出千金方治下焦虛熱上炎肺胃渴飲而利竹葉切三升甘草三兩栝蔞根生薑各五兩麥門冬茯苓各四兩大棗三十枚小麥地骨皮各一兩上㕮咀先以水三升煮小麥取一升去滓澄清取八升去上沫取七升煮藥取三升分三服石膏湯出聖濟總録治渴利虛熱引飲不止消熱止渴石膏四兩地骨皮二兩栝蔞根三兩半茯神去木知母焙葳蕤各二兩上㕮咀每服四錢水二盞竹葉二十片生地黃半分切生薑三片棗二枚擘破同煎至一盞去滓溫服日三枸杞根飲出聖濟總録治常食熱面炙爆諸乾燥物及服熱補藥飲熱酒沖肺日久即患消渴飲水無度小便旋利心中熱悶煩躁枸杞根皮菰根李根白皮葛根四味並洗銼各二兩甘草炙一兩牡蠣炒二兩石膏碎五兩上㕮咀每服五錢水一盞半煎至八分去滓不拘時溫服栝蔞散治腎虛熱渴小便利栝蔞茯苓各一分玄參四分枳實炙六分苦參粉甘草炙橘皮各三分上為末空腹以漿水服方寸匕日再服忌海藻大酢菘菜地黃丸出千金方治面黃手足黃咽中乾燥氣短脈如連珠除熱止渴生地黃汁生栝蔞根牛羊脂三升白蜜四升黃連一斤為末上合煎令可丸如梧桐子大米飲服五丸日二加至二十丸若苦冷而渴瘥即宜別服溫藥麥門冬湯出聖惠方治渴利麥門冬去心焙白茯苓去黑皮各四兩栝蔞根五兩甘草炙三兩地骨皮五兩上㕮咀每服四錢先以水二盞入小麥一匙竹葉二七片生薑半分棗二大枚擘破同煎至一盞半去滓下藥煎八分食前溫服日三枸杞湯出千金方治渴而利者枸杞枝葉一斤黃連甘草栝蔞根石膏各三兩上㕮咀水一斗煮取三升分五服日三夜二劇者多合渴即飲之栝蔞散出千金方治渴利日飲水數斗小便頻數厚朴湯出聖濟總録治三消渴飲水無度小便隨之肌肉消瘦人參一兩牡蠣煅厚朴去粗皮薑汁炙各三兩上㕮咀每服五錢水一盞半煎至八分去滓不計時候溫服黃耆散出聖濟總録治三消渴疾肌膚瘦弱飲水不休小便不止黃耆銼桑根白皮銼細各一兩葛根銼二兩上為散每服三錢煎燖豬湯澄清調下不拘時石菖蒲散出聖濟總録治渴日夜飲水隨飲即利石菖蒲一兩栝蔞根二兩黃連去須半兩上為散每服三錢新汲水調下食後臨臥服栝蔞根煎出聖濟總録治渴利生栝蔞根去皮細切十斤黃牛脂碎切一合半鍋內慢火煎令消濾去滓上先用水三斗煮生栝蔞根煎至一斗用生絹絞去滓取汁納牛脂攪令勻再納鍋中慢火煎不住手攪令水盡候如膏狀即止於瓷閣中密盛每日食後溫酒調如雞子黃大服之日三服雞膍胵出聖濟總録治渴利飲水下咽即利為膀胱有熱名曰渴利一名雞內金丸小豆汁方出聖濟總録治渴利小豆不以多少上水煮熟搗爛細布絞取汁每服一盞不拘時頻服即瘥又方出千金方竹根上濃煮汁飲之瘥止又方胡麻上熬令變色研淘取汁飲半合日可三四服不過五升即瘥治小便猝太數復非淋一日數十過令人瘦出肘後方末中水豬脂如雞子一枚上炙承取肥汁盡服之不過三劑即瘥又方羊肺一具上以作羹納少肉和鹽豉如食法任意進之不過三具瘥又方豉一升上納於鹽中綿裹之以白礬好者半斤置綿上蒸之三斗米許時下礬即得消入豉中出曝乾搗末每服方寸匕菝葜飲出聖濟總録治消渴小便數而少方見黃耆湯鹿兔煎出淡寮方治三消渴利神效常服禁遺精止白濁延年菟絲子北五味子各五兩白茯苓三兩半鹿茸一兩半鹽酒浸炙上為末生地黃汁搜和為丸如梧桐子大每服五十丸空心鹽湯下黃耆丸出聖濟總録治消渴小便數而少虛極羸瘦黃耆銼鹿茸去皮酥炙各二兩牡蠣煅一復時土瓜根黃連去須白茯苓去黑皮各一兩人參一兩半上搗羅為末研令細煉蜜為丸梧桐子大每服三十丸用首烏湯下地骨皮飲治消渴日夜飲水不止小便利地骨皮銼土瓜根銼栝蔞根銼蘆根銼各一兩半麥門冬去心焙二兩棗七枚去核上㕮咀每服四錢水一盞煎至八分去滓溫服不拘時茯苓丸出千金方治渴小便數貝母六分一本作知母茯苓栝蔞根各四分鉛丹一分雞膍胵中黃皮十四枚上細末飲服方寸匕日三瘥後常服尤佳常服不絶則去鉛丹以蜜丸之用麥飲下一方無貝母用貝齒玄菟丹出三因方治三消渴利神藥常服禁遺精止白濁延年菟絲子酒浸通軟乘濕研焙乾別取末十四兩白茯苓三兩五味子酒浸別為末稱七兩干蓮肉三兩上為末別碾山藥末六兩將所浸酒余者添酒煮糊搜和得所搗數千杵丸如梧桐子大每服五十丸米湯下空心食前服一方用天花粉五味子湯下溫酒鹽湯亦可腳膝無力木瓜湯下梅花湯出三因方治三消渴利神效糯殼旋炒作爆聲桑根白皮厚者切細等分上用稱一兩許水一大碗煮取半碗渴則飲下不拘時麥門冬湯出衛生寶鑑治消渴日夜飲水不止飲下小便即利麥門冬去心焙黃連去須干冬瓜各二兩上為末每服三錢水一盞煎至七分去滓溫服消腎小便白濁附論夫消腎小便白濁如脂者此由勞傷於腎腎氣虛冷故也腎主水而開竅在陰陰為小便之道消令腎損故小便白而如脂或如麩片也消渴飲水過多久則滲漏脂膏脫耗精液下流脬中與水液渾濁隨小便利下凝膏故謂之消渴小便白濁也方肉蓯蓉丸出聖濟總録治消渴尿脂如泔肉蓯蓉去粗皮酒浸切焙地骨皮澤瀉五味子巴戟天去心當歸切焙各一兩磁石煅醋淬七次人參赤石脂各一兩半韭子炒白龍骨甘草炙銼牡丹皮各一兩熟乾地黃焙一兩禹餘糧煅三分桑螵蛸炙四十枚上為細末煉蜜丸如梧桐子大每服二十丸以牛乳下日三黃耆丸出聖惠方治消腎小便白濁四肢羸瘦漸至困乏宜服此黃耆銼黃連去須熟乾地黃牡蠣燒為粉鹿茸去毛塗酥炙微黃各一兩白茯苓土瓜根龍骨玄參五味子人參去蘆頭桑螵蛸微炒各三分麥門冬二兩去心焙菝葜半兩銼上為細末煉蜜和搗五七百杵丸如梧桐子大每於食前以清粥飲下三十丸辰砂妙香散治渴症小便澀數而瀝兼有油濁茯苓茯神去木山藥炮遠志水浸去心焙黃耆各一兩人參甘草炙桔梗各半兩木香辰砂別研各三錢麝香一錢上為細末每服二錢加辰砂少許用茵陳煎湯調下日三服或用燈草茯苓煎湯下葶藶丸出聖濟總録治消渴下冷小便濃白如泔嘔逆不下食葶藶子慢火炒別搗如膏一兩半枳殼去瓤麩炒桂去粗皮羚羊角鎊白茯苓去黑皮柴胡去苗鱉甲去裙襴醋浸炙防風去叉菟絲子酒浸兩宿乾炒別搗牛膝去苗安息香各三分陳橘皮湯浸去白焙一兩上為細末煉蜜和劑酥塗杵搗勻熟丸如梧桐子大每服三十丸空腹酒下黃耆散出聖惠方治消渴腎虛心神煩悶小便白濁黃耆銼麥門冬去心茯苓龍骨栝蔞根熟乾地黃澤瀉白石脂桑螵蛸微炒各一兩甘草三分炙微赤銼上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服腎瀝湯出聖濟總録治消渴小便白濁如脂白羊腎一具去脂膜切黃耆銼杜仲銼炒五味子生薑切各一兩半生乾地黃焙一兩人參半兩棗五枚去核磁石三兩捶碎綿裹上除羊腎磁石外銼碎分為二劑先以水四升煎腎與磁石至二升去腎然後下諸藥再煎取八合去滓分二服食前服金牙石湯出聖濟總録治消渴小便濃濁如面汁此為腎冷金牙石搗碎研厚朴去粗皮塗生薑汁炙熟石菖蒲各一兩半貝母去心一兩烏梅去核微炒葶藶子炒別搗如膏各三分桂去粗皮高良薑菟絲子酒浸兩宿曝乾微炒別搗各半兩上先搗八味為粗末次入金牙石再研勻每服三錢水一盞入棗三枚去核煎七分去滓早晚食前溫服銀錫丸出試效方治飲水百杯尚猶未足小便如油或如杏色水銀四錢錫二錢用水銀研成砂子牡蠣密陀僧知母貝母各一兩黃丹半兩紫花苦參栝蔞根上為細末男子用不生兒豬肚一個婦人用獖豬肚一個納藥線縫之新瓦一合繩系一兩遭米一升更用栝蔞根末半斤卻於新水煮熟取出放冷用砂盆內研爛就和為丸如豬肚丸法用之服此藥三五日小便大出毒歸於下十日永除根本此方屢試屢驗真妙劑也黃連丸出聖惠方治消腎小便滑數白濁心神煩躁菟絲子散出聖惠方治消腎小便多白濁或不禁菟絲子酒浸三日曝乾別搗為末肉蓯蓉酒浸一宿刮去粗皮炙乾黃連去須各一兩磁石半兩燒赤醋淬七次研碎蒲黃一兩半微炒五味子一兩雞膍胵中黃皮一兩半微炒上為末入研了藥令勻每於食前以清粥飲調下二錢鹿茸丸出聖惠方治心腎虛煩渴引飲胸間短氣小便自利鹿茸去毛塗酥炙微黃肉蓯蓉酒浸一宿刮去粗皮炙乾各一兩半黃芩赤瓜根人參去蘆頭各三分雞膍胵十枚微炒菟絲子三兩酒浸三日曝乾別研為末上為末煉蜜和搗三五百杵丸梧桐子大每於食前以清粥飲下三十丸山茱萸丸出聖濟總録治消渴飲水極多肢體羸弱小便如米泔腰膝冷痛諸方不能治者土瓜根銼苦參龍骨細研各一兩半黃連去須三兩半山茱萸栝蔞根銼各一兩半上先搗五味次入龍骨再研勻用生栝蔞汁和劑酥塗杵搗勻熟丸梧桐子大每服三十丸食後煎白茅根飲下日三遠志丸出三因方治消腎小便滑數白濁將欲沉困宜服利白濁泄遺人參白茯苓川薑炮各半兩遠志去心薑汁製炒牡蠣煅取粉各一兩上為末用蓯蓉一兩酒熬成膏丸梧桐子大每服五十丸糯米湯下桑螵蛸丸出聖惠方治消腎小便白濁久不瘥桑螵蛸微炒菟絲子酒浸三日曝乾別搗為末黃連去須各一兩熟乾地黃二兩山茱萸三分上為末煉蜜和搗三二百杵丸如梧桐子大每於食前煎大麥飲下三十丸鐵粉丸出聖惠方治消腎心肺熱極羸瘦乏力口乾心煩小便如脂鐵粉一兩細研生地黃三兩雞膍胵二兩微炒牡蠣二兩燒為粉黃連一兩去須上為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大不計時候以粥飲下三十丸一方無生地黃用乾地黃以酥塗杵熟為丸鐵粉丸出聖濟總録治消渴臟腑枯燥口乾引飲小便如脂鐵粉研水飛過干稱再研黃連去須各三兩雞膍胵陰乾五枚炙熟牡蠣炒研如麩二兩上先搗二味為細末再與鐵粉牡蠣研勻煉蜜利劑以酥塗杵熟搗丸如梧桐子大每服三十丸食前煎粟米飲下漸加至四十丸天雄散出聖惠方治消腎小便滑數白濁心神煩躁白石脂三分露蜂窠微炙天雄各半兩炮裂去皮臍上粗搗篩以水二大盞半入棗五枚煎至一盞去滓食前分溫三服黃耆散出聖惠方治消腎小便滑數白濁令人羸瘦宜服五味子黃耆銼各半兩雞膍胵一兩微炙上件粗搗篩以水三盞煎至一盞半去滓食前分溫三服黃連丸出聖惠方治消渴飲水不知休小便中如脂舌乾口渴黃連去須栝蔞根各五兩上為末生地黃汁和劑石臼內用木杵塗酥搗勻熱丸如梧桐子大每服三十丸食後牛乳下日二一方以麥門冬研汁和丸熱水下蠟苓丸出危氏方補虛治濁止渴潤腸婦人血海冷白帶白淫白濁黃蠟云白茯苓去皮各四兩上茯苓為末溶蠟和丸彈子大每服一丸不飢飽細嚼下棗湯亦可加減八味丸出危氏方治腎水枯竭不能上潤心火上炎不能下濟由煎熬而生心煩燥渴小便頻數白濁陰痿弱飲食不多肌膚漸漸如削或腿腫腳先瘦小宜降心火生腎水其煩渴頓止熟地黃大者先焙乾切酒蒸七次以焙乾稱二兩真山藥微炒一兩山茱萸去核取肉焙乾稱一兩肉桂去粗皮忌見火取末半兩澤瀉水浸切酒浸蒸一次牡丹皮去骨白茯苓去皮為末飛取沉者各八錢真北五味子略炒別為末一兩上為末煉蜜丸如梧桐子大五更初莫言語時溫酒鹽湯下三五十丸午前及晚間空腹再服此方用真北五味子最為得力服此不惟止渴亦免生癰疽久服永除渴疾氣血加壯一曰或先患癰疽才覺作渴即當服此或有癰疽而無渴症亦宜預防蓋患癰之人多於欲發未發之際作渴而不可救患渴之人多患癰而命終故不可不服此藥也外科精要云有一貴人病疽疾未安而渴作諸醫盡用木瓜紫蘇烏梅人參茯苓百藥煎等生津止渴之藥服多而渴愈甚後用此方三日渴止又云一士大夫病渴療治纍歲不安一名醫使服此八味丸不半載而疾痊因疏其病源云今醫多用醒脾生津止渴之藥誤矣服此降其心火生其腎水則渴自止矣磁石湯一名腎瀝湯出聖濟總録治消腎小便白濁如凝脂形體羸瘦磁石六兩別搗如米粒分為二十貼每煎時取一貼綿裹黃耆細銼人參五味子各一兩半杜仲去粗皮炙銼熟乾地黃焙乾各二兩上除磁石外粗搗篩分為二十貼每貼先用水三盞羊腎一隻切作四片去筋膜與磁石一貼同煎至二盞去磁石羊腎下藥末更煎至一盞半去滓溫服兩服之茯兔丹一名玄兔丹治三消渴通用亦治白濁治白濁不問老少年深者或有夜夢走泄遺瀝澀痛或赤或白皆酒色過度上盛下虛心火上炎肺金受克口舌乾燥漸成消渴睡臥不安四肢倦怠男子赤白濁婦人赤白帶下五心熱燥不問老少遠年近日先服此藥一月出鄭氏家傳渴濁方人參黃耆蓮肉去心茯神白茯苓麥門冬北五味各一兩甘草黃芩地骨皮車前子各半兩上㕮咀每服二錢白水煎或加五苓散去桂名百段錦散又方此藥去根不可連用服盡前藥方可用此出鄭氏家傳渴濁方人參茯苓枯白礬白龍骨遠志去心黃耆各一兩龍齒雞頭子帶殼家韭子炒老松糖溶淨五味子牡蠣煅各二兩木香沉香各半兩桑螵蛸鹽水炒半兩上為末煉蜜丸如梧桐子大每服三十丸空心鹽湯下兼服後藥桔梗炒薏苡仁炒乾葛人參白茯苓蓮肉去心各一兩白朮甘草白扁豆炒黃耆蜜炙當歸各半兩桑白皮麥門冬去心半夏曲百合乾薑炮山藥炒五味子杏仁去皮尖木香丁香白芷神麯各一兩上㕮咀每服二錢姜三片棗一枚煎至七分空心服治濁白茯苓老松皮雞頭子蓮肉各等分上為細末用金櫻膏為丸每服三十丸鹽湯或酒任下又方人參白茯苓花龍骨牡蠣胡桃肉各等分上為細末煮羊腎為丸每服三十丸鹽湯或酒任下大凡消渴之症皆由腎氣虛蓋肺主氣而心主血血枯脈燥心火上炎腎水下流乃至天在上而地在下以成痞卦今水火不升降若服冷藥一時快意其患愈甚水愈竭而火愈大火壅燥結若不成癰則津液枯而難存必有難理之疾此症方書甚多要不得泥執在人活用之水陸二仙丹大治男子夢遺白濁腰膝痠疼雞頭子和殼為末上用金櫻膏為丸如梧桐子大空心鹽湯下三十丸孫氏存仁方金櫻同為末用酒糊丸又云男子用乳汁丸尤妙補方定心志安神除煩人參琥珀麥門冬去心黃耆蓮肉當歸鹿茸各一兩肉蓯蓉白茯苓遠志犀角鎊沉香硃砂各五錢木香一錢上為末空心鹽酒湯調下支感丹出鄭氏家傳渴濁方治白濁遺精菟絲子酒炙白茯苓各五錢秋石一兩上為末百沸湯一盞井花水一盞為陰陽水煮糊為丸鹽酒湯下金鎖丹出鄭氏家傳渴濁方治白濁白茯苓茯神各二兩遠志一兩炒去心牡蠣四兩煅五花龍骨一兩半上為末糯米丸空心鹽湯下羊腎丸出鄭氏家傳渴濁方治白濁妙甚第三次用本事方云申酉時腎開宜進此藥大雞頭二兩一分家韭子牡蠣煅各二兩半夏木豬苓赤者同半夏炒每各三兩上為末爛煮羊腎去膜同藥末為丸如梧桐子大入麝香一錢或硃砂為衣瓦器盛之每服二十粒煎豬苓湯吞下治赤白濁出鄭氏家傳渴濁方人參黃耆茯苓龍骨白石脂煅牡蠣煅各一兩栝蔞根桑螵蛸各半兩上為末糊丸如梧桐子大每服三十丸鹽湯下治白濁小便頻數夢遺不禁出鄭氏家傳渴濁方牡蠣龍骨白礬白茯苓秋石人參黃耆各一兩上為末糊丸如梧桐子大每服三十丸空心鹽酒湯下治元陽虛極小便如脂出鄭氏家傳渴濁方蒼朮茴香川烏川楝子川椒龍齒牡蠣破故紙各一兩同炒赤上為末和為丸空心鹽湯下每服三四十丸治白濁出鄭氏家傳渴濁方菟絲子酒煮一日焙乾巴戟去心酒浸煮破故紙炒鹿茸山藥赤石脂五味子各一兩上為末酒糊丸空心鹽湯下又方出鄭氏家傳渴濁方石菖蒲甘草炙各半兩人參當歸赤茯苓五味子紫菀去蘆柏子酸棗仁各一兩橘紅川芎細辛麥門冬去心各半兩上㕮咀每服入蜜一匙同煎至七分不拘時溫服三搏丸出鄭氏家傳渴濁方治遺精白濁人參五味子黃耆各一兩蜜炒白礬龍骨五倍子罌粟殼川楝子炒茴香牡蠣煅熟地黃澤瀉牡丹皮木鱉子各半兩上為末煉蜜丸每服三十丸鹽湯或酒任下補骨脂丸同前方治夢遺益智仁二兩去殼青鹽五錢炒川巴戟一兩去心補骨脂一兩淨洗龍骨一兩火煅上為末羯羊腎子去膜並硬心子細切入瓦盆內煮爛如泥量入藥末搜和盆內杵百下丸如梧桐子大每服百丸鹽米湯下百段錦散出鄭氏家傳渴濁方凡渴濁必先看為何證有濁無渴先服百段錦散後用白羊腎丸及沉苓丸如有渴先須治渴先用三神湯既減卻與之議定方可用沉香散次用珍珠丸除其渴白羊腎丸除其濁後方可用龍鳳丸斷其根五苓散清心蓮子飲上二方依方制等分打合赤濁則除肉桂用生薑蓮子同煎每日二服此藥常服不害白羊腎丸出鄭氏家傳渴濁方半夏豬苓二兩上將半夏淨洗豬苓同炒色褐為度卻用半夏為末酒煮羊肉外腎爛研同杵為丸卻以豬苓為末入瓷瓶內養每服五七十丸溫水服或豬苓煎溫湯空心下沉苓丸出鄭氏家傳渴濁方白茯苓半斤去皮淨豬苓五兩上將茯苓銼成大塊豬苓為皮片用瓦器煮以豬苓沉為度取白茯苓以蠟丸如彈子大每服用小瓦瓶煮清粥候沸卻去下一丸攪勻空心啜服沉香散出鄭氏家傳渴濁方珍珠丸出鄭氏家傳渴濁方生珍珠一兩麝香龍腦人參天花粉乾葛白茯苓甘草紫草各二兩硃砂黃連各半兩上為末酒糊丸如雞頭大每服用麥門冬湯細嚼咽下含化為妙渴濁藥味總括出鄭氏家傳渴濁方牡蠣用紙包定用鹽拌黃泥固濟大火煅紅後取出去泥鋤窟約一尺深埋三宿卻取研入家韭子焙乾大半夏用沸湯泡七次或煮復時取出半升熟大者切作三片同豬苓炒赤色去豬苓用紙包好入土埋三宿用雞頭子水淘去泥沙鍋乘以好酒煮一日或酒可若酒多煮乾收起其餘諸藥只依本法羊腎丸只要麝香為衣不用硃砂亦可大凡渴濁先用祕傳降氣數服後用清心蓮子飲服一月卻兼服羊腎丸及八味丸之屬凡治此病動輒二月三月甚者半年凡渴濁俱有者八味丸玉真丹和服五味子丸經驗良方治稟賦弱小便數亦不禁五味子四兩熟地黃六兩肉蓯蓉八兩菟絲子二兩酒浸蒸上為末酒煮山藥末為糊丸如梧桐子大每服二三十丸米飲送下消渴後成水病附論夫脾土也土氣弱則不能治水消渴飲水過度脾土受濕而不能有所制則泛溢妄行於皮膚肌肉之間聚為浮腫脹滿而成水也五臟六腑皆有津液若臟腑因虛實而生熱者熱氣在內則津液竭少故渴也夫渴數飲其人必眩背寒而嘔者因利故虛也診其脈心脈滑甚為善渴其人久病或變發癰疽或為水病也方紫蘇湯出聖惠方治消渴後遍身浮腫心膈不利紫蘇莖葉桑根白皮銼赤茯苓去黑皮各一兩羚羊角鎊檳榔銼各三分木香桂心去粗皮獨活去蘆頭枳殼去瓤麩炒各半兩郁李仁湯浸去皮尖炒二兩上㕮咀每服四錢水一盞生薑半分切煎至八分去滓溫服不拘時赤茯苓湯出聖惠方治消渴後頭面腳膝浮腫胃虛不能下食心胃不和或吐逆赤茯苓去黑皮紫蘇子白朮前胡去蘆頭人參各一兩陳橘皮湯洗去白焙桂心去粗皮木香檳榔銼各三分甘草銼炙半兩上㕮咀每服三錢水一盞半生薑半分拍碎棗二枚擘破煎至一盞去滓溫服不拘時防己丸出聖惠方治消渴瘥後津液枯竭身體浮虛欲成水病防己豬苓去黑皮郁李仁湯浸去皮尖炒杏仁去皮尖雙仁炒各一兩半栝蔞根赤茯苓去黑皮葶藶紙上炒桑根白皮銼各二兩白朮三分上為細末煉蜜丸梧桐子大每服二十丸空腹漿水下但以腫消小便快為度瞿麥湯出聖濟總録治消渴欲成水氣面目並膝脛浮腫小便不利瞿麥穗滑石澤瀉各半兩防己三分黃芩去黑心一分桑螵蛸炒十四枚大黃銼炒二兩上㕮咀每服三錢水一盞煎至七分去滓空心溫服良久再服豬苓散出聖惠方治消渴後四肢浮腫小便不利漸成水病豬苓去黑皮人參各三分木通銼一兩一分黃連去須一兩半麥門冬去心焙栝蔞根上為細末每服一錢溫漿水調下日三以瘥為度茯苓散出聖惠方治消渴後數飲嘔逆虛羸欲成水病赤茯苓去黑皮栝蔞根麥門冬去心焙各一兩半升麻一兩桑根白皮銼二兩陳橘皮湯洗去白焙三分上為細散每服一錢清水調下日再葶藶丸出聖惠方治消渴後浮腫成水病甜葶藶一兩隔紙炒令紫色杏仁湯浸去皮尖雙仁麩炒微黃一兩栝蔞子一兩漢防己一兩上為末煉蜜和搗三百杵丸梧桐子大每服煎赤茯苓湯下三十丸日三四服蘿蘇散出聖惠方治消渴後變成水氣令作小便出蘿蔔子三兩炒令黃紫蘇子三兩微炒上為細散每服煎桑根白皮湯調下二錢日三四服消渴後虛乏附論夫久病消渴之人營衛不足筋骨羸劣肌膚瘦瘁故病雖瘥而氣血未復乃為虛乏又有緣少時服乳石而消渴者病後津液虛竭經絡痞澀亦令虛乏須防癰疽之變救治之法所不可忽方黃耆丸出聖惠方治大渴後上焦煩熱不退下元虛乏羸瘦無力小便白濁飯食漸少黃耆銼肉蓯蓉酒浸一宿刮去粗皮炙令乾鹿茸去毛塗酥炙微黃各一兩人參去蘆頭枸杞子白茯苓澤瀉附子炮裂去皮臍禹餘糧燒赤醋淬三次細研巴戟桂心牡丹皮五味子龍骨赤石脂各三分熟乾地黃二兩甘草半兩炙微赤銼地骨皮半兩磁石一兩半燒赤淬七次搗碎細研麥門冬二兩去心焙牡蠣三分燒為粉上為末令勻煉蜜和搗五七百杵丸梧桐子大每服三十丸食前用清粥飲下地黃生薑煎出聖濟總録治消渴後四肢羸弱氣虛乏生薑汁一升生地黃汁五升蜜一升綿濾過生麥門冬汁三升牛脛骨內髓一升茯神去木甘草炙石斛去根黃連去須各四兩栝蔞根五兩五味子微炒知母炒人參當歸切炒焙丹參各二兩肉蓯蓉酒浸切焙三兩除前藥五味子外茯神等一十五味搗羅末地骨皮銼二升胡麻仁二升葳蕤銼五兩生竹根銼三兩上先以水一斗五升煮地骨皮等四味至水四升絞去滓下麥門冬地黃汁再煎五六沸卻下蜜髓薑汁再煎至七升為膏稀稠得所入前件藥味和為丸如梧桐子大不拘時竹葉湯下三十丸蓯蓉丸出聖惠方治消渴後氣乏體羸腿脛細瘦肉蓯蓉酒浸切焙黃耆銼牛膝去苗酒浸切焙車前子萆薢白茯苓去黑皮地骨皮黃連去須檳榔煨各一兩半山芋菟絲子酒浸別搗蒺藜子炒去刺用人參白芍藥各一兩一分澤瀉桑螵蛸炒各一兩枳殼去瓤麵炒三分生乾地黃炒二兩上為末煉蜜丸如梧桐子大每服三十丸空心粟米飲下填骨煎出千金方治消渴後虛乏白茯苓去黑皮菟絲子酒浸焙別搗山茱萸當歸切焙各二兩半肉蓯蓉三兩酒浸切焙大豆炒去皮三合石葦去毛一兩三分牛膝酒浸切焙巴戟天去心麥門冬去心三兩三分五味子人參遠志去心各三兩半桂去粗皮一兩三分附子炮裂去皮臍石斛去根各三兩一作石膏上為末用生地黃生栝蔞根各三斤搗絞取汁以銀石器慢火煎減半然後納藥並下白蜜十兩牛髓五兩再煎令如糜丸如雞子黃大米飲下日三藥末不必盡入惟看稀稠得所甚佳一方無遠志肉蓯蓉散出聖惠方治大渴後下元虛乏日漸羸瘦四肢無力不思飲食肉蓯蓉酒浸一宿刮去皺皮炙令乾麥門冬去心白石英細研黃耆銼牡蠣銼燒為粉磁石搗碎水淘去赤汁各一兩熟乾地黃二分白茯苓牛膝去苗附子炮裂去皮臍五味子人參去蘆頭續斷各三分白芍藥桂心萆薢銼地骨皮各半兩上為散每服用獖豬腎一個切去脂膜先以水一大盞半煎至一盞去滓入藥五錢生薑二分韭白三節煎至五分去滓每於食後溫服鍾乳丸出聖濟總録治消渴後虛乏煉鍾乳粉續斷熟乾地黃焙石葦去毛山茱萸蛇床子甘草銼炙牛膝酒浸切焙各一兩杜仲去粗皮銼炒三兩三分天雄炮裂去皮臍半兩遠志去心一兩三分肉蓯蓉酒浸切焙防風去蘆石斛去根赤石脂各一兩三分上為細末煉蜜丸如梧桐子大每服三十丸溫酒下茯神煮散出千金方治消渴虛熱四肢羸乏渴熱不止補虛茯神葳蕤各四兩生石斛黃連栝蔞根丹參各五兩甘草炙五味子知母人參當歸切焙各三分大麥糵炒七合半肉蓯蓉去皮切細酒浸三日取出焙乾稱四兩上件㕮咀每服五錢水一盞半煎至一盞去滓食前溫服磁石散出聖惠方治大渴後虛乏羸瘦小便白濁口舌乾燥不思飲食磁石二兩半搗碎水淘去赤汁熟乾地黃二兩麥門冬一兩去心桑螵蛸三分微炒黃耆三分銼人參三分去蘆頭桂心三分白茯苓三分五味子三分甘草一分炙微赤銼龍骨三分萆薢半兩銼上為散每服用獖豬腎一個切去脂膜以水二大盞煎至一盞去滓入藥五錢生薑半分再煎去滓空心溫服晚食前再服石斛散出千金方治大渴後虛乏腳弱小便數石斛去根銼肉蓯蓉酒浸刮去皺皮炙乾各一兩麥門冬二兩去心焙白蒺藜半兩微炒去刺甘草半兩炙微赤銼乾薑三分炮製銼桂心半兩熟乾地黃三兩續斷一兩黃耆銼三分上為散每服四錢水一中盞煎至六分去滓食前溫服鹿茸丸出聖惠方治大渴後虛乏小便滑數腿脛無力日漸羸瘦鹿茸去毛塗酥炙令乾肉蓯蓉酒浸一宿刮去皺皮炙乾桑螵蛸微炒各三兩附子炮裂去皮臍五味子白龍骨白蒺藜微炙去刺各一兩黃耆銼石斛去根銼菟絲子酒浸三日曝乾別搗為末各一兩半上為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸空心及晚食前清粥飲下白朮散出危氏方治胃虛發渴白朮一兩人參白茯苓上為末每服七錢水一盞半煎至七分服久渴之後多有腫疾仍須服復元丹數服鉛丹散一名黃連散治消渴羸瘦小便不禁牛膝丸出十便良方治消渴不止下元虛損腎經枯竭牛膝酒浸切焙五兩生地黃汁五兩上牛膝為末入地黃汁夜浸晝復浸汁盡為度煉蜜丸如梧桐子大空心溫酒下三十丸久服壯筋骨駐顏黑髮渴利後成癰疽附論夫渴利者謂隨飲即小便也由少時服乳石乳石熱盛房室過多致令腎氣虛耗下焦生熱熱則腎燥燥則渴也今腎氣已虛又不得制水液故隨飲即小便也以其病變但發癰疽以其內熱故小便利小便利則津液竭津液竭則經絡澀經絡澀則營衛不行而熱氣留滯故成癰疽也強中之病者莖常興盛不交精液自出也消渴之後即作癰疽皆由石熱凡如此等宜服豬腎薺苨湯制腎中石熱也又宜服白鴨通湯方磁石丸出聖濟總録治消渴內熱結成癰疽磁石火炮醋淬二七次甘草炙銼知母焙黃芩去黑心栝蔞根各一兩大豆二合石膏碎一兩一分薺苨洗切人參赤茯苓去黑皮葛根銼各三分上為細末煉蜜和丸梧桐子大每服三十丸溫水送下日三服藍葉散出聖惠方治渴利口乾煩熱背生癰疽赤焮疼痛藍葉川升麻麥門冬去心赤芍藥玄參黃耆銼生甘草銼犀角屑沉香葛根各一兩川大黃銼碎微炒二兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服射干散出聖惠方治渴利熱盛背生癰疽煩熱肢節疼痛射干川升麻犀角屑藍葉黃芩沉香地榆銼川大黃銼碎微炒各一兩栝蔞根川朴硝二兩上為散每服五錢以水一大盞煎至五分去滓不計時溫服玄參散出聖惠方治渴利煩熱發癰疽發背焮腫疼痛玄參犀角屑川芒硝黃耆沉香木香羚羊角屑各三兩川大黃二兩碎銼微炒甘草三分銼上為散每服二錢不計時候以溫水調服八珍散出聖惠方治消渴後煩熱結成癰疽赤焮疼痛心煩不得眠臥水銀入鉛丹點少水研令星盡栝蔞根各一兩苦參銼知母焙各一兩半鉛丹半兩密陀僧研牡蠣煅黃連去須各一兩上除水銀鉛丹外搗為散入水銀鉛丹末和勻每服一錢溫水調下不拘時石膏湯出聖濟總録治消渴後成癰疽石膏碎一兩半知母焙一兩半犀角鎊屑一兩栝蔞根生者去皮銼細可半斤爛研生布絞取汁兩合半如無炒乾者四兩代之升麻三分土瓜根絞取汁兩合半無生者以乾者四兩代之上除汁外粗搗每服三錢二藥汁各半合水一盞半小麥少許同煎至八分去滓溫服不拘時麥門冬湯出聖濟總録治消渴後熱毒結成癰疽麥門冬去心焙赤茯苓去黑皮栝蔞根焙甘草銼炙各二兩地骨皮洗切二兩上件㕮咀每服三錢水一盞煎至七分濾去滓溫服不拘時白茅根飲子一名茅根飲出聖惠方治因服硫黃及諸丹石熱發關節毒氣不得宣通肺燥熱渴利不止及癰疽發背白茅根一握銼桑根白皮銼麥門冬去心紅雪各二兩赤茯苓二兩一作白茯苓露蜂房一兩炙黃上細銼每服半兩水一大盞入淡竹葉三七片煎至五分去滓溫服不拘時候一方無紅雪有棗三枚鉛霜散出聖惠方治渴利煩熱背生癰疽赤焮疼痛心煩不得眠臥服此鉛霜膩粉柳絮礬川朴硝各一分上為細末每服以冷水調下半錢日夜可四五服忍冬丸出危氏方治渴疾愈須預防發癰疽忍冬草不以多少根莖花葉皆可用一名老翁須蜜啜花一名金銀花古纏藤以洗淨用之上用米麴酒於瓶內浸以煻火煨一宿取出曬乾入甘草少許為末即以所浸酒為糊丸如梧桐子大每服五十丸至百丸酒飲任下不拘時一方用忍冬草煎服此藤凌冬不凋二月開花五出黃白相間微香蒂帶紅又名金銀花老公須數名外科精要又以煮酒飲服取時不犯鐵器服之大小腸通利此藥到之力用乾者不及生者效速仍治五種飛尸酒研敷瘡亦好但留一口泄毒氣真經效奇藥也不特治癰亦能止渴並五痔諸漏磁石飲出聖濟總録治消渴後成癰疽亦治消腎燥渴磁石性緊者四兩上用杵碎入五升瓷器中煮取四升候冷不拘多少頻飲之栝蔞根丸出聖濟總録治腎水枯竭不能運上消渴恐生癰疽耆參五味湯出如宜方治消渴後虛熱留滯結成癰疽人參五味子粉草炙麥門冬黃耆各等分上㕮咀每服五錢用水一盞半煎至一盞入硃砂少許去滓溫服不拘時候輕則宜服黃耆六一湯渴利後發瘡附論夫渴利之病隨飲即小便也此謂服石藥之人房室過度腎氣虛耗故也下焦既虛虛則生熱熱則腎燥腎燥則渴渴則飲水腎氣既虛又不能制水故小便利也其渴利雖瘥熱猶未盡發於皮膚先有風濕濕熱相搏所以生瘡也方升麻散出聖惠方治渴利後皮膚生瘡肢節疼痛川升麻玄參知母赤茯苓漏蘆枳殼麩炒微黃去瓤菝葜甘草炙微赤銼各二兩赤芍藥三分黃連一兩半去須上為細末不計時候以溫漿水調下二錢以瘥為度黃耆散出聖惠方治渴利皮膚生熱毒瘡疼痛寒熱口乾心煩黃耆甘草川升麻前胡去蘆頭栝蔞根知母麥門冬去心赤芍藥各一兩黃芩二兩生地黃二兩上為散每服四錢水一盞入竹葉二七片小麥一百粒煎至六分去滓不計時候溫服日三四服皂莢煎丸出聖惠方治渴利後熱毒未解心神煩熱皮膚搔癢成瘡皂莢十梃不蛀者拍碎用水二升浸一宿冷濃濾去滓以慢火熬成膏麥門冬一兩半去心焙烏蛇三兩酒浸去皮骨炙令微黃枳殼麩炒微黃去瓤白蒺藜微炒去刺防風去蘆頭川大黃銼碎微炒杏仁湯浸去皮尖雙仁麩炒微黃苦參銼川升麻各一兩上為細末入皂莢膏和搗三二百杵丸如梧桐子大每服食後溫漿水下三十丸玄參散出聖惠方治渴利後頭面身上遍生熱毒瘡玄參黃芩川升麻連翹葳蕤各一兩犀角屑木香白蘞各半兩梔子仁三分上為散每服四錢水一中盞煎至六分去滓溫服日三四服秦艽丸出聖惠方治渴利後肺臟風毒外攻皮膚生瘡搔癢心煩烏蛇三兩酒浸去皮骨炙微黃防風半兩去蘆頭牛蒡子微炒梔子仁犀角屑各三分秦艽去苗枳殼麩炒微黃去瓤赤茯苓苦參銼各一兩上為細末煉蜜和搗三二百杵丸如梧桐子大每服三十丸煎竹葉湯下食後服栝蔞根散出聖惠方治渴利後心煩體熱皮膚生瘡搔癢栝蔞根赤茯苓各一兩玄參枳殼麩炒微黃去瓤各一兩甘草炙微赤銼苦參銼各三分上為細末每服一錢不計時候溫漿水調下黃耆六一湯出醫方大成治男子婦人諸虛不足胸中發悸時常消渴或先渴而欲發瘡或病癰疽者並宜服之黃耆去蘆蜜塗炙六兩甘草炙一兩上㕮咀每服三錢水一盞棗一枚煎至七分溫服不拘時
