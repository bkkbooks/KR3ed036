body:
  text: 卷一百八十四諸氣門上氣嘔吐附論夫上氣嘔吐者氣上而不下肺胃虛也肺脈起於中焦環循胃口寒氣乘於肺則上氣喘滿升降不利痰飲停積中焦氣動於胃胃氣逆則嘔吐肺主於氣肺為邪所乘則上氣此為膈內有熱胃間有寒寒從胃上乘於肺與膈內熱相搏故乍寒乍熱而上氣上氣動於胃胃氣逆故令嘔吐也方紫蘇子湯出聖濟總録治上氣嘔吐胸滿喘息不利紫蘇子半夏湯洗七次去滑焙五味子桂去粗皮青橘皮湯洗去白焙杏仁湯浸去皮尖雙仁焙各一兩赤茯苓甘草炙各半兩上粗搗篩每服五錢水一盞半姜半分切同煎取七分去滓溫服不計時候胡椒丸出聖惠方治肺胃有寒上氣嘔吐胸滿不食胡椒蓽茇白朮赤茯苓去黑皮陳皮湯去白焙甘草炙銼紫菀去苗土各一兩桂去粗皮訶黎勒皮煨去核人參款冬花乾薑炮各半兩上為末煉蜜丸梧子大每服三十丸生薑橘皮湯下日三服不計時候七氣湯出聖濟總録治上氣食則吐逆草豆蔻仁去皮生人參赤茯苓去黑皮白朮大腹皮和皮銼生訶黎勒煨去核各半兩甘草炙一分上粗搗篩每服五錢水一盞煎至六分去滓溫服不思食入生薑煎服訶黎勒湯出聖惠方治上氣痰壅嘔吐喘促訶黎勒煨去核二兩半夏湯洗七次去滑焙三分赤茯苓去黑皮陳皮湯浸去白焙各一兩甘草炙銼半兩人參前胡杏仁湯浸去皮尖雙仁麩炒黃各一兩紫蘇莖葉檳榔白朮各一兩上粗搗篩每服五錢水一盞半生薑五片棗三枚擘破同煎至七分去滓溫服不計時候芫花散出聖濟總録治上氣嘔吐不止芫花一兩醋炒肉豆蔻去殼銼檳榔銼各三枚上為散每服一錢煨蔥白一寸溫酒調下半夏湯出聖濟總録治上氣嘔吐逆不食半夏湯洗七次去滑一兩干桑葉六兩乾薑泡一分上粗搗篩每服三錢生薑五片水一盞煎六分去滓稍熱溫服不拘時候半夏湯治上氣嘔吐不能下食半夏湯洗去滑七次焙三分白朮半兩人參一兩桂去粗皮甘草炙銼陳皮湯浸去白焙各半兩厚朴去粗皮生薑汁炙香熱二兩上粗搗篩每服五錢水一盞半生薑五片棗三枚擘破煎至七分去滓溫服日三厭氣散治上氣嘔逆及疏利過多虛氣上攻及短氣少力氣噎悶木香人參白茯苓去黑皮藿香葉上為散每服二錢煎紫蘇木瓜生薑湯送下或入銀盞重湯煎五七沸溫服人參散治上氣嘔吐或胸中痰飲停積嘔吐人參白朮銼炒各二兩白茯苓去黑皮一兩甘草炙銼乾薑泡各半兩粟米一合上為散每服二錢用竹茹生薑湯調下治上氣嘔吐用芥子二升為末蜜丸如梧子大寅時井花水服下七丸日二亦可作散空腹服之及用酒浸服並治臍下絞痛赤茯苓散治上氣嘔吐脅胸滿悶不思飲食心中虛煩赤茯苓一兩陳皮湯浸去白焙訶黎勒皮各三分麥門冬半兩去心白朮一兩甘草一分炙銼半夏半兩湯洗七次去滑杏仁一兩湯浸去皮尖雙仁麩炒微黃上搗篩為散每服五錢水一大盞生薑半分煎至五分去滓溫服不拘時枇杷葉散治上氣嘔吐心胸滿悶痰滯不能飲食枇杷葉一兩拭去毛炙微黃檳榔赤茯苓各一兩高良薑半兩陳橘皮一兩湯浸去白焙前胡一兩去蘆細辛三分甘草半兩炙微赤銼上為散每服五錢水一大盞生薑半分煎至五分去滓溫服不拘時橘皮散治上氣嘔吐不能食陳皮一兩湯浸去白焙紫蘇子微炒人參一兩去蘆赤茯苓柴胡去蘆各一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃上為散每服三錢水一盞生薑半分棗三枚煎至六分去滓溫服不計時候人參散治上氣胃中煩熱痰壅吐逆不能下食人參一兩去蘆麥門冬一兩去心陳皮湯浸去白焙黃耆銼紫蘇莖葉赤茯苓枇杷葉拭去毛炙微赤一兩訶黎勒皮一兩半甘草半兩炙微赤銼上為散每服三錢生薑半分棗三枚煎至六分去滓溫服不計時候白朮丸治上氣胃中不和嘔吐不能下食虛弱無力白朮五味子陳皮湯浸去白焙半兩人參去蘆一兩桂心一兩白茯苓沉香各一兩厚朴一兩去粗皮塗薑汁炙香紫蘇子微炒草豆蔻去皮各一兩枳實半兩麩炒微黃上搗羅為末煉蜜和丸搗三二百杵如梧子大每於食前薑湯送下三十丸下氣止吐用蓴菜和鯽魚作羹食之多食發痔治噦氣以燕窠中草燒令黑研水服方寸匕治患啘取羅勒汁服半合定冬月用乾者煮服之治噦氣嘔逆以仙人杖水煮服之上噦氣以柿蒂煮服之瘥治噦氣用古磚燒熱於患處尉之三五度瘥上氣咳逆附論夫上氣咳逆者由肺臟虛弱感於風寒而成咳逆也咳則氣聚於肺則令肺脹心胸煩悶是為咳逆也皆邪氣與正氣相搏正氣不得宣通阻逆於咽喉之間邪氣動則作氣逆遂致奔上胸膈故謂之上氣咳逆也方芫花散治上氣咳逆心滿喘嗽氣結胸中心煩不利芫花半兩醋拌炒令乾桂心三分乾薑半兩泡製銼細辛半兩陳橘皮三分湯浸去白瓤焙乾前胡三分去蘆赤茯苓一兩訶黎勒皮三分上為散每服三錢水一盞入生薑半分煎至六分去滓溫服日進三四服人參散出聖惠方治上氣咳逆喉中不利人參一兩去蘆陳橘皮三分湯浸去白瓤焙紫菀一兩洗去苗土赤茯苓一兩款冬花三分射干一兩細辛三分菖蒲三分杏仁三分湯浸去皮尖雙仁麩炒微黃上為散每服五錢水一盞入生薑半分煎至五分去滓溫服不拘時候川椒丸出聖惠方治上氣咳逆胸滿多唾川椒一方去目及閉口者微炒令汗人參一兩去蘆款冬花三分赤茯苓一兩乾薑半兩泡製銼桂心一兩紫菀三分洗去苗土附子半兩炮製去皮臍五味子三分白朮半兩杏仁三分湯浸去皮尖雙仁麩炒微黃菖蒲三分細辛三分上為末煉蜜和搗五七百杵丸如梧子大每服以溫生薑湯下三十丸日三四服麥門冬丸出聖惠方治上氣咳逆心胸煩悶小便不利麥門冬一兩半去心焙昆布三分洗去鹹味乾薑半兩泡製銼細辛半兩川椒半兩去目及閉口者微炒去汗海蛤一兩細研桂心半兩上為末煉蜜和搗三五百杵丸如梧子大每於食前以溫生薑湯下三十丸桂心湯出聖惠方治上氣咳逆腹中壅滯往來寒熱令人羸瘦不能飲食或時下痢腹中疼痛桂心一兩川椒三兩去目及閉口者微炒去汗甘草三分炙微赤銼當歸三分半夏三分湯洗七次去滑附子一兩炮製去皮臍上為末煉蜜和搗三二百杵丸如梧桐子大不計時候以生薑橘皮湯下三十丸乾薑丸出聖惠方治上氣咳逆多唾少食乾薑半兩泡製銼桂心半兩柑子皮三分湯浸去白瓤細辛半兩甘草半兩炙微赤銼款冬花三分紫菀三分洗去苗土附子三分泡製去皮臍上為末煉蜜和搗三五百杵丸如梧子大不計時以薑棗湯下三十丸蘇子湯出千金方蘇子一升五味子五合麻黃細辛紫菀人參黃芩甘草各三兩桂心當歸各一兩生薑五兩半夏三兩上㕮咀以水一斗煮取三升分三服白前湯療上氣肺熱咳嗽多涕唾白前四兩生麥門冬十分去心貝母石膏碎棉裹甘草炙五味子生薑各四兩黃芩五分淡竹葉切一升杏仁四十顆去皮尖雙仁者白蜜一匙上切水七升煮取二升七合絞去滓納白蜜更上火煎三沸分三服每服如人行五六里以利為度湯成後宜加芒硝八分忌溫面炙肉油膩醋食海藻菘菜等小紫丸療上氣咳逆夜多唾濁乾薑甘皮一作甘草細辛款冬花各三分紫菀三分附子三枚炮上搗篩以蜜為丸如梧子大先食服三丸日再以知為度忌冷水豬肉生菜等物杏仁煎療咳上氣多涕唾用一味杏仁搗碎研取一大升汁更搗取大升三升汁以水和研之煎取一大升酒服一匙頭日三忌豬雞魚肉胡荽等物杏仁一大升去皮治暴逆氣出本草方取生薑三兩切如皂子大嚼碎咽下屢服屢驗上氣喉中如水雞聲附論夫肺主氣上通於喉嚨寒客肺經則喉嚨不利痰唾凝結氣道迫促喘息有聲聲如雞也方麻黃湯出千金方治上氣脈浮咳逆喉中水雞聲喘息不通呼吸欲死者麻黃八兩甘草四兩大棗三枚射干如博棋子二枚上㕮咀以井花水一斗煮麻黃三沸去沫納藥煮取四升分四服日三夜一一方入生薑一片半夏丸出聖濟總録治上氣喉中作聲坐臥不得半夏湯浸去滑薑汁製切焙紫菀去苗土桑根白皮銼各一兩款冬花射干陳皮湯浸去白焙百部五味子各三分細辛去蘆葉半兩赤茯苓去黑皮貝母焙去心各三分皂莢酥炙黃去皮子三分杏仁湯浸去皮尖雙仁一兩半上為末煉蜜和杵數百下丸如梧子大每服三十丸食前煎燈心薑棗湯下日再服射干湯名麻黃散出聖惠方治咳而上氣喉中如水雞聲射干二兩麻黃去節細辛去蘆葉各四兩五味子炒紫菀去苗土半夏湯浸七次薑汁炒各三兩生乾地黃焙四兩款冬花三兩上為散每服五錢水一盞半大棗三枚去核同煎至八分去滓溫服日三一方無生地黃有生薑厚朴石膏湯一名厚朴麻黃湯出聖濟總録治上氣胸滿喉中如水雞聲其脈浮者厚朴去粗皮姜炙五兩石膏銼一兩杏仁湯去皮尖雙仁炒四兩麻黃去根節細辛去苗葉半夏洗七次姜炒乾乾薑炮各一兩五味子三兩半炒上為散每服五錢水一盞更用水研小麥取汁一小盞同煎至一盞去滓溫服日二前胡丸出聖濟總録治上氣咳嗽喉中如水雞聲前胡去苗一兩一分葶藶隔紙炒紫色研如膏巴豆去皮心研各三分大黃銼炒一兩一分甘遂炒墨炙各五分上除葶藶巴豆外搗羅為末再研勻煉蜜為丸如梧桐子大每服空心粥飲每日下三丸吐利痰涎為度若吐利多即減丸數三日一服小投杯湯一名麻黃石膏湯出千金方治久逆上氣胸滿喉中如水雞聲麻黃去節四兩厚朴去粗皮薑汁炙五分石膏四兩碎杏仁湯浸去皮尖雙仁三兩上㕮咀每服五錢水一盞半先入小麥半合煎候小麥熟即出麥入藥末煎至八分去滓溫服日三夜一咳嗽甚者加五味子半夏各三兩乾薑二兩鍾乳丸療咳逆上氣喘息咳嗽晝輕夜甚喉中水雞聲鳴鍾乳人參桂乾薑各八分附子炮款冬花細辛各六分紫菀一錢杏仁四分去皮尖雙仁者炒上搗篩蜜和酒服如小豆二枚日三不知稍加之忌豬肉冷水生蔥菜等麻黃湯療上氣咳嗽喉中水雞鳴唾膿血腥臭麻黃六兩去節桂心一兩甘草炙杏仁去皮炙各二兩生薑八兩一作乾薑三兩上以水七升煮取二升半分五服用療咳唾膿血喉中腥臭得力後長將丸服忌海藻菘菜生蔥紫菀湯一名清肺湯治上氣脈浮咳逆喉中如水雞聲喘息不通呼吸欲絶者北紫菀杏仁訶子煨去核各一兩漢防己半兩上每服三錢水一盞半雞子白皮一片煎七分去滓食後服之皂莢丸療喘息氣急喉中如水雞聲者無問年月遠近出聖惠方肥皂莢兩梃好酥稱一兩上肥皂莢去火高一尺許以酥油細塗之數翻覆令得所酥盡止以刀輕刮去黑皮然後破之去子皮筋脈搗篩蜜丸每日食後服一丸如熟豆大服訖取微利一行如不利明旦細細量力服之以微利為度日止一服忌如藥法投杯湯出聖濟總録療久咳嗽上氣胸中寒冷不得飲食臥不安每牽繩而起喉中如水雞聲款冬花四十兩細辛一兩紫菀三兩甘草炙桂心廣麻黃去節乾薑各二兩一作生薑杏仁四十枚去皮尖雙仁者五味子半升半夏半升洗上切以水八升煮取二升分再服臥汗出即愈忌海藻菘菜生蔥生菜羊肉餳一方無五味子有大棗五枚桂苓湯出聖惠方治上氣不得喘息喉中作水雞聲桂心半兩赤茯苓一兩半夏一兩湯洗七次去滑細辛半兩麻黃三兩去根節五味子一兩上為散每服五錢水一大盞生薑半分煎至五分去滓溫服不計時候又方出聖惠方用臘月豬尾燒為灰細研每服以溫水送下二錢日三四服貝母湯出聖濟總録治咳逆喉中如水雞聲貝母去心炒一兩麻黃去根節桂去粗皮二兩半夏湯洗七次去滑薑汁製焙乾乾薑泡各一兩