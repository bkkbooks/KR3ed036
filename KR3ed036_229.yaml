去滓分溫兩服如咳嗽咯血者每服入杏仁七枚湯浸去皮尖碎同煎服青蒿飲子出聖惠方治熱勞煩悶四肢無力青蒿二兩柳嫩枝一兩梔子仁三分烏梅肉半兩微炒甘草三分木香半兩桃嫩枝一握上細銼相和令勻分作五服每服以水一大盞半煎至八分去滓不計時候分溫二服黃耆湯一名地骨皮散治熱勞肢節痠疼吸吸少氣腰背強痛心中虛悸咽乾唇赤面色枯燥飲食無味悲憂慘戚多睡少起黃耆銼焙地骨皮各一兩鱉甲一枚去裙塗醋炙黃甘草炙銼半兩麥門冬去心焙一兩半桂去粗皮半兩上粗搗篩每服五錢水一盞半生薑半分拍破粳米五十粒煎至八分去滓食前溫服葛根散治熱勞心神不寧肌瘦煩渴葛根銼黃芩去黑心各三分甘草炙柴胡去苗黃連去須牛黃研各半兩上為散每服二錢新汲水半盞調下日二青蒿散治熱勞久不瘥寒熱羸瘦青蒿一握甘草二寸童子小便三大盞東南桃枝一握杏仁三七枚去皮尖捶碎檳榔三枚為末上以童子小便納瓶子中初夜浸至五更用慢火煎至一大盞半去滓空心分溫三服當瀉出惡物自止後吃薤粥補之青蒿丸治熱勞青蒿一斤洗甘草杏仁去皮尖鱉甲尖柴胡蜜各一兩上為童子小便五升先煎青蒿取一升去滓更煎如稀餳入酥少許及蜜藥末等再熬可丸即丸如梧桐子大每服二三十丸空心酒下忌豬肉熱面莧菜胡荽等人參湯治熱勞肌熱煩躁面紅頰赤人參一兩地骨皮半兩青蒿二錢山梔子去皮半兩甘草炙一兩上粗搗篩每服三錢水一盞小麥少許煎至六分去滓不計時候溫服茯苓丸治熱勞咳嗽白茯苓去黑皮地骨皮鐵精亦名輕鐵六兩天靈蓋浸童子小便二升煮三兩上為末飯丸如梧桐子大每服食後煎湯下三十丸日二地黃湯治熱勞咳嗽四肢無力不能飲食生地黃汁半斤蜜三合青蒿汁三合上藥相和不計時候溫服一合宜頓服之地骨皮散治熱勞地骨皮二兩柴胡去苗一兩上為散每服二錢用麥門冬去心煎湯調下不計時候服黃耆湯一名黃耆六一湯治虛勞有熱咳唾膿血口苦咽乾胸滿短氣治虛熱用桃膠如彈大丸含之佳升陽散火湯出濟生拔粹方治男子婦人四肢發熱筋痹熱骨節熱發因熱如燎捫之烙手此病多因血虛而得之或胃虛過食冷物驟遇陽氣於脾土火鬱則發之升麻葛根獨活各半兩防風二錢半柴胡八錢甘草三錢炙人參半兩白芍藥半兩生甘草二錢上羅勻每服半兩水三大盞煎至一盞去滓稍熱服忌寒涼之物治一切男子女人患熱勞後服涼藥過多病勢已減卻變成虛冷宜服此藥牡蠣火煅牛膝各半兩五味子萆薢狗脊去毛石斛山茱萸天靈蓋酥炙焦黑色乾地黃巴戟去心益智子去皮芎藭各一分川椒二銖阿魏一銖上為細末以酒半盞蜜半盞對當化阿魏合煉丸如梧桐子大每朝鹽湯下三十丸須是骨熱已退臟腑已冷方可吃此方香甲丸出護命方治男子熱勞四肢無力手足渾身壯熱不思飲食口苦舌乾夜夢鬼交多饒驚魘川楝子十個炒葫蘆巴一分上茴香一兩附子一個炮去皮臍柴胡半兩宣連半兩鱉甲二兩醋炙令黃上件七味同杵為末煮麵糊為丸如桐子大每服五丸茶酒任下愚魯湯出淡寮方主勞熱柴胡去蘆人參上等分羅勻每服三錢姜三片棗一枚煎不拘時治熱勞出本草以皂莢長一尺續成者亦可須無孔可成實者以真酥一大兩微微塗於火上緩炙之不得令酥下待酥盡即搗篩為末蜜丸如梧子大每日空心飲下十五丸漸增至二十丸重者不過兩劑瘥治熱勞骨節煩痛背疼痛氣虛羸瘦久時病內外熱不改用柴胡煮汁服之
