body:
  text: 卷二百二十九虛勞門風勞附論夫風勞者肝勞之類也肝主風風善行而數變無所不至勞傷之人血氣俱虛風邪易侵或遊行皮膚或沉滯腑臟其病令人手足麻痹筋脈拘急頭旋眼暗易怒驚悸覓衣縫默語狂呼爪甲枯目暗黑是其證也方鱉甲湯治風勞四肢倦怠百節痠疼飲食全少行履不得涕唾稠黏多困少力面色萎黃小便赤澀黃耆鱉甲去裙醋炙秦艽去苗土柴胡去苗當歸切焙各一兩知母切焙一兩人參芎藭羌活去蘆赤茯苓去皮黃芩去黑心紫菀去土甘草炙芍藥桑白皮白蘚皮款冬花陳橘皮浸去白焙貝母去心焙木香桂去粗皮附子炮裂去皮臍各半兩丁香一分上銼如麻豆每服三錢水一盞入烏梅一枚姜三片棗二枚同煎至七分去滓入麝香少許稍熱服入酒一半同煎尤佳羌活湯一名羌活煮散治風勞攻注四肢背皆痠疼上焦虛熱心胸燥悶面體少色困乏無力元臟虛憊腰腳沉重日漸羸瘦冷氣時攻腹脅如刺脹滿酒後痰唾稠多大宜服此羌活去蘆荊芥穗附子炮去皮臍秦艽去苗土麻黃去節牛膝酒浸切白蒺藜酒浸一宿焙各二兩人參沉香銼牡丹皮當歸切焙甘草炙銼半夏生薑汁浸一宿切焙白茯苓去皮鹿茸酥炙去毛萆薢防己桂去皮各一兩上羅勻每服三錢水一鍾棗三枚蔥白二寸煎至七分去滓溫服空心午前臨臥各一服忌動風物石斛丸治風勞氣四肢羸弱心神虛煩飲食無味肢節多疼腰腳無力夜多盜汗小便赤黃石斛去根苗牛膝去苗桂杜仲去粗皮炙微炙銼焙續斷白茯苓菟絲子酒浸一宿焙乾別搗枸杞子五味子山茱萸黃耆銼防風去蘆頭遠志去心肉蓯蓉酒浸一宿刮去粗皮焙乾人參去蘆頭天門冬去心焙各一兩熟乾地黃二兩上為末煉蜜搗三二百杵丸如梧桐子大每服食前溫酒下三十丸黃耆散治風勞臟肺氣虛體瘦無力不思飲食四肢疼痛黃耆銼一兩續斷一兩人參三分去蘆頭茯神一兩五味子三分羌活芎藭桂心各半兩附子三分炮裂去皮臍防風去蘆頭一兩牛膝去苗半兩枳殼三分炒微黃甘草炙微赤銼當歸沉香三分上為散每服三錢以水一中盞入生薑半分煎至六分去滓每食前溫服沉香散治風勞氣攻四肢拘急背膊常痛肌體痿弱不欲飲食沉香石斛去根銼黃耆銼桂心白茯苓白朮天門冬去心焙白芍藥當歸銼微炒羌活附子炮裂去皮臍防風去蘆頭陳橘皮湯浸去白瓤焙各一兩熟乾地黃一兩甘草半兩炙微赤銼上為散每服三錢水一鍾入生薑半分煎至六分去滓溫服巴戟散治風勞氣血不足臟腑虛傷肢節煩痛腰膝無力形體羸瘦面色萎黃小便數多臥即盜汗巴戟柏子仁石龍芮天麻牛膝去苗牡蠣燒為粉菟絲子酒浸一宿焙乾別搗肉蓯蓉酒浸一宿刮去粗皮炙乾天雄炮裂去皮臍各一兩萆薢銼防風去蘆頭羌活當歸桑螵蛸微炙各三分肉桂二兩去粗皮上為散每服空心及晚食前以溫酒調下二錢鍾乳散出聖惠方紫石英細研水飛過白石英各一兩細研水飛過白朮三分防風去蘆頭桂心栝蔞根乾薑炮裂細銼三分細辛三分牡蠣三分桔梗半兩去蘆頭川椒去目及閉口者微炒去汗人參去蘆頭白茯苓附子各一兩炮裂去皮臍上為散入了藥令勻每服食前溫酒調下二錢敗龜湯治風勞氣虛咳嗽發熱敗龜醋炙虎骨醋炙防風去蘆頭海桐皮銼當歸切焙芍藥木通銼各半兩桂去粗皮木香酸棗仁炒黃耆銼大腹皮銼麻黃牛膝酒浸酒焙各一兩上為散每服三錢取水一盞入青蒿烏梅各少許同煎至七分去滓溫服一方加柴胡熟乾地黃各半兩肉蓯蓉散出聖惠方治風勞補益臟腑利腰膝止煩疼強志力充肌膚肉蓯蓉酒浸一宿刮去粗皮炙令乾菟絲子酒浸一宿焙乾另搗牛膝去苗附子炮裂去皮臍杜仲去粗炙皮令黃銼白茯苓各一兩防風去蘆桂心巴戟續斷枸杞子各三分五味子蛇床子山茱萸各半兩上為散每服食前以溫酒調下二錢附子散出聖惠方治風勞肌體羸瘦皮膚不潤肢節煩疼腰膝無力少思飲食附子炮裂去皮臍牛膝去苗桂心當歸各一兩五加皮防風去蘆頭萆薢銼杜仲去粗皮炙微黃銼續斷丹參沉香木香枳殼麩炒微黃去瓤各二兩上為散每服四錢以水一中盞入生薑半分煎六分去滓溫服薑黃散治風勞四肢無力胸膈煩悶薑黃二兩沉香三分黃耆銼一兩桂去粗皮半兩玄胡索炒人參各三兩分厚朴去粗皮生薑汁炙半兩芎藭三分防風去叉半兩芍藥三分羌活去蘆頭杏仁湯浸去皮尖銼研各半兩訶黎勒皮微炒三分上為散再同研勻每服清晨三錢空心井花水一盞煎至七分別調藥末一錢溫服午後再服茵陳散治風勞瘦疾七種冷氣六極等疾脾胃虛寒不思飲食疳痢休息或大小便澀兼治纍年口瘡茵陳蒿犀角屑石斛去根紫菀人參白朮柴胡去苗各三分桂去粗皮芍藥防風去蘆各半兩茱萸湯洗炒一兩桔梗炒半兩白蕪荑仁一兩上為散白羊肝一具細切分為三服淨去筋膜每服入藥末五錢蔥白五寸細切一處拌和用濕紙裹慢火煨熟空腹頓服之羚羊角湯治風勞困劣不思飲食及大病後羸瘦不食及治虛勞潮熱羚羊角屑犀角屑人參防風去叉甘草炙銼柴胡去苗桔梗炒白苓去黑皮半夏湯浸七次焙各一分黃耆銼知母焙升麻各半分上粗搗篩每服五錢水一盞半煎至一盞去滓食後分溫二服排風飲治風勞虛熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛防風去叉當歸焙白朮白蘚皮芍藥桂去皮淨炒芎藭獨活去蘆頭麻黃去根節甘草炙銼杏仁皮尖去淨炒茯神去木各一兩上粗搗篩每服五錢以水一盞半生薑三片煎至八分去滓食後溫服防風散出聖惠方治風勞體虛食少羸瘦筋脈不利手足多疼防風去蘆頭天麻海桐皮附子炮裂去皮臍沉香各一兩桂心芎藭白朮白茯苓山茱萸熟地黃各三兩枳殼半兩麩炒微黃赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓食前溫服天麻散治虛勞風氣不順天麻附子炮裂去皮臍各一兩甘草炙烏頭炮裂去皮臍各二兩麻黃三兩去節蕪荑仁炒柴胡去苗秦艽去苗土鱉甲藁本前胡各二兩上藥銼用豬脊骨一條全者銼入好酒一斗同熬干去骨將藥干搗為散每服三錢溫酒調下日二菴䕡子湯治風勞濕痹痿厥筋脈拘攣關節疼痛難以屈伸不能行履精衰目瞑腹中不調乍寒乍熱大小便或瀝此由腎虛所致菴䕡子炒酸棗仁炒薏苡仁菊花車前子蜀椒去目併合口炒出汗蔓荊實菥蓂子冬瓜子炒阿膠炙令燥各一兩大豆炒去皮一兩淨上粗搗篩每服三錢水一盞煎至一半去滓空心夜臥溫服若筋攣關節難以屈伸倍加酸棗仁菴䕡子菥蓂子冬瓜子各一兩桃仁散治風勞脾腎虛冷心腹脹疼骨節煩痛食少無力桃仁湯浸去皮尖雙仁麩炒微黃鱉甲塗醋炙微黃去裙襴白朮附子炮裂去皮臍訶黎勒煨用皮各一兩芎藭丁香桂心蓽澄茄當歸枳殼麩炒微黃去瓤各三分上為散每服四錢以水一中盞入生薑半分煎至七分去滓食前稍熱服忌莧菜柏子仁散治風勞益氣血利四肢強腰除濕痹柏子仁巴戟天雄炮裂去皮臍牛膝去苗天門冬去心焙川椒去目及合口者微炒去汗菟絲子酒浸三宿曝乾別搗各一兩肉桂二兩去粗皮石南續斷當歸各三分上為散每服空心及晚食前以溫酒調下二錢補益天雄丸治風勞氣身體疼痹手足無力氣血虛損顏色萎黃精神昏沉飲食無味天雄炮裂去皮臍菟絲子酒浸一宿焙乾另搗柏子仁石斛去根苗巴戟天門冬去心焙牛膝去苗乾漆搗碎炒令煙出以上各一兩肉蓯蓉酒浸一宿刮去粗皮炙令乾熟乾地黃肉桂各二兩去粗皮上為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸漸加至四十丸輕骨散治風勞四肢乏力嗜臥多困飲食減少身體疼痛三焦氣澀發熱口乾麻黃去節三兩烏頭炮裂去皮臍一兩黑附子白附子生用各半兩秦艽去苗土一兩半柴胡去苗鱉甲去裙醋炙各一兩桂去粗皮人參各半兩山茵陳一分上細銼用童便十盞酒浸三盞入瓷器內熬令乾再焙搗為散每服二錢溫酒調下就浴後再服以衣被蓋臥汗出為候三順丸治虛勞風氣攻作大腸祕澀下部疼痛脊膂牽強附子炮去皮臍天南星楝實銼炒威靈仙去土烏藥銼地龍去土炒墨牽牛搗取粉蜀椒取紅蘹香子炒各一兩上為末酒煮麵糊丸如梧桐子大每服二十丸溫酒下空心服食後婦人醋湯下有孕不可服牽牛子散治風勞冷氣骨熱羸瘦及婦人産後諸疾血氣衝心腳手麻痹牽牛子半生半炒三兩白朮枳殼去瓤麩炒木通銼炒桑根白皮炙銼陳橘皮湯浸去白焙人參半兩赤茯苓去黑皮一兩上為散每服三錢空腹溫酒調下日三天仙藤湯治風熱勞氣天仙藤二兩秦艽去苗土鱉甲去裙襴醋炙柴胡去蘆麻黃去節芍藥甘草炙銼防風去叉前胡去蘆頭各一兩上粗搗篩每服三錢水一盞入烏梅一枚生薑二片同煎至七分去滓溫服如傷寒不用烏梅入蔥白二寸煎熱服茯神湯治風勞咳嗽心燥煩熱驚悸鼻塞咽乾唇腫口瘡胸膈滿手臂及腰腳疼兼治虛勞驚悸茯苓去木麥門冬去心焙柴胡去苗黃連去須貝母去心焙各一兩半秦艽去苗土一兩檳榔銼二兩甘草炙銼一兩上粗搗篩每服五錢水一盞半煎至一盞去滓食後溫服日三三木節散出聖惠方治風勞面色青白肢節沉重膂間痛或寒或燥或嗔每思食味食即不能被蟲侵蝕證狀多端樟木瘤節皂莢木瘤節槐木瘤節三味銼搗羅為末各五兩天靈蓋塗酥炙搗末淨一兩牛黃研半兩人中白焙乾研一兩麝香二錢四味各研搗為末合和令勻上先將前三味末三錢以水一盞煎至半盞去滓調天靈蓋等末一錢五更頓服一方無人中白為散溫酒調下二錢排風酒治風勞虛熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛防風去叉升麻桂去粗皮獨活去蘆頭天雄炮裂去皮臍羌活去蘆頭各一兩仙人放杖草並根一斤上銼如麻豆大以醇酒三升浸五日後旋飲一盞日再服奇補湯療人風勞虛損補髓令人健麻油一斤牛酥一斤蔥白一握胡麻仁一升研蜜一升豉二升以水三升煮一宿取汁上酒一升上先於鍋中入油煎令沸著蔥白令色黃下酥蜜豉汁麻仁沸下酒成煎收不津器中盛之日服一匙兩匙或和酒服亦妙冷即加生薑一斤取汁乾薑末亦可用之蛤蚧丸治風虛氣弱肢體無力吃食減少心胸不利咳嗽涎唾兼婦人血氣風勞不思飲食蛤蚧去鱗酥炙一對桂去粗皮木香五靈脂各一兩烏梅去核二十枚甘草炙銼一分上為末煮棗肉丸如梧子大每服二十丸鹽湯下婦人醋湯下日三人參丸一名五補丸治風勞諸虛不足牛膝丸治風勞攻注背腰疼痛四肢沉困日漸瘦弱飲食無味牛膝酒浸切焙二兩桂去粗皮烏頭炮裂去皮臍各一兩乳香研半兩上為末煉蜜丸如梧桐子大每服十五丸至二十丸空心日午夜臥溫酒服牡丹皮散治血臟虛風及頭目不利不思飲食手足煩熱肢節拘急疼痛胸脅不利大腸不調陰陽相干心驚忪悸或時旋暈牡丹皮川芎枳殼麩炒各一兩陳皮半兩炙玄胡甘草羌活半夏湯泡各半兩木香三分訶子肉三分芍藥三錢三稜乾薑炮桂各半兩當歸一兩半白朮三分炒上為細末每服二錢水一盞半煎五七沸食前溫服益血海退血風勞攻注消寒痰實脾胃理血氣攻刺及氣虛惡寒潮熱石斛散出千金方治男子風虛勞損兼時氣甘草一升石斛防風蓯蓉山茱萸茯苓人參薯蕷各四兩桂心牛膝五味子菟絲子巴戟天芎藭各二兩併為末丹參一兩生地骨皮切碎生地黃汁各一升生薑汁胡麻以水二斗煮取四升去滓各二升牛髓生麥門冬汁白蜜各一升上先煎地黃地骨皮胡麻汁減半牛