細末煉蜜和丸如桐子大不計時候溫水下二十丸龍膽丸出聖惠方治傷寒後餘熱在於胸中煩渴悶亂龍膽去蘆頭青葙子各一兩黃芩梔子仁苦參銼栝蔞根各半兩川升麻上為細末煉蜜和搗三百杵丸如桐子大不計時候溫水下三十丸麻黃湯出聖濟總録治傷寒後餘熱脈浮者麻黃去根節煎洗去沫焙芍藥甘草炙令微赤銼各一兩桂去粗皮細辛去苗各半兩上粗搗篩每服五錢以水一盞半煎取八分去滓溫服日三葛根湯出聖濟總録治傷寒及天行後頭痛餘熱不解葛根銼柴胡去苗各一兩芍藥黃芩去黑心甘草炙銼桂去粗皮各半兩麻黃去根節掠去沫焙三分上粗搗篩每服五錢水一盞半棗二枚擘煎至六分去滓不計時候溫服葛根湯出聖濟總録治傷寒後餘熱不除及寒熱頭腫體痛表證尚未罷葛根芍藥白茯苓去黑皮黃芩去黑心烏頭炮裂去皮臍芎藭各一兩梔子仁半兩上㕮咀如麻豆大每服五錢水一盞半入豉三七粒煎至七分去滓溫服茯苓湯出聖濟總録治傷寒後餘熱不退心神煩躁赤茯苓去黑皮一兩半人參一分甘草炙銼半兩上粗搗篩每服三錢用水一盞煎至七分去滓不拘時候溫服茯苓湯出聖濟總録治傷寒餘熱不除及四肢拘急胸膈不利嘔逆不思飲食赤茯苓去黑心柴胡去苗枳殼去瓤麩炒桑根白皮銼各半兩麥門冬去心焙半兩葛根銼三分甘草銼半兩桂去粗皮人參各一兩上粗搗篩每服三錢水一盞生薑三片大棗二枚擘煎至七分去滓溫服葛根人參湯出聖濟總録治傷寒發汗及吐下後餘熱不退頭痛煩悶口乾葛根銼一兩人參一兩麥門冬去心焙半兩黃芩去黑心半兩黃耆銼一兩地骨皮石膏碎各半兩上粗搗篩每服五錢用水一盞半煎至八分去滓溫服葳蕤出聖濟總録治傷寒數日餘熱不解時發寒熱葳蕤柴胡去苗羚羊角各半兩石膏碎半兩上粗搗篩每服五錢水一盞半煎至八分去滓不計時候溫服人參湯出聖濟總録治傷寒後餘熱不退人參一兩知母一分甘草炙銼黃芩去黑心石膏碎各半兩上粗搗篩每服三錢水一盞入竹葉粳米各少許同煎至七分去滓不計時候溫服柴胡湯出聖濟總録治傷寒後餘毒不解頰赤口乾四肢煩熱柴胡去苗茵陳蒿甘草炙銼人參各一兩大黃銼炒半兩上粗搗篩每服三錢水一盞小麥五十粒同煎七分去滓溫服不拘時候返魂丹出衛生家寶方治傷寒後餘熱在心譫言妄語甚者顛狂如失心狀但是一切心疾服之無不克效新羅人參一兩硃砂半兩酸棗仁一兩湯浸去皮取仁焙乾淨稱上先將人參為末別研硃砂極細和之酸棗仁焙急研入藥勿羅獖豬心血丸如梧桐子大參湯下二十丸日三服服後略臥少時玄參散出王氏博濟方治汗後餘熱未解川大黃玄參朴硝白藥子各半兩甘草二分上件五味同為末每服一錢水一盞煎至八分放冷服再服瘥退黃散出王氏博濟方治汗後餘毒未解皮膚黃色石膏牙硝川大黃山梔子紅雪甘草各等分上件六味同為末每服一錢水一盞入寒水石末少許同煎至八分溫服立效
