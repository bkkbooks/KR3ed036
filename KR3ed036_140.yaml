body:
  text: 卷一百四十傷寒門治傷寒心腹脹痛附論夫傷寒心腹脹痛者由其人臟腑久冷因染斯疾未得汗間心神煩熱遂服涼藥及飲冷水傷於心脾動於風冷故令心腹脹痛也或有經吐下以後不解內外有熱亦心腹脹痛此為內有結實故也歌曰腹痛腎寒通脈湯證兼表裡桂加黃實疼便結虛泄利脹則陳皮梗下良又論云邪在裡陽邪入里與正氣搏則為腹痛所以痛者有異焉脈實腹痛滿大祕者實痛也脈虛腸鳴而大便泄者虛痛也陰陽異證用藥不同大抵痛為邪氣實法當疏利陰受病則令泄用養正丹輩溫而利之少陰腹痛四逆或咳或悸或小便不利或泄利下重四逆散下利清穀脈微欲絶通脈四逆湯腹痛小便不利用真武湯誤下太陽因而腹滿時痛是有表復有里用桂枝芍藥湯痛甚桂枝加大黃湯實痛者關脈實煩躁腹滿大便祕結桂枝加大黃湯小承氣湯胸中熱胃中有邪氣腹痛欲嘔吐則用黃連湯虛痛者寸脈澀尺脈閉腸鳴泄利先與小建中湯不瘥小柴胡去黃芩加芍藥易之間用建中湯加遠志腹中冷痛四肢厥逆用薑附湯腹脹者陰陽不和也桔梗半夏湯最良活人書云本云太陽病醫反下之因爾腹滿時痛病有表復有里仲景所以用桂枝加芍藥湯主之痛甚者加大黃桂枝加芍藥即是小建中也太陰脈弱自下利設當行大黃芍藥者宜減之其人胃虛陽氣易動故也下利者先煎芍藥十餘沸難經云痛為實大抵痛宜下仲景云發汗不解腹滿痛者急下之宜大承氣湯又曰腹中滿痛此為實當下之屬大柴胡湯腹痛有二證有虛痛尺脈弦腸鳴泄利而痛者冷痛也小建中湯主之仲景云陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯小柴胡去黃芩加芍藥陰證腹痛即四逆散通脈四逆加芍藥小便不利者真武湯也關脈實腹滿大便祕按之而痛者實痛也桂枝加大黃湯黃連湯大承氣湯主之又問腹脹滿者何也陰陽不和也桔梗半夏湯最良仲景論太陽證發汗腹脹滿者厚朴生薑半夏甘草人參湯下後心煩腹滿臥起不安者梔子厚朴湯吐後腹脹滿者與調胃承氣湯少陰病六七日腹脹不大便者急下之宜承氣湯也方厚朴散出聖惠方治傷寒有熱因服冷藥過度心腹脹痛厚朴去粗皮塗生薑汁炙令香熟一兩當歸銼微炒枳殼麩炒微黃去瓤木香大腹皮銼各半兩訶黎勒煨用皮一兩上粗搗篩每服四錢水一中盞入生薑半分煎六分去滓不計時候稍熱服木香散出聖惠方治傷寒冷氣積在腹中脹疼痛木香枳殼麩炒微黃去瓤柴胡去苗當歸銼微炒各三分乾薑炮半兩吳茱萸湯浸七次焙乾微炒一分上粗搗篩每服三錢水一中盞入棗三枚煎六分去滓稍熱不計時候服一方無吳茱萸用生薑半分同煎桃仁散出聖惠方治傷寒心腹脹滿疼痛桃仁湯浸去皮尖雙仁麩炒微黃枳殼麩炒微黃去瓤神麯炒令微黃麥櫱炒令微黃各三分桂心白朮各一兩上為粗散每服三錢水一中盞煎六分去滓稍熱不計時服之當歸散出聖惠方治傷寒脾胃虛心腹脹痛不思飲食當歸銼微炒乾薑炮製銼各半兩桂心芎藭陳皮湯浸去白瓤焙檳榔各一兩上為散每服三錢以水一中盞煎六分去滓稍熱不計時候服赤芍藥散出聖惠方治傷寒脾胃氣滯心腹脹痛不欲飲食赤芍藥訶黎勒煨用皮當歸銼微炒肉豆蔻去殼人參去蘆頭郁李仁湯洗去皮尖微炒桂心各三分陳橘皮湯浸去白瓤焙檳榔各一兩上為散每服三錢以水一中盞入生薑半分棗三枚煎六分去滓不計時候溫服柴胡散出聖惠方治傷寒發汗氣壅不散攻心脹痛柴胡去苗黃芩赤芍藥檳榔各三分枳殼麩炒微黃去瓤半夏湯洗七次去滑大腹皮銼木香各半兩上為散每服三錢以水一中盞入生薑半分煎六分去滓不計時候溫服赤茯苓散出聖惠方治傷寒卒心腹痛脹滿不下飲食赤茯苓桔梗去蘆頭陳橘皮湯浸人參半兩去蘆頭檳榔三分上為散每服三錢以水一中盞入棗三枚煎六分去滓稍熱不計時候服大黃丸出聖惠方治傷寒大腸氣壅心腹脹滿疼痛四肢骨節痠疼煩悶不得眠臥川大黃一兩銼碎微炒木香桂心甘草炙微赤銼各一分枳殼麩炒微黃去瓤檳榔各半兩郁李仁三分湯浸去皮尖微炒上為末煉蜜和搗一二百杵丸如梧桐子大每服不計時候以溫酒服下三十丸以利為度治傷寒冷氣攻心腹脹滿疼痛不下飲食方出聖惠方木香赤芍藥厚朴去粗皮生薑汁炙令香熟各三分甘草一分炙微赤銼吳茱萸湯浸七次焙乾微炒桂心乾薑炮白朮青橘皮湯浸去白瓤焙各半兩上為散每服四錢以水一中盞入棗三枚煎六分去滓不計時候稍熱服半夏散出聖惠方治傷寒心腹脹滿疼痛胸膈壅滯或嘔噦不能飲食宜服半夏湯洗七次去滑前胡去蘆頭訶黎勒皮赤芍藥人參去蘆頭各三分桂心木香檳榔各半兩陳橘皮一兩湯浸去白瓤上為散每服四錢以水一中盞入生薑半分煎六分去滓稍熱不計時候服厚朴散出聖惠方治傷寒汗後腹脹疼痛厚朴二兩去粗皮塗生薑汁炙令香熟川大黃銼碎微炒人參去蘆頭各一兩芎藭赤芍藥陳橘皮湯浸去白瓤各三分上為散每服四錢以水一中盞入生薑半分煎六分去滓稍熱不計時候服桃仁湯出聖濟總録治傷寒後心腹脹痛桃仁湯浸去皮尖雙仁炒令黃神麯炒大麥櫱炒桑椹各一兩白朮二兩桂五錢上粗搗篩每服三錢水一盞煎半盞去滓食前溫服烏藥散治厥陰病脅腹引小腹而痛者此為疝也烏藥茴香青皮赤豆各一兩乾漆沒藥各二兩硇砂滑石高良薑各一兩上除硇砂別入搗篩為散取一錢溫酒或白飲和服仍以鈴按伏之患釋柴胡芍藥湯出聖濟總録治傷寒發汗後邪熱不除腹脅脹痛柴胡去苗芍藥黃芩去黑心各三分大腹皮半夏湯洗去滑炒乾枳殼去瓤麩炒各半兩檳榔銼一分上粗搗篩每服三錢水一盞入生薑半分拍碎同煎至半盞去滓溫服又方治傷寒發汗惡風心腹脹滿以薄荷煮汁服之傷寒厥逆附論夫傷寒病手足逆冷其名曰厥此因陽氣衰陰氣盛陰盛則陽脈逆而不通於四肢所以逆冷其證令人惡寒不飲水下利清穀或清便自調或小便數外證默靜是其候也宜溫之灸之若灸之而手足不溫者為難治然厥亦有熱厥者先發熱而後厥勢深厥亦深熱微厥亦微脈雖沉伏按之當滑若或畏熱或飲水揚手擲足煩躁不得眠大便祕小便赤外證昏憒者雖厥不可溫也宜下之陰陽相乘而生寒熱厥者脈證似同而大異寒厥者初得之四肢冷脈沉微而不數多惡寒引衣自覆下利清穀外證多惺熱厥者初得之發熱頭疼脈雖沉伏按之必數其人或畏熱喜冷揚手掉足煩躁不得眠大便祕小便赤外證多昏冒傷寒亦然治之各有方傷寒厥者冷也甚於四逆也經曰厥有陰陽氣不相順接便為厥厥者手足逆冷是也謂陽氣內陷熱氣逆伏而手足為之冷也經曰傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微是知內陷者手足為厥矣少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭亦是言發動其熱也先熱而後厥者熱伏於內也先厥而後熱者陰退而陽氣得復也若始得之便厥者則是陽氣不足而陰氣勝也大抵厥逆為因所主寒者多矣而又有進退之別經曰病厥五日熱亦五日設六日當復厥不厥者自愈發熱四日厥反三日厥少熱多其病自愈厥四日熱反五日其病為進寒多熱少陽氣退故為進也病至厥陰傳經盡也當是之時陽氣勝陰厥少熱多其病則愈若或陰氣反勝陽不得復厥多熱少其病則逆厥為陰氣至也熱為陽氣復也至於下利則曰先厥後發熱而利必自止見厥復利厥者復為熱為陽氣得復而利必自止熱者復為厥是陰氣還勝也故復下利矣諸陽受氣於胸中邪氣客感於胸中鬱郁留結則陽氣不得敷布而手足為之厥經曰手足厥冷脈乍緊邪結在胸中心中滿而煩飢不能食病在胸中當吐之者是矣厥為陰之盛也若更加之惡寒而蜷者陰氣之極也則難可制經曰少陰病惡寒身蜷而利手足厥冷者不治是厥冷之逆者神丹其能生乎厥有二證有陰厥有陽厥仲景所謂熱深則厥深也蓋陽極則發厥也不可一例作陰證治之初得病而身熱至三四日後熱氣方深大便祕小便赤或譫語煩躁昏憒及別有熱證而反發厥者陽厥也急用大柴胡湯大承氣湯隨輕重用之若有大段輕者白虎湯初得病身不寒熱大便不祕引衣自蓋或下利或小便數無熱證而厥逆者陰厥也四逆湯理中湯通脈四逆湯當歸四逆加茱萸生薑湯陰陽二厥脈皆沉所以使人疑也陰厥脈沉遲而弱陽厥脈沉而滑或去緊又陽厥指爪時時溫陰厥常冷也證治論云若兩脈不見者只以外證辨冷熱也若未辨陰陽者且與四順丸試之若是陽厥辨當見熱證若是陰厥不發熱矣手足指頭微寒者謂之清此疾為輕只可服理中之類已成厥者則用四逆也脈不至者通脈四逆等湯厥而脈乍結者邪氣結在胸中也亦令人厥瓜蒂散吐法厥而怔忪者有水也宜先治水屬厥陰藏厥傷寒四逆四肢逆而不溫者是也積涼成寒積溫成熱非一朝一夕之故其所由來者漸矣傷寒始者邪在皮膚當太陽陽明受邪之時則一身手足盡熱當少陽太陰受邪之時則手足自溫是表邪漸緩而欲傳裡也經曰有傷寒四五日手足溫而渴者小柴胡湯主之是太陽之邪傳之陽也傷寒脈浮手足自溫者是為系在太陰是少陽邪傳於太陰也是知邪氣在半里則手足不熱而自溫也至於邪傳少陰而里證已深雖未至厥而手足又加之不溫是四逆也若至厥陰則手足厥冷矣經曰少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之方用柴胡枳實芍藥甘草四者皆是寒冷之物而專主四逆之疾是知四逆非虛寒之證也又有四逆諸湯亦治四逆手足寒方用乾薑附子熱藥者厥有旨哉若手足自熱而溫從四逆而至厥者傳經之邪也四逆散主之若始傳之手足便厥而不溫者是陰經受邪陽氣不足可用四逆湯溫之大須識此勿令誤也四逆與厥相近而非也經曰諸四厥者不可下是四逆與厥者異也吐利煩躁是四逆者死是惡見其四逆也診視之間熟詳究之歌曰四逆須將腎證詳病來手足但微涼枳柴芍藥傳經劑邪中陰經四逆湯又論云手足不溫謂之四逆陰經之邪主之太陰受病手足自溫傳至少陰則有手足四逆之證四逆之與厥冷實相遠也或曰均是四逆耳而四逆湯散一寒一熱用藥何不類耶蓋手足自熱而至溫由溫而至四逆是傳經之邪非虛寒之候也四逆散主之若得病以來手足不溫便成厥逆此則陰經受邪陽氣不足也可以四逆溫之臨診要當審此雖然吐利煩躁惡見四逆四逆下利惡寒而蜷並屬少陰又為不治之診故並及之少陰四逆其人或咳或悸或小便不利或腹中痛滿或泄利下重並用四逆散初病以來厥冷四逆即用四逆湯溫之兩足脛逆冷有本條凡厥逆冷厥初來厥有源沉遲而弱冷常存熱深發厥初身熱沉滑時平指爪溫陽氣伏藏陰氣越出陰陽不相接所以厥也其手足厥冷之證乎蓋諸陽通於四末陽微而為陰所勝初病便厥者是為冷厥其脈沉遲按之則弱惺惺而靜惡寒引衣足多攣臥或身上粟形或下利清穀也熱伏於內先熱而後厥者是為熱厥脈必沉滑按之則數昏塞狂言發渴露手揚衣或躁不得眠或大便不得利也外證皆可驗焉若先厥而後得熱則是陰邪退而陽氣復矣傷寒熱多厥少其病當愈厥多熱少其病則進下利則發厥一條亦有厥者復為熱為有瘳熱者復厥為已甚蓋下虛則厥陰實使之陽長陰消其可也雖然傷寒血證亦有四肢厥以至昏迷悶絶者此又不可不知至若少陰不利惡寒而蜷手足厥冷與夫臟厥一證皆為不治之診厥可無辨乎冷厥初病便作四肢逆冷足蜷惡寒引衣自蓋不知大小便而有滑泄外證默默而惺四逆湯理中湯白通加豬膽汁湯當歸四逆加茱萸生薑湯可選方用之又痰厥氣厥腎厥宜用易簡芎辛湯最良熱厥初病身熱然後發厥其人則畏熱揚手擲足及煩躁飲水頭汗大便祕小便赤怫鬱昏憒蓋當下失下血氣不通故四肢逆冷所謂熱深則厥深下證悉具而見厥逆者此也可與大承氣湯及大柴胡湯或白虎湯熱厥厥冷厥相類但指爪時溫為異耳若疑似未明的當且以四順丸試之陽厥則有熱陰厥則無熱寒熱而厥者一手或兩手無脈面色晦昧不澤急銼五味子並麻黃細辛甘草湯人參調血通脈可以為佐服後汗解則生投藥無汗或脈不至者不治水氣厥者心下怔忪可用茯苓甘草湯邪氣結胸中而厥者脈乍緊乍結心煩滿飢不欲食可與瓜蒂散吐之臟厥者七八日逆冷下利發躁無時暫安則不能治痰飲厥逆眩暈少與三生飲妙方吳茱萸湯出聖惠方治傷寒吐利手足逆冷心煩悶絶宜服吳茱萸湯浸七次焙乾微炒甘草各一分炙微赤銼棗五枚生薑人參去蘆頭厚朴各半兩去粗皮塗生薑汁炙香熟上細銼都以水三大盞半煎至一盞半去滓不計時候益智子散出聖惠方治傷寒曾經發汗吐下寒氣未退脾胃氣虛胸膈煩滿手足厥冷宜服益智子川烏頭炮裂去皮臍肉桂去皮當歸銼微炒乾薑炮製銼細辛高良薑銼甘草炙微赤銼各半兩前胡去蘆頭厚朴各一兩去粗皮塗生薑汁炙令香熟上搗篩為散每服三錢以水一中盞入棗三枚煎至六分去滓不計時稍熱服通脈散出聖惠方治傷寒病脈沉厥逆宜服麻黃一兩半去根節肉桂去粗皮附子各二兩炮裂去皮臍甘草半兩炙微赤銼上搗篩為散每服四錢以水一中盞入生薑半分棗三枚煎六分去滓不計時候稍熱服治傷寒吐下後胃氣虛寒食即吐逆四肢厥冷宜服此方出聖惠方人參去蘆頭白朮桂心附子炮裂去皮臍厚朴各一兩去粗皮塗生薑汁炙令香熟乾薑炮製銼陳橘皮湯浸去白瓤焙甘草各三分炙微赤銼上搗篩為散每服四錢以水一中盞煎六分去滓不計時候稍熱服附子散出聖惠方治傷寒手足厥冷脈細欲絶者宜服附子炮裂去皮臍白朮各一兩高良薑二分銼厚朴一兩半去粗皮生薑汁炙令香熟甘草一分炙微赤銼上搗篩為散每服四錢以水一中盞煎至六分去滓不計時候稍熱服白朮湯出聖惠方治傷寒四逆手足厥冷汗出脈微及內有久寒白朮一兩半人參三分去蘆頭桂心乾薑各半兩炮製銼附子一兩炮裂去皮臍一作半兩甘草一分炙微赤一作三分上搗篩為散每服五錢以水一大盞煎至五分去滓不計時候稍熱服附子湯出聖惠方治傷寒大熱汗出熱不去腹內拘急四肢厥冷並不利方甘草炙微赤銼乾薑炮製銼赤芍藥各一兩附子半兩炮裂去皮臍上搗篩為散每服五錢以水一大盞半煎至一盞去滓不計時候稍熱服治傷寒手足厥逆嘔吐涎沫頭痛宜服此方吳茱萸半兩湯浸七次焙乾微炒人參一兩去蘆頭上搗篩為散每服三錢以水一大盞入生薑半分棗三枚煎六分去滓不計時候稍熱服芍藥湯治傷寒下利清穀裡寒外熱汗出而厥腹痛兼嘔芍藥一兩附子炮裂去皮臍三分人參甘草炙各半兩上銼如麻豆每服五錢以水一中盞半入生薑半分拍碎同煎八分去滓服日晚再服吳茱萸湯治傷寒手足厥冷脈細欲絶者吳茱萸湯淘三次焙乾炒當歸切焙芍藥各一兩甘草炙三分乾薑炮製半兩桂去粗皮一兩細辛去苗葉三分上粗搗篩每服五錢以水一盞酒半盞棗三枚擘破同煎至八分去滓溫服人參湯治傷寒裡寒外熱手足多厥人參白朮各一兩細辛去苗葉乾薑炮製三分甘草炙去半兩上粗搗篩每服五錢以水一盞半煎至一盞去滓食前溫服陽起石丸治傷寒四逆陽起石太陰玄精石硝石附子炮裂去皮臍各等分上搗篩研為細末湯浸蒸餅和丸如梧桐子大每服五丸至十丸新汲水下汗出解正陽散治傷寒手足厥冷脈沉細澤漆湯治脈沉者半夏半升紫參五兩一作紫菀澤漆三斤以東流水五斗煮取一斗五升生薑五兩白前五兩甘草黃芩人參桂枝各三兩上㕮咀內澤漆汁中煮取五升溫服五合至夜盡服苓桂味甘湯青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕如醉狀因腹下流陰股小便難時覆冒者與茯苓桂枝甘草五味子湯治其氣衝茯苓四兩桂心甘草各二兩五味子半升上㕮咀以水八升煮取三升去滓分三服溫服苓甘味薑辛湯沖氣即低而反更咳胸滿者用茯苓甘草五味子去桂加乾薑細辛以治其咳滿方五味子半升甘草乾薑細辛各一兩茯苓去黑皮四兩上㕮咀以水八升煮取三升去滓溫服半升日三服苓甘味薑辛夏湯咳滿即止而更復渴沖氣發者以細辛乾薑為熱藥也服之當逆渴而渴反止者為支飲也支飲法當冒冒者必嘔嘔者腹痛加半夏以去其水方半夏五味子各半升茯苓四兩細辛乾薑甘草各二兩上㕮咀以水八升煮取三升去滓溫服半升日三苓甘味薑辛夏仁湯水去嘔止其人形腫者加杏仁其證應納麻黃以其人遂痹故不納之杏仁五味子半夏各半升茯苓四兩乾薑細辛甘草各三兩上㕮咀以水一斗煮取三升去滓溫服半升日三若逆而納麻黃者其人必厥所以然者以其人血虛麻黃髮其陽故也苓甘味薑辛夏仁黃湯若面熱如醉此為胃熱上衝其面加大黃利之方大黃乾薑細辛甘草茯苓四兩五味子半夏杏仁各半升上㕮咀以水一斗煮取三升去滓溫服半升日三服小青龍加石膏湯咳而上氣肺脹其脈浮心下有水氣脅下痛引缺盆設若有實者必躁其人常倚仗石膏乾薑桂心細辛各二兩芍藥甘草各二兩麻黃四兩半夏半升五味子一升上㕮咀以水一斗先煮麻黃減二升下藥煮取二升半強者服一升羸者減之小兒四合仲景用治肺脹咳而上氣煩躁而喘脈浮者心下有水外臺同赤丸方治傷寒氣厥逆茯苓半夏各四兩洗一方用加烏頭二兩炮細辛一兩一作人參上為末之納真朱為色煉蜜丸如麻子大先食酒飲下三丸日夜一服不知稍增之以知為度附子散治傷寒時氣附子炮裂去皮臍桂去粗皮各半兩上搗羅為散每服三錢以熱酒調頓服厚衣蓋汗出為度奪命川附湯治體虛感冒傷寒頭疼發熱或日輕夜重或午或早或晚或終日單發大熱雖渴不喜冷脈沉細氣虛者可服豫嘗以此藥醫十數人自能醫者皆效故録附之川附一雙去皮臍炮切片上㕮咀作一服水一碗生薑十三片煎七分濾出水中沉冷再露一宿次早五更冷服一二口復歇看腹中有無發熱如無熱再進作二三次服其熱自退神速之效四逆湯治傷寒厥逆表熱裡寒下利清穀食入則吐或乾嘔或大汗大吐下之後四肢冰冷五內拘急舉體疼痛不渴脈沉伏大附子生用去皮臍半兩乾薑半兩甘草炙一兩上銼散每服四錢水二盞煎七分去滓食前溫服並進取效返陰丹出王氏博濟方治傷寒厥逆太陰玄精石一兩為末硫黃一兩為末硝石一兩為末膩粉半兩上依次第而在干煨鬥內用濃墨染紙作蓋子覆之以慢火煨良久揭看藥上有黃矛生便止入乳鉢內悶氣細研五七百下用蒸餅丸如皂子大傷寒脈細四肢冷逆及曾轉瀉者濃煎艾湯一盞先熱與吃一半細嚼一丸下須臾汗出便瘥重者不過二丸必愈傷寒後不得眠附論夫衛氣晝行於陽夜行於陰陰主夜夜主臥謂陽氣盡陰氣盛則目瞑矣今熱氣未散與諸陽並所以陽獨盛陰偏虛今病後不得睡者陰氣未復故也榮衛之氣晝行於陽則寤夜行於陰則寐傷寒瘥後臟腑皆虛榮衛出入不能循常緣熱邪未散與陽氣並衛氣獨行於陽不入於陰則陽盛陰虛故不眠歌曰不眠腎證利而煩大熱膀胱胃裡干吐汗出下余懊憹熱多熱少數般看經云胃不和臥不安不和者津液乾焦邪熱煩躁陽獨盛而陰偏虛故爾蓋夜以陰為主陰氣則目閉而臥安惟夫陰為所盛故終夜煩擾而不得寧所謂陰虛則夜淨者此也若陽虛而陰盛焉又有夜靜晝煩之證耳少陰不利而渴不得眠豬苓湯此停水也若二三日以上心煩不得眠黃連阿膠湯主之甚良太陽發汗多或大汗出胃中干煩熱不得眠欲飲水者與之胃和即愈矣若脈浮小便不利渴可與五苓散吐汗下後心中懊憹虛煩顛倒不得眠梔子豉湯或酸棗湯大熱乾嘔呻吟錯語不得眠黃連解毒湯凡陽毒熱病皆不得眠下後發汗無大熱脈微沉不嘔渴無表證夜靜晝煩而不得眠可與乾薑附子湯陽勝陰則狂眠亂夢可用梔子豉湯陰勝陽則驚悸昏沉宜用酸棗湯瘥後不得眠者熱氣與諸陽相併陰氣未復故也宜用梔子烏梅湯或易簡溫膽湯加竹茹此可通用又多眠歌多眠神思若沉昏自汗風溫默默然狐惑唇瘡沉細腎太陽浮細亦癡眠陰虛陽盛人多昏昏閉目者陰司合也默默不言者陰主靜也多眠四證二者病在經若太陽惡寒其脈浮細是陽氣未盡復也若狐惑淹沉素得之下利則不忌陽可知矣此所以為陽盛與風溫證尺寸俱浮自汗喘息體重不收默默然欲眠不可發汗可與葳蕤湯病在少陰厥陰二經狐惑覺四肢沉重咽乾聲啞上下唇瘡害人甚急有本條少陰證尺寸俱沉細目欲寐急與四逆湯復其陽氣又少陰欲吐不吐煩而多寐五六日自利而渴張氏無治法若是小便白者可用四逆湯甚妙張氏又云少陰病脈微沉細多寐汗出不煩欲吐若變證者五六日自利煩躁及不得寐者死少陰證變難活貴乎詳而審之可也太陽證頭項痛惡寒嗜臥脈浮細或胸脅滿者宜用小柴胡湯脈且浮宜麻黃湯胃傷風發黃嗜臥自有本條瘥後昏沉歌差後昏沉似降妖或時寒熱或時潮語言錯謬精神少毒在心胸汗未消傷寒瘥後半月以來終不能惺惺錯謬言語精神短少或寒或熱似瘧或潮熱頰赤色者若以風魅治之非也是由發汗不盡餘毒在心熱氣內蘊炮絡開致之然也瘥後昏沉不醒可與知母麻黃湯再取微汗瘥後勞復食復見下後有熱條瘥後胃脘餘熱虛煩而吐用竹葉湯加生薑瘥後喜睡膈上有寒宜用理中丸瘥後從腰以下有水氣宜用牡蠣澤瀉散瘥後日暮微煩以其病方瘥強與穀食而不消也節食飲則可愈矣方麥門冬散出聖惠方治傷寒後體虛煩熱不得睡臥少思飲食宜服麥門冬去心黃芩各三分茯神熟乾地黃人參去蘆頭黃耆銼各一兩甘草炙半兩微赤銼上搗篩為散每服五錢以水一大盞入生薑半分棗三枚粳米五十粒煎至五分去滓不計時候服治傷寒後虛煩不得眠睡心中懊憹宜服梔子烏梅湯出活人書甘草炙微赤梔子仁黃芩各半兩烏梅肉十四枚微炒柴胡一兩去苗上搗篩為散每服四錢以水一中盞入生薑半分竹葉二十七片豉五十粒煎至六分去渣不計時候溫服熟乾地黃散出聖惠方治傷寒後體虛心煩不得眠臥四肢少力熟乾地黃一兩半白芍藥羚羊角屑茯神黃耆銼麥門冬去心酸棗仁微炒人參去蘆頭各一兩上搗篩為散每服四錢以水一中盞煎六分去滓入雞子清一枚攪令均溫服又方出聖惠方半夏三分湯洗七遍去滑白茯苓一兩半黃芩一兩上搗篩為散每服五錢以水一大盞入生薑半分粳米五十粒煎至五分去滓溫服酸棗仁散出聖惠方治傷寒後體虛乏力筋脈拘急四肢疼痛不得睡臥宜服酸棗仁一兩微炒麥門冬去心防風去蘆頭芎藭各半兩當歸微炒銼白茯苓羚羊角屑人參去蘆頭黃耆銼各三兩上搗篩為散每服四錢以水一中盞入生薑半分棗三枚煎六分去滓不計時候溫服麥門冬散出聖惠方治傷寒後胃氣虛乏不思飲食四肢少力心神煩悶