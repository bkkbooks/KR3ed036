body:
  text: 卷一百二十一傷寒門傷寒總論夫人生天地之間命有遭逢時有否泰吉凶安危喜怒愛憎存亡憂畏關心之慮日有千條謀身之道時有萬計乃度一日是故天無一歲不寒暑人無一日不憂喜故有天行瘟疫病者則天地變化之一氣也斯蓋造化必然之道不得無畏故聖人雖有補天立極之德而不能廢之而能以道御之其次有賢人善於攝生調和撙節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之橫病多不解療皆云日滿自瘥以此致枉者天下大半凡始覺不佳便須救療若至於病即湯食競進折其毒勢自然而瘥必不可令病氣日甚拱手待斃斯為誤矣夫得病一日在皮當摩膏火炙淋浴發汗則愈若不解者至二日在膚可法針服解肌散發汗出則愈若不解者至三日復一發汗則若不解者則勿復發汗也至四日在胃宜服赤小豆瓜蒂散吐之則愈至五日在腹六日入胃則可下之若熱未入胃而誤下之其熱乘虛入胃然病要須急下者又不得留於胃中也若胃實者熱毒為病三死一生若胃虛者熱毒入胃胃即爛矣微者赤斑出此候五死一生劇者黑斑出此候十死一生以病人各有強弱治有難易得效相倍也若得傷寒病無熱但狂言煩躁不安精采言語與人不相主當勿以火炙但以五苓散二三錢服之可與新汲水一升或一升半可至二升強飲之指刺喉中吐之隨手便愈若不便吐者此病多不善勿以余藥吐也又此病不急用豬苓散及吐解之法其斃速爾可先以發表之藥尤佳病者過日不已則不是熱不可下之下之者熱毒承虛入胃亦令胃爛斑出也又春夏無大吐下秋冬無大發汗若冬及始春天寒宜服神丹丸亦可摩膏火炙若末春夏月初秋凡此熱月不宜火炙不宜厚覆宜服六味丸散若無丸散及煎但用柴胡數兩煎服傷寒時行皆可服也亦可以發汗藥發汗不但一也直至再三發汗不解者當與湯實者宜轉下之其脈朝夕駛者為實癖也朝平夕駛非癖也轉湯可早與服但當少與勿令下多其間諸虛煩熱者與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗若頭不痛脈不緊數故知非裡實不可下也如此外內皆不可攻而醫強攻之必致危損多死難痊也虛煩者但當與竹葉湯若嘔者與橘皮湯不愈可重與服也若得病連服湯藥發汗不出者皆病死也凡難得汗者可蒸之如蒸中風法蒸濕之氣於外迎之不得不汗出也凡病發熱惡寒脈洪者便宜發汗後以粉粉之勿令著風若當發汗而其人適已失血及大下利者雖不可汗如此者可數與桂枝湯使體中熱汗出連日如此自當解也夫表和里病下之則愈汗之則死里和表病汗之則愈下之則死夫如是則神丹不可以誤發甘遂何可以妄攻然則桂枝下咽表和則愈承氣入胃裡平則痊明當消息病之證候不可亂投湯藥虛其胃氣也經言脈微不可吐虛細不可下此醫之大禁也凡脈有浮沉轉能變化或人得病數日方以告醫雖云初覺視病已積日矣其疾久已成非發汗所解當診其脈隨時救療必得痊也不可苟以次第為之失其機要乃致禍矣傷寒病三日以內發汗者謂當風解衣夜臥失覆復寒所攻也賊風相染易為外邪所中也至於人自飲食過度生冷失節臟不能轉動稍有頭疼身熱其脈實大者便可吐下不可發汗也凡人有小病覺不如常則須早療若隱忍不療冀望自瘥須臾之間致成痼疾小兒女子益以滋甚若天行不和當自戒謹小有不安便須救療尋其邪由及在腠理湯散以時鮮有不愈者若患數日乃說邪氣入臟則難施治雖和緩之功亦無能為也夫氣寒者百病之始也是四時八節不正疫癘之氣經云春氣溫和夏氣暑熱秋氣清涼冬氣冰冷乃四不正氣冬時嚴寒萬類深藏君子固氣於密則不傷寒觸日月之寒者乃傷寒耳春陽之分熱病歸之有八節邪氣所中於人陽邪為病傳手經陰邪為病傳足經其邪自何而入自風池而入為脊骨兩旁一寸五分是十二經之俞穴春夏應陽秋冬應陰至真要大論云寒暑溫涼盛衰之用其在四維故陽之動始於溫盛於暑陰之動始於涼盛於寒春夏秋冬各差其分易云水流濕火就燥熱論云夫熱病者皆傷寒之類也人之傷於寒則為病熱熱雖甚不死太陰陽明論云陽受風氣陰受濕氣注云同氣相求耳又曰傷於風者上先受之傷於濕者下先受之注云陽氣炎上故受風陰氣潤下故受濕蓋同氣相合也故風熱火為陽寒濕燥為陰故熱論云五臟俱有熱病肝熱病左頰先赤心熱病顏先赤脾熱病鼻先赤肺熱病右頰先赤腎熱病腮先赤甲乙經熱論有春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫乃非時之邪氣是以辛苦之人一歲之中病無少長始自一日巨陽膀胱受之巨陽者三陽之首故先受之二日陽明胃受之三日少陽膽受之未入其臟可汗之四日太陰脾受之五日少陰腎受之六日厥陰肝受之其入臟可泄之經云其未滿三日汗之而已其滿三日泄之而已故聖人論汗下大概言之以脈分別三日脈沉伏亦當下六七日脈浮滑亦可汗故傷寒傳足經不傳手經未詳耳且人身有十二經絡分布上下手足有三陰三陽稟天地之氣天樞之上同天之陽天樞之下同地之陰至真要大論云身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之注云當陰之分冷病歸之當足太陰熱病有手足少陰熱病有足厥陰熱病熱論其三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣未嘗只傳足經不傳手經治傷寒須辨陰陽人身手足各有三陰三陽合為十二經在手背者為陽屬表為腑在手掌心者為陰屬裡為臟足經仿此傷寒只傳足經不傳手經素問熱論中亦只說足陰陽也足太陽膀胱經少陰腎經並屬水足陽明胃經太陰脾經並屬土足少陽膽經厥陰肝經並屬木傷寒傳變陽經先受病故次第傳入陰經以陽主生故太陽水傳陽明土土傳少陽膽為微邪陰主殺故少陽木傳太陰土土傳少陰水水傳厥陰木至六七日當傳厥陰肝木故移氣克脾再受賊邪則五臟六腑皆困而危殆營衛不通耳聾囊縮不知人將死矣速用承氣湯下之可保五死一生古人云脾熱病則五臟危又云土敗則死至第六七日傳厥陰脈得微緩微浮為有脾胃脈也故知脾氣全不受克邪無所容否極泰來營衛將復水升火降寒熱作而大汗解矣甲乙經云邪生於陽者得之風雨寒暑邪中於陰者得之飲食起處陰陽喜怒又曰賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入腑陰受之則入臟入六腑則身熱不得臥為喘呼入五臟則䐜滿閉塞下為飧泄久為腸癖大抵發於陽則太陽也發於陰則少陰也此二經為表裡其受病最多陽明太陰受病頗稀少陽厥陰肝膽之經又加少焉凡病一日至十三日太陽證不罷但治太陽有初得病便見少陰直攻少陰此最變活法也寒邪或首尾只在一經又云六氣之邪乘虛之經自背得之則入太陽或入少陰自面感之則入陽明之類不必皆始於太陽次第傳於諸經或寒邪首尾只在一經不可以一理推但據脈與外證驗之假令病人脈浮緊頭項強痛發熱惡寒已至過經每日如此只是太陽受病更不傳諸經余皆仿此大凡陽病當投酸苦之藥微則用苦甚則兼用之陰病當投辛甘之藥微則用辛甘甚則專用辛古人云辛甘發散為陽酸苦湧泄為陰辛甘者桂枝甘草乾薑附子之類謂能復其陽氣也酸苦參大青葶藶苦酒之類謂能復其陰氣也太陽傷寒一日二日發熱惡寒頭疼腰脊強尺寸脈俱浮病在太陽經也陽明傷寒二三日身熱目疼鼻乾不得臥尺寸脈俱長病在陽明經也少陽傷寒三四日胸脅痛而耳聾或口苦舌乾或往來寒熱而嘔尺寸脈俱弦病在少陽經也太陰病傷寒四五日腹滿咽乾手足自溫或自利不渴或腹痛尺寸脈俱沉細病在太陰經也少陰傷寒五六日口燥舌乾而惡寒尺寸脈俱沉病在少陰經也厥陰傷寒六七日煩滿囊縮尺寸脈俱微緩病在厥陰經也經言傷寒形寒傷皮毛寒傷血寒傷營衛寒主閉藏而腠理祕密陽氣怫鬱不能通暢怫然內作故身熱燥而無汗故經曰人之傷於寒也則為熱病夫熱病皆傷寒之類也內經既直言熱病者言一身為之熱氣也以至仲景直言傷寒者言外傷之寒邪以至風寒暑濕之所傷主療不同故只言傷寒而不通言熱病也其寒邪為害至大故一切內外所傷俱為受寒而熱病者亦通謂之傷寒也一名大病者皆以為害之大也又春曰溫病夏曰熱病秋曰濕病冬曰傷寒傷寒者是隨四時天氣春溫夏熱秋濕冬寒為名以明四時病之微甚及主療消息稍有不等大概言之則一也非為外傷及內病有此異耳或云冬伏寒邪於肌膚骨肉之間至於春變為溫病夏變為熱病秋變為濕病冬變為正傷寒病及日月受寒而內生怫熱熱微而不即病者以至將來陽熱變動或又感之而成熱病非謂伏其寒氣而反變寒為熱也經曰冬傷於寒春必溫病亦其義也亦有一時日月寒而便為熱病者感四時不正乖戾之氣或隨氣運興衰變動或內外諸邪所傷或他人傳染皆能成之但以分門隨證治之耳經言此六經傳受乃外傷於寒而為熱病之大略主療之活法也又云辨傷寒陰陽之異證者是以邪熱在表腑病為陽邪熱在裡臟病為陰也俗乃妄言有寒熱陰陽之異證者誤之久矣且素問傷寒云熱病誠非寒也其三篇名曰熱論篇刺熱篇評熱病篇及各篇明言為熱竟無寒理兼素問及靈樞諸篇運氣造化之理推之則明為熱病誠非寒也寒病固有矣非汗病之謂也且造化為汗液之氣者乃陽熱之氣所為非陰寒之所能也以觀萬物熱極而出液明可知矣經曰熱病者皆傷寒之類也又曰人之傷於寒也則為熱病然既身內有陰寒者止為雜病終莫能為汗病也況病法曰身熱在表飲水為熱在裡此傷寒汗病本末身涼不渴小便不黃脈不數者未之有也雖仲景用四逆姜附之類熱藥是以治其本里和誤以寒藥下之太早表熱未入里而寒下利不止及或表熱裡寒而自利者急以四逆湯攻裡利止里和急以解於表也故仲景四逆湯證後復有承氣下熱之說也由是觀之傷寒汗病經直言熱病而不言其有寒凝也經言三陰證者為邪熱在臟在裡以臟與里為陰也宜不熱者也夫傷寒陰陽之別者非但表熱當汗而下之則死裡熱當下而汗之亦死故仲景曰桂枝下咽陽盛則斃承氣入胃陰實即亡死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺短者懵然不知病為治乃誤使病者殞歿然則止為邪熱在表則汗之邪熱在裡則下之邪熱在上則吐之邪熱在下則泄之邪熱在半表裡則和解之豈分寒熱陰陽之虛實與陰陽汗病之證耶況朱奉議自言陰毒脈疾七至八至以上疾不可數者陰毒已深也夫既云七至八至以上疾不可數者正是陽熱極深之脈也豈是陰寒歟凡世俗所謂諸毒證以素問造化驗之皆陽熱亢極之證但蓄熱極深在內而身表有似陰寒也經云亢則害承乃制言五行之道熱甚過極則反似克其己者是為兼化如萬物熱極反出水液以火鍊金熱極而反似水是以火極而似水之化也五行皆然故肝熱甚則出淚心熱甚則出汗脾熱甚則多涎肺熱甚則出涕腎熱甚則出唾今傷寒作汗之病氣者乃陽熱怫鬱而否極復泰即熱氣蒸蒸而為汗出也如天時晹熱亢旱否極而泰則復為雨也故欲雨則天乃鬱熱晴霽則天反涼人涼則病愈熱在則病在故病寒者自是寒病非此汗病之氣也雖寒屬陰水而天地陰陽氣液相生之道則寒之化不能更生陰水也故古聖曰陽中生陰陰中生陽氣中生液液中生氣又曰積液生氣積氣生液又經曰氣和而生精液然氣為陽物故萬物之水液皆生於陽熱之氣如天氣陽熱極甚則萬物濕潤而冬寒則萬物乾燥由是言之既為作汗之病氣本熱非寒明矣故經又曰凡傷寒而成溫病者先夏至為溫病後夏至為暑病暑與汗皆出正言邪熱隨汗皆出盡而愈也又經曰飲食飽甚汗出於胃驚而奪精汗出於心負重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾此皆動亂勞苦而致陽熱以為汗出豈可反言作汗之病以為陰寒耶今之俗醫不明陰陽變化之道而妄取陽主於生陰主於死而欲養於陽熱者殊不知此言自生之後以顯為陽陽中生陰故生者死之道也既死之後以隱為陰陰中生陽故死者生之道也此古人之論道乃死生有無動靜隱顯之陰陽非言寒熱之陰陽也俗人妄言仙經云純陽升而為仙純陰死而為鬼陰以養陽氣恐亦不如此以陽主虛無而言神為陽陰主形體而言形為陰言善養生者調順陰陽煉就陽神超升棄其陰體即純陽之神乃為仙也不明道者寒熱不調以致陰陽勝負耗絶陽神惟存陰殼則遊神冥冥非鬼何哉此則修養家言形神之陰陽而非醫之陰陽也俗又妄謂周易以陽為尊為美為善為剛為清為正而陰邪反之但欲養於陽熱者此又不知易象言陰陽體用之道以為教非言一身之寒熱陰陽也故陽健唱命而陰順和之陰順和之則陰陽和平而同歸善道非以乾陽特為熱也且夫子云乾為天為圜為君為父為玉為金為寒為冰然則乾之純陽豈為熱耶此亦非特取寒冰為陽是取冰之徑健整肅清剛為乾健之象耳夫寒熱之卦坎為中男乃少陽之卦即寒冰也離為中女乃少陰之卦即火熱也坎離水火為夫婦而易以陽剛坎水寒者為夫而以陰柔離火熱者為婦亦非以熱為陽剛而寒為陰柔也故易言陰陽者但以明其物象而非素問論病寒熱陰陽之氣也設云乾為寒者本非取乾陽之徑栗清整像乾之道也俗有妄言人生則身溫而死則身冷及病雖身熱未至於死將死者必熱反變寒而後死也陽則生陰則死以此專欲養於陽熱殊不知一身之內寒水燥濕風火六氣渾為一兩停則和平一興一衰病以生也夫和平之常者溫涼得所適當其和陽之氣如俗云人體溫和是也然冬寒而人腠理閟密則身當溫和夏熱則腠理開通而多汗出則身當微涼相反者病過與不及亦病其中臟腑陰分以為根本則固守陽和之氣但當溫和乃為和平唯臟腑之氣各隨五行休囚旺相死之時位而微有虛實不一也此之虛實乃自然之道而不為病者然冬腎水陰旺而復以天氣寒則腠理閟密而氣收藏陽固守於內則適當其平而以能內外之寒夏心火陽旺而熱復以天氣熱則膚腠開泄而陽熱散越於外適當其平而以能內外之熱萬物皆然此陰陽否泰天道造化之理蓋莫大乎此也然雖秋冬否閉此以其肺腎陰旺而得其所故康強省病而病亦輕微春夏開泰以其肝心陽旺故怯弱多病而病熱怫鬱則陽氣越故病甚而多死亡及夫地理方位高下四時寒熱溫涼安危壽夭並同故經曰陰精所奉人多壽陽精所奉人多夭又仙經西山記言平人四時當有唏謂三焦相火無不足八節不得吹謂腎臟陰難得實然則豈可不明陰陽虛實但欲養於陽熱耶凡病致死者陽和氣既不存則止為陰濕形體而已非冷何哉俗未知熱甚則熱蓄於內而陽氣不能營運於四肢身表故四肢逆冷以至身冷脈細而絶則死蓄熱甚者氣血不通而身面俱青此則蓄熱之深也所以仲景言傷寒熱極失下則厥厥深者熱亦深而厥微者熱亦微如此則熱極而死者莫不身冷脈微而以至於絶也俗未明其然直反曰陽在則生陽去則死又曰陽熱變為寒則死因以但欲養其陽熱而反致殘陰暴絶則陽氣後竭而死者不為少也俗醫未深明造化又以妄為傷寒得之勢惡陽勢暴甚而便蓄熱以深身冷厥逆手足無復溫和者真以為寒極而為陰厥以對陽厥及表裡熱勢俱甚而不蓄熱於內者以為陽毒以配陰毒分為寒熱陰陽之異證曾不知傷寒汗病便是熱病實無陰厥者也嗚呼病本熱甚熱蘊表裡則陽氣陷下以至厥身冷或青而脈微乃妄以寒極而內外急救其陽而反招其暴虛之陽因以妄言必死之證間或強實之人素本不衰及熱鬱怫結向衰微者偶中辛甘熱藥發散而腠理氣通怫熱以隨汗泄而愈者遂以為必死之病而救之以活反恨往之死者救助其陽之不及因以互相議論但見蓄熱內結厥逆者或未厥者早以溫之無用寒涼恐成陰毒陰證而死俗醫治傷寒誤人多者無過於此後學之士但以素問運氣自然造化之理原其標本則明可見焉且以依法救人慎勿惑於衆人之言故經曰謹熟陰陽無與衆謀又曰知逆與從正行無問此其道也又云傷寒傳染論夫傷寒傳染之由者因聞大汗穢毒以致神狂氣亂邪熱暴甚於內作發於外而為病也則如西山記曰近穢氣而傷真氣錢仲陽曰步履糞穢之履無使近於嬰兒若聞其氣則令兒急驚風搐也孫真人云乘馬遠行至暮當沐浴更衣然後方可近於嬰兒使不聞馬汗氣毒不然則多為天吊急驚風搐也故剝死馬者感其毒氣而成馬氣丁黃之疾皆由聞其毒氣之所作也故聖惠方法大汗則懸藥於戶闢其大汗穢毒無使傷於人也世以艾炙席隅者皆其義也多染親屬憂戚侍奉之人勞役者由其神氣怯弱易為變亂故也何以知傳染者脈不浮者是也若誤以熱藥解表不惟不解其病反甚而危殆矣其治之法自汗宜以蒼朮白虎湯無汗宜滑石涼膈散熱散而愈其不解者適其表裡微甚隨證治之而與傷寒之法皆無異也大凡治病必先明此寒暑燥濕風火六氣最為惡也故曰其治病之法以寒治熱以熱治寒以清治溫以濕治燥乃正治之法也又云逆治所謂藥氣逆病之氣也其病輕微則當如此治其病重當從反治之法其反治者亦名從治所從順於病之氣也是故經曰以熱治熱以寒治寒然以熱治熱非謂病氣熱甚更以熱性之藥治之本是寒性之藥反熱佐而服之所謂病氣熱甚藥氣反寒病熱極而懼其藥寒寒攻不入寒熱交爭則其病加也故用寒藥反熱佐而服之令藥氣與病不相違忤其藥性寒熱服下咽之後熱體既消寒性乃發由是病氣隨愈其餘皆仿此然正治之法猶君刑臣過逆其臣性而刑之矣故熱病不甚治之以寒逆其病氣病自除矣反治之法猶臣諫君非順其君性而怡悅之其始則從其終則逆可以諫君去其邪而歸於正也素問至真要大論云寒者熱之熱者寒之從者逆之順者從之王冰注云病微猶人挾火得草而焫得木而燔可以水滅之故逆其性氣而折之病氣微而攻之以寒病甚猶救龍火得濕而焰遇水而燔不知其性以水折之以濕攻之適足以光焰詣天物窮方止矣識其性者反常之理以人火逐則焰灼自消炎光撲滅然逆之謂以寒攻熱以熱攻寒從之謂熱難入從其性用不必皆同是以下又曰逆者正治從者反治從少從多觀其是也若夫實實虛虛以寒攻寒以熱攻熱則於逆從之道畔矣臟腑經絡先後病脈證問曰上工治未病可也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾旺不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不可用之經曰虛虛實實補不足損有餘是其義也餘臟准此夫人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元真通暢人能和客氣邪風中人多死千般疾難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷以此推之病由都盡若人能養慎不令邪風乾忤經絡適中經絡未流傳臟腑即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭之服食節其冷熱苦酸甘辛不遣形體有衰病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之紋理也問曰病人有氣色見於面部願聞其說師曰鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒色赤為風色黃者便難色鮮明者有留飲師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不微者心膈間病語聲啾啾然細而長者頭中病又云息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫又云吸而微數其吸在中焦實也當下之即愈虛不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治又云寸口脈動者因其旺時而動假令肝主青色四時各隨其色肝色青而反色白非其時色脈皆當病問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至也以得甲子天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也又云病人脈浮者在前其病在表浮者在後其病在裡腰疼背強不能行必短氣而極也問曰經云厥陽獨行何謂也師曰此謂有陽無陰故稱厥陽問曰寸脈沉大而滑沉則為實滑則為氣實氣相搏血氣入臟即死入腑即愈此為猝厥何謂也師曰唇青身冷氣入臟即死如身和汗自出為入腑即愈問曰脈脫入臟即死入腑即愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳上氣喘噦咽腸鳴脹滿心痛拘急五臟病各有十八合為九十病人有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中里谷飪之邪從口入者宿食也五邪中人各有法度中風於前寒於中暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經熱極傷絡問曰病有急當救里救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救里後身體疼痛清便自調者急當救表也夫病痼疾加以猝病當先治其猝病後乃治其痼病也師曰五臟病各有得者愈五臟病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也夫諸病在臟欲攻之當隨其所得而攻之如渴者與豬苓湯余皆仿此歌曰傷寒無汗惡寒攻緊澀浮兮慘有容自汗惡風浮緩脈面光不慘是傷風又論云傷風脈浮而緩自汗惡風頭疼面光發熱躁煩手足不寒熱甚不得謂傷寒耳風傷衛氣表虛自汗法當解肌桂枝湯敗毒散獨活散人參羌活散可選用之若項背強桂枝加葛根湯里傷不飲水者桂枝去芍藥加附子湯或加乾薑臟腑滑者和解散若鼻塞通關散或發汗漏不止而惡風四肢拘急桂枝加附子湯壯熱煩躁人參羌活散參蘇飲或天麻防風丸薄荷泡湯調下脈濡緊自汗勿用桂枝湯當用小建中湯傷寒脈浮而緊無汗惡寒頭疼面慘發熱拘急手足微寒寒勝於熱耳寒傷營氣表實無汗法當發汗麻黃湯麻黃葛根湯人參順氣散可選用之頭疼甚者蔥白湯或熱多寒少脈弱無陽只用桂枝二越脾一湯或喘急者可與麻黃湯尺脈遲而血少者黃耆建中湯淋家衄家瘡家虛家四動氣不可汗可與小柴胡湯太陽脈浮有汗為傷風脈緊無汗為傷寒陽明善飢為傷風不食為傷寒少陽耳聾目赤胸煩滿為傷風口苦咽乾目眩為傷寒三陰傷風但四肢煩疼傷風見寒傷寒見風脈證熱盛而煩手足傷風生寒脈緊浮全不煩少熱肢微厥寒證兼風脈浮緩然傷風見寒脈傷寒見風脈為營衛俱受邪用大青龍湯然大青龍不可輕用須是風寒俱甚又加煩躁證方可與之知易簡者謂二證交攻則桂枝麻黃湯兼用尤為穩當二陽合病太陽合病脈浮長若是浮弦合少陽膽合胃時弦下短更將外證互推詳太陽陽明本太陽病若汗若利小便無津液胃中燥轉屬陽明故大便堅小便利是為脾約脾約丸麻子仁丸主之若惡寒則用升麻葛根湯不惡寒反惡熱大便不祕可少與白虎湯不惡寒反惡熱大便祕或譫語調胃承氣湯下之喘而胸滿者不可不用麻黃湯太陽少陽頸項強急腹不硬滿目眩往來寒熱諸證並小柴胡湯少陽陽明本少陽病因發汗利小便後胃中燥大便難用調胃承氣湯正陽陽明本經風盛氣實也大柴胡湯大小承氣湯主之又三陽合病腹滿身重面垢譫語遺尿口中不仁用白虎湯或舌乾口燥不仁背惡寒者通用太陽陽明少陽陽明正陽無表證者俱可不惟惡寒中寒為太陽陽明合病未過經亦屬表可發汗用桂枝麻黃各半湯蓋在經則汗過經則否也太陽陽明並病歌曰太陽已汗病陽明不惡寒兮里未寧全入陽明煩下劑汗之猶在太陽明並病乃太陽初病發汗而未徹轉屬陽明續遂自汗出不惡寒是並歸陽明也若太陽證尚在桂枝麻黃各半湯若太陽證已退但有陽明者大承氣湯下之春溫夏熱歌曰春溫浮緊易經安發熱頭疼咳嗽干夏月傷寒為熱病脈來洪盛療應難溫病發於春間及夏至以前是也發熱咳嗽頭疼身疼口中燥渴脈來浮緊特其病輕而熱多者小柴胡湯熱少者升麻湯解肌湯微熱不渴者小柴胡加桂渴者小柴胡去半夏加人參栝蔞根脈實煩渴大柴胡微利之以其實而大便祕也虛煩用竹葉湯嗽者小柴胡加五味子夏月傷寒是為熱病發熱頭疼肢體疼重或惡熱脈洪盛用藥不可太溫如桂枝麻黃青龍湯之屬須以黃芩升麻佐之熱病三日外脈仍數邪猶在經絡未入臟腑者桂枝石膏湯三月至夏至謂晚發梔子升麻湯風溫濕歌曰風濕熱汗脈多浮喘渴瘛瘲體不收腹滿腳寒頭目疼濕溫譫熱汗頻流風濕尺寸俱浮緊傷於風因而傷熱風與熱搏即發風濕惟其有風則四肢緩縱而不收也其證身熱自汗頭疼喘息發渴昏睡或體重不仁謹勿發汗汗則譫語躁擾目亂無睛張氏又云寸脈浮滑尺脈澀弱亦不可下下之則失溲直視若被火則發黃狀如驚癇皆變逆之證耳病在少陰厥陰二經用葳蕤湯人參敗毒散身灼熱知母乾葛湯甚者栝蔞根湯脈浮身重汗出漢防己湯譫語用防己黃耆湯救之龐氏用葛根龍膽湯證治論用小柴胡湯未醒者柴胡桂枝湯取微汗痰壅金沸草散咳嗽加杏仁細辛五味子濕溫寸濡而弱尺小而急素傷於溫因而中暑溫與熱搏即發濕溫其狀胸滿頭目痛發壯熱若妄言身上汗多兩脛逆冷倦怠惡寒若妄發其汗使人不能言耳聾不知疼處其身青面色變是重暍而醫殺之濕溫病在太陽經用白虎加蒼朮湯更加官桂溫氣勝則一身盡痛發熱身黃小便不利大便反快用除濕湯五苓散臟腑虛大便滑者理中湯加蒼朮白茯苓虛滑甚者朮附湯暑氣勝則壯熱煩躁小便不利大便祕口渴用香薷散治要六合湯腑閉而煩渴者白虎加蒼朮湯風濕歌曰風濕浮兮額汗為腫疼發熱喜重衣身黃熱疼沉而緩中濕用疏小腑稀又論云風濕脈浮先傷濕而後傷風故也外證肢體重痛不能轉側額上微汗怯寒而不欲去衣大便難小便利熱至日晡而劇治法但微解肌若發正汗則風去濕在非徒無益而又害之治法微解肌用麻黃杏仁薏苡甘草湯加白朮防己黃耆湯不嘔不渴脈虛浮而澀者桂枝附子湯濕多身痛小便不利甘草附子湯煩渴小便不利五苓散外不熱內不渴小便自利朮附湯若昏沉腹滿身重自汗失音下利不禁白通湯多加白朮少用甘草身腫疼微喘惡風杏仁湯通用人參敗毒散熱而煩渴者加栝蔞根若設下之小便必不利可與五苓散中濕脈沉而緩風雨襲虛霜霧乘隙人多為濕所傷也一身盡痛重著發黃關節煩痛發熱鼻塞時或脹滿大便利小便難外證耳濕家不可汗汗之則發痓熱而痓者死亦不可下下之則額汗胸滿微喘而噦小便不利全濟亦難經云治濕之法不利小便非其治也中濕小便不利大便自利甘草附子湯五苓散或除濕湯加茯苓主之大小便皆利則與朮附湯身體痛鼻塞黃耆建中湯小建中湯寒濕交攻疼痛重著易簡滲濕湯甚者參料理中湯加熟附子風寒濕三氣合而為痹其何以為治曰寒多則為疼痛當用官桂乾薑附子風多則為走注當用麻黃薏苡烏頭中氣則為堅滿紫蘇陳皮枳殼所不可闕中濕則為重著能以茯苓蒼朮乾薑主之應手而愈溫毒中暑歌曰溫毒春間斑發蒼嘔而咳悶透心傷背寒面垢虛來脈自汗焦煩是暑傷溫毒者冬間感受寒毒乖氣至春而發也表證未退毒氣不散所以發斑肌肉絞疼心下煩悶嘔逆咳嗽後必下利寸脈洪數尺脈實大其為病重蓋陽氣盛耳治法通用玄參升麻湯黑膏六一散或用敗毒散加紫草咳悶而嘔清水實者葛根橘皮湯隨證論治黃連橘皮湯中暑脈虛弱或沉伏身熱背寒面垢自汗躁煩毛聳惡寒昏昏倦怠而身不痛經云寒則腠理閉暑則腠理開開則灑然寒閉則熱而悶體認不精以傷暑為熱病誤人多矣內外俱熱口燥煩渴四肢微冷而不動白虎湯嘔逆惡寒橘皮湯熱悶不惡寒竹葉石膏湯頭疼噁心煩躁心下不快五苓散消暑丸霍亂吐瀉香薷散溫服信效方中暑用小柴胡湯脈沉遲腠理開灑然毛聳口前開而板齒燥用白虎加人參湯傷暑發大熱頭疼自汗咽疼煩躁腹中熱結諸藥不效者小柴胡湯最良小便不利五苓散熱病中暑濕溫雖皆因暑所致然後脈證不同當明辨之熱病者冬間感寒至盛暑而後發此即夏月傷寒但熱多而脈洪盛者是也中暑者病在太陽外證與熱病相似但熱病脈盛肢節重痛中暑脈虛肢節不疼兼面垢背寒而手足微冷者是也濕溫相搏致之病在太陽其脈寸濡而弱尺小而急外證胸滿頭目痛身熱汗多而足脛逆冷是也以上三證夏月病多有之須別其名庶無毫釐千里之謬凡夏月傷暑雖則熱毒為害皆因脾胃虛怯而得之胃虛然後伏暑然後煩躁其有飲水過多及用解暑冷藥太過動傷其中真氣內虧其吐不食自利不渴六脈沉微按之隱隱是為裡寒外熱如陰盛格陽之類不可更泥中暑伏熱之說急以理中湯甘草乾薑湯與之縱或微煩小便不利斷不可以為熱也又有冷藥過度胃寒停水潮熱而嘔或身有煩熱此為陽浮外而不內可與小半夏加茯苓湯或加前胡脾胃素弱者二陳湯主之雖然抑猶有解也夏月病多傷暑暑家脈虛面慘冷汗手足微寒苟不揣其理熱之證妄以剛劑投之是猶抱薪救火不發黃則發斑甚至蓄血悶亂而死矣可不溯源窮流而精審之哉假如夏月泄瀉不止胃脘閉隔飲食不進或心腹痛滿大抵因暑得之泄瀉中滿者香薷散加縮砂下消暑丸心腹刺痛者香薷散加縮砂下蘇合丸俱得其便假如夏月下痢或白煩渴嘔逆腹中覺痛小便不利是亦因暑致之可與五苓散香薷散小柴胡湯黃龍丸之屬若以此嘔證為脾胃寒嘔則誤矣痓病溫瘧疫癘歌曰痓甚風癇強體肢柔剛二證必須推後寒先熱名溫瘧疫癘之邪責四時痓者先傷於風又感寒溫所致發熱腹疼口噤頭搖癡呆不語項強背直腰身反張或目痛或目赤或閉目或足冷或足溫或妄行其脈沉弦而遲亦或帶緊此為惡候不救者多若脈如雨濺散出於指外者旦暮殂也傷風頭疼發熱常出微汗又自嘔逆汗之必發痓新産血虛汗出傷風亦致發痓大發濕家汗亦作痓者死痓初發多有腹疼之證內經曰戴眼反折瘛瘲汗出如珠著身不流太陽絶也其謂是乎發熱無汗惡寒譫語為剛痓用葛根湯麻黃葛根湯發熱有汗惡寒為柔痓用桂枝加葛根湯桂枝加栝蔞根湯二痓通用小續命湯陽痓去附子陰痓去麻黃剛痓腹滿納藥咬齒腳攣臥不著席大承氣湯下之柔痓桂心白朮湯附子防風散八物白朮散其脈尺寸俱盛先熱後寒汗吐下後重感於寒而得之寒多者其脈弦遲熱多者其脈弦數寒熱乃陰陽之爭也先熱後寒先寒後熱或寒熱相等並小柴胡湯先寒後熱小柴胡湯加桂枝多熱而燥少與白虎加桂湯多寒者柴胡桂薑湯或致中湯加桂或寒少熱多或多痰而嘔食不入二陳湯加烏梅小便赤澀汗出煩渴素有瘴氣不服水土而嘔五苓散大便祕嘔吐寒熱無時脈小緊者大柴胡下之痰證傷寒類傷寒有痰頭項皆和暢外熱憎寒寸浮上頭疼右手脈數身不疼左手脈平傷寒狀痰證寸口脈浮發熱憎寒惡風自汗胸滿氣上衝咽不能喘息頭不疼項不強為異耳有熱用柴胡半夏湯金沸草散易簡參蘇飲無熱二陳湯溫膽湯伸缺頭疼者胸滿發熱亦是痰證痰脈緊而不大瓜蒂散吐之不可謂痰證例無頭疼而以他證參之也傷食右手關脈緊盛而數頭疼發熱惡風但身體不疼中脘痞悶緩噫噎食臭為異耳熱邪伏於脾胃則食不能消經云人迎緊盛傷於寒氣口緊盛傷於食人迎主外風寒入之氣口主中飲食傷之是以有右左手之別中脘痞悶嘔而熱者二陳湯加生薑烏梅寒多不甚熱者治中湯五積散心腹滿痛者大柴胡下之胸膈實而嘔吐者食在上脘瓜蒂散吐之夾食傷寒證候按病源云下後六七日不大便煩熱腹滿而痛為胃中有干糞亦夾宿食故也審如是則夾食傷寒即太陰證腹滿時痛桂枝湯加大黃者是也所以太陰受病主胸膈脹嘔吐飧瀉朱氏以為飲食得之如曰太陰證飲食不節胸膈不快用理中湯加青皮陳皮或枳實理中丸或二陳湯皆其治之今推明治法有表者用致中湯去白朮多用青皮有表復有里者用桂枝加大黃湯若表證已解但有里證者小承氣湯與之可也張氏云傷食者銼大黃三五粒入湯劑中正此意耳雖然夾食傷寒則脾胃已傷暴加轉下不可也妄發其汗亦不可也夾食傷寒見吐利厥逆而不挾表證者依陰證及霍亂等治之若吐利厥逆而挾表證者即依先救表之法虛煩腳氣傷寒虛煩身首全無痛脈自和平多熱壅轉筋惡食大便難腳氣痠疼而弱腫虛煩諸虛煩熱也不惡寒身不痛頭不疼脈不浮不緊數為異耳重者竹葉湯輕者小柴胡湯嘔者橘皮湯並不可下陰證虛煩外熱內寒肢節疼陽旦湯腳氣初病發熱憎寒頭痛嘔噦惡聞食臭肢節痠痛大便難或胸滿腹痛猝起而腳轉筋屈弱攣痛腫重痹頑為異耳腳氣通用三和散降氣湯大流氣飲烏藥順氣散分氣紫蘇飲木瓜散石南丸枳殼散用木瓜煎湯調下毒氣入腹衝心作痛吐逆者降氣湯下養正丸或用吳茱萸制炒煎熱入生薑汁主之寒多者越婢湯小續命湯加獨活濕多者除濕湯五苓散痰多者除濕湯湯下白丸子挾寒者養正丹躁煩者竹瀝湯或紫雪散大便祕者脾約丸神功丸麻仁丸或五積散加大黃風毒腫疼排風湯檳榔散筋急掣痛木香煎湯調乳香趁痛散又發香蘇散三錢川楝子兩個取皮肉銼新瓦上焙降真香碎三節和之新汲水煎空心熱服腳氣證候與傷寒無異或發熱頭疼或身體冷痛或寒熱往來或自汗惡風或大小便祕或腹痛下利胸滿氣短怔忪煩悶嘔噦涎沫惡聞食臭大類傷寒但猝起腿腳屈弱頑痹肢節攣急痠疼或歷節及髀脛間頑然赤腫為異耳傷寒傳足六經在太陽則頭痛項強腰背痠重在陽明則口燥鼻乾惡熱譫語在少陽則耳聾口苦脅疼在太陰則胸腹滿痞肢體浮腫在少陰則咳喘面黧咽痛在厥陰則癱緩筋攣陰器脹痛六經所傳又有合病並病腳氣外證與傷寒並同凡遇發熱躁煩大便不通嘔噦痰涎而惡食者起於熱熱則下而愈須審問之脈浮而弦者起於風則汗而愈濡而弱者起於濕濕則滲而愈洪而數者起於熱熱則下而愈遲而澀者起於寒寒則溫而愈風寒暑濕證狀不同然風為走注寒為疼痛暑為熱煩濕為重著必有可驗之證治法總貴乎疏導但不可過劑其補湯淋洗則醫家之大戒也雖然腳氣漸入頓深非藥力相接不可也治之亦當究其源或因風寒發動則為之解風寒或因飲食釀成則為之消飲食氣觸而發者則與之調氣續生於他病者則以他病方藥理之所患氣實而死未有服藥致虛而殂者甚至喘嗽上衝心痛嘔吐腹脅脹滿頑痹不仁最為惡候然所謂寒則溫之熱則寒之在表則散之在裡則下之太虛者扶養之是為不刊之法傷寒傳經之邪病至厥陰其脈微帶浮緩之狀是則脾氣將復邪無所容寒熱作而得汗以解若尺寸俱沉短此為毒氣入臟土敗木賊脾受汗邪必有囊縮舌卷耳聾不知人之證當急下之五救其一傷寒表證當汗而不可下里證當下而不可汗在半表半裡當和解不可發汗吐下在上則通之在下則泄之傷寒無汗表病里和則麻黃湯汗之或天水散之類亦佳表不解半入於裡半尚在表者小柴胡湯和解之或天水涼膈散甚良表裡熱勢俱甚大柴胡湯微下之更甚者大承氣湯表熱多裡熱少者天水一涼膈半和解之裡熱少未可下者涼膈天水各一半調之勢更甚者小承氣湯下之表證解但有里證者大承氣湯下之凡此諸可下者通宜三承氣湯下之發汗不解別無異證者通宜涼膈散調之以退其熱兩感證則仿此而已傷風自汗表病里和者桂枝湯解肌半在表半在裡白虎湯和解之病在裡者大承氣湯下之一法無問風寒暑濕有汗無汗內外諸邪所傷但有可下者或表裡兩證俱不見而目深但睛不了了睛不和者或腹脹滿實痛者或煩或譫語妄言或狂躁喘滿者或出熱極而將死者通宜大承氣湯下之或三一承氣湯尤良傷寒大發汗汗出不解反無汗脈尚浮者蒼朮白虎湯和解之或中暑自汗脈虛頭痛口乾倦怠煩躁或時惡寒或畏日氣無問表裡通宜白虎湯裡熱勢甚腹滿而脈沉可下者宜大承氣湯或三一承氣湯傷寒表熱極甚身疼痛不可忍或煩或嘔里有微熱不可發汗吐下擬以小柴胡天水涼膈之類和解恐不能退其熱勢之甚或大下後或再三下後熱勢尚甚不能退本氣虛損而脈不能實擬更下之恐下脫而立死不下亦熱極而死寒涼之藥不能退其熱勢之甚者或因大下後濕熱下利不止熱不退脈弱氣虛不可更下者或諸濕熱內甚小便赤大便溏瀉類並少而急痛者必欲作利也速宜黃連解毒湯或裡熱極甚而陰氣虛不能退者或已下後熱不退者或蓄熱內甚陰厥極深以至陽氣不能營運而已致遍身青冷痛甚不堪項背拘急目赤睛疼昏眩恍惚咽乾或痛躁渴虛汗嘔吐下利腹滿實痛甚至痞悶煩亂喘息急聲脈疾而數以其蓄熱極深致脈沉細而欲絶或始得病陽熱勢暴而便有此證者或兩感勢甚者通宜解毒湯加大承氣湯下之熱不退者再下之然雖古人有云三下熱不退者死然亦有下四五次利數十行而熱退救活者久下利熱稍退而未愈者亦用黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以致身冷脈微而昏冒將死者若急下之則陰暴絶陽氣復竭而立死不下亦死當以涼膈散或黃連解毒湯養陰退陽使熱氣漸以消散則心胸腹暖脈漸以生俟脈復有力然後以三承氣湯選用或下後微熱不解者涼膈散調之愈後但宜用退熱之藥忌發熱諸物以熱易於再作也六經傳變太陰少陰厥陰皆屬陰證也少陰者腎也厥陰者肝也太陰者脾也脾何以謂之太陰太陰者脾之經主胸膈䐜脹腎何以謂之少陰少陰者腎之經主脈微細心煩但欲寐或自利而渴又寒入於太陰則發熱而惡寒入於少陰則只惡寒而不發熱也三陰中微寒則理中湯或稍厥或下利乾薑甘草湯重者四逆渴無脈者通脈四逆湯厥陰者肝之經也厥陰之為病主消渴氣上衝心中痛飢不欲食食則吐蛔下之利不止若陰氣獨盛陽氣暴絶則為陰毒其證四肢逆冷腹臍築痛身如被杖脈沉疾或吐或利當急灸臍下內服辛熱之藥令陽復而大汗解矣人之傷寒則為熱病古人通謂之傷寒病前三日巨陽陽明少陽受之熱在於表汗之則愈後三日太陰少陰厥陰受之熱傳於裡下之則愈六經傳受由淺入深皆是熱證非有陰寒之證古聖訓陰陽為表裡惟仲景深得其意厥後朱氏編活人書全失仲景本意將陰陽二字釋作寒熱此差毫釐失之千里矣傷寒則別語無倫者曰譫語實則囈語也外證大便祕小便赤聲重曰鄭聲虛則鄭聲也外證二便利手足冷下泄曰轉失氣大便堅小便利曰脾約得大便曰更衣大便如常曰清便自調或云自可水穀不化曰下利清穀下利曰飧泄痔曰腸癖腸癖謂痔也素問曰飲食自倍腸胃乃傷活人書云此太陰受病下為飧泄久為腸癖病十二日曰過經長蟲曰蛔即白蟲也陰病發躁曰陰躁手足逆冷曰厥有陰厥陽厥二證手足指頭微冷曰清屬三陰肌膚冷或下利而發躁無時暫安曰臟厥不治兩手無脈曰雙伏一手無脈者曰單伏男子病新瘥而婦人與之交曰陽易婦人病新瘥而男子與之交曰陰易燒裩散猳鼠糞湯竹皮湯男子作陰腫小腸絞痛婦人則裡急腰胯連腹內痛其人身體重熱上衝腦頭重不能舉眼中生花四肢拘急小腹絞痛手足攣百節解離經脈見者皆主死一呼一至曰損脈離經太過曰至不及曰損一呼三至曰至脈離經二脈惟陰易陽易病有之發汗吐下後溫針後病不解此為壞病又曰何逆何逆有四種或變為濕瘧或變為風溫或為濕毒或為溫疫也發而汗不止曰漏風漏風亦亡陽之別名也又大下之後損傷陰血亦謂之亡陽又太陽病桂枝證而投麻黃汗出多遂漏不止亦曰亡陽發狂條有因火劫驚狂謂之火邪其人亡陽尺寸脈緊主無汗今反有汗者曰亡陽大抵陰病主無汗今有汗者亦亡陽也三月至夏方發曰晚發冬應寒而反大溫人暴感之而病曰冬溫非時暴寒伏於少陰之經咽痛不利曰腎傷寒發汗後仍灼熱自汗曰風溫系何逆之數也中暑曰中暍感不時之氣而病老幼皆相似者俗謂之天行發濕溫汗日重暍重暍者死溫病汗出輒後復發熱而脈躁疾不為汗衰狂言不能食曰陰陽交交者死也評熱論云發熱脈躁狂言不能食謂之三死發熱脈躁盛不得汗者曰陽極死又若已得汗而脈躁盛者亦主死也大都汗後脈躁盛者皆死也病瘥後更發熱曰遺熱病瘥後勞動再病曰勞復病瘥後食肉再病曰食復脈浮遲或弱不能作汗其身癢者曰無陽目亂無神吐利並作曰霍亂鼻出血曰衄陽病下之早即為結胸為懊憹陰病下之早即為痞按之不痛臍腹堅硬曰大結胸按之而痛為小結胸又有水停結在胸脅間無大熱而額微汗出曰水結胸煩躁多而有結胸證曰熱實結胸無熱而有結胸證曰寒實結胸證似結胸飲食如故時時下利陽脈浮關脈小細沉緊舌上白苔而滑者曰臟結死不治上唇有瘡蟲食其喉或食其臟曰惑下唇有瘡蟲食其肛或食其陰曰狐咳逆曰噦乾嘔曰啘脈相剋賊曰負負者死謂陽明與少陽合病其脈但長大者謂有胃脈為順若脈中有弦即是有木脈也土被木賊故曰負所以死也傷寒有所不利者行之取其滲泄也利小曰滲泄大抵小便數則大便難小便曰溲民病鶩溏大便寒而鴨溏水穀不別也大便堅硬曰硬此有熱而硬也故曰寒則溏熱則垢也腸熱而利謂之腸垢渴欲飲水水入即吐名曰水逆黃病曰疸內經瘧論中謂疸為熱活人書以黃為疸南方暑濕近夏疸熱故病黃也疸與疸同因熱而病黃疸也心振寒而動曰悸厥陰證云厥逆怔忪此有水也宜治水腳氣有小腹不仁而怔忪者少陽嘔而發熱胸脅滿小便不利怔忪者心中若有所失曰懊憹當汗而誤下者為痞為結胸為懊憹應下而汗者為亡陽為譫語為下厥上竭強發少陰汗則動血或出口鼻或出耳目謂之下厥上竭也目中不了了謂不明瞭也或謂之睛不和言不和平如尋常也口中不仁小腹不仁者即所謂皮膚不仁之義皮膚不仁者頑麻而不知有無也身振搖而動曰肉瞤臍下有動氣曰奔豚在上者湧之曰吐在下者泄之曰利左關曰人迎右關曰氣口足趺上動脈曰衝陽內踝骨上陷中動脈曰太溪乳直下筋骨間近腹處曰期門臍下一寸曰氣海千金方指迷方並云一寸五分此謂從其心量下一寸五分也二寸曰丹田三寸曰關元血曰營氣曰衛玄府曰汗孔素問生氣通天論勞汗當風注云玄府即汗孔也手足搐搦曰瘛瘲二陽俱病曰合病先一陽病而後一陽又病曰並病陰陽俱病曰兩感先曰陰陽雙傳四肢病曰末疾大抵有風則四肢不收左傳曰風淫末疾者是也傷寒諸篤證搖頭直視形如煙燻心絶唇吻反青四肢多汗肝絶反目直視狂言遺尿腎絶汗出發潤喘而不休肺絶環口黧黑柔汗發黃脾絶汗出如油喘息無已水漿不下形體不仁命絶大法濕家汗則成痓發濕溫汗身青面變耳聾不語曰重竭不治發風濕汗必譫語不治發少陽汗則譫語發汗只在頭面不至遍身鼻衄不止者逆發汗不至足者逆諸逆發汗劇者言亂目眩並不治當汗無汗服麻黃數劑汗不出者不治汗出如流不治汗出如油口噤肉戰聲低喘促不治汗後嘔吐水藥不入口者逆熱病脈躁盛而不得汗不治汗後不為汗衰復大熱躁疾狂言不食曰陰陽交不治忽冒昧無脈服藥後汗解則生若無汗脈不至者不治少陰厥逆無脈服藥通脈其脈漸續則生暴出則不治下利厥逆無脈灸之脈不回身不溫不治少陰四逆下利惡寒而蜷發躁無脈不治下利日十餘行其脈反實者逆少陽陽明合病下利脈長大而弦曰負不治陽病見陰脈者不治發斑屬陽見陰脈不治代脈不治吐血衄血脈反浮大而牢不治陰易陽易脈離經外腎腫腹中絞痛手足拳攣不治咳逆上氣脈止者不治譫語脈反沉微四肢厥冷不治脈陰陽俱虛熱不止者不治七八日以上發大熱難治舌本爛身熱或汗不止厥不止並不治下利發熱厥逆躁不得眠不治譫語直視或喘滿或下利並不治譫語屬陽見陰證者逆傷寒脈乍疏乍數不治發斑先赤後黯面色黧晦不治發斑大便自利不治發黃而變黑不治舌乾黑不治張目陷不治張口出氣乾嘔骨體熱痛者逆咳逆不止者不治心下痞悶上氣喘粗者逆霍亂喘脹煩躁不治誤下濕家額汗喘促或小便不利大便自利不治頭汗內外關格小便不利此為陽脫不治腹滿咳逆不得小便不治腹大滿而不泄不治若脈洪緊而滑尤可慮臟結如結胸舌上白苔陰筋引臍腹痛時下利不治結胸證具更加煩躁不治臟厥七八日膚冷煩躁下利無時暫安不治少陰吐利厥逆煩躁不治厥而下利反能食者曰除中不治四肢厥逆臍下絞痛石硬睛定者逆厥陰唇青舌卷黑麵耳聾囊縮不治頭連胸痛甚手足俱寒不治陰毒陽毒過六七日不治狐惑咽乾聲啞唇瘡不治赤斑五救其一黑斑十救其一尋衣摸空者逆總括論云傷寒汗下吐之法最不可輕據脈以驗證問證而對脈太陽者陽證之表也陽明者陽證之裡也少陽者三陽三陰之間太陰少陰厥陰又居於里總而謂之陽證也發於陽則太陽為之首發於陰則少陰為之先太陽惡寒而少陰亦惡寒但太陽之脈多浮少陰之脈沉細與其他證狀亦自異也發熱惡寒身體疼痛或自汗或無汗是為表證可汗不惡寒反惡熱手掌心並腋下濈濈而汗出口燥胃干壯熱腹滿小便如常不白而少大便祕結是為里證可下厥冷蜷默自利煩躁而無身熱頭疼是為陰證可溫其脈單浮與浮洪浮數浮緊者此表病之脈滑實弦緊中間數盛者此乃里之脈沉細緩弱者此陰病之脈在表者邪搏於營衛之間在裡者邪入於胃腑之內胃腑而下少陰居焉若傳次三陰則為邪氣入臟矣營與衛均為表也亦均可汗也然自汗者為傷風風傷衛氣衛行脈外其脈浮緩而病尚淺則以桂枝湯助陽而汗之輕無汗者為傷寒寒傷營氣營行脈中其脈浮緊而病稍深則以麻黃湯助陽而汗之營衛固為表也胃腑亦可以為表也然以臟腑而分表裡則在腑者胃之表在臟者胃之裡謂取諸腑可以表言若令營衛臟腑而分之則表者營衛之所行里者胃腑之所主而臟則又深於里者矣審脈問證辨名定經真知其為表邪則汗之真知其為里邪則下之真知其為陰病則溫之表有邪則為陽虛陰盛而發表之藥用溫里有邪則為陰虛陽盛而攻裡之藥用寒陰經受邪則為臟病而溫陰之藥用熱是三者貴乎得中否則寧可不及亦不可太過得中者上也不及者次也夫苟太過則斯為下矣蓋得中者如此而汗如彼而下又如彼而溫桂枝承氣投之不瘥姜附理中發而必中重者用藥緊輕者用藥微不背陰陽深合法度故曰得中者上也寧可不及者證與脈大同而小異名與經似異而實同當五分取汗而三分之劑散之當五分轉下而三分之劑導之當純用溫里而略溫之劑扶持之未可汗下者與之和解未可遽溫者且安其中若猶未也則增減於其間細細而加推詳徐徐而就條理雖未遽安亦無傳變故曰寧可不及者次也太過者粗工不知深淺輕舉妄動者為之或問證而不知脈或執脈而不對證或名實之不辨或日數之拘泥遂有汗下太早之失甚者不問陰陽當汗而反下則為痞為結胸為懊憹當下而反汗則為譫語為亡陽為動經為下厥上竭至於陽厥似陰之證誤以剛劑投之黑斑發狂悶亂可畏性命至貴可輕試哉故曰夫苟太過則斯為下矣大抵治傷寒有法與治他病不同條例得審藥進病除投劑少差死生立異古之人處方立論曰可汗曰可下曰可溫曰和解曰少與曰急下曰隨證參治與夫先溫其里乃發其表先解其表乃攻其里謂知音者若網在綱有條不紊此固得中者之事也若班固所謂病以不服藥為中醫許仁則以為守過七日最為得計此非寧可不及之意乎王叔和善脈而且以承氣為戒虞世南善方而論傷寒一節且謂麻黃桂枝非深於其道則莫之敢為又非所以為太過者之戒乎論而至此則知古人之立論甚嚴而傷寒汗下溫之法固自有定論也經云傷寒六七日目中不了了無表裡證脈雖浮亦有可下者少陰二三日有表證亦有可汗者陰證四逆法當用溫而四逆散中有柴胡枳殼此豈厚誣哉醫在九流之中非圓機之士不足與語也何者脈雖浮而亦可下無表裡證者謂六七日大便難也即使大便不難其敢輕下之乎少陰病亦有發汗者謂陰證初病便屬少陰而反發熱少陰本無熱今反發熱者是表猶未解故用溫藥微取其汗也即使身不發熱其敢輕汗之乎四逆湯用姜附四逆散用枳柴一熱一寒並主厥逆固不侔矣然傳經之邪與陰經受邪初病便厥者不同故四逆散用藥主寒先陽而後陰也四逆湯用藥主熱陽不足而陰有餘也其敢例視陰逆一切溫之乎不特此耳傷寒有始得病其脈沉數外證腹滿口燥煩渴即為陽盛入內之證醫當以下劑攻之不可概以三日太陽而發表也前所為陰證傷寒初病以來便見脈沉厥冷惡寒更無頭痛即是少陰受病之證醫法以乾薑附子輩溫之又不可概以三陰傳次先太陰後少陰也若張氏之論日數而曰日數雖多但有表證而脈浮者猶可發汗日數雖少若有里證而脈沉實者即須下之是日數之不可拘也如此孫思邈云服承氣得利謹勿補中以熱氣得補復盛此所以言實熱也王叔和有曰虛熱不可去熱去則寒起此所以言虛熱也二言之殊途同歸是虛實之不可不辨也如此又況寒溫熱同實而不同名暑濕風異種而有兼病異氣之相乘他邪之並作表證中之有不可汗里證中之有不可下三陰可溫攻有熱證者不同表裡俱見與半表裡者有異中暑熱病疑似難明傷寒中風脈證互見陽明本多汗而有反無汗之別少陰本無汗而有反自汗之證或陰極發燥熱極發厥陽證似陰陰證似陽差之毫釐謬以千里又有痰證食積虛煩腳氣等證似傷寒之病自非心領意會達變知機體認之精發用之審則縱橫泛應幾何而不窮哉孔子曰可與適道未可與立可與立未可與權是說也亦在夫人權之而已矣危氏得效方傷寒撮要論云凡發汗法欲令手足俱周濈濈然一時許為佳不欲淋漓如水服湯中病即已不必盡劑若發汗後病證仍在者三日內可再三汗之令腰腳間周遍為度凡轉下法須體認得合下之證明白在陽明胃經則不拘日數過時失下則氣血不通四肢便厥不識者疑為陰厥復進熱藥禍如反掌若少陰腎經太陰脾經下證悉具服湯後已更衣者不須盡劑陽明病得利瘥慎勿服補中藥以熱氣得補復盛更復下之是重困也宜消息安養之凡取吐法服吐藥後不大吐則當以手指探之便吐矣不吐稍增藥以吐為度若吐少病不除明日再服吐藥可至再三但虛人宜少吐藥力過多者飲水解之凡水漬法以疊布數重新水漬之稍捩去水搭於胸上須臾蒸熱又漬令冷如前用之仍數易新水日數十易熱甚者著病人於水中熱勢退則已亦良法也凡蔥尉法已用蔥一束以絲纏如餅餡大去根惟存白三寸許先以火熁一面令通熱勿至灼人乃以熱處著病人臍下上用尉斗盛火尉之令蔥餅熱氣透入腹中更用三四餅候病人醒手足溫有汗乃止凡蒸法以新火燒地良久可以水灑之取蠶砂柏葉桃葉糠麩皆可用相和鋪燒地上面鋪草席令病人上臥溫覆之夏月熱只用布單覆之汗移時立至俟腳心有汗乃用溫粉撲上移上床最得力者蠶砂柏葉桃葉也無蠶砂亦得
