body:
  text: 卷二十一脾臟門脾臟冷氣腹內虛鳴附論夫脾為中州主腐化水穀裨諸臟腑若脾虛冷氣與正氣相擊則令腹內虛鳴甚則腹痛下利食不能化內經所謂暴氣象雷者以陽氣不足陰氣有餘邪冷之氣伏留在臟流走往來故令腹內虛鳴也方陳橘皮湯治脾臟虛冷邪正氣相擊搏腹內虛鳴兼治陰陽二毒傷寒陳橘皮湯浸去白麩炒桂去粗皮甘草炙銼乾薑炮枳殼去瓤麩炒白朮人參白茯苓去黑皮厚朴去粗皮生薑汁塗炙半夏湯浸七遍去滑麩炒各一兩訶黎勒五枚煨去核檳榔二枚銼草豆蔻二枚去皮附子炮裂去皮臍沉香銼木香各一兩上銼為麻豆每服三錢匕水一盞生薑三片棗三枚擘破煎六分去滓熱服脾瀉氣痛服之神妙傷寒並二服烏頭丸治脾臟冷氣腹內虛鳴四肢多冷心腹疼痛草烏頭去皮尖取末一兩芫花一分醋炒黃別杵為末二味用醋一升熬成稠膏刮出桂去粗皮乾薑炮檳榔銼青橘皮湯浸去白焙肉豆蔻仁天雄炮裂去皮臍當歸切焙烏頭炮裂去皮臍胡椒炒藿香葉紅豆蔻丁香各三錢上除二味熬膏外搗羅為末入前膏和劑如硬更入蜜少許丸梧桐子大每服十五丸生薑湯或米湯橘皮湯下病已即止橘皮煮散出王氏博濟方治脾臟冷氣不和腹內雷鳴膨脹刺痛及解傷寒陳橘皮湯浸去白炒白朮各二兩訶黎勒炮去核乾薑炮枳殼去瓤麩炒桂去粗皮木香人參甘草炙各一兩檳榔五枚銼草豆蔻去皮七枚半夏湯浸二七遍三錢厚朴去粗皮生薑汁炙一兩半上搗為粗散每服三錢匕水一盞入生薑三片棗二枚擘破煎七分去滓食前溫服益智煮散治脾臟冷氣腸鳴相逐飲食無味補虛益智去皮烏藥銼桂去粗皮天仙藤各一兩莎草根炒去毛陳橘皮湯浸去白焙甘草炙各二兩乾薑炮木香芎藭白朮丁香各半兩人參一錢上搗為粗散每服三錢匕水一盞入生薑三片棗二枚擘破煎六分去滓溫服食前桔梗散出聖惠方治脾臟久積冷氣流走腹內虛鳴兩脅脹滿少思飲食桔梗一兩去蘆頭木香一兩丹參一兩去蘆頭白豆蔻三分錢去皮附子三錢炮裂去皮臍高良薑銼木香沉香檳榔各三錢分訶黎勒一兩半用皮陳橘皮半兩湯浸去白瓤微焙上為散每服三錢水一中盞入生薑半分煎六分去滓食前稍熱服訶黎勒丸出聖惠方治脾臟冷氣腹內虛鳴胸膈氣滯不能飲食雖食不消頻嘔逆訶黎勒一兩半煨用皮赤茯苓一兩吳茱萸半兩湯浸七遍焙乾微炒白朮一兩桂心三錢人參一兩去蘆頭桔梗半兩去蘆頭陳橘皮一兩湯浸去白瓤焙紅豆蔻一兩去皮乾薑半兩炮裂銼厚朴一二兩去粗皮塗生薑汁炙令香熟上為末煉蜜和丸梧桐子大每服不計時生薑湯下二十丸厚朴湯治脾臟虛冷腹脹腸鳴㽱痛泄瀉飲食不化厚朴去粗皮生薑汁炙白茯苓去黑皮人參草豆蔻去皮陳橘皮湯浸去白瓤焙各三分錢桂去粗皮半夏湯洗去滑生薑汁製木香炒白朮焙枳殼去瓤麩炒各半兩上搗篩為粗末每服四錢匕水一盞半生薑三片棗一枚擘破同煎至七分去滓食前溫服厚朴丸治脾臟冷氣腹內虛鳴內寒外熱宿食不消大便乍祕乍泄腑臟不調少思飲食厚朴一兩半去粗皮塗生薑汁炙令香熟白朮半兩乾薑半兩炮裂銼桔梗一兩去蘆頭當歸一兩銼微炒檳榔半兩陳橘皮半兩湯浸去白瓤焙甘草半兩炙微赤銼訶黎勒一兩煨用皮白茯苓半兩上為末煉蜜和丸梧桐子大每服食前粥飲下二十丸忌生冷油膩肉豆蔻丸治脾臟虛冷氣攻心腹㽱痛腸鳴肉豆蔻去殼乾薑炮陳橘皮湯洗去白焙半夏湯洗去滑七遍焙桂去粗皮吳茱萸湯浸焙乾炒厚朴去粗皮生薑汁炙烏頭炮裂去皮臍白茯苓去黑皮各半兩上為末棗肉丸梧桐子大食前生薑醋湯下十五丸補脾散治脾臟冷氣腹內虛鳴泄瀉及食氣結塊憎寒壯熱日漸羸瘦木香半兩草豆蔻白麵裹慢火煨令焦去皮並面陳橘皮湯浸去白焙蘹香子炒厚朴去粗皮生薑汁炙乾薑炮荊三稜炮各一兩陳曲炒大麥糵炒各二兩上搗羅為散食前炒生薑鹽湯調下二錢匕赤茯苓散治脾臟冷氣胸膈不利腹內虛鳴少思飲食赤茯苓三錢桔梗三錢去蘆頭白朮三錢吳茱萸一錢湯浸七遍焙乾微炒檳榔半兩木香半兩沉香半兩當歸半兩銼微炒枳實一錢麩炒微黃上為散每服三二錢水一中盞生薑半分棗三枚煎六分去滓食前稍熱服忌生冷油膩白朮丸出聖惠方治脾臟冷氣壅滯脹悶腹內鳴轉不思飲食白朮三兩生薑二兩同搗令爛慢火炒令黃色桂心半兩檳榔二一兩高良薑一兩銼木香半兩人參一兩去蘆頭阿魏一錢分麵裹焙令面熟為度吳茱萸半兩湯浸七遍焙乾微炒陳橘皮三錢分湯浸去白瓤焙上為末煎醋浸蒸餅和丸梧桐子大每服食前生薑橘皮湯嚼下十丸吳茱萸丸出聖惠方治脾臟冷氣積滯醋心嘔逆宿食不消腹臟虛鳴時時疼痛吳茱萸半兩湯浸七遍焙乾微炒神麯一兩炒令微黃陳橘皮二兩湯浸去白瓤焙白朮一兩人參一兩去蘆頭桂心一兩熟乾地黃一兩乾薑半兩炮裂銼訶黎勒一兩煨用皮上為末煉蜜和丸梧桐子大每服食前粥飲下二十丸忌生冷物趁氣丸治脾虛冷氣腹脹滿虛鳴腰腿疼重刺痛胡椒炒一百粒木香三錢檳榔一枚銼蠍稍炒二錢阿魏醋化去砂入藥陳橘皮湯浸去白焙各一兩錢肉豆蔻去殼二枚萊蔔子炒一分兩上為末生薑自然汁煮麵糊丸豌豆大每服二十丸溫酒或陳橘皮湯下不拘時草豆蔻丸治脾胃久冷氣攻心腹腸鳴脹滿痰逆噁心草豆蔻炮去皮乾薑炮桂去粗皮各一兩半訶黎勒煨取皮甘草炙銼白茯苓去黑皮人參各一兩上為末煉蜜丸梧桐子大溫酒下二十丸人參散治脾臟冷氣腹脹虛鳴飲食不化泄瀉不止人參訶黎勒皮各三錢分枳殼去瓤麩炒檳榔銼各四錢兩陳橘皮湯浸去白焙丁香各半兩木香一錢分上為散每服二錢匕用薑米飲調下空心服丁香丸治脾臟冷氣心腹痛脹悶胸膈不利嘔逆腹內虛鳴丁香蘹香子炒桂去粗皮陳橘皮湯浸去白焙甘草炙銼胡椒等分上為末煉蜜丸櫻桃大每服一丸生薑鹽湯嚼下太白湯治脾虛冷腹中雷鳴附子炮裂去皮臍二兩青橘皮湯浸去白焙一兩乾薑炮蘹香子炒木香炮各半兩上㕮咀如麻豆每服三錢匕水一盞入生薑二片棗一枚擘破煎七分去滓溫服不拘時溫脾丸治脾臟冷氣腹內虛鳴高良薑一兩附子炮裂去皮臍乾薑炮胡椒炒各半兩上為末煉蜜丸梧桐子大每服二十丸生薑橘皮或米飲下不拘時脾氣虛腹脹滿附論夫脾受水穀之精化為氣血養於臟腑充於肌膚若其氣不榮則不能與胃行其津液周養身形致體重懈惰四肢不舉腹脅虛脹胸滿咽乾不能嗜食縱食欲嘔水穀不化瀉利腸鳴則是脾氣不足之候也方京三稜鱉甲丸治脾胃久冷心腹脹滿宿食不消時作嘔逆日漸羸瘦兼癖瘕氣塊等疾京三稜炮銼鱉甲去裙襴醋炙黃耆銼焙白朮各一兩半乾薑炮厚朴去粗皮塗生薑汁炙熟二兩訶黎勒皮吳茱萸湯浸焙枳殼去瓤麩炒橘皮湯去白焙乾桔梗炒麥糵炒陳曲乾地黃焙桂去粗皮檳榔銼木香當歸切焙甘草炙銼白茯苓去黑皮人參各一兩上為末煉蜜丸梧桐子大空心米飲下三十丸加至四十丸溫酒下亦得大腹木香湯治脾氣虛弱心腹脹滿嘔吐痰涎胸膈不利腹脅刺痛不思飲食大腹銼木香各一兩前胡去蘆頭肉豆蔻去殼人參白茯苓去黑皮各半兩乾薑炮京三稜炮銼一兩半青橘皮湯浸去白瓤焙半夏湯浸七遍去滑半兩訶黎勒炮去核各半兩厚朴去粗皮生薑汁炙一兩陳橘微炒一兩桂去粗皮大麥糵微炒各半兩上搗篩每服三錢匕水一盞生薑三片棗二枚去核煎七分去滓稍熱食前服小沉香丸治脾氣虛弱中脘痞悶脅肋脹滿心腹刺痛嘔逆痰涎不思飲食沉香丁香木香枳殼去瓤麩炒人參赤茯苓去黑皮云藍根玄參焙各一兩訶黎勒去核白豆蔻去皮肉豆蔻去殼丁香皮銼桂去粗皮麝香研各半兩白朮四兩上為末煉蜜丸梧桐子大每服二十丸煎棗湯下米飲亦得空心服白朮散出聖惠方治脾氣不足心腹脹滿不欲飲食若食則氣滯體重四肢無力白朮一兩訶黎勒二兩煨用皮麥糵三兩分微炒丁香三錢分人參一兩去蘆頭草豆蔻三錢分去皮沉香三錢分陳橘皮三錢分湯浸去白瓤微炒木香三錢分枳實半兩麩炒微黃甘草半兩炙令赤銼黃耆三錢分銼附子三錢分炮裂去皮臍白茯苓三錢分蓽澄茄一兩上為散每服三錢水一中盞入生薑半分棗三枚煎六分去滓不計時溫服忌生冷油膩濕面蓽澄茄煮散治脾臟虛弱冷氣不和心胸不快腹肋膨脹氣刺痛不思飲食面黃口淡及治中酒蓽澄茄炒半兩丁香皮炙銼二兩高良薑一兩分煨厚朴去粗皮生薑汁炙一兩京三稜炮乘熱搗陳橘皮湯浸去白焙甘草炙銼蘹香子炒桂去粗皮各一兩香附子炒一三兩桔梗炒一兩白鹽炒研十二兩阿魏皂子大一塊麵裹煨熟去面別研上搗研為散再同和勻每服二錢匕入生薑二片水一小盞煎六七沸熱服一方更入木香半兩阿魏一兩皂子大桔梗丸治脾胃冷氣腹內雷鳴冷氣入腹中脘痞悶脅肋脹滿飲食不下桔梗煩二三兩防風去叉禹餘糧醋淬研遠志去心萆薢鹿茸去毛酥炙橘皮湯浸去白焙蕪荑紫石英研桂心去粗皮乾薑炮各一兩吳茱萸湯洗焙乾炒甘草炙銼各三錢分上為末煉蜜丸梧桐子大每服空心用米飲下二十丸育神湯一名厚朴散出聖惠方治脾氣虛弱腹脅膨脹吃食不消面色萎黃四肢劣弱厚朴去粗皮生薑汁炙二兩丁香半兩白朮一兩木香半兩當歸切焙人參各一兩半訶黎勒煨去核一兩附子炮裂去皮臍乾薑炮三分桂去粗皮一兩甘草炙半兩白茯苓去黑皮一兩上為粗末搗篩入淨瓷器中收貯每服五錢匕水一盞半入生薑半分大棗二枚擘破煎八分去滓食前溫服一方有陳橘皮忌生冷油膩濕面黏滑等物瀉脾丸治毒風在脾中流腫脹滿短氣食輒響響不消時時微痛方當歸三分吳茱萸二分乾薑二分大黃二分狼毒炙一分桂心三分芎藭二分川椒去汗二分白薇一分甘遂煨二分附子炮三分葶藶炒令紫色三分上搗篩蜜丸如柏子每服三丸日三忌豬肉冷水生蔥厚朴散出聖惠方治脾氣不足心腹脹痛善噫吞酸食則欲嘔四肢少力厚朴一兩去粗皮塗生薑汁炙令香熟肉桂一兩去粗皮當歸半兩銼微炒人參半兩去蘆頭丁香半兩白朮半兩白豆蔻半兩去皮吳茱萸一分湯浸七遍炒令微黃訶黎勒一兩煨用皮高良薑半兩陳橘皮半兩湯浸去白瓤微炒上為散每服三錢水一中盞生薑半分棗三枚煎六分去滓不計時溫服忌生冷油膩濕面黏食訶黎勒散聖惠方治脾氣不足四肢不和腹脅脹滿或時下利飲食難消訶黎勒三兩分煨用皮人參一兩去蘆頭當歸三錢分銼微炒白朮三錢分乾薑半兩炮裂銼桂心三錢分草豆蔻三錢分去皮甘草半兩炙微赤銼厚朴一兩半去粗皮塗生薑汁炙令香熟吳茱萸半兩湯浸七遍焙乾微炒陳橘皮三錢分湯浸去白瓤焙上為散每服三錢水一中盞棗三枚煎三六分去滓食前稍熱服之白豆蔻丸聖惠方治脾氣不足體重胸滿腹脅虛脹食少無力水穀不消或時自利白豆蔻一兩去皮訶黎勒二兩煨用皮黃耆一兩銼沉香一兩附子一兩炮裂去皮臍白朮一兩人參一兩去蘆頭肉桂一兩半去粗皮木香一兩枳實一兩炒微黃厚朴二兩去粗皮塗生薑汁炙令香熟上細羅為末酒煮麵糊和丸如梧桐子大每服溫酒下三十丸空心及晚食前服忌生冷油膩黏食紫桂大丸治脾虛冷氣心腹㽱痛胸膈滿悶腹脹腸鳴桂去粗皮蘹香子炒白豆蔻仁去皮青橘皮湯浸去白焙高良薑附子炮裂去皮臍各一兩丁香木香甘草炙各半兩胡椒炒