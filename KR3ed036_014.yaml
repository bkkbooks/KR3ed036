body:
  text: 卷十四肝臟門總論肝主魂為郎官隨神往來謂之魂魂者肝之藏也目者肝之官肝氣通於目目和則能辨其五色其左目甲右目乙循環紫宮榮華於爪外主筋內主血肝重四斤四兩左三葉右四葉凡七葉有六金童玉女守之神名藍藍主藏魂號為魂藏隨節應會故曰肝藏血血舍魂在氣而為語在液而為淚肝氣虛則恐實則怒虛則夢園花草得其時夢伏樹下不敢起肝氣盛則夢怒厥氣客於肝則夢山林樹木凡人寢臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝凡肝藏衆木與膽合為腑其經足厥陰與少陽為表裡其脈弦相於冬旺於春春時萬物始生其氣來濡而弱寬而虛故脈為弦濡而不可發汗弱則不可下寬則開開者通通者利故名曰寬而虛春脈弦春脈肝也東方木也萬物之所以始生也故其氣來濡弱輕虛而滑端直以長故曰弦反此者病何如而反其氣來實而弦此謂太過病在外其氣來不實而微此謂不及病在內太過則令人善怒忽忽眩冒而癲疾不及則令人胸痛引背兩胠脅滿肝脈來濡招招如揭長竿末梢曰平春以胃氣為本肝脈來盈實而滑如循長竿曰肝病肝脈來急而益徑如新張弓弦曰肝死真肝脈至內外急如循刀刃責責然如按琴瑟弦色青白不澤手摺乃死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛者秋病毛甚曰今病肝藏血血舍魂悲哀動中則傷魂魂傷則狂妄其精不守令人陰縮而筋攣兩脅肋骨不舉毛悴色夭死於秋足厥陰氣絶則筋縮引卵與舌厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本故脈弗營則筋縮急筋縮急引卵與舌故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝死臟浮弱之脈按之中如索不來或曲如蛇行者死春肝木旺其脈弦細而長曰平反得沉濡而滑者是腎之乘肝母之歸子為虛邪雖病易治反得浮大而洪者是心之乘肝子之乘母為實邪雖病自愈反得微澀而短者是肺之乘肝金之剋木為賊邪大逆十死不治反得大而緩者是脾之乘肝土之陵木為微邪雖病即差心乘肝必吐利肺乘肝即為癰腫左手關上陰虛者肝脈虛也苦癃遺溺難言脅下有邪氣善吐刺足少陽治陽左手關上陰實者肝實也苦肉中痛善轉筋吐刺足厥陰治陰肝脈來濯濯如倚竿如琴瑟弦再至曰平三至曰離經四至脫精五至死六至命盡足厥陰脈也肝脈急甚為惡言微急為肥氣在脅下如覆杯緩甚為嘔微緩為水瘕痹大甚為內癰善嘔衄微大為肝痹陰縮咳引小腹小甚為多飲微小為消疸滑甚為㿗疝微滑為遺溺澀甚為痰飲微澀為氣瘛瘲筋攣肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其喘而散色澤者當病溢飲溢飲者暴渴飲多而溢入肌膚腸胃之外也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足冷頭痛扁鵲云肝有病則目奪精虛則寒寒則陰氣壯壯則夢山樹等實則陽氣壯壯則夢怒肝在聲為呼變動為握在志為怒怒傷肝精氣並於肝則憂虛則恐實則怒怒而不已亦生憂矣色主春病變於色者取之榮病先發於肝者頭目眩脅痛支滿一日之脾閉塞不通身痛體重二日之胃而腹脹三日之腎小腹腰脊痛頸酸十日不已死冬日入夏早食病在肝平旦慧下晡甚夜半靜假令肝病西行若食雞肉得之當以秋時發病以庚申日也家有血腥死女子見之以明要為災不者若感金銀物得之凡肝病之狀必兩脅下痛引小腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之欲治之當取其經足厥陰與少陽氣逆則頭目痛耳聲不聰頰腫取血者肝脈沉之而急浮之亦然若脅痛有氣支滿引小腹痛時小便難苦目眩頭痛腰脊痛足為寒時癃女人月事不來時無時有得之少年有所墜墮肝病其色青手足拘急脅下苦滿或時眩冒脈弦長為可治宜服防風竹瀝湯秦艽散春當刺大敦夏刺行間冬刺曲泉皆補之夏刺太衝秋刺中郤皆瀉之當灸期門百壯背第九椎五十壯邪在肝則兩脅痛中寒中惡血在內行善瘛瘲時腫取之行間以引脅下補三里以溫胃中取脈以散惡血取耳間青脈以去左瘛瘲凡有所墮墜惡血留內若有大怒氣上而不能下積於左脅下則傷肝肝中風者頭目瞤兩脅痛行常傴令人嗜甘如阻婦狀肝中寒者其人洗洗惡寒翕翕發熱面翕然赤漐漐有汗胸中煩熱肝中寒者其人兩臂不舉舌本燥善太息胸中痛不得轉側時盜汗咳食已吐其汁肝主胸中喘怒罵其脈沉胸中閉窒欲令人推按之有熱鼻窒肝傷其人脫肉又臥口欲得張時時手足青目瞑瞳仁痛為肝藏傷所致也肝水者其病腹大不能自轉側而脅下腹中痛時時津液微生小便續通肝脹者脅下滿而痛引小腹肝著其病人常欲蹈其胸上先未苦時且欲飲熱診得肝積脈弦而細兩脅下痛邪氣走心下足脛寒脅痛引小腹男子積疝女子瘕淋身無膏澤善轉筋爪甲枯黑春差秋劇見青色也肝病胸滿脅脹善恚怒叫呼身體有熱而復寒四肢不舉面白身體滑其脈當弦長而急今反短澀色當青而反白者此是金剋木為大逆十死不治角音人者主肝聲也肝聲呼其音琴其志怒其經足厥陰厥逆少陽則榮衛不通陰陽交雜陰氣外傷陽內擊擊則寒寒則虛虛則卒然喑啞不聲此為厲風入肝續命湯主之但踞坐不得低頭面目青黑四肢緩弱遺失便利甚則不可治賒則旬月之內桂枝酒主之又呼而哭哭而反吟此為金剋木陰擊陽陰氣起而陽氣伏伏則實實則熱熱則喘喘則逆逆則悶悶則恐畏目視不明語聲切急謬説有人此為邪熱傷肝甚則不可治若唇色雖青而眼不應可治地黃煎主之青為肝肝合筋青如翠羽者吉肝主目目是肝之餘其人木形相比於上角蒼色小頭長面大肩背直身小手足有才好勞心少力多憂勞於事耐春夏不耐秋冬秋冬感而生病足厥陰他他然脅廣合堅脆傾正則肝應之正青也小理者則肝小小則藏安無脅下之病粗理者則肝大大則虛虛則寒逼胃迫咽苦膈中且脅下痛廣胸反骹者則肝高高則實實則肝熱上支賁切脅悗為息賁合脅兔骹者則肝下下則逼胃脅下空空則受邪易脅骨堅者則肝堅堅則藏安難傷脅骨弱則肝脆脆則善病消疸易傷膺腹好相得者則肝端正端正則和利難傷脅骨偏舉者則肝偏傾偏傾則脅下偏痛凡人分部陷起者必有病生膽少陽為肝之部而藏氣通於內外亦從而應之沉濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷內病前治陰後治陽外病前治陽後治陰陽主外陰主內生死休否則藏神先變形於外人肝前病目則為之無色若前死目則為之脫精若天中等分墓色應之必死不治看應增損斟酌賒促賒則不出四百日內促則不延旬月之間肝病少愈而卒死何以知之曰青白色如拇指大靨點見顏頰上此必卒死肝絶八日死何以知之面青目赤但欲伏眠視而不見人汗出如水不止一日二日死面黑目青者不死青如草滋死吉凶之色在於分部順順而見青白入目必病不出其年若年上不應三年之中禍必應也春木肝脈色青主足少陽脈也春取絡脈分肉春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉之氣其脈根本並在竅陰之間應在窗籠者耳前上下脈以手按之動者是也春三月者主肝膽青筋牽病也其源從少陰而涉足少陽之氣始發少陰之氣始衰陰陽怫鬱於腠理皮毛之病俱生表裡之疴因起從少陽發動反少陰氣則臟腑受厲而生其病相反若腑虛則為陰邪所傷腰背強急腳縮不伸胻中欲折目中生花若臟虛則為陽毒所損澀澀前寒而後熱頸外雙筋牽不能屈伸頸直背強眼赤黃若欲轉動合身回側故曰青筋病扁鵲曰灸肝肺二腧主治丹毒牽病當依源處治調其陽理其陰臟腑之疾不生矣肝實附論夫左手關上脈陰實者足厥陰經也肝實之狀苦心下堅滿常兩脅痛或引小腹忿忿如怒頭眩痛眥赤生息肉陽毒所攻悒悒先寒而後熱頸直背強筋急不得屈伸其脈見於左手關上陰實者其脈浮大而數乃足厥陰經有餘之候蓋肝實則生熱熱則陽氣盛故其證如此左手關上脈陰陽俱實者足厥陰與少陽經實也病苦胃脹嘔逆食不消名曰肝膽俱實也方瀉肝湯療肝氣實目赤若黃脅下急小便難人參甘草炙各二兩生薑五兩黃芩二兩半夏一升洗大棗十四枚擘上切以水五升煮半夏三四沸內藥最後內薑煎取二升去滓分為二服羸人三服忌海藻菘菜羊肉餳犀角地黃湯治肝臟壅實風熱客搏經絡動於心肺上膈痰癖喉嗌乾燥不利四肢淫濼或祕或壅犀角鎊屑一兩熟乾地黃洗切焙三兩羌活去蘆頭獨活去蘆頭赤箭石菖蒲芎藭藁本洗焙沒藥研威靈洗焙黃耆銼烏藥銼甘草炙銼木香當歸切焙蟬蛻洗焙防風去叉各一兩大黃銼炒郁李仁去皮研各二兩半上粗搗篩每服三錢水一盞薄荷五葉煎至七分去滓溫服日三如膈有熱入生地黃汁少許如大腸祕澀加芒硝一錢驅風湯治肝實熱兩眼赤澀疼痛頭重心煩上焦壅滯蔓荊實羌活去蘆頭防風去叉升麻決明子黃芩去黑心赤芍藥甘草炙車前子羚羊角干菊花麥門冬去心各半兩柴胡去苗枳殼去瓤麵炒梔子仁各一兩上精搗篩每服三錢水一盞煎至七分去滓食後溫服瀉肝散治肝實熱心膈壅滯虛煩干菊半兩決明子半兩黃芩半兩川升麻半兩枳殼半兩面炒微黃去瓤防風半兩去蘆頭梔子仁半兩黃連去須半兩犀角屑半兩川大黃半兩銼微炒甘草一錢炙微赤銼馬牙硝一錢研龍腦一錢研麝香一錢研上為末入後三味更同研令勻每於食後煎麥門冬湯調下一錢忌炙爆熱面瀉肝湯治肝臟積熱氣昏血澀或因食酸物過多肝血積不散氣血俱病兩脅下非時氣動每動左脅下有聲右脅相應日漸胃脘結塊使人心腹滿悶上衝咽喉頭目不利睡臥不安如蟲所齧心肝非時氣逆上築咽喉須是開口吐氣方得稍快須臾卻平復如故大抵此病根起於肝相刑于脾故病作時先起於脅下方入胃脘宜服此藥荊芥穗連翹羌活去蘆頭牡丹皮黃芩去黑心杏仁去皮尖雙仁炒研當歸切焙芍藥梔子仁大黃銼炒雞蘇去梗虎杖麻黃去根節各半兩上粗搗篩每服三錢水一盞生薑三片煎至七分去滓溫服此藥數日後如病不減卻進後方射干散取肝中積血從大便下如腐爛瘀血之類若服前藥已瘥更不用服射干散射干桂去粗皮牛膝酒浸切焙牡丹皮鱉甲醋炙去裙襴牽牛子炒大黃銼炒各半兩荊芥穗細辛去苗葉各一錢狼毒芫花與狼毒同用醋炒焦色各一錢半夏為末用生薑汁和成餅子一錢上為細末每服一錢食後煎蔥湯調下一二服內如毒已下即不用服遠志散治肝邪熱出言反常乍寬乍急遠志射干杏仁大青各一兩半茯神麥門冬葛根甘草各一兩芍藥一兩三錢桂心三錢知母升麻各五錢石膏二兩上為粗散以水二升合煮竹葉一升取汁內藥一匕半煎取八合為一服一曰以綿裹散煮之洗肝湯治肝實兩脅脹滿氣急眼昏柴胡去苗鱉甲醋炙去裙襴各二兩桔梗一兩赤茯苓去黑皮一兩半檳榔銼桂去粗皮甘草炙銼五味子陳橘皮湯浸去白焙人參各一兩白朮一兩半半夏湯浸七遍去滑三錢上為粗散搗篩每服二錢水一盞入生薑五片煎至六分食前去滓溫服竹瀝瀉熱湯治肝實熱陽氣伏邪熱喘逆悶恐目視物無明狂悸非意而言者竹瀝一升麻黃大青梔子仁升麻茯苓玄參知母各三分生葛石膏生薑芍藥各四分上㕮咀以水九升煮二升半去滓下竹瀝煮兩三沸分三服須利下芒硝三分去芍藥加生地黃五分一方無芍藥石膏生薑生葛用人參三分羌活散治肝氣壅實