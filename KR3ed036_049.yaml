body:
  text: 卷四十九頭門眉髯髭發總論夫足太陽血氣盛則眉美足少陽血氣盛則髯美足少陰血氣盛則發美手陽明血氣盛則髭美夫經絡所至不同血氣各有所屬眉髯發髭率本於經絡之血氣或黑或紺或黃或白可以知盛衰蓋氣在人猶水之津也髭發猶津之有彡也津之槁澤而彡隨之則發髭本血氣可知矣烏髭發附論發本於足少陰髭本於手陽明二經血氣盛則悅澤血氣衰則枯槁容貌之間資是以賁飾則還枯槁為悅澤法烏可廢乎方烏鬚髮方黃柏四兩茴香一兩川楝子菟絲子肉蓯蓉川牛膝白芍藥白茯苓杜仲石斛熟地黃威靈仙地骨皮枸杞子乾山藥生地黃五味子山茱萸麥門冬蓮花蕊生雞頭肉藿香當歸胡蘆巴川芎澤瀉白朮人參巴戟黃耆羌活菖蒲獨活黃連廣木香沉香吳茱萸各半兩上為末醋糊為丸如梧桐子大每服五十丸空心溫酒送下沉香延齡散出德生堂治烏髭發牢牙益精氣沉香另研木香檀香香附子白芷龍骨浸水甘松川芎生地黃蓽茇升麻防風當歸何首烏藁本青鹽炒人參石膏白茯苓白蒺藜杜蒺藜海浮石藿香熟地黃細辛各半兩丁香荊芥穗菖蒲槐角子白殭蠶天麻桂心露蜂房炒黑各三二錢半麝香錢半柳枝一握四兩細銼炒上為末每日早晚先刷淨牙後蘸藥刷五七十遍多為上刷染髭髯何首烏母丁香白茯苓地骨皮白芷熟地黃川百藥煎甘草膽礬無以礬代之生地黃當歸升麻川芎細辛訶子肉寒水石沒石子各五錢青鹽二錢半上遇庚辰日修合為末朝夕不問次數蘸之刷上下牙將藥津一半咽了一半掠於髭鬢澤白者百日可黑微白者四十日如漆此藥大壯筋骨補下元明目暖水臟黑髭鬢鉛梳子方出聖惠方鉛十兩錫三兩二味同銷為汁去滓令淨沒石子二枚訶黎勒皮二枚婆羅得四枚硫黃十分細研酸石榴皮磁石一分緑礬一分針砂半兩醋炒熟乾地黃半兩燒令黑烏麻油一合炒焦茜草根一兩銼胡桃瓤半兩上為末先銷鉛錫為汁取諸藥末一半入鉛錫中以柳木篦攪令勻更傾入梳模子中就俟冷取出開齒修事如法將余藥入於鐺中以水煮梳子三日三夜若水耗即常以熱水添之日滿取出淨洗拭乾以故帛數重裹三五日以熱皮子襯手梳之一百下如烏色每梳先用皂莢水洗淨候乾即梳之得法染須方出危氏方上用針砂不以多少用水淘洗以水清為度用柳枝半寸長數根於銅銚內炒過卻用好米醋浸一宿次日再炒以柳枝成灰為度於地上攤冷另放八件打和為末當歸甘松石膏滑石各一錢橡斗子一兩酸石榴皮三錢母丁香白檀香各一錢另收各包為末生麝少許沒石子三個訶子四個去核百藥煎三錢白芨一錢上用針砂一匙白芨二錢八件末半匙余者皆少許一處合和好米醋調成膏子塗於髭鬚之上以荷葉緊包定勿寬慢次日早洗去即用些胡桃淨肉研爛成油捻放上則光軟牢牙黑髭鬢又名長春緑袍散金絲礬緑礬川芎膽礬一方用信細辛白茯苓訶子肉川百藥煎沒石子酸石榴皮五倍子川椒縮砂仁各一兩五錢上為細末入麝香少許臨睡先洗牙淨了再以刷牙蘸刷牙候津再蘸藥捻鬢次日洗刷牙烏髭鬢法荊芥一兩羌活半兩膽礬半兩青鹽半錢訶子半錢沒石子半錢防風一兩百藥煎一兩錢川椒半錢香白芷一錢加石膏一兩青礬半錢上為末每日刷牙浸髭鬢功效如神染髮髭令黑方出聖惠方沒石子烏藥雞腸草蓮子草青胡桃皮醋石榴皮一兩馬齒莧青鹽熟乾地黃東南柳枝皮銼以上各一兩獖豬鬃五兩剪如半豆長麝香一分細研上都搗用蜜水和為劑以舂大麥麵裹入瓷罐子內盛用鹽泥固濟候乾更泥三度為妙後用熟炭十斤燒罐子令黑焰盡冷之取出入麝香研如粉以生薑自然汁調如稀餳遇寅日染之良澤蘭膏治生黑髮不白細辛續斷皂莢石南草澤蘭厚朴烏頭莽草白朮各二兩蜀椒二升杏仁半升去皮上切以酒漬一宿以煉成豬脂四斤銅器中向東炊灶中煎三上三下膏成絞去滓拔白者以辰日塗藥皆出黑髮十日效黑髭揩齒散蓮子草雞腸草熟乾地黃馬齒莧酸石榴皮海鹽青胡桃皮沒石子以上各一兩丁香半兩川升麻半兩末麝香一分細研上為末用春大麥面為餅子裝入瓶子內密蓋口不令透氣燒通赤候冷搗細羅為散入麝香丁香升麻同研令勻每日早晨及夜臥時常用揩齒一月後甚有功效立馬烏出御藥院方定粉瓦粉朴硝鉛白霜以上各三一錢密陀僧龍骨各半錢輕粉三錢韶腦半兩花咸六錢玉霜一兩三錢上為細末先用白土黃丹敷過髭發俟干後將前項藥水調再敷髮鬢上用紙裹後少時其髭便黑用新水洗過無不應驗黑髭發立驗一醉烏方出聖惠方地黃花紫古子花龍葵花青胡桃瓤紫蜀葵花麥藍子小麥地中生者蓮子草母丁香酸石榴大者一枚以上並以綿裹陰乾母丁香訶黎勒皮香墨以上各一兩上為末煉蜜和為丸如彈子大每服一丸用酒一盞研調空心漸漸服令盡若於注子嘴中吸咽之如吃得三盞酒服三丸五盞服五丸以醉為度便見效也忌蘿蔔及五辛掠髭鬢方出瑞竹堂白檀香一錢香白芷一錢三奈子三錢面火燒熟為度滑石研零陵香二錢青黛研一錢百藥煎一錢另研白芨一錢甘松一錢去土上為細末用漿水一大盞藥末一錢瓷器內盛如法蓋覆勿令灰塵落入早晨用洗畢掠之十數日有驗用盡再添漿藥末黑髭發一醉烏方出聖惠方訶黎勒十枚磨兩頭透生地黃汁一升沒石子一兩搗末緑礬半兩細研酸石榴三枚去滓取汁硇砂一分細研上都入於瓷瓶內用二味汁浸密封口勿令透氣四十九日後取出其訶子狀如黑梅子至夜臨臥時含一枚咽津到曉爛嚼以酒一中盞下之良久更吃酒一兩盞飲之至醉其髭發即三兩日自黑更三兩日再服之轉妙忌生蔥蘿蔔大蒜等一方有硫黃一錢無沒石子桂心丸治髭發枯槁桂去粗皮旱蓮子草香白芷菊花旋覆花巨勝子蓽澄茄牛膝酒浸切焙各一兩上為末煉蜜和丸如梧桐子大每服三十丸鹽湯下不拘時丁香煮散出德生堂治烏髭發掠頭鬢光黑母丁香一錢沒石子二個川百藥煎一錢半甘松一兩針砂醋炒一錢半白芨二錢半新釘子一個訶子皮二錢三奈子一錢上為細末水一大碗煎至七分用小瓶盛貯用鐵釘浸在藥水內油紙蓋護勿令塵土入內三日後臨臥用掠髮鬢次早以溫水洗去黑光長春丸出德生堂治烏髭發地骨皮熟地黃各十兩訶子皮白芷桂心杏仁去皮尖各一二兩川椒淨二兩旋覆花一兩上各不犯銅鐵器只於木臼內搗細為末煉蜜丸如梧桐子大每服五十丸空心酒下忌蔥蒜黑髭揩齒方出聖惠方鯉魚一頭可盛得藥者去腸肚不洗生地黃八兩竹刀細切訶黎勒皮二兩茜草根一兩鹽一兩胡麻子三合沒石子一兩酸石榴皮一兩上都細銼納入魚腹中以濕紙三重裹上又以鹽泥紙筋封裹用磚襯魚炭十斤燒令煙盡候冷取出細研每夜先以生薑一小塊子揩齒微覺熱便以此藥揩之少頃不要盥漱如白者三七日內從根下黑黃者七日內便黑忌蘿蔔蔥蒜等染須鬢藥母丁香七個沒石子五個百藥煎半兩訶子半兩扁柏半兩生鐵半兩香白芷半兩何首烏半兩上碾為粗皮末用酸漿水浸七日蘸水擦須鬢染髭發令黑永不白方出聖惠方婆羅勒生鐵屎捶碎母丁香訶黎勒皮蓮子草草豆蔻去皮黃連去須密陀僧以上各一兩上為末用清漿水一升相和即內入瓷甕中以蠟紙密封頭不令水入即於宅內渠中深泥下埋滿百日取出先以麵漿水洗髭發令淨幹了後用梳梳藥令離根半寸以來其藥即自入肉內勿以手爬仍不得著肉即洗不落正塗藥時須口中含牛乳候口中黑即吐卻更含白乳了後以故紙裹髭發經一宿次用麵漿水洗澤然後可出入一染以後永黑不白也隨意所食只忌大蒜若不含牛乳即令齒黑永無洗處烏頭藥出儒門事親沒石子石榴皮乾荷葉合搗五倍子訶子皮百藥煎金絲礬各一兩緑礬少許另研旋點諸藥上為細末炒熟面五六匙入好醋打麵糊和藥末再塗髭發又用荷葉封裹後用皮帽裹之三五時間洗淨甚黑若更要黑光用豬膽漿水澤洗如鴉翎烏髭藥出百一選方蛤粉八兩海螵蛸韶粉黃丹各一兩膩粉半錢杏仁八個石灰石二兩乳香一塊皂子大上各為末和勻將髭先用皂角湯洗過不可見油看白髭有多少加減使用河水調藥如稀糊黃昏時篦子塗在髭上將荷葉作片子蓋之以片帛包系定至三更後用溫湯洗去更將少胡桃肉捻髭上烏髭借春散出御藥院方針砂先炒令赤投醋中浸一宿再炒令乾大麥面蕎麥麵三味各炒半匙頭上先以漿水洗髭發令極淨用醋調上件三味煮糊熱塗在髭發上用荷葉封裹上更帛裹須臨臥時用次日除去以溫漿水洗淨晚再用次用下藥塗沒石子百藥煎五倍子何首烏當歸各等分上為細末每用半匙頭入大麥面蕎麥麵各半匙頭醋調煮成糊臨臥塗髭發上依前用荷葉封裹次日早晨用溫漿水洗淨可黑兩個月神驗捻髭方出御藥院方白藥煎訶子皮狼把荷葉各一兩五倍子緑礬各半兩定粉三錢上為細末用鐵漿一碗煎至半碗綿濾過再入文武火熬成膏為度隔宿先用白礬水浴過髭鬢早晨捻之尤妙天麻丸出王氏博濟方潤顏色烏髭鬢天麻二兩木香元參地榆烏頭炮裂去皮臍附子炮裂去皮臍各半兩血竭一錢上為末用白砂蜜一盞河水一盞一處熬沸去沫蜜熟和藥丸如小豆大每服二十丸空心木香酒下烏金散訶子十個藁本一錢川百藥煎一兩沒石子五個母丁香十五個新釘子三個針砂一兩醋炒七次上除釘子外余藥俱為細末水一大碗煎熬至多半碗瓷器內盛之將前項釘子放於藥水內更宿早晚掠發百日如漆烏髭鬢方出傳信適用方烏賊魚骨韶粉黃丹蛤粉密陀僧五味等分研細輕粉少許石灰少許上藥和勻湯調稀稠得所篦子塗髮鬢上用荷葉包貼荷葉先於熱湯內泄過髭鬢亦須先淨洗方可塗藥治烏髭發掠頭出德生堂地黃花紫葵花黑牽牛花紫鼓子花桑椹酸石榴花母丁香各三錢上用瓶盛一處封口三日後用掠鬚髮治口齒百疾兼黑髭鬢揩齒方出聖惠方馬齒莧牆上生者陰乾了一斤及盛時采采時不得令雞犬孝子女人師尼等見合藥時亦復避之生乾地黃一斤牛膝四兩去苗巨勝四兩鹽三二兩皂莢五梃不蚛肥大者去皮子東引桃柳枝各一握川升麻四兩上各細銼訖以新平底鐵鐺中先下皂莢次下桃柳枝次下升麻次下牛膝次下馬齒莧次下巨勝鹽花地黃訖取一新瓦盆子蓋鐺以鹽泥固濟切須牢密即於盆底上鑽作三個小竅子以出陰氣從寅時以文火燒以小瓦子於竅上蓋之候陰氣盡即速泥之直燒至戌時方用武火燒至亥時後停火放冷明旦開之其色如鴉羽其香馥人藥乃成矣便以新瓷瓶盛之密封要即旋取出細研用柳木枝點藥再三精意揩齒悉令周遍即閉口良久待藥力入牙齒內然後可漱口但每日旦暮揩之三月內髭鬢黑潤異常黑髭方出聖惠方蓮子草沒石子酸石榴皮馬齒莧胡桃皮生乾地黃青鹽以上各一兩上為散用大麥面作餅裝入罐子中以炭火燒待罐子內黑煙絶即住火候冷取出細研為末每日早晨夜間兩度揩齒極妙烏髭鬢揩牙法出聖濟總録升麻一兩訶黎勒二枚去核為末白鹽花半分粟饙飯一合麻糝末四合取第一遍作者生乾地黃十二分肥者細切丹砂一兩研臨燒時以牛糞汁調之免飛上上拌勻於淨砂瓶中盛密封頭遍泥陰乾入爐中四畔以炭火周圍燒半時辰收之研為末每用揩齒欲使藥時先用生薑一塊如杏仁大爛嚼須臾即吐卻滓以左手揩三五遍就濕點藥末揩十數遍含津不得吐以兩手取津塗髭鬢待辛辣定細細咽此藥兼治腳氣腸風駐顏益氣若能勤行一生白髭鬢一百日卻黑赤者五十日黑用藥二十日便見效若能空心三遍用食後更用之見效尤速烏頭藥出御藥院方訶子皮當歸各一兩一錢沒石子一兩二錢五倍子半兩百藥煎一兩三錢酸石榴皮一兩上又先大麥面蕎麥麵各半兩針砂一兩六錢先用二面醋調熬成糊入針砂調勻先用溫漿皂角水洗淨髮後上針砂麵糊藥搽過後用前件烏頭藥一兩有使不盡面調藥遍擦發上用荷葉包裹一宿用溫漿水洗淨為度每針砂八兩醋浸五宿炒乾碾為細末地黃丸出聖濟總録治烏髭發方生地黃汁一升生薑汁五升合巨勝子熟乾地黃焙旋覆花干椹子各一兩上除二味汁外搗羅為末先將前二味汁用銀器煎熟看稀稠將藥末和丸如彈子大每服夜飲酒半酣後含化一丸駐顏變髭發令黑方出聖惠方蓮子草半斤杏仁一斤湯浸去皮尖雙仁麩炒微黃熟乾地黃一斤上件各藥相和搗一萬杵色當如漆即丸如梧桐子大每日空心溫酒下三十丸晚再服之久服髭發如漆忌生蔥蘿蔔大蒜等黑髭發方出聖惠方天門冬一斤去心研焙熟乾地黃一斤上為末煉蜜和搗三五百杵丸如梧桐子大每服食前以酒飲任下三十丸神效忌生蔥蘿蔔大蒜等又方出聖惠方生地黃二斤洗淨搗取汁茜根一斤上將茜根細銼以水五大盞微煎研絞取汁更將滓再研煎如前三度取汁入銀鍋內與地黃汁緩火煎如膏以瓷器盛之每日空心服以溫酒調半匙服一百日髭發如漆忌生蔥蘿蔔大蒜等黑髭發方出十便良方又用黃丹三十兩入瓷瓶中以泥固濟四面厚一寸放干以馬糞火養一百日出之細研為末以棗瓤和丸如雞實大每夜含一丸六十日黑矣又方出千金方用烏麻子三斤九蒸九曝為末以棗膏和丸如梧桐子大每日早晨以溫水下五十丸晚再服之久服佳黑髮方垂楊柳柏葉兒訶子皮青胡桃皮南烏梅各四兩胡桃油一大杓上為末用新汲水三大碗用表裡白瓷瓶一個將藥連水裝封在內閉半月日臨臥早晨梳掠至三十日黑烏髭方白石脂三二錢半輕粉五分密陀僧二錢蛤粉一錢紅礬一錢石灰三錢半上研細末用水調塗敷髭鬚隨即變黑換白令黑方出聖惠方蓮子草汁一升母丁香半兩生鐵一兩毗黎勒一兩東引槐枝灰一兩菴摩勒一兩上為散與蓮子草汁相和令勻每欲換時先點藥於髭髮根下即拔卻塗藥避風於後生即便黑永不變也其藥於瓷器中盛埋在土中常令軟嫩稍似干即難用如較干入少蜜和用之亦得丁砂散出瑞竹堂掠髭發大訶子一個母丁香十五個百藥煎一錢針砂少許醋炒七次高茶末上為細末用水一大碗熬數沸不去滓收淨瓷器內每夜臨臥溫漿洗淨髭發用藥水掠之次早用溫漿水淨洗百日其髭發黑藥中更浸一新釘尤妙婦人亦可用訶子散出瑞竹堂烏髭發訶子二個去核沒石子三兩百藥煎三兩金絲礬一兩半研針砂二兩用好醋一碗入瓷器內浸三日炒七次研上將蕎麵入針砂打糊先夜將針砂糊抹在頭上用荷葉包到天明用溫漿水洗淨次夜將前藥末四味調入針砂糊內用生薑一大塊捶碎再加些少輕粉一處調勻抹在頭上用荷葉包到天明用溫漿水加數點清油在內洗淨其發黑且潔潔發威仙油出海上方威靈仙去莖側柏葉二枝豬牙皂角三莖黃柏皮一片如手指大牽牛二十五粒上細銼以絹囊盛入細甕中入香油浸用除垢去膩潔鬢長髮烏髭方出聖濟總録晚蠶砂一升麻子仁心七兩大栝蔞一枚去瓤肥皂莢一挺青鹽三兩半上以瓷罐子一枚盛藥鹽泥固濟頂上留一眼子出煙用炭十斤燒盡煙絶候冷取出入苦參末五兩同搗羅為末每洗漱及臨臥時用一錢揩牙烏髭鬢風化石灰五錢花鹼五錢黃丹一錢定粉一錢密陀僧一錢上合勻水調煨熱塗之勿犯肉洗之立效散出德生堂治烏髭發針砂五兩醋炒五次另研極細川百藥煎三兩沒石子七個白芨一兩訶子肉二兩上為細末和勻再研極細如泥臨臥先用漿水洗淨後用荷葉熬水濾淨調藥看多少用塗髭發上用荷葉貼住絹帛拴裹次早用溫漿水洗去為諸方冠後塗鬚根出白色再用前藥常用胡桃油潤之尤妙五白玉粉散出德生堂治烏鬚髮大灰即石灰煅紅草節槐柳條碎切炒二兩五錢生蛤粉一兩九錢鉛粉九錢半土粉四錢七分輕粉二錢半上為細末如前法洗淨卻用溫水或茶水調藥塗上如前方點貼裹勿令通風次早用皂莢水洗轉白如漆換髭法出聖惠方黑獖豬鬃灰一兩一方獖豬糞灰一兩沒石子七枚酥炒黑焦酸石榴皮末四分錢母丁香末三錢旱蓮子末四分錢上都研令極細每投藥末一字生薑汁少許旋折柳枝子攪如稀膏別以新柳枝子點藥所貴免閇卻孔子點後三日不得用皂莢水洗即生黑者烏髭揩牙藥能反白為黑出百一選方萆麻子四十九個生乾地黃一兩龍骨半兩細辛一分青鹽半兩上用大栝蔞一個開一竅子去瓤以上件藥填栝蔞內將原蓋蓋定紙封鹽泥固濟曬乾火煅青煙出為度取出存性研為細末早晚揩牙良久用溫酒咽下用之四十九日外見效治黑髭揩牙出聖惠方燕子一枚雄者泥鰍魚一枚槐蕊子一兩狼把草一兩酸石榴瓤三枚上搗作一團安於瓦罐子內以紙筋鹽泥固濟罐子了候乾先以慢火燒徹後用炭十斤燒令通赤候冷取出細研如常作齒藥用之若用經一月以來白者皆黑生長髮令黑有黃白者皆黑黃耆當歸獨活芎藭白芷芍藥莽草防風辛夷仁乾地黃藁本蛇銜各一兩薤白切半升烏麻油四升半馬鬐膏二升上切以微火煎三上三下白芷黃膏成去滓洗髮訖後塗之烏雲散出御藥院方訶子五個去核百藥煎八錢川沒石子一錢輕粉少許上為細末與炒蕎麵各依等分相和每使用水為糊稀稠得所依前溫上用荷葉封裹烏龍髓出百一選方漢防己緑礬各一兩當歸二兩桑椹子一百個大黑紫者上以罐盛用麻油十二兩浸以紙數重緊扎定罐口於甑上蒸飯熟為度取出埋地下窨一百日用以染須大妙染髭方出百一選方沒石子母丁香杏仁胡桃瓤各等分上以針砂扎於燈焰上燒過存性同研為末如用時以漿水或虀水洗髭令淨拭乾捻藥在上每一次用可黑兩月黑錫散出百一選方治烏髭鬢黑錫一斤熔成汁入桑柴白灰十兩同炒令錫盡為度又入青鹽四兩再炒候冷為末瓷瓶封地埋五日取出入下藥升麻細辛各一兩訶子四兩上炒黑色同煎藥末一處拌勻如牙藥用百日自然黑如要急用每日揩牙用好酒灌漱只一月見效絶妙烏髭方訶子三兩百藥煎二兩五倍子二兩沒石子二兩以上為末上用針砂八兩重米醋浸五日五夜取出炒略紅用米醋打蕎麥麵為糊先將髭髯以皂角水洗去油膩次將針砂與蕎麥麵藥末同和為糊敷上用荷葉包裹過一夜明日取出卻用前藥再用蕎麥麵為糊敷上即黑染髭黑方出聖濟總録蕎麥針砂醋炒為末各二錢上先用醋和漿洗髭後用藥塗畢外用荷葉裹之約於一更時卻洗去再用後方無食子訶黎勒皮各二兩上末每用二錢大麥面二錢醋和漿調塗髭外荷葉裹晚洗去烏髭方旱蓮子沒石子荷葉活豬鬃上等分先將鬃於銚內炒後入余藥並焦黑存性為灰以柳枝自然汁調拔白即蘸水入藥擦白者根穴妙一醉散出德生堂方治烏髭發枸杞子蓮子心槐角子生地黃各四兩上用好酒一斗浸春五夏三秋七冬十日每日飲一盞七日後飲盡大醉見效換髭法出聖惠方酸石榴皮三兩細銼白蜜三兩硫黃一兩細研緑礬一兩細研上相和入瓶子中從今年十二月埋之至來年十二月內取出用塗髭發甚良烏髭鬢常用揩牙藥出百一選方青鹽一兩別研杏仁二三兩去皮尖熟乾地黃洗淨旌德烏頭各一兩上為粗末將栝蔞去蒂頂並瓤入藥在內以麻線扎定用蚯蚓糞固濟厚半寸以上陰乾或有小裂縫再糞泥合將熟炭火燒候煙出未盡一二分間用黃土覆之至冷取藥為細末每日揩牙或臨睡更用以津咽之尤妙黑髭方出聖惠方生乾地黃五兩皂莢三梃不蛀者炙黃焦酸石榴皮三兩硫黃三兩細研上為末內一瓷瓶中於炊飯下蒸一炊久用蜜和丸如酸棗大每夜後用生薑汁浸一丸揩齒二七日髭發皆黑倒流油烏髭三聖膏出御藥院方酸石榴皮子皆用新胡桃連青皮用新柿子青者連蒂用上各等分用鐵杵臼內搗爛如泥用一寸口新瓷罐子好黑鉛三斤拍作小錢大葉子及生牛乳同拌前藥令勻罐口上用木拍子蓋住油絹密封上用石灰麻縛之日內曬令極干於馬糞內培一月取出看藥顏色若深黑色即成如未黑再封於糞內培之如用時以膽皮盛先以溫漿洗淨臨臥指蘸藥捻之忌生蔥生蘿蔔大蒜如捻時自下捻之其黑自下至髭根一方用生胡桃皮生石榴皮生柿子皮先將生石榴刮去內瓤子揀丁香好者裝滿通稱分兩然後卻將胡桃皮柿子皮與所裝石榴丁香停分曬乾同為細末用生牛乳和勻盛於錫盒內或瓷器內密封之埋於馬糞內一十日取出將白綿一條緊點此膏子於綿中待藥力行至兩頭皆黑徹者是藥中用也如不黑再於糞內埋數日取出如法捻髭名三青膏烏雲膏出御藥院方針砂二兩醋一升蕎麵上前二味入鐵銚內同煎十餘沸入蕎麵八錢為糊稀稠得所溫上髭發用荷葉包或用手帕裹一時辰以來溫水洗淨次用烏雲散治烏頭方出儒門事親酸石榴五倍子芝麻葉上同杵碎用絹袋盛之於鐵器內水浸掠發自黑烏須方針砂半兩炒紅醋蘸三五次蕎麵半兩川百藥煎一兩上用荷葉熬醋水調為膏子熱擦抹上用荷葉封裹又用手帕護之至天明溫水洗之黑如鴉烏鬚髮針砂百藥煎白芨各等分上砂淘淨銅鐵器中炒紅入藥用水調擦荷葉包之一醉散治黑髮槐子四錢旱蓮草四分生地黃半兩上為細末無灰酒一瓶將藥投酒內密封之浸二十日取酒飲一醉後覺來鬚髮盡黑恐人不信將白雞犬喂試之白毛雞犬皆變為黑雞犬也揩牙烏髭方出聖濟總録皂莢懷州者十條生薑自然汁地黃自然汁各半盞上以二汁和勻旋刷皂莢於火上炙以汁盡為度碾細為末入青鹽拌勻逐日如齒藥用黑髭方出聖惠方麻姑八兩搗令碎鹽花三兩肥生地黃一斤上搗絞取地黃汁和前件藥於鐺中熬令乾以鐵蓋子覆之取炭末和鹽泥泥之燒通赤候冷搗羅為末常用揩齒了含藥少時吐卻便吃薑茶一碗欲得速見效平明午後各一度揩之即先從眉黑一月內皆變黑矣染鬚髮方出千金方胡粉三兩石灰六兩絹節熬令黃上如粉以榆皮作湯和之如粉先以皂莢湯洗髮極淨不得令有膩氣曝乾夜臥以藥塗發上令勻訖取桑葉相綴著頭巾上遍以裹發一夜至旦夜取醋漿熱暖三遍淨洗髮又以醋泔熱暖洗髮又取生胡麻苗搗取汁三升和水煮一二沸淨濾以濯發訖又用油湯濯之百日黑如漆一用雞子白和藥塗一方用漿和溫夕臥塗訖用油衣包裹明日洗去便黑大佳塗髭鬢方出御藥院方瀝青白膠各一兩上為末一處用紙捻藥燒瓦盆取煤同用胡桃瓤研成膏塗髭鬢尤妙染髭發令黑永不白方出聖惠方生麻油二斤干瓦松一斤半上於油中煎瓦松令焦即取出細研為散卻別入生麻油內浸之塗髭發甚妙換髭發出聖惠方硇砂一兩醋石榴一兩上將硇砂內在石榴中心以蓋封定盛於瓷瓶中埋於馬糞內三七日取出用此洗之甚妙又方出聖惠方胡桃根皮一稱蓮子草十斤上碎銼入瓷甕子內以水五斗浸一月去滓釜中熬至五升入藝臺油一斗以慢火同煎取五升收貯瓶內染頭時先用炭灰汁洗後用藥塗之訖即用牛蒡葉包裹上更用油絹子裹如此五七日黑也常夜洗塗之為妙染鬚髮方出聖惠方用鹽湯洗沐後以生麻油和蒲葦灰敷之一作治白禿又方出千金方用生麻油漬烏梅常用敷頭良倒流油烏髭發神方出百一選方大訶子十六個濕紙裹慢火煨熟取皮碾末用糯米粥飲調塗在尉斗內用麻油四兩燈心二十四條點無風處合尉斗在上四邊略通煙頻挑燈熏盡油為度放冷刀刮乳鉢中燈上燒胡桃肉二十個存六分性桃仁八十個如胡桃燒更入百藥煎二錢同研針砂半兩醋一盞浸一宿盡醋入乾生薑四兩同研入藥末再研極細要滋潤如膏恐硬多入胡桃瓷盒內收如用洗髭淨擦乾上藥以手指捻勻皂紗軟帛拭之兩上如琴光色一月可一次染之得法染鬢方出危氏方用針砂以井水淘淨濾干醋浸炒黑為末入百藥煎少許先一日將蕎麥粉針砂各半調和打為糊塗在鬢上以蓮葉包裹更以絹巾兜定次早用肥皂洗淨後再用訶子五錢沒石子一個醋炒為末百藥煎少許又以蕎麥粉醋調作稠糊依前封裹黑如漆一方加真膽礬入或生麝香入烏髭鬢揩牙藥出百一選方用不蛀皂角切作小段長寸許熔黑鉛令銷成水投皂角炒如炭不可太過恐成灰取出候冷研細入鹽少許逐日早晚兩次揩牙已白者三四揩則變黑者便不白胡桃膏一名還春膏出御藥院方用新小胡桃三枚和皮搗細用乳汁二盞於銀石器內文武火熬竹篦子攪成膏每用時淨洗髭發以筆醮點髭發上烏髭藥方一名還春膏出百一選方上針砂五兩篩出粗大片不使只以細者水澄過去泥沙曬焙乾以醲酸米醋浸數日然後入銚內炒令針砂通紅為度傾地上蓋以盞候出火氣瓷罐密收遇要使時約髭多寡抄取一錢或二三錢碾細和蕎麥麵相等又以濃醋調令得所重湯打作稠糊第一夜臨臥先以皂角溫湯洗去髭上油膩次用竹篦二枚挑藥連根搽髭此藥不損皮肉惟恐塗之不厚仍先以沸湯煮軟荷葉相視髭厚薄剪作片子壓在粗紙簿中滲干才使藥塗遍了即以所剪荷葉覆之令周密又以帛包系恐汙衣被亦要護荷葉不走作也次早起來以溫湯款款洗之白者已黃黃者黑矣使皂角澡豆末洗面不妨但不可自使手染恐指黑亦須耐煩第二夜再上藥又四五日前以訶子不拘多少銚內使麻油煎以黑色為度取出用熱爐灰覆之逐日換沁盡油臨時用皂角水洗淨焙乾為細末又以訶子去核亦不拘多少使麥麩同炒急手攪動令訶子赤色為度取出去盡麩碾為細末兩味訶子各使淨瓷罐子盛每使看髭多寡使一錢或半錢並百藥煎細末同煎二樣訶子各等分又使小麥面如三味藥多少以淘白米第二次泔調重湯煮如先夜糊厚薄搽髭並依上法染三五次後卻以兩夜藥並作一處同調打糊亦得每日用胡桃油潤之治烏髭不老用風化石灰石四分真蚌粉三分鉛粉二分虢丹一分同為末臨臥以皂角湯洗髭冷水調藥連根均敷取蒸軟荷葉包裹以帛敷外至早浣去頻研核桃松子油滋之神妙治頭不白換髭方出聖惠方用刮老生薑皮一大升於鐺中以文武火煎之不得令過沸其鐺惟得多油膩者尤佳更不須洗刷便以姜皮置中密固濟勿令通氣令一精細人守之地色未分便須緩煎之不得令火急如其人稍疲即換人看火一復時即成置於瓷鉢中極細研之李云雖曰一復時若火勻即至日西藥成也使時先以小物點取如麻子大先於白髭下點藥後拔之以手指熟捻之令入肉第四日當自黑者生神效治發黑用羊屎方書多用近人取納鮮魚腹中瓦缶固濟燒灰以塗髭發令易生而黑甚效蒼朮丸出朱氏集驗方烏髭鬢駐顏色壯筋骨明耳目除風氣潤肌膚久服令人輕健用蒼朮不拘多少用米泔水浸三兩日逐日換水候滿日取出刮去黑皮切作片子曝乾用慢火炒令黃色細搗末每一斤末用蒸過茯苓半斤煉蜜為丸如梧桐子大空心臥時溫熟水下十五丸別用術末六兩甘草末一兩拌和勻作湯點之下尤妙忌桃李雀蛤兩三日又方出十便良方用收自己亂頭髮淨洗干每一兩入椒五十粒泥封固入爐大火一煅如黑糟細研酒服一錢匕髭髮長黑一方燒灰用頭垢和丸服又方出本草用蓬藟柞取汁合成膏塗發不白食其子令人好顏色又方出本草用覆盆子柞取汁合成膏塗發不白食其子令人好顏色治發藥用風化石灰一斤用細柳條一寸長四十九根用粗柳條三根將石灰並柳條一同於砂鍋內慢火炒用粗柳條不住攪炒細柳條如炭黑用夾紙鋪於地上將石灰攤上隔一宿去火氣用瓦粉半斤官粉四兩土粉四兩同為末用新水調塗須上以荷葉封裹次日洗去如漆一捻膏出危氏方烏髭鬚用酸石榴結成時就枝上將石榴開一小孔傾水銀於中卻將元皮封之以麻皮纏定用牛糞泥封了候經霜摘下傾出以豬膽皮裹指醮捻白髮即黑一方用黃蠟封固放留一月取用以雞內金蘸藥染髭黑髭鬚方用蜒蚰四十九條入瓷器內研京墨水令食之次於馬糞內埋藏一月取出以白絲頭試染如即黑到尾再入馬糞內埋之待數日再取出試之性緩然後捻染髭鬚庶使不黑皮膚治頭不光澤臘澤飾發出肘後方用青木香白芷零陵香甘松澤蘭各一分用綿裹酒漬再宿納油裹煎再宿加臘澤斟量硬軟即火急煎著少許胡粉煙脂訖又緩火煎令黏去滓作梃以飾發神效治烏髭發出德生堂用臘月宰下黑牛膽裝槐角子在內拴住不以牛膽多少掛在屋內陰乾一月後每日早辰服三五個溫水下染髭發出聖惠方用取八九月經霜桐葉兼子多收搗碎蒸之以生布絞取油先以泔洗頭淨後塗此油熟揩經一宿取蜀葵杆燒灰淋汁澤之一月十度用之永黑不變也又方出聖惠方用鏵鐵打作四十九片如棋子大燒令赤即於漿水中淬之又更燒淬如此四十九遍即將鐵入竹瀝中浸三日後用梳捻髭發便黑甚妙變髭發駐顏揩齒散出聖惠方蓮子草端午日收破麻布多年者上細銼納於瓷瓶中以鹽泥固濟大火燒半日候冷取出仍於鐵臼中搗為散每日常用揩之旋有黑者生黑髭發方柏葉松葉各四兩丁香沒石子各二兩上為末煉蜜和搗三二百杵丸如梧桐子大每日空心以溫酒下三十丸夜臥時以豉湯下三十丸拔白令髭發生黑良日出千金方正月四日二月八日三月十二日四月十六日五月二十日六月二十四日七月二十八日八月十九日九月二十五日十月十日十一月十日十二月十日上以上日並陸機法須早晨拔之永不白一方以日正午時拔之當日忌飲酒食五辛一拔黑者更不變又方出聖惠方正月五日十三日二月八日十八日三月三日四月十三日二十五日五月五日十五日六月十四日二十四日七月十八日二十八日八月九日十九日九月八日十八日十月十三日二十三日十一月十日十二月十六日上以上日月並於午時前拔此方深要依法用之久驗也凡拔白髮即先以水於石上摩丁香汁候拔去急手敷於毛孔中即生黑髮矣神仙紫金膏出余居士選奇方烏髭鬚生薑半斤和皮細銼皂角四兩不蛀者細銼細辛去葉土一兩香白芷一兩銼上件搗爛為膏用河水調和得所用鐵銚子將豬脂搽銚內方入藥以碗蓋定用濕紙條塞碗縫然後用紙筋泥固縫不令出氣慢火養一伏時以手按碗足上常以通手為度取出研細入瓷器收每用杖子挑藥少許於白髭處熟擦令染即摘去白髭用藥再擦內熱即止後生黑者永不變白染髭發方出余居士選奇方石灰新者黃丹樟腦等分用桑柴灰汁調敷候乾了即用溫水洗後用胡桃松子研細敷之即黑也詩曰祕傳海上神仙訣妙奪人間造化機白髮變成黑髮去晚年化作少年歸烏髭藥方出余居士選奇方針砂一二兩用醋炒乾訶子一兩用麻油炒焦色為度去核蕎麥麵二兩上三味同為細末如染髭時用酸醋調成膏於太陽中略頓稍熟為度臨睡時淨洗髭敷藥向髭鬢上厚上藥不妨用油單紙包定勿令透氣次日用米泔水煮溫洗髭則黑如漆矣染髭洗了用核桃松子油潤之絶妙立聖散出余居士選奇方烏鬢髮乙卯年見曾南仲云頃見零陵一急足鬢髮已白後三年再來其黑如漆叩之云一道人教其用橡斗子實以鹽燒存性細研早晚用曾用之十年今五十五鬢髮無白者而齒且牢五聖不老散一名五聖還童散出衛生家寶方不蛀皂角五十錠刮去黑皮沒石子二對熟乾地黃焙洗胡桃肉二十個蛇蛻二條火燒成灰白鹽十二兩川楝子硇砂青鹽地龍去土香白芷酸石榴皮川百藥煎黑牽牛烏賊魚骨各三兩除皂角外併為粗末用糠醋四升同浸皂角細辛威靈仙藿香葉當歸仙靈脾各二兩不為末上先以粗藥末入醋攪拌勻下皂角了以後五味蓋之浸四五日每日翻皂角一二遍用重物壓盆恐醋浸藥不著日足不用他藥只將皂角用桑柴熟火炙令稍干再於醋內浸再炙至醋浸盡焙乾碾羅為細末每藥一兩用麝香一錢和勻每早晚兩次以牙刷子蘸藥上下齒每處擦五七十擦或手指蘸藥亦得遇有津液旋咽更不漱口如用藥約一月外若有白者髭鬢逢寅日摘去如再生出者有黑白漸次摘換盡出黑者此藥有神妙不可細述一曰明目二曰去頭風三曰補腎四曰牢牙五曰烏髭鬢換髮一方有蟬蛻變白散出衛生家寶方齒藥大能烏髭大漿石榴一個用鐵釘四十九個扎勻三日取出釘入丁香並鹽少許以黃土固濟令乾用炭火二斤煅炭盡為度候冷取出細辛二兩生用豬牙皂角二兩刮去皮蘸鹽水炙寒水石三兩炭煅上為細末更入腦麝少許揩牙候藥行方漱口臨臥揩牙勿漱取口中涎擦白髮烏髭揩牙藥出衛生家寶方苦參半兩青黛一兩如螺色青者青鹽一兩上先以苦參為末次研青黛又研青鹽一處拌和勻早晚無時作牙藥揩牙徐俟少時漱之荊南劉大夫年老七十餘知漢州陛陸辭日神宗怪其髭鬢盡黑對云用此方遂録進呈神妙烏髭方出衛生家寶方每用酸石榴一個於上勻釘小鐵釘四十九個遇夜安頓在露地或屋上至曉即收在屋下勿令見日色露三夜畢取出去釘子每一釘竅內塞一丁香每取出一個釘便塞丁香用紙裹石榴以好米醋和黃泥固濟石榴頓在風道略干以炭火簇燒令通紅為度取出移在一淨地上候冷去泥淨取燒過者石榴碾為細末早晚搽牙須令擦得牙齒熱以使藥力行至十日永無白鬢更無蟲牙若青春人用此藥一世更無白者如摘白鬚後以生薑汁擦遂生黑者變白為黑方出衛生家寶方針砂醋煮訶子麩炒黑色去核用皮五倍子為末百藥煎為末各二錢蕎麥一錢無時則用麥面亦可上用蕎麥麵同前四味醋煮為稀稠得所先淨洗髭鬢了揩拭令極干然後用前藥塗染卻用荷葉包裹不黑再染一兩度自黑換白髮方出衛生家寶方吳白芷菊花旋覆花桂心白茯苓巨勝子各三分蓽澄茄牛膝各二三分覆盆子蓮花須陰乾各一分上為末酒煮糊丸如桐子大空心酒下三十丸午時更進二十丸服時須吃酒或飯引動藥力乃妙一日見效白者初碧漸變黑色此藥兼治一切風疾若欲試藥驗但將蒸餅裹藥飼白犬一月即為黑矣忌蘿蔔羊肉生蔥正月初四日二月初六日三月十二日四月十六日五月二十一日六月二十四日七月二十一日八月十五日九月十六日十月十三日十一月初四日十二月初七日以上各日遇之並不宜服冀州李鑑郎中四十二歲頭髮遍白忽于山中遇老人授此方依法服食至赴闕時六十九歲更不生白髮兩鬢如漆遂進此方烏髭石燕散出衛生家寶方香附子半斤用生薑一斤取自然汁浸三宿候香附子透焙乾炒焦碾生乾地黃二兩焙乾石燕子一對醋淬碎碾青鹽二兩半明淨者石榴皮三兩炒乾細辛二兩焙乾皂角七條不蛀者燒存性麝香少許另研上為細末入麝香攪勻臨臥揩齒不可語話次早以溫湯漱之不過一月如漆矣烏金散出楊氏家藏方牢牙烏髭酸石榴皮生乾地黃槐白皮青鹽何首烏豬牙皂角各一兩升麻末半兩細辛末半兩麝香四錢別研上件先以前石榴皮等六件銼碎用藏瓶一個入藥在內鹽泥固濟留一竅子出煙火火煅令赤候煙盡為度研細次入升麻細辛麝香研和令勻每日早晚常用揩牙盥漱再黑膏出楊氏家藏方烏髭胡桃一枚捶碎殼取全肉於新瓦中心安頓四邊著慢火逼漸漸簇火令近時時撥轉胡桃令裡外焦黑地上放令冷用定粉一分上件一處研如膏用小瓷盒收之每用少許先塗在白髭根上方用鑷子摘髭急用手擦藥入白髭竅內後次即出黃髭若三四次用終身不白每摘一髭如此用一遍黑鉛散出楊氏家藏方烏髭鬢明目牢齒牙用黑鉛半斤大鍋內熔成汁旋入桑條灰柳木攪令成沙以熟絹羅為末每日早晨如常擦牙齒後用溫水漱在盂子內取用其水洗眼治諸般眼疾髭黃白者用之皆變黑色也染髭鬢白令黑方出肘後方酸漿煮豆洗之黑如漆色烏鬚髮出本草方以胡桃瓤和胡粉為泥拔去白鬚發以納孔中其毛皆黑染髮仙方出本草方以胡桃青皮壓油和詹糖香塗髮色如漆染鬚髮方出本草方以鉛丹煎膏染之烏髭發出本草方用蘩縷為齏食之染髭發令永黑出本草方以鐵落及熱未凝塗之變毛髮出本草方以石榴花並葉干之為末和鐵丹服之一年變毛髮色黑如漆鐵丹乃飛鐵為丹也烏髭發出本草方以毗黎勒燒灰干敷立效能染髭發變色染髭發出本草方以活師與青胡桃上皮和為泥染之不變活師科斗蟲也婦人塗發令黑方出本草方以芭蕉汁塗之黑髮方出本草方用蕓薹子壓取油敷頭令頭髮長黑染髮出本草方用金櫻花和鐵粉研拔白髮敷之再出者黑亦可染髮染須至黑出本草方以針砂及沒石子染須至黑染髮方出本草方用大麥針砂沒石子等末染之令發黑烏髭鬢七效方出本草方以小雌雞一對別處各養喂不得令食蟲並雜物只與烏油麻一件並與水吃雞長大放卵時專覷取出先放者卵收取及別處更放卵後細研好硃砂一兩了卻將先放者卵擊破卵巔些些作竅入砂於卵內安置用紙黏損處數重候乾用後放者卵一齊令雞抱候雞子出為度其藥在卵內自然結實打破取出爛研如粉用蒸餅丸如緑豆大不計時候酒下五七丸不惟變白亦愈疾矣長生不飢黑毛髮方出本草方取早藕食之令人體潤毛髮不白久服成仙出本草方以玉井水服之黑鬚發雜修養書云正月一日取五木煮以浴令人至老鬚髮黑徐鍇云道家謂青木香為五香一云五木道家多以此浴當是其義也
