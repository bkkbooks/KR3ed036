脈緊而數亦治因勞發熱熱鬱發黃苦參三兩龍膽草一兩梔子仁炒半兩人參三分上為末以豬膽汁入熟蜜少許丸如梧桐子以大麥煮湯下五十丸日三不知稍加之一方用牛膽一個依上丸服鬱金散聖惠方治谷疸唇口先黃腹脹氣急鬱金一兩牛膽一枚乾者麝香研半錢上為末每服半錢新汲水調下不拘時滌熱湯一名茵陳蒿湯治谷疸食畢頭眩心中怫鬱腹滿治食氣遍身黃腫氣喘不得食心胸滿悶皂角不蛀者去皮及子酥炙令焦為末一錢匕巴豆七粒去苗上以淡醋及研好墨為丸如麻子大每服三丸食後陳皮湯下日三服隔一日增一丸以利為度如常食酒酒飲一方名黑虎丸苦參丸千金方治谷疸食已頭眩心中怫鬱發黃由失飢大食胃氣攻衝所致其腹必滿苦參兩半龍膽半兩去蘆上為細末以牛膽和搗三百杵丸如梧桐子大每服十五丸早晚食後煎大麥湯下或以生薑甘草湯下一方煉蜜丸以生麥門冬汁下一方用豬膽不用龍膽谷疸食畢頭旋心怫鬱不安而發黃由失飢大食胃氣衝熏所致治之方茯苓梔子茵陳湯衛生寶鑑昔元顏正卿丙寅二月區區官事勞役飲食不節心火乘脾脾氣虛弱又以怒氣傷肝心下痞滿四肢困倦身體麻木次傳心目俱黃微見青色顏黑心神煩亂怔忡不安兀兀煩悶欲吐口生惡味飲食遲化時下完穀小便癃閉而赤黑辰巳之間發熱日暮則止至四月則尤甚其子以危急來請治之具說其事診其脈浮而緩金匱要略曰浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行食後則眩穀氣不消胃中苦濁濁氣下流熱流膀胱身體盡黃名曰谷疸此之謂也梔子仁蒼朮白朮各三分豬苓二分茵陳葉一錢澤瀉二分黃連去須二分枳實麩炒二錢陳皮二分青皮去白一分茯苓去皮五分漢防己二分黃芩六分上㕮咀都作一服長流水三盞煎至一盞去渣溫服食前一服減半又二服良愈內經曰熱淫於內治以鹹寒佐以苦甘又濕化於天熱反勝之治以苦寒以苦泄之以淡滲之以梔子茵陳苦寒能瀉濕熱而退其黃故以為君難經云井主心下滿以黃連枳實苦寒泄心下痞滿肺主氣今日傷其氣故身體麻木以黃芩苦寒瀉火補氣故以為臣二術苦甘溫青皮苦辛溫能除胃中之濕熱去其壅滯養其正氣漢防己以苦寒能去十二經留濕澤瀉鹹平茯苓豬苓甘平導膀胱中濕熱利小便而去癃閉也胡椒紅丸子如宜方治谷疸因飢中過食傷胃蘊熱瘀滯腹滿心郁怔忡三稜陳皮青皮莪朮各一兩胡椒乾薑各二兩上為末醋糊丸如梧桐子大硃砂為衣每服三十丸空心薑湯煎二陳湯加砂仁下酒疸附論論曰胃虛谷少醉以入房冒犯風邪胃中熱毒隨虛入里小便黃赤濕毒內聚心下懊痛熏發肌肉則身目發黃赤斑足脛浮腫或下之早則變為黑疸令人心如病飢大便黑瘀皮膚不仁治法宜先去濕毒後分小水余隨證治之心下懊憹而熱不能食則欲吐名曰酒疸夫酒疸者必小便不利心中熱足下熱欲吐鼻燥脈浮者先吐之沉弦者先下之欲嘔者吐之即愈大抵五疸惟酒疸變證最多蓋酒之為物隨人性量不同有盈石而不醉者有濡唇而輒亂者以醞釀而成有大熱毒滲入百脈為病則不特發黃溢於皮膚為黑疸流於清氣道中則眼黃鼻腫種種不同故方中論酒疸外有肉疸黑疸勞役疸令人恍惚失常等數證不同方黃連丸聖濟總録治酒疸心面黃心懊痛小便黃赤不利黃連去須黃柏去皮黃芩去心大黃炒梔子仁黃藥子鬱金秦艽去苗土貝母去心甘草炙黃明膠炙令燥款冬花白芥子各半兩上為末粳米飲丸如梧桐子大每服十丸煎麥門冬湯下半夏湯千金方治酒疸發黃身無熱言語了了腹滿欲嘔心煩足熱或成症癖心中懊憹其脈沉弦或緊細千金方云酒癖胸心脹滿骨肉沉重逆害飲食乃至小便赤黃此根本虛勞風冷飲食衝心由脾胃內痰所致半夏洗去滑茯苓白朮各二兩前胡枳殼麩炒去瓤一作枳實甘草炙大戟炒各二兩黃芩茵陳當歸各一兩上銼散每服四錢水一盞半姜三片煎至七分去滓空心服當歸白朮湯三因方治酒疸發黃結飲癖在心胸間心下縱橫堅滿骨肉沉重逆害飲食小便赤黃此由本虛飲食生冷與脾胃痰結所致其脈弦澀白朮茯苓各三兩當歸黃芩茵陳各一兩前胡枳實麩炒去瓤甘草炙杏仁麩炒去皮尖各二兩半夏湯洗七次二兩半一方加乾葛二兩上為散每服四錢水二盞姜七片煎至七分食前服凡酒疸熱疸大便祕者可服三黃丸赤茯苓丸聖惠方治心下堅而小便赤澀是酒疸之後宜服此方赤茯苓茵陳枳實麩炒去白微黃白朮前胡去蘆大黃各一兩甘草炙三分當歸三分半夏三分湯洗七次去滑杏仁湯浸去皮尖麩炒微黃三分上為末煉蜜和丸如梧桐子大每服三十丸粥飲下茯苓丸千金方治酒疸心下縱橫堅而小便赤茯苓茵陳乾薑各一兩白朮熬枳實各三十銖半夏杏仁各十八銖甘遂六銖蜀椒當歸各十二銖上為末煉蜜丸如梧桐子大空心服三丸日三稍稍加以小便利為度千金翼加木通一兩大黃十八銖名茵陳丸黑疸身體暗黑小便澀二石散一名凝水石散千金方治肉疸飲少小便多如白泔色因酒所致其脈弦滑凝水石煅水飛白石脂煅栝蔞根桂心各一錢菟絲子酒浸別研知母各三分上為末每服二錢大麥飲調下日三服五日知十日瘥茵陳湯聖濟總録治酒疸心中懊憹痛小便黃赤茵陳赤茯苓去皮葛根各三兩梔子仁半分栝蔞根三分秦艽去苗土升麻各一兩上粗搗篩每服三錢水一盞煎至七分去滓食後溫服日三桔梗湯聖濟總録治酒疸腹滿如水狀心中懊憹不能下食時時欲吐桔梗銼炒百合赤茯苓去黑皮桑白皮枳殼去瓤麩炒各一兩半木通一兩檳榔五枚上銼如麻豆大每服三錢水一盞煎至七分去滓食前溫服良久再服白朮湯一名桂術湯三因方治酒疸因下後久為黑疸目青面黑心中如啖韭齏狀大便正黑皮膚不仁脈微而數桂心白朮枳實麩炒去瓤豆豉乾葛杏仁甘草各半兩上銼為散每服四錢水一盞煎至七分去滓食前服一方有柴胡無桂心治酒疸經驗良方茵陳葛花黃連神麯京三稜細辛各等分上為細末每服三錢用溫酒或鹽湯調無時服葛根湯治酒疸因下後久久為黑疸目青面黑心中如啖蒜狀大便黑小便赤或面黑脈微而數葛根二兩枳實去瓤麩炒梔子仁豉各一兩甘草炙半兩上為散每服四錢水一盞半煎至八分去滓不拘時溫服瓜蒂丸一名牛膽丸治酒疸遍身黃麴塵出瓜蒂大黃炒蕘花各一兩牛膽一枚芫花醋炒半兩上為末以清酒二升漬一宿煎至一升去滓入牛膽汁微火熬稠丸如梧桐子大每服五丸溫熱水下得吐利為度六物湯治酒疸肚脹蓽茇荊芥穗不蛀川楝子連皮核用生薑母軟烏梅甘草各等分上於石臼中搗碎用瓷器盛以自已滿腹小便去其首尾取中間小便浸藥兩重紗蓋露星一宿拂明飲其汁續用車前子山茵陳竹園荽煎湯乘熱調五苓散服自覺黃水從小便出而肚不脹追毒飲治酒疸遍身發黃狗脊去毛一兩白芥子一錢甘草一錢上細銼用酒一升煎取半升去滓分溫二服以利下為度乳香硇砂丸治酒疸心下懊痛身目發黃大黃湯治酒疸心下懊痛脛腫溲黃面發赤斑面不甚熱或乾嘔大黃銼炒枳實去瓤麩炒梔子仁各一兩豉炒三合上粗搗篩每服四錢水一盞半煎至八分去滓溫服日三一方無枳實艾葉湯治酒疸身目俱黃心中懊痛生艾葉一握無生者乾者煮亦得麻黃去根節二兩大黃炒一兩半上銼如麻豆大每服四錢酒一盞半入大豆半合同煎至八分去滓食前溫服黃耆木蘭散治酒疸心懊痛足脛滿又小便黃面發赤斑或黃黑色此由飲酒大醉當風入水所致黃耆二兩木蘭皮一兩上為末每服二錢匕食前熱酒調下日三治酒疸心懊痛足脛滿小便黃飲酒發赤斑黃黑由大醉當風入水所致肘後方芫花椒目上等分燒末服半錢立愈如神散危氏方治酒毒不散發黃久久浸漬流入清氣道中宜引藥內鼻滴出黃水愈苦匏子去殼苦葫蘆子各三七個黃黍米三百粒安息香二皂子大上為末以一字搐入鼻滴盡黃水一二升或過多則以黍瓤燒灰麝香末各少許搐鼻立止治酒疸百一選方蒻葉燒灰神麯炒各半兩上為細末每服二錢或酒米飲調下食前服甚妙治酒疸百一選方用田螺七個水養出泥捶碎取螺頭細銼以熱酒浸頻服永類鈐方用小螺螄煮肉並汁常服小麥飲聖濟總録治酒疸用生小麥二合以水一盞研絞取汁食後頓服一方用三升杵和水取汁五合服之酒蒸黃連丸直指方治酒疸用黃連去須淨四兩銼碎以酒灑醃一宿日乾為末米糊為丸如梧桐子大每服三四丸以二陳湯加葛根茵陳薑棗煎湯送下治酒疸及治熱疸直指方用土瓜搗取汁任服除煩熱解酒疸目黃本草以黃櫨木煮服之治酒疸用明眼草研細調吃大黃丸指南方治酒疸脈沉腹脹滿大便祕治酒疸目黃及野病熱利下血本草用黃屑水煮服之治酒疸本草用苜蓿搗取汁服一升令人吐利即愈治酒疸黃色通身者取萱草根搗絞汁服亦取嫩苗煮食之治酒疸以鹽麩子桑根白皮搗碎米泔浸一宿平旦空心溫服一二升瓜丁散治酒疸脈浮腹滿欲嘔宜吐之木通散治酒疸通身黃腫木通銼甘草灸木香檳榔銼麻黃去根節秦艽去苗土瞿麥穗乾薑炮上等分為散每服一錢白湯點服空心食前日三病甚者用豬膽一枚去汁一半入巴豆一粒薤白二寸在膽內以線系定同青橘皮少許以水一盞半煎熟濾去膽取藥湯調下一錢匕女勞疸附論論曰脾胃素有濕熱或緣大暑醉飽房勞過度引熱歸腎濕氣交攻小水不利小腹堅脹濕氣流於肌肉之中則四肢身面發黃故謂之女勞疸然其證又有額心黑微汗出手足心熱薄暮即發膀胱急小便自利腹如水狀則不治三因症治云夫交接輸瀉必動三焦上焦屬心中焦屬脾下焦屬腎動則熱熱則欲火熾因入水中中焦熱鬱故能發黃下焦氣勝故額黑上焦起血隨熱瘀大便溏黑有男女同室而浴者多成此病攝生者不可不知方辰砂妙香散治飲酒行事酒熱瘀於心經致成黃疸茯苓茯神遠志水浸去心梗炒山藥炮黃耆炙各一兩人參甘草炙北梗各半兩木香辰砂另研各三錢麝香一錢上為末每服二錢加辰砂少許用茵陳湯調下日三服人參飲一名人參散治飲酒房勞酒入百脈令人恍惚失常人參白芍藥栝蔞根去瓤麩炒茯神酸棗仁各一兩熟地黃二兩甘草炙一兩上銼為散每服四錢水一盞煎至七分去滓食後臨臥溫服鱉甲湯治女勞疸手足煩熱肢節疼痛小腹拘急時有虛汗鱉甲去裙襴醋炙一兩半柴胡茵陳地骨皮赤芍藥梔子仁黃耆麥門冬去心焙各三兩上粗搗篩每服三錢水一盞煎至七分去滓不拘時溫服牡蠣湯治女勞疸額上汗出四肢虛煩日晡發熱小便自利牡蠣燒令赤龍膽升麻麥門冬去黑心炒甘草炙各三分犀角鎊藁本桂各半兩上為散每服四錢水一大盞煎至八分去滓熱服溫覆即避風寒秦艽散治勞黃心脾熱壅皮肉面目悉黃秦艽去苗土犀角屑赤芍藥各半兩茵陳麥門冬去心柴胡去苗各一兩大黃炒二兩黃芩三分上為散每服四錢水一盞煎至六分去滓溫服日三四服以利為度治心熱勞黃口乾舌澀皮肉面目俱黃上氣喘急宜服此方黑豆二升淨以水四升煎取二升去豆生地黃汁麥門冬汁生藕汁栝蔞根汁各三合蜜少許上藥並豆汁微火煎如膏於瓷器內盛每服一茶匙不拘時服龍膽湯治女勞疸額上黑汗出手足中熱四肢煩疼薄暮發熱小便自利龍膽去蘆甘草炙麥門冬去心柴胡去蘆升麻犀角各三分牡蠣一兩燒研如粉上為散每服三錢水一盞煎至七分去滓入生地黃汁半合再煎一二沸不拘時溫服犀角湯治女勞疸及勞氣熱渴額上汗出手足俱熱小便赤澀犀角鎊龍膽各一兩升麻甘草炙各半兩麥門冬去心焙三分上為細末山藥糊三錢水一盞入生薑一棗大拍碎煎至七分去滓入生地黃汁一合食後溫服小菟絲子丸治色疸菟絲子五兩洗酒浸一宿研焙石蓮肉二兩白茯苓一兩山藥一兩留一半打糊上為末山藥糊丸如梧桐子大每服五十丸用芎藭湯下四君子湯直指方治色疸人參白朮白茯苓甘草加黃柏白芍藥黃耆白扁豆各一兩上銼細每服三錢姜五片棗二枚煎服苦參丸聖濟總録治女勞疸苦參三兩龍膽二兩半梔子仁三兩半上為末以牛膽汁和丸如梧桐子大每服二十丸溫水下日二夜一稍加至四十丸本草用豬膽服硝石散一名礬石散千金方治女勞疸其腹臚脹膀胱急欲作水狀大便黑者非水其脈滑腹滿者難治身目皆黃發熱惡寒小腹滿急小便難由大勞大熱房室損傷得之交接後入水所致治之方硝石礬石並枯各等分上為末每服一錢用大麥粥飲調下蓋衣出汗其病隨小便出者色黃大便出者色黑是效滑石散千金方治女勞疸身黃額黑日晡發熱小腹急足下熱其脈浮緊腹滿者難治滑石石膏煅等分一作白礬上為末大麥粥飲調下二錢日三四次小便極利則瘥豬膏發煎本草治女勞疸身目皆黃發熱惡寒小腹滿急小便難由大熱大勞交接後入水所致黑疸附論論曰諸疸黃疸酒疸女勞疸久不愈皆變為黑疸其狀小腹滿身體盡黃額上黑足下熱大便黑是也黃本脾病脾者土也脾病不已傳其所勝腎斯受之腎為水臟其經足少陰其色黑病在腎故小腹滿色黃大便黑足下熱是皆足少陰經受病之證方當歸湯聖濟總録治諸疸久不瘥變成黑疸當歸三兩桂去皮六兩麥門冬去心一兩半黃芩去黑心黃耆乾薑炮赤茯苓去皮芍藥黃連去須石膏人參甘草炙各三兩大黃炒茵陳各一兩上銼如麻豆每服二錢七分去滓溫服日三一方無黃耆茵陳蒿丸聖惠方治黑疸身體暗黑小便澀茵陳蒿赤茯苓去皮葶藶子炒各一兩枳殼去瓤麩炒白朮各一兩一分杏仁湯浸去皮尖炒三分當歸焙乾薑炮蜀椒去閉口及目子炒令出汗甘遂炮各一分大黃醋炒半夏湯洗七次去滑焙各一錢上為末煉蜜和搗三五百杵丸如緑豆大每服十丸空心米飲下日三一方有木通無干姜溫水下瓜蒂散一名赤小豆散聖惠方治黑疸身體及大便並黑及黃疸久不瘥瓜蒂一分雄黃研一錢先用醋煮甘草炙一兩栝蔞二兩上為細散每服一字用赤小豆二十粒茯苓一分水一盞煎至六分去滓調服須臾當吐吐止即愈硝石散治日晡時發熱而反惡寒此為女勞而得之膀胱急小腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治治黃疸變成黑疸醫所不能療多死急治之方千金方用土瓜根汁每日空心服半錢即半盞其病隨小便出即愈然須量病人強壯者可服半盞羸人一合如無生者即銼乾的一兩水一盞半煎取七分去滓頓服羸量減
