body:
  text: 卷一百四諸風門風冷附論夫人有臟腑本虛血氣不實感於風冷致營衛不和經脈凝澀其冷不散者使人面青不樂心滿悶甚則嘔逆吐沫肢體冷痛夫風冷失聲者由風冷之氣客於會厭傷於懸壅之所為也聲氣通發事因關戶會厭是音聲之戶懸壅是音聲之關風冷客於關戶之間所以失聲也方芫花散一名登先酒又名三建散出千金方治一切風冷痰飲症癖痎瘧並皆治之芫花桔梗紫菀大戟王不留行烏頭附子天雄白朮五加皮蕘花狼毒莽草欒荊栝蔞根躑躅麻黃白芷荊芥茵芋車前子石斛人參石南石長生各七分蛇床子萆薢牛膝狗脊菟絲子肉蓯蓉秦艽各四分藜蘆五分薯蕷薏苡仁巴戟天細辛當歸芎藭乾地黃食茱萸杜仲厚朴黃耆山茱萸川乾薑芍藥桂心黃芩吳茱萸防己遠志川椒獨活五味子牡丹皮橘皮通草柴胡柏子仁石菖蒲藁本茯苓續斷以上各二分上並不治擇炙熬但振去塵土搗羅下即與服用余無所忌惟諸豆皆殺藥不得食千金翼有麻黃半夏赤車使者良薑紫葳無白朮食茱萸藥散三兩細曲末二升糯米三升真酒五升先以三大斗水煮米作粥須極熟冬月揚去火氣春月稍涼夏月陽絶火氣極冷秋稍溫次下曲末搦使和柔相得重下藥末搦使突突然好熟乃下真酒重搦使散盛不津器中以淨杖攪散經宿即飲只以布蓋不須密封凡服藥平旦空心服之以知為度微覺動發流入四肢頭面習習然為定勿更加之如法服之常常內消非理加增必大吐利服散者細下篩服一方寸匕和水酒漿飲無效稍增以知為度服丸者細下篩蜜和如梧桐子大每服七丸但此藥或丸或散皆可惟不得作湯若欲得補不令吐瀉但取內消大益勝於五石兼逐諸病功效一等然作酒服佳於丸散美而易服流行迅疾若有患人抱病多時積癊宿食大塊久氣癥瘕積聚一切癥結者即須一兩度增加令吐下瀉去惡物盡後少服內消便為補益丸服藥慎勿早食觸藥必當大吐吐亦無損須臾還定但令人咽喉痛三兩日始瘥服者宜知之平旦服藥至午時待藥勢定宜先食冷飯菹飲冷漿水及午後藥勢一定任意熱食無忌若藥勢未定不得強起行行即暈悶旋倒眼花暗然迷絶此是逐風所致不須疑怪風盡之後縱令多服更加不然悶時但坐但臥須臾醒然不異於常若定後任意所之若必便旋當策杖如廁少覺悶亂即須坐定坐定即醒醒乃可行病在膈上久冷痰癊積聚癥瘕結滯疝瘕宿食堅塊咳逆上氣等一切痼結重病終日吐唾逆氣上衝胸喉此皆胃口積冷所致三焦腸間宿冷以成諸疾如此利便當吐卻此等惡物輕者一度下轉藥令吐卻若重者三五度下之令盡其吐法初吐冷氣沫次吐酢水須臾吐黃汁膿甚者若似牛涎病若更多者當吐出紫痰似紫草汁非常齒齦有此者例入死道不久定死若有疰者吐血陳久者黑新者鮮血吐罷永瘥不發下此吐藥當吐時大悶須臾自定即不虛掇得冷飲食已耳不虛聾手足不痹若胃口有前件等病勢久成者正當吐時有一塊物塞胸喉吐復不出咽復不入當有異種大悶更加一二合藥酒重投藥少時即當吐出塊物如拳大真似孵雞子中黃著地以刀斫碎重者十塊輕者三五枚凡人有上件等病若服藥時不吐卻者當時雖得漸損一二年後還發為此故須下吐藥欲服取吐者當以春三月服之春宜吐故也凡膈上冷小腹滿腸鳴膀胱有氣冷利多者須加利藥於此酒內服之便去惡物利法出泔澱如清水如黃汁如清泥輕者一兩度下利藥得利以盡病源重者五度下利藥令頻數得大利以盡病根利法旦起服藥比至晡時可得兩三行即斷後服凡長病人瘦弱虛損者又貴人此等人當令少服積日漸漸加增令多內消瘥除久病不加吐利也藥若傷多吐利困極不止者水服生大豆末方寸匕即定及藍葉烏豆葉嚼以咽之登時即定此獨大困時用之小小時不須也凡在世人有虛損陽衰消瘦骨立者服之非常補益旬月之間肌膚充悅顏色光澤髓溢精滿與少壯一等凡衆疴萬病皆除之治一切風病癧節風二十兩和酒五斗賊風熱風大風上同偏風㿉疽風癱瘓風十二兩和酒三斗此七種並帶熱須加冷藥押使常數便利賊風掣瘲八兩和酒二斗濕風周痹上痛腰腳攣痛十二兩和酒三斗筋節攣急八兩和酒二斗重病後汗不流初覺三服一服一錢年久服一升食熱食如錘刀刺者八兩和酒二斗口喎面戾一眼不合者初得四兩和酒一斗年久十二兩和酒三斗頭面風似蟲行又似毛髮在面上者八兩和酒二斗起即頭旋良久始定者四兩和酒一斗心悶嘔逆項強者風在心臟遇風遇雨便即先發者八兩和酒二斗因瘡得風口強脊脈急者五服即定一服一錢治一切冷病積冷癊瘦者四兩和酒一斗強者六兩和酒一斗半痰飲疝瘕上同宿食嘔吐四兩和酒一斗癥瘕腸鳴噫八兩和酒二斗久疰及久勞上同㿗痔塊堅冷咳嗽上氣二十兩和酒五斗奔豚冷氣六兩和酒一斗半噎及冷痢上同猝中惡注見心腹脹氣急欲死者三服定一服一錢大吐出鮮血瘕氣上同蠱毒五服定一服一錢瘟瘧痎瘧並上同可永瘥一服一錢治婦人諸風諸病等並依前件帶下十二兩和酒三斗崩中六兩和酒一斗半月閉不通及冷病不産並上同斷續不産八兩和酒二斗月水前後不調乍多乍少亦令人不産四兩和酒一斗産後風冷不産六兩和酒二斗若重大者八兩和酒二斗甚者十六兩和酒三斗大重者子宮下垂十六兩和酒四斗千金方論云遠覽前古莫睹此方有高人名李孝隆者自云隋初受之於定州山僧惠通道人此後用之大有效驗祕而不傳但得其藥其方不可得而聞始吾得之於靜智道人將三紀於茲矣時俗名醫未之許也然此行之極有神驗其用藥殊不倫次將服即度大下不近人情至於救急其驗特異方知神物效靈不拘於常制至理關感智不能知亦猶龍吟云起虎嘯風生此其不知所以然而然雖聖人莫之辨也故述之篇末以貽後之好學君子詳之非止救物功深抑亦庶幾於博見矣神力湯出聖濟總録治風勞冷氣及膀胱冷氣攻次腹內疼痛兼治婦人血風血氣及傷寒等疾人參白茯苓去粗皮木香桂去粗皮肉豆蔻去皮草豆蔻去皮防風去叉厚朴去粗皮生薑汁炙附子炮裂去皮臍蒟醬黃耆薄切蒼朮米泔浸軟去皮切曝乾麩炒乾薑炮白朮當歸切焙羌活去蘆頭訶黎勒煨乾去核菖蒲牛膝酒浸切萆薢山芋甘草炙白芷芍藥枳殼去瓤麩炒桔梗銼炒陳橘皮去白切焙京三稜煨乘熱銼丁香蓬莪朮煨銼吳茱萸湯洗焙乾炒大腹皮五味子芎藭前胡去蘆頭各半兩上㕮咀每服三錢水一盞鹽少許煎至七分去滓溫服無時治風冷失聲咽喉不利出聖惠方蘘荷根二兩研浸取汁酒一大盞上相和令勻不計時候溫服半盞人參辰砂丸出十便良方治去骨髓內風冷壯筋力安神爽思寬快膈脘益胃進食人參好者生碾一兩為末辰砂晶明佳者半兩細研同人參末研勻上同以糯米粉汁和成錘煎湯內煮熟取出放冷丸如赤豆大每服二十丸空心溫酒或棗湯下日進二服石硫黃方治風冷中憊腎冷上氣腿膝虛羸長肌膚益氣力遺精痔漏老人風祕等疾用石硫黃並宜燒煉服之安息香丸出聖濟總録治風冷及虛風頭昏心胸疰悶痰唾不下飲食氣脹腰腹疼安息香研肉蓯蓉酒浸切焙白附子炮羌活去蘆頭各半兩當歸切焙蘹香子炒木香天麻桂去粗皮沉香各二分檳榔銼乾蠍去土各一兩白花蛇酒浸去皮骨炒二兩芎藭三分四味為末桃仁去皮尖並雙仁研如膏三兩硇砂研阿魏白麵裹灰內炮令黃熟為度去面研硫黃研各一分上先將桃仁阿魏硇砂硫黃用好酒五升於銀石器內慢火熬成膏和前藥末十四味如硬入煉蜜少許入臼中搗千百下取出每稱一兩分作十五丸每服一丸溫酒嚼下薑鹽湯下亦得空心食前巴戟天丸一名附子丸出聖惠方治風冷氣補虛損暖臟腑利腰腳巴戟天去心附子炮裂去皮臍天麻牛膝酒浸切焙防風去叉桂去粗皮芎藭獨活去蘆頭石斛去根肉蓯蓉酒浸切焙用補骨脂炒乾蠍去土炒萆薢銼蜀椒去目並閉口炒出汗仙靈脾沉香銼細安息香研木香各一兩上除別研外為細末再同研勻煉蜜和搗二三百杵丸如梧桐子大每服三十丸溫酒下空心及晚食前安息香丸出聖惠方治風冷心腹四肢多疼骨節時痛安息香石菖蒲當歸桂心丁香硃砂細研水飛過各一兩沒藥三分芎藭椒紅微炒天麻附子炮裂去皮臍牛膝去苗天南星炮裂木香各一兩乾蠍半兩生用防風三分去蘆頭麝香一分研烏蛇肉二兩酒浸炙微黃上為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以溫酒下二十丸祛風補益蛜𧌴丸出聖惠方治臟腑久虛風冷所攻四肢無力背膊多疼膀胱冷氣流注腰腳沉重蛜𧌴一兩半微炒白附子炮製沉香肉桂去皴皮芎藭檳榔木香天麻白蒺藜炙去刺各一兩石斛去根銼牛膝去苗肉蓯蓉各三兩酒浸一宿刮皴皮炙令乾巴戟白殭蠶微炒羌活當歸銼微炒山茱萸各三分上為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以溫酒下二十丸應痛丸出聖濟總録治風冷一切痛附子炮裂去皮臍天麻虎骨酥炙天南星炮狗脊去毛白茯苓去黑皮阿膠炙燥狼毒醋炙銼炒白殭蠶直者微炒海桐皮銼牡蠣煨天雄炮裂去皮臍防風去叉羌活去蘆頭吳茱萸湯洗焙乾炒獨活去蘆頭各一兩上為細末煉蜜和丸如彈子大每服一丸空心溫酒化下服菊花酒出千金方治男女風虛寒冷腰背痛食少羸瘦無顏色噓吸少氣去風冷補不足菊花杜仲各一斤防風附子黃耆乾薑桂心當歸石斛各四兩紫石英肉蓯蓉各五分萆薢獨活鍾乳各八兩茯苓三兩上㕮咀以酒七斗漬五日一服二合漸漸加至五合日三千金翼不用幹薑羌活湯出聖濟總録治風寒中面青遍身骨節俱冷兩手俱急筋脈牽抽手足不仁厥冷得暖氣則舒展羌活去蘆頭獨活去蘆頭乾薑炮牛膝酒浸切焙草豆蔻去皮桂去粗皮各半兩細辛去苗頭藿香葉去梗各一兩吳茱萸湯洗焙乾炒陳橘皮湯洗去白焙各半兩乾蠍去土炒半夏湯洗去滑焙各一分甘草炙四錢芎藭白朮各一兩上粗搗篩每服三錢匕水一盞煎至七分去滓稍熱不拘時候服身暖並筋脈舒展則止牛膝丸一名萆薢丸出聖惠方治風冷四肢疼痛腰腳緩弱虛損無力牛膝酒浸切焙萆薢銼各二兩山芋澤瀉地膚子各一兩附子炮裂去皮臍乾漆炒煙出三分石斛去根威靈仙去土狗脊去毛茵芋鍾乳粉熟乾地黃切焙各一兩上為細末煉蜜和搗三二百杵丸如梧桐子大每服二十丸空心及晚食前溫酒下五味子散出聖惠方治風冷入肺咳逆短氣語無音聲舌乾而渴五味子白石英鍾乳桂心赤茯苓紫蘇子微炒杏仁湯浸去皮尖雙仁麩炒微黃人參各一兩去蘆頭款冬花麥門冬去心紫菀各半兩洗去苗土陳橘皮三分湯浸去白瓤焙上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服雄黃丸出聖惠方治諸風冷入臟腑骨節疼痛筋脈拘急耳內蟬聲烏蛇二兩酒浸去皮骨炙令微黃天麻桂心石菖蒲附子炮裂去皮臍牛膝去苗各一兩雄黃細研水飛過天南星炮製麝香一分細研乾蠍微炒當歸三分白殭蠶微炒各半兩上為末研入雄黃麝香令勻煉蜜和搗三二百杵丸如梧桐子大每於空心及晚食前以溫酒下二十丸牛膝丸出聖惠方治臟腑氣血俱虛風冷攻注四肢疼痛腰腳無力牛膝去苗杜仲去粗皮尖微黃炒附子各二兩炮裂去皮臍巴戟補骨脂微炒石斛各一兩半去根銼羌活桂心五加皮安息香乾薑炮製銼當歸各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每於空心