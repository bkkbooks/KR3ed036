方治肺受風寒咳嗽不止痰涎並多上氣喘急睡臥不得及肺經熱咳而面赤久不已者阿膠一分炒貝母七個炮南星一個炮款冬花一分紫菀知母白礬各一分枯上為末蜜和丸如綠豆大薑湯下二十丸食後服人參散止嗽御米殼二兩蜜炒黃甜葶藶烏梅肉桔梗各一兩人參甘草炒紫菀各半兩上為細末每服一錢白湯調下人參飲子出醫方大成治寒熱上壅咳嗽痰涎人參去蘆桔梗去蘆五味子赤茯苓去皮白朮炒各一兩枳殼麩炒甘草炙各半兩上銼散每服四錢水一盞半姜五片煎至七分去滓食前溫服嗽多者加桑白皮一兩痰多者加半夏曲一兩寒暑之交氣盛人衣厚作壅忽痰盛微熱此藥最宜若作感冒發其汗攻其邪必成大病此方佳處在赤茯苓能清心熱枳殼能疏肺壅故易效一方有半夏一兩又云寒壅者加杏仁不去皮尖紫蘇各半兩依前煎服大抵嗽未易汗惟寒可汗恐傷津液也近效地黃煎療肺氣咳嗽補心肺令髭發不白生地黃汁二升麥門冬五升生薑汁五合紫菀三分兩貝母款冬花甘草炙各三兩上切以水七升煮取三大升去滓卻入鍋中下地黃汁麥門冬薑汁等三十沸下蜜一升煎如餳成矣盛不津器中令口含如棗許斟酌量加之一方有人參三兩人參補肺散治咳嗽肺上喘半夏制陳皮知母甘草人參款冬花各半兩御米殼一兩炒上為細末每服三錢水一大盞生薑五片煎至七分去滓食後溫服之治咳嗽藥麻黃甘草杏仁訶子木香少許青皮陳皮上各等分每服二錢水二盞煎至八分臨臥時服玉液膏出德生堂治遠年近日咳嗽氣喘逆滿倚息開目不爽語音不響服諸藥不效者服此人參烏梅肉五倍子五味子訶子肉玄明粉甘草各一兩上為細末臨臥食後用舌尖舔藥末四分徐徐嚥下津液自生咳嗽自愈極有效前胡丸療新久咳嗽前胡六分烏梅炮二枚桔梗乾薑各二分桂心八分川椒八分炒汗上為細末蜜和丸如櫻桃大一丸含化稍稍咽汁日三又療久咳晝夜不得臥咽中作水雞聲欲死者療之良忌豬肉冷水生蔥又療咳嗽散出千金方細辛紫菀天雄炮石膏款冬花鍾乳各三分上搗篩作散每服四分以小竹筒吸服日二不食生魚醬醋生茞菜但食糜七日咳愈乃止若大豆七聚不知亦小益勿太多甚良罌粟神聖散出宣明論治男子婦人久新日夜咳嗽不止者御米殼一兩蜜炒烏梅肉揀人參訶子肉葶藶桑白皮各半兩上為末每服二三錢百沸湯潑臨臥調下寧肺散出儒門事親御米殼二兩蜜炒甘草乾薑當歸陳皮以上各一兩白礬二錢上為末煎齏汁調二錢服人參補肺散出儒門事親人參麻黃去節白朮防己防風各等分桑白皮倍加上㕮咀以漿水一碗煎至半碗去滓溫服每用半秤即愈白朮湯出儒門事親白朮甘草當歸陳皮桔梗枳殼各等分上為粗末水煎去滓溫服三五錢人參紫菀散治遠年近日咳嗽痰涎柴胡紫菀烏梅肉炒甘草各半兩炒人參三錢御米殼蜜水炒二兩上為細末每服二錢白湯調下蛤蚧散治咳嗽咽嗌不利蛤蚧一對雌雄頭尾全者不得有蛀蚛水洗淨焙乾枇杷葉去毛三分柴胡去苗半兩紫菀洗淨焙乾三兩貝母去心炒一兩人參半兩鹿角膠炙燥三兩分上為細散用梨一顆去皮細切洗淨器研生絹濾自然汁於銀器內用藥半錢入梨汁慢火熬三五沸取出食後臨臥服去枕仰臥一飯時養中湯出和劑方治肺胃受寒多咳嗽多痰胸滿短氣語聲不出晝夜不止飲食減少不以久遠並治之半夏曲炙八錢罌粟殼去蒂蓋二兩半蜜炒甘草炙肉桂去皮各半兩上為細末每服一大錢水一盞姜四片同煎至七分通口服不以時候九仙散出儒門事親九尖蓖麻葉三錢飛過白礬二錢上用豬肉四兩薄批瓷盤攤開摻藥二味荷葉裹文武火煨熟細嚼白湯送下後用干食壓之止嗽丸方見半夏丸治猝咳嗽出肘後方上用梨一顆刺作十孔每孔納川椒一粒以麵裹於熱火灰中煨令熟出停冷去椒食之治嗽方罌粟殼二兩揀乾硬不蛀者去頂蓋及蒂瓤火炙陳皮去白半兩上銼粗末每服三大錢水一盞半入烏梅一個煎至七分服又方出肘後方治嗽補虛久了長咳嗽皂角一梃燒細研七三錢匕食後豉湯調寧肺散出仁存方治大人小兒諸般咳嗽玄胡索一兩枯礬二錢半上為末每服二錢用軟餳糖一塊和藥含化小兒一錢用蜜調亦可雌黃方出肘後方治久嗽暴嗽勞嗽上金粟丸葉子雌黃一兩研細用紙筋泥固濟小盒子一個令乾勿令泥厚將藥入盒子內水調赤石脂封盒子口更以泥封之候乾坐盒子於地上上面以末入窯瓦坯子彈子大擁盒子令作一尖子上用炭十斤簇定頂上著火一熨斗籠起令火從上漸熾候火消三分去一看瓦坯通赤則去火候冷開盒子取藥當如鏡面光明紅色入乳缽內細研湯浸蒸餅心和為丸如粟米大每服三丸五丸甘草水服服後睡良久妙治咳嗽不瘥方出本草以黃明膠三錢炙令半焦為末每服一錢匕加人參末二錢匕用香豉湯一大盞納藥末八分蔥少許入銚子煎一兩沸後傾入盞遇咳嗽時呷三五口後仍依煎溫暖卻准前咳嗽時吃之也又方出肘後方治嗽驗上用好梨去核搗取汁一茶碗著椒四十粒煎七沸去滓即納黑餳四兩煎成膏不計時候服一茶匙細細含咽津立定杏酪湯出經驗良方上用杏仁一斤去皮尖新砂盆內帶水研如泥下水二大碗入銀石器內文武火煎約近八九分入阿膠四兩化開以白沙糖同煎用湯點如不甜加蜜瓷盒收玉液湯保命集方治咳嗽去痰涎利胸膈天南星炮半夏湯洗七次去滑各一兩上搗篩每服二錢水二盞生薑五片同煎至七分去滓放溫食後夜臥細細呷之石葦散治咳嗽石葦去毛檳榔銼等分上為細散生薑湯調下二錢療咳方備急杏仁半斤去皮尖兩仁煮熬紫菀二兩上先研杏仁取汁使盡細切紫菀更煎少濃澄濾去滓納蜜使稠細細飲之立定又方療咳嗽雞子白皮十四枚熬令黃麻黃三兩去節上搗成散每服方寸匕日二食後飲下之無所忌百部根方出本草治咳嗽及久肺氣以百部根火炙酒漬飲之又方出肘後方梨搗取汁一兩酥一兩蜜一兩地黃汁一兩上緩火煎細細含咽凡治嗽皆須待冷及喘息定後方食熱食之反傷又方出御藥院方治咳嗽用半夏一兩湯浸七次去其涎水生薑一兩取自然汁銀石器內用文武火同熬汁盡為度每服嚼一粒食後生薑下令含化亦可治猝咳嗽不止出肘後方用白蜆殼不計多少搗研極細每服米飲調下一錢日三四服用好酒服亦可白膠出肘後方治肺破出血忽嗽血不止者大驗用海犀角一大片於火上炙令焦黃色後以膠塗之又炙再塗令通透可碾為末用湯化三大錢放冷服之即血止水膠是也又方出本草治一切嗽及上氣者用鯽魚頭主咳嗽燒灰為末水調服如不可加豬肉同食天南星方出肘後方治咳嗽去風痰用天南星一枚大者炮令裂為末每服一大錢水一盞生薑三片煎至五分溫服空心日午臨臥時各一服一方天南星一兩薑製香附子半兩微炒薑汁為丸又方出本草用鯉魚主肺咳嗽氣喘促鯉魚一頭重四兩去鱗紙裹火炮去刺研煮粥空心服之又方用鯉魚主上氣咳嗽胸膈氣喘鯉魚一頭切以鱠以姜醋食之蒜齏亦得一方療腳氣破冷氣痃癖懷妊人胎不安絹裹和煮羹熟後去鱗食之驗治咳嗽用豬肉半斤連骨煮主上氣咳嗽炙末酒和三合服之日二桑白皮方出肘後方治咳嗽甚者或吐血殷鮮用桑白皮一斤米泔浸三日淨刮去黃皮銼細入糯米四兩焙乾一處搗為末每服米飲下二錢杏仁湯出本草治咳嗽旦夕加重憎寒壯熱少喜多嗔忽進退面色不潤積漸少食而其肺脈弦緊浮者此藥主之用杏仁半斤去皮尖及雙仁者於瓶納童子小便二升浸七日了漉出去小便以暖水淘過於砂盆內研成泥別入瓷瓶中以小便三升煎之如膏量其輕重食前熟水下一錢婦人室女服之更妙加味二陳湯出德生堂治遠年近日氣虛咳嗽喘逆嘔吐不得安眠甚危困者氣虛者立效人參半夏白茯苓甘草陳皮紫菀紫蘇枳殼炒去瓤桑白皮縮砂仁白豆蔻各一兩木香半兩上㕮咀每服四錢水一盞半生薑五片棗一枚煎至八分去滓臨臥服之生薑五味子湯小品療咳五味子五合生薑八兩紫菀一兩半夏二兩洗吳茱萸一兩款冬花半兩細辛二錢附子一枚炮茯苓四兩甘草二兩炙桂心一兩上切以水一斗煮取五升分溫三服老人可服五合忌海藻菘菜豬肉冷水羊肉水餳生菜醋物生蔥半夏丸出和劑方治肺氣不調咳嗽喘滿痰涎壅塞心下堅滿短氣煩悶及風壅痰實頭目昏眩咽膈不利嘔吐噁心神思昏憒心怔面熱涕唾稠黏並皆治之白礬枯過三兩半夏三升洗去滑薑汁合浸一宿上為細末生薑自然汁和丸如梧桐子大每服二十丸加至三十丸食後臨臥生薑湯下酒下亦可療五嗽一曰上氣嗽二曰飲嗽三曰臊嗽四曰冷嗽五曰邪嗽出聖惠方特生礬石一兩泥包燒半日巴豆十六枚去心皮熬別搗如脂款冬花一兩豉三百枚搗千杵上搗羅為末煉蜜和丸如大豆米飲下三丸不知稍增至四五丸忌野豬肉蘆筍太白丹出三因方治肺感寒熱咳嗽無度通明礬石枯成煉鍾乳寒水石煅水飛過各等分上研勻炊餅糊為丸如雞頭大每服一丸先嚼生薑胡桃各一片令細吸太陽氣和藥咽仍用茶清或溫酒送下止嗽丹皂角去皮弦官桂乾薑等分白礬少許上搗羅為末煉蜜為丸每服二三十丸臨臥服之立效治五嗽方出肘後方松屑銼取一二分皂角一三兩炙去皮子桂二分錢上搗蜜丸如梧桐子大每服十五丸小兒五丸日一二服溫脾湯治食飽而咳者甘草四兩大棗二十個上㕮咀以水五升煮取二升分三服溫服之若咽中痛而聲鳴者加乾薑一兩寧肺散一名寧神散治久新咳嗽肺氣不通漸咯膿血或壅滯不利咳嗽黏痰坐臥不安或語聲不出烏梅八錢御米殼一斤生醋炙炒上為細末每服二錢煎烏梅湯下不拘時候治諸般嗽皂角燒存性大順散川百藥煎五味子各等分上為末飴糖熬熱丸夜含化五分備急五嗽丸一名乾薑方治五種咳嗽一曰上氣嗽二曰飲嗽三曰臊嗽四曰冷嗽五曰邪嗽皆由肺受風寒氣不宣通所致無問久新輕重以至食飲不下語聲不出坐臥不安晝夜不止面目浮腫胸脅引痛背寒氣喘並宜服之肉桂去粗皮乾薑炮皂角去皮子炙黃各等分上為細末煉蜜丸如梧桐子大每服十五丸溫酒下或米飲下亦得食後服乾薑須是台州至好者皂角炮去皮子取肥大無孔者桂心紫色辛辣者削去皮三物並別搗不篩各秤等分多少任意和合後更搗篩一遍煉白蜜和搜又搗一二千杵每服三丸稍加大如梧桐子不限食之先後嗽發即服日三劉淮南云凡人患嗽多用冷藥見此熱藥即不肯用故每施此藥多效三才丸治嗽人參天門冬去心熟乾地黃以上各等分上為細末煉蜜為丸如櫻桃大含化服之三生丸治嗽胡桃仁一兩生薑一兩去皮細切杏仁五錢去皮尖上同研為泥就和作劑十三四丸臨臥爛嚼一丸數服即止療咳方棗一百二十個去核豉一百粒桃仁一百二十枚去皮尖兩仁者熬令黃色上搗為丸如棗大含之無不瘥又方療咳麻黃二兩去節紫菀二兩貝母三兩去心上搗篩蜜和丸如杏核綿裹含稍稍咽汁盡更作日二度又方療咳杏仁一百二十枚去皮尖熬豉一百枚熬令乾干棗四十枚去核上搗如泥丸如杏核含咽令盡日七八度盡更作出又方療咳爐中取鉛屑一分桂心二兩皂莢二兩去皮子炙上搗篩蜜和丸如梧子大大人米飲湯下服十五丸小兒五丸日二服忌生蔥時候同治咳嗽歌曰一兩清油二兩蜜半兩生薑自然汁紫菀麻黃及杏仁桔梗細辛再添入訶子枯礬等二錢慢火熬煎如黑漆臨臥飲服兩三匙明朝咳嗽無蹤跡人參清肺湯治肺胃虛寒咳嗽喘急胸膈噎悶脅肋脹滿迫塞短氣喜欲飲冷咽噎隱痛及療肺痿勞嗽唾血腥臭乾嘔煩熱聲音不出肌肉消瘦倦怠減食坐臥不安治咳嗽冷氣結脹猝上氣腹脹肩息以乾薑為末熱水調一錢服一方用酒漬之萊菔方治肺疾咳嗽用萊菔子半升淘擇淨焙乾於銚子內炒令黃熟為末以沙糖丸如彈子綿裹含之治咳嗽用枇杷葉治咳拭去毛煎湯服之療咳方用巴豆炮去殼勿傷肉以完者吞初日白飲服二枚二日三枚良忌野豬肉蘆筍治能下氣咳除風去咽中水雞聲用杏仁一兩去皮尖及雙仁者搗碎水三升研取汁於鐺內煎以物攪勿住手候三分減二冷呷之若不熟及熱呷即令人吐故慎之連州銀坑官成蜜方出本草治嗽氣嗽久者主之上用生訶黎勒一枚含之咽汁瘥後口爽不知食味另煎檳榔湯一碗服之立便知味人參潤肺湯治咳嗽急痰壅鼻塞方見潤肺湯杏霜湯調肺氣利胸膈治咳嗽止痰逆粟米炒一斗六升甘草炒十斤半鹽炒十六斤杏仁去皮尖麩炒另研十斤上為末每服一錢沸湯點服不拘時常服悅澤顏色光潤皮膚貝母散出危氏方治熱嗽辰時吃酉時可安兼治痰喘知母一兩新瓦上焙貝母一兩巴豆七粒同貝母炒略熟去巴豆不用上銼散餳糖一塊同煎服一方以二母為末入巴豆霜少許臨臥用生薑二片蘸藥夾定細嚼嚥下一方知母貝母末白糖和勻飯上蒸七次梧桐子大米湯下十丸或加葶藶五味子或二母隔紙炒加棗肉砂糖杏仁丸如彈子大新棉包含化青州白丸子出家藏經驗方治嗽大半夏一兩湯洗七次白附子一兩洗淨略炒川烏梅一兩略炮去皮核天南星一兩洗淨略炮天麻一兩全蠍一兩上為細末生薑自然汁煮糊為丸如梧桐子大每服十丸至二十丸食後茶清或熟水下如有癱瘓風溫酒下日進三服常服永無風痰膈壅之疾小兒驚風薄荷湯化下二丸國初青州謝家有老人遊山見兩人對弈老人旁觀久之弈者曰汝飢否曰然遂指桃樹曰汝食此老人摘一顆食已腹飽少頃欲歸弈人曰汝家已更兩世今雖還家子孫亦不能識且為我守門若有變怪切不可開弈人遽起不見良久但聞絲竹之聲亹亹而來老人開戶視之則弈人已對坐於門外曰吾固戒汝不得開不從吾言是無分也今有數方授汝歸使子孫售於世可以致富遂將老人推出墮於老人之宅子孫驚怪奔告鄰里里人曰汝家八十年前大父入山尋不見即此老人是也子孫方信以方鬻之果為潤屋至仁宗時有旨令其家上白丸子方其家深恐其間藥不便於至尊服食遂易之以進其後子孫有為房陵宰者親與番陽余童端學言其事且傳真方余時職教房陵辛丑歲中秋王少愚以郡檄至傳其所聞因筆之余得之今浙漕葉景夏服之果異於尋常者三妙湯出家藏經驗方治嗽罌粟殼大者四個烏梅二枚肥北棗二枚上銀石器中用水兩大盞煎一半候熟入少餳臨睡隨意熱溫冷飲數兩略仰臥少時嗽止武昌趙都統傳其家屢服得效款肺散出十便良方治嗽大半夏大杏仁各三十六個上以瓦鍋子內燒存性為末每服半錢至一錢溫米飲調下不拘時候服之三奇湯出海上方治咳嗽烏梅三個拍碎白餳兩塊米囊皮三個去瓤蜜炙為粗末上三味以齏汁大半盞煎去滓臨臥服煮浮丸出胡氏方治咳嗽不止半夏二兩飛羅面杏仁各半兩上搗羅細末以生薑自然汁丸如梧桐子大每服四五十丸以水一盞煮藥丸子浮用煎藥湯候溫旋呷吞下時入蜜少許葶藶散出楊氏家藏方治咳嗽痰涎喘氣葶藶半兩半夏生薑汁煎浸軟切作片子半兩巴豆四十九粒去皮同上二味一處炒候半夏黃為度上件除去巴豆不用只用上二味為細末每服一錢以生薑汁入蜜少許同調下食後立安散出楊氏家藏方治一切咳嗽喘急坐臥不寧麻黃九兩去根不去節炒焦黃石膏兩半生用罌粟殼一兩蜜炙苦葶藶半兩微炒藿香葉半兩人參去蘆頭四錢上件為細末每服三錢水一盞半生薑五片同煎至八分去滓白沸湯調下食後臨臥平肺湯出楊氏家藏方治咳嗽上喘知母半夏湯洗七次杏仁去皮尖炒麻黃去節阿膠蚌粉炒貝母以上各一兩桑葉款冬花甘草炙以上三味各半兩上件㕮咀每服三錢水一盞半生薑五片同煎至八分去滓溫服食後齏汁丸出楊氏家藏方治嗽並酒食所傷杏仁七粒去皮尖巴豆一粒去皮膜硃砂少許上件一處研成膏丸如黃米大每服七丸淡齏汁下臨臥小兒服一丸如酒積溫酒送下杏蘇飲子出楊氏家藏方治咳嗽聲重胸滿氣喘面目虛浮鼻塞清涕肢節痠痛及腳氣發動腳腫腳弱疼痛寒熱並宜服之紫蘇葉四兩半五味子去梗大腹皮烏梅肉三味三兩杏仁二兩四錢去皮尖陳橘皮去白一兩八錢覆盆子一兩八錢桑白皮一兩半麻黃去根節一兩半上件㕮咀每服三錢水一盞生薑三片黑豆三七粒同煎至七分去滓熱服食後臨臥皂莢煎余居士選奇方治嗽神驗皂莢一斤揉細用湯一碗打成濃汁杏仁二百四十枚天南星二兩半夏二兩上用文武火煎乾取南星半夏切作片子用生薑汁滲拌焙乾次用青州白丸子五貼白糖五塊烏梅肉二十個隔宿蒸餅半個齏汁半盞打糊為丸如梧桐子大每服三十丸臨臥煨生薑湯下睡時枕頭放高溫肺湯出鮑氏方治嗽一服安阿膠半兩炙生薑十片烏梅二個甘草一寸紫蘇半兩杏仁七個粟殼一個淨大半夏三個五味子十五粒上以水一大盞煎六分任意服臥時尤佳九仙散出衛生寶鑑治一切咳嗽桑花人參桔梗阿膠五味子烏梅款冬花以上各一兩貝母半兩米殼八兩去頂蒂蜜炒黃上為細末每服三錢白湯點服嗽住止後服款冬花清肺散出衛生寶鑑治咳嗽喘促胸膈不利不得安臥人參一兩去蘆甜葶藶一兩生用甘草一兩炒枯白礬一兩烏梅和核搗碎用一兩米殼醋炒四兩款冬花一兩上為細末每服一錢溫米湯調服食後忌油膩物及多言損氣安肺散出衛生寶鑑治咳嗽無問新久麻黃不去節二兩米殼四兩去頂蒂炒黃色甘草一兩炒上為末每服三錢水一盞入烏梅一個煎至七分臨臥溫服椒紅丸華佗中藏經方治嗽不止及補中益氣進食川椒揀淨二兩去目炒令出汗用乾山藥一兩川附子一兩炮去皮臍上同為細末以好酒煮淡木瓜和之再入臼中杵三五百下丸如桐子大每服十五丸空心食前鹽湯溫酒任下泄瀉米飲下如喉中痰涎如水雞聲曉夕不止者一兩服見效靈應散出衛生家寶方治一切咳嗽不問久新輕重鍾乳粉款冬花枯白礬各一兩甘草半兩炙輕粉一錢桂六錢上件為細末入鍾乳粉輕粉同研令勻每服半錢用匙挑入喉中咽津隨用茶清壓下每日臨臥只一服小兒或以糖少許和服五味子丸出衛生家寶方治嗽大罌粟殼去瓤四兩擘破用白餳少許入水將殼浴過令淨炒黃色五味子新鮮者去梗二兩須北方者為妙上為細末拌勻用白餳為丸如彈子大每服一丸水一盞捺破煎六分澄清臨睡溫服不拘時候調肺散出衛生家寶方治嗽不問新舊服之立效麻黃二錢不去節甘草二錢生用杏仁二錢不去皮尖燈心十尺長湖南蚌粉一塊如彈子大上銼為散入瓷瓶內用水一大碗煮至小半碗候五更初再溫過去滓作一服滓再煎一服經年嗽者一二服止聖棗子出衛生家寶方治老人小兒諸般嗽疾悉皆治之佛耳草天南星半夏甘草款冬花鍾乳粉各二兩桂半兩去粗皮井泉石半兩研極細如粉上為末內用天南星半夏生薑汁製成餅子炙黃次入六味用好皂角去黑皮炙捶碎用齏汁浸一宿挼取汁煎成膏子和藥捻棗核子大如服時用好棗一枚去核入藥在內濕紙裹文武火煨香為度臨臥時糯米飲嚼下無比飲子出衛生家寶方治一切咳嗽神效罌粟殼四兩去中瓤蒂子杏仁一兩去皮尖山梔子二兩去仁用殼五味子半兩生用阿膠半兩麩炒甘草半兩炙黃色上為粗末每服二錢重用水一大盞入生蘿蔔二片煎至六分去滓溫服肺傷湯出衛生家寶方治遠近一切嗽疾渾身勞倦脅下疼時作潮熱飲食減少五味子一兩紫菀一兩熟地黃二兩阿膠二兩炒人參半兩杏仁一兩炒去皮尖黃耆一兩蜜炙川當歸二兩桑白皮一兩炒甘草一兩炙款冬花一兩桂一分枳殼半兩去皮瓤炒乾薑一兩半泡青蒿半兩小便浸黃芩半兩上為粗末每服三錢水一盞入生薑三片棗子烏梅各一枚煎至七分去滓空心溫服一日三服紫蘇散出王氏博濟方治咳嗽墜痰涎潤肺紫蘇貝母款冬花漢防己各等分上四味為細末每服一錢水一茶碗煎至七分溫服之人參款冬花膏多年咳嗽變為瘕去節麻黃桔梗加粉草杏仁葶藶炒知母貝母款冬花人參烏梅各等分搗羅為細莫交差煉蜜為丸如彈子含化一丸去根芽治一種咳嗽直至嗽頓吐飲食痰物俱出盡方少定此乃是肝木克脾土風痰壅盛宜以青州白丸子作主料更加少許木香丁香橘紅天麻全蠍去頭足殭蠶炒去嘴足等分上同為散子大料煎服即效出澹寮方咳逆方出澹寮方萊菔子熱湯泡研取汁調木香調氣散乘熱啜服半夏湯出朱氏集驗方治嗽半夏二十一個每個作四塊煨生薑一塊煨甘草一寸煨皂角一寸煨無蟲蛀者去皮上為粗末水二碗煎一碗服海藻散出朱氏集驗方治咳嗽胸中不利痞滿短氣心中時悸手足煩不思飲食時惡寒海藻赤茯苓五味子各半兩半夏北細辛杏仁各三錢半上㕮咀生薑煎食後服甚妙五味子湯出直指方治汗下後氣閉咳嗽五味子半兩生薑一錢棗子五枚麥門冬人參杏仁陳皮各二錢上銼每服二錢水二盞煎至一盞服華蓋散出王氏博濟方治咳嗽麻黃二兩不去節甘草二兩炙杏仁二兩湯浸去皮尖後秤上先以二味為粗末後入杏仁研細拌勻每服三錢水一盞煎七分去滓日三服橘參散出如宜方一名橘皮湯治咳嗽橘皮制二兩人參甘草炙半兩上㕮咀薑棗竹茹煎不拘時候溫服杏蜜湯出楊氏家藏方治停飲咳嗽開胃思食醒酒快膈半夏三兩湯洗淨再用湯一碗入白礬末一錢同半夏浸一宿焙乾杏仁六兩湯浸去皮尖炒令黃甘草四兩炙白礬六兩炒訶子八枚煨去核生薑一斤四兩去皮切作片子焙乾上為細末入鹽和勻每用二錢入蜜半匙沸湯點下鍾乳丸出十便良方治肺虛寒嗽不已宜服此方鍾乳粉三兩人參白朮乾薑甘草各二兩款冬花紫菀各一兩上搗羅為細末煉蜜和丸如彈子大每服一丸含化人參丸出衛生家寶方治肺壅嗽有痰寒熱涕腥宜服人參半兩枳殼半兩去瓤用皂角水浸三日焙乾半夏半兩南星半兩二味白礬水浸三日令乾為細末生薑汁捻成餅子炙乾入藥訶黎勒半兩用麩炒去核木香一分上為細末煉蜜和丸如梧桐子大每服二十丸食後用生薑湯吞下百花湯出十便良方治肺氣不順咳嗽氣逆胸膈不利杏仁四兩生薑四兩研取汁與杏仁同研細白蜜半斤上同攪拌勻以瓷器盛蒸熟柳木匙撈候成膏每以沸湯點一匙頭甚妙溫水下八味杏蘇散出楊氏方治肺感風寒咳嗽不已痰涎喘滿語聲不利面目浮腫肺氣不順紫蘇葉半夏曲紫菀五味子陳橘皮甘草各半兩杏仁一兩桑白皮一兩半上搗羅為粗末每服四錢以水一盞半生薑三片同煎至七分去滓食後服蛤蚧丸出楊氏家藏方治肺臟內傷咳嗽氣急積久不除漸見羸瘦蛤蚧一雙炙去口足訶子煨去核阿膠蛤蚧粉炒成珠子熟乾地黃洗焙麥門冬去心細辛去葉土甘草炙以上六味各半兩上為細末煉蜜和丸每一兩作十丸每服一丸食後含化治肺胃俱虛咳嗽涎沫間有血絲不能食出澹寮方四味理中湯濃煎北五味子湯調下五味止嗽斂陰降氣故虛損若用補肺藥反傷脾胃不和乾薑等助脾使土旺生金肺氣安妥也鳳髓湯出楊氏家藏方潤肺療咳嗽松子仁四兩胡桃肉湯浸去皮炙三二兩蜜半兩煉上先研爛次入蜜和勻每服一錢沸湯點服潤肺散出本草治肺虛咳嗽阿膠杏仁各一兩糯米五合炒上搗羅為細末每服一錢匕不計時候白湯調下七星散治肺氣虛寒咳嗽不已漸成癆證者成煉鍾乳粉別研款冬花佛耳草肉桂去粗皮以上四味各半兩白礬三錢煅過甘草三錢炙上為細末每服半錢分七處用蘆葦管逐一吸之用溫白湯少許送下食後服如聖飲子出楊氏家藏方治肺氣虛寒咳嗽喘急人參去蘆一兩款冬花一兩烏梅一兩捶碎罌粟殼去瓤二兩炙上㕮咀每服五錢用水二盞煎至一盞去滓熱服食後臨臥細辛五味子湯出楊氏家藏方治肺氣受風邪胸膈停寒頭目昏暈鼻塞聲重咳嗽嘔逆心腹痞滿脅下刺痛五味子二兩炒細辛去葉土一兩陳橘皮去白二兩高良薑一兩銼炒甘草一兩銼炒上㕮咀每服三錢水一盞半煎至七分去滓熱服不拘時候煨薑湯出十便良方治肺寒咳嗽日久不止並上焦氣逆生薑一斤半於星火內煨熟切片杏仁半斤去皮尖蒸透甘草四兩末山藥三兩末神麯三兩末上先將生薑杏仁同研細取三件藥末和為餅子焙乾為細末著炒鹽花五兩滾和沸湯食後臨臥點一二錢神草湯出楊氏家藏方治肺與大腸俱受風冷咳嗽喘急不進飲食大便泄利時作寒熱人參去蘆頭白朮白茯苓去皮以上三味各一兩當歸去蘆頭切酒浸一宿焙乾秤一兩半黃耆二兩細辛去葉土一兩五味子二兩乾薑一兩炮陳橘皮去白肉桂去粗皮一兩半白芍藥一兩桑白皮八錢別研甘草八錢炙上㕮咀每服五錢水一盞半入生薑三片烏梅一枚同煎至八分去滓溫服不拘時候紫菀散出楊氏家藏方治肺感寒邪咳嗽不止風壅相搏頭疼聲重紫菀茸二桑葉人參去蘆頭甘草炙四味各半兩杏仁去皮尖麩炒別研細桔梗去蘆頭微炒二味各一兩麻黃去根節湯煮三兩沸焙乾秤三兩分上㕮咀每服五錢水一盞半煎至八分去滓溫服食後麻黃散出楊氏家藏方治肺感寒邪暴生咳嗽涎痰上喘阿膠蛤粉炒皂角去皮尖令黃色杏仁去皮尖炒甘草炙麻黃去節等分上為細末每服二錢臨臥時用白湯調下治肺痿咳嗽吐涎沫心中溫溫咽燥而不渴者出肘後方生薑五兩人參一二兩甘草二兩大棗十二枚上以水三升煮取一升半分再服又方出肘後方用甘草二兩水三升煮取一升半分再服又方出肘後方用生天門冬搗取汁一斗酒一斗飴一升紫菀四合銅器於湯上煎可丸丸如杏子大服一丸日可三服又方出肘後方治肺痿咳嗽吐涎沫心中溫溫咽燥而不渴者方見溫脾湯麻黃蒼朮湯秘藏方治秋冬每夜五更嗽連聲不絕乃至天曉日高方緩口苦兩脅下痛心下痞悶臥而轉驚筋攣肢節痛痰唾涎沫日晚神昏呵欠全不進飲食柴胡根半錢麻黃八錢羌活根五分防風四分甘草三分生甘草根四分炙甘草三分當歸四分草豆蔻六分黃芩三分黃耆一錢半蒼朮五錢五味子九個上㕮咀作二服煎法如常稍熱服臨臥主咳嗽痰飲出本草以枕材煮汁服之治咳嗽出本草以獺肝燒灰酒調服之一方用獺肉燒灰為末酒服治嗽出本草以棎果未熟者和蜜食之主消食止咳嗽虛羸悅人出本草以無漏子久服無損也治瘦病咳嗽出本草以豚膽和小便生薑橘皮訶黎勒桃皮煮服治嗽補肺丸出本草用杏仁二大升小者不用揀卻雙仁及陳臭者以童子小便一斗浸之春夏七日秋冬二七日並皮尖於砂盆子中研細濾取汁煮令魚眼沸候軟取麵糊去皮仍時柳篦攪令著底後即以馬尾羅或粗布下之日曝通丸即丸服之時食前後總須服三十丸五十丸任意茶酒下忌白酒粥只用米泔飲自初浸至成常以紙蓋之以畏塵土也如無馬尾羅即以粗布袋下之如取棗穰法同治咳嗽用甜瓜蒂不限多少細研為末壯年一字以下老年去半字早晨井花水下一食頃含沙糖一塊良久涎如水出涎盡有老痰一塊吐出布在水上如鹼涎盡食粥一兩日如吐多困甚即咽麝香湯一盞即止矣麝香細研溫水調下此藥不大吐逆只出涎水甚效
