body:
  text: 卷一百五十七咳嗽門總論夫人所以滋養其身者惟氣與血呼吸定息衛氣之常失常則為咳嗽津液流潤榮血之常失常則為痰涎咳嗽吐痰氣血已亂矣以故世治嗽之藥極多而卒不能遍效者蓋其治病之因不一世謂五嗽且以五臟而言之要之內因七情外合六淫飲食起居房勞叫呼皆能單復相互而為病故經云五臟六腑感寒熱風濕皆令人咳又微寒微咳厲風所吹聲嘶發咳熱在上焦咳為肺痿秋傷濕冬咳嗽皆外所因喜則氣散怒則氣激憂則氣聚思則氣結悲則氣緊恐則氣劫驚則氣亂皆能發咳卻內所因其如飲食生冷房勞作役痰咳尤多是皆不內外因也傷風咳者脈浮憎寒壯熱自汗惡風口乾煩躁鼻引清涕傷寒咳者脈緊憎寒發熱無汗惡寒煩躁不渴傷熱咳者脈數煩熱引飲口乾或吐涎沫聲嘶咯血傷濕咳者脈細骨節煩痛四肢重著洒洒淅淅並屬外所因診其脈浮為風緊為寒數為熱細為濕隨其部位與人迎相應喜傷心者喘咳而喉中介介如腫狀甚則咽腫喉痹名為心咳咳不已則小腸受之小腸咳狀與氣俱失怒傷肝者咳而嗽兩脅下痛甚則不可轉側兩胠脅下滿名為肝咳不已則膽受之膽咳之狀咳嘔膽汁思傷脾者咳而右脅下微痛陰陰引肩背甚則不可以動名為脾咳咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出憂傷肺者咳而喘息有聲甚則唾血名為肺咳咳不已則大腸受之大腸咳狀咳而遺屎恐傷腎者咳而腰背相引痛甚則咳涎名為腎咳咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食此等皆聚於胃開於肺肺與膈俞最近故內因多先有所感世人併名肺咳嗽也並屬內所因診其脈隨其部位與氣口相應浮緊則虛寒沉數則實熱弦澀則少血洪滑則多痰病者咳嗽發作寒熱引腰背痛或復喘滿此因房勞傷腎病者中滿腹脹搶心痛不欲食此因飢飽傷脾病者咳嗽左脅偏痛引小腹並肘腕痛此因疲極傷肝病者咳嗽吐白涎口燥聲嘶此因叫呼傷肺病者咳嗽煩熱自汗咽乾咯血此因勞神傷心並屬不內外因診其脈隨其類應假如尺脈浮澀而數則知情欲傷腎右關脈濡則知飲食傷脾左關脈弦短則知疲極傷肝但不應人迎氣口者即是不內外因皆可類推診其右手寸口氣口以前脈手陽明經也其脈浮則為陽實陽實者病苦胸滿善喘脈微大為肝痹咳引少腹咳嗽脈浮大者生沉小伏匿者死又云脈浮直者生沉硬者死咳且嘔腹脹且泄其脈弦弦欲絕者死咳而脫形發熱脈小硬急者死咳且羸瘦絡脈大硬者死咳而尿血羸瘦脈大者死問曰咳病有十何謂也師曰有風咳有寒咳有肢咳有肝咳有心咳有脾咳有肺咳有腎咳有膽咳有厥陰咳問曰十咳之證以何為異師曰欲語因咳言不得竟謂之風咳飲冷食寒因之而咳謂之寒咳心下堅滿咳則肢痛其脈反遲謂之肢咳咳則引脅下痛謂之肝咳咳而唾血引手少陰謂之心咳咳而涎出續續不止引小腹謂之脾咳咳而引頸項而唾涎沫謂之肺咳咳則耳無所聞引腰並臍中謂之腎咳而引頭痛口苦謂之膽咳咳而引舌本謂之厥陰咳風咳者不可下之寒咳肢咳肝咳刺足太衝心咳刺手神門脾咳刺足太白肺咳刺手太淵腎咳刺足太谿膽咳刺足陽陵泉厥陰咳刺手大陵久咳為㽷咳而時發熱脈在九菽者非虛也此為胸中寒實所致也當吐之夫咳家其脈弦欲行吐藥當相人強弱而無熱乃可吐耳咳家其人脈弦為有水可與十棗湯下之不能臥出汗者陰不能受邪故也留飲咳者其人咳不得臥飲項上痛咳者如小兒掣縱狀夫酒客咳者必致吐血此坐久極飲過度所致也其脈沉者不可發汗久咳數歲其脈弱者可治脈實大數者死其脈虛者必傷胃其人本有支飲在胸中故也正屬飲家上氣汗出而咳亦有支飲咳而小便利若失溺不可發汗汗出即厥逆冷夫病者吐血喘咳上氣其脈數有熱不得臥者死寒家咳而上氣其脈數者死謂其人形損故也脈大而散散者為氣實而血虛名曰有表無里上氣面膚腫肩息其脈浮大不治加痢家尤甚上氣躁而喘者屬肺脹欲作風水發汗愈肺咳謂無痰而有聲肺氣脹而不清也嗽為無聲而有痰脾濕動而為痰也咳嗽是有痰而有聲蓋因傷於肺氣而咳動於脾濕之痰而為嗽也治咳嗽者治痰為先治痰者下氣為上是以南星半夏勝其痰而咳嗽自愈也枳殼陳皮利其氣而痰自下也痰而能食者大承氣湯微下之痰而不能食者厚朴湯治之夏月嗽而發熱者謂之熱痰嗽柴胡湯四兩加石膏一兩知母半兩用之冬月嗽而發寒熱者謂之寒嗽小青龍加杏仁服之蜜煎橘皮湯燒生薑胡桃皆治無痰而嗽者此乃大例更當隨時隨證加減之有勞嗽一證皆因肺虛或苦風寒暑濕及勞逸抑鬱憂思喜怒飲食飢飽致臟氣不平積微至著以致漸成肺痿肺癰者咳嗽有多痰者有乾咳無痰者甚則失聲咳吐膿血身體發熱五心煩熱盜汗自出夜夢鬼交日輕夜重肢體憔悴皮膚乾燥頰如敷胭脂飲食日少古人云瘡一月不愈則瘡中有蟲咳嗽一月不愈則肺中有蟲若肺中有蟲則藥難為功矣肺蟲如蠶漸致變亂日將月積致成勞蟲自此而始且勞蟲亦有傳屍亦有久病病者心憂日慮藥不奏功而證候日深自此而成著床者多矣感風傷冷挾熱受濕瘀血停水與夫肺實肺虛皆能壅痰而發嗽也感風者鼻塞聲重傷冷者悽清怯寒挾熱為焦煩受濕為纏滯瘀血則膈間心悶停水則心下怔忪或實或虛痰之黃白唾之稀稠從可知之大法肺脈浮為風邪所客以發散表之肺脈實為氣壅內熱以清利行之脈濡散為肺虛以補肺安之其間久嗽之人曾經解利以致肺胃俱寒飲食不進則用溫中助肺加和平治嗽等輩至若酒色過度虛勞少血津液內耗心火日熾遂使燥熱乘肺咯唾膿血上氣涎潮其咳連續而不已惟夫血不榮肌故邪在皮毛皆能入肺而自背得之尤速此則人參芎歸所不可無一種傳屍病涉邪惡五臟反克毒害尤深近世率用蛤蚧天靈蓋桃柳枝丹砂雄黃安息香通神之劑然則咳嗽證治於此可以問津索途矣抑猶有說焉肺出氣也腎納氣也肺為氣之主而腎為氣之藏凡咳嗽喘壅之症自覺氣從臍下逆奔而上者此腎虛不能收氣歸元也當以補骨脂安腎丸主之毋徒從事於寧肺諸氣諸痰咳嗽喘壅之症須用枳殼以為佐枳殼不惟寬中又能行其氣氣下痰下他證自平夫痰嗽之疾有一時感冒寒熱者不可便投半夏南星等熱藥恐凝滯其痰終身為痼疾惟宜發散去熱而痰嗽自止切宜審於用藥傷冷咳嗽身不憎寒發熱得之脾胃受寒傳入於肺遂成寒嗽嗽甚則吐白沫而多嘔此當先用溫藥溫其脾胃如治中湯胡椒理中湯丁香半夏丸五嗽丸皆要藥或用理中湯加五味子煎服諸咳嗽附論夫咳嗽病有數種有熱嗽有冷嗽有肺氣嗽有飲氣嗽熱嗽者年少力壯體氣充滿將息傷熱積熱所成故致熱嗽此但飲食取冷兼以藥壓之自歇冷嗽者年衰力弱體氣虛微又復寢食傷冷故成冷嗽此亦但將息以溫熱兼進溫藥則當平復肺氣嗽者不限老少宿多上熱復因飲食將息傷熱則常嗽不斷積年累歲肺氣衰便成氣嗽此嗽不早療遂成肺癰若此將成多不救矣飲氣嗽者由所飲之物停積在胸水氣上衝入肺故得此氣便成嗽久而不除漸成水氣若作此病亦難療之熱嗽之狀更無其餘但遇於熱便發此宜合生地黃等七味湯服之方寧嗽湯出直指方諸嗽通用桑白皮炒紫蘇細辛北五味子橘皮半夏制茯苓去皮杏仁去皮縮砂仁枳殼制北梗甘草炒等分上銼每服三錢姜四片烏梅半個食後煎服治嗽杏蘇飲杏仁款冬花前胡半夏制五味子麻黃柴胡桑白皮人參桔梗蘇梗以上各等分上為細末每服三錢水一盞半生薑五片同煎七分通口服寧神丸止一切咳嗽白茯苓去皮五味子炒乾山藥杏仁去皮尖麩炒別搗阿膠炒成珠子熟乾地黃各一兩人參當歸並去蘆頭麥門冬貝母並去心柏子仁別搗杜仲炒絲斷百部肉桂去粗皮川芎細辛去苗甘草炙銼以上各半兩上為細末煉蜜和丸每兩作二十丸含化咽津不拘時常令咽喉中藥氣不歇益佳每服一丸杏仁煎治咳嗽不拘日月遠近杏仁湯浸去皮尖雙仁炒麻黃不去根節大黃銼炒柴胡去苗甘草炙銼桂去粗皮各三二兩上為細末先用水一斗半煎藥末水盡後旋再添五升煎令得所以生絹濾去滓再熬成煎瓷器中盛每服一皂子大臨臥含化咽津阿膠湯治咳嗽阿膠炒令燥桑根白皮銼炒甘草炙銼各一兩五靈脂炒貝母炒去心知母銼焙各半兩上為散每服三錢水一盞烏梅一枚生薑三片煎至七分去滓溫服款冬花膏治益肺氣止嗽人參白朮款冬花去梗甘草炙川薑炮鍾乳粉上各半兩為細末煉蜜丸每兩十丸每服一丸食前米飲下含化止嗽丸治肺氣不和咳嗽常服潤養心肺及治大人小兒一切咳嗽服之大效款冬花炒杏仁去皮尖麩炒貝母去心泡各一兩吳白芷甘草炙各一兩半上為細末煉蜜和丸每兩作十五丸每服一丸至二丸時時含化不拘時候寧肺散治一切寒熱痰盛久新咳嗽不止者御米殼四兩木瓜三兩御米殼一處用蜜二兩水化開炒微黃五味子人參各一兩皂角二兩上為末每服二錢烏梅同煎食後臨臥服大效治久新嗽不已皂角一寸刮去皮炙麻黃去節杏仁炒去皮尖桂去粗皮五味子各一分上㕮咀每服三大錢水二盞生薑二十片同煎至七分去滓溫服不拘時候阿膠散治一切咳嗽虛人老人皆可服阿膠麩炒馬兜鈴各一兩五靈脂研桑白皮各半兩甘草炙一分上為末每服一錢水一盞煎六分通口食後夜臥服四滿丸療五嗽一曰上氣嗽二曰飲嗽三曰痹嗽四曰冷嗽五曰邪嗽乾薑桂心躑躅花芎藭紫菀芫花根皮各二分人參細辛甘草炙半夏鬼督郵各一分蜈蚣一枚去頭足炙上為末蜜和丸如大豆大服五丸米飲下日三不知加至七八丸服此丸無不瘥方秘不傳忌羊肉餳生蔥生菜海藻菘菜等治嗽補虛牛骨一副取髓白沙蜜八兩杏仁四兩去皮尖另研細乾山藥四兩去皮為末胡桃一斤取肉四兩去皮另細研上將骨髓沙蜜砂鍋內煎熬沸絹帛濾去滓盛在瓶內將前藥杏仁胡桃肉山藥三味研細都放在瓦瓶中紙封瓶口煮一日一夜每日早晨服一匙溫湯化服當歸飲治男子因打傷負重女人因勞苦用力而傷肺經既損遇風寒則為咳嗽或咳血或至紫黑宜用此藥去心肺間瘀血仍灸肺腧病即蘇肺腧穴在三椎兩傍各一寸半蘇木生地黃當歸大黃赤芍藥各等分上為末酒調服得利去瘀血即止服養榮湯調理治瘦病咳嗽上取豬膽和小便生薑橘皮訶黎勒煎服防己丸治咳嗽不計新久及治肺癰防己杏仁湯浸去皮尖雙仁炒貝母去心焙甘草炙銼各二兩甜葶藶炒四兩上為細末麵糊丸綠豆大每服二十丸生薑湯下一方溫湯下百部紫菀丸治咳嗽百部新瓦上炒紫菀去苗土款冬花擇洗各一兩半桔梗炒貝母去心炒各一兩上為細末煉蜜丸梧子大每服二十丸煎甘草烏梅湯下食後臨臥服貝母丸一名百花丸治咳嗽上膈煩滿貝母去心炒白茯苓去黑皮麥門冬去心焙山芋百合各一分甘草炙銼阿膠炙燥各半兩五味子一兩上為細末用黃蠟一兩二錢熔作汁入末拌和丸如彈子大每服一丸水一盞煎至七分和滓溫服細呷一方加蜜和丸百部散治咳嗽無問新久冷熱一切宜服款冬花百部各一兩知母貝母各半兩去心炒上為細末每服三四錢用暖齏汁調下食後服金粟丸治一切嗽粟殼去筋蜜炒一兩五味子半兩杏仁炒半兩胡桃肉半兩上為末同蜜丸如彈子大水一盞煎服此藥尤穩七寶散治諸般咳嗽老少並宜服北五味子罌粟殼去頂蒂瓤陳皮甘草各等分上同炒用姜擦子攪令香碾粗末每服三錢水一盞半烏梅一個煎至一盞去滓溫服食前臨臥不犯銅鐵器煎尤妙治嗽出百一選方款冬花一兩炙乾別研桂去粗皮不見火甘草炙乾各一分鵝管石半兩透明面者別研上各修制了入乳缽中一處碾細每服一錢許五更時蘆管旋吹入咽喉中服訖仰睡吐涎沫為效忌生冷油膩鹽醬等物宜淡食兩日化痰丸治咳嗽涎喘南星生薑各一兩半夏枯礬各一兩半上細末水糊為丸梧子大每服二十丸食後溫齏汁送下日二服治一切咳嗽痰盛人參半夏一兩薑製白礬六錢杏仁一兩生去皮尖上為細末生面糊為丸好酸漿水煮三五十沸濾去澄干每服三五十丸只用煮藥漿水送下真武湯出直指方治少陰腎證水飲與裡寒合而作嗽腹痛下利白茯苓白朮白芍藥各一兩熟附子半兩上銼每服二錢半加生乾薑細辛五味子各半錢姜三片食前服凡年高氣弱久嗽通用仍間服養正丹溫肺丸治肺伏寒冷氣咳嗽乾薑炮一兩半皂莢去皮尖炙令黃陳橘皮湯浸去白焙白茯苓去黑皮各半兩上為細末煉蜜丸梧桐子大每服二十丸生薑湯下不拘時桃仁丸一名貝母丸治咳嗽亦治諸咳不以遠年日久不治桃仁杏仁二味各湯浸去皮尖雙仁細研一兩款冬花貝母二味各一兩搗細末與前研藥和勻上先以沙糖一兩入銚子內銷熔後入藥同熬黃熟入臼搗丸如彈子大每服一丸含化咽津又方療咳蜀椒一合去目炒令汗出杏仁去皮尖少於椒半倍熬豉少多與杏仁相似熬款冬花如豉一半多上搗蜜和為丸晚間不食含一丸如彈丸大則知效驗十年者五六日知良療咳嗽羊肺湯款冬花六錢紫菀乾薑細辛各一錢桂心一錢甘草炙二錢五味子一錢白前三錢食茱萸一錢羊肺一枚細切上切以水八升合煮取三升去滓一服三合日三禁食鹽蒜生菜海藻菘菜生蔥葶藶方治嗽含膏葶藶子一兩紙襯熬令黑知母一兩貝母一兩上同搗篩以棗肉半兩沙糖一兩半同入藥中和丸如彈每服以新綿裹一丸含之徐徐咽津甚者不過二三丸一捻金一名貝母散治遠年近日諸般咳嗽自胸膈逐下寒痰停飲至臟腑次早必利一次溫粥補之五七歲小兒減藥末一半姜一片昔年信州永豐岐路人作直鎮符結束手持時牌前面寫申時背面寫寅時口稱申時服了寅時效日得千金服者無不取效宜其寶此而不傳忽因犯事到官有罪寓客趙吉老提舉韓挾取其方懇貸其罪知母貝母各一兩為末巴豆六粒去油存性上為細末和勻每服一錢姜三片蘸藥末後靜臥細嚼薑湯嚥下便睡閉口氣其嗽即定如神一方用餳糖一塊得效百部丸治大人小兒咳嗽百部焙麻黃各七錢半為末杏仁四十九粒去皮尖炒別研為末上和勻煉蜜丸如芡實大熟水化錢氏加松子肉五十粒細研別入沙糖噙化極妙若肺受風邪不散喘急面色青黃目能認人口不能言煎陳皮罌粟桑白皮湯化下一丸黑靈丸治咳嗽不拘日近年深皆效羌活去蘆頭獨活去蘆頭各一錢巴豆三十粒不去皮半夏三十粒同入瓶子內鹽泥固濟炭火三斤煅過取出入前二味上搗羅細末煉蜜丸如梧桐子大每服一丸以後馬兜鈴飲下馬兜鈴散馬兜鈴半兩桂去粗皮一錢分甜葶藶微炒半兩上銼粗搗篩每服一錢水一盞煎至八分去滓服丸藥其餘飲時時呷令藥氣常在咽喉中妙貝母散治咳嗽貝母十粒大者去心麩炒令黃阿膠炙燥甘草炙銼各半兩上為細散每服二錢臨臥煎糯米飲調下服後去枕仰臥訶黎勒散治咳嗽用訶黎勒不拘多少緊實者炮熟去核為散每服二錢豬𦚟一枚去脂膏劈開摻藥在內入打破烏梅一枚合定以芭蕉葉包之外濕紙重裹煨令香熟去紙葉烏梅只將葉並𦚠慢慢嚼吃日三兩服寧神散治嗽御米殼二兩蜜炒人參苦葶藶各半兩上為細末入烏梅同煎三五沸去滓稍熱服食後薏苡仁湯一名桔梗湯治咳嗽肺癰初萌桔梗二兩甘草二兩薏苡仁三兩上銼如麻豆大每服五錢水煎入糯米為團米軟為度食後服金粟丸治咳嗽不問新舊一服立效此方出內外傷辨雌黃雄黃信各等分上為末糯米棕和丸如蘿蔔子大每服四丸食後臨臥茶清下忌熱物平肺湯上用獖豬精肉三兩批薄作三片以皂角三寸暖水浸後捻去水用膩粉二錢摻在肉內以濕紙裹煨至五更時爛嚼以淡薑湯或桑白皮煎湯下至日午瀉下痰涎是病根也平氣散治一切咳嗽吐痰涎惡風不能食人參白朮川芎當歸五味子甘草炙木瓜干紫蘇子炒茯神烏梅去核杏仁去皮尖麩炒桂心白芷各等分上為末每服二錢水一盞姜三片棗一枚煎七分溫服一方無棗天門冬煎療咳嗽天門冬六兩去心杏仁三升去雙仁皮尖研碎椒三升熬令汗出桂心厚朴炙杜仲苦參各三兩附子六兩炮乾薑六兩烏梅二枚炮人參六兩蜈蚣一枚去頭足炙上別搗杏仁其餘者合搗下篩以五斤膠飴和搗千杵服如大棗一枚日三忌冷水豬肉生蔥鯉魚治咳嗽用平胃散川百藥煎細末和勻略睡少時沸湯調服治諸般嗽出本事方栝蔞一個和皮子使甘草十兩文滑石十分文蚌粉黑色者五分文葛粉十分文山藥三二兩桂花十分文桂皮十分文苦參五分文上為末每服二錢姜五片棗子三枚水一大盞入蜜同煎至八分服治嗽干咯散一名八仙散出百一選方李松傳於一被囚道人屢以取效一切咳嗽喘急鵝管石嘗著不澀而涼者是鐘乳石井泉石款冬花佛耳草甘草白礬各一兩官桂人參各半兩上為細末每服半錢蘆管食後吸之涼冷茶清送下一方無人參或吸菸喉中一方無井泉石佛耳草玉仙散出御藥院方治一切咳嗽白礬一錢枯烏梅去核四枚佛耳草杏仁去皮尖麩炒四十個款冬花知母貝母去心各一錢半甘草炙三錢上為細末每服半錢乾摻舌上咽津無時服紫參丸出醫方大成治遠年近日咳嗽諸藥不效