body:
  text: 卷一百九十諸血門大衄附論夫大衄者口耳皆血出是也蓋血為營而藏於肝氣為衛而主於肺肺開竅於鼻三者相為流通若熱氣盛則血氣因而妄行血氣衝錯溢於上竅故鼻衄不已而口耳皆出血也方遠志湯出聖濟總錄治大衄不止遠志去心天門冬去心焙麥門冬去心焙阿膠炙燥當歸切燥藕節洗淨甘草炙大黃銼炒芎藭各半兩桂去粗皮沒藥研麻黃去節桃仁浸去皮尖炒黃各一分牡丹皮三分柴胡去苗一兩上粗搗篩每服三錢以水一盞煎至七分去滓空心溫服遠志散出聖惠方治大衄不止遠志半兩去心白芍藥三分桂心一分天門冬去心麥門冬去心阿膠搗碎炒黃燥當歸藕節甘草炙微赤銼川大黃炙微焦以上各半兩沒藥生乾地黃柴胡去苗各一兩桃仁一分去皮尖雙仁麩炒微黃上為散每服三錢水一盞煎至五分去滓不計時候溫服阿膠散出聖惠方治大衄未止計數升不知人事以生地黃汁調服立效散出十便良方治大衄熟艾二彈子大牛皮膠一兩炙黃燥上以煎了豉汁一大盞同煎至七分去滓不計時候分溫二服之治鼻血不止出肘後方上用白芨為末津調塗鼻山根上立止生地黃飲一名地黃散治大衄口鼻出血及胸心氣急勞熱等證黑神散出聖濟總錄治鼻中及耳皆出血不止白刺蝟皮燒灰存性半兩人中白半錢溺盆內積垢上細研為散每用少許搐在鼻中苦參散出聖惠方治大衄口耳皆出血不止苦參一兩黃連一兩去須川大黃銼微炒梔子仁柏葉各半兩桑耳一兩上為散每服三錢水一盞煎至五分去滓入生地黃汁一合攪勻不計時候溫服紫參散出聖惠方治大衄不止紫參一分鬱金半兩子芩一分甘草半分炙微赤銼白龍骨半兩鹿角膠半兩搗碎炒令黃燥上為散每服以生薑汁並蜜水相和調下二錢苦參湯出聖濟總錄治大衄口耳皆血出不止苦參銼黃連去須一兩大黃炒一兩生地黃汁一合梔子七枚去皮上粗搗篩每服三錢水一盞入生地黃汁在內煎至七分去滓溫服三黃散一名瀉心湯旅舍備要方治鼻衄過多並酒渣大便閉而有熱者蜜水調服柏葉散一名側柏散治口鼻出血如湧泉須臾不救又方出聖惠方治大衄口耳皆出血不止斷弓弦一分燒灰白礬一分燒灰上為散以二大豆許吹入鼻中瘥阿膠湯出聖惠方治大衄口耳皆出血不止阿膠炙燥一兩蒲黃半兩上粗搗篩每服二錢水一盞生地黃汁一合煎至六分溫服急以帛系乳隨衄左右系之兩鼻竅俱出則盡系兩乳不計時候一方用生地黃切煎聖效方出聖惠方治鼻衄至一斗並大衄綿五兩人中白一團如雞子黃大上燒為灰研細每服二錢溫水調下萊菔酒治大衄不止上萊菔不拘多少每細銼一合用酒一盞先煎酒令百沸再下萊菔再煎一兩沸俟溫濾去滓頓服玉漿散出傳信方治大衄上白麵不拘多少每服三錢用冷水調下一方有鹽一錢治出血不止用紙三四層冷水浸透搭鼻梁及項頸二處干則再用漿水浸濕血即止鼻久衄附論夫鼻衄者由熱乘血氣也肝藏血肺主氣開竅於鼻中若臟腑勞損血氣生熱血得熱則流散妄行隨氣發於鼻者名為衄血若臟虛不復勞熱停積故衄經久不瘥也面色不榮目昏眩冒嘔逆者尤宜急治之方桑根白皮丸出聖濟總錄治鼻久衄不止桑根白皮炙銼山梔子去皮殼黃芩去黑心甘草炙銼羌活去蘆頭防風去叉當歸切焙訶黎勒煨去核胡黃連各一兩地骨皮人參白茯苓去皮柴胡去蘆頭各半兩上為末煉蜜和丸如桐子大每服二十丸空心食前溫酒送下五黃丸出濟生拔萃方治衄血久不止大便結燥者下之大黃五錢芒硝三錢甘草一錢生地黃三錢梔子一錢黃芩一錢黃連一錢半上為細末煉蜜為丸如梧桐子大溫水下阿膠散出聖惠方治衄久不止阿膠杵碎二兩炒黃燥桂心當歸細辛各一兩龍骨二兩蒲黃一兩亂髮三兩燒灰上為細散每服以粥飲調下二錢一方有芎藭無蒲黃清肺飲子一名麥門飲出試效方治衄血吐血久不愈五味子十個麥門冬去心當歸身人參生地黃各半錢黃耆一錢上為粗末都作一服水二盞煎至一盞去滓稍熱服不拘時更以三稜針於氣衝出血立愈刺薊散出聖惠方治鼻衄久不止刺薊二兩竹茹二兩蒲黃艾葉亂髮灰白藥各一兩上為散每服三錢水一盞煎至六分去滓入地黃汁一合攪勻不計時候地黃散出濟生拔萃方治衄往來久不愈生地黃熟地黃枸杞子地骨皮各等分上為細末每服二錢蜜湯調下日三茜梅丸出醫方大成治衄血無時茜草根艾葉各一兩烏梅肉焙乾半兩上為末煉蜜為丸如梧桐子大每服三十丸烏梅湯下經雲天暑地熱經水沸溢蓋血妄行陽勝陰也鞠運判茂之嘗苦此疾予授此方令服後愈三黃散亦得亂髮灰散出聖惠方治鼻衄久不止令人目眩心煩亂髮灰一分桂心半兩乾薑一分炮製上為細末每服二錢溫漿水調下二錢先食漿水或粥調服榴花散出聖惠方治鼻衄久不止諸藥不效石榴花曝乾故綿灰各半兩人中白一分上同研細更入麝香一錢研均少少吹入鼻中立止麥門冬飲子出濟生拔萃方治衄血不止麥門冬生地黃各等分上銼每服一兩水煎服又衄血先硃砂蛤粉之藥次木香並黃連大便結下之大黃芒硝甘草生地黃溏軟梔子黃芩黃連可選而用之蒲黃散出聖惠方治鼻衄經久不止蒲黃二兩石榴花一兩末上和研為散每服以新汲水調下一錢治鼻衄久不止身面俱黃出聖惠方赤馬通七塊以水一盞絞汁阿膠三分搗碎炒令黃燥上將馬通汁調阿膠令稀稠得所少少滴入鼻中須臾即止吹鼻散出聖惠方治鼻久衄不止緋帛灰三錢亂髮灰二錢上研細少許吹入鼻中鉛丹散出聖濟總錄治鼻久衄上用鉛丹不拘多少研如粉每服二錢發時新汲水調下白礬散出聖濟總錄治鼻久衄上用鉛礬半兩燒令汁盡細研羅為末以少許吹鼻中特效方出危氏方治衄血久不止上以蒲黃血竭為末吹入鼻中又方上用薄荷以水童便煎用紗帛包塞入鼻中又方旅舍備要方用棕櫚燒灰隨左右鼻搐之葉氏方上隨衄左右以新汲水洗足又方上以左捻紙索子系手第四指咒曰血神住立止治鼻衄血久不止出肘後方上用桔梗為末水服方寸匕日四五服立止吐血下血又方出聖惠方用老鴟翅關大骨微炙搗為細末少少吹入鼻中又方出聖惠方上用烏賊魚骨半兩去甲搗為細散少許吹入鼻中即止如未便著少許干浮萍草末吹入鼻中亦可又方出聖惠方用乾薹二兩燒灰為末少許吹入鼻中治鼻中瀝血經旬日不止出聖惠方上用南牆牆衣如兩杏仁大鼻中塞之初時被血推卻仍取塞之衄蔑附論夫內經謂膽移熱於腦則辛頞鼻淵傳為衄蔑瞑目夫血得熱則湧溢得寒則凝滯膽受胃熱循脈而上乃移於腦蓋陽絡溢則血妄行在鼻為衄在汗空為蔑二者所出雖不同皆熱厥血溢之過也今之治衄蔑者專於治血不知血之行留氣為之本猶海水潮汐陰陽之氣使然也明夫經路逆順則血與氣俱流通而無妄行之患矣方地黃竹茹湯出聖濟總錄治衄血汗血消熱結生地黃切焙一斤青竹茹五兩黃芩去黑心當歸焙甘草炙芍藥芎藭各三兩桂去粗皮一兩釜底下焦黃土一塊如雞子大上㕮咀如麻豆大每服五錢水一盞半煎至八分去滓溫服竹茹湯出聖濟總錄治血衄汗血熱盛所致生竹茹生地黃切焙黃芩去黑心各二兩蒲黃芍藥麥門冬去黑心各一兩上粗搗篩每服五錢水一盞半煎至八分去滓食後溫服黃柏飲出聖濟總錄治鼻衄汗血黃柏去粗皮葛根銼黃芩去黑心各一兩半雞蘇一兩凝水石二兩生竹茹半兩上粗搗篩每服三錢水一盞入生地黃半分切煎七分去滓食後臨臥溫服白藥散出聖濟總錄治衄血汗出白藥二兩半生地黃汁三合生藕汁一合生薑汁少許上搗白藥為末先煎三物汁令沸每一半錢入熟水一合白藥末一錢攪勻食後溫服一方有麥門冬汁三合和生麥門冬煎紫參散出聖濟總錄治衄血汗血久不止紫參黃芩去黑心各一分鬱金甘草炙各半分上為散每服三錢以生地黃汁一合白蜜一匙水一盞同煎沸微溫調下日三刺薊湯出聖濟總錄治熱氣上行衄血汗血刺薊雞蘇葉各二兩黃連去須犀角鎊生乾地黃各一兩上粗搗篩每服五錢水一盞半煎至八分去滓溫服不拘時定命散出宣明論治膽受熱血妄行鼻中衄蔑並血汗不止硃砂水銀麝香各等分上為末每服半錢新汲水調下不計時候如引藥看老幼虛實加減鬱金散一名金光散出聖濟總錄治衄血汗血鬱金甘草炙青黛各半兩上為散每服二錢用雞子調下生地黃飲出聖濟總錄治衄血汗血獨聖湯出聖濟總錄治血妄行或衄或蔑上用黃芩五兩去黑心細銼如麻豆大每服七錢水二盞煎至一盞去滓溫服一方為末酒調下如神肺臟壅熱吐血附論夫肺居膈上與心臟相近心主於血肺主於氣氣血相隨循環不息若臟腑久積熱毒則胸膈壅滯血與氣逆行上注於肺肺壅不利故令吐血也又有體虛勞損酒食過度憂愁思慮恚怒氣逆傷於肺者亦皆吐血不止也方補肺白花煎出聖惠方治肺壅熱吐血後咳嗽疲劣白蜜五合生地黃汁五合生薑一合黃牛乳五合藕汁三合秦艽一兩去苗白茯苓一兩柴胡一兩去苗乾柿三枚煮軟細研如糊杏仁二兩湯浸去皮尖雙仁麩炒微黃黃明膠四兩搗碎炒令黃燥上為細散與蜜及諸藥汁兼乾柿同於銀鍋子內以慢火煎成膏別藏於瓷器中每服不計時候以粥飲調下一茶匙蒲黃散出聖惠方治肺壅熱氣逆吐血蒲黃三錢當歸銼微炒人參去蘆頭天門去心焙麥門冬去心焙甘草生用赤芍藥各半兩黃耆一兩阿膠搗碎炒令黃燥生乾地黃各一兩上為細末每服不計時候以粥飲調下一錢天竺黃散出聖惠方治肺臟壅熱吐血心膈煩悶天竺黃人參側柏葉焙大黃銼炒犀角鎊黃耆銼焙赤茯苓去黑皮馬兜鈴焙各半兩鹿角膠炒燥一兩上為散每服一錢暖生地黃汁調下不拘時刺薊散出聖惠方治肺壅熱吐血不止刺薊川升麻鹿角膠搗碎炒令黃燥羚羊角青竹茹當歸銼微炒各半兩生乾地黃一兩甘草一分生用上為散以水二大盞半煎至一盞半去滓分溫五服不計時雞蘇散出聖惠方治肺臟壅熱痰唾內有血咽喉不利雞蘇莖葉赤茯苓半夏湯洗七次去骨桔梗去蘆頭黃耆銼各一兩甘草半兩炙微赤銼生乾地黃二兩麥門冬一兩半去心焙上為散每服五錢以水一大盞入生薑等分煎至五分去滓食後溫服五汁湯出聖惠方治肺壅熱極肺脹喘吐血不止生藕汁生地黃汁刺薊根汁牛蒡根汁生薑汁半合生蜜一合上和令勻每服一小盞不計時候溫服一方無生薑汁白茅根散出聖惠方治肺臟熱壅滯唾血桑根白皮二兩銼白茅根銼黃芩紫菀洗去土各一兩犀角屑三分刺薊根一兩半上為散每服四錢以水一中盞入竹茹一分煎至五分去滓入生地黃汁一合更煎三兩沸每於食後溫服地榆散出聖惠方治心肺熱盛吐血不止地榆銼甘草銼生用各半兩柏葉吳藍黃芩各三兩刺薊一兩上為散每服四錢以水一中盞入青竹茹一分煎至六分去滓每服食後溫服紅藍花散出聖惠方治肺壅熱吐血不止紅藍花一兩犀角屑茅根銼麥門冬去心各三分伏龍肝半斤以水五大盞浸濾取汁浸濾上為散每服三錢以伏龍肝散水一盞入竹茹一分煎至六分去滓不計時候溫服一方入亂髮灰一錢和勻服伏龍肝散一名明膠散出聖惠方治肺壅熱極肺脹吐血不止黃明膠搗碎炒少黃燥桑葉各一兩伏龍肝一兩半上為細末每服不計時候以糯米粥飲調下一錢紅藍花散出聖惠方治心肺熱極吐血不止紅藍花二兩伏龍肝一合甘草半兩生用上為細末每於