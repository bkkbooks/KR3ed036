每片如兩指大上每以膠一片入地黃汁一盞內飯甑蒸之取出放溫旋服六一散出朱氏集驗方治咯血發寒熱黃耆六兩炙甘草一兩炙上為細末如常服不拘早晚干吃亦得治咯血出經驗良方用薏米即薏苡仁不計多少為末熟食豬胰切片蘸藥食後微空時取食之蓋薏米能補肺豬胰導入經絡耳陳敏捷云治肺癰唾濃血薏米為末米飲調下一方搗碎米煎服趙君獻云屢用效香附子散出百一選方治肺破咯血用香附子去皮毛為細末以米飲調下地黃煎治憂恚絕傷唾血胸脅疼痛蒲黃散出聖惠方治唾血不止用蒲黃一兩研碎每服三錢冷水調下不拘時候溫酒服亦可一方藕節煎湯服白芨散出朱氏集驗方治咯血嘔血肺損或食飽負重而得者服之用白芨為末米飲調服又治鼻衄雪水調或新汲水調服台州獄史憫一大囚將死頗照顧之因感之曰吾七次犯死罪盡力抗諱苦遭訊拷坐是肺皆𢮍損至於嘔血適得一藥每用其效如神荷君庇護之恩特以此報只白芨一味米飲調下耳其後凌遲劊者剖其胸見肺間竅穴數十處皆白芨補填之色猶不變洪貫之聞其說為郢州長壽宰規之赴洋州任一卒忽苦咯血勢絕危貫之用此救之一日而止血竭散治一切傷力咯血人參血竭款冬花鵝管石甘草上等分研為極細末先取生薑汁另以盞盛之以蘆筒微微吸藥末入喉中次吸生薑汁少許送下忌濕面魚鯉生冷之物茯苓補心湯出如宜方治心氣耗不能藏血五心煩熱咳嗽唾血木香枳殼桔梗甘草炙陳皮制各半兩蘇葉乾葛半夏制前胡人參茯苓各七錢半上㕮咀姜七片棗一枚煎服氣盛者去木香以參蘇飲對四物湯名茯苓補心湯治咳嗽有血本方又治婦人妊娠惡阻久嗽咯血出永類鈐方白扁豆半兩生薑半兩枇杷去毛半夏制人參各一分白茅根三分上煎檳榔湯服不拘時候聖餅子出華佗中藏經方治咯血青黛一錢杏仁四十粒去皮尖用黃明膠煎黃色取出細研上同研勻卻以所煎膠少許熔開和捏作錢大餅子每服用乾柿子一個中破開入藥一餅合定以濕紙裹慢火煨熟取出以糯米粥嚼下又方出朱氏集驗治咯血上用烏梅不拘多少煎湯調百草霜一服愈槐花散出朱氏集驗方治咯血失聲石槐花炒為末用糯米飲調服仰臥二服治唾血出本草上取桂心搗作末以水下方寸匕九竅四肢指歧間出血附論夫營衛大虛腑臟傷損血脈空竭因其恚怒失節驚忿過度暴氣逆溢致令腠理開張血脈流散也九竅出血喘咳而上氣其脈數有熱不得臥者難治也方黑散子出直指方凡諸竅出血並主之隔年蓮蓬敗棕櫚頭髮並燒存性等分上為末每服二錢煎木香湯調下或只用棕櫚燒灰米湯調下亦可竹茹地黃湯出聖惠方治九竅四肢指歧間出血方青竹茹蒲黃各半兩生地黃一兩細切上㕮咀以水一大盞煎至六分去滓食後溫服蒲黃散出聖惠方蒲黃微炒龍骨燒赤各一兩上為細散每服以糯米粥飲調二錢服之治七孔出血出經效良方上牛脂又名牛菔艻切為粗末每服一勺水瓦器煎不用鐵器去滓連服以紗帛蓋頭頂上仍將稈心扎小指根男左女右治人有九竅四肢指歧間皆血出此暴驚所致勿令患人知出聖惠方以井花猛噀其面治衄如神荊芥湯治九竅出血又方出直指方治暴驚風九竅出血其脈虛者用靈砂百粒分三次人參煎湯下治耳鼻口中出血不止出經效良方用赤馬糞燒灰溫酒調下一錢或和水絞取汁每服一小盞頻頻服之又方出聖惠方取新生犢子未墮地臍屎曬乾燒灰為末服方寸匕日四五服又方出聖惠方用生地黃汁一升生薑汁一合相和溫服一小盞日四五服治九孔出血出千金方用搗荊葉汁酒服二合一本作荊芥治九孔出血出肘後方以刺薊一握絞取汁以酒半盞調和頓服之如無青汁只搗乾者為末冷水調服三錢血妄行附論凡病者諸血積聚合發為衄而清氣道閉濁氣滂溢凝停胸胃中即滿悶吐出數斗至於一石者名曰內衄或因四氣傷於外七情動於內及飲食房勞墜墮傷損致營血流聚膈間滿則吐溢是謂妄行方必勝散出醫方大成治男子婦人血妄流溢吐血衄血嘔血咯血並婦人下血過多致發虛熱調血則熱自不作又用心過度發熱當以參蘇飲二分四物湯一分用之小薊並用根蒲黃微炒熟地黃洗芎藭當歸去蘆人參去蘆烏梅去核各一兩上㕮咀每服五錢水一盞半煎至七分去滓溫服不拘時柏皮湯出朱氏集驗方治血常失道暴出色鮮燥引飲大柏皮梔子各一兩甘草半兩上㕮咀每服五錢水二盞煎至一盞去滓溫服地黃五味丸出百一選方治妄行吐血生地黃熟地黃五味子各二兩為細末煉蜜為丸如梧桐子大每服三十丸一日三度空心用好酒送下地黃散出經驗良方治經血妄行及鼻衄不止生乾地黃龍腦薄荷各二兩甘草生用一兩為末每服一錢食後新汲水調下蒜連丸治諸血妄行黃連日乾研為末七獨頭蒜一顆煨熱取肉研細上入米醋些子搗和丸如梧桐子大日乾每三四十丸陳米飲送下金屑丹出三因方治三因吐血及衄血下血一切血溢妄行用雌黃鬚葉子者為粗末入棗肉線系定滿著湯煮用黑錫同雌黃斤兩熔作汁傾入湯煮一日添湯候冷取出雌黃洗淨乾研為細末卻以煮藥棗肉和丸如梧桐子大每服五七丸黑錫煎湯下治妄行吐血出經驗良方用熟地黃洗去土焙乾為細末用好真金墨新汲水磨半盞許分作二服調熟地黃末服之墨須松煙者張裁衣其子病服此即止屢作屢效石灰散治吐血妄行以石灰刀頭上燒用井水調下後用扁柏葉同階前草根研自然汁嚥下治血妄行用牛口蘇連根握起洗淨於石臼中椿細用生薑數片絞汁或井花水多用熱酒調服將此滓罨於腦後隨即便愈歸脾湯出危氏方治思慮傷脾心多健忘為脾不能統攝血以致妄行或吐血下血白朮茯神黃耆酸棗仁炒去殼龍眼肉各一兩人參木香各半兩甘草二錢半上銼散每服水一盞姜五片棗一枚同煎不拘時候溫服南天竹飲出聖濟總錄治血妄行九竅皆出服藥不住者南天竹草生如拇指大一把銼山梔子三十枚去皮生薑一塊如指大大棗五枚去核甘草炙半兩燈草如小拇指大一把上銼入瓷器中水一大碗煮至半盞去滓通口服大效黃耆湯出衛生家寶方治諸血妄行綿黃耆打扁二寸許切以湯炮蜜一大匙浸半日控干焙黃色一兩官桂八錢去粗皮不見火川當歸用生地黃汁浸焙乾汁多尤妙白芍藥以童子小便浸少時焙乾一兩敗龜殼一兩醮醋炙並黃色用茅花八錢生用人參八錢紫暈者焙乾大薊一兩旋取微焙用白茯苓八錢米泔淨去紅絲焙乾蒲黃半兩銀器中炒墨紫色用伏龍肝半兩甘草一分炙上㕮咀每服五錢用小盞酒少半盞煎九分放溫並三服妙順氣散出衛生家寶方治氣弱不足血氣欲妄行覺喉口血腥微微咯出唾中帶些紅色當歸一兩洗淨去蘆細切川芎二兩細切木香四兩細銼陳皮二錢洗去白焙細銼大薊野生荊芥紅花者干溫皆可用上為末每服四錢水一盞紫蘇葉煎七分去滓溫服不拘時候土馬駿湯出聖濟總錄治心肺蘊熱或恚怒氣逆使血妄行日夕不止土馬駿焙乾二兩枳實去瓤麩炒白茯苓去黑皮甘草炙銼秦艽去苗土柴胡去苗人參生乾地黃焙各一兩上粗搗篩每服三錢水一盞煎至七分去滓食後溫服汗血附論內經言藏真通於心血脈之氣行焉又言肝藏血人臥血歸於肝蓋血雖藏於肝而心則行之也若肝心二臟俱傷於邪故血隨心液為汗而出方人參湯一名竹茹湯出千金方治汗心傷邪血汗人參桂去粗皮甘草炙銼白朮白芍藥各一兩黃芩去黑心川芎當歸切焙淡竹茹各二兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時竹茹湯出聖濟總錄治吐血汗血尿血淡竹茹人參芍藥桔梗銼炒生乾地黃焙當歸切焙甘草炙銼桂去粗皮芎藭各一兩上粗搗篩每服五錢水一盞半煎至一盞去滓不拘時溫服神白散出聖濟總錄治血汗從膚腠出及鼻衄五七日不住上用人中白不計多少刮在新瓦上用火煏干研令極細每服二錢入麝香少許溫酒調下一方治鼻衄不止用麝香少許每吹入鼻中立瘥如聖散出聖濟總錄治血汗用郁李仁去皮尖研細每服一錢研鵝梨汁調下血餘散治汗血治血自皮膚間濺出出百一選方以煮酒垌上紙碎撧如楊花用手捏在出血處即止治肌衄及腿上血出用胎髮燒作灰敷之即止一方吹入鼻中諸失血附論夫諸陽統氣諸陰統血陰勝則陽虧而陽病陽盛則陰虧而陰病陽病侵陰血失常道故或吐或衄或從口鼻若暴出而色鮮心煩燥悶時欲引飲至一二升或至一斗以陽入於陰血是熱則流散如天地之經水天暑地熱則經水沸溢而湧起故有內衄肺疽其證大同而小異吐血嘔血唾血三者謂之失血也方大阿膠丸出醫方大成治肺虛客熱咳嗽咽乾多唾涎沫或有鮮血並勞傷肺胃吐血嘔血並皆治之麥門冬去心半兩乾山藥熟乾地黃五味子各一兩遠志去心一分丹參貝母炒防風去蘆各半兩阿膠炒兩茯神去木柏子仁百部根人參杜仲炒各半兩茯苓一兩上為末煉蜜丸如彈子大水一盞煎六分和滓服每服一丸當歸地黃湯出宣明論治嗽血衄血大小便血或婦人經水不調月水過多喘嗽當歸半兩芍藥川芎白朮染槐子黃藥子各半兩生地黃一兩甘草茯苓去皮黃芩白龍骨各一兩上為末每三錢水一盞煎七分去滓食前溫服一方無甘草龍腦雞蘇丸出危氏方除煩解惱下熱肺熱咳嗽衄血吐血血崩血淋解酒毒膽疽等證並止渴除驚涼上膈雞蘇葉淨一兩真蒲黃二兩炒木通一兩阿膠二兩炮炙甘草一兩半生地黃六兩為膏人參黃耆各二兩麥門冬二兩去心柴胡二兩同木通二物一處水半升浸二宿取汁入膏上為細末好蜜二斤先煉二沸下生地黃末不住攪時時入木通柴胡汁慢慢熬成膏勿令焦將余藥未同和丸豌豆大每服二十丸嚼破溫水下如虛勞煩熱消渴驚悸煎人參湯下如咳嗽血衄吐血麥門冬湯下並食後如血崩淋疾空心服諸淋車前子湯下一方丸如梧桐子大每服三十丸食後服敗毒散吞之瘥敗毒散出危氏方治肺熱胸中鬱熱衄血兼治血淋吐血口臭並皆治之上加桑白皮麥門冬煎吞雞蘇丸生地黃散出濟生拔萃方治諸血無寒下血衄血吐血溺血皆屬於熱生地黃熟地黃枸杞子地骨皮天門冬黃耆芍藥甘草黃芩各等分為粗末每服一兩水煎脈微身涼惡風每一兩加桂半錢人參湯治吐血血汗大小便下血膠艾散出千金方治上焦熱膈傷吐血衄血或下血連日不止欲死並主之艾葉竹茹各一升阿膠如手掌大乾薑二兩上㕮咀以水三升煮取一升去滓內馬通汁半升煮取一升頓服又取新馬尿與少水和絞取汁一方不用竹茹乾薑作七服黃耆膏子煎丸治除煩解勞去肺熱咳衄心熱驚悸脾胃熱口乾吐血肝膽熱液出口苦腎熱神志不定上而酒毒膈熱消渴下而血滯五淋血崩等病人參白朮各一兩柴胡黃芩各一兩白芷知母各半兩甘草炒半兩鱉甲一個醋炙上為細末黃耆膏子丸梧桐子大每服三十五十丸百沸湯下空心服又用黃耆半斤粗末以水二斗熬一斗去滓再熬不住攪成膏至半斤入白蜜一兩餳一兩熬蜜餳熱得膏十兩冷丸藥芍藥竹茹湯出千金方凡吐血衄血溺血臟氣虛膈氣傷或起驚悸治之生竹皮一升銼芍藥黃芩各一兩芎藭當歸切焙桂心甘草上㕮咀以水一斗煮竹皮減三升下藥煎取二升分三服寧志膏出如宜方治出血失血過多心神不安睡臥不得語言失當人參酸棗仁各一兩辰砂半兩上為末蜜丸如彈子大每一丸薄荷湯下一方燈心湯調琥珀末下側柏散一名柏葉散出經驗良方治內損吐血下血或飲酒太過勞傷於內血氣妄行其出如湧泉口鼻皆流須臾不救則死服此即安柏葉一兩半蒸乾人參去蘆荊芥穗燒灰各一兩上為末每服三錢入飛羅面二錢拌和新汲水調和稀糊相似啜服立效又方用百草霜川白芷研為末每服三錢濃米飲並服單方出朱氏集驗方治嗽血咳血用小兒胎髮燒灰麝香酒調下每個小兒胎髮作一服婦人病用男胎髮男人病用女胎髮黑神散出經驗良方治傷損大吐血或因酒食飽低頭掬弄吐血至多並血妄行口鼻俱出但聲未失無有不效百草霜蛤粉上等分為末每服二錢用糯米飲調下側柏枝研汁尤妙遇鼻衄搐一字皮破炙瘡出血舌上出血並乾摻上立止一方不用蚌粉百草霜即鍋底灰又名鍋墨可用鄉人家燒野草鍋底上黑灰名曰百草霜也秋蓮散一名恩袍散治吐血嘔血咯血蒲黃敗荷葉曬乾各一兩上為細末每服三二錢桑柏皮湯調下黃耆湯治吐血或因酒食飽低頭掬弄吐血至多並血妄行口鼻俱出但聲未失無有不效枳實三十個炒為末黃耆二兩甘草半兩紅棗三十個同枳實未搗爛慢火焙焦上為末用米飲調二錢食後服生犀散治一切積毒伏熱吐血衄血嘔嗽咯血傷寒雜病下血皆可服升麻二兩鬱金半兩大黃甘草各一兩上為細末每服三錢水一盞半煎至七分去滓溫服無時三黃補血湯出衛生寶鑑方治六脈俱大按之空虛面赤善驚上熱熟地黃二錢生地黃三錢當歸一錢半柴胡一錢半白芍藥半兩牡丹一錢川芎二錢黃耆一錢升麻一錢上㕮咀如麻豆大每服半兩水二盞煎至一盞去滓稍熱食前服治吐血及下血並婦人漏下出肘後方用水蘇莖葉煎去滓飲之治吐血蠱毒痔血女子腰腹痛大便後出清血者出千金方取東向蘘荷根搗絞取汁二升頓服立瘥治吐血鼻衄腸風血崩用醋淬赭石為末湯調下治血不止以蒸餅兩三個榧子不拘多少將蒸餅食盡榧子去殼研碎末不計時候白湯下每服三錢日進三五服血餘散治諸血不止用白茅花燈心各一握新汲水煎湯下若血淋婦人發更好加海金沙佐之切不得用百草霜蓮蓬止澀之劑地黃煎出朱氏集驗方治咯血嘔血嗽血生地黃沉水者取汁二升生藕取汁一升生薑四兩取自然汁真酥四兩人參一兩為細末阿膠一兩微炒為末上先將地黃藕汁薑汁同阿膠末入石器內慢火熬候稍稠即入參末熬少時入真酥熬攪勻稠得所每服一彈子大早晨日中臨臥含津咽或以麥門冬湯下亦得治無故遺血用亂髮及甲燒灰酒服方寸匕生血地黃百花丸出衛生家寶方治諸虛不足下血咯血衄血腸癖內痔虛勞寒熱肌肉枯瘦等疾生地黃十斤洗臼中搗取汁生薑半斤藕四斤搗取汁白沙蜜四兩無灰酒一升上以上五味用銀器或砂鍋內熬取二碗許漸成膏一半瓷器收之一半入乾山藥末三兩再熬一二十沸次入後藥川當歸焙熟地黃焙肉蓯蓉酒浸焙破故紙阿膠麩炒黃耆蜜炙石斛去根焙覆盆子白茯苓遠志取皮麥門冬去心焙枸杞子上十二味各二兩為末入山藥膏子丸如梧桐子大每服五十丸用溫酒調地黃膏子下日三服空心食前治吐血出本草上以紫蘇不限多少於大鍋內水煎令乾後去滓熬膏以赤豆炒熟杵為末調煎為丸如梧桐子大酒下三十丸至五十丸常服瘥治陰衄不止滴滴如赤豆汁口鼻俱出上五倍子為細末每服二錢溫熟水調不拘時候服
