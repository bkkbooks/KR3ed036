胬肉瞼內生瘡日多淚出獖豬膽一枚川芒硝龍腦三個豆大黃連一分去須搗為末上為細末與膽汁相和浸經一宿日二三度點之又方出聖惠方治眼生胬肉宜點此藥龍腦珊瑚真珠石決明搗細研水飛各一兩上都細研如面以白蜜一合相和更研令勻以瓷器盛不計時候用點之蕤仁膏出聖惠方治眼生胬肉赤脈貫瞳仁蕤仁一兩湯浸去皮研如膏膩粉胡粉青鹽各一兩上都入乳鉢內研令極細每用粳米大點於胬肉上每點時切宜避風胡黃連點眼方出聖濟總録治肝肺熱盛赤目生胬肉密陀僧研半兩蜜四兩重湯煮胡黃連去須如豆大一兩上先將黃連於蜜內浸一宿次日入密陀僧末和勻用白瓷碗盛即用黑豆一斗於鍋內以水煮候乾卻將藥碗在豆上勿令豆汁入內候豆熱為度取出用帛濾過入龍腦半錢匕以銀石器盛三日後點眼不拘時貝齒散出聖惠方治風毒猝生胬肉欲滿及生浮翳珠管貝齒燒研一分鉛丹再研一分上同入乳鉢中研令極細納瓷盒中盛每以銅箸點眼少許白龍散出龍木論治目生胬肉或癢或痛不可忍龍腦一字馬牙硝光明者一兩上用紙一張裹疊牙硝按實常在著肉衣下養一百三十日為度取出細研如粉取四錢龍腦同研令細不計年歲深遠眼內或生翳膜漸漸昏暗遠視不明但瞳仁不破散者並可治每用兩米大點杏仁膏出聖濟總録治目生胬肉或癢或痛息肉漸長侵覆瞳仁杏仁湯浸去皮尖雙仁一分膩粉半錢上合細研如膏以綿纏箸頭點胬肉上瘥南硼砂出再指方治胬肉瘀突南硼砂色黃腦子少許細研上以竹草蘸點其上玄參麥門冬煎湯調洗亦可散服鯽魚貼方出聖濟總録治目生胬肉澀痛以鯽魚鮮者去皮骨取肉一片中央開一竅正點眼上日三五度易之又方出危氏方治風熱上衝胬肉攀睛用清萍少許研爛入片腦少許貼眼上頓效治目眥及胬肉出龍木論用礬石最白者納一黍米大眥上及胬肉上便即冷淚出綿拭之令惡汁盡其疾頓減眥自清亮便瘥礬石須真白好者治目中胬肉赤脈貫瞳子者及治目熱生膚赤白膜方出聖惠方以雄雀屎和首生男子乳薄點即消神效治猝患赤目胬肉坐臥痛者用好梨一顆搗絞取汁黃連三枝碎之以綿裹漬令色變仰臥注目中杏仁方出聖惠方治眼生胬肉赤瘀偏睛不退築損用杏仁百個新者於飯甑內蒸之候冷去皮尖研濾取汁硇砂一錢用白湯淋熬干相和研勻每用少許點之三五上胬目內自消一方生杏仁七枚去皮細嚼吐於掌中極熱綿裹箸頭將點胬肉不過三五度瘥乾薑方出百選方治眼生瘀肉澀痛及治風毒上攻兩眼暴赤腫隱澀難開發即洗用川乾薑一味捶碎每三錢末用水二盞煎至一盞半去滓通手淋洗初洗時少痛少定即清快甚效一方以薄綿緊裹沸湯泡乘熱洗之如冷再燙再洗一次目中生肉欲滿及生珠管方出肘後方搗貝母絹篩真丹等三攪和以注目上日三四度數日愈治眼築損胬肉出出本草方以生杏仁七枚去皮細嚼出於掌中及熱以綿裹箸頭將點胬肉上不過四五度瘥目生管附論夫目生珠管風熱痰飲漬於肝血氣蘊積津液結聚所由生也肝藏血故肝受血而能視氣調血和則精華見於目今邪乘於肝氣受病為風熱熏蒸痰飲漸積使血氣壅閼上衝於目津液結聚狀如珠管故以名焉方龍腦煎一名清涼煎出聖惠方治眼中生膚翳垂生珠管治目生珠管方出千金方滑石手爪甲燒龍骨貝齒丹砂各等分上治下篩以新筆點取當珠管上日三度良滑石散出聖惠方治目猝生珠管滑石龍腦各一分手爪甲燒半分上細研如粉以新筆染藥點珠管上日三四次貝齒散出聖惠方治眼生珠管貝齒燒灰手爪甲燒灰龍骨以上各半兩上同研令極細每用少許點珠管上日三四度甚妙銅青丸銅青一兩細墨半兩上合研為末醋和丸如白豆大每用一丸以乳汁新汲水各少許浸化以銅箸點之貝齒散出聖惠方治目生珠管鉛丹膏出聖惠方治眼猝生珠管鉛丹半兩鯉魚膽汁量鉛丹多少用上合調如膏點珠管目眥中日三五次白蜜方出龍木論治目猝生珠管以白蜜少許點目中仰臥冷淚出半日許洗之生蜜住家養者為上又方出聖濟總録治目猝生珠管用龍腦一兩搗羅為散每點少許珠管上又方出聖惠方治目猝生珠管用牛膝葉根不計多少搗絞取汁點珠管上日三次兼治赤目良
