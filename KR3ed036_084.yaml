body:
  text: 卷八十四眼目門倒睫拳攣附論夫臟腑久積風熱內熏肝經沖發於目始則腫赤隱痛多淚日久津液澀少瞼腫皮急致睫倒拳刺隱瞳仁治法當起立毛睫又刺太陽經令出血及批鐮除其惡血仍服除風退熱之劑龍木論云倒睫拳攣外障此眼初患之時皆因肝家受熱膈內風虛眼多淚出或癢或痛乍好乍惡以手揩摩致於眼毛倒攣刺隱瞳仁磣澀睛上白膜遮滿急宜洗鐮出血尉烙切恐眼皮漸小急開合稍難然後宜服細辛散補腎丸立瘥歌曰若因風赤淚涓涓翳膜潛生碧漸瞞乍好乍惡多年後眼皮急小欲開難倒睫拳攣如刺磣磨隱瞳仁豈可安療者去毛睫赤斷太陽針血最為先湯藥又除風與熱披鐮數數點朱煎方犀角芎藭散出聖濟總録治眼瞼緊急倒睫拳攣犀角鎊芎藭羚羊角鎊木香檳榔煅銼茯神去木山芋前胡去蘆頭牛膝去苗桂去粗皮枳殼去瓤麩炒大黃銼炒各等分上為末每服三錢匕空心食前溫酒調下防風湯出聖濟總録治風熱沖肝目多睫倒車前子散出聖濟總録治眼倒睫赤眼疼痛不開旬效散出德生堂方治眼倒睫拳毛少腦川芎金叉石斛淨木賊去節各二錢人蛔蟲略陰乾上為細末用葦管吹入左右鼻中補腎出龍木論治倒睫拳攣外障乾山藥五味子車前子人參澤瀉茯苓細辛黃芩各二兩乾地黃三兩上為煉蜜為丸如梧桐子大每服十丸空心茶清下退膜丸一名決明丸治倒睫拳攣隱瞳仁細辛湯出龍木論治睫拳攣外障細辛防風茺蔚子知母各一兩羚羊角大黃桔梗黑參各一兩上為末以水一盞散一錢煎至五分食後去滓溫服玄參湯一名菊花散出聖濟總録治風熱攻眼磣澀疼痛漸致倒睫蕤仁秦皮去粗皮銼防風去叉各一兩山梔子仁菊花葳蕤各半兩竹葉二握上銼細以水三升煎取一升半去滓乘熱淋洗冷再暖作三度使木通湯一名麥門冬湯出聖濟總録治倒睫拳攣眼如針刺拘急澀痛生眵淚三黃丸出聖濟總録治倒睫拳攣目眥亦爛黃連去須一兩半大黃銼炒一兩細辛去苗葉龍腦上為末煉蜜為丸如梧桐子大每服二十丸食後臨臥溫服熱水下日再小兒量減又方出神效方治倒睫拳毛木鱉子二個令炒木賊一百二十節地龍二條去土赤龍爪一百二十個倒鉤針刺也上為細末摘去倒睫每日以紙捻蘸藥搐之一日三五次又方儒門事親治倒睫拳毛穿山甲炒地龍去土蟬殼五倍子各等分上為細末用藥時先將拳毛摘出後用藥一字隨左右鼻內搐之次日目下如線樣微腫是驗又方蝟刺香白芷青黛研棗樹上橫直棘針上各等分為細末左眼倒睫口噙水左鼻內搐之右眼倒睫右鼻搐之治倒睫爛眩出本草事方蜜一兩虢丹五錢上慢火熬成膏入輕粉五分熬令黑色逐時湯泡洗治倒睫拳毛出儒門事親用穿山甲以竹簟子刮去肉用羊腰窩脂去皮膜仍將穿山甲於炭火上炙令黃色用脂搽在山甲上如此數遍令酥為末隨左右眼噙水鼻內搐一字月餘見效治倒睫出海上方用十二月熱蠅子干為末鼻內搐之治倒睫毛在瞼中聚生刺人白睛唯覺癢悶漸漸赤膜起連上下瞼多赤生瘡若刺黑睛則淚出似白翳出若刺著瞳仁令眼疼痛羞澀不欲見明此多損傷宜速治療其法如上於平晨日未出之際令一眼明人把鑷子拔之去倒睫毛勾使毛斷連根去之下手十減八九疼痛立止至夜點千歲纍至濃汁三五日將息得平後或點首生男乳汁亦良慎風寒日月光及煙火房事五辛一月內即瘥防風飲子出試效方治倒睫拳毛黃耆炙甘草人參各一錢葛根半錢防風半錢當歸身七分半細辛葉蔓荊子各三分上件銼如麻豆大都作一服水二盞煎至一盞去滓溫服食後避風寒溫暖處服之一方有黃連無黃耆神效明目湯出試效方治眼稜緊縮倒睫拳毛損目及上下瞼眥赤爛睛赤疼痛昏暗則冷淚常流夜則眼澀難開而眵淚漏眼葛根一錢半甘草炙一錢防風一錢蔓荊子半錢細辛二分一法加黃耆一錢上㕮咀分二服每服水二盞煎至一盞去滓稍熱服臨臥治倒睫出保命集方無名異之末摻卷在紙中作捻子點著到藥處吹散以煙燻睫自起眼瞼垂緩附論夫眼瞼垂緩者以血氣不足膚腠開踈風邪客於瞼膚其皮垂緩下覆睛輪故俗呼為睢目又曰侵風久之則垂覆愈下眼閉難開方黃耆丸出聖濟總録治膚瞼下覆輪垂緩難開又明眼目黃耆銼蒺藜子炒去角獨活去頭柴胡去苗甘草炙生乾地黃焙梔子仁苦參白花蛇酒浸去皮骨白朮各一兩防風去叉菊花茯神去木山芋秦艽去苗土各三分天門冬去心焙枳殼去瓤麩炒白檳榔銼各一兩半上為末煉蜜為丸如梧桐子大每服三十丸空心溫酒下羚羊角散出聖惠方治眼瞼垂腫心躁頭痛羚羊角鎊黃連去須木通赤芍藥防風去叉甘草炙黃芩去黑心各三分葳蕤一兩梔子仁半兩麥門冬去心一兩半石膏二兩上為散每服三錢七分水一盞入竹葉二七片煎至七分去滓食後溫服大黃散出聖惠方治眼瞼垂腫疼痛川大黃銼研微炒梔子仁井泉石秋桑葉甘草炙微赤決明子以上各三分上為散每服三錢以水一中盞煎至六分去滓食後溫服秦皮湯出聖惠方治眼瞼腫痛秦皮去粗皮銼黃連去須各一兩梔子仁一分大黃銼炒甘草炙銼細辛去苗葉各半兩蛇銜草三分上粗搗篩每服三錢匕水一盞入生薑半分拍碎竹葉二七片煎至七分去滓食後溫服枸杞湯出聖濟總録治眼瞼垂緩甚則眼閉難開枸杞子炒半兩赤芍藥山芋升麻各一兩半蒺藜子炒茯神去木各二兩防風去叉一兩上粗搗篩每服五錢以水一盞半煎至七分生地黃汁一合去滓溫服臨臥再服升麻散出聖濟總録治眼瞼垂緩下覆睛輪升麻山茱萸各三分甘菊花細辛去苗葉各半兩蔓荊實去白皮山芋防風去叉各一兩上為散每服三錢用溫酒調下茺蔚散出聖惠方治瞼眼垂下茺蔚子防風去皮羌活去蘆頭蔓荊子甘菊花玄參細辛黃芩去黑心車前子甘草炙銼各二兩大黃銼炒半兩上為散每服三錢匕水一盞煎至七分食後臨臥溫服竹葉湯出聖惠方治眼熱毒害垂腫遮睛苦竹葉黃連去須黃柏去粗皮銼梔子仁各一兩蕤仁湯浸去皮半兩用上銼以水五大盞煎至二盞半去滓澄清溫洗眼日五七次作兩度使又方出聖惠方治眼熱毒瞼腫遮睛川大黃一兩銼碎微炒苦竹葉一握甘草一兩銼鬱金一兩膩粉二錢上先搗三味為散膩粉竹葉以水三盞煎至一盞半去滓澄清溫溫洗眼目三五度洗之目瞼腫硬附論夫目瞼腫硬者內因肝肺積熱上衝於目外為風邪所搏風熱留結在於眥血氣不得宣流故令腫硬久不瘥者多成風粟細瘡眵汁淹睛浸壞眼目兩瞼腫睛疼外障此眼初患之時胞瞼赤脹腫硬難開淚出疼痛還從一眼先患後乃相牽俱損漸生翳膜昏暗皆是中膈積熱肝臟風毒上衝入眼致令此疾宜令鐮洗去瘀血然後服瀉膈散熁腫膏宜謹諸事龍木論歌曰瞼中和腫硬痠疼肝膈由來熱上衝熁腫塗膏兼服藥輕輕兼洗斷來蹤無令發腫生浮翳此後尋醫轉費功省謹若能三五日其間諸事卻通容方羚羊角散出聖惠方治眼風熱毒氣上攻兩瞼腫硬如棐李目不得開羚羊角屑防風去蘆頭羌活人參去蘆頭赤茯苓川升麻川大黃銼細微炒玄參黃芩車前子以上各二兩細辛梔子仁半兩上為散每服四錢以水一盞煎至六分去滓每於食後溫服細辛散出聖惠方治眼瞼硬刺痛不開細辛半兩人參去蘆頭赤茯苓車前子藁本赤芍藥川大黃銼碎微炒玄參一兩甘草炙微銼分上為散每服食後用竹葉湯調下二錢瀉膈湯出龍木論治瞼硬睛疼外障大黃知母芒硝車前子茺蔚子黃芩天門冬各一兩黑麥一兩上為末以水一盞散一錢煎至五分食後去滓溫服黃耆散出聖惠方治眼瞼硬赤腫痛黃耆銼茺蔚子麥門冬去心各半兩地骨皮玄參黃芩各一兩知母一兩犀角屑半兩上為散每服四錢以水一盞半煎至六分去滓每於食後溫服忌炙爆熟面防風湯出聖濟總録治風熱客搏目瞼腫硬防風去叉秦皮去苗葉土甘菊二兩梔子仁蕤仁湯浸去皮葳蕤各半兩竹葉一握上為細銼令勻每用一兩以水三盞煎至一盞半綿濾去滓暖洗避風細辛散出聖濟總録治目瞼硬刺痛腫赤細辛人參白茯苓去黑皮五味子各一兩芎藭藁本去苗土各一兩半上為散每服三錢匕水一盞二分煎七分和滓溫服早晚食前服熁腫膏出龍木論治瞼硬睛疼外障代赭石黃蠟各半兩細磁末麻油各二兩膩粉少許黃柏一兩上為末於銚子內入油蠟同煎至膏塗瞼上瀉膈散出聖惠方治眼瞼腫硬隱眼疼痛視物不見麥門冬川大黃銼細微炒川芒硝各一兩茺蔚子車前子黃芩各二兩半上為散每服三錢以水一中盞煎至六分去滓每於食後溫服秦皮湯出聖濟總録治瞼眼腫硬癢痛秦皮黃連去須細辛去苗葉各二兩黃柏半兩青鹽一兩上銼令勻每用一兩以水三盞煎取一盞半綿濾去滓乘熱通手洗服洗了避風日三再暖洗之目膿漏附論夫目膿漏者緣血脈壅熱傳入於足太陽膀胱之經膀胱之脈起於目內眥則令人瞼眥腫久癢即成疾膿汁時下綿綿不絶如器津漏故謂之膿漏俗呼為漏睛是也又有眼因患瘡出血膿後大眥頭常有膿血亦名漏睛不治則膿毒不清穿壞白睛黑點相連即難治療此眼初患之時微有頭眩昏悶四體如勞五臟多積風氣壅毒遂令瘡出於眼出於眼中或流漬涎皆是腦熱所作雖然不痛漸加昏聵功宜補治服治風黃耆湯即瘥龍木論歌曰眼目何緣患漏睛熱和風在瞼中停眥頭結聚為膿鬥或流涎水色黏青雖然不痛兼無翳潛攻瘡大豈心寧黃耆相膽丸並散眼安蘆薈作膏蒸若也因循經歲月烏珠墜落始心驚方羚羊角丸出聖濟總録治毒風上攻目輪眼爛肉瘡翳生眼睛肉臭羚羊角鎊黃柏皮去粗皮炙防風去叉各一兩半玄參荊芥穗芎藭黃連去須槐子甘菊花防己石決明蕤仁蔓荊子車前子秦艽去苗土梔子仁生乾地黃焙陽起石研真珠末研龍齒搗研薔薇根銼各一兩大黃銼酒炒升麻麥冬去心前胡去蘆頭人參白檳榔煨枸杞子各一兩半上為末煉蜜為丸如梧桐子大每服三十丸晚食後熱水下玄參丸出聖惠方治眼膿漏眥赤癢日夜出膿水不止玄參決明子黃耆銼黃連去須露蜂房微炒青葙子漏蘆羚羊角屑各二兩蕤仁一兩半湯浸去赤皮雄黃細研硃砂細研以上各半兩上為末入研了藥一同研令勻煉蜜和搗二三百杵丸如梧桐子大每於食後以溫漿水下二十丸臨臥再服之黃耆散出聖惠方治眼膿漏不止黃耆銼防風去蘆頭黃芩川大黃銼碎微炒各二兩地骨皮遠志去心人參去蘆頭赤茯苓漏蘆以上各一兩上為粗散每服三錢以水一中盞煎至六分去滓食後溫服臨臥再服忌炙爆油膩毒骨魚肉防風湯一名治風黃耆湯出龍木論治眼漏睛膿出外障防風去叉二兩一方用一兩知母二兩大黃銼炒二兩一方用一兩遠志去心地骨皮人參各一兩白茯苓黃耆銼一兩一方用一兩半上粗搗篩每服一錢匕水一盞煎至五分去滓食後臨臥溫服點眼方出聖惠方治眼膿漏視物不見雄黃細研石決明搗碎研細水飛馬牙硝細研以上各二兩蜜三合青鹽半兩細研青羊膽二枚上用生絹袋盛以蜜並羊膽汁中浸兩伏時捩取汁於瓷盒內盛點之久用良白礬煎方出聖惠方治眼膿漏久不止宜點白礬一分燒灰黃柏末三分黃連末七分雄黃一分熊膽一錢硃砂一分上都細研令勻以水二大盞調令勻納瓷瓦瓶中以重湯煮一日藥成待冷用綿濾過每以銅箸取少許點眥頭龍腦散出聖濟總録治睛漏瘡目大眥出膿汁龍腦研馬牙硝各半兩緑豆粉一錢上同研極細用燈心拈藥點眼目四五日上斑豆瘡入眼附論夫斑瘡入眼者因患傷寒時行熱病毒氣蒸眼其眼澀痛或有片片黃赤如玳瑁色上有粟顆瘡生是也不可便點藥入眼則患眼爛其眼當枯也又豆子瘡入眼者眼中有泡疼痛腫不開點藥後瘡子出眼即瘥更宜服利脾肺解毒熱平和涼藥稍稍服之亦可於眼瞼上下點燲藥以散毒氣脫或不明此理專點諸藥則睛泡膿血俱出便令雙損候瘡子退復點藥無妨也方真珠散出聖惠方治斑豆瘡入眼赤澀腫痛或生翳漸長真珠末一分琥珀一分細研朱黃一分細研羚羊角散一分龍腦二錢細研天竹黃半兩細研犀角屑半兩人參半兩去蘆頭川升麻三分赤茯苓半兩車前子半兩赤芍藥三分決明子半兩甘草二分炙微炒上為細散入研了藥拌勻每服食後煎竹葉湯同下一錢忌炙爆熱面決明子散出聖濟總録治斑瘡入眼決明子微炒一兩半秦皮銼甘菊花羚羊角鎊麥門冬去心焙升麻黃芩去黑心黃連去須炙甘草炙各一兩赤芍藥朴硝研各半兩細辛去苗葉上為散每服二錢匕食後溫米泔調服臨臥再服羚羊角飲治斑瘡後翳膜忽生及風毒暴赤等證羚羊角一對鎊取細末車前子決明子微炒防風去叉升麻黃耆銼大黃銼炒黃芩去黑心芒硝各二兩上粗搗篩每服三錢匕水一盞煎至七分去滓傾入瓷瓶內用油單紙封系懸於井中一宿至次日取出微暖動臨臥徐徐呷不得枕頭睡至明見效如勢不可緩急要服者空心日午各一服防風丸治斑瘡入眼體熱煩少得睡臥防風一兩去蘆頭黃芩一兩茺蔚子三分玄參三分知母三分川大黃半兩銼碎赤炒人參半兩去蘆頭赤茯苓三分甘草三分炙碎赤炒上為細末煉蜜和搗三二百杵丸如梧桐子大每於食前竹葉湯下二十丸柴胡散治斑豆瘡入眼疼痛壯熱口乾煩渴宜服柴胡去苗黃芩梔子仁赤芍藥川升麻麥門冬去苗甘草炙微炒銼玄參以上各一兩上為散每服四錢以水一鍾入淡竹葉二七片煎至六分去滓每於食後溫服之病急加乳香末藥茯神湯治斑瘡入眼茯神去木赤芍藥葛根銼大黃銼炒各一兩升麻地骨皮銼黃芩去黑心各一兩半上粗搗篩每服四錢匕水一盞半煎至八分去滓食後臨臥溫服黃芩湯治麩豆瘡入眼口乾熱躁忽生翳障黃芩去黑心梔子仁黃連去須葳蕤仁去皮升麻甘草各等分上粗搗篩每服四錢匕以水一盞煎至八分去滓溫服食後臨臥各一服柴胡湯治斑豆瘡入眼宜服去脾腑熱毒氣柴胡去苗黃芩梔子仁赤芍藥麥門冬去心升麻甘草炙銼各等分上粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服食後臨臥服黃連湯治斑豆瘡入眼黃連去須細辛紫菀去苗土決明子微炒車前子苦蕒乾者銼碎各等分上搗篩每服五錢匕水一盞半煎至八分去滓溫服食後臨臥服鬱金丸治斑豆瘡入眼疼痛難開鬱金梔子仁黃連川大黃銼研微炒各一兩石決明一兩搗碎細研水飛過蛇蛻皮灰三錢上為細末煉蜜和丸如緑豆大每服不計時候以溫水下十丸小決明散治斑瘡入眼草決明青葙子水上者葛根槐花各一兩上為末食後米泔水調下二錢如四五十日病只用此藥若半年日久則眼老精懸宜合用以下各藥香白芷香附子連翹甘草蟬蛻各一兩膩粉膏治豆瘡入目生翳纍醫不效者膩粉水銀粉霜各一兩上為末用瓷鉢頭內令甲子日六十日後用銚子內紙鋪重襯三味藥以濕紙塞銚內竅如紙大以前瓷鉢覆之用濕紙封縫更以濕沙厚擁四面置水一盞慢火熬後乾冷取鉢研加水銀令患者就病目臥取藥半豆大納在耳中少時目癢去之翳隨手落避風將息三兩日黃藥膏治麩豆瘡入眼黃藥子木香各一兩大黃三兩生用上搗研為細散更重研令勻每用時漿水調為膏攤生絹上貼眼瞼上下不得入眼內干即易硇砂散出聖濟總録治斑瘡入眼及諸般眼疾硇砂明淨者生用一錠硼砂半錢龍腦一錢上令研為末再同研勻細每以少許摻放翳上日三四次蠐螬點眼方出聖惠方治斑瘡入眼不退蠐螬五枚搗絞取汁曾青一錢硃砂二錢上先研曾青硃砂研如粉後入蠐螬汁同調令稀稠得所每點少許極妙神聖粉出聖濟總録治豆瘡入眼睛上作白翳遮障不明刺割不可亦治目生翳以輕粉一分用少灰火糝地面如盆大次燒小木炭十數片椸定吹令灰盛即傾粉其上以新大瓷盆一隻蓋之四下速撥灰塞縫勿令煙透更滴十數滴水於盆底候冷取起盆見粉煙飛住火候冷以指點水即洗下用兩重楮紙裹盛絞出水銀珠子如赤豆大以指甲點水挑入患病人眼邊耳內須側臥搖令藥到耳底以軟紙塞耳當時不痛即開得眼或未效次日再如前法煅取一大豆挑入病眼邊耳內治疹瘡入眼黃昏暗翳出經驗良方以兔屎炒乾為末每服好茶清調下一錢即安須待疹瘡安後服浮萍方出危氏方治斑瘡入眼大人小兒皆可用之以浮萍陰乾為末每服二錢生羊子肝半個入盞內以杖子刺碎投水半合絞汁調下食後不甚者一服瘥已傷目者一服見效芎枳丸出衛生家寶方治斑瘡入眼川芎枳殼麩炒上各等分為末煉蜜丸每服三十丸茶湯下不拘時候連服俟愈即止豆子入目上用豬肝二錢入真珠末一字同煎溫呷食後又方上以豬蹄爪甲燒灰湯浸濾去以滓如常法洗眼眉骨及頭痛附論夫目病先頭痛牽連眉骨攻衝睛瞳者蓋陽經壅熱風上攻頭腦下連目系生致赤脈心煩懊悶嘔逆怔忪頭面熻熱神志不寧痛不已或見飛花漸至昏暗久生翳障也方羚羊角散出聖濟總録治風毒所攻頭偏痛及眉骨頭角疼羚羊角屑防風去叉地骨皮麥門冬去心茯神去木各一兩黃芩去黑心枳殼去瓤麩炒芒硝各半兩甘草三分升麻三分石膏二兩上粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服天麻丸出聖濟總録治胸膈風痰頭目旋暈時發昏痛天麻芎藭羌活去蘆頭各三兩半羚羊角鎊人參白殭蠶直者微