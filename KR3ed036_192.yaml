body:
  text: 卷一百九十二水病門風水附論夫內經言腎者牡臟也腎主水故也人勇而勞甚則腎汗出既出復感於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳於肢體本之於腎名曰風水其脈自浮其外證骨節疼痛而惡風且身腫如裹水之狀頸脈動時咳按之隨手凹者是也金匱方云脈浮而洪浮則為風洪則為氣風氣相搏身體洪腫汗出乃愈惡風者為風水不惡風者小便通利上焦有寒其口多涎此為黃汗二者之證不可不察方大豆散出三因方治風氣通身大腫合不得開短氣骨節疼惡風自汗其脈浮大豆杏仁清酒各一升麻黃木防己各四兩生薑七兩半夏六兩防風豬芩各四兩澤瀉黃耆烏頭各三兩甘遂甘草各二兩㕮咀以水四斗四升煮豆取一斗去豆內藥及酒合煮取七升七服日四夜三小便快利深色為度腫消停藥不必盡劑若不利小便者加生大戟一斤葶藶二兩隔紙炒香無不快利者深師方無豬苓澤瀉烏頭反半夏甘遂反甘草俱不當用之卻效非人情所可測也大豆茯苓散出千金方治風水腫大豆三升茯苓白朮防風橘皮半夏生薑各五兩鱉甲當歸防己麻黃豬苓各三兩大戟一兩葵子一升桑根白皮五升以水二斗煮一斗去滓內煎上㕮咀納前藥汁中煮取五升每服八分一日三服如人行十里久麻黃煎出千金方治風水通身腫欲裂利小便麻黃茯苓澤瀉各四兩防風澤漆白朮五兩杏仁大戟清酒各一斗黃耆豬苓各三兩獨活八兩大豆二升水七升煮取一升上㕮咀以豆酒及水一斗合煮取六升分六七服一日一夜合盡當小便極利為度防風散出聖惠方治風水腫通身皮膚欲裂宜利小便防風去蘆豬苓去皮澤瀉赤茯苓麻黃去節澤漆各一兩白朮一兩半大戟一兩微炒黃耆一兩獨活一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃上為散每服五錢水一大盞入煮赤小豆汁一合煎至五分去滓溫服每日早晨服良久當小便極利不利晚再服之大腹皮散出聖惠方治風水遍身體膚浮腫發歇不定肢節疼痛上氣喘促大腹皮銼桑根白皮銼芎藭各三兩漢防己羌活青橘皮湯浸去白焙檳榔川大黃碎微炒一兩甘草半兩微炒銼桂一兩上為散每服五錢以水一大盞煎至五分去滓不計時溫服大豆湯出聖濟總録治風水舉身腫滿短氣欲絶黃耆一兩杏仁去皮尖雙仁炒二兩防風去蘆叉白朮銼各一兩半防己麻黃去根節赤茯苓去黑皮甘草炙各一兩上粗搗篩每服五錢先用水三盞煮豆一合取熟去豆入酒一合與藥同煎至一盞去滓溫服日三當下小便愈蒼朮飲出聖濟總録治風水頭重面腫蒼朮米泔浸切炮干杏仁去皮尖雙仁炒赤茯苓去皮桑根白皮各一兩半商陸根二兩半連皮大腹檳榔四枚嫩楮枝切三合上㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓食前溫服日三防己散專治風水面腫骨疼惡風喘急防己赤茯苓去皮桑根白皮羌活去蘆頭各一兩蒼朮米泔浸一宿焙郁李仁去皮尖各一兩半上㕮咀如麻豆大每服五錢水一盞半煎至一盞去滓溫服不拘時候日三楮白皮散專治風水毒氣遍身腫滿楮白皮二兩銼桑白皮三兩銼陳橘皮一兩焙去白瓤紫蘇葉三兩豬苓三兩去皮木通二兩銼上為散每服五錢水一大盞入生薑半分煎至六分去滓不計時候溫服麻黃散專治風水遍身腫滿骨節痠疼惡風腳膝皮膚不仁麻黃二兩去根節石膏二兩白朮二兩附子二兩炮漢防己二兩桑根白皮二兩銼上為末每服五錢水一盞半入棗三枚生薑半分煎至五分去滓不計時候溫服赤小豆散專治風水腹臍俱腫腰不得轉動一名服食法赤小豆一升桑根白皮三兩銼白朮三兩生薑三兩切鯉魚二斤去鱗腸肚陳橘皮三兩湯浸去瓤上細銼水一斗都煮令熟出魚量力食之兼食小豆勿著鹽便以任性食之漢防己散專治風水面腫脈浮而緊者漢防己桑根白皮銼蒼朮銼炒郁李仁去皮尖羌活以上各一兩上為散每服五錢水一盞煎至五分去滓溫服如人行十里再服之麻黃湯專治風水身體面目盡浮腫腰背連引髀股胸滿不能食麻黃三兩去根節桂去皮二兩甘草一兩炙附子二枚去皮臍上㕮咀如麻豆每服三錢水一盞半生薑棗大拍碎同煎至一盞去滓溫服日三防己湯出金匱方治風水脈浮為在表其人或頭面汗出表無他病但腰下腫防己白朮銼各二兩甘草炙二兩黃耆三兩半上粗搗篩每服三錢水一盞半生薑棗大拍碎棗三枚同煎至七分去滓溫服如喘加麻黃二兩去根節身腫胃中不和加桂二兩去粗皮心下久寒加細辛二兩去苗葉服訖厚衣覆取汗則愈越婢湯出聖惠方治風水惡風舉身悉腫脈浮不渴自汗而無大熱麻黃二兩去根節甘草炙一兩石膏碎一合白朮四兩上粗搗篩每服三錢水一盞半薑一片棗三枚同煎至一盞去滓溫服日再如惡風加附子一枚咳嗽肺脹加半夏一兩橘皮湯出聖濟總録治風水遍身腫陳橘皮一兩湯浸焙去白楮白皮一兩半炙銼桑白皮二兩半銼紫蘇子炒二兩上粗搗篩每服三錢水一盞半生薑一棗大拍碎同煎至一盞去滓溫服日三椒目丸出聖惠方治風水面腫小便澀椒目一兩半炒漢防己一兩半硝石二兩杏仁去皮尖雙仁炒黃上為細末煉蜜和丸如梧桐子大每於食前煎桑根湯下十五丸甘遂丸專治風水黃腫腹大如囊面目皆含陰如斗色如霜瓜甘遂二兩熬葶藶子一升熬杏仁五十枚去皮尖雙仁熬巴豆四十枚去心皮熬上下篩成末蜜和丸如大豆一服三丸飲下當吐不吐可至五丸禁野豬肉蘆筍治瘡中有風水腫疼小便祕澀青蔥葉乾薑黃柏上相和煮作湯浸洗之立愈治風水腰腿腹臍俱腫不可轉動出聖惠方郁李仁三兩湯浸去皮尖水研取汁薏苡仁二合上以郁李仁汁煮薏苡仁作粥每日空腹一服治風水通身腫皮膚欲裂小便澀出千金方用薑石燒令赤納黑犍牛尿中乘熱服一升日二又單服牛尿一合瘥鯉魚方專治風氣在瘡內中風水腫痛者用鯉魚睛燒作灰敷瘡中汗出即可治風水臍腹俱腫腰不可轉動出聖惠方用鼠黏子二兩微炒搗細為末每服以暖水調下二錢日三四服商陸酒治療風水腫癥癖酒癖用商陸根一斤薄切以醇酒二斗漬三宿服一升量小者服半升日三服療風水毒氣遍身腫方楮皮三兩橘皮一兩桑根白皮五兩紫蘇生薑各四兩大豆二小升上切以水九升煮取六升絞去滓分為四服其藥必須暖不過三劑必當瘥百日來唯禁大酢療諸瘡中風水腫出本草以薤生搗塗上或煮之服治患寒熱毒風水虛脹出本草即取水獺一頭剝去皮和五臟骨頭尾等炙令乾杵末水下方寸匕日二服十日瘥治人素為物所傷及有諸瘡觸犯毒水覺瘡頑不癢痛當中有風水所為身如反張似角弓出本草以鹽豉和麵作碗子蓋瘡上作大艾炷灸一百壯令抽去惡水數升舉身覺癢瘡處知痛瘥也治風水腹大臍突腰重痛不可轉動出本草以冬麻子半升搗碎水研濾取汁米二合以麻子汁煮作粥著蔥椒薑豉空心食之石水附論夫腫從內起堅塊四肢浮腫名為石水其根在膀胱蓋腎主水歸膀胱內膀胱者州都之官津液藏焉氣化則能出矣今腎虛則膀胱氣弱膀胱氣弱則不能氣化而隱氣不通水液停結於臍腹間故其證胸腹鼓滿按之如石脅下脹痛其脈沉遲身體發熱四肢頭目皆腫也聖惠云赤脈微大亦為石水腫起臍以下以至小腹垂然上至胃脘則死也澤漆湯澤漆五兩桑白皮六兩射干湯浸黃芩赤茯苓白朮各四兩澤瀉防己各三兩上㕮咀每服五錢以水三盞烏頭一合煎至二盞內藥同煎至七分去滓空心日三服一方無烏頭以水三盞煮大豆一撮至一盞半去滓豆下藥末三錢煎至七分去滓溫服日二夜一服甚效楮皮湯一名白朮散出聖惠方治石水四肢細瘦腹滿濁腫大肚如懷娠中心妨悶食阻氣息楮白皮炙銼桑根白皮銼防己銼各一兩半澤漆莖葉炙銼半兩射干白朮赤茯苓去皮各一兩大豆炒半兩上粗搗篩每服五錢水二盞煎至七分去滓溫服日三夜二一方有檳榔一兩無大豆牽牛子丸出聖惠方治石水腹脹坐臥不得小便澀少牽牛一兩京三稜一兩炮陳橘皮三分焙訶黎勒皮一兩川大黃三兩銼微炒吳茱萸半兩湯浸七次焙乾炒甘遂一兩煨令微黃鱉甲二兩醋炙黃去裙襴上為末煉蜜為丸和搗三百杵如梧桐子大每服於食前生薑橘皮湯下十丸以利為度海蛤丸出聖濟總録治石水四肢細瘦腹獨腫大海蛤研三分葶藶隔紙炒桑根白皮各一兩切赤茯苓去皮一兩郁李仁湯浸去皮陳橘皮湯浸去白瓤焙各半兩防己半兩上為末煉蜜丸如小豆大每日服二十丸漸加至三十丸米飲下早晚各一服桑根白皮湯出千金方治石水四肢細瘦腹腫心中妨滿食即喘急桑根白皮銼澤漆炙銼各三兩防己銼射干白朮楮白皮炙銼大豆各一兩上粗搗篩每服五錢水二盞煎至一盞去滓溫服日三夜一海蛤丸出聖惠方治石水臍腹妨悶身體腫滿大小便不利喘促海蛤一兩研細漢防己半兩桂心半兩木通一兩銼牽牛子一兩微炒白朮半兩甘遂半兩煨令微黃上為末以棗肉和搗三二百杵丸如梧桐子大每服煎生薑湯下二十丸以利為度不利再服鱉甲丸出聖惠方治石水鱉甲去裙襴醋炙訶黎勒皮銼炒上為末醋麵糊和丸如梧桐子大每服二十丸生薑橘皮湯下以利為度桑根白皮散出聖惠方治石水四肢瘦腹大胸中滿悶食即喘急桑根白皮一兩銼漢防己一兩澤漆一兩赤茯苓二兩紫蘇莖葉一兩上為散每服四錢以酒一大盞入炒焦熟黑豆五十粒煎至五分去滓不計時候溫服甜葶藶丸出聖惠方治石水腹堅漸大四肢滿腫甜葶藶二兩隔紙炒紫色川芒硝三兩椒目二合微炒去汗水銀一兩以棗肉收研令盡星用漢防己一兩海蛤一兩上為末研入水銀令勻煉蜜和搗三二百杵丸如梧桐子大每服三十丸以粥飲下日三四服桑白皮湯專治膀胱石水四肢瘦腹腫桑白皮楮白皮澤漆葉各三升大豆五升上㕮咀每服五錢水一盞半煎至八分服檳榔散出聖惠方治石水病腹腫膀胱緊急如鼓大小便澀檳榔末半兩甘草一分炙銼生薑一兩桑根白皮一兩半銼商陸一兩切上除檳榔外用水二大盞煎取一大盞去滓五更初分作二服每服調下檳榔末一分至平明當利如未利即再服之杏仁丸出聖濟總録治石水四肢瘦腹腫杏仁湯浸去皮尖雙仁炒苦瓠去膜微炒各一兩上為末煮麵糊和丸如小豆大每服十丸米飲下日三服以利為度治水鼓石水腹脹身腫用肥鼠一枚剝皮細切煮粥空心吃之頻食三兩度瘥治腹堅腹脹滿世號石水用白石英十兩明淨者捶如大豆大以瓷瓶盛用好酒二斗浸以泥重封瓶口以馬糞及粳火燒之長令酒小沸從卯至午即令住火日可三度暖中盞飲之如不飲酒即隨性少食之其白石英可更一度用也椒仁丸專治石水椒仁甘遂麩炒焦黃續隨子去皮研郁李仁去皮研牽牛子炒令極熟五靈脂附子炮去皮臍吳茱萸湯浸七次玄胡索木香各半兩芫花醋浸一宿麩炒石膏火煅紅細研如粉各一兩信砒膽礬各一錢巴豆六十粒取霜上為末麵糊丸如緑豆大每服十丸生薑湯下皮水附論夫肺主於皮毛腎主於水肺氣虛則水妄行流溢於皮膚故令身體面目悉腫按之沒指而無汗也腹如鼓不滿亦不渴四肢重而不惡風脈浮者名皮水桑根皮散專治皮水頭面四肢浮腫心跳呼吸不利喘促煩悶大小便澀桑根白皮一兩銼炒杏仁一兩去皮尖雙仁炒陳橘皮一兩湯浸去白甘遂一兩煨令微黃澤瀉一兩赤茯苓二兩黃芩半兩赤小豆一升水五升煮取二升上為散每服三錢以小豆汁一中盞煎至六分去滓五更初溫服如人行十里當利如未利即再服漢防己散專治皮水腫如裹水在皮膚中四肢習習然動漢防己一兩黃耆一兩銼桂心一兩赤茯苓二兩甘草半兩炙銼桑白皮一兩銼上為散每服五錢以水一大盞煎至五分去滓溫服日三服木香丸專治皮水身體面目悉浮腫木香一分乳香一分硃砂半錢研甘遂半錢炒微黃檳榔二枚一生一炮熟苦葫蘆子一分炒上為末以爛飯和作四十丸丸用麵裹於銚子內以水煮熟令患人和汁吞之以盡為度從早晨服藥至午時其水便下不計行數水儘自止加味越婢湯專治皮水木防己湯療皮水如腫氣在皮膚中四肢集動木防己三兩黃耆三兩桂心三兩茯苓六兩甘草二兩炙上切以水六升煮取二升分再服忌海藻菘菜生蔥酢物五皮散專治皮水四肢頭面悉腫按之沒指其腹如鼓不喘不渴脈亦浮心腹膨脹上氣促急堅並治妊娠胎水大腹皮桑白皮茯苓皮生薑皮陳皮上㕮咀每服四錢以水二盞煎至七分去滓熱服日二三服更磨木香水同煎尤好如大便不通者加烏臼木根皮等分同煎極效五皮散局方用五加皮地骨皮此方乃出中藏經者用陳皮桑白皮乃有功於脾肺所以多效或加附子皮其説亦有理大小便不通又加烏臼木根皮等分更加蘿蔔根尤妙小便不順加豬苓皮一方加白朮磨沉香水和入此藥活人頗多昔於江市見一婆子患腫疾服此藥和縣寶女患此疾但脈沉細此方加附子皮及復元丹有效又有一人腹腫小腑不快兼素有白濁便多之患水不流通而腫取前藥加豬苓皮亦效不可輕忽三因方加木香磨水煎者卻反不驗服藥忌油膩物切不可服瀉水藥或云添五加皮亦得蓋欲腫從水道去故也陳世德云大學諸生姚子大劉亨叔並患此病勢可畏服之而安又方取服牛溺商陸羊肉臛及香附煎等在腫滿條中其千水丸諸大方在別卷若止皮膚小腹內稍腫者服諸發汗藥得汗便差然慎護風寒為急若為腹大下之不去便針臍下二寸入數分令水出孔合須臾減乃止若皮膚頑痹以羊脂塗上炙手令熱摩之即退水症附論夫水症者由經絡痞澀水氣停聚在於腹內大小腸不利所致也其病腹內有結塊堅強在兩脅間膨脹痞滿遍身腫所以謂之水症水症者由經絡痞澀水氣停聚在於心下腎經又虛不能宣利溲便致令水氣結聚而成形癥結在於心腹之間抑按之作水聲但欲飲而不用食遍身虛腫是也水症丸療水腫大腹礬石熬躑躅花細辛半夏洗七次藜蘆丹參承露各十分承露是落葵也巴豆十枚去心皮熬人參雄黃大黃芒硝大戟各十分烏頭二十分炮狼毒十分野葛二分上搗篩蜜和藥成以置腫上並服如黍米大三丸日三欲取下者服五丸禁食生魚生菜肥肉海藻丸出聖惠方深師療水症胸腹內牢強通身腫不能食海藻一兩洗水銀一兩椒目一兩芒硝葶藶一兩熬大黃一兩甘遂一兩熬桂心一兩附子一兩炮茯苓一兩大戟一兩松羅一兩乾薑一兩巴豆三十枚去皮心熬杏仁三十枚去皮尖熬上下篩蜜和丸如小豆大每服二十丸日三不知稍稍加之忌豬肉大酢生蔥蘆筍白礬丸出聖惠方治水症腹大腫硬小腸不通白礬半兩燒令湯浸躑躅花半兩酒炒曬乾細辛半兩藜蘆半兩去蘆頭半夏半兩湯浸洗七次去滑丹砂半兩細研水飛過苦參半兩銼巴豆半兩製紙裹去油雄黃法制半兩研川芒硝一兩川大黃半兩細銼炒大戟半兩銼碎微炒川烏頭半兩炮去皮臍狼毒半兩醋拌上為細末煉蜜和丸搗三二百杵丸如黍米大空心以溫水下五丸以通利為度木香丸出聖惠方治水症腹內堅脹喘促大小便澀木香三分甘遂半兩生用青橘皮湯浸半兩去白焙膩粉一分蘿蔔子半兩水銀半兩入少許煮棗肉同研令星盡防己二分澤瀉三分巴豆一分去皮心研紙裹淨去油瞿麥半兩上為末以糯米飯和丸如緑豆大每服空心以木通湯下三丸鱉甲散出聖惠方治水症心下痞堅上氣喘急眠臥不安大腸祕澀鱉甲一兩半塗酥炙令黃去裙襴桑根白皮二兩銼訶黎勒皮赤茯苓大腹皮各一兩半吳茱萸半兩湯浸七次炒乾郁李仁半兩湯浸去皮微炒川大黃一兩半銼炒上為散每服五錢水一大盞煎至五分去滓溫服如人行四五里再服治水症出本草用萆麻子水研二十粒服之吐惡沫加至三十粒三日一服瘥則止水氣附論夫腎主水腎虛則水妄行肺主氣肺虛則肺氣不能清肅下行水之與氣留滯皮膚令身體四肢腫故名水氣桑皮飲出直指方治肺間積水頭面浮腫桑白皮炒青皮陳皮檳榔枳殼赤茯苓青木香當歸川芎石葦炙去毛羌活各一兩牽牛炒末半夏制葶藶炒香甘草炙各一分半上銼每服三錢薑四片水煎服神仙祕訣丸專治水氣浮腫黃疸每件稱來一兩宜酸皮青皮及陳皮三稜巴豆五靈脂大黃神麯烏梅大戟芫花甘遂葶藶杏仁淡豆豉搗羅為末炒煙微醋糊為丸便是劑上為㕮咀炒煙微起為細末醋糊為丸如緑豆大每服七丸量虛實加減五更生薑湯送下百物所傷仍用傷物湯下忌甘草蘿蔔子飲出醫方大成治水病浮腫蘿蔔子半兩生赤茯苓半兩去皮牽牛末炒葶藶炒香甘草炙各四兩半夏制川芎銼檳榔煨銼青木香辣桂青皮陳皮白色商陸各三分上㕮咀為末每服三錢水一盞薑四片煎七分去滓在不飢不飽時服檳榔丸出聖濟總録治水氣第一日空心先服檳榔丸一服日中後服枳實湯一服次日亦然第三日空心臨臥服萬靈丸各一服第四日早晚服水銀丸一服其病當於大小便中去利後則吃煮赤小豆如渴不可飲水當服白朮湯然後常服鹿茸丸檳榔煨銼牽牛子半生半炒葶藶隔紙炒各一兩惡實木香青橘皮去白湯浸郁李仁去皮尖炒白茯苓去皮枳殼不去瓤防己各半兩大黃紙裹灰中煨令香熟一分上為末煉蜜和丸如梧桐子大每服四丸空心煎桑根白皮湯下枳實湯出聖濟總録治水氣枳實去瓤麩炒升麻