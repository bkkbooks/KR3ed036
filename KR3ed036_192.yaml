心內受水氣吃藥取轉了宜吃此遠志散以補之將此藥對硫黃丸服人參遠志去心藿香肉豆蔻川芎各一分上細杵羅為末每服一錢水一盞煎三沸空心去滓任意服治脾受水氣傳之於腎蓋五行受病變化多端不獨傳其所勝此腎之所以受水也然五行受病又不獨傳其所勝天下萬物之理亦有同氣相求各從其類者故脾土之虛不能制水或流歸於腎注於腎者脾之水也腎既受之不能無病此世人患水病多先從脾以傳之於腎此其土邪入於腎水治之不可後時牽牛四兩醋熬二兩焙乾二兩生使續斷乾薑豆蔻吳茱萸川芎檳榔各一分椒目二銖半夏二銖上件藥味先杵牽牛一味為細末所餘衆藥另作一處杵羅為末每服牽牛末三錢半衆藥末二錢相和作一服食後以蔥湯調下取水未盡停待兩三日更取一度若疏轉不利不快第三服加衆藥末作二錢半牽牛末作四錢和為一服以快為度取水盡吃後方藥以補之面不腫腹不脹是為取水盡也此方治脾腎受水氣水氣轉盡了後服此藥以補之山茱萸吳茱萸白朮巴戟去心川羌活黃橘皮草豆蔻去皮肉豆蔻乾薑木通草牽牛醋煮焙乾使檳榔各一分川芎半兩半夏二銖椒目一銖上細杵羅為末每服二錢水一盞煎取九分空心去滓吃又煉蜜丸如梧桐子大早朝空心米湯下四十丸若作散子不用椒目茯苓琥珀丸治水氣乘肺遍身浮腫中焦痞隔氣不升降咳嗽喘促小便不利赤茯苓去木漢防己二味各一兩半陳橘皮去白一兩三錢苦葶藶揀令淨稱三兩半紙煨紫蘇揀淨一兩真琥珀別研一兩郁李仁揀淨稱一兩半湯浸去皮杏仁湯浸去皮尖及雙仁者麩炒一兩一分上件將前三味為細末後五味各研為膏同前藥拌勻煉蜜為丸如梧桐子大每服三十丸煎人參湯送下不拘時候海蛤湯專治水氣四肢腫滿元氣不足發動遍身壯熱小便不通海蛤澤瀉木豬苓去皮木通去皮滑石淨桑白皮葵菜子七味各一兩上件為細末每服二錢水一盞入燈心十根通草二寸煎至七分食前溫服治水氣王尚之提刑傳云武義系方已治數人甚妙黃顙魚一個緑豆一合許大戟澤瀉黑牽牛生木通檳榔桑根白皮大黃濕紙裹煨熟用乾漆炒甘遂麩炒令黃榆根白皮上件各等分為細末每藥末二兩煉蜜為丸分作四丸每服一丸用冷荊芥茶清嚼下忌鹽百日並甘草三日郁李仁出永類鈐方治水氣乘肺動痰作喘身體微腫葶藶隔紙炒杏仁去皮尖防己郁李仁炒去皮尖真蘇子陳皮赤茯苓各半兩上為末煉蜜為丸梧桐子大每服四十丸食後紫蘇湯下又方出如意方如積久水氣上攻頭面目氣壅身腰以上俱浮腫宜用麻黃一兩甘草一兩㕮咀水煎空心服汗出即愈治水氣虛腫風瘙肌膚惡癢出本草用陸英取湯入少酒浴之妙陸英乃蒴藋也治水氣血氣心疼出本草以青魚鮀用醋磨服之治水氣腳氣方最急用其法出本草以赤小豆五合葫蘆一頭生薑一分並碎破商陸根一條切同用水煮豆爛湯成適寒溫去葫蘆等細嚼豆空腹食之旋飲汁令盡腫立消便止下水氣濕痹利小便以鴨跖草和赤小豆煮服治水氣出本草以葶藶二兩以物盛甑上蒸令熟即搗萬杵為丸成如梧桐子大不須蜜和一服五丸漸加至七丸以得微利即住不可多服令人不能食若水氣發又服之得利氣下定即停此方治水氣無比蕭駙馬患水氣惟服此得瘥下水氣用赤小豆花煮一盞頓服之治熟氣水氣以牛肝和腹內百葉作生薑醋食之去水以木苗作飲服甚香美下氣以烏臼子炒作湯服治水氣利小便除浮腫用鯉魚一頭重一斤者治如食法修事食之桑煎專療水氣肺氣癰腫風氣以桑條二兩用大腹檳榔一兩二物細切如豆以水一大升煎取二大合如欲得多造準此增加每服肚空時吃服後食茶湯或熱粥半大升亦無禁忌也下水以紫藤作煎加糖服之療水及斷利以櫸樹皮煮汁服之治水氣浮腫以白葛六兩煎取汁半合和酒半升看症狀大小相度與服當利下水瘥十珍散專治水氣芫花醋浸焙赤茯苓桑白皮炒澤瀉葶藶炒黑牽牛炒各三錢川椒並目二錢甘遂雄黃大戟各一錢上為末頭夜不食五更溫酒下三錢匕小便利則愈須審度其腫先從足起倍葶藶先陰腫倍澤瀉先眼腫倍牽牛先腹腫倍川椒先口腫倍大戟先手腫倍桑皮先脅腫倍甘遂先頭腫倍芫花先腰腫倍茯苓先腎腫倍雄黃並準原分兩加應加之一味一倍如在先小便不通者先服通小便方小便通病不退再用此方更須審度病體強弱久近冷熱不可輕投十珍散專治水氣消腫神妙第一巴豆玄參乾漆青皮各等分上為末每服一錢匕緑豆湯下氣癰腫用白蘞赤小豆茜草各三錢為末雞子白調塗主水氣惡腫用水紅花草煎湯浸之佳治水氣用蘿勒生食之蘿勒北人呼為羅者香又俗呼為西王母菜又方用烏臼木方停一寸劈破以水一盞半煎取汁小半盞服之立效不用多吃其功神聖又方用萆麻子去皮一合研令細熟水解得三合清早一次頓服之盡日中當有青黃水下水飲附論夫水之與飲同出而異名也人惟脾土有虧故平日所飲水漿不能傳化或停於心下或聚於脅間或注於經絡或溢於膀胱往往因此而致病矣孰謂血氣痰飲能生諸疾而水飲之不能為恙乎惟水與飲漉漉有聲為喘為咳為嘔為泄為痞膈為脹滿為眩暈為怔忡為寒熱為堅痛為浮腫為多唾為短氣為體重氣為飲隔痞滿腹鳴骨痛冷痛冷痹水氣滯於經絡血脈不行四肢浮腫則曰血分凡此等類皆水氣之所由作也據病驗證可不究其所受之原乎然則療治之將何先曰能以表裡虛實診之斯得矣表有水者其身熱嗽喘怔忡嘔而微利青龍湯汗之而愈里有水者其身涼嘔嗽痞滿引脅痛硬十棗湯下之而安虛者脈虛心腹滿而濡當以安腎丸為主加青木香丸方見水腫少許以行之實者脈實胸腫滿而硬當以青木香丸為主用五皮散加枳殼以導之方見浮腫尋常水氣心下怔忡大半夏茯苓湯小半夏茯苓湯散輩通用可也然而醫家多以水積於心下停瀦於脅間結癖為辨因瘧能生寒熱所以瘧劑多用常山蓋水在上焦則吐之水不在於上焦則常山亦能破其癖而下其水也其水腫證候亦此種類也方桂芩湯出直指方治血分辣桂赤茯苓當歸川芎赤芍藥蓬莪朮京三稜檳榔蒼朮桑白皮炒大腹皮瞿麥穗青皮陳皮甘草炒各半兩葶藶炒香大黃濕紙裹煨炒各一分上銼散每服三錢薑五片水煎服調榮飲出直指方治瘀血留滯血化為水四肢浮腫腹腫名曰血分華陰細辛莪朮辣桂赤芍藥延胡索當歸川芎白芷檳榔大腹皮桑白皮瞿麥穗赤茯苓陳皮葶藶炒香大黃煨各一錢甘草炙一分半上銼散每服三錢薑四片水煎食前服續斷飲出直指方治血分延胡索當歸川芎牛膝川續斷赤芍藥辣桂白芷五靈脂炒羌活各一分赤茯苓牽牛炒取末半夏制甘草炙各一分半上銼散每服三錢薑四片食前水煎服加味枳朮湯出直指方治氣為痰飲所隔心下堅脹名曰氣分歌云氣分中滿並胞痹三者雖殊皆此類胞痹氣實中滿虛氣分痰飲茲為異關尺微遲寸遲澀兩處推求病端的陰氣不通則骨痛陽氣不通身冷據陰氣前通痹不仁陽氣前通惡寒濕陰陽相得氣乃行氣轉即散分虛實實則失氣虛遺尿腹滿脅鳴何以療心下堅大似旋盤桂附術湯為最妙枳殼制白朮紫蘇莖葉辣桂陳皮去白檳榔桔梗木香五靈脂炒各一分半夏制茯苓甘草上銼每服三錢生薑四片水煎服芎夏湯出直指方逐水利飲通用川芎半夏制茯苓各一兩青皮陳皮枳殼各半兩制白朮甘草各一分炒上銼散每服三錢薑五厚片水煎服川芎半夏能逐水喘加去節麻黃嗽加炒桑白皮嘔加生薑半夏泄加蒼朮白朮痞隔加枳殼桔梗脹腹滿加縮砂白豆蔻眩暈加半夏南星怔忡加白茯苓功能除寒熱定疼痛下其結癖去其浮腫而除體重滲其宿濕余以類推桂術湯出直指方治氣分辣桂三兩白朮麻黃去根細辛去苗土甘草炒各二兩枳殼制乾薑炮各一兩半上銼散每服三錢水煎服平肺湯出直指方肺與腎皆以至陰積水喘促咳嗽蓋水乘之小青龍湯出直指方治表不解心下有水氣發熱乾嘔怔忡咳嗽喘微利十棗湯出直指方治表不解里有水身涼汗出乾嘔短氣微嗽微利心下痞滿引脅硬痛枳朮丸出保命集方治胸膈痞悶有停飲枳殼白朮各二兩上為末麵糊為丸如梧桐子大每日服三十丸至五十丸溫湯下治冷熱久澼實痞不能飲食心下虛滿如水狀方出千金方前胡生薑茯苓半夏各四兩甘草枳實白朮各四兩桂心二兩上㕮咀以水八升煮取三升分三服諸腫附論夫腎者主水脾則主土土性剋水脾與腎俱相為表裡胃為水穀之海今胃虛不能傳化水氣使水氣滲入經絡浸漬臟腑脾得水濕之氣加之則病脾病則不能制水故水氣獨歸於腎三焦不瀉經脈閉塞故水氣溢於皮膚而令腫也其狀目裹上微腫如臥起之狀頸脈動時咳股間冷以手按其腫處隨手而起如物裹水之狀口苦舌乾不能正偃偃則驚驚則咳甚小便黃澀是也方消水腫歸氣飲子專治面虛腫浮四肢腫大甚者入腹脅致胸滿氣喘微嗽飧泄眠臥不能只消六服盡退腫蘇葉連嫩枝一兩二錢大腹皮三錢川木通四錢茯苓皮薑皮陳皮桑皮桔梗地骨皮五加皮茯苓麥門冬甘草五味子草果各二錢分為六服上為末每服七八錢重水二中盞薑三片煎至八分食前臨臥日進連滓四服腫消藥盡六服全安大忌生冷油膩酒醋咸雞鴨子麵食硬飯蔬菜等物只吃白粥十日半月二十日宜若不忌口其疾復作慎之防風散出直指方治風腫皮膚麻木不仁或時疼痛麻黃去節牽牛炒甘草炙各一分半杏仁去皮尖防風半夏制芍藥辣桂白芷防己當歸川芎羌活獨活檳榔各一分上銼每服二錢薑四片蘇葉三葉水煎服分氣補湯出醫方集成治心鬱氣結發為遍體浮腫上氣喘急大腹皮炒香附子炒去毛白茯苓桔梗各一兩木通甘草炙川芎前胡青皮炒枳殼去白瓤炒白朮各三分細辛去苗木香各半兩上㕮咀每服四錢水一盞薑三片棗三枚同煎食前服茯苓散一名檳榔散出醫方集成治諸般氣腫等疾芫花醋拌炒澤瀉郁李仁甜葶藶漢防己各二錢半陳皮去白半兩瞿麥半兩白檳榔半兩藁本二錢半滑石三分大戟炒三分白茯苓半兩上為末每服一錢取桑白皮煎濃湯空心調下取下碧緑水如爛羊脂即瘥如未盡隔日又服腫消如故不用服忌鹽百日效一方無白茯苓紅豆散出危氏方治身腫皮緊丁香木香各三錢縮砂紅豆白薑桂皮陳皮青皮桔梗胡椒各五錢上為末每服二錢秋石湯調下赤小豆湯出醫方集成治血氣俱熱遂生瘡疥變為腫滿或煩渴小便不利赤小豆當歸去蘆炒商陸澤瀉桑白皮炙連翹仁赤芍藥漢防己木豬苓去皮澤漆各半兩上㕮咀每服四錢水一盞薑三片煎八分溫服熱甚加犀角加味腎氣膏出醫方集成治腎虛腰腫小便不利附子炮二兩白茯苓去皮澤瀉山茱萸取肉淨山藥炒車前子酒煮牡丹皮各一兩去木官桂不見火川牛膝去梢酒浸熟地黃各半兩上為末煉蜜為丸梧桐子大每服七十丸空心米飲下食前氣實丸專治腰脅俱病如抱一甕肌膚堅硬按之如鼓兩腳腫滿曲膝仰臥不能屈伸自頭至頸中瘠瘦露骨一切氣積食積並腳氣走注大便祕結寒熱往來如傷寒並服之黑牽牛大黃一兩半檳榔青皮去白瓤各一兩炒南木香羌活川芎陳皮炒茴香炒當歸各半兩上為末用皂角膏為丸如梧桐子大每服五七十丸生薑燈心煎湯下雄黃神金散出宣明論雄黃澤瀉椒目減半大戟巴戟茯苓去黑皮甘遂芫花醋五升浸一日炒葶藶一兩糯米和炒半熟去米不用桑白皮各一兩上為末病發時隨症加藥一分空心用甘遂芫花水調下每服一錢加至五錢以利為度忌鹽醋生冷毒物油膩血物從腳腫根在心加葶藶從肚腫根在腹加椒目從陰腫根在胸加澤瀉從面腫根在肺加桑白皮從心腫根在肋加雄黃從肢腫根在脾加甘遂從口腫根在小腸加巴戟從腰腫根在腎加大戟從四肢腫根在胃加茯苓從膝腫根在肝加芫花木香丸專能退脹消腫木香三錢檳榔二錢半枳實一兩枳殼半兩蘿蔔子一兩黑牽牛一兩白豆蔻一兩檀香半兩甘草一兩上為末醋糊為丸如黍米大每服四十丸用淡薑湯下蔥白膏蔥青白切半升菘菜子半升葶藶半升炒蒴藋切半升莽草一兩切青木香二錢丹參切半升生蛇床半升蒺藜子一升炒上以豬肪五升煎之三沸令水氣竭去滓敷痛處大丸出三因方治通身腫滿及痰氣食積傷寒感風脾氣橫泄羌活白朮各半兩陳皮木通去皮黃耆去蘆桑白皮各三分木香一分黑牽牛五兩炒五兩生上為末煉蜜為丸如彈子大每治風痰散腹脅壅滯清頭目食前生薑湯下飲食傷下赤白痢煎棗湯下小便不利燈心湯下傷寒蔥茶下如未快用稀粥投之用熱茶亦可須七日後方可再服已得瀉急欲止之投白粥即自止婦人産前並服之既服此藥須住他藥三日及不得吃生冷葷腥及滋味一日只軟飯淡粥可也次日早進千金散千金散藿香甘草炙神麯炒乾薑炮茯苓各一兩人參桂心各半兩陳皮厚朴制各二兩上為末每服二錢水一盞薑三片煎至七分鹽一捻通口服神祕湯出衛生寶鑑治喘嗽吐痰腫滿脾肺虛損陳皮生薑紫蘇茯苓人參木香桑白皮各等分上㕮咀水三升煎至一升去滓大濕分作三度服鱉甲湯出聖濟總録治水氣面目浮腫因虛勞腳氣所致者鱉甲去裙襴醋炙焦二兩桃仁七枚湯浸去皮尖人參柴胡去苗當歸切焙枳殼去瓤麩炒各二兩甘草各炙半兩白檳榔煨二枚上粗搗篩先用小便二盞浸藥三錢經半日煎取七分去滓溫服以瘥為度婦人病狀同者加牛膝半兩蔥白膏方出千金方蔥白菘菜子葶藶子葫蘆根蒺藜子丹參各半兩豬膏五升上㕮咀如法煎膏去滓用之蒺藜湯出千金方凡虛熱石淋當因中冷濕傷停聚在裡久變成熱及水病腫滿腹大氣急及大小便不利腫如皮紙盛水如日光如老蠶色堅腫如石水病成此皆腎熱虛損強取風涼濕傷脾胃故也治之之法內宜依證服諸利小便藥外以此湯洗四肢竟以蔥白膏敷之別以豬蹄湯洗蒺藜子赤小豆蔥心青皮各一升菘菜子三升蒴藋五升巴豆一枚合皮熬上㕮咀以水二斗煮取八升以淋洗腫處豬蹄湯出千金方治服石發熱因勞損熱盛當風露臥腫方豬蹄一雙蒴藋三升蒺藜一升碎葶藶五合黃柏五兩上㕮咀以水一斗煮取三升冷浴日三郁李仁散出經驗良方治腫滿小便不利郁李仁陳皮檳榔茯苓白朮各一兩甘遂五錢上為末每服二錢薑一片棗一枚煎湯調下食前服茯苓蘇子丸出三因方治面腫小便澀心腹脹滿茯苓蘇子杏仁去皮尖各二兩橘皮去白防己葶藶隔紙炒各一兩一分上為末蜜丸如小豆大以桑白皮湯下一二十丸食後服無礙丸出衛生寶録治脾病蓄水橫流四肢腫滿及心腹脹滿喘不得臥大腹皮二兩木香半兩蓬莪朮京三稜檳榔郁李仁各一兩上為末炒麥糵打糊為丸梧桐子大每服二三十丸生薑湯下不拘時候服一方無郁李仁紫金丸出危氏方白薑香附子炒去毛紫金皮石菖蒲去蘆毛青木香鹼砂煅紅上等分為細末米糊為丸第一天用三丸熱水下第二天商陸根湯下第三天赤小豆湯下常吃用好酒吞下小女曲散療利後虛腫水腫者服此藥小便得利上腫亦消女曲一升生用乾薑細辛椒目附子炮去皮臍桂心各一兩上為散酒服方寸匕不知服二三匕日三産後虛滿者大良忌豬肉生蔥生菜中軍候黑丸出千金方治水從頭面至腳腫頭眩痛身虛名曰元水體腫大小便澀芫花三兩巴豆八分杏仁五分桂心桔梗各四分上為末煉蜜丸如胡豆大每日三丸不知稍增得利即止大戟散出經驗良方男子用藥治脾元虛憊水氣腫滿紅牙大戟炒主脾甜葶藶炒主肺黑牽牛半生半熟主腎續隨子炒去殼主肝甘遂炒去心上各用一兩觀其五臟病證其病證之藥加一兩共二兩併為末煎燈心湯五更初面東服一錢用藥多少相老少虛實加減至天明其水下三五次其腫即消卻用生蔥薑煮粥止之隔日服平胃散補貼如體虛不堪再下者只用前藥麵糊為丸三日一服二十丸謂之磨化丸屢效食忌如後女人用此方出經驗良方治證同前芫花醋浸瓦炒七次牽牛黑者半生半炒各等分上為末醋煮麵糊為丸如梧桐子大每服三十丸相虛實用茶清下五更初面東方服天明其水即下用前法粥藥補之婦人止用此二味藥用手撩按其腫有窟深者可醫忌生鹽油醬豉面醋羊鵝等毒食生冷只可吃精肉如飲食中加炒鹽食之以少為貴不食更好服藥之日須忌甘草木香丸出直指方木香青皮黃連橘紅各一錢胡椒一錢半上為末入巴豆肉不用去油一錢麵糊丸胡椒大每服三四丸薑湯下大便利腫自消未利再服停積痢滯通用枳殼丸出經驗良方治遍身黃腫外腎亦腫枳殼炒香附子炒去毛茴香微炒蘿蔔子微炒各等分上為末煮麵糊為丸如梧桐子大煎橘葉湯空心服下即安每五七十丸桑根白皮飲專療脾胃水氣面目手足胕腫胃堅腹滿短氣不能動搖桑根白皮切二升桂心一尺生薑三兩人參一兩上切以水三升煮桑白皮得一升絞去滓內桂心等各味合同飴一十兩煮之煎得七合五更服須臾當下水不盡第二日再服忌生蔥吹鼻散專治身面四肢浮腫有蟲去鼻中息肉陰黃黃疸及暴急黃瓜蒂丁香各七枚小豆七枚上為末納豆許於鼻中少時黃水出瘥摩膏出千金方治膚表久腫病須按方內外攻之可一概除生商陸一斤煎可得二升上水煎令黃去滓以摩腫亦可服少許並塗以紙覆上干輒敷之不過三日瘥羊胃湯專治久病羸瘦不生肌肉水氣在脅下不能食四肢煩熱羊胃一枚切白朮一升切上用水二斗煮取九升服一升日三三日盡更作兩劑乃瘥忌李桃雀肉等治心下有水出肘後方白朮三兩澤瀉五兩上銼以水三升煎取一升半分二次服黑龍丸專治食氣遍身黃腫喘不得食心胸滿悶皂角去皮子醋炙黃為末一錢巴豆七粒去皮油上為末用醋及好黑豆為糊丸如麻子大每服三丸橘皮湯下一日添一丸以知為度如常服消酒毒治腹脹忌油膩菜子大豆煎出千金方治男子女人新久腫得風氣入腹婦人新産上圊則風入臟腹中如馬鞭者噓吸短氣咳嗽用大豆一斗揀淨以水五斗煮取一斗五升澄清內釜中以一斗半美酒內中更煎取九升宿勿食平旦一服三升溫覆取汗兩食頃當下去風氣腫減慎風冷十日可全愈若急不可待逐急合服腫不盡退加之腫瘥更服三升若十分瘥則勿服病中亦可任性飲之使酒氣相接腫瘥後渴慎勿多飲又方出千金方用楮皮枝葉一大束切煮取汁隨多釀酒但以飲醉為佳不過三四日腫少退以後可常服之一方用豬椒枝葉又方出千金方用鯉魚長一尺五寸以尿漬一宿平旦木篦從口貫至尾微火炙令熟去皮宿勿食空腹頓服之不能者分再服勿與鹽香附子出經驗良方治酒腫腹腫脾虛發腫用香附子淨洗去皮毛用酸米醋煮焙乾嚼三十粒久之敗水漸從小便利去腫退仍能飲食充壯勝前委有神功如憚咀嚼醋煮香附子焙乾為末醋糊丸服亦可一方用皂角五片銼同煮生薑蘿蔔汁吞如難服晾乾為末醋糊丸服亦可一方用皂角五片銼同生蘿蔔十分吞如難服可加干宿蒸餅為丸亦可一方用香附子童子小便浸一日一夜取出換童尿又浸一日一夜以生布袋搽去皮於臼中搗細麵糊米醋為丸如梧桐子大每服七十丸煎湯飲下治腳氣水腫氣息膹急用釣樟柳煎服並將皮煎湯洗瘡痍風濕疥癬又方用豪豬取其肚燒乾和肚屎用之搗細末每朝空心溫酒調下二錢有患水病鼓脹者服此藥豬肚一個瘥桑椹方專治水脹或不下則滿溢若水下則虛竭還脹十無一活用桑椹子並楮皮二件先將楮皮細切以水二斗煮取一斗去滓入桑椹重煮五升以好糯米五升釀為酒每服一升若腫遍有所起者出肘後方以水和灰塗之燥復更塗又方出肘後方用赤小豆麻子合搗以敷腫上又方出肘後方用削植梧桐木煮取汁漬之並飲下少許加赤小豆妙又方出肘後方用煮豉汁飲之以滓敷腳治一切腫方用紅藍花熟橘搗取汁服之不過再三服便愈若多服更妙若腫而大喘者亦宜進此藥治水病瘥後口中乾燥熱瘡出方用鐵鐺中著水一小鬥煮金器不問多少煎取二小升出金用水著病人口中含良久應欲言語有要事方可吐勿咽之背腫方出危氏方以煉石塗之立瘥大棗湯出本草方治四肢腫滿以白朮三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎至九分去滓溫服日三四服不拘時候烏梅醋法出危氏方治手指甲頭腫用烏梅槌碎去核肉只取仁研細和米醋入鹽少許以指浸之自愈治面目手足有微腫常不能好者出千金方用楮葉切二升以水四升煮取三升去滓內米煮作粥食如常食勿絶冬則預取葉乾之準法作粥周年永瘥忌一切生冷食物抵聖丸出楊氏家藏方治男子婦人頭面手足虛腫以苦葶藶不拘多少於火上隔紙炒過杵為細末棗肉為丸如小豆大每服十丸煎麻子湯下食前日進三服五七日小便利腫消為效如喘嗽煎桑白皮湯下忌生冷醋黏滑食物及鹽如小兒須另丸小丸與服看大小加減丸數服煎棗肉湯下夏月飲紅白酒後食冷麵但覺胸中不快次日手背面皆浮腫服五子五皮飲送紅丸子見效更多服紅丸子又方凡理腫從足始轉上入腹豬肝一具細切先以布搓淨更以醋洗以蒜齏拌食可也如頓服食不盡作三兩頓食香薷丸出十便良方療暴水風水氣水腫或瘡中有水通身皆腫甘香薷一斤白朮七兩上搗術下篩濃煮香薷取汁和術為丸飲服如梧桐子大十丸日夜四五服利小便夏取花葉合用忌桃李雀肉青魚酢等物加減五苓散出朱氏集驗方治水疾木豬苓白茯苓白朮板桂各七錢澤瀉一兩南木香丁香沉香檳榔各三錢白豆蔻二錢半上為細末每服一錢半煎白樟柳空心溫點服如要取水加甘遂半錢在藥內利三五次又當以勻氣藥服下止之但凡治腫三日兩日只一服之取三二次水必去矣續用勻氣藥調理治腫之法無出此也勻氣之藥或烏沉湯勻氣內去甘草者緣治腫藥內有甘遂相反故也先下若濃煎燈心木通湯下點服為妙不要甘遂從小便下甚穩更量虛實用之大要看尺脈腫盛而尺脈如絲或洪浮按之無根者皆不可下此藥外臺云脈大者生小者死叔和云氣浮大得延生沉細應當死沉香大腹皮湯出朱氏集驗方治腫沉香陳皮良薑附子丁香川芎白豆蔻草豆蔻各半兩厚朴大腹子各一兩炙白朮二兩半上細銼為散每服三大錢水一盞半生薑七片煎至八分去滓食前過口服信庵趙魯公母雍國夫人腫三十年後在襄陽得此藥服半月愈之沉香附子湯出朱氏集驗方治腫病大凡腫病因積而得先用祛積藥既除而腫再作小便不利到此束手以若用利小便藥性寒而小便愈不通故小便不利則中焦下焦不升降為寒氣所結故水凝而不通但用沉香附子湯附子一隻生去皮臍切成片上用生薑十數片水三盞煎至八分次用沉香濃磨二錢許加入藥中再煎二沸去滓空心服如此則小便自通喘自去矣沉香附子湯一向連吃三五十隻附子無礙男子婦人皆可服生料五苓散出直指方去水退腫澤瀉銼二十兩豬苓去皮赤茯苓去皮白朮去蘆各一十五兩桂去皮一十兩上為末每服二錢熱湯調下不拘時服又治瘀熱在裡身發黃疸濃煎茵陳蒿湯下食前服但病發渴及腫者引飲亦可用水調下服小兒加白朮末少許如發虛熱加綿黃耆人參末少許治胃水四肢腫滿方出千金方豬腎一具茯苓四兩防己橘皮玄參黃芩杏仁澤瀉桑白皮各二兩豬苓白朮各三兩大豆三升上十二味㕮咀以水一斗八升煮豬腎大豆澤瀉桑白皮取一斗澄清去滓入余藥煮取三升分三服若嗽加五味子三兩丸服三劑間五日一劑常用有效泄水丸上料加芒硝半兩商陸半兩為末水丸依前服如小豆大每服五十丸水下胡椒宣氣丸專治浮腫厚朴薑汁製用巴豆二八粒輕手破同厚朴四兩炒熱去豆用菌頭蘿子一兩羌活一兩藿香半兩木香一兩上為末用蒜磨水打糊為丸如緑豆大每服三十丸用燈心棗湯下用木通湯下亦得不拘時候寸氣丸專治脾腎氣虛腎水流溢四肢作腫大蒜五枚銼去皮碎附子一大隻去臍切作赤小豆揀五兩上同於砂鍋中用水五升煮取干為度先用水三升漸添至五升只取附子為末余不用卻入後藥白花商陸根半兩車前子二錢半沉香二錢木香三錢上件同附子薏苡仁末煮糊為丸如梧桐子大每服五十丸薏苡仁湯下空心日進三服其效如神平胃散專治腫病不進飲食蘿蔔子一盞白水煎取清汁煎平胃散上每服二錢以煎蘿蔔子汁一盞加薑一片棗一枚煎至七分仍入蘿蔔苗一捻同煎服此方纍有神效胃苓丸專治腫平胃散五苓散上各一貼用大蒜蒸熟和入胃苓二藥為丸梧桐子大每服五十丸煎木通湯吞下磁石丸專治諸氣腫大有妙效羌活陳皮去白木香澤瀉附子炮去皮臍焙乾檳榔白朮赤茯苓去皮蓯蓉訶子炮去皮用官桂去皮黃耆研為細末桑白皮另杵為末稱鱉甲醋炙令黃烏頭炮磁石脅鐵石者醋淬十次細研水飛過為度橘紅上件等分各半兩為末用羊石子或豬石子去脂膜生研細和末再杵一二千下如硬再入酒糊丸如梧桐子大焙乾空心日午溫酒下二十丸至三十丸切忌房事並鹽及諸毒物須至百日治酒疸遍身黃腫方五靈脂一兩上為末入麝香少許研令勻飯丸小豆大每服十丸用米飲吞下防風湯專治四肢節懈墮脫腫按之皮陷頭眩短氣溫溫悶亂欲吐者方防風白朮知母桂心各四兩芎藭芍藥杏仁甘草各三兩半夏生薑各五兩上十味㕮咀以水一斗煮取三升分四服日三夜一古方無半夏杏仁芎藭用附子治腫氣以秦荻子為末和大醋封腫如干再易日數次以瘥為度治腫氣以韭杵極爛煮熟拓瘡上便愈以馬齒燒灰唾和緋帛貼腫上根出治腫氣用拳參五月採搗末淋炸去浮腫用破黍莖提掃煮取汁浴之有人虛肥積年氣上如水病面腫腹不腫以楮葉八兩水煮取六升去滓內米煮粥吃治浮腫積水兼惡毒腫搗芫花茺蔚苗絞汁服之白朮湯專治脾虛浮腫橘皮大腹皮茯苓生薑皮各半兩白朮一兩上為細末每服三錢米飲下銀硃丹專治正水大便利者硫黃四兩火煅過銀硃三兩上研極細麵糊丸如梧桐子大每服三十丸米飲下大豆散出指南方治積水大豆一升炒香白朮二兩上為細末每服三錢溫米飲下
