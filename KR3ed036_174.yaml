body:
  text: 卷一百七十四積聚門米症附論夫病源人有好啞米轉久彌嗜啞之若不得米則胸中清水出得米水便止米不消化遂生癥結其人常思米不能飲食久則斃方散症湯出千金方治米症其疾常欲食米若不得米則胸中清水出雞屎一升白米五合上合炒令米焦搗篩為散用水二升頓服取盡少時即吐吐出症如研米若無症即吐白沫痰水乃憎米不復食米治米症久不療羸瘦蔥白兩虎口切烏梅三十枚碎上以水三升宿漬烏梅使得極濃清晨啖蔥白隨飲烏梅汁令盡頃心腹煩欲吐即令出之三晨療之當吐去米症瘥無所忌治食生米方家藏經驗方男子婦人因食生熟物留滯於脾胃遂致生蟲久則好食生米否則終日不樂至於肌膚憔悴面色萎黃不思飲食以害其生上用蒼朮不拘多少米泔水浸一宿取出銼碎焙乾碾為細末煮稀麵糊為丸如梧桐子大每服五十粒空心食前米飲下日三服益昌伶人劉清嘯家一婢曰花翠年逾笄病此三月餘監惠民局趙尹能醫以此治之兩旬而愈蓋生米留滯於脾胃受濕則谷不磨致成此疾蒼朮能去濕暖胃消穀故也尹先云曾用此藥療綿州常振省干兩旬而痊因筆於册發症附論病源云有人因食飲內誤有頭髮隨食而入成症胸喉間如有蟲上下來去者是也方食中有髮不覺因食而入久則胸間如有蟲狀上下去來惟欲飲油一日之中乃至三二升不欲飲食者為髮症方出千金方上用油一升以香澤煎之大𨪊𨦭貯之安病人頭邊令口鼻臨油上勿令得飲敷鼻面令有香氣當叫喚飲不得與之必疲極大睡其發症當從口出飲油令一人專守視之並備石灰一裹見症出以灰粉手捉症抽出須臾抽盡即是發也初從腹中出形如不流水中濃菜隨髮長短形亦如之又方出千金方上用酒三升煮豬脂二升三沸一服一升日二白馬尿服之亦佳無馬白牛亦得療胸喉間覺有症蟲上下偏聞蔥豉食香此是發蟲故也上用油煎蔥豉令香二日不食張口而臥將油蔥豉置其口邊蟲當漸出徐徐以物引去之無所忌治誤食頭髮如蠱疾者上用雄黃研細水飛過酒調服吐出惡物乃愈蝨症附論病源云人有多蝨而性好齧之所齧既多臟腑虛弱不能消之不幸變化生症而患者亦少俗云蝨症人見蝨必齧之不能禁止蝨生長在腹內時有從下部出亦能斃人方療蝨症由齧蝨在腹生長為蝨症方出千金方故敗篦子一枚故敗梳子一枚上二味各破為兩分各取一分燒作灰末之又取一分以水五升煮取一升頓服前末盡少時當病出無所忌鱉症附論病源云鱉症者謂腹內癥結如鱉之形狀有食鱉觸冷不消生症者有食諸雜物得冷不消變化而作者此皆脾胃氣弱而遇冷不能克消故也癥瘕結成推之不動移是也方蟹爪丸治鱉症狀在心下手揣見頭足時轉動並痛蟹爪三分附子六分炮麝香三分研半夏六分湯洗七遍生薑四分屑鱉甲六分炙防葵六分郁李仁八分上搗篩蜜和丸如梧子大空肚以酒下二十丸日再服以知為度忌生冷油鹽熱面蕎麥陳臭黏膩羊肉餳豬肉莧菜治鱉症伏在心下手揣見頭足時時轉者並心腹宿症及猝得症方出肘後方上用白雌雞一雙絶食一宿明旦以膏熬飯飼之取其屎無間多少小便和之於銅器中火上熬令燥搗篩每服方寸匕日四五服消盡乃止常飼雞取屎病瘥畢殺雞單食之治鱉症方出本草方白馬尿一升五合溫服之令盡瘥治鱉症腹堅硬腫起大如盤眠臥不得方出千金方上取藍一斤搗水三升絞取汁每服一升日二又方出千金方上蒴藋根白皮一握研取汁以水和頓服之又方出千金方上用白馬尿一升雞子三枚取白合煎取二合空腹頓服之不移時當吐病出又方出千金方上雞屎一升炒令黃取五合以酒一升浸取半搗為末以所浸酒服方寸匕日二服三日中作一劑治人龜病人間龜病不能言肚裡生成硬似磚自死殭蠶白馬尿不過十日軟如綿結瘕附論結瘕者積聚之類也結伏積聚久不散謂之結凝滯腹內按抑有形謂之結瘕結瘕之證形體瘦悴食不知飢飽遇陰寒冷濕之氣則發而腹脅塊硬隱隱然痛者是也結瘕之證腹中氣痛動轉橫連脅下有如癖氣遇脾胃有冷陽氣不足而發動者是也方檳榔湯出聖濟總録治結瘕脈弦腹滿坐臥不安食即欲吐而喘急檳榔白者銼一兩半赤茯苓去黑皮芍藥陳橘皮湯浸去白焙吳茱萸陳者淘七遍炒郁李仁湯退去皮別研如膏訶黎勒煨去核各三分荊三稜煨銼桑根白皮焙銼各一兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服食前後各一服若服後頻利即減檳榔郁李仁紫葛丸出聖濟總録治結瘕腹脹堅硬如石肚上青筋浮起紫葛一兩芍藥赤者桔梗炒紫菀去苗土木香訶黎勒皮各三分大黃銼熬一兩半牽牛子半兩郁李仁湯浸去皮研一兩上為末煉蜜為丸如梧桐子大每服十五丸空腹煎木通及棗湯下老幼量減丸數防己湯出聖濟總録治結瘕氣積腹滿如石氣急少臥小便不利防己百合乾者郁李仁去皮各一兩別研如膏木通銼一兩半吳茱萸陳者淘七遍炒半兩陳橘皮湯浸去白焙當歸切焙赤茯苓去黑皮各三分上搗篩為散每服三錢匕水一盞生薑半分煎至六分去滓空心溫服羌活丸出聖濟總録治結瘕氣塊飲食不消肺積氣發心胸痰逆氣喘猝中風毒腳氣大腸祕澀奔豚氣痛羌活去蘆頭桂去粗皮芎藭木香檳榔銼各一兩郁李仁湯浸去皮研如膏五兩大黃銼炒二兩上除郁李仁外搗羅為末與郁李仁研勻煉蜜和丸如梧桐子大每服二十丸空心煎生薑湯下或棗湯下氣痛溫酒下木通湯出聖濟總録治結瘕腹脹堅硬不消木通銼赤茯苓去黑皮各一兩赤芍藥吳茱萸湯洗焙炒各三分檳榔一枚紫菀去苗土郁李仁去皮尖炒各半兩上粗搗篩每服三錢匕水一盞半煎取七分空腹服日再防己散出聖濟總録治結瘕癖實腹滿如鼓食即欲吐喘息急其脈弦而緊防己煮訶黎勒煨去核郁李仁湯退皮研如膏白朮檳榔銼各一兩半吳茱萸陳者淘七遍炒三分上除郁李仁外搗羅為散入郁李仁同研令勻每服三錢匕水一盞煎至六分和滓空心溫服木香湯出聖濟總録治遠年虛實積聚瘕塊木香一兩海馬子一對雌雄者雌者黃色雄者青色大黃銼炒青橘皮湯浸去皮焙白牽牛炒各二兩巴豆四十九粒上以童子小便浸青橘皮軟裹巴豆以綿系定入小便內再浸七日取出麩炒黃去巴豆只用青橘皮並余藥粗搗篩每服二錢匕水一盞煎至三五沸去滓臨臥溫服木香煎丸一名木香硇砂煎丸治結瘕積聚血結刺痛蛇瘕附論病源云人有食蛇不消因腹內生蛇瘕也亦有蛇之精液誤入飲食內亦令病之其狀常苦飢而食則不下喉噎塞食至胸內即吐出其病在腹摸揣亦有蛇狀謂蛇瘕也方療蛇瘕大黃湯出千金方大黃半兩芒硝如雞子一枚烏魚骨三枚黃芩半兩一本作茯苓甘草如大指一尺炙皂莢六枚如豬牙者炙去皮子上㕮咀以水六升煮之三沸下絞去滓納芒硝適寒溫盡服之十日一劑煮作如上法欲服之宿勿食平旦服當下病也忌海藻菘菜等治蛇瘕方出聖惠方川芒硝半兩烏賊魚骨半兩川大黃半兩銼碎微炒防葵半兩皂莢半兩去黑皮塗酥炙黃焦去子上為散每服四錢以水一中盞煎至六分去滓溫服日三四服又方出聖惠方雄黃一分白礬一分燒為灰硇砂一分膩粉一錢麝香一分巴豆二七粒去皮心研紙裹上為末以桃膠和丸如緑豆大每服以溫酒下五丸日三四服治蛇症方出千金方上以白馬尾切長五分酒服方寸匕大者自出更服二分者一方寸匕中者亦出更服三分者一方寸匕小者復出不可頓作一服殺人鱉瘕附論病源云鱉瘕者謂腹內瘕結如鱉狀是也有食鱉觸冷不消而生者亦有食諸雜冷物變化而作者皆由脾胃虛弱而遇冷即不能克消所致瘕言假也謂其形假而推移也昔曾有人共奴俱患鱉瘕奴在前死遂破其腹得一白鱉仍故活有人乘白馬來看此物白馬忽尿墮落鱉上即縮頭及腳尋以白馬尿灌之即化為水其主曰吾將愈矣即服之果如其言得瘥故養生云六月勿食澤中水令人成鱉瘕方療鱉瘕方出聖惠方大黃六銖乾薑半兩附子九銖炮人參九銖蟅蟲大一寸者七枚熬側子半兩炮桂心六銖貝母半兩白朮一兩細辛十八銖上十味搗下篩以酒服半方寸匕日三忌生菜生蔥桃李雀肉豬肉冷水一方有檳榔又方出聖惠方防葵一兩鱉甲一兩塗醋炙令黃去裙襴苦楝子一兩郁李仁一兩去皮微炒檳榔一兩上為細散每服以溫酒調下二錢日三四服患鱉瘕者出本草上用新赤黍米淘取泔汁生服一升不過三兩度愈魚瘕附論有人胃氣虛弱者食生魚因為冷氣所搏不能消之結成魚瘕揣之有形狀如魚是也亦有飲陂湖之水誤有小魚入人腹不幸便即生長亦有形狀如魚故以名也方治食魚膾及生肉住胸膈中不化吐之不出便成癥瘕方出聖惠方厚朴一兩去粗皮塗生薑汁炙令香熟川大黃二兩銼碎微炒上為散作二服每服以酒一大盞煮取六分去滓放溫盡服良久再服立消療食魚膾及生肉住胸膈中不消化吐之不出多成症病出聖惠方朴硝如半雞子一枚大黃二兩切上以酒二升煮取一升去滓盡服之立消無朴硝用芒硝硝石亦佳一方為散每服三錢以酒一中盞煎至六分去滓空腹溫服當下利即瘥治食膾不消方及生肉住胸膈不化必成癥瘕出聖惠方上搗馬鞭草汁一大盞煎五七沸分溫二服盡即消服生薑汁亦消又方出聖惠方上以魚鱗燒作灰細研每服以新汲水調下一錢治食魚肉等成癥結在腹內並諸毒方出千金方上以狗屎五升燒末綿裹以酒一斗浸再宿濾取清分十服日三三日令盡隨所食癥結即出治食魚膾腹中脹滿成瘕痛悶飲食不下日漸瘦用水中石子數十枚火燒赤投五升水中各七遍即熱飲之如此三五度當利出瘕也痃癖附論夫痃癖者本因邪冷之氣積聚而生也痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弓弦之狀名曰痃氣也癖者側在兩肋之間有時而僻故曰癖也夫痃之與癖名號雖殊針石湯圓主療無別此皆陰陽不和經絡痞隔飲食停滯不得宣流邪冷之氣搏結不散故曰痃癖也方木香通氣丸出聖惠方治痃癖氣滯心腹痞滿嘔逆咳嗽消痰進食散痞人參木香各一兩半玄胡一兩陳皮去白黑牽牛各六兩檳榔丁香各半兩荊三稜炮切廣朮炮三兩半夏薑製茴香炒木通神麯麥糵盤各二兩青皮去皮三兩上為細末水糊為丸如小豆大每服二三十丸生薑湯下食後日進二服硃砂三稜丸主痃癖氣塊留滯一切內傷石三稜酒浸荊三稜酒浸雞爪三稜酒浸蓬朮醋浸枳殼去瓤麩炒川楝子去皮子茴香微炒青皮去白當歸去蘆各半兩檳榔七錢半丁香二錢木香三錢巴豆去殼麩炒至深黃色為度一十八粒巴豆斟酌量用或只用巴豆三稜枳殼蓬朮三味亦得炒至黃色去巴豆肉豆蔻七錢半硃砂五錢水飛一半入藥一半為衣上為細末除硃砂外生薑研汁打糊用面成劑為丸如小豆大每服十五丸薑湯下溫水亦得療痃癖氣兩脅脹滿方牛膝大黃各十分桔梗芍藥枳實白朮各八分人參柴胡桂心各六兩鱉甲茯苓訶黎勒皮各八分上搗篩蜜和丸如梧桐子大空心酒飲及薑湯任下二十丸日二服漸加至三十丸利多即以意減之常取微通泄為度忌生硬難消油膩等物及莧菜桃李雀肉豬肉冷水生蔥開結妙功丸出宣明論治怫熱內盛痃癖堅積酒積食積一切腸垢癥瘕積聚疼痛脹悶作發有時三焦壅滯二腸燥澀懊憹心煩不得眠咳嗽噦逆不能食或風濕熱兼為腫脹黃瘦眼澀昏睡一切所傷心腹暴痛風熱燥郁偏正頭疼筋脈拘急肢體麻痹走注疼痛頭目昏眩中風偏枯邪氣上逆上實下虛腳膝冷痛常服保養宣通血氣消進飲食荊三稜炮茴香炒神麯麥糵大黃各一兩好醋半升熬成膏不破堅積不須熬膏水丸乾薑二錢川烏頭四分半夏半兩桂二錢巴豆兩枚破堅積用四枚牽牛三兩上為細末用膏丸小豆大生薑湯下十丸或十五丸或嚼生薑溫水或只用溫水涼水下亦得漸加至二三十丸或心胃間稍覺藥力暖即卻減丸數以意加減無時日三服或取久積或破堅積初服十丸次服二十丸每服加十丸日三服以加至快利三五行後如常服少得食力後更加取利以意消息病去為度病甚者自十五丸加服二香三稜丸出聖濟總録治痃癖結塊面黃肌瘦心腹引痛不欲飲食宿滯冷痰丁香木香各一兩荊三稜煨銼雞爪三稜石三稜各三分硇砂研牽牛子炒大黃炮蓬莪朮炮各半兩檳榔銼一兩烏梅肉焙乾二兩巴豆五十個去皮心出油七分細研上為末再研勻酒煮麵糊和丸如緑豆大每服五丸至七丸陳橘皮湯下食後服木香三稜丸主心腹痃癖癥瘕氣塊腸胃積聚上下不通木香七錢荊三稜炮一錢半石三稜淨一兩半蓬朮煨一兩半青皮去瓤一錢半肉豆蔻去皮四兩雞爪黃連三稜淨一兩半檳榔淨四兩巴豆去皮全仁者煨三二十枚上為細末水煮生薑取釅汁打糊成劑為丸如小豆大每服十丸溫生薑湯送下或溫水送下不以時候日進一服斟酌虛實加減丸數雞爪三稜丸一名三稜丸出濟生拔粹方治五臟痃癖氣塊雞爪三稜京三稜石三稜木香青皮去白陳皮去白各半兩硇砂三分檳榔肉豆蔻各一兩上為細末生薑汁麵糊為丸桐子大生薑湯送下一方無陳皮年深者一月見效忌一切生冷硬物及滑物木香丸出聖惠方治痃癖氣脅肋妨悶不欲飲食四肢瘦弱木香半兩乾薑一兩炮裂銼草豆蔻一兩去皮桂心一兩當歸一兩銼微炒陳橘皮一兩湯浸去白瓤焙附子一兩炮裂去皮臍巴豆五十枚去皮心研紙裹壓去油上件藥搗羅為末入巴豆研令勻煉蜜和搗三二百杵丸如緑豆大每服食前以粥飲下五丸京三稜丸出聖濟總録治丈夫婦人痃癖氣一切積滯京三稜椎碎芫花各三兩二味醋浸五七遍炒黃蓬莪朮銼炒桂去粗皮各一兩附子炮裂去皮臍一兩半乳香研硇砂細研各一分巴豆三十枚用硫黃一皂子大研細醋兩盞煎醋盡為度只用巴豆上搗研令勻每用藥末二兩熔黃蠟一兩蜜少許同和丸如梧桐子大丹砂為衣生薑木瓜湯下二丸至三丸甘草生薑湯下亦得看虛實臨時用烏頭丸出聖惠方療痃癖積冷發如錐刀所刺鬼疰往來者烏頭炮人參去蘆頭桂心附子炮乾薑赤石脂各八分硃砂研三分上搗篩蜜和為丸如梧桐子大以暖酒服七丸稍稍加至十丸忌生冷醋滑豬魚雞蒜小豆油膩牛馬肉生血物生蔥等物療痃癖上以蓼每日取一握水煮服之療痃癖上以鼠屎一大合炒令黃濕者熬幹不須炒即用水二升煮五六沸及熱濾取汁置碗中急納硇砂一小兩乃蓋頭經宿明日平旦溫為兩服稍晚食無所忌大黃散出聖惠方治痃癖氣連心肋相引痛堅硬川大黃一兩銼微炒當歸一兩銼微炒白朮一兩枳殼一兩麩炒微黃去瓤柴胡一兩半去苗鱉甲一兩塗醋炙令黃去裙襴上件藥搗篩為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候溫服吳茱萸散出聖惠方治痃癖氣不消吳茱萸半兩湯浸七遍焙乾微炒鱉甲三兩塗醋炙令黃去裙襴川大黃一兩銼碎微炒當歸三分銼微炒京三稜一兩微炮銼檳榔一兩上件藥搗細羅為散每服食前以暖酒調下一錢丁香散出宣明論治痃癖氣脅下痞滿息而不消積而不散元氣在胃而妨食者好丁香二十五枚白丁香七十枚密陀僧舶上硫黃黃鷹調各半兩上為細末每服一字皂子煎湯調下不計時候治肚內生硬物肌膚黑瘦如柴嘔吐積滯日三服食後妙應丸出醫方大成治老人虛人一切虛寒痃癖積塊攻脹疼痛諸臟氣虛積聚煩悶及飲食中蠱毒或食水陸蓏子卵入腹而成蟲蛇魚鱉或宿食留飲婦人産後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜臥多厭食少腹痛大便糟粕變成冷痢黑附子二枚各重七錢去皮臍剜作罐子硇砂三錢用水一盞化在碗中火上熬干稱木香不見火七錢半破故紙微炒蓽茇各一兩上將飛過硇砂末作附子甕內卻用剜出附子末蓋口用和成白麵裹約半指厚慢炭火內煨令黃色去面同木香等為細末卻將元裹附子黃面為末醋調煮糊為丸如緑豆大每服十五丸至二十丸食後生薑湯送下一方有青皮消滯千金丸治證同前牽牛頭末四兩香附子二兩五靈脂一兩半京三稜五錢上為末醋糊為丸每服二三丸甘草湯下桃仁丸療十年痃癖桃仁六升去皮尖雙仁者熬豉六升干爆去皮熬搗篩蜀椒三兩去目閉口者生搗下篩乾薑三兩生搗下篩上先搗桃仁如脂合搗千杵如干可下少許蜜和搗令可丸如酸棗大空肚酒服三丸日三鱉甲丸出聖惠方治痃癖氣塊不消令人羸瘦面色萎黃四肢少力不欲飲食鱉甲三兩塗醋炙令黃去裙襴京三稜三分微煨銼川大黃三兩銼微炒陳橘皮三兩湯浸去白瓤焙上件藥搗羅為末於銀鍋中入米醋三升以慢火熬成膏候可丸即丸如梧桐子大每於食前以粥飲下三十丸芫花丸出聖惠方治痃癖氣疼痛芫花半兩醋拌炒乾硇砂二一兩醋化令消盡乾薑半兩炮裂銼京三稜半兩銼碎醋浸三宿焙乾上件搗藥羅為末用硇砂醋熬成膏以蒸餅少許同和丸如緑豆大每服食前以薑橘皮湯下十丸加減麻仁丸療積年患氣不能食飲兼食不消化風氣冷氣熱氣衝上痃癖氣並乳石氣發動並療之服經三四日自覺有效蜀大黃四兩訶黎勒皮四兩人參二兩大麻仁二兩上搗篩依法以蜜和丸每服十丸二十丸增減以意量之以溏利病除亦不損人常服三十餘年至八十歲萬病皆無百無所忌補理腰膝服經七八日腰腎先冷者即下濃水腰腳輕健以酒飲下之並得治大人小兒痃癖氣塊往來疼痛不止又治心氣痛不可忍者白玉赤玉上為細末用水糊為丸如梧子大每服三十丸生薑湯送下又方南星制香附子各等分上為末薑汁丸每服二三十丸熱薑湯下治丈夫痃癖兩脅虛脹變為水氣服之皆效驗此法出傳尸方豬𦚠一具細切青蒿葉不拘多少上以無灰酒一大升微火溫之乘熱納豬𦚠中和蒿葉相共暖使消盡又取桂心一小兩別搗為末納酒中每日平旦空腹取一小盞服之午時夜間各再一服甚驗忌熱面油膩等治冷氣痃癖羸瘦方見枸杞子丸治積冷痃癖氣不思飲食四肢羸困宜服此方出聖惠方莨菪子三分水淘去浮者大棗四十九枚上件藥以水三升相合煮水盡即取棗去皮核每於食前吃一枚粥飲下亦得覺熱即止治痃癖不瘥脅下痛硬如石方出聖惠方生商陸根汁一升杏仁一兩湯浸去皮尖上件藥研杏仁令爛以商陸根汁和研濾取汁以火煎如餳每服取棗許大空腹以熱酒調服之漸加以利惡物為度治痃癖氣不消方出聖惠方京三稜一兩微煨銼川大黃一兩銼上件藥搗羅為末用醋熬為膏每日空心以生薑橘皮湯調下一茶匙大黃丸出聖惠方治痃癖氣時攻心腹疼痛令人不思飲食漸為瘦病川大黃一斤生為末鱉甲三兩塗醋炙令黃去裙襴枳殼三兩半麩炒微黃去瓤當歸一兩半銼微炒赤芍藥一兩半京三稜三兩微煨銼吳茱萸一兩湯浸七遍焙乾微炒上件藥搗羅為末先以米醋三升熬大黃為膏次入諸藥和丸如梧桐子大每服於食前以溫酒下三十丸消飲丸出宣明論方治一切積聚痃癖氣塊及大小結胸腹痛不能抑按天南星半夏芫花自然銅各等分生用上為末醋煮麵糊為丸如梧桐子大每服五七丸食前溫水下良久蔥粥投之相虛實加減硇砂丸出聖惠方治痃癖冷症塊及療丈夫腰腳補暖水藏善治婦人氣血暖子宮殺三蟲伏火上先取臘月細桑條子不限多少燒作灰略以水淋卻苦汁後將冷灰干收之每一兩硇砂用灰三兩先研硇砂以水化消拌灰令乾濕得所取一固濟了瓷瓶子底下先鋪干灰半寸以來次下硇砂灰填實口頭更著干灰覆蓋後用文武火燒後武火鍛令通赤候冷取出重研於筲竹箕內鋪紙三重後安灰以水淋之候藥透過紙待硇砂味斷即休淋水別取小瓷鉢子一兩個盛藥汁於熱灰火內養之常令魚眼沸直至汁盡候乾別入固濟了瓶子內便以大火煅一食久待冷取出細研用粟米飯和丸如緑豆大每日空心以暖酒下五丸桃仁煎出聖惠方治痃癖氣心腹疼痛肌膚瘦弱面無顏色及男子元氣婦人血氣並宜服此上以桃仁二千枚湯浸去皮尖雙仁細研如膏以酒二斗淘濾取汁於淨鐺中以慢火煎成膏每於食前以暖酒調下一茶匙檳榔煎丸出聖濟總録治痃癖氣及兩脅積聚並婦人血刺疼痛檳榔三兩銼搗為末酒一升熬成膏吳茱萸為末醋一升熬成膏硫黃京三稜為末醋半升熬成膏巴豆各一兩去皮以絹袋子盛用水五味與硫黃同煮及一升將硫黃與巴豆同研木香白豆蔻去皮肉豆蔻去殼桂去粗皮陳橘皮湯浸去白焙青橘皮湯浸去白焙高良薑蓽茇訶黎勒皮白朮各一兩胡椒一兩分當歸切焙乾漆炒煙出各半兩草豆蔻去皮一兩上為末與前三味膏同搜丸如緑豆大每服生薑湯下三五丸食後服鱉甲丸出聖濟總録治痃癖氣塊鱉甲醋炙去裙襴稱二兩乾薑炮大黃銼炒硇砂去砂石各一兩半附子炮裂去皮臍檳榔銼桂去粗皮乾漆炒出煙京三稜煨木香訶黎勒皮水銀與諸藥末同研各一兩墨燒半兩上為末用曲末三兩濃醋二升同煎成膏和上件藥丸如梧桐子大每服七丸加至十丸不拘時候日三丈夫溫酒下婦人醋湯下不嚼即破取下血塊如雞肝色是效治痃癖氣食物不消宜服此方出聖惠方木香一兩硫黃一兩細研水飛過川大黃三兩銼碎微炒上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大食前以溫酒下二十丸又方出聖惠方蒼朮一兩川烏二兩炮裂去皮臍赤芍藥半兩上件藥搗羅為末用醋煮麵糊和丸如梧桐子大每服食前以生薑橘皮湯下二十丸半硫丸出仁存方治年高風祕冷祕心腹一切痃癖冷氣暖元臟止泄進飲食硫黃研細半夏湯洗七次焙乾為末各等分上以生薑汁同熬炊餅末攪勻杵丸如梧桐子大空心溫酒薑湯下五十丸或用蔥白一條生薑三片煎熟入阿膠二片溶開下木香通氣丸出劉先生直格方治內熱結成痃癖堅積酒食所傷一切腸垢積聚疼痛脹悶作發有時脹滿心腹暴痛邪氣上逆升而不降並宜服之木香京三稜玄胡索當歸黃芩桔梗連翹各一兩大黃二兩半桂半兩牽牛四兩甘草三兩大梔子半兩黃柏二兩上同為細末煉蜜為丸如豌豆大每服三十至五十丸溫水下不拘時候通利為度牛黃神金丹治一切堅積痃癖氣塊腹脅滿硬疼痛及小兒驚疳積塊氣喘痰涎嘔吐泄瀉寒熱瘧疾輕粉粉霜硇砂雄黃硃砂巴豆去皮末信各一錢黃丹黃蠟各三錢上各研為末次研巴豆爛如油卻熔蠟軟搜和作劑旋丸如小豆大每服一丸新水送下小兒粟米大量虛實用治老婦血瘕男子痃癖痞悶奴柘草三稜草馬鞭草上等分煎如稠糖病在心食後服在臍空心服當有惡物下治痃癖諸塊伏梁臘月雄雀屎溫兩頭尖者是也俗呼為青丹乾薑味辛大熱桂味甘辛大熱有小毒艾味苦微溫上四味乾薑桂心等分為末將臘月雄雀屎和為丸如梧桐子大溫水服三五丸入腹能爛痃癖治痃癖羸瘦上豬𦚠和棗肉浸酒服之破冷痃癖上用生栗榍生食良治痃癖上用大蒜日食三顆昔有患痃癖者嘗夢人教每日食三顆大蒜初時依夢遂至瞑眩口中吐逆下部如火後有人教令取數斤合皮截卻兩頭吞之名為內灸依此大效主痃癖安心定志聰明耳目除邪逐風變白性溫不寒上取莨菪子曝乾隔日空腹水下一指捻勿令子破破則令人發狂或用小便浸之令澀小便盡曝乾依前服之治痃癖痞滿出本草上用苦丹苗子煮汁服或生搗絞汁服治痃癖出本草用醋煎大黃服之佳治癖鱉甲炒令黃色訶黎勒皮乾薑上三味等分為末酒浸為丸如桐子大空腹酒服二十丸久痃癖附論夫久痃癖氣者本因邪氣所生不離陰陽之氣結蓄而成也此皆由臟腑不調脾胃虛弱飲食積滯不能宣行復遇寒氣在內即結聚而不散於臍脅左右弦急緪起時有腹痛時人多患此病猝瘥極難纍月逾年積聚成也故名久痃癖氣也方烏頭丸出聖惠方治久痃癖氣腹內積聚邪氣往厥逆搶心心胸痞悶吐逆飲食川烏頭一兩半吳茱萸三分川椒三分乾薑三分桂心三分柴胡一兩生薑地黃一兩細辛半兩紫菀半兩人參半兩芎藭半兩白朮半兩皂莢半兩赤芍藥半兩上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候溫酒下二十丸京三稜丸出聖惠方治久痃癖氣心腹脹滿時時攢連心背痛宿食不消嘔吐不思飲食氣息喘促面目黃瘦虛腫京三稜三分鱉甲一兩川大黃一兩半木香半兩當歸三分白朮三分厚朴一兩吳茱萸半兩麥糵一兩訶黎勒一兩枳殼一兩神麯一兩桂心一兩檳榔一兩上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每服不拘時候以粥飲下三十丸大黃丸出聖惠方治久痃癖氣發歇不定肌肉消瘦往往吐逆肩背疼痛宜服川大黃二兩銼碎微炒川朴硝一兩蓬莪朮二兩訶黎勒一兩煨用皮桂心三分枳殼一兩麩炒微黃去瓤吳茱萸三分湯浸七遍焙乾微炒金星礬石各二兩泥裹燒一復時細研柴胡二一兩去苗狼毒半兩微煨巴豆一分去心皮研紙裹壓去油上件藥搗羅為末研入巴豆礬石令勻以熟棗瓤和搗三二百杵丸如梧桐子大每日空心以溫酒下十丸老少臨時加減丸數服之蓽茇丸出聖惠方治久痃癖氣或時嘔噦腹痛不能飲食蓽茇一兩乾薑三分炮裂銼胡椒三分桂心三分人參一兩去蘆頭陳橘皮三分湯浸去白瓤焙訶黎勒一兩煨用皮赤茯苓一兩檳榔二兩上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每服不計時候以粥飲下二十丸痃氣附論夫痃氣者由陰陽不調臟腑虛弱邪冷之氣結聚而生也其狀腹內連臍左右各有一條筋脈大如臂次者如指拘急如弦之狀名曰痃氣也痃氣謂臍腹左右堅硬而痛橫連如臂取象如弓弦之急故謂之痃氣蓋因寒溫失宜房室過度真陽虛憊陰冷內生所以水飲入於胃而不能消流於脅下經久不去遂成痼疾若遇陰寒或食冷物則作痛久則不能飲食肌膚消瘦方療痃氣方牛膝芍藥桔梗厚朴炙茯苓訶黎勒熬柴胡大黃各六分枳實炙蒺藜子熬人參各五分橘皮檳榔各四分上搗篩蜜和丸如梧桐子大空肚煮大棗飲服二十丸日再漸漸加至三十丸如利多以意減之忌生硬難消物及油膩豬肉醋物人參湯出聖濟總録治痃氣撮痛不能飲食人參陳橘皮湯浸去白焙白朮各一兩赤茯苓去黑皮一兩半桂心去粗皮三分上粗搗篩每服三錢匕水一盞半入生薑半棗大拍破同煎至七分去滓溫服日三京三稜湯出聖濟總録治痃氣積滯不消胸膈痞悶不思飲食京三稜炮銼木香甘草炙銼蓬莪朮炮銼各一兩藿香葉一兩半烏藥銼蘹香子炒各半兩赤茯苓去黑皮三分上粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服白朮湯出聖濟總録治痃氣胃冷兩脅脹滿不能飲食白朮赤茯苓去黑皮枳殼去瓤麩炒各一兩半人參桔梗去蘆頭炒桂去粗皮各一兩上粗搗篩每服三錢匕水一盞半入生薑半棗大拍破同煎至七分去滓溫服日三木香丸出聖濟總録治痃氣胃冷不入飲食木香蜀椒去閉口及目炒令汗出乾薑炮裂各一兩上為末熔蠟和丸如梧桐子大空心溫酒下七丸緩中湯出聖濟總録治痃氣急痛腹脹胃虛不下食甘草一分鱉甲附子芍藥橘皮厚朴人參枳殼桂去粗皮半夏各半兩乾薑炮檳榔各一分上銼如麻豆每服五錢匕水一盞半生薑五片煎取八分去滓溫服檳榔散出聖濟總録治痃氣急痛腹脹胃虛不下食檳榔半兩川烏頭一兩炮裂去皮臍當歸半兩銼微炒赤芍藥半兩陳橘皮三分湯浸去白瓤焙人參半兩去蘆頭枳殼半兩麩炒微黃去瓤乾薑一兩炮裂銼桂心半兩厚朴半兩去粗皮塗生薑汁炙令香熟半夏半兩湯洗七遍去滑甘草一分炙微赤銼上件藥搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服檳榔丸出聖惠方治痃氣發即兩脅弦急心肋脹痛不能飲食檳榔三分枳殼一兩麩炒微黃去瓤鱉甲一兩塗醋炙令黃去裙襴桔梗半兩去蘆頭人參半兩去蘆頭白朮三分桂心三分木香二三分前胡三分去蘆頭川烏頭三分炮裂去皮臍川大黃一兩銼碎微炒當歸三分銼微炒上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸枳殼丸出聖濟總録治痃氣急痛嘔吐酸水食物多噎枳殼去瓤麩炒搗末米醋二升別研如膏木香薏苡仁黃連去須大黃銼炒人參白茯苓去黑皮附子炮裂去皮臍蠡實微炒郁李仁湯去皮尖別研各一兩上除煎研外搗羅為末入郁李仁同研勻入枳殼煎中和搜如硬入少煉熟蜜丸如梧桐子大空腹煎黃耆湯下二十丸日晚再服烏頭丸出聖濟總録治痃氣上攻心脾疰痛嘔吐酸水醋心烏頭生用去皮臍二兩附子生用去皮臍乾薑生用各一兩三味同搗羅為末阿魏研末入前三味末中研勻別取生地黃汁四升用銅銀器中慢火煎成膏木香肉豆蔻去殼龍膽去土干椿葉各三分當歸切焙一兩半桂去粗皮一兩上將木香等六味搗羅為末入前煎中和為劑再入臼搗勻如硬即入少蜜丸如梧