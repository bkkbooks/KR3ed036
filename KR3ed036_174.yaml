醋煮大黃薄切醋一碗煮乾用檳榔各半兩桔梗芫花於土器內醋炒黃黑色沒藥研入木香各一兩白蒺藜去刺一兩桂心去皮八銖上為細末與芫花並沒藥相滾同研如飛塵每服三錢不計時候蔥湯調下癖氣附論夫五臟調和則營衛氣理營衛氣理則津液通流津液敷腴則脾胃流轉雖復多飲水漿亦不能為病若攝養乖方則三焦痞隔而腸胃不能宣行因飲水漿便令停滯不散更遇寒氣聚積而成癖者謂僻側在於左右兩脅之間有時而痛是也方大五明狼毒丸出千金方治堅癖痞在人胸脅或在心腹狼毒乾地黃四兩附子大黃蓯蓉人參當歸細辛蜀椒五味子䕡茹熬令煙盡各一兩半夏曲乾薑桂心各一兩半芫花莽草厚朴防己旋覆花半兩杏仁三十枚巴豆二十四枚上為末蜜和丸如梧桐子大每服二丸日一夜一以知為度鱉甲大黃丸出聖濟總録治癖積健脾胃消宿滯鱉甲去裙襴醋炙黃二兩大黃煨銼檳榔附子炮裂去皮臍麥糵炒各一兩烏藥銼訶黎勒煨去核木香白朮桂去粗皮蓬莪朮炮銼京三稜煨銼各三分枳殼去瓤麩炒吳茱萸炒各半兩上為末後將硇砂三兩細研醋三升濾去滓將前藥末平分一半入硇砂內攪和於銚子內煎成膏搜余藥和丸如梧桐子大空心炒生薑鹽湯下二十丸療癖羸瘠膏髓酒方豬肪膏薑汁生地黃汁各三升牛髓二升油五升當歸蜀椒出汗各四分吳茱萸五合桂心人參芎藭各五分乾地黃七分遠志皮五分五味子六分上切搗九味三篩為散取膏髓等五種汁加水一斗同汁煎取水並藥汁俱盡但餘膏在停小冷下散攪令調火上煎三上三下燥器貯凝冷為餅方寸以清酒一升暖下膏取服之晝兩服夜一服非但療癖亦主百病忌生蔥蕪荑防葵丸出聖惠方治癖氣兩脅下硬按之痛心間咳逆不下飲食四肢羸瘦積年不瘥防葵三分芎藭半兩赤茯苓三分鱉甲一兩塗醋炙令黃去裙襴桃仁三分湯浸去皮尖雙仁麩炒微黃枳殼半兩麩炒微黃去瓤木香半兩川大黃三兩銼微炒當歸半兩銼微炒乾薑半兩桂心半兩細辛半兩桔梗半兩去蘆頭京三稜三分微煨銼上件藥搗羅為末煉蜜和搗五七百杵丸如梧桐子大每服不計時候以粥飲下三十丸防葵丸出聖濟總録治癖氣積氣脅肋妨滿腹脹不思飲食木香硇砂煎丸出王氏博濟方治癖氣積氣血結刺痛木香一分硇砂醋一盞化盡濾去砂石半兩巴豆去皮膜不出油研大黃炮京三稜生銼乾漆炒煙出青橘皮湯浸去白焙蓬莪朮炮附子炮裂去皮臍桂去粗皮乾薑炮各一兩墨一指節大研上將大黃京三稜巴豆三味各搗研為末同於銀石器內以醋一升煎一兩沸次入硇砂同熬成膏次將諸藥搗羅為末用膏和成劑杵千下為丸如緑豆大每服五丸炒生薑湯下結聚腹內氣塊痛乾薑湯或橘皮湯下食冷麵黏食不消成塊聚煮麵湯下食牛羊鱉肉成氣塊不散各用本肉淡汁下宿酒不消溫酒下婦人諸般血氣當歸酒下妊娠不得服如要宣轉茶清下加至七丸小兒三丸鱉甲丸出聖惠方治癖氣兩脅下硬如石按之痛心腹痞滿不能下食心悶咳逆積年不瘥療腹中癖氣方牛膝枳實炙鱉甲茯苓各八分桔梗芍藥白朮人參厚朴炙大黃桂心檳榔各六分上搗篩蜜和丸如梧子大空肚溫酒服二十丸日二服漸加至三十丸老小微利忌生冷油膩小豆黏食莧菜桃李雀肉大醋生蔥豬肉三稜丸出聖濟總録治食氣癖塊胸膈噎塞冷氣攻刺吐酸水不美飲食腹脅脹滿痛氣不升降京三稜炮銼芍藥桔梗炒乾薑炮檳榔生銼吳茱萸湯浸焙乾炒烏頭炮裂去皮臍各半兩大黃煨銼訶黎勒煨去核各一兩鱉甲去裙襴醋炙一兩半桃仁湯浸去皮尖雙仁麩炒微黃三分上為末酒煮麵糊為丸如梧桐子大每服十五丸炒橘皮鹽湯下如酒食所傷胸膈不快腹脹醋心熟水下鱉甲三稜丸出聖濟總録治男子婦人小兒虛中癖氣臟腑不調食飲不消久致瘦弱不可取轉者服之自然安好又治虛氣膨脹心胸滯悶並婦人産後血積蓐勞瘦瘁甚者鱉甲九肋重四兩以上者水浸洗去脊骨裙襴醋浸一宿炙為末京三稜水浸兩宿銼醋浸一宿焙乾為末乾漆各三兩炒煙出木香乾薑炮補骨脂炒檳榔銼為末沒藥研硇砂研墨研各一分上為末再同研勻醋煮麵糊為丸如緑豆大每服三二十丸生薑鹽湯下婦人血病醋湯下牛黃湯療癖牛黃三大豆許麝香一當門子大硃砂準麝香生犀角各等分小棗許別搗末以上四味並研令極細湯成後納之大黃鉤藤升麻各一兩甘草炙鱉甲炙各半兩丁香五十枚上切以水三升先煮大黃等六味取汁半升絞去滓納牛黃等四味和攪分為三服每服如人行十里久若利出如桃膠肉醬等物是病出之候其藥及水並是大兩大升此藥分兩是十五以上人服若十歲以下酌量病減之忌莧菜海藻菘菜生血物等特忌牛馬肉必效練中丸一名桂心丸出聖惠方主癖虛熱兩脅下癖痛飢不能食四肢酸弱口乾唾涕稠黏眼澀頭時時痛並氣衝背膊虛腫大小便澀小腹痛熱沖頭髮落耳鳴甚至健忘服十日許記事如少時無禁忌大黃一斤朴硝十兩芍藥八兩桂心四兩上搗篩蜜和為丸如梧桐子大平旦酒服二十丸日再稍加至三十丸以利為度能積服彌佳縱利不虛人忌生蔥硇砂丸出聖惠方治癖氣在兩脅結聚不散硇砂半兩細研乾薑半兩炮裂銼川烏頭一兩炮裂去皮臍芫花半兩醋拌炒令乾皂莢半兩去黑皮塗酥炙令焦去子京三稜半兩微煨銼五靈脂一兩巴豆半兩去皮心研紙裹壓去油上件藥搗羅為末入硇砂巴豆同研令勻用醋熬為膏旋丸如梧桐子大每服空心及臨臥時以生薑橘皮湯下二十丸一方搗羅為末入硇砂巴豆拌勻再羅每稱此藥末一兩入去皮心膜油煎黑色巴豆二十枚研和勻以醋煮麵糊丸如大麻子大每服五丸至七丸茶酒熟水任下柴胡飲出聖濟總録治癖氣腹痛兩脅脹滿不思飲食方見柴胡湯小狼毒丸出千金方治堅癖痞在人胸脅或在心腹狼毒三兩附子旋覆花半夏䕡茹白附子各三二兩上為末蜜和搗五千杵丸如梧子大飲服三丸加至十丸日三一方無半夏白附子䕡茹只三味枸杞子散枸杞子不限多少夏採五升赤者乾薑白朮橘皮各五兩吳茱萸一升蜀椒三合出汗上六味切搗五味三篩下為散取枸杞子在燥瓷器貯研暴如作米粉法七日暴之一暴一研取前藥散和之又研隨飲酒食等即便服一方寸匕和酒食進之如此能三年服非但療百病亦長陽氣忌桃李雀肉魚鮓等鱉甲丸出聖濟總録治積年癖氣及氣塊上攻心腹鱉甲去裙襴醋炙一兩乾薑炮半兩京三稜炮銼一兩青橘皮湯浸去白焙半兩巴豆去皮心膜研用醋一盞熬膏一分上除巴豆外搗羅為末入巴豆膏和丸如緑豆大每服三丸至五丸生薑湯下空心食前服如意丸出聖濟總録治虛積導滯氣消癖塊硇砂半皂子大十二塊巴豆三十六枚去皮大棗十二枚去核取六枚每枚各入巴豆肉三枚硇砂一塊各用濕紙裹兩重煻火內煨焦候有煙取出去紙於地上以盞子合定一宿出火毒其餘棗並巴豆硇砂並生用白丁香八十四個堅實者膩粉一錢上將已去核棗六枚水煮熟同搗納余藥成膏丸如緑豆大每服五丸煎生薑湯下小兒二丸至三丸煎皂子湯下臨臥服郁李仁丸出聖濟總録治丈夫婦人腹內癖氣郁李仁去皮京三稜銼芫花蓬莪朮銼木香各一兩上用醋一升同煮醋盡焙乾搗羅為末麵糊丸如緑豆大每服三五丸生薑湯下日三吳茱萸丸出聖惠方治癖氣脹痛吳茱萸半兩湯浸七遍焙乾微炒附子一兩炮裂去皮臍桃仁一兩湯浸去皮尖雙仁麩炒微黃巴豆三十枚秋夏用三十枚春冬用五十枚去皮心研紙裹壓去油乾薑一兩炮裂銼上件藥搗羅為末入巴豆研令勻以軟飯和丸如黍粒大每服不計時候煎生薑橘皮湯下五丸硇砂丸一名芫花丸治癖氣疼痛腹脅脹滿發歇不定不思飲食療癖飲並醋咽吐水及沫食飲不消氣逆脹滿大腹檳榔十兩其子熟實者末之高良薑三兩桃仁一升去皮雙仁者熬別搗如泥上和搗絹篩以白蜜和丸如彈子大酒服二枚日再服漸加至四五丸加減任意自量應痛丸出聖濟總録治癖氣發作疼痛不可忍者宜急服桂去粗皮乾漆炒煙出京三稜大者煨銼當歸切炒上等分為末醋煮麵糊為丸如梧桐子大燒紙灰酒下十五丸至二十丸破癖丸白朮枳實炙柴胡各三兩上切以水五升煮取二升分溫三服服三十劑永瘥忌桃李雀肉京三稜散出聖濟總録治癖氣在脅下痛久不去京三稜煨銼半斤枳殼去瓤麩炒一兩甘草炙銼三兩上搗羅為散每服三錢匕入鹽半字沸湯點服空心食前服消癖丸一名皂莢丸治癖氣結硬不消胸脅脹悶出聖惠方巴豆去皮心研壓去油別研一分硇砂酒一盞化盡慢火熬成膏半兩豬牙皂莢四兩去皮酥炙上先將皂莢搗羅為末入巴豆研勻用硇砂膏和丸如緑豆大每服一丸食後臨臥粥飲下蓬莪朮散出聖濟總録治癖氣發作衝心疼痛不知人事蓬莪朮煨銼半兩胡椒一分附子炮裂去皮臍半兩上搗羅為散每服半錢匕醋湯調下不計時候療癖出肘後方上用大黃十兩杵篩以醋三升和勻白蜜兩匙煎堪丸如梧桐子大每服三十丸生薑湯吞下以利為度小者減之療腹滿癖堅如石多年不瘥者出聖惠方用白楊木東南枝去蒼皮細銼五升熬令黃以酒五升淋訖即以絹袋盛滓還納酒中密封再宿每服一合日二食前服療癖氣以生薑芋子一斤壓破以酒五升漬二七日空腹服一杯神良必效療癖方取車下李微湯退去皮及並仁與乾麵相拌搗之為餅如猶干和淡水如常溲麵大小一如病人手掌為二餅微炙使黃勿令至熟空肚食一枚當快利如不利更食一枚或飲熱粥汁即利以快利為度至午後利不止即以醋飯止之利後當虛病未盡者量力一二日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉但病重者李仁與面相半輕者以意減病減之後服者亦任量力頻試瘥神效千金散治大人小兒脾癖並有疳者宜服錦文大黃三兩為極細末陳醋二大碗用砂鍋內文武火熬成膏子傾在新磚瓦上日曬夜露三朝夜將上項藥起下來再研為細末後用上高舶上硫黃一兩形如琥珀者極妙官粉一兩將前項大黃末一兩三味再研為細末十歲以下小兒每服可重半錢食後臨臥米飲湯調服此藥忌生硬冷葷魚雞鵝一切發病之物服藥之後服半月白米軟粥如一服不愈時半月之後再服鱉甲丸主癖氣發動不能食心腹脹滿或時發熱鱉甲炙枳實炙麥門冬去心人參各八分白朮十分芍藥前胡厚朴炙各六分上搗篩蜜和為丸如梧桐子飲服二十丸漸漸加至三十丸冷即酒服極效禁生物粉酪油膩等亦忌莧菜桃李雀肉紫葛丸治癖氣脅下硬痛心煩不能食如神丸出聖濟總録治久積癖氣心胸不和嘔吐痰逆脅肋脹滿疼痛烏頭去皮臍乾漆乾薑桂去粗皮各一兩以上三味同為末硇砂半兩別研巴豆半兩去皮心膜研為霜上合研令勻取炒棗肉和成塊用濕紙厚裹鹽泥固濟厚一紙許陰三日曝乾地坑子內以火三斤簇燒候火銷半取出看硬軟搗碎為丸如小豆大每服三丸至五丸木瓜湯下不拘時治癖氣積滯發作有時大腑不調或腹脅脹滿非時疼痛兩脅間滿悶不快此由臟腑不調酒食過度停滯不散之所致久而不治當為大病大腑冷熱後吃此藥出護命方當歸芫花醋一碗土器炒黃黑色枳殼用青官桂檳榔黃橘皮各一分半夏桔梗吳茱萸細辛各三銖白蒺藜去刺熟牽牛木香各半兩上為細末每服三錢空心以蔥湯調下和滓吃通靈丸出王氏博濟方治久患癖塊或因氣不和即發疼痛胸多痞塞消化癥瘕大效京三稜酸石榴大者二枚杏仁甘遂大戟大黃巴豆苦葶藶芫花五靈脂各一兩鹽豉烏梅各二兩上件一十二味藥銼細用水一斗二升入藥於鍋內同熬候水盡就鍋內炒令黃焦色取出杵羅為末更入木香青橘皮末各一兩拌勻醋煮麵糊為丸如小豆大每服薑湯下三五丸心胸痞悶疼橘皮湯下吃酒食飽悶生薑湯或茶湯溫水下亦得治氣結破癖氣及四肢水出本草上用郁李仁四十九粒酒服後瀉尤良治癖積氣出本草上用砒黃磨研酒飲之治氣痃癖出本草上用土落草作酒煎或搗絞汁溫服治一切血氣症癖用蚶殼不拘多少燒以米醋淬三度埋於地中令壞爛取出為末以醋膏為丸酒服之導引法養生方云臥覺勿飲水更眠令人作水癖又云飲水急急咽久成水癖又云舉兩膝夾兩頰邊兩手據地蹲坐故久行之愈伏梁伏梁者宿食不消成癖腹中如杯如盤宿癰者宿水宿氣癖數生癰久行腸化為筋骨變為實
