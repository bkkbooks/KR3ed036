生白礬銅青等分上為細末用倒流水調藥一字口內噙一盞茶時即吐效茯苓湯治口瘡痛茯苓人參各一兩上㕮咀分作四服每服水二盞煎至一盞去滓溫服日三不過二劑薔薇根散治口瘡經年歇發飲食艱難薔薇根銼一握蜀椒去目並閉口炒出汗四十九粒上為散以漿水二盞煎五七沸去滓熱含冷吐滑石散治口瘡滑石膽礬各一兩上研為末每用一二匕以綿裹含吐津生薑煎治口瘡疼痛生薑取汁一盞白沙蜜三兩上同煎十餘沸用瓷器盛好熱水調一匙頭含咽之麝香散出聖惠方治口瘡吻瘡久不瘥麝香少許人中白一錢上研細蜜丸綿裹如緑豆大含之咽津一方研勻塗瘡上一方有膩粉無麝香二物散治口瘡白殭蠶黃連各等分上為末臨臥摻口內赴筵散治口瘡五倍子密陀僧各等分上為細末先入漿水漱過干貼一方用陀僧醋調灌漱不可咽牛蒡子散出聖惠方治口瘡久不瘥牛蒡子一兩微炒甘草一兩炙微赤銼上為散每服三錢水一中盞煎至六分去滓稍熱細細含咽含化雌黃丸出聖惠方治口瘡久痰涎久不瘥雌黃一分細研蟾酥半分上相和以瓷器盛於飯甑內蒸一炊久熟候冷看得所丸如粟米大綿裹一丸含咽津蟾酥丸出聖惠方治口瘡久不瘥蟾酥半分麝香半分上研為末丸如粟米大用綿裹一丸含之有涎即吐秦艽散治虛勞口瘡久不瘥秦艽去苗土柴胡去苗各一兩上為末每服三錢割豬肝三兩片用酒煮之去肝取酒調藥溫服十服當愈胡粉散出聖惠方治口疳瘡神祕含之胡粉一兩牛黃一兩上相和安銚子中於暖灰上研令勻少少含之瘥山李子煎丸出聖惠方治口中疳神祕含之山李子根一名牛李子薔薇根野外者良上細銼五升以水五斗煎半日以來汁於銀器中盛重湯煮如無銀器銅器亦可須得看稀稠得所即於瓷器內盛每取少許含咽之以瘥為度醬醋油熱面大約不宜食肉如患發背重湯煎令極稠和如膏以帛塗之瘡上神效昔襄州軍事柳岸妻竇氏患口疳十五年齒盡落斷亦斷壞不可近用此方遂瘥治口瘡時方口瘡刺發叫聲連銅緑麝香一處研干捻將來頻搽上不過二貼便安然祕傳降氣湯出危氏方治虛熱上壅口瘡上用生薑蘇葉煎食前吞黑錫丹每服二十粒胡粉膏治口瘡上用胡粉一兩炒研酥調如膏每含如杏仁大咽津神聖膏出危氏方一名茱萸膏治下冷口瘡及咽喉痛上吳茱萸去浮者一兩為細末醋一大盞調熬成膏後入地龍末半兩生曲攪勻臨臥時先用蔥椒湯洗足拭乾用藥搽塗兩腳爪心以帛綿系定次日必減未減再塗初生小兒亦可用一方用天南星末醋調塗腳心男左女右蟾酥線治口瘡海上方云治上下齶生瘡不可食者上用蟾酥二片以水半盞浸化為水更入牛黃末一錢攪勻以絲線五十條就藥中浸一宿陰乾每取一條含吐津海上方云以紅線取蟾酥陰乾寸剪口中噙少時惡涎出即愈豆豉散出聖惠方治口瘡唇瘡及舌生瘡胸膈疼上用豆豉四兩炒搗羅為末每用綿裹一錢含之日五七次一方浸一宿炒研塗之乾蟾散治口瘡上用乾蟾酥炙一枚搗研為末綿裹半錢含吐津馬牙硝散治口瘡上用馬牙硝一兩為末每含一錢咽津日三五度一方為朴硝檳榔散出肘後方治口瘡白瘡上用檳榔銼為散每服半錢塗舌及唇上蒲黃散出海上方治口瘡用蒲黃一兩每用一錢敷口舌上咽之一方為末乾摻之楸木汁方治口瘡上用楸木白汁五合每服一匙頭含咽一方用濕皮貼之瘥薺苨煎治口瘡上用薺苨三十枝以薄綿裹酒煮二十沸許取出每含一枝良久嚼咽之日三五度升麻含汁方治口瘡上用升麻不拘多少含一塊咽津蘘荷根湯治口瘡上用蘘荷根二兩細銼分為三分每分水二盞煎三五沸去滓熱含冷吐鉛霜散出聖惠方治大人小兒卒患口瘡上用鉛白霜研細不拘炙炒取少許敷痛處一兩度即瘥治口中瘡久不瘥入腦中並生瘡上用角蒿灰敷之一宿至二宿瘥有汁吐之不得咽也治口瘡牙痛上用華陰細辛根辣者為末敷之獨勝散出簡易方治口瘡上用縮砂仁不拘多少火煅為末摻即愈一方用殼治久患口瘡上用蜀椒閉口者以水洗之以面拌煮作粥空心服之三五匙飯壓之再服瘥治滿口生瘡疼痛不止出海上方上用透明鴨嘴黑膽礬研極細每一字乾摻瘡上有涎勿咽就涎灌漱口內吐之再用溫鹽水盥漱口淨一方用銀銚子內煅通赤地上出毒一夜細研每取少許敷瘡上吐漿水清涎甚者一兩上更瘥一方以膽礬一塊用白沸湯泡開口中含漱一夕可瘥治口內熱瘡上用古文錢二十文燒令赤投酒中服之立瘥治久患口瘡出肘後方上用生附子為末醋面調男左女右貼腳心日再換一方用薑汁調治口瘡上用生半夏為細末醋調貼腳心中大有神效治口肥瘡出千金方上用熬灶上飯令焦末敷之治口內生肉球臭惡自己惡見有根綿長三五寸余或如叉股吐球出以飯食了卻吞其綿以手輕捏痛徹於心困不可言出經驗良方上用水調麝香一錢三日驗熝糟落口上用青桑葉擂細水調漱之松葉亦可治口瘡及咽吻瘡出肘後方上用白楊梅漿水煎和鹽含之一方取嫩枝鐵上燒取汁塗一作枯枝治口鼻生瘡出本事方上用好生薑一塊臨睡時細嚼含睡不得開口出氣眠著不妨睡覺咽下治口中面上息肉轉大出千金方上以刀決潰去膿血即愈半夏散出得命集方治少陰口瘡若聲絶不出者是風寒遏絶陽氣不伸也半夏一兩治桂心一字草烏頭一字上同煎一盞水分作二服其效如神乳香散出保命集方治赤口瘡乳香沒藥各一錢白礬飛半錢銅緑上為細末摻用口瘡赤爛方出仁齊直指方用青蜜浸黃柏一宿取汁含咽治大人小兒口瘡出傳信適用方用杏仁去皮尖爛研入輕粉成膏口中嚼閉口少時灌漱用冷水漱吐出取下爛肉便安勿咽下沒藥散出保命集方治白口瘡沒藥乳香雄黃各一錢輕粉半錢巴豆霜少許上為細末乾摻治一切丈夫久患口瘡不效宜服此方孕婦不可服別有方見下出護命方荊芥穗羌活獨活防風半夏芍藥當歸大黃連翹木香殭蠶去絲牡丹皮去心麻黃去根山梔子各一分牽牛二兩上細杵羅為末滴熟水丸如梧桐子大食後臨臥熱湯下三十丸不轉加至四十丸至五十丸以轉為度既轉後平常只可吃二十丸以利胸膈也平常吃減去大黃一味此藥治一切風熱候神驗不可具說服此藥後仍吃發物後面滿瘡口生肌方治口瘡木香沉香麥門冬去心貝母各一分甘草炙四銖上為細末每服二錢食後以水一小盞煎一沸和滓吃紫金膏出護命方治口瘡連年纍月不效痰涎滿口飲食不快宜用此方立便見效乳糖四兩膽礬八銖研碎上以水一碗半煉乳糖膽礬二味成汁取一碗以來傾出放冷以新瓦器收之以箸挑兩三滴著在痛處瘡口內停待片時吐出熱咽涎立便安效紅芍藥散出衛生寶鑑方心病口瘡紫桔紅蒼三錢四兩五服安康上件紫蘇桔梗紅芍藥蒼朮各等分為細末羊肝四兩劈開摻末三錢用麻纏定火內燒令熟空心食之大效白湯送下赴筵散出宣明論治口瘡不已者密陀僧黃柏青黛各等分上同研為細末每用乾摻於瘡上不過二三日即便愈治口瘡出肘後方用薔薇根避風打卻上土銼煮濃汁溫含冷湯亦得咽亦不妨速效散出大術方治男子婦人小兒口瘡吳茱萸赤芍藥上等分為粗細末每於臨臥先用粗末二大匙沸湯泡淋洗腿腳拭乾以細末二錢米醋調勻攤兩腳心用軟紙貼定再以帛子系定天明再易則愈治口瘡出海上方用訶子黃柏燒存性入輕粉麝香摻之咽亦不妨一方出鮑氏方治口瘡目赤鼻衄黃柏皮黃連大黃末為末貼足心睡五更口苦效用水調貼又方出鮑氏方治輔車開不可飲令大醉睡中㗜鼻嚏則自正用南星末生薑汁調敷帛縛合一宿愈去風也蜜柏法出東垣蘭室方治口瘡久不愈者黃柏不計多少真者蜜塗其上炙黃色上件為極細末乾摻上臨臥忌醋醬鹽治口瘡出如宜方用五倍子黃柏為末敷之黃連胡椒等分為末摻之舌上腫硬宜百草霜鹽等分井花調敷腫硬出血海螵蛸蒲黃等分為末敷清脾湯出如宜方治口瘡黃耆白芷升麻人參甘草炙半夏治各等分上㕮咀每服姜五片棗二枚煎食後服一方入小麥一十粒煎治口瘡立效出危氏方用生薑自然汁漱口數次涎出而效貼足方出危氏方用吳茱萸為末水調敷足心效最宜治小兒口瘡肯服藥者一貼而愈治口內熱瘡出本草以青錢含之治口瘡出本草以蠶蛻紙不計多少燒成灰干敷瘡上治口瘡出本草取蠐螬截頭箸翻過拭瘡效治口瘡出本草取朴硝含之治口瘡及口齒一切疾用五倍子為末摻之所患處有涎即吐出便可飲食治口中有瘡出本草以黃柏皮醋浸含之即愈治口瘡出本草以蜜浸大青葉含之治口瘡出本草方以溜師蜜含之治急疳口鼻生瘡者有用沒石子為末吹下部即瘥治口瘡久不可者亂頭髮微溫露蜂房蛇蛻皮上三味各燒灰存性為末每服三錢用酒調治中面上息肉轉大麻骨一條燒煙吸入喉中即去治口中瘡方上用乾薑炮為末水調臨臥塗於手腳心來日即安法神驗法出東垣蘭室方治口瘡無問新久夜間將二丸以勒緊左右交手揉三五十次但遇睡覺行之如此三五度因濕而生者一夜愈久病諸般口瘡三二夜愈加鼻流清涕者勒之二丸揉之數夜可愈內經云膀胱移熱於小腹膈腸不便上口為糜易老五苓散與導赤散相合而飲之
