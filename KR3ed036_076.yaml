發歇不足赤腫淚出宜鐮出瘀血服龍膽丸生犀飲子瀉肝湯切不宜點藥恐損眼也歌曰熱病傷寒可後虛因飧壅熱患雙余睛疼一日先昏暗不久相牽左右俱紅腫必須鐮瞼內生犀飲子最能驅此服決明丸半劑免教白暈更相瘀末宜點服緣何事卻恐生瘡敗黑珠瞳子忽然開黑大舊來肝腎有風虛神方龍膽點和服雙目光明卻復初若也眼前花出現三年兩載始能除又云天行後赤眼外障此眼初患之時忽然赤腫疼痛淚出若有患者或輕或重還從一眼先患以相牽俱損切宜鐮洗去瘀血後宜服瀉肝湯用洗眼湯點龍腦煎即瘥歌曰忽然赤腫痛相併天行赤眼是為名厲時熱氣相傳染體性通人有重輕瀉肝飲子應須服瞼中鐮血更惺惺秦皮湯洗吞丸藥不瘥經久翳還生忌毒也須將息治不須釣烙恐傷睛若將痛藥強為點損敗神尖實可驚乙療之間何最隱多餐涼藥得平平前胡犀角湯出聖濟總録治傷寒後兩目昏暗或生浮翳前胡去蘆頭羌活去蘆頭犀角屑菊花防風去叉細辛去苗葉甘草炙銼梔子仁麥門冬去心焙蔓荊子青葙子生乾地黃焙決明子微炒車前子微炒各一兩黃耆銼一兩半上搗篩每服五錢水一鍾半煎至八分去滓溫服食後日三決明子丸出危氏方治諸般眼患因熱病後毒風攻目生翳膜遮障服此漸漸消退免使針刀青葙子炒防風枳殼各一兩茺蔚子細辛枸杞子澤瀉生乾地黃石決明燒各半兩宣連半兩去須土當歸酒浸車前子麥門冬去心各二兩上為末煉蜜和丸如梧桐子大每服三十丸食後麥門冬煎湯送下茺蔚子丸出聖濟總録治時氣後眼暗及有翳膜茺蔚子澤瀉各一兩半枸杞青葙子生乾地黃焙枳殼去瓤麩炒各一兩石決明細辛去苗葉麥門冬去心焙車前子各二兩黃連去須三兩上為末煉蜜和丸如梧桐子大每服三十丸食後漿水下人參湯出聖濟總録治時氣患後起早勞發風眼赤痛人參地骨皮羚羊角鎊防風去叉赤茯苓去黑心皮各三分升麻玄參黃芩去黑心各半兩決明子微炒一兩上搗篩每服五錢以水一盞半煎至八分食後臨臥各一服地膚子散出聖濟總録治時氣病後眼忽失明地膚子草決明微炒沙參秦皮去粗皮人參甘菊花羚羊角屑各三分枳殼去瓤麩炒半兩大黃銼炒令香一兩上為末煉蜜和丸如梧桐子大漿水下三十丸臨臥再服秦皮湯出聖濟總録治時氣病後目赤痛不開昏暗秦皮去粗皮銼研黃連去須各一兩半梔子仁大黃銼炒細辛去苗葉蛇銜草苦竹葉鹽各一兩上為銼令碎爛如眼赤及痛每用五錢以水二盞煎取一盞濾去滓頻頻點眼瀉肝散出龍木論治天行後赤眼外障知母黃芩桔梗各一兩半大黃黑參茺蔚子羌活細辛各一兩上為末以水一盞散子一錢煎至五分食後去滓溫服之效生犀飲子出龍木論治傷寒熱病後患眼瀉肝湯出龍木論治症同前石決明川大黃車前子桔梗芒硝各一兩羚羊角防風各一兩半上為末以水一盞半煎至五分食後去滓溫服栝蔞根湯出聖濟總録治時氣病後目赤澀痛栝蔞根銼二兩茅根銼麥門冬去黑心焙黃連去須石膏知母焙甘草炙各一兩上搗篩每服五錢水一盞半煎至八分去滓溫服食後臨臥決明湯出聖濟總録治時氣病後眼生翳赤痛決明子鉤藤各一兩牡丹皮升麻各三分羚羊角鎊芍藥大黃銼炒各一兩上搗篩每服五錢以水一盞半煎至八分去滓食後臨臥溫服之前胡湯出聖濟總録治時氣後服補藥過多眼忽失明頭疼憎寒天陰即甚黃耆湯出聖濟總録治時氣病目暗黃耆銼人參各二分黃柏去粗皮蜜炙當歸切烙各一兩枳殼去瓤麩炒半兩黃連去須三分上粗搗篩每服三錢水一盞煎至六分去滓食後溫服日三龍腦煎出龍木論治天行後赤眼外障龍腦一分秦皮宣連防風細辛甘草各半兩上為末以水一大碗浸藥末三日三夜用銀銚子煎至七分以來綿濾滓去又更入蜜四兩煎至五七沸入瓷瓶內盛勿令泄氣每用點眼立效菊花防風散一名防風散出聖濟總録治時氣後餘毒未盡上攻目赤澀痛或生障翳蚡鼠土膏出聖濟總録治時氣後服補藥過多致眼忽失明兩鬢脈掣頭痛憎寒田中蚡鼠土三分木香一兩大黃銼炒五兩白蘞一兩凝水石六兩上為末用酒和調如稠餳當痛掣處取如手掌許敷之干即易不住頻頻貼痛處即止一方攤於帛上貼之葛根湯出聖濟總録治時氣病後客熱暴躁目赤澀痛冷淚壯熱葛根銼車前子各三分地骨皮薺苨生切焙各一兩甘草炙半兩上粗搗篩每服五錢以水一鍾半入竹葉十片煎至八分去滓食後臨臥溫服大黃湯聖濟總録方治時氣病後風毒眼熱痛大黃炒二兩枳殼黃芩菊花梔子仁各一兩上搗篩每服五錢以水一盞半煎至八分去滓食後溫服得利即止洗眼湯出龍木論治天行後赤眼外障秦皮甘草細辛黃芩各一兩防風一兩半上為散以水三盞煎至一盞半熱洗一日兩度用之立效竹葉湯出聖惠方治時氣病後目赤澀痛黃芩去黑心黃連去須各一兩升麻一兩半甘草炙半兩上粗搗篩每服五錢以水一盞半入竹葉十片煎至八分去柤入芒硝半錢許溫服如人行五里再服通利即止黃連湯出聖濟總録治時氣病後目赤痛黃連去須四兩芍藥二兩黃芩去黑心秦皮去苗各一兩上粗搗篩每服五錢以水一盞半煎至八分去滓食後臨臥服之洗眼升麻湯出聖濟總録治時氣病後毒氣攻目赤爛升麻二分秦皮去粗皮銼黃連去須葳蕤各一兩上粗搗篩作三次用每次用水一升煎至半升綿濾去滓洗蔓荊散出聖濟總録治時氣病後眼忽失明但瞳仁不損者蔓荊子六升布袋盛急水中洗於甑中先鋪茅茅上安布布上著蔓荊子蒸令勻透即取盆中湯淋曝乾如此三度為細散每食後煎湯調三錢許溫服臨臥再服一方用清酒服治熱病後目赤痛有翳方出千金方用青布掩目上以冷水漬清布數易之治熱病瘥後百日食五辛者目必暗用鯽魚作臛熏之治熱病後毒氣衝目痛用露蜂房半兩水二升同煎一升重濾洗目三四遍又治赤白翳一方出千金方治傷寒熱病後攻目生翳者用豉燒二七枚為末以管吹之或點亦可療天行後因犯食毒失明兩鬢脈掣熱痛兼頭痛憎寒天陰即發及先食英乳者前胡乾葛漏蘆葳蕤各三兩竹葉一握甘草二兩炙梔子仁二七枚生麥門冬五兩去心上切以丸水三大升煮取一大升分作三服良忌海藻生菜治熱病後眼暗失明出千金方以羊膽敷旦暮各一敷之熊膽丸出龍木論治因傷寒患後起早餘熱不消體虛未復多飧熱物致令眼疾或見黑花瞳仁開大發歇不定瞼赤淚出瘀肉腫脹熊膽一個石決明茺蔚子各二兩黃牛膽澤瀉車前子細辛各一兩乾地黃二兩上為末煉蜜和丸如梧桐子大服清茶下一十五丸或服二十丸亦得白睛腫脹附論夫白睛腫脹肝肺之候也目者肝之候白睛肺氣之所主也若肺氣壅滯肝經不利為邪熱所乘不得宣泄則毒氣上攻於目故白睛腫起或疼痛也治宜先利臟腑外敷脅腫藥及鐮去惡血無不瘥也龍木論云暴風客熱外障此眼初患之時忽然白睛腫起卻覆烏睛紅腫或癢或痛淚出難開此是暴風客熱久在肺臟上衝肝膈致令眼力浮脹白睛不辨人物此疾宜服瀉肺湯補肝散披銻出血後點抽風散立效歌曰白睛脹起覆烏睛瞼腫還癢痛還生此是暴風兼客熱來浸肺臟豈為寧瀉湯之內加風藥丸散臨時大妙名披銻瘀血應須盡抽風膏藥眼中烹大黃丸出聖濟總録治白眼腫脹不可忍大黃銼炒蔓荊子去皮丹參土瓜根銼吳藍防風去叉甘菊花秦皮去粗皮黃連去須葳蕤陳橘皮去白焙前胡去蘆頭各一兩決明子微炒冬瓜子青葙子地膚子車前子各一兩上為末煉蜜和丸如梧桐子大每服三十丸食前用溫酒下日再服羚羊角散出聖惠方治眼白睛腫脹日夜疼痛心胸多悶羚羊角屑郁李仁去皮漢防己川大黃銼各一兩赤茯苓三兩木通三分防風去蘆頭赤芍藥枳殼去瓤麩炒黃芩杏仁湯浸去皮尖炒黃各三分桑根白皮銼一兩甘草炙銼甜葶藶隔紙炒令紫色各半兩上㕮咀每服三錢以水一中盞煎至六分去滓食後臨臥溫服之桑白皮散出聖惠方治肺氣壅塞毒熱上攻睛目白睛腫脹日夜疼痛心胸煩悶桑白皮玄參枳殼去瓤麩炒川麻杏仁去皮尖炒旋覆花去枝梗黃芩防風去蘆頭赤芍藥甘草炙甘菊花去枝梗甜葶藶炒各一兩上㕮咀每服四錢水一盞半姜三片煎至八分去滓食後溫服之桑根白皮散出聖惠方治眼忽然白睛腫脹如水泡者桑根白皮木通各銼犀角屑黃芩旋覆花茯神川大黃銼碎炒玄參各一兩甘菊花半兩甘草一分炙赤銼上㕮咀每服三錢以水一盞煎至六分去滓食後溫服犀角湯出聖濟總録治肝肺風熱白睛腫脹侵蓋黑睛車前子散出聖惠方治眼白睛腫脹衰瞳仁車前子赤茯苓玄參防風去蘆頭黃芩川大黃銼碎微炒犀角屑甘草炙微赤銼梔子仁各半兩上㕮咀每服三錢以水一盞煎至六分去滓於食後溫服夜臥再服藁本湯一名補肝湯治暴風客熱外侵白睛腫脹車前子丸出聖惠方治眼白睛腫脹車前子決明子梔子仁黃連去須牽牛子微炒羚羊角屑木通銼各一兩川大黃一兩半銼微炒上為末以牛膽汁和丸如梧桐子大每於食後以溫水送下三十丸洗眼秦皮湯出聖惠方治眼白睛腫起赤磣痛癢秦皮去粗皮桑白皮葳蕤各一兩玄參川大黃梔子仁青鹽湯澄下各半兩竹葉一握上㕮咀以水二大盞煎至一盞半入鹽濾去滓微熱淋洗冷即再暖之玄參丸出聖惠方治肺臟積熱白睛腫脹遮蓋瞳仁開張不得赤澀疼痛玄參羚羊角川升麻漢防己杏仁湯浸去皮尖雙仁麩炒黃沙參去蘆頭車前子桑白皮銼梔子仁各一兩火麻仁川升麻銼碎微炒各一兩半上為末煉蜜為丸如梧桐子大食後以溫水下二十丸臨臥時再服羚羊角湯出聖濟總録治肝肺熱毒攻眼白睛腫起瀉肺湯出龍木論治暴風客熱外障白睛腫脹羌活黃芩黑參各一兩半桔梗大黃地骨皮芒硝各一兩上為末以水一盞散一錢煎至五分食後溫服抽風煎出龍木論治暴風客熱外障白睛腫脹黃柏秦皮秦艽防風細辛各一兩黃連木香各半兩上為末以水二盞浸一宿去滓入龍腦少許蜜四兩同煎為膏點眼大青散出聖惠方治肝肺大熱白眼腫脹蓋覆瞳仁疼痛川大黃碎銼微炒大青羚羊角屑梔子仁桑白皮銼各一兩上㕮咀每服三錢水一中盞煎至五分去滓入生地黃汁半合服之日三四服一方有甘草硃砂煎出聖惠方治眼白睛腫起赤澀疼痛硃砂細研杏仁湯浸去皮青鹽各一分馬牙硝細研黃連各半兩末上搗勻綿裹用雪水三合浸一宿入瓷盒中銅箸點少許大黃散出聖濟總録治肝肺大熱白睛腫脹蓋覆瞳仁疼痛川大黃銼炒碎黃連羚羊角屑各一兩上㕮咀每服三錢水一盞煎至六分去滓食後溫服日三貼協方出聖惠方治眼白睛腫脹赤澀熱痛川大黃玄參川朴硝各一兩上為細末以生地黃汁調勻令稠攤於綿上貼之下瞼目睛疼痛附論夫肝氣通目目者肝之宮又五臟六腑之積氣皆上注於目然目有五輪內應五臟而骨之精為瞳仁筋之精為黑睛若肝腎熱火實或上膈壅滯風邪毒氣上攻於目眥令目精疼痛也龍木論云神祟疼痛外障此眼初患時舊無根基忽然發動疼痛如錐刺瞼皮如針灸此疾不可忍且祝神祟然後服藥補治臟腑不得鉤割尉烙不爾恐生翳障宜服羚羊角飲子點秦皮煎立效歌曰舊沒根基忽患然疼痛如針刺不安或如針灸來相近祝他神祟不虛言痛定須還湯藥治莫教風熱更留連不須割肉並燒灸點法秦皮作散煎眼痛疼如針刺外障此眼初患之時微有頭痛目眩眼系常急夜臥澀痛淚出難開時時如針刺相似是心臟伏毒熱氣壅在膈中以後漸生障翳遮滿相牽俱損如此疾狀宜服瀉心湯補肝散兼銻洗出血火針太陽穴立效歌曰忽然睛內痛如針熱痛潛藏伏在心遂使兩眸兼系急目拘急則痛鋟鋟太陽穴處將針刺易飲宣通宜洗淋磣澀難開由瞼內披銻出血不能禁光明散治眼痛當歸藿香五錢細辛三錢半兩頭尖一兩白芷二兩枯礬二錢半蠍梢半錢石膏二兩何首烏一兩半薄荷半兩黃連一兩半川芎半兩甘草一兩半皂莢一兩半燒存性上為細末每服一二錢臨臥茶清調服忌熱物羚羊角散治肝壅熱眼睛赤澀疼痛心神煩熱羚羊角屑茯神防風去蘆頭地骨皮各一兩石膏麥門冬一兩半焙去心黃芩甘草炙微赤銼枳殼麩炒微黃去瓤蕤仁湯去赤皮犀角屑川芒硝各三分上㕮咀每服四錢以水一中盞煎至六分去滓入生地黃汁半錢更煎一兩沸每服食後溫服治睛疼難忍者白芷赤芍藥細辛防風各等分上為末每服三錢以水一盞入砂糖二錢同煎至七分去滓溫服不拘時地骨皮散治肝臟壅毒氣上攻眼睛赤澀疼痛心躁體熱地骨皮川升麻玄參甘草炙微赤銼防風去蘆頭黃芩各一兩赤茯苓桑根白皮銼各二兩羌活決明子柴胡去苗各二兩半石膏三兩上㕮咀每服四錢以水一中盞入姜半分淡竹葉二十七片黑豆五十粒煎至六分去滓每服食後溫服玄參散治上膈壅滯風邪毒氣攻目令目睛疼痛玄參大黃銼炒各二兩半菊花決明子車前子升麻黃連去蘆頭枳殼去粗麩炒各二兩梔子仁防風去叉各一兩半苦參銼半兩上為細散每服三錢食後臨臥蜜水調下日三治目生胬肉各二兩半米飲下細辛散治目睛疼痛及腹脅滯悶由肝氣上壅細辛甘草炙黃銼各半兩川升麻丹參各三兩芎藭當歸去蘆頭赤芍藥銼黃芩去腐檳榔川大黃銼炒枳殼麩炒黃色各一兩上為末散每服三錢以水一盞煎至六分去滓食後溫服忌炙爆熱面洗肝前胡湯治目睛疼痛如脫前胡升麻枳殼去瓤麩炒各二兩防風去叉車前子各一兩甘菊花黃連去須各半兩細辛去蘆葉苦參各三兩上㕮咀每服五錢以水一盞半煎至七分去滓投芒硝末半錢食後臨臥溫服旋覆花湯治風毒攻衝目睛疼痛甘菊花散治諸風毒頭目睛中如針錢刺痛及欲成障翳甘菊花川升麻芎藭細辛黃連去須川大黃銼碎微炒各一兩防風去蘆頭甘草炙微赤銼各三分石膏二兩羚羊角屑一兩半上㕮咀每服四錢以水一中盞煎至六分去滓每於食後溫服之梔子散治上焦壅熱眼睛疼痛大小便祕澀心神煩躁不得眠臥梔子仁黃連去須龍膽去蘆頭赤芍藥川大黃銼碎微炒大青各一兩枳殼麩炒微黃去瓤甘草炙微赤銼各三分柴胡去苗一兩半上㕮咀每服四錢以水一盞煎至六分去滓每於食後溫服之蔓荊實湯治目睛疼痛上連頭疼一名羌活散蔓荊實去皮甘菊花羌活去蘆頭黃芩去黑心芎藭防風去蘆各一兩石膏三兩甘草炙銼半兩上㕮咀每服四錢以水一盞半煎至七分去滓食後臨臥溫服之羚羊角湯治目睛痛上連頭並頰骨俱痛不可忍生障淚出羚羊角鎊黃芩去黑心芎藭石膏大黃銼炒芒硝研各一兩芍藥一兩半柴胡去苗三兩上㕮咀每服三錢以水一盞入淡竹葉十片煎至七分去滓食後臨臥溫服羚羊角飲子治神祟疼痛外障羚羊角二兩天門冬車前子人參茯苓大黃黃芩黑參各一兩上為末以水一盞散一錢煎至五分食後去滓熱服瀉心湯治眼痛如針刺外障大黃黃芩桔梗知母各一兩防風三兩馬兜鈴黑參各一兩半上為末以水一鍾散一錢煎至五分食後去滓溫服補肝散治眼痛如針刺外障人參茯苓五味子芎藭藁本各一兩茺蔚子細辛各一兩上為末每日空心米飲送下一錢竹葉湯治風邪攻目令目睛疼痛括痛散治兩額角痛目睛時見黑花及目赤腫類脈眩欲作內障也得之於飢飽勞役柴胡一兩半甘草炙七分半栝蔞根二兩生地黃一兩黃芩四兩一半銼炒七色一半酒浸過曬乾上㕮咀每服三錢水一盞半生薑三片棗一枚臨臥熱服如小便不利加茯苓澤瀉各半兩地骨皮散治目睛疼痛睡臥不得地骨皮川大黃銼炒井泉水石各二兩甘草半兩炙黃銼石膏三兩研水飛上為細末入石膏更研勻每服二錢許食後以白米泔調下秦皮洗眼湯治目睛疼痛秦皮秦艽玄參各一兩柴胡去苗二兩甘草半兩上粗搗篩每用一兩以水三盞煎至取一盞半綿濾去滓微熱淋洗冷即再暖用如聖散治睛痛不止青黛一兩盆硝牙硝各七錢井鹽半兩片腦少許上研勻鼻內搐少許秦皮煎治神祟疼痛外障秦皮黃耆木香黃連黑參各一兩上為細末以水一鍾浸藥三宿去滓入蜜四兩煎為膏用之一捻金方治眼睛痛乳香沒藥黃連雄黃盆硝各等分上為細末鼻內搐之救苦散治眼睛痛不堪忍川芎當歸防風各半兩防己半兩上為細末每服二三錢熱酒調治睛疼難忍川當歸防風細辛薄荷各等分上為末麥門冬熟水調下食後半夜各一服白定眼藥定痛消腫去翳可鐵刺如無以白芨粉代之阿飛勇各一錢李子樹膠四錢白錫粉炒水飛八錢上為細末雞子清為錠用奶女兒乳汁於光磨石上磨汁無時點之吹鼻碧玉散治邪熱攻衝目睛疼痛硝石一分龍腦青黛各一錢上合研令細每用一豆許搐兩鼻內當歸立效散涼血定眼疼痛當歸大黃各一兩乳香少許定研一錢上銼碎分作三服每服七錢以水二鍾煎至一盞半去滓溫服食後臨臥看虛實加減服之治眼痛方當歸鬚木賊蓽茇上為末以茶水調浸舌出涎二聖散治眼痛不可忍者通聖散一兩半四物湯五錢上和勻每服五錢水二盞煎至二五沸食後溫服貼藥方治眼腫痛用生薑自然汁調飛過白礬貼眼胞上痛即止治發熱眼目腫痛方用萹蓄根一握洗淨以少水絞汁服之若熱腫處搗根莖敷之良通頂抽風散治眼睛如針刺疼痛用硝石二兩以新瓷瓶內盛漸以火熔成汁以生蘿蔔子時時投三二十粒入於硝內候煙出盡又投直候蘿蔔子硝石無聲去火放冷敲破瓶取出研如粉用蘿蔔子一兩去揀淨只取半兩麝香半錢合研令細每服用半分納筆管中猛用力吹入鼻內隨左右痛處當有清涕水出其疼痛立止決明散出永類鈐方治熱淚如湯腫羞明五臟積熱腫塞不開暗疼加沒藥當歸川芎大黃黃芩木賊去節赤芍藥山梔仁菊花粉草各等分上為細末每服二錢服生地黃水煎食後石人屏曾氏家藏川芎散出永類鈐方治眼睛疼頭痛沙澀流淚眩爛風癢障膜遮睛及治積年頭風川芎羌活防風菊花荊芥穗殭蠶洗炒撫芎蒼朮制白芷石膏煅細辛淨芎須水洗香附炒各一兩川烏炮淮烏黑豆煮各半兩去皮尖上為細末食後茶湯清調一大錢服頭痛蔥白湯調下常服薄荷茶調羞明加朴硝乳香散出永類鈐方治睛疼乳香沒藥青皮陳皮草烏上等分為末茶清或雞子清調貼眼眥上
