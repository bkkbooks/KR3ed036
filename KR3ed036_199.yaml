body:
  text: 卷一百九十九諸瘧門山嵐瘴氣瘧附論夫傳言瘴者山川癘毒之氣又云江山霧氣多瘴蓋以其氣鬱蒸而然也諸家方論治瘴之法不一或謂其證與傷寒相類有在表可汗者有在裡可下者有在膈可吐者又或以治瘧之法治之者今廣南山川地形瘴氣所生之因及春夏之交瘴氣所起之時與夫人染瘴氣而治法悉著於篇庶可考焉且陽生於子盛於巳陰生於午盛於亥陽不極則陰不萌陰不極則陽不芽而廣南位當巳午則陰陽之氣蘊積於此可知矣天不滿西北地不滿東南西北土地高厚東南土地卑下而廣南屬東南則土地之卑下可知矣以其卑下而陰陽二氣之所蘊積是以四圍之山崇高回環百川之水悉所歸赴及秋草木不凋瘁當冬蟄蟲不伏藏寒熱之毒蘊積不散霧露之氣易以傷害此正岐伯所謂南方其地下水土弱霧露之所聚者也故瘴氣獨盛於廣南然瘴氣所起其名有二孟夏之時瘴名青草而終於秋孟冬之時瘴名黃芒而終於春四時皆能傷人而七八月之間山嵐煙霧蛇虺郁毒之氣尤甚故當是時瘴疾大作不論老壯或因飢飽過傷或因榮衛虛弱或沖煩霧或涉溪澗但呼吸斯氣皆成瘴疾其狀頭疼體痛胸膈煩滿寒熱往來咳逆多痰全不思食發渴引飲或身黃腫脹眉須脫落是皆毒癘鬱蒸所致夫生於陵者安於陵其土人宜無所受且日食檳榔蓋檳榔之為性破堅毒除蘊積故耳治法當先以磁石下收其陰次以丹砂上正其陽陰陽氣正中滿自消然後以檳榔解其餘蘊瘴與瘧分作兩名其實一致或先寒後熱或先熱後寒嶺南率稱為瘴江北總號為瘧此由方言不同非是別有異病然南方溫毒此病尤甚原其所歸大略有四一山溪毒氣二風溫痰飲三加之鬼癘四發以熱毒在此之中熱毒最重故所用藥物須審病源患瘧瘴之後特須防瘴而發痢死不旋踵所以然者瘴體先虛虛不宜痢又瘴宜冷差痢宜溫斷斷痢則益瘴斷瘴則益痢大率如此不可不慎非但宜藥療亦須宜將息取適若能一色藥兼二種病冷而止痢溫而斷瘧最為妙也如不然先須斷痢然後療瘴瘴緩痢急故也不得專醫其痢又服瘴藥皆在發前必須平旦空腹服藥之後勿洗手面漱口勿通外人勿吃食勿勞力既過發時久小進糜粥如此將療無不即斷又當發熱之時慎勿多飲冷水及多服冷藥若心下冷結更是難療得瘧之後復生症癖亦有即發氣者死不救若熱渴者豉汁暖服取其得吐彌善水煮豉研犀汁與服兼時進生葛根汁其人熱盛者與紫雪如兩棗許大水和飲之並燒豬糞作黃龍湯亦善各可服三二升又搗一大鼠絞汁與服大止熱毒瘴熱病服此俱效其鼠並頭皮五臟等全搗若汁少著少許水和絞亦不難服常用立驗也方大五補湯出千金方治時行後變成瘴瘧桂心三十銖遠志桔梗芎藭各三兩茯苓乾地黃芍藥人參白朮當歸黃耆甘草各三兩竹葉五兩大棗二十枚生枸杞根生薑各一斤半夏麥門冬各一升上㕮咀以水三斗煮竹葉枸杞取二斗次內諸藥煎取六升分六服一日一夜令盡白薇湯治瘴瘧經百日或一年者白薇蜀漆葉各半兩常山一兩知母切焙半兩大黃生一兩鱉甲去裙襴醋炙黃三分甘草炙銼苦參升麻半兩石膏碎三分豉一合蒜獨顆者三枚切淡竹葉切三兩龍膽黃芩去黑心各半兩赤茯苓去黑皮三分上銼如麻豆大每服三錢水一盞酒半盞同煎至一盞去滓未發前溫一服發時一服仍以藥汁塗手面立效白朮丸治瘴瘧白朮丹砂研麝香研丁香訶黎勒皮安息香入胡桃仁同研檀香蓽茇犀角鎊各半兩薰陸香蘇合香龍腦研各一分莎草根石膏木香各半兩上為末煉蜜丸如梧桐子大每服十丸空腹井花水下老人小兒三丸仍用紗絹袋盛帶於臂闢鬼氣臘月合以新瓷器盛勿令泄氣治山瘴瘧寒熱頭疼方出聖惠方恆山半兩烏梅肉七枚微炒豉心半兩桃枝一枝柳枝半兩鱉甲半兩塗醋炙令黃去裙襴虎頭骨半兩塗醋炙令黃干棗三枚青銅錢一文雄鼠糞二十七枚上細銼以酒一大盞半浸一宿明旦以重湯煮十餘沸去滓分為三服空心一服良久再服欲發時一服麝香散治瘴瘧麝香研一錢鱉甲去裙襴醋炙黃半兩丹砂研二分甘草炙半分大黃炒三分恆山一兩上為散每服三錢未發前溫酒調下臨發更一服木香丸出直指方治瘴檳榔雞心者陳橘皮湯浸去白焙各一兩木香人參附子大者炮製去皮臍厚朴去粗皮薑汁炙桂去粗皮羌活去蘆京三稜炮獨活去蘆乾薑炮甘草炙銼芎藭大雄銼炒芍藥各半兩牽牛子一斤搗取末四兩肉豆蔻六枚去殼上為末瓷器盛密封臨服再用牽牛末二兩同研令勻煉蜜為丸如梧桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痰癖氣塊男子腎臟風毒攻刺四肢及陽毒腳氣目昏頭痛嘔逆及兩脅堅滿臨臥橘皮湯下三十丸以利為度婦女血痢下血刺痛積年血塊手足心煩熱不思飲食生薑湯下三十丸取利小兒五歲以上疳氣腹脹氣喘燈心溫湯下五七丸小者減丸數凡胸腹飽悶不消脾泄不止臨臥溫酒下取利食毒癰疽發背嵐瘴氣才覺頭痛背膊拘急即便宜服之快利為度常服可以不染瘴疾凡瘴疾皆因脾胃實熱所致常以涼藥解膈上壅熱並以此藥通利彌善此藥本治嵐瘴及瘟瘧大效以快利為度菖蒲散治瘴氣久治不瘥者菖蒲乾者白朮銼炒蒼朮銼焙梔子仁荊芥穗芎藭各一兩甘草炙銼干薄荷側柏炒黃色硝石研吳茱萸湯浸洗焙乾各半兩上為散用薄荷煎湯調下二錢如患熱疾水一盞入姜五片棗二枚擘破煎至七分溫服十補丸治瘴氣虛弱面色萎黃不思飲食或困或醒心腹脹滿痞氣耳鳴補元氣巴戟去心肉蓯蓉酒浸切焙白朮米泔浸一宿切焙五加皮銼炒石斛去根各一兩鹿茸去毛酥炙半兩人參菟絲子酒浸一宿別搗柏子仁研菊花各三兩上等分為末煉蜜為丸如梧桐子大每服二十丸空心臨臥溫酒下鹽湯亦得茵陳蒿丸出聖惠方治瘴疫時氣溫黃若嶺表行此藥常帶隨身茵陳蒿四兩大黃五兩豉五合熬恆山梔子仁熬芒硝研杏仁去皮尖雙仁炒研各三兩鱉甲去裙襴醋浸炙二兩巴豆半兩去皮心熬別研去油上為末煉蜜丸如梧桐子大初得時氣三日以粥飲旦服五丸至半時許或吐或利或汗為效如不吐利不汗更服一二丸即以熱飲投老小量加減凡黃病痰癖時氣傷寒瘧痢小兒熱欲發癇服之即瘥治瘴氣尤妙一方無大黃有麻仁露宿湯恆山炒一兩秦艽去苗土梔子仁各半兩上粗搗篩每服三錢水三盞入烏梅二枚黑豆二十粒煎至一盞半去滓露一宿五更初溫服其滓再入水二盞煎至一盞去滓當夜臨臥時服卻毒散出十便良方治山嵐瘴氣有黑霧起處急服麻黃去根節蜀椒去目併合口炒出汗各一兩烏頭炮去皮臍白朮各半兩防風去蘆一兩桔梗炒桂去粗皮各半兩乾薑炮一分上為散每服一錢溫酒調下每日食前服一云嵐氣者嶺南青草黃芒瘴狀如嶺北傷寒也南地暖故大陰時草木不黃而落伏蟄不閉而藏雜蟲因暖而生則仲夏有青草瘴孟冬有黃芒瘴彼人失醫多成痼疾即為難治嶺南之人得之亦如傷寒狀三日以上在於皮膚汗之可愈五日以上結於臟腑身重而節痛當下之得愈不可先下下之亦為難療其或不解則春秋作瘧痢而肌膚黃瘦可服此方烏梅湯治瘴氣烏梅銼焙一斤半夏半斤生薑絞汁浸二宿焙乾桂去粗皮一兩馬鞭草焙半斤荊芥穗陳橘皮去白焙乾各四兩甘草四兩上搗篩每服二錢水一盞入生薑五片煎至七分去滓不拘時候溫服丹砂丸治山嵐氣安心臟丹砂研半兩阿魏一分米泔浸令軟研以醋為糊用白朮人參白茯苓去黑皮當歸切焙各半兩上搗研五味為末用阿魏醋煮麵糊丸如梧桐子大如當發空心溫酒嚼下七丸遇患者空心桃仁湯嚼下十丸檳榔湯亦得秦艽湯治山嵐瘴氣如瘧秦艽去苗土柴胡去苗各半兩恆山二分烏梅肉三枚糯米一撮上銼如麻豆水三盞煎至一盞半去滓分二次溫服未發前服之取吐利常山飲治山嵐瘴面黃力劣寒熱往來心胸煩悶常山二兩乾漆炒煙出三兩甘草炙銼一兩豉生用一合上搗篩每服五錢水一盞半煎八分去滓空心溫服吐黃痰出效豫固丸治嶺南諸瘴丹砂雄黃各一兩井水飛過令乾鬼臼半兩為末阿魏一分用酒半升熬成膏上藥研勻阿魏膏和丸如雞頭米大緋絹袋貯十丸常執手中頻嗅瘴氣內行不著人遇瘴病者井花水嚼下三丸五服瘥香椿散治瘴氣噁心四肢疼痛口吐酸水不思飲食憎寒壯熱發過引飲二廣七閩多山嵐煙霧蛇虺郁毒之氣當秋七八月之間芒花發時此疾大作謂之黃芒瘴又謂黃茅瘴是也蓋人或因飢飽或因虛怯或沖煙霧或涉溪澗遂得此疾謂之黑腳瘴蝦蟆瘴啞瘴其名不一並皆療之香椿嫩葉酒浸焙三兩甘草炙南壁土向日者臘茶各一兩上為散每服二錢用酒調下如患久者更入加甘遂柴胡各半兩空心臨臥服煮豆丸治嵐瘴白朮貫衆去土蒼朮去皮甘草炙等分上為末煉蜜丸如彈子大每一丸先用黑豆一盞銚子內鋪面令平於豆中心安藥丸添水高豆一指許慢火煮水乾取豆曝乾以絹袋盛豆每服二十粒新水下有瘴處空心一服如涉遠遇飢新水下五十粒至一百粒粗可充餒炒桃仁出余居士選奇方治山嵐氣預闢瘴癘桃仁一斤吳茱萸青鹽各四兩上為一處鍋內炒候桃仁熟為度以瓷瓶貯密封一七日後取出去茱萸並鹽只將桃仁去皮尖以新瓶子盛時嚼一二十枚大辟山嵐毒氣一方每日空心服七粒爛嚼茶湯任下或吃酒食前後服一兩粒甚妙治山瘴瘧乍寒乍熱乍有乍無出聖惠方鯪鯉甲十四枚微炙鱉甲一兩塗醋炙令黃去裙襴柴胡一兩去苗恆山二兩虎頭骨一兩塗醋炙微黃桃仁一兩湯浸去皮尖上細銼以酒三盞浸一宿發前稍稍暖飲之勿絶鯪鯉甲酒出聖惠方治山瘴瘧南方山嶺瘴氣令人寒熱發作無時萎黃腫滿四肢痹弱鯪鯉甲炙五枚鱉甲去裙襴醋炙黃烏賊魚骨去甲附子炮裂去皮臍各一分常山半兩一方無上細銼以酒二升半漬一宿瘧發前稍稍服之勿絶藥味兼以酒塗身體服藥良久方可進食常山酒常山苗一握無苗取根五兩代之獨顆蒜七顆淡竹葉二握豉一合鱉甲三兩炙上切以苦酒三升煎取一升臨發隨性多少服盡之服訖當大吐愈忌食莧生蔥生菜山瘴瘧酒出鮑氏方療乍寒乍熱乍有乍無及勞瘧發歇不定久不瘥常山三兩鱉甲炙升麻烏賊魚骨去甲附子各一兩上並切絹袋盛以酒六升漬之少令近火轉之一宿每服一合比發可數服或吐忌豬肉生蔥生菜莧菜治山瘴瘧發作寒熱方出聖惠方恆山三兩烏梅肉三十枚甑帶三寸真緋絹三寸獨顆蒜一枚上以酒二大盞煮取一盞分為二服初一服未發前服之後一服臨欲發服之如其形候欲似不發即止方便安臥糕角飲子出聖惠方治山瘴瘧米糕角半兩九月九日者寒食飯二百粒恆山一兩銼豉一百粒獨顆蒜一枚上以清水二大盞浸一宿至五更初煎至一盞去滓空腹頓服當下利為度保安湯治山嵐瘴瘧寒熱久不瘥常山半兩青蒿知母各一兩桃仁湯浸去皮尖雙仁研半兩上粗搗篩每服二錢水一盞生薑半分同煎至六分去滓稍熱服不拘時大黃湯治患瘴熱實兼吐痢者大黃常山升麻甘草炙各三兩上切以水七升煮取二升半分三服發前盡服任取吐痢忌海藻菘菜生蔥生菜觀音丸出直指方治暑毒瘴毒圓白半夏生烏梅肉母丁香川巴豆不去油各十枚上為末薑汁麵糊丸麻子大每服五丸臨臥冷水下此方舟人於海角遇白衣人授之常山散治山瘴瘧常山八分橘皮六分牡蠣四分熬桂心二分上為散發日平旦酒服一匕臨發一匕發後一匕二日不