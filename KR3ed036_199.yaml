而作也方烏梅丸出聖惠方治間日瘧寒熱不止烏梅肉一兩微炒桃仁三十枚湯浸去皮尖雙仁麩炒微黃地骨皮豉心炒乾各一兩虎頭骨一兩半塗酥炙令黃知母鱉甲塗醋炙令黃川升麻人參去蘆頭各一兩天靈蓋一兩半塗酥炙令黃上為末煉蜜和搗三二百杵丸如梧桐子大空腹以漿水下二十丸晚再服雄黃丸出聖惠方治間日瘧及每日發者雄黃一兩細研臘月野狐肝二兩阿魏一分硃砂半兩細研猢猻頭骨一兩天靈蓋半兩麝香一分研上為末入研藥末令勻於五月五日午時煉蜜和丸如紅豆大每發時前男左女右以緋帛系一丸於中指上時時嗅之後更以醋湯下一丸糯米煮散一名石膏飲治間日瘧常山湯一名常山酒治間日瘧先寒戰後壯熱神聖丸出聖濟總録治間日瘧黑豆小者二十一粒水浸去皮砒霜研一錢大棗三枚煮去皮核上須於重五七夕日修合同研丸如豌豆大以丹砂為衣合時忌婦人雞犬見於發日早晨將藥一丸面北香上度過用冷茶清送下忌熱物治瘧或間日發或夜發者出聖惠方恆山竹葉各三兩秫米一百粒石膏一兩上㕮咀以水八升銅器中漬藥露置星月下高淨處橫刀其上明日取藥於病人房中以銅器緩火煎取三升分三服清旦一服未發前候一食頃一服臨時一服三服訖靜室中臥莫共人語當日勿洗手面及漱口勿進食取過時不發乃澡洗進食並用藥汁塗在心胸前頭面藥滓置頭邊或用烏梅二十七枚常山酒出聖濟總録治間日瘧常山一兩蒜獨頭者一顆去根莖橫切糯米黑豆各一百粒上㕮咀以清酒一升病未發前浸藥於碗中以白紙覆之碗上橫一刀欲發時三分飲一分如未吐更服一分得吐則瘥醇醨湯一名大黃湯出聖濟總録治間日瘧及痎瘧積年不瘥者大黃銼炒三分甘草炙常山各一分半上㕮咀以水三盞煎取一盞去滓更以水一盞煎滓取七分未發先服又方出聖惠方小麥一合硫黃一兩細研上於臘日以醋浸四十九日取出焙乾每有患者取小麥七粒發前以冷醋湯下之又方出千金方先以羊肉臛麵餅飽食之並進少酒隨其量飲如欣欣有酒氣入密室裡燃炭火厚覆取大汗即瘥又方出千金方燒黑牛尾頭毛作灰酒服方寸匕日三服又方出聖惠方治間日瘧川大黃半兩銼研微炒甘草一分炙微赤銼恆山三分桂心一分上件藥都細銼以水二大盞煮取一盞去滓分為二服空心熱服臨發前再服痰瘧附論痰瘧之狀胸中不利頭痛振寒怢栗而不能食食即嘔寒去則內外皆熱寒熱更作心下支滿痰積胸中氣逆煩嘔故謂之痰瘧治痰瘧發作有時熱多寒少頭痛額角並胸前肌肉瞤動食才入口即吐出面色帶赤也夫痰實瘧者謂患人胸膈先有停滯結實因感瘧病則令人心下支滿氣逆煩嘔也方常山甘草飲出聖濟總録治痰瘧寒熱常山甘草炙銼大黃銼炒各一兩桑根白皮銼一兩半烏梅五枚去核杏仁湯浸去皮尖雙仁麩炒十枚黃連去須一兩羌活去蘆頭一兩半黃芩去黑心半兩芎藭枳殼去瓤麩炒赤茯苓去黑皮各一兩旋覆花熬半兩柴胡去苗一兩半附子炒制去皮臍一兩牽牛子炒一兩半桂去粗皮一兩虎頭骨牙齒酥炙黃一兩半上銼如麻豆每服五錢水一盞半煎至八分去滓溫服細辛湯出聖惠方治痰瘧吐膈細辛去苗葉松蘿犀角屑甘草各三分半常山升麻各一兩一分梔子仁玄參各一兩上粗搗篩每服三錢水一盞煎七分去滓溫服以吐病出為度其痰母如爛雞子是也一方用酒浸一宿去滓溫服蜀漆丸出聖濟總録治痰逆多時久瘧不瘥及面目四肢黃腫蜀漆葉牡蠣燒赤黃芩去黑心各一兩大黃生銼甘草炙銼犀角屑各三分知母焙半兩上為末煉蜜丸如梧桐子大每服二十丸空心溫水下半夏散出續易簡方治痰瘧發作有時熱多寒少如頭痛額角並胸前肌肉瞤動食才入口即吐出面色帶赤宜服此方半夏湯浸去滑為末生薑汁和作餅曝乾藿香去梗羌活去蘆頭芎藭各一分牽牛各半兩上為細末每服三錢食後白湯調下以吐為度未吐再服石膏飲出聖濟總録治一切痰瘧石膏碎淡竹葉各三兩常山甘草生銼烏梅各二兩粳米半合一作糯米上粗搗篩每服五錢水一盞半煎至一盞去滓溫服吐痰即瘥如熱盛加大黃一兩烏頭湯出聖濟總録治痰瘧吐不出烏頭炮裂去皮臍半夏湯洗去滑焙桂去粗皮芫花醋炒常山各半兩豉炒一合上銼如麻豆每服三錢酒一盞煎至七分去滓發前溫服相次再服取吐為度防葵飲出聖濟總録治痰瘧寒熱溫疫防葵鱉甲醋炙去裙襴松蘿甘草生各半兩常山三分上粗搗篩每服五錢水一盞半煎至八分去滓未發前徐徐溫服取吐為度豉心丸出聖惠方治痰瘧寒熱心膈煩壅不利豉微炒一合大黃生用一兩半常山三分升麻半兩一作蜀漆附子小者炮裂去皮一枚上為細末煉蜜為丸如梧桐子大每服七丸發前米飲下吐後更乾咽七丸或加甘草半兩二陳湯出直指方治傷食發瘧痰多陳皮半夏制各五兩白茯苓三兩甘草炙一兩上銼散每服三錢姜五片烏梅一枚煎服寒多者加草果熱多者加前胡青皮檳榔縮砂白豆蔻之類隨意加減蒜丹丸出直指方治截瘧消痰虢丹煅穿山甲熱灰中炮焦各一兩土朱半兩上為末以獨頭蒜煨去皮研膏丸如梧桐子大每服十丸生薑烏梅紫蘇煎湯送下胡粉丸出聖濟總録治一切瘧及吐一切痰疾胡粉研砒霜研寒水石煅研各一兩上合研勻滴水丸如雞頭子大發前新汲水吞下一丸即大吐至日困睡為驗常山酒出聖惠方治痰實瘧發歇不止久不瘥常山三分烏梅肉生用甘草生用各半兩上細銼以酒二盞浸一宿早晨去滓煎服一盞良久以箸入喉中引之吐痰即瘥一方用水生薑煎服升麻常山湯出聖惠方治痰瘧發作無時寒熱不下食升麻一兩常山二兩蜀漆葉一兩半上粗搗篩每服四錢取井花水一盞半煎至一盞空心頓服瘥又即吐吐定食漿水粥和之半夏丸出危氏方治瘧咳嗽痰盛痞滿煩悶咽膈不利嘔吐噁心神思昏憒心忪面熱並皆治之半夏十六兩湯洗去滑薑汁淹一宿白礬八兩枯過上為末生薑自然汁為丸梧桐子大每服三十丸食後臨臥淡薑湯吞下治溫瘧痰盛寒熱出聖惠方常山一兩香豉二合炒乾上為末粟米飯為丸如梧桐子大每服二十丸熟水下又方出仁存方青蒿二兩黃丹半兩上為末每服二錢寒多酒調熱多湯調青蒿以童子小便浸焙乾尤捷冷附湯一名七棗湯治瘧疾無過是痰實痞塞不通脾胃弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達壯脾胃去痰實除虛熱降心氣屢用屢效松蘿丸出聖惠方治痰實瘧發歇不止松蘿常山銼各半兩阿魏蜀漆大青硃砂研麝香細研各一分上為末研勻取端午日午時於淨室內用七家粽子尖和丸如梧桐子大當修合時不得婦人雞犬見如發時以溫湯下五丸夜發時桃符湯下兼取緋帛三二寸系五丸在男左女右臂上疾愈即去之如再發時取臂上系者五丸服之治痰實瘧久不瘥出聖惠方木香一兩恆山三分銼松蘿半兩赤小豆半合砒霜一分細研以醋五合煎令稠上為末以砒霜煎和丸如梧桐子大空心以溫漿水下三丸以吐為度如未定晚再服之松蘿湯出聖惠方治痰實瘧每發不定時或朝或暮漸不能食松蘿人參去蘆頭常山川升麻各半兩竹葉一百片上為細銼以水二大盞煎取一盞去滓分為二服平旦時一服如人行五里當吐不吐更一服良久得吐即瘥烏梅湯出聖惠方治痰實瘧盛久作寒熱烏梅肉微炒常山各半兩松蘿三分鱉甲生用川升麻各一兩上細銼以水三大盞煎取一盞半下茶末二錢更煎三兩沸去滓空腹分為二服如人行五里當吐如未吐再一服以吐惡痰為度恆山散出聖惠方治痰實瘧發歇寒熱不定恆山半兩硃砂半兩細研烏梅肉半兩生用上為細散入硃砂研勻每於發前以醋湯下一錢以吐為度治痰瘧出本草以生熟湯熬鹽投中飲之令吐出痰及宿食痎瘧附論夫痎瘧者夏傷於暑其病秋則寒甚冬則寒輕春則惡風夏則多汗者然其發作有時以瘧之始發先起於毫毛呻缺乃作寒栗鼓頷腰脊疼痛寒去則外內皆熱頭痛如破渴欲飲冷者此乃陰陽上下交爭虛實更作陰陽相移也陽並陰則陰實陽虛陽明虛則寒栗鼓頷巨陽虛則腰背頭項痛三陽俱虛陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘渴欲飲此得之夏傷於暑熱氣盛藏之於皮膚之內腸胃之外此榮氣之所舍則令汗出腠理開因得秋汗出遇風乃得之及以浴水氣舍於皮膚之間與衛氣並居衛氣者晝行陽分此氣得陽則出得陰則內是以隔日作也痰瘧者以瘧發該時或間日乃作也夫衛氣流行合於晝夜陰陽邪氣內舍於榮隨衛氣以出入而應於風府其作早晏皆以時發也寒溫疸瘧動皆該時故內經統謂之痎瘧方虎頭骨丸出聖惠方治痎瘧久不瘥虎頭骨二兩塗醋炙微黃硃砂半兩細研恆山半兩銼甘草一兩半生銼牡蠣二兩微炒桂心一兩知母二兩香豉一合炒乾烏梅二兩微炒附子一兩炮製去皮臍枳殼半兩麩炒微黃去瓤木香一兩川大黃二兩銼碎微炒桃仁三十枚去雙仁皮尖皆湯浸上為末研入硃砂令勻煉蜜和搗三二百杵丸如梧桐子大每於發前以桃符湯下十丸知母飲子出聖惠方治痎瘧積年不瘥者知母半兩鱉甲塗醋炙令黃去裙襴恆山銼各一兩烏梅肉七枚微炒豉心一百粒粳米一百粒甘草炙微赤銼川大黃各半兩上細銼和勻每服半兩以童子小便一中盞浸一宿五更初煎至六分去滓溫服臨發時再服以利為度每日發與不發皆得服之待過發後即得吃食恆山丸一名麻黃丸一名祛邪丸出千金方治痎瘧恆山知母甘草大黃各十八銖麻黃一兩上為末蜜和丸如梧桐子大未食服五丸日二不知漸增以瘥為度肘後無大黃面東清水下祛邪丸治瘧疾脈浮大寒熱往來用此吐之衛州書云瘧寒多熱少痰多也然寒多熱少而脈浮則痰無疑矣可吐之若脈遲微者惡寒瘧耳宜柴胡桂姜也鱉甲漬酒出千金方治痎瘧以時發鱉甲醋炙半兩烏賊魚骨去甲常山各二兩附子炮裂去尖臍甘草銼各一兩上銼如麻豆大每服五錢以酒一盞半漬藥一宿明日以酒先塗五心過發時瘧斷若不斷可飲藥酒一二盞即瘥烏梅丸出聖惠方治痎瘧或發或歇久不瘥烏梅肉二七枚恆山三兩末香豉二兩桃仁湯浸去皮尖雙仁四十九枚上搗如泥以少許蜜和搗二三百杵丸如梧桐子大每服以粥飲下三十丸日三服常山酒出聖濟總録治痎瘧先寒戰動寒解壯熱日發及間日發常山淡竹葉切洗一兩鱉甲去裙襴酥炙一分甘草炙銼三分上粗搗篩每服五錢以酒半盞浸藥覆安露地一宿明旦以水一盞煎至七分去滓未發前溫服當吐既效不必盡劑過發時良久方可食霜墨丸出聖濟總録治痎瘧砒霜一錢墨蓐草灰各五分緑豆粉一分上一處細研為末用糯米粥和丸如小豆大每服兩丸未發前一時辰醋湯下端午日未出時面東修合不得言語勿令婦人雞犬見丹砂丸一名硃砂丸治痰瘧寒瘧溫瘧疸瘧悉治之振虎膏出聖濟總録治痎瘧胭脂阿魏各一大豆許同研上同研以大蒜肉研和為膏用大桃核一枚劈開去仁取一片以藥膏子填在核瘧發時用藥桃核覆在手虎口上男左女右令藥著肉以緋帛系定經宿七棗湯一名冷附湯出醫方大成治五臟氣虛陰陽相勝作痎瘧不問寒熱先後與夫獨作疊作及痰痞塞不通發作無時或寒多熱少或單寒者悉治之附子一枚炮裂以鹽水炮再炮如此七次去皮臍一方以水調陳壁土為糊炮浸七次上㕮咀分作二服水半碗生薑七片棗七枚煎至八分每當發日去滓空心溫服川烏亦可一方名冷附湯去棗煎熟露一宿五更初冷服凡患瘧疾無過是痰實痞塞不通脾氣弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達壯脾胃去痰實降虛熱降心氣屢試屢驗治瘧虛寒久不瘥者空心服仍食棗三枚一方以蔥白七寸同煎治痎瘧及邪熱上用冬葵子陰乾為末服之又方出聖惠方恆山半兩銼甘草二兩生用川大黃半兩桂心半兩上件藥搗篩為散每服五錢以水一中盞煎至六分去滓空心溫服欲發時再服
