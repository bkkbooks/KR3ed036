body:
  text: 卷二百二十二諸虛門四季補益附論黃帝問素女曰男子受氣陰陽俱等男子行陽常先病耳目本其所好陰痿不起是氣力衰弱不能強健敢問療之之道素女曰帝之所問衆人同有陰陽為身邊各皆有婦人夭年損壽男性節操故不能專心貪女色犯之竭力七傷之情不可不思常能審慎長生之道也其為疾病宜以藥療之今所説犯者七第一之忌日月晦朔上下弦望六丁之日以合陰陽傷人之精令人臨敵不戰時時獨起小便赤黃精空自出夭壽喪身第二之忌雷電風雨陰陽晦暝振動天地日月無精光以合陰陽生子令狂癲或有聾盲喑啞失神或多忘誤心意不安忽喜驚恐悲憂不樂第三之忌新飽食飲而谷力未行太倉內實五臟方響以合陰陽六腑損傷小便常赤或白或黃腰脊疼痛頭項急強或身體浮腫心腹脹滿毀形夭壽天道之常第四之忌新小便精氣微弱營衛不固衛氣未散以合陰陽令人虛乏陰陽氣閉絶食無味腹脹滿結怫鬱不安妄誤或喜怒無常狀如癲發第五之忌作事步行身體勞營氣不足衛氣未散以合陰陽臟氣相干令人氣乏喘息為難唇口乾燥身體流汗谷不消化心腹脹滿百處痠疼起臥不安第六之忌新息沐浴頭身發濕舉重作事流汗如雨以合陰陽風冷必傷少腹急痛腰脊疼強四肢痠疼五臟方響上攻頭面或生漏瀝第七之忌共女語話玉莖盛強以合陰陽不將禮防腠理氣開莖中痛傷外動肌體內損腑臟結髮塞耳目視䀮䀮心中怵惕恍惚喜忘如杵舂膈咳逆上氣傷中女色痿弱身體不可不防犯此七篇形症已彰天生神藥療之有方又黃帝問高陽負曰吾知素女明知經脈臟腑虛盈男子五勞七傷婦人陰陽隔閉漏下赤白或絶産無子男子受氣陰陽同等其病緣由因何而起故欲問之請為具説對曰深哉問也男子五勞六極七傷病皆有元本由狀帝曰善哉七傷之病幸願悉説對曰一曰陰汗二曰陰衰三曰精清四曰精少五曰陰下濕癢六曰小便數少七曰陰痿病形如是此謂七傷黃帝曰七傷如是療之奈何對曰有四時神藥名四茯苓春秋冬夏療隨病形冷加熱藥溫以冷漿風加風藥色脈診評隨病加藥悉如本來經春三月宜以更生丸更生茯苓也黃帝問曰夏三月以何方藥幸得具聞對曰宜以補腎茯苓丸黃帝問曰春夏之療已聞良驗秋三月以何方藥對曰宜以補腎茯苓丸黃帝問曰春夏秋皆有良方冬三月復以何方治之對曰宜以垂命茯苓丸黃帝問曰四時之藥具已聞之此藥四時通服得不對曰有四時之散名茯苓散不避寒暑但能久服長生延年老而更壯高陽負曰凡經方神仙所造服之療病具已論訖如是所擬議從開闢以來無病不治無生不救也方更生丸出聖惠方能療男子五勞七傷陰衰消小囊下生瘡腰脊背疼痛不能俯仰兩膝臏冷時時熱癢或時浮腫難以行步目風淚出遠視䀮䀮咳逆上氣身體萎黃繞臍弦急痛及膀胱小便尿血莖痛損傷時有遺瀝汗衣赤黃或夢驚恐口乾舌強渴欲飲水得食不常或氣力不足時時氣逆坐犯七忌以成勞傷此藥主之甚驗方春三月宜服之茯苓四分若不消食三分加一菖蒲四分若耳聾三分加一山茱萸四分若身癢三分加一栝蔞根四分若熱渴三分加一菟絲子四分若痿泄三分加一牛膝四分若機關不利加一倍赤石脂四分若內傷三分加一乾地黃七分若煩熱三分加一細辛四分若目䀮䀮三分加一防風四分若風邪三分加一薯蕷四分若陰濕癢三分加一續斷四分若有痔加一倍蛇床子四分若少氣三分加一柏實四分若少力加一倍巴戟天四分若痿弱三分加一天雄四分炮若有風三分加一遠志皮四分驚恐不安三分加一石斛四分若體疼加一倍杜仲四分若陽絶腰痛三分加一蓯蓉四分若冷痿加一倍上搗篩蜜丸如梧桐子大先食服三丸日三不知漸增以知為度亦可散服以清粥飲服方寸匕早午晚時服七日知十日愈三十日餘氣平長服老而更少忌豬羊肉湯冷水生菜蕪荑等物一方用酒下亦可補腎茯苓丸療男子內虛不能食飲忽忽喜忘悲憂不樂恚怒無常或身體浮腫小便赤黃精泄淋瀝痛絞膀胱脛疼冷痹伸不得行渴欲飲水心腹脹滿皆犯七忌上以記其當療之法隨病度量方夏三月宜服之茯苓二兩食不消加一倍附子二兩炮有風三分加一山茱萸二兩身癢三分加一杜仲二兩腰痛三分加一牡丹二兩腹中遊氣三分加一澤瀉三兩有水氣三分加一薯蕷三兩頭風加一倍桂心六兩顏色不足三分加一細辛二兩目視䀮䀮三分加一石斛二兩陰濕癢三分加一蓯蓉三兩身痿三分加一黃耆四兩體疼三分加一上搗篩蜜和丸如梧桐子大先食服七丸日二服忌生蔥生菜豬肉冷水大酢胡荽等物補腎茯苓丸療男子腎虛冷五臟內傷風冷所苦令人身體濕癢足行失顧不自覺省或食飲失味目視䀮䀮身偏拘急腰脊痛強不能食飲日漸羸瘦胸心懊悶咳逆上氣轉側須人起則扶曳針灸服藥療之小折或乘馬觸風或因房室不自將護飲食不量用力過度或口乾舌燥或流涎出口或夢寤精便自出或尿血尿有淋瀝陰下癢濕心驚動悸少腹偏急四肢痠疼氣息噓吸身體浮腫氣塞胸脅醫所不能識妄加余療方秋三月宜服之茯苓防風桂心白朮細辛山茱萸薯蕷澤瀉附子乾地黃紫菀牛膝芍藥丹參黃耆沙參蓯蓉乾薑玄參人參苦參獨活各二兩上搗篩蜜和丸如梧桐子大食前服五丸臨時以酒飲下之忌酢物生蔥桃李雀肉生菜豬肉蕪荑等垂命茯苓丸療男子五勞七傷兩目䀮䀮得風淚出頭項急強不得回顧心腹脹滿上肢支胸脅下引腰脊表裡疼痛不得喘息飲食咳逆面目萎黃小便林瀝清精自出陰痿不起臨事不對足脛痠疼或五心煩熱身體浮腫盜汗流離四肢拘攣或緩或急夢寤驚恐呼吸短氣口乾舌燥狀如消渴忽忽喜忘或悲憂嗚咽此藥主之補諸絶令人肥壯強健氣力倍常飲食百病除愈方冬三月宜服之茯苓三兩白朮澤瀉牡蒙桂心牡蠣熬蔓荊子薯蕷杜仲天雄炮人參石長生附子乾薑菟絲子巴戟天蓯蓉山茱萸甘草炙天門冬去心各二兩上搗篩以蜜和丸如梧桐子大先食服五丸酒飲皆得忌海藻菘菜鯉魚生蔥豬肉酢等物茯苓散宜四時通服之茯苓鍾乳研雲母粉石斛菖蒲柏子仁炒菟絲子續斷杜仲天門冬去心牛膝五味子澤瀉遠志去心甘菊花蛇床子薯蕷炙山茱萸天雄炮石葦去毛乾地黃蓯蓉並等分上為散以酒服方寸匕連服十日再二十日知三十日病悉愈百日以上體氣康強長服八十九十老公還如童子忌酢物羊肉餳鯉魚豬肉蕪荑等鹿茸丸出聖惠方暖臟腑壯腰膝補下元養精氣久服美顏容長肌肉補諸虛損四時宜常服鹿茸二兩去毛塗酥炙微黃磁石二兩燒醋淬七遍細研水飛過熟乾地黃炒白茯苓肉蓯蓉酒浸一宿刮去粗皮炙乾菟絲子酒浸三日曝乾別搗為末人參去蘆頭附子炮裂去皮臍薯蕷遠志去心牛膝去苗杜仲去粗皮炙微黃銼巴戟天續斷五味子山茱萸澤瀉桂心補骨脂蛇床子各一兩上為末入磁石研令勻煉蜜和搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸看老少以意加減地黃丸出保命集方專治陽盛陰虛肝腎不足虛損形瘦無力而多青黃面無常色宜榮血養氣宜服蒼朮一斤泔浸熟地黃一斤乾薑春七錢夏半兩秋七錢冬一兩上為細末蒸棗肉為丸桐子大每服五七十丸至百丸諸飲下若加五味子為腎氣丸述類象形神品藥也如陽盛陰損心肺不足及男子婦人面無血色食少嗜臥肢體困倦宜八味丸如形體瘦弱無力多困未和陰陽先損夏月宜地黃丸春秋宜腎氣丸冬月宜八味丸治病久虛弱厭厭不能食和中丸補虛進飲食附論脾播百物氣澤以埤諸臟腑者也真氣強盛則可以腐熟水穀播諸臟腑滋養營衛充實肌膚若中下氣虛內生寒冷陽氣不足則不能腐熟水穀故虛而不嗜食當補虛以助其陽氣也方補真丹出御藥院方能接真養氣健脾益胃升降陰陽調順三焦常服寬利胸膈消進飲食性平不躁沉香丁香檀香白豆蔻仁肉豆蔻各一兩肉蓯蓉半兩酒浸一宿焙乾牛膝半兩酒浸一宿焙乾巴戟天去心七錢白朮半兩木香香附子青皮去白各二兩薑黃沒藥另研縮砂仁補骨脂炒各一兩附子七錢炮裂去皮臍穿山甲半兩炙黃桂去粗皮一錢乾山藥七錢茴香半兩微炒甘草二兩炙黃乳香半兩另研蒼朮三兩酒浸三日取出焙末乾用青鹽一兩炒黃去鹽不用上為細末酒浸蒸餅為丸如梧桐子大每服八十丸至一百丸空心溫酒服或鹽湯下葫蘆巴湯出王氏博濟方專治元氣虛損腹脅雷鳴中脘脹滿冷痛不思食葫蘆巴炒川芎木香京三稜煨白朮官桂去皮白蒺藜微炒當歸益智陳橘皮去白以上各一兩沉香附子炮去皮臍舶上茴香微炒各一兩半乾薑半兩炮甘草三錢炙令黃苦楝子三兩取肉不用核上為末每服二錢煎沸湯點不拘時服一方入鹽少許同煎服七香丸出聖惠方專治虛冷氣上攻心膈不利腹脅虛脹不思飲食麝香半兩細研沉香白檀香木香藿香丁香銼零陵香白芷訶黎勒皮肉豆蔻去殼芎藭炙桂心當歸銼微炒細辛香附子各一兩檳榔二兩上為末煉蜜和搗三五百杵丸如梧桐子大每於食前以溫酒下二十丸蓽澄茄湯出王氏博濟方專治脾元虛冷飲食減少面黃腹痛蓽澄茄石斛去根附子炮裂去皮臍桂去粗皮巴戟天去心各一兩白朮銼炒五味子芎藭各三錢分人參白茯苓去黑皮木香檳榔白豆蔻去皮各半兩上銼如麻豆每服三錢水一盞生薑二片棗二枚擘破煎至七分去滓空心日午近晚溫服補真丸出永類鈐方不進飲食以脾胃之藥治之多不效者亦有故也人之有生不善攝養房勞過度真陽衰虛坎水不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑溏泄此皆真火衰虛不能蒸蘊脾土而然古人云補腎不如補脾然補脾不如補腎腎氣若壯丹田之火上蒸脾土脾土溫和中焦自治膈開能食矣葫蘆巴炒附子炮裂去皮臍陽起石煅川烏炮去皮菟絲子淘淨酒蒸沉香不見火另研肉豆蔻麵裹煨肉蓯蓉酒浸焙五味子各半兩鹿茸去毛酒蒸焙川巴戟去心鍾乳粉各一兩上為細末用羊腰子二對治如食法蔥椒酒煮爛入少酒糊杵和為丸如梧桐子大每服七十丸空心食前用米飲鹽湯任下沉香煮散出聖濟總録專治脾元不和中焦痞悶氣滯噎塞不進飲食補虛沉香銼木香青橘皮湯浸去白焙陳橘皮湯浸去白焙人參郁李仁湯浸去皮焙甘草炙各一兩檳榔銼草豆蔻去皮桂去粗皮乾薑炮各半兩上為散每三錢水一盞煎至七分去滓溫服不拘時候蕪荑丸出聖濟總録專治脾腎虛冷不思飲食蕪荑炒六兩烏梅肉炒二兩黃連去須半兩厚朴去粗皮薑汁炙五兩補骨脂炒肉蓯蓉酒浸切焙巴戟天去心附子炮裂去皮臍鹿茸去毛酥炙陳橘皮去白切焙各四兩上為末粟米粥丸如梧桐子大每服三十丸空心日午溫米飲下沉香丸出聖濟總録專補脾腎止心腹痛進飲食沉香銼二兩鹿茸去毛酥炙烏藥銼楝實銼炒白茯苓去黑皮石斛去根白朮訶黎勒炮去核厚朴去粗皮薑汁炙人參各一兩上為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸溫酒或米飲下空心食前服硇砂丸出王氏博濟方專治脾元虛弱冷氣攻上飲食減少硇砂水煎飛成霜木香桂去粗皮肉豆蔻去殼炮蘹香子炒附子炮裂去皮臍青橘皮去白焙陳橘皮去白焙各半兩山芋半斤木瓜二枚上納八味搗羅為末先以木瓜切蓋出瓤如小甕子樣存取元蓋逐個木瓜共入硇砂末半兩以元蓋緊縛用無灰酒三升於銀石器內以慢火煮候酒欲干木瓜爛取出入前