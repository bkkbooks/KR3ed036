置大盆中以新水一半以上相和旋轉攪數百匝放令清澄闢去清者留濁腳又以新水同攪水多為妙又澄去清者直候無臭氣澄下秋石如粉即止曝乾刮下如膩粉光白粲然可愛都無臭氣味為度再研以乳男兒乳攪之如膏烈日中曝乾如此九度須揀好日色乃和蓋假太陽真氣也第九度即以棗肉丸之如梧桐子大曝乾每服三十丸溫酒下治陰痿羸瘦精髓虛弱四肢少力用豬腎一對去脂膜切枸杞葉半斤用豉汁二大盞半相和煮作羹入鹽椒蔥空腹服之補虛勞益髓長肌悅顏色令人肥健用鹿角膠炙搗為末以酒服方寸匕早午晚日三服增至二三匕效地黃丸還精補髓駐顏色卻老治虛損安臟腑暖下元壯腰膝生地黃淨洗細切一斗以好酒一斗浸之經宿即漉出曬乾卻入酒中浸以酒盡為度曬乾乾漆搗碎炒令煙出肉蓯蓉酒浸一宿刮去皴皮炙乾蛇床子各二兩菟絲子三兩酒浸三日曝乾別搗為末桂心牛膝去苗石斛去根銼補骨脂微炙各二兩人參去蘆頭遠志去心各三兩上為末煉蜜和搗三五百杵丸如梧桐子大每日空心晚食前以鹽湯下三十丸秋石還元丹出十便良方能大補暖悅色進食益下元久服去百疾強骨髓補精血開心智煉人中白方上以男子小便十石更多不妨先搘大鍋灶一副於空屋內鍋上用深瓦甑接鍋口令高用紙筋杵石灰泥塗甑縫並鍋勿令通氣候乾下小便只可於鍋中及七分以來灶下以稻火煮專令人看之若湧出即添冷小便些少勿令湧出候乾細研入好合內如法固濟入灰爐中煅之旋取二三兩再研如粉煮棗瓤為丸如緑豆大每服五七丸漸至十五丸空心鹽湯下久服臍下常如火暖凡諸般冷疾宜服之皆愈多年冷勞虛憊甚者服之皆壯盛其藥末常近火收或時復養火三五日功效大也神仙修真丸出朱氏集驗方能益精補髓壯筋骨明目補暖臟氣去一切風鹿角霜十兩附子五兩炮上為細末以鹿角膠半斤熬化為丸如梧桐子大每服三十丸空心溫酒下或炒茴香湯下保命延齡丸出楊氏家藏方能安神養氣補填骨髓起弱扶衰潤澤肌膚聰明耳目久服黑髭發牢牙齒能夜讀細書心力不倦苣蕂子補骨脂酒浸一宿焙牛膝酒浸一宿焙甘菊花天門冬去心菟絲子酒浸一宿濕杵作餅火焙再杵枸杞子人參去蘆頭肉蓯蓉酒浸一宿焙乾切白茯苓去皮巴戟去心生用酸棗仁柏子仁山藥覆盆子五味子楮實天雄炮去皮尖以上十八味各一兩肉桂去粗皮四兩生乾地黃八兩切細新瓦上炒令乾燥上為細末春夏煉白沙蜜秋冬用蒸棗肉為劑入好胡桃十枚去皮同藥劑於臼中搗千餘下丸如梧桐子大每服三十丸加至五十丸溫酒鹽湯送下空心食前服陳體常先生傳菟絲丸出衛生家寶方專固元益精菟絲子二兩酒浸一宿炒乾為末遠志一兩去心焙乾稱乾山藥半兩韭子半兩牛膝半兩去蘆頭稱白茯苓半兩肉蓯蓉半兩龍骨半兩火中煅過上搗為末煉蜜為丸如梧桐子大空心二十丸日進三服酒鹽湯下鹿角霜丸出衛生家寶方專治精氣虛滑真氣不接鹿角霜二兩白茯苓一兩山藥一兩遠志半兩去心附子一個炮去皮尖上為細末酒糊為丸如梧桐子大每服三十丸或四十丸用米飲溫酒任下空心食前服強筋健髓出本草以蓯蓉鱔魚為末黃精酒丸服之力可十倍補益精氣強盛陰道出本草以蘿蔔生啖亦蒸煮食之補益精氣強盛陰道出本草以枸杞葉作羹食之治老人骨髓虛竭補益麋茸膏出本草以麋茸五兩去毛塗酥炙微黃為末以清酒二升於銀鍋中慢火熬成膏盛瓷瓦器中每服半匙溫水調服空心食前服水陸丹出本草補下益精以雞頭實於鍾子搗爛曝乾再搗下篩熬金櫻子煎和丸服之治骨髓風毒疼痛不可運動者用麻子仁水中浸取沉者一大升漉出曝乾於銀器中旋旋炒直須慢火待香熟調勻即入木臼中令三兩人更互搗從一二數令及萬杵看極細如白粉即止平分為十貼每用一貼取家釀無灰酒一大碗以砂盆柳木槌子點酒研麻粉旋濾取白酒直令麻粉盡余殼即去之都合酒一處煎取一半待冷熱得所空心食前頓服日服一貼藥盡全瘥輕者止於四五貼甚者十貼必效如不效可再照前法服補益強力益志附論夫腎在骨故腎憊則力劣心藏神故心虛則多忘強力益志必補心腎心腎得所養則力強而志益矣心腎合德水火相濟則精全神足無所不通況強力益志哉方麥門冬丸補心育神強力益志兼止肺嗽及腎臟風冷麥門冬去心焙二兩半天門冬去心焙一兩三錢茯神去木杜仲去粗皮炙銼柏子仁石菖蒲切焙枸杞子生乾地黃焙百部根去皮各一兩白茯苓去黑皮山芋人參肉蓯蓉酒浸切焙貝母去心炒各一兩半防風去蘆五味子丹參各一兩一錢遠志去心半兩上為末煉蜜丸如梧桐子大每日空心米飲下二十丸食後常含化一丸枸杞子丸一名延年丸用育神氣強力益志及治風勞氣冷美顏色變髭發枸杞子焙覆盆子車前子生乾地黃焙地骨皮續斷何首烏去黑皮巴戟天去心菊花去萼焙白朮菖蒲米泔洗日曝遠志去心細辛去苗葉牛膝酒浸切焙菟絲子酒浸一宿搗爛再焙乾為末方入前藥各一兩上為末煉蜜為丸如梧桐子大每日空心酒下十丸至二十丸不拘時候遠志丸治真元衰憊耳焦面黑精神不爽補益血氣強力益志遠志去心山芋柏子仁巴戟天去心續斷杜仲去粗皮炙銼各二兩菟絲子酒浸焙乾別搗荊實山茱萸五味子各二兩半肉蓯蓉酒浸切焙牛膝酒浸切焙各四兩上為細末煉蜜為丸如梧桐子大每服三十丸空心溫酒下服之月餘氣壯精倍若髓澀加柏子仁精冷加五味子陽衰加續斷各一倍麋茸丸一名地黃煎專補虛治心強力益志麋茸去毛酥炙二兩枸杞子三兩茯神去木人參各一兩半乾薑炮二兩桂去粗皮半兩遠志去心三錢上為末取地黃汁一升和搗令勻丸如梧桐子大每日食前鹽湯酒服十丸加至二十丸大豆丸補氣強力益志斷谷不飢大豆黃卷一升微炒薰陸香研白龍骨研白茯苓去黑皮黃蠟酒煮過各一兩半蜜二升真酥半升上前四味為末入蜜蠟酥和搗三五千杵丸如雞子黃大每日空心酒嚼下一丸食後再服遠志丸強力益志延年遠志去心一兩山芋半兩人參半兩白茯苓去黑皮半兩金箔銀箔各十片上為末煉蜜為丸如梧桐子大每服十丸茶酒隨意下菟絲子丸補益真氣強力益志菟絲子酒浸焙乾別研菖蒲切焙遠志去心地骨皮生乾地黃焙各二兩上為末煉蜜為丸如梧桐子大每服三十丸茶酒下合時須齋戒仍忌婦人雞犬見四神湯一名四柱散專治一切冷氣調順經絡生精補氣強力益志菖蒲丸補元氣強力益志菖蒲切焙細蒼朮各等分上米泔浸三宿控干再用酒浸一宿焙搗羅為末煉蜜丸如梧桐子大每服二十丸至四十丸空心鹽湯下日三服治益精氣強志意用雞頭實二合煮令熟去殼研如膏入粳米一合煮粥空心食之又方用石燕二十枚和五味炒令熟以酒一斗浸三日夜臥時飲一兩盞隨性能補進食令人力健蓯蓉散出千金方用主輕身益氣強骨補髓不足能使陽氣強盛方肉蓯蓉五味子遠志甘草各一斤生地黃三十斤取汁慎火草切楮子乾漆各二升上八味以地黃汁浸一宿出曝乾復漬令汁盡為散空心酒服方寸匕早午晚日三服三十服力倍常雖御十女無損益筋力去伏熱出本草以芹菜作齏菹及煮食並得治五臟虛損羸瘦益氣力堅筋骨出本草以苣蕂蒸曝各九遍每取二合用湯浸布裹挼去皮再研水濾取汁煎飲和粳米煮粥食之苣蕂即胡麻也
