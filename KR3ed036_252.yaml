body:
  text: 卷二百五十二諸毒門解金銀銅鐵石毒附論夫金受五方精氣各有毒性不可謂之有利無害也服之適宜足以瘳疾服之非宜徒傷正氣當隨所畏惡以治之服石法亦若是又人不知服石以致庶事不佳惡瘡疥瘟疫瘧疾年年常患寢食不安居常惡人非止己事不康且生子難育所以石在身中萬事休泰要不可服五石也人年三十以上可服石藥若素肥充亦勿妄服四十以上必須服之五十以上三年可服一劑六十以上二年可服一劑七十以上一年可服一劑人年五十以上精華消歇服石猶得其力六十以上轉惡服石難得力所以常須服石令人手足溫暖骨體充實雖生冷舉措輕便復耐寒暑不著諸病是以人須服之凡石熱熟煉用之凡石氣之發必惡寒頭痛心悶發作有時狀如瘟瘧但有此兆無過取冷水淋之得寒乃定止一切冷食惟酒須溫方薺苨湯療石毒卒發者慄慄如寒或欲食或不欲食若服紫石英發毒者亦寒悶惛喜臥起止無氣力或寒皆是腑臟氣不和所生此湯主之薺苨四兩甘草炙藍子各一兩茯苓黃芩各二兩蔓荊子一升人參一兩芍藥一兩上㕮咀以水一斗煮蔓荊子八升去滓子放藥煎取三升去滓分三服日三服若虛弱加人參一兩若氣上加茯苓薺苨一兩甚良治銀毒方黃連去須甘草生銼各一兩上粗搗篩以水三盞煎取二盞去滓飲之解金銀毒方出千金方用水銀服數兩即出若毒少者一兩亦可得一服每一兩水銀服之扶坐與吞令入腹中即活一方以雞汁及屎白燒豬脂和水淋雞屎汁煮蔥白汁鴨血及屎汁並能治之一方加人參汁臘月豬脂為丸如豉豆大三丸並服之單用鴨屎汁治銅鐵毒及金毒治腹中有鐵方用白炭刮去末井花水服三錢不效再服解金毒方出聖惠方用鴨血一盞每服半盞和雞子清調下未效再服解銀毒方用石亭脂一兩為末煎甘草湯調下二錢每日三服效治鐵毒方出聖惠方用磁石火煅醋淬二七遍一兩細搗研為粉醋煮麵糊丸如梧桐子大每服三十丸水吞下未瘥更服治丹砂毒方用鹽半兩以冷水攪勻令澄旋旋服之治百種乳毒方用紫石英一兩為末每服一錢以溫水調下連三服治硫黃毒方用細辛去苗葉一兩搗羅為散每服一錢煮豬肉白湯調下冷服一方用白野鴿肉服之並解治硝石毒方用女苑一兩粗搗篩每服二錢以水一盞煎七分溫服不拘時候治陽起石毒方用菟絲子一兩不用酒浸搗羅為細末每服一錢以水調下三服立瘥治雄黃毒方用防己一兩為細末每服二錢以溫水調下連進三服一方取汁解之並瘥治礬石毒方出千金方用白鵝膏不拘多少研細服一匙大豆汁調下一方單用大豆汁服之亦佳黑鉛酒治中金石藥毒用黑鉛一斤淨鍋熔作汁投酒一升如此十數回候酒至半升去鉛頓服之效一方用井水磨下解砒毒解丹毒方用地漿服之最妙壓丹石毒及解諸毒方用生大豆煮汁服之甚良又方壓丹石去煩熱利小便止渴小兒熱病取葛根水浸搗汁飲之良治服金石方取栝蔞根苦酒中熬燥搗篩仍以苦酒和塗紙上攤貼用之良妙五加皮湯治服諸藥石後或熱燥多向冷地上臥又不食諸熱面酒等物用五加皮二兩以水四升煮取二升半候毒發之時便服未定更服治硫黃忽發氣弱用羊血服一合效單蔥白湯藥療石毒沉體中數年或即發宜服之蔥白一升切以水五升煮一半去滓服未效再服三劑止治丹石熱發用菰根和鯽魚作羹食之三兩頓即瘥療熱酒及丹石毒用田螺汁飲之不可常服解砒毒治食金欲死方用雞糞半升淋汁一升灌之如人行三二里再灌馬通散治石毒赤馬糞不拘多少水浸三日淘洗上入砂鍋子煉存性入麝少許每服一錢溫酒調下治中金藥毒方亦解眾毒止瀉泄及邪熱取金蛇四寸炙令黃煮汁飲頻服之以瘥為度治一切藥毒及蠱並解金石毒用石蟹熟水磨服治硫黃毒煎余甘子汁飲之以制其毒也治硫黃毒以黑錫煎湯解之忌食宿冷豬肉解金銀藥毒用黃龍眼以水研取汁半合空心少少服二十餘日瘥治硫黃髮遍身熱以大麻油二合煎熱放溫以銅匙抄少許啜之日三五服效治服硫黃髮毒以豬肉鴨羹及余甘子湯並解之食丹藥毒用罌粟子研去滓煎取腐入姜蜜和萱草研汁服四物湯香蘇散各一帖和煎服之解鉛粉調地漿飲之亦解淡竹葉濃煎服豬浮肋骨煎汁研栝蔞飲之可解藍汁豬血綠豆以上並解之服丹石毒薄荷黃芩各半兩芒硝二錢用蜜調嚼或敷又方用東引柳枝及甘松或加丁香木香為末可服可含解紫石英毒以破麻鞋底水煮汁服之犀角飲方解丹石藥毒犀角鎊知母防風去蘆頭甘草四味各半兩山梔子杏仁去皮尖蔓荊子地骨皮白茯苓去皮五味各一兩黃芩一兩半柴胡去苗二錢上件㕮咀每服五錢水一盞煎至七分去滓溫服解諸飲食中毒附論夫五穀五菜五畜五果以至藥石皆能養性益壽延年卻老瘳疾蠲邪然有損益有利害不可不察飲食之間不可不慎也物性味有相須相得相畏相惡相得則良相須則用相畏則制其毒相惡則置而不用然則飲食有毒宜有解散除治之法也嶺南俚人毒藥皆因食得之即覺漸不能食或心中滿脹並皆急悶似瘴微覺即取一片銀方寸余含之一宿其銀變色即是著毒藥也銀色青是藍藥若黃是菌藥不可不辨也夫人一旦因飲食忽忽困悶少時轉甚乃至死者名為飲食中毒俚人假以毒物投於食里而殺人但頰內或懸癰內初如酸棗漸長大是中毒藥也急治則瘥不治毒入腹臟則死脈浮滑無陽微細不可知者中毒也凡飲食有毒者傾於地下墳起者皆殺人也凡飲食雜味有相須相得則益體相害則成病以此治疾則皆難療所以病有不受藥療必至於死也今略疏其不可食物不須各題病名知者善加慎之方解面毒以蘆菔啖之昔有婆羅僧東來見食麥面者云此熱何以食之又見食中有蘆菔云賴有此以解自此相傳食麵必啖蘆菔解毒丸解一切飲食毒及諸藥毒並療溺死縊死磕死或湯蕩火燒氣色已絕但心頭熱者皆可治五倍子三兩大戟一兩山慈菇半兩板藍根半兩續隨子去皮一兩麝香一錢別研上件為細末研勻水煮糯米和丸每一兩作一十丸陰乾用雞鴨血為衣候經宿布袋掛當風酒下一丸治郁食中毒取豆汁解之良治誤中𩹾魚毒者此鱉之屬無頭足不縮者是以黃耆吳藍煎湯服之解飲食中毒及魚肉菜等毒出千金方苦參一兩半醇酒二升一法用苦酒同煎一升去滓令溫飲之得吐即愈或取泔汁藍汁犀角汁飲之亦佳解一切食毒及飲酒不知中何毒卒急無藥可解出聖惠方甘草生薺苨各二兩上細銼以水五盞煎取二盞停冷去滓分三服一方解一切藥毒加蜜少許同煎服之解俚人一切毒飲方生薑甘草炙各一兩上各拍碎以水三盞煎取一盞半平旦空肚服分二服訖然後以別方治之又方出肘後方常山四兩白鹽二錢上以水一斗浸之一宿以月盡日盡之月一日五更用土釜中煎之勿令奴婢雞犬見煎取二升於平旦分三服服少時即吐以銅盆盛之看色青以枝舉得五尺不斷者即是藥未盡候一日二日後更進一劑乃良席繼曾飲酒得病月餘始覺首領梁墳將土常山與之呼為一百頭牛藥服即瘥治食百物中毒出千金方掘廁旁地深一尺以水滿坑中取廁籌七枚燒令煙以投坑中乃取水汁飲四五升即愈急者不可得但掘地著水即取飲之服生韭汁數升含貝母子一枚須臾吐食物瘥治食索粉片積方出經驗良方用紫蘇濃煎汁加杏泥服即散治中豆腐毒方出經驗良方用蘿蔔煎湯如非時無蘿蔔用子煎湯亦可人有好食豆腐因中其毒醫治不效後更醫醫至中途適見做豆腐之家夫婦相爭因問云今早做豆腐妻誤將蘿蔔湯置豆腐鍋中今豆腐不成蓋豆腐畏蘿蔔也醫得其說至病家凡用湯俱以蘿蔔煎湯或調或咽病者遂愈治粽𥻓為積方出經驗良方用面末加少木香末鹽湯調服口有酒香食積去矣又治酒疾甚妙治酒面腫方用參苓平胃散加白藥煎麵湯下傷酒亦然辨飲食毒法凡飲食傾澆於地上湧起者不可食食之皆殺人治新中雜食瘀食不消心腹堅者出金匱方用白鹽二兩以水二大盞半和分三服連並服取吐為效黃龍湯出千金方專治因食中毒取灶底當釜直下掘取赤土搗羅為末以冷水隨多少服之或犀角水磨取汁飲大效亦治六畜肉毒驗又方取赤馬溺不拘多少每服飲一二盞又方取桑上蕈破作段著釜中以水五升煮取二升漉出澄清以火再煎沸經宿不食來晨空心服三合則吐食瘕每日服三合瘥羸者減服之貝齒散治食諸餅臛百物中毒及射菵在肉中毒解俚人一切毒飲出肘後方用都淋藤十二兩以水一升酒二升煎取二升分三服如人行十里進一服盡三服訖其藥毒遂從大小便出十日慎吃壅毒諸食不瘥更服以瘥為度又方療諸毒用此藤二兩長三寸並銼酒三升合入罌中密封以糠火燒四邊至三四時取出溫服長令有酒色亦無所忌一方治初中俚人毒藥未得此藥即用黃藤十兩以水煮取二升分為三服藥毒內消解雞子毒方出千金方用淳酒解之肉桂方治蜀椒毒誤食欲死或下白沫身體冷上用肉桂煎汁服之多飲冷水一二升忽食欲吐急煎濃豉汁服之或食蒜或飲地漿亦可慎不可熱飲殺人中椒毒者含蒜及薺苨瘥治消熱面毒用枸杞葉及根皮細銼面拌煮熟吞之良犀角散出肘後方專治人以雉肉作餅臛食皆吐下以犀角為末服方寸匕又治服諸藥過劑心中悶亂燒灰水服治食飲損者方上以蔥豉湯加當歸一兩煎之去滓分服即瘥若不見效即服蘆根湯治有人夜間飲水誤吞水蛭入腹中經停月餘後必生下小蛭能食人肝血腹痛不可忍面目黃瘦全不進食若不早治能令人死出危氏方用田中干泥一塊小死魚三四個將豬膏溶油攪勻用巴豆十粒去殼膜拌入泥內研爛為丸如綠豆大用田中冷水吞下十丸小兒只用三丸須臾大小水蛭一時皆瀉出卻以局方四物湯加黃耆煎服生血補氣飲食毒心煩悶者以苦參煮汁飲之吐出即愈解食牛馬豬羊犬雞鴨魚蟹中毒附論夫禽獸品類有根性本毒者有無毒而食毒物者有雜相畏相惡相因成者人不慎而食之致傷臟腑之和亂腸胃之氣或輕或重各隨其毒而為害凡六畜者謂牛馬豬羊雞狗也此等本無毒不害人其自死及著疫者則有毒人食之中此毒者則令人心神煩悶而吐利無度是也凡六畜五臟著草自動搖及得醋咸不變色又墮不汙又與犬犬不肯食者皆有毒殺人凡牛肉有毒者由毒蛇在草中牛食草因誤啖蛇則死亦有蛇吐毒著於草上牛食其草亦死此牛肉則有大毒又因瘦病而死者亦有毒食之則令人心悶身體痹甚者乃吐逆下痢腹痛不可忍因此而致死者非一也凡駿馬肉及馬鞍之下肉皆有毒不可食之食之則殺人其有常馬肉則無毒或因疫死食之則有毒中於人也凡諸無毒其間野放或食雜物而遇死此肉有毒人食之則毒入臟腑故令吐痢困悶不安也凡狗肉性甚燥熱不可多食其疫死及猘死者皆有毒食之難消故令人腹脹心煩急躁悶亂也凡鴨肉本無毒不能損人偶食之觸令不消因結聚成腹內之病也凡禽獸自死者肝皆有毒不可食往往傷人其疫死者彌甚被其毒者多泄痢嘔吐悶而不安也凡諸肉脯若放在茅草屋雨漏處則有大毒人食乃成暴症不可治亦有始食下即殺人也凡諸肉脯炙之不動得水則動故不可食凡脯肉及熟肉皆不可深密收藏令氣不泄食之殺人也凡射菵獵人多用菵藥塗箭頭以射蟲鹿傷皮則死以其有毒故也人獲此肉除去中箭毒處肉不食余可食若誤食其肉則被毒也其有不死者所食肉處去毒箭較遠毒氣不深其毒則輕雖不死令人困悶身體痹不安並吐痢者是其候也射菵藥者以生烏頭汁煎之是也凡郁肉者謂諸生肉及熟肉納器中密閉其氣壅積不泄則為郁肉有毒不幸而食之乃殺人其輕者亦悶亂不安也凡可食之肉不甚有毒有死者多因疫氣所斃則有毒若食此肉便令人悶亂吐痢無度是中毒也凡食諸魚中毒者皆由魚在水中食毒蟲惡草則有毒人食之不能消化即令悶亂不安也凡蟹食水蒗水蒗有大毒故蟹亦有毒若中其毒則煩亂欲死如經霜以後遇毒即不能殺害人未被霜蟹煮之則多有中毒故令人悶亂精神不安也方獺肝丸出聖惠方專治食魚鱠不消生瘕常欲食鱠者方獺骨肝肺干胡大黃各八分蘆根鵲骨各七分桔梗五分乾薑桂心各四分斑蝥二十枚炙上為末蜜丸酒服十丸至十五丸即消五蠱黃丸一名萬病丸出千金方專治食蟹中毒煩亂欲死者服得吐下皆瘥雄黃一兩以水從旦至夜煎之取出別研莽草取葉水煎洗曝乾一兩蜈蚣一條去頭足炙研細巴豆二十枚去皮心炒研勻鬼臼一兩上搗羅三味為末別研巴豆雄黃和勻煉蜜為丸如小豆大瓷器中盛每服三丸至五丸米飲下一方治諸蟲方依此方治食諸肉中毒方出聖惠方專治遇冷不消成蟲症大黃炒一兩朴硝研一兩杏仁打破和皮一兩上為粗末每服三錢以水一盞煎至七分服橘姜丸出十便良方專治食魚中毒陳橘皮湯浸去白焙為末生薑去皮切碎搗甚爛豆豉為末一方有冬瓜汁上各等分和丸桐子大每服二十丸茶清下三服吐出神效三聖飲治蟹腹中有毒食之或將死急治之大黃汁紫草汁冬瓜汁上取汁共一大盞飲之立效治食蟹中毒方出聖惠方生藕汁蒜汁冬瓜汁上各取汁自各飲之或一汁已解別汁不用飲一方專用紫蘇汁飲之蘇子汁亦可一方專用冬瓜汁服二升治食馬肉血洞下欲死方出聖惠方豉二百粒杏仁二十枚上㕮咀蒸五升米飲下熟搗之再服令盡又用甘豆湯冷飲能解諸毒又方煮蘆根汁飲之良厚朴飲出聖惠方專治食魚鱠及生肉在胸膈中不化吐之不出便成癥瘕厚朴三兩大黃二兩上㕮咀以水二升煮取一升盡服立消人強者大黃以酒三升取二升再服治食魚鱠不消及食諸魚中毒方大黃二兩切朴硝二兩上以酒二升煮取一升頓服之仲景方橘皮一兩肘後方云食豬肉過冷不消必成癥瘕一方無橘皮一方煎生薑汁服治食六畜肉中毒方出聖惠方上取六畜干屎為末水服佳一方畜肉毒以大糞服之良又方出聖惠方燒小豆一升為末服三方寸匕良一方服灶底黃土方寸匕治食生肉中毒方掘地深三尺取下土三升以水五升煮土五六沸取上浮清者飲一升立愈治食野菜馬肝肉諸脯肉毒方出聖惠方取頭垢如棗核大水吞之神驗一方燒狗屎灰水和絞取汁飲之又方出聖惠方燒豬骨為末水服方寸匕日三服一方燒笠子末服方寸匕亦瘥治食百獸肝中毒出千金方大凡食物自不可輕食自死者諸心皆勿食豬脂一斤頓服佳亦治陳肉毒治生食馬肝毒殺人方出聖惠方取牝鼠屎二七枚兩頭尖者是以水研飲之不瘥更作一方用雄鼠屎即瘥治食豬肉毒方出聖惠方上燒豬屎為末服方寸匕犬屎亦佳治食魚中毒方出聖惠方以水煮橘皮停極冷飲之立驗一方用大小黑豆取汁服之或用朴硝汁服之並瘥一方大黃汁亦解治食魚中毒面腫煩亂以及鱸魚中毒欲死者並食鯸鮧魚中毒銼蘆根吞取汁多飲一方治蟹毒取蘆葦葉汁飲之愈一方治食馬肉中毒飲蘆根汁亦可兼作湯浴之尤妙出千金方治食魚鱠不消及食諸魚中毒不療必成癥瘕出聖惠方舂馬鞭草飲汁一升即消生薑亦良姜葉汁一升亦消又可服吐藥吐之又方出聖惠方取鮐魚皮燒灰水服無完皮壞刀裝取之一名鮫魚皮或魚皮亦可大治食鯸鮧魚毒欲死者甚驗一方魚皮燒灰水服又方出千金方取魚鱗燒灰水服方寸匕食諸鮑魚中毒亦用之治食鵝鴨肉成病胸滿面赤不下食者方出千金聖惠方以秫米泔服之良一方糯米煮服一中盞治食狗肉不消心中堅或腹脹口乾大渴心急發熱狂言妄語或洞下方出聖惠方用杏仁一升去皮研以沸湯三升和絞取汁三服狗肉完片皆出即靜良驗治食牛肉中毒方出聖惠方以狼牙燒灰水服方寸匕又云豬牙亦可一方以甘草煮汁飲之並瘥一方以豬脂煉為油服之亦妙治食六畜肝中毒方出十便良方大凡物肝久藏不可輕啖自死者彌勿食之用豉一兩以水浸絞取汁旋服亦治食躁治鳥獸中毒箭其肉有毒解之方出肘後方用藍青三握細切搗取汁飲之每服一盞肘後方加大豆汁鹽汁服之解治食魚中毒方用冬瓜一枚小者洗淨搗絞汁一大盞旋旋飲之效或取甜瓜絞汁飲之亦得亦治食蟹中毒解河豚毒方出德生堂五倍子白礬上等分為細末水調灌之又方出百一選方以槐花腦子為細末水調灌之治食蟹反惡方出德生堂昔一人食大蟹數枚誤食紅柿至夜大吐繼以血昏不醒人事同村有知其故者憂之以木香作餅子斡開病人口遂調藥灌入神效以木香嚼尤妙治食啖蛇牛肉殺人凡發向後順者是也食之欲死出聖惠方飲人乳汁一升立愈又以洗頭泔飲一升愈又牛肚細切以水二升煮取一升暖飲之大汗出者愈治食鯽魚沙糖令人成疳及丹石熱毒取艾和鯽魚作羹食一兩頓即愈治食自死鳥獸肝中毒出聖惠方取故頭巾垢一錢以熱湯中烊服之亦治卒心痛以沸湯取汁飲之頭巾即髻帛也又方飲豉數升良治食牛馬肉及肝中毒先銼頭髮令寸長和土拌作溏泥二升合和飲之須臾發皆貫所食肝出治食豬肉馬肝漏脯中毒出傳信適用方用大蒜燒末服或豬脂清調下亦可或單用生蒜汁服之亦瘥治食狗肉不消心下堅或腹脹口乾或發熱暈亂出肘後方以煮蘆根飲之治中鱉蝦蟆毒方及治六畜鳥獸肝中毒取生豉一大合新汲水半碗浸令豉水濃頓服之即瘥有一士人嘗云此三味大小皆可殺人中之令人小便秘臍下痛至死者又方取五味生為末一二錢井水調下治食自死六畜諸肉中毒搗黃藥末以水和服方寸匕未覺再服瘥一方用犀角屑水調服之治食黍米中藏干脯中毒方出金匱方濃煮大豆汁飲數升即解亦治貍肉漏脯等毒治鯉魚毒方用果樹葉蘿蔔刺蝟灰醋糟搗細用火焙熱食之食河豚毒出本草以蘆根並橄欖解之治食生肝中毒出聖惠方用附子一枚炮製去皮臍為末溫水服一錢日三服薑湯下亦可治漏脯毒並及諸食鬱肉方出聖惠方用搗韭汁服之良大豆汁亦得一方治食百物中毒單用韭汁數升服之治郁濕脯毒及生肉熟肉皆不用深藏密蓋不泄氣殺人又肉汁在器中密蓋氣不泄者亦殺人張文中雲肉閉在密器中經宿者為靜出千金方以燒狗屎為末水服方寸匕酒服尤佳服人乳汁亦良飲生韭汁三升亦得治脯在黍米中毒方出聖惠方用面一兩鹽二撮以水一升煮服之良治食鬱肉漏脯毒方出肘後方以燒人屎灰酒服之方寸匕治食生脯過多筋痛悶絕煮細漿水粥以少鷹糞末攪和服三五合雞屎亦可治河豚毒等諸毒來安縣主薄李紘云丁未春度白塔寨有二卒一候兵同食河豚既醉燒子並食之遂皆中毒人急以告巡檢二卒以困殆倉卒無藥因令取麻油獨以麻油灌候兵者既多大吐毒物盡出腹間頓寬以此無恙治中河豚等諸毒用槐花不拘多少為細末如中諸毒每服三錢用河水調下井水亦得若能未食前先服尤妙六畜自死皆是遭疫有毒食之致洞下亦致堅積宜以丸利下解毒上急用濃煮香蘇飲汁一升中豬肉毒用壁土用水煎一錢服之又燒白扁豆末黃柏末並解中禽魚毒食鴆鳥毒生扁豆末溫水下又葛粉水調下又生螺肉並解食鮜毒生苦蕒嚼及擂水飲治河豚魚毒用白礬末湯點服河豚能殺人服此毒自消累用效治食版魚子毒方治誤食版魚子吐不止者用取魚尾草研汁服少許立止魚尾草又名樚木根形似黃荊八月間開紫花成穗葉似水楊無大樹經冬不凋漁人以藥魚治中山雞鷓鴣毒方南唐相馮延己苦腦中痛累日不減太醫令吳延紹密詰廚人曰相公平日嗜何物對曰多食山雞鷓鴣延紹曰吾得之矣投以甘豆湯而愈蓋山雞鷓鴣皆多食烏頭半夏故以此解毒勝金散槐花染坯上等分生為細末每服一錢汲井水調下常熟一家專貨此藥每服百錢藉之稍溫足錢倅叔儀家傳得之又方解鰻毒櫸樹皮或櫳木子或荅菜或冬青葉皆酒浸服又方解毒灰汁洗鐵漿菜等皆可服又方解龜毒以麻油炒砂焦熱帛裹縛熨之又方解蟹毒未破者醋炒石灰縛敷已破水調酒糟皆效服天門冬後食鯉魚中毒以浮萍解之解食牛馬肉毒腹痛吐利不止者出本草以麻鞋底水煮汁服之解食馬肝牛肉毒出本草以人乳汁合豉濃汁服之神效治食魚鱠腹中脹滿成瘕痛悶飲食不下日漸瘦出本草取水中石子數十枚火燒赤投五升水中各七遍取熱飲之如此三五度當利出瘕也中魚毒方虞侍郎蘇州人平生善食鱠中年病腹堅側身不得每發疼痛幾死累治不效一善醫者切脈曰侍郎右關脈伏伏為積聚生冷之積成瘕在腹則痛不可忍以取藥令用橄欖汁吞丸子藥數粒晚下利一盆許是魚鱠縷前一半皆成魚矣從此遂安治人食著諸毒肉吐血不止痿悴者出本草取胡蔥子洗煮使碎破取汁停冷服半升日一服夜一服血定止治人誤食鱠鮐肝而迷悶者方見解諸毒方治誤食水蛭水蛭即螞蝗出經驗良方用酒及土藍靛絞汁月頭初三四日空心服治誤吞蜈蚣出朱氏集驗方用生豬血令病人吃須臾生清油灌口中噁心蜈蚣滾在血中吐出繼與雄黃細研水調服愈昔有村店婦人因用火筒吹火不知筒中有蜈蚣藏焉用以吹火蜈蚣驚逆竄入喉中不覺下喉嚨求救人無措手適有人云可討小豬一個斷喉取血飲之治蛇蟲毒食飲中得之咽中如有物咽不下吐不出服馬兜鈴即出又服麝香一錢即吐蟲毒治食鱸魚肝鯸鮧魚中毒及食魚蟹毒上用蘆根銼煮汁一二升飲之又以蓬蒿濃煮汁服之佳治食蟹中毒以生藕汁服之或煮乾蒜汁或冬瓜汁服之並佳治飲食中毒及魚肉菜等用苦參三兩酒二升半煮取一升服吐愈梅師方用醋煎或取犀角煎一升亦佳治食蟹中毒以紫蘇煮汁飲之以子煮汁亦得蟹未經霜多毒治食魚中毒以鮫魚皮燒灰為末服之解食諸菜果蕈菌中毒附論朽木生蕈腐土生菌二者皆陰濕之地氣蒸郁所生也既非沖和所產性必有毒若誤食之令人吐利不已心腹切痛甚者身黑而死菜亦生於陰濕食之過多或與菌蕈同性有反惡悉能害人可不慎哉凡園圃所種之菜元本無毒但蕈菌之物皆是草變化所生出於樹者為蕈生於地者為菌並是濕氣鬱蒸變化所生有毒者人食遇此多至於死甚急速也其不死者猶能令人煩悶吐利時久始醒也方甘草散出聖惠方專治食諸菜菌蕈中毒甘草炙銼貝母胡粉各一兩上為散每服二錢泉水調下小兒尿乳汁共服二升亦好治食諸蕈並菌中毒方生薑切細四兩豆漿四兩麻油二兩半上和研勻楪盛甑上蒸一炊許時取出不拘時候時時服之諸毒立解治諸食中毒方童子小便人乳汁各半盞上和勻微煎過溫分二服連並服之又方雞毛燒灰一分雞屎燒灰一分上細研和勻每服一錢用豆漿水少許研酒下三服效治食諸菜中毒方用豆漿不拘多少逐漸量多少食之一方治食菜果中蛇毒以大麥酒浸汁半升服之妙又方出聖惠方專治食諸菜蕈菌中毒方並急躁發狂煩悶吐下欲死者上用雞屎燒灰碾為末每服半錢用好豆漿半匙細研和藥溫酒調下連三服立醒一方用水調一錢又方出醫方集成治食蕈並菌中毒致殺人者及療楓菌食之令人笑不止者並皆治之蓋菌種類不一往往蛇虺毒氣所熏蒸而成耳掘地作坑用新汲水投坑中攪之成濁混取出以絹濾過用瓷器盛每服時打轉飲一盞至三盞當效又食橄欖可解服諸吐利藥丸亦佳治食苦瓠中毒方出聖惠方用黍稂銼半升以水三升煮取一升時時服之一方用黍煮汁飲之葛根飲出聖惠方專治食諸菜中毒發狂煩悶吐下欲死者用葛根煮汁飲之又方出聖惠方專治菜果中毒以雞血和真鐵精丸如梧子大每服以溫水下一丸治食野菌毒方又方出千金方專治食山中樹中菌中毒並食楓樹上菌令人笑不止者取人屎服一升良煎魚魫汁服之即愈又用大豆汁飲之亦可治蕈毒欲死及治菌毒出百選方用石魚頭白水煮濃汁灌之即愈如無生者鯗頭亦得又方出經驗良方專治中蕈毒同菰毒用左纏藤梗煎汁服又治癰疽尤妙或敷或服皆良解菰子毒及解一切菌毒出危氏方用芫花生者為末每服一錢新汲水下以利即妙治食桃子傷方取桃樹間梟桃燒服之漸吐即愈解誤食菌中毒及芋毒方出肘後方以荸薺擂水服之一方用左纏藤取其葉生嚼吃並解一云種芋三年不收者成野芋故殺人也治食菹菜誤吞水蛭蛭藏血腸痛漸黃瘦者出肘後方飲羊牛熱血一二升許經一宿便暖豬脂一升飲之便下蛭食治食諸果中毒方出千金方用豬骨燒過為末水服方寸匕亦治馬肝漏脯等毒治食菜中毒發狂煩悶吐欲死方出聖惠方取雞毛燒為灰以水調服二錢瘥治食菜及果子中蛇毒方出聖惠方用黑豆末以酒漬取汁服之中萵菜毒方王順求云萵菜出園圃有毒百蟲不敢近蛇虺過其下誤觸之則目瞑不見物人有中其毒者惟生薑汁解之解果菜毒豆粉毒以杏仁細嚼冷水吞下荔枝毒泡鹽湯又蜜解瓜毒瓜皮湯解鹽湯亦可柑毒柑皮湯解鹽湯亦可解治中菰菌毒方以茱萸煎湯服吐下即解熟艾煮三五盞犬項下取熱血灌之雄雞血亦可中蕈毒方崇寧間蘇州太平山白雲寺五僧行山間得蕈一叢甚大摘而煮食之至夜發吐三人急用鴛鴦草生啖遂愈二人不肯啖吐至死此草藤蔓而生對開白花傍水依山處處有之治壅疽腫毒尤妙或服或敷今人皆謂之金銀花又曰老翁須本草名忍冬草解野菌毒北夢鎖言野菌毒人而笑者煎魚魫汁服僧光遠云夷堅志云急採鴛鴦草生啖之即愈中菌毒殺人者以防風三十枝銼碎以水煎候冷灌之立愈白水濃煮石首魚頭汁灌之無不愈食生梨葉解菌毒地漿飲三盞愈又多食橄欖愈治食野菌毒出本草以蓮葉蓮房水煮服之凡菜中有水莨菪葉圓而有光有毒誤食之令人狂亂狀若中風或吐甘草煮汁服之即解出本草麝香丸消瓜果水毒肉桂去粗皮人參去蘆頭半兩丁香一兩白茯苓去皮一兩甘草二兩炙青鹽二錢麝香二錢半別研乾木瓜四兩上件為細末次入麝香青鹽同研勻煉蜜為丸每兩作十五丸每服一丸細嚼新汲水下傷冷嘔吐生薑湯下治人食楓樹上生菌即冷笑不止出本草以土漿屎汁飲之愈蠱毒附論夫蠱毒千品種種不同或下鮮血或好臥暗室不欲光明或心性反常乍嗔乍喜或四肢沉重或百節痠疼如此種種狀貌說不可盡有得之三年乃死急者一月或百日即死其死皆於九孔中或於脅下肉中出去所以出門常須帶雄黃麝香神丹諸大辟惡藥則百蠱貓鬼狐貍老物精魅永不敢近養生之家須慮此俗有灸蠱法於心下捺便大炷灸一百壯並主貓鬼亦得愈又當在小指尖上灸三壯當有物出酒上得者有酒出飯食得者有飯出肉菜上得者有肉菜出即愈神驗皆於灸瘡上出凡人患積年之久大黑如漆或堅或薄或微赤者皆是蠱也凡人忽患下血以方藥治更增劇者此是中蠱也凡卒患血痢或赤或黑無有多少皆是蠱毒粗醫以斷痢藥處之大非也凡人中蠱毒似病人者若服藥知蠱主姓名當便呼喚將去若欲知蠱主姓名以敗鼓皮燒作末以飲服方寸匕須臾自呼蠱姓名可軀令去則愈又有以蛇蜒合作蠱藥著飲食中使人得瘕病此積一年乃使療之各自有藥江南山左間人有此不可不信之蠱之為毒醫書所載雖有數種而中土少見之今古所傳多是閩廣深山之人於端午日以蛇虺蜈蚣蝦蟆三物同器貯之聽其互相食啖候一物獨存者則謂之蠱欲害其人密取其毒置於酒食中使啖之若中毒者令人心腹絞痛如有蟲咬吐下血皆如爛肉若不即治食五臟即死然此毒中人有緩有急急者十數日便死緩者待以數月氣力羸敗食盡五臟而後死死則其毒流注於旁人亦成蠱注治療之法必須審而後行今人凡有積聚脹滿之病類乎蠱者便以為蠱尤為非也世說閩深山人專有以蠱行毒於人者若素知其姓名呼喚將去其病自愈又有一說病者若能知元中毒於何物之中終身不服此物其毒亦不變作又蠱毒千品種種不同有得三年方死有一月或百日乃死者其病症亦各有異或吐下鮮血或如臥暗室或心性反常乍嗔乍喜或四肢沉重痠痛緩與急皆有殊也其以五蠱推之有蛇蠱有蜥蜴有蜣螂有蝦蟆有草蠱若蛇蠱者面色青黃脈洪壯病發之時腹內熱悶胸脅支滿舌本脹強不喜言語身體常痛心腹似蟲行顏色赤唇口乾燥經年不治肝膈爛而死蜥蜴蠱者面色黃黑其脈浮滑而短病發之時腰背微痛手腳唇口皆習習而喉脈急舌上生瘡二百日不治啖人肝心盡爛下膿血羸瘦顏色枯黑而死蝦蟆蠱者面色青白其病發時咽喉塞不欲聞人語腹內呼鳴或上或下若天陰久雨而病轉劇皮肉如蟲行手腳煩熱嗜食咳唾膿血顏色乍白乍青腹內脹滿狀如蝦蟆若成蠱吐出成蝌蚪形是蝦蟆蠱經年不治啖人脾胃俱盡唇口裂而死蜣螂蠱者脈緩而散病發之時身體乍冷乍熱手腳煩疼吐逆無時小便黃赤腹內疼胸中痛顏色多青或吐出似蜣螂有足翅是蜣螂蠱經年不治啖人血脈枯盡即死欲試蠱與非當令病人唾於水內沉者是蠱浮者非也又云旦起取井花水未食前當令病人唾於水內唾如柱腳直下沉者是蠱毒沉散不至下者是草蠱毒又方含大豆若是蠱豆脹皮脫若非蠱豆不爛脫又云以鵠皮置病人臥下勿令知若病劇者是蠱又云取新生雞子煮熟去皮留黃白令完全日晚口含以齒微齧之勿令破作兩炊時夜吐瓦上著霜露內旦看大青是蠱毒也昔有人食新變鯉魚中毒病心腹痛心下硬發煩悶欲得水洗沃身體搖動如魚得水狀有人診云是蠱其家云野間相承無此毒不作蠱治遂死又身體弱自不可輕於濯江南有射工毒其色黑形如肉臠口中橫骨如角弓生溪間內或因兩潦逐水而入人家含沙射人之影得之寒熱悶亂頭目俱痛亦如中屍卒不能言又水毒蟲一名溪一名灑得之病狀與射工相若但有爛瘡為射工無瘡為溪灑特少異耳又沙蝨蟲細如疥蟲視不得見遇陰雨則行出草間著人身則鑽入皮里刺如針芒是三者為病朝輕暮劇皆能殺人以方術灸法灸之若治之不早變生飛蠱倏入患軀啖食五臟而死矣挑生之毒其類是乎挑生多於飲食過度凡魚肉果菜茶湯酒醋之中皆可挑毒以中人自嶺以南率多有此其候初覺胸腹作痛次則漸漸如刺十日生於腹中生則動矣治法胸痛則為生在上膈腹痛則為生在下膈如上膈者用膽礬半錢投入一盞熱茶之內候礬化通口服之少頃以雞翎攪刺喉中取吐在下膈者用川鬱金二錢末之米湯調下即瀉出惡物吐瀉以後以人參一分白朮茯苓倍之碎為粗末新汲水和入瓷瓶中慢火煨至半日每盞連口服日兩劑又廣山谷間有草曰胡蔓草亦曰斷腸草或以藥人急水吞之急死緩水吞之緩死又有取毒蛇殺之以草覆蛇汲水灑草數日菌生採取為末入酒毒人始亦無患後再飲酒毒發立死其俗淫婦多遇合北人情好雖稠不肯白歸陰以藥置食中與之還即叩之曰子某年來若從其說復以藥解之若過期不來則斃矣又貓鬼者云是老貍老野物之類變為死蜮而依附於人人畜事之猶如事蠱以毒害人其病狀心腹刺痛食人臟腑吐血痢血而死又野道者是無主之蠱也人有畜事蠱以毒害人為惡既積乃至死減絕其蠱則無所依止浮游田野道路之間有犯害人者其病發猶是蠱之狀但以其于田野道路得之故謂之道也方大金牙散治一切蠱毒百疰不祥醫所不治金牙鸛骨石膏斑蝥活草子胡燕屎白朮雷丸龍牙銅鏡鼻梔子仁乾漆龜甲鱉甲鬼督郵桃白皮大黃各四分桂心芍藥徐長卿羚羊角射干升麻鳶尾馬目毒公蜂房細辛乾薑芒硝田跂犀角甘草狼毒蜣螂龍膽狼牙雄黃真珠各三分芫花莽草射菵烏梅各一分蛇蛻皮一尺鐵精赤小豆一合研地膽樗雞芫菁各七枚桃奴巴豆各二枚上治下篩服一刀圭稍加二刀圭帶下闢百邪治九十九種一方有麝香無白朮紫參丸治蠱注百病癥瘕積聚骨肉酸削大小便不利卒忤遇惡風臚脹腹滿淋漓轉相注殫門盡戶延及男女外孫醫不能治者紫參人參半夏洗藜蘆代赭石桔梗白薇肉蓯蓉各三分石膏一分大黃一分牡蠣一分熬丹參一分蝦蟆炙灰巴豆七十枚去皮心熬烏頭炮四分狼毒七分附子炮五分上搗篩蜜丸如小豆大以米飲下一丸日三服老小以意加減人參丸治蠱注四肢浮腫肌膚消瘦咳逆腹大如水鼓漏泄人參紫參半夏湯炮七次去滑藜蘆炒代赭石研桔梗炒白薇肉蓯蓉酒浸切焙石膏碎牡蠣粉丹參各三分干蝦蟆灰狼毒炒附子炮裂去皮臍各一兩巴豆七十枚去皮心膜油上搗研為末煉蜜丸如梧桐子大每服一丸至三丸量虛實米飲下犀角丸治蠱毒百病腹暴痛飛屍惡氣腫犀角屑鬼臼屑桂心末羚羊角各四錢天雄莽草真珠雄黃各一兩貝母子五枚燒蜈蚣五節巴豆五十枚麝香射菵如雞子黃大一枚上為末合搗蜜丸如小豆服一丸含咽不知少增之卒得腹滿蜚屍服如大豆許二丸若惡氣腫以苦酒和塗上縫袋子盛藥系左臂闢不祥鬼疰蠱毒可以備急一方無天雄大黃空心米飲下一二丸北地太守酒治萬病蠱毒風氣寒熱方一名烏頭酒烏頭甘草芎藭黃芩桂心藜蘆附子各四兩白蘞桔梗半夏柏子仁前胡麥門冬各六兩上七月曲十斤秫米一斛如醞酒法藥以絹袋盛之沉於甕底酒熱去糟還取藥滓以青布袋盛沉著酒底泥頭秋七日夏五日冬十日空腹服一合日三服以之為度藥有小毒故以青布盛之斷勿中止二十日大有病出其狀如漆五十日病悉愈有婦人年五十被病連年腹中積聚冷熱不調時時切痛繞臍絞急上氣胸滿二十餘年服藥二七日所下三四次即愈又有女病編枯絕產服二十日吐黑物大如刀帶長三尺許即愈期年生子又有女人小得癲疾服十八日出血二升半愈有人被杖崩血內室臥著九年服藥十三日出黑血二三升愈有人耳聾十七年服三十五日鼻中出血三升耳中出黃水五升便愈古方云喜平二年北地太守臣光造上此主蠱毒有人中蠱毒者服無不愈極難瘥者不過二七所有效莫不備出曾有一女年四十餘歲偏枯羸瘦不能起枕長麻耳聾一無能聞兩手不收已經三年余為合之遂得平服如舊有人中蠱毒而先患風服茵芋酒多傷服此吐出蠱數十枚遂愈何況此酒何蠱不下也嘉其功效有異常方故具述焉保靈丹出直指方專治蠱毒諸毒一切藥毒朱氏方云往時蜀俗喜行毒而成都故事歲以天中重陽時開大慈寺多聚人物出百貨其間號名藥世者於是有人於窗隙間呼貨藥一聲識其意亟投以千錢乃從窗隙度藥一粒號解毒丸一粒可救一人命夫跡既叵測故時多疑神仙政和間祐陵以仁聖惠天下嘗即上清寶籙宮中之前新作雨亭左曰濟仁主給藥治病苦右曰輔正主符水除邪鬼因遂詔海內凡藥之治彰彰有聲者悉索方書而上之焉於是城都守監司奉命相共窮其狀乃得售解毒丸家蓋世世懼行毒者為仇害故匿其跡非有所謂神仙者既據方修治得其全即並藥奏御下殿中省上曰朕自施天子所服御以濟毋煩有司也繇是殿中省群醫諸司驗其藥則王氏博濟方之保靈丹爾當是時猶子行適領殿中監事故獨得其詳吳子南攜是藥嘗救兩人食胡蔓草毒得不死蓋不可不書硃砂研細一兩大山豆半兩雄黃黃丹麝香黃藥子續隨子生杵末各二錢半川巴豆肥者二錢半取肉不去油斑蝥二錢半去頭翅足糯米半炒半生用赤蜈蚣二條一炙一生上入乳缽研和用糯米稀糊丸如龍眼大陰乾瓷盒收每服一丸好茶清吞下不得嚼破須臾病人自覺心頭如拽斷皮條聲漸次毒物下或自口出或大便出嫩則是血老則成鱉或蜣螂雜諸帶命之物藥丸凝血並下以水洗淨收之可救三人如中蠱口噤即挑開如斡牙不開打落牙一兩枚下藥若蛇蠍蜈蚣諸毒以好醋磨敷患處立解服藥已效如知毒害之家不必究名訴知其毒再發不救瘥後更忌酒肉等食一月為軟飯可也或急用但擇吉日精潔修合不急宜用端午日重陽修合勿令雞犬婦人見之鮫魚皮散治諸蠱注氣變化無常鮫魚皮微炒犀角鎊麝香白龍骨丹砂研雄黃研蘘荷根鹿角俱鎊各一分蜈蚣炙去足一枚上除研外搗羅為散共和令勻每服二錢以溫酒調下日三服一方有椒一分乾薑一分貝子十枚雞舌香一分聖惠丸出直指方專治蠱毒心腹堅痛羸瘁骨立面目黃瘦硃砂研雄黃研細各七錢半藜蘆去蘆頭莽草微炙鬼臼去須各半兩肥巴豆肉十五枚去油麝香一錢斑蝥去翅足三錢糯米炒黃青色大蝦蟆一個燒存性研細末上細末煉蜜和搗五百杵丸如小豆大每五丸空心酒下少刻更吃粥一盞利出蟲蛇惡物若不吐利更服二丸必效一方無青大蝦蟆石刻方治蠱毒宋嘉祐中範吏部道為福州守日揭一方於石云凡中蠱毒無論代代近遠但煮一鴨卵插銀釵於內病者含之約一食頃取視釵卵俱黑即中毒也其方用五倍子二兩硫黃末一錢甘草二寸半生半炙丁香木香麝香米粉各少許糯米二十粒上用十分於瓶內煎七分候藥面生皺為熟絹濾去滓通口服病人平正仰臥令頭高覺腹中有物衝心者三即不得動若出一盆桶盛之鰇魚之類乃俟吐罷飲茶一盞瀉無妨旋煮白粥補忌生冷油膩鮓醬十日後服解毒丸三五丸經旬平復雄黃丸主蠱毒中藥欲死雄黃研硃砂研藜蘆炙馬目毒公巴豆去心皮炒各二分皂角炙去皮子二分莽草二分上搗篩以蜜丸如大豆許水服三丸當轉下先利清水次出蛇等當煩悶者依常法可用鴨羹補之忌生豬肉冷水及蘆筍貍肉妙治一切蠱毒邪妖鬼疰病者有進有退積聚堅結心痛如切齒不可坐臥及時行惡氣溫病風熱瘴氣相染滅門或時熱如痎癗咽喉腫塞不下飲食或煩滿短氣面目時赤或目中赤黃或乾嘔或吐逆或下赤白痢或熱氣如雲或欲狂走自殺或如見鬼或手足清冷或熱而飲冷水不知足或使手掇空或面目癰腫生瘡或耳聾目暗頭項背脊強不得屈伸或手足卒癢或百鬼惡疰孤魅走入皮痛無常處方出千金方麝香丹砂特生礜石馬目毒公馬齒礬雄黃各一兩巴豆九十粒青野葛三兩一方不用上為末別搗巴豆如膏合搗五千杵納蜜更搗一萬杵丸如小豆大強者服二丸弱者服一丸水下入腹云行四布通徹表裡即得安瘥如病在膈上吐膈下利皆蛇蟲五色諸毒熱水或不吐下便後漸除瘥萬蠱妖精狐貍鬼魅諸久痼癖塊皆消散在表汗出在裡直下忌名其藥故此方無名也七寶丸出直指方專治蠱毒敗鼓皮蠶蛻各燒存性刺蝟皮五倍子續隨子硃砂研雄黃研上等分為細末糯米稀粥糊丸桐子大每服七丸空心熱水下犀角散治中五蠱下血咽喉妨悶犀角三兩鎊蘘荷根四兩黃連去須二兩升麻三兩茜根一兩當歸切焙三兩羖羊角三寸炙焦上粗搗篩每服五錢以水一盞半煎七分去滓不拘時溫服一有苦參無茜根奪命丸一名太乙追命丹專治五蠱及惡氣心腹脹滿不時喘息心痛聚積及疝瘕宿食不消吐嘔噦寒熱瘰癧羖羊皮散治中蠱毒腹內堅如石面青黃小便淋瀝無常處肘後古今錄驗方俱云用鐵精烏雞肝和丸以酒服三丸再甚者不過十日千金用後方疑千金語羖羊皮方五寸犀角芍藥黃連牡丹各一兩蘘荷四兩半梔子仁七枚上㕮咀以水九升煮取三升分三服一方無芍藥牡丹梔子用苦參當歸蠱即出席云余與一人應時吐蜂兒數升則瘥一方有羖羊角無羖羊皮不拘時候溫服五蠱湯一名犀角散治諸蠱毒噎喉妨悶犀角三兩屑蘘荷根黃連絳草即茜根也當歸各三兩羖羊皮方二寸炙上以水七升煮服二升分三服忌豬肉冷水丹砂丸一名雄砂丸出百一選方專治蠱毒從酒食中著者辰砂別研雄黃五錢赤腳蜈蚣一條續隨子一兩麝香一分上為末糯米飲為丸雞頭大若覺中毒即以酒下一丸蛇蠍所螫醋磨塗之其藥端午日合妙丹砂丸出聖惠方治蠱毒雄黃別研硃砂別研各半兩藜蘆略炒鬼臼巴豆去心皮各一錢上為細末煉蜜和丸如豆大每服三錢空心煎薑湯送下當轉下惡物並蠱等如煩悶以鴨為羹食之皂莢散出聖惠方治蠱毒豬芽皂角一兩去里皮塗酥炙黃焦去子用木香半兩雄黃細研一錢天麻一兩當歸一分銼微炒上羅為散每服不論時以煎水調下一錢治人得藥雜蠱方出千金方斑蝥六枚桂心藜蘆各如指大釜月下土如彈子大上治篩水服一錢下蠱蛇蝦蟆蜣螂毒俱出化蠱丸一名如智丸專治諸般蠱痛硫黃研一兩木香密陀僧研三分附子炮製去皮臍別為末一兩上除附子別研外搗羅為末先將附子末用米醋一盞熬成膏入前藥末丸如桐子大每服十丸荊芥湯下空心食前服蠱化為水乃愈升麻湯出聖惠方專治初中蠱毒升麻桔梗炒栝蔞根各一兩上粗搗篩每服三錢以水一盞煎七分去滓不拘時服治蠱毒方令病人唾水中沉者宜用巴豆兩粒去臍尖心膜豆豉十七粒灶額上煤二錢一用釜底墨上同研細作一服以生甘草水調下或吐血或瀉血內有如蛇形及蛺蝶蜣螂蜘蛛螻蟻之類即效如有患者先令嚼大豆一合如口內覺豆腥即不是蠱毒若覺甘美便是蠱也速服此藥一方白蜜為丸甘草湯下一方飯為丸溫酒下一方滴水為丸如彈子大一丸新汲水磨下若毒在膈即吐出在腹即瀉下茅香湯下赤𦋺丸治五蠱下利去毒血芫花一升巴豆一百粒去心皮炒赤𦋺方一寸上搗篩更以蜜搗丸如胡豆大水服一丸如利不止以清粥汁止之不下小增之欲令陰除不令大下忌蘆筍狗肉桃白皮散出聖惠方專治蠱毒喉中如物齧咽之不下吐之不出或下鮮血漸漸羸瘦腹大食飲不下桃白皮五月五日採陰乾臨用去黑皮一兩半大戟銼炒斑蝥去翅足米炒各三分上搗羅為散每服一錢空心以清粥飲調下雖大困終不損人務吐盡良久食粥飲李饒州云若以酒中得則以酒服以食中得以食服之一分冷水調下夷堅志以米泔為丸忌雞犬婦人見治蠱毒方燕屎三合零陵香獨頭蒜十枚去皮上和搗為丸如桐子大每服三十丸水服蠱當隨利下而出礬茶散出濟生方專治中諸毒及挑生毒亦解藥蕈毒嚼黑豆不腥白礬味甘乃中毒之候晉礬建各等分上為末每服三錢新汲水調下得吐即效未吐再服若欲驗知是中蠱當令病人唾水中沉者是蠱不沉非也雄麝散出濟生方專治五種蠱毒雄黃末麝香各一匙上生羊肺如脂大以刀開納雄黃等末以肺裹吞之一方有雌黃末國老飲治蠱毒白礬末甘草末上等分清水調下或吐黑涎一兩碗或瀉亦驗兼治喉痹及嶺南啞瘴治草蠱術入人喉剌痛此術在西涼束西嶺南人多行此中毒甘草藍汁上搗羅甘草為末每服一錢以藍汁調下治草蠱毒入人咽喉刺痛及中蠱下血日夜不解欲死者方出千金方桔梗銼炒犀角鎊各一兩上搗羅為散每於食前以暖酒調下三錢即愈七日止當食豬脾補之東坡雄黃丸出直指方專治蠱毒及蛇獸毒雄黃明白礬生研等分上端午日研細熔黃臘為丸如桐子大每服七丸念藥王菩薩藥王菩薩七遍熟水送下蜜髓煎出聖惠方專治中蠱毒令人腹內堅痛面青黃瘦變無常候豬骨髓研五兩蜜一碗上同煎令熟分為十服三四服即瘥化毒丸出聖惠方專治蠱毒難愈喉中妨悶瘦瘁胡燕屎炒一合獨頭蒜五枚上同搗如膏丸如杏仁大每空腹以清粥飲下十丸至十五丸其蠱化作鮮血一方有零陵香馬兜鈴根湯出聖惠方專治五種蠱咽中有物咽吐不出悶亂不臥心熱不能食馬兜鈴一兩蘘荷半兩上粗搗篩每服三錢以水一盞煎至七分去滓不拘時候頓服其蠱並吐出一方單用馬兜鈴煎水服如要吐出蠱者用麝香溫水服之即出愈治蛇蠱方出千金方治蛇毒入菜果中食之得疾上用大豆末以酒漬絞取汁服半升治蠱方犯此病者小便不通用五六月間菜園內屎釭中隔宿新浸死蝦蟆大者以巴豆八粒乾葛甘遂各半兩於口上填入令盡用麻線縫合卻將兩片銅瓦合住兩頭用黃泥固濟柴炭煏透內藥焦乾為末不可太過微赤色為妙取出研末每服三錢酒下其病深於小便內下小兒加減服之已死人用硬物斡開口灌下仍用手揉其肚立效治挑生雷州民康材妻為蠻巫林公榮用雞肉挑生值商人楊一者善醫療與藥服之才食頃吐積肉一塊剖開筋膜中有生肉存已成雞形頭尾嘴翅悉具康因訴於州捕林至獄而呼楊生令具疾證用藥其略云凡吃魚肉瓜果湯茶皆可挑生初中覺胸腹稍痛明日漸加刺滿十日則物生能騰上胸痛沉下則腹痛漸瘦悴此是候也昔陳可大知肇慶府脅下忽腫起如生癰癤狀頃刻間大如碗識者云此中挑生毒也候五更以綠豆細嚼試若香甜則是已而果然乃用此方用升麻為末冷熟水調二大錢服之遂洞下瀉出腫即消續煎平胃散調補若在上膈即取之其法用熱茶一甌投膽礬半錢於中候丸化盡通口呷服良久以雞翎探喉中即吐出毒物在下膈即瀉之以米飲服鬱金末二錢毒則瀉下乃碾人參白朮末各半兩同無灰酒半升入甑內慢火熬半天許度酒熟取出即溫服之日一杯五日乃止然後飲食如故治蠱毒及金蠶蠱毒方令中毒者先以白礬末令嘗不覺澀而味甘次食黑豆不腥乃中毒也即濃煎石榴根皮飲之不下即吐出蟲皆活無不愈者李誨之云凡中毒以白礬茶芽搗為末冷水飲之又方用菖蒲末一味切焙乾為末以甘草煎湯調下不拘時以病退為度知府張叔潛云平生用此甚驗居官每施此藥治中一切藥食蠱毒用續隨子隨多少以熱湯送下毒隨大便利去商陸汁方治蠱毒用生商陸五兩洗細切用生薑半兩和搗取自然汁半盞五更初服之服了坐半時即睡去但不動即以茶一盞投得利以冷水洗手面便止煮韭白粥候冷吃三五度便安鷓鴣酒治瘴及蠱氣欲死者以鷓鴣合羊肉酒煮服之或單鷓鴣以酒服之神驗散治中蠱毒用相思子三七枚搗羅為散每服二錢空心以溫水調下服後欲吐且忍之如欲吐不可忍即吐其毒出少時以稀粥助之勿食豬肉輕者七日瘥治忽中蠱毒方出海上名方用白雞血不拘多少白鴨血亦得取灌口立解生漆丸出直指方專治蠱毒用正料平胃散用生漆和丸桐子大每服七十粒空腹溫酒下加至百粒蠶蛻散治蠱毒治蠱毒方用牡丹根搗為末服一錢每旦一服良溫酒調下治蠱毒出肘後方取白鸛肫用砂石磨水服胡荽根汁出肘後方治中蠱毒神驗用胡荽根一握先銼搗取自然汁半盞不拘時候服之其蠱立下和酒服亦佳治中蠱毒出肘後方用生玳瑁水磨濃汁飲服一盞即解治蠱毒咬用烏雌雞屎炒服之又方出聖惠方用土瓜根大如拇指長三寸切以酒半升漬一宿一服當吐下蠱亦名王瓜又方用王瓜根及葉搗絞汁服當吐下宜少進之有小毒故也檳榔散治諸蠱在臟腑久不瘥用檳榔銼半兩搗羅為散每服一錢至二錢以蔥蜜湯調下空心食前服馬兜鈴根湯出聖惠方專治五種蠱毒及草蠱術在西涼處及嶺南人若行此毒入人咽喉刺痛欲死者用馬兜鈴根一兩細銼以水一盞煎至七分去滓空服頓服即時吐蠱未吐再服以快為度一方用苗為散溫水調服一方用根搗末水服方寸匕瘥麝香散出聖惠方專治五種蠱毒蛇食飲中得之咽中如有物咽之不下吐之不出悶亂不得臥心熱不食用麝香研一錢分為二服以溫水空腹調下吐出蠱毒為效獨效飲出聖惠方專治蝦蟆蠱及蝌蚪蠱其病得之心腹脹滿口乾思水不能食悶亂大喘息氣急用車脂半升漸漸服之其蠱即出一方溫酒烊令熱漸漸服之車脂乃車中膏油也豬脂方出聖惠方專治蜣螂蠱得之胸中或哽噎怵怵如蟲行咳而有血咽喉臭氣出用豬脂半合服之其蠱即下或吐之自消也治一切毒方出肘後方取膽子礬為末用糯米糊丸如雞頭大以硃砂為衣空心服之冷水化一丸立瘥治諸蠱毒方用鰻鱺魚乾為末空腹食之三五度瘥一方燒炙之令香食尤佳鰻鱺魚有五色紋者良又方用黃栝蔞根乾者二兩搗以綿裹酒一升漬去渣溫服少時吐蠱出後煮粥一兩盞吐利即斷不斷煮人參甘草炙生薑各一兩服之又方出聖惠方用豬膽導下部至良一方以豬膽瀝納下部中以綿深導內塞之又方出肘後方用隱蔥草汁飲一二升此草桔梗苗人皆食之若蠱已食下部肚盡腸穿者取長股蝦蟆青背一枚雞骨一分燒為灰合內下部令深入犀角散出肘後方專療蠱狀如鬼氣者以犀角麝香雄黃為散每日空心及晚食前溫水調下一錢或帶此於身預防急用甚妙又方出肘後方用豬肝一具蜜一升共煎之分為二十服解毒散出肘後方治蠱毒薺苨湯出危氏方專治蠱毒凡毒多因假毒藥投之覺時宜煮大豆甘草薺苨汁飲之治飲食中蠱毒令人腹內堅痛面黃青筋露骨立病變無常用桑木心銼解著釜中以水淹之三升水煮取二升澄清微火煎一升宿勿食旦服五合則吐蠱毒出亦可治中蠱吐血肘後用棗木心鐵精丸出聖惠方專治食中有毒腹內堅痛兩目青黃瘦悴形露骨立病變無常用鐵精不拘多少搗羅為末研生雞肝和丸如桐子大曝乾每服五十丸至七十丸溫酒下鐵精乃煅灶中如綠紫色輕者為佳五蠱丸出醫方大成治蛇蠱蜣螂蠱蝦蟆蠱蝌蚪蟲草蠱含升麻咽汁妙一方治蟲蠱毒為末溪水調服治黃腫蠱氣通身黃者出聖惠方用瓜蒂焙乾細末三四錢每用半字於鼻孔中吹上日一度並吹三日如不愈後用黃芩末煎湯調下五錢治飛屍遊蠱著喉中氣欲絕者出聖惠方以鳶尾根削去皮納喉中磨病處令血出佳治百蠱不愈方出聖惠方上取鶉鴿熱血隨多少服之又方出聖惠方上取越燕頭血隨多少服之甘草湯出聖惠方專治凡畏患中蠱欲死上甘草半兩生用以水一大盞煎至五分頓服之當吐痰出若單要預防蠱者宜熟炙煮汁服即內消不吐神驗治中蠱心痛方以及欲呼蠱主姓名出肘後方上取敗鼓皮一片燒灰細研粥飲調服二錢病人須臾自當呼蠱主姓名可語便去則便愈亦有蛇蜒合作蠱毒著飲食中使人得瘕病此一種積年乃死療之各自有藥又蘘荷葉密著病人臥席下其病人即自呼蠱主姓名也一方水和服之令病人即喚蠱主姓名其蠱便瘥此證系被他人飲食中毒所有此病當令病人吐唾入水沉是浮者非也其蠱狀令人心腹切痛如有物咬或下血不即治之蝕人五臟盡則死矣寄生散出聖惠方專治中蠱毒令人腹內堅痛面目青黃形露骨立病變無常用桃樹上寄生搗羅為散每服三錢不拘時候如茶點服之萬病丸一名五蠱黃丸專治蠱注四肢浮腫肌膚消索咳逆腹大如水狀死後轉註家人相思丸出聖惠方專治貓鬼眼見貓貍及所雜聞相思一枚蓖麻一枚巴豆一枚去皮心硃砂二分蠟三錢上合搗令先取麻子許大含之即以灰圍患人前頭旋吐藥於灰中吐盡即止灰上作十字其貓皆死治中蠱毒用預知子根冬月採陰乾石臼內搗下篩凡中蛇毒則水煎三錢溫服立已又方出聖惠方用臘月豬脂小兒頭髮灰相和熱酒調下一錢療內脹病並蠱疰中惡等及蜂百毒溪毒射工雄黃真丹砂別研礬石熬各一兩生礬三兩半燒之鬼臼一兩半蜈蚣一枚赤足者少炙斑蝥去翅足附子炮各七枚龍膽五錢藜蘆七分炙杏仁四十枚去皮尖熬上搗篩蜜和搗千杵丸如豆大中惡邪氣飛屍遊走脹痛皆水服二丸若積聚堅結服四丸取利泄下蟲蛇五色若蛇疰病中惡邪飛屍遊走皆二三丸以二丸磨痛上若蛇蜂百病若中溪毒射工其服者視強弱大小及病輕重加減溫水服二丸治中蠱毒諸毒人有行蠱毒以病人者若中之當服藥如知蠱主姓名便呼取以去也凡診法中蠱狀令人心腹切痛如有物咬或吐下即治之不治蝕人五臟盡即死矣欲知是蠱當令病人吐在水沉者是浮者非也有以蟲蛇合作蠱入飲食中使人得瘕病此一種一年內治之可愈江南山間人有此不可不信之南方有蠱毒之鄉於他家飲食即以犀角搗滲之白沫竦起即知有無即無毒也解中蠱毒造蠱之家用毒有日如正月則用初一日二月二日三月三日四月四日五月五日六月六日七月七日八月八日九月九日十月十日十一月十一日十二月十二日延平有僧惠全者刊板以警悟人凡蠱毒各種皆治闢蠱毒取生玳瑁甲帶之凡遇飲食有毒則必搖動死者則不能神矣薛王鉏之南海海人獻生玳瑁者王令揭取上甲二月二繫於左臂欲闢毒甚被楚痛毒復發便養於宅後池河其揭處復生還遣送舊處無傷矣治草蠱其狀入咽刺痛痛欲死者以胞衣一具切曝乾為末熱水調下一錢最療蛇蠱蜣螂草毒等治蠱狀如蝸牛食下部癢取萹竹一把水二升煮熟五歲小兒服三五合隔宿食明早服之尤佳治蠱毒以茜根酒煎服治蠱用麥苗煮取汁細絹濾服之治蠱飛屍取象豆子中仁碎為粉微煮水服一二錢治蠱毒以陳思岌煮服之治蠱殺蟲以預知子去皮研服有效試蠱取椰子殼為酒器如酒中有毒則酒沸起解蠱毒以藍汁服之治中蠱及治下血如雞肝晝夜不絕臟腑敗壞待死以白蘘荷煮汁服並臥其葉即呼蠱主姓名搜神記云昔蔣士先得疾下血言中蠱家人密以蘘荷置其席忽然大笑曰蠱我者張小也乃收小小走此解蠱藥人多用之去蠱毒用苦𣅟苗子煮汁服之一方生搗絞汁服治飛屍遊蠱以蓼螺生食以姜醋進之彌佳治蟲蠱用向東者白蘘荷一把搗絞汁三升服之治蠱諸毒以千金藤煎服療中蠱毒手足不遂以人肝藤以清水磨一彈丸飲之不過三兩服諸蠱毒以猯胞干之湯磨如雞卵許空腹服之治蠱毒以榼藤子燒作灰為末酒調服之治蠱毒以千里及煮服之吐下治蠱毒取鹽麩子干搗為末食之治蠱毒中惡腹內不調者以海藥銼水煎服之海藥云出南海諸州根如烏圓小封生也治飛屍蠱毒以紫珠煮汁服之治中蠱毒蕈毒以頭垢用米飲或酒化下並得以吐為度治中蠱以蠱蟲燒為黑灰水少許下立愈按敗鼓皮注云服敗鼓皮即喚蠱主姓名又云古人遇筫盛造蟲圖富取百蟲甕中盛經年間開之必有一蟲盡食諸蟲即皆名為蠱能隱形似鬼神與人作禍然中是蠱鬼咬人至死者或從人諸竅中出信候取之曝乾用之廣南衛生方挑生胡蔓草胡蔓葉如茶其花黃而小凡一葉有百竅血漬人無復生廣西愚民私怒用以自斃家人覺之急以抱卵不生雞兒細研以麻油扶口灌之乃盡吐出惡物而蘇少遲不可救矣如人誤服此藥者止以前法解之治蠱毒甚佳用石垂子四月採焙乾生搗羅蜜丸服療蠱毒以故錦燒灰煮汁服治中藥煩蠱毒用山豆根不拘多少和水研服少許不止再服通大小便並瀉蠱毒以白商陸煎服得大蒜良治蠱毒中惡用鐺黑以酒或水細研溫服之療之豬蠱毒取預知子二枚綴衣頷上遇蟲毒物則聞其聲當便知之炒桃仁解山嵐氣及蠱毒法有驗桃仁一把茱萸一兩青鹽四兩如無食鹽亦得上用同桃仁炒黃熟了將桃仁茱萸鹽入於瓷罐內封閉一七日後取出除了茱萸鹽只將桃仁去皮尖後時時嚼三五顆祛山嵐毒氣曾經使有效或有去廣者兵士望施散與又方貝母末上每服半兩令病人盡其酒量劇飲良久酒化為水從傷處出候出盡又以貝母末塞瘡口妙不可加夷堅志云有病此者夢道人示頌似犬非犬似貓非貓烹而食之其病自消覺而有狐入其室殺而爛煮食之腹自消白氏六帖云青丘狐食之令人不蠱本草孟詵云狐補虛又主五臟邪氣蠱毒發寒熱萬病解毒圓治蠱毒挑生毒藥毒草毒畜獸毒文蛤即五倍子半兩山慈菇即金燈花根一兩洗焙全蠍五枚大山豆根續隨子取仁去油留性各兩半麝香一錢硃砂雄黃各三錢紅芽大戟洗焙七錢半上先以五味藥入木臼搗羅為末次研麝隨子硃砂雄黃夾和糯米糊丸作三十五丸端午七夕重陽臘日淨室修合每一丸生薑蜜水磨下並井水浸研敷所患處解毒收瘡收病神妙硃砂雄黃乃伏其毒第一用也一方無山豆根解蠱毒方昔有朝官與一高僧西遊道由山峽程途荒遠日過中餒甚小村舍間有食而勢必就之去住未定僧曰吾有神咒可無憂也僧閉目誦持食至俄見蜘蛛緣碗吻僧曰速殺之於是竟食無所損其咒曰姑蘇啄摩耶吾知蠱毒生四角父是穹窿母是舍耶汝眷屬百萬千吾今悉如汝摩挲薩婆訶時同行者競傳其所至無恙傳有解毒方用豆豉七枚巴豆去皮二粒上入百草霜一處研細滴水丸綠豆大以茅香湯吞下七丸檞皮湯治蠱毒用檞皮木北陰白皮一大握長五寸細銼以水三盞煎至一盞去滓溫服空腹頓服得吐即愈豆真圓治中蠱不深久之變為鬼瘧或中氣結邪或胸藏痰癖或口中血出或中惡或驚魘或邪入在裡或產婦胎衣不下或生馬刀腫癰處女經水不調女青二兩半蘭草白百合丹砂研各一兩犀角鎊馬先蒿皂角酥炙去皮子䕡茹各半兩巴豆十粒去皮心炒壓去油研上除別研外搗羅為末蜜為丸如綠豆大每服十丸夜半冷水送下治蠱毒方白鴿毛糞燒灰以粥飲服之二錢日三四服一方治急蠱飲調方寸匕愈治蠱毒用獨行根水煮三兩沸取汁服導引法治一切蠱毒以兩手著頭相叉坐地緩舒兩腳以兩手從外抱膝中曲低頭入兩膝間兩手交叉頭十二通愈蠱毒及三尸毒腰中大氣又云常度日月星辰清淨以雞鳴安身臥漱口三咽之調五臟殺蠱蟲令人長生治心腹病又云治百病邪蠱當正偃臥閉目閉氣內視丹田以鼻徐徐納氣令腹極滿徐徐以口吐之勿令有聲令入多出少以微為度存視五臟各如其形色又存胃中令鮮明潔白如素為之晨倦極汗出乃止以粉粉身摩捋形體汗不出而倦者亦可止明日復為之又當存作大雷電隆晃走入腹中為之不止病自除
