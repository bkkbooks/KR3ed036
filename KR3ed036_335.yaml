body:
  text: 卷三百三十五婦人諸疾門血氣心腹疼痛附論夫婦人血氣心痛者由臟腑虛弱血氣不調風冷邪氣乘於心也其痛發有死者有不死者成疹者心為諸臟之主而主於神其正經不可傷傷之痛者故痛發乍輕乍甚而成疹者也若心腹痛者服菩薩湯妊娠心腹忽痛若不急治則痛傷胞絡必致胎動與人參湯二氣丸若因産而心腹內痛者緣氣血俱虛臟腑未實飲冷食生寒氣與熱氣相感是以為痛不治則變痢菩薩湯加紅花主之方治婦人心痛脾疼用荔枝核灰存性為末淡醋湯下亦治男子小兒卒心痛蚌粉湯下沒藥散治婦人血氣壅滯攻心疼痛沒藥半兩當歸銼微炒赤芍藥牡丹皮桂心檳榔川大黃銼碎微炒牛膝去苗以上各一兩上為細散每服食前熱酒調下地黃散治婦人血氣刺心腹痛胸脅妨悶不欲飲食熟乾地黃當歸銼微炒木香乾漆搗碎炒令煙出白朮桂心枳殼麩炒微黃去瓤檳榔以上各三分上為細散每服食前以醋湯調下一錢烏藥散治婦人血氣攻心痛發歇不定烏藥莪朮桂心當歸炒桃仁青皮木香上為等分末每服二錢熱酒調下當歸散治婦人血氣刺心痛面無顏色四肢不和當歸銼微炒檳榔桂心蓬莪朮白朮各三分吳茱萸半兩湯浸七次焙乾微炒上為散每服三錢水一盞生薑半分煎至八分去滓不拘時候稍熱服木香散出聖惠方治婦人血氣心痛及蛔蟲疰心痛並主之木香赤芍藥各一兩鶴蝨一兩半當歸二兩銼微炒檳榔一兩伏龍肝半兩上為細散每服食前熱酒調下一錢九痛丸出危氏方治九種心痛一蟲痛二疰痛三風痛四悸痛五食痛六飲痛七冷痛八熱痛九往來痛此悉治之又治連年積冷流疰心胸疼痛並療冷氣衝上落馬墮車疼血等疾狼毒乾薑人參各一兩附子炮去皮用三兩吳茱萸炒一兩巴豆去皮心膜炒乾取一兩上為末煉蜜和丸如梧桐子大每服一丸空心溫酒下卒中惡心腹脹痛口乾不能言者服二丸立安當歸散出聖惠方治婦人血氣攻心疼痛及一切積冷氣痛當歸三分銼微炒吳茱萸一分湯浸七次焙微炒桂心三分上為細散每服食前以生薑熱酒調下一錢雞舌香散治男子婦人九種心痛一切冷氣良薑銼細麻油炒桂心赤芍藥等分上為末每服二錢水一盞入鹽木瓜三片同煎至七分溫服鹽湯點亦可血氣疝瘕痛用熱醋湯調下忌生冷與應痛散同不用桂心用醋煎湯點亦可牡丹丸出永類鈐方治婦人脾血積氣及心脾痛菖蒲丸出永類鈐方治婦人脾血積氣及心脾痛菖蒲九節者六兩吳茱萸炮香附子炒去毛各四兩上並銼細以酸醋五升煮乾為度焙乾為末以好神麯打糊為丸如梧桐子大每空心食前以淡薑湯吞下四五十丸日三橘皮湯亦好黑金散治婦人血氣心痛香附子半斤高良薑五兩五靈脂三兩上將香附子良薑以醋煮乾用灰炒為末酒下治婦人血氣衝心欲死者芫花三錢吳茱萸五兩上為末炒姜酒下丁香湯治婦人卒心痛用室女頭髮一團如雞子大燒灰入丁香七個同研細熱酒調下半錢治婦人久冷血氣攻心疼痛不止出聖惠方吳茱萸三兩桃仁一兩湯浸去皮尖上藥慢火同炒令熱即揀出茱萸不拘時候熱酒嚼下桃仁五枚靈苑花治婦人卒血氣心痛用生五靈脂為細末每服一錢沸溫服治血塊衝心叫喊其痛至危者如吃不得可灌下藥末用大順散三錢熱酒調服立止治血刺心痛婦人之疾用玄胡索不拘多少新瓦炒微黃不可焦碾為細末每服三錢酒一盞煎至七分服不能飲者陳米飲調下不拘時以酒調亦得二者不若酒煎快此藥屢驗王執中既效方玄胡索鹽炒乾蠍拌之醋湯下紫金散治婦人血氣刺心痛用紫金藤一兩米泔浸一宿焙乾為末每服二錢用鐵稱錘燒紅淬溫酒下治婦人血氣刺心痛不可忍用木香末酒服之不拘多少一方用青木香治婦人宿血氣心痛冷氣結聚用鬱金溫醋磨服之治婦人血氣心痛破痃癖冷氣又方出聖惠方治婦人久冷血氣攻心疼痛不止用取豉一團如雞子大以青布裹系定剪卻剩燒令煙盡勿使灰搗羅為散不計時候以熱酒調下二錢治暴心痛出錫銅鏡鼻類方用古鏡並燒酒淬服之治婦人急心痛出聖惠方用南康真蛤粉為末細炒赤以酒調熱服愈阿魏丸出聖惠方治婦人血氣攻心疼痛及一切積冷氣當歸炒桂心青皮附子炮白朮阿魏麵裹煨以熱為度川芎各一兩吳茱萸炮乾薑各三分檳榔肉豆蔻煨延胡索莪朮各一兩硃砂細研半兩上為末先以醋一升煎阿魏成膏和藥末搗三五百杵和丸如梧桐子大服二十丸食前溫酒下腹內疼痛用芽香煮服之換金丸出百選方治婦人諸虛不足心腹疼痛當歸沒藥玄胡索川芎藁本人參白茯苓牡丹皮甘草白芍藥白朮熟地黃白芷白薇各等分産寶方有桂心防風無熟地黃上為細末煉蜜和丸如彈子大服一丸酒送下琥珀散出聖惠方治婦人血氣上攻心腹痛經絡不利黃瘦虛羸琥珀細研麒麟竭木香沒藥桂心蕓薹子吳茱萸湯浸七次焙乾微炒各半兩延胡索當歸銼微炒牡丹各一兩麝香一錢細末青橘皮半兩湯浸去白瓤焙上為末細散入麝香研勻每於食前熱酒調下二錢大延胡索散出危氏方治婦人經病併産後腹痛或腹滿喘悶或癥瘕痞塊及一切心腹暴痛延胡索當歸赤芍藥荊三稜川楝子蓬莪朮官桂厚朴木香川芎各一分桔梗黃芩大黃各半兩甘草一兩檳榔二錢上為末每服三錢水一鍾煎至六分去滓熱服食前日三服惡物過多去大黃官桂加入黃藥子龍骨各半兩如前法平人心胃急痛如本方煎服得利尤良一方無川芎異功散出永類鈐方治婦人血冷氣痛心胸煩悶不思飲食四肢無力頭暈昏疼寒熱往來狀似勞倦並皆治之牡丹芍藥白芷乾薑各三錢當歸玄胡索陳皮去白官桂烏藥川芎苦梗各半兩上生為末每服二錢生薑三片酒水各半盞煎至七分溫服初生産時宜服此藥每日三服七日後漸減服數至一月滿永無疾病服藥後些少腹痛不妨幸勿嘈雜沉香活血丸治血氣不調臟腑積冷臍腹疼痛肌體日瘦沉香廣朮訶子去枚各一兩肉豆蔻丁香良薑各一兩麝香一分別研椒紅當歸白朮附子炮去皮各一兩上為末入麝香令勻酒糊為丸如梧桐子大每服三十丸溫酒下沒藥散出危氏方治一切血氣臍腹撮痛及産後惡露不行兒枕塊痛宜服血竭沒藥桂心當歸蒲黃紅花木香延胡索乾漆赤石脂各等分上等分為細末每服二錢熱酒調下食前若血塊衝心痛甚危者以大順散三錢熱酒調服立止五經湯出百一選方治婦人諸虛不足心腹疼痛熟乾地黃半兩人參桂心半夏湯洗七次白芍藥阿膠麥門冬各二錢半吳茱萸湯浸七次牡丹皮當歸各二錢半上為末每服三錢水一盞生薑五片煎至七分溫經湯有川芎甘草無熟乾地黃海藏當歸丸出濟生拔粹方治三陰受邪心臍少腹疼痛氣風等症四物湯各半兩防風獨活全蠍各半兩續斷一兩苦楝玄胡各七錢木香丁香茴香一兩炒上為細末酒糊丸如梧桐子大空心溫酒下三五十丸大效玄胡索湯出危氏方治婦人室女七情傷感遂使血與氣並心腹作痛或連腰脅或引腎背上下攻刺甚作搐搦經候不調但是一切血氣疼痛亦可服之當歸去蘆頭酒浸銼炒玄胡索炒去皮蒲黃赤芍藥官桂不見火各半兩片子薑黃洗乳香沒藥木香不見火各三錢甘草炙二錢半上㕮咀每服四錢水一盞半生薑七片煎至七分去滓食前溫服吐逆加半夏橘紅各半兩瑞金散治婦人血氣撮痛月經不行預先嘔吐疼痛及月信不通片子薑黃四兩牡丹皮莪朮紅花當歸赤芍藥川芎桂心延胡索各等分上為末每服二錢水一盞酒三分煎七分溫服日三次延胡索散治婦人血氣攻心腹疼痛延胡索當歸川芎桂心各三兩枳殼木香赤芍藥桃仁各半兩熟地黃一兩上㕮咀每服三錢水一盞姜三片煎至七分去滓溫服琥珀散治婦人血氣攻心腹燥煩悶亂疼痛不止及産後惡露不行兒枕塊痛琥珀沒藥當歸炒赤芍藥牡丹皮延胡索蒲黃莪朮桂心各等分上為末每服一錢溫酒調下一方加血竭紅花木香乾漆無丹皮琥珀莪朮等分紫金散治婦人血氣相搏心腹急痛一切疼痛不可忍當歸酒浸玄胡索川芎肉桂各半兩香附子烏藥紫荊皮各一兩木香煨甘草各一錢上為細末每服二錢熱酒點服立效霹靂酒下亦得烏雞煎治婦人一切血氣疼痛如神當歸川芎附子茯苓白朮赤芍藥白姜地黃官桂上各一兩為㕮咀用烏雞一隻去頭足肚將藥盛雞肚內用布袋盛之好酒醋各五升砂瓶煮剩下一盞留打糊為丸如梧桐子大每服三十丸溫酒鹽湯送下食前服八仙散治婦人血氣心腹疼痛立驗當歸厚朴芍藥枳殼制人參各四兩甘草茯苓各五分肉豆蔻二分上為末水二升煎取八合空心三服牡丹散治婦人久虛羸瘦血塊走疰心腹疼痛不思飲食牡丹皮桂心當歸延胡索各一兩莪朮牛膝赤芍藥荊三稜一兩半上為粗末每服三錢水一盞酒半盞煎七分溫服乳香散治婦人久冷血氣心腹疼痛乳香一分沒藥木香吳茱萸湯浸七次焙乾微炒硼砂細研各一分當歸銼微炒芎藭各三分桂心半兩上為細散每服食前熱酒調下一錢木香丸治婦人血氣心腹疼痛木香半兩肉豆蔻去殼川大黃銼碎微炒檳榔乾薑炮裂銼蓬莪朮香墨各一兩巴豆一分去皮心研紙裹壓去油上為末入巴豆同研令勻醋煮麵糊為丸如緑豆大每服於食前以溫酒下五丸粥飲下亦得神聖北庭丸治婦人積年血氣攻刺心腹痛不可忍者及多方醫療不瘥北庭去塵焙沒藥木香當歸各一分芫花蓬莪朮各半兩巴豆去皮心膜四十枚上先研北庭沒藥巴豆如粉用好醋三升同煎如稀膏然後將餘四味為細末入於膏內搗合成塊用新瓦合盛之臨時加減丸數用酒醋各半盞煎數沸通口服不得嚼破仍須吃盡酒醋立瘥或男子元氣不足亦依前方服食如急喉閉者男左女右以一丸鼻中嗅之立愈其中雲臨時加減丸數皆不云大小數目詳之古人亦鹵莽也既有北庭芫花巴豆合當丸如緑豆大每服只五丸沒藥丸治婦人血氣攻心腹疼痛經脈不調口乾燥沒藥半兩木香檳榔蓬莪朮縮砂細研當歸銼微炒各一兩硃砂半兩細研上為末用米醋熬縮砂成膏和丸如緑豆大不計時候以熱酒下十丸沒藥散治婦人血氣不利攻心腹疼痛沒藥當歸銼微炒琥珀桂心各一兩木香半兩芍藥三分麝香一分細研上為細散入麝香同研令勻每服熱酒調下二錢日三四服內灸丹治宮臟久冷中焦停寒心腹臍下疼痛肢節倦怠心悸怔忪食少噁心蓽茇桂心乾薑炮用舶上硫黃細研金叉石斛細銼酒浸各半兩附子炮去皮臍澤蘭葉各一兩上為細末麵糊為丸如梧桐子大煅過硃砂為衣每服三十丸至五十丸煎艾葉鹽湯空心下蓬莪朮丸治婦人久積血風冷氣經候不調心腹疼痛蓬莪朮一兩牛膝去苗沒藥當歸銼微炒木香桂心各三分硼砂一兩別研上為末用酸醋煎硼砂成膏入藥末和丸如梧桐子大每服食前以熱酒下十丸紅花丸治腹中血氣刺痛月事不通用紅花子一升為末以好酒一升八合拌了曝乾再為末用蜜和丸如梧桐子大空心酒下四十丸一方為散每服三錢空心溫酒服治女子婦人患血氣腹腫痛用山豆根為末三錢熱酒下空心服之軟金花丸治胸心腰腹急痛或淋瀝併産前後經病刺痛血氣勞傷往來寒熱四肢困倦夜多盜汗者兼治血積食積當歸半兩焙乾漆生用巴豆去殼各二錢斑蝥生全用輕粉硼砂粉霜各一錢上為末同研細棗肉為膏旋丸如緑豆大每服一丸新汲水下病甚者加服看虛實治婦人血氣刺痛大小腹痛並血脈不調走疰疼痛並皆治之川當歸白芍藥各一兩香附子半斤炒去毛山慈菰二兩熟地黃二兩甘草一兩上㕮咀每服三錢水一盞烏梅一個荊芥少許同煎七分空心溫服如腹中疼痛不止者加阿膠二片同煎服立效蘇沉麝香丸治諸血氣痛不可忍血竭沒藥沉香辰砂各一分木香麝香各半分上生為末瓷器熬生甘草膏丸如皂子大每一丸姜鹽湯嚼下産後血痛氣痛並主之亦治脾痛硼砂丸治婦人血氣攻心腹疼痛宜服此藥行藥脈利氣血神效硼砂水銀琥珀硃砂麝香硫黃各一兩上以硫黃結成砂子都研令極細用酒煎狗膽一枚為膏和丸如梧桐子大每服溫酒下五丸加減四物湯治婦人血氣不足肢體乏力或瘀血腹痛或下血過多當歸川芎芍藥乾薑炒各半兩南木香甘草炒各二錢半上㕮咀銼散每服三錢食前煎服若腹不痛則無瘀血更加人參又能益其血也治婦人血氣撮痛蕓薹子隔紙炒半兩沒藥三錢赤芍藥當歸莪朮各一兩上為末每服二錢熱酒調下沉香散治婦人一切血氣刺痛不可忍者及男子冷氣痛並治之沉香木香當歸白茯苓白芍藥各一錢上㕮咀每服一錢水三盞於銀石器內不用銅鐵器文武火煎數沸入全陳皮一個又煎十數沸入好醋一盞又煎十數沸入乳香沒藥如皂角子大一塊同煎至一盞去滓通口服不拘時候菩薩湯治産後胎前心腹痛木香不見火半兩桂枝不見火七錢半當歸三錢酒浸去蘆赤芍藥半兩甘草二錢半上㕮咀每服三錢水酒各半盞煎七分熱服不拘時候牡丹煎丸治婦人血膈牡丹苦參貝母去心玄胡索白芍藥上等分為末煉蜜和丸如梧桐子大每服十五二十丸米飲吞下無時候烏藥散治婦人血氣上攻心腹疼痛不可忍神情悶亂烏藥木香桂心青橘皮湯浸去白瓤焙蓬莪朮以上各二兩上為細末散每服生薑半兩拍碎黑豆半合同炒令豆熟入童便一盞煎五二沸濾去滓調下蕓薹子丸治婦人血氣痛不可忍蕓薹子紅花五靈脂延胡索各半兩三稜莪朮各一兩上為末每服二錢熱酒調下當歸丸治婦人血氣不和心腹疼痛當歸二兩微炒硼砂一兩別研桂心沒藥各一兩蓬莪朮二兩上為末用好酒醋一大盞銀器內慢火熬硼砂成膏入藥末和丸如梧桐子大每日空心及晚食前以醋湯調下十丸沒藥散治婦人血氣疼痛不可忍者紅花沒藥當歸延胡索炒上等分為末每服二錢童便酒水各半盞同煎至六分熱服只用稱錘淬過調亦可常服溫酒調下二錢亦治月經欲來前後腹中痛手拈散治婦人血氣刺痛不可忍者亦治諸般氣痛草果煨玄胡索炒五靈脂揀去砂石炒各一兩沒藥五錢上為末酒調二三錢服治婦人血氣腹痛經候或多或少蔓荊子香附子杏子晚蠶砂各等分上㕮咀炒焦酒淬去滓服未愈再服即愈菖蒲散治婦人血氣痛石菖蒲良薑桂心各一兩香附子二兩上為末熱湯調下二錢治婦人血氣腹內滿以草蒿秋冬用子夏春用苗並搗絞汁服或曝乾為末小便沖服如覺冷用酒煮服破經湯治婦人血氣不行臍腹疼痛巴豆七個苦葶藶三錢皂角二錢上為末煉蜜和丸如彈子大每服一丸先用麻絲纏部定坐一夜不行再一丸如覺寒熱取下赤白水再用一丸取一行一方不用皂角後四物湯補之抽刀散治婦人一切冷氣血痛大川烏頭炮去皮炒黃色一兩五靈脂蕓薹子隔紙炒良薑各半兩上為末酒醋各半盞煎至七分溫服治婦人室女血氣刺痛不可忍日夜叫喚可憐者一服見效蕓薹子肉桂良薑沒藥各等分上干焙為末每服二錢乳香調下熱服不拘時候延胡索散治婦人血氣走注疼痛不可忍及月水不利面色萎黃吃食減少及産後諸疾皆治之延胡索三稜生當歸酒浸去蘆頭莪朮醋浸少時等分上為末每服二錢空心溫酒調下如血氣發盛者及月水不調並用童子小便酒紅花同煎調下只三服瘥矣或後用黃散子化通真珠丸一丸服之滿月百病不生當歸良薑散補養血氣去心腹疼痛脅脹滿經絡不調或帶下赤白腰腳疼痛一切痼病高良薑五兩當歸桂去皮各三兩厚朴去皮薑製二兩上乾用紗羅子羅每服二錢水一盞入艾十葉同煎至七分去滓食前熱服之小烏沉湯調中快氣治心腹刺痛烏藥一兩去皮甘草一分香附子砂盆內漸去皮毛焙乾去瓤二兩上為細末每服一錢鹽湯點不拘時候金不換散治婦人血氣刺痛不可忍者三稜莪朮並細研巴豆去皮各一兩上以酸醋一碗熬醋成膏為度先將糠固濟一罐子陰乾後將藥並醋膏一處置罐子中外用泥裹以平瓦子一片蓋之用炭火五七遍煅常看守卻候煙急出即取出看通黑則止不得燒過了便入乳鉢內細研為末有患者炒生薑酒調一錢服之八仙散治婦人血氣心腹疼痛立驗棕櫚二兩當歸一兩並銼碎一處燒成炭細研麝香一錢細研上同研令勻每服一錢溫酒調下三神丸治室女血氣相搏腹中刺痛引心端經行澀少或經事不調以致疼痛橘皮二兩玄胡索醋煮去皮當歸去蘆酒浸銼炒各一兩上為細末酒煮米糊為丸如梧桐子大每服七十丸加至一百丸空心艾湯下米飲亦得拈痛散治婦人血氣痛玄胡索一兩當歸桂心各半兩上為末酒調二錢不拘時候蠲痛散治婦人血氣刺痛荔枝核燒存性半兩香附子去毛炒一兩上為細末鹽湯米飲調下二錢不拘時候治婦人血氣痛遊走及腰痛莪朮切片乾漆研碎各二兩上同炒令漆焦香取出漆不用只用莪朮為末溫酒調下三錢腰痛胡桃酒下遊走痛冷水調下治婦人血氣刺痛用香附子一二斗皆可舂令極淨用砂罐盛米醋煮令極久一日夜取出炒乾為末一兩用甘草三錢為末鹽湯任下亦治血崩不止治婦人血氣刺痛神麯香附子各炒赤上等分為末熱酒下治老婦血氣痛不可忍老松皮用醋煮乾延胡索上為末稱錘燒紅淬酒調下二神丸治婦人血氣不和疼痛不止及下血無時月水不調宜服一名蓽茇丸真蒲黃炒蓽茇鹽炒上等分為末煉蜜和丸如