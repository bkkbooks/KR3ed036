蟲三個去翅足炒川烏頭七分銼大蒜大椒柴胡七分銼羌活全蠍升麻各一分破故紙各一錢三奈子三分蓽茇焙半兩甘草二分炙枯礬半兩細研炒黃鹽一錢必用之藥上為極細末煉蜜和丸如指尖大用綿裹定留絲納陰戶中覺臍下暖為度玄胡苦楝湯治臍下冷撮痛陰中大寒肉桂三分研熟地黃附子三分切片甘草梢炙半錢苦楝二分搗黃柏一分研上都作一服水四大盞煎依前服桂香散治婦人脾血久冷時作腹痛泄瀉草豆蔻去皮炒甘草白朮良薑炒香砂仁各一兩淨青皮炒訶子肉各半兩肉桂生薑厚朴制棗肉各一兩上水一碗爛煮令乾同研作餅焙為末每服二錢入鹽少許空心沸湯點服金耆散治婦人小腹急痛脹滿金銀花黃耆甘草地黃芍藥當歸上各等分為末每服五錢重水煎服又方治腹中絞痛不可忍延胡索當歸白芍藥川芎乾薑各等分上為末每服三錢溫酒調下治婦人小腹疼青黑或赤不能喘息以苦參一兩醋一升半煎八合分二服血分水分腫滿附論夫身腫者有血分有水分之候腎合膀胱為表裡腎主水而膀胱為津液體虛而風濕客於皮膚轉於膀胱津液壅滯腎水停積蓋脾土虛而不能榮衛故流入於血也但腫疼退經血自行也血分者經先閉而後腫是血分而為水也經通而腫自消其外候日驗裹如臥蠶頸邊人迎脈動甚也其妊娠體腫者脾胃虛弱肌肉不實則水浸積而為腫腹滿如蠱者水積於胞也則懷胎將産之月腳腫産下自愈不必治也産後身腫者亡血損多風邪襲於氣分故身腫又宜與三物湯治之佳夫婦人腫滿若先因經水月信絶後至四肢浮腫小便不通名曰血分水分化為血血不通則化為水矣宜椒仁丸先因小便不利後身面浮腫致經水不通名曰水分宜服葶藶丸方後見夫血分者經水流通之際寒濕傷其衝任為之中止氣壅不行播在皮膚邪氣相搏經血分而為水發為跗腫血分脈經曰經水前斷後病水者名為血分積久成水腫難治夫水分者以水氣上下溢於皮膚分散四末發為跗腫蓋腎者胃之關關門不利故聚水而從其類也此病與血分治藥有先後耳方椒仁丸治婦人血分水分腫滿椒仁甘遂續隨子去皮研附子郁李仁黑牽牛五靈脂碎研當歸吳茱萸延胡索各半兩芫花醋浸一宿炒黃石膏各一兩信砒膽礬各一分斑蝥糯米炒黃去米不用蚖青各三十枚去頭足翅糯米炒黃上為細末麵糊為丸如雞豆大每服一丸橘皮湯下大黃甘遂湯治婦人小腹滿脹如鼓小便微難而不渴産後者此為水與血並結在血室也大黃四兩半甘遂阿膠各二兩上以水三升煮取一升頓服之其血水當下治婦人小便艱澀産後淋瀝其效如神澤瀉防己各等分上為末每服二錢溫酒調下不拘時候漢防己散治婦人血分四肢浮腫喘促小便不利漢防己當歸身微炒赤芍藥桂心羚羊角屑青橘皮湯浸去白瓤焙各半兩赤茯苓大腹皮銼前胡去蘆頭木通各炒二分桑根白皮銼檳榔川大黃銼碎微炒各一兩上為散每服四錢水一中盞煎至八分去滓食前溫服枳實散治婦人血分身體浮腫心腹煩滿枳實去瓤麩炒當歸身切炒牛膝去苗酒浸切焙桑根白皮銼各一兩大黃略炒牡丹皮甘草各半兩防己三分人參豬苓去黑心青橘皮去白炒各一兩檳榔銼木香炮各半兩上為細散每服沸湯點服通口吃日再服大腹散治婦人血分身體通腫虛煩不食大腹皮銼桑根白皮銼檳榔銼各一兩當歸二兩切焙牡丹皮甘遂各半兩葶藶一分炒牛膝去苗酒浸切焙赤茯苓去黑心皮生乾地黃焙各一兩人參木香各半兩上為細散每服二錢濃煎紫蘇湯調下日三服檳榔湯治婦人血分攻頭面身體浮腫煩熱心悶檳榔銼赤芍藥人參百合各半兩知母焙一分木香半兩枳殼去瓤麩炒牛膝銼赤茯苓去黑皮各三分郁李仁去皮尖雙仁丹參去心牽牛子炒各半兩上粗搗篩每服三錢水一盞煎至七分去滓溫服日二夜一羚羊角散治婦人經水先斷後病水名曰血分身體浮腫煩悶宜服羚羊角桂去粗皮甘草苦葶藶紙上炒木香郁李仁炒去皮尖各半兩青橘皮去白炒檳榔銼當歸切焙牡丹皮赤芍藥各一兩上為細末每服二錢濃煎桑根白皮湯候溫調下不拘時候青橘皮散治婦人經水才斷後輒病水四肢浮腫青橘皮去白炒大戟去皮白茯苓去黑心皮枳殼去瓤麩炒當歸切焙黃耆銼各一兩甘遂炒桂去粗皮各一兩牛膝去苗酒浸切焙一兩人參三分上為細散每服二錢濃煎桑根白皮湯調下日再服赤茯苓散治婦人血分腹脅膨脹四肢浮腫肩背壅悶赤茯苓三分川大黃二兩銼碎微炒鱉甲一兩塗醋炙令黃赤芍藥三分桂心半兩檳榔一兩桑根白皮三分銼枳殼半兩麩炒微黃去瓤郁李仁一兩湯浸去皮微炒牽牛子二兩微炒上為散每服四錢水一中盞入生薑半分同煎至六分去滓食前溫服澤漆丸治婦人血分通身浮腫胸膈不利腹脅脹悶喘息氣粗不能飲食澤漆葶藶桑根白皮炙銼甘遂銼炒令黃牽牛子各一兩生用昆布湯洗去咸炙三分檳榔銼一兩郁李仁湯浸去皮尖微炒研一兩枳實去瓤麩炒微黃三分上除郁李仁搗羅為末入郁李仁再和勻煉蜜為丸如梧桐子大每服十丸煎紫蘇湯下食前服溫酒亦得芍藥湯治婦人血分頭面浮腫胸脅妨悶四肢煩疼經絡不通赤芍藥一分半桃仁湯浸去皮尖雙仁麩炒微黃銼研枳實去瓤麩炒百合當歸銼微炒赤茯苓去黑皮牽牛子微炒檳榔銼各一兩上粗搗篩每服四錢水一盞半入生薑半分切同煎至八分去滓空心溫服逐日以利為效未利再服大戟散治婦人血分心腹脹滿手足浮腫肩疼痛大戟當歸銼微炒各三分芫花半兩醋拌炒令乾青橘皮三分湯浸去白瓤焙川大黃半兩銼碎微炒豬苓三分去黑皮赤芍藥一分桃仁三分湯浸去皮尖雙仁麩炒微黃上為細末每服一錢食前溫酒調下郁李