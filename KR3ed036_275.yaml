body:
  text: 卷二百七十五諸瘡腫門諸瘡水毒焮腫附論內經謂濕傷肉以脾主肌肉而惡濕也諸瘡未合或中於水則水毒發腫能為焮痛膿潰不止是為濕傷肌肉治宜敷藥使水盡出則肌肉溫平瘡可愈方亂髮熏方治諸瘡水毒或中風反張腫入腋者殺人亂髮雞糞二兩大麻子三兩黑豆三兩青布一尺以蠟二兩於火上攤令盡上以發散青布蠟上次摻雞屎麻豆等令勻卷如餅纏縛之以筒瓦一個仰慢火上安藥復以一瓦覆定塞一頭一頭令煙出於煙上熏之瘡中即黃水出煙盡乃止或汗出勿見風熏訖余蠟滴瘡口內良效追風散治諸瘡水毒腫痛不止真炭灰四兩豬膽一枚蛤粉二兩上羅細灰以紙一幅鋪地上攤灰可兩指厚取豬膽汁傾灰上經宿取濕者灰烘乾入蛤粉同研勻每用少許摻瘡上如瘡口合者以針挑破摻之水即出包子散治水毒入瘡腫痛或入刺骨者皂莢子不蛀者七枚上用坩堝入藥在內瓦蓋鍋口慢火燒煙盡取出研細每用藥先以溫漿水洗瘡口拭乾摻藥次以別膏藥貼之寸金散治一切瘡或外傷肌肉水作膿焮腫久不瘥蝦蟆自死者新磚等分上搗末捏作餅子爆干為細散摻瘡口上即撮出毒水盡以別藥敷貼鉛丹散治破傷水入腫潰不愈鉛丹蛤粉等分上同炒令變色摻瘡口上水即出烏梅散治諸瘡水毒腫痛烏梅皂莢子等分上各燒存性研勻貼瘡上毒汁即出烏犀膏治皂莢水及惡水入瘡熱痛不止皂莢子燒存性一分沙糖半兩上先研皂莢子灰令細續入沙糖和勻如膏貼瘡上胡粉塗方治諸瘡中水毒攻腫胡粉石灰研羅各三兩上煉豬脂調如糊塗瘡上水即出一方用炭白灰天雄散治一切水毒入瘡腫及驢涎馬汗以天雄去皮用瓷瓦刮細末貼瘡口治瘡水毒及竹籤刺癰疽熱毒等方以糯米三升入瓷盆內於端午前四十五日以冷水浸之一日兩度換水換時輕淘闢去水勿令攪碎浸至端午日取出爆干生絹袋盛挂通風處每用旋取少許炒令焦為散冷水調如膏藥隨大小裹定瘡口外以絹帛包縛候瘡愈解去若金瘡誤沾生水瘡口作膿漸甚者急以藥膏裹定良久其腫處即消更不作腫直至瘡合若癰疽毒瘡初發才覺焮腫赤熱急以此藥貼之一夜便消喉閉及咽喉腫痛脫腮並用藥貼項下及腫處若竹籤刺入肉者臨臥貼之明日揭看其刺出在藥上若貼腫毒干即換之常令濕為妙惟金瘡及水毒不可換恐傷動瘡口治凡八九月中刺傷手足因犯惡露腫殺人不可輕視須用此藥以生桑枝三枚納煻灰中捱引令極熱斫斷正以枝頭拄瘡口上熱即盡易之盡三枝則瘡自爛又方仍取薤白搗綿裹著熱灰中使極熱去綿以薤白敷瘡上以布帛急裹之若有腫者便須用薤白最佳小品云並納坐鹽良亦可搗作餅子以艾灸之使熱氣透瘡治刺傷中風水方以黑牛熱屎一服二升三服即止又方出千金方以蠟一兩熱炙尉敷裹上令水出愈又方出千金方以魚目燒灰敷之又方出千金方以熱煮韭拓之良又方出千金方以刮箭羽下漆塗於患處治入水手足腫痛方出儒門事親以生胡麻搗爛敷之治諸瘡水毒腫方以生白礬末水調塗之自消治中寒露水入手瘡痛不可忍方出肘後方以鹽數合著瘡上裹之火灸令熱氣透瘡又以蠟入竹管內插熱灰中令蠟熔滴入瘡口立愈若無鹽熏單用蠟亦可百一選方云吳尚書家婢因浣衣手中水毒晝夜叫喚用此愈針頭散出肘後方治瘡瘍焮腫木硬上用蟾酥麝香各一錢研細以兒乳汁調和泥入瓷合內盛幹不妨每用以唾津調撥少許於腫處更以藥敷之毒氣自出不能為瘡雖有瘡亦輕也治瘡腫因中水及中風寒所作其腫入腹則殺人方出肘後方多以桑灰淋汁漬冷復易之取愈當令熱神祕若已中水及惡露風寒腫痛方出肘後方用蒲黃敗青布於小口器中燒以熏之瘡汁出盡則愈療瘡中風水神效方出肘後方取干竹三指大節疏者佳每於節間截斷中間勿留節令得長三二尺總六七枚燒一頭令起煙以一頭掩瘡孔上瘡得煙燻又兼火氣壯風水悉出疼痛即止可盡四五枚令水出盡則上熔蠟灌瘡中帛裹仍慎風水即瘥若燃竹難著可側瘡低以頭就火中燃之竹短瘡熱痛更換竹頭用之則可神驗治瘡腫因中水及風寒所作其腫入腹則殺人方出肘後方燒黍瓤若馬牛干屎桑條輩多煙之物作炕中燒之以板掩坎上穿板作小孔即以瘡口當孔熏之令瘡汁出盡乃止又灌熱蠟於瘡中瘥治生瘡因入湯成毒膿出或赤腫者方出百一選方以淡豆豉不拘多少手內碾為膏子捏作餅敷貼之以片帛裹定膿即止未有頭以米醋調塗腳面傷手瘡因水入作腫用耳塞敷之療瘡中風方出肘後方用煎鹽令花出以物取鹽稍瀝去水及熱安瘡上取瘥良一周時著鹽勿住手鹽厚即撥卻瘡上厚薄留鹽三分更著鹽在上不住手按搽令調暢瘡略愈再以葒草作湯浸之治水中爛瘡皮皸方出本草用含水藤葉搗敷之治手足水爛瘡方出本草以占斯煎湯洗之一切惡瘡附論內經云諸瘡瘍皆屬心諸濕腫皆屬脾蓋心主血脾主肉也由體虛受於風濕邪毒與氣血相搏故發瘡也甚者焮腫滿痛潰而多汁或形體為之壯熱稽緩不治則毒氣內攻固不可以常法治之夫體虛受風熱濕毒之氣則生瘡癢痛焮腫多汁壯熱謂之惡瘡而濕毒氣盛體外虛內熱其瘡漸增經久不瘥故為久患惡瘡夫無名瘡者非癰非疽非疥狀如惡瘡或瘥或劇人不能名故無名瘡也此亦是風熱搏於血氣所生也方烏膏出聖惠方治諸惡瘡雄黃細研雌黃細研芎藭升麻烏頭防己竹灰黃連去須黃柏水銀各二兩胡粉一分與水銀研令星盡蠟三兩杏仁三十枚湯浸去皮尖巴豆二十枚去皮心松脂亂髮各一雞子大上㕮咀以酒一盞拌一時久安鐺於火上先取煉了豬膏三升煎發令消下諸藥以文火煎攪候杏仁黃色以綿濾去滓入研了真珠末三錢雄黃胡粉等攪令相得收瓷盒中每日二三塗之凡用膏先淨洗瘡拭乾敷訖以赤石脂黃連散粉之千金翼方無竹灰水銀蠟一方無防己水調膏治一切惡瘡腫毒疼痛黃連黃柏黃芩鬱金大黃梔子白芥子烏魚骨地龍白殭蠶密陀僧白芨各二兩寒食麵二兩木鱉子仁盆硝各半兩上為細末新泔水調如膏攤江箔紙上貼瘡上痛立止發背惡瘡大者一日一換五日後大效黃水儘自瘥勿疑連翹飲出危氏方治諸惡瘡紅赤痛癢不定心煩口乾及婦人血風紅斑圓點開爛成瘡癢痛流黃水汁當歸荊芥黃芩粉草木通生乾地黃栝蔞根麥門冬瞿麥連翹赤芍藥防風牛蒡子炒川芎梔子各等分上為銼散每服四錢水一盞半燈心二莖煎不以時服救苦散治一切惡瘡硃砂一錢紅娘子二個斑蝥六個雄黃一錢沒藥一錢金腳信一錢細研南乳香半錢海馬一對輕粉一錢腦子一錢密陀僧二錢另研蜈蚣一對麝香五分水蛭四個黃連一錢上為細末與密陀僧蒸餅乳汁為丸如疔瘡作小尖錠子若瘡口大捏作餅子紝於瘡內立效烏金散治一切惡瘡附子蛇蛻皮乾薑故紙多年者黃丹川大黃重臺即玄參藜蘆檳榔舊綿絮亂髮胡粉蓼葉榆皮楸皮以上各一兩上藥並細銼入瓷瓶中固濟燒令熱取出搗羅為末入麝香龍腦各一分更於乳鉢中細研先以甘草一兩捶蔥七莖白礬五錢以水二升煎取一升看冷暖洗淨瘡後干貼日再貼之五香連翹湯療惡瘡熱毒腫恐惡毒氣入腹兼取利以泄毒氣連翹三兩蜀升麻熏陸香各二兩淡竹瀝一升寄生三兩大黃一兩水一升別漬內朴硝二兩熬干別內麝香一分研青木香二兩丁香一兩獨活沉香甘草射干各二兩上切以水一斗煮取二升半絞去滓然後納大黃朴硝竹瀝更煮一兩沸去滓納麝香分溫三服服別相去如人行十里久以得利一二行為度慎雞豬魚蒜生冷酢滑油膩麵食小豆五辛髮菜等物黑龍丸聖濟總録治諸惡瘡腫等病芎藭三錢大黃一分甘草炙一兩益智去皮藿香葉各四錢梔子六錢防風去蘆半錢雄黃雌黃各二錢麝香半錢匕膩粉五錢匕水銀一分為沙子乳香半分上搗羅為末先將水銀膩粉乳香同研入諸藥研細勻水浸炊餅和丸如小豆大每服五丸嚼破茶酒下此藥一半作丸子一半作散子每服調散子一字下丸子五丸一方更入蓽茇一十個乳香少許作丸子每服五丸嚼破散子酒下若婦人吹奶用散子半錢蝸牛七枚熱瓦上爆然後令去殼黃色入龍腦麝香各少許研酒調合面臥若治頭面腋下赤瘤子以二藥相間服之半月軟爛自破出盡惡毒以膏藥貼之貼疼膏藥南星大柏皮良白薑木鱉子白芨甘草牡蠣赤芍藥白芷天花粉各一兩赤小豆二兩官桂半兩經霜芙蓉葉三錢上為細末生薑自然汁調塗疼腫處皮破用燒鹽泡湯調四圍蜜調亦可桑螵蛸散直指方治諸瘡桑螵蛸地龍貝母厚黃柏各半兩飛丹煅一兩乳香一分粳米粉二錢雄黃輕粉各一錢麝香半錢上為細末以不食井水和沙糖調敷洗瘡藥治諸般惡瘡貫衆茵陳川芎須地骨皮甘草荊芥獨活當歸防風地扁竹上等分為㕮咀每用一次二兩水三碗煎三沸去滓通手洗之龍麝追毒散治惡瘡毒氣未出盡者可用之如箭頭針刺癰癤惡瘡內有毒氣在內不著骨者不過三兩次箭刺可自出也破傷摝惡不痛者大有神效龍腦三錢輕粉粉霜雄黃各半錢乳香沒藥各一字血竭半錢硫黃半字麝香半字巴豆一十四個去皮心出油上為細末調生面糊為丸錠子如麥粒大小如用時先用針破瘡入藥量輕重者一二丸可得也上藥後一兩時辰瘡腫盡是應也如患下疳瘡蝕莖或半或盡用者溫漿水磨藥二丸搽之愈漏蘆湯出外科精要治一切惡瘡毒腫丹瘤瘰癧疔腫魚睛五發瘭疽初覺一二日便如傷寒頭痛煩渴拘急惡寒肢體疼痛四肢沉重恍惚悶亂坐臥不寧皮膚壯熱大便祕澀小便赤黃並宜服娠身莫服漏蘆白蘞黃芩去黑心麻黃去節枳實麩炒去瓤升麻芍藥甘草各一兩大黃二兩朴硝一兩上除硝外銼㕮咀與硝同和勻每服三錢氣實人五錢水一盞半文武火煎至七沸去滓空心熱服蕪荑散仁存方治三十六種惡瘡蕪荑剪草蛇床黃連硫黃雄黃五倍子海桐皮輕粉上各等分為末麻油調敷乳香消毒散濟生拔粹方專治惡瘡大黃燒黃耆牛蒡子炒金銀花各五兩牡蠣鹽泥裹燒五兩甘草三兩炙沒藥乳香懸蔞各半兩上為粗末每服五錢水煎瘡在上食後在下食前救苦黃耆散濟生拔粹方治諸惡瘡癰癤黃耆甘草栝蔞根芍藥各一兩五錢當歸一兩五錢懸蔞一對熟地黃不拘多少金銀花三錢皂角刺為引上㕮咀每服五錢無灰好酒一升同引子裝於瓷瓶內將瓶用箬葉封坐於鍋內上以大盆覆鍋口盆外用黃土封之毋令出氣煮之外聞藥香為度取出瓶澄定清飲將藥滓再添酒一升依前煮服若酒少者酒水各半煮服瘡在上食後臨臥在下空服之此藥治之萬無一失神效如谷應聲當五月五日修合廣施於人奪命雄朱丹德生堂方治諸腫疔瘡癰疽發背丹毒無名惡瘡色黑而癢心驚嘔逆命在須臾雄黃三錢膽礬枯白礬銅緑輕粉硃砂血竭各三錢半蟾酥一錢黃丹二錢上細末於五月五日午時修合以水糊為丸如雞頭每服一丸先用蔥白三寸煎湯患者自嚼爛吐出手心卻用藥一丸於蔥裹定好酒送下切不要嚼藥恐傷牙口不一時如拽重車行三二里路汗出即愈或利一行病在上食後病在下食前服如病消減亦須要服十奇補內排膿散或復煎散之類更貼上膏藥又用箍藥敷瘡四圍腫處十奇內補排膿散出德生堂治一切癰疽發背諸腫瘡毒未成者即散已成者速潰排膿自出惡肉自出不犯刀杖服藥後疼痛頓減黃耆當歸人參各二兩川芎白芷桔梗防風厚朴甘草官桂金銀花各一兩木香五錢天花粉一兩上為細末每服三錢好酒調