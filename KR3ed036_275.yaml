一兩母丁香半兩麝香半錢細研上搗羅為細散入麝香研令勻先用鹽漿水洗候乾以藥摻之烏頭散出聖惠方治二十種惡瘡及風瘡痔瘻等瘡疣子黑痣瘡腫雀面皯黯痤癤塗敷之烏頭二十枚巴豆二十枚藜蘆一兩大黃三兩上同燒搗研為末細羅石灰一升以染青汁和成膏看瘡大小敷之日二三易治腎腧惡瘡方出瑞竹堂方雞內金瓦上焙乾川百藥煎胡黃連各等分輕粉一錢上為細末燒厚朴油調搽之內托散治一切惡瘡御米殼去葉頂一兩蜜炒甘草一兩炙雄黑豆六十四個炒生薑一兩切片上為粗末每服稱半兩水二盞煎至七分去滓溫服如血利加乳香半錢同煎空心服洗毒散治一切惡瘡多時不效風寒久冷皆洗之麻黃地骨皮蛇床子地丁各等分上為細末每用五錢水三大盞煎至七分去滓溫服針毒散治惡瘡追毒去死肉信雄黃各半錢乳香二錢麝香少許上為細末每服少許貼在瘡上膏藥封之消毒散治惡瘡赤腫瘤掃之大效大黃黃連各半錢地骨皮一兩朴硝三錢上為粗末每用三錢水一大盞煎至七分去滓冷用雞翎掃於瘡腫處鹿角散出聖惠方治一切惡瘡不好者宜敷鹿角一兩燒灰膩粉半兩百合半兩木槿花一兩上藥搗細為散入膩粉白合生油調塗日再用之碧霞錠子出濟生拔粹方治惡瘡透下覺疼痛銅緑一兩硇砂二錢蟾酥一錢上為細末軟米飯一處調勻捻作錠子粳米樣每用針刺之不覺痛者但有血出紝一錠子在內以膏貼之或作散以紙捻蘸紝之亦可臨證看如何宜用合度惡瘡方出危氏方赤色白膠一錢明白礬三錢黃丹三錢上為細末麻油調敷先以酸漿水暖過洗瘡拭乾用瘡藥祕方紅明信五錢黃丹三錢硫黃三錢上為細末打和一處初用水調點於瘡頭上次用清油調敷每日一換要好用水洗得瘡乾淨上膏藥或點化瘡內或看瘡熱如何用荔枝膏藥追膿乾淨治一切惡瘡腫痛方懸蔞出瓤五錢沒藥三錢甘草三錢炙上為散水酒各半盞煎至七分去滓溫服密陀僧散出聖濟總録治一切惡瘡密陀僧穀精草各一分雄黃半兩上搗研為散每用少許乾摻瘡上粉香散出聖濟總録治惡瘡膩粉二錢乳香一錢蔥一根煨熟去焦皮上同研如膏攤在帛上貼瘡三日一換黃連散出聖濟總録黃連去須胡粉黃蜀葵花各等分上搗羅為散用龍腦麝香膩粉各少許研細拌勻先以鹽漿水洗瘡帛子搵干摻之治一切惡瘡及瘻瘡等方出聖惠方蛇床子末硫黃膩粉各等分上同研為散以生麻油調如糊以鹽湯淨洗瘡拭乾即先以口補塗之然後敷藥不過三五服定血散出聖濟總録治諸惡瘡栝蔞大者一枚去瓤棕櫚皮一把當歸切碎半兩上入栝蔞中泥固濟燒細研為散每服一錢以茶酒任調下三聖散出儒門事親治臁瘡疔瘡搭手背疽等惡瘡蔥白一斤馬莧一斤石灰上濕搗為團陰乾為細末貼瘡有死肉更宜先用潰死肉藥治惡瘡疥癬蟲瘻疽螫毒方用五穀和松脂雄黃燒灰熱塗之更良治人體生惡瘡似火自爛方出肘後方用胡粉熬黑黃柏黃連等分下篩粉之瘡上雄黃散治惡瘡蝕肉雄黃六分䕡茹礬石各二分上為末敷瘡中日二次治蛇頭瘡其形生時在手足上瘡旁一塊開如蛇口之狀痛而流血不止者此藥治之雄黃蜈蚣全蠍各一錢上為細末看瘡濕劈開入藥摻在瘡上卻以少油抹裁帛拴住如干小油調搽紫金散治諸般惡瘡追毒去死肉白礬一兩黃丹一兩硇砂三錢上為末於銚子內一處同炒去盡水為度量瘡貼之追毒散治一切惡瘡追毒去死肉巴豆半兩去皮雄黃三錢豆粉三錢上為細末量瘡貼之大聖散治胳𦞂瘡及惡瘡腫惡悶痛川大黃寒水石當歸各一兩上為細末每服二錢新水沸湯隨病人意調下量老幼大小臨時以意加減又方出千金方治惡瘡連痂癢痛燒扁竹灰和楮白汁塗之又云搗扁竹敷之痂落即瘥又方燒灰研細豬脂調塗之拔毒散出瑞竹堂方敷貼諸惡瘡大黃東牆上土上極細末用無根水調搽如干再搽經宿即愈治諸惡瘡初得汁方出濟生拔粹方槐花不拘多少皂角棘針不拘多少銼碎上用水熬三五十沸以胡桃二個一生一燒存性細嚼以前槐花水送下碗許不過三五服見效雄黃散治惡瘡追死肉活血排毒明雄黃明信砒各半兩上研令細量瘡搽少許砂草油出瑞竹堂方治食毒物及一切惡瘡硼砂甘草各四兩上細末用真香油一斤於瓷瓶浸藥遇患急令服油一盞立效浸久尤佳皂莢刺散出聖濟總録治惡瘡皂莢刺乳香一分上為散每服二錢匕以酒一盞煎一兩沸服熱酒調下亦得烏頭散出聖濟總録治惡瘡烏頭一枚炮裂去皮尖為末膩粉二錢匕上研勻先以白湯洗瘡數遍次用鹽湯洗數遍後以唾調藥或膏敷瘡口金黃散出聖濟總録治惡瘡黃柏一兩蜜二兩將蜜塗黃柏炙盡為度上搗羅為散入麝半字同研勻細乾摻瘡上牛齒散出聖濟總録治諸惡瘡口不合牛齒三兩雞卵殼二兩上燒研為散入膩粉少許生油調塗之立愈懷干散出聖濟總録治惡瘡惡毒密陀僧一分黃柏蜜炙半兩上懷中懷干搗羅為散先用蔥湯洗瘡候乾敷之治諸惡瘡出儒門事親白殭蠶直者大黃上等分為細末生薑自然汁與蜜同和為劑丸如彈子大每服一丸細嚼療惡瘡方以狼毒秦艽等分搗末酒調服方寸匕日二三服之瘥內托散出濟生拔粹方治一切瘡毒緑豆粉一兩研細通明乳香一分慢火於銀石器中炒手指攪使干可急傾出在紙上扇冷研令極細用上同研勻凡一切惡瘡應系難名癰疽腫毒每服二錢至三錢食後臨臥濃煎甘草湯調下如打撲諸般內損用溫酒調下食後空心服些小即內消大損則敗血從大便出以一方治瘡毒攻衝臟腑漸成嘔吐多致咽喉口舌生瘡黑爛生菌名心氣絶飲食藥餌無由可進又有因鼻衄初愈不曾表汗餘毒流在經絡背發大疽連腰腫甚其硬如石色紫黑醫以涼藥敷之中夜大嘔乃連盡此藥三四服嘔遂止既而瘡潰出赤水淋漓四十日方愈再有害瘰癧者痛過即嘔服此藥嘔亦止有人患疽醫者不肯用此藥恐傷脾胃先人纍試有效記以遺後人潰膿散治惡瘡潰膿活血去惡肉白礬鹽等分上於銚子內慢火炒去盡水乾研為末量瘡貼之又方治一切惡瘡及沙蝨水努甲疽皆治藜蘆一兩去蘆頭燒灰虎骨一兩燒灰上各研令細以臘月豬脂調塗日再塗之又方出千金方治惡瘡以羊屎麻根燒煙斷細研豬膏和封上有汁者干敷之又方出千金方治惡瘡及浸淫瘡以面一升作大小餅以覆瘡口灸上令熱汁出盡瘥一方作煎餅乘熱拓之治惡瘡似火爛湯洗方出千金方以白馬屎曝乾以河水和煮十沸絞取汁洗之治惡瘡其大如錢名白馬疥方出千金方以水潰自死蛇一頭令爛去骨以汁塗之隨手瘥又方出千金方治惡瘡腫痛不瘥以苦瓠或苦瓜用一枚㕮咀煮取汁洗之日三度又煎以塗癬甚良當先以泔淨洗乃塗三日瘥或為末敷之療惡瘡尤良又方出千金方以鹽湯洗搗地黃葉貼之又方出千金方燒莨菪子為末敷之治小兒大人忽得惡瘡疽未便識者出本草取蜣螂杵絞取汁敷之其上治惡瘡疥及風腫以驢脂敷之活血散治惡瘡死肉腫硬用苦葶藶為細末好酒調勻掃死肉上血活自軟玄胡散治瘡無頭腫痛煩悶用玄胡索二個為細末熱酒調下治一切惡瘡遍用藥不效者出百一選方以陳米飯緊作團火煅存性麻油膩粉調敷蘇韜光耳上病碎瘡或痛或癢兩月餘百藥不效人敷此初不之信試用之次日即愈後再作呂顯謨云此證蓋以痰飲之故只用肥皂燒存性生油膩粉調敷用之尤妙治一切惡瘡已破膿血不止者出百一選方以蝸牛並殼肉燒存性入輕粉少許調敷之散腫膏出濟生拔粹方治腫毒惡瘡川大黃生用風化石灰赤小豆各二兩上搗羅為末以麻油調塗之干再塗之又方出直指方治諸惡瘡用蜘蛛曬為末麻油輕粉調敷治諸惡瘡消浮腫出本草用豬膏莓搗封之湯漬散敷並良治惡瘡口不能合用橡子為末敷之治一切惡瘡以皂角子十五粒冷水送下並二三服又方治一切惡瘡大膳頭及了淨以雞冠花燒灰溫酒調下一云連根葉搗入鹽少許敷患處治諸般惡瘡誤著死驢馬毒氣其瘡走遍身體走串紅腫中馬毒稀糞拋下汁溫酒調服之中驢馬毒自用清涼散治之治遍身惡瘡以荷葉曬乾為細末與面一處攪和為餅火燒熱食之病在上食後病在下食前七日見效地骨皮散出德生堂方治惡瘡以地骨皮一物見刮取乳皮別收之次取皮下膩白粉為細散其白粉下堅赤皮細銼與乳皮一處為粗末一合許煎濃汁乘熱洗瘡直候藥湯冷以軟帛搵干乃用細散敷之每日洗貼一次以瘥為度其用之未瘥甚不可住但勤施之無不瘥者小可瘡腫痛只以枸杞生銼煎濃汁熱淋亦效或以地骨皮為末用鹽湯洗訖乾摻之治一切惡瘡及沙蝨水努甲疽疼痛不可忍者並皆治之兼大蒜瘡出聖惠方以蜣螂十枚端午日收者佳搗羅為細末以油敷之即易一方取末以鹽水調之塗周圍如韭葉闊狹一方用蜣螂二枚腸肚安在紙中心四面以醋麵糊貼瘡上治一切惡瘡方出儒門事親以天茄葉貼之或為細末貼之亦可又方出儒門事親用臘月人中白燒灰油調塗瘡疥上又方出儒門事親治一切惡瘡以瓦菘不拘多少陰乾為末先用槐枝蔥白湯洗之後摻藥立效灸瘡久不斂者治之尤妙又方出儒門事親以蒲公英搗之貼一切惡瘡肉刺熏惡瘡方出儒門事親以紫花地丁一名米布袋取根曬乾用四個平頭磚壘成爐燒著地丁以磚垛一枚蓋之使磚眼內煙出熏惡瘡出黃水自愈治無頭瘡方出儒門事親用皂角刺燒灰陰乾為末每服三錢酒調一方嚼葵菜子三五個煎藥送下一方用蛇蛻皮於腫處貼治諸惡瘡炒蟾蜍糞敷惡瘡疔腫雜蟲咬油調敷瘰癧痔瘻瘡治一切有蟲惡癢滋唇瘡用蝦蟆燒灰敷之一方用屎敷治諸毒腫惡瘡瘻痔金瘡內射身癢癮疹不止者用天明精揩之立已治諸惡瘡以鼴鼠膏摩之治惡瘡以蛇魚骨杵末入諸色膏藥中相和合敷之紙花上貼之即鰻鱺魚骨治惡瘡疥並犬馬瘑瘡用山茱萸根皮煎湯洗赤龍皮湯治諸般惡瘡乳瘡用槲皮切三升水一斗煮五升春夏冷用秋冬溫用洗瘡治惡瘡用地菘汁服之日三四服瘥治毒並惡瘡菌毒以人糞取汁服浸皂莢甘蔗治天行熱疾治猝得惡瘡人不識者以牛膝根敷之諸惡瘡以槐白皮醋浸半日洗之治惡瘡中風寒水腫痛搗韭敷之良治猝得惡瘡不識者出肘後方取桃皮作屑納瘡中納蒼耳作屑亦可治瘡毒以金星草南人多用此草末以水一升煎取半升更入酒半升再煎數沸溫服取下毒黑未下再服但是瘡毒皆可服之然藥性至冷服後下利須補治乃平復治猝得惡瘡不識者出肘後方燒苦竹葉和雞子黃服之良治惡瘡瘢黶及風疥癬沙蝨用草蒿燒灰淋汁和石灰煎洗或只用草蒿浸煎洗又方治惡瘡以烏柏葉冬無葉用根貼壁草椒葉無葉用根野椒亦可又方用楓根白皮即楓樹根旋取去及粗赤皮就濕用為粗末每用藥一升無灰酒二升煎去八分取清汁稍熱作三服藥滓敷瘡口瘡未破敷時留瘡口既破用藥敷瘡三服可活人命神效治惡瘡用茜草根將絹帛包裹同頭等米醋於瓦罐內煎熱熏洗之若有瘡口用生肌藥貼之療惡瘡熱毒腫痛以甕近下鑽孔盛水令水射腫又以雞子清封腫上熱即易之又方取茺蔚臭草搗汁服一雞子許滓封腫熱則易之甚良治一切惡瘡疼痛不可忍黃水流出出聖惠方以栝蔞一枚燒作灰細研每服摻在瘡上治一切惡瘡以金貓獸蹄火燒存性為末入麝少許敷上瘥治惡瘡連痂癢痛出肘後方搗扁豆封痂落即瘥又方治諸惡瘡才覺癢痛者用草烏二三錢為細末酒調雞翎蘸水掃瘡即皮皺治惡瘡蝕𧈟金瘡毒物傷皮肉止風水入不爛手足皺摺瘡根結筋出本草以鐵熱及熱未凝塗之少當乾硬以竹末熱火於刀斧刃上燒之津出如漆者是也治㾏捍瘡用黃連煎湯半碗將爐甘石於火內煅通紅淬黃連湯內干碾為末入輕粉油調服治未發惡瘡用獨核肥皂酸米醋合和打成膏子放溫熱敷貼患處治諸惡瘡毒腫癮疹或癢或痛出百一選方用黃蜀葵花茄花皆取自落者以竹片夾取置淨瓷器中勿犯手指聽其自爛取敷瘡腫如冰即愈神驗治人面黑瘡出肘後方記事云江左有商人右膊上有瘡如人面亦無它苦商人戲以酒滴口中其面亦赤色以物食之亦能食食多則覺膊內肉脹起或不食之則亦臂痹有善醫者教其歷試諸藥金石草木之類悉試之無效至貝母其瘡乃皺眉閉口商人喜曰此藥可治也因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也謹按本經主金瘡此其金瘡之類歟或用為末入雄黃少許摻之良治大人小兒猝得熛瘡又名爛瘡此瘡初起作熛漿出肘後方燒牛糞末以粉和敷之又方出肘後方以黃耆為末和糊塗之又方出肘後方燒鐵冷赤三七度注水中浴日二三度治諸惡瘡膏海上方出德生堂方用燕窠內外泥糞俱研極細羅過用油調塗一方治猝患腰惡瘡先發於足有汁水者取為末水調塗之治惡瘡黃汁出不瘥漸胤者出本草取載鹽車牛角上土封之即止車邊脂也好用之治惡瘡黃水流出痛不止方出聖惠方用胡鞍屜氈燒灰細研和臘月豬脂調塗之又方出聖惠方取豉三合炒令黃色搗羅為末用豬脂調塗之一方無豬脂治熱瘡惡腫癰色紫金瘡下血蛇犬等毒用青黛大黃銀硃等分為末以雞子白調敷之治惡瘡腫痛方出聖惠方用白芨以水煮取汁洗瘡干塗後膏用桑葉取東向者作末臘月豬膏和塗之又方出千金方用豬糞燒煅入油塗之金黃散出聖濟總録治積年惡瘡透掌漏瘡疥外臁瘡大黃銼炒鬱金銼炒鯪鯉甲炙穀精草龍骨山梔子木鱉子去殼獨角仙皂角株上黑蟲黃柏去粗皮甘草銼鉛丹白蘞不灰木麒麟竭研黃芩各半兩膩粉藜蘆去苗各一分烏賊魚骨去甲半兩上搗研為散每看瘡大小摻之有膿水即用溫鹽漿水洗淨敷之透掌漏瘡以津調紝於瘡內不過三五上牛角散出聖惠方治久患惡瘡不可者黃牛角一分燒灰麋角屑一分白蘞一分炙令微黃麝香一分細研密陀僧半分微炒黃丹半分微炒蜣螂半分燒灰羌活一兩海桐皮一兩銼仙靈脾一兩乾地龍一兩去土微炒上為細末每服二錢匕溫酒調下空心食前服赤小豆散出聖濟總録治惡瘡人不識多年不可者赤小豆炒熱糯米微炒吳茱萸炒熟黃連去須黃柏銼乾薑蛇床子各半兩上為細散以生油和如面脂先煎槐枝湯洗瘡令淨然後塗藥日再換之白膏方出聖惠方治久惡瘡油二錢白蠟一兩膩粉一分南粉一分細研密陀僧一分細研乳香一分細研杏仁五七枚湯浸去皮尖雙仁細研上件藥先於銚內煉油熟下蠟令消入諸藥末攪勻成膏日二三塗之乳香散出外科精要治年深不效惡瘡白乾薑草烏頭苦丁香半兩釣藤鉤狼毒乳香各一兩上為細末每用乾摻之或唾調作錠子紝入瘡內麝香散出聖濟總録治一切惡瘡久不瘥麝香當門子二個丁香紫檀香各一分乳香沒藥各半兩木香一分上為散用雞子清和入殼內飯上蒸熟爆干再研分作六服每用蠟茶清調下乳香散出聖濟總録治遠年惡瘡乳香膩粉各半錢麝香一字龍骨大黃銼黃柏去粗皮各三錢上搗研為散先用苦竹瀝洗瘡次摻藥貼之寸金散出聖濟總録治惡瘡久不效雞子殼十個生卻子者檳榔一枚麝香研膩粉各半錢黃柏去粗皮密陀僧各一錢上搗研為散用溫鹽漿水洗瘡干貼松脂膏出聖惠方治久惡瘡黃水出流松脂一兩半熏陸香一兩半白羊脂三方亂髮灰半兩細研生地黃汁五合石鹽半兩細研上先煎羊脂松脂熏陸香等件次下地黃汁煎令稠即入發灰並鹽攪令勻成膏日一塗之柏葉散出聖惠方治一切惡瘡久不瘥寒食收柏葉燒灰一兩露蜂窠半兩微炒蜣螂五枚燒灰密陀僧半兩膩粉石灰各一錢上搗為細末濃煎漿水淋洗瘡後用雞子清調貼之引膿散出外科精要治年深不效惡瘡麝香一字狼毒鉤苓根白丁香無心草各半兩上為細末每用乾摻瘡上瘡口深者紝之治遠年不好毒瘡方雄黃大黃黃連黃芩硫黃各用等分上用巴豆真香油煎至花謝去豆用油調五般末子每用鹽湯水洗後干雞毛搽上藥用黑傘紙蓋十日全好忌口降真散出聖惠方治久患惡瘡常出膿水降真香半兩蕪荑半兩微炒白蘞白芷白芨各半兩上搗細羅為末先煎漿水放溫淋洗瘡拭乾以散敷之砒霜膏出聖惠方治久惡瘡砒霜一分細研附子一分細研苦參一分末黃蠟一分上用麻油二兩煎油熟下蠟次下藥末攪令勻成膏每用先以蒴藋柳枝煎湯洗瘡拭乾日二塗之鉤苓散出外科精要治年深不效惡瘡井鹽一兩鉤苓根三兩無心草乾薑二兩上為細末每用乾摻之或唾調少許塗在膏上就貼之檳連散一名木香散出濟生拔粹方治多時不效一切惡瘡生肌止痛木香檳榔黃連各半兩白芷三錢上用為細末每日乾貼檳榔黃葵散出聖濟總録治惡瘡久不瘥者檳榔一個生者木香黃蜀葵花黃連去須上將檳榔稱見分兩余藥與檳榔等分搗羅細散先以溫漿水洗瘡淨看大小入膩粉少許蜜調塗與故帛上貼之日二三易治惡瘡三十年不愈者大黃黃芩黃連黃柏各一兩上為散洗瘡淨以粉之日三無不瘥馬齒莧膏出聖惠方治一切久惡瘡馬齒莧一兩末白礬一兩末皂莢一兩末上用好醋一斤慢火煎為膏貼之又方出直指方治久不瘥惡瘡透明硫黃黃連等分上為細末以雞子清一個打碎鋪新瓦上焙為末夾上項藥麻油輕粉調敷先白芷蔥頭煎洗治積年惡瘡不瘥以馬糞並馬齒研敷之不過二三次即愈足脛上瘡癢尤妙血竭散出聖濟總録治一切不測惡瘡年深不愈大效血竭一兩鉛丹半兩炒紫色上搗研為散先用鹽湯洗瘡後貼之桃花散治遠年惡瘡枯瘤為上信一分千年石灰二分上為細末先利動津調貼之治一切惡瘡多年不瘥者宜用此方出聖惠方緑礬末二兩水銀半兩上以紙一張安緑礬在上入水銀於中間裹定用鹽泥封裹候乾以文火養一宿去泥及紙細研入麝香末半分和令勻如瘡干油調塗濕即干貼之治多年惡瘡口不幹者出百一選方採冬瓜葉陰乾瓦上焙碾極細貼瘡濕處三二次便乾纍效治久年惡瘡用多年石灰碾碎雞子清調成塊煅過候冷再為末薑汁調敷治積年諸瘡不瘥方取鼠黏草根細切熟搗和臘月豬膏封之日二換之治惡瘡多年不瘥浸淫入骨或成骨疽宜用此方出聖惠方取七葉子搗令爛以生油調先洗瘡搵干然後敷之初敷極癢切不得觸之又方出聖惠方用刺蝟膽膽濕即用膽汁塗之如膽干即切薄片敷貼瘡上如瘡口不合只去盡膿中心研一瓣乳香安在瘡內即效治惡瘡積年不瘥不痛只入心癢方出聖惠方用枯骨多年者為末酥塗瘡口內外上糝此藥不過三五度瘡蟲即死其瘡即瘥凡一切惡瘡久不愈者以木香檳榔散貼之地丁散出聖惠方治一切惡瘡疔腫毒瘡人不識者地丁桑蟲倒鉤棘針露蜂巢蛇蛻皮粟米黍米大麻仁黑豆赤小豆亂髮折牛脊射生箭熟紅帛蠶紙以上各半兩朝生花秋夏滯雨後糞堆或爛木上如小菌子者就時收之半兩上都細銼以蠶紙裹纏水浸良久時方漉出候乾於淨地上以炭火燒令煙絶入新盆中以盆子合之候冷細碾羅為末如患已成頭有膿水者以散敷之即愈如未成頭便以酒調一錢服之蓼葉散治無名瘡立驗蓼葉柏葉黃丹胡粉附子粟米石膽川大黃白礬蛇蛻皮乾蟾晚蠶蛾密陀僧以上各一兩榠楂一枚上細銼入瓷瓶中固濟燒令熟取出搗羅為末入龍腦麝香各半分更研令勻細先以溫湯淋洗後敷貼日二用之又方治一應不識惡瘡或濈濈壯者臘月豬膏一斤亂髮如雞子大生鯽魚頭雄黃末苦參末各二兩大附子一枚末上合煎令消盡納雄黃苦參大附子末攪令勻候凝以敷諸瘡又療瘑疽疥效又方以鹽湯洗搗地黃葉貼之效硫黃膏治一切惡瘡硫黃膩粉吳茱萸湯洗焙乾炒各一分礬石煅令汁枯牡蠣煅赤研各半兩上細研入小油半兩黃蠟一兩同熬成膏趁瘡大小攤於紙上以火炙熔貼之又方治諸惡瘡及腫久不識者麝香一錢細研狗糞一兩穀精草一兩燒灰蟾一兩燒灰膩粉一錢上為細末羅為散都研令勻以津調貼之取瘥為度柏皮散治無名惡瘡年深不愈黃柏蜜炒榆蛀蟲炙乾者一錢麝香少許研上搗研為細末以鹽漿水洗淨瘡後唾調藥紙花子貼之薔薇膏治惡瘡不識名者薔薇銼一升春夏用枝秋冬用根鉛丹十五兩炒令紫色松脂十兩煉成者上用油三升先煎薔薇待黑即去滓下松脂候消綿濾過下鉛丹文火煎攪勿停手待色變凝成膏以帛上攤貼日二換之白龍膏治諸惡瘡及腫人不識者膩粉一分乳香半兩研細濕百合根一兩爛研上相和研令勻熟每用先以漿水洗瘡淨後以紙塗藥於上每日二貼之蛇床散治一應不識惡瘡或濈壯者蛇床子半兩末硫黃半兩細研水銀半兩以少熟棗瓤研令勻星盡上都研令勻以臘月煉成豬脂調如面脂先以楮根濃煎湯洗瘡搵干塗之獺骨散治無名惡瘡似魚眼者獺骨生碾末一兩麝香一字上細研和勻用津唾調貼之治一切不識惡瘡黃連蛇床子等分上為末豬脂和塗日數次治大人小兒猝得惡瘡不可識者用柳葉若皮洗之亦可納少鹽亦療面上瘡治上一切惡瘡及禿瘡諸藥不瘥者宜用此方一名魚膽膏以鯽魚一頭長五寸留鱗開去腸胃頭髮令滿即以紙裹之燒為灰別覓鯽魚膽調塗之一方入雄黃一分令研細用臘月煉了豬脂和更令研勻先以泔清洗瘡拭乾塗之日三兩上自瘥麻油調亦得一方鯽魚灰和醬清敷之治面上及遍身生瘡似貓兒眼有光彩無膿血但癢不痛飲食減少久則透腔名曰寒瘡切須忌葷辣以不多吃魚雞蔥韭自愈羌活散治諸毒惡瘡如疔瘡等羌活一錢半獨活一錢半防風半錢藁本半錢黃芩一錢黃連半錢黃柏五分知母一錢生地黃一錢漢防己一錢半澤瀉七分熟地黃一錢以上十二味煮酒浸半個時辰次十一味不用浸防己梢半錢當歸身一錢連翹三錢黃耆一錢半人參半兩甘草橘紅生甘草梢蘇木當歸尾各半錢桔梗一錢上㕮咀水二碗煎至七分一碗去滓食後臨臥吃藥吃藥後端坐半個時辰方可睡如是疔腫急證一切惡瘡更加沉香檀香藿香乳香木香各一錢金寶赴筵膏治諸惡毒瘡盤蛇瘡疔瘡等大黃黃耆地龍去土當歸龍骨乳香沒藥粉霜硇砂穿山甲輕粉各三錢腦子一錢江子二十一粒去皮殼麝香少許上蕎麥灰一斗煎淋灰三覆之汁煎三分之一下用雪裡之雀糞五錢重煎十來沸提起放冷澄清再熬入大黃末煎三沸次入朴硝花咸者各三兩重每藥一兩加石灰三兩黃丹半兩逐絞之待煎滴水中直到底不散者方好提起用餅封要用者入麝香腦子犀角丸治一切諸般疔腫項疽惡瘡巴豆二十二個大黃一兩一錢犀角一兩三分梔子黃連藍葉升麻黃芩防風人參甘草各一錢當歸黃耆各一分上為細末和蜜為丸如梧桐子每服三五丸溫酒送下臟腑虛服二丸臟腑實五丸不問大小小兒婦人神方奪命丹治疔腫癰疽發背諸惡瘡及牛馬肉發黃者透明雄黃一兩肥巴豆一百二十粒不去油心金鼎砒一兩半黃蠟四兩熔開上三味各研極細和勻入蠟中攪勻取出火重湯泡勻丸如小麻子大量老幼加減服之每服五十丸多至二百丸臨睡溫熟水送下不動其丸經過臟腑只下清黃黑水病去如藥未下再服則藥病俱下矣煅金鼎砒法透明砒四兩敲作米粒塊用黑鉛一斤熔化水中撲作珠子先鋪珠一層次鋪砒一層層層相間入角罐中鉛珠蓋面黃泥餅子又蓋面上其餅用箸杵十數竅餅四緣略用泥固定罐口須空一二寸水鼎顛倒覆口鐵線扎定須做把手提挈略固口縫安平地上城磚圍煅就可下開四竅通風一層熟火一層生炭層層相鋪平藥處即止又發火自上而下煅之通紅或提出或寒爐取出其鉛熔墜在下其砒將在上可得四兩半治發背疔瘡天南星半夏各二錢大黃瓜栝蔞各三錢上粗末無灰酒一碗水一碗煎服病在上食後服病在下空心服不一時於大便內取出膿血塊其疾即可熬藥於四味加扁柏葉苧麻根搗細井花水敷之中留孔治一切惡瘡赤小豆半合漿水半合鯽魚膽五枚蔥白一握細切上相和於砂盆內研如膏薄塗腫上即瘥治延皮惡瘡方用石榴煎皮取濃汁放冷以搽瘡上冷如冰雪即著痂而愈此藥甚效昔錢季質司法粢嘗苦臁上生瘡始者如粟漸如豆爬瘙不已即成大瘡纍治不效後得此方而愈聖愈散治諸惡瘡血出不止及浸淫一名聖愈湯以生寒水石細末摻之立止如神此藥或摻瘡時作黑色不可潰也藥力去盡卻和紅也如血出血多而心煩不安不得眠睡宜用下藥主之熟地黃生地黃各三分當歸身五分川芎三分黃耆半錢人參三分上同㕮咀如麻豆大都作一服水一大盞煎至一盞去滓服稍熟眠無時又方治證如前以寒水石燒作粉每服半錢漿水調空心服追毒散治一切惡瘡追死肌惡水甘草干沙糖糯米粉上等分為細末淨洗瘡口乾摻惡水出盡為度並上藥數過有死肉即追出用煎紅玉散乾摻瘡口次用萬金膏貼之輕黃散治一切風熱惡瘡龍骨二錢黃丹一錢輕粉五個子白礬一分上先將白礬為末入在田螺殼內炭火煅過白色為度取出同龍骨黃丹等碾為細末次以輕粉和之如患臁瘡惡瘡皆先用口溫齏汁洗淨以軟帛搵干次用藥末干貼瘡上兩三次必瘥黃柏散出聖惠方治久惡瘡疾痛諸藥不效宜塗黃柏一分微炒黃丹一分炒令紫色密陀僧一分白狗糞半兩燒灰膩粉半兩麝香一字細研麒麟竭三錢上搗羅細為散都研令勻先用甘草湯洗瘡口後用津唾調塗涼肌散出衛生家寶治一切惡瘡膿水不幹密陀僧上為末入輕粉和勻乾摻立效花蕊石散出衛生家寶治無名惡瘡穿潰經久不瘥及癰疽潰爛膿不幹花蕊石一兩半煨過黃柏皮半兩黃連一兩上為末入輕粉和勻先用溫鹽水洗瘡令淨以帛拭乾即以津調蕊塗瘡上立效香礬散出衛生家寶治惡瘡及嵌甲神驗白礬半兩乳香二錢半先飛礬令溶後下乳香飛住麝香輕粉各半錢上合研令勻細先用鹽湯或漿水洗過干貼或摻疏風解毒散出直指方治諸惡瘡頑癢哄熱及婦人血風遍身紅斑圓點斑中漸發疹痱開爛成瘡癢痛白芷細辛蒺藜炒去刺麻黃去節雞心檳榔當歸鬚生乾地黃川芎赤芍藥川獨活牽牛微炒取仁蒼朮炒桑白皮炒枳殼制甘草微炙等分上銼散每服三錢入黑豆七十粒紫蘇五葉薑五片同煎服如大便祕加些生大黃次用貝母膏敷瘡治惡瘡發背出華他方燒車螯蘆殼黃柏甘草上等分為末先以青鹽薄荷芫荽樓蔥煮漿水湯洗瘡男子以婦人婦人以男子唾調前藥塗之以赤水出為度紅花散出華他方治諸惡瘡大效龍骨雪白真者一兩乳香半皂子大粉霜半錢光粉二錢輕粉炒半錢麝香少許黃丹逐旋入顏色粉紅即止腦子少許上合和了如患瘡先用溫漿水洗淨次用好油塗瘡口上了方可將藥摻在瘡上用膏藥貼日三四次易之趙允韜赴溫倅過諸暨傳此方云親自效渠患一漏瘡以藥用紙捻填瘡中上以膏藥貼之日生肉舊不痛逐漸覺痛有血是生好肉也集珍膏出家藏經驗方治諸惡瘡黃連十文山茱萸五文白礬五文焰硝十文苦參五文剪刀草五文蛇床子五文巴豆五文用三粒去殼夾蔥煎油調藥上為末用輕粉三十文入藥用油調先用甘草湯洗拭乾敷卻用青紗片護藥更少入五倍子末尤佳瘡藥方固多未見此方之效如神乃湖州道場山一僧每以此療人主僧力求得之百草膏出三因方一切惡瘡不問乾溼痛癢日近年深百藥不瘥羊糞不拘多少上上下以瓦盛蓋柴木燒令煙盡末麻油調敷癢者入輕粉少許痛入麝香神效雄黃散出余居士選奇方治惡瘡雄黃飛白礬飛黃丹飛白蘞細末上等分水調鵝毛掃紙花貼中留小竅出毒氣專治惡瘡瘰癧神效張定歸侍郎傳出百一選方黃皮不拘多少用童子小便春秋五日夏三日冬七日穿山甲不拘多少火煅存性研細土牛不拘多少新瓦焙乾細研每黃皮末三錢穿山甲末土牛末各一字輕粉半錢同研極勻細濕瘡乾摻干瘡麻油調塗之又方出衛生家寶治一切瘡能生肌肉止痛地骨皮上為細末先於瘡口上噙漿水洗搵挹干後上藥貼之其效不可具述及治下疳瘡神效黃連散出衛生家寶斂多時不效瘡黃連去須木香檳榔以上各等分上為細末先洗淨瘡用藥干貼有水出勿怪未效隔二三日又貼用之治一切丈夫婦人度年過月惡瘡瘙癢疼痛不得安效方出護命方當歸木香檳榔柳枝防風甘草各一分南椒二銖鯽魚一個上用油四兩同煎令藥得所去藥卻用黃丹一兩麝香一分膩粉四銖研令勻入在煎者油內柳枝攪六七沸取出用塗瘡口卻以龍骨貝母杵為末敷其上外以油單裹之先用柳枝湯洗了方使治惡瘡十年不瘥似癩者以蛇蛻皮一枚燒為末下篩豬脂和敷之醋和亦得石上者彌佳懸蔞散出儒門事親治發背惡瘡懸蔞一個大黃一兩當歸半兩金銀花一兩皂角刺一兩上銼碎用酒一碗煎至七分去滓溫服如有頭者加黍黏子白金散出楊氏家藏方治惡瘡烏賊魚骨不拘多少削去硬皮上件為細末用麻油調敷透膿散出德生堂方治諸惡瘡及貼骨癰不用刀針其膿自出纍有應驗不可視之輕泛然其功甚有取焉鵝口繭用出鵝兒者一個燒灰上為細末酒調服即透只用一個不可用兩三個繭兒燒灰如服三兩個即有三兩個瘡口膿透為害妙用膏出百一選方治諸惡瘡項有癭及漏瘡真清麻油入古武錢三二十文久浸年深每用以鵝毛掃患處療惡瘡粉方方見水銀膏治惡瘡生背脅頭腦四肢要害之處欲成大毒者鮑氏方狼跋子出泉州似巴豆人以醉魚上以殼捶碎或水或酒浸之良久頓服只一二粒不可多滓敷勿著瘡口利下惡物即愈或不用酒又方出鮑氏方治同前大黃一兩木鱉子甘草節各半兩上為散每服三錢入少酒煎利下愈又方出鮑氏方治同前紫河車又名木綿根鱉藤鱉豆各二錢生上酒浸用生薑同搗細浸透服之滓盦瘡上即時黑皺愈以上三方治發背及早用妙黃耆肉桂柴胡酒煎湯出東垣蘭室方柴胡一錢半連翹一錢肉桂一錢黍黏子炒一錢上㕮咀好糯米酒一大盞半水一大盞半同煎至一大盞去滓大溫空心宿食消盡服之少時便以早飯壓之使不致火熱上攻犯中上二焦也化毒丹治百腫惡瘡毒腫初覺一二日咳逆煩悶或咽喉閉塞發熱惡寒沒藥乳香各五錢另研巴豆四十九個去皮生用另研草烏頭醋浸炮製浮石各一兩燒赤淬七次余醋湯上為細末浮石草烏頭余醋打麵糊丸如豌豆大每服五七丸空食後冷酒送下忌熱飲取快利三二行或吐出惡物為效白香散聖濟總録方治一切惡瘡疼痛久不瘥者楓香脂研膩粉防風各一分上細研令勻先以口含漿水令暖吐出洗瘡令淨後以藥末干敷之疼痛立止貼至令瘥即易一方無防風名楓香散又方治諸惡瘡疼痛不可忍以熊脂不拘多少細研塗之良加減五芩散出百一選方治惡瘡項上有癭及漏瘡沉香檀香生熟地黃升麻乾葛芍藥黃耆黃芩羚羊角犀角連翹甘草防風上等分㕮咀每服三錢白水煎服仍煎何首烏散服雄黃膏出十便良方治身上諸惡瘡雄黃一兩硫黃一兩並細研上以豬脂四兩入銚內煎化成油入鯽魚兩個煎令肉爛了又亂髮兩卷煎焦爛去滓用和上件雄黃硫黃末搽之瘥黃連散出衛生家寶方治一切新舊惡瘡斷膿生肉或先唾沫瘡口後用藥末糝黃連黃柏黃丹各一兩白芨龍骨輕粉各半兩上為末以冷熟水調敷瘡口瘡溫即干糝治諸惡瘡以半天河水洗之即竹籬頭水又空樹中水治諸惡瘡出本草用馬勃敷之甚良治諸惡瘡膿水久不瘥者出本草以黃蜀葵花作末敷之即愈治鼷鼠食人患惡瘡及正月食鼠殘多為鼠瘻小孔下血者是此病出本草以貍膏摩之及食貍肉亦佳治惡瘡及殺蟲出本草以粟米泔下淋醋敷之治惡瘡出本草以蛇婆炙赤為末服一二錢匕一方敷之治惡瘡及乳癰蜂疔出本草以露蜂房煎湯洗之治熱瘡惡瘡出本草以青魚膽汁塗上瘥治惡瘡久不瘥有蟲者出本草用柏枝節燒油膏敷之三五次無不愈驗治風惡瘡出本草以黿鱔魚膏塗摩之治惡瘡出本草取蛇魚草炙浸酒服之以膏摩之治諸惡瘡出本草用虎杖根燒灰貼瘡治惡瘡出本草用桐皮水煎敷之治惡瘡出本草以白商陸大蒜熁之治腫爛惡瘡出本草以櫸樹皮研搗窨治惡瘡疽癰腫疳瘡野雞病出本草以秋木皮煎膏貼敷之或用楸木葉搗敷瘡腫治惡瘡出本草以貝母燒灰油調敷之治惡瘡疥出本草搗蒜貼之熟醋浸之經年者良治惡瘡疥並風瘙出本草取白鴿食之立愈治一切惡瘡出本草用雞腸草搗汁敷之五月五日者驗或為末豬脂調敷亦可極妙治惡瘡疥癬出本草以海豚魚皮中肪摩瘡上此魚生大海中治人惡瘡腫毒出本草以續用鬼蓋和醋敷之治一切惡瘡疥癬出本草以續隨子搗敷之治諸瘡腫出本草以胡麻油生摩之治一切惡瘡及斂瘡口出本草用石合草葉焙乾搗羅為細末溫水調貼治惡瘡痂癢破血出本草以狗膽汁敷之河內太守劉勳女病在左膝瘡癢華他視之以繩系犬後足不得行斷犬腹取膽糊瘡口須臾有蟲若蛇從瘡出長三尺病愈矣治惡瘡腫未潰者出本草煮白茅針服之一孔二針治惡瘡出本草用灰藋搗碎和油敷之治惡瘡久不瘥出本草用屋內床下蟲塵土干敷之亦可油調塗之治惡瘡疥癩出本草以楊梅皮根煎湯洗之忌生蔥治惡瘡疥癬有蟲者出本草以馬瘍木根皮為末和油塗之治惡瘡疽𧈟疥癰蟻瘻等出本草並以朝生暮落花日乾末和油塗之一名狗尿臺治諸惡瘡瘍出本草以當歸煮飲之治惡瘡出本草以狼牙煎汁洗之治惡瘡出本草以邪蒿煮冷熱和醬醋食之治惡瘡久不瘥者用三家洗碗水煎令沸以鹽投中洗之不過三五度立效治惡瘡以益母草搗敷之治惡瘡經年不瘥者及灸瘡上出血令不中風水以青布燒作黑灰敷之治惡瘡入水不爛及虎狼咬瘡以青布和蠟燒熏之出水毒治多年惡瘡百方不瘥或痛焮走不已者爛搗馬齒莧敷上不過三兩遍瘥治惡瘡用土檳榔細研油塗之即階除間蟾蜍屎也治惡瘡瘑瘻以酢漿草搗敷之殺諸小蟲治惡疾遍身瘡者取水中浮萍濃煮汁潰浴半日多效此方甚奇也治惡瘡以孔雀糞敷之治惡瘡並止血以白馬鬃燒灰敷之治惡瘡腫用剪刀草莖葉爛搗如泥塗敷治惡瘡癰腫疼痛未潰取毛建草葉煎搗敷之不得入瘡令人肉爛治惡瘡腫以羚羊角生摩和水塗瘡腫上治惡瘡熱毒癰腫赤白遊風瘻蝕等瘡北人呼腫曰遊用石蒜和水敷之治惡瘡疥癬以大蘇葉研細罯敷治惡瘡疥癬以白灰淋汁洗之治惡瘡疥癬以鐵線粉和油塗之治惡瘡疥癬蟲瘻疽螫毒出本草用五穀燒作灰熱塗之良治惡瘡以白馬骨和黃連細辛白調牛膝雞桑皮黃荊等燒為末淋汁洗之治惡瘡出本草以蜣螂和乾薑末敷之治惡瘡疔腫毒腫諸瘡有根者出本草用故緋帛如手大取露蜂房彎頭棘刺爛草節二十七亂髮燒為末作膏空腹服下方寸匕大主毒腫緋帛亦入諸藥膏取水蛭十餘枚啖病處取皮皺肉白無不瘥冬月無蛭蟲地中掘取暖水中養之令動先洗去人皮上咸以竹筒盛蛭綴之須臾便咬血滿自脫治諸熱毒惡瘡出本草取瓜藤與刺豬苓二味洗淨去粗皮焙乾等分搗羅用甘草水調貼之瓜藤生施州四時有葉無花其皮無時採之治諸般惡瘡及杖瘡成癰未潰之前急宜貼之萆麻子仁研成膏黃蜀葵花去萼及時收入瓶內令腐爛自然成膏真蒲黃各等分上研成膏子攤白紙上掩之治一種瘡毒初發時癢抓之汁出著處復為連續不已至於滿身號曰肥瘡上用黃柏黃連各一兩以蜜塗之慢火炙令焦為細末入輕粉麻油調敷瘡上若瘡濕即摻之不過三兩次自愈治鼠咬瘡用野狐頭燒灰敷之又方用桐油塗之效治諸惡瘡用雀梅搗敷之又方用黃褐五味淹食之一名青鷦治一切惡瘡用肥好黃連土根鬚並蘆頭以生蜜浸炙七次勿令焦為末瘡干即用油調敷之治惡瘡腫毒漏爛用駱駝脂敷之治惡瘡息肉及除面印字用新生小兒臍中糞塗之
