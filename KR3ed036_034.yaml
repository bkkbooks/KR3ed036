body:
  text: 卷三十四膽腑門總論夫膽腑者主肝也肝合氣於膽膽者中清之腑也號將軍決曹吏重三兩三銖長三寸三分在肝短葉間下貯水精汁二合能怒能喜能剛能柔目下果大其膽乃橫凡膽腦髓骨脈女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府若胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之腑此不能久留輸瀉者也所謂五臟者藏精氣而不瀉故滿而不能實六腑者傳化物而不藏故實而不能滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也左手關上陽絶者無膽脈也苦膝疼口中苦眯目善畏如見鬼多驚少力刺足厥陰治陰在足大指間或刺三毛中左手關上陽實者膽實也苦腹中不安身軀習習也刺足少陽治陽在足上第二指本節後一寸是膽病者善太息口苦嘔宿汁心淡淡恐如人將捕之咽中介介然數唾候在足少陽之本末亦見其脈之陷下者灸之其寒熱刺陽陵泉若善嘔有苦長太息心中淡淡善悲恐如人將捕之邪在膽逆在胃膽溢則口苦胃氣逆則嘔苦汁故曰嘔膽刺三里以下胃氣逆刺足少陽血絡以閉膽卻調其虛實以去其邪也膽脹者脅下痛脹口苦太息肝前受病移於膽肝咳不已則嘔膽汁厥氣客於膽則夢鬥訟肝應筋爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪軟色赤者膽緩爪直色白無約者膽直爪惡色黑多敗者膽結扁鵲云足厥陰與少陽為表裡表清裡濁其病若實極則傷熱熱則驚動精神而不守臥起不定若虛則傷寒寒則恐畏頭眩不能獨臥發於玄水其根在膽先從頭面起腫至足膽有病則眉為之傾病人眉系傾者七日死膽實熱附論夫左手關上脈陽實者足少陽經也為膽實熱蓋實則為有餘有餘則生熱故其證苦腹中氣滿飲食不下咽乾灑灑寒熱心脅痛不能轉側足外反熱是為陽厥及頭痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭皆謂膽氣實足少陽經壅滯故也龍膽瀉肝湯出衛生寶鑑治熱盛口苦膽疸乃肝主謀慮膽主決斷汁計二合是中清之府肝或決於膽志或不決為之怒怒則氣逆膽汁上溢故口苦或熱盛而使然也柴胡一錢黃芩七分生甘草人參天門冬去心黃連去苗龍膽草知母山梔子麥門冬去心五分五味子七個上㕮咀都作一服水煎食遠服菊花散出聖惠方治膽伏熱精神驚悸不安甘菊花一兩牛黃研半兩犀角鎊屑三分鐵粉半兩黃連去須三分麥門冬去心半兩獨活一兩白附子炮半兩鉛霜半兩上為末每服二錢食後淡竹瀝調下金銀花煎湯下亦得一方無獨活有人參甘草半夏湯治膽腑實熱精神不寧半夏宿姜各三兩黃芩一兩生地五兩遠志茯苓各三兩秫米一斗酸棗仁五合上㕮咀長流水五升煮秫米令蟹目沸揚三千餘遍澄清取九升煮藥取三升半分三服一方治虛煩悶不得眠無地黃遠志有麥門冬桂心各三兩甘草人參二兩酸棗仁丸出永類鈐方治膽氣實熱不得睡神思不安茯苓酸棗仁去核遠志去心柏子仁炒防風各一兩生地黃枳殼各半兩竹茹二錢半上為末煉蜜丸如梧桐子大每服七十丸不拘時熱水下升麻湯出聖惠方治足少陽經熱積久腹中氣滿睡不安頭昏口苦小便不利膽實熱精神失守升麻麥門冬去心黃芩茯神去木大黃炒地骨皮去土羚羊角鎊下甘草炙各等分上搗篩每服三錢水一盞入青竹茹少許煎七分去滓溫服食後臨臥忌炙爆物一名麥門冬散楝實丸治膽經實熱心神驚悸小便不利楝實三兩童子小便浸一宿又火煮爛去皮焙乾大黃梔子仁炒各一兩人參赤茯苓酸棗仁去皮蛇黃炒令赤酒浸淬五次各一兩上除別研外搗羅為末一處拌勻煉蜜如梧桐子大每服日午及早食後夜臥用熱水下十五丸至二十丸瀉熱湯治實熱精神不安之病龍膽草酸棗仁微炒黃芩去黑心茯神去木升麻伏龍肝竹茹甘草炙各等分上搗每服三錢水一盞煎至七分去滓食後溫服日三瀉膽湯出永類鈐方治膽實熱及灑灑寒熱腹中氣滿脅下硬口苦咽乾頭疼不欲飲食半夏三兩湯泡去滑生地黃五兩酸棗仁二兩半黃芩一兩遠志去心茯苓各二兩甘草炙一兩上銼散長流水一斗糯米一升煮蟹眼沸揚二三千遍澄清每用水二盞抄藥四錢生薑七片煎七分去滓不以時服流水湯治膽實生熱腹中氣濁飲食不下咽乾頭重灑灑惡寒兩脅脹痛半夏湯洗炒一兩酸棗仁二兩黃芩去黑心五錢赤茯苓一錢山梔子去皮生地黃遠志去心各一兩上除別研外搗篩再拌勻每五錢用東流水二盞入秫米半升姜五片煎一盞去滓溫二服空心食後各一服一方無地黃枳殼湯出聖惠方治膽經有熱腹中氣滿不安咽乾頭重心神驚悸小便不利一名人參湯枳殼去瓤麩炒一兩人參葵子甘草炙各五錢赤茯苓黃芩各三兩上搗篩每服三錢水一盞入生薑三片煎七分去滓溫服不計時服山梔子飲治肝膽邪熱神思不寧喜怒狂躁口苦舌乾山梔子一兩五錢竹茹一兩豆豉一升大青八錢陳皮湯浸去白一兩上搗篩每服三錢水一盞蜜少許煎七分去滓溫服食後臥各一服胡黃連丸出聖惠方治膽熱精神不寧臥起不安口中常苦胡黃連一兩羚羊角屑一兩蛇黃火煅五錢熊膽一分青黛別研一分上為末研令勻用黃牛膽丸如緑豆大每服七丸煎竹葉湯下晚間再服無牛膽以羊膽代膽虛寒附論夫左手關上脈陽虛者足少陽經也為膽虛寒蓋膽虛則生寒寒則其病恐畏不能獨臥口苦善太息嘔宿汁心下憺憺如人將捕之嗌中介介數唾頭眩痿躃足指不能動手指不能搖坐不能起僵仆目視䀮䀮蓋膽虛精神不守其氣上溢循其所在而生病也薯蕷丸出聖惠方治膽虛冷精神不守心多恐懼目暗頭昏四肢不利薯蕷一兩白茯苓二兩決明子三分菟絲子一兩酒浸三日焙乾別研為末天雄一兩炮去皮臍防風三分柏子仁三兩熟地黃一兩人參一兩山茱萸三分黃耆遠志去心桂心酸棗仁各三錢上為末煉蜜丸如梧桐子大每服三十丸溫酒服下中正湯出聖惠方治膽氣不足常多恐懼頭眩痿厥四肢不利僵仆目黃失精一名酸棗散茯苓去皮酸棗仁黃耆羌活各一兩甘菊花熟地黃柏子仁防風各一兩人參白芍藥當歸甘草炙各五錢上搗篩每服三錢水一盞煎至七分去滓溫服不拘時忌生冷豬魚遠志湯一名茯神散治膽經虛冷不能獨臥心下憺憺如人將捕頭昏痿厥目黃失精出聖惠方遠志去心熟地黃各一兩防風人參甘菊花白朮桂去粗皮茯神前胡去蘆各三分枳殼去瓤麩炒五錢上搗篩每服三錢水一盞生薑三片煎七分去滓不拘時服茯苓湯永類鈐方治膽氣虛冷頭眩痛心神恐畏遇事多驚不能獨睡胸中滿悶口苦茯神去木酸棗仁黃耆白芍藥五味子柏子仁各一兩桂心熟地黃酒洗人參甘草炙各半兩上㕮咀每服四錢水一盞姜三片煎七分去滓溫服不拘時服天雄丸治膽虛生寒氣溢胸膈頭眩口苦善太息嘔宿水天雄炮去皮臍人參山芋桂去粗皮黃耆白茯苓去皮防風柏子仁研山茱萸酸棗仁炒各三分上除柏子仁外搗細末與柏子仁和勻煉蜜為劑杵丸如梧桐子大每服三十丸溫酒空心食前下黃耆湯治肝虛膽寒心神不安臥即驚覺目昏心燥四肢不利多恐黃耆銼三分人參檳榔銼白朮百合酸棗仁炒白茯苓去皮麥門冬去心桂去皮附子炮去皮臍上㕮咀每服五錢水一盞半姜五片煎至一盞去滓溫服空心食前下沉香湯治足少陽經不足目眩痿厥口苦嘔水多唾沉香白茯苓去皮黃耆白朮各一兩芎藭熟地黃五味子各三分枳實去瓤麩炒桂去皮各五錢上搗篩每服三錢水一盞姜三片煎七分去滓不拘時服犀角飲治膽受冷精神不安眼昏目暗臥起不定犀角鎊屑一兩羌活去苗一兩酸棗仁炒二分茯神去木三分甘菊花一兩防風三分人參柴胡一兩上搗篩每服五錢水一盞半煎八分去滓溫服人參湯一名酸棗仁湯治膽虛煩勞精神不守奔氣在胸眠臥不起多恐方見酸棗仁湯決明子丸出聖惠方治膽虛冷神思昏沉頭目昏暗決明子天雄炮去皮臍柏子仁菟絲子酒浸三日焙乾別研為末熟地黃枸杞子各一兩上為末煉蜜丸如梧桐子大每服三十丸溫酒空心下晚服膽熱多睡附論夫積熱多睡者膽實清淨決斷所自出今肝膽俱實營衛壅塞則清淨者濁而擾故陰陽不和胸膈多痰臟腑壅滯精神昏憒常欲臥由積熱不除膽氣實故多睡也茯神散出聖惠方治膽熱多睡神思不安昏悶茯神去木麥門冬地骨皮茯苓各一兩一方用黃芩白蘚皮酸棗仁沙參各五錢甘草炙五錢上為末每服三錢水一盞煎六分去滓食後服一方有羚羊角屑麥門冬湯出聖惠方治營衛氣滯精神不足膽熱多睡頭目昏眩麥門冬去心天門冬去心羚羊角鎊各三分木通前胡去蘆大黃各四兩半夏炒甘草炙防風各五錢上搗篩每服三錢水一盞姜三片煎六分去滓食後忌羊血遠志丸治氣昏多睡晝夜不足遠志去心人參山芋防風玄參各二兩五錢苦參鐵粉細研烏頭燒灰存性各三兩上為末煉蜜丸如梧桐子大食後米飲下二十丸再漸加至三十丸人參散出聖惠方治膽熱心神昏悶多睡牛黃一分研羌活三分遠志去心三分升麻五錢麥門冬去心二兩人參三分犀角五錢赤芍藥一兩上為末每服一錢薄荷溫水調下忌豬肉濕面等食後服遠志丸出聖惠方治膽熱多睡遠志去心三分人參一兩馬頭骨三分茯神三分菖蒲五錢硃砂研飛過五錢鐵粉五錢上為末入硃砂等分令勻煉蜜丸如梧桐子大每服十丸食後服木通湯下半夏湯治膽熱精神不守昏悶多睡黃連湯楊子建護命湯治膽熱口苦神昏多睡左手關脈實大宜服此方黃連去須黃芩赤茯苓去皮麥門冬去心升麻各一錢上搗篩每服三錢水一盞煎至七分去滓溫服食後治膽熱多睡出聖惠方馬頭骨灰一兩鐵粉一兩硃砂研水飛過五錢龍骨五分上為末煉蜜丸如梧桐子大每服五丸竹葉湯下食後服酸棗仁湯治膽風毒氣虛不調昏困多睡酸棗仁研生用一兩臘茶生薑汁塗炙焦二兩上搗篩每服二錢水一盞煎七分去滓溫服治多睡本草取白馬頭骨作枕枕之治人嗜眠喜睡本草天鼠目一枚燒作屑魚骨和取二物紗袋子盛貯之熏床外則不眠膽虛不得眠附論夫膽虛不得眠者是五臟虛邪之氣上淫於心心有憂患伏氣在膽所以睡臥缺安心多驚悸精神怯弱蓋心氣憂傷膽虛冷故不得眠也又有大病之後腑臟尚虛營衛未和生於冷熱邪客於陰陰氣虛木氣獨行於陽不入於陰故令不得睡也千里流水湯一名溫膽湯治膽虛不得眠及膽虛頭眩厥足痿指不能搖躃不能起僵仆目黃失精虛勞煩擾因驚膽懾奔氣在胸喘浮腫不睡麥門冬去心半夏湯浸各三兩茯苓四兩酸棗仁炒二升甘草炙桂心黃芩遠志去心萆薢人參各二兩生薑二兩秫米一斗上千里水一斛煮米令蟹目沸揚萬遍澄清取一斗煮藥取二升半分三服一方無生薑酸棗仁丸治膽虛睡不安精神恐怯酸棗仁研二兩人參白朮白茯苓去皮半夏炒乾薑炮各一兩陳皮去白榆白皮銼旋覆花前胡各一兩檳榔五枚上為末煉蜜丸如梧桐子大空心煎棗湯下二十丸加至三十丸茯神散一名遠志湯治膽虛冷目眩頭疼心神恐畏不能獨處胸中滿悶方見遠志湯治煩悶不得眠枸杞生地黃五兩麥門冬甘草前胡各五兩茯苓知母各四兩人參二兩粟米豆豉各五錢上㕮咀水八升煮三升七合分四服人參散出本事方治膽虛常多畏心恐不能獨臥如人捕然頭目不利胸中悶人參枳殼五味子桂心各三分柏子仁熟地黃山茱萸干菊花茯苓枸杞各二兩上細末每服二錢溫酒調服五味子湯出楊子建護命湯治膽虛冷頭痛心中驚悸睡臥不安常如人將捕之精神不守五味子白茯苓去皮人參芎藭遠志去心酸棗仁熟地黃焙麥門冬各一分去心桑寄生五錢上搗篩每服三錢水一盞棗二枚煎七分任意服酸棗仁湯酸棗仁五升人參桂心生薑各三兩石膏茯苓知母各三兩甘草一兩五錢上搗篩水一斗煮酸棗仁取七升去滓下藥煮三升分為三服日三補膽防風湯出本事方治膽虛目暗喉痛數唾眼目眩冒五色所障夢見人訟恐懼面色變青防風一錢人參六分細辛五分芎藭甘草茯苓獨活前胡各三分上搗篩每服四錢水一盞半棗二枚煎八分去滓食前服茯神散出聖惠方治膽虛不得睡神思不安茯神一兩柏子仁五錢酸棗仁炒一兩黃耆一兩人參一兩熟地黃五錢遠志五味子各五錢上為末每服一錢溫酒調下不拘時服溫膽湯出永類鈐方治心膽虛怯觸事易驚夢寐不祥異象感惑遂使心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗四肢浮腫飲食無味心虛煩悶坐臥不安大病後虛煩不得眠此膽寒故也又治驚悸自汗觸事驚畏半夏枳實麩炒各三兩竹茹陳皮各三兩甘草茯苓一兩五錢人參一兩上銼散每服三錢水一盞半姜五片棗二枚煎至八分食前服未效加遠志去心姜妙北五味子各一兩酸棗仁一兩蜂蜜分炒一方無人參用白朮鱉甲丸出聖惠方治膽虛不眠四肢無力鱉甲酸棗仁羌活黃耆牛膝人參五味子各等分上為末煉蜜杵丸梧桐子大每服三四十丸溫酒下忌莧菜酸棗仁丸出衛生寶鑑治膽氣虛熱不睡膽經不足心經受熱心神恍惚恐畏多驚情思不樂時有盜汗虛煩不眠朝瘥暮劇或發眩暈酸棗仁炒地榆各一兩丹砂炒研茯神人參菖蒲各五錢上除丹砂外搗末入丹砂令勻蜜和丸如梧桐子大每服二十丸米飲下不拘時硃砂為衣煎人參湯下酸棗仁煎出聖惠方治膽虛不睡酸棗仁五兩炒取二兩五錢乳香二兩蜜四兩牛黃研一分糯米炒為末二合硃砂五錢研水飛過上用酒一鍾和蜜等一處慢火煎如沸不計時以溫酒調下一茶匙山芋丸治膽虛冷精神不守寢臥不寧頭目昏眩恐畏不能獨處山芋酸棗仁炒各一兩柏子仁茯神山茱萸各三分上為末煉蜜丸如梧桐子大每服三十丸溫酒下米飲亦可不拘時服人參散一名安神散出聖惠方治膽虛睡臥不安多驚悸人參白茯苓各一兩茯神去木一兩丹砂別研五錢上搗為末每服一錢粥飲調下不拘時服一方無茯苓酸棗仁丸出聖惠方治膽虛不得眠酸棗仁微炒地榆各一兩茯神去木一兩上為末煉蜜丸如梧桐子大每服二十丸米飲下無時乳香散治膽虛不得眠精神恍惚乳香研一兩酸棗仁二兩馬頭骨灰一兩上研細末每服二錢溫酒調下不拘時服治膽虛夜不眠出聖惠方用酸棗仁五錢炒黃研末酒三合浸汁先以粳米三合煮作粥候熟下棗仁汁更煮三五滾空心食一方為末每服三錢竹葉湯下輕身少睡調十二經脈利五臟出本草萵苣菜常食之久食之佳治人夜睡言語出本草以靈床下果子食之佳治臥床不寤出本草勿以火照火照之殺但痛齧其踵及足拇指甲際勿側睡仰面即活又井底泥塗目畢令人垂頭於井中呼其姓名便起治從早夜連時不得眠暮以新布瓦火炙以尉目並蒸大豆更番囊盛枕枕冷後更湯熱終夜常枕熱豆即立愈治飲食不得息出本草葶藶子三兩炒令黃搗末以水三升煮大棗三十枚得汁一升內藥中每服如棗大煎取七合頓服酸棗仁湯出本草治驚悸不眠以酸棗仁二升茯苓白朮人參甘草各二兩生薑六兩六物切以水八升煮取三升分四服酸棗仁湯出本草主虛不得眠煩不可寧以酸棗仁二升蝭母乾薑茯苓芎藭各二兩甘草一兩炙並切以水一斗先煮棗煎三升後內五物煮取三升分四服一方加桂一兩膽疸附論夫內經謂有病口苦名曰膽疸夫膽為中正之官中清之腑十一臟之所取決咽為之使若數謀慮不決則膽虛氣上溢而口為之苦臟主藏而不瀉今數謀不斷則清淨者濁而擾矣故氣上溢而其證為是也經所謂是動則病口苦以氣為是動也半夏茯苓湯治謀慮不決膽氣上溢熱口苦神思不爽半夏湯洗去滑炒赤茯苓去皮麥門冬去心酸棗仁桂黃芩去皮遠志去心人參各二兩甘草炙一兩五錢上搗篩每服五錢水一盞半姜五片秫米一匙頭許煎一盞去滓溫服不拘時地骨皮湯治謀慮傷膽膽氣上溢膈脘虛煩常覺口苦地骨皮生地黃各五兩前胡二兩五錢茯神二兩麥門冬去心知母人參甘草炙各二兩上搗篩每服五錢水一盞半入粳粟米各少許同煎一盞去滓溫服不拘時麥門冬湯一名升麻湯治膽虛逆口中常苦煩燥引飲方見升麻湯益膽湯出聖惠方治肝膽俱虛熱氣上熏口中常苦泄熱臟腑因虛致然黃芩甘草炙各二兩人參桂去皮各一兩苦參茯苓去皮各五錢上搗篩每服三錢水一盞半煎七分去滓溫服不拘時梔子湯出聖惠方治腹熱氣逆口苦煩渴梔子仁二十枚升麻黃芩大青茯神去木各二分甘草炙銼五錢上搗篩每服三錢水一盞豉五十粒煎七分去滓入蜜半合更煎三二沸食後溫酒服忌熱面炙爆等物人參湯一名枳殼湯治膽虛氣逆邪熱攻衝口苦煩渴方見枳殼湯
