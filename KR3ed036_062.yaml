body:
  text: 卷六十二咽喉門咽喉生瘡屍咽喉附論夫道家服藥務先去三蟲者以其為人害也屍咽之病一本於此腹中蟲上蝕咽喉能令生瘡或痛如癢如䘌之候者是也善攝生者倘未能除去亦當服藥治之勿使妄動則善矣方黃柏湯治屍咽喉閉塞出瘡及乾嘔頭痛食不下黃柏去粗皮炙半兩升麻木通銼各一兩竹茹二分麥門冬去心焙一兩半玄參一兩前胡去蘆頭大青各三分上粗搗篩每服三錢匕水一盞煎至七分去滓入芒硝末一錢攪令勻溫服如鼻中有瘡以地黃汁少許滴於鼻中三五服不計時候要通利加芒硝不欲利去之金露丸治屍咽喉風熱毒氣上攻咽中癢痛宜含之硃砂一錢白礬一分生用甘草半一兩搗羅為末鉛霜一錢麝香一錢太陰玄精一分蛇蛻皮三條全者去頭以皂莢水浸一復時曝乾炒黃上都研令勻煉蜜和丸如皂莢子大每服於食後及夜臥時用薄綿裹一丸含化咽津治屍咽喉癢痛語聲不出宜服此方五倍子半兩黃柏半兩銼川升麻三分甘草一分炙微赤銼射干半兩上為散每服三錢水一小盞煎至四分去滓不計時候溫服蛇蛻散治屍咽喉疼痛蛇蛻皮白梅肉甘草生用各一分惡實半兩炒上為散每用綿裹一錢匕湯浸潤含化咽津不計時候服治屍咽喉痛方杏仁湯浸去皮尖雙仁炒桂去粗皮各二兩蕪荑仁一兩榧實去皮半兩上為末煉蜜為丸如彈子大含化咽津消盡再用日二三服一捻金散治屍咽喉及走馬喉閉或腦後生癰雄黃研藜蘆豬牙皂莢去皮並子各一兩上為散先含水一口用藥一米許搐鼻內即吐出水少時效杏仁散治屍咽喉內痛欲失聲杏仁湯浸去皮尖雙仁炒研桂去粗皮各二兩蕪荑仁炒一兩上為散每服三一錢匕綿裹含化咽津消盡再用日三五服治屍咽喉癢痛射干一兩薔薇根皮一兩甘草半兩炙微赤銼上為散每服三錢水一中盞煎至六分去滓不計時候溫服治屍咽方用燒履鼻繩為灰暖水服之治咽喉中痛癢吐之不出咽之不入似得蠱毒方用含生薑五十日瘥又方用青布裹麻黃燒筒盛煙熏咽中治屍咽方用燒麻子脂服之治飛屍遊蟲喉中有物吞吐不出方用蚺蛇肉作膾食之狗咽附論夫狗咽者喉中勿覺結塞不通如喉痹狀是也陰陽之氣出於肺循喉嚨而上下若風熱毒氣客於喉間氣結蘊積而生熱故有結塞之候俗云此疾由誤咽狗毛所致治法亦有將飯與狗分食取瘥者禳去之法也方昆布丸治咽喉中壅悶氣塞不通狀如喉痹者昆布洗去鹹味一兩訶黎勒皮二兩檳榔銼一兩松蘿乾薑炮製銼桂去粗皮各一兩海藻洗去鹹味一兩木通銼二兩上為末煉蜜為丸如梧桐子大每服溫酒下二十丸食後臨臥服馬牙硝煎治狗嚥氣塞腫痛氣欲絕者馬牙硝木通銼升麻瞿麥穗犀角屑馬藺子各一兩半射干玄參各一兩上細銼以水五盞煎至一盞半去滓下白蜜二兩再煎成膏每服一匙頭含化咽津玄參散治狗嚥氣塞玄參杏仁湯浸去皮尖雙仁炒甘草炙赤茯苓去黑皮白朮桔梗炒人參各半兩上為散每服二錢匕熱湯調下日三五服丹砂酒治狗咽喉中忽覺結塞丹砂桂去粗皮絳礬各半兩上為末綿裹用好酒少許浸良久含之即瘥二灰散治狗咽纏喉風燈心燒灰炭上白灰白殭蠶直者炒各等分上同研為散生薑蜜水調下一錢匕如聖散治狗咽及咽喉緊急赤芍藥一兩防風去叉三分天麻半兩上為散每服一錢冷茶調下不計時候石膽散治纏喉風及狗咽石膽一錢半燒研白芷一錢為末上研勻細每服半錢匕用溫漿水調下取出涎後轉一兩行瘥雞子法治狗咽半夏一錢末薑汁搜為餅子焙乾研細雞子一枚上先開雞子頭去黃白又盛苦酒一半入半夏末殼中攪令勻安雞子坐於煻灰火中慢煎沸熟取出後稍冷就殼分溫三服之治狗咽喉方用粟米飯三合以手團為一塊與狗分而食之即愈治咽喉忽覺氣塞喘息不通須臾欲絕方用獨顆蒜一枚削去兩頭可塞鼻竅患左塞右鼻患右塞左鼻喉中膿血出立效惡實散治風熱閉塞咽喉腫結用惡實一合半生半炒搗羅為散酒調下一錢匕立瘥一方取生莖葉研塗喉上兼椎一莖令頭破納喉中又方用生鼠黏子為末沙糖為丸噙化又用根切一升以水五升煮取三升去滓分溫三四服忌蒜面如神散一名如聖散治咽喉中忽然結塞不通黃白散治狗咽芒硝研一兩硫黃研一兩上先將芒硝於銚子內熬令沸澄清下硫黃末於銚子內攪令焰出絕傾在新碗內放冷細研如粉每服半錢匕新汲水調下咽喉生谷賊附論夫喉中生谷賊者喉中結腫疼痛不通飲食妨悶此由禾中有短穗誤食之澀搏咽喉如魚鯁不上不下風熱加之則結腫不消若不急療亦能殺人方象牙散治咽喉中生谷賊如鯁狀不上不下疼痛妨悶象牙末一分甘草大者一寸滑石半分綠豆粉二兩鬱金小者一塊乳香研硼砂研麝香研各半兩上為散每服半錢匕新汲水調下五味子湯治咽喉中生谷賊結腫疼痛妨害飲食五味子炒一兩半乾薑炮麥門冬去心焙桂去粗皮各一兩桑根白皮銼炒三兩粳米炒一合上粗搗篩每服三錢匕水一盞煎至五分去滓溫服日三不計時候射干湯治咽喉生谷賊咽物妨悶射干升麻各三兩桔梗銼炒一兩玄參木通銼各三分甘草炙銼半兩上粗搗篩每服三錢匕水一盞入竹葉七片煎至六分去滓食後溫服如要通利加大黃一兩以利為度治咽喉生谷賊腫痛方出聖惠方重臺半兩赤色者木鱉子仁半兩川大黃半兩銼碎微炒馬牙硝半兩半夏一分湯浸洗七遍去滑上為末煉蜜和丸如櫻桃大以綿裹一丸含咽津乳香丸出聖惠方治喉中生谷賊若不急治亦能殺人乳香半分硇砂一分琥珀栺松各半兩上各研為末再同和勻熔白蠟為丸如雞頭大每服一丸含化咽津以瘥為度茯苓散治喉中生谷賊結腫疼痛飲食妨悶赤茯苓貫眾縮砂仁甘草炙等分上為細末乾摻一錢喉中次以水送下治谷賊方出直指方硼砂牙硝等分上細研每服半錢以薄綿裹含咽麻仁散出三因方治谷賊屍咽喉中癢此因誤吞谷芒搶刺癢痛用脂麻炒不以多少為末湯點服凡谷賊屬咽馬喉風屬喉不可不分治谷賊沖咽喉兩頰上齶舌下暴腫咽物妨悶疼痛及咽喉中偏一旁痛用礬石生研為末少少敷腫處以瘥為度有涎即吐之一方用綿裹含咽津如旁痛側臥就痛處含之勿咽又方出聖惠方用針刺破令黑血出後含馬牙硝一小塊咽津即瘥一方用綿裹半錢匕含升麻湯一名黃柏湯治咽喉生谷賊咽物妨悶谷賊方出直指方木鱉子仁川大黃焙牙硝射干山豆根川升麻白藥各等分上為末煉蜜為丸如皂子大以薄綿裹含咽液如神丸一名如聖丸治喉中忽然結塞不通咽喉中如有物妨悶附論夫咽者胃之系故咽主咽物夫氣通於肺故喉主通氣咽喉中妨悶如有物者乃肺胃壅滯風熱搏結客於咽喉使然故聖惠以憂愁思慮氣逆痰結皆生是疾方防風散出聖濟總錄治咽喉中如有物妨悶噎塞胸膈痰滯防風去叉人參白朮獨活去蘆頭草豆蔻去皮各三分天麻芎藭白芷赤茯苓去黑皮各一兩細辛去苗葉高良薑青橘皮甘草炙各半兩京三稜炮銼半一兩厚朴去粗皮生薑汁炙三錢上為散每服三錢匕溫酒調下棗湯亦得日三不拘時候杏仁煎治肺胃壅滯咽喉中如有物妨悶杏仁湯浸去皮尖雙仁炒黃桑根白皮銼炒貝母去心各一兩半生薑汁一合半地黃汁二合半酥半兩大棗六十枚去核紫菀去苗三分甘草炙桔梗炒五味子炒赤茯苓去黑皮地骨皮各一兩人參三分上先研杏仁以水五升濾取汁將草藥細銼同煎至二升以綿濾去滓續下酥及地黃汁慢火煎成膏每食後含一匙頭細細嚥津射干散出聖惠方治咽喉中如有物妨悶噎塞疼痛悶亂咽物不下射干犀角屑川升麻桔梗各三分訶黎勒皮紫蘇子炒赤茯苓枳殼麩炒去瓤檳榔各一兩甘草炙赤銼木通銼木香各一半兩上為粗末每服三錢水一盞煎至八分去滓溫服不計時候木香湯出聖濟總錄治咽喉噎滯如有物妨悶木香陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙半夏生薑汁浸一宿湯洗七遍切焙白朮甘草炙桂去粗皮大腹皮各二半兩黃耆銼人參桔梗炒芍藥各三兩上粗搗篩每服三錢水一盞入生薑一棗大拍碎煎至六分去滓食後熱服日三半夏湯出聖濟總錄治咽喉中如有物妨悶半夏湯洗七遍切焙一兩人參甘草炙銼栝蔞根銼桂去粗皮各三兩石膏一兩一分小麥吳茱萸湯洗焙乾各一兩半赤小豆一分上銼如麻豆大每服五錢匕水一盞半入生薑三片大棗二枚擘破同煎至八分去滓溫服射干散出聖惠方治咽喉中如有物噎塞射干一兩桂心一兩枳殼三分麩炒半夏一分湯洗七遍去滑訶黎勒皮二兩川升麻一兩半木通一兩銼前胡三分去蘆頭大腹皮三分銼上為散每服四錢水一盞入生薑半分煎至六分去滓不計時候溫服含化龍腦丸出聖惠方治咽喉中有物如彈丸日數深遠津液難嚥發渴疼痛即須深針腫結處散盡毒氣龍腦一分細研川升麻一兩甘草半兩炙微赤銼黃耆一兩銼馬牙硝一兩麝香一分細研鍾乳粉一兩川大黃半兩銼碎微炒生地黃五兩取汁上為末入研了藥研令勻以地黃汁相和更入煉了蜜和丸如楝子大不計時候以綿裹一丸含咽以咽喉通利為度人參湯出聖濟總錄治咽喉中如有物噎塞人參甘草炙訶黎勒皮各一兩射干陳橘皮湯浸去白皮焙桂去粗皮烏梅去核各半兩陳曲炒三分上粗搗篩每服三錢匕水一盞煎至六分去滓溫服不計時候服之羚羊角湯出聖濟總錄治咽喉中如有物妨悶食即噎塞不下羚羊角屑赤茯苓去黑皮半夏湯洗七遍去滑炒木通銼射干各半兩倉粟米炒二合桔梗炒一分蘆根銼一兩上粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓食後溫服日三竹皮湯治咽喉中如有物噎塞聲氣不出竹皮甘草炙各一兩人參赤茯苓去黑皮桂去粗皮麻黃去根節先煎掠去沫焙五味子木通銼各三分上粗搗篩每服三錢匕水一盞入生薑半分拍碎煎取六分去滓放溫不計時候日三木香散出聖惠方治咽喉中如有物噎塞不通吞不能入吐不能出木香半兩犀角屑一兩玄參一兩半羚羊角屑一兩桑根白皮一兩半銼川升麻一兩半紫雪一兩射干一兩檳榔一兩上為散每服三錢水一中盞煎至六分去滓不計時候溫服射干湯出聖濟總錄治咽喉中如有物噎塞不下射干升麻紫菀去苗土百合各半兩木通銼一兩桔梗炒赤茯苓去黑皮各三分上粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服如要通利每服加朴硝末一錢匕去滓後入攪勻服黃芩射干湯治咽喉如有物噎塞黃芩去黑心射干各一兩枳殼去瓤麩炒半夏湯洗七遍去滑焙甘草炙銼各三分升麻一兩半桂去粗皮一兩一分上粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服日三絡石湯治咽喉中如有物噎塞絡石紫菀去苗土各半兩升麻射干各三分桔梗炒木通銼赤茯苓去黑皮各一兩上粗搗篩每服五二錢匕水一盞半煎至七分去滓食後溫服如要通利即湯成加芒硝末一錢匕攪勻服之黃耆甘草湯治咽喉似有物噎胸中滿脅下氣上衝飲食減少黃耆甘草炙各一兩半桂去粗皮半兩人參一兩芍藥赤茯苓去黑皮各二兩上㕮咀如麻豆每服五錢匕水一盞半入生薑三片大棗二枚去核同煎至八分去滓納飴糖少許煎化熱服良久以稀粥投之訶黎勒散治咽喉中如有物妨悶噎塞不下食訶黎勒皮三分人參半兩去蘆頭桂心半兩甘草半兩炙微赤銼檳榔半兩陳橘皮半兩湯浸去白瓤麩焙上為散每服三錢水一中盞入生薑半分煎至六分去滓不計時溫服之半夏散治咽喉中