穀不下牙關緊急不省人事雄黃細研白礬飛過藜蘆厚去皮用心並生用豬牙皂角去皮炙黃上各等分為細末每服一豆大各鼻內嗅立效立通散治咽喉閉塞不通蚰蜒陰乾二七條礬半生半燒一分白梅肉炒燥二七枚上為散每用半錢匕吹入喉內或水調下得吐立通消毒散治喉腫當歸荊芥甘草各等分上為末水煎三五錢去滓漱鬱金散治咽喉至重者鬱金四枚二兩白殭蠶鴨嘴膽礬各半兩全蠍兩個山豆根二錢半豬牙皂角去皮雄黃一錢巴豆二七粒用七粒同礬火煅用七粒去油生上為細末每服半錢新汲井花水如兩茶腳多調令稀稠得所時復嚥下如口噤以巴豆油紙捻成條子燒煙嗅鼻自然開口卻以酸黃子醋調用鵝毛拂患處痰涎出為度覺不快更進無害治咽喉閉塞不通含咽牛蒡子半兩馬牙硝半兩甘草半兩生銼上為末煉蜜和丸如半棗大日四五度以新綿裹一丸含咽津妙治咽喉閉不通出聖惠方赤馬糞汁一合生薑汁一合童子小便一合上相和攪令勻徐徐灌入喉中即立通膽礬散出直指方治酒面熱盛咽喉腫結閉塞鴨嘴膽礬半錢全蠍二個上為末以雞羽蘸藥入喉中須臾破開聲出次用生青薄荷研細並水調下候吐出毒涎即愈未吐再服比金散治咽喉閉塞不通白殭蠶直者生用蛇蛻皮燒灰上等分細研為散每服半錢匕摻咽內咽津無妨不計時候硇砂散出聖惠方硇砂馬牙硝各等分上細研令勻用銅箸頭於水中蘸濕搵藥末點於咽喉中又方出聖惠方馬藺花二兩蔓荊子一兩上為散每服不計時候以暖水調下一錢治咽喉閉塞口噤方出聖惠方羌活三兩細研牛蒡子二兩杵羅為末上先以水三大盞煎羌活取一大盞半去滓入白礬去毒丸治一切喉風閉塞咽喉青綠信州者煅微赤胡粉上味等分研為末醋煮麵糊丸如皂子大每服一丸薄荷暖酒磨化下如口不開用白殭蠶末一字吹入鼻內口即開吐下毒立止治風熱閉塞咽喉遍身浮腫方出聖惠方用牛蒡子一合半生半熟杵為末熱酒調下一錢匕立瘥一方搗碎以綿裹二錢熱水浸過含咽津立瘥治咽喉閉塞口噤方出聖惠方用雄雀糞細研每服溫水調灌半錢匕治咽喉閉塞不通出聖惠方用桑上白耳不拘多少搗羅為末以生蜜浸每用半匙綿裹含化旋旋嚥下須臾即通治咽喉閉塞不通甚者宜此方出聖惠方用無患子皮半兩含之微微咽汁即立瘥治咽喉閉塞腫痛水米不通方出聖惠方用蝸牛蟲一枚綿裹水浸含之須臾便通治喉閉垂命不辨人方出聖惠方用銅黃如杏核大熟湯研化灌之立愈治咽喉閉塞喘息不通須臾欲絕方用地龍一條爛研納雞子白相和攪令勻便瀉入口即通又方出聖惠方用豬牙皂莢三梃塗酥炙令黃搗羅為末每服蜜水調半錢治咽閉用臘月豬尾燒末水服之又方用含雞屎白治咽喉疾用臘月豬膽一個同枯礬大黃青黛甘草牙硝為細末入在豬膽內陰乾為細末用一字吹之治喉風腫用鴨嘴膽礬為細末醋煎一二沸呷入口吐即愈如吐不止呷米飲即止青金散治咽喉出儒門事親書用益元散加薄荷青黛生蜜丸如彈子大噙化治咽喉塞鼻中瘡出及乾嘔頭痛食不下方用生雞子一顆開頭取白去黃著米酢拌煻火頓沸起擎下沸定更頓三度成就熱飲酢盡不過一二瘥治喉閉咽塞不通甚者用巴豆去皮針線穿咽入撁出一方用一枚去大皮鑽中心綿裹令有出氣處納於鼻中隨腫左右時時吸氣中立效治喉碧玉散一名羅青散出御藥院方治心肺積熱上攻咽喉腫痛閉塞水漿不下或生喉癤重舌木舌腫脹並可服之方見羅青散如聖湯治咽喉噎塞咳膿血者桔梗二兩甘草炙陳皮半夏薑汁炙各一兩上為粗末每服三錢水一中盞半生薑七片煎至五分去滓溫服食後日三大青煎出聖濟總錄治喉中熱塞及舌上齶生瘡大青黃柏去粗皮蜜炙升麻射干薔薇根各半兩苦竹葉細切一握生地黃半兩玄參一兩天門冬去心焙半兩白蜜二兩上除蜜細研用水三升煎取一升去滓下蜜再煎成膏每服半匙頭含化咽津不計時候治喉閉咽痛用馬勃去膜以蜜揉拌少以水調呷之治咽喉閉塞及噎湯水難下宜服此方用牛涎一大盞入少許鹽攪和頓服立瘥治咽喉閉塞腫痛水米不通方用白礬如棋子大含之須臾便通礬硝散治咽喉閉塞腫痛治一切壅熱咽喉腫閉不能咽物口舌生瘡舌根緊強言不正腮項腫痛蒲黃青黛硼砂焰硝甘草各等分上為細末每用手指捻摻於喉中津咽或冷水送下頻頻咽之治喉中塞以懸鉤莖燒為末服之良
