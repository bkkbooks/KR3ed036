body:
  text: 卷二十四脾臟門脾胃冷熱不和附論夫體弱之人穀氣不足脾胃既虛冷熱之氣易為傷動蓋脾胃者倉廩之官布化精氣灌養四旁其氣虛弱則食飲或冷或熱多致不消使陰陽交爭冷熱相搏故令脾胃不和也方沉香阿魏丸治脾胃冷熱氣不和食毒脾胃中宿積沉香木香各三分芎藭當歸銼焙蓬莪朮炮陳橘皮去白焙延胡索檳榔銼吳茱萸醋浸一宿炒益智仁桂去粗皮白朮附子炮裂去皮臍乾薑炮草豆蔻去皮各半兩阿魏一兩半瓷器中醋浸一宿絹濾去砂入面煮糊上搗羅十五味為細末用阿魏糊搜和杵二三百下丸如梧桐子大丹砂為衣生薑橘皮湯下五七丸血氣溫酒醋湯下前胡湯治脾胃冷熱氣不和平胃前胡去蘆頭人參白茯苓去黑皮附子炮裂去皮臍白朮半夏生薑汁浸一宿並生薑杵令勻焙乾枇杷葉拭去毛厚朴去粗皮生薑汁塗炙透訶黎勒紙裹煨熟去核各一兩半肉豆蔻去殼檳榔銼陳橘皮湯浸去白焙乾薑炮甘草炙各三分上銼如麻豆大每服三錢匕水一盞入生薑一大片切棗二枚擘破同煎至七分去滓不計時溫服忌生冷油膩飴糖藿香湯出聖惠方治脾胃冷熱氣不和胸膈滿悶四肢無力痰逆不思飲食藿香葉半兩訶黎勒皮煨半兩陳橘皮湯浸去白焙三分人參三分半夏湯洗七遍去滑焙半兩赤茯苓去黑皮三分桂去粗皮三分白朮三分草豆蔻去皮一兩枳實去瓤麩炒半兩高良薑三分甘草炙銼半兩厚朴去粗皮塗生薑汁炙令黃香熟上粗搗篩每服三錢匕水一盞入生薑半分切棗三枚擘破煎至七分去滓不計時稍熱服忌生冷油膩飴糖白豆蔻丸出聖惠方治脾胃冷熱氣不和心腹㽲痛嘔逆不欲飲食四肢少力白豆蔻三分去皮黃耆半兩銼赤茯苓半兩乾薑半兩炮裂銼桂心半兩白朮半兩當歸半兩銼微炒半夏半兩湯浸七遍去滑人參三分去蘆頭附子半兩炮裂去皮臍陳橘皮半兩湯浸去白瓤焙甘草半兩炙微赤銼上件藥搗羅為末煮棗肉和搗三二百杵丸如梧桐子大每服不計時候以生薑湯下二十丸忌生冷油膩飴糖白朮散出聖惠方治脾胃冷熱氣不和腹脅脹悶少思飲食白朮一兩草豆蔻一兩去皮檳榔一兩甘草半兩炙微赤銼桂心三分桔梗一兩去蘆頭人參一兩去蘆頭前胡三分去蘆頭赤茯苓三分枳實半兩麩炒微黃訶黎勒一兩煨用皮上件藥搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服桔梗丸出聖惠方治脾胃冷熱氣不和胸膈腹脅脹滿不能飲食桔梗一兩去蘆頭白朮一兩檳榔一兩甘草半兩炙微赤銼桂心三分乾薑半兩炮裂銼人參一兩去蘆頭前胡三分去蘆頭麥糵三分炒微黃陳橘皮一兩湯浸去白瓤焙厚朴三兩去粗皮塗生薑汁炙令香熟上件藥搗羅為末煉蜜和搗三百杵丸如梧桐子大不計時候以薑棗湯下二十丸人參湯出聖惠方治脾胃冷熱氣不和胸膈不利三焦閉塞人參一兩去蘆頭赤茯苓一兩桂心一兩乾薑半兩炮裂銼訶黎勒一兩煨用皮細辛半兩川大黃一兩細銼微炒枳殼一兩麩炒微黃去瓤赤芍藥一兩檳榔一兩甘草半兩炙微赤銼上件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大不計時候以生薑湯下二十丸忌生冷油膩濕面草豆蔻散出聖惠方治脾胃冷熱氣不和胸中滿悶不能下飲食四肢少力草豆蔻三分去皮赤茯苓三分甘草半兩炙微赤銼人參半兩去蘆頭白朮半兩桂心三分陳橘皮半兩湯浸去白瓤焙枳殼三分麩炒微黃去瓤半夏三分湯浸七遍去滑厚朴三分去粗皮塗生薑汁炙令黃香熟上件藥搗篩為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩飴糖丁香散出聖惠方治脾胃冷熱氣不和心腹虛脹痰逆不思飲食四肢無力丁香乾薑炮白朮各半兩赤茯苓去黑皮人參木瓜去瓤切焙草豆蔻去皮訶黎勒煨用皮茅香花各三分錢甘草炙一分錢上為細散不計時煎生薑棗湯調下一錢匕忌生冷油膩濕面神麯丸出聖惠方治脾胃冷熱氣不和心腹㽲痛脅肋氣滯不思飲食四肢無力神麯一兩微炒令黃色乾薑半兩炮裂銼檳榔一兩甘草半兩炙微赤銼桂心半兩陳橘皮半兩湯浸去白瓤焙附子半兩炮裂去皮臍人參三分去蘆頭當歸三分銼微炒上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大不計時候以生薑橘皮湯下二十丸訶黎勒丸出聖惠方治脾胃冷熱氣不和心腹痛不欲飲食訶黎勒三分煨用皮白朮半兩木香三分甘草半兩炙微赤銼陳橘皮半兩湯浸去白瓤焙乾薑半兩炮裂銼芎藭三分當歸三分銼微炒縮砂半兩去皮上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大不計時候以薑棗湯下二十丸勻氣湯治脾胃冷熱氣不和痰逆不思飲食厚朴去粗皮生薑汁炙一兩陳橘皮湯去白焙半兩白朮半兩甘草炙一兩沉香一分甘松一分白茯苓去黑皮半兩麥糵炒半兩高良薑炒一分上粗搗篩每服三錢匕水一盞入生薑三二片棗二枚擘破同煎至七分去滓不計時溫服快活丸治脾胃冷熱相攻胸膈氣悶消痰進食五味子炮炒一兩糯米炒香熟一兩半京三稜炮半兩檳榔銼半兩枳殼去瓤微炒一兩半蓬莪朮炮半兩郁李仁湯浸去皮半兩青橘皮湯浸去白瓤焙一兩上為細末用半夏一兩生薑一二兩爛煮研細為糊丸如緑豆大每服十五丸至二十丸食後溫湯下和中丸治脾胃冷熱氣不和寬中脘附子炮裂去皮臍甘草炙木香各一兩蘹香子炒一兩乾薑炮三兩沉香銼半兩藿香葉半兩青橘皮湯浸去白瓤焙半兩上為細末湯浸炊餅和丸如櫻桃大每服一丸用白湯化下食前服硇附丸經效濟世方治脾胃冷熱虛滯積氣疼痛黑附子大者一個從臍下剜如甕留一分厚真硇砂在內須至藥滿卻用剜出末碾細稱得多少用白麵與前藥末一般水搜作餅片裹附子硇砂先飛過上用炭三四斤於平地生火令地赤熱卻攤周圍七寸安附在中時時轉動令里者藥面焦赤皆勻入於木臼杵半日面附皆細後入木香末半錢陳橘皮末半錢旋旋滴水杵和勻丸如梧桐子大每服五丸空心及晚食前用淡薑湯放溫服久服更無疼痛嘔酸之類大腹皮湯出聖惠方治脾胃氣冷熱不和胸膈氣滯不下飲食宜服大腹皮銼炒微黃檳榔銼桑根白皮銼各半兩訶黎勒皮煨陳橘皮湯浸去白焙赤茯苓去黑皮炒三分上粗搗篩每服三錢匕以水一盞入生薑半分切煎至七分去滓不計時溫服勝金丸治脾胃冷熱氣不和不思飲食或腹痛㽲刺山梔子仁烏頭各等分上生搗羅為細末以酒糊丸如梧桐子大每服十五丸炒生薑湯下如小腸氣痛炒蘹香子酒下二十丸治腹冷不調本草以筋子根酒飲磨服飲食勞倦附論夫人之百病皆由喜怒不節飲食失宜寒溫不適勞役所傷以致中氣有虧而五臟六腑之氣皆不足也由是而陰陽二證生焉其外傷風寒是天之邪氣感則傷人筋骨風從上受之風傷筋寒傷骨有形之物受病也系在下焦腎肝是也腎肝地之氣既絶於內肝主筋腎主骨故得病則筋骨痠疼筋骨之絶是腎肝之本亦絶乃有餘之病當瀉不當補其內傷飲食則水穀之寒食感則害人六腑濕從下受之脾胃之氣不足而反下行極則衝脈之火逆而上是無形之元氣受病系在上焦上焦者乃心肺是也心肺天之氣既絶於外心主榮肺主衛營衛周身在於皮毛之間故得病則亦惡風寒營衛失守皮膚之間無陽以滋養是心肺之本亦絶乃中氣不足之病當補不當瀉世俗往往將中氣不足之證誤作外感風寒有除客邪之病不知表之虛實而重瀉其表使營衛雙絶安得不至於死不可不辨外傷寒邪者其熱也翕翕拂拂然發於皮毛之上皮膚腠理陽之分寒邪中之郁遏陽分不得伸故發熱而鼻塞心煩悶稍稍裸露皮膚明其熱在外也其惡寒也雖重衣下幕逼近烈火一日一時增加愈甚必傳入里作下證乃罷此其證也內傷飲食及勞役所傷者其熱也蒸蒸而燥上衝頭頂傍徹皮毛蓋為腎間受脾胃下流之濕氣閉塞致陰火上行故渾身躁熱近寒涼則已明其熱在內也其惡寒也但見風見寒或居陰寒無日處便惡無有間斷一避風寒或添衣而覆被其所惡則不見實表則已此其證也況內傷亦有頭痛項強腰痛與太陽表證相似余則不同內傷飲食發熱則汗出外傷風寒則不汗出得汗乃解尤當詳審用藥也內傷飲食勞役病手心熱手背不熱病在內也外傷風寒病則手背熱手心不熱病在外也內傷飲食及勞役必口失五味必腹中不利欲言強答口多沫唾鼻中清涕或有或無此陰證也外傷風寒必鼻塞氣不利而清涕聲雖壅口必和此陽證也內經云鼻者肺之候外傷風寒則鼻為不利口者坤土也飲食失節勞役所得則口不知味又云傷食惡食傷寒惡寒是也外傷風寒則氣壅盛而有餘者蓋心肺元氣無減損又添邪氣助之使鼻氣壅塞不利並從口出發言前輕後重聲壯有力故曰氣勝有餘之病也內傷飲食及勞役則短氣少氣上喘而不足蓋心肺之氣先損為熱所傷熱既傷氣使四肢無力氣怯聲低不欲言語故曰氣少不足之病也內傷則頭痛有時而作有時而止外傷則頭痛常常有之直傳入里方罷內傷則心肺之氣為脾土濕熱所乘脾主四肢必四肢沉重怠惰嗜臥經云熱傷氣熱則骨消筋緩是也外傷則腎肝氣絶為寒邪所傷腎主骨為寒肝主筋為風必筋骨痠疼著床倚枕不能搖動經云寒傷形寒則筋攣骨痛是也外傷不能食而不惡食口知五味心氣和脾氣通故也內傷不能食而惡食口失五味心氣絶脾氣損故也外傷風寒二三日谷消水去邪入里則有渴內傷飲食久病者濕氣流在血脈中則不渴若勞役形質傷之重者心火熾上克肺金則渴矣胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾虛而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削即食㑊也叔和謂多食亦飢虛此之謂也夫飲食不節則胃病胃病則氣短精神少而生大熱有時顯火上行獨燎其面面熱足陽明病胃病則脾無所稟受脾為死陰不主時也故亦從而病焉形體勞役則脾病則怠惰嗜臥四肢不收大便泄瀉脾既病則胃不能獨行津液故亦從而病焉大抵脾胃虛弱陽氣而不能生髮是春夏之令不行五臟之氣不生脾病則下流乘腎土剋水則骨乏無力是為骨蝕令人骨髓空虛足不能履地是陰氣重疊此陰盛陽虛之證汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言其汗者非正發汗也為助陽也夫胃病其脈緩脾病其脈遲若人當臍中有動氣按之牢若痛乃火乘土位其脈洪緩更有身弱心中不便之證此陽氣衰弱不能生髮不當於五臟中用藥法治之當從臟氣法時論中升降浮沉補瀉法用藥耳如脈緩怠惰嗜臥四肢不收或大便泄瀉此濕勝從平胃散若脈弦氣弱自汗四肢發熱或大便泄瀉或皮毛枯槁發脫落從黃耆建中湯脈虛而血弱於四物湯中摘一味或二味以本顯證中加之或真氣虛弱及氣短脈弱從四君子湯或小便祕澀赤黃多少從五苓散去桂摘一二味加正藥中以上五藥當於本證中隨所兼見證加減假令表虛自汗春夏加黃耆秋冬加桂如腹中急縮或脈弦加防風急甚加甘草腹中窄狹或氣短者亦加之腹滿氣不轉者勿加雖氣不轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹中夯悶此非腹脹乃散而不收可加芍藥收之如肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及縮急者去之即諸酸澀藥亦不可用腹中痛者加甘草白芍藥稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙法也腹痛兼發熱加黃芩惡寒或腹中覺寒加桂怠惰嗜臥有濕胃虛不能食或沉困或泄瀉加蒼朮自汗加白朮小便不利加茯苓渴亦加之氣弱者加白茯苓人參氣盛者加赤茯苓縮砂仁腹氣不能轉運有熱者微加黃連心煩亂亦加之小便少者加豬苓澤瀉汗多津液竭於上勿加之是津液還入胃中欲自行也不渴而小便閉塞不通加炒黃柏知母小便澀者加滑石炒小便淋瀝者加澤瀉且五苓散治渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血證用炒黃柏知母以除腎中燥熱竅不利而淋加澤瀉炒滑石只竅不利者六一散中加木通亦可其心臟熱者用錢氏方中導赤散中滿或但腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣短小便利者四君子湯中去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半腹中刺痛或周身刺痛者或裡急者腹中不寬快者是也虛坐而大便不得者皆血虛也血虛則裡急或血氣虛弱而目睛痛者皆加當歸身頭痛者加川芎若只頭痛者加細辛此少陰頭痛也發脫落及臍下痛加熟乾地黃調理脾胃虛弱於此五藥中加減如五臟證中互顯一二證各對證加藥無不驗然終不能使人完復後或有因而再至者亦由督任沖三脈為邪皆胃氣虛弱之所致也法雖依證加減執方料病不依素問法度耳是以檢討難素及黃帝針經中說脾胃不足之源乃陽氣不足陰氣有餘當從六氣不足浮沉升降法隨證用藥治之蓋脾胃不足不同餘臟無定體故也其肝心肺腎有餘不足或補或瀉惟益脾胃之藥為切經言至而不至是為不及所勝妄行所生受病所不勝乘之也至而不至者謂從後來者謂之虛邪心與小腸來乘脾胃也脾胃脈中見浮大而弦其病或煩躁悶亂或四肢發熱或口乾舌乾咽乾蓋心主火小腸主熱來乘土位乃濕熱相合故煩躁悶亂也四肢者脾胃也火乘之故四肢發熱也飲食不節勞役所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾病人自以為渴醫者治以五苓散謂止渴燥而反加渴燥乃重竭津液以至危亡經云虛則補其母當於心與小腸中以補脾胃之根蒂也甘溫之藥為之主以苦寒之藥為之使以酸味為之臣佐以甘辛心主緩急食酸以收之心火旺則肺金受邪金虛則以酸補次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是治其本也所勝妄行者言心火旺能令母實者肝木也肝木旺則火之勢無所畏懼而妄行也故脾胃先受之或身體沉重走注疼痛蓋濕熱相搏而風熱鬱而不得伸附著於有形也或多怒若風熱不陷於地中或目病而生內障者脾裹血胃主血心主脈脈者血之府也或云心主血又云肝主血肝之竅開於目也或妄聞起妄心夜夢亡人四肢滿閉轉筋皆肝木火盛而為邪也或生痿或生疸或生厥或中風或生惡瘡或作腎痿或為之上熱下寒為邪不一皆風熱不得上升而木火遏於有形中也所生受病者言肺受土火木之邪而清肅之氣傷或胸滿少氣短氣者肺主諸氣五臟之氣皆不足而陽道不行也或咳嗽寒熱者濕熱乘其內也所不勝乘之者水乘木之妄行而反來侮土故腎入心為汗入肝為泣入肺為涎入脾為痰為嗽為涕為嚏為水出鼻也一說下元土盛剋水致督任沖三脈盛火旺煎熬令水沸騰而乘脾肺故痰涎唾出於口也下行為陰汗為外腎冷為足不任身為腳下隱痛或水附木勢而上為眼澀為眵為淚此皆由肺金之虛而病於外也夫脾胃不足皆為血病是陽氣不足陰氣有餘故九竅不通諸陽氣根於陰血中陰血中受火邪則陰盛陰盛則上乘陽分而陽道不行無生髮升騰之氣也夫陽氣走竅者也陰氣附形質者也如陰氣附於土陽氣升於天則各安其分也今所立方中有辛甘溫藥者非獨用也復有甘苦大寒之劑亦非獨用以火酒二製為之使引苦甘寒藥至頂而復入於腎肝之下此所謂升降浮沉之道自偶而奇奇而至偶者也陽分奇陰分偶瀉陰火以諸風藥升發陽氣以滋肝膽之用是令陽氣生上出於陰分末用辛甘溫藥按其升藥使大發散於陽分也而令走九竅經云食入於胃散精於肝淫氣於筋食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府且飲食入胃先行陽道而陽氣升浮也浮者陽氣散滿皮毛升者充塞頭頂則九竅通利也若飲食不節損其胃氣不能克化散於肝歸於心溢於肺食入則昏冒欲睡得臥則食在一邊氣暫得舒是以知升發之氣不行者此也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺病人飲入胃遽覺至臍下便欲小便由精氣不輸於脾不歸於肺則心火上攻口燥咽乾是陰氣太盛其理甚易知也況脾胃病則當臍有動氣按之牢若痛有是者乃脾胃虛無是則非也脾胃不足是火不能生土而反亢拒此至而不至是為不及也白朮君人參臣甘草佐芍藥佐黃連使黃耆臣桑白皮佐諸風藥皆是風能勝濕也諸甘溫藥亦可心火亢盛乘於脾胃之位亦至而不至是為不及也芍藥佐石膏佐黃連君知母佐黃柏臣甘草使生地黃臣黃芩佐肝木妄行胸脅痛口苦舌乾往來寒熱而嘔多怒四肢滿閉淋溲便難轉筋腹中急痛此所不勝乘之也羌活佐防風臣升麻使柴胡君獨活佐芍藥臣甘草臣白朮佐茯苓佐豬苓臣澤瀉佐肉桂臣藁本臣川芎以下佐細辛蔓荊子白芷石膏黃柏知母滑石肺金受邪由脾胃虛弱不能生肺乃所至受病也故咳嗽氣短氣上皮毛不能禦寒精神少而渴情慘慘而不藥皆陽氣不足陰氣有餘是體有餘而用不足也人參君白朮佐白芍藥佐橘皮臣青皮以破滯氣黃耆臣桂枝佐桔梗引用桑皮佐甘草諸酸之藥皆可木香佐檳榔佐五味子佐以上三味除客氣腎水反來侮土所勝者妄行也作涎及清涕唾唾多溺多而惡寒者是也土火復之及三脈為邪則足不任身足下痛不能踐地骨乏無力喜睡兩足冷腹隱隱而痛妄聞妄見腰脊背皆痛白朮臣蒼朮佐川烏頭臣乾薑君肉桂佐去皮少許茯苓佐澤瀉使豬苓佐附子佐炮少許夫飲食入胃陽氣上行津液與氣入於心貫於肺充實皮毛散於百脈脾稟氣於胃而澆灌四傍榮養氣血者也今飲食損胃勞倦傷脾脾胃虛則火邪乘之而生大熱當先於心分補脾之源蓋土生於火兼於脾胃中瀉火之亢甚是先治其標後治其本也且濕熱相合陽氣日已虛陽氣虛則不能上升而脾胃之氣下流併入腎肝是有秋冬而無春夏春主升夏主浮則人之肝心應之弱則陰氣盛故陽氣不得經營陽本根於陰惟瀉陰中之火味薄風藥升發以伸陽氣則陰氣不病陽氣生矣假令不能食而肌肉削乃本病也其右關脈緩而弱本脈也而本部本證脈中兼見弦脈或見四肢滿閉淋溲便難轉筋一二證此肝之脾胃病也當於本經藥中加風藥以瀉之本部本證脈中兼見洪大或見肌熱煩熱面赤而不能食肌肉削一二證此心之脾胃病也當於本經藥中加瀉心火之藥本部本證脈中兼見浮澀或見氣短氣上喘咳痰盛皮澀一二證此肺之脾胃病也當於本經藥中兼瀉肺之藥及補氣之藥本部本證脈中兼見沉細或見善恐缺之證此腎之脾胃病也當於本經藥中加瀉腎水之浮及瀉陰火伏熾之藥病有逆從治有反正除四反治法不須論之惟有陽明厥陰不從標本從乎中也假如時在長夏於長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名補脾胃瀉陰火升陽湯升陽益胃湯之類方在脾胃俱虛類君臣佐使法有毒無毒所治為主主病者為君佐君者為臣應臣者為使一法力大者為君凡藥之所用皆以氣味為主補瀉在味隨時換氣氣薄者為陽中之陰氣厚者為陽中之陽味薄者為陰中之陽味厚者為陰中之陰辛甘淡中熱者為陽中之陽辛甘淡中寒者為陽中之陰酸苦鹹之寒者為陰中之陰酸苦鹹之熱者為陰中之陽夫辛甘淡酸苦鹹乃味之陰陽又為地之陰陽也溫涼寒熱乃氣之陰陽又為天之陰陽也氣味生成而陰陽造化之機存焉一物之內氣味兼有一藥之中理性具焉主對治療由是而出假令治表實麻黃葛根表虛桂枝黃耆裡實枳實大黃裡虛人參芍藥熱者黃芩黃連寒者乾薑附子之類為君君藥分兩最多臣藥次之使藥又次之不可令臣過於君君臣有序相與宣攝則可以御邪除病矣如陽脈澀陰脈弦法當腹中急痛以芍藥之酸於土瀉木為君飴糖炙甘草甘溫補脾養胃為臣水挾木勢亦來侮土故脈弦而腹痛肉桂大辛熱佐芍藥以退寒水薑棗甘辛溫發散陽氣行於經脈皮毛為使建中之名於此見焉有緩急收散升降浮沉澀滑之類非一也皮毛肌肉之不伸無大熱不能食而渴者加葛根半兩燥熱及胃氣上衝為衝脈所逆或作逆氣而裡急者加炒黃柏知母覺胸中熱而不渴加炒黃芩如胸中結滯氣澀或有熱病者亦各加之如食少而小便少者津液不足也勿利之益氣補胃自行矣氣弱氣短者加人參入升陽之劑助陽尤勝加人參惡熱發熱而躁渴脈洪大白虎湯主之或喘者加人參如渴不止寒水石石膏各等分少少與之即錢氏方中甘露飲主身大熱而小便數或上飲下溲此燥熱也氣燥加白葵花血燥加赤葵花如脈弦只加風藥不可用五苓散如小便行病增者此內燥津液不能停當致津液加炒黃柏赤葵花心下痞悶者加黃連一黃芩三減諸甘藥不能食心下軟而痞者甘草瀉心湯則愈喘滿者加炙厚朴小便不利者不可加之為禁藥也胃虛弱而痞者加甘草喘而小便不利者加苦葶藶氣短氣弱而腹微滿者不去人參去甘草加厚朴然不若苦味泄之而不令大便行如腹微滿者而氣不轉加之中滿者去甘草倍黃連加黃柏更加三味五苓散少許此病雖宜升宜汗如汗多亡陽加黃耆四肢肌熱煩熱與羌活柴胡升麻葛根甘草則愈鼻流清涕惡風或頂背脊膂強痛羌活防風甘草等分黃耆加倍臨臥服之有大熱脈洪大加苦寒劑而熱不退者加石膏如脾胃中熱加炒黃連甘草凡治此病脈數者當用黃柏或少加黃連以柴胡蒼朮黃耆甘草更加升麻得汗出則脈必下乃火鬱則發之也如證退而脈數不退不洪大而疾有力者多減苦藥加石膏如大便軟或泄者加桔梗食後服之此藥誤用則其害非細用者旋旋加之如食少者不可用石膏石膏善能去脈數疾病退脈數不退者死不治如不大渴亦不可用如脈弦而數者此陰氣也風藥升陽以發火鬱則脈數峻退矣風寒汗出肩背痛中風小便數而缺者風熱乘其肺使肺氣鬱甚也當瀉風熱以通氣防風湯主之小便遺失者肺氣虛也宜安臥養氣禁勞役以黃耆人參之類補之不愈當責其熱加黃柏生地黃肩背痛不可回顧此手太陽氣鬱而不行以風藥散之如脊痛項強腰似折項似拔上衝頭痛此足太陽經不行也以羌活勝濕湯主之如腿腳沉重無力者加酒洗漢防己半錢輕則附子重則川烏頭少許以為引用而行經也如臥而多驚小便淋溲者邪在少陽厥陰亦用太陽經藥更加柴胡半錢如淋加澤瀉半錢此下焦三經風寒合病也腎肝之病同一治法俱在下焦非風藥行經不可也如大便後有白膿或只便白膿者因勞役氣虛傷大腸也以黃耆人參湯補之如裡急頻見者血虛也加當歸如肺脹膨膨而喘咳胸膈氣滿壅盛而上奔者多加五味子人參次之麥門冬又次之黃連少許甚則交兩手而瞀者真氣大虛也若氣短加黃耆五味子人參氣盛加五味子人參黃芩荊芥穗冬月去荊芥穗加草豆蔻仁如嗌痛頷腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活防風甘草藁本通其經血加黃芩黃連消其腫以人參黃耆益其元氣而瀉其火邪如脈緊者寒也或面黃善嚏或面白色惡皆寒也亦加羌活等四味當瀉足太陽不用連芩少加附子以通其脈面色白多悲恐者更加桂附如便白膿少有滑頻見汙衣者氣脫加附子皮甚則加米穀如氣澀者只以甘藥補氣當安臥不動以養其氣夫脾胃虛弱必上焦之氣不足遇夏天氣熱甚損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故或熱厥而陰虛或寒厥而氣虛口不知味目中溜火而視物䀮䀮無所見小便頻而數大便難而結祕胃脘當心而痛兩脅痛或急縮臍平周圍如繩束之急甚則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌強腰背胛眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若陰氣覆在皮毛之上皆天氣之熱助本病也乃庚大腸辛肺金為熱所乘而作當先救元氣理落庚辛之不足以黃耆人參湯主之如心痞悶加黃連二分或三分如胃脘當心痛減大寒藥加草豆蔻仁五分如脅下痛或縮急加柴胡二分或三分如頭痛目中溜火加黃連二分或三分川芎三分如頭目不清利上壅下熱加蔓荊子三分藁本二分細辛一分川芎三分生地黃二分如氣短精神如夢寐之間困乏無力加五味子九個如大便澀滯隔一二日不見者致食少食不下血中伏火而不得潤也加當歸身生地黃各半錢桃仁三枚麻子仁泥五分如大便通所加之藥勿再服如大便又不快利者勿用別藥少加大黃煨半錢如不利者非血結血祕而不通也是熱則生風其病人必顯風證單血藥不可服加之常服人參黃耆湯藥只用羌活半兩防風半兩二味㕮咀以水四盞煎至一盞去滓空心服之其大便必大走也一服便止如胸中氣滯加青皮一分或二分並去白橘皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之如氣太滯甚或補藥太過或病人心有憂愁鬱結之事更加木香二分或三分白豆蔻仁二分縮砂仁二分或三分如腹痛不惡寒者加白芍藥半錢黃芩二分卻減五味子脾胃虛弱遇六七月間河漲霖雨諸物皆潤溽汗沾衣身重短氣甚則四肢痿軟行步不正腳軟眼黑欲倒此腎水與膀胱俱竭之狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則止津液則七神無所依津液相成神乃自生津者庚大腸所主三伏之義為庚金受囚也若止津液汗大泄濕令亢甚則清肅之氣止燥金受囚風木無可以制故風濕相搏骨節煩疼一身盡痛亢則害承乃制是也五月常服五味子是瀉丙火補庚大腸益五臟之元氣壬膀胱之寒已絶於巳癸腎水已絶於午今更逢濕旺助熱為邪西方北方之寒清絶矣聖人立法夏月宜補者補天真元氣非補熱火也令人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也人參之甘補元氣瀉熱火也麥門冬之苦寒補水之源而清肅燥金也五味子之酸以瀉火補庚大腸與肺金也當此之時無病之人亦或有二證或避暑熱納涼於深堂大廈得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室陰寒所遏使周身陽氣不得伸越意多以大順散主之是也若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥熱惡熱捫之肌膚火熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯主之潔古云動而得之為中熱靜而得之為中暑中暑者陰證當發散也中熱者陽證為熱傷元氣非形體受病也若虛損脾胃有宿痰之人遇此天暑將理失所違時化必困乏無力懶語氣短氣弱氣促似喘非喘骨乏無力其形如夢寐朦朦如煙霧中不知身所有也必有汗泄若風犯汗眼皮膚必搐項筋皮枯毛焦身體皆重支節時有煩疼或一身盡痛或渴或不渴或小便黃澀此風濕相搏也頭痛或頭重上熱壅盛口鼻氣短氣促身心煩亂有不生之意情思慘淒此陰勝陽之極也病甚則傳腎肝之為痿厥者四肢如在火中為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥則腹中有熱為脾主四肢故也若肌肉濡潰痹而不仁傳為肉痿證證皆有肺疾用藥之人當以此調之氣上衝胸皆厥證也痿者四肢痿軟而無力也其心煩冤不止厥者氣逆也甚則大逆故曰厥逆其厥痹多相須也於黃耆人參五味子麥門冬湯中每服加白茯苓二分澤瀉四分豬苓一分白朮一分如小便快利不黃澀者只加澤瀉二分與二術上下分消其濕如行步不正腳膝痿弱兩足欹側者已中痿邪加酒洗黃柏知母三分或五分令二足湧出氣力矣如汗大泄者津脫也急止之加五味子六個炒黃柏五分炒知母三分不令妨其食當以意斟酌若妨食則止候食進則再服三里氣衝以三稜針出血若汗不減不止者於三里穴下三寸上廉穴出血禁酒濕面夫痿者濕熱乘腎肝也當急去之不然則下焦元氣竭盡而成軟癱必腰下不能動心煩冤而不止也若身重減氣不短小便如常及濕熱之令退時或所增之病氣退者不用五味子澤瀉茯苓豬苓黃柏知母蒼朮白朮之藥只依本病中證候加減常服藥亦須用酒洗黃柏二分或三分如更時令清燥之氣大行加辛溫瀉之若濕氣盛風證不退眩暈麻木不已除風濕羌活湯主之夫脈弦洪緩而沉按之中之下得時一澀其證四肢滿閉肢節煩疼難以屈伸身體沉重煩心不安忽肥忽瘦四肢懶倦口失滋味腹難舒伸大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血見白膿胸滿短氣膈咽不通或痰嗽稠黏口中沃沫食入反出耳鳴耳聾目中流淚視物昏花胬肉紅絲熱壅頭目不得安臥嗜臥無力不思飲食調中益氣湯主之氣虛身熱得之傷暑熱傷氣故也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯髓虛足不任身發為骨痿者生於大熱也此溫熱成痿令人骨乏無力故治痿獨取於陽明時當長夏濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作胸滿氣促肢節沉痛或氣高而喘身熱而煩心膨閉小便黃而數大便溏而頻或痢出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲遲緩雖互換少差其天暑濕令則一也宜以清燥之劑治之陽氣者衛外而為固也是則氣泄令暑邪干衛故身熱自汗以黃耆甘溫補之為君人參橘皮當歸甘草甘微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根甘苦平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏苦辛寒借甘味瀉熱補水虛者滋其化源以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯此病皆由飲食勞倦損其脾胃乘天暑而病作也但藥中犯澤瀉豬苓茯苓燈草通草木通淡滲利小便之類皆從時令之旺氣以瀉脾胃之客邪而補金水之不及也此方正是從權而立之者若於無時病濕熱脾旺之證或小便已數腎肝不受邪者誤用之必大瀉真陰竭絶腎水先損兩目也心火乘脾乃血受火邪而不能外發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以益真陰脾胃不足之證須少用升麻乃足陽明太陰引經之藥也使行陽道自脾胃中右遷少陽行春令生化萬物之根蒂也更少加柴胡使諸經右遷生髮陰陽之氣以滋春之和氣也脾虛緣心火亢甚而乘其土也其次肺氣受邪為熱所傷必須用黃耆最多甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損其元氣也上喘氣短懶語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣甘草最少恐資滿也若脾胃之急痛並脾胃大虛腹中急縮腹皮急縮者卻宜多用之若從權加升麻以引之恐左遷之邪堅盛猝不肯退反行陰道故使引陽道上行若中滿者去甘草咳甚者去人參如口乾嗌乾者加葛根血虛加人參補之陽旺則能生陰血也更加當歸和血又宜加黃柏以救腎水蓋甘寒瀉熱火火減則心氣平安如煩亂猶不能止少加黃連以去之如氣浮心亂則以硃砂安神丸鎮固之如心下痞亦少加黃連氣亂干胸為清濁相干故以橘皮理之能助陽氣之升又助甘辛為用也長夏濕土客邪大旺可從權加蒼朮白朮澤瀉上下分消其濕熱之氣濕氣大勝主食不消化故食減不知穀味加炒曲以消之復加五味子麥門冬人參瀉火益肺氣助秋損也此三伏中長夏正旺之時藥也濁氣在陽亂於胸中則䐜滿閉塞大便不通夏月宜少加酒洗黃柏大苦寒之味冬月宜加吳茱萸大辛苦熱之藥以從權乃隨時用氣以從權乃隨時用氣以瀉濁氣之不降也借用火寒之氣於甘藥中故曰甘寒瀉大熱也亦須用發散寒氣辛溫之劑多黃柏少也清氣在陰者乃人之脾胃氣衰不升發陽氣故用升麻柴胡助辛甘之味以引元氣之升不令飧泄也堵塞咽喉陽氣不得出者曰塞陰氣不得下降者曰噎夫噎迎於咽喉胸膈之間令諸經不行則口開目瞪氣欲絶當先用辛甘氣味俱陽之藥引胃氣以治其本加堵塞之藥以瀉其標也寒月陰氣大助陰邪於外於正藥內加吳茱萸大熱大辛苦之味以瀉陰寒之氣暑月陽盛則於正藥中加陳皮益智黃柏散寒氣泄陰火之上逆或以消痞丸合滋腎丸滋腎丸者黃柏加知母微加肉桂三味是也或更以黃連別作丸二藥各七八十丸空心約宿食盡服之待少時以美食壓之不令胃中停留也如食少不飢加炒曲如食已心下痞別服橘皮枳朮丸如脈弦四肢滿閉便難而心下痞加甘草黃連柴胡如腹中氣上逆者是衝脈逆也加黃柏三分黃連一分半以泄之如大便閉燥心下痞加黃連桃仁少加大黃當歸身如心下痞夯悶加白芍藥黃連如心下痞腹脹加五味子白芍藥縮砂仁如天寒少加乾薑或中桂如心下痞中寒者加附子黃連如心下痞嘔逆者加黃連生薑橘皮如冬月加黃連少入丁香藿香葉如口乾嗌乾加五味子葛根如脅下急或痛甚須加柴胡甘草如胸中滿悶鬱郁然加橘皮紅青皮木香少許如頭痛有痰身重懶倦者乃太陰痰厥頭痛加半夏半錢生薑二分或三分如腹中或周身間有刺痛皆血澀不足加當歸身如噦加五味子及益智仁如食不下乃胸中胃上有寒或氣澀滯加青皮陳皮木香此三味為定法冬天加益智仁草豆蔻仁夏月少用更加黃連秋月氣澀滯食不下更加檳榔草豆蔻仁縮砂仁或加白豆蔻仁如春三月食不下亦用青皮少陳皮多更加風藥以退其寒覆其上如初春猶寒更少加辛熱以補春氣之不足以為風藥之佐益智草豆蔻皆可也如脈弦者見風動之證以風藥通之如脈澀覺氣澀滯者加當歸身天門冬木香青皮陳皮有寒者加桂枝陳皮黃耆如胸中致塞或氣閉悶亂者肺氣澀滯而不行宜破滯氣者青皮陳皮更少加木香檳榔冬月加吳茱萸人參致塞因外寒所遏必寸口脈弦或微緊乃胸中大寒也若加之舌上白胎滑者乃丹田有熱胸中有寒加黃柏生地黃勿作寒證治之如秋冬天氣寒涼而腹痛者加半夏或益智等藥或草豆蔻之類如發熱或捫之而肌表熱者此表證也只服補中益氣湯一二服得微汗則涼矣如腳膝痿軟行步乏力或疼痛乃腎肝中伏濕熱少加黃柏空心服之不愈更增黃柏加漢防己半錢則腳膝中氣力如故也如多唾或唾白沫胃口上停寒也加益智仁如少氣不足以息者服正藥二三服氣猶短促者為膈上及表間有寒所遏當引陽氣上伸加羌活獨活藁本最少升麻多柴胡次之黃耆加倍飲食勞倦所傷身熱氣短以黃耆甘草人參白芍藥當歸少加柴胡升麻立愈達此者可以通天地之變也又經云氣勝身寒得之傷寒是寒傷形也仲景以麻黃桂枝青龍湯之類發散寒邪汗出而解矣內傷飲食服藥用藥者皆以為細務然利害非小蓋胃氣者營氣也運氣也穀氣也清氣也資少陽生髮之氣也人之真元衰旺皆在飲食入胃和則五穀氣升輸於華蓋布灌於五臟以資元氣生髮之功也飲食一傷藥對所傷之物胃氣愈旺穀氣精氣神氣強盛氣血周流百病不侵一藥之用大哉若下峻利之藥所傷之物已去藥未盡化病去之後脾胃受虧脾胃既虧則精氣神氣損敗促人命可不戒哉且如易水張先生枳朮丸神妙可推以白朮之甘溫補脾胃其苦除胃中之濕熱是先補其虧後以克化之者枳實是也以枳實苦寒泄心下痞悶消化胃中所傷則不峻利也且以燒飯與白朮協力滋養穀氣令脾胃自厚不至內傷若以辛熱之物如集香丸之類下之大便下則所傷物去巴豆大熱有毒重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣而熱因而四肢不舉傳變諸疾不可勝數故經云因而大飲則氣逆因而飽食則腸澼為痔夫飲者無形之氣傷之則發汗利小便解醒湯五苓散主之食者有形之物傷之則損其谷而消導之丁香爛飯枳朮丸主之重則攻化三稜消積木香見晛之類是也尤重則吐瓜蒂備急之類是也以平為期斯為善矣穀肉果菜本以養生無使過之傷其正也苟能慎起居節飲食經云不治已病治未病此之謂也傷冷飲不惡寒身重飲食不化小便不利去桂五苓散假令傷熱物二分生冷物一分用寒藥三黃丸二停熱藥木香見晛一停合而服之傷生冷二分熱物一分用見晛二停三黃一停合而服之假令夏月傷生冷當用見晛丸須少加三黃丸蓋天時不可伐故加寒藥以順時令若傷熱物只用三黃此三黃時藥也假令冬月傷羊肉濕面熱物當用三黃須加熱藥少許草豆蔻之類為引用各為時藥也方補中益氣湯出拔粹方治脾胃虛弱飲食勞倦內傷不足之病古之至人窮於陰陽之化究乎生死之際所著內經悉言人以胃氣為本人受水穀之氣以生所謂清氣營氣運氣衛氣春升之氣皆謂氣之別稱也夫胃為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也苟飲食失節寒溫不適則脾胃乃傷喜怒憂恐而損耗元氣既脾胃衰元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流於腎肝陰火得乘其土位故脾胃之證始得之則氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋陰火上衝則氣高喘而煩熱為頭痛為渴而脈洪脾胃之氣下流使穀氣不得升浮是春生之令不行則無陽以護其營衛則不任風寒乃生寒熱此皆脾胃之氣不足所致也然而外感風寒所得之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外為有餘有餘者瀉之傷其內為不足不足者補之汗之下之吐之克之之類皆瀉也溫之和之調之養之之類皆補也內傷不足之病苟誤認作外感有餘之病而反瀉之則虛其虛也實實虛虛損不足而補有餘如此死者醫殺之耳然則奈何曰惟當以辛溫之劑補其中為升其陽甘寒以瀉其火則愈矣勞者溫之損者益之溫能除大熱大忌苦寒之藥瀉其土耳今立此方主之黃耆半錢病甚勞役熱者一錢當歸身二錢酒洗焙乾或曬乾小和血脈人參去蘆三錢有嗽主之白朮三錢以調中氣炙甘草半錢柴胡二錢引精氣上升行少陽之經升麻二錢引胃氣上騰而復本位便是行春升之令橘皮三錢以導滯氣又能益元氣得諸甘藥亦可上件㕮咀都作一服水二盞去滓大溫服食一方加白芍藥黃柏紅花硃砂安神丸出拔粹方夫脾胃虛者因而飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多甘草人參次之脾如一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗損其元氣上喘氣短人參以補之心火乘脾須炙甘草之甘以瀉火熱而補脾胃中元氣若脾胃急痛並大虛腹皮急縮者最宜多用急者緩之胃中清氣在下必加升麻柴胡以引之引黃耆甘草上升能補胃氣之散解以緩帶脈之縮急二味苦平味薄者陰中之陽而引清氣上升也黃耆人參甘草三味皆甘溫為主用脾胃虛乃必用之藥氣亂於胸為清濁相干用去白橘皮以理之又能助陽氣之升以散滯氣助諸甘辛為用也口乾嗌乾者加葛根脾胃氣虛不能升浮為陰火傷其生髮之氣營血大虧榮氣不營陰火熾盛是血中伏火日漸煎熬血氣日減心包主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也故加辛溫甘溫之劑生陽陽生則陰長或曰甘溫何能生血仲景之法血虛以人參補之陽旺則能生陰血更加當歸和之又宜加黃柏以救腎水能瀉陰中之伏火如煩猶不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈硃砂五錢另研水飛陰乾稱黃連去須揀淨酒洗稱六錢當歸去蘆二錢半炙甘草五錢半生地黃二錢半上為細末另研硃砂水飛如塵陰乾為衣湯浸蒸餅為丸如黍米大每服一十五丸津唾咽之食後熱淫所勝治以甘寒以苦寒瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火氣滋生陰血為臣以當歸補其血不足硃砂納浮溜之火而安神明也四時用藥加減法長夏濕土客邪大旺加蒼朮澤瀉上下分消其濕熱之氣濕氣大勝主食不消故食減不知穀味則加曲以消之加五味子麥門冬助人參瀉火益肺氣助秋損也在三伏中為聖藥堵塞咽喉陽氣不得出病名曰塞陰氣不得降病名曰噎噎塞迎逆於咽喉胸膈之間令諸經周身陽氣不行令人口開目瞪氣欲絶者何也清氣在陰濁氣在陽清濁相干亂於胸中是為大悗夏月加青皮陳皮益智黃柏泄陰火之上逆或以消痞丸滋腎丸各七八十丸則愈冬月加吳茱萸大熱大辛苦之味以瀉陰寒之氣則愈食不消則加炒曲空心約宿食消盡服之待少時以美膳壓之不令胸中停留也食不下乃胸中有寒胃土有寒或氣寒澀滯加青皮陳皮木香此三味為定法冬月加益智仁並草豆蔻仁夏月少加黃芩黃連秋更加檳榔草豆蔻縮砂仁白豆蔻仁如春初猶寒更少加辛熱之劑以補春氣之不足為風藥之佐益智草豆蔻可也冬月咳嗽者加不去節麻黃半錢如秋涼亦加之如春月天溫只加佛耳甘草款冬花各三分若痰嗽久病肺中伏火者去人參防痰嗽增益耳然調和陰陽血氣之際甘溫為必用之藥脈洪大兼見熱證少加黃芩黃連生地黃甘草脈緩顯沉困乏怠惰無力者濕勝也加蒼朮澤瀉人參白茯苓五味子脈澀氣滯澀者加當歸身木香天門冬青皮陳皮覺寒者加桂枝黃耆雖不是病見熱證須加寒藥熱藥不宜多以從權頭痛有痰沉重懶倦者乃太陰痰厥頭痛加半夏半錢生薑三二分若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身脅下急或痛甚俱加柴胡甘草人參腹中氣上逆者衝脈逆也加黃柏三分黃連二分以瀉之多唾或唾白沫胃口上停寒也加益智仁如少氣不足以息服正藥二三服猶氣短促此膈上及皮表間有寒所遏當引陽氣上升則愈多加羌活獨活升麻柴胡藁本次之黃耆倍之捫之而肌熱者表證也只服正藥一二服得微汗則已躁熱作蒸蒸而熱者腎間伏火上騰也加黃柏生地黃各三分腳膝痿軟行步乏力或痛乃腎肝伏熱少加黃柏空心服如不愈更加漢防己半錢則愈使腳膝中氣力湧出矣脈緩有痰而痞加半夏黃連脈弦四肢滿閉便難而心下痞加黃連柴胡甘草大便祕燥心下痞加黃連桃仁少加大黃當歸身心下痞悶者加白芍藥黃連心下痞腹脹加五味子白芍藥縮砂仁如天寒少加乾薑或中桂心下痞覺中寒加附子黃連心下痞加黃連生薑橘皮冬月加黃連木香藿香葉能食而心下痞加黃連半錢枳實三分胸中氣滯加去白青皮嗌痛頷腫脈洪大面赤者加黃芩桔梗甘草耳鳴目黃頰頷腫頭肩臑肘臂外後廉痛面赤脈洪大者以羌活防風甘草藁本以通其經血加黃芩黃連消其腫人參黃耆益元氣而瀉火邪如脈緊面白善嚏或面色惡者皆寒也亦羌活等四味中加之當瀉足太陽也不用寒藥小便遺失肺金虛也宜安臥養氣以黃耆人參湯之類補之不愈是有熱也加黃柏生地黃芍藥勞役臥而多驚小便淋溲者邪在少陽厥陰亦宜太陽經所加之藥更加柴胡半錢如淋加澤瀉半錢此下焦風寒合病也腎肝之病同一治法俱在下焦非風藥行經則不可若受客邪之濕熱宜升舉發散以除之頭痛加蔓荊子半分痛甚加川芎二分頂腦痛加藁本三分若兼頭痛加細辛二分諸頭痛並用此四味足矣臍下痛者加熟地黃三分不已者大寒也其寒從傳變中來加肉桂三分遍閲內經少腹痛者皆寒非傷寒厥陰之證也仲景以抵當湯丸主之乃血結下焦膀胱身有疼痛及身重者濕也以五苓散主之如風濕相搏一身盡痛加羌活防風各半錢升麻柴胡各半錢藁本蒼朮各一錢所以然者為風藥也能勝濕故另作一服與之通氣防風湯出拔粹方治肩背痛不可回顧者此手太陽氣鬱而不行以風藥散之脊痛項強腰似折項似拔者此足太陽經不通行以此藥主之羌活獨活各一錢藁本防風甘草各一半錢川芎蔓荊子各二錢上㕮咀都作一服水三二盞煎至一盞去滓溫服空心如身重腰沉沉然經中有寒濕也更加酒洗漢防己半錢輕者附子重者川烏頭腹中痛不惡寒加黃芩芍藥腹中痛惡寒而脈弦者小建中湯如脈沉細者理中湯之類主之腹痛在寒涼時加半夏益智草豆蔻之類胃脘當心而痛氣欲絶者胃虛之極也俗言心痛以草豆蔻丸主之白朮附子湯出拔粹方治脾胃之證始則熱中終則寒中陰盛生內寒厥氣上逆寒氣積於胸中是腎水反來侮土此謂所勝者妄走行也作中滿腹脹作涎作清涕或多溺足下痛不能任身履地骨乏無力喜睡兩睪丸多冷時作隱隱而痛或妄見鬼狀夢亡人腰背胛眼脊皆痛而不渴不瀉不渴不瀉則溫氣去寒獨留寒獨留則血凝泣血凝泣則脈不通故其脈盛大以澀曰寒中當以此藥主之白朮附子炮去皮臍蒼朮陳皮厚朴薑製茯苓澤瀉各二兩豬苓去皮半兩肉桂四錢上件銼如麻豆大每服五錢水三盞生薑三片同煎至一盞去滓食前溫服之量病人虛實加減多少補中益氣湯內外傷辨惑云飲食勞倦所傷必氣高身熱煩喘短氣鼻息不調嗜臥困倦少言皆為熱傷元氣耗神故也宜溫甘之劑以補元氣瀉火也其初肌膚間必大熱燥悶心煩而渴久後則不渴頭痛大作四肢疼痛表虛不任風寒目不欲開慎不可以寒涼藥與之內經云勞者溫之損者益之蓋以溫藥以補元氣瀉心火也其內熱皆由心火乘於皮膚之位穀氣不能上升輸於心肺滋養上焦故爾屬少陽宜用此方黃耆半錢或病勞復熱甚者一錢人參去蘆三錢甘草半錢以上三味除燥熱意解肌熱之聖藥也紅花一分白芍藥三分秋冬之月未有隻用白朮三分代之葛根半錢如渴用之渴甚以意旋加不渴去之當歸身二分酒洗焙乾以和血脈橘皮不去白二分或三分以導滯氣又至能益元氣得甘藥乃可若獨用瀉脾升麻二分或三分引胃氣上升而復其位便是春令柴胡六分或三分引清氣行少陽之氣上升黃柏酒洗去皮一分或二分但言分也一錢作十分也黃芩二分或三分如覺胸中熱用之卻除黃柏生甘草稍三分如覺胸中熱用之不熱卻除之上㕮咀作一服水二大盞量氣弱氣盛加減水盞大小去滓食遠稍熱服傷重者不二服若病日久立加減法於後腹中痛加白芍藥半分甘草三分惡寒冷痛加去皮中桂一分或二分桂心是也惡熱喜寒而痛者於已加白芍藥甘草二味中更加生黃芩一分或二分治時熱也如天涼時惡熱而痛於已加白芍藥甘草黃芩中更少加桂一分如腹痛在天氣寒涼時則去芍藥以其味酸而寒故也別加熱藥用之天氣寒涼時腹痛加益智仁二分或三分或加半夏半錢生薑三片忌用芍藥頭痛加蔓荊子二分痛甚加川芎二分頂痛腦痛更加藁本根三分或半錢若頭痛更加細辛二分諸般頭痛者並用此四味足矣若頭上有熱則此不能治別有青空膏治之臍中痛者加蒸熟地黃半錢其痛乃止如不止則大寒也其寒從變中來更加肉桂去皮二分或三分胸中氣滯加蓮花青皮一分壅滯者去之氣促及少氣者去之身間疼痛若覺身重者濕加去桂五芩散一分風濕相搏一身盡疼加羌活半錢防風半錢升麻一錢柴胡半錢藁本根半錢蒼朮勿用五苓止服元藥也大便祕澀加當歸一錢閉澀不大便煎正藥或先用調玄明粉半錢一錢久病咳嗽者去人參冬月加不去節麻黃半錢如春寒者亦加涼亦加如春月天溫加佛耳甘草三分款冬花一分勿加麻黃若初病之人痰嗽不去人參久病肺中伏火者去人參夏月得病加五味子去子七八個去心麥門冬二分或一分如舌上白滑胎者是胸中有寒勿用之夏月更加人參二分五味子麥門冬等分病人能食心下痞加黃連一分如不能食心下痞勿加黃連依方服脅下痛或脅下縮急加柴胡三分甚者加半錢已上治熱中始用諸甘藥若傳至寒中腹脹咽膈不通胃脘當心而痛若依前用甘溫之類則誤矣升陽順氣湯濟生拔粹方治飲食不節勞役所傷腹滿悶短氣遇春口淡無味遇夏雖熱猶惡寒飢常如飽不喜冷物升麻一錢柴胡一錢黃耆一兩半夏湯浸三錢人參三錢陳皮一錢甘草半錢草豆蔻二錢神麯炒一錢五分當歸身一錢黃柏半錢上㕮咀每服三錢水二大盞姜五片煎至一盞去滓空心溫服寬中進食丸醫方大成滋營氣喜飲食草豆蔻五錢縮砂仁二錢半夏七錢大麥糵曲炒五錢半枳實麩炒去瓤四錢神麯炒五錢半甘草炙一半錢乾生薑二半錢陳皮三二錢半木香一錢白朮三錢白茯苓去皮三錢豬苓去黑皮三二錢半澤瀉二錢半人參二錢半青皮二錢半上為末湯煮蒸餅為丸如梧桐子大每服三十丸米飲湯下空心服一方用檳榔一二錢半和中丸出濟生拔粹方一名平胃丸治病久虛弱厭不能食而臟腑或祕或溏此胃氣虛弱也常服則和中理氣消痰去濕厚腸胃進飲食厚朴薑製一兩白朮一兩二錢半夏洗七次一兩陳皮去白八錢檳榔四錢五分枳實麩炒三錢半木香二錢半炙甘草二三錢半上為末生薑自然汁浸蒸餅為丸如梧桐子大每服三十丸至五十丸溫水空心服一方用生薑湯下橘皮枳朮丸出衛生寶鑑治老幼元氣虛弱飲食不消或臟腑不調心下痞悶不快橘皮一兩去粗皮枳實麩炒去瓤一兩白朮二兩上為末荷葉裹燒飯丸梧桐子大每服五十丸溫水下食遠服內傷用藥所謂強人胃氣胃氣益厚雖猛食多食重食而不復致傷矣荷葉中央空虛象震卦體震動也人之足少陽甲膽也甲膽風也生化萬物之根蒂手少陽三焦人之元氣也二經同法故飲食入胃營氣上行便為少陽元氣生髮也胃氣穀氣元氣甲膽上升上氣一而異名即是胃氣上升荷葉色形味乃空青象風木也食藥感此氣之化胃氣何由不升引藥如此誠合乎道觀者味之面糵枳朮丸出濟生拔粹治為人所勉勸強食所致心腹滿悶不快神麯炒一兩麥糵曲炒一兩枳實麩炒去瓤一兩白朮二兩上為細末荷葉裹燒飯丸如梧桐子大每服五十丸溫水食遠下木香枳實丸出衛生寶鑑破滯氣消飲食開胃進食木香一兩枳實麩炒去瓤一兩白朮二兩上為細末荷葉裹燒飯丸如梧桐子大每服五十丸溫水食遠下木香化滯湯出衛生寶鑑治一切酒麴結於中脘腹皮微痛心下痞滿不思飲食食之不散常常痞悶柴胡四錢木香三錢橘皮三二錢甘草炙半兩半兩一兩當歸稍二錢紅花半錢草豆蔻五分枳實麩炒去瓤一錢上為散每服五錢水二大盞姜五片煎至一盞去滓稍熱食遠服忌酒濕面半夏枳朮丸出衛生寶鑑治因冷食內傷心腹痞滿嘔噦不止半夏洗七次焙乾一二兩乾生薑一兩枳實麩炒微黃一二兩白朮二兩上為細末荷葉裹燒飯丸如緑豆大每服五十丸溫水下如以湯浸蒸餅為丸亦可如食傷寒熱不調每服加上二黃丸十丸白湯下一方加澤瀉一兩為小便淋一方無干生薑丁香爛飯丸出衛生寶鑑治飲食所傷猝心胃痛甚效丁香一錢丁香皮三錢甘草三錢甘松二錢去土稱縮砂仁三錢益智仁三錢三稜炮一錢莪朮炮一錢香附子半兩木香一錢上為細末湯浸蒸餅丸如緑豆大每服三十丸白湯送下細嚼亦可不拘時候草豆蔻丸出濟生拔粹方秋冬傷寒冷物胃脘當心而痛上焦兩脅咽膈不通草豆蔻仁麵裹煨去皮一兩神麯炒黃半兩白朮一兩黃芩去皮半兩枳實麩炒黃二兩陳皮二錢麥糵面炒黃半兩半夏洗七次曬乾半兩青皮二錢乾生薑二錢炒鹽半錢上為末湯浸蒸餅丸如緑豆大一倍每服五十丸白湯下量所傷多少加減服之如冬月別作一藥不用黃芩歲火不及又傷冷物加以溫劑是其治也有熱物傷者從權以寒藥治之隨時處方不可不知三黃枳朮丸出濟生拔粹方治傷肉食濕面辛辣味厚之物填塞悶亂不快黃芩二兩黃連酒洗一兩大黃紙裹煨一兩神麯炒一兩白朮一兩枳實麩炒半兩陳皮一兩上為末湯浸蒸餅丸如緑豆大一倍每服五十丸白湯下量所傷加減服除濕益氣丸出濟生拔粹方治傷酒面心腹滿悶肢體沉重枳實麩炒黃一兩白朮一兩蘿蔔子炒熱涼去穢氣半兩神麯炒黃一兩黃芩生用一兩紅花三分上為末荷葉裹燒飯丸如梧桐子大每服五十丸白湯下量所傷多少加減服之上二黃丸出衛生寶鑑治傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連去須酒洗一兩升麻三錢柴胡三錢甘草二錢枳實半兩麩炒去瓤上為末湯浸蒸餅丸如緑豆大每服五七十丸白湯下量所傷服之一方無枳實枳實導滯丸出拔粹方治傷溫酒熱物不得施化而作痞悶煩亂不安茯苓去皮黃芩去腐白朮黃連揀淨各三分澤瀉二錢枳實麩炒去瓤炒麵各五錢大黃一兩上為末湯浸蒸餅丸如梧桐子大每服五十丸至七十丸溫水下食遠量所傷加減服更衣止後服枳實梔子大黃湯續易簡方治大病瘥後傷食勞役枳實一個麩炒去瓤梔子三枚半肥者豉一兩二三分半綿裹上清漿水二盞煎退八分卻入枳實梔子煮取八分下豉再煮五六沸去滓溫服覆令汗出若有宿食納大黃如薄棋子五六個同煎食膏粱之物過多煩悶亂者亦宜服白朮丸治傷豆粉濕面油膩之物白朮一兩半夏洗七次曬乾一兩陳皮去白七錢神麯炒黃一兩黃芩半兩白礬枯二錢枳實炒黃一兩一錢上為末湯浸蒸餅丸緑豆大一倍每服五十丸白湯下量傷加減素食多用乾薑故加黃芩以瀉之木香見晛丸一名巴豆三稜丸治傷生冷硬物心腹滿悶疼痛巴豆霜半錢荊三稜一兩煨神麯炒一兩石三稜去皮煨一兩木香二錢香附子炒半兩升麻三錢草豆蔻仁麵裹煨半兩柴胡二三錢上為末湯浸蒸餅丸如緑豆大一倍每服一二十丸白湯下量傷加減服之一方無草豆蔻仁三稜消積丸治傷生冷硬物不能消化腹滿痛不快荊三稜炮莪朮炮各七錢青皮陳皮各五錢丁皮三錢益智仁三錢炒曲七錢茴香炒半兩巴豆和皮米炒黑焦去米五錢上為末醋打麵糊丸如梧桐子大每服十丸至二十丸溫生薑湯下食前服量虛實加減服如通利止後服一方去曲加川楝子名消積滯集香丸神應丸治因一切冷水及潼乳酪水腹痛腸鳴米穀不化巴豆杏仁乾薑百草霜各半兩丁香二錢木香二錢黃蠟一兩上先將黃蠟用好醋煮去滓後加巴豆杏仁同炒黑煙盡研如泥將黃蠟在上火之春夏入油半兩秋冬入小油八錢熔開入在杏仁巴豆泥內同攪旋下丁香木香等藥末研勻搓作錠子油紙裹了旋丸用每服三五十丸溫米飲下食前日三服如脈緩體重自利乃濕氣勝也卻以五苓散平胃散加炒麵相合而服之名曰對金飲子益胃散一名溫脾湯出濟生拔粹方治服寒藥過多或脾胃虛弱胃脘痛白豆蔻仁三錢澤瀉三錢黃耆七錢乾生薑三錢縮砂仁二錢甘草二錢薑黃三錢陳皮七錢益智仁六錢厚朴二錢人參二錢上為細末每服三錢水一盞煎至七分溫服食前一方用溫酒服亦得如脈弦惡寒腹痛乃中弱也以仲景小建中湯加黃耆錢氏異功散加芍藥選而用之如渴甚者加白朮散葛根倍之如胃脘當心而痛氣欲絶者胃中虛之至極俗呼為心痛與草豆蔻丸二三十丸若痛頻作胃中元氣虛甚則將理二三日不得食熱當食溫爛細嚼細咽痛必不作一二日自知矣若食熱啜粥必幾死言畢不得食食後不得言欲食時口鼻不得當風食罷亦然忌生冷硬物果木之類及麩粉曲食須忌長遠免致後患一名益智調中湯除濕散出濟生拔粹方治傷馬乳並牛羊酪一切冷物半夏洗七次三錢車前子炒半兩澤瀉半兩甘草炙二錢神麯炒一兩乾生薑三錢紅花二錢茯苓七錢上為末每服三錢白湯調下食前靈砂丹出百一選方治飲食所傷一切積滯或利赤白不瘥者赤甘草湯下白乾薑湯下赤白姜甘草湯下酒食所傷又暴瀉白湯下並食後臨臥時服之為萬妙感應丸辰砂細研硇砂研細各二錢巴豆去皮殼完全者四十九個黃蠟半兩上先將蠟於銀石器內熬熔次投巴豆在內炸令黑漉出不用只將蠟入前二味為鋌子要用時旋丸大人服緑豆大十丸小兒量歲數加減老人産婦皆可服最治酒飲今人施痢藥者以黃丹代辰砂亦驗本事方治瀉痢用巴豆數不同其說病證甚詳木香人參生薑枳朮丸出濟生拔粹丸開胃進食破滯氣消寒飲木香三錢人參三錢半乾生薑二錢半枳實一兩炒白朮一兩半橘皮四錢上為細末荷葉裹燒飯丸如桐子大每服三五十丸溫水送下食前服一方加炒曲一兩名木香枳朮丸交泰丸出試效方升陽氣瀉陰火調營氣進飲食助精神寬腹中除怠惰嗜臥四肢不收沉困懶倦厚朴去皮銼炒三錢秋冬加七錢知母四錢一半炒一半酒炒此春夏所宜秋冬去之柴胡去苗一錢半人參去蘆一錢肉桂去皮一錢黃連去須六錢秋冬減一錢半酒煮苦楝三錢白茯苓三錢皂角水洗煨去皮膜子六錢紫菀去苗六錢縮砂仁三錢川椒炒去汗去閉目去子一錢乾薑炮製三分川烏頭炮去臍皮四半錢白朮一錢半吳茱萸湯洗七次五錢巴豆霜五分上除巴豆霜另入外同為極細末煉蜜為丸如桐子大每服三五十丸溫水送下虛實加減一方無紫菀導氣除燥湯出濟生拔粹方治飲食勞倦而小便不通乃血澀致氣不通而竅澀也知母三錢酒洗銼黃柏四錢酒洗銼滑石二錢澤瀉三錢茯苓二錢上為細末每服半兩水三盞煎至一盞去滓稍熱服空心如急不拘時大枳殼丸出濟生拔粹方治一切酒食所傷胸膈痞悶脅肋脹滿心腹疼痛飲食不消痰逆嘔吐噫醋吞酸飲食遲化並宜服之枳殼麩炒茯苓去皮白朮厚朴薑製半夏湯洗人參木香青皮去瓤陳皮去瓤京三稜煨熟檳榔廣朮煨熟神麯炒黃麥糵微炒以上各一兩乾生薑半兩牽牛淨微炒大黃各二兩上為細末生薑汁麵糊為丸如桐子大每服一百丸生薑湯下食後木香檳榔丸出濟生拔粹方治食傷太陰木香檳榔青皮陳皮廣朮燒黃連枳殼麩炒以上各一兩黃柏大黃各三兩香附子炒四兩牽牛四兩婦人加當歸一兩上為細末水丸如桐子大每服三十丸食後生薑湯下人參開胃湯出直指方助胃進食人參白朮藿香橘紅縮砂仁木香丁香麥糵炒神麯炒甘草炙茯苓蓮子肉厚朴制半夏曲各等分上銼散每服三錢姜四片煎服枳朮丸出衛生寶鑑治老弱虛弱食不消臟腑耎仲景本湯易老改丸及治氣不下降胸膈滿悶消食強胃枳實七錢半麩炒黃白朮一兩上為細末荷葉裹燒飯為丸或姜浸蒸餅為丸亦得如桐子大每服二十丸三十丸米飲送下食後服一方白湯下五十丸祕傳降氣湯出簡易方治飲食過度致傷脾胃酒色無節耗散腎陰水土交攻陰陽間隔遂使氣不升降上熱下虛上熱則頭目昏眩咽喉乾燥痰實嘔逆胸膈不快飲食無味下虛則臍腹冷痛大便閉塞裡急後重腰腳無力若治以涼則脾氣怯弱腸鳴下利治以溫則上焦壅熱口舌生瘡腳氣上攻久利不瘥並宜先進此藥然後卻以所主藥治之其效尤速桑白皮二兩銼炒枳殼湯浸去瓤麩炒甘草炒陳皮炒各一兩五加皮酒浸半日炒黃黃花根皮是骨碎補火燎去皮毛炒銼地骨皮炒黃桔梗炒黃訶子炮取肉炒草果仁炒黃半夏為末薑汁作餅再碎炒各半兩上㕮咀以碗盛飯甑上蒸一伏時傾出攤令冷收之每服三錢紫蘇三葉姜三片水一盞煎至七分一方無半夏食後溫服痰嗽加半夏曲心肺虛加人參茯苓上膈熱加黃芩下部虛加炮附子少許多用生薑煎婦人血虛加當歸煎常服調順營衛通利三焦開膈化痰和五臟檳榔丸出蘭室祕藏方消食破滯氣檳榔木香人參各二錢橘皮五錢炙甘草一錢上為細末湯浸蒸餅為丸如梧桐子大溫水下三十丸無時強胃湯出濟生拔粹方治因飲食勞倦所傷腹脅滿悶短氣遇春口淡無味遇夏雖熱而惡寒常如飽不喜食冷物黃耆一兩半夏三錢人參三錢草豆蔻二錢黃柏半錢曲一錢半陳皮一錢生薑一錢半升麻一錢柴胡一錢甘草半錢當歸身一錢上㕮咀每服三錢水二大盞煎至一盞去滓溫服食前桂香丸治大人小兒過食雜瓜果腹脹氣急肉桂一兩麝香一錢上為末飯為丸如緑豆大大人十五丸小兒七丸不以時飯湯下三稜丸治同前三稜莪朮青皮陳皮上等分為末麵糊為丸如梧桐子大每服三十丸薑湯下不拘時小橘皮煎丸出醫方集成消食化氣宜常服之三稜莪朮並煨青皮去白陳皮去白神麯炒麥糵炒各等分上為末陳米粉煮糊為丸如梧桐子大每服五十丸米飲下治飽食便臥得谷勞病四肢煩重默默欲臥食畢輒甚方出肘後方上用大麥糵一升椒一兩並熬乾薑三兩搗末服方寸匕日三四服寬中理氣丸出德生堂治脾胃不和寬中理氣可宜常服枳實檳榔青木香丁皮神麯蒼朮香附子葛根各一斤加蓽澄茄半斤上為細末水糊為丸每服三十丸加至五十丸酒水生薑湯任下不拘時三香神術丸出德生堂能溫中快膈化積順氣中酒吐酒嘔逆唾酸氣壅食噎飲食遲化胸膈痞悶腰脅刺痛胃脘停痰飲食無味婦人血氣臍腹疼痛凡人吃飯後大宜服之香附子蒼朮厚朴藿香甘草良薑枳實枳殼青皮陳皮廣朮三稜檳榔神麯半夏曲益智仁瓜三稜石三稜曲檗雷丸乾葛黃連木香各一兩上為細末蘿蔔熬水打麵糊為丸如梧桐子大每服五十丸酒水任意下百鍾丸出德生堂治中酒食吐酒嘔逆噁心口吐酸水痰涎壅盛痰塞氣不暢快但酒所傷者宜服之百鍾可以再進乾葛黃連枳實各四兩青皮陳皮神麯麥糵雷丸三稜莪朮益智仁檳榔各一兩牽牛末木香各二兩杏仁泡去皮尖半斤蘿蔔子半斤葛花二兩上為細末酒糊為丸如桐子大每服五七十丸酒水任意下藿香利膈丸出德生堂寬腸快膈和胃利痰進食化宿酒表解寒暑功效極但因酒食所傷脾胃不和常服之厚朴九兩枳實三兩當歸一兩人參一兩藿香一兩檳榔一兩半木香甘草各一兩半陳皮二兩上為極細末水糊為丸如梧桐子大每服五十丸酒水送下治食魚膾及生肉住胸膈中不消化吐之又不出不可留多使成症方出肘後方上用朴硝如半雞子一枚大黃一兩凡二物㕮咀以酒二升煮取一升去滓盡服之立消若無朴硝芒硝代之亦可用至靈散出肘後方療食飽煩悶但欲臥而腹痛用曲熬令香黃為末服方寸匕大麥糵亦佳木香調中丸出德生堂治因飲食不調致傷脾胃心腹脹痛臟腑泄瀉米穀不化腹中雷鳴不思飲食或下痢膿血或大便赤水木香陳皮去白青皮去白肉豆蔻麵裹煨檳榔三稜焙訶子草豆蔻各一兩上為末麵糊丸如梧桐子大每服六十丸食前米飲下清暑益氣湯治長夏濕熱胃困長夏五六月濕熱蒸炊人多困倦胸滿短氣肢節疼痛氣高而喘煩熱大便或泄而黃或如白泔或渴或不渴膨悶不欲食或氣短不能言小便多而黃宜以除濕散熱之劑主之黃耆一錢半汗少減半錢人參半錢甘草炙三分蒼朮一錢米泔浸去皮白朮半錢陳皮半錢黃柏酒浸去皮少減半錢二分或三分神麯炒黃半錢升麻一錢葛根三二分當歸身三分澤瀉半錢五味子九個麥門冬去心三分青皮去白一分上㕮咀作一服水二大盞煎至一盞去滓溫服食遠服此病因飲食失節勞倦所傷損而脾胃得也藿香半夏丸治同前藿香一錢半夏二錢紅豆一錢乾生薑半錢訶子皮二錢烏梅肉二錢乾薑一錢上為極細末荷葉裹燒飯為丸如梧桐子大每服三五十丸溫水送下黃耆湯出蘭室祕藏方治補胃除濕和血益血滋養元氣黃耆一兩當歸身二錢酒洗人參半兩澤瀉半兩藿香葉一錢橘皮一錢木香一錢氣轉去之上㕮咀每服三五錢水二大盞煎一半欲汗加生薑煎食遠熱服之黃耆當歸湯出蘭室祕藏方治熱上攻頭目沿身胸背發熱當歸身一二錢酒洗黃耆半兩上㕮咀水二大盞煎法如常黑地黃丸出濟生拔粹方治男子婦人面無血色食少嗜臥肢體困倦蒼朮一斤熟乾地黃半斤乾薑炮夏月五錢冬月一兩春秋七錢上為末水煎麵糊為丸如桐子大每服五十丸溫水下食遠麥糵散療飽食訖便臥得病令人四肢煩重默默欲臥大麥糵一升炒乾薑二兩上為末服方寸匕日三良丁香湯出十便良方消酒下痰通中健胃丁香半兩胡椒一錢縮砂仁四兩乾生薑一兩甘草二兩鹽二一兩上同為細末每服一錢不拘時沸湯點下治飲食過度飽出本草以蘆蔔生嚼之佳和中丸出試效方補胃進食乾薑二錢干生木瓜三錢炙甘草二錢陳皮四錢益智仁二錢人參二錢白朮三錢上件為末用湯浸炊餅為丸如梧桐子大每服三五十丸溫水食前下木香檳榔丸出試效方消食破滯氣木香檳榔各三錢青皮五錢陳皮七錢麥糵七錢枳實七錢白朮厚朴各五錢上件為末湯浸蒸餅為丸如梧桐子大每服五七十丸食後溫水下當歸臘茶散治營衛氣虛風邪冷氣進襲臟腑之內或食生冷或啖炙爆或飲食過度積熱腸間致使腸胃虛弱糟粕不聚大便下利鮮血臍腹疼痛裡急後重久患酒毒便血諸疾一切大便下血證並皆治之細芽茶半斤川百藥煎五個燒存性上為細末每服二錢用米湯飲調下或烏梅湯亦可溫中益氣治驗出衛生寶鑑中書左丞相史公年六十有七至元丁卯九月間因內傷自利數行覺肢體沉重嗜臥懶語言不思飲食舌不知味腹中痛頭亦痛噁心醫以通聖散大作劑料飲之覆以厚被夜遂大汗出前證未除而反劇凡易數醫四月餘不愈豫以應召至燕命治之候其脈得沉細而微弦不欲食食則嘔吐中氣不調滯於升降口舌乾燥頭目昏悶肢體困倦足胻冷臥不欲起丞相素不飲酒肢體本瘦又因內傷自利復發汗是重竭精液脾胃氣愈虛不能滋榮周身百脈故使然也非甘辛大溫之劑則不能溫養其氣經云脾欲緩急食甘以緩之又脾不足者以甘補之以黃耆人參之甘補脾緩中故以為君形不足者溫之以氣以當歸辛溫和血潤燥木香辛溫升降滯氣生薑益智仁草豆蔻仁辛甘大熱以蕩中寒理其正氣白朮炙甘草橘皮甘苦溫乃厚腸胃麥糵面寬腸胃和中神麯辛熱導滯消食故以為佐上件㕮咀一兩水煎成服之嘔吐止飲食進逾三日前證悉去左右曰前證雖去九日不大便何以治之曰丞相年高氣弱既利且汗脾胃不足陽氣虧損津液不潤也豈敢以寒涼有毒之劑下之仲景云大發汗後如小便數大便堅不可用承氣湯可用蜜煎導之須臾去燥屎二十餘塊遂覺腹中空快上下氣調又以前藥服之喜飲食漸愈則以前橘皮枳朮丸消導之月餘方得平復丞相曰病既去矣當服何藥預防其復來豫謂不然慎言語節飲食不可服藥用藥如用刑民有罪則刑之身有疾則藥之無罪妄刑是謂虐民無疾妄藥是反傷正氣軍志有之曰允當則歸服而舍之可也丞相悅而然之參朮調中湯出衛生寶鑑治內傷自利臍腹痛肢體困倦不喜飲食食則嘔嗜臥懶語言足胻冷頭目昏悶黃耆五錢人參五錢當歸身厚朴木香益智仁草豆蔻仁白朮炙甘草橘皮麥糵曲炒曲以上各三錢上件銼如麻豆大每服一兩水二盞半生薑三片煎至一盞去滓食前溫服腸滿四肢倦行立艱食以嘔多冒眛減飲食或渴者是也宜用後方出華他中藏經方大黃一兩濕紙十重包裹煨令香熟切作片子檳榔一枚木香一分上為末生蜜丸桐子大食後薑湯下三十丸日二服未減加之效即勿再服附方桂半兩不焙檳榔一個黑牽牛四兩生取末二兩節不用上為末蜜酒調二錢以利為度須問湯出楊氏家藏方治中酒痰逆白豆蔻仁縮砂仁各四一兩丁香二兩甘草炙三兩白鹽三兩炒上除丁香外同炒熟以一瓷合子入藥一半鋪底下丁香又以一半蓋頭罨一宿取出為細末每服一錢沸湯點服沖和湯出楊氏家藏方醒酒快膈消痰助胃生薑四錢切焙草果子去皮七錢半甘草七錢半炙半夏曲二錢半炙白鹽一兩炒上件為細末入鹽和勻每服二錢沸湯點服青金湯出楊氏家藏方治酒食所傷及嘔逆噁心頭目昏暈神志不爽縮砂仁一兩薄荷葉去土二兩白豆蔻仁一兩甘草半兩微炒上件為細末每服一錢沸湯點服生胃丸出朱氏集驗方治酒食所傷胸膈不快不思飲食良薑白姜各四兩並油炒丁香胡椒各等分上為細末麵糊丸如梧桐子大每服百十丸米飲陳皮湯下妙應丸出楊氏家藏方治脾胃虛冷飲食遲化心腹刺痛噫氣吞酸兩脅膨脹胸膈痞悶四肢倦怠不思飲食蓽茇木香破故紙炒三味各一兩附子二枚重七錢者每一枚剜去心入硇砂末一錢用附子末塞口外以麵裹煨令面焦黃取出去面不用上件同為細末麵糊丸如緑豆大每服五丸至七丸木香湯下不拘時候快膈湯出十便良方治飲酒過多胸膈不快嘔吐涎沫生薑二斤切片米泔浸三日曬令半乾丁香皮三四兩銼甘草六兩切如大豆鹽半斤上以淨銚一枚先入鹽炒熟次下姜候姜稍乾脆次下甘草炒色赤次下丁香皮同炒不得焦紫色為度乘熱入新瓷瓶密封不得透氣三日後開為細末每次沸湯點一錢一名紫薑湯宜是慢火炒氣味奇妙解酲湯出十便良方治飲酒過度脾胃不健不思飲食胡椒桂心丁香各一分檀香二銖三錢藿香半兩見火甘草三兩炙白鹽四兩炒上為末每取一錢沸湯點服不拘時
