body:
  text: 卷二百七十八諸瘡腫門諸腫附論夫腫之生也皆由風邪寒熱毒氣客於經絡使血澀不通壅結皆成腫也風邪所作者腫無頭無根浮在皮上如吹之狀不赤不痛或腫或散不常腫也其寒氣與血相搏作者有頭有根色赤痛腫其熱毒作者亦無正頭但急腫久不消熱氣結盛血壅則為膿也其候非一也凡諸暴腫一一不同無問近遠皆服五香連翹湯刺去血小豆末敷之其間數數以針刺去血若失療已潰爛者猶服五香湯及漏蘆湯下之隨熱多少依方用之外以升麻湯溻洗尉之摩升麻膏若生息肉者以黃耆散若敷白䕡茹青黑惡肉不盡者可以摻頭䕡茹散半錢和白䕡茹散三錢稍稍敷之其散各取當己單搗下篩直爾成散用之方犀角膏療熱毒風併發背犀角羚羊角玄參續斷大黃白蘞射干白芷黃芩麻黃去節各六分升麻十分梔子仁二十枚薤白五升具藍八分大藍亦可蛇銜切一升寒水石十二分慎火草切一升上切以竹瀝三升生地黃汁五合漬藥一宿納豬脂三升微火上煎十上十下候白芷黃膏成去滓塗病上延壽濟世方治瘡腫硃砂鹽花各二錢雄黃明礬生楓香各二錢黃丹赤石脂琥珀輕粉各一錢半射香一錢片腦一錢巴豆去殼煮數沸萆麻子各一十九粒研細上為細末豆萆膏和藥不就加煉蜜為度放於瓷器內紙封如用旋丸如雞頭大每服一丸井水送下食前服以利三五行溫粥補之忌熱半日男子量虛實加減不必盡劑腫病即止有孕婦不可服就此藥丸如黃豆大安於瘡上軟膏藥護之開其瘡口收住暈毒為妙又治內外發背疔瘡肚癰無名腫毒誤食金石砒藥反肉皆可治之大效又治小兒緊慢驚風丸如緑豆大每服一丸薄荷湯冷下內托復煎散出濟生拔粹方治腫焮如外根盤不深形諸在表其脈多浮痛在皮肉邪氣盛而必侵於內須急內托以救其里也地骨皮黃耆防風各二兩芍藥黃芩白朮茯苓人參甘草當歸防己以上各一兩柳桂淡味加五錢上㕮咀先煎蒼朮一斤用水五升煎至三升去蒼朮滓入前藥十二再煎至三四盞絞取清汁作三四服終日服之又煎蒼朮滓為湯去滓再依前煎十二味藥滓服之此除濕散鬱熱使胃氣和平如或未已再作半料服之若大便祕及煩熱少服黃連湯如微利煩熱已退卻服復煎散半料如此使榮衛俱行邪氣自不能侵也紫草膏出聖惠方治一切腫毒肉色不異時時牽痛經年腫勢不消紫草一兩桂心一兩芎藭一兩赤芍白蘞川大黃防風去蘆頭黃芩莽草當歸木香甘草各一兩上為細散每用散二兩酒二升於鐺中煎令成膏及熱塗熁腫處日再用之紫葛散出御藥院方治諸腫貼方紫葛十分大黃五分青木香一分玄參白蘞黃芩黃連榆白皮升麻由跋各二分赤豆一合上治下篩以生地黃汁和如泥敷腫上干則易無地黃汁與米醋和之一方無由跋以溫水調敷藥干再掃金花散出御藥院方消赤腫止疼痛散毒氣川大黃黃柏蔚金黃連黃芩各一兩甘草朴硝寒水石各半兩白芨白蘞各少許糯米粉三合上為細末每用生蜜水調稀雞翎塗掃四畔焮赤腫處療風毒及一切腫塗散方大黃五兩白蘞三兩寒水石紫葛青木香各一兩硝石黃芩各二兩大青三兩苦參三兩上搗散和牛乳塗故布上拓腫上隨著即消干復易之若腫在骨節拓近骨節好肉處移取腫拓即消廣聖散治一切腫毒蒼朮一斤米泔水浸四時川烏半斤炮草烏四兩炮蠍梢二兩地龍二兩去土天麻三兩細辛三兩去葉川芎五兩白芷五兩上一處為細末治風毒腫用溫酒調下一錢外以水調搽患處半身不遂風寒暑濕用溫酒調下一錢腦疽發背以井花水調塗四畔外用溫酒調服瘋犬咬傷用溫酒調一錢外以水調搽患處一切頭風用生蔥搽酒調下傷寒用溫茶調下出汗疔瘡用溫酒調服外醋調搽臁瘡用井花水調搽小兒風證用薄荷湯調下忌一切豬葷商陸膏貼諸腫瘡商陸二兩黃芩黃連白芷白蘞大黃莽草各二兩白芨二兩上搗篩熔膠汁和如泥塗紙貼腫干即易之金黃散消腫散毒生肌止痛黃連大黃黃耆黃芩黃柏鬱金各一兩龍腦半錢另研甘草半兩上為細末入龍腦研勻若治濕毒丹毒腫新水調掃赤上或蜜水調如稀糊用小紙花子貼之或小油調掃如久不瘥熱毒瘡亦乾摻或水調塗亦佳七聖散治一切腫毒不出三日神效纍用果驗當歸黃耆蜜炙乾貝母各五錢甘草枳殼四錢白芷六錢乳香痛加三錢不痛減用上用皂角刺七個捶破水二大盞同煎取一盞服千金散治諸腫毒便毒初覺一服即愈金銀花大黃山梔子牡蠣酥煅各半兩栝蔞一個銼穿山甲炮二錢半甘草少許上為粗末每用好酒半碗煎至八分去滓隨病上下服忌雞蝦馬肉等物水黃散圍腫毒犀角屑草烏皮尖大黃白芨白蘞麝香朴硝各等分上為細末蜜醋調薄攤油紙上貼之稍干揭下再添潤濕貼之如用平起先塗藥仍以油紙貼上外用漬毒藥治諸腫毒堅硬不消黍黏子葛根升麻地骨皮甘草金銀花黃花地丁各等分上為粗末每用五七錢水一升煎汁沸於腫處四畔熱用冷則再暖治毒腫方草烏尖去皮天花粉赤小豆天南星貝母香白芷拒霜葉陰乾秋後收者上各等分為細末或醋或生薑自然汁調敷中留小口出毒氣腫者散熱者潰當歸內消散治諸般腫毒白殭蠶香白芷貝母桔梗百藥煎甘草上各等分為細末每服二錢用茶清調下縮毒金粉散鬱金半兩白芷一兩天花粉一兩甘草半兩川芎一兩乾葛一兩上為細末每服二錢茶清調下如無鬱金用黃芩或蒲黃皆可代用和血通氣丸人參一兩大黃黃柏黃芩去腐各四兩麥門冬去心二兩牽牛一斤炒香取頭末四兩上為細末煉蜜和丸如豌豆大每服二三十丸食後溫水下尋常積熱之人隔三二日服此藥唯利潤動永不生瘡腫乳香托裡散治一切瘡腫疼痛不可忍者如少壯氣實者先疏利後服之御米殼去蒂萼蜜炒一二兩當歸芍藥川芎各半兩乳香沒藥各一錢上為粗末每服五錢水一盞煎至七分去滓溫服病在上者食後下者食前若未止即再服消毒散出聖惠方治一切腫毒及腫而疼痛者天南星鬱金木鱉子去殼草烏頭赤小豆朴硝研細旋入各等分並生用上為細末如腫赤色用冷水調敷腫四畔如不赤溫淡醋調加味消毒飲子治搭腮腫荊芥穗甘草牛蒡子防風羌活連翹各等分上為粗末水煎三兩服散毒然後用藥塗腮腫處切不可便用藥塗毒氣入喉中不救金花散出十便良方治一切熱毒結聚焮赤疼痛消腫解毒葉子雌黃半兩細研黃連半兩去須檳榔一分鬱金半兩川大黃半兩麝香一分細研上為細末雌黃並麝香同研令勻以麻油調如糊塗於腫上日二換之一方有黃柏無鬱金藜蘆膏出千金方治赤色腫有尖頭者藜蘆二分黃連礬雄黃松脂黃芩各八分上為末豬脂二升二合煎令煬調和以敷上瘑癬頭瘡極效又治濕瘡經年抓搔癢處成孔者梔子仁湯出外科精要治時氣頭面赤腫鬱金枳殼去穰升麻各一兩梔子仁牛蒡子大黃各一兩上為細末每服三錢蜜水調下金黃散治敷諸腫毒天花粉黃柏寒水石黃芩何首烏上各等分為細末用涼水調敷之又方用鬱金治敷腫痛藥赤小豆一升天南星二兩小粉二兩炒木鱉子一兩用肉草烏二兩上為細末用米醋調敷加無名異尤妙溻腫湯出御藥院方諸腫痛不消或筋脈拘攣不能屈伸蒲公英黃花地丁枸杞苗鷺鴛藤升麻葛根各等分上為粗末每用半兩水一升煎十沸去滓熱溻冷則再暖溻之團腫方草烏白芨白蘞黃柏朴硝各等分上蜜調入醋和勻團腫外即便收起治諸般腫毒並便毒疽癰方白朮赤茯苓豬苓澤瀉栝蔞各等分上一半水一半酒煎一盞露天一宿若病在上飽後服在下空心服五香散出聖惠方治一切毒腫疼痛不止沉香一兩木香一兩丁香薰陸香各一兩麝香一錢細研上為末入麝香更研令勻每服二錢水一鍾煎至五分不去滓不拘時候溫服一方滓敷腫上佛手散出御藥院方治一切腫毒黃柏大黃各一兩甘草半兩朴硝三兩粟米粉一兩上為末每用水調如膏塗患處消腫毒方牡蠣草烏頭南星半夏貝母上各等分用薑汁面調塗之一方添知母單用薑汁塗之內消散敷前項赤腫朴硝香附子木鱉子橘紅上為細末用蜜水調敷之內托散出儒門事親治諸般腫毒惡瘡一服立愈大黃牡蠣各半兩甘草三錢栝蔞二個山梔子亦可上㕮咀每服三錢水一大碗煎至七分去滓溫服麝香散治皮肉猝腫起已入腹者及産後妒乳腫痛壯熱欲結成癰者宜服此方麝香薰陸香青木香雞舌香各一兩上以水四升同煮取二升分為再服若惡核腫結不可散者以吳茱萸小蒜等分合搗敷之單蒜亦可一方為末水調服消腫毒方用檳榔半兩豬糞燒存性半兩龍骨三錢輕粉少許鹽湯洗患處拭乾油調塗之效乳香餅子出聖惠方治一切惡瘡腫毒蔓荊根一握乳香一兩黃連一兩去須杏仁四十九枚湯浸去皮上搗三五百杵團作餅子三四分厚量腫處大小貼干即易肘後用術三四錢白者各銼消腫毒方用黃蠟熔開攤紙上用茶湯入飛鹽洗患處後用蠟膏貼之三日一洗換祛毒散出應驗方治腫毒便毒一切惡瘡敷貼效貝母白芷各半兩赤小豆四十粒蒼耳葉四十九葉上為細末用蜜水調敷腫處無蜜新井水調如干再調濕頻換日三五次即愈犀角消毒散犀角防風人參大力子甘草生各一兩上為末每服五錢水半碗煎一盞冷服通氣散治諸腫毒初發無異宜服陳皮一斤去蒂阿膠四兩炒甘草四兩上㕮咀每服半兩用水二盞煎八分去滓溫服替針膏出應驗方信江子斑蝥上為細末丸如小麥粒大每用時針挑破安藥在內膏藥貼上妙治頸項及胸背有大腫赤發即封之令不成膿方出千金方朴硝三兩香豉生地黃各半斤上合搗煮令地黃爛熟敷腫處厚二分日三四易至瘥止兼治一切腫治諸般腫毒出聖濟總録用紅槿花去萼搗為膏敷之若干以蜜調敷五倍子散治一切腫毒五倍子大黃黃柏各一兩銼上為散新汲水調如糊日三五度塗敷患處如冰散治一切腫毒無名異苦杖香白芷上各等分為細末用新汲水調敷之黃芩湯治汗後餘毒頰腫痛黃芩栝蔞甘草上㕮咀每服半兩白水煎服縮毒散治諸般腫毒白芷二兩山梔子二兩半上為細末每服二錢用酒調下隨病服治諸腫毒方生薑一塊洗淨乾山藥比姜用三分之二上一處搗爛敷腫處乾溼自加日換五七次即消治一切惡腫毒出聖惠方槐子半斤護火草一把上合搗水和敷上干即易之治無名腫毒或背疽治法腫圍之名鐵井檻蒼耳端午前收燒灰存性芙蓉葉重陽前收同研為末上以蜜水調敷之治臂腕腫痛取死蛇一條以水煮取濃汁浸腫痛冷易之治諸惡腫失治有膿出肘後方取燒棘針作灰水調敷之經宿頭出治手腳痠痛兼微腫取烏麻五升熬碎之酒一升浸一宿隨多少飲之治腫以柳枝如腳指大長三尺二十枝水煮令極熱故帛裹腫處取湯熱洗之即瘥又方以醋研萊蔔子服之消腫毒不可以地黃同食用時以水研服之治身體手足腫以牡驢脂和鹽敷之治身體手足猝腫以米醋和蚯蚓屎敷之治猝暴微腫中有物如石痛刺啼呼若不治百日死取商陸根搗汁或蒸之以布籍腹上安藥勿令腹冷冷復易晝夜勿息治一切腫以紫檀細碎大醋和敷腫上又方以紅藍花熟爛搗取汁服之不過再三服便瘥服之多少量腫大小而進之治暴患赤腫以藝香皮三兩搗和三年醋滓封之日六七易亦治妒乳腫服丹石人採藥生服一兩莢佳子作醬食能助肺殺諸蟲下氣令人能食滿心腹間惡氣猝心痛食之良治穀道赤腫以杏仁杵作膏敷之治諸腫方取江石碎如棋子炭火燒赤投米醋中浸之良久又燒如此十遍鹿角一具連骼骨者二三寸截之炭火燒令煙出即止加白蘞末與石末等分鹿角倍之三物同搗篩令極細取三年米醋於鐺中煎如魚眼沸即下前藥調和令如寒食餳以篦敷於腫上惟留腫頭如指面勿令有藥使熱氣得泄如未有腫膿即當內消若作頭即撮令小其病久直至肌肉爛落出筋骨者即於細布上塗之貼於瘡上干即易之但中隔不穴者即無不瘥其瘡腫切禁手觸其效極神異又方以薑汁或乾末和油煎成摩結核上三五度瘥治凡腫已潰未潰者以鯉魚燒作灰醋和塗之一切腫上以瘥為度獨勝散治腿上赤腫疼痛漸次移下消用真川芎為細末五錢擂蘿蔔汁調服消腫毒方用好京墨醋磨塗四圍薑汁和豬膽塗毒上干即再塗效治毒氣攻手足腫疼以櫸樹皮槲皮合煮汁如飴糖以樺皮濃煮汁絞飲之赤龍散出儒門事親消散一切腫毒以野葡萄根紅者去粗皮為末新水調塗腫上頻掃新水水調膏出百一選方治一切腫毒以小粉不拘多少炒令焦黑研細先以米醋一大盞入捶碎皂角二梃煎滾數沸濾去皂角滓密收之逐旋調藥或攤紙花上敷之神效方治痄腮及癰疽發背瘡癤等證立效以赤小豆為細末以新汲水調敷瘡上及四邊赤腫處干即再敷之蒺藜散以蒺藜一升熬令黃搗篩以麻油和之如泥炒令焦黑以塗故帛上剪如腫大勿開頭揩上無蒺藜子用小豆和雞子如前干則易之甚效神效方出肘後方療一切腫初覺痛不可忍取面溲如十指粗取繞腫令匝滿中布生椒又以一斤面可椒上蓋之當中以艾炷如酸棗大灸之蓋面欲焦即換著新面痛停止水銀拓方出聖濟總録治惡毒風腫熱疼以水銀二斤以紙分為兩裹密系頭更以帛重裹勿令走失遞互拓腫上覺濕即易不過十數度熱盡歇即消矣神效一方治偏腫毒以茴香甘遂各等分用酒調二錢服之團腫方以馬齒莧朴硝黃柏以水蜜和塗腫處治諸腫毒及火丹蛇咬以地錢草丹爐中名此俗呼火丹草其形如小錢大葉如荷葉又名散風草和姜鹽爛搗敷之立愈或加見腫消草尤良祕方治腫毒以黑豆一斤米醋煮乾就炒燥研末山藥半斤為末官桂二兩為末用鮮米粉作糊為丸無灰好酒送下一百五十餘丸不拘時候三聖散治無名腫毒惡物所傷並破傷風以好石灰一斤鐵鍋內炒紅傾入瓷器內加大黃二兩和勻水調搽腫暈處又方以貝母香白芷酒擂服以滓敷之初患者一宿即消痄腮方用水調乳香末塗之仍服蘇子降氣湯治一切熱毒癰腫疼痛不可忍方出聖惠方用蒼耳子不限多少熬令微黃搗為末取油澱相和塗於腫上干即換之蒼耳汁漬之佳治毒攻手足腫疼痛方出肘後方用鹽豉及羊屎一升令熱以漬之又方細銼黃柏五斤以水三斗煮漬之亦治攻陰腫痛又方以牛肉裹腫處消腫痛止羊肉亦得皂莢乳香酒出聖濟總録治腫毒以皂莢刺大者一枚銼作十餘片用乳香一塊雞頭大銀石器內炒令煙起入皂莢刺同炒候香纏在刺上便入醇酒一盞同煎令沸濾去滓作一服腫未成者便消已成者則膿毒自破消腫毒方用黃柏蘸豬膽汁炙數次為末水調塗之又方用野地人糞下土水調塗之又方用好粉油調碗內另燒艾熏至黃色抹搽之又方用生茄子皮貼臭黃水即出一日一換亦可治臁瘡犀角升麻湯出本事方治陽明經絡受風熱口唇頰車髮鬢腫痛及鼻痛不可開口雖言語飲食亦相妨犀角七錢川升麻半兩防風一錢半羌活三錢川芎白附子香白芷各二錢半黃芩三錢半生甘草一錢半上㕮咀都作一服水五盞煎至三盞半去渣分作三服一日一服訖其證必減如臟腑有些溏不妨足陽明胃經也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市㕓無所不有也六經之中以胃經血氣俱多腐熱飲食之毒聚於胃故此方以犀角為主飲食之毒陽明經絡環唇挾口起於鼻交頞中循頰車上耳前過額上入循髮際至額顱昔王公患此一經亦以升麻佐之余藥皆滌除風熱升麻黃芩專入胃經故用有效神應散出御藥院方治諸瘡腫硬色白不潰疼痛不已用吳茱萸不以多少生用為粗末尉烙卻用鹽包蓋之升麻湯大潝潰腫痛毒消赤散出家藏經驗方治一時赤腫作痛黃丹一錢生草烏二錢半牡蠣四錢火煅蛤粉八錢生上為細末每用三錢汲井花水調用鵝毛掃敷治腫不下出百一選方冬青葉川柏甘草上等分煎湯以五升瓶盛湯浸三兩時必下柏皮散出楊氏家藏方治一切風熱毒氣赤腫疼痛赤小豆天南星生用黃柏上三味各一兩土朱一分上件為細末新水調成膏子攤在紙上貼之消腫散出楊氏家藏方治風熱毒氣上攻頭面或遍身赤腫疼痛鬱金甜葶藶大黃黃芩以上四味各半兩芒硝另研赤小豆一合伏龍肝二兩上件為細末以生雞子白入蜜少許調令稀稠得所塗之干即再塗如冰散出楊氏家藏方療風邪熱毒壅滯肌肉榮衛不宣蘊積成腫血澀膚腠如行舟之狀風隨氣行遊無定處邪毒攻衝焮赤熱痛朴硝五兩另研蛤粉寒水石各三兩香白芷一兩腦子一錢另研上為細末和勻每用新汲水調稀稠得所以雞翎塗掃勿令藥干玉粉散出楊氏家藏方治熱汗浸漬成瘡腫癢焮痛治身體頭面忽有暴腫處如吹方出肘後方用巴豆三十粒連皮碎水五升煮取三升去滓綿蘸以拭腫上趁手消勿近口七聖散出衛生家寶方治消熱毒赤腫痛不可忍黃芩一兩去黑心大黃一錢滑石四兩上為細末每次二錢用冷水調掃腫赤痛處如干即再掃白鶴散一名提毒散出衛生家寶方治熱毒腫硬難消者寒水石軟者火燒不爆散者乃是寒水石燒爆烈散即是石膏不可用上用炭火燒寒水石通赤細研冷水調少許在瘡高處後用萬金膏貼每日一次上用此藥後便軟做瘡頭兒更用七聖散掃膏藥周回腫處藥干即更掃治猝風毒腫出聖惠方伏龍肝上以醋和如泥塗於腫上干即易之又方上以獨顆蒜切作片子貼於腫上以艾火灸之二七壯極驗水調膏出衛生家寶方治風熱腫毒結聚未成頭者寒粟米不拘多少遇三伏日用盆鉢盛粟汲井花水浸頓露地五七日一易水直至盡臘方取出搗研如膏曬令乾入鍋炒令焦黑色出火毒為細末每量約用多少水調成膏攤紙花上貼之效白芨散出十便良方治發瘡腫硬熱赤不散麒麟竭指面大塊木鱉子五個去皮殼研白芨五大指塊黃連半兩上為末用豬膽汁調塗上留一竅以瘥為度干即易之治赤腫白芷大黃各等分上為末蜜醋調塗治腫毒出本草用土蜂窠上細土醋和為泥敷之治一切腫毒兼止疼痛出本草用皂角於酒中取盡其精於火內煎之成膏塗帛貼之治腫毒出本草用落蘇入醋摩敷之治腫毒出本草用地椒作湯淋泄敷腫方出本草取鼠公壤堆上土苦酒和為泥敷腫極妙一方用酒治諸腫失治有膿出本草以蛇蛻皮燒灰水和封腫上即蟲出治諸惡腫出本草取黃藥根研服之塗赤腫上治腫毒出本草以大青莖葉搗塗窨患處又方出本草以瞿麥搗敷之治腫毒遊風風疹頭痛出本草並以芭蕉根研窨敷治腫毒出本草用蘿蔔子醋研敷之消又方出本草用白商陸同大蒜熁之消腫毒出本草以積雪草用鹽挼貼腫上治一切腫痛風疾出本草以刺虎根葉枝干細銼焙乾搗細為末暖酒調服一錢治一切赤腫但癰毒結未成者並可消用黃蜀葵子不拘多少研細滴水研令稀稠得所將絹帛子裹定旋挹所餘汁撲腫所四畔數撲之有奇效法治毒攻手足腫疼痛方掘坑令深三尺少容兩足燒坑令熱以酒灌坑中著履踞坑中壅勿泄治腫多癢按之隨手起或癮疹方但令痛以手摩將抑挼數度自消治皮膚惡腫出本草以仰盆水磨敷之風腫附論夫風腫之證不痛不赤一身浮腫起如吹脬但覺體冷如石煩滿短氣骨節沉重此蓋陽氣不足腠理虛疏為風邪所乘久而不去復為寒濕所搏壅塞不痛結盛生熱致令身體浮腫內經謂熱勝則腫是也久不愈則風熱積肌肉潰為肉泥之類便致危殆治與水腫不同宜以通榮衛去風濕之劑調之人忽發風腫或著四肢或在胸背或著頭項發作虛腫如吹之狀不痛不赤著四肢者乃欲不遂令人煩滿短氣身體常冷皆由冬月遇溫風入於肌里至春復大寒風不得出氣壅肌間不自覺知至夏恣取風涼氣聚不散而成腫也久不瘥氣結成生熱者乃化為膿若至爛敗則殺人右手關上脈浮而虛者病腫也方龍沙丸出聖濟總録治一切風毒頭面虛腫癢麻遍身風瘙生瘡風氣遊走骨肉疼痛攻刺胸膊頭項熱痛冷痹白虎風腳手干小腎臟風拘急四肢轉動不得流灌腳膝上腫眼目昏暗澀淚赤腫女人血風鑽刺四肢瞤麻發落頭疼男子腎臟風下注變為腳氣瘡紫黑脹爛等疾天麻芎藭附子炮裂去皮臍狗脊去毛躑躅花藿香葉紫葳凌霄是也乾蠍去土炒地龍去土炒藁本去苗葉白芷乳香研楓香脂研白殭蠶炒各半兩萆薢一兩蒺藜子去角炒獨活去蘆頭各半兩麻黃去根節敗龜醋炙各一兩烏頭炮去皮臍白花蛇酒浸去皮骨炙一兩上以一十九味為末與二味研者和勻煉蜜丸如彈子大別以丹砂一分龍腦麝香各二錢同研為末每服一丸空心薄荷溫酒嚼下烏蛇膏出和劑局方治風毒瘡腫疼痛犀角散出聖濟總録治諸風腫犀角鎊玄參連翹柴胡去苗各半兩沉香甘草炙銼檀香射干去須各一分芒硝生用一兩升麻三分木通銼三分麥門冬去心焙一兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服食後良久及夜食後各一服利多即減一名犀角湯無檀香茯苓散出聖濟總録治風氣攻頭面浮腫煩渴心中燥悶腹肚脹滿小便祕澀赤茯苓去黑皮郁李仁去皮赤芍藥各一兩半大腹二枚並子百合柴胡去苗桑根白皮銼陳橘皮湯浸去白焙枳殼去稂麩炒知母銼焙各一兩上粗搗篩每五錢用水二盞煎至一盞去滓入芒硝末一錢更煎沸分溫二服空心夜臥各一尉風散出瘡科精要治諸因風致腫羌活防風白芷當歸芍藥細辛芫花吳茱萸官桂各等分上為粗末作二劑赤皮蔥連須切半片同釅醋拌勻炒令極熱帛裹於瘡尉之稍冷即換藥尉之上下痛止而已連翹散出聖惠方治風腫欲結成膿令內消連翹一兩半沉香紫檀香犀角屑川升麻甘草各一兩射干元參各二兩川芒硝三兩上為粗散每服四錢水一中盞煎至六分去滓食後良久溫服射干湯出聖濟總録治諸風腫欲成膿射干去須玄參堅者各二兩犀角鎊連翹紫檀香沉香銼升麻各一兩上為粗末搗篩每服五錢用水一盞半煎至八分去滓入芒硝末半錢更煎沸食後夜臥溫服若利即減羚羊角飲出聖濟總録治風毒攻衝頭面虛腫羚羊角鎊犀角鎊羌活去蘆頭檳榔銼人參各一兩當歸切焙半分上粗搗篩分作四服每用水二盞煎至一盞去滓空心臨臥溫服余滓重煎解風腫毒腫出聖惠方沉香木香薰陸香麝香雞舌香紫檀香上各等分為細末用水調敷之黑豆浸酒出聖惠方治風腫無問冷熱黑豆一升炒黑白花蛇一條重五兩酒浸炙微黃大麻仁二升蒸熟五加皮五兩銼蒼耳子五兩炒微黃牛蒡子一升酥炒微黃上搗碎生絹袋盛用好酒三斗納入瓷瓶中封頭浸七日開瓶每於食前暖一中盞服之半夏散出聖惠方治猝熱毒風腫半夏莽草川大黃白蘞川芒硝各一兩上為末以水和如泥塗之干即再塗生犀湯出聖濟總録治諸風毒氣身體疼痛面目暴腫連手足生犀角鎊三分貝齒生用先搗後研一兩羚羊角鎊一兩半升麻一兩三分生用上粗搗篩每服三錢用水一盞煎至六分食後去滓服日二服夜一鹿角散出聖惠方治皮猝風赤腫鹿角五兩白蘞二兩牡蠣四兩附子二兩上為末以醋調塗於帛上貼腫處干即換之黃耆丸出聖濟總録治風毒腫滿黃耆銼枳殼麩炒去瓤威靈仙米湯浸洗焙乾木石臼中搗各一兩上為細末以軟飯和丸如梧桐子大每服三十丸溫酒下不拘時祛風散出聖濟總録治風腫塗方天南星白礬草烏頭去皮臍上等分並生為細末每看腫處用酒調雞翎掃之如風毒腫甚者生薑自然汁調刷之立消木香散出聖濟總録治風腫木香楓香脂各半兩生菖蒲一兩上為散醋調敷之治風毒腫氣急硬疼痛方出十便良方柳枝一握細銼桑枝一握細銼黑豆一升上藥相和炒候大豆熟為度以好酒五升投之良久澄濾去滓每夜欲臥時以意酌斟暖飲之其滓入鹽一兩炒令熱以帛裹之於腫處尉之冷即炒不過三兩度重苔草散出聖惠方治風毒暴腫重苔草木鱉子去殼半夏一兩上為細散以醅醋調塗之凡是熱腫熁之即消當歸湯出聖濟總録治風腫當歸切焙二兩半甘草炙銼一兩半上粗搗篩每服五錢用水一盞半煎至八分去滓空心溫服午時夜臥各一次大麻仁敷方出聖濟總録治風腫大麻仁生用赤小豆生用各二合上搗研極細冷水調敷之紫檀塗方出聖濟總録治風毒腫紫檀香銼二兩芒硝半兩上水磨每用濃者三合塗腫處干即易桑枝湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫或在腳在手桑枝切槐枝切各一升上以水一斗煮七升去滓淋洗芎藭淋洗方治風毒攻肌肉皮膚浮腫或在腳在手芎藭二兩苦參三兩上細銼以水一斗煮取七升去渣淋洗蠶砂尉方治風腫晚蠶砂鹽各不拘多少上相和炒熱布裹尉之冷即再炒或入少許醋大佳治身體手足猝風腫方驢脂四兩鹽二兩上搗令熟敷腫上日三易之又方浮萍草三兩紫草三兩上搗令熱敷腫上干即換之蛇床湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫或在腳或在手取蛇床子一升生用以水一斗煮至五升去滓通手淋洗蝙蝠糞頭方出聖濟總録治風毒腫以蝙蝠糞研細以冷水調塗之杏仁膏出聖濟總録治風腫以杏仁生用五合燒令煙出窨滅細研取駝脂二兩熬濾去筋膜和勻成膏敷腫上點燭遙灸蒴藋煎出聖濟總録治風腫以蒴藋根洗切八斤爛研以水三斗浸絞取汁熬如稠膏取豬脂一斤熔去滓大停冷與前膏和勻更煮三五十沸每服一匙至二匙空心臨臥熱酒調下又取塗摩患處一云用苗切五升用水一斗煮取七升去滓淋洗磨桂塗方出聖濟總録治猝得風腫以桂不拘多少去粗皮用醋於砂盆內磨塗風腫上火炙乾又塗之附子湯浸洗方出聖濟總録治風毒攻肌膚皮肉浮腫或在腳或在手以附子生去皮臍銼四兩用水一斗煮至七升去滓熱洗余滓更煮洗馬藍湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫取藍切五升以水五升再用五升煮取八升淋腫處白楊湯洗方出聖濟總録治風毒攻肌肉皮膚浮腫以白楊皮取東南面皮去地三尺以來去蒼皮勿令見風細切半斤用水一升煎至七分去滓熱洗以腫消為度治風毒腫及麻痹出本草以芥子醋研敷之治手足心風腫出肘後方以秦椒鹽末等分醋和敷之治風腫止痛撲損惡瘡出本草以菝葜葉和鹽塗敷之佳治猝風毒腫氣急痛出聖惠方以柳白皮一斤銼酒煮令熱帛裹尉腫上冷再煮易之去風毒瘡腫出聖惠方以都管草四時皆有採其枝根煎湯淋洗治風腫成瘡已潰未潰者皆效出肘後方以牛膠大片水漬濕軟貼之當頭上開一孔子如已潰還合未潰即潰能撮去膿膿盡則合未成則內消一方用白膠一片效治諸瘡因風致腫方出千金方以白芋燒灰溫湯和厚三分敷瘡上干即易五六度瘥又方出千金方取櫟根皮三十片銼以水三斛令煮熱下鹽一把令灼灼然熱以浸瘡當出膿血日日為之瘥止一方無鹽治風腫外風入瘡口腫痛方用劉寄奴末摻瘡口止痛治熱毒風腫及諸癰發背等證出聖惠方用牛蒡根去黑皮切半斤以無灰酒一升水二升相和下牛蒡慢火煎汁濃看少黏即去滓卻向鐺中煎如稀餳即停火膏成先以膏於腫處塗之便著故帛貼之日夜三四度易之治風腫及惡瘡疥敷之疼痛內消方出十便良方用肥皂莢一斤以文火炙令黑色搗為末取酒三升入藥熱攪熬成膏臨時看疾狀大小用藥塗貼日二易之蕓薹膏方出聖濟總録治猝風腫以蕓薹子一升用米醋二升略煎三五沸漉去爛研漸入醋調絹絞取汁又取桂二寸搗末杏仁四十九粒生用湯退去皮尖雙仁爛研生薑三兩搗汁相和然後取天靈蓋兩片各掌大洗去汙垢燒灰搗羅為粉與諸藥和勻以火養成膏旋取貼於腫上不過兩三次其腫自消又方出聖惠方治風腫用皂莢刺一撮去兩頭以水一大盞煮取六分去滓頓服取快利其腫便消治猝風腫毒起急痛方出聖惠方用蔓荊根一斤洗去土爛搗以醋和如泥敷腫上以帛裹三日易之又方出聖惠方治風腫用牛糞燒灰為末醋和敷腫上干即易之又方出聖惠方治風腫用川芒硝二兩研為末用醋調敷之干即再塗治皮肉猝腫起出肘後方用水和石灰封上妙又方出肘後方用苦酒磨升麻或青木香或紫檀香以磨敷上良一方以苦酒磨桂或獨活數敷之良治風腫出本草搜桑根下土為泥餅敷風腫上仍灸三二十壯取熱通瘡中又人中熱風水肉腫一個差以土埦灸二百壯當下黃水即瘥也治風瘡腫惡毒出本草以黑錫醋為末和青木香末豬脂調敷主風腫毒及諸瘻出本草以惡實根作茹食之解風腫出本草以菩薩石用水磨服之治風毒腫白虎湯出本草以三年醅醋五升熱煎三五沸切蔥白二三升煮一沸許漉出用帛熱裹當病處尉之瘥為度洗方出本草治風腫風損及瘡等用石榴葉馬鞭草貼壁草煎湯洗之治風腫毒瘡疥癬臘月收者野豬脂塗之氣腫附論內經謂因於氣為腫四維相代則腫毒之作蓋有因於氣者以諸氣屬於肺肺主皮毛氣為風邪所搏則鬱而不通腫見於皮毛之中然氣虛無形故狀如癰無頭虛腫而色不變皮上雖急動之乃痛凡身中痛處忽如打撲之狀名曰氣痛痛不可忍遊走不住發作有時痛則小熱痛定則寒此皆由冬時受溫氣至春暴寒風來折之不成溫病乃作氣痛宜先服五香連翹湯摩丹參膏又以白酒煎楊柳皮及暖尉之有赤氣點點者即刺出血也其五香連翹湯及小竹瀝湯可服數劑勿以一劑未瘥便住藥以為無效即禍至矣中間將白薇散佳又有氣腫痛其狀如癰腫無頭虛腫色不變但皮急痛不得近手亦須服此五香湯次用針瀉之次與蒺藜散敷之方白薇散出聖濟總録治氣腫痛狀如瘤而無頭但虛腫色不變皮急痛白薇防風射干當歸切片用酒炒防己木香天門冬去心焙烏頭炮剖去皮臍枳殼去爪麩炒獨活去蘆頭山茱萸葳蕤各一兩麻黃去根節湯煮掠去末一兩柴胡去苗白芷莽草各半兩秦艽去苗二兩椒二兩上為散漿水服方寸匕日三加至二寸匕仍以五香湯瀉之次以蒺藜散敷之一方有枳實無枳殼小竹瀝湯出千金方治氣痛淡竹瀝二升射干杏仁獨活枳實白朮防己防風秦艽芍藥甘草茵芋茯苓黃芩麻黃各二兩上㕮咀水九升煮取半下瀝取三升分四服犀角湯出聖濟總録治氣不消犀角鎊獨活去蘆頭生麥門冬去心焙各二兩枳殼去稂麩炒二兩木香沉香大黃銼炒二兩白蘞各二兩丁香一兩半玄參九兩連翹六兩漏蘆半兩木通銼甘草炙朴硝各一兩上粗搗篩每服五錢用水一盞半煎至八分去滓溫服以利為度大五香湯出聖濟總録治毒氣在肌肉中腫痛寒熱急者數日殺人若心腹悶當急服雞舌香沉香藿香各五兩薰陸香一兩麝香研一錢甘草炙吳茱萸湯浸焙炒各三兩細辛桂去粗皮各半兩升麻一兩一分上除麝香外粗搗篩入麝香拌勻每服五錢用水一盞半煎至一盞去滓溫服日三海藻浸酒方出聖濟總録治風腫行走無定或起如蚌大如甌或著腹背或著臂腳海藻洗淨赤茯苓去黑皮防風去叉獨活去蘆頭白朮附子炮剖去皮臍各二兩鬼箭去莖用羽當歸切銼各二兩大黃銼焙炒四兩上銼如麻豆生絹袋貯以酒二斗浸之春夏五日秋冬七日初服三合空心午時臨臥各一服若頻利即減未利加至四五合瘥為度虎骨丸出聖濟總録治氣腫走注疼痛不可忍者虎脛骨去筋骨肉刷洗淨塗酥炙黃黃耆銼杜仲去粗皮各二兩麝香另研半兩附子炮剖去皮臍二兩乳香另研半兩上四味搗篩為細末入麝香乳香再研令勻酒煮麵糊丸如梧桐子大每服二十丸空心溫酒下加至三十丸甘草酒出聖濟總録治毒氣腫當頭上如刺痛甘草炙升麻沉香麝香另研各半兩豉一兩半上除麝香外粗搗篩入麝香拌勻每服五錢用酒一盞半煎至八分去滓早晚食前各一服其滓熱敷腫上甚者取豉半升梔子仁十四枚葵菜二兩三味用水二升半煎至一升濾去滓溫服空心午後晚間服盡為度檳榔散出聖濟總録治一切毒腫或癢或痛檳榔銼凝水石煅各一兩烏頭大者一枚去皮臍生用吳茱萸一錢半生用硫黃半兩研上為細末用生油調敷之桃仁酒出聖濟總録治氣毒腫痛變走諸處或牽引小腹及腰臍痛桃仁一升湯浸去皮尖雙仁炒酒二升上先乘熱搗桃仁如膏漸入酒研絞去滓每服五合空心夜臥溫服一方後用衣被蓋令汗不過三劑瘥蒺藜塗敷方出聖濟總録治氣腫其狀如癰虛腫色不變皮上急痛蒺藜子去角炒赤小豆各一兩上為散用雞子白調如糊塗敷腫上干即易之蒺藜散治氣腫痛以蒺藜子一升熬令黃為末以麻油和如泥焳炒令焦黑以藥攤青布上如腫大小勿開孔貼之無蒺藜用小豆末和雞子如前干易之妙馬齒莧塗方治一切腫以生馬齒莧不拘多少入水搗爛放銅器中用新汲水沉冷敷腫上熱即易如無以慎火草代之治毒氣以蒺藜子為末加醋封之日三易之治氣攻腫痛坐臥不得以獨頭蒜去殼入油少許同研如泥塗敷腫上日三次熱腫附論內經謂諸病胕腫皆屬於火故熱勝則腫流走無常若火炙然亦或謂之流腫也此得風熱搏氣血而作熏爍鼓動流四肢而著腹背大則如盤小則如手甚者熠熠然遍於一體之中令人五心煩熱唇口乾燥如渴之狀治宜湯液瀉滌於內膏敷發泄於外使熱氣得通則腫自消矣方犀角膏治熱毒犀角鎊屑升麻山梔子去皮生用黃芩去黑心芍藥芒硝連翹大黃銼生用蛇銜草各二兩白蘞生用二兩漏蘆去蘆頭生用二兩半玄參黑藍者一兩蒴藋切四兩干葉生用半兩生地黃十兩研絞取汁豬脂四斤不入水者另煎上納十四味銼如麻豆與地黃汁相和經宿別煎豬脂濾去筋膜停溫入諸藥以微火煎半日去滓膏成用瓷合盛以故帛塗膏貼腫處及瘡上犀角散治熱腫熱毒防己丸治熱毒防己大黃銼醋炒各三兩芍藥檳榔煨各二兩二分牛膝去苗酒浸焙薏苡仁生乾地黃麥門冬去心焙木香各一兩半桂去粗皮一兩一分茯神去木各一兩上為末煉蜜丸如梧桐子大每服二十九丸漸加至三十丸食後良久溫酒或生薑湯下日三漏蘆湯療熱腫及癰疽發背一切成瘡丹疹毒腫惡肉及眼赤痛腫翳膜瘡疥久不愈者皆可服之漏蘆無用梔子白芨一作白蘞黃芩麻黃白薇無用知母枳實炙升麻無用犀角芍藥甘草炙各三兩大黃三兩無用芒硝上㕮咀以水一斗煮取三升分三服快下之無藥處單用大黃本方有芒硝今去之若見熱加實者加大黃五分或加芒硝亦可肘後治癰疽丹疹腫毒惡肉千金翼無白薇劉涓子無芍藥有連翹始時行熱毒變作赤色癰疽丹疹毒腫及眼赤痛生障翳若熱甚可加芒硝二兩經心録無白薇有知母犀角芒硝各二兩此方與小兒篇方相重分兩服法異一方有當歸牛膝大黃散治諸熱毒腫痛欲成瘡癤者栝蔞根大黃黃芩去黑百合各半兩葛根一兩銼當歸切焙半兩黃柏根銼芒硝赤小豆各一分粳米一合上銼焙為散量腫處大小用新汲水化蜜調藥如膏攤於腫處紙蓋之一日一換赤小豆湯治少年氣血俱熱遂生瘡疥變為腫滿或煩或渴小便不利者赤小豆炒當歸去蘆炒商陸連翹仁赤芍藥漢防己木豬苓去皮桑白皮炙澤瀉各半兩上銼散每服四錢水一盞半生薑五片煎不拘時候溫服熱甚者加犀角二錢半青木香散療一切熱毒腫痛極驗方並主癰疽乳癰青木香紫葛紫檀朴硝各二兩赤小豆二合蜀升麻銼白蘞生礬石各一兩上搗篩以水和如稀麵糊又以榆皮汁和之亦妙以布剪可腫大小仍每片剪三兩個小孔子塗藥貼腫上干即易之又貼毒熱腫消方以商陸根蕓薹苗葉根各等分搗之依上方貼效又療一切熱瘡腫硝石膏方硝石一斤生麻油三升上將油先煎令黑臭下硝石緩火煎令如稠餳膏成以好瓷瓦器中收貯以塗貼瘡腫或熱發服少許用好酥煎良忌生血物地黃煎丸出瘡科精要治臟腑有熱胸膈痰實氣血不和經絡祕澀多生瘡腫已患惡瘡腫毒大小便結澀黃芩去腐三兩黃連五兩人參二兩枳殼炒去穰大黃各二兩半生地黃新者十兩洗水浸研如泥上除地黃煎外併為細末再和地黃煎和搗入煉蜜丸如豌豆大每服五七十丸食後溫水下素有熱之人日服百餘丸不發瘡瘍年高氣弱之人亦以常服清利胸膈明目漏蘆湯出濟生拔粹方治臟腑積熱發為腫毒時疫胳瘩頭面洪腫咽喉堵塞水藥不下一切危惡疫癘升麻大黃黃芩各一兩藍葉玄參各二兩漏蘆一兩上㕮咀每服四盞水一盞半煎至六分去滓溫服腫熱甚加芒硝二錢半快利為度已利去硝一方竹葉二十一片同煎五香湯出千金方治熱毒氣猝腫痛結作核或似癰癤而非使人頭痛寒熱氣急者數日不除殺人病愈後餘毒或觸犯再服之青木香藿香薰陸香沉香丁香各一兩上㕮咀以水五升煮取二升分三服不瘥再服並以滓搗薄敷腫上千金翼以麝香代藿香解毒散出濟生方赤熱腫收赤暈寒水石二兩龍骨半兩黃連去須黃柏各一兩輕粉一錢上為細末和雞子清調以雞翎掃瘡上若是熱瘡加黃丹半兩秦皮湯出聖濟總録治熱腫懼向暖處周身毒熱蒸人者秦皮銼一兩半防風去尖三兩車前子微炒二兩黃連去須三分上粗搗篩每服五錢水一盞半煎至七分去渣溫服食後臨臥各一麝粉散出聖濟總録治熱腫毒麝香研半錢膩粉一錢馬兜鈴根一分黃柏半兩上搗研為散用油調塗腫立消拔毒散出外科精要治熱毒丹腫遊走不定石膏生用四兩寒水石生用四兩黃柏甘草各一兩上為細末每用新水調掃之油塗之或紙花貼干則以涼水潤之亦妙亦治疔腫水煎服又若大熱背腫身多生瘡下諸熱方露蜂房六兩緋帛一尺亂髮三兩升麻三兩上先用緋帛裹蜂房等以麻纏便於炭火上燒令煙盡及熱搗碎作黑灰篩之取末候熱時空腹酒和服一方寸匙日再服此藥五六日即看以小便及大便下青黃赤汁及黑物極滑而腥臭者此為下候三五度下即休若多恐令瘦損若不大急困但煮五加木汁服亦療疔腫三黃丸出聖濟總録治熱腫黃連去須大黃銼炒黃芩去黑心各二兩上為末煉蜜丸如桐子大每服十五丸至二十丸溫熱水下不拘時候白龍散出聖濟總録治熱腫赤痛蛤粉白礬各二兩青鹽一兩上同研為末用生油調塗腫處金花散出聖濟總録治熱毒腫黃柏一兩雄黑豆一兩緊小者是也大黃半兩上為散浸甘草水調如膏量腫處大小攤貼以紙花子蓋神黃散出外科精要治一切熱腫攻焮疼痛黃柏末一斤黃丹二兩炒紫色雄黃一兩另研上同研勻用新水調如糊敷掃以小紙花貼稍干以蜜水潤之鉛酒方出聖濟總録治熱毒腫或生癰漿鉛五兩酒一升無灰者上先將鉛熔成汁卻投入酒中又取熔汁再投入酒中如此凡十度然後淨濾使之澄清時時飲三合至五合不可太醉醉甚則吐吐則損正氣也惡實丸出聖濟總録治熱毒腫惡實各三兩山梔子去皮五兩上為末煉蜜丸如梧桐子大每服食後良久熟水下十五丸日再夜一追毒散治一切熱腫欲結瘡癤焮赤疼痛草烏頭去皮臍生搗為細末一兩蚌粉五錢上拌勻每看多少臨時用汲水調攤紙上貼之治兩腿或遍體生熱毒瘡爬著清水腫爛癢痛不可忍方出聖濟總録豉炒煙盡黃連去須各一兩上為末臘月豬脂和塗之如瘡濕即干敷又方用水楊梅葉不限多少水煎減一半傾桶內終日浸洗治一切熱腫毒蔓荊根生一握鹽少許上和搗敷腫上日三易一方用蔓荊根無以龍葵代之佳甘草湯出聖濟總録治熱毒腫或身生瘭漿用甘草炙銼二兩粗搗篩每服六錢用水二盞煎至一盞去渣食後良久及夜臥時各一服治熱腫毒取白鴨糞和雞子白封之毒自消治熱毒足腫痛欲絶出肘後方以苦參酒煮漬之水和亦可治天行熱病手腫以稻穰灰汁漬之佳治熱毒腫出肘後方以惡實根及葉搗爛封之杖瘡金瘡取葉貼之永不畏風又癰癤及丹疹熱毒皆治之明耳目利腰膝則取其子末之投酒中浸三日每日飲三兩盞隨性多少欲散肢節筋骨煩熱毒則食前取子三七粒熬緩吞之十服後甚良細切根如小豆大拌麵作飯煮食尤良肌皮毛間習習如蟲行煮根汁浴之夏浴避風卻以其子炒過末之如茶煎三匕通利小便一方用蒼耳汁敷之治熱腫以山豆根用水研濃汁塗之干即塗療毒熱病攻手足腫疼痛欲絶者以豬膏和羊尿塗之佳治熱毒方取黃雌雞子三顆白和蜜一合服之瘥治熱腫上搗堇汁敷之良堇汁又殺鬼毒生取汁半斤服即吐出治熱遊赤腫用蕎麥麵醋和塗之治一切熱毒腫出肘後方以商陸根和鹽少許敷之日再易下熱氣腫壓丹石煩熱以生大豆煮食之又大豆汁解諸藥消腫治熱毒出肘後方用浮萍搗汁敷之令遍熱敷之亦可治熱腫出肘後方取黃色雄黃雌黃色石燒熱令赤以火醋沃之更燒醋沃其石即軟如泥刮取石屑塗腫若干醋和塗之水澄膏出外科精要治熱腫痛大效大黃黃柏鬱金天南星白芨朴硝黃蜀葵花各一兩上為細末每用新水一盞半藥末二錢攪調勻候澄底者去浮水以紙花子攤於腫焮處貼之如極燥津唾潤之此藥除熱毒赤腫神效如皮膚白色者勿用之療熱腫出本草以家芥子並柏葉搗敷之無不愈大約得山芥更妙又搗小芥子末醋和作餅子貼腫及瘰癧數看消即止多貼損肉此療馬附骨良療熱毒病攻手足腫疼痛欲脫出本草取蒼耳汁以漬之治熱腫出本草用龍葵菜煮作羹粥食之治諸毒熱腫出本草用獨行根水磨為泥封之日三四立瘥消風熱結赤腫出本草用鵝抱以酒磨塗之立愈治熱毒出本草以藍汁塗之治熱腫及一切癰腫出本草以甘蔗根搗敷之甚良干即便上無不瘥者
