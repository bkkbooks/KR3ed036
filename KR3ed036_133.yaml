body:
  text: 卷一百三十三傷寒門傷寒煩渴附論夫腎者水臟膀胱者津液之府二經為表裡傷寒熱入於臟流於少陰之經則腎受病矣水惡燥熱盛則燥故渴而引飲又傷寒邪氣非發汗吐下則不能除發汗吐下過甚則亡津液耗少熱氣內生亦令渴也傷寒病煩渴者發汗吐下以後臟腑空虛津液竭絶腎家有餘熱故使其煩渴也傷寒渴者里有熱也傷寒之邪自表傳至里則必有各證隨其邪淺深而見焉雖曰一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃其傳經者又有證形焉太陽主氣而先受邪當一二日發頭項痛而腰脊強者是矣太陽傳陽明則二三日發身熱目疼鼻乾不得臥也陽明傳少陽三四日胸膈痛而耳聾此三陽皆受病為邪在表而猶未甚作熱故不言渴至四五日少陽傳太陰則邪氣漸入里寒邪漸成熱當此之時也津液耗少故腹滿而溢干至五六日太陰傳少陰是裡熱又漸深也當此之時也則津液為熱所傳漸耗而干故口燥舌乾而渴及至六七日則少陰之邪傳於厥陰厥陰之為病消渴為裡熱已極矣所謂消渴者飲水多而小便少是謂熱能消水也所謂傷寒病至六七日而渴欲飲水為欲愈之病以其傳經已盡故也是以厥陰病云渴欲飲水少少與之愈者是也邪氣初傳入里熱氣散漫未收斂成熱里蒸焦膈傳耗津液遂成渴也病人雖渴欲飲水又不可多與之若飲水過多熱少不能消故復為停飲諸疾經曰凡得時氣病至五六日渴欲飲水水飲不能多勿多與也何者以腹中熱尚少不能消之便更與人作病也若大渴欲飲水猶當依證與之與之常令不足勿極意也言能飲一斗與五升又曰渴欲飲水少少與之但以法救之渴者宜五苓散至於大渴欲飲水數升者白虎加人參湯主之皆欲潤其燥而生津液也凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自瘥小渴者乃強與飲之因成大禍不可復救然則悸動也交結也喘咳噎噦乾嘔腫滿小便不利數者皆是飲水過傷而診病之工當須識此勿令誤也歌括云熱氣熏蒸津液耗少所以發渴熱邪深淺條例不同然是渴者大熱里有熱也或曰又經外證猶少陰曰渴厥陰屬肝心之母也病主消渴飲水多而小便少是其裡熱也極已子氣乘母於是挾心火以為煩惟煩則消矣凡煩證用藥並去半夏以其煩躁而逐水也若先嘔後渴者則為欲解當與之水先渴後嘔者則為水停心下屬赤茯湯活人書曰脈浮渴屬太陽寒表不解心下有水氣而渴者小青龍去半夏加栝蔞湯太陽病桂枝證大汗出後大煩渴者白虎加人參栝蔞脈浮小便不利微熱消渴者五苓散傷寒四五日身熱惡風脅下滿手足溫而渴者小柴胡去半夏加人參栝蔞根主之太陽證身體拘熱而渴者小柴胡去半夏為風溫栝蔞根湯主之有汗而渴者屬陽明白虎加人參湯主之虛人老人及春秋月可與竹葉石膏湯陽明病但頭汗出小便不利渴引水漿身必發黃茵陳湯小柴胡去半夏加人參栝蔞根湯傷氣寒熱或發熱惡風而渴屬少陽少陽脅下硬不大便而舌上白胎而渴小柴胡去半夏加人參栝蔞根湯自利而渴屬少陰傷寒熱入於臟流於少陰之經少陰主腎腎惡燥故渴而引飲少陰下利咳而嘔渴豬苓湯主之不利欲飲水者以有熱也白頭翁湯主之切戒太陽證無汗而渴者不可與白虎湯仲景云渴欲飲水無表證者白虎加人參湯脈浮發熱無汗是表未解也不可與白虎湯意以小柴胡去半夏加栝蔞人參也傷寒四五日身熱惡風脅下不滿手足溫而渴者小柴胡去半夏加栝蔞人參也陽明證汗多而渴者不可與五苓散汗多胃中燥者苓復利小便故也意以竹葉湯與之仲景云陽明病發作者有時汗出多言急下之然太陽病渴終不可與白虎耶太陽證得汗後脈洪大而渴者方可與之也陽明病渴終不可與五苓散耶陽明證小便不利汗少脈浮而渴者方可與之此皆仲景之妙也仲景豬苓湯證亦云脈浮發熱渴飲水小便不利者豬苓湯主之凡病非大渴不可與水小渴咽乾者少少呷滋潤之令胃中和若大渴煩躁甚能飲一斗者與五升飲之若全不與則乾燥無由作汗發喘而死常人見因渴飲水得汗小渴遂劇飲之致停飲心下滿結喘死者甚衆當以五苓散或陷胸丸與之得時氣至五六日而渴欲飲水水不能多不當與也何者以腹中熱尚少不能消之便更為人作病矣至七八日大渴欲飲水猶當依證與常令不足勿極意也凡人但見仲景云得病反能飲水此為愈遂小渴者乃強飲之因成其禍不可勝數大抵傷寒水氣皆因飲水過多致水停心下氣上乘心則為悸為咳結於胸脅則為水結胸胃中虛冷則嘔為噦令氣相搏則為噎上迫於肺則為咳漬入腸中則為利邪熱所搏蓄於下焦則為小便不利小腹滿或裡急溢於皮膚則為腫若陽毒陪常躁盛大渴者黑奴丸主之中暑伏熱深纍取不瘥其人發咳不已酒蒸黃連丸主之傷寒有所不利者行之取其滲泄也渴而飲停者有躁而煩滿者有病氣去而水氣不得行者其表裡得見煩躁口燥欲飲水水入即病氣去而水氣不得化頭痛發熱身疼痛欲飲水者有發熱汗出復惡寒不嘔心下痞者並宜五苓散其脈浮發熱渴欲飲水小便不利少陰病下利六七日咳而嘔渴心煩不得眠者宜與豬苓散其大病瘥後從腰以下有水氣者牡蠣澤瀉散此利水道滲泄之意也口燥咽乾脾臟有熱則津液故少令口燥而舌乾仲景云傷寒無熱口燥渴而煩背微寒者白虎湯加人參也又云陽明病渴欲飲水口乾舌燥者白虎加人參湯主之若咽乾者慎不可發汗發汗則重亡津液少陽證口苦咽乾者小柴胡湯少陰證口燥咽乾者急下之病人默默欲眠目不能閉起居不安其聲嗄或咽乾者當作孤惑治之方人參散治傷寒大汗後煩渴熱不解脈大者人參一兩去蘆頭知母一兩甘草半兩炙微赤銼石膏二兩上搗粗羅為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服豬苓散治傷寒脈浮發熱渴欲飲水小便不利豬苓去黑皮赤茯苓秦艽去蘆頭滑石澤瀉以上各一兩甘草半兩炙微赤銼上搗粗羅為散每服五錢水一大盞煎至五分去滓不計時候溫服犀角散出聖惠方治傷寒身體大熱小便黃赤煩渴不止心中悶絶言語錯亂睡多驚恐犀角屑一兩人參三分去蘆頭赤茯苓半兩茵陳半兩細辛半兩陳橘皮半兩湯浸去白瓤麻黃半兩去根節甘草半兩炙微赤銼上搗粗羅為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服黃芩散出聖惠方治傷寒吐下後內外有熱煩渴不止黃芩人參去蘆頭甘草炙微赤銼麥門冬去心柴胡葛根銼以上各一兩桂心半兩上搗粗羅為散每服二錢水一中盞入生薑半分棗二枚煎至五分去滓不計時候溫服栝蔞根散出聖惠方治傷寒大腸祕澀煩躁不止栝蔞根一兩黃芩一兩人參半兩去蘆頭川大黃一兩銼碎微炒梔子仁半兩川芒硝一兩甘草半兩炙微赤銼上搗粗羅為散每服五錢水一大盞煎至五分去滓不計時候服如人行十里再服以利為度治傷寒下後煩渴宜服此方出聖惠方麥門冬一兩去心五味子一兩人參一兩去蘆頭甘草一兩炙微赤銼聖濟作半兩石膏一兩上搗粗羅為散每服三錢水一中盞煎至五分不計時候去滓溫服土瓜根散出聖惠方治傷寒煩渴不止土瓜根一兩麥門冬一兩去心甘草半兩炙微赤銼枇杷葉半兩拭去毛炙微黃聖濟作一兩上搗粗羅為散每服四錢水一中盞煎至六分不計時候去滓溫服聖濟名麥門冬飲黃耆散出聖惠方治傷寒煩渴不止黃耆銼麥門冬去心黃芩葛根銼枇杷葉拭去毛炙微黃梔子仁人參去蘆頭赤茯苓柴胡去苗赤芍藥甘草炙微赤銼以上各半兩上搗粗羅為散每服五錢水一大盞入生薑半分煎至五分去滓溫服不計時候茵陳散出聖惠方治傷寒頭項汗出身體無汗小便不利渴欲飲水者是瘀熱在裡身欲發黃茵陳梔子仁川大黃銼碎微炒木通銼以上各一兩甘草半兩炙微赤銼上搗粗羅為散每服五錢水一大盞煎至五分去滓不計時候溫服如人行十里再服以小便快利為度石膏湯出聖惠方治傷寒已大汗後不利其人煩渴不解其脈洪大石膏知母地骨皮甘草炙微赤銼人參去蘆頭各一兩上搗粗羅為散每服五錢水一大盞入粳米一百粒煎至五分去滓不計時候溫服麻黃散出聖惠方治傷寒壯熱煩渴頭痛麻黃去根節葛根銼知母柴胡梔子仁陳橘皮湯浸去白瓤焙甘草炙微赤銼以上各半兩石膏二兩上搗粗羅為散每服三錢水一中盞入生薑半分煎至五分去滓不計時候溫服麥門冬散出聖惠方治傷寒下後上氣煩渴不止麥門冬去心五味子人參去蘆頭葛根銼甘草炙微赤銼石膏芎藭桑根白皮銼各一兩上搗粗羅為散每服五錢水一大盞煎至五分去滓不計時候溫服半夏散出聖惠方治傷寒嘔吐煩欲飲水半夏三分湯洗七次去滑蘆根一兩銼赤茯苓澤瀉三分桂心半兩甘草一分炙微赤銼麥門冬三分去心上搗粗羅為散每服三錢水一中盞入生薑半分煎至五分去滓不計時候服治傷寒頭痛骨節煩疼或已吐下餘熱不盡口乾煩渴麻黃去根節一兩知母一兩半葛根一兩半銼石膏二兩半聖濟作兩半甘草一兩炙微赤銼上搗粗羅為散每服五錢水一大盞煎至五分去滓不計時候溫服聖濟名葛根麻黃湯竹茹飲子出聖惠方治傷寒吐利後煩渴不止青竹茹一雞子大人參去蘆頭半兩烏梅肉二枚上件藥細銼水一大盞煎至五分去滓不計時候溫頻服青葙子丸出聖惠方治傷寒後熱結在胸膈煩渴青葙子二兩外臺作五兩黃芩一兩龍膽一兩去蘆頭外臺作三兩梔子仁一兩苦參銼一兩黃柏銼一兩外臺作二兩栝蔞根一兩上搗羅為末煉蜜為丸如桐子大每服不計時候溫水下三十丸外臺祕要有黃連二兩忌豬肉冷水治傷寒心神熱躁口乾煩渴出聖惠方秦艽一兩去苗上細銼以牛乳一大盞煎至六分去滓不計時候分溫二服又方出聖惠方栝蔞二兩上搗粗羅為散每服三錢水一中盞入新竹葉二十七片煎至五分去滓不計時候溫服聖濟不用竹葉知母湯出聖濟總録治傷寒數日不解心躁煩亂小腹脹急臍下悶痛大渴喘之知母焙芍藥麥門冬去心焙柴胡去苗澤瀉各三分石膏一兩半黃芩去黑心甘草炙各半兩上粗搗篩每服三錢水一盞入生薑一棗大拍碎竹葉三七片同煎至七分去滓食後溫服葛根飲出聖濟總録治傷寒頭痛燥渴不得眠睡四肢煩痛葛根銼黃芩大青石膏碎人參各一兩甘草炙半兩上粗搗篩每服三錢水一盞煎至六分去滓溫服葛根石膏湯出聖濟總録治傷寒下後頭疼口乾煩渴葛根銼麥門冬去心焙黃芩去黑心升麻各一兩石膏碎一兩半甘草炙半兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時黃芩蘆根湯出聖濟總録治傷寒吐下後內外有熱煩渴不止黃芩去黑心蘆根人參赤茯苓去黑皮各一兩桂去粗皮半兩上粗搗篩每服五錢水一盞半入生薑一棗大拍碎棗三枚擘破同煎至八分去滓溫服不拘時芍藥黃連湯出聖濟總録治傷寒溫病吐下有餘熱煩渴不止芍藥黃連去須麥門冬去心焙各三分栝蔞根半兩甘草炙一分黃芩去黑心一兩上粗搗篩每服三錢用水一盞煎至六分去滓食後溫服葛根鬱金湯出聖濟總録治傷寒熱氣熏蒸臟腑煩渴飲水不休葛根銼鬱金銼石膏碎荊芥穗各一分甘草炙一錢上粗搗篩每服三錢水一盞煎至七分去滓食後臨臥溫服升麻飲出聖濟總録治傷寒煩躁大渴飲水不休升麻黃芩去黑心葛根銼柴胡去苗山梔子仁荊芥穗牡丹皮黑牽牛各一分黃連去須硝石研各一錢上粗搗篩九味拌和研者每服三錢匕水一盞煎至