厚朴湯主之丸藥大下後身熱不去微煩者梔子乾薑湯主之是皆取其吐而湧其熱者也虛煩之狀心中溫溫然欲吐憒憒然無奈欲其不嘔擾擾亂亂是名煩也非吐則不能已經曰若下後更煩心下濡者為虛煩也梔子豉湯主之脈作結心下滿而煩飢不能食病在胸中瓜蒂散主之二者證均煩也藥均是吐也而又輕重之不同吐下發汗後邪氣乘虛而入煩者則謂之為虛煩與梔子豉湯則是吐劑之輕者不因吐下發汗後邪氣結胸中則為膈實與瓜蒂散則是吐劑之重者又陽明病不吐不下心煩者則是煩之實者也與調胃承氣湯下之傷寒二三日心中悸心煩者則是煩也虛也與小建中湯補之煩為熱也悸而煩復為虛者以悸為虛悸甚而煩故為虛也少陽之邪入府者煩而悸則為熱也大抵先煩而悸者是為熱也先悸而煩者是為虛也內經曰治病必先求其本誠哉是言也又云傷寒病後躁煩者有虛煩有谷煩陽氣偏多謂之虛煩病瘥後食谷太早心虛不勝穀氣胃內蒸熱謂之谷煩若陰陽和調則虛煩自已損其穀食則谷煩者瘥活人書云不惡寒身不痛頭不疼脈不緊但煩熱者此多虛煩熱證也煩熱與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不疼脈不緊數故知非裡實也不可下如此者內外皆不可攻攻之必遂損竭多死者也此虛煩但當與竹葉湯苦嘔者與橘皮湯一劑不愈再與之孫真人云此法數用甚有效傷寒虛之宜服王叔和云有熱不可大攻之熱去則寒起並宜服竹葉湯方竹葉湯治虛煩狀似傷寒但身不疼痛不惡寒或得汗亡津液躁熱未解內外皆不可攻者汗與竹葉湯嘔與橘皮湯渴與五苓散竹葉半把石膏碎四兩半夏湯洗去滑切焙三分人參半兩麥門冬去心二兩甘草炙半兩上銼如麻豆大每服五錢匕以水一盞半入粳米一百餘粒生薑半分拍碎同煎取八分去滓溫服並解暑毒陰證傷寒未解人勿服若表裡俱虛不利發熱去石膏加附子煎名既濟湯濟生除石膏粳米加茯苓小麥治傷寒霍亂吐瀉後心虛煩悶梔子豉湯出聖濟總録治傷寒發汗後虛煩不得眠劇者必反覆顛倒心中懊憹宜服梔子豉湯又傷寒發汗若下之而煩熱胸中窒痛亦宜服梔子豉湯又傷寒下利後更煩按之心下濡者虛煩也亦宜服之發汗若下之而煩熱胸中窒者梔子豉湯主之仲景云用梔子豉湯病人舊微溏者不與之梔子十四枚去皮豉四合上銼如麻豆大每服三錢匕水一盞煎至六分去滓溫服得快吐止後服烏梅湯同前治傷寒大病瘥後體虛煩滿烏梅取肉山梔子仁甘草炙葛根各半兩上粗搗篩每服五錢匕水一盞入豉二七粒同煎至半盞去滓早晚食後溫服麥門冬飲同前治傷寒汗後虛煩心神不寧麥門冬去心焙柴胡去苗防風去叉半夏湯洗滑薑汁製赤茯苓去黑皮犀角鎊各半兩上粗搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓溫服人參湯出同前治傷寒後虛煩心胸滿悶腹脹微喘人參白茯苓去黑皮杏仁去皮尖雙仁細研各半兩上除杏仁外銼如麻豆大每服三錢匕水一盞半入粳米百餘粒同煎米熟去滓溫服空心麥門冬湯出同前治傷寒後不解或寒或熱四肢瘦弱飲食不能胸中煩滿虛躁麥門冬去心焙赤茯苓去黑皮人參白朮各一兩桂去粗皮半兩陳橘皮去白炒一兩甘草炙半兩地骨皮黃耆銼各一兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服日再厚朴飲出同前治傷寒發汗後氣虛心煩腹滿痰逆不思飲食厚朴二兩去粗皮薑汁製甘草炙半夏薑汁製人參陳橘皮去白焙各二兩上粗搗篩每服五錢匕水一盞半生薑五片同煎至七分去滓空心服薏苡仁湯出同前治傷寒汗後煩滿多睡小便赤色薏苡仁酸棗仁防風去叉人參甘菊花地骨皮紫蘇子甘草炙白茯苓去黑皮各一兩上粗搗篩每服三錢匕水一盞入荊芥薄荷生薑各少許同煎七分去滓溫服睡多冷服不睡熱服人參飲出同前治傷寒汗後煩滿氣虛心神不寧人參赤茯苓去黑皮陳橘皮去白焙白朮銼炒各一兩上粗搗篩每服五錢匕水一盞生薑三片煎至七分去滓溫服日三麥門冬茯苓飲出同前治傷寒後煩滿心神恍惚不得眠臥麥門冬去心焙赤茯苓去黑皮知母焙芎藭酸棗仁微焙陳橘皮去白焙檳榔銼甘草炙各一兩上粗搗篩每服五錢匕水一盞半入生薑五片煎至一盞去滓溫服日三柴胡湯出聖濟總録治傷寒後虛勞煩熱驚悸不得眠睡柴胡去苗半兩酸棗仁微炒二兩遠志去心一分當歸防風去叉甘草炙銼茯神去木豬苓去黑皮黃耆銼人參生乾地黃芎藭各半兩麥門冬去心焙半兩上粗搗篩每服三錢匕水一大盞生薑三片煎至七分去滓溫服空心日三服人參湯出同前治傷寒後虛勞不得眠煩悶四肢乏力人參一兩酸棗仁微炒三兩當歸切焙芎藭銼桂去粗皮甘草炙銼柴胡去苗白茯苓去黑皮石膏碎各一兩上粗搗篩每服五錢匕水一盞半生薑三片煎至一盞去滓食前服六神湯出同前治傷寒虛煩不安人參白茯苓去黑皮防風去叉百合黃耆銼干山芋各一兩上粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候酸棗仁湯出同前治傷寒後虛煩不得眠臥頭目昏眩酸棗仁炒三兩麥門冬去心焙二兩地骨皮銼一兩上粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓溫服不拘時候茯神散出同前治傷寒後虛煩心腹不快茯神去木柴胡去苗陳橘皮去白焙甘草炙各一兩上粗搗篩每服五錢水一盞半煎取八分去滓溫服不拘時候黃連一物湯治傷寒不解恐服藥大多大小便不利虛煩不安黃連一兩銼碎生薑數片入酒少許微炒上作一服水一碗煎七分去滓徐飲冷熱皆不可服一物黃連瀉心湯易老隨證加減列於後煩者加梔子躁者加香豉嘔者加半夏滿者去甘草腹痛加芍藥脈遲者加附子大便硬加酒浸大