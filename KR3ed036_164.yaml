方治三焦氣澀停痰不消胸膈痞悶腹脅脹滿咳嗽涎甚咽嗌乾痛心忪悸動頭目眩暈寒熱時作肢節疼痛咽吐清水神昏多倦不欲飲食白茯苓白朮各半兩天南星一兩白附子一兩白礬三分半夏三兩並生用上為細末白麵糊丸如梧桐子大每服二三十丸薑湯下不拘時候藿香散一名藿香湯出和劑方治溫脾胃化痰飲消宿食止嘔吐胸膈痞滿腹脅脹痛短氣噎悶咳嘔痰水噫醋吞酸嘔噦噁心兼治山嵐瘴氣藿香葉厚朴去粗皮薑製半夏切四片薑汁浸一宿粟米炒黃用甘草炙各一兩陳橘皮去白半兩上為散每服二錢水一鍾生薑三片棗一枚去核同煎至七分去滓少熱服不拘時候日進二三服沉香墮痰丸一名小半夏丸出御藥院方治宿飲不消咽膈不利咳嗽痰涎頭目昏暈嘔逆噁心胸膈不快檳榔大者二枚麵裹煨熟半夏曲二兩木香二錢沉香二錢青皮去白二錢半上為末生薑汁浸蒸餅和丸如小豆大每服二十丸生薑湯下不拘時候加減二陳湯出澹寮方治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或發為寒熱或因食生冷脾胃不和並宜治之丁香一兩半夏五兩陳皮五兩茯苓三兩甘草一兩半上㕮咀每服四錢水一盞半生薑三片烏梅一枚同煎至七分去滓溫服惡甜者減甘草不用或至痞疾加草豆蔻麵裹煨熟一兩半滾痰丸治諸痰疾為患胸膈痞悶心神不寧頭目眩暈不美飲食常服滋潤腸胃安心神大黃半斤蒸熟黃芩半斤去腐淨青礞石一兩用硝煨沉香半兩上好硃砂三兩研上為末滴水丸如麻子大硃砂為衣每服七十丸食後臨臥白湯送下溫茶清送下亦可漸加至一百丸化痰丸出瑞竹堂治頑痰不化石青一兩水飛石綠半兩水飛上為細末麵糊為丸如綠豆大每服一十丸溫湯下有痰即吐去一二碗不損人新法半夏湯出仁存方治脾胃不和中脘氣滯宿寒留飲停積不消心腹刺痛腸腹膨脹吐嘔痰水噫醋吞酸或中吐酒噦逆噁心頭疼煩渴倦怠嗜臥不思飲食並宜服之青皮去瓤乾薑炮各六兩桔梗炒陳皮去白各一斤丁香四兩甘草炒十二兩半夏洗薑汁製二兩半上為細末每服一錢鹽一捻沸湯點不時常服和三焦開胃消酒進食止嘔丸出御藥院方治停寒積飲嘔吐痰水無問冷熱不下食者服之必愈沉香丁香木香吳茱萸湯洗焙乾半夏湯洗七次生薑汁製各半兩水銀硫黃各一兩二味研砂子星以盡為度上為末生薑糊丸如綠豆大每服二三十丸生薑湯下不拘時候服導痰湯出百一選方白茯苓桂心半夏湯洗七次乾生薑橘紅枳殼炒香甘草上等分為末入生薑三片煎至七分非時溫服細辛五味子湯出百一選方細辛白茯苓白朮人參甘草乾薑炮各一兩五味三兩上為飲子每服三錢水一大盞煎至八分去滓食後服辰砂祛痰丸治酒食過鹹酸作成痰飲於胸中凝則嘔逆噁心流則一臂痛頭目昏眩腰腳疼痛深則左癱右瘓淺則蹶然倒地此藥神效半夏四兩生薑四兩制過作餅陰乾槐角一兩炒黃陳皮一兩去白白礬一兩生荊芥一兩去土硃砂一兩水飛一半入藥一半為衣上為末煎生薑湯作糊丸如梧桐子大每服五十丸生薑皂角仁湯下空心一服臨臥一服忌動濕面豬肉油膩觸痰丸專治痰枳殼茯苓南星半夏各半兩風化硝二錢殭蠶二錢半全蠍三個上為細末薑汁為丸每服五六十丸薑湯送下不拘時候吳茱萸湯出千金方治胸中積冷心嘈煩滿汪汪不下飲食心胸膺背痛吳茱萸三兩半夏四兩桂心人參各二兩甘草一兩生薑五兩大棗十枚上㕮咀以水九升煮取三升去滓分三服日三服梅青丸出御藥院方治平胃氣止咳嗽利咽膈化痰涎青黛二錢半半夏四兩湯洗七次硝石三兩桔梗天南星生蛤粉各一兩白礬半兩全上為末水浸蒸餅丸如豌豆大每服五六十丸食後生薑湯下破飲丸出和劑方治一切停飲不散時嘔痰沫頭眩欲倒膈脘不快旋覆花八兩白朮一斤一兩肉桂去皮乾薑炮各六兩赤茯苓去皮七兩枳實麩炒二兩上為末麵糊丸如梧桐子大每服五十丸熟水下暖胃丸出仁存方治去虛痰利冷飲硫黃研白礬同炒丁香炒茴香炒木香各一兩半夏二兩薑汁炒上為末薑汁煮麵糊丸梧桐子大每服二十丸空心米湯下天仙飲出直指方治痰注臂痛片子薑黃六錢天仙藤羌活白朮白芷梢各三錢半夏制半兩上銼每服三錢姜五片煎服間下千金五奪丸白朮半夏湯出簡易方治胃虛停痰飲噁心中脘刺痛腸胃攪痛頭目昏暈肢體倦怠半夏二兩陳皮三兩半赤茯苓白朮丁香各一兩肉桂半兩上㕮咀每服三錢水一大盞生薑五片煎取八分去滓服療飲氣痰膈食則嘔吐方茯苓八分橘皮六分甘草四分炙生薑八分雞蘇六分人參四分上切以水五升煮取一升五合去滓分溫二服令相去如人行六七里進一服忌海藻菘菜酢物茯苓飲一名參苓飲出三因方主心胸中停痰宿水自吐水出後心胸膈虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩生薑四兩枳實二兩炙橘皮二兩半上切以水六升煮取一升八合去滓分溫三服如人行八九里進之忌酢物桃李雀肉等物一方無枳實沉香四倍丸治痰飲兩臂疼痛腰腿沉痛木香半兩青皮四兩去瓤白朮三兩半夏四兩湯浸七次沉香半兩黑牽牛頭末半兩上為極細末生薑自然汁煮麵糊為丸如梧桐子大每服三十丸生薑湯下食後服丁香半夏丸出危氏方治脾胃宿冷胸膈停痰嘔吐噁心吞酸噫醋心腹痞滿脅肋刺痛氣短噎悶不思飲食肉豆蔻仁木香丁香人參陳皮去白各一分藿香葉半兩半夏湯洗七次薑汁製炒三兩上為細末生薑汁煮麵糊為丸如小豆大每服二十丸生薑湯下不拘時小半夏湯一名茯苓半夏湯出御藥院方治諸嘔噦心下痞堅膈間有痰水眩悸方見茯苓半夏湯赤茯苓丸出御藥院方治痰氣痞赤茯苓去皮枳實麩炒去瓤半夏曲檳榔白朮各等分上為細末生薑汁麵糊為丸如梧桐子大每服五十丸生薑湯下食後溫服或風眩頭痛則荊芥湯下五苓散出三因方假令瘦人臍下有悸者吐涎沫而癲眩水也豬苓去皮白朮茯苓各三兩桂心去皮二分澤瀉上五味下節水七日三多飲水汁出愈忌桃李雀肉生蔥醋等物茯苓丸出德生堂治痰飲為梗令人手臂背疼痛胸膈痞塞神效半夏制二斤赤茯苓白茯苓各半斤枳殼炒半斤朴硝飛過四兩上為細末生薑汁打麵糊為丸如梧桐子大每服三五十丸生薑湯食後臨眠服氣實者加至七十丸枇杷葉散出聖惠方治痰飲發即煩悶不安兼吐痰水枇杷葉一兩拭去毛淨炙微黃人參一兩去蘆頭半夏一兩湯洗七次去滑陳橘皮一兩去白白朮一兩上搗篩為散每服三錢以水一盞入生薑半分煎至六分去滓不拘時候溫服潤肺丸出御藥院方治肺不調咳嗽聲重日久不止痰涕結搏咽嗌不利心神煩躁頭目昏重精神不爽心忪煩悸喉中呀呷逐氣有聲一切痰實並皆治之硃砂水飛五靈脂微炒各二兩苦葶藶杏仁去皮尖麩炒半夏曲各一兩上為末生薑汁麵糊為丸如梧桐子大每服四十丸食後生薑湯下大半夏丸出御藥院方治咳嗽消痰順氣半夏六兩桑白皮生甘草各一兩皂角槌碎生薑銼碎各八兩上先將五味用水五升同煮汁盡取出半夏焙乾為末次用下項青皮檳榔木香郁李仁湯浸去皮別研各一兩與前半夏末拌勻上為細末生薑自然汁打白麵糊為丸如梧桐子大每服三十丸食後生薑湯下枳實半夏丸出御藥院方消痰順氣利胸膈進飲食枳實一兩麩炒黃色去瓤半夏一兩半湯洗七次切作片子焙乾白朮三分蓬莪朮半兩白茯苓一分去皮上為細末用生薑汁煮麵糊為丸如梧桐子大每服六七十丸陳橘皮湯下不拘時候化痰丸出瑞竹堂快脾順氣化痰消食半夏洗南星去皮膜白礬皂角切碎生薑上各一斤重用水同煎至南星無白點為度揀去皂角不用將生薑切作片同半夏南星陰乾不見日色火焙再加青皮去瓤陳皮去白紫蘇子炒蘿蔔子炒別研乾葛杏仁去皮尖炒別研神麯麥糵炒棠球子香附子上件以上各半斤淨與前藥合和一處碾為細末生薑自然汁浸𩚫餅打糊為丸如梧桐子大每服五七十丸臨臥食後茶酒送下滌痰丸出瑞竹堂治痰盛寬胸膈快氣黑牽牛三兩皂角二兩去皮弦火中微燒白礬枯一兩半夏曲炒一兩陳皮去白一兩上為細末煮蘿蔔為丸如梧桐子大每服四五十丸臨臥淡薑湯下南星半夏丸出經效濟世方治痰開胃天麻半夏天南星炮去火毒人參白附子上三味等分納半夏天南星倍之俱各為末半兩用生面一兩滴水為丸每服百十丸於沸湯中煮沸漉出用生薑湯吞下食前服不拘時候撩膈散一名吐痰方出聖惠方治心上結痰飲食寒冷心悶瓜丁二十八枚赤小豆二十枚人參去蘆頭甘草各一分上篩酒服方寸匕日二亦治諸黃一方用齏汁調服紫芝丸出百一選方治痰五靈脂粒粒取全者去砂石半夏湯洗七次慢浸入心透上等分為末生薑汁煮浸蒸餅為丸如梧桐子大每服二十丸至三十丸生薑汁煮湯或茶湯食前下空心臨臥時服半夏丸出十便良方治消下痰涎大白半夏老生薑各等分同搗研如泥焙乾上搗為末用生薑汁打糊為丸如梧桐子大每服三十丸生薑湯下食後服二陳湯出仁存方治痰飲為患或嘔吐或頭眩心悸或中脘不快或發為寒熱或飲酒過多脾胃不和半夏洗七次橘皮各五兩白茯苓三兩甘草炙一兩半上為散每服四錢水一盞姜七片烏梅一個煎至六分去滓熱服不以時候一方傷寒後不敢進燥藥者用此快脾則飲食倍進易得復常治痰疾加草果如半夏之數仍咽紅丸子因酒食所傷發為黃疸亦宜加草果咽紅丸子多服取效嘔吐者加丁香如甘草之數惡甜者減甘草吐甚者兼服手流丸仍用半夏為細末每一兩入丁香檳榔各一錢旋以生薑自然汁丸如梧桐子大上水煮半夏丸先以水二盞煎沸次下丸子煮令極一時挑服用藥汁嚥下煩躁者於二藥並去丁香仍服養正丹或來復丹黑錫丹之類候大便利無不作效嘔家不以溫藥微利大便則無由愈此數藥皆有硫黃能溫利之秘甚用加味感應丸若先自溏利是為虛寒不宜用此可於理中湯震靈丹方中求之妊婦惡阻產科用茯苓湯茯苓丸作快脾之劑服者病反增劇不若用此極有神驗余見四物湯並紅丸子方中一方加竹茹同煎食前服溫中化痰丸一名二姜丸出和劑方治停痰留飲胸膈滿悶頭眩目暈好臥減食咳嗽嘔吐氣短噁心或飲酒過多或飲食無度或過傷生冷痰涎並多噦醋噫酸亦治暖脾胃散寒氣青皮去瓤良薑去蘆炒乾薑炮陳皮去白各五兩上為細末醋打麵糊為丸如梧桐子大每服三五十丸糯米湯任下不拘時候或生薑湯亦可一方又為末每服二錢水一盞姜四片煎至七分溫服不拘時候溫胃化痰丸出御藥院方治腹間有疾脾胃停飲胸中不快痰涎不盡半夏三兩橘皮去白乾薑炮白朮各二兩上為末生薑汁麵糊為丸如梧桐子大每服二十丸溫生薑湯下不拘時候蠲飲枳實丸出御藥院方治逐飲消痰導滯清膈枳實麩炒去瓤半夏湯洗七次陳橘皮去白以上各三兩黑牽牛半斤三兩餘取頭滓不用上為細末水煮麵糊為丸如梧桐子大每服五十丸生薑湯下不拘時候除痰丸出御藥院方天南星炮半夏湯浸七次各二兩皂角大一定去皮弦子用水一大盞揉汁蛤粉微炮一兩上為細末以皂角汁調麵糊和丸如梧桐子大每服三十丸食後生薑湯下漸加至五十丸臨臥更進一服忌甜物二曲丸出百一選方治脾虛痰盛不入食甚妙神麯半斤為末棗肉搜成餅子候乾慢火炙半夏半斤為末生薑自然汁捏成餅子候乾慢火炙上為末棗肉丸如梧桐子大每服五十丸薑湯下不拘時候治痰證看人眼有黑暈多者是木鱉子白芥子甘遂大戟上等分水糊為丸如梧桐子大每服十丸薑湯下消飲倍術丸治胃虛五飲酒癖頭痛眩胃乾嘔飲流腸間動則有聲白朮五兩削術三兩桂心一兩乾薑四兩上為末麵糊為丸如梧桐子大每服三十丸溫米飲送下食後服半夏化痰丸一名半夏丸出衛生家寶方治主痰實噁心嘔吐頭目昏暈心忪背寒臂痛涎嗽胸膈不快半夏去滑一兩赤茯苓半兩去皮白礬一分枯鉛白霜半兩上為末生薑汁打麵糊為丸如梧桐子大每服十五丸薑湯下茯苓湯出千金方治胸膈痰滿茯苓四兩半夏一斤生薑一斤桂心八兩上㕮咀以水八升煮取二升半分四服冷極者加大附子四兩若氣滿者加檳榔三七枚忌酢物羊肉生蔥豬腸
