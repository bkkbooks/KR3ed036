body:
  text: 卷一百六十四痰飲門總論夫飲有四何謂師曰有痰飲有懸飲有溢飲有支飲問曰四飲之證何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水過多水行歸於四肢當汗出而不汗出身體疼重謂之溢飲其人咳逆倚息短氣不得臥睡其形如腫謂之支飲也凡心下有水者築築而悸短氣而恐其人眩而癲先寒即為虛先熱即為實故水在於心其人心下堅築築短氣惡水而不欲飲水在於肺其人吐涎沫欲飲水水在於脾其人少氣身體盡重水在於肝脅下支滿嚏而痛水在於腎心下悸夫病人猝飲水多必暴滿喘凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後喜虛耳脈偏弦者飲也肺飲不弦但喜喘短氣支飲亦喘而不能眠加短氣其脈平也溢飲形不發作無熱脈微煩滿不能食脈沉滑者留飲病病有留飲者脅下痛引缺盆嗽轉甚其人咳而不得臥引項上痛咳者如小兒瘛瘲狀夫胸中有留飲其人短氣而渴四肢歷節痛其脈沉者有留飲也心下有留飲其人背寒冷大如手病人肩息上引此皆有溢飲在胸中久者缺盆滿馬刀腫有劇時此為氣飲所致也膈上之病滿喘咳吐發則寒熱背痛惡寒目泣自出其人振振身瞤劇必有伏飲病人一臂不隨時復轉移在一臂其脈沉細此非風也必有飲在上焦其脈虛者為微勞衛氣不周故也久自瘥病痰飲者當用溫藥和之夫人之有痰飲病者由營衛不清氣血敗濁凝結而成也內有七情汨亂臟氣不行鬱而生涎涎結為飲為內所因大小青龍桂枝防風五苓通聖外有六淫侵冒玄府不通當汗不汗蓄而為飲為外所因茯苓蒼朮八味參蘇或飲食過傷嗜欲無度叫呼疲極運動失宜津液不行聚為痰飲屬不內外因十棗葶藶大黃大小半夏湯控痰散惟氣與血能生諸病痰者津液之異名人之所恃以潤養肢體者也血氣和平關膈條暢則痰散而無氣脈閉塞脘竅凝滯則痰聚而有痰之所以發動者豈無自而然則風寒暑濕調攝失宜以至諸熱蒸郁啖食生冷煎爆腥膻鹹辛動風發氣等輩皆能致痰也是痰作恙為喘為嗽為壅為嘔為眩暈為風癇為狂迷為怯悸或吞酸或短氣或痞隔或腫脹或寒熱或疼痛或攣躄或癃閉痰實主之人知痛生於氣血孰知痰涎之流注亦能纏滯而為痛乎如頭風證眉稜眼角俱痛投以風藥不效投以痰藥收功如患眼證赤腫羞明而痛與之以涼劑弗療與之痰劑獲愈如酒家手臂痛重時或麻痹二陳湯加片子薑黃下白丸子消飲丸倍術丸輩每每就安如斗家胸骨撲傷刺痛無已散血之劑罔功續以自己溲便飲之須臾吐痰其痛立止此皆痰涎作痛之明證也然而頑痰滿胸上脘填塞其高者因而越之當從權取吐或者津液不守所以痰多吐甚痰脫則精竭而斃矣療痰之法理氣為上和胃次之若風若寒若濕若熱如前數者亦當推尋所受之因和胃謂何涎者脾之液也胃之液津也脾胃一和痰液自散故治痰多用半夏蓋半夏能利痰故也凡治法懸飲當下之溢飲當發其汗支飲則隨證汗下痰飲則用藥從小便利之痰飲之痰皆氣不順而致之當順氣為先分道次之氣順則津液流通痰飲自下亦有腎氣虛寒不能攝養腎水使邪水溢上多吐痰唾又當以利之八味丸最得其宜王叔和云腎寒多吐蓋腎為水之官腎能攝水腎氣溫和則水液流下腎氣虛寒則邪水溢上其藥用山茱萸山藥輩取其補附子肉桂取其溫茯苓澤瀉取其利理亦當矣或因酒後停飲而嘔者二陳湯丁香煮散主之或脾胃為物所傷而停積痰飲五奪丸破飲丸主之也凡人病痰證發者比前論更多有三顯證共成五也一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰諸痰在於上焦毒熏於頭者諸陽之會首也故令病人頭重目澀涕唾稠黏或咳嗽喘滿時發寒熱可用赤小豆湯吐之吐後各隨其證而治之除風去熱導濕化痰者可服通聖加半夏導氣之劑如新暴風痰者體寒飲冷熱痰大盛制金濕痰者停飲不散可服加減連翹飲子除濕丹無憂散亦有酒痰者解毒去熱宜以三聖丸主之五者食痰可用漢防己丸丹砂丸而治之若依法服之決有神效矣凡富貴之人痰嗽多是厚味所致內經云所謂味厚則發熱可服通聖散加半夏以止嗽更服人參半夏丸化痰墜涎止嗽定喘貧乏之人多感風冷寒濕內經云秋傷於濕冬生咳嗽可服寧神散寧肺散加白朮之類若咳極面赤煩悗半晌此火化乘肺也宜詳辨之焉積年痰飲漸成風口眼喎斜語不通蘇合薑汁調半盞青州丸子有神功凡中痰一時諸證蜂起則為困篤倉猝之間藥不可入當用白梅搽開牙關或以半夏末或皂角末吹鼻或灌陳白梅汁以收其痰或服真麻油調麝香以疏其氣或用稀涎散勝金丸略吐其痰卻以蘇合香丸薑汁調灌下三服更以牛黃清心丸薄荷汁化開與服或有熱者用竹瀝調尤好氣才上卻隨證施藥一切痰飲附論病源痰飲者由氣脈閉塞津液不通水飲氣停在胸腑結而成痰又其人素盛今瘦水走腸間漉漉有聲謂之痰飲其為病也胸脅脹滿水穀不消結在腹肋內水入腸胃動作有聲身體重多唾短氣好眠胸背痛甚則上氣咳逆倚息短氣不得臥其形如腫是也脈偏弦為飲浮而滑為痰方大五飲丸出千金方治主五種一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水在膈上五臟間五曰流飲水在腸間搖動有聲夫五飲者由飲酒後及傷寒冷水過多所致蓯蓉一兩遠志一兩苦參藜蘆烏賊骨白朮甘遂大黃石膏栝蔞根桔梗半夏紫菀五味子前胡芒硝桂心芫花當歸人參貝母茯苓芍藥大戟葶藶黃芩各一兩薯蕷甘草細辛附子各三分巴豆三十枚厚朴一兩恆山五分上為末蜜丸梧桐子大每服三丸日三稍加之以知為度旋覆花丸出千金方治停痰澼飲結在兩脅腹脹滿羸瘦不能食食不消化喜唾乾嘔大小便或澀或利腹中動搖作水聲腹內熱口乾好飲水漿猝起頭眩欲倒脅下痛旋覆花桂心枳實人參各五分甘遂三分吳茱萸細辛大黃黃芩葶藶厚朴芫花橘皮各四分乾薑芍藥白朮各六分茯苓狼毒烏頭礜石各八分上為末蜜和為丸如梧桐子大酒服五丸日二加之以知為度延年方無白朮狼毒烏頭礜石細辛黃芩厚朴吳茱萸芫花橘皮甘遂有皂角附子各二分蜀椒防葵杏仁各三兩乾地黃四分生胃丸出瑞竹堂治脾胃不足痰多嘔逆不思飲食此藥以南星粟米黃土為主蓋謂南星醒脾去痰粟米養胃黃土取其以土養土性味溫美進飲食化痰之要劑真良方也大天南星四兩用真黃土半斤將生薑汁和黃土成劑包裹南星慢火煨香透去土不用將天南星切碎焙乾丁香木香厚朴去皮薑汁炒神麯麥芽炒橘紅白豆蔻仁縮砂仁青皮去皮各一兩半夏曲二兩沉香鎊半兩人參半兩甘草炙半兩粟米一升生薑二斤和皮搗碎取自然汁浸粟米蒸上為細末丸如綠豆大每服七十丸不拘時薑湯下前胡湯主胸背氣膈上熱口乾痰飲風氣頭旋前胡枳實炙細辛杏仁去皮尖炒芎藭防風澤瀉麻黃去節乾薑芍藥以上各三兩茯苓一作茯神生薑各四兩桂心甘草上切以水九升煮取二升六合分三服微汗忌生冷油膩豬羊肉面海藻菘菜生蔥生菜酢物海藏五飲湯出拔粹方治一留飲心下二癖飲脅下三痰飲胃中四溢飲膈上五流飲腸間凡此五飲酒後傷寒飲冷過多故有此疾旋覆花人參枳實陳皮白朮茯苓厚朴半夏澤瀉豬苓前胡桂心芍藥甘草各等分上銼每兩分四服水二盞生薑十片同煎至七分取清溫服不拘時候忌食肉生冷滋味等物因酒有飲加葛根葛花縮砂仁大茯苓湯出千金方治主胸中結痰飲癖結臍下眩滿嘔逆不得食亦主風水茯苓白朮各三兩當歸橘皮附子各二兩生薑半夏桂心細辛各四兩一作人參上九味㕮咀以水一斗煮取三升去滓分三服薯蕷湯治七情藏氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經心中忪悸四肢緩弱翕然面熱頭目眩冒如欲動搖薯蕷人參麥門冬去心各四兩前胡白芍藥熟地黃各二兩枳殼麵炒去瓤遠志去心薑汁製炒各三分白茯苓茯神各一兩半半夏湯浸去滑一兩一錢甘草半兩炙黃耆一兩上銼散用千里流水一盞半姜七片秫米一升煎七分去渣溫服食前葛花解酒湯一名葛花解醒湯出醫方大成治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利縮砂半兩葛花半兩木香半錢白豆蔻仁半兩白茯苓一錢半橘皮半錢白朮二錢乾生薑二錢蓮花青皮去瓤三分豬苓去皮一錢半澤瀉二錢神麯二錢炒人參去蘆頭上為細末秤和勻每服三錢匕白湯調下得微汗酒病去矣消痰咳嗽丸出御藥院方治消痰快氣除咳嗽利咽膈白朮牽牛檳榔白芷厚朴制各二兩半夏五兩洗陳皮四兩去白乾薑一兩半人參木香青皮各一兩赤茯苓枳殼曲炒去瓤各三兩上為細末麵糊為丸如梧桐子大每服五七十丸食後生薑湯下祛風丸出御藥院方治清膈化痰降氣消穀宣通蘊滯調順三焦車前子赤茯苓去皮木香皂角燒存性檳榔各三兩枳殼麵炒去瓤陳皮去瓤青皮去白半夏湯洗各二兩乾生薑半兩大黃三兩黑牽牛生六兩上為細末熟飯為丸如梧桐子大每服五十丸至七十丸食後生薑湯下開結枳實丸出御藥院方治宣導凝滯消化痰飲升降滯氣通行三焦滋榮心肺灌溉腎肝補助脾元養胃轉行百脈去風結惡氣流暢大小腸主中痞痰逆噁心嘔噦膈實酒醉不解宿物停積兩脅膨悶咽嗌不利咳嗽等疾枳實曲炒白朮半夏湯洗天南星炮白礬枯苦葶藶大黃青皮去白各半兩木香二錢黑牽牛頭末二兩大皂角去皮子酥炙一兩旋覆花一兩上為末生薑汁煮麵糊為丸如梧桐子大如單腹脹上喘涎多四散腫滿食後生薑湯下三四十丸以知為度婦人乾血氣膈實腫滿或產後有傷面目浮腫小便不利生薑蔥白湯下酒疸病溫酒下克效神聖餅子出御藥院方治積痰停飲留滯不散胸中噎悶脅肋刺痛噫醋吞酸不嗜飲食及宿有沉積攻衝膈脘痞悶宜服之安息香南乳香並研石三稜銼川薑炮製硇砂水飛丁香木香各半兩乾漆杵碎炒令煙盡高良薑京三稜泡銼蓬莪朮泡銼粉霜研各一兩上為末和勻用石腦油溫就和丸如綠豆大捻作餅子每服五餅至七餅食後熟水下參蘇飲出仁存方治痰飲積停胸中嘔吐痰涎眩暈怔悸噦逆及痰氣中人停留關節手足嚲曳口眼喎斜半身不遂食已則吐頭痛發熱狀似傷寒前胡人參紫蘇茯苓各三分桔梗木香半夏陳皮枳殼炒甘草炙各半兩上銼散每服四錢水一盞半姜七片棗一枚煎至七分去滓空心服噦者加乾薑服腹痛加芍藥一方加乾葛紫沉丸出御藥院方治宿食不化痰飲留滯心腹脹滿脅肋疼痛胸膈痞滿噎塞不通嘔噦吞酸噫氣寒熱並宜服之丁香一兩青皮去白陳皮去白京三稜銼炒蓬莪朮銼炒縮砂仁桂去粗皮各半兩硇砂飛研一錢木香三錢烏梅和核令碎去仁四兩巴豆三十枚去皮心出油別研上為細末將巴豆硇砂和令極勻麵糊和丸綠豆大每服十五丸至二十丸食後溫生薑湯下人參枳朮丸治痰人參半兩枳殼三兩炒木香三錢半夏五錢茯苓半兩神麯三錢炒白朮一兩麥芽三錢炒南星半兩上為細末水浸蒸餅為丸如綠豆大每服八九丸茶湯送下不拘時候亦能消食十寶散治消飲化痰丸至夜上床亦氣喘促比十二夜輕得睡些少十四日希賢診脈令服後藥如常服養脾丸初服紫蘇子中人參中枳殼中半夏上良薑中枳實中甘草下白朮前胡陳皮次服木香中檳榔中半夏上陳皮中枳實中草果中桔梗中良薑中甘草下後服本道前方加星半服效本道又令服見哯丸方在