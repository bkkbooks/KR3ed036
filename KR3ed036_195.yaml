三四錢上為細末每用半字於鼻內吹上日一度並吹三日如不愈後用黃芩末煎湯下五錢匕諸黃附論論曰諸黃病者一身盡痛發熱面色潤黃七八日後壯熱口裡有血當下如豬肝狀其人小腹滿若其人眼睛澀疼鼻骨痛兩膊及項強腰背急即是患黃也黃病多大便澀但令小便快即不慮死不令大便多澀澀即心脹不安此由寒濕在表則熱蓄於肝胃腠理不開瘀熱與宿谷相搏煩郁不得消則大小便不通故身體面目皆變黃色凡黃病其寸口近掌無脈口鼻氣冷並不可治方白蘚皮散聖濟總録治諸黃皮肉如金色小便赤黑口乾煩渴白蘚皮二兩黃連去須土瓜根芍藥大青梔子仁茵陳蒿栝蔞根柴胡去苗各一錢半芒硝三兩半研黃芩去黑心一兩貝珠三十枚燒赤研大黃三兩上為散每服三錢匕煎茅根汁調下空心頓服取利至晚不利再服服了以小蔥豉粥投之無忌紫金丸危氏方治積黃理脾胃退黃針砂醋煮通紅紫荊皮酒浸香附子炒三稜醋浸一宿煮蒼朮米泔浸青皮去皮陳皮去白厚朴薑製縮砂各一兩上為末醋糊和丸如梧桐子大每服三十丸酒椒湯下熟水下亦可苦參方千金方治人無故忽然振寒皮膚黃麴塵出小便赤澀大便時祕氣力無異飲食不妨諸藥湯不除因為久黃苦參黃連瓜蒂黃柏去皮大黃蒸各一分葶藶炒半兩上為末每服一大錢米飲調服當吐下隨時消息加減一方用黃芩茵陳蒿丸聖濟總録治一切黃病茵陳蒿四兩大黃銼黃芩去黑心梔子仁各三兩上生用為末煉蜜和丸如梧桐子大每服二十丸米飲下日二服量病與之小便金色身皮皆黃並治之豬膏發煎聖惠方治諸黃豬膏半斤亂髮如雞子大三塊上和膏中煎之發消藥成分再服病從小便出一方不計時候溫水調下半雞子殼治黃病多效本草用酸漿根搗汁飲之治黃病身作金色本草方用煮稻穰汁浸之一方服之又稻穀芒炒令黃細研作末酒服之治五種黃病女子白沃漏下止血養精保血脈嗜食生筋力去伏熱本草方用芹菜作齏菹及煮食之治熱黃結實不通少頃當瀉一切惡物沙石草發並出不利小便本草方用蔓荊子水和服治黃病潤心肺用生王瓜子治發黃方千金方大黃茵陳黃柏梔子仁各三兩黃連二兩上㕮咀以水九升煮取三升分三服先服湯後服丸又丸方千金方大黃五兩茵陳梔子各三兩黃柏黃連黃芩各二兩上為末以蜜為丸如梧桐子大白飲服二十丸令微利茵陳丸千金方治氣淋臚脹腹大身體面目悉黃及酒疸短氣不得息茵陳天門冬梔子各四兩大黃桂各三兩通草石膏各二兩半夏半升上蒸大黃天門冬通草半夏梔子曝令乾合搗篩蜜丸如豆大每服三丸日三忌生魚以豆羹服不得用酒一方去石膏內滑石二兩不知加至十丸治發黃身體面目悉黃如金色小便如濃柏汁衆醫不能療者千金方茵陳梔子各四兩黃芩大黃柴胡升麻各三兩龍膽二兩上㕮咀以水八升煮取二升七合分三服若身體羸去大黃加梔子仁五六兩生地黃一升延生祕録無茵陳有梔子四兩栝蔞三兩芒硝二兩近效方有枳實二兩夫發黃色久變作桃皮色心下有堅嘔逆不下飲食小便極赤色四肢逆冷脈深沉極微細遲者不宜服此方得下必變厄也宜與大茵陳湯除大黃與生地黃五兩服湯盡消息看脈浮出形小不甚沉微便可治也脈浮見者黃當明不復作桃皮色心下自寬也大茵陳湯治內實熱盛發黃如金色脈浮大滑實緊數者夫發黃多是酒客勞熱或溫毒內熱者故黃如金色也茵陳一兩半黃柏一兩半大黃三兩黃芩白朮各一兩甘草茯苓栝蔞根前胡枳實各二兩梔子二十枚上㕮咀以水九升煮取三升分三服得快下消息三四日更治之療發黃心煩熱口乾皮肉皆黃肘後方秦艽十二分牛乳一大升上同煮七合去滓分溫服再服痊治一切發黃方朱氏集驗方山茵陳川楝子麥門冬山梔子甘草上等分以燈心煎服不拘時候破黃七神丹華他中藏經方朴硝二斤硃砂五兩大黃七兩濕紙包煨梔子二兩豉半升以絹袋盛甘遂二兩膩粉一兩上以水二斛熬令盡除甘遂豉梔子大黃只取朴硝硃砂粉末糊丸如彈子大每服一丸水下以吐瀉為度棗礬丸治食勞黃目黃身黃者用皂礬不拘多少砂鍋內木炭燒通紅赤米醋內點之赤紅為細末棗肉為丸如梧桐子大每服二十丸至三十丸食後生薑湯下去目黃好睡本草方用葈耳葉挼安舌下令涎出治患熱黃本草方用萹蓄搗汁頓服一升重者再服治熱黃及心疼本草方以白蒿生搗汁飲之治黃本草方以發髲燒灰水服一方寸匕日三治五種黃病本草方用翹搖生搗汁服一升日二瘥甚益人黃汗附論論曰黃汗者汗出如柏汁沾衣黃色故謂之黃汗由脾胃有濕瘀熱伏留熏發肌肉散而為汗其症使人身體虛浮骨節疼痛發熱汗出而不渴者是也方黃耆湯聖惠方治黃汗身體腫發熱不渴狀如風水汗出染衣黃耆去蘆蜜炙赤芍藥茵陳蒿各二兩石膏四兩淡豉一兩麥門冬去心一兩甘草炙半兩上㕮咀每服四錢水一盞生薑五片煎至七分去滓食前服一方入竹葉十四片不用生薑一方無甘草吳藍湯聖濟方治黃汗身體發黃汗出而不渴狀如風水汗出著衣皆黃吳藍芍藥麥門冬去心桑根白皮銼防己白蘚皮山梔子各一兩半銼如麻豆每服三錢匕水一盞煎至八分去滓空心溫服未效再服茵陳蒿湯聖惠方治黃汗身體熱不退大小便不利茵陳蒿赤芍藥甘草炙銼木通銼赤茯苓去黑皮黃耆各一兩大黃炒二兩上銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服如人走十里再服以大小便通利為度桂枝黃耆湯治黃汗自出發熱身腫小便不利白芍藥一兩半辣桂一兩甘草炙一兩黃芩半兩黃耆炙二兩上銼散每服四錢水一盞半姜五片棗三枚煎服覆取微汗未汗再服桂枝加黃耆湯千金方治黃汗病兩脛自冷假令發黃此屬歷節食已則汗出又身常夜臥盜汗出者此勞氣也若汗出即發熱者久久身必甲錯也發熱不止者必生惡瘡也若身重汗出已輒輕者久久必身瞤瞤則胸中痛又從腰以上汗出下無汗腰寬弛如蟲在皮中狀劇者不能食身疼重煩躁小便不利者名曰黃汗桂枝湯加黃耆五兩主之桂去粗皮白芍藥各三兩甘草炙三兩黃耆五兩上銼如麻豆每服五錢匕水一盞半入生薑半分大棗二枚擘破同煎取七分去滓溫服覆取微汗須臾不汗者食稀熱粥助湯力未汗再服直指方有黃芩名桂枝黃耆湯甘草湯聖惠方治脾臟瘀熱不散心神煩亂小便赤澀或汗如柏汁甘草一兩微炙梔子仁黃柏白朮各一兩上為散每服四錢以水一盞煎至六分去滓溫服日四五服黃耆苦酒方千金方治黃汗身體腫發熱汗出而不渴狀如風水汗水沾衣色黃如柏汁脈自沉此由汗出入水中浴水入汗孔從外而得之黃耆五兩芍藥醋炒桂去皮各三兩上銼如麻豆每服五錢匕苦酒一盞半煎至七分去滓溫服服之當心煩苦酒阻故也一方用苦酒三合水一盞半同煎梔子丸聖惠方治黃汗體熱大小便不利梔子仁栝蔞銼炒苦參各一兩上為末醋漬雞子全用二枚和為丸如梧桐子大每服三十丸溫水下日四五服一方除熱不吐下即自消也治黃汗汗出如柏汁沾衣身體虛浮用蔓荊子二兩為散每服二錢匕井花水調下空心日三服以知為度急黃附論論曰諸發熱心戰定必發為急黃謂其卒然發黃心滿氣喘命在須臾故名急黃也有初得病即身體面目發黃者有初不知是黃死後變黃者但先辨其症當急治之此由脾胃有蓄熱穀氣鬱蒸因熱毒所加故有斯疾方龍膽湯聖惠方治急黃面目如金色渴欲飲水龍膽一兩木通銼土瓜根各一兩半石膏二兩碎犀角屑一兩梔子仁五錢大黃銼炒一兩半白茅根銼朴硝各一兩上搗粗散每服三錢匕用水一盞煎至七分去滓食後溫服白蘚皮散聖惠方治急黃頭目四肢煩熱疼痛小便赤大便難心燥不得眠白蘚皮升麻各半兩朴硝二兩茵陳一兩黃芩半兩梔子仁大青葛根各半兩大黃炒二兩上為散每服以新汲水調服三錢須臾當利三兩行如人行十里未利再服茵陳湯聖惠方治急黃目如梔子色小便赤心煩悶茵陳蒿梔子仁黃芩去黑心大黃銼炒白蘚皮黃連去須各一兩朴硝貝齒煨各半兩上除朴硝外粗搗篩每服五錢匕水一盞半煎至一盞去滓入朴硝末一錢再煎令沸食後溫服犀角湯治急黃熱毒攻發舌急眼黃犀角屑三分茵陳蒿梔子仁各半兩升麻半兩黃芩去心三分大黃炒一兩朴硝研一兩半甘草半兩上為散每服五錢水一盞半入竹葉四五片同煎至一盞食後溫服赤小豆散聖惠方治急黃煩熱口乾皮肉悉黃赤小豆一合丁香秫米一作瓜蒂薰陸香研各一分青布五寸燒灰研麝香另研一分以上各研散和勻每服一錢匕米飲調下食後服當吐下黃水即瘥一方用少許吹鼻中犀角散治急黃心膈煩躁目赤痛犀角屑黃芩升麻梔子仁各一兩茵陳朴硝各二兩上為散每服四錢以水一盞入竹葉三七片煎至六分去滓不拘時候溫服升麻湯聖濟總録治急黃面目如金色煩渴飲水升麻三分秦艽去苗土一兩凝水石一兩半研栝蔞根三分朴硝三分上為粗散每服三錢匕用水一盞煎至七分去滓食後溫服日三丁香散聖惠方治急黃宜服吐之丁香瓜蒂赤小豆各七粒上為散以雞子一枚相和用新汲水調服之當吐利即效未應再服麥門冬飲子吐訖及灸了後即渴仍服麥門冬四兩去心栝蔞三兩竹葉一升茯苓四兩升麻二兩生蘆根一升甘草炙一兩上切以水七升煎取二升五合絞去滓分溫三服服後相去如人行八九里久再服此飲渴即止黑豆煎治急黃煩躁口乾遍身悉黃黑豆一升生地黃汁麥門冬生藕汁各二兩酥半兩上先用水五盞煎黑豆至二盞去豆取汁再煎至一盞然後下蜜生地黃麥門冬生藕等汁並酥相和慢火煎成膏瓷器盛候冷每服半匙或一匙食後含化日三服瓜豆散治急黃心上堅硬渴欲飲水氣息喘粗眼黃瓜蒂二合熬赤小豆二合為末暖漿水五合上和勻每服方寸匕一炊久當吐不吐再服五分匕若吹鼻中兩三黑豆許黃水出瘥芒硝散千金方治急黃熱氣骨蒸兩目赤腫生地黃汁八合芒硝一兩大黃一兩半上和勻漬一宿服五合日二以利為度輕者不須二服熱甚方可用二服大黃散治急黃兼治氣痛黃大黃一兩半芒硝二兩以水三升半漬大黃一宿平旦煎絞汁一升半納芒硝二兩煎一沸絞汁服之須臾當快利雞子方聖惠方治急黃及心黃狂走煩躁不解生雞子二枚去黃用白朴硝半兩細研上相和勻調頓服之效治急黃小便赤黑口乾煩躁聖惠方用蔓荊子取油不計時候頓服如無油即以蔓荊子搗汁絞取一盞服之候顏色黃或精神急用之有效未效再服治暴熱身黃大便祕塞用苦菜煮汁服之治急黃欲死本草用雄雀屎兩枚細研調水溫服之治五般急黃本草用山豆根末空心以水調下二錢治心急黃本草用百合蒸過蜜和食之作粉尤佳紅花者名山丹不堪食黃蒸湯黃蒸一升麥麩一升豬屎一升以水五升漬一宿煮取三升絞去滓頓服一升治急黃本草取苦瓠一枚開口以水煮中攪取汁滴鼻中治急黃黃疸及內黃腹結不通本草用蕪菁搗為末水絞汁服當得嚏鼻中出黃水及下利治卒患急黃熱盛欲死者本草於沙土中掘坎斜埋患人令頭出土上以水灌之久乃出曾試有效當是土能收攝熱也陰黃附論論曰陰黃者面色黃頭痛不發熱不欲聞人聲此由陽伏於陰邪熱沉潛散於肌肉身黃如橘故謂之陰黃昔人有說下之後身目發黃者當於寒濕中求之此其類也方茵陳散治陰黃身體面目俱黃小便如豉汁色茵陳白蘚皮黃芩栝蔞根梔子仁赤芍藥木香各一兩枳殼一兩去白炒黃柴胡去苗黃連去須朴硝土瓜根茅根大黃炒各二兩大青一兩上為散每服五錢水一大盞入鼓五十粒煎至五分去滓溫服如人行十里再服以利一二行為度便煮稀蔥豉粥食之忌豬肉冷水魚蒜黏膩及熱食一方以茅根煮飲待冷空腹以茅根飲服一方有紫雪無朴硝秦艽丸聖惠方治陰黃身面悉黃大便澀小便如梔子汁秦艽去苗梔子仁茵陳檳榔各一兩商陸一分陳皮湯浸去白甜葶藶隔紙炒令紫色各一兩上為末煉蜜丸如梧桐子大每服二十丸溫水下日三茵陳散聖濟總録治陰黃身如橘色小便不利茵陳二兩桂去皮半兩澤瀉一兩赤茯苓去皮白朮豬苓去皮各三分上為散每服二錢匕溫水調下日三服大黃散聖惠方治陰黃小便不利面赤身汗出者表和裡實也宜下之大黃炒黃柏梔子仁甘草炙木通各一兩朴硝二兩上為散每服四錢水一盞煎至六分溫服如人行十里再服以利為度赤小豆散聖惠方治陰黃赤小豆丁香各三七粒麝香一錢研瓜蒂二七枚青布灰二錢上為散每服一錢匕熟水調下日二服以吐為度更取少許吹鼻中即有黃水出為效半夏湯聖惠方治陰黃小便色不變欲自利腹滿而喘者必噦宜服之人參二兩去蘆頭葛根二兩半夏一兩湯泡洗七次去滑焙上銼如麻豆每服四錢匕水一盞生薑半分切煎取七分去滓不拘時候溫服秦艽湯一名秦艽散聖惠方治陰黃不欲聞人言小便不利秦艽去土一兩旋覆花半兩赤茯苓去皮甘草炙各半兩上為粗末每服四錢匕以牛乳一盞煎至六分去滓溫服不計時候龍膽湯聖濟總録治陰黃龍膽秦艽去苗各一兩半升麻一兩上為粗末每服五錢匕水一盞半浸藥一宿平旦煎至八分入黃牛乳五合再煎至一盞去滓空心分溫服日二服取再利為度治陰黃汗染衣涕唾黃肘後方用蔓荊子搗末平旦以井花水服一匙日加至兩匙以知為度每夜小便中浸少許帛子各書記曰色漸退白則瘥不過服五升以來治陰黃眼黃汗染衣涕唾黃聖惠方用大黃五兩飯下蒸一炊取出曝乾為散以溫水調下一錢日三四服常要大小便利為度又方用好黃蒸二大升每夜以水二大升浸微暖令熱勿令沸銅器中平旦絞取汁半升飲之余汁須飲則飲冬日微暖服夏日冷服每夜則浸依前服之亦得每夜小便中浸帛片取色退為驗忌面豬羊魚等肉療因將息傷熱變成陰黃通身壯熱小便黃赤眼如金色面又青黑心頭氣痛繞心如刺頭旋欲倒兼肋下有瘕氣及黃疸等經用有驗本草用麗春草以春三月採花陰乾有前病者取花一升搗為散每平朝空腹取三方寸匕生麻油一盞頓服之日惟一服隔五日再進以知為度治陰黃黃疸及暴急黃本草瓜蒂丁香各七枚小豆七枚上為末用黑豆許吹於鼻中少時黃水出瘥內黃附論夫內黃者由熱毒之氣在於脾胃與穀氣相搏熱蒸於內不得宣散先心腹脹滿氣急然後身面悉黃名為內黃也方治內黃梔子仁黃芩柴胡升麻各一兩栝蔞根大黃炙芒硝各一兩龍膽半兩上為散每服四錢水一盞煎至六分去滓不拘時候溫服茵陳散聖惠方治內黃身面眼延黃如金色小便如濃柏汁衆醫不能療茵陳二兩黃芩梔子大黃龍膽枳殼去白炒黃秦艽去苗各一兩升麻三兩上為散每服四錢水一盞煎至六分去滓不計時溫服三黃散一名三黃丸聖惠方治內黃身體皆黃宜服之大黃炒黃連去須黃芩各二兩上為末每服以溫水調下二錢一方以蜜為丸不拘時服治內黃用柳枝二兩銼水一盞半煎至六分不拘時候溫服又方用大黃一兩銼水一盞煎至六分不拘時候溫服又方用黃栝蔞一枚大者以新汲水一盞半浸栝蔞搗絞汁下蜜半合入三分細研攪令勻分三服頓服之黃病小便淋澀附論夫黃病小便淋澀者由積熱在於心臟流於小腸則令小便澀少下物如沙而多疼痛也方木通散治心臟黃結面目四肢通黃乾嘔大便不通小便赤色腹痛心煩木通一兩大黃炒一兩半枳殼半兩黃芩半兩赤芍藥一兩前胡一兩半去蘆白朮梔子仁各三分甘草半兩微炙半夏三分湯洗七次去滑上為散每服五錢水一盞生薑半分煎至五分去滓不拘時溫服以大小便利為度茅根散治心脾熱壅皮肉面目悉黃煩躁小便赤澀茅根二兩麥門冬去心二兩秦艽去苗一兩犀角三分大黃一兩半黃芩一兩赤芍藥三分朴硝一兩上為散每服四錢水一盞煎至六分溫服如人行十里再服以利為度瞿麥散治黃病小便赤澀心神煩悶瞿麥茵陳黃芩麥門冬去心各一兩大黃一兩半梔子仁二兩上為散每服四錢水一盞煎至六分無時服小便利為度大黃散治黃病腹脹滿小便赤而澀大黃炒二兩朴硝梔子仁各二兩黃柏冬葵子各一兩上為散每服四錢水一盞煎至六分溫服日四五服以利為度茵陳散治黃病心下橫堅小便赤黃不利疼痛茵陳木通各一兩赤茯苓三分前胡三分椒目一分炒赤芍藥三分上為末每服二錢以粥飲調下日四五服
