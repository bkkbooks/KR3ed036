body:
  text: 卷一百九十五黃疸門總論夫五疸者黃汗黃疸谷疸酒疸女勞疸是也黃汗之狀身體俱腫汗出而不渴狀如風水汗出染衣黃如柏汁其脈自沉此由脾胃有熱汗出入水浴水入汗孔中故發汗黃也黃疸之狀食已即飢身體面目爪甲牙齒及小便悉黃欲安臥或身體多赤多青皆見必發寒熱此由酒食過度臟腑熱急水穀相併積於脾胃復為風濕所搏結滯不散熱氣鬱蒸所為也大抵發於陰部其人必嘔發於陽部必振寒而發熱谷疸之狀食已即頭眩心中怫鬱不安而發黃此由大飢大食胃氣衝蒸所致也酒疸之狀身目皆黃心中煩痛足脛滿小便黃面發赤斑此由飲酒多進谷少胃內生熱因大醉當風水入所致也女疸之狀身目皆黃發熱惡寒小腹滿急小便不利此由大勞大熱不能保攝房事復入水所致也其間多渴而腹脹者其病難療又有時氣傷風傷寒伏暑亦令人發黃五疸口淡怔忡耳鳴腳弱微寒發熱小便白濁當作虛症治不可妄投涼劑愈傷血氣臨病之際不可不辨明也五疸雖不同其為黃則一自本自根未有非熱非濕而能致病者也濕氣勝則如熏黃而晦熱氣勝則如橘黃而明蓋脾主肌肉土色尚黃濕熱內蒸或重或輕不容掩於外矣自其濕熱瘀而傷血此人為血證發黃何以明之疸症之黃小便不利血症之黃則小便自利耳況夫脾受濕熱鬱而不行意多有腹脹之候治法綱領大要疏導濕熱於大便小便之中人徒見茵陳湯五苓散黃連散三黃丸等隨試輒效則目之以尋常不思單陽無陰病勢已極疸而不渴猶可用攻疸而復渴其或腹膨全濟者鮮甚則寸口無脈鼻出冷氣與夫形如煙燻垂頭直視為心絶環口黧黑油汗發黃為脾絶此皆倉扁所望而驚焉者也脾與腎俱病為黑疸脈大順弦急而堅逆已食而飢胃熱消穀也黃疸附論論曰內經謂目黃者曰黃疸又曰安臥脈盛謂之黃疸其外症身體面目及爪甲小便盡黃其內症食已即飢此由酒食過度脾胃有熱復為風濕所搏瘀結不散熱氣鬱蒸故是疾若面色微黃身體或青赤黑色皆見者與純熱之症不同當於濕家求之諸黃疸發於陰部其人必嘔發於陽部其人振寒而微熱疸而不渴者可治其渴而疸者難治夫黃疸病發熱煩喘胸滿口燥者或因火劫其汗或從濕得熱在裡當下之方茯苓滲濕湯濟生方拔粹方治黃疸寒熱嘔吐而渴欲飲冷身體面色黃小便不利不得安臥不思飲食白茯苓五分梔子二分茵陳蒿六分澤瀉三分木豬苓三分生黃芩黃連漢防己白朮蒼朮陳皮青皮各二分上㕮咀作一服水煎空心服知母湯聖濟總録治中熱黃疸寒熱往來脈數煩困四肢勞倦知母焙赤茯苓去黑皮常山茵陳犀角鎊黃連去須人參羚羊角鎊以上各一分柴胡鱉甲醋炙去裙襴甘草炙五分龍膽半分上為散別入丹砂末半分合研勻瓷盒收每服二錢匕食前人參湯調下日再黃連湯聖濟總録治黃疸遍身黃面目皆黃黃連去須大青山梔子仁柴胡去苗茵陳蒿地骨皮黃芩去黑心芒硝各一兩大黃二兩細銼醋炒上粗搗篩每服五錢匕水一盞半煎八分去滓不拘時服茵陳湯聖濟總録治黃疸目黃小便如血心煩燥悶口苦頭痛茵陳蒿山梔仁各三分木通一兩炙甘草五分栝蔞根柴胡去苗各一兩麥門冬去心焙一兩五錢上粗搗篩每服五錢匕水二盞入竹葉二七片同煎至一盞去滓食後溫服木通湯治黃疸脾胃積熱皮肉皆黃煩躁口苦小便赤澀木通銼瞿麥各一兩赤茯苓去黑皮白茅根大青秦艽去苗土各三分生乾地黃焙一兩半上粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服茵陳散聖惠方治黃疸食已即飢身體面目爪甲牙齒小便身體多赤多青皆由酒食過度為風濕所搏熱氣鬱蒸而成茵陳木通梔子仁各一兩大黃炒栝蔞一個石膏各二兩炙甘草五分上㕮咀每服四錢水一盞生薑五片蔥白一莖煎至八分去滓不拘時候溫服大小便祕加枳實赤茯苓葶藶子又有傷寒瘀血不解郁發於表為黃疸其脈浮緊當以汗解獨煎麻黃節飲之木香丸治諸般黃疸婦人血氣不和男子諸積皆治之木香三錢皂礬五分百藥煎五分蒸餅八個去皮捻碎平胃散紅棗肉各四兩針砂一兩醋炒上為末用好醋和蒸餅紅棗肉入前藥為一處丸如梧桐子大每服一十五丸薑湯送下日進二服茵陳散治黃疸心神煩燥小便赤大便難不得安臥茵陳一兩犀角五錢升麻一兩梔子仁三分甘草三分炙微赤黃芩一兩朴硝一兩上為散每服四錢水一盞煎六分去滓無時溫服大小便利為度雞舌香湯聖濟總録治黃疸面黃眼如金色四肢羸弱或時煩渴雞舌香秦艽去苗土各二分胡黃連丁香芎藭各五分柴胡去苗一兩上為粗散每服三錢匕水一盞煎至六分去滓食前溫服山茵陳散直指方治黃疸大小便祕澀梔子一兩枳實七枚制赤茯苓葶藶甘草炙各一兩上銼每服三錢姜三片煎服治黃疸本草以亂髮燒灰水調服一錢匕日三服又方本草以風延母煮服之土瓜根散聖惠方治黃疸其小便自利白如泔色此狀得之因酒過傷宜服土瓜根一兩白石脂桂心栝蔞根菟絲子酒浸一日曝乾為末牡蠣燒為末各一兩上為末每服煮大麥粥飲調下二錢日三四服加減五苓湯濟生方治飲酒伏暑鬱而發黃煩渴小便不利赤茯苓去皮豬苓去皮澤瀉白朮茵陳各等分一方用桂心無茵陳上㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時候一方治黃疸利小便為散渴時水服方寸匕極飲水即利小便及汗出愈一清飲危氏方治黃疸發熱諸熱通用柴胡三兩赤茯苓二兩桑白皮制川芎各一兩甘草炙五錢上銼碎每服三錢生薑棗子水一盞煎服茵陳丸聖惠總録治黃疸面目身體皆黃口乾煩燥發熱狂悶茵陳蒿常山各五錢大黃二分炒朴硝研一分豉炒一合上為末煉蜜如梧桐子大每服二十丸食後煎竹葉湯溫送下必效散直指方治黃疸通用葶藶子隔紙炒龍膽草山梔仁山茵陳黃芩各等分上為粗末每服三錢新水煎服茵陳丸聖濟總録治黃疸身面悉黃小便如濃梔子汁茵陳二兩黃芩枳殼各一兩炒黃去白大黃一兩半微炒升麻一兩半上為末煉蜜為丸如梧桐子大每服三十丸清粥飲下日三四服大黃硝石湯千金方治黃疸腹滿小便不利面赤自汗出為表和裡實當下之大黃黃柏硝石各四兩梔子十五枚擘破上㕮咀水煎去滓納硝石煮一升頓服茵陳湯治黃疸小便赤茵陳山梔仁秦艽升麻各四錢上搗為末每服三錢水一盞煎服柴胡湯聖濟總録治黃疸通身並黃柴胡去苗茵陳各一兩升麻龍膽草各三分上銼碎每服五錢匕水一盞半煎至八分去滓入地黃汁一合攪令勻食後溫服茵陳丸聖濟總録治黃疸身體面目皆黃茵陳三分大黃銼炒黃連去須黃芩去黑心各一兩上為末煉蜜和丸如梧桐子大每服十五丸食後臨臥溫水送下黃連散濟生拔粹方治黃疸身體面目皆黃小便祕澀臟腑壅熱黃連去須川大黃細銼醋炒各二兩黃芩去黑心甘草炙各一兩上為散每服二錢匕食後溫水調下日三服治水腫不利小便非其法也故內經云濕氣在上以苦吐之濕氣在下以苦瀉之吐瀉後長服益元散加海金砂煎以長流水服之則愈矣大忌腳膝上針刺出水取一時之效後必死矣尤忌房室濕面酒醋鹽味犯之必死鐵刷湯治黃疸面目遍身如金色良薑六兩油炒茴香二兩炒甘草八兩半蒼朮八兩上為細末每服二錢生薑三片鹽少許水一盞煎至七分和渣空心服四七湯治黃疸半夏五錢茯苓四錢紫蘇二錢厚朴三錢上為粗末每服五錢水一盞生薑棗煎至七分去滓無時服治黃疸面目遍身如金色一名吹鼻散聖惠方瓜蒂一十四個母丁香一個黍米四十九粒上先搗瓜蒂為末次入二味同為細末每用半字夜臥令病人先噙水一口兩鼻內各吹半字吐了水便睡至夜或明日取下黃水旋用熱帛搵了直候取水定便服黃連散一方溫水調下頓服令盡吐利黃水兩服永除病輕者五日重者半月一方有赤小豆梔子柏皮湯經驗良方治疸頭微汗小便利而微發黃者濕熱相搏微者宜服亦治瘟病發黃黃柏皮二兩甘草一兩山梔仁十五個上為粗末每服五錢水一盞半煎至七分溫服不計時候梔子湯聖濟總録治黃疸心中懊憹煩熱山梔子仁五錢枳殼去白麩炒一錢大黃一兩銼炒上為粗末每服三錢匕水一盞入豉二十粒煎至七分去滓溫服不拘時金匱方用枳實不用枳殼豬苓散肘後方治黃疸病及狐惑病豬苓茯苓白朮各等分上共為末每服方寸匕水調下赤小豆散肘後方治黃疸心膈燥熱小便赤澀赤小豆一百粒秫米一百粒雞糞白一兩微炒上為末每服以新汲水調下一錢日三四服黃汗當出此通治面目黃大黃丸聖濟總録治黃疸面目肌瘦大黃銼一斤芎藭半斤上為末用蜜和成劑甑上炊七遍丸如梧桐子大每服三十丸熟水下空心食前日三服治黃疸本草以麻草一把去節綿裹以美酒五升煮取半升去滓頓服如治傷熱表發亦宜汗之則愈如人行十里汗未出則再服冬月用酒春宜用水煮之良治黃疸本草以芭蕉子生食之治疸黃本草以鳧茨作粉食之秦艽散千金方治黃疸飲少溺多秦椒六株瓜蒂五錢上治下篩水服方寸匕日三瓜丁散本草治黃疸目黃遍身如金色微腫五疸汗如黃柏汁瓜蒂四十九個六月六日採自然落者用如未用以檳榔葉裹於東牆有風處掛吹令乾丁香四十九粒上用乾鍋子燒煙盡為度細研作末小兒用半字吹鼻內及揩牙大人用一字吹鼻內立瘥一方為末如大豆許納鼻中令病人深吸取鼻中黃水出梔子酒治黃疸梔子茵陳各一束上以無灰酒二大碗煎至八分三更時分服之忌油膩濕面豆腐生冷等物柴胡湯直指方治黃疸柴胡去苗五錢甘草炙一分上銼以水一碗白茅根一握同煎至七分去滓溫服葶藶丸一名大黃丸千金方治黃疸大小便難喘急促甜葶藶炒二兩大黃炒一兩上為末煉蜜和丸如梧桐子大每服二十丸溫米飲下食後臨臥服喘慢即藥止治黃疸心膈燥熱小便赤澀聖惠方茅根三把細銼豬肉半斤細切上以水三大盞煎茅根至二盞去滓入肉作羹盡一服愈茵陳五苓散濟生拔粹方治黃疸茵陳蒿末一錢五苓散五分同煎上和食前服方寸匕日三治黃疸身眼黃如金色危氏方用東引桃根切細如筋若叉股者一握以水一大升煎取適溫空腹頓服後三日其黃離離如薄雲散聚百日方平復可時飲一盞清酒飲之則易散不飲則散遲忌食豬魚等肉採桃根之時不可使婦人雞犬見此是徐之才家祕方治黃疸經驗良方用自死大螺燒灰存性平胃散各等分無灰酒煎茵陳湯調服不能飲煎湯調服解熱方治黃疸解諸熱淋直指方用生車前草研極細井水調下一方炒子為末米飲調下立止洞瀉治寒熱黃疸濕瘴本草取端午日南行豬苓合太一丹是也治黃疸百藥不瘥本草用驢頭一枚煮熟以姜齏啖之並隨多少飲汁即效療男子女人黃疸病耳目悉黃飲食不消胃中脹熱生黃衣在胃中此腸間有燥糞使病宜服聖惠方用煎煉豬脂五兩每服大半匙以蔥白湯調服頻頻服之以通利為度一方無蔥白止用豬脂熱服之燥屎下愈治黃疸並利小腸作齏吃甚益顏色毒氣鬱蒸面目盡黃寒熱發渴聖惠方用小麥苗杵絞汁每服六七合盡飲之三四日便愈大麥苗亦可每服六七合日三四服此酒疸也治黃疸皮膚眼睛如金色小便赤肘後方用生蔓荊子末熟水下方寸匕日三先後十日愈治患黃疸聖惠方用苜蓿根生搗絞汁服之良治黃疸肘後方用柳枝以水一斗煮取濃汁半升服令盡治大熱黃疸傷寒頭痛身熱瘴瘧利小便聖惠方用茵陳細切煮羹食之又一方以茵陳為散水煎服治黃疸熱毒結