body:
  text: 卷五十三耳門總論夫耳屬足少陰之經腎家之寄竅於耳也腎通乎耳所主者精精氣調和腎氣充足則耳聞而聰若勞傷氣血風邪襲虛使精脫腎憊則耳轉而聾又有氣厥而聾者有挾風而聾者有勞傷而聾者蓋十二經脈上絡於耳其陰陽諸經適有交併則臟氣逆而為厥厥氣搏入於耳是為厥聾必有時見眩暈之證耳者宗脈之所附脈虛而風邪乘之風入於耳之脈使經氣痞而不宣是為風聾必有時見頭痛之證勞役傷於血氣淫欲耗其精元瘦悴力疲昏昏聵聵是為勞聾有能將適得所血氣和平則其聾暫輕其或日就勞傷風邪停滯則為久聾又有耳觸風邪與氣相擊其聲嘈嘈眼或見火為虛鳴熱氣乘虛隨脈入耳不散膿出為膿耳人耳間有津液輕則不能為害若風熱搏之津液結聚成核塞耳亦令暴聾謂之聤耳前是數者腎脈可推風則浮而盛熱則洪而實虛則澀而濡風為之疏散熱為之清利虛為之調養邪氣屏退然後以通耳調氣安腎之劑主之如此得耳中三昧耳不致聾聵耳鳴耳痛耳癢耳內生瘡或為聤耳或為焮腫六淫傷之調乎腎也七情所感治乎心醫療之法寧心順氣欲其氣順心寧則耳為之聰矣宜用局方妙香散以石菖蒲煎湯調服以順心氣參丹蜜砂以寧心君調腎之藥前方所載蓯蓉丸是也續有二方為之佐使參而用之可也耳證歌云耳為聽會腎之官五臟關通理可詳內運唏噓呵久呬外司角徵羽宮商猝然內塞不聞聲勞碌憂思過度生聾聵耳鳴膿血出風寒暑濕薄於經聤耳底耳證多端用意消詳不一般或實或虛隨證療百蟲入耳別為看五臟六腑十二經脈有絡於耳者其陰陽經氣有相併時並則有臟氣逆名之為厥厥氣相搏入於耳之脈則令耳聾其腎病精脫耳聾者其候頰顴色黑手少陽之脈動其氣厥逆而耳聾者其候耳內渾渾淳淳也手太陽厥而耳聾者其候聾而耳內氣滿養生方云勿塞故井及水瀆令人耳聾目盲耳聾諸疾附論夫腎開竅於耳足少陰之經宗脈所會也若精氣調和元藏充盛則耳聰而諸疾不生或勞傷氣血客受風邪則腎虛而為耳病有腎間積水而耳聾者有心氣虛熱而耳聾者有腦脂下流成耵聹耳垢而耳聾者其證不一耳聾之證有二有腎虛精脫而聾者腎氣通於耳也有經脈氣厥而聾者經脈絡於耳也腎虛而聾者其候面色黑氣厥摶入於耳而聾者其候耳中渾渾淳淳或耳中氣滿是也渾渾淳淳過在手少陽耳中氣滿過在手太陽以至五絡皆會於耳中各有證候審而治之蓋肺虛而少氣不能報息耳聾嗌乾肺之絡會於耳中故聾此説非也蓋氣澀必寒盛則氣血俱澀滯而不行也耳者宗氣也肺氣不行故聾也耳聾有五曰風聾曰干聾曰勞聾曰虛聾曰聤聾是也腎氣通於耳足少陰其經也經虛受風邪及勞傷血氣停滯津液皆能致聾惟所受不同故其證各異葛氏所謂風聾者痛掣干聾者生耵聹勞聾者出黃汁虛聾者肅肅作聲聤聾者膿汁出可不辨歟方磁石散出千金方治耳聾磁石四兩天門冬地骨皮生薑各二兩山茱萸土瓜根蔓荊子茯苓菖蒲芎藭枳實白芷橘皮甘草各二兩竹瀝二升上㕮咀以水八升煮減半納瀝煮取二升五合分三服五日一劑三日乃著散納耳中如後方柏子仁湯出聖濟總録治腎間有水使人耳聾補不足柏子仁酒浸一宿曝乾白朮米泔浸一宿銼炒人參乾薑炮甘草炙防風去皮烏頭炮裂去皮臍陳橘皮湯浸去白焙山芋芎藭磁石煅醋淬七遍芍藥黃耆白茯苓去黑皮桂去粗皮各一兩半上㕮咀羅勻每服三二錢匕先以水三盞煮羊腎一隻取汁一盞去羊腎下藥入生薑棗大拍碎同煎至七分去滓食前溫服之肉蓯蓉丸出聖濟總録治腎虛耳聾肉蓯蓉酒浸一宿切焙菟絲子酒浸別搗白茯苓去黑皮山芋人參桂去粗皮防風去叉芍藥銼熟乾地黃切焙黃耆銼各兩附子炮裂去皮臍羊腎一對薄批去筋膜炙乾羌活去蘆頭澤瀉銼各一兩分上搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫酒送下桑螵蛸湯聖濟總録治虛損耳聾桑螵蛸炙十枝牡丹皮半兩白茯苓去黑皮白朮米泔浸一宿銼炒當歸切焙桂去粗皮蔓荊子炒磁石煅醋淬七遍附子炮裂去皮臍菖蒲米泔浸一宿銼焙熟乾地黃焙各一兩大黃銼炒細辛去苗葉芎藭各半兩上㕮咀每服三錢匕先以水三盞煮豬腎一隻取汁一盞去腎下藥煎至七分去滓食前溫服礬石膏出千金方治耳聾礬石甘草菖蒲當歸細辛防風芎藭白芷烏賊骨附子皂莢各半兩巴豆十四枚上薄切三升酢漬一宿以下中水雞膏九合煎三上三下以巴豆黃膏成去滓納雄黃末攪調取棗核大瀝於耳中綿塞之日三易黃耆丸聖濟總録治耳聾黃耆銼梔子仁炒犀角鎊木通銼炒升麻人參玄參木香干藍黃芩去黑心芍藥銼各一兩上搗羅為細末煉蜜和丸如梧桐子大每服二十丸煎枸杞根湯下加至三十丸食後服追風散治耳聾閉塞不通藜蘆雄黃川芎白芷石菖蒲全蠍藿香薄荷鵝不食草無鵝草加龍腦少許苦丁香以上各等分麝香少許上為細末吹鼻中仍服順氣散即通乳香丸聖濟總録治耳聾塞耳乳香杏仁湯浸去皮尖雙仁炒萆麻子去皮附子炮裂去皮臍磁石煅醋淬七遍木通銼桃仁湯浸去皮尖雙仁炒各半兩巴豆去皮心炒一分松脂菖蒲各三分上先搗羅磁石木通菖蒲附子為末其餘搗研為膏入末同搗一二百杵捻如棗核大中心通一孔子以綿塞耳中一日三換輕者三日重者七日愈清神散出朱氏集驗方治氣壅於上頭目不清耳常重聽干菊花白殭蠶炒去絲嘴各半兩荊芥穗羌活木通川芎防風各四兩木香一錢甘草石菖蒲各錢半上為末每服三錢食後臨臥茶清調下磁石羊腎丸出朱氏集驗方治風虛不爽時有重聽或有風痹之狀並皆治之磁石末二兩火煅七次醋淬用蔥子一合木通三兩用水同煎一晝夜去蔥子木通川椒去目石棗去核防風白朮茯苓北細辛山藥川芎遠志肉大川烏炮木香當歸菟絲子酒浸炒黃耆鹿茸酒浸一宿炙各一兩肉桂六錢半熟地黃九蒸各二兩石菖蒲一兩半上為末用羊腎兩對去皮膜以酒煮爛和諸藥細研以所煮羊腎酒攪糊為丸如梧桐子大每服一百丸空心溫酒鹽湯任下仍服清神散羊腎丸二方相間服卻忌牛肉雞鴨子臨川阮助教方療耳聾出本草以鹽沾蚯蚓汁滴耳中治耳聾斑蝥一個去翅足土狗一二個石菖蒲一寸巴豆一個全蠍一個去毒穿山甲一片燒麝香少許萆麻子三個上研細蔥涎和丸棗核大綿裹塞耳菖蒲散出千金方治耳聾石菖蒲二兩磁石四兩醋淬白蘞牡丹皮山茱萸牛膝土瓜根各二兩上治下篩綿裹塞耳日一易之仍服大三五七散佳通耳丹出衛生寶鑑方治耳聾桑螵蛸安息香阿魏各一錢半硃砂半錢大蒜一大瓣萆麻子仁巴豆仁各七個上為細末入二仁與蒜同研爛為丸如棗核樣每服一丸綿裹納耳中如覺微痛即取其藥萆麻子丸一名大通膏治耳聾塞耳出楊氏家藏方萆麻子去皮半兩乳香食鹽巴豆去皮炒各一兩分松脂蠟杏仁湯浸去皮尖雙仁炒各半兩上搗爛如膏捻如棗核樣如小手指大用黃蠟薄綿卷之大針扎兩三眼子兩頭透用塞耳經宿當聞鐘聲黃水出即愈雄黃散出聖濟總録治耳聾熏耳雄黃防風去叉菖蒲礬石烏頭去皮臍椒去目並閉口炒出汗各一分大棗核十枚上為散以香爐中安艾一彈子大次著黃柏末半錢匕於艾上復以藥二錢匕著艾上火燃向耳熏之磁石丸一名菖蒲丸出聖惠方療耳聾磁石菖蒲通草薰陸香一方用乳香杏仁去皮熬萆麻子去皮松脂等分上搗篩以蠟及鵝脂和丸稍長作以叉腳子穿中心為孔先去耳中垢然後納藥日再初作癢及作聲月餘即瘥一方無鵝脂只用蠟為丸黃蠟丸出千金方治耳聾蠟松脂薰陸香萆麻子食鹽亂髮灰上等分為末作丸綿裹塞耳時易之瘥止木香丸一名魚腦膏出聖惠方治遠年近日耳重香附子一兩炒去毛蒼朮一兩泔水浸焙乾木賊二兩川烏半兩炮去皮尖木香三錢臨用藥入使不見火上為細末用蔥六兩研同前藥和勻漬一宿來日炒乾再為細末作二分一分用酒糊為丸如梧桐子大每服三十丸用留下一分藥末每用一錢麝香酒調吞下丸子藥服之菖蒲酒一名菖蒲浸酒出朱氏家藏方治耳聾及鳴木通菖蒲米泔浸一宿銼焙三分磁石搗碎各半兩綿裹防風去叉一兩桂去粗皮半兩羌活去蘆頭一兩上粗搗如麻豆以酒一斗漬寒七日暑三日每日空腹飲三兩盞以瘥為度一方無羌活通神散出直指方治耳聾全蠍一枚土狗二枚中地龍二條雄黃各半錢麝香一字明礬半生半煅用半錢上研細蔥白引藥入耳閉氣面壁坐一時三日一次松脂膏出聖惠方療耳聾不聞人語聲方松脂四分巴豆二分去皮心熬麻子仁二分蠟二分薰陸香二分石鹽二分上搗如膏丸棗核大納耳三日一易取瘥一方無蠟地黃散出聖惠方治耳聾巴豆杏仁各七枚生地黃極粗者長一寸半鹽兩顆用切成者頭髮如雞子大燒灰上件搗篩以綿薄裹納耳中一日一夜若不損即去之直以物塞耳中黃水及膿出漸漸有效如不瘥者更納一日一夜必瘥一方搗成膏為丸以薄發裹塞耳中名地黃丸松脂膏出聖惠方治耳聾松脂半兩杏仁一分去皮尖巴豆半分去皮膜椒目末半兩蔥汁半合上搗爛如膏捻如棗核大綿裹塞耳中菖蒲丸一名羊腎丸治腎虛耳聾重聽過於思慮則其病尤甚此藥主之菖蒲蜀椒去目並閉口炒出汗各三分蔥白炒半兩羊腎一對酒一升煮乾取出片切曝乾皂莢一梃去皮子炙上為末煉蜜為丸如梧桐子大每服三十丸空心溫酒下日三丸欲服此藥臨睡時先安鐵物於所患耳邊口中以牙邊咬定卻以磁石一小塊安耳內覺氣微通略能聽聲然後服藥一方無蜜研羊石子作膏鹽湯下亦得益腎膏治腎虛耳聾磁石火燒醋淬七次研細水飛巴戟大川椒開口者各一兩沉香石菖蒲各半兩上為細末每服二錢用豬腎一隻細切和以蔥白少許鹽並藥濕紙十重裹煨令香熟空心嚼以酒送下附子散出聖濟總録治耳聾塞用附子炮裂去皮臍磁石煅醋淬一七遍龍骨菖蒲藁本去叉各一分上為散以綿裹一錢匕塞耳中羌活丸出聖濟總録治耳聾塞耳羌活去蘆頭玄參木通銼烏頭炮裂去皮臍防風去叉各一分上為末熔蠟和捻如棗核塞耳中日一易楓香丸出楊氏家藏方療耳聾木香丸出楊氏家藏方磁石三二兩煅赤醋淬九次石菖蒲遠志去心破故紙炒各一兩木通半兩麝香一錢別研上為細末用蔥白汁煮麵糊為丸如梧桐子大每服三十丸至四十丸煎通草湯送下食前地黃丸治耳聾塞耳透耳筒一方椒目膏出仁存方治耳聾及由腎氣虛耳中如風水聲或如鐘鼓聲椒目巴豆菖蒲松脂各一分錢上為末攤令薄候冷卷作筒子塞耳內一日一易神效一方用川椒以蠟為丸如棗核大塞耳中一方無松脂治耳聾一豆三貓不出油麝香少許用真修煉蜜為丸麥粒大綿裹錠子耳中投燒腎散出聖惠方治耳聾磁石一兩醋淬七次細研水飛附子一兩炮裂去皮臍巴戟一兩川椒一兩去目及閉口者微炒出汗上為末每服用豬腎一隻去筋膜細切蔥白薤白各一分切入藥一錢鹽花一字和攪令勻以十重濕紙裹於煻灰火內煨熟空心細嚼酒解薄粥送下十日大效明硫黃膏出直指方治耳聾明硫黃雄黃各研細遠志去心白皂莢等分上為細末蔥白搗黏入麝少許綿包入耳蠟彈丸出危氏方治腎虛耳聾白茯苓黃蠟各二兩山藥三兩杏仁去皮尖炒一兩半上為末熔蠟和丸如彈子大嚼一丸鹽湯下不拘時候或茶清下亦效蝸牛子膏出聖惠方治耳聾塞耳蝸牛子一分石膽一分鍾乳一分龍腦少許上除龍腦同研細末一瓷瓶