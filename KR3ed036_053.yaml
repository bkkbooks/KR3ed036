聾鳴鬧不聞人聲出黃水黃耆銼一兩半附子炮裂去皮臍一兩磁石醋淬一七遍三兩菖蒲米泔浸一宿銼碎焙乾一兩木通銼熟乾地黃焙白茯苓去黑皮五味子防風去叉人參玄參各一兩一分杜仲去粗皮炙銼一兩上銼如麻豆每服五錢以水一盞半生薑半分拍碎大棗二枚擘破同煎至一盞去滓溫服續吃羊腎粥助之日四五服不計時候通氣散治耳聾氣閉不通茴香木香全蠍陳皮玄胡各一錢穿山甲炮二錢羌活殭蠶川芎各半錢蟬蛻半錢菖蒲一錢甘草一錢半上為細末每服三錢溫酒調下補腎丸治勞聾氣聾風聾虛聾毒聾久聾耳鳴薑蠍散治耳勞聾氣塞防風附子方出聖濟總録治耳鳴氣塞不通時作聾用生附子尖一枚削作小棗核大以綿裹置耳內治氣壅耳聾用祕傳降氣湯加石菖蒲大有神效磁石湯治耳聾及風氣腳氣磁石十二兩碎綿裹石上菖蒲四兩通草三兩瞿麥二兩山茱萸三兩白朮三兩獨活四兩芎藭二兩薯蕷二三兩甘草三二兩炙附子三二兩炮桂心三兩生薑五兩杏仁二兩去皮尖熬碎茯神二兩人參前胡各三兩蔥白切一升竹葉一握石膏二兩碎綿裹上切以水一斗四升煮取一二升半去滓分三服宜向暮服之令盡慎如常法丹參膏一名赤膏出千金方治耳聾齒痛丹參五兩蜀椒一升大黃白朮細辛芎藭各一兩大附子十枚乾薑三兩巴豆十枚去心桂心四寸上銼以苦酒漬一宿以楮膏三斤煎三上三下藥成去滓可服可摩耳聾者綿裹膏納耳中齒冷痛者著齒間諸痛皆摩服腹內有痛以酒服一棗許大咽喉痛吞一棗核大一枚大青丸出聖濟總録治腦熱腦脂流下塞耳聾大青大黃銼炒梔子去皮黃耆銼升麻黃連去須各一兩朴硝二兩上為末煉蜜丸如梧桐子大每服三十丸空心溫酒下藍實丸出聖濟總録治時行心氣奪耳聾藍實茯神去木防風去叉各一兩一分黃連去須一兩半人參半兩菖蒲遠志去心各三兩上為末煉蜜為丸如梧桐子大每服二十丸空心溫水下黃耆膏出聖濟總録治耳內窒塞如有物點黃耆銼升麻大黃生銼芍藥各一分細辛去苗葉半兩上為末以清麻油五合調勻慢火煎取二合稀稠得所以瓷盒盛每用少許滴耳中日三次百靈丸出聖濟總録治耳重芫花醋浸炒乾蒺藜子炒去角地龍炒蘹香子炒地丁各一分上為末以醋和蜜煉熟丸如梧桐子大空心臨臥溫鹽酒下五丸白龍散出經驗良方耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱熱氣上衝於耳津液結滯則生膿汁有因沐浴水入耳內水濕停積搏於血氣蘊積成熱亦令耳膿汁出謂之聤耳久而不瘥則變成聾白礬枯黃丹各半兩麝香一錢龍骨半兩上研極細先以綿杖子點盡耳中膿出用藥一字分摻兩耳內日二次勿令風入摻耳抵聖散出聖濟總録治耳重瓜蒂麝香研地龍地丁各等分上為散每以少許摻耳內治耳疾出經驗良方蛇床子一兩巴豆去皮半兩萆麻子半兩上同炒令焦黃卻去巴豆萆麻子用蛇床子為末入麝香少許每用少許鵝毛管吹入耳中側臥良久黃水出便效治擦落耳鼻出經驗良方用頭髮入罐子鹽泥固濟煅過為細灰末乘急以所擦落耳鼻蘸灰綴定以軟絹帛縛定愈獨聖散出聖濟總録治汗後耳聾用陵石有竅子如針眼者搗研為細散每服一錢匕冷水調下治諸耳中出血出三因方用龍骨為末吹入耳中立愈鼻衄等皆可用方書以九竅出血皆可吹入萆麻子丸出聖惠方治耳聾萆麻仁五合杏仁菖蒲磁石桃仁石鹽通草各三錢分巴豆一分附子二分錢薰陸香松脂各十分錢蠟八分上先搗草石令極細後入松脂蠟合搗數十杵令可丸即丸如棗核大綿裹塞耳一日四五度出之轉捻不過三四日易之雞峰方出聖惠方治耳聾菖蒲一寸巴豆一粒去心皮上搗研分為七丸每服一丸臥即綿裹塞耳中一方入麝香少許夜易之十日立愈黃汁立瘥一方用蠟一分為丸每一丸穿一孔子以綿裹塞耳中日一易之鸊鷉膏出本草治耳聾取鸊鷉膏滴耳中此水鳥也其膏塗刀劍不蘊治耳聾出本草以取狗陰膏滴耳中令左右耳徹治耳聾出本草以杏仁七枚去皮拍碎為三分以綿裹於中著顆鹽如小豆許以器盛於飯甑中蒸之候飯熟出裹令患人側臥和綿捻一裹以油汁滴入耳中久之又以一裹依前法治耳聾出本草以蝟脂注耳中治耳聾出本草以附子醋浸削如小指大納耳中導引法坐地交叉兩腳以兩手從曲腳中入低頭叉項上治久寒不能自溫耳不聞聲又云腳著項上不息十二通必愈大寒不覺暖熱久頑冷患耳聾目眩久行即成法法身五六不能變風聾附論夫風聾者本於足少陰之經宗脈之所聚其氣通於耳其經脈虛風邪乘之風入於耳之脈使經氣閉塞不宣故為風聾風隨氣脈行於頭腦則聾而時頭痛故謂之風聾方雄黃散出聖濟總録治風聾雄黃半兩研丹砂三分研丁香一分桂去粗皮一兩分乾蠍去足炒半兩烏蛇酒炙用肉半兩硫黃一分研天麻人參各半兩山芋一兩分天南星炮三分白附子炮一分麝香三分研檳榔三枚煨銼木香一分麻黃去根節半兩上為散再羅令勻每服二錢匕溫酒調服磁石酒浸方治風邪入於腦或入於耳久而不散經絡壅塞不能宣利使人耳中悾悾然或作旋暈出朱氏家藏方磁石五兩搗碎水淘去赤汁山茱萸二兩木通一兩防風一兩去蘆頭薯蕷一兩菖蒲一兩遠志一兩去心天雄一兩炮裂去皮臍蔓荊子一兩甘菊花一兩芎藭一兩細辛一兩肉桂一兩去粗皮乾薑一兩炮裂制白茯苓一兩熟乾地黃三兩上細銼拌和用生絹袋盛以酒三斗浸經七日後每日任性飲之以瘥為度菖蒲湯出聖濟總録治風聾木通銼三兩瞿麥三二兩用穗白朮銼碎炒三兩菖蒲米泔浸一宿切四兩獨活去蘆頭四兩山芋三兩甘草炙銼二兩附子炮裂去皮臍二兩桂去粗皮二三兩杏仁去皮尖雙仁炒三兩茯神去木二兩人參三兩前胡去蘆頭三兩石膏二兩磁石火燒醋淬七遍二兩上銼如麻豆每服三錢匕以水一盞半入竹葉七片生薑一棗大切蔥白一寸同煎至七分去滓溫服山茱萸散出聖惠方治風虛耳聾頭腦旋悶四肢不利山茱萸薯蕷菖蒲土瓜根甘菊花木通防風去蘆頭赤茯苓各一兩天雄一兩半炮裂去皮臍牛膝去苗沉香各一兩甘草半兩炙微赤銼遠志去心生乾地黃蔓荊子各一兩上為散每服五錢以水一大盞入生薑半分同煎至五分去滓食前溫服蓯蓉丸出聖惠方治風虛耳聾由腎臟不足風邪入於經絡致四肢羸瘦腰背強直耳無所聞肉蓯蓉二兩酒浸一宿刮去粗皮炙乾磁石二兩燒醋淬七遍搗碎細碾水飛過鹿茸一兩去毛塗酥炙微黃山茱萸石斛去根銼石龍芮巴戟杜仲去粗皮炙微赤銼附子炮裂去皮臍菟絲子酒浸三日曝乾別搗為末菖蒲熟乾地黃天麻乾蠍微炒各三錢上為末煉蜜搗三五百杵丸如梧桐子大每服十丸空心溫酒下桂星散出直指方治風虛耳聾辣桂川芎當歸細辛淨石菖蒲木通木香白蒺藜炒杵去皮麻黃去節甘草炙各二錢半天南星煨裂白芷梢各四錢上銼碎每服三錢水一盞半蔥白二莖紫蘇五葉薑五片食後煎服晚少食臨臥加些全蠍服排風湯亦可用黃耆湯治風聾颼颼如風雨鐘聲或時出清水或有膿汁或生瘡蒼耳酒出聖濟總録治腎間風熱骨痛耳聾及腎中實邪蒼耳淨揀防風去叉惡實炒各三兩獨活去蘆頭木通各三二兩生地黃洗三兩人參一三兩薏苡仁三二兩黃耆三兩桂去粗皮一兩半白茯苓去黑皮二兩半上細切以酒一斗浸七宿空心飲之初一盞日再候量性加至二三盞杏仁膏一名萆麻丸出聖濟總録治風聾久不瘥者杏仁去皮尖雙仁別研萆麻子去皮各一兩別研巴豆去皮心別研一分食鹽研別二一分附子炮裂去皮臍一分桃仁去皮尖雙仁別研一兩乳香別研一分木通銼半兩磁石火燒醋淬一七遍一兩蠟二兩菖蒲一兩上除別研外搗羅為末後入研者相和搗丸捻如棗核大綿裹塞耳中日四五易黃耆散出聖惠方治風虛耳聾黃耆二兩銼當歸二兩銼微炒杏仁二兩湯浸去皮尖雙仁麩炒微黃桂心二兩芎藭二兩白朮一兩石菖蒲一兩蔓荊子一兩白蘚皮二一兩白芍藥二兩上為散每服五錢以水一大盞納羊腎一隻去脂膜切開入生薑一分同煎至六分去滓空心溫服犀角飲子出危氏方治風熱上壅耳內聾閉腫痛掣動膿血流出犀角鎊菖蒲木通玄參赤芍藥赤小豆炒甘菊花去枝梗各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候磁石散出聖惠方治風虛耳聾無聞魚腦膏出聖惠方治風聾年久及耳鳴生鯉魚腦二兩當歸切焙細辛去苗葉白芷附子炮裂去皮臍菖蒲各半兩上除魚腦搗羅為末以魚腦置銀器中入藥在內微火上煎候香濾去滓傾入瓷閣中候凝如棗核大綿裹塞耳中一方無菖蒲有羊腎脂同魚腦先熬後下諸藥附子散出聖惠方治風虛耳聾頭腦旋悶四肢不利附子炮裂去皮臍桂心五味子木香桃仁湯浸去皮尖雙仁麩炒微黃白蒺藜各一兩微炒去刺上為散每服二錢空心以暖酒調服夜臨臥時再服天雄散出聖濟總録治風聾頭目痛細辛去苗葉二兩山茱萸五兩乾薑焙二兩天雄炮裂去皮臍三兩山芋七兩上搗為散每服一錢匕空心溫酒調下日二服羊腎羹方出聖惠方治風虛耳聾黃耆半兩銼羊腎一隻去脂膜切杜仲半兩去粗皮炙微黃銼磁石五兩搗碎水淘去赤汁綿裹懸煎不得到鐺底肉蓯蓉一兩酒浸一宿刮去粗皮炙乾上以水三大盞先煮磁石取汁二大盞去磁石下黃耆等又煎取一盞半去滓入羊腎粳米一合蔥白薑椒鹽醋一如作羹法空心服之磁石重重用之無妨菖蒲散治風聾積久及耳鳴醋附方治耳風聾牙關急不得開獨活散治風聾用獨活去蘆頭一兩搗羅為散每服二錢以水酒各半盞煎至七分去滓空心服以瘥為度時用水浸椒煮令熱以布裹尉之栝蔞方治耳卒得風覺耳中哄哄聾削栝蔞根令可入耳中以臘月豬脂煎三沸出塞耳每用三七日即愈一方用鵠膏不用豬脂白鹽方治猝得風疾覺耳中恍恍卒痛者急取鹽五升甑上蒸熱以耳枕之冷即換亦治耳疼一方用軟布裹尉之患處用青布裹鹽亦可治風虛耳聾取柘木白皮及東行根白皮煮汁釀酒服療耳聾風邪牙關急不得開方取八角附子一枚醋漬之三宿令潤微削一頭納耳中灸上十四壯令氣通耳中即瘥
