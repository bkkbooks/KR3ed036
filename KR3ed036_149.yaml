body:
  text: 卷一百四十九時氣門時氣發狂附論夫時氣發狂者由熱毒氣盛則棄衣而走登高而歌或不食數日逾垣上屋非是素所能也皆陰陽爭氣外並於陽四肢者諸陽之本也熱盛則四肢實實則能登高而歌熱盛於身故棄衣而走狂言妄見聞皆熱毒氣盛所為也方梔子散出聖惠方治時氣熱毒攻心面目俱赤發狂不識人梔子仁葳蕤茯苓麥門冬去心川升麻知母犀角屑沙參去蘆黃芩川大黃銼碎微炒甘草炒微赤銼上等分為散每服四錢以水一中盞煎至六分去滓不計時候溫服治時氣心神狂躁言語無度出聖惠方雞子二枚取清白蜜半合生地黃汁一合川大黃半兩銼碎微炒杵上相和令勻頓服之以利為度白蘚皮散白蘚皮一兩五錢大青三分羚羊角屑三分玄參三分梔子仁三分黃芩三分川大黃銼碎微炒三分甘草炙微赤銼三分地骨皮三分上為散每服五錢以水一大盞煎至五分去滓不計時候溫服又方出聖惠方麥門冬三兩去心杏仁二兩湯浸去皮尖雙仁麩炒微黃甘草一兩炙微赤銼白蘚皮二兩生乾地黃二兩黃芩一兩上為散每服五錢以水一大盞入蔥白二莖煎至五分去滓不計時候溫服犀角散出聖惠方治時氣熱毒攻心煩亂不得睡臥犀角屑一兩龍齒一兩子芩一兩沙參去蘆頭一兩葳蕤一兩麥門冬去心一兩川升麻一兩赤茯苓一兩赤芍藥一兩杏仁湯浸去皮尖雙仁麩炒微黃一兩大青三分枳殼麩炒微黃去瓤三分甘草三分炙銼上為散每服五錢以水一大盞煎至五分去滓不計時候溫服治時氣發狂叫呼不識人出聖惠方黃連去須一兩秦艽去苗一兩梔子仁一兩鐵粉二兩上為散每服不計時候以新汲水調下二錢又方出聖惠方梔子仁半兩豉一合蔥白五莖上以水二大盞煎去滓分溫二服治時氣發狂出聖惠方寒水石一兩馬牙硝一兩上細研如面不計時候以新汲水調下一錢又方出聖惠方秦艽去苗五錢大青五錢甘草炙微赤銼半兩上為散不計時候以生地黃汁調下二錢服治時氣熱盛癲狂或時昏沉出聖惠方寒水石半兩硃砂一分鉛霜一分上都研如粉以軟飯和丸如梧桐子大每服不計時候以溫水下十丸治時氣得汗後心神狂亂出聖惠方鐵粉半兩野豬糞麩炒半兩生地黃二兩燒灰上為末以粟米飯和丸如梧桐子大不計時候以人參湯下二十丸大黃丸出聖惠方治時行氣已得汗熱毒不解心煩躁悶言語不定小便赤澀大便不通狂亂欲走大黃二兩銼碎微炒黃芩一兩五錢梔子仁一兩五錢大青二兩龍膽一兩去蘆頭苦參一兩銼川朴硝二兩細研上為末入朴硝勻煉蜜和搗三五百杵丸如梧桐子大不計時候以麥門冬湯下三十丸鐵粉丸出聖惠方治時氣熱毒心神發躁狂亂欲走鐵粉一兩研犀角屑一兩硃砂半兩細研苦參銼一兩甘草二兩銼生用朴硝一兩細研上為末研細令勻煉蜜和丸如梧桐子大不計時候以人參湯下三十丸又方出聖惠方以藍靛半大匙用新汲水一盞調令勻頓服之治時氣天行發狂熱疾用糞清以臘月截淡竹去青皮浸滲取汁服鎮心散治時氣汗後發狂用緊白龍骨不拘多少為細末每服二錢新汲水調下效治天行病六七日熱盛心煩狂見鬼者上絞人屎汁飲數合一方治時行大熱狂走用多年乾者搗末沸湯沃汁服之治瘟病大熱狂言出本草取白頸蚯蚓破去土鹽拌日曝須臾成水飲其汁皆瘥苦患天行熱狂出本草以甘蔗搗絞汁服甚良治天行熱狂煩悶消渴出本草以芭蕉根絞汁服之除煩悶解時疾狂熱退胸膈熱及消酒毒出本草用小麥苗絞汁服之時氣發斑附論夫時氣在表已發汗未解或吐下後毒氣不散煩躁謬語此為表虛里實熱氣燥於外故身體發斑如錦紋凡發斑不可用發表藥令瘡開泄更增斑爛虛故也方升麻散出聖惠方治時氣表裡不解熱毒在臟致斑瘡升麻一兩犀角屑一兩玄參一兩秦艽一兩子芩一兩柴胡一兩去苗杏仁湯浸去皮尖雙仁麩炒微黃一兩甘草炙微赤銼一兩上為散每服五錢以水一中盞煎至五分去滓不計時候溫服又方出聖惠方玄參一兩川升麻一兩甘草炙微赤一兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服羚羊角散出聖惠方治時氣壅毒不退發斑遍身煩熱大小便不利羚羊角屑一兩梔子仁一兩麥門冬一兩去心川麻黃一兩川大黃銼碎微炒一兩玄參一兩黃耆一兩銼甘草炙微赤銼一兩赤芍藥一兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服葛根散出聖惠方治冬溫未即為病至夏得熱其冬溫毒氣始出肌中斑爛癮疹如錦紋喘咳悶嘔吐清涎葛根銼一兩陳橘皮湯浸去白瓤焙一兩麻黃去根節一兩知母一兩黃芩一兩甘草炙微赤銼一兩杏仁湯浸去皮尖雙仁麩炒微黃一兩外臺祕要用各二兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候服外臺祕要以水七升煮取三升分溫三服嘔吐當先定便宜消息忌海藻菘菜名葛根橘皮湯治時氣赤斑瘡出後胸中惡熱瘡盛出聖惠方雞子二枚去殼釅醋二合豬膽汁三合上藥相和煎十餘沸放溫不計時候分溫三服治時氣熱毒在臟腑中欲發赤斑出聖惠方地黃汁五合豉二合麝香一錢細研上於鍋中以煉成豬脂半斤相和煎十餘沸濾去滓入麝香攪令勻每服二合盡服之毒當從肉中為汗出便愈又方出聖惠方以生蝦蟆一枚去腸肚爛研以水一大盞絞取汁頓服或五月五日午時收者燒灰細研冷水調服益佳治天行熱病若發赤黑斑如疹出活人書用青木香二兩以水二升煮取一升頓服之效卑膏湯出活人書治時行溫毒發斑大疫難救病源夫人冬月觸冒寒毒者至春始發病初在表或已發汗吐下而表證未罷毒氣不散故發斑瘡又冬月天時溫暖人感乖候之氣未即發病至春又被積寒所折毒氣不得泄至夏遇熱其春寒解冬溫毒始發出於肌膚斑爛癮疹如錦紋也生地黃半斤切打碎好豉一升上以豬膏二斤合前藥煎五六沸令三分減去滓研雄黃麝香如大豆者納中攪勻盡服之毒便從皮中出則愈忌蕪荑黑奴丸出肘後方治溫毒發斑者五死一生黑斑者十死一生大疫難救者治天行斑瘡須臾遍身皆戴白漿此是惡毒之氣所致用冬葵菜葉煮以蒜齏啖之則止治天行時病發斑瘡頭面及身須臾周匝狀如火燒瘡皆戴白漿隨沒隨生不治數日必死治後瘡盤黯黑一歲方減此惡毒之氣所為用水煮升麻綿漬洗之酒煮尤妙但痛難忍黃連橘皮湯出活人書治冬溫未即病至春被積寒所折不得發至夏熱其春寒解冬溫毒始發出肌中斑爛癮疹如錦紋而咳心悶嘔吐清汁眼赤口瘡下部生瘡黃連四兩去須橘皮杏仁去皮尖雙仁枳實炙一作枳殼麻黃去節葛根各二兩厚朴炙甘草炙各一兩上銼以水八升煮取三升分三服令盡且消息下當先止忌豬肉冷水海藻菘菜等漏蘆橘皮湯治冬溫未即病至春被積寒所折不得發至夏熱其春寒解冬溫毒始發出肌中斑爛癮疹如錦紋而咳心悶嘔吐清汁眼赤口瘡下部亦生瘡漏蘆二兩橘皮二兩甘遂二兩麻黃去節二兩杏仁去皮尖雙仁二兩黃芩二兩上銼以水九升煮取三升分四服得下為佳一方有知母枳實白薇升麻大黃甘草為十二味治天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨沒隨生若不急治數日即死方見治時行病發瘡治時氣發瘡癮用葡萄研酒食之甚效治時氣天行病發瘡用升麻五兩以水二升入蜜同煎三沸半服半敷瘡上即瘥時氣發豌豆瘡附論夫時氣發豌豆瘡者是熱毒氣攻於臟腑餘氣流於肌肉遂於皮膚毛孔之中結成此瘡所出如豌豆顆因以名之但以解熱毒之藥其瘡即止脈洪數者是其候也方犀角散出聖惠方治時氣發豌豆瘡出後疼痛心神煩悶犀角屑五錢丁香半兩薰陸香半兩木香半兩玄參一兩川升麻一兩麝香一分上為散每服二錢以水一中盞煎至五分去滓不計時候服又方出聖惠方用黃連二兩去須為散每服三錢以水一中盞煎至五分去滓不計時候溫服治時氣發豌豆瘡如爪甲大赤黑色者出聖惠方羊膽七枚取汁羊脂三兩上二味相和於銀鍋中煎五七沸待冷摩敷瘡上每日用四五次又方出活人書用川芒硝二兩細研以豬膽汁和塗於瘡上勿令動著直候痂落無瘢仍臥黃土末上良此病小便澀有血者中壞也瘡皆黑靨不出膿者死不療治時氣發豌豆瘡出聖惠方以好白蜜通身塗於瘡上亦可救數食蜜如瘡爛痛可用細研黃土敷之治時氣熱毒攻發豌豆瘡出聖惠方用苦參二兩細銼以水二大盞煎至一盞去滓分為二服日三四服之治時氣發豌豆瘡初覺出聖惠方用川大黃半兩銼碎微炒以水一大盞煎至七分去滓分為二服日三四服之又方出千金方用青黛半兩細研以新汲水調服之日三四次一方用真波斯青黛大如棗又方出千金方用木香一兩搗碎以水一大盞煎至六分去滓不計時候溫服聖濟總録用二兩以水三升煮取一升頓服之治時氣發豌豆瘡亦治及時六畜時氣熱病出千金方用濃煮黍穰汁洗之若誤使穄穰不即瘥聖濟總録瘡若黑者搗蒜封之治傷寒時氣熱毒豌豆瘡出幼幼新書用樺木皮銼煎汁溫服取安又方治時氣熱病豌豆瘡用蕓薹煮汁洗之又方出千金方若赤黑髮如芥大者煎羊脂摩敷之又方出千金方用小豆屑雞子白和敷又方出千金方用婦人月水帛拭之又方出千金方小兒著用月水汁和水浴之治時行病發瘡出肘後方用好蜜遍身摩瘡上亦可以蜜煎升麻摩之並數數拭之外臺祕要肘後此歲有病天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨沒隨生不即療劇者數日必死得瘥後瘡瘢紫黯色彌歲方滅此惡毒之氣也世人云建武中於南陽擊虜所得乃呼為虜瘡諸醫參詳治療用之有效治傷寒時行熱毒發瘡頭面及身須臾周匝狀如火瘡皆帶白漿隨沒隨生葵菜煮爛蒜齏各不拘多少上拌勻初患急食之不早治殺人但瘥後瘡瘢色黑彌歲方滅此是惡毒時氣也又方出肘後方用水濃煮升麻汁漬綿洗之苦酒漬彌佳但燥痛難忍水解散治天行熱氣則生疱瘡疼痛解肌出汗麻黃一兩去節黃芩二分芍藥二分桂心二分上搗篩暖水調服二方寸匕覆令出汗日再服瘥者減之忌海藻菘菜龍腦散治時疾天行豌豆瘡赤瘡子未透心煩狂躁氣喘妄語或見神鬼以龍腦一錢細研旋滴豬心血和丸如雞頭大每服一丸紫草湯下少時心神便定得睡復發透依常將息取安治時氣病骨中熱生豌豆瘡疱瘡飲鐵漿瘥治豌豆瘡出本草服油麻一升須利即不生白漿大效又方以蔓菁根搗汁挑瘡破敷在上時氣口瘡附論夫時氣發汗吐下之後表裡俱虛毒氣未散攻心脾上焦熱躁故口舌生瘡也方升麻散出聖惠方治時氣熱盛口中生瘡川升麻一兩木通銼射干麥門冬去心蘆根羚羊角屑各一兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服大青散出聖惠方治時氣咽痛口瘡煩躁頭重大青一兩黃芩一兩川升麻一兩麥門冬去心一兩梔子仁一兩甘草炙微赤銼一兩上為散每服四錢以水一中盞入竹葉三七片煎至六分去滓不計時候溫服麥門冬散出聖惠方治時氣熱盛昏沉如醉及腹脅痛百節痠疼舌裂生瘡麥門冬一兩去心川升麻三分柴胡一兩去苗赤芍藥三分石膏二兩淡竹葉三分甘草三分炙微赤銼豉二合上為散每服五錢以水一大盞入蔥白二莖煎至五分去滓不計時候溫服治時氣心脾臟熱毒舌裂滿口生瘡出聖惠方川升麻一兩黃柏半兩銼苦竹葉半兩射干三分大青半兩龍膽五錢玄參五錢生乾地黃半兩上為散每服五錢用水一大盞煎至五分去滓入蜜半合攪勻不