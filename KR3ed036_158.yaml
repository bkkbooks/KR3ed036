body:
  text: 卷一百五十八咳嗽門傷風咳嗽附論夫咳嗽之證大概風冷熱損勞風者感外風寒入肺經其證或惡寒或不惡寒或發熱或不發熱或頭痛或不頭痛但暴得之便覺痰壅咳嗽不止脈雖浮盛此則是感風三拗湯金沸草散量證加減與服若服藥不減則是感風未解當與傷寒中發散藥量四時加減出汗乃止方人參膏出經驗良方治大人小兒傷風咳嗽氣粗多涎身熱人參知母黃芩款冬花貝母紫菀杏仁豬牙皂角桔梗荊芥防風甘草各等分上為細末煉蜜成膏丸如皂莢子大每服一丸用好蜜和熟水化下人參荊芥散出醫方大成治肺感風邪上壅咳嗽頭目不清言語不出咽乾項強鼻流清涕皮膚不仁荊芥穗麻黃去根節細辛去土洗桔梗去蘆頭炒陳皮去白半夏湯洗七次杏仁去皮尖人參通草甘草炙各半兩上為散每服四錢水一盞半生薑五片煎八分食後溫服人參訶子丸出和劑方治大人小兒上膈熱或傷風或冷搏於肺經語聲不出痰涎不利咳嗽喘急日夜不止咯唾稠黏縮砂仁訶子去核藿香去梗龍腦薄荷葉各一兩百藥煎葛粉各八兩甘草五兩烏梅肉三兩上為末麵糊為丸每服一二丸含化咽津食後臨臥丁香烏梅丸出三因方治膈氣壅蔽外感風寒咳嗽痰涎白沫胸背痛不能仰口乾咽燥烏梅肉四兩紫蘇木瓜各三二兩茯苓三二兩四錢甘草三兩三錢檀香半兩人參七錢麝香一字上為末用蜜一斤蠟二兩為丸如櫻桃大含化不以時金沸草散出醫方大成治風化痰除頭目昏痛頸項強急往來寒熱肢體煩疼痰涎不利咳嗽喘滿涕唾稠黏時行寒熱壯熱惡風有寒邪則汗出風盛則解利及肺經受風鼻塞荊芥前胡麻黃金沸草甘草半夏赤芍藥各一兩上㕮咀每服三錢水一盞半生薑三片棗子一個煎至七分去滓溫服不以時加荊芥桔梗名五拗湯加桑白皮麻黃乾葛治喘嗽尤效烏梅一個煎頭疼蘇葉陳皮牙疼熟煎含嗽諸經風及大便祕左脅刺疼每料加枳殼一兩去穰風熱結在臟腑煩躁氣壅腹痛大便祕以蔥白研爛微火炒過布上攤尉臍後加大黃朴硝薄荷各五錢服速效諸風發散並用妊婦傷寒頭痛腹疼壯熱心燥加白朮人參黃芩生石膏各一兩熱嗽加甜葶藶馬兜鈴薄荷桑白皮各半兩烏梅四錢就吞半夏丸咽喉焦燥加朴硝五錢食後服傷風咳嗽身不憎寒發熱得之脾胃受寒傳入於肺遂成寒咳嗽甚則吐多白沫而多嘔此當先用溫藥溫其脾胃如治中湯胡椒理中湯丁香半夏丸五嗽丸皆要藥或用理中湯加五味子煎服治上壅熱嗽聲重加炒葶藶半錢薑四片煎服如咽喉焦燥加朴硝滑石食後又治傷風鼻塞涕流壅咳若聲啞嗽不止兼服人參款冬膏紫蘇散出本事方治肺感風寒作嗽紫蘇桑白皮青皮五味子杏仁麻黃甘草各等分上為細末每服二錢水一盞煎至七分溫服杏子湯治冷熱咳嗽不問外感傷寒內傷生冷及虛勞咯血痰飲停積悉皆治療人參去蘆半夏炮茯苓去皮細辛減半芍藥去粉乾薑炮洗甘草炙官桂減半五味子去苗杏仁各等分上㕮咀每服四錢水二盞半同杏仁去皮尖五枚薑五片煎至六分去滓溫服不拘時此藥辛辣其性稍熱若冷嗽則宜服如熱嗽豈宜服服即咳也若感冒風寒而嗽得之加麻黃等分若脾胃實者可加御米殼去筋膜碎銼醋鹽炒等分每服加烏梅一個煎服其效尤妙驗嘔逆噁心不可用此若久年咳嗽氣虛喘急去杏仁人參芍藥加麻黃乾薑五味子各增一半名小青龍湯若感寒加麻黃去根節煎脈息沉緊身熱無汗惡寒嗽者是也又治久年咳嗽痰涎壅盛夜不得睡仍專治腳氣喘急此方雖有麻黃然有官桂不致於發汗服之不妨也一方加麻黃甘草杏仁五味子茯苓等分橘紅倍之名麻黃湯尤為切當又一方用紫蘇葉桑白皮麻黃青皮五味子杏仁甘草等分名平氣飲生薑七片烏梅一個煎服久年咳嗽氣虛喘急皆得其宜二方中有麻黃有汗人不宜服之杏蘇湯一名橘蘇散出醫方大成治傷風咳嗽身熱有汗惡風病證脈浮數挾熱服杏子湯不得者此藥穩當也橘紅紫蘇葉杏仁五味子半夏湯泡七次桑白皮蜜略炙貝母去皮白朮炒各一兩甘草炙半兩上為散每服四錢水一盞半生薑五片煎八分去滓不拘時候溫服寧氣散治肺感風寒咳嗽涎喘麻黃去根節二兩杏仁去皮尖炒三兩石膏一兩半御米殼去蒂蜜炒四兩甘草炒半兩上為細末每服二錢白湯調下食後治傷風咳嗽涕唾稠黏出海上名方天南星二兩搗碎生薑汁和作餅子炙微黃色令乾甘草半兩炙上同為細末水一盞半用藥末二錢生薑五片煎至七分食後溫服白朮湯出鮑氏方治傷風咳嗽痰涎憎寒發熱上氣喘急白朮二兩五味子白茯苓一兩甘草一分半夏四個大者洗分十六片上散分十六服每服生薑五片煎空心服金匱散出江陰方治老少傷風發嗽頭痛日久不瘥天南星半夏各二兩上為末水浸兩伏時日換水十次取出陰乾每服二錢又以烏頭附子各六錢合勻以生蔥薄荷湯下大人半錢孩子一分不以時服八寶散出衛生家寶方治傷風咳嗽麻黃半兩去節桔梗半兩馬兜鈴半兩罌粟殼半兩甘草炙半兩五味子半兩陳皮半兩桑白皮半兩上為粗末每服三錢用水一盞薑三片杏仁三粒去皮尖白糖一塊煎至七分去滓食後臨臥服加減三拗湯出朱氏集驗方治傷風咳嗽麻黃半錢不去節杏仁不去皮苦梗各二錢甘草生旋覆花去蒂各半錢上㕮咀每服一大錢水一盞生薑五片五味子數粒竹葉一片不可多糯米數粒煎至半盞分作兩服食後溫服暴咳嗽附論夫肺感於寒微者即成咳嗽蓋肺主皮毛寒傷膚腠則肺先受之其狀咳嗽語聲嘶破咽喉不利也肺主於氣通於皮毛若人血氣不足腠理開疏或觸冒風寒為邪所中或運動勞役汗出傷風邪冷之氣忽伏於肺故令暴咳嗽也方杏仁湯治大人小兒中冷咳嗽或上氣喘逆或惡寒鼻出清涕杏仁去皮尖雙仁者麩炒研紫菀去苗土黃芩去黑心當歸切焙甘草炙銼麻黃去根節桂去粗皮陳橘皮湯浸去白焙各半兩木香一分大黃銼炒一兩半上為散每服三錢水一盞煎至七分溫服小兒以意加減又方一名杏仁煎出千金方治傷肺暴嗽失聲語不出杏仁薑汁沙糖蜜各一升五味子紫菀各三兩通草貝母各四兩桑白皮根五兩上㕮咀以水九升煮取三升去滓納杏仁脂入薑汁蜜糖和攪微火煎取四升初服三合日再夜一後稍加阿膠飲出朱氏集驗方治暴嗽一服便安阿膠二片火炙生薑十小片大烏梅二枚捶甘草五寸用上等紫蘇一兩杏仁七枚去皮尖大半夏三個湯泡罌粟殼一枚去瓤並蒂上用水一大碗煎六分去滓任意服之不拘時臨睡服尤佳貝母煎出聖惠方治暴發咳嗽胸膈不利痰涎喘急貝母去心紫菀去苗土杏仁去皮尖雙仁麩炒研桑根白皮各一兩五味子百部甘草炙白前各半兩上銼用水七盞煎四盞去滓入生地黃汁五合麥門冬汁白蜜各三合酥二兩銀石器內慢火煎成煎貯不津器內每服一匙隨時含化咽津貝母湯出御藥院方治暴發咳嗽久不愈貝母去心桑白皮銼五味子甘草炙銼各半兩知母一分款冬花二兩杏仁去皮尖麩炒三兩上為散每服四錢水一盞入生薑五片煎至六分去滓食後溫服之感通湯治暴感風邪咳嗽甘草炙銼麻黃去根節芎藭馬兜鈴防風去叉各一兩黃明膠炙燥三錢上六味共為散每服二錢水一盞煎至七分去滓早晚食後溫服延年貝母煎主暴熱咳嗽貝母三兩紫菀五味子百部根杏仁去皮尖兩仁研甘草炙各二兩上切以水五升煮取二升去滓和地黃汁三升麥門冬汁一升白蜜五合好酥二合生薑汁一合又先取地黃麥門冬及湯汁和煎減半納酥薑汁攪不得停手又減半納蜜煎和稠黏糖煎成取如棗大含咽之日三夜再蔣孝璋方忌海藻菘菜咸物貝母湯治傷風暴得咳嗽貝母去心三分款冬花麻黃去根節杏仁湯浸去皮尖雙仁炒研各一兩甘草炙銼三分上為散每服三錢以水一盞薑三片煎至七分去滓溫服不拘時三拗湯出和劑方治冬月感冒風邪鼻塞聲重語音不出傷風傷冷寒氣暴嗽痰喘頭痛目眩四肢拘倦胸滿氣短麻黃不去節杏仁不去皮尖甘草不炙上件等分㕮咀每服五錢水二盞煎至八分熱服以被蓋覆而睡更加五味子等分尤妙一方用薑煎飴糖煎出肘後方治暴嗽飴糖乾薑炮為末各一兩半豉一兩上分作兩劑每劑先以水二盞煮豉取沸去滓次入飴糖待消後入乾薑末攪勻以瓷器盛分為十服沸湯化下桃仁方出肘後方治猝得咳嗽用桃仁三升去皮杵貯器中密封之蒸一次日乾絹袋盛次納二斗酒中六七日可飲四五合稍增至一升一方麩炒桃仁令黃兼治膈氣壅滯治猝咳嗽胸膈不利病人齒無色舌上白喜睡不知痛癢或下痢急治下部不曉此乃但攻其上不以為意下部生蟲食其肉爛見五臟便死出聖惠方豉一兩乾薑半兩炮裂銼杏仁一兩湯浸去皮尖雙仁炒上為散以水三大盞煎至一盞半去滓納飴糖一兩更煎令化分為三服一日服盡又方一名杏仁膏出十便良方治肺寒猝咳嗽杏仁一兩湯浸去皮尖雙仁炒研如膏甘草一分炙微赤桂心半兩上為末煉蜜為丸入杏仁同研如半棗大不拘時以綿裹一丸含咽下以瘥為度治暴嗽出本事方白礬一兩細研砒霜一錢上先將砒霜安放茶盞底卻將礬末鋪蓋火煅為末烏梅肉丸如緑豆大硃砂為衣每服二丸紫蘇湯下大白丸治大人小兒暴嗽石灰一兩蛤粉四錢上為細末湯浸蒸餅和丸如豌豆大焙乾每服二十丸溫齏汁下小兒服七丸至十丸早晚食後臨臥服伏龍肝丸治暴嗽伏龍肝半兩豉一兩半上同炒搗羅為末煉蜜丸如梧桐子大每服四十丸米飲下治猝得咳嗽出肘後方用豬腎二枚細切乾薑三兩末水七升煮二升稍稍服覆取汗又方出肘後方椒一二百粒搗末之杏仁二百枚熬之棗一百枚去核上合搗令極熟稍稍合如棗許大每服二三枚又方出肘後方生薑三兩搗取汁乾薑屑三兩杏仁一升去皮熬上合搗為丸每服三丸日五六服又方出肘後方用芫花一升水三升煮取一升去滓以棗十四枚煎令汁盡每日食之三日愈治猝咳嗽肺壅痰滯上焦不利出聖惠方杉木屑一兩皂莢三二兩去黑皮酥炙黃去子上為末煉蜜和丸如梧桐子大每服以粥飲下十丸日三四服之治猝咳嗽日夜不止出聖惠方杏仁五兩去皮尖雙仁者炒生薑二兩去皮切上為細末煉蜜丸如梧桐子大每服以粥飲下二十九丸治肺寒猝咳嗽出聖惠方細辛半兩搗為末杏仁半兩湯浸去皮尖雙仁麩炒如膏上件藥於鐺中熔開蠟半兩次下酥一分入細辛杏仁丸如半棗大不拘時以綿裹一丸含化咽津又方出聖惠方桂心半兩附子一兩炮裂去皮臍上為末煉蜜和丸如半棗大不計時以綿裹一丸含津咽下治猝暴嗽久咳出肘後方用芫花二兩熬水二升煮四沸去滓納白糖一斤服如棗大勿食鹹酸物又方出肘後方治猝得咳嗽用生龜三個治如食法去腸以水五升煮取三升以漬曲釀米四升如常法熱飲二升令盡此則永斷百部根方出鮑氏方治暴嗽用百部藤根二兩搗自然汁和蜜等分沸煎成膏子咽之一方日三服粥飲調下浮石丸出肘後方治暴嗽上以浮散石二兩為末煉蜜和丸如梧桐子大每服以粥飲下十丸日三四服又方治猝得咳嗽用烏雞一枚治如食法以好酒漬之半日出雞服酒一云苦酒一斗煮白雞取三升分三服食雞莫與鹽食訶黎勒含化方治暴嗽用訶黎勒生去核一枚拍破含之咽津次煎檳榔湯一盞投之療猝咳嗽釜月下土一分豉七分熬上熬搗蜜丸如梧桐子大米飲服十四丸又方治猝嗽生薑汁百部根汁上煎服三合一方單用百部根四兩酒一升漬再宿火暖服一升又方溫清酒一升驢膏一升上服之以療上氣二白丸治暴嗽立效方白善粉一兩白礬一兩上為細末每用生薑汁為丸如梧桐子大每服二十丸臨臥薑湯下立安散治暴嗽神效皂角一條不蛀者去黑皮並子江子三粒去殼去油半夏三粒杏仁三粒去皮尖炒焦黃色上每服半錢生薑汁調放手掌中口餂吃立效忌炙爆油膩物治暴嗽不愈煙筒方雄黃一錢木鱉一個去殼上用瓷鉢內研細雞子清調成膏攤紙上用紙如筆管火燒煙吸入口中以冷茶清咽下治猝得咳嗽方以飴糖雜生薑屑蒸三斗米下為丸如彈子大日夜食後三度服白前散治暴嗽心肺氣壅胸膈煩痛四肢無力白前三分杏仁半兩湯浸去皮尖雙仁炒紫菀半兩去苗土桑白皮三分甘草半兩炙微赤銼麥門冬一兩去心紫蘇葉三分陳橘皮三分湯浸去白瓤上為散每服三錢水一中盞入生薑半分煎至六分去滓不拘時溫服治猝嗽用百部根酒漬再宿大溫服一升日再又方上用梨去核納用酥蜜麵裹燒令熟食之又取梨肉納酥中煎停冷食之又搗汁一升酥一兩蜜一兩地黃汁一升緩火煎細細含咽凡治嗽皆須待冷喘息定後方食熱食之反傷矣令嗽更急不可救如此者可作羊肉湯餅飽食之便臥少時治暴嗽以百部根懸火上炙乾夜取四五寸細切含咽下勿令人知甚良痰嗽附論夫秋傷於濕冬必咳嗽大抵素秋之氣宜清而肅反動之則氣必上衝而為嗽甚而動之於脾濕發而為痰也寒少而熱多假令濕在肝經謂之風痰濕在心經謂之熱痰濕在脾經謂之濕痰濕在肺經謂之氣痰濕在腎經謂之寒痰宜隨證而治之咳而無痰者以辛甘潤其肺咳而有痰者治痰為先故從南星半夏勝其痰而咳嗽自愈也方藿香半夏散治肺和胃祛痰除咳嗽建中通暢三焦進飲食藿香葉官桂各一兩半夏曲陳皮去白蒼朮洗各半兩乾薑三分厚朴三分薑製皂角十梃火煅令煙絶甘草一分上為散每服三錢水一盞半生薑三片煎至八分不拘時服傷風頭痛壯熱噁心以生薑蔥或薑棗煎湯溫服聲音不出用生薑入油煎蔥頭二三枝同煎立效沉香降氣丸治痰飲咳嗽肺受風寒心火上炎風熱相搏致令風熱痰生氣不升降此藥並宜治之喘加杏仁嗽加半夏尤奇沉香人參當歸酒浸焙白芍藥川芎枳殼陳皮白朮焙白茯苓茯神甘草炙去皮各一兩熟地黃酒浸二兩白豆蔻蓽茇各五錢牛膝酒浸焙二兩半天門冬去心麥門冬去心各二兩五味子一兩半上為細末用地黃天門冬麥門冬三味為膏糊丸如梧桐子大每服五十丸至七十丸鹽湯或蜜湯或溫酒送下空心服之大降氣湯出醫方大成治上盛下虛膈壅痰實喘嗽咽乾不利紫蘇子微炒川芎細辛去葉土前胡當歸洗焙厚朴去皮薑製桔梗去蘆白茯苓去皮半夏曲炙陳皮去白肉桂去皮甘草炙各等分上㕮咀每服三錢水一盞薑五片紫蘇五葉同煎溫服九寶湯治痰嗽薄荷貝母橘紅甘草紫蘇杏仁檳榔麻黃半夏桑葉烏梅官桂各等分上用水二盞煎至一盞薑五片食後服養肺湯出直指方治肺壅上氣痰嗽人參紫菀赤茯苓杏仁不去皮貞蘇子陳皮桑白皮炙款冬花半夏曲北梗甘草炙各等分上為粗末每服三錢薑四片烏梅半個食後煎服寒者加桂大人參半夏丸出御藥院方治化痰墜涎止嗽定喘諸痰嘔吐痰逆痰厥頭痛風氣偏正頭疼風壅頭目昏眩耳鳴鼻塞咽膈不利心腹痞滿筋脈拘倦肢體麻痹疼痛中風偏枯咳唾稠黏肺痿勞虛人保養宣通氣血調和臟腑進美飲食人參茯苓去皮天南星薄荷葉各半兩半夏乾生薑白礬生寒水石各一兩蛤粉二兩藿香葉半兩上為末麵糊丸如小豆大生薑湯下二三十丸食後服溫水下亦得一法加黃連半兩黃柏二兩水丸取效愈妙治酒病調和臟腑尤宜服之一方無半夏潤肺丸出御藥院方治肺氣不利咳嗽痰實咽喉乾燥栝蔞二個去皮寒水石二兩燒鴨梨二個去皮及子皂角三錢去皮弦並子捶碎用半夏天南星枯白礬各一兩半生薑三兩同半夏天南星炒乾麻黃二兩去節同栝蔞鴨梨皂角四味一處用河水一升浸少時銀石器內熬成膏為用上為細末用煎膏為丸如梧桐子大每服五七十丸溫生薑湯送下異功丸出御藥院方升降陰陽逐痰飲治咳嗽喘逆痰實昏眩調和氣止渴半夏大腹子人參赤茯苓各一兩甘草炙白朮紫蘇葉各半兩生薑五兩加烏梅肉半兩上除生薑外並搗為粗末生薑和同皮銼碎與藥末同和杵勻和丸雞豆大每服一丸捶破入紫蘇連莖五葉烏梅一個水一大盞半同煎至一盞去滓溫服利膈丸一名人參利膈丸出醫方大成主胸中不利痰嗽喘促脾胃壅滯調祕瀉臟推陳致新消進飲食治利膈氣之良藥也木香一錢半檳榔一錢半人參三錢當歸二錢藿香一錢半大黃酒浸焙一兩厚朴制二兩枳實一兩甘草炙五錢上為細末滴水和丸或蒸餅少許亦可如桐子大每服三五十丸食後溫水下治痰嗽咽喉不利出本草上取隨風子含三數枚殊勝隨風子即訶子其子未熟時風飄墮者謂之隨風子曝乾收之治痰唾咳嗽出本草取杏仁去皮熬令赤和桂末研如泥綿裹如豆大含之治痰嗽除痰飲出本草取鹽麩子干搗為末米飲服之人參飲出直指方治咳嗽痰壅通用人參北梗半夏曲五味子細辛枳殼制赤茯苓杏仁不去皮各一兩甘草炙半分上細銼每服三錢薑五片烏梅半個食後煎服一方無杏仁不用烏梅煎服痰嗽加紫菀添甘草蠟煎散出醫方大成順肺氣利咽膈止咳嗽化痰涎款冬花紫菀洗去土焙乾甘草炙各三分五味子炒半兩桑白皮炒桔梗杏仁湯浸去皮尖麩炒紫蘇葉各一兩上為粗末每服四錢水一大盞黃蠟少許同煎至七分去滓食後臨臥溫服八味款冬花散出醫方大成治肺寒熱不調涎嗽不已款冬花洗焙紫菀茸五味子甘草炙各七錢半桑白皮炒麻黃去節杏仁湯洗去皮