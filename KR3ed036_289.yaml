紙貼之更用酒調二錢服之五靈脂散治發背五靈脂半兩烏賊魚骨去甲一兩上為散凡患者初覺時以水調掃腫處如已大作者入醋面同調敷之龍葵根散治發背成瘡癰疽成瘡者龍葵根銼一兩麝香研一分上先將龍葵根搗羅為末入麝香同研令勻水調塗於瘡上金粉膏治發背癰疽瘡錫四兩用板瓦盛炭火安錫在上扇之候煅成灰研末密陀僧四兩入罐子內以盞子蓋口鹽泥固濟勿令透氣用炭火煅不聞藥氣為度取出放冷上同研極細量瘡大小臨時入膩粉少許以雞子黃調如膏攤在瘡上以緋帛蓋乳香貼方治發背乳香研黃蠟好者上等分同入銚子熔化瀉入水內斟酌瘡大小取劑在於火上熔化攤於帛上或紙上貼之不住以手按令著肉為止此藥易干故也一日三易腫消痛止如已有頭欲破者亦漸縮減麥餅方一名甘草膏治發背崔元亮海上祕方李北海云此方神授極奇大麥一升炒熟一法用九兩大麥面甘草生用三兩上為末用好醋少許和勻微有醋氣仍以百沸湯拌和作餅劑方圓大小如瘡腫大熱敷之以油單並故紙密裹勿令通風冷即換之常須吃黃耆米粥甚妙如已成膿自出未成內消一方用酥少許不用醋百草霜膏治發背癰疽及一切瘡熱痛不可忍者百草霜生蠐螬等分上同研細貼之如冰痛即止治癰諸疽發背或髮乳房初起微赤不急治之即殺人取母豬蹄兩隻通草六分以綿裹和煮作羹食之治發背瘡消癰腫拔毒以五月六月採曲節草莖葉陰乾與甘草作末米汁調服治發背初覺宜服黃牛乳二大盞秦艽二兩去苗銼上藥相和煎至一大盞去滓分溫三服當時快利為效治發背方用亂髮灰酒服方寸匕亦治瘭疽又方用豬脂敷上日四五度亦治發亂救急方云取豬羊脂切作片冷水浸貼上暖易之五六十片瘥若初貼時少許即寒寒定好眠甚妙又方用三年醋滓微火煎令稠和牛脂敷上又方用豬狗牙燒灰醋和敷上日三四易又方用燒古蚌灰雞子白和敷之日三四易又方用飲鐵漿二升取利又方用蛇頭灰醋和敷之日三易一方水和敷之又方用燒鹿角灰醋和敷之日四五易治發背欲死取冬瓜截去頭合瘡上瓜當爛截去更合之瓜未盡瘡已斂小矣即用膏養之背疽摻藥方李氏云龍遊有患背疽已潰如碗麵大視五臟僅隔膜耳自謂必死有用大鯽魚一枚去腸臟以羯羊糞實其中烘焙焦黑極乾燥為細末干糝之瘡口遂收至今無恙此出洪氏方屢有效故附於此須候膿少欲生肌肉時用之治發背諸惡瘡痛不可忍方用糞缸底上青泥取出陰乾為細末用新水調敷其痛立止治發背用亂髮露蜂房蛇皮燒灰存性調敷一錢神效金針散治發背用皂莢針春時取一半青一半黑者不拘多少曝乾搗羅為散先任意飲食訖用藥三錢酒調服之立瘥未退再服黃石散治發背瘡昔楊愔患背腫馬嗣明以煉石塗之便瘥用粗理黃石如鵝卵大猛火煅赤投醋中因有屑落醋中復煅投石盡為度取屑曝乾搗散以醋調敷背上即愈也北齊馬嗣明以此方醫楊遵彥背瘡效劉禹錫謂之煉石法用之敷瘡腫無不愈者桃花汁治發背瘡癰疽用桃花不拘多少於平旦承露採取以釅醋研絞去滓取塗敷瘡上有蟲即出無花但桃葉亦得以臘月豬脂和塗亦佳治發背瘡腫方用白麵取泥拌和圍腫四畔令童子七人尿圍中浸腫處即瘥又方用新馬糞一味厚塗腫上干即易之亦療髮乳又方用益母草一味爛搗絞汁三合服之滓敷瘡上熱即易之硝石拓方治發背赤焮疼痛用硝石五兩湯一斗浸硝待冷取故青布兩片更漬浸拓日三五度薜荔散治發背神效用薜荔葉一味不拘多少陰乾搗羅為散每服三錢水一盞煎至七沸溫服更用葉煎湯洗甚妙一方治背癰和蜜飲數升滓敷瘡上後以他藥敷貼遂愈昔宜興縣張渚鎮有一老舉人聚村學年七十餘忽一日患發背村中無他醫藥急取薜荔枝葉爛研絞汁和蜜飲數升以其滓敷瘡上後以他藥敷貼遂愈醫者云其本蓋得薜荔之力乃知圖經所載不妄又方以薜荔葉乾末敷之下利即愈又方用糯米不拘多少炒熟細研以井花水調塗四面干即易之又方用木芙蓉葉自落者經霜然後收之碾末淡醋調於掌上如青苔色為妙絹帛塗貼瘡上一方治軟癤用鹽水調搽治發背初覺腫痛方用赤小豆一味搗羅為末和豬膽汁塗之干即易治發背及一切熱瘡腫方用蕓薹一握切和酥炒熱敷瘡上冷即易日三度單用蕓薹葉敷亦可治背瘡取戶邊蜘蛛杵以醋和先針四畔令血出根稍露用藥敷干即易旦至午拔根出大有神效治發背用金星草不拘多少搗為末冷水服方寸匕及塗瘡上亦效彼人用之往往皆驗又方用葉連根半斤挫以酒五升銀器中煎取二升五更初頓服丹石藥毒悉下並治癰腫結核衍義曰不惟下所服石藥兼毒去瘡愈如不飲酒以新汲水調服以知為度療發背神驗法取牡狗白糞五升凡覺欲作時以溫水一碗絞取汁分再服仍以滓敷上每日再為之瘥止治發背欲死方用伏龍肝為末以酒調厚敷其上瘡口乾即易不日平復治發背用蝸牛一百枚活者一升淨瓶入蝸牛用新汲水一盞浸瓶中封緊自晚至明出蝸牛放之其水如涎將真蛤粉不拘多少水調旋敷以雞翎掃之瘡上日用十餘度其熱痛止瘡便愈治發背用白蘞不拘多少為末水調敷之良治發背欲死用人屎煅作灰用醋和如泥敷腫處干即易之良治發背疑似者須便服此用秦艽銼以牛乳煎服當得快利三五行即瘥治發背用地松一升杵汁服之日再服以瘥止治發背欲死用雞腸草搗爛敷之良治發背初得毒腫焮熱赤痛用水萍不拘多少爛搗和雞子清貼之甚良治發背癰疽用生菖蒲搗貼若瘡干搗末以水調塗之治發背用石葦葉於二月七月採陰乾炒末冷酒調服甚妙治發背瘡取白馬齒燒灰先以針刺瘡頭開即以灰封以濕面周腫處後以釅醋洗去灰根出治發背頭未成瘡及諸熱毒腫用水煮青竹筒角之掘地作坑貯水臥以腫處當坑子上角之如緑豆大戢戢然出不止遍匝腰肋治發背方用草決明生用一升搗碎生甘草一兩重亦切碎水三升煮取一升溫服分二服大抵血滯則生瘡肝為宿血之臟而決明子和肝氣不損元氣也洗發背瘡用五倍子杏仁豬懸蹄白芷蓮房荊芥蔥頭細茶葉好者煎湯洗療發背取蔚臭草搗取汁服一雞子滓封上熱即易之療發背及諸瘡久不瘥有效方先以甘草湯洗瘡裛拭極干乃嚼胡麻敷上干即易從旦至日西去胡麻乃取黃連末滑石末中半相和以敷瘡上數數易明日又依前敷胡麻及黃連等末更不須洗瘡不過六七日即瘥必效治發背疽瘡臁瘡瘰癧腦疽用地蜘蛛取山豆花根日中曝乾為末初覺腫痛將此藥用津液調塗於上用膏藥紙封貼大效治發背已結成膿栝蔞塗方用生栝蔞根細銼搗研如糊塗之日三五度即瘥一方為末苦酒和敷治發背初覺腫痛不知定處以濕紙貼之先干處即是若病根多速覓水蛭濕令入病處食血數易甚良治一切癰腫及發背疼痛不可忍但未成膿者用甘草一兩微炙搗碎水一大升浸之器上橫一小刀子置露中經宿平明以物攪令沫出吹沫服之但是瘡腫發背皆可服一方用生者為末酒調二錢匕頻服王中奉虔服之得效治發背已發未結成已結成未潰用牛皮膠二兩酒二升生甘草一寸同煮候牛皮膠溶化放溫令病者徐徐飲盡如未結成即消已結成則易潰已潰則易瘥如未效再用必效治發背癰疽一切毒瘡瘡口大窟用臘月干桑葉不拘多少碾為細末以新汲水調塗瘡上如瘡有膿血即干糝用之如瘡在腳膝間敷藥了用帛子裹之神效一方煎湯皆可用治發背其瘡臨發之時用萆麻子一合剝去皮用白膠香一處搗細攤紙上放寬大貼了方才發則散已成者即潰言已見效治發背以不耕之地遇野人糞為蟲鳥所踐處即以杖去糞取其下土篩以敷之即如冰著背也治背瘡熱腫取蕺汁蓋之瘡上開孔以吸熱毒冷即易之瘥治發背初發已成口未成口用牛耳楓樹根其葉小而三叉葉上無毛而光者酒擂濾滓飲酒以滓塗瘡仍服乳粉內托散犀角丸治一切癰腫及發背疼痛不可忍但未成膿者方見小犀角丸羚羊角散內消發背方見大全內消散糯米膏治發背疽毒一切惡證糯米先洗七次絹袋挂當風二七日炒一斗紫河車去皮毛生用根赤者不用白者五兩五倍子瓦燥之五兩白蘞真者如白蘿蔔干色白味苦甘二兩黃柏皮炒焦五兩黃芩炒乾五兩白芨生二兩當歸酒浸焙乾二兩上為末酸醋調入瓶時取敷患處若已成欲破加白丁香雀矢尾直起者鳥尖為末和上藥點頭上卻用不加之藥敷四畔內服白朮黃耆三兩蜜炙木香當歸各一兩為末酒下二錢病在四肢食後服膈上眠時膈下空心服之祕傳神效治發背瘡云凡發背者自內而外也熱毒中膈上下不通所以蒸背上虛處先三五日隱脈妨悶即漸成膿見出皮膚結聚成膿也其方如後白麥飯顏色黃白類麥飯者曾作磨尤佳炭火燒紅醋中浸之十次為末白蘞末與上等分鹿角二三寸截之不用自脫者凡帶腦骨者即非自脫炭火燒灰盡為度碾羅為末倍前二味上並搗細末取多年米醋鐺中煎令魚眼沸即下前件藥末調如稀餳以篦子調敷腫上只當瘡頭留一指地面勿令合以出熱氣如未膿當內消若已作頭當撮小若日久瘡甚肌肉損爛筋骨出露即布上塗藥貼之瘡上干即再換但以膈中不惡無不瘥切忌手傷宜慎之此方東坡先生具載得效姓名甚多茲不多述惟後之用藥君子當信先生之説故豫不敢私祕其良方也白散子治發背候取下毒物次用清涼膏貼之白附子大香附子各半兩半夏一分薑製黑牽牛二兩半生半炒令熟大甘遂一分以大麥炒侯麥黃赤色去麥不用次以極慢火炒之上為末量患人虛實加減每服二錢以蜜酒調下續飲溫酒一兩盞候所苦處刺痛為度微利三五行瀉出惡物即瘥次用膏藥貼之氣盛者一服二錢余更裁度清涼膏治發背等先用白散子取之次用此藥貼之川當歸二兩香白芷木鱉子肉白芨芍藥黃柏白蘞各一兩乳香另研膩粉各少許白膠少許黃丹五兩上用清麻油十兩煎上七味候紫色去之入槐柳枝各七寸再煎少頃又去之入黃丹五兩熬成入乳香等重綿濾入罐子內貯之用如常貼治發背一切癰疽金石藥毒發上用紫背車螯大者鹽泥固濟火煅通紅放冷研為極細末地上出火毒一宿以甘草膏子丸如梧桐子每服三五十丸甘草湯下日進三服第三日取下惡物用後藥貼之貼瘡白膏藥上寒水石不拘多少火煅通紅入瓷器中封口令密沉井中一宿取出研極細以臘月脂和膏稀稠得所自瘡赤盡處塗之闊一指許上以薄紙為花子中心留一孔貼定漸次赤退即迤邐移近里至愈紅花孔子外所留紙令與所留藥闊狹等沉香散治發背止燥渴疼痛內消毒氣赤小豆一合人參一兩甘草瞿麥黃芩黃耆各一兩銼白蘞半兩當歸一兩細銼炒沉香一兩上為細末溫水調下二錢不計時候日二三服車螯酒治發背癰疽車螯殼一二個泥固濟火煅過為細末燈心三十莖蜜一大匙栝蔞一個上碎剝栝蔞用酒一升以下煎三味微熟調車螯末二大錢不過兩服痛止治發背髮乳癰疽等一切毒瘡穿山甲一兩用土炒成彈子塊白丁香淘去沙淨取半兩上為細末每服二錢用麝香酒調下治發背湯壽資云光州有人患腎癰大小便皆閉甚以為苦本州胡判官令以明淨牛皮膠炭火上燒成黑灰研極細每服五錢以米飲調下服至二兩許方通所下皆穢惡物癰腫遂消不復出膿胡云凡瘡腫皆可服不拘多少以臟腑通利為度閻資欽録壽州霍丘醫瘡人元立治瘡甚有聲元符己卯豫侍先子將漕江東舟次壽州豫因纍日食雞卵數十枚暴得咽喉腫塞及頸赤腫硬下連心胸如鐵石日久號叫喉中水米不通壅塞將死召醫者視之云此喉癰也泛泛藥恐無益因言可招元立治之必愈先子夜遣介兩日往還數百里召立至用藥數服得效報之頗厚立感激豫自傳治發背方四首皆纍用有奇功今録於下一醉膏治發背癰疽一切惡瘡當先用托裡藥使毒氣皆出凡初覺發背癰疽等即多服用大黃甘草等藥極疏轉以行結毒次用此藥大甘草半兩為粗末沒藥一分研栝蔞一個大者去皮上用無灰酒三升熬至一升放溫頓服之如一服不盡分三兩服連服盡收暈白玉膏切忌用冷藥外貼必逼毒氣入內殺人杏仁二十粒去皮尖川椒四十九粒去目為末清脂麻油一兩酒臘半兩白者上同熬至紫黑新綿濾過用無灰薄紙看瘡大小剪作梳樣攤藥在上於瘡暈盡處兩邊圍繞貼之候暈漸收近里即別剪差小者再攤藥為圍貼暈又收即又再移近里貼仍頻換候暈已收見瘡根腳或瘡口即用次方凡貼大惡瘡毒氣方盛不可以藥當上貼恐趕散毒氣瘡益大暈收見瘡次用檳榔散雞心檳榔半兩川黃連去須半兩穿山甲大者十片燒灰存性上同為細末先用好臘茶清掃過瘡用藥厚敷瘡上日三五次以膿出為知如見瘡口後用此藥數次了可更用乳香膏膿已出用生肌藥黃狗腦蓋骨二兩燒灰存性膩粉一錢桑白皮末一兩上同為細末用油調塗瘡上以上四方是一宗元立自云少年時初得此方救十餘人後忽自病背瘡自信其藥乃以此四藥自治得愈袒背示豫瘢痕猶盈尺也豫在汝州時梁縣吏人侯昱孝母病背瘡豫用此治之愈揚州楊吉老醫名甚著某郡一士人狀若有疾厭厭無聊莫能名其何等病苦往謁之楊曰君熱證已極氣血消鑠且盡自此三年當以背疽死不可為也士人不樂而退聞茅山觀中一道士醫術通神但不肯以技自名未必為人致力士人心計較竊衣童僕之服詣山拜之願執薪水之役於席下道士喜留置弟子中誨以經書晝夜只事左右頤指越兩月覺其與常隸別呼叩所從來始再拜謝過以實白之道士笑曰世間那有醫不得的病汝試以脈示我才診脈又笑曰汝便可下山吾亦無藥與汝但日買好梨吃一顆如生梨已盡則以乾者泡湯飲之仍食其滓此疾自當平士人歸謹如其戒經一歲往揚州吉老見之驚其顏貌腴澤脈息和平謂之曰君必遇異人不然豈有痊安之理士人以告吉老立具衣冠焚香望茅山設拜豈自咎其學之未至耶又北夢瑣言載醫者趙鄂云一朝士疾危或謂只有一法請剩吃消梨不限多少如咀嚼不及捩汁而飲或希萬一用其言遂愈此意正同大凡有背疽之人難於隱几但用緑豆十數斗作一大袋隱伏則自然心涼身體安穩得以盡心服藥將息也治發背及癰疽惡瘡腫核如初覺皮肉間有異知是必作瘡者皆炙之切大蒜如銅錢厚片安腫頭上炷艾灸之不計炷數其人被若初覺痛者以痛定為準初不覺痛者灸至極痛而止若蒜焦即易前後用此法救人無不應者若是疣贅之類亦如此灸之便成痂自脫其效如神乃知方書之載無空言但患人不能以意詳之故不得盡應耳抵聖散治發背癰疽及一切瘡癤腫毒栝蔞四兩去皮何首烏四兩大山慈菰二兩甘草節二兩地榆二兩沒藥一兩乳香半兩麝香一錢別研上為細末每服三錢溫酒調下連進二服便住痛一日三服治發背頭未成瘡及諸熱毒以濕紙拓上先干處是熱氣衝上欲作瘡子便灸之如先疼痛灸即不痛如不知痛即以痛為度治癰腫發背以千金藤煎服發背潰後附論夫發背病者由寒氣客於經絡折於氣血血澀不通乃結成發背膿出之後眼白晴青黑而眼小一逆也服藥而嘔二逆也傷痛渴甚三逆也膊項中不便四逆也音嘶色脫五逆也皆不可治其餘或熱渴利嘔非倉卒之急也可得漸治凡發背則熱氣流入腑臟膿潰之後血氣則虛腑臟積熱渴而引飲飲冷入於腸胃則變下利胃虛氣逆則變嘔也嘔逆若遇冷折之氣不通則噦也其瘡若膿汁不盡而瘡口早合雖瘥更發惡汁連出則變成瘻也方玄參散治發背潰後膿血不止漸漸瘡大疼痛身體壯熱玄參二兩黃耆二兩銼露蜂房一兩微炒地榆二兩銼白蘞一兩赤芍藥二兩黃芩二兩川升麻一兩漏蘆一兩梔子仁一兩桑根白皮二兩銼川大黃三兩銼碎微炒川芒硝三兩上為散每服四錢水一中盞煎至六分去滓不計時候溫服連翹散治發背潰後排膿解毒消腫退熱止痛連翹前胡去蘆頭人參去蘆頭赤芍藥薺苨桔梗去蘆頭玄參黃芩甘草生銼防風去蘆頭赤茯苓各一兩桑根白皮一兩半黃耆二兩銼上為散每服四錢水一中盞煎至六分去滓不計時候溫服蓯蓉膏治發背癰疽已潰不生肉暖肌干瘡肉蓯蓉去皺皮半夏生銼熟乾地黃各一兩當歸蜀椒去目並閉口者炒出汗細辛去苗葉烏喙去皮蛇銜草白芷甘草桂去粗皮各半兩薤白七莖豬脂一斤上除豬脂外銼碎以醋半升拌藥一宿先熬脂令沸次下諸藥煎候白芷赤黑色漉出綿濾瓷盒盛取塗瘡上日三次立效當歸湯治發背先穿破出膿水不住傷外風冷毒焮痛淋洗方當歸銼焙甘草炙銼芍藥葛根銼細辛去苗葉黃柏去粗皮麻黃去根節苦參白芷桂去粗皮蜀椒去目並閉口者炒防風去叉各一兩上粗搗篩以水六升煎取三升濾去滓溫洗瘡上日再黃耆湯治發背已潰去膿汁理虛勞內補黃耆細銼麥門冬去心焙各一兩熟乾地黃焙人參甘草炙銼各三分白茯苓去黑皮當歸銼焙芍藥芎藭桂去粗皮遠志去心各半兩上粗搗篩每服三錢水一盞入生薑半分拍碎棗二枚擘破同煎至五分去滓空心溫服日晚再服一方有五味子漏蘆散治發背瘡潰後膿水不止漏蘆連翹梔子仁黃芩黃耆銼防風去蘆頭石葦去毛人參甘草生銼犀角屑各一兩上為粗散每服四錢水一中盞煎至六分去滓不計時候溫服貝齒散治發背潰後膿水不盡宜服排膿止痛貝齒黃耆銼當歸赤芍藥生乾地黃黃連去須川升麻桂心各三分犀角屑一分半甘草半兩生銼上為細散不計時候以溫水調下二錢連翹飲治癰疽發背瘡腫或已潰或未潰連翹山梔子仁黃耆銼炒防風去叉升麻羚羊角鎊漏蘆去蘆頭甘草炙銼大黃銼炒枸杞根皮各一兩上粗搗篩拌令勻每服五錢水一盞半煎取八分去滓空心溫服白石脂湯治發背已潰痢下不住白石脂炮龍骨炮各一兩當歸銼焙桔梗銼炒各半兩葳蕤白頭翁各一兩黃連去須半兩乾薑炮裂甘草炙銼各三分上粗搗篩每服三錢水一盞煎至五分去滓空心溫服日午夜晚各一服露蜂房散治發背潰後毒氣未散膿不絶露蜂房二兩燒灰亂髮灰一兩蛇皮灰三分赤小豆二兩炒熟川大黃三兩半銼碎微炒玄參一兩半子芩二兩半川芒硝三兩半上為細末每服二錢煎黃耆湯調下不計時候生肌散治發背潰後膿水不絶托裡方川芎二兩黃耆二兩銼白芷半兩赤芍藥桂心三分人參半兩去蘆頭丁香半兩當歸一兩上為散每服二錢粥飲調下黃耆散治發背膿血穿潰後痛楚不可忍黃耆一兩銼人參一兩去蘆頭桂心三分當歸半兩赤芍藥一兩甘草三分生銼生乾地黃三分上為散每服四錢水一中盞煎至六分去滓不計時候溫服麒麟竭散治癰腫發背惡瘡生肌後用力勞動胬傷出血不止麒麟竭半兩黃連三分檳榔半兩黃柏半兩銼白芨半兩訶黎勒皮一分上為細散雞子白調塗瘡口上以白薄紙貼之藥干即換忌用力勞動療背瘡定訖令生肌方麝香二錢棗皮灰半兩生麻油六合上依法和用火重湯上煎十餘沸稀稠得所取故帛塗膏貼瘡上漸取瘳減惟得吃白羊頭肉但是豆並不得吃余如藥法大黃湯灸發背後服大黃朴硝各三錢上粗搗篩水一盞濃煎熱服即瀉出毒氣一方塗腫上內補黃耆散治發背已潰去膿稍多裡虛宜服黃耆二兩銼白茯苓桂心麥門冬去心當歸甘草生銼遠志去心各一兩五味子二兩人參一兩去蘆頭上件藥搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服治發背貼熁淋拓法附論凡發背始發或似小癤或復大痛或復小痛初發頭如麻子大此皆微候宜速察之若有少異即須大怖便急治之仍忌口連服諸藥下去熱毒若在僻遠無醫藥者即當頭灸百壯若已大腫灸四面及頭二三百壯不厭多也復薄貼冷藥種種救療必得瘥也其用貼熁藥皆須當中開孔令泄毒氣也發背者由六腑不和經絡痞澀血壅不通熱毒蘊積結成癰也其腫起於背胛中白如黍米四畔相連腫赤熱而疼痛或已潰或未潰毒氣結聚當用藥煮湯淋拓瘡上散其熱毒夫湯水者能蕩滌壅滯宣暢血脈故用湯淋拓也方大黃散治發背初發如麻子粒大漸以結硬疼痛川大黃木香玄參黃芩赤芍藥白蘞紫葛赤小豆各一兩上為細散用雞子白調如麵糊於絹上塗貼干再貼以愈為度雄黃散治發背腫毒焮赤疼痛雄黃一兩細研黃連一兩去頭黃柏半兩銼赤小豆三分川朴硝一兩黃芩半兩白芨三分上為細散用豬膽調如麵糊日三四塗敷腫上柳木耳餅治乳石氣發背瘡赤黑色宜貼老柳樹上木耳二兩黃連一兩去須龍葵根一握淨洗去土切乳香一兩人糞灰半兩杏仁一兩湯浸去皮尖上件藥相和搗三五百杵捏作餅子厚五錢以來一依瘡大小貼之恐藥不住以單帛勒之病者覺癢及冷應心則不得以手搔之如人行二十里一換須臾癢不可忍四畔便皺膿即以出急去其藥以甘草湯溫洗之用膏藥貼之每日一換皆須甘草湯洗之以瘥為度癢即易瘥或赤色不癢即難瘥拔毒散治發背塗瘡方陽起石寒水石礬石白石臘石膏麥飯石各二兩上為末重研如面用新汲水調塗瘡上解毒生肌散方石灰一分多年故船上者佳以淨器中燒令赤黃丹一分炒令紫色龍骨一分麝香一分椹子一分密陀僧一分上為細散每用敷之治發背磨刀石熁腫方磨刀赤石一片闊三寸長三寸厚一寸者白蘞二兩川大黃二兩醋一升鹿角八兩燒為灰上取磨刀石燒令赤即內醋中復出燒赤又內醋中候醋減半即取諸藥一處搗為細散以醋調如膏軟帛上貼干則易之栝蔞根散治發背及諸毒腫宜塗方栝蔞根三兩榆白皮三兩銼胡燕窠土五兩鼠坌土五兩上為細散取芭蕉根汁和作稀膏用塗腫上干即更塗如潰膿有頭者即四面塗之一方用女人月經衣水洗取汁和如泥敷石灰散治一切腫及發背乳癰等風化石灰一合小麥面三合皂角灰一合白蘞一合上為細散以釅漿水和如麵糊塗貼日三四換之又方治發背初得毒腫沒石子一枚牆上朽骨一分胭脂一分上相和研令勻細每用敷之如未結膿作頭只用浮萍草敷之自消抵聖熊膽丸治發背瘡焮熱疼痛熊膽麝香上等分同研為丸如黍米大凡用藥先以溫水洗瘡令淨安一丸於瘡口內上摻解毒生肌散後用醋麵糊攤於故帛上蓋之手按不可忍者立效清涼膏治發背焮熱疼痛消腫毒糯米二升龍腦一分上糯米水淘令淨入龍腦相和研成膏攤於疏布上貼干即易之又方大麥面三升黃牛乳二斤上相和作餅子以敷腫處熱即易之以瘥為度治發背瘡腫疼痛不可忍露蜂窠一兩半甘草二兩生用上銼以水三升煎至二升去滓以綿浸湯中洗瘡四面闢除毒氣令瘡早瘥治發背熱毒腫痛不可忍蘩蔞燒灰一升大麥面三合上藥以水和如膏塗於腫上干即易之以瘥為度治發背初有經日腫熱焮毒氣猛盛日夜頭痛雞子清三枚新狗糞一掬上藥相和令硬軟得所捏作餅子可厚一二錢當頭開一孔子貼腫上以帛子抹卻日三貼之取瘥為度治覺似發背但是熱腫即用之令內消方皂莢一梃去黑皮及子栗子一十枚去殼曝乾上為細散以新汲水和如麵糊攤於布上以敷腫處干即易之葛根湯治發背癰疽一切瘡腫乳癰口乾腳冷發作寒熱頭痛嘔噦不下食方見麥門冬湯治發背及疽一切毒腫內消方用剪刀草不限多少淨洗切搗絞取汁一小盞溫暖頻服之並以剪刀草爛研闊鋪於腫處如有乾者搗末蜜調塗之又方用理石五兩以水煮一日搗研令細冷水調塗又以青布三重可赤處方圓濕布拓之熱即頻換又方用生地黃不拘多少搗如泥以故布一條闊狹如腫大小薄攤地黃於布上攤訖糝木香末於地黃上令遍即於木香末上又攤地黃泥一重令夾木香末訖拓於腫上干即易之不過三五度效治發背疼痛不已取黃牛糞在芒田中經雨多者此糞帶白色良收取去泥土曝乾一半以炭火燒令煙絶一半燒令黑糟相和研令極細以生麻油調如面脂日三四塗之治發背及癰疽未潰方以莨菪葉似覺有瘡即取前件葉不限多少旋炙令熱便尉瘡上冷即易之以痛止為度各月無葉即取根劈作片子炙熱尉之治發背兼腫毒方搗地松絞取汁一小盞用乳香末一錢以水研塗之干即更塗如未有頭者於四面塗之一方無乳香又方用馬齒莧有黃花時搗絞取汁日煎成膏如患發背者研入硝石少許日四五上塗瘡立效治發背癰腫方用犢子耳中塞糝於瘡上立瘥不問黃牛水牛並良黃連湯治發背癰疽穿穴時久壞爛惡寒不可近出骨露筋餘毒未解攻刺疼痛不可忍淋洗方黃連地骨皮羌活防風去蘆頭木通甘草白芷川大黃狼牙川升麻莽草藁本黃耆銼赤芍藥細辛桑根白皮黃芩白礬蔥白麻黃去根節各一兩上藥細銼分為七貼用水三升煎取二升去滓溫暖淋洗瘡上後以熱衣拭乾以生肌膏貼之地黃湯治發背始作便成瘡爛壞宜拓之方生地黃汁一升川生麻白蘞梔子仁黃連黃柏當歸赤芍藥射干川大黃甘草生用各二兩上藥細銼水一斗煮至六升去滓下地黃汁攪令微溫以故帛內湯中蘸拓於腫上淋拓枳殼湯治發背及惡毒瘡腫宜用抽風毒枳殼苦參莽草甘草水葒細辛藁本白芷黃耆各二兩白礬一兩上藥細銼拌令勻分作三貼每貼以水五升入蔥白五莖煎至三升濾去滓於避風處用軟帛替換乘熱搵藥水淋拓患處以水冷為度洗尉方治發背及一切瘡腫穿穴後止疼痛抽風毒化瘡根莽草露蜂窠白芷桑根白皮甘草防風藁本細辛各半兩垂柳枝蔥白各一握上藥細銼以水一斗煎至五升去滓及熱於避風處用軟帛替換蘸藥水承熱尉患處以水冷為度竹瀝湯治發背腫痛宜拓方竹瀝二升川大黃黃連苦參黃芩梔子仁石灰木蘭皮黃柏各一兩上藥細銼以水五升入竹瀝煮藥至三升去滓以綿搵湯拓瘡上日至十餘度豬蹄湯治癰腫及一切瘡或煩疼浸淫宜用澆淋方豬蹄一對去毛淨洗芎藭赤芍藥川升麻甘草蛇床子川大黃蒴藋槐白皮各一兩上藥銼先以水二斗煮豬蹄取一斗漉去豬蹄下諸藥煎取六升去滓適寒溫澆淋瘡以湯冷為度拭乾別用敷藥黃連湯治背瘡毒腫焮爛疼痛宜拓方黃連麻黃根甘草狼牙羌活桑枝白礬各一兩上藥搗細每用二兩入蔥白五莖以水五升煎至二升去滓用軟帛承熱搵藥水更番淋拓患處水冷即止黃芩湯治發背不消宜拓方黃芩白芷栝蔞根甘草當歸各一兩川大黃三兩上藥細銼以水七升煮至三升去滓以故帛搵湯更番拓患處木通湯治癰疽發背初覺似有即速服藥取通兼用此湯淋射木通一斤白楊皮一斤川升麻半斤露蜂房四兩赤芍藥半斤甘草半斤上銼以水三斗煮取一斗濾去滓適大熱用注瓷瓶兩三枚更互盛湯高抬手注射腫處勿令間斷可一食久次用暖水注射一食久即解散熱氣苦參湯治癰瘡爛壞淋洗方苦參防風露蜂窠甘草各二兩上藥細銼用水一斗煎至六升去滓熱湯洗冷即住豬蹄湯治一切敗爛瘡洗方豬蹄一對敗醬一兩槐柳枝各一握黃耆二兩銼上藥細銼先以水一斗下豬蹄煮令爛去豬蹄下諸藥更煎取四升以布絞去滓洗瘡湯冷為度以綿拭乾便以生肌膏貼之黃連餅治發背髮鬢乳癰諸毒腫宜貼黃連去須蛇床子乳香各一兩杏仁半兩蔓荊根一握鹽一分人糞灰十分柳樹上木耳一兩上為細散入酥和捏作餅子厚如五錢以貼患上用粗布緊扎之每日三四度易之夜亦如日然每易時先以甘草湯洗之如未作頭貼藥便撮作頭如已穴有膿水亦貼之即生肌肉如出膿水已盡即貼烏膏若有胬肉即取柳樹白木耳細研微微糝於膏上貼之拓腫方大黃黃芩白蘞芒硝各三分上㕮咀以水六升煮取三升故帛四重蘸汁中以拓腫處干即易之無度數晝夜為之治發背及癰腫已潰未潰香豉三升少與水和熟搗成強泥依腫作餅子厚三分以上有孔勿覆孔上布豉餅以艾列其上灸之使溫溫而熱勿令破肉如熱痛即急易之患當減快得安穩一日二度灸之如先有瘡孔孔中得汁出即瘥升麻湯治發背及諸腫毒宜拓方川升麻一兩黃芩二兩梔子漏蘆各一兩蒴藋根三兩川芒硝二兩上件藥銼碎以水一斗煮取五升去滓候冷用帛搵藥拓腫處常令濕潤即消也活調敷散治疽發背先用箍藥乳香沒藥白芷白蘞南星赤小豆天花粉芙蓉葉黃連貝母寒水石地榆黃蜀葵葉或花或子白芨百合上為末調敷瘡留口如瘡腫硬而厚按之方痛加草烏尖狼毒蜜醋調敷又方明硫黃蕎麥粉等分井水調作餅子日乾用時為末水調敷之宜滌湯用新桑白皮白芷蔥白蘇葉苦參露蜂房為粗末水煎時溫淋洗之又糝末用經霜葉兼干為末糝瘡口又宜紅玉散用飛虢丹寒水石等分為細末摻之能生肉瘡已潰欲結口者方可用生末外臺祕要療嗇嗇惡寒似欲發背或已生瘡腫癮疹起方以硝石三兩暖水一升和令消待冷取故青布沓三重以赤處方圓濕布拓之熱即頻易立瘥麝香散治發背癰疽腫毒疳漏等瘡麝香別研輕粉定粉以上三味各半錢粉霜一字半巴豆三枚大者去皮白丁香四十二枚揀直者上件先研巴豆細卻入諸藥同研極細為度如疳瘡有眼者用水和藥作錠子紝在瘡口內後用萬金膏貼每日一上如膿多兩上如惡瘡發背魚眼疔瘡有紫惡肉只做散子干糝在惡肉上後用萬金膏貼每日一上或再上但少摻藥如不痛更加藥少許治癰疽發背三法第一法如上藥後覺冷如水萬不失一或不覺冷則難治蓮花蕊黃鬚者用三錢雄黃半兩生天南星半兩生川當歸二兩去蘆蜈蚣赤腳者一條生飛羅面二錢生苣霜二錢生上七味不見火曝乾為細末釅米醋調成用紙花大於患處紅暈上半寸許敷藥於紙花上貼於患處用篦子重疊壓紙令著實紙花留眼子在瘡口上放近下令出膿水一日一換臨換藥時用煎熟溫湯以軟綿蘸湯洗去舊藥候乾再上新藥其藥不可久留久留則無力旋合不可過三日如瘡大用藥多則以料劑添合之如發渴一面服第二藥或不渴亦多服之候膿水盡始用第三藥斂瘡口忌一切毒食患者不可令聞穢氣其藥功效不可盡述第二法治瘡正發時作渴雖不渴亦多服之栝蔞一個綿耆一兩粉草半兩乳香緑豆粉各二錢上㕮咀水二碗煎至一碗溫服一日三服頻多煎如熟水時時呷之尤妙第三法赤蘞生用白蘞寒水石以上各半兩飛過龍骨半兩輕粉一錢黃丹二錢飛過上為細末干糝於瘡口上不可犯生水如瘡口將斂切戒近色欲萬全金花散理髮背疽瘡疼痛不可忍者凡腫在脊骨邊根株如碗盞大上面青有細頭子如粟米粒白色其間亦有如石榴子者即疽瘡也車螯紫色者出海際用火煅赤地上出火毒氣了為末生黃柏為末生甘草為末干蘆皮自東邊向西蘆籬障上取皮為末上各為末了旋抄車螯末黃柏末各一錢甘草末半錢以上蘆皮末一錢半以上拌勻用津唾調以竹篦子敷腫上須蓋遍瘡根未穴者自穴已穴者惡物自出凡十上取效每敷瘡時須先用赤根蔥三兩莖薄荷少許鹽少許一處煎湯放冷淋洗旋用帛子拭乾方可上藥應系惡瘡癤並敷之無頭者即消有頭者即膿出神效豆粉膏治發背緑豆粉炒赤放地上出火毒上井水調敷四圍大凡用藥塗瘡不可當心塗當心則瘡便走散只當在四圍塗住不可使之散去獨聖膏專治發背凡背上初覺腫痛或癢或已成瘡者便用牛皮膠不拘多少銼碎入少水熬令稀稠得所如膏攤在紙上貼患處次用軟白布二條於釅米醋內煮令熱更互漉出於膠紙上乘熱蒸尉若瘡癢時乃是藥攻其病須是忍癢不住蒸尉直候膿出將盡即濃煎貫衆湯放溫洗去膠紙次日復看瘡中若尚有膿出即是未效卻再如前法以膠紙醋煮布令追膿出盡然後用貫衆湯如前洗去膠紙次日復看瘡中若尚有膿又如前法蒸尉雖連數日蒸尉不妨只要瘡中膿盡瘡干為度次用後藥卻痛散治發背及一切惡瘡雌雄蜈蚣一對酥炙烏賊魚骨大者二片去皮生用甘草三寸生用腦子一錢別研麝香一錢別研上件前三味為細末入腦麝研勻先煎甘草湯放溫洗瘡了後用藥乾摻或用油調敷亦得歸命膏治發背用野生茄子熟黑者取子不拘多少爛研取汁以綿濾滓入大銀盂內慢火煎成稀膏以細青竹枝子去葉五七莖扎聚不住手攪候成稀麵糊收之用時不問陰陽二證發背或赤不赤有頭無頭或癢或痛皆可用之如無頭無異色或熱不熱一發從外漸漸傳入如有赤脈有頭先從赤脈敷之漸漸傳出一日上三四度不可輕易藥物至賤其效最貴重於萬金蛇皮塗貼方治發背癰疽疼痛熱毒焮腫赤硬有膿即撮令頭潰蕓薹子一兩二枚取白蔓荊葉切二兩馬齒莧切二兩蛇皮長五尺細切炒令黑色灶窯中黃磚二兩為末不著水者上先搗蛇皮蕓薹子令細次下蔓荊莧磚末細研令勻次入雞子白和以瓷盒盛塗故帛上貼之每日三五度換或瘡毒發熱即研生地黃汁三五合飲之治發背欲死者取梧桐子葉𨫼上爆成灰絹羅蜜調敷之干即易之洗方用豬懸蹄淨洗不拘多少煎沸湯放溫淋洗拭乾又方用臘茶末白湯調放冷洗療諸癰疽發背及乳瘡以釜下土搗取末雞子中黃和塗之佳治發背以甘草三大兩生搗別篩末大麥面九兩於大盤中相和攪令勻取上好酥少許別研入藥令勻百沸水搜如餅劑方圓大於瘡一分熱敷腫上以油片及故紙隔令通風冷則換之已成膿水自出未成腫便內消當患腫著藥時當須吃黃耆粥甚妙又一法甘草一大兩微炙搗碎水一大升浸之器上橫一刀置露中經宿平明以物攪令沫出吹沫服之但是瘡腫皆可服甚效
