body:
  text: 卷二百八十九癰疽門發背附論夫發背者熱毒之氣發於背俞為癰疽是也此內本於五臟外傳諸腑熱氣攻發必生於府俞之間得之乳石發動及肥甘滋味之過臟腑壅熱經絡為之不通毒氣凝滯必因俞穴而出是以服石之人於居處衣食嗜欲喜怒尤宜節慎一有過舉則毒氣乘隙而發初如芥粟治之稍緩則盈尺寸而難圖故始覺熱搏於分肉痛傷於經絡宜速治之蓋其脈不通則腫毒增甚經所謂營氣不從逆於肉理乃生癰腫是也血敗肉腐為患不一實則為癰浮則為腫深則為疽然發於背者兩胛間初起甚微或癢或痛往往忽之數日遂致不救者治之始則度其腫之正中而灸之壯數逾百使惡氣外出次以藥疏利腑臟決其邪毒則有可治之理凡發背皆因服食五石寒食更生散所致亦有單服鍾乳而發者又有平生不服而自發者此是上代有服之者其候率多於背兩胛間起初如粟米大或痛或癢仍作赤色人皆初不為事日漸長大不過十日遂至於死其臨困之時已闊三寸高一寸瘡有數十孔以手按之諸孔中皆膿出尋時大困所以養生者小覺背上癢痛有異即火急取淨土水和為泥捻作餅子厚二分闊一寸半以粗艾火作炷灸泥餅上貼著瘡上灸之一炷一易餅子若粟米大時可灸七餅子即瘥如榆莢大灸七七餅炷即瘥如錢大可日夜灸之不限炷數仍服五香連翹湯及鐵漿諸藥攻之乃愈又法諸發背未作大膿可以冷水射之浸石令冷尉之日夜莫住瘥乃止此病忌面酒五辛等亦有當兩肩上發者凡服石人皆須勞役四體無令自安如其不爾者多有發動亦不得逐便恣意取暖稱已適情必須遺欲以取寒凍雖當時不寧於後在身多有所益終無發動之慮耳凡腫起背胛間頭白如黍粟四邊相連腫赤黑令人悶亂即名發背也禁房室酒蒜肉面若不灸治即入內殺人若灸當瘡上七八百壯有人不識多作雜腫治者皆死背疽其原有五天行一瘦弱氣滯二怒氣三腎氣虛四飲火酒食炙爆物服丹藥熱毒五蓋治背疽不可一概將為熱毒其治之難易當自一而至五病有至甚而生有微而至死病證難辨死生何從決乎蓋發背透膜者死不治此言肝俞以上未潰肉陷面青唇黑便汙者死此言壞藏便下瘀血潰喉者不治陰入腹者不治入囊者死鬢深及數月不治謂如及寸余者在頤後一寸三分毒鋭者不治無此者生流注雖多療之必愈發背之人雖云有熱未有不自腎虛而得之者若疽疾減退五分之後便合依法五更初服山藥丸或加減八味丸背疽嘔逆乃是毒氣衝心非脾胃之冷當服內托散楊氏家藏方云有人因鼻衄初愈不曾表汗餘毒在經絡背發大疽自肩下連腰脅腫甚堅如石色極紫黑醫以涼藥服之中夜大嘔乃連進此藥三四服嘔遂止既而瘡潰出赤水淋漓四十日而愈又有患瘰癧者痛過即嘔服此藥嘔亦止近見有人病疽醫者不肯用此藥為恐傷脾胃愚故引楊氏之言以解世人之惑凡發背疽之後不曾服內托散致使熱毒衝於心經必使後來咽喉口舌生瘡甚至黑爛合先服犀角散以解散其毒免有此證凡有背疽之人難於隱几但用緑豆十斗作一大袋隱伏則自然心涼身體安穩飲食居處依法戒忌已安後半年間血氣未定猶當謹之不廢藥餌方能保全外科精要云氏敘源幼時學舉業全不知醫藥甲申年自太學歸省國醫常穎土器之適在府下求為母氏一診云有蓄熱必渴時母氏所飲大略喜水又云但防作瘡覺瘡便著艾於上熱盛則五花灸之謂中及四旁隨赤到處灸非方停也切記至辛巳年六月望日母氏忽言背胛間微癢視之有赤半寸許方有白粒如黍粟記器之言乃急著艾其赤隨消至二十七壯而止信宿復覺微痛視之有赤下流長二寸闊如韭葉舉家不悉皆以前灸為悔親戚交責謂赤熱如何用火有詆器之者遂呼外醫用藥膏覆之益引一日夜增一暈至二十二日衡斜約六七寸痛楚不勝間一呻吟聽之心碎倉皇詢告或云等慈寺老智全者前病瘡甚大得灸而愈奔問之全云劇時昏不知但小師輩言範八奉議守定灸八百餘壯方蘇約艾一篩爾亟歸白之見從始以銀杏作炷其上十數殊不覺乃截四旁赤引其炷減四之三皆覺痛七壯後覺癢每一炷燼則赤隨縮入灸至三十餘壯赤暈方退病者信遂以艾作團梅杏大灸其上漸加至雞黃大約四十團方覺痛視火焦處已寸余蓋灸之遲而初發處肉已壞攘盛隔至好肉方痛耳四旁知痛者肉未壞也又有言一番殿直居城南施瘡藥每效敘源即再拜邀請時已燻黑火焮滿背番以手捫瘡五六寸許試之云瘡高阜而熱不妨且云只怕不高而熱氣少者病者食粥訖安寢前此六夜不寢至曉視之瘡如覆一甌突然高三四寸上有百數小竅色正黑以千金所説與潘氏高阜之言求之突然高者毒氣出外而聚也百數小竅者毒未聚而浮攻皮膚也色正黑者皮與肉俱壞也非艾火出其毒於壞肉之裡則五臟畢矣至是方悟明堂圖與煙蘿子所畫五臟在背如懸挂然今毒行分肉間待其外穿潰則內虛外實則易入內實則難出皎然可見而聽庸醫用尋常赤腫敷貼涼冷藥以消散之此藉寇兵也源痛自咎為人子不知醫致親疾危甚荷神明扶佑於倉皇間問知艾灸已危而獲安醫學類證論曰治發背發腦髮鬢疔瘡鬼箭射工魚臍等一切惡瘡無不靈驗方才覺有患便用蒜橫切作片子如兩重紙厚貼在瘡上以緑豆火艾丸子灸之待痛稍可忍即漸大作丸灸痛又可忍便除蒜灸之若是正發背二日內灸者十得十愈四日內灸者十得七八六日內灸者十得五六八日內灸者十得一二愈十日以後灸即不得力若得力者即是熱毒瘡非發背也凡發背者灸無多少定數但初痛候不痛即住若初不痛候痛即住然則大約如此若住火後又腫及痛者即須更灸候不腫不痛即住火每患一個瘡或灸三百圓或灸五百圓或一千圓或二千圓以差為度若患三個五個瘡直須各各用前法灸之候不腫不痛然後用膏藥貼之或問曰何以知是正發背與熱毒瘡愚應之曰若有患者待請人識認得是正發背或是熱毒瘡即已遲也何異咨丈人而後救火者哉古人云面無好靨頭無惡骨背無好瘡但依此灸之又何須識別者或問曰前言醫一切惡瘡後但灸發背而已何也愚應之曰瘡中人言醫不得者發背也令若早灸無有不驗則其餘不言可知也或曰忽遇春夏火正旺相得行灸乎若灸多得無火毒入心乎愚又應之曰此是未知灸法之人也千萬勿信本事方云元祐三年夏四月官京師疽發於背召國醫治之逾月勢益甚得徐州蕭縣人張生以艾火加瘡上自旦及暮凡一百五十壯知痛乃已明日鑷去黑痂膿血盡潰膚里皆紅亦不復痛始別以藥敷之日一易焉易時旋剪去黑爛惡肉月許瘡乃平是歲夏間京師士大夫病疽者七人余獨生此雖司命事然固有料理不知其方遂至不幸者以人意論之可為慨然儒門事親云一富家女子十餘歲好食紫櫻每食即二三斤歲歲如此至十餘年一日潮熱如熱勞戴人診其兩手脈皆洪大而有力謂之曰他日必作惡瘡腫毒熱上攻目陽盛陰脫之證其家大怒不肯服解毒之藥不一二年患一背疽如盤痛不可忍其女忽思戴人曾有是言再三悔過請戴人戴人以扉針繞疽暈刺數百針去血一斗如此三次漸漸痛減腫消微出膿而斂將作痂時使服十補內托散乃痊終身忌口然目亦昏終身無子凡背瘡初發便可用藏用丸玉燭散大作劑料下臟腑一二行次用扉針於腫焮處循紅暈周匝內密刺三層出血盡以濕軟帛拭去血甚者百會委中皆出血後用陽起散敷之不可便服十味內托散其中犯官桂更用酒煎男子以背為陽更以熱投熱無乃太熱乎方二烏丸一名萬靈丸治發背托裡定痛驅風毒涼血脈羌活去苗薄荷葉各三兩川芎三味不見火玄參地榆麻黃去根節蔓荊子去蒂白膜旋覆花去萼蒂荊芥穗各二兩防風去叉蘆天麻白芷不見火白殭蠶直者去絲足口炒牛蒡子炒各二兩甘菊花三兩大川烏去皮尖炮何首烏各四兩粉草炙四兩半蟬蛻洗去土前足半兩上為細末煉蜜丸如彈子大每服一丸食後細嚼茶酒任下大黃膏治發背疼痛日夜不可忍塗敷大黃銼雄黃研芎藭黃連去須白芷檳榔銼當歸切焙木香桂去粗皮黃柏去粗皮芍藥附子去皮臍乳香研麒麟竭各半兩雞舌香麝香各一分豬脂一斤上為末拌勻先於銀器內熬豬脂令沸去筋膜下諸藥末調成膏塗患處日三上以瘥為度竹葉黃耆湯療動散腫已自利虛熱不除宜服竹葉切三升黃耆四兩小麥一升芍藥三兩甘草一兩炙石膏二兩研人參二兩升麻一兩茯苓二兩一用七分桂心六分一用三分當歸三兩干棗十四枚五味子三兩生薑三兩乾地黃一兩麥門冬三兩去心知母一兩上切以水一斗二升煮竹葉小麥取九升去滓內藥煮取三升溫分四服千金托裡散出儒門事親書治一切發背疔瘡連翹二兩二錢黃耆一兩半厚朴防風桔梗各一兩川芎白芷芍藥官桂甘草各一兩木香沒藥各三錢乳香三錢半當歸人參各半兩上為細末每服三錢用酒一大盞煎三沸和滓溫服地黃丸常服令人終身不患發背熟地黃五兩蓯蓉酒浸天門冬石斛當歸防風白茯苓川芎各三兩遠志黃耆甘草炙芍藥各二兩人參細辛巴戟各一兩上為末煉蜜為丸如梧桐子大每服三十丸荊芥湯下莽草膏療發背癰腫牢核成膿莽草芎藭當歸細辛附子炮黃芩烏頭炮牛膝躑躅野葛茯苓防風杜蘅各一兩豬脂半斤上切用豬脂合煎去滓敷瘡上日再忌豬肉冷水生菜大酢神仙萬靈散專治發背疔瘡一切惡瘡金銀花一兩半皂角針穿山甲白芷天花粉甘草節當歸尾防風藿香赤芍藥各半兩乳香別研沒藥各三錢另研上㕮咀每服一兩重水一碗無灰好酒一碗砂石器內頓放瓷碟蓋口紙條糊縫文武火煎至重車行十里遠藥香為度熱服仍飲好酒數杯厚衣被汗出為效滓再煎服病重者不過三服合煎服時並忌雞犬婦人見老病氣衰者加黃耆半兩連翹散治發背腫癰疽惡風結膿血連翹子獨活去蘆頭木香射干各三分甘草炙銼桑寄生銼升麻雞舌香沉香乳香研大黃銼炒一兩一分麝香研一分上粗搗篩每服五錢水一盞半煎至八分入淡竹瀝半合去滓空心溫服快利三五行為度未利再服排膿內補鐵屑散療癰發背當歸人參細辛甘草炙蓯蓉黃耆桂心防風黃芩鐵屑芎藭芍藥各等分上為散服方寸匕忌海藻菘菜生蔥酢物等玄參散治熱毒氣攻衝背上初覺疼痛心神煩悶玄參黃芩當歸赤芍藥麥門冬去心犀角屑甘草生銼遠志去心生乾地黃各一兩赤茯苓川升麻人參去蘆頭各一兩半上為散每服四錢水一中盞入竹葉二七片小麥五十粒煎至六分去滓不計時候溫服犀角散治初覺皮膚及頭背有瘡癤恐成癰疽兼臟腑壅澀或寒熱口乾心煩犀角屑一兩知母三分木通一兩銼赤芍藥川升麻薺苨葳蕤黃芩甘草生各三分麥門冬去心馬牙硝川大黃銼碎微炒各一兩上為粗散每服四錢水一中盞煎至六分去滓入竹瀝半合不計時溫服以利一兩行為度黃芩散治大熱發癰在背或於陰股間黃芩銼黃耆銼木通銼前胡去蘆頭川升麻各一兩半栝蔞根二兩赤芍藥一兩赤茯苓一兩甘草一兩生銼當歸半兩川大黃二兩銼碎微炒人參半兩去蘆頭上為散每服四錢水一中盞入竹葉二七片小麥一百粒生地黃一分煎至六分去滓不計時候溫服麥門冬湯治發背癰已服利湯後服此麥門冬去心焙黃耆銼芍藥生乾地黃各一兩前胡去蘆頭黃芩去黑心升麻遠志去心栝蔞去皮各三分當歸半兩小麥一合上粗搗篩每服五錢水一盞半棗二枚擘破生薑一片拍碎竹葉二七片同煎至