時眼見黑花熱淚出視物不明並皆治之當歸芍藥木香川芎連翹熟乾地黃甘草檳榔各一兩山梔子薄荷葉黃芩各一兩半大黃二兩芒硝七錢半牽牛乾炒去頭末一兩半上為細末燒飯為丸如梧桐子大每服三四十丸不拘時候茶清下或荊芥湯下諸飲亦得日進一二服錠子眼藥出儒門事親黃丹三兩飛過黃柏去皮黃連去須枯白礬爐甘石黃連制銅緑各半兩硇砂川烏炮各二錢乾薑一錢蠍梢二錢信半錢沒藥少許上為細末入豆粉四兩澆蜜和就如大麥許錠子於眼大眥頭內待藥化淚出為效竹瀝泄熱湯療腸傷氣伏邪熱喘逆悶恐眼視無明狂躁非意而言一切症竹瀝一升麻黃大青梔子人參玄參升麻茯苓知母各二錢石膏碎生葛各八兩生薑芍藥各四兩上切以水九升煮取二升去滓下竹瀝更煎三五沸分三服忌酢物重聖散出宣明論治一切風熱內外障氣眼疾川芎川獨活川羌活射干井泉石仙靈脾防風甘草蒼朮草決明石決明丹砂白朮各三分上為末每服二錢水一盞半煎至一盞食後溫服日三摩頂膏出聖惠方治一切眼疾及生髮退熱毒風生油一斤黃牛酥三兩蓮子草汁一升淡竹葉一握大青一兩半葳蕤一兩半曾青二兩細研石長生一兩半吳藍一兩槐子一兩半川朴硝一兩半青鹽二兩梔子仁一兩半上件藥細銼綿裹於鐺中先下油酥及蓮子草汁後下諸藥以文火煎半日即以武火煎之候蓮子草汁盡其膏即成去滓更細澄濾訖通油瓷瓶成丸每欲用時夜間臥時以鐵匙取少許塗頂上細細以匙摩之令稍散入發孔中頓覺清涼輕者不過五六度重者用膏半劑即瘥摩膏之法每隔三夜一度摩之妙並日恐藥驅風毒大急此藥能療偏正頭風除眼暗風毒冷熱淚出眼暗如針刺痛無不瘥者摩頂後三兩日便能生髮風毒自散也合藥取蓮子草汁須是八月九月採之其汁方濃有力余時不堪也一方有蕤仁無川朴硝豬肝散出海上方菊花楮桃夏枯草各一兩蒼朮木賊去節防風赤芍藥石決明草決明各二兩當歸三錢黑豆一合生地黃三兩上為末用雄豬肝不拘多少竹刀切片入藥末線縛豬肝米泔水蒸空心細嚼或用麥門冬湯漱下忌毒物療眼中一切諸疾盲翳天行風熱胎赤淚出常漠漠不多見物石膽一兩蒲州解縣出光明者波斯鹽緑一兩色青陰雨中置幹不濕者是真石鹽二兩硇砂二分以上四味各別研烏賊魚骨一兩別研蕤仁三兩研膏秦皮黃連防風各三兩細辛鉛丹各一兩馬蹄決明三兩上合搗篩似粉以白蜜於火上微暖去上沫取下清者和入作塊更搗千杵以油蠟紙裹之取瓷瓶子盛貯勿使見風每欲著以兩米許硬和蜜少許用篦子頭分置兩眼眥夜臥閣眼至明不漱口含清漿和豆許鹽屑吐洗眼不避風日未瘥之前忌食麵牛肉漿果葷辛生菜齏汁目蓿萵苣獐兔每日一度點效金絲膏出保命集方點眼藥生薑四兩取汁白沙蜜一斤煉去滓猔豬膽汁三錢黃連四兩用水一斗浸煎取五升上先煎黃連水後入薑汁次入蜜同煎去沫淨次入下項藥末腦子四兩麝香三錢硇砂四錢硼砂三錢輕粉五錢熊膽四錢青鹽三錢上極細攪勻熬令稀膏點用還睛膏出海上方爐甘石比爐甘黃白石者佳用桑柴火燒通紅童子小便三升蘸七次研為細末另取黃連末調水飛同爐甘石末焙乾用六兩黃連去須出揀淨研為末用童便熬沸加三兩尤妙此須臨時稱用不預計爐甘石黃連數內鷹條一兩洗淨如無以白丁香代之當歸生用洗幹一錢烏魚骨麝香輕粉乳香硇砂各一錢黃丹水澄焙乾二兩片腦少許上用蜜六兩以砂鍋化開煮蔥白三根焦色去滓綿子濾淨稱之後將淨蜜傾入砂鍋內文武火熬之槐枝攪勻先下爐甘石攪勻熬動再下黃丹又攪勻三次下黃連當歸四下鷹條五次下硇砂乳香六次下烏魚骨七次下輕粉麝香熬成紫色方下片腦以不黏手為丸如龍眼大如弱人只須麥粒大每藥一丸溫水一呷化開點洗若作錠子點眼大有神效上件煎黃連汁浸一宿濾去黃連澄清卻於銚子內炒爐甘石末子將黃連汁滲干為度如多合分兩輕者隨增神授太師方出直指方治一切眼疾昏翳甘草生川芎穀精草蒺藜炒杵去刺蟬蛻洗曬旋覆花密蒙花荊芥羌活木賊去節童尿浸一宿曬防風各等分上為末每服二錢秦皮煎湯調下療眼中一切諸疾青盲翳者天行風赤無端忽不見物悉主之此方兵部侍郎盧英所傳價重千金石膽研波斯鹽緑研石決明烏賊魚骨去甲鉛丹細辛龍腦各三分蕤仁研防風末各三分馬蹄決明淨揀秦皮末各二兩上搗散及研避風煮以白蜜煉濾淨和訖更搗五七千杵以油蠟紙重裹之重盒盛勿令見風可致百年不敗合時不欲見蟲犬與鳥雀婦女及孝子穢惡之類須於臘月合之有患取米粒許如稀餳夜臥點之以瘥即止丁香化光丸出宣明論治一切遠年近日目疼丁香荊芥穗各三錢巴豆一錢去皮油半夏二兩烏梅去枝盆硝甘草各半兩南硼砂三錢腦子二釐縮砂仁一錢半上為末醋煮麵糊為丸如緑豆大每服十丸至十五丸食後米泔下日三服靈光還睛丸出瑞竹堂方治一切眼疾川黃連乳香各半錢爐甘石六兩炭火在鐵片上煉紅末放於黃連鬥內依前燒已麝香烏魚骨末白丁香硇砂研細輕粉各一錢研上為細末白沙蜜一十兩銀器內盛砂鍋內可先熬五七沸以淨紙搭之面上脂取淨除黃連外下余藥用濕柳竿子攪勻次下黃連攪勻於慢火內徐徐攪至紫色不黏手為度急丸如皂子大以紙裹之每用一丸新汲水於小盞內化開時洗之菊花散出海上方甘草一兩半川芎蒼朮甘菊各一兩防風白蒺藜羌活木賊麻黃黃連各三錢上為細末每服三錢食後臨臥酒茶吞下日進三四服如頭目眩亦宜服之羚羊角散出危氏方家菊防風川芎羌活車前子川烏炮去皮尖各半兩半夏泡羚羊角薄荷葉各二兩細辛一兩上銼為散或為末或散以生薑煎用末以荊芥茶清調下食後金絲膏出儒門事親黃丹代赭石玄精石各半兩爐甘石一兩腦子半錢黃連蕤仁去皮油各三錢白丁香南硼砂各一錢上除硼砂腦子外同為細末以河水一升白沙蜜二兩同熬三五沸然後入藥味再熬至半茶盞以未用綿子濾過去滓次入硼砂腦子末攪勻定磁器內放徐徐點眼有神驗冼肝散出本事方治眼大黃甘草各五錢黃芩芍藥赤者乾葛川當歸熟地黃山梔子仁各半兩上為末每服二錢第二次米泔水調下甚者三錢魚膽丸出海上方黃熟川連一兩洗淨研令碎新汲水一錢浸一宿煎至二分許綿紗濾磁器內用煎成膏文武火勿令焦南硼砂真片腦各一錢蕤仁一分去皮殼去油盡上乳鉢內研極細一處和勻或膏素細條鏡上刀切磨令圓每用一丸點眼菊睛丸出本事方治諸般眼患甘菊花二兩川芎甘草各一兩天門冬四兩去心上為細末煉蜜為丸如梧桐子大每服十五丸至二十丸空心溫水服或酒下日午臨臥日三服如久患加荊芥余寓衡陽日有一婦人患眼十分重余與此藥服瘥洗眼方出危氏方韶粉防風馬牙硝餅子銅青上等分為細末每用一匙溫湯調下拘時洗立效治眼疾黃芩桔梗各一兩防風荊芥穗桑白皮前胡甘草各半兩大黃一兩芍藥二兩上水二盞煎至一盞食後服菊花散治一切眼疾肝熱上攻羞明畏日淚出菊花一兩密蒙花甘草生梔子仁芎藭大黃各半兩防風去叉當歸各一兩蒺藜炒去角一兩上為散每服二錢食後臨臥服門冬熱水調下魚膽丸出儒門事親龍膽草青鹽腦子各半兩黃連去須一兩南硼砂硇砂麝香鯉魚膽各一錢上除龍膽草外同為細末先將龍膽草連皮研破以河水二升浸春秋二宿夏一宿冬三宿將浸並揉極爛用絹袋濾去滓於石器內慢火熬成將膏子點於水內不散用指頭搌開有絲乃膏成然後入魚膽拌勻將膏合上件藥末作劑丸如粟米徐徐點用之還睛膏出海上方白蒺藜炒去刺青葙子白朮各半兩菟絲子木賊去節各一兩北五味子羌活各三錢半防風二錢半上為細末煉蜜為丸如龍眼大每服三丸食後細嚼白湯咽下點眼藥方金精銀精代赭爐石水石泉石石膏滑石上等分杵碎研細先用蜜一斤熬煉紫色後下諸藥同熬紫黑色為度下水四升入藥末再熬滴水不散用紙七層濾之加硇砂硼砂各半錢腦子少許各研調和用少許點眥涼膈散川大黃連翹薄荷甘草山梔子黃連皮硝黃芩上等分水煎服之塗頂油方出聖惠方治腦熱風目睛疼麻油二合硝石細研川朴硝研各一兩蓮子草汁半合白蜜半兩上同研令勻以磁盒盛之每起一匙塗於頂上甚涼又方治眼疾當歸芍藥各半兩大黃一兩黃芩桔梗瓜蔞根防風甘草各半兩上水二盞煎至一盞食後服眼藥出海上方赤芍藥別研生地黃研白芷各一兩別研黃柏一塊如雞子大生薑半兩冬青葉生薄荷少許上研搗為膏如干以薄荷水添潤仰臥用藥合於眼上內用一層紗片隔住外用紗帛縛定如此數日即效點眼方出海上方硼砂琥珀各二兩梅花腦子真珠各一匙硃砂二錢半石決明半個用絲綿裹斧打碎麝香一匙上但留硃砂臨時為末雜和諸藥令勻以角管收藏復以紙塞勿令泄氣每用以銅箸沾水蘸藥點眼片時便效
