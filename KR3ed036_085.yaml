body:
  text: 卷八十五眼目門目瞼生風粟附論夫瞼生風粟外障此眼初患之時皆因肺臟壅毒大腸積熱肝家有風致令眼瞼皮上下有肉如粟粒相似或赤或白唯多淚出澀痛如米隱睛一般積久年深翳膜昏暗漸漸加重此眼宜翻眼皮起以針撥之又頻洗出血去除根本即瘥然後服除風湯退熱飲子危氏得效方論云兩瞼上下初生初如粟米大漸漸大如米粒或赤白不甚痛疼堅硬者蓋肝壅血所成宜服消毒飲子方知母湯出聖濟總録知母茺蔚子人參白茯苓去黑皮大黃銼炒五味子黃芩去黑心各一兩車前子一兩半芒硝半兩上粗搗篩每服一錢匕水一盞煎至五分食後去滓溫服青葙子丸出聖濟總録治目瞼生風粟青葙子二兩半犀角鎊白茯苓去黑皮羌活去蘆頭槐子各一兩半桑白皮銼一兩半麻黃去根節一兩一分羚羊角鎊三兩大黃炒一兩上為末煉蜜丸如梧桐子大每服三十丸食後粥飲下日再防風散出聖惠方治瞼生風粟及生珠管防風去蘆頭犀角散羚羊角屑川大黃銼碎微炒前胡去蘆頭黃芩玄參地骨皮各一兩甘草半兩炙微赤銼上為散每服五錢以水一中盞半煎至五分去滓於食後溫服除風湯出龍木論治瞼生風粟外障防風二兩犀角大黃知母黃芩黑參各一兩桔梗羚羊角各一兩半上為末以水一盞煎至五分空心去滓溫服退熱飲子出龍木論治瞼生風粟外障茺蔚子知母人參五味子茯苓大黃芒硝車前子各一兩半上為末以水一盞散一錢煎至五分食後去滓溫服茺蔚散出聖惠方治眼生風粟疼痛時有淚出茺蔚子防風去蘆頭羚羊角川大黃銼碎微炒杏仁去皮尖雙仁麩炒微黃黃芩車前子赤茯苓以上各一兩上為散每服四錢以水一中盞煎至六分去滓入芒硝半分攪勻每於食後溫服細辛湯出聖濟總録治眼生風粟疼痛時有淚細辛去苗葉玄參五味子人參白茯苓去黑皮防風去蘆車前子各一兩上搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥溫服蕤仁膏出聖濟總録治眼瞼生風粟蕤仁三兩秦皮銼一兩黃連去須海蛤丹砂研各半兩龍腦研一錢上除研者外搗羅為末酥和於銅器中煎新綿濾過入研者二味拌令勻置瓷器中每以一小豆大點服消毒飲出危氏方治兩瞼上下生風粟漸漸大如米粒或赤或白不甚疼痛堅硬者大黃煨荊芥各兩半牛蒡子炒甘草各一分上銼散每服三錢水煎一盞半食後溫服治眼瞼垂腫生風粟磨隱睛痛方出聖惠方蜜少許水銀半棗大以津液研令星盡龍腦半錢細研上相和勻每用少許日三五上點之目內生瘡附論夫目內生瘡者以脾臟毒熱熏蒸於上鬱而不散而又多食五辛或飲熱藥遂令瞼內生瘡初患之時或即癢痛作時發歇不定或多淚出遂令瞼內瘡出攻令四眥如硃砂色相似然後漸生翳膜障蔽瞳仁蓋是脾臟風毒積熱膈中致令此眼亦不宜點藥炙著頭面上恐損眼也宜服瀉脾湯墜膈丸立效龍木論歌曰風赤生於脾臟家瘡疾兩瞼似硃砂淨潔脾臟散蒸郁光華還復詎有遮輕翳點塗權時瘥服餌鐮鉤智者誇若把炙燒來退卻欲除根本路程賒此因黑珠上瘡稍安其痕疤不沒侵入水輪雖光未絶終亦難治又元眥頭結聚生瘡流出濃汁或如涎水黏睛上下不痛仍無翳膜此因心氣不寧並風熱停留在眼中宜服白薇丸方蕤仁丸出聖濟總録治目生瘡疼痛赤腫心躁視物不明蕤仁去皮決明子微炒秦皮去粗皮銼車前子黃連去須甘菊花防風去蘆藍實槐子各一兩半柴胡去苗人參白茯苓去黑皮山芋芎藭各一兩甘草炙一兩半大黃銼炒令香一兩上為末煉蜜丸如梧桐子大每服三十丸空心米飲下決明子丸出聖濟總録治肝肺熱毒氣攻兩眼生瘡赤痛決明子微炒菊花秦皮去粗皮銼黃連羚羊角屑黃芩去黑心葳蕤山梔子去皮生乾地黃焙秦艽去苗土升麻各一兩車前子地骨皮青葙子白茯苓去黑皮各一兩半上為散煉蜜丸如梧桐子大每服三十丸食後溫水下臨臥再服決明散出聖濟總録治眼內生瘡爛赤癢畏風麥門冬去心焙菊花白附子炮半兩石決明刮洗二兩沉香銼秦皮去粗皮銼巴戟天去心桂去粗皮牛膝酒浸火焙梔子仁上為末每服三錢匕空心菊花湯調下臨臥再服柴胡散出聖惠方治肝臟風熱眼中生瘡腫痛柴胡去苗川升麻黃芩黃連去須梔子仁車前子決明子防風去蘆頭羚羊角屑甘草炙炒赤銼馬牙硝玄參以上各一兩上粗搗篩每服四錢匕水一盞入生薑棗俱一同細煎取七分去滓服食後日二次獨活散治頭目陽明邪攻注眼目牙齒齦肉腐痛兼治偏頭痛攻注眼目川芎獨活羌活防風各三錢細辛二錢鄆薄荷荊芥生地黃各三錢上為末天目水煎去滓食後服芎菊散出聖濟總録治眼角太陽穴頭面俱痛眼見黑花目漸昏暗芎藭白芷防風各二兩細辛去苗葉石膏水飛甘草菊花各半兩上為細末每服用一錢匕食後茶調服治眼眉骨連頭疼出聖惠方羌活甘菊花芎藭甘草赤銼旋覆花各半兩石膏一兩上為末每服四錢以水一盞煎至六分去滓每服於食後溫服忌炙爆熱面香甲散出聖濟總録治風熱頭痛目疼連額角甘菊花二兩芎藭一兩甘草生用生橘皮湯浸去白焙檀香銼各半兩上為散每服二錢匕沸湯入鹽少許點眼不拘時候通頂散出聖濟總録治風頭目痛及偏頭痛地龍去土龍腦研瓜蒂赤小豆馬牙硝上各等分搗研為細散每一小豆許吹入鼻內偏頭痛隨左右用含水搐尤佳芎藭散出聖濟總録治頭目偏痛時多暈眩鼻中壅塞臭芎藭白附子滑石槐芽各三錢細辛去苗葉一錢上為細散入生龍腦半錢匕同研極細每用一匙搐入鼻中蚡鼠土膏出聖惠方治初發眼風頭疼川芎散出德生堂方治初患發眼風頭疼甘菊花川芎荊子各一兩薄荷二兩上為細末加生蔥三寸熬黑豆水入茶末少許每服二錢食後調服地龍散出聖濟總録治眼眉骨及頭腦俱痛地龍二錢去土穀精草一錢乳香研一錢上為細末每用半錢於燒香荊子上取煙用紙片子罩熏鼻中偏痛隨左右用之又方出聖惠方治眼熱毒攻眉骨及頭疼壯熱不止川大黃解毒子木香各三分上為細末以漿水調為膏於生絹上勻攤貼燲干即易之石膏散出御藥院方治腦熱鼻塞頭目昏腫石膏水飛二錢龍腦一錢另研上為細末用少許鼻內搐之選奇湯出衛生寶鑑方治眉骨痛不可忍大有神效羌活防風二錢甘草二錢酒黃芩冬月不用熱甚者用上以粗末每服稱三錢水二盞煎至一盞去滓溫服食後時服之二陳白丸出仁存方治眉心眉稜骨疼及治臂疼或麻木或戰掉服二陳湯吞青州白丸子目眵䁾附論夫目者臟腑之精華肝之外候津液之道也若臟腑挾熱內重於肝沖發於目使液道熱澀結滯於眥瞼則成眵䁾方羚羊角散出聖濟總録治風熱沖肝上熏於目結成眵䁾羚羊角二錢犀角二兩防風去叉牛膝去苗羌活去蘆頭桑根白皮銼五味子生乾地黃焙白蒺藜炒去角芍藥各三錢上為細散每服二錢水一盞煎至六分不去滓食後臨臥溫服澤瀉丸出聖濟總録治臟腑挾熱沖發於目津液結滯而成眵䁾澤瀉茺蔚子菟絲子酒浸搗別石斛去根山芋各一兩半地膚子五味子生乾地黃各一兩細辛去苗葉半兩上為末煉蜜為丸梧桐子大每服二十丸空心溫服臨臥再服秦皮湯出聖濟總録治目生眵䁾淋洗秦皮去粗皮柴胡去苗黃皮黃連去須蛇銜各二兩苦竹葉二握細辛一兩上粗搗篩拌勻每用二兩以水六盞煎取三盞去滓熱淋洗冷再暖曾青散出危氏方治目生眵䁾宜點此藥曾青水晶各一兩真珠龍腦與真珠各等分琥珀半兩上研如粉以銅器收盛臨臥用銅箸點如黍米許蕤仁膏出聖濟總録治目眵䁾宜點此方蕤仁研馬蹄決明搗末黃連各一兩黃柏末二錢上為末用白蜜清者二升和勻入銅器中以油單紙密封於飯上蒸之飯熱為度取出綿絞去滓後入輕粉二錢龍腦末一分攪和勻入銅器中以蠟封口旋取如麻子大點眼眥頭日再黃連膏出聖濟總録治目多眵䁾黃連去須蕤仁研各三分乾薑為末膩粉各一分上除膩粉外用牛乳三合漬之一宿明旦於微火上煎至一合去滓取清汁入膩粉攪和每用銅箸點如黍米許安眥頭日三黃柏膏出聖濟總録治風熱眥目多生眵䁾黃柏銼一兩蕤仁半兩大棗青州者三枚擘上以水三升同納碟磁器中慢火熱煎至一升去滓取清汁再以淨瓷瓶子收每用銅箸點眼日三五度療數歲䁾眼爛眥方出肘後方用枯荷葉中心一把著鐺子中水五升煮水上縛板穿板作孔目臨孔上瘡當痛俟出淚一二升便瘥目䀮附論夫目者肝之外府也臟腑氣虛不能上注於目精華衰弱又為風邪痰飲所攻故使瞻視不明而䀮也或見飛蠅黑花者久成障翳也方藍實丸出聖惠方治肝臟風熱兩目䀮䀮視物不明藍實決明子青葙子枳殼川大黃銼細微炒黃連去須地膚子甘菊花甘草炙微赤銼蕤仁湯浸去赤皮茺蔚子車前子羚羊角屑防風去蘆頭生乾地黃細辛赤茯苓各半兩兔肝一具鯉魚膽七枚上為末煉蜜和搗二三百杵丸如梧桐子大每於食後以清粥飲二十丸青葙子丸出聖惠方治風熱壅滯眼不得見物目淚出䀮䀮不見物青葙子決明子車前子甜葶藶隔紙炒令紫色細辛五味子各半兩麥門冬去心焙一兩生乾地黃枸杞子茺蔚子防風去蘆頭澤瀉地膚子桂心菟絲子酒浸三日曝乾另搗為末以上各半兩兔肝一具炙乾上為末煉蜜和搗二三百杵丸如梧桐子大每於食後以粥飲下二十丸兔肝丸出千金方治眼睛䀮䀮不明寒則淚出肝脾所損兔肝一具柏子仁乾地黃茯苓細辛各一兩蕤仁一兩枸杞子一兩六銖防風芎藭薯蕷各二兩車前子二合五味子十八銖甘草各半兩菟絲子一合上為末蜜丸如梧桐子大每服酒下二十丸日再服加至四十丸薯蕷散出聖惠方治肝臟風虛眼目昏花䀮䀮視不明薯蕷茯苓芎藭防風去蘆頭山茱萸人參去蘆頭枳殼枸杞子覆盆子各一兩甘菊花細辛各三分甘草半兩上為細末散每服以棗湯調下二錢空心夜臨臥再服川升麻散出聖惠方治臟腑中痰實熱毒沖眼遠視䀮䀮川升麻枳殼麩炒微黃去瓤黃芩生乾地黃各一兩半夏湯洗七遍杏仁洗浸去皮尖雙仁麩炒微黃羚羊角屑細辛各半兩赤茯苓甘草炙微赤銼各三兩上為散每服三錢以水一盞入生薑半分竹葉二七片煎至六分去滓每於食後溫服防風湯出聖濟總録治肝虛寒目視䀮䀮防風去蘆芎藭白蘚皮各一兩細辛去苗皮甘草炙羌活去蘆頭陳橘皮湯浸去白焙各半兩竹葉十片棗二枚上為七味粗搗篩每服五錢匕水一盞入竹葉棗子同煎至八分去滓下蜜半匙再煎沸食後臨臥溫服黃連膏出聖濟總録治目䀮䀮不明黃連去須一兩蕤仁決明子秦皮各半兩上為末以水八合煎至三合以綿濾去滓澄清點注眼中日三真珠散出千金方治肝氣虛寒眼睛䀮䀮不見物真珠一兩研白蜜二合鯉魚膽黃魚膽各一枚上合和微火煎兩沸綿裹納目中當汁出藥歇更為之車前冬丸出聖濟總録治膈上風熱上衝眼目䀮䀮不明車前子麥門冬去心焙防風去叉枳殼各一兩生乾地黃白茯苓去黑皮各一兩半人參一兩上為細末煉蜜和丸如梧桐子大每服三十丸食後臨臥粥飲下防風湯出聖濟總録治肝虛寒目暗䀮䀮不明視物並生黑花防風去叉一兩一錢芎藭甘草炙銼白茯苓去黑心獨活去蘆頭前胡去蘆頭各二兩人參細辛去苗葉各三分上粗搗篩每服五錢以水一盞半棗子二枚劈破同煎至七分去滓食後溫服日二龍腦煎出聖惠方治目䀮䀮昏暗赤澀怕日淚出難開龍腦雄黃蕤仁銅緑青鹽膩粉各一兩黃丹半兩上都研三兩日可用然後取白蜜半斤攪勻納於一