body:
  text: 卷二百七十二諸瘡腫門諸瘡腫附論夫瘡腫以手指從瘡旁按者按之色不變膿已結成又按之隨手赤色此亦有膿按之白良久方赤遊毒已息可就赤白色盡處灸斷瘡肉平實久而赤腫自消凡溻漬瘡腫之法宜通行表發散邪氣使瘡內消也蓋湯水有盪滌之功瘡腫初生一二日不退四肢者溻漬之腰腹背者淋射之其下部委曲者浴漬之此謂疏導腠理通調血脈使無凝滯也且如藥二兩用水二升為則煎取一升半以淨帛或新綿蘸藥水稍熱溻其患處漸漸喜溻淋浴之稍涼則急令再換慎勿冷用夫血氣得寒則凝澀得熱則淖澤日用五七次病甚者日夜不住或十數次腫消痛止為驗此治瘡腫神良之法也許真君云凡瘡須推究證候消詳苗惡走胤不止先看血色硬用手熨之如紅氣朝可以治黑氣朝其病難治急用藥截之服奪命丹返魂散里托如𤺌慢不走皮不破則用膏藥敷之如頭上有瘡兩手足上大指節正傍刺血看之知瘡緊慢如不見血手腕後四指骨上針破浮皮有紅血出可下藥如黑血出不可治更於兩肘上四指下針破浮皮血出紅色可下藥黑色不可治又令患人正坐耳對於肩骨又令患人低頭用兩大指甲掐定破浮皮如得有鮮血出可治無血又去頭心用指甲捻著沉處用針刺破浮皮如有血出即將藥在瘡口內用棉花子就血封定疼痛不可忍者其血紅色痛極有汗出者可以治之痛無汗出血黑色者乃死證也如治此等瘡但令親人伏侍外人勿入房人來相覷亦不得食蔥韭蒜葷及一切魚腥物並油麵十日外可得食也又云下利已腫處未消者可除大黃用生地黃及乾地黃隨時也熱漸退餘風未歇者可服五香連翹湯除大黃餘熱未消可敷升麻膏佳若失時不消成膿者用火針膏散如療癰法凡㾫病喜發四肢其狀赤脈起如編繩急痛壯熱喜從腨起至踝亦如編繩故云㾫病也發於腎喜著腋之下皆由久勞熱氣盛為濕涼所折氣結筋中成此病也若不即治其久漬膿亦令人筋攣縮也若不消潰其熱氣不散多作趺病漏蘆湯主之瀉後鋒針數針去惡血氣針寫其根核敷用小豆末取消為度又用治丹法治之亦用治癰三味甘草散敷之若潰敷膏散如癰法方解毒丸出德生堂方治一切諸毒瘡痍咽喉腫痛貫眾茯苓黃藥子藍根乾薑地黃雄大豆甘草滑石縮砂仁陰地厥薄荷各二兩土馬鬃綠豆粉益智仁寒水石山豆根紫荷車馬屁孛草龍膽白殭蠶炒百藥煎大黃各一兩上各洗淨焙乾為末用蜜拌蒸餅丸如小彈子大每一丸細嚼新水送下小兒一丸分作四服熬薄荷湯令冷磨下用銀箔為衣乾地黃丸乾地黃四兩大黃六兩桂心王不留行黃芩麥門冬去心遠志升麻人參甘草炙枳實炙各二兩芍藥茯苓各兩上搗篩蜜和丸如梧桐子大酒服十丸日三加至二十丸常服令人肥健撮毒散治一切硬腫癤並惡物咬傷湯火燒車輾馬踏等傷之證檳榔山梔子白龍白芨白蘞白芥子五靈脂木鱉子上各等分為末如瘡破搵干貼如腫硬水調掃於瘡上立效如聖散蒼朮十六兩去皮防風八兩去蘆白芷八兩細辛五兩去苗川芎十兩川烏八兩草烏四兩上都生為細末善治金刃所傷如覺傷著藥到血定以軟帛牢系定舊瘡多日不可去瘡痂口噙漿水洗淨搵干貼三兩上即愈蛇咬蠍螫漿水洗淨用藥貼一切小蟲傷無日者唾津調藥搭上立愈狗咬著口噙水洗淨用藥乾摻上即愈破傷風初發覺時用藥一錢熱酒一盞調服一服盡了如重車行五七里汗出為驗如無汗再服半錢涎出為驗蜘蛛咬傷病重每服一錢半多時汗不出再加藥一錢依前投之涎出為驗蜘蛛咬傷津唾調搽疼處婦人洗頭風用藥一錢酒調服汗出為度腫癤丹瘤其痛處不止新汲水調藥毛翎搽上三兩次痛即止湯火所傷新汲水調藥揭去死皮掃之魚睛麻根紅絲疔瘡發背搭手疽鬢疽裡外臁瘡覺痛時新汲水調藥塗上用藥一錢酒一盞服之即愈牙痛水漱口後用藥搽立愈偏夾正腦風噙水鼻內搐之吐水涎出即愈頭上干癩風遍身麻木常服此藥無不治之若新杖瘡有血用藥摻上止痛不發其效不可具述此真秘方也復元通氣散出德生堂方治氣不宣流或成瘡癤並㨛挫脅脹氣滯不散及癰疽作赤色初發疼及膿已潰未潰小腸氣腎癰便毒腰疼氣刺腿膝生瘡及婦人吹乳乳癰茴香炒穿山甲蛤粉炒去粉各二兩延胡索去皮白牽牛炒甘草炒陳皮去白各一兩上為末每服一錢熱酒調服不飲酒木香湯調服一方有當歸病上在食後服病在下食前服又方療諸惡腫瘡頭瘡百雜瘡黃連黃柏附子雄黃水銀藜蘆各一兩胡粉二兩上為末以臘月豬脂一斤和藥調器中急密塞口蒸五斗米下熟出納水銀又研令調密藏之有諸瘡先以鹽湯洗乃敷上無不瘥者又方出瑞竹堂方治瘡腫濕兼下疳者黃連生用輕粉海螵蛸生韶粉煅蛤粉生橄欖核燒灰黃柏皮各五錢上為末干貼瘡上愈梔子湯治表裡俱熱三焦氣實身體生瘡或發癰癤大小便不利芒硝湯澄下甘草炙各二兩黃芩知母各三兩大黃四兩別漬梔子七枚上切以水五升煮四味減半下大黃煮取一升八合去滓納芒硝分三服廣濟飛黃散療諸惡瘡雌黃白礬石磁石雄黃曾青丹砂各一兩上各細研依四方色以藥置色處曾青東方丹砂南方白礬石西方磁石北方雄黃中央瓦甕二枚以黃泥下再三過使厚六五分以雌黃屑著下合篩諸藥著上後以半雌黃屑覆上以泥密塗隙勿令泄氣上須厚一宿如常點火點火用二年陳蘆作樵中調火以新布沉水覆釜上干復易九十沸止若日暮七十七沸已足止大熟一斛米飯頃發出藥細研貼瘡其瘡惡肉青黑干不復出汁愈無甕以土釜二枚如上法也黃耆湯治一切瘡腫疼痛並宜服黃耆當歸各一兩大黃芍藥各五錢陳皮甘草各三錢炒上為粗末每服五錢水一大盞生薑三片同煎至七分去滓溫服不拘時候當歸散出濟生拔粹方治諸瘡已破未破焮腫痛甚不可忍當歸黃耆栝蔞木香黃連各等分上為末水煎服無時如痛而大便秘者加大黃三錢療散發生瘡赤焮及丹走皮中浸淫取赤臼一片燒令赤置酢中搗作泥敷之如燥更易以瘥為度療瘡腫方用甘蕉根敷之瘥又方治外風入瘡口腫痛用劉寄奴末搽瘡口止痛五黃膏治一切瘡腫大黃黃芩黃柏黃連薑黃各等分上為細末冷水調敷立效丸蟾酥一錢硃砂二龍腦一字麝香五分上為細末用頭首孩兒乳汁為丸如黃米大每服二丸多效癰腫溫酒送下鼻衄芥子湯下心痛小腸氣茴香湯下小便不通雄鼠糞煎湯下瀉血生薑湯下咳嗽同上小兒驚風沙糖水下白痢乾薑湯下傷食隨所傷物下小兒瀉芝麻煎湯下走疼走痛茶下噎食米湯下小兒熱風薄荷湯下遍身疼痛醋湯下人著鬼祟桃李湯下渾身黃腫木瓜湯下大小便不通墨水下產後遍身疼痛溫酒乳香湯下產後發寒熱蜜水下產後發寒煎金銀花湯下胎死不下童子小便荊芥湯下經絡不行酒煎當歸散湯下鼻衄不止口噙水㗜一丸心疼醋湯下臍下虛冷溫酒下渾身虛腫氣不通酒下臍下水氣煎葶藶湯下若四肢冷背強空心酒下三四丸如人行四五里再服四五丸然後吃鹽蔥白粥後蓋覆出汗立效脾胃虛弱煎枳殼湯下血山崩火燒蠶子灰冷水下血迷煎血見愁湯下或溫酒丁香湯下化堅湯出濟生拔粹方治瘡難消又不能作膿者地骨皮一兩木香半兩穿山甲二錢半炮麝香一字上為細末溫酒調下及治小兒斑疹一切癰腫以米湯調下何首烏散出醫方集成治遍身瘡腫癢痛防風苦參何首烏薄荷各等分上為粗末每用藥半兩水酒各一半共用一斗六升煎十沸熱洗便於避風處睡一覺其痛甚者三日愈內托黃耆散出得效方治諸瘡證腫痛黃耆連翹葛根甘草上等分為末每服三錢水一盞半煎至六分去滓食前溫服治腫毒方知母貝母黃柏皮芙蓉葉上為細末在上蜜調敷在下米醋調敷貼瘡腫以山慈菇取莖葉搗為膏入蜜貼瘡口上候清血出效蜀椒方治瘡腫以生椒末面釜下土末之用大醋和敷烏金散治諸瘡腫用鯽魚一個可重六兩者去腸用柏葉碾細入魚腹內用紙裹數重次用黃泥固濟煅存性候冷碾成細末輕粉一分同勻如瘡干用麻油調瘡濕乾用治瘡中有風水腫痛秘澀青蔥乾薑黃柏上同相和煮作湯浸洗之立愈全蠍散治外風入瘡口腫痛全蠍一個白殭蠶一個去絲蟬蛻三個上為末擂生薑自然汁調塗之治腫毒方用帶泥山藥蓖麻子糯米為一處水浸研為泥敷腫處即愈三聖散治諸瘡腫淄丹二兩白礬二兩飛上為細末每用乾摻瘡口上後用保生錠子捏作餅子貼之透經丸治熱毒腫瘡大黃二兩黑牽牛二兩五錢半生半熟上為細末用皂角十枚揉碎水煮至熟去滓用汁搜藥和丸如桐子大每服二十丸漸次虛實加至四十丸用溫水送下又方治諸瘡腫用撫芎不以多少煅過入輕粉用麻油調塗如瘡濕乾摻追毒烏金散治瘡內惡肉追毒潰膿巴豆半兩寒食麵一兩上用水和麵作餅子將巴豆包定休教透氣以文武火燒深黑色為細末量瘡口乾貼之白芷散治腫毒暑毒水刺腫手背用小烏豆香白芷末水調敷腫處又方治腫毒白礬一兩巴豆二十一個去殼上同入銚內滾數沸礬化開豆色黃黑頓冷去豆研為末用葦管吹入喉內即愈治諸瘡腫痛不可忍者出濟生拔粹以葵花根去黑皮搗若稠點井花水少許若不稠不須用水以紙花如膏貼之治諸瘡腫出應驗方以馬牙齒燒作灰和唾調於絹帛上貼之療面目手體生斑或癢或瘭子腫起不即治之甚殺人出肘後方用羚羊角燒為灰研令極細以雞子清和塗之極神驗無雞子水和塗之甚妙治熱毒瘡並腫方用家鴨糞以雞子調敷內消治諸瘡癰腫不散者取白芍根搗爛敷貼干則易之無生者用末水調塗之亦得治諸處皮裡面痛取何首烏以薑汁調成膏痛處以帛子裹之用火炙鞋底熨之妙治瘡腫用象膽以清水和塗瘡腫上並瘥治風癢及諸瘡腫瘑瘡疽癢久不瘥有蟲者煮羊桃洗之良羊桃多生溝渠陘塹之間少加鹽豉尤妙或用枝葉煮洗亦佳治瘡腫出本草以蒺藜蔓洗三寸截之以水五升煮取三升去渣納銅器中又煮取一升納小器中如稠糖取敷瘡腫上治手足腫及熱瘡兼治熱毒丹瘡出本草以田螺生研汁敷之牛蒡粥方療瘡腫取牛蒡根三莖淨洗煮令爛於盆中研令細去筋脈汁中即下米煮粥鹹淡任性服一碗甚良無忌食訖含生乾地黃丸如胡桃大除熱補益也穿山甲散出宣明論治一切通氣破瘡腫行膿血穿山甲木鱉子烏龍角各等分俱燒存性上為末每服一錢半空心熱酒調下至午瘡破膿血便行浴毒湯出御藥院方治諸瘡疼痛堅硬不消及破後膿水不絕惡肉未退好肉不生以干艾葉半兩用何首烏粗末一兩水大碗同煎至半濾去渣稍熱洗冷再暖療一切瘡腫及風丹遍身如棗大出本草以雞腸草燒作灰和鹽敷之一方搗汁敷瘡亦可煮作菜食之或取末以豬脂調敷此藥極效五月五日收得者驗治瘡腫未得頭破者三日後出本草取冬葵子一百粒吞之當日瘡頭開摩風膏出外科精要治頭面五發瘡腫疥癬等疾及湯火破傷摩風滅瘢痕白附子白芍藥白茯苓零陵香白芨白蘞白芷白檀藿香升麻細辛黃耆甘草杏仁去皮尖各半兩黃蠟六兩腦子一分大栝蔞二栝蔞根一兩芝麻油一斤上先藥十四味銼油內浸百日於臘日慢木炭火上銀石器內煎至白芷微黃色離火入栝蔞二味著內煮百沸重綿濾去渣再慢火上煉油香下削淨黃蠟熔開為度傾在瓷器內收貯上摻腦子密封旋用摩風塗之治瘡腫出本草以蛇莓草熁之治諸瘡因風致腫出本草以櫟木炭根三十斤銼以水三斛濃煮納鹽一把漬瘡出膿血日日為之瘥止將軍鐵箍膏出德生堂方治諸惡毒瘡紅腫突起用藥箍瘡四圍不令滋蔓走疰毒氣南星一兩草烏三錢烏川五錢雄黃三錢大黃一兩鹽霜白梅一兩蒼耳根一兩白芨防風白蘞各五錢上為細末先用蒼耳根鹽梅搗爛和余藥調成膏如干入醋調得所於瘡四圍用藥作鐵箍塗上止留瘡高突處藥干以雞翎蘸水掃之日換二三次大妙治諸瘡腫馬毒瘡出本草以馬齒莧水煮冷服一升及塗瘡上治濕癬白禿以馬齒膏和灰塗之效治緊唇面腫搗汁塗之冬月乾末水調塗治丹毒發背腫搗敷之不住者以藍靛和之更佳治多年惡瘡搗爛敷之尤良治三十六種風結瘡取馬齒莧一石水二石一釜煮之澄清內蠟三兩熏煎之成膏塗瘡上並服之療毒瘡腫痛號叫臥不得人不別者出手集方取獨頭蒜兩顆細搗以麻油和厚敷瘡上干即易之頃年盧垣侍郎東畿人肩上瘡作連心痛悶用此便瘥後李僕射患腦癰久不瘥盧與此方便愈絳得此方敷救數人無不神效治因瘡而腫赤皆因中水及中風寒所作其腫入腹則殺人出本草多以桑灰淋汁漬冷復易取愈梅師方同治熱瘡惡腫出本草以青黛摩敷之治瘡腫除膿血生肌膚長筋骨出本草以楸葉搗敷上亦煮湯洗膿血冬取干葉湯揉用之治瘡腫除血長膚出本草以紫荊木煮汁洗之破棺丹出衛生寶鑑治瘡腫一切風熱大黃一兩半生半熟甘草一兩芒硝一兩上為細末煉蜜和丸如彈子大每服半丸食後溫酒化下童子小便半盞研化之忌冷水如聖散出華佗中藏經中治一切無異色瘡退腫消毒並閃肭折傷接骨定痛活血養脈已破者不可用赤小豆一升川烏頭一兩草烏頭一兩炮乳香半兩蕓薹子一兩上件同為細末每用一錢入白麵一錢瘡腫用水調稀煮一兩沸放溫攤紙花上貼患處傷折用醋調膏損用黃米粥調可患處大小敷之用帛子纏系或以沙木篦夾五日一換六十日當瘥治結成實腫未潰小便不通者出百一選方以蔥不拘多少碎切入麻油內煎令黑色去蔥不用只收油趁微熱通手逐旋塗上自消蘇龍丸一名神明膏出衛生寶鑑治一切瘡腫傷折摩風止痛酒調一錢服如有口瘡含化赤日塗之或口面風癬瘙癢遍身瘡疹痛並塗膏摩令熱赤即佳耳鼻中有肉鈴用紙捻子每日一點一月取下久瘡及治小兒瘡瘤湯火傷但是痛處貼著便愈其次等膏可以作面油遍治肺風黑䵟滅瘢痕出顏色生栝蔞一個用皮用仁赤芍藥甘草杏仁湯浸去皮尖用當歸人參桃仁去皮尖各稱一分川芎蒼朮桑白皮各半兩沉香研極細零陵香藿香各半兩上並細銼以清麻油十五兩浸四十九日候日足先傾出令去油以活炭火煉令香熱放冷入諸藥文武火養自曉至昏黑候藥色半焦用生絹漉去渣卻入大鵝梨一枚裂取自然汁並黃蠟一兩半麝香一分重煉候油不滾起即成蓋梨汁盡故也入細研生腦子末一分或半分攪勻後以新綿濾入通油瓷閤中所餘藥滓次日再以油六兩煉半日濾出仍入鵝梨一個取汁蠟一兩半麝香一分研用一候油不滾起更入腦子半錢細研攪勻濾出取如前法為次等膏貫眾湯出衛生家寶方洗瘡腫不散貫眾不以多少茱萸三五錢朴硝三五錢上用淡醋半升水二升同煎至二十沸去滓先熏通手洗之消毒犀角散治一切諸般大人小兒瘡癤眼目口舌咽喉臉腫腮結核癰遍身小兒瘡疹丹毒赤癗三四服快透消毒神效防風八分荊芥三錢半甘草一錢牛蒡子一兩上㕮咀每服三錢水一盞半煎至一盞食後三服靈鼠膏出經驗方治瘡腫去痛以大黃鼠一枚渾用清油一斤慢火煎鼠焦於水上試油不散即以綿濾去渣澄清重拭銚子令淨以慢火煎上件油次下黃丹五兩炒令色變柳木篦子不住手攪令勻再於水上試滴候凝即下黃蠟一兩又熬帶黑色方成膏然後貯於瓷閤中放在土地上出火毒三兩日敷貼瘡腫去痛而涼瘡癤瘤腫出儒門事親夫大人瘡癤小兒赤瘤腫之疼痛不止內經曰夫諸痛癢瘡瘍皆屬於心火可用一咒法禁之法者是心法咒曰龍鬼流兮諸毒腫癰瘡膿血甚發痛志心稱念大悲咒三唾毒腫隨手消上一氣唸咒三遍用望日月燈火取氣一口吹在瘡腫丹瘤之上右手在瘡上虛收虛撮三次左手不動每一氣復念三遍虛收虛撮三次百無禁忌用之時心正為是此法得於祖母韓氏相傳百餘年用之救人百發百中若不食葷酒之人其法更靈病瘡腫者大忌豬魚兔發熱動風之物此法不得輕誨無藥處可附之諸瘡附論諸瘡雖不能害人然浸淫無已亦有多年不獲愈者此皆心腎不濟飲食不節腸胃停留以致風毒與血氣相搏凝滯於肌肉之間而發露也其名曰瘡治有異焉凡人體虛感受風熱濕毒之氣發為瘡痛癢焮腫身熱多汗是為惡瘡或生於手足間相對如新茱萸癢痛折裂搔則黃汁淋漓有孔如窩久而生蟲是為窩瘡或初生如飯粒漸大而有根頭破血流膿出肉反如花開之狀是為翻花瘡或初生甚小先癢後痛汁出浸淫濕爛肌肉延至遍身若從口發出流散四肢者輕若從四肢發生然後入口者重是為浸淫瘡或生於兩耳鼻面間及下部諸竅侵蝕筋絡月中則瘡甚月末則瘡衰以其隨月而生是為月蝕瘡小兒耳下瘡亦名月蝕或毒氣攻於手足指拿肉裡指甲疼痛出血瘡中有蟲是為甲蛆瘡或指頭先腫焮熱掣痛然後於爪甲邊結膿甚者爪甲俱脫是為代指或人稟性畏漆見漆則中毒面癢而腫繞眼微赤癢處搔之隨起㾦癗重者遍身如豆如杏膿焮作痛是為漆瘡或盛夏腠理易開風熱毒氣轉於皮膚輕者狀如撒粟重者熱汗浸瀆匝匝成瘡日痱瘡或神心郁躁遍身發瘡多出膿血赤爛如火曰熱瘡或身觸風寒冷氣於致血澀不行其瘡頑滯不知痛癢經久難瘥曰冷瘡或身發瘡腫非癰非疽非癬非疥狀如惡瘡或瘥或劇曰無名瘡或頭生白團斑剝如癬上有白皮久則成痂遂至鋪頭瘡中有孔有膿細蟲入里不痛微癢永長不瘥曰禿瘡或風熱毒流注兩腳生瘡腫爛疼痛步履艱難惟生於臁骨者為重曰臁瘡以其骨上肉少皮薄難愈至有多年無已瘡口日開皮爛骨見臭穢可畏者先當取蟲然後敷藥或淫夫龜上生瘡初發如粟拂之則痛由是出清膿作臼孔侵蝕臭爛日漸大痛曰妒精瘡以婦人先有宿精在內或月水未斷與之交接滌穢不前傅氣而作婦人亦有生於玉門者曰陰蝕瘡或滿頰滿項發如豆梅癢而多汁延蔓兩耳內外濕爛如浸淫瘡之狀曰走皮延瘡田野呼為悲羊瘡已上數種名目不同治各有方方療天下雜瘡丹砂雄黃芎藭椒防己各五錢龍膽梧桐皮柏皮竹茹桑白皮蜂房蝟皮各四兩蛇蛻皮一具上切以苦酒浸半月微火煎少時乃內蜡月豬脂三斤煎三上三下去滓以敷瘡上並服如棗核大良又方翦草胡礬硫黃白芨紫荊皮各等皮斑蝥少許上為細末入大楓油和勻若病攣身生瘡癢甚者揉後痛不可忍用此藥再加香油調搽渾身旬日之後肌體妙復加味當歸飲子治瘡癢諸痛癢瘡皆屬心火火鬱則發之當歸生地黃升麻各五錢防風二錢半荊芥穗何首烏各二錢白芍藥柴胡川芎羌活黃耆各三錢紅花蘇木甘草各一錢上㕮咀每服五錢水二盞生薑三斤同煎至八分去滓食後臨臥通口服沐浴取微汗效速使血氣通和服之應效何首烏散出楊氏家藏方淋渫諸瘡何首烏威靈仙苦參艾葉荷葉上五味各三兩上件㕮咀用水五升煎數沸乘熱熏病處通手即渫洗如腳氣小腸氣去苦參加蛇床子二兩治諸瘡取鯽魚燒以醬汁和塗之治瘡瘍方石膽丹砂雄黃礬石磁石上用黃堥黃堥即瓦合也製藥於其中燒三日三夜其煙上者以雞羽掃取注瘡中惡肉破骨則盡出即愈嘗謂雄黃治瘡癢尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云醫方合五毒之藥即此楊大年筆記其事族人楊嵎年少時有癢生於頰連齒輔車外腫若覆甌內潰出膿不輟吐之痛楚難忍療之百方彌年不瘥人語之依鄭法制藥成注之瘡中少頃朽骨連兩牙潰出遂愈後便安寧信古方攻病之速也作之合黃堥音武若今市中所貨有蓋瓦合也近世合丹藥猶有用黃瓦罐亦名黃堥事出於古也射香輕粉散治血疳瘡陰蝕疳瘡耳疳瘡一切惡瘡皆治輕粉麝香各半錢乳香沒藥白礬飛過各一兩上為細末量瘡干貼五香湯治諸瘡毒氣入腹托裡外邪主熱毒氣猝腫痛諸發或結核似癰癤而非使人頭痛寒熱氣急者數日不除殺人疾速愈後毒或觸犯再腫宜服丁香木香沉香乳香各一兩麝香上為細末每服三錢水一盞煎至六分去滓空心稍熱服嘔者去麝香加藿香一兩渴者加人參一兩大抵專治毒氣入腹煩悶不通者其餘熱渴昏昧口燥咽乾大便硬小便澀者未可與服治諸疾瘡綠豆粉一斤獨顆蔥五十個藜蘆一兩蝸牛一百五個活者上將蒜粉蝸牛一處炒黃色曬乾與藜蘆相合為細末調搽瘡上後用紙花貼定以新汲水時掃勿令乾消毒散治諸般瘡疾大力子四錢荊芥二錢防風四錢甘草二錢上為末每服二錢水煎一盞調服葵花散治一切瘡一名百花散鬱金黃連黃柏梔子仁葵花各等分上為末冷水調成膏貼瘡痛處神效治瘡洗方古大墓多石灰汁夏月行人有瘡者見墓中清水因自洗浴瘡偶愈於是諸病者聞之悉往洗之轉有飲以治腹內疾腹上臍右近下瘡柴胡二錢升麻半分石膏一分當歸稍半分黃芩三分黍黏子二分蘇子半分連翹一分半甘草生半分瓜三稜五分炒黑色上為粗末作一服水煎去滓服赤豆散赤小豆吳茱萸赤色白膠厚黃柏黃連貝母硫黃糯米焙乾各一分黃丹煨半分上為末麻油輕粉調抹槐枝煎湯先洗後抹苦參散治肺風上攻眉額生瘡苦參藍葉威靈仙去土蔓荊實去皮何首烏荊芥穗胡麻子烏藥銼天麻上等分為散每服二錢食後溫酒調下日三夜二洗瘡方苦參荊芥防風露蜂房木鱉子五倍子地骨皮桑白皮白殭蠶上各等分水煎熏洗瘡處佛手散治諸瘡痛不可忍米殼四兩人參六分半川芎陳皮六分半沒藥乳香二錢半麻黃一兩當歸一兩甘草半兩上為粗末每服三錢水煎服蕪荑散治瘡久不瘥蕪荑藜蘆各一兩薑黃青礬雄黃各一分苦參沙參各三分附子一枚上制下篩先以藍汁洗瘡去痂拭乾敷上小兒一炒久剝去之大人半日才剝再敷不過三四度愈治膿泡諸瘡出應驗方大腹子當歸鬚一兩全蠍一錢地花椒三錢生硫黃荊芥各三錢蛇床子一兩枯礬少許上為末香油調敷愈風散治風寒暑濕等瘡並皆治之其效如神菊花去枝梗烏頭炮烏蛇炙地骨皮川芎桔梗苦參各三兩草烏炮二兩上為㕮咀每服三兩用好酒一瓶浸七日取出溫服一盞日食三次忌發風等物神秘方一名地黃膏出肘後方療一切瘡已潰者及炙貼之無痂去膿生肉地黃汁一升松脂二兩薰陸香一兩羊腎脂及牛酥各如雞子大先於地黃汁煎松脂及香令消即納羊脂酥並更用蠟雞子大一時相和暖火煎水盡成膏去滓塗帛貼瘡日一二易故緋一斤亂髮一雞子大許療年深者十餘日即瘥生肉八仙散穿山甲炮白藥子栝蔞仁大黃木黎槐花白礬山梔子上等分停生用水一大盞煎過舍上迎露日未出面東服之金黃散出御藥院方治諸瘡瘍癢極發痛乳香三錢半輕粉一錢白龍骨一兩半瓦粉二兩半滑石二兩黃柏二錢寒水石上同為細末各研令勻每用藥少許時乾摻患處用油調搽之亦可聞香散治一切瘡硫黃蛇床子黃連黃柏輕粉大椒上為細末用芝麻油調搽瘡上將手鼻聞香白散子止痛生肌滅瘢痕牡蠣三兩煅研寒水石一兩半火煅南星炮白殭蠶龍骨以上各三分上細研摻瘡口避風將息勿令見水又蟾蛻為末敷瘡口上瘡藥消風散蔥白十莖細搗豬油去膜搗白礬輕粉水銀各等分上為末調敷之敷瘡如聖散全蠍半兩全者紫荊皮一兩明礬八錢白芨一兩好者斑蝥二錢去翅上研細末如病人腿腳破裂肉皮潰爛腳底穿心用蔥鹽湯洗瘡口用水調敷患處如干再用水潤後瘡隴自落其瘡即愈大有神效內托散治男婦人諸般瘡疾菟絲子大力子破故紙朴硝川大黃各半兩上為末每服七錢在上用食前在下食後應露服之如神大效當歸和血散治瘡瘍未發出內痛不可忍及婦人產前後腹痛當歸二錢沒藥一錢半乳香半錢白芍藥三錢上為細末每服一錢水一中盞煎至七分去滓溫服日二婦人酒煎瘡既發不須用瘡瘍者加人參木香婦人加赤芍藥黃柏散出神效方治蜂窠纏腰等瘡黃柏白芨白蘞以上各等分黃丹少許上為細末涼水調塗復堅散出濟生拔粹方治瘡太陽本經獨活半錢羌活一錢半防風半錢藁本一錢半調經中血氣黃芩生地黃知母各一錢黃連黃柏以上各一錢半五味皆用酒洗散瘡結聚防風梢三錢當歸身連翹各三錢益元氣瀉火於三焦黃耆一錢半人參半錢甘草一錢炙生甘草梢半錢瀉腎間火補下焦元氣補胃橘皮半錢除膀胱留熱漢防己半錢酒洗澤瀉舟楫桔梗各一錢上㕮咀作三服水三盞浸半日煎至一盞去滓稍熱服將二服滓更作一服服藥後不得飲冷水恐再作膿治瘡方出百一選方白礬虢丹飛膠香各五文乳香五十文上同為末用麻油少許輕粉十文同調敷之治瘡方巴豆十四粒去殼麻油二兩黃蠟少許輕粉三十文上同煎巴豆焦黑為度去巴豆不用入黃蠟輕粉攪勻如面油搽瘡上治一切瘡出仁存方鹿梨根蛇床條半斤真剪草四兩用雞腸草亦可硫黃三錢上為末入輕粉同研勻麻油調敷小兒以麻油調點在絹衣上著衣七日不解其瘡自愈又方出仁存方雄黃四兩硫黃四兩松糖四兩明礬四兩枯上用好沙合盛硫黃松糖相和著在合內外以赤石脂固濟封口用炭火煅通紅候冷取出入雄黃白礬共為末麻油調敷治諸瘡出應驗方平胃散二兩明礬一兩枯黃丹半兩芙蓉葉末一兩上同為末用蔥川椒煎湯洗以前藥敷之愈殺蟲方出危氏方雞心檳榔一兩黃連穿山甲十個燒存性麝香半錢上為末用蠟茶末調塗三五日後用蔥湯洗龍骨散出聖濟總錄治髮際瘡初生如黃米大或癢或痛龍骨烏賊魚骨去甲胡粉各半兩鉛丹一錢炒紫色上研細先用鹽湯洗了貼之日三五上三黃膏出危氏方治一切痛瘡青油三兩煎巴豆二十粒微黑色去巴豆入黃蠟一兩化訖研雄黃硫黃各一錢溫入成膏淨洗抹敷之二三次效疹豆後瘡亦用百合散出聖濟總錄治頤頦瘡一名獨骨瘡百合黃柏各一兩白芨一分蓖麻子仁五十粒研上為散用朴硝水和作餅貼之日三五上紅粉散出聖濟總錄治粉鈴瘡繞項赤爛多汁密陀僧煅龍骨各半兩胡粉二錢鉛丹一錢炒紫色上研細挹去膿汁用生油調塗日三夜一墨蒜散治諸瘡著白痂復發大蒜鼠屎京墨上各等分為末敷之日三治種種諸瘡不愈出千金方水銀一兩黃連二兩京墨三分上制下篩以不中水豬膏和敷上不過三度瘥神良若欲多作任入水銀大須熟研其藥唯不治金瘡追毒散出宣明論治生瘡發悶吐逆霍乳螺青甘草各一兩白礬二錢半上為細末每服一錢汲水調下立止回瘡金銀花散出濟生拔粹方治瘡癢痛甚則色變紫黑者金銀花連枝葉生二兩黃耆四兩甘草一兩上㕮咀用酒一升同入壺瓶內閉口重湯內三兩時辰取出去渣頓服之一方無黃耆大豆飲出肘後方治因瘡中風腰脊反脹牙關口噤四肢強直以雞屎白一升大豆五升和炒令變色乘熱以酒沃之微煮令豆味出量性飲之覆身出汗勿觸風敷藥合掌散出澹寮方治身生瘡百藥不效檳榔五個為末硫黃五錢生者研細末膩粉半錢上和勻每服一錢安於手心內油調夜臥時塗外腎不得洗手但拭手令乾可也一二日瘡即愈金粉餅出聖濟總錄治髭鬚瘡膿窠鬱金綠豆粉各半兩白蘞一分上為末用朴硝水和作餅貼之黃香餅出聖濟總錄治鬈毛瘡在頭中初生如葡萄痛不止黃柏一兩鬱金半兩乳香一分上搗研為末用槐花水調作餅於瘡口貼之白龍散出聖濟總錄治睛漏瘡目大眥出膿汁有孔龍腦馬牙硝各半錢綠豆粉一錢上同研極細用燈心蘸藥點之日四五上敗蹄散出聖濟總錄治天柱瘡生脊背上如錢大赤色出黃汁不止驢蹄削二十片燒灰胡粉一分熬麝香少許研上合研末以醋煮麵糊和成膏塗入已破乾摻青金散治疳瘡等瘡稻穰一兩胡椒半錢麝香少許上為細末每日一次乾摻在瘡口內苦參丸出如宜方治血熱氣滯皮膚遍身生瘡癢瘙出血苦參八兩淨荊芥穗四兩上為末糊丸如梧桐子大每服四十丸米湯食後吞下治甜瘡出濟生拔粹方以大棗去核實以綠礬火燒微存性研細貼之如瘡干以小油調塗治久不瘥瘡出海上名方以豬筒骨中髓以膩粉和為劑復納骨中猛火煨香燒出先以溫鹽水浴瘡敷之硃砂透紅丸治瘡蜈蚣一對血竭一錢麝香一錢輕粉一錢蟾酥一錢粉霜一錢硃砂半錢上末將蟾酥為丸每服三丸至五丸冷酒送下敷瘡藥斑蝥七個白礬飛過雄黃研硫黃各五錢松香黃蠟黃丹各一兩上先用香將斑蝥煎熬過次下白礬等藥候煎熟下黃蠟化用黃丹便成膏敷之治瘡疱將出用惡實即牛蒡子炒令熟杵為末每服一錢入荊芥二穗水一大盞煎至七分放溫服如瘡疹已出更服尤妙治諸瘡出應驗方牛皮燒灰明礬等分上為末醋調搓破敷上兼明礬一兩酒半鍾煮化服每日服羊蹄根二斤蒼朮一斤酒糊丸尤治腎臟風蟬蛻散出危氏方治飲酒後遍身癢如風瘡抓至血出其癢止後痛驅風散出危氏法治瘡紅椒開口者七粒連根蔥頭七個上同煮水淨洗用絹衣浥干即愈余甲子夏自柱入歸途中為瘡癢所苦暫憩湘山寺遇長老寂翁授此方數日而愈當歸丸出聖濟總錄治一切風刺面上生無名瘡癤因飲酒炙爆物得之也當歸四兩青鹽二兩上先以水洗當歸乘潤用青鹽摻遍擱在高處三日取下去鹽以當歸曝乾為末滴水丸如綠豆大每服二十丸空心溫灑下露蜂房散治大人小兒頭面上生無名瘡黃水不止露蜂房蛇蛻各一枚上同於碗內燒過為灰每看瘡口大小用膩粉少許和勻生油調雞翎掃之二金散治大人小兒蝕透腮頰初生如米豆名金腮瘡雞內金是肚內黃皮焙鬱金上等分為散先用鹽漿盥漱了貼之忌米食吳茱萸湯出御藥院方治風毒瘡久不瘥吳茱萸川烏頭生用不去皮蛇床子肉桂各一兩荊芥穗附子生用去皮各半兩上為粗末每用藥半兩水半碗煎三兩沸去滓用綿子蘸藥淋掃患處臨臥頻頻用之後用香白散秘方淨肌散出簡易方治一切瘡癢諸證雄黃北芩大黃海螵蛸生硫黃黃柏翦草黃連蛇床子五倍子各半兩上細末用真香油調抹瘡上大有功效石葦散出聖濟總錄治玉枕瘡生枕骨上如癰破後如筋頭石葦原蠶蛾炒上等分為散干貼取瘥治瘡出百一選方用五倍子黃柏二味為末敷之去息肉厭黑子用草蒿燒為灰以紙八九重淋取汁和石灰點之治瘡欲似蜂窠瘥而還發方出聖濟總錄胡粉硃砂各等分上細研為末以蜜和合塗於瘡上三換之即愈治延皮瘡以木和樹皮陳者先將火燒了皮卷入輕粉麻油和合之敷瘡上妙治一切瘡久不結靨及痔漏用生薑連皮切作大片白礬末摻在上火上炙焦枯為末瘡干唾調塗濕干貼之紅玉飲子治瘡氣嘔吐噁心不止干胭脂半錢綠豆粉三錢上研勻新汲水調下只一服立止杏仁膏出鮑氏方用杏仁湯去皮尖研細絹綾去滓少輕粉麻油調大人小兒皆神效水沉膏五靈脂白芨上等分為細末用新水調搽在紙花上貼之治冷漏或脅癰或癤毒成漏者明礬一半飛一半生用飛者生肉生者匝膿用一錢半五靈脂揀去砂石十分乾淨另研和合用半錢上用軟皮紙用口唾裁下津唾於藥末內一蘸捻成小紙捻子卻用香油搵濕略干放於藥末內搵拖過帶藥末捻令剪作小段子應約瘡大小用每一小段子帶藥紙捻安入漏瘡孔內如早晨安一個至日午另換一個候內中黃白瘀膿出盡令後當有些小血水出方得膿塞出盡方可住藥自然生肉痊可瘡藥檳榔散檳榔海桐皮藜蘆菖蒲各一兩䕡茹二兩百部一兩雞腸草二兩剪草一兩貫眾一兩蛇床子二兩山梔子芮草各一兩上為㕮咀同一處微火炒至焦黃色為度作細末用香油調搽瘡上次入雄黃白膠香為妙瘡藥出御藥院方用粉米不以多少炒存性為細末鵝梨汁調塗害處紙花貼治諸瘡胬肉如蛇出數寸出聖惠方用硫黃細研於肉上薄敷便即縮燥著唾塗烏梅膏出聖惠方治諸瘡中新胬肉出不瘥者以烏梅肉蜜和捻作餅子如錢厚以貼瘡又以燒灰敷之亦佳並治馬汗瘡一方用烏梅屑敷之佳治諸瘡馬勃俗人呼為麻勃紫色虛軟狀如狗肺彈之粉出敷瘡用之甚良也治諸般疔腫惡瘡骨疽蛇露身癢瘑疥癬等瘡久不瘥者出肘後方用蛇蛻燒末和水調敷上一方治身體白駁以醋調敷上佳一方燒灰豬脂調敷或只用灰亦可或取皮熟摩瘡上數百遍訖治一切瘡出本草以蕪荑和沙牛酪塗之陳者良治時疾熱瘡湯火瘡爛撲損傷折瘀血以小麥麩醋炒貼窨綠雲散一名桑葉散出衛生家寶治肺毒氣瘡如大風疾以桑葉好者淨洗過熱蒸一宿後日干為末水調二錢服一方加防風治損瘡中風者兼凍瘡出肘後方以秦椒用面作餛飩灰中煨使熱繼使口開封其瘡上冷即易之又法去閉口者水洗面拌煮作粥空腹吞之以飯壓之重者可再服以瘥為度或取蜀椒五兩水五升煎到四升去滓乘熱漬痛處以瘥為度一方生蜀椒五兩面合裹椒勿令漏氣分作兩裹於煻灰中煨熟及熱出之刺頭作孔當瘡上暗使椒氣射入瘡中冷則易之須臾瘡中出水及遍體出汗即瘥治瘡用慈竹筍籜灰油和塗之妙治諸惡瘡寒熱胸中生瘡以豉為丸服丹疹搗塗瘑瘡久不瘥炒乾為末以油調敷之並良治小兒頭瘡及婦面瘡以菟絲子絞取汁塗之治頭耳瘡以馬頭骨燒灰敷頭耳瘡治多睡作枕枕之佳治大赫瘡此患急宜防毒氣入心臟出肘後方飲枸杞汁瘥一方灸之以蜣螂乾者末之和鹽水敷瘡四畔周圍如韭葉闊狹者治諸般瘡或爛腳氣瘡臁瘡明礬飛川椒各為末黃蠟輕粉上用柏子油燈盞煎沸入前藥再用黃蠟同煎攪勻成膏卻入輕粉如腳氣痛爛瘡先用大蓼煎湯熏洗了挹干敷藥二次立效又方用見腫消土人又多以生苗葉爛搗貼瘡治疳瘡生身面上汁黃者以葵汁黃者可取根作灰和豬脂塗之其性冷若熟食之亦令人熱悶甚動風氣治瘡中毒以商陸根汁熱布裹熨之冷即易治豌豆瘡以蔓荊根搗汁挑瘡破敷上三食頃根出治諸瘡寒熱毒痹牛馬六畜瘡口生蟲生搗鼠李敷之或和脂塗皆效鼠李子味苦採取曬乾九蒸酒漬服三日再能下血及碎肉除疝瘕積聚冷氣大良芙蓉敷方出聖濟總錄治腮頷腫痛或破成瘡芙蓉葉不拘多少上搗爛敷之以帛系定日一換療身體及頭悉生瘡取榆白皮炒令黃搗為散以好酒和塗上又以綿裹覆上蟲出即瘥治瘡方出應驗方以絲瓜兒根熬水掃於諸瘡上大涼即愈治久瘡有蟲者出應驗方用柏木節燒油塗之治瘡不能穿者出應驗方用野百合子鹽捶爛敷之佳赤小豆方出朱氏集驗方治善惡瘡疥或赤腫無不愈者用赤小豆七七粒為末敷之愈或以水調敷瘡及四旁赤處落則再敷又方銼散每服二錢水一盞煎服仍用新汲調藥敷緣赤豆粉黏物既難乾難揭則用苧根為末和之便不黏此法尤佳昔仁宗在東宮時常患痄腮命道士贊能治療取赤小豆七七粒為末敷之而愈中貴任承亮在旁知狀後自患惡瘡瀕死尚書郎傅求授以藥立愈問其方赤小豆也久之醫官過豫章或苦脅疽既至五臟醫者治之其效承亮曰君得非用赤小豆耶醫驚拜曰某用此活三十口願勿復言有僧發背如爛瓜周鄰家乳婢疽作用之皆如神其法細末水調敷瘡及四旁赤腫藥落再敷之蛇纏瘡出危氏方以雄黃為末醋調塗仍用酒服丸為蛇傷及蜂蠆蜈蚣毒蟲顛犬所傷皆可用之又方用鏡面草入鹽搗爛敷瘡頭上立效治瘲瘡發歇不止出直指方以凌霄藤並葉煎湯溫洗數次效凌霄傍松柏又方出本草治瘡以藎草煮湯洗瘡有效療瘡方出本草用荊木燒取汁敷之瘥當歸黃耆湯出濟生拔粹方治瘡瘍臟腑已行如痛不可忍者當歸地黃黃耆川芎地骨皮芍藥各等分上㕮咀水煎如發熱加黃芩如發躁不能臥者加梔子如嘔則是濕氣侵胃倍加白朮雞內金散治穀道邊生瘡久不愈者以雞膍胵不拘多少是雞膍內去下之黃皮燒灰最要存性候冷研為極細末每用一大捻干貼之如神治急疳口鼻中用沒石子為末吹下部即瘥治疳䘌食口齒及下部以飛廉根燒灰搗篩以兩錢匕著痛處痛甚強忍之若不痛非疳也下部蟲如馬尾大拘纏出無數十日瘥十日平復治病狀如癩猝不成瘡每旦瘡上退白皮一升許如蛇蛻者出危氏方服雄黃解毒丸三四服安治諸瘡不消已成膿懼針不得破出肘後方取雄雀屎水調塗瘡頭上治雜瘡及滅瘢痕出本草用寒食飯細研敷之白瓷水摩塗之定州者良敷瘡藥出本草治惡瘡以黃藥子四兩為末冷水調敷瘡上干即旋敷之治惡瘡疥身瘡頭瘡不止出千金方用石澗所生堅小菖蒲一寸九節者為末油調敷一方無油調治爛瘡累治不可者用杜牛膝並鹽泥搗爛敷患處其肉自有如米顆之狀俱出自愈替針散治破瘡用蛾口繭一個燒灰酒調服即透切不可用兩個三個繭兒燒服漏瘡不幹及瓦疱瘡用紅玉散敷如不效再用揀紫蘇葉為末摻之尤妙治一切瘡及蠶瘑出本草以鱧腸草搗敷之治因瘡風中腰脊反張牙關口噤四肢強直出本草以鼠頭和尾燒作灰細研以臘月豬脂敷之療燈豆瘡殺一切蟲及治疥癬出肘後方服麻油一升須利即不生白漿大效用青牛溺摩數百度疔毒瘡肉中突起如魚眼狀赤黑燥痛是寒毒之結變此疾始作服湯及如丹法瘥一方以白麻油調敷之治天疱瘡天花粉軟滑石各等分為末水調搽又方用無名異為細末井花水調敷之愈治諸瘡及腎臟風出應驗方烏藥順氣散一貼枳殼散一貼上和為一貼每天明方醒用銅錢挑一錢舌舐吃如腎臟風入吳茱萸一錢八角茴香末一錢和勻如前服治金瘡灸瘡火燒瘡等方出十便良方蠟如核桃仁杏子一抄爛搗檳榔一枚熏陸香半合上和搗以豬脂煎即以此藥塗帛上貼瘡此方甚效治諸瘡中風寒水腫犯毒露者出本草以薤白生杵敷之一方用韭治黑瘡出本草以山蛩蟲燒令黑敷之膩粉散出御藥院方治皮膚受風邪發作癢痛諸瘡膩粉二錢藜蘆末半兩狼毒末三錢上拌勻每用干搽患處楓香散出御藥院方治諸風毒瘡發癢白屑起楓香脂大黃輕粉各等分上為細末生油調稀搽患處治瘡若專利臟腑非宜也蓋瘡癬為患因內有所蘊發在皮膚之間故須用末藥敷在患處而內須服藥以除其根本若只用外藥以敷患處何由得愈服藥方用五積散去肉桂麻黃常煎服須自合者如渾身瘡膿水淋瀝去麻黃加升麻大黃名升麻和氣飲治瘡癖出本草以木煎湯洗之治蚍蜉瘡出本草用山豆根水研敷之治溪毒瘡出本草用漆姑草挼碎敷之療風水爛瘡出本草以雀醫草煎湯洗浴治療痍滅瘢痕疵方出本草以白殭蠶合衣魚鷹屎白等分為末面膏和塗又方出本草黑雌雞糞敷之療雜瘡出本草以五月五日采蘩縷曝乾作屑敷之有效治黃水瘡出本草以榲桲皮搗末敷之止黃水煨腎丸出澹寮方治遍身生瘡陰囊兩腳尤甚耳癢目赤等證草烏一兩鹽一兩入水少許作咸汁浸二宿一日一次翻轉切用銚子炒黃赤色為末豬腰竹刀去膜入鹽煨熟竹刀碎研爛入草烏內上二味研勻醋糊丸梧桐子大大人五十丸小兒三十丸空心鹽酒下黃耆膏經驗方治一切瘡癤人參黃耆各三錢當歸半兩香白芷細辛去葉羌活各三錢上件六味銼碎用清油六兩同前藥一處慢火內熬令黃耆微黑為度濾去前藥只用油入沒藥末三錢黃蠟二兩同油攪勻盒子盛候冷用之門賓林用卿在鄂渚鬢間生癤三四頭雖不甚大其痛徹腦寢食俱廢或曰疽眾藥弗效外醫侯迤用此即時痛止遂求得方治瘡出百一選方紅茶大黃一分焙乾小粉焙之炒令青黃色平上為細末乾者冷水調濕者乾摻敷瘡藥出澹寮方當歸芍藥各八錢黃耆七錢木香一兩光粉一兩半桑皮一兩半微去粗皮白芷檳榔三錢甘草半兩生用上為末麻油或蠟膏調敷瘡上敷瘡藥出澹寮方全蠍七個去毒並尾爪梔子七個上以麻油煎黑為度去二味入少蠟令如膏子用塗瘡也土朱散出朱氏集驗方治一切瘡土朱虢丹牛皮膠上細末用好酒一盞溶牛皮膠入此二味和勻澄清吃清酒藥留卻敷之瘡上干又再貼治一切瘡出朱氏集驗方以平胃散用麻油敷之立效五香連翹散出朱氏集驗方治風氣瘡自上而下調之風瀝自下而上雞嘴連翹丁香沉香藿香南木香桑寄生甘草麝香一兩上為細末白水煎服食後服又用牛尾蕨根謝姿根又名赤葛根子二味槌碎酒三碗渾服並用洗瘡口潰爛之後亦用此藥洗直要潔淨大惡忌白物豆腐面白羊白雞白豬一切白物皆忌之如服藥後小便淋瀝用五苓散加葵子木通煎吃此方得之艱用之收效又方出朱氏集驗方藜蘆羅過三碗生用每以三碗曬將兩碗入硫黃一兩蛇床子三錢輕粉少許斑蝥荊芥各五錢大椒三錢上同為末熬麻油乘熱清調臨臥塗疥瘡上次以煎藜蘆一味入甘草三五十錢同為末每服半錢酒調酉時服名涼肺散大忌炒豆黃菜用之果效聖愈湯出試效方治諸瘡血出多而心煩不安不得眠睡此亡血故也熟地黃三分生地黃三分當歸身半錢川芎三分黃耆半錢人參三分上件㕮咀都作一服水一大盞半煎至一盞去滓少熱服不計時候汗之則瘡已出衛生寶鑑丁巳委予從軍回住於曹州界以事至州有趙同知謂予曰家舅牛經歷病頭面腫赤耳前後尤甚疼痛不可忍發熱惡寒牙關緊急涕唾稠黏飲食難下不得安臥一瘍醫於腫上砭刺四五百餘針腫痛不減其痛益甚不知所由然願君一見遂往診視其脈浮緊按之洪緩此寒覆皮毛郁遏經絡熱不得升聚而赤腫經曰天寒則地凍水冰人氣在身中皮膚致腠理閉汗不出血氣強肉堅澀當是之時善行水者不能行冰善穿地者不能鑿凍善用針者亦不能取四厥必待天溫冰釋凍解而水可行地可穿人脈猶是又曰冬月閉藏用藥多而少針石者宜以苦溫之劑溫經散寒則已所謂寒致腠理以苦發之以辛散之宜以托裡溫經湯麻黃苦溫發之者也故以為君防風辛溫散之者也升麻苦平葛根甘平解肌出汗專治陽明經之邪故以為臣血留而不行則痛以香白芷辛溫當歸身辛溫以和血散滯濕熱則腫蒼朮辛甘溫體輕浮力雄厚能泄膚腠間熱人參甘草甘溫白芍味酸微寒調中益氣使托其里也故以為佐各銼如麻豆大同秤水煮服之以薄衣覆其首以厚被覆其身臥暖所則經血溫腠理開寒乃散陽氣伸大汗出腫減八九再服去麻黃防風加連翹黍黏子腫痛悉去經言汗之則瘡已信哉或曰仲景言瘡家雖身痛疼不可發汗其理何也予曰此說乃營氣不行逆於肉理而為瘡腫作身疼痛非外感寒邪而作疼痛故戒之不可汗如汗之則成痓也又問仲景言鼻衄者不可發汗復言脈浮緊者當以麻黃湯發之衄血自止所說不同願問其故對曰此議論血正與瘡家概同且夫人身血之與汗異名而同類奪汗者無血奪血者無汗今衄血妄行為熱所逼更發其汗反助邪熱重竭液津必變凶證故不可汗也若脈浮則為在表脈緊則為寒寒邪郁遏陽不得伸熱伏榮中迫血妄行上出於鼻則當麻黃湯散其寒邪使陽氣得舒其衄自止又何疑焉或嘆曰知其要者一言而終不知其要流散無窮潔古之學可謂知其要矣托裡溫經湯出衛生寶鑑治寒覆皮膚郁遏經絡不得伸越熱伏榮中聚而赤腫痛不可忍惡寒發熱或相引肢體疼痛麻黃去節二錢半東防風去蘆三錢新升麻四錢葛根三錢吳白芷二錢當歸二錢浙術一錢參一錢炙甘草白芍藥各一錢半上銼如麻豆大每服秤一兩水三盞先煎麻黃令沸掠去沫再下余藥同煎至一大盞去渣宜溫服臥於暖處以綿衣覆之得汗而散至元壬午五月二十八日有人王伯祿年五十有七右臂膊腫盛上至肩下至手指色變皮膚涼六脈沉細而微脈證俱寒舉瘍醫孫彥和視之曰此乃附骨癰開發已遲以燔針啟之膿清稀解次日肘下再開之加吃逆不絕彥和與丁香柿蒂湯兩服稍變緩次日吃逆尤甚自利臍腹冷痛腹滿飲食減少時發昏憒於左乳下黑盡處灸二七壯又處托裡溫中湯用乾薑附子木香沉香茴香羌活等藥㕮咀一兩半欲與服或者曰諸痛瘡瘍皆屬心火又當盛暑之時用乾薑附子可乎予應之曰理所當然不得不然經曰脈細皮寒瀉痢前後飲食不入此謂五虛況吃逆者胃中虛寒故也諸腫瘡瘍皆屬心火是定理也此證內外相反須當舍時從證非大方辛熱之劑急治之則不能愈也遂投之諸證悉去飲食進瘡勢溫膿色正彥和又與五香湯數服月餘平復噫守常者眾人之見知變者智者之事知常而不知變遇事因而取敗者亦多矣況醫乎守常知變豈可同日而語哉出衛生寶鑑托裡溫中湯出衛生寶鑑治瘡為寒變而內陷者膿出清解皮膚涼心下痞滿腸鳴切痛大便微溏食則嘔氣短促吃逆不絕不得安臥時發昏憒羌活三錢黑附子四錢去皮臍炮乾薑炮三錢益智仁一錢炙甘草二錢丁香一錢沉香一錢木香一錢半茴香一錢陳皮內經曰寒淫於內治以辛熱佐以苦溫以附子乾薑大辛熱溫中外發陽氣自里之表故以為君羌活味苦辛溫透關節炙甘草甘溫補脾胃行經絡通血脈胃寒則嘔吐吃逆不下食益智仁丁香沉香大辛熱以散寒為佐瘡氣內攻氣聚而為滿木香茴香陳皮苦辛溫治痞散滿為使也上㕮咀都作二服水五盞生薑五片煎至一盞去渣溫服無時忌一切冷物治爛瘡出本草以梓樹嫩葉搗敷之連翹散堅湯出試效方治耳下至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已膿作瘡未破皆治之柴胡一兩二錢連翹半兩當歸尾半兩酒製芍藥五錢土瓜根一兩酒炒甘草炙三錢草龍膽酒製四次二兩生黃芩半兩蒼朮二錢黃芩酒炒二次七錢黃連酒炒二次三錢廣朮半兩京三稜細銼半兩同廣朮酒製一次微炒乾上見秤一半煉蜜為丸如綠豆大每服一百丸或百五十丸另一半各秤和勻每服半兩水一盞八分浸半日煎至一盞去滓熱服頭低腳高去枕而臥每口作十次咽留一口送下丸子藥服畢臥如常亦緩治法之柴胡連翹湯治男子婦人馬刀瘡柴胡半兩黍黏子二錢中桂三分連翹五錢瞿麥穗六錢甘草炙三錢生地黃三錢當歸尾一錢半黃柏三錢酒製知母半兩酒製黃芩炒半兩上件㕮咀如麻豆大每服秤五錢或三錢水二大盞煎至一盞去滓稍熱服食後時時服之消毒湯治馬刀瘡柴胡二錢連翹三錢當歸尾一錢紅花少許甘草一錢生黃芩二錢黃連半錢栝蔞根一錢半黍黏子半錢炒黃耆一錢半上件每服秤半兩水二大盞煎至一盞去滓稍熱服食後忌酒濕面連翹防風湯治皮癢腋下瘡背上瘡耳聾耳鳴麻黃一錢桂枝二分草豆蔻仁一錢當歸尾七分紅花少許羌活一錢防風一錢柴胡一錢升麻半錢連翹半分桔梗半錢甘草半錢生地黃半錢酒黃芩二錢蒼朮一錢上件銼如麻豆大都作一服水二大盞煎至一盞去滓稍熱服之治蟮𫋐頭瘡用硝碾為末填於蛤殼內覆在瘡上再用生乾麵封於外候面干自落瘡愈黃耆乳香湯治諸瘡疼痛或瘡口膿水不盡去黃耆一兩生陳皮麻黃甘草芍藥當歸人參沒藥乳香米殼各等分上為末如膿水不幹薑棗煎服搽瘡藥小草烏小指面塊銼碎上以臘月豬膏入少許輕粉量用搽末瘡上虢丹膏治一切瘡癤虢丹五兩巴豆十粒麻黃二兩竹付柳條各五十寸上件以油焦下竹柳巴黃四味煎黑色卻入虢丹打勻黑為度令冷乳香丸治諸般惡瘡癤乳香半兩穿山甲半兩木鱉子七錢當歸半兩豬牙皂角七錢上除乳香外松枝火燒存性為細末煉蜜為丸如彈子大每服一丸酒化下食前替針丸治諸瘡癤膿水已成即當針開決出陳臭惡瘀則其治也若其惡瘀不出欲針石須當開發用此藥以射出其膿也雄雀糞直者二十一枚陳壞米末一錢硇砂半錢上為細末粳米粥丸如粳米樣每用一丸黏在瘡頭上以膏貼之一方有沒藥少許內補散黃耆麥門冬去心川芎當歸茯苓去皮人參五味子各一兩遠志去心甘草炙桂心各半兩上㕮咀每五錢水一盞半姜三片棗三枚煎八分溫服無時通神乳香膏乳香沒藥血竭蠟黃丹木鱉子二兩膩粉三分烏魚骨二兩不灰木四兩五靈脂二兩海桐皮二兩瀝青四兩麝射二錢油八兩熬用熬法皆同一切氣漏麝香丸麝一錢乳香一兩巴豆十四個去皮出油上棗肉同丸紝瘡上柳木膏治諸瘡瘥後瘡瘢胬肉未消瘰癧風等疾宜貼此柳木皮五斤楸葉五斤木通一斤枳殼一斤皂莢一斤木香末三兩上件藥細銼以水八斗煮取汁一斗去滓移於水鍋子中下木香煎至七升去滓又移於小鍋中以慢火煎攪勿住手煉如餳捻成丸即住以油帛裹收之每日塗於帛上貼之取平復為度神效餅子出朱氏集驗方治一切毒瘡山慈菇五倍子草烏燒存性木鱉子各半兩虢丹三錢上為細末先用雞子作餅熱敷瘡上候冷取出敷藥其上數日間瘡干連皮脫去瘡干即用麻油調德安寺有僧面上生遍幾死一用即安凡諸發即癰疽瘰癧臁瘡湯蕩火燒等疾或有別作一種穢臭氣息不堪聞者最是惡症或已破未破或小或大皆當作急以治之可用忍冬藤一握擂細用無灰酒濾汁服之以滓敷瘡之四圍用雲母膏別研亦可剪開大口以護其藥之上俟其瘡膿出便以豬蹄湯等十分淨洗久洗為妙三時辰不妨次用後藥以熏之出澹寮方好真降香末楓香末上二味於銚中攪溶丸如彈子大卻取香爐一枚衣爐口紙造煙筒一個如燒龍涎香樣慢火爇之謹以煙筒口熏瘡上不拘丸數稍倦暫止然後更熏未出膿者即出已出膿者即干直俟生肌合口然後止向後有赤腫腳處又再熏大概欲闢去穢氣也平血飲出澹寮方治遍身生瘡膿血腫脹極痛且癢乾葛白芍藥升麻甘草等分上㕮咀每服四錢重用白水煎服不拘時服如對證及藥材得真則功在和氣飲之上魏白虎瘡藥方內經云諸瘡痛癢皆屬於心心受氣熱則血脈凝滯而成瘡風多熱少即癢熱多風少即痛風熱相半即癢痛皆因大病後風熱毒不曾宣利蓄於血脈遍身生惡瘡兩腿尤甚或攻刺疼痛或晚憎寒作膿水每蓋即覺熱痛宜服此出傳信適用方烏蛇一條大者細尾小者去頭尾三寸新用極好酒浸三宿去刺骨皮取好淨肉玄參去蘆頭苦參去木取皮地骨皮去木洗淨甘草細銼白蒺藜炒以新磚二口磨去刺防風去蘆白殭蠶炒斷絲乾蠍川烏以上各半兩草烏半斤肉白者以黑豆一升水煮令草烏都黑惟心中一點白為度切焙一兩黑牽牛半生半炒以二兩取一兩末枳殼去瓤炒一兩上件一十三味為細末煉蜜搜成劑入石臼中搗百十下丸如梧桐子大每服二十至三十丸溫酒送下不拘時候日進三服以利則減不利則加服四生散出澹寮方治上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注陰濕四肢燥癢遍體生瘡及婦人血風瘡白附子沙苑蒺藜黃耆羌活等分上為細末用豬腰一枚切開去筋膜入藥少許於內濕紙裹炮熟再以藥三錢浸酒調藥並腰子嚼吃令盞底淨盡三五服後或熱用鹽酒調亦可或腰子一枚分兩次用羊腰豬腰皆可雄豬羊者為妙木香檳榔散出鮑氏方治一切瘡癤濕爛久不治者腳氣濕瘡尤效黃連半兩去須真麻油艾葉木香檳榔各末一錢半和上藥添油成膏上茶葉煎湯洗瘡淨帛拭乾上藥略圓敷紙花覆之二三次即可又方出鮑氏方黃連三分密陀僧輕粉少許上為末麻油調敷治皂莢水並惡水入瘡口內熱痛不止出本草以取皂莢子燒存性一分沙糖半兩先投研皂莢子令細續入沙糖勻和如膏貼於瘡上治瘡中水出本草用胡粉炭白等分脂和塗孔上水即止治驚瘡血湧出出本草取婦月經衣炙熱熨之治螻蛄瘡出儒門事親千年石灰茜草根燒灰上同為細末用小油調雞翎塗治諸瘡黃水出用糖球子皮搗末敷之治諸瘡觸犯毒露及毒水覺瘡頑不癢痛當中風水所為身體反張似角弓者用鹽豉和麵作枕子蓋瘡上作大艾炷炙一百壯令抽惡水數升舉身覺癢瘡處知痛瘥也治諸瘡瘻及癧瘍風用鰻鱺魚常食之甚驗鰻鱺魚有五色絞者最佳治諸瘡中毒用羊屎燒煙熏之荊芥丸治身上一切瘡上以地黃自然汁熬成膏和荊芥末丸如梧桐子大每服三五十丸茶酒任下又方用巴豆三四十粒麻油半盞煎候乾巴豆黑去之不用以油調硫黃輕粉塗之搽令熱為佳
