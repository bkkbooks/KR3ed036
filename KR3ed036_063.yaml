body:
  text: 卷六十三咽喉門咽喉腫痛附論夫足太陰之脈屬脾絡胃上膈挾咽連舌本足陽明之脈其支者從大迎前下人迎循喉嚨是知咽喉者脾胃之候也脾胃有熱風毒乘之其氣上衝經絡胥應故咽喉為之腫痛或為風毒腫痛或連頸外痛甚則水漿不下便能殺人其候有使人寒熱似傷寒者宜急治之咽喉卒腫痛者脾肺暴熱胸膈壅滯上攻咽喉故發腫痛也亦有服餌丹石過度毒氣在胃多嗜五辛酒面衝於脾肺皆致此疾源雖不同其為熱則一方龍麝聚神丹出濟生拔粹治心脾客熱氣攻衝咽喉赤腫疼痛或成喉癤或結硬不消愈而復發經久不瘥或舌本腫脹滿口生瘡飲食難咽並宜服之川芎半兩生地黃犀角屑羚羊角南琥珀研南玄參桔梗連翹各半兩馬牙硝赤茯苓去皮人參牛黃研麝香研腦子研升麻各三錢硃砂飛半兩金箔五片鉛白霜一錢南硼砂研一兩上為細末煉蜜和丸每兩作十五丸用金箔為衣每服一丸用薄荷湯化下或新水化服亦可更或細嚼服並噙化咽津皆可服食後臨臥進三兩服祛毒牛黃膏出御藥院方治大人小兒咽喉腫痛舌本強硬或滿口生瘡涎潮喘急胸膈不利飲食難進牛黃研二錢半人參一兩南琥珀南硼砂犀角屑研細桔梗生乾地黃各半兩雄黃飛二錢川升麻三錢南玄參三錢蛤粉水飛四兩硃砂研飛七錢鉛白霜一錢腦子三錢金箔寒水石燒赤去火毒三兩研上為細末入研藥勻煉蜜丸如小彈子大金箔為衣用瓷器收每服一丸濃煎薄荷湯溫化下或新汲水化服亦可食後日進三兩服或噙化咽津亦可沉香湯治咽喉腫痛不得語猝中風毒入於喉間舌強頭面身體疼痛咽喉閉塞氣欲絶者沉香銼木香射干防風去叉甘草炙當歸切焙黃芩去黑心升麻薰陸香藿香葉雞舌香各一兩獨活去蘆頭三兩麻黃去根節先煎掠去沫三分大黃銼生用二兩上粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服日三服丹砂玫瑰丸治脾胃有熱風毒相乘上攻咽喉腫痛丹砂二兩研人參硼砂研半夏為末生薑汁作餅曝乾雄黃研各半兩麥門冬去心焙一兩半甘草生銼烏梅肉各一兩赤茯苓去黑皮白梅肉各三分麝香研龍腦研紫雪各一分上研為末以乳糖和丸如雞頭子大金箔為衣每服一丸紫蘇熟水嚼下含化咽津亦得食後臨臥服犀角散出聖惠方治咽喉毒氣結塞疼痛不下湯水宜服犀角屑一兩沉香一兩木香半兩馬牙硝一兩雞舌香一兩薰陸香半兩川升麻三分射干三分甘草半兩生銼黃芩半兩麝香一分細研上為散每服二錢水一中盞入竹葉二七片煎至六分去滓不計時候溫服治咽喉腫鬱金甘草馬牙硝細研將來冷水調加入殭蠶並半夏自然風熱不能潮大青湯治咽喉唇腫口舌靡爛口乾面熱瀉脾大青升麻大黃銼炒各二兩生乾地黃三兩銼焙上粗搗篩每服二錢匕以水一盞煎至七分去滓溫服之利即愈春冰散出御藥院方治脾肺積熱咽喉赤腫疼痛大黃生一兩盆硝薄荷甘草微炒各三兩上為細末每服二錢食後新水一盞調服入蜜少許亦可玉塵散出御藥院方治小兒大人咽喉腫痛口舌生瘡寒水石燒三兩馬牙硝枯一錢鉛白霜半錢南硼砂半兩上為細末每用少許乾摻口瘡上咽津不妨不拘時候大青丸出聖惠方治咽喉腫痛上焦實熱口舌生瘡大青一兩黃芩半兩蚤休半兩黃藥半兩銼黃連去須半兩薔薇根皮一兩銼升麻半兩栝蔞根半兩知母半兩石膏半兩細研馬牙硝半兩上為末煉蜜和搗二三百杵丸如酸棗大綿裹一丸含咽津硼砂散出御藥院方治心風熱毒沖發咽喉生瘡腫痛或木重舌脹或紫舌脹腫悶塞水漿不下南硼砂三兩白茯苓去皮縮砂仁滑石末荊芥穗山豆根南玄參貫衆甘草各半兩薄荷葉鄭州者一兩上件除研藥五味外搗羅為末同合和勻每服半錢新水調下或摻舌上咽津無妨不拘時候三合湯治喉痛風毒積於臟腑毒氣隨經流傳虛行而止在身而為腫毒在咽喉為痛妊娠者最宜急治不若子母俱傷産後咽喉亦同三合湯主之升麻桔梗去蘆甘草各半兩上㕮咀每服三錢水一盞煎至七分食後服之治喉痛出海上方用白礬半斤研細水和勻新磚一片入礬水中浸如水不幹取磚曬復浸礬水干重五日入大便缸中浸一月取出洗淨安陰處出硝用雞毛掃收如喉痛服無不效治咽喉腫痛口舌生瘡凡腫毒之屬殊效用升麻一兩細銼水一升煎煉取濃汁服治咽喉中痛方用紫背龍牙草含咽之效治咽喉頸外腫痛黃膏方出聖惠方木鱉子十枚土瓜根一兩黃連半兩去須黃耆一兩銼栝蔞根二兩黃柏一兩銼硝石一兩馬牙硝一兩蕓薹子二兩川大黃二兩銼麝香一錢細研上為散入麝香研令勻以生油旋調可腫處敷之有菜油調更佳干即再敷絡石葉飲出聖惠方治咽喉風毒腫痛熱毒氣攻心胸滿悶絡石葉赤芍藥桔梗銼炒各一兩半射干玄參升麻青竹茹各一兩木通銼馬牙硝各二兩生犀角鎊梔子仁各三分上粗搗篩每服五錢匕水一盞半煎八分去滓溫服以通利為度人參清肺散出御藥院方治脾肺不利風熱攻衝咽喉腫痛咽物妨悶宜用此藥人參去蘆頭甘草生山梔子盆硝各一兩薄荷葉黃芩淨川大黃生各一兩半連翹三兩黃連五錢去須白附子七錢去皮上為粗末每服五錢水一盞半煎至一盞去滓食後溫服一方無黃連消毒丸治脾胃毒熱上攻咽喉腫痛化涎生津五倍子馬牙硝各一兩甘草三分生銼硼砂白礬熬令汁枯升麻馬勃各半兩丹砂炒麝香研龍腦研各一分上為末糯米飯為丸如雞頭大每服一丸含化不拘時候犀角湯出聖惠方治咽喉腫痛風毒衝心胸豉一升半犀角鎊射干杏仁甘草各二兩芍藥三兩梔子七枚升麻四兩羚羊角一兩半鎊上㕮咀以水九升煮取三升去滓納豉煮一沸分三服一方有漢防己青金散出御藥院方治心肺客熱上攻咽喉腫痛生瘡舌本強硬妨悶不利宜服薄荷二兩甘草七錢半炒百藥煎半兩南硼砂一兩別研紫河車二錢半青黛另研馬牙硝另研各半兩枯腦子半錢另研白殭蠶直者去頭微炒取末一錢半上除研藥外同為細末入研藥再研勻細每用少許時乾摻舌上細細咽津薑蜜煎治喉痹腫盛語聲不出治喉中腫痛膈上痰熱初覺便治不能成喉痹亦緩取效可也用硼砂含化咽津一方治喉痹以砂為末水調咽之治風熱上壅咽喉腫痛用鵝抱草陰乾篩末以酒調服之有效犀角散出聖惠方治咽喉疼痛四肢寒熱痰涎壅滯煩躁頭疼犀角屑三分馬牙硝一兩白礬一分川升麻三分甘草半兩生銼桔梗半兩去蘆頭細辛一分石膏一兩前胡三分去蘆頭上為散每服三錢以水一中盞煎至六分去滓不計時候溫服之射干散出聖惠方治風毒攻咽喉腫痛水漿不下宜服射干二兩赤芍藥一兩川升麻二兩甘草二兩炙微赤銼牛蒡子一兩楓香一兩葛根二兩銼麻黃一兩去枝節杏仁二一兩半湯浸去皮尖雙仁麩炒微黃上為散每服三錢水一中盞煎至六分去滓不計時候溫服治咽喉壅塞頸頷腫痛宜服此方出聖惠方升麻一兩漏蘆半兩木通三分銼赤芍藥三分桑根白皮三分銼川大黃三分銼枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼漢防己三分上為散每服三錢水一中盞煎至六分去滓不計時候溫服青硼砂散出御藥院方治咽喉赤腫疼痛不消有妨飲食防風去蘆頭白茯苓去皮五倍子去瓤牙硝白礬紫河車各四錢薄荷葉四兩甘草二兩半上為細末每用半錢摻患處如咽喉腫用蜜水調涼服牛蒡子湯出濟生方治風熱上攻壅咽喉腫痛或生壅瘡有如肉臠牛蒡子炒玄參升麻桔梗去蘆炒犀角鎊黃芩木通去節甘草各等分上㕮咀每服四錢水一盞薑三片煎八分溫服不拘時一方無犀角有羌活知母飲治咽喉腫痛知母麥門冬去心焙山梔子仁人參各半兩黃芩去黑心赤茯苓去黑皮各一兩天門冬去心焙一兩甘草炙銼三分上粗搗篩每服三錢匕水一盞煎至六分去滓溫服病甚者倍之丹砂牛黃丸治咽喉腫痛解臟腑諸毒化涎丹砂研硼砂研各半兩生甘草末一分礬蝴蝶研牛黃研龍腦研各三錢印子鹽二十粒細研凝水石燒赤去火毒研半兩上將七味同研令勻用甘草末熬煎和丸如雞頭子大每服一丸食後含化咽津羚羊角湯治脾熱喉中腫痛熱塞不通羚羊角鎊一兩射干絡石碎大黃銼升麻各三分木通銼芍藥各一兩半生地黃二兩切焙上粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝末一錢匕攪勻溫服得利即瘥桔梗散出聖惠方治咽喉腫痛結毒氣衝其心胸桔梗一兩去蘆頭犀角屑一兩甘草一兩炙微赤銼羚羊角屑一兩赤芍藥一兩川升麻二兩梔子仁一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃上為散每服四錢以水一中盞煎至六分去滓不計時候溫服鉛霜散出聖惠方治咽喉腫痛風熱上攻胸膈心神煩熱鉛霜一分細研磁石一兩細研龍腦一分細研羚羊角屑一兩黃耆一兩銼黃芩二兩甘草三分炙微赤銼馬牙硝一兩細研上為散都研令勻每服不計時候以冷水調下一錢龍腦散出聖惠方治咽喉猝腫痛龍腦研一分犀角鎊丹砂研白藥子各三分真珠研黃耆銼甘草炙各半兩牙硝研一兩上為散拌勻再羅每服二錢匕新汲水調下不拘時候治咽喉疼痛含咽丸黃藥白藥栝蔞根牛蒡子馬勃以上各一兩玄參一兩半砂糖三兩蜜三兩上煎六味為末熬蜜並糖和丸如彈丸大不計時候含一丸咽津馬藺根散出聖惠方治咽喉猝腫痛熱毒在胸膈馬藺根二兩川升麻一兩射干一兩半犀角屑一兩玄參一兩半木通銼一兩瞿麥一兩甘草半兩生銼上粗搗羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服馬牙硝丸出聖惠方治咽喉風毒腫痛煩熱不止四肢不利宜服含化之馬牙硝三分細研犀角屑一分川升麻半兩甘草一分炙微赤銼珍珠末一分黃藥二分硼砂二一分細研牛黃半兩細研上為末入研了藥令勻煉蜜和丸如雞頭實大每服一丸含化咽津治風毒咽水不下及瘰癧腫方升麻芍藥各四兩射干杏仁楓香菖根麻黃各三兩甘草炙二兩上㕮咀以水八升煮取二升半分三服勝金散出危氏方治咽喉腫痛氣急諸項等證於內麝香旋入有孕者不可用麝香不問冷熱虛實並皆通用若痰盛者如前藥內所用不應於中略加膽礬少許立效或吐無妨鬱金三兩大硃砂南雄黃其色勝如硃砂者炒各五錢麝香干胭脂緑豆粉各二錢半白礬半生半枯光粉各五錢上為末研薄荷汁同砂少許調服天門冬丸出御藥院方治上膈鬱熱咽喉腫痛唇焦舌乾腮頰生瘡解化痰毒並宜服之天門冬慢火炙玄參湯洗焙乾牛蒡子炒各一兩百藥煎紫蘇葉各半兩甘草炙人參各一兩半上為細末煉蜜和丸如皂子大每服一丸噙化咽津食後備急散治咽喉腫痛生瘡涎堵水米難下盆硝四兩紫河車青黛各半兩蒲黃一兩甘草二兩薄荷二兩半殭蠶三錢炒上為細末入硝研勻吹半錢許咽喉中或摻不住吹摻一方無青黛蒲黃天門冬丸一名硼砂丸出王氏博濟方治上膈壅實咽喉腫痛天門冬去心焙玄參焙惡實炒各一兩甘草炙銼一兩半人參硼砂研龍腦研各一分上搗羅五味為末與別研二味拌勻煉蜜和劑搗三百杵丸如皂子大每服一丸食後臨臥淡生薑湯嚼下射干丸出聖惠方治咽喉腫痛水漿不入射干半兩柑皮半兩山大豆黃藥子硝石研甘草炙銼各一分升麻半兩上為細末煉白餳和丸如彈丸大每服一丸含化咽津不計時候乳香丸治咽喉腫痛喉痹及咽喉諸疾乳香研石亭脂研阿魏密陀僧安息香各一分砒霜研半分麝香研半兩上除安息香外搗研為末酒煮安息香和丸如緑豆大每服五丸茶清下空心服良久以熱茶投令