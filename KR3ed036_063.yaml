每用一塊入口中咽下苦汁喉寬痛亦止未愈更用一二塊一方作末子每用半錢乾摻舌上細細咽津如聖散一名殭蠶散出百一選方治咽喉腫痛用白殭蠶直者不拘多少炒為末以生薑自然汁調服一錢匕吳內翰備急方云余嘗若此用之甚效葛彥恢提舉閣中曾患喉痹五八主簿用此治之即安一方調下二錢未通半時許再服立通吐出頑涎別將大黃一塊慢火炮熟打撲盡灰如一米厚切片以兩指大一片口內含汁咽之一食頃再換一片含至三片即止或患人話不得及自咽不下即扶持起靠斜仰坐令人呷藥在口以筆管注入鼻中男左女右注藥訖隨即扶令正坐須臾吐涎不止即扶起恐吐自鼻中出也吐了含咽大黃如前法大能救人無不驗治喉腫痛飲食不可入者用豬牙皂角一梃去黑皮並核米醋浸炭火上炙令乾再浸再炙七遍黃色則止莫令太焦為細末每用少許以管吹入喉內吐出痰涎即止又方用蛇床子三四撮入小花瓶內用炭火一塊入瓶內燒之卻用筆管入瓶內用口吸煙吐痰出即止又方用野鹿蔥一枝獨生者捶碎用白絹包縛以酸米醋一大碗煎乾候冷取著牙外牙根上即時藥味入喉立便吐出痰涎又方治喉腫痛用直殭蠶白梅不以多少研為末入米醋少許和蠶末含化須臾所腫即破矣治傷寒毒攻咽喉腫方用真䕡茹爪甲大納口中嚼汁咽當微寬為佳治喉中腫痛不得飲食出肘後方用燒筆頭灰漿飲下方寸匕治壅熱咽喉腫痛方用百兩金一寸含少許咽津治咽喉腫痛方用都管草根切片含之立愈治咽喉腫痛語言不出出海上名方用硼砂碾細竹管吹入喉內其痛自定治卒風咽腫面腫方用杏仁末和雞子黃更搗敷上干復易之七八度若腫汁出煮醋和伏龍肝敷干更易之又方用含上好醋口舌有瘡亦佳鶴頂丹治大人小兒咽喉腫痛用甜硝四兩炒過研細先掘地作坑子揩淨入甜硝在內一時辰出火毒取出入熱甘草末半兩麝香生龍腦各一錢硼砂二錢半馬牙硝一兩丹砂一錢半一處細研滴水丸如雞頭大每服一丸含化咽津小兒只作散新汲水調下半錢匕治咽喉猝腫不下食方出聖惠方取鯇魚膽滴入喉中如喉嚨痛以膽塗喉嚨外腫痛處極妙治咽喉猝腫痛不下食方用附子半枚生搗細羅為散用竹管吹入喉中治咽喉猝腫痛不下食方出聖惠方用生地龍十四枚搗爛塗喉外帛系之兼治癰發喉中一方取地龍一條著鹽淹令化為水蜜少許調勻服之治咽喉猝腫痛不下食方用白麵不計多少以苦酒和塗喉外腫處治咽喉猝腫食飲不通出肘後方用黃柏搗敷腫上冷復易之用苦酒和末佳搗薤膏出聖惠方治咽喉猝腫食飲不通用薤一握爛搗醋和敷腫上冷復易佳一方用根炒搗貼腫處以帛系之治咽喉內猝腫痛出聖惠方用商陸根爛搗微炒帛裹尉之冷即易之立愈治咽喉頸外腫及咽乾痛方出聖惠方用皂莢炙黃焦去皮子搗羅為末水調敷之治風毒咽水不下用水服莨菪子末二錢匕神良又方用煮桃皮汁三升服硼砂散治咽喉緊腫疼痛硼砂甘草銼一分馬牙硝人參各半兩上為細散每服半錢匕含化咽津不拘時防風散出危氏方虛者少用實者多用防風去蘆一兩羌活黃藥子白藥子蜜炙殭蠶炒硼砂大黃紙裹煨令香熟荊芥細辛川芎紅內消鬱金山豆根甘草以上各五錢牙硝二一錢薄荷葉上為末研薄荷汁同蜜少許調藥服之治咽腫痛至危困出百一選方以手用力拔頂心發立通無發者撮頂心皮即安之劉大夫得此方未試忽一猝苦咽痛不能言亟去其巾乃患酒禿即以意令人用力撮其頂心皮遂安射干膏一名烏翣膏治喉腫熱塞不通脾熱上衝絳雪散一名代針散治男女長幼咽喉腫痛氣息難通杏仁丸治咽喉噎塞咳嗽治喉猝腫不下食出經驗良方以韭一把搗熬敷之冷則易一方用薤治卒咽痛燒炊箅一枚漿水服方寸匕發聲散治咽喉痛不妨咽物咽物則微痛不宜寒涼藥過泄之此妨悶非熱也栝蔞去瓤白殭蠶半兩微炒桔梗新白者七錢半炒甘草二錢炒上件為細末每用少許乾摻咽喉中大腫痛左右有紅或只一壁紅紫長大水米難下用此散一錢朴硝一錢匕和勻乾摻喉中咽津如喉中生赤腫或有小白頭瘡用前藥一錢匕白礬細研作粉半錢匕和勻乾摻通關散治一切咽喉危疾盆硝甘草蒲黃白殭蠶青黛以上並等分生用上為細末每用一字乾摻在舌上咽津鉛霜散治咽喉腫痛清涼咽膈南硼砂柿霜糖霜鉛白霜上件各等分為細末每服半錢遂旋摻咽下食後菖蒲大丸治風熱壅盛咽嗌腫痛語音嘶嗄咽物艱難常服清上焦發音聲水菖蒲白朮各一兩防風去蘆頭川芎各半一兩甘草炙桔梗去蘆頭微炒各二兩木通半兩肉桂去粗皮二錢半杏仁半兩湯浸去皮尖細研以竹紙裹壓去油取霜縮砂仁二錢半薄荷葉去土取末十兩上件為細末次入杏霜薄荷葉末研勻煉蜜為丸每一兩分作一十丸每服一丸含化咽津食後一方無木通鼠黏子散治上焦壅熱咽膈腫疼不利鼠黏子一兩銚子內以文武火隔紙炒令香為度甘草一分荊芥半兩上件三味同為細末每服一錢水三分一盞煎令沸去滓溫服大調胸膈治丈夫婦人喉嚨腫痛飲食不下喘息不通頭項俱腫命欲臨死宜服此返魂散量病勢大小使藥輕吹吹重則人悶絶硝石牽牛各一兩半夏三分殭蠶去頭絲天南星各一兩上為細末以舊筆管盛一錢吹在痛處停候片時吐出涎後喘息已通即便住藥若氣未通腫處未消未破更進吹一錢半待氣通即住若未通加藥吹之以氣通為度若喉中喘息已通更修合後方吃麻黃荊芥穗羌活牡丹皮去心射干殭蠶去絲連翹硝石各一分大黃牽牛各半兩半夏三銖上為細末用白麵大小相滾熟水丸如梧桐子大食後蔥湯下五十丸只作散子吃每服三錢水一盞三分煎一兩沸食後和滓吃若吃時吐逆即濃煎去滓吃一兩盞只以通取轉為度桔梗湯治咽喉腫微覺痛聲破麻黃半錢不去節桔梗一錢甘草一錢當歸一分黃芩三分白殭蠶一分馬屁勃一分桂枝少許上件銼如麻豆大都作一服水二大盞煎至一盞去滓稍熱食後時時服之治咽喉腫痛用生艾尾研井花水朴硝噙咽津治咽喉腫痛百藥煎去黑皮硼砂甘草生白礬等分上四味為細末每服一錢食後米飲調細細呷咽下治咽喉腫痛用山豆根磨醋噙出涎又方白礬三錢巴豆三個去殼同炒候礬枯去巴豆只研礬為末調灌或點入喉中黃芩湯治咽喉腫疼口瘡等疾黃芩蓽茇上各等分為末煎湯漱口神效龍腦丹砂丸治咽喉腫痛連舌頰牙根赤腫心煩咽乾多渴眠睡不穩龍腦研二錢丹砂研半兩人參白茯苓去黑皮各一兩羚羊角鎊犀角鎊甘草炙銼升麻惡實炒各半兩麥門冬去心炒一兩半馬牙硝研黃藥各一分上為末再同和勻煉蜜丸如雞頭實大每服一丸含化咽津食後臨臥治咽喉間生肉層層相疊漸漸腫起不痛多日乃有竅子臭氣自出遂退飲食用臭橘葉煎湯連服愈治猝咽痛用懸木構燒末水服方寸匕日三代針散一名絳雪散治咽喉腫痛氣息不通硇砂為君少許白礬為臣皂子大牙硝三兩硝石四兩黃丹半兩巴豆六枚上用粗瓷罐子一個先煨令熱後次第漸漸下藥巴豆逐個咬破候火焰盡更入一個續入蛇蛻皮一條為之七擒以火養成汁後結硬乃成也每用少許以竹筒子吹在患處忌雞犬及婦人見唯臘月合之祕傳解毒丸治一切諸毒瘡痍之疾咽喉腫痛貫衆山豆根黃藥子牙硝寒水石草龍膽黃大豆乾葛百藥煎紫河車甘草節薄荷梔子大黃豆粉各四兩加山慈菰二兩大妙上細末煉蜜為丸稱一兩作十丸銀箔為衣每服一丸日三服治喉嚨疼用木通煎湯服之或將木通含之咽津亦得又方用甘草煎湯去滓溫服一盞日三服治一切咽頷腫毒上用蟬殼一兩為末以豬膽汁和蜜調敷腫處即消治咽喉癢痛失音不語杏仁去皮尖炒桂心為末上二味各一兩同研爛如泥用半熟蜜和丸如櫻桃大新綿裹含之咽津日五次夜三次大效
