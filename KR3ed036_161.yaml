寒微則成咳嗽肺主氣氣有餘則喘咳上氣此為邪搏於氣氣壅滯不得宣發是為有餘故咳嗽而上氣也其狀喘咳上氣及多涕唾面目浮腫則氣逆也杏仁三大升去皮尖雙仁者白蜜一大升牛酥二大升上杏仁搗碎於瓷盆中研取汁五升淨磨銅鐺勿令脂膩先傾三升汁於鐺中刻木記其深淺又傾二升汁以緩火煎減至於所記處即納白蜜及酥還至木記處藥乃成貯不津瓷器中每日三度以暖酒服一大匙不能飲酒粥亦得服一七日唾色變白二七日唾稀三七日咳斷此方非自療咳兼補虛損去風冷兼悅肌膚白如瓠婦人服之更佳又方出聖惠方治咳嗽上氣肺脹喘急胸中滿悶紫蘇莖葉一兩姜半兩炮裂銼陳皮二兩湯浸去白瓤上為散每服三錢水一中盞入棗三枚煎至六分去滓不拘時候溫服又方出聖惠方治咳嗽上氣語不出聲心煩悶亂桂心一兩杏仁一兩湯浸去皮尖雙仁麩炒黃研如膏乾薑一分炮裂銼上為細末入杏仁同研令勻以棗肉和丸如棗大不計時候以綿裹一丸含咽津又方出千金方治咳嗽胸脅肢滿多唾上氣薑汁一升半沙糖五合上減薑汁減半納糖更煎服之又方出千金方白糖五分皂莢末一方寸匕上先微暖糖令消納皂莢末合和相得丸如小豆大先食服二丸又方出千金方用酒一升半浸肥皂莢兩梃經宿煮取半升分三服七日忌如藥法若吐多以酢飯三四口止之桂杏丸治咳嗽上氣語聲不出心中煩悶療上氣暴咳紫蘇莖葉銼二升大豆一升上以水四升煮大豆次下紫蘇煮取一升五合為三服晝二夜一忌酸酢鹹酸油膩等治久咳嗽上氣十年二十年諸藥治不瘥肘後方用豬𦚟三具棗一百枚酒三升漬數日服一二合加至三四五合服之不久瘥又方出肘後方用生龜一隻著坎中就溺之令沒龜死因漬之三日出燒末以醇酒一升和屑如干飯頓服之須臾大吐嗽囊出則瘥小兒可服半升又方出肘後方用梨一顆去核納酥蜜麵裹燒令熟食之亦用梨肉納酥中煎停冷食之可治咳嗽上氣呷呀息氣喉中作聲唾黏出肘後方用藍實葉水浸良久搗絞汁一升空腹頻服須臾以杏仁研取汁煮粥食之一兩日將息依前法更服吐痰盡瘥又方出本草治上氣咳嗽腹滿羸頓者用楸葉三升煮三十沸去渣煎堪丸如棗大以竹筒納下部中立愈又方出本草治上氣咳嗽胸膈妨滿氣喘用豬肉細切作錘子於豬脂中煎食之又豬肪脂四兩煮百沸以來切合醬醋食之又方出肘後方治傷中筋脈上氣咳嗽用棗二十枚去核以酥四兩微火煎入棗肉中瀝盡酥常令一枚微咽服之又方出肘後方治上氣咳嗽胸膈妨滿氣喘用桃仁三兩去皮尖以水一升研取汁和粳米二合煮粥食之郁李仁煎治積年上氣咳嗽不得臥用郁李仁去皮尖雙仁一兩用水一升研如杏酪去滓煮令無辛氣次下酥一棗許同煮熟放溫頓服之青金湯治丈夫婦人遠年近日肺氣喘嗽上氣喘急喉中涎聲胸滿氣逆坐臥不安飲食不下罌粟殼人參粉草各半兩陳皮茯苓杏仁制明阿膠炒五味子桑白皮薏苡仁紫蘇百合貝母半夏曲款冬花各一兩上㕮咀每服五錢姜三片棗二枚烏梅半枚水煎臨臥服之又方出千金方用服芥子七丸以油酒下之白朮散一名白朮湯出濟生方治五臟受濕咳嗽痰多上氣喘急身體痛重脈來濡細憎寒發熱白朮二兩五味子半夏湯浸七次白茯苓去皮橘紅各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候一方無橘紅加棗煎治一切上氣咳嗽出永類鈐方乾薑無蛀皂角去皮紫辣桂上等分煉蜜杵為丸如梧桐子大每服三丸遇發即服忌蔥油咸腥熱面其效如神凡咳嗽不敢服熱藥試之方知其妙咳嗽面目浮腫附論內經謂久咳不已三焦受之三焦咳狀咳而面腹滿不欲食飲寒氣聚於胃關於肺使人多涕唾而面目浮腫氣逆也夫肺主於氣候之皮毛而氣之循環臟腑流注經絡若肺氣虛弱風邪所乘則肌膚否塞使氣內壅與津液相併不得宣泄攻溢皮膚故令咳嗽面目浮腫也方蜀漆湯治三焦咳嗽中滿氣逆面目浮腫咯唾痰飲蜀漆郁李仁去皮炒甘草炙銼當歸切焙柴胡去苗黃連去須各一兩射干大腹桑根白皮芎藭牽牛子炒各一兩半陳橘皮去白瓤焙三兩天雄炮裂去皮臍二兩半桂去粗皮蒼朮去皮各三分桃仁去皮尖雙仁二十枚上銼如麻豆每服五錢水一盞半入生薑五片煎至八分去滓不拘時溫服桑根白皮湯治三焦咳嗽面目虛浮不得安臥飲盛減食桑根白皮草豆蔻去皮三枚天雄炮裂去皮臍瞿麥穗蒼朮去皮木通桂去粗皮當歸切焙黃連去須各一兩大腹射干牽牛子炒各一兩半桃仁去皮尖雙仁炒二十枚郁李仁去皮尖三分吳茱萸炒半兩上銼如麻豆大每服五錢水一盞半入生薑七片煎至八分去滓溫服不拘時桑根白皮湯出聖惠方治咳嗽面目四肢浮腫氣促不得臥桑根白皮銼柴胡去苗各一兩大腹皮銼枳殼去瓤麩炒各三分杏仁湯浸去皮尖雙仁炒赤芍藥赤茯苓去黑皮黃耆銼各一兩陳橘皮湯浸去白焙麥門冬去心焙各三分惡實炒一兩甘草炙銼三分上粗搗篩每服四錢水一盞半入生薑一片棗大拍碎煎至八分去滓不拘時溫服百合湯治肺氣壅滯咳嗽喘悶膈腕不利氣否多渴腰臍浮腫小便淋澀百合人參紫蘇莖葉銼豬苓去黑皮甘草炙銼桑根白皮銼大腹皮赤茯苓去黑皮陳橘皮湯浸去白焙各一兩馬兜鈴和皮七枚麥門冬去心焙枳殼去瓤麩炒各一兩上粗搗篩每服四錢水一盞半入生薑一片棗大拍碎同煎至八分去滓不拘時候溫服雞舌香散出聖惠方治肺氣咳嗽面目浮腫喘息促急雞舌香半兩漢防己三分木香三分澤瀉一兩紫蘇莖葉一兩桑白皮三兩銼附子半兩炮去皮臍郁李仁一兩去皮湯浸微炒羌活半兩檳榔一兩甘草半兩炙赤銼上為散每服三錢以水