body:
  text: 卷五十二面門面瘡附論夫面上生瘡者由內熱外虛為風濕所乘則生瘡也所以然者肺主氣榮於皮毛脾主肌肉氣虛則膚腠開為風濕所乘內熱則肺氣溫氣溫則肌肉生熱也溫與熱相搏之故令面生瘡也升麻加黃連湯治面熱升麻加附子湯治面寒有何依據答曰出自仲景云岐子注傷寒論中辨葛根湯云尺寸脈俱長者陽明經受病也當三二日發以其脈夾鼻絡於目故身熱目疼鼻乾不得臥此陽明經受病也始於鼻交額中從頭下至足行身之前為表之裡其陽明經標熱本實陽明之名標陽則熱本謂胃胃者水穀之海故本實其從標而浮而長從本脈沉而實陽明為病主身熱蒸而不惡寒身熱為標病陽明本實者胃中燥鼻乾目疼頭眩鼻絡於目陽明為肌肉之本凡是面熱陽明禁不可發汗在本者不禁下發之變黃證太陽主表營衛是也營衛之下肌肉屬陽明二陽並病葛根湯主之衛者桂枝營者麻黃營衛之中麻桂各半湯主之營衛之下肌肉之分者葛根湯主之又名解肌湯故陽明者肌肉之本也非專於發汗止汗之治桂枝麻黃兩方互併為一方加葛根者便作葛根湯故營衛肌肉之次也桂枝芍藥生薑甘草大棗止汗有麻黃桂枝甘草生薑發汗葛根味薄獨加一味者非發汗止汗從葛根以解肌故名葛根湯錢仲陽制升麻湯方治傷寒溫疫風熱壯熱頭痛肢體痛瘡疹已發未發用葛根為君升麻為佐甘草芍藥安其中氣朱奉議作活人書將升麻湯列作陽明經解藥予診楊氏婦陽明經標本俱實先攻其里後瀉經絡中風熱故用升麻加黃連以寒治熱也尼長老陽明經標本俱虛先實其里次行經絡故用升麻湯加附子以熱治寒也仲景乃群方之祖信哉面熱楊郎中之內五十一歲身體肥盛己酉春患頭目昏悶面赤熱多服上清藥不效請予治之診其脈洪大而有力內經云面熱者手陽明病脈經云陽明經氣盛有餘則身以前皆熱況其人素膏粱積熱於胃陽明經多血多氣本實則風熱上行諸陽皆會於頭故面熱之病生矣先以謂胃承氣湯七錢加黃連二錢犀角一錢疏利三兩行徹其本熱次以升麻加黃連湯去經絡中風熱上行如此則標本之邪俱遠矣方升麻加黃連湯升麻葛根各一錢甘草五分白芷七分川芎三分黃連四分白芍藥五分生犀末三分荊芥穗三分黃芩四分薄荷葉二分上銼如麻豆大用新水半盞先浸川芎荊芥薄荷外都作一服水二盞半煎至一盞半入先浸三味同煎至一盞去滓食後溫服數服而愈忌酒濕面及五辛之物面寒真定維摩院尼長老六十一歲身體瘦弱己酉十月間病頭面不耐寒氣弱不敢當風行諸治皆未效診其脈弦細而微其人年高長素食茶果而已陽明之經本虛脈經云氣不足則身以前皆寒慄又加看誦損氣由此胃氣虛經絡之氣亦虛不能上榮頭面故惡風寒先以附子理中丸數服溫其中氣次以升麻湯加附子行經絡升麻加附子湯升麻葛根白芷黃耆黑附子甘草人參益智仁草豆蔻上等分銼如麻子大作一服水三盞連須蔥白同煎至一盞去滓溫服食前數服良愈防風散洗療一切風毒頭面生瘡防風荊芥穗吳白芷白茯苓蔓荊子威靈仙何首烏川芎各三兩苦參白牽牛各半斤上為粗末每藥末三兩好漿水三升煎五七沸去滓洗面每日早晚二次用治面瘡方出危氏方用貝母為末小葦筒灌其口數成痂而愈硫黃膏治面部生瘡或鼻臉赤風赤百藥不效者惟此藥可治妙不可言每臨臥時洗面令淨以少許如面油用之近眼處勿塗數日間瘡腫處自平赤亦消風刺粉刺一夕見效生硫黃白芷栝蔞根膩粉全蠍芫菁蟬蛻上為末麻黃臘約度如合面油多少熬熔取下離火入諸藥在內如法塗之一方加雄黃蛇床子少許松脂膏治面上風瘡黃水流出或癢或痛松脂石鹽杏仁各一兩蜜三合蠟一兩薰陸香二兩蓖麻子仁一兩上先研松脂石鹽薰陸香等次入杏仁蓖麻研令勻用蜜蠟煎成膏攤於帛上貼之日兩度換之治髭瘡方用耳中垢塞敷之立愈又方用白殭蠶直者一枚以蔥白擂汁同殭蠶細研塗之瘡上即愈治面上瘡癬方白芨白蘞白芷白茅香零陵香各等分上為末赤豆末拌共搗常用其瘡癬上自去也治面惡瘡及甜瘡流出黃水沾肉為瘡方胡粉黃連粳米赤小豆水銀上搗羅為末入胡粉水銀研令勻以清油旋調日二三度敷之妙治面上生風瘡方硫黃蝸牛殼胡粉膩粉各一兩麝香半兩上都細研令勻面脂調塗之治面上風毒惡瘡方胡粉松脂水銀各二兩上先以松脂合豬脂煎令消納水銀胡粉攪令勻候冷塗之治面上赤瘡散浸或如痱子或如風渣滿面赤疼方黃連黃芩黃柏各一兩膩粉一分上搗羅為末入膩粉同研令勻用油蠟面脂調如膏夜臥時先以漿水暖洗面了敷之明旦還以漿水洗面不過三兩上即瘥治面上風毒方玉屑密陀僧珊瑚各二兩白附子三兩上四味末之以酥和夜敷面上旦洗之亦滅瘢痕白蓮散治去黑子諸般瘤瘢花鹼桑柴灰風化石灰各二錢糯米三錢上件用瓷石罐內瓦蓋口用黃泥裹定以武火燒一時辰許取出放冷將藥研細每用針尖撥干貼清肺散治肺經客熱鼻面風瘡蔓荊子桑白皮各一兩甘草半兩荊芥穗一兩半上為細末食臘茶調下一大錢日再亦治面渣鼻至奇治面上風毒惡瘡方硫黃半兩杏仁胡粉各一分上都爛研令勻以臘月豬脂調勻日三二服塗之柏連散治面有熱毒惡瘡胡粉黃柏黃連各等分上為末取敷上瘥止若瘡干以面脂調塗之日三一方豬脂亦可調塗治頭面生瘡燥癢黃水出方密陀僧硫黃各二錢上為末酥油調敷苦參丸治肺毒邪熱頭面生瘡生疥癬用苦參為細末粟米飯和丸如梧桐子每服五十丸米湯下治面上肺風瘡方何首烏防風薄荷烏蛇各二錢半苦參荊芥穗川芎香附子各半錢上為細末每服三錢食後茶酒送下後用洗瘡法易容膏治面上瘡及點麻油半斤乳香松節松脂黃蠟白芨川升麻各一兩白蘞半兩上搗升麻白蘞細羅為末先以油煎松節並白芨令黃赤色濾去滓後入松脂黃蠟又煎令消即入乳香升麻等末熬成膏傾於瓷器內收凡面上䵟𪒟風刺諸般惡瘡敷之極妙治面上肺風瘡方用無灰酒於沙碗缽內濃磨鹿角尖敷之兼服和劑局方治腎臟風黃耆丸即愈治面上瘡及䵟易容方用烏蛇二兩燒灰為末以臘月豬脂調敷之治面上五色瘡方用鹽湯綿浸拓瘡上日五六度易瘥治面上瘡黃水出並眼瘡方以一百五日收取桃葉不拘多少細末之食後以水半盞調服方寸匕日二甚良治療痱瘤子用之仍得光潤皮膚以土瓜根搗篩漿水和勻入夜漿水洗面敷藥旦復洗之百日光華射人夫妻不相識小兒四歲發黃生搗絞汁三合與飲不過三次已瘥療瘡方去面上風刺瘡黃連糯米赤小豆吳茱萸上搗黃連等下篩先於掌中研水銀使極細和藥使相入以生麻油攪稀稠得所洗瘡拭乾敷之但是瘡即療神效治面上瘡用𨫼子底黑煤於小油中以匙打成膏子攤在紙上瘡上貼之柳絮散治面露瘡作醲窠如香瓣柳絮搗末膩粉上等分研勻燈盞中油調塗之澡豆澤面面膏滅瘢痕附論積風熱諸毒於肺臟發於肌肉而為瘡癤折瘡愈餘毒未散故瘡痂雖落而瘢痕不滅法治既有塗澤膏潤之劑亦須賴營衛平均肌溫氣應外宜慎風冷也方治面靤瘡瘢三十年以上並冷瘡姜瘢金瘡瘢斑蝥巴豆密陀僧胡粉鴟脂各三兩煎金銚洮沙一三兩高良薑海蛤三兩上以粉鴟脂和塗夜半塗之旦以甘草湯洗之瘥祛風膏滑石牙子盆硝舶上硫黃乳香各等分輕粉腦子麝香各少許上為細末用酥油和勻臨臥洗之後塗在面上無酥油清油亦自佳妙治久患瘡痍後瘢痕不滅方定川瓷味白殭蠶白附子白芷各二兩珍珠末半兩野䰿脂三升酥一兩上搗為末先消野䰿脂與酥二味為汁候熱氣退即下諸藥攪之如膏用塗瘢上白殭蠶膏治面上瘢痕及患瘡痍瘥後不滅白殭蠶白魚白石脂白附子鷹屎各一分臘月豬脂二兩上除豬脂外搗羅為末細研以豬脂和令勻瓷盒中盛旋取敷瘢痕上避風六物滅瘢痕膏衣中白魚雞矢白鷹屎白芍藥白蘞上藥等分研如粉以乳汁和塗瘢上日三良辛夷膏治面上瘢痕及一切瘡瘥後亦黑不滅時復不止辛夷鷹屎白杜若細辛各半兩白附子三分上除鷹屎外並銼碎以酒兩盞浸一宿別入羊髓五兩銀石器鍋中以文火煎得所去滓將鷹屎研入粉納膏中攪勻再以微火煎入盒中每日三塗瘡瘢上避風一方以蜜敷之治面上瘢方白殭蠶珊瑚白芷各一兩雞矢白硃砂各一兩上搗蜜和之尤良治久患瘡痍後瘢痕不滅方當歸膏治面上瘢痕當歸白芷各一兩鷹糞白半兩烏雞糞一兩上先將當歸白芷銼碎浸一宿別熔豬脂一斤消夜入浸藥並酒文火煎之候白芷色黃去滓將雞糞鷹糞納膏中攪勻傾入瓷盒中每日三塗瘢痕上避風一方不用酒治面上及瘡瘢不滅方鷹屎白爛腐骨尿白鹼各四錢麝香二分上研令如粉以葛布揩令面微疼以脂和敷之日二度瘥玉屑膏治面上瘢痕及風毒玉屑密陀僧白附子珊瑚各二兩上搗為末入乳缽內都研令勻每度用藥末二錢以真牛酥調勻夜臥時塗面旦用溫漿水洗之治滅痕無問新舊必除方當歸一兩豬脂三斤白芷一兩上為搗綿裹以酒二盞煎十餘沸去滓日五七度塗之治滅瘢痕方禹餘糧半夏各等分上為末以雞子黃和先以新布拭瘢處令赤後用藥敷之勿見風日二十日十年者亦滅一方治一切瘡瘥後赤黑瘢痕不滅時復癢不止治瘢痕凸出方鷹屎白一兩衣中白魚二十枚上為末蜜和以敷日三五度良又方鷹屎白二兩白殭蠶一兩半上為末蜜和敷之日三慎五辛生菜又治一切瘡瘥後赤黑瘢痕不滅復癢不止臘脂膏治面上瘢痕方臘脂四升大鼠一枚上入鐺中以文火煎之待鼠消盡以新綿濾去渣入瓷盒盛每用先以布拭令瘢痕色赤次以膏塗之三五度瘥避風救急滅瘢方蒺藜子山梔子各一兩上為散醋漿和如泥臨臥時以塗之旦洗去治瘢痕凸出方鷹屎白一兩白附子一兩上為細末酥調塗凸上日數次治一切瘡瘥後赤黑瘢痕不滅時復癢不止方黃礬燒令汁出胡粉燒令黃各半兩上為細研以臘月豬脂和更研如泥令勻先以布揩之令赤痛即用藥塗之日五七度效又方鷹糞白燕窩中草各等分上研為末以人乳汁和塗於瘢上日三四度夜臥時准前塗之旦以漿水洗之自然肉平如故治熱毒瘡瘥後瘢痕不滅方出聖惠方雞子一枚酒浸七日後取黃白殭蠶二七枚上藥與雞子相和令勻先以布揩瘡瘢赤痛塗之甚效治滅瘢痕方用白蜜和鷹屎白三兩細研敷之三服則無問新舊必除治瘢痕凸出方出聖惠方用春夏以大麥面秋冬以麥麩好細絹下篩以酥和敷之又方出聖惠方夏以熱瓦熨之冬以凍凌熨之雞子膏出聖惠方治瘡瘢痕無問新舊塗用雞子五七枚熟煮取黃於鐺中炒如黑脂膏以物先揩瘢痕然後塗膏日三九日即自滅舊肉無別治面上瘢痕方用馬莧汁洗緊唇面皰馬汁及射工毒塗之瘥指爪破面用生薑自然汁調輕粉敷破處更無痕瑕真玉磨方出聖濟總錄治面上瘢痕取真玉平處一面磨瘢痕久則無痕治面上滅瘢方療久瘡及金瘡凡百瘡瘢方能令高者就下下者起平出肘後方取純白色雌雞一頭籠之煮豆赤小者飼之七日即餓之百日後乃截羊腎脂飼若不得食更餓之自然食頻日與之食小糞出當色白膩潤此堪用籠雞白糞二合辛夷四合白附子二分牡蠣三分細辛二分合搗末蜜和塗瘢上治去瘡瘢方出海上名方用白獺髓雜玉屑琥珀屑塗之一方用密陀僧末水調塗治火燒瘡滅瘢方出聖惠方用赤地利二兩搗羅為末以生麻油調敷之瘡上以瘢滅為度又方出肘後方以人精和鷹屎白塗之日二無問新舊必除亦用白蜜和之治雜瘡及滅舊瘢痕用白殭蠶衣魚鷹屎白三味等分為末入在面膏內和塗之瘡瘢即滅衣魚多在衣中書中者名蠹魚療豆瘡瘢面黶出譚氏小兒方以密陀僧細研水調夜塗之明旦洗去平復矣治面上滅瘢用木蘭香一斤以三年米醋浸一日出曝乾為末敷之用醋漿漬一百日干為末服方寸匕日二次木蘭香即蘭香菜也
