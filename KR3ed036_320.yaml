木香薑桂等藥而未敢投痛甚則築心築背定兩脅似有兩柴十字插定心脅叫聲徹天召僕診之六脈沉伏乍來去衆問診脈吉凶何如答曰凡大痛之脈不可准也但以證辨用藥觀其人甚肥偉問其大腑數日不通僕曰實痛也其腹必脹但以人按之痛甚手不可向邇此大實也經云滿大實者可下之用氣針丸五六百粒是夜即愈又曰金陵有家提幹偶一日其內人病心腹脹痛衆醫投木香沉香檳榔大腹芍藥薑桂之類痛益甚召僕診之六脈弦緊而和不似病脈但診時手如火以此知其實痛也衆問如何治療僕曰大凡心腹刺痛不可便作虛冷治之有二醫答曰非冷而何熱即生風冷生氣是也僕曰不然難經云虛作癢實則痛張仲景云腹痛者投桂枝加芍藥湯痛甚者再加大柴胡湯家提幹云荊布素來質弱僕曰有可辨處遇痛時使一婢按之若痛止是虛寒證也若按之轉甚手不可近此實痛也令一婢按之手不可近叫喚異常僕曰此實熱無可疑者當用大柴胡湯治之衆皆不許僕責狀而投之八服愈逍遙散亦妙
