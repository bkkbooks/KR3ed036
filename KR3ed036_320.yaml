body:
  text: 卷三百二十婦人諸疾門吐血附論夫人吐血者皆由臟腑虧損所致夫血者外行於經絡內榮於臟腑若傷損氣血經絡則虛血行失於常理氣逆者吐血又怒氣逆甚則嘔血然憂思驚恐內復氣逆上者皆吐血也方生地黃煎治婦人勞熱至甚吐血不止心煩神躁少思飲食生地黃汁一升生藕汁三合青蒿汁三合生薑二兩取汁蜜四兩酥一兩柴胡一兩去苗知母二兩雞蘇葉一兩上為散與煎藥汁同於銀器中攪令勻慢火煎成膏收入瓷閣中每服半匙以清粥飲調下不計時候雞蘇散治婦人吐血心煩昏悶麥門冬當歸八分雞蘇葉一兩阿膠刺薊生地黃各一兩黃耆羚羊角屑茜根甘草各半兩伏龍肝黃芩各三分上為粗末每服四錢水一盞煎至六分去滓溫服用姜三片竹茹半雞子大同煎刺薊散治婦人頭疼壯熱心中煩悶吐血刺薊二兩雞蘇葉二兩赤芍藥麥門冬二兩去心赤茯苓一兩石膏三兩黃芩一兩茜根一兩炙微赤銼甘草一兩炙微赤銼生乾地黃二兩上為散每服四錢水一中盞入生薑半分青竹茹一分煎至六分去滓溫服不計時候阿膠散治婦人吐血心神煩熱阿膠二分搗碎炒黃燥當歸三分犀角屑三分黃芩三分雞蘇葉三分羚羊角屑三分桂心三分麥門冬三分去心生乾地黃二兩甘草半兩炙赤銼上為散每服四錢水一中盞入淡竹茹一分生薑半分煎至六分去滓溫服不計時候雞蘇散出大全良方治虛損氣逆吐血不止雞蘇葉黃芩各一兩當歸半兩赤芍藥阿膠二兩伏龍肝二兩刺薊生地黃黃耆各一兩上為粗末每服四錢姜三片竹茹如彈子大水同煎比大全良方雞蘇散此多刺薊生地黃黃耆內煎法多生薑竹茹然治證併入兩全同故法良方而存此也麥門冬散出聖惠方治婦人心中壅毒吐血煩悶麥門冬二兩生乾地黃二兩薺苨一兩半犀角屑一兩黃芩一兩川升麻一兩白茅根三兩半銼藍葉二兩甘草一兩炙微赤銼上為散每服四錢水一中盞入香豉一百粒淡竹茹一分生薑半分煎至六分去滓溫服不計時候伏龍肝散出永類鈐方治男子婦人五臟結熱吐血衄血並皆治之伏龍肝生地黃各一兩竹茹一升芍藥當歸黃芩川芎桂心甘草各二兩上味㕮咀水一斗三升煮竹茹減三升納藥煮取三升分為三服一方無桂又用生蔥心塞鼻或因刺著血不止立住竹茹湯出千金方治婦人汗血吐血尿血下血竹茹二升人參芍藥桔梗芎藭當歸甘草桂心各一兩乾地黃四兩上㕮咀以水一斗煮取三升分三服生地黃散出濟生拔萃諸見血無寒衄血下血吐溺血背熱屬於熱生地黃熟地黃枸杞子地骨皮天門冬黃耆芍藥甘草黃芩各等分上為粗末每服一兩水煎脈微身涼惡風每一兩加桂半錢治肌瘦咯血肺痿等疾出大全良方蛤蚧一雙全者酒浸一宿捶炒乾知母貝母去心人參去蘆杏仁去皮尖麩炒枇杷葉去毛炒鹿角膠粉炒甘草上各一兩淨研為末每服三錢水一盞入桑白皮煎至八分溫服日三夜二青飲子出大全良方治咯血青黛杏仁上一處同研成膏熔黃蠟和作三十餅子每服一餅子用乾柿半個夾定以濕紙裹煨合香同嚼粥飲下無時治婦人熱毒上攻吐血不止一名五神湯出聖惠方生藕汁刺薊生地黃汁各三合生薑汁半合白蜜一合上和煎三兩沸無時以小盞調炒麵塵一錢服紫參散出聖惠方治婦人卒吐血不止胸心悶痛紫參一兩鹿角膠一兩搗研炒黃燥青竹茹一兩羚羊角屑一兩炒黃燥生乾地黃二兩上為散每服二錢新汲水磨生薑調下不計時候生地黃散出聖惠方治婦人心熱壅悶吐血生乾地黃一兩半麥門冬一兩去心甘草半兩炙微赤銼薺苨三分白茅根一兩銼藍葉一兩上為散每服四錢水一中盞入生薑半分豆豉一百粒煎至六分去滓溫服不計時候柔脾湯出大全良方治虛勞吐血自汗出甘草白芍藥黃耆各一兩熟地黃二兩上為末每服四錢水酒各一大盞以上煎至七分盞濾去滓只取六分清汁放溫食前服之有女年十四月水不行遂妄行而嘔血諸藥無效察其形容人肥脈不大不出且用四生丸即安余又嘗治一男子因飽低頭負重吐血諸藥無效亦用四生丸及青餅子即安更不發僕觀初虞世治吐血不喜用竹茹生地黃藕汁然亦不可拘泥此說如陽乘於陰血得熱則流散經水沸溢宜服涼藥以解之大黃犀角生地生艾藕汁豈能無功如陰乘於陽所謂天寒地凍水凝成冰宜服溫藥以暖之乾薑肉桂豈能無功學者更宜思之可也以上所論中四生丸青餅子各見於後四生丸出聖惠方療吐血陽乘於陰血熱妄行宜服此藥生荷葉生艾葉生地黃生柏葉各等分上等分爛研丸如雞子大每服一丸水三盞煎至二盞去滓溫服無時候經驗良方陳氏云先公遊福青靈石寺見侍者齊罷來侍立見桌子不穩急聲喊拆之登時即嘔血蓋食飽傷破肺也明年又到寺因問去年嘔血者何若其主僧答之得四生丸服之遂愈因以屢救人有效又方出聖惠方治婦人吐血百治不瘥龍骨半兩當歸三分銼搗炒生乾地黃一兩上俱為細散以生地汁調下二錢不計時候又方出聖惠方青竹茹一兩生地黃三兩羚羊角屑半兩上以水一大盞半煎至一盞去滓分三服不計時候又方出聖惠方肉桂心一兩阿膠半兩搗碎炒黃燥生乾地黃半兩上為細散每服一錢煎竹茹湯調下不計時候溫服又方出聖惠方治吐血生地黃三升切阿膠二兩炒蒲黃六合上用水五升煮取三升分三服僕嘗治一人吐血診其脈肝部弦氣口濡此因怒極而得之遂用蘇合香丸和雞蘇丸服即效一方為散粥餅調下二錢或煎乾姜甘草湯與服或四物理中湯亦可服生地黃竹茹藕汁出經驗方治婦人吐血陳槐花二兩炒百草半兩上為細末每服茅蔗根煎酒調下亦治血崩一方無茅蔗根用錘紅燒淬酒下治熱毒吐血經日百治不瘥者出聖惠方地黃汁半升製大黃末一方寸上煎地黃十三兩沸調大黃末令勻為三服又方出大全良方治吐血用桂心末水調方寸日夜可二十服又方出聖惠方治熱毒吐血用伏龍肝研令極細每服二錢新汲水調下頓服取效茅花湯出聖惠方用白茅花濃煎飲之立止搗生白茅根取汁一合飲之亦得或取根握長六寸水煎去滓溫服又方出聖惠方用生蔥心塞鼻即定若因刺著並刀斧所傷血不止用之立定又方出大全良方用釜底墨研入鼻中又方出聖惠方用亂髮灰細研以竹管吹入鼻中立止又方出聖惠方取龍骨末吹入鼻中立止治一切風並鼻衄吐血腸風血痢及崩中帶下用牡驢皮煎膠食療熱甚嘔血者以犀角地黃湯局方小三黃丸以白茅根煎服治吐血及下血出本草以雞蘇莖葉煎取汁飲之咳嗽附論夫婦人咳嗽者由肌體虛外受於寒熱風濕所得也肺為四臟之華蓋內統諸臟之氣外合於皮毛若為寒熱風濕所傷邪氣自皮毛而入於肺中外皆傷故令咳也大抵治咳不可一概治當以脈息辨之脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者散之濕者燥之熱者涼之寒者溫之虛者補之未有不安者也內經曰微寒為嗽寒甚為腸澼古人立方治嗽未有不本下溫藥如乾薑桂心細辛之屬以寒氣入里非辛甘不能發散又曰熱在上焦虛則為肺痿實則為肺癰虛則為肺痿此人其始或血不足或酒色滋味太過或因服利藥重亡津液耗氣內焚肺金受邪脈數熱咳嗽膿血病至於此亦已危矣古人立方亦用溫藥加建中之屬今人但見發熱咳嗽卒用柴胡鱉甲門冬葶藶等藥旋踵受斃而不知豈可不深戒就使不可進以溫藥須用和平湯丸古之調治無為鹵莽致傷人命內經曰感於寒微則為咳甚則為泄凡咳嗽五臟六腑皆有之惟肺先受邪蓋肺主氣合於皮毛邪初犯先入皮毛故咳為肺病五臟則各以四時受邪六腑則為五臟所傳古言肺病難愈而卒至死者肺為嬌臟怕寒而惡熱故邪氣易傷而難治以湯散徑過針灸不及故也十種咳嗽者肺咳心咳脾咳腎咳肝咳風咳寒咳熱咳支飲咳膽厥陰咳華他所謂五嗽者冷嗽氣嗽飲嗽勞嗽邪嗽孫真人亦有方治寒毒渥嗽者歷代方論著之甚詳惟今之所謂勞嗽者無所經見意其華他所謂邪嗽真人所謂渥嗽者其病亦大約相同也此病蓋酒色過度勞極傷肺損動經絡其重者咯唾膿血輕者時發時瘥又有因虛感邪惡之氣且傳注得之或先嘔而後嗽或先咳嗽漸就沉羸此則非特內損肺經又挾邪惡傳疰之氣所以特甚病之毒害無過此也真人治渥嗽通氣丸方用蜈蚣四節又有夢與鬼交通及飲食者全用蜈蚣外臺方四滿丸治五嗽亦用蜈蚣遇世明公能推原其意旨率用蛤蚧天靈蓋桃柳枝麝香雄黃安息香之類以通神明之藥療之深知古人之意矣又肺中有蟲如蠶令人喉癢而咳嗽湯散徑過針灸不及宜令蟲化蟲死即嗽止夫嗽者感風於皮毛入於腠理寒於肺經所以嗽也潤肺湯散主之有吐而嗽者由茶飲過度停積於胸膈久則成痰使人頭目昏痛精神不爽風增寒結痰作嗽也潤肺湯加半夏食穢物炙嗽此肺受傷也六合湯玉屑丸主之妊娠而嗽者亦同也但急治恐胎墜治之以前藥攻之然與産後一理又有經産後而體已虛則肺虛客寒侵之故使肺作其嗽六合湯主之儒門事親論云楊壽之妻病嗽十餘年吐之一日不止以麝香湯止之夜半猶不定再止之明旦頗覺噁心更以人參湯止之二日稍寧自下藥凡三來問戴人謂欒景先曰病久嗽藥已擒病自然遲解湧後調理數日乃止又常言湧後有頓快者有徐快者有反悶悶者病未盡也有反熱者不可不下也大抵二日後無不快者方潤肺湯治咳嗽痛喉中鳴人參去蘆杏仁去皮尖麻黃紫菀洗去皮後炒各半兩陳皮浸去瓤桔梗去蘆炒阿膠銼炒令沸燥甘草各三錢貝母去心炒上㕮咀每服五錢水一盞煎至七分熱服之橘皮湯療春冬傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭痛陳皮紫菀麻黃去根杏仁制當歸桂心甘草黃芩各等分上㕮咀每服五錢水一盞半煎去滓熱服人參散治婦人肺臟虛冷時有咳嗽不思飲食人參一兩去蘆頭細辛半兩白朮三分陳皮二兩湯浸去白瓤焙肉桂三分去粗皮厚朴一兩去粗皮塗生薑汁炙香熟紫菀三分洗去苗土白茯苓三分乾薑三分炮桔梗半兩去蘆頭甘草半兩炙微赤銼上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓溫服不拘時候五味子散治婦人心胸痰壅時有喘促咳嗽不欲飲食五味子三分半夏湯浸七次去滑紫菀洗去苗土枇杷葉去毛黃各半兩前胡去蘆頭陳橘皮湯浸七次去瓤各三分桔梗半兩去蘆頭訶黎勒皮三分杏仁半兩去皮尖雙仁麩炒微黃赤茯苓二分枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼上為散每服三錢水一中盞入生薑半分煎至六分去滓溫服不計時候訶黎勒丸治婦人咳嗽不止痰毒壅滯心胸不利咽喉閉塞訶黎勒子三分貝母二分射干三分紫菀浸洗桂心三分紫蘇子三分微炒前胡三分去蘆頭桔梗三分去蘆頭木通三分銼皂莢子仁二兩微炒郁李仁一兩半湯浸去衣微炒銼研入上為細末研入郁李仁令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候以生薑湯下二十丸細辛散治婦人肺臟虛寒胸中痰滯不欲飲食時復咳嗽細辛洗去苗土訶黎勒皮各半兩附子一兩炮裂去臍桂心半兩甘草半兩炙微赤銼紫菀三分洗人參半兩乾薑半兩炮裂碎銼陳橘皮一兩湯浸去白瓤焙半夏半兩湯浸七次去滑上為粗散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓溫服厚朴散治婦體虛感於寒氣時有咳嗽厚朴一兩去粗皮生薑汁炙香熟白茯苓一兩半桂心三分白朮一兩訶黎勒皮三分陳橘皮三分湯浸去白瓤焙人參一