母生薑汁浸半日北五味子黃芩乾薑熟者減半陳皮各一兩半夏桑白皮桂心北柴胡熟者加一半各半兩木香甘草各一分上為粗末每服五錢水一盞半杏仁七個去皮尖碎之生薑一片煎至七分去滓熱服食稍空及臨臥各一服黃師文云戊申冬有姓蔣者其妻積年嗽制此方授之一投而瘥以治諸嗽悉皆愈玉屑丸治咳嗽涎盛痰壅咽喉不利半夏一兩薑製生薑一兩炒片子白礬枯百部一兩醋炙上百部共礬為末半夏生薑同煮令爛去生薑將半夏研如泥復搗百部礬為丸如梧桐子大每服五十丸食後臨臥薑湯送下痰飲附論夫痰之為害多因外感五邪乃寒暑燥濕風內傷七氣乃喜怒憂思驚恐恚因五邪而得者得風為風痰得寒為寒痰得冷為冷痰得熱為熱痰得暑為暑痰因七氣所傷者多因婦人情性熱者不能容忍而有此諸病豈特只因風冷而成哉所以外感五邪內傷七氣則一身之中血液涕汗鬱結蒸濕未有不變而成痰乘間而為害也經云清則運為精華濁則凝為痰飲此之謂也然有痰涎飲沫四種相類宜仔細詳辨調治因風而生疾者宜服三生飲星香飲青州白丸子化痰丸因寒冷而得者宜服降氣湯黑飲丹養正丹因熱而得者宜服金沸草散柴胡半夏湯因暑而得者消暑丸因氣不調鬱結而成者宜服參蘇飲四七湯二陳湯痰在上者以瓜蒂散吐之在下者以控涎丹利之雖曰可吐可下亦要觀人之勇怯察脈之虛實方可投之切記不痛擊暴下所以初虞世有金虎碧霞之戒者此也儒門事親云一婦人心下臍上結硬如斗按之如石人皆作病胎針灸毒藥禱祈無數如捕風然一日戴人見之曰此寒痰診其兩手寸脈皆沉非寒痰而何以瓜蒂散吐之連吐六七升其塊立消過半俟數日後再吐之其涎沫類雞黃腥臭特殊約吐去二三升凡如此者三投以人參調中湯五苓散調之腹已平矣又云婦人從年少時因大哭罷痛飲冰水困臥水停心下漸發痛悶醫氏咸以為冷積治之以溫熱劑及禁食冷物一聞茶氣病輒內作如此數年燔針燒艾瘡孔數十十餘年後小便赤黃而大便祕悶兩目加昏積水轉甚流於兩脅世謂水癖或謂支飲硇漆稜術攻磨之藥竟施之矣食日衰積日茂上至鳩尾旁至兩脅及臍下但發之時按之如水聲小腹結硬手不可近者月發五七次甚則欲死諸藥皆厭二十餘年求戴人發藥診其脈寸口獨沉而遲此胸中有痰先以瓜蒂散湧痰五七升不數日再越痰水及鬥又數日上湧數升凡三湧三下汗如水者亦三其積皆去以流濕消飲之藥調之月餘大瘥方旋覆花丸出御藥院方治停痰積飲在脅下久而不愈漸成癖心腹脹滿羸瘦不能食雖食不消化喜睡乾嘔大小便或澀或利腹中動搖有水聲或曰幹好飲水將依兩脅注痛服之必安久服除根旋覆花去梗桂心去皮枳實麩炒去瓤人參各一兩乾薑炮芍藥白朮各一兩二錢半赤茯苓狼毒川烏頭炮去皮各一兩半芫花醋浸半日炒乾橘皮去瓤吳茱萸湯浸去性炒黃細辛去苗大黃微炒黃芩去黑心厚朴去粗皮生薑炙葶藶隔紙炒七錢半甘遂炒半兩礬石火燒赤一兩七錢半上為末水糊為丸如梧桐子大每服三十丸淡薑湯吞下食前服柴胡半夏湯出永類鈐方治痰熱頭痛利膈除煩悶手足煩熱榮衛不調筋骨拘倦身體疼痛嗜臥少力飲食無味兼治五嗽痰癖柴胡八兩半夏二兩半人參去蘆甘草黃芩麥門冬各二兩白朮二兩上㕮咀每服五錢水盞半生薑五片棗一枚煎至八分去滓服四七服出濟生拔粹治喜怒悲思憂恐驚之結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七氣所為也或中脘痞滿氣不舒快或痰涎壅盛喘急或因痰飲中積嘔逆噁心並宜服之婦人性熱者不能寬解多被七氣所傷遂致氣損胸臆或如梅核上咽喉甚者滿悶欲絶産婦尤多此證宜先服此劑間以香附子藥久服取效不可謂紫蘇耗氣其新産氣血俱虛不肯多服用之自效紫蘇二兩厚朴三兩茯苓四兩半夏五兩上㕮咀每服四錢水一盞半姜七片棗一枚煎至六分去滓熱服無時候若因思慮過度小便白濁用藥吞青州白丸子極妙大半夏湯出大全良方治痰飲及脾胃不和半夏白茯苓生薑各一分上㕮咀作一服每遇膈間有寒痰以水二盞煎至一盞去滓臨臥溫服如有熱痰加炙甘草一分如脾胃不和去甘草加橘皮一分同煎此即二陳湯加減得理瓜蒂散出大全良方病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸中有痰也當吐之宜服瓜蒂炒黃赤小豆各半兩上為細末取一錢頭一服湯七合使先漬之須臾煮作稀糜去滓取汁和散溫調服不吐少加得快吐乃止諸亡血虛家不可與之脈微大忌令人吐茯苓丸出大全良方茯苓一兩半夏二兩枳殼半兩炮製風化朴硝一分上為末薑汁煮糊為丸如梧桐子大生薑湯下二十丸食後服控涎丹出大全良方凡人忽患胸背手足頸項腰胯隱痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定俗醫不曉謂之走疰便用風藥及針灸皆無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃痰涎伏在心膈上下變為此痰或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠黏夜間喉中如鋸聲多流唾涎手腳重墜冷痹氣不通誤認為癱瘓亦非也凡有此疾但以此藥不過數服其疾自痊甘遂去心大戟去皮真白芥子各等分炒上為末糊丸如梧桐子大臨臥淡薑湯吞下五七丸如疾猛加至十丸風痰附論夫婦人風痰者由臟腑風冷水飲停滯在於胸膈所成也人皆有痰少者不能為妨多者成患胸膈有痰隱積於五臟則令眼昏亦令頭眩頭痛也夫心胸嘈雜婦人多有此證原疾之由多是痰也皆血液淚汗變成是云血嘈今人多用豬血炒而食之則愈詳究此理是以血導血歸源恰如鹽梅下涎之義不若用旋覆花湯治心腹中脘痰水冷氣心下汪洋嘈雜腹鳴多唾口中清水自出脅腹急脹悶痛不欲食此胃氣虛冷所致其脈沉遲弦細是其證也方旋覆花湯出聖惠方治婦人風痰嘔逆及中脘冷心下嘈雜口中清水自出脅腹急脹滿痛頭目昏悶不欲食胃氣虛冷脈沉遲弦細旋覆花去蒂廣皮去瓤麩炒前胡人參去蘆羌活桂心枳殼半夏各半兩甘草羚羊角屑赤茯苓各三分上為粗末每服三錢水一盞姜三片煎至七分去滓溫服天南星丸出聖惠方治婦人風痰胸膈壅滯天南星白附子並炮皂莢仁炒黃半夏曲各一兩晉礬半兩枯上為細末以酒煮麵糊丸如梧桐子大每服十丸生薑薄荷湯吞下又方出聖惠方半夏天南星各二兩肥皂莢五挺銼生薑三兩上以水五升一同煮令水淨去皂莢生薑只用半夏天南星焙乾為末以酒煮麵糊丸如梧桐子大每服七丸生薑薄荷湯吞下一方加白附子二兩晉礬半兩並神效旋覆花湯出大全良方治婦人心胸嘈雜多是痰證或云是血嘈令人多用豬血炒食之則愈此以血導血歸源用此湯治中脘心腹冷痰心下嘈雜口中清水自出脅腹急脹胸滿不欲食悉主之旋覆花北細辛橘皮桂心人參甘草桔梗白芍藥半夏各半兩赤茯苓三分上㕮咀每服四錢水一盞半生薑七片煎至八分去滓溫服羚羊角散出聖惠方治婦人風痰氣壅心膈滿悶頭目昏重不下飲食羚羊角屑二分赤茯苓三分防風半兩去蘆頭藿香半兩半夏半兩湯洗七次去滑赤箭半兩訶黎勒皮三分旋覆花半兩前胡三分去蘆頭芎藭半兩赤草半兩炙微赤枇杷葉半兩刮去毛炙微黃枳殼半兩麩炒微黃去瓤上為散每服三錢水一中盞入生薑半分煎至六分去滓溫服不拘時半夏散出聖惠方治婦人風痰氣逆胸膈壅悶難下飲食半夏一兩湯洗七次薑製前胡一兩去毛頭旋覆花半兩以絹包煎大腹皮一兩銼桂心半兩人參二分去蘆頭白朮三分甘草半兩炙微赤銼枳殼半兩麩炒微黃去瓤桑根白皮半兩銼真陳橘皮半兩湯浸去白瓤焙防風半兩去蘆頭上為散每服三錢水一中盞入生薑半分煎至六分去滓溫服不計時候赤茯苓散出聖惠方治婦人風痰心胸不利頭目昏重時欲嘔吐不下飲食赤茯苓一兩蔓荊子半兩細辛半兩人參三分去蘆白朮半兩前胡一兩去蘆頭枇杷葉三分刮去毛炙微黃芎藭三分半夏半兩湯洗七次陳橘皮半兩湯浸去白瓤焙防風半兩去蘆頭甘草半兩炙微赤銼上為末每服三錢水一中盞入生薑半分煎至六分去滓溫服不拘時皂莢煎丸出聖惠方治婦人風痰皂莢一兩細銼去子用水七升漾浸取出於銀鍋內煎熬如膠天南星二兩炮製防風二兩去蘆頭天麻一兩旋覆花二兩薄荷三兩乾者上為細末拌和為丸如梧桐子大每服十丸生薑湯下不計時候又方出聖惠方治婦人風痰白礬一兩通明者生用硃砂一兩細研水飛過上同研勻以水浸蒸餅和丸如緑豆大每服五丸薄荷湯下不計時候喘滿附論岐伯曰夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨是以當時勇者氣行則行怯者則著而為病也原疾之由雖曰皆本於肺與氣然感外邪則有太陽證脈浮無汗而喘者宜麻黃湯陽明病汗出不惡寒腹滿而喘有潮熱者宜承氣湯如表邪未解誤服下藥促喘而汗出者宜葛根黃芩湯微喘者桂枝厚朴杏仁湯汗出喘若無大熱宜麻黃杏仁甘草石膏湯若表邪未解心下停水發熱而或嘔者青龍湯去麻黃加杏子主之若陰證喘促者四肢逆冷脈息沉細或寸大尺小或六脈促疾或心下脹滿結硬或冷汗自出或大便頻數上氣喘促或咽喉不利者此是本氣極虛內外挾寒冷所致使陰寒內消陽氣得復則愈宜返陰丹主之大概諸臟同乘而喘者以杏子散如感寒伏熱而喘者以華蓋散九寶湯若暴寒覆衣被過當復熱肺實而喘促者其狀似有熱證宜洗心散冷水調服若因氣血不調痰盛喘促者宜四七湯無官局桔梗湯姜煎服若涎多而喘者宜千緡湯橘皮半夏湯若不臥臥即喘者此由水氣逆行上乘於胸膈結在右脅下大如杯令人灑淅寒熱喘發癰疽宜棗膏丸若於肺肺得水則浮而開使氣不得通流六脈大宜神祕湯肺之積名上氣喘者宜神授湯若上盛下弱而喘促者宜蘇子降氣湯吞黑錫丹若尊年之人素來稟賦大厚不任熱藥者不可輕投丹劑乃諸熱藥但以祕傳降氣湯分心湯氣飲論之梗概不出於此若素有腳氣而喘者當作腳氣治之又有骨蒸勞喘治之別有法夫促者腳病者肺為之主五臟六腑皆稟氣於人喜怒太過不節肺氣實則上喘虛則氣短然有娠者經水不通上榮於乳下養於胎若宿有停飲與血搏後冷熱不調動其血飲上達故胸膈悶而嗽産後喘者榮血暴竭衛氣無主攻肺故喘促過在産時滿下太過此名有陽絶患難以喘論宜作六合湯若因去惡露發喘先與琥珀散後與喘藥服之方九寶湯出聖惠方治感風伏熱一切咳嗽喘急不問高年小兒婦人室女産前産後皆可服惟虛勞自汗不可服薄荷葉紫蘇大腹皮洗麻黃去根節各四錢桑白皮桂心杏仁去皮尖陳橘皮甘草各兩半上㕮咀每服半兩水一盞半姜十片烏梅一個煎至六分去滓溫服食後服一方加罌粟殼二個人參少許有兩浙張大夫病喘二十年每冬轉劇不可坐臥百方不瘥後得臨平謂法本服之遂瘥法本丸三十年服之服此藥半年乃絶根本永不復發凡服此藥須久乃瘥神祕湯出大全良方治水氣乘肺而喘兼療支飲而喘陳橘皮洗去白紫蘇葉人參桑白皮生薑各等分上㕮咀每服半兩水煎去滓溫服神授湯出大全良方治上氣喘急不得臥橘皮苦梗紫蘇人參北五味子上各等分㕮咀每服四錢水一盞煎至六分去滓食後服千緡湯出大全良方治痰喘齊川半夏七個炮製四片炒之皂角去皮尖一寸甘草炙一寸生薑如指大上藥以水一碗煮去半頓服沈與宗侍制常病痰喘不能臥人扶而坐數日客有見之曰我曾如此得良藥一服瘥我以千緡酬之謂之千緡湯可試為之與宗得湯一服而瘥棗膏丸出大全良方療息賁葶藶研細陳皮苦梗上後二味為末入葶藶令煨煮肥棗內研為膏和丸如梧桐子大每服五七丸飲下許學士云豫嘗患停飲水積肺經食已必嚏漸喘覺肺促急服此良驗杏子散出大全良方治諸臟相乘喘急杏子仁去皮尖雙仁麩炒黃細研如膏麻黃根為細末等分上和前橘皮湯調下二錢無時候治婦人喘促虛腫快利小便即瘥用生薑二兩取汁白麵三兩以薑汁搜作小劑大半夏十個打研入面中作為餅炙熟令黃色為末溫熱水調下一錢以小便通利為度天門冬丸出楊氏家藏方治婦人喘手足煩熱骨蒸寢汗口乾飲水面目浮腫天門冬十兩去心稱麥門冬八兩去心生地黃三斤取汁為膏子上二味為末膏子和丸如梧桐子大每服五十丸煎逍遙散送下散中去甘草加人參或服王氏博濟方中人參荊芥散亦可如面腫不已經曰面腫因風故宜汗麻黃桂枝可發其汗後服柴胡飲子去大黃故論曰治臟者治其俞治腑者治其合乳腫治其經治俞者治其土也治合者亦治其土也如兵家攻魏救趙之法也嘔吐附論夫婦人嘔吐者由脾胃有邪冷穀氣不理所為也胃為水穀之海其氣不調而有風冷乘之冷搏於胃胃氣中逆則令嘔吐夫嘔吐之疾非特因虛冷而嘔吐也亦有胃熱而嘔者亦有胃中冷胃口熱而吐者亦有痰盛而嘔者亦有血弱而嘔者經云無陰則嘔是也不可以一概用藥如胃冷而嘔吐宜用局方人參木香散理中丸及許仁則半夏丸人參七味丸如胃熱而嘔吐者宜用小柴胡湯蘆根湯竹茹湯槐花散如胃中冷胃中熱而嘔吐者宜局方藿香正氣散生薑棗子煎候冷服即止如痰盛嘔吐者宜局方半夏茯苓湯二陳湯如惡阻兼服茯苓丸如血不歸原而嘔者宜用十全大補湯加陳皮半夏藿香棗姜煎服嘔吐者飲食不時生冷過度致使脾胃不和氣逆嘔吐與無礙湯五物湯之類主之或月候不通經絡澀滯四肢浮腫而吐不能止則為飲逆也宜與五物湯妊娠而嘔吐經血既閉水積臟腑氣不宣故心煩憒悶閉食不美吃食無味飲啖酸果脅滿嘔吐此名惡阻胎氣上衝故也五物湯主之産後中惡嘔吐因傷其血損其氣虛其臟腑感其風寒則脾胃虛冷而嘔吐五物湯加半夏主之大凡滯下之病稍久或欲愈之時多有咳喘及嘔逆之證然咳逆者古人所謂噦是也噦者胃寒所生此證最難其他病亦惡咳逆如見此證宜用橘皮乾薑湯及半夏生薑湯丁香柿蒂湯若陽證咳逆者小柴胡湯橘皮竹茹湯嘗治一痢疾咳逆不止六脈沉弱諸醫用藥灼艾皆無效僕投退陰散兩服愈又嘗治許主簿痢疾愈後咳逆不止服諸藥無效遂灸期門穴三壯而愈如有嘔逆之證雖經云無陰則嘔然有胃熱而嘔亦有胃寒而嘔有暑毒而嘔如胃熱而嘔宜服小柴胡湯孫兆竹茹湯蘆根湯官局桔梗湯竹葉石膏湯加生薑主之嘔而發渴者豬苓湯又嘗治一痢後嘔吐六脈虛弱此胃寒而嘔又似暑毒湧於胃脘投局香蒂間愈方益母子散出聖惠方治婦人脾胃久虛氣弱多欲嘔吐全不飲食四肢乏力益母一兩附子炮縮砂仁丁香厚朴黃耆白朮白茯苓陳皮川芎良薑藿香葉當歸各三分人參桂心各半兩上㕮咀每服三錢姜三片棗三枚水一盞煎至七分去滓無時溫服一方加白豆蔻半兩甘草半兩厚朴丸出聖惠方治婦人胃冷嘔吐不下食厚朴去粗皮用薑汁炒三兩上以薑汁一升水五合煮令汁盡焙乾為末以酒煮神麯為丸如梧桐子大每服三十丸不拘時溫酒下白豆蔻散出聖惠方治婦人脾胃氣虛弱時欲嘔吐白豆蔻三分去皮芎藭半兩丁香半兩藿香半兩白朮一兩厚朴一兩去粗皮塗生薑汁炙香熟白茯苓半兩木香半兩訶黎勒皮半兩桂心半兩附子半兩炮製去皮臍半夏半兩湯洗七次陳橘皮三分湯浸去白焙高良薑半兩銼甘草半兩炙微赤銼上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓溫服不拘時候七香丸出聖惠方治婦人脾胃氣腹脹嘔吐不納飲食沉香三分麝香一分細研入白檀香三分藿香三分丁香三分零陵香三分檳榔半兩白芷半兩訶黎勒皮三分白豆蔻一兩微炒芎藭三分桂心三分附子半兩當歸三分銼碎微炒細辛三分木香三分上為末煉蜜和搗五七百杵丸如梧桐子大每服二十丸生薑湯嚼下不計時候白朮丸治婦人脾胃氣虛弱腹中冷痛時復嘔吐不能下食四肢少力白朮一兩木香半兩訶黎勒皮半兩當歸半兩銼碎微炒桂心半兩芎藭半兩青橘皮三分湯浸去白瓤焙附子一兩炮製去皮臍乾薑半兩炮製銼蓬莪朮半兩人參半兩去蘆頭厚朴三分去粗皮生薑汁炙令香熟吳茱萸半兩湯浸七次焙乾微炒甘草一分炙微赤銼上為末酒煮麵糊和搗三五百杵丸如梧桐子大每服二十丸薑棗湯下不計時候茅香花散治婦人脾虛氣逆或時嘔吐不思飲食四肢乏力茅香花一兩厚朴一兩去粗皮塗生薑汁炙令香熟丁香半兩高良薑半兩銼藿香三分陳橘皮一兩湯浸去白瓤焙訶黎勒皮半兩附子半兩炮製去皮臍當歸半兩人參半兩去蘆頭白朮一兩桂心半兩甘草半兩炙微赤銼上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓溫稍熱服不拘時候訶黎勒散治婦人脾胃氣逆胸中痰滯時欲嘔吐不思飲食訶黎勒皮一兩草豆蔻二兩去皮陳橘皮一兩湯浸去白瓤焙白朮三分厚朴一兩去粗皮塗薑汁炙令香熟高良薑三分銼白茯苓三分桂心半兩人參三分去蘆頭半夏半兩湯浸七次去滑附子三分炮製去臍甘草半兩炙微赤銼上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓熱服不計時候龍腦散治婦人脾胃