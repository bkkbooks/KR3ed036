body:
  text: 卷二百九十七痔漏門痔漏附論夫五痔之疾或出鼠乳或發寒熱或生瘡或癢痛或下血其證不一治之不早勞傷過度則毒氣浸潰肌肉穿穴瘡口不合時有膿血故成痔漏經曰痔久不瘥變為漏是也腸風痔病者所發手太陰手陽明經以應動脈謂肺與大腸為表裡為傳道以行糟粕腸風痔疾有五種其證亦異蓋陽氣虛而元府疏風邪乘而熱自生風濕邪熱攻於腸中致使大便澀而燥熱鬱血熱散而流溢沖侵腸里故以先血後便為熱在下先便後血為熱在上久而不愈乃作痔素問云因而飽食筋脈橫解房室勞傷腸癖為痔蓋以風熱不散穀氣流溢傳於下部故令肛門腫滿結如梅李核甚者變成而為漏也方蝟皮丸出濟生方治五種痔漏豬左足懸蹄燒灰存性蝟皮一枚燒灰存性黃牛角䚡燒灰成性貫衆槐角子炮雷丸雞冠花槐花炒油發灰黃耆去蘆香白芷當歸去蘆酒浸枳殼去瓤生用玄參黃連去須防風去蘆鱉甲醋炙各半兩麝香別研半錢上為末米糊丸梧桐子大每服七十丸加至一百丸空心米飲下年高虛弱寒濕痔疾不宜服之麝香蝟皮丸治腸風痔漏疼痛不止大便下血時舉發雞冠花八兩微炒存性牛角䚡燒存性貫衆去毛淨槐花微炒油發灰香白芷當歸枳殼去瓤玄參黃連黃耆防風去蘆半兩鱉甲一錢炙黃色麝香半錢別研蝟皮燒存性用一個訶子去核半兩淨微炒豬左懸蹄五個燒存性上入麝香和末為丸梧桐子大每服三十丸至四十丸空心飲下忌動風發病之物內補丸出聖惠方治痔漏積年不瘥黃耆二分銼槐花一兩微炒苦參半兩銼白桐葉三分龍骨三分貍睛一對微炙漏蘆半兩蝟皮一兩煮黃焦萹蓄半兩敗醬半兩續斷半兩木香半兩厚朴一兩去粗皮塗生薑汁炙令香熟硫黃一兩細研豬後懸蹄甲一兩煮黃焦上搗羅為末煉蜜和丸梧桐子大每服食前粥飲下二十丸寸金錠子御藥院方治一切痔漏久不可忍者麝香輕粉硫黃雄黃雌黃藤黃砒霜粉霜黃丹各二錢別研黃漆牡蠣紅藤根各一兩上為末燒陳米飯和勻捏如大棗子核每用一錠子紝在肛門內可深二寸許用定新磚毯兒兩個燒赤醋內蘸過綿裹肛門外尉冷即易一個次日大便取下惡物立效黃耆葛花丸出宣明論治腸中久積熱痔漏下血疼痛黃耆葛花生地黃焙黃牛角心小豆花各一兩大黃赤芍藥黃芩當歸各三兩蝟皮一個檳榔白蒺藜皂角子仁炒各半兩上為末煉蜜丸梧桐子大每服二十丸至三十丸桑白皮下食前槐子煎湯下亦得內補散治痔人參黃耆當歸各二兩白芷桔梗川芎厚朴官桂防風甘草各一兩上為末木香同上藥為丸內痔外痔皆治一方第用百藥煎湯洗患處雞峰烏金散出直指方治痔漏穿山甲刺蝟皮以上二味同炒豬牙皂角黃牛角心各碎炒黃槐子皂莢刺枳殼貫衆牛角阿膠各等分再夾和上為末每一錢半用胡桃肉研爛並調酒食前服大腸有熱荊芥泡湯調下漏血不止當歸煎湯調下代赭石丸出直指方治痔變為漏膿血不止代赭石煅醋碎研磁石煮米醋數沸蘸七次研牡蠣灰龍骨研蝟皮煮焦皂莢刺赤石脂川椒焙豬後蹄垂甲燒各存性木賊焙防風炒白礬煅上等分細末神麯糊丸小豆大每服五十丸食前艾並生薑湯下漏血處以熟艾曲和血竭塞日三換二礬丸一名釣腸丸治痔漏傍穿數穴膿不止並腸風脫肛等黃連黃芩荊芥蛇床子各二兩側柏葉生四兩槐條鏡面草蚵蚾草各一握黑豆半合甘草節半兩蔥連須一握上新汲水熟煎傾盆內熏後通手洗黃耆丸一名黃耆枳殼煎丸出本事方治遠年近日腸風痔漏腫癢結核成瘡諸藥不效黃耆蜜炙枳殼去白麩炒威靈仙各二兩續斷槐角子去蘆北礬枯當歸炒乾薑一方作良薑附子炮生地熟地黃酒浸連翹炒半兩上為末煉蜜丸梧桐子大米飲下三十丸進三服枳殼荊芥散治腸風痔漏並臟毒下血脫肛疼痛荊芥防風栝蔞木通當歸皂角刺甘草陳皮茯苓枳殼各等分上為末每服半兩水一盞煎至七分和滓空心溫服後用淋洗藥甘松鳳眼草蒴藋用根葉莖全華蔥各等分上為粗末每服用藥一兩水二碗煎三五沸癢痛時澡洗烏玉丹一名黑玉丹出直指方治丈夫婦人腸風痔漏著床大腸頭疼不可忍者服此藥三四次見效初得此疾發癢疼痛穀道四周多生硬核此是痔如破是漏只下血是腸風皆因酒色滯氣風食五事過度即成此疾人多以外醫塗治病在腸自有蟲若不去根本其病不除此藥的有神效棕櫚亂頭髮皂角水淨洗各二兩雷丸芝麻各一兩苦楝根二兩半蝟皮牛角腮三兩治洗淨乳香麝香各半兩豬蹄甲後腳者四十九個洗淨上除乳麝外用藏瓶或沙盒盛鹽泥固濟周回用火煅煙盡存性不可以太過便去火入乳麝再研細用酒打糊丸如梧桐子大空心食前胡桃酒下二三十丸楊氏方名棕櫚丸添不蛀皂角一兩半余同一方加槐角四兩燒灰存性榼藤子一兩二錢半炒若楝根減一半牛角腮四兩豬蹄甲用二十五個麝用二錢芝麻乳麝雷丸苦楝根榼藤子不燒外余藥各燒灰不用藏瓶每服五十粒荊芥茶或酒米飲任下秦艽蒼朮湯出衛生寶鑑腸風痔漏者總辭也分之則異若破者謂之痔漏大便祕澀必作大痛此由風熱乘食飽不通氣逼大腸而作也受病者燥氣也為病者胃熱也胃刑大腸則化燥火以乘燥熱之實勝風附熱而來是濕熱風燥四氣而合故大腸頭成塊者濕也作大痛者風也大便燥結者主病兼受火邪熱盛也去此四者其西方肺主諸氣其體收下亦助病為邪須當以破氣藥兼之治法全矣以銼湯與之其效如神秦艽一錢當歸三分酒浸澤瀉二分蒼朮七分防風半錢大黃少許黃柏四分酒洗檳榔二分皂角燒存性去皮一錢桃仁湯洗去皮一錢半上將檳榔桃仁皂角仁另為末外㕮咀都作一服水五盞去滓入檳榔等三味再煎去滓空心服一方青皮半錢木香三分同煎病大者再服而愈生冷硬物冷茶之類及酒食大面料乾薑之類犯之其藥不效如有白膿加白葵花去萼青皮半錢不去白入正藥中同煎又用木香三分為細末同檳榔等三味再上火同煎依上法服餌古人治此疾多以歲月除之此藥一服立愈病大者再服而愈榼藤子丸出御藥院方治風癖下血痔漏結核疼痛榼藤子一個重七錢酥炙和皮用茴香炒皂角刺燒存性蝟皮燒存性枯白礬白附子炮枳殼夫炒去瓤樗皮焙乾各半兩乳香二錢上為末醋面和丸梧桐子大每服四五十丸溫酒食前服如有痔瘡疼痛醋研五七丸津唾塗患處木香厚朴湯出宣明論治痔漏脫肛腸胃冷腹脅虛脹不思飲食木香陳皮桂心桃仁厚朴各一兩肉豆蔻赤石脂各半兩大附子二兩炮皂角子二兩去皮子酥煮黃上為末每服二錢溫粥飲調下食前神丹出危氏方治腸風痔漏刺蝟皮一個制鐵器中炒黑色為度皂角刺燒灰存性硫黃研豬牙角去黑灰塗蜜炙白礬枳殼銼碎炒黃耆蜜炙赤附子除去皮各半兩白雞冠花一兩上為細末酒煮糊為丸梧桐子大每服七丸至十丸空心食前溫酒下不飲酒米飲下久年痔漏服至三四十日肉滿平安諸痔服之即自消外痔用藥十丸同硃砂細碾蜜調塗常服永除根本若服藥覺熱加白雞冠花子一兩半或二兩更加三五丸服之臟腑自調勻也治痔漏翻花瀉血出驗良方狐貍手足一副陰乾穿山甲蝟皮各三兩川芎黃明膠乳香白附子川烏頭五靈脂各二兩上為粗末沙鍋固濟極干用炭火煅通赤去火坩堝研為末入麝香研芫荽酒調下二錢日三服黑丸子出危氏方專治久年痔漏下血乾薑百草霜一兩木饅頭二兩烏梅敗棕柏葉油發各五錢以上燒灰存性卻入後藥桂心三錢白芷五錢各不見火上為末醋糊為丸梧桐子大空心米飲下三十丸治風腸痔漏不問有頭無頭定三日安出本事方藜蘆燒灰半兩皂角針只用針不用皮條炒二錢天麻半兩乾薑半兩蓮子草一兩真麝半錢橘子硫黃一兩苦栝蔞一個大者明礬一兩上將栝蔞開一孔如小錢大入礬並硫黃在內卻將原掩合定藤紙糊卻瓦罐子盛坐磚上炭火煅令煙盡為度瓶內悶死後冷取出研細同前六味藥末和勻煉蜜丸梧桐子大每服十丸至十五丸空心溫酒下日三服三日效油麵醃藏牛馬肉魚腥生冷行房行遠勞力一切忌之紫金丸出王氏博濟方治痔漏久不瘥肛邊穴時出膿血龍腦麝香乳香雄黃密陀僧並碎各炒一兩砒霜半分丹砂阿魏安息香各一分上先將乳香安息香阿魏以熟水浸令通軟研如膏次將龍腦麝香丹砂密陀僧雄黃合研為末砒霜入緑豆粉二錢同研細更用巴豆三粒去皮心膜壓去油亦研細與前藥一處研勻卻入前乳香等膏和丸緑豆大每服一丸空心茶清下兼治腸風等疾婦人心痛血氣當歸酒下一丸心痛水瀉生薑湯下一丸食瀉麵湯下氣痛溫酒下一丸齏根湯治諸痔漏出膿水疼痛不止齏根曝乾蜀椒去目併合口炒出汗蛇床子續斷蕪荑仁野李根皂莢白皮松脂各一兩白礬半兩上細末每度二兩用水三碗煎至二碗濾去滓乘熱放盆內先熏後洗日三次香殼丸出宣明論治濕熱內甚因而飽食腸癖為諸痔久而成痛漏速治悉愈之木香黃柏各三錢枳殼去瓤炒厚朴各半兩黃連各一兩蝟皮一個燒灰當歸四錢荊芥穗三錢上為末麵糊丸梧桐子大每服二三十丸溫水食前日三服八寶散治腸風痔漏大附子一個去皮臍南乳香二錢半蝟皮一個燒灰皂角針一兩燒灰榼藤子一個去皮臍豬牙皂一兩去皮白礬半兩枯硫黃二錢半上為末醋糊丸小豆大每服七丸溫酒下日進一服二日進二服止假令十日進三次忌諸發毒物乳香丸出聖濟總録治一切痔漏反花瘡等疾乳香研半兩雄黃研生乾地黃瓦上煅醋浸焙乾黃蠟各一兩麝香研龍腦研丹砂研沒藥研各一錢上為末熔臘丸梧桐子大每服十丸麥門冬熟水下留少藥末貼欲貼時先用橘葉蔥湯洗之螺皮丸出聖濟總録治五痔連年不瘥漸成痔漏螺皮炙焦龍骨各二兩黃耆細銼當歸銼焙枳殼去瓤麩炒乾薑炮各一兩半艾葉三分附子炮裂去皮臍二兩上為末煉蜜丸梧桐子大每服三十丸食前黃耆湯下黑聖散出直指方治腸風臟毒痔漏及諸下血當歸川芎茯苓地榆槐花敗棕艾葉燒存性百草霜上等分為末每服二錢食前陳米飲下愈痔散出御藥院方治男子婦人一切腸風痔漏無問新久皆可服之南乳香另研槐花微炒木香商枳殼去瓤麩炒鶴蝨蓽澄茄去帶白蕪荑各一兩上為末如服時先嚼桃核一個次用熱酒一盞調藥二錢空心日進二服忌發熱風動氣痔等物榼藤子丸出宣明論治腸風瀉血濕熱內甚因諸痔久而不治乃變成漏黃耆枳實槐花荊芥穗鳳眼草榼藤子一個炙皂角三百個炙上為末麵糊丸梧桐子大每服二三十丸空心酒下米飲亦得忌油膩生冷豬魚魚臭血等物乳香沒藥散出宣明論治五種腸風痔漏無問久新宣黃連白礬各一兩穀精草半兩醋石榴一個用刀子割下蓋子裡面取子三停一停次將黃連白礬碎都入石榴內用原蓋子合用濕紙一張裹了後用膠泥拍作餅子裹石榴以炭火燒通赤取出去泥紙次將穀精草銚子內炒焦黃與石榴同極研碎卻入麝香一錢乳香二錢沒藥一錢研碎拌勻上每服一錢熱酒小半盞調下日三服香墨散出聖惠方治痔漏下膿血不止香墨三分枳實一兩麩炒微黃黃耆一兩銼代赭一兩當歸一兩銼微炒麝香一分細研白芍三分上搗羅為散入麝香更研令勻每服食前以粥飲調下一錢硫黃丸出聖惠方治痔漏腫痛膿血不止香墨三分枳實一兩麩炒微黃黃耆一兩銼代赭一兩硫黃一兩細研水飛過白礬一兩燒灰附子一兩炮製去皮臍皂莢一兩燒為灰麝香一兩細研蝟皮一兩燒灰皂莢一兩去黑皮塗酥焦黃炙去子上搗為末入麝香研令勻以醋煮麵糊為丸梧桐子大每服食前溫粥飲下十五丸治痔漏疼痛腫硬不消用此熏方出聖惠方莨菪子齏子雄黃吳茱萸豬牙皂角以上並生用上搗為末黃蠟為丸彈子大用小口瓶子內燒一丸熏痔漏上日可兩度用之槐角丸出直指方治五種腸風瀉血糞前有血名外痔糞後有血名內痔大腸不收名脫肛穀道四面胬肉如奶名鼠痔頭上有孔名漏並皆治之此藥治腸風癢內小蟲裡急下膿血不止癢痛消腫聚驅濕毒久服永除病源槐角去梗枝炒一兩地榆當歸酒浸宿焙防風去蘆各八兩黃芩枳殼去瓤麩炒各半斤上為末酒糊丸梧桐子大每服三十丸米飲下不拘時槐荊丸出御藥院方治男子婦人腸風痔漏先臟腑後便血槐花微炒荊芥穗去土枳殼麩炒去瓤各一兩白礬生薄荷葉鬱金各半兩上為末水麵糊丸梧桐子大每服六七十丸空心粥飲下日進二服淋泄藥御藥院方治腸風痔漏經久不瘥痔已成漏瘡口膿汁涓涓不絶及瘡內有蟲癢痛不止並宜淋洗之如瘡不破者用後方幹上藥塗貼威靈仙去土荊芥穗去土商枳殼去瓤炒乳香各一兩細辛二錢半去苗鳳眼草二兩上為粗末每服用藥三兩水一大升半煎至一升濾去滓稍熱淋洗患處如冷再溫熱再洗一遍不用如洗罷用綿或白絹揩乾上藥如瘡破後不須上藥只淋洗幹上藥御藥院方如瘡未破用前方淋泄訖用此藥塗之馬牙硝別研馬勃各半兩輕粉三錢半上為末如瘡癢痛不破者覷瘡大小用藥多少津液調成膏搽於患處日用三五次六神丸治痔漏膿血不止鯪鯉甲燒灰皂莢刺燒灰雄黃鶴蝨為末硫黃研各等分上為一處研勻麝香水煮麵糊丸梧桐子大每服十五丸空心煎湯酒或湯下加至二十丸蝟皮丸出千金方治痔並痔漏蝟皮一具礬石當歸連翹乾薑附子炮續斷黃耆各二兩槐子三兩乾地黃五兩上為末蜜丸桐子大每服十五丸日再加四十丸一方無礬石地黃肘後方用黃連無連翹葛花黃連丸出德生堂治凡受痔漏便血之證皆富貴人也因嗜欲恣情酒色無厭或食煎爆之肉大腸受熱毒之深故有斯疾或痔如鼠奶奶連珠翻花雞冠之狀其形不一或在大腸頭上糞門左右腫痛流膿出血發不時面色萎黃飲食減少或有糞後便血紅黑又有長絲縷之血起臥艱難並宜服之黃連一斤酒蒸浸去酒曬乾枳殼半斤去瓤炒乾葛四兩葛花四兩如無以葛代之槐花四兩木香三兩上為末留浸黃連酒作麵糊丸如桐子大每服五十七十丸飯水下酒亦可不拘時日進三服臭樗皮散出聖惠方治痔漏下血不止及膿臭樗皮一兩微炒銼醋石榴皮一兩地榆一兩炒黃連一兩去須艾葉三分微炒阿膠一兩搗碎炒令黃上搗羅為散每服食前粥飲下二錢蝟皮丸出聖惠方治痔漏膿血不止發歇疼痛蝟皮一兩燒灰白礬半兩燒令汁盡皂莢刺一兩燒灰硫黃半兩細研附子半兩炮製去皮臍榼藤子一個去殼上為末醋煮麵糊丸桐子大每服食前溫粥飲下二十丸治一切痔漏不論深淺必驗方名大萆薢丸出聖惠方黃耆二兩銼枳實一兩半麩炒微黃萆薢三兩銼白蒺藜三兩微炒去刺菟絲子一兩酒浸三日曝乾搗末烏蛇三兩酒浸去皮骨微炙上搗為末煉蜜和丸桐子大每服空心及晚食前溫粥飲下十五丸神驗散出神效方治腸風痔漏及五種腸風下血糞前有血名外痔糞後有血名內痔大腸不收名脫肛穀道四邊有胬肉如亂頭名鼠奶乳痔有穴腸出血名漏並皆治之牛頭角腮一隻酌中者豬牙皂角七個穿山甲四十九片或完取或四方取或一自取蝟皮一兩蛇蛻皮一條上捶碎盛在小口瓷器內鹽泥固定日中曬乾瓶口微露出煙用文武火燒紅赤煙為度取出放冷為細末如服藥日先一日臨臥細嚼胡桃仁半個如糊用溫醇糯酒一盞送下不語便睡先引出至次日交五更服藥驗病年月遠近或稱三錢五六錢用水半大盞醇糯酒半大盞相合令熟煎藥服之再依前服藥不須用胡桃仁久病不過七服忌油膩魚鱉雉兔豬犬等物鶴蝨丸治痔漏膿血不止經年不瘥亦殺蟲鶴蝨炒雷丸白礬灰各一兩皂莢刺硫黃研各一兩百部兩半上研為末醋煮為丸如桐子大雄黃為衣每服二十丸麝香溫酒下空心服之如聖餅治痔漏膿血不止臟毒下血寒食麵鉛丹研白礬燒令汁盡研輕粉研硫黃研等分上研勻用倒流水和作餅如錢大每病發時以慢火炙黃熟一餅分四服用溫熱水嚼下日日午時後服麝香散治痔漏麝香三錢槐花半生半炒荊芥穗各一錢千針草去皮根半兩硼砂研三錢上研為散每服二錢溫酒調下臨臥時服牽牛丸治腸風痔漏黑牽牛生熟各半豬牙皂角去皮何首烏香附子草烏頭切破冷水浸秋冬七日夏三日等分上為末醋打麵糊為丸如桐子大令患人勿食晚飯次日五更飽食燒熟豬肉一頓少時酒送下五七丸藥行息時用令水飯頻頻壓之大忌熱物後用熟熱烏頭於瘡上時時換灸之麝香丸出聖惠方治痔漏瘡腫疼痛膿血不止麝香半兩研細蝸牛子二兩炒令黃灶突墨二兩道人頭二兩漢椒二兩去目及閉口者微炒上為末煉蜜丸梧桐子大每服三十丸食前粥飲下黃礬丸出聖惠方治痔漏腫痛膿血不止黃礬三兩烏蛇六兩酒浸去骨皮炙令黃黃耆三兩銼枳殼二兩麩炒微黃去瓤駱駝胸前毛三兩半燒灰上為末煉蜜和丸梧桐子大每服二十丸煎黃耆湯食前下熊膽散御藥院方治痔漏瘡口不合膿汁清稀腫硬不消熊膽一錢雄黃輕粉各半錢麝香一字上件研為細末乾摻藥瘡口上治遠年痔漏不瘥木香丁香黑牛末白牛末各一錢上為末用雞子二個打開取黃同煎藥一處調勻再用雞子殼盛藥在內紙封口同煮熟分作四服空心溫酒下治痔漏附子一個腦子麝香沒藥各一錢上為末取薄荷自然汁丸梧桐子大每服一丸用蛙口涎沫調開點痔一二丸可治五人枳殼散治腸風痔漏枳殼木鱉子防風萆薢各二錢上為末每用藥半兩水三升煎至三五沸蕩三五次效異功散治腸風痔漏便血登廁糞前血為外痔糞後血為內痔大腸不收名脫肛有胬肉為鼠奶乳痔頭有孔名漏方見本門諸痔漏治痔漏此因大腸感風熱而生出本事方生砒一字水銀一粒如米大真麝一粒如小豆大膩粉一字上件並乳入鉢內研令極細如痔或有珠子將白礬蕩洗淨拭乾用手捻藥皆在痔內上覺得癢時便是藥行一日二次又洗去五日後住藥見效如或有孔即用紙捻引藥送入令徹其內更用紙貼孔前一日兩次使藥自然生合治腸痔漏出本事方大黃當歸川者苦參牙皂去皮上等分末醋糊丸梧桐子大每服二十丸空心溫酒下當歸湯一名清涼飲出直指方治痔漏消腫疼當歸切焙大黃煨銼赤芍藥甘草上為粗末每服二錢匕水一盞煎八分去滓稍熱服微利一行為效一方用乳香一錢硼砂半錢訶黎勒皮半兩同研為末以大棗一枚去核加藥末二錢匕棗肉紙裹煨熟分作四服茶清嚼下與前藥相間服亦得榼藤散出聖濟總録治諸痔漏膿血不絶羸瘦榼藤三個生油塗炙熱取肉續斷雞冠花炒烏賊魚骨去甲炙各一兩上為末每服二錢匕空心溫酒調下日晚再服丹粉散出聖濟總録治痔漏有瘡成竅膿血不止鉛丹鹽豉各一兩膩粉半兩大蒜一顆去皮切上先搗蒜令爛後入余藥搗作薄餅焙乾為細末少許貼之日三五次痔瘡漏豬牙皂角七個燒灰胡桃肉七個燒灰樺皮七塊燒灰栝蔞一個燒灰存性上為細末好酒調服空心吃二服痔瘡未破者乳香一錢硼砂一錢雄黃一錢信一錢上為細末用豬膽調塗硼砂丸出聖惠方治痔漏下血不止肌體黃瘦四肢無力硼砂一兩黃丹一兩砒霜半兩硃砂一兩上都研細入瓷盆子內歇口用小火燒令煙出為度停冷又細研用火燒七遍了入麝香一分同研令細以麵糊和丸如梧桐子大每於食前枳殼湯下五丸忌熱物麝香散出御藥院方治下部脫血或瘡痔漏久不瘥麝香血竭各半兩蝟皮一兩上先研蝟皮血竭為末次入麝香拌勻每服半錢溫酒一盞調勻食前日二服枳殼散御藥院方治腸風痔漏便血無數疼痛不可忍者枳殼麩炒去瓤槐子微炒黃色荊芥穗各半兩上為末每服三錢粟米粥調下如人行一二里地再用粥壓之空心日進三二服治脫肛痔漏出神效方胡荽一升乳香少許粟粳半升或一升上先泥成爐子留一小眼可抵肛門大小不令透煙火熏治痔漏下血不止出神效方紫皮蒜十個獨科者炒大椒六十枚豆豉四兩上搗爛為泥丸彈子大空心細嚼一丸鹽湯下日三服熏泄藥出神效方鳳眼草赤皮蔥椒各等分上同漿水滾過坐盆令熱氣熏痔但通手泄之如次不過三次愈治痔漏乳子出經驗良方側柏葉二兩乳香二錢枳殼去白一兩上為末二錢空心飯飲調下洗藥出經驗良方治痔漏下血荊芥枳殼各等分馬鞭草多使上焙乾為粗末煎湯熏洗治腸風痔漏京三稜用黑豆炒切作片子馬兜鈴穀精草各等分上為散水同煎熏洗效枳殼丸治腸風痔漏久不瘥者先穗子三兩皂角一兩去皮酥炙黃枳殼二兩去瓤生上為末煉蜜丸梧桐子大空心五十丸二聖散治腸風痔漏不問有無疙疸破不破者皆治之枳殼二兩用麥芽炒過去瓤用黃耆二兩破故紙二兩微炒上一處為細末空心好酒調下三大錢如不飲米湯調下忌食燒肉熱面雞鮓牛馬肉蔥蒜韭並動風之物一月治腸風痔漏出本事方赤芍藥官桂去皮甘草炙等分上㕮咀每服二錢生薑二片白糖一塊水一盞煎七分去滓空心服之丹砂塗方治諸痔漏疽瘡丹砂麝香蛇蛻燒灰各一錢上研令細以鹽湯洗瘡拭乾後塗敷日三二度療痔漏疽瘡光明砂別研麝香當門子別研蛇皮五月五日者炙上等分研先以鹽湯洗拭干瘡少蜜以散敷上瘥治痔瘡荊芥木鱉子朴硝各等分上煎湯入於瓶內熏後湯溫洗之立效治痔漏涓涓出膿血疼痛日夜不止漸加羸瘦宜服出聖惠方磁石二兩白礬二兩緑礬四兩上搗細入瓦瓶子內盛大火燒令通赤候冷將出紙襯攤於地上經宿細研如粉煮棗瓤和丸緑豆大每服食前粥飲下二十丸木賊丸出聖惠方治痔漏痛不可忍者木賊一兩榼藤子仁二枚塗酥炙黃烏賊魚骨二兩上搗羅為末煉蜜和丸梧桐子大每服不拘時候溫粥飲下二十丸治痔漏久不瘥宜服此方出聖惠方蛇床子半兩末荊芥半兩末蝸牛三七枚上一外研爛塗在紙上每發時先用白礬熱水洗痔頭了後用被褥上安藥紙上三兩上瘥露蜂房散出聖惠方治痔漏出膿血不止露蜂房半兩炙黃蝟皮半兩炙令焦黃麝香一錢上細研令勻每日三五度半錢敷之管仲散出御藥院方治腸風痔漏管仲紅藤各四兩上等好者上為粗末分作四分服用綿紙包作四裹每服一包上好酒一升煎至五合用小口器溫服藥渣收著候四服藥滓一處用水碗半煎至五沸用小口器盒盛放被兒內熏著瘡門就熱通手洗如蟲子死後不痛便瘥治痔漏出儒門事親白牽牛頭末四兩沒藥一兩上細末如欲服藥先一日不食晚飯明日空心獖豬精肉四兩燒令香熟薄批散藥在內裹之漸漸細嚼食盡然後宿蒸餅壓之稍下膿血為效量病大小虛實加減服之忌油膩濕面酒色三日外不忌一服見效或用淡水煮肉熟用上法亦可又用服前一日不食午飯並夜飯明日空心用之淨固丸出儒門事親治痔漏下血癢痛槐花炒枳殼去瓤各一兩上為末醋糊丸梧桐子大每服二十丸米飲下空心十服見效槐荊丸出儒門事親治痔漏槐花荊芥上等分為末每服一兩水煎空心下蒲黃散出儒門事親治下部痔漏蒲黃一兩血竭半兩上為細末每用少許貼於患處治痔漏瘡方出本事方雞子一枚煮熟去黃取白切焙白礬明者如皂角子大匙上枯丸用三分上為末用溫湯淨拭乾用紙捻占藥入瘡孔內立效一日二易治男子婦人諸般痔漏出本事方黃牛角狼毒等分上為細末翻花漏每服二錢甘草湯下合管漏薑湯下半錢腸風米飲一錢酸醋調一錢滴珠漏山梔子三個煎湯下蜀椒榼藤丸治痔漏不限年月深淺腫痛穿穴膿血不止蜀椒去目併合口炒出汗木杵輕搗取紅四兩榼藤子大者一個擘破炙上為末棗肉丸梧桐子大每服十五丸至二十丸空心溫酒下麝香散出聖惠方治諸痔漏有頭因穿破後成漏膿水經年不幹麝香研半兩鴿糞一兩上將鴿糞於淨地上火煅煙盡候冷與麝同研為散每服二錢匕空心米飲下晚再服一方銷黑錫二兩和捏作餅子常於瘡上貼之神效鯪鯉甲散出聖濟總録治諸痔漏有瘡膿出楚痛鯪鯉甲炙焦五分麝香研一分上為散每服二錢空心煎黃耆湯下日晚再服一方飯湯下熏漏瘡蒼耳枳殼各等分上件藥搗粗末水一碗裝磁瓶內煮汁濃坐在上熏妙治痔漏下膿血不止出聖惠方木賊一兩蝟皮一兩煮塗焦黃上搗為散每於食前粥飲下一錢又方出聖惠方遠志一兩棕櫚二兩燒灰上搗為散每於食前粥飲下一錢治痔漏膿血有瘡竅疼痛宜服此方出聖惠方砒霜半分研如粉黃蠟半分上銚子先熔蠟作針後為砒霜攪和勻看瘡大小捻為條子下部每發時用綿裹納瘡竅子中良久卻取出或未有竅子即內中良久卻取出日三兩度用即效砒黃敷方治下部漏瘡砒黃研蝤蟲陰乾為末各半兩上研令勻敷瘡口中以帛裹定日二次治痔漏出神效方用黑白牽牛一合炒黃為末豬肉四兩切碎炒熟與末藥攪勻作一服用新白米飲三二匙壓之取下白蟲為效又坐藥出神效方用鯪鯉魚二三甲以敷綿布裹如棗核樣納之痛即止治痔漏青蔥散出危氏方用蔥青內刮涎對停入蜜調勻先以木鱉子煎湯熏洗然後敷藥其冷如水唐仲舉云嘗有一吏人若死渠族弟親合與之早飯煎敷午後以榜子來謝拜於庭下云疾已安矣又方出經驗良方用死鱉頭燒灰研末塗腸頭上便能縮入又方出危氏方治痔瘡肛門周匝有孔十數諸藥不效用狗肉蘸藍汁空心食如不食狗肉騾肉蘸汁亦可七日自安治痔漏有蟲出肘後方用萆薢細銼貫衆去土等分為末湯酒下二錢食前溫服一方治有蟲下血用大棗肉一個去皮用水銀少許以唾研開和棗肉令蒸熟納下部治腸風痔漏用訶子不以多少和皮於灰內燒炮黃色為末先用槐枝煎湯洗瘡將藥末貼次日再用鳳眼草煎湯洗貼藥次用地蓬毛貼令病人自用津唾調搽如瘡有青水出速治如膿出難醫仍用紙捻入瘡內用藥仍服勻腸丸治痔漏用取向東生芭焦根擂爛炒熟鋪於軟凳上候冷坐又易不過三上其疾立除莫犯鐵器一方取汁熱酒浸空心服又方用袞麻不以多少將甑兒盛水於火上煎百沸將袞麻於甑內水中蘸過如法熱將袞麻於瘡上如法緊坐袞麻熱最好如此數次即愈瘡破者好治治痔漏用茄花為末香油調敷或燒灰亦好用又方用肥皂去子劈開安蜜於內火炙內令蜜干如此三次研為末空心酒調服四十日愈痔除漏孔自滿痔漏方初覺糞門腫痛者及以舊繡刀磨水洗之又方用槿花半開者不犯手採煎湯熏之治五般惡痔漏瘡用黑虎膏丸如棗核樣隨大小入穴再用膏藥貼上仍用甘草漏蘆煎湯下治腸風痔漏出本事方用鯽魚一尾破開盡去腸入白礬令滿瓦上燒過併為細末用雞毛卷藥敷治立效一方敗棕皮包紙裹煨香熟去紙尉斗內燒帶生存性為末每服一錢空米飲下一方瓦上燒為灰軟飯丸桐子大每服二十丸粥飲下河水方出本事方治痔漏下血不止翻花痔用城市河中水一桶脫衣坐水中頻洗即止痔亦可不過三五次立效治腸風痔漏出本事方上用雞冠花不以多少濃煎湯洗每服一錢空心下井水亦得久患者皆瘥並與數人用皆然神妙可驚不類他藥治諸瘡中毒痔漏等骨蒸彌良用羊屎熏瘡治瘡疥痔下血者用水煮蘇木汁服之治癰疽痔漏瘡及小兒丹方用水煮棘根汁洗之治痔漏瘡用馬兜鈴於瓶中燒熏病處入藥炙用啄酒散出聖惠方治痔漏有頭出膿水不止用啄木鳥一隻燒灰酒下二錢匕膽治瘡蟲立死治五痔漏瘡殺蟲方出肘後方用鰻鱺魚一頭治如食法切作片炙著椒鹽醬調和食之治大腸痔漏並脫肛出肘後方用虎脛骨兩節蜜二兩炙令黑搗末蒸餅丸如桐子大每服清晨溫酒下二十丸隔夜先和大便後方服此藥貍骨丸治痔及漏用貍骨炙和麝香雄黃為丸服之糞燒灰治鬼瘧如聖膏治痔漏有頭或如鼠乳用芫花根不計多少洗淨陰乾木臼內搗水少許絞取汁於銀石器內慢火燒成膏將絲棉就膏內度過以綿系痔頭初時微痛心躁後落以紙捻子膏藥紝於竅內永除根本未落不得使水潤腸丸李方御傳科治痔丸方朝貴用之屢效蓋其用藥簡要有次第製造有法無苦楚而收效甚速凡痔出外或翻花若蓮花復便血疼痛不可坐臥甚者用下藥早上藥一次午一次晚一次至夜看痔頭上出黃水漾如泉當夜不可再上藥一二日為好若年高人應外腎牽引疼痛可以人用火烘熱手於大小便間尉之其痛自安黃水未盡可再敷一日藥仍須勤就外科人早晚看照黃水流至盡是病根已去也大黃枳殼當歸各等分上為末煉蜜丸梧桐子大每服三十丸白湯或蜜湯下老弱人宜麻仁丸或三黃丸痔漏敷雙金散雙金散黃連鬱金等分上為末敷瘡口上龍骨散龍骨煅白芷黃丹寒水石煨各等分上為末糝瘡口上小便赤色服導赤散導赤散生地黃木通甘草等分上為末每服三錢白湯下將好服內補散方見在前痔漏有頭疼痛下膿血不止出聖惠方用桃根煮汁日二三上洗之灸漏法用葶藶子二合豉一升和搗熟作餅子如大錢厚二分許取一枚當瘡孔上作艾炷如小指大灸餅上三炷一易餅三丸炷隔一日復一灸之外臺作瘰癧古今録驗云不灸頭瘡葶藶氣入腦殺人又灸漏法出千金方用搗生商陸根捻作餅子如錢厚三分安漏上以艾灸餅上干易之灸三四升艾瘥外臺作瘰癧又方七月七日日未出取麻花五月五日取艾等分搗作炷用灸瘡上百壯血竭散出楊氏家藏方治痔漏疼痛不可忍者血竭須真好者上件為細末用唾津調塗頻用為妙玉屑散治腸風痔漏用葫蘆殼燒灰出火氣研極細清晨飲湯調下治腸風痔漏用沙糖打卻將樣子蘸糖和荊芥細末空心服之側金散出楊氏家藏方治痔漏竅下血疼痛干黃蜀葵花黃柏去粗皮蜜炙黃丹飛過韶粉以上四味各半兩麝香一錢別研上件前二味搗羅為末同後三味研勻每用於患處干貼之降真散出楊氏家藏方治痔漏有竅子者銅緑別研白礬別研密陀僧別研降真香楮葉各等分上件為細末每用少許以紙紝蘸藥捻入痔漏竅中三黃散出楊氏家藏方治痔瘡黃丹二兩水飛黃柏去粗皮黃連去須二味各四兩白礬一兩枯上件為細末津唾調下交藤丸出楊氏家藏方血竭半兩別研馬蘭根一斤川烏頭炮去皮研人參去蘆頭黃丹二兩何首烏四兩甘草二兩炙上件為細末醋炙麵糊為丸如梧桐子大每服三十丸鹽湯或酒送下空心食前後服藥了用茵陳湯洗之如瘡干無膿血後用三黃散貼黑神散出楊氏家藏方治痔瘡硫黃密陀僧碎上件同炒令煙絶細研為末用少許糝之日兩次用二香散出楊氏家藏方治遠年冷漏香鼠一枚令炙焦麝香少許同研上為細末和勻每用少許干糝瘡口先以溫湯洗之過拭乾次用上件藥糝如瘡口深膿出藥不能入血者用紙捻蘸藥紝在瘡內自然膿出少從里生肉面外有腳底被簽破及百日瘡不合口貼此藥遂瘥鯽魚散出楊氏家藏方治痔瘡鯽魚七枚長二寸者苜蓿子三錢上件將鯽魚取去腸肚淨洗了用苜蓿子均入在七枚魚肚內以線繫了文武火上慢慢炙令通里黃併骨焦研細每服一錢溫酒調下空心千金散出楊氏家藏方鼠狼一枚自死者不拘大小置砂瓶內蒻葉包定瓶口次用鹽泥固又用硬炭一十斤簇瓶火煅通紅七分盡取藥瓶在地上出火毒一宿研為細末每服二錢入麝香少許熱酒調下食空服如藥十日之後用刺蝟皮一枚燒作灰細末入麝香少許每服一錢溫酒調下食前服立驗膏出楊氏家藏方治痔漏正發忽腸頭不止血者貼之永除其根用活黃鱔魚一條以刀斷其首瀝血於掌中急以大活蜘蛛一枚以手指只就掌中研蜘蛛去蜘蛛皮刮於瓷瓦器內收於發時塗敷不過三二次瘥狐骨散出楊氏家藏方治痔漏狐骨皂角不蛀者上件各等分㕮咀每服一兩如香燒熏二白散出余居士選奇方治痔漏膿汁逗流疼痛不止寒水石火燒赤放令冷白滑石細研上件等分同研勻用新綿榲藥撲瘡口頻用抵聖湯出家藏經驗方治痔漏用躑躅花十文俗號蜘蛛花煎湯後一兩滾熱入朴硝十文在滾的腳桶內其上用板一片蓋令密當中穿一穴坐上熏之旋將五文荊芥細研入臘茶二錢點飲盡之候湯冷即起昔曾有夫婦俱病因得此方知其效也玉粉散治痔漏牡蠣燒煅入地坑出火氣為末濕即干糝如干即以津調敷紹與桂真官用此療友人劉葉效秦艽白朮丸治痔漏疾並痔漏有膿血大便燥硬而作疼痛不可忍者也秦艽一兩去蘆當歸半兩酒治桃仁一兩湯浸去皮炙地榆三錢枳殼麩炒半兩皂角仁一兩燒存性去皮澤瀉半兩白朮半兩上同為細末和桃仁泥子研勻煎熱湯白麵為丸如雞豆仁大令藥光滑焙乾每服二丸白湯送下空心宿食消盡服之待少時以美膳壓忌生冷硬物冷水菜之類並濕面酒及五辣辛熱大科蔥之類犯之則藥無效矣數服而愈痔漏之病乃風熱濕燥也以秦艽當歸尾辛溫和血涼燥疏風止痛桃仁潤血以皂角仁除風燥以地榆破血為使以枳殼之苦寒補腎以下泄胃實以澤瀉之淡滲使風歸於脾以補陰清燥除胃之濕邪也白朮之苦甘以苦補燥氣不足其甘能泄火滋益元氣也故曰甘寒瀉火乃假枳殼之寒也桃仁為藥入下焦經又曰在下者引而竭之多熱大便必澀以大黃泄去之其精血亦不足以當歸和血及油潤之劑則大便自然軟利也宜作劑湯以與之是下焦有熱急治之法也以地榆桃仁而和胃故宿食消盡空心作丸服之秦艽防風湯治痔漏每日大便時發疼痛如無疼痛非痔漏也此藥治之秦艽防風當歸身白朮以上各一錢半黃柏五分橘皮三錢甘草炙六分紅花少許桃仁三十個大黃煨三分升麻二錢柴胡二分澤瀉六分上件銼如麻豆大都作一服水三大盞去滓燒熱空心服之避風寒忌房事勿食酒面辛熱物及當風寒處大便當歸郁李仁湯治痔漏大便硬胬肉大便下垂多血苦痛不能忍皂角仁先另為細末煎成調服郁李仁一錢麻子仁錢半秦艽錢半蒼朮半錢當歸尾半錢澤瀉三分大黃煨三分生地黃半錢枳實七分上件㕮咀水三大盞煎至一盞去滓空心宿食消盡服之忌風寒處大小便秦艽羌活湯治痔漏成塊下垂極疼不任其癢升麻半錢柴胡半錢黃耆一錢炙甘草半錢防風七分藁本三分細辛少許紅花少許羌活一錢二分秦艽一錢麻半分上件銼如麻豆大都作一服水二盞煎至一盞空心服之忌禁如前秦艽當歸湯治痔痛大便結燥疼痛秦艽一錢當歸尾半錢桃仁二十個紅花少許枳實一錢煨大黃四錢澤瀉半錢白朮半錢皂角仁半錢上件銼如麻豆大都作一服水三盞煎至一盞去滓稍熱服食前小烏玉丹治痔漏瘡乳香半兩研麝香二錢研芝麻一兩生用苦楝根一兩去生用槐角子一兩半生用雷丸一兩生銼碎亂油頭髮三兩剪碎燒存性黃牛角腮三兩生用生豬前甲四十九個簍內燒灰存性南星一兩生用穿山甲四兩鹽固濟煅存性白礬一兩飛過半夏一兩生用枳殼一兩燒上件各依法過度為細末用好酒醋糊為丸如梧子大每服二十丸空心用米飲吞下日進二服如緑豆大亦得可服三十丸忌雞鵝肉新薑豆腐淹藏等物枳殼散熏洗痔漏枳殼二兩貫衆二兩荊芥一兩大白皮一兩黃連半兩蛇床子半兩蒼耳根一把乾薑半兩泡柏枝一把薤頭一把黑豆半升無名異半兩冬青葉一把地骨皮半兩上件為粗末每服一大合用水三大碗煎至一碗先熏後溫洗日二三次五倍散敷貼痔漏瘡海螵蛸二錢半五倍子三錢瓦上焙乾乳香一錢半蕪荑半兩豆粉一錢炒黑色白鱔頭一對燒存性龍骨一分麝香半字上為細末先用藥洗候乾如破有水乾糝如無水用津唾調塗瘡烏蛇散治腸風五種痔漏貫衆散治痔漏貫衆一個大者三個搗碎萆薢二兩白芷二兩好者上搗羅為細末每服二錢用胡桃酒調下陳米飲亦得空心食前服十年患者服之立效五聖丸治腸風痔漏子母痔內痔翻花痔肥皂角三挺慢火燒存性一分去子青橘皮半兩去瓤炒白礬半兩焙干薄荷半兩乳香一分雷丸上一處搗羅為末面和為丸如緑豆大每服七十丸用薄荷茶送下日進三服忌毒物平肌散治痔瘡久不合者黃狗骨頭燒灰亂髮燒灰穿山甲燒灰各等分上件同研令勻如瘡已干自用津唾調塗如濕即干敷日三四次北亭散治腸風痔漏積年膿不幹白礬別研乳香別研黃連去須以上三味各一兩取末上件用大鯽魚一枚去腸並鱗入藥末在內濕紙裹麻皮纏鹽泥固濟文武火煨熟去泥紙卻用慢火炙焦同為細末每服二錢空心粟米飲調下皂角子散治腸風痔漏下血經久不瘥者皂角一百枚燒留性研末榼藤子一枚全者去殼研不可搗上件為細末每服二錢匕分熱酒下如人行一二十里許再飲熱酒一盞投之天聖年間知濠州馬忠肅家有媼病漏瘡已十年一日老兵掃庭下且言前數日過市有醫自遠來諸漏瘡可治頃刻之力媼曰吾更醫多矣不信也其黨有以白忠肅公者即為召醫視之可治無妨需活鱔竹針五六與之醫乃擲鱔因屈槃以竹針貫之覆瘡良久取視有白蟲數十針著鱔醫即令置杯水中如動如線復覆之又得十餘如是五六醫者曰蟲固未盡然其餘皆小蟲竟請以常用藥敷之時家適有檳榔黃連散即敷之明日以干艾湯投白礬三二錢洗瘡然後敷藥蓋老人血氣冷必假艾葉以作陽而艾性亦能殺蟲也如是者再即生肌不一月而愈如其言醫曰瘡一月不治即有蟲蟲能蠕動氣血一隨之病漏不可遂合合則結痛實蟲所為也醫無名於世而治疾有效亦良醫也醫説抵金膏治諸般痔漏久不愈者花蕊石火煅過醋滴研碎生硫黃細研黃丹細研牡蠣火煅過研如粉蚌粉細研以上五味各二兩自然銅一兩火煅醋滴研碎以上六味同研勻用清油三十二兩入銅鍋內用炭火熬去油十兩次入後藥草烏頭四兩連皮尖生用骨碎補去毛漢防己龍骨烏藥虎骨如無用敗皂五味各二兩以上六味併為細末入前油鍋內熬成稠膏次入後藥乳香沒藥血竭白膠香安息香以上五味各二兩併為細末上件同入前鍋內急將枝子攪勻少時取出以盒子盛之不得蓋收三日後火力定每服一小匙溫酒下不計時候茶蒻散治諸般痔漏下血疼痛黃牛角腮二兩蛇蛻豬牙皂銼刺蝟皮銼棕櫚皮銼牛鼠狼皮茶蒻葉剪碎以上六味各半兩穿山甲七十片貫衆一兩乳發一分上件拌勻入瓷罐內以鹽泥固濟了曬乾用炭火煅通紅為度候冷取出研細末每服二錢胡桃肉半枚次以溫酒調藥同下臨臥至五更初又服一服至辰時又服一服如此服三日永除根本烏金散治一切痔漏瘡烏金子枳殼威靈仙去土五倍子紫河車用煨者重黃牛角腮以上六味各一兩同為細末皂角子豬蹄甲用豬蹄向後小爪不著地者甲上件入瓷罐子內以瓦蓋定用雄白雞糞及黃土對停入鹽少許和作泥固濟罐子用木炭七斤煅火盡為度碾為末每服二錢入鹽少許空心溫酒調下地骨皮散治諸風痔漏下血不止地骨皮鳳眼根皮並用懸崖中好者去土不用上二味各等分同炒微黃色搗為細末每服三錢空心溫酒調服忌油膩勿食萬靈丸治五種痔漏凡穀道生瘤似鼠奶時時發動或出血者名曰酒痔又曰冷痔若生核子者曰腸風痔發時熱大便難下脫肛良久不入名曰反痔大便或出清血名曰血痔此冷搏結得之硫黃二錢別研白礬二錢豬牙皂角半兩炙附子一兩炮去皮臍皂角刺一兩燒存性刺蝟皮一兩燒存性榼藤子一兩生廣中完者色如肥皂子上件為細末煮稀麵糊為丸如梧桐子大每服二十丸空心溫酒送下如已有頭者用硃砂少許同藥一二五丸一處研細塗於頭上旬日自落又用米醋調藥三五丸敷瘡上即愈如瘡在裡面即將米醋和槽拌藥三兩丸燒熏之萬金丸治一切痔漏久不瘥者木賊何首烏荊芥穗防風去蘆頭雞冠花焙枳殼去瓤麩炒五倍子黃耆銼焙槐花槐角以上十味各一兩同為末皂角子豬蹄甲用豬蹄向後小爪不著地甲皂角刺麝香皮子榼藤子百藥煎刺蝟皮七味各一兩入磁罐內固濟了候乾用炭火鹽泥煅至青煙出與前藥末同研細次入麝香二錢上件為末酒煮麵糊為丸如梧桐子大每服五十丸食前米飲下病久者當常服即去根本艾葉散熏漏瘡鶴蝨艾葉榼藤子白膠香上件各等分銼為散瓦瓶內燒煙熏患處治痔漏以海豚魚皮中肪摩瘡此魚生大海中治痔漏瘻及虷虷取鱧魚腸以五味炙貼患處良久蟲出即去之一方炙香綿裹內穀道中一食頃當蟲出魚腸數易之盡三枚瘥鱧魚即蠡魚治痔瘻出本草用桐皮水煎服之治痔漏出本草單用醋林子搗為末酒調一錢匕服之甚效治痔瘻出本草以蜣螂為丸塞下部引痔蟲出盡永瘥治痔瘻出本草並瀉血以瞿麥作湯粥食並得膽礬散出楊氏家藏方治痔漏瘡焮腫疼痛侵潰膿水不絶久不生肌膽礬一兩煅白色龍骨半兩白色者黃丹二兩水飛蛇蛻一條全者燒灰別研麝香半錢別研上件除蛇蛻麝香末外三味研為細末同蛇蛻麝香和勻先用蔥椒湯洗淨搵干次用藥少許干糝瘡口如瘡口小用紙捻子點藥紝入瘡口內三次用治五痔漏瘡犍牛兒膽一個蝟膽一個膩粉四錢麝香少許上四味先將蝟膽汁調膽粉麝香和勻入牛膽內懸於簷前四十九日熟旋取為丸如麻子大送於瘡口漸合生面蓋瘡內一遍出惡物效治痔漏腸風方用雲臺子四兩為末用好酒麵糊丸梧桐子大每服三十丸至五十丸溫酒送下日進一服治痔漏有頭疼痛下膿血用吐出煙蟲二枚炙乾搗羅為末貼滿頭上當斷膿血貼五七度瘥又方用硫黃末少許內瘡孔中以艾熏之瘥治痔漏疳蝕惡瘡用端五日取蟾酥以硃砂麝香為丸如麻子大納孔中治血漏瘡出本草用雄黃末如豆大許納瘡中又服五錢匕血皆止痔漏疼痛不可忍附論夫痔漏蓋緣寒濕與夫房室醉飽間得之其作也肛邊腫癢甚則疼痛不可忍或蔓生數處或似螺婗膿血與肛汁綿綿而有孔不合故謂之痔瘡昔人論燒蟲居胴腸間多則為痔方論有用熏法及化蟲之藥者不可不察方萬金丸出聖濟總録治腸風疾遠年不瘥疼痛不可忍者安息香乳香丁香木香沉香銼無食子肉豆蔻當歸麒麟竭沒藥密陀僧阿魏各半兩巴豆去皮心膜醋煮砒霜入緑豆半兩同研各三分上件將乳香安息香阿魏麒麟竭沒藥等細銼水少許浸一宿來日細研如膏余藥搗羅為末和膏同研丸如米黃大每服一丸空心冷茶咽之比金丸出聖濟總録治痔疾疼痛不可忍及下血榼藤子附子炮製去皮臍硫黃研白礬燒令汁盡螺皮炙焦枳殼去瓤麩炒豬牙皂角醋炙各半兩上為末酒煮麵糊丸梧桐子大每服十丸米飲或酒下不拘時候服淋泄湯出聖濟總録治痔漏不可忍黃芩去黑心木通銼梔子仁甘草炙銼太陰玄精石萹蓄朴硝一兩上搗篩每用七錢匕水三碗煎沸傾盆內先坐熏之內候通手節淋泄上即止熏時令蜜覆勿泄藥氣能消丸出聖濟總録治痔漏疼痛如錐刀刺不可忍威靈仙去黃土四兩一名能消卷柏去根防風去叉蝟皮燒灰存性阿膠炙燥各半兩糯米炒一合上為末煉蜜丸如梧桐子大每服十丸加二十丸人參湯下日三服不拘時栝蔞散出聖濟總録治痔漏疼痛行履不得大栝蔞一枚豬牙皂角白礬各半兩鯉魚皮敗鱉皮去裙襴刺蝟針各一分上除栝蔞外為粗末入在栝蔞內用鹽泥固濟候乾用炭五斤煅令通赤放冷取出搗羅為末每服二錢匕研胡桃酒調下荊蘭湯治五痔痛不可忍荊芥穗貫衆甘草蜀椒澤瀉芍藥各二兩上搗篩每服用三匙水三碗煎熱傾盆內先坐熏之復令密勿泄出藥氣即淋泄試蟲散治五痔痛甚臭椿根地骨皮用精豬肉一大片摻藥三錢匕在肉上就肉上一二時起看有蟲即取去無即已熏洗方出聖濟總録治諸痔有頭疼痛不可忍地松一斤蝟皮二兩蔥根一握薤根一握上銼細以水五升盆內盛先坐乘熱熏通手淋洗日三次用荊芥湯出聖濟總録治五痔疼痛連陰濕癢荊芥穗臭橘厚朴去粗皮各半兩上搗篩每用二兩水五升煎三升避風處淋泄血竭散出危氏方治痔漏疼痛不可忍血竭牡蠣灰發灰各等分上細末入麝香少許自以津唾調敷如更痛研杏仁膏調藥敷之祛痛散治痔疾疼痛不可忍及腸風下血皂角子不炷者一百枚麩二升同炒麩焦黑去麩薄荷乾者二兩銼上為散每服二錢米飲調下空心服枳殼散出聖濟總録治諸痔有頭疼痛不可忍枳殼四兩訶黎勒皮二兩上粗搗篩同炒令熱以綿裹熱尉之冷即再炒煙燻方出聖濟總録白鱔魚骨熟艾等分上銼碎和勻用新盆子一個盛藥在內以火燒藥候煙出盆上熏之煙盡即愈白礬散一名礬香膏治痔漏出膿血不止不可忍者止痛膏出聖惠方治腸風痔瘻有頭下膿血疼痛不可忍莨菪子一合牛皮膠一兩上先研莨菪子後用膠清調成膏攤紙上貼之有頭者自消威靈仙丸出聖濟總録治腸風痔漏肛邊乳鼠疼痛不可忍者威靈仙淨洗焙乾二兩木香一兩上為末煉蜜丸梧桐子大每服二十丸加至三十丸不拘時煎荊芥湯下服藥後忌茶半日恐冷節後痛男子婦人皆服治大腸痔瘻脫肛疼痛出聖濟總録用虎腳指二節以蜜二兩炙搗羅為末飲並丸如梧桐子大每服空心溫酒下二十丸比金散出傳信適用方治久新痔痛如神先用獨行虎散洗次用白金散敷貼用海螵蛸去粗皮不拘多少為細末每用二三錢生麻油成膏以鵝翎拂上每日夜用之久瘡自消是藥極好不消服藥獨能見效治痔瘡疼不可忍宜用治之出德生堂方緑豆粉一斤蝸牛一百五十個二味一處炒鍋內文武火炒黃去蝸牛攤在地上出火毒後加沒藥乳香輕粉三兩緑豆一兩與沒藥等四味各三錢同研細末每用少許涼水敷貼瘡上即住疼痛治痔疾肛門邊腫硬癢痛不可忍救急尉之白礬三分碾上以童子熱小便二盞化白礬以洗痔上二日立效
