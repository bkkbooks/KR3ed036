body:
  text: 卷二百四十七㿗疝門總論夫腎主納氣人之氣海系焉腎虛而為風寒所乘為暑濕所襲為喜怒憂恐所傷而冰結不散又與氣搏是以群邪聚於其中曰疝曰奔曰小腸氣曰膀胱氣皆是物也其候不特外腎小腹作痛或攻刺於腰脅或遊走於背膂或冷氣搶心心下痛滿或手足厥冷自汗嘔逆痛繞臍旁或脅之左右如杯或臍之上下如臂或腹中纍纍如桃李或胃腕間覆大如盤有壯熱惡寒者有灑淅寒熱者有不得大小便者有裡急而下泄者有自汗出者有不欲食者其於陰間則卵有大小伸縮而上下不常囊有腫脹急痛而發歇無定挾冷觸怒則塊物逼上囊根或攻腹之脅時和心平則塊物自循腎系歸入囊中凡此皆謂之腎氣治法綱領風則散之寒則溫之暑則解其熱濕則滲其水七情所發調其心氣水與氣搏行其小便其間以主治腎氣之劑參之然總治之法大要以流行疏利為先毋曰腎虛得病不敢疏泄蓋腎為邪氣所幹若非逐去病何由愈倘或姑息畏虛妄以剛劑兜住使大小腑祕而不通邪氣入腹衝心危殆必矣然腎氣發則固以腎虛得之然虛中有冷虛中有熱又有冷熱不調尤當詳審冷者脅邊及外腎清冷小便清而多遇寒即發是也熱者內挾暑氣或積毒或服暖藥於前外腎與小腹俱熱肛門間糞後赤熱小便多澀遇熱則甚是也冷熱不調者小便外腎乍冷乍熱大便小便或祕或利用藥溫涼當隨證而權度之但所謂流行疏導常常運斡於其中矣其若大小便流利之後或更有牽刺引疼或氣遊注於肌膚之間此則腎虛血虛氣不還元當加潤養人參當歸川芎芍藥桑螵蛸葫蘆巴輩又不可無惟是逆氣乘虛中脘停酸燥悶擾甚而至於嘔吐最為惡候何則天一生水腎實主之宗筋麗於陰器惟藉陽明以養之今脾土不濟腎水上乘必為酸汁必為涎飲荏苒逾時遂成暴吐醫家執劑之始皆知腎經惡燥如蒼朮白朮良薑之類誠不敢用及其嘔吐大作薑朮輩用之而不顧若猶未也則吳茱萸蓽茇剛燥等劑又加多焉雖附子亦用之而救急矣病勢至此脾土未強腎水已為之涸腎水既涸脾土又為之焦往往陰陽不升降榮衛不流行大小二便關隔澀閉而腎汁皆自其口出也如此者大抵不救臨病須當識病預與病家言之夫心火下降則腎水不患其不溫真陽下行則腎氣不患其不和安有所謂木強者哉惟夫嗜欲內戕腎氣虛憊故陰陽不相交水火不相濟而沉寒涸冷凝滯其間脹滿作疼頑痹結硬勢所必至矣執劑之法不可純用燥熱當溫利以逐其邪邪氣內消榮衛流轉蓋如寒谷春生有不戒而速不行而至者矣外此又有一種升高墜下外腎跌傷驚起與敗血交攻亦有木強脹疼之證治法大要則同於中更為之消瘀血大抵諸疝之脈當弦緊蓋弦者寒也緊者痛也疝有七證厥疝症疝寒疝氣疝盤疝附疝狐疝是也何以言之厥疝則心痛足冷食已則吐症疝腹中氣乍滿氣積如臂寒疝因寒飲食猝然脅下腹中痛氣疝腹中乍滿滿而痛盤疝腹中痛引臍旁附疝腹痛連臍下有積聚狐疝小腹與陰相引而痛諸疝不愈邪氣留滯及成積聚其脈厥而緊浮而牢皆積聚之脈也但牢強急者生虛弱急者不可治儒門事親書云寒疝名水疝律科王敏之病寒疝臍下結聚如黃瓜每發繞腰間痛急不能忍戴人先以舟車及豬腎散下四五行覺藥繞臍三五次而下其瀉皆水也豬腎甘遂皆苦寒經言以寒治寒萬舉萬全但下後忌飲冷水及寒物宜食乾物以寒疝本是水故也即日病減八分食進一倍又數日以舟車丸百餘粒通經散四五錢服之利下候三四日又服舟車丸七八十粒豬腰散三錢乃行步如常矣又一僧疝病發作冷氣上貫齒下貫腎緊若繩挽兩睪時腫時冷戴人診兩手脈細而弱斷之曰秋脈也此因金氣上下伐肝木木畏金未伸故病如是肝氣磅礴而能下榮於睪丸故其寒實非寒木受金制傳之胃土胃為陽明故上實齒病非齒之自病肝木者心火之母也母既不伸子亦屈伏故下冷而水化經曰木鬱則達之土鬱則奪之令湧四次果覺氣和睪丸癢而暖戴人曰氣已入睪中矣以茴香術術之藥接連服首尾一月而愈淡療方治疝氣發作痛不可忍真科五苓散一帖連根蔥白一寸燈心七莖煎湯吞下青木香丸五十粒即效又法青木香丸二百粒斑蝥七枚去首翼為粗末用瓦銚於文武火上同炒令木香微香卻以瓷碟蓋藥銚放冷處少時去斑蝥取木香丸二服空心茴香酒吞下屢試之有驗也論云厥陰脈滑則病狐疝少陰脈滑則病肺風疝太陰脈滑則病脾風疝陽明脈滑則病心風疝太陽脈滑則病腎風疝少陽脈滑則病肝風疝靈樞經云心脈微滑為心疝引臍少腹鳴肝脈滑甚為㿗疝夫滑脈關以上見者為大熱蓋陽與陽並也故大熱脈滑尺脈見為大寒主㿗疝脈滑者命門胞絡之病也為丙丁熱火併於下蓋丙丁不勝壬癸從寒水之化也故生㿗疝寸口脈弦而緊弦即衛氣不行衛氣不行即惡寒緊則不欲飲食弦緊相搏即為寒疝凡瘦人繞臍痛必有風冷穀氣不行而反下之其氣必沖心下則痞夫陰㿗屬肝系宗筋胃陽明養之世多不識謂之外腎非特名義差錯亦使內臟不分不可不辨古方雖出四證但曰腸㿗水㿗卵脹殊不別其所因如腸㿗則因房室過度元臟虛冷腸邊腎系不收墜入㿗中上下無定謂之腸㿗不因外因病者久蓄憂思恐怒並隨臟氣下墜陰㿗腫脹急痛名曰氣㿗屬內所因病者久坐冷濕濕氣下襲致陰腫脹名曰水㿗屬外所因病者勞役無節及跨馬坐車致卵核腫脹或偏有大小上下無常者名曰卵脹此屬不內外因有小兒生來便如此者乃宿疾也卵脹腸㿗皆難治氣㿗水㿗治之易愈又寒疝下注入於㿗中名為狐疝亦屬㿗病世人因此以㿗病為疝氣不審之甚婦人陰門挺出亦稱㿗病名義不分有如此者凡㿗唯腸㿗無問貴賤多有之有睡臥腎系延入脅下者有墜入囊中者或遇疲勞及天色變動逼上囊根腫急作痛過於寒疝得暖則下至如卵脹有作熱生膿為癰潰爛者比比有之前陰分大寒大熱囊垂縮陰陽症別夫三陽為病發寒熱下為癰腫及為痿厥腨悁其傳為索澤其傳為㿗疝夫熱在外寒在內則此丸纍垂下此陽之氣也寒在外熱在內則卵縮此陰之氣也足太陽膀胱之脈逆而上行手太陽小腸之脈下行致足厥陰肝之脈不得伸其任脈並厥陰之脈逆則如巨川之水治陽氣下墜是風寒濕熱下出囊中至兩睪腫大謂之曰太甚則為㿗足厥陰肝之經與太陽膀胱寒水之脈同至前陰之末傷寒家説足厥陰肝經為痛滿囊縮急下之宜大承氣湯以瀉大熱靈樞經曰足厥陰肝經脈中寒則筋攣卵縮為大寒前説囊縮為大熱此説囊縮為寒是説囊縮垂睪下引為㿗疝腳氣之寒風濕盛下注為寒與上二説不同以平康不病人論之夏暑大熱囊卵纍垂冬天大寒急縮上此與三説又大不同何也是相乖耶不相乖耶答曰傷寒家囊卵縮大熱在內宜承氣湯急下之與靈樞經説囊卵縮大寒在外亦是與傷寒同故再引平康之人以證之也冬天陽氣在內陰氣在外人亦應之故寒在外則皮急而囊縮夏月陰氣在內陽氣在外人亦應之故熱在外則皮暖皮暖則囊垂此㿗疝之像也三説文殊皆一理也用藥詳而審之諸疝附論疝病有七厥逆心痛足寒飲食則吐者名厥疝腹中氣滿心下盡痛氣積如臂者名症疝寒飲則脅下腹盡痛者名寒疝腹中乍滿乍寒而痛者名氣疝腹中痛在臍旁者名盤疝乍腹中痛在臍下有積聚者名附疝小腹與陰相引而痛大便難者名狐疝凡此七疝皆由血氣凝澀不得通利冷劇則痛故皆謂之疝難經曰任之為病其內若結男子為七疝女為瘕聚蓋明此也方敵金散出直指方治疝外腎腫脹極大或生瘡出黃水其痛繞腸寒熱往來京三稜蓬莪朮木豬苓白附子蘿蔔子赤芍藥黑牽牛川楝肉山茵陳青木香陳橘皮五靈脂薑黃茴香各一兩南木香半兩丁香一分澤瀉一兩半以上並生用海藻酒浸一宿焙乾海浮石米醋浸火煨紅淬醋又煨淬如此七次黑為度穿山甲熱火灰煨焦各一兩青皮去白二兩生用一兩切碎以斑蝥五十個去頭翅足同炒黃色去斑蝥不用香附杵炒三兩一兩生用一兩以巴豆五十粒去殼同炒色焦去巴豆不用上切碎拌和微炒併為末酒面稀糊為丸如梧桐子大每服三十丸溫酒送下此藥瀉斟酌用之川楝散出直指方治外腎脹大麻木痛硬及奔豚疝氣偏墜諸證川楝子不蛀者四十九個先切七個取肉以茴香二錢慢火同炒並留茴香又切七個以破故紙二錢半同炒並留故紙又切七個以黑牽牛二錢半同炒並留牽牛又切七個以鹽一錢同炒並留鹽又切七個以斑蝥十四個去翅同炒去斑蝥不用又切七個以巴豆十四個作兩斷同炒去巴豆不用又切七個蘿蔔子一錢半同炒去蘿蔔子不用外更各別分入茴香炒青木香各半兩桂心南木香各二錢半夾和上為末酒調麵糊丸如梧桐子大每服三十丸食前鹽酒下積日計功打墜瘀血一方加延胡索半兩略炒入藥研末酒調下療疝氣核腫疼消疝丸出楊氏家藏方治寒在下焦臍腹牽痛膀胱重墜久而不愈漸至腫大甚者生瘡時有膿汁焮硬赤痛不能忍者金鈴子去核炒黃赤撲兒焙茴香炒稱三味各二兩肉桂去皮半兩甜瓜子微炒一兩上件為細末酒煮麵糊為丸如桐子大每服五十丸至一百丸空心溫酒或鹽湯下忌熱面生蔥大酢黏食等物川椒散出直指方治疝氣外腎腫痛白豆蔻仁甘草各一兩川椒去目併合口者微炒出汗官桂各半兩川芎當歸青皮制枳殼檳榔赤茯苓青木香南木香蓽澄茄上等分為粗散每服三錢薑棗湯下食前服蒺藜丸治囊核堅大行動難發作牽連偏墜疼痛出三因方白蒺藜微炒去刺海藻浸洗去咸澤瀉各一兩茴香炒一兩半桂心牛膝銼酒浸五味子木香煨檳榔各二兩茯神人參遠志水浸去心薑汁炒各三兩川楝去皮核麩炒赤芍藥桃仁去皮尖炒別研續斷山茱萸蓯蓉酒浸青皮各四兩上為末蜜丸梧桐子大空心食前溫酒鹽湯下三五十丸海蛤丸出濟生拔萃治㿗疝地膽二十一個去頭足翅海蛤醋淬三次當歸海金沙膩粉硇砂各一錢海藻粉霜各半兩水蛭二十個炒青黛滑石乳香各一兩硃砂二錢為末上為末鹽湯麵糊為丸如小豆大硃砂為衣每服十丸煎燈草湯空心服之小便下冷濃惡物乃效卻以黃連紫河車板藍根各三錢煎湯漱口以手刷齒一方去板藍根加管仲薑椒丸治七疝諸寒在臍旁痛上及胸中滿少氣蜀椒去目及合口炒出汗一兩一分乾薑炮厚朴去粗皮塗生薑汁炙黃芩去黑心細辛去苗葉芍藥桂去皮各一兩桔梗炒半兩烏喙炮裂去皮臍一分柴胡去苗白茯苓去黑皮牡丹皮各一分上為末煉蜜和丸梧桐子大每服二十丸溫酒或米飲下日三服聚香飲子出危氏方治七情所傷遂成七疝心腹脹痛從腰脅連背不可俯仰檀香木香乳香沉香合香各一兩玄胡索炒去皮片子薑黃川烏炮去皮尖桔梗去蘆銼炒桂心不見火甘草炙各半兩丁香亦不見火一兩上㕮咀每服四錢水一盞半生薑七片棗一枚煎七分去滓服不拘時厚朴丸治七疝肢體寒臍腹緊痛滿痛厚朴去皮生薑汁炙附子炮裂去皮臍蘹香子炒白朮銼炒桂去皮乾薑炮枳殼去瓤麩炒青橘皮湯浸去白焙芎藭炮烏頭炮裂去皮臍木香當歸切焙各一兩上為末煉蜜丸如梧桐子大每服三十丸溫酒下生薑湯亦可不拘時海藻丸治奔豚疝氣膀胱小腸氣卵頑腎木及小兒偏墜一切腎氣等證海藻半兩洗焙乾木香檳榔川椒去目炒甘遂各半兩川烏半兩炒小兒去之老人用一兩白牽牛二兩取末半兩黑牽牛二兩取末半兩茴香微炒豬苓去皮澤瀉各三錢吳茱萸四錢椒炒上為末滴水丸如梧桐子大每服五十丸至百丸空心鹽湯酒任意下黃涎下者驗十五歲以下小兒二十五至五十丸此藥不特利大便大能利小便後復忌甘草相反烏頭丸出聖惠方治七疝氣臍腹堅痛川烏頭炮裂去皮臍蓬莪朮木香川大黃銼碎微炒當歸芎藭京三稜炮銼川椒去目及閉口者炒出汗桂心桃仁湯浸去皮尖雙仁麩炒微黃乾漆搗碎炒令煙出各一兩肉豆蔻半兩去殼上為末先以釅醋一升入藥末四兩熬令減半又漸入醋一升熬成膏次入余藥末和搗三百杵丸梧桐子大每服食前生薑湯或暖酒下二十丸草豆蔻丸出聖惠方治七疝四肢寒冷臍下妨痛不欲飲食草豆蔻去皮厚朴去粗皮生薑汁炙令香附子炮裂去皮臍蘹香子微炒白朮桂心乾薑炮青橘皮湯浸去白瓤焙芎藭川烏頭炮裂去皮臍木香吳茱萸湯浸七次焙乾微炒各一兩上為末煉蜜和丸搗三二百杵如梧桐子大每服於食前熱酒下二十丸白朮妙功丸出御藥方治腎氣久虛上攻下注臍腹久冷腰背麻痛及膀胱疝氣痃癖氣悶小腸作聲時時下墜白朮蓬莪朮澤瀉當歸去蘆頭厚朴去皮生薑汁炒破故紙炒各半兩延胡索木香各二錢檳榔川苦楝各三錢上為末水煮麵糊丸如豆大每服七十丸食前溫水下宣胞丸治膀胱疝氣及奔豚外腎其大如斗豬胞黑牽牛四兩入胞內好醋一升煮至盡焙乾木香木豬苓去皮續隨子淡豆豉三稜煨川楝肉馬藺花茴香炒各等分上為末糊丸如梧桐子大每服五十丸鹽湯下第二服車前子湯下小便祕實不通加土狗十個金沙一兩蓬莪朮丸治七疝臍腹堅痛蓬莪朮炮銼木香大黃微炒當歸切炒芎藭京三稜炮銼草豆蔻去皮桂去皮桃仁去皮尖炒各一兩肉豆蔻炮半兩乾漆炒令煙出一兩上為末醋麵糊為丸梧桐子大每服二十丸溫酒或生薑湯下不拘時茴香楝子丸治諸疝證川楝子一兩三錢小茴香一兩半吳茱萸二兩海藻一兩木香半兩澤瀉半兩青鹽三錢蓬莪朮七錢半醋炙三稜七錢半煨青皮一兩黑牽牛七錢一半生用一半炒用上為細末醋糊丸梧桐子大每服五十丸空心酒下食前川楝茴香茱萸用酒煎童子小便各浸半兩又用巴豆去皮斑蝥去翅足各三五個以川楝茴香青皮共炒色變去斑巴二藥烏喙丸治諸寒疝臍旁痛上攻胸中滿悶少氣烏喙炮裂去口皮臍厚朴薑裂赤茯苓檳榔各半兩乾薑炮木香細辛芍藥桂心川椒去目及合口者微炒出汗柴胡去苗各一兩上為末煉蜜和搗三百下丸梧桐子大每服食前溫酒下十五丸吳茱萸丸治七疝氣心腹結聚疼痛茱萸湯浸七次焙乾微炒木香檳榔訶黎勒煨用皮川大黃赤茯苓烏喙炮裂去皮臍當歸赤芍藥枳殼麩炒黃桂心各一兩上為末煉蜜和丸如梧桐子大每服食前熱酒下二十丸狼毒丸治七疝久而不愈發作無時臍腹堅硬疼痛不已狼毒炒芫花醋炒川烏各一兩椒紅炒乾薑炮乾漆炒煙盡三稜鱉甲醋炙沒藥各半兩全蠍去毒九個上為末醋糊丸如梧桐子大每服四十丸空心酒下或薑湯甚者炒鹽半斤令熱以故帛包尉痛處十補丸治大小腸膀胱寒疝伏梁奔豚痃氣等疾亦治婦人育腸氣附子一兩用防風一兩銼如黑豆大鹽四兩黑豆一合炒附子裂去諸藥只用附子去臍皮葫蘆巴木香巴戟去心川楝子炮去肉官桂延胡索蓽澄茄舶上茴香炒破故紙炒以上九味各一兩上為末糯米粉酒打糊丸梧桐子大辰砂為衣每服三五十丸空心酒下婦人醋湯下若入益智子亦得杜夷之苦此歲久醫三年百藥不效後用此數服去根卻以獻繼先亦有此疾服之亦安葛司理尊人倅金州以授同官蘇主管亦用此方屢效蠲痛丸治小腸膀胱氣痛延胡索煨炒一兩川楝蒸去皮核舶上茴香炒各半兩牽牛炒取末當歸青皮去白木香各一分全蠍七個焙天台烏藥用一分良薑上為末生薑自然汁浸糕為糊丸梧桐子大每服三十丸燒綿灰存性調酒送下狐陰丸療腎虛疝氣腰膝冷痛陰囊腫癢神效丸治疝氣芫花醋浸炒木香檳榔三稜各半兩炒茯苓青皮全蠍附子炮硇砂官桂各二錢半去皮上將硇砂用水浸瓷盞內沉去泥土留湯瓶內燉成膏子粳醋打糊為丸如緑豆大每服三十丸空心溫酒下當歸四逆湯治男子婦人疝氣臍腹冷痛相引腰胯而痛當歸七分附子炒官桂茴香炒柴胡各五分芍藥玄胡川楝子茯苓各三分澤瀉二分上為粗末都作一服水煎空心服桂薑湯出直指方治臍冷疝氣兼治濕症吳茱萸拌酒醋浸一宿焙乾川白生薑辣桂各半兩良薑蓽澄茄茴香炒縮砂仁益智仁木香茯苓甘草炙各三錢上銼每服三錢水煎調蘇合香丸食前服茴香楝實丸出衛生寶鑑川楝子炒茴香炒山茱萸食茱萸吳茱萸青皮陳皮芫花醋炒馬蘭花醋炒共一兩上為末醋糊為丸如梧桐子大每服三十丸溫酒下食前量虛實加減以利為度沉香蒺藜丸治小腸㿗疝偏墜等疾沙苑蒺藜酒炒防風各二兩葫蘆巴酒炒茴香炒金鈴子末地龍去土牡丹皮各半兩沉香蓽澄茄木香各二分上為末酒糊丸如梧桐子大每服四五十丸鹽湯溫酒任下久服去根川椒丸出聖惠方治七疝忽心腹氣逆不得息痛引背膂或臍下堅痛遇冷即極小腹虛滿引膀胱裡急川椒去目及合口者微炒出汗厚朴去粗皮塗生薑汁炙令香熟檳榔各一兩桔梗去蘆頭細辛赤芍藥乾薑炮裂銼附子炮裂去皮臍川烏頭去皮臍炮裂各半兩上為末煉蜜和丸梧桐子大每食前生薑橘皮湯下二十丸治疝氣川楝子二十一個內七個用海金沙二錢炒去沙七個用斑蝥二錢炒去斑蝥七個用巴豆二錢炒去豆舶上茴香炒烏藥去心玄胡索木香黑牽牛頭末破故紙炒葫蘆巴炒各半兩上為末酒糊為丸如梧桐子大每服五十丸空心鹽湯下丁香楝實丸出醫方大成治男子七疝痛不可忍婦人瘕聚帶下皆任脈所主陰經也腎肝受病故治法同歸於一用錦紋大黃一兩為細末用釅醋好者半斤同煎成膏當歸去蘆附子炮製去皮臍茴香川楝子各一兩上銼細用好酒三升同煮酒盡為度焙乾作細末每稱藥末一兩入下項藥丁香木香玄胡索各五錢全蠍十二個上為末入在前項藥內拌勻酒糊為丸梧桐子大每服三十丸加至一百丸空心溫酒送下凡疝腎氣帶下皆由於風全蠍治風之聖藥茴香川楝子皆入小腸經當歸玄胡索和血止痛疝氣帶下皆積陰邪入小腸之間故以附子佐之丁香木香引導也韓提控疝病每發腎痛不可忍則於兩端各置一枕往來伏之以受如是者三年不已服此藥三劑良愈透經散出百一選治下部諸疾川楝子一兩銼炒入巴豆二十粒吳茱萸一兩同炒焦赤色去吳茱萸茴香炒沉香胡椒全蠍炒各半兩縮砂二兩連皮炒燥去粗皮用木香一兩不見火玄胡索二兩新瓦上炒上為末每服二錢食前酒調下天台烏藥散出衛生寶鑑治小腸疝牽引臍腹疼痛烏藥木香茴香炒良薑炒各五錢檳榔二個川楝子十個巴豆七十個青皮半兩上先以巴豆打破同楝子用麩炒候黑色去巴豆麩不用外為細末每服一錢溫酒調下痛甚炒生薑熱酒下亦得桃仁湯治療疝氣桃仁去皮尖及雙仁吳茱萸橘皮海藻生薑茯苓羌活蒺藜子去角各三兩上切以水三大升煮取九合分為三服空心服忌酢物七疝丸主暴心腹厥逆不得氣息痛連背膂名曰尸疝心下堅痛不可手迫名曰石疝臍下堅痛得寒冷食輒劇名曰寒疝脅下堅痛大如手痛時見若不痛時不見名曰盤疝臍下結痛女人月事不時名曰血疝少腹脹滿引膀胱急痛名曰脈疝悉主之椒四兩炒出汗桔梗芍藥乾薑厚朴炙細辛附子炮各二分烏頭一分炮上為蜜丸如豆大每服三丸加至七八丸日三服忌豬肉冷水生菜方用溫酒送下荔核丸出德生堂治疝氣陰核腫大痛不可忍荔枝核十四個新者燒灰存性沉香木香青鹽食鹽八角茴炒各一錢小茴香川楝子肉各二錢上為細末每服三錢熱酒調空心服益智仁湯治疝氣痛連小腹攣搐叫呼不已診其脈沉緊是腎經有積冷所致益智仁乾薑各半兩甘草炙茴香炒各二錢烏頭炮去皮生薑各半兩青皮去白二錢上㕮咀每服四錢水二盞入鹽少許煎七分去滓空心食前溫服立效散治疝氣川芎川楝子青皮去白茴香舶上者黑牽牛炒桃仁各一兩上為末每服二錢無灰酒一盞煎八分溫服葫蘆巴丸治大人小兒小腸氣盤腸氣奔豚疝氣偏墜陰腫小腸如卵上走痛不可忍或復結繞臍攻刺嘔惡悶亂並治之葫蘆巴炒一斤吳茱萸湯洗七次炒十兩川楝子炒一斤一兩大巴戟去心炒川烏炮去皮臍各六兩茴香洗去土炒一十二兩上為末酒煮麵糊為丸梧桐子大每服十五丸空心溫酒吞下小兒五丸茴香湯下一方加牽牛川楝散治膀胱小腸臍下撮痛上衝心腹下引足膝夜多旋溺外腎瘙癢面色萎黃腳下隱痛四肢倦怠不思飲食破故紙炒川楝子蒸去皮核茴香炒各四兩葫蘆巴酒浸炒三兩乾薑炮一兩附子炮去臍一兩半上為末每服二錢空心熱酒調下食前硇砂丸治諸疝作痛木香沉香巴豆肉全者各一兩青皮木去皮二兩銅青半兩硇砂二錢半制如前研上以二香青皮三味細銼同巴豆慢火炒令紫色為度去巴豆為末入青砂二味研勻蒸餅和丸梧桐子大每服七丸至十丸鹽湯吞下空心日進二三服神聖代針散治一切厥心痛心驚欲死小腸疝氣痛不可忍及小腸氣搐如弓角膀胱腫硬一切氣虛刺痛婦人血刺衝心但一切痛楚服之大有神效孕婦勿服蚖青一兩即斑蝥蟲用糯米一兩水洗淨即取出候乾同蚖青一處微火炒米黃色去蚖青將糯米為末乳香別研沒藥別研當歸白芷川芎各半兩上為極細末和勻每服一字甚者二字藥如小錢一字上多先點好茶一盞次滲藥末在茶上不得吹攪立地細細呷之又治胎衣不下難産消疝丸治下部蒼朮二兩茴香鹽炒玄胡各一兩牽牛半兩鹽炒木香一錢川楝半兩用巴豆二七不要碎炒黑不用豆上為末酒糊為丸一半用酒送下一半病發時酒調送下芫花丸治七疝臍腹堅硬時有疼痛芫花醋拌炒令乾乾薑炮製銼半兩川烏頭炮製去皮臍青橘皮湯浸去白瓤炒附子炮製去皮臍各一兩巴豆三七枚去皮心研如膏紙裹壓去油上為末入巴豆膏都研令勻醋煮麵糊為丸如緑豆大每服食前酒下三丸治疝氣官桂半兩去粗皮蛇床子一兩半柴胡細辛白芷各二兩上㕮咀每服五錢用水二升蔥白和須二莖椒五十粒同煎七分於瓶口上熏令微汗出再暖隨手洗婦人帶下赤白熏之亦效婦人用可加紫蘇一握又方大蒜二個韭菜一握蘚菜一握上件入砂瓶內煎令百沸乘熱熏之俟入得手則洗之如冷則再暖二次立效茴香散治寒濕氣入小腸疼痛或外腎腫痛茴香一兩川楝子肉炒破故紙炒香附子猴楂子各半兩去核上為末每服二錢空心溫酒鹽湯任意調下日三服初生小兒皆可服如藥冷將盞盛藥於熱湯內坐熱塗母乳與吃男子是小腸氣女兒是盤腸氣木香楝子散出瑞竹堂方治小腸疝氣膀胱偏墜久藥不效服此川楝子二十個為末未研前同巴豆二十粒用楝子炒黃赤色去巴豆不用萆薢半兩石菖蒲一兩炒青木香一兩炒荔枝核二十個炒上為末每服二錢重入麝香少許空心炒茴香鹽酒調下神效安息香丸一名煉陰丸治陰氣下墜腫脹卵核偏大堅硬如石痛不能忍玄胡索微炒去殼海藻洗昆布洗青皮去皮茴香炒川楝子去核馬藺花以上各一兩炒青木香半兩不見火大戟酒浸三宿切片焙乾各二錢半上為細末另將硇砂真阿魏安息香三味各二錢半用酒一盞醋一盞將硇砂阿魏安息香淘去砂石用醋酒各一盞熬成膏子再入麝香一錢沒藥二錢半俱各別研細入前藥一同和丸如緑豆大每服十丸至十五丸空心用綿子灰調酒送下牡丹丸出存仁方治風寒疝痛及諸血滯作痛牡丹皮四兩桃仁浸去皮炒別研官桂各五兩川烏頭一隻炮熟去皮尖上為末煉蜜丸梧桐子大每服五十丸溫酒下血痛醋湯下一方酒糊丸一名消堅丸四聖散出瑞竹堂方治小腸膀胱疝氣痛不可忍者川楝子炒黃胡椒茴香炒全蠍炒各半兩上為末每服二錢空心熱酒調下四神丸出直指方治腎冷疝氣脹痛不已吳茱萸揀淨一兩一半用老酒浸一宿一半用米醋浸一宿大香附子杵淨一兩蓽澄茄青木香各半兩上為末米糊丸梧桐子大每服七十丸空心鹽湯吞下或乳香蔥白煎湯下亦可鹽酒尤炒香牛散一名香殼散出存仁堂治外腎腫痛小腸疝氣茴香一兩炒黑牽牛半兩玄胡索枳殼並炒共半兩上為末酒調二錢空心下一方加吳茱萸葫蘆巴各半兩效四聖散出存仁方治小腸疝氣引外腎痛腫茴香炒穿山甲全蠍南木香上等分為末以酒調二錢一服便住痛妙甚沙參丸治疝氣沙參二兩昆布洗去鹽焙蘹香子炒各兩半上為末酒煮麵糊丸如梧桐子大每服二十丸空心食前溫酒下如聖丸治男子五種疝氣婦人産前産後惡物不行臍腹撮痛並皆治之地膽三十二個去頭足斑蝥五十個去頭翅足鹽豉七十個輕粉半錢為衣上以上四味用棗肉丸如緑豆大每服五十丸先飲好酒三五盞後用溫酒下如重車行五里小腹微覺痛勿驚無妨取下胞中病如雀腦相似是病根又治婦人産後臍腹痛惡物未盡服七丸童子小便下立效又治男子婦人痃氣並小腹臍痛每服一丸溫酒送下婦人用童子小便下立效又治小腸疝氣及婦人産前經血不來赤白帶下經血不止忌食雜魚濕面雞豬馬牛等肉金鈴散一名川楝茴香散出經驗方治小腸膀胱腎氣外腎腫大下塞不通川楝子十個每個作四片鹽炒同鹽用舶上茴香鹽炒香不用鹽與川楝子木香各等分巴豆五粒連殼打破用川楝子微火炒紫色去豆不用木香一分上為末每服二錢用好酒一盞連根蔥一寸同煎令蔥熟去蔥調藥末頓服空心下三服許學士云大抵此疾因虛得之不可以虛而驟補經云邪之所湊其氣必虛留而不去其病則實故必滌所蓄之熱然後補之是以諸方多借巴豆氣也治疝氣乾薑炮製良薑陳皮青皮各三兩上碾為末米醋糊丸如梧桐子大每服六七十丸空心酒送鹽湯亦得在吞丸子前嚼小茴香一撮然後送下丸子日進三服空心便服治寒濕氣入小腹疼痛或外腎腫痛出經驗方高良薑山梔子鬱金各半兩上為細末空心蔥湯調下服二錢玄附湯出存仁方治七疝心腹冷痛腸鳴氣走身寒自汗大便滑泄玄胡索炒去皮附子炮去皮臍各一兩木香不見火半兩上㕮咀每服四錢水一盞半生薑七片煎七分去滓溫服不拘時川楝子丸治一切下部之疾悉皆治之腫痛縮小雖多年服此藥永去根本川楝子一斤淨肉四兩用麩一合炒斑蝥四十九個同炒麩黃色為度去麩斑蝥不用四兩用麩一合巴豆四十九粒同炒麩黃色為度去麩巴豆不用四兩同麩一合巴戟一兩同炒麩黃色為度去麩巴戟不用四兩用鹽一兩茴香一兩同炒黃色為度去鹽茴香不用木香一兩不見火破故紙一兩炒香為度上為細末酒糊為丸梧桐子大每服五十丸鹽湯下甚者日進三兩服空心食前服禹功散黑牽牛頭末四兩茴香炒一兩或加木香一兩上為末生薑自然汁調三錢臥時服七疝湯治男子七種疝氣攻疰小腹急痛牽搦不可忍者川烏炮去臍皮半兩全蠍十四枚去毒炒鹽三錢炒上㕮咀水一碗薑七片煎七分去滓放溫只作一服空心食前服一方無薑凡諸疝氣偏墜舉發者氣實大便祕可用生料五苓散加茴香吳茱萸炒鹽少許每服五錢重水一盞半燈草二十根煎七分去渣送下青木香五十丸通利其氣虛大便滑泄者可用蟠蔥散加吳茱萸小茴香鹽炒煎一服送下走馬茴香丸或內消丸五十丸空心服之豫用此藥多驗防風散一名牡丹散治疝氣腫硬㿗偏大腹不能動坐臥不安防風去蘆牡丹皮去心各等分上為末食前酒服方寸匕日三服治㿗卵偏墜一方加黃柏桂心二味等分治氣上下痛腫一方用桂心豉鐵精等分為五味小兒一刀圭二十日愈嬰兒以乳汁和大豆許與之葫桃散葫蘆巴桃仁去皮尖炒上等分為末酒調二錢食前服去鈴丸治奔豚疝氣或陰囊腫大川烏尖七個生用巴豆七枚去皮只去九分油上為末糕糊丸如梧桐子大用硃砂麝香為衣每服三丸同青木香丸三十粒空心冷鹽酒下三兩一服不可多神應散治諸疝心腹絞痛不可忍玄胡索胡椒等分上為末每服二錢酒半盞煎七分食前溫服一方百沸湯調服香沙丸茴香鹽炒香去鹽不用新蠶曬乾各等分上為末煉蜜丸如彈子大空心細嚼溫酒送下甚者日進二服胡桃丸治疝氣膀胱小腸氣痛不可忍治大人小兒偏墜防風官桂辛辣者上等分為末每服二錢溫酒調下如服訖以食壓之又方荔枝核冬橘核上燒存性為細末溫酒調下一錢一物湯治奔豚疝氣攻刺走痛辣桂一兩半牽牛一兩炒上件以水三升煮取一升五合分二服寸金丸治奔豚諸疝作痛當歸延胡索舶上茴香炒葫蘆巴炒各一兩桃仁浸去皮焙桑螵蛸酒蒸焙川五靈脂別研白芍藥川楝肉各半兩蓽澄茄木香二錢半全蠍十二個焙上為末醋打麵糊丸梧桐子大每服五十丸少鹽入酒送下有熱小便祕車前子赤茯苓煎湯下治丈夫本臟氣傷膀胱連小腸等氣上金鈴子一百個溫湯浸過去皮巴豆二百個捶微碎麩二升同於銅鍋內炒金鈴子赤熱為度旋取出麩核為末每服三錢非時熱酒醋湯調並得其麩巴豆不用金鈴子即川楝子治疝氣炭皮一兩茴香半兩上炒為末作二服酒調熱服汗出即愈又香白芷末酒調服五鈴散出危氏方治撮聚疝氣用連根蔥白二寸燈心寸莖鹽炒茴香一撮川楝子三個去核煎湯調下大效又方出經效良方治小腸膀胱痛腎痛外腎腫大用縮砂仁為細末每服二錢嚼煨蔥熱酒調不拘時川楝散出經效良方治小腸氣膀胱氣痛不可忍川楝子一兩每個切作四片青皮湯浸去白切焙乾稱一兩木香二兩舶上茴香一兩巴豆五十枚去殼不出油上一處炒令黃色去巴豆不用再入海金沙一錢桂府滑石一錢半同杵細末每服一錢煎蔥白酒熱下治本臟氣用雞心檳榔小便濃磨半個服或用熱酒調一錢匕金鈴子散出濟生方治七疝寒注下焦小腹引外腎疼痛大便多閉血疝川楝子去皮核取肉一兩用巴豆七枚去殼同炒令黃色去巴豆上為細末每服二錢熱鹽酒調服空心食前一方用川楝七個炮空心酒調下屢效治疝氣小腸偏墜等疾已驗神效以先服五苓散用酒半盞燈心棗煎下青木香丸二十丸次服煨薑鹽煎五積散候平腹再服沉香蓽澄茄散四藥出百一選方一方五苓散朱端嘗病疝氣親服神效傳之數人無不效者蠍麝散出直指方治膀胱小腸氣痛用全蠍緊實而全者不拘多少焙乾為末每迎病發時用蠍末一錢入麝半字分作二服溫酒調下如人行十里又進後服神效通治荊芥散出經驗良方治風疝陰腎腫大兼治陰囊腫痛用荊芥穗不拘多少新瓦上焙為末每服二錢熱酒下即散治膀胱疝氣上以青木香丸每服五十丸用醇酒入蔥白煎五苓散送下一方不用酒以蔥燈心煎湯下治風疝氣腫墜血凝及瘰癧除濕風出本草用菵草為末和入湯服蘹香子散治小腸膀胱疝氣疼痛蘹香子炒京三稜煨銼各一兩薑黃馬藺花醋炒各半兩沒藥研乾薑炮各一兩上為散每服二錢空心食前熱酒調下治偏墜以每日早煎香蘇散入少鹽服之即愈治猝得諸疝小腸及陰中相引痛如絞自汗出欲死上以搗沙參末篩服方寸匕立瘥消腎丸治腎大小偏墜疼痛用橘皮揀淨二兩巴豆十四粒同一處炒至陳皮巴豆黑色去巴豆用橘皮炒末二兩又黑牽牛二兩同一處醋糊為丸梧桐子大每服三四十丸漸至五十丸鹽酒湯下鹽湯亦可食前淋泄藥方出百一選方蛇床子川椒木通食茱萸藁本陳橘皮各一兩上為末每用連根蔥白七枚水三碗藥二匙煎五七沸先噓候通手淋洗氣寶丸出楊氏家藏治一切氣滯心胸痞悶及酒食所傷脾胃積滯膀胱疝氣攻注腰腳茴香炒稱二兩陳橘皮一兩木香一分黑牽牛二兩以吳茱萸二兩火煨同炒候茱萸焦取出不用茱萸只用牽牛頭末一兩上為細末拌勻煉蜜為丸梧桐子大每服二十丸至三十丸生薑湯下更有虛實加減食前服小腸氣痛鹽湯下治寒熱濕氣小腹疼外腎偏大腫痛發時只一兩服立定常服此藥無下部之疾出百一選方茴香猴楂子本草名糖球唯滁州者入藥二味共等分上為細末每服一錢或二錢鹽湯調空心熱服二神膏出經驗良方治腎囊偏墜疝氣牡蠣二兩煅良薑一兩上為細末津唾或水調服小便處須臾如火熱略痛即平安只金丹出危氏方治男子疝氣小腸虛損小茴香二兩濕生蟲陰乾二兩上為末酒糊丸梧桐子大每服三五十丸空心茴香湯下海藻丸出危氏方治偏墜小腸氣海藻海帶各一兩斑蝥二十八個去翅足巴豆二十八個去殼完全者用巴豆斑蝥二味一處生絹袋盛用好醋一碗以瓦瓶盛四味同煮將干去斑蝥巴豆不用只將海帶二味細研為末以淡豆豉一百粒煮藥余醋略浸蒸餅研為膏和末藥為丸如梧桐子大每服用麝香少許硃砂三錢乳鉢內細研至無聲卻入麝香再研勻為衣曬乾以新瓦瓶收之每初服七粒二服十粒三服十五粒若未愈再進三兩服皆用十五粒仍用鹽炒茴香細嚼酒吞下空心服忌鴨子並酢醬動氣等物久病三五服效此藥貴新合效速若合下少遲多服為佳牡丹五等散療㿗疝卵偏大有氣上下脹大行走腫大服此良效牡丹皮防風黃柏炙桂心各一分桃仁一分去皮尖研上為散以酒服一刀圭二十日愈少小㿗疝最良小兒以乳和如一大豆與之宿病人服方寸匕忌生蔥胡荽金谷散出楊氏家藏方治疝疼痛淋流下部穀精草枇杷葉各兩半鬱金一兩上件㕮咀每用一兩半水五升煎數沸乘熱熏之去滓通手淋洗黑神散出聖德堂方治男子婦人膀胱痃癖七疝下氣五隔氣疾産後諸血漏下赤白腹中有塊大如杯棬血瘕症癖七疝發時痛不可忍者用之效乾漆六兩半生用一半重湯煮半日神麯炒小茴香炒各半兩木香椒紅去白丁香各半兩檳榔四個大者以上除椒余藥一半生用一半同炒上為細末水糊為丸如彈子大別研茴香末十二兩鋪陰地陰乾候外干取茴香同丸藥收入甑內盛極干去茴香凡腎氣膀胱痃癖七疝下墜五隔血崩産後諸血漏下赤白者用藥一丸分作四服細嚼酒下死胎者用一丸燒綿子灰酒調下難産者用冬葵子四十九粒杵碎煎酒下應痛丸出三因方治敗精惡物不去結在陰囊成疝痛不能忍久服去病阿魏三兩醋和蕎麥麵作餅厚三指裹阿魏慢火煨熱檳榔大者二個刮去粗皮滴乳香炙去油研細末上同研為末蕎麥麵伴作餅子慢火煨熱入硇砂末一錢赤芍藥一兩麵糊搜和丸如梧桐子大溫酒鹽湯下十丸至二十丸食前服止痛丸出楊氏家藏治小腸疝氣並婦人血氣痛不可忍者蕓薹子一兩斑蝥去翅足四十九枚二味一處慢火炒深黃色勿令焦揀出斑蝥四十二枚只用七枚上件為細末酒煮麵糊為丸如梧桐子大每服一丸小腸氣炒茴香酒下血氣炒生薑醋湯下茴香蒼朮丸出德生堂經驗效方治疝氣腎核偏墜痛不能忍者蒼朮一斤泔水浸春夏三日秋冬五日破故紙鹽炒八角茴香鹽炒巴戟去心黑牽牛各二兩上蒼朮分作四分與四藥同炒外杜仲四兩炒去絲只去黑牽牛不用余為末酒糊為丸梧桐子大每服五十丸空心鹽酒水任下茯苓桂甘湯出直指方治臍下悸動欲作奔豚茯苓二兩甘草炙半兩桂枝一兩上銼細每服四錢棗一個用泉水一盞半煎一盞溫服內消丸出楊氏家藏方治小腸膀胱疝氣下部等疾木香茴香沉香硫黃別研附子炮去皮臍各半兩硇砂二錢別研全蠍四十九枚炒上件為細末湯浸蒸餅為丸如緑豆大每服七丸綿灰溫酒送下食前服必效丸出楊氏家藏治偏墜膀胱疝氣小腸氣痛不可忍者桃仁半斤用茱萸四兩炒桃仁令紫色去茱萸令碾桃仁為細末卻入和以後諸藥茴香炒破故紙炒香熟二味共二錢延胡索穿山甲用蛤粉炒紫色地膽蟲洗去泥土頭翅足焙乾三味各一兩上件為細末麵糊為丸梧桐子大每服五丸空心溫湯送下仍用前件炒藥茱萸研為細末用津液調敷患處丁香疝氣丸出試效方治臍下撮痛疼並臍以下周身皆急小便頻而清其五脈急獨腎脈按之不急虛無力名曰腎疝當歸茴香各一錢甘草木香各五分全蠍十三個羌活三錢防風三錢麻黃根玄胡各一錢丁香半錢肉桂一錢川烏頭半錢上件為末酒煮麵糊丸如雞頭仁大每服五十丸溫酒送下鹽湯亦得空心服應痛丸出楊氏家藏方治疝氣痛甚者胡椒三百二十粒巴豆七枚去皮斑蝥二十一枚去頭足翅用上件為細末煨蒜為丸如緑豆大每服三丸溫酒或熱水送下食前空心服或痛時便服沉香桂附丸治中氣虛弱脾胃虛寒飲食不美退陰助陽除臟腑積冷心腹疼痛脅肋膨脹腸中雷鳴面色不澤手足厥逆便利無度又治下焦陽虛及療七疝痛引小腹不可忍腰曲不能伸喜熱尉稍緩沉香附子炮製去皮臍川烏頭炮去皮臍切作小塊桂心上為細末好醋糊丸梧桐子大每服五十丸至七八十丸熱米飲湯送下空心食前日二服忌冷物衛生寶鑑載癸丑歲奉詔至六盤山上命治火赤紐鄰久病疝氣復因七月間飢飽勞役過度縱飲所發甚至面色青黃不澤腹臍陳痛搐撮不可忍腰曲不能伸熱物尉之稍緩脈得沉小而急於因思難經有云任之為病男子內結七疝皆積寒於小腸之間所致也非大熱劑即不能愈遂制一方名之曰沉香桂附丸每服百丸空心溫酒吞下間服天台烏藥散旬日良愈明年秋王徵班師即遠迎拜精神如故上大悅輒録於此金鈴子丸出朱氏集驗方治膀胱小腸疝氣臍腹苦痛茴香川楝子半兩每個四片同巴豆四十九粒炒焦為度不用巴豆破故紙葫蘆巴炒各二兩上細末酒糊丸每服三十丸細嚼胡桃仁三個熱蔥酒送下常服鹽酒吞下亦可金鈴子散出朱氏集驗方治膀胱疝氣小腸偏墜小腸撮痛發則欲死諸藥所不治妙方川楝子一兩淨斑蝥十四個去頭足翅巴豆十四個去殼並心劈開作兩片上二味同川楝子於銀石瓦器內慢火炒令川楝肉微黃焦色取去斑蝥巴豆二藥不用只將川楝子肉別安之一處外用茴香三錢重和前川楝子肉用鹽合炒令香研為細末每服三錢空心溫酒調下若臟腑微痛者即愈病久而甚痛者不過三服病退即止服此方之後仍用安腎丸沉香蓽澄茄散吞服以補其虛則其病永不作矣燒綿丸出朱氏家藏方治疝氣川楝子去核馬藺花青橘皮舶上茴香各一兩上為細末用漆丸如雞頭仁大針穿三孔陰乾用新綿半兩燒成灰細研以無灰酒調綿灰稀稠得所溫放下藥一丸正發未發時皆可食之藥在腹中不壞如要取藥時可飲葵湯即下淨洗留之一丸藥可治六七人神效天雄沉香煎丸出王氏博濟方治下元虛憊陽事不能或下墜及小腸氣痛腎臟攻注脾胃不和腰腳重天雄四兩生用研銼防風二兩生緊黑小豆二兩淨生漢椒四兩附子四兩生草烏頭四兩生牛膝二兩天麻二兩以上八味以無灰酒一斗在銀鍋內煨火不得令大沸酒浸為度焙令乾沉香丁香木香羌活乾薑各一兩官桂一兩去皮肉蓯蓉三兩酒浸去土炙熟紫巴戟二兩去心上為細末煉蜜丸如梧桐子大每日空心溫酒下二十丸加至三十丸久服明目暖氣海駐顏色葫蘆巴丸出鮑氏方治大人小兒小腸氣盤腸氣偏墜陰腫小腸有形如卵上下痛不可忍或絞結繞臍嘔吐悶亂葫蘆巴一斤大巴戟六兩並炒上為末酒糊丸如梧桐子大每服十五丸空心服酒鹽湯下一方加青皮蓬朮桃仁黑牽牛破故紙一方加川楝破故紙茴香川烏蜜丸酒下即愈歷試屢驗三茱丸出楊氏家藏方治膀胱疝氣時發疼痛而不除漸至堅大此藥可以內消山茱萸吳茱萸湯浸七次食茱萸青橘皮去白茴香微炒肉桂去皮金鈴子去核陳皮去白木香各等分上件為細末酒煮麵糊為丸梧桐子大硃砂為衣每服三十丸酒鹽湯送下食前服木香丸出楊氏家藏方治膀胱寒疝腫絞疼痛地膽蟲去頭翅足斑蝥去頭翅足紅娘子去頭翅足巴豆四味各等分以糯米一盞同炒川楝子去核炒川椒去目及閉口者各一兩茴香二兩鹽炒木香半兩上件同糯米細末木瓜肉四兩豬腰子一對去筋膜同好酒二升熬爛研成膏加前藥末和丸梧桐子大每服三十丸鹽湯或溫酒送下空心食前豬胞丸出楊氏家藏方治膀胱疝氣囊腫大牽引作痛豬胞一枚酒煮切甘遂澤瀉二味各二錢炒黑牽牛續隨子去殼半兩木豬苓斑蝥用糯米炒黃去米並頭足翅稱一錢上件為細末酒煮麵糊丸如梧桐子大每服三十丸嚼茅香酒送下取動小便如米泔是效常服五七十丸忌甘草三日食前澤瀉散出楊氏家藏方治膀胱疝氣小腸氣痛馬藺花川楝子肉炒茯苓皮澤瀉茴香炒麥門冬去心石燕子煅紅醋淬七次上件各等分為細末入麝香少許每服一錢用鹽酒調下空心臨臥服茴香散出楊氏家藏方治一切氣疾臍腹滿膀胱疝氣小腸氣痛京三稜炮切蓬莪朮炮切金鈴子去核麩炒赤三味各一兩茴香炒青橘皮去白甘草炙二味各半兩木香當歸洗焙二味各一分上件為細末每服二錢水一盞生薑二片煎至七分溫服如小腸撮痛炒生薑酒調下如人行五七里再服一服空心食前療疝氣出本草以蝟皮燒為灰酒服之治疝積腹痛出本草以羚羊角作末服之除疝瘕出本草以雀卵白和天雄菟絲子末為丸空心酒下五丸
