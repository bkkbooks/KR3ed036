吸其煙久則飲少許清米飲日三次蟲死嗽愈加百部蕪荑仁蘇木熔蠟和攤紙上貴公在蜀作宣撫甚祕寶之以膏肓之疾藥不能及熏之有效治勞瘵出永類鈐方三月四月取桃葉五升熟搗脫衣避風密室中坐其上從旦至暮尸蟲悉出又方出永類鈐方空心食棐子百個諸蟲悉化為水又方出永類鈐方桃仁去皮研膏煮汁如米作稀粥空心日二服又方出永類鈐方用桃葉搗汁服又方出永類鈐方酸石榴皮東引無根水濃煎初更服天明蟲下稀粥補之又傳尸勞疾羸瘦者上以鱉甲一個燒令黃色篩末酒服方寸早午日二治勞嗽骨蒸久積羸弱成瘵者出本草以溫州白乾薑一物漿水煮令透心潤溫濕取出焙乾搗篩陳廩米煮飯為丸如桐子大一服三五十丸湯酒任用其效如神治瘦病骨蒸羸瘦精髓虛弱四肢少力方見豬腎羹方治瘦病咳嗽骨蒸羸弱助血灸法崔氏灸穴崔氏承相灸勞法外臺祕要崔相家傳方及王寶臣經驗方悉編載然皆差誤毗陵郡有石刻最詳豫取諸本參校成此一書此石刻方極為委曲依此治人未嘗不驗往往一灸而愈豫在宜成久病虛弱亦用此而愈唐中書侍郎崔知悌政序夫含靈受氣稟之於五行攝生乖理降之於六疾居岐黃廣記蔚有舊經攻灸兼行顯著斯疾骨蒸者亦名傳尸生謂殗殜亦稱復連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問少長多染此病嬰孺之流傳注根其為狀也發乾而聳或聚或散或腹中有塊或腦後兩邊有小結多者乃至五六或臥出盜汗夢與鬼交雖目視分明而四肢無力上氣食少漸就沉羸縱延時日終於盡豫忝洛州司馬嘗三十日灸活一十三人前後瘥者數逾二百至於貍骨獺肝徒聞曩説金牙銅鼻罕見其能未若此方扶危濟急非止單攻骨蒸又別療氣療風或瘴或勞或邪或癖或患其狀甚廣灸活者不可具録略陳梗概又恐傳受訛謬以誤將來今故具圖形狀庶令覽者易悉便所在流布頗用家藏未假外請名醫旁求上藥還魂返魄何難之有遇斯疾者可不務乎取穴法先兩穴令患人平身正立取一細繩蠟之勿令展縮順腳底貼肉堅踏之男左女右其繩前頭與大拇指端齊後令當腳跟中心向後引繩循腳肚貼肉直上至曲䐐中打橫紋截斷又令患人解發分兩邊令見頭縫自囟門平分至腦後乃平身正坐取向所截一頭令與鼻端齊引繩上至循頭縱至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨以黑點記之黑點不是灸處又取一繩子令患人合口將繩子按於口上兩頭至吻卻鉤起繩子中心至鼻柱根下如此便齊兩吻截斷將此繩展令直於前記脊骨上黑點橫量取平勿令高下繩子先中折當中以墨記之卻展開繩子橫量以繩子上點正壓脊骨上黑點為正兩頭取平令無高下於繩子兩頭以白圈記白圈是灸穴以上是第一次點二穴次二穴令其人平身正坐稍縮臂膊取一繩繞項向前雙垂與鳩尾齊鳩尾必是岐骨人有無岐骨者至雙胸前兩岐骨下量取一寸卻是鳩尾也即雙截斷卻背翻繩頭向項後以繩子中停取心正令當喉嚨結骨上其繩兩頭夾項雙垂循脊骨以墨點之黑點不是灸處又取一繩子令其人合口橫量齊兩吻截斷還於脊骨上以黑點橫量如法繩子兩頭以白圈記之白圈處是灸穴以上是第二次點穴連前共四穴同時灸日則各七壯至二七壯纍灸至一百壯或一百五十壯為妙候瘡欲瘥又依後法再灸二穴又次二穴以二次量口吻繩子於第二次雙繩頭盡處黑點上當脊直上不堅點令繩中停中心在墨點上下繩盡頭以白圈兩穴白圈是灸處以上是第三次點兩穴謂之四花穴灸兩穴各百壯三次共六穴各取離日量度訖即下火唯須三月三日艾最佳疾瘥百日內慎飲食房室安心靜處將息各一月後覺不瘥復初穴上再灸凡骨蒸之後所起辨驗有二十二種並依上項灸之出濟生方一胞蒸小便赤黃二玉房蒸男遺尿失精女月漏不調三腦蒸頭眩悶熱四髓蒸覺髓沸熱五骨蒸齒黑六筋蒸甲焦七血蒸發焦八脈蒸緩急不調九肝蒸或時飢前昏眩十心蒸舌焦或瘡或時胸滿悶十一脾蒸唇焦折或口瘡十二肺蒸口乾生瘡十三腎蒸耳乾焦十四膀胱蒸右耳焦十五膽蒸眼目失光十六胃蒸舌下痛十七小腸氣下泄不禁十八大腸蒸右鼻孔疼痛十九三焦蒸乍寒乍熱二十肉蒸別人覺熱自覺冷二十一皮蒸皮肉蒸雞皮起二十二氣蒸變身壯熱不自安息用尺寸取穴法出濟生方凡孔穴尺寸皆隨人身形大小須男左女右量手指中心一節兩橫紋中心為一寸取艾法出濟生方端午日日未出於艾中以意求其似人者輒採之以灸殊有效幼時見一書中雲爾忘其何書也艾未有真似人者於明暗間苟以意命之萬法皆妄無一真者此何疑耶用火法出濟生方黃帝曰松柏柿桑棗榆柳竹等木火用灸必害肌血慎不可用凡取火者宜敲石取火或水精鏡子於日得者太陽火為妙天陰則以槐木取火亦良治勞瘵膏肓肺腧穴每穴各灸九壯仍依蟲醉日各穴腧穴多灸多為妙灸後百日忌煎焞生冷熱物毒食仍戒房事避風寒減喜怒安心靜處將息若一月猶覺未瘥於初穴上再灸灸勞病方出瑞竹堂方從下數至第三根短筋稍尖上灸二寸炷男左女右又於項後數下至第三脊溝點穴灸隨病人年紀幾十歲即灸幾十炷灸勞瘵方膏肓二穴可以回生或肚臍相對取背脊骨正對灸有驗艾炷亦不可多骨蒸傳尸之病乍寒乍熱有時唇赤或頰赤並痢血多唾欲得食或不欲食兩脊脈常急患人多咳盜汗以指按捻脊膂四邊肉有時心胸脹滿氣急黃瘦膂中肉盡遂即著床胸前自動脊膂兩邊肉盡灸療即難如灸候胸前肉動非是灸法如看病人是也更不須選離日即將病人於五道頭日午時灸灸七壯若先知其病又緩即取離日午時大吉欲灸覆病人面向下著地取撅肋頭以病人大拇指自捻著展中指直向脊骨指頭脊膂中肉小筋上點記從點記處向上至耳下尖頭即中尖屈繩從初點處向上還當脊膂點繩所到記之更又在屈繩從原點記處向上還準前點記一邊點四處兩邊俱點總八處各須去脊骨遠近一種並須上下相當下從撅筋上至耳根取直共八處一時下火艾炷如棗核大堅實作灸了即以灰三匝圍坐處便歸家不須回顧禁面生冷肉時忌色及雜食平復後任依常未平復有若犯重發即不可復療神素師灸骨蒸咳法當頭耳孔橫量相離三寸許相當灸有穴日灸三壯至第八日灸二七了第三椎上第二椎下男取左手女取右手頭指依兩指頭東西灸日一七壯至第八日各灸五十壯復五日日各灸十五壯脛取系鞋橫大文量至膝下中分當脛骨外日灸一七壯滿第八日日灸滿三十五日了當背上皆男左女右取頭指取腕文當指當頭灸日七壯至第八日滿百壯婦人肚脹月節不通取左手頭指當臍量至下腹當指頭灸日七滿三百壯膈上午後灸膈下午前灸又灸法立腳於系鞋處橫文以手四指於文上量脛骨外逼脛當四肢中節按之有小穴取一縷麻刮令薄以此麻緩繫上灸令麻縷斷男左女右患多愈指掌穴出經效濟世方治勞疾用紙條比病人手自中指末盡手掌第一橫紋又益之以半是為一掌半將此一掌半紙條斷而為二去一半不用以此紙條自病人項後第一捶骨當中比向下至紙條盡處以墨記之此是高下也臍心穴出經效濟世方令病人赤足於平地上正立用木杖子自地比至臍心截斷竹杖用此杖卻自後比至杖盡處以墨記之此亦是定高下也取寸法出經效濟世方取病人中指中節外紋為一寸切不可用內紋也指掌穴用一寸點兩穴臍心穴用一寸二分點兩穴皆於元墨記處相去一寸及一寸二分非謂兩旁各一寸及一寸二分也凡此指掌並取寸皆男左女右比之每穴灸七十壯至百壯後凡百忌慎百許日第一椎又非大椎大椎在第一椎上陷中也如無醫者此方立效凡風寒之氣客於中滯而不能發故瘠不能言及喉痹失聲皆風邪所為也入臟皆殺人凡尸厥而死脈動如故此陽脈下墜陰脈上爭氣閉故也針入三分補之以灶突墨彈丸將水和服又針足中指頭去甲如韭葉又針足大指甲下內側去甲三分一法以癸亥夜二更六神皆聚之時解去下體衣服於腰下兩傍微陷處針灸家謂之腰眼直身半立用筆點定然後上床合面而臥每灼小艾炷七壯勞蟲或吐或瀉出即時平安斷根不發更不傳染令病人偃臥用皮紙條浸濕自項高骨直貼至尾脊骨看何處一點先干乃穴也以筆點記灸二十一壯此腰眼穴俗言不可灸為明堂經不載是不然蓋所謂即腧也出永類鈐方咒法斷伏連解法上先覓一不開口胡蘆埋入地取上離日開之煮取三匙脂粥內其中又剪紙錢財將向新冢上使病兒面向還道背冢坐以紙錢及新綜圍冢及病人使匝別將少許紙錢圍外與五道將軍使人一手捉葫蘆一手於坐旁以一刀穿地即以葫蘆一手於穿地及坐葫蘆上使一不病人捉兩個鎖拍病人背咒曰伏連伏連解伏連伏連不解刀鎖解又咒曰生人特地上死鬼特地下生人死鬼即各異路咒訖令不病人即擲兩鎖於病人後必取二鎖相背不背更取擲取相背止乃還勿反顧又取離日令病人騎城外車轍面向城門以水三升灰三重圍病人又作七個不翻餅於五道將軍咒曰天門開地戶閉生人死鬼各異路今五離之日放舍即歸咒訖乃還莫回頭此法大良按摩法療骨蒸方上患殗殜等病必瘦脊骨自出以壯丈夫屈手頭指及中指夾患人脊骨從大權向下盡骨極揩復向上來去十二三回然後以中指於兩畔處極彈之若是此病應彈處起作多頭可三十餘頭即以墨點上記之取三指大青竹筒長寸半一頭留節無節頭削令薄似劍煮此筒子數沸及熱出筒籠墨處按之良久以刀彈破所角處又煮筒子重角之當出黃白赤水次有膿出亦有蟲出者數數如此角之令惡物出盡乃即除當目明身輕也
