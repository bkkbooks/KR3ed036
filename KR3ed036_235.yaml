body:
  text: 卷二百三十五勞瘵門總論夫骨蒸掩殢復連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸者以疰者注也病自上疰下與前人相似故曰疰其變有二十一種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁發乾而聳或腹中有塊或腦後邊有小結核連腹數個或聚或散沉沉默默咳嗽痰涎或咳膿血如肺痿肺癰狀或腹下利或羸瘦困乏經時積月纍年以至於死死後乃疰易旁人乃至滅門者是也更有蜚尸遁尸寒尸喪尸疰尸謂之五尸及大小附著等證不得知所苦無處不惡乃挾諸鬼邪而害人以三因權之內非七情所忤外非四氣所襲雖若麗乎不內外因奈其證多端傳變遷移難以推測故自古及今愈此病者十不得一所謂貍骨水獺肝天靈蓋銅鑑鼻徒有説未嘗見效唯膏肓崔氏穴若早灸之可活數年晚則不濟也病者憎寒發熱自汗面白目干口苦精神不守恐畏不能獨臥其傳在肝病者憎寒發熱面黑鼻燥忽忽喜忘大便苦難或腹泄瀉口瘡其傳在心病者憎寒發熱面青唇黃舌本強不能咽飲食無味四肢羸瘦吐涎沫傳在脾病者憎寒發熱面赤鼻白乾燥毛折咯咳嗽喘時吐白涎或有血線傳在肺病者憎寒發熱面黃耳輪焦枯筋骨痠痛小便白濁遺瀝胸痛其傳在腎所謂勞蒸者二十四種隨證皆可考尋毛折發焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身熱瞤劇其蒸在肉發焦鼻衄或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脈爪甲焦枯眼昏兩脅急痛其蒸在筋版齒黑燥大杼痠痛其蒸在骨背膂疼痛胻骨酸澌其蒸在髓頭眩熱悶口渴吐涎眼多眵淚其蒸在腦男子失精女子白淫其蒸在玉房乍寒乍熱中腕與顫中煩悶其蒸在三焦小便赤黃凝濁如膏其蒸在膀胱傳道不均或祕或泄腹中雷鳴其蒸在小腸大腹隱痛右鼻乾痛其蒸在大腸口鼻乾燥腹脹睡臥不安自汗出其蒸在胃口苦耳聾脅下其蒸在膽裡急後重肛門腫閉其蒸在回腸小腹㽱痛筋脈縱緩陰氣自強其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黑氣短躁悶灑灑淅淅其蒸在心唇乾口瘡胸腹悶滿畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音遠其蒸在肺耳輪焦枯腳氣痠疼起居不得其蒸在腎情想不寧無故精泄白物綿綿而不舉其蒸在右腎心主胞絡心膈噎塞攻擊痛疼俯仰煩冤其蒸在膈諸證雖曰不同其根多有蟲齧其心肺治之不可不絶其根也病源云夫蒸有五一曰骨蒸其根在腎旦起體涼日晚即熱煩躁寢不能安食都無味小便赤黃忽忽煩亂細喘無力腰疼兩足逆冷手心常熱蒸盛傷內即變為疳食人五臟二曰脈蒸其根在心日增煩悶擲手足出翕翕思水口唾白沫臥即浪言或驚恐不定脈數蒸盛之時或變為疳臍下悶或暴利不止三曰皮蒸其根在肺必大喘鼻乾口中無水舌上白小便赤如血蒸盛之時胸滿或自覺得煩熱兩脅下脹大咳徹背連脾疼眠寐不安或蒸毒傷臟口內唾血四曰肉蒸其根在脾體熱如火煩躁無汗心腹鼓脹食即欲嘔小便如血大便祕澀蒸盛之時或體腫目赤寢臥不安五曰內蒸亦名血蒸所以名內蒸者必外寒而內熱把手附骨而熱甚其根在五臟六腑其人必因患後得之骨肉自消飲食無味或皮燥而無光蒸盛之時四肢漸細足趺腫起大凡男女傳尸之病心胸滿悶背轉疼痛兩目不明四肢無力雖欲寢臥臥不得寢者膂急膫痛膝腦痠痛多臥少起狀如佯病每至平旦精神尚好午後四肢微熱面無顏色喜見人過常懷忿怒才不如意又便多嗔行立腳弱夜臥盜汗夢與鬼交或見先亡或多驚悸有時咳嗽雖思飲食不能多餐死在須臾精神尚好或時微利兩脅虛脹口燥鼻乾常多黏唾有時唇赤有時欲睡漸成沉羸猶若涸魚不得死矣其病變狀多端考其源先從腎起初受之氣兩脛痠疼腰背拘急行立腳弱腎已虛矣次傳其心心受其氣夜臥必驚或多怔悸心懸汲汲夢見先亡有時盜汗飲食無味口內生瘡心常煩熱惟欲眠臥朝輕夕重兩頰口唇悉皆紅赤如敷胭脂又時手足五心皆熱心皆受已次傳於肺肺初受氣咳嗽少力有時氣喘臥則更甚鼻口乾燥不聞香臭或時聞朽腐物氣憒憒欲吐肌膚枯燥時或刺痛或似蟲行干皮細起狀如麩片肺既受已次傳於肝肝初受氣兩目䀮䀮面無血色常欲顰眉眼視不遠目睛干又時赤痛或復晴黃朝暮懵昧常常閣眼眠臥不熟肝既受已次傳於脾脾初受氣兩脅虛脹食不消化又時瀉利水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光澤或時上氣抬眉喘氣痢赤黑汁至此候者將死證矣大凡此疾良由祖先積孽殺害過多或有命債殃及後世或淪沒惡趣未應解脫為人之後不為釋冤不為薦福或患此而亡傳染是疾以希資救又其家人久不營葬不時祭祀山水沖注狐貍穿犯幽宅不寧出而為祟遞成相傳傳染不已故傳尸非惟一門相染而成也人之氣血衰敗臟腑虛弱中於鬼氣因感其邪遂成此疾其候咳嗽不已或胸膈妨悶或肢體疼痛或肌膚消瘦或飲食不入或吐利不定或吐膿血或吐鮮血動至一二升或嗜水漿或好歌詠或愛悲愁或發癲狂或便溺艱難或因酒食而遇或因風雨而來或問病弔喪而得或朝走暮遊而逢或因氣聚或因血行或露臥于田野或偶會於園林傳惹斯疾故傳尸者須知三尸九蟲何也三尸者名在後論九蟲者煙蟲寸白胃蟲人皆可治之其餘六蟲有六代行在後人若受一蟲此人死後兄弟子孫骨肉親屬綿綿相傳以至滅族凡疾始覺精神不美氣候不調切戒慎酒色調節飲食如或不然妄言邪師或言鬼祟以至不起慎之戒之尸蟲遊食日辰及治法大抵六蟲一旬偏遊四穴轉流周而復始已具六代法中自立春一日後食起三日一食五日一醉歸於所歸穴大醉五日故五日蟲醉可以下藥及灸其三日蟲食切不可妄有醫治蟲在人身中一蟲可占十二穴六蟲在人身中共遊七十二穴上旬十日從心至頭遊四穴中旬從心至臍遊四穴下旬從臍至足遊四穴上旬可先服藥後灸所遊穴其蟲頭上向若下火灸蟲如紫蠶苗出在汗中更服藥取之以蟲盡為度更服補藥永得安耳中旬其蟲所遊穴中頭向下亦服藥取之不灸也恐蟲覺悟永難取蓋此蟲性以通靈務在精審勿令有悟可也觀尸蟲色知病淺深凡名醫知者先知毒氣與蟲並行攻人臟腑遇陽日長雄蟲遇陰日長雌蟲緣先食臟腑脂膏故其色白次食血肉血肉盡故其蟲黃赤次食精髓故其蟲紫色精髓盡故其蟲黑色傳入腎中病人方死若求醫士曉通病源先取其蟲視其理自知輕重其蟲如白色可二十日服藥補之其蟲如黃赤色可六十日服藥補之其蟲如紫黑色可百二十日服藥補之十中可保一二雖不能為一身除害亦可為子孫除害矣服藥仍須一載之中刻意調攝亦可痊平如此得命可為再生也又云蟲頭赤者食患人之肉其病可治頭口白者食患人之髓其病難治雖不得斷則不傳子孫矣六代傳病及諸蟲形狀凡治病之道要須藥病相應神效仍在瀉實補虛調治臟腑方得痊愈故三尸九蟲種種靈異莫令知之或似蜣螂或似紅線馬尾或似蝦蟆形或似刺蝟或似鼠形或如爛面或有足無頭或有頭無足或化精血歸在亢陽之內種種形類實難辨之淺學之流難施方劑誤醫甚多枉死不少或則取蟲不補或則學淺妄傳皆是徒費資財通無去病之理遂致夭折豈不悲哉三蟲在人身中染著之後或大或小令人夢寐顛倒夢魂飛揚精神耗散飲食漸減形容漸羸四肢痠痛百節勞倦憎寒壯熱背膊拘急腦與頭痛口苦舌乾面無顏色鼻流清涕虛汗常多行步艱難眼睛多痛其蟲過丙丁日食起醉歸心腧穴中四穴輪轉周而復始大醉可醫矣取蟲出後補心當瘥第二代並尸蟲形狀遊食日治法第二代為覺勞病謂傳受此疾已覺得病覺病者患乃自知夜夢不解與亡人為伴侶醒後全無情思昏惰似醉神識不安所嗜食味輒成患害或則氣發動風所加四體不和心胸滿悶日漸羸瘦骨節乾枯或嘔酸水或則醋心唇焦口乾鼻塞腦痛背膊痠疼虛汗常出腰膝刺痛如此疾狀早須醫治失時致傷命三蟲在人身中令人氣喘唇口乾咳嗽憎寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虛竭鼻多清水四肢將廢臉赤面黃皮膚枯瘦腰膝無力背脊痠疼吐血唾膿語聲不利鼻塞腦痛胞膈多痰重者心悶吐血強倒在地不能自知其蟲遇庚辛日食起歸肺腧中四穴輪轉周而復始大醉可醫矣灸取蟲後補肺當瘥每三代病並尸蟲形狀遊食日治法每三代為傳尸勞病傳受病人自得之日漸羸瘦頓改容顏日日憂惶夜夜恐懼不遇良醫就死不遠三蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水黏涎腸脹虛鳴臥後多驚口鼻生瘡唇黑麵青日漸消瘦精神恍惚魂夢飛揚飲食不消氣咽氣干汗出如油目昏多淚其蟲遇庚寅日食起醉歸厥陰穴中四穴輪轉周而復始大醉可醫矣取其蟲後服補藥當瘥第四代病並尸蟲形狀遊日治法三蟲在人身中令人臟腑虛鳴嘔逆腸中痃癖氣塊憎寒壯熱肚大筋生腰背疼痛或虛或瘦瀉痢無時行履困重四肢憔悴時氣上喘口苦皮乾飲食過多要吃酸鹹之物其蟲遇戊己日食起醉歸脾腧穴中四穴輪轉周而復始大醉可醫矣取出蟲後服補藥當瘥第五代病並尸蟲形狀遊食日治法三蟲在人身中令人多怒氣逆筋骨拳變四肢解散面黑麵青憎寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛翳膜多淚背膊刺痛力憊身羸手足乾枯臥著床枕不能起手足似中風四肢頑麻腸內多痛眼見黑花忽然倒地不省人事夢寐不祥覺後遍體虛汗其蟲遇甲子日食起醉歸肝腸穴中四穴輪轉周而復始大醉可醫矣取蟲出後補肝當瘥第六代病並尸蟲遊食治法三蟲在人身中居於腎臟透連脊骨令人思食是物要餐身體尫羸腰膝無力髓寒骨熱四肢枯乾眼見火生或眼多黑暗耳內虛鳴陰濕燥癢冷汗如油夢與鬼交小便赤黃醒後昏沉臍下結硬或奔心胸看物如豔心腹悶亂骨節疼痛其蟲遇醜亥日食起醉歸腎腧穴四穴輪轉周而復始大醉可醫矣蟲出後補腎填精當瘥取蟲防護法先令病人家用好紙糊一室不留罅隙尋志誠人過遞以安息香水灑了過遞人之身又以雄黃雌黃塗其鼻孔耳眼唇上安排鐵鉗一個布巾一幅用香油二斤以鍋盛頓微煎令沸仍用高桶一個以好石灰在桶內生布巾蓋桶口卻服取蟲藥五更初一服五更三點一服服藥後腹中疼痛如刀斧劈不妨至巳牌必須下蟲或取下臭穢如膠膝或吐瀉膿血症塊皆於灰桶中其蟲或從汗出紫蠶苗狀或於耳鼻口中出或小便中出異般形狀不止一也或青黑或黃紅大者急用鐵鉗取於油內煎當日將油紙裹蟲入瓦罌內石灰填實埋棄於深山遠僻處免致再染人患人衣服床席並皆棄去醫人吩咐藥後亦須遠去又論論曰夫勞瘵一證為人之大患凡受此病者傳變不一積年疰易甚至滅門可勝嘆哉大抵合而言之曰傳尸別而言之曰骨蒸殗殜復連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰是也夫疰者注也自上疰下病源無異是之謂疰又其變則有二十二種或三十六種或九十九種又有所謂五尸者曰蜚尸遁尸寒尸喪尸注尸是也其名不同傳變尤不一感此疾而獲安者十無一二也大凡五臟所傳皆令人憎寒發熱其證狀各異有如傳之於肝則面白目枯口苦自汗心煩驚怪傳之於心則面黑鼻乾口瘡喜忘大便或祕或瀉傳之於脾則面青唇黃舌強喉哽吐涎體瘦飲食無味傳之於肺則面赤鼻白吐痰咯血嗽喘毛枯傳之於腎則面黃耳枯胸滿膈痛白濁遺瀝又有二十四種勞蒸者亦可因證驗之蒸在心也少氣煩悶舌必焦黑蒸在小腸也腹內雷鳴大腸或祕泄蒸在肝也目昏眩暈躁怒無時蒸在膽也耳聾口苦脅下堅痛蒸在腎也耳輪焦枯腰腳痠痛蒸在右腎也情意不定泄精白絮蒸在肺也喘嗽咯血聲音嘶遠蒸在大腸也右鼻乾疼大腸隱痛蒸在脾也唇口乾燥腹脅脹滿畏寒不食蒸在胃也鼻口乾燥腹膨自汗睡臥不寧蒸在膀胱也小便黃赤凝滑如膏蒸在三焦也或寒或熱中腕膻中時覺煩悶蒸在膈也心胸噎塞疼痛不舒蒸在宗筋也筋脈縱緩小腹隱痛陰氣自強蒸在回腸也肛門祕泄傳道之時裡急後重蒸在玉房也男子遺精女子白淫蒸在腦也眼眵頭眩口吐濁涎蒸在皮也肌膚鱗起毛折發焦蒸在骨也版齒黑燥大杼痠痛蒸在髓也肩背疼倦胻骨痠疼蒸在筋也眼昏脅痛爪甲焦枯蒸在脈也心煩體熱痛刺如針蒸在肉也自覺身熱多不奈何四體瞤動蒸在血也毛髮焦枯有時鼻血或復尿血詳諸病證大略如斯若究其根惟心肺受蟲齧禍之甚也治法先宜去根次須攝養亦有早灸膏肓崔氏穴而得愈者若待其根深蒂固而治之則無及矣平時得三五方用之頗驗漫録於左以為備治論曰傳尸勞者骨蒸之病流傳五臟也其證殗殜半臥半起旦即醒然午後微蒸情常不悅心多驚悸夜即盜汗夢與鬼交兩頰紅赤唇如血色欲睡不得眠欲食不能食或喘氣咳嗽心胸滿悶背體煩疼兩目精明四肢無力脊膂拘急膝脛痠痛兩脅虛脹時或微利鼻口乾燥漸至尫羸雖死在須臾精神尚爽是其候也治之若緩猶如水涸不覺其死近世以來童男室女丈夫婦人月水不調臍腹冷痛五心煩熱醫者一見便作骨蒸勞證治之病者聞之莫不驚駭殊不知人本無勞證皆原稟受怯弱血氣不足治之不得其法用藥不善遂成此疾且多以柴胡地骨皮青蒿知母藕節鱉甲紫菀麥門冬為退熱之劑已服之後熱雖漸退未久復來醫者便究本原不詳醫書所謂虛熱語再用前件等藥愈進而血氣愈虛疾勢愈甚矣況前藥性冷必傷脾胃日復一日不思飯食以致傷胃滑泄肢體瘦悴以致不救此乃柴胡等藥誤之矣深可憐憫蓋柴胡等藥乃傷寒表解之劑若血氣虛者非所宜服向來必用方中亦曾言之但其辭文隱而難曉今明言其略庶幾易知若受病之人未曾服前件藥猶為易治已曾服後倘或過多真氣表盡難以收救宜服宜神飲凡患骨蒸之人坐臥居處不宜傷冷亦不得傷熱冷甚則藥氣難通兼之脹滿食不消化或腹氣上熱甚則血脈擁塞頭眩目疼唇乾口燥心胸煩悶渴欲飲水此等皆是將息過度之狀深可誡也將養之法須寒溫得所先熱而脫先寒而著若背傷冷即令咳嗽若手足傷熱即令心煩若覆衣傷厚即眠臥盜汗若覆衣過薄即心腹脹滿所以飲食不限時節寧可少食保無宿注數數進之助藥勢也必須軟易消故也不宜生硬恐損胃氣致不消也此皆以易消食之為瘥骨蒸之病無問男女忌房室舉動勞作有所不宜陳臭酸鹹黏食不消牛馬驢羊大小二豆豬魚油膩酒面瓜果野鳥之屬葵筍蒜蕨及生冷等並不得餐自必平復一月以後乃漸開也大略如此觸類而長之此病宜餐煮飯鹽豉豆醬薑蔥韭枸杞苜蓿苦菜地黃牛膝並須煮爛食之候病稍退恐肌膚虛弱可時食干鹿脯治諸疾藥性出拔粹方實熱黃芩黃連黃柏大黃氣烏梅秦艽柴胡血青蒿鱉甲蛤蚧小麥牡丹皮肺鼻干烏梅天門冬紫菀麥門冬皮白舌吐血石膏桑白皮膚昏昧氣睡牡丹皮氣遍身氣熱悶促鼻乾人參黃芩梔子大腸口鼻孔干痛大黃芒硝脈唾白浪語脈絡溢脈緩急不調生地黃當歸心舌乾黃連生地黃血發焦地黃童子小便當歸桂心小腸下唇焦赤茯苓生地黃木通脾唇焦芍藥木瓜苦參肉食無味而嘔煩躁不安芍藥胃舌下痛石膏粳米大黃芒硝葛根肝眼黑川芎當歸前胡筋甲黑川芎當歸膽眼白赤色柴胡栝蔞三焦乍寒乍熱石膏竹葉腎兩耳焦生地黃寒水石石膏知母腦頭眩悶熱地黃防風羌活髓髓沸骨中熱天門冬當歸地黃骨齒黑腰痛足逆變丹食臟鱉甲地骨皮牡丹皮當歸生地黃肉肢細趺腫臟腑俱熱石膏黃柏胞小便赤黃澤瀉茯苓沉香滑石生地黃膀胱左耳焦澤瀉茯苓滑石凡此諸蒸皆熱病後因食肥肉油膩及房酒犯之而成久蒸不除變成勞瘵即死矣勞瘵附論勞瘵之證非止一端其始也未有不因氣體虛弱勞傷心腎而得之又有外感風寒熱濕之氣先為瘧疾以致咳嗽寒邪入里失於調治不能保養過於房勞傷於飲食久而成勞瘵之候其為證也令人肌肉羸瘦毛皮乾枯寒熱盜汗遺泄白濁或腹中有塊或腦後兩邊有小結核或聚或散或咳嗽痰涎或咳唾膿血及傳變則為二十四種或三十六種或九十九種又有所謂五尸者其名狀雖不同轉變雖不一其所謂傷不過五臟諸方載皆云有蟲齧心肺間治法當先去蟲然後調養五臟至若傳尸一證名骨蒸殗殜復連尸疰勞疰蟲疰毒疰冷疰食疰鬼疰是也如勞瘵多是血氣虧損多因輕病時發汗通利差誤所致或感六氣成咳嗽未解散先服補藥竟成久咳復以房勞恣飲強食變為寒熱只宜服平補之藥又有能倍食肉思食者名曰傳尸亦有滅門者其藥雖有天靈蓋紫河車狐肝獺爪麝香等自未及用世云有鬼依其身有蟲食其臟婦人多病此蓋於産後閉經而傳之耳方木香蛤蚧丸出直指方治勞瘵久嗽聲干骨痿瘦瘁蛤蚧一對尾全者洗淨酥炙生鱉甲去裙醋炙乾白茯苓川芎當歸北五味子牛膝各七錢半綿黃耆柴胡知母貝母雞心檳榔明阿膠炒酥巴戟酒浸去心曬桃仁酒浸去皮焙各半兩木香三錢肉豆蔻三個生秦艽洗羌活生髮紙燃火燒存性故紙炒各三錢上細為末煉蜜丸彈子大每服一丸煎棗湯空心服下參耆散出直指方治勞瘵嗽喘咯血聲焦潮熱盜汗柴胡當歸明阿膠炒酥黃耆蜜炒白茯苓川芎半夏制貝母去心枳殼制北桔梗秦艽洗甘草焙各半兩人參北五味子羌活防風杏仁水浸去皮款冬花桑白皮炒各三錢半生鱉甲去裙米醋炙黃紫菀茸各二錢上粗末每服二錢半薑棗煎食後少頃服沉香鱉甲散治勞瘵身痛凝神飲子出仁存方治勞瘵憎寒發熱口乾咽燥自汗咳嗽唾血瘦劇倦乏人參去蘆當歸去尾白芍藥白茯苓去木黃耆去蘆白朮半夏曲五味子熟地黃甘草川芎蓮肉大麥門冬去心桔梗以上各等分上為粗末每服四錢用水一盞半烏梅棗子各一個煎至七分去滓服如嗽加阿膠虛極胸滿者加木香濕紙煨沉香亦得不思食加扁豆一方無川芎桃仁煎出直指方治勞疰傳尸骨蒸倦弱大川椒出汗生犀角當歸續斷各一兩桃仁去皮炒鱉甲醋炙黃各一兩半白礬煅豬牙皂角蛤蚧一雙去頭足洗酥炙安息香蘇合香雄黃各一分麝一錢上為末煉蜜和丸如梧桐子大每服二十丸米飲下或用真川椒泡湯下虎牙丸出直指方治勞瘵瘦悴咳嗽聲啞骨痿殺下瘵蟲紫河車一具即男子胎衣水洗淨酒醋再折洗用童尿並好酒煮爛麝半錢黃頭取肉四兩童尿並酒煮爛大紅川椒去合口並子以黃杆紙托之就放於熱爐內頻撥去油頓地上蓋一宿一兩半鹿茸七錢半酒炙生鱉甲一枚去裙醋浸一宿又醋一盞仰盛慢火炙令醋盡桃仁水浸去皮秦艽洗木香明阿膠炒酥各半兩雄黃安息香生髮紙燃火燒存性各二錢半虎頭關骨酒浸二宿炙焦一兩半上細末以紫河車狗肉杵黏為丸桐子大每服七十粒月首五更空心米湯下午時又服如無胎衣以雄豬肚代用修事同治勞疾出百一選方虎糞內骨一錢人骨為最獸骨次之殺虎大腸用著亦可用青蛇腦小豆許或緑豆許同酥塗炙色轉為度無蛇腦只酥炙亦得天靈蓋三錢酥炙黃為末鱉甲極大者酥炙黃為末一兩九肋者妙青蒿取梢三四寸細判六兩安息香半兩桃仁一分去尖研為末絹篩過麝香一錢別研檳榔一個別為細末豉三百粒蔥白二十一根打破童子小便半升東引桃柳李桑枝各七莖粗如筋頭大各七寸細銼楓葉二十一片如無亦得初不曾用上先將青蒿桃柳李桑枝楓葉豉以官升量水三升煎至半升許去滓入安息香天靈蓋虎糞內骨鱉甲桃仁與童子小便同煎取汁去滓有四五合將檳榔麝香同研均調作一服早晨溫服以被蓋覆汗恐汗內有細蟲以帛子拭之即焚此帛相次須瀉必有蟲下如未死以大火焚之並棄長流水內所用藥切不得令病人知日後亦然十來日後氣體復元再進一服依前焚棄至無蟲止此藥如病者未亟可以取安如已亟俟其垂死則令下次已傳染者服之先病者不可救後來斷不傳染袁州寄居五節郎李應本相州法司嘗以吏役事韓似夫樞密兵火後忽於宜春見之云兵候軍得官今間居於此從客問其家事潛然淚下曰應先有兒女三人長子因買空宅無人所居之室忽覺心動背寒遂感勞疾垂殆傳於其次室女長子既死女病尋亟繼又傳於第三子證候一同應大恐即禱於城隍每月設面飯以齋雲水冀遇異人且許謝錢三十萬數日因往市中開元寺前有一人衣羽士服自稱貧道踵足而呼曰團練聞宅上苦傳尸勞貧道有一藥方奉傳同入寺中問其姓名不答曰何必云云應即假筆書之道人言欲過湖南應留之飯云已吃飯了欲贈之錢云有盤纏臨行又言此藥以天靈蓋虎糞內骨為主切須仔細尋覓青蛇腦如無亦可服藥前一日須盛享城隍求為陰助應曰既求於神何必用藥道人曰不然即揖別西去應以事頗異敬如其言治藥既成設五神位各俱飲饌十品如待賓客以享城隍又別列酒食以犒陰兵仍於其家設使者一位於病榻之前服藥食頃臟腑大下得蟲七枚色如紅熬肉而復白長約一寸闊七八分前鋭後方腹下近前有口身之四周有足若魚骨細若針尖而曲已死試取火焚之以鐵火筋扎刺不能入病頃減後又服一劑得小蟲四個自此遂安今已十年肌體悅澤不復有疾道人後竟不來此方傳之樞密之孫韶州使君希道蠟杏湯出醫學切問治遠年近日勞疾柴胡桔梗甘草各一錢老鼠刺根黃芩茴香炒罌粟殼去蒂根蜜炙胡椒各二錢烏梅黃蠟杏仁款冬花各一錢上以新瓦瓶盛水三四碗安藥在內密封慢火煨熟睡至四更暖服一盞吃盡用好酒三四碗再煨滓服亦如前婦人加當歸男子加人參吐血加阿膠北五味子再生丹治一切勞證黃瘦虛損諸藥不能治者此藥大效沉香八錢半木香五錢檳榔五錢大茴香一兩鹽炒小茴香一兩鹽炒木通穿山甲一兩酥炒全蠍一兩微炒通草一兩燈草五錢頭紅花二錢半上為細末甘草膏子為丸如梧桐子大每服三四十丸酒鹽湯空心服乾物壓之雄麝丸出直指方治勞瘵殺瘵蟲下惡物雄黃雌黃青黛干代赭石煅醋淬硃砂細研各三錢半大蝦蟆一個酒炙黃安息香阿魏酒浸研用各二錢男子天靈蓋酥炙黃二錢麝半錢川巴豆肉肥者十粒略去油上為細末軟硬飯頭揉和杵丸如桐子大每二十粒桃仁四十個去皮研煎湯月初五更空心下治瘦出本草用牛肝醋煮食之又方出本草治遠年近日勞疾取雄貓兒腦髓眼睛生用酒浸服其勞蟲便從鼻出一方黑貓生取肝曬乾為末月首五更空心酒調服或酒浸服能殺瘵蟲治男子婦人骨蒸勞瘵憎寒發熱出經效良方青蒿春夏用葉秋冬用子不用葉用根不用子用莖四者相代必用童子小便浸過或有功無毒只一握大鱉甲醋炙白朮煨地骨皮白茯苓桑白皮粉草炙楝參栝蔞實北柴胡去蘆上為末每服三錢水一盞薑三片煎服清骨散出經效良方治男子婦人五心煩熱欲成勞瘵北柴胡七錢半赤茯苓用一兩人參防風去蘆熟地黃秦艽各一兩生地黃用一兩胡黃連半兩薄荷葉七錢半上羅勻每服四錢水一盞煎七分溫服患骨熱者先服荊蓬煎丸一服使臟腑微利然後服此蠟煎散出醫學切問治一切勞