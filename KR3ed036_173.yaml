body:
  text: 卷一百七十三積聚門久積症癖附論症之為病雖有形證推之不動癖之為病僻在脅肋按之水鳴此皆飲食留滯所致也不即治日漸增長盤結牢固邪氣日盛令人正氣衰微纍歲不已甚則身瘦腹大名曰久積症癖方五石烏頭丸治男子女人百病虛弱勞冷宿寒久癖及癥瘕積聚或嘔逆不下食並風濕諸病無不治之鐘乳石硫黃礬石紫金英一作紫石英赤石脂枳實甘草白朮紫菀山茱萸防風白薇桔梗天雄皂莢細辛蓯蓉人參附子去皮藜蘆一兩六銖麥門冬乾薑蜀椒吳茱萸桂心各二兩半烏頭三兩厚朴遠志茯苓各一兩半當歸二兩棗膏五合乾地黃一兩十八銖上為末煉蜜和搗五千杵丸如梧桐子大酒服十丸日三稍加之夾食丸一名丁香丸出聖濟總録治症癖食氣食勞五隔痰逆並夾食血氣疼痛乳香別研如粉木香丁香肉豆蔻去殼當歸切焙青橘皮去白焙京三稜炮銼各半兩紫菀去苗土乾薑炮細銼附子炮裂去皮臍巴豆去皮心別研紙裹壓去油各一兩鱉甲去裙襴用醋蘸慢火炙令黃色二兩丹砂一分別研如粉上除乳香丹砂巴豆外搗羅為末然後將乳香等三味同研令勻都入臼中用蕎麥麵與藥末臨時以意看多少加面徐徐入新汲水搗候可丸即止丸如緑豆大煎淡漿水令沸旋旋入藥煮三五沸漉出於日中曝乾每服五丸食後用茶酒溫水下要轉時只以冷茶下熱茶投即行也紫金丹出聖濟總録治男子婦人久氣塊症癖兩脅下積冷胸腹氣刺痛鐵滓一斤淘淨控干硇砂二兩硫黃半斤水飛過上三味先取鐵滓硫黃二味於瓷器內用米醋一斗慢火煎候硫黃火上無焰即爆干刮此二味入瓷盒內固濟了用大火煅三度畢取盒納藥再用水飛不用鐵滓控硫黃令乾入細瓷盒內坐在平地別用火一稱煅至火盡取出入硇砂二兩同研令細再入盒內用火一斤就灰池中養三日放冷取二兩再入下項藥硇砂半兩木香末丁香末膩粉丹砂研肉豆蔻去殼末乾漆炒煙盡研胡椒末阿魏用醋化面和作餅子燒熟為末各一錢砒霜末一字半上一十味研細再同硫黃研勻用酒醋鍾半煎五靈脂薄麵糊和丸如梧桐子大每服從五丸漸加至二十丸以意加減服若取積滯症癖及酒食積急氣冷氣一切滯氣等疾更入後藥巴豆仁研一兩大戟末半兩芫花末半兩草烏頭一分五靈脂末一兩膩粉二錢硇砂研半兩上七味以米釅醋二升已來入銚子內熬成膏便與前藥末搗為丸如梧桐子大量虛實加減一方加用醋湯或茶清下礞石丸出華他中藏經方治男子婦人遠年積氣消磨症塊取虛中積脅肋堅硬心腹刺痛及治脾積滯氣酒食所傷飲食不化噁心嘔逆胸膈不快不思飲食胸腹脹滿臍脅有塊心脾冷痛口吐酸水停飲冷痰痃癖癥瘕發痛無度翻胃轉食面黃瘦乏四肢頭面浮腫臟腑不調裡急後重及十隔氣虛中有積婦人血氣塊硬悉皆主之礞石半兩青色者生用搗羅為細末硇砂丁香桂去粗皮乾薑炮各二兩木香京三稜煨銼蓬莪朮煨銼芫花醋浸一宿炒黃檳榔煨銼為末豬牙皂莢去皮炙肉豆蔻仁各一兩白豆蔻仁青橘皮湯浸去白焙墨燒八分熱各半兩巴豆一兩半去皮心膜出油盡胡椒一分大黃一兩半半兩生用半兩煨熟半兩炒焦粉霜細研一分上為末用醋三升飛硇砂於銀石器中文武火熬二十沸次入巴豆又熬五七沸次入礞石京三稜末又熬三五沸次取白麵二兩以無灰酒半升調入藥中又熬一兩沸次入大黃末又熬三兩沸次下諸藥末不住用柳木杖子攪勻候稠搗千杵丸如緑豆大每服三丸不問男女長幼心痛醋湯下左脅下疼煎薑棗湯下右脅下疼煎木香湯下婦人血癖血氣炒生薑醋湯下久患冷痢煎黃連湯下小兒常服冷水下有妊者不得服小兒以意減丸數陳橘皮煎丸出聖濟總録治久積冷氣攻心腹疼痛痰癖嘔逆腹脹滿不思飲食肌膚瘦瘁腰膝倦痛下痢泄瀉瘧疾腸風並婦人血海久冷無子陳橘皮湯浸去白焙十五兩別搗羅為末巴戟天去心石斛去根牛膝酒浸切焙肉蓯蓉酒浸切焙鹿茸去毛酒炙杜仲去粗皮炙銼菟絲子酒浸三日別搗焙附子炮裂去皮臍陽起石酒浸研如粉厚朴去粗皮生薑汁炙吳茱萸湯洗焙乾炒甘草炙銼一兩當歸切焙乾薑炮京三稜煨銼萆薢各三兩上為末先以好酒五碗於銀石器內煎橘皮末令如餳入諸藥攪勻再搗三五百杵稍干更入酒少許和丸如小豆大每服二十丸至三十丸空心溫酒下鹽湯下亦得治一切塊癖積氣血聚等一二十年疾細墨半兩燒芫花醋浸炒焦赤青礞石大戟乾漆炒五靈脂京三稜蓬莪朮密陀僧陳皮牡蠣各半兩巴豆一兩去皮濕紙三四重裹燒紙焦止大棗十四個去核白丁香硇砂研虻蟲去翅足斑蝥去翅頭各一分上為細末酒醋煮糊為餅子每服十餅用煮麵湯送下宜食前服溫白丸出鮑氏方治心腹積聚久症癖塊腹脹心下堅結大如杯碗傍攻兩脅心痛積年食不消化等病並治之紫菀淨洗二分吳茱萸二分淨擇鹽水洗過菖蒲一分去蘆米泔浸過一宿水洗過柴胡二分去蘆頭水洗過厚朴去皮生薑自然汁浸炙香熟桔梗皂莢去皮尖子茯苓各二分桂心三分生用乾薑炮黃連各二分蜀椒三分用紙親於銚內出汗去根枝用巴豆去皮了稱二分用麩炒令麩稍焦為度爛研巴豆以紙裹壓出油如此三度換新紙然後入衆藥人參三分本方二分烏頭十分炮裂後掘地坑內之用盞子蓋一饌間卻出烏頭去尖皮再切用上搗篩以白蜜和更搗二千杵丸如梧子大有病服一丸至二丸不知稍增至三丸五丸以知為度主心腹積聚久症癖塊大如杯碗黃疸宿食朝起嘔吐支滿上氣時時腹脹心下堅結上來搶心傍攻兩脅徹背連胸痛無常處繞臍攪痛狀如蟲咬又療十種水病八種痞塞反胃吐逆飲食噎塞五淋九種心痛積年食不消化或婦人諸疾斷緒不生帶下淋瀝或痎瘧連年不瘥又療一切諸風身體頑痹不知痛癢或半身不遂或疼痛或眉發墮落又療七十二種風三十六種遁尸及尸疰或癲癇或婦人五邪失心夢與鬼神交通四肢沉重不能飲食昏昏默默只欲取死終日憂愁心中不樂或恐懼悲啼飲食無味月水不調直似懷孕連年纍月羸瘦疲困遂至於死或歌或哭為鬼所亂莫之知也但服此藥者莫不除愈臣知方驗便合藥與婦人服之十日下出症癖蟲長二尺五寸三十枚下膿二升黑血一升青黃汁五升所苦悉除當月有子臣兄墮馬被傷腹內有積血天陰即發羸瘦異常命在旦夕與藥服下如雞肝黑血如手者二百餘片白膿二升赤黃水一升其病即除臣知方驗敢不獻上忌生冷酢滑豬雞魚犬牛馬鵝肉五辛油麵豆糯米陳臭等物一方無肉桂用生薑湯下木香丸出聖濟總録治遠年症塊積聚木香硇砂研當歸切炒各一兩礞石研三錢大黃煨銼陳曲不蚛者炒麥糵炒墨研白麵各半兩大戟炒乾漆炒煙出膩粉各一分豉少許巴豆仁一錢一分不出油研上為末以臘月雪水同搗三二百杵丸如緑豆大每服一丸空心用乾柿爛嚼裹藥隨所傷物煎湯下不得吐津鱉甲丸出聖濟總録治久積癥瘕癥瘕附論夫癥瘕者皆由寒溫不調飲食不化與臟氣相搏結所生也其病不動者直名為症若病雖有結瘕而可推移者名為癥瘕瘕者假也謂虛假可動也候其人發語聲嘶中滿濁而後語乏氣拖舌語而不出此人食結在腹其病寒口中常有水出四體灑灑常如發瘧飲食不能常自鬱郁而痛此食症病也診其脈沉而中散者寒食症也脈弦緊而細症也若在心下則寸口脈弦緊在胃管則關上弦緊在臍下則尺中弦緊診症脈法左手脈橫症在左右手脈橫症在右又脈頭大在上頭小在下脈來遲而牢者為病症也腎脈小急肝脈小急心脈若鼓皆為瘕寸口脈結者癥瘕脈弦而伏者腹中有症不可轉動必死不治三因方云癥瘕積聚隨氣血以分門故方云以癥瘕屬肝部積聚屬肺部不亦明矣況七者火數屬心蓋血生於心八者木數屬肝蓋血歸於肝雖曰強分理侶不混夫症者堅也堅則難破瘕者假也假物成形然七症八瘕之名經論亦不詳出雖有蛟龍蛇鱉肉發風米等七證初非定名偶因食物相感而致患耳若婦人七症八瘕則由內外不內外因動傷五臟氣血而成古人將婦人病痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血病龍蛇魚鱉等名皆出偶然但飲食間誤中之留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹有一物其狀如魚即生瘕也與夫宿血停凝結為坯塊雖內外所感之不同治法當以類相從所謂醫者意也如敗梳治風瘕銅屑治龍瘕曲糵治米瘕石灰治發瘕如此等類方論至多不復繁引學者可以理解方硇砂丸治乾血氣癥瘕氣塊黃瘦臍肚痛不忍硇砂三錢全蠍二錢丁香二錢蓬朮半兩三稜半兩沒藥半兩芫青二錢紅娘子二錢虻蟲二錢水蛭二錢炒阿魏半兩乾漆四錢炒地膽半兩炒斑蝥二錢炒海馬一對酥醋炒甘草半兩人參半兩當歸一兩狗脊半兩穿山甲三錢蛤粉炒麝香少許上為細末醋糊為丸梧桐子大每服二三十丸空心醋湯送下如意丸治積聚塊痛疝瘕症癖等疾沉香木香大丁香蓽澄茄使君子辣桂川白薑桃仁炒五靈脂炒硇砂醋浸半日雄黃沒藥大戟牽牛炒取末巴豆去油各一分荊三稜末蓬莪朮肉豆蔻炮各半兩上為末水煮麵糊丸麻子大每服二丸加至三丸止溫酒下化症丸治丈夫婦人小兒年深日近沉積瘕塊面色青黃時上搶心吐水吞酸舌生白沫婦人積年月經不調漸成血塊或血蠱中焦之間覆如杯碗連年纍月漸至瘦瘠寒熱往來一切脾胃受寒久不痊愈之疾並皆治之巴豆五兩丁皮二兩木香一兩半蓬莪朮三兩醋煮透荊三稜三兩丁香一兩半厚朴三兩制石菖蒲二兩良薑一兩半虻蟲一兩半川牛膝一兩石蓮子取肉二兩意苡仁一兩使君子三兩去殼香附子四兩炒上為細末稀麵糊為丸如緑豆大積年癥瘕成塊第一服用熟水下二十丸自後每日三丸更量虛實加減五日去盡積塊日近脾胃有積者每服五丸飯飲吞下婦人血氣成塊及血瘕每服二十丸蘇木同酒童子小便各一半煎五七沸溫酒空心吞下自後每日用溫酒下三丸其血塊逐漸消失從大小二便去盡自知小兒蛔蟲腹痛不能忍日夜叫喚橘皮湯下七丸諸蟲皆宜下常服白湯或薑湯下三五丸中酒及酒積大便鮓臭者白湯舊酒各半吞下七丸一切噫塞心下硬痛加棗湯下五丸不拘時候大黃丸治久積癥瘕發動心腹疼痛不可忍大黃二兩銼碎微炒雄黃半兩細研麝香二錢細研天雄一兩炮裂去皮臍硃砂一分細研胡椒半兩巴豆十四枚去皮心炒令黃研以紙裹壓去油檳榔四兩當歸一兩銼微炒桂心一兩木香半兩京三稜二兩微煨銼犀角屑一兩乾薑半兩炮上件藥為末入研了藥令勻煉蜜和搗三二百杵丸如小豆大每服空心以酒粥飲下七丸防葵丸治癥瘕喘嗽腹中㽱痛吃食減少四肢乏力防葵三分桂心半兩木香半兩桔梗三分去蘆頭吳茱萸半兩湯浸七遍焙乾微炒鱉甲一兩半塗醋炙令黃去裙襴川大黃一兩銼碎微炒京三稜三分微煨銼當歸半兩銼微炒赤芍藥三分五味子半兩檳榔一兩半郁李仁一兩湯浸去皮微炒上件藥為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下二十丸三聖丸治積年癥瘕癖塊諸藥療治不瘥至效舶上硫黃一兩水銀半兩硇砂一分上三物乳鉢內研如粉卻以生鐵鍋內用文武火熬熔成汁以火箸攪令勻停冷刀劃下以紙裹置地坑內埋一宿取出再研細次以赤芍藥當歸京三稜蓬莪朮紅花各一分並細銼以法酒一升煎及一半漉出砂盆內研生布袋取汁再熬放冷入飛羅面為糊搗丸如緑豆大治因産後傷於飲食結伏在腹脅時發疼痛不可忍者當歸酒浸一升每服磨癖塊空心溫酒下三丸至五丸所有藥渣瀝了焙乾為末別入乾地黃半兩真蒲黃芫花各一兩微炒焦黃上為末以前一般糊丸如緑豆大治婦人血臟冷氣攻心疼一切血疾溫酒服十丸木香丸治癥瘕心腹脹痛胸膈煩悶不欲飲食四肢少力木香三分肉桂三分去皴皮砒霜一分大戟一分半銼碎炒微黃京三稜半兩微煨銼附子半兩焙乾薑半兩炮乾漆半兩搗碎炒令煙出膩粉一分青橘皮半兩湯浸去白瓤焙巴豆半兩去皮心研紙裹壓去油上件藥為末入膩粉巴豆更研令勻用軟粳米飯和丸如小豆大每服空心以粥飲下三丸硇砂丸出聖惠方治癥瘕腹內疼痛硇砂一兩細研鱉甲一兩塗醋炙令黃去裙襴川大黃一兩銼碎微炒木香三分肉桂三分去皴皮附子三分巴豆半兩去皮心研紙裹壓去油檳榔三分京三稜二兩微煨銼乾薑三分炮皂莢五梃不蚛者捶碎以醋浸兩宿挼絞取汁熬為膏上件藥為末入研了藥令勻以皂莢膏和丸如緑豆大每服空心以生薑湯下三丸京三稜散治癥瘕氣腹脹痛京三稜一兩微煨銼柴胡三分去苗桔梗一兩去蘆頭木通一兩銼當歸三分銼微炒赤茯苓三分赤芍藥半兩陳橘皮半兩湯浸去白瓤焙鱉甲半兩塗醋炙令黃去裙襴郁李仁三分湯浸去皮微炒上件藥為散每服三錢以水一中盞入生薑半分煎至五分去滓溫服日三四服鱉甲丸治癥瘕或寒或熱羸瘦不欲飲食鱉甲一兩塗醋炙令黃去裙襴桑耳二兩吳茱萸三分龜甲一兩附子半兩炮防葵三分白朮半兩川大黃一兩銼碎微炒京三稜一兩微煨銼上件藥為末煉蜜和搗三二百杵丸如梧桐子大每服以溫酒下二十丸日三服大通丸治癥瘕神效川烏頭二兩炮裂去皮臍砒黃一分細研芫花一兩醋拌炒令黃巴豆一兩去皮心研紙裹壓去油杏仁一兩半麝香一錢細研黃丹一分炒令紫色豬牙皂莢一兩去黑皮塗酥炙令焦黃去子自然銅一兩細研別用上件藥為末入研了藥令勻用黑豆麵和丸如緑豆大以研了自然銅末滾過每服空心煎生薑橘皮湯下三丸玄胡丸出濟生拔萃方解化傷滯內消飲食治吐利腹脹心腹刺痛癥瘕結氣蟲煩不安調順三焦安和脾胃玄胡當歸青皮去白雄黃飛蓬莪朮紙包煨檳榔木香各四兩荊三稜六兩上為細末入雄黃勻水麵糊為丸如梧桐子大每服三十丸生薑湯下不拘時候三稜湯出宣明論治癥瘕痃癖積聚不散堅滿痞膈食不下腹脹荊三稜二兩白朮一兩蓬莪朮半兩當歸半兩焙檳榔木香三錢上為末每服三錢沸湯點服食後一日三服薑湯調服亦可頂珠丸治積氣塊痛年久脾積癖瘕之疾丁香木香淡豉硇砂醋浸半日並曬乾硃砂研細各一分巴豆去油一錢半上為末陳米飯為丸如梧桐子大輕者一丸重者二丸臨臥先嚼煨薑如指許咽下次以冷熟水吞藥不得嚼破上項一丸二丸請酌量用芎藭散出聖惠方治癥瘕久不瘥令人不能食羸瘦少力芎藭一兩桂心一兩鱉甲二兩塗醋炙令黃去裙襴川大黃二兩銼碎微炒檳榔一兩京三稜一兩微炒上件藥為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服日三四服治癥瘕不消宜服此方出聖惠方川大黃三兩銼碎微炒鱉甲二兩塗醋炙令黃去裙襴檳榔二兩桃仁一兩湯浸去皮尖雙仁麩炒微黃枳殼一兩麩炒微黃去瓤上件藥為末用釅醋三升和攪令勻以慢火熬候可丸即丸如梧桐子大每日空心以溫酒下二十丸以通轉為度硝石大丸出三因方治二十癥瘕及婦人帶下絶産無子並欲服寒食散而腹中有癥瘕實者當先服此大丸下之及後與寒食散大丸不下水穀但下病耳不令人困硝石六兩朴硝亦得人參甘草各二兩大黃八兩上為末以三年苦酒三升置銅器中以竹箸拄器中一升作一刻凡三升作三刻以置火上先納大黃常攪不息手使微沸盡一刻乃納余藥又盡一刻餘一刻極微火使可丸如雞子中黃大凡合藥當先齊戒一宿勿令小兒女人奴婢等見之欲下病者用二丸若不能服大丸者可分作小丸然亦不可過四丸也丸欲令大不欲令細能不分為善若人羸者可少與強者可二十日五服和調半日乃下若婦人服之下者或如雞肝或如米汁正赤黑或一升或三升下後慎風冷作一杯粥食之後作羹臛自養如産婦法六月則有子禁生魚豬肉辛菜若寒食散者自如藥法不與此同日一服治癥瘕久不瘥令人不食羸瘦少力鱉甲三兩塗醋炙令黃去裙襴京三稜三兩微煨銼桃仁二百枚湯浸去皮尖雙仁以水三升生研濾取汁上件藥鱉甲三稜為末先將桃仁水入鐺中煎三五沸次下藥末同煎至一升漸漸入酒二升熬如餳收瓷盒中每於食前以溫酒調下一匙治癥瘕方上用槲樹白皮煎令可丸服後知病動若下減之療癥瘕久痼冷病上以雄雀屎蜜和丸飲服或和少乾薑服之大肥悅人療破癥瘕痎瘧並治五痔陰蝕濕疸女子陰隱瘡及骨節中寒熱上以鱉甲水煮作浴漬之甚良積氣丹治一切新久沉積氣塊面黃黑瘦有氣無力癥瘕積聚口吐酸水檳榔二枚芫花一兩荊三稜雞爪黃連牛膝章柳根各一兩青皮去白陳皮石菖蒲各三錢巴豆生木香各二錢半大戟川大黃甘遂白牽牛乾薑炮青礞石乾漆各半兩蓬莪朮一兩硇砂二錢肉豆蔻二枚上為末醋麵糊丸如梧子大每服一丸臨臥燒棗湯下每夜一丸有積者肚內作聲病退為度玄胡丸治消積聚癥瘕解中外諸邪所傷玄胡青皮去白陳皮去白當歸木香雄黃別研荊三稜生薑各一兩上為末酒麵糊為丸如小豆大每服五七丸生薑湯下一握七丸治臟腑宿蘊風冷氣血不和停滯宿飲結為癥瘕坯塊及婦人血瘕腸胃中寒飲食不下咳逆脹滿及下痢赤白霍亂轉筋及痿躄拳攣腳膝疼痛行步不能常服健脾暖胃堅骨強陽神麯半斤炒黃大附子二隻炮去皮臍甘草二兩炙上為末煉蜜丸每左手一握分作七丸細嚼米飲下如神木香丸治穀氣聚結癥瘕胸脅悶痛或吐酸水食後噫作生熟氣腹脹泄瀉及四肢浮腫木香硇砂滴淋控干蓬朮炮胡椒半夏漿水煮乾漆炒大煙盡各半兩縮砂仁桂心青皮各三兩附子炮去皮臍三稜各一兩白薑炮一兩上為末蜜丸如梧子大每服三五十丸生薑橘皮湯下空心服乾柿丸治多年積聚氣塊癥瘕取宿食硇砂研砒霜粉霜乾漆燒煙出鱉甲去裙襴醋炙黃連去須各一分旋覆花炒京三稜炮各半兩杏仁去皮尖雙仁麩炒乾薑炮各一兩皂莢四梃不蚛者去皮酥炙巴豆四十九粒去皮心膜去油上為細末先將乾漆鱉甲京三稜三味用粟米一盞不淘洗以釅醋五升同熬成粥入衆藥拌和丸如豌豆大每服三丸爛嚼干柿裹藥臨臥溫酒下黑神丸消化癥瘕積聚酒食毒及冷氣膨脹五膈噎氣婦人血氣木香一兩官桂二兩附子一兩當歸二兩乾薑二兩細墨一兩白朮二兩荊三稜二兩陳橘皮四兩去白芫花四兩以醋炒巴豆二兩以好醋煮數沸焙乾炒檳榔三兩硇砂半兩入面煮糊大黃半兩入面煮糊上一十四味杵為末用醋麵糊為丸如麻子大如常服化酒食茶湯下三五丸醋心腹脹橘皮湯下治症塊生薑湯下婦人血氣紅花酒下取多年厭食乾柿裹十丸生薑湯下臨臥服順氣丸治積聚癥瘕積年氣塊發則大腸閉得通利則病蘇閉則復作大黃五兩半生半熟車前子檳榔麻仁炒牛膝酒浸郁李仁湯去皮菟絲子酒浸蒸山藥各二兩山茱萸防風枳殼獨活各一兩上為末蜜丸如梧桐子大茶酒米湯任下此藥補益通利疏風順氣治癥瘕癖氣痞積聚冷氣血塊宿食吐痰水出永類鈐方用青黑大巴豆勿令白膜破但去其殼分作兩片清麻油略潤之空心溫水吞下一枚以飲壓之少時腹內如火利出惡物雖利不虛人若久服亦不利膜破者不用而兩頭尖如棗核者名剛子能殺人治癥瘕積聚去三尸益氣延年卻老上雄黃二兩細研為末九度水飛過卻入新淨竹筒內盛以蒸餅子一塊塞筒口蒸七度用好粉脂一兩為丸如緑豆大日三服酒下七丸十丸療癥瘕出本草上羊脂同蒜齏食一升良治腹內癥瘕出本草上取鮀魚甲炙浸酒服之治癥瘕積聚去三尸輕身益氣延年卻老百病不侵甚益人出本草上用天門冬不計多少去心皮為末每服方寸匕日三四服以酒飲之不絶治瘕出本草上用扁豆葉和醋煮服之治雞瘕出本草以紫蘇一升煮服昔南齊褚澄善醫為吳郡太守百姓李道念以公事到郡澄見謂曰汝有重病答曰舊有冷病至今五年衆醫不瘥澄為診曰汝病非冷非熱當是食白煮雞子過多所致令取紫蘇一升煮服乃吐一物如升涎裹之能動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如嚮者雞十三頭而病都瘥當時稱妙一説乃是用蒜煮服之治癥瘕氣塊琥珀一兩味甘平鱉甲一兩鹹平惡礬石荊三稜一兩味苦平延胡索半兩味辛溫沒藥半兩味苦平大黃六錢味苦大寒上六味一處為末空心酒調服三錢匕每日二服神效莫及治癥瘕腰痛用淡菜先煮熟漉出除去半邊鎖殼及毛了將汁澄清再將淡菜半邊殼肉入內卻入蘿蔔或紫蘇冬瓜同煮食之妙治癥瘕用魚脂二升盛銅器中作大火炷脂上然之令暖徹於症上尉之以紙藉腹上晝夜勿息火良治蛟龍病誤食蛟龍子入腹中堅痞如石用寒食餳三升每服五合一日三服遂吐出蛟龍有兩頭及尾寒食餳即寒食節日餳者是也昔開皇六年有人正月食芹得之其病發似癇面色青黃服寒食餳二升日三吐出蛟龍有兩頭大驗諸症附論積氣在腹中久不瘥牢固推之不移者症也此由寒溫失宜飲食不節致臟腑氣虛弱飲食不消按之其狀如杯盤牢結久不已令人身瘦而腹大至死不消診其脈弦而伏其堅不轉動者死之候也方蜥蠍丸出千金方治症堅水腫蜚尸遁尸百注尸注骨血相注惡氣鬼忤蠱毒邪氣往來夢寤存忘留飲結積虎狼所齧猘犬所咋鴆毒入人五臟服藥已消殺其毒食不消婦人邪鬼忤亦能遣之蜥蜴蜈蚣各二枚地膽五十枚蟅蟲虻蟲杏仁各二三十枚蜣螂十四枚朴硝巴豆各一兩十八銖款冬花犀角切片桃奴澤漆桑赤雞鬼督郵各十一銖芍藥虎骨各一兩半甘草乾薑各一兩甘遂一兩六銖上為末別治巴豆杏仁如膏納藥末研調下蜜搗二萬杵丸如麻子先食飲服三丸日一不知加之不敢吐下者一丸日一服有人風冷注癖堅二十年者得瘥乾漆丸出聖濟總録破症塊消積氣乾漆四兩搗為末炒令煙盡茴香子炒令香木香檳榔結實者銼桂去粗皮附子炮青橘皮去白炒陳橘皮去白炒白牽牛炒令香熟大黃擘開錦紋者炒蓬莪朮炮銼京三稜用醋紙裹煨銼芫花米醋浸一宿炒乾用各二兩五靈脂用瓶子盛地坑子內以火煅令煙盡取灰五二兩皂角長五寸上為末煉蜜和丸如梧桐子大每服生薑湯下二十丸至三十丸忌豬魚熱面等物半夏礞石丸出聖濟總録治症塊氣積下結胸一切積滯半夏四十枚湯洗七遍巴豆四十粒去皮心膜杏仁去皮尖雙仁四十枚豬牙皂莢去皮四十梃四味用好醋浸七日取出以布絞汁熬成膏入衆藥礞石研丁香木香沉香各二錢檳榔半兩膩粉硇砂粉霜各一分上將後八味搗研為末入在前膏子內一處再搗約令勻丸小豆大看虛實煎棗湯下二丸爛嚼乾柿乾咽下亦得硇砂丸出聖惠方治症病不消四肢羸困不欲飲食久不瘥硇砂一兩細研硫黃一兩細研水飛過木香半兩檳榔一兩川大黃三兩銼碎微炒牽牛子一三兩微炒吳茱萸半兩湯浸七遍焙乾微炒京三稜一兩微煨銼當歸一兩銼微炒肉桂一兩去粗皮青橘皮一兩湯浸去白瓤焙鱉甲一兩塗醋炙令黃去裙襴上件藥為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每日空心及晚食前以溫酒下三十丸巴豆丸出聖惠方治症病久不消令人萎黃羸瘦不欲飲食巴豆一兩去皮心研紙裹壓去油硫黃細研附子炮裂去皮臍五靈脂乾薑炮裂銼木香丁香肉豆蔻去殼檳榔硇砂細研乾漆搗碎炒令煙出以上各半兩上件藥為末入諸藥研令勻以麵糊和丸如黃米大每服空心以醋湯下五丸得轉下惡物為效大黃丸出聖惠方治症病心腹妨悶不欲飲食四肢不和川大黃半兩銼碎微炒木香半兩肉豆蔻半兩去殼硇砂半兩細研乾薑半兩炮裂銼青橘皮三分湯浸去白瓤焙吳茱萸一兩湯浸七遍焙乾微炒檳榔半兩桂心半兩蓬莪朮一兩巴豆一分去皮心研紙裹壓去油上為末入巴豆硇砂研令勻以醋熬成膏和丸如梧桐子大每服空心以粥飲下三丸鱉甲丸出聖濟總録治症塊衝心氣滿食不下胸膈煩悶鱉甲去裙襴醋蘸炙黃色訶黎勒微煨去核各二兩防葵甘草炙銼人參大黃銼炒各一兩半白朮郁李仁去皮別研桂去粗皮杏仁去皮尖雙仁熬熟別研如膏各一兩上除研外搗羅為末入郁李仁杏仁同研勻煉蜜丸如梧桐子大空腹溫酒下二十丸漸加至三十丸以微利為度沒藥丸出聖濟總録治症積五積食氣諸藥無效者沒藥硫黃白丁香生當歸切焙芫花醋浸半日炒硇砂通明者研乳香研丹砂研各一兩巴豆四十九粒去皮心不出油研上為末合研勻用水浸炊餅和劑搗一千杵丸如梧桐子及大豆麻子三等大每服一丸婦人血氣童子小便和酒下心頭高硬當歸酒下遠年症積五積食氣生薑湯下小兒脾積症氣臘茶清下大人與大丸十五以下與中等十歲以下與第三等者服取積一塊氣丸治男子婦人氣積牽牛末二兩檳榔末一兩杏仁末一兩羌活末一兩神麯半兩麥糵半兩雷丸肉半兩江子一兩去油皮四錢淨黃芩一兩上為細末湯浸蒸餅丸如梧桐子大硃砂為衣每服三歲服三丸五歲服五丸大人服十丸快利為度臨睡溫水服烏頭丸出聖惠方治食不消結成症病川烏頭半兩京三稜半兩微煨銼芫花半兩醋拌炒令乾巴豆半兩去皮心研紙裹壓去油硇砂湯化硝石半兩川大黃半兩銼青橘皮半兩湯浸去白瓤焙上件藥搗羅為末入巴豆研令勻以酒一升醋二升相和以慢火煎如稀餳即住火後用丁香一分木香一分肉豆蔻半兩搗羅為末硃砂一分細研與前藥同和丸如緑豆大每日早晨以生薑橘皮湯下三丸臨臥時再服京三稜丸出聖惠方治症病結硬心腹疼痛京三稜一兩半微煨銼檳榔一兩木香一兩乾薑一兩炮裂銼陳橘皮一兩湯浸去白瓤焙桂心半兩當歸一兩銼微炒巴豆半兩去皮心研用紙裹壓去油上件藥為末用醋熬巴豆成膏入前藥末和丸如梧桐子大每服空心以生薑橘皮湯下五丸當歸煮散出聖濟總録治諸癥結痛起於脅下按之而堅妨痛不能飲食漸加羸瘦當歸切焙鱉甲用醋頻蘸炙令黃色桂皮去粗皮木香桔梗炒桃仁湯浸去皮尖雙仁炒別研如膏各一兩半吳茱萸陳者水淘七遍炒乾半兩上除桃仁外搗羅為末入桃仁同研令勻每服三錢水一盞煎至六分去滓溫服逐日空服日午夜半各一服保命丸出聖濟總録治積年血氣症塊往來疼痛吐逆不納飲食當歸切焙烏頭炮裂去皮臍芍藥桂去粗皮各半兩大黃銼炒一兩乾薑半兩炮斑蝥二十一枚用糯米炒令黃色為度去翅足上為末醋煮麵糊丸梧桐子大空心服食前溫酒下一十丸木香扁丸出聖濟總録治症塊消食積止心腹疼木香硇砂通明者各一錢半夏中等者一十枚生薑漿水洗七遍桂去粗皮三錢蓽茇四十九粒中等者巴豆二十一粒去皮心膜出油三二分杏仁二十一粒去皮尖雙仁上為末先將杏仁巴豆同研如泥以好米醋八分一盞熬至二分以下成稠膏入前藥末和勻再入棗肉丸緑豆大捏扁丸常服食後良久一丸生薑湯下要轉三丸男子婦人心痛炒萊蔔醋湯下破積丸療積聚堅症大黃一斤牡蠣三兩熬凝水石石膏石鐘乳理石各一兩上搗合下篩和蜜丸如梧桐子大先食服酒飲任下三丸日三不知稍增之以知為度治腹中積症方出千金方上葶藶子一升炒以酒五升浸七日每服三合日三服粉砂餅出聖濟總録治症塊粉霜胡粉各一兩硇砂丹砂白丁香膩粉各半兩上件研為末入面一兩水和捏作餅如棋子大慢火燒熟每服一餅麝香米飲嚼破服五靈脂丸出聖惠方治症病腹中結硬五靈脂一兩防葵半兩桂心半兩豬牙皂莢半兩去黑皮塗酥炙令黃焦去子巴豆半兩和皮麩炒令黑去皮膜心研爛紙裹壓去油木香半兩上件藥為末入巴豆更研令勻用醋煮麵糊和丸如黍米大每服空心及臨臥時以生薑酒下三丸木香丸出聖濟總録治積年症塊血氣凝滯吳茱萸陳者淘七遍炒乾木香青橘皮去白焙各半兩巴豆去皮九十粒研如膏紙裹壓去油硇砂用沸湯化於瓷碗中用慢火熬水盡收霜再研一分上除硇砂外搗羅為末入巴豆硇砂研令勻於煻火中煨粟米飯丸緑豆大每服溫酒下三丸至五丸食後服溏泄即瘥老小減服硃砂丸出聖惠方治症病腹中硬痛不欲飲食經久不瘥羸弱無力硃砂一兩細研水飛過肉桂一兩去皴皮為末巴豆二十枚去皮心研紙裹壓去油禹餘糧一兩燒醋淬三遍細研紫石英一兩細研水飛過上件藥都研令勻以湯浸蒸餅和丸如緑豆大每服食前以溫酒下五丸治積年症塊及血塊方出聖惠方砒霜粉霜各一分硇砂一分半膩粉三錢上件藥細研令勻用肥棗去核入藥在棗裡面以線系定用白麵餅子逐個裹燒熟餅子為度取出去棗皮研熟丸如緑豆大每服空心及臨臥時以薑棗湯下三丸治症病腹中結硬出聖惠方硫黃一兩細研硇砂一兩細研巴豆一兩附子一兩炮裂去皮臍搗為末上件藥先用頭醋二升煮巴豆令赤色即出之卻入冷水碗中浸兩炊久洗淨去皮心研如粉又以醋二升與巴豆末同煎至一升後下硫黃硇砂附子等末以文火熬令稀稠得所別入乾薑末一兩和黍米大每服空心以生薑棗湯下三丸夜臨臥時再服續隨子丸出聖濟總録治積聚症塊及涎積等續隨子三十枚去皮膩粉二錢青黛炒一錢匕研上先研續隨子令爛次下二味合研勻細以燒糯米軟飯和丸如雞頭子大每服先燒大棗一枚剝去皮核爛嚼取藥一丸椎破並棗同用冷臘茶清下服後便臥並不按攪至中夜後取下積聚惡物為效治症堅心下有物大如杯不得食食則腹滿心腹絞痛方葶藶子大黃各二兩澤漆四兩上二味別研葶藶為膏入蜜搗千杵和丸如梧桐子大每服五丸不知加之日三服治兩脅下有氣結者狼毒二兩旋覆花一兩附子二兩炮上搗篩蜜和丸如梧桐子大服二丸稍加至三丸服之療症病丸射罔二兩熬蜀椒三百枚去目炒出汗上搗末細篩以雞子白和丸半如麻子大半如赤小豆先服如麻子漸服如赤小豆二丸不知稍增之以知為度尉症方灶中黃土一斤生葫一斤上先搗葫熟納土復搗以好苦酒澆冷浥浥先以塗布一面仍㩉病上又塗布上干復易之取令消止一方有桂尉症方上以吳茱萸三升碎之酒和煮熱布裹以尉症上冷更炒更番用之症移走逐尉都消乃止也肘後方云亦可用射罔五兩茱萸末以雞子白和塗症上尉症法上銅器受二升許貯魚膏令深二三寸作大火炷六七枚燃之令膏暖重紙覆症上以器尉之晝夜勿息膏盡更益也凡症堅之起多以漸生而有覺便牢大者自難療也腹中微有結積便害飲食轉羸瘦療多用陷水玉壺八毒諸大藥今止取小小易得者方上取虎杖根勿令影臨水上者可得石余淨洗干之搗作末以秫米五升炊飯內攪之好酒五升漬封藥消飯浮可飲一斤半勿食他魚鹽症當出亦可但取其根一升干搗千杵酒漬飲之從少起日三亦佳此酒療症乃勝諸大藥又方大黃半斤朴硝三兩蜜一斤上合於湯上煎可丸如梧桐子大服十丸日三備急文仲崔氏同惟崔氏用朴硝半斤蜜一斤半服二十丸日再服破症散治心腹宿症及猝得症並治久積症癖不瘥漸至羸弱宜服此方上以硃砂細研搜飯令朱多以雄雞一隻先餓二日後以朱飯飼之卻置雞於板上收取糞曝燥為末溫清酒服五分匕可至方寸匕日三服若病困急者晝夜可五六服一雞少更飼余雞取足雞未食朱飯先飼令肥治症積滿腹諸藥不瘥者人屎服之血片塊皆下二十日即盡也椒尉方治患癥結病及病目瓜形日月形或在臍傍左右或在臍上下或若鱉在左右肋下或當心如盒子大法先針其足以椒尉之上取一新盆子受一斗者底鑽一百二十孔孔上著椒三合上著一重紙紙上著冷灰上著熱灰半升上著剛炭火一斤經一食頃盆底熱徹當病上初安氈一重即安火盆火盆大熱以漸更加一重若火更熱不可忍加至三重暫歇進一口冷飲還上火硝二分許即停止經三日勿著及至七日覺得稍瘥然後食美食自補若小不瘥作露宿丸服之保安丸治症積心腹內結如拳漸上不止搶心疼痛久不止及繞臍腹痛不可忍者川大黃三兩新水浸一宿蒸熟切作片子焙乾薑一兩炮大附子半兩去皮臍鱉甲一兩半上為末取三年米醋一大升先煎四五合然後和藥丸如梧桐子大每服十丸至二十丸空心或醋或酒米飲下積如魚腸膿血爛肉汁青泥當下京三稜湯出聖濟總録治積年症塊京三稜炮銼一兩青橘皮去白焙半兩桂去粗皮一兩大黃銼碎炒半兩木香一分檳榔銼半兩上粗搗篩每服五錢匕水一盞半煎至七分去滓溫服空腹日午夜臥各一服治諸瘕結氣出本草上取赤龍浴水服之此澤間小泉赤蛇在中者經雨取之枳朮湯出衛生寶鑑治心下堅大如盤飲水所作枳實十枚白朮三兩上以水一斗煎至三升分三服腹中軟即稍減之對病增損治癥結出本草上用磨石燒赤熱投酒中飲之暴症附論病源云暴症者由腑臟虛弱食生冷之物臟既虛弱不能消之結聚成塊猝然而起其生無漸名曰暴症也本由臟弱其症暴生至於成病死人則速方蜥蜴丸出聖惠方治暴症堅結四肢瘦瘁身無力蜥蜴一枚微炒蜈蚣一枚微炙鬼臼漢防己各一兩半當歸二兩半銼微炒川大黃二兩半銼碎微炒川芒硝一兩甘草一兩炙微赤銼赤芍藥二兩上件藥為末煉蜜和搗三二百杵丸如梧桐子大不計時候以溫酒下十丸以利為度野葛丸出千金方治猝暴症野葛一尺當歸附子雄黃研細細辛各一兩蜀椒半兩烏頭二兩巴豆一百枚上㕮咀以大醋浸一宿豬膏半斤煎附子色黃去滓納雄黃粉攪至凝敷布上以掩症處復以油重布上復著十重紙以尉斗盛火著其上常令熱日三夜二豬膏干為度巴豆丸出聖惠方治暴症氣攻心腹脹痛不欲飲食巴豆一分去皮心研紙裹壓去油川大黃半兩銼微炒乾薑半兩炮木香半兩蓬莪朮半兩上件藥為末入巴豆同研令勻煉蜜和搗三二百杵丸如小豆大每服空心以生薑湯下五丸治猝暴症腹中有物如石痛如刀刺晝夜啼呼宜服此方出聖惠方上牛膝三斤去苗銼以酒一斗漬密封於熱灰中燒令味出每於食前量力頻服以瘥為度便吐去宿食神效又方出聖惠方上用商陸根不限多少銼搗蒸之以新布裹尉病上冷即換之以衣物覆其上數日用之旦夕勿息又方出聖惠方上蒴藋根二個細銼以酒一斗浸三五日每於食前暖一小盞服之治猝暴症腹中有物出聖惠方上以五月五日葫十斤去皮桂一尺二寸灶中黃土如鴨卵一枚合搗以苦酒和塗以布㩉病不過三次瘥又方出肘後方上取橉木燒為灰淋取汁八升以釀一斛米酒成服之從半合始不知稍稍增至一二升不盡一劑皆愈此灰入染絳用葉中釀酒也又方出聖惠方上以蠶砂一斗桑柴燒灰一斗以水淋之五度取生鱉長一尺者納中煮之爛熟去骨細擘銼更煎令可丸丸如梧桐子大一服七丸日三食前以溫酒下又方出肘後方上以大豬心一枚破頭去血搗末雄黃麝香當門子五枚巴豆百枚去心皮生用心縫以好酒於小銅器中煎之令心沒欲歇隨益盡三升當糜爛煎令可丸如麻子服三丸日三服酒盡不糜者出搗蜜丸之良又大黃末半斤朴硝三兩蜜一斤合於湯上煎可丸如梧子服十丸日三服之主暴症用虎杖根酒漬服之食症附論夫脾胃虛弱飲食纍傷積久不去結在腹內與正氣交爭則心腹硬痛妨害飲食肢體消瘦以手按之積塊有形謂之食症方木香散治食症冷氣及傷寒後一切氣疾食物不消木香檳榔銼青橘皮湯浸去白焙肉豆蔻去殼食茱萸紅豆蔻去皮乾薑炮白朮葛根銼草豆蔻去皮虎杖麻黃去根節厚朴去粗皮生薑汁炙桔梗炒桂去粗皮羌活去蘆頭人參芎藭以上各等分上為細末每服三錢匕空心炒薑鹽湯調下京三稜丸治食症癖氣食勞宿食不消痰逆京三稜半兩微煨銼乳香半兩木香半兩丁香半兩肉豆蔻半兩去殼當歸半兩銼微炒紫菀一兩洗去苗土五靈脂半兩青橘皮半兩湯浸去白瓤焙乾薑一兩炮裂銼附子一兩炮裂去皮臍硃砂半分研細硇砂一兩細研巴豆一兩半去皮不去心膜以桑柴灰汁煮半日取出豬牙皂莢一兩去黑皮塗酥炙令焦黃去子鱉甲二兩塗醋炙令黃去裙襴上件藥以乳香巴豆同搗如泥余藥搗羅為末先以釅醋一升化硇砂去石滓熬令稠入面煮為糊和諸藥末令軟硬得所搗三五百杵丸如緑豆大每服以溫酒下三丸至五丸化積丸一名大五積丸治食症積氣成塊胸膈痞悶腹脅脹滿宿食不消心腹疼痛不能飲食硇砂無石者研芫花炮巴豆去皮心膜研成膏出油盡各半兩乾漆炒煙出一兩烏頭炮裂去皮臍豬牙皂莢去尖炙各三分以上除硇砂巴豆外搗羅為末拌和令勻用米醋三升於銀石器內慢火熬成膏大黃一兩蒸熟焙乾鱉甲去裙襴醋炙青橘皮湯浸去白焙京三稜煨銼當歸切焙陳曲炒各一兩木香桂去粗皮各三分上一十四味搗羅八味用前膏和丸如緑豆大每服二丸至三丸茶酒任下如取積量虛實加減三稜丸治食症勞氣五積五膈脾胃久冷吃食無味飲食不化四肢少力痰毒氣脹胸膈不利京三稜石三稜雞爪三稜黑三稜各煨銼巴豆連皮乾薑炮蓬莪朮煨銼附子炮裂去皮臍各一兩以上八味用好醋一斗於銀器中煮令盡除巴豆不用外並加焙乾丁香木香桂去粗皮檳榔銼青橘皮去白炒肉豆蔻去殼各半兩上為末每稱一兩末別用巴豆七枚去皮心膜出油細研拌勻更用硇砂一分醋化煮麵糊和丸如大麻子大丹砂末為衣每服三丸至五丸生薑湯下黑金丸治食癥瘕癖聚血結刺痛一切疾沉香銼附子炮裂去皮臍各半兩木香乾薑炮青橘皮湯浸去白焙細墨燒紅醋研桂去粗皮京三稜煨銼蓬莪朮各一分煨銼大黃銼乾漆炒煙出麝香研各半兩硇砂研水飛一兩上為末將京三稜蓬莪朮大黃硇砂四味用米醋煮爛研作糊入衆藥末和丸如梧桐子大每服十丸至十五丸薑鹽湯下不拘時丁香丸一名夾食丸治食症氣堅腹中疼痛木香三稜丸治遠年食症積氣並酒食所傷胸膈脹滿及婦人血塊木香京三稜煨銼補骨脂炒牽牛子炒丁香皮銼乾漆炒煙出各一兩烏梅肉炒陳橘皮湯浸去白焙五靈脂末各二兩沉香半兩巴豆霜一分同五靈脂末用醋一升調勻慢火熬成膏上搗羅九味為末入二味膏子和丸如緑豆大每服五丸至七丸食後臨臥生薑湯下檳榔丸治食症氣檳榔煨銼三兩木香郁李仁去皮研細柴胡去苗大黃銼炒各一兩半枳殼麩炒去瓤桂去粗皮訶黎勒煨去核各一兩草豆蔻去皮五枚乾薑炮半兩上搗羅九味為末入郁李仁同研令勻煉蜜和丸如梧桐子大每服十五丸空心溫酒下日晚再服穿山甲丸出聖惠方治食症破結塊消積年食及積惡血氣並宜服此穿山甲一分炙令黃色乾薑一分炮硇砂一分細研半夏一分湯洗七遍去滑威靈仙半兩斑蝥一分糯米拌炒微黃去翅足肉桂一分去皴皮川烏頭半兩炮去皮臍芫花半兩醋拌炒令乾巴豆半兩去皮心研紙裹壓去油上件藥為末入巴豆硇砂研令勻用糯米飯和丸如小豆大每服食前煎橘皮湯放冷下三丸硇砂丸出聖濟總録治食癥結塊疼痛發歇化氣消酒食硇砂細研乾漆炒煙出各一分木香蓬莪朮煨銼丁香京三稜煨銼青橘皮湯浸去白焙芫花炒各半兩肉豆蔻五枚大者去殼巴豆一分半去皮心膜壓出油上將米醋一碗浸蓬莪朮芫花三稜一宿後焙乾與五味同搗羅為末入硇砂巴豆拌勻醋煮麵糊和丸如大麻子大每服三二丸如要取轉看虛實加減生薑湯下婦人血氣醋湯下小兒疳氣甘草湯下男子膈氣龍腦湯下瀉痢乾薑湯下澤漆丸出聖惠方治食症癖氣脾胃虛弱頭面及四肢浮腫欲變成水病者澤漆半兩檳榔一兩附子一兩炮裂去皮臍木香半兩肉桂半兩去皴皮陳橘皮半兩湯浸去白瓤焙澤瀉半兩川大黃半兩銼碎微炒郁李仁半兩湯浸去皮微炒厚朴半兩去粗皮塗生薑汁炙令香熟上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服以溫水下二十丸日三四服麥糵丸出聖濟總録治食症咽酸吐津胸膈疼痛氣噎食飲進退麥糵炒陳曲炒厚朴去粗皮生薑汁炙檳榔銼紫菀去苗土鱉甲去裙襴醋炙當歸切焙大黃銼炒各半兩上粗搗篩每服五錢匕用水一盞半煎至七分去滓溫服空心午時臨臥各一服八靈丸出聖濟總録治食症氣塊痃癖等疾京三稜煨銼石三稜煨銼雞爪三稜煨銼木香檳榔銼各一兩肉豆蔻去殼半兩巴豆去皮心膜煎黃出油盡硇砂研各一分上搗羅六味為末入巴豆霜硇砂末拌勻醋煮麵糊和丸如小豆大每服五七丸男子生薑湯下婦人醋湯下痃癖氣煎木香湯下硇砂丸出聖惠方治食症及氣塊攻刺心腹疼痛不可忍硇砂半兩巴豆半兩去皮心研紙裹壓去油乾薑一兩炮裂銼附子一兩炮裂去皮臍青橘皮一兩湯浸去白瓤焙京三稜一兩微煨銼乾漆一兩搗碎炒令煙出香墨半錠上件藥各別搗細羅為散納取硇砂巴豆細研用頭醋兩碗煎為膏然後總入諸藥末相和丸如緑豆大每服食前以溫酒下三丸通靈丸出聖惠方治食症及惡血氣五靈脂一兩巴豆一兩去皮心研紙裹壓去油硫黃一兩細研杏仁一兩湯浸去皮尖雙仁麩炒微黃川烏頭一兩去皮臍生用芫花半兩醋拌炒令乾皂莢一兩去黑皮塗酥炙令焦黃去子自然銅一兩細研上件藥搗為末入巴豆研令勻別入生薑黑豆麵二兩拌和令勻滴水為丸如緑豆大每服以生薑湯下二丸膈上有涎即吐有滯食血氣即轉下礞石丸出聖惠方治食症久不消礞石半兩細研硇砂半兩乾漆一兩搗碎炒令煙出附子一兩炮裂去皮臍京三稜一兩微煨銼青橘皮一兩湯浸去白瓤焙香墨半錢巴豆一兩去皮心研紙裹壓去油上件為末以頭醋三升化硇砂研巴豆入銀鍋子內微火煎成膏入諸藥末和丸如緑豆大每服三丸宿食不消茶下婦人血症當歸酒下心痛橘皮生薑湯下治食症心腹疼痛脹滿面色痿黃不下食宜服此方出聖惠方巴豆半兩去皮心研紙裹壓去油京三稜二兩微煨銼乾漆半兩搗碎炒令煙出川大黃半兩銼碎微炒青橘皮一兩湯浸去白瓤焙附子半兩炮裂去皮臍硇砂一分細研香墨半兩上件藥搗羅都細研為末以醋煮麵糊和丸如梧桐子大每服食前以醋湯下五丸當下惡物即瘥如聖丸治男子婦人飲食所傷結成積塊痞痛陳皮乾薑各三錢巴豆一錢甘草一錢半三稜莪朮芫花三味各半好醋一升煮至大半取出焙乾上為末和勻余醋煮麵糊為丸如緑豆大每服六七丸淡薑湯下木香丸出聖惠方治食症及吃食不下木香一兩桂心一兩五靈脂一兩乾薑一兩炮裂銼香墨一兩豬牙皂莢一兩去黑皮塗酥炙令焦黃去子巴豆半兩去皮心研紙裹壓去油上研為末入巴豆研令勻用軟糯米飯和丸如緑豆大每服食前以生薑橘皮湯下五丸治積年食症方出聖惠方青礞石一兩細研硇砂半兩細研芫花半兩醋拌炒令乾木香一分丁香一分巴豆三十枚去心皮研紙裹壓去油川大黃三兩銼碎微炒上件為末入諸藥同研令勻以頭醋二升熬藥令稠可丸即丸如緑豆大每服食前以生薑湯下三丸治食癥結塊在腹內不能飲食面色萎黃宜服此方出聖惠方
