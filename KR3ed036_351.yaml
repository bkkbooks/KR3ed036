body:
  text: 卷三百五十一產後諸疾門語言妄亂附論夫人憂愁思慮則傷心心虛故邪從之新產之人內亡津液而血虛氣弱使人精神昏亂言語錯謬恍惚不寧甚者變狂癲之證治宜補血益心安神定志則病自愈矣方遠志丸治產後血虛或因驚恐神志不寧語言謬錯妄有所見遠志去心甘草炙白茯苓去黑皮桂去粗皮白朮山芋麥門冬去心焙人參當歸切焙澤瀉獨活去蘆頭阿膠炙令燥菖蒲各一兩半乾薑炮一兩熟乾地黃二兩焙上搗羅為末煉蜜丸如梧桐子大每服二十丸煎人參湯下空心日午夜臥服人參丸治產後血虛語狂臥起不安妄有所見人參茯神去木銼羚羊角鎊炒芎藭各一兩檳榔銼三兩桃仁浸去皮尖雙仁炒三十枚遠志去心桂去粗皮木香白芷各半兩訶黎皮一兩枳殼去瓤麩炒一兩半上搗羅為末煉蜜和丸如梧桐子大每服二十丸煎人參湯下空心日午夜臥服羊腎湯治產後血虛心氣不足言語謬妄眠臥不安羊腎一雙去脂細切以水三升煎至二升澄清遠志去心黃芩去黑心防風去叉白茯苓去黑皮人參獨活去蘆頭甘草炙銼各半兩芍藥銼熟乾地黃焙各一兩上除羊腎外粗搗篩每服三錢用腎汁一盞煎至七分去滓溫服不拘時候茯苓丸治產後血氣虛精神不安言語錯謬白茯苓去黑皮菖蒲各一兩半人參澤瀉熟乾地黃焙當歸切焙各一兩遠志去心一兩一分麥門冬去心焙半兩桂去粗皮一兩半上為末煉蜜丸如梧桐子大每服二十丸煎人參湯下不拘時候遠志湯治產後心虛風邪所搏言語妄亂遠志去心赤芍藥黃芩去黑心白茯苓去黑皮人參防風去叉獨活去蘆頭甘草炙各一兩熟乾地黃焙二兩上粗搗篩每服五錢水一盞半煎至七分去滓溫服不拘時候茯苓散療產後狂語志意不定精神昏亂由心氣虛為風邪所致茯苓一方用茯神生地黃各十二分遠志去心白薇龍齒各十分防風人參獨活各八分上同為末以銀一大斤水一斗五升煎取七升下諸藥煎取三升溫分三服忌食菘菜豬肉生冷一方治產後風邪心神恍惚不定加荊芥八分甘草五分當歸湯治產後血氣不調言語謬亂當歸切焙人參芍藥酸棗仁去皮黃芩去黑心白蘚皮甘草炙銼各一兩上粗搗篩每服三錢水一盞煎七分去滓溫服不拘時麥門冬湯治產後心虛言語謬誤恍惚不安麥門冬去心焙二兩白茯苓去黑皮一兩半赤芍藥當歸切焙乾人參甘草炙銼各一兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時茯神湯治產後血虛亂語心志不寧茯神去木二兩人參芍藥銼各一兩半甘草炙銼當歸切焙桂去粗皮各一兩上粗搗篩每服二錢水一盞生薑三片棗二枚擘破煎至七分去滓溫服不拘時頭痛附論夫頭者諸陽之會也凡產後五臟皆虛胃氣虧弱飲食不充穀氣尚乏則令虛熱陽氣不守上湊於頭陽實陰虛令頭痛又有因產後敗血及氣血虛損風邪客搏陽經注於腦絡不得疏通亦令頭痛也方鹿肉湯治產後風虛頭痛壯熱言語邪僻鹿肉二斤芍藥獨活秦艽黃耆各三兩半夏一升乾地黃桂心芎藭各一兩生薑六兩甘草阿膠各一兩茯苓千金翼作茯神人參各四兩上㕮咀以水二斗煮肉得一斗二升去肉納藥煎取三升去滓納膠令烊分四服日三夜一茯神散治產後風虛頭痛四肢煩疼口乾微渴茯神甘菊花羌活當歸銼微炒生乾地黃白芍藥前胡去蘆頭桂心甘草炙微赤銼各半兩葛根銼三分石膏二兩蔓荊子一兩麥門冬去心焙一兩半上為粗散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服羚羊角散治產後風虛頭痛身體壯熱言語錯亂心神煩悶羚羊角屑茯神黃耆銼人參去蘆頭各三分防風去蘆頭生乾地黃芎藭各一兩麥門冬去心焙一兩半赤芍藥獨活秦艽去苗各半兩石膏二兩甘草一分炙微赤銼碎上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服加減四物湯治產後頭痛血虛氣弱痰癖寒厥皆令頭痛一名加減羌活湯羌活川芎防風香附子炒各一兩甘草炙當歸各五錢石膏二兩熟地黃一兩香白芷細辛各一兩半蒼朮一兩六錢去皮上為粗末每服一兩水煎如有汗是氣弱頭痛也前方中加芍藥三兩桂一兩半生薑煎如頭痛痰癖者加半夏三兩茯苓二兩半生薑煎如熱厥頭痛加白芷三兩石膏三兩知母一兩半如寒厥頭疼加天麻三兩附子一兩半生薑煎白朮散治產後體虛勞動過多致頭痛熱汗出不止四肢少力不思飲食白朮白茯苓黃耆銼各三分石膏麥門冬去心焙各一兩半白芍藥五味子各半兩生乾地黃牡蠣粉各一兩人參去蘆頭三分甘草五分炙微赤銼上為粗散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服石膏散治產後體虛頭痛煩熱石膏二兩當歸銼微炒羚羊角屑白芍藥白朮子芩生乾地黃甘草炙微赤銼各半兩茯神前胡去蘆頭各三分麥門冬一兩去心焙上為粗末每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服治產後頭疼目暗方細辛川當歸白朮芍藥等分上為末每服二錢白湯點服治頭痛頭暈好川芎半兩為末每服二錢臘茶清調下甚健曾有一婦人產後頭痛一服愈麻黃湯治產後頭痛目眩傷風麻黃去根節湯煮掠去沫葛根石膏火煅桂去粗皮附子炮裂去皮臍芍藥甘草秦艽去土防風當歸切焙各一兩上銼如麻豆每服三錢水一盞煎至七分去滓溫服不拘時候人參散治產後因傷風冷頭痛壯熱胸膈滿悶不得睡臥暈旋乾嘔不能飲食一名人參煮散人參去蘆頭三分葛根銼酸棗仁煨炒芎藭各三分前胡去蘆頭一兩石膏二兩枳殼麩炒微黃去瓤白朮甘草炙微赤銼碎桂心各半兩上為粗散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候一方無生薑煎防風湯治產後傷風冷頭目疼痛煩眩噁心防風去叉獨活去蘆頭黃耆羚羊角鎊枳殼去瓤麩炒烏頭炮裂去皮臍旋覆花生乾地黃焙桂去粗皮各一兩上銼如麻豆每服三錢水一盞入生薑三片薄荷三葉同煎至七分去滓溫服不拘時候茯苓黃耆湯治產後風頭痛目昏眩白茯苓去黑心黃耆菊花獨活去蘆頭枳殼去瓤麩炒當歸切焙生乾地黃焙人參烏頭炮裂去皮臍各一兩上銼如麻豆每服三錢水一盞煎至七分去滓溫服不拘時候羚羊角散治產後頭目熱痛羚羊角鎊石膏火煅當歸切焙芍藥生乾地黃白茯苓去黑皮麥門冬去心焙前胡去蘆頭甘草炙各一兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候黃耆散治產後虛熱頭痛四肢煩疼不思飲食黃耆銼生乾地黃麥門冬去心焙牡蠣粉各一兩桂心黃芩甘草微炙銼各半兩石膏二兩赤芍藥半兩上為粗散每服四錢以水一中盞入生薑半分去滓不計時溫服前胡散治產後痰壅頭痛心胸不利少思飲食前胡去蘆頭半夏湯洗七遍去滑旋覆花當歸銼微炒甘菊花甘草炙微赤銼碎赤茯苓各半兩石膏二兩枳殼一兩炒微赤去瓤銼碎上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時溫服羌活湯治產後風虛頭痛昏眩羌活去蘆頭當歸切焙白茯苓去黑皮甘菊花石膏火煅烏頭去皮臍甘草炙銼芍藥各一兩上粗搗篩每服三錢水一盞煎至七分去滓溫服防風湯治產後風熱頭痛頭目掣動防風銼升麻黃芩去黑心芍藥石膏生碎葛根銼芎藭羌活各一兩上粗搗篩每服三錢水一盞煎至七分去滓不拘時候防風葛根湯療產後風虛頭目痛語言時僻防風甘葛茯苓各八分麥門冬去心八分芍藥黃芩各六分犀角四分甘草三兩上㕮咀以水二升煎取七合分為二服茯苓前胡湯治產後風頭疼眩悶倒旋白茯苓去黑皮前胡去蘆頭菊花附子炮裂去皮臍白朮細辛去苗葉芎藭麻黃去根節各一兩上銼如麻豆每服二錢水一盞煎七分去滓溫服不計時候茯苓湯治產後氣血虛頭痛不定目眩嘔逆白茯苓去黑皮羌活去蘆頭當歸切焙人參芎藭附子炮裂去皮臍石膏火煅黃耆銼各一兩上銼如麻豆每服三錢水一盞煎至七分去滓溫服一方無黃耆名羌活湯大三五七散治產後風頭痛風眩口喎耳聾天麻炮裂去皮臍細辛去苗葉各三兩山茱萸乾薑炮裂各五兩山芋防風去叉各七兩上搗羅為散每服二錢清酒調下日再未知稍加麥門冬湯治產後虛煩頭疼短氣欲死心下亂不解麥門冬去心二兩石膏十二分淡竹茹五分小麥二合甘草六分乾葛七分上以水二升煎至八合去滓食後分三服名淡竹茹湯芍藥散治產後體虛痛疼白芍藥生乾地黃牡蠣粉各一兩桂心半兩甘草一分炙微赤銼碎石膏二兩上為粗散每服四錢以水一中盞生薑半分棗三枚煎至六分去滓不計時候溫服白殭蠶丸治產後頭痛白殭蠶微炒白附子炮裂地龍微炒黃丹微炒各一兩人中白半兩炒灰上為末用蔥汁和丸如梧桐子大不計時候荊芥湯下十丸吹鼻方治產後頭痛地龍炒一錢麝香半錢上合研細每用小豆許吹兩鼻中川芎散治產後頭痛一名川烏散大川芎真天台烏藥皮各等分上為細末每服三錢以稱錘淬酒調服芎附散治產後敗血作梗頭痛諸藥不效者大附子一枚酸醋一碗用火四畔炙透蘸醋令盡去皮臍銼碎川芎一兩上為細末每服二錢茶清調下二奇散治產後頭痛一名芎藭湯獨活湯治產後氣虛頭痛不可忍用大附子一枚炮裂去皮臍上一味銼如麻豆每服三錢水一盞入生薑三片棗一枚擘同煎至七分去滓溫服不拘時吹鼻方治產後頭痛用苦葫蘆子上一味搗羅為末吹半字入鼻中其痛立止遍痛者隨左右吹之治產後血逆頭痛面赤如醉聞身體如在虛空大腑秘熱語聲微細須是大腑秘熱方可添大黃黃芩大黃杏仁去皮尖桔梗牡丹皮去心麻黃去根升麻羌活芍藥防風烏藥荊芥穗麥門冬去心各一分上為細末每服三錢水一盞姜三片煎一沸食後和滓吃治產後大腑秘熱經八九日不通頭痛面赤噁心輕吃些熱物則心煩嘔逆宜服此方杏仁去皮尖黃芩木香羌活枳殼只用青獨活桔梗貝母去心大黃荊芥穗各一兩連翹子半兩牽牛二兩半夏三銖上為細末每服四錢滴熱水丸梧桐子大食後蔥湯下心腹痛附論夫產後心腹痛者由產後氣血俱虛遇寒乘之與血氣相搏隨氣上衝於心或下攻於腹故令心腹痛也若久痛不止則變成疝症也方白朮散治產後冷氣攻心腹疼痛四肢不和不思飲食白朮三分木香半兩當歸銼微炒三分陳橘皮湯浸去白瓤焙三分人參去蘆頭三分附子炮裂去皮臍三分芎藭三分桂心半兩檳榔半兩乾薑炮裂去皮半兩厚朴去粗皮塗生薑汁炙香熟三分赤芍藥半兩甘草炙微赤銼吳茱萸湯浸七次焙乾炒各一分上為粗散每服三錢以水一中盞入棗三枚煎至六分去滓不計時候稍熱服芍藥黃耆湯治產後心腹痛芍藥四兩黃耆白芷桂心生薑人參芎藭當歸乾地黃甘草各一兩茯苓三兩大棗十枚上㕮咀以酒水各五升合煮取三升去滓先食服一升日三千金翼無人參當歸芎藭地黃茯苓為七味芎藭湯療產後心腹切痛不能飲食忽然往來寒熱當歸川芎黃芩人參甘草芍藥防風生薑各三分大黃二分可量人強弱方可服之桃仁八十枚上以水七升煮取二升下大黃更煎三沸分作三服硇砂丸治產後腹中有餘血不散致心腹疼痛硇砂細研芫花醋拌勻微炒令乾各一兩當歸銼微炒赤芍藥木香沒藥蓬莪朮狗脊各一分去毛白芷一分上為末用酸醋一升同熬成膏候可丸即丸如豌豆大不計時以當歸酒下五丸羊肉當歸湯治產後腹中心下切痛不能食往來寒熱若中風乏氣力羊肉二斤當歸黃芩一方作黃耆芎藭防風一方作人參甘草各二兩芍藥三兩生薑四兩