治產後臟腑氣虛兩脅脹滿不思飲食四肢無力白豆蔻去皮人參去蘆頭桂心各半兩半夏湯浸七次去滑半兩白朮陳橘皮湯浸去白瓤焙乾各一兩枳殼三分麩炒微黃去瓤甘草一分炙銼赤上搗粗羅每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服厚朴散治產後兩脅脹滿胸腹妨悶不下飲食厚朴一兩去粗皮塗生薑汁炙令香熟赤茯苓人參去蘆頭當歸銼微炒訶黎勒皮陳橘皮湯浸去白瓤焙各三分甘草一分炙微赤銼上為粗散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服白聖散治產後腹大堅滿喘不能臥樟柳根三兩大戟一兩半甘遂一兩半上為細末每服二三錢熱湯調下取大便宣利為度此藥主水氣之勝藥也桂心散桂心當歸銼微炒各一兩乾薑炮裂銼芫花醋拌炒令乾木香各半兩上搗細羅為散每服食前以熱酒調下一錢治產後婦腹脹腫不可忍用黍黏根煮為飲一服即愈治產後膨脹氣不通轉用麥糵為末酒調二三錢服之漸通巨勝湯治產後腹脹滿悶嘔吐不定者何答曰敗血散於脾胃脾受之不能運化精微而成腹脹胃受之則不得受納水穀而生吐逆醫者不識誤以尋常治脹止吐藥療之病與藥不相干轉更傷動正氣疾愈難治但服此方必瘥赤芍藥半夏湯洗切碎澤蘭葉人參去蘆頭陳皮去白各一錢甘草炙一錢生薑半兩上為粗末用水一碗同煎至兩盞去滓溫熱分三服治產後亂吃物早非時腹脹脅滿飲食不快當歸鱉甲以醋少許化硇砂少許用炙黃色各一兩桔梗細辛桂心厚朴羌活木香芎檳榔各一分草豆蔻去皮半兩藿香三銖半夏二銖上為細末每服三錢水一盞生薑二片同煎取九分空心和滓吃治產後雖甚通利但心腹滿悶脅脹咳嗽不食大便不通眼澀行坐心腹時痛白朮當歸桑白皮大黃各一兩細辛桂心各二兩生薑四兩上㕮咀以水二升煎一升分三服當得微利即止大黃產後不可輕用此緣病熱不得已也身體腰腳疼痛附論夫產後遍身疼痛蓋由產後百節開張血脈流走遇氣弱則經絡分肉之間血多留滯累日不散則骨節不利筋脈引急故腰背不得轉側手足不能動搖身熱頭痛也若以傷寒治之則汗出而筋脈動惕手足厥冷變生他病但以趁痛散治之若腳腰痛者蓋腎主腰腳女人腎位繫於胞產則勞傷腎氣損動胞絡虛未平復而風冷客之冷氣乘腰故令腰痛也若寒冷邪氣宿滯背脊則痛久未已後忽有娠必致損動蓋胞絡屬腎腎主腰故也方趁痛散治產後身痛氣弱血滯骨節不利筋脈急引牛膝當歸桂心白朮黃耆獨活生薑各半兩甘草薤白各一分上㕮咀每服半兩以水三盞煎至盞半去滓食前服陳無擇評曰趁痛散不特治產後氣弱血滯兼能治太陽經感風頭疼腰背痛自汗發熱若感寒傷食憂恐驚怒皆致身疼發熱頭痛況蓐勞諸證尤甚趁痛散皆不能療不若和劑局方五積散入醋煎用卻不妨又方加桃仁能治腰疼逐敗血祛風濕加桑寄生半兩尤佳杜仲散治產後傷虛腰間疼痛四肢少力不能飲食杜仲去粗皮炙微黃色銼碎熟乾地黃附子炮裂去皮臍萆薢銼牛膝去苗銼木香石斛去根銼各一兩桂心續斷各半兩五味子三分當歸銼微炒芎藭各三分上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前服石斛散治產後虛損腰間疼痛四肢無力氣血不和石斛去根銼丹參附子炮裂去皮臍延胡索熟乾地黃枳殼麩炒黃去瓤芎藭桑寄生各一兩續斷當歸銼微炒各三分桂心三分牛膝去苗一兩半上為末煉蜜和搗五七百杵丸如梧桐子大每服食前以溫酒或生薑湯下三十丸杜仲酒治產後臟虛腰間疼痛肢節不利杜仲去粗皮炙微黃銼二兩桂心丹參當歸菴䕡子芎藭牛膝去苗桑寄生附子炮裂去皮臍熟乾地黃銼各一兩川椒半兩去閉口及目微炒上細銼以生絹袋盛用好酒一斗瓷瓶中浸經七日密封后開取每日空心及午食前溫飲一盞牡丹湯治產後腰痛沉重舉動艱難牡丹皮柴胡去苗檳榔煨銼犀角鎊杜仲去粗皮銼炒當歸切焙桂銼去皮枳殼去瓤麩炒檳榔煨銼丹參桔梗銼炒郁李仁湯去皮尖各一兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候人參湯產後虛冷氣血不和腰痛人參當歸切附子炮裂去皮臍檳榔生銼桂去粗皮甘草炙厚朴去粗皮塗生薑汁炙鬼箭羽各一兩乾薑炮木香各半兩上銼如麻豆大每服三錢水一盞煎至七分去滓溫服不拘時候赤芍藥散治產後血氣壅滯攻刺腰間疼痛赤芍藥三分延胡索桂心芎藭當歸銼微炒牡丹桃仁湯浸去皮尖雙仁麩炒各半兩牛膝去苗川大黃銼微炒各二兩枳殼麩炒微黃去瓤半兩上為散每服四錢以水一中盞入生薑半分煎至五分次入酒二合煎三二沸去滓食前溫服療產後風冷腰痛不可轉者腎經繫於胞脈腎主腰也獨活川芎桂心芍藥續斷生薑桑寄生各六分當歸防風各八分上㕮咀以水三升煮取一升去滓空心分二服牛膝散治產後敗血不散攻刺腰間疼痛日夜不止牛膝去苗川大黃銼碎微火炒各一兩桂心赤芍藥各三分羚羊角屑劉寄奴芎藭當歸銼微炒桃仁湯浸去皮尖雙仁麩炒黃銼各半兩上為散每服四錢以水一中盞煎五分次入酒二合更煎三二沸去滓食前溫服沒藥散治產後余血未盡攻腰間疼痛沒藥牛膝去苗桂心琥珀赤芍藥菴䕡子桃仁湯浸去皮尖雙仁麩炒微黃狗脊去毛各一兩當歸銼微炒半兩上為細散每服食前以溫酒調下二錢仙靈脾散治產後血氣攻刺腰間疼不可忍仙靈脾牛膝去苗當歸銼微炒各三兩鬼箭羽地龍炒黃沒藥桂心威靈仙骨碎補各半兩上為細散每服食前以溫酒調下二錢丹參丸治產後虛損氣血不和腰痛難忍丹參銼續斷當歸切焙牛膝去苗酒浸切焙桂心去粗皮鬼箭羽銼各一兩沒藥用醋少許化開半兩琥珀一兩上除沒藥外併為末入沒藥拌勻煉蜜和丸如梧桐子大每服三十丸以溫酒下不計時候續斷飲治產後腰重痛不可轉側續斷芎藭桂去粗皮生乾地黃焙黃耆細銼芍藥黃芩當歸去粗皮各一兩上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時候芎藭湯治產後腰痛沉重夫產後腎氣不足或惡露所出未盡遇風寒客搏皆令氣脈凝滯留注於腰邪正相擊故令腰痛也芎藭牛膝去苗酒浸切焙當歸切炒萆薢銼桂去粗皮桃仁湯浸去皮尖雙仁炒芍藥各一兩上粗搗篩每服三錢水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服不拘時候芍藥湯治產後氣血凝滯腰重痛赤芍藥延胡索當歸切焙枳殼去瓤麩炒牛膝去苗酒浸炒石斛附子炮裂去皮臍各一兩上銼如麻豆大每服三錢水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服不拘時候附子丸治產後腰疼不可忍附子炮裂去皮臍人參當歸切焙熟乾地黃焙桂去粗皮延胡索威靈仙去苗土各一兩上搗羅為末煉蜜為丸如彈子大每服一丸細嚼溫酒下胡桃茶亦得不拘時候當歸散治產後腰痛不能轉側壯熱汗出身體急強當歸銼微炒骨碎補牛膝去苗赤芍藥琥珀桃仁湯浸去皮尖雙仁麩炒微黃芎藭各一兩上為細散食前以豆淋酒調下二錢生地黃湯療產後三日患腰疼腹中余血未盡並手腳疼不下食生地黃汁一升芍藥甘草各二兩丹參四兩蜜一合生薑汁半合上切以酒三升煮取一升去滓納地黃汁並蜜薑汁微火煎一二沸一服三合日二夜三利一兩行中間進食與藥更進服熟乾地黃散治產後氣血滯凝腰痛熟乾地黃焙三兩當歸切炒一兩半細辛去蘆葉三分甘草炙銼吳茱萸湯浸焙乾炒半兩芍藥各一兩上搗羅為散每服二錢溫酒調下不拘時候羚羊角飲治產後腰痛舉動不得羚羊角鎊紅藍花牛膝酒浸切焙銼各二兩桂去粗皮芍藥各一兩生乾地黃焙四兩上粗搗羅每服三錢水一盞煎至七分去滓溫服不拘時候治婦人產後遍身疼痛腰背不得轉側手足不得動搖身熱頭疼若作傷寒醫則變生他病臨症宜酌用後方牛膝酒浸炒當歸去蘆白朮黃耆蜜炙肉桂不見火獨活去蘆頭上各等分㕮咀每服三錢水一盞半姜五片薤白七寸煎七分去滓熱服敗醬散療產後虛冷血氣流入腰腿痛不可轉或痛引腹中如錐刀所刺敗醬當歸各八分川芎芍藥桂心各六分上㕮咀以水二升煮取八合空心分溫二服忌蔥一方有延胡索計五味各等分無芍藥入酒煎或水酒同煎當歸黃耆湯治產後失血過多腳腰痠疼轉側不得壯熱汗出當歸銼焙黃耆細銼芍藥各二兩生薑切焙三兩上粗搗篩入作八服每服水二盞半煎至一盞去滓溫服楮實丸治一切風勞冷氣女人冷血產後腰痛等症楮實一升炒牛膝酒浸切焙當歸切焙乾薑炮各一兩上搗羅為末煉蜜和丸如梧桐子大每服食前空心酒下二十丸生薑湯療產後余血不盡流入腰腳疼痛胸滿氣急兩脅痛方見本門惡露不盡類治腹中惡不除身強痛方用生薑三斤㕮咀以水一斗煮取三升分為三服當下惡血治產後腰痛起動不得方萆薢官桂石斛茯苓菟絲子芎山茱萸當歸葫蘆巴炒各一分牛膝一兩上杵羅為細末每服三錢水一盞入鹽少許同煎三四沸空心和滓熱吃羊肉杜仲湯治產後腰痛咳嗽羊肉四斤杜仲紫菀當歸桂心白朮各三兩五味子細辛款冬花人參厚朴芎藭附子萆薢甘草黃耆各二兩生薑八兩大棗二枚上㕮咀以水二斗五升煮肉取汁一斗五升去肉納藥煎取三升半去滓分五服日三夜二雙俱散治產後腰痛石菖蒲一兩當歸半兩上為末每服三錢空心熱酒調下
