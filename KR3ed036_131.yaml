下溫溫欲吐胸中痛大便溏腹滿鬱郁微煩此極吐下者或日深睡里譫語法當下之以銀粉巴豆燥熱大毒丸藥下之致真陰虛損邪熱轉甚因而協熱下利不止及表熱下之太早乘虛而入不成結胸但為熱利不止心下滿急或痛煩渴咽乾脈滑數而實諸腹滿實痛者煩渴譫妄小便赤大便硬脈滑實緊甘草二兩炙大黃以清酒洗四兩上㕮咀每服五錢水一盞半煎至一盞去滓入芒硝一錢匕更煎三沸溫服調胃承氣加橘皮湯出聖濟總録治傷寒發汗不解蒸蒸發熱者大黃銼醋炒一兩甘草炙陳橘皮湯洗去白焙各半兩上細銼每服四錢水一盞半煎至一盞入芒硝一錢攪令勻更煎三兩沸溫服柴胡大黃湯出聖濟總録治傷寒日數過多心中氣悶或發疼痛狂言不定煩躁不得眠大小便不通柴胡去苗大黃濕紙裹煨朴硝枳殼去瓤麩炒各一兩甘草炙銼半兩上粗搗篩每服五錢水一盞半煎至一盞去滓溫服日二服不可過多若大小便通則汗自出宣毒散出聖濟總録治傷寒脈大潮燥伏熱大黃銼炒甘草炙銼半兩朴硝研一分牽牛子一兩半生用半炒用上為散每服二錢用龍腦膩粉蜜水調下一方煉蜜為丸如梧桐子大每服十五丸龍腦膩粉水下小黃芩湯出聖濟總録治傷寒八九日大便不通心神悶亂黃芩去黑心枳殼去瓤麩炒大腹銼醋炒各一兩大黃銼炒二兩上粗搗篩每服三錢水三盞煎至七分去滓不計時候溫服如人行三五里未通再服以利為度大青散出聖濟總録治陽盛發狂有斑大小便閉澀大青知母黃芩去黑心山梔子仁升麻黃連去須各一兩甘草炙銼半兩大黃煨一兩上為散每服三錢入朴硝一錢用蜜水調下承氣丸出聖濟總録治傷寒時氣溫熱病大便不通大黃銼炒三分郁李仁湯浸去皮研枳實去瓤麩炒朴硝研各一兩上為末和勻煉蜜為丸如梧桐子大每服二十丸生薑湯下未利再服不拘時候桃仁承氣湯出儒門事親桃仁去皮尖一十二個官桂甘草芒硝以上各半兩上銼如麻豆大每服三五錢水一大盞煎至七分去滓溫服握宣丸出儒門事親白檳榔肉桂乾薑附子甘遂良薑韭子巴豆以上各等分硫黃一錢上為細末軟米和丸桐子大早晨先椒湯洗手放溫揩乾用生油少許塗手心男左女右磨令熱握一丸宣一二行可吐附論夫諸病吐之而愈者邪在胸中也傷寒大法謂四日以上若入陰經其傳未深邪氣高而裡實客於胸膈下之則動胃發之則亡陽宜吐而出之然亦不必拘此凡寒邪熱毒痰實在胸中也及有宿食在胸脘者當吐之但診其脈寸口或浮或滑或數或緊與諸部不同者其證胸中心痞滿鬱郁而痛不能息多涎唾飲食入則吐欲吐復不能出或手足厥冷反心下滿而煩飢不能食吐下後心中懊憹者是也內經所謂其高者因而越之即其法也方治溫病胸中滿悶取吐出聖濟總録豬膽三枚苦酒二合上同攪勻綿漉過頓服未吐再服人參湯出聖濟總録治傷寒出汗後心胸煩悶煩熱未通人參半兩燈心一小束枳殼去瓤麩炒一分大腹皮一枚銼茶末二錢生甘草半兩上除茶末各細銼用淡漿水二盞煎至一盞去滓和茶末攪勻分溫二服以紙捻子於咽喉中引取吐為度治胸心痰盛傷寒熱病瘴瘧須吐者出肘後方以鹽末一大匙或水或暖湯送下須臾則吐吐不快明旦更服良肘後用鹽一升治傷寒汗出不解已三四日胸中悶吐出肘後方以豉並鹽一合水四升煎取一升半分服當吐一方無鹽用蜜一兩煮三沸頓服安臥當得吐不瘥更服取瘥又方出肘後方以生地黃三斤細切水一斗煮取三升分三服亦可服藜蘆吐散及苦參龍膽散治傷寒心胸中滿悶取吐上以豬膽一枚取汁醋一小盞酒一小盞納豬膽汁相和溫過分為二服當吐立瘥傷寒過經不解附論夫傷寒為病六經受邪始傳於三陽病在表者可汗其病三日傳於三陰病入里者可下其不兩感於寒更不傳不加暴風氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陰病衰腹滿減如故十一日少陰病衰渴止舌乾而嚏其十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽急也故傷寒愈者皆在十二日若過此經病猶不解者為熱結於裡其狀或譫言妄語或鬱郁微煩或腹滿吐下皆緣治之宜邪氣稽留故病過而不能解也當隨其證以治若更感暴氣變為他病者當依壞病法藥之方犀角湯出聖濟總録治傷寒過經不解熱結在裡往來寒熱煩渴躁悶犀角屑一兩柴胡去苗吳藍各三分大青升麻各一兩烏梅去核黃芩去黑心各三分甘草炙銼半兩上搗篩每服五錢水一盞半入竹葉三十片煎取七分去滓食後溫服鱉甲湯治傷寒過經半月不解鱉甲去裙襴醋炙柴胡去苗升麻各一兩烏梅去核半兩枳實去瓤麩炒犀角屑黃芩去黑心各一兩甘草炙銼半兩上搗篩每服五錢水一盞半煎至七分去滓地黃汁二合攪勻食後分溫二服木通湯治傷寒十三日過經不解臍腹脹滿小便淋澀煩悶躁渴木通銼葛根銼檳榔銼滑石瞿麥穗青橘皮湯洗去白鹽炒各一兩上搗篩每服三錢水一盞入蔥白二寸同煎至六分去滓溫服不計時候萬應散治傷寒過經心胸痞滿煩躁狂言積熱毒氣及婦人血風血氣經候不調寒熱有積甘遂連珠者威靈仙去土五靈脂各一兩上為散每服一錢如傷寒日數多有積熱者用雞子青蜜水調下如婦人見前件病證者灰酒調下尋常熱氣蜜水調下冷即用蔥湯調下陽毒積熱入膩粉白丁香各半錢生薑汁蜜水調下柴胡湯治傷寒發汗下之後過經不解胸膈滿結而不嘔但頭汗往來寒熱小便不通柴胡去苗二兩桂去粗皮黃芩去黑心各一兩牡蠣生用甘草炙各半兩栝蔞根一兩半木根銼一兩上粗搗篩每服五錢水一盞半入生薑半分拍碎蔥白五寸同煎至七分去滓食後溫服保安散治傷寒過經不解三焦滯悶