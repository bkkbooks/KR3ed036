為散每服不計時候以溫酒調下二錢頻下二服以衣覆之汗出為度桂芩甘露散治傷寒中風冒暑飲食內外一切所傷傳受濕熱內甚頭痛口乾或吐瀉煩渴或小便赤澀大便急痛或瀉痢間作病一切濕熱霍亂吐瀉轉筋急痛腹滿痛悶或中外諸邪所傷而並吐瀉者溫之熱時尤宜服之桂半兩茯苓白朮各半兩甘草炙澤瀉石膏寒水石各一兩滑石二兩上為細末熱湯調下三錢欲飲冷者新水調下或生薑湯調下尤良小兒服一錢一方有豬苓半兩姜附湯治傷寒已經轉下又當發汗內外俱虛邪氣未解表證不見身無大熱晝日煩躁不得眠睡夜即安靜不嘔不渴脈候沉細者宜服之外感風冷久積痰水心腹冷痛霍亂轉筋一切虛寒並皆治之乾薑一兩附子生去皮臍細切一枚上令勻每服三錢水一盞半煎至一盞去滓食前溫服桂枝麻黃各半湯治風證見寒脈寒證見風脈桂枝二兩麻黃芍藥生薑各半兩杏仁十四個大棗二個上為散每服四錢水煎溫服羌活湯治傷寒脅熱羌活麻黃去節石膏細辛去苗前胡川芎防風各一兩黃芩枳殼炒去瓤甘草炙各半兩薄荷葉一分上為粗末每服五錢水二盞姜三片煎至一盞去滓溫服細辛湯治傷寒脅寒細辛去苗甘草炙各一兩麻黃去節桂枝去粗皮各二兩杏仁半兩去皮尖上為粗末每服五錢水二盞煎一盞去滓服神朮散治傷寒肌疏多汗蒼朮二兩米泔浸去皮薄切用麥麩炒川芎藁本洗荊芥各一兩上為粗末每服五錢水二盞姜三片煎一盞去滓熱服十棗湯治太陽中風吐下嘔逆者芫花熬甘遂大戟各等分上各篩末取大棗十枚水一升半煮取八合去滓納諸藥強人一錢羸人半錢溫服之不下明旦更加半錢下後糜粥自養病懸飲者亦主之治傷寒鼻塞以東霜作團食之
