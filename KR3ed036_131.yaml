body:
  text: 卷一百三十一傷寒門傷寒九日以上候附論夫傷寒九日以上病不除者或初一經受病即不能相傳或已傳三陽訖而不能傳於陰至停滯纍日病證不罷或三陰陽傳病已畢又重感於寒名為兩感傷寒則臟腑俱病故日數多而病候改變也方前胡湯出聖惠方治傷寒九日不解心腹堅滿身體疼痛內外有熱煩嘔不安前胡去蘆頭半夏湯洗七次去滑白朮枳實麩炒微黃赤芍藥黃芩各一兩甘草半兩炙微赤銼厚朴一兩去粗皮塗生薑汁炙令香熟上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服石膏湯出聖惠方治傷寒病九日曾經發汗吐下未解三焦生熱其脈滑數昏憒沉重欲入百合狀證石膏三兩黃柏黃芩各一兩麻黃一兩去根節豉二兩黃連去須川大黃二兩銼碎微炒甘草一兩炙微赤銼梔子仁一兩上細銼和勻每服半兩以水一大盞入生薑半分煎至五分去滓不計時候溫服如人行十里再服以微利為度茯苓湯出聖惠方治傷寒九日之後胸膈煩滿小便不利譫語一身不可轉側赤茯苓柴胡去苗龍骨各二兩川大黃二兩銼碎微炒黃芩人參去蘆頭牡蠣燒為粉桂心半夏湯洗七遍陳橘皮湯浸去白瓤焙甘草炙微赤銼一兩上為散每服四錢水一大盞入生薑半分棗三枚煎至六分去滓不計時候溫服犀角散出聖惠方治傷寒九日心肺熱氣急喉中有膿血犀角屑柴胡去苗青竹茹各一兩桔梗去蘆頭川大黃銼碎微炒麥門冬去心各一兩半上為散每服五錢水一大盞煎至五分去滓下芒硝末一錢攪令和勻不計時候溫服檳榔散出聖惠方治傷寒九日心中滿悶腹脹喘急檳榔訶黎勒皮陳橘皮湯浸去白瓤焙甘草炙微赤銼各半兩桑根白皮三分銼上為散每服五錢水一大盞入生薑半分蔥白一莖煎至五分去滓不計時候溫服半夏散治傷寒九日不解往來寒熱壯如溫瘧胸膈滿悶時有痰逆不止半夏湯洗七次去滑柴胡去苗各二兩葛根銼白朮人參去蘆頭陳橘皮湯洗去白瓤焙黃芩厚朴去粗皮塗生薑汁炙令香熟甘草炙微赤銼各一兩上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服芒硝散治傷寒九日不解胸膈滿逆日晚即潮此由失下內實故也川芒硝二兩前胡一兩去蘆頭枇杷葉半兩去毛炙微黃葛根一兩銼川大黃二兩銼碎微炒半夏一兩湯洗七次去滑上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服以利為度大前胡湯治傷寒八九日不解心腹堅滿身體疼痛內外有熱煩嘔不安半夏半升洗生薑五兩枳實八片炙前胡半升黃芩三兩干棗十二枚擘芍藥四兩上切以水一斗煮取三升分四服日三夜一服忌羊肉錫器等物張仲景用柴胡不用前胡本草云加大黃二兩不加大黃恐不名大柴胡湯石膏湯治傷寒八九日三焦熱其脈滑數昏憒身體壯熱沉重拘攣或呼呻而已攻內體猶沉重拘攣由表未解今直用解毒湯則攣急不瘥直用汗藥則毒因加劇而方無表裡療者意思以三黃湯以救其內有所增加以解其外是故名石膏湯石膏黃連黃柏黃芩各三兩香豉一升綿裹梔子十枚擘麻黃三兩去節上切以水一斗煮取三升分為三服一日並服出汗初服一劑小汗其後更合一劑分兩日服常令微汗出拘攣煩憒即瘥得數行利心開令語毒折也忌諸肉冷水桂附湯治傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不吐脈浮虛而澀者此主之若其人大便小便自利者去桂加白朮湯主之朮附湯治傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便自利者此主之屬太陽白朮二兩甘草一兩炙附子一個半炮去皮上銼如麻豆大每服五錢生薑五片大棗一枚水一盞半煎至七分去滓溫服一服覺身痹半日許再服三服都盡其人如胃狀忽怪也即是附子與術並走皮中逐水氣未得除故耳法當加桂一兩其大便堅小便小利故不加桂也療傷寒八九日至十日余大煩渴熱盛而三焦有瘡䘌者多下或張口吐舌呵籲目爛口鼻生瘡吟語不識人除熱毒止利以龍骨半斤碎以水一斗煮取四升沉之井底令冷服五合漸進之隨意飲尤宜老少治傷寒八九日間發熱如狂不解小腹滿痛有瘀血桃仁三十個去皮尖麩炒赤色別碎虻蟲三十枚去翅水蛭二十枚各炒川大黃一兩上為末再與桃仁同搗令勻煉蜜丸如小豆大每服二十丸桃仁湯下利瘀血惡物便愈未利再服傷寒可汗附論夫傷寒病汗之而愈者以初得病一日至三日陽經受邪未傳諸陰其邪在表故當發汗此大約也然病數日脈浮太陽證不罷者亦可汗之當以脈證為準凡頭疼發熱惡風振惡是為可汗之證其脈浮者是為可汗之脈陽虛則惡寒脈浮為在表或浮而弱或浮而緊或浮大而數皆宜汗之衄家脈雖得之不可汗故內經曰其在皮者汗而發之證變汗發陽明與太陽合病有惡寒證屬表可汗用升麻湯又太陽陽明合病胸滿而喘麻黃湯陽明本多汗若脈浮無汗而喘可發汗亦用麻黃湯又陽明病脈遲汗出多微惡寒者表未解可與桂枝湯又陽明煩熱汗出如瘧或日晡發潮熱而脈浮虛者並與桂枝湯若脈實者當用承氣湯太陰腹滿脈浮桂枝湯凡太陽證有用五積散者非謂發汗蓋去積耳少陰初得病脈沉反熱者溫之而微取其汗用麻黃細辛附子湯下利手足冷而身熱者非屬通脈四逆湯又少陰病二三日常見少陰而無陰熱中滿之證者用麻黃附子甘草湯微汗之二藥皆陰證傷寒解表之劑陰證初病便屬少陰不待傳次方蔥豉湯治傷寒初覺一二日頭項腰脊痛惡寒蔥白十二莖豉半合炒乾薑炮裂一分麻黃去根節桂去粗皮芍藥各半兩上㕮咀每服五錢水二盞煎至一盞去滓溫服良久投蔥豉熱粥蓋覆出汗蔥粥方治傷寒服蔥豉湯後未得汗再服蔥白十一莖豉三合炒生薑半兩拍碎上用水五盞入前三味煎至二盞半去滓入白米依常法煮粥入少鹽攪勻任意食之衣蓋出汗未汗再服葛根湯治傷寒服蔥豉湯不得汗可服蔥白十四根豉一升綿裹葛根三兩切上㕮咀以水五升煮取二升分為再服溫服取汗不出更服余時用此一服輒汗略不再服救數十人甚效麻黃葛根湯治傷寒初得一二日出汗麻黃一兩半去根節葛根銼柴胡去苗各一兩芍藥三分上搗篩每服五錢水一盞半豉一百粒開口椒一七粒連須蔥白三寸薄荷二十葉同煎至八分去滓熱服後蔥豉湯一盞投之衣覆取汗汗未快再服解毒湯治傷寒初覺煩熱頭腳疼痛柴胡半兩去苗黃芩去黑心荊芥穗各一分上銼如麻豆大每服五錢水一盞半生薑一棗大拍碎煎至八分去滓入生地黃汁一合白蜜半斤更煎三五沸熱服葛根湯治傷寒一二日頭疼壯熱遍身疼痛其脈洪數葛根銼白朮乾薑炮各半兩芍藥半兩麻黃去根節桂去粗皮各三分甘草炙一分半上搗篩每服五錢水一盞煎至八分去滓熱服如脈微即加附子半兩石膏人參解肌湯治傷寒初得一二日頭疼壯熱惡寒脈浮緊者石膏碎麻黃去根節各一兩柴胡去苗人參各半兩桂去粗皮甘草炙各一分葛根銼二兩上搗篩每服三錢水一盞入蔥豉生薑煎至七分去滓熱服不拘時荊芥湯治傷寒初得一二日至三日頭疼痰逆肢體煩躁惡風身熱憎寒者荊芥穗四兩前胡去蘆頭旋覆花各三兩甘草炙二兩白朮半夏湯洗七遍焙乾麻黃芍藥各一兩上搗篩每服三錢水一盞生薑三片棗三枚擘煎至七分去滓熱服不拘時五味桂枝湯治傷寒一二日頭痛體疼發表桂去粗皮葛根銼各一兩麻黃去根節一兩山梔子仁半兩石膏一分上搗篩每服三錢水一盞蔥白一莖切豉三十粒煎至七分去滓熱服良久再服以蔥白稀粥投之微汗即瘥五解湯治傷寒三日內表證不解者麻黃去根節二兩白朮一兩半葛根銼甘草炙銼山梔子仁桔梗炒石膏碎杏仁湯浸去皮尖麩炒各一兩上搗篩每服三錢水一盞入蔥白鹽豉同煎至七分去滓連並熱服不拘時汗出為度六味桂枝湯治傷寒頭痛發熱惡寒解表桂去粗皮麻黃去根節石膏乾薑炮白朮生用蒼朮米泔浸麩炒各一兩上搗篩每服三錢水一盞生薑三片煎至七分去滓連並溫服不拘時衣覆出汗人參湯出聖濟總録治傷寒一日至三日頭痛壯熱煩悶其脈洪數人參一兩白朮半兩甘草炙半兩麻黃去根節桂去粗皮各三分上搗篩每服三錢水一盞生薑三片煎至七分去滓連並溫服不拘時衣覆出汗十味人參湯出聖濟總録治傷寒頭痛體疼寒熱不解調理營衛進飲食解利經絡去久滯風邪人參厚朴去粗皮生薑汁炙桂去粗皮甘草炙銼白朮乾薑白茯苓去黑皮杏仁湯洗去皮尖雙仁麩炒陳橘皮湯浸去白焙各一兩麻黃去根節湯煮掠去沫二兩上搗篩每服三錢水一盞入生薑三片棗一枚擘破煎至七分去滓熱服才覺傷風並三兩服汗出即瘥香術湯出聖濟總録治傷寒二三日頭痛肌熱煩躁不解四肢倦痛可汗蒼朮米泔浸一宿切焙二兩陳橘皮湯洗去白焙防風麻黃去根節湯煮掠去沫焙乾當歸切焙桂去粗皮甘草炙各一兩白茯苓去黑皮吳茱萸洗焙乾炒人參厚朴去粗皮生薑汁炙羌活去蘆各半兩上除桂外銼碎慢火炒黃入桂同粗搗篩每服三錢水一盞入蔥白一寸生薑二片同煎至六分去滓溫服不拘時候蔥豉湯出聖濟總録治傷寒一日至三日以前身熱脈大遍體疼痛汗不出者蒼朮米泔浸去皮銼麩炒黃麻黃去根節湯煮掠去沫焙各二兩甘草炙銼桂去粗皮各一兩上搗篩每服三錢水一盞入蔥白三寸鹽豉二十粒同煎至七分去滓熱服不拘時候前胡湯出聖濟總録治傷寒表不解取汗前胡去蘆頭柴胡羌活芎藭人參枳殼去瓤麩炒甘草炙芍藥各半兩麻黃去根節湯煮掠去沫一兩上搗篩每服三錢水一盞入蔥白三寸煎至七分去滓熱服如要發汗更入薄荷三五葉同煎服訖以厚被蓋覆如人行五里再服徐令汗透遍身即旋去被避風若傷寒後餘毒未解潮熱往來數服即解消飲茯苓湯治傷寒表未解氣脈閉塞津液不通水飲氣停在胸腑結而成痰膈脘痞悶倚息短氣體重多唾頭目旋運嗜臥好眠額角偏痛腠理開疏體常汗出白茯苓去黑皮前胡去蘆芎藭羌活去蘆頭桔梗炒人參獨活去蘆頭甘草炙柴胡去苗各半斤陳橘皮去白四兩上為散每服三錢沸湯點服不計時候或銼如麻豆用前件藥半兩水三盞煎至一盞半去滓分溫二服前胡湯治傷寒頭痛惡寒發熱肢體疼倦前胡去蘆頭羌活去蘆頭各六兩防風去叉四兩薺苨去蘆頭二兩銼桔梗炒三兩蛇蛻皮一兩碎炒令黃蟬殼去土一兩陳橘皮湯浸去白乾稱四兩甘草炙銼一兩半人參二兩上搗篩每服四錢水一盞半入生薑二片薄荷七葉煎至五分去滓溫服桂心湯治四時傷寒初覺桂去粗皮芍藥甘草炙葛根銼各等分上搗篩每服四錢水一盞半生薑二片棗三枚擘同煎至八分去滓溫服麻黃桂枝各半湯治傷寒表解不明麻黃去節桂枝各三兩芍藥杏仁去皮尖各一兩半上㕮咀如法修制每服三錢水一盞半生薑三片棗一枚同煎七分去滓熱服汗出為愈蔥豉湯治傷寒一二日頭項及腰背脊拘急疼痛渾身煩熱惡寒脈緊無汗一名麻黃湯麻黃一兩去節豉二大合乾薑二兩蔥白十五莖上㕮咀每服以水二升先煮麻黃六七沸掠去白沫乾薑煎二十餘沸下蔥豉煎取八合去滓分溫兩服如人行五六里服訖良久煮蔥豉粥熱吃即以衣覆出汗又方治傷寒不得汗取汗最妙良薑一兩丁香五錢上為細末醋和為丸如雞頭實大每服二丸生薑湯下衣被蓋之汗出為度六物青散出千金方治傷寒敕色惡寒附子白朮各一兩六銖防風細辛各一兩十