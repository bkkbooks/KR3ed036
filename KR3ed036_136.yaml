body:
  text: 卷一百三十六傷寒門傷寒頭痛附論夫傷寒頭痛者邪氣循陽脈上攻於頭也是以傷寒傷風溫病熱病風溫病皆有頭痛證者蓋頭痛皆陽證也故太陽頭痛必發熱惡寒陽明頭痛不惡寒反惡熱少陽頭痛脈弦細而發熱至於三陰脈從足至胸皆不至頭惟厥陰脈挾胃屬肝絡膽循喉嚨上頏顙連目出額故仲景只有厥陰頭痛一證治以吳茱萸湯者是也又傷寒頭痛謂邪氣外在經絡上攻於頭所致也難經曰三陽經受風寒伏留而不去則名厥頭痛言三陽之經上於頭爾然傷寒頭痛者太陽專主也何者以太陽之經起於目內眥上額交巔上入絡腦經所謂太陽受病者頭項痛腰脊強又曰七日病衰頭痛少愈雖然陽明少陽亦有頭痛不若太陽之專主也蓋太陽為病屬表而頭痛專為主表證雖有風寒之不同必待發散而後已太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者傷寒也麻黃湯主之太陽病頭痛發熱汗出惡風者中風也桂枝湯主之雖有傷寒六七日不大便頭痛有熱者而與調胃承氣湯下之者又云若小便清者知熱不在裡仍在表也當與桂枝湯以頭痛未去雖不大便六七日其小便清者猶為在表是知頭痛屬乎表者明矣頭痛一切屬三陽經也而陰病亦有頭痛乎太陰少陰二經之脈皆上至頸胸中而還不上循頭則無頭痛之證惟厥陰之脈循喉嚨之後上入頏顙連目系上出額與督脈會於巔病亦有頭痛經曰乾嘔吐涎沫者吳茱萸湯主之者是矣夫頭者精明之府也神明居之小小邪氣作為頭痛者必曰發散而可也其或痛甚入連於腦而手足寒者又為真痛豈能發散而已哉嗚呼頭痛為外疾猶有不可治者又矧臟腑之疾乎又傷寒頭痛者是外中風邪上注腦中三陽之脈受於風寒伏留不去則流傳於心肺故使上焦壅滯心煩鼻塞壯熱頭痛也歌括惡寒發熱太陽經惡熱頭痛胃氣蒸脈細而弦兼發熱少陽頭痛自分明又云三陰本沒頭痛疼若有頭疼屬厥陰非次頭痛涎作病心煩鼻塞濕家尋又論云太陽惡寒發熱頭痛無汗麻黃湯有汗桂枝湯已發汗未發汗頭疼如破者連須蔥白湯不已者葛根蔥白湯陽明頭痛胃氣所蒸也調胃承氣湯少陽頭疼小柴胡湯涎病頭疼瓜蒂搐鼻法濕家鼻塞頭疼瓜蒂搐鼻法出鼻中黃水即愈厥陰頭痛脈必微浮浮者欲愈也不愈者小建中湯外證發熱似瘧者欲愈也宜桂枝麻黃各半湯又云三陰無頭疼唯厥陰有頭疼至吳茱萸證卻云乾嘔吐涎沫頭疼屬少陰以此論之少陰亦有頭疼但稀少耳孫真人云少陰傷寒不壯熱不頭疼其稀少可知少陰身雖有熱而無頭疼厥陰有頭疼而無身熱而又頭疼屬陽證無疑矣歌括頭痛惡冷太陽先惡熱陽明膽細弦濕鼻塞兮痰膈滿厥陰乾嘔吐清涎又頭痛屬三陽陽明少陽皆有之而太陽則專主是也太陽專主頭痛則頭痛之屬表證者居多陽明少陽又次而輕耳以陰經絡上不至頭故無頭痛惟厥陰循喉嚨之後上連目系頂巔有頭痛乾嘔吐涎可用吳茱萸湯一證卻無身熱亦與陰症不同也雖然太陰少陰其經從足至胸並無頭痛是固然耳然風溫病在少陰濕溫病在太陰而頭反痛至於陰毒亦然是又某病則又有某證脈絡相通不可拘也若夫頭痛劇甚入連於腦手足俱寒此則真痛神丹在手其能救乎諸頭疼無熱如聖餅用生薑蔥白煎湯下頭疼脈數發熱惡寒而身不痛左手脈平和此名食積也傷食亦令人頭痛脈數發熱但驗左手人迎脈平和身不疼痛者是也甲乙經云人迎盛緊傷於寒氣口盛緊傷於食左手關前一分者人迎之位也右手關前一分者氣口之位也蓋人迎主外氣口主中以此別之傷食之證由脾胃伏熱因食不消發熱似傷寒卻身不疼痛此為異耳若膈實嘔吐食在上脘宜吐之若心腹滿痛者宜下之治中湯五積散黑神丸可選而用也方石膏散出聖惠方治傷寒頭痛壯熱石膏桂心細辛白朮桔梗去蘆頭乾薑炮製銼薄荷各半兩麻黃去根節赤芍藥附子炮裂去皮臍各三兩分甘草一兩炙微赤銼上搗粗羅為散每服四錢以水一中盞入生薑半分蔥白七寸豉五十粒煎至六分去滓不計時候稍熱服黃芩散治傷寒頭痛心神煩熱四肢不利黃芩甘草炙微赤銼各半兩赤芍藥桂心細辛各三分麻黃去根節前胡去蘆頭各一兩石膏二兩上搗篩為散每服三錢以水一中盞煎至六分去滓不計時候稍熱服治傷寒壅熱頭痛不可忍宜服此方出聖惠方石膏二兩滑石一兩黃芩柴胡去苗赤芍藥前胡去蘆頭犀角屑甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃各三分上搗篩為散每服五錢以水一大盞入淡竹葉三七片煎至五分去滓不計時候稍熱服厚朴散治傷寒壯熱頭痛煩躁無汗厚朴去粗皮塗生薑汁炙令香熟甘草炙微赤銼附子炮裂去皮臍陳橘皮湯浸去白瓤焙麻黃去根節川大黃銼碎微炒各一兩吳茱萸湯浸七遍焙乾微炒乾薑炮裂銼前胡去蘆頭各半兩上搗羅為細散每服三錢以水一中盞入生薑半分煎至六分去生薑不計時候和滓稍熱服以衣覆取汗未汗再服旋覆花散出聖惠方治傷寒頭痛心膈痰壅旋覆花甘菊花芎藭各一兩甘草半兩炙微赤銼皂莢樹白皮三兩塗酥炙赤色上搗羅為細散每服二錢以水一中盞入荊芥七穗煎至六分不計時候和滓熱服甘菊花散治傷寒痰壅頭痛心煩四肢拘急不得睡臥甘菊花旋覆花蔓荊子細辛枳殼麩炒微黃去瓤甘草炙微赤銼各半兩防風去蘆芎藭酸棗仁葳蕤各一兩上搗粗羅為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候溫服治傷寒汗後頭痛不解宜服此方出聖惠方石膏太陰玄精石各一兩麻黃二兩去根節甘草半兩炙微赤銼上㕮咀每服三錢水一中盞入竹葉二七片煎至六分去滓不計時候溫服通頂吹鼻散出聖惠方治傷寒頭痛不止藜蘆一分去蘆頭瓜蒂馬牙硝各二三分龍腦研麝香研各半錢上搗羅為細散研龍腦麝香令勻用少許吹入鼻中得嚏瘥黃芩湯出護命方治傷寒頭痛不止黃芩去黑心石膏研茵陳蒿柴胡去苗桔梗銼炒牡丹皮荊芥穗梔子仁各一分麻黃去根節半兩上粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服一方和滓服吳茱萸湯出金匱方治傷寒厥陰證乾嘔吐涎沫頭痛吳茱萸二三兩洗焙人參一兩半上㕮咀如麻豆每服五錢匕水一中盞半入生薑一棗大拍碎棗三枚去核同煎至八分去滓溫服若急者陰毒甘草湯白朮散附子湯肉桂散回陽丹反陰丹至於陰盛隔陽霹靂散火焰散隨經部分選用之石膏丸出聖濟總録治傷寒頭痛痰盛石膏細研水飛過四兩烏頭去皮臍生用一兩硝石研一兩半太陰玄精石研二兩上搗研為末和勻如粉以生薑自然汁煮麵糊和丸如梧桐子大每服十丸至十五丸荊芥茶下甚者不過三服聖白散出聖濟總録治傷寒頭痛壯熱化痰發汗附子一枚大者炮裂去皮臍白附子生天南星炮半兩白芷一分半夏洗去滑為末生薑汁和作餅焙乾麻黃去根節各五兩石膏碎研一兩麝香研半錢上搗羅六味為末入石膏麝香末同研令勻每服半錢匕熱蔥茶調下甚者連進三服太一散出王氏博濟方治傷寒頭痛附子大者炮裂去皮臍一兩甘草生石葦去毛各半兩石膏研滑石研各二兩上搗羅三味為細散入石膏滑石末同研勻每服二錢匕蔥白薄荷茶調下白蘚皮湯出聖濟總録治傷寒頭痛白蘚皮菊花石膏研荊芥穗各一兩桂去粗皮一分甘草炙半兩麻黃去節二兩上粗搗篩每服三錢匕水一盞煎七分去滓溫服茶調散出聖濟總録治傷寒頭痛不止石膏碎研二兩羌活去蘆頭生用蒼朮去皮甘草半生半炙芎藭茵陳蒿荊芥穗各一兩桂去粗皮半兩上搗羅為散每服一錢匕用臘茶一錢匕同蔥白湯點熱服麝香雙丸出聖濟總録治傷寒頭痛目眩汗出麝香研龍腦研各一分丹砂一兩半研雄黃研木香赤箭各一兩牛黃研白花蛇肉烏蛇肉各酒浸炙乾蠍炒去土羚羊角鎊各半兩天南星炮麻黃去根節各二兩白附子生天麻酒浸焙防風去叉零陵香葉三分藿香葉天雄炮裂去皮臍各三分上搗羅十四味為末入麝香等五味研勻煉蜜丸如小雞頭實大每服二丸細嚼溫酒下不拘時候天南星丸出聖濟總録治傷寒頭痛天南星末二兩石膏末二一兩水飛過上填牛膽中用薄荷包更用荷葉外包於風道中挂以清明節候入龍腦少許滴雪水丸如雞頭大每服一丸嚼薄荷湯下之石膏湯出王氏博濟方治傷寒頭疼不可忍石膏碎麻黃去根節各一兩何首烏去黑皮半兩葛根銼三分上粗搗篩每服三錢匕生薑三片水一盞同煎至八分去滓溫服石膏煮散出聖濟總録治傷寒頭痛石膏研水飛過一兩半旋覆花一兩白蒺藜炒甘菊花山梔子仁茵陳蒿各半兩芎藭一半兩太陰玄精石研半兩上搗羅六味為細末入石膏等研勻每服三錢匕水一盞入荊芥少許同煎至七分不去滓溫服不拘時候一字散出聖濟總録治傷寒頭疼鼻塞芎藭一兩草烏頭炮裂去皮尖一兩半石膏研二兩雄黃二錢醋浸一宿焙研上搗羅三味為散入雄黃末研勻每服一字入臘茶半錢匕蔥白一寸煎湯點服瓜蒂散出聖濟總録治傷寒頭疼胸中滿及發寒熱脈緊而不大者膈上有痰涎用瓜蒂一兩搗羅為散每服一錢匕溫熟水調下吐涎愈人參湯出聖濟總録治傷寒頭痛自汗壯熱身體拘急喘粗骨節痠疼人參甘草炙各二兩桂去粗皮陳橘皮湯浸去白焙白茯苓去黑皮防風去叉五味子柴胡去苗各一兩附子炮裂去皮臍半夏生薑汁浸一復時各半兩上銼如麻豆大每服三錢匕水一盞入生薑二片棗二枚擘破同煎至七分去滓熱服不拘時候麻黃丸出聖濟總録治傷寒解表止頭痛兼治破傷風及一切諸風麻黃去根節湯煮掠去沫焙乾烏頭水浸三日日易曝乾炮裂去皮臍各四兩天南星炮搗末四兩半夏湯洗七遍去滑四兩白芷三兩石膏泥裹火煨通赤研四兩甘草炙銼一兩龍腦研半兩麝香研一分上將八味搗研為末水煮天南星和丸如小彈子大每服一丸蔥茶或蔥酒嚼下薄荷茶亦得連二三服此本白龍丸後又加麻黃作六兩用寒水石石膏末為衣治傷寒至佳小小傷風服之立瘥解表藥中此尤神速白雪丸出聖濟總録治傷寒頭痛三日以里可服烏頭去皮臍附子去皮臍白附子天南星天麻麻黃去根節甘草並生用各等分上搗羅為末水浸宿炊餅和丸如櫻桃大火煅寒水石粉為衣每服一丸熱酒或蔥茶嚼下良久以熱粥投之前胡湯出聖濟總録治初得傷寒頭痛壯熱前胡去蘆頭半夏湯浸七遍去滑生薑汁製切焙玄參堅者旋覆花甘草炙銼桂去粗皮黃芩去黑心桔梗銼炒各一兩生乾地黃焙二兩上粗搗篩每服五錢匕水一盞半生薑五片煎至八分去滓熱服不拘時候四白散出聖濟總録治傷寒頭痛身熱百節疼痛蒺藜子炒去角白芷白附子炮白殭蠶炒各等分上搗羅為散每服二錢匕茶清或酒調下不拘時候太陽丹出和劑方治傷寒頭痛感風氣積偏正夾腦一切頭疼風壅痰盛咽膈不利並宜服腦子二兩別研川芎甘草白芷各一斤石膏別研二斤大川烏炮去皮臍一斤上為細末蜜同麵糊丸每兩作一十八粒硃砂為衣每服一粒薄荷茶嚼下乾葛湯出經驗良方治傷寒頭痛不可忍者石膏二兩麻黃去根節乾葛川芎各一兩上為細末每服四錢薑三片水一盞煎至七分溫服治三陽頭痛出濟生拔粹方羌活防風荊芥升麻葛根白芷柴胡川芎芍藥細辛上以連須蔥白煎服分兩旋加若陰證頭痛只用溫中藥足矣乃理中薑附之類是也石膏湯太陽病氣逆面赤頭痛目疼不可忍者石膏二兩碎綿裹防風二兩葛根一兩芍藥一兩前胡一兩蔥白並根三莖生薑二兩切上以