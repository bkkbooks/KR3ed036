body:
  text: 卷三百四十六産後諸疾門産後惡露不盡腹痛附論夫産後惡露不斷者蓋由臟腑有冷肺氣不調和既産之後惡露乘虛不能制約淋瀝不斷久不已則經血不榮臍腹堅痛面色焦黃氣短不足是其證也治法宜溫補之劑凡妊娠當風取涼則胞絡有冷至於産時其血必少或新産而又風涼皆令風冷搏於血血則壅滯不得宣通蓄積在內則有時惡露不下盡故腹痛也凡婦人大産後或腹臍腰痛乃敗血惡物之致然也醫者便作虛冷以燥熱藥治之誤人多矣難經曰諸痛為實實者熱也可用導水丸禹功散瀉三五行然後以玉燭散和血通經降火益水之藥治之慎不可便服黑神散燥熱之藥當同半産治之方桃仁湯出千金方治産後往來寒熱惡露不盡桃仁五兩吳茱萸二升黃耆當歸芍藥各三兩生薑醍醐百鍊酥柴胡各八兩上㕮咀以酒一斗水二升合煮取三升去滓適寒溫先食服一升日三甘草湯出千金方治産乳余血不盡逆搶心胸手足逆冷唇乾腹脹短氣方甘草芍藥桂心阿膠各三兩大黃四兩上㕮咀以東流水一斗煮取三升去滓內阿膠令煬分三服一服入腹中面即有顏色一日一夜盡此三升即下腹中惡血一二升立瘥當養之如新産者大黃湯出千金方治産後惡露不盡大黃當歸甘草生薑牡丹芍藥各三兩吳茱萸一升上㕮咀水一斗煮取四升去滓分四服一日令盡加人參二兩名人參大黃湯蛇黃散出千金方治産後血傷不止或下血痢以蛇黃二十枚火煅醋淬七遍搗羅為散每服三錢米飲送下蒲黃湯出千金方治産後余疾有積血不出腹大短氣不得飲食上衝胸脅時時煩憒逆滿手足悁疼胃中結熱蒲黃半兩大黃芒硝黃芩甘草各一兩大棗三十枚上㕮咀以水五升煮取一升清朝服至日中下若不止進冷粥半盞即止若不下與少熱飲自下人羸者半之千金翼名大黃湯而不用芒硝銅鏡鼻湯出千金方治産後余疾惡露不除積聚作病血氣結搏心腹疼痛銅鏡鼻十八銖燒末大黃二兩半芍藥乾地黃芎藭乾漆芒硝各二兩亂髮雞子大燒大棗三十枚上㕮咀以水七升煮取二升二合去滓內發灰鏡鼻末分三服小銅鏡鼻湯出千金方治産後余疾惡露不除積聚作病血氣結搏心腹疼痛銅鏡十銖燒末大黃甘草黃芩芒硝乾地黃各三兩桃仁五十枚上㕮咀以酒六升煮取三升去滓內鏡鼻末分三服亦治遁尸心腹痛及三十六尸疾梔子湯出千金方治産後流血不盡小腹絞痛用梔子三十個以水一斗煮取六升內當歸芍藥各二兩蜜五合生薑五兩羊脂一兩於梔子汁中煎取二升分三服日三生地黃湯治産後三日至七日腹中余血未盡絞痛強滿氣息不通生地黃五兩生薑三兩大黃芍藥茯苓細辛桂心當歸甘草黃芩各一兩半大棗二十枚上㕮咀以水八升煮取二升半去滓分三服日三麻子酒出千金方治産後血不去用麻子五升搗碎以酒一斗漬一宿明旦去滓溫服一升先食服不瘥夜服一升不吐不下忌房事一月將養如初産法升麻湯出千金方治産後惡物不盡或經一月半歲一歲方用升麻三兩以清酒五升煮取二升去滓分溫二服當吐下惡物為良治産後惡血不盡腹中絞刺痛不可忍方出千金方大黃黃芩桃仁各三兩桂心甘草當歸各二兩芍藥四兩生地黃六兩上㕮咀以水九升煮取二升半去滓食前分三服治産後惡血不除四體並惡方出千金方用續骨木二十兩碎如算子大以水一斗煮取三升分三服相去如人行十里久間食粥或小便數或惡血下即瘥此木得三遍煮羚羊角散出肘後方治産後惡血下不盡煩悶腹痛治産後余血不盡奔上衝心煩腹痛出千金方搗生藕取汁飲二升甚驗一方飲一升治産後有血心煩腹痛出大全良方用生地黃汁不拘多少以清酒一升將生地黃汁和煎二十沸分三服又方出千金方用赤小豆搗散取東流水和服方寸匕不瘥更服亦治心悶目不開治産後血不可止者方出聖惠方干菖蒲三兩以酒五升漬煮取三升分再服即止桃仁湯出大全良方治産後惡露方行忽然漸少斷絶不來腰中重痛不止兩腹痛如錐刀刺痛入骨中此由血滯於經絡不即通之有大痛處必作癰疽宜桃仁湯恐作癰者預服五香連翹湯桃仁去皮尖蘇木生地黃各半兩虻蟲去足翅炒水蛭炒各三十個上為粗末每服三錢水一盞煎至六分去滓溫服無時候惡露下即住服五香連翹湯産經治産後惡露不絶者由産後傷於經血虛損不足或分解之時惡血不盡在於腹中而臟腑挾於宿冷致氣血不調故令淋漓不絶也木香沉香丁香乳香麝香升麻獨活桑寄生連翹木通各二兩上為粗散每服五錢水二盞入竹瀝少許攪停去滓溫服一方有大黃一兩療産後惡露不多出大全良方川牛膝大黃各八分牡丹皮當歸各六分芍藥蒲黃桂心各四分上為末生地黃汁調酒服方寸匕日二服血下愈沒藥丸出大全良方治産後惡露方行忽然斷絶驟作寒熱臍腹百脈皆痛如錐刺非常此由冷熱不調或思慮動作氣所壅遏血蓄經當歸一兩桂心芍藥各半兩桃仁去皮尖炒碎研沒藥研各一分虻蟲去足翅炒水蛭炒各二十個上為末醋糊丸如豌豆大醋湯下三丸澤蘭湯出千金方療産後惡露不盡腹痛往來兼胸滿少氣蓋産後惡露不盡腹痛者何答曰産後惡血雖常通行或因外感五邪內傷七情致令漸然而止余血停積壅滯不行所下不盡致令腹痛皆因妊娠當風取涼則胞絡有冷至於産時其血必少或新産時而取風涼皆令風冷搏於血血則壅滯不得宣通蓄積在內有時惡露不盡故令腹痛急引腰背甘草六分大棗十四個上細切以水九升煮取三升分為三服日三墮身欲死服益瘥救急惡露不盡腹脹痛取亂髮如雞子灰汁洗淨燒為灰酒調服二錢又療産後血不盡痛悶方出肘後方取荷葉燒作灰暖水和服煮取汁亦良一方熬令香為末煎水下方寸匕又方便産須知治産後下血及妊娠腹脹以鐵稱錘一枚燒赤投酒五升中用此酒煮當歸三兩取二升去滓溫再服千金同一方無當歸療産後下血不盡腹內堅痛不可忍出永類鈐方當歸芍藥桂心各三兩桃仁一百二十個上細切以水六升煮取二升分溫二服如未瘥加大黃三兩治産後惡露不盡腹痛無計出永類鈐方青木香當歸牛膝川芎黃耆芍藥各八分大黃十三分浸芒硝十二分上細切以水七升煮取二升入大黃更煎三沸分三服治産後惡露不盡結聚小腹疼痛出永類鈐方當歸三分香附子一兩琥珀沒藥青皮醋炒赤芍藥木香桂心各半兩上為細末以豆淋酒調下一錢地黃飲出拔粹方治産後惡露不盡腹內㽱痛産後常服甚妙生乾地黃當歸並略炒各一兩生薑細切如蠅頭大新瓦上炒令焦黑半兩上為細末以薑酒調下一大錢紫金丸一名失笑散出大全良方治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食亦治久有瘀血月下不調黃瘦亦治心痛五靈脂淘去石沙乾醋炒末真蒲黃上以好米醋調五靈脂末慢火煎成膏子次以蒲黃末搜和丸如櫻桃大每服一丸水與童子小便各半盞煎至七分令藥化溫服之少頃再一服惡露即下久有瘀血成塊月水不利並用酒磨下及治心腹痛欲死百藥不效生地黃湯治産後余血不盡奔沖心煩悶腹痛沒藥丸出大全方治産後心胸煩躁惡血不快沒藥研蠻薑延胡索乾漆炒當歸桂心牛膝牡丹皮乾薑各等分上為細末醋煮麵糊為丸如梧桐子大煎麵湯下十丸至十五丸大調經散出經驗良方治産後血虛惡露未消氣為敗滯營衛不調陰陽相勝憎寒發熱或自汗或沖滿皆氣血未平之所為也大豆一兩半炒去皮茯神一兩真琥珀一錢上為細末濃煎烏豆紫蘇湯調下喘急煩滿小便不利者亦可治産後穢不盡痛出聖惠方用玄胡索為末熱酒調下三錢服之治産後惡物上潮痞結大小便不通出神效方芒硝蒲黃細墨各等分上為末童子小便半盞服之玉燭散以四物湯承氣湯等分水煎去滓食前服當歸養血丸出和劑方治産後惡血不散發熱疼痛及惡露不快臍腹堅脹並室女經脈不調赤白帶下心腹腰腳疼痛當歸赤芍藥牡丹皮延胡索各二兩炒桂心一兩去皮上為末蜜丸如梧桐子大溫酒米飲下三十丸食前溫服痛甚細嚼咽下青金散治婦人産後惡露不快腰腹疼痛當歸一兩焙甘草半兩炒沒藥自然銅三兩醋淬上為末每服一錢熱醋食前調下走馬散出海上方治産後惡露不散臍下疼若刀攪幾死者當歸一兩紅花二錢半蘇木二錢半沒藥二錢半官桂去皮二錢半上為末每服三錢好酒一大盞煎三五沸和滓溫服食先遇仙湯治惡露不快腸痛滿脹者血室有冷滯不快若腹疼如刺者舒眉煎噁心者壯氣丸熱者逍遙散無憂散主之當歸桂心各半兩白芷甘草各三分上㕮咀水煎食前熱服治婦人小産惡物滯注不通兩脅脹滿小腹絞痛不可忍者或變成乾血氣五心煩熱月水不通並治之當歸芎藭芍藥熟地黃各一兩川楝子和研用延胡索各二兩上為末每服二兩重水八合好酒大盞煎至七分去滓溫服空心服滓再煎取下惡物為妙治産後余血不盡流入腰腳疼痛至甚者用五積散加桃仁煎服一名如神湯此藥速敗血去風濕産後惡露方行忽然斷絶不來腰中疼注兩腿刺痛如錐刀痛入骨此由血滯於經絡不即通之有大痛處必作癰疽宜桃仁湯恐作癰者預服五香連翹散治産後惡露不快及血暈以三月採取益母草洗擇令乾於箔上攤曝令乾別用拔斷可長五寸以來勿用刀即置鍋中以水二碩以來令草上水深二寸三寸煎煮令益母草爛水三分減二漉出草取五六斗汁瀉入盆中澄之半日以來以綿濾取清汁盆中滓澱盡棄之其清汁於小釜中慢火煎取一斗以來如稀餳每取梨許大熱酒和服之日再服水和羹粥一二服瘥如遠行不能稀煎即更煉可丸每服之七日內則疼痛漸瘳七日平復治女子胞中余血不盡欲死者並治煩悶腹痞上方用鹿角燒灰以清酒調服方寸匕日三夜煮豉汁調服亦得不能用豉汁煮水作湯用之治産後猶覺有餘血水氣用黑豆五升淋酒煎之令煙絶出於瓷器中以酒一斗淬之治破産婦滯血用鯉魚燒至煙絶研酒送下治産後穢㽱下不盡腹疼用生薑二斤以水煮取汁服即出治破血以漬苧與産婦溫服之黃芩湯治産婦腹中滿疼惡露不盡黃芩去黑心芍藥赤茯苓去黑皮大黃熟乾地黃焙各一兩厚朴去皮薑汁炒乾薑炮製桂去皮各一兩一分虻蟲去翅足炒甘草炒桃仁湯浸去皮尖雙仁炒黃各半兩枳實去瓤麩炒白朮各一兩半芒硝一兩上粗搗篩每服三錢水酒共一盞煎七分去滓溫服地黃湯治産後腹疼余血未盡不進飲食芍藥甘草炙各一兩丹參一兩半上搗篩每服三錢水一盞煎至七分去滓入地黃汁一合蜜半合生薑汁一合煎數沸空心溫服芎藭湯治産後惡血不下盡心腹㽱痛芎藭一兩半大黃銼炒二兩芍藥一兩半黃芩去心一兩桂去皮一兩甘草炙一兩當歸切焙二兩熟乾地黃焙一兩桃仁湯浸去皮尖雙仁炒黃各半兩上搗篩為末三錢水一中盞煎至七分去滓空心服牡丹飲治産後腹中惡血不除苦身強痛牡丹皮一兩大黃炒一兩桂去皮一兩桃仁湯浸去皮尖雙仁炒令黃四十枚上搗篩每服三錢水一盞煎至七分去滓空心溫服當歸湯治産後惡血不盡當歸切焙三兩桂去皮二兩荷葉蒂三七枚上搗篩每服三錢水一盞酒一盞入薑三片同煎至七分去滓溫服早夜各一服蒲黃飲治産後惡血不盡攻心乏力腹痛脹滿頭痛蒲黃炒一兩半芒硝研三分芎藭半兩桂去皮半兩鬼箭半兩生乾地黃焙半兩桃仁炒二十枚上搗篩每服三錢棗二枚擘水一盞煎至七分去滓溫服地黃飲治産後惡血不下或有熱補虛