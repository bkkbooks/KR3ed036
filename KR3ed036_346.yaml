令婦人知之又方出千金方用燒鯉魚頭為末酒服三指撮鯽魚湯出千金方下乳汁鯽魚長七方豬肪漏蘆石鐘乳各八兩上切豬肪魚不須洗治清酒一斗二升合煮魚熟藥成絞去滓適寒溫作五服其間相去須臾一飲令藥力相及為佳乳即下療乳汁不下出聖惠方鼠肉五兩羊肉六兩獐肉八兩上作草臛啖之勿令食者知湧泉散出聖惠方療乳無汁亦治乳結癰腫用穿山甲洗一兩灰炒令燥為細末酒調服方寸匕日三一方煎木瓜湯調亦可無時一方塗醋炙令黃色治下乳方大麻仁去殼生蝦上同研爛去滓用酒水各一盞瓦罌灰至一盞半有餼食後臨溫服仍用被覆睡乳即通流又方出永類鈐方葵菜子炒香縮砂仁各等分上為細末每服二錢酒調下滋益氣脈營衛行津液鍾乳粉散出和劑方療乳婦氣少血衰脈澀不行乳汁絶少用煉成鍾乳粉研濃煎漏蘆湯調下二錢療産婦乳無汁便産須知木瓜根漏蘆各二兩甘草二兩通草四兩上以水八升煎取二升分溫三服忌如常法一方加桂心併為末飲服方寸匕又方用豬臟如食法煮粥食之驗治下乳立效方出拔粹方糯米粳米各半合萵苣子一合併淘淨生甘草半兩上煎汁一升研煎藥令細去滓分作三服立下下乳方用漏蘆栝蔞皆要藥或云多食豬蹄羹栝蔞取子淨洗炒令香熟捶碎取仁研細瓦上攤浥令白色研為細末溫酒調下一錢服了合面時臥未效再作漏蘆散出危氏方療乳婦氣脈壅塞乳汁不行及經絡凝滯奶脹痛留蓄邪毒或作癰腫此藥服之自然內消乳汁通行漏蘆二兩半蛇蛻十條炙栝蔞十個急猛炭火燒焦存性上為末溫酒調下二錢無時候服藥後即以豬蹄羹投之即效經驗方有牡蠣並燒存性又方出永類鈐方用牡蠣煅為末酒調二錢服玉露散便産須知治産後乳脈將行産三日後體熱頭痛胸腑氣刺不可便作傷食傷寒此是乳脈將行如此人參茯苓甘草半夏制桔梗川芎遠志去心當歸芍藥各等分上銼每服三錢水盞半生薑三片煎大半盞服治産後無乳汁出仁存方漏蘆通草天花粉各一兩甘草半兩上㕮咀每服半兩水一碗豬懸蹄甲二個濃煎食後服治産後無乳出海上名方用薜荔葉焙研為末每服二錢溫酒調下治下乳出危氏方用麥門冬不拘多少去心焙為末以酒磨犀角約一錢末多溫酒調麥門冬末二錢不過二服便下不拘時候湧泉散出衛生寶鑑治婦人奶汁因氣絶少瞿麥穗麥門冬去心緊龍骨穿山甲炒黃王不留行上為細末每服一錢熱酒調下後吃豬蹄羹少許又用木梳左右乳上梳二三十梳日三服依前法一方無穿山甲又方出濟生拔萃方治奶汁少栝蔞根薄荷干身等分酒調服上為粗末先吃羊骨汁一碗次服藥後再吃蔥懸羊羹湯少許汁出效湧泉散出保慶集治婦人新産之後乳汁全少或因動氣煩惱乳汁少者或因久病結過無乳者並宜服之肉果一枚生芝麻一合退皮穿山甲十片炙胡桃仁七個去皮上為末除胡桃仁芝麻外二味為細末再入胡桃仁芝麻一同搗為膏每服一匙好酒調下合面睡一時後用豬蹄湯投之又用木梳二個梳兩乳千餘遍其乳自下如湧泉隔日再進一服下乳汁用鼠作臛勿令知與食婦人無乳汁出仁存方用牛鼻作羹空心食之不過三兩日有汁下無限若中年壯盛者食之良又宰之尚不堪食非論自死者治産婦及下乳汁用蘩蔞煮食之治乳無出肘後方用獐肉作臛食勿令婦人知治婦人乳無汁用豬蹄四個合如食法以水二斗煮取一斗去蹄用土瓜根通草漏蘆各三兩以汁煮取六升去滓內蔥白豉如常著少米煮作稀蔥豉粥食之食了或身體微微熱有少汗出佳乳未下更三兩劑大驗治婦人乳無汁用野豬脂煉令研細成膏每以一匙和酒一盞服之日三服如服十日可供三兩孩兒乳哺本來無乳者服之亦有青蹄者不可食治下乳汁用京三稜個為㕮咀水二碗煎取一碗洗奶取汁為度極妙治下乳汁出肘後方産前食素得疾羸弱産後乳脈不行諸藥不效用赤小豆煮取汁飲即或如常煮粥食之乳脈通行如聖散治産後乳不流行下奶地膽草栝蔞根萵苣子各等分上為末每服二錢溫蔥調酒下日三四服漏蘆散出聖惠方治乳無汁下乳漏蘆三分栝蔞根王瓜根各一兩木通銼二兩蠐螬研二枚上搗研勻每服食後溫酒調下日再服漏蘆湯出聖惠方治産後乳無汁漏蘆去蘆頭木通各一兩鍾乳半兩上銼如麻豆大每服三錢水一盞黍米半合同煎候米熟濾去滓溫服不拘時桔梗湯治産後乳汁不下桔梗一兩炒漏蘆去蘆頭鍾乳粉各半兩蠐螬三分炙乾上粗搗篩每服三錢水一盞煎至六分去滓溫服不拘時木通飲治産後乳汁少或不下木通銼一兩半甘草炙銼枳殼去瓤麩炒各半兩芍藥漏蘆去蘆頭桑根白皮銼黃芩去黑心各半兩淡竹葉一握切上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時豬蹄湯治産後乳汁少或不下豬蹄四隻以水五升煮汁三升澄清瞿麥去梗漏蘆去蘆頭木通銼各一兩上三味粗搗篩每服三錢水一盞豬蹄汁一盞煎至七分去滓溫服無時王瓜酒治乳汁不下用王瓜不計多少以酒煮至爛熟飲酒嚼王瓜下其乳自通也豬蹄湯治産後因病乳汁少或不下母豬蹄一具細切白油麻二合洗研細蠐螬七枚炙乾為末上先將豬蹄用水五碗煮令熟入研了油麻再煮俱熟卻入蠐螬末略者便傾出細絹濾澄清時暖一盞飲之不拘時寄生湯治産後乳汁不下用桑寄生三兩握細銼粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時栝蔞散出千金方治産後乳無汁用栝蔞根五兩切焙乾羅為散每服二錢匕以白粥飲調下溫酒亦得早晨日午至夜各一服一方燒灰米飲服酒煮服亦得治産後乳汁不下木通銼鍾乳細研為粉麥門冬去心焙各半兩上為散每服二錢食後溫酒調下日再方寸匕日三兩服效千金方同有理石二方出産寶湧泉散出德生堂治生子無乳王不留行半兩木香蒼朮各二錢半白芍藥一錢半當歸二錢半陳皮一錢穿山甲炮一錢半上為細末每服二三錢好酒調食後臨臥次日用肥豬肉煮用米浸檑粉下豬肉汁內作羹食之大效木通散出聖惠方治産後氣血虛津液少令乳無汁木通二兩炒栝蔞根一兩漏蘆一兩麥門冬一兩半去心焙蘆根三分銼人參半兩去蘆頭赤茯苓一兩大腹皮一分銼陳橘皮半兩浸湯去白瓤焙茅根三分銼甘草一分微炙銼上為散每服四錢以水一中盞入蔥白五寸煎至六分去滓不計時候溫服栝蔞散出聖惠方治産後乳無汁栝蔞根一兩漏蘆一兩枳殼麩炒微黃去瓤赤芍藥甘草炙微赤銼桑根白皮黃芩各二分木通一兩銼上為散每服四錢以水一中盞煎至六分去滓不計時溫服又方出聖惠方鍾乳粉二兩半硝石三分木通三兩銼桔梗三分去蘆頭上先搗後三味粗羅為散每服四錢以水一中盞入蔥白七寸生薑半分煎至六分去滓不計時候調鍾乳粉一錢漏蘆散出聖惠方治産後乳汁不下心胸妨滿漏蘆一兩木通一兩半銼土瓜根二兩滑石一兩半上為散每服四錢以水一中盞入蔥白五寸煎至六分去滓不計時候溫服又方出聖惠方蔥白一握豬蹄四枚去毛切木通一兩銼栝蔞根一兩澤瀉一兩麥門冬一兩去心上以水三大盞煎取一盞半去滓不計時候分為四服葫蘆根散出聖惠方治産後上焦壅熱乳脈不通葫蘆銼芍藥漏蘆麥門冬去心焙各半兩上為散不計時候蔥湯調下二錢又方出聖惠方治産後乳汁少及不下麥門冬一兩半去心焙鍾乳粉半兩理石半兩土瓜根半兩花桑椹半兩蠐螬半兩微炒上細羅為散不計時候以溫酒調下二錢又方出聖惠方栝蔞根一兩鍾乳粉一兩半漏蘆半兩滑石半兩木通三分銼上細羅為散不計時候以溫酒調下一錢神效方出聖惠方治産後乳汁不通葵子一分土瓜根一兩漏蘆半兩上細羅為散不計時候以溫酒調下二錢又方出聖惠方葡萄根末萵苣子末各一兩上以水一大盞煎至七分去滓分二服各根秋夏心葉又方出聖惠方王不留行土瓜根各一兩上細羅為散不計時候以熱酒調下二錢又方出聖惠方豬蹄四隻銼蔥白一握切木通二兩銼上以水三大盞煎取一盞半去滓分溫四服一日服盡效又方出聖惠方用蠐螬三枚漿水一大盞入蔥白二七寸煎至八分去蔥下蠐螬更煎三兩沸分溫二服又方出聖惠方用烏油麻三合炒熟用湯研取汁不計時候服一小盞效又方出聖惠方用葫蘆根搗羅為末不計時候以溫酒調下二錢母豬蹄湯出便産須知治乳婦氣少血衰脈澀不行乳汁絶少母豬蹄一隻制如食法通草細切四兩上以水一斗浸煮得四五升食後服取汁飲不下更作服了用梳頭木梳於乳上梳下效一方棉裹煮羹食一方酒五升浸飲之不出更作外臺云豬蹄不炙以水一斗煮取四升更煮飲之漏蘆散出王氏博濟方治産後下奶漏蘆地錦蔓荊子各等分上件三味同杵羅為末每服溫酒調下産乳方臨産救急方用栝蔞實與童便和煎又方貽産救急方用紅花酒煮濃汁服神應丸治下藥王不留行穿山甲炮白藥子上等分停為末用好面四兩拌在一處食後藥每服三錢豬肉湯調下玉泉散治婦人無奶上用甘遂一錢為末溫水調服後用手操磨乳即至産後無乳汁用肥萵苣五根一味煎湯吃乳汁自然通下乳豬蹄汁調六益散木梳掠之若乳汁溢滿急痛但溫石以尉之若因乳汁多兒乳不可止然者燒雞子黃食五六枚産後乳無汁者燒鵲巢三指撮酒服之又末土瓜根半錢匕若石膏一匕米飲服之日三若産乳值反支月當在牛皮灰上勿令血著地則然人及洗濯背以器貯之過此忌月乃止數反之法女子年十三反支七月十四反支八月其他依次數周而復始也下奶藥出肘後方上白殭蠶末兩錢酒調下少頃以芝麻茶一錢熟投之投酒數遍奶如泉湧泉湯出楊氏家藏方治血氣凝滯奶脈不行白藥子三兩栝蔞根二兩蛇蛻皮半兩炙黃漏蘆去苗半兩上件為細末每服三錢溫酒調下不拘時候胡桃散出楊氏家藏方治下乳萵苣子胡桃肉去澀皮各等分上件研細每服三錢熱酒調下不拘時候治下乳取蜆螬煮服良治産後乳無汁以栝蔞末井花水服方寸匕日二服液梳出一方栝蔞子淘洗控干炒令香熟瓦上㩉令白色為末酒調下一匕合面臥少時治下乳汁以狗四腳蹄煮飲之治産乳雞子不得與桑椹子食令兒心寒治不乳以莨菪藥一撮以酒飲之淳于意傳云災川王美人懷子而不乳以此飲之旋乳且不乳豈熱所治産後妒乳附論夫妒乳者由新産後兒未能飲之及飲乳不泄或斷兒乳捻其乳汁不盡皆令乳汁蓄積與血氣相搏即壯熱大渴引飲牢強掣痛手不得近是也初覺便以手助捻去其汁並令旁人助嗍引之不爾成瘡有膿其熱熱盛行則癰成也千金云産後宜勤擠乳不宜令汁蓄積不去便結不復出惡汁於內引熱溫壯結堅牽掣痛大渴引飲乳急痛手不得近成妒乳非癰也急灸兩手魚際各二七壯斷癰狀也不復惡手近乳汁亦自出便可手助迮捋之則乳汁大出皆如膿狀內服連翹湯外以小豆薄塗之便瘥牡丹皮散治産後妒乳壅疼痛牡丹皮威靈仙洗焙黃耆銼桂去粗皮當歸切焙大黃酒蒸切炒各一兩上為散每服二錢溫酒調下不拘時候日三鹿角散治産後妒乳鹿角一兩半故靴頭二枚上燒灰研細每服二錢煎當歸溫調下不拘時服鐵粉散治産後妒乳成癰鐵粉研細辛去苗葉芎藭人參防風去叉乾薑炮黃芩去黑心桂去粗皮芍藥各一兩當歸切焙甘草炙各二兩肉蓯蓉酒浸切焙一兩上為散每服三錢酒調下四五服或膿血敗壞自出為效雞屎散治産後妒乳成癰雞屎炒乾一兩麝香半錢細研上為散每服一錢煎荊芥酒溫調下不拘時候二灰散治産後乳汁不泄結滯不消熱腫蔓荊實燒存性皂莢刺燒存性各一兩麝香半錢上合研為散每服二錢溫酒調下不拘時敷乳方治産後妒乳結腫不消熱痛升麻木香檀香各半兩上各取成塊者逐味就沙盒內用酒少許帶濕磨三味相等即用鵝羽刷敷乳上如干以水潤之常令溫潤一日兩次敷之連翹散出聖惠方治産後妒乳腫痛壯熱欲結成癰宜服連翹一兩川升麻一兩漢防己一兩黃芩一兩川大黃二兩銼碎微炒川芒硝一兩柴胡一兩去苗赤芍藥一兩甘草一兩炙微赤銼犀角屑一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃上搗粗羅為散每服三錢以水一中盞煎至六分去滓每服於食後溫服又方出聖惠方取葵子一兩搗細羅為散每於食前以溫水調下一錢酒服亦可一方無灰酒服治産後妒乳生瘡方出聖惠方露蜂房車轍中土豬甲中土以上等分上搗細羅為散以醋調塗之治産後兒不自飲乳入及失兒無兒飲乳令乳蓄積不泄致乳上結乳腫者宜服此方出聖惠方用赤小豆二合搗羅為末以雞子白和塗乳上令消結也若飲兒無不泄煮數捏去之亦可令大人含冷水使為吮取乳汁吐去之不含水吮有熱氣喜冷乳頭作瘡乳孔塞也治産後乳頭生小熱瘡搔之黃汁出浸淫百療不瘥名為妒乳者方出聖惠方上檞樹白皮銼三升水一斗煮取五升夏令用之秋冬溫服之日二度以洗乳及瘡諸深敗爛畢敷膏散又方出聖惠方取天麻草切五升以水一斗煮取六升去滓微暖用洗乳以殺癢為度此草藥葉如麻冬生夏花如鼠尾花也亦可以洗浸淫黃爛熱瘡疸疽陰蝕小兒頭瘡洗之並瘥治産後妒乳乳硬欲結膿方出聖惠方以鹿角於石上著水磨取白汁旋塗於上干即又塗仍令大人吮卻奶中黃汁瘥治産後妒乳腫痛方出聖惠方取紫檀香以醋濃磨塗乳上即瘥又方出聖惠方以川升麻醋磨塗之又方出聖惠方以生地黃爛搗敷之妒乳方出聖惠方黃芩白蘞芍藥各等分上下篩漿水服一錢匕日三若右乳結捋去左乳汁左乳結即捋去右乳汁服即消又方出聖惠方取柳白皮酒煮令熱以物裹尉乳上即消又方用苦酒磨青木香以摩上良又方出聖惠方己入腹者麝香薰陸香青木香雞舌香各一兩以水四升煮取二升分再服忌蒜面酒牛馬豬肉一方為細散食後以溫水調下一錢治婦人妒乳癰瘡雄黃䕡茹膏雄黃白蘞雌黃䕡茹各一分切亂髮如雞子一枚上以豬脂半斤合煎三沸去滓乃內亂髮發盡藥成以塗瘡不過十日瘥又方治妒乳及癰腫用雞屎末服方寸匕須臾三服愈亦治乳頭破裂主暴患赤腫亦治女人妒乳腫出本草以生榆皮三兩搗和三年醋滓封之六七日易治妒乳出本草用梁上塵醋和塗之治女子妒乳腫出本草預知根生搗後和鹽醋漿水煮取汁洗之五六度治婦人乳癰汁不出內結成膿腫名妒乳出本草以蜂房燒灰研每服二錢水一中盞煎至六分去滓溫服
