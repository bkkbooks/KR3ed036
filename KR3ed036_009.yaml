body:
  text: 卷九運氣圖甲申歲圖少陽相火司天厥陰風木在泉中見太宮土運歲土太過氣化運行先天火化為天氣清化為左間黅化為司氣故天氣正而其政嚴酸化為地氣灼化為居氣藏化為右間故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼故風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起火化二雨化五風化八正化度也羽蟲靜毛蟲育歲物之宜也裸蟲耗清毒不生地氣制之也民感其氣者其病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上沸腫色變是歲陽為天氣陰為地氣中見土運木生火火生土下生上天氣盈宜於年前先取化源以平天氣之火抑其運土贊所不勝暴過不生苛疾不起歲宜咸宜辛宜酸滲之泄之漬之發之運異風熱少用寒化其化上鹹寒中酸和下辛涼藥食宜也歲半之前少陽主之火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺診在手天府之脈法宜平以鹹冷佐以甘苦以酸收之以苦發之以酸復之歲半之後厥陰主之木能勝土地氣制運風淫於內地氣不明平野昧草乃早秀民病灑灑振寒善伸數欠心痛肢滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣快然如衰身體皆重法宜治以辛涼佐以苦以甘緩之以辛散之歲運之化土太過紀曰敦阜是謂廣化厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢其化圓其氣豐其政靜其令周備其動濡積並稸其德柔潤重淖其變震驚飄驟其化兼其所勝其病腹滿四肢不舉故曰歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則肌肉萎足痿不收行善瘛腳下痛飲發中滿食減四肢不舉變生得位風雨大至其病腹滿溏泄腸鳴反下甚診在足太溪之脈其法治以咸和初之氣自癸未年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陰火中見土運木生火地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血傷脅滿膚腠中瘡宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣太陰土中見土運氣與運同火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻是氣也用涼遠涼無犯司氣之涼三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陽火中見土運火當其位天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣陽明金中見土運歲土得位與金相生涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣太陽水中見土運金生水陽乃去寒乃來雨乃降氣門乃閉剛木早凋民避寒邪君子周密是歲土運制之寒邪乃微宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣厥陰木中見土運地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻六氣之治此其道也若乃歲氣之交天氣火勝者當有太陽之復地氣風勝者當有陽明之復各依其復法治之乙酉歲圖陽明燥金司天少陰君火在泉中見少商金運歲金不及氣化運行後天少商之金不及而同天化是謂天符又金運臨酉是謂歲會上與天符下與歲會三合為治名曰太乙天符氣至平也平金之歲紀曰審平收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其政徑肅其候清切其令燥其類金其應秋其谷稻其果桃其實谷其蟲介其畜雞其色白其味辛其音商其數九其物外堅其在人也其藏肺其主鼻其養皮毛其病咳此運化也天地之氣天氣為燥化左間為藏化右間為明化故天氣急而其政切地氣為苦化左間為柔化右間為動化故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃至風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤蟄蟲乃見流水不冰金火合德上應太白熒惑其谷白丹間谷命太者其耗白甲品羽故曰熱化寒化勝復同邪氣化度也燥化四清化四熱化二正化度也歲物之宜則介蟲靜羽蟲育地氣所制則介蟲耗寒毒不生是以清熱之氣持於氣交清先而徑毛蟲乃死熱後而暴介蟲乃殃其發躁民病咳嗌塞寒熱發暴振栗癃閉歲半之前陽明主之其化燥者天之政也歲半之後少陰主之其令熱者地之化也金為天氣火為地氣火能勝金遇太乙天符金氣自平不資化源惟安其運金無使受邪食白丹之谷以安其氣食間氣之谷以去其邪歲宜以咸以苦以辛汗之清之散之其運同清宜多地化其化上苦小溫中苦和下鹹寒藥食之宜也初之氣自甲申年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣太陰土中見金運土金相生地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕化不能為邪二之氣自春分日卯正至小滿日醜正凡六十日有奇主位少徵火客氣少陽火中見金運二火相加陽乃布民乃舒物乃生榮厲大至民善暴死是歲金氣平雖有厲疾不至夭橫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆雖有火化不能為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣陽明金中見金運歲運符天金氣乃平天政布涼乃行燥熱交合燥極而澤民病寒熱宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥化不能為邪是氣也用涼遠涼無犯司氣之涼四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣太陽水中見金運金水相生寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿便血宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒化不能為邪五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣厥陰木中見金運歲運當位其氣平厥陰居之春令反行草乃生榮民乃和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風化不能為邪終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣少陰火中見金運火能勝金陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱化不能為邪此六氣之常也治之大法和者平之各依其氣必清必靜則邪氣自衰歸其所宗此治之大體也丙戌歲圖太陽寒水司天太陰濕土在泉中見太羽水運歲水太過氣化運行先天太過而同天化是謂天符平水歲也水運平者命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其谷豆其果栗其實濡其蟲鱗其畜彘其色黑其味鹹其音羽其數六其物濡其在人也其藏腎其主二陰其養骨髓其病厥此歲運之化也天地之氣寒化司天動化為左間清化為右間故天政所布其氣肅濕化司地明化為左間灼化居氣為右間故地氣靜而其令徐寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散遠於太陰云朝北極濕化乃布澤流萬物寒化六風化八雨化五正化度也鱗蟲靜裸蟲育歲物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動於下水土合德上應辰星鎮星其谷玄黅寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歲水在上土在下土能勝水天氣虛水運符天其氣自平不資化源惟抑運水扶其不勝無使暴過而生其疾歲宜以苦燥之溫之食玄黅之谷以全其真避虛邪之氣以安其正運與寒同宜燥熱化故曰其化上苦熱中鹹溫下甘熱藥食宜也歲半之前太陽主之有本標之化當其時寒熱得中者天之和氣至也歲半之後太陰主之太陰之化從本當其時濕化應者地之令也初之氣自乙酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見水運少陽中治地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣陽明金中見水運大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣太陽水中見水運氣與運相符而布天政寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪是氣也用寒遠寒無犯司氣之寒四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣厥陰木中見水運水生木風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陰火中見水運大火所居陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣太陰土中見水運歲運得位濕土居之地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪此六氣之化也歲行平水之化天符為執法邪或中之民有卒急之病經曰中執法者病速而危也丁亥歲圖厥陰風木司天少陽相火在泉中見少角木運歲木不及氣化運行後天上角與正角同又木不及而同天化是謂天符氣化運行同天木氣適平命曰敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候溫和其令風其類草木其應春其谷麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其物中堅其在人也其藏肝其主目其養筋其病裡急肢滿此歲運之化也歲氣之化上見厥陰左間少陰右間太陽故天氣擾而其政撓下見少陽左間陽明右間太陰故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太商之谷其耗文角品羽清化熱化勝復同邪氣化度也風化三火化七正化度也毛蟲靜羽蟲育是乃歲物所宜介蟲耗寒毒不生是皆地氣所制故風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復行於中是歲陰為天氣陽為地氣天氣虛木運符之又木火同德其氣專不資化源惟贊運木無使邪勝歲宜以辛調上以咸調下畏火之氣無妄犯之故曰其化上辛涼中辛和下鹹寒藥食宜也歲半之前天氣主之天布厥陰之政其令風歲半之後地氣主之地行少陽之令其化火氣化之常也初之氣自丙戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見木運歲運得位金燥客之寒始肅殺氣方至民病寒於右之下宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍則燥不為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣太陽水中見木運寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷則寒不為邪三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣厥陰木中見木運運與天符天政布風乃時舉民病泣出耳鳴掉眩宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻則風不為邪是氣也用溫遠溫無犯司氣之溫四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣少陰火中見木運溽暑濕熱相搏爭於左之上民病黃疸而為胕腫宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱不為邪五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣太陰土中見木運燥濕更勝沉陰乃布寒氣及體風雨乃行宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻則濕不為邪終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陽火中見木運木生火畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆則火不為邪此六氣之化也歲為平木或有邪氣則中執法人有急卒之病經曰中執法者其病速而危也戊子歲圖少陰君火司天陽明燥金在泉中見太徵火運歲火太過氣化運行先天太過而同天化是謂天符氣之平也平火之歲命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運之化也天地之氣熱化司天柔化左間動化右間故天政所布其氣明辛化在泉藏化為左間司氣丹化為右間居氣故地氣肅而其令切寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白熱化七清化九正化度也羽蟲靜介蟲育歲物所宜也毛蟲耗濕毒不生地氣制之也水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歲火在上金在下火在中火勝金天氣盈地氣虛天氣雖平熱盛於上宜於年前先取化源平其火氣必抑其運火資其歲勝折其金之鬱氣無暴過而生其病食丹白之谷以全其真食間氣之谷以闢虛邪歲宜以咸耎之而調其上以酸收之而安其下運同天氣以寒清化故曰其化上鹹寒中甘寒下酸溫藥食宜也歲半之前少陰主之少陰有本標之化寒熱得中為天政之平也歲半以後陽明主之陽明以中氣為化燥濕相半者地氣之令也初之氣自丁亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位少角木客氣太陽水中見火運水勝火地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷則寒不為邪二之氣自春分日子正至小滿日戌正凡六十日有奇主位太徵火客氣厥陰木中見火運木火相生陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻則風不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位太徵火客氣少陰火中見火運氣與運符天政布火火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作喘咳目赤宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱不為邪四之氣自大暑日酉正至秋分日未正凡六十日有奇主位少宮土客氣太陰土中見火運土當其位火化兼之溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻則濕不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位太商金客氣少陽火中見火運氣同運化畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆則火不為邪是氣也用熱遠熱無犯司氣之熱終之氣自小雪日午正至大寒日辰正凡六十日有奇主位少羽水客氣陽明金中見火運火勝金水反制之燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍則燥不為邪此六氣之化也歲氣之交宜扶其不足制其有餘使氣適平然是歲天符為執法若有邪中執法者民病速而危也己丑歲圖太陰濕土司天太陽寒水在泉中見少宮土運歲土不及上宮與正宮同少宮上臨太陰是為天符土運臨醜是為歲會上見天符下見歲會三合為治太乙天符之歲氣至平也命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其谷稷其果棗其實肉其蟲倮其畜牛其色黃其味甘其物膚其音宮其數五其在人也其藏脾其主口其養肉其病否此歲運之化也歲運之化濕化司天明化間左灼化居右地氣上騰而其政肅咸化在泉動化間左清化間右故天氣下降而其令寂陰專其政陽氣退避大風時起原野昏霿白埃四起云奔南極寒雨數至濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太商太徵者物成於差夏故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急故曰風化清化勝復同邪氣化度也雨化五寒化一正化度也倮蟲靜鱗蟲育歲物所宜也羽蟲耗熱毒不生地氣制之也是歲土在上水在下土勝水天氣盈當取化源歲遇太乙天符其氣至平不取化源惟折其水鬱益其歲勝贊其陽火令御甚寒無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦燥之溫之運與濕同宜以燥化故曰其化上苦熱中甘和下甘熱藥食宜也歲半之前其政濕歲半之後其令寒初之氣自戊子年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣厥陰木中見土運木當其位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣少陰火中見土運大火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣太陰土中見土運氣與運同而行平氣天政布濕氣降地氣遷雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪是氣也無犯司氣四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宮土客氣少陽火中見土運歲運得位相火居之畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太商金客氣陽明金中見土運土生金金得位慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣太陽水中見土運水當其位濕土合德寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪此六氣之化也氣交之化歲有水鬱當隨勝氣安其屈伏無問其數以平為期此其道也庚寅歲圖少陽相火司天厥陰風木在泉中見太商金運歲金太過氣化運行先天火化為天氣素化司氣為左間柔化為右間故天氣正而其政嚴酸化為地氣灼化居氣為左間藏化為右間故地氣擾而其令撓風乃暴舉而木偃沙飛炎火乃流陰行陽化雨乃時應風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起火木同德上應熒惑歲星其谷丹蒼火化七清化九風化三正化度也羽蟲靜毛蟲育是謂歲物之宜倮蟲耗消毒不生是地氣所制民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲陽為天氣陰為地氣金運在中天氣刑運運刑地氣天氣盈地氣虛當於年前先取化源以平火氣無使運郁次抑其運金贊所不勝無使木鬱折其鬱氣則暴過不生苛疾不起歲宜咸宜辛宜酸滲之泄之漬之發之運異風熱少用寒化其化上鹹寒中辛溫下辛涼藥食宜也候其氣者歲半之前少陽主之若火淫所勝則溫氣流行金政不平民病頭疼發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺診在手天府之脈法宜平以鹹冷佐以苦甘以酸收之以苦發之以酸復之歲半之後厥陰主之若風淫於內則地氣不明平野昧草乃早秀民病灑灑振寒善伸數欠心痛肢滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重法宜治以辛涼佐以苦甘以苦泄之以甘緩之以辛散之歲運之化金太過紀曰堅成是謂收引天氣潔地氣明陽氣隨陰治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令鋭切其動暴折瘍疰其德霧露蕭颯其變肅殺凋零其化兼其所勝其病喘喝胸憑仰息上徵與正商同其生齊其病咳故曰歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞甚則喘咳逆氣肩背痛下連股膝脾腨胻足皆病其治宜以辛溫所以調其運也初之氣自己丑年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣少陰火中見金運火勝金地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣拂於上血溢目赤咳逆頭疼血傷脅滿膚腠中瘡宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣太陰土中見金運火生土火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳嘔吐瘡發於中胸嗌不利頭疼身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位太徵火客氣少陽火中見金運火當其位天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位少宮土客氣陽明金中見金運氣與運同是謂司氣涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍是氣也用涼遠涼無犯司氣之涼五之氣自秋分日寅初至小雪日子初凡六十日有奇主位太商金客氣太陽水中見金運金當其位而生水陽乃去寒乃來雨乃降氣門乃閉剛木早凋民病寒邪君子周密宜治太陽之客以苦補之以酸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣厥陰木中見金運金生水水生木地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻則風不為邪歲氣之化也勝復更作和以所宜安其主客適其寒溫同者逆之異者從之是其法也辛卯歲圖陽明燥金司天少陰君火在泉中見少羽水運歲水不及氣化運行後天燥化為天氣玄化為左間明化為右間故天氣急而其政切苦化為地氣柔化為左間動化為右間故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤則金火合德上應太白熒惑其谷白丹間谷命太徵者其耗白甲品羽雨化風化勝復同邪氣化度也清化九寒化一熱化七正化度也介蟲靜羽蟲育是乃歲物之宜介蟲耗寒毒不生是皆地氣所制蟄蟲乃見流水不冰清熱之氣持於氣交民病咳嗌塞寒熱發暴振栗癃閉清先而徑毛蟲乃死熱後而暴介蟲乃殃其發躁是歲金在上火在下水運在中水勝火火勝金天氣虛水能制火而生金金又生運其邪乃微宜資化源以助金氣安其運水無使受邪食白丹之谷以安其氣食間氣之谷以去其邪歲宜以咸以苦以辛汗之清之散之運化同清宜多地化其化上苦小溫中辛和下鹹寒所謂藥食宜也歲半之前陽明主之若燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木蘞生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛目昧眥瘍瘡痤癰病本於肝診在足太衝脈法宜平以苦溫佐以酸辛以苦下之歲半之後少陰主之若熱淫於內則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大法宜治以鹹寒佐以甘苦以酸收之以苦發之氣交之間水運統之涸流之紀是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土氣潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥稿其藏腎其化兼所不勝其病癃閉邪傷腎也候其氣者四維有湍潤埃云之化則不時有和風生髮之應若四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其病內舍腰脊骨髓外在溪谷腨膝故曰歲水不及濕乃盛行長氣反用其化乃速暑雨數至民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則胕腫復則大風暴發草偃木零生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮肌肉疹發氣並膈中痛於心腹黃氣乃損其谷不登初之氣自庚寅年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣太陰土中見水運風濕相遇以行春令地氣遷陰始凝氣始肅水乃冰寒雨化民病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕化不能為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣少陽火中見水運陽乃布民乃舒物乃生榮厲大至民善暴死水運承之其邪亦微宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆雖有火邪不能為害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣陽明金中見水運天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣太陽水中見水運寒雨降民病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒邪不能為害是氣也用寒遠寒無犯司氣之寒五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣厥陰木中見水運水生木春令反行草乃生榮民氣和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風邪不能為害終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陰火中見水運水運得位少陰居之陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱邪不能為害此六氣之化也歲氣之交天氣勝者少陽復之地氣勝者太陽復之其治各依其復氣之法也壬辰歲圖太陽寒水司天太陰濕土在泉中見太角木運歲木太過氣化運行先天寒化在上蒼化司氣左間清化右間故天政所布其氣肅甘化在下明化左間灼化居氣右間故地氣靜而其令徐寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒化六風化八雨化五正化度也鱗蟲靜倮蟲育歲物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歲水為天氣土為地氣土勝水天氣虛當資化源以助天氣之水歲運木天氣生運木能勝土地氣乃郁其邪乃微必折郁土抑其運木扶其不勝無使暴過而生其疾食玄黅之谷以全其真闢虛邪之氣以安其正運與寒濕異宜以燥熱化其化上苦溫中酸和下甘溫藥食宜也歲半之前太陽主之寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣腋腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炱渴而欲飲病本於心診在手神門脈其法平以辛熱佐以甘苦以咸瀉之歲半之後太陰主之若濕淫於內則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便氣衝頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別其法宜治以苦熱佐以酸淡以苦燥之以淡泄之氣交之間木運太過命曰發生之紀是謂啓陳土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啓坼其變振拉摧拔其化兼其所勝其病怒故曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹肢滿甚則忽忽善怒眩冒巔疾反脅痛而吐其衝陽脈絶者不治以酸和之初之氣自辛卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見木運歲木當位相火居之地氣遷候乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆雖有火邪不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣陽明金中見木運金勝木大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍雖有燥邪不能為害三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣太陽水中見木運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷雖有寒邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣厥陰木中見木運氣與運同是謂司氣風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻雖有風邪不能為害是氣也用溫遠溫無犯司氣之溫五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陰火中見木運木生火火勝金陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆雖有熱邪不能為害終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣太陰土中見木運地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死木運制之土乃郁宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻雖有濕邪不能為害此六氣之化也歲氣之交天氣勝則有太陰之復地氣勝則有厥陰之復治之宜以勝復之法癸巳歲圖厥陰風木司天少陽相火在泉中見少徵火運歲火不及氣化運行後天火同地化不及而加同歲會氣之平也諸正歲氣化運行同天平火之歲命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運之化也天地之氣風化在上灼化左藏化右苦化在下清化左黅化右故天氣擾而其政撓地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太宮太羽者其耗文角品羽寒化雨化勝復同邪氣化度也風化八火化二正化度也歲物之宜則毛蟲靜羽蟲育地氣所制則介蟲耗寒毒不生風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥火熱勝復行於中是歲陰為天氣陽為地氣天氣虛火適平不資化源惟贊運火無使邪勝歲宜以辛調上以咸調下畏火之氣無妄犯之其化上辛涼中咸和下鹹寒藥食宜也歲半之前厥陰主之厥陰所至其令風當其時風化行者天之政也歲半之後少陽主之少陽所至其令火當其時火化行者地之令也初之氣自壬辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣陽明金中見火運寒始肅殺氣方至民病寒於右之下運行平火其邪乃微宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍二之氣自春分日卯正至小滿日醜正凡六十日有奇主位少徵火客氣太陽水中見火運火居其位寒水承之寒不去華雪水冰殺氣施行霜乃降名草上焦寒雨數至陽復化民病熱於中宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣厥陰木中見火運火當其位風木客之天政布風乃時舉民病泣出耳鳴掉眩宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣少陰火中見火運氣與運同灼化所居濕熱相搏爭於左之上民病黃疸而為胕腫宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣太陰土中見火運火生土燥濕更勝沉陰乃布寒氣及體風雨乃行宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣少陽火中見火運火氣符會畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆是氣也司氣以熱用熱毋犯所謂用熱遠熱也歲氣之化其化淳又遇火氣平是謂行令邪或乘之其病持久故經曰中行令者其病徐而持也
