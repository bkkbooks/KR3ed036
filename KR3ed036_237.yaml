body:
  text: 卷二百三十七尸疰門諸尸附論夫人身自有三尸諸蟲與人俱生而其來能與鬼神相通嘗接引外邪與人為患謂之尸病其發作之狀或沉沉默默不的知所苦而無處不惡或心腹痛脹或瘰塊踴起或攣引腰脊或精神雜錯變狀多端其病大體略同而有小異以一方共治之者故名諸尸方大度世丸出千金方治萬病症結積聚伏尸長病寒熱疰氣流行皮中久病著床肌肉消盡四肢煩熱嘔逆不食傷寒時氣惡疰汗出口噤不開心痛等證病皆治之牛黃大黃雄黃細辛附子真珠甘草人參射干丹砂鬼臼莽草各一兩蜀椒麝香鬼箭羽茯苓桂心紫菀各二兩乾薑三兩野葛一尺蜥蜴蜈蚣各一枚地膽五十枚芫青二十枚樗雞二十枚巴豆仁八十枚上為末蜜丸如小豆大飲服二丸日二先食服之牛黃丸出聖惠方治諸尸及中惡疰忤不測之病牛黃川大黃三分銼碎微炒雄黃一分細研附子一分炮裂去皮臍真珠一分細研甘草一分炙微赤銼細辛一分人參一分去蘆頭硃砂一分細研鬼臼一分去須莽草一分微炙川烏頭一分炮裂去皮臍麝香半兩細研川椒半兩去目及合口者微炒去汗紫菀半兩洗去苗土巴豆二十枚去皮心研炒紙裹壓去油鬼箭羽半兩赤茯苓半兩桂心乾薑二分炮製銼地膽五枚糯米拌炒令黃色去翅野葛一分芫青七枚糯米拌炒令黃色去翅足蜥蜴一枚微炒樗雞半兩微炒上羅為末合併將藥及巴豆都研令勻煉蜜和搗五七百杵丸如緑豆大每服不計時以溫酒下三丸甘草散出千金方治卒中惡賊風寒冷入腹便絞痛或飛尸遁尸發作無時搶心胸滿脅痛如刀刺口噤者甘草乾薑茯苓乾地黃羊脂當歸細辛各一兩芍藥吳茱萸桂心各二兩梔子仁十五枚炒上羅勻以水八升煮取三升去滓內脂煬盡分三服欲利者加大黃三兩一方有芎藭無細辛痛甚者可加羊脂二兩當歸人參各加一兩芍藥一兩一方有防風無羊脂犀角丸出聖惠方治諸百病惡氣腹內疼痛毒腫犀角屑半兩天雄半兩炮裂去皮臍鬼臼半兩去須桂心半兩莽草半兩微炒真珠半兩細研川大黃半兩銼碎微炒雄黃半兩細研蜈蚣五節微炒貝齒五枚燒赤川烏頭半兩炮裂去皮臍麝香一分細研巴豆十五枚去皮心研紙裹壓去油羚羊角屑半兩上羅為末入研了藥及巴豆都研令勻煉蜜和搗五七百杵丸如梧桐子大每服空腹以粥飲下一丸漸增至二丸卒腹痛飛尸服大豆一丸若惡氣腫以醋和塗之甚良以囊盛之男左女右系之臂上祛邪氣極效雄黃丸出聖惠方治諸尸症積及中惡心痛蠱疰鬼氣雄黃細研真珠細研白礬燒令汁盡牡丹皮附子炮裂去皮臍一藜蘆去蘆頭炙桂心以上各一兩蜈蚣一枚微炒去足巴豆半兩去皮心細研紙裹壓去油上羅為末入研了藥及巴豆都研令勻煉蜜和丸五七百杵丸如梧桐子大每服不計時候以粥飲下三丸亂髮灰丸出聖惠方治諸尸鬼疰中惡心痛亂髮灰一兩細研桂心半兩杏仁一兩湯浸去皮尖雙仁麩炒微黃上細末煉蜜丸如梧桐子大不計時以暖酒下五丸又方出聖惠方雄黃一兩酥一兩上相和丸如彈丸大納二合熱酒中研服之須臾再服瘥已有尸疰者常蓄此藥甚良又方出聖惠方烏臼根皮一斤銼硃砂二兩細研水飛過上用水五升先煮烏臼根令濃去滓不計時用汁一合調下硃砂一錢治諸雜疰相連續死亦治三十年衆疰方出千金方用桃根白皮一斤搗細以水二斗煮取一斗去滓分八九服須令二日服盡崔氏用桃根白皮治疰在心腹痛不可忍者又方出千金方用小芥子末雞子白和敷尸疰鬼疰者即五尸之中尸疰又挾諸鬼邪為害者也其變動乃有三十六種至九十九種大略令人寒熱淋瀝沉沉默默不的知其所苦而無處不惡纍年積月漸就頓滯以至於死死後復疰易旁人乃至滅門覺如此候者宜急療之蜥蜴丸出千金方治症堅水腫蜚尸遁尸寒尸喪尸尸疰骨血相疰惡氣鬼忤蠱毒邪氣往來夢寤存亡流飲結積虎狼所齧痸犬所咬鳩毒入人五臟服藥以殺其毒即消婦人邪鬼忤亦能遣之蜥蜴一名守宮蜈蚣各三二枚虻蟲杏仁各三十枚地膽五十枚䗪蟲四十枚蜣螂十四枚朴硝七分巴豆七分澤漆鬼督郵桑赤雞桃奴一方用桃仁犀角各二分乾薑四分虎骨六分甘草一兩芍藥甘遂各五分款冬花三分上二十味別制巴豆杏仁如膏納諸藥末研調下蜜搗二萬杵丸如麻子大食前服三丸日一不下加之不取吐下者一丸旦服有人曾患風冷疰癖堅二十年得愈一方無蜈蚣以暖酒下尸疰附論夫尸疰者尸病疰於人也是五尸之一挾外鬼邪毒之氣流疰於身多因哭泣感染尸氣而然令人寒熱淋瀝沉沉默默不的知其所苦而無處不惡也或腹痛脹滿喘急不得息上衝心胸旁攻兩脅或瘰塊踴起或攣引腰脊或舉身沉重而精神不爽每更節令愈加頓滯積年纍月以至於死死則疰易旁人以致滅門故名尸疰凡諸心腹痛服衆方熱藥入腹寂然不動但益氣息急者此尸疰病也宜先服甘草汁一升消息少時服瞿麥湯飲一升得下便覺稍寬並暴症堅結宿食及氣血堅痛發作無定者方雄朱散出千金方治因喪驚憂悲哀煩惱感尸氣而成諸變動不已似冷似熱風氣觸則發雄黃硃砂龍齒桔梗羌活當歸升麻川烏川芎犀角芍藥鬼箭羽白殭蠶炒白朮南星炮山梔子陳皮木香黃芩以上各等分虎頸骨醋炙紫蘇子炒莽草枳殼麻黃半兩蜈蚣二條酒炙檳榔二分乾蠍炒一分上為細末每服二錢酒調下日三服頃在徵城日常修合神精丹一料庚申豫家一婦人夢中見二蒼頭一在前一在後手中持一物云到也未應云到也擊一下爆然有聲遂魘覺後心一點痛不可忍昏悶一時許豫忽憶神精丹有此一證以三粒令服之遂至府城經少頃婦已無病矣忘服藥竟痛止神醒今如常矣日後相識稍有邪氣與一二服無不應驗方在千金中治中風之要藥但近世少得真青磁石為難合耳大麝香丸治疼痛積年尸疰蠱毒症癖氣水心兩脅下有塊溫瘴精魅邪氣或悲或哭蛇蠍蜂等所螫並療之方麝香牛黃藜蘆炙硃砂蜀當歸茯苓桔梗鬼箭羽金牙烏頭炮桂心吳茱萸貫衆丹參各一分蜈蚣去足炙乾薑人參虎骨各三分鬼臼半分芍藥雄黃各一分半巴豆二十枚去心皮熬蜥蜴半枚炙上搗篩蜜丸如梧子大天明飲下三丸至辰時下利若不利熱飲投之即利三兩行後冷醋飲止之即定然後煮取食之勿食冷水明日依前服之永瘥忌熱面生菜柿子梨等蛇蠍蜂螫取一丸研破和醋塗之便瘥精鬼狐貍之屬拋磚瓦或如兵馬行夜發者是鬼魅無早晚每日服前藥兩丸只三兩日服即瘥仍每日燒一丸熏身體及衣裳宅中燒之亦好無患之人以三五丸緋絹袋盛系左臂上闢虎毒蛇諸精鬼魅忌貍肉生血物諸肉生蔥蘆筍一方無鬼臼丹參五香丸療諸毒疰尸氣心腹脹滿大小便不通鬼疰心痛不可忍者牛黃研犀角屑各三分升麻沉香薰陸香當歸桂心青木香麝香雄黃研如粉鬼箭羽巴豆去皮心熬訶黎勒皮硃砂研檳榔仁乾薑吳茱萸甘草炙豆蔻各四分桃仁去尖皮熬附子炮各五分上搗篩蜜和丸如梧子大暖水服三丸至五丸如不利更服以利為度此方甚驗人久不傳忌海藻菘菜豬肉冷水生蔥蘆筍生血物件治滯冷積年不瘥出風科積類以死人枕煮服之嘗有嫗人患滯冷積年不瘥徐嗣伯為診曰此尸疰也當以死人枕煮服之乃愈於是往古冢中取枕已一邊爛缺嫗服之即瘥尸疰者鬼氣也伏而未起故令人沉滯得死人枕治之魂氣飛越不復附體故尸疰自瘥五香散療尸疰忤邪氣或熱或寒時氣在骨節間似瘥似劇兼主百病沉香丁香麝香薰陸香鬼箭羽當歸豆蔻各四分牛黃鬼臼橘皮金牙燒各三分犀角屑羚羊角屑大黃各六分升麻桔梗桃仁去皮尖熬光明硃砂研安息香研各五分上為散湯飲酒隨病服方寸匕日再瘥止亦可蜜丸如梧子服十丸桃奴湯出千金方治中惡毒氣蠱疰心腹卒絞痛桃奴當歸人參乾薑各二兩芎藭甘草各三兩丹砂麝香茯苓犀角鬼箭羽桂心各一兩上十二味㕮咀以水九升煮取二升半去滓分三服未食服大便不通腹滿者加大黃三兩芒硝二兩一方有雄黃一兩無丹砂芎藭江南度世丸出千金方主萬病癥結積聚伏尸長病寒熱疰氣流行皮中久病著床肌肉消盡四肢煩熱嘔逆不食傷寒時氣惡疰汗出口噤不開心痛等證並皆治之蜀椒三兩人參細辛甘草各二兩茯苓真珠大黃乾薑丹砂一方作硃砂野葛桂心雄黃麝香鬼臼各一兩烏頭牛黃各二分附子紫菀各六分巴豆六十枚蜈蚣二枚上為末煉蜜丸如小豆飲服二丸可加至四丸日二服更加獺肝一具尤良一方無牛黃以暖酒下亦可桃奴丸出三因方治心氣虛有熱恍惚不常言語錯亂尸疰客忤魘夢不祥小兒驚癇並皆服之桃奴七枚別研為末辰砂半兩別研桃仁十四枚去皮麩炒別研為末龍腦別研一分生玳瑁鎊過為末一兩牛黃別研碎一分雄黃用桃葉煮水研飛取三分黑犀角石上以水磨澄去水取細末半兩麝香別研一分琥珀另研三分安息香一兩以無灰酒斟酌多少研飛去砂土銀器中入桃仁琥珀熬成膏上以各末和入膏丸如雞頭米大陰乾密器封閉靜室安置煎入參湯研下一丸食後臨臥服五尸丸療諸尸疰方芍藥桂心各八分吳茱萸一合丹砂研芎藭烏頭炮乾薑各四分蜀椒一兩去目汗梔子仁五分巴豆四十枚去心皮熬研上搗下篩蜜和丸如豆大一服日三忌豬肉生蔥蘆筍生血等物赤茯苓散出聖惠方治尸疰發作無時心胸痛喘急氣上衝傍攻兩脅赤茯苓三分當歸半兩銼微炒赤芍藥半兩鬼箭羽三分桂心二分乾地黃半兩川升麻三分木香芎藭桃仁三分湯浸去皮尖雙仁麩炒微黃上搗為散每服三錢水一中盞煎至五分去滓溫服不拘時一方無川升麻桂香湯治尸疰發歇無時心腹切痛桂去粗皮芍藥木香柴胡去苗各一兩芎藭鱉甲去裙襴醋炙乾薑炮各三分吳茱萸湯浸焙乾炒常山各三分上粗搗每服三錢水一盞半煎至八分去滓溫服不計時候虎掌丸出聖惠方治尸疰寒熱不思食味心腹刺痛虎掌丹砂研各半兩白茯苓去黑皮龍齒各一兩當歸焙蓬莪朮煨銼各三分上六味搗羅為末用酒煮阿魏麵糊丸如梧桐子大每服二十丸生薑烏梅湯下一方用赤茯苓鸛骨丸出聖惠方治尸疰惡氣流傳忽然悶絶時發寒熱淋瀝或腹痛脹滿鸛骨酒炙一方用鸛骨酥炙雄黃研各一兩桂去粗皮三分大黃銼炒三分麝香研半兩丹砂研一分一方用硃砂赤足蜈蚣酒浸炙一條上為末煉蜜丸如梧子大每服二十丸桃枝煎湯下防己散治尸疰傳尸服逐下藥後補虛防己人參白茯苓去黑皮鬼臼鬼箭羽附子炮裂去皮臍曲炒各一分上為散每服二錢匕以桃仁研泔一盞煎至六分溫服日五服杜蘅散出肘後方治尸疰及惡氣中人令心胸滿悶神思昏迷服此效杜蘅一兩莖豉一兩人參半兩瓠子仁二十枚菘蘿六銖赤小豆二枚上為散平旦溫酒服方寸匕當吐百種物若不盡後更服之硃砂丸出肘後方治尸疰鬼邪毒氣流疰身體令人寒熱淋瀝腹痛脹滿精神錯亂硃砂一兩細研水飛過一方用丹砂雄黃一兩細研水飛過鬼臼半兩莽草半兩微炒巴豆十四枚去皮心研紙裹壓去油蜈蚣一枚微炙去足上羅為末入研了藥令勻煉蜜丸如小豆大每服不計時候酒下三丸鸛骨丸出聖惠方治尸疰惡氣寒熱悶絶兼治百病鸛骨一寸炙一方用鸛鵲皮方三寸炙桂去粗皮半兩虻蟲斑蝥各十四枚去翅足炒巴豆三十枚去皮心膜炒上為細末煉蜜丸如小豆大每服三丸溫開水下日三粥飲亦可還魂湯一名追魂湯出範氏方治卒感忤鬼邪飛尸諸疰奄忽氣絶無復知覺或已死咬口口噤不開去齒下湯湯入口不下者分病人發左右捉定踏肩引之藥下復增取盡下一升須臾立蘇金匱云寸脈沉大而滑沉則為實滑則為氣實氣相搏血氣入臟則死入腑則愈若卒厥唇口青身冷入臟即死身和汗出愈麻黃三兩桂心二兩甘草一兩杏仁七十粒上羅勻以水八升煮取三升分三服一方無桂心只三味淮南丸療疰易滅門女子小兒多疰諸般疰證心悶亂頭痛吐有此證者宜服此方又有華陀貍骨散龍牙散羊脂丸諸大藥等並在大方中及成帝所受車前子車下李根皮石長生徐長卿各數兩等分上粗搗作方囊貯半合系衣帶及頭若疰一家暴慘以合此共帶之又臨入疰舍取此藥自燒作屑以水服之密陀僧散治臨尸哭泣尸氣入腹沉滯臟腑有時發動取勞積神效密陀僧半斤醋煅滓淘研控干取六兩京三稜煨搗末二兩訶黎勒不去核生用搗羅一兩上合研勻每服二錢用煮麵濃湯調下當晚不食臨臥一服余時勿服並服三夜次夜當下惡物不下第三夜加生牽牛子末一錢同調下治卒得尸疰毒痛往來出聖惠方杏仁亂髮灰各等分上研如脂丸如梧子大每服酒下三丸日三一方豬膏和丸一方蜜丸治遁尸尸疰心腹及身有痛處不得近者出千金方取艾小握令碎著痛上厚一寸余熱湯和灰令強熱置艾上冷即易不過三二度瘥治尸疰邪氣用貍骨頭骨最妙燒為灰酒服二錢亦主食野鳥肉物中毒腫脹再服之即瘥五月豬糞極神妙五月勿食肉傷神治尸疰鬼疰腹痛用鸛骨大寒亦可單用炙令黃末空心暖酒服方寸匕似鵠而巢樹者為白鸛治尸疰出肘後方燒發如雞子大為末水服之瘥治尸疰蜀椒尉方並治走疰出聖惠方用蜀椒一斤帛裹於疰上以尉斗盛火尉椒令熱汗出神效死人席湯療尸疰損鼻或聞臭聲或見尸常發取死人眠席斬棺內余棄路者一虎口長三寸止一物以水三升煮取一升為一服立效萬病丸治五勞七傷尸疰所侵心腹疼痛飲食不化兩脅膨脹皮膚攣縮等病遠志去心澤瀉石斛去根柏子仁別研雲母水飛石葦去毛杜仲去粗皮炙天雄炮裂去皮臍牛膝去油酒浸切焙白茯苓去黑皮菖蒲山芋熟乾地黃焙續斷肉蓯蓉酒浸切焙乾薑炮甘菊花桂去粗皮五味子蛇床子炒山茱萸各半兩桔梗炒防風白朮各一兩附子四枚炮裂去皮臍天門冬去心焙一兩半細辛去苗葉三分上為末煉蜜杵一千下丸如梧桐子大每服二十丸空心溫酒下春秋日再服夏季日一服冬季日三服如久服即減天雄附子各一兩赤芍藥丸出聖惠方治五尸疰並諸尸鬼疰中惡心痛赤芍藥銼一兩吳茱萸湯浸焙乾炒丹砂研各半兩蜀椒去目合口者炒去汗烏頭炮裂去皮臍各半兩乾薑炮三分桂去粗皮一兩上為末煉蜜丸如小豆大每服十丸空腹溫酒下日三丹砂丸出聖惠方治五尸疰瘦病伏連諸鬼氣惡疰並傳尸勞乏鬼疰殗殜肌體羸瘦丹砂研一兩麝香研三分桃仁湯浸去皮尖雙仁炒研七十二枚上各細研再和研勻入少蜜煉丸如小豆大每服十丸米飲下日三服忌生羊血物治尸疰腹痛痔瘻出本草以狐貍之令香木酒服二錢匕重者不過十服後見驗治尸疰心痛及反胃用田螺殼燒灰米飲下之傳尸復連殗殜附論夫傳尸復連殗殜者皆起於骨蒸遁尸故也此病多因臨死哭泣尸氣入腹連綿不已或三年至五年有能食不作肌膚或三日五日若微勞即發大都當頭額間骨尋常熱熻熻然死後家中更易一人如此相傳故名復連殗殜也方大金牙散治傳尸骨蒸肺痿殗殜及諸蠱毒疰忤鬼魅野貍蟲蛇蜂蠍等毒或惡瘡腫瘤中惡卒心痛大小便不通心腹鼓脹疫癘瘴毒積癖邪氣金牙曾青研飛雄黃研大黃銼炒丹砂研飛牛黃研凝水石煅研野葛皮龍骨朴硝研犀角鎊獺肝片切干炙貍骨醋炙鸛骨炙黃各三分升麻一兩半附子去皮臍生用桂去粗皮鬼臼鬼督郵黃環青木香常山牡蠣煅研人參知母切焙徐長卿各半兩鬼箭羽桔梗炒代赭石莽草蜀漆當歸切焙白薇巴豆去皮心膜炒研露蜂房各一兩蜀椒四十九枚去目及合口者炒汗出蜈蚣二條去足炙芫青去翅足炒斑蝥去翅足炒亭長去翅足各二十一枚上搗研為散再和研細勿令穢汙觸犯並孝服人見當於淨室中焚香密蓋之勿透氣如傳尸骨蒸殗殜疰癖冷氣積聚每服半錢匕熱湯調下日再病瘥即止仍以絳囊盛方寸匕帶之闢諸鬼氣如有諸邪病狂言妄見者帶二三錢若卒噁心痛疰忤喘滿蠱脹悶亂諸疾每服四錢匕米飲調下吐利為應若蛇蟲毒瘡以津唾調敷之若瘟疫瘴癘服如前法若蟲毒吐出即瘥若卒死中惡湯調一錢匕灌下即瘥卒中野道狐貍貓鬼魘魅邪毒眼戴上視狂言者亦用湯化三錢匕未瘥更服若忽有惡瘡腫以湯和敷之日一易瘥即止獺肝金牙散治傳尸復連殗殜骨蒸痃癖冷氣五尸疰相染及蠱疰瘟瘧疰忤心痛卒死疫癘獺肝一具炙乾金牙研丹砂水飛研貍骨炙搗研牛黃研麝香研龍膽白薇附子炮裂去皮臍當歸水洗切焙乾蒲黃炒鬼督郵銅照鼻燒醋淬炒苦參龍骨研沙參蜈蚣炙去足蜀椒去目及閉口者炒出汗丹砂各半兩寒水石燒研硝石研禹餘糧燒紅醋淬玄參牡丹皮鬼臼各一兩人參鱉甲去裙襴醋炙乾薑炮製各一兩一分菴䕡子三合上為細散再同研勻如粉每服一錢熟水調下空心夜臥各一服漸加至一錢半大黑虎丹出聖惠方治傳尸伏連及一切勞證不問冷熱大小均宜服蛤蚧三對微炒蝦蟆一枚塗酥炙令黃丹砂五銖細研金箔五片細研銀箔五片研白蘚皮苦參三銖蛇蛻皮一兩微炙白狗糞一分布巾子三年者六銖令炙黃金剛子三銖烏驢蹄三銖炙黃硫黃一銖細研雄黃一分細研天靈蓋麝香一兩細研沉香一分甲香三銖微炙乳香二銖夜明砂六銖雄者兩頭尖人中白一分上搗羅為末更都研令勻用豬膽汁並軟飯和搗五七百杵丸如緑豆大每服藥先以新汲水一盞入少許麝香沙糖以藥十丸浸於露下但先用煎香湯浴後搜淡面一小盞便和藥服了以衣被厚蓋臥直候汗出若是傳尸蟲白伏連蟲赤皆背上出骨蒸則汗出並瘥獺肝丸治傳尸勞病並諸冷熱勞疾日月將久面色萎黃漸漸羸瘦獺肝一具生用柴胡去苗青蒿一握肉蓯蓉去粗皮酒內淹浸切焙二兩半黃連去須炒一兩黃耆銼二兩半知母木香地骨皮桃仁去皮尖雙仁炒附子炮裂去皮臍桂去粗皮天靈蓋炙陳橘皮去白炒當歸切焙澤瀉生乾地黃焙各一兩甘草炙銼一兩檳榔銼柏木脂研各一兩半上為末煉蜜和丸如梧桐子大每服空心酒下四十丸麝香飲治男子婦人傳尸骨蒸一切勞疾柴胡去苗銼一兩阿魏三分炒為末甘草如病人中指大銼青蒿桃枝柳枝釜櫻枝各一握細銼薤白蔥白各七莖切檳榔一兩為末分作三貼上以童子小便四升宿浸諸藥於密室內至更初煎煎時忌生人婦人等見並不祥之語取吉善之言以卜善惡之候又用刀一口放藥鐺上此藥宜加專志煎去一升半去滓下麝香一分研分作三服第一服入檳榔末一劑頓服如人緩行三二里地二服亦下檳榔末頓服服時掩卻鼻服才了以白梅含之莫令心頭惡吐卻藥須臾或吐必有物出或未吐如前更服第三服必吐瀉瀉下惡物並癆蟲等不可名狀或爪眼下並身上出如蟻其瀉下蟲惟白色必愈余色者難瘥才吐瀉了便以薤白粥並軟飯補之仍如法將息烏雞丸治傳尸勞疾尸疰骨蒸眼目昏澀面色青黑咽喉噎塞痰涕咳嗽或痃癖攻刺疼痛胸膈滿悶時或恚怒或多傷情思不樂夢寐虛驚精藏滑泄失血冒寒潮熱盜汗肩背拘急腰膂肢節煩疼四肢少力不喜飲食小便黃赤大便不調乍進乍退服攻藥後宜服此黃連去須附子炮裂去皮臍各二兩柴胡去苗白附子生當歸切焙秦艽去苗土槐膠甘草炙銼續斷蓯蓉薄切酒浸焙遠志去心巴戟天各一兩陳橘皮去白焙乳香研雄黃研丹砂研各半兩丁香乾薑炮各一分上搗極細先養烏雌雞一隻以硫黃三兩為末分作三十分每日拌飯喂一月日用大麻子一升喂盡宰治去毛皮嘴爪並肚腸留心肝將前藥末入在雞腹以麻線纏定再用無灰酒一斗銀石鍋內用文武火煮令雞熟取出除去粗骨將雞並腹內同細研更將雞骨焙乾搗羅為末同研藥攪和入臼中搗千百下丸如梧桐子大每服二十丸以溫酒吞下空心日午臨臥各一服犀角紫河車丸治傳尸勞服三月必平復其餘勞證止數服愈紫河車一具孩兒胞衣是也米泔淹一宿洗淨焙乾用鱉甲酥炙桔梗胡黃連芍藥大黃敗鼓皮心酥炙貝母去心龍膽子黃藥子知母以上各二錢半廣朮犀角末芒硝各錢半硃砂二錢另研上為細末煉蜜丸如梧子大硃砂為衣每服二十丸酒下空心服蘇合香丸一名乞力伽丸療傳尸骨蒸殗殜肺痿客忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴氣赤白暴痢月血閉痃癖疔腫驚癇鬼忤中人小兒吐乳大人狐惑等病蘇合香油一兩入安息香膏內安息香二兩別研用無灰酒一升熬成膏麝香研白檀香香附子去毛訶黎勒煨去皮青木香丁香不見火沉香硃砂研水飛烏犀鎊白朮蓽茇各二兩龍腦別研薰陸香別研各一兩上除研藥外余並細末拌停用安息香膏並煉蜜和成劑每一丸雞頭子大沸湯化下卒中惡昏不知人及霍亂暴症心腹絞痛鬼疰客忤驚癇癲狂諸傷百損氣暈欲絶此丸主倉卒之患悉皆治之如牙噤不能開者抉開口灌之如灌不下搐鼻灌即蘇此藥隨身不可暫缺闢諸惡氣並御山嵐瘴氣無以逾此若危急病尤不可無市肆疾取多用龍腦附子當於火土闢能飲酒以酒調服若精神用過度夜睡不穩人參湯化服其功不在妙香散寧膏之下倉卒人參不得只白湯亦佳此藥安血氣卻外邪凡病自內作不曉其名者服此往往得效兼治氣疰氣厥氣逆不和吐利營衛阻隔尤有神效凡諸症暴亡之疾用之最佳傷寒日久形證危惡但心頭尚暖藥下即漸蘇若大瀉氣欲脫目視天地皆轉神思已不理諸藥不效服此兩彈丸許神氣即輕爽瀉亦自止妙不可言有人嘔血甚久遂奄奄而絶瘐敗之甚足手甚冷鼻息欲絶計無從出惟研蘇合香丸灌之凡盡半兩即蘇也一方無龍腦小麝香丸出千金方治傳尸骨蒸鬼疰百病風寒客轉經絡走疰疼痛久不愈者並及一切惡氣邪毒皆治之麝香芥草炙犀角屑梔子仁各三分雄黃研當歸炒丹砂研各四分乾薑炒芍藥桂各五分巴豆五十枚去皮膜油七錢八分蜈蚣一條炙去頭足附子炮裂去皮臍各五枚一枚准半兩烏頭製法並同上細辛五分上合搗千杵蜜和丸如小豆大每服三丸日三服可加至五丸溫水下一方無當歸忌生蔥生菜蘆筍豬肉冷水牛黃丸出聖惠方治傳尸惡疰復連瘦病宜服牛黃半兩細研麝香一分細研人參半兩去蘆頭沉香三分丁香半兩木香三分胡黃連一分柴胡三分去蘆犀角屑三分枳殼三分麩炒微黃去瓤桃仁一兩湯浸去皮尖雙仁炒鱉甲一兩醋炙令微黃去裙襴上搗羅為末入研了藥勻煉蜜和搗三二百杵丸如梧桐子大每於食前以粥飲下二十丸忌莧菜麝香散治男子婦人傳尸骨蒸冷熱五勞麝香研半錢甘草如病人中指長男左女右東引桃枝青蒿東引柳枝石榴皮犀角鎊半兩阿魏柴胡蔥白薤白各七莖上一十一味除麝香外銼碎同用童子小便二升半浸一宿別入檳榔末三錢同煎至一升半去滓溫分三服男病女煎女病男煎勿令孕婦六畜見初服訖如人行五里又進一服恐噁心可含白梅病在上即吐在下即瀉各出惡物如蟲類及頭髮馬尾狀兼身上如蟻行瀉後以蔥粥軟飯補之仍服後方茯神湯調和五臟避風一月若遠年重病不過兩劑其吐下蟲腹紅色者可治黑者或瘥或否白色者不可治也茯神湯治傳尸骨蒸先服麝香散取蟲後次服補五臟茯神去木人參遠志去心甘草炙銼龍齒陳橘皮去白焙熟乾地黃焙各一兩五味子一兩半麥門冬去心焙桂去粗皮各一兩半黃耆銼二兩當歸切焙一兩上粗搗篩每服五錢匕水二盞入棗七枚擘破生薑五片煎至一盞去滓空心溫服日三療瘦病伏連傳尸鬼氣疰忤惡氣方一名斑蝥散出聖惠方斑蝥去頭足熬射干根各四分石膽七分別研桂心牛黃各二分別研犀角三分生者屑人參三分石蜥蜴一枚炙紫石七分別研蜈蚣四寸炙麝香少許別研上研為細末相和每日空腹服早午晚日三服用井花水二合溫即頓服勿臨吃與白米粥吃如覺小便澀好如合藥勿使婦人小兒狗見忌熱面果子五辛酒肉生血生蔥一方加甘草真珠丸一名獺肝丸出聖惠方治傳尸骨蒸咳嗽上氣痰喘寒熱四肢瘦弱真珠末獺肝炙乾茯神貝母去心柴胡去蘆龍膽草黃連去須赤芍藥各一兩半白檳榔煨銼旋覆花各一兩上為末煉蜜和丸如梧桐子大每服十五丸食後溫漿水下日再一方有川大黃以溫水下三十丸黑虎丹出聖惠方治傳尸骨蒸勞干蝦蟆一枚去頭足為二各一半將一半熱炙黃者蛤蚧一對各取一半泥塗和炙黃蘆薈研天靈蓋酥炙白狗糞炒黃雄黃研各一分麝香一分研烏驢頭炙乾一兩乳香研一兩半豬膽一枚取汁於碗中慢火煨如膏和藥上搗研九味為末合研勻細以豬膽膏同粟米飯和丸如梧桐子大先吃熱面一碗次以茅香水沐浴次以沙糖麝香少許調冷水一盞投藥一丸於星月下浸一宿平旦空腹服之厚被蓋臥應是傳尸冷勞者脊骨中出白蟲或出赤蟲若骨蒸勞則汗出腰腳疼痛不遂腳下出汗如膠漆諸風氣水病並服一粒瘥小兒無辜可服半粒如前法有蟲出鼻內如線狀是效驗之至麝香丸出聖惠方治骨蒸傳尸勞瘦鬼氣伏連麝香三分研犀角鎊鬼箭羽木香各一兩白朮微煨一兩虎頭骨醋炙天靈蓋醋炙雄黃研桃仁湯浸去皮尖雙仁炒研丹砂各一兩半上為末和勻煉蜜丸如梧桐子大每服十丸愈以醋湯下日二丸瘟疫病亦可帶之一方清粥飲下二十丸地黃湯治伏連傳尸骨蒸等病生乾地黃酒洗切焙二兩半續斷桔梗炒各一兩半五味子一兩半紫菀去苗土甘草炙銼羚羊角鎊各半兩肉蓯蓉酒浸切焙桑根白皮炙銼各一兩赤小豆一合上粗搗篩每服五錢以水一盞半入竹茹彈子大煎至一盞去滓溫服空心食後各一服服後若渴唇口乾加麥門冬去心地骨皮各半兩阿魏丸治傳尸尸疰心神錯亂狂言驚悸夢與鬼交病熱逐節氣改變阿魏醋化去砂石面和作餅炙半兩安息香酒浸研如粉半兩甘草炙銼木香檳榔銼各半兩豉一合炒豬牙皂角十四挺去皮子冷醋炙天靈蓋醋炙麝香研人中白研各一兩上為末煉蜜和丸如桐子大用童子小便浸烏梅三枚並蔥白三莖切同煎下二十丸五更初服桃仁丸出聖惠方治傳尸骨蒸復連殗殜肺氣咳嗽宜服桃仁一兩半湯浸去皮尖雙仁微炒豬牙皂莢半兩塗酥炙令微黃紫菀三分去苗土鱉甲一兩半塗酥炙微黃去裙襴芫花根一兩甜葶藶一兩炒令微黃白礬三分燒令汁盡蛤蚧一對塗酥炙令微黃麝香一分細研入上搗羅為末煉蜜和搗一二百杵丸如梧桐子大每服不計時候以清粥飲下二十丸神麯丸治傳尸多服冷藥旬月未愈或損脾臟致食少難消氣滿兼利溫脾神麯末炙令黃色五兩白朮一兩附子炮裂去皮臍三兩枳殼去瓤麩炒令黃色一兩甘草炙銼乾薑炮製人參各二兩食茱萸水淨洗焙乾炒桔梗炒各一兩上為細末煉蜜為丸如梧桐子大每日空心米飲下二十丸夜臥再服漸加至三十丸紫菀湯一名續斷散出衛生家寶方治傳尸骨蒸伏連殗殜肺氣咳嗽紫菀去苗土桑根白皮炙銼桔梗炒續斷各一兩半赤小豆一合甘草炙銼五味子各一兩生乾地黃酒浸切焙二兩半上粗搗篩每服五錢水一盞半入青竹茹彈子大煎至一盞去滓食後溫服良久再服若熱甚加麥門冬去心一兩石膏一兩半一方入小麥二十粒桃仁湯出聖惠方治傳尸伏連病本因極熱熱氣相易續不斷遂名伏連鬼氣亦名骨蒸傳尸發即四肢無力日漸黃瘦不能飲食乍惡乍好桃仁湯浸去皮尖雙仁炒三兩重研一方用桃枝鬼箭羽赤芍藥人參陳橘皮去白焙各二兩白茯苓去黑皮三兩一方作茯苓白檳榔銼一兩麝香研三分上粗搗篩六味入桃仁和內每服五錢以水一盞半生薑三片拍碎煎至一盞去滓入麝香末一捻空腹溫服良久再服忌火醋生冷五辛桃枝飲治一切鬼氣邪氣傳尸伏連骨蒸桃枝柳枝各一握細銼取東南枝豉半兩蔥白三莖細研童子小便一升地膽一錢為末蜀椒去目及合口者炒去汗半兩生薑細切一兩上粗篩五味與姜豉和勻用童子小便一升浸一宿至四更煎取半升去滓分二服五更初一服雞鳴時一服服後汗出慎風仍取米粉摩身上若或微利即愈隔日再服重者不過三劑天靈蓋丸治傳尸天靈蓋如無即髑髏骨有十字縫者取中心一片以茅香湯洗以安息香酒塗之炙令黃色紫河車一枚頭首生兒孩衣胞是也於石上用新草鞋踏洗令淨控干以麝香一兩摻拌令勻入瓶以泥固濟如法火煅通赤留性勿令煅過蜥蜴一條和腸臟醋炙四十九遍令乾獺肝一具薄切瓦上焙乾赤足蜈蚣一條酒浸炙焦黃鷹糞一錢金線蝦蟆端午日收者以醋炙令黃只用頭蛤蚧一對酥炙令黃只取頭尾用上為細末以醋煮豬膽令熟成膏和搜為丸如梧桐子大以槐花版青各一錢研為末熟絹篩過為藥衣令青黃色每服四十丸溫煎生薑湯下初更一服二更初再一服獺肝丸治傳尸病遁疰骨蒸伏連殗殜此病多因臨尸哭泣尸氣入腹連綿或三年五年有能食不長肌膚或三日五日有微勞即發大都當額頭間骨尋常熱熻熻然死後家中更易一人如此乃至滅門獺肝一枚令炙乾鱉甲一枚去裙襴醋浸炙黃野狐骨用頭骨一枚令炙黃色防己一兩半紫菀去苗土蜀漆葉麥門冬去心焙甘草炙銼各一兩上為細末煉蜜丸如梧桐子大每服米飲下二十丸日午再服養正丹出仁存方治傳尸出汗取蟲辟邪鱉甲一兩醋炙天靈蓋用頂門處一片酥炙黃桃仁四十九個去皮青蒿一握淡豉五十粒蔥白二莖安息香一分柳桃桑皮各七條一方用柳李桑皮各七莖長各七寸許上隔夜以水一升浸至五更取汁半升再入童子小便半升煎取四合入檳榔一個為末麝香一錢將煎藥取滓調下日高三丈時溫服以衣蓋取汗看十指汗出如藕絲五色臭穢汗出後仍瀉下蟲形狀惡物取盡甚者過旬日再服取效鉛丹丸治骨蒸傳尸伏連等疾鉛丹炒三兩安息香一兩入桃仁相和研白朮一兩鬼督郵一兩半木香柴胡去苗獺肝炙乾各一兩上為末煉蜜丸如梧桐子大每服七丸粥飲下不拘時候安息香湯治傳尸勞殗殜喘氣咳嗽心胸滿悶漸至羸瘦安息香麝香研各一錢天靈蓋酥炙黃三兩秦艽去苗土鱉甲去裙襴炙令黃當歸切焙柴胡去苗各一兩上粗搗篩每服四錢童子小便一盞半蔥白五寸桃柳枝各七寸生薑錢大二片同煎至八分去滓不計時候服夜臥時再煎放患人床頭至五更形於夢寐此是藥效也鉤藤飲治傳尸勞瘦骨蒸伏連殗殜命在須臾精神尚爽鉤藤黃芩去黑皮升麻甘草炙令赤色銼各一兩鱉甲去裙襴醋浸炙令黃色丁香各半兩大黃銼微炒四兩上粗搗篩每服五錢用水一盞半煎至一盞去滓食後溫二服相去如人行七八里再服參連丸治傳尸勞骨蒸苦參一兩半黃連去須三兩二分栝蔞根牡蠣煅知母焙麥門冬去心各一兩三分焙用上為細末煉蜜丸如梧子大每服食後米飲下十丸日二服一方以牛乳為丸每服十五丸漿水下祛邪飲治傳尸勞氣喘咳大腸祕澀羸瘦無力檳榔煨大黃銼炒各一兩阿魏研一錢丹砂研麝香研秦艽去苗土各一分上除麝香丹砂外細研銼如麻豆大相合令勻分五服每用東西柳桃梢各七枝各長一握細銼以童子小便一升半隔夜浸至來日五更雞鳴時同煎並藥煎十餘沸傾出將細絹濾過分為兩服空腹相次服之至明即轉下惡物似頭髮馬尾魚腦轉動不止自佳宜食軟粥將息七日後用溫藥補之牡蠣粉治一切虛勞傳尸骨蒸盜汗牡蠣研熬作粉三合麻黃為末一錢去節三兩白米粉三合蒺藜子炒去刺為末二兩丹砂飛研半兩胡燕屎乾者一兩上同和研勻以生絹袋盛夜臥汗出以粉摩身時時用之雄黃丸出仁存方治傳尸勞雄黃半兩兔糞三兩天靈蓋一兩酥炙黃鱉甲木香各半兩輕粉一錢上為末法酒一升大黃半兩熬膏為丸如彈子大硃砂為衣凡此疾先燒安息香烟吸之不嗽非傳尸也不可用此藥若煙入口嗽不止乃傳尸也宜用此藥五更初服勿令人知以童子小便同酒一盞化一丸服之如人行二十里久吐出蟲如燈心或如爛瓜李或如蝦蟆未效再服以應為度蟲紅火燒之又用油煎治傳尸骨蒸沐浴絶病根源方出聖惠方桃枝柳枝槐枝蒴藋皂莢枝上細銼共一斗以水一石煮取六斗去滓入盆於暖室內浴如汗出宜避風厚蓋衣臥四神湯治傳尸勞瘵木香濕紙裹燒人參白茯苓去黑皮附子炮裂去皮臍上等分粗篩搗每服三錢以水一盞煎至五七沸去滓空心早晚食前夜臥各一服服三後服麝香丸取藥或天色陰晦且停服候晴明即服取藥凡來日五更初欲服取傳尸勞藥於本夜一更至二更盡先服天靈蓋丸療伏連病本緣極熱相易相連不斷遂名伏連亦名骨蒸傳尸用此方甚效人屎五大升濕者人小便一升新炊粟飯五大升六月六日曲半餅熬碎上取一瓷瓶盛密封置一室中二七日並消一無惡氣每旦一大合盡二服無不瘥者令藥淨燒香勿令婦人小兒女子雞犬孝子見之麝香丸治傳尸伏連殗殜肺痿痃癖骨蒸疰鬼氣急熱勞疾宜服之凡欲取傳尸勞即先家中見人自小至大服麝香丸七日服至三日後方與患人服麝香細研胡黃連碾為細末丹砂細研各一兩上研勻以生人血蘸蒸餅為丸如赤豆大以新宰豬血和亦可小兒三丸大人九丸濃煎桃仁湯吞下日午夜臥服一家人腹內曾受尸疰者即大便下膿利及瀉惡黑水勿怪若患者傳遍五臟將欲命終宜急合此藥遍家大小服直至患者死後七日疾即不傳染凡欲中下勞瘵藥先服溫中平補五臟四神湯療骨蒸傳尸方皂莢長一尺者勿用續取炙令微焦去黑皮碎之綿裹羊肉大如拳煮如常法黑錫大如雞子上取一升無灰青酒貯銅鐺內即著綿裹煎五服即漉去綿裹內黑錫使融液盡取三合令病者先啜肉汁即服一合如變吐困不須起次以銅盆貯水令病者坐上有蟲出如馬尾赤色頭黑即效如無再服三合盡為度一服相去如人行十里必驗其禁食一如藥法治傳尸伏連方出聖惠方犬膽一枚乾者甘草一分上以好酒一升於銅器中煎甘草三兩沸然後於瓷碗中以煎汁磨犬膽盡候晴明侵早更將暖水洗面停息少時空心都為一服神人阿魏散出濟生拔粹方治骨蒸傳尸等勞寒熱羸劣困倦喘嗽阿魏三錢青蒿一握研上細切東北桃枝一握細銼甘草如病人中指頭大男左女右以童子小便二升半隔夜浸藥明旦煎取一大升空心溫服分三服次服調檳榔三錢如人行十里更一服丈夫病婦人煎婦人病丈夫煎合藥時忌孝子孕婦病人及腥穢物雞犬等後忌油膩濕生冷硬物至一二劑即吐出蟲子或泄瀉更不須服余藥如未吐利即當盡服病在上即吐在下即利皆出蟲如馬尾人發即瘥服藥後逐去諸疾五臟虛弱魂魄不安即以白茯苓湯服補之白茯苓湯白茯苓一錢人參二錢遠志二錢去心龍骨防風各二錢甘草二錢犀角末五錢生地黃四錢大棗七枚麥門冬去心四錢上以水二盞煎服八合分三服溫服如人行五里一服仍避風寒若覺未安隔日更作一劑以上兩藥須連服之神授丸一名神授湯出醫方大成治傳尸勞疰最能殺勞蟲用正川椒色紅火者去合口並紫黃紙二重託之於熱爐內頻撥令出油取頓地用沙盆蓋火灰拌蜜四團約一時許碾末老酒浸白糕為糊丸梧子大每服三四十丸食前鹽湯下逐時常服滿一斤瘵疾自瘥昔人服之日久取下勞蟲如小蛇狀即瘥此藥亦治痹癖桂酒湯下治腰痛茴香酒下治腎冷鹽湯下一方棗湯下五十丸勞蟲盡下永絶根一方為末每服二錢空心米湯調和下痹麻暈悶少頃如不能自禁即以酒糊丸梧桐子大空心服五十丸昔人勞病遇一異人云勞氣已入臟遂與此方令急服二斤其病當去服之幾盡大便出一蟲狀如蛇自是遂安一方名川椒丸治諸傳尸勞氣殺蟲溫中逐骨節皮膚死肌寒濕痹下氣除臟腑寒冷傷寒溫瘧大風寒汗不出心腹留飲宿食腸癖下利泄精女子患乳余疾散風邪瘕結水腫黃疸鬼疰蠱毒頭風冷風腳不遂虛損嗽破症開胸天行時氣産後宿血壯陽療陰寒暖腰膝疼縮小便一方云有婦絶産服至二斤生七子道人服之通仙能治膀胱急傳尸病遁疰骨蒸伏連殗殜此病多因臨尸哭泣尸氣入腹連綿或五年有能食不作肌膚或三日五日若微勞即發大都當頭額骨間尋常微熱翕翕然死後家中更染一人如此乃至滅門此方療治之青羚羊肺一具破於布上曝乾之莨菪子一升絹袋盛上醋一升同漬經三日出各於布上曝之令至干微火熬莨菪子共搗篩和以蜜丸如梧子服三丸加至四丸又方地骨皮白薇芍藥甘草犀角升麻茯神麥門冬黃芩桔梗枳實大黃前胡茯苓天門冬生薑桑根白皮當歸柴胡硃砂芎藭羚羊屑蜀漆知母石膏常山鱉甲豆豉黃耆地黃橘皮烏梅上藥並可詳病狀用之延壽散治男子女人小童等傳尸諸勞咳嗽寒熱變候百出卻惡疰勞蟲永去根本牡丹皮附子炮裂去皮臍柴胡去苗秦艽去苗鱉甲酒浸炙令赤色以上各半兩上為末入人中白半兩同研以瓷盒盛之每服用豬膽一枚蔥白椒末一處細銼如膏入末三錢拌和以童子小便一盞水半盞同煎沸溫服其患人貼體著皂紗衫一領衣被蓋惡汗出脫衫揩拭身上汗乾淨洗衫以安息香薰干避風將息七日服後汗出身輕如常是效瘥後其衫即棄於十字街中或長流水永瘥治一切虛勞傳尸伏連鬼疰本臟氣虛夜夢不祥精神恍惚面色青黑赤白變證不定形體消瘦精氣不守四肢百節沉重吃食減少行步無力一切勞候虛冷之證並宜服此方牛膝石斛去頭續斷山茱萸芎藭各半兩菖蒲吳茱萸官桂虎骨鱉甲醋炙香黃茯苓肉豆蔻乾地黃黃耆天靈蓋醋炙黑色柴胡去苗各一分木香三銖上細杵羅為末以童子小便些少化麝香兩豆大對煉蜜丸如梧子大空心鹽湯下四十丸治一切傳尸伏連鬼疰夜間多夢鬼怪祛邪逐鬼十神丹雄黃一兩硫黃玄參蒼朮鬼箭羽鬼臼虎骨皂角麝香硃砂各一分上細杵羅為末以阿魏三銖化作水熟煮麵糊丸如梧子大以細研雄黃為衣病人身上常系兩三丸夜間更取兩三丸入麝香些少相滾衣上床前燒一爐百鬼自退治傳尸尸疰鬼氣伏連者以死人頂骨十字解者燒令黑細研白飲和服治傳尸鬼氣疰忤以猯脂銷於酒中服之治傳尸伏連鬼氣疰忤邪氣用苦耽苗子煮汁服亦生搗絞汁服傳尸羸瘦附論夫男女傳尸之候心胸滿悶背膊痠疼兩目多澀四肢無力唯知欲臥睡恆不著脊膂急痛膝脛痠疼多臥少起狀如佯由病每至旦起即精神尚好恍似無病從日午以後即四體微熱面好顏色喜見人過常懷忿怒行立腳弱夜臥盜汗夢與鬼交或見先亡或多驚悸有時氣急有時咳嗽雖思飲食不能多飧死在須臾而精神尚好或兩脅虛脹或時微利鼻乾口燥恆多黏唾有時唇赤有時欲唾漸加羸弱由於水涸不覺其死矣又曰傳尸者無問老少男女皆有斯疾大都此病相剋而生先毒氣內傳周遍五臟漸至羸瘦以至於死訖復易家屬一人故曰傳尸亦名傳疰以其初得半臥半起號為殗殜氣急嗽者名曰肺痿骨髓中熱稱為骨蒸內傳五臟名曰伏連忽而不療者乃至絶後假如男子因虛損得之名為勞極其源先從腎起腎初受之兩脛痠疼腰脊拘急行立腳弱飲食減少兩耳颼颼渾似風聲夜臥夢泄陰汗萎弱腎既受已次傳於心心受氣夜臥必驚或多怯悸心懸氣翕欲盡夢見先亡有時盜汗食無滋味口內生瘡唯欲眠臥朝輕暮重兩頰口唇如敷胭脂五心皆熱心病不已次傳於肺肺既受時氣滿咳嗽體力微弱有時喘急臥即變甚鼻口乾燥不聞香臭假令得聞唯覺朽腐物氣有時噁心憤憤欲吐肌膚枯燥或時刺痛酷似蟲行皮乾皺起狀若面斤肺既受已次傳於肝肝初受氣兩目漠漠面無顏色常欲顰眉視不見遠目恆乾澀又時腹痛或睛赤黃朝夕懵懂常欲食眠及至放臥睡還不著肺肝既受已次傳於脾脾初受氣兩肋虛脹食不消化又時渴利或食旋出有時肚痛腹脹雷鳴唇苦焦乾或生瘡腫毛髮乾燥無有光潤或上氣抬肩喘息利赤黑汁至此候者將死之證也方杏仁丸治傳尸夜夢鬼交遺精心腹冷癖小腹與陰中相引痛飲食不下日漸覺瘦宜服杏仁五升肥好者以童子小便於瓦瓶中浸二七日和瓶於日中曬每日換小便日滿以新汲水淘洗去皮尖便以微火焙乾別以小便一斗於銀鍋內暖火煎後杏仁隨手破即於久經用砂盆內柳木槌研如膏便以細布濾過真酥一兩薄荷汁二大合攪令勻即入後藥青蒿子二兩柴胡去苗鱉甲塗酥炙令黃去裙襴烏梅肉微炒地骨皮赤茯苓以上各一兩半知母虎骨頭塗酥炙令黃生乾地黃肉蓯蓉酒浸一宿刮去粗皮炙令黃人參去蘆頭以上各一兩枳殼麩炒微黃去瓤當歸以上各三分白朮木香牡蠣以上各半兩白檳榔二兩硃砂一兩細研豉心一合上搗羅為末以和人參再搗五七百杵丸如梧子大每日空心以溫水下十五丸漸加至三十丸服後覺似熱即減藥已定還添以意酌服經一月諸候皆退能食夜臥安暢面有血色即是藥力已行當勤服勿怠忌莧菜冷水白粥生血雀肉桃李鱉甲湯治五勞乾瘦及傳尸夢寢不祥日漸消瘦肌體困倦骨節疼痛不思飲食鱉甲去裙襴酥炙令黃色一兩天靈蓋酥炙黃色半兩柴胡去苗赤茯苓去黑皮各三分貝母去心桃仁去皮尖雙仁麩炒各半兩黃連去須半兩麥門冬去心焙三分阿魏用麩裹煨令熟半兩生乾地黃三分檳榔銼當歸銼焙各半兩安息香半兩地骨皮三分山梔子仁人參各半兩上搗篩每服四錢童子小便一盞半蔥白五寸桃柳枝各七寸生薑錢大二片同煎至八分不計時候去滓溫服夜後下放患人床頭至五更夢寐非常此是藥效也補勞飲治男子婦人虛勞骨蒸傳尸染著不能斷絶服後阿魏丸經脈尚未通或四肢虛羸飲食全少速服此藥通經脈黃耆銼當歸切焙生乾地黃焙各二兩人參白茯苓去黑皮芍藥五味子桂去粗皮牛膝酒浸切焙陳橘皮麥門冬去心焙枳殼去瓤麩炒甘草炙銼各一兩柴胡去苗一兩半上粗搗篩每服五錢水一盞半入生薑五片棗三枚擘同煎八分去滓溫服不計時黃連丸治傳尸面黑頭熱痛胸背氣結咳唾黏痰食少頻嗽喘息急滿脅肋氣脹腰臍下疼四肢蒸熱痿困不安黃連去須二兩半獺肝炙乾貝母去心大黃銼炒各一兩半龍膽去蘆頭一兩半紫菀去苗土旋覆花茯苓去木各一兩天靈蓋塗炙令黃色檳榔微煨銼各一兩上為細末煉蜜丸如梧子大每日食後煎漿水下二十丸日午再服女子血閉加黃芩一兩鐵粉丸出聖惠方治傳尸勞羸瘦心神煩熱四肢疼痛宜服鐵粉二兩獺肝一具微炙柴胡一兩半去苗安息香二兩入胡桃仁搗熟鬼督郵一兩半木香一兩桃仁一兩半湯浸去皮尖雙仁麩炒微黃麝香半兩細研苦參二兩上搗羅為末煉蜜和搗一二百杵丸如梧子大每服不計時候煎生薑青橘皮湯下二十丸阿魏丸治傳尸骨蒸女人血氣血候經年不通痰嗽黃瘦四肢羸弱盜汗骨熱或時憎寒飲食減少阿魏細研當歸切焙蕪荑仁炒各一兩雄黃研豬牙皂角去皮子酥炙各半兩麝香研蓬莪朮煨銼各三分柴胡去苗檳榔銼各二兩上為末和勻再羅用羊肉半斤去皮爛煮細切研如膏入諸藥末和搗三千杵如硬即添肉汁丸如緑豆大每服五十丸五更酒下仍飲令醉以青絹被蓋之睡覺汗出通身必有細蟲在被間日光內看見急須燒之或瀉下惡物並蟲等是效如小兒服以意加減雄黃丸出聖惠方治骨蒸傳尸出蟲下積惡物雄黃研雌黃研代赭石研各一兩丹砂研二兩上四味以醋相和炒令乾後以水飛過去卻醋味焙令乾研如粉入後藥相和蝦蟆炙天靈蓋炙黃搗末麝香研青黛各半兩研巴豆七枚水煮一復時去皮尖心膜研上搗研後五味為末入前四味更研令勻以粟米飯為丸如梧桐子大每日空腹熟水下七丸若要下蟲即以沙糖水下二丸服至三日滿身出蟲用茅香二斤煮湯沐浴一宿後看在水上或在水下澄之可驗鬼哭飲子出聖惠方治傳尸勞不以冷熱羸瘦者宜服檳榔兩個一生一熟鱉甲半兩塗酥炙令焦黃去裙襴甘草一截如病人中指長桃仁七顆去皮尖杏仁七顆去皮尖青蒿一握長七寸阿魏少許東南桃柳各七莖長三寸和心用上以童子小便一大盞去滓食前分溫二服以吐利出惡物為度忌莧菜龍膽丸出聖惠方治傳尸羸瘦經久不捐龍膽一兩去蘆頭枳殼一兩麩炒去瓤地骨皮三分甘草半兩炙微赤銼麥門冬一兩半去心赤茯苓一兩梔子仁三分桃仁三分去皮尖雙仁麩炒微黃上搗羅為末煉蜜和搗二三百杵丸如梧子大每服不計時候以粥飲下二十丸獺肝丸出聖惠方治傳尸骨氣骨蒸日漸瘦弱宜服獺肝三分微炙鬼臼三分沙參三分去蘆頭人參三分去蘆頭丹參三分苦參三分天靈蓋一兩塗酥炙微黃麝香半兩研入上搗羅為末煉蜜和搗一二百杵丸如梧子大每服不計時候以粥飲下二十丸通神丸出聖惠方治傳尸勞情思不悅心多驚悸盜汗羸瘦兔糞七粒胎髮二七天小兒胎髮人手指甲七七片人腳指甲七七片天靈蓋一枚圓者穿山甲七七片硇砂半兩通明者紫河車一具上八味入瓦器內鹽泥固濟穿一地竅方圓一尺將藥瓶在地竅內用槐木火圍定藥瓶燒一日取出細研再入後藥雄黃研鬼臼炒搗末鬼箭羽炒搗末麝香研丹砂研各一兩上將後五味末與前燒藥合和再研勻煉蜜丸如梧桐子大別用丹砂為衣每服十丸漸加至二十丸米飲下日進二服早晚食前服合藥用上寅日不令婦人雞犬見阿魏散治傳尸勞病胸滿短氣肌體羸瘦無力喘嗽不已阿魏研安息香入胡桃相合研各一兩甘草炙銼半兩豬牙皂莢塗酥炙令黃去皮子一兩木香天靈蓋塗酥炙令黃色半兩豉一合麝香研半錢上除研藥外搗羅為散與研藥和勻每服五錢用童子小便一盞半入蔥白三寸明日五更煎至一盞空心在床服之日午夜食候再服服藥後良久或得吐亦佳有利下蟲如發或積聚五色穢惡物是病根出服藥數日如夢與人離別哭泣者瘥之兆也患甚三日一劑三劑瘥有患者但收拾藥物置病人床頭邊如有此夢瘥虎骨散出聖惠方治傳尸羸瘦肌體痠疼不思飲食宜服虎骨頭一兩塗酥炙令黃鱉甲一兩塗酥炙微黃去裙川升麻一兩柴胡一兩去苗桃仁一兩湯浸去皮尖雙仁麩微炒川大黃二兩銼碎微炒甘草一兩微赤銼上搗粗羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服忌莧菜天靈蓋散出聖惠方治傳尸勞瘦不問年月深淺宜服天靈蓋一枚塗酥炙令黃阿魏半兩木香一分安息香一分豬牙皂莢一挺塗酥炙令黃去皮子甘草半兩炙微赤銼上搗粗羅為散每服五錢以童子小便一大盞半煎至一大盞去滓分溫二服平旦一服如人行八九里更一服唯吃蔥粥或吐出白蟲如發或吐出赤蟲若吐赤蟲夢見鬼哭即是瘥也極重者三服瘥三日一度合服終身不得吃牛馬肉釣蟲丸治傳尸勞病痿羸兩腮常赤喘急咳嗽心胸滿悶四肢無力夢與鬼交磁石細研生用硇砂湯熬令熟各二兩龍骨三兩膩粉半兩麝香取末七兩上以細末和勻以黃蠟四兩煉入諸藥丸如梧桐子大用線子五七寸一頭系錢一文一頭穿藥丸子令患人空心新水吞藥丸子其錢在口外候噁心時以手拽線子吐下藥並蟲吐出在藥上急用油炸蟲死立效香水灑衣法出衛生家寶方凡治諸尸醫者並人家俱先以香水灑身恐蟲飛著人以此法防之安息香研檀香鎊細茅香乳香上煎水灑衣並頭面天靈蓋散出衛生家寶方治一切傳尸殺一切勞蟲天靈蓋如兩指大以檀香煎水洗過用塗酥炙時念咒曰雷公神雷母聖逢傳尸須用七次檳榔五個如雞心者生用連珠甘遂半兩併為末阿魏一分別研安息香二分用銅刀子鉢內研和諸藥麝香三錢當門子別研上六味再研勻每服三錢用後湯調下薤白蔥白各二七莖青蒿一小握桃枝柳枝桑枝酸石榴枝並用東南條嫩各長七寸烏梅五個上八味用童子小便四升同入銀器內文武火熬至一升濾去滓分作三盞調下五更初服男子患女人煎女人患男子煎服藥後如覺有逆吐即用白梅止之天明覺臟腑鳴須臾轉下蟲及惡物黃水異色糞穢若一服未下辰巳間更進一服各溫吃若瀉不止用龍骨黃連訶子等分為末熟水調下一二錢立止次以白粥補之用溫藥調補如蟲下急以猛火一炊投之地取蟲入沸油中烹之研碎埋地中
