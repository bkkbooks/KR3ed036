body:
  text: 卷八十二眼目門眯目附論夫眯目者簸粳飛塵等物入於目中也宜亟出之久不出著於瞼眥因而傷動則為澀痛淚出古方初眯時令以綿裹針撩去之或以墨汁或以雞血浮出之皆良龍木論眯目飛塵外障眯初患之時皆因飛揚塵物入眼貼瞼皮黏定睛上疼痛隱澀難開目雜人物欲治之時但翻入眼皮用錦裹針撥出眯物然切宜服藥將息忌口若因此翳膜生上急服退翳車前散補肝歌曰眯目諸般物飛塵並濺來貼睛黏定後疼痛即難開綿裹針撩出尋睛目暢懷因茲生翳膜好藥卻能回方車前散出龍木論治眯目飛塵外障車前子洗焙五味子炒芍藥各一兩半細辛去苗葉黑參茯苓白者去黑皮人參大黃銼炒桔梗銼炒各一兩上為細末以水一盞散一錢煎至五分食後去滓溫服治雜物眯目不出出聖惠方用鮑魚頭二枚地膚子半合以水煮令爛取汁以清目中即出補肝丸出龍木論治眯目飛塵外障澤瀉菖蒲各一兩半乾山藥人參茯苓乳汁拌曬乾防風遠志知母乾地黃各二兩上為末煉蜜為丸如梧桐子大空心吞下一十丸用葉下紅以鹽少許用絹片裹滴在眼中左眼疼用滓塞右鼻右眼疼塞左鼻如上障用雪裹開並用鵝不食草些少同前藥搗碎滴汁於眼中滓亦塞鼻豬脂膏出聖惠方治一切物眯目中妨痛不可忍方取豬脂去筋膜於水中煮待有浮上如油者掠取貯於別器中又煮依前再取之仰臥去枕點於鼻中不過三兩度其脂自眼角中流出眯物即出治麥芒入目出本草煮大麥湯洗之治砂塵入眼不可出者出本草取洗蜣螂一枚手持其眥遂於眼上影之沙塵自出治眯目物芒入目出本草以墨磨點瞳子上治眯目去刺出本草以穿鮑魚繩煮汁洗之大良也治竹木屑入目不出出本草以穿鱔魚繩煮汁洗之良治目中眯法出千金方旦起對門戶跪拜云戶門狹小不足宿客乃便瘥外物傷目附論夫目為外所傷輕者因物撞擊胞瞼腫痛重者或致目睛突出但眼帶未斷即納瞼中急搗生地黃綿裹以敷之仍以闢風膏磨四旁無使外風乘隙內服除熱治風鎮驚痛藥以藥之若治之失時惡血凝積腐瘀侵睛致生翳膜鉤割尉烙各隨所宜也龍木論云偶初被物撞破外障此眼初患之時忽然被物誤有打撞瞼胞睛珠痛腫難開宜令鐮洗出血後以爛搗地黃綿裹風眼然後宜服除風散壓熱飲子歌曰非理因遭撞破傷不任疼痛甚慌張瞳仁撞打色昏濁惡血仍流在眼眶欲療還須鐮瞼血地黃綿裹密封藏除風壓熱涼湯飲免使他風作禍殃撞刺生翳外障此眼初患之時因被物誤有撞刺著治療不盡有餘痕積血在瞼眥之中致此生翳如此病狀不須鉤割不尉烙切須將息大忌淫欲嗔怒宜參湯退熱茺蔚飲歌曰若有撞刺翳生根治之不盡有餘痕待他痛定徒磨治勸君將息忌淫嗔覺熱更須將藥壓痛苦增加因熱親若言此翳鉤除得知君不是解醫人方壓熱飲子出龍木治偶被物撞破外障犀角鎊大黃銼炒知母焙人參白茯苓去黑皮黃芩去黑心黑參各一兩麥門冬焙一兩半去心甘草炙銼半兩上為末以水一盞散一錢煎至五分食後去滓溫服赤芍藥散出聖惠方治眼撞打著疼痛赤芍藥一兩茺蔚子一兩防風去蘆頭芎藭藁本桂心黃耆銼枳殼熟炒微黃去瓤白芷各二兩上為末散每服三錢水一中盞煎至六分去滓不時溫服治目睛為物傷疼痛不可忍者傳信適用方以牛尿日兩次點之避風雖黑睛破者亦可療琥珀散出聖惠方治眼撞打著瞳仁不損目睛有瘀血不散疼痛不可忍琥珀細研當歸銼微炒川大黃銼碎微炒各一兩赤芍藥羚羊角屑桃仁湯浸去皮尖突厥白生乾地黃藁本各三兩上為細散每服不計時候以溫水調二錢人參湯出龍木論治撞碎生翳外障人參二兩黑參茯苓白者去黑皮黃芩去黑心五味子羌活去蘆頭細辛去苗葉各一兩車前子二兩半上為末以水一盞散一錢煎至五分食後去滓溫服龍鹽膏聖濟總録治砂土入眼睛不可忍腫赤者鹽龍腦硼砂研馬牙硝研硃砂研飛過蕤仁杏仁去皮尖上等分研細再同研勻以生蜜和稀稠得所新瓷盒盛用竹箸臥點瞿麥散出聖惠方治眯不出生膚翳瞿麥穗乾薑炮各半兩上為細末以井水調服二錢日二食後治稻麥芒等入目中方出龍木論取出蠐螬以新布覆目上將蠐螬從布上磨之芒出著布良白魚方出聖惠方治沙石草木入目中不出以書中白魚和乳汁注目中一方以衣中白魚曝乾為末點治雜物眯眼不出方出聖惠方以蠶砂揀令淨空心用新汲水調下十枚勿嚼破又方出聖惠方治雜物眯目不出上用尋根白皮取新者一片如箸大削一頭薄令軟滑可漸漸入眼目中撥之須臾自出又方出聖惠方治雜物眯目不出用新大麥半合煮汁漸注目中即出又方出聖惠方用白蘘荷根取心搗絞汁滴入眼中立出又方出聖惠方用甑帶燒灰細研每服二錢水調服之即出又方出聖惠方東牆上馬齒莧燒灰細研少許點眥頭即出又方出聖惠方用生粟米七顆爛嚼並唾洗之即出又方出聖惠方用雞肝中血少許取滴目中即出又方出聖惠方用豉三七粒以水浸洗目視之即出又方出聖惠方以酥少許納鼻中取隨眯目左右垂頭臥少時令流入目中淚與眯物同出又方出危氏方治飛絲入眼腫痛刮指甲上細屑箸頭點津液和爪屑點入眼目其絲自隨爪拔出又方出危氏方以石菖蒲椎破如絲在左眼菖蒲塞右鼻中在右眼眶塞左鼻中百發百中治眯眼方出龍木論以食鹽並鼓罡水視之立出灰眯人眼以麻油滴入眼中即出又方出海上方治眼飛絲入腫痛以白菜及蔓荊菜揉手帕內擘開眼滴汁三兩點即出治眯目不明方出聖惠方雄羊鹿筋擘之如拔箸法納筋口中熟嚼擘眼內著瞳子瞼上以手當瞼上輕挼之若有眯者二七過挼便出之視眯當著筋出即止未出者復為之如此法常以平旦日未出時為之以瘥為度出訖以好蜜注四眥頭鯉魚膽亦佳若數挼目痛可間日挼之出墨運方出危氏方治飛絲入眼令人眼睛脹突出痛不可忍兼治脹膜及草芒沙石眯目不出用新筆兩三管濡好墨更換頻運睛上飛絲纏筆而出即安一方治雲母併入眼點大小眥頭隨墨出一方用清水研細墨以銅箸點之退熱茺蔚散出龍木論治證同前茺蔚子二兩防風去蘆芎藭桔梗銼炒人參知母各一兩焙藁本去苗土五分白芷三分上為末每日米飲調下一錢除風散出龍木論治偶被物撞破外障防風去蘆二兩車前子藁本去苗土細辛去苗葉芎藭五味子桔梗銼炒各一兩半上為末用陳米飲空心調下一錢經效散治撞刺生翳大黃當歸芍藥各半兩粉草北柴胡各二兩去蘆連翹各一分犀角一錢浸入上銼散每服三錢水一鍾煎食服生乾地黃散治眼忽被撞打著腫澀疼痛生乾地黃芎藭羚羊角屑川大黃銼碎微炒以上各一兩赤芍藥枳殼麩炒微黃去瓤木香以上各三分上為散每服三錢以水一鍾煎至六分去滓不計時溫服木通湯治目傷睛損木通銼赤芍藥大黃銼各一兩半白芷三分防風去蘆頭山梔子仁各一兩上粗搗篩每服五錢水一鍾半入苦竹葉七片煎至七分去滓入地黃汁一合更煎兩沸食後溫服臨臥再服治傷損眼藥大黃半兩當歸乳香沒藥赤芍藥甘草各二錢半上為散酒一碗水一碗同煎服地黃膏治被物撞打生地黃一合黃連一兩黃柏寒水石各半兩上為地黃研自然汁和藥成餅子要用時以紙貼目上非但是撞打可用凡風熱赤目熱淚出等眼皆可用以其性涼能逐去熱毒耳三膽汁點眼方治目為物所傷羊膽二枚雞膽三枚鯉魚膽二枚上摘破將汁合勻每點目三上生地膚方治目為物所傷睛陷胬肉以生地膚子去土洗二兩絞取汁瓷盒盛每取少許點目各月將乾者煎取濃汁用又方治為物所傷或胬肉宜用以杏仁湯浸去皮尖雙仁爛研用人乳化開日三度點弩肉上物落眼方治麥芒及塵土並物入眼不出上為大藕一截淨洗爛搗以帛子裹於眼上挹取汁落眼中立出鯉魚膽雞肝筋血墨汁皆可點睛為物所傷損破方牛涎日二點避風黑睛破亦瘥墜睛附論夫墜睛者眼因賊風所吹血脈受寒貫沖瞳仁風寒氣隨眼帶牽拽睛瞳向下名曰墜睛也日久不治瞳仁損陷遂致失明方犀角散治墜睛眼時發疼痛視物散亂犀角鎊羚羊角鎊各半兩青羊膽一枚五味子槐實青葙子芡實炒茺蔚子蘆薈研胡黃連骨皮各三錢兔肝炙乾一具上除膽外研為末以膽汁拌勻每服二錢至食後煎槐子湯調下臨臥再服忌發熱毒物槐實丸治墜睛失明眼牽陷槐實羚羊角鎊獨活去蘆頭天麻沙參地膚子人參各一兩半防風去蘆甘菊花枳殼去瓤麩炒各一兩決明子二兩上為末煉蜜和丸如梧桐子大每服三十丸空心臨臥淡漿水下一方無地膚子菊花散治墜睛風毒牽瞳仁向下眼帶緊急視物不明甘菊花羚羊角屑各一兩旋覆花防風去蘆頭蔓荊子各三分生乾地黃海桐皮秦艽去苗附子炮裂白者決明子芎藭各半兩上㕮咀每服三錢鹽水一鍾煎至六分去滓食後溫服臨臥再服之犀角散治墜睛眼失明眼睛牽陷或時發疼視物散亂犀角羚羊角屑各半兩車前子枸杞子各一兩五味子槐子青葙子牛蒡子微炒茺蔚子胡黃連各一分兔肝一具微炙上搗細羅為散每於食後煎槐子湯下二錢臨臥再服羌活散出聖惠方治墜睛久不瘥羌活二兩秦艽去苗防風去蘆頭桂心牛蒡子微炒胡黃連茯神各一兩白附子炮裂犀角屑酸棗仁微炒各三分龍腦一分研細入上搗為細散每服空心鹽湯調下二錢晚食前煎麥門冬熟水再調服之細辛散出聖惠方治墜睛眼風熱熱牽瞳仁向下細辛赤茯苓黃芩各一兩麥門冬去心焙木通黃連葳蕤各一兩半川大黃二兩銼碎微炒甘草半兩銼碎微炒上㕮咀每服四錢以水一鍾煎至六分去滓食後溫服臨臥再服忌炙爆膩毒滑魚肉點眼蕤仁煎出聖濟總録治墜睛風毒所攻蕤仁去皮研二兩黃連去須銼地骨皮取白者用曾青研如粉各一兩青鹽一分古錢十文蜜二盞上以新綿裹六味安新瓷瓶中與蜜相和煮一復時後以重綿濾去滓冷盡依前安瓶中著露地兩宿去毒日點黍米大日三五次洗眼決明湯出聖濟總録治墜睛視物失明決明子柴胡去苗秦皮防風去蘆蛇銜草各一兩生乾地黃二兩上銼細每用一兩以水三盞煎取二盞去滓再用綿濾過每用適溫熱洗訖避風即瘥點眼藥方出聖惠方治墜睛風熱所攻豬肝一具黑豆花曝乾槐花曝乾地黃花曝乾各一兩上除豬肝外搗細羅為散和豬肝內鐺中以水二斗煎俟上有凝脂此是藥成矣以物掠盡為度以瓷盒中盛每以銅箸取如黍米大點眥中日三四度目珠子突出附論夫人因風熱痰飲攻積腑臟陰陽不和肝氣蘊積熱毒之氣上衝於目使目睛疼痛甚者突出治宜先服寒藥以瀉肝氣然後調治勿求速效惟漸治之仍須微針引出惡汁也龍木論云突起睛高外障眼初患之時皆因疼痛發散非時盡是五臟毒風所攻全時突出此疾不宜針灸鉤割只宜服退熱桔梗飲還時平穩用針破流出清汁即得安穩歌曰眼忽疼痛便睛高毒風五臟熱相遭先飲桔梗瀉肝後又吞丸散漸還消若要終歸平穩計汁出清涎莫用挑休針更可針三便睛輪平復似原朝方黃連丸出聖惠方治熱毒攻眼目珠子突出黃連去須犀牛屑地膚子決明子黃芩苦參銼玄參車前子各一兩川朴硝龍膽去蘆頭各三兩上為末煉蜜和丸如梧桐子大每服食後溫水下二十丸臨臥再服之還睛丸出龍木論治眼睛突起外障遠志茺蔚子各二兩車前子一兩半防風茯苓乾山藥五味子人參細辛各一兩上為末煉蜜和丸如梧桐子大每服空心用茶清送下一十丸葳蕤散出聖惠方治眼黑睛突