先將白礬於銀器內化成汁次入黃丹末以銀牌攪勻更入乳香沒藥慢火不住攪令枯乾為粉候冷研極細熟絹羅過後入鷹條血竭麝香輕粉粉霜研極勻如粉再以熟絹羅過為末點之前胡湯出聖濟總録治眼赤膜不見物或生息肉前胡去蘆頭決明子炒黃連去須芍藥大黃升麻各二分山梔子仁枳殼去瓤麩炒各一兩上粗搗篩每服五錢以水一鍾半苦竹葉十片煎至一鍾去滓下芒硝末一錢飯食後臨臥溫服葳蕤湯出聖濟總録治眼生息肉淫膚葳蕤升麻黃連去須各一兩半秦皮去粗皮三分山梔子仁地骨皮甘草炙銼各一兩半上粗搗篩每服五錢水一鍾半煎至一盞去滓投芒硝末一錢食後臨臥溫服生地黃丸出直指方明目活血消去瘀肉人參防風各半兩當歸川芎生地黃各一兩全蠍五尾乾白蒺藜炒去刺一兩上研為末煉蜜丸如梧桐子大每服五十丸食後薄茶下加羚羊角半兩尤佳洗輪散治風熱攻注眼生息肉兼翳膜疼痛黃連膏出危氏方治一切眼目瘀肉攀睛風癢淚落不止上取水入香硝金內熬至七分淘出令經宿水面浮勻者取出控干以紙袋子盛風中懸至風化將黃連細末熬清汁加干硝用豬羊膽和加蜜點之大棗煎一名大棗膏出千金方治眼生赤脈息肉急痛不開如芥在眼磣痛石鹽膏出千金方治眼中息肉驢脂石鹽末上等分和合令調注目兩眥頭日三夜一瘥貝齒散出千金方治目中生息肉膚翳稍長欲滿目閉瞳子及珠管貝齒七枚燒為末珍珠等分一方用米炒上合治如粉以注翳上日三度甚良亦治目眯不出黃連湯出聖惠方治眼熱胬肉及赤癢急痛不可忍如芥子在眼黃連一兩碎竹葉一兩切上以水一升半煎至半升置銅器中湯上煎似稀餳至臥時點眼中熱淚出即瘥一方用前二味以水三大盞入棗五枚煎至一盞半去滓食後分溫四服之點眼蝸牛漿出聖惠方治息肉淫膚赤白膜以生蝸牛一枚去其靨納丹朱末於口中火上炙沸以綿注取汁敷眥中薤白方出聖濟總録治息肉淫膚用薤白新者以刀截安膚翳上令遍膜眥又方出聖濟總録治息肉淫膚以丹砂一兩五月五日研令粉置銅器中以漿水合臘水各一盞浸一日曝乾用銅刀子刮取再研以瓷盒收貯每點如黍米大如目眥頭頻用愈又方出千金方治目中息肉以五加不聞水聲者根去土取皮搗末一升和上酒二升浸七日外一兩時服之禁醋二七日遍身生瘡若不出未得藥力以生熟湯浴之取毒瘡出瘥佛手膏治眼內瘀肉浮膜侵睛用硼砂放在盒子內一日紙封定至午刻取出硼砂以冷水浮洗過研為粉以箸頭點入眼中浮膜立退凡點時先將溫水洗眼然後點又洗再點不過三次立驗又方出龍木論治眼有白翳息肉取馬齒莧一大握洗和朴硝少許以絹裹安眼上數易之目生胬肉附論夫邪熱之氣在於臟腑熏蒸於肝攻衝於目熱毒既盛並於血脈蘊結不散結取而生胬肉也目生胬肉者由脾肝不利風熱乘之其後或癢或痛赤瘀而爛壅熱久息肉增長近則侵睛輪大則覆瞳仁治不可緩鉤割尉烙固自有法至於祛風滌熱之劑豈可偏廢哉龍木論云胬肉侵睛外障此眼初患之時或癢或痛即赤爛多年肺臟風壅發無定準漸生肉翳侵睛遮滿瞳仁此狀宜令鉤割尉烙然後宜服除風湯點上寶膏立效歌曰胬肉根由共兩般便須分別有根源或因赤爛多年後肺臟風沖赤使然或癢或痛無定準赤條根脈漸侵瞞初生浮小鉤除易覆著瞳仁即較難去熱去風先服藥清除經絡即長安殘餘服藥使能效七寶銷摩當自痊又云胞肉膠翳侵外障此眼初患之時皆是胸胃伏熱膈內風衝入眼胞瞼有肉初即小如麻米年多漸長如梅李之狀摩隱瞳仁翳為裹邊宜令針出血然後鐮洗去瘀血令服細辛湯摩翳即散盡歌曰眼胞皮肉爽膠翳漸長如同梅李形針破裡邊瞞後出重須服藥斷來根或因此患加風熱淚出猶當有翳生鉤割亟如風毒眼盡摩退散自相應方甘草湯出聖濟總録治風毒攻眼漸生胬肉磣澀疼痛甘草炙銼防風去蘆羚羊角鎊羌活細辛去苗葉生乾地黃焙菊花玄參杏仁去皮尖雙仁炒黃地膚子蜀椒去核併合口炒出汗梔子仁青葙子決明子當歸切焙各一兩上分粗搗篩每服五錢鹽水一盞半煎至一盞去滓食後溫服珍珠散出聖惠方治眼生胬肉翳膜赤脈風赤澀痛難開珍珠細研水飛過琥珀細研水飛過犀角散硃砂細研水飛過車前子地膚子甘菊花甘草炙微赤銼各一兩茺蔚子二兩川升麻一兩半菥蓂子一兩胡黃連細辛各半兩上為細散每於食後以竹葉湯調下二錢大黃丸出聖濟總録治眼風熱生赤脈胬肉大黃銼炒黃芩人參地骨皮洗去土焙決明子微炒地膚子黃連去須防風石膽甘草銼焙車前子各一兩兔肝三具洗切炙乾蠶蟲一百枚去翼焙乾上為末用點魚膽拌為劑更搗三五百杵令勻丸如梧桐子大每服二十丸食後溫水下臨臥再服升麻丸出聖濟總録治熱毒胬肉瘡翳升麻黃芩去黑心車前子決明子茺蔚子玄參龍膽防風去蘆生乾地黃焙山梔子仁甘草地膚子各一兩上為細末煉蜜丸如梧桐子大每服二十丸食後溫漿水送下臨臥再服加至三十丸前胡散出聖惠方治肝臟壅熱風毒所攻眼赤腫痛生弩肉侵睛前胡去蘆頭防風去蘆頭獨活玄參梔子仁車前子黃芩甘菊花甘草炙微赤銼桔梗去蘆頭地膚子以上各一兩細辛一兩半上為粗散每服三錢以水一盞煎至六分去滓每於食後溫服忌炙爆熱面玄參散治目赤痛胬肉滿急瀉肝湯出聖濟總録治目赤痛生胬肉滿急升麻蕤仁去皮車前子前胡去蘆頭秦皮去粗皮決明子微炒細辛去苗葉山梔子仁黃芩去黑心苦竹葉各三兩甘菊花擇一兩半上粗搗篩每服五錢以鹽水一盞半煎至一盞去滓投芒硝末半錢勻放溫食後臨臥再服如腹臟利即去芒硝蕤仁丸出聖濟總録治眼生胬肉蕤仁三兩芍藥防風去蘆各三兩茺蔚子青葙子黃芩去黑心黃連去須石決明各一兩一錢枳殼去瓤麵炒桂去粗皮各一兩上為細末棗肉為丸如梧桐子大食前黃耆湯下二十丸至三十丸日再服決明散出聖濟總録治眼生胬肉侵睛及贅肉生瘡暈膜赤決明子炒車前子青葙子各半兩葳蕤黃連去須甘草炙炒羚羊角鎊芎藭枳殼去瓤麩炒各一兩上為細散每服三十丸食後溫漿水調下臨臥再服通明飲出聖濟總録治眼生胬肉羚羊角鎊地骨皮銼山梔子柴胡去苗各一兩蔓荊實芍藥蕤仁各三分枳殼去瓤麩炒半兩上粗搗篩每服三錢以水一盞煎至七分食後去滓溫服日再烏犀丸一名角丸治如肉貼眼熱痛黃連膏出聖濟總録治風熱眼胬肉疼痛黃連去須黃柏去粗皮蜜炙升麻蕤仁去皮各一兩細辛去苗葉三分石膽末半錢研極細龍腦研細一兩蜜一兩上除龍腦石膽外粗搗篩以水二升煎至一升濾去滓兩遍澄清次下白蜜一兩煎令稀稠得宜後入石膽龍腦攪勻內瓷盒蜜封每點如黍米大細辛人參五味子車前子黑參各一兩防風地骨皮各一兩半上為糊丸如梧桐子大如水少即添酒為糊日午夜臥濃煎槐子湯下三十丸
