body:
  text: 卷三百九折傷門總論夫諸脈從肉諸筋從骨骨三百六十有五聯續纏固手所以能攝足所以能步凡厥運動罔不順從若乃倉卒之際墜墮倒僕折傷蹉跌患生不測詎可殫舉究圖療治小則消腫而舒攣大則接筋而續骨各有方劑存焉凡從高墜下傷損腫痛輕者在外塗敷可已重者在內當導瘀血養肌肉宜察淺深以治之若傷損惡血不散脈者血之府血行脈中貫於肉理環周一身因其肌體外固徑隧內通乃能流注不失其常若因傷折內動經絡血行之道不得宣通瘀積不散則為腫為痛治宜除去惡瘀使氣血流通則可復元也傷折腹中瘀血者因高墜下倒僕顛撲氣血離經不得流散瘀在腹中速宜下之遲則日漸瘀滯使人枯燥色不潤澤痿瘁血瘕之病骨節損折肘臂腰膝出臼蹉跌須用法整頓歸元先用服麻藥使不知痛然後可用手治凡腳手各有六出臼四折骨手有六處出臼四折骨腳亦六處出臼手掌根出臼其骨交互相鎖或出臼則是銼出鎖骨之外須是搦鎖骨下歸窠或出外則須搦入內或入內則須搦出外方歸窠臼若只用手拽斷難入窠十有八九成痼疾也手有六出臼四折骨手臂出臼此骨上段是臼下段是杵四邊筋脈鎖定或出臼亦銼損筋所以出臼此骨須拽手直一人拽須用手把定此間骨搦教歸窠看骨出那邊用竹一片夾定一邊一邊不用夾須在屈直處夾才服藥後不可放定或時又用拽屈拽直此處筋多吃藥後若不屈直則恐成疾日後曲直不得肩胛上出臼只是手骨出臼歸下身骨出臼歸上或出左或出右須用舂杵一枚小凳一個令患者立凳上用杵撑在下出臼之處或低用物墊起杵長則墊凳起令一人把住手拽去凳一人把住舂杵令一人抱住患人放身從上坐落骨節已歸窠矣神效若不用小凳則用兩小梯相對木棒穿從兩梯股中過用手把定木棒正稜在出臼腋下骨節蹉跌之處放身從上墜下骨節自然歸臼矣腳六出臼四折骨或腳板上交叉處出臼用一人拽去自用手摸其骨節或骨突出在內用手正從此骨頭拽歸外或骨突向外須用力拽歸內則歸窠若只拽不用手整入窠內誤人成疾腳大腿根出臼此處身上骨是臼腳根是杵或出前或出後須用一人手抱住患人身一人拽腳用手盡力搦歸窠或是銼開又可用軟綿繩從腳倒吊起用手整骨節從上墮下身直其骨便自歸窠背脊骨折法凡挫脊骨不可用手整頓須用軟繩從腳吊起墮下身直其骨便自歸窠未直則未歸窠須要墜下待其骨直歸窠然後用大桑皮一片放在背皮上杉皮兩三片安在桑皮上用軟物纏夾定莫令屈用藥治之腳手骨被壓碎者須麻藥與服或用刀割開甚者用剪刀剪去骨鋒便不衝破肉或有粉碎者去其細骨免膿血之禍然後用大片桑白皮以補肉膏或定痛膏糊在桑白皮上夾在骨肉上莫令差錯三日一洗莫令臭穢用藥治之又切不可輕易自恃有藥便剪便弄須要詳細審視當行則行尤宜仔細或頭上有傷或打破或刀傷或壓碎骨用藥敷貼縛之凡纏縛之際要於密室無風之所勿使風入瘡口恐成破傷風之患切記切記金瘡須看脈候始知傷痛臟腑致命處一觀其脈虛促危矣傷處淺命脈虛促亦為後慮傷至重命脈和緩永無慮也脈有虛實有去來有疏密或被傷臟脈不死者必關脈實重則勿慮或傷致死處其關脈無別脈洪大則難醫如用兩件藥後脈不轉動急急住藥若脈漸漸隨藥轉此則可治無慮或出血甚者脈不要洪大只要平正重實其血不曾出者亦無惡血在內者其脈洪大不要疏密亦不進退來去恐其變凶看傷脈每與內科脈不同或傷內或致命或難醫處被傷者命脈促者此等切勿治之攧撲傷損或被傷入肺者縱未即死二七難過左脅下傷透內者皆不必用藥全不可治小腹下傷內者證候繁多者脈不實重者老人左股壓碎者傷碎破陰子者血出盡者肩內耳後傷透於內者皆不必用藥打攧及樹木壓遍身痛者打攧樹木壓或自高處攧下者此等傷皆驚四肢五臟必有惡血在內專怕噁心先用清心藥打血藥及通大小腸藥次第先服臨服童子小便入藥內立效專用大小腸喜利恐隘塞用清心藥加前方通利大小腸藥服自然俱通無悶煩無惡血害心以次用止痛藥服之即止接骨附論夫正骨續筋方法備急非虞斷筋折骨之疼喎訛閃肭稍止相當覆塗之藥綿纏水溫淨息永通玄府開舒汗隙藥歸腫散痛消血脈旋流布周榮衛省身愛力以時中養氣痊平余月而已接骨手法
