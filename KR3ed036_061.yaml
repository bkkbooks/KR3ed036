body:
  text: 卷六十一咽喉門喉痹咽喉生癰附論夫肺氣上通於喉嚨胃經外連於咽嗌其氣和平則呼吸咽納無所妨礙若脾肺壅熱熏發上焦攻於咽喉結聚腫痛不得消散熱氣熾盛致結成癰妨害吐納古方論一寸為癤二寸至五寸為癰其候使人寒戰咳唾稠濁善用針者辨其可刺宜速破之仍施以點餌之劑喉嚨者呼吸之道路氣之所上下也懸癰為聲音之關臟腑有伏熱氣上衝喉咽氣血壅遏結於懸癰毒氣不散故腫痛妨悶甚者或長數寸隨喉出入不得食息宜急治之方天門冬煎治喉癰咽嗌不利生天門冬汁二升人參一兩生麥門冬汁二升生薑汁一升生地黃汁一升桂去粗皮一分兩赤茯苓去黑皮三兩半夏湯浸七遍曝乾一兩甘草炙三分牛黃研半兩上除四味汁外餘六味為末先以天門冬麥門冬汁煎減半次入生薑汁又煎減半次又入地黃汁並餘六味末同煎汁欲盡入白蜜一斤酥四兩同煎成膏瓷合盛不拘時溫水調下一匙以瘥為度防風散治喉癰及咽喉垂倒等證防風去叉一兩白附子三分地骨皮半兩麝香研三分丹砂研膩粉研白朮馬牙硝研桂去粗皮各一分赤茯苓去黑皮一兩上為散每服半錢匕溫酒調下治懸癰咽中生息肉舌腫出聖惠方用羊蹄草煮汁熱含冷吐良射干湯治喉癰咽喉嗌腫塞及心肺熱極吐納不利射干半兩升麻大黃銼生用惡實生用各一兩木通銼三分馬藺子炒半兩上粗搗篩每服三錢匕以水一盞竹葉七片煎七分去滓下馬牙硝半錢匕許攪令勻不拘時細細溫服治懸癰腫痛喉咽不利出聖惠方射干半兩木鱉子一分甘草半兩炙微赤銼川大黃一分銼碎末微炒川升麻一分杏仁半兩湯浸去皮尖雙仁麩炒微黃上為末煉蜜和丸如小彈子大常含一丸咽津玄參散出聖惠方治懸癰腫痛不下食射干大黃各半兩甘草一分玄參一分兩升麻半兩上細末每服三錢水一盞煎至七分放溫時時含咽良驗破毒妙方出危氏方白礬巴豆去殼紅內消草烏尖豬牙皂角薄荷各三二錢上為細末好酸醋調鵝毛刷入口內勿吞仍以鹽湯灌漱治喉癰閉方出直指方白明礬煅牙硝各一錢胭脂半錢上研細爛烏梅肉丸旋含咽治懸癰乘熱暴腫長痛咽中生息肉及舌腫方一名乾薑湯出聖惠方乾薑炮製銼半夏湯浸七遍去滑上等分末以少少著舌上一方用鹽豉和塗所患處又以先開口用鐵針刺破血出後用藥少許塗之神效若癢時以生薑汁解之治喉中懸癰垂長咽中妨悶出聖惠方用燒鹽末枯礬末各一兩相和以箸頭點之即消啓關散治風熱客搏上焦懸癰腫痛惡實炒甘草生各一兩上為散每服二錢匕水一盞煎六分旋含之良久咽下馬牙硝散出聖惠方治喉癰及傷寒熱後咽痛閉塞不通毒氣上衝用馬牙硝半兩細研為散每服一錢綿裹含咽津以通為度又方用童子小便四五歲者一合並銅錢二文含一方用鹽不用錢治懸癰腫痛咽喉不利胸中煩熱宜服此方出聖惠方射干一兩玄參半兩川升麻半兩白礬半兩白藥半兩黃藥半兩天竺黃一兩細研犀角屑半兩白馬牙硝一兩細研甘草炙銼半兩上為末入研了藥令勻煉蜜和搗三二百杵丸如小彈子大不計時候以綿裹一丸含咽津犀角散出聖惠方治咽喉中生癰瘡腫痛犀角屑一兩玄參三分黃耆一兩銼黃芩三分絡石三分敗醬三分白蘞三分川大黃一兩銼碎微炒甘草半兩炙微赤銼上為散每服三錢水一中盞煎至六分去滓入川朴硝一錢攪令勻不計時候溫服治咽喉猝生癰腫飲食不通方出聖惠方用燒稱錘令赤納一盞醋中令沸止飲之一方用酒治懸癰腫脹長數寸隨喉出入不得食方令病人大開口以箸按舌下燒小烙針於竹管中烙即愈少根不盡漸更烙之即以鹽塗烙處硼砂散出聖惠方治懸癰腫痛硼砂別研馬牙硝枯滑石寒水石以上各二錢腦子別研一錢白礬枯一錢分半上研令極細每服半錢新汲水調下不拘時候鉛霜散出聖惠方治懸癰腫脹疼痛鉛霜一分甘草一分半生半熟搗羅為末上都研為散每服以綿裹半錢含咽津瘥治懸癰咽中生息肉舌腫方日初出向日張口使婦人用左裙裙住其頭上七下瘥治喉內生癰出經驗良方用五倍子為末入白殭蠶甘草為末用白梅肉為丸噙化其癰自破治喉癰卒腫方出聖惠方用薏苡仁吞二枚即瘥一方用一兩水一大盞煎至五分去滓頓服之治懸癰卒腫出聖惠方用硇砂二半錢綿裹含咽津瘥帝鍾風即喉間帝鍾長腫有長數寸者用食鹽煅過鴉毛蘸下即消不須針破破則傷人一方綿裹箸頭拄鹽揩日六七度易名雪花散聖煙筒治懸癰腫脹腫閉塞急令開口看有蛾無蛾若有須是針破方可若望不見以萆麻子打碎用紙卷作筒一頭燒煙起竟以煙燻咽喉內自然可開才望見即以三稜針刺破出紫血半盞許便愈其有貴宦之家不容用針者則惑之曰用筆蘸藥先以針安筆心內刺之一方用巴豆依前法燒熏或只以萆麻子巴豆二藥榨油在紙上作紙捻子燒用治咽喉間生肉層層相疊漸漸腫起不痛多日乃有竅子臭氣自出遂進食飲傳信適用方用臭橘葉煎湯連服愈油膏治咽喉生癰藥不下及喉閉等證生麻油半斤挼皂角拾梃用生絹濾去滓上灌此麻油即時瘡穿膿血吐出而愈治喉癰方楊立之自廣府通判歸楚州喉間生癰既腫潰而膿血流注曉夕不止寢食俱廢醫者束手適楊吉老來赴郡守招立之兩子走往邀之至熟視良久曰不須看脈已得之矣然此疾甚異須先啖生薑片一斤乃可投藥否則無法也語畢即出子有難色曰喉中潰膿痛楚豈宜食生薑立之曰吉老醫術通神其言不妄試取一片啖我如不能進則屏去無害遂食之殊為甘香稍復加益至半斤許痛處已寬滿一斤始覺味辛辣膿血頓盡粥餌入口了無滯礙明日招吉老謝而問之對曰君居南方多食鷓鴣此禽好啖半夏久而毒發故以姜治之今病源已清無服他藥豫記唐小說載崔魏公暴亡醫梁新診之曰中食毒僕曰常好食竹雞梁曰竹雞多食半夏苗蓋其毒也命捩生薑汁拆齒灌之遂復活甚與此相類治喉痛方以山豆根常常含咽津治肉蛾喉痹用白礬半兩飛過入半碗沸湯調通口服之血胞隨手自消若經少時變作血膿難醫半夏厚朴湯治咽中如炙肉臠半夏三五兩厚朴三兩茯苓四兩紫蘇葉二兩上為細末每服五錢水二盞姜五片煎一盞去滓服雄黃散治咽漏瘡初生結喉上如癰腫破後有眼子雄黃密陀僧各一分錢膩粉三錢匕麝香一字上研為細末未破用白梅湯調塗已破挹去膿汁干貼破毒丹治單雙鵰上用巴豆一枚紙裹火內炮令擘破聲為度去紙揭起頭皮㱔子左雕於右鼻內著右雕於左鼻內著雙鵰則著兩個得時餉破膿血下也白丁香丸治咽喉雙鵰及單雕用白丁香二十個家雀屎是也以沙糖如胡桃大一塊同滾研分作三丸每一丸用薄綿子裹令含在口內即時遂愈甚不過兩粒也此極有奇功治猝喉中生肉以綿裹箸頭拄鹽揩日六七度易咽喉生瘡附論夫咽喉生瘡或白或赤痰唾稠濁喉中腥臭疼痛蓋上焦有熱脾肺不和熱搏其經熏發咽喉故也方半夏湯治咽喉生瘡嗽唾如鯁語聲不出半夏湯浸去滑七遍二兩射干乾薑炮杏仁湯浸去皮尖雙仁炒紫菀去苗土麻黃去節煎掠去沫焙吳茱萸湯洗焙乾炒桂去粗皮陳橘皮湯浸去白焙獨活去蘆頭一兩當歸切焙一兩上粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服初病一二日可發汗病久者可加大黃一兩初秋夏月暴雨冷皮及天行暴熱喜怒伏於內宜加生薑二兩乾薑茱萸枳實各一兩修制如前法黃耆散出聖惠方治咽喉內生瘡疼痛黃耆半兩銼甘草半兩生銼山梔子半兩黃芩三分玄參一兩赤茯苓半兩檳榔半兩川升麻三分紫菀半兩洗去苗土麥門冬去心焙一兩牛蒡子半兩上為散每服二錢以水一中盞煎至六分去滓不計時候溫服之治喉中有瘡唾血不下食宜服此方出聖惠方黃耆一兩銼露蜂房半兩微炙薔薇根一兩銼絡石一兩射干一兩羚羊角屑半兩甘草半兩炙微赤銼川大黃一兩銼碎微炒玄參半兩上為散每服四錢水一中盞煎至六分去滓不計時候溫服
