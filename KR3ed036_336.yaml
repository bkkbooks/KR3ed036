body:
  text: 卷三百三十六妊娠諸疾門胤嗣附論夫有夫婦則有父子婚姻之後必求嗣續故聖人謂不孝有三無後為大者言嗣續之至重也凡欲求子當先察夫婦有無勞傷痼害之屬依方調治使內外和平則夫婦諧樂有子矣素問云天地者萬物之父母也陰陽者血氣之男女也有夫婦則有父子婚姻之後則有生育生育者人倫之本也且男女之合二情交暢陰血先至陽血後沖血開裹精陰外陽內陰含陽胎而男形成矣陽精先至陰血後參精開裹血陽外陰內陽含陰胎而女形成矣若夫受形之易者男女必當其年男子二八精氣溢瀉必三十而娶女子二七天癸至必二十而嫁欲其二氣充實然後交合交而孕孕而育育而壽倘若婚嫁不時真氣早泄未完而傷是以交而不孕孕而不育育而不壽者多矣以此觀之男女婚姻貴乎及時夫婦貴乎精壯則易於受形也且父少母老生女必羸母壯父衰生男必弱誠有斯理或男子真精氣不濃婦人血衰而氣旺是謂夫病婦疹皆使人無子治療之法女子當養血抑氣以減喜怒男子益腎生精以節嗜欲依方調治陰陽和平則婦人樂有子矣又曰無子者其事有三也一者墳墓不嗣二者夫婦年命相剋三者夫病婦疹皆令無子若是墳墓不嗣年命相剋此二者非藥能益若夫病婦疹須將藥餌乃得有效也然婦人挾疾無子皆由勞傷血氣或月經閉澀或崩漏帶下致陰陽之氣不和經血之行乖候故無子也診其右手關後尺脈浮浮則為陽陽脈絶無子也尺脈微澀中年得此為絶産也少陰脈如浮緊則絶産惡寒脈尺寸俱微弱者則絶産也又有因將攝失宜飲食不節乘風取冷或勞傷過度致令風冷之氣乘其經血結於子臟子髒得冷故令無子也凡婦人年及二三十雖無病而無子經血如常或經血不調者乃陰不升而陽不降此上下不得交通有所滯礙不能為用故也可用獨聖散湧訖寒痰三二升後用導水丸禹功散泄訖三五行或十餘行或單用無憂散泄十餘行處寒熱虛實用之次服蔥酢白粥三五日胃氣宣通腸中得實可服玉燭散更服白朮散茯苓之類降火益水既濟之道當不數月而有孕內經曰婦人有癃痔遺溺嗌乾諸症雖服妙藥針灸亦終不能孕蓋衝脈督脈任脈有此病不能孕故也婦人所以無子者衝任不足腎氣虛寒也內經云女子二七天癸至任脈通太衝脈盛陰陽和故能有子若衝任不足腎氣虛寒不能系胞故令無子亦有本於夫病婦疹者當原其所因而調之治要之法男服七子散女服紫石門冬丸及坐導藥蕩胞湯無不有子也方秦椒丸出聖惠方治婦人絶産生來未産蕩滌腑臟使玉門受子及子臟風虛冷氣致陰陽二氣不能和合故令久無子秦椒天雄各十八銖玄參人參白蘞鼠婦白芷黃耆桔梗露蜂房白殭蠶桃仁蠐螬白薇細辛蕪荑各一兩牡蒙沙參防風甘草牡丹皮牛膝卷柏五味子芍藥桂心大黃石斛白朮各三十銖柏子仁茯苓當歸乾薑各一兩半澤蘭乾地黃芎藭各一兩十八銖乾漆白石英紫石英附子各二兩鍾乳二兩半水蛭七十銖麻布叩復頭七尺燒虻蟲百枚上為細末蜜為丸如梧桐子大酒服十丸日再稍加至二十丸若有所去如豆汁鼻涕此是病出覺有異藥即停一方無鼠婦柏子仁丸出聖惠方治婦人子臟虛冷及五勞七傷羸瘦面無顏色不能飲食産後斷緒無子多時柏子仁澤蘭芎藭防風去蘆頭紫石英細研水飛過白石英細研水飛過厚朴去粗皮塗生薑汁炙香熟熟乾地黃當歸銼碎微炒杜仲去粗皮炙微黃銼乾薑炮裂銼牛膝去苗各一兩川椒去目及閉口者微炒去汁三分甘草炙微赤銼三分桂心白朮蕪荑人參去蘆頭石斛去根銼白芷赤石脂細研肉蓯蓉酒浸一宿刮去皮尖干白芍藥桔梗去蘆頭五味子秦艽去苗龍骨防葵白茯苓藁本細辛獨活各半兩黃耆銼二兩鍾乳粉二兩上為末入研藥了都研令勻煉蜜和丸如梧桐子大每服三十丸空心及晚溫酒下白薇丸出聖惠方治婦人子臟風虛積冷經絡不調面無血色肌肉消瘦不能飲食及帶下久無子白薇細辛防風人參秦艽秦椒白蘞一云白芷桂心牛膝蕪荑沙參五味子芍藥白殭蠶牡丹蠐螬各一兩乾漆柏子仁乾薑卷柏附子芎藭各十三銖桃仁紫石英各一兩半鍾乳乾地黃白石英各三兩鼠婦五錢水蛭虻蟲各十五枚吳茱萸十八銖麻布叩復頭一尺燒上為末蜜為丸如梧桐子大酒服十五丸日再稍加至三十丸當有所去小覺有異即停服又方出千金方一名白薇丸治久無子或斷緒上熱下冷百病皆治之白薇乾地黃乾薑車前子蜀椒各十八銖紫石英藁本石膏菴䕡子卷柏各三十銖澤蘭赤石脂白龍骨遠志麥門冬茯苓太乙餘糧各三兩當歸芎藭蛇床子各一兩白芷覆盆子桃仁人參各一兩半桂心蒲黃各二兩半細辛三兩橘皮半兩上為末蜜和為丸如梧桐子大酒服十五丸日再漸增以知為度亦可至五十丸慎豬雞生冷酢滑魚蒜驢馬牛肉等覺有娠即停三月正擇食時可食牛肝及心至四月五月不用廣胤丹出御藥院方治久無子息黃耆銼細一兩半人參上黨者去苗川續斷銼稱澤蘭葉去枝熟地黃焙牡丹皮淨延胡索白芍藥川芎白薇嫩鹿茸燎去毛酥酒塗炙乾另杵稱白茯苓去皮當歸去苗洗淨切炒乾肉蓯蓉酒浸軟去皴皮切焙乾防風去苗及尾藁本去苗土稱陳皮湯浸去白皮乾華細辛去苗葉土細搗羅過蓬莪朮京三稜二味各和白麵裹慢火煨熟去面就熱杵碎稱以上各一兩乾薑炮裂一兩半木香山茱萸肉桂去粗皮各半兩黑附子炮製去皮臍二錢甘草銼炒覆盆子去萼枝淨各二兩上為細末煉蜜和丸如彈子大每服一粒空心食前細嚼溫酒下日進三服有孕住服昔有人常服此藥而生七男以此常合與人服而皆應效白薇丸療婦人百病斷絶緒産白薇細辛厚朴炙川椒炒去汗桔梗鱉甲炙各五分防風大黃附子炮石硫黃研各六分人參桑上寄生各四分半夏洗牡蒙二分白殭蠶續斷秦艽紫菀杜蘅牛膝虻蟲去翅足熬水蛭各三分紫石英研朴硝桂心鍾乳當歸各八分上搗篩蜜丸空腹溫酒服如梧桐子大十五丸日二漸加至三十丸不吐不利忌生冷油膩餳生血馬齒莧生蔥生菜豬肉冷水黏食陳臭紫石門冬丸出聖惠方治婦人久冷無子及數經墮胎皆因衝任之脈虛損胞內宿寒疾病經水不時暴下不止月內再行或月前月後及子臟積冷虛羸百病崩漏帶下三十六疾積聚癥瘕臍下冷痛少腹急重小便白濁以上疾症皆令孕育不成以至絶嗣不孕此藥並能主療常服除瘀血溫子臟令人有孕臨産易生子及生子充實無病紫石英天門冬各三兩當歸芎藭紫葳卷柏桂心烏頭乾地黃牡蒙一作牡荊子禹餘糧石斛辛夷各二兩人參桑寄生續斷細辛厚朴乾薑食茱萸牡丹牛膝各三十銖柏子仁一兩薯蕷烏賊骨甘草各一兩半上為末蜜和丸如梧桐子大酒服十丸日三漸增至三十丸以腹中熱為度不禁房室丈夫出外不可服藥或溫米飲下空心食前日二服七子散出大全良方治丈夫風虛目暗精氣衰少無子補不足兼治婦人無子皆因五勞七傷虛羸百病所致五味子鍾乳粉牡荊子菟絲子車前子菥蓂子石斛乾地黃薯蕷杜仲鹿茸遠志各八銖附子蛇床子芎藭各六銖山茱萸天雄人參茯苓黃耆牛膝各五銖桂心十銖肉蓯蓉十一銖巴戟天十二銖上為末酒服方寸匕日二不知增二匕以知為度禁如上藥法不能酒者蜜和丸服亦得一方加覆盆子八銖女服紫石英丸紫石英砂鍋盛之以石掩口火煅紅禹餘糧火煅醋淬熟地黃湯洗清酒蒸焙辛夷仁厚朴去皮不見火卷柏醋炙石斛去皮銼酒炒川續斷酒浸柏子仁炒別研川烏炮去皮臍銼川芎海螵蛸醋炙牡丹皮去心川當歸去蘆酒洗粉草炙各一兩桑寄生華陰細辛去土葉洗山藥吳茱萸炒乾薑炮各半兩人參七錢半天門冬去心一兩半梓朴去皮薑汁塗炙上為細末醋為丸如梧桐子大每服七十丸至百丸空心米飲吞下以腹中熱為度不禁房事外出不可服盡劑當有娠卷柏丸治婦人子臟冷久無子由風寒邪氣客於經絡卷柏牡蒙藁本當歸銼碎微炒熟乾地黃柏子仁乾薑炮裂銼禹餘糧燒醋淬七遍白薇以上各一兩芎藭酒洗人參去蘆頭五味子石斛去根銼桂心附子炮裂去皮臍防風去蘆頭吳茱萸湯浸七遍焙乾微炒甘草炙微赤銼牛膝去苗桑寄生川椒去目及閉口者微炒去汗以上各三分上為末煉蜜和丸如梧桐子大每服空心及晚食前以溫酒下三十丸紫石英丸治婦人久無子由子臟久積風冷陰陽不能施化紫石英細研水飛過二兩細辛桔梗去蘆頭厚朴去粗皮塗生薑汁炙香熟防風去蘆頭川大黃銼碎微炒川椒去目及閉口者微炒去汗附子炮裂去皮臍硫黃細研白薇當歸銼碎微炒桂心各一兩鱉甲二兩半生用牡蒙人參去蘆頭桑寄生各三分半夏湯洗七遍去滑用白殭蠶微炒續斷紫菀洗去苗土杜蘅牛膝去苗各兩半上為末煉蜜和丸如梧桐子大每服三十丸空心及晚食前溫酒下養真丸治婦人血虛氣憊陰陽不升降久不成妊娠者鹿茸當歸肉蓯蓉禹餘糧菟絲子覆盆子熟地黃紫石英海螵蛸各二兩五味子炙真琥珀白芍藥川芎桑寄生卷柏艾葉川薑堅白茯苓人參牡蠣酸棗仁各一兩鍾乳粉四兩上為末酒煮麵糊丸如梧桐子大食前溫酒吞下五十丸日三服吃後用粥飯壓之白薇丸治補調衝任溫暖子宮治胞絡傷損宿受風寒久無子或受胎不牢多致損墮久服去子臟風冷令人有子白薇去苗牡蒙藁本各五分薑黃當歸去蘆銼熟地黃各七分川芎人參去蘆柏子仁微炒石斛去根桂心去粗皮附子炮去皮臍五味子去梗防風去苗甘草炙川牛膝去苗酒浸一宿吳茱萸湯浸七次桑寄生各六分秦椒六分禹餘糧八分上為末煉蜜丸如梧桐子大空心酒下三十丸日二服忌生菜蔥熱面蕎麥蒜豬肉炙爆葵菜蕪荑菘菜海藻黏食臭物等一方有紫參無牡蒙米飲亦得才覺妊娠即住服已懷孕者尤不宜服之白薇丸治婦人無子或斷緒上熱下冷飲食減退肢體黃瘁凡有心腹一切疾病皆主之白薇熟乾地黃川椒去目及閉口者微炒去汗白龍骨各一兩車前子當歸銼微炒芎藭蛇床子細辛乾薑炮裂銼各半兩藁本桂心卷柏白芷覆盆子菖蒲人參去蘆頭桃仁湯浸去皮尖雙仁麩炒色微黃白茯苓遠志去心各三分麥門冬去心焙一兩半上為細末煉蜜和丸如梧桐子大每服三十丸空心及晚食前溫酒下續嗣降生丹治婦人稟受氣弱胎臟虛損子宮冷憊血寒痼冷難成子息功效如神當歸桂心龍齒烏藥真天台者佳益智杜仲石菖蒲吳茱萸各一兩半茯神川牛膝秦艽細辛苦桔梗半夏防風白芍藥各三分乾薑一兩半生半炒川椒三兩湯泡半日焙附子一隻重八錢者去臍心作一竅如皂子大入硃砂一錢重濕麵裹煨牡蠣一大片要取漳泉二州者卻用童子小便浸四十九日五日一換取出用硫黃末一兩米醋塗遍卻用皮紙裹又用米醋浸令紙濕次鹽泥厚固濟俟乾用炭五斤煅每遇合藥入二兩餘者留後次合藥用上為細末取附子入內硃砂別研為細末糯米糊為丸如梧桐子大每服三十丸至百丸空心吞下淡醋溫酒鹽湯亦可一日二服此藥及療男子精氣不固陽事衰弱白濁夢泄及治婦人血虛帶下肌瘦寒熱但是男女諸虛百損客熱盜汗氣短乏力面無顏色飲食少味並皆治之更有奇效難以俱述受持君子宜預行善自調服此藥無不感應秦桂丸出仁存方治婦人無子秦艽桂心杜仲炒防風牡丹皮厚朴薑炒各三分附子陽起石煅白茯苓各一兩半白薇當歸乾薑牛膝沙參半夏子各半兩人參卷柏鹿茸各一兩細辛二兩一分上各為末以蜜丸如梧桐子大每服三四十丸溫酒下食前朴硝蕩胞湯出聖惠方治婦人破身以來全不産及斷續久不産三十年者朴硝牡丹皮當歸大黃桃仁生用俱各二銖細辛厚朴炙桔梗人參赤芍藥茯苓桂心甘草炙牛膝橘皮各二銖附子六銖虻蟲去翅足微炒水蛭各十枚炙上㕮咀以清酒五升水五升合煮取三升分四服日三夜一每服相去三時更服如常覆被取少汗汗不出冬日著火籠之必下積血及冷赤膿如赤小豆汁蓋為婦人子宮內有此惡物使然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱大困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著坐導藥一方不用桔梗甘草一方無水蛭白薇丸出千金方治月水不利閉塞絶産十八年服此藥二十八日有子金城太守方白薇細辛各三十銖人參杜蘅一方用牡蠣牡蒙厚朴半夏白殭蠶當歸紫菀各十八銖牛膝沙參乾薑秦艽各半兩蜀椒附子防風各一兩半上為末蜜和為丸如梧桐子大先食服三丸不知稍增至四五丸此藥不可常服覺有娠即止用之大驗一方有桔梗丹參十八銖一方有紫石英助陽丹治婦人無子月經不調蓋因腹脅疼痛血塊血癖所以不孕先服當歸六合散空心煎十餘服先去敗露腹肚不疼可服助陽丹十五服必然成胎有一婦人三十七歲無子服此藥半月有子細辛防風茱萸川椒白芨白薇乾薑茯苓各一兩半牛膝秦艽附子陳皮石菖蒲厚朴沙參人參桂心各七錢半上為細末煉蜜為丸如紅豆大每服十丸溫酒下日進三服剋日見效男子服能補益婦人服之有子覺有孕不可服無夫婦人者不可服用戊子日修合忌雞犬孝服每月經後三五日淨一舉便成亦可延年益壽凡人家園圃內有凌霄花婦人聞其氣不孕男服七子丸出便産須知五味子一兩淨菟絲子一兩先篩去灰卻用酒浸二三日蒸擂細焙乾研用之韭子一兩炒覆盆子一兩去帶酒洗蛇床子半兩黑附子一兩炮去皮臍白茯苓半兩去皮原蠶蛾一兩酒煮肉蓯蓉一兩酒焙乾先洗鹿茸一兩酒炙去皮毛益智子一兩去皮沉香半兩不見火黃耆半兩蜜炙遠志半兩湯洗去心陽起石一兩煅細研如粉熟地黃一兩湯洗酒拌蒸上為細末酒煮糯米糊為丸如梧桐子大每服六七十丸空心鹽酒或鹽湯吞下弱甚者加天雄半兩炮去皮腳腰痠痛者加杜仲一兩去皮薑汁炒去絲石斛一兩去根治婦人久無子息大有神效茯苓桂川芎人參當歸各二兩細辛二兩半沉香五味子各一兩川牛膝沙參白薇琥珀各半兩川烏一個川椒一兩半蜜一斤上為細末煉蜜和丸如梧桐子大每服五十丸溫酒下醋湯亦得日進二服杜蘅丸治婦人腹臟久積風冷血氣凝澀不能宣通故令無子杜蘅附子炮裂去皮臍細辛各一兩防風去蘆白茯苓各一兩白薇牛膝去苗半夏湯洗七遍去滑微炒沙參去蘆頭秦艽去苗桂心川椒去目及閉口者微炒去汗菖蒲藁本蛇床子各三分上為細末煉蜜和丸如梧桐子大每服三十丸空心及晚食前溫酒下有子即住服杜蘅丸治婦人久無子斷緒杜蘅三月三日採根洗曝乾銼半夏湯洗二十遍碎用生薑炒白薇桔梗銼炒附子炮製去皮臍牛膝切酒浸經宿各一兩石菖蒲細辛去苗葉蜀椒去合口並目炒出汗厚朴去粗皮薑汁炙沙參去蘆頭防風去叉乾薑炮銼桂去粗皮各半兩上為末煉蜜和丸如梧桐子大每服溫酒下三十丸漸加三十丸早晨日午各一服吉祥丸出千金方治婦人積年不孕天麻柳絮牡丹茯苓乾地黃桂心各一兩五味子桃花白朮芎藭各二兩覆盆子一斗桃仁一百枚菟絲子楮實子各一升上為末煉蜜和丸如緑豆大每服空心飲苦酒下五丸日中一服晚一服秦桂丸一名螽斯丸出大全良方治婦人無子服有效秦艽去蘆桂心不見火杜仲去皮薑製炒斷防風厚朴各三分薑製附子生去皮臍白茯苓各一兩半白薇乾薑炮沙參牛膝酒浸半夏各半兩人參一兩細辛二兩一分上為細末煉蜜為丸如赤豆大每服三十丸空心食前醋湯米飲任下未效加丸數已覺有孕便不可服用溫酒下亦得昔金城太守範羅謹上臣驗此術若服藥四十日無子請戮臣一家以令天下醫人戒其方因張伯高學士傳云此藥諸士大夫服後俱有應驗就藥緘上書二句云修合者用意以誠服餌者存心以仁不患乎無子也服此如覺無益稍加丸數為度如服七日後陰陽和覺有娠此藥與前太子中舍宇文妻李氏年四十無子服此藥十三日有娠此藥螽斯丸屢用屢驗此方不可不廣傳與人夫不在家不可服扶血丸出仁存方治婦人無子紫石英海螵蛸半兩熟艾醋炙一兩卷柏一兩覆盆子四兩阿膠炒包金土各一兩柏子仁二兩二錢陽起石半兩熟地黃一兩半牡蠣二兩煅磁石二兩煅上為細末以糯米粥丸如梧桐子大每服三四十丸酒吞下食前禹餘糧湯治婦人胞胎寒冷絶産無子禹餘糧煅淬七遍白殭蠶去黑微炒烏賊魚骨去甲皮各一兩龍骨碎研桂去粗皮灶下黃土無灰者石葦去毛炒乾薑炮滑石研赤芍藥半夏漿水浸一宿生絹袋子搽洗去滑切開生薑汁炒黃代赭丁頭者研各半兩上搗篩每服三錢匕水一盞生薑三片煎至六分去滓食前溫酒服日再陽起石丸出危氏方治丈夫真精氣不濃不能施化是以無子陽起石火煅紅碎極細鹿茸燎去毛酒蒸焙菟絲子水淘淨酒浸蒸焙別研天雄炮去皮韭子炒肉蓯蓉酒浸各一兩覆盆子酒浸石斛去根桑寄生沉香別研原蠶蛾酒炙五味子各半兩上為細末酒煮糯米糊為丸如梧桐子大每服七十丸空心鹽酒或鹽酒下紫石英丸出大全良方紫石英阿膠當歸川芎赤芍藥川續斷各一兩柏子仁二兩熟地黃三兩白朮鹿茸桂心各半兩上為末煉蜜為丸如梧桐子大空心溫酒下二十丸兼治虛中有熱頭目旋暈足如履空嘔吐不食月水不調或多或少皆虛症也久服能生髮令有子更治虛悸常若憂思皆心血不足血室虛所致也調經散出便産須知療月候不調或在月前或在月後或多或少或逾月不至或一月兩來此是病主不孕吳茱萸一兩半去目閉口沸湯洗通三次半夏一兩湯泡七次當歸一兩去蘆酒洗人參麥門冬一兩半去皮白芍藥京南者川芎色如臘者牡丹皮厚朴去皮不見火阿膠蚌粉炒如珠子甘草炙一兩上㕮咀每服三錢水一盞半生薑五片煎至八分去滓食前稍熱服月候既調月月如期而來按時而止則當有孕如欲娠月候調勻顏色肌膚如常但苦沉重煩悶不欲飲食又不知患之所在脈又平和是欲妊也如此經兩月後經忽不通則結胎矣既娠之後多病惡阻婦人怯弱有風氣痰飲則其病狀沉重昏眩惡聞食氣喜啖鹹酸甚則寒熱心煩嘔痰恍惚不能支持輕者不服藥亦不妨重者須服藥詵詵丸治婦人衝任虛寒胎孕不成或多損墮澤蘭葉白朮各一兩半肉桂去粗皮乾薑泡各半兩熟地黃洗焙當歸洗焙各二兩川芎石斛酒浸銼炒白芍藥牡丹皮去心延胡索各一兩上為細末醋麵糊丸如梧桐子大每服五十丸溫酒空心下一方無干薑肉桂白朮有白薇人參坐導藥方夫求子者服藥須有次第不得不知其次第謂男服七子散女服蕩胞湯及坐導藥再服紫石門冬丸則無不得效矣皂莢一兩炙去皮子大黃戎鹽礬石燒當歸各二兩五味子乾薑各三兩細辛三兩蜀椒炒出汗二兩葶藶子苦瓠各三分一方作山茱萸上為末搗篩納輕絹袋子如中指許大長三寸盛之令滿納子門中坐任意勿行走急小便時即出之便後仍納一日當有青黃冷汁汁盡止即可交合自有子若未見病出亦可至十日安之本為子宮有冷惡物故令無子值天陰冷即發疼痛須候病出盡方已不可中輟每日早晚用苦菜煎湯熏洗一方無葶藶一方有砒霜三分著藥後一日乃服紫石門冬丸鍾乳丸治婦人斷緒無子鍾乳研一伏時白礬燒令汁盡各一兩阿膠炙令燥黃紫石英研細蜀椒去目及閉口者炒去汗生乾地黃焙五味子炒蛇床子炒原蠶蛾炒石亭脂研極細各半兩上除石藥別研外余藥為末和勻煉蜜和搗丸如梧桐子大每日空心暖酒下二十丸漸加至三十丸慶雲散治丈夫陽氣不足不能施化施化無成覆盆子五味子各一升菟絲子二升天雄一兩石斛白朮各三兩桑寄生四兩天門冬九兩紫石英二兩上治下篩酒服方寸匕先食服日三素不耐冷者去寄生加細辛四兩陽氣不少而無子者去石斛加檳榔十五枚治婦人久無子息吳茱萸湯浸二次焙乾白芨去鬚毛白蘞去皮白茯苓去皮各三錢細辛去葉梗牛膝去蘆附子炮去皮臍各二錢人參一錢桂心一錢上為細末煉蜜為丸如梧桐子大每服十丸用溫酒送下食前治婦人子臟風冷致令無子皂莢去黑皮塗酥炙黃焦去子川大黃銼碎微炒戎鹽白礬炮灰當歸銼碎微炒各一兩五味子川椒去目及閉口者微炒去汁乾薑炮裂銼細辛各三分上為末用綿裹藥末如棗大納産門中有惡物下即止未效再用熟乾地黃散出聖惠方治婦人無子斷緒者是子臟積冷血氣不調熟乾地黃牛膝去苗當歸銼細微炒柏子仁白薇各一兩芎藭卷柏防風去蘆頭各三分桂心半兩上為散每服三錢以水一中盞煎至六分去滓空心溫服地黃湯療久無子斷緒小腹冷痛血氣不調熟乾地黃川牛膝當歸各八分卷柏川芎防風各六分牽牛子末桂心各三分上㕮咀以水六升煮取二升三合去滓分三服又別和一分牽牛子末如人行四五里更進一服以快利止忌生菜蔥熱面蕎麥蒜醋豬肉炙爆葵菜蕪荑菘菜海藻黏食臭物等八真丹治婦人無子當歸芍藥地黃川芎鹿茸阿膠炒作珠用乾草火燒艾葉續斷各等分上八味停分細末醋打麵糊為丸如梧桐子大每服二十丸空心好酒送下白芷暖宮丸出永類鈐方治暖血海實衝任治子宮虛弱風寒客滯因而斷緒不成孕育及素常墮胎或帶下赤白漏下五色頭目虛暈吸吸少氣胸腹苦滿心下煩悸臍腹刺痛連引腰背下血過多兩脅牽急嘔吐不食面色青黃肌膚瘦瘁寢常自汗禹餘糧制一兩白薑炮芍藥白芷川椒制阿膠粉炒艾葉制川芎各三分上為末煉蜜丸如梧桐子大每服四十丸米飲下或溫酒醋湯亦得常服溫補胞室和養血氣光澤顏色消散風冷退除百病自成孕育性平不熱大黃丸出千金方治帶下百病無子服藥後十日下血二十日下長蟲及青黃汁三十日病除五十日肥白大黃破如米豆熬令黑柴胡朴硝乾薑各一升芎藭五兩蜀椒一兩茯苓如雞子大一枚上為末蜜和丸如梧桐子大先食服七丸米飲下加至十丸以知為度五日微下治婦人無病觸禁久不生子出肘後方上常候月水絶後一日交接為男二日為女三日為男四日為女五日為男六日為女過此門閉不成勿復交接更待後月徒然無益浪辛苦也宜用後方柏子仁丸出肘後方治婦人無病觸禁久不生子用柏子仁一升茯苓末二升搗合乳和服十丸即佳又方出肘後方大黃七分黝參五分皂莢杏仁吳茱萸各三分半夏前胡各一分上搗篩煉蜜為丸如梧桐子大每服二十丸不過半年有子依前法即定男女也治婦人不生者胡椒二兩為末艾一兩為末熟鹽半兩花椒半兩為末砂仁官桂茴香各半兩上為末裝入豬肚內縫合煮熟每日清晨割二兩好酒三五盞服之承澤丸出千金方治婦人下焦三十六疾不孕絶産梅核仁辛夷各一升葛上亭長七枚溲疏三兩藁本一兩澤蘭子五升上為末蜜和丸如大豆先食服二丸日三不知稍增若腹中無堅癖積聚者去亭長加通草一兩惡甘者和藥先以苦酒搜散乃納少蜜和為丸或軟飯為丸溫酒送下亦可陽起石丸出和劑方冶婦人子臟虛冷勞傷過度風寒結搏久不受胎遂致絶子不産此藥服之大益子宮消除積冷陽起石酒浸半日細研二兩吳茱萸湯七次焙微炒熟地黃各一兩牛膝去苗酒浸焙乾薑炮白朮各三分上為細末煉蜜和搗三百杵丸如梧桐子大每服二十丸至三十丸溫酒或溫米飲下空心食前日二服若覺有妊即止抑氣散出危氏方治婦人氣盛於血所以無子尋常頭暈膈滿體痛怔忡皆可服之香附子乃婦人之仙藥也不可謂其耗氣而勿服香附子炒杵淨四兩茯神去木一兩橘紅二兩甘草炙一兩上為細末每服二錢入鹽少許食前沸湯調服仍兼進紫石英丸後可服螽斯丸萬靈丸勝金丹等諸藥大妙專治婦人下元虛冷令有子嗣血竭一錢大黃半兩頭紅花半兩臘腳醋一大碗上為細末一處同煎熬成棋子如大豆大每服一丸服至七日再加一丸至七日服三丸一月見效大黃湯出肘後方治婦人月水不利結積無子大黃銼炒一兩桃仁湯浸去皮尖雙仁四十九枚虻蟲去翅足微炒三十枚水蛭糯米內炒候米黃即去米三枚上銼如麻豆每服一錢酒一盞煎至七分去滓空腹溫服如無結積不可服一方無水蛭治婦人無子以二三月選丁亥日採取桃花陰乾為末入麝香硃砂人參用井花水下取戊子日下同為細末當信用行溫酒下二服並絶妙大黃湯出肘後方治婦人月水不利結積無子大黃銼炒一兩桃仁四十九枚虻蟲去翅三十枚炒上為細末一處同煎熬成膏子如小豆大每服一丸服至七日再加一丸至七日服三丸一月見效內炙丸出聖惠方療無子臟冷麝香二分研皂莢十分塗酥炙削去黑皮子蜀椒六分炒汗出上搗篩蜜丸酸棗仁大以綿裹納産宮中留少綿線出覺憎寒不淨下多即抽綿線出卻丸藥一日一度換之無問晝夜皆納無所忌也又方出聖惠方蛇床子石鹽細辛乾薑土瓜根各四兩又搗散取如棗核大綿裹納子宮中以指進之依準前法用中間病未可必不得近丈夫余無所忌並效療婦人子臟偏僻冷結無子坐藥方出聖惠方蛇床子三兩芫花三兩上搗篩取棗大紗袋盛之納産門中令沒指袋少長作須去任意臥著慎風冷茱萸丸出聖惠方治婦人陰寒十年無子吳茱萸一升蜀椒一升去目炒出汗為末上為末蜜丸如彈子綿裹導子腸中日再易無所下但開子臟令陰溫即有子也驗胎法一名探胞湯出危氏方婦人經脈不行已經三月者欲驗有胎用川芎生不見火為細末空心濃煎艾湯調下方寸匕覺腹內微動則有胎也如胎不轉動腰重如石可用酒調下治婦人無子及冷滯雞子殼五兩燒灰細研如粉綿子二兩瓦器內煅令煙盡為末五月綿子最妙上酒糊丸每服二十丸空心酒下此藥盡見效暖宮丸治衝任虛損下焦久冷臍腹㽱痛月事不調或來多不斷或過期不至或崩中漏血赤白帶下或月再行淋漓不止帶下五色經脈將至腰腿沉重痛連臍腹小便白濁面色萎黃肢體倦怠飲食不進漸至羸弱及治子宮久寒不成胎孕附子炮裂去皮臍一枚杜仲炒斷絲地榆桔梗沙參厚朴去粗皮薑汁炒各四錢黃耆白薇去土川牛膝去苗川白芷北細辛去葉乾薑蜀椒各二錢半上為末煉蜜丸如梧桐子大每服二十丸鹽酒下服之一月自然有孕多服四物湯羊肉丸亦效或棗湯吞下辛茸丸出孟詵方治婦人子宮宿受風冷多致胎氣不固常有損墮宜去子宮風當服之嫩鹿茸炮去毛酥塗炙一兩半北細辛黃耆蜜炙當歸各二兩藁本頭京芍藥川白芷牡丹皮川芎乾薑炮肉桂去皮小黑豆炒沒藥另研防風川椒鹽炒出汗去鹽各一兩上為末煉蜜為丸如梧桐子大每服四五十丸用溫酒或淡醋湯送下空心食前八珍散出孟詵方治婦人處深閨內閣常以無子為憂思慮過多傷損脾氣脾虛則不能制水漏下五色之症或只常下黃白水宜服此藥人參白朮粟米微炒白茯苓厚朴薑製各一兩益智一兩黃耆二兩甘草半兩上為散每服三錢薑三片棗子四個同煎至八分空心服千金保生丸出孟詵方若服調氣血藥覺得氣調血順但未受娠則屏去他藥再服此藥以實子宮須經候過三日復再媾自然成娠無疾而不娠者尤宜多服此藥自然娠矣防風石膏煅糯米川椒去目炒出汗北黃芩秦艽去土厚朴去皮貝母北細辛石斛酒浸蒸三次大豆黃卷淨如無以小黑豆代以上各二兩白薑炮一兩火麻仁炒去殼稱一兩甘草炙一兩熟地黃洗酒蒸三次焙當歸各二兩沒藥真者一兩半上為末煉蜜如彈子大每服空心用北棗四枚煎湯嚼下一日二服不可用酒下恐發泄了真氣不能護血參香勝金散出孟詵方治婦人血不和須先調其榮衛使之順度則服千金保生丸乃能有娠當歸二兩白薇一兩沒藥一分元胡索去皮藁本頭綿黃耆蜜炙各一兩京芍藥甘草肉桂紫石英煅白朮白石脂火煅醋淬川芎白茯苓人參川白芷白牡丹皮沉香以上各半兩上為末每服二錢溫酒調下空心服又水一大盞薑二片北棗二枚同煎若虛煩作熱每服之時入生地黃汁一合同煎一服治勞損産後無子陰中冷汁溢出子門閉積年不産身體寒冷方千金方防風一兩半桔梗三十銖人參一兩菖蒲半夏丹參厚朴乾薑紫菀杜蘅各十八銖秦艽白蘞牛膝沙參各半兩上十四味為末白蜜和丸如小豆大食後服十五丸日三服不知增至二十丸有娠止夫不在勿服之服藥後七日方合陰陽歸艾丸出朱氏集驗方治婦人平生無子服之屢驗生地黃一斤淨洗生薑一斤淨洗各用破盆研爛如交加散法淹一宿銀器各炒乾入後藥白芍藥白茯苓延胡索當歸去蘆浸各二兩熟艾三兩醋煨面成餅甑上蒸熟焙乾上除艾葉外各焙乾為末入前件地黃生薑作一處煉蜜丸如梧桐子大每服五十丸空心酒下一日三服麝香丸出御藥院方治婦人陰中久冷或成白帶淋瀝不斷久無子零陵香藿香各二錢蛇床子半兩吳茱萸桂枯白礬木香各三錢麝香二分半丁香韶腦各一錢半不灰木白芷各二錢半龍骨半兩上為細末煉蜜和丸每兩作四十丸每用一丸綿裹納陰中麋茸萬病丸出十便良方補養氣血久服令人有子方熟乾地黃當歸麋茸勿使鹿茸上件各等分為細末煉蜜丸如梧桐子大空心食前米飲或溫酒下五十丸附子當歸丸出十便良方治血臟虛冷方當歸三兩附子白朮各一兩芍藥二兩上為細末醋煮麵糊和丸如梧桐子大米飲下三十丸未效加至五十丸空心服壯陽令人有子出本草以鹿項骨髓蜜煮服之令人有子出本草以正月十五日燈盞夫婦共於富家宴會所盜之勿令人知之安於床下當月有娠令人有子出本草以正月雨水夫妻各飲一杯還房當獲有子神效也令婦人有子出本草以狗骨煎汁煮粥飲食之令生男兒出本草以虎鼻懸戶上療婦人無子二月丁亥日收桃花杏花陰乾為末戊子日和井花水服服方寸匕日二三服妊娠附論夫何以知婦人妊娠脈平而虛者乳子法也經云陰搏陽別謂之有子此是血氣和調陽施陰化也診其手少陰脈動甚者妊子也少陰心脈也心主血脈又腎名胞門子戶尺中腎脈也尺中之脈按之不絶法妊娠也三部脈沉浮正等按之無絶者有娠也妊娠初時寸微小呼吸五至三月而尺數也妊娠四月欲知男女者左疾為男右疾為女左右俱疾為産二子又法左手沉實為男右手浮大為女左右手俱沉實猥生二男俱浮大猥生二女尺脈若左偏大為男右偏大為女左右俱大産二子大者如實狀又法左手尺中浮大者男右手尺中沉細者女若來而斷絶者月水不利又法左右尺俱浮為産二男不然女作男生俱沉為産二女不爾男作女生又法得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮又遣妊娠人面南行還復呼之左回首者是男右回首者是女又看上圊時夫從後急呼之左回首是男右回首是女又婦人妊娠其夫左乳房有核是男右乳房有核是女妊娠欲知將産者懷妊離經其脈浮設腹痛引腰脊為將産也但離經者不病也又法欲生其脈離經夜半覺痛日中則生也孕原立本章有泰初有泰始渾沌一判既見氣矣故曰泰初既立形矣故曰泰始氣初形始天地相因生生化化品物彰矣故曰大哉干元萬物資始至哉坤元萬物資生有生之初雖陽豫之正育而充之必陰為之主因形移易日改月化無非坤道之代終也謂之妊陽既受始陰壬之也壬子謂之妊已為正陽陰包之也謂之胚未成為器猶云坯也謂之胎既食於母為口以也若娠則以時動也若懷則以身依之也天之德地之氣陰陽之至和相與流轉於一體唯能順時數謹人事勿動而傷則生育之道得矣觀四序之運生長收藏代出萬物有儀則咸備而天地之氣未始或虧者蓋陰陽相養以相濟也昧者曾不知此乃欲拂自然之理謬為求息之術方且推生死於五行蘄補養於藥石以偽勝真以人助天雖或有子孕而不育育而不壽者衆矣昔人論年老有子者男不過盡八八女不過盡七七則知氣血在人固自有量夫豈能逃陰陽之至數哉大全良方云肝為血兮肺為氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例血衰氣旺定無孕血旺氣衰應有體肝藏血為榮屬陰肺主氣為衛屬陽陰陽配偶者是夫婦匹配偶合媾精乃有子也若血少氣盛則無娠孕若血盛氣少則有孕也寸微關滑尺帶數流利往來並雀喙小兒之脈已見形數月懷耽猶未覺寸脈微關脈滑尺脈帶數及流利雀啄皆是經脈閉塞不行成胎以上之脈皆是血多氣少之脈是懷小兒之脈已見形症也左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前通語左手脈疾為懷男右手脈疾為懷女及兩脈流行滑利相通疾速來去是或兩手關脈洪大相應是其胎已有形狀也左手帶縱兩個男縱者夫行乘妻水行乘火金行乘木即鬼賊脈也名曰縱見在左手則懷兩個男兒也右手帶橫一雙女橫者妻乘夫也是火行乘水木行乘金即所勝脈也名曰橫見於右手則懷一雙女兒也左手脈逆生三男逆者子乘母也是水行乘金火行乘木即己生脈也名曰逆見於左手則懷三個男兒也右手脈順還三女順者母乘子也是金行乘水木行乘火即生己之脈也名曰順見於右手則懷三個女兒也寸關尺部皆相應一男一女分形症寸關尺部脈大小遲疾相應者是懷一男一女形症之脈也謂關前為陽關後為陰陰陽脈相應故懷一男一女也有時子死母身存或即母亡存子命此二句之文是辨子母存亡之法往來三部通流利滑數相參皆替替陽實陰虛脈得明遍滿胸膛皆逆氣若寸關尺三部通行流利皆替替有力而滑數皆是陽實陰虛之脈主妊婦氣遍滿胸膛而不順也左手太陽浮大男左手寸口為太陽其脈浮大則是懷男子脈也右手太陰沉細女右手寸口為太陰其脈沉細是懷女脈也諸陽為男諸陰女指下分明長記取諸陽脈皆為男即浮大疾數滑實之類是也當懷男子諸陰脈三即細沉微弱之類是也當懷女也三部沉正等無絶尺內不止真胎婦寸關尺三部脈沉浮正真齊等舉按無絶斷及尺內舉按不止住者真的懷胎婦也夫乘妻兮縱氣霧經云縱者夫乘妻也水行乘火金行乘木即鬼賊脈也縱氣霧霧者露也又上下也謂夫之陽氣乘妻之陰氣二氣上下相逐如霧如露潤澤結子也妻乘夫兮橫氣助橫者妻乘夫也見前注謂兩旁橫氣相佐助也子乘母兮逆氣參逆者子乘母也謂子氣犯母氣相乘逆行之氣相參合也母乘子兮順氣護得母氣乘於子氣為順氣相護衛也凡胎聚縱橫逆順四氣以榮養方以成形也小兒日足胎成聚身熱脈亂無所苦婦人懷小兒五個月是以日足胎成就而結聚也必母身體壯熱當見脈息躁亂非病苦之症謂五月胎已成受火精以成氣故身熱脈亂是無病也汗出不食吐逆時精神結備其中住謂妊娠受五行精氣以成形稟二經以榮其母懷娠至五月其胎雖成其氣未備故胎氣動上衝心胸則汗出不食吐逆名曰惡阻俗呼選飯惟思酸辛之味以調胎氣也滑疾不散胎三月妊娠三月名始胎此是未有定儀心胞脈養之故脈見滑疾流利為少氣多血不散為血氣盛則始結成胎也但疾不散五月母其脈但疾數而不散者是五個月懷胎之母也弦緊牢強滑利安沉細而微歸泉路孕婦之脈宜弦緊牢強滑利為安吉之脈若沉細而微謂脈與形不相應故云死也前文雖云太陰沉細又云諸陰為女其説似有相違謂三部脈皆不沉細及微故不同也又孕育備論經云少陰脈動甚者有子厥旨何哉曰手少陰之經屬心足少陰之經屬腎心之所主者血腎之所主者精精血合氣而成之也然而胞門子戶又所以為精血之會其於尺部二脈尤有可驗者焉且婦人尺部之脈滑是為血實必主月事不行若其來斷絶或中絶而不至者此皆無孕惟滑而不絶略無間斷於其間此則真胎形之脈也婦人懷胎臟氣壅閉不可多睡不可憂懼勞役不可啖食黏滯辛辣強硬之物又不可妄施針灸所貴時行數步調暢自適使氣得其平若酒面炙爆熱毒熏蒸若感觸風邪傳染熱氣若誤服藥餌破血動胎若七情內傷快意縱欲則易致漏胎若胎腹痛方來用力太早若覺則驚動胎轉未得若抱持不正奔突後趨若近産多淫觸犯禁忌則易産難既産之後或過用心力或素有痰阻或血虛氣逆或虛極乘寒則血暈眩悶之症生矣然而安胎之法有二因母病以致動胎者但療母其胎自安或胎氣不堅因觸動以致母病者則安胎而母自瘥以膠艾湯芎歸湯各半縮砂佐之為良難産之劑前所謂四物湯加吳茱萸入醋夾煎黑神散用乳香煎湯調下皆其要藥産後血暈先以舊漆器燒煙微向其鼻次則五靈脂末半生半炒入蘇合香丸百沸湯調與之或黑神散入麝香少許調以紫蘇湯或花蕊石散用童子小便溫酒調劑可也損孕驗法婦人面色青手足冷指甲黑而且遍體不仁腰腹痛割其或面青唇青以致舌間黯黑口角沫出則不容以人力勝之大要將産腹痛萬勿驚動且須憑物而行直至腰痛子逼育門方可用力蓋腎繫於腰而胎繫於腎故也俗於産下用理中丸然蜜甘而滯不若但用理中湯俗於小兒初誕多用黃連然連苦傷胃不若但用甘草炙煎綿蘸入口良久迭用惡物自出俗於胎孕已成多服滑胎枳殼散然枳殼微寒須以縮砂烏藥為佐産後飲食米飲勿用産後盥洗可先與百沸湯時常調血以四物逐瘀以黑神人所共知也若夫順氣等劑胎前産後尤當兼施而並用之血暈昏迷切勿用降真香薰之以塞其氣方白朮湯出宣明論治妊娠血液虛衰痿弱難以運動氣滯痹麻榮衛不能宣通常服養液潤燥開通結滯令血昌盛白朮三兩寒水石當歸黃芩芍藥人參石膏乾葛防風縮砂藿香各半兩甘草茯苓各一兩木香一錢上為細末每服三錢水一盞生薑三片同煎至六分去滓溫服日三次又宜服人參半夏加一服為妙崔宣武方用白朮一兩白朮散出危氏方治妊娠氣不調和飲食易傷白朮炒乾紫蘇各一錢人參白芷各三分炒川芎訶子皮青皮各半兩甘草一分上為末每服二錢水一盞薑三片煎至七分溫服經云飲食自倍腸胃乃傷又云陰之所生本在五味陰之五宮傷於五味若妊子飲食不節生冷毒物恣性食啖致傷脾胃故妊娠傷食最難得藥唯此木香丸白朮散二方最為穩捷木香丸出危氏方治婦人有孕傷食木香二錢三稜炮人參白茯苓各三錢上為細末麵糊丸如緑豆大熟水吞三四十丸胎孕九個月將息胎法出大全良方用豬肚一全具依法用蔥五味煮熟食食如不盡更食以盡為度不得與別人食無效犀角散出衛生寶鑑治妊娠婦人産前諸風熱困倦時發昏眩揀參犀角山梔子黃連青黛川芎川羌活吳白芷甘草炙茯苓去皮以上各半兩上為粗末每服五錢水一盞半生薑三片竹葉五七葉同煎至一盞去滓溫服食前治妊娠臟腑常多轉瀉身上肌肉常冷心中寒栗方出楊子建萬全護命方白朮續斷吳茱萸防風當歸人參芎藭五味子各半兩甘草炙一分細辛三銖上杵羅為細末每服三錢水一盞二分生薑三片棗二枚同煎取一盞空心吃治妊娠渾身碎痛並腹內疼痛不可勝忍悶亂欲死方出楊子建萬全護命方白朮當歸芍藥川芎黃芩各一分上細杵羅為末每服三錢水一盞二分煎取一盞一分空心去滓吃便産須知凡欲要兒子生吉良者交會之日常避丙丁及弦望朔晦大風大雨大霧大寒大暑雷電霹靂天地昏暝日月無光虹霓地動日月薄蝕此時受胎非止百倍損於父母生子或喑啞聾瞶頑愚癲狂攣跛盲眇多病短壽不孝不仁又避日月火光星辰之下神廟佛寺之中井灶圊廁之側塜墓尸柩之傍皆悉不可夫交會如法則有福德大智善人降托胎中仍令父母性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來托胎中則令父母性行凶險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之驗有如影響此乃必然之理可不再思之男女受胎時日法出便産須知凡男女受胎皆以婦人經絶一日三日五日為男仍遇月宿在貴宿日又以夜半生氣時瀉精者有子皆男必壽而賢明高爵也若以經絶後二日四日六日瀉精者有孕皆女過六日皆不成子又遇王相日尤吉推王相日法出便産須知春甲乙夏丙丁秋庚辛冬壬癸推貴宿日法正月一日六日九日十日十一日十二日十四日二十一日二十四日二十九日二月四日七日八日九日十日十二日十四日十九日二十二日二十七日三月一日六日七日八日十日十七日二十日二十五日四月三日四日五日六日八日十日十五日十八日二十二日二十八日五月一日二日三日四日五日六日十二日十三日十五日十六日二十日二十五日二十八日二十九日三十日六月一日三日十日十三日十八日二十三日二十六日二十七日二十八日二十九日七月一日十一日十六日二十一日二十四日二十五日二十六日二十七日二十九日八月五日八日十三日十八日二十一日二十二日二十三日二十四日二十五日二十六日九月三日六日十一日十六日十九日二十日二十一日二十二日二十四日十月一日四日九日十四日十七日十八日十九日二十日二十二日二十九日十一月一日六日十一日十四日十五日十六日十七日十九日二十六日二十九日十二月四日九日十二日十三日十四日十五日十七日二十四日二十七日若春合甲寅乙卯夏合丙午丁巳秋合庚申辛酉冬合壬子癸亥與上件月宿日合者尤佳胎前避忌出産後救急方初受胎後凡妨胎藥物並不宜服或房勞不戒能令胎孕不成妊娠六七個月後醉飽過度房事不節産母多有腰疼腹痛之疾甚則傷胎不宜登高舉重或至跌撲挫閃損胎古人入月則異寢此時邏於色欲則生子頭戴穢惡而出俗謂戴白生其子必患胎㿐妊娠食忌法出便産須知食雞子鮮干鯉魚鱛令子多瘡食豆醬合藿令墮胎食兔肉令子缺唇食犬肉令子無聲食酒多食雀肉令子無恥食椹子及鴨子令子倒懸食驢馬肉令延月食魚鱉子傷兒食山羊肉令子多病食騾肉令難産食雞肉及糯米令子腹中多蟲食水漿令絶胎食雀肉蛇醬令子多淫無恥食螺螄令子鋪腹産妊娠六七月多食五辛炙爆酒面令子胎熱多食水冷淘葵蓴生冷菜果令子患胎寒大小便向非常之地令半産殺兒此大忌之食忌起居羊肝多食生子多厄難蛙蟺子喑啞食螃鱉橫生子薑多食子生瘡多指乾薑蒜雞毒胎無益黏膩難化傷胎無鱗魚不可食食鰍魚過多致有難産菰子名菌有大毒有食菌多誕子風而夭勿亂服湯藥酒勿過飲臥産尤忌勿亂妄針灸勿向非常地便旋半産殺人勿舉重登高涉險勿有大驚子必顛疾宜自釋勿多睡須時行步體虛腎氣不足子必解顱腦破不合宜溫補脾胃不合榮衛虛怯子必羸瘦自家及鄰家興修犯其胎氣令兒破形損命刀犯者形必傷泥犯者竅必塞打擊者色必青黯擊搏者相拘攣上此等驗如反掌切宜避之胎前藥忌出胎産救急方雄黃雌黃與硫黃代赭碸砒巴豆霜水銀鉛粉生金屑硝分三品牙朴芒虎掌鬼臼鬼箭羽牽牛牛膝川白薑天雄附子川草烏南星半夏及藜蘆紅花芫花並大戟躑躅野葛與䕡茹白薇杜蘅牡丹輩槐子皂角兼溲疏桃仁三稜干筒漆菵草通草瞿麥俱檔根茅根蘇方木牛黃蝟皮生鼠徒蚖青斑蝥並地膽虻蟲水蛭及螻蛄殭蠶蠶布蟹爪甲蜈蚣蜥蜴衣白魚驢馬兔肉雞鴨子菜中莫食大小葫麝香肉桂蛇蟬蛻催生以前切忌諸
