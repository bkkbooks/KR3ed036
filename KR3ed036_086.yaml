body:
  text: 卷八十六眼目門一切眼疾雜治丹石毒上攻眼附論夫丹石毒氣上攻於目者熱氣內乘於肝也在竅為目肝受血而能視服食之人將適失宜以其毒流於肝則營血痞澀沖發於目故令兩目赤痛或生胬肉治不宜緩緩則石勢穿發睛瞳高突損爛方大黃丸出聖惠方治丹石毒上攻眼目赤腫開眼不得澀痛生障翳心神煩躁川大黃一兩銼碎微炒麥門冬一兩半去心焙玄參黃芩決明子車前子青葙子黃連去須馬牙硝蕤仁湯浸去赤皮犀角屑寒水石以上各二分甘草半兩炙微赤銼梔子仁五分上為末煉蜜和搗二三百杵丸如梧桐子大每服不計時候煎竹葉湯下二十丸大黃湯出聖濟總録治丹石熱毒上攻目及生翳心躁面赤頭痛大黃銼炒當歸生乾地黃焙芎藭葛根銼甘草炙炒麥門冬去心焙天門冬去心焙葳根凌霄花根是也焙各半兩山梔仁地骨皮黃連去須各一兩上粗搗篩每服五錢匕以水一盞半入竹葉一十片煎至八分去滓食後臨臥服瀉肝大黃湯出聖濟總録治丹石發動目赤痛及風熱眼大黃銼炙黃芩去黑心決明子炒山梔子甘草炙銼桑根白皮銼前胡去蘆頭羚羊角鎊枳殼去瓤麩炒各二兩黃連去須大青細辛去苗葉各半兩上粗搗篩每服五錢匕以水一盞半煎至八分去滓食後臨臥溫服羚羊角湯出聖濟總録治服丹石過多熱毒上乘兩目赤痛或生胬肉或即腫爛羚羊角鎊茯神去木防風去叉羌活去蘆頭芎藭地骨皮菊花各二兩甘草炙銼三分枳殼去瓤麩炒犀角鎊各三分麥門冬去心焙一兩半上粗搗篩每服三錢以水一盞煎至七分去滓食後早晚溫服羚羊角散出聖惠方治丹石毒上攻眼目澀痛腫赤心神煩躁唇口乾燥羚羊角屑一兩地骨皮黃芩車前子各三兩麥門冬一兩半去心焙秦艽去苗柴胡去苗梔子仁川升麻葳蕤甘草炙微赤銼各半兩上搗粗羅為散每服四錢以水一中盞煎至六分去滓不計時候溫服羚羊角湯出聖濟總録治丹石發動燥渴睛痛赤熱淚多熱毒眼羚羊角屑鎊黃芩山梔子仁麥門冬去心焙知母桔梗銼炒貝母去心焙甘草白檳榔銼各一兩前胡去蘆頭半兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服前胡瀉肝湯出聖濟總録治丹石毒上攻目赤煩悶熱鬱胸中前胡去蘆頭三兩決明子三兩梔子仁二兩黃芩去黑心三兩細辛去苗葉三兩大青三兩秦皮三兩石膏四兩干鹽一兩上粗搗篩每服五錢匕水一盞半入竹葉十片車前葉十片細切煎至八分去滓入芒硝一錢匕放溫食後臨臥服決明子湯出聖濟總録治丹石毒及客熱沖眼赤淚出疼痛決明子炒枳殼去瓤麩炒柴胡去苗黃芩去黑心芍藥甘草炙銼車前子葉干各一兩梔子仁升麻各半兩上粗搗篩每服五錢匕水一盞半入竹葉十片煎至七分去滓芒硝一錢匕放溫食後臨臥服葛根湯出聖濟總録治金石發動眼痛欲裂葛根銼黃連去須木通銼甘草吳藍各二兩黃芩去黑心升麻大黃銼焙各一兩半石膏四兩上粗搗篩每服五錢匕水一盞半煎至六分去滓入芒硝一錢匕地黃汁半合更煎三兩沸放溫食後臨臥服療先服丹石熱衝上眼赤方黃連苦參槐子各二兩蕤仁決明子黃芩各五分麥門冬去心葳蕤大黃各一兩上搗篩蜜和丸如梧桐子大食後以蜜水下二十丸至三十丸犀角散出聖惠方治丹石毒上攻眼目赤腫疼痛犀角屑川升麻黃芩梔子仁甘菊花玄參川大黃銼碎微炒各三分麥門冬一兩半去心焙甘草半兩炙微赤銼上搗粗羅為散每服四錢以水一中盞入竹葉二十七片煎至六分去滓每於食後溫服車前子散出聖惠方治丹石毒上攻眼黑白睛腫脹疼痛開張不得心神煩悶車前子川升麻赤芍藥黃芩川大黃銼碎微炒各一兩麥門冬一兩炙微赤銼甘草半兩微炙銼上搗粗羅為散每服四錢以水一中盞入竹葉二十七片煎至六分去滓不計時候溫服芒硝散出聖惠方治丹石毒攻眼疼痛腫生翳心神躁亂川芒硝黃連去須黃芩枳殼麩炒微黃去瓤鉤藤銼梔子仁以上各二兩川大黃三分銼碎微炒甘草三分炙微赤銼上為細散每於食後烏豆湯調下二錢前胡湯出聖濟總録治乳石發動頭痛太陽兩脈掣熱痛目赤睛疼苦毒不解當睛破葳蕤一兩甘草炙銼一兩葛根銼二分前胡去蘆頭半兩麥門冬去心焙半兩梔子仁半兩漏蘆銼三分上粗搗篩每服五錢匕以水一盞半入竹葉十片煎至八分去滓食後臨臥服葵子散出聖惠方治服丹石毒先面赤口乾目黃赤睛疼恐變生翳障葵子豉微炒犀角屑地榆銼川升麻露蜂房微炒各一兩甘草三分炙微赤銼上搗粗羅為散每服四錢以水一中盞煎至六分去滓每於食後溫服忌炙爆熱面麥門冬湯治諸石毒眼睛疼寒熱時作麥門冬去心焙二兩甘草炙銼黃芩去黑心大黃銼炙梔子仁各一兩上粗搗篩每服五錢匕以水一盞半煎至八分去滓下芒硝一錢匕食後臨臥溫服柴胡洗眼湯出聖惠方治丹石毒上攻眼目赤痛微腫眥爛柴胡去苗蕤仁研黃連去須川升麻玄參各一兩上搗粗羅為散以水三大盞半煎濾去滓微熱淋洗不限度數冷即重暖用之三黃丸出聖濟總録治諸石毒盛熱不除腹滿小便赤大便澀不利吐逆氣衝胸口焦目赤黃連去須二兩黃芩去黑心二兩大黃銼炒甘草炙銼各一兩上粗搗篩每服五錢匕以水一盞半煎至八分去滓下芒硝一錢匕溫服以利為度黃芩湯出聖濟總録治丹石發動發熱心腹脹滿小便赤大便難胸中煩躁目赤痛黃芩去黑心大黃銼炒各二兩梔子仁一兩豉炒三分上粗搗篩每服三錢匕水一盞煎至六分去滓食後臨臥溫服大黃膏出聖惠方治丹石毒眼腫痛熱淚出川大黃三兩銼生用木香半兩上為細末散以生地黃汁調如稀膏敷於腫處干即換之杏仁膏出聖濟總録治丹石毒沖目赤癢反生浮膜點眼兔肝方出龍木論以兔肝和搗決明子作丸服之又生用服丹石人上腫眼暗不見物可生食之一如服羊子肝法治丹石攻眼方出聖惠方以生地黃汁澄清用瓷盒子盛頻點之治服丹石人上衝眼暗不見物用兔肝切細醋拌生食之鉤割針鐮附論內經曰血實宜決之難經曰腫熱宜砭射之蓋邪毒結聚其勢盛實有藥力未能去者決射之法不可廢也凡目生息肉腫核黃膜之類皆以臟干風熱毒氣熏發於肝血氣結滯所成也治宜先鉤割鐮洗去毒氣次以湯散蕩滌膏劑點敷之法凡兩眥頭有赤脈及息肉者宜鉤起以鈹針割去令盡未盡更割以盡為度或以縫衣細針穿線口銜線頭牽起別以鈹針向目中割之割了以火針尉之使斷其根不爾二三年間恐能復發復發則黏睛難療其絶厚者侵入水輪宜以曲頭篦子拆起勿使掣損瞳仁蓋瞳仁甚薄易損故也凡鉤割及用針不宜在旦旦則腹空五臟皆虛令人頭運悶倒又鉤割不宜欲速惟緩緩為之凡眼上腫瞼皮裹有核如米粒大漸長如梅李大者內有物如膿似桃膠此皆風熱所致也可針破捏去之即瘥仍翻眼皮向里針之恐引風毒又恐瞼外成痕凡風毒熱腫結於兩瞼內妨痛日久漸大往往隱損瞳仁宜用針刀割去之乃瘥又有脾風熱壅上攻眼瞼熱痛不止者又有眼腫合者宜翻眼瞼視其黑睛上下有黃翳根腳連瞼則以法針去之次以藥敷之又風瞼毒氣常在瞼下唇邊緣瞼唇中空卷遇肝肺熱即依前結成宜針去結膿又目赤腫硬淚出難開疼痛不可忍先患一目次相牽引漸生翳膜不能見物皆是膈中積熱肝臟風熱上衝故也宜先鐮洗除去毒血次服藥攻治凡目赤兼黑睛中忽從下向上生黃氣疼痛者是脾胃熱毒氣相熏攻如此宜先鐮上下瞼散去瘀血次服諸藥凡目生頑翳者可用火燒銅針輕點敷波斯國銀礦名悉蘭脂點之不痛勿用別法凡目中生黃膜上直覆瞳仁者初患之時疼痛赤澀發歇不定淚出難開漸生翳膜直覆黑睛不辨人物蓋因脾臟風熱熏發於目其證如此宜先鉤割法次服蕩滌脾臟風熱之藥凡目中忽然赤澀淚出痛癢漸生障翳赤膜下垂直覆睛珠如朝霞之色者宜急鐮洗去其瘀血次用點藥及服諸藥凡目胞內膠凝者是脾胃積熱膈內風衝入於胞瞼初如麻子久積漸長狀如桃李磨隱瞳仁後必生翳宜針破出血次鐮洗去瘀血加湯藥攻治凡目風牽瞼者初患之時乍好乍惡發歇不定淚出不止此是胃氣受風肝膈積熱風熱毒氣熏發瞼眥甚者目皮翻出急宜鐮之散去瘀血及尉烙服藥治療凡瞼生風粟者因心肺壅毒肝家有風故令瞼皮上下有肉如粟粒淚出澀痛久生翳膜宜鐮出惡血除去根本凡目痛如針刺者初患之時微覺頭疼目眩目系常急夜臥澀痛淚出難開久則發痛時如針刺此是心臟潛伏毒熱風壅在於膈中久則漸生翳障兩目俱損急宜鐮洗出血及針陽白穴凡目忽被物撞打睛出但眼帶未斷者當時納入瞼中勿令驚觸四畔摩風膏及搗生地黃敷之其竅內有惡血以針引之方鉤割後用刀剪藥安咱盧系回回藥名緑豆粉砂糖霜李子樹膠各一兩上為末每用點瘡上治目白膜瞞睛方以雞翎截之近黑睛及當白睛嗍之膜自聚鉤針鉤挽之割去即見物以綿當眼上著血斷三日瘥尉烙附論夫血氣得溫則宣流得寒則凝泣肝藏血上注於目若肝經虛寒則目多昏暗淚出之候古方用溫尉之法蓋欲血氣使之宣流爾若翳膜頑厚尉法所不能去者又宜烙之凡五臟虛勞風熱上衝於肝從上生向下名曰逆翳從下向上名曰順翳此疾宜用尉烙法法尉眼餅子出聖惠方治眼腫生翳瞼垂疼痛大黃銼鬱金黃連去須各二兩上為散用酸粟米飯和搗令勻每用藥五錢捏作一餅子以軟帛裹不住手尉之治眼腫貼尉地黃膏方出聖濟總録生地黃粟米飯澱極酸者上等分爛研細膏勻攤於薄絹上方圓二寸許貼尉目上干即易之治眼疾或有膿出者馬齒尉方出聖惠方馬齒子人莧子各半兩上為末入銅器中於飯上蒸熟以綿裹尉大眥頭膿水出處仍乘熱尉之令透睛每尉三五十度膿水自絶治目赤癢澀及一切目疾湯器尉方出聖濟總録上方盛熱湯滿器銅器尤佳用以尉目閉目勿開亦勿以手揉目次掬器中湯淋目候稍冷即止一日三次或四次為之若無目疾亦可間用此法治眼昏暗中指尉法出聖濟總録上方東向坐不息再過以兩手中指口唾之二七相摩拭尉目眥佳針烙法出聖濟總録治熱病後失明或生白翳極厚者上方取平頭針可翳大小者燒赤當翳中烙之須輕下手若烙後翳已破即少敷除翳藥亦可烙眼膚生覆瞳子治目暗掌心尉法出聖濟總録上方雞鳴時以兩手相摩極熱尉目三遍仍以指甲搽兩眥頭覺有神光妙尉眼方治熱毒風攻眼赤痛並瞼浮腫上黑豆揀擇一升分作十處將軟絹帛裹定於沸湯內蘸過乘熱更互尉之每一分三度入湯用豆盡當愈治目痛不得睡及毒病後眼赤痛有翳方暮灸新青布尉並蒸大豆袋盛枕之夜常令熱治目為物所傷觸睛方上煮羊肉令熟尉勿令過熱豬肝亦得
