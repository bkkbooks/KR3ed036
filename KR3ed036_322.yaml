body:
  text: 卷三百二十二婦人諸疾門虛損附論夫婦人者衆陰所集常與獨居十五以上陰氣浮溢百想經心內傷五臟外損姿容月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論所以婦人別立方者以其氣血不調胎妊生産崩傷之意故也婦人之病與男子十倍難療以其嗜欲多於丈夫成病則倍於男子加以嫉妒憂患慈戀愛憎深著堅牢情不可解所以為病根深療之難瘥也夫人將攝順理則氣血調和風寒暑濕不能為害若勞傷氣血便致虛損則風冷乘虛而干之乃生百病可依證而治也方補益大澤蘭丸治婦人虛損及中風余病疝瘕陰中冷痛或頭風入腦寒痹筋攣緩急血閉無子面上遊風去來目淚出多涕唾忽忽如醉或胃中冷胸中嘔逆不止及泄痢淋瀝或五臟六腑寒熱不調心下痞急邪氣咳逆或漏下赤白陰中腫痛胸脅支滿或身體皮膚中澀如麻豆苦癢痰癖結氣或四肢拘攣風行周身骨節疼痛目眩無所見或上氣惡寒灑淅如瘧或喉痹鼻癰風癇癲疾或月水不通魂魄不定飲食無味併産後內衄無所不治服之令人有子澤蘭二兩六銖藁本當歸甘草各一兩十八銖紫石英三兩芎藭乾地黃柏子仁五味子各一兩半桂心石斛白朮一兩六銖白芷蓯蓉厚朴防風薯蕷茯苓乾薑禹餘糧細辛卷柏各一兩蜀椒人參杜仲牛膝蛇床子續斷艾葉蕪荑各十八銖赤石脂石膏各二兩一方有枳實十八銖門冬一兩半上三十二味為末蜜和為丸如梧桐子大酒服二十丸至四十丸久赤白痢去幹地黃石膏麥門冬柏子仁加大麥糵陳曲龍骨黃連阿膠各一兩半有鍾乳加三兩良七補丸出十便良方治婦人血氣虛弱衝任不和腹中經結狀若懷孕月候尚來未分經脈宜服此方當歸芍藥川芎各三分白芷白朮熟地黃阿膠各二分炒上為細末蜜丸如梧桐子大每服三十丸空心米飲下地黃煎丸出大全良方解勞生肌進食活血養心生地黃汁杏仁汁生薑汁藕汁各五升薄荷汁鵝梨汁各一升法酒一升沙蜜四升上慢火熬成膏入後藥苦梗去蘆二兩麝香半兩研熟地黃酒水焙四兩北柴胡去蘆三兩木香人參茯苓山藥柏子仁去皮炒研遠志去心枳殼去瓤麩炒白朮各一兩秦艽二兩上為細末以前膏子和丸如梧桐子大食前甘草湯下二十丸蛤蚧丸出大全良方治肺間邪氣胸中積血作痛失音含化丸蛤蚧一兩去足炙訶子去核阿膠粉炒麥門冬去心北細辛甘草生乾地黃各半兩上為細末煉蜜和丸如雞頭大食後含化一丸黃耆散一名防風湯出大全良方治勞氣食後身疼倦夜間盜汗此病困失榮衛損也宜防風湯黃耆白芍藥防風各三分甘草半兩當歸生乾地黃各三分上㕮咀每服三錢水一盞姜三片棗三枚煎至七分去滓食前溫服椒紅丸治婦人血氣不調臟腑怯弱風冷邪氣乘虛客搏臍腹冷痛脅肋時脹面色痿黃肌體羸瘦怠惰嗜臥不思飲食常服補虛溫暖下元逐痼冷進飲食沉香莪朮訶黎勒炒去核椒紅微炒當歸去蘆酒浸微炒附子炮去皮臍白朮各一兩麝香一分別研丁香肉豆蔻炮良薑去蘆麻油炒各半兩上為末入麝香勻酒煮麵糊丸如梧桐子大每服三十丸溫酒空心下劫勞散治心俱虛勞嗽二三聲無痰遇夜發熱過即冷時有盜汗四肢倦怠體劣黃瘦飲食減少夜臥恍惚神氣不寧睡多異夢此藥能治微嗽有唾唾中有紅線名曰肺痿若有此病不治便成羸劣之疾白芍藥六兩綿黃耆去皮蜜炙甘草炙人參去蘆頭當歸去蘆洗淨半夏白茯苓去皮熟地黃洗淨焙乾五味子揀去梗阿膠各二兩炒上㕮咀每服三錢水一盞生薑十二片棗三枚煎至九分無時溫服日進三服石斛生地黃煎治婦人血虛羸氣胸逆滿悶氣脹石斛甘草炙紫菀各四兩桂心二兩生地黃汁醇酒各八升茯苓一斤大黃八兩麥門冬去心二斤桃仁半斤去皮尖熬上十味搗末合盛銅器中加炭火納鹿角膠一斤數攪之得一升納芡實三斤白蜜三升合和調更於銅器中釜湯上煎攪之以生竹抄無令著器攪令盡相得藥成先食酒服如彈子大一丸日稍加至二丸一方用人參三兩上㕮咀每服五錢水一盞入紫蘇七片烏梅一個至煎七分溫服如聖散治婦人所稟血氣不足不耐寒暑易冒疾傷月水不調久而心虛狀若心勞四肢易倦筋骨少力盜汗易驚或時不寧五心煩熱肌膚不長間作頭昏飲食無味胸膈不利或産後受病並可服之北柴胡白茯苓甘草熟地黃人參當歸各一兩鱉甲胡黃連沉香知母各半兩桑寄生乾葛各二分上為細末每服二錢水一盞烏梅一個棗二枚麥門冬數粒煎至八分無時候服當歸木香湯治婦人血氣虛勞令人頭目昏眩語聲沉音舌根硬言語蹇澀口苦不思飲食白日困睡夜發虛汗及神思恍惚夢寢狂躁面色痿黃頻發喘嗽遍身疼痛腳氣走注四肢沉重背甲拘急時發寒熱五心煩躁唇乾多渴胸膈不利喉咽噎塞尫羸瘦弱經曰脈大為勞宜服此方青皮五加皮海桐皮桑白皮地骨皮丁香皮陳皮牡丹皮棕櫚皮以上諸藥同為灰末用六錢赤芍藥木香各半兩當歸一兩上為細末每服一錢水一盞入小油二點錢一文同煎至七分溫服如婦人血臟臍下冷痛似刀攪刺遍身腫滿室女經脈不通用斑蝥半兩大黃一兩炒銼二味為末用黃狗膽汁以溫酒調下一錢如臍下疼痛心間痰未止不加二味又方甘草半兩上為粗末每服二錢水一盞生薑三片棗二枚煎七分去滓稍熱服煩渴心躁入烏梅一兩同杵為末生薑地黃散治婦人血氣不調或時寒熱體痛不思飲食生薑地黃北柴胡各一兩羌活木香桂心防風各半兩酸棗仁羚羊角屑芍藥白朮黃耆川牛膝白茯苓當歸枳殼各三分上㕮咀每服三錢水一盞生薑三片煎至七分去滓空心服補陰丹治婦人血氣俱虛四肢困熱骨節煩疼熟地黃焙生地黃焙烏梅焙各二兩川芎三錢上細末煉蜜丸彈子大每服一丸麥糵湯下不拘時日三服益母煎治婦人一切病産後一切傷損上用益母草不以多少用竹刀切洗淨銀器內煉成膏瓶器封之並以酒服清氣湯治肌熱骨瘦者陰衰陽盛也是氣弱而血熱則搏而不通外蒸肌肉內蒸骨髓瘦受蒸瘦也勞時暈熱煩渴口乾頰赤頭疼飲食無味心神驚悸肢體痠疼或時盜汗或時上暴或時咳嗽或月水斷絶或經極少俗謂血勞産後曰蓐勞及羸瘦之人與清氣湯羊乳丸治之紫蘇子五味子大腹子枳殼桑白皮微炒菖蒲地骨皮白朮柴胡秦艽獨活乾用乾葛甘草炙各一兩地黃澤蘭檔子防己川烏玄胡索各等分上為末每服二錢空心酒調下薤白湯治血虛勞倦鹿角膠當歸去尾黃耆鹽炙肉桂石斛乾地黃酒炒木香白朮白茯苓鱉甲酥炙秦艽川巴戟柑子皮各一兩牡丹皮天仙藤甘草各半兩人參二錢枳殼三錢上銼散每服生薑九片水二盞薤白三寸煎空心溫服香甲散治熱病後虛勞或四肢倦怠腳手疼痛飲食無味肌膚黃瘦或熱瘧盜汗頭暈虛煩此藥久服駐顏甚妙鱉甲三兩醋浸去裙炙黃又入醋蘸七次當歸木香人參附子檳榔羌活川芎沉香肉豆蔻酸棗仁大腹子各半兩北柴胡一兩半厚朴川牛膝白茯苓秦艽桂心一兩半上㕮咀每服五三錢水一盞生薑三片烏梅一個煎至八分去滓溫服日三服空心忌生冷麵食雞肉鮓醬之類香甲散治婦人血氣虛勞四肢少力肌肉黃瘦多困減食遍身痠疼真邪相擊心腹撮疼木香三分乾薑三分鱉甲醋炙二兩牡丹皮赤芍藥橘紅桂心人參茯苓熟地黃秦艽柴胡白朮炒當歸附子炮去皮各一兩上為細末每服二錢水一中盞煎至七分溫服如婦人血臟臍下冷痛遍身腫滿及室女經脈不通用斑蝥半兩大黃一兩炒銼溫酒調下一錢烏雞煎丸治虛勞證烏雞一隻五加皮二兩上用酒醋各一瓶同煎爛去皮骨搗膏加黃耆鱉甲散妙香散再加烏沉湯紅曲末各二兩和膏為丸如桐子大每服五七小丸空心食前服陳年干豬皮入雞膏內地黃膏子治婦人元臟血氣衰少困倦無力或發煩熱飲食減少並宜服之熟乾地黃八兩淨蜜十兩上將熟乾地黃為細末同蜜熬成膏子丸如梧桐子大每服四五十丸溫酒下米飲亦得食前或作膏子酒化服或不飲酒者白湯化服甘草乾薑湯治男子諸虛出血胃寒不能引氣歸元無以收約其血皆因陰乘於陽心肺經寒而嘔血者甘草炙川白姜炮等分上銼散每服三錢食前煎服大聖散治五勞七傷男子女人可服川白芷藁本川椒人參白姜丹參白朮厚朴石棗卷柏茯苓柏子仁細辛桔梗當歸白芍藥川芎阿膠石膏桂心各二兩上為細末入生藕自然汁生薑自然汁蜜各一盞同煎數沸令香熟入藥調成膏用砂器貯每服一匙燈心棗湯化下寸金散治婦人虛勞百損內傷氣血風冷客邪耗散真氣臍下炙寒刺痛難忍小便淋瀝腰背拘攣陰弱盜汗頭目昏重不時寒熱崩血帶下洗臍作痛諸藥不瘥此方立效不可具陳紫蘇花胡椒韶腦破故紙蛇床子上為細末煉蜜為丸如梧桐子大每服二十丸熱酒下空心食前吃一物壓至三十丸一日三服又將此藥末一兩酸醋一大升或好酒一升同藥煎熱沸令婦人披衣於收口盆兒上坐薰陰戶迤邐淋洗盆下灰火冷再溫三五次立效暖宮丸治衝任虛損下久冷臍腹㽲痛月事不調或多不斷或及期不至或崩漏血赤白帶下或月內再行淋瀝不止帶下五色經脈將至腰腿沉重痛連臍腹小便白濁面色痿黃肢體倦怠飲食不進漸至羸弱及治子宮久寒不成胎孕生硫黃六兩禹餘糧酸醋淬手捻為度九兩赤石脂火煅紅附子炮去皮臍海螵蛸去殼各三兩上為細末以醋和丸如梧桐子大每服十五丸至二十丸空心食前溫酒下或淡醋湯亦得增損四物湯出合劑局方治婦人血氣不足四肢惰怠乏力少氣兼治下血過多榮衛虛損陰陽不和乍寒乍熱並宜服之當歸川芎人參乾薑炮甘草炙白芍藥各等分上㕮咀每服四錢水一盞煎至六分去滓熱服若産後寒熱腹中刺痛則有敗血當五積散加醋煎及大聖散服之若所下過多猶有刺痛亦宜服此二藥一方治經血凝滯腹內氣血作痛用四物湯加莪朮官桂等分名六合湯一方治下血不止及妊娠胎動加熱艾乾薑甘草阿膠黃耆等分名膠艾湯一方治血痢不止加膠艾治産後血搏口乾煩渴加栝蔞麥門冬煩熱小便澀大便祕加大黃桃仁湯脅脹加厚朴枳實虛煩不得眠加竹葉人參大渴煩躁加知母石膏一方治婦人血虛心腹㽲痛不可忍者去地黃加乾薑名四神湯大率産後不問下血多少須日進黑神散三服下血少者以大聖散間之至二臘以後腹內略無疼痛方服四物湯建中湯之類若早服之則留住敗血為後患不淺黑神大聖非逐血藥但能推陳致新多服不妨今人往往疑其逐血性寒則不然看其用藥可見矣若惡血去多徐徐補之亦不為晚不可姑息以貽後患且如古方用四順理中丸為産後進食之劑既用蜜丸又倍甘草其甜特甚豈能快脾不若只用理中湯少損甘草素有痰飲者二陳湯之類服之為佳且如妊婦惡阻古方有茯苓丸茯苓湯內有地黃竹茹川芎輩安能定嘔服之則愈見增極大抵惡阻皆由素有痰飲以致之可用二陳湯名小茯苓湯用之極妙不可不知百花膏治婦人因失血後氣弱或産後虛羸亦宜服之熟乾地黃生乾地黃川芎白茯苓馬鞭草荊芥各四兩官桂白芍藥當歸各二兩枳殼二三兩牡丹皮一兩上為粗末每服四錢水一盞半入烏梅半枚煎至一大盞去滓溫服食後服一方食前空心日四五服若此證服至旬日或半月經脈自通諸病皆去當歸沒藥丸出保命集治婦人真氣虛憊血氣衰少不能榮養致使經水不來或發寒熱飲食減少怠惰嗜臥以致虛勞當歸銼沒藥川薑炮天仙子炒黑色蒼朮炒黃芍藥川芎熟乾地黃各二兩上為細末麵糊丸如梧桐子大每服五十丸溫粥飲食前下大效內補丸出永類鈐方治受氣虛弱五勞七傷臟腑積冷痃癖症塊虛脹或經脈不痼冷赤白帶下口苦舌乾面色痿黃黑點心煩驚悸頭目旋暈不思飲食痰涕黏涎手足百節熱疼無力肌肉消瘦子息斷絶服一月當妊娠百病皆愈萆薢四兩牛膝五加子皮白朮各二兩川烏炮枳實丹參各一兩上為末蜜丸如梧桐子大溫酒下二十丸空心日午晚食前各進一服佳六神湯出御藥院方治脾氣不和榮衛不足怠惰困倦不嗜飲食服之補真養氣進美飲食充實肌膚並服當歸熟地黃白芍藥川芎黃耆地骨皮各一兩上為粗末每服五錢水一盞半煎至八分去滓空心溫服五聖丸調衛益衛滋養氣血衝任虛損月水不調臍腹㽲痛崩中漏下血瘕硬塊發渴疼痛妊娠宿冷將理失宜胎動不安血下不止及産後風寒內摶惡露不下結生瘕聚小腹堅痛時作寒熱並宜服之當歸川芎白芍熟乾地黃各一兩生乾地黃二兩上為末煉蜜和丸如梧桐子大每服三十丸溫酒或米飲湯下空心食前服詵詵丸出御藥院方治衝任不和子臟怯弱或經墮胎後氣不復當此藥常服調和衝任滋益氣血熟地黃當歸各二兩延胡索澤蘭葉各一兩川芎赤芍藥白薇人參金叉石斛牡丹皮各一兩上為細末醋煮麵糊和丸如梧桐子大每服五十丸空心溫酒下或溫米飲下亦可當歸丸治婦人血海虛損榮衛不足多至潮熱心煩口乾喜冷腹脅刺痛腰腿疼痛痰多喘嗽驚悸怔忡經候不調或閉斷不通宜服此當歸石斛去根柏子仁紫石英煅醋淬七次鹿茸鱉甲醋炙各二兩卷柏葉一兩川牛膝酒洗一兩半上和前藥末膏子為丸虛寒者加炮附子二兩咳嗽者加紫菀茸二兩滋血湯出御藥院方治婦人皮聚毛落心肺俱損血脈虛弱月水過期益氣養血進食人參白茯苓去皮川芎當歸白芍藥乾山藥黃耆熟乾地黃各一兩上為粗末用馬尾羅子羅每服五錢水一盞半煎至一盞去滓溫服滋陰丸一名滋血湯出衛生寶鑑治婦人血熱氣虛經候不通或血聚肢體麻木肌熱身重倦怠少力將成勞瘵不可妄行破血湯丸宜滋養潤利南木香沉香各半兩山藥末六兩煮糊上為細末用山藥末好酒煮糊丸如梧桐子大每服六七十丸食前米湯或溫酒下加減十寶湯出肘後方治婦人真氣虛損四肢勞倦腰膝疼痛顏色枯槁黃耆四兩熟乾地黃湯炮十次白茯苓人參當歸酒浸白朮半夏湯炮七次白芍藥五味子桂各一兩甘草半兩炙上為粗末每服二錢水一盞半姜三片烏梅一個煎至七分去滓空心食前服治血氣虛勞腰膝疼弱風刺羸瘦無顏色絶後無子以倚侍草浸酒服之逐病極疾出本草方桂香散出醫方集成治脾胃虛弱並脾血久冷草果去殼炒甘草高良薑切炒香熱白朮縮砂各一兩青皮去瓤炒黃訶子肉各半兩肉桂一分生薑切炒乾厚朴去粗皮薑汁炒棗切三味各一兩水一碗煮令乾同杵為丸焙乾上為末每服二錢入鹽少許沸湯點空心服及療腹痛又治冷瀉尤妙腹痛最難得此藥方只是溫補藥餌特工止痛理不可知禹餘糧丸出醫方集成治婦人帶下久虛胞絡傷敗月水不調漸成崩漏氣血虛弱面黃肌瘦臍腹裡急腰膝疼重肢體煩痛心忪頭眩手足寒熱不思飲食桑寄生柏葉微炒當歸去蘆微炒厚朴去粗皮薑汁炒乾薑白朮鱉甲醋浸去裙炒黃附子炮去皮臍各一兩禹餘糧燒醋淬七次細研扁豆各五錢炒上銼散每服三錢水一盞半生薑三片紅棗二枚煎溫服止瀉加黑豆止痢加粟殼蜜炒石斛丸治婦人風虛勞損羸弱短氣胸脅逆滿不欲食飲石斛一兩去根切干熟地黃一兩桂心三分桃仁三分湯浸去皮尖雙仁麩炒微黃赤茯苓一兩甘草半兩炙微黃人參三分去蘆五味子一兩紫菀三分洗土黃耆一兩切白朮一兩附子一兩去皮臍沉香一兩當歸一兩枳實三分炒微黃上為末煉蜜和搗三五百杵如梧桐子大每於食前溫酒下三十丸牡丹散治血氣勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口煩咽乾發汗減食嗜臥血熱相搏月水不調臍腹脹痛寒熱如瘧又治室女血弱陰虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸牡丹皮芍藥甘草一半鹽湯一半生用桂心沒藥另研延胡索紅花當歸烏藥陳皮蘇木鬼箭蓬朮炮各二分乾漆炒二分上為末每服二錢白水煎七分忌生冷不拘時一方用生薑煎祕方十補丸治婦人諸虛百損榮衛不調形體羸瘦面黃背痛口苦舌乾心煩多汗血衰氣盛寒熱往來一切血崩帶下墮胎落孕此藥皆治孕婦服之尤有神效肉蓯蓉二兩浸焙乾綿黃耆二兩去蘆洗淨蜜炙川芎二兩去白洗焙乾人參白茯苓白朮各二兩去蘆淨干熟地黃淨洗酒蒸焙稱重四兩當歸二兩去蘆酒浸一宿炒乾甘草半兩炙白芍藥二兩洗淨肉桂一兩去皮上為末蜜丸如梧桐子大空心晚食前溫酒下三十丸補益阿膠丸治婦人風虛勞損經血過多臟腑虛乏面色痿黃四肢羸瘦腹內時痛不欲食飲阿膠一兩搗碎炒令黃色白芍藥半兩乾薑半兩炮切卷柏半兩桂心半兩白龍骨一兩鹿茸一兩酥油炙黃人參一兩去蘆頭白茯苓一兩蒲黃半兩當歸一兩銼微炒白朮一兩厚朴一兩去粗皮薑汁拌炒石斛一兩去根銼黃耆一兩艾葉三分微炒熟乾地黃一兩芎藭半兩上為末煉蜜和搗三二百杵丸如梧桐子大每服四十丸空心及晚食前以粥飲下酒下亦得四白散治男子婦人血虛發熱夜多盜汗不進飲食四肢羸瘦骨立拘攣腳痛不能行黃耆厚朴益智仁藿香白朮白扁豆陳皮各一兩半夏白茯苓人參白豆蔻仁天台烏藥甘草各半兩京南芍藥半兩檀香沉香各一兩上為細末每服四錢水一盞姜三片棗子一個煎至七分溫服一方諸證已只腳攣痛不行以蒼朮丸服小嘉禾散治榮衛不調血氣虛弱面色痿黃四肢無力手足倦怠盜汗並出骨肉羸瘦皮肉枯瘁飲食