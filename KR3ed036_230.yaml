body:
  text: 卷二百三十虛勞門冷勞附論夫冷勞之人氣血枯竭表裡俱虛陰陽不和精氣散失則內生寒冷也皆由臟腑久虛積冷之氣傳注於內遂令宿食不消心腹積聚臍腹疼痛面色萎黃口舌生瘡大腸泄痢手足無力骨節痠疼久而不痊轉加羸瘦故曰冷勞氣也方白朮散白朮一兩白芷鱉甲去裙襴醋炙令焦蒼朮米泔浸一宿銼焙防風去蘆厚朴去粗皮生薑汁炙銼桂去粗皮人參陳橘皮去白焙乾薑炮高良薑炮各半兩吳茱萸湯浸三次焙乾柴胡去苗蜀椒去合口並目炒出汗芎藭白茯苓去黑皮白蕪荑縮砂去皮各一兩附子二枚去皮臍炮裂沉香銼丁香當歸炙銼木香各一兩上為散每服五錢用豬肝三兩批開入蔥白鹽各少許摻藥在內濕紙裹慢火煨香熟為度空心食前米飲嚼下炙肝散治冷勞羸瘦不能行心腹多痛四肢無力紫菀洗去苗土乾薑炮製銼縮砂去皮蕪荑各半兩人參去蘆頭白茯苓甘草炙微赤銼當歸木香陳橘皮湯浸去白瓤焙桂心川椒各一分去目及合口者微炒出汗厚朴去粗皮塗生薑汁炙令熟草豆蔻各半兩去皮胡椒一分桔梗去蘆頭細辛蒼朮白朮附子各半兩炮製去皮臍芎藭一分上為散每服用豬肝一具去脂膜薄切如肉片入散一兩半蔥薤白一握細切鹽末相拌令有味以竹串子穿慢火炙令熟每服空心食之飲暖酒一兩盞為妙鱉甲丸出聖惠方治冷勞羸瘦四肢無力肩背疼痛腹脅積聚氣吃食不消鱉甲一兩半塗醋炙微黃焦去裙襴熟乾地黃郁子仁湯浸去皮尖微炒陳橘皮各一兩湯浸去白焙當歸三分白朮一兩枳殼三分麩炒微黃赤茯苓牛膝去苗各一兩檳榔桂心人參去蘆頭五味子各三分柴胡去苗各一兩半訶黎勒一兩煨用皮附子一兩半炮裂皮臍木香一兩乾薑三分炮裂銼赤芍藥一兩桔梗三分去蘆頭京三稜一兩炮銼上為末煉蜜和搗三五百杵丸如梧桐子大每服食前煎薑棗湯下三十丸忌莧菜蓽澄茄散出聖惠方治冷勞臟腑虛弱心腹氣脹不能飲食四肢無力蓽澄茄一兩附子炮裂去皮臍木香京三稜炮銼白茯苓肉豆蔻去殼沉香人參去蘆頭白朮桂心丁香各半兩甘草一分炙微赤銼桃仁湯浸去皮尖雙仁炒微黃陳橘皮各半兩湯浸去白瓤焙吳茱萸一分湯浸一次焙乾微炒訶黎勒一兩半煨用皮厚朴半兩去粗皮塗生汁薑炙令黃熟鱉甲一兩塗醋炙微黃去裙上為散每服食前以粥調下二錢忌莧菜生冷豬肝丸出聖惠方治冷勞肌體羸瘦或時腹痛食飲不消日漸瘦羸豬肝一具切去脂膜用醋五升煮令盡取出研碎如膏訶黎勒一兩半煨用皮鱉甲一兩半塗醋炙令黃焦去裙襴厚朴二兩去粗皮生薑汁炙令香熟陳橘皮一分湯浸去白瓤焙川椒三分去目及合口者微炒去汗柴胡去苗一兩桂心三分蒼朮一兩木香桔梗去蘆頭烏梅肉各三分微炒甘草半兩赤銼紫菀一兩洗去苗土淨乾薑炮製銼蕪荑當歸各三分上為末入豬肝膏內和搗五七百杵丸如梧桐子大每服三十丸食前粥飲下忌莧菜炙肝散治冷勞大便不禁羸瘦高良薑炮山芋柴胡去苗縮砂去皮吳茱萸湯浸焙桂去粗皮陳橘皮去白焙白芷各一兩木香一分補骨脂炒赤芍藥洗焙厚朴去粗皮用生薑汁炙桔梗炒銼乾薑炮製當歸切焙各二兩黃耆銼芍藥各一兩上粗搗篩每服五錢水一盞半入生薑七片棗三枚擘同煎至八分去滓溫服不拘時萆薢丸出聖惠方治冷勞氣四肢羸瘦面色萎黃腹內疼痛不思飲食萆薢木香各半兩訶黎勒一兩半煨用皮肉豆蔻去殼檳榔各一兩白朮乾薑炮製銼阿魏麵裹煨以面熟為度陳橘皮各半兩湯浸去白瓤焙厚朴一兩去粗皮塗生薑汁炙令香熟人參去蘆頭桂心胡椒甘草各半兩微去銼上為末煉蜜和搗三二百杵丸如梧桐子大每服空心及晚食前以暖酒下三十丸橘皮煎丸出王氏博濟方治冷勞羸瘦手足攣急目暗耳聾腹脹泄痢不能納食食物無味面黃力弱積年傷風痼疾癖積氣塊一切勞病婦人血赤白下子宮冷五種膈冷膈熱膈氣膈思膈憂膈無力多腫此藥大能通利五臟明目去冷陳橘皮湯浸去白焙一斤桂心粗皮乾薑炮當歸銼炒四味別搗羅附子去皮臍炮裂京三稜炮製萆薢三味別搗羅神麯炒各六兩木香一兩大麥四兩烏頭炮水煮三五沸去皮臍焙蜀椒去目及合口炒出汗各一兩厚朴去粗皮生薑汁炙六味別搗為丸上用無灰酒四升於銀石器內煎上四味如人行十里更下次三味如人行十里次入下六味又添酒兩碗熬成膏取出杵一千下丸如梧桐子大每服空心日午茶酒任下二十丸至三十丸生蔥鹽豉合此藥煎時用銀器鍋如無須淨洗無滑膩鐺內除真酥次下酒及下藥慢火煎以銀匙攪候如膏傾淨盤內攤候得所衆手丸之久服補氣壯元駐顏進食桂心散治冷勞臟腑虛弱心腹脹滿四肢羸瘦困乏無力不思飲食桂去粗皮五兩柴胡去苗六兩青橘皮去白焙一兩桃仁湯浸去皮炙令微黑五兩紫菖蒲去心微炙山茱萸益智去皮知母銼焙芎藭當歸炙銼五味子各三兩豬肚一具切焙上為散每服三錢空心用陳米飲調下補骨脂散出聖惠方治冷勞羸瘦四肢無力不思飲食或時泄痢補骨脂二兩微炒訶黎勒一兩半煨用皮枳殼三分麩炒微黃炙瓤肉蓯蓉二兩湯浸一宿刮去粗皮炙令乾厚朴一兩去粗皮塗生薑汁炙令香熟鹿茸一兩去毛酒洗縮砂二兩去皮當歸半兩上為散每服食前粥飲調下二錢忌生冷油膩炙肝散出聖惠方治冷勞心腹虛脹食飲全少四肢無力大腸不調蒼朮半兩微炒芎藭青橘皮各半兩湯浸去白瓤焙白芍藥紫菀桔梗各一兩去蘆頭木香二兩肉豆蔻去皮檳榔各半兩厚朴一兩去粗皮塗生薑炙汁炙令香熟上為散每服用豬肝一具去脂膜薄切如肉片入散一兩半蔥薤白一握細切鹽末相拌令有味以竹串子穿慢火炙熟每服空心食之再加酒一兩盞為妙豬肝丸治男子婦人冷熱勞疾寒熱時作豬肝一具去皮膜切以童子小便一升煮爁柴胡去苗秦艽去苗土黃連木香蕪荑炒青蒿蜀椒去目併合口者炒出汗當歸焙各一兩上除肝外搗羅為末將豬肝於沙盆內細研入藥末以余小便和搗為丸如梧桐子大每服空心酒下三十丸加至四十丸萆薢丸治冷勞嘔噦不能一食心腹脹滿面色萎黃萆薢乾薑炮製白茯苓去黑皮胡椒炒桂去粗皮各一兩檳榔三兩煨銼人參一兩一分訶黎勒煨去核一兩半上為末煉蜜和丸如梧桐子大每服空腹清粥飲下十丸甚者加至二十丸一方有陳橘皮鱉甲丸治冷勞心腹氣痛食少羸瘦鱉甲一枚大者以鹽泥固臍殼上用前後藥木香桂各一兩訶黎勒皮附子各二兩去皮臍肉豆蔻去殼桃仁各一兩湯浸去皮尖雙仁上藥細銼用酒二升於鱉甲內煮令酒盡捻下火取出諸藥其鱉殼去泥用之並焙乾搗羅為末煉蜜和搗一二百杵丸如緑豆大每服空心及晚食前以生薑湯下十五丸忌莧菜又方附子三分炮裂去皮臍吳茱萸一分湯浸七次焙乾微炒牛膝一兩去苗硫黃半兩研細白朮三分上為末入硫黃更研令勻醋炙麵糊和丸如梧桐子大每服食前以溫酒下二十丸硫黃丸治冷勞痃癖氣硫黃二兩細研水飛過木香末川大黃末各一兩桃仁四十九粒湯浸去皮尖雙仁研如膏上先取大黃末以少熱水灑取潤於竹筒中盛炊飯甑中蒸飯熱為度後取諸藥末及桃仁膏以大黃和之如稍硬以新炊飯少許研究和丸如桐子大每服空腹以粥飲下二十丸附子湯治冷勞肌瘦盜汗少力時發寒熱不思飲食附子炮製去皮臍柴胡去苗各一兩秦艽去苗土一兩半上銼如麻豆每服二錢用豬腰子一兩切令細酒半盞水三分薤白三寸同煎令豬腰熟去滓溫服每日五更初服之漏蘆丸治冷勞泄痢及婦人産後帶下諸疾漏蘆去蘆頭一兩艾葉去梗炒四兩上為末用米醋三升入藥末一半先熬成膏後入飲藥和丸如梧桐子大每服三十丸溫米飲下食前服羊肝丸出聖惠方治冷勞久不瘥食少泄痢諸藥不效羊肝一具去脂膜切作片子白礬三兩燒令汁盡上以臘醋三升煮羊肝令爛入沙盆內研後入白礬和丸如梧桐子大每服空心及晚食前以粥飲下十丸漸加至三十丸桃仁方出聖惠方治冷勞氣不能飲食漸加羸瘦桃仁五百顆大者吳茱萸三兩上藥相和入淨鐵鐺中煮微火炒經一炊久取桃仁一顆捻去皮看似微黃色即漸加火令極熟鐺中微煙出即承熟取出於新甕瓶子盛厚著紙封瓶口勿令泄氣每日空心只取桃仁二十顆捻去皮爛嚼以溫酒下至重者服五百顆即瘥神效太一丹出聖惠方治冷勞大腸轉泄不止禹餘糧四兩火煨令末於米醋內淬如此七遍後搗研如粉烏頭一兩冷水浸一宿去皮臍上藥相和用醋煮麵糊和丸如緑豆大每服食前溫酒下五丸茆香花丸出聖惠方治冷勞久不瘥茆香花艾葉並燒為灰各一兩上藥細研以粟米飲和丸如梧桐子大初以蛇床子湯下二十丸至三十丸微吐不妨吐了卻用棗湯下立有大功金髓丹出聖惠方治冷勞及冷氣諸疾用吳茱萸三斤以新汲水淘一百遍日中曬乾以醲酒五升煮茱萸以酒盡為度以炭燒火地令赤以酒二升淋地將茱萸攤在地上以盆子合之以灰四面培之勿令泄氣一宿取出以文火炒令乾搗羅為末以醋煮棗肉和研丸如緑豆大每服空心及晚食前以生薑湯下二十丸加至三十丸治男子女人虛冷勞證大腸滑泄面色青黃吃食減少行步無力元臟虛損小便頻數肢節沉重精源不固常多困倦出護命方巴戟去心五味子牛膝石斛芎藭萆薢杜仲山茱萸各半兩吳茱萸二兩白朮藿香各三錢肉豆蔻羌活官桂茯苓人參木香各一分上為細末以好酒少許化阿魏二銖對煉蜜丸梧桐子大朝早鹽湯下四十丸治諸風勞用野獼肉釀酒服之人家養者不治病不可用急勞附論夫急勞之病其證與熱勞相似而得之差暴也蓋血氣俱盛積熱內干心肺臟腑壅滯毒熱不除而致之緣稟受不足憂思氣細營衛俱虛心肺壅熱金火相刑藏氣傳克或應外邪故煩躁體熱頰赤心忪頭痛盜汗咳嗽咽乾骨節痠疼萎黃羸瘦久則肌膚消燥咯涎唾血者皆其候也方前胡飲暴急成勞痰盛喘嗽前胡去蘆人參白茯苓去皮桂去皮柴胡去苗桔梗炒生乾地黃焙黃芩去黑心玄參旋覆花甘草炙銼各一兩麥門冬去心焙一兩半厚朴去粗皮生薑汁炙銼二兩半夏洗七次炙焙白朮各一兩半上為散每服四錢水一盞半生薑七片煎至七分溫服不拘時黃耆湯治暴急勞疾痰嗽喘滿黃耆銼炙款冬花貝母去心焙各一兩半麻黃去節柴胡去苗甘草炙銼桂去粗皮麥門冬去心焙人參生地黃焙桑白皮銼紫菀去苗土白茯苓去黑皮杏仁去皮尖雙仁焙各一兩半上為散每服五錢水一盞半生薑七片煎至八分去滓溫服食後柴胡湯治男子婦人急勞咳嗽上氣飲食減少痰涎壅滯手足痠疼唇口乾燥心虛驚悸氣乏羸瘦少力等證柴胡去苗當歸切焙麥門冬去心焙半夏洗去滑焙各一兩人參白茯苓去皮防風去皮細辛去苗葉陳皮焙厚朴去粗皮生薑炙汁甘草炙銼杏仁去皮尖雙仁炒大腹皮銼作各一兩上為散每服五錢水一盞半生薑五片煎至七分去滓溫服不拘時胡黃連散治急勞發熱羸瘦頰赤口乾心神煩躁胡黃連黃連去須龍膽各二兩桑螵蛸知母秦艽去苗土柴胡枳殼去瓤人參桔梗射干白朮各一兩上洗銼炒黃為散每服三錢以蔥薤白槐柳心烏梅肉浸童便調下或用槐柳小麥煎亦得空心日午夜臥各一犀角湯治急勞心膈煩滿骨節壯熱唇口心煩小便赤色頭痛痰嗽並熱每受風注青蒿煎丸治急勞心肺積熱鼻口焦乾飲食無味神昏欲睡心胸脹滿兩目多澀四肢無力足脛痠疼腰腳拘急青蒿生地黃薄荷各取汁一兩童