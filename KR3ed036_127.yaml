body:
  text: 卷一百二十七傷寒門辨太陽病脈證並治法上第五太陽之為病脈浮頭項強痛而惡寒經曰尺寸俱浮者太陽受病太陽主表為諸陽主氣脈浮頭項強痛而惡寒者太陽表病也太陽病發熱汗出惡風脈緩者名為中風風陽也寒陰也風則傷衛發熱汗出惡風者衛中風營病發熱無汗不惡風而惡寒衛病則發熱汗出不惡寒而惡風以衛為陽衛外者也病則不能衛固其外而皮腠躁故汗出而惡風也傷寒脈緊傷風脈緩者寒性徑急而風性解緩故也太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒經曰凡傷於寒則為病熱為寒氣客於經中陽經怫結而成熱也中風即發熱者風為陽也及傷寒云或已發熱或未發熱以寒為陰邪不能即熱鬱而方變熱也風則傷衛寒則傷營衛虛者惡風營虛者惡寒營傷寒者必惡寒也氣病者則麻血病者則痛風令氣緩寒令氣逆體痛嘔逆者營中寒也經曰脈盛身寒得之傷寒陰陽俱緊者知其傷寒也傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也太陽主表一日則太陽受邪至二日當傳陽明若脈氣微而不傳陽明胃經受邪則喜吐寒邪傳裡者則變熱如頗欲吐若煩躁脈急數者為太陽寒邪變熱傳於陽明也傷寒二三日陽明少陽證不見者為不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也太陽病發熱而渴不惡寒者為溫病發熱而渴不惡寒者陽明也此太陽受邪知為溫病非傷寒也積溫成熱所以發熱而渴不惡寒也若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期傷寒發汗已則身涼若發汗已身灼熱者非傷寒為風溫也風傷於上而陽受風氣與溫相合則傷衛脈陰陽俱浮自汗出者衛受邪也衛者氣也風則傷衛溫則傷氣身重多眠睡者衛受風溫而氣昏也鼻息必鼾語言難出者風溫外甚而氣擁不利也若被下者則傷臟氣太陽膀胱經也內經曰膀胱不利為癃不約為遺溺癃者小便不利也太陽之脈起目內眥內經曰瞳子高者太陽不足戴眼者太陽以絶小便不利直視失溲為下後竭津液損臟氣風溫外勝經曰欲絶也為難治若被火者則火助風溫成熱微者熱瘀而發黃劇者熱甚生風如驚癇而時瘛瘲也先曾被火為一逆若更以火熏之是再逆也一逆尚猶延引時日而不愈其再逆者必致危殆故云促命期病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也陽為熱也陰為寒也發熱而惡寒寒傷陽也無熱而惡寒寒傷陰也陽法火陰法水火成數七水成數六陽病七日愈者火數足也陰病六日愈者水數足也太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈傷寒自一日至六日傳三陽三陰經盡至七日當愈經曰七日太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明針足陽明為迎而奪之使經不傳則愈太陽病欲解時從巳至未上巳為正陽則陽氣得以復也始於太陽終於厥陰六經各以三時為解而太陽從巳至未陽明從申至戌少陽從寅至辰至於太陰從亥至醜少陰從子至寅厥陰從醜至卯者以陽行也速陰行也緩陽主於晝陰主於夜陽三經解時從寅至戌以陽道常饒也陰三經解時從亥至卯以陰道常乏也內經曰陽中之太陽通於夏氣則巳午未太陽乘旺也風家表解而不了了者十二日愈中風家發汗解後未全快暢者十二日大邪皆去六經悉和則愈病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也皮膚言淺骨髓言深皮膚言外骨髓言內身熱欲得衣者表熱裡寒也身寒不欲衣者表寒裡熱也太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽以候衛陰以候營陽脈浮者衛中風也陰脈弱者營氣弱也風並於衛則衛實而營虛故發熱汗自出也經曰太陽病發熱汗出者此為營弱衛強者是也嗇嗇者不足也惡寒之貌也淅淅者灑淅也惡風之貌也衛虛則惡風營虛則惡寒營弱衛強惡寒復惡風者以自汗出則皮膚緩腠理疏是亦惡風也翕翕者熇熇然而熱也若合羽所覆言熱在表也鼻鳴乾嘔者風擁而氣逆也與桂枝湯和營衛而散風邪也桂枝湯方桂枝三兩去皮味辛熱芍藥三兩味苦酸微寒甘草二兩炙味甘平生薑三兩切味辛溫大棗十二枚擘味甘溫內經曰辛甘發散為陽桂枝湯辛甘之劑也所以發散風邪內經曰風淫所勝平以辛佐以苦甘以甘緩之以酸收之是以桂枝為主芍藥甘草為佐也內經曰風淫於內以甘緩之以辛散之是以生薑大棗為使也上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小役其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物太陽病頭痛發熱汗出惡風者桂枝湯主之頭痛者太陽也發熱汗出惡風者中風也與桂枝湯解散風邪太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之𠘧𠘧者伸頸之貌也動則伸頸搖身而行項背強者動則如之項背𠘧𠘧者當無汗反汗出惡風者中風表虛也與桂枝湯以和表加麻黃葛根以祛風且麻黃主表實後葛根湯證云太陽病項背強𠘧𠘧無汗惡風葛根湯主之藥味正與此方同其無汗者當用麻黃今自汗出恐不加麻黃但加葛根也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病屬表而反下之則虛其里邪欲乘虛傳裡若氣上衝者里不受邪而氣逆上與邪爭也則邪仍在表故當復與桂枝湯解外其氣不上衝者裡虛不能與邪爭邪氣已傳裡也故不可更與桂枝湯攻表太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之太陽病三日中曾經發汗吐下溫針虛其正氣病仍不解者謂之壞病言為醫所壞病也不可復與桂枝湯審觀脈證知犯何逆而治之逆者隨所逆而救之桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也脈浮發熱汗出惡風者中風也可與桂枝湯解肌脈浮緊發熱不汗出者傷寒也可與麻黃湯常須識此勿妄治也若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也酒客內熱喜辛而惡甘桂枝湯甘酒客得之則中滿而嘔喘家作桂枝湯加厚朴杏子佳太陽病為諸陽主氣風甚氣擁則生喘也與桂枝湯以散風加厚朴杏仁以降氣凡服桂枝湯吐者其後必吐膿血也內熱者服桂枝湯則吐如酒客之類也既亡津液又為熱所搏其後必吐膿血吐膿血者謂之肺痿金匱要略曰熱在上焦為肺痿謂或從汗或從嘔吐重亡津液故得之太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之太陽病因發汗遂汗漏不止而惡風者為陽氣不足因發汗陽氣益虛而皮腠不固也內經曰膀胱者州都之官津液藏焉氣化則能出矣小便難者汗出亡津液陽氣虛弱不能施化四肢者諸陽之本也四肢微急難以屈伸者亡陽而脫液也針經曰液脫者骨屬屈伸不利與桂枝加附子湯以溫經復陽太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之脈來數時一止復來者名曰促促為陽盛則不因下後而脈促者也此下後脈促不得為陽盛也太陽病下之其脈促不結胸者此為欲解此下後脈促而復胸滿則不得為欲解由下後陽虛表邪漸入而客於胸中也與桂枝湯以散客邪通行陽氣芍藥益陰陽虛者非所宜故去之陽氣已虛若更加之微寒則必當溫劑以散之故加附子太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯傷寒八九日則邪傳再經又遍三陽欲傳三陰之時也傳經次第則三日傳遍三陽至四日陽去入陰不入陰者為欲解其傳陰經第六日傳遍三陰為傳經盡而當解其不解傳為再經者至九日又遍三陽陽不傳陰則解如瘧發作有時也寒多者為病進熱多者為病退經曰厥少熱多其病為愈寒多熱少陽氣退故為進也今雖發熱惡寒而熱多寒少為陽氣進而邪氣少也里不和者嘔而利今不嘔清便自調者里和也寒熱間日發者邪氣深也日一發者邪氣復常也日再發者邪氣淺也日二三發者邪氣微也內經曰大則邪至小則平言邪甚則脈大邪少則脈微今日數多而脈微緩者是邪氣微緩也故云欲愈脈微而惡寒者表裡俱虛也陽表也陰里也脈微為裡虛惡寒為表虛以表裡俱虛故不可更發汗更下更吐也陰陽俱虛則面色青白反有熱色者表未解也熱色為赤色也得小汗則和不得汗則不得邪氣外散皮膚而為癢也與桂枝麻黃各半湯小發其汗以除表邪太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈煩者熱也服桂枝湯後當汗出而身涼和若反煩不解者風甚而未能散也先刺風池風府以通太陽之經而泄風氣卻與桂枝湯解散則愈服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯經曰如服一劑病證猶在者故當復作本湯服之服桂枝湯汗出後脈洪大者病猶在也若形如瘧日再發者邪氣客於營衛之間也與桂枝二麻黃一湯解散營衛之邪服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之大汗出脈洪大而不渴邪氣猶在表也可更與桂枝湯若大汗出脈洪大而煩渴不解者表裡有熱不可更與桂枝湯當以白虎加人參湯生津止渴和表散熱太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯方桂枝二越婢一湯方桂枝去皮芍藥甘草各十八銖生薑一兩三錢切大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹胃為十二經之主脾治水穀為卑臟若婢內經曰脾主為胃行其津液是湯所以謂之越婢者以發越脾氣通行津液外臺方一名越脾湯即此義也上七味㕮咀以五升水煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之頭項強痛翕翕發熱雖經汗下為邪氣仍在表也心下滿微痛小便利者則欲成結胸今外證未罷無汗小便不利則心下滿微痛為停飲也與桂枝湯以解外加茯苓白朮利小便行留飲傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之脈浮自汗出小便數而惡寒者陽氣不足也心煩腳攣急者陰氣不足也陰陽血氣俱虛則不可發汗若與桂枝湯攻表則又損陽氣故為誤也得之便厥咽中干煩躁吐逆者先作甘草乾薑湯復其陽氣得厥愈足溫乃與芍藥甘草湯益其陰血則腳脛得伸陰陽雖復其有胃燥譫語少與調胃承氣湯微溏以和其胃重發汗為亡陽加燒針則損陰內經曰營氣微者加燒針則血不流行重發汗復燒針是陰陽之氣太虛四逆湯以復陰陽之氣甘草乾薑湯方甘草四兩炙味甘平乾薑二兩炮味辛熱內經曰辛甘發散為湯甘草乾薑相合以復陽氣上二味㕮咀以水三升煮取一升五合去滓分溫再服芍藥甘草湯方白芍藥四兩苦酸微寒甘草四兩炙甘平芍藥白補而赤瀉白收而赤散也酸以收之甘以緩之酸甘相合用補陰血上二味㕮咀以水三升煮取一升半去滓分溫再服之調胃承氣湯方大黃四兩去皮清酒浸甘草二兩炙味甘平芒硝半斤味鹹苦大寒內經曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩實甘草甘平助二物推陳而緩中上三味㕮咀以水三升煮取一升去滓納芒硝更上火微煮令沸少少溫服四逆湯方甘草二兩炙味甘平乾薑一兩半味辛熱附子一枚生用去皮破八片辛大熱內經曰寒淫於內治以甘熱又曰寒淫所勝平以辛熱甘草薑附相合為甘辛大熱之劑乃可發散陰陽之氣上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更與甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈陽旦桂枝湯別名也前證脈微自汗出小便數心煩微惡寒腳攣急與桂枝湯證相似是證象陽旦也與桂枝湯而增劇得寸口脈浮大浮為風邪大為血虛即於桂枝湯加附子溫經以補虛增桂令汗出以祛風其有治之逆而增厥者與甘草乾薑湯陽復而足溫更與芍藥甘草湯陰和而脛伸表邪已解陰陽已復而有陽明內結譫語煩亂少與調胃承氣湯微溏泄以和其胃則陰陽之氣皆和內外之邪悉去故知病可愈辨太陽病脈證並治法中第六太陽病項背強𠘧𠘧無汗惡風葛根湯主之太陽病項背強𠘧𠘧汗出惡風者中風表虛也項背強几几無汗惡風者中風表實也表虛宜解肌表實宜發汗是以葛根湯發之也葛根湯方葛根四兩麻黃三兩去節桂二兩去皮芍藥二兩切甘草二兩炙生薑三兩切大棗十二枚擘本草云輕可去實麻黃葛根之屬是也此以中風表實故加二物於桂枝湯中也上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌太陽與陽明合病者必自下利葛根湯主之傷寒有合病有並病本太陽病不解並於陽明者謂之並病二經俱受邪相合病者謂之合病合病者邪氣甚也太陽陽明合病者與太陽少陽合病陽明少陽合病皆言必自下利有以邪氣並於陰則陰實而陽虛邪氣並於陽則陽實而陰虛寒邪氣甚客於二陽二陽方外實而不主裡則裡氣虛故必下利與葛根湯以散經中甚邪太陽與陽明合病不下利但嘔者葛根加半夏湯主之邪氣外甚陽不主裡裡氣不和氣下而不上者但下利而不嘔裡氣上逆而不下者但嘔而不下利與葛根湯以散其邪加半夏以下逆氣葛根加半夏湯方葛根四兩麻黃三兩去節湯泡去黃汁焙乾稱生薑三兩切甘草二兩炙芍藥二兩桂枝二兩去皮大棗十二枚擘半夏半升洗上八味以水一斗先煮葛根麻黃減二升去白沫納諸藥煮取三升去滓溫服一升覆取微似汗太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之經曰不宜下而便攻之內虛熱入脅熱遂利桂枝證者邪在表也而反下之虛其腸胃為熱所乘遂利不止邪在表則見陽脈邪在裡則見陰脈下利脈微遲邪在裡也促為陽盛雖下利而脈促者知表未解也病有汗出而喘者為自汗出而喘也即邪氣外甚所致喘而汗出者為因喘而汗出也即裡熱氣逆所致與葛根黃芩黃連湯散表邪除裡熱葛根黃芩黃連湯方葛根半斤甘草二兩炙味甘平黃芩二兩味苦寒黃連三兩味苦寒內經曰甘發散為陽表未解者散以葛根甘草之甘苦以堅里氣弱者堅以黃芩黃連上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此太陽傷寒也寒則傷營頭痛身疼腰痛以至牽連骨節疼痛者太陽經營血不利也內經曰風寒客於人使人毫毛畢直皮膚閉而為熱者寒在表也風並於衛衛實而營虛者自汗出而惡風寒也寒並於營營實而衛虛者無汗而惡風也以營強衛弱故氣逆而喘與麻黃湯以發其汗麻黃湯方麻黃三兩味甘溫去節桂枝二兩去皮味辛熱甘草一兩炙味甘平杏仁七十個湯去皮尖味辛溫內經曰寒淫於內治以甘熱佐以苦辛麻黃甘草開肌發汗桂枝杏仁散寒下氣上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之陽受氣於胸中喘而胸滿者陽氣不宣發壅而逆也心下滿腹滿皆為實當下之此以為胸滿非裡實故不可下雖有陽明然與太陽合病為屬表宜與麻黃湯發汗太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯十日以去向解之時也脈浮細而嗜臥者表邪已罷也病雖已和解之若脈但浮而不細者則邪氣但在表也與麻黃湯發散之太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也大青龍湯主之此中風見寒脈也浮則為風風則傷衛緊則為寒寒則傷營營衛俱病故發熱惡寒身疼痛也風並於衛者為營弱衛強寒並於營者為營強衛弱今風寒兩傷則營衛俱實故不汗出而煩躁也與大青龍湯發汗以除營衛風寒若脈微弱汗出惡風者為營衛俱虛反服青龍湯則必亡陽故生厥逆筋惕肉瞤此治之逆也大青龍湯方麻黃六兩去節味甘溫桂枝二兩去皮味辛熱甘草二兩炙味甘平杏仁四十個去皮尖味苦甘溫生薑三兩切味辛溫大棗十二枚擘味甘溫石膏如雞子大碎味甘微寒辛甘均為發散然風宜辛散寒宜甘發汗辛甘相合乃能發散營衛之風寒麻黃甘草石膏杏仁以發散營中之寒桂枝薑棗以解除衛中之風上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉粉之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之此傷寒見風脈也傷寒者身疼此以風勝故身不疼中風者身重此以兼風故乍有輕時不久厥吐利無少陰里證者為風寒外甚也與大青龍湯以發散表中風寒傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之傷寒表不解心下有水飲則水寒相搏肺寒氣逆故乾嘔發熱而咳針經曰形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行此之謂也與小青龍湯發汗散水水氣內漬則所傳不一故有或為之證隨證增損以解化之小青龍湯方麻黃三兩去節味甘溫芍藥三兩味酸微寒乾薑三兩味辛熱甘草三兩炙味甘平五味子半升味酸溫桂枝三兩去皮味辛熱半夏半升湯洗味辛微溫細辛三兩味辛溫寒邪在表非甘辛不能散之麻黃桂枝甘草之辛甘以發散表邪水停心下而不行則腎氣燥內經曰腎苦燥急食辛以潤之乾薑細辛半夏之辛以行水氣而潤腎咳逆而喘則肺氣逆內經曰肺欲收急食酸以收之芍藥五味子之酸以收逆氣而安肺上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升加減法若微利者去麻黃加蕘花如雞子熬令赤色下利者不可攻其表汗出必脹滿麻黃髮其陽水漬入胃必作利蕘花下十二水水去利則止若渴者去半夏加栝蔞根三兩辛燥而苦潤半夏味辛而燥津液非渴者所宜故去之栝蔞味苦而生津液故加之若噎者去麻黃加附子一枚炮經曰水得寒氣冷必相搏其人即噎加附子溫散水寒病人有寒復發汗胃中冷必吐蛔去麻黃惡發汗若小便不利少腹滿去麻黃加茯苓四兩水蓄下焦不行為小便不利少腹滿麻黃髮津液於外非所宜也茯苓泄蓄水於下加所當也若喘者麻黃加杏仁半升去皮尖金匱要略曰其人形腫故不納麻黃納杏仁以麻黃髮其陽故也喘呼形腫水氣標本之疾傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之咳而微喘者水寒射肺也發熱不渴者表證未罷也與小青龍湯發表散水服湯已渴者裡氣溫水氣散為欲解也太陽病外證未解脈浮弱者當以汗解宜桂枝湯脈浮弱者營弱衛強也太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之下後大喘則為裡氣大虛邪氣傳裡正氣將脫也下後微喘則為裡氣上逆邪不能傳裡猶在表也與桂枝湯以解外加厚朴杏仁以下逆氣太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之經曰本發汗而復下之為逆也若先發汗治不為逆太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之經曰柴胡湯證具而以他藥下之柴胡湯證仍在者復與柴胡湯此雖已下之不為逆則其顯矣太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之脈浮緊無汗發熱身疼痛太陽傷寒也雖至八九日而表證仍在亦當發其汗既服溫暖發散湯藥雖未作大汗亦微除也煩者身熱也邪氣不為汗解鬱而變熱蒸於經絡發於肌表故生熱煩肝受血而能視始者氣傷營寒既變熱則血為熱搏肝氣不治故目瞑也劇者熱甚於經迫血妄行而為衄得衄則熱隨血散而解陽氣重者熱氣重也與麻黃湯以解前太陽傷寒之邪也太陽病脈浮緊發熱身無汗自衄者愈風寒在經不得汗解鬱而變熱衄則熱隨血散故云自衄者愈二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也太陽病未解轉併入陽明而太陽證未罷者名曰並病續自微汗出不惡寒者為太陽證罷陽明證具也法當下之若太陽證未罷者為表未解則不可下當小發其汗先解表也陽明之經循面色緣緣正赤者陽氣怫鬱在表也當解之熏之以取其汗若發汗不徹者不足言陽氣怫鬱止是當汗不汗陽氣不得越散邪無從出擁盛於經故躁煩也邪循經行則痛無常處或在腹中或在四肢按之不可得而短氣但責以汗出不徹更發汗則愈內經曰證過者切之澀者陽氣有餘為身熱無汗是以脈澀知陽氣擁鬱而汗出不徹脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈經曰諸脈浮數當發熱而淅灑惡寒言邪氣在表也是當汗出愈若下之身重心悸者損其津液虛其胃氣若身重心悸而尺脈實者則下后里虛邪氣乘虛傳裡也今尺脈微身重心悸者知下后里虛津液不足邪氣不傳裡但在表也然以津液不足則不可發汗須裡氣實津液足便自汗出而愈脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以營氣不足血少故也針經曰奪血者無汗尺脈遲者為營血不足故不可發汗脈浮者病在表可發汗宜麻黃湯浮為輕手得之以候皮膚之氣內經曰其在皮者汗而發之脈浮而數者可發汗宜麻黃湯浮則傷衛數則傷營營衛受邪為病在表故當汗散病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯風則傷衛寒則傷營衛受風邪而營不病者為營氣和也衛既客邪則不能與營氣和謂亦不能衛護皮腠是以常自汗出與桂枝湯解散風邪調和營衛則愈病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之臟無他病里和也衛氣不和表病也外臺云里和表病汗之則愈所謂先其時者先其發熱汗出之時發汗則愈傷寒脈浮緊不發汗因致衄者麻黃湯主之傷寒脈浮緊邪在表也當與麻黃湯發汗若不發汗則邪無從出擁甚於經迫血妄行因致衄也傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯不大便六七日頭痛有熱者故宜當下若小便清者知里無熱則不可下經曰小便數者大便必硬不更衣十日無所苦也況此不大便六七日小便清者不可責邪在裡是仍在表也與桂枝湯以解外若頭疼不已為表不罷郁甚於經迫血妄行上為衄也傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之煩者熱也發汗身涼為已解至半日許身復熱脈浮數者邪不盡也可更發汗與桂枝湯凡病若發汗若吐若下若亡津液陰陽自和者必自愈重亡津液則不能作汗必待陰陽自和乃自愈矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈因亡津液而小便不利者可以藥利之俟津液足小便利必自愈也下之後復發汗必振寒脈微細所以然者以內外俱虛故也發汗則表虛而亡陽下之則裡虛而亡血振寒者陽氣微也脈微細者陰血弱下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之下之虛其里汗之虛其表既下又汗則表裡俱虛陽至於晝陽欲復虛不勝邪正邪交爭故晝日煩躁不得眠夜陰為主陽虛不能與之爭是夜則安靜不嘔不渴者里無熱也身無大熱者表無熱也又無表證而脈沉微知陽氣大虛陰寒氣勝與乾薑附子湯退陰復陽乾薑附子湯方乾薑一兩味辛熱附子一枚生用去皮破八片味辛熱內經曰寒淫所勝平以辛熱虛寒太甚是以辛熱劑勝之也上二味以水三升煮取一升去滓頓服發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之汗後身疼痛邪氣未盡也脈沉遲營血不足也經曰其脈沉者營氣微也又曰遲者營氣不足血少故也與桂枝湯以解未盡之邪加芍藥生薑人參以益不足之血發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之發汗後喘當作桂枝加厚朴杏仁湯汗出則喘愈今汗出而喘為邪氣擁甚桂枝湯不能發散故不可更行桂枝湯汗出而喘有大熱者內熱氣甚也無大熱者表邪必甚也與麻黃杏仁甘草石膏湯以散其邪麻黃杏仁甘草石膏湯方麻黃四兩去節味甘溫杏仁五十個去皮尖味甘溫甘草二兩炙味甘平石膏半斤碎綿裹味甘寒內經曰肝苦急急食甘以緩之風氣通於肝風邪外甚故以純甘之劑發之上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升本云黃耳柸發汗過多其人叉手自冒沁心下悸欲得按者桂枝甘草湯主之發汗過多亡陽也陽氣受於胸中胸中陽氣不足故病人叉手自冒沁心下悸欲得按者與桂枝甘草湯以調不足之氣桂枝甘草湯方桂枝四兩去皮味辛熱甘草二兩炙味甘平桂枝之辛走肺而益氣甘草之甘入脾而緩中上二味以水三升煮取一升去滓頓服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之汗者心之液發汗後臍下悸者心氣虛而腎氣發動也腎之積名曰奔豚發則從少腹上至心下為腎氣逆欲上凌心今臍下悸為腎氣發動故云欲作奔豚與茯苓桂枝甘草大棗湯以降腎氣茯苓桂枝甘草大棗湯方茯苓半斤味甘平甘草二兩炙味甘平桂枝四兩去皮大棗十五枚擘味甘平茯苓以伐腎邪桂枝能泄奔豚甘草大棗之甘滋助脾土以平腎水氣煎用甘瀾水者揚之無力取不助腎氣也上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之吐後腹脹與下後腹滿皆為實言邪氣乘虛入里為實發汗後外已解也腹脹滿知非裡實由脾胃津液不足氣澀不通壅而為滿與此湯和脾胃而降氣厚朴生薑甘草半夏人參湯方厚朴半斤去皮炙味苦溫生薑半斤切味辛溫半夏半升洗味辛平人參一兩味甘溫甘草二兩炙味甘平內經曰脾欲緩急食甘以緩之用苦泄之厚朴之苦以泄腹滿人參甘草之甘以益脾胃半夏生薑之辛以散滯氣上五味以水一斗煮取三升去滓溫服一升日三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之吐下後裡虛氣上逆者心下逆滿氣上衝胸表虛陽不足起則頭眩脈浮緊為邪在表當發汗脈沉緊為邪在裡則不可發汗發汗則外動經絡損傷陽氣陽氣外虛則不能主持諸脈身為振振搖也與此湯以和經益陽茯苓桂枝白朮甘草湯方茯苓四兩味甘平桂枝三兩去皮味辛熱白朮二兩味苦甘溫甘草二兩炙味甘平陽不足者補之以甘茯苓白朮生津液而益陽也裡氣逆者散之以辛桂枝甘草行陽散氣上四味以水六升煮取三升去滓分溫三服發汗病不解反惡寒者虛故也芍藥甘草附子湯主之發汗病解則不惡寒發汗病不解表實者亦不惡寒今發汗病且不解又反惡寒者營衛俱虛也汗出則營虛惡寒則衛虛與芍藥甘草附子湯以補營衛芍藥甘草附子湯方芍藥三兩味酸微寒甘草三兩炙味甘平附子一枚炮去皮破八片味辛熱芍藥之酸收斂津液而益營附子之辛熱固陽氣而補胃甘草之甘調和辛酸而安正氣上三味以水五升煮取一升五合去滓分溫服疑非仲景意發汗若下之病仍不解煩躁者茯苓四逆湯主之發汗若下病宜解也若病仍不解則發汗外虛陽氣下之內虛陰氣陰陽俱虛邪獨不解故生煩躁與茯苓四逆湯以復陰陽之氣茯苓四逆湯方茯苓六兩味甘平人參一兩味甘溫附子一枚生用去皮破八片味辛熱甘草二兩炙味甘平乾薑一兩半味辛熱四逆湯以補陽加茯苓人參以益陰上五味以水五升煮取三升去滓溫服七合日三服發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯汗出而惡寒者表虛也汗出而不惡寒但熱者裡實也經曰汗出不惡寒者此表解里未和與調胃承氣湯和胃氣太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之發汗已解胃中干煩躁不得眠欲飲水者少少與之胃氣得潤則愈若脈浮者表未解也飲水多而小便少者謂之消渴裡熱甚實也微熱消渴者熱未成實上焦燥也與五苓散生津液和表裡五苓散方豬苓十八銖味甘平去皮澤瀉一兩六銖半味酸鹹茯苓十八銖味甘平桂半兩去皮味辛熱白朮十八銖味甘平淡者一也口入一而為甘甘甚而反淡者甘緩而淡滲豬苓白朮茯苓三味之甘潤虛燥而利津液鹹味下泄為陰澤瀉之咸以泄伏水辛甘發散為陽桂枝之辛甘以和肌表上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈發汗已脈浮數煩渴者五苓散主之發汗已脈浮數者表邪未盡也煩渴亡津液胃燥也與五苓散和表潤燥傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之傷寒汗出而渴者亡津液胃燥邪氣漸傳裡也五苓散以和表裡若汗出不渴者邪氣不傳裡但在表而表虛也與茯苓甘草湯和表合衛茯苓甘草湯方茯苓二兩味甘平桂枝二兩去皮味辛熱生薑三兩切味辛溫甘草一兩炙味甘平茯苓甘草之甘益津而和衛桂枝生薑之辛助陽氣而解表上四味以水四升煮取二升去滓分溫三服中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之中風發熱至六七日則當解若不解煩者邪在表也渴欲飲水邪傳裡也裡熱甚則能飲水水入則不吐裡熱少則不能消水停積不散飲而吐水也以其因水而吐故名水逆與五苓散和表裡散停飲未持脈時病人手叉自冒沁師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此發汗多亡陽胸中陽氣不足者病人手叉自冒沁師見外證知陽氣不足也又試令咳而不即咳者耳聾也知陽氣虛明矣耳聾者陽氣虛精氣不得上通於耳故也發汗後飲水多必喘以水灌之亦喘喘肺疾飲水多喘者飲冷傷肺也以冷水灌洗而喘者形寒傷肺也發汗後水藥不得入口為逆若更發汗必吐下不止發汗後水藥不得入口為之吐逆發汗亡陽胃中虛冷也若更發汗則愈損陽氣胃氣大虛故吐下不止發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之發汗吐下後邪熱乘虛客於胸中謂之虛煩者熱也胸中煩熱鬱悶而不得發散者是也熱氣伏於裡者則喜睡今熱氣浮於上煩擾陽氣故不得眠心惡熱熱甚則心神昏是以劇者反覆顛倒而不安心中懊憹而憒悶懊憹者俗謂鶻突是也內經曰其高者因而越之與梔子豉湯以吐胸中之邪梔子豉湯方梔子十四枚擘味苦寒香豉四合綿裹味苦寒酸苦湧泄為陰苦以湧吐寒以勝熱梔子豉湯相合吐劑宜矣上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分為二服溫進一服得吐者止後服若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之少氣者熱傷氣也加甘草以益氣嘔者熱煩而氣逆也加生薑以散氣少氣則氣為熱搏散而不收者甘以補之可也嘔則氣為熱搏逆而不散者辛以散之可也發汗若下之而煩熱胸中窒者梔子豉湯主之陽受氣於胸中發汗若下使陽氣不足邪熱客於胸中結而不散故煩熱而胸中窒塞與梔子豉湯以吐胸中之邪傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒五六日邪氣在裡之時若大下後身熱去心中空者為欲解若大下後身熱去而心結痛者結胸也身熱不去心中結痛者虛煩也結胸為熱結胸中為實是熱氣已收斂於內則外身熱去虛煩為熱客胸中未結為實散漫為煩是以身熱不去六七日為欲解之時以熱為虛煩故云未欲解也與梔子豉湯以吐除之傷寒下後心煩腹滿起臥不安者梔子厚朴湯主之下後但腹滿而不心煩即邪氣入里為裡實但心煩而不腹滿即邪氣在胸中為虛煩既煩且滿則邪氣壅於胸腹間也滿則不能坐煩則不能臥故臥起不安與梔子厚朴湯吐煩泄滿梔子厚朴湯方梔子十四枚擘味苦寒厚朴四兩姜炙味苦溫枳實四枚水浸去瓤炒味苦寒酸苦湧泄梔子之苦以湧虛煩厚朴枳實之苦以泄腹滿以上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之凡藥不能除熱但損正氣邪氣乘虛留於胸中而未入深者則身熱不去而微煩與梔子乾薑湯吐煩正氣梔子乾薑湯方梔子十四枚擘味苦寒乾薑二兩味辛熱苦以湧之梔子之苦以吐煩辛以潤之乾薑之辛以益氣上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服凡用梔子湯病人舊微溏者不可與服之病人舊微溏者裡虛而寒在下也雖煩則非蘊熱故不可與梔子湯內經曰先泄而後生他病者治其本必且調之後乃治其他病太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之發汗不解仍發熱邪氣未解也心下悸頭眩身瞤動振振欲劈地者汗出亡陽也裡虛為悸上虛為眩經虛為身瞤動振振搖與真武湯主之溫經復陽咽喉乾燥者不可發汗津液不足也淋家不可發汗發汗必便血膀胱裡熱則淋反以湯藥發汗亡耗津液增益客熱膀胱虛燥必小便血瘡家雖身疼痛不可發汗發汗則痓表虛聚熱則生瘡瘡家身疼如傷寒不可發汗發汗則表氣愈虛熱勢愈甚生風故變痓也衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠衄者上焦亡血也若發汗則上焦津液枯竭經絡乾澀故額上陷脈急緊諸脈者皆屬於目筋脈緊急則牽引其目故直視不能眴眴瞬合目也針經曰陰氣虛則目不瞑亡血為陰虛是以不得眠也亡血家不可發汗發汗則寒栗而振針經曰奪血者無汗奪汗者無血亡血發汗則陰陽俱虛故寒栗而振搖汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸闕汗者心之液汗家重發汗則心虛恍惚心亂奪汗則無水故小便已陰中疼病人有寒復發汗胃中冷必吐蛔病人有寒則當溫散反發汗損陽氣胃中冷必吐蛔也本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆病在表者汗之為宜下之為逆病在裡者下之為宜汗之為逆經曰陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯傷寒下之續得下利清穀不止身疼痛者急當救里者以裡氣不足必先救之急與四逆湯得清便自調知裡氣已和然後急與桂枝湯以救表身疼者表邪也內經曰病發而不足標而本之先治其標後治其本此以寒為本也病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯發熱頭痛表病也脈反沉者里脈也經曰表有病者脈當浮大今脈反沉遲故知愈也見表病而得里脈則當瘥若不瘥為內虛寒甚也而四逆湯救其里太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也里未和然後復下之冒者郁也下之則裡虛而亡血汗之則表虛而亡陽表裡俱虛寒氣怫鬱其人因致冒金匱要略曰亡血復汗寒多故令鬱冒汗出則怫鬱之邪得解則冒愈金匱要略曰冒家欲解必大汗出汗出表和而里不和者然後復下之太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之脈陰陽俱停無偏勝者陰陽氣和也經曰寸口關上尺中三處大小浮沉遲數同等此脈陰陽為和平雖劇當愈今陰陽既和必先振栗汗出而解但陽脈微者陽不足則陰有餘也經曰陽虛陰盛汗之則愈陰脈微者陰不足而陽有餘也經曰陽盛陰虛下之則愈太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯太陽中風風並於衛則衛實而營虛營者陰也衛者陽也發熱汗出陰弱陽強也內經曰陰虛者陽必湊之故少氣時熱而汗出與桂枝湯解散風邪調和營衛傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之病有在表者有在裡者有在表裡之間者此邪氣在表裡之間謂之半表半裡證五六日邪氣自表傳裡之時中風者或寒傷至五六日也金匱玉函曰中風五六日傷寒往來寒熱即是或中風或傷寒非是傷寒再中風中風復傷寒也經曰傷寒中風有柴胡證但見一證便是不必悉具者正是謂或中風或傷寒也邪在表則寒邪在裡則熱今邪在半表半裡之間未有定處是以寒熱往來也邪在表則心腹不滿邪在裡則心腹脹滿今只言胸脅苦滿知邪氣在表裡之間未至於心腹滿言胸脅苦滿知邪氣在表裡也默默靜也邪在表則呻吟不安邪在裡則煩悶亂內經曰陽入之陰則靜默默者邪方自表之裡在表裡之間也邪在表則能食邪在裡則不能食不欲食者邪在表裡之間未至於必不能食也邪在表則不煩不嘔邪在裡則煩滿而嘔煩喜嘔者邪在表方傳裡也邪初入里未有定處則所傳不一故有或為之證有柴胡證但見一證便是即是此或為之證小柴胡湯方柴胡半斤味苦微寒黃芩三兩味苦寒人參三兩味甘溫甘草三兩味甘平半夏半升洗味辛溫生薑三兩切味辛溫大棗十二枚擘味甘溫內經曰熱淫於內以苦發之柴胡黃芩之苦以發傳邪之熱里不足者以甘緩之人參甘草之甘以緩中和之氣邪半入里則裡氣逆辛以散之半夏以除煩嘔邪在半表則營衛爭之辛甘解之薑棗以和營衛上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服加減法若胸中煩而不吐去半夏人參加栝蔞實一枚胸中煩而不嘔熱聚而氣不逆也甘者令人中滿方熱聚無用人參之補辛散逆氣既不嘔無用半夏之辛治熱宜寒療聚宜苦栝蔞實苦寒以泄胸中蘊熱若渴者去半夏加人參合前成四兩半栝蔞根四兩半夏燥津液非渴者所宜人參甘而潤栝蔞根苦而涼徹熱生津二物為當若腹中痛者去黃芩加芍藥三兩去黃芩惡寒中加芍藥以通壅若脅下痞硬去大棗加牡蠣四兩甘令人中滿痞者去大棗之甘咸以耎之痞硬者加牡蠣之咸若心下悸小便不利者去黃芩加茯苓四兩飲而水蓄不行為悸小便不利內經曰腎欲堅急食苦以堅之則水益堅故去黃芩淡味滲泄為陽茯苓甘淡以泄伏水若不渴外有微熱者去人參加桂三兩溫覆取微汗愈不渴者里和也故去人參外有微熱表未解也加桂以發汗若咳者去人參大棗生薑加五味子半升乾薑二兩咳者氣逆也甘則壅氣故去人參大棗內經曰肺欲收急食酸以收之五味子之酸以收逆氣肺寒則咳散以辛熱故易生薑以乾薑之熱也血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之人之氣血隨時盛衰當月郭空之時則為血弱氣盡腠理開疏之時也邪氣乘虛傷人則深針經曰月郭空則海水東盛人血氣虛衛氣去形獨居肌肉減皮膚緩腠理開毛髮殘瞧理薄垢落當是時遇賊風則其入深者是矣邪因正虛自表之裡而結於脅下與正分爭作往來寒熱默默不欲飲食此為自外之內經絡與臟腑相連氣隨經必傳於裡故曰其痛下痛一作病邪在上焦為邪高邪漸傳裡為痛下裡氣與邪氣相搏逆而上行故使嘔也與小柴胡湯以解半表半裡之邪服柴胡湯已渴者屬陽明也以法治之服小柴胡湯表邪已而渴里邪傳於陽明也以陽明治之得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦得病六七日脈遲浮弱惡風寒手足溫則邪氣在半表半裡未為實反二三下之虛其胃氣損其津液邪蘊於裡故不能食而脅下滿痛胃虛為熱蒸之熏發於外面目及身悉黃也頸項強者表仍未解也小便難者內亡津液雖本柴胡湯證然以裡虛下焦氣澀而小便難若與柴胡湯又走津液後必下重也不因飲水而嘔者柴胡湯證若本因飲而嘔者水停心下也金匱要略曰先渴卻嘔者為水停心下此屬飲家飲水者水停而嘔食谷者物聚而噦皆非小柴胡湯所宜二者皆柴胡湯之戒不可不識也傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之身熱惡風頸項強者表未解也脅下滿而渴者里不和也邪在表則手足通熱邪在裡則手足厥寒今手足溫者知邪在表裡之間也與小柴胡湯以解表裡之邪傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯主之脈陽澀陰弦而腹中急痛者當作里有虛寒治之與小建中湯溫中散寒若不瘥者非裡寒也必由邪氣自表之裡裡氣不利所致與小柴胡湯去黃芩加芍藥以除傳裡之邪小建中湯方桂枝三兩去皮味辛熱甘草三兩炙味甘平大棗十二枚擘味甘溫芍藥六兩味酸微寒生薑二兩切味辛溫膠飴一升味甘溫建中者建脾也內經曰脾欲緩急食甘以緩之膠飴大棗甘草之甘以緩中也辛潤散也營衛不足潤而散之桂枝生薑之辛以行營衛酸收也泄也正氣虛弱收而行之芍藥之酸以收正氣上六味以水七升煮取三升去滓納膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裡之間也或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳但見一證便宜與柴胡湯治之不必待其證候全具也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解邪在半表半裡之間為柴胡證即未作裡實醫便以藥下之若柴胡證仍在者雖下之不為逆可復與柴胡湯以和解之得湯邪氣還表者外作蒸蒸而熱先經下里虛邪氣欲出內則振振然也正氣勝陽氣生卻復發熱汗出而解也傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪氣在表未當傳裡之時心中悸而煩是非邪氣搏所致心悸者氣虛也煩者血虛也以氣血內虛與小建中湯先建其里太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈日數過多纍經攻下而柴胡證不罷者亦須先與小柴胡湯以解其表經曰凡柴胡湯疾證而下之若柴胡證不罷者復與柴胡者是也嘔止者表裡和也若嘔不止鬱郁微煩者裡熱已甚結於胃中也與大柴胡湯下其裡熱則愈大柴胡湯方柴胡半斤味甘平黃芩三兩味苦寒芍藥三兩味酸微寒半夏半斤洗味辛溫生薑五兩切味辛溫枳實四枚炙味苦寒大棗十二枚擘甘溫大黃二兩味苦寒柴胡黃芩之苦入心而折熱枳實芍藥之酸苦湧泄而扶陰辛者散也半夏之辛以散逆氣辛甘和也薑棗之辛甘以和營衛上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方加大黃二兩若不加大黃恐不為大柴胡湯也傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之傷寒十三日再傳經盡當解之時也若不解胸脅滿而嘔者邪氣猶在表裡之間此為柴胡湯證若以柴胡湯下之則更無潮熱自利醫反以丸藥下之虛其腸胃邪熱乘虛入腑日晡所發潮熱熱已而利也潮熱雖為熱實然胸脅之邪未已故先與小柴胡湯以解外後以柴胡加芒硝以下胃熱傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之傷寒十三日再傳經盡謂之過經譫語者陽明胃熱也當以諸承氣湯下之若小便利者津液漏滲大便當硬反下利者知醫以丸藥下之也下利脈微而厥者虛寒也今脈調和則非虛寒由腸虛胃熱脅熱而利也與調胃承氣湯以下胃熱太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽膀胱經也太陽經邪熱不解隨經入腑為熱結膀胱其人如狂者為未至於狂但不寧爾經曰其人如狂者以熱在下焦太陽多熱熱在膀胱必與血相搏若血不為蓄為熱迫之則血自下血下則熱隨血出而愈若血不下者則血為熱搏蓄積於下而少腹急結乃可攻之與桃核承氣湯下熱散血內經曰從外之內而盛於內者先治其外後調其內此之謂也桃核承氣湯方桃仁五十個去皮尖味甘平桂枝二兩去皮味辛熱大黃四兩芒硝二兩甘草二兩炙甘以緩之辛以散之少腹急結緩以桃仁之甘下焦蓄血散以桂枝辛熱之氣寒以取之熱甚搏血故加二物於調胃承氣湯中也上五味以水七升煮取二升半去滓納芒硝更上火微沸下火先食溫服五合日三服當微利傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八九日邪氣已成熱而復傳陽經之時下之虛其里而熱不除胸滿而煩者陽熱客於胸中也驚者心惡熱而神不守也小便不利者裡虛津液不行也譫語者胃熱也一身盡重不可轉側者陰氣內行於里不營於表也與柴胡湯以除胸滿而煩加龍骨牡蠣鉛丹收斂神氣而鎮驚加茯苓以行津液利小便加大黃以逐胃熱止譫語加桂枝以行陽氣而解身重錯雜之邪斯悉愈矣柴胡加龍骨牡蠣湯方半夏二合洗大棗六枚柴胡四兩生薑一兩半人參一兩半龍骨一兩半鉛丹一兩半桂枝一兩半去皮茯苓一兩半大黃二兩牡蠣一兩半上十一味以水八升煮取四升納大黃切如棋子更煮一二沸去滓溫服一升傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門腹滿譫語者脾胃疾也浮而緊者肝脈也脾病見肝脈木行乘土也經曰水行乘火木行乘土名曰縱此其類矣期門者肝之募刺之以瀉肝經盛氣傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門傷寒發熱嗇嗇惡寒肺病也大渴欲飲水肝氣勝也玉函曰作大渴欲飲酢漿是知肝氣勝也傷寒欲飲水者愈若不愈而腹滿者此肝行乘肺水不得行也經曰木行乘金名橫刺期門以瀉肝之盛氣肝肺氣平水散而津液得通外作自汗出內為小便利而解也太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及不多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病二日則邪在表不當發躁而反躁者熱氣行於里也反尉其背而發汗大汗出則胃中乾燥火熱入胃胃中燥熱燥煩而譫語至十餘日振栗自下利者火邪勢微陰氣復生津液得復也故為欲解火邪去大汗出則愈若從腰以下不得汗則津液不得下通故欲小便不得熱氣上逆而反嘔也欲失溲足下惡風者氣不得通於下而虛也津液漏滲令大便硬者小便當數經曰小便數者大便必硬也此以火熱內燥津液不得下通故小便不數及不多也若火熱消津液和是結硬之便得潤因自大便也便已頭卓然而痛者先大便硬則陽氣不得下通既得大便則陽氣降下頭中陽虛故卓然而痛穀氣者陽氣也先陽氣不通於下之時足下惡風今陽氣得下故足心熱也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治風為陽邪因火熱之氣則邪風愈甚迫於血氣使血氣流溢失其常度風與火氣謂之兩陽兩陽相熏灼熱發於外必發身黃若熱搏於經絡為陽盛外熱迫血上行必衄熱搏於內者為陰虛內熱必小便難若熱消血氣血氣少為陰陽俱虛血氣虛少不能榮於身體為之枯燥三陽經絡過頸三陰至胸中而還但頭汗出劑頸而還者熱氣炎上搏陽而不搏於陰也內經曰諸脹腹大皆屬於熱腹滿微喘者熱氣內郁也內經曰火氣內發上為口乾咽爛者火熱上熏也熱氣上而不下者則大便不硬若熱氣下入胃消耗津液則大便硬故云或不大便久則胃中燥熱必發譫語內經曰病深者其聲噦火氣大甚正氣逆亂則噦內經曰四肢者諸陽之本也陽盛則四肢實火熱大甚故手足躁擾捻衣摸床擾亂也小便利者為火未劇津液未竭而猶可治也傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脈浮責邪在表醫以火劫發汗汗大出者亡其陽汗者心之液亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起臥不安與桂枝湯解未盡表邪去芍藥以芍藥益陰非亡陽所宜也火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之本草云澀可去脫龍骨牡蠣之屬是也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩切牡蠣五兩熬味酸鹹龍骨四兩味甘平大棗十二枚擘蜀漆二兩洗去腥味辛平上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈形作傷寒謂頭痛身熱也脈不弦緊則無傷寒表脈也經曰諸弱發熱則脈弱為裡熱故云弱者必渴若被火氣兩熱相合傳於胃中胃中燥煩必發譫語脈弱發熱者得脈浮為邪氣還表當汗出而解矣太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪此火邪迫血而血下行者也太陽病用火熏之不得汗則熱無從出陰虛被火必發躁也六日傳經盡至七日再到太陽經則熱氣當解若不解熱氣迫血下行必清血清廁也脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血此火邪迫血而血上行者也脈浮熱甚為表實醫以脈浮為虛用火灸之因火氣動血迫血上行故咽燥唾血微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也微數之脈則為熱也灸則除寒不能散熱是慎不可灸也若反灸之熱因火則甚遂為煩逆灸本以追虛而復逐熱為實熱則傷血又加火氣使血散脈中氣主煦之血主濡之血氣消散不能濡潤筋骨致骨焦筋傷血散而難復也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮在表宜以汗解之醫以火灸取汗而不得汗邪無從出又加火氣相助則熱愈甚身半以上同天之陽身半以下同地之陰火性炎上則腰以下陰氣獨治故從腰以下必重而痹也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也煩熱也邪氣還表則為煩熱汗出而解以脈浮故為邪還表也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩燒針發汗則損陰血而驚動心氣針處被寒氣聚而成核心氣因驚而虛腎氣乘寒氣而動發為奔豚金匱要略曰病有奔豚從驚發得之腎氣欲上乘心故其氣從少腹上衝心也先灸核上以散其寒與桂枝加桂湯以泄奔豚之氣火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之先火為逆復以下除之裡氣因虛又加燒針裡虛而為火熱所煩故生煩躁與桂枝甘草龍骨牡蠣湯以散火邪桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩牡蠣二兩熬龍骨二兩辛甘發散桂枝甘草之辛甘也以發散經中火邪澀可去脫龍骨牡蠣之澀以收斂浮越之正氣上為末以水五升煮取二升半去滓溫服八合日三服太陽傷寒者加溫針必驚也寒則傷營營氣微者加燒針則血留不行驚者溫針損營血而動心氣金匱要略曰血氣少者屬於心太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆惡寒發熱為太陽表病自汗出不惡寒發熱者陽明證本太陽表病醫反吐之傷動胃氣表邪乘虛傳於陽明也以關脈細數知醫吐之所致病一二日為表邪尚寒而未成熱吐之則表寒傳於胃中胃中虛寒故腹中飢而口不能食病三四日則表邪已傳成熱吐之則表熱乘虛入胃胃中虛熱故不喜糜粥欲食冷食朝食暮吐也朝食暮吐者晨食入胃胃虛不能克化即知至暮胃氣行里與邪氣相搏則胃氣反逆而以胃氣尚在故止云小逆太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也太陽表病醫反吐之傷於胃氣邪熱乘虛入胃胃為邪熱內煩故不惡寒不欲近衣也病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也陽受氣於胸中發汗外虛陽氣是令陽氣微膈氣虛也數為熱本熱則合消穀客熱則不能消穀因發汗外損陽氣致胃中虛冷故吐也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也心下溫溫欲吐鬱郁微煩胸中痛當責邪熱客於胸中大便反溏腹微滿則邪熱已下於胃也日數雖多若不經吐下止是傳邪亦未可下當與柴胡湯以除上中二焦之邪若曾吐下傷損胃氣胃虛則邪乘虛入胃為實非柴胡湯所能去與調胃承氣湯下胃熱以嘔知胃氣先曾傷動也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之太陽經也膀胱腑也此太陽隨經入腑者也六七日邪氣傳裡之時脈微而沉邪氣在裡之脈也表證仍在者則邪氣猶殘當結於胸中若不結於胸中其人發狂者熱結在膀胱也經曰熱結膀胱其人如狂此發狂則熱又深也少腹硬滿小便不利者為無血也小便自利者血證諦也與抵當湯以下蓄血抵當湯方水蛭三十個熬味鹹苦寒虻蟲三十個熬去翅足味苦微寒桃仁二十個去皮尖味苦甘平大黃三兩酒浸味苦寒若走血咸勝血虻蟲水蛭之鹹苦以除蓄血甘緩結苦泄熱桃仁大黃之苦以下結熱上四味為末以水五升煮取三升去滓溫服一升不下再服太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂血證諦也抵當湯主之身黃脈沉結少腹硬小便不利者胃熱發黃也可與茵陳湯身黃脈沉結少腹硬小便自利其人如狂者非胃中瘀熱為熱結下焦而為蓄血也與抵當湯以下蓄血傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸傷寒有熱少腹滿是蓄血於下焦若熱蓄津液不通則小便不利其熱不蓄津液而蓄血不行小便自利者乃為蓄血當與桃仁承氣湯抵當湯下之然此無身黃屎黑又無喜忘發狂是未至於甚故不可余快峻之藥也可與抵當丸小可下之也抵當丸方水蛭二十個味鹹苦寒虻蟲二十五個味苦微寒桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服太陽病小便利者以飲水多必心下悸小便少者必苦裡急也飲水多而小便自利者則水不內蓄但腹中水多令心下悸金匱要略曰食少飲多水停心下甚者則悸飲水多而小便不利則水蓄於內而不行必苦裡急也辨太陽脈證並治法下第七問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治結胸者邪結在胸臟結者邪結在臟二者皆下後邪氣乘虛入里所致下後邪氣入里與陽相結者為結胸以陽受氣於胸中故爾與陰相結者為臟結以陰受之則入五臟故爾與宜通而塞故痛邪結陽分則陰氣不得上通邪結陰分則陽氣不得下通是二者皆心下硬痛寸脈浮關脈沉知邪結在陽也寸脈浮關脈小細沉緊知邪結在陰也陰結而陽不結雖心下結痛飲食亦自如故陰氣乘腸虛而下故時時自下利陰得陽則解臟結得熱證多則易治舌上白苔滑者其胸中亦寒故難治臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也臟結於法當下無陽證為表無熱不往來寒熱為半表半裡無熱其人反靜為里無熱經曰舌上如苔者以丹田有熱胸中有寒邪氣以表裡皆寒故不可攻病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也發熱惡寒者發於陽也而反下之則表中陽邪入里結於胸中為結胸無熱惡寒者發於陰也而反下之表中之陰入里結於心下為痞結胸者項亦強如柔痓狀下之則和宜大陷胸丸方結胸病項強者為邪結胸中胸膈結滿心下緊實但能仰而不能俯是項強亦如柔痓之狀也與大陷胸丸下結泄滿大陷胸丸方大黃半斤味苦寒葶藶半升熬味苦寒芒硝半斤味鹹寒杏仁半升去皮尖熬黑味苦甘溫大黃芒硝之苦鹹所以下熱葶藶杏仁之苦甘所以泄滿甘遂取其直達白蜜取其潤利皆以下泄滿實物也上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其脈浮大者不可下下之則死結胸為邪結胸中屬上焦之分得寸脈浮關脈沉者為在裡則可下若脈浮大心下雖結是在表者猶多未全結也下之重虛邪氣復結則難可制故云下之則死結胸證悉具煩躁者亦死結胸證悉具邪結已深也煩躁者正氣散亂也邪氣勝正病者必死太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃也動數皆陽脈也當責邪在表睡而汗出者謂之盜汗為邪氣在半表半裡則不惡寒此頭痛發熱微盜汗出反惡寒者表未解也當發其汗醫反下之虛其胃氣表邪乘虛則陷邪在表則見陽脈邪在裡則見陰脈邪氣內陷動數之脈所以變遲而浮脈獨不變者以邪結胸中上焦陽結脈不得而沉也客氣者外邪乘胃中空虛入里結於胸膈膈中拒痛者客氣動膈也金匱要略曰短氣不足以息者實也短氣躁煩心中懊憹皆邪熱為實陽氣內陷氣不得通於膈壅於心下為硬滿而痛成結胸也與大陷胸湯以下結熱若胃中空虛陽氣內陷不結於胸膈下入於胃中者遍身汗出則為熱越不能發黃若但頭汗出身無汗劑頸而還小便不利者熱不得越必發黃也大陷胸湯大黃六兩去皮苦寒芒硝一升味鹹寒甘遂六錢匕苦寒大黃謂之將軍以苦蕩滌芒硝一名硝石以其咸能耎硬夫間有遂以通水也甘遂若夫間之遂其氣可以直達透結陷胸三物為允上三味以水六升先煮大黃取二升去滓納芒硝煮一兩沸納甘遂末溫服一升得快利止後服傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之病在表而下之熱入因作結胸此不云下後而云傷寒六七日則是傳裡之實熱也沉為在裡緊為裡實以心下痛按之石硬是以為結胸與大陷胸湯以下結熱傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒十餘日熱結在裡是可下之證復往來寒熱為正邪分爭未全斂結與大柴胡湯下之但結胸無大熱者非熱結也是水飲結於胸脅謂之水結胸周身汗出者是水飲外散則愈若但頭微汗出余處無汗是水飲不得外泄停畜而不行也與大陷胸湯以逐其水太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之重發汗而復下之則內外重亡津液而邪熱內結致不大便五六日舌上燥而渴也日晡潮熱者屬胃此日晡小有潮熱非但在胃從心下至少腹硬滿而痛不可近者是一腹之中上下邪氣俱甚也與大陷胸湯以下其邪小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之心下硬痛手不可近者結胸也正在心下按之則痛是熱氣猶淺謂之小結胸結胸脈沉緊或寸浮關沉今脈浮滑知熱未深結與小陷胸湯以除胸膈上結熱小陷胸湯黃連一兩苦寒半夏半升洗辛溫栝蔞實大者一個苦寒苦以泄之辛以散之黃連栝蔞實苦寒以泄熱半夏之辛以散結上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也太陽病二三日邪在表也不能臥但欲起心下必結者以心下結滿臥則氣壅而愈甚故不能臥而但欲起也心下結滿有水分有寒分有氣分今脈微弱知本有寒分醫見心下結而反下之則太陽表邪乘虛入里利止則邪氣留結為結胸利不止至次日復如前下利不止者是邪熱下攻腸胃為挾熱利也太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血此太陽病下之後邪氣傳變其脈促者為陽盛下後脈促為陽勝陰也故不作結胸為欲解下後脈浮為上焦陽邪結而為結胸也經曰結胸者寸脈浮關脈沉下後脈緊則太陽之邪傳於少陰經曰脈緊者屬少陰內經曰邪客於少陰之絡令人嗌痛不可納食所以脈緊者必咽痛脈弦則太陽之邪傳於少陽經曰尺寸俱弦者少陽受病也其脈循脅絡於耳所以脈弦者必兩脅拘急下後邪氣傳裡則頭痛未止脈細數為邪未傳裡而傷氣也細為氣少數為在表故頭痛未止脈沉緊則太陽之邪傳於陽明為裡實也沉為在裡緊為裡實陽明裡實故必欲嘔脈滑則太陽之邪傳於腸胃以滑為陰氣有餘知邪氣入里干於下焦也沉為血勝氣虛是為協熱利浮為氣勝血虛是知必下血經曰不宜下而便攻之諸藥不可勝數此之謂也病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服病在陽為邪在表也法當汗出而解反以冷水潠之灌洗熱被寒水外不得出則反攻其里彌更益煩肉上粟起者水寒之氣客於皮膚也意欲飲水者里有熱也反不渴者寒在表也與文蛤散以散表中水寒之氣若不瘥是水熱相搏欲傳於裡與五苓散發汗以和之始熱在表因水寒制之不得外泄內攻於裡結於胸膈心下硬痛本以水寒伏熱為實故謂之寒實結胸無熱證者外無熱而熱悉收斂於裡也與小陷胸湯以下逐之白散下熱故亦可攻文蛤散文蛤五兩味鹹寒咸走腎則可以勝水氣上一味為散以沸湯和一錢匕服湯用五合白散方桔梗三分味辛苦微溫巴豆一分去皮心熬黑研如脂辛溫貝母三分味辛苦平辛散而苦泄桔梗貝母之苦辛用以下氣巴豆之辛用以散實上件三味為末納巴豆更於臼中杵之以白飲和服強人半錢羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水以潠之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門太陽之脈絡頭下項頭項強痛者太陽表病也少陽之脈循胸絡脅如結胸心下痞硬者少陽里病也太陽少陽相併為病不純在表故頭項不但強痛而或眩冒亦未全入里故時如結胸心下痞硬此邪在半表半裡之間也則大椎第一間肺俞以瀉太陽之邪刺肝俞以瀉少陽之邪邪在表則可發汗邪在半表半裡則不可發汗發汗則亡津液損動胃氣少陽之邪因干於胃土為木刑必發譫語脈弦至五六日傳經盡邪熱去而譫語當止若復不止為少陽邪熱甚也刺期門以瀉肝膽之氣婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之中風發熱惡寒表病也若經水不來表邪傳裡則入腑而不入血室也因經水適來血室空虛至七八日邪氣傳裡之時更不入腑乘虛而入於血室熱除脈遲身涼者邪氣內陷而表證罷也胸脅下滿如結胸狀譫語者熱入血室而裡實期門者肝之募肝主血刺期門者瀉血室之熱審看何經氣實更隨其實而瀉之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之中風七八日邪氣傳裡之時本無寒熱而續得寒熱經水適斷者此為表邪乘血室虛入血室與血相搏而血結不行經水所以斷也血氣與邪分爭致寒熱如瘧而發作有時與小柴胡湯以解傳經之邪婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈傷寒發熱者寒已成熱也經水適來則血室虛空邪熱乘虛入於血室若晝日譫語為邪客於腑與陽爭也此晝日明瞭暮則譫語如見鬼狀是邪不入腑入於血室與陰爭也陽盛譫語則宜下此熱入血室不可與下藥犯其胃氣熱入血室血結寒熱者與小柴胡湯散邪發汗此雖熱入血室胸脅滿如結胸狀者可刺期門此雖熱入血室而無滿結不可刺期門犯其中焦必自愈者以經行則熱隨血去血下也已則邪熱悉除而愈矣所為發汗為犯上焦者發汗則動衛氣衛氣出上焦故也刺期門為犯中焦者刺期門則動營氣營氣出中焦故也脈經曰無犯胃氣及上二焦必自愈豈謂藥不謂針耶傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之傷寒六七日邪當傳裡之時支散也嘔而心下結者里證也法當攻裡發熱微惡寒支節煩疼為外證未去不可攻裡與柴胡桂枝湯以和解之傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之傷寒五六日已經汗下之後則邪當解今胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者即邪氣猶在半表半裡之間為未解也胸脅滿微結寒熱心煩者邪在半表半裡之間也小便不利而渴者汗下後亡津液內燥也若熱消津液令小便不利而渴者其人必嘔今渴而不嘔知非裡熱也傷寒汗出則和今但頭汗出而余處無汗者津液不足而陽虛於上也與柴胡桂枝幹薑湯以解表裡之邪復津液而助陽也柴胡桂枝幹薑湯柴胡半斤苦平桂枝三兩去皮味辛熱乾薑二兩辛熱栝蔞根四兩苦寒黃芩三兩苦寒牡蠣二兩熬鹹寒甘草二兩炙味甘平內經曰熱淫於內以苦發之柴胡黃芩之苦以解傳裡之邪辛甘發散為陽桂枝甘草之辛甘以散在表之邪咸以耎之牡蠣之咸以消胸脅之滿辛以潤之乾薑之辛以固陽虛之汗津液不足而為渴苦以堅之栝蔞之苦以生津液上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解傷寒五六日邪當傳裡之時頭汗出微惡寒者表仍未解也手足冷心下滿口不欲食大便硬脈細者邪結於裡也大便硬為陽結此邪熱雖傳於裡然以外帶表邪則熱結猶淺故曰陽微結脈沉雖為在裡若純陰結則更無頭汗惡寒之表證諸陰脈皆至頸胸中而還不上循頭今頭汗出知非少陰也與小柴胡湯以除半表半裡之邪服湯已外證罷而不了了者為裡熱未除與湯取其微利則愈故云得屎而解傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯傷寒五六日邪在半表半裡之時嘔而發熱邪在半表半裡之證是為柴胡證具以他藥下之柴胡證不罷者不為逆卻與柴胡湯則愈若下後邪氣傳裡者邪在半表半裡則陰陽俱有邪至於下後邪氣傳裡亦有陰陽之異若下後陽邪傳裡者則結於胸中為結胸以胸中為陽受氣之分與大陷胸湯以下其結陰邪傳裡者則留於心下為痞以心下為陰受氣之分與半夏瀉心湯以通其痞經曰病發於陽而反下之熱入因作結胸病發於陰而反下之因此作痞此之謂也半夏瀉心湯半夏半升洗辛溫黃芩苦寒乾薑辛熱人參以上各三兩甘溫黃連一兩苦寒大棗十二枚擘甘溫甘草三兩炙甘平辛入肺而散氣半夏之辛以散結氣苦入心而泄熱黃芩黃連之苦以泄痞熱脾欲緩急食甘以緩之人參甘草大棗之甘以緩之上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩太陽少陽並病為邪氣在半表半裡也而反下之二經之邪乘虛而入太陽表邪入里結於胸中為結胸心下硬少陽里邪乘虛下於腸胃遂利不止若邪結陰分則飲食如故而為臟結此為陽邪內結故水漿不下而心煩脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳浮而緊浮為傷陽緊為傷陰當發其汗而反下之若浮入里為陽邪入里則作結胸浮不入里而緊入里者陰邪入里則作痞太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之下利嘔逆里受邪也邪在裡可下亦須待表解者乃可攻之其人漐漐汗出發作有時不惡寒者表已解也頭痛心下痞硬滿引脅下痛乾嘔短氣者邪熱內蓄而有伏飲是里未和也與十棗湯下熱逐飲十棗湯芫花熬味辛苦甘遂苦寒大戟苦寒大棗十枚擘甘溫辛以散之芫花之辛以散飲苦以泄之甘遂大戟之苦以泄水水者腎所主也甘者脾之味也大棗之甘者益土而勝水上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後米粥自養太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈太陽病因發汗遂發熱惡寒者外虛陽氣邪復不除也因復下之又虛其里表中虛邪內陷傳於心下為痞發汗表虛為竭陽下之裡虛為竭陰表證罷為無陽里有痞為陰獨又加燒針虛不勝火火氣內攻致胸煩也傷寒之病以陽為主其人面色青膚肉瞤動者陽氣大虛故云難治若面色微黃手足溫者即陽氣得復故云易愈心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之心下硬按之痛脈關沉者實熱也心下痞按之濡其脈關上浮者虛熱也大黃黃連湯以導其虛熱大黃黃連瀉心湯大黃二兩味苦寒黃連一兩味苦寒內經曰火熱受邪心病生焉苦入心寒除熱大黃黃連之苦寒以導瀉心下之虛熱但以麻沸湯漬服者取其氣薄而泄虛熱上二味以麻沸湯二升漬之須臾絞去滓分溫再服心下痞而復惡寒汗出者附子瀉心湯主之心下痞者虛熱內伏也惡寒汗出者陽氣外虛也與瀉心湯攻痞加附子以固陽本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之本因下後成痞當與瀉心湯除之若服之痞不解其人渴而口躁煩小便不利者為水飲內蓄津液不行非熱痞也與五苓散發汗散水則愈一方忍之一日乃愈者不飲者外水不入所停之水得行而痞亦愈也傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之胃為津液之主陽氣之根大汗出後外亡津液胃中空虛客氣上逆心下痞硬金匱要略曰中焦氣未和不能消穀故令噫乾噫食臭者胃虛而不殺穀也脅下有水氣腹中雷鳴土弱不能勝水也與瀉心湯以攻痞加生薑以益胃傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒中風是傷寒或中風也邪氣在表醫反下之虛其腸胃而氣內陷也下利日數十行穀不化腹中雷鳴者下后里虛胃弱也心下痞硬乾嘔心煩不得安者胃中空虛客氣上逆也與瀉心湯以攻表加甘草以補虛前以汗後胃虛是外傷陽氣故加生薑此以下後胃虛是內損陰氣故加甘草傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便傷寒服湯藥下後利不止而心下痞硬者氣虛而客氣上逆也與瀉心湯攻之則痞已醫復以他藥下之又虛其里致利不止也理中丸脾胃虛寒下利者服之愈此以下焦虛故與之其利益甚聖濟經曰滑則氣脫欲其收也如開腸洞泄便溺遺失澀劑所以收之此利由下焦不約與赤石脂禹餘糧湯以澀洞泄下焦主分清濁下利者水穀不分也若服澀劑而利不止當利小便以分其氣赤石脂禹餘糧湯方赤石脂一斤碎味甘溫禹餘糧一斤碎味甘平本草云澀可去脫石脂之澀以收斂之重可去怯餘糧之重以鎮固以上二味以水六升煮取二升去滓三服傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕久而成痿傷寒吐下後發汗則表裡之氣俱虛虛煩脈甚微為正氣內虛邪氣獨在至七八日正氣當復邪氣當罷而心下痞脅下痛氣上衝咽喉眩冒者正氣內虛而不復邪氣留結而不去經脈動惕者經絡之氣虛極久則熱氣還經必成痿弱傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之大邪雖解以曾發汗吐下胃氣弱而未和虛氣上逆故心下痞硬噫氣不除與旋覆代赭石湯降虛氣而和胃旋覆代赭石湯方旋覆花三兩味鹹溫人參二兩味甘溫生薑五兩切味辛溫代赭石一兩味苦寒大棗十二枚擘甘溫甘草三兩炙味甘平半夏半升洗味辛溫硬則氣堅鹹味可以耎之旋覆之咸以耎痞硬怯則氣浮重劑所以鎮之代赭之重以鎮虛逆辛者散也生薑半夏之辛以散虛痞甘者緩也人參甘草大棗之甘以補胃弱上件七味以水一斗煮取六升去滓再煎取三升溫服一升日三服下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏子甘草石膏湯前第三卷草六證云發汗後不可更行桂枝湯汗出而喘無大熱者為與此證治法同汗下雖殊既不當損正氣則一邪氣所傳既同遂用一法治之經所謂若發汗若下若吐後者是矣太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之外證未除而數下之為重虛其里邪熱乘虛而入裡虛協熱遂利不止而心下痞若表解而下利心下痞者可與瀉心湯若不下利表不解而心下痞者可先解表而後攻痞以表裡不解故與桂枝人參湯和里解表桂枝人參湯方桂枝四兩去皮味辛熱甘草四兩炙味甘平白朮三兩味甘平乾薑三兩味辛熱人參三兩味甘溫表未解者辛以散之里不足者甘以緩之此以裡氣大虛表裡不解故加桂枝甘草於理中湯也上五味以水九升先煮四味取五升納桂更煮取三升溫服一升日再夜一服傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯大下後復發汗則表裡之邪當悉已此心下痞而惡寒者表裡之邪俱不解也因表不解而下之為心下痞先與桂枝湯解表表解乃與大黃黃連瀉心湯攻痞內經曰從外之內而盛於內者先治其外而後調其內傷寒發熱汗出不解心中痞硬嘔吐而下利者大柴胡湯主之傷寒發熱寒已成熱也汗出不解表和而里病也吐利心腹濡耎為裡虛嘔吐而下利心下痞硬者是裡實也與大柴胡湯以下里熱病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散病如桂枝證為發熱汗出惡風言邪在表也頭痛項強為桂枝湯證具若頭不痛項不強則邪不在表而傳裡也浮為在表沉為在裡今寸脈微浮則邪不在表亦不在裡而在胸中也胸中與表相應故知邪在胸中者猶如桂枝證而寸脈微浮也以胸中痞硬上衝咽喉不得息知寒邪客於胸中而不在表也千金曰浮上部填塞胸心胸中滿者吐之則愈與瓜蒂散以吐胸中之邪瓜蒂散方瓜蒂一分熬黃味苦寒赤小豆一分味酸溫其高者越之越以瓜蒂香豉之苦在上者湧之以赤小豆之酸內經曰酸苦湧泄為陰上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散病脅下素有痞連在臍傍痛引少腹入陰筋者此名臟結死素有宿昔之積結於脅下為痞今因傷寒邪氣入里與宿積相助使臟真之氣結而不通致連在臍傍痛引少腹入陰筋者死傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之若吐若下後七八日則當解復不解而熱結在裡表熱者身熱也裡熱者內熱也本因吐下後邪氣乘虛內陷為結熱若無表熱而純為裡熱則邪熱結而為實此以表熱未罷時時惡風若邪氣純在表則惡風無時若邪氣純在裡則更不惡風以時時惡風知表裡俱有熱也邪熱結而為實者則無大渴邪熱散漫則渴今雖熱結在裡表裡俱熱未為結實邪氣散漫熏蒸焦膈故大渴舌上乾燥而煩欲飲水數升與白虎加人參湯散熱生津傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之無大熱者為身無大熱也口燥渴心煩者當作陽明病然以背微惡寒為表未全罷所以屬太陽也背為陽背惡寒口中和者少陰病也當與附子湯今口燥而渴背雖惡寒此里也則惡寒亦不至甚故云微惡寒與白虎湯解表散熱加人參止渴生津傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之傷寒脈浮發熱無汗其表不解不渴者宜麻黃湯渴者宜五苓散非白虎湯所宜大渴欲水無表證者乃可與白虎加人參湯以散裡熱臨病之工大宜精別太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞慎勿下之心下痞硬而眩者少陽也頸項強者太陽也刺大椎肺俞以瀉太陽之邪以太陽脈下項俠脊故耳肝俞以瀉少陽之邪以膽為肝之腑故耳太陽為在表少陽為在裡即是半表半裡證前第八證云不可發汗發汗則譫語是發汗攻太陽之邪少陽之邪益甚干胃必發譫語此云慎勿下之攻少陽之邪太陽之邪乘虛入里必作結胸經曰太陽少陽並病而反下之成結胸太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之太陽陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利為在裡可與承氣湯下之此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯以和解半表半裡之邪嘔者胃氣逆也故加半夏生薑以散逆氣黃芩湯方黃芩三兩味苦寒甘草二兩炙味甘平芍藥二兩味酸平大棗二十枚擘味甘溫虛而不實者苦以堅之酸以收之黃芩芍藥之苦酸以堅斂腸胃之氣弱而不足者甘以補之甘草大棗之甘以補固腸胃之弱上四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之濕家下後舌上如苔者以丹田有熱胸上有寒是邪氣入里而為下熱上寒也此傷寒邪氣傳裡而為下寒上熱也胃中有邪氣使陰陽不交陰不得升而獨治於下為下寒腹中痛陽不得降而獨治於上為胸中熱欲嘔吐與黃連湯升降陰陽之氣黃連湯方黃連味苦寒甘草炙味甘平乾薑味辛熱桂枝去皮味辛熱各三兩人參二兩味甘溫半夏半升洗味辛溫大棗十二枚擘味甘溫上熱者泄之以苦黃連之苦以降陽下寒者散之以辛桂薑半夏之辛以升陰脾欲緩急食甘以緩之人參甘草大棗之甘以益胃上七味以水一斗煮取六升去滓溫服一升日三服夜二服傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之傷寒與中風家至七八日再經之時則邪氣多在裡身必不苦疼痛今日數多復身體疼煩不能自轉側者風濕相搏也煩者風也身疼不能自轉側者濕也經曰風則浮虛脈經曰脈來澀者為病寒濕也不嘔不渴里無邪也脈得浮虛而澀身有疼煩知風濕但在經也與桂枝附子湯以散表中風濕若其人大便硬小便自利者去桂枝加白朮湯主之桂發汗走津液此小便利大便硬為津液不足去桂加朮桂枝附子湯方桂枝四兩去皮味辛熱附子三枚炮去皮破八片辛熱生薑三兩切辛溫甘草二兩炙味甘溫大棗十二枚擘味甘溫風在表者散以桂枝甘草之辛甘濕在經者逐以附子之辛熱薑棗辛甘行營衛通津液以和表也上五味以水六升煮取二升去滓分溫三服風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之風則傷衛濕流關節風濕相搏兩邪亂經故骨節疼煩掣痛不得屈伸近之則痛劇也風勝則衛氣不固汗出短氣惡風不欲去衣為風在表濕勝則水氣不行小便不利或身微腫為濕外薄也與甘草附子湯散濕固衛氣甘草附子湯方甘草二兩炙味甘平附子二枚炮去皮破味辛熱白朮二兩味甘溫桂枝四兩去皮味辛熱桂枝甘草之辛甘發散風邪而和衛附子白朮之辛甘解濕氣而溫經上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為妙傷寒脈浮滑此表有熱里有寒白虎湯主之浮為在表滑為在裡表有熱外有熱也里有寒有邪氣傳裡也以邪未入腑故止言寒如瓜蒂散證云胸上有寒者是矣與白虎湯以解內外之邪白虎湯方知母六兩味苦寒石膏一斤碎味辛寒甘草二兩味甘平粳米六合味甘平內經曰熱淫所勝佐以苦甘知母石膏之苦甘以散熱熱則傷氣甘以緩之甘草粳米之甘以益氣上四味以水一斗煮米熟湯成去滓溫服一升日三服傷寒脈結代心動悸炙甘草湯主之結代之脈動而中止能自還者名曰結不能自還者名曰代由血氣虛衰不能相續也心中悸動知真氣內虛也與炙甘草湯益虛補血氣而復脈炙甘草湯方甘草四兩炙味甘平生薑三兩切味辛溫桂枝三兩去皮味辛熱人參二兩味甘溫生地黃一斤味甘寒阿膠二兩味甘溫麥門冬半升去心味甘平麻子仁半升味甘平大棗十二枚擘味甘溫補可以去弱人參甘草大棗之甘以補不足之氣桂枝生薑之辛以益正氣聖濟經曰津耗散為枯五臟痿弱營衛涸流濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心也上九味以清酒七升水八升先煮八味取三升去滓納膠煬消盡溫服一升日三服一名復脈湯脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治結代之脈一為邪氣留結一為真氣虛衰脈來動而中止若能自還更來小數止是邪氣留結名曰結陰若動而中止不能自還因其呼吸陰陽相引復動者是真氣衰極名曰代陰為難治之脈經曰脈結者生代者死此之謂也釋音
