宜食冷淡糠酢百沸紫面及水摸餅即無妨冷韭羹大補時時宜食之又服石人雖可飲酒而不宜多飲酒多則失食味失食味則不能食不能食則令人虛熱虛熱則令石數發惡寒況又損石力謂酒能壓石令人風虛腰腳弱若能飲又能食大佳服石忌慎方出聖濟總録凡服石飲食切忌熱面白酒陳臭酢漿雞犬羖羊牛肉鮑魚鮑臭魚脯血羹冷酒有灰酒蕎麥小豆胡麻動作切忌乘飢灸灼熱湯沐浴夏月空腹忿恚及過市釐及喪家並哭泣沖熱忍飢登甚穢廁親不潔婦人蔬菜忌蕓薹胡荽荏堇枸杞芥菜大蒜果實忌梅杏桃李藥物忌烏頭附子天雄蒼耳等悉宜消息以取安平且服石將慎至難不能將息不若勿服蓋背折腦裂髮乳體腫之疾往往因此得之故爾夏月不宜多食豬肉冷水恐腸滑利不止及傷冷飲食不消致成霍亂也服石後將慎紫面餺飥方出聖惠方取烏豆不拘多少煮取濃汁代水和麵依常法作麵食還向此豆汁中熱煮干則添豆汁勿加水候熟入豬羊緑豆等臑食之和山芋作面尤佳水膜餅方出聖濟總録作餅砍上𨫼時以水塗摸生餅上表裡爆之切勿食胡餅燒餅等大壅熱故也宜食麵餅方出聖惠方取面拌如常餅法細切如小豆大以面於簸中拌令如丸煮極熟干漉出置冷水中又漉出置盤中以粉再拌麵丸納鐺中煮令極熟乘熱任以五味汁及諸肉臛食之大涼補腰腳於藥無犯又方出聖濟總録取新大麥為面和肉汁及飵餅食甚良凡大麥熟蒸為餅和黑豆相拌食良夏日冒熱遠行食晚失飢石必發動宜作大麥餅行將飢即食之壓石療飢甚妙若覺渴及熱盛慎勿食炙肉羊獐尤惡自外肉性平冷者通食仍勿熱進恐成消渴乳石發諸藥不治者附論乳石發動各有方劑以對病症固有疾勢異常諸藥所不能治者因別敘備用之法方葳蕤酒出聖濟總録治乳石發動諸藥不效葳蕤升麻薺苨人參各三兩大黃銼炒梔子仁芒硝甘草炙銼各二兩黃芩去黑心葛根銼紫草去蘆頭犀角鎊各四兩銀屑二兩半豬脂臘月者三兩露蜂房五兩大豆浸曝乾炒去皮一合上除豬脂銀屑外搗羅為細末以無灰酒二升密封浸一宿次將豬脂用好酒一升煉開以銀屑相和研入前藥酒內更浸一宿每服取酒一二盞飲之豆豉酒出聖惠方治乳石發動諸藥不治醇酒二升豉五合上同煮沸熱澄清旋飲一盞良治乳石發熱困諸藥不效者出聖惠方豬脂五合成煉者芒硝四分上以水三升入蔥白五合切豉心三合同煮取一升濾去滓下豬脂芒硝二味再煎一沸分五服以瘥為度治乳石發諸藥療不瘥者出聖濟總録用硝石明白者一塊如杏子大不拘時逐旋含化咽津
