丸治三消渴即飲水過多不知厭足鉛丹黃連去須各半兩乾葛粉栝蔞根各三兩上為末煉蜜丸如梧桐子大冷水下二十丸葛根丸治消渴日飲水數斗不止葛根銼栝蔞根銼附子炮裂去皮臍鉛丹炒令紫研各一兩上為散入鉛丹同研令勻煉蜜和丸如梧桐子大每服二十丸煎茅根湯下日三米飲亦得春夏去附子栝蔞根丸治消渴飲水不止栝蔞根銼黃連去須知母焙麥門冬去心各五兩上為末煉蜜丸如梧桐子大每服三十丸米飲下神效散治渴疾飲水不止白浮石蛤粉蟬殼各等分上為末用鯽魚膽七個調三錢服不拘時神效八味腎氣丸消渴有三種一者渴而飲水多小便數有脂似麩片甜者消渴病也二者吃食多不甚渴小便少似有油而數者消中病也三者渴飲水不能多但腿腫腳先瘦小陰痿弱小便數者此腎消病也特忌房勞千金云消渴病所慎者有三一飲酒二房室三鹹食及面能慎此者雖不服藥而自可無他消渴之人愈與未愈當須慮患大癰何者消渴之人必於骨節間忽發癰疽而卒予親見友人邵任道患渴數年果以癰疽而死唐祠部李郎中論消渴者腎虛所致每發則小便甜醫者多不知其疾故古今亦闕而不言洪範言稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜足明人食之後滋味皆甜流在膀胱若腎氣盛則上蒸精氣下入骨髓其次以為脂膏又其次以為血肉也其餘則為小便故小便色黃血之餘也臊氣者五臟之氣咸潤者則下味也腎既虛冷則不能熏蒸穀氣盡下為小便故味甘不變其色清冷則肌膚枯槁也猶如乳母穀氣上泄皆為乳汁消渴病者下泄為小便皆精氣不實於內則小便數而瘦弱也又肺為五臟華蓋若下有暖氣上蒸則肺潤若下冷極則陽氣不能升故肺干則渴易之否卦乾上坤下陽無陰而不降陰無陽而不升上下不交故成否也譬如釜中有水以火暖之其釜以板覆之則暖氣上騰故板能潤也若無火力水氣則不能至此板終不得潤也火力足者則腰腎強盛常須暖補腎氣飲食得火力則潤上而易消亦免乾渴也故張仲景云宜服腎氣八味丸此疾與腳氣雖同為腎虛所致其腳氣始發於二三月盛於五六月衰於七八月消渴始發於七八月盛於十一月十二月衰於二三月其故何也蓋腳氣壅疾也消渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者則疾可理也猶如善為政者寬以濟猛猛以濟寬隨事制度爾仲景云足太陽者是膀胱之經也膀胱者腎之腑小便數此為氣盛氣盛則消穀大便硬為氣衰衰則為消渴也若消渴飲一斗小便亦得一斗宜服此干熟地黃半斤山藥四兩茯苓牡丹皮附子桂心各三兩澤瀉四兩山茱萸五兩上為細末煉蜜丸如梧桐子大酒送下二三十丸忌豬肉冷水蕪荑胡荽菝葜飲治消渴飲水無休菝葜銼炒湯瓶內鹼各一兩烏梅二兩並核捶碎焙乾上粗搗篩每服二錢水一盞瓦器煎七分去滓稍熱細呷又方治消渴飲水過多不知厭足栝蔞根一兩黃連二兩去須甘草一兩炙微赤銼上為散每服三錢水一中盞煎至六分去滓每於食後溫服又方地骨皮一兩甘草三分炙微赤銼桑根白皮三兩銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓每於食後溫服生津丸治消渴飲水日夜不止青蛤粉白滑石上研為細末用黃顙魚涎和為丸如梧桐子大每服三十丸煎陳粟米飲下不拘時神應散治消渴飲水不休滑石研寒水石研各半兩上研為散用生雞子一枚鑿破去黃留清調和藥末令如稠膏卻納在雞子殼內以紙封口用鹽泥固濟日曝乾灰火內燒令通赤放冷去土並殼取藥研令絕細為度每服大人二錢小兒半錢米飲調下玉壺丸治消渴飲水無度人參栝蔞根各等分上末煉蜜丸如梧桐子大每服三十丸麥門冬湯下沃焦散治消渴飲水無度泥鰍魚陰乾去頭尾燒灰研細為末乾荷葉研細為末上等分每服各二錢新水調下遇渴時服日三候不思水即止治消渴飲水過甚並小兒渴疾方黃狗膽一枚獖豬膽一枚上以狗膽併入豬膽內陰乾候可丸即丸如梧桐子大每服以麝香湯下二丸小兒半丸黃連丸治渴疾飲水不止黃連不拘多少上為末入豬肚內蒸爛同搗丸如梧桐子大每服三四十丸飯飲下一方用豬膽汁和勻蒸食栝蔞根散治消渴飲水不止熟乾地黃生乾地黃葛根栝蔞根上件各等分焙乾為細末每服二錢溫米湯飲下不拘時候文蛤散治消渴欲飲水而不止者文蛤即五倍最能回津本草在海蛤文下甚失其性識者當自知之上為末以水飲任調方寸匕不以時服三消丸治渴疾飲水不止骨蒸黃連淨銼用冬瓜汁浸一宿曬乾凡七次上為末用冬瓜自然汁搜成膏子陰乾為末再用冬瓜汁作餅如此七遍為末用冬瓜汁為丸如梧桐子大每服三四十丸冬瓜汁煎大麥湯吞下尋常渴只一服炒米飲亦可甘露散治渴疾飲水不止干豬胞十個上剪破出卻氣去卻繫著處用干盆子一隻燒胞煙盡取出研令極細每服一錢溫酒調下不拘時候姜魚丸治同前乾生薑一兩末上用鯽魚膽汁和丸如梧桐子大每服七丸米飲下不拘時服之水骨丸治同前湯瓶內水鹼一兩上研為細末燒粟米飯和丸如梧桐子大每服十五丸人參湯下不拘時候服一方研如粉沸湯或井花水調服治消渴飲水過多小便不利方葵根葉五兩切上件藥以水三大盞入生薑一分豉一合煮取二盞去滓食後分溫三服治消渴飲水過多不瘥方凌霄花一兩上搗碎以水一盞半煎至一盞去滓分三服又方人參一兩去蘆頭搗細羅為散上用雞子清調下一錢日四五服治消渴飲水無度小便多口乾渴雉一隻上細切和鹽豉作羹食治消渴煩躁飲水無度七家井索用近桶口結處燒為灰上不拘時候以新汲水調服二錢不過二三服效人參湯治消渴發作有時心脾有熱飲水無度人參桑根白皮銼炒各二兩麥門冬去心焙知母枇杷葉拭去毛炙黃連去須微炒葛根銼白茯苓去黑皮地骨皮淡竹葉各一兩上銼如豆每服五錢用水一盞半煎至八分去滓溫服天花粉丸治消渴飲水多身體瘦天花粉黃連去須各一兩茯苓當歸各半兩上為末煉蜜丸如梧桐子大每服三十丸茅根煎湯下黃連丸治消渴飲水絕多身體黃瘦黃連半兩去須黃丹半兩炒令紫色豆豉半兩炒乾上為末入黃丹研令勻用軟飯和丸如梧桐子大每於食後以溫水下五十丸栝蔞丸治消渴飲水絕多身體黃瘦栝蔞根黃連去須鐵粉細研以上各等分上為末入鐵粉研令勻煉蜜丸如梧桐子大不計時煎茅根湯下二十丸治消渴飲水不知足兔頭一具上以水煮取汁飲之治消渴飲水多身體黃瘦窯突上黑煤焙乾似鐵屑者半斤上搗取末更以生薑四兩同搗絹袋盛以水五升浸取汁不拘時候冷飲半合蘭香飲子一名甘露膏治消渴飲水極甚善食而瘦自汗大便結燥小便頻數石膏防風生甘草各一兩知母酒浸一錢半半夏二分湯洗炙甘草人參蘭香白豆蔻仁黃芩桔梗升麻各半錢上同為細末湯浸蒸餅和勻成劑捻作薄片子日中曝半乾碎如米每服二錢食後淡生薑湯送下牛黃甘露丸治三焦渴疾飲水無度舌上皺裂肌肉黃瘦精神減退小便多腹脅脹硃砂一兩成塊者牛黃麝香各一分鐵粉梧桐律犀角銼丁香鉛白霜葳蕤地龍知母檳榔麥門冬去心牡蠣苦參石膏甘草炙錫吝脂白扁豆各半兩慢火炒宣黃連銀箔五十片生栝蔞根一兩細研金箔一百二十片不用北地者上除栝蔞根別搗外同為細末煉蜜和丸臨和時即入金箔及生栝蔞根一處和勻為丸如豌豆大金箔三片銀箔二片碎研空心米飲下十丸漸加至二十丸飯後臨臥各一服日近輕者當日止重者三日二十日後只空心一服夜一服用金銀箔各一片一月外只用溫漿水下十五丸其藥合時二月至九月即用生栝蔞根九月後只用煉蜜為丸亦得忌咸酸炙爆魚酒等治暑月渴而飲水過多乾嘔復渴不思飲食乾葛一兩炮甘草一兩炙陳粟米二匙炒上㕮咀每服二錢水一盞煎至六分去滓食前溫服一日二三次消渴飲水腹脹附論夫消渴飲水腹脹者由水氣流行在脾脾得濕氣不能消穀通過經絡痞澀氣血則水不得宣通停聚流溢於膀胱之間故令脹滿也脾土製水通調水道下輸膀胱若消渴飲水過多內漬脾土土不制水故胃脹則為腹滿之疾也內經謂水為陰腹者至陰之所居是以水飲之證先見腹滿方人參湯一名木香湯又名桑白皮湯出聖惠方治消渴飲水過多心腹脹滿不能食人參一兩去蘆頭桑根白皮半兩銼黃耆三分銼陳橘皮一兩湯浸去白皮半夏湯浸七次去滑半兩木香赤芍藥草豆蔻去皮桂心去粗皮檳榔銼枇杷葉以上各半兩去毛炙上為散每服三錢水一盞入生薑半分煎至六分去滓不計時候溫服一方用枳殼無陳橘皮人參湯出聖濟總錄治消渴飲水過多心腹脹滿或脅肋間痛腰腿沉重人參白芍藥各二兩大腹子兩枚煻灰火內煨切葛根銼黃芩去黑心知母焙桑根白皮銼赤茯苓去黑心各一兩半葳蕤一兩一分枳殼去瓤麩炒三分上㕮咀每服三錢水一盞入生薑如棗子大拍破煎至七分去滓空心溫服食後夜臥再服桂心湯散出聖惠方治消渴飲水傷冷太過致脾氣虛腹脅脹滿不思飲食桂心人參去蘆頭白茯苓訶黎勒皮甘草炙微赤銼枳殼麩炒微黃去瓤前胡去蘆頭白朮大腹皮銼各半兩厚朴一兩去粗皮塗生薑汁炙令香熟上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服赤茯苓湯出聖惠方治消渴飲水太過胃氣不和不思飲食宜服此赤茯苓人參去蘆頭赤芍藥以上各半兩白朮檳榔桂心前胡去蘆頭厚朴各三分去粗皮塗生薑汁炙令香熟枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服陳橘皮散出聖惠方治消渴飲水過多心腹脹滿或脅肋間痛腰腿沉重陳橘皮一兩去白訶黎勒皮赤茯苓桂心大腹皮銼芎藭枳殼炒黃去瓤赤芍藥各半兩甘草一兩炙微赤銼上為散每服四錢水一中盞入生薑半分煎至六分去滓食後溫服半夏散出聖惠方治消渴飲水腹脹煩熱嘔吐不思飲食半夏半兩湯洗七次去滑赤茯苓人參各一兩去蘆頭白朮三分甘草半兩炙微赤銼木香半兩陳橘皮一兩湯浸去白瓤焙上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服又方竹茹一分同煎檳榔湯出聖惠方治消渴飲水不止小便復澀心腹連膀胱脹悶胸膈煩熱檳榔銼桑根白皮銼赤茯苓去黑皮木通銼紫蘇莖葉麥門冬去心焙各一兩上㕮咀每服四錢水一盞入生薑半分切蔥白七寸煎至六分去滓不計時溫服赤茯苓丸出聖濟總錄治久患消渴小便數服止小便藥多渴猶不止小便復澀兩脅連膀胱脹滿妨悶心胸煩熱赤茯苓去黑皮桑根白皮銼防風麥門冬去心焙各一兩半郁李仁湯浸去皮焙乾研木香各一兩上先搗前五味為細末與郁李仁研令勻煉蜜和為劑更於石臼內杵酥令勻熟丸如梧桐子大每日空腹煎木通棗湯下三十丸至晚再服漸加至五十丸旋覆花湯出聖濟總錄治消渴腹脅虛脹心下滿悶旋覆花淨擇去莖葉微炒桑根白皮銼陳橘皮湯浸去白微炒各一兩半紫蘇並嫩莖幹者犀角鎊各半兩赤茯苓去黑皮三分上㕮咀每服七錢水三盞入棗三枚擘生薑半分拍破鹽豉半匙同煎至一盞半去滓分溫三服每食後一服如人行十五里以來更一服大黃丸出聖惠方治消渴腹脹利大小腸川大黃三兩銼碎微炒栝蔞根檳榔枳殼麩炒微黃去瓤各一兩芎藭二分桂心三分上為末煉蜜和丸如梧桐子大不計時候以溫水下三十丸麥門冬湯治消渴喉幹不可忍飲水不止腹滿急脹麥門冬去心焙烏梅去核取肉炒各二兩上㕮咀每服三錢水一盞煎至半盞去滓食後溫服日三桂苓甘露散治飲水不消嘔吐瀉利濕氣流注水腫腹脹泄瀉不能止者宣通氣液兼治霍亂吐瀉下痢赤白止煩渴解暑毒大有奇效兼利小水桂心去粗皮半兩白茯苓豬苓並去皮白朮寒水石別研細澤瀉各一兩甘草一兩滑石別研二兩上為細末或煎或水調二三錢任意服之或入蜜少許亦得一方有石膏一兩無豬苓
