body:
  text: 卷一百七十九消渴門虛熱渴附論夫五臟六腑皆有津液也若五臟內虛而生熱者熱氣在內則津液竭少故為渴也夫渴者喜水其人必煩目眩背寒而嘔皆因內虛故也診其心脈滑甚者為喜渴也人因勞傷腑臟或大病後未復氣血不足陰虛內熱熱則津燥液少故渴而引飲飲不能多多則腹滿不消氣虛不勝於水故也方腎瀝湯出聖濟總錄治臟氣不足內燥發渴生乾地黃洗銼焙澤瀉遠志去心桂心去粗皮當歸切焙龍骨甘草炙銼五味子赤茯苓去皮芎藭人參黃芩去黑心麥門冬去心焙各二兩上粗搗篩每用羊腎一隻去筋膜切開先用水一盞半煮羊腎至一盞去腎入藥末三錢再煎七分去滓溫服不拘時黃耆湯出聖濟總錄治氣虛燥渴引飲黃耆細銼栝蔞根銼麥門冬去心焙赤茯苓去黑皮人參甘草炙銼末黃連去須知母銼焙生地黃焙菟絲子酒浸一宿焙乾肉蓯蓉酒浸一宿去粗皮銼焙石膏煅赤各一兩上㕮咀每服三錢水一盞煎七分去滓溫服不拘時木香湯出聖惠方治虛熱渴飲水不已心腹脹滿木香枳殼去瓤麩炒芍藥檳榔生銼各半兩桑根白皮銼炒黃耆細銼草豆蔻去皮枇杷葉拭去毛炙黃連去須各二兩桂心去粗皮一兩人參一兩半上為散每服三錢水一盞煎至七分去滓溫服不拘時鹿茸丸治虛渴煩躁不眠鹿茸去毛塗酥炙黃耆細銼人參土瓜根山茱萸杜仲去粗皮切炒桑螵蛸炙各一兩栝蔞根菟絲子酒浸一宿別搗雞膍胵十枚炙乾肉蓯蓉酒浸一宿去皮上為細末煉蜜丸如梧桐子大每服三十丸酒下不拘時溫服人參湯治虛渴飲水過多身體浮腫人參黃耆細研各二兩旋覆花桑根白皮銼各二兩紫蘇葉犀角鎊屑各半兩赤茯苓去黑皮陳橘皮湯洗去白焙五味子去梗澤瀉各一兩半上㕮咀每服三錢水一盞半煎一盞去滓溫服不拘時黃耆丸治虛燥渴不已黃耆細銼五味子各二兩烏梅茯神去木各一兩半附子炮裂去皮臍大者二枚澤瀉酸石榴皮生乾地黃焙各半兩上為細末煉蜜和丸如梧桐子大每服三十丸漿水下不拘時服之人參湯出聖濟總錄治消渴飲水無節人參二兩五味子大腹皮各三分赤茯苓去黑皮桑根白皮銼炒黃耆細銼各一兩半芍藥黃芩去黑心葛根銼各一兩枳殼去瓤麩炒三分上㕮咀每服三錢水一盞煎至七分去滓溫服不拘時黃連丸出聖惠方治熱渴不止心神煩躁黃連去須栝蔞根各等分上為末以麥門冬去心煮熱爛研和丸梧桐子大每服煎小麥湯下三十丸食後服雞蘇丸出危氏方治病後虛羸發渴上雞蘇丸方見龍腦雞蘇丸以北五味子煎湯吞下後服安腎丸方見虛勞門虛勞類薏苡仁湯出聖濟總錄治虛渴不止薏苡仁五味子各一兩半覆盆子生乾地黃銼焙枸杞各一兩紫蘇莖葉黃耆細銼木通各一兩白茯苓去黑皮三兩上㕮咀每服三錢水一盞煎至七分去滓溫服不拘時清心蓮子飲出危氏方治心中蓄熱時常煩躁因思慮勞心憂愁抑鬱以致小便白濁或有沙粒淋瀝澀痛便赤如血夜夢遺泄或因酒色過度上盛下虛心火炎上肺金受克口舌乾燥漸成消渴睡臥不安四肢倦怠男子五淋婦人帶下赤白及病後氣不收斂陽浮於外五心煩熱藥性溫平不冷不熱常服清心養神秘精補虛滋潤腸胃調順血氣黃芩去心半兩黃耆去蘆頭蜜炙石蓮肉去心白茯苓去皮人參去蘆頭各七錢麥門冬去心甘草地骨皮車前子去土炒各半兩上銼散每服三錢麥門冬十粒去心水一盞半煎取八分去滓水中浸冷空腹服發熱加柴胡薄荷煎茯苓湯出聖惠方治心脾熱渴不止小便難宜服此赤茯苓一兩蘆根一兩銼黃芩一兩知母一兩栝蔞根一兩瞿麥穗一兩麥門冬一兩去心甘草一兩炙木通一兩銼上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時溫服地黃丸出聖濟總錄治臟虛舌乾燥渴引飲不已熟乾地黃銼焙山茱萸山藥澤瀉牡丹皮白茯苓去黑皮附子炮裂去皮臍各一兩桂心去粗皮一分上為細末煉蜜丸如梧桐子大每服三十丸溫水下不拘時天竺黃散出聖惠方治熱渴天竺黃一兩細研黃連一兩去須茯神一兩甘草一兩炙微赤銼川芒硝一兩犀角屑栝蔞根一兩川升麻一兩上為散入研了藥令勻每於食後煎淡竹葉湯調下一錢黃耆散出聖惠方治脾胃中熱煩渴不止黃耆一兩銼茯神一兩生乾地黃一兩地骨皮一兩栝蔞一兩麥門冬一兩去心黃芩一兩甘草半兩炙微赤銼上為散每服四錢水一中盞入生薑半分淡竹葉二七片煎至六分去滓不計時候溫服豬肚黃連丸出聖惠方治脾胃熱渴不止羸瘦困乏豬肚一枚淨洗黃連三兩去須別搗為末栝蔞根一兩白粱米一合淨淘柴胡一兩去苗茯神一兩知母一兩麥門冬二兩去心焙上為末先將黃連末及米入肚內縫合蒸爛熟砂盆內研如膏入藥末和令勻丸如梧桐子大不計時以清粥飲下三十丸知母散出聖惠方治心脾實熱煩渴不止知母一兩蘆根一兩半銼栝蔞根一兩麥門冬一兩去心黃芩三分川大黃一兩銼碎微炒甘草半兩炙微赤銼上為散每服四錢水一中盞煎至六分去滓不計時候溫服赤茯苓散出聖惠方治脾胃中熱引飲水漿煩渴不止赤茯苓栝蔞根黃芩麥門冬去心生乾地黃知母各一兩上為散每服五錢水一大盞入生薑半分小麥半合淡竹葉二七片煎至五分去滓不計時候溫服人參散出試效方治身熱頭痛或積熱黃瘦或發熱惡寒蓄熱寒戰或膈熱嘔吐燥熱煩渴瀉痢或目赤口乾或咽喉腫痛或風熱昏眩或蒸熱虛汗肺痿勞嗽一切邪熱脾胃肺腎不調及真陰損虛並宜服之石膏一兩寒水石二兩滑石四兩甘草一兩人參半兩或無亦得上為細末每服二錢溫水調下或冷水亦得早晚食後兼服梔子金花丸一名既濟解毒丸茯神丸出聖惠方治心脾壅熱煩渴口乾宜服此知母栝蔞根各一兩麥門冬二兩去心焙黃連去須茯神各一兩上為末煉蜜和搗二三百杵丸如梧桐子大不計時候以清粥飲下三十丸人參竹葉湯出千金方治熱病後虛熱渴四肢煩疼葛根一斤人參甘草各一兩竹葉一把上㕮咀水一斗五升煮取五升渴飲之日三夜一龍朱散出聖惠方治心脾熱渴面赤口乾宜服之馬牙硝半斤川芒硝四兩寒水石四兩石膏三兩上件藥以水五升浸三日用銀器中煎至水盡後去寒水石及石膏陰乾別入龍腦半兩硃砂一兩同研為末不計時候蜜水調下一錢兼治喉痹腫痛甚妙石膏湯出聖惠方治熱極渴不止麥門冬一兩去心石膏二兩蘆根一兩上件為散每服半兩水一盞煎至五分去滓不計時候溫服黃連膏出聖惠方治熱渴不止心神燥煩宜服此黃連五兩去須搗為末地黃汁一兩蜜五合上件藥於銀器中以慢火熬成膏收於瓷器中每於食後煎竹葉麥門冬湯取彈子大服之黃連散出聖惠方治心肺壅熱煩渴口乾宜服之豉一合黃連一兩去須上為散每服半兩水一大盞煎至五分去滓每於食後溫服麥門冬湯出聖惠方治證同前黃連半兩去須麥門冬一兩去心上為散每服半兩水一盞煎至五分去滓每於食後溫服浮萍丸出聖惠方治熱渴不止心神煩躁上取浮萍水洗曝乾為末以牛乳汁和丸如梧桐子大每服三十丸不計時候以粥飲下麥門冬丸出聖濟總錄治臟虛乾燥發渴飲水參茯白朮散出如宜方治病後脾虛津液燥或有餘熱虛渴白扁豆薑汁浸炒去皮茯苓山藥人參甘草蓮肉砂仁桔梗薏苡仁炒各二兩上為末加烏梅天花粉煎服上膈熱宜雞蘇丸治中熱消渴疾出本草生葛上冬月取以水中揉出粉澄成塊先煎湯使沸後擘塊下湯中良久色如膠其體甚韌以蜜入湯中拌食之擦少生薑尤佳多食行小便亦能使人利治虛熱渴出本草葎草上以煮汁或生汁服之治熱渴心悶出本草地漿上以水一大盞掘地作坎以水沃其中攪令濁俄頃取飲之解熱渴出本草酢漿草上取食之治虛熱渴出本草桃膠上如彈丸含之佳治下虛上熱而渴出永類鈐方菝葜根上每服一兩水二盞半煎減半日三服渴減只二服治渴熱心悶橘皮甘草上等分煮飲時服咽之勿煩使多吃但以熱土或熬熱灰土壅其臍上為佳以溫湯吃飲之亦可治熱渴心悶面上取一兩以溫水一中盞攪和服之胃熱渴附論夫胃氣實則生熱熱則土氣內燥津液不通咽膈煩滿故渴而引飲內經謂脾氣熱則胃干而渴蓋臟真濡於脾脾主為胃行其津液者也脾既受熱津液不濡於胃胃干則渴不止也方黃連湯出聖惠方治脾胃中熱煩渴身漸消瘦宜服此黃連一兩去須川升麻一兩麥門冬一兩去心黃芩一兩栝蔞根一兩知母一兩茯神半兩梔子仁一兩甘草一兩炙微赤銼石膏二兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服茯神湯出千金方治胃腑實熱常渴引飲泄熱止渴茯神二兩外臺作茯苓栝蔞根生麥門冬各五兩葳蕤知母各四兩生地黃六兩小麥二升大棗三十枚淡竹葉切三升上㕮咀水三斗煮小麥竹葉取九升去滓下藥煮取得四升分四服服時不問早晚渴即進非但止胃渴通治患熱渴者枸杞根湯出聖濟總錄治胃乾渴飲水不止枸杞根栝蔞根麥門冬生去心黃連去須各一兩半土瓜根乾者知母車前子去土各一兩上銼如麻豆每服五錢水一盞半入生地黃半分同煎至八分去滓溫服日三開胃解熱渴飲子出廣南四時攝生論大黃甘草各半兩半夏十個生薑三兩好棗五枚上件藥用水一大銚同煎至八分旋取溫服之不拘時候栝蔞湯出千金方治消渴胃熱栝蔞根生薑各五兩生麥門冬汁蘆根切二升茅根切三升上㕮咀水一斗煮取三升分三服茯神湯出聖濟總錄治胃渴引飲泄熱茯神去木二兩栝蔞根麥門冬去心各五兩知母銼葳蕤各四兩上粗搗篩先以水三盞入淘小麥一匙淡竹葉五十片洗淨切同煮至一盞半去滓下藥末四錢棗三枚擘破加生地黃半分同煎至一盞去滓溫服日三甘草湯出聖濟總錄治胃熱乾渴甘草炙銼栝蔞根各二兩麥門冬去心焙二分半夏湯洗去滑七次曝乾麩炒二兩半上粗搗篩水二盞淘小麥半合煎至盞半去麥下藥末五錢大棗三枚擘破生地黃半錢生薑一棗大拍破再煎至八分去滓溫服日再服栝蔞根湯出聖濟總錄治胃中乾渴栝蔞根三兩知母焙二兩甘草炙銼人參各一兩上㕮咀每服三錢水一盞煎至七分去滓下白蜜少許攪勻不拘時候日可數服洗心飲子出廣南四時攝生論甘草芍藥山梔杏仁去尖研入上等分為散每服三錢水二盞煎至八分飯後溫服冷湯出廣南四時攝生論甘草二分炮大棗五個竹葉十四片熟附子末少許人參少許上微銼碎用水煮放冷時時服之治胃中熱消渴利小便出本草陳粟米上炊飲食之暴渴附論夫暴渴緣熱甚腠理開汗大泄而津液少故暴渴而引飲小便利者不能為害若三焦不和心肺壅熱胃中乾燥渴而小便不利者須防變飲證不可不察喜渴者由心熱也心主汗汗出多則腎中虛燥故令渴也凡夏月渴而汗出多則小便少冬月不汗故小便多此皆是平人之候故渴名曰暴渴也方蘆根散出聖惠方治暴渴飲水多或乾嘔蘆根一兩半銼人參半兩去蘆頭百合三分麥門冬一兩去心桑根白皮三分銼黃耆三分銼赤茯苓三分黃芩三分葛根三分炙微赤銼上為散每服四錢水一中盞入生薑半分淡竹葉二十片煎六分去滓不計時候溫服地骨皮湯出聖惠方治脾虛熱暴渴不已地骨皮栝蔞根黃連去須麥門冬去心焙黃芩去黑心各一兩茯神去木遠志去心各三分甘草炙半兩石膏碎二兩上㕮咀每服三錢水一盞煎至七分去滓溫服不拘時蘆根湯出聖惠方治暴渴煩熱蘆根銼麥門冬去心焙栝蔞根地骨皮各一兩黃芩去黑心三分白茅根銼石