令滿仍以木瓜蓋子蓋定篾簽簽定紗片裹木瓜全個不令散失如此者二三十個看其銀合大小坐於其中銀合上下仍鋪藥末封蓋定坐於銀鍋銀甑中勿用鐵器以桑柴燒文武火蒸七晝夜再換木瓜藥末一次又蒸七晝夜乃止取出硃砂一味攤乾研細以薏苡粉煮稀糊為丸如梧桐子大每服二三十丸茶酒任下煮藥在後黃耆炙當歸遠志去心柏子仁川烏炮木香茯神去木益智仁人參乳香龍齒五味子石斛川椒熟地黃麥門冬白芍藥仙靈脾各一兩鹿茸炙酸棗仁炒附子炮去皮鍾乳粉各二兩加硃砂二兩磁石丸出朱氏集驗方治心腎諸虛不足磁石醋煅黃耆蜜炙覆盆子赤茯苓去皮各半兩乾薑炮巴戟去心桂心鹿茸蜜炙各三錢蓯蓉酒浸焙乾牛膝酒浸焙乾川椒炒各四錢柏子仁別研防風地骨皮遠志去心各二錢半大附子一個炮去皮大川烏一個炮去皮紫稍花去木各一兩上為細末酒煮麵糊為丸如梧桐子大每服三十丸湯酒任下婦人白帶下及男子泄精加龍骨半兩海螵蛸一兩牡蠣半兩鹽泥固濟火煅巴戟丸出朱氏集驗方能治諸虛不足真陽衰憊服之有效川楝子去核葫蘆巴炒白薑炮川椒炒茴香川牛膝酒浸焙破故紙炒山藥木通肉桂去皮牡蠣煅附子炮去皮臍赤石脂上等分為末酒糊為丸如梧桐子大每服五十丸空心溫酒鹽湯任下隨症加味於後腎厥頭痛加川芎肺虛咳嗽加五味子款冬花背勞倦加沉香脾胃不和加蓽澄茄虛瘧寒熱加蜀添葉心神不寧加龍齒酸棗仁炮去皮殼玉女砂出朱氏集驗方治男子婦人諸虛百損暖下元固陽氣暖子宮産後諸虛尤宜服之又治虛病寒熱自汗盜汗尤神此乃潼州許德修名醫遇至人得此方極驗好辰砂八兩或六兩或十兩夾絹袋盛若塊大打令稍小惟紅者為上再入後藥金毛狗脊去毛熟地黃吳茱萸菟絲子杜仲瓦松古屋瓦上青毛焙乾去土五味子人參肉豆蔻麵包煨研細桑寄生川萆薢芍藥巴戟去心黃耆牡丹皮去心肉蓯蓉當歸茯神去木茴香洗遠志去心山茱萸去核上各一兩裝在一斗瓶內著童子小便五七升將砂袋懸挂瓶中如煮酒法於鍋內著水亦懸藥瓶於鍋中桑柴或間松柴煮五日夜火不要急小便不住時添煮令乾日足取出將砂袋以溫水滌十餘次又換溫水浸半日棄藥不用辰砂又洗三兩次糯米丸子和丸空心棗湯下五粒至十粒加味大建中湯出朱氏集驗方大補諸虛白芍藥官桂黃耆蜜炙附子炮五味子乾薑炮人參鹿茸酒蒸白茯苓去皮川芎半夏當歸酒浸陳皮各一兩甘草半兩上為粗末每服四錢水一盞半薑七片棗一枚煎六分去滓空心服大防風湯出如宜方治諸虛損兼治風冷腰膝筋骨疼痛熟地黃防風白朮當歸杜仲制黃耆炙白芍藥以上各二兩羌活牛膝制人參甘草各一兩上㕮咀每服四錢薑七片棗一枚煎服一方有附子炮川芎各一兩半青春丸一名人參丸出如宜方治少年夢高墜下水溺行似踏空詵詵菟絲子丸出如宜方治精血虛耗不固溺遺及夢泄熟地黃遠志髓齒各二兩上為細末用山藥糊搜和為丸如梧桐子大每服五十丸溫酒或鹽湯下空心服沉附湯出如宜方治上盛下虛氣不升降胸痞氣急附子炮乾薑各半兩沉香白朮各一兩甘草一兩半上㕮咀薑五片煎空心服又大附子炮作二服薑十片煎磨沉香入藥黑錫丹出如宜方治五臟俱虛陰陽衰損上盛下虛痰生頭眩沉香葫蘆巴附子制陽起石肉桂破故紙炒茴香炒肉豆蔻制金鈴子木香錫硫砂子各四兩上為末同砂子末酒糊丸如梧桐子大陰乾布袋令光瑩每服四十粒空心薑鹽湯下附子鹿茸丸出十便良方補諸虛不足鹿茸麋茸附子白龍骨各一兩麝香一分上為末以糯米糊為丸如梧桐子大空心晚食前溫酒下一二十丸若覺得力即止不可多服鍾乳散出十便良方治諸虛不足羸弱不能起止煉成鍾乳麥門冬各三兩人參熟乾地黃黃耆杜仲肉蓯蓉薯蕷石斛各二兩白茯苓甘草各一兩上件藥搗羅為散入鍾乳研令勻每服空心及晚食前以溫酒下二錢黃耆白朮散出十便良方能治大人小兒諸虛不足面黃食少困倦潮熱有時黃耆白朮芍藥桂茯苓甘草人參去蘆神麯各一兩上㕮咀每服三錢加生薑棗子煎不計時候日進三四服重校定香茸丸出十便良方補諸虛不足麝香二錢研鹿茸熟地黃肉蓯蓉牛膝各四兩沉香二兩上搗羅為細末拌勻煉蜜和丸如梧桐子大每服三四十丸空心溫酒或鹽湯任下附子黃耆湯出十便良方治諸虛不足及大病後氣血不復虛羸少氣腹脅疼痛精神倦怠飲食不進附子黃耆白朮當歸蓯蓉厚朴各一兩人參桂心各三分半夏乾薑各半兩甘草一分上件藥搗篩為粗末每服三錢以水一盞半生薑三片棗子一枚同煎至八分去滓食前溫服肉丹出十便良方補益老人一切虛症又治胃弱飲食不進精羊肉一斤去盡筋皮橫紋塊切以好酒半升加水五升爛煮焙乾研為細末鹿茸白朮神麯各二兩附子肉果縮砂仁乾生薑制各一兩陳倉米半斤上搗羅為細末拌勻以沸湯洗泡蒸餅和為丸如梧桐子大每服五十丸食前溫酒或米飲任下固真丹一名神仙補益固真丸出十便良方能治諸虛不足五勞七傷元陽氣虛及小腸腎腧膀胱疝氣諸般淋疾及治婦人産前後一十八般冷病赤白帶下血山崩漏子宮久冷血海虛弱面色萎黃並宜此藥神仙保真丸出楊氏家藏方能治真元不足臟氣虛弱及觸冒寒氣閉塞下元心腹絞痛自汗厥逆及奔豚發痛上下有聲小腹急脹川楝子去核一兩炒蓬莪朮半兩肉豆蔻半兩面煨香木香半兩檳榔三枚當歸七錢半洗焙神麯半兩炒香茴香揀淨者半兩半炒香一半生用附子一兩炮裂去皮臍令如細米大硇砂光明不夾石者二分用無灰法酒一大盞將硇砂入酒內銀石器內慢火熬化開濾去滓放冷將附子細末打糊搜和余藥末上件除附子硇砂外余藥併為細末將熬下附子硇砂同攪勻和上件細末為丸如梧桐子大每服五十丸細嚼炒桃仁七枚同藥用溫酒一盞送下鹽湯亦得空心食前如大痛時並進二服保真丸出衛生家寶方治真氣虛憊下焦傷竭臍腹強急腰腳痠疼精神困倦面色枯稿小腸疝氣奔豚腎余夜夢遺精小便滑數常服壯陽補腎益精髓肉蓯蓉酒浸一宿舶上茴香炒香川牛膝酒浸白蒺藜炒搗去尖葫蘆巴炒香補骨脂炒香黃耆鹽水浸附子炮去皮臍杜仲去粗皮炒斷絲菟絲子酒浸二宿蒸熟研細白茯苓山茱萸薯蕷炒桂心去粗皮川楝子肉南木香濕紙裹煨以上各一兩上為細末煉蜜為丸如梧桐子大每服五十丸鹽酒任下食前服坎離丹出朱氏集驗方既濟水火伏火靈砂陽起石酒煮磁石火煅醋淬鍾乳粉各一兩半龍齒二一兩黑豆蒸上為細末麵糊丸如緑豆大每服十五粒空心用棗肉湯下既濟丹出朱氏集驗方專治心腎不交靈砂陽起石煅鍾乳粉磁石煅鹿茸茯神各一兩沉香半兩硃砂一錢為衣上為細末麵糊丸如梧桐子大每服二十丸空心棗湯送下既濟丹出朱氏集驗方升降心腎磁石好者煅醋淬研細水飛辰砂蜜煮尤妙酸棗仁人參各二兩乳香半兩上為細末神麯和為丸如梧桐子大每服三五十丸燈心棗湯下不拘時候既濟玉關丸出朱氏集驗方治憂思過度心腎不足水火不能交養神志不寧此藥壯真氣益心腎使水火既濟不生諸疾真辰砂一兩滴乳香半兩法酒一升以上三味用銀器以慢火煮令極干刮下為末卻入附子罐內大附子四隻生去皮臍作罐子留頂蓋卻將煮了辰砂等勻在附子罐內附子肉亦入在內有餘粉留木瓜內不妨以原頂蓋定線扎牢固為妙宣州花木瓜兩隻大者中分作兩片去皮瓤卻將扎定附子四隻分入木瓜內以竹簪定用大麥坐木瓜蒸之候兩時辰木瓜香熟卻取出附子切作片子焙乾其辰砂別研令細末木瓜即別研為膏補骨脂去毛炒熟地黃酒浸菟絲子杜仲薑炒各一兩半鹿茸川當歸遠志柏子仁沉香巴戟肉蓯蓉牛膝北五味子石斛綿耆各一兩上件修制了同附子為細末入辰砂乳香末令勻更用山藥白茯苓各一兩上為細末或只以末入木瓜亦得打糊用木瓜膏子作一處攪和為丸每服五七十丸至一百丸溫酒鹽湯吞下久服腰膝不痛小便如水功效甚驗不可具述理諸虛人營衛不調和者出本草以葳蕤煮汁飲之療虛損絶傷出本草以續斷斷其莖煮絞取器盛其汁飲之補虛損出本草以水雞食之可利小便産婦尤佳茯苓散大補益縮小便上用好白茯苓不以多少用湯煮數滾取出曝乾為末每服二錢空心溫酒湯調下五痿附論三因方論云夫人身之有皮毛血脈筋膜肌肉骨髓以成形內則有肝心脾肺腎以主之若使妄用喜怒不節勞佚兼併致內藏精血虛耗營衛失度發為寒熱使皮血筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳氣皆相類以脈症並所因別之不可混濫柔風腳氣皆外所因痿躄則屬內臟氣不足之所為也又曰病者肺熱皮虛弱薄者足痿躄其色白而毛敗名曰皮痿由肺熱葉焦使然也肺為五臟長有所失亡所求不得則發肺鳴肺鳴則肺葉焦論曰五臟因肺熱焦發為痿躄病者心下熱膝腕樞紐如折去而不相提挈脛筋縱緩不能任其地其色赤而脈絡溢名脈痿由悲哀太甚陽氣內動數溲血故本病論曰大經空虛發為肌痹傳為脈痿病者肝熱口苦筋膜乾筋急而攣其色蒼而爪枯名曰筋痿由思想無窮所願不得意淫於外入房太甚宗筋弛縱及為白淫故下經曰筋痿者生於肝使然也病者脾熱胃干而渴肌肉不仁其色黃而肉蠕動名曰肉痿由漸於濕地以水為事居處下澤濡漬痹痿而不仁故下經曰肉痿者得之濕地下也病者腎熱腰脊不舉骨枯而髓減其色黑而齒稿名曰骨痿因有所遠行勞倦遇大熱而渴陽氣內乏熱舍於腎致水不勝火則骨枯而髓虛故下經曰骨痿者生於大熱也方龍骨丸治膀胱腎冷坐起欲倒目䀮䀮氣不足骨萎方龍骨柏子仁乾地黃甘草防風各五分禹餘糧白石英桂心黃耆茯苓各七分五味子羌活人參各六分山茱萸四分附子六分玄參芎藭各四分磁石杜仲乾薑各八分上為細末煉蜜和丸如梧桐子大空腹酒服三十丸日二加至四十丸起痿丹出永類鈐方治諸痿法當養陽明與衝脈陽明主胃乃五臟六腑之海主潤宗筋束骨之利機關衝脈者諸經之海主滲灌溪谷與陽明合養於宗筋會於氣街屬於帶脈絡於督脈故陽明虛則宗筋縱滯脈不引故足痿不用也治之各補其榮而通其輸調其虛實和其逆順至筋脈骨肉各得其時病乃已矣腎經虛敗遂成骨痿腰腳難舉日加困乏附子炮去皮臍枸杞子揀去枝梗肉蓯蓉酒浸焙乾沉香不見火官桂硃砂別研熟地黃酒浸蒸母丁香各一兩木香不見火陽起石火煅天雄炮去皮臍或用鹿茸亦可硫黃麝香別研各一兩膩粉半兩白丁香少許上為末煉蜜和丸如彈子大每用一丸以薑汁火上入藥熔化卻用手點藥於腰眼上磨搽至藥盡用至二十丸大有神效若有他處癱瘓風疾加皂角一片去筋槌爛薑汁浸一宿瓦上焙乾為末入前藥內依法用藿香養胃湯出三因方治胃虛不食四肢痿弱行立不能皆由陽明虛宗筋無所養遂成痿躄藿香白朮白茯苓神麯炒烏藥去末縮砂仁炒薏苡仁炒半夏曲人參各半兩蓽澄茄甘草炙各三錢半上銼散每服四錢水一盞半生薑五片棗二枚同煎七分去滓不時服芎桂散出危氏方治四肢疼痛軟弱行履不便川烏頭二兩切作片子水浸一宿切作算子條更以米泔浸一宿不洗日乾麩炒微赤為度幹了稱川芎一兩半桂心一兩甘草炙乾薑炮各一分上為末每服二錢溫鹽酒下日進三服麋角丸出危氏方能治五痿皮緩毛瘁血脈枯稿肌肉薄著筋骨羸弱飲食不滋庶事不興四肢無力爪枯發落眼昏唇燥疲憊不能支持熟地黃四兩大附子生去皮臍一兩半麋角鎊一斤重酒浸一宿上用大麥米二升以一半藉底一半在上以二布巾隔覆炊一日取出藥與麥別焙乾為末以浸藥酒添陳酒煮麥粉為糊搜和得所杵三千下丸如梧桐子大每服五十丸溫酒或米飲下食前服治筋痿兩手握固無力兩腿行動無力急飢食少此名筋痿其病症候多口舌生瘡忽生痰涎忽然睡中涎溢身上燥熱忽時憎寒項痙強急小便赤白不定大腑忽冷忽熱不調宜吃此方荊芥穗蔓荊子連翹防風羌活獨活研木香牡丹皮山梔秦艽去沙土麻黃去根牽牛子醋煮以上各一分上細杵羅為末每服一錢食後熟湯調下和滓吃金剛丸出保命集方能治腎損骨痿不能起於床宜益精萆薢杜仲炒去絲蓯蓉酒浸菟絲子酒浸等分上為細末酒煮豬腰子為丸每服五七十丸空心酒送下牛膝丸出保命集方能治腎肝損骨痿不能起於床筋緩不能收持宜益精緩中牛膝酒浸萆薢杜仲炒去絲蓯蓉酒浸防風菟絲子酒浸白蒺藜各等分桂半之上各細末酒煮豬腰子搗和為丸如梧桐子大空心酒下五十至七十丸煨腎丸出保命集方治腎肝損及脾損穀不化宜益精緩中消穀牛膝萆薢杜仲蓯蓉菟絲子防風白蒺藜葫蘆巴破故紙等分桂半兩上和劑服如金剛丸法腰痛不起者甚效治莖痿出本草以筆頭灰酒服之良
