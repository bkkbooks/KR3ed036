body:
  text: 卷二百二十六諸虛門補益諸虛人參固本丸一名地黃丸出如宜方夫人心生血血生氣氣生精精盛則髭發不白顏貌不衰延年益壽其夭閼者多由服性熱之藥不能滋生精血也而藥之滋補者無出生熟二地黃天麥二門冬人徒知服二地黃而不知服二門冬為引也蓋生地黃能生精血天門冬引入所生之地熟地黃能補精血用麥門冬引入所補之地四味互相該載本草又以人參為通心氣之主五味並歸於心而藥之滋補誠無過也生地黃洗熟地黃洗又蒸天門冬去皮麥門冬去心各一兩人參半兩上為細末煉蜜為丸如梧桐子大每服五十丸空心溫酒鹽湯送下十日明目二十日不渴自此可致長生也生地黃煎補虛損填骨髓長肌肉去客熱生地黃汁五升棗膏六合白蜜一升犛牛酥三合好酒三七合上先煎生地黃汁如稠糖攪不停手次納棗膏蜜煉如糖煎成可丸如彈丸日以酒服一枚日進一服漸至二服食訖以酒送含咽並得無所忌唯禁蕪荑磁石酒出千金方療丈夫虛勞冷氣骨中疼痛陽氣不足陰氣上逆一作痛熱方磁石石斛澤瀉防風各五兩杜仲桂心各四兩天雄桑寄生天門冬黃耆各二三兩石楠二兩狗脊八兩上㕮咀以酒四斗浸漬服三合漸加至五合每日再服亦可單漬磁石服之雞清丸出瑞竹堂能治男子婦人精滑下元虛冷及疝氣症婦人經脈不調大人小兒皆可服之金液丹出聖濟總録硫黃十兩精瑩者研碎入罐子及八分為度黃土一掬同搗為泥只用益母草井泥搗亦可水鑑草兩握稻田中生一莖四花如田字亦名水田草獨莖佳石龍芮兩握又名狗蹄草上固濟藥罐子均厚半寸置平地以瓦覆罐口四面炭五斤擁定以熟炭一斤自上燃之候藥罐九分赤口縫有碧焰急退火以潤灰三斗覆至冷剖罐取藥削去沉底滓濁如前再煅通以五煅為足藥熟如雞卵氣急可用三煅止取出罐埋潤地一宿又以水煮半日取藥柳木椎研頻滴水候揚之無滓更研令乾每藥一角用蒸餅一兩湯浸同杵丸之曝乾金液丹舊方治病甚多大體最治氣羸凡久疾虛困久吐痢不瘥老人臟祕傷寒脈微陰厥之類皆氣羸所生服此多瘥大人數十丸至百丸小兒以意裁度多少皆粥飲下羸甚者化開灌之小兒久吐痢垂困藥乳皆不入者並與數十丸往往自得生不死每遇患者才覺腑臟稍祕及飲食減少似有乍寒乍熱狀立便取溫米飲服藥五十丸早晨一服日午一服晚更一服如此頓服一二百丸其疾當時減退必逐下腹中積滯次日又更一兩服直候小便清便是效也瘥了日只可一服一無患逐日早服二十丸至三十丸諸疾永不生一但遇有患更不問疾之冷熱但取藥服之以效為度自然見神功別藥更不宜雜服亦不得著別藥吐瀉此藥自然瀉與常不同不問丈夫婦人老少有患並服無忌一孩子留末細研以米飲調以盂子灌之夜啼心驚妨傷有痰涎者並速研藥一分以來令服之日二服自然見效逐下積物多多與服並無忌若三五歲患者無論瀉痢並服得一患瀉痢不止以黃連貝母二味煎湯下藥恐嫌苦杵羅入等分蒸餅丸如梧桐子大米飲下一若患腸風痔瘻用前末等分依前法丸服亦米飲下四柱散治丈夫元臟氣虛真陽耗散兩耳常鳴臍腹冷痛頭旋目暈四肢倦怠小便滑數泄瀉不止凡臟氣虛弱者悉宜服之補益人出本草以麋角刮取屑熬香酒服之苣蕂丸一名烏銀丸出御藥院方治男子筋痿小腹不利小便頻數腰背疼悶不能久立則腿膝麻冷難以屈伸以意多忘耳內蟬鳴久服不闕滋血氣壯元陽髭鬢反黑令人不老添精補髓益壽延年婦人服之亦可苣蕂子甘菊花去萼旋覆花去萼吳白芷切白茯苓去皮肉桂去粗皮蓽澄茄去枝牛膝去蘆酒浸覆盆子去枝遠志去苗心熟乾地黃焙各一兩旱蓮子去莖葉七錢半上各修治畢羅勻細酒煮麵糊為丸如梧桐子大每服四五十丸空心溫酒下日進二服忌羊血生蔥蘿蔔等硇砂丸出聖濟總録能補諸虛硇砂飛研半兩硫黃研三分白礬研附子炮裂去皮臍各一兩木香一分白附子炮蘹香子炒乾薑炮蓽澄茄乾葛去土炒芎藭青橘皮湯浸去白焙各一兩上為末水浸炊餅和丸如雞頭實大空心鹽湯或溫酒嚼下一兩丸甘草丸安養五臟長肌肉調經脈下氣補脾胃益精神令人能食強健倍力甘草四兩炙人參二兩白朮二兩芍藥二兩黃耆二兩遠志二兩去心大麥糵二兩熬令黃上為散以棗膏和蜜攪調和藥令成丸食後少時以酒或飲任下五丸如梧桐子大漸加至七丸日再常服勿絶盡即更合非止一劑即停多分兩恐難盡又壞分兩少服盡更常得新藥服忌海藻菘菜桃李雀肉陽液方治諸虛百損氣血勞傷因病久深變生膈氣脅肋刺痛噎痞心胸食結不消噦逆嘔水翻胃吐食大便硬祕形瘦體枯以致難救者黃米二升醋煮粥曲細末三升糯米二升醋煮粥上量寒溫和器內停候發過沉澄之時又入餳稀六斤等候去糟粕訖自然上清下澄以成湯液晝夜十二時辰停分三度一度一服俟藥氣下沉後停待一時溫服湯液一盞液後又候一時更吃白餳數塊日夜長短品三服飲液食餳均九度飲食湯液造作如前烹食藥相應頤生養氣實腹虛心百日獲安如故三建湯出和劑方能治真氣不足元陽久虛寒邪攻衝肢節煩疼腰背痠楚自汗厥冷大便滑泄小便白濁及中風涎潮不省人事傷寒陰症厥逆脈微皆可服之天雄附子大川烏各炮去皮臍淨稱一兩上銼散每服四錢水二盞薑十片煎不拘時服氣不順加木香沉香胃冷加丁香胡椒名丁胡三建湯自汗加肉桂小麥治虛損出本草以牡蠣肉煮食之服附子法出十便良方虛人合服附子欲其不濕不燥以沉香烏藥磨水令濃者以附子切片約重三錢和生薑三錢重用此水一盞半煎至七分空心食前溫服烏藥沉香須各磨欲知其濃淡可無烏藥不可無沉香蒼朮丸出瑞竹堂主治腰腿疼痛明目暖水臟並小腸疝氣大有補益蒼朮一斤用泔浸去皮切作片用生蔥白一斤切碎加鹽二兩同炒蒼朮黃色為度揀去蔥不用川椒微炒白茯苓去皮小茴香各四兩微炒上細末酒糊丸如梧桐子大每服五七十丸空心溫酒送下坎離丸滋腎水益元氣補下元不足去膀胱積熱知母一兩黃柏黃連各二兩上為末水丸如梧桐子大食前服又方出東垣蘭室方苦葶藶酒洗炒石膏半兩覺肚冷勿用薑黃一錢半苦參三錢黃柏酒炒各半兩知母酒炒黃連淨一錢肉桂三分上為極細末打薄糊為丸如梧桐子大每服一百丸空心下用食壓之茸附湯出危氏方能治精血俱虛榮衛耗損潮熱自汗怔忡驚悸肢體倦乏但是一切虛弱之症皆宜服之鹿茸去毛酒蒸一兩附子炮去皮臍一兩上㕮咀分作四處服水二盞生薑十片煎至八分去滓食前溫服椒附散出直指方專治腎氣上攻項背不能轉側亦治冷痹不仁熟附子末正川椒上每服附子末二大錢川椒二十一粒用白麵塞滿水盞半薑七片煎半盞去椒入鹽少許通口空心服療性熱虛羸補益用生地黃一石細切蒸之極熟以好酒一斗灑之於篩子上曝乾搗並手丸每食前含一丸如胡桃大咽令盡日三五度坎離丸黃柏酒炒知母酒炒各等分上為細末滴水為丸如梧桐子大每服一百丸至一百五十丸又方出本事方專治下部冷極臍下及小腹痛不可忍者一服取效赤石脂乾薑各十兩上二味為末麵糊為丸如豌豆大每服十丸至二十丸空心飯飲下日進三服主聰明調血氣令人強壯及主五臟益精去三蟲輕身不老變白潤肌膚暖腰腳出本草取葳蕤根花葉陰乾和漆葉為散服有熱不可服晉嵇紹有胸中寒疹每酒後苦唾服之得愈昔華他入山見仙人所服以告礬阿服之壽百歲也治男女傷中陰氣不足利血脈益精氣出本草用羊髓和酒服之集驗鹿茸丸出直指方治諸虛勞倦補養心腎滋養血氣鹿茸酥炙熟地黃當歸酒浸焙枸杞子附子炮酸棗仁慢火炒去皮遠志薑汁醃取肉炒沉香牛膝酒浸焙山藥炮蓯蓉酒浸焙各一兩麝香半兩上為末煉蜜丸如梧桐子大每服五十丸空心鹽湯下薯蕷散出千金方能補丈夫一切病不能具述也續斷一方用遠志茯苓一方用茯神薯蕷荊實一方用枸杞子牛膝菟絲子巴戟天杜仲各一兩蓯蓉二兩五味子山茱萸一方用防風蛇床子二分上為搗篩酒服方寸匕早晚日二夜一惟禁醋蒜外無忌腹疼加遠志茯苓便澀加柏子仁服三兩劑益肌肉亦可為丸每服三十丸日二夜一以頭面身體暖為度其藥和平不熱調五臟久服健力不可當婦人服之面生彩色人參丸一名青春丸出本事方能治後生丈夫婦人房事不節漸至虛損行步如踏空夜夢從高墜下及夢大水溺水諸般水夢並皆治之常服永無虛病雖一十歲人亦可服人參白茯苓地骨皮真者川牛膝去苗酒浸一宿川當歸去蘆酒浸一宿熟乾地黃各等分上為末煉蜜為丸如梧桐子大每服三十丸酒或鹽湯空心下常服只二十丸用三五匙乾飯壓下服三五日後飽飯後及臨睡時服局中雞蘇丸五十粒不嚼破熟水吞下每日須如此次又服前藥百病皆去雖百歲鬚髮不白牡蠣散一名黃耆散出德生堂專治諸虛不足及新病暴虛津液不固體常自汗夜臥即甚久而不止羸瘠枯瘦心忪驚惕短氣煩倦黃耆去苗土麻黃根洗各一兩牡蠣米泔浸刷去土火燒通赤上為粗散每服三錢水一盞半小麥百餘粒同煎至八分去滓熱服每日一服不拘時候一方入蔥白三寸煎治虛勞盜汗一方酒煎服治夢遺精淋澀一方有知母硇砂丸出聖惠方專治元氣虛冷臍腹疼痛硇砂一兩細研硫黃一兩細研水飛過自然銅一兩細研桃仁一兩湯浸去皮尖雙仁麩炒微黃乾蠍一兩炙黃木香一兩阿魏一兩面裹煨令面熟為度上為末入研了藥令勻燒粟米飯和丸如小豆大每日空心以鹽湯下十五丸陸杭膏出千金方治虛冷枯瘦身無精光虛損諸不足牛髓羊脂二升酥經心録用豬脂生薑汁白蜜各三升上先煎酥令熟次入薑汁次納蜜次納羊脂牛髓微火煎三三沸令薑汁水氣盡即膏成攪令凝溫酒隨人飲量不限多少服之令人肥健去熱一云治百病勞損風濕補益神效男女通服之小鹿骨煎出千金方治一切虛羸鹿骨一具碎一云獐骨枸杞子切二升上各以水一斗別器各煎汁五升去滓澄清乃合一器共煎取五升日進二服皆用大斗麋角丸出聖惠方能治五臟虛損腰腳疼痛久服益肌膚填骨髓好顏色耐寒暑祛風破氣髭鬢潤黑麋角屑一斤以酥拌炒微黃熟乾地黃巴戟黃耆牛膝人參去蘆頭獨活萆薢白茯苓桂心附子澤瀉肉蓯蓉酒浸一宿刮去粗皮炙乾續斷芎藭制檳榔當歸銼微炒防風鹿角膠搗碎炒令黃色白蒺藜微炒去刺以上各一兩上為末以生地黃汁一大盞酒一大盞相和入酥半合煎成膏和諸藥末若硬即用煉蜜同搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸加至四十丸鹿血丸治諸虛百損精血俱耗血少不能養筋精虛不能實骨筋骨痿弱面色黧黑耳鳴氣短目視昏花腰脊疼痛足膝酸弱步履艱難小便白濁或頻數但是一切虛損之症悉能治療婦人虛弱亦宜服之桑上寄生二兩鹿角鎊川續斷銼酒潤鹿茸麋茸去毛酒蒸麋角鎊附子炮去皮川烏炮去皮鍾乳粉陽起石煅川巴戟捶碎去心沉香不見火川牛膝去蘆酒浸川萆薢各一兩五味子二兩菟絲子淘酒蒸擂焙二兩宣木瓜二枚去皮瓤蒸爛椒紅去目及閉口者微炒出汗取紅半兩上為細末刺鹿血乘熱攪勻搗千百下丸如梧桐子大每服一百丸空心食前用鹽湯鹽酒任下婦人用淡醋湯下補益還少丸出簡易方服此藥大補虛損氣血凝滯目暗耳聾恍惚精神困倦脾胃怯弱飲食無味肌瘦體倦山藥牛膝各一兩酒浸一宿