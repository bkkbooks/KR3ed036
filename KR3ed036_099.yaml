body:
  text: 卷九十九諸風門癲癇附論夫癲癇之疾諸方所載並作一證治之愚謂癲與癇難以一概而論故癲者全歸於心癇者歸於五臟所謂癲者神不守舍狂言妄語如有所見動經年歲不得即愈若心經有損是為真病如心經蓄熱則當清心除熱如痰迷心竅使然又當下痰而寧其心志婦人因血壅迷心或因産後惡露上衝而語言錯亂神志不守者各當隨其證治之癇病者旋暈顛倒吐涎沫搐搦騰踴作馬嘶鳴多因挾熱著驚心動膽懾郁涎入心之所致也名曰馬癇以馬屬在午手少陰君火主之故其病生於心經病者暈眩四肢煩疼昏悶顛倒掣縱吐沫作羊叫聲多因少小臍瘡未愈數洗浴濕襲脾經之所致也名曰羊癇以羊屬未坤位足太陰濕土主之故其病生於脾經病者昏暈顛倒兩手頻伸作雞叫聲須臾即醒醒復發多因少小燥氣傷胃煩毒內作郁涎入胃之所致也名曰雞癇以雞屬酉足陽明燥金主之故其病生於胃經病者眩暈顛倒眼目相引牽縱急強作豬叫鳴吐涎沫食頃方已多因少小吐利挾風之所致也名曰豬癇以豬屬亥手厥陰心胞絡風木主之故其病生於右腎經病者眩暈顛倒目反口噤瘛瘲吐沫作牛吼聲多因少小濕熱傷肺涎留肺系遇燥熱則發動名曰牛癇以牛屬醜手太陰濕土主之故其病生於肺經夫癲癇病者皆因驚動使臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或少小感風寒暑濕或飲食不節逆於臟氣詳而推之三因備具風寒暑濕得之外驚恐震懾得之內飲食飢飽屬不內外三因不同忤氣則一傳遍五臟散及六腑溢諸絡脈但一臟不平諸經皆閉隨其臟氣證候殊分所謂象六畜分五聲氣色脈證各隨本臟所感所成而生證諸古方有三陽癇五臟癇六畜癇及至一百二十種癇以其稟賦不同臟腑強弱性理燥靜故諸證蜂起推其所因無越三條病由都盡矣三因方云五癇合屬五臟而無腎有胃者以腎屬鼠非畜養物神無主治故不作癇胃屬雞系六畜物故有象兼胃為五臟海非余府比又犬屬戌手少陽三焦經主之雖屬六畜無犬癇者以辰戌為魁罡四煞無處不興癇之象也方虎睛丸出千金方治風癲癇瘛瘲反張口出白沫或作豬聲不知人虎睛一對酒浸炙令黃入藥搗白茯苓去黑皮龍齒別研各一兩一分防葵銼秦艽去苗土升麻防己銼各一兩獨活去蘆頭三分遠志去心鬼箭羽白蘚皮各三分鐵精搗研防風去叉各一兩鬼臼貫衆去土木細辛去苗葉炒各三分大黃銼醋炒山茱萸人參各一兩白薇炒二兩一作白蘞天雄炮裂去皮臍銀箔別研各三分一作銀屑蛇蛻皮一尺炙凝水石別研石膏別研各一兩一分飛鴉頭三枚去喙毛炙麝香別研牛黃別研乾薑炮一作乾地黃芎藭露蜂房炙各半兩黃芩去黑心一兩上搗羅為末次將別研等藥入末中拌和令勻煉蜜丸如梧桐子大每服二十丸加至三十丸溫酒下日二夜一如心肝覺風熱上衝用竹瀝飲下一方有茯苓雄黃無芎藭飛鴉頭龍膽丸治癲癇狂悖迷亂心神恍惚四體抽掣吐沫嚼舌龍膽去土鉤藤升麻犀角鎊玄參黃芩去黑心白茯苓去黑皮防風去叉秦艽去苗土地骨皮銼大麻仁研膏同搗檳榔銼黃連去須炒馬牙硝研麥門冬去心焙龍齒別研甘草炙銼大黃銼炒天竺黃別研琥珀別研珍珠末別研各一兩青黛二兩別研蜣螂三十五枚去頭生用金箔七十片與丹砂同研牛黃研半兩蚱蟬三十五枚去頭足生用銀箔一百片與金箔丹砂同研鐵粉一兩一分別研虎睛一對酒蘸炙燥去皮搗丹砂三分別研入金銀箔同研上除十二味別研外余藥搗羅與研者藥末合研勻煉蜜和丸如緑豆大每服十丸食後煎人參茯苓湯下日三服小兒三丸至五丸防葵散治癲癇厥時發作防葵代赭人參鉛丹白殭蠶生豬齒茯神雷丸鉤藤虎骨遠志桂心防風各六分卷柏莨菪子光明砂升麻附子牡丹龍齒各一兩一分牛黃二分白蘞四分蚱蟬十四枚蛇蛻皮白馬眼睛各一具上治下篩酒服方寸匕日二亦可為丸良驗一方治風癲精神錯亂發作無時無莨菪子桂心二味有虎掌湯洗以生薑汁拌炒黃用羚羊角丸出聖濟總録治風癲癇羚羊角鎊屑角鎊遠志去心焙人參山芋茯神去木各一兩半生乾地黃焙乾另搗三兩防風去叉一兩三分金箔研銀箔研各一百片麥門冬去心焙鐵粉研天門冬去心焙各三兩水銀一分入金銀箔龍齒鐵粉五件同研水銀星子盡為度龍齒研一兩上將十味搗羅為末入別研者相拌令勻煉蜜和丸如緑豆大用桃柳枝湯下二十丸日二夜一或人參茯苓湯下亦得治百二十種風癲癇驚狂發即吐沫不識人者四月五月並宜服之紫石英芍藥龍骨一本用黃芩青石脂白蘚皮麻黃當歸甘草栝蔞根桂心人參各二兩牡蠣三兩大黃五兩上為散分作七裹每以大棗十枚水三升煮取二升半去滓下一裹大棗汁中煎取一升去滓頓服相去七日一服服干即瘥龍腦安神丸出濟生拔粹方治男子婦人小兒五積癲癇無問遠日近日發作無時服諸藥不效但服此藥無不痊愈茯神去粗皮取末人參去蘆頭麥門冬去心烏犀取末硃砂飛各二兩甘草取末桑白皮取末龍腦另研牛黃另研麝香研各三錢真地骨皮一兩馬牙硝另研一錢金箔三十五片上為細末煉蜜丸如彈子大金箔為衣如有風癇病多歲冬月用溫水化下夏月涼水化下不拘時候多歲病服如二三年病日進三服小兒一丸分作二服又治男子婦人虛勞身體發熱喘嗽新汲水一盞化開服其喘滿痰嗽立止又治男子婦人語澀舌強日進三服食後溫涼水化下五癇丸出醫方大成治癲癇發作不問久年新日病宜服之全蠍一錢去毒炒半夏二兩湯洗七次雄黃一錢半別研天南星炮一兩蜈蚣三條去頭足炙烏蛇一兩酒浸一夕去皮骨焙乾麝香二錢別研白附子半兩炮白礬一兩皂角四兩搗碎水半升將汁與白礬一同熬乾研白殭蠶一兩半炒去絲硃砂一分別研上為末薑汁煮麵糊丸如梧桐子大每服三十丸薑湯下五膽丸治心風狂走癲癇鯉魚膽雞膽狗膽豬膽羊膽各一個炙盡汁作一處蛇黃五兩火煅蘸膽汁盡為度上為末別以狗膽汁為丸如緑豆大硃砂為衣服十五丸以磨刀汁吞或只作末將磨刀水調亦可食後服蛇黃丹出三因方治五臟六腑諸風癲癇掣縱吐涎沫不識人事又治小兒急慢驚風蛇含四枚建盞內煅紅以楮樹汁一碗滓干天南星炮白附子辰砂別研麝香別研各半兩上為末糯米糊丸如梧桐子大每服溫湯磨化一丸量大小與服大人嚼細三五丸溫酒米湯任下抱膽丸出危氏方治男子婦人一切癲癇風狂或因驚恐怖畏所致者及婦人産後血虛驚氣入心並室女月脈通行驚恐蘊結此方纍曾經效本是忠懿王之子有疾忽得一僧授此服之即效本名靈妙觀音丹忠懿王得之未敢輕信忽有一風犬飼以此藥立效破犬腹而視其藥乃抱犬膽因易今名水銀二兩硃砂一兩細研黑鉛一兩半乳香一兩細研上將黑鉛入銚子內下水銀結成砂子次下硃砂滴乳乘熱用柳木槌研勻丸如雞頭大每服一丸空心井花水吞下病者得睡切莫驚動覺來即安再一丸可除根本治癲癇掣瘲出千金方鉛丹一斤飛鴟頭二枚上為末蜜丸先食服三丸日三劇者夜一稍加之乳朱丹一名二靈丹出濟生方治癲癇驚掣乳香別研硃砂細研水飛上用乳香熔化拌和硃砂為劑丸如龍眼大每服一丸側柏葉浸酒磨化蕩溫服不拘時候奪命散治壓風疾癲癇用青礞石好者一兩入甘鍋內同焰硝一兩拌勻用白炭火煅通紅須化盡為度冷則色如金取研為末每服一錢用薄荷自然汁入蜜調微溫服之良久其藥自裹痰逐下隨大便夾和稠黏如膠乃藥之功驅風丸一名驅風散出三因方治五癲百癇無問陰陽冷熱虢丹晉礬各一兩上用磚鑿一窠可熔二兩許先安丹在下次安礬在上以白炭五斤煅令炭盡取出細研以不經水豬心血為丸如緑豆大每服十丸至二十丸橘皮湯下一方為散溫酒調下大鎮心丹出三因方治一百二十種癲癇驚狂譫妄顛倒昏悶不知人噴吐涎沫及治心驚膽寒清醒不睡或左脅偏疼辰砂用黃松節酒煮龍齒用遠志苗醋煮上只取辰砂龍齒各等分為末豬心血為丸如雞頭大每服一丸以麥門冬葉豆燈心生薑白蜜水煎豆熟為度臨臥咽下小兒磨化半丸量歲數與之金砂丸出聖惠方治風癲邪癇等疾精神不守言語錯亂金五兩銼屑為藥匱丹砂三兩將金屑置以定州細泥合於內作一坑子置丹砂於金屑中心上下覆襯以盒蓋又用六一泥固濟以慢火養七日將出丹砂掘一地坑子同入淨濕土內單帛裹著在土中出火毒七日用上去金取砂出火毒細研取粉干控粟米飯爛研和拌得所丸如緑豆大每食後金銀湯下五丸中夜一服桃柳湯亦得其盒子用金者為佳甘遂散出危氏方治癲癇及婦女心風血邪用甘遂一錢為末以豬心取三管血三條以末多少和之將心批作兩片藥入在內再合線縛定外用皮紙裹濕慢火煨熟不可焦過取藥細研入辰砂末一錢和勻分作四丸每服一丸將所煨豬心煎湯化下再服別用豬心亦可過半如大便下惡物後調和胃氣神應丹出衛生寶鑑治諸癲癇用辰砂不拘多少細研水飛過候乾用豬心血和之得所以蒸餅劑裹蒸熟為度取出就熱便丸如梧桐子大每服一粒食後臨臥溫人參湯下不數服取效如神一方用金銀湯下陳蒲飲治卒發風癲狂癇用三年陳敗蒲一兩切細以水二升煎至七合去滓溫飲治癲癇並風狂久不瘥者出海上方用黃丹水上飛過不拘多少用蒸餅為丸如梧桐子大每服五十粒人參湯下日三四服牛黃丸出聖濟總録治風邪變成癲癇時時發動不知人事其心神風癲之狀發無常時每發則仆地吐涎沫無所覺知蓋由血氣皆虛精神離散魂魄失守風邪入於陰經故也又以胞胎之初其母卒大驚精氣並居能令子發癲其證與風癲大率相似牛黃別研真珠末別研琥珀別搗羅鐵粉別研天竺黃別研龍齒別研各半兩金箔七十片同水銀研銀箔七十片與水銀同研水銀與金箔同研犀角鎊丹砂與水銀金銀箔同研各半兩露蜂房龍膽去土升麻防風去叉黃芩去黑心鉤藤各半兩知母細切焙天門冬去心焙白芍藥茯神甘草炙銼菖蒲九節者米泔浸刮去皮切酒炒麥門冬去心焙各一分乾蠍酒炒一兩麝香別研人參各半兩上除別研石藥及麝香等外余藥搗羅與研藥再羅令勻煉蜜拌和得所更搗千杵丸如梧桐子大夜臥及食後煎新竹葉湯下十五丸至二十丸治癲癇發熱急狂走出本草以鐵漿服之治驚邪癲癇雞癇發熱狂走出本草取鳳凰臺石水磨之服是鳳棲止處腳下物如白石也治大風癲癇頭風濕癢毒在骨髓久服益氣耳目聰明輕身強志亦治腰膝中風毒出本草取蒼耳三月以後七月以前刈日乾為散夏水服冬酒服日二服每服散一二匕滿百日病當出如瘑疥或癢汁出或班駁甲錯皮起後乃皮落肌如凝脂令人省睡忌食豬肉米泔療癲癇出本草以野豬黃水研如棗核日二服效治癲癇用艾於陰囊下穀道正門當中間隨年歲灸之癲附論夫黃帝問曰人生而病癲疾者安所得之岐伯對曰此得之在腹中時其母數有所大驚也氣上而不下精氣並居故令子發為癲疾病在諸陽脈且寒且熱名曰狂刺之虛脈視分盡熱病已而止病癲初發歲一發不治月一發不治四五日一發名曰癲病刺諸分其脈尤寒者以針補之病已止癲疾始生先不樂頭重直視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而已癲疾始發而反強因而脊痛候之足太陽陽明太陰手太陽血變而已癲疾始作而引口啼呼甲乙作喘悸者候之手陽明太陽右強者攻其左左強者攻其右血變而止癲疾者常與之居察其所當取之處病至視之有過者即瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者尾骶也治癲者病發而狂面皮厚敦者死不療凡癲發則臥地吐涎沫無知若強掠起如狂及遺糞難療癲疾脈搏大滑久自已脈沉小急實死不療小牢急亦不可治脈虛可療實則死矣厥成為癲疾五臟不平六腑閉塞之所生也厥成為癲故附厥於此條也陰衰發熱厥陽衰發寒厥黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥問曰熱厥必起於足下者何也對曰陽氣起於足五趾之表集於足下而聚於足心故陽勝則足下熱也問曰寒厥必起於趾而上於膝者何對曰陰氣起於五趾之裡集於膝下而聚於膝上故陰氣勝則從五趾至膝上寒其寒也不從外皆從內也厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也陰氣勝於上則下虛下虛則腹滿腹滿則下氣重上而邪氣逆逆則陽氣亂亂則不知人巨陽之厥腫首頭重足不能行發為眩僕陽明之厥癲疾欲走呼腹滿不能臥面赤而熱妄見而妄言少陽之厥暴聾頰腫而熱脅痛髀不可以運太陰之厥腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥舌乾溺赤腹滿心痛厥陰之厥小腹腫痛䐜脹經溲不利好臥屈膝陰縮腫胻內一作外熱盛則瀉之虛則補之不盛不虛以經取之上寒下熱先刺其項太陽久留之已刺則火慰項與肩甲令熱下冷乃止所謂推而上之者也上熱下寒視其虛脈而陷下於經絡者取之氣下而止所謂引而下之者也刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也所謂二陽者二刺陽也溫病熱於腎中赤為痙小兒病癇熱盛亦為痙凡風喑暴尸厥及鬼魘不寤皆相似宜精察之故經言厥久則成癲是以知似也癲病有五一曰陽癲發時如死人遺溺有頃乃解二曰陰癲坐初生小時臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反急羊鳴食頃方解由熱作汗出當風因以房室過度醉飲飽滿行事令心氣逼迫短氣脈悸得之四曰濕癲眉頭重痛身重坐熱沐發濕結腦汗未止得之五曰熱癲發時反目口噤手足相引身皆熱坐小時膏氣腦熱不和得之骨癲疾者頷齒諸輸分肉皆滿而骨倨強直汗出煩悶嘔多涎沫氣下泄不利筋癲疾者身拳攣急脈大刺項大經之大杼嘔多涎沫氣下泄不療脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿俠項灸太陽又灸帶脈於腰相去三寸諸分肉本輸嘔多涎沫氣下泄不治癲狂之疾何以別答曰狂之始發少臥不飢自高自貴妄笑好歌樂又曰癲者精神不守言語錯亂甚則登高罵詈或至狂走癲者發則臥地嚼舌吐沫手足搐搦或作六畜之聲頃刻則蘇癲者邪入於陰則癲狂者邪並於陽則狂癇者邪干於心其處方用藥亦皆相類凡人患癲狂者叫呼打人者皆心經有熱當用鎮心藥加大黃與之瀉數行然後用安神及風藥但得寧靜即是安妥不可見其瘦弱減食便以溫藥補之補之病必再作當戒之緩緩調治飯食可也因驚癲狂軍中有犯法者褫衣將受刃忽然得釋神失如癡與驚氣丸一粒服訖而寐及覺病已失矣風癲者由血氣虛風邪入於陰經故也人血氣少則心虛而精神離散魂魂妄行因為風邪所傷故邪入於陰則為癲疾夫順牆而臥風利吹之人必發癲癇及體重人臥春夏向東秋冬向西此是常法方麝香丸出聖濟總録治風癲瘛瘲口眼翻張口吐白沫或喉中作聲不知人麝香別研半兩虎睛一對炙令燥去外皮防風去叉一兩龍齒別研黃芩去黑皮鐵粉研鬼臼各三兩人參大黃銼醋炒各一兩牛黃別研一分秦艽去苗土雄黃別研各二兩獨活去蘆頭凝水石別研各一兩茯神去木一兩一分升麻三分石膏別研一兩一分遠志去心半兩天雄炮裂去皮臍用一兩一分白蘚皮三分露蜂房炙一分細辛去苗葉三分貫衆搗去土末鬼箭羽各十兩蛇蛻炙一分金箔銀箔各四十九片研上先將一十八味搗羅為末後入別研九味和勻煉蜜為丸如梧桐子大每服十五丸至二十丸空心日午臨夜溫酒下虎睛丸出聖惠方治風癲口眼開張多吐白沫或作惡聲恍惚虛悸虎睛一對酒浸炙微黃茯神一兩龍齒一兩石膏一兩防風一兩去蘆頭黃芩一兩秦艽一兩去苗川升麻一兩漢防己一兩鐵粉一兩細研川大黃一兩銼碎微炒人參一兩去蘆頭防葵一兩獨活一兩遠志三分去心白蘚皮三分鬼臼三分細辛三分銀箔金箔各五十片細研天雄三分炮裂去皮臍乾薑半兩炮製銼芎藭三分麝香半兩細研露蜂房半兩牛黃半兩細研蛇蛻皮十條燒灰上為細末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大不計時候以溫酒下二十丸薄荷湯下亦得麥門冬丸出聖濟總録治風癲狂亂失心安魂定志麥門冬去心焙一兩虎睛一對微炙龍齒一兩研金箔一百片研銀箔一百片研石膏研升麻枳實麩炒生薑切炒白茯苓去黑皮人參銼各一兩玄參葳蕤炒芍藥甘草炙銼遠志去心各三兩柏子仁生用薤白細切焙乾牛黃別銼各半兩上除虎睛並別研六味外余搗羅再與研者同羅為末煉蜜和丸如梧桐子大每服二十丸煎地骨皮湯下日三夜一不拘時候茯神丸出聖濟總録治風癲瘛瘲神魂不定茯神去木龍骨龍齒龍角三味去土一處龍膽去苗土鐵精搗研入前三味同研蔓荊實揉去白皮各一兩乾薑炮人參遠志黃連去須炒各三分大黃銼醋炒一兩半芎藭白芷當歸切焙黃芩去黑心桂去粗皮各半兩上先將一十三味搗羅為末入別研者四味和令勻煉蜜丸如梧桐子大每日空心及日午食前用蜜湯下十五丸漸加至二十丸銅青丸治五癲侯氏黑散出金匱方療風癲大風四肢煩重心中惡寒不足者菊花四十兩防風白朮各十兩茯苓細辛牡蠣熬鍾乳研礜石泥裹燒半日人參乾薑桂心芎藭當歸礬石如馬齒者燒令汁盡各三分黃芩五分上搗合下篩以酒服方寸匕日三忌桃李雀肉胡荽青魚鮓酢物生蔥生菜一方有桔梗八分無鍾乳礬石以溫酒下之禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食自能助藥力治風癲引脅牽痛發作則吐耳如蟬鳴出肘後方用天門冬去心皮曝乾搗篩酒服方寸匕若人久服能長生治風癲及百病出肘方用麻仁四升水六升猛火煮令牙生去滓煎取七升旦空心服或發或不發或多言語勿怪之但人摩手足須定凡進三劑愈麻仁者今人績布麻種也治癲狂疾出肘後方用防葵子末溫酒服一刀圭至二三服身潤又小不仁為候凡使防葵勿誤用狼毒其防葵在蔡州沙土中生採得二十日便蚛用之唯輕為妙欲使先須揀去蚛末後用甘草湯浸一宿漉出曝乾用黃精自然汁一二升拌了土器中炒令黃精汁盡治卒癲疾方出肘後方用葶藶一升搗三千杵取白犬倒懸之以杖犬令血出承取以和葶藶末丸如麻子大一丸三服取瘥溫水下蠶紙散出肘後方治風癲狂發欲走或自高貴稱神聖皆應備諸火灸百會風池膏肓三里效乃得永瘥耳若或悲泣呻吟者此為邪魅非狂依邪方治之用生蠶紙燒灰酒水任下續命風引湯出千金方治中風癲眩不知人狂言舌腫出麻黃芎藭石膏人參防風各三兩桂心甘草獨活各二兩防己附子當歸各二兩杏仁三十枚陳姜五兩上㕮咀以酒三升水一斗合煎取四升分四服日三夜一鴟頭丸治風癲葶藶子三分鉛丹虎掌烏頭栝蔞根各三分甘遂天雄蜀椒大戟各三分白朮一分鐵精䕡茹各一兩鴟頭一枚上為末蜜丸如梧桐子大溫酒下二丸日三服茯神丸治風癲引脅肋牽痛發作吐沫耳中虛鳴茯神去木一兩一分龍骨別研龍角別研各一兩龍膽去土鐵精搗研蔓荊實炒各一兩一分人參遠志去心黃連去須炒大黃銼醋炒各一兩芎藭當歸切焙各一兩黃芩去黑心一兩上先將一十味搗羅為末入別研者相拌令勻煉蜜丸如梧桐子大食後煎生薑枳殼湯下十丸加至十五丸一方以溫酒下鉛丹丸治風癲發時吐涎起臥不定及大小便不能知覺鉛丹一兩栝蔞根一兩虎掌半兩湯洗七遍生薑汁拌炒令黃䕡茹一兩白朮半兩鐵粉二兩細研鴟梟頭一枚燒為灰大戟半兩銼微炒甜葶藶一兩隔紙炒令紫川椒半兩去目及閉口者微炒去汗天雄半兩炮去皮臍烏頭半兩炮裂去皮臍上為末煉蜜和丸如梧桐子大不計時候以溫酒下二十丸治發癲口邊白沫動無常者秦艽人參防葵一作防風茯神一作牡丹甘草各二兩鉛丹一兩貫衆一枚上㕮咀以水九升煮取三升半分三服六生散一名菖蒲散療風癲菖蒲蒴藋一作藜蘆防風茵芋商陸根蜀附子炮各三兩上搗篩酒服五錢匕日再服不知稍增以知為度忌豬肉冷水羊肉餳牛大肉蒜雄黃丸治風癲發則欲死並理五驚諸癇雄黃別研雌黃別研珍珠末別研各一兩丹砂別研一兩水銀各二兩先以蒸熟棗肉二兩研馬尾羅內擦過用柳木椎研令青色水銀星盡為度鉛丹點醋炒一方熬令成屑上將五味各研如粉後合研用棗肉膏研不見水銀星為度更入棗膏入臼更搗千杵丸如大麻豆每服二丸至三丸人參茯苓湯下日二夜一食後服之一方治風癇以蜜為丸用薑棗湯下古今録驗云療五癲牛癲則牛鳴馬癲則馬鳴狗癲則狗鳴羊癲則羊鳴雞癲則雞鳴病五癲狂病者腑臟相引盈氣寒厥不識人氣爭言吐沫久而不得痊者雄黃丹砂丸治五癲病宜服之及治風癲失性倒臥惡聲吐沫口噤方名雄珠丹雄黃丹砂雌黃各二兩碎同用夾生絹袋貯又入十兩蜜內重湯煮待蜜赤色滴如珠引若線為度取藥囊出河水洗滌淘漉出曝乾入乳鉢中研如粉為度其蜜即丸藥用之最妙黑鉛二兩大火化用鐵匙攪掠去如塵垢者用精者一兩將無油淨器中下水銀及鉛同銷熔攪令勻瀉於熟鐵器內候冷先將前三味石藥乳鉢內研次入鉛同研取勻甚良水銀一兩上各如前修制畢便將前煮丹砂雄黃雌黃下之余蜜再重湯煮少少點入藥中漸漸和勻為丸如大麻粒每用桃柳桑木嫩條各長七寸銼以水一升煎至六合去滓分溫下丸藥空心午時臨臥時下三丸至五丸小兒一丸至二丸莨菪子散療五癲反側羊鳴目翻吐沫不知痛處豬卵一具陰乾百日莨菪子三升牛黃八分研鯉魚膽五分桂心十分研上切以清酒一升漬莨菪子曝乾盡酒止乃搗合下篩酒服五分七日再當如醉不知稍增以知為度忌生蔥鐵粉散治風癲心神不定狂走無恆鐵粉馬牙硝光明砂各一兩鉛霜半兩金箔五十片上為散不計時候以生地黃自然汁調下一錢忌生血物水銀丸治風癲心神憒亂狂走不定言語倒錯水銀一兩硫黃一兩與水銀結為砂子硃砂定粉黃丹各一兩上細研入瓷罐子內以泥封頭候乾以慢火養一復時取出入金銀箔各五十片雄黃鉛霜各一分同研令細以糯米飯和丸如緑豆大不拘時候以豆淋酒下五丸丹砂煎治風癲疾時發時省涉歷年月丹砂細研水飛濾過後焙乾炙研如粉三兩石膏五兩細研黃連去須搗篩一斤重生地黃不計斤兩研取自然汁三升不得入水上以清水一斗煮石膏黃連取五升淨滓子次用生地黃汁又煎之如稠餳始下火取丹砂粉投入勻攪百餘遍貯於不津器中復攪待冷即住每日兩度以溫水調服約如半彈丸大服藥後只得吃淡飯蔓荊菜等鐵精散療五癲鐵精一合芎藭防風各一兩蛇床子五合上合搗篩酒服一錢匕日三有效芎藭湯出聖惠方治風癲引脅牽痛發作則吐耳如蟬鳴狂走恍惚芎藭藁本䕡茹各五兩上㕮咀內酒一斗煮取三升頓服之羸者分再服取大汗一方以水煎不拘時候溫服天門冬煎出千金方治風癲卒發仆地口吐涎沫不省人事天門冬淨洗浸兩日去心細切片七斤生地黃三十斤肥者淘洗細切上細切都於木臼中搗爛卻入大沙盆內爛研壓取汁絞滓干別收將滓更研極爛入煎湯一斗研攪令勻又壓滓干再研極細入湯八升壓滓又再研入湯六升壓令盡干無味即住取第二第三度研入者汁同煎至一斗次入第一藥汁煎成煎若稠餳即止每服一匙用酒化下或桃柳湯溫水化下食後服烏巴丸出經驗良方治癲邪結熱狂亂不辨尊卑吼叫醜罵用巴豆五粒去殼烏梅五個去核焙乾同研勻滴水為丸如粟米大硃砂為衣大人三五丸加至十五丸量大小加減淡薑湯夜臥吞下通利三五行病去白粥補之鬱金丸出危氏方治癲狂可畏數年不愈多因驚憂得之痰涎留於心竅蟬肚鬱金七兩真蜀川來者明礬三兩上為末薄糊為丸如梧桐子大每服五十丸湯水任服初服覺心胸間有物脫去神氣灑然再服稍蘇多服此藥大能去痰一方治癇用生薑汁糊為丸仍以生薑湯送下治諸癲風等疾用鯉魚一斤治淨切成塊用明礬末四兩醃一兩日煎吃其疾必愈莨菪丸出聖濟總録治風癲如才得病者服藥三日愈間日發者十日愈五日發者二十日愈半年一發者服一月愈用莨菪子淘去浮者三升以新汲水淘三十遍浮者盡去生研如膏入酒一升同研絞取酒又研如膏更入酒一升研絞取酒又研如前絞取酒都及三升更濾一遍入無油淨鐵器中煎煎成卻將莨菪滓炒令焦黃干搗羅為末待其煎成即漸漸少加末和煎令可丸如梧桐子大空心午時夜臥各用溫酒下十丸如未覺效加至十五丸額上手中從文理中赤是覺效也即減藥服之凡癲疾發則仆地吐涎沫無知強掠起如狂及遺糞者難治瓜蒂散出直指方治風癲宜服此藥吐之用瓜蒂末一錢熟水調下吐痰如吐不止者以真麝香少許溫水服之一方獨聖散治諸風隔實諸癇痰涎津液湧溢雜病亦然瓜蒂一兩上銼如麻豆子大炒令黃色為細末每服量虛實久新或三錢藥末茶一錢酸齏汁一盞調下若用吐法天氣晴明陰晦勿用如病卒暴者不拘於此法吐時辰午已前內經曰平旦至日中天之陽陽中之陽也論四時之氣仲景曰大法春宜吐是天氣在上人氣亦在上一日之氣卯辰寅候也故宜早不宜夜也先令病人隔夜不食服藥不吐再用熟齏水投之如吐風癲病者加全蠍半錢微炒如有蟲者加狗油五七點雄黃末一錢甚者加芫花末半錢立吐其蟲如濕腫滿者加赤小豆末一錢此不可常用大要辨其虛實實則瓜蒂散虛則梔子豉湯滿加厚朴不可一概用之吐罷可服降火利氣安神定志之劑治卒發癲狂出本草用經死繩燒為末服三指撮三年陳蒲水煮服之亦佳治癲狂不能語不識人者出本草以生驢指和酒服三升良治驚悸癲邪安神定魄強志出本草用天子籍田三推犁下土水服治邪狂癲大叫奔走蝦蟆一枚大者去腸中滓令淨將腸胃卻入腹中入瓶子中固濟漸以火燒通赤以土罨定隔日取出入麝香一錢用同研令細每服新汲水調下一錢治風痰癲狂除瘟痹用天門冬末服方寸匕日三無問山中人間常發久新釀酒服之治狂癲不識人不能語者以水服伏龍肝方寸匕導引法養生方云治咳逆胸中病寒熱癲疾喉不利咽乾咽塞還向反望不見七通又以兩手承鹿盧倒懸令腳反在其上元愈頭眩風癲坐地舒兩腳以繩絆之以大繩絆訖拖鹿盧上來下去以兩手挽繩使腳上頭下不使離地自極十一通愈頭眩風癲久行身臥空中而不墜落
