body:
  text: 卷三百二十六婦人諸疾門腳氣附論夫婦人腳氣與丈夫不同男子則腎臟虛弱為風濕所乘女子以胞絡氣虛為毒所搏是以胞絡屬於腎也腎主於腰腳又肝脾腎三臟經絡起於十足指若臟腑虛損則風邪先客於腳從下而上動於氣故名腳氣也此皆由體虛或當風取涼或久坐卑濕或産後勞損或患怒傷肝心氣滯致令月候不通因其虛傷風毒搏於肌骨則令皮膚不仁筋骨抽痛五臟不遂六脈拘攣或即冷痛或即腫滿兩腳痹弱或舉體轉筋目眩心煩見食即吐精神昏憒肢筋煩疼小便赤黃大便祕澀並皆其證也其婦人腳氣治之與丈夫不同者以其氣血不調懷胎難産崩傷之異是以褚澄療寡婦師尼與妻妾殊別即其義也凡婦人有腳氣疾者必無生育凡頭痛身熱肢節疼大便祕或嘔逆而腳屈弱者腳氣也輕者可與香蘇散加木瓜檳榔生薑煎服然後隨證治之要知有腳氣之人先從腳起或緩弱痹疼或行起忽倒或兩脛腫滿或腿膝枯細或心中忡悸或小腹不仁皮頑不知有無也或舉體轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠疼皆腳氣候黃帝所謂緩風濕痹是也頑弱名緩風疼痛為濕痹寒中三陽所患必冷小續命湯主之煎成入生薑自然汁最甚快暑中三陰所患必熱小續命湯去附子減桂一半主之大煩躁者紫雪最良若無紫雪以自合薄荷煎冷水調服極妙大便祕者脾約丸麻仁丸三和散主之仍針灸為佳服補藥與湯淋洗皆醫之大禁也又云若産後熱悶氣上轉為腳氣者蓋由産臥血虛生熱復因春夏取涼過多地之蒸濕因足履之所以著為腳氣其狀熱悶瘛瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯兩三劑必愈若誤以逐敗血藥攻之則血去而疾益增矣陳無擇謂腳氣固是常病未聞産後能轉為者往往讀千金見産婦多有此疾之語便出是證設是熱悶氣上如何便服小續命湯此藥本主少陽經中風非均洽諸經腳氣要依腳氣方論陰陽經絡調之方紫蘇散治婦人風毒腳氣腹內壅塞痰飲不思飲食腳腫一切皆治之紫蘇莖葉木通桑白皮茴香根各一兩枳殼二兩羌活獨活荊芥穗木瓜青皮各半兩大腹子十個甘草半兩上㕮咀每服三錢水一盞姜三片蔥白一莖煎至七分去滓溫服佳薏苡仁散治婦人腳氣緩弱及頑痹腫滿心下急大便澀薏苡仁防風豬苓川芎防己檳榔郁李仁大麻仁各一兩桑白皮三兩枳實三分甘草半兩羚羊角屑一兩上為散每服三錢水一盞煎至七分去滓放溫服牛膝散治婦人腳氣浮腫心神煩悶月候不通川牛膝羚羊角檳榔大黃炒芒硝各一兩防己桂心牡丹皮赤芍藥甘草各三兩桃仁五粒制一方有當歸三分上為粗末每服三大錢水一盞煎至七分去滓溫服利下惡物為度亦要相其強弱用之防風散治婦人腳氣腫滿疼痛筋脈拘急防風一兩去蘆頭五加皮二兩薏苡仁二兩羌活一兩附子一兩炮去皮臍酸棗仁一兩微炒枳實三分麩炒微黃甘草半兩炙微赤銼芎藭一兩川大黃三兩銼碎微炒當歸一兩銼微黃羚羊角屑一兩上為散每服四錢水一中盞煎至七分去滓食前溫服大腹皮散一名大腹子散治婦人風毒腳氣肢節煩疼心神壅悶大腹皮一作大腹子紫蘇木通桑白皮羌活荊芥赤芍藥青皮木瓜獨活各一兩枳殼二兩上㕮咀每服四錢水一盞姜五片蔥白七寸煎至七分去滓空心溫服赤茯苓散治婦人腳氣腫滿腹內妨悶月水不通四肢疼痛服之赤茯苓一兩木通一兩紫蘇莖葉一兩牛膝一兩去苗木香半兩防己半兩檳榔一兩桂心半兩鱉甲一兩塗醋炙令黃去裙赤芍藥半兩川大黃二兩銼碎微炒上為散每服四錢以水一中盞生薑半分煎至六分去滓食前溫服桑白皮散出聖惠方治婦人腳氣盛發兩腳浮腫小便赤澀腹脅脹滿氣滿坐臥不得並宜治之桑白皮郁李仁各一兩木香防己大腹皮各半兩紫蘇子木通檳榔青皮各三分赤茯苓二兩上㕮咀每服三錢水一盞姜三片煎至七分去滓溫服羚羊角丸出聖惠方治婦人腳氣上衝喘急煩悶兩腳不仁小腹頑痹頭面浮腫時復心悶便難常澀羚羊角屑一兩漢防己半兩薏苡仁一兩牛膝一兩去苗芎藭一兩川大黃一兩銼碎微炒獨活半兩大麻仁一兩木香半兩郁李仁一兩湯浸去皮微炒枳實一兩麩炒微黃上為末煉蜜和搗五七百杵丸如梧桐子大每服三十丸溫酒下食前木香散出聖惠方治婦人腳氣卒發衝心悶亂木香半兩郁李仁赤芍藥大腹皮紫雪各一兩桑白皮桂心檳榔茯苓各三分上㕮咀每服三錢水一盞姜三片煎至七分去滓溫服紅藍花散出聖惠方治婦人腳氣心神煩亂紅藍花一兩柴胡一兩半去苗羚羊角屑赤芍藥各一兩桑根白皮二兩銼檳榔紅雪各二兩甘草三分炙微赤銼紫蘇莖葉一兩上為散每服四錢水一中盞入生薑半分煎至六分去滓溫服不計時候牛膝散出聖惠方治婦人腳氣緩弱無力兼軟風牛膝一兩去苗附子炮裂去皮臍仙靈脾萆薢羌活防風去蘆頭大腹皮銼各一兩桑根白皮一兩銼郁李仁一兩湯浸去皮微炒上為散每服四錢水一中盞入黑豆五十粒生薑半分煎至六分去滓每於食前溫服木瓜丸出聖惠方治婦人腳氣衝心悶亂腹脅脹滿不能下食木瓜二枚蒸熟去皮子木香一兩檳榔二兩草豆蔻一兩去皮青橘皮湯浸去白瓤焙桂心各三分當歸銼微炒郁李仁湯浸去皮微炒各半兩桃仁一兩湯浸去皮尖雙仁麩炒微黃上為末煉研木瓜和丸如梧桐子大溫酒下三十丸不計時候半夏散出聖惠方治女人腳氣發動心腹脹滿飲食不下嘔逆不止半夏陳皮人參大腹皮桂心各三分檳榔一兩赤茯苓紫蘇各一兩半上㕮咀每服四錢水一盞半姜三片煎至七分去滓溫服一方有木通犀牛散出聖惠方治女人腳氣忽發衝心悶亂四肢煩疼有熱者犀牛角木香各半兩紫蘇莖葉白茯苓檳榔各一兩赤芍藥紅花各三分紅雪一兩半上㕮咀每服四錢水一盞煎至七分去滓溫服坐拿散出聖惠方治婦人腳氣厥冷血氣不調坐拿一兩狼毒一兩旋旋炙令酥沉香紫蘇子羌活蘿蔔子微炒杉木節各三分銼用乳香炒桂心半兩上為散每服用水煎木瓜紫蘇莖葉湯調下二錢每於食前服蒼朮丸出永類鈐方治諸證退後只有腳攣痛不能行以蒼朮丸治之效此藥大治乾溼腳氣筋脈拘攣疼痛不能行履兼補下部乳香沒藥各二錢別研川牛膝青鹽各半兩研熟艾四錢川烏三錢全蠍一錢炒上除研藥為細末入研藥令停以木瓜一個大者切一頭留作蓋去瓤入上件藥於木瓜內將蓋簽定安木瓜於黑豆中蒸令極爛取出去皮連藥研成膏卻入生蒼朮末拌勻得所丸如梧桐子大每服五十丸空心用木瓜湯下或溫鹽酒亦得一日三服忌血與蒜大便祕者可與七宣丸神功丸七聖檳榔丸三和散服效昔有婦人病發熱自汗心煩身體骨立足痛拘攣不能屈伸飲食不進雖老醫亦不能療余治之見六脈弱似勞實非勞也似腳氣非止腳氣但當調脾生血其熱必退然後功足則可望安遍尋諸方皆無對證之藥遂處四白散子與服不半劑熱退能食又處蒼朮丸繼之筋脈伸足能行而愈治婦人腳氣衝心悶亂不識人宜服此藥出聖惠方紫蘇莖葉松節各二兩吳茱萸半兩檳榔乾木瓜各一兩陳皮三分上㕮咀每服四錢水一盞煎至一半入童子小便二合再煎三沸溫服紅雪散出聖惠方治女人腳氣臟腑氣壅胸膈滿悶腳膝煩痛紅雪一兩半赤芍藥半兩茜根半兩銼桂心一兩生乾地黃一兩紅藍花三分上為散每服四錢以水一中盞煎至六分去滓食前溫服治婦人腳氣卒發衝心煩悶氣急大便苦難小便赤澀心神熱躁宜服出聖惠方紅藍花三分生黑豆皮二合川大黃三分銼碎微炒上以水一盞半煎至一盞去滓食前分溫三服治腳赤腫出聖惠方荊芥石膏地龍炒薄荷各等分上銼散生薑三片蜜少許煎服腰腳疼痛附論夫腎主於腰腳女人腎臟繫於胞絡若勞傷腎氣虛弱而風冷客於胞絡邪氣與真氣交爭故令腰腳疼痛也凡婦人腰胯痛兩腳麻木惡寒喜暖內經曰風寒濕合而為痹先可服除濕丹七八十丸量虛實以意加減次以禹功散投之瀉十餘行清冷積水青黃涎沫為驗復用長流水煎生薑棗同五苓散服之風濕散而氣血自和也方附子丸出聖惠方治婦人血風流注腰腳骨節痠疼不可忍附子三分炮裂去皮臍牛膝一兩去苗海桐皮銼桂心延胡索安息香各半兩天麻羚羊角屑芎藭當歸各三分白芷半兩木香半兩乾蠍一分微炒酸棗仁三分微炒羌活三分防風三分去蘆頭漏蘆一兩上為末煉蜜和搗三五百杵丸如梧桐子大每於食前以暖酒下三十丸虎骨丸出聖惠方治婦人血風流注腰腳骨節疼痛不可忍虎脛骨塗酥炙令黃檳榔敗龜塗酥炙令黃各一兩防風去蘆頭附子炮裂去皮臍赤芍藥麒麟竭各半兩當歸川大黃銼碎微炒三分桂心沒藥地龍炒令微黃各半兩牛膝一兩去苗木香海桐皮銼桃仁湯浸去皮尖雙仁麩炒微黃各三分上為末煉蜜和搗三五百杵丸如梧桐子大每於食前溫酒下二十丸酸棗仁散出聖惠方治婦人血氣風虛腰腳疼痛頭目昏悶食少無力者服之酸棗仁炒川牛膝當歸各三分羌活桂心防風木香海桐皮杜仲續斷粉草附子萆薢各二分川芎二分上㕮咀每服四錢水一盞半姜三片煎至七分去滓溫服骨碎補散出聖惠方治婦人血風氣攻腰腳疼痛腹脅拘急肢節不利宜服骨碎補炒萆薢川牛膝去苗桃仁湯浸去皮尖麩炒黃附子炮裂去皮臍川芎各三分枳殼半兩一作枳實上為粗末三錢水大盞姜三片棗一個煎至七分去滓食前熱服一方無棗仙靈脾散出聖惠方治婦人血氣攻注腰腳疼痛仙靈脾一兩羌活海桐皮牛膝去苗當歸芎藭骨碎補去毛延胡索桂心木香各三分桃仁一兩湯浸去皮尖雙仁麩炒微黃菴䕡子枳殼各三分檳榔一兩蛜𧌴半兩微炒麝香一分細研入上為細散每服食前以豆淋酒調下一錢藁本散出聖惠方治婦人血脈流注腰腳疼痛不可忍宜服藁本一兩半狗脊一兩去毛沒藥天麻麒麟竭蟬殼微炒骨碎補桂心各一兩虎脛骨敗龜穿山甲以上各二兩各塗醋炙令黃焦麝香半兩研入上為細散每服以生薑黑豆淋酒下二錢空心服萆薢丸出聖惠方治婦人血風腳腰背節痠疼筋脈拘急行履艱難兩脅抽痛萆薢銼牛膝去苗當歸石斛去根銼附子炮裂去皮臍各一兩虎脛骨一兩半塗醋炙令黃防風去蘆頭丹參赤芍藥桂心酸棗仁杜仲去粗皮炙黃銼各三分上為末煉蜜和搗三二百杵丸如梧桐子大每日空心及晚食前以溫酒下三十丸琥珀散出聖惠方治婦人血風攻注腰腳疼痛經絡滯澀四肢煩疼宜服之琥珀牛膝去苗當歸凌霄花赤芍藥沒藥各一兩地龍半兩微炒水蛭一兩炒令黃焦麝香一分細研入桃仁一兩半湯浸去皮尖雙仁麩炒微黃上為細散每於食前以溫酒調下二錢敗龜散出聖惠方治婦人風毒流注腰腳疼痛行立艱難敗龜二兩塗醋酥炙令黃白殭蠶一兩微炒沒藥半兩薏苡仁當歸銼微炒杜仲去粗皮炙微黃銼各一兩桂心乳香地龍微炒各三分去土用虎脛骨一兩塗酥炙令黃上為細散每於食前以暖薄荷酒調下二錢牛膝散出聖惠方治婦人腰腳風冷疼痛久不瘥牛膝去苗敗龜塗酥炙令黃各二兩虎脛骨塗酥炙令黃沒藥羌活當歸桂心各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每於食前溫酒下三十丸海桐皮丸出聖惠方治婦人腰腳風冷疼痛行立無力宜服海桐皮銼牛膝去苗熟乾地黃杜仲去粗皮炙微黃銼各一兩桂心石斛去根銼各三兩上搗羅煉蜜丸如梧桐子大每於空心及晚食前以溫酒下三十丸附子散出聖惠方治女人腰腳積年疼痛不瘥附子炮