寸匕日三忌舉重房勞冷食一方以酒服二錢妙硫黃散治産蓐努用力太過陰迸下脫硫黃烏賊魚骨各半兩五味子三銖一作五倍子上治下篩以粉其上良日再三粉之當歸散治同前當歸銼微炒黃芩各二兩蝟皮半兩牡蠣二兩半燒為粉芍藥一兩六銖上治下篩酒服方寸匕日三服禁舉重良一方食前暖酒調下二錢治婦人陰挺出下脫方皂莢去皮子炙焦黃半夏炒令黃大黃細辛各一兩蛇床子一兩半上搗羅為末薄絹袋盛如指長納陰中日二易之硫黃湯治産勞玉門開而不閉方硫黃四兩吳茱萸一兩半菟絲子一兩六銖蛇床子一兩上為散以水一升煎二方寸匕洗玉門日再洗磁石散治子宮不收名瘣疾有痛不可忍者用磁石酒浸火燒為末糯米粥丸梧子大每服二十丸空心滑石湯下一方為散溫酒調服一錢治陰挺出下脫鐵粉散治同前當歸磁石酒浸鐵粉各等分上為末米飲調下隔夜用角藥次日服此角藥用鐵屑螺青為末磨刀水調敷玉門上矣治婦人陰挺出下脫方桂心一方作川椒吳茱萸一兩生用戎鹽二兩上藥並熬令色變搗羅為末以綿裹如指大納陰中日再易之甚妙又方川椒生用川烏頭生用白芨各半兩上搗羅為末綿裹一錢納陰中深三寸腹中熱即止來日再用之又方蛇床子五兩烏梅二七枚上以水五升煮取三升去滓稍熱洗之每日夜三五度用又方川烏頭生用白芨各一兩上搗羅為末綿裹一錢納陰中令入三寸腹內熱即止來晨再用又方出聖惠方硫黃烏賊骨各半兩上搗羅為末敷方又方出聖惠方用鐵精細研以羊脂調布裹火令熱尉之以瘥為度治産後陰下脫方出聖惠方用蛇床子一升布裹炙尉之亦治産後陰中痛又方出聖惠方用敝帚頭燒為灰酒服方寸匕食前服治産後陰道開而不閉此因産室失於遮護致風侵産門截勝湯出千金方上石灰一斗熬令燒草以水二斗投之適寒溫入汁中坐漬須臾復易坐如常法此方已效千金不傳治婦人陰下脫若脫肛方出千金方用羊脂煎訖適冷暖取塗上以鐵精敷脂上多少令調以火炙布令暖尉肛上漸推納之然後末磁石酒服方寸匕日三熏洗法出危氏方用荊芥穗藿香葉臭椿樹皮煎湯熏洗即入托藥用萆麻葉有尖角者好飛過白礬為末以紙片攤藥托入摻藥先以淡竹根煎湯洗仍用五倍子白礬為末乾摻立效治牛亦驗敷藥用溫鹽水洗軟卻用五靈脂燒煙燻次用萆麻子研爛塗上吸入如入即洗去療苦産門癢無計出聖惠方蚺蛇膽研雄黃研石硫黃研硃砂研硝石藜蘆蕪荑各二分上搗細篩重羅令調以臘月豬脂和如泥取故布作纏子如人指長一寸半以藥塗上納孔中日一易易時宜以豬椒根三兩煮湯洗拭乾納藥佳三黃散一名大黃散出千金方治陰中癢入骨肉大黃黃芩黃耆各一兩芍藥半兩用赤玄參丹參各十八銖吳茱萸三十銖一作山茱萸上治下篩酒服方寸匕日三一方有蛇床子半兩亦可煎洗治男女陰中癢濕瘡出千金方黃連梔子仁甘草黃柏各一兩蛇床子二兩上治下篩為細末以粉瘡上無汁以豬脂和塗之深者用綿裹納瘡中日二一方無蛇床子一方無甘草治陰中癢如蟲行狀出千金方真丹三分另研礬石三分燒研芎藭四分上治下篩以綿裹藥著陰中蟲當自死真丹一作丹砂浴風湯治陰中痛癢蛇床子吳茱萸湯浸七次石灰炒乾草烏等分上為細末煎湯洗之三五次治陰癢脫出聖惠方用礬石燒為細末每日空心調方寸匕日三服一方陰挺出下脫治女子陰中苦癢搔之痛悶出肘後方用豬肝炙熱納陰中當有蟲隨肝出治女子陰癢絶産小兒㿉卵腫用狐肉煮炙食之良療陰癢痛不可忍出大全良方用蒜隨多少水煮作湯洗之日三一方用小蒜又方出聖惠方豬牙二兩蛇床子上以水三升煮作湯稍熱洗日三用之又方出大全良方取杏仁燒作灰乘熱綿裹納陰中良亦治女人陰中蟲疽療陰癢出聖惠方用枸杞根一斤水三升煮汁沸適寒溫洗之治陰癢有蟲出聖惠方取雞肝去脂煨熱納陰中有蟲當盡死又方出聖惠方取牛肝截五寸纏頭納陰中半日蟲入肝出之豬肝亦得療陰中有蟲癢且痛目腫身黃欲得男子漏血下白少氣思美食服此出聖惠方用鯉魚長一尺去頭肉取骨搗末熬黃黑以豬脂和以絹袋盛如常法納陰中其痛處即止蟲當自出治婦人陰癢不止用小薊不拘多少水煮作湯熱洗日三用之治小戶嫁痛連日出千金方甘草炙生薑各三分芍藥二分桂心一分上切以酒二升煮取三沸去滓溫服之神良單行大黃湯一名大和湯出千金方治婦人嫁痛用大黃三兩以酒一升煮一沸頓服治婦人陰戶嫁痛出千金方用牛膝三兩酒三升煮取一升半去滓分作三服治婦人小戶嫁痛出大全良方用烏賊骨燒研末酒調下方寸匕日三服一名海螵蛸散治婦人陰處疼痛出危氏方用青鹽以布裹尉方補心湯出危氏方治陰中生瘡名曰䘌瘡或痛或癢如蟲行狀淋瀝濃汁白茯苓人參前胡半夏湯洗七次去滑川芎各三分枳殼麩炒去瓤紫蘇桔梗甘草炙橘皮乾薑各半兩當歸一兩三分白芍藥二兩熟地黃一兩半上銼散每服四錢水盞半姜五片棗二枚同煎食前服藿香養胃湯出危氏方治陽明經虛不榮肌肉陰中生瘡不愈藿香白朮白茯苓神麯炒烏藥縮砂仁薏苡仁半夏曲人參各半兩蓽澄茄甘草炙各三錢半上銼散每服四錢水盞半姜五片棗二枚同煎不以時候治陰瘡方出千金方蕪荑芎藭黃芩甘草礬石雄黃附子白芷黃連各六銖上㕮咀取豬膏四兩合前敷之治婦人陰瘡與男子妒精瘡大同小異出危氏方黃丹枯白礬萹蓄藁本各一兩硫黃半兩白蛇皮一條燒灰荊芥蛇床子各半兩研極細上細末另以荊芥蛇床子煎湯溫洗軟帛拭乾清油調塗如瘡濕乾末滲之洗拓乾草湯出大全良方療陰蝕甘草乾漆各一兩黃芩乾地黃當歸上細切以水七升煮取一半去滓以綿帛納湯中以拓瘡處良久即易日二度每拓湯可行十里許即拭乾捻取甘濕散薄敷瘡上使遍可經半日又以湯拓干如前敷藥用五月五日蝦蟆青木香石硫黃鐵精為末生麝香臨時加入黃芩湯出聖惠方療婦人陰中生瘡洗之方當歸黃芩芎藭大黃礬石各二分黃連一分雄黃二分一方無雄黃上切以水五升煮取四升洗瘡日三度雄黃散出聖惠方療婦人陰中生瘡芎藭藜蘆雄黃研丹砂研蜀椒汗細辛當歸各一分上搗篩散取方寸匕綿裹納陰中又敷外瘡上忌如常法治疳瘡因月後便行房致成湛濁伏流陰道疳瘡遂生搔癢無時先用胡椒蔥白作湯一日兩三度淋洗卻服後藥出危氏方赤石脂龍骨黑牽牛炒菟絲子酒浸蒸黃耆鹽水炙沙苑蒺藜炒上為末蜜丸梧桐子大每服二十丸燕窠蒸酒澄上清者吞下雄黃散治下部䘌瘡雄黃研青葙子苦參黃連各三分桃仁去皮尖炒一分上為末以生艾搗汁和如棗核綿裹納下部未效更加扁竹汁無艾只用綿裹散子納下部亦可陰瘡膏治男女陰瘡方米粉一酒杯許芍藥黃芩牡蠣附子白芷各十八銖一方無米粉上㕮咀以不中水豬膏一斤微炒上藥三上三下候白芷黃膏成絞去滓納白粉和勻相得敷瘡上並治口瘡杏仁膏治婦人陰瘡杏仁五兩湯浸去皮研白芷芎藭生乾地黃各一兩豬脂羊髓各三兩上細銼以豬脂羊髓拌令勻入鐺中慢火煎候白芷色黃絞去滓膏成用磁閣中貯之每取如棗大綿裹納陰中頻頻換之易瘥黃芩散治陰門生瘡黃芩當歸川芎白礬黃連上銼散煮水熏洗即安當歸湯治婦人陰蝕瘡凡婦人少陰脈數而滑者陰中必生瘡名曰䘌瘡或痛或癢如蟲行狀淋露膿汁陰蝕幾盡者此皆由心神煩郁胃氣虛弱致氣血流滯故經云諸痛癢瘡皆屬於心又陽明主肌肉癢痛皆屬於心治之當補心養胃外以熏洗坐導藥治之乃可當歸芍藥甘草芎藭各二兩地榆二兩上細切以水五升煮取去滓熏洗日三夜二一方用蛇床子不用芎藭疳濕散又名蚺蛇膽散瘡疳蟲陰蝕蚺蛇膽真者青木香末石硫黃鐵精麝香各四分臨時入因原麝香闢蛇毒若先以相和蛇膽即無力也舊用五月五日蝦蟆上等分為末更細研有患取如三棋子和井花水日再服訖先令便利了即以後方桃枝熏下部訖然後取藥如棋子安竹管里吹下部中亦可日再度老少減量其熏法每日一度不用再為之又療疳蟲蝕下部及五臟方用取桃東南枝三七枚輕大頭使散以綿纏之又搗石硫黃為末將此綿纏枝捻轉之令末少厚又截一短竹筒先納下部中仍以所捻藥桃枝燒著熏之療婦人陰中痛生瘡一名杏仁膏羊脂一斤當歸杏仁去皮尖研白芷芎藭各一兩上細切羊脂和置甑中蒸之藥成取如大豆一枚綿裹納陰中日一易之治婦人陰戶生瘡青黛號丹水粉五倍子各為細末上用賣肉鋪上拭肉巾燒灰為末和前藥用小絹袋入宮中滲干如干用荊芥薄荷柏葉煎水洗如干仍用油調前藥塗瘥治婦人陰上生瘡黃芩海桐皮白礬薤菜上煎湯洗後用破鼓牛皮燒存性細研入輕粉在內捋下雞腸上膏調藥塗瘡上如蟲吃入陰內用雞子一個煮熟去殼塗藥末於上綿子兜入陰中如洗了向火炙患處得癢即蟲行若身微作寒服藿香正氣散二三服杏仁散治女子陰中瘡杏仁燒末雄黃礬石燒各二分麝香半分上細研為散每用少許敷瘡上以瘥為度一方無杏仁治婦人陰蝕瘡方蒲黃一升水銀一兩上研勻以摻上又方用肥豬肉三十斤以水三石煮熟去肉入盆中浸之冷即易不過三兩度湯令熱便洗瘡療陰蝕欲盡者方蝦蟆糞兔糞上等分為末敷瘡上良一方細研治茄子疾心躁連綿黃水易治白水難愈出危氏方烏金散二豆散上用薑棗子煎溫服麝香杏仁散治婦人陰瘡麝香少許杏仁不以多少燒存性上為末如瘡口深用絹袋子二個盛藥蒲系口臨上藥炙熱安在陰內立愈治下部䘌瘡方上以平胃散加貫衆末每用二錢熟煮豬肝拌藥入陰戶內數日可安治陰中生瘡如蟲咬痛出三因方用生搗桃葉綿裹納陰中日三四易狼牙湯療婦人陰蝕其中爛傷膿水淋漓臭穢用狼牙三兩㕮咀以水四升煮取半升去滓納苦酒如雞子中黃大沸湯一杯消盡夜適寒溫以綿纏箸頭大如繭濡湯以瀝瘡中日四五度即瘥一方以水煮洗之一方蝕於肛者草燒雄黃末熏煎苦參湯洗亦可治女子陰瘡用硫黃末敷之瘡上即瘥治婦人陰中生痔凡九竅有肉突出皆名痔用烏頭七個燒存性用小瓦罐盛酸醋淬乘熱熏候通手沃之良洗方治茄子疾用茄皮白礬馬椿頭根朴硝澤蘭煮水熏洗加入炒石灰少許妙敷藥治茄子疾用朴硝為末黃荊柴燒瀝調敷或濃鐵漿水敷之又方治茄子疾用硫黃一兩大鯉魚一個去頭皮納入藥故紙裹黃泥固濟火煅煙盡為末米糊丸如梧桐子大每二十丸溫酒下如下疽生蟲所下如柿汁臭穢心中㽲痛悶絶虛煩甚者不可治治茄子疾心躁連綿黃水易治白水難愈出危氏方用生枳殼為散熏洗卻用絹帛包枳殼滓納入陰中即日漸消治婦人産時患瘡用冬葵子患瘡者吞一粒便作一頭可煮頓服童女交接陽道違理及他物所傷犯血出流漓不止用釜底墨研胡麻以塗之又方用燒青布併發為粉敷之大良治玉門寬冷方用硫黃末煎湯洗治陰冷子門癢閉五倍子四兩為細末每用以口中玉泉和如兔屎大納陰門中熱即效治女人交接輒血出方桂心伏龍肝各二分上為末酒服方寸匕瘥又方治合陰陽輒痛不可忍出大全良方黃連六分牛膝甘草各四分上三味細切以水四升煮取二升洗之日三四度瘥止治女童交接陽道違理血出不止出大全良方割雞冠血塗之治陰冷病出本草用丁香為末縫紗袋如小指粗大納陰中其病便已治婦人産門癢痛以槐皮煎湯浸洗治婦人陰瘡出本草以瞿麥搗敷之治婦人陰瘡浮疱用落雁木以椿桐煮洗妙治女子茄病出如宜方白獨活荊芥甘草上松花煎湯服仍宜硝菊花煎湯熏洗治産後陰下脫方用鱉頭五枚燒末以井花水服方寸匕日三治婦人陰瘡以雞子和粉炒乾服治一切婦人因産用力過多人門挺露不收出護命方萆薢狗脊去毛石斛牛膝續斷益智仁去皮各半兩當歸一兩蒼朮一分巴戟去心附子火炮去皮磁石真上等吸鐵者燒赤醋淬七度研如塵水飛過用各一兩半上件藥先熬搗衆藥為細末方入磁末相滾令勻以薄醋煮稀面汁丸如梧桐子大早朝熱湯下四十丸治婦人宮臟虛冷正氣微弱每懷孕時即人門挺露吃食減少肌體羸瘦宜吃此方楊子建萬全護命方萆薢五味子當歸續斷石斛杜仲人參細辛白朮炙艾葉芎藭各等分上細杵羅為末煉蜜丸如梧桐子大空心鹽湯下五十丸吃了若胃腑疏轉連連進服以安效為期治婦人懷孕臨産人門挺出遮而生露桑寄生芎藭當歸黃橘皮細辛藿香人參防風炙艾葉上為細末每服二錢水一盞煎取八分空心去滓吃治女人陰腫出本草用荏子葉生搗和醋以綿裹納日三四易寸金散出衛生家寶方治婦人子腸不收蛇床子韶腦葫蘆巴紫稍花上件各等分為細末每服五七錢用水半碗淋洗之蛜𧌴散出衛生家寶方治婦人子腸不收全蠍不以多少上為細末口噙水鼻內搐之立效若有息肉突出出肘後方以苦酒三升漬烏喙五枚三日以洗之日夜三四度治陰下濕癢出肘後方吳茱萸一升水三升煮三沸去滓洗癢瘥治産後傷水陰腫如斗神驗出胎産救護方牡蠣粉敷之又方以通脫木根研汁調服又方防風荊芥蛇床子上煎湯熏洗凡産後歸房早多有此陰瘡出産胎救急方蛇床子地骨皮上煎湯熏洗又方黃連黃芩枯礬上煎湯熏洗治陰瘡癢出胎産救急方枯礬川芎硃砂上為細末綿裹納陰中有蟲即死又方枯礬蛇床子同煎一方止用蛇床子又方菊花榴根皮上煎湯熏洗又方蛇床子白礬榴根上五倍子煎湯熏洗治女子陰隱瘡及骨節中寒熱者出本草以龜殼作湯浴漬之治陰癢痛用車前子以水三升煮三沸去滓洗癢痛處不用藥法療頽必瘥方出肘後方令病人自把糯米餅子一枚並皂莢刺一百個就百姓間坐社處先將皂莢刺分合社人社官三老以下各付一針即出餅子示人從頭至尾皆言從社官以下乞針搖社人問云搖何物病人云搖人鬼周匝總遍訖針並插盡即時持餅卻到家收掌於一處餅乾頽不覺自然永散瘥極神效
