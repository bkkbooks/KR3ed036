牽牛一兩炒一分用茴香一兩炒上炒訖除去拌藥只留蒼朮為末醋麵糊丸空心溫酒或鹽湯熱水任下年五十以上加沉香一兩楠木香二兩巴戟二兩酒浸二宿去心獨粟丸出聖濟總録治腰腳沉重勞傷腳氣等疾上取粟肉不拘多少焙乾為末煉蜜和丸如梧子大每服二十丸溫酒下空心日午服漸加至三十丸治腰腳出本草以韭子一升揀擇蒸兩炊以來曝乾簸去黑皮炒令黃搗成粉安息香二大兩水煮一二百沸干緩火炒令赤色二物相和搗為丸如干入蜜亦得每日空心服酒下二十丸然後以少飯壓之大佳補腎散出十便良方治猝患腰腳疼痛以杜仲一兩去粗皮炙微黃銼用水二盞煎一盞去滓用羊腎一對細切去脂膜入藥中煮次入牙皂莖鹽花艽薑醋調如作羹空心食之治腰腳疼痛方出肘後方用胡麻一升新者熬令香杵篩日服一大升計服一斗即永瘥酒飲薑汁蜜湯皆可服之皂角方出本草治腰腳不履地取皂角子一千二百個淨洗令乾少酥炒令香為末蜜丸如梧子大空心以蒺藜子酸棗子湯下三十丸治腰腳疼痛久不瘥方出聖惠方取不著子皂莢樹上刺五兩燒作灰搗細羅為散每於食前以溫酒調下三錢除濕丹出經驗良方治腰腳重痛足脛浮腫拘攣便尿不利且療疹癰疽發背走注腳氣疹癬惡瘡並皆治之澤瀉檳榔乳香別研末威靈仙赤芍藥大戟水煮甘遂水煮各一兩陳皮青皮沒藥黑牽牛各半兩上為細末麵糊丸小豆湯溫湯下三十丸百倍丸出御藥院方治男子婦人腰膝疼痛筋脈拘攣行步艱難敗龜虎骨二味各醋浸一宿蘸醋炙令黃為度肉蓯蓉酒浸一宿牛膝酒浸一宿去苗木鱉子去殼乳香別研沒藥別研骨碎補去苗自然銅醋淬七炙破故紙炒以上各半兩上為末以浸蓯蓉牛膝酒煮麵糊丸如梧子大每服三十丸溫酒下蒴藋散出御藥院方治營衛不順氣血偏虛風寒濕氣攻注腳膝疼痛蒴藋吳茱萸頑荊黃耆防風防己各四兩躑躅花白獨活荊芥穗藁本各二兩上為粗末都入水半碗蔥白二七莖細銼木瓜半個挼碎拌令勻作三分每服用藥一分於銚內慢火炒令通熱用綿帛兩重裹藥尉痛處如覺藥微冷依前別炒余藥更換尉之三劑必減萬安丸出經驗方川楝子半斤微炒出汗知母半斤微炒出汗甘草四兩炒黃色茴香四兩炒黃色蓮子心木香各一兩晚蠶砂一兩微炒上除甘草茴香先為末存留四兩熬膏子外將余末四兩共余藥一處為末用膏子為丸如梧桐子大每服七八十丸空心溫酒送下金鈴子丸治腰腳痛並小腸腳氣等疾金鈴子肉葫蘆巴一兩破故紙一兩萆薢一兩小茴香三兩蒼朮二兩附子一個上為細末酒打麵糊丸如梧桐子大每服五十丸空心溫酒送下玄胡索散出海上方治遠年近日腰腿疼痛大有神效玄胡索牛膝當歸破故紙各等分上為末每服三錢空心溫醋湯調下四焙丸出瑞竹堂方治腰膝疼痛杜仲四兩瓦器內炒黃色去絲破故紙四兩瓦器內炒黃色甘草四兩胡桃四兩去皮膜上為細末酒丸如梧桐子大每服五十丸空心用甘草末湯調下六半湯治血虛腰腿疼痛白芍藥六兩甘草炙半兩上用水一盞半煎至八分服空心食前草烏膏出仁存方治行路腳板腫疼草烏甘遂各等分上為細末臨臥用新汲水調敷腳板上下痛處次早洗去便可行藥棋子一名銀柯丸治腿腰痛氣滯出本事方上以牽牛不拘多少用新瓦入火爆得通赤便以牽牛在瓦上自然一半生一半熟不得撥動取末一兩入細研硫黃一分研勻分三每用白麵一匙水和捍開切作棋子五更初以水一盞煮熟連湯溫送下住即已未住隔日再作豫嘗有此疾每發只一服痛止病源曰腿腰痛者或隨傷腰是以痛一方二味同炒熟不用研碎每服五十丸用溫酒鹽湯空心吞之正本丸治心氣妄行流入腎經腰膝疼痛眼見黑花流入經絡四肢疼痛或不能舉動上用益智仁四兩擘破鹽二兩於瓷器內同炒令香熟篩出鹽不用將益智碾為細末煉蜜丸如梧桐子大卻以白茯苓二兩甘草一兩研羅為末每以末二錢百沸湯服不拘時送下療腰膝疼上用久年陳艾一斤濃煎將小深桶滿盛將腳擱其上卻以衣服覆之令其汗出透了如湯可容下腳則以膝腳放入浸之覺有意思就以洗之治膝腰疼痛損傷出肘後方上用鹿茸不限多少塗酥炙紫色為末溫酒下一錢單以鹿茸燒赤淬酒中亦得治腰膝疼痛久不已方出聖惠方上以糟底酒摩腰膝及痛處筋攣處治腰膝急疼出本草上用虎骨煮作湯浴之或和醋浸亦良治筋骨急痛脛骨尤妙及行步足膝痛方以熱水沃之竟日便愈又方出永類鈐方治腰腳撑腿痛上用葡萄根煎湯淋洗治久行腳心腫痛出危氏方用蚯蚓糞塗腫處高閣起腳一夕即愈威靈仙方一名威靈散出御藥院方治腰腳痛並腰腎腳膝積聚腸內諸冷病積年用威靈仙一斤洗干好酒浸七日為末麵糊丸桐子大卻以浸藥酒每服送下二十丸一方為細末每服一錢溫酒調下逐日微利為度烏礬散出海上方治行千里不損腳板草烏頭半斤白礬二斤上以大黑豆煮軟為度同為末每用三錢調塗足下又方出永類鈐方治腰腳撑腿痛貓糞燒灰豔痛處即汗無汗處以唾溫酒而豔之治腰腳損痛出永類鈐方川牛膝一兩半川萆薢半兩薏苡仁半兩乳香一兩當歸一兩半破故紙一兩制杜仲二兩南木香半兩北茴香一兩半沒藥半兩烏藥一兩吳茱萸一兩半川楝子二兩青鹽半兩天麻半兩蓯蓉一兩葫蘆巴一兩威靈仙半兩續斷半兩麝香一錢青藤根半兩川烏一隻附子一隻虎骨炙酥令黃上酒糊為丸療腰膝髀連腿疼酸者方方見獨活散三仙飛步丹出永類鈐方白芷草烏醋煮破故紙當歸乳香各二兩穿山甲南星醋煮各一兩蒼朮六兩烏藥五兩香附子四兩蠶砂四兩炒去皮上為末薑汁丸挫氣皆治常服薑酒下挫氣茴香酒腰痛胡桃酒頭風生蔥茶下乳香散孫尚藥治腳轉筋疼痛攣急者松節一兩細銼如米乳香一錢上於銀石器內慢火炒令焦只留一二分性出火毒研細每服一錢至二錢熱木瓜酒調下凡是筋病皆治之治血疰腳先祖妣十餘年不愈用此方收效出經驗良方桑桂菰牛犀菰乃石灰菰生地上如石塊者碎其中有灰起肥株柱菰胎髮男用男女用女上用三菰焙乾各五錢重胎髮燒灰存性併為末和前藥濕則干搽干則清油調塗治腰腳弱出本草以生栗子食之昔有人患腳弱往栗樹下食數升便能起行此是補腎之義治人冷生腰腳出本草用小麥麩蒸熱袋盛尉主腹內冷腰膝疼痛小便白數陽道乏出本草以牛領藤煮汁酒服之治腰膝痛及折傷本草多取鹿角並截取尖銼為屑以白蜜淹浸之微火熬令小變色曝乾搗末篩令細以酒服之治丈夫腰膝積冷痛或頑麻無力出本草菟絲子洗稱一兩牛膝一兩同浸於銀器內用酒過一寸五日曝乾為末將原浸酒再入少醇酒作糊搜和丸如梧桐子大空心酒下二十丸腋臭附論夫有天生狐臭者有為人所染臭者天生臭者難治為人所染者易治然須三年醋敷礬石散勿止並服五香丸乃可得瘥勿言一度敷藥即瘥正亦敷藥時暫得一瘥耳凡狐臭人通忌食蕓薹五辛治之終身不瘥狐臭與漏腋雖不害人性命而害人身奉親事君及至交友皆非所宜修身之士務為清潔者或得此患不可不思有以去之夫狐臭者多因勞逸汗積以手摸而臭之致清氣道中受此宿穢故傳而為病方論有天生臭之説恐未必皆然多見此為人相染者蓋其氣吸上元宮遂散百脈多相沾染忌之為得漏腋者亦由腋不收汗致汙衣數重皆透然未必臭以二證較之其病自別古方共作一病未為至論陰陽之在人血與氣耳兩者調適則流行散徙莫或底滯達於形色暢於膚理無不得其和苟失其宜血氣從而凝積此所以有狐臭之病其候不一有曰狐臭有曰體臭有曰漏腋狐臭者指其腋間體臭者舉其大概漏腋則又言其溫而生瘡者不可不辨也方十香丸出聖惠方含化令人遍體皆香沉香銼白檀香銼木香零陵香甘松去土藿香白芷細辛去苗葉芎藭檳榔銼肉豆蔻雞舌香丁香各半兩龍腦麝香各一分別研上除別研外同搗羅為末入腦麝拌勻煉蜜丸雞頭實大每日三四度用綿裹一丸令化咽津香粉方出聖惠方白附子白茯苓白朮白芷白蘞白檀香沉香木香雞舌香零陵香以上各一兩麝香三分細研英粉六升研碎絹囊盛藿香一兩上為散入麝香研勻將粉囊置大盒子內上以藥末覆之密閉七日後以粉粉身極香透香丸出聖惠方治身體常香麝香細研沉香白檀香龍腦研細各一兩煎香雞舌香丁香黃熟香雞骨香甘松香各一兩川升麻鬱金香各三分上為末入麝香龍腦和拌令勻煉蜜和丸如雞頭米大每服用鹽湯嚼下三十丸留一半散不和每揩齒了以散子重揩咽津不過半月香汗通透也五香丸主口臭身臭止腫痛散血氣豆蔻子丁香藿香白芷青木香當歸桂心各一兩零陵香一兩甘松香三分香附子二兩檳榔仁二枚上搗篩蜜丸如大豆日二夜三時含之咽津五日內口香十日身香二七日衣被香三七日下風人聞香四七日淨洗手水落地香五七日把他人手亦香禁五辛下氣去臭令人體香方出肘後方瓜子芎藭藁本當歸杜蘅細辛甘草炙各二分白芷桂心各五分上搗下篩食後服方寸匕日三五日香二十日肉香一方無甘草石灰散出千金方治狐臭石灰一斤楓香一作沉香丁香薰陸香青木香各二兩礬石四兩一作白礬橘皮陽起石各二兩上治下篩以綿作篆子粗如指長四寸展取藥使著篆上以絹袋盛著腋之下先以布揩令痛然後挾之丁香丸一名香遍滿方出千金方治七竅臭氣皆令馨香沉香白瓜子仁各一兩丁香甘草炙當歸切焙芎藭麝香研各半兩藁本去土三分上搗篩七味為細末後入麝香拌勻煉蜜和丸如小豆大每服溫酒下二十丸日三服令遍身皆香療腋臭方好硇砂好白礬密陀僧各三兩酢酪三兩乾者胡粉鉛錫生銅屑各三分兩金屑八分上並研令細酢一升新銅器中盛藥密封其口二七日看上青緑色鬱郁然其藥即成還須研令極細至用若干更以好酒和藥以塗病處若有毛先拔去以石灰水淨洗拭使干以生布揩令微赤可作瘡一日一塗洗遠不過十日即瘥待腋瘡瘥訖更取銅屑研細成粉粉病處日五六次即止病瘥終身不可帶麝香食胡荽治身體臭令香出聖惠方柑子皮白芷各二兩半瓜子仁二兩藁本當歸細辛桂心各一兩上治下篩病服方五日口香三七日身香金錯屑塗法金錯屑一銖銀錯屑一兩赤銅屑香附子胡粉錢錯屑各一兩三年醋三升上以羊酪一升於銅器中煮得二沸用以塗之療人七孔臭氣方出聖惠方瓜子防風各一分兩芎藭藁本當歸杜蘅各一兩細辛五分上搗下篩食後溫水服方寸匕日三六物散出千金方治漏腋下及足心手掌陰下股里常如汗濕臭干枸杞把干薔薇根肘後作苗甘草各半兩商陸根胡粉三兩滑石各一分上治下篩以苦酒少少和塗當微汗出易衣服更塗上不過三日便愈或一歲復發塗之蟬殼膏出聖濟總録治血氣蘊積成狐臭蟬殼四十九枚烏梅七枚去核微炒緑礬一兩硇砂一合青銅錢七文杏仁七枚湯浸去皮上除錢外搗羅極細入滷中調之先以皂莢水洗拭乾用錢腋下摩之候熱稍拔去腋下毛即以藥塗之仍用膩粉覆其上兩三度便愈療腋臭方雞屎白礬熬令汁盡黃礬附子炮木蘭皮青木香上研為散粉之又石龍衣一大兩蛇蛻皮是也以子日夜半燒為灰服之治腋氣臭於狐貍者白礬燒令汁盡黃丹各一兩南礬鐵粉雄黃膩粉各一分上研為散每夜先以皂莢水洗後用津唾調藥塗之治狐臭方出千金方辛夷芎藭細辛杜蘅藁本各二兩上㕮咀以醇苦酒漬一宿煎取汁敷之於臨臥時敷以瘥為度療腋臭方錢三十七文胡粉馬齒草粗莖各三兩青木香一兩大酢半升上切先以醋浸錢五六日然後總漬諸藥一物煎五六沸置瓷器中先以石灰汁洗病處拭乾訖塗之以瘥為度令人體香方出肘後方枯礬輕粉密陀僧蛤粉麝香上三味為細末入蛤粉麝香少許摻之治腋氣積久身體手足心汗出皆臭白礬灰麝香膩粉母丁香各一錢砒霜半錢上同研如粉患者先浴了以津唾調之甚者不過三上效治狐臭不可近木香白礬燒令汁盡各二兩附子生用去皮石灰各一兩米粉半升上為末如粉敷於腋下良治腋氣胡椒白礬灰膩粉密陀僧乳香各等分上細研令勻塗擦腋下每日用之以瘥為度治狐臭方出千金方辛夷細辛芎藭青木香各四兩上治下篩熏竟粉之治身體臭令香出千金方甘草松根皮大棗甜瓜子各等分上為末篩食後服方寸匕日三七日知五十日身體並香百日大香衣服床幃皆香四灰散出聖濟總録方治腋氣粉霜艾人灰鉛灰無即用胡粉密陀僧代之礬石灰上唯艾人灰用稍多余並等分研令極細先以醋漿洗拭乾即敷之不過三五上永除臭氣如要試但敷藥蒜上良久自無臭氣兼治腳汗效治腋氣人不可近者方出十便良方石灰雄黃各二兩炭灰桑柴灰各一兩上同研為末水調塗於腋下可一食久即以柳木簏子刮藥其腋下毛並落後用前四灰散敷之效驗狐臭方出肘後方雞舌香藿香青木香胡粉各二兩上作粉綿裹納腋下常敷即瘥療腋臭方黃礬細辛芎藭各二兩雄黃一兩上搗下篩為散先以泔淨洗腋拔去毛令血出以粉腋下又方三年釅醋二升碎銅一斤鹽半合灰二合上浸藥覺藥色青即塗腋下日三四塗三日小愈一月全瘥治男子婦人狐臭一切治之麝香白膠香密陀僧青銅等分上為細末敷上臭處半月不可盡述小靈丹治體氣藥硇砂三錢用濕紙包纍層再用紙與泥一處包火上燒煉二次放冷然後去泥燒成雪白雷丸香附子輕粉各五錢上為細末用醋打糊為丸硃砂為衣如梧子大每服五七丸臨睡紫河車磨水送天明體氣根源皆去為妙治狐臭不可近方白礬三兩燒令汁盡馬齒莧乾者各二兩石灰五合上為細散先以生布揩腋下令黃汁出拭乾便以散敷之三五度永瘥又方青礬燒灰白礬燒灰各一兩白梅七枚搗碎古字錢十四文上於瓷瓶內盛冷水一大盞浸半日先洗淨腋下將藥水時時塗之脫臭方出試效方烏魚頭骨枯白礬各三錢密陀僧一錢上為末先用漿水洗臭處後用藥末搽之治腋氣出百一選方密陀僧輕粉多用染胭脂隨意上為細末干敷之一方無染胭脂用蛤粉搽腋下又方膩粉明礬煨紅丹上等分為細末臨睡時抹上便可住半月去根又方大銅錢二七枚白梅二七個鹽一升上以五月五日水一升共置瓶子里置戶上百日畢可取用塗不得令婦人塗藥食黏食復發又方上以酢五合納銅器中以錢十四文胡粉五銖置瓶中泥頭七日後以粉七銖和之訖去腋下毛日再敷之合藥勿令人見祕之療人七孔臭氣方甘草五分炙芎藭四分白芷三分上作散下篩食後飲服方寸匕日三治狐臭方龍骨白膠香密陀僧上等分研為細末搽之治體氣臭者出德生堂枯白礬一兩樟腦一錢蛤粉半兩上為末搽之又方出德生堂膽礬一豆許田螺大生者巴豆去殼各一枚上將田螺以水養三日出泥土揭起靨入礬豆同麝香少許以線拴住放瓷器內次日化成水溫令熱候五更將藥水以手自抹在兩腿內不住手抹藥直待腹內欲行臟腑卻住手先要揀深遠無人處空地內去大便下黑糞極臭是其證以厚土蓋之不可令人知之如不盡再以藥水抹又去大便後次日以礬藥擦之可去病治七孔臭氣皆令香出聖惠方松根白皮冬瓜仁各一兩細辛半兩上為細散每服以溫酒調下二錢日二服治狐臭方出千金方牛脂胡粉各等分上煎令可丸塗腋下一宿即愈不過三劑肘後方云合椒以塗之治漏腋腋下及足心手掌陰下股里常如汗濕臭者出千金方水銀胡粉外臺作粉霜上等分以面脂和塗之良驗又方出千金方石灰三升銀屑一升一作銅屑上合和絹囊盛汗出粉之妙治腋臭出海上名方黃丹輕粉各少許上以唾調之塗搽腋氣方出直指方明白礬黃丹上等分入麝少許敷之至效石緑散出海上名方治腋氣纍醫不退石緑三錢細研膩粉一錢半一作輕粉上同研令勻先疏拔去腋下毛然後以醋和藥末摩令熱效青羊脂粉療狐臭胡粉銅青各等分上先以鹽湯洗兩腋不及著藥且淋洗又以青羊脂和敷數日瘥一方用人乳和塗療諸身體臭方出十便良方竹葉一兩桃白皮四兩上以水一石二斗煮取五斗浴即香治體氣臭者出德生堂枯白礬密陀僧各三錢上為末擦之即止又方一名涼肌散出德生堂輕粉一作蛤粉密陀僧各三錢上為末擦腋下即效治腋氣人不敢近者伏龍肝白茅香各二兩上為末每月用塗腋下以瘥為度又方出十便良方胡粉一兩麝香一錢上研令細以牛脂調每日用塗之治狐臭出肘後方取三年苦酢和石灰敷之又方出千金方取槲葉切三升以水五升煮取一升用洗腋下即以白苦瓠燒令火出熏之數數作用又方出千金方用馬齒菜一束搗碎以蜜和作丸以絹袋盛之以泥紙裹厚半寸曝乾以火燒熟破取更以少許蜜和使熱勻令冷先以生布揩之夾藥腋下痛久忍之不能然後以手巾勒兩臂又方出肘後方治諸病臭取伏龍肝作泥敷之治漏腋腋下及足心手掌陰下股里常如汗濕臭者出千金方於正月一日以尿洗腋下神妙或將自己尿洗亦妙舊衣服洗換尤佳脫臭方出神效方用密陀僧不以多少研細先以漿水洗臭處乾擦之蜘蛛散出簡易方治狐臭燻人不可向邇者用大蜘蛛一個以黃泥入少赤石脂搗羅極細入鹽少許為一窠盛蜘蛛在內焚以炭燒令通紅候冷剖開研細臨臥入輕粉一匙用釅醋調成膏敷腋下明早必瀉下黑汁臭穢於遠僻處傾裹埋之免致染人治腋氣出簡易方以膽礬如琉璃者半生半熟煅為細末入膩粉少許同研每用半錢用生薑自然汁調藥揩擦腋下亦令十分熱痛則止礬無灰色石頭者妙又方出百一選方用輕粉敷之雖不能去根本常用自效又方出百一選方用熱餅一枚擘作四片摻密陀僧細末一錢許急夾在腋下略睡少時候冷易之如一腋有病只用一半藥元方平素苦此疾來紹興偶得此方用一次遂絶根本治狐臭股內陰下常濕臭或作瘡出肘後方用青木香好醋浸腋下塗之即愈又方治腋氣出海上方用泥礬少許為末入光韶粉擦腋下乳汁調亦可一方無光韶粉有灰末水調抹之又方出海上方以古老錢七文煅通紅米醋浸以酥為度研細入麝香少許先用皂角鹽煎湯洗次以自己唾敷之一方無麝香醋浸一二宿用磨錢抹之銅錢亦可一方用開通錢四十九文銅箸穿入炭火內燒赤醋浸四十九次為細末入麝香一分和勻先用熱酒洗腋下後將藥抹揩腋下七次永除臭氣又方出海上方用銅青干敷之可止半月之臭又方出海上方將去腋毛以甘遂半兩為末用豬肉兩片薄批開將甘遂末摻肉上午後貼於兩腋下候明旦五更濃煎甘草半兩為湯一碗服之須臾通下臭氣又方出海上方用活田螺一個以好麝香少許安於田螺內仰埋於露天地上不可再打七七四十九日取出看患處淨洗拭乾用黑土搽之卻再洗看有孔處是竅子用田螺汁點之兩度即愈治腋氣傳信適用方取生薑連皮帶汁夾於腋下三次絶根本或以濕紙裹煨研擦腋下立效腋臭方出直指方用好緑礬半生半煅為細末入少輕粉研細每半錢匕浴後以生薑汁調搽候十分熱痛即止又方出直指方用夜明砂為末同豉汁調敷治腋臭氣以銅青好者不拘多少米醋調和膏先淨洗腋下用輕粉摻過卻使上膏塗之立效治腋氣神妙不可盡述出簡易方用白礬飛不拘多少臨臥時以紙襯桌上伸手托壁柱上以藥乾擦令腋下十分熱痛兩腋揩遍先於日中將所著上截衣服用灰汁淨洗又泡去衣袖中臭氣皆無臭息庶新衣方可著若洗氣息不斷枉用其藥大概藥無不驗多是衣服再作氣故不能斷根一方用燒好礬石末絹囊盛常以粉腋下不過十度一方唾調塗之治狐臭出本草用鐵屑炒極熱用投酒中飲酒療賊風痙又裹以尉腋療驗一方用鐵積炒裹尉腋療狐臭並股內陰下常濕且臭或作瘡出肘後方以胡粉一物粉之即瘥治狐臭方出千金方先以清泔淨洗又用清醋淨洗微揩使破取赤銅屑和醋熱揩數度瘥或取銅屑和醋入銀器中炒極熱以絹裹尉腋下冷復易之一方赤銅屑以醋和如飯用袋盛先刺腋下脈去血封之療人體及腋下狀如狐𤜢氣世謂之狐臭病源云人腋下臭如蔥豉之氣者亦言如狐貍之氣者故謂之狐臭此皆血氣不和蘊積故氣臭出十便良方以炊甑飯溫熱丸以拭腋下臭仍與犬食之七日一如此即瘥一方以二月社日盜取社家糜饋一團背地摩腋下三七遍擲著於路勿令人知又方出十便良方取雞子兩枚煮熱去殼及熱各納腋下冷棄之三叉路口勿反顧三為之又方青木香附子各一兩礬半兩燒白灰一兩半上為細末粉腋下出汗因以粉之亦瘥又方青木香一斤石灰半斤熬上常以粉身亦瘥並搗末敷之又方乾薑胡粉白灰等分上合作末粉之療腋臭方常以鹽滷和釅酢塗之一遍一年再塗永除以胡粉和水銀和令相入塗腋下十日以來無氣出又方取五月五日承露百草陰乾火燒為灰用井花水和灰為丸重火燒如燖灰色煉訖即以釅酢和為餅厚如掌大徑二寸以來即放兩腋下挾冷即易夾時一身連頭並悶二日後若病不瘥復著藥微發亦不甚臭還如前法療之永斷病根瘡出即以小便洗之又方以首先男兒乳汁浸鹽研銅青拔去毛使血出塗瘥錢汁敷方用錢二七文以礦石磨令平以夾腋下神良療漏腋方夫病源腋下常濕仍臭生瘡謂之漏腋此亦是氣血不和為風邪所搏津液塞瘀故令濕臭用馬齒菜腋下夾之令燥復易之先用焦黃石灰等分合水煎一兩沸如泥泥之然後塗諸藥良治發腋方用攬藤搗碎合之或用厭草亦佳治腋氣用雞子一枚醋浸過宿針刺小孔瀝取清液入砒霜緑豆許和勻將粗布痛搽患處以指點揩之妙治七孔臭氣皆令馨香用麻骨一條燒煙吸入喉中即去治腋臭用銅礦石石上水磨取汁塗之治腋臭用田螺一個水養之候開即以針穿巴豆於其中取螺拭乾仰傾酒盞內夏月一宿冬月五七宿即自成水取以搽腋下永絶除根治腋下體臭妙方水銀粉半錢椒半兩黃丹一錢上先將水銀粉入瓶子內卻將椒末紙裹卻留在粉瓶內經一宿去了椒不用將黃丹同粉塗之卻將米醋再抹之甚妙田螺散治狐臭有效田螺兩個巴豆一粒去殼取肉入在田螺內仍掩住須臾盡化成水卻去掩傾注器內令貼在患上須臾狐氣退又方治腋氣白礬火煅干為度研一錢輕粉半錢上二味令勻干時擦腋下神效治陰汗鴉臭不可與人同行共處白礬密陀僧黃丹各一分麝香一錢上於乳鉢內研如飛塵以醋於手心內調藥末擦腋下經兩時辰許卻以香白芷煎湯洗之一日使一次密陀僧散治腋氣開通錢十文用炭火燒米醋內蘸密陀僧半兩麝香一匕別研輕粉一匕上件為末每日先令浴了剃去腋毛以生薑一塊切作兩片左手托右右手托左石膽散治腋氣膽礬密陀僧輕粉各等分上件為細末津唾調搽之數次除根導引法養生方云以兩手掩口鼻臨臥閉氣久許時手中即生液連以手摩面目常行之使人體香
