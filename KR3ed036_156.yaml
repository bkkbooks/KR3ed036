body:
  text: 卷一百五十六身體門久腰痛附論夫久腰痛者皆由傷於腎氣所為也腎氣虛則受於風邪風邪停積於腎經與氣血相擊久而不散故為久腰痛方沉香丸治腎臟風虛冷滯腰間久痛連腿膝痹或時疼痛乏力羸瘦沉香三分補骨脂一兩微炒石斛三分去根銼桂心三分木香半兩牛膝三分去苗萆薢三分銼附子一兩炮裂去皮臍羌活三分熟乾地黃三分杜仲三分去粗皮炙微黃茯苓三分銼檳榔三分當歸半兩銼微炒海桐皮三分銼白朮半兩芎藭半兩防風半兩去蘆頭漏蘆三分上為末煉蜜和搗三五百杵丸如梧子大每於空心以溫酒下三十丸晚食前再服鍾乳丸治腎臟虛憊風冷所侵致腰間久痛行立不得鍾乳粉一兩薯蕷一兩續斷一兩桂心一兩肉蓯蓉一兩酒浸一宿刮去粗皮炙乾附子一兩炮裂去皮臍牛膝一兩去苗萆薢一兩銼檳榔一兩半石斛一兩去根節銼覆盆子一兩五味子一兩菟絲子二兩酒浸三日曝乾別搗末山茱萸一兩蛇床子一兩狗脊二兩杜仲二兩去粗皮炙微黃銼巴戟一兩熟乾地黃二兩上為末煉蜜和搗五七百杵丸如梧子大每於空腹以溫酒下三十丸晚食前再服牛膝散治風虛濕痹腰間久痛不任行履牛膝一兩去苗五加皮半兩丹參半兩木香三兩桂心三兩羌活半兩當歸半兩銼微炒防風半兩去蘆頭補骨脂三分微炒附子一兩炮裂去皮臍安息香三分入胡桃仁同搗熟白芍藥半兩石斛三分去根銼枳實半兩麩炒微黃鹿茸四兩去毛塗酥炙微黃虎脛骨一兩塗炙微黃上為細散每於食前以熱酒調下二錢治久冷腰痛摩腰方巴戟一兩附子一兩生去皮臍陽起石一兩細研硫黃一兩細研雄雀糞一兩川椒一兩去目乾薑一兩銼木香一兩菟絲子一兩酒浸三日曝乾別搗為末韭子一兩微炒上為末以真野駝脂熬成油濾去皮膜待冷入諸藥末和丸如彈子大洗浴了取丸分作四丸於腰眼上熱炙手摩之一方用豬脂熬油黃犬尤妙附子丸治腰久痛不可轉側附子一兩炮裂去皮臍檳榔二兩半川烏頭一兩炮裂去皮臍天雄一兩炮裂去皮臍桂心一兩半乾薑一兩半炒防風一兩半去蘆頭上為末煉蜜和搗百餘杵丸如梧子大每於食前以溫酒下二十丸威靈仙散治久患腰疼痛不瘥威靈仙一兩牽牛子一兩微炒厚朴半兩去粗皮塗生薑汁炙令香熟吳茱萸一分湯浸七次曬乾微炒陳橘皮半兩湯浸去白瓤焙上為散每於食前以溫酒服二錢得微利即效又方干熟地黃三分白朮半兩乾漆半兩搗碎炒令煙出桂心三分甘草半兩炙微赤銼牛膝半兩去苗上為細散每於食前以溫酒調下二錢鹿茸丸治腎氣衰虛或中風濕而傷於腎經致腰痛經久不瘥鹿茸一兩去毛塗酥炙黃天雄一兩炮裂去皮臍附子一兩半炮裂去皮臍杜仲一兩去粗皮炙微黃銼安息香二錢酒一盞熬成膏上為末用安息香煎和為丸如梧子大每於食前以酒下二十丸治久患腰痛氣攻心腹滿悶方當歸一兩銼微炒黃漢椒半兩去目及閉口者微炒出汗檳榔一兩上為末每於食前以熱酒下二錢治久腰痛及腳膝疼方牛膝三兩去苗何首烏三兩上為末以酒三升浸三日後焙乾細羅為散每於食前以溫酒調下二錢治久患腰疼石甜瓜一兩附子炮冬瓜皮冬瓜子雞心檳榔木香烏藥各半兩上為細末每服一大盞溫酒下臨臥時服午後申時先吃了飯令腹空服橘香散治腰痛經久不瘥橘核茴香葫蘆巴菴䕡子破故紙各炒附子炮等分上為末酒煮米糊丸梧桐子大每服三四丸食前鹽湯下申時向後不得吃食專候臨臥時服藥暖腎散治腰久患痛皆由腎冷所致附子炮裂去皮臍一兩澤瀉一兩半桂去粗皮一兩半蜀椒去目並閉口者炒出汗杏仁湯浸去皮尖雙仁炒黃當歸銼各一兩上為細散每服五錢空心冷酒調下日再服牛膝丸治久積冷氣腰痛行步無力及治留滯腰間攻刺疼痛不能俯仰牛膝酒浸焙乾炒附子炮裂去皮臍各二兩桂去粗皮吳茱萸湯浸焙乾炒乾薑炮各一兩半牽牛子三兩上為末煉蜜和丸如梧子大每服三十丸食前溫酒或橘皮湯下一方有木香乾漆散治多年腰痛乾漆炮令煙出木香桂去粗皮甘草炙銼各一兩一分熟乾地黃焙二兩半上為散每三錢溫酒調下日三服一方治久腰痛不可忍者立效青鹽半兩炒黑牽牛一兩炒破故紙一兩炒香熟茴香半兩上為末酒糊為丸每服三十丸空心溫酒下重者外用黑牽牛生熟各半為末每以三錢鹽酒調就嚼茴香數粒就吞丸子療腰痛方治積年痛者夫腰痛皆由傷腎氣所為腎虛而受於風邪停滯於腎經為血氣相擊久而不散故為久腰痛也乾地黃十分白朮五分乾漆五分桂心八分甘草五分炙上為末以酒服方寸匕日三忌桃李雀肉生蔥海藻菘菜萊蕪蔓荊腰胯疼痛附論夫腰胯疼痛者由氣血膚腠虛疏而受風冷故也腎主腰腳腎臟虛弱為風邪所乘風冷客於腰胯之間故令疼痛耳方狗脊丸治腎臟虛冷氣攻腰胯疼痛羸弱無力狗脊二兩木香一兩薯蕷一兩桂心一兩附子二兩炮裂去皮臍檳榔一兩半牛膝一兩去苗蛇床子一兩白茯苓一兩半五味子一兩半覆盆子一兩半獨活一兩半熟地黃三兩上為末煉蜜和搗三五百杵丸如梧子大每日空心以溫酒下三十丸晚食前再服療下冷腰胯肋下結氣刺痛方當歸六分鱉甲八分炙桑耳八分炙禹餘糧八分研白石脂八分芍藥八分炙厚朴六分炙吳茱萸六分茯苓六分橘皮六分檳榔仁六分人參六分上搗篩蜜和丸如梧子大空腹以飲服二十丸再日加至三十丸忌肉莧酢物萆薢丸治腰胯疼痛筋脈拘急行動難兩脅妨痛應痛丸治冷氣連腰胯痛食冷物即加劇白朮牛膝酒浸切焙當歸切焙黃耆銼芍藥陳橘皮湯浸去白焙桂去粗皮訶黎勒煨去核厚朴去粗皮薑汁製白茯苓去黑皮等分上為末煉蜜和丸如梧子大每服二十丸溫酒下加至三十丸空心食前日三服一方有人參療腹中冷氣食不消腰胯冷痛方人參六分白朮八分芎藭六分桂心六分吳茱萸六分橘皮六分檳榔仁八分當歸六分牛膝八分芍藥六分枳殼八分炙上為末蜜和丸如梧子大酒下三十丸熱飲酒衝上頭面宜煮薑棗湯下飲服亦得忌桃李雀肉生蔥牛膝丸治腰胯疼痛四肢少力不能飲食牛膝一兩去苗當歸一兩銼微炒乾薑半兩炮裂銼白芍藥三分厚朴一兩去粗皮塗生薑汁炙令香熟白朮三分芎藭半兩附子一兩炮裂去皮臍羌活三分桂心三分訶黎勒一兩煨用皮上為末煉蜜和搗三二百杵丸如梧子大每於食前服獨活散治冷滯風氣攻刺腰胯疼痛獨活一兩牛膝二兩去苗附子一兩炮裂去皮臍芎藭三分桂心三分赤芍藥當歸三分炒微黃桃仁半兩湯浸七次去皮尖雙仁麩炒微黃上為粗散每服三錢水一中盞入生薑半分煎至六分去滓每於食前溫服虎骨散治腰胯連腳膝晚夜疼痛不可忍虎脛骨一兩塗酥炙微黃萆薢一兩銼桂心一兩敗龜一兩塗酥炙微黃當歸一兩銼微炒芎藭一兩牛膝一兩去苗羌活一兩銼上為細散每於食前以溫酒調下二錢木香丸治久冷腰胯疼痛木香三分乾薑一兩炮裂銼當歸一兩銼微炒附子一兩炮裂去皮臍羌活一兩桂心一兩莨菪三合水淘去浮者水煮令芽出浸乾炒令黃黑色上為末煉蜜和搗三二百杵丸如梧桐子大每於食前以溫酒下二十丸熟地黃散治腰胯及脅肋疼痛不可忍熟乾地黃一兩牛膝三分去苗乾漆半兩搗碎炒令煙出白朮半兩桂心半兩木香半兩上為細散每於食前以溫酒下二錢調服治膀胱氣實腰胯間疼痛不可忍者方甘遂半兩炒令微黃杜仲半兩去粗皮炙微黃銼青橘皮半兩湯浸去白瓤焙上用為細末散每用羊腎一隻去脂膜入藥一錢濕紙裹煨令熟空心食之然後吃暖酒一中盞服後良久即便通利如未快即再服治腰胯疼痛尉方芫花二升川椒三升羊躑躅二升上以醋拌令勻濕分為兩處各納布囊中蒸各令極熟適寒溫隔衣尉之冷即更蒸尉之以痛止為度治腰胯連兩脅疼痛如打方上用大豆五合熬令焦用好酒一升煮之令沸去豆稍熱於食前調下菴䕡子二錢巴戟丸治風冷腰胯疼痛行步不得方見羌活丸腰腳疼痛附論夫腰腳疼痛者由腎氣不足受風邪之所為也勞傷則腎虛虛則受於風冷風冷與真氣交爭故腰腳疼痛方木瓜丸治腰腳少力疼痛無時及諸風氣濕痹蓯蓉酒浸牛膝酒浸當歸各四兩血竭沒藥各半兩木瓜威靈仙防風各一兩石菖蒲牽牛各四兩人參三兩全蠍白花蛇酒浸硃砂麝香天麻雄黃各三兩上為細末水麵糊丸如梧子大每服五十丸浸木瓜送下獨活湯治腰腳連骨疼痛搖動不能獨活去蘆頭三分麻黃去根節一兩細辛去苗葉丹參牛膝酒浸切焙萆薢黃耆桂去粗皮各二兩防風去叉附子炮裂去皮臍赤茯苓去黑皮羚羊角鎊各一兩當歸切焙芎藭各半兩赤芍藥二分上銼如麻豆大每服三錢以水一盞煎至七分去滓溫服不拘時秦艽散療風冷虛勞腰腳疼痛諸病悉主之方秦艽四分白朮十四分桔梗四分乾薑五分附子三分炮牡蠣炒防風六分人參四分茯苓四分椒子三分炒黃芩三分桂心五分細辛三分甘草三分炙杜仲三分上為散以酒服方寸匕日再服一方加鍾乳粉一兩亦好忌桃李雀肉生蔥生菜豬肉冷水獨活散出聖惠方治風毒中腰骨節疼痛獨活三分麻黃去節細辛半兩丹參牛膝三分去苗萆薢三分銼黃耆三分桂心三分防風一兩去蘆頭犀角屑一兩赤茯苓羚羊角屑一兩當歸半兩微炒芎藭半兩赤芍藥三分上為粗散每服四錢水一中盞煎至五分後入酒二合更煎三兩沸去滓每於食前溫服羌活湯出聖濟總録治腰腳疼痛痿痹不仁骨髓中冷久立不得羸瘦羌活去蘆頭防風去叉木通銼五加皮銼芍藥牛膝酒浸切焙桂去粗皮各一兩半酸棗仁炒當歸焙各一兩丹參麻黃去節各一兩白檳榔四枚煨銼黃耆銼各二兩半上粗搗篩每服五錢水一盞半煎取八分去渣溫服日二鹿角膠丸出聖濟總録治腎氣虛弱腳怯腰疼痛或因寒濕久滯鹿角膠炙一兩附子炮裂去皮臍乾薑炮各半兩桂去粗皮三分杜仲去粗皮銼一兩一分菟絲子酒浸一宿炒乾一兩山茱萸五味子各三分熟乾地黃銼焙肉蓯蓉酒浸切焙巴戟天去心牛膝酒浸切焙各一兩上為末煉蜜丸如梧子大每服二十丸溫酒下不拘時服療患腰腎虛冷腳膝疼痛胸肺中風氣外臺祕要病源云腎氣不足風邪之所為也勞傷則腎虛虛則受於風冷風冷與真氣交爭故腰腳疼痛也石斛五分五味子六分牡丹皮八分桂心八分白朮六分丹參六分磁石十分芍藥四分檳榔仁十分枳實六分炙通草六分細辛四分上搗篩和丸如梧桐子大空腹以酒服二十丸漸加至三十丸日再忌生蔥雀肉桃李生菜胡荽一粒金丹出宣明論方治腰膝走注疼痛如虎噬草烏頭五靈脂各一斤白膠香半斤木鱉子地龍去土炒各四兩細墨乳香各一兩當歸焙沒藥各一兩麝香一錢上為末再研一錢下糯米麵糊丸如桐子大每服一丸至二丸酒下吃藥罷遍身微汗神驗巴戟湯出聖惠方治腎虛腰腳疼痛行立不得巴戟天去心桂去粗皮萆薢牛膝酒浸切焙石斛去根各三兩防風去叉五加皮各半兩白茯苓去黑皮三分附子炮裂去皮臍一兩上銼如麻豆每服三錢水七分酒三分同煎七分去滓溫服不拘時候牛膝丸出聖惠方治腎傷腰腳疼痛舉動艱難及歷節風等牛膝酒浸切焙虎脛骨酥炙羚羊角鎊松節銼附子炮裂去皮臍威靈仙去土桂去粗皮各三兩當歸切焙一兩上為末用酒二升煮黑豆半升令熟濾去豆將酒入面煮糊丸如桐子大每服三十丸溫酒下不拘時服杜仲丸一名杜仲散出聖惠方治腰腳疼痛搖轉不能並治䐴腰連膝