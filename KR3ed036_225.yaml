服者去萬病通知神理安五臟延年長生並主婦人久無子冷病有能常服大益人好顏色年如十五時枸杞子三升杏仁一升去皮尖研生地黃研取汁三升人參十分茯苓十分天門冬半斤搗汁乾者末亦得白蜜五升牛髓一具無亦得酥五升上各依法料理先煎汁等如稀餳內諸藥煎候如神膏入水不散即成一服兩匙酒和服忌鯉魚酢物當合之時淨潔向善即得延年強記益心力用王相日合此日復須天晴明無風雨成滿日大良此藥性非冷非熱除風理氣鎮心填骨髓更加白朮令人能食時節既熱又非好日且可五分中合二分多合恐酢壞服覺安穩續合不遲忌桃李雀肉等天麻丸治諸虛天麻六兩酒浸三日焙乾稱除風痹牛膝六兩酒浸三日焙乾稱強筋玄參六兩樞機管領萆薢六兩研為末壯筋骨杜仲七兩銼炒去絲補腰腎當歸十兩全用和養血羌活十兩或十五兩去骨節間風生地黃一斤益真血附子一兩炮行諸經不止獨活五兩去腎間風邪上為細末煉蜜為丸如梧桐子大每服五七十丸病大至百丸空心食前溫酒白湯下服藥忌壅塞失於通利故服半月稍覺壅塞以七宣丸輕疏之使藥再為用也十全大補湯出和劑方治諸虛百損榮衛不和形體羸瘦面黃背倦頭眩耳重口苦舌乾心怔多汗血衄喘嗽飲食不進寒熱往來遺精失血腳膝痠疼婦人崩漏經候失調病後未復憂慮傷動氣血最宜服之人參去蘆白朮白茯苓焙甘草炙白芍藥官桂不見火黃耆蜜炙川當歸去蘆熟地黃洗焙川芎各等分上㕮咀每四錢水一盞半姜三片棗一枚煎七分空心食前溫服虛弱甚者每服稱半兩加鹿茸煎嗽者加五味子白豆蔻仁罌粟殼有痰加半夏發熱加柴胡有汗加牡蠣虛寒加附子寒甚加乾薑有風加獨活所加並等分若發熱骨蒸十全大補湯二兩入柴胡二兩作十服煎未效再服去地黃黃耆甘草名曰胃風湯蒼朮丸出本事方能治男子婦人一切虛冷之疾活血駐顏減小便除盜汗治婦人久不生産以帶疾而非時有遺瀝並皆治之蒼朮切焙川楝子茴香吳茱萸湯浸洗去子閉目者破故紙葫蘆巴各一兩並炒川薑川烏草烏各半兩並炮山藥一兩上各炮製如法同為細末醋糊為丸如梧桐子大每服十五丸空心溫酒鹽湯任下婦人艾醋湯下日二服丈夫四十歲以上者可常服耳目永不昏聾髭發不白又方出本事方川烏沉香紫霄花蒺藜蛇床子酒浸一宿菟絲子各等分上為末以熟水丸如彈子大每服一丸湯三大碗椒二合蔥二握用閉口瓶同煎取二碗去卻蔥椒安身於瓶口上熏如入得手則浴之留便止女人帶下赤白者依此熏之留取藥得三次溫過熏洗妙降心丹出和劑方治心腎不足體熱盜汗健忘遺精及服藥過多上盛下虛氣血不降小便赤白稠濁不清常服益心神補虛養血益丹田祕精氣熟乾地黃淨洗酒灑蒸焙乾天門冬去心麥門冬去心各三兩茯苓去皮人參遠志甘草煮去蘆骨茯神山藥各二兩肉桂去粗皮不見火硃砂研飛各半兩當歸去蘆洗焙三兩上為末煉蜜為丸如梧桐子大每服三十丸煎人參湯吞下黃耆丸出和劑方治丈夫腰腎虧虛風上攻頭面虛浮耳內蟬聲頭目昏眩項背拘急下注腰腳腳膝生瘡行步艱難腳下隱疼不能踏地筋脈拘攣不得屈伸四肢少力百節痠疼腰腿冷痛小便滑數及癱瘓風痹遍身頑麻又療婦人血風肢體癢痛腳膝緩弱起坐艱難並宜服之黃耆杜蒺藜炒去刺川楝子茴香炒赤小豆川烏泡去皮臍地龍去土炒防風去蘆叉炙各一兩烏藥二兩上為細末酒煮麵糊為丸如梧桐子大每服五十丸溫酒鹽湯亦得婦人醋湯下空心服又一法更加川狼毒海桐皮川椒威靈仙各一兩唯赤小豆加倍用之尤妙天雄丸出聖濟總録能治虛損諸病大補益元氣天雄炮裂去皮臍菖蒲去須銼炒沉香銼檳榔銼乾薑炮草豆蔻去皮炒桃仁去皮尖雙仁炒厚朴去皮生薑汁炙阿魏研破用醋面和餅炙令黃各二兩上為末醋煮麵糊和丸如梧桐子大每服二十丸至三十丸溫酒或鹽湯下空心臨臥服思仙續斷丸出和劑方能治脾腎風虛毒氣流注腿膝痠疼艱於步履小便遺瀝大便後重此藥補五臟內傷調中益精涼血補腎強筋健骨益智輕身耐老木瓜去瓤一三兩續斷萆薢各六兩牛膝洗去蘆酒浸一宿焙薏苡仁炒各四兩川烏炮去皮臍防風去蘆頭杜仲去皮姜炒斷絲各二兩上為末酒糊為丸如梧桐子大每服三十丸加至五十丸空心食前溫酒鹽湯任下鍾乳天雄丸出聖惠方能治男子虛損勞傷水臟憊腰膝疼筋骨無力夢寐不安陽道劣弱面色萎黃飲食減少日漸羸瘦及膀胱冷氣並宜服此大補益鍾乳粉肉蓯蓉酒浸一宿刮去粗皮炙乾鹿茸去毛塗酥炙微黃肉桂去皮磁石燒醋淬七次搗碎細研水飛過各二兩天雄炮裂去皮臍石斛去根銼巴戟白茯苓續斷補骨脂微炒木香蘹香子澤瀉防風去蘆頭山茱萸附子炮裂去皮臍當歸菟絲子酒浸一宿曝乾別搗為末人參去蘆頭薯蕷牛膝去苗各一兩沉香一兩上為末煉蜜和搗五七百杵丸如梧桐子大每日空心服及晚食前以溫酒下三十丸黃耆散出聖惠方能治虛損羸弱腎氣不足黃耆一兩半銼肉蓯蓉浸酒一宿刮去粗皮炙乾熟乾地黃白茯苓各一兩防風芎藭白朮山茱萸當歸研甘草炙微赤銼五味子桂心各一兩上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服治丈夫酒色過多下元虛憊足膝軟乏小便滑數外腎濕癢出本事方菟絲子五兩依法研石蓮肉二兩白茯苓一兩山藥二兩茴香二兩五味子五兩焙上為末稀糊為丸如梧桐子大每服四十丸溫酒或鹽湯空心下如腳氣及腳膝無力者木瓜酒空心下五十丸晚食前再服立效紫芝丹出御藥院方主降心火益腎水祕真氣健陽事紫芝黃連黃芩茯苓白礬瓜瓣各半兩白石英硃砂各二兩石決明一兩上為細末煉蜜為丸如梧桐子大每服一十丸溫酒食前或空心下沉酒煎附子四神丹出傳信適用方專能治一切虛冷之疾升降陰陽順正祛邪消風冷痰涎散結伏滯氣通利關節破瘀敗凝澀奔沖失經之血接助真氣生續脈息補腎經不足利膀胱小腸祕精固氣定喘上逆壓煩躁養胃氣療五臟虧損下虛上壅胸中痰飲臍腹冷積奔豚氣衝上下循環攻刺疼痛脾寒冷汗中風痿痹精神昏亂霍亂吐瀉手足逆冷陰毒傷寒四肢厥逆形寒惡風向暗睡臥乍靜乍亂婦人産後諸疾血氣逆潮迷悶欲絶赤白帶下崩漏不止一應久新諸病未能辨別虛實冷熱症候用藥未效悉宜此藥分勻陰陽正氣便能安和至不得已詳症乃服水窟雄黃雌黃辰砂透明硫黃各半斤上並別研水飛過滲干再同研勻用蜜水相和冷潤緊團作一球惟緊為妙次用雞子清磨濃墨塗薄紙作崑崙紙表裡俱塗厚塗為妙裹前藥三重再以濃墨塗之候乾用燒藥合子一個無大合子即分作兩處裹盛先以牡丹根皮燒煙燻合子令釅煙氣黑黃色入所裹前藥在內納琉璃盒子口下及一指以醋調臘茶作餅子蓋定與合子口縫平用赤石脂泥固濟合子蓋之令密卻用紙筋鹽泥固濟約厚一寸放令風曬極干如有紋以水再泥補候乾看有縫再補之入灰泥頂上二寸灰每日卯酉以四兩熱火如裝香法養十四日取出地面上用醋灰把定炭五斤圍火煅於淨室中不令婦人雞犬孝子見候火冷取出丹藥吹去草灰令淨一法初用炭火燒熱次加少火燒令通赤常約略炭五斤以來漸添火氣小卻添至五斤以來勿令炭厚薄不一可添至三稱去火漸令冷入地坑內深一尺用好黃土蓋之候三日取出打破合子取藥細研三日如粉用糯米糊丸即伏火四神丹也約三十兩末別入下項藥故曰四神附子丹胡椒末蓽茇末各七兩真赤石脂末二兩好桂心末六兩附子一兩以上者炮去皮臍取末十二兩以好法酒一斗煎至三升然後入附子末為糊和前藥內上丸如雞頭實大留少酒膏恐藥干候乾再添之輕病每服一粒重病二粒至三粒米湯飲下空心食前溫酒鹽湯亦得小兒吐瀉慢驚研一粒米湯灌下如有痼冷陳寒宜常久服餌如病安愈不得多服如覺熱渴即加木香桂末一錢同和服之思仙續斷丸出簡易方主理肝腎風虛腰脊疼痛腳膝不可踐地風毒流注下經行步艱難小便遺瀝補五臟內傷調中益智涼血補精堅強筋骨耐老輕身萆薢四兩防風去蘆薏苡仁五加皮牛膝酒浸川續斷羌活各三兩生地黃思仙木即杜仲銼炒斷絲各五兩上為細末好酒三升化青鹽三兩用木瓜半斤去皮子以鹽酒煮木瓜成膏和杵丸梧桐子大若膏子少益以酒糊每服三五十丸空心食前溫酒鹽湯任下防風當歸飲子出宣明論治脾腎真陰損傷肝心風熱鬱甚陽盛陰衰邪氣上逆上實下虛怯弱耐或表熱而身熱惡寒或裡熱而燥熱煩渴或邪熱半在裡半在表進退出入不已而為寒熱往來或表熱多則惡寒裡熱多則惡熱或表之陽分陽微正氣與邪氣相助並甚於里蓄熱極深而外無陽氣裡熱極甚陽極似陰而寒戰腹滿煩渴者或里之陰分正氣反助邪熱並甚於表則燥熱煩渴而汗出也或邪熱壅塞而煩熱疼痛者或熱結極甚陽氣不通反覺冷痛中外熱鬱煩躁而喜涼畏熱者或熱極閉塞不得宣通陽極似陰中外喜熱而反畏寒者或燥熱煩渴者或濕熱極甚而腹痛不渴者或一切風熱壅塞頭目昏眩偏風眼黑偏正頭疼口乾鼻塞耳鳴及聾咽嗌不利或目赤腫痛口瘡舌痹或上氣痰嗽心脅郁痞腸胃燥澀便熱淋悶或皮膚瘙癢手足麻痹或筋脈拘急肢體倦怠或渾身肌肉跳動心忪驚悸或口眼喎斜語言謇澀或狂妄健忘失志及或腸胃燥熱怫鬱不飢不欲食飲或濕熱內蘊而消穀善飢然能食而反瘦弱或誤服燥熱毒藥及妄食熱物過多而耗損腎脾則風熱鬱甚而多此等症不必全見也無問自病及中燥熱毒藥所使者並宜宣通氣血調順飲食久服之舊病除去新病不生設虛人常服補益切中自便可矣當歸大黃柴胡人參黃芩甘草炙芍藥各一兩滑石二兩上為末每服三錢至五錢水一大盞生薑三片同煎至七分去滓溫服一方有防風鹿茸四神丸出和劑方治肝腎虛熱淫於內致筋骨痿弱不自勝持起居須人足不任地驚恐戰掉潮熱時作飲食無味諸虛不足及肌體瘦悴血氣不生肉蓯蓉酒浸鹿茸燎去毛酥炙菟絲子酒浸通軟別研細熟地黃牛膝酒浸杜仲酒浸木瓜干天麻各等分上為末蜜丸如梧桐子大每服五十丸溫酒米湯食前下一方有五味子無杜仲補陰丹出御藥院方主益腎水滋真陰鎮伏心火大熱堅強骨髓補養精氣治發熱忪怔腳膝痹弱通調血脈潤澤肌膚使心腎交泰熱無妄動磁石重者燒赤醋浸七次水飛過灑干稱三兩鹿茸三兩去毛塗酥炙石斛澤瀉各三兩官桂去粗皮一兩半杜仲三兩切炒去絲山茱萸生用三兩生乾地黃八兩上除磁石外搗羅為細末後入磁石末同研勻煉蜜和丸如梧桐子大每服五十丸溫酒送下或鹽湯下亦得空心食前服服兩月覺一百日見效人參地骨皮散治臟中積冷榮中熱按之不足舉之有餘陰不足陽有餘也茯苓半兩知母石膏各一兩地骨皮人參柴胡炒生地黃黃耆各一兩半上㕮咀每服一兩生薑三片水煎細服戊己丸出本事方治丈夫婦人稟賦怯弱飲食無味氣血衰敗肌肉不生項背拘緊腰膊無力胸膈膨脹多睡少寤終日昏昏夜多異夢及積年脾蟲時下噁心噫酸吐水小兒吐乳大人翻胃並皆治之此藥能護脾開胃進飲食長肌肉生氣血化精益髓全胃氣丹田不竭腎經不虛茴香三兩揀淨甘草一兩炙人參一兩浮椒五兩乃胡椒是以揀淨的白朮二兩硃砂半兩白茯苓三兩香附子三兩炒去毛上為細末生薑汁打麵糊為丸如梧桐子大每服二十丸空心白湯送下日進一服又方出本事方石菖蒲二兩白茯苓三兩白朮二兩茴香一兩半青皮一兩枳殼一兩麩炒去瓤上為細末每服二大錢棗湯調空心下又方出本事方枳殼二兩麩炒去瓤木香一兩半丁香半兩青皮二兩半去白牡蠣二兩煅白茯苓二兩甘草二兩半炙上為細末米飲調下三錢不拘時內固丹出宣明論能治諸虛補養腎氣調和脾臟壽高者常服筋骨徑健渾如壯士肉蓯蓉酒浸茴香炒一兩破故紙葫蘆巴炒巴戟去心黑附子炮川楝子胡桃仁各四兩面炒上為末研胡桃仁為膏余藥末和勻酒麵糊為丸如梧桐子大每服十丸至三十丸空心溫酒鹽湯下食前服虛者加至五七十丸此藥明耳目補下元烏髭發美飲食補益肝腎丸出拔萃方能治兩目腫爛視物昏花耳聾耳鳴困倦乏力寢汗憎風行步不正兩足欹側臥則多驚腳膝無力形體消瘦柴胡五錢羌活五錢苦參五錢生地黃炒五錢防己炒五錢附子炮一錢桂一錢當歸三錢上為細末熟水丸雞頭大每服四十丸溫水食前下或問錢氏地黃丸補腎又曰補肝何也曰然手厥陰心主包絡足厥陰肝經俱治在下焦經云水俱不足滋其化源故腎肝之病同一治此地黃丸治二經之病也安息香丸出聖惠方治腎臟虛冷臍腹多痛腰腳沉重肌體羸瘦顏色萎黃食少無力安息香三兩細銼以無灰酒一升浸一宿以瓷碗中盛重湯煮成膏肉蓯蓉一兩酒浸一宿刮去粗皮炙乾胡桃肉三兩細研入安息香膏內鹿茸一兩去毛塗酥炙微黃補骨脂二兩微炒沉香一兩巴戟一兩丁香一兩雞舌香一兩附子一兩炮裂去皮臍桂心一兩牛膝一兩去苗上為末以安息香膏更入少許煉好蜜同和搗三五百杵丸如梧桐子大每日空心以溫酒下三十丸太上混元丹出危氏方夫河車者天地之先陰陽之祖乾坤之橐籥鉛汞之框廓胚胎將兆九九數足我則載而成之故謂之河車歷驗篇中名曰混沌皮蓋亦生天地陰陽之時為七十二丹之首高士垂慈始開端緒太上云若欲長生當修所生實資於此所以成功靈應非金石草木夜露曉霜之所比倫修真之士服之不輟誠足以返本還元補益之道乃得其真亦治勞損五臟補益真氣紫河車一具用初生男子者良帶子全者以東流水洗斷血脈入麝香二錢在內以綿縫定用生絹裹懸胎於砂罐內入好酒五升慢火熬成膏沉香硃砂各一兩人參蓯蓉酒浸乳香各二兩白茯苓去皮三兩安息香去砂酒熬各二兩上為末入河車膏子和藥末杵千百下丸如梧桐子大每服七十丸空心溫酒送下沉香湯尤佳詳此丹以紫河車為主但佐使之藥太輕無病之人久服可以輕身延年補損扶虛乃若病重之人服之卻宜增添之法也一方有天靈蓋一片酥炙黃一方無安息香治男子真陽耗竭腰背疼痛自汗怔忡痰多咳嗽夢遺白濁潮熱心煩腳膝無力加後藥鹿茸火燎去毛酥炙川巴戟去心鍾乳粉陽起石酒煮半日附子炮裂鹽水浸黃耆桑寄生一方無桑寄生有續斷生鹿角龍骨紫菀五味子各一兩上依法修制和前藥末用膏子為丸或沉香湯下一方無五味子治婦人血海虛損榮衛不足多致潮熱心煩口乾喜冷腹脅刺痛腰腿疼痛痰多咳嗽驚惕怔忡經候不調或閉斷不通宜於內加以下各藥當歸去尾石斛去根柏子仁牛膝酒浸一宿一兩半去苗鹿茸去毛酥炙鱉甲醋炙各一兩卷柏葉一兩去土紫石英煅醋淬一宿七次一兩上依法制和前藥末膏子丸虛寒者加炮附子二兩咳嗽者加紫菀茸焙二兩治熱勞河車依前法修治鱉甲醋炙半兩桔梗白芍藥大黃煨甘草苦參貝母知母秋石豉心草龍膽黃藥子莪朮煨犀角鎊真赤石脂酒浸一宿硝石各半兩上為末以前膏子丸湯使如前鎮心丹出傳信適用方治驚憂思慮過傷心氣不足怔忪盜汗亂夢失精神暴心痛中風不語風癇顛狂客忤不省悲哭無常色脫神瘁飛尸鬼交恍惚驚悸吐血便血虛勞羸瘦病後虛煩不得眠睡産前安胎産後補虛種種雜症並皆治之常服安鎮神魂善去百邪調順榮衛補養真氣延年益壽酸棗仁炒白茯苓黃耆炙人參遠志去心熟乾地黃五味子柏子仁各半兩上為細末煉蜜丸如梧桐子大硃砂為衣每服三十丸吐血人參湯下小便尿血赤茯苓湯下恍惚眩冒驚悸骨熱胸膈不利食少倦怠人參同茯苓湯下亂夢失精人參龍骨湯下卒暴心痛乳香湯下盜汗不已肌熱虛煩麥門冬湯下大便下血當歸地榆湯下中風不語薄荷紫蘇湯下風癇痰潮防風湯下種種心氣常服人參湯下溫酒亦得凡服藥後宜閉目定睡少時震靈丹出仁存方善固祕真元不濕不燥奪造化沖和之功無金石飛走之藥大理真元衰憊五勞七傷臍腹冷疼肢體痠痛上盛下虛頭目暈眩心神恍惚血氣衰微中風癱瘓手足不遂筋脈拘攣腰膝沉重容枯肌瘦目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜淋瀝盜汗久瀉久痢嘔吐不食八風五痹一切沉寒痼冷服之如神婦人血風不足崩漏帶下胎臟久冷無子服之立效此丹不犯金石飛走養性之藥也禹餘糧石火煅醋淬不計遍數以手撫得碎為度丁頭代赭石如上煅淬北赤石脂紫石英四味各用四兩上並作小塊入坩堝內鹽泥固濟候乾用炭十斤煅紅火盡為度入地坑埋二宿出火毒硃砂一兩研水飛過滴乳香別研沒藥去砂別研五靈脂去石研各二兩上並研停勻糯米糊丸雞頭子大曬乾每用五粒空心溫酒並水任下常服鎮心駐顏溫脾腎理腰膝除尸疰蠱毒鬼魅邪癘久服輕身漸入仙道忌食豬羊血恐減藥力遺精白濁米飲調茯苓末下又用二陳湯加茯苓煎湯下自汗盜汗黃耆湯下沉寒痼冷酒下精有走失或泄瀉後棗湯下大便溏泄濃米飲下老人血痢烏梅茶下吐瀉兼作者縮砂附子煎湯下陰症傷寒發熱自利乾薑附子煎湯下休息痢疾烏梅湯下腸風便血清米飲調百草霜末下婦人崩中下血米飲調香附末下帶下赤白炒艾醋湯下婦人若是虛損或失血後服醋艾湯下孕婦勿服小兒吐瀉後成慢驚脾最難療理止用此丹三兩粒為末米飲調下量大小加減最妙此丹但宜治病不宜常服恐澀滯氣血為癰癤之患若用以治病極有功效生地黃煎補虛損填骨髓長肌肉去客熱生地黃汁五升棗膏六合白蜜七合犛牛酥四合酒一升生薑汁三合紫蘇子一升研以酒一升絞取汁鹿角膠四兩炙末上先煎地黃等三分減一納蜜酥再熬調入膠末候煎成以器盛之以酒和服肉蓯蓉丸出聖惠方治腎臟虛憊膀胱久冷腰膝疼重筋力衰弱肉蓯蓉二兩酒浸一宿刮去粗皮炙乾遠志一兩去心巴戟一兩五味子一兩菟絲子一兩酒浸三日蒸乾別搗為細末桂心一兩去皮蛇床子一兩附子一兩炮裂去皮臍牛膝一兩去苗鹿角膠一兩搗碎炒令黃燥山茱萸一兩熟乾地黃一兩上為末煉蜜和搗三五百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸補虛黃耆湯出御藥院方治諸虛不足小腹急痛脅肋䐜脹臍下虛滿胸中煩悸面色萎黃唇口乾燥少力身重胸滿短氣腰背強痛骨肉痠疼行動喘乏不能飲食或因勞傷過度或因病後不復並宜服之人參去蘆當歸去蘆白朮桂心去粗皮甘草黃耆各三兩上為粗末每服三錢水一盞生薑三片棗子一枚同煎至七分去滓溫服食前日進三服遠志丸出和劑方治丈夫婦人心氣不足腎經虛損思慮太過精神恍惚健忘多驚睡臥不寧氣血耗敗遺瀝泄精小便白濁虛汗盜汗耳或聾鳴悉皆主之遠志去心牡蠣煅取粉各二兩白茯苓去皮人參乾薑辰砂別研各二兩肉蓯蓉淨洗切片焙乾四兩上為細末煉蜜為丸如梧桐子大每服三十丸空心食前煎燈心鹽湯下溫酒亦可此藥性溫無毒常服補益心腎聰明耳目定志安神養血氣未央丸出御藥院方能治氣血虛弱肢體沉重情思少樂飲食減少及腎氣衰憊腰腿沉重苣蕂子九蒸九曬巴戟去心川椒去目枸杞子甘菊花菖蒲人參去蘆各一兩上為末金襴袈裟一具東流水洗十次以荷葉裹之用文武火燒稍干好酒煮爛入藥末為丸如梧桐子大每服六七十丸至一百丸空心溫酒服或米飲下日進二服參附湯下出醫學切問專治男子婦人諸虛百損恍惚健忘神昏氣短頭暈目眩咳嗽多疾氣不升降夜多盜汗虛勞咯血遺精白濁腸鳴泄瀉並宜服之此藥補氣養血調和五臟溫暖脾元進美飲食久服無病不除川當歸川芎北防風北芍藥陳皮白桂大附子黃耆各一兩鹽水炙人參丁香益智仁白姜縮砂白豆蔻焙肉豆蔻煨北五味子各半兩南木香四錢沉香甘草各三錢上為粗末每服四錢水一盞半生薑三片棗子一枚煎八分空心服棗子脹氣虛滿者去之膽虛不得眠加酸棗仁虛勞咳嗽痰多加半夏神麯杏仁北細辛紫菀款冬花久嗽不愈咯血者煎地黃汁調鍾乳粉下黑錫丹氣壅加紫蘇葉腹脹加萆薢澄茄夜多小便加茴香益智煎鹽湯服心熱小便澀加茯苓口乾加五味子嘔者加藿香冷氣脹痛加茱萸良薑又方補虛損填骨髓長肌肉去客熱黃耆三分人參三分防風二分茯神二分甘草八分上搗篩為散納煎蜜中更煉為丸服之大效忌海藻菘菜酢物補益方昔褚氏患腰腳服之瘥顏色如三十歲時蓯蓉三兩桂心五兩菟絲子酒浸三兩乾漆煅三兩蛇床子三兩並搗為末生地黃一斤切以上好酒一斗漬之晝曝夜漬酒盡則止曝乾搗篩以和前藥上蜜和丸如彈子大丸酒飲任下一丸嚼破日三常服髓滿骨中忌生蔥蕪荑石斛散治男子陰衰腰背痛苦寒小便餘瀝囊下濕癢虛乏方見腎臟門白淫類案原方石斛去根巴戟天去心菟絲子酒浸二宿別搗各一二兩杜仲去粗皮炙銼桑螵蛸炒各一兩半上為散每服二錢空心溫酒下至晚再服伏火二氣丹出和劑方主治真元虛損精髓受傷腎氣不足面黑耳焦下虛上盛頭目暈眩腹脹刺痛翻胃吐逆虛勞盜汗水氣喘滿全不入食婦人血氣久冷崩中漏下癥瘕塊癖此藥奪陰陽造化之功濟心腎交養之妙大補諸虛硫黃四兩黑錫水銀丁香不見火乾薑各半兩上先熔錫後下銀結砂子與硫黃一處再研成黑灰色次入余藥研勻用生薑自然汁煮糊為丸如梧桐子大每服十粒至十五粒濃煎生薑湯空心食前下助神丸治陰氣不能任用滋陰助陽益氣血黑髭鬢潤澤皮膚榮養肌肉明目壯筋骨益精補髓何首烏用千里水淘米泔浸軟用竹刀去皮曝乾雌雄各半兩稱三十兩赤者為雄白者為雌生地黃投水中澡沉底於柳木甑內鋪勻瓦釜中用千里水於釜內桑柴火蒸熟時通透曝用地黃汁曬勻再曝乾如此蒸曝九遍干稱十兩當歸淨洗去蘆頭焙乾七兩半穿心巴戟七兩酒浸焙乾五味子去枝炒焙乾七兩上藥於木臼杵搗羅為細末用地黃自然汁銀石器熬成膏為丸如梧桐子大用瓷器中貯放每服七十丸食前各進一服用溫酒與地黃煎各半相和送下畏蕪荑忌豬羊血至如誤食亦無反惡只是解藥味藥力無效如小便渾濁加澤瀉七兩如大便祕澀加柏子仁七兩如氣不順加木香七兩楮實丸出聖惠方治積冷氣衝胸背及心痛有蛔蟲痔瘻痃癖氣塊積聚心腹脹滿兩脅氣急食不消化急行氣奔心胸並疝氣下墜飲食不下吐水嘔逆上氣咳嗽眼花少力心虛健忘冷風偏風等坐則思睡起即頭旋男子冷氣腰疼膝痛冷痹風頑陰汗盜汗夜多小便泄痢陽道衰弱婦人月水不通小腹冷痛赤白帶下一切冷氣無問大小服之能明目益力輕身補暖楮實一升水淘去浮者微炒搗為泥桂心四兩牛膝半斤去苗乾薑三兩炮裂銼上為末煮棗肉和丸搗五七百杵如梧桐子大每日空心以溫酒下五十丸大補丸出宣明論專治男子脾腎不足不問久新者陳蘿蔔陳韭子並炒蕤仁去皮各半兩麝香少許穿山甲七斤酒浸上為細末蜜和丸如櫻桃大每服一丸溫酒送下食前空心服
