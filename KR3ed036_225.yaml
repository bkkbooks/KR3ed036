body:
  text: 卷二百二十五諸虛門補益諸虛附論夫血氣者人之神所以榮養於一身而腎為之本若本元充實則精與神相感血與氣通流內有所守病安從來或乖將慎本臟虛損則氣血從之動輒生疾故有因虛而為風因虛而成積或耳目不能聰明或腰膝不能輕利或為痼冷或為諸勞宜有方劑以補益之方大沉香丸出德生堂主闢山嵐瘴氣通飲食厚腸胃令人肥白填精補髓去渾身走注活經脈健身體百病不生順氣寧心沉香木香丁香白檀香胡桃仁去皮枸杞子大茴香小茴香破故紙用羯羊番白腸一尺半盛上項藥在內好酒煮熟瓦器內陰乾葫蘆巴酒浸半兩同前藥治之全蠍去毒炒半兩穿山甲酥炙川楝子木通肉蓯蓉酒浸遠志去心韭子各半兩酒浸蓮蕊二錢川巴戟半兩酒浸去心乾山藥半兩蛀者山茱萸半兩去核知母半兩仙靈脾酥炙三錢青皮去白三錢白茯苓半兩牛膝酒浸三錢黃精酒浸半兩天門冬去心半兩麥門冬去心人參熟地黃乳香另研各半兩細墨一錠燒灰半兩生地黃半兩苣蕂子半兩菟絲子半兩酒浸帶濕與群藥同研北五味子半兩陳皮二錢上為細末好酒麵糊丸如梧桐子大每服三十丸至五十丸空心酒下乾物壓之忌諸血豆粉等冷物聚寶養氣丹出危氏方能治諸虛不足氣血怯弱頭目昏眩肢節倦怠心志昏憒夜夢失精小便滑數脾胃氣虛又治諸風癱瘓半身不遂語言謇澀肢體重痛寒濕氣痹或久寒宿冷泄瀉發瘧寒熱下痢赤白及腸風痔瘻下血不止婦人子臟久冷崩漏帶下五色月候不調腹脅刺痛血瘕血閉羸瘦乏力並皆治之代赭石紫石英赤石脂禹餘糧以上四味各二兩醋淬水飛過捏作錠子候十分乾入沙盒內養火三日罐子埋地中出火毒一宿入後藥陽起石煅肉豆蔻麵包煨鹿茸酒炙破故紙酒炒鍾乳粉研五靈脂酒研茴香酒炒柏子仁當歸酒浸炙遠志去心酒炒沒藥別研白茯苓附子炮胡椒沉香丁香銼木香乳香黃耆蜜炙山藥蓯蓉焙肉桂巴戟各半兩血竭琥珀硃砂麝香各三錢天雄炮半兩上為末糯米糊丸梧桐子大留硃砂麝香為衣每服三十丸空心人參湯或棗湯下婦人醋湯下膃肭臍丸出和劑方主補虛壯氣暖腎祛邪益精髓調脾胃進飲食悅顏色治五勞七傷真氣虛憊臍腹冷痛肢體痠疼腰背拘急腳膝緩弱面色黧黑肌肉消瘦目暗耳鳴口苦舌乾腹中虛鳴脅下刺痛飲食無味心常慘戚夜多異夢晝少精神小便滑數時有餘瀝房室不舉或夜夢鬼交及一切風虛痼冷並宜服之養氣丹出和劑方能治諸虛百損脾元耗憊真陽不固三焦不和上實下虛中脘痰飲上攻頭目昏眩八風五痹或卒暴中風痰潮上膈言語謇澀神昏氣亂狀若癱瘓及奔豚腎氣上衝胸腹連兩脅膨脹刺痛不可忍者陰陽上下氣不升降飲食不進面無精光肢體浮腫五種水氣上衝腰背搐痛夜夢鬼交覺來盜汗胃冷心疼小便滑數牽引小腹足膝緩弱步履艱難婦人血海久冷赤白帶下歲久無子及陰毒傷寒面色青舌卷陰縮難言四肢厥冷不省人事者急服百丸用生薑大棗煎湯灌之即便回陽命無不活或觸冒寒邪霍亂吐瀉手足逆冷六脈沉伏唇口青黑腹脅攻刺及男子陽事痿怯腳膝痠疼臍腹虛鳴大便自滑兼療膈胃煩壅痰氣虛鳴百藥不愈者此藥常服助養真氣生陽逐陰溫平不潛消磨冷滯克化飲食使五臟安寧六腑調暢百病不侵出入道途宜將此藥隨行緩急服餌大有功效禹餘糧石慢火煉二次醋淬七次為末紫石英煅一次赤石脂煅一次各半斤代赭石火煉七次醋淬七次為末磁石火煉十次醋淬十次以上各研為細末又以水研之挹其清者淋之紙上紙用筲箕盛欲使細末在紙上而水滴在下挹盡而止既干各用瓷瓶盛貯以鹽水紙筋和泥固濟陰乾以好硬炭五十斤分五處每一處用炭十斤燒紅作一爐子煅此五藥以紙灰蓋之兩日後火盡灰冷則再煅如此三次埋地坑內兩日出火毒再研入後藥附子炮去皮臍二兩當歸酒浸一宿焙乾肉蓯蓉淨洗酒浸一宿焙乾各一兩半茴香炒破故紙酒炒香熟木香不見火肉桂去粗皮巴戟鹽湯浸打去心丁香肉豆蔻麵裹煨山藥鹿茸酥炙白茯苓去皮沉香遠志去心各一兩以上各如法修制同研為末卻入沒藥去沙石研乳香別研五靈脂去沙石研各一兩以上三味入衆藥同研卻入硃砂或煅或蒸陽起石略煨或只用酒煮鍾乳粉各一兩以上三味別研臨時入上同為細末用糯米粉煮糊為丸每兩作五十丸陰乾入布袋內擦令光瑩每服五丸至十丸空心用鹽酒吞下或薑湯鹽湯或棗湯下亦可婦人艾醋湯吞下鐵刷湯出瑞竹堂專治男子婦人一切陰寒失精色敗腰膝疼痛泄瀉不止腸風下血痔漏遺精頭目昏眩諸病難痊兼治婦人赤白帶下産後血暈等氣疾紫梢花成塊帶蒂者佳揀肉桂大丁香蛇床子吳茱萸各一兩山茱萸去核天仙子蘿蔔子川椒細辛地豆大者白眉者佳狗脊芎藭甘松各半兩天雄一個白檀槐角子白芷沉香蕓薹子香附子芫花葶藶子巴戟去心肉蓯蓉木香各三錢上為粗末用酸漿水一大碗藥末五錢鹽少許同煎三五十沸傾在盆內熏之漸通手洗浴如火熱婦人每日熏浴之能使敗精穢血如黑汁下用藥人自知青木香丸出本草專主陽衰諸虛不足用崑崙青木香六路訶子皮各二十兩篩末砂糖和之昔鄭都尉方去砂糖加羚羊角十二兩白蜜丸如梧桐子大空腹煎酒下三十丸日再其效甚速開心肥健人出本草人參一分豬肪十分酒拌和服一百日百日滿體髓溢日誦千言肌膚潤澤去熱風痰補益出本草以肉蓯蓉刮去鱗甲以酒洗淨去黑汁薄切合山芋羊肉作羹極美益人食之勝服補藥玉膏出本草能令人體潤主延年取蟾蜍膏軟玉如泥以苦酒消之成水此則為膏之法試老嫩玉石間水飲之長生石斛丸出聖惠方主補虛損利腰膝暖水臟祛風冷強氣力悅顏色四時宜服石斛二兩去根銼蛇床子一兩牛膝一兩去苗桂心一兩菟絲子二兩別搗為末酒浸二日曝乾肉蓯蓉二兩酒浸一宿刮去粗皮炙令乾人參一兩去蘆頭鹿茸一兩去毛塗酥炙令微黃熟乾地黃二兩杜仲一兩去粗皮炙微黃銼木香一兩薯蕷一兩白茯苓二兩附子二兩炮裂去皮臍巴戟二兩防風一兩去蘆頭鍾乳粉二兩乾漆一兩搗碎炒令煙出澤瀉一兩山茱萸一兩覆盆子一兩補骨脂二兩微炒五味子一兩石龍芮一兩檳榔一兩上為末煉蜜和搗五七百杵丸如梧桐子大每服空心以溫酒下三十丸延齡丹出御藥院方用治脾腎不足真氣傷憊肢節困倦舉動乏力怠惰嗜臥面無潤澤不思飲食氣不宣暢小腹脹急臍下疼痛及奔豚小腸氣攻充臍腹發歇無時常服補五臟養真陽和血脈壯筋骨牛膝酒浸二宿蓯蓉酒浸二宿金鈴子去皮補骨脂炒各七錢半鹿茸益智仁檀香晚蠶蛾炒穿山甲炙沒藥研丁香青鹽各半兩沉香香附子炒薑黃薯蕷木香巴戟去心甘草炙各一兩川茴香炒七錢半乳香研白朮青皮蒼朮各三兩上為細末酒煮麵糊為丸如梧桐子大每服四十丸空心溫酒下靈宿丸出御藥院方能補強心志壯筋骨益氣血調榮衛補骨髓固元陽黑髭發治腰膝益志力通九竅利三焦去諸風除冷痰安五臟明耳目補虛損菟絲子酒浸一宿別研五兩覆盆子酒浸焙三兩熟地黃酒浸三日焙牛膝去苗酒浸肉蓯蓉去粗皮酒浸切焙天麻酒浸銼焙檳榔煨以上七味各二兩附子炮裂去皮臍鹿茸酥炙桂去粗皮石斛去根巴戟天去紫心者青皮去白焙楮實炒石葦去毛一兩杜仲去粗皮切焙蘹香子微炒白龍骨研補骨脂微炒葫蘆巴枸杞子遠志去心五味子炒蛇床子炒山茱萸沉香銼萆薢山藥另為末各一兩上為末用浸藥酒調山藥末煮糊更入酥蜜各一兩和藥搗三五百杵丸如梧桐子大每服二十丸空心溫酒送下溫粥飲送下亦可石刻安腎丸出危氏方能治真氣虛憊腳膝緩弱目暗耳鳴舉動倦乏夜夢遺精小便頻數一切虛損久服壯元陽益腎氣健筋骨生血駐顏扶老益壽蒼朮四兩一兩用茴香一兩炒一兩用青鹽一兩炒一兩用茱萸一兩炒一兩用豬苓一兩炒各炒令黃色取末用川烏炮去皮臍附子炮去皮臍川楝子酒浸去核巴戟白朮炒陳皮炒各一兩肉蓯蓉酒浸炙破故紙炒各二兩茯苓一兩炒木香不見火肉豆蔻麵裹煨當歸焙乾各一兩杜仲炒去絲二兩熟地黃酒浸蒸十次焙菟絲子酒浸炒茴香黑牽牛半生半炒山藥炒各一兩肉桂不見火晚蠶蛾去頭足翅炒葫蘆巴酒浸炒石斛炒川牛膝酒浸炒各一兩上為末酒煮麵糊丸如梧桐子大每服四十丸空心鹽湯下菟絲子丸出危氏方能治腎氣面色黧黑目昏耳鳴心忪氣短舉動乏力腳膝緩弱小便滑數房室不舉股內濕癢小便澀痛出血遺瀝久服補五臟去萬病益顏色聰耳明目菟絲子淨洗酒浸炒一兩石斛去根三分熟地黃去土酒炒白茯苓去皮川牛膝去苗酒浸焙乾各三分五味子半兩鹿茸去毛酥炙一兩澤瀉一兩山茱萸水浸去核三分川續斷三分桑螵蛸酒浸炒三分防風去蘆三分覆盆子去枝葉並萼半兩杜仲去粗皮炒三分石龍芮去土一兩蓽澄茄肉蓯蓉酒浸切焙補骨脂酒浸炒黑角沉香川巴戟去心各三分茴香炒三分大川芎半兩肉桂去粗皮綿附子炮去皮臍一兩上為細末酒糊和為丸如梧桐子大每服二十丸溫酒或鹽湯下空心腳膝無力木瓜湯下晚食前服一方無防風實氣散出簡易方大能補五臟氣虛脅肋膨脹中滿刺痛白朮二兩半當歸微炒厚朴薑汁製白茯苓去皮熟乾地黃焙黃耆蜜炙川烏炮去皮臍桑白皮續斷炒各一兩枳殼炒香白芷炒牡丹皮炒茴香炒威靈仙白芍藥白蒺藜炒去刺川芎五味子各一兩山藥山茱萸乾薑炮蓬朮甘草炙各三分上為細末用桃仁三分麵炒去皮研細和前藥每服二錢水一盞生薑三片棗一枚煎至七分食前鹽湯下點亦可萬應延壽丹麥門冬一兩去心天門冬一兩去心熟地黃一兩酒蒸生地黃一兩酒洗人參一兩乾山藥二兩牛膝三兩酒浸巴戟二兩去心澤瀉一兩肉豆蔻四兩酒浸洗杜仲一兩薑汁炒去絲枸杞子一兩酒浸洗去須赤石脂一兩煅遠志一兩白茯苓一兩去皮覆盆子一兩地骨皮一兩酒洗去土五味子六兩半車前子一兩石菖蒲一兩柏子仁一兩川椒七錢菟絲子三兩酒浸山茱萸一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心溫酒送下初服一日三服二日至三日每日只一服漸加至五十丸老者加百丸服四十九日見效至百日百病散去身體榮潤初服三日小便或落雜色惡物是腎間病出五日間氣痞是臟腑間寒熱氣出至七日唇口生津液粗覺腹痛勿怪十日全體漸肥潤至二十日鼻頂辛酸消除腹中一切痛症四十五日語言雄壯胸膈微痛或吐微血去積滯思慮鬱結至百日百病皆散身體強健至誠修合服餌其效不淺也膃肭臍丸出聖惠方能補益丹田固濟水臟安神益智明目駐顏壯腰膝充肌膚補虛冷安臟腑膃肭臍一兩酒刷炙微黃蓽澄茄一兩附子一兩炮裂去皮臍澤瀉三分芎藭三分沉香一兩石龍芮三分肉豆蔻三分去殼牛膝一兩去苗蛇床子三分薯蕷一兩覆盆子一兩巴戟三分檳榔一兩桂心一兩木香一兩麝香一兩細研白朮三分遠志三分去心石斛一兩去根銼補骨脂一兩微炒山茱萸三分肉蓯蓉一兩酒浸一宿刮去粗皮炙乾母丁香三分上為末入麝香研令勻煉蜜和搗三五百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸巴戟丸出聖惠方專治丈夫下焦久積風冷腎臟虛乏腰膝痠疼小便數陽道衰不能飲食面無顏色筋骨萎弱起坐無力膀胱虛冷臍腹脹急久服駐顏色養精志巴戟一兩肉蓯蓉一兩酒浸一宿刮去粗皮炙乾石斛一兩