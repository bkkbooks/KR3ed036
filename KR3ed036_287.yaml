body:
  text: 卷二百八十七癰疽門癰內虛附論夫癰內虛者營衛腐為膿血經絡不足則五臟之氣虛乏也其證多生虛熱而心神為之驚悸以癰熱不散乘虛而入又心獨惡熱故驚悸不定也方黃耆散出聖惠方治癰內虛不足膿水不絶四肢乏力不能飲食久不瘥必為內漏黃耆銼一兩山茱萸五味子各半兩白茯苓去黑皮三分當歸切焙半兩石斛去根三分遠志去心焙一兩附子炮去皮臍巴戟天去心肉蓯蓉酒浸切焙麥門冬去心焙熟乾地黃焙各一兩菟絲子酒浸三日焙乾半兩為末人參三分石葦去毛一兩白芍藥三分芎藭半兩甘草炙銼三分上為散每服二錢荊芥湯下日三服一方有地麥半兩肉蓯蓉散出聖惠方治癰經年不瘥膿血過多補虛乾薑炮一兩巴戟天去心一兩菟絲子酒浸別搗三分肉蓯蓉酒浸切焙二兩遠志去心人參各一兩甘草炙銼麥門冬去心焙各二兩石葦去毛白芍藥桂去粗皮芎藭各一兩熟乾地黃焙各一兩半山茱萸當歸切焙各二兩五味子二兩附子炮製去皮臍二兩白茯苓去黑皮一兩半上為散每服二錢荊芥湯調下空心食前服一方有地麥三分五香丸出聖惠方治癰膿血至甚不生肌肉內補沉香乳香木香藿香葉丁香續斷各一兩白芍藥一兩熟乾地黃焙二兩附子炮製去皮臍石長生各一兩敗醬人參白茯苓去黑皮各一兩厚朴去粗皮薑汁炙一兩半鹿角屑虎脛骨酥炙黃各二兩薰陸香一兩上為末煉蜜和搗三百杵丸如梧桐子大每服三十丸以地黃湯下蜀椒散出聖濟總録治癰內虛蜀椒去目並閉口炒出汗半兩熟乾地黃焙白蘞防風黃芩去黑心人參桂附子去皮臍焙乾各一兩芎藭甘草炙各一兩赤小豆一合炒令熟上為散每服二錢溫酒調下早晚食前服熟地黃散出聖惠方治癰疽發背髮乳大去血膿後內虛少氣熟乾地黃黃耆銼人參去蘆頭各一兩當歸半兩銼碎微炒芎藭二兩白芍藥半兩白茯苓一兩甘草半兩炙微赤銼桂心半兩麥門冬去心續斷各一兩上為散每服四錢水一中盞入生薑汁半分棗三枚煎至六分去滓不拘時溫服人參散出聖惠方治癰疽內虛不足人參一兩去蘆頭黃耆二兩銼甘草半兩炙微赤銼當歸白芍藥半兩枸杞子一兩白朮一兩熟地二兩白茯苓一兩桂心半兩上為散每服四錢水一中盞入生薑汁半分棗三枚煎至六分去滓不拘時溫服黃耆散出聖濟總録治癰潰漏血空竭內塞黃耆銼芍藥細辛去苗葉瞿麥穗白芷薏苡仁人參附子炮去皮臍赤小豆熟乾地黃焙各一兩上為散每服二錢空心溫酒調下晚再服痛甚加芍藥口乾加薏苡仁膿多加黃耆黃耆湯出聖濟總録治癰疽內虛黃耆銼人參甘草炙銼白朮遠志去心各半兩芍藥當歸切焙各一兩熟地黃焙白茯苓去黑皮桂去粗皮各三分上粗搗篩每服五錢水一盞半入生薑半分拍碎干棗三枚擘破同煎至八分去滓空心溫服日晚再服生地黃湯出聖濟總録治癰內虛熱生乾地黃切焙二兩人參一兩芍藥一兩白茯苓去黑皮芎藭一兩當歸切焙一分黃耆銼一兩黃芩去黑心一兩木通銼二分上粗搗篩每服五錢水一中盞半入竹葉七片棗二枚擘破同煎至八分去滓空心溫服日晚再服之排膿生肌散出聖惠方治癰發背膿不止內虛當歸銼微炒黃耆銼各半兩人參一兩去蘆頭芎藭半兩厚朴一兩去皮生薑汁炙香防風半兩去蘆頭白芷半兩桔梗半兩去蘆頭甘草半兩炙微赤銼上為細散每服二錢以木香湯調下日三四服癰潰後附論夫癰者由寒氣客於肌肉血氣結聚乃成癰也癰潰之後有逆順其眼白睛青黑而眼小者一逆也服藥而嘔者二逆也傷痛渴甚者三逆也有肩背不便者四逆也音嘶色脫者五逆也除此五者併為順也腸胃受冷而變下利利則腸胃俱虛而冷搏於胃氣則變嘔逆氣若不通遇冷折之則變噦也方黃耆散出聖惠方治癰潰後補虛去客熱黃耆二兩銼知母二兩石膏二兩白芍藥麥門冬去心各一兩甘草半兩炙微赤銼白茯苓桂心川升麻熟乾地黃人參去蘆頭各一兩上為粗散每服四錢水一中盞煎至六分去滓溫服日三四服梔子散出聖惠方治癰已潰後散腫氣梔子仁川大黃黃連去須白芨牡蠣白蘞木通銼川升麻黃芩各一兩上為細散每用以雞子白調塗故帛上貼腫處燥復易之內塞散療癰疽潰漏血脈空竭黃耆細辛芍藥薏苡仁白芷瞿麥各二兩赤小豆半兩乾地黃人參防風上為以新成白苦酒置新器中內赤小豆須臾出銅器中熬令燥復須內苦酒中更熬下五丸及止合搗為散酒服方寸匕日夜六七過腹痛甚倍芍藥口未閉倍薏苡仁膿多倍黃耆忌生菜蔥蕪等物洗藥豬蹄湯藁本去苗川當歸去蘆杜獨活去蘆藺草一方作茴香黃連去須薔薇根狼牙草甘草大黃芍藥各二兩上為粗末先用獖豬前蹄一隻煮取濃汁澄去滓肉與上面油花每用藥化末半兩蹄汁一碗蔥白一根漢椒二十餘粒同煎三五沸去滓熱通手遂洗之黃耆茯苓湯出千金方治癰疽潰後膿大多虛熱黃耆麥門冬各三兩五味子四合芎藭二兩生薑四兩茯苓一兩桂心二兩大棗二十枚上為粗㕮咀以水一斗半煮取四升分六服千金翼有遠志當歸人參各二兩甘草六兩豬蹄湯出經驗方治一切癰疽腫毒消毒氣去惡肉凡瘡有口便用此洗香白芷不見火切生甘草老羌活露蜂房取有兒者黃芩去心赤芍藥去皮川當歸去蘆洗焙各等分上為粗末看疽大小用藥如疽大加料用先將豬前蹄兩隻一斤只用白水二升煮軟將汁分為兩次澄去面上油花並下面滓肉每次用藥一兩投於汁中再用文武火煎十數沸去滓以故帛蘸藥湯溫溫徐薄揩瘡上死肉惡血隨洗而下淨洗訖以故帛挹干仍避風忌人口氣吹之有狐臭人並月經現行婦人猶不許入病人房洗瘡切勿以手觸看洗疽之方所傳甚多惟此方極神效其用露蜂房極有理蓋以毒去毒也一方無羌活淡寮方無黃芩豬蹄洗湯療癰疽等毒潰爛豬蹄一具治如食法薔薇根一斤甘草五兩炙芍藥白芷各五兩上以水二斗煮豬蹄取八升去滓下諸藥味取四升稍稍洗瘡上洗肌散治膿水未乾者以藥夾黃蔥洗之青木香白蘞檳榔貫衆荊芥上同煎洗之甚妙白芷摩膏療疽已潰白芷甘草各二分烏頭三分薤白十五挺青竹茹雞子大一枚上以豬膏一升合煎白芷黃膏成絞去滓塗瘡四邊勿著瘡中白蘞湯出聖惠方治癰腫已潰後結強宜拓方白蘞黃芩赤芍藥丹參各一兩上藥細銼以水三升煮至一升半以帛浸拓腫上頻頻換之為妙白芷散出聖惠方治癰瘡已潰白芷黃連去須地榆銼各一兩上為細散以雞子白調塗布上貼日三四度換之去水膏出直指方治癰疽破穴後誤入皂角水及諸毒水以致疼痛甘草一分生為末沙糖糯米粉各三分上為膏攤在絹上貼之毒水自出驢馬汗及尿糞一切毒水皆治之治癰瘡潰後爛方出聖惠方取陳久醬汁和麵搽瘡上日三易之治癰後流膿不盡或更移結腫松脂封方出聖惠方以松脂蠟等分同溶成汁密封之久癰附論夫人之肌肉皮膚待血氣以溫養癰久不瘥熱毒未盡風冷乘之客於瘡孔肌不得溫故腫結不消乍瘥乍發名曰久癰不治則變成瘻方五香連翹丸出聖濟總録治諸癰腫熱毒蘊積或久出膿水煩熱疼痛瘡口不合排膿去死血木香一兩半沉香銼人參雞舌香乳香芍藥玄參海藻洗去咸汁各一兩當歸切焙連翹各一兩半麝香研半兩桂去粗皮大黃銼芒硝研各一兩惡實二兩桃仁去皮尖雙仁炒黃一兩半上為末煉蜜和丸如梧桐子大每服二十丸至三十丸空心酒下量虛實加減黃耆散出聖惠方治癰久出膿水過多四肢虛羸黃耆一兩銼敗醬三分絡石一兩防風三分去蘆頭漏蘆一兩白蘞三分白薇一兩玄參三分白茯苓三分白芍藥一兩沉香藿香各三分熟乾地黃一兩甘草半兩炙微赤銼上為粗散每服四錢水一中盞煎至六分去滓溫服日三四服之占斯散出聖惠方治久癰及風毒留積穿穴久出膿水疼痛補肌肉占斯黃耆銼各半兩細辛木香連翹桔梗去蘆頭芎藭甘草炙微赤銼白芍藥續斷人參去蘆頭獨活各一兩熟乾地黃半兩上為細散每於食前以粥飲調下二錢木香湯出聖惠方治一切癰疽及乳癰風腫留積疼痛不止或膿水不快久不生肌木香乳香雞舌香各半兩沉香射干連翹升麻黃耆銼炒獨活去蘆頭木通桑寄生銼甘草炙銼大黃銼炒各三分上粗搗篩每服五錢水一盞半煎至一盞下芒硝五分麝香半字更煎一二沸濾去滓空心溫服不利再服蝟皮散出聖濟總録治一切癰疽諸瘻拔毒氣生肌肉止膿血蝟皮杜仲銼炒厚朴去粗皮薑汁炙透各一兩續斷地榆藁本去土附子炮去皮臍當歸切焙桂去粗皮各半兩小露蜂房半枚炙上為散每服二錢溫酒調服再服麥門冬湯一名內補散麥門冬去心焙黃耆炙銼五味子炒白茯苓去黑皮各一兩芎藭桂去粗皮各半兩當歸切焙人參甘草炙各三分遠志去心焙一兩上粗搗篩每服五錢水一盞半入生薑半分拍碎大棗二枚擘開同煎至一盞濾去滓空心溫服晚再服生肌膏取瘥殺蟲散出聖惠方治癰疽發背久不瘥白蕪荑藜蘆去蘆兩雄黃細研各一兩麝香一分細研青礬半兩雄黃半兩細研苦參一兩銼附子半兩炮製去皮臍上為細散與麝香相和研勻每用時先以吳藍甘草煎湯洗瘡口去痂干日二敷之麥門冬散出聖惠方治久癰膿水出不盡心中煩悶不已麥門冬一兩去心紫葛三分銼木通一兩銼黃耆一兩銼川升麻三分犀角屑三分甘草半兩炙微赤銼上為粗散每服四錢水一中盞煎至六分去滓不拘時溫服之白蘚皮湯出聖濟總録治癰疽日月久遠膿水不盡心中煩悶白蘚皮桑根白皮銼玄參漏蘆去蘆頭升麻各一兩犀角屑半兩敗醬三分上搗篩每服五錢以水一盞半煎至一盞入芒硝半錢濾去滓空心溫服晚再服稍覺瘡痛止去芒硝蟾蜍膏出聖濟總録治一切瘡腫癰疽瘰癧等疾經月不瘥成冷瘻蟾蜍一枚去頭用石硫黃別研乳香別研木香桂去粗皮各半兩露蜂房一枚燒灰用上為末用清油一兩調藥入瓷碗盛於銚子內重湯熬不住手攪令成膏攤絹上貼之候瘡上清水出更換新藥甚者厚攤貼之黃耆湯出聖濟總録治癰疽惡瘡久遠膿水不盡變為瘻黃耆銼炒一兩升麻半兩犀角鎊半兩紫葛木通銼各三兩上粗搗篩每服五錢水一中盞半煎至一盞下朴硝半錢濾去滓空心溫服取利三兩行為度未利再服如神散出聖濟總録治瘡久不瘥時常痛癢皮縮肉消黃汁膿血不斷天南星炮一枚草烏頭炒一兩礬石煨半兩上為散先入熱湯洗次用散子調生油攤紙上貼之黃連散出聖濟總録治一切癰疽久不瘥黃連去須滑石碎各一兩上為散先濃煎甘草湯溫洗瘡了拭乾爛嚼胡麻子敷之後干貼此散日三易良又方出聖濟總録治久癰巴豆五枚去心皮令研細魚脂三兩上先熬脂令沸入巴豆煎攪令勻以瓷盒盛塗敷瘡上日三易又方出聖濟總録巴豆五枚燒灰令研細斑蝥五枚燒灰細研上為散敷瘡上以綿貼之日一治癰癤潰後膿不斷及諸物刺傷瘡出聖惠方硫黃粉二兩牛筋一片碓碎上以筋內硫黃中以刺瘡孔內取瘥治癰疽瘡久不瘥出聖惠方松脂三兩薰陸香三兩上合搗內少許鹽為餅貼瘡上得汁出盡瘥治久癰塗敷方出聖濟總録用白楊葉乾者一握為末敷瘡上日二又方出聖惠方用飴糖一分取火溶灌瘡中日三又方出聖濟總録用鶴骨銼半兩為末以豬脂調如糊塗敷瘡上故帛裹之須臾癢發當有蟲出瘥治癰久不瘥用馬齒莧搗汁煎以敷之癰腫貼熁附論凡療暴熱欲成癰腫者所貼熁藥初時熱勢猛盛炎熾難當腫處若有頭即當上貼溫熱膏藥引出其熱毒此乃火就燥之義也四畔赤焮處搗生寒藥貼熁之折伏其熱勢亦如驅逐邪惡撲火之義也夫生寒藥勢氣力精全性味雄壯古來療者不本物理皆通用藥草膏之類已經油煉氣力殊微欲使羸瘦之人敵其勇夫不亦難乎沉癰者壅也要在疏通若初時便令以黏膏貼熁豈得散於鬱結欲不成膿得乎其中若熱氣不甚或熱已衰即任貼膏藥求瘥凡貼熁腫藥皮厚者以故軟布或紙花子塗藥敷貼之待藥干換腫皮薄者即用疏紋縠或薄紙塗藥貼之其藥未乾即當換列諸熁方於後方蕓薹散出聖惠方治癰疽一切風毒熱腫發背乳癰等疾蕓薹一兩黃耆一兩銼川大黃一兩生用羊桃根三分銼硝石三分半夏三分白蘞莽草三分丁香半兩木香半兩沒藥半兩白芷半兩赤芍藥半兩上為細末看患處以醋旋調稀稠得所塗故布或疏絹上日三貼之以腫退為度大黃散出聖惠方治癰瘡不消欲結成瘻川大黃生用黃芩龍骨甘草黃連去須當歸銼微炒牡蠣白蘞白芨赤芍藥赤石脂各一兩上為細末每用豬膽汁調塗於細布上看腫大小貼之燥則易寒水石散出聖惠方治癰疽熱毒疼痛攻焮肌肉赤色虛腫手不可近欲成膿及有膿者四畔赤腫寒水石二兩羊桃根一兩銼硝石一兩木香半兩白蘞半兩丁香半兩榆皮半兩銼赤小豆一合漢防己半兩川大黃一兩生用上為細散用頭醋旋調和稀稠得所塗故軟布上貼瘡頭田畔赤焮處候乾即易之其瘡頭別研波斯青黛少許水和時以鳥翎敷之勿令乾燥紫葛散出御藥院方治癰腫及發背有赤腫熱痛不可忍紫葛三兩銼川大黃三兩生用白蘞二兩玄參二兩黃芩二兩升麻二兩榆白皮二兩銼木通一兩赤小豆五合黃連三兩上為細散以新汲水調如麵糊塗於腫上干即再塗勿令燥玄參散出聖惠方熁癰腫毒熱疼痛玄參紫葛銼川大黃生用木香黃柏川芒硝黃藥紫檀香各半兩銼上為細散以雞子白調和稀稠得所薄塗患處有瘡腫已破者去芒硝柳木耳餅出聖惠方治癰疽瘡腫熱焮疼痛柳木耳龍葵根銼各一兩黃連三分去須川芒硝一兩麥飯石三分燒醋碎三次雄雀糞一分乳香一分杏仁一兩其瘡有頭作孔者湯浸去皮尖無孔和皮搗用之上為細散用漿水和捏作餅子如五文錢厚貼瘡頭以單帛押之日三易蛇蛻皮方治癰疽發背未結膿血散腫氣蛇蛻皮二兩燒灰雞子白三枚蕓薹子二兩末赤小豆三合末米醋三合蔓荊子三合末生馬齒莧一握灶中黃土二兩末上都研令爛熟用塗腫上干即易之大黃湯出聖惠方治發癰腫皮剝爛汁流出如火燒熱甚不可耐貼此令消川大黃一兩生用赤小豆一兩牡蠣黃連白蘞土瓜根當歸銼微炒各一兩上為細散每以雞子白調塗故布上貼腫處燥即易之野葛散出聖惠方治癰腫疼痛不止野葛銼川大黃生銼半夏莽草川芒硝白蘞各半兩上為細散以豬膽和如膏攤於布上貼腫處干則易之清水膏出聖惠方治癰疽及一切毒腫堅硬疼痛攻衝四畔焮腫抽熱毒散腫氣羊蹄根銼川大黃生銼黃芩黃柏緑豆粉各一兩赤小豆一合上為細散用蕓薹菜搗汁自然者以蜜少許相和調藥令稀稠得所看四畔腫赤處大小剪生絹攤貼之厚一錢干即易繁柳干散出聖惠方治癰未有頭赤腫疼痛貼之繁柳干四兩燒灰川大黃一兩生銼白蘞一兩白芨一兩赤小豆二合上為細散以新汲水調如膏塗腫上干則易之硝石散出聖惠方治癰初結赤腫熱焮急痛熁毒散腫川硝石雄黃細研白芷白礬玄參各三分上為細散用生油和蜜調塗痛處干則易之腫消為度水調膏出聖惠方治癰腫毒熱赤焮疼痛川大黃生用杏仁去皮生研如膏鹽花各三分上為細末入杏仁膏都研令勻以新汲水和令稀稠得所旋取塗腫上干即易之清涼膏出聖惠方治癰初結腫振焮散毒糯米半升炒令焦黑於地上出火毒甘草二兩生用上為細散看患大小取雪水調塗腫上燥易之貼熁方出聖惠方治癰發背槐子一合慎火草一握上搗爛以水和調塗之又方出聖惠方治癰腫用天靈蓋一枚惟陳者佳炙令微黑為細末以蜜調如面脂塗腫上亦令內消治已覺有膿未作頭方出聖惠方用木香以醋磨塗之干即再塗不經數遍當便作頭治癰初發熱毒腫痛方出聖惠方用蔓荊子一升為細末以醋和如膏封貼腫上干再易治癰腫發背貼熁方出聖惠方用菖蒲不限多少濕者搗爛捏作餅子約瘡大小貼之干則易之如冬月無濕者即取乾者為末用驢乳和搗為餅子用之如不住瘡上以帛縛之又方出聖惠方用搗百合根敷之治癰膿不出方出聖惠方用柳根細切封之以布掩燥復易之治癰初結腫及發背方用馬齒莧一斤搗令爛置於銅鑼中安於新汲水上候馬齒冷即敷腫上熱即易之當時其腫自消治癰未有頭必穴方出聖惠方用搗水芹敷之又方出聖惠方用搗水紅草敷之又方出聖惠方用搗夏枯草敷之又方出聖惠方用搗積雪草敷之又方出聖惠方用搗酸漿葉敷之又方出聖惠方用搗蒼耳敷之又方出聖惠方用搗蓼藍敷之又方出聖惠方用搗景天草一名護火草敷之治癰腫發背貼熁用搗苧麻根敷之諸疽附論夫疽者五臟不調所生也五臟主裡氣行經絡而沉若喜怒不測飲食不節陰陽不和則五臟不調營衛虛者腠理則開寒客經絡之間經絡為寒所折則營衛稽留於脈營者血也衛者氣也營血得寒則澀而不行衛氣從之與寒相搏亦壅遏不通氣者陽也陽氣蘊積則生於熱寒熱不散故積聚成疽臟氣沉行主裡故疽腫深厚其上皮強如牛領之皮久則熱勝於寒熱氣純盛蘊結傷肉也血肉腐壞化而為膿乃至傷骨爛筋不可治初發疽時一粒如麻豆大身體便發熱生疽處肉赤熱腫大而高多生疼痛破後肉色紅紫此為外發雖大若盆碗如用藥有理百人可百活如初發疽時不拘大小身體無熱自覺倦怠生疽處亦不熱數日之間漸漸開大不腫不高不疼不痛低陷而壞爛破後肉色紫黑此為內發有此證者未發見之先臟腑已潰爛百人百不救雖有良藥亦付之無可奈何黃帝問曰有疽死者奈何歧伯曰身有五部伏兔一腓二背三五臟之俞四項五此五部有癰疽者死也有緩疽者初結腫形似癰回回無頭尾其色不異但痛有根核又與皮相親著一名肉癰其有大者如拳小者如桃李狀積日不潰乃變紫色黯黑久即皮肉俱爛如牛領瘡狀遍體通青黯色不作頭而穿潰膿出是也初作服五香連翹湯鑱去血以小豆薄塗之其間數針鑱去血又敷之取消也若不消色不變青黯者以煉石敷之若失時不得療已潰者猶服五香連翹湯及漏蘆湯下之隨熱多少投方也外以升麻湯拓洗之敷生麻膏若生臭惡者可以單行一物白䕡茹散敷之青肉去盡便停也好肉既生但敷升麻膏若不生肉單服一物黃耆散也若敷白䕡茹散積日青惡肉不盡者可以漆頭赤皮䕡茹取半錢和三大錢上白䕡茹散中合和敷之惡肉去盡還以純用白䕡茹散也視好肉欲生可敷黃耆散也黃耆散方白䕡茹散方漆頭䕡茹散方並一味單行隨多少搗篩為散治疽之法灼艾之功勝於用藥緣熱毒中隔上下不通必得毒氣發泄然後解散古人立論譬諸盜入主人之家必開其門戶逐之使去萬一門戶閉塞無從而出傷主而後已人不幸而有此疾適處貧困適居僻邑村鄉難得藥材則灼艾尤為利便灼艾之功須初發一日之內尖頭如麻豆大時便好措手其法用大獨頭蒜薄切如小錢厚亦如錢大貼於疽頂尖上以艾炷安蒜上灸之三壯一易痛者灸至不痛不痛者以痛為度大概以百壯為準用大蒜取其毒有力多用艾炷取其火力通透如法灸之瘡一發膿潰繼以神異膏貼之即日而安一能使瘡不開大二肉不壞三口易合一舉而三得之然人未知之而多遲疑未決至二日之後疽大如指毒氣開散病者不能看火不可灼艾矣可不預知之乎但頭上見疽或頂以上見疽決不可用此法灸灸則反增其疾也疽疾既成先服取毒之藥只用麥飯石膏塗貼五七日之後病漸減退合服川烏丸二烏丸驅餘毒活氣血生肌肉排宿膿去風邪既破之後合服內補十宣散多服為妙大凡疽口緊小而硬者蓋為風毒所勝合用蚣蠍散糝於神異膏上止於近瘡處糝一小錢大不必遍地糝藥疽疾既安之後或未安之際口中乾燥舌上堅硬如雞內金者非渴之所能比非水之所能潤此乃亦是腎家枯竭而搬運不上致令心火上炎故也此證最惡非惟有疽疾之人見此可慮每見尋常不問男女無疾之人見之亦日危矣諸家方論未嘗載此古人云玉華池竭七朝亡者此也多見庸醫不究其源各立新説自出己見投之丹藥為鎮墜心火以升腎水病者不曉信而服之禍如反手殊不知腎水既竭更投之以丹遂令腎水愈涸古人云脾惡濕腎惡燥非滋潤之藥不能療之所用加減八味丸正合其意外有桑枝煎及五味子湯皆良藥也疽疾將安及七八分便當服加料十全大補湯以補氣血每日當與排膿內補十宣散相間服大凡疽疾多因怒氣而得之若有此疾必多怒但服附子之藥進食寬氣疽之證甚惡多有陷下透膜者服狗寶丸瘡四邊必起用烏龍膏解毒散訖須要針刀開瘡口其內已潰爛不復知痛乃納追毒丹於孔中以速其潰既潰後割去死肌洗以豬蹄湯敷以生肌散覆以乳香膏若證之善者自然腫起紅活乃即如前法方乳香圓出危氏方治發背及一切疽瘡潰爛痛不可忍者當歸川芎交趾桂真緑豆粉川香芷各五錢羌活獨活五靈脂乳香別研沒藥別研各三錢白膠香五錢上為末煉蜜為丸如彈子大每服一丸用薄荷湯嚼下手足損痛不能起者加大草烏一味用木瓜鹽湯細嚼下漏蘆湯出鮑氏方治疽作後二日服此退毒下膿可與五香連翹湯相間連日服之生黃耆去蘆頭連翹沉香漏蘆有白茸者各一兩生粉草半兩大黃微炒半兩上為細末每服二錢煎薑棗湯調下四虎散治癰疽腫硬厚如牛皮按之痛天南星草烏頭半夏生狼毒各等分上為細末醋蜜調敷留頭出毒氣治疽潰後出千金方以鹽湯洗拭了燒皂莢粉上良一方皂角去皮了治瘭疽潰後又方出千金方用梁上塵和釭中脂敷之又方出千金方用生麻油滓綿裹布瘡上蟲出又方出千金方用沸水湯灌瘡中三四遍湯一作餳蕓薹尉散出千金方治疽似癰而小有異膿如小豆汁今日去明日滿者用蕓薹熟搗濕布袋盛之埋熱灰中更互尉之即便得安不過再三即瘥冬用乾者一方將甘草湯洗瘡令淨干以黃柏末塗敷了即用以瘥為度又方出千金方用皂莢煎湯洗瘡拭乾以柏皮為末敷之勿令作痂治疽瘡並治軟癤用多年螺殼燒灰麻油調敷治疽初作方出肘後方用赤小豆為末醋調敷之大薊散出濟生方治飲啖辛熱熱邪傷肺嘔吐出血曰肺疽大薊根犀角升麻桑白皮蒲黃炒杏仁去皮尖桔梗炒各一兩甘草炙半兩上每服四錢以水一盞半薑三片煎七分去滓食後服三灰散出三四方治肺疽血病者因飲啖辛熱熱燥傷肺血得熱則溢因作嘔吐出血一合或半升許名曰肺疽傷腑則屬胃傷於臟則屬肺上以此無不可救紅棗和核燒存性百藥煎燒存性各等分上為末每服二錢蜜調成膏軟柿和嚼自效或米湯下亦可治疽潰後出千金方用牛耳中垢敷之良疽發人貼雲母膏痛如刀割不可不審不可不知也亦不得用生肌藥只貼膏藥自然斂合如醫治後時為庸醫藥敷或刀割傷風重者兼以五香連翹湯木香麝香乳香沉香藿香連翹上等分為細末每服二錢水一盞煎至七分放溫服瘡四邊以金箔先用津液次點之五香連翹湯出仁存方治疽作二日後宜與此湯並漏蘆湯相間連日服之木香沉香丁香去核並不見火各半兩連翹射干升麻黃耆生銼木通乳香桑寄生獨活各三分麝香一錢上為粗末每服三錢水二盞煎至一盞去滓取清汁為度或下惡物未生肉以前服不妨以析毒熱之氣氣盛用大黃竹瀝芒硝恐用藥之後不能斟量是故不載知者當自相度用之治久疽瘡無不瘥方出本草以伊洛水中蟹形段不同取其黃敷之治黑疽多死宜急治之用王瓜根一斤搗絞取汁六合頓服當有黃水隨小便出更服之瘥王瓜根亦名土瓜根石疽附論夫石疽與石癰之證同比石癰為深以寒客經絡氣血結聚而不得散隱於皮膚之內重按如石故謂之石疽癰疽皆熱氣所作今寒氣為根故凝結不化其毒內著結硬如石治在溫其經絡使熱氣得通其毒外泄故能腐熱而發散化膿血而出也方沉香散出聖惠方治石疽腫毒結硬口乾煩熱四肢拘急不得臥沉香防風去叉木香各三分地骨皮麥門冬去心焙當歸切焙升麻玄參枳殼去瓤麩炒羚羊角屑獨活去蘆頭甘草生銼赤芍藥各一兩大黃銼炒二兩上粗搗篩每服四錢水一盞半煎取七分去滓不拘時溫服占斯散出聖惠方治石疽結堅若壞或已成疽者木占斯厚朴去粗皮薑汁炙生乾地黃焙栝蔞乾者去皮敗醬防風去叉桔梗炒人參細辛去苗葉各一兩桂去粗皮半兩上為散每服二錢食前溫酒送下地黃煎出聖濟總録治石疽堅硬不消用生地黃淨洗三斤銼碎細研以布絞去汁入銅器內盛重湯上煮柳篦攪勻如糖以瓷盒盛每日空心取一丸如彈子大溫酒調下日午晚間服瘥附骨疽附論夫附骨疽者以其無故附骨成膿故名附骨疽喜著大節解中丈夫産婦喜著髀中小兒亦著脊背大人急著者先覺痛不得動搖按之應骨痛經日便覺皮肉漸急洪腫如肥狀是也小兒才手近便大啼呼即肢節有痛是也大人緩著者先覺肌烘烘然經日便覺痛痹不隨小兒四肢不能動搖亦如不隨狀看肢節解中若有肌烘烘處不知是附骨疽令遍身成腫不至潰體皆有青黯大人亦有不別呼為賊風風腫不知是疽也凡人身體患熱當風取涼風入骨解中風熱相搏便成附骨疽其候嗜眠沉重忽忽耳鳴又秋夏露臥為冷所折風熱伏結而作此疾急者熱多風少緩者熱少風多小兒未知取風冷何故而有此疾由其血盛肌嫩為風折之即使凝結故也凡初得附骨疽即須服漏蘆湯下之敷小豆散得消可服五香連翹湯凡賊風其人體卒無熱中暴風冷即骨解深痛不廢轉動按之應骨痛久即結痛或結瘰癧其附骨疽久即腫而結膿以此為異耳若治附骨作賊風則增益病深膿多若治賊風作附骨即加風冷遂成瘰癧偏枯攣曲之疾也療之為效皆在善始耳若候附骨與賊風為異者附骨之始未腫但痛而已其賊風但痛不熱附骨則其上壯熱四體乍寒乍熱小便赤大便澀而無汗若得下卻熱開發腠理便得消也縱不消盡亦得浮淺近外凡賊風但夜痛骨不可按仰而不得回轉痛處不壯熱亦不乍寒乍熱多覺身體索索然冷欲得熱尉痛處即小寬時復有汗出此為賊風症也宜針灸尉爆服諸治風藥即愈有久癰余瘡敗為深疽者在腨脛間喜生瘡中水惡露凍不瘥經年成骨疽亦名胻瘡深爛青黑四邊堅強中央膿血汁出百藥不瘥汁潰好肉處皆虛腫亦有碎骨出者可溫赤龍皮湯漬夏月日日洗冬月四日一洗青肉多敷白䕡茹散食去惡肉可三日敷之止後長敷家豬屎散得瘥止取豬屎燒灰作末如粉致瘡中令滿白汁出吮去隨更敷之瘥止若更青肉復著白䕡茹散如前法家豬屎散取平復凡骨疽百療不瘥者可於瘡上以次灸之三日三夜便瘥如瘡不瘥瘥而復發骨從瘡中出者名為骨疽取鮮烏雌雞二隻去肉取骨熬焦如炭取三家牛棓木刮取屑三家甑算各一兩皆燒成灰合導瘡中碎骨當出數片瘥附骨疽與白虎飛尸瀝節風皆相類瀝節風則走注不定白虎飛尸痛淺按之則便止附骨疽痛深按之無益一説白虎飛尸亦能作膿著骨而生及其腐潰碎骨出盡方愈如是則附骨疽與白虎飛尸是一病但深淺不同耳白虎飛尸又俗名風煞然痛淺附骨疽少有骨出者宜拔毒熱不可一向泥於五香連翹漏蘆之屬當先溫腎如靈寶膏及神藥唯存針烙淺深刺拔其毒根則易愈不爾則順脈流走遍體洪腫卒致不救附骨疽治之宜以熱去毒又當溫腎未可專用涼劑若在針烙其病務詳淺深刺拔其毒根則易愈不爾則順脈流走遍體洪腫卒致不救至於所患之時猶或當於外證未潰以前發渴乃臟腑焦燥利下乃引飲無度已潰而渴則膿血去多津液中干或腹腸胃暴虛遂成下利體虛受寒則嗽聲不息氣逆挾熱則痰盛於胸熱毒不泄為二便祕塞毒氣迫心為嘔噦驚悸陰陽交爭血氣不和寒熱並作臟腑傷敗便血逆出毒氣攻外煩燥異常惟須大方料藥同治可也方牛黃散出聖惠方治附骨疽及一切惡瘡宜紝藥牛黃細研麝香細研木香丁香蘹香子乳香細研硃砂細研雄黃黃柏銼苦參銼膩粉各一分上為細散入研了藥同研令勻剪單紙條子看瘡眼子大小每一條子紙用藥末一字以下捻藥末在紙條子內紝於瘡中不計近遠如藥無力紙條子自退即依前更用藥末為紙紝子更紝候紙紝漸短直至好痊為度若患惡瘡不計在甚處看瘡眼子大小皆用紝子不計個數以瘥為度連翹湯出聖濟總録治附骨疽連翹射干升麻防己黃芩去黑心大黃銼炒甘草炙芍藥杏仁湯浸去皮尖雙仁各一兩柴胡去苗三兩上粗搗篩每服五錢水一盞半煎至七分入芒硝一錢去滓空心服漏蘆湯出聖濟總録治附骨疽漏蘆去蘆頭升麻連翹麻黃去根節各一兩大黃銼炒一兩半防己木香白蘞沉香各二分上粗搗篩每服五錢水一盞半煎入竹葉七片至八分再入芒硝一錢攪勻去滓空心溫服取利三二行未利再服赤朮散出危氏方治附骨疽膿出淋瀝久而不瘥已破未破赤朮一斤米泔浸三宿取出洗淨曬乾再以大麻腐汁浸術止餘二寸許入川椒二十一粒蔥皂根煮黑油出洗淨焙乾稱破故紙炒川楝銼炒茯苓舶上茴香炒杜茴香白芷桃仁去皮麩炒各半斤上為末煉蜜丸如桐子大每服五十丸酒鹽溫湯送下一方老人加黑附子天靈蓋散出聖惠方治附骨疽腫痛有膿久而不瘥天靈蓋一兩燒灰狗骨頭半兩燒灰麝香一錢細研黃連一分去須黃柏一分白礬半兩燒令鬥盡上為細散入麝香令勻每用先煎甘草湯洗拭乾用生油調塗之天南星散出聖濟總録治附骨疽天南星炮附子炮製去皮臍黃柏去粗皮各半兩鉛丹研一分麝香研半分上附子麝香鉛丹外搗篩為末入二味和勻干敷瘡上日三麒麟竭散出聖濟總録治附骨疽塗敷麒麟竭檳榔銼黃連去須馬腸根各一兩上為散先以油炒蔥豉入膩粉半兩和搗捻作餅子二片用鹽漿水洗瘡用餅拓瘡上以生帛縛定三日後再用鹽湯洗即塗敷散子日三應痛丸出外科精要治走注疼痛疑是附骨疽者蒼朮去皮當歸草烏頭炮黑牽牛各一兩上為細末用醋糊為丸如小豆大每服三十丸空心醋湯下亂髮湯出聖濟總録治附骨洗方亂髮灰半兩杏捶碎二十一枚甘草銼五寸鹽花半兩上以漿水五升煎至二升濾去滓通手洗疽上有膿血洗取淨後以絹縛定每日三兩遍洗妙天靈蓋散出聖濟總録治附骨疽瘡及陰瘡久不瘥塗敷方天靈蓋酥炙一兩狗骨燒灰一兩半白礬燒灰一兩半麝香研一錢上為散干敷瘡口日三次皂莢膏出聖惠方治附骨疽腫皂莢十挺肥實無蛀者捶碎吳茱萸二兩末杏仁二兩湯泡去皮尖研如泥水銀一兩以棗瓤同研令星盡上件藥以頭醋三升煎皂莢取一升五合濾去滓下茱萸杏仁以文火煎成膏依次下水銀和勻致不津器中於故帛上塗貼患處治附骨疽多年不瘥多年油腳一兩麝香一錢細研獖豬骨髓一兩上都研為膏塗於瘡上龍骨粉膏一名蟾蜍膏出千金方治久瘡癰敗壞成骨疽或骨從瘡孔出以龍骨粉瘡四面厚二分以膏著瘡中日二易蟲出如發盡愈膏方如下大蝦蟆一枚自死者亂髮一塊雞子大豬脂一斤上取二味內脂中煎略消盡下待冷更內鹽一合攪勻充前用之一方先以桑白皮烏頭煎湯淋洗拭乾後用藥貼敗醬湯出聖濟總録治附骨疽敗醬二兩大黃銼炒二兩桃仁二兩上粗搗篩每服五錢先取皂莢刺一兩銼碎以水二盞煎至一盞半漉出下藥及朴硝一錢同煎至八分去滓空心溫服麝香散出聖濟總録治附骨疽久不瘥麝香研一分麒麟竭密陀僧煅各一兩上為散先用鹽湯洗瘡拭乾取活鱔魚一條銼碎研拓瘡上宿明旦揭看有蟲即去再拭乾塗敷散子日三烏雞散出聖惠方治附骨疽久不瘥骨從瘡口出烏雌雞骨燒灰牛棓木刮燒灰三家者炊單燒灰三家者各一兩上合和研細敷瘡上日三五度碎骨出瘥又方出聖濟總録治附骨疽積年發膿骨出不瘥黃丹細研膩粉研各三錢雞子三枚煮熟去白用黃上將雞子黃於銚子內以慢火炒令黑候自然為膏於盞內入黃丹膩粉和勻用時先以米泔煎湯洗患處拭乾用藥敷之治附骨疽及魚眼瘡出聖惠方亂髮灰一兩膩粉二錢杏仁五十枚燒令灰上同研細入油二合蠟半兩煎攪令勻入瓷盒盛淨洗貼之效小豆散出聖濟總録治附骨疽內消赤小豆一合糯米炒黑二合上為散水調如糊攤故帛上塗貼干即易治附骨疽積年發膿骨出不瘥出聖惠方白礬枯別研新枸杞子自然汁上先將枸杞子汁慢火熬成膏後入白礬團合堅實陰乾搗羅為末每用時以甘草水洗之拭乾先唾塗瘡上次用藥末周匝敷之治附骨疽及冷瘻一切惡瘡等一名蜣螂丸出聖惠方蜣螂燒灰一兩巴豆半兩去皮心研紙裹壓去油上為細散用敷瘡上旦換之多時患者不過三上效一方用津調入孔中治瘡久不瘥瘥而復發骨從孔中出者名為骨疽出千金方用密陀僧為末以豬脊骨髓調敷之兼治痔漏不愈秦艽散出聖濟總録治附骨疽久不瘥或瘥年歲再發用秦艽去苗土搗羅為散塗敷瘡上以帛縛定日二三次牛膠散出聖濟總録治附骨疽積年發膿骨出不瘥用水牛皮膠炙焦細研為散塗敷瘡上用生鯽魚破開外面貼定時看有小蟲出更以鹽湯洗敷上藥再加魚貼蟲行盡更敷藥黑鯽膏出千金方治附骨疽未破或膿出不盡並久疽不瘥用黑色鯽魚一個去腸入白鹽令腹滿用綿縛定以水二盞內銅石器中煮水盡乾焦為末用豬油調敷已破者干糝小疼無怪療髓疽日延深嗜臥方用牡蠣澤瀉二味主之治附骨疽及魚眼瘡出聖惠方以蜣螂七枚和大麥面爛搗封之又方出聖惠方用蜣螂乾者為末以烏雞脂塗瘡口上以散敷之又方出聖惠方用豬骨頭燒煙熏之治瘡久不瘥瘥而復發骨從孔中出名為骨疽穿地作坑口小里大深二尺取乾雞屎二升以艾及荊葉搗碎和雞屎令可燃火坑中燒之令煙出內疽於坑中熏之以衣覆坑口勿泄氣半日當有蟲出治附骨疽出千金方用槲皮燒末飲服方寸匕槲葉亦可又方出千金方用新剝鼠皮如錢孔大貼腫上即膿出已潰者取豬脊上脂貼之抵聖散王氏博濟方治骨疽瘡及冷漏久不合者滴乳香膩粉白礬各等分燒存性上為細末每遇患時先以鹽水洗之以津唾調瘡上必愈治附骨疽蝕等瘡本草以𧌆螳燒為末和臘月豬脂敷之治骨癩病及㾦癗本草以牛膝為末酒服方寸匕日三瘭疽附論夫瘭疽為病毒發疾轉不旋踵而害人故其字從票音同於飄風之飄治之不可稍緩也古人謂人受惡風入於肌脈變成斯病蓋厲風蘊伏初未知覺毒郁既發則若火熾烈不可響邇是以其伏隱少而深實黯黑而不明其痛復應於心毒氣已深故其證如此瘭疽者肉中忽生點子如豆粒小者如黍粟劇者如梅李或赤或黑或青或白其狀不定有根不浮腫痛傷之應心根深至肌經久便四面悉腫疱黯熟紫黑色能壞爛筋骨若毒散逐脈入臟殺人南人名為拓著毒厚肉處即割去之亦燒鐵烙之令焦如炭或灸百壯或飲葵根汁或飲藍青汁若犀角汁及升麻汁竹瀝黃龍湯等諸單方治專去其熱取瘥其病喜著十指故與代指相似人不識之呼作代指不急治之亦逐脈上入臟殺人南方人得之皆斬其指初指頭先作黯疱後始腫赤黑黯瘮痛入心是也復有惡肉者身上忽有肉如黑豆粒突出便長推出如牛馬乳上如雞冠狀不治自長出不止亦不痛癢此由春冬之時受惡風入肌脈中變成此疾治之宜服漏蘆湯外燒鐵烙之日日為之令焦盡即以升麻膏敷上積日乃瘥其發赤黑青白色變不常或臂或臀或口齒或肚臍發無定處大概多見於手指之間根深入肌走臂逆腫毒血流注貫串筋脈爛肉見骨出血及多令人串痛狂言痛入於心即死突起出於外腎者亦死此瘡最慮引風治法宣毒行血尤當於心腎焉蓋心為萬病之門敗血鬱滯煩燥噯悶皆毒氣攻心之故也心家為毒所攻若於小便利之又恐外腎虛怯易至傷風勢得宣毒於大便如栝蔞酒之入沒藥五靈脂皂莢刺帶生灰是也是雖大便引導毒氣然清心行血去風邪之劑如何為廢心清血行風邪解散庶乎有瘳矣經云在指則截在肉則割蓋慮毒氣隨風走肌隨脈入腹倏忽害人此疾初因感受惡風入於脈理或傷寒瘴瘧之後毒變所生凡癰疽發開一寸則一寸引風非必風入於中虛處自引風也惟風邪襲虛則潰爛透骨惡血橫流天南星生半夏白芷梢散能去風可以頻敷其瘡療理推廣疽癰發度行之瘭疽一名蛇瘴南地多有蛇毒吐毒於蠻煙瘴雨之鄉人有伏水土風氣感而觸之者數月以還未有不發為蛇瘴也惟赤蜈蚣伏蛇最為上藥雄黃白芷次之諸蛇藥亦可以制其毒矣雄黃有毒爛肌但宜和蛇藥用胸中痛少氣急入暗中以手掩左眼若右眼視見光者胸中結癰也若不見光瘭疽內發若吐膿血此不療之疾宜以灰掩膿血上不爾著旁人也又齒間臭熱血出是瘭疽也七日死療所不瘥宜以灰掩地血方麝香摩膏出聖惠方治瘭疽散毒氣麝香半兩細研莽草二兩川升麻三兩寒水石黃芩各二兩羚羊角屑射干各三兩丹砂細研芎藭各二兩川大黃三兩雞舌香二兩生地黃二升羊脂一斤木香二兩上藥細銼以豬脂二斤入地黃汁羊脂諸藥煎候黃芩黑色綿濾去滓入麝香丹砂末攪令勻收瓷盒中頻頻以摩瘡上丹砂膏出聖惠方治瘭疽丹砂細研犀角屑射干大黃銼炒芎藭黃芩去黑心升麻前胡去蘆頭沉香木香各一兩豬脂二斤半生地黃二兩麝香半分研上除丹砂麝香豬脂外銼碎以醋半升和勻浸一宿先熬脂令沸次下諸藥煎候地黃赤黑色以絞去滓入丹砂麝香末以柳篦攪勻瓷盒盛敷患處日三五上又取二匙以溫酒調空心日午服一方溫水調下半匙犀角丸出聖濟總録治瘭疽初覺宜速取利犀角屑一兩半大黃銼炒黃芩去黑心各二分防風人參當歸切焙黃耆梔子仁黃連去須干鹽甘草炙銼各半兩巴豆十二粒去皮心上除巴豆外搗羅為末研入巴豆令勻煉蜜丸如桐子大每日空心米飲下三丸如未利加五七丸以利為度豬蹄湯出千金方治瘭疽諸疸十指頭焮赤痛癢白芷大黃芎藭黃芩黃連甘草各一兩細辛藁本當歸藜蘆莽草各一兩上㕮咀以水二斗先煮豬蹄一具取一斗煮藥取五升浸瘡即瘥一方無藜蘆枳實湯出千金方治瘭疽射干甘草枳實升麻乾地黃黃芩各二兩麝香二分前胡三分犀角六分大黃一分上㕮咀以水九升煮取三升下大黃沸去滓內麝香分三服瘥一方無大黃升麻加黃芩麻黃白薇枳實升麻松葉忌海藻漏蘆湯治瘭疽漏蘆去蘆頭白蘞黃芩去黑心麻黃去根節白薇枳實炒升麻芍藥甘草炙銼大黃銼炒各一兩上粗搗篩每服五錢水二盞煎至一盞去滓空心溫服日三服一方無白薇射干散治瘭疽皮肉中忽生點子如麻豆大或如桃李腫痛不可忍射干升麻枳實麩炒微黃川大黃各一兩銼碎微炒麝香一分細研前胡一兩去蘆頭犀角屑三分羚羊角屑三分甘草一兩生銼上為粗散入麝香令勻每服四錢水一中盞煎至六分去滓不拘時溫服款冬花膏治瘭疽手足纍纍如米起白色刮之汁出愈後復發款冬花半兩黃耆銼一兩半升麻一兩赤小豆附子炮去皮臍苦參各一兩一分上為散每服一錢空心溫酒調服日再加至二錢消毒散治瘭疽熾甚藜蘆大黃銼炒黃柏黃連當歸甘草各一兩上㕮咀如麻豆以水一斗煮至五升去滓浸淋瘡處即瘥薄拓湯一名甘草湯主瘭疽浸淫欲作未成如桃李核或如雞子赤焮方甘草炙黃芩大黃黃連當歸芒硝各一兩上切以水一斗煮取三升絞去滓鐺中下芒硝一沸攪之貼布帛中以拓腫上數百遍青木香散治瘭疽著手中肩背纍纍如米起色白刮之汁出瘥後復發青木香滑石龍骨各三兩胡粉一兩米粉一斤上為末以粉病上日三黃連散治瘭疽浸淫多汁日漸大黃連二兩胡粉甘草䕡茹各二分上制下篩以粉瘡上日三四度肘後名報粉散瘭方生髮燒存性皂莢刺燒帶生各二分赤蜈蚣半燒厚黃柏各一分上為細末用雄豬膽汁調敷又方雞內金生髮各燒存性天南星半夏各等分生上為末乾摻之洗湯瘭疽方荊芥穗白芷漢椒去目蔥白連根各等分上用井水煎入鹽候溫自手背上蕩下日三次瘭疽毒氣走背腫所至處緊繫之又方治瘭疽著手足肩臂纍纍如米起白色刮之汁出瘥後復發灶屋塵釜下土各一升上合研令勻以水一斗煮三沸取汁洗日三四度魚發膏治如前鯽魚長三寸者亂髮雞子大豬脂一斤上煎為膏敷又方治瘭疽皂莢刺燒帶生白芨少許上為細末摻諸瘡用黃連散治卒得瘭疽一名爛瘡黃連去須搗末胡粉各一兩上藥相和研令勻細以油調塗之此瘡初起作癮疹疼痛焮赤宜用生鐵燒赤二七遍入水中日二三度以洗之治瘭疽無頭腦出在指甲上獨頭蒜一兩杏仁一兩去皮尖湯浸上藥爛研相和炒令熱敷瘡上以軟帛系之數易治瘭疽著手肩背纍纍如米起色白刮之汁出瘥後復發出千金方用虎屎白者以馬屎和曝乾燒為灰粉之良一方用馬屎和之亦可又方出千金方用麻子熬作末摩上良又方出千金方用酒和麵敷之又方出千金方以豬膽敷之良又方出千金方剝去瘡痂溫醋乾泔清洗之以胡燕窠和百日男孩屎如膏敷之用煮蕓薹菜取汁一升服之並食干熟蕓薹數頓少與鹽醬冬月研子水和服之又方出千金方用枸杞子根並葵根煮汁煎如糖隨意服之又方出千金方用臘月糖晝夜連浸數日乃愈瘭方出千金方用生髮燒灰存性為末米湯調服兼敷漏瘡一方治發背宜服之治卒得瘭疽一名爛瘡出聖惠方用燒牛糞作灰細研用油調敷之治瘭疽著手足纍纍如米豆刮之汁出出聖惠方用蔓荊子二兩炒熟為細散以豬脂和敷其上一方無豬脂綿裹敷之治瘭方出直指方用燕巢和百雀兒糞研膏敷之治瘰疽徹骨癢者出本草以狗屎燒灰敷疽瘡勿令病者知治時行熱熛瘡用羊膽以醋和服之良風疽附論夫風疽者本由風濕之氣入於腠理流注血脈凝澀不利攣曲腫起發作瘡疽所以疼痛經久不瘥者是也蓋風勝則動故其疽留止無常得之醉臥出汗當風入膚腠客於經絡與榮衛相搏而成也方黃耆丸出聖濟總録治酒醉汗出風入經絡久成風疽黃耆銼犀角黃連去須茯神去木當歸切焙芍藥升麻黃芩去黑心各五分木通八分甘草生銼三分防風去叉五分麝香另研半分上為末拌勻煉蜜丸如桐子大每服二十丸空心生薑湯下食後再服即煎麥門冬湯下麻黃湯出聖濟總録治酒醉汗出風入經絡成風疽麻黃去根節三兩五加皮一兩半防風去叉獨活去蘆頭桂去粗皮當歸切皮芎藭乾薑炮各二兩附子去皮臍一枚牛膝二兩半杏仁去皮尖雙仁八十枚上細銼以水九升先煎麻黃掠去沫入諸藥煎取三升絞去滓每用一盞溫服並三服溫覆微汗避風防風湯出聖濟總録治風毒中人留血脈不散與榮衛相搏結成風疽身體煩熱昏冒腫痛防風去叉柴胡去苗白芷桔梗炒木通銼當歸切焙各一兩半羌活去蘆頭麻黃去根節煎去沫掠焙附子炮去皮臍甘草炙銼各一兩上㕮咀如麻豆每服五錢水一盞半煎至八分去滓溫服食後臨臥各一如欲出汗空心並兩服後以熱薑稀粥投蓋覆取汗慎外風海桐皮浸酒方出聖濟總録治熱毒風結成疽腫痛行履不得海桐皮銼五加皮銼獨活去蘆頭防風去叉乾蠍炒杜仲去粗皮牛膝去苗酒浸切焙薏苡仁炒各一兩生乾地黃焙三兩上粗搗篩生絹袋貯以好酒一斗五升浸於瓷瓶中密封秋夏三日春冬七日開取食煎溫酒合加至四五合不拘時甚者常令酒氣相續秦艽丸出聖濟總録治風毒氣客於經絡成風疽秦艽去土苦參升麻黃芩去黑皮枳殼麩炒防風去叉惡實炒各四分烏蛇酒浸去皮骨炙蒺藜子炒各五分上為末煉蜜丸如梧桐子大早晚食後以蒺藜子煎湯下二十丸大豆酒方出聖濟總録治熱毒風腫成疽日夜熱痛大豆緊小者三升麻子仁細研二升烏蛇一條頭尾皮骨重四兩捶碎上相和令勻就甑內蒸令熟去甑底湯將好酒一斗五升就甑中淋候酒熱又淋凡七八遍入瓷甑內密封候冷量性飲常帶酒氣佳大豆汁塗方出千金方治風疽搔之黃水出凡腳腨及曲䐐中癢搔則黃汁出是大豆一升馬屎二升一作屎尿白蜜半斤上拌令勻用青竹筒盛屎築架在炭火上當中慢燒將瓷碗兩頭盛取汁先用泔清入鹽少許和溫洗瘡上拭乾後以藥汁塗日三五度一方無白蜜入粳馬屎又方出千金方用嚼胡麻敷以綿裹之至旦易緩疽附論夫緩疽者以寒氣客於經絡榮衛凝澀甚寒氣盛則腫病深伏其狀無頭尾大如常人之拳小如桃與皮肉相附著其腫與肉色相似亦不甚赤積日不潰久乃變紫黯色肉俱爛如牛領瘡以其初勢緩慢故名緩疽以其腫色與肉色相似故又名肉色疽方黃耆散出聖惠方治緩疽及諸癰腫膿血結聚皮肉堅厚日久不潰疼痛黃耆沉香薰陸香連翹各三分羚羊角屑一兩雞舌香漏蘆去蘆頭黃芩去黑心梔子仁甘草生銼防風去叉栝蔞根各半兩上粗搗篩每服五錢水一盞半煎至八分去滓不拘時溫服一方有漢防己三分排膿散出聖惠方治緩疽日久穿潰出膿水不盡貝齒一兩黃耆銼當歸銼微炒生地黃焙赤芍藥黃連去須升麻桂去粗皮白蘞犀角屑各三分甘草半兩生銼麝香一分細研上為散拌勻再羅過每服二錢不拘時溫酒調下犀角散出聖惠方治緩疽風熱毒氣結聚腫痛寒熱不止犀角漏蘆各一兩川大黃一兩半銼碎微炒川升麻半兩梔子仁一兩甘草三分生銼木通麥門冬去心枳殼麩炒微黃去瓤知母玄參各一兩上為粗散每服四錢水一中盞煎六分去滓入地黃汁半合更煎三兩沸不拘時溫服生地黃干散出聖惠方治緩疽風熱侵腫不住肉欲成膿四肢煩熱生乾地黃一兩川大黃銼碎微炒人參去蘆頭黃芩各一兩當歸半兩遠志一兩去心麥門冬一兩半去心川升麻半兩赤芍藥一兩半黃耆一兩銼赤茯苓一兩羚羊角屑一兩上為粗散每服四錢水一中盞入生薑半分煎至六分不拘時去滓溫服飛黃散出聖惠方治緩疽惡瘡蝕惡肉丹砂雄黃磁石曾青白石英棋石石膏鍾乳粉雌黃各二兩雲母粉三兩上各細研為散用瓦盆一口丹砂安南雌黃安中磁石向北曾青在東白石英在西棋石當上石膏次更下鍾乳雄黃次雲母覆蓋更用一盆覆蓋定以泥封厚一寸於灶底以陳葦燒一日取出看取飛上者研細敷瘡上日二遍莽草散出聖惠方治緩疽初結微腫疼痛莽草鹿角屑白蘞白芨半夏天南星附子去皮臍各一兩蛇蛻皮一條炙皂莢一兩捶黑皮及子上為散用醋面薄為糊調為膏塗貼腫處干即再上腫散為度黃柏膏出聖惠方治緩疽黃柏銼桐葉切各一兩半龍骨一兩黃連一兩半去須敗龜拳大燒灰細研麝香一兩細研上藥以豬脂二斤煎前四味十餘沸布濾去滓拭鐺令淨卻入鐺中再煎入後五味攪令勻收於不津器中每用以故帛上勻攤貼之木香散出聖惠方治風毒氣留滯榮衛不通欲結為緩疽㶸之令內消貼木香一兩半桂心二兩白蘞一兩半赤小豆一合莽草一兩半附子一兩去皮臍半夏一兩半羊桃根二兩上為細散以酸漿水旋調稀稠得所塗故軟布及生布絹上貼之干即易也以腫消為度䕡茹膏出聖惠方治緩疽腫痛內堅厚如牛領皮下針烙干即用生薑維緣疸氣沉澀乾薑味辛辛能散氣消痛又善引膿化惡肉可以綿裹薑末深紝瘡中日三二遍換以腫退為度蝕出瘡中惡肉䕡茹三分藜蘆半兩去蘆頭真珠末三分硫黃細研一兩上為細散都研令勻瘡上如惡肉較深可以綿裹入瘡中候惡肉化盡貼生肌膏取瘥為度芍藥湯出聖惠方治緩疽芍藥當歸各一兩黃耆銼生乾地黃焙赤茯苓去黑皮各半兩人參甘草炙各三分上粗搗篩每服五錢水一盞半入生薑半分拍碎棗二枚擘破煎至八分去滓空心溫服晚再如法服之蛇床散出聖惠方治緩疽蛇床子一分研杏仁湯泡去皮尖雙仁細研入黃連去須搗末乳香細研各半兩鹽一分研蔓荊根三兩切爛搗上以蔓荊根和藥末細研令勻塗敷腫上干即易之雄黃散出聖惠方治緩疽以飛黃散蝕惡肉盡熏之雄黃乾雞子白藜蘆去蘆頭丹砂細研干鰻鱺魚炙焦各一兩上為散以青布裹之安小土灶內燒熏患處如是熏三日即止後用黃耆散常法敷之一方用蛇含膏摩之黃耆散出聖惠方治緩疽用黃耆二兩細銼搗羅為散敷瘡上一方不計時候以溫水調下二錢匕治緩疽方出聖惠方用䕡茹一兩搗為末不計時候溫酒調下二錢一方用二兩為散敷之追蝕一切瘡腫附論夫癰腫若寒多及毒深外證雖結聚𩊅硬不消疼痛難住未能腐化或已穿穴經久不瘥在外者須以藥蝕在裡者須以藥托令毒氣發泄榮衛流通則癰疽得瘥矣所以著追引蝕癰之方方覆煎散治諸般癰疽腫毒癤毒歸梢一錢歸身二錢防風梢一錢風身一錢蘇木半錢黃柏二錢甘草二錢半全蠍一錢陳皮一錢羌活一錢人參五分黃芩一錢防己五分連翹三分藁本一錢黃耆一錢桔梗二錢澤瀉五分知母五分生地黃五分芍藥一錢上為粗散只作一服煎先用井水浸藥一個時辰再用長流水一大碗煎七分又用好酒數十滴入藥內作一服溫飲看病上下食前後治發背腦疽疔瘡惡腫發背疔瘡與腦疽麝香沒藥乳當歸膩粉官粉各等分一對蜈蚣尤焙枯粉霜砒信各半字一錢腦子細羅酥蟾汁振尖加菜子通針深送入瘡疽半熱半痛過半日管取醫教命再蘇千金漏蘆湯治腫癰癤無名腫毒皆可服生大黃白蘞甘草赤芍藥黃芩白芨升麻麻黃枳殼山梔子當歸鬚各等分上㕮咀水一盞半煎七分去滓空心服丁香散治癰疽發背熱毒攻焮肌肉赤色疼痛欲成膿令速潰丁香赤小豆各半兩寒水石一兩羊桃根硝石研大黃各一兩木香白蘞榆皮銼防己各三分上搗羅為散先以雄雀屎七粒乳香一塊細研以醋調和塗瘡頭上以醋調藥末如糊攤故帛上貼之干則易龍射破棺散治一切癰疽發背腫惡藿香地丁栝蔞紅藤甘草紫草各一兩黃耆五錢當歸五錢上為細末每服二錢水調下通關散治一切癰疽無頭腫痛宜通立愈大黃一兩牡蠣半兩燒山梔子三錢地龍二錢甘草三錢炒上為末每服五錢水一盞煎至六分去滓溫服以利為度乳香拔毒散治一切癰腫瘡癤消毒止痛黃柏去粗皮黃芩去肉各二兩地骨皮一兩乳香另研三錢沒藥另研三錢上為末井水調作膏子攤在紙花上貼於瘡處追毒丸治癰疽已潰蝕惡肉巴豆去皮心膜十四枚白丁香二十一枚豆豉二十一粒屁盤蟲七枚上同研細滴水丸捻如雀糞大紝瘡內追汁盡即止搜膿散出外科精要治年深不瘥惡瘡有膿不能自出芎藭二兩白芷二兩白芍藥三兩輕粉二錢上為細末每用乾摻瘡口上瘡口深者紝之搜膿散出御藥院方治諸疽瘡膿汁不絶腐肉未盡黃耆白芍藥香白芷各等分上為細末乾摻患處只可少許卻用膏藥敷貼日一換透肌丸治癰疽腫未有頭疼痛不可忍硼砂研斑蝥去翅足米炒烏頭尖上等分搗研為末醋煮麵糊丸如小豆大捻令匾貼在瘡上卻用膏藥花子蓋透為度如惡物出盡次用後方合瘡口生肌散白礬燒令升盡一兩黃連末一分輕粉一分上同研細不拘多少摻瘡口上候生肉滿膿水盡瘡口乾即止為效追膿散治癰腫癤毒出膿疼痛濕生蟲五十枚瓦上焙乾小麥五十粒麝香研半錢上搗研為末每用一字紝在瘡內通關膏治瘡癤癰疽等無頭者乳香輕粉各等分上研勻津唾調塗腫處以紙貼之敗毒丸治一切癰瘡未破巴豆去皮心膜三枚鉛丹少許上同研入生面少許再研勻丸麻子大每以一丸安瘡口外以膏藥貼之膿即出栝蔞酒治癰癤多日不熟無頭者栝蔞一枚甘草三寸上銼碎用酒一盞量人虛實入膩粉少許煎三五沸去滓臨臥溫服夜半疏動一行其瘡自消蔥香塗敷方治腫毒及癰癤不穴煨蔥一莖乳香如棗核大一枚上爛研塗腫上即潰治無名腫毒發背腦疽皆可治之炒黃柏粉五分炒半夏末一分將黃下燈草末同炒要研草法陽手送陰手接下盆細研上研細無根水調敷之甚效治膿潰後瘡不合方出千金方用燒鼠皮一枚為末敷瘡孔中又方出千金方熟嚼大豆以敷之又方出千金方炒烏麻令黑熟搗以敷之又方出千金方以牛屎敷之干即易又方出千金方燒破蒲席灰臘月豬脂和納孔中治腫毒未成頭熱痛方以蠐螬不計多少生研細入少面並醋三兩滴調紙花子上攤剪一眼子時以水潤覺藥力盡再用候癢揭去自然膿出為效治癰未有頭使必穴方取茅針一枚尖正同具者以水煎十數沸服之立潰若兩莖即生兩孔或斷折一錐為二亦兩孔咽葵子方治癰癤無頭取葵子一合以津咽三五枚多咽即頭出多假令咽一粒穿一穴也隨癰癤大小不可過多雀糞塗敷方治癰腫速穿潰以雄雀糞二十一枚用醋研和如糊塗敷腫上膿便出未穴再塗即破地黃膏塗貼方治熱癰腫結熱振焮欲作膿以生地三斤細切搗汁用麻布絞其汁出於銅器內慢火煎攪成膏取敷腫處以故帛塗貼之亦得日三五次易其癰即潰治癰癤諸腫難穿者用已出未變全生蜂兒瓦上焙乾研末一分生蝦肉擂碎二分合和敷患處四邊留中心須臾或穿或散極妙治背癰搭背無名腫毒瘡用葡萄根搗碎敷患處先用齏水洗淨後敷上葡萄根野者妙又方以捻拈草用粳米醋調敷患處良治諸般背疽無名腫毒用水一碗熬至四分後用好石灰少加七家鍋煤同下水內調勻用瓷器內盛收點患處有頭無頭皆可點之神效
