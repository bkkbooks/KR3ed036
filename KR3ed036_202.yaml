香白檀香沉香木香莎草根炮去毛白朮銼炒高良薑安息香研麝香研丹砂研龍腦研各半兩蓽茇炒訶黎勒煨取皮犀角鎊屑厚朴去粗皮薑汁炙各一兩上除別研外為細末與別研者藥同令勻煉蜜丸如梧桐子大每服五丸溫酒下老少加減服之甚者溫酒研下收貯於瓷器中日四五服以瘥為度桃枝湯出聖濟總録治中惡霍亂心痛胸脅㽱痛喘惡向東枝白皮一握丹砂碎一兩梔子仁十四枚當歸焙桂去粗皮各三兩附子炮製去皮臍豉吳茱萸泡炒各一兩上銼如麻豆大每服四錢以水二盞生薑三片煎至一盞去滓溫服日三夜一木香散出聖濟總録治中惡霍亂心腹痛煩悶木香炮三分檳榔銼一兩青橘皮湯浸去白瓤桂去粗皮桃仁去尖皮雙仁炒研人參各半兩上為末每服二錢以溫酒調下不拘時白朮湯出聖濟總録治中惡霍亂吐痢手足麻痹或轉筋白朮銼木瓜去瓤切焙人參各一兩甘草炙乾薑炮各半兩上搗篩每服三錢以水一盞生薑三片棗一枚擘同煎七分去滓溫服不拘時橘皮湯出聖濟總録治中惡霍亂吐痢心煩陳橘皮湯浸去白瓤木瓜切焙桂去粗皮草豆蔻去皮甘草炙各一兩上搗篩每服三錢以水一盞煎至七分去滓溫服不拘時丹砂丸出聖濟總録治中惡霍亂垂死丹砂研半分附子炮製去皮臍一分為末雄黃二豆許研上以巴豆七粒去心皮別研出油後入諸藥末研令極勻煉蜜丸如麻子大每服三丸米飲下若下利未止加三丸至五丸與少冷粥食之即定麝香丸出聖濟總録治中惡霍亂心腹刺痛去惡氣麝香研一分犀角屑鎊木香各半兩上為細散空心熱水調一錢日三麝醋方出聖濟總録治中惡霍亂用麝香一錢細研和醋半盞調二服即瘥又方用沉香主心腹痛霍亂中惡邪鬼亡精失神並宜酒煮取之主霍亂中惡心腹痛鬼氣注忤飛尸喉痹蠱毒癰疽惡腫赤白遊疹出海上方本門用海桐根以酒及水磨服敷之亦佳治霍亂中惡用海桐皮煮汁服之霍亂煩渴附論夫上焦如霧言五臟津液之所熏蒸其氣潤溽故能分布於諸脈也今霍亂吐之人重亡津液則臟腑不和上焦熱津液不足故因霍亂而煩渴也煩渴不止則引飲引飲則利方藿香湯出聖濟總録治霍亂吐逆冷熱不調心隔煩悶咽乾多渴藿香葉三分枇杷葉炙去毛陳橘皮浸去白焙丁香各半兩厚朴去粗皮生薑汁炙二兩白茅根麥門冬去心乾木瓜各一兩甘草各一兩半上搗篩每服三錢以水一盞生薑三片煎至七分去滓早晚食前溫服麥門冬湯出危氏方治霍亂已愈煩熱不解多渴小便不利麥門冬去心橘皮去白半夏湯泡七次白茯苓去皮白朮各一兩人參甘草炙各半兩小麥半兩上㕮咀每服四錢水一盞半生薑五片烏梅少許煎至八分去滓溫服不拘時止渴湯治霍亂煩渴甘草人參麥門冬去心茯苓桔梗栝蔞根乾葛澤瀉各等分上為細末蜜湯調下二錢人參散出聖惠方治霍亂卒吐下痢不禁脈數煩渴人參去蘆頭白朮白茯苓葛根銼陳橘皮湯浸去白瓤焙麥門冬去心各一兩甘草半兩炙微赤銼上搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服木瓜湯出聖濟總録治霍亂煩渴喘促無力食即嘔吐木瓜一兩木香檳榔生薑各半兩黑豆炒一合甘草炙一分人參三分上銼如麻豆每服五錢水一中盞半煎取一盞去滓早晚食前溫服肉豆蔻丸出聖濟總録治霍亂吐瀉不止渴甚麥門冬去心焙栝蔞仁陳橘皮湯浸去白焙人參各半兩厚朴去粗皮薑汁炙一兩上搗篩每服三錢以水一盞煎至七分去滓溫服日三人參湯出聖濟總録治霍亂吐痢渴燥不止人參三分葛根銼白朮桔梗去蘆頭銼炒赤茯苓去黑皮各半兩上搗篩每服三錢以漿水一盞煎至七分去滓溫服日三梔子散出聖惠方治霍亂吐下後煩渴梔子仁半兩豉一合不搗陳橘皮三分湯浸去白焙上搗篩為散分為三服每服以水一中盞入生薑半分煎至六分去滓溫服麥門冬散出聖惠方治霍亂吐瀉煩渴心燥麥門冬去心生薑粱米各半兩桑葉一兩上銼細以水一大盞煎至六分去滓入蜜半合更煎三兩沸放令溫時服之石膏散出聖惠方治霍亂煩渴頭痛石膏二兩麥門冬一兩去心甘草三分炙微赤銼白茯苓一兩上搗篩為散每服三錢以水一中盞入生薑半分豉一百粒竹葉二十七片煎至六分去滓不計時候溫服白茯苓散出聖惠方治霍亂心煩渴白茯苓一兩大棗十枚去核麥門冬半兩去心上細銼分為五服以水一中盞煎至六分去滓溫頓服木瓜散出聖惠方治霍亂吐痢煩渴不止木瓜一枚桂心一兩麥門冬一兩去心上細銼每服半兩以水一大盞煎至五分去滓不計時候溫服青竹茹湯出聖濟總録治霍亂津液少渴甚青竹茹一雞子大人參半兩烏梅去核二枚上搗篩水三盞煎取一盞去滓溫服分三服不拘時蘆葉湯出聖惠方治霍亂吐瀉煩渴心燥蘆葉一兩銼糯半兩上以水一大盞入竹茹一分煎至六分後入蜜半合更煎三兩沸去滓放溫時時呷之草豆蔻湯出聖濟總録治霍亂心煩渴吐痢不下食草豆蔻去皮一兩黃連去須一兩上搗篩每服三錢以水一盞烏豆五十粒生薑三片煎至七分去滓溫服香薷湯出聖濟總録治霍亂吐痢四肢煩痛冷汗出多渴亦治乾霍亂及轉筋者一名水蓼飲香薷二兩蓼子一兩上搗篩每服二錢以水一盞煎至七分去滓溫服日三薑藕飲出聖濟總録治霍亂吐不止兼渴生藕一兩洗切生薑一分洗切上研絞取汁分三服不拘時木瓜湯出聖濟總録治霍亂吐痢煩渴不止木瓜一枚無生者乾者亦得桂去粗皮二兩上㕮咀如麻豆大每服五錢以水一盞半煎至八分去滓溫服一方以豆蔻代桂厚朴桂心湯療霍亂腹渴口乾腹痛不止病源云霍亂而渴者由大吐逆上焦虛氣不調理氣結於心則煩悶也大痢則津液竭津液竭則臟燥臟燥則渴也煩渴不止則引飲引飲即痢亦不止厚朴四兩炙桂心三兩上切以水四升煮取一升二合絞去滓分六合細細飲之服了如其渴欲得冷水盡意飲之忌生蔥糯米飲出聖惠方治霍亂渴甚不吐卒噦心煩渴不止臥不安用糯米二升淘取泔飲之即定研米粉取白汁飲之又以水煮澄清稍溫服黃粱米亦得一方研白米汁用蜜調療霍亂不吐不下食氣惹滿湯出聖惠方用木瓜一枚切以水四升煮取二升細細飲盡更作吐不止者亦瘥若渴惟飲此湯佳作莖亦可用此湯令人吐一方煮木瓜汁服之治霍亂轉筋人參散出經驗良方治吐逆及瀉後煩渴常服調中和氣人參白茯苓白乾葛各二兩藿香木香甘草嫩黃耆去蘆各二兩半上銼散每服三錢水一盞半煎七分去滓溫服瀉後渴甚者每服加滑石末二錢同煎一方無嫩黃耆茯苓澤瀉湯出危氏方治霍亂吐痢後煩渴欲飲水茯苓八兩澤瀉四兩甘草炙桂心各二兩白朮二兩上銼散每服四大錢水一盞薑三片煎七分去滓食前服一方有小麥五兩豆蔻丸出仁存方治吐痢不定煩燥渴肉豆蔻炮丁香陳皮各半兩良薑藿香各一兩上為末棗肉丸如梧桐子大每服二十丸加至三十丸薑汁米飲送下香薷湯一名香薷散治霍亂吐瀉煩渴腹痛或轉筋體冷脈微葛根散出指南方治霍亂有熱煩渴乾薑丁香藿香甘草赤茯苓枇杷葉等分上為細末每服三錢水一盞煎至七分溫服五苓散出和劑方治伏暑煩渴引飲吐痢澤瀉二兩半肉桂一兩白朮豬苓赤茯苓各一兩半上末小麥煎湯又宜胃苓散治霍亂吐下後水渴多飲則殺人方出肘後方用黃米五升水一斗煮之令得三升澄清稍稍飲之莫飲余物也主霍亂後虛渴煩悶不能食出本草以藕實生食之治霍亂煩躁出本草以黃粱米粉半升水一升半和絞如白飲頻服糯米亦得
