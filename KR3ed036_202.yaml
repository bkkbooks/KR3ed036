body:
  text: 卷二百二霍亂門霍亂欲死附論夫霍亂欲死者正氣厥而邪氣盛也或邪氣暴爭而未得吐痢或吐痢雖極而邪氣猶盛故正氣為之困乏其證煩悶痞滿四逆自汗脈微若絶者是也此由陰陽痞隔不得升降內經所謂出入廢則神機化滅升降息則氣立孤危方赤茯苓湯出聖惠方治霍亂吐痢不止腹痛轉筋煩悶欲死赤茯苓去黑皮五味子各半兩藿香葉半兩黃耆切白朮炒當歸切焙各一分乾木瓜人參各一兩上搗篩每服三錢以水一盞煎至七分去滓溫服不拘時候再服治霍亂困篤不識人方出聖惠方用雞蘇三兩銼以水三大盞煎至一盞半去滓分三次溫服治霍亂頭旋倒地欲絶方用陳橘皮二錢煎湯點灌之取磚燒熱醋沃其上布厚裹尉心下便活又治轉筋胡椒湯出聖惠方治霍亂煩悶欲死胡椒三十粒雞屎白半合微炒高良薑銼桂心各半兩木瓜乾者麥門冬去心焙各一兩上搗篩為散每服三錢以水一中盞煎至五分去滓不拘時候溫服阿魏丸出聖濟總録治霍亂不吐下痢氣腹滿脹悶欲死者阿魏研青橘皮湯浸去白焙各一兩酸石榴皮五味子各半兩陳曲炒一兩上先搗後四味細羅為末與阿魏同研令勻用糯米糊丸如梧子大每服二十丸溫熱水下如腳轉筋絶甚者研開溫熱水調下附子散出聖惠方治霍亂吐瀉欲垂絶者附子一兩炮去皮臍乾薑半兩炮製銼甘草半分炙微赤銼桂心三分上搗篩為散每服三錢以水一中盞煎至六分不計時候溫服生薑散治霍亂吐不止欲死生薑二兩切焙陳橘皮湯浸去白焙乾木瓜各一兩上為散每服二錢以水調下連三五服雄雀糞丸出聖濟總録治飲食傷飽取涼過度霍亂脹滿欲死及上下不通用雄雀糞二十一粒研細用暖酒半盞調服未效再服生薑飲出聖惠方治霍亂吐下不止欲死生薑五兩牛糞一升上切薑以水四升煎取二升分溫服治霍亂醫所不能治祕方出千金方用童女月經衣合血燒末方寸調服百方不瘥者用之活命散出護命方治一切男女並小兒上吐下瀉霍亂不止面色青黑命欲臨死宜服此防風羌活獨活乾薑細辛各一分草豆蔻肉豆蔻川芎各半兩官桂吳茱萸乾木瓜各一兩上杵羅為末每服五錢濃煎木瓜湯空心調下和滓吃霍亂心腹痛附論夫霍亂者由脾胃虛弱客風冷之氣陰陽不和致水穀相併清濁莫分變亂於腸胃之間令人心胸煩懊悶亂不安因名霍亂然邪氣上干於陽絡則心痛而嘔吐下搏於陰經則腹痛而泄痢故謂之霍亂心腹痛也方沉香丸出聖濟總録治霍亂心腹㽱痛沉香丁香犀角鎊枳實去瓤麩炒肉豆蔻去殼炮用木香莪朮炮各半兩胡椒一分檳榔銼四枚乳香研沒藥研各半兩巴豆去皮心研出油麝香研各一錢上搗前九味為末與巴豆沒藥乳香麝香和令勻糯米粥為丸如萊蔔子大每服五十丸生薑橘皮煎湯下加至十丸抵聖散出聖濟總録治霍亂宿食不消心腹㽱痛厚朴去粗皮塗薑汁炙四兩白朮二兩高良薑半兩吳茱萸湯浸焙乾炒一兩枳殼去瓤麩炒一兩人參白茯苓去黑皮甘草炙銼木香陳皮去白焙各一兩草豆蔻去皮上搗羅為散每服二錢以沸湯調下不拘時附子散出聖惠方治霍亂虛煩吐瀉轉筋冷汗出腹中痛附子炮裂去皮臍草豆蔻去皮人參去蘆頭三分甘草炙微赤銼當歸銼微炒乾薑炮桂心各半兩上搗篩為散每服三錢以水一中盞煎至六分去滓不拘時候溫服人參散出聖惠方治霍亂吐瀉心腹痛四肢不和人參去蘆頭白朮赤芍藥甘草炙微赤銼當歸切微炒赤茯苓肉豆蔻桂心以上各半兩乾薑一兩炮上搗為散每服三錢以水一中盞煎至六分去滓不拘時候溫服縮砂蜜散出聖濟總録治霍亂心腹冷痛嘔逆噁心大腸滑瀉縮砂蜜去皮炒陳曲炒白朮切炒乾薑炮龍骨赤石脂吳茱萸湯浸焙用芍藥芎藭上等分搗羅為散每服二錢以熱水飲下不拘時候肉豆蔻散出聖惠方治霍亂吐瀉不止冷氣入脾胃攻心腹切痛肉豆蔻去殼白朮桂心枇杷葉去毛炙微黃吳茱萸湯浸七次焙乾微炒各半兩高良薑三分銼甘草一分炙微赤銼厚朴一兩去粗皮塗薑汁炙令香熟上搗篩為散每服三錢以水一中盞煎至六分去滓不拘時候溫服高良薑散出聖濟總録治霍亂吐瀉不止心腹㽱痛煩渴高良薑銼炒一分肉豆蔻去殼吳茱萸湯浸焙乾炒人參蒼朮米泔浸一宿銼炒麥門冬去心焙訶黎勒皮陳橘皮上搗為散每服三錢以米飲調下不拘時服藿香正氣散治霍亂吐瀉通用腹痛者加桂心小便不利加車前子每料各一兩一方有茯苓無車前子此藥溫散風寒濕氣若暑證加香薷厚朴人參湯療霍亂心痛煩嘔吐不止厚朴四兩炙橘皮人參各二兩高良薑當歸藿香各一兩上以水七升煮取二升半絞去滓分溫三服各相去如人行六七里忌生冷黏膩理中加二味湯出十便良方治霍亂胸滿腹痛吐下人參乾薑炮白朮各三兩當歸甘草炙芍藥各一兩上㕮咀以水七升煮取三升絞去渣溫服一升日三夜一良忌海藻菘菜溫中湯出聖濟總録治霍亂吐下虛煩不止心腹絞痛人參乾薑炮白朮甘草炙當歸切焙上等分粗搗篩每服三錢水一盞煎至七分去滓溫服不計時候厚朴湯出聖濟總録治霍亂心腹痛煩不止或嘔厚朴去粗皮薑汁炙銼桂去粗皮枳殼去瓤麩炒三兩芍藥檳榔銼各一兩上搗篩每服三錢以水一盞入薑五片煎至七分去滓溫服不拘時候桔梗湯療霍亂食不消腸鳴腹痛熱不止桔梗四兩白朮五兩乾薑茯苓各二兩倉米一升上切以水八升煮倉米熟去米將汁煮藥取二升絞去滓分服忌桃李雀犬肉酢理中丸出十便良方治霍亂嘔吐心腹疼痛高良薑切白朮各一兩桂去粗皮甘草炙各半兩上為末煉蜜和丸如彈子大每服一丸不計時候濃煎橘皮湯化下香薷湯療霍亂初覺不好則用此方主腹痛吐痢香薷切小蒜碎各一升厚朴六兩炙生薑十兩上切以水一斗煮取三升分三服得吐痢止服藥須溫吳茱萸湯治霍亂心腹痛嘔吐不止吳茱萸湯浸焙炒乾薑炮各一兩干甘草炙一兩半上銼如麻豆每服三錢水一盞煎至七分去滓溫服日三服茯苓理中湯療霍亂臍上築而悸茯苓大如棗者三枚一方二兩乾薑炮一兩甘草炙人參木瓜各三兩上㕮咀以水六升煮取三升去滓適寒溫服為四服忌海藻菘菜酢物理中去朮加桂湯出聖濟總録治霍亂吐過多臍上築悸恐作奔豚乾薑炮一兩甘草炙人參桂去粗皮各三兩上搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時茯苓湯出聖濟總録治霍亂心下築悸腎氣動白茯苓去黑皮人參各三兩甘草炙白朮各二兩乾薑炮一兩上搗篩每服三錢匕水一盞煎至七分去滓溫服日三附子湯出聖濟總録治霍亂臍上築悸四肢逆冷半夏生薑汁製甘草炙各一兩附子炮裂去皮臍半兩上銼如麻豆每服三錢以水一盞棗一枚擘破粳米一撮煎至七分去滓溫服日三霍亂心下痞逆附論夫霍亂結心下不散則氣不通故字書以痞為否言其不通然痞為虛按之不痛氣雖妨悶不須決利唯和調其胃升降其氣則痞氣自散霍亂自寧方木瓜丸治霍亂心下氣痞不通木瓜去皮瓤切焙十枚木香三兩人參一兩半肉豆蔻去皮半兩上搗篩為粗末每服二錢以水一盞煎至七分去滓溫服不拘時候治霍亂吐瀉心腹痞痛方出聖惠方黑豆半合炒熱生薑黃連去須草豆蔻去皮各半兩上細銼和勻分為四服每服以水一中盞煎至六分去滓服良久再服備急丸治霍亂心腹疰痛冷氣築心薺苨飲治霍亂心腹痛桂心湯一名厚朴湯治霍亂中冷心腹痛當歸湯當歸切焙三兩桂去粗皮甘草炙各二兩上搗篩每服三錢以水一盞煎至七分去滓溫服不拘時蘆根湯治霍亂心腹痛生蘆根切一升入土者生薑一升橘皮五兩上以水八升煮取二升分二服服相去以意消息之治霍亂心腹脹痛不得利方出聖惠方牛糞絞取汁一合百日兒乳汁一合上攪勻頓服治霍亂轉筋腹脹不止方出聖惠方小蒜鹽各一分上爛搗納少許臍中上以艾火灸五七壯立效療霍亂苦絞痛不止用生薑二塊豉二升合搗中分為兩半手捻如餅熬令勻爾更番以尉臍中治霍亂出肘後方用溫酒二升以蠟如彈子丸一枚置酒中消乃飲無蠟以鹽二方寸匕代亦得又方出肘後方用桂半夏等分末方寸匕水一升和服之瘥又方出聖惠方用蘆葉一握銼以水一大盞煎至五分去滓頓服菖蒲汁治霍亂腹痛急如中惡用生菖蒲銼碎四兩以水同搗絞取汁一盞分為四服每用熱湯和溫服桃葉飲出聖惠方治霍亂吐痢不止腹俱痛用桃葉秋冬取枝搗二升以水五盞和絞取汁每服一盞不拘時候肘後方用葉三升千金方以桃葉煎汁服一升立止冬用皮治霍亂腹痛吐下亦治轉筋不止煩悶出經驗良方用桑葉汁冬月乾者濃煮服之治霍亂心痛煩滿未得吐下出肘後方用好苦酒三升小飲老羸者亦可飲治霍亂下氣上心腹痛冷氣內外腎釣痛用茱萸葉熱無毒鹽研罨神效干即三浸復罨霍亂轉筋和艾以醋湯拌罨妙也治霍亂心腹脹痛煩滿短氣未得吐下出肘後方用生薑一片切水七升煮取二升分三服又用生薑大片燒皮黑色捶碎水浸服之亦可鹽尉方出危氏方治霍亂吐瀉心腹作痛用炒鹽二碗紙包紗護頓其胸前並腹肚上一截以尉斗火尉氣透則續又以炒鹽尉其背鹽湯飲之即止又方用生大豆屑酒和服方寸木瓜湯治霍亂臍下絞痛木瓜一兩半桑葉七片棗三枚上以水二升煮取半升頓服瘥訶黎勒丸治霍亂吐逆腹痛或便痢數多冷熱不調訶黎勒皮微炒一兩乾生薑切用三分甘草炙半兩陳橘皮去白焙乾二兩上為末煉蜜丸如梧桐子大每服二十丸煎生薑湯下不計時候良薑湯出雞峰方治脾胃傷冷心腹大痛霍亂吐瀉厚朴良薑桂各等分上細末每服三錢水一盞煎至六分去滓溫服不拘時主霍亂出本草以銅盆盛灰厚二寸許以炭火安其上令微熱下以衣藉患者復漸漸尉之腹痛熱瘥霍亂心腹築悸附論夫霍亂而心腹築悸者由吐下之後三焦五臟不和而水氣上乘於心故也腎主水其氣通於陰若吐下三焦五臟不和故脾氣亦虛不能制水水不下注與氣俱上乘其心故起臍下從腹至心築然而悸動不定也方草豆蔻散治霍亂吐瀉臍下氣築悸煩悶草豆蔻去皮木香陳橘皮湯浸去白焙人參去蘆頭以上各一兩桂心甘草炙微赤銼白朮乾薑炮以上各半兩上搗篩為散每服三錢以水一中盞煎至六分去滓不計時候熱服乾薑湯出聖濟總録治霍亂洞泄不止臍上築悸乾薑炮人參甘草白茯苓去粗皮陳橘皮湯浸去白焙各四兩桂去粗皮黃耆銼各二兩上搗篩每服三錢以水一盞煎至七分去渣溫服日三理中湯治霍亂吐瀉心煩築悸人參一兩去蘆頭白朮三分甘草炙制赤銼乾薑炮赤茯苓麥門冬去心各半兩上搗篩為散每服三錢以水一中盞煎至六分去滓不計時候溫服人參散治霍亂吐痢過下臍下氣築悸人參去蘆頭附子炮裂去皮臍各一兩甘草炙微赤銼乾薑炮製銼各半兩桂心澤瀉各三分上搗篩為散每服三錢以水一中盞煎至六分去滓不計時候熱服附子湯出聖濟總録治霍亂心腹築悸附子炮裂去皮臍一兩白茯苓去黑皮人參甘草炙乾薑炮各二兩陳橘皮湯浸去白焙二兩胡椒檳榔銼各二兩吳茱萸湯浸焙炒二兩草豆蔻去皮三兩厚朴去粗皮薑汁炙二兩桂去粗皮一兩縮砂去皮高良薑各三兩蒼朮米泔浸一宿銼去皮焙二兩生薑一斤搗絞取汁上除生薑汁外為細末取生薑汁拌勻用瓷瓶盛於鍋中以重湯一煮一復時取出更搗令勻衆手和丸如梧桐子大每服十丸熟水下服吳茱萸湯治霍亂嘔吐酸水結氣在心下吳茱萸湯浸焙炒二兩白朮赤茯