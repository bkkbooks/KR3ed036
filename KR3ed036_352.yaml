虛損不入飲食或吐痢自汗或寒熱往來大艾葉炒焦取細末五兩乾薑炮取細末二兩半以上用好醋二升半無灰好酒二升生薑自然汁二升將前姜艾末同調勻於銀器內慢火熬成膏附子炮去皮臍二兩白芍藥白朮椒紅川芎當歸洗焙紫巴戟去心糯米炒人參去蘆頭五味子八味各二兩上件為細末入前膏子並炒熱白麵二兩半同和為劑入杵臼內搗千下丸成如梧桐子大每服五十丸溫酒或米飲下食前內補芎藭湯出千金方治婦人産後虛羸及崩傷過多虛竭腹中絞痛芎藭乾地黃各四兩芍藥五兩桂心二兩甘草乾薑各三兩大棗四十枚上㕮咀以水一斗二升煮取三升去滓分三服日三不瘥復作至三劑若有寒苦微下附子三兩旋加治婦人虛羸少氣傷絶腹中拘急痛崩傷虛竭面目無色及唾吐血甚良進食散出大全良方治脾胃虛寒不思飲食及久病人脾胃虛全不入食者只兩服能食青皮陳皮粉草良薑桂心各一兩川烏炮去皮尖草豆蔻仁各三個訶子五個上為細末每服一錢水一盞姜三片煎至七分溫服此方既有川烏治血風攻脾不食豈無驗人參湯出便産須知方療産後多虛羸弱若大汗利皆至於死此重虛故也所以苦中風謬誤昏悶不省人事人參茯苓羌活桂心大棗遠志各十分竹瀝一升上用水六升煮取三升下竹瀝更煎取二升溫分三服增損柴胡湯出濟生拔粹方治産後虛羸發寒熱飲食少腹脹北柴胡人參甘草半夏陳皮川芎白芍藥上各等分㕮咀每服三錢水一大盞姜五片棗二枚煎七分去滓食後溫服日三服如産後風氣在表面目四肢浮宜加局方中七聖丸白湯下以利為度如浮腫添喘嗽加木香檳榔倍之謂氣多也如浮腫加頭痛昏冒加羌活川芎謂風多也如只浮腫依七聖丸本方服之芍藥湯療産後虛乏不思飲食四肢皆倦心腹陳痛補虛治氣人參芍藥桂心甘草生薑各一兩當歸一兩半生地黃二兩上㕮咀每服三錢水二盞棗二枚煎至一盞去滓溫服日三服人參湯治産後虛羸困乏肌肉不生血脈不榮人參芎藭黃耆銼甘草炙令黃各二兩桂去粗皮一兩生乾地黃焙用二兩乾薑炮裂半兩上粗搗篩每服三錢匕用煮羊肉汁一盞煎七分去滓溫服不拘時補氣湯出肘後方治産後大虛劣黃雄雞一隻赤小豆五升大豆亦得乾地黃一兩甘草桂心黃芩芍藥各三兩上以水二斗煮雞豆一斗去滓納藥煎取四升分為四服風濕湯治婦人産後血氣虛損傷風寒濕口急項強腰腳疼痹烏頭炮去皮一兩當歸芍藥麻黃去節甘草炒白朮各半兩上㕮咀每服三錢水一盞半生薑四片煎至七分去滓溫服不拘時候黃雌雞湯治産後虛羸黃雌雞一隻去頭足翅羽腸肚細切當歸白朮熟地黃桂心黃耆各半兩上㕮咀以水七升煮雞至三升每服藥四錢以雞汁一盞煎至六分去滓溫服日三服內補當歸建中湯出三因方治産後虛羸不足腹中㽲痛不止吸吸少氣或苦小腹拘急痛引腰背不能飲食産後一月得服四五劑為善令人力壯及治婦人一切血氣虛損時自汗出當歸四兩芍藥五兩甘草二兩生薑六兩桂心三兩大棗十八枚上㕮咀以水一斗煮取三升去滓分服一日令盡若大虛飴糖六兩作湯成內之於火上飴消若無生薑則以乾薑三兩代之若其人去血過多崩傷內衄不止加地黃六兩阿膠二兩合八種作湯或去滓納阿膠若無當歸以芎藭代之甘草丸治産後虛損主補虛去血止痛甘草炙五兩當歸乾薑人參術各二兩上搗篩蜜丸如彈子磨內一升酒中作一服日三治産後虛羸盜汗嗇嗇惡寒出千金方以吳茱萸三兩以清酒三升漬一宿煮如蟻鼻沸減得二升許中分之頓服一升日再間日再作服亦治産後腹中疼痛羊肉方治産後大虛羸瘦無力腹肚痛冷氣不調又腦中風汗自出以白羊肉一斤如常法調和醃臘食之當歸湯治婦人寒疝虛勞不足若産後腹中絞痛並治之豬膏煎出千金方治産後體虛寒熱自汗出者豬膏生薑汁白蜜各一升清酒五合上當炭火上熬令調和五上五下膏成隨意酒服方寸匕地黃羊脂煎千金方療産後諸病羸瘦欲肥白生地黃一斗生薑汁五升羊脂二斤白蜜五升上先煎地黃汁令餘五升下羊脂煎減半次下薑次下蜜便以銅器或著湯中煎令如飴狀空肚酒一升取煎如雞子大投酒中飲日三良療産後虛羸困乏黃雌雞一隻去毛背上破生百合煨三枚白粳米半升上依常法著五味調和縫雞背合味汁煮熟開腹取百合並相和汁作羹食之肉亦食令盡略臥佳當歸散出神效方治婦人産後虛弱和血通經當歸一兩焙芍藥二兩香附子三兩炒上為細末每服一二錢米飲湯調下服之無時枳實散出肘後方治産後虛損煩亂不得眠枳實芍藥等分赤炙上為末服方寸匕日三服之二聖散治産後虛羸汗不止煩倦少力麻黃根二兩故敗扇燒取灰稱半兩上為散每服二錢匕煎人參湯調不拘時治産後虛勞骨節疼痛汗出不止出本草取豬腎造稀臛以蔥豉米如法食之治婦人産後虛損以蟶食之
