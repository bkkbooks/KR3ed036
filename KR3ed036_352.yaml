body:
  text: 卷三百五十二産後諸疾門崩中漏下附論夫産後崩中漏下者蓋由産臥傷耗經脈未得平復而勞役損動致血暴崩淋瀝不止或因酸鹹不節傷蠹榮衛氣血衰弱亦變崩中又有多因七氣所傷臟氣不平或服斷血藥早致惡血不消主成崩中方側柏丸治産後崩中久下血不止或赤或黑臍下疼痛側柏炙微黃白芍藥黃耆銼熟乾地黃續斷各一兩代赭一兩半牛角䚡灰禹餘糧燒醋淬三次桑耳當歸銼微炒艾葉微炒各一兩龜甲二兩塗醋炙令微黃上為末煉蜜搗三五百杵丸如小豆大每服空心以黃耆湯下三十丸熟乾地黃散治産後崩中頭目旋暈神思昏迷四肢煩亂不知人事熟乾地黃伏龍肝黃耆赤石脂各一兩艾葉炒阿膠甘草白朮川芎人參各半兩當歸三分上㕮咀每服三錢姜三片水一大盞煎至七分去滓溫服阿膠丸治産後崩中下血不止虛羸無力阿膠赤石脂各半兩續斷川芎當歸甘草丹參各一兩龍骨鹿茸酥炙烏賊骨龜甲炙各三兩上為細末煉蜜為丸如梧桐子大空心溫酒下二三十丸一方加鱉甲一兩白芍藥散治産後崩中下血淋瀝不絶黃瘦虛損白芍藥牡蠣乾薑熟乾地黃烏賊骨桂心黃耆鹿角膠龍骨各一兩上為末食前溫酒調下二錢療産後下血不止桑耳炙芍藥炙地榆葛根牛角䚡阿膠各六分艾葉雞蘇各四分白龍骨十分上㕮咀以水二升煮取八合分三服此藥尤能治産後痢先以桂丸小下之次投硇砂丸日服十丸痢頓減半次日遂愈硇砂丸産後雖無疾亦宜服之能養血氣去積滯大黃散治崩漏下血不止大黃三兩芒硝一兩桃仁水蛭䗪蟲各三十枚甘草當歸各三兩䗪蟲四十枚上㕮咀以水三升酒二升合煎取三升去滓分三服龍骨散療崩中下血龍骨研赤石脂研各六分烏賊魚骨牡蠣粉肉蓯蓉各五兩龜甲芍藥上搗散飲服方寸匕日三漸加之加乾地黃十分佳龜甲散治産後崩中下血過多不止龜甲三兩醋浸炙令微黃黑桑耳一兩鹿茸一兩去毛塗酥炙令黃白石脂一兩禹餘糧一兩燒醋淬三次當歸一兩銼微炒吳茱萸半兩湯浸十次炒令微黃芎藭一兩柏子仁一兩上為散每於食前以溫酒調下一錢瑞蓮散治産後惡露崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸桂心各一兩鯉魚鱗燒川芎各三分檳榔三枚上為細末每服三錢煨姜酒調下未止更進即止桂丸硇砂桂心甘遂丁香木香芫花以硇砂炒焦以上各等分巴豆去心皮不去油減半上為細末麵糊丸如緑豆每服二丸三丸溫酒下加減更量虛實此丸最宜取積不以久近皆能消化阿膠散出聖惠方治産後崩中下血不止作血片如雞肝碎爛者阿膠一兩搗碎炒黃燖當歸一兩銼微炒續斷一兩地榆一兩銼熟乾地黃一兩牛膝一兩去苗紅花子一兩上為散每服三錢以伏龍肝一兩浸取水一盞煎至六分去滓每於食前溫服麒麟竭散出聖惠方治産後崩中下血不絶小腹痛麒麟竭一兩禹餘糧一兩燒醋淬三次地榆一兩銼阿膠二兩搗碎炒令黃色赤芍藥一兩熟乾地黃一兩上為散每於食前以溫酒調下一錢熟地黃散出聖惠方治産後崩中下血淋瀝不絶黃瘦虛損熟地黃赤石脂各一兩鹿茸牡蠣當歸各半兩上為細末食前粥飲調二錢固經丸出醫方集成治産後所下過多勞役傷損致血暴崩淋瀝不已或鹹酸不節所致此謂重傷如有腹脹則是瘀血使然此藥又非其治艾葉赤石脂煅補骨脂木賊各半兩附子一個炮上為末陳米湯和丸如梧桐子大食前溫酒下二十丸米飲亦可一方煎芎歸湯加芍藥下評曰血崩不是輕病況産後有此是謂重傷此恐不止鹹酸不節而致多因驚憂怒氣不平或産後服斷血藥早致惡血不消鬱滿作堅亦成崩中固經丸自難責效不若大料煮芎藭湯加芍藥候定隨證藥治為得小腹滿痛肝經已壞難治局方大順散除杏仁用醋煮附子依等分入效桂心散出千金方治崩漏下血不止桂心蠐螬各二兩栝蔞根牡丹各三兩豉一升上㕮咀以水八升煎取三升去滓分三服治産後血崩不止出護命方菟絲子杜仲去皮益智子去皮萆薢山茱萸五味子茯苓赤石脂龍骨芎各一分川椒三銖覆盆子半兩上為細末煉蜜丸如梧桐子大早晨空心鹽湯下三十丸治産後崩中惡露不止大腑冷方吃此方出護命方白朮當歸芎白芷各半兩牡蠣火煅三分舶上硫黃一兩細研上為細末令如飛塵同舶上硫黃相滾煉蜜丸如梧桐子大早朝空心鹽湯下三十丸伏龍肝散療崩中下血數升氣欲絶伏龍肝五升人參一兩麝香二兩生薑四兩上切以水一大斗煮土取二升下藥煎取一升半更別研伏龍肝一雞子許並麝香納湯中攪令勻分服治産後連下血不止者黃連黃柏阿膠炙各三分熟艾二兩上以水六升煮取二升半分為三溫服龍骨丸治産後虛冷下血及谷下晝夜無數兼治産後惡露不斷加味芎藭湯出醫學類證芎藭當歸芍藥各等分上㕮咀每服四錢水一盞半煮取七分去滓無時熱服治産後崩露下血不止出朱氏集驗方棕櫚皮乾薑烏梅各一兩燒皮存性上研為細末每服三錢煎烏梅湯調下不拘時候久患三服愈香墨散出聖惠方治産後崩中下血不止香墨半兩露蜂房半兩微炒龍骨半兩上為散每於食前用水煎乾地黃湯調下二錢又方出聖惠方白善土半兩乳香一分阿膠半兩搗碎炒令黃燥上為散每於食前以粥飲調下一錢赤龍皮散出聖惠方治産後崩中有惡物或渴者赤鯉魚皮二兩亂髮一兩棕櫚皮一兩銼上同於銚子內用麻點火均炒令煙盡候冷入麝香半分都研令勻每於食前以醋一合水二合煎一兩沸調一錢服之蠶蛻散出海上名方治崩露下血不止蠶蛻紙棕櫚皮各燒灰存性上研細末每服各抄二錢溫酒調下立效又方出千金方治産後漏血不止露蜂房敗船茹上等分燒作灰取酩若漿服方寸匕日三又方出聖惠方艾葉一握微炒伏龍肝一雞子大上相和以酒一大盞煎至六分去滓食前分溫二服又方出聖惠方牡蠣一兩燒為灰兔骨一兩塗醋炙微黃上為散每於食前以溫酒調下二錢地黃酒方出聖惠方治産後崩中下血不止心神煩亂生地黃汁半小盞益母草半小盞上酒一小盞相和煎至三五沸分為三服頻頻服之效治産後崩中不止方出聖惠方荷葉一兩七月七日煮鹿角膠二兩搗碎炒令黃燥上為散每於食前以溫酒調下二錢菖蒲酒出聖惠方治産後崩中下血不止用菖蒲一兩半細銼以酒二鍾煎至一盞去滓溫服分作三服食前服夏枯草散出海上名方治崩中漏下血不止用夏枯草燒灰研為末每服二錢溫米飲調下桃枝散療崩中下血不止並男子猝痢血取東南引桃枝三握細切以水四升煮取一升頓服未瘥更服良治産後血不止用灶黑煤以熱酒調送下便瘥又方出聖惠方用刺薊半斤淨洗曝乾以酒五升浸經三宿每日隨意多少暖服之白芷丸出千金方治産後所下過多及崩中傷損虛竭少氣面目脫色腹中痛方白芷五兩乾地黃四兩續斷乾薑當歸阿膠各三兩附子一兩上七味為末蜜和丸如梧桐子大酒服二十丸日四五服無當歸芎藭代入蒲黃一兩炒續斷大薊根代祕方龍骨丸出危氏方治半産後及下虛數月崩漏不止白牡蠣北赤石脂代赭石以上並煅白龍骨伏龍肝海螵蛸五靈脂側柏葉各等分棕櫚不拘多少燒灰真蒲黃多加入上為末醋糊丸如梧桐子大每服三十五丸以十全大補湯三錢加嫩鹿茸去毛酒炙阿膠蚌粉炒各一錢半姜三片棗二枚烏梅二個煎吞服立效大聖散朱氏集驗方治小産下崩不止忽大渴飲水則吐藥食不進命在須臾一醫用後藥一服吐住荊芥末半錢合大聖散用白湯點服治女人産後漏下及痔病下血方礬石一兩附子一枚上為末蜜丸如梧桐子大空心酒下二丸日三稍加至五丸數日瘥能百日服之永斷治崩中單方出千金方用牛角末以酒服方寸匕日三服亦治帶下月水不通附論夫産傷動於血氣其後虛損未復而為風冷所傷血之為性得冷則凝結故風冷傷經血結於胞絡之間故令月水不通也凡血結月候不通則變成血瘕水血相併復遇脾胃衰弱肌皮虛者則為水腫也方大黃丸治産後惡血凝滯月水不通川大黃一兩銼微炒桃仁一兩湯浸去皮尖雙仁麩炒微黃乾漆一兩搗碎炒令煙盡赤茯苓三分甜葶藶三分隔紙炒令紫色牛膝一兩去苗牡丹三分水蛭半兩炒令黃芎藭半兩桂心半兩柴胡三分去苗牡蠣三分人參半兩去蘆頭當歸半兩銼微炒虻蟲半兩微炒令黃去翅足川椒半兩去目及合口者微炒去汗吳茱萸一分湯浸七次焙微炒乾薑一分炮裂銼䗪蟲半兩炒令微黃生乾地黃一兩上為末煉蜜丸如梧桐子大每服食前以溫酒下二十丸益母草子散出聖惠方治産後惡血積留經久未消致月水不通面色萎黃臍腹疼痛肌瘦無力益母草子一兩桂心半兩當歸三分熟乾地黃半兩大麥糵半兩微炒赤芍藥半兩鬼箭羽半兩紅藍花半兩川大黃三分赤鯉魚皮灰半兩亂髮灰半兩密陀僧半兩燒醋淬過虻蟲一兩去翅足微炒水蛭一兩炒令黃麝香一分研入上為散以赤馬尿半中盞酒半中盞拌和前藥令勻直候乾研入麝香每服食前以溫酒調下二錢虻蟲散出聖惠方治産後日久月水不通虻蟲半兩去翅足微炒川大黃三分銼微炒亂髮灰半兩蒲黃半兩麒麟竭半兩延胡索三分伏龍肝半兩細研當歸半兩銼微炒赤芍藥半兩狗膽二枚乾者䗪蟲半兩微炒水蛭半兩炒令黃麝香一分研入硃砂半兩細研水飛過上為細散入研了藥令勻每服食前以溫酒調下二錢虎杖散出聖惠方治産後多時月水不調虎杖三分牛膝三分去苗蘇枋半兩銼紅藍花半兩蓮子心半兩當歸三分銼微炒桂心半兩牡丹半兩乾漆半兩搗碎炒令煙出鬼箭羽半兩狗膽二枚乾者硇砂半兩研入琥珀半兩研入麝香一分研入上為散入研了藥令勻每服食前溫酒調下二錢琥珀散出聖惠方治産後月水不通腹脅脹悶四肢煩疼飲食減少漸覺虛困琥珀一兩虎杖三分牛膝一兩去苗木香半兩鱉甲一兩塗醋炙微黃去裙赤芍藥一兩柴胡一兩去苗赤茯苓三分桂心半兩桃仁三分去皮尖雙仁麩炒黃川大黃一兩銼碎微炒當歸三分銼微炒枳殼三分麩炒微黃去瓤上為散每服三錢水一中盞入生薑半分煎至六分去滓食前溫服忌生冷油膩莧菜牛膝散出聖惠方治産後氣滯月水不通腹脅疼痛牛膝一兩去苗桂心半兩當歸半兩銼微炒菴䕡子一兩牡丹半兩蓬莪朮半兩瞿麥半兩琥珀半兩防葵半兩劉寄奴半兩桃仁半兩湯浸去皮尖雙仁麩炒微黃甘草半兩炒微赤銼上為散每服三錢水一中盞入生薑半分煎至六分去滓食前稍熱服紅藍花散出聖惠方治産後月水不通腹脅刺痛面色萎黃時發煩熱不思飲食紅藍花半兩琥珀一兩川大黃一兩銼碎微炒瞿麥半兩當歸一兩銼微炒桂心一兩延胡索三分赤芍藥半兩薑黃半兩牛膝半兩去苗桃仁三分湯浸去皮尖雙仁麩炒微黃蓬莪朮半兩上為散每服一錢食前以溫酒調下牡丹丸出聖惠方治産後月水不通脅腹滯悶四肢煩疼牡丹一兩川大黃一兩銼碎微炒赤芍藥一兩木香半兩桃仁半兩湯浸去皮尖雙仁麩炒微黃虻蟲一分炒令微黃去翅皮水蛭一分微炒令黃蠐螬一分微炒瞿麥三分芎藭三分當歸三分銼微炒海藻三分洗去鹹味桂心半兩上為細末煉蜜和丸如梧桐子大每服食前以溫酒送下二十丸鬼箭羽散出聖惠方治産後月水不通肚腹時痛四肢煩疼不欲飲食漸覺瘦弱鬼箭羽一兩川大黃一兩銼碎微炒木香半兩當歸三分銼微炒桂心三分桃仁三分湯浸去皮尖雙仁麩炒黃赤芍藥三分牛膝一兩去苗鱉甲一兩醋塗炙令黃去裙延胡索