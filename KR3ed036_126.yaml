body:
  text: 卷一百二十六傷寒門辨脈法第一問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死內經曰微妙在脈不可不察察之有紀從陰陽始始之有經從五行生茲首論脈之陰陽者以脈從陰陽始故也陽脈有五陰脈有五以脈從五行生故也陽道常饒大浮數動滑五者比之平脈也有餘故謂之陽陰道常乏沉澀弱弦微五者比之平脈也不及故謂之陰傷寒之為病邪在表則見陽脈邪在裡則見陰脈陰病見陽脈而主生者則邪氣自里之表欲汗而解也如厥陰中風脈微浮為欲愈不浮為未愈者是也陽病見陰脈而主死者則邪氣自表入里正虛邪勝如譫言妄語脈沉細者死是也金匱要略曰諸病在外者可治入里者即死此之謂也問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結期十四日當劇結者氣偏結固陰陽之氣不得而雜之陰中有陽陽中有陰陰陽相雜以為和不相雜以為結浮數陽脈也能食而不大便裡實也為陽氣結固陰不得而雜之是名陽結沉遲陰脈也不能食身體重陰病也陰病見陰脈則當下利今大便硬者為陰氣結固陽不得而雜之是名陰結論其數者傷寒之病一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰至六日為傳經盡七日當愈七日不愈者謂之再經言再經者再自太陽而傳至十二日再至厥陰為傳經盡十三日當愈十三日不愈者謂之過經言再過太陽之經亦以次而傳之也陽結為火至十七日傳少陰水水能制火火邪解散則愈陰結屬水至十四日傳陽明土土能制水水邪解散則愈彼邪氣結甚水又不能制火土又不能制水故當劇內經曰一候後則病二候後則病甚三候後則病危也問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也一陰一陽謂之道偏陰偏陽謂之疾陰偏不足則陽得而從之陽偏不足則陰得而乘之陽不足則陰氣上入陽中為惡寒者陰勝則寒矣陰不足陽氣下陷入陰中為發熱者陽勝則熱矣陽脈浮陰脈弱者則血虛血虛則筋急也陽為氣陰為血陽脈浮者衛氣強也陰脈弱者營血弱也難經曰氣主詬之血主濡之血虛則不能濡潤筋絡故筋急也其脈沉者營氣微也內經云脈者血之府也脈實則血實脈虛則血虛此其常也脈沉者知營血內微也其脈浮而汗出如流珠者衛氣衰也針經云衛氣者所以溫分肉充皮毛肥腠理司開闔者也脈浮汗出如流珠者腠理不密開闔不司為衛氣外衰也浮主候衛沉主候營以浮沉別營衛之衰微理固然矣然而衰甚於微所以於營言微而衛言衰者以其汗出如流珠為陽氣外絶所以衛病甚於營也營氣微者加燒針則血流不行更發熱而躁煩也衛陽也營陰也燒針益陽而損陰營氣微者謂陰虛也內經曰陰虛而內熱方其內熱又加燒針以補陽不惟兩熱相合而營血不行必更外發熱而內躁煩也脈藹藹如車蓋者名曰陽結也藹藹如車蓋者大而厭厭聶聶也為陽氣鬱結於外不與陰氣和雜也脈纍纍如循長竿者名曰陰結也纍纍如循長竿者連連而強直也為陰氣鬱結於內不與陽氣和雜也脈瞥瞥如羹上肥者陽氣微也輕浮而主微也脈縈縈如蜘蛛絲者陽氣衰也縈縈滯也若縈縈惹惹之不利也如蜘蛛絲者至細也微為陽微細為陽衰脈要曰微為氣痞是未至於衰內經曰細則氣少以至細為陽衰宜矣脈綿綿如瀉漆之絶者亡其血也綿綿者連綿而軟也如瀉漆之絶者前大而後細也正理論曰天樞開發精移氣變陰陽交會胃和脈生脈復生也陽氣先至陰氣後至則脈前為陽氣後為陰氣脈來前大後細為陽氣有餘而陰氣不足是知亡血脈來緩時一止復來者名曰結脈來數時一止復來者名曰促脈陽盛則促陰盛則結此皆病脈脈一息四至曰平一息三至曰遲小快於遲曰緩一息六至曰數時有一止者陰陽之氣不得相續也陽行也速陰行也緩緩以候陰若陰氣勝而陽不能相續則脈來緩而時一止數以候陽若陽氣勝而陰不能相續則脈來數而時一止傷寒有結代之脈動而中止不能自還為死脈此結促之脈止是陰陽偏勝而時有一止即非脫絶而止云此皆病脈陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也動為陰陽相搏方其陰陽相搏而虛者則動陽動為陽虛故汗出陰動為陰虛故發熱也如不汗出發熱而反形冷惡寒者三焦傷也三焦者原氣之別使主行氣於陽三焦既傷則陽氣不通而微致身冷而惡寒也金匱要略曰陽氣不通即身冷經曰陽微則惡寒若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也脈經云陽出陰入以關為界關為陰陽之中也若數脈見於關上上下無頭尾如豆大厥厥動搖者是陰陽之氣相搏也故名曰動陽脈浮大而濡陰脈浮大而濡陰脈與陽脈同等者名曰緩也陽脈寸口也陰脈尺中也上下同等無有偏勝者是陰陽之氣和緩也非若遲緩之有邪也陰陽偏勝者為結為促陰陽相搏者為動陰陽氣和者為緩學者不可不知也脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也脈經云弦與緊相類以弦為虛故雖緊如弦而按之不移不移則不足也經曰弦則為減以緊為實是切之如轉索無常而不散金匱要略曰脈緊如轉索無常者有宿食也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精弦則為減減則為寒寒者謂陽氣少也大則為芤芤則為虛虛者謂血少不足也所謂革者言其既寒且虛則氣血改革不循常度男子得之為真陽減而不能內固故主亡血失精婦人得之為陰血虛而不能滋養故主半産漏下問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也浮為陽緊為陰芤為虛陰陽爭則戰邪氣將出邪與正爭其人本虛是以發戰正氣勝則戰戰已復發熱而大汗解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也浮數陽也本實陽勝邪不能與正爭故不發戰也問曰病有不戰而汗出解者何也答曰脈大而浮數故知不戰汗出而解也陽勝則熱陰勝則寒陰陽爭則戰脈大而浮數皆陽也陽氣全勝陰無所爭何戰之有問曰病有不戰不汗出而解者何也答曰其脈自微此以曾經發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也脈微者邪氣微也邪氣已微正氣又弱脈所以微既經發汗吐下亡陽亡血內無津液則不能作汗得陰陽氣和而自愈也問曰傷寒三日脈浮數而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解者必大汗出也傷寒三日陽去入陰之時病人身熱脈浮數而大邪氣傳也若身涼和脈浮數而微者則邪氣不傳而欲解也解以夜半者陽生於子也脈浮主濈然汗出而解者邪從外散也脈數主能食而解者胃氣和也脈微主大汗出而解者邪氣微也問曰病脈欲知愈未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈三部脈均等即正氣已和雖有餘邪何害之有立夏得洪大脈是其本位其人病身體苦疼重者鬚髮其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此脈來應時為正氣內固雖外感邪氣但微自汗出而亦解矣內經曰脈得四時之順者病無他問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也日中得病者陽受之夜半得病者陰受之陽不和得陰則和是解以夜半陰不和得陽則和是解以日中經曰用陽和陰用陰和陽寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也經曰諸陽浮數為乘腑諸陰遲澀為乘臟趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈浮大者氣實血虛也今趺陽脈浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也趺陽者胃之脈診得浮而澀者脾胃不足也浮者以為氣實澀者以為血虛者此非也經曰脈浮而大浮為氣實大為血虛若脈浮大當為氣實血虛今趺陽脈浮而澀浮則胃虛澀則脾寒脾胃虛寒則谷不消而水不別法當下利少陰腎脈也腎為肺之子為肝之母浮為肺脈弦為肝脈少陰脈弦而浮為子母相生故云調脈若滑而數者則客熱在下焦使血流腐而為膿故屎膿也寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼當發其汗也脈經云風傷陽寒傷陰衛為陽營為陰風為陽寒為陰各從其類而傷也易曰水流濕火就燥者是矣衛得風則熱營得寒則痛營衛俱病故致骨節煩疼當與麻黃湯發汗則愈趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也營衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以數脈動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也經常也趺陽之脈以候脾胃故遲緩之脈為常若脈浮數則為醫妄下傷胃動脾邪氣乘虛內陷也邪在表則見陽脈邪在裡則見陰脈邪在表之時脈浮而數也因下里虛營衛內陷邪客於脾以數則動脾今數先微則是脾邪先陷於裡也胃虛脾熱津液干少大便必硬針經曰脾病善噫得後出餘氣則快然而衰今脾客邪熱故氣噫而除脾能磨消水穀今邪氣獨留於脾脾氣不治心中雖飢而不能殺穀也脾主為胃行其津液脾為熱爍故潮熱而發渴也趺陽之脈本遲而緩因下之後變浮為數營衛內陷數復改微是脈因前後度數如法邪熱內陷於脾而心中善飢也數脈不時者為數當改微而復不微如此則是邪氣不傳於裡但鬱於營衛之中必出自肌皮為惡瘡也師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知血亡也微為亡陽澀則無血不當汗而強與汗之者令陽氣微陰氣上入陽中則惡寒故曰陽微則惡寒不當下而強與下之者令陰氣弱陽氣下陷入陰中則發熱故曰陰弱則發熱氣為陽血為陰陽脈以候氣陰脈以候血陰脈遲澀為營血不足故知亡血經曰尺脈遲者不可發汗以營氣不足血少故也脈浮而大心下反硬有熱屬臟者攻之不令發汗浮大之脈當責邪在表若心下反硬者則熱已甚而內結也有熱屬臟者為別無虛寒而但見裡熱也臟屬陰為邪在裡故可下之攻之謂下之也不可謂脈浮大便與發汗病源曰熱毒氣乘心心下痞滿此為有實宜速下之屬腑者不令溲數溲數則大便硬汗多則熱愈汗少則便難脈遲尚未可攻雖心下硬若余無里證但見表證者為病在陽謂之屬腑當先解表然後攻痞溲小便也勿為飲結而利小便使其溲數大便必硬也經曰小便數者大便必硬謂走其津液也汗多則邪氣除而熱愈汗少則邪熱不盡又走其津液必便難也硬家當下設脈遲則未可攻以遲為不足即裡氣未實故也脈浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也病有不可治者為邪氣勝於正氣也內經曰大則邪至又曰大則病進脈浮而洪者邪氣勝也身汗如油喘而不休者正氣脫也四時以胃氣為本水漿不下者胃氣盡也一身以營衛為充形體不仁者營衛絶也不仁為痛癢俱不知也針經曰營衛不行故為不仁爭則亂安則靜乍靜乍亂者正與邪爭正負邪勝也正氣已脫胃氣又盡營衛俱絶邪氣獨勝故曰命絶也又未知何臟先受其災若汗出發潤喘不休者此為肺先絶也肺為氣之主為津液之帥汗出發潤者津脫也喘不休者氣脫也陽反獨留形體如煙燻直視搖頭者此心絶也肺主氣心主血氣為陽血為陰陽反獨留者則為身體大熱是血先絶而氣獨在也形體如煙燻者為身無精華是血絶不榮於身也心脈俠咽系目直視者心經絶也頭為諸陽之會搖頭者陰絶而陽無根也唇吻反青四肢漐習者此為肝絶也唇吻者脾之候肝色青肝絶則真色見於所勝之部也四肢者脾所主肝主筋肝絶則筋脈引急發於所勝之分也漐習者為振動若搐搦手足時時引縮也環口黧黑柔汗發黃者此為脾絶也脾主口唇絶則精華去故環口黧黑柔為陰柔汗冷汗也脾胃為津液之本陽氣之宗柔汗發黃者脾絶而陽脫真色見也溲便遺失狂言目反直視者此為腎絶也腎司開闔禁固便溺溲便遺失者腎絶不能約制也腎藏志狂言者志不守也內經曰狂言者是失志矣失志者死針經曰五臟之精氣皆上注於目骨之精為瞳子目反直視者腎絶則骨之精不榮於瞳子而瞳子不轉也又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也陽主熱而色赤陰主寒而色青其人死也身色青則陰未離乎體故曰陰氣後竭身色赤腋下溫心下熱則陽未離乎體故曰陽氣後竭針經曰人有兩死而無兩生此之謂也寸口脈浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必噎經云脈浮大應發汗若反下之為大逆浮大之脈邪在表也當發其汗若反下之是攻其正氣邪氣得以深入故為大逆浮則無血者下後亡血也大則為寒者邪氣獨在也寒邪因裡虛而入寒氣相搏乃為腸鳴醫見脈大以為有熱飲以冷水欲令水寒勝熱而作大汗里先虛寒又得冷水水寒相搏使中焦之氣澀滯故令噎也趺陽脈浮浮則為虛浮虛相搏故令氣噎言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也趺陽脈浮為噎脈滑為噦皆醫之咎責虛取實之過也內經曰陰在內陽之守也陽在外陰之使也發汗攻陽亡津液而陽氣不足者謂之守空經曰表氣微虛裡氣不守故使邪中於陰也陰不為陽守邪氣因得而入之內搏陰血陰失所守血乃妄行未知從何道而出若脈浮鼻燥者知血必從鼻中出也諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也浮數之脈主邪在經當發熱而灑淅惡寒病人一身盡痛不欲飲食者傷寒也若雖發熱惡寒而痛偏著一處飲食如常者即非傷寒是邪氣鬱結於經絡之間血氣壅遏不通欲血聚而成癰膿也脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者瘥遲遲為無陽不能作汗其身必癢也脈浮面熱赤者邪氣外浮於表也脈遲戰惕者本氣不足也六七日為邪傳經盡當汗出而解之時若當汗不汗反發熱者為裡虛津液不多不能作汗既不汗邪無從出是以瘥遲發熱為邪氣浮於皮膚必作身癢也經曰以其不能得小汗出故其身必癢也寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也表氣微虛裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣微虛裡氣微急三焦相混內外不通上焦怫鬱臟氣相熏口爛食齦也中焦不治胃氣上衝脾氣不轉胃中為濁營衛不通血凝不流若胃氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全浮為陽沉為陰陽脈緊則霧露之氣中於上焦陰脈緊則寒邪中於下焦上焦者太陽也下焦者少陰也發熱頭痛項強頸攣腰疼脛酸者霧露之氣中於太陽之經也濁邪中下陰氣為栗足脛逆冷便溺妄出者寒邪中於少陰也因表氣微虛邪入而客之又裡氣不守邪乘里弱遂中於陰陰虛遇邪內為懼栗致氣微急矣內經曰陽病者上行極而下陰病者下行極而上此上焦之邪甚則下干中焦下焦之邪甚則上干中焦由是三焦混亂也三焦主持諸氣三焦既相混亂則內外之氣俱不得通膻中為陽氣之海氣因不得通於內外怫鬱於上焦而為熱與臟相熏口爛食齦內經曰膈熱不便上為口糜中焦為上下二焦之邪混亂則不得平治中焦在胃之中中焦失治胃氣因上衝也脾坤也坤助胃氣磨消水穀脾氣不轉則胃中水穀不得磨消故胃中濁也金匱要略曰穀氣不消胃中苦濁營者水穀之精氣也衛者水穀之悍氣也氣不能布散致營衛不通血凝不流衛氣者陽氣也營血者陰氣也陽主為熱陰主為寒衛氣前通者陽氣先通而熱氣得行也內經曰膀胱者津液藏焉化則能出以小便赤黃知衛氣前通也熱氣與胃氣相搏而行出入臟腑遊於經絡經絡客熱則血凝肉腐而為癰膿此見其熱氣得行若陰氣前通者則不然陽在外為陰之使因陽氣厥微陰無所使遂陰氣前通也內經曰陽氣者衛外而為固也陽氣厥微則不能衛外寒氣因而客之鼻者肺之候肺主聲寒氣內入者客於肺經則嚏而出之聲嗢咽塞寒者外邪也厥者內邪也外內之邪合併相逐為熱則血凝不流今為熱所擁使血凝自下如豚肝也上焦陽氣厥下焦陰氣厥二氣俱厥不相順接則脾氣獨弱不能行化氣血滋養五臟致五臟俱虛而五液注下針經曰五臟不和使液溢而下流於陰闔合也清圊也下焦氣脫而不合故數便而下重臍為生氣之原臍築湫痛則生氣欲絶故曰命將難全脈陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上苔滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日以上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也脈陰陽俱緊為表裡客寒寒為陰得陽則解口中氣出唇口乾燥者陽氣漸復正氣方溫也雖爾然而陰未盡散蜷臥足冷鼻中涕出舌上滑苔知陰獨在也方陰陽未分之時不可妄治以偏陰陽之氣到七日以來其人微發熱手足溫者為陰氣已絶陽氣得復是為欲解若過七日不解到八日以上反發大熱者為陰極變熱邪氣勝正故云難治陽脈緊者寒邪發於上焦上焦主外也陰脈緊者寒邪發於下焦下焦主內也設使惡寒者上焦寒氣勝是必欲嘔也腹內痛者下焦寒氣勝是必欲利也脈陰陽俱緊至於吐利其脈獨不解緊去入安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解脈陰陽俱緊為寒氣甚於上下至於吐利之後緊脈不罷者為其脈獨不解緊去則入安為欲解若脈遲至六七日不欲食者為吐利後脾胃大虛內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行脾胃氣強則能輸散水飲之氣若脾胃氣虛則水飲內停也所謂晚發者後來之疾也若至六七日而欲食者則脾胃已和寒邪已散故云欲解病六七日手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也煩熱也傳經之時病人身大煩口噤不能言內作躁擾則陰陽爭勝若手足三部脈皆至為正氣勝邪氣微陽氣復寒氣散必欲解也若脈和其人大煩目重瞼內際黃者此為欲解也脈經曰病人兩目眥有黃色起者其病方愈病以脈為主若目黃大煩脈不和者邪勝也其病為進目黃大煩而脈和者為正氣已和故云欲解脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也內經曰有者為實無者為虛氣並則無血血並則無氣風則傷衛數則無血浮數之脈風邪並於衛衛勝則營虛也衛為陽風搏於衛所以為熱營為陰營氣虛所以為寒風並於衛者發熱惡寒之證具矣脈浮而滑浮為陽滑為實陽實相搏其脈數疾衛氣失度浮滑之脈數疾發熱汗出者此為不治浮為邪氣並於衛而衛氣勝滑為邪氣並於營而營氣實邪氣勝實擁於營衛則營衛行速故脈數疾一息六至曰數平人脈一息四至衛氣行六寸今一息六至則衛氣行九寸計過平人之半是脈數疾知衛氣失其常度也浮滑數疾之脈發熱汗出而當解若不解者精氣脫也必不可治經曰脈陰陽俱盛大汗出不解者死傷寒咳逆上氣其脈散者死謂其形損故也千金方云以喘嗽為咳逆上氣者肺病散者心脈是心火刑于肺金也內經曰心之肺謂之死陰死陰之屬不過三日而死以形見其損傷故也平脈法第二問曰脈有三部陰陽相乘營衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰豫之所問道之根源脈有三部尺寸及關寸為上部關為中部尺為下部營衛流行不失衡銓衡銓者稱也可以稱量輕重內經曰春應中規夏應中衡秋應中矩冬應中權營行脈中衛行脈外營衛與脈相隨上下應四時不失其常度腎沉心洪肺浮肝弦此自經常不失銖分腎北方水旺於冬而脈沉心南方火旺於夏而脈洪肺西方金旺於秋而脈浮肝東方木旺於春而脈弦此為經常銖分之不差也出入升降漏刻周旋水下二刻一周循環人身之脈計長一十六丈二尺一呼脈行三寸一吸脈行三寸一呼一吸為一息脈行六寸一日一夜漏水下百刻人一萬三千五百息脈行八百一十丈五十度周於身則一刻之中人一百三十五息脈行八丈一尺水下二刻人二百七十息脈行一十六丈二尺一周於身也脈經之行終而復始若循環之無端也當復寸口虛實見焉經脈之始從中焦注於手太陰寸口二百七十息脈行一周身復還至於寸口寸口為脈之經始故以診視虛實焉經曰虛實死生之要皆見於寸口之中變化相乘陰陽相干風則浮虛寒則牢堅沉潛水蓄支飲急弦動則為痛數則熱煩風傷陽故脈浮虛寒傷陰故脈牢堅蓄積於內者謂之水蓄故脈沉潛支散於外者謂之支飲故脈急弦動則陰陽相搏相搏則痛生焉數為陽邪氣勝陽勝則熱煩焉設有不應知變所緣三部不同病各異端脈與病不相應者必緣傳變之所致三部以候五臟之氣隨部察其虛實焉太過可怪不及亦然邪不空見中必有奸審察表裡三焦別焉知其所舍消息診看料度腑臟獨見若神為子條記傳與賢人太過不及之脈皆有邪氣干於正氣審看在表在裡入腑入臟隨其所含而治之師曰呼吸者脈之頭也難經曰一呼脈行三寸一吸脈行三寸以脈隨呼吸而行故言脈之頭也初持脈來疾去遲此出疾入遲名曰內虛外實也初持脈來遲去疾此出遲入疾名曰內實外虛也外為陽內為陰內經曰來者為陽去者為陰是出以候外入以候內疾為有餘有餘則實遲為不足不足則虛來疾去遲者陽有餘而陰不足故曰內虛外實來遲去疾者陽不足而陰有餘故曰內實外虛問曰上工望而知之中工問而知之下工脈而知之願聞其說師曰病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其瘥也何以知之表有病者脈當浮大今脈反沉遲故知愈也望以觀其形證問以知其所苦脈以別其表裡病苦發熱身疼邪在表也當臥不安而脈浮數今病人自臥而脈沉遲者表邪緩也是有里脈而無表證則知表邪當愈也假令病人云腹內卒痛病人自坐師到診其脈之浮而大者知其瘥也何以知之若里有病者脈當沉而細今脈浮大故知愈也腹痛者裡寒也痛甚則不能起而脈沉細今病人自坐而脈浮大者裡寒散也是有表脈而無里證也則知里邪當愈是望證問病切脈三者相參而得之可為十全之醫針經曰知一為上知二為神知三神且明矣師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈發熱煩極則不能靜臥今向壁靜臥知熱已去設令向壁臥聞師到不驚起而盼視若三言三止脈之咽唾者此詐病也設令脈自和處言此病大重當須服吐下藥針灸數十百處乃愈詐病者非善人以言恐之使其畏懼則愈醫者意也此之謂歟師持脈病人缺者無病也針經曰陽引而上陰引而下陰陽相引故缺陰陽不相引則病陰陽相引則和是缺者無病也脈之呻者病也呻為呻吟之聲身有所苦則然也言遲者風也風客於中則經絡急舌強難運用也搖頭言者里痛也里有病欲言則頭為之戰搖行遲者表強也表強者由筋絡引急而行步不利也坐而伏者短氣也短氣者里不和也故坐而喜伏坐而下一腳者腰痛也內經曰腰者身之大關節也腰痛為大關節不利故坐不能正下一腳以緩腰中之痛也裡實護腹如懷卵物者心痛也心痛則不能伸仰護腹以按其痛師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利冬時感寒伏藏於經中不即發者謂之伏氣至春分之時伏寒欲發故云今月之內欲有伏氣假令伏氣已發當須脈之審在何經得脈微弱者知邪在少陰少陰之脈循喉嚨寒氣客之必發咽痛腎司開闔少陰治在下焦寒邪內甚則開闔不治下焦不約必成下利故云雖爾咽痛復欲下利問曰人病恐怖者其脈何狀師曰脈形如循絲纍纍然其面白脫色也內經曰血氣者人之神恐怖者血氣不足而神氣弱也脈形似循絲纍纍然面白脫色者針經曰血奪者色夭然不澤其脈空虛是知恐怖為血氣不足問曰人不飲其脈何類師曰脈自澀唇口乾燥也澀為陰雖主亡津液而唇口乾燥以陰為主內故不飲也問曰人愧者其脈何類師曰脈浮而面色乍白赤愧者羞也愧則神氣怯弱故脈浮而面色變改不常也問曰經說脈有三菽六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也菽豆也難經曰如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也各隨所主之分以候臟氣假令下利寸口關上尺中悉不見脈尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治脈經曰冷氣在胃中故令脈不通下利不見脈則冷氣客於脾胃今尺中時一小見為脾虛腎氣所乘脈再舉頭者脾為腎所乘也若尺中之脈更或減損為腎氣亦衰脾復勝之鬼賊相刑故云難治是脾勝不應時也問曰脈有相乘有縱有橫有逆有順何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也金勝木水勝火縱者言縱任其氣乘其所勝橫者言其氣橫逆反乘所不勝也縱橫與恣縱恣橫之義通水為金子火為木子子行乘母其氣逆也母行乘子其氣順也問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名曰殘賊能為諸脈作病也為人病者名曰八邪風寒暑濕傷於外也飢飽勞逸傷於內也經脈者營衛也營衛者陰陽也其為諸經脈作病者必由風寒暑濕傷於營衛客於陰陽之中風則脈弦寒則脈緊中暑則脈滑中濕則脈澀傷於陰則脈沉傷於陽則脈浮所以謂之殘賊者傷良曰殘害良曰賊以能傷害正氣也問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳醫以脈證與藥相對而反變異為其災可怪故名災怪問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱者愈也難經曰春脈弦者肝東方木也萬物始生未有枝葉故脈來濡弱而長故曰弦是肝之平脈肝病得此脈者為肝氣已和也假令得純弦脈者死何以知之以其脈如弦直是肝臟傷故知死也純弦者為如弦直而不軟是中無胃氣為真臟之脈內經曰死肝脈來急益徑如新張弓弦南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也心旺於夏夏則陽外勝氣血淖溢故其脈來洪大而長也假令脈來微去大故名反病在裡也脈來頭小本大者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死心脈來盛去衰為平來微去大是反本脈內經曰大則邪至小則平微為正氣大為邪氣來以候表來微則知表和去以候里去大則知里病內經曰心脈來不盛去反盛此為不及病在中頭小本大者即前小後大也小為正氣大為邪氣則邪氣先在裡今復還於表故名曰覆不云去而止云來者是知在表脈經曰在上為表在下為里汗者心之液上微為浮之而微頭小為前小則表中氣虛故主汗出下微沉之而微本大為後大沉則在裡大則病進內經曰心為牡臟小腸為之使今邪甚下行格閉小腸使正氣不通故不得尿名曰關格脈經曰陽氣上出汗見於頭今關格正氣不通加之頭有汗者則陽氣不得下通而上脫也其無汗者雖作關格然陽氣未衰而猶可治西方肺脈其形何似師曰肺者金也名太陰其脈毛浮是肺脈也肺病自得此脈若得緩遲者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰腫為難治也輕虛浮曰毛肺之平脈也緩遲者脾之脈脾為肺之母以子母相生故云皆愈數者心之脈火剋金為鬼賊相刑故劇肺主皮毛數則為熱熱客皮膚留而不去則為癰瘍經曰數脈不時則生惡瘡問曰二月得毛浮脈何以處言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木應濡弱反得毛浮者是肺脈也肺屬金金來剋木故知至秋死他皆仿此當春時反見秋脈為金氣乘木肺來克肝奪旺脈而見至秋肺旺肝脈則絶故知至秋死也師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之肥人肌膚厚故脈當沉瘦人肌膚薄故脈當浮今肥人脈反浮瘦人脈反沉必有邪氣相干使脈反常故當責之師曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命死生之期期以月節克之也脈經曰陽生於寸動於尺陰生於尺動於寸寸脈下不至關者為陽絶不能下應於尺也尺脈上不至關者為陰絶不能上應於寸也內經曰陰陽離缺精氣乃絶此陰陽偏故皆決死期以月節克之者謂如陽絶死於春夏陰絶死於秋冬師曰脈病人不病名曰行尸以無王氣猝眩僕不識人者短命則死人病脈不病名曰內虛以無穀神雖困無苦脈者人之根本也脈病人不病為根本內絶形雖且強猝然氣脫則眩運偃仆而死不曰行尸而何人病脈不病則根本內固形雖且羸止內虛爾穀神者穀氣也穀氣既足自然安矣內經曰形氣有餘脈氣不足死脈氣有餘形氣不足生問曰翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故令脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也脈來大而盛聚而沉謂之翕奄沉正如轉珠之狀也沉為臟氣故曰純陰翕為腑氣故曰正陽滑者陰陽氣不為偏勝也關尺自平陽明脈微沉者當陽部見陰脈則陰偏勝而陽不足也陽明胃脈胃中陰多故食飲自可少陰脈微滑者當陰部見陽脈則陽偏勝而陰不足也以陽湊陰分故曰陰實股與陰少陰之部也今陽熱湊陰必熏發津液泄達於外股內汗出而陰下濕也問曰曾為人所難緊脈從何而來師曰假令亡汗若吐以肺裡寒故令脈緊也假令咳者坐飲冷水故令脈緊也假令下利以胃中虛冷故令脈緊也金匱要略曰寒令脈急經曰諸緊為寒寸口衛氣盛名曰高高者暴狂而肥內經曰陰不勝其陽則脈流薄疾並乃狂衛為陽氣衛盛而暴狂者陰不勝陽也針經曰衛氣者所以溫分肉充皮毛肥腠理司開闔者也衛氣盛為肥者氣盛於外也營氣盛名曰章章者暴澤而光營者血也榮華於身者也營盛故身暴光澤也高章相搏名曰綱綱者身筋急脈直營衛俱盛則筋絡滿急衛氣弱名曰惵惵者心中氣動迫怯衛出上焦弱則上虛而心中氣動迫怯也營氣弱名曰卑卑者心中常自羞愧針經曰血者神氣也血弱則神弱故常自羞愧惵卑相搏名曰損損者五臟六腑之虛惙也衛以護陽營以養陰營衛俱虛則五臟六腑失於滋養致俱乏氣虛惙也衛氣和名曰緩緩者四肢不能自收衛氣獨和不與營氣相諧則營病內經曰肝受血而能視足受血而能步掌受血而能握指受血而能攝四肢不收由營血病不能灌養故也營氣和名曰遲遲者身體重但欲眠也營氣獨和不與衛氣相諧則衛病身體重而眠欲眠者衛病而氣不敷布也遲緩相搏名曰沉沉者腰中直腹內急痛但欲臥不欲行營氣獨和於內衛氣獨和於外營衛不相和諧相搏而為病腰中直者衛不利於外也腹內痛者營不和於內也但欲臥不欲行者營衛不營也寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱營衛俱行剛柔相搏名曰強也緩為胃脈胃合衛氣衛溫分肉充皮毛肥腠理司開闔衛和氣舒則顏色光潤聲清毛澤矣遲為脾脈脾合營氣營養骨髓實肌肉濡筋絡利關節營和血滿則骨正髓生肌肉緊硬矣陰陽調和二氣相抱而不相戾營衛流通剛柔相得是為強壯趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也趺陽之脈以候脾胃滑則穀氣實是為胃實緊則陰氣勝是為脾強以脾胃一實一強而相搏擊故令痛也一強一弱相搏則不能作痛此脾胃兩各強實相擊臟腑自傷而痛也譬若以手把刃而成瘡豈非自貽其害乎寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆經曰浮為虛內經曰大則病進浮則為正氣虛大則為邪氣實在尺則邪氣關閉下焦裡氣不得下通故不得小便在寸則邪氣格拒上焦使食不得入故吐逆趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格伏則胃氣伏而不宣中焦關格正氣壅塞故吐逆而水穀不化澀則脾氣澀而不布邪氣拒於上焦故食不得入脈浮而大浮為風虛大為氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩痂癩者眉少發稀身有干瘡而腥臭內經曰脈風成為癘寸口脈弱而遲弱者衛氣微遲者營中寒營為血血寒則發熱衛為氣氣微則心內飢飢而虛滿不能食也衛為陽營為陰弱者衛氣微陽氣不足也遲者營中寒經中客邪也營客寒邪搏而發熱也陽氣內微心內雖飢飢而虛滿不能食也趺陽脈大而緊者當即下利為難治大為虛緊為寒胃中虛寒當即下利下利脈當微小反緊者邪勝也故云難治經曰下利脈大者為未止寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也弱者陽氣不足陽能消穀陽氣不足則不能消化穀食緩者胃氣有餘則胃中有未消穀物也故使噫而吞酸食猝不下氣填於膈上也金匱要略曰中焦未和不能消穀故令噫趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉則氣動膈氣乃下少陰脈不出其陰腫大而虛也浮為胃氣虛緊為脾中寒胃虛則滿脾寒則痛虛寒相搏腸鳴而轉轉則膈中之氣因而下泄也若少陰脈不出則虛寒之氣至於下焦結於少陰而聚於陰器不得發泄使陰腫大而虛也寸口脈微而澀微者衛氣不行澀者營氣不逮榮衛不能相將三焦無所仰身體痹不仁營氣不足則煩疼口難言衛氣虛則惡寒數缺三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲人養三焦者血也護三焦者氣也營衛俱損不能相將而行三焦無所依仰身體為之頑痹而不仁內經曰營氣虛則不仁針經曰衛氣不行則為不仁營為血血不足則煩疼營屬心營弱心虛則口難言衛為陽陽微則惡寒衛為氣氣虛則數缺三焦因營衛不足無所依仰其氣不能歸其部金匱要略曰上焦竭善噫上焦受中焦氣中焦未和不能消穀故令噫耳下焦竭即遺溺失便以上焦在膈上物未化之分也不歸者不至也上焦之氣不至其部則物未能傳化故噫而酢吞中焦在胃之中主腐熟水穀水穀化則思食中焦之食不歸其部則水穀不化故云不能消穀引食下焦在膀胱上口主分別清濁溲小便也下焦不歸其部不能約制溲便故遺溲趺陽脈沉而數沉為實數消穀緊者病難治沉為實者沉主裡也數消穀者數為熱也緊為肝脈見於脾部木來剋土為鬼賊相刑故云難治寸口脈微而澀微者衛氣衰澀者營氣不足衛氣衰面色黃營氣不足面色青營為根衛為葉營衛俱微則根葉枯槁而寒栗咳逆唾腥吐涎沫也衛為氣面色黃者衛氣衰也營為血面色青者營血衰也營行脈中為根衛行脈外為葉營為陰衛為陽營為根衛為葉根葉俱微則陰陽之氣內衰致生寒栗而咳逆唾腥吐涎沫也趺陽脈浮而芤浮者衛氣衰芤者營氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶經曰衛氣盛名曰高高者暴狂而肥營氣盛名曰章章者暴澤而光其身體瘦而不肥者衛氣衰也肌肉甲錯而不澤者營氣傷也宗氣者三焦歸氣也四屬者皮肉脂髓也營衛衰傷則宗氣亦微四屬失所滋養致斷絶矣寸口脈微而緩微者衛氣疏疏則其膚空緩者胃氣實實則谷消而水化也谷入於胃脈道乃行水入於經其血乃成營盛則其膚必疏三焦絶經名曰血崩衛為陽微為亡陽脈微者衛氣疏衛溫分肉肥腠理衛氣既疏皮膚不得溫肥則空虛也經曰緩者胃氣有餘有餘為實故云緩者胃氣實內經曰食入於胃淫精於脈是谷入於胃脈道乃行也針經曰飲而液滲於絡合和於血是水入於經其血乃成也胃中谷消水化而為血氣令衛疏營盛是營氣強而衛氣弱也衛氣弱者外則不能固密皮膚而氣為之疏內則不能衛護其血而血為之崩經常也三焦者氣之道路也衛氣疏則氣不循常度三焦絶其常度也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣中氣虛且寒氣自短矣少陰脈弱而澀弱者微煩澀者厥逆煩者熱也少陰脈弱者陰虛也陰虛則發熱以陰部見陽脈非大虛也故生微煩厥逆者四肢冷也經曰陰陽不相順接便為厥厥者手足厥冷是也少陰脈澀者陰氣澀不能與陽相順相接故厥逆也趺陽脈不出脾不上下身冷膚硬脾胃為營衛之根脾能上下則水穀磨消營衛之氣得以行脾氣虛衰不能上下則營衛之氣不得通營於外故趺陽脈不出身冷者衛氣不溫也膚硬者營血不濡也少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕尸厥者為其從厥而生形無所知其狀若尸故名尸厥少陰脈不出則厥氣客於腎而腎氣微少精血厥氣上奔填塞胸膈壅遏正氣使宗氣反聚而血結心下針經曰五穀入於胃其糟粕津液宗氣分為三隊宗氣積於胸中出於喉嚨以貫心肺而行呼吸又曰營氣者泌其津液注之於脈化而為血以營四末今厥氣太甚宗氣反聚而不行則絶其呼吸血結心下而不流則四肢不仁陽氣為厥氣所擁不能宣發退下至陰股間與陰相動仁者柔也不仁者言不柔和也為寒熱痛癢俱不覺知者也陽氣外不為使內不得通營衛俱不能行身體不仁狀若尸也內經曰厥氣上行脈滿去形刺期門者以通心下結血刺巨闕者以行胸中宗氣血氣流通厥氣退則蘇復矣寸口脈微尺脈緊其人虛損多汗知陰常在絶不見陽也寸微為亡陽尺緊為陰勝陽微陰勝故云虛損又加之多汗則愈損陽氣是陰常在而絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也衛陽也微為衛氣微故云亡陽營血也濡為營氣弱故云亡血弱為陰虛虛則發熱緊為陰勝故為寒諸乘寒者則陰陽俱虛而為寒邪乘之也寒氣乘虛抑伏陽氣不得宣發遂成厥也鬱冒為昏冒不知人也不仁為強直而無覺也為尸厥焉以胃無穀氣致脾澀不通於上下故使口急不能言戰者寒在表也栗者寒在裡也問曰濡弱何以反適十一頭師曰五臟六腑相乘故令十一濡弱者氣血也往反有十一頭者五臟六腑共十一也問曰何以知乘腑何以知乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也腑陽也陽脈見者為乘腑也臟陰也陰脈見者為乘臟也夫人迎左手關前一分是也肝膽之位脈緊盛傷於寒在結喉旁一寸半動脈應手是穴夫氣口右手關前一分是也脾胃之位脈緊盛傷於食黃帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五氣氣口太陰也兼屬脾是以五臟六腑之氣味皆出於胃變見於氣口夫太溪在足內踝骨上動脈陷中傷寒何以須診太溪脈耶太溪穴是少陰腎之經男子以右腎為命門女子以左腎為命門主生死之要病人有命脈即活無即死仲景云少陰病手足逆冷發熱者不死脈不至者灸太溪壯故傷寒必診太溪以察其腎之盛衰也八難曰寸口脈平而死者何謂也說謂十二經脈皆繫於生氣也故腎為五臟六腑之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於內也十四難曰上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害也所以然者人之有尺如樹之有根枝葉將枯槁根本當自生脈有根本人有元氣故知不死夫衝陽一名會源在足跗上五寸骨間動脈上去陷谷三寸傷寒何以須診衝陽脈耶答曰衝陽穴是足陽明胃之經人受氣於谷谷入於胃乃傳與五臟六腑皆受氣於胃其清者為營營血也濁者為衛衛氣也營行脈中衛行脈外陰陽相貫循環無端胃為水穀之海土稟四時皆以胃氣為本是胃四時之變病死生之要會故傷寒必診衝陽以察其胃氣之有無也夫結促代脈脈有結有促有代結者陰也陰盛則結脈來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所成大抵結促之脈雖時一止為病脈非死脈也唯代脈真死矣往來緩動而中止不能自還者因而復動者名曰代也代者死也仲景傷寒脈結代心動悸炙甘草湯夫又據脈論云傷寒治法據脈為要問證次之證如此脈亦如此條例徑行若證熱而脈遲證寒而脈數切不可惑於倉卒須是略去外證專以脈為主領會斟酌而調理之庶無差誤雖然偏陽之脈又何耶曰人稟陰陽二氣陰根於陽陽根於陰往來流通而無間斷者也一或偏勝而病生焉蓋偏陽則多熱偏陰則多寒偏陰則六脈虛濡按之無力頗有細澀之狀病生沉寒法當溫散人所易知若夫病軀內外有熱其脈不數不洪但指下急澀而小緊如枝條刮刮之狀此則為陽勝陰當用寒涼之劑以解陽熱愆狀之邪以行血熱凝結之毒不可錯認以為脈小脾虛誤以溫藥益其疾也縱或嘔逆亦是熱邪乘虛熱氣閉隔斷不可以溫脾之劑投之否則墮厝火積薪之轍矣凡病皆當審斯夫外有脈內無脈為外實內虛外無脈內有脈為內實外虛虛實之義隨其脈之有無者言之人所共知也若夫傷寒書所謂陰陽虛盛則精微之義不無辨析於其間四十八難曰病之虛實出者為虛入者為實蓋外有脈者表之真陽氣虛故陰邪以盛出而乘陽是以脈浮於外之時不可自惑以為陽脈盛也內有脈者里之真陰氣虛故陽邪以盛入而乘陰是以脈實於內其病在裡法當下之當其陽熱入里脈實於內之時不可自惑以為陰脈盛也是說非古人之立意也蓋使人知如此之為陰盛則抑陰而助陽如彼之為陽盛則抑陽而助陰陰盛而邪入於外者發表之藥當性溫以助陽如桂枝湯之類是也陽盛而邪出於內者攻裡之藥當性寒以抑陽如承氣湯之類是也或曰陰出而乘於外是陽之不足也發汗則亡陽而汗之何哉是大不然陰邪搏於外不汗之則邪何由去桂枝之性溫溫之乃所以助陽陽有所助而長則陰邪之所由以消甘辛發散為陽者此也張氏所謂承氣入胃陰盛以亡者正恐陰盛出外而誤以承氣下之外得寒以助邪內攻虛而損正安得而不亡或者又曰陽入而乘於內是陰之不足也陰受病則當有以溫養而下之何哉是又不然陽邪入於內不下之則邪何從出承氣之性寒寒之乃所以抑陽陽有所抑而微則真陰之所由以長酸苦湧泄為陰者此也張氏所謂桂枝下咽陽盛即斃者正恐陽盛入內而誤以桂枝汗之內得熱以助邪外撤虛而損正又安得而不斃觀古人發表之藥多溫攻裡之藥多寒則知陰陽虛盛之意微非止為汗下設正所以為用藥寒溫設也可不明辨哉傷寒治法內則審脈外則審證大要辨表裡虛實為先病在表有表虛有表實病在裡有裡實有裡虛又有表裡俱虛表裡俱實毫釐之分貴於早辨表虛者脈浮而緩自汗惡風用桂枝湯以解肌表實者脈浮而緊無汗惡寒用麻黃湯以發汗裡實者脈伏而牢心腹痛結或大便堅小承氣湯大柴胡湯以下之裡虛者脈沉而弱自利膈冷理中湯四逆湯以溫之至若表裡俱虛則舉按脈虛如急救表裡之類下利身疼先與四逆湯清便自調後與桂枝湯是也表裡俱實則舉按脈實如表裡俱見之類脈浮尿赤與五苓散誤下腹痛桂枝大黃湯是也大抵出入傳變各有處所淺深輕重時刻異同精對無瘥立當見效矣夫太陽屬膀胱非發汗不能愈必用桂枝麻黃以助陽卻邪陽明屬胃非通泄不能痊必用大黃芒硝以疏利陽熱少陽屬膽無出入道柴胡半夏能利能汗消解血熱黃芩佐之太陰脾土性惡寒濕非乾薑白朮不能溫燥少陰腎水性惡寒燥非附子不能以溫厥陰肝木藏血榮筋非芍藥甘草不能滋養此用藥經常之道也然三陽汗下和解人皆知之至若太陰溫燥不行則亦當溫利如桂枝加大黃之類是太陰自陽明而出也少陰雖用附子亦有麻黃細辛之證是少陰自太陽而出也厥陰類例其間有用桂枝者是厥陰自少陽而出也其或太陽少陽二經鬱閉則三陰皆自陽明出焉故三陰皆有下證如太陰腹滿時痛為有積少陰咽乾口燥為腎汁干厥陰煩滿耳聾舌卷囊縮為毒氣入臟皆當下之知乎此則傷寒用藥之法隨變隨應而不窮矣雖然傷寒七日傳遍六經此約法也或首尾只在一經或間傳一二經而止又不可拘但據脈與外證驗之是為活法發熱憎寒體痛時脈浮解表定無疑不憎寒卻頻憎熱多汗咽乾里下之夫三陽外證腰脊頭疼熱惡寒目疼汗熱鼻中干耳聾口苦時乾嘔胸脅肋疼寒熱干太陽證腰脊強頭項痛發熱惡寒若傷風則鼻塞惡風陽明證目疼身熱鼻乾不惡寒反惡熱自汗自出不得臥內實大便難少陰證耳聾胸脅痛或口苦咽乾目眩或往來寒熱而嘔陽病體輕脈輕外證壯熱煩渴大小便祕頭面有汗昏憒氣粗揚手擲足夫三陰外證腸滿肢溫利不煩舌乾燥渴或憎寒唇青舌卷多煩滿筋急囊間縮又攣太陰證腹滿或痛手足溫自利不渴喉下干少陰證口燥舌乾而渴或口中和皆惡寒常默默欲寐不欲見光明有時腹痛又有咽痛二證厥陰證唇青舌卷煩滿筋急囊縮或消渴飢不欲食食即吐蛔陰病體重脈重外證厥冷唇青腹滿不渴大小便自利惺惺而靜引衣自蓋足攣而臥三陰病無身熱無頭痛其或渴者陰極發躁也陰證唇青舌黑或白苔或卷強者用生薑頻擦唇口續又易之姜能回陽生胃解毒溫血散氣擦之後陰消陽長黑轉而紅最為良法夫汗下溫正法太陽傷風自汗惡風桂枝湯傷寒無汗惡寒麻黃湯風寒俱盛則以桂枝麻黃湯兼用自汗小便數者勿用桂枝可乾薑甘草湯芍藥甘草湯桂枝湯麻黃湯夏月用之須加黃芩陽明不惡寒反惡熱自汗大便難用小承氣大柴胡汗多者胃汁干急下大承氣無汗惡寒升麻湯有汗脈遲微惡寒為表未解桂枝湯無汗脈浮發喘麻黃湯少陽並屬小柴胡湯輩冬月用之須加官桂太陰自利不渴為臟寒理中湯四逆湯陰證手足必微厥若手足溫便是太陰胸膈脹滿理中湯腹滿脈浮桂枝湯腹滿時痛桂枝加芍藥湯痛甚桂枝加大黃湯少陰脈沉口不幹舌不燥及背惡寒者並用四逆湯小便白者亦用四逆始得病脈沉反發熱麻黃細辛附子湯口燥咽乾而渴急下之用大承氣湯厥陰脈微浮為欲愈不浮未愈小建中湯脈浮緩如瘧狀者囊不縮者亦欲愈桂枝麻黃各半湯脈沉短者囊必縮為毒氣入臟可用承氣湯下之利不止用四逆湯三陰中寒微則理中湯稍厥或中寒下利則乾薑甘草湯大段重者用四逆湯無脈者用通脈四逆湯六經惟少陰難治大要以口燥而渴別其熱脈沉而遲別其寒然亦有表裡無熱但煩憒默默不欲見光明其脈沉細或時腹痛此可四順湯增加乾薑對之增損理中丸亦可矣凡陰證白通湯四逆湯通脈湯條例未敢遽用者且以理中湯甘草乾薑湯代之雖然陰寒亦有毒乃病氣也滯須行之養正丹金液丹半硫丸皆可疏利又為要藥夫三部之位左右手去魚際一寸名曰寸口去尺澤一尺名曰尺部兩境之間名曰關位六分陽部出三分陰部入三分關前為陽關後為陰為陰陽之關津寸脈下不至關為陽絶尺脈上不至關為陰絶陽得寸內九分取陽奇之數陰得尺一寸取陰偶之數是名寸關尺也寸上一分為魚際關下一分為神門左關為人迎右關為氣口三陽從地長故男子尺脈常沉三陰從天生故女子尺脈常浮男子陽多而陰少其脈在關上故寸盛尺弱女子陰盛而陽微其脈在關下故寸沉而尺盛所以男子不可久瀉女子不可久吐男得女脈為不足女得男脈為太過所謂反也今人以男子尺脈常弱女子尺脈常盛謂之反非也男子陽有餘脈在上尺脈必弱女子陰有餘脈在下寸脈必微乃是正也非反也又以男子以右尺為命門女子以左尺為命門謂之反亦非也男子得陰以生先生右腎女子得陽以長先生左腎乃是正也非反也所謂反者只是男子尺脈當弱今反盛女子尺脈應盛今反弱謂之反耳聖人以察陰陽以決生死雖經絡流注如環無端豈能逃於三部者哉夫診候之法凡初下指先以中指揣按得關位乃齊下前後二指為三部脈前指寸口也後指尺部若人臂長乃疏下指若臂短乃密下指先診寸口男先左手女先右手浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指內消息之醫家責肥人脈浮為肌肉厚實重取乃得若舉手而得則其浮也甚矣責瘦人脈沉為皮脈相附而易見若按之始應則其沉也亦甚矣凡診脈以氣息平定方下指一呼一吸為一息其一息之間脈息四至或五至不大不小與所屬部分四時相應者為平和脈也過則為至不及則為損損至之脈難經言之詳矣所屬部分謂心位洪肺位浮腎位沉肝位弦脾位緩也四時謂春脈弦夏脈洪四季脈緩秋脈浮冬脈沉也假令心脈本位雖當見洪得冬脈須微帶沉乃四時相應余仿此夫脈息之證蓋脈以肉為陽脈以血為陰華他云脈者氣血之先也氣血盛則脈盛氣血衰則脈衰氣血熱則脈數氣血寒則脈遲氣血微則脈弱氣血平則脈緩又長人脈長短人脈短性急脈急性緩脈緩反此者逆按內經云形盛脈細氣少不足以息者危形瘦脈大胸中氣多者死形氣相得者生參伍不調者病難經云數者腑也遲者臟也數則為熱遲者為寒諸陽為熱諸陰為寒王叔和云脈沉為在裡脈浮為在表遲則在臟數則在腑滑為實為下數為虛為熱張仲景云脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也陰病見陽脈者生陽病見陰脈者死大抵陽脈常浮而速陰脈常沉而遲七表屬腑病在於陽春夏見之易治八里屬臟病在於陰秋冬見之猶輕假令數在左寸浮之得者熱入小腸沉之得者熱入於心余皆仿此脈理精微非言可盡論其梗概不出於此矣王叔和云在心易了指下難明亦在乎人熟之而已矣夫七表浮芤滑實弦緊洪七表陽也陽數奇夫浮按之不足舉之有餘寸口浮其人有風發熱頭疼關上浮腹滿尺中浮小便難趺陽浮即為虛夫芤浮大而軟按之中央空兩邊實芤主失血寸口芤主吐血微芤者衄關上芤大便血尺中芤小便血夫滑往來疾卻流利替替然與數相似脈滑為陽寸口滑為陽盛關上滑為嘔逆尺中滑小便赤婦人經脈不利然而尺脈滑者亦本形也趺陽脈滑者胃中實夫實大而長按之應指愊愊然浮沉皆得寸口實主上焦熱關上見實腹脹尺中有此主小腹痛小便澀夫弦舉之無有按之弓弦狀又曰浮緊乃為弦狀如弓弦按之不移陽弦則頭痛陰弦則腹痛大抵傷寒脈必弦蓋人迎脈盛傷寒幹人迎者少陽之分少陽之分少陽脈主弦故也寒邪中人其脈必弦弦則多兼洪數為其先有邪熱也洪數甚者即為陽證若沉細而弦疾乃正陰毒也夫緊按之實數似切繩狀緊則為寒寸口緊頭痛關緊心下滿痛尺緊臍下痛陰陽俱緊當清邪中上濁邪中下也夫洪極大在指下舉按滿指寸口洪主胸膈煩熱關上洪主胃熱口乾尺中洪主大小便有血三部洪三焦俱熱夫八里微沉緩澀遲伏濡弱八里陰也陰數偶夫微若有若無極細而軟微則為虛寸口微為陽不足陽微則惡寒陰微則下利夫沉舉之不足按之有餘沉為在裡尺寸俱沉者少陰受病也然沉而遲者乃陰證也宜溫之沉而數者有熱也宜下之夫緩去來亦遲小快於遲緩則為虛太陽病其脈緩者為傷風惟脾得之即是本脈夫澀細而遲往來難時一止澀則為少血寸口澀少氣上焦冷關上澀胃冷脾痛尺澀小便數小腹冷三部俱澀腹中氣結王冰曰陽有餘陽氣有餘則血少故脈澀也又曰澀者陰血不足陽氣有餘陽氣有餘為身熱無汗夫遲呼吸三至去來極遲遲則為寒寸口遲則上焦冷關上遲胃冷不欲食吞酸吐冷水尺中遲小便多並白濁夫伏極重按之指著骨乃得伏主物聚寸口伏胸中逆氣關上伏有水氣溏泄尺中伏水穀不化大抵關前得之多為熱關後得之多為冷關中得之陰陽結或冷或熱不定當以餘證參之夫濡按之似無舉之全無力形與緩澀遲脈雖稍殊其為冷證皆一也夫弱極軟而沉細按之欲絶指下弱為虛寸口弱陽氣虛汗自出關弱無胃氣胃中有熱脈弱為虛熱病作不可大攻熱去寒起尺中弱氣少發熱夫脈按之來緩時一止復來又脈來動而中止不能自還因而復動夫有結脈有促脈有代脈結者陰也陰盛則結脈來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所成太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微寒者桂枝去芍藥加附子湯主之太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之大抵結促之脈雖時一止為病脈非死脈也唯代脈者真死矣往來緩動而中止不能自還因而復動名曰代也代者死也仲景傷寒脈結代心動悸炙甘草湯主之夫脈浮而緊澀頭疼身體拘急惡寒無汗寒多熱少面色慘而不舒腰脊疼痛手足指末微厥不煩躁蓋傷寒之候發熱惡寒頭疼腰脊痛脈緊無汗宜發汗而解麻黃湯主之經曰只與桂枝麻黃各半湯雜方中人參順氣散蔥豉湯蒼朮散麻黃葛根湯可選而用之然太陽病亦有熱多寒少者須仔細看脈與證也熱多寒少不嘔清便自可宜桂枝麻黃各半湯若脈浮者雖熱多寒少自可發汗若脈弱者無陽也桂枝二越婢一湯主之熱多寒少而尺脈遲者營氣不足血少故也先以小建中湯加黃耆最良只脈尚遲再作一劑或太陽證宜汗而其人適失血及下利則頻頻與少桂枝湯使體潤漐漐連日當自解假如淋家衄血家法不可汗亦可以小柴胡之類和解之夫脈浮而緩寸大而尺弱自汗體熱頭疼惡風熱多寒少其面光而不慘煩躁手足不冷蓋傷風之候頭疼發熱脈緩汗出惡風當須解肌宜桂枝湯主之輕者只與柴胡桂枝湯雜方中敗毒散獨活散可選用治太陽中風有汗用桂枝湯凡脈緊必無汗唯濡而緊卻自汗勿誤用桂枝當用小建中湯也須是脈浮而緩者方可用桂枝也項背強者桂枝湯加葛根也本草葛根主傷風有濕開竅解肌蓋桂枝加葛根者謂中風有濕當加之去其風濕取微汗者去風濕也裡寒者桂枝去芍藥加附子湯也不飲水者是也凡發汗後汗不止為漏風桂枝加附子湯主之腹滿者太陰證脈浮者可服桂枝湯微發汗腹痛者桂枝加芍藥湯痛甚者桂枝加大黃湯也雖然桂枝湯自西北二方居人四時行之無不應驗自江淮間唯冬及春初可行自春末及夏至以前桂枝證可加黃芩半兩夏至後有桂枝證可加知母一兩石膏二兩或加升麻半兩若病人素虛寒者正用古方不在加減也岐伯所謂同病異治者此也又問傷寒與傷風何以別之傷寒者脈緊而澀傷風者脈浮而緩傷寒者無汗脈澀故也傷風者有汗傷寒者畏寒不畏風傷風者畏風不畏寒大抵太陽病者必脈浮發熱惡風惡寒也惡寒者不當風而自憎惡風者當風而憎寒也六經皆有傷寒傷風其證各異太陽脈浮有汗為中風脈緊無汗為傷寒陽明善飢為中風不食為傷寒少陽兩耳聾目赤胸滿而煩為中風口苦咽乾目眩為傷寒若三陰傷風無變異形證但四肢煩疼餘證同三陽有發熱惡寒煩躁手足溫而脈反浮緊者有寒多熱少不煩躁手足微冷而脈反浮緩者蓋發熱惡風煩躁手足溫為中風候脈浮緊為傷寒脈是中風見寒脈也寒多熱少不煩躁手足微厥為傷寒候脈浮緩為中風脈是傷寒見風脈也中風見寒脈傷寒見風脈宜服大青龍湯蓋大青龍證脈似桂枝反無汗病似麻黃反煩躁是也脈弱有汗為桂枝證脈緊不煩躁為麻黃證大青龍湯治病與麻黃湯證相似但病尤重而又加煩躁者用大青龍湯也以其中風並傷寒俱盛故青龍添麻黃作六兩又似合桂枝湯藥味在內添石膏所以為緊此治營衛俱病若證不審誤用大青龍湯則發汗多傷人以其有煩躁一證故須用大青龍大抵感外風者為傷風感寒冷者為傷寒故風則傷衛寒則傷營桂枝主傷衛麻黃主傷營大青龍主營衛俱傷故也風傷衛者病在皮膚之間也以衛行脈外為陽主外皮膚之間衛氣之道路故也其病淺寒傷營者寒氣中於肌肉也以營行脈中為陰主內肌肉之間營氣之道路故也其病深所以桂枝麻黃所施各異戒勿誤用以有淺深之別風寒之殊醫當宜審諦大青龍尤宜慎用仲景云脈微弱汗出惡風者不可服青龍湯服之則厥逆筋傷肉瞤此為逆也類纂云凡發汗過多筋傷肉瞤振搖動人或虛羸之人微汗出便有此證俱宜服真武湯以救之羸甚者芍藥或量多少與之惡熱藥者去附子余依加減法仲景制真武湯乃為合用桂枝卻用麻黃之類發汗多亡陽有此證故用真武湯若調理順者無此證也夫夏月發熱惡寒頭疼身體肢節痛重其脈洪盛者蓋冬傷於寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯無汗宜麻黃湯加煩躁者宜大青龍湯然夏月藥性須帶涼不可太溫桂枝麻黃大青龍須加減法夏至前桂枝加黃芩半兩夏至後桂枝麻黃大青龍加知母一兩石膏二兩或加升麻半兩也蓋桂枝麻黃湯性熱地暖之處非西北之比夏月服之必有發黃斑出之失熱病三日外與湯不瘥脈熱仍數邪氣猶在經絡未入臟腑者桂枝石膏湯主之此方夏至後代桂枝證用若加麻黃半兩可代麻黃青龍湯用也古方三月至夏為晚發傷寒梔子升麻湯亦可選用之又問夏至後皆可行白虎湯耶白虎湯治中暑與汗後一解表藥耳今之醫者見六月中病多雲中暑不辨熱病用藥太涼又況夏則陰氣在內最難調治白虎湯尤宜戒之夏月自汗惡寒身熱而渴其脈微弱者此名中暑也大抵中暑與熱病外證相似但熱病者脈盛中暑者脈虛以此別之甲乙經云脈盛身寒得之傷寒脈虛身熱得之傷暑蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛傷寒即身體肢節痛重其脈洪盛按之有力此是冬月感寒深至夏發耳中暑即背寒面垢其面如塗油類纂云面垢者陽證也一名面塵若塵垢之著面手足微冷煩渴口燥但覺倦怠四肢卻不痛重其脈微弱按之無力白虎湯主之痰逆惡寒者橘皮湯主之不惡寒者竹葉湯主之頭痛惡心煩躁心下不快者五苓散最妙又問中暑何故灑灑然毛聳惡寒答曰經云四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開開則灑然寒閉則熱而悶近人多不明中暑或作熱病法治之服溫熱藥必致發黃斑出更為蓄血尤宜戒之夏至以前發熱惡寒頭疼身體痛其脈浮緊此名溫病也春月傷寒謂之溫病冬傷於寒輕者夏至以前發為溫病蓋因春溫暖之氣而發也非溫疫也治溫病與冬月傷寒夏月熱病不同蓋熱輕故也春初秋末陽氣在裡其病稍輕雖不用藥治之五六日亦自瘥也升麻湯解肌湯柴胡桂枝湯最良熱多者小柴胡湯主之不渴外有微熱者小柴胡加桂枝也嗽者小柴胡加五味子也或煩渴發熱不惡寒與虛煩者並竹葉石膏湯次第服之麻黃桂枝大青龍唯西北二方四時行之無有不驗若江淮間地偏暖處唯冬月及正初乃可用正方自春末至夏至以前桂枝麻黃大青龍內宜加減也病人先熱後寒尺寸脈俱盛此名溫瘧也先熱後寒名曰溫瘧病人尺寸俱盛重感於寒變成溫瘧小柴胡湯主之瘧疾寒熱相等及先熱後寒者俱宜與小柴胡湯主之先寒後熱者小柴胡加桂枝湯有多熱者白虎加桂湯有多寒者但寒者柴胡桂薑湯有汗多煩渴小便澀赤素有瘴氣及不伏水土嘔吐甚者可服五苓散脈小緊寒熱嘔吐間日頻日發作無時大便祕者可服大柴胡湯下之脈浮大寒熱往來者可服祛邪丸吐之久不愈者服瘧母煎丸當自愈治瘧之法無以過也大抵瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之瘥弦遲者可溫之弦緊者可發汗浮大者可吐之夏傷於暑秋必病瘧此非傷寒之謂以其觀傷寒有溫瘧一證故因而及之脈尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠此名風溫也其人素傷於風因復傷於熱風熱相搏即發風溫主四肢不收頭疼身熱常在汗出不解治在少陰厥陰不可發汗即譫言獨語內煩躁擾不得臥若驚癇目亂無精療之者復發其汗如此死者醫殺之也風溫不可發汗宜葳蕤湯風溫身灼熱者知母乾葛湯風溫如渴甚者栝蔞根湯風溫脈浮身重汗出漢防己湯辨傷寒受病日數次第病證傷寒一日足太陽受病太陽者膀胱之經也為三陽之首故受病其脈絡於腰脊主於頭項故得病一日頭項腰脊痛也傷寒二日足陽明受病陽明者胃之經也主於肌肉其脈絡於鼻入於目故得病二日內熱鼻乾不得眠也諸陽在表表始受病在皮膚之間故可摩膏火灸發汗而愈也凡五臟不和六腑不通營衛不行如是之後三日乃死何也夫足陽明者胃之脈也十二經之長也其氣血盛故不通三日其氣乃盡故死爾其未滿三日者可汗而已其滿三日者可下而已也傷寒三日足少陽受病少陽者膽之經也其脈循於脅上於頸耳故得病三日胸脅熱而耳聾也三陽經絡始相傳病未入於臟可汗而解也傷寒四日足太陰受病太陰者脾之經也為三陰之首是故三日以後陽受病訖傳之於陰而太陰受病焉其脈絡於脾主於喉嗌故得病四日腹滿而嗌乾其病在胸膈故可吐而愈也傷寒五日足少陰受病少陰者腎之經也其經貫腎絡肺繫於舌故得病五日口燥舌乾渴而引水也其病在腸故可下而愈也傷寒六日足厥陰受病厥陰者肝之經也其脈循陰絡於肝故得病六日煩滿而陰縮也此則陰陽俱受病毒氣在胃可下而愈也七日太陽病衰頭痛小愈又傷寒七日病法當小愈陰陽諸經傳病終故也今七日以後病反甚者欲為再經病也再經病者經絡重受病也傷寒八日陽明病衰身熱小愈又八日不解者或是諸陰陽經絡重受於病或因發汗吐下之後毒氣未盡所以病證猶在也傷寒九日少陽病衰耳聾微聞又傷寒九日以上病不除者或初一經受病者不能相傳或已傳三陽訖而不能傳於陰致停滯纍日病證不解故日數多而病候改變也傷寒十日太陰病衰腹胃如故則思欲飲食傷寒十一日少陰病衰渴止不煩滿舌乾已也傷寒十二日厥陰病衰囊少縱腹微下毒氣皆去病日已矣傷寒例第三論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也春夏為陽春溫夏熱者陽之動始於溫盛於暑故也秋冬為陰秋涼而冬寒者以陰之動始於清盛於寒故也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳冬三月純陰用事陽乃伏藏水冰地坼寒氣嚴凝當是之時善攝生者出處固密去寒就溫則不傷於寒其涉寒冷觸冒霜雪為病者謂之傷寒也其傷於四時之氣皆能為病春風夏暑秋濕冬寒謂之四時之氣以傷寒為毒者以其最成殺厲之氣也熱為陽陽主生寒為陰陰主殺陰寒為病最為肅殺毒厲之氣中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也內經曰先夏至日為溫病後夏至日為暑病溫暑之病本傷於寒而得之故太醫均謂之傷寒也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也凡時行者春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也四時氣候不正為病謂之時行之氣時氣所行為病非暴厲之氣感受必同是以一歲之中長幼之病多相似也夫欲候知四時正氣為病及時行疫氣之法皆當按鬥歷占之四時正氣者春風夏暑秋濕冬寒是也時行者時行之氣是也溫者冬時感寒至春發者是也疫者暴厲之氣是也占前鬥建審其時候之寒溫察其邪氣之輕重而治之九月霜降節後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰雪解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼冬寒春溫夏熱秋涼為四時之正氣也從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一月十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以冬時不調適有傷寒之人即為病也此為四時正氣中而即病者也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章此為時行之氣前云冬時應寒而反大溫者是也從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病此為溫病也內經曰冬傷於寒春必病溫從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳此為疫氣也是數者以明前鬥歷之法占其隨時氣候發病寒熱輕重不同耳十五日得一氣於四時之中一時有六氣四六名為二十四氣也節氣十二中氣十二共二十四內經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也疑脫或有至而不去此一句金匱要略曰有未至而至有至而不至有至而不去有至而太過何故也師曰冬至之後甲子夜半少陽起少陰之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至以得甲子天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也內經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病即是觀之脫漏明矣但天地動靜陰陽鼓擊者各正一氣耳內經曰陰陽者天地之道清陽為天動而不息濁陰為地靜而不移天地陰陽之氣鼓擊而生春夏秋冬寒熱溫涼各正一氣也是以彼春之暖為夏之暑彼秋之忿為冬之怒春暖為夏暑從生而至長也秋忿為冬怒從肅而至殺也是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也十月六爻皆陰坤卦為用陰極陽來陽生於子冬至之後一陽爻升一陰爻降於卦為復言陽氣得復也四月六爻皆陽乾卦為用陽極陰來陰生於午夏至之後一陽氣下一陰氣上於卦為姤言陰得遇陽也內經曰冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下斯則冬夏二至陰陽合也春秋二分陰陽離也陽生於子陰生於午是陰陽相接故曰合陽退於酉陰退於卯是陰陽相背故曰離內經曰氣至之謂至氣分之謂分至則氣同分則氣異陰陽交易人變病焉天地陰陽之氣既交錯而不正人所以變病內經曰陰陽相錯而變由生也此君子春夏養陽秋冬養陰順天地之剛柔也內經曰養生者必順於時春夏養陽以涼以寒秋冬養陰以溫以熱所以然者從其根故也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之不能順四時調養觸冒寒溫者必成暴病醫者當在意審詳而治之是以春傷於風夏必飧泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之當春之時風氣大行春傷於風風氣通於肝肝以春適旺風雖入之不能即發至夏肝衰然後始動風淫末疾則當發於四肢夏以陽氣外盛風不能外發故攻內而為飧泄飧泄者下利米穀不化而色黃當秋之時濕氣大行秋傷於濕濕則下於肺肺以秋適旺濕雖入之不能即發至冬肺衰然後濕始動也雨淫腹疾則當發為下利冬以陽氣內固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷於暑夏以陰為主內暑雖入之勢未能動及秋陰出而陽為內主然後暑動博陰而為痎瘧痎者二日一發瘧者一日一發當冬之時寒氣大行冬傷於寒冬以陽為主內寒雖入之勢未能動及春陽出而陰為內主然後寒動博陽而為溫病是感冒四時正氣為病必然之道傷寒之病逐日淺深以施方治內經曰未滿三日者可汗而已其滿三日者可泄而已今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中病皆宜臨時消息制方無不效也今搜採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也仲景之書逮今千年而顯用於世者王叔和之力也又土地溫涼高下不同物性剛柔餐居亦異是以黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也東方地氣溫南方地氣熱西方地氣涼北方地氣寒西北方高東南方下是土地溫涼高下不同也東方安居食魚西方陵居華食南方濕處而嗜酸北方野處而食乳是餐居之異也東方治宜砭石西方治宜毒藥南方治宜微針北方治宜灸焫是四方醫治不同也醫之治病當審其土地所宜食居之異也凡傷於寒則為病熱熱雖甚不死內經曰風寒客於人使人毫毛畢直皮膚閉而為熱是傷寒為病熱也針經曰多熱者易已多寒者難已是熱雖甚不死若兩感於寒而病者必死表裡俱病者謂之兩感尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強太陽為三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也當一二日發風府穴名也項中央太陽之脈從巔入絡腦還出別下項是以上連風府其經循肩膊內挾脊抵腰中故病頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不能臥陽明血氣俱多尺寸俱長者邪並陽明而血氣淖溢也太陽受邪不已傳於陽明是當二三日發其脈挾鼻者陽明脈起於鼻交頞中絡於目陽明之脈正上䪼頞還出系目系身熱者陽明主身之肌肉針經曰陽明氣盛則身以前皆熱目疼鼻乾者經中客邪也不得臥者胃氣逆不得從其道也內經曰胃不和則臥不安尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾內經曰陽中之少陽通於春氣春脈弦尺寸俱弦者知少陽受邪也二三日陽明之邪不已傳於少陽是當三四日發胸脅痛而耳聾者經壅而不利也此三經皆受病未入於腑者可汗而已三陽受邪為病在表法當汗解然三陽亦有便入腑者入腑則宜下故云未人於腑者可汗而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾陽極則陰受之邪傳三陽既遍次乃傳於陰經在陽為在表在陰為在裡邪在表則見陽脈邪在裡則見陰脈陽邪傳陰邪氣內陷故太陰受病而脈尺寸俱沉細也自三陽傳於太陰是當四五日發也邪入於陰則漸成熱腹滿而嗌乾者脾經壅而成熱也尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴少陰腎水也性趨下少陰受病脈尺寸俱沉也四五日太陰之邪不已至五六日則傳於少陰也是少陰病當五六日發人傷於寒則為病熱謂始為寒而終成熱也少陰為病口燥舌乾而渴邪傳入里熱氣漸深也尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮緩者風脈也厥陰脈微緩者邪傳厥陰熱氣已劇近於風也當六七日發以少陰邪傳於厥陰煩滿而囊縮者熱氣聚於內也此三經皆受病已入於腑可下而已三陰受邪為病在裡於法當下然三陰亦有在經者在經則宜汗故云已入於腑者可下而已經曰臨病之工宜須兩審若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則營衛不行腑臟不通則死矣陰陽俱病表裡俱傷者為兩感以其陰陽兩感病則兩證俱見至於傳經則亦陰陽兩經俱傳也始得一日頭痛者太陽口乾煩滿而渴者少陰至二日則太陽傳於陽明而少陰亦傳於太陰身熱譫語者陽明腹滿不欲食者太陰至三日陽明傳於少陽而太陰又傳於厥陰耳聾者少陽囊縮而厥者厥陰水漿不入不知人者胃氣不通也內經曰五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故云不知人三日其氣乃盡故死矣謂三日六經俱病營衛之氣不得行於內外腑臟之上氣不得通於下至六日腑臟之氣俱盡營衛之氣俱絶則死矣其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾已而嚏也十二日厥陰病衰囊縱少腹微下毒氣皆去病人精神爽慧也六日傳遍三陰三陽之氣皆和大邪之氣皆去病人精神爽慧也若過十三日以上不間尺寸陷者大危間者瘳也十二日傳經盡則當瘳愈若過十三日以上不瘳尺寸之脈沉陷者即正氣內衰邪氣獨勝故云大危若更感異氣變為他病者當依舊壞證病而治之若脈陰陽俱盛重感於寒者變為溫瘧異氣者為先病未已又感別異之氣也兩邪相合變為他病脈陰陽俱盛者傷寒之脈也難經曰傷寒之脈陰陽俱盛而緊澀經曰脈盛身寒得之傷寒則為前病熱未已再感於寒寒熱相搏變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫此前熱未歇又感於風者也難經曰中風之脈陽浮而滑陰濡而弱風來乘熱故變風溫陽脈洪數陰脈實大者遇溫熱變為溫毒溫毒為病最重也此前熱未已又感溫熱者也陽主表陰主裡洪數實大皆熱也兩熱相合變為溫毒以其表裡俱熱故為病最重陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如說此前熱未已又感溫氣者也溫熱相合變為溫疫凡人有疾不時即治隱忍冀瘥以成痼疾凡覺不佳急須求治苟延時日則邪氣入深難可復治千金曰凡有少苦似不如平常即須早道若隱忍不治冀望自瘥須臾之間已成痼疾此之謂也小兒女子益以滋甚小兒氣血未全女子血室多病凡所受邪易於滋蔓時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者腠理者津液腠泄之所紋理縫會之中也金匱要略曰腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之紋理也邪客於皮膚則邪氣浮淺易為散發若以時治之罕有不愈者矣金匱玉函曰主候長存形色未病未入腠理針藥及時服將調節委以良醫病無不愈患人忍之數日乃說邪氣入臟則難可制此為家有患備慮之要邪在皮膚則外屬陽而易治邪傳入里則內屬陰而難治內經曰善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也昔桓侯怠於皮膚之微疾以至骨髓之病家有患者不可備慮凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣千金曰凡始覺不佳即須治療迄至於病湯食兢進折其毒勢自然而瘥若或瘥遲病即傳變雖欲除治必難為力傳有常也變無常也傳為循經而傳如太陽傳陽明是也變為不常之變如陽證變陰證是也邪既傳變病勢深也本草曰病勢已成可得半愈病勢已過命將難全服藥不如方法縱意違師不須治之內經曰拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣凡傷寒之病多從風寒得之凡中風與傷寒為病自古通謂之傷寒千金曰夫傷寒病者起自風寒入於腠理與精氣分爭營衛偏膈周身不通而病始表中風寒入里則不消矣始自皮膚入於經絡傳於臟腑是也未有溫覆而當不消散者風寒初客於皮膚便投湯藥溫暖發散而當者則無不消散之邪不在證治擬欲攻之猶當先解表乃可下之先解表而後下之則無復傳之邪也若表已解而內不消非大滿猶生寒熱則病不除表證雖罷里不至大堅滿者亦未可下之是邪未收斂成實下之則裡虛而邪復不除猶生熱寒也若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也外無表證里有堅滿為下證悉具外臺云表和里病下之則愈下證既具則不必拘於日數若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣下之不當病輕者證猶變易而難治又矧重者乎夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死表為陽里為陰陰虛者陽必湊之陽盛之邪乘其裡虛而入於腑者為陽盛陰虛也經曰尺脈弱名曰陰不足陽氣下陷入陰中則發熱者矣下之除其內熱而愈若反汗之則竭其津液而死陰脈不足陽往從之陽脈不足陰往乘之陰邪乘其表虛客於營衛之中者為陽虛陰盛也經曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒者是矣汗之散其表寒則愈若反下之則脫其正氣而死經曰本發汗而復下之此為逆也本先下之而反汗之為逆夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉神丹者發汗之藥也甘遂者下藥也若汗下當則吉汗下不當則凶其應如影隨形如響應聲況桂枝下咽陽盛則斃承氣入胃陰盛以亡桂枝湯者發汗藥也承氣湯者下藥也金匱玉函曰不當汗而強與汗之者令人奪其津液枯槁而死不當下而強與下之者令人開腸洞泄便溺不禁而死死生之要在乎須臾視身之盡不暇計日投湯不當則災禍立見豈暇計其日數哉此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞歿自謂其分至今冤魂塞於冥路死尸盈於曠野仁者鑑此豈不痛歟凡兩感病俱作治有先後發表攻裡本自不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其里言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能獲其本近取諸身夫何遠之有哉兩感病俱作欲成不治之疾醫者大宜消息審其先後次第而治之若妄意攻治以求速效者必致傾危之敗凡發汗溫服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺重病者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也發汗藥須溫暖服者易為發散也日三服者藥勢續也病勢稍重當促急服之以折盛熱不可拘於本方設藥病不相對湯入即便知之如陰多者投以涼藥即寒逆隨生陽多者飲以溫劑則熱毒即起是便有所覺晬時者周時也一日一夜服湯藥盡劑更看其傳如病證猶在當復作本湯以發其汗若服三劑不解汗不出者邪氣太甚湯不能勝必成大疾千金曰熱病脈躁盛而不得汗者此陽脈之極也死凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之忽然大汗出是為自愈也熱在上焦則為消渴言熱消津液而上焦乾燥則生渴也大熱則能消水熱少不能消之若強飲則停飲變為諸病至七八日陽勝氣溫向解之時多生大渴亦須少少與之以潤胃氣不可極意飲也若飲而腹滿小便不利若喘若噦者為水飲內停而不散不可更與之忽然陽氣通水氣散宣發於外作大汗而解凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自愈小渴者乃強與飲之因成其禍不可復數小渴者為腹中熱少若強與水水飲不消復為諸飲病也凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也動數之脈邪在陽也湯入而變遲者陽邪愈也浮大之脈邪在表也而復減小者表邪散也病初燥亂者邪所煩也湯入而安靜者藥勝病也是皆為愈證凡治溫病可刺五十九穴五十九穴者以瀉諸經之溫熱針經曰熱病取之諸陽五十九穴刺以瀉其熱而出其汗實其陰而補其不足所謂五十九刺兩手內外側各三凡十二痏五指間各一凡八痏足亦如是頭入髮際一寸旁三分各三凡六痏更入發三寸邊五凡十痏耳前後口下各一項中一穴凡六痏巔上一囟會一髮際一廉泉一風池二天柱二又內經曰熱俞五十九頭上五行行五者以瀉諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也又身之穴三百六十有五其三十穴灸之有害七十九穴刺之為災並中髓也穴有三百六十五以應一歲其灸刺之禁皆肉薄骨解之處血脈虛少之分針灸並中髓也脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損四臟氣絶者脈四損五臟氣絶者脈五損五臟六腑俱絶者脈六損脈盛身寒得之傷寒脈虛身熱得之傷暑內經曰脈者血之腑也脈實血實脈虛血虛寒則傷血邪並於血則血盛而氣虛故傷寒者脈盛而身寒熱則傷氣邪並於氣則氣盛而血虛故傷暑者脈虛而身熱脈陰陽俱盛大汗出不解者死脈陰陽俱盛當汗出而解若汗出不解則邪氣內盛正氣外脫故死內經曰汗出而脈尚燥盛者死千金曰熱病已得汗脈尚燥盛此陽脈之極也死脈陰陽俱虛熱不止者死脈陰陽俱虛者真氣弱也熱不止者邪氣勝也內經曰病溫虛甚者死脈至乍疏乍數者死謂天真營衛之氣斷絶也脈至如轉索者其日死為緊急而不軟是中無胃氣故不出其日而死譫言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣譫言妄語陽病也身微熱脈浮大手足溫為脈病相應若身逆冷脈沉細為陽病見陰脈脈病不相應故不過一日而死難經曰脈不應病病不應脈是為死病此以前是傷寒熱病證候也辨痓濕暍脈證第四傷寒所致太陽痓濕暍三種宜應別論以為與傷寒相似故此見之痓當作痙傳寫之誤也痓者惡也非強也內經曰肺移熱於腎傳為柔痓柔為筋柔而無力痙謂骨痙而不隨痙者強也千金以強直為痙經曰頸項強急口噤背反張者痙即是觀之痓為痙字明矣太陽病發熱無汗反惡寒者名曰剛痓千金曰太陽中風重感寒濕則變痓太陽病發熱無汗為表實則不當惡寒今反惡寒者則太陽中風重感於寒為痓病也以表實感寒故名剛痓太陽病發熱汗出不惡寒者名曰柔痓太陽病發熱汗出為表虛則當惡寒其不惡寒者為陽明病今發熱汗出而不惡寒者非陽明證則是太陽中風重感於濕為柔痓也表虛感濕故曰柔痓太陽病發熱脈沉而細者名曰痓太陽主表太陽病發熱為表病脈當浮大今脈反沉細既不愈則太陽中風重感於濕而為痓也金匱要略曰太陽病其證痛身體強𠘧𠘧然脈反沉遲此為痓栝蔞桂枝湯主之太陽病發汗太多因致痓太陽病發汗太多則亡陽內經曰陽氣者精則養神柔則養筋陽微不能養筋則筋脈緊急而成痓也病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭搖猝口噤背反張者痓病也太陽中風為純中風也太陽傷寒為純傷寒也皆不作痓惟是太陽中風重感寒濕乃變為痓也身熱足寒者寒濕傷下也時頭熱面赤目脈赤風傷於上也頭搖者風主動也獨頭搖者頭為諸陽之會風傷陽也若純傷風者身亦為之動搖手足為之搐搦此者內挾寒濕故頭搖也口噤者寒主急也猝口噤者不常噤也有時而緩若風寒相搏則口噤而不時開此者加之風濕故卒口噤也足太陽之脈起於目內眥上額交巔上其支別者從巔入絡腦還出別下項循肩膊內夾脊抵腰中下貫臀以下至足風寒客於經中則筋脈拘急故頸項強急而背反張也太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當利其小便金匱要略曰霧傷皮腠濕流關節疼痛而煩者濕氣內流也濕同水也脈沉而細者水性趨下也痹痛也因其關節煩疼而名曰濕痹非腳氣之痹也內經曰濕勝則濡泄小便不利大便反快者濕氣內勝也但當利其小便以宣泄腹中濕氣古云治濕之病不利小便非其治也濕家之為病一身盡疼發熱身色如似熏黃身黃如橘子色者陽明瘀熱也此身色如似熏黃即非陽明瘀熱身黃髮熱者梔子柏皮湯主之為表裡有熱則身不疼痛此一身盡疼非傷寒客熱也知濕邪在經而使之脾惡濕濕傷則脾病而色見是以身發黃者為其黃如煙燻非正黃色也濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如苔者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也濕家有風濕有寒濕此寒濕相搏者也濕勝則多汗傷寒則無汗寒濕相搏雖有汗而不能周身故但頭汗出也背陽也腹陰也太陽之脈夾脊抵腰太陽客寒濕表氣不利而背強也里有邪者外不惡寒表有邪者則惡寒欲得被覆向火者寒濕在表而惡寒也若下之早則傷動胃氣損其津液故致噦而胸滿小便不利下后里虛上焦陽氣因虛而陷於下焦為丹田有熱表中寒乘而入於胸中為胸上有寒使舌上生白苔滑也臟燥則欲飲水以胸上客寒濕故不能飲而但口燥煩也濕家下之額上汗出微喘小便利者死若下利不止者亦死濕家發汗則愈金匱要略曰濕家身煩疼可與麻黃加朮四兩發其汗為宜若妄下則大逆額上汗出而微喘者乃陽氣上逆也小便自利或下利者陰氣下流也陰陽相離故云死矣內經曰陰陽離缺精氣乃絶問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也值天陰雨不止明其濕勝也內經曰陽受風氣陰受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在內汗大出者其氣暴暴則外邪出而里邪不能出故風去而濕在汗微微而出者其氣緩緩則內外之邪皆出故風濕俱去也濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈病有淺深證有中外此則濕氣淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕氣不流關節而外客肌表也不云發熱身似熏黃復云發熱面黃而喘是濕不幹於脾而薄於上焦也陰受濕氣則濕邪為深今頭痛鼻塞而煩是濕客於陽而不客於陰也濕家之脈當沉細為濕氣內流脈大者陽也則濕不內流而外在表也又以自能飲食胸腹別無滿痞為腹中和無病知其濕氣微淺納藥鼻中以宣泄頭中寒濕病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也一身盡疼者濕也發熱日晡所劇者風也若汗出當風而得之者則先客濕而後感風若久傷取冷得之者則先傷風而後中濕可與麻黃杏仁薏苡仁甘草湯見金匱要略中太陽中熱者暍是也其人汗出惡寒身熱而渴也汗出惡寒身熱而不渴者中風也汗出惡寒身熱而渴者中暍也白虎加人參湯主之見金匱要略中方太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也經曰脈虛身熱得之傷暑身熱脈微弱者暍也身體疼重者水也夏時暑熱以水灌洗而得之一物瓜蒂散主之見金匱要略中方太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚病有在表有在裡者有表裡俱病者此則表裡俱病者也發熱惡寒身重疼痛者表中暍也脈弦細芤遲者中暑脈虛也小便已灑灑然毛聳手足逆冷者太陽經氣不足也小有勞身即熱者謂勞動其陽而暍即發也口開前板齒燥者重有熱也內經曰因於暑汗煩則喘喝口開謂喘喝也以喘喝不止故前板齒乾燥若發汗以去表邪則外虛陽氣故惡寒甚若以溫針助陽則火熱內攻故發熱甚若下之以除裡熱則內虛而膀胱燥故淋甚
