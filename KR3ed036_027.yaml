苓上為粗末每服五錢至七錢水一盞煎至七分去滓食遠溫服治痰上氣氣急上用猯豬膏一合暖酒和服治肺痿吐血以鹿血和酒服之良治肺痿咳嗽鬼氣痓病取溺久停臭者佳恐冷當以熱物和溫服之治肺痰唾膿血取薏苡仁十兩杵碎以水三升煎取一升入酒少許服之治肺痿咳嗽以蘿蔔子半升淘淨洗焙乾於銚子內炒令黃熟為末以沙糖丸如彈綿裹含之治肺痿吐血用蘿蔔和羊肉鯽魚煮食之肺痿咽燥附論夫熱在上焦因咳為肺痿其脈則口寸數其證則咳而口中有濁唾涎沫甚者咽中乾燥蓋以邪熱熏肺使然或因快藥下利重亡津液所致也方地黃湯治肺痿咽燥咳嗽吐膿血胸脅脹滿短氣羸不思飲食生乾地黃切焙赤茯苓去黑皮柴胡去苗各一兩射干甘草炙銼麥門冬去心焙各半兩紫菀去苗土半夏湯洗七次麻黃去節黃芩去黑皮桑根白皮銼五味子各三分上搗篩每服三錢水一盞生薑一片大棗二枚煎至七分去滓溫服不拘時候天門冬丸治肺痿咽乾煩燥痰壅咳嗽小便赤澀眠臥不安咽喉腫痛天門冬去心焙一兩甘草炙銼一兩人參三分杏仁湯浸去皮尖雙仁炒一兩貝母去心焙五味子阿膠炙令燥桑根白皮炙銼各半兩上為末煉蜜和丸如雞頭大每服一丸食後臨臥時溫人參湯嚼下含化咽液亦得地黃紫蘇煎治肺痿喘嗽涕唾稠黏咽膈不利生地黃切焙用三兩生薑二兩與地黃和研絞取汁生天門冬去心半斤生玄參一斤生麥門冬去心一斤杏仁去皮尖雙仁三兩研別入紫蘇子炒研二兩生牛蒡四兩細切與玄參至紫蘇子四味燥研以水少許拌勻布絞取汁上將兩等藥汁並杏仁和勻於銀石器中慢火煎令稍稠停火入白蜜五兩真酥二兩和勻於飯甑蒸少時候冷以淨器盛每服一小匙含化不拘時日三一方久服大益心肺滑潤肌膚補助榮衛忌生冷豬肉柴胡湯治肺痿久嗽不已四肢煩熱頰赤咽燥柴胡去苗竹茹桔梗紫菀去土貝母去心焙各一兩訶黎勒皮一兩知母炒二兩上搗碎如麻豆大每服五錢水一盞生地黃汁半盞烏梅一個煎至八分去滓溫服日再夜一天門冬煎治肺痿咳嗽吐涎沫咽燥而渴者生天門冬去心搗汁取醇酒各一升紫菀去土為末四兩餳糖上同入銀石器中重湯煎候可丸即丸杏仁大每服一丸咽津含化日三五服
