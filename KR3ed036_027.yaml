body:
  text: 卷二十七肺臟門肺勞論夫凡肺勞病者補腎氣以益之腎旺則感於肺矣人逆秋氣則手太陰不收肺氣焦滿順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣肺勞者或因形寒飲冷秋氣所致其證短氣面腫鼻不聞香臭胸中結滯氣乏聲嘶咳嗽呀呷咯唾稠黏或唾膿血或咽喉干痛不能唾上氣喘滿漸至衰瘁寒熱時作飲食減耗皆肺勞之證方紫菀湯治肺臟虛勞痰嗽不止背膊並項筋痹疼日漸羸瘦紫菀去苗土貝母去心黃耆銼柴胡去苗人參白茯苓去黑皮麻黃去根節杏仁湯浸去皮尖雙仁炒炙款冬花桔梗陳橘皮去白炒當歸炙銼大腹子銼桑根白皮五味子炒甘草炙銼生乾地黃焙各一兩桂去粗皮半夏洗去滑焙一兩半上銼每服五錢以水一盞半入生薑半分切大棗二枚同煎取七分去滓溫服天門冬丸出聖惠方治肺勞痰嗽氣促下焦虛損上焦煩熱四肢羸瘦宜服天門冬去心焙二兩牛膝一兩去苗麥門冬一兩人參一兩去蘆頭紫菀三分洗去苗土黃耆一兩銼杏仁湯浸去皮尖雙仁麩炒黃白茯苓一兩鱉甲二兩塗醋炙黃去裙襴薯蕷一兩五味子石斛去根銼枸杞子沉香訶黎勒皮肉蓯蓉酒浸一宿刮去皺皮炙令黃各一兩熟乾地黃二兩上為末煉蜜和搗三五百杵丸如梧桐子大每服食前以棗湯下三十丸忌鯉魚莧菜桔梗湯治肺勞咳嗽唾痰涎上氣喘急時發寒熱疼痛亦治腸風下血諸氣羸弱桔梗炒銼旋覆花好貝母去心防風去叉陳橘皮湯浸去白炒麥門冬去心焙枳殼去瓤麩炒各半兩桑根白皮銼人參前胡去蘆頭鱉甲白茯苓去黑皮蒺藜子銼去角甘草炙銼黃耆銼各一分天門冬去心焙一兩半上為末每服三錢沸湯調下不拘時候天靈蓋散出聖惠方治肺勞羸瘦四肢無力至日晚即煩熱頰赤痰嗽不利骨節多痛或乍寒乍熱飲食不生肌膚宜服天靈蓋塗酥炙黃鱉甲醋炙令黃去裙襴各一兩訶黎勒煨用皮柴胡去苗桂心麥門冬去心赤茯苓各一兩半山梔子人參去蘆頭貝母煨令黃地骨皮黃耆銼各一兩桃仁湯浸去皮尖雙仁麩炒微黃生乾地黃各二兩檳榔半兩上為散每服五錢以童子小便及水各一小盞入蔥白一莖生薑半分煎至一盞去滓食前溫服柴胡湯出聖惠方治肺勞胸膈壅滯痰嗽不止四肢無力少思飲食宜服柴胡一兩去苗白朮木香半兩紫菀三錢洗去苗土赤茯苓三分赤芍藥一兩鱉甲一兩半醋塗炙令黃去裙襴半夏三分湯浸七次去滑前胡三分去蘆頭訶黎勒一兩煨用皮枳殼麩炒微黃去瓤人參去蘆頭杏仁湯浸去皮尖雙仁麩炒微黃各三錢枇杷葉半兩拭去毛炙微黃甘草一分炙微赤銼上為散每服三錢用水一盞入生薑半分煎至六分去滓不計時溫服忌飴糖米肉莧菜桃仁散出聖惠方治肺勞上氣胸滿痰唾不利右脅有疾積聚發歇肌寒體瘦食少無力宜服桃仁一兩湯浸去皮尖雙仁麩炒微黃訶黎勒二兩煨用皮桂心半夏湯浸七次去滑五味子檳榔木香赤芍藥煨用人參去蘆頭陳橘皮湯浸去白瓤焙白朮京三稜煨用郁李仁湯浸去皮尖炒一兩鱉甲二兩塗酥炙令黃去裙襴柴胡上為散每服四錢以水一盞入生薑半分煎至六分去滓不計時溫服補氣黃耆湯一名補肺黃耆散出聖惠方治肺勞飲食減少氣虛無力手足顫掉面浮喘嗽黃耆銼人參茯神去木麥門冬去心焙白朮五味子桂去粗皮熟乾地黃焙陳橘皮去白焙阿膠炙燥各一兩當歸切焙白芍藥牛膝酒浸切焙各三分甘草炙銼半兩上粗搗篩每服三錢水一盞入生薑三片棗二枚同煎至六分去滓溫服一方無阿膠補肺款冬花湯治肺勞痰嗽日漸羸劣款冬花三分人參升麻各半兩桔梗半兩杏仁湯浸去皮尖雙仁炒一兩白茯苓去黑皮三兩甘草炙銼五分乾薑炮一錢柴胡去苗土一分半桑根白皮炙銼三錢天門冬去心焙半兩鱉甲去裙襴酥炙一分黃耆細銼半兩肉蓯蓉酒浸去皺皮炙一兩上搗篩每服五錢水一盞半煎至八分去滓食後溫服日三五膈下氣丸療肺勞熱損肺生蟲形如蠶在肺為病令人咳逆氣喘或為憂膈氣膈恚膈寒膈熱膈皆從勞氣所生名曰膏肓針灸不著麥門冬十分去心椒四錢炒遠志皮附子細辛各六分甘草十分炙乾薑桂心人參百部白朮黃耆各五分杏仁四十枚炒去皮尖雙仁上搗篩以白蜜和丸如彈子大將一丸內牙齒間含稍稍咽其汁忌豬肉海藻菘菜生蔥桃李雀肉等青龍五生膏治肺勞虛損致腸中生痔名曰腸痔肛門邊有核寒熱得之好挺出良久乃縮而生瘡豬後懸蹄三枚炙黃生梧桐白皮四兩龍膽生桑根白皮五寸炙雄黃研各五分蛇蛻皮五寸炙露蜂房炙蜀椒各三分汗蝟皮燒附子炮各四兩生白皮七分炙杏仁三十枚去皮尖生青竹皮六分上細切綿裹以苦酒二斗半醃漬一宿於火上炙燥搗篩以膏三升和微火上煎如薄糖敷瘡並酒服如棗大肉蓯蓉丸治肺勞虛損咳嗽唾血下焦冷憊腹脅疼痛肉蓯蓉去皺皮酒浸炙令黃白朮龍骨牡蠣煅杜仲去粗皮酥炙銼胡桃肉別研各三分附子炮裂去皮臍巴戟天去心遠志丁香鹿角膠炙令燥各半兩杏仁湯浸去皮尖雙仁生用別研一兩上為末入研杏仁胡桃肉再研令勻以煮熟棗肉及熟蜜砂盆內研如麵糊和藥更杵一千下丸梧桐子大每服空腹米飲下三十丸鱉甲出聖惠方治肺勞發歇寒熱痰嗽喘促坐臥不得鱉甲一兩塗酥炙黃去裙襴人參三分去蘆苗枳殼三分麩炒微黃去瓤紫菀三分洗去土苗柴胡一兩去苗露蜂房半兩微炙檳榔半兩桔梗半兩去苗頭五味子半兩赤茯苓半兩甘草半兩炙微赤銼杏仁半兩湯浸去皮尖雙仁麩炒微黃上為散每服四錢以童子小便一中盞入生薑半分煎至六分去滓不計時候溫服忌豬肉莧菜桔梗散出聖惠方治肺勞痰唾稠黏日晚即寒熱面色赤脅肋妨滿宜服桔梗一兩去蘆頭知母一兩柴胡一兩去苗杏仁一兩浸去皮尖雙仁炒人參一兩去蘆頭鱉甲一兩塗酥炙黃去裙襴白茯苓一兩郁李仁一兩湯浸去皮尖微炒白前一兩檳榔半兩半夏一兩湯浸七次去滑銼碎陳皮半兩湯浸去白瓤焙上為散每服四錢以水一中盞入生薑半分煎至六分去滓每於食後溫服麻黃散出聖惠方治肺勞氣喘鼻張面目苦腫心胸不利宜服麻黃一兩去根節五味子一兩前胡一兩半去蘆頭杏仁一兩湯浸去皮尖雙仁麩炒黃細辛一兩桂心一兩半夏半兩湯浸七遍去滑紫蘇莖葉一兩漢防己一兩陳橘皮一兩湯浸去白焙桑根白皮一兩半銼檳榔一兩上為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌飴糖生冷羊肉茯苓湯治肺勞咳嗽喘滿氣逆痰唾不利不思飲食赤茯苓去黑皮大腹皮銼枳殼去瓤麩炒陳橘皮湯浸去白焙半夏湯浸七遍曝乾杏仁湯浸去皮尖雙仁炒令黃檳榔銼訶黎勒皮桑根白皮銼甘草炙銼各半兩人參一兩上搗篩每服三錢水一盞生薑三片同煎至七分去滓不計時候補肺飲治肺臟因吐血後四肢虛劣氣乏無力手腳振掉飲食不得黃耆銼二兩人參茯神去木麥門冬去心桂去粗皮陳橘皮去白焙當歸炙銼天門冬去心焙甘草炙銼熟乾地黃焙五味子炒各一兩上搗篩分作十劑每劑以水三盞入生薑計半兩切大棗七枚同煎至一盞去滓空心頓服黃耆散出聖惠方治肺勞氣津液不通皮毛枯燥宜服補虛思食助力黃耆一兩銼赤芍藥一兩桂心三兩五味子一兩天門冬一兩去心白茯苓一兩甘草三兩炙微赤銼半夏三分湯浸七遍去滑人參一兩去蘆頭杏仁一兩湯浸去皮尖雙仁麩炒微黃生乾地黃二兩上為散每服四錢以水一中盞生薑半分棗三枚煎至六分去滓不計時候溫服忌鯉魚飴糖紫蘇子丸出聖惠方治肺勞氣喘咳嗽食少脅痛四肢寒熱宜服紫蘇子二兩微炒柴胡二兩去苗桔梗一兩去蘆頭赤芍藥五味子木香各一兩鱉甲二兩塗酥炙令黃去裙襴訶黎勒一兩煨用皮人參一兩去蘆頭桃仁一兩湯浸去皮尖雙仁麩炒微黃枳殼一兩麩炒微黃去瓤郁李仁一兩湯浸去皮尖微炒上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以黃耆湯下三十丸忌莧菜麥門冬丸出聖惠方治肺勞經久即生蟲在肺令人咳逆氣喘或謂憂恚氣膈寒熱所致麥門冬二兩去心焙川椒半兩去目及閉口者微炒去汗遠志一兩去心附子一兩炮裂去皮臍乾薑半兩炮製銼人參一兩去蘆頭細辛桂心一兩百部一兩銼黃耆一兩銼杏仁一兩湯浸去皮尖雙仁麩炒微黃上為末煉蜜和搗三二百杵丸如彈子大每服綿裹一丸含化咽津調肺人參湯治肺癆形寒飲冷則傷肺吸咽酒後吐血咳嗽吐濁時發寒熱食物不得日漸羸瘦人參附子炮裂去皮臍知母各三兩紫菀去苗土白茯苓去黑皮甘草炙烏梅肉炒柴胡去苗秦艽去苗土各半兩訶黎勒麵裹煨令面黃取皮一兩上銼如麻豆每服三錢水一盞生薑半分棗二枚煎至七分去滓溫服不拘時鰻鱺魚煎湯治肺癆咳嗽日久大白鰻鱺魚三條用醋湯洗淨段截以淨無灰酒用銀鍋內慢火煮熟濾出骨取肉細研再入酒二升慢火煎成膏青蒿子桔梗銼炒秦艽去苗土柴胡去苗知母焙甘草鱉甲九肋者去裙襴醋浸三日後炙令黃熟附子炮裂去皮臍人參各一兩上為末以魚拌和勻更搗五十杵丸如梧桐子大或干更入煉蜜少許每日空心午後臨臥用炒栝蔞根酒下二十丸白虎湯治肺氣勞傷龍骨研白石英研白茯苓去黑皮桑根白皮銼炒人參百合磁石煅醋淬十遍各一兩玄參半兩大豆一合上每服二錢水一盞煎取六分更入酒半盞煎至八分去滓服厚朴湯療肺癆虛寒腹脹膨滿氣急小便少厚朴四兩炙枳實炙桂心橘皮大黃各三兩甘草二兩炙五加皮生薑各五兩大棗三十枚擘上切以水一斗二升煮取三升去滓分溫三服忌海藻菘菜生菜五味子散出聖惠方治肺癆虛損腸鳴切痛胸脅逆滿氣喘宜服五味子一兩白朮一兩紫蘇子一兩微炒附子一兩炮裂去皮臍桂心半夏半兩湯浸七遍去滑訶黎勒一兩半煨用皮桔梗一兩去蘆頭木香半兩上為散每服三錢以水一中盞入食米半匙生薑半分棗三枚煎至六分去滓不計時候溫服鱉甲丸出聖惠方治肺癆痰嗽氣急抽牽五臟不安宜服鱉甲一兩塗醋炙令黃去裙襴五味子一兩貝母一兩煨令微黃紫菀一兩洗去泥土苗皂莢二兩去皮塗醋炙微黃去子木香一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃訶黎勒皮二兩紫蘇子一兩炒上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候煎人參湯下二十丸溫中下氣湯治肺虛勞損寒則腰背痛難以俯仰短氣唾如膿生薑一斤大棗三十枚杜仲皮五兩萆薢桂心各四兩白朮五兩甘草炙附子炮三兩上切以水九升煮煎取三升去滓分溫三服忌肉海藻菘菜生蔥桃李雀肉等蛤蚧丸治肺癆咳嗽蛤蚧炙一對天門冬去心焙麥門冬去心焙生乾地黃焙各一兩貝母去心焙二兩款冬花焙紫菀取須焙各二兩杏仁去皮尖雙仁焙一百枚研上為末煉蜜丸如梧桐子大每服十丸至十五丸食後煎淡生薑湯下建中湯治肺虛損不足補氣黃耆芍藥各三兩甘草炙二兩桂心三兩生薑六分半夏五兩洗大棗十二枚擘飴糖十兩上切以水八升煮取三升分為三服忌肉餳海藻菘菜生薑附子湯治肺虛勞損腹中寒鳴切痛胸脅逆滿氣喘附子炮甘草炙各二兩宿姜半夏洗破各四兩白朮三兩食米半升大棗二十枚擘去皮核上切以水一斗煮取三升去滓分溫為三服忌豬肉海藻菘菜羊肉桃李雀餳等人參丸治癆咳嗽人參桔梗炒烏梅搗碎麻黃去根節甘草炙銼杏仁去皮尖雙仁炒各一兩上先以童子小便五升浸三宿同煎小便盡焙乾搗羅為末煉蜜和丸如梧桐子大