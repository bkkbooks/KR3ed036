拘時候含一丸咽津雞膍胵丸一名救生丹治肺氣喘急坐臥不得出王氏博濟方雞膍胵二七枚湯洗焙半夏一分湯洗七次去滑牽牛子半兩瓦上爆干令焦甜葶藶半兩炒砒霜半分露至七宿細研收於床下鉛丹治如砒霜者半兩上為末用炊棗肉和丸如綠豆大丹砂為衣食後臨臥蔥與臘茶湯下七丸甚者加至十丸一方為丸如干入醋少許忌太冷大熱毒食等麻黃生薑湯治肺氣喘急麻黃去根節煮掠去沫焙一兩五味子甘草炙各二兩杏仁去皮尖雙仁炒八十枚淡竹葉切一升石膏研六兩上搗篩如麻豆大每服六錢水二盞煎取一盞去滓溫服日三麻黃散出聖惠方治肺氣喘急腹脅疼痛麻黃一兩去根節赤茯苓桂心各一兩桔梗一兩半去蘆頭甘草半兩炙微黃銼杏仁四十九枚湯浸去皮尖雙仁麩炒微黃上為散每服四錢水一中盞煎至六分去滓不計時候溫服桔梗湯出聖惠方治肺氣喘急咳嗽桔梗一兩去蘆頭桑根白皮三分銼甘草半兩炙微黃銼訶黎勒皮三分花桑葉半兩貝母半兩煨令微黃上為散每服不計時候以稀糯米粥飲調下一錢調肺湯治肺氣喘急四肢乏力飲食無味杏仁湯浸去皮尖雙仁炒一兩麻黃去根節湯煮掠去沫焙乾二兩甘草炙一兩紫蘇子炒一分貝母炒一兩去心上搗篩每服三錢水一盞入乾柿一枚切煎至六分去滓溫服空心日午臨臥各一蜀椒丸治肺氣喘急坐臥不得蜀椒青並閉口者炒出汗一兩乾薑炮半兩葶藶子隔紙炒三分豬牙皂角去皮塗酥炙一兩上為末以棗肉和丸如梧桐子大每服三丸煎桑根白皮湯下不拘時候如聖飲治肺氣上喘不以久新麻黃去根不去節寸截沸湯掠去沫六兩甘草炙一兩桂去粗皮半兩杏仁湯浸去皮尖雙仁四十九枚上銼如麻豆以水五盞銀石器內慢火煎取三盞澄清放溫每服半盞服罷去枕且仰臥其喘立止余藥以淨瓶盛外以溫湯養之旋旋服防己丸出聖惠方治肺氣咳嗽喘促坐臥不得防己一兩陳皮湯浸去白半兩甜葶藶隔紙炒三分豬牙皂莢去黑皮酥炙一兩上為末煮棗肉和搗三五百杵如梧桐子大每服十丸至十五丸煎桑根白皮湯下食後臨臥一方無陳皮用乾薑四神湯治肺喘麻黃去根節湯浸去沫五味子各一兩甘草炙半兩杏仁去皮尖雙仁麩炒二十五枚上搗篩如麻豆大每服五錢水二盞煎至一盞去滓溫服仰臥少許桂皮散治肺臟喘急胸膈壅滯大腸不利桂去粗皮陳橘皮湯浸去白炒各一兩白檳榔銼一兩半牽牛子半生半熟二兩上為散每服三錢溫酒調下空心食前服日三葶藶丸治久患肺氣喘急痰壅悶亂甜葶藶一兩隔紙炒紫色別研如膏貝母一兩煨令微黃搗末杏仁一兩湯浸去皮尖雙仁炒微黃研如膏皂莢一兩炮碎以酒五合浸取汁熬成膏上都研令勻以皂莢膏丸如梧桐子大每服不拘時候以桑根白皮湯下二十丸瀉肺湯治肺癰喘急坐臥不安桑根白皮銼炒甜葶藶隔紙炒各一兩上搗篩每服三錢水一盞煎至六分去滓食後溫服微利為度豬𦚟散治肺氣遠年不痊豬𦚟一具去脂細切膩粉一兩上入磁瓶內固濟上留小竅煅煙盡細研每服二錢空心漿水調下清肺散治肺喘氣短蒲頹葉蒲頹葉微似棠葉大柔厚色白似熟羊皮經冬不凋花如丁香萼極細如絲倒垂之風吹則搖然冬末生花至正月乃敷實一如山茱萸味酸可啖與麥齊熟其實不甚大吳人名半含春江南名棠京師名曰紙錢棠球襄漢名黃婆奶上為細末每服二錢溫水調下發時服有人患喘三十年者服之皆愈甚者服藥後胸上生小癮胗癢者其疾則瘥一方用人參等分豬𦚟酒治肺氣喘急睡臥不安大棗百枚豬𦚟上以酒五升浸之秋冬七日春夏五日出布絞去滓七日服盡二七日亦得忌鹽羊𦚟亦可治咳嗽胸脅支滿多喘上氣尤良亦治久嗽上氣二十年治不瘥者主肺氣喘息急坐臥不得桑白皮一兩地骨皮一兩甘草半兩上作飲子水三升煮取一升食後分二服日只可兩劑治久患肺氣喘急至效以杏仁去皮尖二兩童子小便浸一日一換夏月日三四換浸半月取焙乾爛研令極細每服一棗大薄荷一葉蜜一雞頭大水一中盞同煎取七分食後溫服甚者不過三劑瘥永不發動忌腥物治肺壅氣喘急不得臥以葶藶子三兩炒大棗三十枚水三升煮棗取二升又煎取一升去滓二服治肺氣上喘兼咳嗽以崖椒並野薑蓰為末酒服一錢匕甚效忌鹽肺痿附論夫肺痿寸口脈數其人病咳中反有濁唾涎沫者何也師曰此為肺痿之病何從得之師曰病熱在上焦因咳為肺痿或從汗出或從嘔吐或從消渴小便利數或從便難數被駃藥下重亡津液故得肺痿又寸口脈不出而反發汗陽脈早索陰脈不澀三焦踟躕入而不出陰脈不澀又寸口數而虛按之澀身體反冷其內反煩多唾唇燥小便反難此為肺痿傷於津液便如爛瓜下如豚腦但坐發汗故也其病欲咳不得咳嗽出干沫久久小便不利其脈平弱肺痿吐涎沫而不咳者其人不渴心遺溺小便數所以然者上虛不能制下故也此為肺中冷必眩師曰肺痿咳唾咽燥欲飲者自愈自張口者短氣也肺為五臟華蓋百脈取氣運動血脈衛養腑臟灌注皮毛將理失宜氣與血亂則成肺痿癰矣然五臟皆有痿癰而獨論此者以肺屬金數盡於陽九位最高內為五臟長多致此病故獨論此方清燥湯一名茯苓燥濕湯六七月之間濕令大行子能令母實而熱旺濕熱大勝而刑庚大腸故寒涼以救之以天令言之則清燥之氣絕矣古人之法夏月熱以救熱傷天真元氣燥金受濕熱之邪絕寒水生化之源源絕則腎虧痿厥之病大作腰以下痿軟癱瘓不能動行夫不正兩足敧側更宿有濕熱之證當急救之黃耆一錢半黃連淨一分蒼朮一錢五味子九個白朮半錢橘皮半錢人參三分當歸身二分生地黃二分曲二分升麻三分白茯苓三分澤瀉半錢豬苓三分酒黃