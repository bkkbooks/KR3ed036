body:
  text: 卷一百四十四傷寒門傷寒後身體虛腫附論夫血氣滋榮外濡於腠理則形體充實傷寒汗下之後血氣不足臟腑虛寒營衛澀滯津液不通肌肉無以充榮故令身體虛腫若脾與腎臟俱虛不能約制於水水氣流溢於皮膚則變水氣腫滿方黃耆湯治傷寒後身體腫滿心胸壅悶喘促氣滿黃耆一兩枳殼去瓤麩炒微黃三分防風半兩桂去粗皮半兩細辛去苗葉半兩白朮三分赤芍藥赤茯苓去黑皮三兩當歸切焙半兩上粗搗篩每服三錢以水一盞入生薑半分切煎至六分去滓不計時候溫服防己湯治傷寒後身體浮腫喘息促小便不利坐臥不安防己三分豬苓去黑皮三分海蛤一兩陳橘皮湯浸去白瓤焙一兩木香半兩白朮半兩檳榔銼一兩桑根白皮銼三分赤茯苓去黑皮三分木通銼一兩半紫蘇葉三分上粗搗篩每服三錢以水一盞入生薑半分切煎至六分去滓不計時候溫服木通湯治病後脾腎不足水道不利腰腳浮腫木通銼一兩澤瀉防己桑根白皮炙黃色赤茯苓去黑皮石葦去毛各三分大腹子微煨銼四兩上粗搗篩每服五錢水一盞半煎至八分去滓食前溫服日三防己湯治病後氣虛津液不通皮膚虛滿防己黃耆銼桂去粗皮各一兩半赤茯苓去黑皮三兩甘草炙令赤銼一兩上粗搗篩每服五錢水一盞半煎至七分去滓溫服日再服檳榔湯治傷寒病後脾腎氣虛欲成水病四肢面目浮腫小便澀喘急檳榔並皮銼五枚防己二兩木通銼碎一兩一分桑根白皮炙令黃色銼一兩陳橘皮湯浸去白焙乾三分吳茱萸水浸一宿炒乾一分郁李仁湯浸去皮微炒一兩上粗搗篩每服三錢水一盞半煎取七分去滓溫服日三前胡丸治傷寒身體浮腫心胸滿悶不欲飲食前胡去蘆頭一兩旋覆花半兩人參三分訶黎勒皮一兩檳榔銼一兩木香半兩赤茯苓去黑皮三分陳橘皮湯浸去白瓤炒半兩桂去粗皮半兩桑根白皮銼三分郁李仁湯浸去皮尖微炒一兩上搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服煎生薑棗湯下三十丸日三服郁李仁湯治傷寒後身體洪滿腹堅脹喘急不能飲食郁李仁湯浸去皮尖微炒大黃銼碎微炒各一兩柴胡去苗桑根白皮銼三分山桃仁湯浸去皮尖微炒一兩上搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服煎生薑棗湯下三十丸日三服郁李仁湯治傷寒後身體洪滿腹堅脹喘急不能飲食郁李仁湯浸去皮尖微炒大黃銼碎微炒各一兩柴胡去苗桑根白皮銼澤瀉赤芍藥豬苓去黑皮桔梗炒麻黃去根節各三分鱉甲去裙襴醋炙赤茯苓去黑皮各半兩杏仁湯浸去皮尖雙仁麩炒微黃上粗搗篩每服三錢水一盞入生薑半分切煎至六分去滓不計時候溫服木香丸治傷寒後遍身洪腫木香肉豆蔻青橘皮湯浸去白焙檳榔微炒銼各一兩上搗羅為末煉蜜為丸如小豆大每服空心溫酒下二十丸漸加至三十丸治病後虛腫豉五升醇酒一斗上煮三沸及熱頓服不耐酒者隨性服覆被取汗五香麻黃湯治傷寒忽發腫或著四肢或在胸背虛腫浮如吹狀亦著頭面唇口頸項劇者偏著腳脛外如軸大而不痛不赤著四肢者乃欲不遂悉皆主之麝香半兩薰陸香雞舌香各一兩沉香秦艽青木香麻黃防風獨活葳蕤甘草各二兩白薇枳實各二兩上㕮咀以水九升煮取三升分三服覆取汗後摩防己膏傷寒後骨節煩疼附論夫傷寒後骨節煩疼者由津液不足血脈皆虛餘毒客於經絡榮衛澀滯於骨節之間故令骨節煩疼也診三部脈細而遲澀者乃其候也方葛根湯治傷寒後毒氣未解四肢少力骨節煩疼心腹脹滿葛根銼生乾地黃焙羌活去蘆頭桂去粗皮芍藥芎藭麻黃去根節湯煮掠去沫陳橘皮湯浸去白焙木香各半兩甘草炙銼一分上粗搗篩每服五錢水一盞半入生薑半分拍碎棗三枚擘破同煎至七分去滓空心溫服晚食前再服柴胡湯治傷寒後百節疼痛壯熱頭疼柴胡去苗芍藥知母焙桃仁湯浸去皮尖雙仁炒黃木香梔子仁升麻大青白芷黃芩去黑心各半兩甘草炙銼各一兩上粗搗篩每服五錢水一盞半入生薑半分拍碎同煎至七分去滓食前溫服日三柴胡飲治傷寒後骨節疼痛咳嗽不能食口舌乾燥乍寒乍熱唇口生瘡柴胡去苗升麻茯神去木芍藥犀角鎊百合地骨皮麥門冬去心焙黃芩去黑心人參各半兩鱉甲去裙襴醋炙石膏各一兩甘草炙銼一分上粗搗篩每服五錢水一盞半入生薑半分拍碎竹葉三七片同煎至七分去滓食前溫服日再芍藥湯治傷寒後壯熱骨肉疼痛頭重嘔噦芍藥柴胡去苗赤茯苓去黑心人參麥門冬去心焙藿香葉白芷各半兩生蘆根一兩甘草炙一分上銼如麻豆大每服五錢水一盞半入生薑半分拍碎同煎至七分去滓空心溫服晚食前再服百合湯治傷寒後四肢煩熱骨節疼痛百合知母焙鱉甲去裙襴醋炙柴胡去苗葛根銼桑根白皮銼各一兩上粗搗篩每服五錢水一盞半煎至八分去滓入生地黃汁一合攪勻食後溫服日再茯苓湯治傷寒後骨節煩疼乍起眼暗氣衝胸背上氣滿急白茯苓去黑皮柴胡去苗桔梗炒細辛去苗葉芍藥大腹皮各半兩枳殼去瓤麩炒陳橘皮湯浸去白瓤焙各一兩杏仁湯浸去皮尖雙仁炒三分甘草炙一分上粗搗篩每服五錢水一盞半入生薑半分拍碎同煎至八分去滓食後溫服日再黃耆湯治傷寒後骨節煩疼不欲飲食及氣脹汗出補氣黃耆銼芍藥桂去粗皮麥門冬去心焙五味子前胡去蘆頭白茯苓去黑皮當歸切焙人參各半兩甘草炙一分上粗搗篩每服五錢水一盞半入生薑半分拍碎棗三枚擘破同煎至七分去滓溫服日三防風湯治傷寒後遍身骨節疼痛腳膝無力防風去蘆白朮附子炮裂去皮臍白蘚皮黃耆桂去粗皮薏苡仁各一兩上銼如麻豆每服三錢以水一盞入生薑半分拍碎同煎至半盞去滓溫服日三羌活湯治傷寒後下焦風虛骨髓痠痛腰腳頑痹不能久立日漸消瘦羌活去蘆頭防風去蘆五加皮牛膝去苗酒浸切焙酸棗仁微炒丹參芍藥麻黃去根節湯煮掠去沫焙當歸切焙獨活檳榔玄參堅者木通銼各半兩桂去粗皮黃耆銼各三分上粗搗篩每服五錢水一盞半煎至七分去滓空心溫服日晚再服續斷湯出護命方治傷寒熱毒氣攻腎腰背疼痛脊膂強急頭痛左手尺脈浮微數續斷杜仲去粗皮炙銼羌活去蘆頭麻黃去根節湯煮掠去沫焙芎藭各一兩牽牛一分炒熟上粗搗篩每服三錢以水一盞煎至二沸去滓空心服桂枝芍藥知母湯出金匱方治諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂枝四兩芍藥三兩甘草二兩麻黃二兩生薑五兩白朮五兩知母四兩防風四兩附子二兩炮上以水七升煮取二升溫服七合日三服柴胡散治傷寒壯熱肢節疼痛大小便澀柴胡去苗黃芩去黑心栝蔞根山梔子仁各一兩大黃銼醋炒芒硝各一兩半木香白蘚皮各三分茵陳蒿半兩上搗羅為細散每服二錢以食前新汲水調下神解丸出御藥院治內外所傷骨節疼痛壯熱憎寒頭疼身體拘急硃砂研硇砂研黃蠟各等分上熔蠟和成劑旋丸如綠豆大每服一丸冷水送下如人行一二里以熟蔥醋粥投汗出解正元散出拔萃方治傷寒始覺吹凍著四肢頭目百節疼痛急煎此服如人行五里再服或連三服汗出立瘥麻黃陳皮甘草乾薑肉桂白芍藥大黃附子吳茱萸半夏各等分皆可制上麻黃加一半茱萸減一半同為末每服一大錢水一盞生薑五片棗一枚煎七分熱呷出汗以被蓋覆汗出愈陰毒不可用麻黃出汗天麻散出王氏博濟方解傷寒渾身壯熱百節疼痛頭昏重面赤氣粗脈息洪大大效天麻三兩烏頭一兩半天南星二兩防風白附子一兩雄黃半兩麝香少許上為細末每服一匙溫酒調下並吃三兩服汗出立瘥橘皮湯永類鈐方治動氣在下不可發汗發之反無汗心中大煩骨節疼痛目瞑惡寒反嘔逆谷不得入淨陳皮一兩半甘草半兩炙人參一分竹茹半兩上㕮咀每服四錢水一盞姜三片棗一個煎空心服活人書加生薑一兩棗子八個作六服傷寒後腰腳疼痛附論夫腰者腎之府腎者主水受五臟六腑之精而藏之傷寒病後精血不足腎氣既弱風邪襲虛客搏於足少陰之經流注腰腳凝滯不散故機關不利為腰腳疼痛亦有宿患腎經風溫腰痛因病後經氣虛而發者各從其證以方治之方羌活散出聖惠方治傷寒後風虛腰腳頑痹骨髓疼痛不能久立羌活防風去蘆頭黃耆五加皮牛膝去苗各一兩酸棗仁微炒丹參桂心赤芍藥麻黃去根節檳榔當歸木通玄參各一兩枳實半兩麩炒微黃上細銼和勻每服半兩水一大盞入生薑半分煎至五分去滓食前溫服服藥訖即以衣覆臥良久即愈麻黃散出聖惠方治傷寒後風毒攻腰腳骨節疼痛麻黃一兩半去根節細辛獨活桂心防風去蘆頭當歸羚羊角屑以上各一兩丹參牛膝去苗萆薢銼黃耆銼各三分磁石二兩搗碎小淘去赤水上為散每服四錢以水一中盞入生薑三片煎至六分去滓食前溫服大腹皮散出聖惠方治傷寒後肝腎風虛毒氣壅滯大小腸閉澀氣攻腰腳疼痛妨悶大腹皮銼桂心澤瀉赤芍藥各一兩檳榔木香各半兩木通川朴硝各三分上為散每服四錢以水一中盞入生薑半分煎至六分去滓食前溫服牛膝散出聖惠方治傷寒後臟腑虛弱腰脅疼痛瘦癢牛膝去苗石斛去根銼薯蕷赤芍藥杜仲去粗皮炙微黃銼萆薢銼各三分當歸銼微炒熟乾地黃各一兩桑寄生五分上為散每服五錢水一中盞入酒三合生薑半分煎至六分去滓食前溫服服藥後徐步令藥勢行獨活散出聖惠方治傷寒後腎臟風虛腳膝疼痛少力不能步獨活一兩防風三分去蘆頭五加皮三分銼附子一兩炮裂去皮臍赤芍藥一兩乾薑半兩炮桂心一兩半牛膝去苗一兩五味子三分杜仲一兩半去粗皮炙微黃銼石斛去根一兩沉香一兩上為散每服五錢以水一大盞入姜半分煎至五分去滓食前溫服桂心散出聖惠方治傷寒後腹脹氣急連腰腳疼痛桂心陳橘皮湯浸去白瓤焙白朮附子炮裂去皮臍當歸各四錢木香半兩檳榔一兩厚朴去粗皮塗生薑汁炙令香熟半兩上為細散每服食前以酒調下二錢檳榔丸出聖惠方治傷寒後虛冷腰間有積滯氣流注腰腳疼痛不可忍檳榔陳橘皮湯浸去白瓤焙桂心附子炮裂去皮臍赤芍藥各半兩乾薑一分炮裂銼牽牛子五兩微炒別杵羅取末二兩半聖濟入糯米百粒同炒米色黃取米三兩上為細末研令勻煉蜜和丸如梧桐子大食前以生薑湯溫下三十丸相次以生薑粥飲投之良久當利未利再服聖濟云為散入牽牛子末和令勻每服空心溫酒調下三錢每服藥了吃少姜粥投良久利下腰間積滯物如不利即加至四錢以利為度名檳榔散沉香散出聖惠方治傷寒後腰間氣滯流注腳膝疼痛沉香附子半兩炮裂去皮臍五加皮各一兩桂心一兩檳榔一兩枳實半兩麩炒微黃木香半兩大黃一兩銼碎微炒上為細散每服食前以蔥白湯調下二錢威靈仙散出聖惠方治傷寒後腰腳疼痛威靈仙一兩半牽牛子二兩微炒陳橘皮三分湯浸去白瓤焙厚朴三分去粗皮塗生薑汁炙令香熟吳茱萸半兩湯浸九次曝乾上為細散空心以溫酒調下二錢當瀉下惡物治傷寒後肩背拘急腰腳疼痛出聖惠方羌活干薄荷各一兩木香檳榔威靈仙各三分上為細散每服食前以溫酒調下二錢貼熁方出聖惠方治傷寒後風氣流注腰腳疼痛坐臥有妨附子生用桂心各半兩吳茱萸一分生用上為末用生薑自然汁調令稀稠得所入銚子內慢火煎如餳攤在臘紙上於痛處貼熁之芫花散熨方出聖惠方治傷寒後毒氣攻注腰腳疼痛芫花吳茱萸各二兩醋糟八兩上相和令勻於銚子內炒令熟以青布裹於痛處熨之如稍干以醋拌令潤