不滿自言滿者為無熱更不用黃芩大黃也犀角湯出聖濟總録治傷寒吐血不止喜忘如狂熱毒不散內有蓄瘀犀角鎊一兩大黃銼炒三兩芍藥黃芩去黑心各一兩牡丹皮三分生乾地黃焙一兩半上粗搗篩每服五錢鹽水一盞半煎至半盞去滓食後溫服黃芩湯出聖濟總録治傷寒吐血心神煩悶黃芩去黑心三分山梔子仁三錢遠志去心一分桂去粗皮五分黃連去須竹茹各三分上粗搗篩每服五錢鹽水一盞半煎至一盞去滓食後溫服三黃湯出聖濟總録治傷寒後心氣不足吐血衄血及黃疸大黃銼焙黃連去須黃芩去黑心各一兩上粗搗篩每服五錢鹽水一盞半煎至八分去滓食後溫服亦名三黃丸用煉蜜為丸如梧桐子大每服十五丸白湯下紫河車散出聖濟總録治傷寒吐血煩躁紫河車三分朴硝甘草各半兩生蛤粉一分上搗羅為散每服二錢鹽沙糖新汲水調下不計時候日三服金花散出聖濟總録治傷寒吐血不止鬱金甘草炙銼青黛各五錢上搗羅為散每服二錢用鹽雞子白調下地黃散出聖濟總録治傷寒吐血不止大黃銼炒搗末一兩龍腦研一錢上合研均每服二錢用生地黃汁調下人參湯出聖濟總録治傷寒吐血下血及血汗人參芍藥桔梗銼炒芎藭當歸切焙桂去粗皮甘草炙銼各一兩竹茹三分上粗搗篩每服五錢鹽水一盞半煎至八分去滓食後溫服治傷寒後餘毒不解心臟熱極吐血不止方出聖濟總録生藕汁二合生地黃汁三合惡實根汁二合刺薊根汁二合蜜一合上相和攪均每服三合不計時候頻頻服柏葉湯金匱方治吐血不止者側柏葉三兩乾薑三兩切艾三把上以水五升煮取一升去渣別絞取新出馬通汁一升相和合煎取一升綿裹濾去之溫分再服馬通是馬屎汁也一方有阿膠無艾黃土湯出金匱方治吐血下血先便後血此遠血也釜灶下黃焦土半升綿裹甘草炙乾地黃白朮附子炮裂阿膠炙末黃芩各三兩上切以水八升煮六味取三升去滓納膠令煬分三服忌海藻菘菜蕪荑豬肉桃李雀肉等物治傷寒吐血而齒縫皆流血不止用開口川椒四十九粒用法醋一大盞同煎令熟入白礬少許漱口含在口中少頃出再啜漱而含
