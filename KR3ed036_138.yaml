湯治嘔啘不止病源伏熱在胃令人胸滿則氣逆氣聞則噦若大下後胃氣虛冷亦令致噦也甘草一兩炙橘皮三兩升麻半兩生薑三兩上以水三升煮取一升盡服之日三四作當止忌海藻菘菜麥門冬飲子治嘔逆麥門冬去心蘆根人參各一兩上以水六升煮取二升七合去滓分溫五服徐徐服常用有驗又方飲生薑汁三二合大良又方枇杷葉去毛煮飲之作粥亦佳又方研油麻煮緑豆令爛取半升許以手掌大蝟皮燒作灰篩之納豆中和食蘆根飲治傷寒後嘔噦反胃乾嘔不下食生茅竹根竹茹各三兩生薑四兩大棗十二枚上㕮咀先將舊草鞋一隻淨洗以水煮汁澄清每服三大錢藥水一盞半煎至七分去滓服人參訶子出王氏博濟方治傷寒氣不順食嘔胸不和有時泄瀉人參乾葛地黃厚朴各二分去皮丁香一分訶子七枚豆蔻一個去殼皮上為細末以水一盞末二錢入生薑棗同煎至五分熱服橘皮竹茹湯出活人書治嘔逆橘皮二兩竹茹一升甘草三兩炙人參半兩半夏一兩湯浸上銼如麻豆大每服五錢生薑六片棗一枚以水二大盞煎至一盞去滓溫服日三服金匱方無半夏橘皮乾薑湯出活人書治噦橘皮通草乾薑炮桂心各二兩人參一兩甘草半兩上銼如麻豆每服四錢水一盞煎至六分去滓溫服日三服奪命沉香散出王氏博濟方治傷寒嘔逆結痞心胸真氣虛弱脈息沉細正氣補充沉香一兩舶上茴香青橘皮去瓤胡椒蓽澄茄川楝子陳橘皮去瓤各一兩上為細末如患者但得心頭有氣未斷亦可服之二錢蔥白三寸擘破入酒並童子小便各半盞同煎至六分放溫和滓服患沉重者不過三服氣正脈生傷寒咳逆附論夫咳逆者多種或水漬於肺而心痞或連咳不已而氣逆或喜笑過多而氣逆或咽飲錯候而氣𩝞或急食乾物而氣塞皆能作咳逆之聲也俗呼謂之吃忒是也皆氣不得下為火熱托之而使上至咽喉中噎而止也人或以紙捻鼻因嘆而止或詐冤盜物因恐而止或鼻聞香調氣而止皆抑之駭之調之而使氣下也千金以喘嗽咳逆上氣者為病肺脈散者是心火形於肺金也心之肺謂之死陰死陰之屬不過三日死以其形見乎損傷故也此説甚優易老謂渴逆者火熱奔急上行而肺陰不內何其當哉故便閉者大承氣湯下之便軟者瀉心湯主之也又論陰證咳逆云且陽證咳逆者胃熱失下也陰氣先絶陽氣後亦將竭火獨炎上逆出陰氣而為咳逆陰證者內已伏陰陰氣太甚腎水擅權肝氣不生胃已大病丁火又消所有遊行相火寒邪迫而萃集於胸中亦欲盡矣故令人發熱大渴引飲並去蓋覆病人獨熱他人按執之身體肌肉骨髓血脈皆寒此火即無根火也故用丁香乾薑之類熱藥溫服其火自下咳逆方止非若涼膈瀉心以治陽證自上而下瀉退心火陰氣乃生陰證咳逆從嘔噦而生胃寒嘔噦不已咳逆繼之仲景有傷寒咳逆上氣脈散者死謂其形損故也少陰咳逆者失下也陰消將盡陽逆上行使陰不內也謂之惡候或兼以舌彎語言不正而反昏冒咽喉痛者少陰也速下之宜大承氣湯若陽極脈微將盡者不宜下宜瀉心湯養陰退陽而已不如用瀉心湯涼膈去硝清肺亦可若飲水過多心下痞而渴逆者五苓散主之別無惡物是也歌曰咳逆皆因胃有寒此名惡候古今傳橘皮半夏並薑附不瘥依方灸乳邊橘皮乾薑湯半夏生薑湯羌活附子散是也不瘥即灸之婦人屈乳頭向下盡處骨間丈夫及乳小者以一指為率男左女右艾炷如小豆許三壯陷中有動脈是穴證治論云嘔噦手足逆冷者乃小橘皮湯嘔噦胸滿虛煩不安大橘皮湯又歌曰小柴胡主陽家噦或用陳皮與竹茹腹滿須看前後部豬苓承氣莫相拘有陽證咳逆者小柴胡湯橘皮竹茹主之前後部乃大小便也前部不利調胃承氣陽明中風脈弦浮小便難潮熱而噦者小柴胡加茯苓湯咳逆俗為之噫古人謂之噦蓋胃氣本虛吐下大過或復與之水發其汗胃氣虛逆噫噦生為病勢至此極矣雖然咳逆出於噦寒固也其有水挾寒氣擊搏而成者則茯苓半夏逐水主噫官桂丁香下氣禦寒又有熱氣擁郁氣不得通者小柴胡湯加生薑自有條例惟有噦而腹滿不得小便或後部不通此為真病雖有神醫未知之何矣易簡論傷寒咳逆為篤證也他病見之亦然以半夏生薑湯主之又方丁香柿蒂煎湯調蘇合香丸大抵咳逆不可不速救藥是水氣乘肺亦主噫逆為咳當以表水治之方勻氣散出濟生拔粹方治陰證咳逆川烏頭大者三個炮裂去皮臍上為細末每服二錢黑豆二十一粒沙糖雞頭子大水煎成熟細細飲之治傷寒心下虛噎不下服諸藥不效者用石蓮子肉一兩為末每服二錢白湯下治傷寒塞噎不住枳殼陳皮各等分上銼水一大碗煎至七分溫服肉豆蔻湯出本事方治傷寒汗後吃噎肉豆蔻一個石蓮肉炒茴香各一分丁香半分人參半兩枇杷葉五片拭去毛炙上銼細用水四盞生薑十片煎二盞去滓空心溫分二服良薑湯出本事方橘皮良薑桂枝當歸各一兩麻黃半兩杏仁二十個甘草一分檳榔三個別末上粗末用水四盞薑十片棗十個同煎至二盞去滓下檳榔末更煎至一盞三服未已再作一劑龐老云傷寒吃噎不止是陰陽氣升降欲作汗升之不下故胃氣上逆為吃噎無休止宜此方又方出本事方枳殼半兩木香一錢上為細末每服一錢白湯調未知再與一方出肘後方治傷寒咳噫不止嘔逆不定丁香一兩柿蒂一兩上焙乾搗末人參煎湯下數升無時服加味柿蒂湯出德生堂治傷寒發熱噫逆氣噎虛煩不得睡臥熱多小柴胡湯加乾柿蒂七個煎依柴胡湯飲子為妙渴熱生料五苓散加乾柿蒂七個柴胡一錢同煎無大熱體虛氣不調噫逆者只用人參半兩加柿蒂十五個水一盞半煎至一盞去渣服之不計時候無熱不渴宜服五膈寬中散加柿蒂煎服調胃散出儒門事親治傷寒吐逆四肢逆冷