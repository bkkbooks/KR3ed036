body:
  text: 卷一百三十八傷寒門傷寒乾嘔附論夫傷寒乾嘔者而無所出也此因邪熱在胃或發汗解後胃中不和尚有蓄熱氣熏上焦心下痞結故令乾嘔且諸邪氣在胃胃氣上逆皆發為嘔冷即寒痰凝滯嘔出涎沫則津液消鑠獨其氣逆故乾嘔而已極療者不可不察歌曰嘔而無物名乾嘔下利三般屬少陰脅痛頭疼並水氣箇中自是少知音少陰下利三證利不止嘔逆無脈乾嘔煩者白通加豬膽汁湯脈微者白通湯裡寒外熱脈微絶或乾嘔者通脈四逆湯乾嘔吐涎沫頭痛者吳茱萸湯得湯劇者小柴胡湯汗出頭痛乾嘔者桂枝湯心下有水氣乾嘔發熱者屬表小青龍湯身涼而汗出兩脅痛乾嘔短氣心內痞而咳微利不惡寒此表解里有水十棗湯下之也膈上有寒飲乾嘔者可溫之四逆湯乾嘔而利者黃芩半夏生薑湯大抵熱在胃脘與穀氣並熱氣上熏心下痞結則嘔而無所出為少陰下利薑附主下利也厥陰吐涎沫吳茱萸湯主涎沫也汗出乾嘔桂枝主自汗也邪去自嘔也者定失若夫水氣二證又當以里分之發熱咳喘而乾嘔者此則水氣在表與青龍湯不發熱不惡寒脅痛咳利而乾嘔者此則水氣在裡與十棗湯是又不可無別然而表水皆有咳嗽何耶曰水氣乘肺也方葛根湯出聖惠方治傷寒乾嘔煩熱不納飲食葛根一兩甘草三分炙微赤銼半夏三分湯洗七次去滑白朮一兩黃耆一分銼人參一兩去蘆頭赤茯苓三分麥門冬一兩陳橘皮半兩湯浸去白瓤焙上為散每服四錢水一中盞入薑半分煎至六分去滓不計時候稍熱服木通散出聖惠方治傷寒乾嘔煩悶小便不利木通半兩銼蘆根一兩銼陳橘皮一分湯浸去白瓤焙人參半兩去蘆頭葛根半兩銼麥門冬半兩去心上為散每服五錢水三大盞煎至二盞去渣不計時候分溫五服半夏散出聖惠方治傷寒乾嘔不納飲食心神虛煩半夏半兩湯洗七次去滑陳橘皮一兩湯洗去白瓤焙甘草半兩炙微赤銼人參半兩去蘆頭葛根半兩銼麥門冬三分去心枇杷葉半兩拭去毛炙微黃上為散每服三錢水一中盞入生薑半分煎至五分去渣不計時候溫服枇杷葉散出聖惠方治傷寒往來寒熱胸脅氣滿乾嘔枇杷葉三分拭去毛炙微黃前胡二兩半去蘆頭赤茯苓二兩桂心二兩犀角屑一兩檳榔一兩桑根白皮三分銼赤芍藥一兩半蘆根三分上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時溫服藿香散出聖惠方治傷寒乾嘔煩亂不下飲食藿香一分麥門冬一兩去心焙桑木耳一分葛根半兩銼枇杷葉半兩拭去毛炙微黃人參半兩銼去蘆頭上為散每服三錢水一中盞入生薑半分煎至六分去渣不計時候溫服柴胡散治傷寒乾嘔不止心胸煩躁四肢熱柴胡一兩半去苗黃芩三分麥門冬一兩去心焙半夏半兩湯洗七次去滑枳殼一兩麩炒令黃去瓤枇杷葉三分拭去毛炙微黃甘草半兩炙微赤銼人參半兩去蘆頭上為散每服四錢水一中盞生薑半分棗三枚煎至六分去滓不計時候溫服竹茹飲子出聖惠方治傷寒乾嘔不止竹茹半兩半夏一分湯洗七次去滑甘草一分炙微赤銼陳橘皮一分湯浸去白瓤焙紫蘇莖葉一分上細銼都以水二大盞生薑半分煎至一盞去渣不計時候溫服二服枇杷葉散出聖惠方治傷寒乾嘔煩渴不止枇杷葉三分拭去毛炙微黃麥門冬三分去心葛根三分銼人參三分去蘆頭赤茯苓半兩甘草一分炙微赤銼上為散每服三錢水一中盞生薑半分煎至五分去滓不計時候溫服一方用白茯苓竹茹散出聖惠方治傷寒後煩熱乾嘔竹茹半兩陳橘皮半兩湯浸去白瓤焙人參去蘆頭半兩麥門冬半兩去心甘草半兩炙微赤銼蘆根半兩銼上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服治傷寒乾嘔不止方出聖惠方茅根三兩陳橘皮二兩湯浸去白瓤焙桂心一兩上為散每服四錢水一中盞煎至六分去滓不計時候溫服蘆根飲子出聖惠方治傷寒乾嘔不下食蘆根三兩竹茹三兩陳橘皮三兩湯浸去白瓤焙上細銼拌令勻每服半兩以水一大盞入粳米五十粒生薑半分煎至五分去渣溫服治傷寒乾嘔心膈煩滿方出聖惠方木通二兩蘆根二兩陳橘皮二兩湯浸去白瓤焙上細銼拌令勻每服半兩水一大盞入粳米五十粒生薑半分煎至五分去滓不計時候溫服葛根湯出聖濟總録治傷寒乾嘔不止葛根銼一兩茯苓去黑皮半兩半夏湯洗七次炒乾三分白朮半兩黃耆三分銼人參一兩麥門冬去心焙一兩甘草半兩炙銼上粗搗篩每服三錢水一盞生薑半分拍碎棗二枚擘破同煎至六分去滓服竹茹湯出聖濟總録治傷寒氣虛熱乾嘔不止淡竹茹半兩人參一兩前胡去蘆頭三分甘草炙半兩蘆根一兩葛根三分半夏半兩湯浸七次切焙乾上銼如麻豆每服五錢鹽水一盞半入生薑一分拍碎同煎至八分去滓溫服不拘時候茯苓湯出聖濟總録治傷寒脾胃有熱乾嘔煩滿茯苓去黑皮一兩人參二兩半夏湯洗七次切焙乾麥門冬去心焙各二兩粳米二合甘草半兩炙銼上粗搗篩每服五錢鹽水一盞半生薑一分拍碎棗三枚擘破竹葉三七片同煎至八分去滓溫服日再蘆根湯出聖濟總録治傷寒心脾虛熱乾嘔煩渴不下食蘆根銼二兩人參一兩半赤茯苓去黑皮一兩甘草炙銼半兩竹茹一兩上粗搗篩每服五錢鹽水一盞半入小麥半匙生薑半分拍碎同煎至一盞去滓溫服日再薑橘湯一名小橘皮湯出活人書治傷寒乾嘔不止手足逆冷生薑切焙陳橘皮湯浸去白焙上等分粗搗篩每服三錢鹽水一盞煎至七分去滓不計時熱服溫服栝蔞實湯出聖濟總録治傷寒中風五六日以上胸中煩乾嘔栝蔞實一兩柴胡去苗八兩黃芩去黑心三兩甘草三兩炙上銼如麻豆每服五錢鹽水一盞半煎至一盞去滓溫服蘆根飲出聖濟總録治傷寒熱病乾嘔蘆根銼半兩冬瓜皮半兩切焙上粗搗篩水三盞煎至一盞半去滓分為二服溫服之不拘時候人參湯一名大橘皮湯出活人書治傷寒後胃中虛熱乾嘔不下食人參三分生薑切焙半兩甘草炙銼一分陳橘皮去白焙半兩上粗搗篩每服五錢水一盞半去滓溫服一方棗二枚陳橘皮湯出聖濟總録治傷寒後胃氣虛熱乾嘔不止煩渴陳橘皮去白焙一兩半甘草炙銼半兩枇杷葉拭去毛一兩半薑汁炙粟米三合上粗搗篩每服五錢鹽水一盞半生薑半分拍碎同煎至一盞去滓溫服不計時候半夏湯出聖濟總録治傷寒乾嘔不下食半夏湯洗七次切焙乾蘆根淡竹茹人參麥門冬去心焙白茯苓去黑皮各一兩上粗搗篩每服五錢鹽水一盞半生薑半分拍碎同煎至一盞去滓溫服不計時候日再半夏木通湯治傷寒後胃間餘熱乾嘔不止半夏半兩湯浸七次切焙乾木通銼一兩蘆根銼一兩半柴胡去苗一兩陳橘皮去白焙半兩麥門冬去心焙半兩枇杷葉拭去毛半兩薑汁炙上粗搗篩每服五錢水一盞半入生薑一分拍碎同煎至一盞去滓食前溫服人參煮散治傷寒胃氣虛冷乾嘔不止內傷冷煩熱頭疼身不疼痛及氣虛傷寒亦宜服人參一兩芍藥白朮各三分陳橘皮湯浸去白焙乾薑炮杏仁湯浸去皮尖雙仁麩炒甘草炙銼枳殼去瓤麩炒各半兩高良薑一分上粗搗為散每服三錢鹽水一盞入生薑五片棗二枚擘破煎至七分去滓熱服並三服以稀粥投之汗出即瘥人參丸治傷寒風邪在胃乾嘔不止飲食不下人參茯苓去黑皮茯神去木丁香半夏湯洗去滑焙白扁豆各等分上搗為細末滴水為丸如桐子大每服二十丸生薑湯送下白朮湯治傷寒邪熱雖退胃中不和乾嘔不飲甚則吐逆白朮蘆根厚朴去粗皮生薑汁炙各一兩枇杷葉去毛炙半兩上粗搗篩每服三錢水一盞生薑五片煎七分去滓溫服不拘時半夏乾薑散治乾嘔吐逆吐涎沫半夏乾薑各等分上杵為散取方寸匕漿水一升半煎取七合頓服之官局桔梗湯治乾嘔桔梗半夏陳橘皮各一兩枳實半兩上為粗末每服三錢匕水一盞生薑五片煎至七分去滓服黃芩湯治乾嘔不利黃芩人參乾薑各三兩桔梗一兩大棗十三枚半夏半升上以水七升煎取三升溫分三服傷寒嘔噦附論夫傷寒嘔噦者病在足陽明胃之經也足陽明之脈厥而上行即令人氣逆氣逆則嘔噦仲景云嘔多雖有陽明證慎不可下蓋為此也又傷寒嘔噦熱在內及飲水停積所致者證既不同治亦隨異不可不察又傷寒病後胃氣不和此由初受病時毒熱氣盛多服冷藥瀉下及飲冷水病折以後熱勢既退冷氣乃動故使心下堅牢噫噦食臭腹內雷鳴而瀉利此由脾胃氣虛冷故也又云伏熱在胃令人胸滿胸滿則氣逆而噦若大下後胃中虛冷亦令致噦也傷寒噦者俗謂之咳逆者是也䭇近於噦䭇者但胸喉間氣䭇寒不得下通然而無聲也若噦則吃吃然有聲者是也聲者金也胃受疾故嘔噦也皆謂之疾但輕重有差爾虛寒相搏反飲水令汗大出水得寒氣冷必相搏其人即䭇言胃氣虛竭傷寒大吐之後極虛極汗出者其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也胃中虛冷不能食者飲水則噦即是觀之噦䭇皆胃疾可知矣經曰趺陽脈浮則為氣䭇脈滑為噦此為醫咎責虛取實之過也大抵妄下之後胃虛氣逆則成噦也經曰溫家若下之太早則噦本虛攻其熱則噦而陽明病不能食攻其熱必噦諸如此者皆下之後胃虛而噦者也然䭇者正為水寒相搏必曰小青龍湯去麻黃加附子而可矣至於噦者則又熱氣擁郁氣不得通而成者也輕者有和解之證重者有攻下之候經曰有潮熱時時噦與小柴胡者即是和解之證也噦復滿視其前後知何部不利利之則愈即可攻之候也傷寒至於噦則病以極也非若渴煩等輕緩之候如太陽中風以火劫發汗陰陽俱虛竭身體枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦是言其極也又不尿腹滿加噦者不治是為真病其若是者雖有神醫術當斯脫絶之候又何以措其手足哉傷寒熱毒氣盛多服涼藥及飲冷水病折以後熱勢既退胃氣乃虛故使胸滿氣逆心腹堅痞必嘔噦也方白朮散治傷寒後胃虛逆嘔噦不納飲食白朮二分訶黎勒一兩用皮高良薑半兩銼丁香半兩肉桂半兩去粗皮甘草一分炙微赤銼桔梗半兩去蘆頭人參半兩去蘆頭陳橘皮半兩湯浸去白瓤焙厚朴一兩去粗皮塗生薑汁炙令香熟上搗篩為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候稍熱服茯苓散出聖惠方一名赤茯苓湯治傷寒嘔噦心下痞滿胸膈間宿有停水頭眩心悸赤茯苓一兩半夏半兩湯洗七遍去滑陳橘皮一兩湯洗去白瓤焙芎藭半兩白朮半兩人參一兩去蘆頭上搗篩為散每服三錢水一盞入生薑半分煎至六分去滓不拘時溫服半夏散出聖惠方治傷寒後嘔噦心胸不利頭目昏重不下飲食半夏一兩湯浸七遍去滑甘草半兩炙微赤銼人參三分去蘆頭枳實半兩麩炒令黃前胡半兩去蘆頭訶黎勒一兩用皮上搗篩為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候稍熱服白豆蔻散出聖惠方治傷寒服冷藥過多寒氣傷胃嘔噦不止白豆蔻一兩去皮白朮一兩陳橘皮三分湯浸去白瓤焙高良薑半兩銼厚朴一兩去粗皮塗生薑汁炙令香熟甘草一分炙微赤銼上搗篩為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服陳橘皮散出聖惠方治傷寒後胃虛氣逆嘔噦不止陳橘皮一兩湯浸去白瓤焙草豆蔻半兩去皮甘草一兩炙微赤銼乾薑半兩炮製厚朴一兩去粗皮塗生薑汁炙令香熟上搗篩為散每服三錢水一中盞入生薑半分煎至五分去滓不時熱服治傷寒後胃虛嘔噦不止方出聖惠方陳橘皮半兩湯浸去白瓤焙人參半兩去蘆頭生