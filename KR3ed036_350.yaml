body:
  text: 卷三百五十産後諸疾門中風附論夫産後中風由産傷動血氣勞損臟腑其後未平復起早勞動氣虛而風邪乘虛傷之故曰中風若風邪冷氣客於皮膚經絡疼痛痹不仁若乏少氣其人筋脈挾寒則攣急喎僻挾濕則強脈緩弱若入傷諸臟腑恍惚驚悸隨其所傷臟腑經絡而為諸病又云産後中風蓋由産後五七日內強力下床或一月之內百日之中傷於房室或懷憂發怒擾蕩沖和或因灼艾傷動臟腑得病之初眼澀口噤肌肉撋搐以漸腰脊筋急強直者不可治産後血氣未完風邪中之入於經絡則發為痙其候口噤不開筋脈攣急面目喎僻至於五臟六腑則隨所中而證候出焉甚者瘛瘲直視角弓反張神志昏憒便溺遺失喑不能言又有産後汗出多而變痙者由産後血虛腠理不密故多汗因遇風邪搏之則變痙風也痙者口噤不開背強而直如發癇狀搖頭馬鳴身反折須臾十發氣息如絶宜速斡口灌小續命湯稍緩即出汗如雨手拭不及者不可治也又云産後心悶氣絶眼張口噤遍身強直腰背反偃狀如癇疾心忪驚悸言語錯亂皆是宿有風毒因産心氣虛弱發成風痙之證凡産後口噤腰背強直角弓反張皆名曰痙又曰痙當察有汗無汗以分剛柔陰陽而治之今中風口噤及角弓反張各一類其實一也凡産室但無風為佳不可衣被帳褥太暖即汗出則腠理開易於中風又時有一婦人産後遮護太密閣內更生火睡久及醒即昏昏如醉不省人事醫以愈風散佐以交加散祝云服之錯亂中必以左手搔頭覺必醒矣果如其言云方牛黃散出聖惠方治産後中風言語謇澀精神昏憒四肢急強牛黃細研天麻秦艽去苗防風去蘆天雄炮製去皮臍藁本當歸銼微炒天南星炮製各三分龍腦細研人參去蘆芎藭獨活枳殼麩炒微黃去瓤蠍尾微炒麝香細研各半兩桂心一兩金箔銀箔各五十片細研甘草半兩炙微赤銼烏蛇二兩酒浸去皮骨炙微黃上為細散同研令勻不計時候以豆淋酒調下一錢當歸散出聖惠方治産後中風手腳頑痹緩弱無力當歸銼微炒羌活附子炮製去皮臍防風去蘆薏苡仁麻黃去根節各二兩茵芋羚羊角屑菖蒲阿膠搗碎炒令黃燥全蠍微炒木香牛膝去苗柏子仁各一兩芎藭桂心各一兩半烏蛇酒浸去皮骨炙一兩麝香一分細研上為散入麝香相合令勻每服不計時候以豆淋酒調下二錢烏蛇丸出聖惠方治産後中風四肢頑痹不仁心腹疼痛烏蛇一兩酒浸去骨炙微黃釜底墨天麻牛膝去苗獨活當歸銼微黃桂心全蠍微炒天南星炮製柏子仁乾薑炮製芎藭各半兩硃砂半兩細研入藥防子一兩炮製去皮臍龍腦麝香各一分研細麻黃三錢去根節上為末入研藥令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候以溫酒下一十五丸獨活寄生湯出危氏方治産後血氣生風手足抽掣筋脈攣急時發搐搦半身不遂或因勞役太早風邪乘間而入服之立愈有痰間服加味紫石英散獨活二兩半真桑寄生無則用川續斷代杜仲切炒斷絲北細辛白芍藥桂心川芎防風去蘆甘草人參熟地黃洗大當歸各二兩上銼散每服四錢水二盞煎空心服或小續命湯加桃仁煎氣虛不和不食除地黃芎藭湯治産後中風舌強不知人芎藭一兩半防風去叉人參附子炮裂去皮臍芍藥當歸切焙鬼箭羽銼虎杖銼各半兩重牛黃別研一分甘草炙檳榔各半兩生乾地黃切焙半兩上銼如麻豆每服三錢水七分酒三分同煎至七分去滓溫服不拘時候蠶蛾散治産後中風偏邪聲音不利或只發熱昏冒筋脈攣急原蠶蛾炒陳曲各一兩桂去粗皮一分肉蓯蓉酒浸切焙麝香別研一錢防風去叉巴戟天去心白芍藥各二兩白芋生乾地黃焙丹砂別研白芷各半兩上搗研為散每服一錢生薑薄荷酒調下不拘時候羌活散治産後中風身體麻痹疼痛羌活二兩莽草微炒防風去蘆頭川烏頭炮裂去皮臍桂心赤芍藥生乾地黃麻黃去粗節銼碎萆薢銼牛膝去苗枳殼麩炒微黃去瓤當歸銼微炒各一兩上為粗散每服四錢以水酒各半中盞入生薑半分煎至六分去滓不計時候溫服小續命湯治中風及剛柔二痙血氣痹弱不能轉側兼治小兒驚風及婦人産後失血冒昧不知痛處四肢拘急麻黃制可去加葛桂心甘草各半兩炙防風去蘆三錢芍藥白朮一作杏仁人參川芎附子防己上㕮咀每服五錢水一盞半煎至一盞去滓取八分清汁入生薑汁再煎一二沸溫服日三服夜二服若柔痙自汗者去麻黃夏間及病有熱者去附子減桂一半冬及初春去黃芩陳無擇評曰凡産後汗出多便者亦令服小續命湯既汗多如何更服麻黃官桂防己黃芩輩不若大豆紫湯並大聖散佳而小續命湯加減並治剛柔二痙若柔痙自汗朱奉議有去麻黃加葛根之説必有據雖大豆紫湯大聖散良亦不可偏見曲説有妨古人之意云一方桂防風各一兩附子一枚炮人參等八味各半兩入生薑一薄片同煎名人參湯治中風口面喎斜一方薑七片棗二枚煎有熱荊芥末炒烏豆淋酒下壽星丸獨活二兩半桑寄生如無以續斷代之杜仲薑製炒細辛牛膝酒浸焙秦艽去苗茯苓白芍藥辣桂川芎防風人參當歸熟地黃淨甘草炙各二兩上細銼每服三錢薑棗煎服下痢者去地黃一方獨活芍藥熟地黃各二兩桑寄生一兩一分當歸一兩三分杜仲等十味各一兩半名獨活湯五石湯出千金方治産後猝中風發疾口噤倒悶吐沫瘛瘲眩冒不知人及濕痹緩弱身體痙妊娠百病紫石英三兩鍾乳赤石脂石膏白石英牡蠣人參黃芩白朮甘草栝蔞根芎藭桂心防己當歸乾薑各二兩獨活三兩葛根四兩上以五石為末諸藥㕮咀用水一斗四升煮取三升半分五服日三夜二一方有滑石寒水石各二兩棗二十枚四石湯治産後猝中風發疾口噤瘛瘲悶滿不知人並緩急諸風毒痹身體痙強及挾胎中風婦人百病方紫石英白石英石膏赤石脂各三兩獨活生薑各六兩葛根四兩芎藭桂心甘草芍藥黃芩各二兩上㕮咀以水一斗二升煎去三升半去滓分五服一方有麻黃黃芩各二兩獨活湯治産後中風手足頑痹角弓反張或口噤不語獨活生薑各五兩防風秦艽桂心白朮甘草當歸附子各二兩葛根二兩防己一兩上㕮咀以水一斗二升煮取三升去滓分三服不計時候知母湯治産後中風煩悶發熱渴燥頭痛目昏身體拘急知母獨活去蘆頭葛根銼白朮各三兩甘草炙石膏桂去粗皮芍藥防風去叉各二兩半夏生薑汁製半兩上粗搗篩每服三錢水一盞酒少許入生薑半分切同煎至七分去滓溫服不拘時候一方無葛根名石膏湯人參湯療産後中風心忪悸志意不定恍惚語言謇澀人參六分羚羊角屑麥門冬茯神各八分黃芩白蘚皮甘草各四兩石膏十二分上㕮咀以水二大升煎至七合下竹瀝二大合分三服甘草湯治在蓐中風背強不得轉動名曰風痙方甘草乾地黃麥門冬麻黃各二兩栝蔞根芎藭黃芩各三兩銼碎杏仁五十枚上㕮咀以水一斗五升合煮葛根取八升去滓納藥煮取三升去滓分再服一劑不瘥更服良一方有前胡三兩芎藭散治産後體虛中風四肢煩疼腹內㽱痛芎藭附子炮製去皮臍琥珀生乾地黃當歸銼炒羌活桂心赤芍藥各一兩枳殼半兩麩炒微黃去瓤川椒半分生薑一兩上為粗散用羊肉二斤蔥白二七莖以水五升煮取汁三升每用肉汁一中盞藥末四錢煎至六分去滓不計時候溫服羚羊角散治産後中風發熱面赤氣喘頭痛羚羊角屑生乾地黃漢防己當歸銼微炒桂心各一兩石膏麻黃去根節各二兩甘草半兩炙微炒銼上細銼每服四錢以水一中盞入竹葉二七片生薑半分煎至六分去滓不計時候溫服烏金煎治産後中風言語謇澀心神恍惚筋脈不利黑豆炒一升天麻羚羊角屑防風去蘆頭赤茯苓羌活桂心酸棗仁微炒生乾地黃各二兩上細銼以水八升煎至三升絞去滓更熬成膏每服不計時候以溫酒調下一匙石斛浸酒方治産後中風四肢緩弱舉體不仁石斛二兩去根附子炮製去皮臍牛膝去苗茵芋桂心芎藭羌活當歸銼微炒熟乾地黃各一兩上細銼用絹袋盛以清酒一斗浸三日每服不計時候暖一小盞服之防風湯治産後中風背急短氣防風獨活葛根各五兩當歸芍藥人參甘草乾薑各二兩上㕮咀以水九升煮取三升去滓分三服日三一方有干桑葉無干薑名人參湯羚羊角湯療産後腹中堅硬兩脅膈脹手足冷心中熱欲飲水乾嘔關節勞痙中風之疾羚羊角二分防風十二分羌活苦梗敗醬各八分桂心柴胡大黃浸過各六分上以水二升煎取八分空心二服畢即吐良久更服當歸湯治産後中風半身手足不遂言語謇澀恍惚精神不定川獨活當歸芍藥防風川芎玄參各一兩桂心二分半上細銼以水八升煮取二升半為三服覺效更作一劑漸瘥須適寒溫將息如不瘥即以此方作丸每服二十丸一方用天麻二分有熱加乾葛五兩有冷加白朮五兩有氣加生薑六分手足不遂加牛膝五分萆薢二兩黃耆四兩腹痛加當歸芍藥各三分不食加人參四分玄參四分若寒中三陽所患必冷小續命湯加生薑汁煎若暑中三陰所患必熱小續命湯去附子減桂心一半加薄荷增損柴胡湯治産後經水適斷感於異證手足牽搐昏冒恍惚柴胡八錢黃芩四錢半人參半夏各三錢甘草炒石膏各四錢知母二錢黃耆五錢上為粗末每服用生薑半兩大黑棗四個水一盞半煎至一盞溫服無時秦艽湯前證已去次服此以去風邪秦艽八錢芍藥半兩柴胡八錢防風黃芩各四錢半人參半夏各三錢甘草炙四錢上為粗末每服七錢水一盞煎至七分溫服無時二三日經水復行前證退宜服荊芥散小柴胡湯外仍加荊芥穗五錢枳殼五錢麩炒去瓤同小柴胡湯煎服二三日後脾胃自復大續命湯治婦人産後中風猝然喑啞及治偏枯賊風麻黃去根節煎掠去沫焙乾八兩石膏四兩桂去粗皮乾薑芎藭各二兩當歸切焙黃芩去黑心各一兩杏仁三十枚去皮尖雙仁炒上㕮咀每服五錢以水一盞半煎取七分去滓又入荊瀝半合再煎數沸溫服能言未瘥服小續命湯方見本門竹葉湯治産後中風發熱面赤氣喘頭目昏痛淡竹葉葛根人參防風去叉各一兩桔梗二兩炒一作苦梗甘草炙半兩附子大者一枚炮去皮臍桂去粗皮半兩上銼如麻豆每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候千金方用大棗煎一方嘔者加半夏一方無附子獨活煮散治産後中風獨活去蘆頭一兩當歸切焙三分芍藥炒半兩芎藭秦艽去苗土桂去粗皮生乾地黃焙各三分黑豆二合上㕮咀每服五錢水一盞半生薑三片同煎至八分去滓溫服日二濟危上丹夫産後中風者五七日內強力下床或月未滿而行房傷於血室或懷蕩沖和或因火驚惕臟腑得病初時眼澀口噤肉搐以漸腰背強直此候難治是自作招風中疾或血下過多虛極生風氣無所主唇青肉冷汗出目眩神昏命在須臾若以風藥治之則誤矣乳香五靈脂硫黃太陰玄精石細研陳皮桑寄生真阿膠卷柏子各等分上同研不入鐵器內微火焙乾為細末用生地黃汁煮糊為丸如梧桐子大空心溫酒或當歸酒吞下二十丸一方不用阿膠小柴胡湯治婦人在蓐得風致四肢苦煩皆自發露時若頭疼服此方柴胡半夏各半斤人參甘草各三兩大棗十二枚生薑二兩黃芩三兩上㕮咀以水一斗二升煮取六升去滓每服一升日進三服若頭不痛但煩熱與後方三物黃芩湯三物黃芩湯治婦人草蓐中傷風四肢煩苦宜與小柴胡湯頭不疼但與此藥耳黃芩苦參各二兩乾地黃四兩上㕮咀以水八升煮取一升去滓適寒溫服一升日二多吐下蟲川芎湯療産後中風身背拘急如束並渴川芎羌活羚羊角屑酸棗仁芍藥各四兩桑白