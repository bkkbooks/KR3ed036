body:
  text: 卷三百三十二婦人諸疾門總論夫濟世之道莫先於醫論醫之難濟陰猶急何則婦人之病比之男子十倍難療或云七症八瘕九痛十二帶下共三十六病雖有名數莫詳症狀推原其理莫非血病多因經脈失於將理産蓐不善調護內作七情外感六淫陰陽勞逸飲食生冷遂致榮衛不輸新陳干忤隨經致濁淋露凝滯為症為瘕流溢穢惡痛害傷痼以致所患不一而止犯時微若秋毫感病重於山嶽是也故女子十四而天癸至天謂天真之氣降癸為壬癸水名故云天癸而衝任脈主之衝任者血之海也月水者經絡之餘也蓋婦人以血為本心主血肝行血榮衛四體如環無端灌注百脈余者為月候以時而行若水溢自流不自知覺故纖疴不作而氣體充盛而有子矣其有來多不斷或過期不來或未期而先來參錯不一而病生當其來時則一二日之前腰腹滿痛或頭疼作熱百節攣急甚於重患過此則發為虛熱自汗加以五心內熱遂為虛勞血少水涸燥氣乘肺則為咳嗽宿寒留滯血與氣搏則為腹痛敗血結塊時發寒熱則為癥瘕或風寒濕滯經血化為水流溢四肢謂之血分脾不能制血與水並浮脹肌肉為之虛腫或衝任氣血內欲過度風邪冷熱之氣入於胞門穢液與血兼下冷則多白熱則多赤冷熱不調赤白相半成為赤白帶下若衝任勞損經海動傷脾虛胃熱不能約制其血倏然暴下故謂崩中漏下所下五色各應五臟五臟俱虛五色並下以致眩暈煩悶嘔惡怔忡迷亂多忘發狂妄語小便不禁是皆血之為病也復有生於嬌貴之家愛憎在念而氣逆於中故氣有一息不行血有一息不運則胸腹脹痛眩暈嘔噦倦乏不自勝持飲食不為肌膚致成重患治療之際調氣為上調經次之斯可為定法血氣和平陰陽調順則精血聚而胞胎成胞胎已成而心腎二脈其動也應手而疾蓋心之所主者血腎之所主者精精血交併而成胎精勝則為男血勝則為女此亦自然之理也血氣不調陰陽愆伏過於陽則經脈前期而至過於陰則經脈後期而至蓋血得熱則宣流得寒則凝澀陰氣乘陽內寒血澀故其來乍少陽氣勝陰血熱流散故其來乍多過不及皆致病也經脈不行其候有二一則血氣盛實經脈遏閉其脈滑實見之當通經宣利一則風冷內傷七情內賊以致經絡痹滯其脈浮澀見之當解散風冷去瘀生新經絡不行此諸病之所由生也夫婦人乃衆陰所集常與溫居貴乎血盛氣衰血盛氣衰是謂從從則百疾不生血衰氣盛是謂逆逆則災害戾至且婦人嗜欲多於丈夫生病倍於男子及病也比男子十倍難療尤不可不考者四時節氣喜怒憂思飲食房勞為患者與丈夫同也夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣則風寒乘虛而干之或作之於經絡或循入於腹中內受風邪脾胃虛弱故不能消於飲食也食既不充榮衛凝澀肌膚黃燥而不光澤若大腸氣虛則變為下痢若流入關元致絶子嗣隨其所傷而變成疾醫經曰凡婦人三十六種病皆由子臟冷熱勞損而挾帶下起於胞內是故衝任之脈為十二經之會海婦人之病皆見手少陰太陽之經而候之內經曰百病皆生於氣經有所謂七氣有所謂九氣喜怒憂懼悲恐驚者七氣也七情之外益之以寒熱二證而為九氣也氣之為病男子婦人皆有之惟婦人血氣為患尤甚蓋人身血隨氣行氣如壅滯則血與氣並或月事不調心腹作痛或月事將行預行作痛或月事已行淋瀝不斷心腹作痛或連腰脅或引背膂上下攻刺吐逆不食甚則手足搐搦狀類驚癇或作寒熱或為癥瘕肌肉消瘦非特不能受孕久而不治轉而為瘵疾者多矣婦人室女有生平無病一旦忽感手足搐搦之症痰涎壅塞精神昏憒不省人事往往醫者便作癇症治之非也殊不知婦人室女以肝氣為主蓋肝乃血之府庫肝既受病經候愆期或多或少或閉斷不通胞宮堙塞隨其虛實而生病焉婦人多由血氣虛七情所感而生風女子血氣實七情所感而生熱邪乘四肢是以卒然手足搐搦狀類癇症也治療之法先宜多進蘇合香丸溫酒化服以快其氣候其蘇醒亟亟調經調經之法塞者通之通者調之虛者與之實者取之婦人宜服白薇丸女子宜服澤蘭丸多服以病退為期也具此陰陽有此血氣氣陽也血陰也男以陽為主則陽勝乎陰女以陰為主則陰勝乎陽氣血之為病男女則同耳人皆知百病生於氣又孰知血為百病之始乎血猶水也水行乎地中百川理則無壅遏之患矣人之血脈或凝滯於經絡腸胃之間百病由此而根矣乍寒乍熱發黃發狂譫妄驚狂煩悶嘔惡凝痰自汗悶熱虛勞尿淋崩漏吐衄咳唾以至眩暈厥冷昏憒迷忘塊痛瘀疼起止遺溺凡此數症非血而何經所謂先去其血然後調之良有以也夫血得寒則閉澀得溫則宣流榮氣虛竭風冷交侵固易為虛勞月閉之症其若出血等類大抵多因蓄熱治之榮道亦開鮮血亦為之不禁矣川芎當歸血中上藥也出血諸症每每以胃藥收功蓋心主血肝藏血胃者又所以生其血而能使其氣歸元故其血自止經不云乎血隨氣行氣逆則血逆於此尤當加意素問曰目得血而能視耳得血而能聽指得血而能攝掌得血而能握足得血而能步髒得血而能液腑得血而能氣然血所流通則氣亦然也氣血充行其中便自清利而應機能用矣故素問云氣血人之神也不可不謹調護然婦人以血為基本也夫婦人之病手太陽小腸手少陰心之經絡為表裡任沖之脈起於中極之下以上毛際循腹裡上關元至咽喉頤循面目帶脈過臍而止以婦人月水一月一來如期謂之月信如期不來則風熱傷於經絡故血在內不通或內受邪熱脾胃虛損不能飲食食既不充榮衛凝澀肌膚黃燥面不光澤或大腸虛變為下痢流入關元致絶子嗣而子臟冷虛勞損而病帶下起於胞內夫帶下之主造化但分經絡標本殊異為病之本氣也其病所發正在過帶脈之分而淋瀝以下故曰帶下也赤白之説者無定也又曰頭目昏眩口苦舌乾咽嗌不利小便赤色大小便祕澀滯脈實而數者皆熱症也凡白帶下者亦皆有之為病寒也素問亢則害承乃制謂亢過極而反兼已勝之化制其甚也如火鍊金熱極則反化為水六月熱極則物反出液而濕潤林木流津故肝熱極則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾大凡物類以煎熱湯煮極則沸溢及熱氣熏蒸於物而生津液也故下部任脈濕熱甚者津液湧而溢出為帶下俗醫見白帶下者但依方論而用辛熱之藥雖有偶中致令鬱熱氣不能宣通舊病轉加世傳誤之久矣寡婦之病自古未有言者惟倉公傳於諸症略為論及言寡者孟子所謂無夫曰寡是也如師尼喪夫之婦獨陰無陽欲男子而不可得是以懨懨成病也易曰天地絪縕萬物化醇男女媾精萬物化生孤陽獨陰可乎夫既處閨門欲心萌而不遂陰陽交爭乍寒乍熱有類瘧疾久則為勞又有經閉白淫痰逆頭風膈氣痞悶面皯瘦瘠等症皆寡婦之病診其脈獨肝脈弦出寸口而上魚際究其脈原其疾皆血盛而得經云男子精盛則思室女人血盛則懷胎覘其精血思過半矣婦人血海挾受風邪不換金正氣散加川芎官桂主之以至眩暈煩悶嘔惡怔忡迷亂多至於發狂妄語小便不禁此婦人以血受病最多而血之為病遇夜愈增劇也血屬陰陰虛則爭故濟生拔粹云婦人童女至天癸未行之先皆屬少陰天癸既行皆從厥陰論之天癸既絶乃屬太陰經也治胎産之病從厥陰無犯胃氣及上二焦謂之三禁不可汗不可下不可利小便發汗者同傷寒下早之症利大便則脈數而已動脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和而熱止矣如發渴而白虎氣弱則黃耆血刺痛而用當歸腹中疼而加芍藥大抵産病天行從增損柴胡雜症從增損四物宜詳察脈症而用之月水不調附論岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣降癸謂壬癸之水名故云天癸也然沖為血海任主胞胎腎氣全盛二脈流通經脈漸盈應時而下所以謂之月事者平和之人常以三旬一見以象月盈則虧也若遇經脈行時最宜謹慎如將理失宜似産後一般受病輕為宿疾重可死矣蓋行經則血氣錯亂經脈忽然不行逆於身則為血分停滯等疾若其時勞力則生虛熱變為疼痛之根若暴怒則氣逆氣逆則血逆逆於腰腿則遇經行時腰腿痛重過期即安也逆於頭腹心肺背脅手足之間則遇經行時其症亦然若怒極則傷肝而有眩暈脅痛嘔血瘰癧癰瘍之病加之經血滲漏於其間遂成竅穴淋瀝無有已也凡此之時中風則病風感冷則病冷久而不愈變症百出不可言者所謂犯時微若秋毫感病重如山嶽可不畏哉夫飲食五味養筋髓骨肉肌膚毛髮男子為陽陽中必有陰陰中之數八故一八而陽精溢女子為陰陰中必有陽陽中之數七故一七而陰血升二七而陰血溢皆飲食五味之靈秀也方其升也知慮開明齒牙更始發黃者黑筋弱者強暨其溢也凡充身體手足耳目之餘雖針芥所歷無所不周凡子形肖父母者以其血經嘗於父母之身無所不歷也是以父一肢廢而子一肢不肖其父母一目虧則子一目不肖其母然雌鳥牝獸無天癸而成胎何也鳥獸精血往來尾閭也精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已萎而思色以降其精則精不出而內敗小便道澀而淋精已耗而復竭之則大小便道牽痛愈疼則愈欲大小便愈便則愈疼女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血瘀行或漬而入骨或變而成腫或歡合而難合男子多則瀝枯虛人産乳衆則血枯殺人觀其精血思過半矣大率治病先調其所主男子調其氣女子調其血氣血人之神也不可不謹調護然婦人以血為基本氣血宣行其神自清所謂血室不蓄則氣和血不凝結則水火相形月水如期謂之月信不然血凝成孕此乃調燮之常其血不來其因風熱傷於經血而不通或外感風邪內受邪熱脾胃虛弱不能飲食食既不充榮衛抑遏肌膚黃燥面無光澤時發寒熱腹脹作痛艱於子息子臟冷熱久而勞損必挾帶下便多淋瀝忽致崩漏經云腹中如塊忽聚忽散其病乃症血痼不流而搏腹脹而作寒熱此乃成瘕或先後爽期雖通而或多或寡究病之源蓋本如此論曰經者常候謂候其一身之陰陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於陰則後期而至其有乍多乍少斷絶不行崩漏不止亦由陰陽衰盛寒熱為邪夫婦人月水不調由勞傷氣血致體虛風冷之氣乘也若風冷之氣客於胞內傷於衝任之脈損乎太陽少陰之經衝任之脈皆起於胞內為經脈之海手太陽小腸之經手少陰心之經也此二經為表裡主上為乳汁下為月水然則月水是經絡父母之身無所不歷也則月水是經絡之餘也若冷熱調和則衝脈任脈氣盛太陽少陰所生之血宣流依時而下若寒濕乖適經脈則虛若有風冷虛則乘之邪搏於血或寒或熱或濕則血結燥則血消故月水乍多乍少為不調也仁存方云許學士云治婦人病多是月經乍多乍少或後或前時發頭疼醫者一例呼為經病不曾説得陰勝陽陽勝陰服藥所以少效蓋陰勝陽則胞寒氣冷血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽勝陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前若能知其陰陽調其氣血使不相勝以平為福聖濟總録云月水不調者經脈或多或少或清或濁或先期而來或後期而至是也蓋由失於調養而衝任虛損天癸之氣乖於常度故內經曰任脈通太衝脈盛月事以時下言其有常度也危氏得效云二七天癸至七七天癸竭行早性機巧行遲魯鈍通行則陰陽和合始能生子年十四歲當行二十歲不行命如風燭朝不保暮有病發則死間有不死百中無一亦令一生多病未嘗一日安裕然有四季行亦可又有一年一次者亦不甚佳或一生不循正道而行者晚年有疾病則難治應驗云夫女子十四則月水行男子十六則陽精溢此皆合乎陰陽之數各及其時故男子之精氣宜盛女子之月水宜調調經之道貴乎耗其氣以行其血血盛氣變是謂之從從則百病不生孕育無損矣且婦人之病四時所感六淫七情所傷悉與男子治法一致惟胎前産後七症八瘕崩漏帶下之症為異故所著方究其所因多由月水不調變生諸症大概婦人之病以經脈如期為安或有愆期當審其冷熱虛實而調之先期而行者血熱之故也法當清之過期而行者血寒故也法當溫之然又不可不察其有無外邪為之寒與熱而後投藥也夫血者陰物也象月盈虧應時而至故謂之月水女子衝任氣血經絡不和其血應至而未至未應至而先至或斷或續或多或少血色有異是月水不調之症也方菴䕡子散出聖濟總録治婦人血氣不調經脈不定腹脅多脹或五六月一來三二月一來雖來色如煮小豆汁其血復少者菴䕡子一兩一分瞿麥穗檳榔銼牡丹皮當歸切炮甘草炙銼射干木香吳茱萸湯浸焙炒各三分桂去粗皮桃仁湯浸去皮尖雙仁炒黃十二枚鱉甲去裙襴醋炙牛膝酒浸焙切蒲黃赤芍藥大黃銼炒熟乾地黃焙各一兩黃芩去黑心一兩半水蛭微炒一分上為散每服一錢日再稍加至二錢溫酒調下以效為度乾地黃丸出聖濟總録治婦人月水不調或一月再來或隔月不來或多少淋瀝不斷腰腹刺疼痛不可忍四體虛弱不能飲食心腹堅痛不欲行動體重嗜臥好食酸物熟乾地黃一兩半蒲黃牛膝酒浸切焙赤芍藥乾薑炮黃芩去黑心牡丹皮蜀椒去目併合口炒出汗白芷桑耳炒澤蘭葉蟅蟲微炒二十枚桃仁去皮尖雙仁炒黃一兩甘草炙銼芎藭當歸切焙人參丹參各三分虻蟲去翅足糯米同炒米熱去米三十五枚水蛭炒三十五枚上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下漸加至二十五丸一方有桂心名乾地黃當歸丸安息活血丹出和濟方治衝任不足下焦久寒臍腹㽱痛月事不勻或來多不斷或過期不來或崩中下血或帶下不止面色萎黃肌肉瘦瘁肢體沉重胸脅脹滿氣力衰乏飲食減少一切血氣虛寒並用服之吳茱萸湯浸七遍焙乾微炒柏子仁炒木香各二十兩安息香搗碎入好酒研取去渣銀器內慢火熬成膏山茱萸去核延胡索桃仁去皮尖麵炒微黃色虎杖當歸杜仲去粗皮銼炒附子炮去臍皮澤蘭葉乾薑炮肉桂去粗皮艾葉微炒黃黃耆去蘆牡丹皮各二斤半肉蓯蓉酒浸焙厚朴去粗皮薑汁炙令熱各五斤上為細末以前安息香膏入白麵同煮作糊丸如梧桐子大每服二十丸食前溫酒下醋湯亦得禹餘糧丸一名紫石英丸出醫方大成論曰經者常候謂候其一身之陰陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於陰則後期而至其有乍多乍少斷絶不行崩漏不止亦由陰陽盛衰寒熱為邪詳説於下若經候乍多乍少或前或後臍腹時痛面色不澤久不治之漸至虛損俱令人斷産變生他病若治婦人諸病補暖下元然當知諸病皆因經候不調陰陽相勝所致若陰氣乘陽則胞寒氣冷血不通行經所謂天寒地凍水凝成冰故令乍少而在月後經候若陽乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前須知其陰陽調其血氣則百病不生矣桂去皮龍骨川烏頭炮禹餘糧燒醋淬人參紫石英桑寄生杜仲去皮炒五味子遠志去心澤瀉當歸切洗焙石斛去根蓯蓉乾薑各一兩牡蠣燒甘草炙川椒去目炒出汗各二兩半上為細末煉蜜和丸如梧桐子大米飲下二十丸加至三十丸日三牡丹丸出聖惠方治婦人月水不調或一月再來或隔月不來又或多或少淋瀝不斷或青或黃或黑或清水腰腹刺痛四肢虛弱心腹堅痛舉體沉重時或懶倦欲飲而不欲食漸加羸瘦牡丹皮生乾地黃各一兩當歸三分銼微炒蒲黃一兩牛膝三分去苗琥珀一兩桃仁一兩湯浸去皮尖雙仁麩炒微黃赤芍藥三分菴䕡子一兩川椒一兩去目及閉口者微炒出汗水蛭半兩炒令微黃乾薑三分炮裂銼澤蘭一兩蟅蟲三七枚微炒黃芩三分桑耳三分芎藭三兩虻蟲炒半兩炒微黃去翅足上為末煉蜜和搗三五百杵丸如梧桐子大每日空心及晚食前以溫酒下三十丸牡丹皮湯出保慶集方治婦人經水不調腰背疼痛食物不得牡丹皮白芷桑耳訶黎勒皮煨代赭石碎龍骨去土當歸切焙各一兩半黃連去須黃耆炙銼地榆鹿茸去毛酥炙各一兩一分蒼朮米泔浸切焙附子炮製去皮臍各一兩杏仁去皮尖雙仁炒令黃十五枚肉豆蔻去皮二枚黃芩去黑心半兩上㕮咀如麻豆大每服五錢水一盞半入生薑五片煎取八分去滓溫服調經散行血氣當歸一兩酒浸芎藭半兩紅花三錢斑蝥去翅足水蛭二錢炒虻蟲二錢去翅足紅娘子一錢去翅足牡丹皮半兩赤芍藥半兩白芷三錢蓬莪朮二錢桂三錢白薑生地黃乾漆川牛膝各二錢上每服八錢水煎酒半盞煎至八分空心服如小便癃閉不通用甘草湯解三日三服勝金丹治婦人一切子宮久冷臍腹疼痛月經來期前後不一病證多端並宜治之常服調經順氣暖胎逐積進美飲食功效甚多難以盡述吳茱萸湯一名茱萸虻蟲湯出千金方治婦人經血多寒月水不調或多或少吳茱萸湯浸七遍炒焙乾微炒二兩半小麥淘淨桂去粗皮半夏湯浸七宿炒黃各二兩生薑切炒三兩大棗去核炒十枚人參芍藥各一兩甘草炙水蛭糯米少許同炒米熱去米蟅蟲微炒虻蟲去翅足牡丹皮牛膝切浸切焙各半兩桃仁湯浸去皮尖雙仁麩炒黃