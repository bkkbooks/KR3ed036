黃醋炙官桂去粗皮芫花土器內醋炒黃色芍藥各半兩上杵細羅為末每服三錢水一盞同煎至八分食後和滓吃以經候通為度經候既行即不必吃也若吃此藥了大腑已冷而經候未通即住藥數日候臟腑堅牢即再吃甘草治室女經十六十七歲無經候通行兩腳痛行不得肌肉消瘦上焦壅大熱腑乾澀頭痛眼昏牡丹皮去心當歸芍藥牛膝桃仁去皮尖大黃醋煮官桂川芎各一分半夏二銖上杵細羅為細末每服二錢熱湯半盞入藥末童子小便半盞煎一兩沸空心和滓吃土器內煎治室女十六十七歲未有經候通行上焦壅熱肌肉消瘦肉色或通身黃或通身黑大腑熱小便黃赤五心煩躁漸欲成勞宜服此藥荊芥穗連翹牡丹皮去心射干大黃醋一碗煎乾二分前胡柴胡各去毛桃仁去皮尖虎杖麻黃去根杏仁各一分細辛二銖上杵細羅為末每服三錢以熱湯半盞對童子小便半盞入藥末同煎一兩沸食後和滓服經候通不必吃治腎氣虧弱不能生肝肝氣虧乏不能生血經候多少遲速不節不能懷孕孕後墮胎衝任脈關尺俱微細宜吃此補肝腎方當歸杜仲去粗皮石斛去頭白芷五味子川芎人參蘄艾葉澤蘭續斷木香各一分川椒細辛三銖上杵細羅如飛塵煉蜜丸如梧桐子大早朝空心鹽湯下三十丸調經湯治衝任脈虛風寒客搏氣結凝滯每經候將行臍腹先作痛或小腹急脹攻注腰腳疼重欲行時預前五日及經斷後五日並宜服之當歸洗焙半夏湯洗七次甘草炙麥門冬去心五加皮熟乾地黃炒焙川芎吳茱萸湯洗七次肉桂去粗皮牡丹皮赤芍藥烏藥人參去蘆頭紅花以上十四味各一兩沒藥半兩炒研上㕮咀每服五錢水一盞半薑三片煎至一盞去滓食前溫服禹餘糧丸治月水乍多乍少或前或後生地黃一兩禹餘糧白朮芍藥當歸續斷各半兩上為細末煉蜜丸如梧桐子大每服三十丸米飲下未知加至五十丸偏少者加當歸芍藥各一兩偏多者倍續斷地黃絶産者加蓯蓉一兩腹痛者加蒲黃芒硝各半兩升陽除濕湯治經水不調如右尺脈按之空虛是氣血俱脫大寒之症輕手按其數疾舉指弦緊或滯澀皆陽脫之症陰火亦亡見熱症於口鼻此皆因躁陽欲去也當溫舉之升之浮之燥之此法當大升浮血氣切補命門之下脫也柴胡根三錢根者截苗去處便是在地栽之下不是在深處細根羌活二錢藁本去土三錢白朮三錢紅花五分當歸根三錢桃仁湯浸去皮尖十個細研川芎一錢肉桂去皮盛夏勿用秋冬月半錢細辛根六分熟乾地黃一錢水中沉者是人參二錢去蘆白芍藥半錢防風根二錢黃耆三錢味甘者加獨活根一錢半有鬼眼者佳黑附子炮製去皮臍三錢炙甘草梢子一錢尖細處是也上㕮咀每服稱三錢或二錢若病勢甚當漸漸加之至半兩止每服水三盞煎法如常空心服之暖宮丸出楊氏家藏方治衝任脈弱經候不調因成帶下妊娠不牢久無子息日漸羸瘦手足煩熱變骨蒸並宜服之常服大益氣血當歸洗焙二兩續斷藁本去土吳茱萸湯浸焙乾七遍五味子人參去蘆頭白茯苓白朮綿黃耆蜜炙川芎香白芷縮砂仁乾薑萆薢酒浸一宿以上十三味各一兩石斛三兩去根稱牡蠣煅通紅研細稱香附子炒熟乾地黃洗焙山藥菟絲子好酒煮軟焙七分干砂盆研焙乾稱羌活去蘆頭白龍骨細研以上七味各二兩茴香一兩半炒研山茱萸去核半兩延胡索川椒半兩炒上為細末煉蜜為丸如梧桐子大每服五十丸溫酒或醋湯送下空心食前服養血丸出楊氏家藏方補血海療虛弱調經候快三焦進飲食久服令人肥盛有子大治月事阻滯腹脅作痛或結堅塊面黃發落時發寒熱身羸瘦牡丹皮白芍藥卷柏當歸洗焙石斛白茯苓去皮巴戟去心熟地黃洗焙肉蓯蓉酒浸一宿切焙乾杜仲去皮炙山藥柏子仁別研白薇枳殼去瓤麩炒黃色蒲黃微炒肉桂去粗皮荊三稜煨香切蓬莪朮煨香切枸杞子覆盆子以上二十味各一兩附子炮去皮臍半兩上杵為細末煉蜜為丸如梧桐子大每服五十丸酒或米飲送下空心食前服固經丸出楊氏家藏方治衝任虛弱月候不調來不斷淋瀝不止艾葉醋炙炒鹿角霜乾薑炮伏龍肝各半分上杵為細末熔鹿角膠和藥乘熱丸如梧桐子大每服五十丸淡醋湯下空心食前服益真鹿茸丸出楊氏家藏方治衝任俱虛血海久冷經候不調肌體羸瘦飲食減少石斛牛膝酒浸一宿焙肉蓯蓉酒浸一宿焙紫石英鱉甲醋炙續斷柏子仁五味子覆盆子黃耆蜜炙巴戟去心十味各一兩安息香酒熬去砂石鹿茸酒炙沉香三味各半兩山藥三分上杵為末煉蜜丸如梧桐子大每服五十丸酒鹽湯或糯米飲送下空心紫桂丸出楊氏家藏方治補益血海治衝任氣虛經候不調或多或少腰疼腹痛冷帶崩漏禹餘糧火煅醋淬七遍三兩龍骨艾葉醋炒牡蠣燒赤石脂地榆各二兩厚朴薑汁製炒牡丹皮阿膠蛤粉炒成珠子香白芷當歸洗炒吳茱萸浸七遍微炒肉桂去粗皮各一兩附子炮去皮臍半兩上為細末糊丸如梧桐子大每服三十丸濃艾葉醋湯空心食前溫服防風散出朱氏集驗方治女人經脈不勻氣血壅滯肺有風熱遂令遍身癮疹紅紫成片肌肉頑痹皮膚粗澀或時瘙癢北防風川當歸赤芍藥牛蒡子各一兩炒荊芥穗一兩二錢蟬殼七錢半去土生地黃香白芷甘草白附子白殭蠶去絲何首烏烏蛇肉浸去皮骨焙乾各半兩紫參上杵為細末每服三錢加至四五錢溫酒調下如不飲酒以蜜湯調服終不若酒之功四物湯出淡療方調益榮衛滋養氣血治衝任虛損月水不調臍腹㽱痛崩中漏下妊娠將理失宜胎動不安血下不止及産後乘虛風寒內搏惡露不下等症熟乾地黃浸洗如丸蒸九曝法制尤妙當歸切去蘆銼微炒白芍藥川芎各一兩上為粗散三錢水一盞半煎至八分去滓空心食前服經血凝滯腹內血氣作痛加莪朮官桂名六合湯一方以地黃殢血不能止痛不若只用五味婦人心腹㽱痛不可忍者去地黃加乾薑名四神湯治下血不止及妊婦胎動不安加艾十葉阿膠一片同煎或加熟艾甘草阿膠黃耆等名作膠艾湯産後血搏口乾煩渴加栝蔞麥門冬兩脅脹滿加厚朴枳實虛煩不得臥加竹葉人參大渴煩燥加知母石膏同煎易簡方糾繆云四物湯乃婦人要藥今不明其要妄肆臆説亦由囂薄採賣之家不曾依法用酒九蒸九曝以制地黃蓋生則性平而宣熟者性溫而補若蒸曝遍數足決然成功正易簡方乃用當歸川芎芍藥人參乾薑甘草等分每服四錢水一盞煎至六分熱服名增損四物湯治婦人血氣不足四肢怠惰乏力少氣兼治月候下血過多榮衛虛損等症加減四物湯出朱氏集驗方治經候不調腹中疼痛或腳氣衝心四物湯加琥珀煎見效並醋一合煎力效治一切婦人內失將養經候失調骨內積熱虛實不等非時上焦發熱忽至夜渾身發熱非時背膊勞倦似病不病忽時煩躁精神不安宜服此調宮臟解勞氣方只用經候行時吃若經候已止即住此藥吃後方藥經候復行即住後方藥仍吃此藥二者觀臟腑進服出護命方桑寄生延胡索鱉甲醋炙當歸各半兩續斷芫花醋炒黃色石斛川芎木香各一分上藥先制芫花一味研為細末所餘衆藥杵羅為末相合令勻每服二錢用澗內水一盞煎兩三沸溫和去滓空心吃忌甘草治婦人骨蒸積熱內失將養經候不調變成勞候非時發熱勞倦不安將此藥對前面方藥服若經候行即住此藥不吃若經候止安定數日仍進此藥出護命方麻黃去根柴胡去毛鱉甲醋炙前胡去毛紫菀杏仁去皮尖枳殼只用青天靈蓋酥炙黑色桔梗去毛各一分上為細末每服三錢水一盞生薑二片同煎取三兩沸食後臨臥去滓溫服伏龍肝散出永類鈐方治血氣勞傷衝任脈虛經血非時注下或如豆汁或成血片五色相雜臍腹冷痛經久不止十味養榮湯出朱氏集驗方治婦人血氣不足臍腹㽱痛月水不調熟地黃酒洗黃耆蜜炙各二兩半牡丹皮炒五味子肉桂去皮白芍藥炒白茯苓各一兩當歸酒浸川芎各二兩半甘草七錢炙上㕮咀煎服治婦人月經不調腹中結塊及崩中淋露産後血暈暴血衝上因損下血出本草以延胡索酒磨或煮服
