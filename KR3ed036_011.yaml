body:
  text: 卷十一運氣圖甲辰歲圖太陽寒水司天太陰濕土在泉中見太宮土運歲土太過氣化運行先天太宮下加太陰太過而加同天符又土運臨辰是謂歲會氣之平也平土之歲命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其谷稷其果棗其實肉其蟲倮其畜牛其物膚其色黃其味甘其音宮其數五其在人也其藏脾其主口其養肉其病否此歲運所主也天地之氣寒化在上左動化右清化故天政所布其氣肅甘化在下左明化右灼化故地氣靜而其令徐水土合德上應辰星鎮星其谷玄黅寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢歲半之前太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後太陰主之太陰之化從本雨濕甚者地氣之應也寒化六濕化五是謂正化之日倮蟲育鱗蟲靜是謂歲物所宜鱗蟲不成燥毒不生是為地氣所制平土之歲本不資化源以運與地氣臨於戌歲有三土天令甚虛宜資化源以助於水所謂抑其運氣扶其不勝無使暴過而生其疾也食玄黅之谷以全其真避歲之虛邪以安其正以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒濕化宜燥熱治之常也初之氣自癸卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見土運少陽中治以行春令地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陰火中見土運火能生土土能生金氣位相和陽反化草乃生乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣太陰土中見土運氣與運同符地氣正濕令行陰凝太虛埃昏郊野民乃悽慘寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪是氣也不可犯涼司氣以涼故也歲氣雖平或有邪氣則中執法經曰中執法者其病速而危也乙巳歲圖厥陰風木司天少陽相火在泉中見少商金運歲金不及氣化運行後天諸同正歲氣化運行同天風化行於上左灼化右藏化故天氣擾而其政撓苦化司於地左素化右柔化故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太者其耗文角品羽風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復行於中熱化寒化勝復同所謂邪氣化日也風化八清化四火化二所謂正化度也毛蟲靜羽蟲育是乃歲物所宜介蟲耗寒毒不生是乃地氣所制然木為天氣火為地氣金運在中地氣勝運運化勝天天氣虛地氣盈宜資化源以助木氣兼贊歲運無使邪勝其化上辛涼中酸和下鹹寒所謂藥食宜也歲半之前天氣厥陰主之厥陰以中氣為化當其時風從火化者天氣之和也若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上肢兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈法宜平以辛涼佐以苦辛以甘緩之以酸瀉之歲半之後地氣少陽主之少陽之化從本若火淫於內即焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便法宜治以鹹冷佐以苦辛以酸收之以苦泄之歲運之化金不及紀曰從革是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用燥切其動鏗禁瞀厥其發咳喘其病邪傷肺其化兼所不勝夏有光顯鬱蒸之令則冬有嚴凝整肅之應若春有炎爍燔燎之變則秋有冰雹霜雪之復其眚東其藏肺其病內舍膺脅肩背外在皮毛復則寒雨暴至乃零冰雹雪霜殺物陰厥且格陽反上行頭腦戶痛延及顛頂發熱甚則心痛宜治以酸和調中初之氣自甲辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣陽明金中見金運氣與運同居於木位與厥陰交司而行春令金木下宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍是氣也司氣以涼用涼無犯二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣太陽水中見金運金水相得寒不去華雪水冰殺氣施行霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣厥陰木中見金運火勝金金勝木天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣少陰火中見金運火勝金溽暑至濕熱相薄爭於左之上民病黃癉而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣太陰土中見金運歲運之金得位與土相和其化燥濕更勝沉陰乃布寒氣及體風雨乃行宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣少陽火中見金運畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆六氣之常也歲氣之化天氣勝者陽明覆之地氣勝者太陽復之其治各以其勝復法丙午歲圖少陰君火司天陽明燥金在泉中見太羽水運歲水太過氣化運行先天熱化在上柔化左動化右天政所布其氣明辛化在下玄化左明化右故天政所布其氣明地氣肅而其令切寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白熱化二寒化六清化四正化度也羽蟲靜介蟲育是謂歲物之宜毛蟲耗濕毒不生是皆地氣所制水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽衄嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歲火為天氣金為地氣火勝金天氣盈地氣虛當取火之化源水運在中火邪乃微必抑其運水資其歲勝無使暴過而生其病食丹白之谷以全真氣食間氣之谷以闢虛邪咸以耎之調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同地氣以溫熱化其化上鹹寒中咸熱下酸溫藥食宜也歲半之前少陰主之其政熱若熱淫所勝則怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診在手尺澤之脈法宜平以鹹寒佐以苦甘以酸收之歲半之後陽明主之其令燥若燥淫於內則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱法宜治以苦溫佐以甘辛以苦下之歲運之化水太過紀曰流衍是謂封藏寒司物化天氣嚴凝藏政以布長令不揚其化凜其氣堅其政謐其令流注其動漂泄沃湧其德凝慘寒雰其變冰雪霜雹其化兼其所勝其病脹故曰歲水太過寒氣流行大雨且至埃霧霿郁邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至甚則腹大脛腫喘咳寢汗出憎風其法治以咸熱初之氣自乙巳年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣太陽水中見水運氣與運同地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒邪弗能為害是氣也用寒遠寒無犯司氣之寒二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣厥陰木中見水運水生木陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風邪弗能為害三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陰火中見水運二火相加水運承之天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱邪弗能為害四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣太陰土中見水運土居其位又能勝水溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕邪弗能為害五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陽火中見水運火勝金水運承之畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆雖有火邪弗能為害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣陽明金中見水運水金得位燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹甚則寒中地將易也宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥邪弗能為害此六氣之化也歲氣之交天氣勝則有太陽之復地氣勝則有少陽之復其治各依勝復之法寒者熱之熱者寒之無翼其勝無贊其復此其道也丁未歲圖太陰濕土司天太陽寒水在泉中見少角木運歲木不及氣化運行後天太陰濕化在上少陽明化為左間少陰灼化為居氣太陽咸化在下厥陰動化為左間陽明清化為右間故地氣上騰而其政肅天氣下降而其令寂陰專其政陽氣退闢大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太者故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行清化熱化勝復同邪氣化度也雨化五風化三寒化一正化度也委和之紀曰上宮與正宮同諸同正歲氣化運行同天此言天氣平也歲物所宜則鱗蟲育祼蟲靜地氣所制則羽蟲耗熱毒不生故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒溫腹滿身䐜胕腫痞逆寒厥拘急是歲土為天氣水為地氣土勝水天氣盈地氣虛宜取化源以平土氣益其歲氣無使邪勝