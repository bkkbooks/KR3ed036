手神門之脈法宜平以辛熱佐以甘苦以咸瀉之歲半之後地氣太陰主之若濕淫於內則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目項腰髀膕腨皆痛法宜治以苦熱佐以酸淡以苦燥之以淡泄之歲運之化金太過紀曰堅成是謂收引天氣潔地氣明陽氣隨陰治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令銳切其德霧露蕭飋其動暴折瘍疰其病喘喝胸憑仰息其化兼其所勝故經曰歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹甚則喘咳逆氣肩背痛下連股膝間髀膕腨足皆病收氣峻生氣微草木斂蒼干凋隕心脅暴痛不可反側咳逆甚而血溢診在足太衝之脈其治悉以辛溫調中初之氣自己酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣少陽火中見金運客氣勝運地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆雖有火邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣陽明金中見金運氣與運同大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍雖有燥邪不能為害是氣也無犯司氣之涼三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位太徵火客氣太陽水中見金運水勝火天政布寒乃行雨乃降民病寒反熱中癰疽注下心熱瞀悶宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷雖有寒邪不能為害四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位少宮土客氣厥陰木中見金運木勝土金反制之又遇太陰交司風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻雖有風邪不能為害五之氣自秋分日寅初至小雪日子初凡六十日有奇主位太商金客氣少陰火中見金運歲運得位客氣勝之陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆雖有熱化不能為邪終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣太陰土中見金運土生金金生水其化順地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻雖有濕邪不能為害此六氣之化也是歲天氣勝者太陰復之地氣勝者厥陰復之其治皆如復氣之法濕者燥之溫者清之無翼其勝無贊其復此其道也辛亥歲圖厥陰風木司天少陽相火在泉中見少羽水運歲水不及氣化運行後天風化在上左灼化右玄化故天氣擾而其政撓苦化在下左清化右柔化故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太商者其耗文角品羽風燥火熱勝復更作風病行於上熱病行於下風燥勝腹行於中雨化風化勝復同邪氣化度也風化三寒化一火化七正化度也其在物則毛蟲靜羽蟲育是謂歲物所宜介蟲耗寒毒不生是謂地氣所制然歲氣升降天氣為陰而其化虛地氣為陽而其化盈當資化源以助司天之木氣化源雖虛水運在中水能生木邪乃微也必贊歲運之水扶其不足調上用辛調下用鹹畏火之氣慎無妄犯歲半之前厥陰為主若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上肢雨脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈其法平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後少陽主之火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便其法治以鹹冷佐以苦辛以酸收之以苦發之是歲水運不及紀曰涸流是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其果棗杏其實濡肉其谷黍稷其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其運埃郁昏翳其聲羽宮其在人也病為痿厥堅下從土化也病為癃閉邪傷腎也法宜以苦和調之也初之氣自庚戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見水運金勝木水運間之寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間殺宜黍二之氣自春分日酉正至小滿日未正凡六十日有奇主位水徵火客氣太陽水中見水運氣與運同寒不去華雪水冰殺氣施行霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷是氣也慎無犯寒三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣厥陰木中見水運天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣少陰火中見水運溽暑濕熱相搏爭於左之上民病黃癉而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣太陰土中見水運燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陽火中見水運畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆此六氣之化也歲氣之交司天氣勝則陽明覆之在泉氣勝則太陽復之治勝復者各以其法壬子歲圖少陰君火司天陽明燥金在泉中見太角木運歲木太過氣化運行先天君火在上左太陽右厥陰燥金在下左太陽右少陽故天政所布其氣明地氣肅而其令切寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白熱化二風化八清化四正化度也羽蟲淨介蟲育歲物之宜也毛蟲耗溫毒不生地氣制之也寒熱之氣持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歲火為天氣金為地氣木運在中火勝金木生火天氣盈宜先取火之化源必抑其運木資其歲勝無使暴過而生其病食丹白之谷以全真氣食間氣之谷以闢虛邪歲宜咸以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同天氣宜以寒清化其化上鹹寒中酸涼下酸溫藥食宜也歲半之前熱化主之熱淫所勝則怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診在手尺澤之脈法宜平以鹹寒佐以苦甘以酸收之歲半之後燥化主之燥淫所勝則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱法宜治以苦溫佐以甘辛以苦下之歲運之化紀曰發生是謂啟陳土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啟拆其變振拉摧拔其化兼其所勝其病怒上徵則其氣逆其病吐利故曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹大滿甚則忽忽善怒眩冒顛疾化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚診在足衝陽之脈味宜以酸涼調之也初之氣自辛亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣太陽水中見木運地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷則寒氣不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣厥陰木中見木運氣與運同是謂司氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目暝目赤氣鬱於上而熱宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻則風氣不能為害是氣也無犯司氣之溫三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陰火中見木運木生火火當其位天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣太陰土中見木運土居其位溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻則濕氣不能為害五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陽火中見木運木生火畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆則火氣不能為害終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣陽明金中見木運金勝木燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹甚則寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍則燥氣不能為害此六氣之常也歲氣之交天氣勝則太陽復之地氣勝則少陽復之觀其氣至以法為治熱者寒之寒者熱之清者溫之無翼其勝無贊其復此治之大體也癸丑歲圖太陰濕土司天太陽寒水在泉中見少徵火運歲火不及氣化運行後天太陰在上左少陽右少陰故地氣上騰陰專其政而其政肅太陽在下左厥陰右陽明故天氣下降陽氣退避而其令寂大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太角之谷寒化雨化勝復同是謂邪氣化度也雨化五火化二寒化六是謂正化度也陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行倮蟲靜鱗蟲育是謂歲物所宜羽蟲耗熱毒不生是謂地氣所制有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急是歲濕土在上寒水在下土能制水天氣盈地氣虛宜取化源以平土氣益其歲氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮坼而水血交流必贊其陽火令御甚寒運異寒濕燥熱宜少故藥食之宜其化上苦溫中鹹溫下甘熱歲半之前太陰主之濕淫所勝沉陰且布雨變枯槁民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太谿之脈當平以苦熱佐以酸辛以苦燥之以淡泄之歲半之後太陽主之寒淫於內凝肅慘慄民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫宜治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之運火不及命曰伏明之紀是謂勝長長氣不宣藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其病昏惑悲忘其化兼所不勝夏有炳明光顯之化則冬有嚴肅霜寒之政若夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其藏心其病內舍膺脅外在經絡故曰歲風火不及寒乃盛行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美民病胸中痛脅肢滿兩脅痛膺背肩胛間及兩臂內痛甚則屈不能伸髖髀如別復則埃郁大雨且至黑氣乃辱民病泄注其法悉以鹹溫調中初之氣自壬子年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣厥陰木中見火運風木得位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪二之氣自春分日卯正至小滿日醜正凡六十日有奇主位少徵火客氣少陰火中見火運君火自居其位不司氣化是謂灼化大火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣太陰土中見火運歲火當位濕化郁之天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦泄之以甘緩之歲谷宜黅間谷宜麻則濕不為邪四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣少陽火中見火運氣與運同畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪是氣也無犯司氣之熱五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣陽明金中見火運氣與運同燥令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣太陽水中見火運水當其位而能勝火寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒熱持於氣交而為疾也宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪此六節之氣也氣交之化天氣勝者則有厥陰之復地氣勝者則有太陰之復各以其勝復法治之
