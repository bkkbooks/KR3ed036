魚骨燒存性研為細末每服二錢煎木賊湯下不拘時候治漏下神方出千金方取槐子燒末酒服方寸匕日三立瘥食前服一方用槐花膠艾湯出和劑方治勞傷血氣月水過多淋瀝漏下連日不斷臍腹疼痛經血淋瀝不斷及妊娠將攝失宜胎動不安腹痛下墜或勞傷胞絡胞阻漏血腰痛悶亂或因損動胎上搶心奔沖短氣及因産乳衝任氣虛不能約制延引日月漸成羸瘦熟乾地黃白芍藥各四兩當歸去蘆頭艾葉微炒各三兩阿膠搗碎炒令黃燥芎藭甘草炙各二兩上為粗末每服三錢水一盞酒六分煎至八分去滓熱服空心食前日三服病甚者連夜並服烏金散治婦人血崩日久不止或經脈不斷或暴下血不止烏賊魚骨去甲棕櫚羊角尖蠶蛻新絳各一兩白礬半兩乾薑一分上都入一餅內用泥固濟候乾以火小煅通赤放冷取出細研入麝香一錢再研勻每服二錢溫酒調下空心食前服龍骨散出千金方治婦人漏下不止或少或多遂致常漏身體虛瘦飲食減少困怠無力龍骨灶中黃土赤石脂牡蠣燒研桂去粗皮烏賊魚骨去甲禹餘糧煅醋淬五七次各一兩上為散每服二錢溫酒或米飲調下空心日午臨臥服馬通湯出千金方治漏下血積月不止赤馬通汁一升取新馬屎絞取汁乾者水浸絞取汁生艾葉阿膠各三兩當歸乾薑各二兩好墨半丸上㕮咀以水八升酒二升煮取三升去滓納馬通汁及膠微火煎取一升分再服相去如人行十里久蒲黃阿膠湯一名蒲黃散出聖惠方治婦人血漏非時而下淋瀝不斷五色蒲黃微炒二兩鹿茸酒浸炙去毛當歸切焙各二兩阿膠炙令黃燥烏賊魚骨去甲各二兩半生地黃汁一碗一方用生乾地黃一兩上除地黃外粗搗篩每服二錢水一盞地黃汁半盞同煎取一盞去滓溫服空心日午臨臥一方為細散溫酒調下二錢慎火草散出千金方治漏下慎火草十兩熬令黃當歸鹿茸阿膠各四兩龍骨半兩上治下篩先食酒服方寸匕日三鹿茸散出千金方治婦人漏下不止鹿茸酒浸炙去毛阿膠炙燥烏賊魚骨去甲各一兩半當歸切焙蒲黃微炒各一兩上為散每服二錢溫酒或米飲調下二錢菴䕡飲治婦人血漏下先多後少日久不斷菴䕡子微炒熟乾地黃焙蒲黃微炒當歸切焙各二兩上粗搗篩每服三錢水一盞煎至七分去滓溫服空心日午臨臥蒲黃散一名鹿茸散出千金方治漏下不止蒲黃半斤鹿茸當歸各二兩上治下篩酒調服五分匕日三不知稍加至方寸匕蒲黃丸治婦人月候過多血傷漏下蒲黃三兩微炒龍骨二兩半艾葉一兩上為末煉蜜和丸梧子大每服二十丸煎米飲下煎滾湯下亦得日再赤石脂散出聖惠方治婦人漏下數年不瘥赤石脂一兩燒赤側柏一兩微炙烏賊魚骨一兩燒灰上件藥搗細羅為散每於食前以粥飲調下二錢治婦人血崩出本草以舊敗蒲席燒灰酒調下二錢治婦人崩中吐痢血不止出本草取敗船茹干煮之亦燒作屑服之
