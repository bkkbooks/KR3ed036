body:
  text: 卷十九心臟門心勞附論夫心勞病者補脾氣以益之脾旺則感於心矣人逆夏氣則手太陽不長而心氣內洞順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣其候喜忘不樂鴨溏口瘡耳枯皮焦色夭者死於冬方獺肝丸治心勞熱胸膈聚痰頭目微痛手足時煩肌膚漸覺羸瘦獺肝切破炙黃鱉甲去裙襴醋炙柴胡去苗地骨皮升麻黃連去須天靈蓋酥炙令黃各一兩半胡黃連犀角屑知母焙天門冬去心焙茯神去木紫菀去苗土百合前胡去蘆頭貝母去心焙麻仁研杏仁湯浸去皮尖雙仁炒令黃色別研甘草炙各一兩檳榔銼生乾地黃焙各三兩上為末煉蜜丸如梧桐子大每日食後溫水下三十丸夜臥再服遠志散出聖惠方治心虛勞損羸瘦四肢無力心神昏悶除寒熱利腰腳充肌膚益氣力遠志去心白朮人參去蘆頭杜仲去粗皮微炙令黃銼川椒去目一兩閉口者微炒去汗牛膝去苗白茯苓薯蕷山茱萸柏子仁生乾地黃石斛去根末銼好黃耆銼各用一兩肉桂去皴皮天門冬去心焙鱉甲塗醋炙令黃去裙襴各一兩半甘草半兩炙微赤銼上為散每服一錢以溫酒調下空心及晚食前服忌鯉魚莧菜菊花湯治心勞客熱毒氣上攻口中生瘡齒齦肉爛菊花升麻獨活去蘆頭防風去叉知母焙黃芩去黑心玄參藁本去苗土大黃銼炒梔子仁前胡去蘆頭桔梗甘草炙銼麥門冬去心焙生乾地黃焙各一兩上搗篩每服五錢水一盞半煎八分去滓食後溫服人參湯治心勞煩悶虛滿胸膈痞塞飲食不下氣噎等證人參白茯苓去黑皮前胡去蘆頭麥門冬去心焙黃芩去黑心枳殼去瓤麩炒木通銼甘草炙銼生乾地黃焙防風去叉獨活去蘆頭各一兩陳橘皮湯浸去白焙旋覆花各一兩半上搗篩每服五錢水一盞半生薑半分切煎八分去滓食後溫服貫衆丸出聖惠方治心勞熱傷心有長蟲名蛔蟲長一尺貫心為病貫衆陳橘皮湯浸去白焙石蠶各一兩二錢狼牙茱萸根皮炙令黃色各一兩半雷丸炒白蕪荑炒令香青葙子蜀漆各一兩白殭蠶三七枚炒亂頭髮如雞子大燒為灰桃白皮炙令黃色一兩二錢上為末煉蜜丸如梧桐子大每日空心用米飲下七丸未瘥更加至二七丸夜臥再服以蟲下為度一方無石蠶有桃仁一兩用苦酒下王不留行湯治憂愁思慮過傷心經舌本腫強王不留行桂去粗皮桔梗炒大黃銼炒當歸切焙甘草炙銼各一兩雷丸延胡索白芨天雄炮裂去皮臍檳榔半生半煨熟各一兩半桑根白皮半兩上㕮咀如麻豆大每服三錢生薑三片水一盞同煎至七分去滓溫服犀角散治心勞或風熱心神不安少得睡臥犀角屑地骨皮各一兩真珠末甘草炙微赤銼各半兩遠志去心桃花酸棗仁微炒黃耆銼各三兩川升麻葳蕤各一兩石膏二兩麥門冬一兩半去心焙上為散每服食後以溫酒調下三錢朱雀湯治心氣勞傷雄雀一隻取肉炙赤小豆一合赤茯苓去黑皮人參大棗去核紫石英小麥各一兩遠志去心紫菀去苗土丹參各半兩甘草炙銼一兩上細銼拌勻每服三錢用水一盞煎六分去滓溫服人參散治心勞實熱多驚夢中恐畏不安人參去蘆頭沙參去蘆頭赤芍藥赤石脂紫菀洗去苗土各一兩犀角屑遠志去心甘草炙微赤銼各半兩石膏五兩茯神一兩半梔子仁半兩上為散每服五錢以水一大盞煎至六分去滓入竹瀝半合生地黃汁半合攪令勻食後分溫二服麻黃湯治心勞煩多熱喜笑無度四肢煩熱止煩下氣麻黃去根節梔子仁赤茯苓去黑皮白朮桂去粗皮各一兩半黃芩去黑心石膏甘草炙各一兩生乾地黃焙五錢赤小豆一合上搗篩每用藥末十錢雞子白一枚竹瀝一合水三盞煎至二盞去滓下芒硝一錢再上火令沸分溫三服空腹日午夜臥各一服竹茹湯治心勞潮熱肌瘦四肢煩疼竹茹前胡去蘆頭白茯苓去黑皮人參各一兩甘草炙銼貝母去心焙各三兩桑根白皮銼赤小豆各一兩半柴胡去苗麥門冬去心焙各半兩上搗篩每服二錢水一盞入生薑竹葉各五片煎至七分不拘時去滓溫服麥門冬丸治心勞多驚悸心氣不足補心麥門冬去心焙遠志去心熟乾地黃天門冬去心焙黃連去須升麻各一兩半石菖蒲人參白茯苓去黑皮各一兩桂去粗皮半兩上為末煉蜜和丸如梧桐子大每日食後夜臥時用熟水下二十丸兼開心氣使人多記不忘遠志湯治心勞多煩躁背膊妨悶面色數變乍赤乍黑或笑或歌遠志去心犀角屑芍藥各一兩人參知母焙各半兩赤茯苓去黑皮黃芩去黑心前胡去皮頭各三分麥門冬去心焙一兩半上搗篩每服五錢水一盞半煎至一盞去滓食後分溫二服如人行三五里再服茯苓丸治心勞熱精神不安喜忘不樂不能獨臥耳不遠聽皮毛焦枯或言語錯亂白茯苓去黑皮白龍骨遠志去心防風去叉人參柏子仁研各半兩牡蠣焙棗肉焙各二兩甘草一兩上為末煉蜜丸如梧桐子大每服三十丸米飲下前胡麥門冬飲治心勞客熱煩躁頭目昏眩前胡去蘆頭麥門冬去心焙葳蕤玄參升麻人參射干芍藥甘草炙各一兩上搗篩每服五錢水一盞半生薑半分切赤小豆三十粒煎至八分去滓食後服大黃散出聖惠方治心勞熱口瘡心煩腹滿小腸不利川大黃銼碎微炒澤瀉黃芩梔子仁柴胡去苗羚羊角屑甘草炙微赤銼木通銼各一兩石膏二兩上為散每服四錢水一中盞入淡竹葉二七片煎至六分去滓食前溫服忌炙爆熱面生果茯神散出聖惠方治心勞實熱皮毛乾焦色無潤澤心神不安茯神木通銼川升麻赤石脂遠志去心各一兩犀角屑桂心甘草炙微赤銼各半兩麥門冬一兩半去心焙上為散每服四錢水一中盞入竹茹一分煎至六分去滓食前溫服磁石散出聖惠方治心勞熱心氣通於腎開竅在耳若心病則耳枯燥而鳴則不能聽遠磁石二兩搗碎水淘去汁赤茯苓木通銼人參去蘆頭羚羊角屑赤石脂菖蒲遠志去心各一兩麥門冬一兩半去心焙上為散每服四錢水一中盞入竹葉二七片煎至六分去滓每於食前溫服泄熱湯出三因方治心勞實熱口舌生瘡大便閉塞不通心滿痛小腸熱澤瀉梔子仁黃芩各三兩桂心通草各二兩石膏八兩大黃蒸甘草炙各一兩上銼散每服四錢水盞半煎七分去滓食後熱盛者煎熱加芒硝一錢服不以時一方加大棗二十枚黃芩湯出永類鈐方治心勞實熱口瘡心煩腹滿小便不利澤瀉梔子仁黃芩麥門冬去心木通生乾地黃黃連去須甘草炙各等分上㕮咀每服四錢水一盞半姜五片煎至八分去滓溫服不拘時遠志飲子出醫方集成治心勞虛寒驚悸恍惚多忘不安夢寐驚魘遠志去心甘草水煮乾茯神去木桂心不見火酸棗仁炒去殼人參黃耆去蘆當歸去蘆頭酒浸各一兩甘草炙半兩上㕮咀每服四錢水一盞半姜五片煎七分去滓溫服不拘時磁石湯治心勞熱耳焦多鳴不能聽遠磁石燒令通赤醋中淬七遍赤茯苓去黑皮大青人參白朮菖蒲芍藥各一兩半赤石脂一兩上搗篩每服五錢水一盞半入竹葉五片煎至一盞去滓分溫二服赤芍藥丸治心臟勞熱久積毒氣小腸氣癃結少腹急小便淋瀝白濁疼痛赤芍藥大黃炒冬葵子炒令香各一兩半苦參三兩黃芩去黑心山梔子仁車前子微炒瞿麥穗各一兩上為末煉蜜丸如梧桐子大每日食後溫水下三十丸夜臥再服石膏飲子出聖惠方治心氣實好笑四肢煩熱石膏四兩搗碎茯神犀角屑川芒硝各一兩梔子仁一兩半生地黃切三大合甘草半兩炙微赤銼赤小豆一合上細銼和勻每服半兩水一大中盞煎至五分去滓入堇竹瀝半合更煎一沸不計時溫服人參湯治心勞因多言喜樂過度傷心或愁憂思慮多而後傷血血傷即不欲視聽心煩驚悸人參木通銼麥門冬去心焙各一兩半茯神去木百合柴胡去苗各一兩龍齒一兩半上搗篩每服五錢用水一盞半入棗三枚擘煎至一盞去滓分溫二服食後相次服之麥門冬飲治心虛勞損喜忘不樂麥門冬去心焙白茯苓去黑皮各二兩半人參二兩遠志去心一兩一分防風去叉赤芍藥各一兩半陳橘皮湯浸去白焙一兩上銼如麻豆大每服五錢水一盞半煎八分去滓溫服日二服小定心湯出千金方治心勞虛寒驚悸恍惚多忘夢寐驚魘神志不定地黃湯治心勞實熱口瘡心煩多笑少力小便不利生乾地黃焙柴胡去苗各一兩石膏二兩梔子仁三分赤小豆生二兩木通銼三分上搗篩每服三錢水一盞入竹葉二七片同煎至六分去滓溫服不拘時麥門冬湯治心勞熱不止皮毛焦色無潤澤口舌乾燥心中煩悶雞子一枚取白陳粟米一合淡竹葉三兩切生麥門冬去心三兩上以水五盞先煮米並竹葉取三盞去滓澄清冷下雞子白再煎五七沸即下麥門冬煎至一盞半去滓分溫三服空心日午臥服大黃泄熱湯治心勞熱口為生瘡大便苦難閉澀不通心滿痛小腸熱大黃澤瀉黃芩芒硝梔子仁各三兩桂心通草石膏八一兩甘草一兩大棗二十枚上㕮咀用水九升先以水一升別漬大黃一宿餘八升水煮諸藥取二升五合去滓下大黃煮兩沸去滓下芒硝令煬分三服保真散出護命方治一切男子女人心受勞氣夫五行受病必先傳其所勝腎病之極即傳之與心心既受勞即五心煩躁唇口乾焦精神不足恍惚健忘少喜多嗔口無滋味小便忽赤忽白忽多忽少即宜先吃去腎邪方漸吃清心臟解邪氣藥也若病證已傳在心即宜服此去火毒黃芩沉香木香各三銖牡丹皮去心前胡去毛桔梗柴胡去毛貝母去心天靈蓋酥炙黃黑色鱉甲醋炙黃色麥門冬去心杏仁去尖雙仁者茯苓官桂荊芥穗各一分麻黃四銖上細杵羅為末每服一錢水一盞煎取八分食後去滓服須是大腑熱脈氣數有骨力方可吃治心受勞氣不是熱蒸只是虛勞乍寒乍熱忽時面上渾身泛熱忽時足冷如雪非時干嗽忽時咯出痰中有血忽時一吐血大腑如常不冷亦不熱脈氣浮數不急治之變成大病出護命方柴胡去毛鱉甲醋炙肉豆蔻去殼白芷秦艽黃耆官桂去粗皮桔梗荊芥穗各半兩麥門冬去心當歸茯苓人參枳殼只用青甘草乾地黃海桐皮芍藥木香酸棗仁炒各一分沉香檳榔各三銖上杵羅細末每服二錢水一盞生薑一片同煎九分食後吃若是已發嗽脈氣有骨力可吃此藥也燒肝散出家藏經驗方治久年不瘥心勞口瘡銀州柴胡去蘆稱白朮紅芍藥牡丹皮人參去蘆蒼朮以上六味各一兩黑附子炮去皮臍石斛去浮膜三味各半兩上同為末用獖豬肝薄批去血水摻藥在上勻遍以荷葉裹定濕紙包之慢火煨令過熟空心食前米飲下此藥有奇功瘛病附論內經謂病蠱弗治腎傳之心筋脈相引而急病名曰瘛夫精屬腎筋屬肝脈屬心精盛則滋養諸筋榮灌諸脈故筋脈和柔今風客於腎病蠱出白則精已虧矣經所謂風客淫氣精乃亡邪傷肝者如此其證筋脈燥急相引而瘛是也方肉蓯蓉丸治瘛病筋脈相引及五勞七傷小便數腰疼久立不得坐即腳痹腹肚不安肉蓯蓉酒浸切焙山芋熟乾地黃焙各三兩菟絲子酒浸別搗五味子杜仲去粗皮炙銼澤瀉覆盆子山茱萸遠志去心續斷桂去粗皮附子炮裂去皮臍甘草炙銼白茯苓去黑皮石斛去根鹿茸去毛酥炙蛇床子巴戟天去心人參各一兩半上為末煉蜜丸如梧桐子大每服二十丸空心日午夜臥溫酒下牛髓丸出千金方治瘛病及虛羸等疾牛髓研羊髓研白蜜酥棗肉各兩半升白茯苓去黑皮麥門冬去心焙芎藭桂去粗皮當歸切焙甘草炙銼羌活去蘆頭各一兩乾薑炮生乾地黃焙各三分人參五味子防風去叉細辛去苗葉各半兩白朮一兩一分上除前五味外搗羅為末先與棗肉相和次入二髓酥蜜攪勻納銀石器中重湯煮之堪丸即丸如梧桐子大每服三十丸加至四十丸酒下日再五味子丸治