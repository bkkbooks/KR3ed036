炒一合石膏一兩上搗篩每服五錢匕水一盞半入竹葉五片煎至一盞去滓下芒硝一錢匕分溫二服早晚食後各一一方有生地黃升麻湯出聖惠方治脈極熱遇風痹痹感心面脫色白不潤澤脈空虛口唇色干潤色消痹止熱升麻射干芎藭人參各一兩半赤小豆一合搗麥門冬去心焙葳蕤各二兩生乾地黃焙三兩甘草一兩炙銼上搗篩每服五錢以水一盞半入生薑一片棗大拍碎竹葉五片煎一盞去滓溫服早晚食後各一一方有犀角屑無芎藭人參散治脈極好忘言語錯亂精神不守肩臂痛虛驚不定人參赤茯苓去黑心牛黃研鐵粉研麝香研遠志去心蛇黃燒醋淬羚羊角鎊酸棗仁等分上研為散每服二錢匕煎淡竹茹湯放冷調下茯苓散出聖惠方治脈極實熱血氣傷心好生嗔怒口色變赤語澀不快調脈理中赤茯苓赤石脂麥門冬去心焙各二兩黃芩梔子仁人參去蘆頭遠志去心犀角屑各一兩石膏四兩上為散每服三錢以水一中盞入淡竹葉二七片豉五十粒煎至六分去滓食後溫服茯神湯治脈虛極咳則心痛喉中介介如哽狀甚則咽腫驚悸不安茯神去木人參遠志去心甘草水煮通草麥門冬去心黃耆去蘆桔梗去蘆銼炒甘草炙各等分上㕮咀每服四錢水一盞半姜五片煎七分去滓溫服不拘時柏葉沐頭丸治脈極虛寒鬢髮墮落生柏葉一兩附子生去皮臍半兩豬膏五兩上將柏葉附子為末煉豬膏和為二十丸每用布裹一丸納沐頭湯中洗頭令髮長不落治脈極虛寒發墮落方麻子研二升白桐葉一把切上以米泔一斗煮五六沸去滓沐頭則鬢髮不落而長桑白皮沐頭方治脈極虛寒鬢髮墮落用桑根白皮銼一斤以水浸漬一宿煮五六沸去滓沐發數次為之佳
