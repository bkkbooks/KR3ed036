五分石斛九分六安者桂心鐵屑研厚朴炙各三分吳茱萸二分上各搗篩煉白蜜一片棗膏一斤當蒸用溫湯浸之和攪前藥令如干飲狀藥悉成之別取牛膝五兩肉蓯蓉六兩附子三兩炮三物各搗下篩內諸藥和令相得以酒服方寸匕每日三不知稍增之長肌肉補不足久服益氣力若少氣力加石斛消渴加栝蔞止痛結治裡急加芍藥腹中痛下膿血加厚朴四兩炙四肢痠痛加當歸習習少氣加天門冬白薇一名五若散忌海藻菘菜生蔥蕪荑酢物鯉魚等鍾乳丸出聖惠方治五勞六極七傷腰痛膝痛小便餘瀝心虛健忘營衛不調宜服鍾乳三兩石斛菟絲子酒浸一宿曝乾別搗為末各二兩甘草炙微赤銼牛膝去苗蛇床子各一兩細辛山茱萸防風去蘆頭杜仲去粗皮炙微黃銼枳殼醋糊麩炒微黃去瓤各三分五味子熟乾地黃各一兩川椒半兩去目及合口者微炒去汗上為末煉蜜和搗五七百杵如梧桐子大每服空心及晚食前溫酒下三十丸內補散出千金方治男子五勞六絕其心傷者令人善驚喜怒無常其脾傷者令人腹滿膨脹食竟欲臥面目痿黃其肺傷者令人少精腰背痛四肢厥逆其肝傷者令人少血面黑其腎傷者有積聚小腹腰滿背痹咳唾小便難六絕之為病皆起於大勞脈虛外受風邪內受寒熱令人手足疼痛膝以下冷腹中雷鳴時時泄痢或閉或利面目腫心下憒憒不欲語憎聞人聲乾地黃菟絲子山茱萸地麥各五分遠志巴戟天各半兩麥門冬五味子甘草人參蓯蓉石斛桂心茯苓附子各一兩半上件搗篩空心酒服方寸匕每日三加至三匕無所忌赤石脂丸出千金方治五勞七傷男子諸疾遠志栝蔞根赤石脂山茱萸各七分防風石葦三分肉蓯蓉三分牛膝杜仲薯蕷各四分天雄柏子仁各五分蛇床子六分菖蒲續斷各五分上為末煉蜜棗膏和丸如梧桐子大空腹服五丸日三服十日知久服不老加菟絲子四分更佳人參湯出千金方治男子五勞七傷胸中逆滿害食乏氣嘔逆兩脅下脹小腹急痛宛轉欲死調中平臟補傷人參當歸芍藥甘草生薑麥門冬白糖桂心各二兩前胡茯苓五味子蜀椒橘皮枳實各一兩大棗十五枚上㕮咀流水取棗一斗半浸藥半日用三年陳蘆梢煎取四升納糖復上火煎令十數沸年二十以上六十以下一服一升二十以下六十以上一服七八合雖年盛而體羸者亦服七八合日三夜一不爾藥力不接則不能救病要用撈水陳蘆否則水強火盛猛則藥力不出也黃耆丸出千金方療虛勞黃耆鹿茸茯苓烏頭乾薑各三分當歸乾地黃桂心芎藭各四分枸杞白皮菟絲子五味子柏子仁白朮各五分大棗二十枚上為末蜜丸如梧桐子大平旦酒服二十丸夜十丸以知為度禁如藥法人參五味子散治男子老稚諸虛百損氣血勞傷涎喘咳膿或嗽咯血寒熱往來夜有盜汗羸瘦困乏一切虛損人參五味子桔梗白朮白茯苓甘草炙熟地黃當歸焙各半兩地骨皮前胡去苗桑白皮切炒枳殼去瓤炒黃耆陳皮柴胡去苗各三分上為粗末每服三錢水一盞半生薑三斤同煎至五分去滓溫服食後日三服煩渴加烏梅青蒿同煎咳膿血加知母阿膠同煎尤妙腎瀝湯療五勞六極八風十二痹補諸虛不足豬腎一個去脂膜附子炮芎藭牡丹桂心人參當歸各四分茯苓桑螵蛸炙磁石研如粉牡荊子黃耆菖蒲各八分乾地黃六分上切以水一斗七升煮腎取一斗一升去腎納藥煎取四升分四服忌羊肉餳冷水酢生蔥蕪荑胡荽乾地黃丸出千金方治五勞七傷六極臟腑虛弱飲食不下顏色黧黑八風所傷益氣血進飲食資顏色長元陽五味子四分阿膠棗肉各八分乾地黃茯苓天雄各七分蛇床子六分桂心麥門冬各五分遠志蓯蓉杜仲甘草各十分上為末蜜丸如梧子大酒下二十丸日加至三十丸常服彌佳羊肝散治諸虛百損五勞七傷年深泄痢久作滑腸心腹痞悶塊症痛硬下虛上熱口瘡燥渴一切陰盛陽虛之證縮砂仁白芍藥良薑切炒厚朴薑製橘皮胡椒各半兩破故紙丁香白朮木香肉豆蔻吳茱萸湯洗七次焙官桂各三錢上為末羊肝三兩薄批開摻藥二錢半鋪蔥絲一重卷定麻扎用火炙熟分三五次細嚼米飲下日均一劑食前
