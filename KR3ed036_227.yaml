body:
  text: 卷二百二十七虛勞門虛勞附論虛勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又有五勞肺勞者短氣而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌本苦直不得嚥唾腎勞者背難以俯仰小便不利色赤黃尿有餘瀝莖內痛陰濕囊生瘡小腹急滿也六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顏色眉發墮落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰骨極令人酸削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌膚六曰精極令人少氣嗡嗡然內虛五臟氣不足發毛落悲傷喜忘七傷者一曰陰寒二曰陰痿三曰裡急四曰精漏遺五曰精少陰下濕六曰精液清七曰小便苦數臨事不舉又一曰大飽傷脾脾傷喜噫欲臥面黃二曰大怒氣逆傷肝肝傷少血目暗三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷若驚乍喜乍怒六曰風雨寒暑傷形形傷發落肌膚枯槁七曰大恐懼不節傷志恍惚不樂男子平人脈大為勞極虛亦勞男子勞之為病其脈浮大手足煩躁春夏劇秋冬瘥陰寒精自出酸𤺊診寸口脈浮而遲浮即為虛遲即為勞遲即衛氣不足浮即營氣竭脈直上者逆虛也脈澀無陽是腎氣少寸關澀無血氣逆冷是大虛脈浮微緩皆為虛緩而大者勞也脈微濡相搏為五勞微弱相搏虛損為七傷詩曰脈來浮大或弦數此脈為勞須早覺浮大沉緩尚堪醫血氣未耗人未弱雙弦肝木已侵脾加數則殆休進藥虛勞大率生寒熱營衛不和津液竭火炎於上痰嗽生汗出上氣時咯血水流於下毛髮焦夢漏遺精並滑泄小便滑數赤白濁腳弱無力困薾薾虛勞變證有千般大概病源如上說法當先養胃調脾鎮安氣海仍依節次當滋腎育心神治病方知中盡訣醫經載五勞六極之證非傳屍骨蒸之比多內不能生施於過用逆於陰陽傷於營衛遂成五勞六極之病焉蓋勞力謀慮成肝勞應乎筋極曲運補機成心勞應乎脈極意外過思成脾勞應乎肉極預事而憂成肺勞應乎氣極矜持至節成腎勞應乎骨極此五勞應乎五極者也然精極者五臟六腑之氣衰形體皆極眼視無明齒焦發落體重耳聾行履不正邪氣逆於六腑厥於五臟故成精極大抵勞極之脈多弦治療之法隨其虛實冷熱而調之精極者當補其精也素問謂形不足者溫之以氣精不足者補之以味各分門類大略如此臨症之際又當詳審蒙莊有言精極用則竭神大勞則憊知是乃可以論病矣夫人所以根本此性命者氣與血也若男若女氣血均有獨不能保而有之終日役役神倦力疲飢飽越常喜怒失節形寒飲冷縱欲恣情遂使五臟氣血俱虛此五勞之所從始也六極七傷類焉故心家虛則便濁汗多肝家虛則筋攣目眩腎家虛則腰痛泄精肺家虛則咳嗽關熱脾胃虛則嘔吐不食日就羸黃或乃胃熱消穀飲食雖多亦不生肌肉而轉加瘦悴矣前是數證其間大抵心下引脅俱疼蓋滯血不消新血無以養之也治法大要潮熱者不可過用寒涼秘結者不可驟與疏泄嗽喘者不可妄施發散咯血者不可錯認以為熱但以滋養營血為上調平臟氣次之其病又於養氣調血之中而增益也其或骨間有熱以至四肢緩弱不舉此則骨痿欲斯疾之有療也艱哉雖然當歸地黃黃耆芍藥固養血之上藥也亦當以益胃消痰輩佐之蓋人以穀氣為本所謂精氣血氣由穀氣而生古人以五味五穀五藥養其病者不無先後於其間也當歸地黃戀膈引痰黃耆芍藥多則傷胃是可膠柱調瑟而劑量輕重之不審乎大凡男子婦人所顯證者皮膚髮熱肌肉消瘦四肢倦怠兼有頭痛頰赤心忪唇乾口燥日晡漸熱夜有盜汗涕唾稠黏胸膈不利或時喘嗽五心煩熱睡臥不安飲食減少多思水漿經脈不通病名曰何病論奇病曰女子不月血滯之病也男子腎虛精不足也凡治此經降心火益腎水此之謂也可先用通解丸瀉三二行次服當歸飲子又用加減五苓散木香三稜丸人參黃耆散犀角散之類詳其虛實選而用之若咯膿咯血大小便血但亡血者不可宣吐勿服酸辛熱物姜附之類藥不可不戒慎也若犯諸下血之證者不可發汗不可溫補脾胃之藥若服之雖進飲食不生肌肉此病轉加危篤乃成虛勞之病也方五石黃耆丸療五勞七傷諸虛補益黃耆紫石英研赤石脂石硫黃研石斛白石脂白礬煉研各二兩桂心四兩烏梅炮去皮煉鍾乳研芎藭防風各二兩茯苓三兩乾薑四兩棗一百枚當歸細辛各三兩人參肉蓯蓉附子炮乾地黃各二兩芍藥甘草炙各三兩白朮二兩上草石各別搗篩棗蜜和丸如梧桐子大空腹酒下十丸日三漸加至三十丸忌海藻菘菜豬肉冷水桃李雀肉生蔥酢物蕪荑生菜長生聚寶丹出德生堂方治男子婦人諸虛百損五勞七傷腎臟久寒膀胱怯冷心神恍惚元氣虛憊目昏耳聾唇焦口燥四肢倦怠百節痠疼面色黧黑腰腳沉重肌體羸瘦行步艱辛小腹堅硬下部濕癢兩脅脹滿手臂麻疼不能動舉夜夢遺精小便滑數白濁神思不定虛汗盜汗陽事不舉及治諸種風氣手足不遂痰涎壅塞語言不出事多健忘一切虛損常服壯筋骨補元陽益真氣助脾去風邪厚腸胃安魂定魄耳聰目明進美飲食百病不生婦人諸病可除子嗣可必常以濟人功效不能盡述半兩錢七文醋治炙自然銅二錢半醋煅七次虎骨一兩半炙酥龜板一個酒浸炙大者當歸酒浸乳香另研桑螵蛸炒各一兩半牛膝淨酒浸沒藥另研金鋼骨炒煅蓯蓉酒浸木鱉子一兩半去油殼另研川楝子一兩半去皮核葫蘆巴酒浸龍骨煅檳榔訶子肉川烏炮各一兩白膠香另研人參白附子何首烏草烏青鹽炒木香五靈脂去土丁香各一兩地龍七錢半砂仁淨赤芍藥破故紙酒浸附子去皮臍熟地黃酒浸白芷天麻酒浸宣木瓜各一兩續斷骨碎補各一兩半巴戟酒浸去心烏藥硃砂另研各一兩安息香酒浸另熬菟絲子酒浸鹿茸五加皮酒浸酸棗仁酒浸炒沉香鹿角霜另研蘇合香油另與安息香一處入藥琥珀另研各一兩麝香二錢半真者後研白茯神去木一兩七錢半上為細末入安息香蘇合油熬和煎藥酒糊為丸如梧桐子大每服三十丸五更溫酒下如覺麻乃是藥行不久即散更量虛實人加減至五十丸亦妙婦人艾醋湯下天門冬大煎出千金方治男子五勞七傷八風十二痹傷中六極一氣極則多寒痹腹痛喘息驚恐頭痛二肺極則寒痹腰痛心下堅有積聚小便不利手足不仁三脈極則顏色枯青逆噫善忘恍惚失氣渾似悲泣之狀舌苦強咽喉干寒熱惡風不可動不嗜食目眩喜怒妄言四筋極則拘攣小腹堅脹心痛膝寒冷四肢骨節皆疼痛五骨極則肢節厥逆黃疸消渴癰疽妄發病重浮腫如水病狀六肉極則發疰如被擊不復言甚者至死復生眾醫所不能治此皆六極七傷所致非獨房室之為也憂患積思喜怒悲歡復隨風濕結氣咳時嘔吐食變大小便不利時泄利重下溺血上氣吐下乍寒乍熱臥不安席小便赤黃時時惡夢與死人共飲食人家神室魂飛魄散筋極則傷肝傷肝則腰背相引難可俯仰氣極則傷肺傷肺則小便有血目不明傷髓則陰萎不起往而不交骨極則傷腎傷腎則短氣不可久立陰疼惡寒甚者卵縮陰下生瘡濕癢手搔不欲停汁出此皆為腎病甚者且多遭風毒四肢頑痹手足浮腫名曰腳弱一名腳氣醫所不治此悉主之常服尤佳天門冬切三斗半壓取汁生地黃切三斗半壓取汁白蜜三升酥用三升煉枸杞根三斗淨浣以水二石五斗煮取一斗二升澄清鹿全骨一具搗碎以水一石煮取五斗澄清以上並用大斗銅器中微火先煎天門冬地黃汁減半乃合煎取大斗二斗下後件散藥煎取一斗內銅器重釜煎令隱掌可丸如梧桐子大平旦空腹酒服二十丸日二加至五十丸慎生冷醋滑豬雞魚蒜油麵等須擇四時王相日修合今具散藥方於後茯苓桂心白朮葳蕤五加皮菖蒲遠志澤瀉薯蕷柏子仁人參石斛牛膝杜仲覆盆子細辛獨活枳實芎藭大豆黃卷黃耆蓯蓉續斷狗脊胡麻仁萆薢白芷橘皮茯神巴戟天石南各三兩阿膠十兩甘草六兩蜀椒三兩薏苡仁一升大棗一百枚煮作膏鹿角膠五兩蔓荊子三兩上件搗篩內煎中有牛髓鹿髓各加三升大佳小便澀去柏子仁加秦艽三兩乾地黃六兩陰痿失精去葳蕤加五味子二兩頭風去柏子仁加菊花防風各二兩小便利陰氣弱去細辛防風加山藥萸肉二兩腹中冷去防風加乾薑二兩無他疾依方修合用此煎九月下旬採藥立冬日合至五月上旬止若十二月臘日合者經夏至七月下旬止若停留經夏不壞當於舍內陰處入地深六尺填沙置藥中上加沙覆之則經夏不損也女人先患熱者得服患冷者勿服神化丸出千金方治五勞七傷氣不足陰下濕癢或生瘡小便數有餘瀝失精自出小腹急繞臍痛膝重不能久立目視漠漠見風淚出脛酸精氣衰微臥不欲起手足厥冷調中利食蓯蓉牛膝薯蕷各六分續斷山茱萸大黃各五分遠志澤瀉天雄柏子仁菟絲子人參防風石斛栝蔞根杜仲黃連白朮甘草礬石當歸各一兩桂心石南乾薑蛇床子赤石脂萆薢茯苓細辛菖蒲芎藭各三分上為末蜜丸如梧桐子大酒服五丸日三加至二十丸石英煎出千金方治男子女人五勞七傷消枯羸瘦風濕虛痼冷少氣力無顏色不動作口苦咽燥眠中不安惡夢驚懼百病紫石英白石英各一斤碎如米以醇酒調置銅器中微火煎取三升以竹器攪勿住手去滓澄清乾地黃一斤白蜜三斤酥桃仁各三斤石斛五兩柏子仁遠志茯苓山茱萸人參麥門冬桂心乾薑五味子白朮蓯蓉甘草天雄白芷細辛芎藭黃耆防風薯蕷各二兩上件搗篩內煎中如不足加酒取足為限煎令可丸如梧桐子大酒服十丸日三稍加至四十丸無藥者可單服煎令人肥白充實填骨丸出千金方治五勞七傷五臟除萬病石斛人參當歸牡蒙石長生石葦白朮遠志蓯蓉巴戟天紫菀茯苓乾薑天雄蛇床子牛膝牡蠣附子牡丹柏子仁甘草薯蕷阿膠乾地黃五味子各二兩蜀椒三兩上為末白蜜和丸如梧桐子大酒服三丸日三稍加腎瀝散出千金方治虛勞百病羖羊腎一個陰乾茯苓一兩半五味子甘草乾薑巴戟天細辛桂心石龍芮牛膝山茱萸防風各一兩乾地黃二兩人參五分鍾乳粉五分石斛五分菟絲子五分蓯蓉五分附子五分丹參五分上件搗篩合鍾乳粉和攪更篩令勻細以醇酒服方寸匕稍加至二匕日再鍾乳白澤丸出和濟方治丈夫諸虛百損五勞七傷真氣不足元藏不固神志俱耗筋力頓衰頭目眩暈耳內虛鳴心悶急痛氣逆嘔吐痰嗽喘促胸膈脹悶脾瀉下痢遺精便濁厥冷自汗脈微欲絕婦人血海虛冷崩漏不止赤白帶下經候不調臍腹時痛面無顏色飲食不進但是一切虛勞之疾並宜服之白檀香研末滴乳香另研香一兩陽起石煅令通紅研附子炮去皮臍各一兩半鍾乳粉二兩麝香另研一錢上和勻滴水搜成劑分作六十丸每服一丸水一盞煎化及七分空心熱服如急病不拘時久服補益精血助陽消陰養心神定魂魄延年增壽起死回生鹽酒鹽湯下大薯蕷丸療男子五勞七傷氣喘急內冷身重骨節煩痛腰背強腹內痛羸瘦不得飲食婦人絕孕疝瘕諸病補虛益氣服薯蕷五分大黃六分前胡三分茯苓人參各三分杏仁三分炒去皮當歸七分桔梗防風各三分黃芩麥門冬各八分甘草五分炙加三分五味子四分乾地黃九分棗百枚芍藥石膏研阿膠炙乾薑桂心各四分澤瀉八分白朮二分乾漆三分黃耆五分上搗篩蜜和丸如梧桐子大空腹以酒下三十丸日再忌豬肉冷水桃李雀肉海藻菘菜生蔥蕪荑等物服此藥能令人肥白肌膚光澤燒肝散御藥院方治五勞七傷三十六種風二十四冷臍腹痛四肢沉困倦黃瘦久患諸藥不能治病皆救之黑附子一兩縮砂仁川芎青皮陳皮肉豆蔻肉桂益智紅豆山茵陳柴胡去苗芍藥桔梗白朮蒼朮去皮炒遠志去心乾薑白芷良薑細辛蓬莪朮蕪荑蓽茇大椒以上各半兩上為末每服五錢豬羊肝四兩批開蔥白二枝細切摻藥蔥重重盡紙裹三五重文武火燒香熟空心熱吃白麵燒餅二個壓米飲送次吃好酒三兩盞頻頻吃此藥多驗經進地仙丹和劑方治男子五勞七傷腎氣虛憊精神耗減行步艱辛飲食無味眼昏耳焦面色黧黑皮膚枯燥女人血海虛冷月經不調臟寒少子下部穢惡又治諸痔瘻瘡腸風瀉血諸風諸氣及虛弱易感寒暑並皆療之人參黃耆各一兩半附子炮蓯蓉酒浸焙各四兩白朮一兩川椒去目皮合口者微炒出汗四兩川烏炮白茯苓甘草各一兩菟絲子酒浸覆盆子天南星湯洗薑汁製焙防風去蘆白附子制何首烏牛膝去梢酒浸一宿各四兩狗脊去毛赤小豆骨碎補去毛烏藥羌活各二兩木鱉子三兩萆薢二兩地龍二兩上為細末煮酒麵糊為丸如梧桐子大每服三十丸加至四十丸空心溫酒吞下陶隱居云是時有人母幼年得風氣疾後擊發攣結疼痹久不能起百治不瘥臥床五十餘年肌肉消盡僅存筋骨乃於隱士處得此方依方修合日進二服才至五十餘服是母病頓除發白再黑齒落更生至八十歲顏色如二十歲人筋力倍壯耳聰目明時有老奴常偷服其藥嚴冬御絺葛履霜雪無寒色負荷倍重於常時行步如飛疑為鬼物所憑遂打殺埋於水旁沙中久服為怪而里俗且云凡奴婢死為怪但折其脛令不得動作遂掘出折其脛見其髓盡實如黃金色折其臂亦然靈效頗異隱居云此奴若不打殺成地仙也五補丸出千金方治腎虛氣損五勞七傷腰腳痠疼肢節苦痛目暗流淚心悸喜忘恍惚不定夜臥多夢覺則口乾食不得味心常不樂多有恚怒心腹脹滿四體痛痹口吐酸水小腹冷氣尿有餘瀝大便不利悉主之久服延年不老四時勿絕一年萬病皆除杜仲巴戟天各六分人參五加皮天雄牛膝防風遠志薯蕷狗脊各四分乾地黃蓯蓉各二分菟絲子茯苓覆盆子石龍芮各五八分蛇床子石南白朮各三分天門冬七分上為末蜜丸如梧桐子大酒服十丸日三有風加天雄芎藭當歸黃耆五加皮石南茯神獨活柏子仁白朮各三分有氣加厚朴枳實橘皮各三分冷加乾薑桂心吳茱萸附子細辛蜀椒各三分泄精加韭子白龍骨牡蠣鹿茸各三分泄痢加赤石脂龍骨黃連烏梅肉各三分春依方服夏加地黃五分黃芩三分麥門冬四分冬則去此加乾薑桂心蜀椒各三分若不熱不寒亦不須增損直爾服之三劑以上即覺功效悉皆慎酢蒜鱠陳臭大冷醉吐自外百無所慎稍加至三十丸不得增常以此為度十華散出和劑方治丈夫五勞七傷渾身疼痛四肢拘急腰膝無力脾胃氣虛不思飲食霍亂吐瀉四肢冷麻焦枯中毒傷寒及腳氣流注腫痛行步不得並虛勞等患並皆治之五加皮陳皮去白乾薑炒甘草各六兩桔梗肉桂去粗皮羌活黃耆蒼朮去皮以上各八兩八錢大川烏三兩附子六兩上為細末每服二錢水一盞姜二片棗一枚煎至六分不拘時候熱鹽酒調服亦得菟絲子丸醫方大成治腎氣虛損五勞七傷小腹拘急四肢痠疼面色黧黑唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腳膝痿緩小便滑數房室不舉股內濕癢水道澀痛小便出血時有遺瀝並宜服之久服填骨髓續絕傷補五臟去萬病明視聽益顏色輕身延年菟絲子淨洗酒浸鹿茸去毛酥炙石龍芮去土肉桂去粗皮附子炮去皮各二兩石斛去根熟地黃乾用白茯苓去皮牛膝酒浸一宿焙乾續斷山茱萸肉蓯蓉酒浸切焙防風去蘆杜仲去粗皮各一錢半蓽澄茄補骨脂去毛酒浸沉香巴戟天去心茴香炒各三分五味子桑螵蛸酒浸芎藭覆盆子去枝葉萼各半兩澤瀉一兩上為細末以酒煮糊為丸如梧桐子大每服二十丸溫酒或鹽湯下空心服如腳膝無力木瓜湯下晚食前再服又方用龍齒三分遠志半兩不用石龍芮肉蓯蓉澤瀉挫散出和劑方治男子婦人五勞七傷感冷胃寒氣弱虛多倦少力常服壯筋骨體輕健進食天仙藤青蒿子炒桑白皮炒香附子炒前胡荊芥穗柴胡桔梗麻黃去根節蒼朮炒乾葛陳皮各十斤茴香炒秦艽川芎白芍藥藁本黃耆半夏為粗末薑汁炙羌活各二斤半甘草炒肉桂去粗皮白芷厚朴去皮酒薑汁炒各五斤上為粗末每服三錢水一盞半入生薑烏梅棗子煎至七分去滓服並二滓作煎服黃耆丸出聖惠方治男子五勞七傷風虛羸瘦腰疼腎冷陰盛陽虛身力衰殘夜夢遺泄久服令人五臟內實肌膚外充面色紅光返老為童黃耆銼人參去蘆頭石斛去根銼桂心肉蓯蓉酒浸一宿銼去粗皮炙乾鹿茸去毛塗酥炙令微黃菟絲子酒浸三日曝乾另搗為末陽起石酒煮三日細研水飛過熟乾地黃杜仲去粗皮炙微黃銼鍾乳粉白茯苓狗脊赤石脂細研萆薢銼薯蕷山茱萸附子炮裂去皮銼五味子蛇床子巴戟白朮續斷澤瀉上各一兩搗羅為末入陽起石研令均煉蜜和搗五七百杵丸如梧桐子大每日以空腹用溫酒下三十丸晚食前再服漸加至五十丸生地黃丸療五勞七傷六極八風十二痹消渴心下積聚使人身體潤服之多情性補益養精生地黃一錢二分石斛天門冬菟絲子酒浸二宿焙乾另搗麥門冬去心各一錢茯苓甘草炙人參大黃牛膝當歸杏仁去皮尖焙麻子仁各八分乾薑玄參地骨皮各六分白朮芍藥紫菀防風肉蓯蓉各七分椒三分出目汗上為末蜜和丸如梧桐子大空心酒下二十丸日再服漸加至三十丸忌鯉魚海藻菘菜桃李雀肉大酢蔥韭等物石斛萬病散療五勞七傷大風緩急濕癢不仁甚則偏枯筋脈拘攣胸肋支滿引身強直或頸項腰背疼痛四肢酸煩陰痿臨事不起癢濕臥便盜汗心腹滿急小便莖中疼痛或時便血咽乾口燥飲食不消往來寒熱羸瘦短氣肌肉損減或無子若生男女才欲成人便死此皆極勞傷血氣心神不足所致藥悉主之令人康健多子牛膝遠志去心續斷各二兩蛇床子三分菟絲子三兩酒浸蓯蓉茯苓杜仲桂心各二分乾薑蜀椒去汗各一分細辛附子炮天雄炮防風乾地黃白朮萆薢石斛雲母粉菊花菖蒲各二分上隨病倍其分搗篩為散食先以酒服方寸匕日三以知為度神效忌豬羊肉冷水桃李雀肉生蔥生菜大酢餳等安腎丸治男子諸風五勞七傷顏色枯朽手足不遂語言謇澀口眼歪斜筋脈攣急腰腳疼痛元臟虛冷面色青黑腹脅脹滿下痢泄精夜夢鬼交驚悸健忘骨髓傷敗未老陽事不興胃冷精流陰囊濕癢膀胱疝氣小腸下部脾腎俱弱癥結痰飲霍亂吐瀉轉筋不止胸膈逆氣不進飲食服之補腎填精壯陽補虛損暖腰膝縮小便澀精溫中去痰止嘔吐暖下元定心氣消食止渴長肌肉除莖中寒熱疼逐寒濕諸冷痹去一切風添精益髓去腰膝冷益顏色破癥結開胃進食明目川烏麵炒去皮川萆薢茴香炒杜仲醋浸炒蜀椒去目炒當歸木瓜柏子仁菟絲子酒浸熟地黃酒浸各三兩川楝子三兩半去核澤瀉遠志甘草煮去核川巴戟紫者去心酒浸牛膝酒浸肉蓯蓉酒浸炒葫蘆巴酒浸炒山茱萸去核炒白茯苓去皮蛇床子各二兩破故紙四兩炒蒼朮五兩米泔浸去皮茅山者佳上為細末酒糊為丸如梧桐子大每服五六十丸空心食前鹽湯下溫酒亦得日進二服豬肚丸治男子婦人一切勞疾四肢羸瘦口苦舌乾白日多睡夜間不眠咳嗽膿血腳手疼酸背髀拘急諸藥不治者大黃炮鱉甲醋炙黃柴胡秦艽附子黃連各一兩細辛川烏黃耆桃仁甘草乾薑各半兩青蒿子半升蔥白韭白各一握烏梅五個取肉小便浸杏仁半兩上為末用獖豬肚一枚安藥在內用綿線縫之童子小便五升同入火瓦瓶內煨極熟取出肚子研爛細切蔥韭白同研無灰酒一斗煎成膏入飛羅面四兩同丸梧桐子大每服三十丸鹽湯空心吞下日三服以衣蓋之出汗如膠甚妙聚寶丹治五勞七傷諸虛不足溫中正氣祛風活血逐寒除濕填精益髓強陰壯陽聰耳明目開心益智暖胸化食消痰寬中殺九蟲通九竅補五臟開積秘止夢遺除咳嗽實肌膚治腰膝疼痛輕身白茯苓去皮山茱萸去核五味子乾山藥石蓮肉雞頭肉金櫻子巴戟去心破故紙炒牛膝酒浸熟地黃酒浸焙石菖蒲遠志去心杜仲去粗皮炒斷絲枸杞子酒浸焙龍骨枳實茴香炒仙茅蓯蓉酒浸焙乾沉香以上各一兩上為細末棗肉為丸如梧桐子大每服五六十丸以硃砂為衣空心溫酒或鹽湯下如有氣滯不順用木香調氣散入鹽少湯調下天雄丸治五勞七傷元氣衰憊腰膝久冷精氣散失小便稠濁補填骨髓益智壯血脈駐精氣暖腰膝潤澤肌肉補諸風虛不足等天雄三兩炮裂去皮臍石斛去根生補骨脂微炒天麻麋角屑澤瀉巴戟五味子沉香續斷蓯蓉酒浸一宿刮去粗皮炙乾菟絲子酒浸三日曝乾另搗為末龍骨山茱萸杜仲去粗皮炙微黃銼防風去蘆頭膃肭臍酒浸炙令微黃木香各一兩上為末煉蜜和搗五七百杵丸如梧桐子大每日空心以酒下三十丸鹽湯下亦得肉蓯蓉丸治五勞六極七傷陰痿內虛口乾汗出失精陰下濕癢小便赤黃陰中疼痛卵偏墜大小腹裡急腰脊俯仰苦難腔痠疼目視𥉂𥉂腹脅脹滿膀胱久冷致生百疾宜服此肉蓯蓉三兩酒浸一宿刮去粗皮炙乾赤石脂石葦拭去毛遠志去心石菖蒲柏子仁蛇床子防風去蘆頭細辛各二分薯蕷二兩天雄炮裂去皮臍白芍藥山茱萸石斛去根銼杜仲去粗皮尖微黃銼續斷牛膝去苗石南各一兩熟地黃菟絲子酒浸三宿別搗為末各一兩半上為末煉蜜和搗三二百杵丸如梧桐子大每服空腹及曉食前以溫酒下三十丸八仙丹治男子婦人五勞七傷身體骨節疼痛腰腿緩弱行步艱難腎臟虛憊小茴香微炒川烏虎骨酥炙甜瓜子微炒乳香自然銅醋火煅七次川楝子酒浸沒藥蒼朮米泔浸去皮春五夏三秋五冬七上各等分為細末好頭醋打糊為丸如梧桐子大空心服四五十丸至五六十丸溫酒送下乾物壓之午後半飽服之治五勞七傷庶事衰弱用枸杞葉半斤切粳米二合豉汁中煮作粥五味用蔥白調和食覆盆子丸治五勞七傷強力益氣補虛損壯腰腳安五臟駐顏色覆盆子薯蕷石斛去根銼熟乾地黃桂心陽起石酒浸煮半日細研水飛過巴戟牛膝蛇床子肉蓯蓉酒浸一宿刮去粗皮炙乾菟絲子酒浸三日曝乾別搗為末人參去蘆山茱萸枸杞子五味子赤石脂澤瀉鹿茸去毛塗酥炙金微黃白茯苓遠志去心以上各一兩上為末煉蜜和搗五七百杵丸如梧桐子大每日空心以溫酒下二十丸漸加至三十丸薯蕷丸出聖惠方治男子五勞七傷久虛損羸瘦腳無力顏色痿癢下元衰憊脾胃氣寒飲食無味諸虛不足薯蕷二兩石斛去根銼牛膝去苗鹿茸去毛塗酥炙令微黃肉蓯蓉酒浸一宿刮去粗皮炙乾茯苓五味子續斷巴戟附子炮裂去皮臍山茱萸人參去蘆頭桂心澤瀉熟乾地黃杜仲去粗皮炙微黃色蛇床子遠志去心覆盆子菟絲子酒浸三日曝乾別搗為末以上各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸澤瀉丸出聖惠方治男子五勞七傷四肢無力腰膝冷痛夜多小便面色萎黃不能飲食澤瀉附子炮裂去皮臍鹿茸去毛塗酥炙微黃雲母粉肉蓯蓉酒浸一宿銼去粗皮炙乾熟乾地黃各一兩桂心一兩半遠志去心牛膝去苗人參去蘆頭白茯苓甘草炙赤