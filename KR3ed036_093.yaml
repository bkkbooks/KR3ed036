待冷取出藥於地上出火毒更入白殭蠶末乾蠍末鉛霜等分研和令勻粟米飯為丸如緑豆大每服五丸空心薄荷湯下或溫酒下亦可如神救苦散出瑞竹堂治左癱右瘓風濕痹走注疼痛無問男子婦人遠年日近並宜服之御米殼一兩去頂蜜炒陳皮五錢去白虎骨酥炙乳香研沒藥研甘草各二錢半上為細末除乳香沒藥另研外每服三錢水一盞半煎至八分連滓熱服病在上食後病在下食前如煎藥一順攪之修合精緻勿差分兩忌豬馬驢魚兔等肉無比膏治癱瘓風脫臼臂膊不收仙茆一兩萆麻子二七粒去皮細研浮萍草半兩獨顆蒜三枚去皮膜研膏桃膠一分入湯研化入蒜膏內同研勻自然銅煅醋淬七次半兩上為末除六味研外搗羅為末入蒜膏內拌勻塗臼子上綿被蓋之汗出為效日三上天麻丸治癱瘓風天麻白附子附子去皮臍烏頭去皮臍羌活去蘆荊芥穗各一兩上並生用為末煉蜜和丸如雞頭大每服半丸或一丸生用薄荷三葉同嚼茶酒任下治癱瘓手足不遂方椿皮如無用枝葉亦得干為末枸杞根細銼益母草苦參棗木皮生取銼各一斤五靈脂研五兩上為末每用時約糝一人身長闊厚半指許於上更加魚鱗砌新好者牛馬驢骨於藥上面以草火勻燒直俟骨勻透為灰卻急掃除去骨灰令淨就熱藥急鋪席薦看厚薄得所令患人臥欲臥時先服鎮心散一服鎮心散治癱瘓風四肢緩弱無力白牽牛半生半炒防風去蘆叉甘草銼各一兩上搗羅為末每服二錢匕新汲水調下服了後便令人就所患一邊臥於鋪上才上鋪便用追魂散三錢匕酒一盞煎兩沸和滓服盡當有汗出如膠水追魂散治癱瘓風用五靈脂三兩杵碎以水浸攪勻先傾去上黑濁者後去下沙石者取中間細者於灰盆之中紙上泣干搗研細末每服三錢匕酒一盞煎兩沸服繼服續命湯續命湯治癱瘓風山茵陳一兩揀淨麻黃去根節四兩上粗搗篩每服十錢匕水三盞煎至二盞入好酒一盞半更煎三五沸去滓服盡不得離臥床上避風二七日須服六十一日乃無後患也寢須是不透風仍從十月後二月以前可用此法治之過此時熱難用排風散治中風癱瘓白附子麻黃去根節骨碎補去毛天麻白殭蠶羌活去蘆頭各一兩上並生用搗羅為散每服五錢匕溫酒調下不拘時候又左經丸出和劑方治左癱右瘓手足顫掉言語謇澀及遍身疼痛筋骨拘攣不得屈伸項背強直下疰腳膝行履艱難骨節煩疼不能轉側跌撲悶肭外傷內損並皆治之木鱉子去殼別研白膠香研草烏生去皮臍一作臺烏五靈脂各三兩半當歸一兩斑蝥百個去頭足翅酒炙熟上為末用黑豆去皮生搗粉一斤醋煮糊為丸如雞頭子大每服一丸酒磨下如筋骨疼不曾針灸傷筋絡者進四五丸立效此藥專治肝心腎三經服後小便少乃其驗也一治一切風便用醋調生豆末諸風重者兩日一服彈子大小兒五歲以下分四服以上三服日一丸酒下生地黃飲子出聖惠方治癱瘓風手足不遂言語謇澀心神躁悶烏龍丸一名鐵彈子治中風癱瘓手足不遂語澀口喎筋骨痛與小續命湯相助服之大效方見鐵彈丸輕腳丸出和劑方治左癱右瘓腳弱不能行履木鱉子別研白膠香別研白芍藥各二兩草烏去皮臍四兩赤小豆一兩別研為末打糊上為末以赤小豆糊為丸如梧桐子大每服七丸旋加至十丸溫酒或木瓜湯下病在上食後臨臥服病在下食前空心服忌熱物燒食放拐丸治風濕左癱右瘓等證但起不得服之久皆效蒼朮去皮米泔浸懸鉤子葉九蒸畢再九曝酒製何首烏蒼耳葉各等分同制上為末酒糊丸如梧桐子大每服五十丸溫酒下烏龍丹一名大聖丹出和劑方治癱瘓風手足嚲曳口眼喎斜言語謇澀步履不正方見大聖丹左經丸出醫方集成治中風癱瘓手足顫掉語言謇澀渾身疼痛筋脈拘急不得屈伸項背強直下疰腰膝行步艱辛骨節煩疼不可轉側跌撲閃肭外傷內損並皆治之草烏四兩炮生黑豆一斤以斑蝥二十一個去頭足同煮至豆透為度去斑蝥不用取豆焙乾川烏炮去皮一兩沒藥一兩半上為末醋糊為丸如梧桐子大每服三十丸溫酒下不拘時一方加乳香一兩研常服通經絡活血脈疏風順氣壯骨輕身一方無草烏四聖紫金丹出瑞竹堂治男子婦人左癱右瘓口眼喎斜中風疾病依方修合誠心服餌大病不過三服初得病一服效驗槐實子文武火麩炒黃色荊芥穗擇淨生用甘菊花炒豬牙皂角酥炙黃色去子各等分上為細末煉蜜為丸如彈子大病重者每服一丸細嚼茶清送下病輕臨時加減微汗出為驗如汗後體熱難忍噙甘草解之四生丸出和劑方治左癱右瘓口眼喎斜中風涎急半身不遂不能舉者悉皆療之五靈脂去石骨碎補川烏頭去皮尖當歸各等分上為細末用無灰酒打麵糊為丸如梧桐子大每服七丸漸加至十丸至十五丸溫酒下服此藥莫服靈寶丹恐藥無效殭蠶丸治癱瘓風手足不遂語言不正白殭蠶炒烏頭炮去皮臍沒藥研各一兩蜈蚣炙半兩上為末酒煮麵糊為丸如梧桐子大每服十丸薄荷酒下日三服妙聖丸治卒中癱瘓風手攣急渾身疼痛蠐螬三十個麻黃去根節二兩烏頭炮裂去皮臍半兩木鱉子去殼半兩上三味為末用酒二升刺蠐螬破取汁不用皮熬成膏和藥末丸如小彈子大每服一丸溫酒化下不拘時候小省風湯一名醒風湯出直指方治左癱右瘓口眼喎斜口噤全不能言半身不遂手足頑麻一切風疾並皆治之防風南星各二兩甘草一兩上㕮咀每服三錢水一盞姜五片煎至六分去滓熱服氣逆者加紫蘇二錢半木香三錢半氣虛加附子一兩沉香二錢胸膈不利加半夏一兩人參半兩頭暈疼加天麻半兩全蠍二錢煎熟入少麝香小靈寶三倍丸治癱瘓中風半身不遂言語謇澀口眼喎斜肢體麻痹草烏頭一斤用黑豆一斗同煮豆爛去豆不用蒼朮二斤泔浸去皮蔥白三斤細切上焙乾為細末加醋麵糊為丸如梧桐子大每服十丸至二十丸食前溫酒下日進三服大效枳殼散治中風手足無力口中涎出多在右邊枳殼去瓤麩炒三兩牛黃研白芷各一兩上搗研為細散每服三錢匕空心溫酒調下梔子丸出海上名方治癱瘓風宜久服之山梔子去皮草烏頭炮乾薑炮各半兩上為末煮棗肉和丸如緑豆大每服三丸漸加至七丸常服二丸細嚼茶酒任下木香湯一名青木香散出衛生家寶方治左癱右瘓偏枯不遂等疾青木香二兩栝蔞一個去皮上先取好栝蔞一個取子及瓤去皮將子與瓤各研極細用無灰酒一大盞投之攪勻用生絹攪取汁如此研絞三兩次酒濃無味乃止於銀石器內煎三兩沸調木香末帶熱服令人按摩病處良久藥力到病處臥移時自能舉動矣此方乃大為山僧云氣行則風行氣逆則風聚甚者不過三五服大有神驗中風風祕有熱證者可服保安丸治一切癱瘓風治熱風癱瘓常發者羌活二斤穀芽一升五合水一中取沉者上為散酒服方寸匕日三服稍加之無忌獨勝散出海上名方治癱瘓不經針灸者專用此方以取效名用蓬莪朮醋煮不以多少研為細末每服二錢溫酒下日三服至五服不拘時候服三日後再用淋泄藥治中風癱瘓用膽礬細研如面每一字許以醋湯下立吐出涎漸輕治癱瘓新得患及年深者用酒調地膚子末加蔥汁打麵糊為丸如梧桐子大空心或酒或茶送下五十丸神效一方為末蔥汁酒調下服之吐出涎痰即愈之為妙豆豉飲出肘後方治中風四肢不收者用豆豉三升水九升煮取三升分為三服日二作之亦可酒漬煮飲之用豆豉一升微熬囊貯漬三升酒中三宿溫服微令醉為佳治癱瘓風及諸風手腳不遂腰腳無力者用驢皮膠炙令微起先煮蔥豉粥一升別貯又以一升煮香豉二合去滓內膠更煮六七沸膠煬如餳頓服之及暖吃蔥豉粥任意多少若冷吃令人嘔逆頓服三四劑即止禁如藥法又膠能止泄得黃蠟黃連尤佳大聖丸出王氏博濟方治癱瘓風及腎臟風上攻下疰一切諸風疾並皆療之川烏頭炮裂去皮臍五靈脂炙用麝香乳香寒食麵各等分辰錦砂別研上件五靈脂烏頭先細杵為末後稱與下四味停入和勻以面向北取不汙井花水為丸如櫻桃大丸了用生絹袋子盛掛當風每日一服切不可多服無事不得服如是不思飲食大段昏沉取緑豆汁解之明日再服男子女人皆吃得合時取辰時不得令一切陰人雞犬等見臨臥用薑汁浸化溫酒投服忌動風物孕婦不服狐肝散出王氏博濟方治癱瘓風及氣攻注皮膚生瘡瘙癢赤白瘕風等一切風疾烏鴉一隻銼去喙不用留爪狐肝一具二味皆用臘月者與鴉同入瓷瓶中鹽泥封固微炭火上煨熟候瓶透赤取出冷用天南星一兩去心研天麻膩粉蠍白附子殭蠶牛黃一分別研藿香桑螵蛸臘月採者各一兩麝香半兩別研烏蛇一兩酒浸不用頭尾取肉炙上為末卻與研者和勻如中急風豆淋酒下二錢癱瘓風再服立瘥常服除風半錢溫酒下至聖一醉膏出王氏博濟方治癱瘓風天麻一分沒藥黃明滴乳香各半兩附子一兩炮裂去皮臍安息香一分麻黃去根節內四兩生腦子少許上件七味一處搗羅為細末每服四大錢用法酒一升於銀石器內熬成膏子後卻出分在四盞內別用法酒看患人吃酒多少漸調膏子服盡為度令枕病處臥以衣被蓋或汗出或似蟲行即效次日再吃一服手足必已舉得此病五十日以上方治若髮直者不在治限菵草散出王氏博濟方治癱瘓等風疾菵草一兩半炙去毛出汗蠍梢一分官桂去皮一分當歸一兩羌活半兩京三稜一兩蓬莪朮各一兩上件七味都生搗為末如人卒中惡風昏迷未省風涎方盛即時以藥四錢用二錢生末先置盞中以二錢末用酒一盞中煎至八分傾在生藥盞內調勻帶熱服但下得咽喉扶起須臾即吐出惡涎立愈如諸般風疾並依此法每日一服永無中風及痰涎如久患癱瘓旦暮常服經月餘必被上有臭汗氣痕跡如人形狀其患永瘥大莽草散出王氏博濟方治丈夫女人癱瘓風及血風但一切風疾皆療莽草石斛炙牛膠炙附子炮萆薢天麻炙麻黃去節澤瀉防風石龍茵松脂獨活杜仲芎芍藥人參茯苓去皮烏蛇酒浸炙去皮骨薯蕷桂心去皮吳白朮細辛麝香柏子仁菟絲子酒浸三日後焙乾炒熟杵上件二十五味各等分並要州土新好者用杵為末每服一錢溫酒下應諸風疹但求此藥必瘥寶命丹出王氏博濟方治癱瘓風及軟風牛黃半兩少一分亦得蠍一全者附子生用去皮一兩天南星半兩五靈脂半兩上件五味並生為末煉蜜為丸如雞頭大用生薑自然汁一呷許磨化後將蜜酒投之溫酒服或遠年軟風須於暖閣內無風處用甜糟並蔥椒煎湯浸及令軟處汗出便服一丸如是軟多年者先將鵲窠燒火炙軟處令熱徹方服此藥為妙輕骨丹出衛生寶鑑主中風癱瘓四肢不遂風痹等疾麻黃去根節五斤銼河水二升煎去滓桑白皮須自桑上下者白芷蒼朮去皮甘松香另用子苗捶碎川芎以上各四兩苦參三兩半上六味滾研勻細以前藥麻黃膏和丸如彈子大每服一丸溫酒一盞研化溫服之臥取汗五七日間再服手足當即輕快卒中涎潮分別利後服之經進骨碎補圓出衛生家寶方治左癱右瘓五靈脂揀去沙石別研極細木鱉子去殼銼碎研細入衆藥用生薑切作片子地龍用麻包定石上捶去土黑牽牛炒令微熟用草烏去皮尖銼作塊子用鹽炒令裡邊俱透白膠香韭煮三二十沸傾在冷水中少時控干別研極細用黑豆炒令微熟威靈仙用軟腳者洗去土用滴乳香用糯米數粒同乳香一處研細入衆藥用天南星慢灰火中炮去皮用各一兩麝香一錢別研臨了將入藥防風去苗並蘆頭用上件各焙碾為末醋糊為丸如梧桐子大初服五丸加至七丸食後薄荷茶酒下黃耆必安丹出衛生家寶治血虛生風左癱右瘓口眼喎斜語言謇澀諸疾沒藥全蠍酒浸焙乾羌活虎骨酥炙獨活防風去蘆川芎當歸薏苡仁半夏薑製各二兩川烏頭一兩炮去皮尖天麻枳殼去白麩炒前胡陳皮紅細辛硃砂別研為衣各一兩白朮半兩麝香一錢別研腦子半錢別研上為細末糯米糊丸如龍眼大硃砂為衣每服一粒酒嚼下或荊芥下食後服太乙丹出衛生家寶治癱瘓諸風疾五靈脂半斤去土石木鱉子半斤去殼別研草烏二兩去皮尖殭蠶四兩炒去絲嘴錢子地龍半斤布袋去土不見火川烏四兩去皮尖防風四兩去蘆白膠香六兩別研麝香半兩別研腦子二錢別研好墨燒用桑柴炭好醋浸一宿各四兩上為細末酒糊為丸如彈子大陰乾每丸分三服用生薑薄荷研自然汁浸溫酒一盞嚼下忌發風物須臘日或端午日合不許婦人雞犬孝服人見孕婦不可服經進龍虎金丹出衛生家寶治一切癱瘓風疾黑附子去皮臍退寒熱川烏頭去皮臍補腎經虎骨醋炙治傷折古文錢醋淬研為接骨當歸生用補骨活血白膠香生研去麻痹地龍去土能行血木鱉子火炮去皮衝開滯氣草烏頭鹽炒令黃髮熬黑牽牛生用除腎腧氣蓯蓉酒浸補腎經牛膝酒浸補勞各一兩乳香半兩生研治一切疼痛沒藥生用化內損壞膿血巴戟去心治八般腰疼自然銅醋淬治傷筋動骨各一兩上為細末酒煮麵糊為丸如梧桐子大每服十丸漸加至三十丸茶鹽湯下食前黃龍丸出衛生家寶紹興間修建康殿內掘得一石碑方遂經進治左癱右瘓手足麻木口眼喎斜風痹疰腰腳疼痛兼治婦人血風勞氣遍身疼痛洗頭傷風頭面乳腫舌脹口乾頭昏腦悶多睡暗風夾腦風偏正頭痛破傷風等疾紅芍藥半斤川烏四兩去皮尖防風香白芷各四兩天麻去根節華陰細辛去苗白殭蠶炒去絲嘴雄黃別研川芎各二兩白蒺藜炒去刺甘草一兩乾薑生用藿香葉甘松去土以上各一兩上為末煉蜜為丸如彈子大每服一丸薑汁磨化溫酒調下忌熱食少時乳香寬筋丸出衛生家寶治左癱右瘓口眼喎斜走疰風氣腰腳麻痹一切風疾赤眼白頭風瘡如瘡乾研油調塗瘡濕燥糝如打撲悶肭皮骨損碎研入沒藥乳香各半錢調塗乳香別研沒藥別研川烏炮去皮尖草烏炮去皮尖地龍去土何首烏一兩砂器內煮去黑皮白牽牛砂器內煮數沸各半兩白殭蠶一錢洗去絲嘴五靈脂酒研七錢去石上焙研為末酒糊為丸如梧桐子大每服十五丸至二十丸食後茶酒任下青龍丹出楊氏家藏方治男子婦人左癱右瘓手縮口眼喎斜遍身癮疹及傷風鼻塞腦痛四肢頑麻牙關緊急並皆治之草烏頭四兩生去皮尖香附子二兩炒半夏湯洗七次麻黃去根節香白芷白附子生用白蠍別研天南星生用赤芍藥川烏頭生去皮臍尖薄荷葉去土山藥螺青以上十一味各一兩白殭蠶炒去絲嘴藿香葉去土甘松去土焙零陵香細松煙墨燒醉淬以上五味各半兩上件為細末醋煮麵糊為丸每一兩作二十丸每服一丸生薑薄荷同嚼熱酒送下不拘時候防風雄黃丸出楊氏家藏方治左癱右瘓手足麻痹腰膝疼痛或風氣面浮口苦舌乾頭昏目暈並暗風夾腦風偏正頭痛麻治婦人血風勞氣遍身疼痛及洗頭風破傷風並皆治之赤芍藥八兩防風去蘆頭香白芷川烏頭炮去皮臍尖麻黃去根節白蒺藜炒以上五味各四兩雄黃水飛白殭蠶炒去絲嘴細辛去葉土天麻去苗川芎以上五味各二兩乾薑炮藿香葉去土甘松去土焙甘草炙以上四味各一兩上件為細末煉蜜和丸每一兩作十五丸每一服細嚼茶酒任下不拘時候萬金丸出楊氏家藏方治男子婦人左癱右瘓口眼喎斜打撲傷損筋骨疼痛語言謇澀行步艱難一切風疾下注腰腳鶴膝等風天雄附子草烏頭三味各二兩半並炮去皮臍尖骨碎補三兩去毛白膠香一兩研川烏頭一兩二錢炮去皮臍防風去蘆頭天南星炮錫藺脂泔浸鍋盛火煅七遍醋淬七次萆薢白附子炮自然銅火煅七遍醋煮七次葫蘆巴破故紙白殭蠶炒去絲嘴五靈脂炒赤小豆生用糯米炒焦沒藥別研乳香別研十四味各一兩上件為細末酒煮麵糊為丸如梧桐子大每服二十丸如腰以上疼痛等病食後細嚼下如腰以下疼痛等病食前細嚼胡桃湯下虎骨丸出楊氏家藏方治癱瘓諸風及風寒濕痹腳膝緩弱骨節疼痛虎脛骨三兩酥炙川芎熟乾地黃洗焙防風去蘆頭羌活當歸洗焙附子炮去皮臍萆薢金毛狗脊去皮毛羚羊角屑川烏頭炮去皮臍尖白蒺藜炒去刺天麻去苗白朮黃耆蜜炙杜仲去粗皮細面薑汁糸制炒乾以上十五味各一兩半上件各細銼如麻豆大酒浸春五夏三秋七冬十日取出焙為細末以浸藥酒打麵糊為丸如梧桐子大每服三十丸溫酒下食前保命龍虎丸出楊氏家藏方治癱瘓走注疼痛風勞氣冷腰膝軟弱四肢嚲曳兼治從高墜下折口眼喎斜久臥床枕起止不得白膠香別研虎骨酥塗炙黃黑牽牛生乳香別研地龍去土炒老古錢火燒醋淬七次木鱉子去殼別研當歸洗焙川烏頭炮去皮臍沒藥別研附子炮去皮臍巴戟去心草烏頭銼鹽炒令黃去鹽不用牛膝酒浸一宿焙乾肉蓯蓉酒浸一宿焙乾自然銅火煅醋淬七遍上件各等分同為細末醋煮麵糊為丸如梧桐子大每服三十丸溫酒或鹽湯送下婦人醋湯下空心除風丸出楊氏家藏方治中風癱瘓口眼喎斜四肢不收肌肉頑痹目旋暈天南星生用一兩半川芎一兩白附子二兩半半夏生二兩半天麻去苗白殭蠶炒去絲嘴防風去蘆頭以上三味各一兩半石膏二兩蠍梢去毒炒一兩半白花蛇酒浸去皮骨取肉焙乾稱一兩上件為細末生薑自然汁打麵糊為丸如梧桐子大每服五十丸生薑湯下食後臨臥服赤金丸出楊氏家藏方治卒暴中風左癱右瘓筋脈拘攣不能行步半兩錢四十文鐵線穿火煅通紅取出釅醋內淬過燒再淬五