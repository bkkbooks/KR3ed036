body:
  text: 卷九十三諸風門風癱瘓附論夫風者分布八方長養萬物是天地山川之風溫涼寒暑之氣也其不順四時賊邪之氣傷於人者則為毒風故聖人云避風如避矢今人觸犯不正之氣多中風病者是不避風邪毒氣也夫癱瘓者此皆肝腎久虛氣血不足腠理疏泄風邪易侵肝主於筋腎主於骨肝腎中風筋骨緩弱故名癱瘓也其病春夏得之難治秋冬得之易療春夏者陽氣上騰火力方盛風火相得而王也秋冬者陽氣下降火氣漸微即易療也其病手足舒緩不能收攝口角垂涎言語謇澀皮膚頑痹步履艱難是其候也癱瘓之辨癱則懈惰而不能收攝瘓則弛縱而不能制物故其證四肢不舉筋脈關節無力不可支吾者謂之癱其四肢能舉動而肢節緩弱憑物方能運用之者謂之瘓或以左為癱右為瘓則非也但以左得之病在左右得之病在右耳推其所自然皆由氣血內耗肝腎經虛陰陽偏療而得之或有始因他病服吐下之藥過多亦使真氣內動榮衛失守一身無所稟養而致然也方大聖花蛇牛黃丸治癱瘓口眼喎斜涎多語澀筋骨無力步履艱難遍身疼痛並宜服之一名大聖通中花蛇丸白花蛇酒浸去皮骨取肉炙烏蛇二味並酒浸去皮骨炙磁石煅醋淬赤箭防風去叉半夏生薑汁浸一宿切焙威靈仙去苗土自然銅煅醋淬七遍各四兩羌活去蘆海桐皮銼乾蠍去土炒白殭蠶炒白蘚皮蔓荊實各三兩當歸切焙芎藭青橘皮湯浸去白炒蒺藜炒各三兩五味子澤瀉一兩遠志去心萆薢各一兩半芍藥牽牛子一半生一半焙荊芥穗白頭翁肉蓯蓉酒浸切焙沉香各一兩乾薑炮麝香另研牛黃另研各半兩麻黃去根節三兩丹砂另研一兩半龍腦研三分水銀一兩用黑錫一兩結成沙子桂去粗皮木香各一兩半葫蘆巴楝實白豆蔻去皮各一兩上除別研外並搗羅為細末再與研者和勻煉蜜丸如彈子大每服一丸細嚼用豆淋薄荷溫酒下不拘時如要出汗濃煎鹽豉湯一盞投之宜避風坐臥一方無赤箭芍藥二味換骨丹出御藥院方治中風癱瘓久不愈四肢嚲曳不遂服諸藥不效麝香研半錢桂去粗皮一兩半麻黃一十斤去根節浸水七斗煮減半去滓澄清再煎入錫磁器收貯硃砂二兩為衣甘松去土川烏生去皮臍白芥子炒藿香草烏生去皮臍海桐皮炒何首烏羌活龍腦研骨碎補去毛炒牛膝酒浸威靈仙去土桑白皮炒槐角木鱉子炒自然銅醋淬七遍研細青皮去白陳皮去白各一兩白芷防風甜瓜子炒萆薢炒五靈脂川芎甘草鹽炙苦參白膠香各半兩上為末用麻黃膏子入少蜜熟者搜成劑丸如彈子大硃砂為衣每服一丸食後捶碎茶清酒任下或用生薑自然汁更入酒半盞化開服可更進酒一二盞投之日二服至三日於病處微汗為效至十日大效無不愈但藥性稍熱病寒者多效麻黃丸出聖惠方治癱瘓風手足不遂骨節疼痛麻黃去根節白花蛇肉烏蛇肉各一兩巴豆一兩去皮心研如膏與前藥三味同於釜內用水一石緩緩煎兩復時熬水及三四斗以布漉出麻黃並蛇再以生絹濾過入鍋內以慢火熬令稀稠得所盛於磁器中入後藥味硫黃滴生甘草水研桂去粗皮硇砂漿水化去石銚子內熬煎乾蠍去土炒附子炮裂去皮臍防風去叉天麻犀角鎊沉香羌活去蘆天南星炮天雄炮裂去皮臍羚羊角鎊檳榔銼白附子炮白殭蠶炮當歸切焙各一兩牛黃龍腦麝香各半兩同研上除研並藥汁外搗羅為末同和勻與前煎汁和杵千百下丸如梧桐子大每服一丸或二丸以豆淋酒嚼下日三牛黃丸出聖惠方治癱瘓風手足不遂皮膚頑痹口面喎斜言語謇澀牛黃蟬殼桑螵蛸微炒川烏頭炮裂去皮臍晚蠶蛾微炒乾蠍微炒鉛霜研入硃砂細研各半兩赤箭獨活烏犀角屑天南星炮裂仙靈脾各一兩防風去蘆牛膝去苗土各三分烏蛇肉酒拌炒令黃色二一兩萆薢茵芋漢防己桂心各三分麻黃一兩半去根節膩粉研入麝香研入各一分天雄炮裂去皮臍二分上為末入研了藥令勻煉蜜和丸如梧桐子大每服不計時候以溫酒調下十丸荊芥散出護命方治中風癱瘓肢節沉筋骨無力悶倒不知此藥疏風順氣大腑熱方可吃荊芥穗防風去叉桑寄生羌活去蘆獨活去蘆芍藥乾蠍去土皮炒白花蛇酒炙去皮骨天麻附子炮裂去皮臍半夏湯洗七次炒麻黃去根節木香蔓荊實去白皮芎藭白殭蠶炒各半兩龍腦研沉香研麝香研丹砂研各半錢牡丹皮桂去粗皮各三錢上為散然後入硃砂龍腦麝香再同研勻每服二錢濃煎生薑薄荷湯調下食後金鐵如聖煎丸治癱瘓風疾麻黃去根節桃心柳心銼各四兩桑根白皮半斤銼黑豆二升童便三升河水十升七味同入銀石器內熬三分至一分去滓別入後藥味天南星生用天雄生用去皮臍天麻各二兩乾蠍去土炒二兩半天蓼花二兩麝香三兩分膩粉一錢乳香半斤木鱉子去殼一兩九味研為末以生地黃汁入在前藥中再用文火同熬成膏以潔淨器密收之丹砂一兩雲母末一兩半銀箔金箔各十片上將後四味研如粉瓷盒盛之用益母草固濟於地坑子內用炭五斤煅令通赤用溫土蓋候冷取出如粉紅色為度服時先取法制地黃膏子稱一兩煅者丹砂稱半兩同入銀石器中熬酒至一升分作五服先日午一服溫服之日晚一服一更後一服取下惡物為驗羌活散出聖惠方治癱瘓風手足垂嚲頭痛目旋涎唾不止羌活附子炮裂去皮臍旋覆花烏蛇酒浸炙令黃各一兩天麻胡麻子細辛藿香牛膝去苗芎藭白蘚皮天南星微煨蟬殼白附子炮裂地龍微炒晚蠶蛾微炒甘草炙赤銼各半兩麻黃去根節三分乾蠍微炒麝香細研各一分上為細散入研了藥令勻每服不計時候薄荷溫酒調下二錢天麻浸酒方治癱瘓風不計深淺久在床枕天麻骨碎補龍骨虎骨酒炙烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙惡實切焙羌活去蘆獨活去蘆牛膝酒浸切焙熟乾地黃焙各半兩松節銼敗龜醋炙芎藭當歸切焙各一兩大麻仁茄子根切焙原蠶砂炒各二兩附子炮裂去皮臍一枝上㕮咀如麻豆用酒二斗浸密封春夏三日秋冬七日每服一盞不拘時溫服天雄丸出聖惠方治癱瘓風肌肉緩弱手足不遂言語謇澀心神不安天雄一兩半兩生用半兩炮裂去皮臍天南星炮裂白附子半生用半炮裂半夏湯洗七遍去滑天麻乾蠍生用羌活芎藭白殭蠶生用桂心防風去蘆白蘚皮甘菊花木香各半兩硃砂細研巴豆銼去皮心研紙裹壓去油雄黃細研麝香細研各一分白花蛇肉一兩酒浸炙令黃上為末入研了藥令勻煉蜜和丸如麻子大不計時候以溫酒下七丸烏頭丸出聖惠方治癱瘓風此由榮衛氣滯經絡澀壅致手足不遂川烏頭二兩以童子小便浸三宿去皮臍薄切焙乾入諸藥白殭蠶微炒蛜𧌴半生半熟去足白附子炮裂當歸天麻萆薢石斛去根銼桂心天南星炮裂天雄炮裂去皮臍各半兩麻黃去根節白頭翁郁李仁湯浸去皮尖微炒白蒺藜微炒去刺天蓼實仙靈脾各一兩羌活防風去蘆頭各三分上為末煉蜜丸如梧桐子大每服食前以豆淋酒下二十丸海桐皮丸治癱瘓風手足不遂或時麻木口眼喎斜頭昏腦悶海桐皮銼金毛狗脊去毛各二兩白芥子乳香沒藥各研半兩蕓薹子研地龍炒甜瓜子楓香脂研蔓荊實草烏頭生用去皮尖續斷各一兩牡蠣生三兩威靈仙去土蒼朮炒木鱉子去殼各一兩半自然銅煅醋淬七次烏藥各二兩半上除研外搗羅為末和勻醋煮麵糊為丸如緑豆大每服二十丸以木瓜溫酒下空心食前服秦艽散出聖惠方治癱瘓風手足不遂肌肉頑痹筋脈拘急心神不安言語謇澀胸膈痰涎不利秦艽去苗赤箭獨活桂心五加皮甘菊花漢防己羚羊角屑葛根銼赤芍藥防風去蘆頭芎藭側子炮裂去皮臍杏仁湯浸去皮尖雙仁麩炒微黃甘草炙微赤銼各一兩磁石二兩搗碎水淘去赤汁麻黃二兩去根節薏苡仁一兩上為散每服四錢水二中盞生薑半分煎至六分去滓不拘時候溫服側子散出聖惠方治癱瘓風言語謇澀手足不遂側子炮裂去皮臍秦艽去苗獨活當歸銼微炒羚羊角屑天麻黃耆人參去蘆白蘚皮防風去蘆頭各一兩乾蠍微炒白附子炮裂茵芋躑躅花酒浸炒令乾麝香研入各半兩牛膝去蘆麻黃去根節各一兩半上為末入研了藥令勻每服不拘時候以溫酒調下二錢威靈仙丸治癱瘓風腳膝無力行履艱難筋骨麻痹威靈仙去苗土五兩草烏頭銼微炒七兩骨碎補去毛二兩半地龍去土炒天南星炮各三兩自然銅燒醋淬研一兩半蒼耳仙靈脾側子炮裂去皮臍防風去叉各四兩羌活去蘆蔓荊實掠去皮澤瀉藁本去苗土萆薢獨活去蘆頭各一兩上搗羅十五味為末合自然銅末研令勻用好酒煮麵糊為丸如梧桐子大每服五丸漸加至十五丸空心溫酒下才服後忌便吃熱物覺唇口麻者痹漸減也金虎丸治癱瘓風天南星天麻白附子烏蛇酒浸去皮骨焙附子去皮臍乾蠍去土狼毒白殭蠶各二兩桂去粗皮二兩檳榔銼三兩五靈脂烏頭去皮臍各三兩牛黃麝香丹砂三味同研細各半兩上並生用除別研外為末共和勻煉蜜丸如雞頭大每服一丸細嚼茶酒下若用牛膽丸尤妙療癱瘓風神驗側子去皮防風芎藭秦艽甘草炙各一兩羚羊角屑漢防己杏仁去皮尖各三兩五加皮四兩磁石一斤碎綿裹甘菊花一斤乾薑一方作乾葛芍藥麻黃去節各四兩薏苡仁一斤上㕮咀以水一斗二升煮麻黃去上沫內諸藥煎取三升分溫三服相去十里許久將息取汗訖敷粉勿當風慎熱物及豬魚肉蒜酒黑神丸一名烏犀丸治男子婦人左癱右瘓腳手頑麻腰膝疼痛走注四肢百節皆痛口眼喎斜頭目旋暈並宜服之熟乾地黃淨洗赤小豆生乾薑炮藁本洗去蘆麻黃銼去節湯炮去沫川芎各六兩羌活不見火甘松洗去土當歸洗去蘆各三兩川烏炮去皮臍甘草銼各十八兩藿香洗去土香墨燒醋淬各半斤草烏炮去皮臍一斤白芷十二兩上為細末以水麵糊丸如龍眼大每服一二丸細嚼茶酒任下如婦人血風腳手疼痛打撲損傷亦宜服之一方用黃秫米粉煮餅和丸服舒筋保安散治左癱右瘓筋脈拘急身體不遂腳腿少力乾溼腳氣及濕滯經絡久不能去宣導諸氣乾木瓜五兩萆薢五靈脂牛膝酒浸續斷白殭蠶炒去絲松節白芍藥烏藥去木天麻威靈仙黃耆川當歸防風去叉虎骨各一兩上用無灰酒一斗浸上件藥二七日緊封扎日數足取藥焙乾搗為末每服二錢用浸藥酒半盞調下吃酒盡用米湯調下又方金毛狗脊一兩卻將乳香白膠香各一兩同研入干藥末內愈風丹芍藥川芎白殭蠶炒桔梗全蠍炙各一兩甘草三錢南星半兩生薑制硃砂半兩為衣麻黃去節防風去蘆白芷天麻細辛去葉羌活各半兩上為細末煉蜜和丸如彈子大每服一丸細嚼茶清任下腦麝祛風丸治左癱右瘓遊平章服此藥得愈最有效驗白花蛇頭一個帶項三寸酒浸炙烏稍蛇尾二個長七寸酒浸炙川烏頭尖用三個去黑皮附子四個去黑皮天南星炮半夏薑製白附子細辛去葉防風去蘆天麻全蠍去毒炒白殭蠶去絲嘴炒黃草烏頭炮各半兩腦麝各一分研上為細末薑汁為丸如梧桐子大硃砂為衣服五十丸煎小續命湯送下不拘時候活絡丹治男子婦人癱瘓筋攣骨疼腰膝疼痛口眼喎斜言語謇澀目晦耳聾頭風等證亦治心氣痛尤驗萆薢四兩川烏五錢去皮臍切四塊金毛狗脊四兩切作片去毛蒼朮五錢去皮切作片炒破故紙揀炒五錢杜仲五錢細切薑汁浸炒去絲仙靈脾切吳茱萸炒續斷各五錢切小茴香炒獨活各一兩切薏苡仁三兩豬牙皂角去皮絲二兩切作一寸上作一處用好酒三升於瓷瓶內浸一宿次日以文武火煮至約酒汁一升撩出焙乾為細末用煮藥酒拌麵糊為丸如梧桐子大