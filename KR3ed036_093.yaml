十沸薄切焙乾生薑汁炒川烏頭去皮臍炮搗碎炒黃各二兩天麻去苗三兩琥珀研如粉半兩膩粉研半兩金箔六十斤為衣白花蛇酒浸炙去皮骨取肉用三兩白豆蔻仁半兩上為細末入研藥令勻煉蜜搜和丸如雞頭大每服一丸細嚼溫酒下荊芥茶下亦得加至二丸如破傷中風脊強手搐口噤發癇即以熱豆淋酒化破三丸斡口開灌下少時再服汗出乃愈若小兒驚風諸癇每服半丸薄荷湯化下不拘時候酒浸藥仙方凡患中風疾四肢不舉服之三日舉手梳頭七日漸舒十日行步半月遍身依舊覺得輕健眼目更明大有神效甘菊花防風去蘆頭羌活杜仲牡蠣栝蔞根牡丹皮紫菀菖蒲人參白蒺藜牛蒡子枸杞子各半兩白花蛇桔梗吳白朮山茱萸白茯苓晚蠶砂炒黃桂遠志去心牛膝各二錢半虎脛骨牛蒡根乾薑乾地黃柏子仁狗脊去毛焙天雄去皮炮萆薢蛇床子黑附子肉蓯蓉菟絲子續斷芍藥去皮石斛各三錢以上共計藥味一十三兩五錢半上並要川廣好者依方揀擇為粗末用新絹袋盛藥用新小甕兒一個放藥在內以無灰酒二斗將藥浸之密封其口春夏浸二十七日秋冬浸三七日開甕早辰臨午晚三時令病人自取冷酒三盞依時服之每服不過一盞不多服亦不可添減亂開酒甕久病服者不過一月近者十日輕者五日見效不問男子婦人小兒骨節疼痛四肢浮腫眼目昏暗半身不遂語言謇澀口眼喎斜中風失音並皆治之白虎丸川烏五兩草烏六兩兩頭尖全蠍細辛香白芷川芎乳香沒藥白朮蒼朮五靈脂天麻人參防風菊花薄荷以上各三兩獨活白殭蠶羌活石膏雄黃藁本茯苓青皮大楓子陳皮桔梗荊芥甘草官桂芍藥寒水石各二兩白花蛇烏梢蛇自然銅以上各一兩上為細末梨湯水為丸麝香少許滑石為衣每兩作十丸每服一丸食後細嚼熱酒下頭風茶清下牙疼入鹽一捻擦之渾身疼痛不拘時候溫酒下丹砂丸出聖惠方治中風手足不遂言語謇澀緩縱不仁肢節疼痛硃砂天南星生用赤箭附子炮裂去皮臍防風去蘆頭牛膝去苗防己白附子生用獨活白殭蠶微炒麻黃去根節芎藭桂心白花蛇酥拌炒黃蟬殼川烏頭炮裂去皮臍羚羊角乾蠍生用桑螵蛸微炒烏犀角屑麝香研以上各一兩雄黃半兩研入牛黃一分研龍腦一分研上為末入研了藥更研令勻煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以酒下十丸仙靈脾散出聖惠方治中風手足不遂肌肉冷痹骨節疼痛緩弱不遂仙靈脾天雄炮裂去皮臍天麻牛膝去苗石斛去根烏蛇肉酥拌炒黃虎脛骨塗酥炙黃以上各一兩肉桂去粗皮麻黃去根節以上各一兩半獨活芎藭茵芋當歸側子炮裂去皮臍桑螵蛸微炒丹參五加皮海桐皮防風去蘆頭薏苡仁乾蠍生用各三分牛黃研麝香研各一分上為散入研了藥令勻每服食前以溫酒調下二錢石斛浸酒方出聖惠方治中風手足不遂骨節疼痛肌肉頑麻石斛去根天麻芎藭仙靈脾五加皮牛膝去苗萆薢當歸鼠黏子杜仲去粗皮烏蛇微炒茵芋狗脊丹參以上各一兩桂心附子炮裂去皮臍川椒去目及閉口者微炒出汗各一兩半虎脛骨各二兩塗酥炙令黃上細銼用生絹袋盛好酒二升於瓷甕中浸密封經七日後每日旋取一小盞不計時候溫酒飲之常令酒氣相續其酒取一盞入一盞以藥味薄即止側子散出醫方集成治中風手足不遂言語謇澀今用之纍驗側子炮附子炮羅參白朮煨川芎白茯苓去皮防風去蘆赤芍藥當歸去蘆酒浸秦艽去蘆土肉桂以上各一兩防己七錢半麻黃去根節二兩粉草五錢炒白茯神去皮木甘菊花去梗細辛去苗各一兩上㕮咀每服五錢水一盞半生薑三片棗一枚煎服不拘時候芎藭湯治中風手足不遂身體疼痛口眼喎斜一眼不合芎藭防風去叉白朮白芷牛膝去苗人參葛根銼羌活去蘆各一兩狗脊去毛萆薢炒薏苡仁炒各半兩杏仁去皮尖雙仁炒一兩石膏碎二兩麻黃去根節先煎掠去沫焙乾用二兩桂心去粗皮一兩半上㕮咀每用十二錢匕水三盞去滓分三服微熱服之日二服夜一服服藥後宜依法次第灸諸穴風池二穴肩顒一穴曲池一穴支溝一穴五樞一穴陽陵泉一穴巨虛上下廉各一穴灸九穴即瘥一方治偏風用生薑半片同煎不用灸法犀角湯出聖惠方治中風手足不遂關節疼痛心胸躁熱犀角鎊半兩防風去叉三分枳殼去瓤焙炒獨活去蘆頭桂心去粗皮各半兩秦艽去苗土當歸切焙芍藥赤者白茯苓去黑皮一作赤葛根銼牛膝酒浸切焙仙靈脾人參各三分黑豆炒熟一合半上粗搗篩每服六錢匕水二盞入生薑五片煎至一盞去滓溫服上焦虛煩肝心風熱加竹瀝半合同煎食後臨臥各一服一方加熟乾地黃沒藥丸出御藥院方藥治中風手足不遂五加皮散出聖惠方治中風手足不遂肌肉頑痹骨節疼痛五加皮桂心羌活防風杏仁酒浸去皮尖雙仁麩炒黃萆薢銼枳殼麩炒微黃去瓤附子炮裂去皮臍牛膝去苗薏苡仁丹參以上各一兩芎藭秦艽當歸銼微炒以上各一兩半上為散每服五錢以水一大盞入生薑半分煎至五分去滓空心溫服良久再服衣覆得微汗佳食前服忌生冷油膩毒滑動風物醋石榴煎出聖惠方治中風手足不遂口眼喎斜語澀垂涎醋石榴皮防風桂心白朮赤箭附子炮裂去皮臍赤茯苓牛膝去苗赤芍藥枳殼麩炒微黃去瓤山茱萸羚羊角屑各一兩羌活一兩半上為末用酒五升慢火熬成膏盛於不津器中每於食前以暖酒調下半匙海桐皮丸出聖濟總録治中風手足不遂身體疼痛肩背拘急海桐皮二兩銼細石斛去根二分羌活去蘆半兩赤箭一兩半牛膝酒浸用細切焙白附子生防風去叉各一兩木香山芋各三分菊花牡荊子各半兩丹砂一兩研上為細末以天南星末二兩半同好酒煮為膏和丸如梧桐子大每服十五丸茶酒任下青龍丸出聖濟總録治中風手足不遂涎涕膠黏附子炮裂去皮臍芎藭白朮米泔浸三日每日換泔取出焙乾獨活去蘆各一兩蒲黃用紙襯炒一兩藁本去苗土一分牛黃研一分麻黃去根節百沸湯中急煮過焙三分丹砂研龍腦研各一分麝香研半錢龍膽一分滴水一兩點令化入藥內上為細末別用水銀三兩以蒸棗五十枚去皮核同研水銀星盡為度次入諸藥更入少許熟蜜和丸如雞頭大每服半丸或一丸臨臥以熟水化下其患甚者每服夜研二丸如小兒驚涎每丸分作三服用薄荷湯化下大四斤丸出直指方治風寒赤毒與血氣搏筋骨緩弱四肢痠痛天麻川牛膝去苗宣州木瓜肉蓯蓉洗切焙各一斤熟附子虎骨酥炙各二兩大當歸三分生麝香一錢乳香沒藥五靈脂各半兩上為末浸藥酒煮麵糊丸如梧桐子大每取三四十丸食前溫酒或豆淋酒下未效木瓜湯下蠍附散出直指方治肝腎氣虛風入筋骨手足緩弱小附子去皮草烏頭炮去皮臍蒼朮炒川芎牛膝酒浸焙當歸天麻各半兩防己白芷黃耆蜜炒全蠍炒各一兩上為末每一錢黑豆淋酒調下兼用核桃肉研酒下食前服附子散出聖惠方治中風手足不遂肢節疼痛附子炮裂去皮臍桂心各二兩赤箭牛膝去苗狗脊萆薢銼當歸丹參枳殼麩炒微黃去瓤仙靈脾海桐皮以上各一兩上為細末每服食前以溫酒調下二錢夜合枝醞酒出聖濟總録治中風手足不遂攣縮屈伸艱難夜合枝桑枝桂枝柏枝各生用銼五兩糯米五升石榴枝生銼五兩羌活去蘆別搗二兩黑豆緊小者五升防風去叉別搗五兩細曲七斤半上先以水五斗將五枝同煎取二斗五升去滓浸米黑豆兩宿蒸熟入曲與防風羌活二味拌和造酒依常醞法封三七日壓去糟滓取清酒三合至五合時飲之常令有酒氣無令過醉恐至吐即悖亂正氣附子湯出聖濟總録治中風身體不遂不能言語精神恍惚附子炮裂去皮臍一枚重半兩者桂去粗皮半兩葛根銼一兩半犀角鎊地骨皮白朮獨活去蘆頭芎藭各一兩石膏碎三兩上銼如麻豆每服五錢匕水二盞入生薑五片煎至一盞去滓溫服空心並一服夜一服或夜並二服服訖以熱姜粥投衣覆微汗出慎外風不欲汗即不必食粥生地黃煎出聖濟總録治中風手足不遂或拘攣屈伸不得口眼喎斜偏風疼痛或𤸷痹沉重病在筋骨生地黃五斤搗絞取汁令盡桂去粗皮二兩山芋二兩黑豆一升以水二升煎至一升去豆晚蠶砂炒二兩海桐皮炙銼三兩大甜石榴三顆去蒂萼和子皮搗研取汁上先㕮咀四味如大麻豆於銀石鍋內先煎地黃汁三二十沸次下石榴黑豆汁又煎二三十沸即下㕮咀四味勿停手攪慢火煎至濃用生帛絞去滓次下好酥二兩再煎勻攪如稠膏即收於不津器中每日空腹以無灰酒一盞調煎半匙投攪和服之如疾甚者加至一匙頭每日三服切慎房室此方兼治婦人産後風血惡疾羚羊角煎出聖濟總録治中風手足不遂羚羊角鎊荊芥穗羌活去蘆熟乾地黃焙各一兩防風去叉銼二兩黑豆二盞小者和防風炒熟勿令焦酒五升乘防風黑豆熟淋之上先以四味㕮咀如麻豆每服五錢匕用煎豆淋酒一盞半同煎至八分去滓重煎如膏每空心溫酒調服日三夜一不拘時候赤箭丸治中風手足不遂肢體𤸷麻骨節疼痛赤箭獨活去蘆各一兩麻黃去節半兩烏頭炮裂去皮臍二兩芎藭三分乾蠍去土炒當歸切焙各半兩上為末煉蜜丸如梧桐子大每服三十丸薄荷酒下不拘時候附子散治中風手臂不遂口面偏斜附子炮裂去皮臍桂去粗皮各二兩半乾薑炮二兩半細辛去苗葉一兩半防風去叉二兩半甘草炙銼三分上為散每用溫酒調服一錢至二錢匕空心午時合一方有人參無甘草天麻丸治中風手足不遂筋骨疼痛行步艱難腰膝沉重天麻二兩地榆一兩沒藥三分研烏頭炮裂去皮臍一兩玄參一兩麝香一分研上除麝香沒藥細研外同搗羅為末與研藥拌勻煉蜜和丸如梧桐子大每服二十丸溫酒下空心晚食前服烏雞散治中風手足不遂口眼喎斜桂去粗皮一兩半細辛去苗葉三兩防風去叉銼三兩半乾薑炮二兩半烏䳄雞肉炙乾一兩半上為散每服半錢加至一錢食後良久溫酒調下日二夜一未覺稍增加至一錢半以效為度蒴藋煎治中風手足不遂生蒴藋根汁一升酥四兩生地黃汁一升附子炮裂去皮臍別搗密絹細羅為末一兩生薑汁二合蜜二兩上先取蒴藋地黃汁附子末同煎煉成稀膏後入酥蜜薑汁更煎令稠入瓷器中每日空腹及夜臥溫酒調半匙服天麻丸治中風手足不遂肢體疼痛天麻地榆各一兩玄參一兩烏頭炮裂去皮臍二兩胡蜂蛹子三十枚焙乾上為末煉蜜丸如梧桐子大每服三丸食前薄荷酒嚼下獨活湯治中風不能言四肢不收手足嚲曳白芍藥桂心栝蔞根各三兩甘草三兩獨活二兩上銼散每四錢姜五片水二盞煎六分去滓入生葛汁一合和服脾脈絡胃挾咽連舌本散舌下心之別脈系舌本今心脾二臟受風邪故舌強不能語也白朮醞酒治中風手足不遂神識冒昧補心定氣白朮生用切地骨皮荊實生用各五升菊花未開者生用五升上粗搗篩以水三石同煎取一石五斗去滓澄清取汁釀黍米二石用曲如常醞法酒熟壓去糟滓取清酒於瓷器中收密封每服三合至五合續飲之有能飲者常令半醉但勿至吐凡心風虛寒亦宜服此酒後灸心俞兩邊各一寸五分並五十壯治男子婦人中風不能轉側麻黃一兩地骨皮一兩生杏子一兩木鱉子一兩上為粗末一服四兩河水熬送下防風湯治風虛發熱項背拘急肢節不遂恍惚狂言來去無時不自覺悟亦治腳氣緩弱甚效此藥溫和不虛人秦艽去苗土獨活去蘆麻黃去節半夏湯洗七次切片用防風去蘆各二兩升麻防己白朮石膏煅白芍藥黃芩甘草當歸去蘆遠志去心人參去蘆各一兩上為末入半夏片令勻每服四錢水二中盞生薑七八片煎至一盞去滓取清汁六分入麝香末少許食後臨臥帶熱服一方用白朮一兩有熱加大黃二兩先有冷心痛者倍當歸加桂三兩無大黃大豆浸酒治中風手足不遂用黑豆一升揀緊小者淨淘用酒五升同入瓶中密封用灰火煨常令熱約至酒減半即去豆取酒每服空心及臨臥時各飲二合至三合一方用麵炒豆治手足不遂取青布燒作煙就小口器中熏痛處治身中有掣痛不仁不遂處者取干艾葉一斛許丸之內瓦甑下塞余孔唯留一目以痛處著甑目上燒艾以熏之一時愈矣又方取朽木削之以水煮令濃熱灼灼爾以漬痛處效局方烏荊丸治風疰手足亦治便血川烏一兩炮去皮荊芥二兩上為末醋糊為丸如梧桐子大每服二十丸熟水吞下果皮丸治久患風疾手足不遂果州陳皮川當歸上為末酒糊為丸湯酒任服不拘多少親見人用之取效神妙治手腳不遂等風以人肝藤生研服之導引法養生方云極力左右振兩臂不息九通愈臂痛勞倦風氣不遂振兩臂者更互踶跴猶言蹶九通中間偃伏皆為之名蝦蟆行氣不已愈臀痛勞倦風氣不遂患久行不覺痛癢作種種形狀又云偃臥兩膝布兩足生腰口內氣振腹七息除壯熱疼痛兩脛不隨又云養生方云極力左右振兩臂不息九通愈臂痛勞倦風氣不遂振兩臂者更互踶跴猶言蹶九通中間偃伏皆為之名蝦蟆行氣不已愈臀痛勞倦風氣不遂患久行不覺痛癢作種種形狀又云偃臥兩膝布兩足生腰口內氣振腹七息除壯熱疼痛兩脛不隨又云療四肢疼悶及四肢不遂腹內積氣床席必須平而且穩正身仰臥緩解衣帶枕高二寸握固者必兩手各自以四指把手拇指舒臂令去身各五寸兩腳立指相去五寸定心安意調和氣息莫思餘事意專念氣徐徐漱醴泉漱醴泉者以舌舐略唇口牙齒然後咽唾徐徐以口吐氣鼻引氣入喉須微微緩作不可卒急強作待好調和引氣吐氣勿令自聞出入之聲每引氣心心念送之從腳指頭使氣出引氣五息六息一出之為一息數至十息漸漸增益能至百息二百息病即除愈不用食生菜雞魚肥肉太飽食後喜怒憂患不得輒行氣唯須向曉清淨時行氣佳能愈萬病
