赤痛龍腦研半錢鉛丹羅半兩白蜜綿濾二兩上用和勻瓷瓶密封重湯煮一炊時取出點目眥菊花散出聖濟總錄治熱毒風上攻目赤痛頭旋眼花面腫菊花焙棑風子焙甘草炮各二兩上為散夜臥時溫水調下三錢消毒麻仁丸出直指方治肝熱風毒攻眼赤痛大黃五兩生山梔子仁十兩杏仁去皮二兩上為末煉蜜丸如梧桐子大每服三四十丸臨臥鹽湯下滌風散出直指方治風毒攻眼赤痛癢疼黃連去須蔓荊子各半兩五倍子三錢上銼細末分三次新水煎濾清汁以手沃洗效何首烏丸出本事方治風毒眼患何首烏荊芥甘草各等分上為細末用砂糖為丸如彈子大每服一丸食後薄荷茶嚼下秦皮散出和劑方治大人小兒風毒赤眼腫痛癢澀眵多昏暗羞明滑石桂府巷秦皮黃連去須各等分上為細末每服半錢沸湯泡清溫洗不拘時金連子散治風毒赤眼腫痛時多熱淚磣澀難開白礬散出聖惠方治風毒攻眼腫痛時發時瘥或生赤脈白礬馬牙硝黃丹各一兩上研細先固濟一瓷瓶子候乾入藥末在內以文火歇口燒出隱氣盡後用大火煅令通赤候冷入地坑內埋七日取出細研每取少許點之羊肝丸出簡易方治男子婦人肝經有熱目赤睛痛風熱上攻眼目暗淚出怕日羞明隱澀難開或癢或痛久近內外障眼攀睛胬肉不治宜此藥治之忌食豬肉蒜生萵苣冷水等物黃連去須為末白羊子肝一具淨去末上將羊肝於砂盆內杵爛旋入黃連末拌擂乾溼得所丸如梧桐子大每服三十丸食後溫漿下連作五劑即瘥諸眼疾及翳障青盲皆主忌豬肉及冷水凡治目方用黃連者多此方為最劉禹錫云崔承之者因官治一死囚而活之囚後數年因病致死一日崔忽為內障所苦喪明逾年半夜嘆息獨坐聞階除間悉索之聲崔問為誰曰是昔所蒙活囚今故報恩至此以此方告訖而沒崔依方合服不數月眼復明更傳此方於世又今醫家洗眼以當歸芍藥黃連等分停勻以雪水或水煎濃汁乘熱洗冷即再溫洗甚益眼目但是風赤目花翳等皆可用之甚有效凡眼目之病皆血脈凝滯使然故以行血藥合黃連治之血得熱即行故乘熱洗之用者無不神效驅風散出三因方治風毒上攻眼腫癢澀痛不可忍或上下瞼眥赤爛浮翳瘀血侵睛風眼爛眩及冷淚眼五倍子去土一兩蔓荊子洗一兩半上為細末每服二錢水二鍾銅石器內煎及一盞澄清熱洗留滓二服又依前淋洗大能明目去澀癢或用桑枝灰淋洗亦效龍腦硼砂散出御藥院方治頭目風熱上攻龍腦半兩南硼砂一兩上研極細每用少許兩鼻搐之截惡眼立效方出瑞竹堂方白礬好者如黑豆一大塊山梔子一個剝去皮上㕮咀用無糨絹帛包定以井水於小盞浸之候水浸透水黃洗眼二三十次次早無事立效杏連散出永類鈐方治風熱上攻羞明澀痛兼治暴赤眼黃連去須錢捶碎杏仁七枚捶碎上用水半盞二藥在內頓飯上蒸一時久澄清後溫洗了用紙蓋頓於湯瓶上頻頻洗之一方用砂糖熬膏地上出火毒井華水開點並治小兒腐眼龍腦膏出聖惠方治風毒攻眼昏眼赤熱腫痛龍腦半分細研馬牙硝一分細研上為羊膽一枚納入龍腦等藥浸二復時於瓷瓶內摘破研勻成膏每日三度點之秦皮洗眼方出聖濟總錄治風毒沖目虛赤痛風淚不止上用秦皮去粗皮銼二兩以漿水一碗煎五三沸浸一宿去滓洗眼日三兩度極效攻毒散出楊氏家藏方治風毒上攻兩眼暴赤腫隱澀難開用乾薑不以多少洗淨㕮咀每用二錢薄綿緊裹沸湯乘熱洗如冷再溫更洗春冰散治風眼除瘀熱盆硝鍋內煉取白色白礬飛過青鹽各一兩黃丹水飛雄黃少許腦半錢上為細末點眼治腦中熱毒風除眼中障翳鎮心明目大食國胡商灌頂油法出聖惠方生油二斤故鐵鏵五兩碎擇洗硝石半兩寒水石一兩馬牙硝半曾青一兩上件藥以綿裹入油中浸一七日後可用一錢於頂上摩之及滴少許入鼻中甚妙荊芥散治風毒上攻頭目干荊芥穗五兩干薄荷葉三兩木賊二兩蟬蛻二兩洗去塵土焙乾蛇蛻皮一錢炒黃別研為細末上洗搗四味次入蛇蛻皮末勻每服一錢以臘茶調下或酒調下不拘時候石決明散治風毒氣攻入頭系眼昏暗及頭目不利石決明羌活去蘆頭草決明菊花各一兩甘草炙銼半兩上為散每服二錢以水一盞煎六分和滓食後臨臥溫服密蒙花散治風眼除瘀熱密蒙花二兩當歸川芎各二兩砂仁八錢桔梗防風各四兩薄荷五兩黃芩二十兩甘草十兩上㕮咀水煎服滌昏膏出宣明論治一切風眼疼痛不可忍者好蜂蜜一斤黃丹炒紫色黃連各一兩沒藥半兩上入蜜同熬黑煎黃連成稠汁入二味藥內煎熬稠更入沒藥末同熬數沸濾去滓洗之後更見眼眉骨及頭痛門通天散搐鼻亦得秦皮湯出聖惠方治風熱上衝目赤痛久患不瘥秦皮銼碎三兩黃連去須一兩蕤仁半兩去皮淡竹葉洗切三十片青五銖錢七六上水一升半煎七分去滓臨臥時用淨綿漬點眼中或洗亦得治熱上攻兩目鮮赤瘨腫全不得開晝夜疼痛不可勝忍宜服此兩方出護命方川芎羌活蒺藜去刺牡丹皮去心柴胡去毛蒼朮去皮大黃炮熟決明子荊芥穗連翹子木香當歸檳榔地骨皮去土各一分上細杵羅為末每服一錢半食後煎薄荷湯調下溫和去滓服若大腑秘即和滓服治熱毒上攻兩眼赤腫痛瘨晝夜疼痛不可勝忍宜吃此方將此方對證前方早晚食後各一服出護命方麥門冬去心玄參木香羌活川升麻麻黃去根黃芩貝母去心決明子大黃炮熟當歸牽牛各一分半夏三銖上為細末每服二錢水一鍾煎取七分食後去滓吃大腑秘和滓服青龍丸出余居士選倚方治風毒熱氣上攻眼目赤痛翳膜功效不可細述更是冷熱虛實一切眼疾並可服當歸去蘆頭洗去塵土微炙切焙乾用秤四兩黃芩三兩生用木賊去節三兩木鱉子三兩琥珀半兩白研麻