龍腦膏出聖惠方治眼風赤冷淚翳膜龍腦細研麝香細研膩粉郁李子仁湯浸去皮蕤仁湯浸去皮黃連去須硝石各一兩古字錢二文上為散研令勻以白蜜四兩同入在瓷瓶中密封頭於炊飯甑內蒸飯熟為度如患者以銅箸不計時候點之玄參湯一名羚羊角湯出聖濟總錄治風熱氣衝目赤癢痛玄參黃芩去黑心各一兩羚羊角鎊三分蔓荊實去皮各三分甘菊花三分一方用一兩防風去叉一兩蒙花一兩半上粗搗篩每服五錢以水一盞半煎至八分去入馬牙硝半錢許食後臨臥溫服日再治一切風赤眼皮上瘙癢赤爛久治不效此藥神效不可盡說出護命方白蜜三銖輕粉十字白蠟三銖臘月豬脂半兩上為熔豬脂成油漸入白蜜次下白蠟候三味總化成油入輕粉攪令勻非時用擦眼赤皮上以上藥只於銅石器內煉點眼銅綠膏出聖惠方治風赤眼及癢痛銅綠半兩龍腦半錢麝香半錢烏魚骨一分馬牙硝一分蕤仁一分湯浸去皮水銀一兩豆大上研如粉每服用藥一字入人乳汁中調和如膏每以銅箸頭取少許點之日三五度洗風赤眼腫痛方一名洗眼方出聖惠方青鹽一分決明子柴胡去苗秦皮防風去蘆頭蛇銜草各一兩生乾地黃二兩上銼和勻水三大盞煎二盞濾過每用暖三合洗眼了避風瘥洗眼槐枝湯出聖惠方治眼風赤磣澀生赤脈及膜熱淚出不止槐枝一大握柳枝青嫩如小指大者各握長三寸青錢三十文青鹽半分漿水二斗醋淡得所生朴硝一分上銅器中以慢火煎不得令火急常微沸如魚眼又別以槐枝柳枝如箸長十數莖以綿纏攪藥兩頭俱使看色變復換新者待漿水色綠苔減半於瓷器中盛溫洗眼用之避風五生散出互選方治目赤去頭風退昏天雄附子各半兩防風一兩天南一兩川續斷一兩生用上為飲子每服二錢水一盞半生薑七片酒少許煎至六分食後溫服因頭風而病目者服之效青梅煎青梅二十枚洗淨拍研碎可三月三日取上好者古文錢四十九文白鹽一兩川朴硝三兩馬牙硝半兩上以漿水二大盞納新磁瓶中盛密封頭埋地淨處一月後取出可用每點少許日三五度黑豆湯出聖濟總錄治目風赤熱痛黑豆二合生用羌活去蘆頭惡實根去莖洗銼焙上粗搗篩每服五錢以水一盞半煎至七分去滓入乳糖一錢許食後臨臥服銅青湯出聖惠方治風瞼青赤眼防風一寸許銅青黑豆大一塊杏仁二枚去尖不去皮上為細切於盞中新汲水浸湯瓶上頓令極熱乘熱洗之如痛者加當歸數片救急療久患風眼方黃連一小兩碎印盛鹽兩豆大許肥大幹棗兩頭去核細切上以井華水半大升納前件藥攪緩火煮三分去一以綿濾使盡其餘汁更緩火煎之候藥上有紫液起即是成煎以物盡刮取於盒內貯之勿使塵汙用取二豆大許以人乳和之置兩眼眥頭從淚出每著杏仁咽喉即停瘥亦不勞避風毒欲出時口含鹽水以洗之忌食豬肉春雪膏治風赤眼腦子一錢蕤仁二錢去殼麝香半錢上研極細末用蜜相和點眼中點眼蕤仁膏出聖惠方治風赤眼蕤仁半兩去皮浸膩粉二錢驢脂一分上先將蕤仁研細又下膩粉驢脂勻調如膏盛於瓷盒內勿令風土入夜眠時以銅箸取少許點目中繭滷點眼膏出聖惠方治眼風赤熱淚虛腫赤澀痛繭滷一升清香者青梅二十七粒古文錢二十一文上以新磁瓶盛密封於湯中煮一炊久取經三日後每以銅箸頭取少許點目中日三五度黃連點眼方治目風赤又方出聖惠方治風赤眼腫痛膩粉半分銅綠一分細研上以酥調成膏每用睡時先用鹽湯洗眼拭乾塗眼赤處治風赤眼方出聖惠方黃連半去須搗為末豬膽一枚取汁上黃連搗作團卻入在膽內於屋檐下懸令乾淨去塵土搗羅為末煉蜜為丸如黃米大每服夜臨臥時以黃連湯下五丸治風赤澀痛出肘後方取訶黎勒核入白蜜研注目中神良一方用鷹嘴者一枚滴蜜於石上磨點枸杞方出龍木論治風熱生膚赤白眼及去眼中風癢痛搗枸杞子汁點眼立驗亦治暴赤眼風障赤膜一方用葉搗汁含一滿口待稍溫熱咽之拜堂散治風赤眼以五倍子為細末貼破赤處治風赤眼出聖惠方以地龍十條炙乾為末夜臥冷茶調下一錢服熏眼洗方治風爛方眩臨洗加輕粉少許凡時氣赤眼自外而入非臟腑病者不必服藥熏洗足矣黃連去須草芎去蘆蔓荊子一錢去葉膜五倍子三錢剪碎去垢銚內火炒待赤色紙鋪地上用蓋片時出火氣上為銼散作三服每服用生絹一小方洗淨入藥絹內以線扎定水煎仍以紙糊瓶口勿令氣出卻於無風處就瓶口紙上破一小孔熏之後候氣稍平揭去瓶紙熏於瓶口之氣溫傾出用淨絹蘸洗如此三次為效驗仍避風毒洗眼黃連散出神效方治一切風毒赤目當歸赤芍藥黃柏黃連各等分上細銼以雪水或甜水濃煎汁熱洗治風沿眼赤黃連一兩輕粉一分海螵蛸二錢去殼爐甘石四兩以童子便浸七日煅七次為末上為細末點眼洗肝散出本事方治風眼赤痛黃芩甘草炙各半兩菊花人參各一兩上為細末每服一錢熟水調下各用忌毒物搐鼻藥出危氏方治目風熱腫赤難開雄黃水透過辰砂各二錢細辛半兩腦麝少許上為末口含水以藥少許搐鼻中治遠年風赤眼出瑞竹堂方杏仁一十一個去尖分作三分粉草一寸分作三分上漱口淨將杏仁一分甘草一分同嚼爛如泥於瓷盞內三分俱如此嚼爛用銅綠二錢研為細末與前藥和勻用新井水一盞將水漱口吐於藥內如法攪以綿濾過澄清於眼大角點之效勿令塵灰入藥內又方出瑞竹堂方治近年風眼赤銅綠研寒水石上各等分碾為細末用五七沸滾水浸在藥內攪勻澄清將水面上藥膜掠去將清藥水於眼大角上點之勿令塵灰土入內立效桑葉方出龍木論用桑葉春葉未開枝可作煎服治一切風眼赤乳香散治赤眼頭風等症乳香川芎沒藥石膏雄黃銅綠盆硝上等分為細末搐鼻點眼雄黃散治風毒赤痛眥爛生瘡衝風有淚雄黃研黃連去須黃柏去粗皮各一兩半乾薑炮三錢菊花一兩上為細末於瓦器中盛每取黍米許點目眥效
