body:
  text: 卷七十五眼目門風毒沖目虛熱赤痛附論夫眼者肝氣所通陰陽所注若風邪毒氣在於臟腑積久日不能消散傳注於肝肝受風邪上焦壅滯乃攻於眼也其狀瞼眥赤腫癢悶難忍隱澀羞明淚眵交下見風尤甚是皆脾肺受風肝經不利若不治則風邪熾盛傳而為熱多致連瞼赤爛宜速洗滌瘀爛清潔瞼膚兼餌以除風鎮肝之藥此候白睛先赤而後癢痛迎風有淚閉澀難開或時無事不久又發年深則睛變成碧色滿目如凝脂赤露橫赤如絲此毒風積熱又云此症或先赤爛多年肝經為風熱所沖而成或用力作勞有傷肝氣而得或癢或痛自兩眥頭胬出心氣不寧憂慮不已遂乃攀睛或出筋膜又云眼胞皮肉有似膠凝腫高如桃李者時時出熱淚乃風毒所注宜消風散及花草膏點之又云眼為暴風所攻致白睛起障覆黑珠瞼腫癢痛宜服白殭蠶散山芋散出聖濟總錄治風毒沖目瞼眥赤腫癢痛山芋白芷桔梗防風去叉石膏羌活去蘆頭寒水石煅石決明赤茯苓去黑皮當歸切焙藿香葉零陵香大黃蒸三度曝二牛膝酒浸切焙人參決明子鬱金梔子仁桑根白皮銼葛根銼狗脊去毛各一兩甘草炙銼生乾地黃焙蒺藜子炒去角木賊銼陳橘皮去白皮玄參二兩蒼朮米泔浸一宿切焙四兩沙參炙二兩木香一兩上為散每服二錢用水煎麥門冬熱湯調下食後臨臥服決明子丸治風熱上衝眼目或因外受風邪眼痛視物不明決明子炒細辛去苗葉青葙子二兩蒺藜子炒去角川芎茺蔚子升麻獨活去蘆頭羚羊角防風去叉各半兩菊花一兩黃連去須枸杞子玄參各三兩上為末煉蜜和丸如梧桐子大每服二十丸淡竹葉熟水下加至三十丸還睛丸治風上攻眼目赤腫怕日羞明多淚隱澀瘀肉侵睛或痛漸生翳膜白朮生用菟絲子酒浸另研防風去蘆羌活去苗白蒺藜炒去尖密蒙花木賊青葙子去土蟬蛻退頭足翅上各分為細末煉蜜為丸彈子大每服一丸嚼白沸湯吞下空心食前日三服七寶散治風眼除瘀熱當歸一錢半芍藥一錢半甘草白礬各一錢杏仁去皮七個黃連真銅綠各三分細研上㕮咀以同放磁盞內於鍋中坐煎至八分去滓澄清臨臥時洗甘菊花散出聖濟總錄治風毒沖目赤腫澀痛甘菊花旋覆花密蒙花青葙子石決明羌活去蘆頭木賊銼蒼朮米泔水浸宿去皮切炒決明子炒蟬殼荊芥穗甘草炙防風去叉芎藭人參黃芩去黑心各一兩上為散每服二錢以米飲調下早晚食後服甘菊花出聖濟總錄治風毒沖目虛熱赤痛菊花決明子車前子丹參防風去叉蕤仁去皮升麻黃連玄參黃芩去黑皮心大黃銼炒葳蕤細辛去苗葉甘草炙銼人參各一兩上為末煉蜜為丸如梧桐子大食後臨臥溫水下三十丸蟬花散出和濟方治肝經蘊熱風毒之氣內搏上攻眼目翳膜遮睛赤腫疼痛昏暗視物不明隱澀難開多生眵淚內外障眼蟬蛻洗淨去土穀精草洗去土白蒺藜炒菊花去梗防風不見火草決明炒密蒙花去枝羌活蔓荊子去白皮黃芩去土山梔子去皮甘草炒木賊草淨洗川芎不見火荊芥穗各等分上為細末每服二錢用茶清調服或用荊芩湯入茶少許調服亦得食後臨臥時俱可服細辛散出聖惠方治風毒攻兩眼緊小羞明風淚視昏暗細辛甘菊花各三分犀角一兩牛黃細研羚羊角屑密蒙花各半兩蔓荊子赤芍藥各半兩龍腦細研天竹黃細研各一分琥珀細研硃砂細研防風去蘆頭酸棗仁微炒各三分甘草一兩炙微赤銼上為細末入研了藥令都研勻每服不計時候以溫酒調下一錢車前子丸出聖惠方治風毒攻眼赤澀痛疼視物不明心神煩躁車前子青葙子石膏細研水飛槐子炒香各一兩木香甘菊花川升麻牽牛子微炒石決明搗細水飛秦皮真珠末犀角屑芎藭麥門冬去心切二兩半上為末煉蜜為丸如梧桐子大每服二十丸食後臨臥溫熟水下加至三十丸烏頭煎丸出聖濟總錄治風毒攻眼久成內外障及積年痛楚胬肉赤脈烏頭二兩去皮生用雄黑豆小者二兩甘菊花一兩牛膝酒浸切焙枸杞子芎藭羌活去蘆頭地龍去土炒白蒺藜當歸荊芥穗干薄荷各半兩青橘皮湯浸去白半兩同烏頭黑豆同為末以水一升三合浸一宿焙乾火煎膏上除烏頭膏外搗羅為細末入烏頭膏和勻臼中搗三千杵丸如梧桐子大每服二十丸空心茶酒送下開明散治風毒氣眼朦澀障膜蒺藜炒去刺防風羌活川芎天麻茯苓蟬殼蒼朮童尿浸一宿焙各半兩荊芥華陰細辛茺蔚子甘草各炙一分甘菊去萼二兩上為細末每服二錢鹽一點食後沸湯點下香芎丸出聖濟總錄治風毒沖目赤癢痛芎藭枸杞子荊芥穗蒼朮米泔浸一宿切焙各二兩細辛去苗葉蟬殼菊花莎草根炒去毛決明子石膏銼甘草炙旋覆花各半兩上為細末煉蜜為丸如彈子大每服一丸臘茶嚼下不拘時候甘菊花丸出聖惠方治風毒沖目虛熱赤痛甘菊花一兩決明子一兩半車前子二兩防風二兩去蘆頭黃連川升麻子茶各一兩蕤仁一兩半湯浸去赤皮川大黃三兩銼炒玄參一兩葳蕤二兩上為末煉蜜和搗三二百杵丸如梧桐子大每服食後溫漿水下一十丸日三柴胡湯出聖濟總錄治肝虛風熱上衝目暗赤痛柴胡去苗車前子梔子仁決明子微炒黃芩去黑心各二兩黃連去須一兩一方用半兩甘草炙銼一兩一方用半兩防風去叉羚羊角各一兩馬牙硝一兩一方半兩升麻一兩半一方用大麻仁上粗搗篩每五錢以水一盞半煎至八分去滓食後臨臥服金絲膏出聖濟總錄治風熱上攻目赤腫痛黃連去須二兩大黃龍膽黃柏去粗皮當歸山梔子仁各一兩以上同搗研青竹葉一百片切大棗二十枚去核切燈心切硼砂明者乳香研各一兩上用水五升不拘冬夏浸一時辰取出於銀器內慢火熬不令大沸候泣盡汁下火放冷用絹絞取汁於無風土處澄一時辰去滓於銀器內慢火熬令減半入白蜜半升同攪候有蜜香以手挑起有絲即止放冷再以細絹袋子濾過以瓷盒盛之每取一茶腳許研龍腦一字極細入攪三千遍令勻取少許點之琥珀煎出聖濟總錄治風毒沖目腫赤癢痛乳香末二錢蕤仁研半兩鉛丹滑石各二兩黃連末秦皮各二兩白蜜黃芩去黑心各四兩木鱉子去殼十二枚柳枝槐枝並青新者各十枝每枝長半寸上將槐枝秦皮黃芩滑石等粗杵碎以水三碗同煎至二碗去滓其餘乳香蕤仁鉛丹木鱉子四味與蜜同熬如琥珀色卻共前項藥汁並連同煎至一碗半用熟絹濾去滓入瓷器內密封系垂在井底一夜出火毒每用銅箸點以目澀為度熬點不得犯鐵器羌活散出三因方治風毒氣上攻眼目昏澀翳膜生瘡及偏正頭疼目小黑花累累者羌活川芎天麻青皮藁本旋覆花天南星炮各一兩上為細末每服二錢水一盞姜三片薄荷七葉煎七分食後服一法入牽牛末二兩以生薑汁煮糊丸如梧子大茶酒米飲下二三十丸日三服兼翳內障及暴赤眼決明子散出仁存方治風熱毒氣上攻眼目腫痛或猝生翳膜或赤脈胬肉或癢或澀羞明多淚或始則昏花漸成內障及一切暴風客熱皆宜黃芩木賊決明子菊花去枝石膏川芎赤芍藥川羌活去蘆甘草蔓荊子石決明各一兩上為末每服三錢水一盞姜五片煎至六分食後服羌活散出直指方治風氣攻眼昏花澀淚羌活川芎天麻旋覆花甘菊藁本防風蟬殼洗細辛杏仁去皮各一兩甘草各半兩上為末每服二錢新水略煎服羚羊角丸出聖濟總錄治風毒沖目虛熱赤痛羚羊角鎊防風去叉芍藥茯神去木麥門冬去心焙地骨皮決明甘草炙蕤仁各一兩上為末煉蜜丸如梧桐子大食後臨臥溫水下三十丸前胡湯出聖惠方治腎臟風毒沖眼赤痛及紫色前胡去蘆頭羚羊角屑茯神各三分防風去蘆頭決明子木通銼川朴硝各一兩玄參地骨皮各半兩川升麻三分上為粗散每服三錢以水一盞煎至六分去滓食後溫服菊花湯出聖濟總錄治熱毒上衝眼赤疼痛菊花一兩大黃銼炒半兩茯神去木玄參淡竹葉升麻犀角磅決明子黃參去黑心黃連去須各三分上搗篩為粗散每服三錢以水一盞煎至六分去滓食後溫服還睛丸出利濟方治一切內外障眼風毒赤腫怕日羞明眵淚隱澀難開眶癢赤痛瞼眥紅爛胬肉侵睛暴赤疼痛兼偏正頭目眩運川芎白蒺藜白朮羌活甘草密蒙花木賊去節青葙子菟絲子酒浸三日炒防風上各等分為末以蜜丸如彈子大每服一丸爛嚼白湯下空心三日和劑方無川芎黃芩散治風毒攻眼磣痛不可忍黃芩防風去蘆頭石膏細研水飛過知母地骨皮石決明搗細末水飛過梔子仁細辛赤芍藥各一兩黃連去須半兩上為細末每日食後及夜臨臥時以溫水調下一錢升麻散治肝臟熱毒沖眼生赤脈腫或生白翳或澀痛視物不明川升麻赤芍藥秦皮枳殼麩炒微黃去麩前胡去蘆頭黃連川大黃銼碎微炒川芒硝決明子各一兩梔子仁三分上粗搗為散每服三錢以水一鍾入淡竹葉二七片煎至六分去滓每於食後溫服決明子丸治風毒沖目虛熱赤痛決明子一兩半防風去叉黃連去須各半兩車前子二兩升麻黃芩去黑心大黃銼炒玄參葳蕤各一兩上為末煉蜜丸如梧桐子大食後以溫漿水下三十丸臨臥再服地黃丸治肝腎風毒熱氣上衝眼痛防風散治風毒攻眼瞼赤腫痛防風去蘆頭黃連去須決明子黃芩甘草炙赤銼川大黃銼碎微炒木通銼以上各一兩甘菊花三分赤芍藥一兩半上為粗散每服三錢以水一中盞煎至六分去滓每於食後溫服忌毒肉魚炙煉熱面羚羊角散治熱毒上攻眼目煩悶頭熱心躁小便不利羚羊角屑半兩赤芍藥木通玄參馬牙硝各一兩枳殼半兩面炒微黃去瓤梔子仁半兩上粗羅為散每服三錢以水一中盞入竹葉二七片煎至六分去滓每於食後溫服甘草散治熱毒攻眼胸膈壅悶煩喘甘草炙微赤銼葛根銼桔梗去蘆頭玄參車前子前胡去蘆頭貝母煨令微黃犀角屑川升麻各三分上為散每服三錢以水一中盞入生薑半分淡竹葉二七片煎至六分去滓每於食後溫服通膈薺苨散治風毒沖目心胸煩悶薺苨地骨皮葛根銼柴胡去苗黃芩各一兩蕤仁去皮甘草炙各半兩石膏二兩上為散每服三錢以水一中盞煎至七分去滓食後溫服臨臥再服洗肝散治風毒上攻暴作赤目腫痛難開隱澀眵多淚出昏暗羞明或生翳膜並皆治之大黃煨一方用黃連山梔子去皮防風去蘆薄荷川芎當歸洗去蘆羌活去蘆甘草炙各二兩上為細末每服二錢冷水或熱水食後一方用荊芥湯調下羚羊角散治大人小兒風熱毒攻眼目暴發赤痛或生瘡疼痛隱澀羞明黃芩升麻甘草炙羚羊角鎊車前子各十兩梔子仁龍膽草各五兩決明子十二兩上為末每服二錢食後溫熱水調下日三服小兒可服半錢瀉肺麻仁散一名大麻仁湯治熱毒攻眼澀痛方見大麻仁湯石膏散治肝臟壅熱毒攻眼赤頭疼煩渴蓋臟腑之精氣皆上榮於目若肝膽壅實營衛不行則心肺俱熱之氣伏留不散乃上攻於眼石膏二兩甘草半兩炙微赤銼犀角屑川升麻柴胡去苗葛根黃芩各一兩麥門冬一兩半去心焙上粗羅為散每服三錢以水一中盞入淡竹葉二七片煎至六分去滓每於食後溫服羚羊角湯治風毒沖目連瞼赤爛熱痛羚羊角鎊防風去叉芍藥茯神去木甘草炙銼羌活去蘆皮細辛去苗葉各一兩上粗搗篩每服五錢以水一鍾半煎至七分去滓食後溫服臨臥再服龍膽草散治上焦氣於風熱氣攻毒沖眼目暴赤磣痛羞明腫痛多眵迎風有淚翳膜攀睛胬肉隱痛並治之川芎不見火香附子炒去毛各四兩龍膽草洗去蘆草決明微炒菊花去梗各二兩甘草炙木賊洗淨去節各二兩上為細末每服二錢用麥門冬熟水入沙糖少許同調食後服或米泔調服亦得食後或臨臥服之菊花