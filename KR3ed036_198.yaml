黏食等物一方無驢糞汁知母鱉甲湯療溫瘧壯熱不能食知母鱉甲炙地骨皮各三兩竹葉切一升石膏四兩碎常山二兩上切以水七升煮取二升半去滓分三服忌蒜豬肉莧菜生蔥菜麻黃飲子治溫瘧煩悶麻黃一兩去根節牡蠣粉一兩蜀漆半兩甘草半兩犀角屑半兩知母半兩上銼以水二大盞煎至一盞半去滓分為三服一日服盡桂枝芍藥湯治瘧寒熱大作不論先後此太陽陽明合病也經曰熱勝而動也發熱則必汗泄經曰汗出不愈知為熱也陽盛陰虛之證當實內治外恐久而傳入陰經也桂枝三錢黃耆知母石膏芍藥各一兩上為末每服七錢至一兩水煎如藥服之寒熱轉大者則知太陽陽明少陽三陽合病也宜桂枝加黃芩湯和之松羅湯治溫瘧熱渴體痛松羅半兩烏梅肉炒梔子去皮各半兩升麻三分鱉甲去裙襴醋浸炙黃半兩上粗搗篩每服三錢水一盞入茶末半錢煎至七分去滓未發前空心服常山湯治溫瘧常山銼半兩鱉甲去裙襴醋浸炙黃甘草生銼炙各一兩車前草一握切成片子三合上粗搗篩每服三錢用漿水一盞浸藥一宿當發前一日以急火煎取七分去滓溫服竹葉恆山湯治溫瘧壯熱微寒溫瘧之候也壯熱後如覺微寒或戰瘧作時手足冷少時便壯熱亦有手足煩熱乾嘔者痎瘧先大寒後大熱者並主之淡竹葉一握恆山三兩切小麥一升上用水五升漬一宿明旦煮取二升溫分三服忌生蔥菜恆山飲出聖惠方治溫瘧煩悶恆山半兩甘草半兩生用冬瓜汁一升或生者煎汁亦可上銼以冬瓜汁浸一宿早晨煎五六沸去滓分為二服空心一服發前一服得吐瘥治溫瘧方用牡蠣和杜仲為末蜜丸每服三十丸溫水下又方取當歸煮飲汁瘧發作無時附論夫衛氣一日一夜大會於風府則腠理開開則邪入而病作當其時陰陽相併隨其所勝故生寒熱其動作皆有早宴者若臟腑受邪內外失守邪氣妄行所以休作無時也方硃砂丸出聖惠方治瘧寒熱發作不定體瘦不能食硃砂一分細研麝香一分細研恆山銼川升麻苦參銼猢猻腦蓋炙微黃鱉甲塗酥炙黃烏梅肉微炒柴胡去苗虎頭骨醋塗炙黃烏牛糞燒炙車軸垢木香白朮川大黃銼微炒地骨皮各半兩巴豆三分去皮心熬黃別研如膏紙裹壓去油上為末入研藥令勻煉蜜和搗三五百杵丸如梧桐子大空心服溫水下四丸漸吃冷茶半碗良久吐痰涎後便煎熱茶下二丸得吐利便效虎頭骨散出聖惠方治瘧發作無時寒熱不定虎頭骨一兩塗酥炙黃牡蠣三分炒轉色地骨皮一兩柴胡一兩去苗鱉甲一兩塗酥炙去裙襴知母一兩桂心半兩朴硝一兩上為散每服五錢水一盞煎至五分去滓食前溫服取下痰結為度天靈蓋丸出聖惠方治瘧發作無時經久不瘥天靈蓋一兩虎頭骨一兩猢猻頭骨一兩硃砂一分研細雄黃一分研細麝香一分研緑豆粉一分砒霜一兩細研上為末入後五味研勻五月五日午時面南粽子尖和丸丸如桐子大每服發前以青絹裹一丸系男左女右臂上一丸可治七人第七人冷醋湯下狐膽丸出聖惠方治瘧寒熱發作無時砒霜硃砂各半兩麝香阿魏各一分狐膽一枚黃丹緑豆粉各一分上細研勻端午午時用粽子尖和丸如桐子大發前冷醋湯下二丸忌食熱物桃奴丸出聖惠方治瘧發作無時節猢猻頭骨一兩生用巴豆一分去皮砒霜一分細研野杖人花一分桃奴向陽枝上半兩斑蝥一分炒微黃上為末於端午日午時合以飯和丸如梧桐子大令患人手把一丸時時顧示仍男左女右於手臂上緋帛系一丸虎睛丸出聖惠方治瘧發無時不定寒熱甚者虎睛一枚生搗細末臘月豬血少許硃砂一分研阿魏一分細末上研勻端午日合粽子尖七枚合丸如黍粒大男左女右手綿裹一丸砒霜丸出聖惠方治瘧發作無時不定寒熱砒霜一兩阿魏一分雄黃三分硃砂一分並細研上於端午日用糯米飯和丸緑豆大去發一時辰綿裹三丸男左女右塞耳中如惡發茶清下三丸當吐靈砂丹出聖惠方治瘧發作無時經久不瘥硃砂半分麝香二錢蝙蝠糞五十頭上研細用軟糯米飯和丸緑豆大未發時暖水下十丸必效方出聖惠方治瘧無問新久發無時黃丹四兩面塵一兩上取五月五日午時面東不語研搗獨蒜和丸雞頭實大男左女右於背上綿帛系一丸欲發時醋湯下之百瘥方出聖惠方治瘧無問新久發作無時恆山一兩末葎草一握去兩頭上以漿水二盞浸藥於星月下上橫一刀經宿明早晨煎取一盞去滓空腹分二服如人行七八里再服當快吐痰午後漸食粥又方出聖惠方用青皮一兩燒灰研細末發前溫酒調下一錢正發時又服一錢恆山湯出肘後方治瘧發作無時心下煩悶恆山二兩甘草炙一兩半豉五合綿裹上切以水六升煎去滓取三升再服當快吐仍節飲食忌海藻菘菜生蔥菜大效五丁飲子出海上方治瘧發作重者白豆蔻五個每個分作五塊生薑切如皂子大作二十五塊京棗五個每個分五塊半夏二十五個甘草五寸每寸分作五塊上通作一百二十五塊於未發前一日至晚作一劑水二碗煎一碗去滓再燒兩沸滾作三服夜間露於中庭至四鼓暖過熱吃一服再於曙色分時吃一服次至天曉吃些粥若稍空更吃一服便去睡極效藥餛飩出衛生方良薑吳茱萸胡椒各一分上為細末豬脾一條銼作臛加五味炒之一半滾藥一半不滾並作餛飩有藥者墨點之余者吞下無藥者嚼下一服效
