body:
  text: 卷一百九十八諸瘧門足厥陰肝瘧附論夫經謂足厥陰肝瘧在經則令人腰疼小腹滿小便不利如癃狀非癃也數便意欲恐懼氣不足腹中悒悒在藏則令人色蒼蒼然太息其狀若死者俱刺足厥陰蓋足厥陰之脈循陰器客之則小腹滿小便不利也肝為將軍之官謀慮出焉故病則恐懼不足也蒼蒼者肝之色也宜察其經絡臟腑而治之治肝瘧顏色蒼蒼顫掉氣喘積年不瘥鱉甲丸等方主之方鱉甲丸一名烏梅丸出千金方治肝瘧色蒼蒼顫掉氣喘久不瘥者如死或久熱勞微動如瘧鱉甲去裙襴醋浸炙蜀漆葉烏梅取肉炒常山銼知母焙各一兩半甘草微炙細辛去葉苦參葳蕤各十八銖香豉一合微炒石膏二兩研上為末煉蜜丸如梧桐子大每服十丸未發前米飯下臨發再服烏梅丸出聖惠方治肝瘧久不瘥烏梅取肉酒浸微炒常山銼各一兩知母犀角鎊屑丹砂別研龍骨別研升麻豉桂去皮甘草銼微炒桃仁湯浸去皮尖雙仁麵炒過各半兩虎頭骨醋炙鱉甲去裙襴酥炙黃一兩上為極細末再同研勻煉蜜和搜成劑於淨石臼中搗至二三百杵然後作丸如梧桐子大每服二十丸空心溫酒吞下晚食前再服蜀漆丸出聖惠方治肝瘧顏色蒼蒼顫掉氣喘變成癆瘧積年不瘥蜀漆烏梅取肉微炒常山銼各半兩鱉甲去裙襴醋炙石膏研各一兩豉一合甘草銼微炒知母苦參銼麝香細研桃仁湯浸去皮尖炒各半兩上為末同研令勻煉蜜和搗二三百杵丸桐子大空心溫酒下二十丸晚食再服粥飲下亦得知母湯出聖惠方治肝瘧上焦壅滯心煩頭疼寒熱不止肌肉消瘦不下食知母地骨皮升麻各一兩鱉甲同前犀角鎊屑人參麥門冬柴胡去苗石膏各一兩甘草生銼半兩虎頭骨酥炙過一兩半上粗搗篩每服四錢水一盞入香豉五十粒煎至六分去滓溫服不計時候木香犀角丸治肝瘧木香犀角鎊屑羚羊角鎊屑各一兩半升麻玄參堅者豬苓去皮滓炒檳榔各三兩鱉甲酥炙豉炒五兩上為細末煉蜜和丸如梧桐子大溫酒或米飲下三十丸分服體熱即去甘草檳榔加大黃五兩烏梅飲治肝瘧小便不利如癃烏梅取肉山梔子各半兩知母一兩芍藥木通銼生地黃升麻各二分上㕮咀如麻豆每服五錢水盞半煎至一盞去滓下朴硝一錢食後未發前分二服大柴胡湯出旅舍備要方治瘧寒熱嘔逆脈弦小緊間日頻日發作無時及傷寒熱結在裡腹滿譫言煩渴大小便澀並疾氣寒熱方柴胡去苗八兩芍藥黃芩各三兩半夏二兩半湯七次枳實炒去瓤半兩大黃二兩上為散每服五錢水二盞半姜五片棗三個同煎至兩盞去滓帶熱頓服半夏湯出衛生家寶方治瘧疾及暑毒消痰逐飲半夏湯洗七次白茯苓青皮去白陳皮去白枳殼去瓤炒桔梗炒各一兩上為銼散每服三錢水一盞半生薑十片煎至七分溫服手少陰心瘧附論夫心瘧者內經謂令人煩心甚欲得清水反寒多不甚熱刺手少陰是也蓋心為神舍邪不可干邪氣干之故煩心其欲清水者以心火內熱故也其反寒多不甚熱者內熱而外寒故也治宜通心經利邪熱則愈方甘草湯出千金方治心瘧不止或止後熱不歇乍來乍去令人煩心甚欲飲清水及寒多不甚熱者甘草一兩蜀漆三兩常山鱉甲各四兩石膏五兩香豉一合梔子烏梅各三枚竹葉切一升上㕮咀以水九升煮取三升分三服柴胡栝蔞根湯出衛生家寶方治瘧而發渴者大黃丸出聖惠方治心瘧發歇不定川大黃半兩炙銼常山一分香豉四十九粒砒霜細研一分鱉甲酥炙麝香一錢細研硃砂一分研細上為末入後三味研令勻醋煮麵糊和丸如梧桐子每服食前用桃仁冷醋湯下二丸忌食熱物熊膽丸出聖惠方治心瘧砒霜研半兩丹砂研麝香研雄黃研熊膽各一分上以熊膽和丸如緑豆大發日空心冷水下二丸臨發時再服一丸皆以冷水咽或當日便止或大作乃瘥如欲吐即以暖水下之當吐出痰涎麝香丸出聖惠方治心瘧麝香一分金箔三十片黃丹一分炒令紫色硃砂一兩砒霜一分上細研令勻用粳米飯和丸如梧桐子大男左女右中指上節用緋帛裹系一丸發前以冷醋湯下一丸忌食熱物常山丸出聖惠方治心疼瘧常山別搗桃仁取陳者去雙仁炒和皮搗各一兩鉛丹八錢細研豉一合炒令可碎攤盡手捻熟則搗上研為末煉蜜和再搗千杵丸梧桐子大每服十五丸雞鳴空心酒下欲發時再服十五丸其日不得梳洗發過方可飲食一方桃仁湯下硃砂丸出聖惠方治心瘧光明砂半兩研細常山一兩杏仁十枚湯浸去皮尖雙仁炒微黃上為末研入硃砂令勻煉蜜和丸如梧桐子大未發前粥湯飲下十五丸欲發時再服足太陰脾瘧附論夫足太陰之經脾之脈也脾經之瘧令人不樂好太息不嗜食多寒熱汗出病至則嘔嘔已乃寒寒則腹中痛熱則腸中鳴鳴已汗出故謂之太陰瘧又名脾瘧方木香丸治脾瘧木香附子炮去皮臍大黃銼炒厚朴去粗皮薑汁炙人參各一兩芍藥桂去粗皮京三稜煨獨活去蘆頭乾薑炮芎藭羌活去蘆甘草炙各半兩陳皮檳榔銼各二兩上為細末煉蜜丸如梧桐子大每服三十丸未發溫水下日三一方以前藥十五味為末瓷器盛之密封臨服加牽牛末二分同藥末一兩同研勻煉蜜為丸如梧桐子大心脹腹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痃癖氣塊男子腎臟風毒攻刺四體及陽毒腳氣目昏頭痛心間嘔逆及兩脅堅滿不消臥時橘皮湯下三十丸以利為度此後每夜二十丸女人血利下血痛刺積年血塊胃口逆手足心煩熱不思飲食薑湯下三十丸取利每夜更服二十丸小兒五歲以上脾氣腸胃氣喘空心溫湯下五七丸小者減丸數服凡胸腹飽悶不消脾泄不止臨臥溫酒下取利食毒癰疽發背山嵐瘴氣頭痛背縛拘緊便宜服之快利為度人常服此藥可以不染瘴疾凡瘴氣皆因脾胃實熱所致常以涼藥解隔上壅熱並以此藥通利稱善此丸本治嵐瘴及溫瘧大效李敦裕以此方刻石於大庾嶺得效者不可勝數昔人嘗有擁兵過漳者軍人皆感瘧用此治之應時患愈江南時值歲發溫瘧以此藥服之其效如神皆以得快利為度又記凡久瘧服藥訖乃灸氣海百壯又灸中脘三十壯尤善又加肉豆蔻六枚去根止瀉方用青蒿湯治脾瘧寒熱善嘔多汗青蒿附子炮裂去皮臍桂去粗皮厚朴去粗皮薑汁炙甘草炙陳橘皮湯浸去白焙半夏為末薑汁和作餅曝乾麻黃去根節草豆蔻去皮白朮各半兩藿香葉一兩上銼如麻豆大每服三錢匕水一盞生薑三片棗一枚擘破煎七分去滓溫服日三不拘時知母丸治瘧疾脾寒知母貝母草果甘草鱉甲酥浸九炙常山用淡豆豉一合米泔一升同煎乾下用豉細切常山上等分為細末煉蜜為丸如梧桐子大每服三十丸當發日入麝香酒送下仍用後藥助氣除桂建中湯黃耆兩半白芍藥一兩甘草二錢半上為末每服三錢水盞半生薑棗子入餳糖少許再煎化空心服常山丸出經效濟世方治脾瘧由熱氣內傷不泄故脾瘧令人病腸中熱痛外寒腸中轉鳴汗出治一切瘧疾常山一兩銼甘草半兩銼炒微赤知母一兩豉一合麝香一分細研鱉甲一兩塗醋炙令黃色先去裙襴上為末與麝香末和勻煉蜜為丸如梧桐子大於未發前溫水下二十丸臨發再服已試極驗人參飲治脾瘧人參甘草炙各一分陳皮湯浸去白焙半兩烏梅五枚去核焙草豆蔻七枚去皮上銼為末每服五錢用濕紙裹定熟水二盞生薑棗大撲碎棗二枚擘破瓷器內煎一盞去滓未發前溫服檳榔湯治脾瘧寒熱檳榔銼青橘皮湯浸去白焙前胡白朮菝葜各一兩上搗篩每服三錢水一盞煎至七分未發前去滓溫服橘皮散治脾瘧陳橘皮湯浸去白焙常山乾漆炒出煙桂去粗皮各三分牡蠣燒赤一分上為末每服三錢未發前溫酒下三服必瘥硫黃丸治脾瘧無問遠近阿魏研安息香入胡桃瓤研萊蔔子炒各三錢蕪荑仁炒研為末三分上為細末煉蜜丸緑豆大每服二十丸未發前溫水下得吐為度瘥後少蒜齏下餺飥食之仍以白芥子用紗囊盛男左女右繫於背常山丸治脾熱為瘧或不渴熱氣內傷不瀉令人病寒腹中痛腸中鳴汗出常山三兩甘草半兩知母鱉甲各一兩上為末蜜丸如桐子大未發前溫服十丸臨發前時服一服正發一服辰砂丸出宣明論治一切脾胃虛熱瘧不止者信砒甘草各一錢硃砂二錢大豆四十九粒上為末滴水和丸分作四十丸服發日日欲出時燈心湯下忌熱物每服一丸厚朴餳治脾瘧不思飲食厚朴去粗皮生薑汁炙三兩半夏為末薑汁焙乾一兩陳橘皮湯洗去白焙二兩上粗搗篩每服三錢水一盞生薑三片棗一枚擘破煎至七分去滓空心日午臨臥各一服姜橘散一名十棗湯出傳信適用方治脾寒及諸瘧上真橘皮不拘多少去白細切曝微干以生薑自然汁浸過陳皮一指許銀器內重湯煮乾焙為末每服三錢用隔年清水棗十枚水一盞煎至半盞以此藥通口服以棗下之於發日先一時辰服之不過兩服而止後再一服不拘老少孕婦皆可用服草果平胃散出危氏方治脾虛作瘧不問寒熱先後飲食不進以生料平胃散四兩加入草果大腹皮檳榔青皮各二兩銼碎相和勻每服五錢水一盞半生薑三片棗二枚煎七分空心多服取效半夏散治脾瘧草果飲治脾寒草果常山檳榔甘草少許黑豆各等分上㕮咀水二盞煎一盞去滓露一宿空心未發前溫服欻火丹治脾寒淡豉二兩人言二錢雄黃五錢硃砂三錢上為末用蒸餅量多少搗和為丸如梧桐子大每服五十丸隔發一時用冷水送下忌熱物濕面發毒等物三五日吳茱萸湯出楊子建護命方治脾寒發瘧非時發作肌肉黃瘦食減腸泄腹痛大腑不調吳茱萸煉洗焙炒乾芎藭鱉甲去裙襴酥炙防風人參蒼朮米泔浸一宿切焙藿香葉柴胡去苗肉豆蔻去殼甘草各等分上銼散每服三錢水一盞生薑二片煎七分去滓未發前空心溫服柴胡厚朴湯治脾寒柴胡厚朴青皮陳皮常山草果烏梅甘草縮砂檳榔各等分上㕮咀每服三錢水一碗煎八分露一宿五更冷服正發一服過後又一服良薑丸出朱氏集驗方醒脾治瘧良薑二兩上末豬膽丸梧桐子大紫蘇湯下二十丸手太陰肺瘧附論夫肺瘧者內經謂令人心寒寒甚則熱熱間善驚如有所見刺手太陰陽明是也蓋心肺獨居膈上其氣相通故瘧邪入肺內動於心則為寒熱善驚之候也方人參丸治肺瘧心寒熱善驚如有所見人參鱉甲同前桃仁去皮尖雙仁研恆山甘草炙銼肉蓯蓉酒浸切焙升麻各三分桂去粗皮三兩烏梅肉炒龍齒研各一兩杏仁去皮尖雙仁研一兩丹砂研一分阿魏研一分上為細末煉蜜和丸如梧桐子大每服十五丸空心米飲下未發時並二服麥門冬湯治肺瘧及補心氣麥門冬去心一兩半升麻知母銼焙甘草炙銼鱉甲醋炙去裙襴柴胡去苗前胡去蘆桃仁去皮尖雙仁研炒枳殼去瓤麵炒各一兩梔子去皮蘆根銼烏梅肉炒各兩半人參三分上粗搗篩每服二錢半入桃柳枝各五寸姜三片煎八分去滓入石膏末一錢更煎沸未發前一二服烏梅丸治肺瘧烏梅肉炒恆山鱉甲去裙襴醋炙人參知母焙肉蓯蓉酒浸切焙桃仁去皮尖雙仁各半兩上為細末煉蜜丸如梧桐子大每服三十丸溫酒或米飲下未發三服丹砂丸治肺瘧心神驚悸丹砂別銼阿魏醋化去沙石面和作餅炙麝香各一分鉛丹研一分上為細末取五月五日午時粽子三十個與藥同研於北斗下露一宿丸如桐子大未發前熱水下一丸將一丸緋帛裹安耳內男左女右二丹丸治肺瘧丹砂別研鉛丹別研甘草炙銼當歸各半兩恆山三分上為末煉蜜丸如梧桐子大每服三丸食前溫水下未發時再服候飢即以蔥豉粥與之杏仁丸治肺瘧杏仁四十枚湯浸去皮雙仁炒黃色恆山三分丹