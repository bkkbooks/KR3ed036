癢如蟲行藁本去苗土白花蛇酒浸去皮骨炙各三分人參三分枳殼去瓤麩炒防風去叉威靈仙各半兩防己一分上為細散每服一錢許食後溫酒或荊芥湯調下天麻丸出聖濟總錄治風客皮膚瘙癢麻痹天麻附子炮裂去皮臍芎藭白附子生用烏藥各一兩荊芥穗八兩龍腦別研麝香別研各一錢上除別研外為細末拌勻煉蜜丸雞頭大每服一丸空心臨臥溫酒嚼下治溫熱皮膚瘙癢出聖惠方白朮二兩蒴藋二兩黃連二兩白礬半兩黃芩二兩細辛一兩芎藭一兩茵芋一兩上件藥細銼以水二斗煮取一斗去滓旋旋分暖二升洗之日二三莽草湯出聖濟總錄治風皮膚𤸷麻疼痛搔癢淋洗方莽草藁本去土桔梗去蘆炒地榆穀精草枳殼去瓤麩炒生乾地黃洗切焙各一兩蜂窠一枚大者細銼上㕮咀每用三兩水一斗煎至八分乘熱淋患處天麻散出聖惠方治風瘙身體無處不癢或生瘡腫天麻防風去蘆白殭蠶微炒凌霄花微炒躑躅微炒各半兩枳殼麩炒微黃去瓤茺蔚子各三分白蒺藜一兩微炒去刺上為細散每於食前荊芥湯調下二錢烏蛇散出聖惠方治風熱客於皮膚遍身瘙癢烏蛇二兩酒浸去皮骨微炙元參秦艽去苗赤箭各一兩乾蠍微炒麻黃去根節豬牙皂莢炙黃枳殼麩炒微黃去瓤各半兩上細羅為散每服不計時候以溫酒調下二錢丹參出聖濟總錄治風瘙癢搔之成瘡丹參苦參升麻各一兩黃芩去黑心防風去叉各半兩枳殼去瓤麩炒烏頭炮裂去皮臍各一兩上為細末煉蜜丸如梧桐子大每服三十丸食後溫漿水下防風湯出聖濟總錄治風瘙癢如蟲行或𤸷痹不仁淋洗方防風去叉益母草苦參各三兩蒺藜子炒五兩荊芥穗二兩蔓荊實二兩枳殼去瓤麩炒二兩上㕮咀每用三兩水一斗煎至八升乘熱淋洗患處療舉體痛癢如蟲行齧齒上癢時搔則皮脫作瘡出千金方蒺藜三升碎蛇床子二升茺蔚子一升防風五兩大戟一斤大黃二兩礬石三兩熬上㕮咀以酒四升水七升煮取四升去滓納礬石三上火燒用帛拭身上瘥止一方無大黃風瘙粉方出聖惠方治風瘙癢皮膚生㾦癗搔之成瘡芎藭白芷麻黃根各四兩藿香三兩藜蘆二兩雷丸半斤篩粉四升上合和常用芒硝湯拭疹上兼用粉身威靈仙散出聖惠方治脾肺風毒攻皮膚瘙癢或生瘡癬威靈仙去土防風去叉羌活去蘆甘草炙各一兩紫參半兩荊芥穗一分上為細散每服二錢用蜜湯調下不拘時服天麻散出聖濟總錄治熱毒風攻遍體瘙癢癮疹皮膚𤸷痹肢節疼痛大腸不利天麻防風去叉羌活去蘆甘菊花各二兩甘草炙銼一兩半杏仁去皮尖雙仁炒令黃二兩上為細散每服三錢許空心蜜酒調下日一再服天門冬丸出聖濟總錄治風熱皮膚瘙癢癮疹生瘡如水疥粟粒拓洗方出千金方治風癢腫瘡癢在頭面大黃芒硝各四兩黃連六分莽草二分一作甘草二兩黃芩八分蒺藜子三合上㕮咀以水七升煮取三升去滓下硝以帛染榻洗日一度勿令近日五白散出聖濟總錄治皮膚風癢晝夜不止白附子炮白殭蠶炒白蒺藜白蘚皮各一兩白花蛇酒浸去皮骨炙三兩上為細散每服三錢許空心臨臥溫酒調下四生丸出聖濟總錄治皮膚風癢瘡癬𤸷麻冷痹熱毒癰癤草烏頭半兩白殭蠶炒苦參黑牽牛各一兩並生用上為細末酒煮麵糊丸如梧桐子大每服十五丸溫酒下日三服枳殼散出聖濟總錄治風皮膚瘙癢麻痹枳殼去瓤麩炒二兩苦參蒺藜子炒去角蔓荊實各一兩上為細散每服二錢許溫酒調下不拘時荊芥散出聖濟總錄治風瘙癢搔之成瘡荊芥穗麻黃去根節湯浸煮掠去沫焙乾羌活去蘆獨活去蘆各等分上為細散每服二錢臘茶或溫酒調下食後臨臥服治風瘙癢不可忍者方出聖惠方烏蛇三兩去皮骨酒浸炙微黃枳殼三錢麩炒微黃去瓤干薄荷半兩上為細散每服不計時候用溫蜜酒調下二錢苦參丸出風科集驗方治肺風皮膚瘙癢或生癮疹疥癬寇宗奭云有人遍身熱細疹癢痛不可任者連胸脛臍腹及近隱皆然涎疾亦多夜不得睡苦參一斤皂莢去皮及子捶碎二斤以水一斗浸揉取濃汁濾去滓熬成膏上搗苦參為細末皂莢膏和丸如梧桐子大每服三十丸荊芥薄荷酒下一方無荊芥薄荷酒下治遍身風熱細疹癢痛雄黃丸治風身體如蟲行蟬蛻方肘後方治氣客皮膚瘙癢不止蟬蛻薄荷葉各等分上為末酒調一錢許日三服一方有蜂房無薄荷葉枳殼湯出聖濟總錄治風瘙癢用枳殼去瓤麩炒三兩粗搗篩每服三錢許水一盞煎至七分去滓溫服茱萸方出肘後方治患風瘙癢痛方用茱萸三升清酒五升和煮取汁一升半去滓以汁暖洗一方治風瘙癮疹用帛染汁拭病上一方治皮肉癢痛加水五升依前和煮微暖洗之立止治風癢皮中風虛出千金方枳實三升松葉切一升獨活蓯蓉黃耆秦艽各四兩丹參蒴藋各五兩上㕮咀以酒二斗浸六宿每服二合日二稍加之治中風煩熱皮膚瘙癢治風腫癢出本草以柳枝皮煮湯洗之治風瘙皮肌惡癢出本草用六石英煎湯入少酒浴之良治風瘙皮膚癢出本草以防己煎汁洗之除風癢出本草以接骨木作湯浴之治風癢出本草以蒺藜葉煮以浴之治風瘙疥癢出本草以半天河水溫洗之半天河水即露水在槐樹間者治遍身風癢生瘡疥出本草以茵陳不計多少煮濃汁洗之立瘥八味散出聖濟總錄治遍身瘡疥皮破肉痛或瘙癢膿水塗敷方方見諸瘡腫門諸疥類案原方蜀椒去目吳茱萸湯洗焙乾炒青鹽研石硫黃研膩粉研白殭蠶炒柏皮各一兩麝香少許研上八味搗研為散豬膽汁調塗之濕則干敷
