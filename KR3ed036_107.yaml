body:
  text: 卷一百七諸風門蠱風附論夫蠱風之狀在皮膚間一身盡痛若劃若刺淫淫躍躍如中蠱毒故名蠱風皆由體虛受風侵傷正氣也方烏頭五靈脂丸出聖濟總錄治毒風皮膚盡痛身體若劃若刺烏頭生用去皮臍五靈脂各五兩虎骨沙瓶中鹽泥固濟煨存性二兩狼毒炮一兩附子炮裂去皮臍二兩防風去叉地龍不去土桂去粗皮海桐皮銼各二兩乳香研一兩自然銅煨醋淬三五遍二兩沒藥研一兩麝香研三分龍腦研一錢亂髮燒灰存性好墨煅過各半兩上各銼研日中曝七日搗羅為末以生薑自然汁和搗熟為丸如彈子大每服一丸分作四服用溫酒生薑自然汁少許磨化服此藥亦治癱緩急慢中風痰涎壅塞胸膈不利口眼喎斜半身不遂神昏恍惚及血氣走注並依前湯使日二三服偏正頭疼夾腦風疾以臘茶清和少薑汁磨化入童子小便並酒各半盞稍熱服血風勞及敗血故四肢或攻刺腹肋痛用當歸酒下攧破損傷乳香酒下病深者三丸取效合時不得見雞貓犬及婦人孝子茵芋酒出千金方治蠱風皮膚盡痛淫淫如有蟲啄搔之生瘡甚者如刀劃大風頭眩重目瞀無所見或仆地氣絕半日乃蘇口喎噤不開半身偏死拘急痹痛不能動搖歷節腫痛骨中痠疼手不得上頭足不得屈伸不能躡履行欲傾跛及狂走有此諸病此藥治之茵芋烏頭炮炙去皮臍石南防風去叉女萎蜀椒去目及合口者炒出汗附子炮炙去皮臍細辛去苗葉獨活去蘆頭卷柏桂去粗皮天雄炮炙去皮臍秦艽去苗土防己各一兩躑躅二兩上㕮咀如麻豆大少壯人無用熬虛老人薄熬之清酒二斗漬冬七日夏三日春秋五日初服一合不知加至二合寧從少起日再以微痹為度胡洽無蜀椒獨活卷柏為十二味天麻丸出聖惠方治蠱風皮膚如刺劃頑痹不仁天麻炮炒躑躅花獨活去蘆頭附子炮裂去皮臍白附子炮原蠶蛾防風去叉蒼耳蒺藜子炒去角桂去粗皮當歸切焙烏頭炮裂去皮臍各一兩麻黃去根節烏蛇肉酒浸去皮骨炙各二兩麝香研半兩上除研者外搗羅炒末入麝香再研勻煉蜜和搗二三百下丸如梧桐子大每服二十丸溫酒下不拘時候如有汗出宜避風薄荷丸出聖濟總錄治蠱風皮膚盡痛如刀劃狀及頭目不利風痰等疾干薄荷一斤天麻四兩威靈仙去苗土三兩羌活去蘆頭四兩山梔子仁二兩蔓荊實去白皮三兩白芷桔梗炒防風去叉各二兩大黃濕紙裹煨令紙幹一兩人參龍腦研半兩赤茯苓去黑皮三兩上為末煉蜜丸雞頭實大每服一丸食後細嚼茶酒任下薏苡仁方出聖惠方治體虛風邪所中攻走皮膚狀如刺劃四肢不仁筋脈拘急薏苡仁二兩獨活去蘆頭茵芋細辛去苗葉桂去粗皮側子炮裂去皮臍防風去叉酸棗仁炒麻黃去根節先煮去沫焙五加皮羚羊角鎊各一兩甘草炙銼半兩上銼如麻豆大每服四錢匕水一盞入生薑半分拍碎煎至七分去滓溫服不拘時候白花蛇煎出聖濟總錄治蠱風身痛如刀刺白花蛇烏蛇並用酒浸去皮骨焙乾各二兩白蜜三十兩生薑汁六兩薄荷汁六兩白殭蠶炒乾蠍苦參各三兩白附子炮三分上為末蜜先下並生薑汁薄荷汁次下諸藥末攪勻和銀器中重湯熬成煎以為灰調下半匙久服身體滑膩四白散出聖濟總錄治蠱風白花蛇酒浸去皮骨炙一兩半白附子炮一方生用白殭蠶微炒白蒺藜炒去角各一兩上為末空心溫酒調下二錢匕晚食前再服何首烏散出聖濟總錄治蠱風何首烏去黑皮威靈仙去土各一兩苦參半兩麒麟竭一分上並生搗羅為散乳缽內研三五百遍每一錢匕用荊芥湯下每日三服酒服尤妙刺風附論夫刺風者以血氣為風寒所侵不得宣利則蘊滯而生熱寒熱相搏於皮膚之間淫躍不能發泄故遍身如針刺也又其人痛甚若刀劃者謂之蠱風與刺風相似不可不辨也刺風者體虛之人膚腠開張為風邪侵也其風邪走於遍身而皮膚泣濁邪氣交爭風邪擊搏如錐刀所刺故名刺風也方白蒺藜丸出聖惠方治刺風遍身如針刺肩背四肢拘急筋骨疼痛白蒺藜一兩微炒去刺茵芋一兩羌活木香羚羊角屑附子炮裂去皮臍白附子炮裂當歸乾蠍芎藭牛膝酸棗仁杏仁湯浸去皮尖雙仁別研為膏各一兩白花蛇肉二兩酒浸炙微黃薏苡仁三錢檳榔半兩牛黃細研麝香細研各一分防風去蘆頭三錢上為末入杏仁膏相和令勻煉蜜和搗五七百杵丸如梧桐子大每服不計時候以溫酒下二十丸忌生冷油膩毒滑魚肉牛膝散出聖濟總錄治刺風遍身刺痛及中風破傷風等疾牛膝酒浸切焙白芷當歸切焙芎藭甘草微炙銼生地黃焙槐子炒厚朴去粗皮生薑汁炙漏蘆去蘆頭青橘皮湯浸去白焙各半兩何首烏去黑皮沒藥防風去叉虎脛骨酒浸一宿炙各一兩芍藥四兩墨燒令赤酒內蘸三遍半兩上為散每服三錢匕溫酒調下破傷骨不折以童子小便和酒調服婦人血風肢節痠疼薄荷調下羌活散出聖惠方治刺風皮膚頑痹羌活白蒺藜微炒去刺白蘚皮烏蛇肉酒浸炙令黃當歸防風去蘆頭肉桂去粗皮茵芋附子炮裂去皮臍芎藭酸棗仁微炒海桐皮銼各一兩楓香三分麻黃二兩去根節麝香一分細研上細羅為散每服食前以溫酒調下二錢忌生冷油膩濕面毒滑魚肉乳香犀角丸出聖濟總錄治風遍身如針刺乳香研犀角生鎊屑自然銅煅醋淬附子生去皮臍各一分沒藥研蔓荊實草烏頭炮去皮尖木香人參丹砂研鐵沙水洗十遍用醋一十盞煮乾銚內火出煙盡即傾出沙草根去毛炒各半兩上為末再同和研勻用酒糊杵為丸如梧桐子大每服十五丸米飲下臨臥服天麻散出聖濟總錄治體虛腠開為風邪所中遍身淫躍如針刺天麻白花蛇酒浸去皮骨炙槐實子微炒羌活去蘆頭防風去叉蔓荊實白蘚皮晚蠶砂微炒枳殼去瓤麩炒威靈仙去苗土甘草炙各一兩上搗羅為散每服二錢匕溫酒調下不計時候防風丸出聖濟總錄治氣血不和為風寒所侵不得宣泄蘊積皮膚間寒熱相搏如針刺防風去叉薏苡仁炒熟藁本去苗土各二兩酸棗仁炒獨活去蘆頭甘菊花芎藭各一兩檳榔煨過大麻仁別研如粉各一兩半上為末和大麻仁粉重羅煉蜜丸桐子大每服二十丸溫酒下不拘時候服黃耆丸出聖濟總錄治氣血虛風寒蘊滯寒熱相搏遍身如有針刺名曰刺風黃耆細銼蘹香子炒烏頭生用去皮臍烏藥銼楝實銼炒防風去叉蒺藜炒去角赤小豆揀地龍去土各一兩上為細末煮麵糊和丸如桐子大每服十丸至十五丸空心臨臥溫酒或鹽湯下大麻仁散治大風周身皮膚肌肉之內如針所刺精神昏昧出聖惠方大麻仁三分防風去蘆頭陳橘皮湯浸去白瓤焙附子炮裂去皮臍白蒺藜微炒去刺各一兩麻黃去根節桂心獨活石膏各二兩上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌豬雞肉生冷油膩人參附子湯一名附子八物湯出千金方治風濕身體疼痛欲折肌肉如針刀所刺人參去蘆頭黑附子炮去皮臍乾薑炮製芍藥茯苓去皮甘草炙桂心各一分半白朮二錢上㕮咀每服二錢水一大盞同煎至七分去滓溫服不拘時候一方去桂用乾地黃二兩一方無白朮何首烏散出聖濟總錄治體虛受風侵傷氣血遍身刺痛或因寒邪未解食熱物亦能致此何首烏三兩蔓荊實威靈仙去土菖蒲苦參荊芥穗蒺藜子炒去尖各一兩甘草炙各半兩上為細散每服二錢匕薄荷茶酒調下不計時候枳殼酒出聖濟總錄治刺風枳殼去瓤麩炒柏白皮各半斤五葉草一斤上細銼生絹袋盛以酒一斗浸七日每溫飲一盞並服不妨常令有酒力佳惡實根酒出聖濟總錄治刺風遊風惡實根洗去土控干生蒴藋根洗去土控干各一斤上細銼以酒一斗浸七日後每溫飲一盞日三四飲芎枳丸出聖濟總錄治刺風遍身疼痛漏風附論夫內經曰飲酒中風則為漏風漏風之狀或多汗不可單衣食則汗出甚則身寒喘息惡風衣裳濡口乾渴不能勞事又曰身熱懈惰出汗如浴惡風少氣一名酒風夫酒以養陽酒入於胃與穀氣相搏熱盛於中其氣剽悍與陽氣俱泄使人腠理虛而中風故其證多汗惡風不可單衣而喘息而少氣者熱熏於肺風客於皮毛也其口乾者渴也汗出多而忘津液也其懈惰而不能勞事者精氣耗竭不能營其四肢也謂之漏風以汗出不止若器之露久而不治轉消渴也夫人𦞢肉不牢而無分理理粗而皮不致者腠理疏也此則陽生於風風入於陽陽虛則汗出若少氣口乾而渴近衣則身熱如火臨食則汗流如雨骨節懈惰不欲自營此為漏風由酒醉當風之所致也方獖豬肝丸出危氏方治四肢攣縮不伸等證曾有人自幼年酒多長而風痰為酒使痰注骨節四肢不能運動服此有效茯神去木白茯苓去皮薑黃白朮炒黃耆羌活五加皮川烏炮去皮臍薏苡仁木瓜去皮瓤半夏曲神麯炒天雄炮去皮白芍藥乳香別研沒藥研防風獨活當歸元胡索桑寄生海桐皮去粗皮木香陳皮去白枳殼炮去瓤南星炮地龍去土荊芥穗各五錢麝香一錢上用獖豬肝一具洗淨煮存性研爛同酒為糊丸如梧桐子大每服三十丸溫酒吞下不飲酒木瓜湯下秦艽散出聖惠方治風虛汗出不止惡風頭痛秦艽去苗土附子炮裂去皮臍石斛去根一作石膏菖蒲白朮一作蒼朮桂去粗皮各三分麻黃根防風去叉各五兩牡蠣白朮散出聖惠方治風虛多汗少氣汗出如洗少者痿劣牡蠣煅赤三分白朮二兩一錢防風去叉三兩半上為細散每服二錢溫水調下不計時惡風倍防風少氣倍白朮汗多面腫倍牡蠣麋銜湯出聖濟總錄治因醉中風惡風多汗少氣口乾苦渴近衣則身熱如火臨食則汗流如浴骨節懈惰不欲自勞名曰漏風澤瀉白朮各一兩麋銜半兩上為末每服二錢酒飲任調下食前服黃耆湯出聖濟總錄治虛多汗夜臥尤甚床蓆衣被並濕黃耆銼人參各二兩麻黃根牡蠣煅赤各三兩枸杞根白皮二兩半龍骨四兩上㕮咀每服三錢用水一盞大棗三枚擘破同煎去滓取六分空心服日三桂心湯一名秦艽散出聖濟總錄治風虛汗出不止澤瀉散一名防風散出聖惠方治風虛汗多惡風寒顫澤瀉防風去叉牡蠣煅赤蒼朮米泔浸去皮炒各一兩桂去皮三分上為細散每服二錢用溫粥飲調下不計時一方無蒼朮酒服亦可人參散出聖惠方治風虛汗出熱悶甚者人參二兩牡蠣煅赤一兩半石膏碎二兩甘草炙銼一兩上為散每服二錢許溫水調下不計時候石膏散出聖惠方治風虛汗出不止石膏碎甘草炙銼蒼朮米泔浸去皮銼炒微黃麻黃根各一兩上為細散每服二錢整以水漿調下食前服日三夜再服杜仲散出聖濟總錄治風虛多汗夜臥尤甚杜仲去粗皮炙銼二兩黃耆銼牡蠣煅赤各三兩麻黃根五兩上為細散每服二錢整煎敗扇湯調下食後服日二附子湯出聖濟總錄治漏風汗出不止附子炮裂去皮臍一兩半蜀椒去目並閉口炒出汗半兩杏仁去皮尖雙仁炒黃一兩上銼如麻豆水五升煎至二升去滓分溫四服日三夜一四神散出聖濟總錄治漏風汗出不止附子炮裂一枚去皮臍乾薑炮半兩桂去皮一兩甘草半兩半生半熟上為散拌勻以熱酒一升投之旋溫服令盡可均作一日服如飲酒不得仍用沸湯投之亦得牡蠣散粉方出聖濟總錄治風虛多汗不止牡蠣煅赤二兩麻黃根三兩上為細散以絹袋盛之粉身日三五次有汗即粉身無即止甚妙一方以食後臨臥溫水調下二錢雞糞方出肘後方治酒中風體角弓反張四肢不遂煩亂欲死不二散出本草治風虛用膩粉一兩用湯煎五度如茶腳慢火上焙乾麝香半兩細如粉每服一字溫水調但是風臨時服半錢許或一錢看虛實加減勞風附論夫內經曰勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒夫勞風之病腎勞則根虛於下經所謂根虛則莖葉枯矣故目視不明背反張腎之脈入肺中故因皮毛感風而振慄也腎主唾故津液凝結唾如涎涕治之以救其俯仰者戒其勞動也方麻黃湯出聖濟總錄治勞風胸膈不利涕唾稠黏上焦壅滯喉中不快麻黃去根節荊芥穗木香杏仁去皮尖雙仁麩炒當歸切焙黃芩去黑心羌活去蘆頭芍藥柴胡去苗大黃炮熟各一分半夏湯浸去滑七次一錢牽牛子半兩上粗搗篩每服二錢用水一盞生薑一片同煎取八分食後去滓溫服防風湯出聖濟總錄治勞風壅滯多痰逆頭昏防風去叉獨活去蘆頭羌活去蘆頭柴胡去苗白朮甘草炙麻黃去根各一兩芎藭二兩荊芥穗菊花各半兩上搗篩每服三錢許以水一盞煎至七分食後去滓溫服龍齒飲出聖濟總錄治勞風肺熱氣壅臥即多驚時復頭旋龍齒碎二兩半大腹皮銼二枚白茯苓去黑粗皮兩半上搗篩每服五錢許水一盞半入生薑兩棗大拍碎竹瀝半合銀半兩許同煎至八分去滓食後溫服黃連丸出聖濟總錄治勞風發熱煩悶不能食兼數欠眠臥不安黃連去須三兩生薑薄切焙乾茯神去木各一兩半豉一合炒葳蕤一兩上為末煉蜜丸如梧桐子大食後米飲下二十丸日二服地骨皮湯出聖濟總錄治勞風上膈壅痰實利頭目地骨皮五兩知母一兩半桔梗去蘆頭甘草炙各一兩前胡去蘆三分上搗篩每服三錢許以水一盞煎至七分去滓食後臨臥溫服之皂莢丸出聖濟總錄治勞風心脾壅滯痰涎多喉內隘塞吐逆不思飲食或時昏憒皂角木白皮去粗皮酥炙令黃天南星炮白附子炮半夏湯洗去滑七次焙乾白礬細研熬令汁盡各一兩上為末以生薑汁煮麵糊丸如梧桐子大以溫水下十丸不拘時候葳蕤飲出聖濟總錄治勞風項強急痛四肢煩熱葳蕤三兩人參羚羊角鎊各二兩上搗篩每半兩入豆豉三合蔥白一握以水五盞煎取二盞去滓溫空腹二服枳殼湯出聖濟總錄治勞風涕唾稠黏枳殼去瓤麩炒二兩人參赤茯苓去黑皮各一兩上搗篩每服三錢用水一盞煎至六分去滓溫服芎枳丸出聖濟總錄治勞風強上冥視麻子酒出千金方治虛勞百病傷寒風濕及婦人帶下月水往來不調手足疼麻痹著狀服之令人肥健麻子一石法曲一斗先搗麻子成末以水兩石煮釜中蒸麻子極熟炊一石米頃出滓隨汁多少如家釀法候熟取清酒隨性飲之高良薑湯出指南方治勞風良薑五兩厚朴去皮薑汁製當歸切焙桂心各三兩上為散每服五錢水二盞煎一盞去滓服芍藥黃耆散出指南方治勞風芍藥黃耆川芎各三分上為粗末每服五錢水二盞姜三片棗二個同煎至一盞去滓溫服草烏頭湯出指南方治勞風草烏頭去皮尖生用細辛去苗茶牙等分上為散每服三錢水三盞煎一盞去滓服不計時候治諸勞風出本草以獼猴肉釀酒飲之治風及勞瘐出本草取蠶蛹子食之皂角化痰丸出衛生寶鑑方治勞風心脾壅滯痰涎盛多喉中不利涕唾稠黏嗌塞吐逆不思飲食及或時昏憒皂角木白皮酥炙天南星炮白附子炮半夏湯洗七次白礬枯各一兩枳殼炒二兩人參一兩赤茯苓去皮一兩上為細末生薑汁麵糊為丸如梧桐子大每服三十丸溫水送下食後解風勞治身體痛出本草用九牛草五月採與甘草同煎汁服九牛草生筠州山岡上二月生苗獨莖高一尺葉似艾葉圓而長背有白毛面青內風附論千金論云新房室竟取風為內風其狀惡風汗流沾衣方附子湯治房室竟中風惡風多汗汗出沾衣口乾不能勞事身體盡痛名曰內風附子生去皮臍人參各半兩茴香炒茯苓一分山藥一分甘草炙乾薑炮各三分上銼為散每服四大錢水二盞姜三片鹽少許煎至七分去滓食前服之肌肉瞤動附論夫肌肉瞤動命曰微風蓋邪搏分肉衛氣不通氣內鼓故肌肉瞤動然風之入脈善行數變亦為口眼瞤動偏喎之病也若目瞤動口唇動偏喎皆風入脈故須急服小續命湯將八風散摩神明白膏丹參膏依經針灸之方牛黃天南星丸出聖濟總錄治風熱相搏肌肉瞤動頭目旋眩筋脈拘急涎潮發搐精神昏昧舌強語澀肢節煩痛心胸不利凡病風氣悉治之天南星以牛膽制者用二兩如無即用漿水煮透軟切作片子焙乾天麻二兩獨活去蘆頭白附子炮白殭蠶炒人參丹砂研各一分當歸洗切焙碾桑螵蛸炒乾蠍炒去土甘草生用各三分羚羊角鎊屑犀角鎊屑麝香研牛黃研雄黃研龍腦研各半兩桂去粗皮一分上先以十三味搗羅為細末再入研藥五味和勻煉蜜和丸如酸棗大每服一丸不計時細嚼溫酒下或以雞蘇湯下虎骨丸出聖濟總錄治風虛肌肉瞤動手足顫掉虎脛骨酥炙松節銼酒炒天麻牛膝酒浸切焙赤箭各一兩海桐皮炒獨活去蘆頭石斛去根防風去叉酸棗仁烏蛇酒浸去皮骨當歸切焙仙靈脾甜瓜子洗焙乳香研五加皮各一兩上先以十五味為細末入研者乳香再同研勻酒煮麵糊丸如梧桐子大每服十五丸至二十丸荊芥湯下或茶酒任下不拘時候生犀丸出聖濟總錄治風虛肉瞤頭目昏眩四肢拘急或時麻痹旋運疾牙關緊痛欠身倦怠犀角鎊屑芎藭羌活去蘆頭白殭蠶炒荊芥各半兩乾蠍炒白芷藁本去土龍腦研麝香研牛黃研各一兩雞蘇葉二兩天麻酒浸一宿銼焙二兩別搗為細末上除天麻別搗外先以十味搗羅為末再入三味研者煉蜜半斤入天麻末更入河清水並真酥少許置於重湯內煎煉成膏俟冷和搜成劑入臼內杵數百下丸如雞頭實大每服一丸細嚼蠟茶清下不拘時犀角丸出聖濟總錄治風肌肉瞤動頭目昏眩肢節麻痹瘙癢攻痛犀角鎊半兩防風去叉丁香各一兩木香一兩桂去粗皮半兩白花蛇酒浸去皮骨炙一兩獨活去蘆頭一兩丹砂研二兩麝香研一分龍腦研一分天麻人參各一兩天南星炮二兩上先以十味搗羅為細末入研者藥和勻煉蜜丸如雞頭實大每服一丸細嚼荊芥茶或溫酒下不拘時化風丸出聖濟總錄治風氣肌肉瞤動頭目昏眩利胸膈雞蘇葉二兩羌活去蘆頭一兩半芎藭一兩半羚羊角鎊屑防風去叉天麻人參白殭蠶炒各一兩乾蠍炒四錢龍腦研麝香研各五錢天南星炮半兩上先以十味搗羅為末入研者龍腦麝香再同研煉蜜和丸如雞頭實大以丹砂為衣每服一丸或二丸茶清酒任下不拘時候乳香丸出聖濟總錄治風虛氣閉口眼瞤動偏正頭昏痛乳香研二分天麻麻黃去根節防風去叉半夏烏頭去皮臍天南星芎藭地龍去土各三分上並生用搗羅八味為細末入乳香和勻用酒煮麵糊丸如梧桐子大每服十五丸荊芥茶空心食前服荊芥湯出聖濟總錄治風氣肌肉瞤動頭目昏眩手足麻痹天麻芎藭各一兩荊芥穗雞蘇葉各二兩白附子炮甘草炙各半兩上為細末煉蜜丸如櫻桃大每服一丸嚼破茶酒任下肉苛附論內經謂人之肉苛者雖近衣絮猶尚苛也以營氣虛衛氣實也夫血為營氣為衛氣血均得流通則肌肉無不仁之疾及營氣虛衛氣實則血脈凝滯肉雖如故而其證瘰重為苛也方五味子酒出聖濟總錄治營虛衛實肌肉不仁病名肉苛五味子防風去叉牛膝枸杞子用根白皮牡丹去心各一兩肉蓯蓉切焙黃芩去黑心白朮丹參去苗土微炙當歸切焙甘草炙銼枳殼麩炒去瓤桂去粗皮厚朴去粗皮生薑汁炙五遍五加皮銼澤瀉知母焙細辛去須葉炒白芷炒各一兩上銼如麻豆大生絹囊盛用好酒二斗蜜封浸經七日每空心午時夜臥各溫服五合又服漸加至七合一升勿令酒吐防風酒出聖濟總錄治營虛衛實肌肉不仁病名肉苛防風去叉二兩白朮山茱萸並子用山芋乾者附子炮裂去皮臍天雄炮裂去皮臍細辛去須葉輕炒獨活去蘆頭秦艽去土各一半茵芋去粗莖杏仁湯浸去皮尖雙仁炒生地黃淨洗細切各一兩紫巴戟去心桂去粗皮麻黃去節銼先煎去沫焙乾用生薑切焙各二兩薏苡仁炒二兩磁石生捶碎如大豆粒浸去赤汁半斤上銼如麻豆生絹袋盛以無灰清酒三斗浸六七日空心溫飲四合至五合以知為度苦參丸出聖濟總錄治營虛衛實肌肉不仁病名肉苛苦參二兩銼搗取粉丹砂去土微炒沙參去塵土人參五加皮防風去叉銼蒺藜子炒角黃烏蛇酒浸用肉蔓荊實去白皮敗龜塗醋炙令黃虎骨塗醋炙令黃元參堅者各一兩上為末別以不蛀皂角一斤以水三升挼取汁去滓於無油鐵器內煎成膏煉蜜四兩拌和為丸如梧桐子大每服食後良久夜臥共三服各用荊芥薄荷酒下十五丸至二十丸獨活酒一名金牙酒出聖濟總錄治肉苛肌肉不仁遍身𤸷重前胡膏一名前胡散出宣明論治營虛衛實肌肉不仁名曰肉苛前胡去蘆頭白朮生用白芷銼留一枚不銼以驗成膏芎藭各三兩椒去目並閉口生用吳茱萸湯洗焙乾炒用二兩附子去皮臍生用當歸細切五兩細辛去苗葉桂去粗皮各三兩上銼搗別以苦酒三升勻拌同窨一宿以煉成豬膏五斤入藥微煎之候白芷黃紫色去滓膏成病在外摩之病在內以熱酒調化服櫻桃大疥癬瘡痍皆藥之並去諸風𤸷麻疼痛神效傷折及墜墮損外摩內服牛膝天麻丸出聖濟總錄治營虛衛實肌肉不仁遍身𤸷重牛膝酒浸切焙一兩天麻酒浸切焙一兩半麝香研桂去粗皮各一分乾蠍炒去土白花蛇肉酒炙各半兩檳榔銼三分獨活去蘆頭三分防風去叉一兩上為末煉蜜和丸如梧桐子大每服十五丸薄荷酒下荊芥湯亦得不拘時升麻秦艽去土連翹芍藥防風去叉羚羊角鎊木香枳殼去瓤麩炒薏苡仁各半兩上細銼分為十服每服以水二盞生薑五片煎取一盞去滓徐徐溫服白殭蠶丸出聖濟總錄治營虛衛實肌肉不仁病名肉苛白殭蠶半兩炒天南星炮製湯洗半兩附子炮裂去皮臍一兩白附子炮裂湯洗一兩乾薑炮製切一分膩粉半兩麝香一分與膩粉同研為細末上為細末煉蜜為丸如梧桐子大每服空心溫酒下三丸至五丸癧瘍風附論夫風邪積熱居於肺腑久而不散流溢皮膚令人脛邊胸前腋下自然斑駁點相連色微白而圓亦有紫色者亦無痛癢謂之癧瘍風也此皆風之與熱伏留肌腠之間氣血不和乃生斯疾也方烏蛇散出聖惠方治癧瘍風頸面斑駁白蛇酒浸去皮骨二兩秦艽去苗土芎藭各二兩半桂去粗皮羌活去蘆頭人參山梔子枳殼去瓤麩炒丹參元參沙參犀角鎊各一兩升麻防風去叉蒺藜子炒去角各一兩二錢苦參二兩白蘚皮二兩黃芩去黑心二兩木通銼二兩上為散每日溫酒調下三錢許食後臨臥服忌雞豬魚蒜熱面等蜀水花膏出聖惠方療癧瘍風蜀水花白附子麝香白蘞商陸鷹糞白各二錢上切以豬膏二升合煎之沸三上三下膏成以敷上一方有當歸無商陸女萎膏摩方出聖惠方治遍身癧瘍斑駁女萎一分附子一枚去皮臍生用雞舌香研半兩木香半兩白芷三分上極細研勻以臘月豬膏七合於微火上煎熔去滓投前藥末煎三四沸入研麝香一分攪調復煎三上三下膏成瓷器收貯每月少許摩之硫黃散塗方出聖濟總錄治癧瘍風赤白癧風硫黃研半兩砒霜研膩粉各一分蒼茸實一合為末上研細入薑汁半合調勻少少塗之忽令近口硫黃塗方出聖濟總錄治癧瘍風硫黃一兩半雄黃半兩硇砂研附子生各一兩上為細末以苦酒調塗之干即易又方治癧瘍風硫黃水銀礬石灶墨各等分上搗篩納坩子中以蔥葉中涕和研臨臥敷上又方硫黃雄黃檞皮燒蛇蛻一具上各等分搗篩以清漆合和敷塗白處欲塗時先以巴豆半合拭白處皮破然後敷之不過三兩度炊帚飲出聖惠方治面及項忽生白駁狀如白癬名之癧瘍故炊帚甑帶履底蛇蛻各半兩上以月蝕夜伺候正蝕時都燒之成灰細研令勻每服不計時候以溫酒調服二錢以醋調藥如膏以塗敷駁上即消雄黃散塗方出聖惠方治癧瘍風面頷頸項忽生斑駁其狀如癬雄黃硫黃白礬並研如粉各一兩上各研令勻以凍成豬脂調和塗瘡上附子散塗方出聖惠方治癧瘍風身體斑駁附子一枚大者去皮生用硫黃研半兩蒼耳苗一握乾者上為末以米醋調以布揩瘍止即以藥塗之干更塗治面及項忽生白駁狀如白癬名之癧瘍出聖惠方硫黃三兩細研附子一兩去皮臍鐵精一兩細研上搗同研為散以三年米醋和納瓷盒盛密封七日先以醋泔淨洗瘍上拭乾塗之三兩日慎風巴豆塗方出聖濟總錄治癧瘍風面頰頸項忽生斑駁如癬巴豆去皮生用一兩釅醋一合上先新布揩令赤於故以盆內用醋磨巴豆如稀膏塗患上瘥治癧瘍風白蘞薰陸香上等分為末水服方寸許用揩患處亦可硫黃方治癧瘍風治身癧瘍風斑駁方出聖惠方硫黃半兩臭黃一錢上都細研令勻以生薑汁塗調日三度用之治癧瘍風出聖惠方青胡桃皮三兩硫黃一分上爛搗研之入少許醬汁調令相入以泔清洗之然後塗於患上烏蛇散出聖惠方治癧瘍風狀似白癜用烏蛇一條酒浸去皮骨炙搗羅為散炒黑豆半合以無灰酒浸去滓取豆酒調服三錢許空心食前服油麻酒出聖濟總錄治癧瘍風治癧瘍風出聖惠方取塗中死蜣螂杵搗之爛當揩令熱封之一宿瘥治癧瘍風出聖惠方取醋磨烏賊魚骨先以布磨肉赤即敷之三年醋佳羊蹄根方出聖惠方治癧瘍風用羊蹄菜根於生鐵上以好醋磨旋旋刮取塗於患處未瘥更入硫黃少許同磨塗之一方治大風癩癬瘡用羊蹄菜根洗淨晚以口嚼嚥了汁搽患處崔氏療癧瘍方取茵陳蒿兩握以水一斗五升煮取七升以皂莢湯先洗癧瘍令傷然後以湯洗之湯冷更溫洗可作三四度洗隔日作佳不然恐痛難忍治癧瘍方取青胡桃皮搗之並少許醬清和硇砂令相入如煎餅面以泔清洗之然後敷藥蒴藋湯治癧瘍風硫黃膏出肘後方療癧瘍風用硫黃不拘多少為末以醬和作泥先以生布揩破患處敷之一方或以醋磨敷之或以硫黃熏之患處普瘥一方治紫白癜風用生薑汁數點調潤硫黃末卻以生附子或烏頭截作兩段蘸藥搽患處立愈一方敷治紫癜風用生薑同煎成膏浴罷以藥搽之或用白麵脂調丸塗亦可一方用米醋化開將蒂蘸硫黃醋磨癜風處蒼耳丸出聖惠方治癧瘍風用蒼耳葉不計多少陰乾搗羅為末用五兩取粟米二合煮作粥即研粥如膏即用莨菪淘去浮者炒令黃色搗細羅為末用一兩都相和令勻丸如綠豆大每日空心溫酒下二十丸至晚食前再服治癧瘍風上出聖惠方用五月收赤足蜈蚣燒灰醋調塗之治癧瘍白癜風本草以蛇脫皮煎汁敷之治癧瘍風本草用糟筍中酒磨之治癧瘍風本草取丹楓木皮一握去土黑打碎煎如糖塗風上風㾦附論夫風㾦癗者由腠理不密陽氣外泄發而為汗汗出未已為風邪所搏風熱相併不得流行故結為㾦癗狀如麻豆甚者漸長搔之成瘡方烏蛇散出聖惠方治風熱遍身生㾦癗瘙癢烏蛇酒浸二兩去皮骨炙微黃天麻麻黃去根節秦艽去苗牛蒡子微炒藁本白殭蠶微炒各三分羌活白蘚皮桂心甘草炙微赤銼枳殼麩炒微黃去瓤蔓荊子芎藭當歸各半兩蒲黃上為細散每服不計時候以溫酒調下二錢荊芥散出聖惠方荊芥赤茯苓苦參銼各一兩牛蒡子微炒黃芩各三分蔓荊子天麻人參去蘆防風去叉獨活枳殼麩炒黃去瓤各半兩烏蛇肉酒浸微炒二兩上為細散每服不計時候溫酒調下二錢治風熱毒氣客於皮膚遍身生㾦癗狀如麻豆方出聖惠方秦艽去苗一兩防風去蘆黃芩麻黃去根節犀角屑元參甘草炙微赤銼各半兩枳殼麩炒微黃去瓤牛蒡子微炒各三錢黃香銼川升麻各三錢上㕮咀每服三錢以水一中盞煎至六分去滓不計時溫服枳殼散出聖惠方治脾肺風熱攻皮膚生㾦癗瘙癢不止枳殼麩炒微黃去瓤白蒺藜微炒去刺羚羊角屑桑根白皮銼羌活各三分防風去蘆升麻白蘚皮甘草炙微赤銼各半兩麥門冬去心焙麻黃去根節各一兩上㕮咀每服四錢以水一中盞煎至六分去滓不計時候溫服丹參湯出聖濟總錄治風熱頭面生㾦癗癢痛丹參銼紫參蒺藜子炒去角黃芩去黑心防風去叉黃耆銼羌活去蘆頭一兩白蘚皮連翹各三分甘草炙半兩上㕮咀每服三錢匕水一盞煎至七分去滓食後溫服胡麻散出聖濟總錄治脾肺風毒攻注皮膚瘙癢手足生瘡及遍身㾦癗發赤黑靨面子肌熱疼痛胡麻炒令香熟枳實去瓤麩炒二兩防風去叉蔓荊實威靈仙去土苦參何首烏米泔浸透去黑皮切麩炒乾芎藭荊芥穗甘草炙各一兩薄荷用葉半斤上為散每服二錢許溫酒調或煉蜜丸如梧桐子大每服三十丸溫酒亦得獨活丸出聖濟總錄治風癮疹㾦癗腫起時癢時痛獨活去蘆天門冬去心焙防風去叉蒺藜子炒去角桔梗去蘆頭各一兩一錢薏苡仁炒黃連去須各一兩桂去粗皮半兩枳殼去瓤麩炒一兩半上為細末煉蜜和丸如梧桐子大每服二十丸空心臨臥菊花湯下或米飲亦可羚羊角散治風熱皮膚生㾦癗癢痛羚羊角屑川大黃銼碎微炒元參烏蛇肉酒浸微炒各一兩防風去叉秦艽去苗各三分枳殼麩炒去瓤微黃白蒺藜微炒去刺甘草炙微赤銼各半兩上為散每服三錢以水一中盞煎至五分去滓入牛蒡根汁半合更煎一兩沸不計時候溫服沙參散出聖惠方治風熱皮膚生㾦癗搔之癢痛沙參去苗白蒺藜微炒去刺枳殼麩炒微黃丹參各三分白附子炮裂白蘚皮天麻犀角屑川大黃銼碎微炒各半兩上為細散每服不計時候以溫酒下一錢蒺藜丸出聖惠方治風瘙癢生㾦癗白蒺藜微炒去刺秦艽去苗赤茯苓各一兩羌活苦參銼黃芩細辛各半兩枳殼三分麩炒微黃去瓤烏蛇三兩酒浸去皮骨炙微黃上為末煉蜜丸如梧桐子大每服不計時以溫蜜湯下三十丸柳枝湯洗方出聖惠方治風瘙皮生㾦癗搔之腫