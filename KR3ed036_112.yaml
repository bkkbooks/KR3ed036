出冷汗一身便瘥一方治諸風疼痛者用酒糊為丸冷酒吞下名蠲痛丸今醫家以草烏代川烏尤妙凡是歷節及不測疼痛一二服便瘥大歙川一貴家婦人遍身走注疼痛至夜則發如蟲齧其肌多作鬼邪治豫曰此正歷節病也三服愈芥子膏治白虎歷節風神授丸出危氏方治白虎歷節痛甚肉理枯虛生蟲遊走癢痛兼治痹疾半身麻木殺傳尸蟲用真川椒色紅大者去子併合口以黃稈紙二重摺於爐上炒出汗取頓地上用沙盆蓋以灰圍盆弦約時許為末老酒浸白糕為糊丸如梧桐子大每服三四十丸食前鹽湯下治痹辣桂煎湯下腰痛茴香酒下腎寒鹽湯下又方出直指方用雞子揩患處咒三遍送糞堆頭勿反顧白虎糞神愛吃雞子患者下飯用黃腳雞為妙亦可用抱雞來壓之其癢自止白虎神古人言如貓在糞堆中今時人掃糞莫置門下令人病以此法療之不過三度即瘥陳藏器云白雞子主白虎病向東人呼為歷骨風置白雞子於病者前自愈此壓伏之義也定痛丸出淡寮方治走注歷節諸風軟痛猝中倒地跌撲傷損草烏蒼朮晚蠶砂各等分上為末酒糊為丸赤土為衣溫酒送下治歷節風丸子方出家藏經驗方川牛膝一兩去蘆木瓜一兩去瓤防風一兩天麻一兩酒浸蒸沒藥三錢細研骨碎補一兩去苗狗脊一兩去毛附子一兩炮製乳香四錢細研細辛七分錢薏苡仁一兩虎骨一兩炙續斷七分錢五靈脂一兩以好醋煮過使灰池以紙隔傾在紙上滓不可用上為細末醋煮薏苡仁粉為丸桐子大使下件藥方浸酒下五六十丸專忌筍芋腥膩髮腳氣之物一日三服松節浸酒方出家藏經驗方當歸一兩熟地黃一兩松節一兩列節一兩牛膝一兩上為粗末以絹袋盛藥用無灰酒二百盞浸三日方可吃如藥酒一盞服時即以生酒一盞添入表弟武東叔年二十餘患歷節風痛不可忍涪城馬東之以此方療之獨活寄生湯出如宜方治歷節走注徹骨節疼痛風濕氣毒桑寄生獨活各三兩白芍藥當歸杜仲制防風熟地黃牛膝白茯苓細辛秦艽桂心芎藭人參甘草各二兩上㕮咀每四錢水煎至空心服又方出聖惠方治歷節諸風百節疼痛晝夜不可忍者虎脛骨一具塗酥炙令黃上捶碎以絹袋盛用清酒二斗浸五宿隨性多少暖飲之妙一方用虎頭骨治歷節風出本草方以熊骨煮湯浴之治歷節風四肢疼痛如解落者用松脂二十斤酒五斗漬三七日每服一合日進五六服治風毒骨髓疼痛方見芍藥酒方治骨風腰膝疼痛行履不得遍身瘙癢何首烏有花紋者牛膝上二味各銼一斤以好酒一升浸七夜曝乾於木臼內搗羅為末煉蜜丸如梧桐子大每服空心食前酒下三五十丸紫白癜風附論夫紫癜風之狀皮膚皺起生紫點搔之皮起而不癢痛是也此由風邪夾濕客在腠理營衛壅滯不得宣流蘊瘀皮膚致令色紫故名紫癜風白癜風之狀皮膚皺起生白斑點是也由肺臟壅熱風邪乘之風熱相併傳流營衛壅滯肌肉久不消散故成此也肺有壅熱又風氣外傷於肌肉熱與風交併邪毒之氣流伏於腠理與衛氣相搏不能消散令皮膚皺起生白斑點故名白癜風也方烏蛇浸酒方出聖惠方治風及白癜紫癜烏蛇六兩酒浸去皮骨炙微黃防風去蘆頭桂心各二兩熟乾地黃四兩白蒺藜二兩炒去刺天麻三兩五加皮二兩羌活三兩牛膝去苗枳殼麩炒微黃去瓤各三兩上細銼以生絹袋盛以無灰酒二斗於瓷甕中浸密封頭七日後開每日三度溫飲一小盞忌毒滑物豬雞肉癜風方出危氏方雄黃硫黃黃虢丹密陀僧天南星上等分為末先用薑汁搽患處次用姜蘸藥末搽之搽後漸黑次日再搽黑散則無事矣四神散治紫白癜風雄黃雌黃硫黃白礬並透明者更佳上各等分研為末每用時先浴令通身汗出次以生薑蘸藥搽患處次以熱湯淋洗當日色淡五日除根治皮風紫白癜風赤芍藥當歸苦參各半兩赤土一兩上為細末生豬脂二兩熬油去滓同蜜一兩作一處調藥隔一夜每服一大匙熱酒調下空心食後各一服二藥並忌雞鴨無鱗魚豆腐等物治紫白癜風生砒霜白礬泥礬各一錢上為末用生茄子蒂搽患處先浴後搽玉粉膏出聖惠方治赤癜白癜風硫黃明白礬並生用上為末薑汁調茄蒂蘸搽兩三次一方用米醋調塗之一方治風熱生風刺者入黃丹少許以津液調塗敷之洗漱罷臨臥服防風通聖散效速治赤白癜風大有神效貝母百部各等分上為極細末用生薑自然汁調搽癜上硫黃方一名如聖膏出危氏方治赤白癜風詩曰赤癜白癜兩般風附子硫黃最有功薑汁調勻茄蒂搽一搽之後便無蹤白癜用白茄蒂紫癜用紫茄蒂如用藥時先以布搽洗其瘡令損卻以茄蒂蘸藥搽之一方去附子加礬石專治白癜一方用雞子一枚釅醋浸過宿針刺小孔瀝取清液入砒霜緑豆少許和勻將粗布痛搽患處以指點藥揩之亦妙一方治紫癜風再入胡粉一分膩粉少許同繁柳汁和勻臨臥揩三五遍並瘥硫黃膏治紫白癜風治紫白癜風出危氏方用硫黃一兩米醋煮一日海螵蛸二個併為細末浴後以生薑蘸藥熱搽謹風少時數次絶根皂莢散治諸般癜風疾治紫白癜癬汗斑用蒼耳葉勤搽三日愈白花蛇散出聖惠方治紫白癜風白花蛇酒浸去皮骨炙三二兩麻黃去根節天麻何首烏去黑皮天南星炮白附子炮肉桂去粗皮萆薢白蘚皮羌活去蘆蔓荊子去皮白殭蠶炒防風去蘆犀角鎊各半兩磁石煅醋淬研一兩原蠶蛾一分炒上將一十五味搗羅為散入磁石研勻每服二錢食前溫酒調下忌熱面雞豬魚蒜等物酸石榴丸出聖惠方治紫癜風大效酸石榴十顆去皮以瓷盆盛飯上蒸爛絞取汁用之炒梨二十顆去皮核研絞取汁羌活去蘆人參防風去蘆干薄荷葉各一兩茺蔚子白附子炮苦參犀角鎊烏喙炮裂去皮臍各一半兩上除二味汁外搗羅為末將汁熬成膏和丸如梧桐子大每服二十丸溫酒下不拘時候烏蛇散出聖濟總録治𤸷麻紫癜風烏蛇酒浸去皮骨炙防風去蘆羌活去蘆人參玄參各一兩沙參苦參丹參白附子炮蒺藜子炒去角各一兩上為末每服一錢溫酒調下灰藋塗方出聖惠方治紫癜風灰藋不拘多少燒灰用紙襯淋取汁鍊金如膏約兩匙許雄黃丹砂膩粉麝香蝦蟆灰石硫黃礬石灰各一錢上將七味同研如粉與煉了灰藋濃汁攪煎如膏塗之干即易膏硬以醋潤之代赭丸出聖惠方治紫癜風去根源代赭鐵粉細研各一兩白礬二一兩生用金箔四十片細研硃砂細研半兩當歸二兩香墨半兩上搗研令勻細以水浸蒸餅和丸如緑豆大每服不計時候用溫蜜酒下二十丸以蜜湯下之亦得硫黃膏出聖惠方治紫癜風硫黃一兩細研雄黃三分細研白礬一兩細研硇砂白附子各半兩附子三分炮去皮臍蛇蛻一條上搗羅為末入研了藥令勻用油四兩黃蠟二兩先煎油三五沸下蠟後入藥末調煎成膏每取塗摩所患處日三度用之效防風散出聖濟總録治紫癜風防風去蘆蠍梢炒各一兩白花蛇頭二枚酒浸炙上為散每服一錢溫酒調下五倍子膏出聖濟總録治紫癜風點點相連五倍子一分搗為細末膩粉二錢匕砒霜研細半錢匕上同研勻細以醋調為膏盛以瓷盒每浴罷勻揩患處速著衣慎風乃便洗手羊蹄根塗方出聖惠方治紫癜風羊蹄根搗絞自然汁半合生薑研絞自然汁半合石硫黃研如粉四錢上將二汁與硫黃末同研令黏塗患處一日不得洗不過兩次瘥治紫癜風出經效濟世方硫黃二文砒霜少許青黛一文上細研用布子三五寸無灰酒浸一宿取出令乾再用酒漬用濕布子上前之藥揉令勻遍先澡浴罷用藥布揩令赤為度如是白癜風即不用青黛雄黃散塗方治紫癜風牡蠣散出聖濟總録治紫癜風牡蠣膽礬各半兩上生用為散釅醋調摩患處胡桃塗方出聖濟總録治紫癜風白癜風初結青胡桃一顆取外皮用石硫黃一皂子許研如粉上先取胡桃皮切研如膏入硫黃末和勻塗之一方有白礬桑枝煎出聖惠方治紫癜風桑枝十斤益母草三斤銼上以水五斗慢火煮至五升濾去滓入小鐺內熬為膏每夜臥時用溫酒調服半合硫黃膏出聖濟總録治紫癜風又治白癜風雌黃七分細研木蘭皮白朮各八分苦參芎藭麻黃去節山朱萸甘草炙狗脊枳實炙各四分秦艽沙參細辛牛膝白蘞人參當歸薯蕷白芷各五分防風附子炮枲耳子各六分上為散酒服方寸匕日再漸漸加至二方寸匕忌生蔥海藻菘菜豬肉桃李雀肉等烏蛇散出聖惠方治白癜風身體𤸷麻烏蛇三兩酒浸去皮骨炙白殭蠶炒胡麻子獨活去蘆防風去蘆天麻各二兩烏頭炮裂去皮臍天南星炮各一分細辛去苗葉桂去粗皮枳實麩炒去瓤蟬蛻去土白附子各半兩炮上為細散每服溫酒調下二錢匕不計時候防風湯出聖濟總録治風熱熏蒸皮膚白癜防風去蘆地骨皮王不留行山梔子仁微炒荊芥穗惡實炒各一兩甘草炙三分人參生乾地黃焙各半兩上粗搗篩每服三錢匕水一盞入惡實根二寸同煎至七分去滓溫服不計時候苦參散出聖惠方治肺臟久積風毒皮膚生白癜苦參銼烏蛇酒浸去皮骨炙各三兩露蜂房微炙松脂附子炮裂去皮臍梔子仁木蘭皮各二兩上為細散每服溫酒調下二錢匕不計時候宜常吃蘿蔔菜勿食雞雀肉忌豬魚大蒜濕面等一方有防風白蘞散出聖惠方治白癜風遍身斑點瘙癢白蘞天雄炮裂去皮臍各三兩商陸一兩黃芩乾薑炮裂銼各二兩躑躅花一兩酒拌炒令乾上為細散每於食前以溫酒調下二錢又方出聖惠方附子二兩去臍凌霄花一兩川烏頭二兩去皮臍防風二兩去蘆頭露蜂房躑躅花各一兩上細銼以豬脂三斤煎煉看藥黃焦去滓候冷於瓷盒中盛用摩風癜上以瘥為度治白癜風出聖惠方雞子兩枚和殼以米醋三升浸七日取白石硫黃半兩研附子去皮臍生用一枚重半兩者粟米二錢上將後三味搗羅為末以前雞子白調成稀糊臨用藥先以葛布揩患處令赤塗之追風丹出醫方大成治白癜風服之愈蒼朮米泔浸一宿焙何首烏荊芥穗苦參各等分上為細末好肥皂角三片去皮弦盛於瓷器內熬為膏和為丸如梧桐子大每服三五十丸空心酒茶任下忌一切動風之物前大軍庫張提領患白癜風服之即愈附子膏一名摩風膏出聖惠方療白癜風附子炮天雄炮烏頭炮各三兩防風二兩上切以豬膏三升合煎之先服散白癜上以膏敷之一方無防風治白癜風豬牙皂角四兩草烏頭半兩硫黃白芷各一兩上為末先用生薑揩患處如面藥一般洗之又方蛇蛻苕帚上扎縛草蒸籠內多年舊竹片麻鞋底用穿過舊者上燒灰篩細敷之立效療白癜風出聖惠方黑油麻一大升生地黃五大兩桃仁去雙仁皮尖二三十枚熬上先退去油麻皮蒸之日曝乾又蒸之如此九度訖又曝乾搗令極碎後搗地黃桃仁羅之即總相和加少蜜令相著一服一匙日再服和酒吃空吃亦精兼食豬肺尤妙忌蕪荑熱面豬蒜油膩等治白癜風出聖惠方紅灰藋五斤茄子根莖三斤蒼耳根莖五斤上並曬乾一處燒灰以水一斗煎湯淋取汁即於鐺內煎成膏以瓷盒盛別用好通明乳香半兩生研又入鉛霜一分膩粉一分相和入於膏內別用煉成黃牛脂二兩入膏內調攪令勻每用塗摩所患處日三用之又方出千金方又以石灰松脂酒煮之治白癜風不拘遠近用烏雞卵一枚取清先用硫黃碾為末以雞子清調勻用生布一片將藥刷在布上日中曝反覆刷三四次將布子釘在板上令不皺候乾收起遇浴罷或動作勞苦汗出之時將布子於患處搽之即愈治白癜風一名草烏散出余居士選奇方草烏半兩巴豆一分並細細切上用米醋和濕以布裹浴罷搽之頻浴為佳石硫黃膏出聖惠方治白癜風皮膚斑白毛髮亦變石硫黃墨各一兩半上為細末先以布揩患處令赤醋調藥成膏塗之若作瘡瘥後再塗苦參膏出聖濟總録治白癜風苦參鹽各一分上為末先以酒一升煎至四合入藥二味攪令勻慢火再煎成膏每用先以生布揩患處令赤塗之治白癜風出德生堂方詩曰紫癜白癜一般風水銀輕粉最成功搗取生薑自然汁只消一搽便無蹤又方貝母天南星上為細末用生薑帶汁蘸藥搽之又方出德生堂方貝母乾薑上等分為末入浴堂內如澡頭洗搽患處甚妙又方出德生堂舶上硫黃一錢輕粉一錢上為細末嚼胡桃仁搽患處後蘸藥頻搽即愈又方出德生堂白附子雄黃上等分為末用巴豆先搽患處濕後蘸藥搽之又方出德生堂驢尿生薑汁上等分相和洗拭所患處治白癜風出千金方平旦以手掠取韭頭露塗之極效又方出聖惠方以酒服生胡麻油一合日三稍加至五合慎生冷豬雞魚蒜等百日服五斗即瘥又方出千金方取蘿藦草煮汁拭之亦揩令傷滴白汁塗之蛇蛻皮方出千金方治證同前靈水膏治證同前又方出千金方以水銀數數拭之令熱即消瘥乃止治白癜風出聖濟總録用杏仁去雙仁不去皮尖生用每日早晨爛嚼二七粒於白點處揩夜臥再用又方用續隨子葉汁敷白癜面皯又方用黃腳雄雞脅血塗患處亦治癧瘍風又方用白蒺藜子生搗為末作湯服之羊蹄根方治白癜風遍身花斑並皆治之治白癜風用楸木白皮五斤細銼以水五斗煎取五升濾去滓卻於慢火上再煎如稠膏用不津器收每取膏摩於所患處日二三上效又方用桑柴灰二斗於大甑內蒸氣溜取釜中湯淋汁熱洗不過五六度瘥治紫癜風用舶上硫黃不以多少用米醋化開將茄蒂蘸硫黃醋磨搽癜風處一方不用米醋良久以溫湯洗去一方細研綿帛子裹用生薑自然汁半盞浸不拘時和綿子塗所患處稍止再易一方先以粗布揩患處令傷用面脂調硫黃末如膏日三度塗變白散治紫癜風用礬末揉薄荷搵礬末搽患處每澡浴了時用之茄根散治赤白癜風用茄根和雄黃塗之便瘥加減何首烏散治白癜紫癜諸風筋骨疼痛四肢少力眼斷白人鼻梁崩塌皮膚疥癬手足皴裂睡臥不穩行履艱難何首烏蔓荊子石菖蒲荊芥穗菊花枸杞子苦參威靈仙各半兩上為細末每服三錢蜜茶調下不拘時候何首烏散治肌肉頑麻紫癜白癜風威靈仙何首烏防風荊芥穗蔓荊子甘草虼蚾草即車前子上等分為末每服一錢酒水任調下治紫白癜風密陀僧五錢別研為末自然銅研重篩五錢砒別研為霜用一錢豬牙皂角五錢為末上為末和勻先用熱水揩洗去黑皮抹乾用水調藥薄薄揩拭肉上令入肉紋一日晚用一次三次又方治紫癜風雄黃三分硫黃三分白礬一兩上件藥都研如粉以豬脂調令勻每取塗於患處日三度用之瘥治白癜風用地麻草煮水淋洗四五次立瘥治白癜風以女真枝葉燒灰淋取汁塗之亦可作稠煎敷之亦可作面膏塗疸瘃殊效兼滅癜疪治白癜歷傷風取白鴿肉炒酒服治白癜及歷瘍以自然灰重淋取汁和醋先以布揩白癜風破敷之當為創勿怪治白癜風用博落回和百文青雞桑灰為末敷之治白癜風用杜蒺藜花陰乾為末每服二三錢飯後以溫酒調服治白癜癧瘍及風惡疥癬以木連藤汁敷之治白癜風先用粗布揩破用白馬骨連細辛牛膝雞桑皮黃荊等分燒為灰淋汁塗之白馬骨生江東似石榴而短小對節白駁附論夫白駁者是肺風流注皮膚之間久而不去之所致也多生於頭面點點斑白但無瘡及不瘙癢不能早療即便浸淫也白駁之病其狀斑駁如癬過於癧瘍但不成瘡爾皆由風熱傳於膚腠脾肺二經不利也方菖蒲醞酒方出聖濟總録治白駁舉體斑白經年不瘥菖蒲九節者去須節米泔浸切一斤天門冬去心一斤兩天雄炮裂去皮臍三兩麻子仁一升生用茵芋去粗莖一兩生乾地黃切焙乾膝炒煙出遠志去心各三兩露蜂房微炒一兩苦參一斤黃耆炙銼八兩獨活去蘆頭石斛去根各五兩錢柏子仁生用二兩升蛇蛻皮長三尺炒微炙天蓼木銼二斤兩上粗搗篩以水二石五斗煮菖蒲等取汁一石以釀一石二斗秫米蒸醞如常法用六月六日細麩於七月七日釀酒酒成去糟取清收於淨器中密覆每溫服四合至五合日二夜一更重煮菖蒲並藥滓取湯淋洗所患之處極妙白蘞散方出聖濟總録治風頭項及面上白駁漸長如癬但白紅色白蘞炮當歸切焙附子炮裂去皮臍各半兩黃芩去黑心乾薑炮天雄各一兩炮裂去皮臍羊躑躅半兩蒸熟焙乾上為散每服半錢至一錢匕酒調下一方無當歸有商陸名商陸散治面白駁方出聖惠方弊帛蟬頸一用頭帚甑帶脯臘履底蛇皮上等分以月蝕之夕盛蝕時合燒之搗篩以酒服之方寸匕日二三止以醇苦酒和塗白上一折除之忌雞魚豬肉大蒜等物治白駁方出聖惠方硫黃一兩研入蛇蛻皮一條燒灰草決明半夏生用槲樹皮各一兩燒灰上搗羅為散以清漆和之薄塗白處欲塗藥時先以巴豆中截摩白處令皮微起然後敷藥二三遍即愈治白駁敷方出聖惠方雌黃石硫黃各一兩研如粉蛇蛻皮一條大者燒灰上同研勻細用醋調成膏先以巴豆一粒中截以平處磨令皮起然後敷藥三兩遍即瘥忌一切血物大蛇皮塗方出聖濟總録治面項身體白駁風蛇蛻皮一條大者燒作灰用石硫黃研檞皮各二錢燒作灰上研令極細末以清熟漆調和勿令稠硬薄塗白駁處欲塗藥時先以巴豆一粒中截用平處摩令皮微起然後敷藥治白駁方出聖惠方雄黃硫黃附子各二一兩去皮臍生用上搗羅為散研如面醋調塗之玉粉膏治白駁治白駁方出聖惠方川烏頭去皮臍硫黃各一兩研入上搗羅為散以醋調塗之治頭項面上白駁漸長如癬但不成瘡宜用此敷方出聖惠方用桂去粗皮一兩搗羅為末每用半錢或一錢匕以津唾和敷於白駁之上日三次愈治面項身體白駁敷方出聖濟總録用鮎魚一頭約半斤去腸肚淨洗後一依鮓法用鹽椒蔥粳米飯勻拌即用青荷葉裹作三包各用蒲片系之如法更用荷葉重裹令大臭爛先以布拭白駁令赤次炙鮓包熱尉令汗出以綿衣包無令風冷所傷蛇蛻皮方出聖惠方治周身白鮫漸長似癬但不成瘡用蛇蛻皮一條大者炒熱挼摩歷白駁上時噀唾數百遍棄之四野草中瘥一方燒灰醋調塗上佳靈水膏出聖惠方治面項身體白鮫風塗淋方並治癧瘍用生木樹腔中汁柳樹為上將汁於淨鍋內煎熱洗淋之仍便搗桂牡蠣末津唾調塗日三夜一隔日淋洗或以面脂調敷亦效一方治白癜風無牡蠣鰻鱺魚塗方出聖惠方治頭項及面上白駁浸淫漸長如癬狀但不成瘡用鰻鱺魚一頭肥者炙令脂出先洗白駁用物揩拭之令小痛然後用熱魚脂塗之一度便愈甚者不過三度鶴膝風附論夫鶴膝者病人兩膝腫大痛髀脛枯臘但有皮骨拘攣蜷臥不能屈伸是也當服大防風湯使之氣血流暢肌肉漸生自然行履如故也方蛜𧌴丸出衛生家寶方治鶴膝風及腰膝風縮之疾蛜𧌴頸尾全者桃仁生白附子阿魏桂心安息香用研桃仁白芷各一兩乳香沒藥各三分以上用童子小便酒二升炒熱冷出火毒北漏蘆當歸芍藥牛膝羌活地骨皮威靈仙各一兩上蜜為丸彈子大空心暖酒化下一丸胡楚望博七病風疰手足指節皆如桃李痛不可忍服之悉愈一方無乳香沒藥用蜜為丸乾蠍丸出聖濟總録治腳膝風俗名鶴膝風乾蠍頭尾全者炒白芷安息香用胡桃仁同研各一兩桃仁去皮尖雙仁生白附子炮阿魏桂去粗皮各一兩乳香三分沒藥三分九味搗研勻共用童子小便五升無灰酒二升銀器內熬令稠漏蘆當歸切焙芍藥地骨皮去土威靈仙去苗土羌活去蘆頭六味同為末各一兩上同杵為丸如彈子大每服一丸空心暖酒化下昔有病風注手足指節腫痛不可忍者服之悉愈大防風湯治鶴膝風大能祛風順氣和血脈壯筋骨除寒濕逐冷氣鶴膝風又名鼓捶風出直指方兩大小腿瘦如蘆柴止有膝蓋大者行履不得用小續命湯合一料加萆薢川楝子獨活乾木瓜㕮咀不用生薑用水煎熬於碗底先放麝香少許去滓入於碗內服之服至數十服後加五積散同煎去滓服瘥一方用紫金皮老酒煎候溫常服四聖膏治鶴膝風及諸風疾川當歸沒藥大川烏各等分上為末用不蛀皂角二十四個捶碎水煎數沸去滓入鍋內熬成膏入前藥攪勻貼於患處
