body:
  text: 卷一百十二諸風門歷節風附論夫歷節風之狀短氣自汗頭眩欲吐手指攣曲身體魁瘰其腫如脫漸至摧落其痛如掣不能屈伸蓋因飲酒當風汗出入水或體虛膚空掩護不謹以致風寒濕之邪遍歷關節與血氣搏而有斯疾也其痛如掣者為寒多其腫如脫者為濕多肢節間黃汗出者為風多遍身走癢徹骨疼痛晝靜夜劇發如蟲齧者謂之白虎歷節治法當以溫藥解其風寒濕之毒或用和平則獨活寄生湯輩可也其白虎歷節遊走癢痛則蟲實為之況夫脾主肌肉虛則為癢遇癢而進飲食尚庶幾焉而蟲亦饜食飫其間不至於頻頻齧也書曰若藥不瞑眩厥疾弗瘳似此證候一名厲風須當大作湯丸未可拘以平常淺近之劑歷節風著人久不治者令人骨節蹉跌變成癩病不可不知古今以來無問貴賤往往苦之此是風之毒害者也治之雖有湯藥而並不及松膏松節酒若羈旅家貧不可急辦者宜服諸湯猶勝不治但於痛處先灸三七壯佳方海桐皮散直指方治歷節走注骨節疼痛獨活鹽水浸焙萆薢鹽水浸焙川芎當歸各三分桃仁去皮焙天麻辣桂牛膝麻黃去節枳殼制海桐皮白芍藥川烏炮去皮臍松節防風杜仲薑製甘草炙各半兩麝香一分虎脛骨一兩酒炙黃上粗末每服二錢姜五片棗二枚食前煎服川烏頭丸出聖惠方治歷節風疼痛發歇不止川烏頭半兩鹽拌炒令黃去皮臍白花蛇肉一兩酒浸炙微黃雄黃半兩細研白殭蠶微炒天南星一兩微炒各一兩麝香細研硃砂細研各半兩膩粉一分天麻當歸天雄炮裂去皮臍乾蠍微炒各一半兩麻黃半兩銼去根節蟬殼一分微炒獨活一兩芎藭地龍微炒乳香各半兩上搗羅為末入研了藥更研令細煉蜜和搗三五百杵丸如梧桐子大每服以溫酒調下十五丸雄麝丸一名雄黃丸出聖惠方治歷節風骨節疼痛攣急痹頑安息香五靈脂天麻各一兩半地龍淨三分全蠍微炒雄黃各半兩白殭蠶微炒三二分麝香一分烏蛇酒浸取肉炙天雄炮去皮臍當歸川烏炮去皮臍川芎南星炮官桂虎脛骨酒炙黃各一兩川獨活二兩上末煉蜜為丸梧桐子大每服十五丸食前溫酒下一方有敗龜無地龍忌豬雞魚犬肉酸棗仁散出聖惠方治歷節風疼痛酸棗仁一兩半微炒敗龜二兩塗酥炙令黃羌活一兩虎脛骨二兩塗酥炙令黃秦艽去苗防風去蘆頭各一兩半牛膝一兩去苗芎藭一兩半木香一兩桂心骨碎補茵芋附子炮裂去皮臍枳殼麩炒微黃去瓤各一兩當歸一兩半微炒銼上搗羅為散每服以溫酒調下二錢空心及晚食前服虎骨丸出聖惠方治歷節風疼痛虎脛骨六兩硇砂一三兩以醋一中盞浸化於虎骨上塗炙盡為度桂心當歸芎藭防風蕓薹子各一兩地龍一兩半微炒赤芍藥一兩芫花三分醋拌炒令乾海桐皮銼牛膝去苗各一兩乾蠍三分微炒附子炮去皮臍羌活各一兩上搗羅為末煉蜜和搗三五百杵丸梧桐子大每服食前以溫酒下二十丸或三十丸錫蘭脂丸出聖濟總録治風寒客搏血氣凝澀不通歷節疼痛甚者短氣汗出肢節不得屈伸錫蘭脂白殭蠶炒芎藭藿香葉天南星炮白芷甘松去土乳香楓香脂研各半兩羌活去蘆一兩自然銅煅醋淬一兩骨碎補去皮毛半兩糯米炒令黑色二兩烏頭新汲水浸一宿去皮臍切焙乾一兩上為末煮糯米粥為丸如梧桐子大每服五丸至七丸細嚼炒地黃酒下食後臨臥服茯神散出聖惠方治歷節風手腳曲戾疼痛心神悶亂茯神防風去蘆頭當歸天雄炮裂去皮臍麻黃去根節甘草炙微赤銼芎藭獨活遠志去心丹參桂心酸棗仁微炒各一兩上搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓每於食前溫服萆薢散出聖惠方治歷節風四肢疼痛不可忍萆薢銼漢防己赤芍藥桂心松節丹參當歸茵芋五加皮附子炮裂去皮臍牛膝去苗各二一兩枳殼半兩麩炒微黃去瓤上搗粗羅為散每服二三錢以水一中盞入生薑半分煎至六分去滓食前溫服忌生冷豬魚雞犬肉松脂散出聖惠方治歷節風筋骨肢節疼痛久不瘥松脂五兩桑灰汁一斗煮至五升以來傾入冷水內放凝別用漿水一斗再煮至三升以來又傾入冷水內凝又用清水一斗煮至五升以來又傾入冷水內放凝取出干即同入藥用天雄炮裂去皮臍虎脛骨塗酥炙令黃牛膝去苗各二兩酸棗仁二兩微炒羌活二兩薏苡仁三兩白附子炮裂二三兩桂心當歸銼微炒各一兩沒藥二兩麝香一分錢細研上搗羅為散入研藥令勻每服食前以溫酒調下二錢虎骨散出聖惠方治歷節風手足抬舉不起頑痹不仁虎脛骨二兩塗酥炙黃海桐皮一兩炒去刺桂心天雄炮裂去皮臍麻黃去根節羌活天麻白蒺藜微炒去刺道人頭牛蒡子微炒各一兩仙靈脾二兩牛膝二一兩去苗上搗細羅為散每於食前以豆淋酒調下二錢桂心散一名肉桂散出聖惠方治歷節風四肢疼痛筋脈不利肉桂二兩去粗皮麻黃去根節海桐皮銼川烏頭炮裂去皮臍各一兩黑豆三二兩炒熟五加皮防風去蘆頭牛膝去苗各一兩松節銼道人頭各一兩附子二兩炮裂去皮臍上搗細為散每服食前以溫酒調下二錢羌活湯出聖濟總録治歷節風身體骨節疼痛不可屈伸舉動不隨羌活去蘆頭三兩肉桂去粗皮芍藥熟乾地黃焙葛根銼二兩甘草炙銼一兩半防風去叉當歸切焙芎藭各一兩麻黃去根節煎掠去沫焙二兩上粗搗篩每服五錢匕水一盞半酒半盞入生薑一棗大切同煎至一盞去滓溫服空心日午夜臥各一服茯苓湯出聖濟總録治歷節風手足曲戾言語錯亂赤茯苓去黑皮一作白茯苓防風去叉當歸焙白前乾薑炮甘草炙銼各二兩獨活去蘆頭二兩遠志去心附子炮裂去皮臍人參各一兩上銼如麻豆大每服先用水三盞黑豆半匙棗二枚擘破生薑半分煎至一盞半去滓入藥末五錢匕煎至一盞去滓溫服空心日午夜臥各一服紫桂散出聖惠方治歷節風疼痛不可忍桂心去粗皮防己赤茯苓去黑皮芍藥各四兩人參二兩白朮四兩甘草炙銼五兩防風去蘆三錢分烏頭炮裂去皮臍七枚當歸焙一半兩上銼如麻豆每服三錢匕水一盞酒少許生薑半分同煎至七分去滓溫服空心日午臨臥各一服但忌一切發物烏頭丸出聖惠方治歷節風筋攣骨痛不得屈伸烏頭燒存性藿香去梗縮砂炒去皮甘松去土酒浸白芷乾薑炮各二兩芎藭天麻當歸切焙各一兩雄黃研一分上為末煉蜜丸如小彈子大空心午時臨臥茶酒任嚼下一丸犀角湯出千金方治熱毒流入四肢歷節腫痛方犀角二兩羚羊角一兩前胡黃芩梔子仁射干各三兩大黃升麻各四兩豉一升上㕮咀以水九升煮取三升去滓分三服桂心散出聖惠方治歷節風疼痛不可忍肢節無力丹參桂心牛膝去苗附子炮裂去皮臍當歸赤芍藥木香萆薢銼麻黃去根節各一兩上搗篩為散每服三錢以水一中盞入生薑半分煎至五分去滓每於食前溫服忌豬雞犬肉生冷油膩赤芍藥散出聖惠方治歷節風骨節疼痛四肢微腫行動無力赤芍藥二兩附子一兩炮裂去皮臍桂心二兩芎藭一兩當歸二兩漢防己萆薢銼各一兩桃仁半兩湯浸去皮尖雙仁麩炒令微黃海桐皮二兩上搗羅為散每服五錢以水一大盞入生薑半分煎至五分去滓於食前溫服忌發物海桐皮散出聖惠方治歷節風身體四肢無力骨節疼痛海桐皮二一兩附子三二兩炮裂去皮臍麻黃二半兩去根節天麻牛膝去苗各三二兩桂心一兩防風一兩半去蘆頭當歸一兩酸棗仁一兩微炒上搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓於食前溫服天雄散出聖惠方治歷節風流入腰膝疼痛天雄炮裂去皮臍獨活桂心當歸各一兩酸棗仁二兩微炒研木香一兩乾蠍半兩微炒枳殼半兩麩炒微黃去瓤麝香一分細研上搗細羅為散研入麝香令勻每服食前以溫酒調下二錢忌生冷油膩之物豬魚雞犬肉茵芋丸出聖惠方治歷節風疼痛皮拆及血出者茵芋狗脊麻黃去根節各三兩丹參半兩五加皮杜仲去粗皮炙微黃各二兩硃砂三分細研水飛過甘草半兩炙微赤銼附子一兩炮裂去皮臍上搗羅為末研入硃砂令勻煉蜜和丸如梧桐子大每服食前以溫酒下二十丸忌羊血防己湯出千金方治歷節風四肢疼痛如捶鍛不可忍者防己茯苓白朮桂心生薑各四兩甘草三兩人參二兩烏頭七枚上㕮咀以苦酒一升水一斗煮取三升半一服八合日三夜一常覺焦熱痹匆匆然慎勿怪也若不覺復令服以覺乃止用烏頭皆去皮熬令黑乃堪用不然至毒人宜慎之一方有附子半兩無烏頭一方不用苦酒黃耆湯出聖濟總録治歷節風日夜疼痛黃耆四兩防風去叉附子炮裂去皮臍各一兩半芎藭一兩麻黃去根節煎掠去沫焙五兩當歸焙一兩甘草炙銼半兩芍藥一兩上銼如麻豆每服五錢匕鹽水一盞半入棗二枚去核生薑一分擘碎煎至一盞去滓溫服空心日午夜臥各一服人參湯出聖惠方治歷節風疼痛日夜發歇不可忍人參三二兩白朮四兩肉桂去粗皮防己各三兩甘草二三兩銼炙烏頭炮裂去皮臍七枚防風三分兩去叉赤茯苓去黑皮二兩上銼如麻豆每服四錢匕鹽水一盞半生薑三片同煎至一盞入醋少許更煎三四沸去滓溫服日二夜一當覺熱痹未覺加藥末並醋如前煎服覺熱痹即止白朮湯出聖惠方治歷節風四肢疼痛不可忍白朮防己各三兩甘草炙銼二兩半附子炮裂去皮臍半兩肉桂去粗皮人參各三兩當歸焙芍藥各一兩上銼如麻豆每服四錢匕以水一盞半生薑三片煎至一盞入醋少許更煎三四沸去滓溫服當覺體中熱痹未覺加藥末並醋如前法煎服忌一切發物麝香丸出聖惠方治歷節風疼痛發歇不可忍麝香研一錢龍腦研半錢木香半兩蠐螬濕紙裹煨熟研三枚壁虎研三枚地龍去泥研五條乳香一分錢研草烏頭三枚生去皮上將草烏頭木香搗羅為末合研勻為丸如干入酒少許煮麵糊丸如梧桐子大每服三十丸臨臥乳香酒下透關散出聖惠方治歷節風四肢攣急疼痛難忍短氣汗出麻黃根五兩天南星半兩炮威靈仙去土半兩萆薢當歸切焙人參天麻各一兩赤小豆水浸去皮焙半升上為末每服半錢匕或一錢匕溫酒調下食前後臨臥服獨活散出聖濟總録治歷節風獨活去蘆半兩一兩半玄參一兩生犀角屑二兩升麻三兩豉二合惡實根半兩銼生乾地黃銼半兩上為散每服三錢匕空腹煎米飲調下日二服芍藥知母湯出三因方治諸肢節疼痛身體魁瘰腳腫如脫頭眩氣短嘔吐桂心知母防風各四兩芍藥甘草炙麻黃去節附子炮裂去皮臍各二三兩上銼為散每服四錢水一盞半姜五片煎七分去滓空心服一方有白朮川芎杏仁半夏一方有白朮無麻黃名知母湯大棗湯出千金方治歷節疼痛大棗十五枚附子一枚甘草一尺黃耆四兩生薑二兩麻黃五兩上㕮咀以水七升煮取三升每服一升日三服趁痛丸出仁存方治走注歷節諸風軟痛猝中倒地跌撲傷損草烏頭三兩不去皮尖熟地黃南星半夏曲殭蠶烏藥各二一兩上為末酒糊為丸如梧桐子大日乾每服十五丸空心夜臥溫酒下如跌撲損傷用薑汁和酒研十數粒塗傷處如猝中倒地薑汁茶清研十五丸灌下立醒秦艽湯出聖濟總録治歷節風骨節疼痛日夜不可忍秦艽去苗土防風去叉各二兩黃耆銼三兩附子炮裂去皮臍當歸各一兩切焙麻黃去根節煎掠去沫焙四兩上銼如麻豆大每服五錢匕以水一盞半生薑三片同煎至一盞去滓溫服之空心並二服臨臥並二服厚覆微出汗慎外風防風湯出聖惠方治歷節風周身百節疼痛腰腳痿弱防風二兩去叉白朮一兩白蘚皮二兩肉桂一兩三錢分去粗皮黃耆二兩銼薏苡仁三兩炒上粗搗篩每服四錢匕水一盞