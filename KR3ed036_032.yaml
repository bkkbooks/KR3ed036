body:
  text: 卷三十二腎臟門腎臟風毒流注腰腳附論夫腎臟風毒流注腰腳者其狀腰腳沉重筋脈拘急或作寒熱或為疼痛或發瘡瘍是也蓋腎主腰腳風邪客於腎經久而不去風毒流注發於下部故變腳弱之症方虎骨酒出聖惠方治腎臟風毒流注腰腳疼痛行立無力虎脛骨二兩塗酥炙黃熟地黃二兩續斷赤箭石斛去根銼防風去蘆牛膝去蘆丹參去蘆桂心當歸微炒銼萆薢銼芎藭酸棗仁微炒山茱萸五味子漏蘆五加皮仙靈脾附子炮裂去皮臍骨碎補海桐皮肉蓯蓉酒浸一宿刮去皺皮炙令乾木香各一兩荊芥川椒去目閉口者炙微炒去汗各半兩烏蛇一條五兩用無灰酒泡浸三宿後取去頭尾皮骨上都細銼用生絹袋盛以無灰酒三斗浸經七日後每於食前暖一小盞服之牛膝丸出聖惠方治腎臟風毒流注腰腳筋骨疼痛行立艱難牛膝二兩去蘆虎脛骨塗酥炙微黃羌活鹿茸去毛塗酥炙微黃附子炮裂去皮臍熟乾地黃檳榔肉蓯蓉酒浸一宿刮去粗皮炙乾杜仲去皮微炒海桐皮當歸微炒巴戟天芎藭酒浸薏苡仁防風去蘆頭桂心石斛酸棗仁微炒仙靈脾補骨脂微炒乾蠍微炒天麻木香各三分上為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下三十丸木香人參湯出聖濟總録治腎臟風毒攻四肢頭面腰腳生瘡口苦舌乾形容羸瘦涎涕唾不時心下滿悶肢節怠惰狀如勞疾木香人參黃耆當歸切焙防風去蘆牛膝酒浸切焙桂炙銼荊芥穗巴戟天去心半夏制用薑汁鱉甲去裙襴醋炙令黃甘草白茯苓去皮秦艽去苗柴胡去苗各半兩乾蠍全者炒附子炮裂去臍羌活去蘆枳殼去瓤麩炒肉豆蔻去殼熟乾地黃焙各等分上羅篩每服三錢水一盞蔥白三寸切生薑三片同煎至七分臨熟入酒少許不吃酒即入童子小便少許去滓不拘時候溫服內補丸出聖濟總録治腎臟風毒元氣衰憊膀胱冷痿腰胯注痛腳膝無力狼毒濕紙煨附子炮裂去皮臍鹿茸塗酥炙去毛各二兩天麻酒浸炙巴戟天去心補骨脂微炒石斛去根萆薢肉蓯蓉酒浸去皮炒沒藥研桂去粗皮各一兩半乾蠍全者炒蒺藜子炒去角天雄炮裂去皮獨活去蘆乾漆熬去煙各一兩膃肭臍細銼搗篩為末四兩用酒五升煎上除膃肭臍外搗羅為細末研勻用膃肭臍煎攪和為丸或入煉蜜和丸如梧桐子大每三十丸空心溫酒或鹽湯送下羌活散出聖濟總録治腎臟風毒氣流注腰腳虛痛或上攻頭目昏眩耳聾生瘡及腳氣衝心頭迷悶腹肚堅硬冷汗出者羌活去蘆一兩乾蠍炒三兩楝實銼炒一兩半硇砂飛煉成霜一分桃仁去皮尖雙仁勿用炒附子炮裂去皮臍天麻白附子炮桂去粗皮檳榔銼芎藭地龍去土炒木香沉香各一兩阿魏用醋化麵炒拌作餅子半兩上為散每服二錢溫酒送下木瓜丸出聖濟總録治腎臟風毒氣攻注四肢疼及瘡腫煩熱木瓜切曝乾取二兩附子炒裂去皮臍一兩甘遂麩炒磁石煅醋淬二十遍白牽牛炒羌活去蘆陳皮去白防風巴戟天去心蘹香子炒木香地龍炒乾薑炮乾蠍炒防己各半兩上為末酒煮麵糊丸如梧桐子大空心溫酒送下十五丸微利為效萆薢散出聖惠方治腎臟風毒流注腰腳痛筋脈拘急起動艱難萆薢去蘆酒洗杜仲去粗皮炒微黃牛膝去蘆五加皮檳榔當歸去蘆酒洗酸棗仁防風去蘆肉桂去皺皮附子炮裂去皮臍獨活海桐皮羚羊角屑木香枳殼麩炒黃各一兩上為散每服四錢以水一盞生薑半片煎至六分去滓溫服日三服白花蛇散聖濟總録治腎臟風攻注遍體生瘡皮膚瘙癢白花蛇去皮骨酒浸獨活去蘆丹參蔓荊子蒺藜子炒去角玄參秦艽去苗山芋甘草炙銼苦參防風去蘆附子炮裂去皮臍天麻牛膝酒浸切焙各半兩上為末每服二錢溫酒調下安息香丸聖濟總録治腎臟風毒腰腳疼痛陰痿緩弱言語混濁呼吸短氣安息香四兩銼細入胡桃瓤四枚酒五升半同浸一宿來日漉出入沙盆研如糊同前酒調濾去滓入銚子內煎磁石醋淬肉蓯蓉酒浸去皮炙巴戟天去心附子炮裂去皮臍蒺藜子炒去角補骨脂微炒桃仁湯泡去皮尖炒天麻酒浸各一兩沉香銼桂去粗皮萆薢酸棗仁鹿茸酥炙去毛各三分上為末研桃仁同和勻入安息香煎搗為丸如梧桐子大每服三十丸鹽湯下威靈仙丸王氏博濟方治肝腎氣虛風邪攻注筋骨拘急機關不利上攻口齒咽喉臭爛生瘡浮腫頭面虛腫下疰腳膝少力筋骨熱疼威靈仙去土藿香葉自然銅煅赤醋淬附子炮裂去皮臍狗脊去毛萆薢漏蘆去蘆肉蓯蓉酒浸去皺皮焙骨碎補去毛牛膝去蘆酒浸一宿焙木鱉子去殼防風去蘆地龍去土炒以上各等分上為細末酒浸煮麵糊和丸如梧桐子大每服十五丸加至二十丸荊芥湯下木瓜酒亦得杜仲丸出聖惠方治腎臟風毒流注腰腳疼痛杜仲二兩去粗皮炙續斷虎骨塗酥炙黃附子炮裂去皮臍各二兩丹參去蘆芎藭桂各半兩萆薢銼牛膝去蘆赤芍藥海桐皮乾蠍微炒各三分上為末煉蜜和勻三二百杵丸如梧桐子大每日空心及晚食前溫酒下三十丸石斛丸出聖惠方治腎臟風毒流注腰腳疼痛四肢少力不能飲食石斛去根防風去蘆鹿茸去毛塗酥炙微黃天雄炮裂去皮臍羌活一兩木香當歸微炒附子炮裂去皮臍杜仲去粗皮炙微黃各一兩牛膝二兩去蘆仙靈脾桂心各一兩上為末煉蜜和勻三五百杵丸如梧桐子大每服空心溫酒下三十丸晚食前再服暖腎散聖濟總録治腎臟氣發動攻腰髓四肢疼痛蓽澄茄蜀椒去目及合口者炒出汗乾薑炮各半兩附子炮裂去皮臍桃仁去皮尖炒蘹香子炒桂去粗皮蒺藜子炒去角枳殼去瓤麩炒澤瀉檳榔去皮各三分上為散空心溫酒調下三錢日再服薏苡仁酒出聖惠方治腎臟風毒流注腰膝拘急疼痛薏苡仁牛膝去蘆各三兩防風去蘆獨活生乾地黃二兩當歸微炒酸棗仁微炒黃柏丹參去蘆桂心附子炮裂去皮臍各二兩黑豆五合炒令熟上細銼生絹袋盛用酒二斗漬五七宿後每於食前暖一小盞服之威靈仙散聖濟總録治腎臟風毒攻注腰腳或瘡或腫或痛威靈仙去蘆防風去蘆巴戟何首烏去黑皮黃耆銼白附子蒺藜炒去角白花蛇去皮骨酒炙白殭蠶炒晚蠶砂炒各半兩上為散每服一錢溫酒調下早晨日午臨臥服補元散聖濟總録治腎臟風下注多生熱瘡或頭目虛腫日漸瘦黃牛膝酒浸焙地龍炒去土海桐皮羌活去蘆當歸切焙白芷芎藭白附子炮附子炮裂去皮臍巴戟天去心各一兩上為散每服一錢用獖豬腎批開入藥末外更入椒鹽少許煨熟空心細嚼用津咽下威靈仙丸聖濟總録治腎經不足風冷乘之腰痛如折或引背膂肉俯仰不利轉側艱難或因役用力過多勞傷於腎或因寢臥冷濕地氣傷於腰或因墜跌損傷或因風寒相搏背冷腰痛威靈仙去土一兩桂去皮白附子炮當歸酒洗地龍去土炒赤小豆羌活去土各半兩上為末酒煮麵糊和丸如梧桐子大每服二十丸空心鹽酒或鹽湯送下八斤丸聖濟總録治腎臟風氣攻注腰腳腫痛附子炮去皮臍牛膝酒浸焙天麻酒浸焙當歸焙乾烏頭炮去皮臍白附子炮烏藥五靈脂各一斤上為末蒸木瓜酒入藥一處杵一二千下丸如梧桐子大每服溫酒下二十丸至三十丸不拘防風散聖濟總録治腎臟風上攻下注腫癢腳膝生瘡防風去蘆黃耆旋覆花枳殼麩炒羌活獨活去蘆枇杷葉炙去毛蒺藜炒去角各一兩上為散每服二錢空心晚食前溫酒調下木香散聖濟總録治腎氣發動上攻下注青木香蘹香子炒桃仁去皮尖炒令黃各半兩丁香蜀椒去目及合口者炒出汗一分蒺藜子陳皮去白檳榔各三分上八味搗羅為散空心溫酒下四錢磁石丸和劑方治腎臟風毒上攻頭面浮腫耳鳴眼暗頭皮腫癢太陽穴痛鼻塞腦悶牙齒動搖項背拘急渾身腫癢癮疹生瘡百節疼痛皮膚麻痹下注腳膝筋脈拘攣不能屈伸腳下癮疹步履艱難並宜服之常能補益去風明目活血駐顏磁石燒醋淬二十遍研如粉十兩牛膝酒浸六兩黃躑躅炒八兩川芎二兩肉桂去皮赤芍藥黑牽牛炒各四兩草烏炮去皮臍十四兩上為細末酒糊為丸每服三十丸煨蔥茶下亦得偏正頭疼生蔥茶下婦人血風渾身疼痛頭目眩暈面浮體瘦淡醋湯下每日三服大有神效羌活硫黃丸治元氣虛弱風氣攻注腳膝疼痛羌活去蘆硫黃天雄炮去皮臍蘹香子炒木香天麻酒浸焙硇砂水飛各一兩艾葉上搗五味為末用木瓜一枚切開頂去皮子入硫黃硇砂艾葉三味在內以元頂密蓋蒸爛與藥末和搗丸如梧桐子大每服二十丸鹽湯或酒送下威靈仙丸一名神仙八味丸治腎臟風毒流注腰腳疼痛方見諸虛門平補類案原方牛膝去苗一斤威靈仙淨洗巴戟天去心各四兩石斛去根四兩天麻半斤切以上四味用好酒二斗浸二宿焙何首烏一斤去黑皮浸軟切於黑豆中蒸爛焙乾肉蓯蓉去土二斤洗切用前浸藥酒同於銀石器內慢火熬成膏海桐皮銼半斤上除蓯蓉膏外搗羅為末用蓯蓉膏和搗千杵丸如梧桐子大每服二十丸至三十丸空心食前溫酒下日三服久服闢風邪調營衛順三焦烏髭鬚黃耆丸出聖濟總録治腎臟風毒攻注腰腳或生瘡虛腫熱疼痛行動不得方見諸虛門補益諸疾類案原方黃耆杜蒺藜炒去刺川楝子茴香炒赤小豆川烏泡去皮臍地龍去土炒防風去蘆炙各一兩烏藥二兩上為細末酒煮麵糊為丸如梧桐子大每服十五丸溫酒鹽湯亦得婦人醋湯下空心服又一法更加川狼毒海桐皮川椒威靈仙各一兩唯赤小豆加倍用之尤妙羌活散出聖惠方治腎臟風毒流注腰腳疼痛羌活牛膝去蘆附子炮去皮臍五加皮當歸酒洗微炒各一兩桂心萆薢海桐皮各三分防風去蘆一兩上為散每服四錢以水一鍾煎至五分入酒二合更煎三兩沸去滓食前溫服沉香丸出聖惠方治腎臟風毒流注腰腳疼痛腹脅滯悶沉香銼鹿茸去毛酥炙附子炮去皮臍牛膝去蘆各一兩桂心海桐皮萆薢檳榔各三分乾蠍半兩微炒上為末煉蜜為丸如梧桐子大每服食前以溫酒下三十丸七聖丸出聖濟總録治腎臟風毒流注腰腳熱痛或生瘡威靈仙去土心烏頭炮去皮臍烏藥蘹香子炒蜀椒去子炒地龍去土炒赤小豆各一兩上為末煮麵糊為丸如梧桐子大每服二十丸空心鹽湯或鹽酒下日晚再服黃耆散出聖濟總録治腎臟風上攻頭面下注腰腳黃耆羌活去蘆白附子炮去皮臍蒺藜子炒去角蘹香子炒各一兩上為散每服二錢用羊腎一隻批破入藥在內濕紙裹火煨令熟空心用溫酒嚼下豬肚丸出聖濟總録治腎臟風毒氣攻注腰腳或瘡或腫臍腹熱痛獖豬肚一個洗淨蒔蘿炒硫黃研附子炮去皮臍各一兩硇砂半兩上除豬肚搗為末入於豬肚內用線密縫酒煮爛候酒盡將豬肚入木臼中搗三十下丸如梧桐子大空心溫酒下三十丸檳榔散出王氏博濟方治腎臟風毒攻注生瘡兼療諸般惡瘡止痛生肉檳榔一枚甘草黃連去須密陀僧燒各半兩木香一分上為末先以溫鹽漿水洗瘡搵干以津唾調敷止痛生肌木瓜丸出聖濟方治腎臟風毒攻注腳膝筋脈拘急行步艱難疼痛木瓜丟皮瓤用一斤半牛膝去蘆酒浸天麻乾蠍去土炒各一斤上除木瓜外為末先將木瓜以瓦器盛瓶內蒸令爛留蒸下汁候冷放入盆內取木瓜研細為膏次將三味藥末入膏中同和勻更入煉蜜杵千百下丸如梧桐子大每服三十丸空心食前鹽酒或鹽湯下加至五十丸蘹香子丸出聖濟總録治腎臟風毒氣衝注腰膝生瘡蘹香子炒一兩肉蓯蓉酒浸一兩附子炮去皮臍一兩五味子一兩上細銼用好酒一升並豬腎一對細切和藥置一處浸一宿取出焙乾為末酒煮麵糊為丸如梧桐子大每服二十丸或好茶或豆淋酒下四生丸出聖濟總録治腎臟風毒攻注腰腳生瘡烏頭炮木鱉子去殼狗脊去毛各半兩苦參去蘆三錢上為末爛研豬腎入少許麵糊和丸如梧桐子大每服二十丸溫酒下不拘時四靈散出聖濟總録治腎臟風毒上攻下注行步艱難白附子炮牛膝酒浸一宿巴戟天去心黃耆各一兩上為散每服用豬腎一個批破去筋膜糝藥一錢並鹽蒔蘿各少許在內用濕紙裹煨熟為度早晨空心細嚼溫酒送下四白散出王氏方治腎臟風毒攻注四肢頭面生瘡遍身瘙癢白花蛇酒浸一宿去皮骨白附子炮白殭蠶炒白蒺藜子炒去角各一兩上為散每服二錢早晚食前溫酒調下燒腎丸出王氏博濟方治腎臟風上攻頭面耳內生瘡及腰腳腫痛磁石煅醋淬七遍細研水飛過附子炮去皮臍巴戟天去心蜀椒去目及閉口者炒出汗各一兩上為散每服用豬腎一個去筋膜薄切入蔥白薤白白鹽花各少許藥末二錢濕紙裹炭火內煨熟空心細嚼溫酒送咽之十日內見效四聖丸出聖濟總録治腎臟風毒下攻及五勞七傷遍身疼痛兼女人血氣風勞緩弱烏頭去皮臍地龍去土炒赤小豆烏藥各一兩上並生搗羅為末醋煮麵糊丸如小豆大每服二十丸溫鹽湯下乳香丸出聖濟總録治腎臟風毒上攻壅悶下注沉重乳香一兩烏頭炮去皮臍二兩威靈仙去土一兩上為末酒麵糊丸如梧桐子大每服三十丸溫酒送下早晚服之甘遂散出仁存方治腎臟風攻疰膝腳腫痛甘遂一錢木鱉子二斤去殼上為末豬腰二個記左右者左患用左右患用右將腰子批開入藥末一錢濕紙裹煨熟五更時嚼吞米飲下積水多則利多積水少則利少軟飲將息若雙腳患用腰子兩個是方許學士云在毗陵有姓馬人宿患腎臟風一足發腫如瓠痛不可忍臥欲轉側兩人挾持方可學士云以上法服之下膿如水晶者數升腫消拄拐而行再以赤烏散令塗貼遂愈後十年過毗陵率子列前拜謝腳疾至今不復作煨腎丸出永類鈐方治腎經積水流注經絡腿膝攣急四肢腫痛甘遂半兩木香一兩上為末每服二錢以豬腰子一個批開糝藥在內淹勻以薄荷裹定外以紙包數重水濕煨熟臨晚溫酒細嚼當下黃水五味湯治腎腰間濕痹當用水洗用鰻鱺魚和五味末煮空腹食之甚補益濕痹腳氣服之良威靈仙丸出本草治腎臟風壅積腰膝沉重用威靈仙末蜜和丸如桐子大初服溫酒下八十丸平明微利惡物如青膿即風毒積滯也如未動夜再服一百丸服下後吃粥補之一月仍常服溫補藥孫兆放杖丸同應用丸出王氏博濟方治腎臟風毒氣攻刺腳膝疼痛生瘡烏頭二兩大附子一兩茱萸一兩黑豆一斗以上各味以水三升同煮乾為度取烏頭附子薄切為片肉桂海桐皮萆薢羌活獨活川芎牛膝酒浸乾木瓜乾漆天南星以上各二兩上為末煉蜜為丸如梧桐子大空心午後臨晚鹽湯下三十丸忌魚肉白蒺藜散出王氏博濟方治腎臟風下疰腳膝疼痛或麻痹生瘡白蒺藜炒黑附子炮羌活川芎黃耆上五味各等分同為細末每服二錢空心溫酒下三服見效忌發風食大通丸出王氏博濟方治丈夫腎臟風上攻下注腳膝疼痛生瘡及小便膀胱宿冷滯氣攻刺腹脅並婦人血風攻疰腰膝拘攣兼能進食金叉石斛一兩牛膝一兩酒浸大附子二個一兩去皮臍乾薑三分炒豆蔻四個去殼麵煨檳榔四個木香一分菊花二兩硫黃一分白花蛇酒浸去皮骨二兩枸杞子二兩九蒸九曬炒上為細末以酒煮糊為丸如梧桐子大每服空心溫酒下如吃了轉覺腦骨內疼甚者乃藥效力如疼發過後只管吃即永瘥如怕痛住藥疼亦止愈婦人當歸酒下如作散溫酒調下如常服大妙煨石子散王氏博濟方治腎臟風上攻下注腳膝腫痛黃耆白蒺藜炒巴戟天去心川椒炒白附子茴香川芎木香上各等分同杵為末每服空心用豬腰子一對去筋摻藥一錢半鹽半錢用濕紙裹煨熟為度以溫酒或米飲嚼下皂角散出淡寮方治腎臟風毒腰腳生瘡大便風祕等大皂角去皮錘碎煉膏石菖蒲樟柳根赤小豆黑豆川烏炮草烏炮各一兩五靈脂半兩上為末以皂角膏為丸每服二十丸鹽酒吞下經進地仙丹出醫方大成治腎臟虛憊風濕流注腳膝痠疼行步無力川椒去目及閉口者炒出汗四兩菟絲子酒浸覆盆子白朮一兩白附子炮羌活防風各二兩人參三兩烏藥二兩川烏炮一兩附子炮四兩茯苓一兩地龍去土三兩赤小豆骨碎補一兩甘草一兩木鱉子去殼三兩萆薢一兩狗脊去毛蓯蓉酒浸四兩牛膝去蘆酒浸南星湯泡各二兩黃耆一兩何首烏二兩上為末酒糊丸如梧桐子大每服四十丸空心溫酒下黃耆丸出醫方集成治腎臟風毒上攻頭面下注腰腳行步艱難一切風痹川楝子川烏炮赤小豆蒺藜炒茴香炒地龍去土炒防風各二兩烏藥二兩黃耆二兩上為末酒糊丸如梧桐子大每服五十丸溫酒或鹽湯下羌活散出王氏博濟方治腎臟風上攻下疰頭面浮腫及有瘡者婦人血風攻注並宜服羌活去蘆防風去蘆川芎荊芥穗麻黃甘草木通黍黏子炒各等分上為末每服三錢茶湯或酒調服不拘時服沒藥散出王氏博濟方治腎臟風攻疰腳膝疼痛瘡腫沒藥三分甜瓜子半兩炒自然銅二兩燒醋淬一度研碎乳香一分骨碎補半兩紅芍藥半兩五靈脂半兩當歸半兩微炒地龍一分上為末用酒煮麵糊為丸如梧桐子大每服空心臨臥溫酒下思仙續斷丸出如宜方治腎虛風毒下注腳膝不可踐地小便微澀紫金丹王氏博濟方治腎風上攻下注虛腫疼痛補暖丹田大進飲食及療婦人血風血氣流注筋骨疼痛或發熱口苦舌乾四肢煩倦血海久虛兼化痰涎黑附子半兩炮丁香半兩縮砂半兩當歸半兩硇砂半兩天南星炮半兩半夏半兩肉豆蔻五個木香半兩防葵半兩青葙子半兩硃砂半兩水銀一分自然銅一兩火煅醋淬七次上先將水銀硇砂二味同研合一處為細末和勻以醋糊為丸如梧桐子大薄荷茶下