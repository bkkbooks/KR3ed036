牙故喜唾也夫腎主於水其下為膀胱是腎之腑主於津液二經俱象於水故為表裡也若臟腑和平水液不流於小腹若腎氣勞損膀胱虛弱陰氣不足陽氣有餘則上生熱心胸壅滯水飲停積故常唾也赤茯苓丸出聖惠方治腎虛損上壅痰滯常唾稠黏腹肋脹滿吃食無味赤茯苓一兩甜瓜子三分人參三分去蘆旋覆花三分半夏一兩檳榔三分枳殼半兩麩炒草豆蔻半兩去皮前胡三分附子炮去皮臍厚朴三分去粗皮薑汁製上為末以生薑汁煮糊和丸如梧桐子大每服食前以薑棗湯下二十丸白朮丸出聖惠方治腎臟虛損心膈痰澼壅滯當唾胸脅悶白朮一兩赤茯苓一兩附子三分炮去皮臍桂心一兩紫菀三分訶黎勒一兩前胡一兩桔梗一兩去蘆人參一兩陳皮三分檳榔半兩半夏一兩微炒上為末以生薑汁麵糊丸如梧桐子大食前以枳殼湯下二十丸澤瀉散出聖惠方治腎臟虛損上壅痰涎結聚常唾胃弱少食宜服澤瀉一兩人參三兩旋覆花三分麥門冬三分去心枳實五錢麩炒前胡三分桔梗三分甘草一兩炙杏仁去皮尖三分半夏二兩炒上為散每服三錢以水一鍾入生薑半分煎至六分去滓食前服人參散出聖惠方治腎臟虛損冷氣所攻下焦虛冷壅滯唾液稠黏人參一兩五味子白朮附子炮去皮臍細辛半夏各半兩前胡黃耆桂心各半兩枳實麩炒甘草各三分上粗搗如麻豆大每服三錢水一盞生薑三片煎至七分去滓溫服半夏丸治腎臟虛損壅塞唾液不休心胸痞悶半夏湯浸七遍去滑為末三兩前胡一兩赤茯苓檳榔陳皮去白訶子枳殼麩炒人參桔梗炒五味子各半兩附子炮去皮臍半兩上為末麵糊為丸如梧桐子大每服二十丸至三十丸食前溫酒生薑湯下前胡湯治腎臟虛損頭目昏眩順三焦氣利胸膈進飲食前胡一兩白茯苓三錢木香五錢附子炮去皮臍大腹皮一兩桔梗半兩炒枳殼麩炒半兩五味子一兩甘草炙半兩半夏半兩生薑自然汁四兩水一升於銀器內浸水乾焙上銼如麻豆大每服五錢水二盞入生薑三片同煎至一盞去滓食前服前胡散出聖惠方治腎臟虛損脾氣乏弱津液不榮上焦生熱常唾稠黏胸膈壅滯不欲飲食前胡一兩大腹皮三錢半夏一兩湯炮炒杏仁去皮尖炒一兩陳皮去白三錢澤瀉一兩赤茯苓一兩甘草半兩炙上為散每服三錢水一盞入生薑三片煎至六分去滓食前溫服半夏散出聖惠方治腎臟虛損上熱下冷心胸壅滯痰毒結實唾如筋膠飲食少進半夏一兩湯浸七次炒川烏頭半兩去皮臍防風半兩旋覆花一兩前胡二兩赤茯苓一兩桂心一兩白朮半兩甘草半兩炙上為散每服三錢水一鍾入姜三片煎至六分去滓食前服地黃湯治腎虛多唾熟地黃焙鹿茸酥炙巴戟去心枸杞子丹參五加皮各一兩車前子一兩桂三錢防風一兩上搗碎如麻豆大每服四錢水二盞煎至半盞去滓通口服茯苓湯治虛損短氣咽喉凝唾不出如膠方見虛勞門虛勞少氣類案原方白茯苓去黑皮一兩麥門冬去心焙一兩熟乾地黃焙人參前胡去苗桂去粗皮各五錢芍藥甘草炙各一兩上粗搗篩每服五錢水一中盞半棗二枚去核煎至一盞去滓分溫二服如人行十里再服訶黎勒丸治腎虛常唾訶子半夏湯泡七次炒桔梗陳皮去白杏仁去皮尖炒檳榔五味子澤瀉各等分上搗七味為末入杏仁和勻生薑汁煮麵糊丸如梧桐子大每服三十丸淡薑湯下五味子丸治腎虛痰唾不休五味子白茯苓前胡各三兩半夏湯泡七次炒麥門冬去心山茱萸各半兩貝母三錢上為末煉蜜為丸如梧桐子大每服三十丸食前薑湯送下日二服
