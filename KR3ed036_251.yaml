body:
  text: 卷二百五十一諸毒門解諸毒附論凡人跋涉山川不諳水土人畜飲啖誤中於毒素不知方多遭其害豈非枉橫耶然而大聖人久設其法以救活之正為貪生嗜藥忽而不學一朝逢遇便自甘心竟不識其所自今述神農黃帝解毒方好事者少留意焉解諸毒例中毒門評評凡中藥毒及一切諸毒從酒得者難治言酒性行諸血脈流遍身體也因食得者易治言食與藥俱入於胃胃能容雜物又隨大便泄出毒氣毒氣不入血脈故易治也以毒即歸藏飽者毒氣未能深入故宜急解凡解諸食毒爛嚼甘草咽之則毒吐出矣方犯天麥毒方齊州有人病狂每歌曰五靈華蓋曉玲瓏天府游來汝府中惆悵此情言不盡一丸蘿蔔火吾公又歌曰踏陽春人間二月雨如塵陽春踏盡秋風起腸斷人間白髮人後遇一道士作法治之乃云夢中見一紅裳少女引入宮殿皆紅紫飾小姑令歌道士曰此正犯天麥毒女則心神小姑脾神也按醫經蘿蔔治面毒曰火吾公即以藥並蘿蔔食之遂愈治溪毒中毒以知母連根葉搗作散服之亦可搗取汁飲二升夏月出行多取此屑自隨欲入水先取少許投水上流便無畏兼闢射工亦可和水作湯浴之甚佳治諸蠱毒用小蒜五月五日採者生食之不可常食解諸藥毒蟲蛇及諸蠱毒上以大粉草寸段銼以芝麻油浸透愈久為妙收之遠行漳泉福建川廣間有中毒即嚼三兩段得吐即無害又方生茶葉焙生甘草焙生白礬乳鉢研為末上等分為細末每服一大錢以新汲水調下若中毒一月其毒自大便下若中蠱毒即吐出肉塊次服補藥生糯圓用糯米粉和豬膽汁為丸如梧桐子大每服三十粒熟水吞下解一切毒用縮砂仁生韭汁藍實各單用水調下淡豉蔥麥門冬水煎服卒中藥毒者生麻油一盞吐下毒治中蠱毒出本草用生蒼耳七個白礬一兩為末皂角子嚼塗咬處須男子嚼之敷藥於腫處一方出本草用雄黃不拘多少萵苣汁和作餅子候乾為末每用少許貼瘡口立效或以酒調雄黃末敷之亦得解毒散出本草用煩鳥漿酒服治中諸毒煩悶出本草用掘地作坎以水沃其中攪令濁俄頃取飲之即解解毒人卒不得生藍汁者出本草以浣布汁解之亦善解諸毒物入腹出本草以鐵漿服之解一切毒出本草以臘雪少溫服之解諸毒藥及蟲出本草以車渠玳瑁一片等分人乳磨服極驗也治一切毒氣及蛇傷出本草以沖洞根磨服之應是著諸般毒悉皆吐出治一切草毒出本草用白扁豆生嚼及煎湯服取效治諸惡蠔狐尿刺毒山溪中沙蝨射工等毒出本草以蔥煮汁浸之或搗敷亦效治嶺南人以藍頭合毒有中之者出本草以藍蛇尾作脯與食之即解其蛇頭毒尾良也破棺湯出本草專治諸毒辛惡黃悶欲死者以屎新者最效須與水和服之乾者燒之煙絶水漬飲汁一方多年乾者搗末沸湯沃汁服之解諸毒蠱毒腫毒蛇虺蠱狂犬毒並瘡除血長膚者以紫珠煮汁服之一名紫木治溪毒以小蒜煮汁飲之治人中毒出本草以萍子曝乾為末酒服方寸匕解諸毒物出本草以百丈青煮服亦搗絞汁服治解一切毒氣虎狼所傷溪毒野蟲等毒出本草以草犀根燒碎服臨死者服之得活治諸毒熱煞蛇毒除驚怖恍惚出本草以麝香研碎服之治瘴毒出本草以蚺蛇肉作鱠食之良殺蠱毒出本草以鰻鱺魚乾燒炙之令香食之三五度即瘥一方研為末空腹服之常服尤良去熱煩解毒調中氣令人肥健又主馬血毒入肉出本草以甜藤搗絞汁和米粉作糗餅食之甜美去蟲地蠱毒出本草以大蒜生食之解蜈蚣毒及蜀椒毒用桑汁及桑根汁並解治狐貍刺毒用煮大豆令多飲豆汁無大豆豉亦佳又方解榔栶毒入口用飲少醋解治剝驢馬血入肉毒用赤柳木以火炙尉之亦可煮汁浸之效一名河柳風毒腫出聖惠方沉香木香薰陸香雞舌香麝香紫檀香並皆治之中藥毒附論神農嘗百草一日遇七十毒以辨相得相反相惡畏至於有毒無毒各有制治然藥無毒則病不瘳內經所謂知毒藥為真者乃用藥之要也昧者偶有服食當究其毒以制治之猶巴豆之用黃連半夏之用生薑是也甘草能解百藥之毒大有神妙有人中烏頭巴豆毒甘草入腹即定中藜蘆毒蔥湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反掌方稱大豆汁解百藥毒每令試之大懸絶不及甘草又能加之為甘豆湯其驗尤甚有人服玉壺丸治嘔不能已百藥與之不止藍汁入口即定又云凡受毒者或魚肉飯中得之則易治飲酒得之則酒氣散歸百脈難治若在胸膈作楚則用稀涎散吐之若在腹中作楚急服雄黃丸瀉之徐服參苓白朮散無恙矣仍忌雞鵝肉數日為妙又云凡煮諸藥汁解毒者不可熱飲諸毒得熱更甚宜使小冷為良夫有大毒之藥不可入口鼻耳目入即殺人者一曰鉤吻生朱崖二曰鴆又名䲰狀如黑雄雞生山中三曰陰命赤色著木懸其子生海山四曰海姜狀如龍赤色生海中五曰鴆羽狀如鸛雀黑項赤喙食蝮蛇生海內但被此諸毒藥發動狀皆似勞黃頭項強直背痛而欲寒四肢痠痛毛悴色枯肌肉纏急神情不樂又似瘴病或振寒如瘧或狀熱似時行或吐或利多苦頭痛又人齒色舌色赤面多青者並著藥毒之候也嶺外俚人別有不強藥不藍藥有憔銅藥金藥菌藥此五種藥中人者亦能殺人但此毒初著不能知欲知是毒非毒初得便以灰磨洗好熟銀令淨後以楊枝水洗口齒含此藥臥一宿明旦吐出看之銀黑者是強藥銀青黑者是藍藥銀紫斑者是憔銅藥此三種但以不強藥毒最急若熱酒食里中者六七日便死冷酒食里中者必經半月始可知爾若冷銀銀色不異而病候與著藥之狀不殊心疑是毒欲知者可食鯉魚食畢此毒即發亦空腹取銀含之可兩食頃出著露下明旦看銀色若變黑即是藥毒又取熟雞子去殼令病人齒齒幼雞子白處亦出著露下若齒痕處黑即是也又覺四大不調即飲酒空腹食炙雞炙豚鴨等觸犯令藥發即治之便瘥若久未治毒侵腸胃難復攻治也若定知著藥毒而四大未羸者取大戟長三寸許為末水服必大吐痢若色青者是憔銅藥色赤者是金藥吐菌子是菌藥此外亦無定色但小異常耳又有兩種毒藥名當孤草其著人時脈浮大而洪病發時惡寒頭痛乾嘔背迫急口不覺嚼舌大小便祕澀面色眼眶唇口指甲背青是也又別一種當孤草者其病發時口噤而干舌不能言咽喉如錐刀刺胸中甚熱體胸滿悶不至百日身體唇口手足皆青而死又著烏頭毒者其病發時咽喉強而眼睛疼鼻中聞臭手腳沉重常嘔吐腹中熱悶唇口青顏色乍青乍赤百日乃死凡人若色黑骨大肉肥者皆胃厚則勝毒若瘦者則胃薄不勝毒也凡中藥毒及一切毒皆能變亂與人為害亦能殺人但毒有大小可隨所犯而解救之若毒重者令人咽喉腫強而眼睛疼痛鼻乾手腳沉重常嘔吐唇口習習腹裡熱悶顏色乍青乍赤經久則難療其輕者身體習習而痹心胸湧溢而吐或利無度是也但從酒得者難治言酒性行諸血脈流遍身體故也食得者易治言食與藥俱入於胃胃能容雜物又隨大便泄出毒氣未流於血脈故易愈也若覺有前諸候便以解毒之藥救之方蜂窠散治藥毒吐後土蜂窠炒研末一兩赤小豆糯米粟米藍實四味並生用各二兩豬苓去黑皮薺苨各銼半斤馬藺花乾者二兩上為散每服三錢匕溫水調下空心日晚服一方入豬糞炒焦解諸藥毒預含方出聖惠方水銀一兩以棗肉研令星盡膩粉一兩半不灰木一兩搗研細羅為末揀淨雞子三枚藍根一兩搗羅為末生薑汁二合上以臘日拌和入瓷罐內挖地坑埋至端午日取出用軟飯和丸如紅豆大每服以甘草汁生米泔嚼下一丸瘥丹砂丸解藥毒蠱毒等疾丹砂研雄黃研附子炮去皮臍為末各二兩豉六十粒炒巴豆六十粒去皮心膜麩炒去油上細研巴豆並豉同前三味煉蜜和搗數百下丸如豆瓷瓶密收每服二丸暖蜜酒下解諸毒藥傷人方出聖惠方雲實根半兩商陸五兩切曬乾炒令黃肉桂一兩去粗皮甘草一兩生用豬牙皂角三兩去皮殼炙令焦黃去子上搗篩為散每服五錢以水一大盞煎至五分去滓溫服之以吐瀉為度令吐在盆中要得看驗只得吃粥將息為妙解毒丸出聖惠方銀星礬石金星礬石太陰玄精石雲母粉不灰木以生糞燒灰令通赤以上各二兩上用藥四味炭火燒令通赤與不灰木同入盆下蓋出火毒一宿後研細如粉入龍腦二錢更研令勻以糯米粥和丸如紅豆大每服一丸以生薑汁少許並新汲水研破服之婆婆石丸出聖惠方專解藥毒不論年月深淺立瘥婆婆石豬血各半兩雄黃麝香乳香各一分上研為末用軟飯並豬血和丸如梧桐子大每服以溫水研下二丸又含一丸即吐出病根瘥如不吐即以內消也於端午日午時合如急要即取辰日辰時合亦得防己散出千金方專解芫花毒方防己防風去蘆甘草生銼桂去粗皮各一兩上為末散每服二錢匕冷水調下連並三服一方單用一味可解之椒豆飲出百一選方專解砒毒韜丸傳漢椒四十九粒黑豆十四粒烏梅二個去皮甘草三寸碎之上水一碗煎七分溫服白扁飲一名巴豆靈膏出危氏方解砒毒等用白扁豆不拘多少為細末入青黛等分細研再入甘草末少許巴豆一枚去殼不去油別研為細末取一半入藥內以炒糖一大塊水化開添成一大盞飲之毒隨利去後用五苓散之類金星地蟺散出聖惠方專解毒藥金星地蟺末二錢婆婆石半錢牛蒡根一兩切碎焙乾灶下黃土一兩上為細末每服以熱酒調下一錢服之藍根飲解毒藥藍根銼一握蘆根銼一握緑豆研一分澱腳研一合曬乾上先將藍根蘆根以水一碗煎至七分去滓次後入二味和勻分三服或一二服利下惡物不用再服承氣湯出十便良方專治吐卻惡毒物後覺胸心安穩即服此茯苓一兩麥門冬一兩去心人參去蘆頭一兩青竹茹五錢半上為末每服五錢以水一大盞入棗三枚煎至五分去滓溫服日三服一二兩日內且宜食粥麥門冬飲出千金方專治一切藥毒不問草石但覺噁心生麥門冬去心二兩蔥白切三兩豉二兩半上銼如麻豆大以水七盞煎取三盞半去滓分三服食頃再服之椿皮飲解一切藥毒椿白皮東柳枝並細銼各二合阿魏好者少許上以水三盞同煎取一盞去滓空心頓服吐出惡物即瘥吐後服蜂窠散甘草飲治中藥毒心痛煩悶甘草生銼二兩粉草研一兩白蜜五錢半上以水六盞先煎甘草減半納葛粉並蜜更煎三兩沸去滓溫分三服如食頃再服辨毒散治一切毒及藥毒阿魏研青鹽研各一兩甘草生銼三兩上為散如遇有毒物處每日空心沸湯點服一錢若食著毒物立便吐出中諸藥毒方甘草生用黑豆淡竹葉上等分銼散水一碗濃煎服之粉草飲凡中藥毒即用生黑豆數粒食之聞腥者即非中毒也若是吐逆煩躁服藥須極冷即解也解中藥毒並蟲毒悶亂吐血煩躁甘草一兩生用白礬半兩生延胡索一兩二錢上為細末每服半錢水一盞煎至六分去滓放冷細細呷之解諸藥毒人中毒以金叉股煮汁服之亦生研更烈必大吐下如無毒亦去熱痰解毒丸治中藥毒心腹切痛不可當欲死者有救藥不及死後身黑是中毒之證大棗二枚去核巴豆三十七粒去皮心膜不去油上共研勻只作四丸以大針穿就麻油燈焰上燻黑用瓷盒貯遇中毒者每服只一丸隨所中毒物汁咽下不得嚼破一二時辰取下毒其毒即緊包裹所服藥下或不知所中毒物即以茶清一大盞放溫咽下甘草湯治中藥毒心膈煩悶甚者如錐刺痛不可忍宜速吐之甘草生用二兩白藥一兩一錢上細銼以水三盞同煎至二盞去滓後頓服以吐出惡物為度吐了後再單煎甘草一味服之尤佳歸魂散一名礬茶散出廣南衛生方解中藥毒煩燥吐血腹內及口內如錐針刺白礬草茶各一兩一錢上搗研為散分作三服用新汲水調下連服之立解此藥入口其味甘甜不覺苦味者是中藥毒也得吐即效不吐再服一方用白礬臘茶末水調下治菌毒解百藥毒方出千金方用甘草薺苨大小豆汁藍葉根實絞取汁服之並瘥解野葛毒方出千金方如若口噤者以大竹筒盛冷水掛兩脅及臍上暖輒易之須臾口開開則藥入口便活以生薺苨汁解之又用雞子三枚葛根汁甘草汁鴨頭熱豬血膏雞屎人屎各絞取汁服之並瘥解烏頭天雄附子毒方出千金方用大豆汁遠志防風棗肉飴糖並能解之一方專用遠志防風二味投大豆汁調下一方專用防風棗肉濃煎湯服之亦可解半夏毒方出千金方用生薑汁及乾薑服之良唐崔魏公云鉉夜暴亡有梁新聞之乃診之曰食毒僕曰常好食竹雞竹雞多食半夏苗必是半夏毒命取生薑捩汁折齒而灌之活浙人王夫人忽一日面生黑斑日久滿面俱黑遍求醫不效忽遇一草澤醫人云夫人中食毒矣治之一月平復後覺其方止用生薑汁糊為丸服之問其故云食斑鳩蓋此物常食半夏苗中毒故用薑汁解之解莨菪葉中有毒者煮甘草汁服之解狼毒方出千金方用杏仁藍汁白蘞鹽木占斯各絞汁調服瘥藍汁亦解解巴豆毒方出千金方用煮黃連汁大豆汁小豆藿菖蒲屑及煮寒水石各件取汁並皆可服甚良解蜀椒毒方出千金方用葵子汁蒜桂汁豉汁人尿冷水土漿飲之一方以雞毛燒吸烟及水調服一方用棗子解之更含薺苨並瘥一方專用葵子汁桂汁豉汁同和服之解斑蝥芫菁毒方出千金方用豬膏大豆汁戎鹽藍汁服之一方用鹽湯煮豬膏巴豆飲之一方用大小黑豆汁服之並瘥解莨菪毒方出千金方專治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇上飲甘草汁及藍青汁即愈一方治中砒毒用藍汁同甘草汁飲之解鉤吻毒方出千金方專治鉤吻毒困欲死面青口噤逆冷身痹肘後方云鉤吻茱萸食芥相似而所生之旁無他草又莖有毛偶食之殺人用薺苨八兩㕮咀以水六升煮取三升如人體冷熱服五合日三夜二濃煮為妙一方煮汁飲之一方啖蔥涕尤佳解毒方解中一切毒藥口唇麻目暗心腹如刀刺或吐出血用石緑不拘多少研細每服一錢研萊蔔之汁調下立吐得毒出即服和氣藥調補升麻湯治藥毒吐出用升麻半兩為散食後及夜臥溫水調下一錢匕服半月後一切毒藥入口即吐出宜常服太白散解藥毒用山芋三兩為散每服二錢匕新汲水調下日三服殭蠶散解一切藥毒用白殭蠶直者炒為散每服一錢粥飲調下吐出毒物瘥一方用酒醋水三般同為一盞煎五七分溫服麻仁飲用大麻仁五合研如膏入水二盞攪令勻取汁飲之解躑躅毒方出千金方用梔子仁四兩為散冷水調下二錢若未效再服解藜蘆毒方用雄黃一兩細研煎蔥汁調下一錢如未效再服一方用溫湯飲之並解一方用冷酒服解一切毒解甘遂毒方出千金方用大豆不拘多少去皮以水研取汁每服一盞未效再服一方大小黑豆水調服解一切毒解大戟毒方出千金方用菖蒲一兩為散每服二錢以溫湯調下解杏仁毒方出千金方用藍實不拘多少研取汁水和服之亦解毒藥解桔梗毒方出千金方用糯米二合洗淨煮白淡湯粥食之解砒毒鼠莽毒方出醫方大成用金線重樓磨水服之即愈又用烏桕根擂水亦好又用大黑紅豆煮汁服之並瘥解射菵毒方藍汁竹瀝葛根屑蚯蚓屎藕節汁大小黑豆上各味備急皆能解散諸毒但以一味二味皆良又一方無葛根屑解砒毒方用早禾杆燒灰新汲水淋汁絹帛濾過冷水服一碗毒從下利即安解鼠莽草毒方用玉簪花根研取自然汁半盞灌之如吐再一服一方解毒玉簪花根水調服之解砒毒方用豆豉濃煎湯灌之亦治服藥過劑心中煩悶獨聖散治附子河豚烏頭之類一切毒藥並解丹毒用多年壁土熱湯泡攪之令濁少頃乘熱去腳取飲不醒人事灌之或挖地以水攪漿水飲之妙一方用壁土水調服之瘥一方用川白土調服解巴豆毒方視其證口渴臉赤熱痢不止諸藥不效用芭蕉根葉研取自然汁服痢止而安解鼠莽草毒用枯蓮房殼帶梗陰乾㕮咀煎水二三碗灌之如無荷葉中心蒂或用藕節煎湯一碗冷灌之毒即散三味中隨其物便用之又方用豇豆花研水吞下如無花只用豆亦可解砒毒方用伏龍肝為末清油調二錢服之解毒藥方用孔雀血生飲之良如聖散治中一切藥毒並蟲毒用石蟹熟水磨服之解砒毒方其證煩燥如狂心腹攪痛頭旋欲吐不吐面色青黑四肢逆冷命在須臾不救方用緑豆半升擂去滓以汲水調通口服或用真靛花二錢分二服以井花水濃調服之又方治悶絶心頭溫者新汲水調下服之如神治中毒衆藥不能解者急以野人肝研水灌立解又方用黑鉛井水磨下一方無鉛用青鉛兩塊研井水下又方解砒毒亦解巴豆毒用生麻油一盞飲之不能飲灌之立見起死又煎黃連湯服之亦佳以吐為度則其毒氣自不能為害黑豆甘草節各熬水服解之解鼠莽草毒及丹毒方用旋刺下羊血鵝血鴨血飲之良礬茶散解鼠莽毒又方解毒藥毒用大黑豆煮汁服之如欲試其驗先用鼠莽苗葉以豆汁澆其根旋散爛不復生矣一方用紅豆解砒毒方用釅米醋多飲之吐出毒解不可飲水一方用人糞食之亦可解附子毒方用濃煎防風湯飲之良治藥毒取巴豆去皮不出油牙硝等分合研成膏冷水化一丸服瘥又方用溫豬脂一升飲之治中諸毒藥及野葛已死方取新小兒屎絞汁和一升服之入腹即活解諸毒無過屎汁解諸藥毒以土芋研水服當吐惡物盡便止解諸藥及諸草毒方以黃土地上挖一坑以水攪濁飲一二碗即愈又方治回回麻藥服多而昏暈者以好醋解之又方治草烏麻吐好醋解生薑甘草皆解一方煎甘草生薑自然汁頓服解一切藥毒及草毒六畜肉中毒出聖惠方用白扁豆生曬乾為細末新汲水調下二三錢全椒鹽者高照一子無賴父笞之遂服砒霜自毒大泄利腹脹欲裂豫教照以調此藥隨所與之不數碗即安如聖散出肘後方專解藥毒露蜂房甘草各半兩用麥麩炒去麩上為散用水一盞半煎至八分放溫臨臥頓服明日取下惡物為妙二珍散出廣南四時攝生論專解一切藥毒天南星三兩為末黃牛膽大者一枚取汁若收得陰乾臨用時再用暖火浸軟用上和丸如雞頭大陰乾遇中毒者先同汗襪水澄清半盞入鹽少許磨下一丸或和服即瘥如吐利後氣滿即服平胃散助之此藥但頭與腹未裂並可治藍飲子出危氏方專解砒毒及巴豆毒用藍根沙糖二味相和擂水服之或用龍腦薄荷汁尤妙多進二服薺苨散出千金方解一切毒藥薺苨一分藍並花二分七月七日取者為佳上以藍陰乾搗篩水和服方寸匕每日三服貝齒散出千金方中射菵脯毒及食餅臛中毒方取貝子為末水服不瘥又服一方治食百物中毒以一枚含之吐出毒物為度解野芋毒方出千金方用土漿人糞汁服之解毒藥方出聖惠方用白礬一兩搗為末以新汲水灌之口耳中皆出黑白勿怪出盡即愈治中藥毒方出千金方取秦燕毛二枚燒灰服聖惠用春燕毛二枚燒灰水服或用小便服之治硼砂毒方用生緑豆粉不拘多少研汁飲之亦解砒毒化毒散出余居選奇方專治中藥毒吐血或心痛或舌微黑口唇裂嚼生黑豆不腥則是巴豆一粒去殼略去油研黃丹半錢雄黃一錢研上同研用烏雞子一個打藥合劑煎捲成筒子臨睡只一服細嚼茶清送下當夜取下毒解莨菪毒方出千金方用薺苨甘草犀角蟹汁升麻各絞汁服並皆治之凍青飲解砒毒用凍青葉擂取自然汁添井水服須瀉下解中仙茅附子毒方鄭長卿資政詵少時隨父太宰官懷州將官服仙茅遇毒舌脹出口漸大與肩齊善醫環視不能治一醫獨言尚可救少緩無及矣取小刀釐其舌隨合釐至百數始有血少許醫言無害也舌消應時縮小即命煮附子酒每生切附子一兩浸以酒汁旦起輒飲一杯服之二十年後再為陝西漕使詵自太學歸過往南縣暑中行至中途曉寒詵飲一杯竟復令溫半杯酒來飲儘自覺微醉乃與妻飲行將數里妻頭腫如斗唇裂血流下駐路旁告隨行李職醫李使黑豆緑豆各數合生嚼之且煎湯並飲至曉腫始消詵仍服之不輟到安數月失明遂致仕時方四十二歲藥反中毒方治諸藥相反中毒蟬殼蛻燒灰細研一錢上冷水調下頻服取效雖面青脈絶腹脹吐血服之即活解毒藥方王仲禮嗜酒壯歲時瘡㾴發於鼻延於顙心甚惡之服藥多弗效僧法滿使服何首烏丸當用二斤適其僕識草藥乃掘得之其法忌鐵氣但入砂鉢中藉黑豆蒸熟既成香味可人念所蒸必能去證取以靧面初覺極熱漸加不仁至晚大腫目耳鼻渾然無別望之者莫不驚畏主之母高氏曰凡人感風癩非一日積吾兒遇毒何至於是吾聞生薑汁赤小豆解毒山豆根黑哈粉能消腫毒即命搗捩薑汁以三味為末調敷之中夜腫消到曉遂愈蓋先採何首烏擇焉不精為狼毒雜其中以致此患也解百毒甘草能解百毒為藥之長孫思邈論云有人中烏頭巴豆毒甘草入腹即定又稱大豆解百藥毒嘗試之不效乃加甘草為甘豆湯其驗更速凡欲食先取甘草一寸炙熟嚼咽汁若中毒隨即吐出治蒙汗毒目瞪口不能言如醉用白扁豆不拘多少為細末用水或溫酒調下亦能解砒霜毒及鴆毒又方用川中白善土如無以廚上多年黃土為末水調服又方在鬢邊左挑腳銅錢飛下即蘇又方或急證無藥以新汲水噀心上候醒即止解砒霜毒以鬱金末二錢入蜜少許冷水調下升麻濃煎冷服杏核研為細末以米飲調下白扁豆為末冷水調下解砒毒無如醬水調服寒水石緑豆末以藍根研水調下取地漿調鉛粉服之解白芷末水調下鬱金末水調下豉豆汁尤佳甘草散解一切毒藥用甘草二兩生銼碎用水三碗煎至一碗去滓入緑豆粉一合打勻再煎數沸入蜜半兩溫服又方療諸藥毒各有相解者今但取一種而兼解衆毒求之易得者甘草濃煮汁多飲之無不解也又食少蜜佳解百藥毒用橫紋甘草截成小塊麻油煎過空心食前後常嚼久而作效凡食毒藥毒必嘔出皆不為害也薺苨解百藥毒以其與毒藥共處皆歇取根搗末飲服藍汁白扁豆及大小豆並單服用水調服以毒盡即效驗也萬露丹解一切藥毒及蠱毒金蠶等毒光明硃砂一兩須是辰州者令人細研一伏時大天南星為末生用三兩黃牛膽一枚取汁如無新者須是陰乾者用時以溫水浸軟以溫水調開上以膽汁和前二味為丸如皂角子大陰乾如有中諸毒者但頭肚未裂皆可救療服時先取汗腳襪以新汲水洗汁澄清半盞入鹽磨化一丸頓服續以薄粥投之以吐為度其疾永除解諸藥毒肉中毒合口椒毒野菌毒用入地乾土水調服之並解東壁土用之功亦小同治合口椒並楓樹上木耳有毒者以冬瓜蔓生搗汁服解諸藥毒及利小便以木通實蜜煎食之治解諸藥毒以陳家白藥水研服之入腹與毒相攻必吐疑毒未止便再服心胸煩熱天行溫瘴並皆治之解藥毒蠱毒以菩薩石用水磨服之解諸藥毒丹毒菌毒止渴去煩熱以諸血並生飲之解諸毒藥腫用人肝藤生研服之亦敷腫上治中野葛毒以羊血飲解之治水銀入肉令百節攣縮病躄以金物火炙尉之水銀得金當出蝕金候金色白者是也如此數度並瘥也昔北齊徐玉以此療人多效解諸藥菜肉中毒以白花藤酒漬服之大豆飲解一切藥毒消腫下熱氣殺烏頭附子毒用大豆一升以水二升煮至一升去豆停冷細細飲之一方用豆飲之治丹毒丹石發熱以牛肝和腹內百葉作生薑醋食之服藥過劑附論夫唯動與過疾所由生故所守不固則邪得以干之以五藥內攻使邪不勝正而已然毒藥攻邪不可過劑過則反傷正氣猶以五味致養稍過亦能為害此理之必至也夫合和湯藥自有限劑至於圭銖分兩不可乖違若增加失宜便生他疾其為疾也令人吐下不已嘔逆悶亂手足逆冷腸痛轉筋若不藥解之亦能致死宜速治之則無害也方花光散治服過劑反傷正氣致八邪干心或三蟲作蠱或成中惡或變為五淋或致為驚癇或筋攣脈結或産婦血暈或胸停客熱並皆治之玳瑁屑二兩半藍實炒一兩半安息香別研琥珀各一兩人黃別研人參麝香別研貫衆各半兩上除別研外搗羅為末拌勻每服一錢用溫酒下早晚服小兒半錢隔日再服充德丸治因寒藥攻病太過腹急痛或胸藏冷氣或為血蠱或為霍亂或心脹短氣或羸瘦或腸澼不解或虛滿遺精或水腫或中惡艾去梗炒二兩雚菌一兩半丁香一兩訶黎勒煨去核一兩麝香研半兩桑白皮根一兩肉豆蔻去殼泡益智子去皮各半兩薰陸香別研半兩上除別研外搗羅為末同拌勻酒煮麵和丸如梧桐子大每服二十丸早晚食前溫酒下藥過劑毒服附子酒多而毒發覺頭重如斗唇裂血流急求黑豆緑豆各數合嚼之及煎濃黑緑豆湯並飲服風藥多悶亂不省醋灌濃煎甘草同生姜自然汁頓飲之又螺頭青細研新汲泉水調下又方出千金方治服藥過劑及中毒煩悶欲死亦解狼毒以搗藍取汁數升無藍浣青絹取汁飲亦佳一方用藥水調服黃連湯出濟生拔粹治因服藥過多小便不利諸藥莫能效者或臍痛悶不可忍黃連炒黃柏炒甘草各等分上㕮咀水煎溫飲之食前如晝不通加知母此藥助陰使氣得化則通矣解石藥過劑方出肘後方黃丹三兩芒硝二兩以水五升煮取三升分三服得下便愈一用地黃五升煮不用水一方並以藥末滲於舌上遂愈治藥中有巴豆下痢不止出聖惠方乾薑炮裂銼黃連去須炒各一兩上為細散每服以水調二錢服如人行五里再服治服藥過劑心中亂悶方及治諸菜毒搗生葛根取汁半盞或一盞飲之或以根一兩細銼水二盞同煎至一盞去滓溫服又方用胡粉水服之用乾薑末水和服之用飴糖服之並瘥又方出千金方搗蘘荷汁飲一二升良冬用根夏用莖葉犀角散治服藥過劑心中悶亂又方出千金方以粳米水研取清汁五升細細服之又方出千金方以雞子三枚取黃吞之又方出千金方以黃連末一錢用溫水調服又方出聖惠方於屋溜下作坑廣二尺深三尺以水七盞灌坑中攪揚之令沫出取沫五盞飲之未解更作又方出肘後方上刮東壁土水一二升調飲之又方出聖惠方用白鴨屎末和水調服之瘥治苦卒服藥吐不止者出聖惠方以新汲水飲一升即止一方噀心候醒即止又方出本草治藥中有巴豆下痢不止用煮熟豆一升服之即瘥凡服藥太過熱物相反麻木嘔吐不可解者用鹽炒令紅冷水調下一二錢即蘇
