去皮尖炒令黃杵如膏蜜一升分為三分納杏仁杵令得所更納一分杵如膏又納一分杵熟止先食含之咽津療上氣咳嗽嘔逆不下食氣上方橘皮紫菀各三兩錢人參茯苓柴胡杏仁去皮尖雙仁者各二兩錢上切以水六升煮取二升分為三服患冷加生薑二兩錢熱加麥門冬三兩去心不能食加白朮二兩錢厚朴二兩一錢炙忌醋物桃李雀肉等物一合湯療咳逆上氣支滿息欲絕氣結於胸中心煩躁不安者芫花三分熬桂心乾薑各五分甘草炙細辛各四分蕘花二分上切以水三升煮取一升先食服一合日三夜一又云合湯亦得分六七服一日盡便愈一方有菖蒲四分無蕘花忌海藻菘菜生蔥生菜等物硝石丸療上氣咳逆口乾手足寒心煩滿積聚不和嘔逆若墜瘀血上氣胸膈脹滿少氣腸鳴飽食傷中裡急婦人乳飲滯下有邪濕陰不足大小便不利肢節皆痛硝石一升乾薑前胡大黃各五錢杏仁三兩去皮尖熬上搗篩蜜和丸如梧桐子大每服三丸飲服日再五日後心腹諸疾隨大小便去月經絕則通下長蟲數十如亦利血及冷熱赤白汁癥瘕毒悉主之藥則以意消息蜀椒散療咳逆上氣腹中有堅痞往來寒熱令人羸瘦不能飲食或時下痢腹中如絞在臍上下關疝氣上陽使然為病有氣逆蜀椒五合去目並閉口者炒出汗桂心甘草炙各二兩通草半夏洗各三兩上為散飲服三分匕日三夜一為常藥不煩毒忌海藻菘菜羊肉餳生蔥紫蘇子粥治上氣咳逆冷氣及腰腳中濕風結氣上將蘇子研汁煮粥良常服令人肥白身香和高良薑橘皮等分蜜和丸空心下十丸下一切宿冷氣及腳濕風皂莢丸治咳逆上氣時時唾濁但坐不得臥上用皂莢八兩為末蜜和丸如梧桐子大以棗膏和湯服三丸日三夜一必效一方以酥炙皂莢治咳逆上氣以當歸飲飲之咳逆短氣附論夫氣之在人得溫則舒遇寒則澀肺主氣者也若為寒邪所傷則澀而不通故氣逆上行發為咳嗽肺乃虛弱呼吸之間不能報息故謂之咳逆短氣方人參丸治年深喘嗽春秋發動痞滿短氣痰涕如膠睡臥不寧人參一兩蛤蚧一對全者淨洗酥炙百部切紫菀去苗土一兩大黃銼炒半兩葶藶隔紙炒一兩款冬花百合貝母去心知母焙白前各半兩半夏湯洗十次焙桑根白皮炙黃銼五味子炒各三兩錢山芋三分上為末煉蜜和丸如梧桐子大每服二十丸糯米飲下橘皮湯亦可阿膠散治肺臟虛胸中短氣咳嗽聲微四肢無力阿膠炒令燥山芋甘草炙銼麥門冬去心焙五味子炒人參各一兩乾薑半兩炮白朮銼杏仁湯浸去皮尖雙仁麩炒桂去粗皮各三兩上為散每服二錢用粥飲調下不拘時服前胡湯治逆氣咳嗽胸中寒熱短氣不足前胡去蘆頭陳橘皮去白炒桂去粗皮甘草炙銼人參紫菀去苗土五味子炒各一兩上為散每服三錢生薑二片大棗一枚水一盞煎至七分去滓溫服日三潤肺湯治咳逆短氣人參生薑切與半夏同炒各一兩甘草三兩炙銼竹葉二兩切陳橘皮去白焙二兩半夏湯浸七次炒切同生姜炒半兩上為散每服三錢水一盞半生薑五片煎至七分去滓溫服日三夜一又方水六升煮取二升分三服亦治霍亂忌羊肉菘菜玉液飲治咳逆短氣喘息氣不相續甘草炙銼杏仁去皮尖雙仁研陳橘皮湯浸去白瓤焙五味子炒人參各一兩上為散每服五錢用水二盞生薑三片大棗一枚同煎至一盞去滓溫服不拘時候羌活煮散止咳逆短氣羌活去蘆頭附子炮裂去皮臍蘹香子微炒各半兩木香乾薑炮各一錢上為散每服二錢水一盞鹽一捻同煎一二十沸乘熱服一服止款肺湯治咳逆短氣人參半夏湯洗七次去滑炒乾各半兩陳橘皮去白焙二兩甘草炙銼一兩上為散每服三錢水一盞生薑三片煎至七分去滓溫服日三紫蘇湯治咳逆短氣紫蘇莖葉銼一兩人參半兩上為散每服三錢水一盞煎至七分去滓溫服日再治大人小兒咳逆短氣胸中吸吸咳出涕唾用淡竹瀝一合日三五服大人一升
