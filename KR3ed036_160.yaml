body:
  text: 卷一百六十咳嗽門呷嗽附論夫氣者肺之所主若肺虛為風冷搏則經絡否澀氣道不利嗽而作聲也此由肺氣不足上焦壅滯痰飲留結在於胸腹不能消散嗽則氣動於痰上搏咽喉之間痰與氣相擊隨嗽動息故呀呷有聲也宜調肺經加消痰破飲之劑方紫菀杏仁煎治肺臟氣積喉中呷嗽不止皆因虛損肺臟致勞氣相侵或胃中冷膈上熱並宜服紫菀一兩半去苗土杏仁半升去皮尖雙仁別細研生薑汁三合酥二兩地黃汁三合蜜一升大棗肉半斤貝母去心三兩白茯苓去黑皮五味子炒人參甘草炙銼桔梗銼炒地骨皮各一兩上搗羅八味為末調和諸自然汁並酥蜜杏仁等同於銀器中以文武火煎頻攪令勻煎百十沸成煎後在於甑上蒸三五遍每服食後服一匙頭便仰臥少時漸漸咽藥夜再服射干丸治久嗽喉中作聲發即偃臥不得射干一兩半夏湯洗十次炒乾一兩一錢乾薑炮裂皂莢去皮子炙款冬花去萼焙乾陳橘皮湯洗去白焙各一兩百部焙乾一兩一錢細辛去苗葉五味子揀淨各用一兩一錢貝母去心炒令微黃白茯苓去黑皮郁李仁湯浸去皮尖雙仁研如脂各一兩上細羅為末與郁李仁同研令勻煉蜜為丸如梧子大空心飲下七丸稍加至十五丸日再服芫根白皮丸治久患呷嗽喉中作聲芫花根白皮銼碎炒乾半夏湯洗五次炒乾射干百部五味子揀淨各一兩一分乾薑炮裂紫菀去苗土款冬花去萼白茯苓去黑皮皂莢酥炙去皮子細辛去苗葉貝母去心微炒各三一兩上為細末煉蜜為丸如梧子大空心粥飲下三丸漸至五丸以知為度如瀉多用防風甘草湯解之前胡散出聖惠方治痰嗽胸中痰滯喉中作呀呷聲前胡六錢去蘆頭木通三錢銼半夏半兩湯浸七次去滑旋覆花半兩紫菀半兩去苗土款冬花半兩枳殼三兩麩炒去瓤杏仁三兩湯浸去皮尖雙仁炒黃甘草半兩炙微赤銼桑白皮半兩銼上為散每服三錢以水一中盞入生薑三片煎至五分去滓不計時候溫服款冬花湯出聖惠方治肺感寒邪咳嗽不已呀呷喘悶痰飲作聲胸膈痞滿不欲飲食方見款冬花散赤茯苓丸治肺氣喉中作呀呷聲痰黏咳嗽胸膈短氣脅肋堅脹赤茯苓三兩旋覆花半兩桔梗三錢去蘆桑白皮一兩銼百合半兩杏仁一兩湯浸去皮尖雙仁麩炒研如膏熟地黃二兩甘草半兩炙微赤銼郁李仁三分湯浸去皮微炒上為細末煉蜜和丸如梧桐子大每服不計時候煎棗湯下二十丸天門冬丸出聖惠方治咳嗽上氣喉中作呀呷聲及大小腸不利宜服天門冬一兩半去心微焙木通一兩銼桑白皮一兩銼川大黃三二兩銼碎微炒大麻仁一兩別研如膏杏仁三兩湯浸去皮尖雙仁炒微黃郁李仁三五分錢湯浸去皮微炒紫菀三分去苗土上為細末煉蜜和搗二三百杵丸如梧桐子大煎桑枝湯下二十丸日三服黃耆丸治呷嗽聲音不出喉中作聲黃耆銼碎栝蔞根銼各一兩一錢甘草炙銼二兩大黃蒸透銼碎炒乾一兩杏仁湯退去皮尖雙仁研如脂二兩馬牙硝熬研細一兩一錢上先搗前四味細羅為末與杏仁馬牙硝通研令勻煉蜜為丸如梧桐子大空心服溫水下十五丸日再香墨丸出聖惠方治呷嗽相引作聲墨燒煙盡甘遂葶藶子炒紫各二兩前胡去蘆頭大黃銼炒各一兩一分巴豆去皮心炒別研如脂半兩上先搗前五味細羅為末與巴豆同研令勻煉蜜和丸如梧桐子大以白粳米飲下空腹服三丸三日以後更一服如吐利不止以冷白飲止之吐利止後宜食白粥白龍丸治大人小兒上喘咳嗽呀呷有聲痰涎痞滿半夏大者十枚湯洗去滑生薑汁製切焙搗末硇砂去砂石一錢研巴豆八粒去皮心膜研不出油以上三味同用棗肉和搜為劑外以生面裹燒面熟為度去面不用膩粉粉霜各一錢龍腦一字以上三味細研上同搗勻丸麻子大每五丸至七丸甘草湯下小兒一二丸白前散出聖惠方治咳嗽坐臥不得喉中作呀呷聲白前一兩紫菀一兩去苗土半夏一兩湯洗七次去滑大戟一分銼碎麻黃一兩去根節甘草半兩炙銼炒微黃上為散每服二錢以水一中盞入生薑半分煎至五分去滓不拘時候溫服杏仁丸治呷嗽喉中作聲杏仁湯退去皮尖雙仁炒乾研如脂一兩馬牙硝熬研細半兩大黃蒸過銼碎炒乾半兩甘草炙銼一兩上先搗甘草大黃為末與杏仁馬牙硝通研令勻煉蜜為丸如梧桐子大每服十五丸空心溫水下日再服墜痰丸治痰嗽止呀呷化風痰利咽膈白礬八兩於瓦器上枯過研細以紙裹埋黃土內一宿取出火毒入後藥槐花三兩炒半夏湯洗七次焙乾杵末以生薑汁和作餅子再焙乾秤二兩甘草一斤慢火炙銼上為末白麵糊為丸如梧桐子大每服十五丸食後生薑湯下雌黃丸治大人小兒呀呷嗽雌黃半兩研丹砂鉛霜膩粉各一兩研上同研細糯米粥和丸綠豆大每服三丸用蛤粉湯下日三服胡黃連湯治呀呷咳嗽胡黃連皂莢去皮塗酥炙令黃白檳榔郁李仁湯浸去皮尖雙仁炒乾研如粉各一兩上粗搗篩每服三錢水一盞煎七分去滓溫服日三不拘時桂心丸出聖惠方治咳嗽喉中呀呷聲宜服桂心一兩不蛀皂莢五梃去黑皮塗酥炙黃焦去子栝蔞一枚全者炙令乾甜葶藶一兩隔紙炒令紫色上為末煉蜜和丸如梧桐子大不計時以粥飲下十五丸治咳嗽喉中作呀呷聲積年不瘥者宜服此方出聖惠方鱟魚殼半兩豬牙皂莢一梃去黑皮塗酥炙焦黃去子貝母一兩煨微黃桔梗一錢去蘆頭上為末煉蜜和丸如小彈子大每含一丸旋咽其汁服三丸即吐出惡涎便瘥訶黎勒丸出聖惠方治咳嗽喉中呷呀作聲無問年月遠近悉治訶黎勒皮一兩黃連一兩去須露蜂房一兩炙微黃上為末煉蜜和丸如梧桐子大每服三丸不計時候以溫漿水下三十丸肥皂莢丸出聖惠方治咳嗽喘急喉中作呀呷聲肥皂莢二梃刮去黑皮好酥一兩上取肥皂莢以慢火上炙以酥細細塗之仍數數翻覆以酥盡為度炙令焦黃搗羅為末煉蜜和丸如梧桐子大每服不計時候以溫粥飲下十丸治咳嗽喉中呀呷作聲積年不瘥者宜服此方出聖惠方上用水牛鼻尖以慢火炙令乾為散每服以清茶調下一錢不過五服愈又一方出聖惠方上用蟬殼七枚研末以粥飲調下一錢一方用井花水調服之治久患呀呷咳嗽喉中作聲不得眠出本草用白前搗為末溫酒調二錢匕服五臟諸嗽附論夫肺咳之狀咳而喘息有音甚則唾血心咳之狀咳而心痛喉中介介心痛如鯁狀甚則咽腫喉痹肝咳之狀咳而兩脅下痛甚則不可以轉轉則兩胠下痞滿脾咳之狀咳而右胠下痛陰引肩背甚則不可以動動則咳急腎咳之狀咳而腰背相引痛甚則咳涎五臟之咳久而不已乃傳六腑六腑之咳內經論之詳矣方紫菀丸治肺咳唾血紫菀去苗土三二兩蛤蚧一枚大者皂莢水浸一宿塗酥炙白茯苓去黑皮防風去叉杏仁去皮尖雙仁蜜浸一宿炒各一二兩款冬花麥門冬去心焙各一兩人參半兩甘草炙銼馬兜鈴炒各一兩黃耆細銼赤芍藥當歸銼焙貝母薑汁浸一宿焙棗四兩蒸熟去黑皮核栝蔞三十枚大者用肉爛研取汁龍腦研半字以上四味並研為膏白藥子半夏生薑汁浸一宿焙乾各半兩以上六味併為細末大麻子半升湯浸研爛去滓取汁上以前藥末入後膏內搗和丸如梧桐子大煎麥門冬熟水下三十丸補肺湯出直指方治肺虛氣乏久嗽阿膠炒真蘇子北梗半夏制甘草炙各半兩款冬花紫菀細辛杏仁去皮尖炒陳皮桑白皮炒青皮去瓤縮砂仁五味子石菖蒲草果各一分上為散每服三錢姜四片紫蘇三葉煎服玉液散一名千緡湯出保命集方治肺嗽痰唾半夏三兩大者洗淨去臍皂莢二十梃去皮子銼水一斗同半夏煮至五升取出半夏薄切焙乾上只取半夏搗為散每服半錢水一盞姜一片煎四分食後溫服一方二味於絹袋中盛水三升生薑三片同煎至一半揉取清汁食後分作三服效百部丸出指南方治肺嗽惡熱百部八兩焙為末生地黃一斤取汁熬成膏上將地黃膏為丸如梧桐子大每服三十丸米飲下溫酒亦可前胡湯治五臟諸咳嗽前胡去蘆頭五味子生熟地黃焙半夏湯浸七次焙澤瀉各一兩貝母去心焙人參山芋白茯苓去黑皮白朮杏仁湯浸去皮尖雙仁麩炒麻黃不去節甘草炙銼葛根烏梅取肉各一兩上銼如麻豆每服三錢水二盞入生薑五片同煎至七分去滓食後臨臥溫服去枕仰睡大阿膠丸出直指方治肺虛客熱咳嗽氣急胸中煩悸肢體倦疼咽乾口燥渴欲飲冷多唾涎沫或有鮮血肌瘦發熱減食嗜臥又或因叫怒或因房勞肺胃受傷吐血嘔血並宜服之麥門冬去心丹參貝母炒防風去蘆叉頭柏子仁茯神去木杜仲去粗皮炒百部根各半兩乾山藥阿膠炒熟乾地黃茯苓去皮五味子各一兩遠志去心人參各一兩上為細末煉蜜和丸每兩作二十四丸每服一丸水一中盞煎至六分和滓溫服稍稍頻呷不拘時或金沸草湯加杜仲煎湯嚼下凡嗽藥不效覺胸膈悶乃宿血乘肺黑豆入紫蘇生薑煎汁與之桑皮散出直指方治上焦有熱壅血腥悶嗽聲連並氣不得透腦荷北梗川芎防風桑白皮炒黃芩北前胡柴胡去蘆紫蘇赤茯苓去皮枳殼制各一分甘草炙各分半上銼細每服三錢薑棗煎服或吃梨亦可一方無茯苓人參款花膏出濟生拔粹方治肺胃虛寒久嗽不已咽膈滿悶咳嗽痰涎嘔迸噁心腹肋脹滿腰背倦痛或虛勞冷嗽及遠年日近一切嗽病諸藥不效者並皆治之款冬花人參五味子各八錢紫菀桑白皮各一兩加杏仁八二錢兩木香檳榔紫蘇子半夏湯洗各五錢上為細末煉蜜和丸如雞頭仁大每服一丸食後細嚼淡薑湯送下含化亦得鍾乳補肺湯出醫方大成治肺氣不足年久咳嗽上氣胸滿上迫咽喉閉塞短氣喘乏連唾不已寒從背起口中如含霜雪語不出聲甚則唾血腥臭乾嘔心煩耳聞風雨聲皮毛瘁面色白漸成肺痿鍾乳碎如米粒桑白皮麥門冬去心各三兩白石英碎如米粒人參去蘆五味子揀款冬花去梗肉桂去粗皮紫菀洗去土各一二兩上除白石英鐘乳粉外同為粗末與白石英鐘乳等同拌等分令勻每服四錢水二盞入生薑五片大棗一枚擘碎粳米三十餘粒同煎至一盞用綿濾去滓溫服食後溫肺湯出醫方大成治肺虛感冷咳嗽吐痰沫半夏陳皮北五味子乾薑辣桂杏仁去皮尖各一兩細辛阿膠炒各半兩甘草炙二錢半上㕮咀每服三錢薑棗煎服人參潤肺丸出醫方大成治肺氣不足咳嗽喘急痰涎不利胸膈煩悶涕唾稠黏唇乾口燥及療風壅痰實頭目昏眩精神不爽或肺胃俱虛久嗽不已漸成虛勞肢體羸瘦胸滿悶短氣行動喘乏飲食減少或遠年近日諸般咳嗽並宜治之人參款冬花去梗細辛去葉洗杏仁去皮尖麩炒甘草爁各四兩知母六兩肉桂去粗皮桔梗各五三兩上為細末煉蜜丸如雞頭實大每服一丸食後細嚼淡薑湯送下含化亦得半夏橘皮湯治肺咳半夏湯洗十次焙乾陳橘皮湯浸去白焙杏仁去皮尖雙仁麩炒別研各一兩麻黃去根節赤茯苓去黑皮柴胡去苗各一兩一分生薑切焙甘草炙銼各半兩上為散每服三錢水一盞煎至六分去滓不拘時候溫服五靈脂湯治肺咳五靈脂一兩陳橘皮湯浸去白焙一兩甘草炙銼桑根白皮銼炒五味子杏仁湯浸去皮尖雙仁炒令黃人參各半兩馬兜鈴一兩上為散每服一錢水一盞入生薑五片同煎至六分去滓食後溫服補肺湯出仁存方治肺氣不足逆滿上氣咽中悶塞短氣寒從背起口中如含霜雪言語失音甚則吐血五味子一兩乾薑桂心款冬花各半兩麥門冬二兩粳米二合桑白皮四錢上㕮咀每服三大錢水一盞半棗子二個粳米半撮煎至七分去滓服人參丸出濟生拔粹方治肺氣虛咳嗽喘急胸膈痞痛腳膝微腫人參五錢半蛤蚧一對酥