今乃能周身上下者以其邪中於血脈之間與脈流通隨氣上下升降無礙也故痛從上下者先刺其下以遏之後刺其上以脫之痛從下上者先刺其上以遏之後刺其下以脫之除刺法附於針灸書外宜徐以藥治之方巴戟天散一名八氣散出聖濟總録治周痹肢體痿弱不能步履及諸緩風濕痹巴戟天去心半兩芎藭一分附子去皮臍白蘞一分黃耆炙桂去粗皮各半兩桔梗炒一兩細辛去苗葉炒半兩人參半兩芍藥一兩牡荊實天雄炮去皮臍各半兩萆薢炒半兩菊花未開者炒秦艽去土各半兩赤茯苓去皮牛膝去苗酒浸切焙各二兩山芋半兩蓯蓉酒浸焙一分烏喙炮去皮臍遠志去心各一兩山茱萸黃芩去黑心白朮炒石斛去根各半兩銼白礬研各半兩五味子三分龍膽去土苗蜀椒去目合口者炒出汗各一錢厚朴去皮生薑汁半兩菖蒲九節者去須米泔浸切焙一兩上為末次入白礬拌勻重羅每服半錢漸至一錢溫酒調下日二夜一未覺身唇口痹熱即漸加至一錢如覺太熱心煩以少許豉湯解之一方加葳蕤胡洽無桔梗遠志散出聖濟總録治周痹不仁遠志去心黃耆炙各半兩五味子一分防風去叉三分芍藥一兩赤茯苓去黑皮牡荊實輕炒各三分秦艽去苗土一兩黃芩去黑心一分山茱萸天雄炮去皮臍細辛去苗葉微炒芎藭菊花未開者炒各半兩狗脊去毛烏頭炮裂去皮臍桂去粗皮蕪荑微炒各半兩菖蒲米泔浸去節皮焙葳蕤去皮須焙各三分白蘞生用附子炮去皮臍龍膽去苗土厚朴去粗皮生薑汁各半兩蜀椒去目閉口者炒出汗巴戟天去心各一分上為散每服一錢空心溫酒下漸加二錢日二夜一金牙散出聖濟方治周痹腳脛細瘦痿弱不能行立金牙別研細一兩防風去叉側子炮裂去皮臍當歸切焙石膏別研細桂去粗皮各一兩芎藭一兩半白朮微炒三兩細辛去苗葉微炒澤瀉黃芩去黑心赤茯苓去黑皮各一兩半石南葉灑酒炒人參各二兩上為散入金牙石膏末拌勻重羅每服一錢半漸加至二錢空心溫酒下日二夜一未覺更增藥至二錢半附子散出聖濟總録治周痹肢體腰膝無力附子炮去皮臍狗脊去毛各一分山芋熟乾地黃焙王孫去土生用桂去粗皮天雄炮去皮臍山茱萸乾漆酒炒令煙出秦艽去苗土防風去叉甘草炙各半兩白蘞一兩上為散每服一錢空心溫酒調下日二夜一漸加至一錢半服之一月愈白朮散出聖濟録治積年周痹頭禿髮落癮疹瘡氣脈不通搔之不覺疼癢白朮微炒三兩附子炮去皮臍二兩石斛去根半兩乾薑炮細辛輕炒去苗葉各三兩羊躑躅微炒半兩烏頭炮去皮臍一兩天雄炮去皮臍蜀椒去目合口炒出汗石南葉微炒三分防風去皮二兩半桂去粗皮一兩上為散每服半錢至一錢漸加錢半溫豆淋酒三合調下空心臨臥各一服每服藥後宜以少白羊脯嚼汁下藥續更用三合溫豆淋酒飲之令接藥力常令有酒氣其藥常以皮袋貯勿泄其氣初服身與脛膝有汗宜避外風黃芩湯出聖濟總録治周痹身體不仁黃芩去黑心甘草炙銼防風去叉各半兩秦艽去苗土菖蒲根銼杏仁去皮尖雙仁麩炒各一分桂去粗皮赤茯苓去黑皮各半兩當歸切焙半兩上粗篩每服六錢以水酒各一盞棗二枚劈開姜一片同煎至一盞去滓溫服日二夜一一方無生薑六生散出聖濟總録治周痹身體俱痛腳腰痛𤸷生菖蒲九節者去毛節切焙生乾地黃焙生商陸根洗切焙生枸杞根各一斤生烏豆去皮臍四兩生薑去皮切焙二斤上洗焙各稱分兩復以醇酒一斗五升淹浸一宿漉出曝乾復內酒中令酒盡再曝乾搗羅為散每服半錢以清酒一盞調下漸加至一錢空心下白石英浸酒方出聖濟總録治風濕周痹肢節疼痛不可持物行動無力耳聾及腎臟虛損益精髓保神守中白石英碎如大麻粒磁石火煅令赤醋淬如此五次搗各五兩上搗篩生絹囊貯以酒一升浸經五六日每服不計時隨性溫用將盡復添之醍醐方治寒濕周痹大豆藥方出宣明論治周痹除五臟留滯胃中結聚益氣去毒潤皮毛補腎臟上以大豆糵一升炒令香熟搗為末每空腹溫酒下半匙漸加至一匙一日三服野駝脂方出聖濟總録治周痹上以野駝脂煉了濾過一斤別入好酥四兩同煉勻每服半匙以熱酒半盞和化服之漸加一匙空心食前各一痛痹附論夫寒氣勝者為痛痹夫宜通而塞則為痛痹之有痛以寒氣入經絡而稽遲泣而不行也痛本於寒氣偏勝寒氣偏勝則陽氣少陰氣多與痛相益治宜通引營衛溫潤經絡血氣得溫則宣流自無雍閼矣方當歸摩膏出聖濟總録治諸風寒濕骨肉痹痛當歸切焙細辛去苗葉各一兩半桂去粗皮一兩生地黃一斤切研絞取汁天雄十枚去皮臍生用白芷三分留一塊不銼全用芎藭半兩丹砂研一兩乾薑炮三分烏頭去皮臍生用一兩三分松脂四兩豬脂五斤別煉去滓上先將八味銼如大豆粒以地黃汁浸一宿與豬松脂同慢火煎候白芷黃色以厚綿濾去滓用瓷合盛入丹砂末不住攪至凝即止每用藥用火炙手摩病千遍茵芋浸酒一名茵芋散治風寒濕痹皮肉不仁骨髓疼痛不可忍宜服茯苓湯出醫方大成治風濕痹四肢疼痛拘攣浮腫赤茯苓去黑皮桑根白皮各二兩防己一方用防風桂去粗皮芎藭芍藥麻黃去根節各一兩半上搗篩每服五錢水一盞半棗一枚煎至一盞去滓溫服連三服後以熱薑湯投之汗出為度天雄丸出聖濟總録治風濕痹皮肉不仁骨髓疼痛不可忍者天雄炮去皮臍附子去皮臍炮各一兩桂去粗皮一兩半乾薑炮製二兩防風去叉三兩上研細末為丸如梧桐子大每服二十丸溫酒下日三夜一去毒丸出聖濟總録治風濕痹腰腳疼痛不可忍久不瘥者天雄去皮臍附子炮裂去皮臍桂枝去粗皮一兩白殭蠶直者炒三兩防風去叉三分上為細末煉蜜丸如梧桐子大每服二十丸溫酒下日三夜一治諸處皮裡面痛上用何首烏末薑汁調成膏痛處以綿子裹之用火炙鞋底尉之妙著痹附論內經謂濕氣勝者為著痹地之濕氣感則害人皮肉筋脈蓋濕土也土性重緩營衛之氣與濕俱流所以濕勝則著而不移也其證多汗而濡者以陰氣勝也治宜除寒濕通行經絡則瘥方摩風膏出聖濟總録治風濕著痹服藥雖多肌肉猶𤸷痹防風去皮羌活去蘆芎藭細辛去苗葉當歸蜀椒去目合口者出汗躑躅花各半兩白蘞白芨丹參苦參黑參桂去粗皮附子去皮臍烏頭去皮臍皂莢去皮莽草各一分杏仁去皮尖並雙仁半兩上細銼如麻豆以米醋二升拌勻浸三宿熬干同臘月豬脂二斤以文武火煎一日綿濾去滓瓷瓶貯每用一點敷𤸷痹處兼治一切風毒其膏年歲深久者尤佳石斛湯一名石斛秦艽散治寒濕痹著而不散四肢不仁腳弱拘攣或疼痛不能行趺腫上膝少腹堅不欲食方見腳氣門腳氣痹攣類側子浸酒方治寒濕著痹四肢皮膚不仁以致弱不能行側子湯出聖濟總録治寒濕痹留著不去皮膚不仁手足無力側子炮裂去皮臍五加皮各一兩羚羊角鎊防風去皮薏苡仁麻黃去根節杏仁湯浸去皮尖雙仁麩炒各一兩甘菊花葛根赤芍藥芎藭秦艽去苗土甘草炙各半兩上銼如麻豆每服三錢水一盞煎至七分去滓溫服無時附子丸一名白花蛇丸治寒濕痹留著不去四肢緩弱皮膚不仁精神昏懵白花蛇丸出聖濟總録治寒濕著痹皮膚不仁或肢節疼痛白花蛇酒浸去皮骨炙仙靈脾乾蠍炒各一兩茵芋烏頭炮裂去皮臍天南星炮各一兩天雄炮裂去皮臍天麻桂去粗皮麻黃去根節鹿角鎊萆薢各一兩桑螵蛸炒半兩雄黃研麝香各一分上為末拌和令勻別用天麻三兩以無灰酒一大碗慢火熬成膏和前藥末更搗五七百杵丸如梧桐子大每服薄荷酒下二十丸不拘時天雄浸酒方出聖濟總録治寒濕著痹皮肉不仁及骨髓疼痛者天雄炮裂去皮臍附子炮裂去皮臍各一兩防風去皮獨活去蘆當歸切焙白朮各二兩五加皮芎藭桂去粗皮乾薑炮各二兩上銼如麻豆以夾絹袋盛用無灰清酒一斗浸春夏五日秋冬七日每服溫飲一盞任性加減以知為度茯苓湯一名茯苓川芎湯出醫方大成治風濕痹留住四肢𤸷麻拘攣不仁浮腫赤茯苓去黑皮桑根白皮各二兩防己一方用防風桂去粗皮芎藭各一兩半甘草炙三兩芍藥當歸切焙麻黃去根節先煮去末幹一兩半上粗搗篩每服六錢水二盞棗三枚劈開同煎去滓取一盞溫服空心臨臥時如欲出汗服藥了以生薑熱粥投之汗出慎外風乾蠍散一名蛜𧌴散出聖惠方治寒濕著痹留住不去身體四肢不仁乾蠍炒螵蛸炒獨活去蘆各一兩躑躅醋拌炒天南星炮各半兩萆薢天麻桂去粗皮各一兩上為散每服一錢溫酒調下不拘時候龍虎膏出聖濟總録治風濕著痹肌肉𤸷厚不知痛癢龍骨三兩虎骨三兩塗酥炙當歸切焙桂去粗皮各一兩皂莢半兩上為末別用好肥皂莢十梃以苦酒三升入煎減半取汁去滓即入前藥同煎如稀餳入瓷合每用少許漬摩𤸷痹處行痹附論內經謂風寒濕三氣雜至合而成痹其風氣勝者為行痹夫氣之在人本自流通所以痹者風寒濕三氣合而為病也然三氣之中各有陰陽風為陽氣善行數變故風氣勝則為行痹其證上下左右無所留止隨其所至氣血不通是也治法雖通血氣宜多用治風之劑方羚羊角丸出聖濟總録治行痹頭面四肢沉重筋脈攣急手足不遂痰涎膠黏語澀神昏口眼偏喎羚羊角鎊一兩青橘皮湯浸去白焙木香半夏湯洗同生姜搗面焙乾羌活去蘆獨活去蘆白附子炮天麻酒浸切焙各半兩檳榔銼芎藭藿香葉乾蠍去土炒白花蛇酒炙去皮骨丹參研麝香研牛黃研龍腦研各一分上為細末再和勻用皂莢薄荷鵝梨汁各一碗同煎成膏和丸如緑豆大每服七丸溫酒或薄荷湯下不計時候山茱萸丸治風痹遊走無常處亦治血痹乾地黃丸出聖惠方治諸風痹走移無定生乾地黃焙澤瀉山茱萸炒各一兩山芋牛膝去苗葉酒浸焙白朮各半兩天雄炮去皮臍一分蠐螬微炒乾漆炒煙出狗脊去毛車前子茵芋各三錢萆薢炒半兩上為細末煉蜜為丸如桐子大空心二十丸溫酒下日三夜一萆薢丸出聖濟總録治風痹行走無定處亦治血痹萆薢山芋澤瀉各一兩生地黃焙二兩半白朮茵芋牛膝去苗酒浸焙乾乾漆炒出煙狗脊去毛車前子天雄炮去皮臍一分蠐螬微炒上為細末煉蜜和丸如梧桐子大每服溫酒下二十丸加至三十丸日三防風湯出醫方大成治行痹行走無定防風去皮甘草炙當歸切焙赤茯苓去黑皮各一兩秦艽去苗土葛根各三分桂去粗皮杏仁酒浸去皮尖雙仁炒各一兩麻黃去根節焙半兩上㕮咀每服五錢酒一盞水一盞棗三枚擘開生薑五片同煎至一盞去滓溫服日二夜一服一方無麻黃治走注風毒疼痛上用小芥末和雞子白調敷痹氣附論內經謂人身非衣寒也中非有寒氣也寒從中生者何是人多痹氣也陽氣少陰氣多故身寒如從水中出夫陽虛生外寒陰勝生內寒人身陰陽偏勝則自生寒熱不必外傷於邪氣也痹氣內寒者以氣痹而血不能運陽虛而陰自勝也血凝滯而氣不通故其證身寒如水中出也方溫補鹿茸丸出聖濟總録治陽氣虛陰氣勝痹氣內寒如從水中出鹿茸去毛酥炙四兩五加皮五味子牛膝酒浸切焙防風去皮遠志去心石斛去根山芋狗脊去毛各二兩肉蓯蓉去皮酒浸切焙熟乾地黃切焙各三兩人參一兩白茯苓去黑皮菟絲子酒浸別搗各一兩一分覆盆子石龍芮各二兩萆薢蛇床子炒去皮白朮各三分巴戟天去心酒浸焙天門冬去心焙杜仲炒各一兩半乾薑炮桂去粗皮吳茱萸炒附子炮去皮臍細辛去苗葉蜀椒去目併合口炒出汗各三分天雄炮去皮臍一兩石南三分上除菟絲子別搗外篩羅為末再拌勻煉蜜和丸如梧桐子大每服溫酒下二十丸稍加至三十丸空心食前日三巴戟天丸出聖濟總録治陽衰陰勝痹氣身寒補益巴戟天去心酒浸焙肉蓯蓉去皮酒浸切焙白龍骨五味子鹿茸去毛酥炙白茯苓去黑心天雄炮裂續斷山芋白石英各二兩半覆盆子菟絲子酒浸另搗各三兩熟乾地黃焙三兩蛇床子炒去皮一兩遠志去心乾薑炮製各一兩半上為細末入菟絲子拌勻再羅煉蜜和丸如梧桐子大每服空心溫酒下二十丸加至三十丸日再補益黃耆丸出聖濟總録治陰盛陽虛痹氣身寒如從水中出黃耆鹿茸去毛酥炙白茯苓去黑皮烏頭炮去皮臍乾薑炮各三分桂去粗皮當歸切焙熟乾地黃焙芎藭各一兩菟絲子酒浸一宿別搗五味子柏子仁枸杞根皮銼各一兩半大棗去核二十枚焙上為細末入菟絲子再拌勻煉蜜和丸如梧桐子大每服空心溫酒下十五丸日進三服天雄丸出聖濟總録治陽虛陰勝痹氣身寒如從水中出天雄炮裂去皮臍烏頭炮裂去皮臍石龍芮王孫王不留行蜀椒去目合口炒出汗各一兩當歸切焙肉蓯蓉去粗皮酒浸切焙天麻銼各二兩蛇床子炒半兩上為細末煉蜜和丸如梧桐子大每服三十丸空心服食前溫酒下日三附子丸出宣明論治痹氣中寒陽虛陰勝身寒如水中出附子炮裂去皮烏頭炮去皮臍桂去粗皮菖蒲去須銼蜀椒去目閉口者炒出汗上為細末煉蜜和丸如梧桐子大每服空心溫酒下三十丸治痹痛大烏頭半兩天仙子三錢炒五靈脂一兩甘草半兩上為細末麵糊為丸用羅青為衣如梧桐子大每服三十丸男子石菖蒲湯下婦人芫花湯下
