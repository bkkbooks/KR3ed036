body:
  text: 卷一百八十七諸痹門胸痹附論夫胸痹之病令人心中堅滿痞急痛肌中苦痹絞急如刺不得俯仰其胸前皮皆痛手不得犯胸中愊愊而滿短氣咳唾引痛或胸或背皆痛或心痛徹背或肌痹皮膚痛咽塞不利習習如癢喉中乾燥時欲嘔吐煩悶自汗出或徹引背痛不治之數日殺人夫脈當視太過與不及陽微陰弦即胸痹而痛所以然者以其人極虛故也今陽虛知在上焦所以胸痹心痛者以其人脈陰弦故也平人無寒熱短氣不足以息者實也又曰寸口沉而遲關上小緊數是也夫胸痹之病其脈陽微而陰弦者陽虛則知在上焦陰弦故令胸痹心痛古方用理中湯取緩其中氣則可也然背者胸之府或築或悸或渴或腹痛或寒或腸滿其候不一治當審宜加損也方利隔甘草湯治胸痹喘息不通人參去蘆赤茯苓前胡各一兩去蘆甘草炒微赤桂心乾薑各半兩訶黎勒皮陳橘皮湯去白焙白朮各三分上為散每服五錢水一大盞生薑半分煎至五分去滓溫服頻服之蜀椒散出千金方治胸痹達背蜀椒吳茱萸各一兩桂心桔梗各三兩烏頭半兩豉六銖上治下篩食後酒服方寸匕日三一方每服三錢食前煎服小草丸出聖惠方療胸痹心痛逆氣膈中飲不下小草桂心蜀椒炒出汗乾薑細辛各三分附子二分炮上搗篩和以蜜丸梧桐子大先食米汁下三十丸日三不知稍增以知為度忌豬肉冷水生蔥生菜理中湯一名人參湯出千金方治胸痹人參甘草炙白朮乾薑炮各一兩半上搗篩每服五錢水二盞煎至一盞去滓溫服空心午臨臥各一若築者此為腎氣動也去朮加桂二兩臍上築吐多者去朮加生薑一兩半下多者復用術悸者加茯苓一兩渴者加朮二兩一分腹中痛者加人參一分寒者加乾薑二兩一分腹滿者去朮加附子一枚服湯後食久以稀粥投之衣覆取微汗一方加天麻枳實湯治胸痹枳實去瓤麵炒半兩栝蔞實一枚並瓤用厚朴去皮薑汁炙三兩上銼如麻豆每服五錢水二盞煎至一盞去滓溫服空心日晚各一麝香散治胸痹壅悶麝香研牛黃研半兩犀角一分上為散每服二錢溫酒調下空心日午臨臥各一服半夏湯治胸痹心下堅痞急痛徹背短氣煩悶自汗出半夏湯洗七次切焙二兩半栝蔞實一枚上銼如麻豆每服五錢水二盞入生薑一分切碎煎至一盞去滓溫服日三服枳殼湯治胸痹脅下祕結方枳殼滑石各二兩甘草一兩上㕮咀每服三錢用冷臭橘葉七片同煎溫服連進三服即解薏苡仁散出聖惠方療胸痹遍緩急及心下堅痞薏苡仁五百枚附子十枚大者炮甘草三兩炙上篩每服方寸匕日三忌海藻菘菜豬肉冷水一方入生薑半分煎服金匱方無甘草麝香丸出聖惠方治胸痹壅悶麝香一分研牛膝一兩去苗犀角屑半兩上為細末煉蜜為丸如梧桐子大每服以橘皮湯下二十丸日三四服下氣湯出千金方治胸腹皆閉滿上氣喘息大腹檳榔二十七枚杏仁四七枚上㕮咀以童子小便三升煎取一升半分再服如患氣發輒合服之妙枳實湯治胸痹枳實去瓤麵炒四枚厚朴去粗皮生薑汁炙三兩上篩每服五錢水二盞入薤白一握切煎至一盞去滓溫服空心日晚各一梔子湯治胸痹切痛此方與倉卒散煮制不同故別出梔子仁二兩附子炮去皮臍一兩上㕮咀每服三錢水一盞薤白三寸同煎至五分去滓溫服陳橘皮散一名橘皮生薑湯出聖惠方治胸痹胸中愊愊如滿噎塞如癢咽喉中澀唾沫陳橘皮二兩湯去白瓤焙枳殼二兩麩炒黃去瓤上為散每服三錢水一中盞入生薑半分同煎至六分去滓溫服栝蔞丸治胸痹胸中痛徹背氣塞喘急咳嗽心腹痞悶栝蔞去瓤取子炒香熟留皮與瓤別用枳殼麩炒去瓤各等分上為細末取栝蔞皮瓤研末水熬成膏和二味為丸如梧桐子大熟水下二十丸日二食後服檳榔湯出千金方主破胸背惡氣音聲塞閉上用極大者四枚小者八枚㕮咀以小兒尿二升半煮減一升去滓分三服頻與五劑永定枳殼散治胸痹心下結痞急痛徹背短氣煩悶自汗出上用枳殼去瓤麩炒微黃三十枚搗散食米飲調下方寸匕日三夜一又方加桂等分枳實散肘後方治胸痹氣壅滿心膈不利上用枳實二兩麩炒微黃為丸以清飲調下二錢薤汁散出聖惠方治胸痹骨痹不可觸者已瘥更發上取薤根五片淨洗去土搗絞取汁溫服一小盞立愈多服之良雄黃丸治胸痹強急疼痛栝蔞湯出聖惠方治胸痹疼痛痰逆心膈不利枳殼四個一用枳實厚朴薤白各一兩栝蔞一兩生薑半兩桂枝一兩有熱除此一味上㕮咀以水七升煎取四升去滓溫服一方無生薑治胸痹心中急痛如錐刺不得俯仰自汗出或痛徹背上不治或至死可取生韭或根五片洗搗汁灌少許即吐胸中惡血治胸痹心中痛痹堅留氣結胸胸滿脅下逆搶心人參白朮乾薑甘草各二兩上四味以水八升煮取三升每服一升日三如臍上築者為腎氣動去朮加桂四兩吐多者去朮加生薑三兩下多者復用術悸者加茯苓二兩渴者加朮至四兩半腹痛者加人參至四兩半寒者加乾薑至四兩半滿者去朮加附子一枚服藥後如食飲熱粥一升許微有汗勿揭發衣被此方晉宋以後至唐名醫治心腹病者無不用之或作湯或作蜜丸或加減皆奇效胡洽治霍亂謂之溫中湯導引法養生方云以右足踐地左足上蹺除胸痹食熱嘔胸痹噎塞附論夫臟腑不和血氣弱風冷之氣伏留在內因虛上攻胸膈則人胸中愊愊滿塞習習如癢氣道壅澀咽喉不利心中痞急咳唾引痛氣不宣通故令胸中痹悶而噎塞也吳茱萸散出聖惠方治胸痹噎塞不能下食吳茱萸湯七次焙炒半夏湯洗七次去滑白朮赤茯苓上為細末用酒麵糊為丸如梧桐子大每服三十丸薑湯送下半夏散治胸痹噎塞心下煩滿半夏湯七次前胡去苗射干白朮桂心人參去蘆枳實各一兩麩炒黃去瓤上為散每服五錢水一大盞入生薑半分棗三枚煎至五分去滓不計時溫服赤茯苓湯治胸痹連心氣悶喉中塞滿唾沫赤茯苓去黑皮細辛去苗葉枳殼去瓤炒各一兩橘皮湯去白焙桂去皮各三分栝蔞實一枚去皮上篩每服三錢水一盞半生薑一分同煎至七分去滓空心服如行五六里再服陳橘皮湯治胸痹連心喉中塞不通陳橘皮湯去白焙桂心去粗皮甘草炙各一分赤茯苓去黑皮枳殼去瓤炒各半兩栝蔞實一枚去皮瓤用子上篩每服五錢水二盞煎至一盞去滓空心溫服日午臨臥各一服半夏湯散治胸痹氣噎塞痛悶半夏湯浸七次去滑青橘皮湯浸去白瓤木通桂心各一兩吳茱萸一分湯浸七次焙炒上為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候稍熱服半夏丸治心胸塞壅悶食不下半夏湯洗七次去滑桔梗各二兩桂去粗皮一兩半木香枳殼去瓤麩炒各一兩上為細末生薑汁煮糊為丸如梧桐子大每服二十丸木瓜湯送下通氣湯治胸滿氣噎半夏八兩生薑六兩桂心三兩大棗三十枚上㕮咀以水八升煮取三升分五服日三夜二通氣湯治胸痹滿悶短氣噎塞半夏八兩生薑六兩橘皮三兩吳茱萸四十枚上㕮咀以水八升煮取三升分三服一方用桂二兩無橘皮茯苓湯治胸中氣塞赤茯苓去皮三兩杏仁五十枚湯去皮尖雙仁炒甘草炙一兩上搗篩每服三錢水二盞煎至六分去滓溫服空心日午臨臥各一服香附子丸治胸膈不利但是膈間之證並宜服之香附子一斤半巴豆七十或一百枚枳殼一斤半上將藥末醋三四碗煎至醋盡曬乾為末醋糊為丸如梧桐子大每服三四十丸用生薑湯送下橘皮枳實湯一名橘皮生薑湯治胸中愊愊如滿噎塞習習如癢喉中燥澀陳橘皮湯去白焙半兩枳殼麩炒一兩半上篩每服五錢水二盞入生薑一分同煎至一盞去滓溫服日三空心日午臨臥各一胸痹心下堅痹痞急附論夫體虛之人寒氣客之結在胸鬱而不散故為胸痹其證心下堅滿痞急甚者疼痛搶心如刺手不得犯治之稍緩便致危殆不可忽也儒門事親書云有人患心胸痞悶不欲飲食身體壯熱口燥舌乾大小便不利有一工治之說下元虛冷便投暖藥數十服其病不愈又一醫治與前同又投藥五七日其證轉加困弱請余治之診脈而問曰飲食若何大小便若何答云小便赤色大便黑色便言是傷寒瘀血之證初用大黃芍藥湯二劑次服犀角地黃湯二服後用通氣湯一服大小便轉過黃色為言此藥服十餘服方可病瘥矣木香丸治寒風結為胸痹心下堅痞木香青橘皮湯去白焙陳橘皮湯去白焙羌活去蘆檳榔半夏湯洗七次桔梗去蘆枳實麩炒黃色白朮厚朴去粗皮薑汁製甘草各半兩炙黃上為細末煉蜜為丸如梧桐子大每服三十丸日三生薑湯送下豆蔻湯治胸痹心下堅痞白豆蔻去皮桂去粗皮木香人參各半兩陳橘京三稜陳橘皮湯去瓤焙大麥糵炒各三兩乾薑炮甘草炙各一分上㕮咀每服三錢水二盞姜三片鹽少許煎至七分去滓食前溫服半夏散出聖惠方治胸痹心下堅痞胸背緩急疼痛不能下食半夏湯浸七次去滑桂心各一兩赤茯苓白朮枳實麩炒黃木香陳橘皮各三分甘草一分炙微赤上為散每服二錢水一盞入生薑半分去滓溫服之桂姜丸出肘後方治胸中隱然而痛亦治胸中痹心膈痞滿肩背緩急痛桂去粗皮乾薑炮烏頭炮去皮臍各一分人參三兩上為細末煉蜜和丸如小豆大每服二十丸溫酒下稍加之粥飲亦得陳橘皮湯治心胸氣急刺痛不可俯仰氣促咳唾不下食陳橘皮湯去白焙當歸切焙各半兩桔梗炒三兩木香一分芍藥半兩上搗篩每服五錢水一鍾半生薑五片煎至八分去滓溫服五味丸治胸痹心下堅痞桂去粗皮訶黎勒皮檳榔各一兩附子炮去皮臍乾薑炮各三分上為細末煉蜜為丸如梧桐子大每服二十丸溫酒或生薑湯下枳實薤白桂枝湯出金匱方治胸痹心中痞氣結在胸胸滿脅下逆搶心枳實四枚薤白一片桂枝一兩一方用心厚朴三兩栝蔞實一枚上㕮咀以水七升煮取二升分再服一方厚朴用四兩薤白半斤水五升煮二升一方有生薑半分煎服枳實散出聖惠方治胸痹心胸背緩急心腹不利宜服枳實麩炒微黃前胡去蘆陳橘皮湯去白焙赤茯苓各一兩木香半兩上為散每服五錢水一大盞入生薑半分去滓溫服之枳實散治胸痹心下堅痞緩急氣結不通枳實麩炒微黃去瓤厚朴各三兩去皮炙香薑汁製桂心半夏各一兩湯洗七次去滑前胡去蘆上為散每服三錢水一中盞入生薑半分煎至六分去滓稍熱服之枳實桔梗湯治胸痹心下氣堅痛刺不可俯仰氣促咳唾引痛不下食枳實麩炒七枚陳橘皮湯去白焙桔梗炒各半兩甘草炙各一分上搗篩每服五錢水一盞半生薑一棗大拍破薤白五寸切煎至八分去滓溫服四溫湯治寒氣客在胸中鬱結不散堅滿痞急病名胸痹附子炮去皮臍蓬朮煨各一兩胡椒枳實麩炒各半兩上為散每服三錢熱酒調下薏苡仁散出金匱方治胸痹痞急薏苡仁七百五十粒附子大者五片炮去皮臍上為散每服半錢溫酒調下空心日午臨臥各一服未瘥稍增之雄黃丸出肘後方治胸痹病令人心中堅痞急痛肌中苦痹緩急捫其胸前及背皆痛手不得犯胸滿短氣咳唾引痛煩悶自汗出或徹引背膂不即療數日殺人療卒患胸痹方雄黃巴豆去皮心熬等分上搗雄黃篩內巴豆務熟搗之和丸小豆大服一丸不覺稍益忌野豬肉蘆筍一方用生薑橘皮煎湯下五丸治心下痞堅不能食胸中嘔噦方出肘後方上以生薑八兩細切以水三升煮取一升半夏五合洗去滑以水五升煮取一升二味合煮一升半稍稍服之薤汁飲出肘後方治胸痹已瘥復更發者方見薤汁散胸痹短氣附論夫胸痹短氣者由臟腑虛弱陰陽不和風冷邪氣攻注胸中其脈陽微陰弦即胸痹而痛所以然者極虛故