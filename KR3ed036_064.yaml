佳治諸魚骨鯁在喉中方出肘後方用蜜不拘多少煎化乘熱用綿一兩蘸尉鯁處又以瓠炙熱尉綿上未出再作仍取皂角末少許吹鼻中即出一方用蜜匙抄稍稍服之笱須散出十便良方治諸魚骨鯁在喉中用笱須已捕魚者燒灰研細每服一錢匕粥飲調下獺骨方出聖惠方治諸魚骨鯁在喉中用獺骨一片含之咽津立下一方燒灰水調服及用爪於喉嚨外爬之即下魚鱗散出十便良方治諸魚骨鯁在喉中用鯉魚皮鱗不拘多少燒灰研細每服四二錢匕新汲水調下未出更服魚骨引方出聖惠方治諸魚骨鯁在喉中用魚骨一片潛令人將置鯁人被頭勿令覺之即下或置頂上亦可云謦咳即出鸕鷀散出聖惠方治諸魚骨鯁在喉中用鸕鷀毛翅十片燒灰研細每服一錢匕濃煎橘皮湯下或以綿裹含咽即下一方用屎末服方寸匕又用糞水調塗咽喉外即出雞足散出聖惠方治諸魚鯁在喉中用雞足二枚燒灰研為散每服一錢匕酒調下立出溫水調服亦可艾蒿酒方出聖濟總録治諸魚骨鯁在喉中及誤吞銅錢用生艾蒿一握以水酒各一盞煎至八分去滓分溫二服一方用水煮又方用縮砂煎湯調末下一方用艾蒿數升水酒共一斗煮取四升稍稍飲良薔薇散出聖惠方治諸魚骨鯁在喉中用薔薇根不拘多少搗為散每服一錢匕水調下日三亦療折箭刺入膜囊不出及鼠瘻等患服之十日皆穿皮出效一方服薔薇灰末方寸匕百合散出聖濟總録治諸魚骨鯁在喉中用百合五兩搗羅為散用蜜水調塗帛上匝項系之甚者不過三五上魚尾引方治諸魚骨鯁在喉中用魚尾一枚取置衣領中即瘥立竹湯出百一選方治諸魚骨鯁在喉中取立死竹從地高二尺以上刮去皮細劈如算子三七莖用水二盞煎至七分去滓頓服一方取籬腳下如土朽竹去盡泥以手捻細蜜調丸如龍眼大以綿裹之含化其骨自消卻去藥雖咽下些津不妨鷹灰散出聖惠方治食肉鯁用鷹糞燒灰細研為散每服一錢匕水調下虎狼雕糞皆可服之虎骨散出十便良方治諸獸骨鯁用虎骨搗研細每服一錢匕水調下貍骨亦得雞翮散出聖惠方治食鯁咽不下用白雄雞左右翅大毛各一枚就銅器中燒作灰每服一錢匕用米飲調下一方以水調服之取所食者骨左右反覆擲背後則下也螻蛄散出肘後方治諸鯁並刺不出用螻蛄頭一枚為散綿裹咽津勿令鯁人知若刺不出者以塗刺瘡上自出也紅椹咽方治諸骨鯁在喉中不出用椹子紅者不拘多少臨時細嚼先只咽津後盡咽滓用新水吞下如無新者只欲紅陰乾為末用之治諸骨鯁及吞錢出聖惠方用木炭皮為末研令極細如無炭皮但堅炭亦可粥飲調下二錢未下再服七日四日服以鯁下為度一方炭灰搗羅為末用酒或水調一錢服方寸匕一方羊脛炭碾為細末米飲調下治魚骨鯁方用象牙一兩不以多少搗羅為末沙糖丸如雞頭實大每含化一丸咽津一方蔥酒調下諸鯁方用煮薤白令半熟以線系定薤手牢牽定線少嚼薤白咽之度薤至鯁處黏牽引鯁即出一法以綿一小塊蜜煮少時用如食薤法一方或以薤煮作羹粥食之或炸作齏葅或炒食之皆可治雞魚諸骨鯁經日不下者隨其便而用之出危氏方諸骨鯁用藥王草頭擂水服又方以朴硝研細對入雞蘇丸別丸如彈子大仰臥含化不過三四丸自然而化之又方南硼砂新汲水滌洗含化其骨脫然而失治骨鯁入喉出經驗良方用寒水石煅為末冷水調下又方出經驗良方用桑螵蛸用醋煎細細啜飲又方出經驗良方用白藥銼細用米醋煎細細吞下在上即出在下即下治骨鯁不下出經驗良方先嚼白茯苓一錢重次以白礬湯咽下一方白茯苓為末所鯁骨煎湯調下治魚骨鯁出經驗良方用白膠香細細吞下治魚骨鯁出聖惠方用陳橘皮為末好酒一升入沙糖一兩煎成膏子冷吞咽下口念鸕鷀鸕鷀立愈一方細嚼冷水吞下又常含橘皮即下煎湯服亦可治魚骨鯁兼喉痹以青魚膽少許口中含咽津即愈膽用臘月取陰乾良治食魚肉為骨所鯁取泉水一杯令患人口向水張口取水氣鯁當自下治骨鯁出危氏方用金鳳花子嚼爛噙化下無子用根亦可口中骨自下便用溫水灌漱免損齒雞骨尤效一方擂碎水化服玉屑無憂散一名奪命無憂散治誤吞骨鯁塞不下獸骨鯁及咽中刺用象牙梳或牙笏等磨水咽下桑木上蟲屑米醋煎灌漱自下治魚骨鯁不出出經驗良方用蒜納鼻中即出獨顆者殺鬼去痛入藥用最良治魚骨在腹中刺痛及刺入肉者用食茱萸煎汁一盞服之其骨軟出如骨刺在肉中搗封之骨自爛出一方用吳茱萸水煮一盞汁服之及搗封之治骨鯁神效出衛生家寶方一名鹿屑散用鹿角為末含津咽下妙一方摻舌上咽津立效治魚骨鯁在喉中出聖惠方用硇砂少許口中咀嚼之立下治魚骨鯁出海上名方用白芍藥細切嚼爛咽下又方出海上名方用五倍子碾細末摻喉中立消治骨鯁在腹中刺痛出海上名方用大栗殼燒灰研細熟水調下麻煎丸出海上名方治骨並魚刺鯁在喉中取研萆麻子仁爛入百藥煎成劑即止丸如彈子大青黛為衣井花水磨下半丸咽之即下消化魚鯁用千金石以火煅水淬敲碎又用塘內攔魚竹並象牙屑一處或丸或末嚼水咽下可消深師療食魚骨鯁方出聖惠方用捕魚網一小片燒灰服刀圭匕良細研水調一錢服之一方乳香湯調下溫服甚者並三兩服一用魚網覆頭立下一用魚鱗燒灰細研水調一錢服治鐵棘竹木諸刺在肉中折不出及鯁不下出聖惠方用鼠腦厚塗瘡上則出亦可用獖鼠大效千金療鯁方兼主折刺不出出聖惠方取瞿麥為末水調服方寸匕治咽喉魚骨鯁刺上馬屁勃不以多少為末蜜和丸彈子大噙化咽津二聖散治魚雞骨刺在喉中不下取五月五日採楮子曬乾白茯苓各等分為末每服一大錢小兒半錢煎乳香湯調下溫服治骨鯁用赤華葉威靈仙心以井花水二盞煎至一盞諸般雞鵝骨吞下軟如綿又方用燈心燒灰喉中諸骨魚骨竹刺等不能上下用此味吹入喉中立消又方取所餘者骨左右手反復擲背後立出治雜物鯁方解衣帶目窺下部不下即出一用紙捻頻打噴嚏鯁自出青雪散治魚骨鯁咽喉內不出療鯁方用東流水一器東向坐以手指畫水上作龍字訖飲水不自曉書令他人持手書良又方凡書文曰天有門地有根諸家人口者皆當得吞集驗同治骨鯁厭勝法凡鯁時以其所食箸急倒轉依舊如常食魚其鯁自下勿令人知又方咒骨鯁以淨器盛新汲水一盞捧之面東默念云謹請太上東流順水急急如南方火帝令敕一氣念七遍即吹一口氣入水中如此七次以水飲患人立下有一族姓用此咒水可以食針並竹刺萆麻丸治一切鯁萆麻仁紅曲上等分研細用沙糖和丸如皂角子大以綿裹含之痰出立效治骨鯁方鹽麩子樹取根用釅醋煎濃汁時時呷咽瑞山本公云曾有人被雞骨鯁頸項腫大可畏用此啜至三碗忽吐出骨王九疇又云曾同彭醫官治骨鯁取鹽麩子樹根爛捶入鹽少許用綿裹吞下牽引使於喉中上下往來忽然釣得骨出愚謂綿裹之法固妙猶當兼用醋煎啜法為勝本草集議云鹽麩子樹根能軟雞骨神效解毒丸收藏年深愈見神效青靛花六兩大黃山豆根各四兩朴硝一錢黃藥子一兩半自然銅四兩貫衆山梔子宣連楮實子山慈菰各二兩半白滑石一斤十二兩鉛光石巴蕉自然汁白藥各二兩半上為末糯米糊和丸搗一千杵陰乾不可見日不然折去一料可作一千丸卻用鉛光石打光諸般骨鯁井水磨下一丸作勢一吞即下痄腮焮腫咽喉飛瘍清油調水磨化酒毒腸風下血薄荷湯赤眼腫痛井水金蠶蠱毒黃連水蛇犬蜂螫蜈蚣毒用水磨塗傷處誤吞竹木棘刺井水諸般惡毒用新汲井水縮砂散治骨鯁縮砂仁甘草貫衆等分上搗為粗末如一切鯁以綿裹少許含之旋旋咽津久則隨痰出滁州蔣教授因食鯉魚玉蟬羹為魚肋所鯁凡治鯁藥如象牙屑之屬用之皆不效或令服此藥連進三劑至夜一咯而出因戲云此管仲之力也玉屑無憂散治魚骨鯁用貫衆調下妙不可言神效膏治諸般骨鯁馬鞭草地松上件各一小握不用根入陳白梅肉一枚白礬一大拇指面許研令極細取一彈子大以綿裹作一球子綴針頭上其餘藥即將無灰酒一碗絞取汁細細呷之令盡如不能飲亦強呷數口然後納綿球子於喉間旋旋咽藥汁其骨鯁即軟當自下去白龍散治魚骨鯁柑子皮白礬象牙屑上件各等分同為細末每用一錢綿裹含化厭勝法治骨鯁以所食魚骨密置患人項上勿令知良久即下它魚骨亦可治食諸魚骨鯁久而不出上以皂角末少許吹入鼻中得鯁出多效咽中骨鯁剪刀草如野慈菰生於籬塹間其根白研之則如膠用順水吞下吞下即吐出骨不過兩三口效研萱草根順水下亦佳青雪散治魚骨鯁咽喉內不出並及慢喉痹盆硝二兩牙硝三錢白殭蠶去頭炒黃色為末甘草生取末各一錢半青黛二錢上為末每服二錢用井花水半盞調藥細細呷服或少許頻乾摻咽津亦得主骨鯁以故魚網覆鯁者頸瘥如煮汁飲之骨當下矣治魚骨在人腹中刺痛煮吳茱萸汁一盞服之止又骨在肉中不出者嚼吳榮萸封之骨當爛出治魚骨鯁不出者取獺足於項上爬之亦可煮汁食治鯁及魚骨入肉不可出痛甚者取魚狗燒令黑為末頓服之煮取汁飲亦可魚狗乃今之翠鳥小者是也治食諸魚骨鯁雜物鯁以好蜜七抄稍稍服之令下治魚骨鯁口稱鸕鷀則下治鯁用琥珀作珠一物貫串著繩推令前人至鯁所又復推以牽引出矣若水晶珠亦得如更無以堅硬物摩令滑用之亦得治草芒砂石類喉中不出用甑帶燒灰水調飲之即出系蒲甑帶日久敗爛者佳治魚骨鯁上常含橘皮即下誤吞諸物附論夫誤吞諸物若金銀針鉤之類雖非病之自內然無術以出之久則害人若舊梳治發磁石出針皆意為之主不特取其氣味治療之工可謂用心精微矣儒門事親書云一小兒誤吞一錢在咽中不下諸醫皆不能取亦不能下乃命戴人戴人熟思之忽得一策以淨白表紙令卷實如箸以刀縱橫亂割其端作鬅鬆之狀又別取一箸縛鉤於其端令牢不可脫先下咽中輕提輕抑一探之覺鉤入於錢竅然後以紙卷納之咽中與鉤尖相抵覺鉤尖入紙卷之端不礙肌肉提之而出方治誤吞銅鐵金石竹木刺雞鵝魚諸骨出危氏方川山豆根山蜈蚣威靈仙鐵腳者山慈菰滑石馬牙硝金星鳳尾草各一兩急性子二兩苧麻根五錢緑豆粉五錢甘草節三錢油浸三宿磚五兩廁中制一年上為末白芨五兩與糯米糊一處和劑成錠子如梧桐子大每服一錠冷水磨化即下骨鯁若金石鐵銅以生薑汁磨化下之如聖散出聖濟總録治咽物誤置喉中不出栝蔞用瓤二枚杏仁去皮尖雙仁炒一兩半皂角炙一寸與甘草同為末甘草炙三分上先研栝蔞杏仁爛次以甘草皂角末和為餅子鐺中爆令乾重搗為細末每服一錢匕調下黃蠟少許水一盞同煎七分熱服亦得未效再服用臘茶調下通氣散出醫方妙選治誤吞銅錢物及鉤繩之類在咽喉不下鵝毛一錢燒灰磁石一皂角子大燒灰象牙末一錢燒存性上為細末每服半錢新水調下治誤吞竹木魚骨所鯁咽物不下咽痛方出旅舍方貫衆茯苓去皮甘草炙上等分為末每服二錢新汲水調徐徐呷之治誤吞錢出肘後方用葈耳頭一把以水一升浸十餘度飲水愈治誤吞鐵石骨刺等不下危急者出百一選方王不留行黃柏去粗皮上等分為細末水浸蒸餅丸如彈子大以麻線穿之掛當風處每用一丸冷水化開灌下立效治誤吞金銀物或錢在腹內不下方出聖濟總録石炭光明者一杏核大硫黃一皂角子大上研為末酒調下不拘時血餘散出聖惠方治食中吞發咽不去繞喉用亂髮燒末酒服一錢匕粥飲調下亦得一方水調服治誤吞金銀環及叉方兼治誤吞錢及桃枝竹木用白糖二斤一頓漸漸食之多食益佳即自消化誤吞環及指纏方出聖惠方用雁毛二七枚燒灰末服之鵝羽亦得水調一方米飲服之誤吞釘針及箭鏃等方但多食肥肉並脂令飽自里出一方食肥羊脂諸般肥肉誤吞錢針出十便良方用懸針磁石棗許大一塊含之立出誤吞椒閉氣不通出百一選方用吃京棗三個解之治誤食桐油一名乾柿湯出百一選方用食乾柿解之白礬少許入湯水中咽下尤妙治誤吞鉤繩在喉中不出方出聖惠方若鉤繩在手者莫引之但益以珠璫薏苡子等就貫著繩稍稍推至鉤處小引之即出也治誤吞蜈蚣出危氏方用生豬血令病人吃須臾生清油灌口中噁心其蜈蚣滾在血中吐出繼與雄黃細研水調服愈昔有村店婦人因用火筒吹火不知筒中有蜈蚣藏焉用以吹火蜈蚣驚迸竄入口中不覺下喉嚨求救人無措手適有人云可討小豬兒一個斷喉取血灌之從其言果愈誤吞銅物不能化者出十便良方用濃煎縮砂湯服其銅自下又用生荸薺研爛服其銅自化細研堅炭為末米飲下於大便內瀉下如烏梅狀治誤食物落鼻中及入眼不出出聖惠方用皂角末吹取嚏即出治誤吞鉤線方出聖惠方用漯師琥珀一珠子貫著鉤繩推令前入至鉤所復又推之以引出矣若水晶珠猝無珠堅物磨令滑用之治誤吞竹木入喉咽出入不得出聖惠方用故鋸燒令赤漬酒中及熱飲並得一用女人大指甲二枚燒末納酒中飲之治誤吞桃枝竹木用白糖但數數多食即自消化治誤吞銀環及叉出十便良方用水銀二一兩服之叉便下亦可以胡粉一兩搗調用之分再服食銀令如泥也若吞金銀物在腹中皆服之令消煬出之治誤吞鉤出聖惠方用小羊喉以貫繩推至鉤處當退脫小引則出又方但大捩頭四向顧小引之則出又方出聖惠方用常思草頭一把二升水淘灌之十餘過而飲之治誤吞水蛭即馬蝗蜞用青靛調水飲即瀉出或為此蟲咬亦用靛敷之又方出德生堂用藜蘆末二錢熬水一盞服之後則必吐其物遂出無恙又方出德生堂用蒸餅半個於狗口中繳涎在餅上吃了再用半個依前卷涎吃後其物自散矣治誤吞銅錢珠璫鐵而鯁者方出聖惠方用燒銅弩牙令赤納酒中飲之立愈治誤吞錢出百一選方用生鳧柴取汁呷吃錢自然消化即荸薺也治誤吞叉方用曝韭令萎蒸熟勿切食一束即出或生麥葉筋縷如韭法皆可用但立意多食自消一方薤白治如前法治誤吞錢不出及誤吞針方用葵菜不拘多少絞取汁冷飲之即出一用葵花煮汁服之治誤吞銅錢用榨油楔尖燒存性為末濃煎艾湯調二錢無油尖止服艾湯亦效又方用百部根四兩酒一升浸一宿溫作二服又方用木賊草為末每服一錢用雞子白調下又方用滑石末餳糖丸如豆大噙化一丸治誤吞錢用服炮蜜二升即出矣治誤吞椒閉氣不通萆薢一兩甘草炙微赤狗脊各三分上為細末食前以粥飲調下二錢一方不用甘草用貫衆半兩萆薢狗脊各一兩治誤吞鉤線方用螻蛄摘去身但吞其頭數枚勿令鯁人知治吞錢方用艾蒿五兩以水五升煮取一升頓服之便下治一切諸雜骨木竹諸鐵物鯁嚨宜服此方代赭硝石黃丹上等分細研為末每服半錢津液咽下治一切竹木簽刺諸骨鯁喉松子仁狼毒捶碎於土器內醋煮熟自然銅燒以醋投研各等分上為細末凡有鯁喉即掠藥末一字入口中津液咽下治喉中物鯁欲死用白鳳仙子研水大呷以竹管灌入硬物即軟去切物經牙又方骨鯁涎下之魚骨砂糖大塊含即軟去又方蛤粉一兩萆麻半兩黃丹一錢上為末每服一錢水調下又方用綿包橙肉如小梅牢系線令吞下過鯁物之內牽出物隨出又方用生鰍鱔大者線牢縛其頭以尾先入喉中頭未出即牽出之治誤吞錢及骨至效用木炭皮為末米飲調二錢未下再服至三必效治誤吞鐵錢及骨古文銅錢十數枚入白梅十個淹過即爛每服一丸如緑豆大侵晨取流水吞下即吐出巧匠取喉鉤方鹹平中職方魏公潭州有數子弟皆幼因相戲以一釣竿垂鉤用棗作餌登陸鉤雞雛一子學之而誤吞其鉤至喉中急引乃鉤以須逆不能出乃命之諸醫不敢措手魏公大怖令人遍問老婦以所經歷時有一老婦九十餘歲言亦未嘗見此切料有智識者可出之時本郡有一莫都料性甚巧可召問之公呼老婦責之曰吾子誤吞鉤莫都料何能治之老婦曰聞醫者意也其莫都料曾水中打碑塔添仰瓦魏公大咍親屬勉之曰試詢之公遂召莫都料至沉思久言要得一蠶繭及大念珠一串公與之莫都料遂剪繭如錢大用物推四面令軟以油潤之仍中通一竅先穿上鉤線次穿數珠三五枚令兒正坐開口漸添引數珠捩之到喉至系鉤處乃向項下一推其鉤向下而脫即向上急出之見繭錢向下裹定鉤線須而出並無所損魏公大喜遂厚贈之公曰心明者意必巧也出名醫録治鯁以類推方治鯁之法皆以類推鸕鷀治魚鯁磁石治針鯁發灰治發鯁貍虎治骨鯁亦各從其類也治蜘蛛飛絲入口用紫蘇葉不問新舊嚼之即愈治誤食發令腹有蠱以雄黃餌之昔甄立言仕唐為太常有道人心腹滿煩彌二歲立言診曰腹有蟲誤食發而然令餌雄黃一劑少頃吐一蛇如人小指惟無目燒之有發氣乃愈鉤吻葉與芹葉相似誤食之殺人用薺苨八兩水六升煎取二升為兩服解之又方治誤吞水蛭即馬蝗蜞用酒及藍靛絞汁月頭初三四五日空心服治誤吞錢器物用韶粉一兩研細分作二服水調服之食水銀金化如泥者誤吞金銀物在腹中服之令消煬出治誤吞下錢上以羊脛燒灰為末空心米飲下二錢
