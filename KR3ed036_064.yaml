body:
  text: 卷六十四咽喉門語聲不出附論夫喉嚨者為氣之道路會厭者是聲音之門戶若風邪熱毒在於脾腑則陰陽不和氣道痞澀上焦壅寒風熱之氣上衝喉攻於會厭故令腫痛語聲不出也方苦參丸出聖濟總録治咽喉腫痛語聲不出痰唾稠濁苦參一分白礬燒枯半兩山梔子仁一兩木通銼防風去叉杏仁湯浸去皮尖雙仁炒各半兩甘菊花三分大黃生銼一兩射干玄參甘草炙銼惡實炒白藥各一分馬勃二分上為末煉蜜和丸如酸棗大每服綿裹一丸夜後含化咽津如喉不閉者去白礬通聲膏五味子款冬花通草各三兩人參細辛青竹皮桂心菖蒲各二兩杏仁薑汁各一升白蜜二升棗膏三升酥五升上㕮咀以水五升微火煎三上三下去滓納薑汁棗膏酥蜜煎令調和酒服棗大二丸治肺脾氣滯風冷所傷咽喉腫痛語聲不出宜服此方出聖惠方桂心一兩木通一兩銼防風一兩去蘆頭射干一兩附子一兩炮裂去皮臍桔梗一兩去蘆頭人參一兩去蘆頭獨活一兩羚羊角屑一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃上為散每服三錢水一中盞入生薑半分煎六分去滓不計時候溫服生薑膏一名母姜酒治咽喉腫痛聲嘶不出蓋咽門者肝膽之候若臟熱咽門閉而氣塞若腑寒咽門破而聲嘶此證宜服之母姜汁一升牛髓三兩麻油二兩芎藭二兩獨活一兩半秦椒一兩去目及閉口者桂心一兩防風一兩半去蘆頭酥二兩上為末納薑汁中煎至相淹濡下髓酥油等攪令勻以慢火煎成膏每服不計時候以溫酒調下半錢黃芩湯治風熱客於肺經上搏咽喉氣壅腫痛語聲不出黃芩去黑心一兩半枳殼去瓤麩炒一兩半升麻一兩木通銼一兩芍藥柴胡去苗杏仁湯浸去皮尖雙仁炒羚羊角鎊各一兩石膏碎一二兩上粗搗篩每服三錢匕以水一盞煎至五分去滓溫服熱毒太盛加大黃一兩杏仁煎治暴嗽失音不語杏仁去皮尖研三兩桑白皮生薑取汁蜜砂糖各一兩半木通貝母各一兩三錢紫菀茸五味子各一兩上將桑根白皮木通貝母紫菀五味子為銼散以水三升慢火熬取一升去滓入杏仁糖蜜薑汁微火熬成膏旋含化小續命湯治猝然咽閉不能語言防己麻黃人參肉桂黃芩甘草炙白芍藥杏仁川芎各一兩附子半兩防風一兩半上㕮咀每四錢姜七片棗二枚加制杏仁七粒煎不拘時候溫服又方出聖惠方丹參一方硃砂升麻雄黃細研杏仁湯浸去皮尖雙仁麩炒微黃鬼臼甘草炙微赤銼射干各一兩麝香半兩細研上為末以蜜丸如梧桐子大粥飲下一丸加至五丸日三酒服亦佳咽痛失聲不利用之良外臺祕要無丹參有丹砂治咽喉腫痛脾肺壅毒語聲不出宜服此方出聖惠方木通一兩銼杏仁三分湯浸去皮尖雙仁麩炒微黃菖蒲三分川升麻三分羚羊角屑三分麥門冬三分去心射干三分甘草一分炙微赤銼上為散每服三錢水一中盞煎至六分去滓不計時候溫服射干湯治風熱客搏於脾肺經血脈壅遏喉門腫痛語聲不出射干紫菀去苗土款冬花各一兩半麻黃去根節二兩細辛去苗葉五味子炒各一兩半夏湯浸七遍半分上粗搗篩每服三錢匕以水一盞入棗二枚擘破煎至五分去滓入地黃汁半合溫二服食後臨臥發聲散出御藥院方治語聲不出胸滿短氣涎嗽喘悶咽喉噎塞桑白皮升麻桔梗川芎各一兩甘草馬兜鈴羌活各半兩上為細末每服一錢水一盞入竹茹薄荷同煎六分去滓食後溫服治咽喉腫痛聲嘶不出出聖惠方生薑汁二合生地黃汁三合桂心末半兩杏仁一兩湯浸去皮尖雙仁麩炒微黃研如膏蜜二合牛酥一合上相和熬令稠每服不計時候含杏核大咽津治咽傷語聲不徹方酒酥各一升乾薑二兩半末通草桂心石菖蒲各二兩末上合和服一匕日三次治語聲不出釅醋生薑汁自然銅蛇銜草木馬麻草上各等分為末用蘆筒吹入喉內立可菖蒲丸出聖惠方治咽喉腫痛語聲不出菖蒲二兩孔公孽細研一兩木通銼二兩皂莢一梃長一尺者去黑皮塗酥炙令黑黃去子上為末煉蜜和丸如梧桐子大每服二十丸至三十丸煎鬼箭羽湯下不計時候荊芥湯又名三神湯出三因方治風熱肺壅咽喉腫痛語聲不出如有物鯁咽之則痛甚荊芥穗半兩甘草炙一兩桔梗二兩上為粗末每服四錢水一盞姜三片煎至六分食後溫服治咽傷語聲不徹一名立效散出十便良方酒酥各一升乾薑十兩末上以酒一合酥一匕薑末二匕相和服日三食後服亦治肺痛發聲散出御藥院方治咽喉語聲不出栝蔞皮細銼慢火炒赤黃白殭蠶去頭微炒黃甘草銼炒黃色各等分上為細末每服一二錢用溫酒調下或濃生薑湯調服更用半錢綿裹噙化咽津亦得並不計時候日三兩服出聲散一名訶子湯出衛生寶鑑方治肺虛失語訶子四個生熟甘草二兩生熟一方半兩桔梗一兩上為末每以二錢用童子小便和茶煎五七沸溫服甚者不過五服一方入砂糖一小塊以水煎服治感寒語聲不出杏仁丸出聖惠方治啞塞咳嗽及咽喉癢痛失音不語桂心杏仁十八銖湯浸去皮尖炒上為末蜜丸如杏仁大新綿裹時時含之細細咽津日夜勿絶治喉痹腫盛語聲不出方出聖惠方用馬藺根汁三合入白蜜一合相和慢火煎成膏徐徐咽之日可五七度一方用子半升水二升煮一升半服若不煮用子四十五粒為末水調服立愈一方取馬藺根汁飲之若無煎刷汁亦可一法用一握少水絞取汁稍咽之口噤者拗灌之良槐花方出危氏方治失音用槐花新瓦上炒香熟三更後床上仰臥隨意食之亦治咯血從彥文親服有效桂心散治失聲音若陽證傷寒失音者不可用須察其證而用之陰證傷寒方可用用桂心搗碎每服三錢水二盞煎至一盞食後溫服一方用末舌下漸咽津白芨散治人無聲用豬肺一個生薑數片煮熟切作片子白芨二十文研為末點盡豬肺吃治風冷失聲咽喉不利方用蘘荷根二兩研絞取汁酒一大盞相和令勻不計時候溫服半錢治猝失音方用生大豆一升青竹算子四十九枝長四寸闊一分和水熟煮日夜二服瘥又每食後淨磨拭吞雞子大令人長生初服時身似重一年以後便覺身輕又益陽道橘皮湯治卒失聲音不出方用橘皮五兩水三升煮取一升去滓頓服治咽喉癢痛失音不語治語聲不出如有鯁用荊芥湯加荊芥治猝暗風失音不語方用好生梨搗汁一合頓服即通日再服止治取好聲方用杏仁一升去皮尖酥一兩蜜少許丸如梧桐子大空心米湯下十五丸增損如聖散治心肺風熱攻衝會厭語聲不出咽喉妨悶腫痛並皆服之桔梗二兩甘草微炒一兩半防風半兩枳殼湯浸去瓤二兩半上為細末每服三錢水一大盞煎至七分去滓入酥如棗大攪勻溫服食後治咽喉腫痛語聲不出用豉半升水二盞煎去滓分為二服相繼稍熱服之令有汗出瘥大附方治腫痛全盛語聲不出者及喉痹毒氣咽門閉不能咽用大附子一枚炮令裂削去皮切如豆每含一塊咽汁半食間即瘥烏頭亦得忌豬肉冷水一方密塗炙坼含之咽汁甜盡更塗蜜炙准前含咽之極驗通聲丸治寒邪客在肺經咽嗌至塞語聲不出咳嗽及憂思悸怒氣道閉澀胸滿短氣石菖蒲肉桂杏仁乾薑青橘皮等分甘草半支上為末蜜丸每一兩作十丸每服一丸食後含化咽玉粉丸治冬寒痰結咽喉不和語聲不出半夏洗五錢草烏頭一字炒桂一字上同為細末生薑自然汁浸𩚫餅為丸如雞頭子大每服一丸至夜含化多年不愈亦有效黃帝針經中說寒氣客於會厭猝然如啞此藥治之甘桔湯治咽喉痛用桔梗一兩甘草二兩水煎食後服治咽喉如無熱咽痛喉閉用辣桂半夏甘草等分㕮咀水煎一半候冷呷緩服出聲音方訶子炮去核木通各一兩甘草半兩上㕮咀用水三升煎至升半入生地黃汁一合再煎數沸放溫分六服食後日作半料治啞病以蜩蟟蛻皮研一錢匕井花水服治猝啞取杏仁三分去皮尖熬別杵桂一分如泥取李核大綿裹含細細咽之日五夜三治喉痹猝不語煮豉汁一升服覆取汗亦可末桂著舌下漸咽治咽喉癢痛失音不語杏仁味甘苦冷有毒惡黃芩黃耆葛根畏蘘草去皮尖炒桂心味甘辛大熱有小毒為末上二味各一兩同研爛如泥用半熟蜜和丸如櫻桃大新綿裹含之咽津日五次夜三次大效咽乾附論夫脾肺不利上焦有熱則津液枯燥搏於咽喉故令乾痛甚則生瘡矣方絡石煎丸治咽喉乾燥熱痛宜服絡石半兩射干半兩川大黃一分木通一分銼白藥一分川升麻半兩牛蒡子一分玄參一分甘草半兩白蜜二兩白蒺藜一分馬牙硝一分黃藥一分地黃汁半升上除藥汁外搗羅為末先以地黃汁及蜜於銀鍋中以慢火煎成膏後入諸藥末相和令勻丸如小彈子大用綿裹一丸含咽津龍腦雞蘇丸治上膈虛熱咽乾龍腦研一分雞蘇甘草炙烏梅肉紫蘇葉各一兩麥門冬去心焙白梅肉人參各半兩天門冬去心焙半兩麝香研甜硝研各一分上為細末再同研勻煉沙糖和丸如雞頭實大每服一丸食後人參湯嚼下升麻散出聖惠方治咽喉熱毒上攻乾燥疼痛宜含化川升麻一兩半射干一兩白礬半兩燒灰細研絡石一兩甘草三分生銼白藥三分黃藥一兩天竺黃二兩細研犀角屑三分白龍腦一分細研馬牙硝二兩細研上為散入研了藥令勻於瓷閣中盛每服一錢以綿裹含化咽津犀角丸出聖惠方治風熱上攻咽喉干痛如欲生瘡心胸壅悶犀角屑一兩川升麻一兩川大黃一兩銼碎微炒黃芩半兩玄參一兩人參一兩去蘆頭黃耆半兩銼甘草半兩生銼藍葉半兩桔梗半兩去蘆頭杏仁一兩湯浸去皮尖雙仁麩炒微黃別研入上為末煉蜜和搗二三百杵丸如梧桐子大每於食後以溫水下二十丸甘草湯出聖濟總録治咽乾涕唾如膠或腎氣不足心中悒悒目視䀮䀮少氣耳聾消渴黃疸一身悉癢骨中疼痛小腸拘急甘草炙半兩磁石煅醋淬三遍二兩玄參防風去叉各一兩半五味子牡丹皮桂去粗皮各一兩附子炮裂去皮臍半兩黑豆半合上粗搗篩每服五錢匕水一盞半入生薑半分拍碎煎至一盞去滓食後服日再射干膏出聖濟總録治咽乾口瘡牙癰心肺熱盛射干升麻梔子仁玄參小豆卷各一兩半黃柏去粗皮二兩赤蜜地黃汁各三合大棗去核十枚上除蜜並地黃汁外細銼如麻豆以水五升煎至一升半去滓下蜜與地黃汁慢火煎成膏細細含化咽津治咽喉熱毒干痛心膈煩躁宜服此方出聖惠方犀角屑一兩川升麻一兩梔子仁三分藍葉半兩木通一兩銼麥門冬一兩半去心焙枳殼半兩麩炒微黃去瓤甘草三分生銼生乾地黃三分上為散每服三錢水一中盞煎六分去滓不計時候溫服貝母湯出聖濟總録治咽乾口燥上焦虛熱咳嗽氣促痰壅貝母麩炒去心百合各三分紫菀去苗土桑根白皮炙銼桔梗銼炒各半錢麥門冬去心焙三分甘草炙銼一兩半大黃炒銼一分上粗搗篩每服五錢匕水一盞半煎一盞去滓分溫二服食後雞蘇人參湯治上焦有熱津液燥少咽喉干痛雞蘇葉惡實炒玄參甘草炙銼各一兩防風去叉人參天門冬去心焙各半兩上粗搗篩每服三錢匕水一盞入梨二片同煎至六分食後去滓溫呷之龍腦散治咽喉熱乾燥津液不足龍腦研一錢雞蘇去梗焙乾荊芥穗一兩半白豆蔻去皮一分甘草炙銼一兩上為細散每服半錢匕溫水調下合時且各自貼之臨用旋合和取半錢匕服氣味尤全乾地黃丸出聖濟總録治咽喉干痛風氣不能食生乾地黃焙一兩人參赤茯苓去黑皮各三分天門冬去心焙一兩上為末煉蜜和丸如梧桐子大每服十丸米飲下日三厚朴湯出聖濟總録治咽喉干痛心腹滿悶不能飲食厚朴去粗皮生薑汁炙赤茯苓去黑皮各一兩半陳橘皮湯浸去白焙人參各一兩上粗搗篩每服五錢匕水一盞