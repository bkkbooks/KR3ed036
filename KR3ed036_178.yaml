露飲出衛生寶鑑治膈消大渴飲水無度舌上赤澀上下齒皆麻舌根強硬腫痛食不下腹時脹痛渾身色黃目白精黃甚則四肢痿弱無力面塵脫色脅下急痛善怒健忘臀肉臂腰背寒尻冷甚順德安撫張藝夫年四十五病消渴舌上赤裂飲水無度小便數多先師以此藥治之旬日良愈古人云消渴多傳瘡瘍以成不救之疾撫效亦不傳瘡瘍享年七十五歲終其藥名之曰生津甘露飲石膏一兩一錢人參二錢生甘草一錢炙甘草二錢山梔子二錢蓽澄茄一錢白豆蔻一錢白葵一錢黃柏酒拌二錢五分白芷一錢連翹一錢杏仁去皮一錢五分麥門冬半錢黃連三錢木香三錢桔梗三錢升麻二錢薑黃二錢知母二分酒製當歸半錢全蠍一個藿香二分柴胡三分蘭香半錢上件為細末湯浸𩚫餅和勻成劑捻作餅子曬半乾杵碎篩如粟米大食後每服二錢抄於掌內以舌舔之隨津唾下或送以白湯少許亦可此治之緩也不惟不成中滿亦不傳瘡瘍下消矣消渴之病燥熱之氣勝也內經曰熱淫所勝佐以甘苦以甘瀉之熱則傷氣氣傷則無潤折熱補氣非甘寒之劑不能故以石膏甘草之甘寒為君啓玄子云滋水之源以制陽光故以黃連梔子知母之苦寒瀉熱補水為臣以當歸人參杏仁麥門冬全蠍連翹白芷白葵蘭香甘草之辛寒和血潤燥為佐以升麻柴胡苦平行陽明少陽二經白豆蔻木香蓽澄茄藿香反佐以取之又用桔梗為舟楫使浮而不下也東垣先生嘗謂余曰潔古老人有云能食而渴者白虎倍加人參湯主之大作湯劑多服不能食而渴者錢氏白朮散加倍葛根大作湯劑屢服之即愈消渴口舌乾燥附論夫脾主口心主舌消渴口舌乾燥者邪熱積於心脾津液枯耗不能上湊故也其證飲食無味喜湯而口舌乾燥治法當滌去心脾積熱使臟真濡於肺則愈方麥門冬丸出聖濟總録治消渴口乾喜飲水小便數心煩悶健忘怔忪麥門冬去心焙土瓜皮銼山茱萸鹿茸酒浸炙去毛牛膝去苗銼狗脊碎銼去毛茯神去木人參各一兩黃連去須一兩五錢牡蠣煅三分龍膽草菟絲子酒浸一宿曝乾別搗為末一兩半上為末煉蜜丸如梧桐子大每服二十丸不拘時候煮小麥飲下加至三十丸犀角丸出聖惠方治消渴口舌乾燥煩熱心神如狂犀角屑三分鉛霜半兩細研麥門冬二兩去心焙鐵粉一兩細研甘草半兩炒微赤銼鬱金半兩地骨皮半兩栝蔞根三分子芩半兩茯神半兩玄參半兩胡黃連三分上為末入研了藥令勻煉蜜和搗五百杵丸如梧桐子大每於食後煎竹葉湯下二十丸升麻丸出聖濟總録治消渴口舌乾燥四肢痠疼日晡頰赤煩悶升麻黃連去須龍膽黃芩去黑心銼犀角鎊葳蕤知母焙各一分前胡去蘆頭鱉甲醋炙去裙襴各半兩朴硝研一分上為末煉蜜和丸如梧桐子大每服二十丸不拘時候溫漿水下之麥門冬散出聖惠方治消渴口舌乾燥心神煩熱麥門冬一兩去心地骨皮三分栝蔞根三分人參半兩去蘆頭蘆根一兩銼黃耆三分銼甘草半兩炙微赤銼黃芩二分茅根一兩銼石膏三兩上為散每服五錢水一大盞入生薑半分竹茹半分小麥半合煎至五分去滓不拘時候溫服人參散出聖惠方治消渴口舌乾燥煩熱人參二分去蘆頭地骨皮一兩赤茯苓三分麥門冬三兩去心甘草二分炙微赤銼蘆根二兩銼葛根二分銼黃耆三分銼川升麻一兩黃芩半兩上為散每服四錢水一盞入生薑半分淡竹葉二十片煎六分去滓不計時候溫服磁石湯出聖濟總録治消渴腎臟虛損腰腳無力口舌乾燥磁石一兩半搗如麻子粒大先以水淘去赤汁候乾分為五貼每貼用綿裹入貼藥內煎之黃耆銼地骨皮銼生乾地黃焙五味子桂心去粗皮枳殼去瓤麩炒檳榔銼各半兩上㕮咀分為五貼每貼先用水三盞與磁石一貼同煎至一盞半去滓分二服一方磁石引鐵者火燒醋淬二十遍用一兩藥七味同為細末溫水調下玉泉丸出直指方治消渴口乾麥門冬去心焙人參茯苓黃耆半生半炙蜜烏梅肉生甘草各一兩栝蔞根乾葛各一兩半上為末煉蜜丸彈子大每服一丸溫湯嚼烏梅湯治消渴膈熱咽乾止煩渴生津液烏梅肉炒二兩茜根銼一兩黃芩去黑皮一兩葛根銼人參白茯苓去黑皮甘草炙各半兩上為散每服三錢水一盞煎至八分去滓不拘時候溫服止渴銼散出直指方治渴口乾枇杷葉新布拭去毛炙乾葛根生薑切片焙各一兩大烏梅七個大草果二個去皮淡竹葉甘草生各半兩上銼每服四錢新水煎服人參散出聖惠方治消渴止虛煩除口舌乾燥宜服此麥門冬一兩去心人參半兩去蘆頭黃耆三分銼赤茯苓三分甘草半兩炙微赤銼葛根半兩銼枇杷葉三分拭去毛炙微黃上為散每服四錢水一中盞生薑半分淡竹葉二七片煎至六分去滓不計時候溫服麥門冬丸出聖惠方治消渴口舌乾燥狂亂麥門冬三兩去心焙栝蔞根三分知母三分黃芩三分甘草半兩炙微赤銼黃連一兩去須鐵粉一兩半細研上為末入鐵粉研令勻煉蜜和搗三二百杵丸如梧桐子大每食後以清粥飲下二十丸赤茯苓煎出聖惠方治消渴心神煩亂唇口焦乾咽喉不利赤茯苓九兩為末白蜜半斤淡竹瀝一小盞生地黃汁一小盞上調攪令勻以慢火煎成膏每服不計時候以清粥飲下一茶匙茅根湯出聖濟總録治消渴口乾小便數茅根銼蘆根銼菝葜細銼各三兩石膏碎一兩半烏梅去核半兩炒淡竹葉一兩銼上㕮咀每服四錢水一盞半煎取一盞去滓溫服不拘時候麥門冬湯出聖濟總録治消渴口乾引飲生麥門冬去心一兩半栝蔞根二兩茅根竹茹各五兩小麥三合烏梅去核七枚上㕮咀每服五錢水一盞半煎至一盞去滓溫服不拘時天竺黃散出聖惠方治消渴心神煩躁口乾舌澀天竺一兩細研黃連半兩去須梔子半兩川大黃半兩微炒馬牙硝半兩細研甘草一分炙微赤銼上為細末每服二錢煎竹葉水調下食後茯苓湯出聖濟總録治消渴口乾唇焦心脾臟熱唯欲飲水白茯苓去黑皮麥門冬去心焙各四兩石膏五兩茅根銼一升上㕮咀每服四錢水一盞半入冬瓜一片同煎煎至七分去滓溫服不拘時黃連散出聖惠方治消渴口舌乾燥煩熱不能飲食宜服黃連二兩去須葛根二兩銼麥門冬一兩去心枇杷葉二兩拭去毛炙微黃上為細散每服四錢水一中盞入生薑半分淡竹葉二十七片煎至六分去滓不計時候溫服鉛霜丸出鄭氏家傳濁渴方治消渴口乾煩躁飲水無度鉛霜半兩青黛栝蔞根各一兩龍腦少許上細末令勻煉蜜和丸如梧桐子大每服二十丸微嚼煎竹葉湯下新汲水下亦得食後日三生麥門冬湯治消渴口乾體瘦枸杞根白皮銼生麥門冬去心小麥各一升上三味以水一斗煮取五升去滓渴即飲之枸杞湯出聖濟總録治消渴唇乾舌燥枸杞銼二兩石膏碎一兩小麥一兩五錢上㕮咀每服三錢水一盞煎至七分去滓溫服不拘時地黃煎聖濟總録治消渴唇乾舌燥生地黃細切三斤生薑細切半斤生麥門冬二斤去心上一處於石臼中搗爛生布絞取自然汁用銀石器盛慢火熬稀稠得所瓷合貯每服一匙用溫湯化下不拘時冬瓜飲聖濟總録治消渴口乾日夜飲水無度渾身壯熱冬瓜一枚重三斤去皮瓤分作十二片麥門冬去心二兩黃連去心一兩五錢上二味㕮咀作十二服每服水三盞入冬瓜一片擘碎同煎至一盞去滓溫服日三夜二栝蔞根丸出聖濟總録治消渴飲水不止小便中如刺舌乾躁渴喜飲栝蔞根五兩黃連去須一兩浮萍草二兩上為末用生地黃汁半盞於石臼內木杵搗令勻再入麵糊丸如梧桐子大每服三十丸食後臨臥牛乳湯下日三煎菖蒲湯下亦得地骨皮散出千金方治消渴口乾燥骨節煩熱地骨皮一兩小麥半兩生麥門冬一兩去心上細銼和勻每服半兩水一盞煎至五分去滓溫服食後再服玉液膏出本事方生津液紫蘇四兩桂半兩甘草二兩炙白梅肉四兩上為末搗白梅為丸如芡實大每服含化三丸甘草湯一名羊髓煎出聖惠方治消渴口舌乾燥煩熱宜服此藥羊髓三合甘草一兩炙微赤銼白蜜二合上先以水一大盞煮甘草至七分去滓後下髓蜜更煎至五七沸每於食後溫服一合豬膽丸出聖濟總録治口中乾燥無津液而渴雄豬膽五枚定粉一兩上酒煮膽候皮爛即入粉研細同煎和成丸如芡實大每服二丸含化咽津治消渴口舌乾燥骨節煩熱出聖惠方芭蕉根生上搗絞取汁時飲一二合治消渴舌焦口乾飲水無度小便數出肘後方野雞一隻上用五味煮令極爛取汁二升半以來去肉取汁渴即飲之肉亦可食一云細切和鹽豉作羹食和血益氣湯一名地黃飲子出試效方治口乾舌乾小便數舌上赤苔此藥生津液除乾燥生肌肉杏仁六個生甘草三分以上二味治口乾舌燥也石膏六分治小便數也黃連酒浸八分治舌上赤脈也生地黃酒浸七分黃柏酒浸一錢柴胡三分當歸稍酒浸四分甘草炙三分升麻一錢紅花少許知母酒浸半錢麻黃三分防己酒浸五分羌活半錢桃仁九個上㕮咀作一服水二大盞煎至一盞去滓稍熱服食後昔張安撫服此大效酸棗丸出千金方治口乾燥內消酸棗仁三升五合酢安石榴子干五合覆盆子三兩烏梅十枚葛根三兩栝蔞根茯苓各三兩半麥門冬四兩石蜜四兩半桂心一兩六銖上為末蜜丸含化不限晝夜以口中津液為度丸盡復取含之無忌木瓜丸出十便良方生津液止渴思飲食百藥煎一兩烏梅一錢檀香二錢蒲黃二錢腦子一分研麝香一分研上件研勻甘草少許丸如緑豆大每服二三丸含化地黃煎丸聖濟總録治消渴口乾燥生地黃取汁二升半生栝蔞根取汁三升半羊脂碎切半升白蜜一斤黃連一斤去須別搗為末上五味先取地黃汁等四味入銀石器內慢火煎令脂消趁熱傾出將黃連末同搗令得所衆手丸如梧桐子大每服二十丸粟米飲下日三五服麥門冬丸出聖濟總録治消渴口乾燥栝蔞湯一名枸杞湯出聖濟總録治消渴口舌乾焦精神恍惚加減腎氣丸出濟生方治腎水不足心火上炎口舌乾燥多渴引飲肢體消瘦山茱萸取肉白茯苓去皮牡丹皮去木熟地黃酒蒸五味子澤瀉鹿角鎊山藥炒各一兩沉香不見火官桂不見火各半兩上為末煉蜜丸如梧桐子大每服七十丸鹽湯米飲任下弱甚者加附子一兩兼進黃耆湯參苓飲子出衛生寶鑑治口乾燥生津液思飲食黃耆熟地黃白芍藥五味子麥門冬各三兩去心白茯苓一分甘草半兩人參半兩天門冬去心半兩上為細末每服三錢水一盞半生薑三片棗二枚烏梅一個同煎至一盞去滓溫服食後蘿蔔煎出聖惠方治消渴發動飲水無限口乾渴蘿蔔上爛搗絞汁二升任性渴即飲之一方入粳米粥作吃甚效又方海上名方北五味子上濃煎湯飲之又方海上名方菟絲子上煎汁任意服之渴止為度治消渴口乾本草方粟米上炊飲食之良治消渴飲水日夜不止口乾便數本草方田中螺五升上以水一斗浸經宿渴即飲之每日一度易水換生螺為妙除煩悶口乾渴止怒令人喜本草方蓮藕上生研服之治消渴口乾本草方小麥上炊作飯及煮粥食之
