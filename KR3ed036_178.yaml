body:
  text: 卷一百七十八消渴門消中附論夫消中病者由渴少而飲食多也一名內消此由脾臟積熱故使消穀也亦有服五石之藥熱結於腎內石性歸腎腎得石則實實則生熱熱則消水故小便少也又臟腑虛冷小便利多津液枯竭則不得潤養五臟而生諸疾皆由勞傷過度愛欲恣情致使脾腎氣虛石熱孤盛則作消中故渴少食多而小便赤黃也宜滋腎水養津液則瘥也方肉蓯蓉丸出聖濟總録治消中虛極小便無度肉蓯蓉酒浸一宿切焙二兩澤瀉熟地焙五味子巴戟天去心地骨皮人參栝蔞根韭子甘草炙牡丹皮各一兩桑螵蛸炙三十枚赤石脂研龍骨磁石煅醋淬二七次研禹餘糧煅醋淬七次研各一兩半上為末煉蜜丸如梧桐子大每服三十丸牛乳汁送下牡蠣散出聖惠方治消中心神煩熱肌肉乾瘦小便赤黃腳膝無力吃食不生肌膚牡蠣三分燒為末硃砂半兩細研龍齒三分蘆薈三分黃連二兩去須鐵粉一兩細研澤瀉半兩甘草半兩炙微赤銼黃丹一分栝蔞根雞膍胵三分炒令黃色桑螵蛸胡粉一分赤石脂二兩上為散入研了藥令勻每服不計時候煎大麥仁湯調下一錢服之天門冬丸出聖濟總録治初得消中食已如飢手足煩熱背膊疼悶小便稠濁天門冬去心焙二兩半雞內金三具微炒桑螵蛸十枚炙土瓜皮乾者肉蓯蓉酒浸一宿切焙栝蔞根知母焙澤瀉銼鹿茸去皮毛酒浸炙五味子牡蠣煅各二兩赤石脂一兩半苦參一兩上為末煉蜜和丸如梧桐子大每服二十丸煎粟米飲下牡蠣丸出聖濟總録治消中食已即飢手足煩熱背膊疼悶小便稠濁牡蠣研赤石脂研栝蔞根各一兩黃連去須三兩肉蓯蓉酒浸一宿切焙乾一兩土瓜根銼黃芩去黑心知母焙澤瀉天門冬去心焙鹿茸去皮毛酒浸炙五味子桑螵蛸麩炒各三兩熟乾地黃焙一兩半上為末別研二味和勻煉蜜丸如梧桐子大每服三十丸煎陳粟米飲下日三夜一附子豬肚丸出三因方治消中多因外傷疸熱內積憂思喜啖鹹食及面致脾胃乾燥飲食倍常不生肌膚大便反堅小便無度附子炮去皮臍檳榔不焙各一兩鱉甲醋炙兩半當歸知母木香炮川楝銼炒秦艽去苗土大黃酒蒸龍膽草白芍藥破故紙酒浸炒各半兩枳殼麩炒去瓤各半兩上為末分作三分將二分入豬肚內縫定以蒸酒三升童子小便五升同入砂鉢內熬乾研爛細入一分末同搜搗為丸如梧桐子大每服五十丸溫酒米湯下豬腎薺苨湯出千金方治消中日夜尿七八升者豬腎一具大豆一升薺苨石膏各二兩人參茯神一作茯苓磁石棉裹知母葛根黃芩甘草栝蔞各二兩上㕮咀以水一斗五升先煮豬腎大豆取一斗去滓下藥煮取三升分三服渴即飲之下焦熱者夜輒合一劑病勢漸歇即止鉛霜散出聖惠方治消中久不瘥令人乾瘦少力心神煩亂眠臥不安鉛霜三分細研金箔細研銀箔細研麥門冬一兩半去心焙黃連半兩子芩半兩犀角半兩人參半兩去蘆頭雞膍胵一兩半微炒知母半兩土瓜根半兩苦參半兩銼上為散入前三味同研令勻每服不計時候以清粥飲調下一錢黃耆丸出聖惠方治消中渴不止小便赤黃腳膝少力縱食不生肌膚黃耆一兩切牡蠣三兩燒為粉栝蔞根半兩甘草半兩炙微赤銼麥門冬一兩去心焙地骨皮半兩白石脂半兩澤瀉半兩知母半兩黃連半兩薯蕷半兩熟乾地黃半兩上為末蜜和搗三二百杵丸如梧桐子大每服不計時候以清粥飲下三十丸薺苨丸出濟生方治強中為病莖長興盛不交精液自出消渴之後多作癰疽多由過服丹石所致薺苨大豆去皮茯神去木磁石煅研極細玄參栝蔞根地骨皮去末石斛去根熟地黃酒蒸鹿角各一兩沉香不見火人參各半兩上為末用豬腎一具煮如食法杵爛和為丸如梧桐子大每服七十丸空心用鹽湯送下如不可丸少入酒糊亦可煉蜜丸亦可薺苨湯出聖濟總録治內消所食物皆作小便兼治強中薺苨大豆人參白茯苓去黑皮切磁石搗如米粒葛根銼石膏碎黃芩去黑心栝蔞根甘草炙銼知母焙各二兩上件㕮咀每服五錢水二盞煎至一盞去滓溫服日三夜一茯神丸出直指方治消中煩熱消穀小便數人參去蘆茯神去木生乾地黃去土黃連淨麥門冬去心枳殼去瓤牡蠣粉各一兩蓮肉去心黃耆炙知母去毛各半兩栝蔞根七錢半上為末煉蜜和搗三百杵丸如梧桐子大每服五十丸清粥飲下肉蓯蓉散治渴多者不問食宜煮散服桑根白皮薏苡仁五味子各六兩通草紫蘇莖葉各四分覆盆子枸杞子各八分乾地黃九分茯苓菝葜各十二分黃耆二分上㕮咀分為五貼每貼用水一升八合煎取七合去滓溫服忌鮓物蕪荑石子薺苨湯出三因方治強中多因耽嗜色欲及快意飲食或服丹石真氣既脫藥氣陰發致煩渴飲水飲食倍常陰氣常興不交精自出中焦虛熱注於下焦三消之中最為難治薺苨石膏各三兩人參茯神栝蔞根磁石煅碎知母乾葛黃芩甘草各二兩上銼為散每用水三盞腰子一個去脂膜黑豆一合煮至盞半去腰子大豆入藥四錢煎至七分去滓食後服下焦熱則夜間服渴止勿服次投補藥黃耆湯出千金方治消中虛勞少氣小便數黃耆芍藥生薑桂心當歸甘草各二兩大棗二十枚黃芩乾地黃麥門冬各二兩上㕮咀以水一斗煮取三升分溫三服日三水銀丸出聖濟總録治消中食飲無度小便日夜頻數轉加羸瘦水銀一兩銀箔二百片與水銀共研鐵粉別研牡蠣煅各三兩栝蔞根麥門冬去心焙黃芩去心焙苦參黃連去須梔子仁各二兩上七味為末別研三味和勻用棗肉研搗為丸如梧桐子大每服四十丸煎蘆根湯下日二夜一白朮散出直指方治消穀消中善飢人參白朮白茯苓甘草炙藿香葉去土各一兩白乾葛二兩木香半兩北五味去梗根柴胡去毛枳殼去瓤各半兩上銼散每服三錢新水煎去滓不拘時服胃脾消中之證飲食入腹如湯澆雪隨小便而出落於溷廁溝渠中皆旋結如脂肌膚日益消瘦用熱藥則熱愈甚用涼藥則愈見虛羸不能起止精神恍惚口舌焦乾或陽強而下盛不交而泄其斃不久無治法姑録一二方聊為備用云爾知母丸出聖濟總録治消渴消中久不瘥知母焙麥門冬去心焙各一兩犀角鎊鉛霜雞膍胵炙土瓜根各半兩白茯苓去黑皮黃連去須各二分金箔二十片上為末煉蜜為丸如梧桐子大每服十丸煎人參湯下薺苨散出聖惠方治消中煩熱吃食旋消四肢瘦弱薺苨一兩人參一兩去蘆頭葛根一兩石膏二兩黃芩栝蔞根知母甘草各一兩微炙赤銼上為散每服四錢以水一中盞入大豆一百粒煎至六分去滓不計時候溫服黃耆散出聖惠方治消中煩悶熱渴不止黃耆一兩銼麥門冬一兩去心蘆根一兩栝蔞根一兩紫蘇莖葉一兩生乾地黃銼桑根白皮銼澤瀉各半兩甘草一兩炙微赤銼上為散每服四錢以水一中盞入生薑半分竹葉二七片煎至六分去滓不計時候溫服鉛霜丸出聖惠方治消中渴飲水不多心神煩亂四肢燥熱少眠宜服鉛霜三分細研栝蔞根一兩半甘草半兩炙微赤銼石膏三分細研知母三分子芩三分鐵粉半兩細研黃連半兩硃砂半兩細研上為末入研了藥令勻煉蜜和搗二三百杵丸梧桐子大每服食後以清粥飲下二十丸茯神丸出危氏方治消中煩熱小便數茯神一兩地骨皮黃耆銼知母各半兩牡蠣一兩燒為粉栝蔞根三分黃連三分去須麥門冬三分去心焙熟乾地黃一兩上為末煉蜜和搗二三百杵丸梧桐子大不計時候清粥飲下二十丸黃連丸出聖濟總録治消中小便數黃連五兩去須栝蔞根白龍骨碎苦參牡蠣研山茱萸土瓜根切葳蕤各三兩上為末煉蜜丸如梧桐子大每服二十丸至三十丸大麥飲下日三夜一服澤瀉丸出聖惠方治消中熱渴不止小便數四肢無力澤瀉一兩麥門冬二兩去心焙車前子半兩黃連三分去須牡蠣一兩燒粉桑螵蛸半兩微炒雞膍胵一兩微炒金箔五十片研入上為末入研了藥令勻煉蜜和搗三二百杵丸梧桐子大不計時候以蠶蛹湯下三十丸黃芩湯出聖濟總録治消中脾胃熱極消穀引食化為小便黃芩去黑心麥門冬去心焙栝蔞根梔子仁石膏碎淡竹葉各一兩上㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時地骨皮散出聖惠方治消中虛羸煩熱口苦眠臥不安地骨皮二兩栝蔞根一兩石膏二兩黃連一兩甘草二兩炙微赤上為散每服四錢以水一中盞煎至六分去滓不計時候溫服之順氣散出濟生拔萃治消中者熱在胃而能飲食小便黃赤以此下之不可多利微利至不欲食而愈厚朴一兩制大黃四錢枳實二錢上銼水煎五錢食遠服姜粉散出危氏方治消中多因外傷脾熱內積憂思喜啖鹹食至脾胃乾燥飲食倍常不生肌膚大便反堅小便無度生薑研粉控汁輕粉上搜勻每服二錢長流水調下齒浮是效投豬肚丸補黃柏丸出聖濟總録治消中黃柏二兩去粗皮黃連半斤上為末用酥拌和搗三百杵丸梧桐子大每服三十丸溫漿水下豬肚黃連丸出直指方治久消渴變為消中者飲食到胃即時消化小便多而色白所食多而不覺飽者豬肚一枚洗去脂膜不切破黃連五兩搗羅為末上以大麻子仁二合爛研水四升調如杏酪汁煮豬肚候爛取出入黃連末在內密縫肚口蒸令極爛乘熱細切和黃連末以木臼搗可丸如梧桐子大曝乾每服三十丸溫水下不拘時神效散出聖惠方治消中渴不止心神煩熱皮膚乾燥宜服此浮萍草三兩乾者土瓜根一兩半上為散每服二錢以牛乳汁調下不計時候菟絲子丸出指南方治精血枯竭肌肉消瘦發渴菟絲子洗淨酒浸炒乾上為末蜜丸梧桐子大每服五七十丸米飲吞下為末調服亦得一方煎菟絲子湯下又方蜜合面糊丸治消中日夜尿七八升者出千金方鹿角炙上為末以酒服五分匕日二漸加至方寸匕又方出千金方漚麻上搗汁服一升佳豬肚丸治強中消渴服石子薺苨湯瘥退可服此補養治消中日夜尿七八升出千金方用葵根如五升盆大兩束外臺云五十斤以水五斗煮取三斗宿不食平旦一服三升即冬葵俗呼葵菜蓯蓉丸出指南方治消渴蓯蓉五味子山茱萸各等分上為細末煉蜜丸如梧桐子大每服三十丸用鹽酒飲下栝蔞散出聖濟總録治內消肌膚羸瘦或轉筋小便利甚栝蔞根黃連去須防己銼鉛丹研各一兩半上為散與鉛丹和勻每服二錢用醋半合沸湯調下日二夜一黃連豬肚丸出危氏方治強中渴服栝蔞根散薺苨湯後便可服此亦能補養豬肚一枚治如食法黃連去須小麥炒各五兩天花粉茯神去木各四兩麥門冬去心上為末納豬肚中縫塞安甑中蒸之極爛木臼中杵可丸如梧桐子大如不能丸入少煉蜜每服七十丸米飲送下隨意服之茱萸丸出十便良方其人素渴引飲一旦不渴小便日夜數十行氣乏肉消謂之消中宜服此藥蓯蓉五味子山茱萸乾山藥上件藥等分搗羅為細末以酒煮麵糊為丸如桐子大每服三十丸空心米飲下止渴潤燥湯出鮑氏方治消中大便祕澀燥硬兼喜溫飲陰頭退縮舌白唇口乾燥眼澀黑處如見浮雲升麻一錢半柴胡七分甘草二分黃柏一錢酒浸知母一錢石膏七分杏仁六枚桃仁泥一錢麻仁泥一錢當歸身八錢紅花少許防風根三錢荊芥穗一錢熟地黃三分小椒二分細辛一分上㕮咀都作一服水二碗煎至一盞去滓食後溫服忌辛熱物清涼飲子一名生津甘露湯出試效方治消中能食而瘦口乾舌乾大便燥結小便頻數羌活一錢柴胡一錢升麻四錢防風五分當歸身六分生甘草五錢炙甘草一錢石膏一錢半知母一錢酒浸漢防己五分草龍膽酒製一錢五分黃柏一錢五分紅花少許桃仁五枚杏仁十枚生地黃酒製五分黃耆一錢黃芩酒製一錢上㕮咀如麻豆大都作一