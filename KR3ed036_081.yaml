body:
  text: 卷八十一眼目門目昏暗附論夫目昏暗之疾其候有二肝氣不足則血弱腎氣不足則精衰血弱精衰不能榮養於目漸致昏暗又云眼者五臟六腑陰陽之氣皆上注於目若血氣充實則視分明若精血虛竭則風邪所侵故令昏暗不明也龍木論云肝風目暗內障此眼初患之時朦朧昏暗並帶赤痛內無翳膜此是腎臟虛勞肝氣不足眼前多見花發數假形狀或白或黑或黃或赤如此患者切忌房事過多如夜看經書亦令失明也見一物兩形難辨後赤痛變為青盲急補治五臟宜服補肝散山藥丸立效歌曰朦朧遠視不分明赤痛全無黑白睛淨下令肝虛元氣眼前花發數般形權時辭卻陰陽事經書裁縫且暫停不是醫家穿鑿説古來聖者記章程有時一物睹為二心緒多饒忘與驚志服車前丸及散免憂久後變青盲方還睛神明酒出聖濟總録治眼昏暗及內外障失明黃連去須五兩石決明草決明生薑石膏黃硝石蕤仁秦皮山茱萸當歸黃芩去黑心沙參朴硝甘草炙芍藥澤瀉桂去皮薺苨車前子淡竹葉柏子仁防風去叉烏頭去皮臍辛夷人參芎藭白芷瞿麥穗桃仁去皮尖雙仁炒細辛地膚子各三兩龍腦三錢丁香二錢真珠二十五顆無孔者上㕮咀絹囊盛用好酒五斗甕中浸之春夏一七日秋冬二七日食後服半合勿使醉吐稍稍加之百日後目明如舊惟不治枯損睛破者但黑白不損服此藥更生瞳子平復如故補肝丸出龍木論一名羊肝丸治眼暗青葙子桂心葶藶子茺蔚子杏仁細辛枸杞子五味子各一兩茯苓黃芩防風地膚子澤瀉決明子麥門冬蕤仁各一兩車前子菟絲子各二兩兔肝一具用白羯羊肝一具瓦爆乾地黃三兩一方用熟者一兩半上為末煉蜜丸如梧桐子大每服二十丸再加至三十丸或溫水下日三服不拘時聖餅子出聖濟總録治眼昏暗視物不明黃芩去心蒼朮各一兩菊花木賊旋覆花蟬蛻防風去叉草決明青葙子甘草炙銼蔓荊實惡石炒羌活桑葉𦯶子芎藭真珠研各半兩蛇蛻皮半兩鹽泥固濟瓶子燒之有翳即用上為末煉蜜和就杵藥三五百下丸如小彈子大捏作餅子每服一丸食後湯水嚼下砂糖水下亦得決明散出御藥院方治眼目昏花遠視不明川芎井泉石仙靈脾槐花各一兩蛤粉水飛防風石決明水飛甘菊荊芥羌活蒼朮米泔浸去皮地骨皮杜蒺藜炒木賊去節薄荷甘草炙各一兩川椒二錢半炒黃芩上為末每服二錢熱茶清調下食後日二服青葙子丸出聖惠方治肝風多淚眼目昏花青葙子甜瓜子仁菟絲子酒浸三日曝乾別杵為末面曲炒令微黃烏梅肉微炒桂心蔓荊子決明子牡荊子茺蔚子枸杞子螢火蟲微炒翅足地膚子柏子仁各一兩川大黃二兩銼碎微炒蕤仁二兩湯浸去赤皮細辛二兩白蒺藜微炒去刺上為末煉蜜和搗三五百杵丸如梧桐子大每服不計時候以溫酒下二十丸蟬花散出聖濟總録治一切眼疾昏暗蟬蛻柏子仁郁李仁去皮甘草炙銼大黃銼炒延胡索遠志去心密蒙花石葦去毛槐樛防風去叉各一兩甘菊花旋覆花蛇蛻微炒炙焦乾蠍炒烏賊魚骨去甲草荼芽各半兩上為散每服一錢米飲調下食後日三纍經效忌動風物撥雲退翳丸治一切眼目不明楮實薄荷各半錢川芎一兩半當歸一錢半黃連甘菊花蟬蛻各五錢栝蔞根生用六錢蔓荊子炒一兩密蒙花荊芥穗蛇蛻曬乾甘草香白芷木賊草防風各三錢上為細末煉蜜丸如梧桐子大每兩作十丸每服一丸日進二服治眼引子於後氣障眼煎木香湯送下眼常昏暗茶清湯下眼睛青盲當歸湯下婦人血暈眼亦當歸湯下磁石丸出聖濟總録治腎勞眼目昏暗磁石火煅醋淬一十遍車前子各三兩羚羊角鎊茯神去木防風去叉牛膝酒浸切焙菟絲子酒浸一宿山芋山茱萸覆盆子白茯苓去黑心檳榔煨銼枸杞子芎藭各一兩半熟乾地黃焙二兩甘菊花一兩上為末煉蜜為丸如梧桐子大空心煎黃耆湯下四十丸還睛丸治眼目昏翳蟬蛻洗曬蒼朮童便浸二宿焙熟地黃洗焙白蒺藜炒杵去刺各三兩川芎一兩茺蔚子羌活木賊去節童便浸一宿曬乾甘菊花荊芥杏仁去皮尖焙石決明煅存半生菟絲子酒浸焙研蛇皮酒浸洗淨焙防風各半兩上為末煉蜜和丸如彈子大每服一丸食後細嚼茶下冬瓜子散出聖惠方治眼昏暗漠漠不明冬瓜子一兩青葙子牡荊子地膚子蔓荊子決明子車前子茺蔚子白蒺藜微炒去刺柏子仁桂心櫻薁根蕤仁湯浸去赤皮菟絲子酒浸三日曝乾搗為末細辛各三分上為細散不計時候以溫水調下一錢五味子丸出醫方大成治心肝二經蘊積風邪並腎臟虛耗眼目昏暗或生翳膜阿膠蚌粉炒熟地黃洗各一兩白茯苓去皮麥門冬去心各半兩山藥五味子貝母柏子仁人參各一兩百部茯神去皮木遠志去苗取根上皮防風去蘆杜仲去皮二兩薑汁浸炒去絲上為細末煉蜜丸如彈子大每服一丸食後薑湯嚼下補肝丸主明目地膚子藍子蒺藜子車前子瓜子菟絲子青葙子茺蔚子各二兩決明子五合細辛桂心螢火蟲各五分大黃八分黃連六分上搗羅蜜和為丸如梧桐子大米飲服十五丸日三加至三十丸忌熱面生冷酢滑油蒜豬雞魚蕎麥黃米生蔥生菜地膚子丸出聖惠方治眼補肝祛暗明目能令遠視地膚子白蒺藜微炒去刺青葙子決明子黃連去須覆盆子菟絲子酒浸三宿曝乾別搗為末各三分茺蔚子藍子各一分螢火蟲炒去翅足各一分車前子甜瓜子細辛各半兩生乾地黃一兩上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒送下二十丸治眼暗方出千金方古錢十枚銅青乾薑石鹽胡粉菥蓂子各中棗大烏頭棗核大黃連三銖細辛五銖蕤仁一百二十枚酢二合清酒五合楸葉一把取汁上治篩合煎取三分去一盛瓷器中若燥取人乳和敷目慎風冷天雄散出聖濟總録治目昏暗眩轉倒僕或三兩日卻明發動無定久成青盲天雄炮裂去皮臍山茱萸人參芎藭白朮遠志去心獨活去蘆頭桂去粗皮葛根茯神去木莽草各半兩防風去叉三分山芋三兩上為散每服一錢空心甘菊花酒調下食後再服日三漸加至二錢兔肝丸出聖惠方治肝腎氣虛眼目昏暗久視無力兔肝炙二兩川大黃二兩半銼碎微炒防風去蘆頭玄參車前子茯神龍齒各一兩決明子地骨皮各三分枳殼麩炒微黃去瓤甘菊花苦參各半兩麥門冬一兩半去心焙上為末煉蜜和搗三二百杵丸如梧桐子大每於食後以溫漿水下二十丸山芋丸出聖濟總録治眼視不明䀮䀮昏暗補不足山芋巴戟天去心菟絲子酒浸切焙別搗肉蓯蓉酒浸切焙山茱萸人參陳曲炒牛膝酒浸切焙杜仲去皮炒炙續斷各一兩半桑寄生生乾地黃焙各三兩上為末煉蜜和丸如梧桐子大每服二十丸漸加至三十丸空腹酒下補腎丸出醫方大成治腎氣不足眼目昏暗瞳仁不分明漸成內障五味子熟地黃酒浸蒸枸杞子楮實子覆盆子酒浸肉蓯蓉車前子酒蒸石斛去根各一兩青鹽半錢別研沉香半錢別研磁石煅醋淬七次水飛菟絲子淘淨酒浸蒸別研各二兩上為細末煉蜜為丸如梧桐子大每服六七十丸空心鹽湯下當歸丸出危氏方治頭疼腦虛眼昏睛朦犀角人參白朮當歸芍藥木香茯苓丁香牛膝酒炒肉蓯蓉天麻各半兩腦麝少許上為末好酒三升生羊膽一枚熬成膏丸如梧桐子大每服三十丸麝香酒下青葙子散出聖濟總録治年深日近目視昏暗青葙子烏賊魚骨各二兩羌活去蘆頭防風去叉甘草炙各一兩石決明二兩半荊芥穗一兩半蒼朮米泔浸去皮焙三兩半蠶蛻蟬蛻蛇蛻皮此三味各一兩入盒子實填赤石脂固濟盒子口勿令煙出炭火燒之令通紅上為散每服一錢茶酒調下食後臨臥服決明子散出聖惠方治肝臟風熱眼目昏暗隱澀疼痛決明子甘菊花青葙子羚羊角屑芎藭犀角屑玄參黃芩茯苓梔子仁各一兩甘草半兩炙微赤銼上為散每服四錢水一盞入竹葉七片煎至六分去滓食後溫服空青丸出聖濟總録治目昏暗益血脈鎮肝空青研三兩羚羊角鎊茯神去木馬蹄決明子枳殼去瓤麩炒大黃炒青葙子地膚子龍膽車前子各一兩半黃連去須一兩一方用三兩上搗研為末煉蜜和丸如梧桐子大每服二十丸食後米飲子下日再服茯神湯出聖濟總録治眼昏暗將成青盲茯神去木山芋遠志去心肉蓯蓉去粗皮酒浸切焙地骨皮蔓荊子青葙子羚羊角鎊甘草炙各半兩人參甘菊花各三分上粗搗篩每服三錢以水一盞煎至七分去滓食後臨臥服日再服決明丸出聖濟總録治眼目風毒昏暗草決明湯洗三遍曬乾菥蓂子甘草炙細辛川芎甘菊花荊芥穗旋覆花蒼朮河水浸切作片曝乾木賊各等分上為細末煉蜜為丸如櫻桃大每服一丸細嚼茶酒下不計時候瀉肝湯治臟中痰實熱沖眼目昏暗苦竹根八兩半夏四兩洗干藍茯苓枳實炙白朮各三兩乾地黃細辛甘草炙各二兩杏仁一兩去皮尖熬上切以水一斗二升煮取二升七合分三服忌羊肉餳酢物海藻菘菜生菜蕪荑菜桃李雀肉等羚羊角湯出聖濟總録治頭眩眼暗欲成青盲羚羊角鎊二兩羌活去蘆頭黃芩去黑心防風去叉玄參各一兩半細辛去苗葉半兩車前子決明子升麻人參各一兩半上粗搗篩每服三錢水一盞煎至七分去滓食後臨臥服之日二次羌活散出聖濟總録治風毒目昏暗退翳膜羌活去蘆頭防風去叉楮實蒺藜子炒去角芎藭甘草炙銼各一兩蒼朮米泔浸焙荊芥穗菊花各二兩上為散米飲調下一錢日三磨光散出直指方治諸風攻眼消磨翳膜除昏防風羌活甘菊甘草鹽水炙草決明蟬蛻去足沙苑蒺藜羯羊腎慢火炒杵去刺石決明搗碎細研水飛過川芎蛇皮剪碎和麻油新瓦上炒各半兩上為末每服一錢半用麥門冬去心煎湯調下食後臨臥服四物五子湯出仁存方治心腎不足眼目昏暗當歸酒浸川芎熟地黃白芍藥覆盆子枸杞子地膚子菟絲子酒浸炒車前子酒蒸以虛實加減各等分上為末煉蜜如梧子大每服五十丸鹽湯下不以時治腎經虛冷水候不升不能上蔭肝木致令眼目昏暗或赤澀痛癢無時出醫方大成川芎荊芥天麻茯苓川烏烏藥金叉石斛牽牛當歸各等分上為末煉蜜丸如豆大硃砂為衣每服一丸薄荷茶嚼下決明子散出聖惠方治眼昏暗祛風止淚決明子地膚子細辛白芷桂心車前子各三兩柏子仁防風去蘆頭二兩川椒四兩去目及閉口者微炒去汗上為細散每於空心及晚食前以溫酒下二錢蔓荊子丸出聖惠方治眼昏暗不能遠視蔓荊子五味子枸杞子地膚子青葙子決明子楮實水淘去皮微炒茺蔚子菟絲子酒浸三日曬乾為末各一兩上為末煉蜜和搗三二百杵丸如梧桐子大每於空心以溫酒下二十丸晚食前再服之磁石丸出聖惠方治肝腎氣虛眼目昏暗四肢無力磁石三兩燒赤醋淬七遍搗碎細研水飛過菟絲子三兩酒浸三日曝乾別研為末桂心黃耆銼羚羊角屑車前子薯蕷各一兩細辛半兩熟乾地黃一兩半上為末煉蜜為丸如梧桐子大每日空心以溫酒下三十丸加至四十丸治眼昏暗不明視物不快大腑熱小便赤宜服此方出護命方玄參黃芩甘草密蒙花山梔子麻黃去根羌活菊花白蒺藜去刺各一分上為細末臨臥時熱湯調下一錢半治眼暗及風赤眼癢方極良出肘後方煎白鹽三匙烏錢四枚上以清醋漿四升煎取二升澄清每旦及晚洗眼亦去膚肉單鹽漿汁洗之亦佳青葙子丸出聖濟總録治氣毒攻注目昏澀疼青葙子牡丹皮去心地骨皮杜仲蜜炙焦黃芎藭各半兩赤芍藥黃連去須各一兩地龍去土一分上為末煉蜜和丸如彈子大每服一丸細嚼茶清下食後服生犀飲子出龍木論治目昏暗犀牛角鎊桔梗各二兩羚羊角鎊人參去蘆頭茯苓去皮黃芩知母防風各一兩上為末每服一錢水一盞煎至五分食後去滓溫服金髓煎丸出御藥院方治眼目昏花遠視不明久視無力常服滋血益水去風助目力杏仁半斤去皮尖炒黃黑為末用紙三兩層裹壓去油又易紙令油盡如粉方用防風去蘆頭枳殼金叉石斛去根銼牛膝切酒浸焙乾當歸各四兩生乾地黃熟乾地黃各一兩上用石臼中搗為末煉蜜和丸如梧桐子大每服四五十丸空心溫酒下粥飲下亦可養肝丸出仁存方治肝血不足眼目昏花或生眵淚久視無力地黃湯出護命方治眼昏澀因病發而久不愈者防風羌活黃芩黃連地黃當歸人參茯苓各等分上為粗末每服五錢水盞半煎至一盞食後溫服天麻丸出聖濟總録治偏正頭疼毒風攻注眼目腫痛昏暗及頭目眩暈起坐不能天麻一兩半附子炮裂去皮臍半夏湯浸七遍去滑各一兩荊芥穗木香芎藭各半兩桂去粗皮一分上為末入乳香勻研和水滴為丸如梧子大每服五丸漸加至十丸茶清下日三聖明散出聖濟總録治肝腎不足眼目昏暗羌活去蘆頭青鹽各半兩惡實蜀椒去目及閉口者炒出汗荊實木賊蒼朮米泔浸一宿切焙各一兩上為細末每服二錢水一盞煎至五分去滓食後溫服艾煎方出聖濟總録治眼昏暗熟艾二兩好醋二升熟銅末一分蕤仁黃連去須石鹽各一兩楸根白皮一兩半無根者亦得上搗研六味為末安於醋中煎取三合去滓收汁於熟銅器中入鯉魚膽烏雞膽各一分和勻用槐木去皮闊三指長一尺向日中研藥勿住手候如餳即止夜點眼眥頭避風日中不點熱淚中出勿怪羚羊角飲出聖濟總録治眼不見物羚羊角鎊菊花羌活去蘆頭各三分漏蘆去蘆頭玄參胡黃連升麻各半兩上粗搗篩每服五錢以水一盞半煎至八分去滓食後溫服日二次主眼湯去熱氣漠漠視物不見秦皮黃柏皮蕤仁各三分細辛二分茺蔚子三分黃連四分古銅錢七枚上切以水二升煮取八合平旦洗目忌生菜補益豬腎丸出聖濟總録治眼目昏暗附子炮裂去皮臍黃耆切酒浸焙牛膝切酒浸焙各一兩肉蓯蓉切酒浸焙黃蠟各半兩蜀椒去目及閉口者炒出汗白蒺藜炒各三分上除蠟外為末用豬腎一對蔥白五莖各細切依法酒炒乘熱入蠟令熔盡搗爛搜和藥末丸如梧子大每服二十丸空心食前鹽湯下之地黃丸出聖濟總録治目昏暗地黃二斤一斤生曝令乾一斤於甑中炊一頓飯間取出曝乾防風四兩杏仁半斤去皮尖炒黑色並加以紙三兩重裹壓去油換紙壓可四五度令如粉金叉石斛牛膝枳殼麩炒去瓤各四兩上為細末煉蜜和丸如梧子大每服三十丸空心用無灰豆淋酒下海上方出危氏方治眼昏不見物冷淚浸淫及青盲天行後一切眼疾以西國草一名畢楞伽一名覆盆子曝乾搗令極爛薄綿裹之以人乳汁中浸如人行八九里久用點目中即仰臥不過三四日視物如少年禁酒油麵或用葉自然汁以新筆蘸點之一方加腦子少許尤佳聖餅子治眼目昏花木賊甘草甘菊花川芎川椒連翹各一兩上為細末煉蜜丸如彈子大每服一丸食後茶清細嚼神效柴胡散出濟生拔萃明目益腎水柴胡羌活防風生地黃芍藥甘草各等分上㕮咀水煎臨臥服之青葙子丸主眼風暗有花青葙子槐子覆盆子地膚子菥蓂子車前子各三分上搗篩煉蜜為丸如梧子大日服十五丸忌五辛豬雞牛羊肉魚蒜面酢等物甘菊花丸出衛生家寶方治男子腎臟虛弱眼目昏暗或見黑花常服明目暖水臟活血注顏壯筋骨甘菊花二兩去土枸杞四兩熟地黃三兩乾山藥半兩上為細末煉蜜和丸如梧子大每服三五十丸空心食後各一服溫水送下決明子丸出聖惠方治肝明目祛風除暗決明子槐子覆盆子地膚子青葙子車前子各一兩上為末煉蜜和搗三二百杵丸如梧子大每空心以溫酒下二十丸晚食前再服之芎藭散出聖濟總録治眼目昏暗芎藭菊花荊芥穗石膏各一兩甘草炙半兩上為散每服二錢溫水調下食後臨臥服甘菊花散一名菊花散出聖濟總録治肝腎風毒氣衝目腫痛昏暗治眼漠漠無所見方出千金方蕤仁秦皮黃連各十八銖螢火蟲七枚決明子一分上㕮咀以水八合微火煎取三合冷以綿注洗目日三度杞苓丸專治男子腎臟虛耗水不上升眼目昏暗遠視不明漸成內障白茯苓八兩去皮真枸杞四兩酒浸蒸當歸二兩酒洗青鹽一兩別研菟絲子一兩酒浸蒸上為細末煉蜜為丸如梧桐子大食前湯下七十丸神聖眼藥一名太乙膏治眼目昏花點眼藥出濟生拔萃除昏退翳截赤定疼當歸二兩黃連一兩防風一錢半生甘草一錢細辛半錢上銼以水一大碗文武火熬滴水中不散為度去沫入熟蜜少許點用之車前子丸出聖惠方一名駐景丸治眼目昏暗宜服補肝明目兔肝丸出聖濟總録治肝虛目暗黃連洗一兩半去須熟乾地黃焙胡黃連各一兩草決明半兩上為末細切兔肝研爛和丸如梧子大每服二十丸米飲下食後臨臥服龍膽煮散出聖濟總録治頭注目昏暗龍膽細辛去苗葉人參防風去叉各半兩上為散每服二錢水一盞砂糖少許同煎至六分溫服甘石膏出瑞竹堂治眼昏花視物不明爐甘石研代赭石煅醋淬七次研黃丹各四兩水飛過白沙蜜半斤上將二石研為極細末次與黃丹和合用銅鍋將蜜煉過去白沫更添水五六碗熬沸下前藥以文武火熬至一碗用銅器攪拭將藥滴水中沉下為度方可住火熬成用夾紙四重濾過用淨磁器盛貯密封不要透下塵土恐點時隱眼昏花不時點之治眼不見光明蟬蛻白蛇蛻木賊去節各一兩生薑一斤去皮為細末上為細末煉蜜和丸如彈子大每一料分作三十丸服一月茶清臨臥時服之苓朮丸出聖濟總録治肝腎久虛眼目昏暗視物不明變成內障蒼朮米泔浸秋冬七日春夏三日去皮切作片子焙乾研羅為末三斤白茯苓去黑皮為末二斤蜀椒去目及閉口者炒出汗為末一斤上拌和勻用蜜煮麵糊為丸如桐子大每服三十丸至五十丸溫熱水下不拘時日三服補肝散出千金方治目失明漠漠不見青羊肝一具去膜薄切以新瓦瓶子淨拭納肝於中炭火上炙之令極干汁盡為末決明子半升蓼子一合炒令香上治篩以粥飲食後服方寸匕日二稍加至三匕不過兩劑能一歲服之可夜讀細書一方酒和丸如梧桐子大每服三十丸食前米飲下七寶散出御藥院方治目不明昏澀難開南爐甘石一斤用木炭火燒令熟為細末枯白礬一錢黃連三兩去須揀淨銼碎用水一大碗煎三五沸絹濾去滓上將黃連水於前項爐甘石末內用紙糊三兩重坐於灰池內滲令乾次用枯白礬一錢同研為細末每點一黃米大於大眥頭漸加至緑豆許每日只點一度治目昏出神效方荊芥穗地骨皮楮實各等分上為末煉蜜為丸如梧子大每服二十丸米飲湯下夜光丸出醫方集成一名雙美丸治眼方治眼目昏暗及諸疾兼退翳膜蜀椒去目及閉口者炒出汗一斤半搗取末一斤甘菊花末一斤上和勻取肥地黃十五斤切搗研絞取汁八九升許將前藥末拌浸令勻曝稍干入盤中攤曝三四日內取干候得所即止勿令太燥入煉蜜二斤同搗數千杵丸如梧子大每服三十丸空心日午熟水下久服目能夜視發白再黑通神強志延年益壽一方用熟地黃二兩酒浸九蒸九曝食後細嚼新折米十粒送下或用茶清下亦得治目猝無所見出肘後方以錢於石上磨汁注眥中又方出肘後方以黃土著水中攪令濁以洗眥中良真珠煎治肝虛寒茫茫不見物真珠研細一分鯉魚膽二枚白蜜二兩上合和銅器中微火煎取一半新綿濾過瓷瓶中盛每以銅箸點如黍米大著目眥中即淚出頻點取瘥地膚子散出聖惠方治眼熱目暗地膚子枸杞子營實各二兩上為細散每服不計時候以溫酒調下二錢車前子散治目受風熱昏暗乾澀隱痛車前子黃連去須各一兩要宣州者上為散每服三錢食後溫酒調下臨臥再服黑豆丸出聖惠方治肝腎風虛目暗黑豆堅小者牛膽上量膽大小淨擇豆布擦過納牛膽中緊繫頭垂淨屋下陰乾每日食後熟水下二七粒治眼暗赤冷淚方出千金方蕤仁波斯鹽上等分治篩以驢生脂和每夜敷目四角以一粟大密室中將息一月瘥忌五辛失明者三十日敷之柴胡散出千金方治眼暗柴胡六銖決明子十八銖上治篩人乳汁和敷目可夜書見五色合德丸補虛活血健骨輕身聰耳明目除昏蒼朮去皮米泔浸二日薄切曬乾四兩地黃熟者細切焙乾二兩上為細末酒糊為丸如梧子大每服三五十丸溫酒或米泔下食前日進三服點藥出危氏方治暑熱行路昏澀者黃連三寸切搗爛生龍膽草汁一合上用生絹捩出汁點入目中葈耳粥治眼昏暗葈耳實一升白米半升上先搗羅葈耳實為散水調濾取汁和米煮作粥如常法空心服之蕪青子粥治眼昏暗蕪青子一合米三合上將蕪青子九遍研以水調濾取汁和米煮作粥空心食之地膚子散出聖惠方治男子五勞七傷明目兼治肝虛目昏補肝蔓荊子散出聖惠方治眼補肝氣明目延年益壽蔓荊子一斤以水淘淨黃精二斤和蔓荊子九蒸九曝乾上為細散每空心以粥飲調下二錢日午晚食後以溫水調服決明子散出聖惠方治眼補肝除暗明目決明子一升蔓荊子二升用好酒五升煮盡曝乾上為細散每服以溫水下二錢食後及臨臥服槐子丸治眼熱目暗槐子黃連去須各二兩上為末煉蜜丸如梧子大每於食後以溫漿水下二十丸夜臨臥再服治勞傷肝氣目暗明目方螢火蟲十四枚白犬膽一枚上陰乾為細散每取如黍米大點之椒沉丸治目黑暗暖水臟沉香一兩椒去目及閉口者炒出汁四兩上為末無灰酒煮麵糊為丸如梧子大每服三十丸空心鹽湯下治目不明淚出方以烏雞膽臨臥敷之一方日三五度點之治眼暗方以銅器盛大酢三四升煎七八日覆器濕地取銅青一合以三月杏白仁一升取汁和銅青敷之日不過三四度大良參附大正氣散治男子婦人眼昏暗不生眵糞此是元氣憊腎經虛夜間小便二三次耗傷腸氣致生內障腦中有風或鼻流清涕或腦脂流下或瞳仁開闊皆腎脾憊黑水散也用參附大正氣散加枸杞子去梗炒揀菊花蕊同薑棗煎八分盞去滓食前空心服合滓煎仍服錦鳩丸青鹽丸山藥丸八味丸打和食前溫酒服及四柱散十味正氣散十全大補湯去熟地黃加附子枸杞子菊花蕊薑棗煎服婦人服冷藥過多或崩或白帶致令眼昏不見亦可服前藥急救治眼暗方以七月七日生苦瓠中白絞取汁一合以酢一升浸古文錢七枚微火煎減半以米許納眥中又方以黃柏爪甲許每朝含使津置掌中拭目訖以水洗之至三百日眼明此法可終身行之永除眼疾治暑月行路目昏澀多眵黏者生龍腦薄荷五七葉洗淨手揉爛上用生絹捩汁滴入眼中妙治眼目昏暗取桑樹老皮燒灰用水煎七分去滓澄清洗一周年如童子眼光明並開洗眼日於後五月初八日二月初十日三月初五日四月初八日五月初八日六月初七日七月初七日八月初三日九月初十日十月初九日十一月初八日十二月二十二日又方用朴硝六錢重用水一盞煎八分候冷定澄清下次分定每月一日洗至一年之間眼如童子光明正月初一日二月初八日三月初四日四月初五日五月初五日六月初四日七月初五日八月初一日九月十三日十月十三日十一月十六日十二月初五日眼藥方用椿樹上鳳眼草燒灰每洗頭髮用灰一錢放頭上一周歲正月初二日二月初八日三月初一日四月初七日五月初七日六月初十日七月初七日八月初二日九月十三日十月三十日十一月初一日十二月十三日治淚冷目昏以乾薑肥者為末每用一分沸湯點洗退熱明目方以千里光與甘草煮作飲服治眼暗補不足方以蔥實大半升為末每服取一匙頭水二升煮取一升半濾去滓葺米作粥食良久食之又一方搗蔥實蜜和為丸如梧子大食後飲汁服一二十丸日二三服亦甚明目青羊肝方治眼昏暗不見物者以青羊肝切淡醋食之亦佳青魚膽方出龍木論治目昏用青魚膽汁滴目中主令明目方出十便良方以三月中杏仁研脂絞汁一升石鹽兩大豆大銅器盛之取銅古錢二十七文浸之二七日綿注眼中夜用洗眼延年令明目方以波津香黍米一粒納目眥中當有水出並目中習習然引風出此即明之候也須以日申時敷之若似痛以冷水洗之即定以中敷藥者為其目至日下便漠漠然暗如有物也即以藥納眼中淚出以熟帛拭之以水洗訖便豁然明也此香以單主百病服之益人勝石乳也本云是外國有之明目甚驗天竺沉香中出此決明散出聖惠方療失明或三四歲拭目中無他疾無所見如絹中視物以馬蹄決明二升搗篩以粥飲服方寸匕忌魚蒜豬肉辛菜蕪菁子散出龍木論常服明目補肝肥腸蕪菁子三升淨淘以清酒三升煮令熟曝乾搗治下篩以井華水和服方寸匕稍加至三匕無忌可少少作服之令人充肥並明目洞視以煮酒服亦可千金翼同用水煮三易水一方用苦酒又方出千金方用胡麻一斗蒸三十遍治下篩每日酒服一升又方出千金方服小黑豆每日空心吞二七粒徹視散出千金方常服明目以三月三日採蔓荊花陰乾治下篩空心井華水服方寸匕久服長生明目可夜讀細書亦治虛勞眼暗一方用蔓荊二升淘令淨蒸曝三五遍為細散清粥飲下一錢日三四度治男子五勞七傷明目補肝出千金方用冬瓜子七升絹袋盛攪沸湯中三五遍將曝乾以醋五升浸一宿曝乾治下篩酒服方寸匕日三服之百日可夜寫細書治勞傷肝氣目暗明目方出聖惠方用螢火蟲三七枚以鯉膽二枚納螢火蟲於膽中陰乾百日搗為末每以少許點之極妙又方出聖惠方用車前十兩為細散用蜜調和蒸令熟香每於食後以清粥飲下如彈子大又方出聖惠方用菟絲子三兩酒浸三日曝乾為末雞子白和丸如梧子大每服空心以溫酒下三十丸又方出聖惠方用鷹眼睛一對炙乾搗末研令極細以人乳汁和再研每以銅箸取少許點於瞳仁上日夜三度可以夜見物或取臘月鴝鵒眼睛依上法用效三日見碧霄中物忌煙熏石決明丸出聖惠方治眼視物漠漠如隔絹看物石決明搗碎細研水飛過車前子羚羊角屑各三兩黃連去須菥蓂子各一兩秦皮細辛蕤仁湯浸去赤皮甘草炙各半兩上為末煉蜜和搗三二百杵丸如梧子大每於食後以溫水下二十丸治冷淚昏暗出儒門事親密蒙花甘菊花杜蒺藜石決明木賊去節白芍藥甘草上各等分為細末茶清下一錢服半月後加至二錢消風散出危氏方治眼風癢昏澀用頭風門內消風散以荊芥湯調下治頭風注目昏暗出海上方芝麻淨六兩槐實淬四兩微炒椒紅淨二兩去汗上將槐實椒紅為細末次入芝麻攪勻每服三錢就唾津咽之服至九日云膜遮障者用叉股撥之隨手而下合定再服效金絲膏出直指方治一切目疾昏暗如紗羅所遮或疼或痛宣黃連半兩銼碎水一盞浸一宿取汁再添水半盞浸滓經半日取汁與前汁合放別用水半盞蜜一兩白礬一分井鹽一分如無以青鹽代之山梔子二錢好者捶碎黃連汁同煮五十餘沸取盡沫濾去滓與前黃連汁一處和入余藥上用銀瓷器內熬十餘沸用生絹上細紙數重濾過用時常點黃連洗湯療眼漠漠黃連秦皮各二兩蕤仁半兩上㕮咀水三升煮取一升半去滓適寒溫以洗目日四五度又加升麻二兩加水煎之忌豬肉一方搗碎以綿裹於銅器中用乳汁一合半浸一復時濾去滓每日三五度點眼眥頭春雪膏治風熱上攻眼目昏暗癢痛隱澀難開多淚羞明時發疼痛或生翳膜衛生寶鑑云豫從軍徵南數年有病眼者此一方用之多效春雪膏上清散黃連四兩銼碎用童小便二升浸一宿去黃連用汁淬爐甘石用盡汁去石為末南爐甘石十二兩好丹六兩水飛烏魚骨燒存性三錢硇砂一錢研細水調去盞內放微火候乾乳香三錢當歸三錢麝香輕粉各少許白丁香半錢上件各為末另裹用白沙蜜一斤四兩煉去蠟先下爐甘石末不住手攪次下黃丹及諸藥末不住手攪至紫金色不黏手為度搓作梃子每用一粒新水少許磨化時時點洗之忌酒濕面豬肉蕎麥上清散出衛生寶鑑治上熱鼻塞壅頭目不清利川芎半兩石膏一兩盆硝一兩桔梗半兩荊芥穗半兩薄荷半兩上為細末每以一分口含水鼻內搐之神效加龍腦三分尤妙五烏丸出永類鈐方治老人婦人眼昏細辛何首烏烏藥各一兩川烏炮淮烏炮五月雄小烏豆防風粉草炙各半兩上以烏豆煮熟焙乾入衆藥同為末米糊丸如彈子大食後茶清嚼一丸菊青丸一名枸杞丸楊氏家藏方治眼目昏暗視物不明眵淚難開久服能夜看細書巴戟水浸去心一兩五味子三兩枸杞子揀淨四兩肉蓯蓉二兩酒浸一宿焙乾甘菊花五兩上件為細末煉蜜為丸如梧子大每服五十丸食前鹽酒送下一方無五味子用椒紅每服酒下二十丸久服明目活血防風荊芥散治風毒攻注眼目常多昏暗冷淚不止當歸洗川烏頭炮去皮臍羌活去蘆頭防風去蘆頭栝蔞根荊芥穗木賊去節以上七味各一兩甘草半兩炙烏賊魚骨一兩半上件為細末每服二錢茶清調下食後撥雲散治眼一切昏暗浮雲翳膜侵遮白蒺藜四兩去刺角全淨甘草生熟使防風羌活各一兩上以清明日水淨洗於日中曬乾勿令塵土入內杵羅為末不時煎湯洗明目去暗翳大利老眼得補益之方海鹽隨多少揀淨用瓷器盛以百沸湯泡去不淨濾取清汁於銀石器內熬取雪白鹽花用新瓦器盛每早用一大錢作牙藥揩擦以水攪動用左右手指背迎向口內點鹽津洗兩眼內大小眥頭閉目良久卻用水洗面名洞視千里此法明目堅齒極有妙效東坡手録目赤不可具湯浴並忌用湯炮足湯軀體中熱並集於頭目喪明必矣目見黑花飛蠅附論夫眼見黑花皆起於臟腑陽氣不實陰氣競生故也凡人陰陽安和精氣上注於目故能令目明也若肝膽勞傷氣血不足而更注目強視看讀細書勞動所傷承虛致患或有因患起早營衛氣虛恣食五辛而傷正氣保養既已失度眼目於此患生睹物或如飛蠅或如亂髮因茲歲久漸變多般黑白象龍蛇之形遠近如煙霧看物針藥宜補於五臟保養須在於十全不值良醫疾狀彌篤立成內障也聖濟總録論曰腎水也肝木也木得水而盛其理明也腎水既虛肝無以滋養故見於目者始則䀮䀮不能視遠久則昏暗時見黑花飛蠅其證如此腎肝可知也治宜以益水去風之劑則標本兩得矣方還睛散治眼見黑花昏暗獨活去蘆頭麻黃去根節白茯苓去黑皮厚朴去粗皮薑汁炙五味子槐子蒺藜子去角炒枸杞子菥蓂子麥門冬去心焙人參細辛去苗葉白芷決明子車前子茺蔚子覆盆子地膚子丹參芎藭防風去叉黃芩去黑心升麻各一兩一分黃連去須一兩一分遠志去心木通銼柏子仁各二兩上為細散以米飲調服方寸匕食後服日再或因飲熱酒食五辛致黑風入眼或因大病後昏暗或因赤眼不見物或因虛損視物不明但瞳子不曾破者皆可愈撥雲出聖濟總録治一切風毒眼見黑花攀睛翳暈瘀肉侵睛營實炒蒺藜子炒去角青葙子各一兩惡實一兩炒蔓荊實三升炒煮各一遍防風去叉菊花旋覆花甘草炙各二兩穀精草石決明地骨皮蟬殼木賊銼牡蠣燒各四兩烏賊魚骨去甲淡竹葉木通龍膽白花蛇酒浸去皮骨炙細辛去苗葉密蒙各二兩羌活去蘆頭一兩蒼朮去皮米泔浸一宿切焙半兩上為散生椒湯調下二錢婦人茶調下小兒疳眼雀目生米泔調下一錢腎臟風毒眼即加胡桃仁四兩蓯蓉散出聖濟總録治腎虛風上攻頭眩腦痛眼生翳或有黃黑花起如飛蠅及腰胯痠疼腳膝冷痹肉蓯蓉湯浸去皴皮焙乾一兩巴戟天去心檳榔煨銼萆薢麥門冬去心焙犀角鎊羚羊角鎊陟釐炒各半兩黃芩去黑心茺蔚子枸杞子人參玄參木香槐子決明子微炒丹參菟絲子酒浸一宿曝各三分上為散每服二錢空心溫酒調下臨臥時又用梔子湯調下二錢還睛丹出御藥院方治腎虛眼見黑花飛蠅或黑或白或紅久不已將變內障威靈仙揀淨青葙子揀淨去土巴戟去心蟬殼去土防風去蘆頭並叉密蒙花甘菊花揀淨旋覆花枸杞子天麻酒浸一宿焙乾地骨皮各二兩香白芷蛇蛻皮各一兩半用好酒浸一宿焙乾炒黃桑花營實炒香麻子水淘淨炒香各一兩蓯蓉酒浸一伏時切焙乾二兩上為細末煉蜜為丸如豌豆大每服五十丸空心食前溫酒白湯粥飲任下磁石湯出聖濟總録治肝腎風虛下元久冷眼生黑花或時昏暗補諸不足黃耆人參沉香芎藭桂去粗皮熟乾地黃肉蓯蓉酒浸去皴皮菖蒲當歸焙補骨脂炒羌活去蘆頭附子炮裂去皮臍覆盆子五味子乾薑炮各一兩磁石五兩杵搗生絹袋盛用水五升煎取二升半後去磁石方下諸藥煎之上除磁石外銼如麻豆大拌令勻每劑一兩半用大羊腎一對去脂膜細切用磁石水三盞煮羊腎令熟次下藥煎取一盞半去滓分作二服磁石丸出聖惠方治眼見黑花衝風淚出遠視不明蕤仁丸出聖濟總録治眼見黑花飛蠅癢痛昏暗漸變青盲蕤仁去皮地膚子石決明淨洗別搗羅人參細辛去苗地骨皮白茯苓去黑皮白朮各二兩楮實三兩空青別研如粉防風去叉各一兩半石膽半兩研如粉熟乾地黃三兩焙鯉魚膽五枚青羊膽一枚上除膽及研藥外細銼焙搗羅為末入研藥拌勻膽汁搜和煉蜜丸如梧子大每服二十丸食後臨臥米飲下日再服羌活散出聖濟總録治目視茫茫或見黑花蠅翅羌活去蘆頭甘草炙石決明生研密蒙花蒼朮去皮防風去叉蒺藜子炒木賊各半兩蔓荊子威靈仙去土干桑葉荊芥穗原蠶砂炒各六兩石膏研半兩煅紅上為散每服一錢食後溫熟水下眼赤澀砂糖水調下臨臥再服宿鳩丸出聖濟總録治肝腎氣虛眼生翳暈及見黑花宿鳩一隻去毛羽嘴腳腸胃炙黃羊肝一具清油炸定血去筋膜切作片子焙蔓荊子半升淘淨生絹盛飯上炊三遍蜀椒去目及閉口者炒出汗楮實仙靈脾羌活去蘆頭蟬殼去土以上各一兩木賊一兩半甘菊花去蕊荊芥穗蒼朮米泔浸去皮蒺藜子炒去角各二兩上為末煉蜜和丸如梧子大每服三十丸用溫酒或鹽湯送下不拘時服乾地黃丸出聖濟總録治腎虛眼見黑花診右手尺脈當沉而數是其候也熟乾地黃焙石斛去根銼黃耆銼防風去叉菟絲子酒浸三日曝乾別為末車前子茺蔚子肉蓯蓉酒浸一宿去皴皮焙覆盆子地膚子各一兩兔肝一兩半炙磁石醋淬七次一兩細研水飛過上為末煉蜜和勻再杵五百下丸如梧桐子大空心晚食前鹽酒送下三十丸兔肝丸出聖濟總録治肝腎毒風攻衝眼生黑花昏暗視物不見兔肝去筋膜薄切焙羌活去蘆頭黃連去須菊花各三分地骨皮龍腦車前子青葙子柴胡去苗防風去叉葳蕤白附子各半兩上為末煉蜜為丸如梧子大每服二十丸食後竹葉湯送下羚羊角丸出御藥院方治肺肝風熱凝滯見紅白黑花頭額偏疼漸漸昏暗不見物羚羊角屑一兩車前子決明子石決明搗細研水飛過犀角屑各三分獨活防風去蘆頭蔓荊子甘菊花吳藍子梔子仁甘草炙微赤銼以上七味各半兩上為細末煉蜜和搗三五百杵丸如梧子大每服二十丸食後溫漿水下日用二服熟乾地黃丸出聖惠方一名滋陰地黃丸治血弱陰虛不能養心致心火旺陽太甚遍頭腫悶瞳子散大視物發花當養血涼血益陰除風散火則愈矣熟乾地黃一兩柴胡八錢人參二錢當歸身五錢酒洗焙地骨皮三錢甘草炙三錢黃芩各半兩黃連三錢枳殼炒三錢五味子三錢天門冬三錢去心生地黃酒洗七錢半上同為細末煉蜜和丸如緑豆大每服一百丸茶清送下食遠日進三服忌食辛辣物而助火邪及食寒冷物損胃氣藥不能上行也防風湯出聖惠方一名羚羊角散治眼見黑花或眼暗漸變青盲防風去叉羚羊角鎊車前子各三分細辛去苗葉各三分甘草炙羌活去蘆頭黃芩去黑心人參決明子玄參甘菊花各半兩上粗搗篩每服三錢以水一盞煎至七分去滓食後溫服羌菊丸出聖濟總録治腎毒風攻衝眼生黑花風淚不止羌活去蘆頭菊花焙各一兩白茯苓去黑皮蒺藜子炒搗去角枳殼去瓤麩炒附子炮裂去皮臍黃耆銼各三分肉蓯蓉酒浸三分切焙沉香銼兔肝炙萆薢各半兩上為末煉蜜和丸如梧子大每服三十丸空心食前薄荷鹽湯送下摩頂膏出聖濟總録治肝腎虛風上攻眼生黑花或如水浪空青研青鹽研各半兩槐子木香附子各一兩丹砂研一分牛酥二兩鵝脂四兩旱蓮草自然汁一升龍腦半錢上為末先以旱蓮草汁牛酥鵝脂銀器中熬三五沸下諸藥末煎減一半即止盛瓷器中臨臥用舊鏵鐵一片重三二兩蘸藥於頂上摩三二十遍令入發竅中次服決明丸忌鐵器決明丸出聖濟總録治眼見黑花不散決明子甘菊花各一兩車前子薯蕷半兩去蘆頭蔓荊子半兩芎藭半兩梔子仁細辛白茯苓玄參防風各半兩生乾地黃二分上為末煉蜜和搗三二百杵丸如梧子大在食前桑枝湯下二十丸日三羚羊角湯出聖濟總録治眼見黑花或頭眩目暗欲變青盲眼瞳微開羚羊角鎊決明子人參升麻玄參車前子各一兩羌活去蘆頭防風去叉各一兩半細辛去苗葉半兩上銼如麻豆大每服三錢水一盞半煎至八分去滓溫服不拘時芎藭丸出聖濟總録治肝腎虛風上攻眼生黑花頭目不利內外障翳暗疼痛隱澀芎藭細辛去苗葉蟬殼去土甘菊花荊芥穗蕤仁去皮各一兩犀角鎊羚羊角鎊各一錢蒼朮米泔浸透一兩去皮切焙乾上為末煉蜜和丸如梧子大每服十丸茶清或鹽湯嚼下不拘時通明丸出聖濟總録治肝腎氣虛眼目昏暗時見黑花飛蠅石決明刮洗芍藥桔梗銼炒車前子各一兩細辛去苗葉一兩半茺蔚子熟乾地黃焙各二兩上為末煉蜜為丸如梧子大每服二十丸鹽湯臨臥下加至三十丸摩頂膏出聖惠方治眼前見花或黃紅黑白不定附子一兩炮裂去皮臍木香一兩硃砂一分龍腦半錢青鹽一兩半牛酥二兩鵝脂四兩上將附子木香為末入硃砂下五味同研令勻以慢火熬成膏每用少許不計時候頂上摩之昨葉何草丸出聖濟總録治眼見黑花視物不明薄荷葉羌活去蘆頭荊芥穗各一兩蒺藜子炒去角一兩半附子一兩昨葉荷草去土焙一兩半上除黑豆外搗羅為末將黑豆研爛和丸如梧子大每服十丸空心溫熟水下一方加羌活半兩服此藥後更合蕤仁散間服之蕤仁散出聖濟總録治眼見黑花昏暗蕤仁去皮一兩半羌活去蘆頭天麻槐子山梔子各一兩黃芩去黑心黃連去須菊花各半兩上為散每服一錢匕溫熟水調下食後日二服有人患眼見黑花或如大白環當目前漸如小蟲樣後又變如粉點只見三二分物服此二藥二十餘日頓愈更不復發一方加細辛甘草各一兩芎藭丸出醫方集成治遠視不明常見黑花久服增明眼力芎藭菊花荊芥薄荷甘草各一兩蒼朮二兩泔浸上為細末煉蜜為丸如梧子大每服五十丸至六七十丸食後茶清送下日進一服或二服白龍粉出御藥院方治腎水衰虛肝經邪熱視物不明或生翳障胬肉攀睛或迎風淚出眼見黑花或如蠅飛或如油星或睛澀腫痛或癢不可忍並皆治之用硝三斗於二九月造一大罐熱水浸開以綿濾過入銀石器內煎至一半以上就鍋內放溫傾銀盆內於露地放一宿次日結成塊子於別水內淨洗再用小罐熟水化開熬水蘿蔔二個切作片子同煮以蘿蔔熟為度傾在瓷器內撈去蘿蔔不用仍放露地露一宿次日結成塊子去水日中曬一日去盡水色入好紙袋盛於透風日處挂曬至風化開盛用逐旋於乳鉢內研極細點眼如常法亦名玄明粉肉蓯蓉丸出聖惠方治眼昏翳赤澀遠視似有黑花及內障不見物肉蓯蓉酒浸一宿刮去皴皮炙乾磁石燒醋淬七遍細研水飛過神麯炒微黃青鹽以上各一兩雀兒十個去毛嘴爪翅足存腸胃去骨爛研菟絲子二兩酒浸三日曝乾別搗為末上為末以好酒二升入少煉熟蜜入雀肉及鹽研令極爛成膏和諸藥為丸如梧子大每於空心食前以溫酒下二十丸一方無磁石五倍丸出聖濟總録治眼見黑花去翳明目巴戟天去心一兩枸杞子揀淨二兩甘菊花揀淨三兩旋覆花揀淨四兩蜀椒去目及閉口者揀淨五兩上將椒入銀石器中入青鹽四兩醋三升慢火煮乾如器物小旋添醋煮待醋盡將椒與前四味焙乾杵為末煉蜜和丸如梧桐子大每服三十丸加至四十丸空心日午夜臥空時溫酒或鹽湯下黃連丸出聖濟總録治一切眼疾青盲黑花赤脈熱淚黃連去須甘菊花車前子羚羊角鎊芒硝各一兩上為末煉蜜和丸如梧桐子大食後溫漿水下二十丸加至三十丸黃柏漿出聖濟總録治眼看物如兩般或如蠅翅似遊絲黃柏一兩鵝梨三顆黃連去須一兩一分黃芩去黑心三分竹葉半兩上㕮咀如麻豆大以水二升煎至半升去滓納新瓷瓶中入龍腦半分調和勻每夜以銅箸點眼硃砂散治眼中有黑白花逐眼上下光明硃砂研龍腦香各六分車前子三分地骨皮白者決明子各五分上細研如粉少少敷之煮肝煎出聖濟總録治眼生黑花漸成內障及鬥睛偏視風毒攻眼腫痛澀癢短視倒睫雀目羌活去蘆頭獨活去蘆頭青葙子款冬花各一兩上為散每服三錢羊子肝一葉銼細用淡竹葉數片同裹如粽子別用雄黑豆四十九粒米泔一盞入銀石器同煮黑豆爛泔干為度取肝細嚼溫酒下又將豆食盡空心日午夜臥服枸杞子丸出聖濟總録治肝腎風上攻眼見黑花枸杞子九炊九爆二兩旋覆花擇淨蜀椒去目及閉口炒出汗巴戟天穿心紫色者去心各一兩上為末煉蜜丸如梧桐子大每服三十丸臘茶清下不拘時白蜜黃連膏出聖濟總録治風毒上攻眼生黑花不見物白蜜半斤黃連去須一兩大棗五枚淡竹葉一握洗上以水二升先煎竹葉取一升去滓下棗及黃連白蜜煎取三合去滓重湯煎如稀餳逐夜點眼中三兩滴蓋覆勿令塵灰入遇明丸出御藥院方治風痰頭目昏眩視物䀮䀮目見黑花飛蠅牽牛頭末三兩黑白各半何首烏六兩去皮皂角三斤二斤燒成灰在瓷罐內用瓷碟蓋口不令出煙不用碟子後用紙二張水濕過蓋罐口紙干罐冷為度薄荷葉去土三兩上為細末後用皂角一斤熱水浸軟去皮弦子用穰以酒二升搓揉成濃汁用新布濾去滓入面二匙同熬成膏入上三味和丸如小豆大每服二十丸煎生薑湯食後下日三服食後漸加至三十丸神效散出聖濟總録治一切眼時見黑花經年不愈羞明石決明黃連去須密蒙花各一兩上為散每服二錢食後臨臥時熟水調下神麯丸出聖惠方治肝腎風虛眼生黑花蜀椒丸出聖濟總録治眼見黑花蜀椒揀去目及閉口者一斤用鹽一斤拌淹三宿次換鹽焙去鹽玄參半斤銼上為末煉蜜丸如梧桐子大每服鹽湯下三十丸食後臨臥服椒目丸出本事方治年久眼生黑花不愈者椒目一兩炒蒼朮一二兩炒上為末醋糊丸如梧桐子大每服二十丸醋茶送下服椒方出聖濟總録治肝腎虛風上攻眼生黑花頭目不利能通神延年以川椒一斤揀淨去目及閉口者於銚內炒令透於地上鋪淨紙二重用新盆合定周回用黃土培之半日去毒出汗然後取之曝乾為度只取椒於瓷合子內收每日空心新汲水下十粒甘露湯出聖濟總録治眼見黑花赤痛昏暗以葳蕤焙四兩為粗末每服二錢水一盞入薄荷二葉生薑一片蜜少許同煎至七分去滓食後臨臥服杏子膏出聖濟總録治眼赤癢痛時見黑花取初生杏子仁一升古五銖錢七文入瓶盛密封埋門限下經一百日化為水每夕點兩眥頭補肝散出聖濟總録治眼坐起生花外障茺蔚子一兩半旋覆花羌活知母各一兩甘菊三分防風二兩上為末以水一盞散一錢煎至五分食後去滓溫服治眼前常見諸般禽蟲飛走以手捉之則無肝膽經為疾出經驗良方酸棗仁羌活玄明粉青桐子花各一兩上為末每服二錢水一大盞煎至七分和滓飲一日三服目暈附論靈樞經曰瞳子黑睛法於陰白睛赤脈法於陽陰陽俱轉則睛明矣若陰陽不和肝虛血弱風邪毒氣乘虛而摶於精氣故令精氣聚生於白睛之上繞於黑睛之際水輪昏濁黑白不明是為目暈之候方芎藭散出聖濟總録治目暈昏澀視物不明芎藭地骨皮何首烏去黑皮荊芥穗菊花旋覆花甘草炙石決明刷淨草決明各一兩蟬蛻去土青葙子木賊各半兩白芷一分上為散每服一錢米泔水調下食後服芎藭丸出聖濟總録治肝血不足風邪乘虛摶於精氣兩目暈翳疼痛不可忍芎藭枸杞子荊芥穗蒼朮米泔浸一宿切焙甘草炙銼各一兩細辛去苗葉蟬蛻洗焙石膏研水飛旋覆花菊花羌活去蘆頭各半兩上為末煉蜜和丸如彈子大每服一丸食後臨臥細嚼茶清下日三服羊肝夾子出十便良方治眼翳膜遮障小兒疳眼雀目並治之蟬殼黃連各半兩甘草菊花各一分蛇蛻一條燒灰上為細末以羊肝一具竹刀子批摻藥拌勻用白裹作夾子每日食後吞一次九味犀角湯出聖濟總録治風熱乘虛摶於精氣令目干澀磣痛兼暈翳犀角一兩半梔子仁木通銼黃芩去黑心黃連去須大黃銼炒甘草炙銼芎藭各一兩車前子二兩上粗搗篩每服五錢水一盞半竹葉七片煎至八分去滓入朴硝末一錢食後臨臥溫服延年主眼熱暈覆瞳子方柴胡茯苓枳實炙決明子瞿麥各三兩甘草炙黃連別漬蕤仁各二兩上切以水一斗煮取二升七合去滓分二服忌海藻菘菜豬肉酢物七味犀角湯出聖濟總録治風邪攻眼磣痛暈翳犀角鎊三分車前子梔子仁各一兩木通銼黃芩去黑心大黃炒黃連去須各半兩上粗搗篩每服五錢水一盞半竹味七片煎至七分去滓入芒硝末一錢食後臨臥溫服犀角湯出聖濟總録治肝血不足虛熱生浮翳暈上黑睛疼痛磣澀烏犀角鎊二兩黃連去須甘草炙銼秦皮去粗皮銼青竹茹梔子仁各一兩大黃銼炒半兩上粗搗篩每服五錢水一盞半煎八分去滓食後臨臥溫服山芋散出聖濟總録治肝虛血弱風邪毒氣乘虛攻搏暗輪昏濁黑白不明發為目暈山芋防風去叉細辛各一兩去苗葉山茱萸三分芍藥升麻各半兩蔓荊實去白皮三分上為末每服二錢溫酒調下芎辛丸一名芎術丸出聖濟總録治眼暈翳及頭目昏疼點眼雄黃膏出聖濟總録治眼暗暈生翳膜屢年不愈兼乾澀痛雄黃研乾薑炮搗末黃連去須搗末礬石燒令汁盡研丹砂研各一分麝香研一錢上為末用雪水二盞調和瓷瓶子內重湯煮一日藥成候冷用綿絞濾過點少許於眥頭還明散出聖濟總録治眼生翳暈昏暗隱澀瘀肉疼痛甘草炙銼二兩白芷烏梅去核各五兩水蛭揀細者炒一兩栗子一百九十六枚並皮用虻蟲一百二十枚炒去翅足上為細散每服一錢食後熱酒調下續飲酒半盞壓之日三服蒼朮散出聖濟總録治風毒熱搏目生翳暈黑白睛昏濁不明蒼朮米泔浸一宿切焙四兩木賊童便浸一宿淨洗銼焙二兩甘草炙一兩半旋覆花蟬蛻去土各一兩上為散每服一錢食後麥門冬熟水調下療眼目赤瘥後翳暈方決明子碎黃連蕤仁各六兩黃柏四兩鹽緑三分上為末更研細取少放納目中日三四度忌豬肉蔓荊散出聖濟總録治肝虛風邪攻目目暈瞻視不明蔓荊子四兩洗蛇蛻二兩上先用瓷罐盛蔓荊子火燒黑焦無聲後鈐出入蛇蛻在內又輕燒蛇蛻成灰候冷細研每服半錢食後溫酒調下日三服光明散出聖濟總録治眼睛上生暈不問久新用鯉魚一頭長一尺二寸者取膽用刺破滴汁在銅照上陰乾用竹刀子刮下為細末每用少許點眼療眼目赤瘥後翳暈方出龍木論用秦皮一兩切以水一升五合煮取七合澄清取渣用為散以少許納目中日三四度忌豬肉
