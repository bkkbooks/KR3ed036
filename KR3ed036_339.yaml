炒令香上末三錢水一盞薑三片棗二枚煎七分罩胎散治傷寒大熱悶亂燥渴恐傷胎嫩卷荷葉焙乾一兩蚌粉半兩上為末每服二錢蜜少許新汲水調下食前研家園生葛汁服亦安治妊娠遭時疾令子不落取灶中黃土水和塗臍干復塗之一方酒和塗方五寸又泔清和塗之並佳又方取犬屎洗塗腹勿令乾療妊娠傷寒以鯽魚一頭燒末酒服方寸匕令汗出兼治乳無汗治雙身婦人傷寒時疾溫疫頭痛身熱用升麻散一兩水半碗作大劑料去滓分作二服先一服吐下一服勿吐次以長流水加生薑棗煎五苓散熱啜之汗盡頭痛立止護胎白藥子散治妊娠傷寒用白藥子不拘多少為末用雞子清調塗在紙上可碗口大貼之臍下胎存處干即以溫水潤之治妊娠傷寒身體壯熱憎寒嘔逆四肢微冷頭痛腳疼心腹有氣至三日內未瘥者宜服此方上取生薑一分研濕紙裹燒熟酒調下後吃粥飯投之汗出為效治婦人妊娠傷寒蓄血出拔粹方詩云婦人妊娠或蓄血抵當桃仁勿妄施要教子母俱無損大黃四物對服之治婦人傷寒妊娠服藥例出拔粹方若發熱惡寒不離桂枝芍藥若往來寒熱者不離柴胡前胡若大渴者不離知母石膏五味子麥門冬若大便泄者不離桂附白朮乾薑若大便燥結者不離大黃黃芩若經水適來適斷者不離小柴胡若安胎者不離人參阿膠白朮黃芩若發汗者不離蔥豉生薑麻黃旋覆若頭痛者不離前胡石膏梔子若傷暑頭痛者不離前胡石膏甘草若滿悶者不離枳實陳皮若胎不安者不離黃芩麥門冬人參若斑黑者不離黃芩梔子升麻梔子大清湯療妊娠婦人七月傷寒壯熱赤斑變為黑斑溺血升麻梔子大青杏仁黃芩各三兩蔥白切一升上六味切以水六升煮取半升分三服梔子五物散廣濟療妊娠傷寒頭痛壯熱梔子前胡知母各三兩黃芩一兩白石膏四兩上銼如麻豆大每服五錢水一小盞半煎至一盞去滓服治妊娠後忽傷寒頭痛壯熱渾身百節俱痛心中煩躁方石膏山梔知母黃芩桔梗杏仁前胡葛根升麻各五錢大黃炮一分上細杵羅為末每服三錢或四錢以水一盞一分生薑三片蔥白三枚同煎取九分食後臨臥時徐徐去滓服病效即住藥治妊娠後頭痛傷寒大小腑祕熱身上發斑心中煩躁昏悶不安黃芩大黃山梔升麻防風麥門冬前胡杏仁桔梗郁李仁獨活大青各等分上細杵羅為末每服三錢水一盞二分煎取一盞食後去滓服黃耆解肌散治婦人妊娠傷風自汗人參黃耆當歸川芎炙甘草各五錢芍藥加蒼朮生地黃亦可上為粗末每服五錢水煎溫服無時治妊娠大腑寒溫不等或祕或瀉腹中氣滯飲食減少心頭妨滿兩脅脹逆四體不安桑寄生黃橘皮大腹皮青枳殼人參桔梗蘇木芎藭各一分藿香三錢上細杵羅為末每服二錢水一盞煎取一分食後去滓服
