body:
  text: 卷二百八十一諸瘡腫門濕疥附論夫濕疥者起小瘡皮薄常有黃水出此風熱氣淺在皮膚間成也方烏頭散出聖惠方治濕疥常有黃水瘙癢不絶川烏頭藜蘆白礬灰馬腸根石菖蒲硫黃細研杏仁去皮苦參銼膩粉以上各半兩上搗細羅為散都研令勻用時先以桃湯洗拭乾後用油漿水和塗之三日一塗不過三兩次即瘥黃連散出聖惠方治濕疥有黃水皮膚瘙癢黃連二兩去須蛇床子半兩水銀一兩半赤小豆一兩胡粉一兩糯米一兩上搗細羅為散以生麻油和研候水銀星盡如膏施取塗之又方出聖惠方硫黃一錢膩粉半分砒霜半兩斑蝥十枚微炒上細研以口脂調塗之又方出聖惠方巴豆二枚乳頭香硫黃水銀以上各一分上同研令水銀星盡油調少許安在手心中夜後合手便臥神效立效散出聖惠方治濕疥浸淫流漬遍體大作瘭漿搔之水出小如粟粒癢痛難忍肌膚濕潤經久不瘥膩粉緑礬黃柏微炒細研硫黃細研各等分上為細末研勻以生油調藥塗之又方出直指方治濕疥生明硫黃半兩胡粉黃丹各二兩上為細末搽治濕疥及惡瘡方出聖惠方葶藶子一兩炒令黑色白礬一兩燒令沸定上搗羅為末用生油調塗之又方出聖惠方臭黃二兩細研熟艾二兩上以煉好豬脂半斤先煎熟艾十餘沸濾去渣入臭黃末攪令勻收於瓷盒中旋取摩塗不得近眼治濕疥常有黃水出方出聖惠方豆豉一兩炒令煙出上細研以生油調塗之諸癬附論夫癬之字從鮮言發於微鮮縱而弗治則浸淫滋蔓其病得之風濕客於腠理搏於氣血氣否澀久則因風濕而變化生蟲故風多於濕則為乾癬但有周郭皮枯瘙癢搔之白屑起者是也濕多於風則為濕癬郭中如蟲行浸淫赤色搔癢汁出者是也風折於氣血則為風癬麻痹不知痛癢者是也如錢形然則為圓癬如雀目然則為雀目癬亦皆痛而瘙癢之或牛犬所飲刀刃磨滓之餘水取以盥濯毒氣傳人亦能生癬故得於牛毒者狀似牛皮於諸癬中最為𤸷厚邪毒之甚者俗謂之牛皮癬狗癬白點而連綴刀癬縱斜無定形凡此八者皆風濕毒氣折於肌中故痛癢不已久而不瘥俱謂之癬又云露下勿臥夏間著人面令皮厚及喜生癬方漏蘆膏出聖濟總録治一切癬漏蘆地榆附子去皮臍杏仁湯浸去皮尖雙仁各一兩細辛去苗葉半兩藜蘆去蘆頭木通莽草白芷吳茱萸蜀椒去目併合口蠟各二兩清油一斤上細銼十一味先熬油令沸下諸藥煎候白芷赤黑色停冷綿絞去渣拭鐺令淨再下油並蠟煎蠟熔盡瓷盒盛收旋塗患處仍用丁香散敷之日三五上瘥丁香散出聖濟總録治一切癬塗漏蘆膏後宜敷此藥丁香搗末蝦蟆灰各一兩麝香研一分五倍子搗末白礬熬令汁枯研膩粉各半兩上合和為散敷於癬上以瘥為度又方出危氏方治遍身皮癬以雄黃末入輕粉豬膏塗抹治癬瘡方出肘後方取蟾蜍燒灰末以豬脂和敷之又方出本草以山豆根搗為末臘月豬脂調塗之胡粉散出仁存方治一切癬瘡瘙癢甚者胡粉一分砒半分大草烏一個生用蠍梢七枚雄黃另研一分斑蝥一枚麝香少許硫黃另研一分上為細末先用羊蹄根蘸醋擦動次用藥少許搽患處治頑癬瘡癩雄黃硫黃全蠍檳榔礬豬牙皂莢麝香多許蛇床子上等分為末用臘豬油調搽瘡上如聖丸出儒門事親治癬黃柏黃芩黃連防風以上各半兩白殭蠶一兩全蠍三分輕粉半錢上為細末羊蹄根汁浸蒸餅為丸如梧桐子大每服二三十丸嚼羊蹄根汁送下隨病人上下分食前後又用羊蹄根汁塗癬治癬藥方當歸鬚一兩獨活一兩苦參一兩蒼耳頭二十個黃連半兩杏仁二十個羊蹄根五根上搗碎入消風散一帖用水一盞酒半盞煎至一盞食後服洗藥羊蹄根獨者五根桃頭十四個母藤二十個白礬飛過半兩百藥煎半兩消風散一貼杏仁二十個湯泡去皮上搗碎用湯為丸搽洗之忌一切毒物狼牙膏出聖濟總録治一切癬狼牙雄黃研丹砂研硫黃雷丸搗白礬煅枯研藜蘆去蘆頭各一兩上碾細篩為散密調成膏塗癬上日三遍取瘥為度又方治癬白芨貝母川桂皮巴豆川剪草斑蝥少許榆樹皮上等分為細末米醋調敷之又方出直指方以草烏頭不去皮尖切小塊一半用豬油脂煮令浮黃一半用鹽炒令焦黃為末酒麵糊丸如桐子大每服十五丸任下亦治諸風頑痹又惡癬方出直指方用紫背草入生明礬研細敷二三次斷根雄黃膏出聖濟總録治一切癬雄黃研細石硫黃研末羊蹄根濕者沙糖色白者荷葉新者各一兩上先以羊蹄根白糖荷葉於乳鉢內細研如泥次入硫黃雄黃末相研成膏瓷盒盛貯塗癬上日三度如藥干添蜜少許調之鯽魚散出聖惠方治一切癬或干或濕痛癢不可忍鯽魚一個生髮一雞子大明硫黃雄黃各半兩生豬脂四兩上先煮豬脂欲沸即入鯽魚煎令煙盡去入發銷盡濾清即入硫黃雄黃末拌勻和瓷器收用不拘時候塗之醫癬方出直指方吳茱萸生半夏草烏白芷赤小豆等分上為細末米醋夾生蜜稀調先用川椒連根蔥紫蘇莖煎湯洗次敷藥良遍身牛皮癬方出危氏方川烏草烏去皮尖何首烏白芷蘇木各等分上截小片臘月豬脂酒煮焦候冷入鹽少許瓷器收時常挑一匕空心酒調服癬瘡藥桱皮五倍子檳榔斑蝥羊蹄根各半兩上為細末用水調先用竹刀刮破癬上然後搽藥桱樹散出德生堂方治乾溼癬面腮髮際或手背腿上癢抓則痛而久不瘥者桱樹皮四兩白蒺藜二兩白礬一兩雄黃一兩白芨一兩半上為細末涼水調塗瘡上三四次即愈治身體瘙癢白如癬狀者方楮子二枚豬胰一具鹽一斤礬石一兩上以苦酒一升合搗令熟以拭身體日三又方用沙糖一小塊先用竹篦刮去皮血卻用手敷立效又方出肘後方以燒人糞末水銀油和塗之瘥療燥癬苦酒磨狼毒敷之良又方出聖惠方取醬瓣半盞淨洗研爛入藜蘆末半兩調塗之又方出聖惠方取楝根以釅醋磨塗之銀粉散治一切頑癬輕粉一錢黃丹瀝青白膠香各等分上為末麻油調拭淨或抓破竹篾挑搽二次便乾數次剝去殼也治牛皮癬如神治一切癬瘡羊蹄根四兩百藥煎二兩白礬一兩輕粉一錢上銼細砂盆擂用苧布包藥搽癬瘡上如聖散出聖濟總録治一切乾溼癬風化石灰半兩鉛丹三錢膩粉一錢石硫黃半錢上同研如粉用生油調先以布揩破癬塗之至塗藥干煎蔥白甘草湯淋洗如換時一依此沉香瀝出聖濟總録治一切乾溼癬沉香柏節杉節松節各半斤上銼如指面大以布袋盛置於漚麻水中浸一食久漉干取一枚白坩穿底下作一孔如雞子大以松葉一枚安孔上以藥袋坐坩內以鹽一斤蓋上以黃泥固濟坩令厚三五分以炭火加坩口燒之坩下安碗一口滴藥汁於碗中候煙盡即取碗中藥汁塗敷瘡癬上日三五次以瘥為度白禿疽疥惡瘡並皆治之梅實膏出聖濟總録治一切乾溼癬烏梅取肉十四枚大蒜頭去皮切十四枚屋塵細篩鹽各三合上先研烏梅次下大蒜屋塵鹽等和研令細以醋調成膏取塗癬上日三五度即瘥一方有大麻子四合龍腦膏出聖惠方一名雄黃散治一切乾溼癬癢痛不可忍者龍腦石硫黃斑蝥去翅足膩粉各半兩上細研為末用面油調成膏發癢痛時抓破塗之日三五次即愈水銀膏出聖濟總録治一切癬水銀一分蕪荑仁研末薑黃搗末各半兩酥二兩上先煎酥和水銀以柳條研攪候水銀散即下蕪荑薑黃末攪勻瓷盒盛旋敷癬上日三兩次諸癬妙方一名神妙方出聖惠方治一切癬斑蝥二十一枚生用明硫黃藜蘆各三錢輕粉一錢半上為細末麻油調搽候癬癢發時先以布帛擦令傷即便塗之治癬妙方出傳信適用方川烏香白芷蟬蛻以上各半兩全蠍一分上為末用羊蹄根自然汁煉蜜為丸如梧桐子大每服二十丸先安排熱酒一盞去浴堂內解卸衣服了以羊蹄根自然汁滴在盞內咽下藥便用熱湯澡洗卻用羊蹄根代皂角搽之出浴令汗乾便不見癬治癬巴豆去皮殼七粒絳礬彈子大羊蹄菜根五條紅米飯一匙上與飯同研細塗癬仍以布先搽破癬祕方王元吉所傳吳材先用之效治癬硫黃巴豆斑蝥地膽上為細末用津唾調搽又方百藥煎明礬斑蝥以七為數禿菜根上搗和爛研如泥丸成塊用時分少許紗片裹藥醋浸撲之葉荷草散出危氏方治一切癬無問風濕氣血與夫相染而生者昨葉荷草即瓦上曬乾一兩枯礬一兩雄黃半錢上為末以羊蹄菜根先蘸醋揩癬上令癢破即以藥末乘濕塗敷不過三兩次即愈又方一名貫衆散出百一選方治癬奇甚昔馮仲儒云清胃用只一兩次敷而愈之奇甚貫衆吳茱萸官桂等分上同為細末先以手抓破以藥搽之用米醋調敷亦得又方出百一選方治癬甚妙羊蹄根百藥煎上同搗爛敷上良一方羊蹄根蘸藥搽之一方加白礬烏蛇散出聖濟總録治一切乾溼癬烏蛇酒浸去皮骨炙一兩乾荷葉一兩枳殼去瓤麩炒三錢上為散每服一錢空心蜜酒調下日晚再服三神丸出聖濟總録治一切癬蒺藜子炒海桐皮銼草烏頭鹽炒去鹽不用各一兩上為細末麵糊和丸如緑豆大每服十丸至十五丸溫酒鹽湯送下殭蠶散出聖濟總録治一切新久乾溼癬白殭蠶炒去絲四十枚斑蝥二十枚全者生用膩粉一錢上搗研為細末乾癬用生油調塗濕癬只干揩貼之並候黃水出及數數癢痛永除根本亦無瘢痕附子散出聖濟總録治一切癬附子炮製去皮臍半兩皂莢一梃去皮子炙吳茱萸湯浸焙炒一兩上搗羅為散先用新布揩癬令濕然後塗藥日三兩上如干癬以醋調塗治一切癬瘡方出聖惠方烏蛇半斤以酒浸一宿取肉炙乾羌活出蘆頭四兩麝香一錢研上搗羅前二味為散入麝香同研每服二錢空心溫酒下日三服治乾溼癬癢痛不可忍方出聖惠方羊蹄根一兩黃連去須二兩蛇床子半兩上搗羅為末用臘豬脂調令稀塗癬上良黃麻散出聖濟總録治諸瘡癬大黃銼炒四兩天麻羌活去蘆頭各二兩上為細散酒煮三盞服又方出聖惠方水銀一兩吳萸末半兩上以酥少許和研水銀星盡塗之治癬方出百一選方雄黃二錢好者川烏一個上為細末先用竹刀子刮破癬用醋調少許敷之治久近癬極驗方出百一選方豆豉半合斑蝥七個頭翹腳全者上一處慢火炒候有煙生為度搗末遇欲用藥時即抓破癬以蜜或沙糖水塗之良久干搽藥末在癬上三二日必愈治癬立有神效藜蘆根半兩輕粉二錢半上為細末涼水調搽癬上防風散出聖濟總録治一切癬防風去叉母豬肉各二兩上同煮數沸去豬肉取防風焙乾搗羅為散每服一錢白湯送服不拘時候抵聖散出聖濟總録治一切癬草決明半兩焙搗末膩粉二分一方用輕粉上合和為散先以布揩癬令赤次以醋調藥塗之當汗出痛解即瘥一方不用醋調胡粉膏出肘後方治一切乾溼癬瘙癢胡粉二兩水銀一分上合研令勻以醋調成膏塗之仍以紙貼日三五上瘥一方不用醋調又方出肘後方蛇床子駝脂一作豬脂上先研蛇床子令細以豬脂調成膏塗之日一上五次即瘥雀糞塗敷方出聖濟總録治一切癬雀糞醬瓣水洗淨各半兩上和合細研塗敷癬上日三二次一方取醬瓣尿和塗之獨活散出聖濟總録治一切癬獨活半兩附子炮剖去皮臍一兩上搗羅為散以酒調和如糊先用皂莢煎水洗癬上然後塗之一日二次大黃散出聖濟總録治一切癬大黃如棗大一塊斑蝥翅腳全者七枚上搗研為細散以釅醋調如糊先揩破癬瘡然後塗藥候乾洗之七星散出聖濟總録治諸癬乾蠍七節者白殭蠶直者各七枚上搗羅為散每服三字用好酒一盞入羊蹄根汁並蜜少許調服晡時一浴仍用羊蹄根滓揩浴治癬方出聖惠方治濕癢搔之有黃水出者余少年曾患癬初在頸項間後延上左耳遂成濕瘡用斑蝥狗膽桃根等塗令去之其瘡轉勝偶於楚州賣藥人教用蘆薈一兩甘草炙半兩上為末相和令勻先以漿水洗癬用帛子拭乾敷癬上良干瘥一方抓動癬次用藥搽之日三五次瘥又方川椒三分去目豉三分上同燒為灰研如粉以清油調塗之苦參丸治一切癬苦參用皂莢十梃碎以水煮皂莢爛為度揀出苦參切爆干將皂莢汁漉去渣然後熬成膏威靈仙洗擇爆干各三兩上為末以皂莢膏和丸如梧桐子大每服二十丸空心溫酒下加至三十丸又方治癬亦治白禿用羊蹄根於磨石上以苦酒磨之敷瘡欲敷瘡時先將瘡刮破以火炙乾後敷四五遍一方搗羊蹄根以白蜜和臨用先刮破瘡令傷敷之如炊一石米久拭去更以三年米醋和塗之若刮瘡處不傷即不瘥一方用乳和塗之又方以干荊子燒中央器承兩頭取汁塗之先刮上令傷次用荊子汁治癬用煎水熱拓不拘多少日一遍良又方用刺薊汁服之又方以燒蛇蛻一具酒服或以死蛇燒灰用豬脂和塗敷上瘥又方以生地黃汁服之佳又方搗莨菪根蜜和敷之一方用菜亦得治頑癬以砒霜少許滴酒同熬為膏塗之妙如覺癢但急以冷水洗切不可抓破旱蓮方用旱蓮草葉不拘多少候癬癢時抓破拿葉擦之不可食害人煮蓮葉洗之亦可一方柳葉洗亦良治癬如神方以杏仁七粒去皮尖自嚼令爛於手心少安膩粉帶津吐出急和膩粉搽之又方治癬積年者亦效用斑蝥一個去頭翅足以針扎燈焰上燒米醋內沃如此三兩次就燒成灰存性研為細末或以糯米炒黃去糯米用紅棗一枚湯泡剝去皮核與斑蝥一處同研爛先以手抓或生布擦動癬然後搽藥不可侵好肉上恐有毒金山長老云嘗有人患癬七年一旦得此方兩敷而愈又方以飯甑熱飯搦成糰子搽之專治面上者又方用韭菜根炒存性搗末豬羔油調塗之瘥又方用凌霄花末以羊蹄根蘸藥搽之甚妙又方治遍身頑癬日久不瘥上至頭面妙方一名白礬散用獨莖羊蹄根銼搗白礬為末一處以極酸米醋調抓破塗藥覺癢極至痛即止隔日浴出不過兩上即愈治諸般惡癬先用韭菜煎湯洗次用臘豬油調蛇床子海桐皮末敷之兼治小兒乳癬婦人室女花癬癬藥以桱樹皮不拘多少用米醋極好者浸七次曬乾為末每用一錢用水調搽患處立效菖蒲酒治一切癬以菖蒲細切五斗水一石五斗煮取三斗去渣入醞米二斗如酒釀熟旋取飲令極醉即愈一方用末五斤酒五升漬蒸使味出絶酒一日服每服一升白礬塗方治一切乾溼癬以白礬一兩研為末用醋調如糊塗摩癬上日三五度即瘥炙魚塗方治一切乾溼癬以魚不問色目火上炙皮微焦乘熱去皮骨取肉研塗癬上日三五度即瘥半夏散出聖濟總録治一切癬以半夏二兩搗羅為散以陳醬汁調和如糊塗癬上日兩三度即瘥艾汁塗方出聖濟總録治一切癬取艾一兩細銼以酸醋半斤煎取濃汁去渣塗摩癬上日三五度即瘥蒿蕙敷方出聖濟總録治一切癬以蒿蕙二兩黃燥者搗羅為散以醋調和塗摩癬上日三兩度即瘥楮汁塗方出聖濟總録治一切癬以楮木自然汁不拘多少先以新布揩癬微破然後塗藥日二上即瘥一方用楮葉半斤搗敷桃葉汁塗方出聖濟總録治一切癬及燥癬以桃葉一兩日中時採研絞取汁塗摩癬上日三度即瘥一方用桃白皮苦酒敷之佳並谷實白汁敷之良治諸癬並面上風刺方出聖濟總録取葛勒蔓草頭一把勿令人知鹽挼塗瘡三五上永瘥面上瘡取子為末空心酒調下三錢治癬方出經驗良方以櫸葉即烏桕葉為末醋調塗或用生葉及樹皮干搽亦可治積年瘡癬生痂搔之則水出遇陰雨時即癢出肘後方以狼毒為末醋調搽濕癬乾摻一方不用醋調又方出經驗良方用楸樹葉連漿搽破已復用雀兒酸又名酢漿草揩搽二次而痊又用樹葉正面用清水浸貼過五六次即效又方出仁存方治癬殺一切蟲腫毒以羊蹄根醋磨塗癬速效亦煎作丸服之其方以新採羊蹄根不拘多少搗研絞取汁一大升白蜜半斤同熬如稠餳更用防風末搜和令可丸如梧桐子大用栝蔞甘草酒下三二十丸日二三服甚佳治身體白駁以半天河取樹木孔中水洗搗桂屑唾和敷駁上日三白駁者浸淫漸長似癬但無瘡也治癬神驗方出聖惠方用雄黃研以苦酒和先以新布拭癬上令傷以藥塗之救急療癬方先以針鐮癬上即搗瓜蒂末敷上仍先以水洗之又方用羊松脂熏黃搗末和更煎仍以泔清水洗癬敷之兩度即瘥必效療癬方用穿山甲煎塗之愈加口脂亦得療癬方用麻敷癬上裹之瘥以鹽及豉和搗塗之即瘥止肘後治燥癬方以雄雞冠血塗之又方以胡粉熬令黃赤色苦酒和塗之干即易瘥止又方取肥豬肉薄割之於鏊上若尉底炙之令熱使人體堪之以敷瘡上日三四度治一切癬並瘡出傳信適用方用茄子花為末乾用油調塗或干搽之治癬方用鳳兒花葉同羊蹄根加鹽醋搗敷又醋摩香白芷塗立止散治人身上牛皮癬用冬瓜皮燒灰小油調搽瘡上立止治癬方以枯礬柏油雞糞爛者洗淨敷之治風頑癬生滿面項頸諸藥不瘥者以甘草無制度碾為末極細先抓破瘡然後以此搽之三兩次立效治疥癬詩曰多年患瘡癬醫治久不除急取金鎖汁醋調塗便宜又方出聖惠方取狼跋草以釅醋塗之又方出聖惠方取犬膽塗之立效又方出聖惠方取牛鼻頭津塗之又方出聖惠方取醬汁生葶藶末調塗之又方出聖惠方取地捲土將醋和調塗之牛皮癬方出直指方用舊皮鞋底燒灰存性麻油輕粉調敷又癬方出直指方用石榴根取皮蘸明礬末搽切莫醋則蟲沉也輕粉治癬方用五更吃炙牛肉一片細嚼下少刻以真輕粉五分溫酒調下治頸項及面上白駁浸淫漸長有似癬但無瘡可治以鰻鱺魚脂敷之先拭剝刮上使燥痛後以帛敷之一度便愈甚者不過三度治癬方以槐清枝燒取瀝以塗之又方服驢尿良一醉散治遍身癬全蠍十四個瓦上焙乾蟬蛻十四個去頭足地龍十四條去沙白殭蠶十四個直者凌霄十四個全者防風一兩紫菀一兩上為細末共作一服用好酒三升量酒多少得所羊蹄根如大指大兩莖研細與藥同研勻同煎三五沸通口服之作一氣服盡服了便入浴將渣再研令細就浴抓破搽有癬處搽了不必揩避風處歇臥定只一服取效治癬方先抓破見血用生薑搽了卻以沙糖少許塗之兩次便效又方羊蹄根百藥煎上和敷爛敷之瘡上祛濕散治濕乾癬大有神效蠶砂四兩薄荷半兩上為細末每用不拘多少乾摻於瘡上乾者以小油調搽硫黃散治癬及紫白癜風坯子半兩硫黃半兩白礬一兩半上為末先用羊蹄根取自然汁擦動敷之凌霄花散治風濕挾熱皮膚生癬久不愈者凌霄花一分白礬一分另研雄黃半錢另研天南星半兩黃連去須二錢羊蹄根焙乾半兩上件搗羅為細末抓破用生薑汁調藥搽之如癬不濕只癢用油調藥治癬方輕粉雄黃各等分上為細末豬脂調抓破搽東坡先生家藏方決明子為細末不以多少上用水銀輕粉少許與藥末同研為膏散以物擦破癬上用藥敷之立瘥治癬以肉脯帶脂者薄割火上炙熱與生肉敷癬上蟲當入脯中候其少頃歇卻須臾三五度瘥又方以生鐵煅後飛淘去粗赤汁烘乾同蒜磨生油敷之又方以艾醋煎作膏敷之治癬瘡取蟾蜍燒灰末以豬脂和塗之治瘡癬以榆仁作醬塗之炒陳者尤良又方以蕪荑作醬食之其氣膻者良又方取皂莢嫩刺針以米醋熬作濃汁以敷瘡上有奇效又方用山豆根搗末臘月豬脂調敷之治癬取魚鮓和柳葉搗碎熱敷之又方以鱔魚斷取血塗之治癬瘡久不瘥用羊蹄根絞取汁調膩粉少許如膏塗敷癬上三五遍即瘥如干即豬脂調和敷之乾癬附論夫乾癬但有稜廓皮膚枯癢搔之白屑出是也皆是風濕邪氣客於腠理復值寒濕與血氣相搏所生若其風毒氣多濕氣少故風入深故無汁為乾癬也其中亦生蟲方黃連散治乾癬搔之白屑起亦治疥黃連一兩去須藜蘆半兩去蘆頭川倭黃一兩乾薑半兩生銼䕡茹一兩莽草一兩上為細散入豬脂一斤以慢火煎成膏濾去渣收於瓷器中先以新布拭癬令傷然後塗藥無不瘥者又名大黃膏胡粉散治乾癬癢不止胡粉黃連去須蛇床子白蘞以上各半兩上為細末以面脂調塗乾者濕即貼之乾癬方狼毒草烏頭各三錢半斑蝥七枚去翅足上生用為末津唾調敷用竹篾子刮破塗藥熟揩肉上候出黃水三兩日瘥一方用狼牙無狼毒又方治乾癬癢痛不止斑蝥五月五日取十枚麝香一錢半上研為末以醋調塗在瘡上出多黃水瘥又方川烏頭三枚生用乾蠍五枚上為末面油調作膏塗之一抹散治乾癬不瘥天南星草烏頭各一枚生用上為細散用羊蹄根搗絞自然汁調塗不過三上瘥治乾癬積年生痂搔之黃水出每逢陰雨即癢巴豆十枚肥者上於炭上燒之令油出盡即於乳鉢內以少許酥和研膏塗之不過一兩度愈又方取青葙子末以口脂調先用漿水淨洗後敷之又方取槲樹白皮塗之治乾癬久不瘥出黃水不止陰雨之時即癢痛用斑蝥半兩微炒為末蜜調敷之治乾癬積年生痂搔之黃水出每逢陰雨即癢用狼毒末塗之濕癬附論夫濕者亦有稜廓如蟲行浸淫赤濕瘙癢搔之多汁成瘡是其風毒氣攻注故為濕癬也其里亦有蟲生方濕癬方明礬煅黃連各半兩胡粉黃丹水銀各二錢上為末用豬脂一兩研令水銀星盡成散瓷盒收用螺殼散治癬濕癢不可忍螺殼一兩亂髮灰半兩龍膽半兩胡粉半兩研上為細散研令與胡粉勻以油澱和塗之黃柏散治濕癬癢不可忍黃柏去粗皮銼末黃連去須胡粉研各一兩雄黃研細半兩上為細散先以米泔清洗淨拭乾敷藥日三兩度即瘥療濕癬方蛇床子一兩黃柏一兩黃連一兩胡粉一兩研上為散納水銀一棗大和豬膏研入相和以塗瘡水銀膏治癬濕癢不可忍水銀二兩黃連二兩去蘆搗末胡粉二兩上以煉過臘月豬脂半斤都研候水銀星盡以溫漿水洗瘡然後塗之一方面油塗之英粉散治濕癬英粉炒黑細研二兩藜蘆去蘆頭為末馬腸根為末各一兩上和研令勻用生油調如糊塗癬上三度蛇床子散治久患濕癬不瘥蛇床子黃連去須膩粉上等分為散用小油調塗之膩粉多入不妨輕粉散專治人面上濕癬神效輕粉斑蝥去翅足上研細用溫水以雞翎掃之周圍立效又方出聖惠方治癬濕癢不可忍用膩粉一兩以米醋調塗之又方出聖惠方用羊蹄根半斤日未出時採取須獨莖無枝撥者淨洗細切搗令極爛入羊乳相和得所著少鹽拌勻於日中曝曬良久以塗之治濕癬肥瘡出千金方用大麻仁敷之五日瘥治濕癬瘡刮瘡令坼火炙指摩之用蛇床子為末先以韭菜根煎湯洗次用臘月豬脂搽小毒膏治濕癬疽瘡不瘥者以蟛蜞膏塗之食其肉能令人吐下又方出本草治濕疥以蕪荑搗和白蜜塗之又搗和小牛酪療一切瘡荊芥散出聖濟總録治多年濕癬以荊芥穗不拘多少以瓦罐子盛鹽泥固濟只留一竅用炭火燒出清煙撥去火用濕泥塞了竅子放冷取出碾為細散每用末五錢入麝香一錢膩粉五錢同研勻細先以口含鹽漿水抓洗令破帛子搵了生油調藥塗之又方出聖惠方治癬濕癢不可忍以鯽魚一枚可長五寸者淨拭不去鱗用硫黃末一分從魚口中送入腹內用淨磚一塊安魚在上以炭火周回熁之翻轉令魚黃焦碾羅為末入膩粉三錢同研勻以生麻油調塗之治癬濕癢出本草用楮葉半斤細切搗爛敷癬上戴人十形三療云有一女子年十五兩股間濕癬長三四寸下至膝發癢時爬搔湯火俱不解癢定黃赤水流痛不可忍灸爇熏泄硫黃䕡茹白殭蠶羊蹄根之藥皆不效其女姿性妍巧以此兩股不能出嫁其父母求於戴人戴人曰能從余言則瘥父母諾戴人以扉針磨令尖快當癢時於癬上刺百餘針其血出盡煎鹽湯洗之如此四次大病方除此方不書告於後人恐為癬藥所誤浸淫於血不可不砭者矣治漏瘤瘡濕癬瘙癢浸淫日廣癢不可忍搔之黃水出瘥後復發及治瘑疥出本草取羊蹄根淨去土細切搗以大酢和淨洗上一時間以令水洗之日一敷瘥若為末敷之妙風癬附論夫風癬者是惡風冷氣於血氣所生一作圓稜廓爬搔頑痹不知痛癢其里亦有蟲生也方白花蛇丸出聖惠方治風癬瘡皮膚瘙癢久不瘥白花蛇三兩酒浸去皮骨炙令微黃黃芩一兩防風一兩去蘆頭白蘚皮一兩甘草一兩炙微赤銼枳殼一兩炒微黃去瓤梔子仁一兩赤芍藥一兩川大黃一兩銼碎微炒蒼耳子一兩麥門冬一兩半去心焙黃耆一兩銼白蒺藜一兩微炒去刺羌活一兩苦參二兩銼上為末煉蜜和搗三五百杵丸如梧桐子大每於食後以薄荷酒下二十丸又方治風癬瘡䕡茹二錢剪草半兩苦楝樹皮一兩焙乾另研末輕粉半錢白礬二錢生用麝香一字巴豆去皮入斑蝥炒巴豆黃色去雄黃各一兩硇砂一錢苦參半錢藜蘆半兩百部半兩上為末用羊蹄根汁調搽搔破瘡用藥獨活丸出聖惠方治風毒攻皮膚生瘡癬頑麻不知痛癢獨活二兩蒼耳子二兩羌活一兩五味子一兩菟絲子一兩另搗酒浸三日炮干山茱萸一兩防風一兩去蘆頭白花蛇肉一兩酥炒令黃黃耆一兩銼白蒺藜二兩微炒去刺上為末用白粱米飯和搗三五百杵丸如梧桐子大每日空心及晚臥時溫酒下三十丸硫黃散出聖惠方治風毒癬遍身皆生瘙癢硫黃一兩細研雄黃一分細研硃砂細研麝香細研巴豆去皮心研川椒去目吳茱萸附子各一分去皮臍生用上為細末都研令勻先用新布揩癬令水出便以醋調塗之不過三兩上瘥乳香膏出聖惠方治風癬皮膚瘙癢乳香細研膩粉硫黃各一分細研杏仁湯浸去皮尖研吳茱萸搗末地龍糞細研巴豆去皮心各半兩上先以豬脂一斤煎十餘沸去巴豆入諸藥末和攪令勻更煎十沸以來傾於瓷器內盛令冷塗之雄黃膏出聖惠方治風毒疥癬雄黃一分細研附子半兩去皮臍膩粉白礬燒灰藜蘆去蘆頭川椒各一分去目及閉口者上為細末入乳鉢內再研如粉以煉了臘月豬脂半斤黃蠟二兩淨鐺內慢火煎候蠟消傾在瓷盒內入雄黃等末攪令勻每日四五度取少許塗之又方出聖惠方治風毒癬遍身皆瘙癢莽草蛇床子藜蘆石亭脂各一分白礬一兩黃柏一兩銼上為細散用少許貼在患處立瘥鯽魚膏出聖惠方治一切瘡癬或干或濕痛癢不可忍鯽魚一尾雄黃半兩細研膩粉半兩豬脂半斤乳發一雞子大上先將豬脂熬令沸即下魚煎令焦次下發令銷去渣下雄黃膩粉攪令勻傾於瓷器中候冷塗不過五七度無不瘥者洗浴丹參湯出聖惠方治風癬瘙癢丹參三兩苦參五兩銼蛇床子三兩白礬二兩細研上除白礬外搗篩為散以水三斗煎取二斗濾去渣入白礬攪令勻乘熱於避風處洗浴以水冷為度拭乾了以藜蘆末粉之相次用之以瘥為度苦參丸出聖惠方治一切風癬皮膚瘙癢苦參水浸一宿銼焙乾烏蛇酒浸去皮骨炙各四兩菖蒲一兩上為細末煉蜜丸如梧桐子大每服三十丸溫熟水下無時又方治風毒攻皮膚生瘡癬頑麻不知痛癢出聖惠方苦參三兩白花蛇肉三兩酒浸酥拌炒微黃上為細散每日四五度以溫酒下二錢煮腎散出聖惠方治一切風癬附子炮裂去皮臍椒紅各半兩上同搗為散末用豬腎一對竹刀切開去筋膜每個八人藥末一錢鹽一捻相和布纏綿縛以好酒一盞於瓷盒內煮約七分熟五更初不得漱口及説話去綿旋旋嚼細呷煮藥汁送下食少白粥投之當晚放利次日煮熟吃須連日服盡再作備急羊蹄根塗方出聖濟總録治一切風癬及諸癬瘙癢搔之不已羊蹄根草烏頭淨拂多人行磚土滴好醋先磨草烏頭約一分次磨羊蹄根二分爬發令癢以指點藥抹之仍吃煮腎散相為表裡烏頭丸出本草方治宿患風癩癬遍身黑色肌體如木皮膚粗澀及四肢麻痹宜服草烏頭一斤入竹籮內以水浸用瓦子於籮內就水中瀧洗如打菱角法直候瀧洗去皮及尖控起令乾麻油四兩鹽四兩入銚內炒令深黃色傾出油只留鹽並烏頭再炒令黑色煙出為度取一枚劈破心內如米一點白恰好也如白多再炒趁熱杵羅為末用醋糊丸如梧桐子大干之每服三十丸空心晚食前溫酒下真州資福文雅白老元祐間有此疾服數年肌體黑色頓除腳力強健聽視不衰有一宗人遍身紫癜風身如黑服逾年體悅澤教豫服之亦得一年許諸風疹瘡瘍皆除然性差熱難制去毒要之五七日作烏豆粥啜之為佳粥法用豫章集中者治風癬以暖酒用蜜中攪之飲一杯即瘥天麻散出十便良方天麻防風細辛芎藭乾葛殭蠶各等分上搗羊蹄根汁調二錢成膏以熱酒浸動食後服以羊蹄根汁搽瘡上愈治風癬癬有數種荷葉瘡者開生如圈多在頭面柯皮癬者皮厚癢痛輕者用荷葉心左纏藤葉同為末麻油調塗厚者加砒少許和勻水調塗八寶散治風癩松皮頑癬久不瘥者神效豫一鄉人患此疾數年不愈後忽有舊親傳此方試用得驗遂再換身驅如常藿香破故紙大腹皮檳榔雄黃輕粉硫黃枯白礬各一兩上為細末小油調搽日上數次癢則搽之搽癬藥蛇床子一兩為末枯白礬一兩研為末上用斑蝥煎用麻油調塗瘡上久癬附論夫久癬者為諸癬有蟲而經久不瘥者也癬病之狀皮肉癮疹如錢文漸漸增長或圓或斜癢痛有稜廓搔之有汁又有乾癬皮枯瘙癢搔之無汁又有風癬搔之頑痹不知痛癢又有牛皮癬因飲牛飲余水得之其狀皮厚硬強又有圓癬作圓又隱起四面赤又有狗癬因飲狗食余水或用洗手面得之其狀微白點綴相連亦微癢又有雀眼癬作細文似雀眼搔之亦癢痛又有刀癬因以磨刀水洗面得之其狀無稜廓縱斜無定如此知癬初得或因風濕客於肌膚折於氣血所生至其病成皆有蟲侵蝕轉深連滯不瘥故成久癬也方定粉膏治乾溼癬不拘年月定粉水銀白蕪荑胭脂各一分上同研令勻用陳豬脂一兩同研成膏先用湯洗後以膏子臨臥塗之一上便瘥本法豬脂當用七年以上者若無但陳者亦得仍用後方淋洗楝實半斤無實根皮代楝葉及嫩枝凌霄葉及枝銼各一升丹參枳殼去瓤蛇床子地榆皂莢各三兩並細銼苦參三兩細銼上煎濃汁熱洗患處蛇床子湯洗方治一切癬久不瘥蛇床子白土一作白鹽羊蹄根葛根苦參菖蒲莽草各三分黃連去須半兩上細銼以水五斗煎至二斗濾去渣溫暖淋洗癬上三日後重暖藥湯更洗之不過三五度瘥五倍子散治癬久不瘥五倍子一兩燒令煙盡黃柏一分銼當歸一分銼微炒膩粉一分白礬一分燒灰漏蘆一分上為細散先用鹽漿水洗拭乾了以散敷之烏蛇丸治多年諸癬醫治不效者烏蛇酒浸去皮骨炙天麻各二兩槐子半斤白附子炮附子生去皮臍小便浸一宿各一兩白殭蠶炮羌活去蘆頭乳香研各一兩半苦參十兩乾蠍炒一兩半上為細末用生薑自然汁和蜜各一斤熬膏入前藥和搗丸如梧桐子大每服二十丸空心溫酒送下夜臥荊芥湯下黃連膏治一切久癬積年不瘥四畔潛侵潛瘡瘡色赤黑癢不可忍搔之血出黃連去須為末黃柏去粗皮為末豉研細蔓荊子為末杏仁湯洗去皮尖雙仁細研各半兩水銀一錢上先以水銀於掌中唾研如泥次入乳鉢內下生油一合和勻次入藥末同研成膏用瓷盒盛日三五度取塗癬上即瘥治一切癬瘡經久不愈者以羊蹄根扁柏斑蝥沙糖同一處炒令香以紗帛包藥熏搽癬上三五次愈又方出聖惠方治風癬久不瘥皮膚癢痛白礬一兩燒灰硫黃一兩細研膩粉一分黃連一兩半去須雌黃一兩細研蛇床子一兩上為細散都研勻豬脂調如稀麵糊先以鹽漿水洗淨瘡即塗藥於上如冬月寒以微火暖用之久癬方出直指方生硫黃硝石明礬煅各半兩雄黃二錢半雌黃二錢半輕粉一錢上為細末好麻油調敷濕則摻白蘞散出百一選方治乾溼癬瘡延生或如錢成圈暈久不效者宜服天南星一兩蠍一錢大草烏半兩白礬五分上搗篩為細末先以手於癬處抓動將藥摻貼每用藥二錢許入燒蟹殼一錢合和生油好粉貼瘡又方出聖惠方治風癬久不瘥皮膚癢痛吳茱萸粉腳白礬燒灰臭黃各一兩上細研如粉以生麻油調塗之砒霜散出聖惠方治癬不問乾溼積年不瘥砒霜一分硫黃三分密陀僧三分膩粉三分上細研為末如干以生油調塗濕則用藥末摻之又方出聖惠方蒼耳汁一合生薑汁半合硫黃半兩細研上細和塗之干即更塗治癬瘡積年久不愈出經驗良方敗毒菜根要獨根者又名羊蹄根多用川百藥煎鹽梅肉等分上先擂菜根後將二味同擂以井花水一盞濾過澄清隔宿天明空心服服過不宜食熱食其渣留抓破瘡搽搽三四次愈黃藥子散出經驗良方治乳癬瘡積年不瘥黃連玄參赤芍藥各半分上為末每用隨多少入輕粉少許嚼芝麻揉汁調先煎韭菜湯溫洗令淨以藥敷之硫黃散出聖惠方治風癬久不瘥膚癢痛硫黃一分硝石半兩膩粉半兩白礬半兩燒灰上細研如粉以生麻油調如膏塗之又方出聖惠方麝香一分細研膩粉三分龍膽三分搗末巴豆半分去皮心上細研如粉以麻油調膏塗之又方治久癬不瘥用輕粉同臘月豬脂先以溫米泔洗瘡拭乾一塗即效再塗絶根最神效若小兒癬豬脊骨髓條研和膩粉治癬瘡久不瘥出千金方以羊蹄根搗絞取汁調膩粉少許如膏塗敷癬三五遍即瘥如干即以豬脂調和敷之一方用羊蹄根以桑柴炭煮汁四五沸以洗千金方云禿瘡疥癬皆有三年不瘥便為惡疾尋常治癬只用羊蹄根耳而此方最為神蓋輕粉殺蟲第一又豬脂和之大有意義日未出採之佳必效方出聖惠方治久乾癬斑蝥三枚微炒硫黃一分細研豬牙皂莢一分炙黃地卷一分背陰草一分上為末合和令勻用津唾調塗之剪草散出瑞竹堂方專治頑癬久不瘥者桱樹皮八兩剪草四兩白芨四兩巴豆十四個連殼研上為細末新汲水調如糊厚敷於癬上干去之再敷立效不須抓破
