body:
  text: 卷三百四十七產後諸疾門吹乳附論夫產後吹奶者因兒吃乳之次兒忽自睡呼氣不通乳不時泄蓄積在內遂成腫硬壅閉乳道津液不通腐結疼痛亦有不癢不痛腫硬如石名曰吹奶若不急治腫甚成癰產後吹奶最宜急治不爾結癰竟至死者速與服皂角散栝蔞散敷以天南星散以手揉之則散矣大全良方總論云產後乳汁自出蓋是身虛所至宜服補藥以止之若乳後脹滿急痛者溫帛熨之產寶有是論卻無方以治之若有此證但以漏蘆散治之可亦有未產前乳汁自出者謂之乳泣生子多不育經書末曾論及方漏蘆湯出瘡科精要治婦人吹奶初覺漏蘆楝實大黃黃芩芍藥甘草各半兩上為末每服三錢水一盞半燈草三十莖同煎至一盞去滓溫服無時治吹奶出瘡科精要治一切惡瘡初覺一二日立效栝蔞一個去皮生薑一兩去皮大黃半兩甘草半兩上共搗作一塊以米半碗同煎至七分去滓入沒藥乳香末共二錢半通一服鯪鯉角散一名通利散治吹乳癰疼痛不可忍者出聖惠方鯪鯉角一兩炙黃又名穿山甲木通一兩自然銅半錢生用上搗羅為散溫酒下一錢服不拘時治婦人吹奶出聖惠方馬明蛻五錢燒灰輕粉三錢麝香少許上為細末每服二錢熱酒調下服之栝蔞散出永類鈐方治產後吹奶腫硬疼痛欲結癰輕則為吹奶妒乳重則乳癰乳香一錢半栝蔞根末一兩上研令勻溫酒調二錢服又方天南星末溫湯調塗之治婦人吹奶痛不可忍出瑞竹堂鼠糞五十枚麝香一字上為細末食後用熱酒一盞調服立愈一方雄鼠糞兩頭尖者昔劉汝翼治一屠戶妻立效但不令病人知恐不肯服二消散治吹奶烏魚骨朴硝各等分上為細末用葦筒兒盛藥吹入鼻中仍令人用藥末下腫痛處徐徐消去立效治吹奶腫痛出海上名方上用胡桃二個大者取皮細嚼以熱酒二盞送下二服立效一方連皮燒存性為末調下治乳癰吹奶結實疼痛出危氏方上陳皮一兩甘草一錢水二碗煎一碗分二次服次用荊芥羌活獨活煎湯熏之溫則洗之則安連翹消毒飲出經驗良方上用連翹三錢牛蒡子防風荊芥穗各一錢甘草一錢併為粗末每服四錢水一盞半煎七分去滓食後服加甜蔞實內子每一個取四分三研碎入藥又方出經驗良方上以生甜蔞去殼取子同生姜一小塊研勻炒調酒隨意服治吹奶出永類鈐方上用皂角刺燒灰拌蛤粉乳香少許併為細末熱酒調服手揉散即可一方無乳香吹奶良方上用小車耳上油脂垢丸雞豆大每服加一丸一日三服七日自消八日膿自出治吹奶上用甜菜根酒一碗水一碗蔥三根同煎至八分服之立效勝金丹出衛生寶鑑治婦人吹奶極有效百齒霜今梳上發之垢也上一味不拘多少用無根水為丸桐子大每服三丸倒流水送下食後令病左乳者左臥右乳者右臥於溫處汗出愈用新水傾於房上接之乃倒流水也葡萄酒治吹乳上一味葡萄一枚於燈焰上燎過研細熱酒調服導經散治婦人外吹乳上用皂角十定銼細火內燒過煙盡黑色細末入乳香沒藥令勻每服二錢溫酒調下白丁香散治婦人吹乳初覺身熱及胸乳腫硬是其候也服之能令下乳汁通其血脈自能立消矣上用白丁香直者研細每服二錢酒調服腫硬者服之立消甚者不過三服治吹奶不癢不痛腫硬如痂上以青橘皮三兩湯浸去瓤焙為末不時溫酒下二錢匕治吹奶上以水調面煮如糊欲熱即投無灰酒一盞共攪之極熱以令如稀粥可飲即熱吃令人徐徐按之藥行即瘥也治吹奶惡寒壯熱上用豬肋脂冷水漫拓之奶上易立效治小兒吹奶疼痛腫欲作急疼方上取蛇蛻皮一尺八寸燒令黑細研以好酒一盞微暖頓服未甚較煎服消毒飲上加連翹三錢黃栝蔞仁三十粒捶碎每服四錢水一盞半煎食後溫服之治久奶有時發動脅痛如打上以六月七月取地膚子乾末酒服方寸匕日五六服治婦人吹奶上以淘米木杓上砂子七個酒下以吹帚枝透乳孔連翹散治吹奶因兒鼻中氣吹著奶房更過體熱結聚或如桃李核疼痛者宜服此消之連翹一兩半犀角屑一兩川大黃一兩半銼碎微炒川升麻一兩木通一兩銼黃耆一兩銼黃芩一兩川芒硝二兩赤芍藥一兩上為散每服三錢以水一中盞入淡竹葉數片煎至六分去滓不計時候溫服治吹奶上用常使木杓柄上尖燒灰存性敷之吹奶乳香散治婦人吹奶憎寒發熱堅硬腫痛未成膿者服之即消白丁香楝直者半兩乳香三錢上件二味同研極細分作三服好酒調下食後並進三服立消穿山甲丸治吹奶腫硬疼痛日夜不歇穿山甲燒灰豬牙皂角燒灰王不留行皂莢針炙微黃自然銅研細蟬殼蛤粉胡桃瓤燒灰各半兩上為末以車脂和丸梧桐子大不計時候以熱酒下二十丸治吹奶方槐花三分蛤粉三合麝香一分細研上為細散不計時候以熱酒調下一錢露蜂房散治吹奶疼痛不止或時寒熱露蜂房一兩麝角一兩上並燒為灰細研不計時候以熱酒調下二錢又方用葛布五尺燒灰細研為散不計時候以熱酒調下二錢每日三服又方烏蛇二兩酒浸去皮骨炙微黃穿山甲一兩炙黃焦上為細散不計時候以熱酒調下一錢又方蔓荊子一合炒黃搗末車脂一兩上以麵糊和丸如綠豆大不計時候以溫酒調下十丸又方桑螵蛸三枚燒令斷煙皂莢一寸去黑皮塗酥炙微黃去子上同搗為末用酒一中盞煎至六分去滓溫服又方出聖惠方狗糞中骨燒灰半兩麝香一錢上同研令細不計時候以熱酒調下一錢蛤粉丸出聖惠方治吹奶不癢不痛硬腫如石用蛤粉半兩車脂和丸如小豆大每服溫酒送下二十丸不過三服瘥又方出聖惠方用龍骨一兩細研為散每服以熱蔥酒調下一錢日三四服又方出聖惠方上以無子皂莢刺一斤點火燒候著撒蔓荊子四兩在內待蔥為灰即細研每服以熱酒調下二錢服了便按三二十下不過數服效又方出聖惠方上以胡桃燒令煙盡去皮每一顆胡桃瓤用金一片同研以熱酒服服了以手漸按乳上令消如有頭即外破如無頭只內消日三五度服之以得效為度又方出聖惠方用半夏一兩湯洗七次去滑搗羅為散以生薑汁一匙和酒一小盞調下一錢又方出聖惠方上以角蒿末二錢醋漿水一大盞煎至五六分放溫頓服相次服熱酒一盞即瘥又方出聖惠方雀糞十枚丁香三枚末上同研如粉以熱酒調服之治產後乳汁多無故流出方其乳汁冷然後吃此方出護命方當歸五味子續斷白朮萆薢各半兩細辛官桂人參杜仲防風炙艾葉蓯蓉川芎各一分川椒三銖上為細末煉蜜丸如桐子大空心鹽湯鹽酒任下三十丸吃至半月後自然安痊平復如故也亦可吃金液丹治產後乳汁多其乳汁無故自流出喉中乾渴非常不輟思飲方宜服此方病皆由虛冷所致但色黃瘦吃食減少忽未經數月後行脈氣微弱即吃此方但世多以喉干誤下涼藥蓋浮汁無故流出則其喉干並渴從可知也出護命方舶上黃細研當歸各一兩石斛艾葉五味子白芷牡蠣火煅芎山茱萸各半兩防風藁本茯苓豆蔻吳茱萸各一分上為細末煉蜜丸如梧桐子大清晨空心鹽湯送下五十丸消毒紅玉膏出德生堂治吹乳腫疼寒水石煅二兩黃丹炒半兩上為細末新涼水調塗兩乳腫處日換二三次即可消腫治吹奶出華佗中藏經水茸角不以新多少瓦上爆干上為細末酒調服二錢匕次日即愈如已破者略半黃水亦效水茸角壯鬼腰帶作小窠子生三四月間開小黃花葉如夜合葉六七月採兩浙呼為合萌皂角膏出楊氏家藏方治吹奶腫痛皂角不拘多少上用河水投濃汁去滓熬成膏塗即愈樺皮散海岱居士秘方治吹奶樺皮手掌大一方皂角子七個上二味燒成灰好酒空心調服治吹奶出危氏方用鱉甲生為末酒下二錢治吹奶出本草用蘆根下土和雄雀糞暖酒服方寸匕治吹奶取患人不病奶中汁一茶腳多以飲訖臥患一邊良久即安又方用生薑自然汁調蚌粉塗之留奶頭不塗產後乳結核附論夫產後乳結核者以氣血虛弱邪搏之乳脈凝滯故結為核日久不瘥蘊積生熱甚則腫甚則成癰也方枳殼湯治產後乳結核或成癰腫發熱疼痛枳殼去瓤麩炒芍藥人參黃耆銼木通銼當歸切焙桂去粗皮蒺藜子炒去角雞骨醋炙大黃銼炒各一兩上粗搗篩每服二錢水一盞煎至七分去滓溫服不拘時當歸散治產後乳結核堅硬疼痛當歸切焙芍藥黃耆銼蒺藜炒去角雞骨炙附子炮裂去皮臍枳實去瓤麩炒各二兩玉桂去粗皮薏苡仁人參各一兩上為散每服三錢酒調服日三莽草散治產後乳結核或堅硬疼痛莽草葉一兩紫葛大黃各半兩赤小豆二兩上為末用醋如糊敷結核上頻易之每易則先以熱蔥湯洗之敷膏方治產後乳腫熱痛黃連去須三分大黃生鼠糞炒各半兩上為末用米醋調敷四邊頻易之每易先用熱蔥湯洗麥門冬湯治產後乳結核及初結作癰服此麥門冬去心焙黃芩去黑心黃耆銼芍藥甘草赤茯苓去黑心木通銼各二兩桑寄生防風去叉人參各三兩上㕮咀如麻豆大每服五錢水一盞半入棗二枚擘煎取一盞去滓入糖一棗大令銷溫不拘時候乳漸消減即服後天門冬丸方天門冬丸治產後乳結核天門冬去心焙二兩半木通銼黃耆銼防風去叉生乾地黃焙桑寄生銼人參各一兩羌活去蘆一兩半大黃一兩白芷升麻各三分澤蘭去枝梗茯神去木天雄炮去皮臍黃芩去黑心枳實去瓤麩炒五味子各半上為末煉蜜丸如梧桐子大每服二十丸加至三十丸溫酒下日三外消膏治產後乳結核疼痛或腫欲成癰伏龍肝半兩大黃銼半兩生薑一方洗切焙研細上除生薑外為末和勻用醋調作膏有小大攤貼病上早晚易之效托裡散治產後乳結核欲壞不壞威靈仙洗焙當歸切焙牡丹皮芍藥銼黃耆銼桂去粗皮各一兩大黃炮半兩上為散每服三錢溫酒調下不拘時候升麻湯治產後乳腫或結核敗壞熱悶升麻白薇各一兩大黃各半兩黃芩去黑心桂去粗皮各一兩芒硝研半兩人參黃耆銼各二分上為粗末每服三錢水一盞煎至七分去滓溫服不拘時大黃湯治產後乳結核腫痛發熱煩悶大黃銼微炒楝實劈破炒去子芍藥馬蹄炙焦黃各一兩上粗篩每服二錢水一盞煎至七分去滓溫服不拘時蔓荊實散治產後乳腫痛煩悶熱蔓荊實炒二兩甘草炙五錢上為散每服二錢溫酒調下不拘時候服黃芩湯治產後初覺有核漸發熱痛累日不退欲成癰黃芩小者甘草炙銼桑寄生銼防風去叉木通銼麥門冬去心焙黃耆銼大黃各一兩赤芍藥一兩上搗篩每服五錢水一盞半煎至一盞去滓溫服不拘時當歸散治乳結核堅硬當歸切焙桂去粗皮各半兩芍藥人參各三分蒺藜子炒去角雞骨炙各一兩木通銼黃耆銼各一兩枳實去瓤麩炒二分上為散每服二錢空腹酒調下日再治婦人乳生結核堅硬或腫疼痛宜用消毒止痛藥水膏方黃柏二兩糯米二合赤小豆一合露蜂房半兩鹽一兩上為散搗生地黃取汁調令稀稠得所者腫痛處大小剪生絹上厚塗貼之干則換之發灰散出聖惠方治乳中結塞腫痛亂髮灰蛇蛻皮灰各半兩蔓荊石微炒一兩上為散每服二錢溫酒調下日三無名異散治乳結顆塊膿水宿滯血脈壅閉惡血疼痛久不瘥者無異名牡丹皮虎杖根當歸切焙白芷白茯苓去黑皮各三分沒藥研麒麟竭研木香黃芩去黑心黃耆人參桂去粗皮熟乾地黃焙各半兩上為散每服三錢空腹煎棗湯調下日三服又方治奶結硬疼痛用百藥煎為細末每服三錢酒一盞煎數沸熱服再以滓敷腫痛處又方用鱔魚皮燒灰存性為末空心酒調服療乳癰起痛方大黃黃連各三兩上用水五升煮取三分三服下即愈內消散治婦人乳癰毒始生核川大黃黃芩黃連去須黃藥子地龍炒令黃乳香各一兩上為細散用生地黃汁調勻塗於腫毒上若干即易之不過三五度瘥當歸散治婦人乳生結核疼痛散毒氣止疼痛當歸三分銼微炒甘草一兩銼川芒硝一兩黃連三分去須芍藥子三分川大黃一兩蒲公草三分玄參三分上為細散用雞子白調為膏於生絹上塗貼取藥為度治婦人乳生結核及腫疼宜協貼鹽草根生弱頭各二兩上搗如泥貼之立效療產後乳初結脹不消令敗乳自退方栝蔞一個半生半炒大粉草一寸半生半炒生薑一塊半生半煨上同銼用酒一碗煮取一盞去滓服之其痛一會如不可忍即搜去敗乳臥臥每一服順所患處乳側臥於床上令其藥行故也產後乳結癰附論產後衝任不足氣血俱虛潛行入於足陽明之脈其直行者從缺盆下乳內廉下俠臍入氣衝中衝脈者起於氣衝並足陽明之經夾臍上行至胸中而散也其經為邪熱沖則血為之擊搏氣為之留滯擊搏則痛作留滯則腫生內經所謂營氣不從逆於肉理乃生癰腫此疾者乳汁蘊積與氣相搏故也方當歸飲治產後乳癰欲結發熱腫痛當歸切焙芍藥牡丹皮生乾地黃焙人參黃耆銼大黃生升麻連翹各一兩上粗搗篩每服五錢水一盞半去滓溫服不拘時黃耆湯治產後乳結核或腫痛漸成癰煩熱黃耆銼生乾地黃焙麥門冬去心焙升麻各一兩半人參赤茯苓去黑皮各一兩當歸切焙芍藥遠志去心甘草生各半兩上粗搗篩每服五錢水一盞半去滓溫服不拘時候蛇蛻皮散治乳癰疼痛寒熱發渴晝夜不可忍蛇蛻皮燒灰半兩麝香二錢上研細每服二錢熟酒調下不拘時芍藥湯治產後乳結癰膿敗壞不散發熱疼痛芍藥桂去粗皮黃耆銼赤茯苓去黑皮當歸切焙生乾地黃焙各一兩甘草炙銼麥門冬去心焙人參各一兩上㕮咀如麻豆大每服五錢水一盞半再入生薑一棗大切煎至八分去滓下朴硝末一錢再煎令沸溫服不拘時甘草飲治產後乳癰熱痛未結膿者甘草半兩半生半炙栝蔞一枚去皮用瓤上先以酒三盞煎甘草至二盞入栝蔞瓤煎至一盞去滓溫服半盞如稠即以酒少許解之未效再服栝蔞散治產後乳癰膿潰未潰熱痛不已栝蔞實二兩敗醬細辛去苗葉乾薑炮桔梗炒厚朴去粗皮薑汁炙防風去叉人參各半兩上為散每服三錢溫酒調下水一盞煎至八分溫服亦得不拘時黃耆膏治產後乳癰欲結未結膿攻痛黃耆銼芎藭當歸切炒黃芩去黑心黃連去須白蘞芍藥防風去叉各一兩上為末用雞子白調隨大小貼之每日一易豬蹄湯洗方治產後乳癰破後膿血不盡豬蹄一具當歸切炒芍藥黃芩去黑心獨活去蘆頭莽草大黃銼炒芎藭各半兩上搗羅七味為末將豬蹄銼洗令淨以水五升煮熟去滓澄清內藥再煎令熱通水手洗乳上令透拭乾良久又暖洗不拘次數漏蘆膏治乳汁不時泄蘊積於內遂成癰漏蘆黃芩去黑心各一兩米粉半兩上為細末新水調如膏塗之麥門冬湯治乳腫初覺有異生麥門冬去心黃耆銼防風去叉各一兩半甘草炙三分桑寄生一兩半木通一兩半黃芩去黑心赤芍藥各一兩上㕮咀如麻豆大每服五錢水一盞半入棗二枚煎至八分去滓內乳糖一分再煎一沸去滓溫服芍藥散療乳癰腫消核芍藥通草桂心昆布白薇附子炮黃耆人參海藻木占斯各一兩上搗散以清酒服一錢日三當先食並療頤下氣結瘰癧柏皮膏乳癰眾醫不能療上豬膏年多者佳柏皮三斤去黑皮以豬膏煎之當稍稍煎柏皮熟黑便漉出更煎余柏皮如初盡以塗瘡取余者膏令淹沒柏皮而已甚驗三物桂心貼治乳癰桂心烏頭甘草各二分上搗散以苦酒和塗腫上以小紙覆濡其上將乳居其中以乾布置乳下須臾布當濡有膿水為佳又方研末捶二枚煮令熱以絮布巾覆乳上用二捶更互熨腫數十過瘥止已用大驗治乳癰堅硬痛不可忍上莨菪子半大匙當年新者服時不得嚼破以清水一大盞和頓服痛即止治婦人乳癰覺癰色未變時以飼豬米研汁飲之即瘥仍取豬槽木厚如匙面火炙數熨治婦人乳癰疼痛宜熏方十便良方露蜂房半斤細研上件藥以醋五升煮令熱相和傾於瓶中熱熏乳上三五度即瘥冷即再煎之效又方十便良方大黃一分灶上黃土一分生薑二分上三味搗羅為末醋和塗乳痛即止極驗劉涓子不用生薑用生魚三味等分魚必用鯽魚妙三能散十便良方治奶癰綿黃耆皂角刺燒存性各一兩上搗羅為散以酒調二錢服能穿能散香螯散楊氏家藏方治婦人奶癰才覺作痛氣欲結者便服此奶令內消車螯殼火煅一兩乳香半兩另研甘草一兩炙銼膩粉半錢上件為細末每服一錢用乳香溫酒送下食後日進三服聖棗散楊氏家藏方治乳癰上棗四十九枚燒灰留性不拘癰大小盡用棗灰及糞堆下土研細三四錢和勻以新汲水調敷治奶癰結聚成塊疼痛難忍護命方好肥皂角二條香蔥十枚上先捶皂角碎水一碗揉取汁煉成膏即碎揉蔥入內更煎三二沸紙攤貼痛處露奶頭令清水出只初痛一兩日可使已成膿者便不可使通和湯衛生家寶治婦人乳癰疼痛不可忍者亦治吹奶疼痛不可忍穿山甲一兩炮黃木通銼一兩自然銅半兩醋淬七次上為細末每服二錢熱酒調下食遠服之又方衛生寶鑑治奶癰瘡凡未成瘡才覺腫硬作痛以蔥棗熨之其法用中樣小瓷瓶瓶口寬者以炭火入瓶內上以熱灰填滿瓶口蔥葉及蔥白捶損令遍覆瓶口以手帕子裹定倒熱將瓶口向腫處任意輕輕熨之有驗治產後忽然乳痛堅硬成塊將欲成癰腫先吃此方但臟腑熱忽得乳痛先吃此方麻黃去根連翹子各半兩知母射干當歸蔓荊子大黃芍藥荊芥穗牡丹皮去心各一分半夏二錢木通四銖上為細末每服三錢水一盞生薑三片同煎取九分食後臨臥去滓吃須再煎連吃以大腑通為度治吹奶癰腫疼痛熱發渴晝晚呻吟蛇蛻皮一兩燒灰赤小豆一兩上件藥搗羅為散以雞子白和調敷之治乳癰結硬欲作癰十便良方用真樺皮溫熨腫處自即消又方永類鈐方用萱草根同射干研爛生酒濾過以滓貼瘡久患此腐爛見骨膜垂死者用萱草根其葉柔其根如麥門冬射干根如殭蠶葉硬如劍者敷之神效治產後不自乳兒蓄積乳汁結作癰肘後方取蒲公草搗敷腫上日四度易之俗呼為蒲公英語訛為蒲公明缶是也火煮汁服亦得治產後妒乳癰腫脹後產後不見乳汁結作癰用蒲黃炒熱杵敷腫上日三度易之又以井花水煎葉汁飲之亦佳食之亦得妒乳及癰並瘥又方千金方用皂角十條以酒一升揉取汁硝石半兩煎成膏敷之連翹湯拔粹療方產後妒乳並癰連翹升麻芒硝各十分玄參芍藥白蘞防己射干各二分大黃十二分甘草六分杏仁八十枚去皮尖上以水九升煎取三升大黃次下硝分三服復元通氣散永類鈐方治乳癰栝蔞青皮烏藥白芷各等分初發甚服效病已半勿多服穿山甲角有惟專發散也懸癰通用治乳癰本草取人齒燒灰細研酥調貼癰上治乳癰本草以烏骨雌雞膽汁敷之日三療乳癰痛寒熱者本草取蔓青根並葉淨擇去上不用水洗以鹽搗敷乳上如熱即換不過三五易之即瘥冬月無葉但用根亦可切須避風耳產後悶煩附論夫產後煩悶者由產後臟腑勞傷血氣虛損而風邪乘之搏於血使氣不宣而否澀則生於熱或肢節煩疼口乾因虛生熱則多煩悶此乃表裡俱虛血氣未復而氣逆乘之故悶煩也新產之後血氣俱虛或因亡血過多或因惡血下少致血氣不利陰陽相勝陽勝則發煩悶經所謂陽勝則熱是也方淡竹葉湯治產後血不利心煩喘悶淡竹葉麥門冬去心焙小麥白茯苓去黑皮各一兩上為散粗搗篩每服二錢水一盞生薑三片煎至七分候去滓溫服空心日午臨臥各一蒲黃散治產後血氣痛煩悶渴燥蒲黃一兩乾薑炮半兩薑黃切當歸切桂去粗皮上為散每服一錢煎人參湯調下空心日午臨臥服麥門冬湯治產後煩悶或血氣不快麥門冬去心焙二兩甘草炙銼白茯苓去黑皮人參各一兩上粗搗篩每服三錢水一盞生薑三片棗一枚煎至七分候入竹瀝半合再煎數沸去滓溫服黑金散治產後血氣煩悶腹痛脹滿赤龍鱗燒灰研亂髮燒灰研當歸切焙人參二分麝香另研一錢白茯苓去黑皮用二分硇砂去砂石研一分犀角鎊枳殼去瓤麩炒大黃銼炒各一分上除發灰並麝香外搗羅為細散合研勻每服一錢溫熱水調下空心日午臨臥服羚羊角散治產後血氣煩悶腹痛羚羊角燒灰延胡索黃耆銼枳殼燒灰芍藥白茯苓去黑皮劉寄奴各半兩上為散每服二錢煎人參湯調下空心日午臨臥服地黃飲出聖惠方治產後血氣不利心胸煩悶脅肋滿口乾壯熱不思飲食生地黃汁一盞當歸切焙搗末二兩酒生薑汁各半兩童子小便一盞人參搗末一兩上四汁相合每服用汁半盞水半盞入人參當歸末各半錢同煎至七分空心日午臨臥溫服一方無人參名曰地黃飲子不拘時候紫葛飲出聖惠方治產後心中煩悶不解紫葛麥門冬去心焙人參羚羊角鎊小麥甘草炙銼各半兩上粗搗篩每服三錢水一盞入生薑三片棗一大枚擘煎至七分去滓溫服不拘時候竹茹散治產婦悶煩氣短竹茹人參白茯苓去黑皮黃耆銼當歸切焙生地黃焙各半兩上為散每服二錢溫酒調下不拘時候人參散治產後虛煩氣短心下不利人參烏藥各一兩檳榔銼半兩黃耆銼三分木香一分熟乾地黃焙一兩麥門冬去心炒甘草炙銼各三分上為末每服二錢沸湯調下不拘時候人參丸治產後虛煩氣血滯攻腰腹疼痛煩悶少力人參一兩延胡索桂去粗皮芎藭木香當歸切焙白茯苓去黑皮厚朴去粗皮生薑汁炙蒲黃白芷各一兩熟乾地黃焙二兩上為末煉蜜和丸如梧桐子大每服三十丸酒下每日三服白茯苓湯治產後氣血虛心膈煩滿身腫體熱惡露不行白茯苓去黑心赤芍藥芎藭各一兩半桂去粗皮大腹皮銼枳殼去瓤麩炒熟乾地黃焙各一兩上粗搗篩每服三錢以水一盞生薑三片煎至七分即去滓溫溫服日三當歸湯治產後虛煩腹痛當歸切焙芍藥木通銼各一兩上粗搗篩每服二錢水一盞半入生地黃二寸許切碎同煎煎至八分去滓溫服不拘時候真氣湯治初產後血氣煩悶童子小便三合生地黃汁一合上相和微煎三四沸分溫二服逍遙湯出危氏方治產後無力血虛心煩自汗精神昏冒心怯頰赤口燥咽乾發熱頭痛或寒熱如瘧白茯苓去黑皮白朮當歸切焙芍藥柴胡去苗各一兩上粗搗篩每服二錢水一大盞入燒生薑一塊切破薄荷五葉同煎至七分去滓熱服不拘時候人參當歸湯出千金方治產後陰虛生內熱煩悶不安人參當歸麥門冬乾地黃桂心各一兩大棗二枚粳米芍藥四兩淡竹葉二升上㕮咀以水一斗二升先煮竹葉及米取八升去滓內藥煮取三升去滓分三服若煩悶不安者當取豉一升以水三升盡服之甚良地黃用生乾者虛甚則用熟者赤小豆散出千金方治產後煩悶不能食虛滿用赤小豆六七枚燒作末以冷水和頓服之治血氣煩悶脅肋脹滿及痛一名薄荷散芍藥八分蒲黃延胡索各四分當歸六分荷葉蒂三個炙上以水二升煎取七合後入蒲黃空心分三服治血氣煩悶方出大全良方上以竹瀝飲一盞甚效又方生藕汁飲二升知母湯出千金方治產後乍熱通身溫壯胸心煩悶知母三兩芍藥黃芩炙二兩桂心甘草炙一兩上㕮咀以水五升煮取二升半分三服一方不用桂心加生地黃竹葉湯出千金方治產後心中煩悶不解生淡竹葉一升麥門冬一升甘草二兩生薑茯苓各三兩大棗十四枚小麥三合上㕮咀以水一斗先煮竹葉小麥取八升內諸藥煮取三升去滓分三服若心中虛悸者加人參二兩其人食少無穀氣者加粳米五合氣逆者加半夏一兩大全良方不用茯苓蒲黃散便產須知治產後煩悶虛煩去血多則陰虛而生內熱其證心胸躁滿氣短頭痛悶亂骨節疼晡時輒甚用蒲黃紙上炒以東流水和服方寸匕極良治產後煩悶不能食用白犬骨一味燒研以水服方寸匕療產後心悶不識人汗出乃血氣衝心及胸脅腹肚熱痛時來時止用羚羊角燒為末以東流水服方寸匕未瘥再服取瘥為度出肘後方治產後煩躁用禹餘糧一枚狀入酸醋者入地埋一半四面緊築用炭一秤發頂火一斤煅去火三分耗二為度用溫砂土器一宿方取打去外面一重只使里內細研淘澄五七度將紙襯干再研數千遍患者用甘草煎湯調二錢匕只一服立效即愈治產後惡煩悶用羚羊角燒灰酒服方寸匕未瘥再服一治產難治產後心悶眼不得開出千金方即當頂門上取發如兩指大強以人牽之眼即開紫葛飲子治產後心中煩悶不解紫葛半兩麥門冬半兩去心生地黃半兩小麥半合甘草一分炙微赤銼生薑一分上細銼和勻分為三服以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖惠方治產後因虛生熱致生心神煩悶麥門冬去心一兩羚羊角半兩屑人參一兩半去蘆甘草半兩微赤銼蒲黃一兩上搗篩為散每服三錢以水一中盞入竹葉二七片小麥半合煎至六分去滓不計時候溫服黃耆散出聖惠方治產後口乾煩悶心躁黃耆一兩銼麥門冬一兩去心赤茯苓一兩當歸半兩甘草半兩炙微赤銼生乾地黃一兩上搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓溫服不計時候蒲黃散出聖惠方治產後血氣上攻胸膈煩悶不安蒲黃一兩當歸一兩麥門冬去心一兩赤芍藥一兩生乾地黃一兩鬼箭羽半兩上搗篩為散每服三錢以水一中盞入竹葉二七片粳米五十七粒煎至六分去滓不計時候溫服竹茹飲子出聖惠方治產後內虛煩悶短氣竹茹一兩人參一兩去蘆頭白茯苓一兩黃耆一兩銼作黃芩甘草一分炙微赤銼上細銼和勻每服半兩以水一大盞入棗三枚煎至五分去滓不計時候溫服一方無棗紅藍花飲子出聖惠方治產後血氣攻心煩悶氣欲絕不識人紅藍花半兩紫葛半兩銼赤芍藥半兩銼生地黃汁三合後下童子小便三合後下蒲黃半兩上都以水一大盞酒半盞煎至八分去滓下地黃汁並小便更煎三兩沸不計時候分溫三服琥珀散出聖惠方治產後惡血不下心膈煩悶琥珀一兩蒲黃一兩劉寄奴一兩赤芍藥一兩蓮子心半兩鬼箭羽半兩上搗細羅為散每服不計時候豆淋酒調下二錢忽麻散出聖惠方治產後燥熱心神煩悶忽麻一兩紅藍花半兩當歸半兩銼微炒赤芍藥半兩琥珀半兩嫩荷葉半兩上搗細羅為散每服不計時候以生地汁調下二錢治產後心神悶煩眩迷不省唇口冷脈欲絕面青血氣上衝宜急服此方出聖惠方酸醋三合雞子一個打破瀉在碗中上先煎醋一沸傾入雞子碗中熟攪頓服立效治產後煩悶手腳燥熱厭弱氣欲絕血暈心頭硬乍寒乍熱宜服此方聖惠方用續骨枝一握銼以水一大盞半煎取一盞分為三服如人行三五里再服治產後惡血不盡心膈煩悶腹中刺痛宜服此方聖惠方延胡索一兩益母草半兩上搗羅為散不計時候以溫酒調下一錢又方聖惠方用生地黃四兩細切酒二大盞煎至三五沸去滓分為五次服不計時候又方聖惠方當歸二兩銼微炒鬼箭羽二兩上搗羅為散每服不計時候以紅藍花酒調下二錢治產後虛勞心熱煩悶不識人方聖惠方取生雞子一枚打破去殼吞之又方聖惠方童子小便一小盞生薑汁一合生地黃汁一合上相和煎一沸放溫分為三服頻頻服之又方聖惠方生地黃汁一中盞童子小便一中盞蒲黃半兩上相和攪令勻不拘時候分溫四服又方聖惠方以生藕搗絞取汁暖飲一小盞頻頻服之凡產後忽血悶汗出不識人者暴虛故也危氏方用破雞子三枚吞之便醒可飲童子小便一升甚驗丈夫小便一升亦得切不可用病人者又若久不識人或時復發者此為有風因產血氣暴虛風行脈中故也若產後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須更不定再與五合頻與三五服即瘥治婦人產後胸滿悶不思飲食四肢潮熱用柴胡湯一帖黃芩三兩用水二盞煎至盞半空心服治產後血悶血竭用藕節和生地黃搗汁熱酒並小便調下治產後血脹悶用甘蕉根搗汁服之治諸虛煩熱以竹葉石膏湯溫膽湯殊不知產後與尋常不同如石膏等藥不宜輕用用之必死人參威靈散衛生家寶治產後痞氣胸膈不快噎悶不進飲食人參茯苓藿香葉白芷甘草炙桔梗各一兩威靈仙一分微炒上件為末每服一大盞棗二枚姜二片水一盞須煎至八分空心食前溫服治產後血脹悶欲死者本草以水煮苦酒煮蘇方木五兩取濃汁服之效治產後血悶止痛本草以折傷木酒煮濃汁飲之治產後血腹悶本草以茺蔚搗汁服之產後煩渴附論夫產後煩渴者由產時水血俱下臟腑乾燥津液不足因虛則生熱故令煩渴也方地黃散聖惠方治產後煩渴壯熱不思飲食生地黃一兩赤茯苓一兩麥門冬三分去心葛根半兩銼石膏一兩研甘草一分炙微赤銼上為散每服三錢以水一中盞入生薑半分棗三枚約煎至六分去滓不計時候溫服栝蔞根散聖惠方治產後煩渴體熱食少栝蔞根一兩甘草一兩炙微赤銼人參一兩去蘆麥門冬一兩去心生乾地黃一兩蘆根一兩銼赤茯苓一兩益母草一兩上為散每服三錢以水一中盞入生薑半分棗三枚約煎至六分去滓不計時候溫服黃耆散聖惠方治產後體虛煩渴飲食減少乏力黃耆一兩銼麥門冬去心半兩生乾地黃一兩甘草一分炙微赤銼人參三分去蘆頭陳皮三分湯浸去白瓤焙白茯苓一兩桑寄生半兩上為散每服三錢以水一中盞生薑半分棗三枚竹葉二十七片同煎至六分去滓不計時候溫服紅藍花散