每用磁石包子同煎至五分去滓空心及晚食前溫服桑螵蛸丸聖惠方治腎臟風虛耳鳴腰脊強直小便滑數桑螵蛸微炒菖蒲山茱萸續斷五味子各三分磁石二兩燒醋淬七遍搗碎細研水飛過附子炮裂去皮臍肉蓯蓉酒浸一宿刮去皺皮炙令乾薯蕷萆薢沉香蘹香子各一兩上為末煉蜜為丸如梧桐子大每日空心及晚食前以溫酒下三十丸鹿茸丸聖惠方治腎臟風虛耳內恆鳴腰腳疼痛鹿茸去毛塗酥炙微黃巴戟五味子石斛去根銼菖蒲各一兩磁石二兩燒醋淬七遍搗碎細研水飛過天雄炮裂去皮臍桂心各一兩半肉蓯蓉二兩酒浸一宿刮去皺皮炙令乾上為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下三十丸腎瀝湯聖惠方治腎臟風虛兩耳常鳴附子一兩炮裂去皮臍桂心熟乾地黃人參去蘆頭山茱萸各三分磁石搗碎水淘去赤汁以帛包之肉蓯蓉酒浸一宿刮去皺皮炙令乾各二兩上為散每服五錢以水一大盞用羊腎一對切去脂膜入生薑半分薤白三莖每用磁石包子同煎至五分去滓空心及晚食前溫服羊角湯聖濟總録治腎臟風虛臟氣不足腰痛耳鳴肢體不隨煩倦無力羚羊角鎊鹿茸去皮酒浸炙各三兩五加皮茯神去木各二兩酸棗仁炒枳實去瓤麩炒熟乾地黃焙各一兩半上粗搗篩每服三錢先以水三盞煮羊腎一隻取汁至一盞半去腎下藥再煎至一盞去滓空心溫服萬靈丸宣明論治腎臟一切耳鳴腰疼筋骨痛草烏頭炮黑狗脊各二兩仙木一兩赤芍藥防風五靈脂黃耆細辛海桐皮山茵陳骨碎補地龍牛膝何首烏蔓荊子白附子川烏頭巨勝子各八兩黑牽牛半兩芫花三分炒青皮御米子炒各二分上為末酒麵糊丸如梧桐子大每服十丸至二十丸溫酒下空心食前補益腎肝丸闌室祕藏方治目中流火視物昏花耳聾耳鳴困倦乏力寢汗惡風行步不正二足敧側臥而多驚腳膝無力腰下消瘦柴胡羌活生地黃炒苦參炒防己炒以上各半分附子一分肉桂一分當歸身三分上件為末熟水為丸雞頭仁大每服五十丸溫水下食前與表寒冬寒心肺寒藥中每服兼一丸須以二藥相兼服之不可單服太陽經嚏藥闌室祕藏方防風根二分羌活根三分紅豆少許兩個上件為細末鼻內嗅之牛膝海桐皮煎丸王氏普濟方治腎臟風並腎餘氣時有上攻耳目頭面背膊及流疰手擘腰腳筋絡頑麻疼痛或時無力耳作蟬鳴以至重聽大壯筋骨補元氣牛膝半斤海桐皮半斤二味細銼杵為末用好酒五升於銅石器內熬成膏附子二兩炮去皮臍赤箭二兩川烏頭二兩炮去皮臍川苦楝二兩五加皮一兩虎頭骨四兩塗酥炙令黃色大黃二兩半桃仁二兩去皮尖麩炒黃色赤芍藥一兩肉桂一兩去粗皮當歸一兩麻黃一兩去根節地龍一兩去土微炒川芎二兩木香獨活沒藥研乳香研防風去蘆骨碎補麒麟竭舶上茴香沉香天南星生用乾蠍各一兩硇砂半兩研水飛過麝香半兩研上件二十丸味修事淨同為末再研令勻細後入前膏內和勻再杵三二千下丸如梧桐子大每日空心溫酒或鹽湯下十丸忌生冷油膩毒物等治腎氣虛耳中如風水鳴或如打鐘磬之聲卒暴聾本草以蜀椒和巴豆菖蒲松脂以蠟溶為筒子內耳中日一易若神驗
