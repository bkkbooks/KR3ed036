body:
  text: 卷三十一腎臟門腎臟虛冷氣攻腹脅疼痛脹滿附論夫腎臟虛冷氣者由腎氣不實下焦久寒陽氣外虛陰氣內積邪冷之氣在於臟腑積聚不散上攻於脾脾虛受之則脹冷搏於陰經則痛也又足少陰支脈行於兩脅今腎與脾俱虛為邪冷所攻正氣與邪氣相擊故令腹脅疼痛脹滿也方蓽澄茄散出聖惠方治腎臟虛冷氣攻心腹疼痛或時吐逆兩脅虛脹不思飲食四肢乏力蓽澄茄木香人參去蘆頭肉桂去皺皮肉豆蔻檳榔訶黎勒皮陳橘皮湯浸去白瓤焙各一兩丁香縮砂去皮乾薑炮製銼京三稜微煨銼赤茯苓白朮各三分附子一兩半炮裂去皮臍赤芍藥甘草炙微赤銼各半兩上搗細羅為散每服不計時候以熱酒調下二錢沉香丸出聖惠方治腎臟虛冷氣攻心神悶亂四肢逆冷腹脅脹滿疼痛喘促嘔吐沉香木香檳榔苦楝子桂心當歸銼微炒蘹香子肉豆蔻去殼桃仁湯浸去皮尖雙仁麩炒微黃阿魏麵裹煨面熟為度蓬莪朮各一兩丁香乾薑炮製銼乾蠍微炒吳茱萸湯浸七遍焙乾微炒青橘皮湯浸去白瓤焙各半兩硫黃一兩半細研水飛過上為末煉蜜和搗三五百杵丸如梧桐子大每服不計時候以熱酒下三十丸五味子丸楊子建萬全護命方治腎臟虛冷腹脅疼痛脹滿非時足冷陰痿行步無力五味子續斷牛膝酒浸切焙附子炮裂去皮臍桂去粗皮杜仲去粗皮炙銼蘹香子炒白茯苓去黑皮芎藭當歸切焙山芋檳榔銼一方無檳榔用木瓜吳茱萸湯洗焙炒細辛去苗葉青橘皮湯浸去白焙各一兩一方用川椒上為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸空心鹽湯下硫黃丸出聖惠方治腎臟虛冷氣攻腹脅脹滿發渴疼痛足脛逆冷骨節痠疼食少無力硫黃細研硇砂細研蓽澄茄蘹香子補骨脂石斛去根木香丁香肉豆蔻去殼桂心當歸銼微炒檳榔吳茱萸湯浸七遍焙乾微炒各一兩何首烏一兩半麝香半兩細研上為末入研了藥令勻以酒煮麵糊和搗三二百杵丸如梧桐子大每服不計時候以溫酒下十五丸補腎湯出聖濟總録治腎臟虛冷氣攻兩脅下脹小腹急痛胸中短氣磁石水飛研淘去赤汁附子炮裂去皮臍各二兩黃耆銼五味子當歸切焙白茯苓去黑皮石斛去根芍藥人參沉香各一兩桂去粗皮一兩半陳橘皮湯浸去白焙三分蜀椒去目及合口炒出汗枳殼去瓤各半兩上㕮咀每服三錢水一盞入生薑一棗大拍碎棗三枚擘破煎至六分去滓食前溫服沉香散出聖惠方治腎臟虛冷氣攻腹脅疼痛或多嘔吐不思飲食兩脅脹滿四肢羸瘦沉香白豆蔻去皮京三稜微炒銼桂心當歸銼微炒木香吳茱萸湯浸七遍焙乾微炒各半分青橘皮湯浸去白瓤焙三兩高良薑銼附子炮裂去皮臍白茯苓白朮各三分厚朴一兩去粗皮塗生薑汁炙冷香熟檳榔半兩上為散每服五錢以水一大盞煎至五分去滓不計時熱服蓽澄茄丸出聖惠方治腎臟虛冷氣攻心腹疼痛腹脅脹滿蓽澄茄木香沉香乾蠍微炒白朮當歸銼微炒青橘皮湯浸去白瓤焙各半兩桂心訶黎勒煨用皮檳榔各一兩蘹香子蓬莪朮高良薑銼各三分上為末煉蜜和搗三二百杵丸如梧桐子大每服以熱酒生薑湯下二十丸葫蘆巴丸出聖惠方治腎臟氣虛下焦積冷氣攻腹脅脹滿臍下疼痛面色青黑足脛多冷葫蘆巴蘹香子硫黃細研附子炮裂去皮臍各一兩南木香桂心當歸銼微炒阿魏研入青橘皮湯浸去白瓤焙白豆蔻去殼沉香各半兩桃仁二兩湯浸去皮尖雙仁別研如膏上為末入研了藥令勻用好酒一升半先熬桃仁膏令稠拌和諸藥末搗三二百杵丸如梧桐子大每服不計時候以熱酒下二十丸沉香湯出聖濟總録治腎臟虛冷腹脅疼痛脹滿沉香細辛去苗葉續斷木香芎藭當歸切焙甘草炙銼檳榔銼石斛去根牛膝酒浸切焙枳殼去瓤麩炒各半兩上粗搗篩每服三錢水一盞煎至七分空心去滓溫服檳榔散出聖惠方治腎臟虛冷氣攻心腹疼痛兩脅脹滿檳榔蘹香子桂心當歸銼微炒芎藭白豆蔻去皮木香青橘皮湯浸去白瓤焙各三分丁香吳茱萸湯浸七遍焙乾微炒各半兩附子一兩炮裂去皮臍上為散每服四錢水一中盞入棗三枚煎至六分去滓不計時候熱服蘹香子丸出聖濟總録治腎臟虛冷氣攻腹脅脹滿疼痛心氣喘悶手足厥冷蘹香子炒木香桂去粗皮檳榔銼桃仁去皮尖雙仁焙研成膏蓬莪朮炮銼各三分青橘皮湯浸去白焙萊蔔子炒附子炮裂去皮臍各半兩厚朴去粗皮生薑汁炙一兩半上搗羅九味為末入桃仁膏研勻以酒煮麵糊丸如梧桐子大每服三十丸空心食前溫酒下蓽澄茄煮散出聖濟總録治腎臟虛冷氣攻腹脅疼痛脹滿煩倦蓽澄茄甘草炙銼人參芍藥各一兩蘹香子炒檳榔銼各三分乾薑炮訶黎勒皮桂去粗皮各半兩上為散每服三錢水一盞煎至七分溫服不拘時蘹香丸出聖惠方治腎臟虛冷氣攻兩脅脹滿腹內疼痛四肢不和蘹香子木香桃仁湯浸去皮尖雙仁別研為膏桂心蓬莪朮檳榔各三分蘿蔔子半兩微炒青橘皮湯浸去白瓤焙半兩厚朴一兩半去粗皮塗生薑汁炙香熟上為末以醋煮麵糊和丸如梧桐子大每服不計時候以熱酒下三十丸蘹香子丸出聖濟總録治腎臟冷氣攻腹脅疼痛脹滿蘹香子炒蓬莪朮煨銼楝實煨去核白朮訶黎勒皮各一兩丁香一分吳茱萸湯浸焙乾炒半兩桃仁三分去皮尖雙仁研如膏上搗羅七味入桃仁膏研勻煉蜜丸如銀杏大每服一丸溫酒或鹽湯嚼下不拘時異香散出和濟方治腎氣不和腹脅膨脹痞悶噎塞喘滿不快飲食不化噫氣吞酸一切氣痞腹中刺痛此藥能破癥瘕結聚大消宿冷沉積常服調五臟三焦和胃進食石蓮肉去皮一兩蓬莪朮煨京三稜炮益智仁炮甘草炒各六兩青皮去白陳皮去白各三兩厚朴去粗皮薑汁炙二兩上為細末每服二錢水一盞生薑三片棗一枚鹽一捻煎至七分通口服不計時候鹽湯點或鹽酒調皆可服木香湯出聖濟總録治腎臟虛冷氣攻腹中疼痛兩脅脹滿木香沉香各半兩青橘皮湯浸去白炒京三稜煨銼各一兩桂去粗皮三分當歸切炒檳榔銼厚朴去粗皮生薑汁炙各三分上粗搗篩每服三錢水一盞生薑三片棗一枚掰破煎至七分去滓溫服葫蘆巴飲出聖濟總録治腎臟氣冷腹痛嘔逆腹脅脹滿四肢少力不思飲食葫蘆巴白茯苓去黑皮舶上蘹香各一兩肉豆蔻去殼木香附子炮裂去皮臍各半兩沉香三分上㕮咀每服三錢鹽一捻煎至七分去滓溫服空心食前烏頭蘹香子丸出聖濟總録治男子腎氣虛攻腹脅疼痛脹滿烏頭炮裂去皮臍檳榔銼蘹香子銼炒楝實銼炒當歸切炒各一兩木香半兩硇砂研一錢上為末和勻醋煮麵糊丸如梧桐子大丹砂為衣每服二十丸溫酒下不拘時候檳榔湯聖濟總録治腎臟虛冷氣攻腹脅脹滿疼痛檳榔生銼木香各半兩蓭䕡子桔梗炒各二兩桂去粗皮附子炮裂去皮臍各一兩上㕮咀每服三錢水一盞煎至七分去滓溫服巴附丸聖濟總録治腎臟虛冷腹脅脹滿葫蘆巴一兩半附子炮裂去皮臍一兩硫黃研一兩蘹香子炒三分檳榔銼桂去粗皮各半兩上為末和勻酒煮麵糊丸如梧桐子大每服二十丸至三十丸溫酒或鹽湯下空心日午臨臥服豆蔻飲聖濟總録治腎臟虛冷腹脅脹痛肉豆蔻去殼葫蘆巴蘹香子炒丁香各一兩沉香三分上粗搗篩每服三錢水一盞入鹽少許煎至七分空心食前去滓溫服葫蘆巴丸聖濟總録治腎臟虛冷腹脅脹滿葫蘆巴二兩附子炮裂去皮臍硫黃研各三分上為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸鹽湯送下艾茸丸聖濟總録治腎臟虛冷氣攻腹脅脹滿疼痛木瓜三十枚去皮核作甕子甘菊花為末青鹽研各一斤上將甘菊花並青鹽填滿木瓜甕子內置籠床內蒸以木瓜爛為度研成膏再入新艾茸二斤搜和作劑如梧桐子大曝乾每服三十丸空心食前米飲下燒腎子十便良方治下焦虛冷臍腹撮痛心胸痞脹和元氣進飲食益胃舶上茴香川附子官桂川椒子木香胡椒陳橘皮巴戟乾薑各半兩京三稜一兩上十味杵為末每獖豬腎子一對去筋膜切作片子以末二錢入蔥絲入許鹽半錢濕紙裹煨熟餌訖以酒或粥飯壓之須臾覺臍下暖甚妙羊脊骨湯主腎臟虛冷腰脊轉動不得用羊脊骨一具嫩者捶碎爛煮和蒜齏空腹食之兼飲酒少許妙鹿角屑散主腎臟虛冷腰脊痛如錐刺不能動搖用鹿角屑二兩熬令微黃搗末空腹暖酒服方寸匕日三兩服治腎臟虛冷腰膝無力自覺渾身沉重懶行步無精神氣弱小便餘瀝方楊子建萬全護命方萆薢杜仲續斷牛膝石斛狗脊去毛當歸五味子芎藭蓯蓉茯苓附子火炮去皮獨活菟絲子甘草細辛木香官桂各一分上細杵羅為末煉蜜丸如梧桐子大早朝空心鹽酒鹽湯任下三十丸治腎臟虛冷內感寒邪睡中鬼交泄精方楊子建萬全護命方萆薢半兩杜仲去皮續斷狗脊去毛芎藭龍骨木香茯苓益智獨活天靈蓋酥炙黃黑色石斛各一分阿魏二銖用沙鍋子一隻焙令乾使上細杵羅為末煉蜜丸如梧桐子大空心鹽湯鹽酒下三十丸留末一半早朝入鹽煎空心去滓吃不要多吃丸藥也病效丸藥止更不吃腎臟冷氣卒攻臍腹疼痛附論夫腎臟冷氣卒攻臍腹疼痛者由腎氣虛弱宿有冷疹或久坐濕地強力入水或食生冷過度觸冒風寒傷於腎經陽氣虛微陰氣獨盛邪正相擊故令卒攻臍腹疼痛不可忍也方木香散聖惠方治腎臟冷氣卒攻臍腹疼痛脹滿壅悶木香乾薑炮製銼蘹香子桂心檳榔桃仁湯浸去皮尖雙仁麩炒微黃雞舌香蓽澄茄青橘皮湯浸去白瓤焙各三分上搗羅為細散每服不計時候以熱酒調下一錢阿魏丸聖惠方治腎臟冷氣卒攻臍腹疼痛不可忍阿魏麵裹煨面熟為度別研青橘皮湯浸去白瓤焙附子炮裂去皮臍自然銅細研各半兩桂心乾蠍微炒木香檳榔以上各三分桃仁一兩湯浸去皮尖雙仁麩炒微黃別研上搗羅為末以童子小便二升入桃仁阿魏於銀鍋子內以慢火煎令稠入諸藥末和丸如梧桐子大每服不計時候以熱酒下二十丸沉香散出聖惠方治腎臟冷氣卒攻臍腹疼痛不可忍手足逆冷沉香二兩附子炮裂去皮臍肉豆蔻去殼各一兩肉桂去粗皮蘹香子蓬莪朮青橘皮湯浸去白瓤焙阿魏麵裹煨面熟為度各三分上搗細羅為散每服不計時候以溫酒下二錢蛜𧌴散出聖惠方治腎臟虛冷卒攻臍腹疼痛不可忍及兩脅疼痛蛜𧌴三十六枚頭足全掘一地坑子面闊四寸深五寸用炭火五斤燒坑子令通紅便浮去灰土用頭醋一升潑在坑子內候滲干便勻排蛜𧌴坑子底用一瓷碗蓋之一宿取出蘿蔔子木香各一分胡椒三十粒檳榔一枚肉豆蔻一枚去殼上搗細羅為散每服不計時候以熱酒調下一錢桃仁丸出聖惠方治腎臟氣虛觸冒風寒冷氣卒攻臍腹疼痛桃仁湯浸去皮尖雙仁麩炒微黃附子炮裂去皮臍硫黃細研水飛過蘹香子木香高良薑銼各三分上搗羅為末用煎醋浸蒸餅和丸如梧桐子大每服不計時候以熱酒下二十丸硫黃丸出聖惠方治腎臟冷氣攻臍腹疼痛兩脅脹悶飲食不下硫黃一兩細研水飛過木香檳榔桃仁湯浸去皮尖雙仁麩炒微黃各半兩青橘皮湯浸去白瓤焙蘹香子各三分上搗羅為末醋煮麵糊和丸如梧桐子大每服以熱酒下十丸不計時候服之胡椒丸出聖惠方治腎臟冷氣猝攻臍腹撮痛不可忍胡椒木香沉香桂心蛜𧌴各三分阿魏一分麵裹煨面熟為度上搗羅為末煉蜜和丸如梧桐子大每服以熱生薑酒下二十丸不計時候服硐砂丸出聖惠方治腎臟冷氣猝攻臍腹疼痛甚者硐砂三分雄黃硃砂黃丹微炒各一分麝香一錢巴豆十枚去皮心研紙裹壓去油上藥都入於乳鉢內順手研半日用煎醋浸蒸餅和丸如緑豆大