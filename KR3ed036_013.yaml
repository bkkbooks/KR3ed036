body:
  text: 卷十三臟腑總論五臟六腑經絡論肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中旁納一本作約字太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於迎人虛者寸口反小於人迎也心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小於人迎也小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頭上頸至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟頂痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也腎足少陰之脈起於小指之下邪趨足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛脅下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手腕掌熱虛則欠㰦小便遺數取之去腕半寸別走陽明也手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則頭強取之兩筋間也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹膈取之所別也手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛陽去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹卒喑實則狂癲虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者經脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之所別也督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也足太陽之筋起於足小指上結於踝邪上結於膝其下循足外側結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上綱下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針刧刺以知為數以痛為腧名曰仲春痹也足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針刧刺以知為數以痛為腧名曰孟春痹也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於脛其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋從目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自強也為之三跗而已治在燔針刧刺以知為數以痛為腧名曰季春痹也足太陰之筋起於大指之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大指支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔針刧刺以知為數以痛為腧名曰孟秋痹也足少陰之筋起於小指之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針刧刺以知為數以痛為腧在內者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痹也足厥陰之筋起於大指之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針刧刺以知為數以痛為腧名曰季秋痹也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內銳骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循脛出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內銳骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針刧刺以知為數以痛為腧其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋治在燔針刧刺以知為數以痛為腧名曰仲夏痹也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針刧刺以知為數以痛為腧名曰季夏痹也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右顧治在燔針刧刺以知為數以痛為腧名曰孟夏痹也手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針刧刺以知為數以痛為腧名曰仲冬痹也手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂其病當所過者支轉筋前及胸痛息賁治在燔針刧刺以知為數以痛為腧名曰孟冬痹也手少陰之筋起於小指之內側結於銳骨上結肘內廉上入腋交太陰挾乳里結於胸中循臂下繫於臍其病內急心承伏梁下為肘綱其病當所過者支轉筋筋痛治在燔針刧刺以知為數以痛為腧其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸淬刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也足之陽明手之太陽筋急則口目為僻眥急不能卒視治皆如上方也五臟所主論夫在天之風在地為木在人為肝惟肝則主風在天之熱暄熾燠暑熱之用也在地為火在人為心惟心則主熱在天之濕在地為土在人為脾惟脾則主濕在天之燥在地為金在人為肺惟肺則主燥在天之寒在地為水在人為腎惟腎則主寒此天地自然之氣也氣之潛伏乘虛而入人不能克百病之所由生故風喜傷肝熱喜傷心濕喜傷脾燥喜傷肺寒喜傷腎而暑喜傷心包絡心包絡曰膻中在胸膈間主暑故暑氣伏於三焦膈胃之間其或風暑之勝木邪乘土則脾病生焉熱氣之勝火邪乘金則肺病生焉濕氣之勝土邪乘水則腎病生焉燥氣之勝金邪乘木則肝病生焉寒氣大來心火亦為腎水所乘矣左關為人迎可以知風寒暑濕熱燥所從入之門右關為氣口可以別臟氣鬱暢與食氣聚散盈虛之候若乃憂愁思慮易耗心神恚怒氣逆易損肝氣縱欲強志腎之𢦤形寒飲冷肺之害飢飽勞倦脾之傷外之六氣相乘內之七情相感凡是數者皆為五臟之邪因其所主而尋其某臟所受之處則得之矣心之主血所藏者神上應舌外應諸掌其聲笑其色赤其臭焦其味苦其液汗肝主筋所藏者魂上應眼外應爪甲其聲呼其色青其臭臊其味酸其液淚腎主骨所藏者精與志上應耳外應腰背其聲呻其色黑其臭腐其味鹹其液唾腎冷多唾腎熱多渴肺主氣所藏者魄上應鼻外應皮毛其聲哭其色白其臭腥其味辛其液涕脾主肌肉所藏者竟與智上應口外應四支其聲歌其色黃其臭香其味甘其液涎故心肺在上主脈氣也肝腎在下藏精血也脾居中州又所以為精血脈氣之養也心之平脈浮大而散肝之平脈弦細而長腎之平脈沉濡而滑肺之平脈短澀而浮脾之平脈和緩而大平者五臟本然之正脈也春弦夏鉤叔和云夏洪取火脈來盛之義秋毛冬石以其四時當旺者象之木火金水四時各旺七十有二日土為季脈每季之月寄旺一十八日春則弦緩夏則洪緩秋則微緩冬則沉緩合四季而論則亦七十有二矣春弦者端直之狀細弱而長是也夏鉤者浮大而散來疾去遲是也秋毛者稀軟之狀輕虛似浮是也冬石者沉濡而滑舉指來疾是也土之脈溫厚氣行乎臟腑之中平和不可得見其衰則現焉所謂弦鉤毛石蓋應時而略見耳其中須有穀神胃氣之和若弦如張弓弦鉤如操帶鉤毛如風吹毛石來如奪索去如彈石此皆危脈也此絕無胃氣也其能久乎若夫春得金脈夏得水脈秋得火脈冬得土脈四季得木脈其與心之脈克肺肺之脈克肝肝之脈克脾脾之脈克腎腎之脈克心此則皆為邪也一藏無氣而可以為人乎然則諸府之脈可得聞歟曰小腸微洪大腸微澀膀胱微沉胃微緩而膽微弦急此無他腑與臟合氣同氣相求斯有得其近似者矣抑古人所謂九臟者又何如耶曰形臟四一者頭角二者耳目三者口齒四者胸中神藏五在心藏神在肝藏魂在腎藏志肺藏魄而脾藏意然臟者神之舍色者神之旗五臟已散其色必夭槁怪異當夭亡必矣抑猶有說焉微遲濡弱其候雖不同而為寒為虛一也數實長洪其形雖不類而為熱與實一也諸脈皆弦吾知其病出於肝諸脈皆緩吾知其病出於脾諸脈皆澀吾知其病出於肺脈皆浮洪病不在心乎脈皆沉滑病不在腎乎若合臟腑而觀假如數在左寸數之主熱也沉之而得則熱入於心浮之而得則熱入於小腸遲在左尺遲之主寒也沉之而得則寒入於腎浮之而得則寒入膀胱其餘以此推之五臟病症虛實論五臟各有所主至其病症莫不隨所主而見焉面赤喜笑舌破口乾唇燥掌熱心痛而啘臍上有動氣者心家病也面青多怒脅下痛硬咳逆目眩支節攣急轉筋溲難臍左有動氣者肝家病也肝乘脾挾水氣故咳逆足厥陰下絡於陰器故溲難面黑而恐呵欠呻吟齒痛骨痿耳鳴精泄足脛寒腰脊痛小腹急疼瘕泄而裡急後重臍下有動氣者腎家病也面白善嚏憂愁欲哭喘嗽氣逆咽喉不利灑淅惡寒熱臍右有動氣者肺家病也面黃善思善噫善嗜中脘脹滿飲食不消身體腫重肢節痠疼怠惰嗜臥四肢不收當臍動氣脾家病也東萊垣先生有曰肝受病則目不能視腎受病則耳不能聽脾受病則口不能食心受病則舌不能舉肺受病則鼻不能臭五臟病症以此觀之不待智者而後知矣然而心之惡熱者何熱則濆濁也肝之惡風者何風則筋燥急也腎何以惡燥燥則精涸竭也肺何以惡寒寒則氣留滯也脾何以惡濕濕傷肌肉肉傷則痿腫也五臟之病推原及本安有不從所受中來哉是以臟氣有餘謂之實臟氣不足謂之虛心實之候口乾喜笑身熱汗出痛滿乎胸脅膺背之間肝實之候目赤多怒頭眩耳聾痛引乎兩脅小腹之間腎實之候腹臌體腫少氣不言骨痛飧泄而小便黃肺實之候喘促咳嗽上氣鼻張脛股肩痛而胸中滿脾氣已實必至肢體重著而不舉腹脹尿逼而苦飢故曰臟氣有餘謂之實者此也心虛則恍惚多驚憂煩少色咳唾舌強腰背痠疼肝虛則眼目昏胸痛筋脅拘攣恐懼面青如人將捕腎虛則心懸如飢胸痛引脊厥逆溲變腹冷耳鳴肺虛則呼吸少氣鼻涕嗌乾肺中聲鳴喘乏咳血唾中有紅縷者此肺損為氣所傷也若脅下痛而唾鮮血者此熱氣傷肝也其或吐逆泄利飲食不消腹脹腸鳴四肢無力則脾虛之症生焉故曰臟氣不足謂之虛者此也大抵實者瀉之虛者補之無過不及以平為期否則實實虛虛損不足而益有餘至若心病而直視面黧肝病而舌卷囊縮腎病而腰折骨枯肺病毛焦氣出脾病而臍突唇反此則五臟之氣絕矣邪氣盛則實精氣奪則虛脈盛皮熱腹脹前後不通曰五實脈細皮寒氣少前後泄利飲食不進曰五虛諸病出者為虛諸病入者為實陰出乘陽陽入乘陰言者為虛不言者為實緩者為虛急者為實陰主靜則緩陽主動則急濡者為虛堅者為實癢者為虛痛者為實外痛內快者外實內虛外快內痛者外虛內實其有心腹皮膚內外俱痛則按之而止者虛也按之而痛者實也經所謂皮虛則熱脈虛則驚肉虛則重筋虛則急骨虛則痛髓虛則墮腸虛則溏泄三陽實三陰虛汗不出三陰實三陽虛汗不止與夫脈浮而緩自汗惡風法當解肌脈浮而緊無汗惡寒法當發汗此表之病一虛一實脈伏而牢腹痛秘結法當下之脈沉而弱厥冷自利法當溫之此里之病一實一虛內實之症心下牢強腸中痛滿前後不通乾嘔而無物出者死內虛之症厥逆躁煩而吐利不止者亡五臟平脈黎居土簡易方論云肝平脈來厭厭聶聶如循榆莢心平脈來累累如環如循琅玕脾平脈來而和柔去如雞踐地肺平脈來藹藹如車蓋按之益大腎平脈來上大下銳濡滑如雀之喙五臟病脈肝病脈來實而益滑如循長竿心病脈來累累連屬其中微曲脾病脈來實滿稍數如雞舉足肺病脈來不上不下如循雞羽腎病脈來如引葛按之而益堅五臟死脈肝死脈來急而益勁如新張弓弦心死脈來前曲而後直如操帶鉤脾死脈來銳堅如鳥喙如屋之漏肺死脈來按之消索如風吹毛腎死脈來之如解索去之如彈石五臟真脈真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而急如循薏苡子累累然色赤黑不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色赤白不澤毛折乃死真腎脈至搏而絕如指彈石辟辟然色黑黃不澤毛折乃死五臟色候氣所以養形而化神也周流乎五臟六腑之間發越乎五嶽四瀆之表神者氣之主氣者色之源色者容之表氣充乎內色形於外故色有青黃赤白黑以應心肝脾肺腎也夫五色得其正而形不相剋者為善黃色尤為正然亦不可無神氣要之得如秋云襯月春蠶吐絲溫潤明快為佳設或枯燥暗惡則病將至矣內經所載五臟之色生死各不同也東方青色入通於肝肝象木而色青青欲如蒼璧之澤不欲如藍故云如翠羽者生如草滋者死南方赤色入通於心心法火而赤色赤欲如帛裹朱不欲如赭故云如雞冠者生如衃血者死也中央黃色入通於脾脾屬土而色黃黃欲羅裹雄黃不欲如黃土故云如蟹腹者生如枳實者死西方白色入通於肺肺效金其色白白欲如鵝羽不欲如鹽故云如豬膏者生如枯骨者死北方黑色入通於腎腎應水而色黑黑欲重漆色不欲如地蒼故云如鳥羽者生如炭煤者死五臟聲音詩云情動於中而形於言故人之有言將有所為則意與氣合而聲隨至矣聲之所發會於五臟而備五音矣肝其音角其聲呼在志為怒在變動為握心其音徵其聲笑在志為喜在變動為憂脾其音宮其聲歌在志為思在變動為噦肺其音商其聲哭在志為憂在變動為咳腎其音羽其聲呻在志為恐在變動為慄五臟臭味臭陽也其氣上達故心主之味陰也物成致養也故脾主之五行互相連故五臟各復自有臭味亦各從五行之數也故內經曰形不足者溫之以氣精不足者補之以味五臟各有補法詳列如右肝其臭臊其味酸谷以麥為養果以李為助菜以葵為充肉以犬為益藥以空青為治合而服之以補精益氣心其臭焦其味苦谷以小豆為養果以梨為助菜以薤為充肉以羊為益藥以丹砂為治合而服之以補精益氣脾其臭香其味甘谷以大豆為養果以棗為助菜以韭為充肉以牛為益藥以雄黃為治合而服之以補精益氣肺其臭腥其味辛谷以麻為養果以桃為助菜以蔥為充肉以雞為益藥以雲母為治合而服之以補精益氣腎其臭腐其味鹹谷以黃黍為養果以慄為助菜以藿為充肉以豕為益藥以磁石為治合而服之以補精益氣五臟主配肝者罷極之本魂之居也其華在爪爪者筋之餘其充在筋筋者肝之養開竅於目目者肝之官與膽為合膽者肝之府肝主內血配於仁為陽中之少陽通於春氣心者生之本神之變也其華在面心火氣騰上使五色修明而榮於其面也其充在血脈血脈者心之養開竅於舌舌用非竅寄通於耳耳為心之官與小腸合小腸者心之府心主行血配於禮為陽中之太陽通於夏氣脾者倉稟之本營之居也其華在唇四白肉際唇者脾之外候也其充在肌肌者脾之所主開竅於口口者脾之官與胃為合胃者脾之府脾主裹血配於信上合至陰通於土氣肺者氣之本魄之處也其華在毛其充在皮皮毛者肺之所養開竅於鼻鼻者肺之官與大腸為合大腸者肺之府肺主持諸氣配於義為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發發者血之餘腦之所養腎主於髓而腦為髓海其充在骨骨腎之外應開竅於二陰二陰者前後便也前後便者腎之外穴也與膀胱為合膀胱者腎之府主受五臟六腑之精而藏之配於智為陰中之少陰通於冬氣五邪相干假令肝病實邪風熱相合風性急火搖動焰而旋轉其脈弦而緊洪風熱發狂宜羌活湯羌活川芎大黃各一兩甘草半兩上㕮咀每服半兩水二鍾煎至六分去滓溫服虛邪風寒相合多怒善恐拘急自汗其脈弦緊而沉仲景云風感太陽移證在太陽經中桂枝加附子湯主之賊邪風燥相合血虛筋縮皮膚皺揭脈弦浮而澀仲景云血虛筋急桂枝加栝薑湯主之微邪風濕相合體重節痛臟府洞泄脈弦長而緩仲景云身體疼痛下利清穀急當救里四逆湯主之正邪中風目眩頭重叫怒不咄脈弦緊而長仲景云甚則為癇為痓宜羌活湯本草云羌活主痓主癇防風黃耆為佐小兒為癇大人為痓假令心病實邪熱濕相合憒憒心煩熱蒸不眠脾經絡於心心經起於脾二經相接故為濕熱脈浮大而緩足太陰寄證在手太陽宜梔豉湯若痞加厚朴枳實虛邪熱風相合妄聽妄聞耳簫聲膽與三焦之經同出於耳銅人云刺關衝出血瀉支溝脈浮大而弦初小柴胡湯後大柴胡湯此證是太陽與少陽為病前客後主也賊邪熱寒相合膽傷心懸如飢神怯恐怖足少陰與手厥陰相接水中心經火邪故神怯怖耳脈大而沉濡亦在太陽經中內經曰心虛則熱收於內黃連附子湯瀉心湯主之法云謂熱多寒少以為佐矣如寒多熱少加附子乾薑佐之微邪熱燥相合過飲鼓樂實為熱燥俗言暢飲也病人曰快活快活是有聲於歌樂也意思酒漿是無聲歌樂也脈洪大而澀白虎湯主之喘則加人參正邪熱也脫陽見鬼躁擾狂起脈洪實一呼四至是八至脈也小承氣湯主之謂腹堅不大也假令脾病實邪濕燥相合胃中燥屎腹滿堅痛其脈緩而長澀是正陽陽明症也調胃承氣湯主之虛邪濕熱相合熱陷胃中腸澼下血脈中緩大黃黃連解毒湯主之賊邪濕風相合嘔逆脅痛往來寒熱脈緩而弦長小柴胡湯主之微邪濕寒相合濕與寒交寒來求濕身黃而不熱體重而不渴謂之寒濕其脈緩沉而滑朮附湯主之如小便不利者加茯苓正邪濕自病腹滿時痛手足自溫其脈沉澀而長虛痛桂枝加芍藥湯主之實痛桂枝大黃湯主之假令肺病實邪燥寒相合毛聳皮涼溲多而清其脈短澀而沉此症如秋冬宜八味丸若春夏宜地黃丸虛邪燥濕相合微喘而痞便難多痰其脈浮澀而緩枳實理中丸主之如喘甚加人參若便難加木香檳榔各半錢為極細末煎下理中丸賊邪燥熱相合鼻窒鼽衄血溢血泄其脈澀而浮大甚者桃仁承氣湯微者犀角地黃湯極者抵當湯微極抵當丸微邪燥風相合皮著甲枯血虛氣虛二臟俱虛先血後氣其脈浮澀而弦久養氣血主之正邪燥自病其氣膹郁皆屬於肺諸燥有聲其脈浮澀而短列諸咳藥選而用假令腎病實邪寒風相合臟不收藏下利純青其脈沉滑而弦仲景云少陰症口燥咽乾下利純青大承氣湯主之脈弦仲景云支逆冷者宜四逆等湯虛邪寒燥相合腎唾多呻灑淅寒清無寐經言燥化清其脈沉實而澀酸棗仁湯主之賊邪寒濕相合腎為胃關關閉水溢關閉水在胃為腫水在肺為喘及變諸症其脈沉緩而大仲景云大病差後腰下有水氣者牡蠣澤瀉湯主之微邪寒熱相合膀胱熱鬱津液枯少其脈沉濡而大內經曰水少乾涸也豬苓湯主之正邪寒自病寒病分臟腑其脈沉濡而滑黑痹天麻丸如郁同脈異微者腑病也甚者臟病也五臟各有身熱夫五臟者有邪各有身熱其狀各異以手捫摸有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按之至筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也輕手捫之不熱重加力以按之不熱不輕不重按之而熱是在筋骨之上皮毛血脈之下乃熱在肌肉也此為三法以三黃丸通治之細分為五等肺熱者輕手乃得但微按全無是瞥瞥然見於皮毛之上日西尤甚乃皮毛之熱其證必見喘咳灑淅寒熱輕者瀉白散重者涼膈散白虎湯地骨皮散心熱者心主血脈微按至皮膚之下肌肉之上輕手乃得微按至皮毛之下則熱少加力按之則全不熱是熱在血脈也日中大甚乃心之熱也其證煩心心痛掌中熱而噦以黃連瀉心湯導赤散硃砂安神丸清涼飲子脾熱者輕手捫之不熱重按至筋骨又不熱不輕不重在輕手重手之間熱在肌肉遇夜尤甚證必怠惰嗜臥四肢不收無氣以動瀉黃散調胃承氣湯治實熱用之人參黃耆散補中益氣湯治中虛有熱者用之肝熱者重按至肌肉之下至骨之上乃肝之熱寅卯間尤甚其脈弦四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床瀉青丸柴胡飲子腎熱者輕手重手俱不熱如重手按至骨分其熱蒸手如火其人骨蘇蘇如蟲蝕其骨困熱不任亦不能起於床滋腎丸六味地黃丸
