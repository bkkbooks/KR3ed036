body:
  text: 卷二百四十腳氣門一切腳氣附論夫腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一則自外而感一則自內而致其治法自應不同南方地下水寒其清濕之氣中於人必自足始故經曰清濕襲虛則病起於下或者難曰今茲北方其地則風土高寒其人則腠理致密而復多此疾者豈是地濕之氣感之而然邪答曰南方之疾自外而感者也北方之疾自內而致者也何以言之北方之人常食潼乳又飲酒無節過傷而不厭且潼乳之為物其氣味則潼乳其形質則水也酒醴亦然之人受水穀入胃胃氣蒸騰其氣與味宣之經絡化之而為血氣外營四末內注五臟六腑周而復始以應刻數焉是謂天地之紀此皆元氣充足脾胃之氣無所傷而然也苟元氣不充則胃氣之本弱飲食自倍則脾胃之氣有傷既不能蒸化所食之食其氣與味亦不能宣泄旁通其水之性潤下而致之其自外而入者止於下脛腫而痛自內而致者乃或至於手節腫也經曰足脛腫曰水太陰所致為跗腫此但言其自外而入者言之也所治之法前人方論備矣自內而致者治法則未有也楊大受云腳氣是為壅疾治法當以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其腫勢經曰蓄則勢腫熱砭則去之也砭後以藥治之醫學發明論云經論南方其地下水弱為霧露之所聚也江東嶺南大率如此春夏之交山水蒸郁風濕毒氣為甚足或感之遂成瘴毒腳氣其候則腳先屈弱至痹疼脛微腫少腹不仁頭痛煩心痰涎唾逆時作寒熱便溺不通甚者攻心而勢迫治之誠不可緩昔技法存所以留意經方偏善此術者豈非江左嶺表此疾得之多歟外臺云南方腳氣第一忌嗔嗔則心滿煩則腳氣發第二禁大語語則傷肺亦發動又不得久露足當風入冷水洗腳兩腳脛尤不宜冷雖暑月常須著綿袴至冷寒時倍加令兩脛溫暖微汗大佳依此將息濕氣漸薄損每至寅丑時割手足甲割甲少侵肉去濕氣夏月腠理開不宜當風臥睡睡覺時令人按挼勿使邪氣稽留數數勞動關節當令通暢此蓋養生之要拒風邪之法也尋常有力每食後行三五百步疲倦便止腳中惡氣隨即使之下散雖浮腫氣不能上也東垣云外臺總録皆謂南方卑濕霧露所聚之地其民腠理開散陽氣不能外固因而履之則清濕襲虛病起於下此由血氣虛弱受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣澀澀則脾虛虛則弱故令脾弱也後人名曰腳氣針經云有道以來治之多以灸𤋲為佳以引導濕氣外出及用醪醴以通經散邪所治之法寒藥少熱藥多用麻黃川烏姜附之屬內經云濕淫於外以苦發之麻黃苦溫發之者也川烏辛熱走而不守通行經絡姜附辛甘大熱助陽而退陰亦散清濕之邪又察足之三陰三陽是何經絡所起以引經用藥為主治復審視之六氣中何氣客之治以佐使之藥孫真人云醫者意也隨時增損物無定方真言哉異法方宜論云北方者其地高陵居寒冰冽其俗飲潼酪而肉食凡飲潼酪以飲多飲速者為習俗經云因而暴飲則氣逆又云食入於胃長氣於陽今乃返行陰道是逆也夫乳酪醇酒濕熱之物飲之屬也如此奉養太過亦滋其濕水性潤下氣不能拘故下注於足脛積久而作腫滿疼痛此飲食下流之所致也通評虛實論云谷入多而氣少濕居下也況潼酪醇酒之濕熱甚於谷者也至真要大論云太陰之勝火氣內郁流散於外足脛胕腫飲發於中跗腫於下此之謂也故飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若飲食自倍脾胃乃傷則脾胃氣不能施化脾氣不能四布故下流乘其肝腎之位注於足脛加之房事不節陽虛陰盛遂成腳氣孫真人云古人少有此疾自永嘉南渡衣纓士人多有之亦此意也診其脈浮而緩者起於風濡而弱者起於濕洪而數者起於熱緊而澀者起於寒風者汗而愈濕者熏而愈仍利小便熱者下而愈寒者發散而愈凡得腳氣速宜針灸惟用湯淋洗者醫之大戒也觀夫腳氣皆由腎虛而生然婦人亦有病腳氣者必因血海空虛乘宿塊嗔怒憂悶哀感悲傷遂成斯疾兼令婦人病者衆則知婦人以血虛而得與男子腎虛相類矣治婦人之法與男子同藥固無異但兼以七情之藥治之無不效矣治腳氣古無補法多貴乎利然亦須順四時補瀉之法可矣春宜微瀉夏微滋補不然則血氣日衰必使年年遇蒸熱而作理之必然也治法大概無越於此又加以四時謹於調攝又不得久坐久立於冷濕之地暑月亦不可露坐濕處能慎於此依法隨證治之無不瘥矣風毒中人隨處皆得作病何偏著於腳也曰夫人有五臟心肺二臟經絡所起在手十指肝腎與脾三臟經絡所起在足十指夫風毒之氣皆起於地地寒暑風濕皆作蒸氣足常履之所以風毒之中人必先中腳久而不瘥遍及四肢腹背頭項也微時不覺固滯乃知經云次傳間傳是也凡腳氣病皆由感風毒所致得此病多不令人即覺會因他病一度乃始發動或奄然大悶經三兩日不起方乃覺之諸小庸醫皆不識此疾漫作他病治之莫不盡斃始起甚微食飲喜戲氣力如故惟猝起腳屈弱不能動有此為異耳黃帝云緩風濕痹是也故有腳未覺異而頭項臂膊已有所苦有諸處皆悉未知而心腹五內已有所困又風毒之中人也或見食嘔吐憎聞食嗅或有腹痛下利或大小便祕澀不通或胸中衝悸不欲見光明或精神昏瞶或喜迷妄語言錯亂或壯熱頭痛或身體酷冷疼或覺轉筋或似腫不腫或腳腿頑痹或時緩縱不隨或復百節攣急或小腹不仁此皆腳氣狀貌也婦人亦然又有婦人産後春夏取涼多中此毒深宜慎之其氣熱悶掣瘲驚悸心煩嘔吐氣上皆其候也又但覺臍下部冷痛愊愊然不快兼小便淋瀝不同平時即是腳氣之證凡四時之中皆不得久立久坐濕冷之地亦不得因酒醉汗出脫衣靴襪當風取涼致得腳氣若暑月久坐久立濕地者則熱濕之氣蒸入經絡病發必熱四肢痠疼煩悶若寒月久坐久立濕冷地者則冷濕之氣上入經絡病發則四肢酷冷轉筋若當風取涼得之者病發則皮肉頑痹諸處瞤微動漸漸向頭常日忽然暴熱若人皆不能忍者當於此熱時必不得頓取於寒以快意也猝有暴寒復不得受之皆生病也故風毒中人或先中手足十指因汗毛孔開腠理疏散風如急箭或先中足心或先中足趺或先中膝以下足脛腨表裡者若欲使人不成病者初覺病時即灸所覺處三二十壯因此即愈不復發也黃帝云當風取涼醉已入房能成此疾問曰何故得者有冷有熱答曰足有三陰三陽寒中三陽所患必冷暑中三陰所患必熱故有表裡冷熱不同熱者治以冷藥冷者治以熱藥以意消息之脾受陽毒即熱頑腎受陰濕即寒痹知此雖患腳氣不妨乳石動發皆須服取壓石藥療之夫因患腳氣續生諸病者則以諸藥參用治之或小便不利則以豬苓茯苓及諸利小便藥治之大便不利者則以五柔麻仁丸等治之遍體腫滿成水病者則取治水方中治水之藥治之余皆仿此更無拘忌凡小覺病後有異即須大服快意之劑急治之稍緩則氣上入腹胸脅逆滿氣上肩息急者死不旋踵寬者數日必死不可不急治也但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死千金論云凡人患腳氣不自知別於後因有他病發動治之得瘥者有人直患嘔吐而復腳弱余為診之乃告為腳氣病者曰某平生不患腳腫何因名為腳氣不肯服湯余醫以為石發狐疑之間不過一旬而死故腳氣不得一向以腫為候亦有腫者有不腫者其小腹頑痹不仁者腳多不腫小腹頑痹後不過三五日即死若加嘔吐者名腳氣入心如此者死在旦夕凡患腳氣到心難治以其腎水克心火故也凡腳氣雖復診候多塗而三部之脈要須不違四時者為吉其逆四時者勿治其本人黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白不耐風濕瘦黑人肉硬卻風肥白人肉軟則受風至深難愈也腳氣證其狀固多但當以診脈分陰陽使無差誤謂脈浮為風緊為寒緩細為濕洪數為熱見於諸陽病在外宜發散之沉而弦者為風沉而緊者為寒沉細為濕沉數為熱見於諸陰病在裡宜溫利之外證自汗走注為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩熱頑痹為暑勝四時兼有但推其多者為勝治之當以諸證互辨而分表裡寒則溫之熱則涼之在表則散在裡則下方二十四味輕腳丸出直指方治腳氣通用當歸酒浸焙川芎萆薢鹽水煮乾羌活杜仲薑製炒石南葉薏苡仁華陰細辛枳殼各一兩雞心檳榔一兩蒼朮炒五加皮防風續斷獨活牛膝酒浸葳靈仙海桐皮木香木瓜麻黃去節川五靈脂沒藥別研各三分滴乳香半兩上為末酒浸雪糕為丸梧桐子大每服五十丸細銼辣桂荊芥穗食前煎湯下或枳殼木瓜煎湯下又方出本事方治腳氣毒遍內外煩熱不解口中生瘡狂走毒厲及解中諸熱藥毒邪熱猝黃等解蠱毒鬼魅野道熱毒又治小兒驚癇熱病寒水石石膏磁石滑石以上四味各三斤搗羅細末用水一石煮至四斗去滓入後藥玄參一斤洗焙銼羚羊角五兩升麻五兩丁香一兩木香半兩甘草八兩朴硝精者三斤硝石好者二斤硃砂三兩研細末麝香當門子一兩三錢上當寒之二日每服一錢匕或二錢匕冷水調下大人小兒仔細加減食後服透骨丹醫方集成專治腳氣川烏一兩煨羌活二兩白茯苓二兩乳香別研一兩檳榔木香各一兩半川芎木瓜沉香各一兩上為末用麵糊為丸如梧桐子大每服六十丸薑湯下每於食前服一方無川芎卷柏散出楊氏家藏方治遠年腳氣難治此方特效體虛人減半服一法治寒濕腳氣腫痛不能履地黑牽牛頭末甘遂檳榔以上三味各等分卷柏隨用先以鹽水煮半日次用冷水煮半日焙乾東向者佳上為末不得相雜每服每味各一錢惟檳榔末二錢五更初濃煎蔥白湯下至辰巳時取下惡物如魚凍隨吃淡粥病安便宜服後藥大腹皮三兩紫蘇子微炒檳榔各一兩干宣木瓜去瓤二兩半荊芥穗烏藥橘紅蘇葉各一兩蘿蔔子炒半兩沉香不見火三錢桑白皮炙枳殼去瓤麩炒各一兩半上銼散每服三錢姜五片煎不以時溫服獨活湯出直指方治腳氣羌活麻黃去節熟附子生乾薑川芎牛膝白芍藥白茯苓黃耆蜜炙人參杜仲薑製炒甘草炙辣桂當歸白朮木香各等分上粗末每服三錢姜五片棗二枚同煎吞活血應痛丸活血應痛丸出和劑方治風濕客於腎經血脈凝滯腰腿重疼不能轉側皮膚不仁遍身麻木上攻頭目虛浮耳內常鳴下疰腳膝重痛無力行步亦治項背拘急不得舒暢常服活血脈壯筋骨使氣脈宣流蒼朮炒六兩香附炒杵淨七兩威靈仙二兩陳皮五兩半沒藥一兩另研草烏頭二十四兩炮去皮臍狗脊燎去毛四兩上為末酒面稀糊為丸如梧桐子大每服二十丸用獨活湯下兼治腎受風冷腳氣痠疼及久痢登廁風冷入於腸胃以致兩腳削小成鼓槌風冷成痢久不止用此藥搜風散出醫方集成治腳氣愈後可常服之白芷川芎茯苓甘草芍藥當歸各一兩半陳皮厚朴枳殼白朮各二兩乾薑炮麻黃去根節各三兩北桔梗一兩半蒼朮十一兩酒浸去皮肉桂一兩上㕮咀每服三錢水一盞姜四片煎服除腳氣出本草以釣樟木作履主腳氣出本草以靈床下鞋履之紫金皮丸出海上方治腳氣不問遠近紫金皮黑豆防風白膠香淨石膏小煮白蒺藜去角骨碎補各二兩川烏二隻二兩重五月蠶砂四兩醋煮上為末煉蜜丸如雞頭子大每服半兩細嚼用生薑湯下木瓜散出醫方集成治腳氣大腹皮紫蘇羌活木香茯苓陳皮甘草炙各五錢宣木瓜一兩上㕮咀每服三錢水一盞薑棗煎服一方加檳榔白朮川芎沉香即沉香三和散一方無陳皮茯苓用水煎服降氣湯一名紫蘇子湯治下部閉不通並治腳氣出本草取蒴藋根一把搗汁水和絞去滓強人服一升數用之治腳氣出本草上以豬肝切作片空心以姜醋食之當微泄若先利勿服三香丸治腳氣妨悶不下食瘦弱腹痛木香檳榔銼各二兩雞舌香吳茱萸湯浸焙乾炒當歸銼焙陳橘皮浸去白焙訶黎勒皮煨生薑切焙各一兩半上為細末煉蜜和丸如梧桐子大煎陳皮湯下三十丸蓯蓉牛膝丸傳信適用方治腳氣肉蓯蓉好酒焙乾淨洗川牛膝去苗焙乾天麻明白者洗焙乾木瓜乾者以上各銼碎用酒三升入瓶內密纏春五日取出急用沸湯濾過焙為末枸杞子揀淨洗黃耆洗塗蜜炙真虎骨酒浸炙黃青鹽別研以上各二兩上都拌勻將前項浸藥酒入麵糊為丸如梧桐子大焙乾每服三五十丸溫酒白湯空心食前吞下檳蘇散出醫方集成凡覺腳氣初發服此藥去風濕及郁損氣脈多服不傷人大便祕滯加大黃二錢半香附子半兩甘草二錢陳皮不去白紫蘇各三錢木瓜各二錢半檳榔各二錢半上為粗末每服五錢水一盞半或加生薑五片煎七分空心食前服一方薑蔥煎服黑豆煎膏出聖濟總録治腳氣黑豆五升桑白皮銼五兩以水二升同豆煮候豆爛濾取汁羌活去羌頭蒺藜子炒去角海桐皮銼吳茱萸湯浸焙炒半兩上除前汁外搗羅為末入前汁中以文武火煎成膏每服一匙頭溫酒化下空心食前服加減檳榔湯出醫方集成治一切腳氣腳痛順氣防壅一方無香附子足痛而熱者加地骨皮煎腳氣名曰壅疾貴乎疏通春夏宜服之檳榔香附子去毛陳皮去白紫蘇葉木瓜去瓤五加皮甘草炙各一兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服婦人腳氣多由血虛加當歸半兩室女腳痛多由血實加赤芍藥一兩半如或大便祕結虛弱者加枳實壯盛者加大黃如腳痛不已加轉筋者加吳茱萸痰逆或嘔者加半夏小便不通加木通腳痛大便不通者用此湯送下青木香丸亦可木瓜丸出傳信適用方治腳氣大木瓜一個取成甕子小者二個全蠍一兩白牽牛黑牽牛各半兩半生半熟破故紙半兩半生半熟上為末納木瓜中九蒸九曝研爛為丸炒茴香鹽酒下三十丸食前服黑錫丹出如宜方治虛弱老人腳氣上攻牙齦腫痛口舌生瘡沉香葫蘆巴附子制陽起石肉桂破故紙炒茴香炒肉豆蔻金鈴子各一兩錫硫砂子四兩上為末同砂子末酒糊為丸如梧桐子大陰乾布袋擦令光瑩每服四十粒空心姜鹽湯下枳實大黃湯出拔粹方醫學發明云昔有人體充肥者腳氣始發頭面渾身肢節微腫皆赤色足脛赤腫痛不可忍不敢扶策手近皮膚其痛轉甚坐而復臥臥而復起晝夜苦楚難以名狀乃北土高寒故多飲酒積久傷脾不能運化飲食下流之所致投以當歸拈痛湯一兩二錢其痛減半再服腫痛悉除止有右手指微赤腫以三稜針刺於爪甲端多出黑血赤腫全去不數日因食濕面肢體覺痛宜服此藥羌活一錢半當歸身一錢枳實半錢大黃酒煨三錢上㕮咀只作一服水一盞半煎至一盞去滓溫服空心食前利下兩行痛止夫腳氣之疾皆水濕之為也面滋其濕又添肢節煩疼內經云風能勝濕羌活辛溫透關節去濕故以為主血流不行則痛當歸之性辛溫散壅止痛枳實之性苦寒治痞消食故以為臣大黃苦寒以導面之濕熱治諸老血留結取其駿快故以為使也二仙散出經驗良方治氣下注者因久坐久立陰濕之地坐臥當風醉脫靴鞋皆成腳氣若暑月久立濕熱鬱蒸榮衛不和發熱冬月寒天氣冷或麻或發疼痛悶亂晴陰並皆發痛富貴之家亦有此疾蓬朮一兩半玄胡索一兩蛤粉三兩陳皮一兩檳榔末生薑紫蘇陳橘各一兩上為末每服二錢炒黑豆五十粒以湯一盞生薑三片煎至五分去滓調煎藥服三和丸出海上方專治腳氣皂角一挺破故紙少許黑牽牛一合核桃肉少許上為末酒糊為丸如梧桐子大每服五十丸溫酒下木瓜湯亦可檳榔湯出直指方治腳氣少府監韓正彥暴得手足不舉諸醫以為風針灸臂腿不知痛孫兆作腳氣與此藥乃愈檳榔末三錢匕石斛黑牽牛木瓜生薑三片紫蘇七葉陳橘三枚以水一大盞煎七分去滓稍熱服治腳氣衝心痛悶用童尿煎服治心串痛溫酒調下治腳氣出本草以釣樟木作湯浴之治腳氣出本草以毛蓼煎湯濯足曹公鍾乳丸治腳氣久虛脈來沉細潛以補之煉成鍾乳粉三兩石斛去根節二兩吳茱萸湯浸三遍炒黃三兩菟絲子酒浸三宿搗如泥炒二兩上除鍾乳粉外搗羅為細末煉蜜和丸如梧桐子大每服三十丸食前以人參棗湯下覺氣壅即服疏氣藥勿令太過赤小豆煎方出聖濟總録治腳氣赤小豆三升半杏仁湯浸去皮尖雙仁炒桑根白皮銼各一兩生薑切一兩半上搗篩以水三升煎至一升半去滓更入茱萸半分蜀椒末半分再煎一兩沸取下俟冷如膏用密器收貯每服一匙頭空心酒調服木瓜丸出聖濟總録治腳氣諸病乳香一二兩甘菊花一兩青鹽二錢木瓜一枚大者小者二枚上先破木瓜作兩瓣去穰並子入乳香等三味在內卻以線系定於甑中蒸令爛熟研細成膏丸如梧桐子大每服五十丸溫酒下日三服病甚者更加丸數服百日汗香為驗一應腳膝等疾並可服雙香散出經驗良方治腳氣香蘇散五錢金鈴子三個木香半錢上作一服水一盞半生薑三片棗二枚同煎至七分空心進二服大安補散出海上方治腳氣大附子一個去皮臍炮桂末粉薑末各一錢上三味水二盞蔥白三寸煎七分先吃蔥白次服藥忌甘草十日千金散出海上方治腳氣兼治腎臟風攻注腳膝用連州甘遂懸掛紙籠中卻切川芎作片子如燒香薰之燒川芎盡將甘遂為末量病人虛實每以四錢或一二錢用獖豬腰一對去筋膜摻藥於內濕紙裹煨熟臨臥細嚼以溫酒送下儘量飲至醉以物閣起兩足至天明取下惡物水數升以茴香末煮粥次服大安補散烏頭丸出海上方治腳氣黑牽牛川五靈脂淘去沙大烏頭析開皮光而大者上生為末麵糊為丸如梧桐子大每服三十丸空心食前鹽湯或酒任下木瓜散專治腳氣乾木瓜一兩紫金皮二兩香附子去毛淨炒黃三兩上為末每服三二錢空心鹽酒調下五日見效日三四服椒囊出海上方治腳氣僕丁酉歲在臨安約婺女親戚吳寬夫泛湖是時劇暑見其用火踏上置一布囊烘足叩其所以答云某舊有腳氣之疾近得一方用川椒二三斤實於疏布囊中置火踏上跣足踏椒囊蓋椒氣性熱闢去寒濕氣言甚有理用之月餘亦漸見其效庚子歲在淳安寬夫經過因問其疾云愈之已久乃椒囊之力也不特某用之效傳之數親知皆無恙矣真奇方也壬寅再來臨安適於賓次中邂逅王成之時為都司見其用火踏亦有一布囊問之豈非椒乎云又添破開檳榔並熟艾各三之一且云果是奇妙大抵足膝之病居下屬陰又加寒濕陰益甚矣血氣為冷凝結非至熱不可除今用川椒椒性熱復加以火蒸之自然寒濕去矣信乎椒方之效也蒜酒出聖濟總録治初覺似有腳氣宜服蒜二升去心切炒桃仁一升去皮尖雙仁炒研豉一升炒乾上以生絹袋盛納淨瓷甕中用好酒一斗浸密封頭春夏五日秋冬七日初服半盞加至一盞惟量飲之日三四服常令有酒色若酒盡更入酒五升加好椒一二合浸用良牽牛子散治腳氣甘遂川芎切片炒黑牽牛青鹽炒上等分為末以豬腰子去膜竹刀批開納藥於內瓦瓶中煎熟用白酒調服藥末二錢匕再食腰子酒醒痛止又方用蝦蟆藤一束曝乾為末用鹽及白酒一盞水二盞先將藥末水調頻攪花謝卻將前藥酒調開作一服次用後藥鳳尾草四錢大黃一錢炒令焦黑上為末將二味和勻臨用時侵晨將魚鮓蘸前藥末吃要飽候吐痰為度然後服後藥前胡麻黃杏仁桔梗半夏茯苓甘草生薑上為散加桑白皮水煎服之乳香木瓜丸專治遠年近日腳氣乳香血竭上各等分另研為細末用好木瓜一個竹刀去皮心批取頂蓋將藥末攪勻裝滿卻用批下頂蓋合續以餑麵裹之約半指厚於砂鍋內煮熟極爛為度連面入石臼內杵如泥丸如梧桐子大每服三十丸漸加至四十五丸空心溫酒木瓜湯送下乾物壓之忌動氣及生冷堅硬濕膩之物甘鱉散出本事方治腳氣連珠甘遂一兩木鱉子去殼一雄一雌取各用一個好者上為末獖豬腰子二個批開入藥末一錢摻勻紙裹數重火煨熟放溫五更初細吞米飲湯下如左腳患則用左邊腰子右腳患則用右邊腰子藥末止須一錢毗陵有姓馬人鬻酒為業宿患腎臟風一足發腫如瓠自腰以下巨細通為一律痛不可忍臥欲轉側須用兩人挾持方可動或者欲以鈹刀尖決之豫用此方合藥以贈服至五更初細嚼米飲下至辰巳間下膿如水晶者數升即時痛止腫退一月尚拄拐趑趄而行豫再以赤烏散令塗貼其膝方愈後十年過毗陵此人率其子列拜以謝云向之腳疾至今不復作積年腎臟風並亦失去今行步不難矣治腳氣兼治頭風香附子一兩銼去毛甘草半兩略炙上㕮咀每服四錢水二盞帶須蔥白五寸姜三片煎至八分通口服頭風食後服腳氣食前服又方治腳氣舉發立止鷺鷥藤蒼耳草子有刺者二伏和根葉採上酒浸一宿放火邊次早吃先以草藤燒水熏洗治腳氣已經驗方活鯽魚一個不去腸肚去鱗肥皂一個去子上同鯽魚碎搗如泥盦於腳痛處用絹包之即愈枳殼散疏導毒氣枳殼制五兩甘草炙一兩半上為末每服二錢濃煎木瓜湯調下如要快利便更加麻仁仙靈丸治腳氣久不瘥宜服神效威靈仙洗淨陰乾半斤牛膝淨去根酒浸三日半斤上為細末酒糊為丸如梧桐子大每服五十丸空心木瓜酒下牛膝酒治腳氣極冷著厚綿衣蓋覆不覺暖者生牛膝生地黃各半斤淨洗控干曝兩日上搗如泥作團以紙裹外更以黃泥固濟微火炙令泥有裂處待乾即於地爐中灰火養半日次以灰火漸漸燒之加至火三斤燒一伏時取出候冷去泥紙搗羅為散每服五錢酒一盞半以瓷器煎七分和滓食前頓服之老小以意加減服之仙術木瓜丸治腳氣蘇生瑩叟與楊梅卿雲親曾得效用宣州大木瓜三個去皮切下蓋剜了子用青鹽六兩放在三個木瓜內於飯甑上蒸三四次研爛先以蒼朮二斤米泔水浸三日取出黑豆一升用長流河水高如面藥三寸同煮以水乾為度去黑豆不用將蒼朮切作片焙乾再入白茯苓六兩同碾為細末以研爛木瓜為丸如梧桐子大每服五十丸空心溫酒鹽湯送下一月有效治腳氣用豉三斗蒸一石米日下曝乾如是三次以酒五斗漬之七日去滓飲以醉為佳酒盡更以二斗酒漬之飲之如初神授方治腳氣神效用木鱉子每個批作兩邊麩炒炒畢切碎再炒用皮紙滲盡油為度每服一兩用肉桂一兩同為末熱酒調服以醉為度蓋覆得汗即愈一方名夢中神授方神效膏治腳氣膝腫痛攣縮不可行一名皂角膏用不蛀皂角一梃灰火中煨去皮核為細末入平胃散半貼米醋調敷腫疼處立效如或甚者先以鐵稱錘煅紅淬米醋中以熱氣熏痛處少定以萆麻子數粒研細貼腳心下然後敷藥蘇千之運干染疾渠親用之及傳他人皆驗得之於蕪湖轉搬倉一納米人治腳氣用五積散每服加檳榔一枚切碎依法同煎服藥了用被蓋覆令腿股間出少汗為佳一方加木瓜吳茱萸煎如赤腫加大黃以利為度治腳氣用四味理中丸去人參增紅曲每服二錢白湯點服蜜丸亦得空心服神效治腳氣用木瓜去穰實以十華散同蒸候熟一處細研如覺爛即十華散以丸得為度如梧桐子大每服三十丸溫酒鹽湯下治腳氣用豉酒浸以滓敷腳皆愈治腳氣用生附子一個去皮碾細乾柿十四枚去蒂不切以無灰酒三升於砂石器或銀器內煮候酒干取去研爛以蒸餅調和乾溼得所丸如梧桐子大每服三十丸空心鹽酒下一方臨睡冷水下三十丸烏藥酒治腳氣發動鄉村無處問藥恃此效用土烏藥即是矮樟樹根取如蘿蔔者不用鐵器不須過水干漉布揩淨用瓷片刮屑收於瓷器內如飲得酒一升或半升取出酒浸一宿次日空心在瓷器熱湯上坐溫服有麝香入少許尤妙一服即安無麝香則多服數服後得溏泄病去治腳氣用赤小豆五合葫蘆一個生薑一塊商陸根一條水煮豆爛為度去滓細嚼豆子空心食之旋旋啜汁咽下腫立消便愈桃紅散治腳氣舉發立止用帶節蘇木不計多少為細末每服三五錢水二盞煎至一盞半和滓空心熱服乾物壓之若進三服至老不發治腳氣不問遠近用紫蘇飲子加黑牽牛白芷破故紙木瓜川楝子同煎吞騙馬丹治一切氣及腳氣取食鹽三升蒸候熱分裹布囊腳踏之令腳心熱又取食鹽和槐白皮蒸夜尉亦良治腳氣及大腹水腫用赤小豆和鯉魚爛煮食之別有諸治具在魚條中散氣去關節煩熱令人心孔開止小便數緑赤豆皆可食用暴利後氣滿不能食煮一頓服之即愈治腳氣用孔子柏二斤石斛五兩酒二斗浸服之治患腳氣用高良薑每早任意頓食午後少食日晚不食如飢可食豉粥若瞑不消欲致霍亂者即以高良薑一兩打碎以水三升煮取一升頓服盡即消待極飢乃食一碗白粥其藥雄極飲之良若猝無高良薑母姜一兩代之以清酒一升煮令極熟和滓飲之雖不及高良薑亦有效矣治腳氣用五積散三兩加荊芥五錢蔥白五根熬湯先熏後洗腳腫疼處仍用膏藥貼之就以藥水烙痛處極妙此用有驗五積散方見生料五積散治一切腳氣用谷白皮五升炙勿取斑者有毒以水一斗半煮取七升去滓煮米粥常食之木瓜丹治腳氣疼重不能遠行久立常服補腎氣調血脈用宣州木瓜一個杜木瓜大者亦可用取去穰隔切出蓋子用好艾填在木瓜內須滿實卻用蓋子覆竹籤簽之放在飯甑上蒸爛次下入羌活一兩獨活二兩附子半兩炮同為末先杵木瓜令爛次下藥末搗成膏丸如梧桐子大食前溫酒或鹽湯下三五十粒治腳氣蜈蚣瓢搗碎取汁刷之佳治腳氣用紅豆擂爛用生薑汁熱調之敷痛處治腳氣用五積散去麻黃乾薑排風湯沉香附子湯烏藥順氣散去麻黃乾薑酒浸數日為末丸如梧桐子大每服五六十丸溫酒送下治腳氣用赤小豆南星末生薑汁調敷之烏麻酒用烏麻五升微熬搗碎以酒一斗漬之一宿隨所能飲之盡更作甚良治腳氣用生料五積散一貼蘇木半兩煎湯至有顏色時去滓用蘇木水煎五積散加木瓜半兩木香一錢藿香一錢入藥同煎食前服全蠍地龍丸專治腳氣殭蠶炒去絲半兩地龍去土二兩淨全蠍十四個去尾尖穿山甲火炙過半兩黑小豆二十二粒赤足蜈蚣金頭者一條草烏生用去皮尖半兩上為末糯米醋煮糊為丸如緑豆大當發日間每服十五丸麝香酒送下臨臥時以壁土及香白芷為末冷水調敷疼處米醋尤妙吃罷如人行四五里後以荊芥湯煎茶吃藥一錢即行無忌天門冬煎丸出聖濟總録治腳氣生天門冬去心銼三升半搗取汁令盡枸杞根淨洗控干三升半以水二石五斗煮汁一斗三升澄去滓酥三升煉過鹿髓一升牛髓一三升生地黃淨洗細切三升半搗取汁令盡以上六味先將天門冬枸杞地黃搗汁以水一石入大釜中煮取五斗三升卻入鍋中重煎至一斗收入銅器中入後藥桂去粗皮白朮葳蕤菖蒲遠志去心澤瀉山萸人參石斛去根牛膝酒浸切焙杜仲去粗皮銼炒細辛去苗葉蔓荊實去皮獨活去蘆頭枳殼去瓤麩炒芎藭黃耆銼肉蓯蓉酒浸切焙續斷狗脊去毛萆薢白芷巴戟天去心五加皮根炙覆盆子陳橘皮去白炒胡麻仁炒大豆卷生用焙乾白茯苓去黑皮各二兩甘草炙銼石楠葉柏子仁焙各一兩阿膠炒令燥十兩鹿角膠炙令燥五兩薏苡仁炒熟一升蜀椒炒出汗及閉口者用一兩大棗一百枚煮取肉上三十七味為末納前三味煎中更入鹿髓牛髓酥等重湯煮攪勻可丸即丸如梧桐子大每服二十丸空心溫酒下加至四十丸此藥宜服於臘月選旺相日修合若小便澀去柏子仁加秦艽二兩半地黃六兩若陰萎失精去葳蕤加五味子二兩若頭風去柏子仁加菊花防風各二兩若小便和陰氣弱去細辛加防風山茱萸各二兩若腹中冷去防風加乾薑二兩如臘月修合經夏至七月下旬即服之當於舍北入地深六尺填沙置藥沙中上加土覆之女人如有舊患熱者宜服冷者不宜時服見效治腳氣用生香附草連根煎湯熏洗木瓜散出醫方集方治腳氣大腹皮一個紫蘇乾木瓜甘草炙木香羌活各一分上㕮咀分作三服每服水二盞煎至一盞通口服鹿茸煎方出德生堂治下元虛憊而受證者宜飲之用鹿茸三錢燒灰為細末作一服好酒調空心服次用五積散一兩加馬藺子荊芥各五分水十升熬數沸去滓以盆盛水先炙熱上金絲萬應膏藥貼在痛處腫處放腳在盆上如法安定蒸熏熱氣隨用手拍蘸藥水趁熱於膏藥淋烙以熱為上如水溫再以火上燒熱又熏又烙如此三五次則痛頓減矣其效如神後用木香流氣飲子服之木香流氣飲子方見諸氣門每服四錢加木瓜石菖蒲牛膝乳香沒藥各一錢為一處搗令勻作一服水二盞生薑五片棗一枚同煎至一盞去滓空心服滓再煎連進數服犀角旋覆花湯出千金方治腳氣之疾得之於漸或微覺疼痹或兩脛腫滿或行起澀溺或上入少腹不仁或時發冷熱小便祕澀喘息氣衝於喉氣急欲死食嘔不下氣上逆者皆其候也若覺此證先與此藥犀角旋覆花各二兩橘皮茯苓生薑各三兩大棗七枚香豉一升紫蘇莖葉一握上㕮咀以水八升煮取二升七合分三服相去十里久再服之以氣下小便利為度一方若小便澀者加桑白皮炙銼二兩又方出聖濟總録治腳氣吳半夏三兩淨削去皮生薑汁二升上二味用水五升煮取二升去滓空腹一服盡每日一劑三劑必好禁羊肉餳治腳氣初覺著腳用香豉一升小便一升和漬少時令有稠色去滓平旦空腹服日三次未愈復作服以瘥為度治氣滯風壅手臂腳膝痛疼用酢糟裹之三兩易當瘥牛膝丸出朱氏集驗方治腳氣草烏荊芥續斷萆薢牛膝破故紙骨碎補黑牽牛香附子當歸川楝子何首烏赤小豆石楠葉防風芍藥烏藥地黃木瓜上各等分為末酒煮麵為丸每服三十丸空心鹽酒湯下三香散出朱氏集驗方治腳氣檀香一錢麝香二錢穿山甲三錢酒炙沒藥三錢白膠香五錢紅面五錢川烏二錢全蠍一錢草烏炒去烏上為末每服二錢空心溫酒調下又方出朱氏集驗方小續命湯石楠丸各一貼上入木瓜內蒸九次和杵膏為丸每服三十丸空心用木瓜湯調下治腳氣痛入腹出永類鈐方用杜仲烏藥同雞子瓦瓶中煮一日藥透取雞子切片蘸鹽煎散末服效七聖散出朱氏集驗方治腳氣平胃散丁香平胃散棗肉平胃散木香勻氣散沉香降氣散復元通氣散流氣飲每服一貼上用八角茴香麝香大蒜去皮心用火醋調面火煨候蒜香熟取出蒜臼中杵拌和前藥丸如梧桐子大用茶芽與燈心同煎湯空心下一連三服頃刻移步見效敷貼腳氣藥出朱氏集驗方大戟茱萸大黃官桂上等分為細末酸醋調敷痛處草烏丸出朱氏集驗方治腳氣草烏五兩水浸兩日去皮生切片入鹽炒至赤色為度全蠍五七枚上為細末煮清糊候冷入麝香少許為丸如梧桐子大每服十丸空心溫酒服極妙木瓜敗毒散出朱氏集驗方治一切腳氣宣木瓜一枚無則尋常木瓜亦可去穰入㕮咀自合敗毒散實其中入酒調藥蒸熟將瓜切片曝乾同敗毒散入水煎空心服平胃散出朱氏集驗方治腳氣平胃散一貼入大蒜研爛盦之有效蒼芎千里散出朱氏集驗方治久近腳氣蒼朮薄切米泔水浸乾木瓜白芍藥川芎人參枳殼去瓤白茯苓甘草炙大黃陳皮去白半夏泡七次桔梗前胡乾薑紫蘇木香等分上㕮咀每服二五錢水一碗半生薑七片煎至一碗去滓溫服食前如服此藥先用大蒜三頭剝去皮洗淨擂細捻作餅子貼所患腳心外用絹帛敷之覺腳心微有蒜氣便溫前藥頓服象守紀智立傳親見劉監稅用之取效木瓜散出朱氏集驗方治腳氣鷺鷥藤木香赤芍藥各一錢上用香蘇散一貼同煎去滓服四制丸治腳氣製蒼朮二兩乾木瓜一兩好酒一升煮乾蒼朮二兩乾木瓜一兩水一升入鹽二兩煮乾製蒼朮二兩乾木瓜一兩好醋一升煮乾蒼朮二兩乾木瓜一兩水一升川椒一兩煮乾上用瓦器煮焙乾為末酒糊丸如梧桐子大空心溫酒下三五十丸婦人醋湯下牛膝湯出朱氏集驗方治腳氣有驗牛膝一斤白茯苓人參各一兩當歸半兩上為細末酒調服又方出朱氏集驗方專治腳氣用敗毒散加木瓜煎服加味火扻丸出朱氏集驗方治陽證腳氣火扻草九斤枯松枝二一兩石楠葉一斤萆薢半兩醋煮七次日乾石膏二三兩煅上為末醋糊為丸每服三十丸空心服虎骨丸出朱氏集驗方治腳氣兩腿腫行步艱難蒼朮防風萆薢鹽水浸炒乾杜仲各三兩木瓜虎骨薄片薑汁浸一時焙乾防有藥箭毒金毛狗脊二兩去毛上件為細末酒煮麵糊為丸如梧桐子大每服四五十丸湯酒任下石南丸治腳氣痛楚不可履地石南葉一兩淡木瓜一兩烏藥一兩系天台者續斷一兩綿黃耆一兩蜜炙黑狗脊一兩地龍一兩去土川烏半兩炮裂去皮尖上件為細末酒糊為丸如梧桐子大每服十丸加至二十丸服久加至三十丸空心食前溫酒吞下如疼痛不堪忍者煎淡木瓜湯下寬筋丸治風壅氣道不宣筋脈拘攣難以屈伸兼治腳氣疼癢防風荊芥麻黃連節去根乾木瓜獨活各一兩牛膝半兩上銼碎用好酒浸二宿漉出焙乾為末草烏頭二兩黑豆一兩用水五碗煮令乾去黑豆薄切烏頭焙乾亦為末和勻醋糊為丸如梧桐子大每服十丸旋旋加至二三十丸溫茶或酒食後服蒼朮羌活湯治腳氣足膝無力沉重羌活三錢防風根一錢半柴胡七分半升麻一錢獨活一錢葛根一錢熟甘草半錢黃耆二錢蒼朮一錢橘皮六分縮砂皮一錢草豆蔻皮半錢黃柏半錢知母二分半生甘草梢半錢上件分作二服水三盞煎至一盞去滓熱服鐵腳丸治久新腳氣膝脛腫痛腳心隱疼行步艱難或攻衝作瘡膿血不止鐵腳威靈仙用醋煮數沸焙黑牽牛半生半炒草烏頭去皮尖用粟米炒令黃色去粟米不用陳橘皮去白金鈴子去外皮並核只取肉入粟米炒令黃色去粟米不用上件各等分為細末酒煮麵糊為丸如梧桐子大每服十丸至十五丸空心用白湯送下以少許點心壓之忌濕面並茶等物加減小續命湯治男子婦人腳氣何首烏四兩川牛膝一兩草烏去皮尖炒黃半兩上為細末先用木瓜二個好酒二升小鍋煮十分爛去皮穰研和前藥如硬燥用煮木瓜酒添搜為丸梧桐子大每服三四十丸酒下常服除根芎仙丸治久新腳氣腿膝腫痛或攻注生瘡川烏十兩白芍藥五兩威靈仙三兩上件為細末用蘿蔔自然汁打麵糊為丸如梧桐子大每服五十丸再用蘿蔔自然汁少許同溫酒半盞送下空心臨睡服忌茶療腳氣方附子甘草各五兩上二味同細銼以水五斗煎取二斗半置盆中以板子闊三寸許橫湯上與水面平腳踏板上以湯將腳浴之水冷即休此湯得四五度用腳氣永除此方多驗敗毒散治三陽經脛腫腳氣踝上赤痛寒熱往來人參茯苓甘草炙前胡川芎羌活獨活桔梗柴胡枳殼各等分上㕮咀生薑薄荷煎熱服濕多加蒼朮熱多加大黃芒硝行氣散治血氣不和腳氣頻發不問冷熱及補藥云腳氣無補法者非也大宜疏通紫蘇香附各二兩陳皮制一兩甘草炙半兩木瓜烏藥檳榔蘇木羌活蒼朮各半兩上㕮咀薑蔥煎熱服推氣丸治腳氣作吐飲食不進大便不通手心熱口舌燥大黃枳實青皮檳榔黑牽牛生各一兩麻仁一兩半上為末以麻仁碾為膏取藥末一兩同拌再碾用絹羅過去滓卻將麻仁和入余藥用不蛀皂角煮汁以面入汁作糊為丸如梧桐子大每服四五十丸熟水下得利即止順氣丸治腳氣欲發大便先閉大黃五兩半生半熟車前子檳榔麻仁炒牛膝酒浸郁李仁湯去皮菟絲子酒浸蒸山藥各二兩防風山茱萸枳殼獨活各一兩上為末蜜丸如梧桐子大茶酒米湯任下此藥補益通利疏風順氣如虛弱老人難服推氣丸宜服順氣丸烏白散出如宜方治腳氣發則腳骨痛苦甚者奇妙草烏四兩桑白皮八兩上㕮咀水三升煮豆一升去滓好酒和藥水溫服用瓦瓶忌鐵器李絳兵部手集方昔有人患腳氣服此著此方云曾得效用赤小豆作袋置足下朝夕展轉踐踏之其疾遂愈亦主丹毒檳榔丸出楊氏家藏方治腳氣攻衝腿膝腫痛檳榔赤芍藥白朮當歸洗焙陳皮去白青橘皮去白烏藥上七味各一兩甘草炙半兩上件搗為細末麵糊為丸如梧桐子大每服七十丸空心食前熟水下木瓜丸出朱氏集驗方治腳氣極效破故紙炒川萆薢乾木瓜杜仲炒茯神炒茴香炒川牛膝酒浸切焙上各等分為細末麵糊為丸如梧桐子大湯酒任下香蠍丸出朱氏集驗方治腳氣檀香一錢麝香川烏各二錢沒藥三錢紅曲五錢白膠香五錢穿山甲三錢酒炙全蠍一錢草烏炒上為末麵糊為丸每服三十丸空心溫酒下烏靈丸出朱氏集驗方治男子腳氣不能伸屈及癱瘓手足不隨草烏銼碎烏豆各二兩用好醋浸三宿日乾然後和後藥威靈仙二兩一方草烏生用上併為末醋煮麵糊為丸如梧桐子大病在上食後溫酒吞下病在下空心服十丸至二十丸烏藥丸出朱氏集驗方治腳氣徹骨疼痛不能行履者不過三服見效木鱉子去殼紙捶去油白芍藥草烏不去皮威靈仙北細辛沒藥上等分為末薄糊為丸如梧桐子大每服七丸至十丸食後臨臥木瓜湯下或酒下亦可以身上覺麻痹即是見效或未效可添至十五丸量虛實不可妄增丸數及不可於食前服之有草烏頭在其間最忌服藥後食以熱食物衝動烏頭毒則昏不知人矣地黃湯出朱氏集驗方治穿心腳氣熟地黃四兩川當歸二兩白芍藥川牛膝三奈子各一兩杜仲薑製半兩上㕮咀每服三錢水一盞半煎至八分無時服地仙丹出朱氏集驗方治男子婦人陽證腳氣痛錢子地龍炒去土五靈脂去石天台烏藥白膠香別研威靈仙去蘆洗木瓜去瓤赤小豆炒黑豆生去皮天仙藤洗淮烏炮去皮五加皮洗木鱉子去殼油蒼朮米泔水浸一宿削去皮銼炒椒紅去目併合者炒出汗盞蓋地出汗取紅上等分為細末酒糊為丸如梧桐子大每服七十丸空心鹽湯或鹽酒湯任下雞鳴散出朱氏集驗方治腳氣第一此藥不問男女皆可服如人感風濕流注腳足痛不可忍用索懸吊叫聲不絶筋脈腫大檳榔七枚陳皮木瓜各一兩吳茱萸二錢桔梗半兩生薑合皮半兩紫蘇莖葉三錢上為粗末分作八服隔宿用水三大碗慢火煎留碗半去滓用水二碗煎滓取一小碗兩次煎汁以酒相和安頓床頭次日五更分作二服只是冷服冬月略溫亦得服了用餅餌壓下如服不盡留次日漸漸吃亦可服此藥至天明大便當下一碗許黑糞水即是原腎家所感受寒濕毒氣下來也至早飯前後痛住腫消只是放遲吃物候藥力過此藥不是宣藥並無所忌治腳氣注流四肢指節腫痛不可屈伸法當先服搜風祛麻木之劑然後服此藥婦人尤宜川烏當歸芍藥附子去皮生用上等分以生薑十片水煎空心服之檳榔湯出淡寮方治腳氣順氣防壅檳榔香附子去毛陳皮去白紫蘇木瓜五加皮甘草炙各一兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服婦人腳氣多由血虛加當歸半兩室女腳痛多由血實加赤芍藥一兩半大便祕結虛弱者加枳實壯熱者加大黃並不拘時一方治腳氣衝心大便祕澀宜服三和散亦曾有人加杜仲烏藥春夏常服腳氣遂不復作亦妙方也治腳氣出本草方見杉節湯治腳氣出本草以巴戟天一兩半糯米同炒米微轉色不用米大黃一兩銼炒同為末熟蜜為丸溫米湯服五七十丸有人嗜酒日須五七杯後腳氣甚危或教以此方仍禁酒遂愈治腳氣衝上小腹急硬以田中螺煮食之輕腳丸出楊氏家藏方治一切腳膝沉重疼痛腫滿川烏炮去皮臍研取末五兩木瓜二枚牛膝去蘆頭酒浸一宿七錢巴戟七錢紫色者酒浸一宿青鹽肉蓯蓉酒浸一宿焙乾天麻去苗三味各一兩防風去蘆頭一兩半海桐皮一兩半甘草半兩炙萆薢二兩金毛狗脊半兩去毛上件先將木瓜用竹刀切下蓋子剜去子卻填熟艾末令滿將蓋子蓋定用竹籤簽住入飯甑內蒸爛先將烏頭末同木瓜研勻次將諸藥為細末用和為丸如梧桐子大每服三十丸至五十丸空心溫酒送下一方兼治婦人産後腳軟行履不得筋骨疼痛加羌活乳香沒藥三味各一兩治閉結並腳氣方大螺以鹽一匕和殼生搗碎置病臍下一寸三分用寬帛系之即通上一味神驗饒醫熊彥誠年五十五歲病前後便溲不通五日腹脹如鼓同輩環視皆不能措力與西湖妙果寺僧慧月相善遣信邀致訣別月驚馳而往過釣橋逢一異客風姿瀟灑出塵揖之曰方外高士何孑然走趨如此月曰一善友久患閉結勢不可療急欲往問客曰此易事也待奉施一藥即脫鞋入水探一大螺而出曰事濟矣持抵其家以鹽匕和殼生搗碎置病者臍下一寸三分用寬帛帶系之仍置觸器以須其通月未深以為然姑謝之至則熊昏不知人事妻子聚泣諸醫束手知無他策謾以試之曾未移席忽然暴下諸醫愧嘆而散月歸訪異人無所見矣熊後十六年乃終白石董守約以腳氣攻注為苦或教之捶數螺敷兩股上便覺冷氣趨下至足既而亦安療腳氣破冷氣痃癖出本草取鯉魚帶鱗用絹裹將魚煮羹熟後去鱗食之驗治腳氣出本草以麋皮作靴穿治腳氣出本草以葒草為湯浸之治腳氣出本草以枕材煮湯浴浸之治腳氣風氣諸惡氣以鯉魚大者洗去泥開肚以椒末半兩切大蒜三兩顆納魚腹中縫合並和小豆一升煮之臨熟下蘿蔔三二五顆如指大切蔥一握煮熟空腹食之並豆等強飽盡食之至夜即泄氣無限三五日更一食頻下一切惡氣
