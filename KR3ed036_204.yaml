不計時候以生薑湯服二十丸五膈丸療憂膈氣膈食膈飲膈異病同藥人參附子炮遠志去心細辛各四分桂心乾薑蜀椒各五升炒去汗上搗篩以蜜為丸著牙下㕮咀嚥之若病劇者日三夜二並療諸毒氣風注氣腹中有病皆當得其新好藥即可中病耳忌生蔥生菜豬肉冷水等物一方有半夏訶黎勒丸治五膈氣久不下食心胸妨悶多吐酸水訶黎勒皮二兩乾薑一兩炮製銼甘草半兩炙炒微赤銼枳殼一兩麩炒微黃去瓤陳橘皮二兩湯浸去白焙檳榔一兩桂心一兩上為末煉蜜和搗三二百杵丸如彈子大每服時不問早晚常含一丸咽津如患甚者即將一丸以煎湯嚼破服羚羊角丸出聖惠方治五膈氣心胸妨悶食少胃虛四肢無力赤茯苓一兩人參一兩去蘆頭桂心一兩訶黎勒二兩乾薑半兩炮製銼羚羊角屑一兩甘草半兩炮微赤銼上為末煉蜜和搗三二百杵丸如梧桐子大每服四十丸橘皮湯下草豆蔻丸出聖惠方治五膈氣飲食難下胸膈噎悶四肢不利草豆蔻去皮附子炮裂去皮臍遠志去心細辛乾薑炮銼桂心川椒去目及閉口者炒去汗各一兩上為末和搗三二百杵丸如彈子大不拘時候服一丸咽津京三稜丸出聖濟總錄治五種膈氣利胸膈散積滯消腹脹進飲食京三稜濕紙裹煨銼沉香各半兩青橘皮湯浸去白焙鱉甲去裙襴醋炙檳榔銼一分巴豆五枚去油為霜上為末水煮白麵糊為丸如綠豆大每服五丸溫熟水下五膈丸治憂膈氣膈食膈寒膈飲膈異病同藥吳茱萸面曲杏仁去皮麩炒乾薑蜀椒出汗去目及閉口者好豉熬令色變上各等分搗篩蜜和丸如梧桐子大米飲湯服七丸日三夜二忌生冷物木香丸出聖惠方治五膈氣心胸壅噎飲食不下木香一兩肉豆蔻一兩去皮訶黎勒二兩桂心一兩檳榔一兩麝香一分細研上件為末入麝香研勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以生薑橘皮湯下二十丸半夏散出聖惠方治五膈氣噎飲食不下宜服半夏一兩湯浸七次去滑木通一兩銼桂心一兩赤茯苓二兩陳橘皮三兩去瓤湯浸焙檳榔二兩上粗羅為末作散每服二錢水一鍾入生薑半分煎至六分去渣不拘時候熱服萊菔木香散治五膈氣促腹脅脹滿胸膈不快痰逆噁心不思飲食萊菔子二兩陳橘皮一兩湯浸去瓤焙粟米一兩半木香一分巴豆肥大者二十枚去皮於瓦石器內與上三味同炒候藥焦黑色揀去巴豆不用上為散煮萊菔湯調下二錢或以生薑汁煮麵糊和丸如梧桐子大萊菔湯下十五丸亦可寬膈丸出三因方治氣不升降胸膈結痞木香京三稜炮青皮各半兩半夏半兩湯浸七次大腹子一分上為細末薑汁糊為丸如梧桐子大食後米湯下二三十丸狀元丸出宣明論治膈氣酒膈酒積涎嗽腹痛吐逆痞滿巴豆五枚取霜神麯半兩末半夏三錢佳者研雄黃一兩明淨白麵炒一兩上研勻水滴丸如小綠豆大細米糠炒變赤色食後溫水下三丸童子二丸二三四歲一丸歲半半丸止咳嗽齏汁下止嘔逆生薑湯下前胡散出聖惠方治五膈氣噎胸脅逆滿每食即氣塞不通前胡一兩去蘆頭半夏一兩洗七次去滑陳橘皮二兩湯浸去白瓤焙桂心一兩訶黎勒皮一兩上為散每服三錢水一鍾入姜半分煎至六分去渣不拘時候熱服木香散出聖惠方治五膈氣壅塞不通木香一兩吳茱萸一兩湯浸七次焙乾炒訶黎勒一兩煨用皮桃仁半兩湯浸去皮尖雙仁麩炒微黃麝香一分細研上為散每服不計時候以熱酒調二錢送下桃花散出聖惠方治五膈氣飲食不下漸將羸瘦桃花三兩當年者吳茱萸一兩湯浸七次焙乾炒縮砂二兩去皮馬牙硝二兩檳榔二兩上為散每服日不計時候以溫酒下一錢通中散出聖惠方治五膈氣胸中不利臟腑壅滯宜服牽牛子一兩半微炒檳榔三分桂心一分乾薑一兩木香上為散每服以熱酒調下二錢空腹可二服續更以一兩盞熱茶投之得利三兩行下得惡物為效沉香散治膈氣沉香木香枳殼各一分烏藥四兩上為細末每服二錢鹽少許沸湯調下透膈寬腸散出宣明論治腸上壅結實熱難行者白牽牛一兩芒硝三兩川大黃二兩甘遂半兩上為細末食後溫蜜水調下一錢虛實加減鬆動止陳橘皮丸出聖惠方治五膈氣胸背俱悶不下飲食宜服陳橘皮一兩湯浸去白瓤焙川朴硝一兩木香一兩上為末煉蜜和丸如梧桐子大每服不計時候以熱酒下三十丸丁香散出聖惠方治五膈氣嘔逆飲食不下心胸氣壅滯宜服丁香二兩末生薑一斤取汁酒一中盞上件藥相和令勻以文武火熬成膏不計時候熱酒調半匙送下二妙散治五膈氣心胸痞塞半夏一兩洗七次干桑皮二兩上為末每服三錢姜三片醋水一盞煎至七分稍熱服訶黎勒散出經驗濟世方治五膈氣心胸噎塞閉悶不食訶黎勒四枚大腹子四枚上將前味各二枚煨二枚生併為末每服一錢水一盞煎一兩沸通口服快氣丸出經驗濟世方治膈氣噎不下飲食肌體羸瘦陳橘皮去白大蒜上不以多少研細和勻為丸如綠豆大每服二十丸溫米飲下食後日三服利膈丸治三焦氣不順胸膈壅塞頭眩目眩涕唾痰涎精神不爽牽牛子四兩半生半熟皂莢不蛀者塗酥炙二兩上為末生薑自然汁煮糊丸如梧桐子大每服二十丸荊芥湯下大黃丸出聖惠方治五膈氣川大黃銼碎微炒訶黎勒煨用皮各半兩上為末煉蜜和丸如梧桐子大每服以溫水下二十丸以微利為度治膈氣出百一選方上用附子一個先以銚子炒石灰令十分熟埋附子於灰中候灰冷取出石灰依前法再炒如此三次然後取附子去皮臍入丁香四十九個不見火同為細末空心以糟茄兒三兩片翻覆蘸藥食之然後食物治膈氣出經驗方上鯽魚一尾用市中自死者活魚不用剖腹去盡腸物留鱗用大蒜去淨皮薄切填入魚腹內仍合魚為一尾用濕紙裹定次用麻皮纏之又用熟黃土泥外令厚固曬微干用碎碎灰火煨熟取出去鱗刺骨入局方平胃散搗細丸如梧桐子大曬乾瓶收勿泄氣味每用米飲空心下三十丸治膈氣食噎久成翻胃出經效良方上用壯老薑一斤帶皮淨洗切如大錢許厚以竹籮盛之入寺觀內廁坑中浸七日再入長流水中漂七日取出曬乾為末再秤過每一斤入甘草末一兩每服二三錢米飲調徐服次用高良薑去毛切片清油炒變色為末米飲為丸如梧桐子大每服二三十丸或五十丸米飲調良薑末送下忌生冷難化物玄明粉出濟生拔粹方治膈上氣塞滯五臟秘澀熱邪上用朴硝不拘多少煎過澄濾了五七遍晚於星月地下露至明日自然細作青白硝也用定瓷罐兒按實於炭火內從慢至緊自然成汁煎至不響再加頂火一煅取出於淨地上倒合盆蓋去火毒至晚取出為細末每二斤入甘草生熟各二兩每服一錢二錢桃花湯或蔥白湯調下忌魚及藕治胸膈嚥氣利胸膈上取韭炸熟以鹽醋空心吃一碟可十頓以上甚驗青皮散一名降氣散出衛生家寶方治五膈氣胸膈痞悶如板通關散出王氏博濟方治五膈氣噎塞妨悶遍身虛腫涕唾稠濁不下飲食麥櫱馬兜鈴各三錢訶子一個芫花一錢漿浸微炒白丁香三錢硇砂一錢飛去沙石黃丹一分硃砂白礬鉛白霜各秤一錢上同研勻令細每服一錢半入膩粉兩文雞子一個去黃只取清調末入雞子殼內濕紙裹慢火煨熟放冷爛嚼臘茶湯下臨眠服來日逐下黑惡物未瘥如小可噎塞再依法服一錢必效半夏散出王氏博濟方治五種膈氣噎心胸不利涕唾稠黏飲食不進半夏半兩薑汁浸一宿焙乾厚朴半兩薑汁炙枇杷葉炙去皮毛秤半兩肉豆蔻一個去核母丁香五十枚青木香一塊棗大上為細末每服一錢水八分煎六分熱酒服五積丸出楊氏傳治五種膈氣中脘痞悶噎塞不通飲食減少及積聚癖塊心腹作痛一切沉積並皆治之沉香半兩木香半兩當歸洗焙半兩附子炮去皮臍半兩青橘皮去白半兩丁香一分大黃半兩酒浸濕紙裹煨縮砂仁一兩半夏半兩湯浸七次後以生薑汁製曲陳皮去白半兩京三稜半兩炮蓬莪朮半兩炮檳榔一分膽礬半兩另研細松煙墨半兩燒存性厚朴半兩薑汁炙上件除膽礬外併為細末用肥棗五十枚去核皮入米醋二升煮棗令爛次下膽礬末煮少時與藥同為丸如麻子大每服二十丸加至三十丸橘皮湯下食後臨臥服瑞香散出衛生家寶方治五種膈氣正氣下陷不進飲食南木香檳榔曲裹煨銼訶子炮去核川乾薑炮肉桂去皮不見火甘草炙麥糵炒白朮炮白茯苓人參去蘆頭青皮去白丁香炮以上各三兩京三稜二分白扁豆一分用薑汁炙上為細末每服一錢入炙紫蘇鹽湯點服桂香丸出衛生家寶方治氣膈食膈憂膈冷膈熱膈痞塞不通宿食不消或霍亂或心痛或嘔物或泄瀉腹脅氣脹吞酸少食桂心乾薑茯苓檳榔甘草炮人參細辛訶子炮去核枳殼麩炒去瓤白芍白朮上各等分為末煉蜜和丸如梧桐子大每服二十丸空心溫酒嚼破服十順散出衛生家寶方治十種膈氣心胸痞悶噎塞不通飲良減少漸成惡證檳榔半生半煨青皮去白瓤人參木香煨訶子炮去核白朮炒白茯苓京三稜肉桂去粗皮神麯炒令微黃甘草炙乾薑枳殼去瓤麩炒厚朴去粗皮薑汁塗炙三次各一兩上為末每服一二錢水一鍾鹽一捻煎至七分溫服不拘時候寬中丸出衛生家寶方治十膈五噎滯滿不通常服寬膈化冷物三稜一兩蓬朮一兩縮砂仁炒青皮去白沉香陳皮去白香附子胡椒以上各半兩上為細末醋糊丸如梧桐子大每服十五丸紫蘇生薑湯下食後服五膈下氣湯出永類鈐方治五膈膏肓之疾針藥無可施者又法用繩系黃犬令其干餓數日後用生米干飼之或用粟米俟其糞下淘淨洗數次亟下作粥用薤白一撮入湯內泡熟去薤取其通氣粥熟再入沉香末二錢粥稀食之木香煮散出楊氏家藏方理一切膈氣寬膈消痰嘔逆噁心腹脅脹滿紫蘇葉青橘皮去白白芍藥烏藥當歸酒洗白茯苓去皮桔梗去蘆頭半夏湯洗七次焙川芎黃耆蜜炙防風去蘆頭甘草炙陳橘皮去白枳殼麩炒去瓤大腹皮以上十五味各一兩上羅勻每服五錢生薑五片大棗二枚水二盞煎至一盞去渣食前溫服治一切丈夫婦人或因喜怒憂思之後因成氣膈其狀心胸滿悶膈塞不快飲食難下兩脅脹滿忽時氣痛沖脅衝心不可忍面色青黃桑寄生牽牛熟用當歸牛膝各半兩藿香二銖芫花上器內醋炒川芎細辛三銖官桂各一錢楝子四銖上醋煮芫花一味爛研為末所餘藥另一處杵羅為末與芫花相滾令勻每服二錢蔥湯空心調服若吃酒蔥酒調下忌鐵器又忌甘草十膈散出衛生家寶方治冷風氣痰熱憂愁水食喜皆病源也並因憂驚喜怒中飲食不化滯積在胸膈上氣喘咳嗽歲月漸深心胸噎塞漸致羸瘦人參細銼焙白茯苓細銼焙神麯微炒甘草細銼炒厚朴削去皮細銼生薑拌和炒白朮洗淨炮細銼枳殼去白瓤細銼麩炒官桂去粗皮銼不見火訶子濕紙裹煨去核取皮白姜炮去皮細銼檳榔細銼焙木香濕紙裹煨香取出細銼各等分上為細末每服二錢入鹽少許沸湯點服或每服二錢水一盞生薑二片棗子一個煎至七分服治寒熱氣膈其狀大腑秘熱忽時泄瀉或時思食忽不思食膈塞胸前不快滯氣積聚或時脹滿腹脅不快其脈輕滑有力而來遲青橘皮黃橘皮藿香桔梗蓬莪朮木香官桂去皮沉香川芎羌活各二錢桑寄生各半錢甘草四銖上細杵羅為末每服一錢水一鍾煎兩沸空心和渣服治熱膈其狀胸前膈塞飲食減少大腑秘熱忽時不調吃咸即心燥吃辛酸即喉干痰實頭目昏暈兩足無力載身不起或舌上生瘡唇皮焦裂或時口中涎流沖氣發為干嗽忽時急飢見食即吐食不飽腹如此等證皆是熱膈木香各三分乾蠍三銖麻黃當歸大黃各一分羌活連翹