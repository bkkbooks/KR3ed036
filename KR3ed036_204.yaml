body:
  text: 卷二百四膈噎門總論夫膈者胸中氣結津液不通飲食不下羸瘦短氣名曰憂膈中脘實滿噫輒醋心飲食不消大便不利名曰思膈一名恚膈胸脅逆滿噎塞不通嘔則脅急惡聞食臭名曰食膈一名氣膈五心煩熱口舌生瘡四肢倦重身常發熱胸痹引背不能多食名曰喜膈一名熱膈心腹脹滿咳嗽氣逆腹下若雷鳴繞臍痛不能食名曰怒膈一名寒膈此皆五情失度動氣傷神致陰陽不和結於胸膈之間病在膻中之下故名五膈聖惠方云夫五膈症者謂憂膈恚膈氣膈寒膈熱膈也憂膈之為病胸中氣結煩悶津液不通飲食不消羸瘦全無力氣恚膈之為病心下實滿噫輒醋心飲食不消心下痞澀積結在於胃中大小便不利氣膈之為病胸脅逆滿咽塞不通噫聞食氣寒膈之為病心腹脹滿咳嗽氣逆膈冷腹若雷鳴食不生肌熱膈之為病臟有熱氣五心中熱口爛生瘡胸煩四肢重唇口乾燥身體頭面手足或熱腰背疼痛胸痹引背水穀不消不能多食羸瘦少氣力此是五膈形證也經云三陽脈結謂之膈言憂恚寒熱動氣傷神而氣之與神併為陽也傷動陽氣致陰陽不和而臟腑生病結於胸膈之間故稱為膈氣眾方說五膈亦有不同但陽動之由有五故云五膈氣也五噎者即氣噎憂噎勞噎思噎食噎雖五種不同皆以氣為主所謂氣噎者心悸上下不通噫噦不徹胸背苦痛憂噎者遇天陰手足厥冷不能自溫勞噎者氣上衝膈脅下脹滿胸中填塞腹背疼痛思噎者心悸善忘目視䀮䀮食噎者食無多少覺胸中悶塞疼痛不得喘息此由喜怒不常憂思過度恐慮無時鬱而生涎與氣相搏升而不降逆害飲食與五膈同但此在咽嗌故名五噎素問云三陽脈結謂之膈蓋氣之與神併為陽也逸則氣神安勞則氣神耗倘或寒溫失宜飲食乖戾七情傷感氣神俱擾使陽氣先結陰氣後亂陰陽不和臟腑生病結於胸膈則成五膈留於咽嗌則成五噎五膈者憂恚寒熱氣也五噎者憂思勞食氣也其為病也令人胸膈痞悶嘔逆噎塞妨礙飲食胸痛徹背或脅下支滿或心悸善忘咽噎氣不能舒治療之法調順陰陽化痰下氣陰陽平勻氣順痰下膈噎之疾無由作矣又有下虛氣上塞膈令人心下堅滿痞積胸中若痹緩急如刺不得俯仰名曰胸痞噎病不在外不在內不屬冷不屬熱不是實不是虛所以藥難取效此病緣憂思恚怒動氣傷神積於內氣動則諸證悉見靜則疾候稍平治之不得疾之所在視之不知色之所因聽之不知音之所發故針灸服藥皆難效此乃奇異之病也方嘉禾散一名穀神嘉禾散出德生堂治中滿下虛五膈五噎脾胃不和胸膈痞悶肋脅脹滿心腹刺痛不思飲食或多痰逆口苦吞酸胸滿短氣肢體怠惰面色痿黃如中焦虛痞不任攻擊臟氣受寒不受峻補或因病氣衰痿食不復常稟受怯弱不能多食尤宜服之常服蓄神養氣和補脾胃進美飲食枇杷葉去毛盡塗薑汁炙令香熟為度人參去蘆白茯苓去皮縮砂去皮各一兩白朮炒二兩大腹皮微炒黃陳皮去白各三分白豆蔻微炒去皮桑皮微炒各半兩檳榔五味子微炒青皮去瓤薏苡仁神麯微炒石斛細銼酒浸微炒藿香葉沉香隨風子如無揀實訶子亦可杜仲木香穀芽微炒半夏湯洗七次生薑一分切作片子與半夏同搗爛作餅炙黃一兩丁香甘草各一兩半上為末每服三錢水一盞入生薑三片肥棗三枚同煎至七分溫服不拘時候及療四時傷寒能調治陰陽使無變動剋日得安如療五噎入乾柿一枚同煎七分服見效如療膈氣吐逆羸困入薤白三寸棗五枚同煎婦人亦可服一方無木香沉香開膈散出仁齋直指方治五膈五噎痞滿嘔吐心腹痛刺兩脅肋脹沉香京三稜蓬莪朮白豆蔻仁人參縮砂仁丁皮蓽澄茄草果仁益智仁丁香川白姜各半兩木香白茯苓香附炒藿香葉青皮半夏曲陳皮各一兩甘草炒一兩一分上為粗末每服三錢水一盞半生薑五片棗二枚煎至一盞食前服沉香散出永類鈐方治五膈五噎胸中久寒諸氣結聚嘔逆噎塞飲食不化結氣不消常服寬氣通噎寬中進食白朮茯苓各半兩木通當歸橘皮青皮大腹子一作檳榔大腹皮木香芍藥各二兩甘草炙一兩半白芷三兩紫蘇葉枳殼微炒去瓤三兩上為末每服二錢水一盞姜三片棗一枚煎至七分空心溫服一方無木香奪命回生散出永類鈐方治五膈五噎翻胃嘔吐不進飲食此藥多有神效不可輕視丁香揀淨川芎去土白姜洗淨炮南木香不見火肉桂去皮不見火新羅參神麯各半兩訶子七枚取肉縮砂仁二十一粒大草果二枚炮取仁莪朮炮粉草炙各七分半巴豆一十四粒去殼心膜不去油冷水浸一宿別研為膏留乳缽中上曬乾為末入乳缽內和勻巴豆膏再篩過入瓦盒內以油紙蓋合口卻用黃蠟和松脂融如法封固合縫每以十二月上辰日或初八日黃道生氣天月二德日至誠修合如地高爽處埋土中三尺深至次年六月中伏節擇吉日晴明取出向當風處攤去濕氣以不漏瓦瓶收貯密封壯實人每服半錢臨睡百沸湯調半盞頓服仰臥片時徐以溫白粥壓下若羸弱只服一匙二三服即能進食止嘔吐續以寬中散丁沉透膈湯橘皮煎丸厚朴煎丸等兼進佐助胃氣忌生冷魚腥黏膩並硬物一兩月則全愈矣孕婦不可服神仙更生散治男子婦人陰陽不和因氣滯生病結於胸膈則成膈氣留於咽嗌則成五噎五膈者憂思勞食氣也令人胸膈痞悶嘔逆吞酸噎塞妨悶飲食不下作痛脅下支滿飲食減少四肢無力氣不升降此藥順陰陽化痰寬胃止嘔吐進飲食丁香二錢半蓬朮二錢半木香一錢官桂一錢半乾薑一錢一分炮縮砂十個訶子肉四個草果一個甘草四錢川芎一錢神麯一錢一分巴豆七粒搗成膏上為末和巴豆令勻每服一匙沸湯下緩氣丸出聖濟總錄治陰陽不升降痞氣膈氣心痛腹痛咽喉噎悶氣道不勻嘔吐痰沫飲食不下大便秘澀或裡急後重腹痛不可忍此藥養氣消痰溫中散滯人參二兩桂去粗皮半兩阿魏研半兩木香半兩吳茱萸炒二兩白朮二兩訶黎勒皮二兩附子炮裂去皮臍一兩半厚朴去粗皮塗薑汁令香二兩上為末煉蜜為丸如梧桐子大每服三十丸溫熱水下不計時候大便結澀加大黃黑牽牛各一兩半夏丸治胸痛達背膈中煩滿結氣憂愁飲食不下藥悉主之半夏一分削去皮熬甘草炙遠志去心各四分乾薑桂心細辛椒去目炒出汗附子炮各二分上搗篩以蜜為丸先飲酒用粳米飲服如梧桐子大五丸日三稍增至十丸忌海藻菘菜羊肉餳豬肉冷水生蔥生菜奪命丹治五膈食噎馬草節半兩炒乾再用蜜炙黃色揀丁香廣木香檳榔藿香葉各五錢上為末再服三分煎柿蒂湯調下棗合丸治脾胃虛冷乾嘔噁心嘔吐涎沫全不思食五膈五噎並皆治之丁香半兩半夏曲一兩乾薑炮胡椒木香各二錢上為末生薑汁浸蒸餅為丸一兩作十五丸每服一丸大棗二枚去核入藥在內濕紙裹棗煨令香熟去紙細嚼溫生薑湯送下空心食前服半夏通氣散一名通氣湯治膈噎氣咽喉氣堵煩悶嘔噦痰涎不利咳嗽肋脅痞滿減食半夏洗切二兩桂銼一兩半橘皮銼八錢上羅勻每服五錢水二盞生薑十片同煎取一盞去滓溫服不拘時候日進三服治五噎心膈氣滯煩悶嘔逆不下飲食用蘆根五兩銼以水三大盞煮取二盞去滓不拘時候服出肘後方平氣丸出楊氏家藏方治胸膈噎悶不思飲食傷酒嘔逆氣脹腹痛巴豆去殼黑牽牛蘿蔔子各四兩五靈脂炒丁香皮丁香胡椒肉桂去粗皮青橘皮去白瓤桂花陳橘皮去白縮砂仁以上九味各一兩上藥將陳粟米一升炒巴豆黑色去巴豆將粟米與眾藥搗羅細末醋煮麵糊丸如綠豆大每服十五丸胸膈噎悶不思飲食煎蔥白湯下中酒吐酒細嚼煨生薑湯下氣痛煎石菖蒲湯下氣脹面腫煎大腹皮湯下疝氣小腸氣煎茴香湯下婦人血氣腹內刺痛煎當歸湯下不拘時候縮砂丸出和劑方溫中散滯消飲進食治胸膈噎悶心腹冷痛大能暖化生冷果食夏月不可缺此縮砂仁七兩高良薑四兩天南星湯浸洗去皮焙乾秤四兩上為細末生薑自然汁麵糊為丸如梧桐子大每服五十丸至七十丸生薑湯下不拘時候青木香丸出德生堂寬中利膈行滯氣消飲食治胸膈噎塞腰脅脹滿疼痛心下堅痞腸中水聲嘔噦痰涎不思飲食及小腸疝氣蓽澄茄破故紙十兩木香五兩牽牛頭末三十兩一半炒檳榔十兩酸陳粟米飯裹檳榔紙包灰火中煨紙焦去之上為末和勻水糊為丸如綠豆大每服五十丸茶湯水送下如小腸疝氣發作疼痛用蟠蔥散煎送下五十丸通利一二行即愈或用生料五苓散加吳茱萸燈草三十莖煎水送下不拘時候檳榔散出王氏博濟方治胸膈注悶噫塞不快不思飲食大便不通檳榔木香人參甘草乾薑炮桂皮去浮皮青橘皮去白白朮米泔水浸一宿焙乾枳殼去瓤神麯京三稜炮厚朴去皮用薑汁炙香焦以上各等分上為末入鹽點半錢治脾腎膈氣以一錢入鹽煎服治冷膈其狀胸中噎塞飲食減少行步無力大腑虛冷非時心悶胸前如有一條冷線上徹咽喉出楊子建萬全護命方丁香木香川芎官桂去皮獨活甘草各一分訶子麵裹火燒去核只使皮肉豆蔻草豆蔻各半兩細辛三銖乾薑二銖上細杵羅為末每服二錢水一盞煎取八分空心和渣任意服治噎病膈塞不通因怒而得大便不通亦先用引大便順利令得通快然後吃此方出楊子建萬全護命方川芎半兩羌活牡丹皮去心木香各一分細辛二銖桔梗熟使防風各五銖半夏二銖上細杵羅為末每服二錢水一盞煎九分空心和滓吃人參湯出楊子建萬全護命方治喜怒膈氣心前噎塞空嘔桑寄生半兩川芎木香沉香甘草烏藥人參枳殼只使青各一分上為細末每服一錢九分水一盞煎取七分空心和滓吃之五膈附論夫人之胸膈升降出入無所滯礙名曰平人若寒溫失節憂恚不時飲食乖戾思慮不已則陰陽拒膈胸脘痞塞故名膈曰氣曰憂曰恚曰寒曰熱五種雖殊其為膈病則一方通膈散出醫方集成治五種膈氣枳殼麩炒去瓤神麯炒五味子炒京三稜炒銼桂去粗皮赤茯苓去黑皮草豆蔻去皮郁李仁湯浸去皮麩炒黃甘草炙銼白朮陳皮湯浸去白焙人參訶黎勒皮乾薑炮檳榔半生半熟厚朴去粗皮薑汁炙木香半夏湯洗了用生薑爛搗如泥卻堆放新瓦上文武火煅令黃色各一兩上為散每服二錢入鹽少許以茶點服不拘時候一方薑棗煎服訶黎勒湯一名訶子散出聖惠方治五膈氣胸中煩滿痞塞不通心腹虛脹結寒飲食不下訶黎勒煨去核木香各一兩人參青橘皮湯浸去白焙各半兩厚朴去粗皮生薑汁炙一兩沉香銼益智仁去皮桂去粗皮檳榔銼枇杷葉炙去毛蓽澄茄白朮各半兩赤茯苓去黑皮高良薑白豆蔻前胡去蘆頭一兩甘草炙銼半兩上粗搗篩每服三錢水一鍾入生薑三片同煎七分去渣熱服十膈氣散出永類鈐方專治十般膈氣冷膈風膈氣膈痰膈熱膈憂膈悲膈水膈食膈喜膈皆病源也病因憂驚冷熱不調久乖將攝更於喜怒無時貪嗜飲食因而不化滯積在胸上喘痰嗽歲月漸深心胸噎塞漸致羸瘦如久不除必成惡疾人參白茯苓官桂枳殼去瓤麩炒甘草炙神麯炒麥糵炒廣莪朮炮吳白朮訶黎勒皮煨陳皮去瓤乾生薑炮京三稜煨以上各一兩厚朴薑製檳榔煨丁香上為極細末每服一錢入鹽一匙白湯點服如覺脾胃不和腹脹心胸滿悶用水一盞生薑七片棗二枚鹽少許同煎八分和渣熱服空心食前郁李仁丸出聖惠方治五膈氣心胸氣壅宿食不消腹胃脹大腑秘澀郁李仁一兩湯浸去皮微炒漢椒半兩去目及閉口者微炒出汗人參半兩去蘆頭甘草一分炙微炒赤銼桂心半兩乾薑炮細辛半兩赤芍藥半兩陳橘皮一兩湯浸去白瓤胡椒半