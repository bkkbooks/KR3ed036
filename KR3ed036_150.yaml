四枚擘芒硝四分湯成下芍藥七分黃芩十二分上切以水四升先漬藥一時猛火煮取二升五合分溫三服服相去如人行六七里再進一服以快利為度第二服利則不須再服忌熱食炙肉蒜黏食等物近效主天行後兩脅脹滿以炒鹽熨之如小便澀亦用鹽熨臍下滑石湯治天行病腹脹滿大小便不通滑石一錢四分研葶藶一合紙上炒令紫色搗大黃三分切上以水一大升煎取四合頓服時氣大便不通附論夫時氣大便不通者由脾胃有熱發汗太過則津液竭津液竭則胃中乾燥結熱在內則大便不通也方羚羊角散出聖惠方治時氣熱毒在臟大腸不通宜服羚羊角屑一兩柴胡一兩去苗麥門冬二兩去心大腹皮一兩銼川大黃一兩銼碎微黃川升麻一兩甘草五錢炙微赤銼上為散每服三錢水一中盞煎至六分去滓入玄明粉一錢攪令勻不計時候溫服大黃散出聖惠方治時氣十日已上腹微滿而喘臍下㽲痛大便不通宜服川芒硝二兩川大黃二兩銼碎微炒羚羊角屑一兩枳實一兩麩炒微黃桑根皮一兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服以利為度柴胡散出聖惠方治時氣惡寒頭痛壯熱大便不通宜服柴胡去苗一兩茵陳一兩木通一兩土瓜根一兩白蘚皮一兩梔子仁一兩川大黃三兩銼碎微炒川芒硝二兩上為散不計時候以溫水調服三錢少時當利一兩次煮蔥頭稀粥飲之如熱未歇再服大麻仁丸出聖惠方治時氣胃中煩熱大便不通宜服大麻仁二兩研川大黃二兩郁李仁一兩湯浸槐寄生一兩川朴硝一兩枳殼麩炒微黃去瓤一兩木通一兩上為末入大麻仁等令勻煉蜜和丸如梧桐子大每服不計時候以溫酒調下二十丸調氣丸一名承氣丸出聖惠方治時氣十餘日不大便川芒硝二兩枳實一兩麩炒微黃川大黃二兩銼杏仁二兩湯浸去皮尖雙仁麩炒微黃研如膏上為末煉蜜和丸如梧桐子大每服不計時候以溫水下三十丸如未利再服治時氣熱毒在胃大便不通出聖惠方川大黃一兩銼碎炒黃川芒硝一兩上細銼以水一大盞浸一宿明早煎五七沸綿濾取汁不計時候溫服時氣小便不通附論夫時氣小腸者心之腑也心與小腸為表裡心臟熱久而不除汗後津液虛少不能灌溉而熱毒之氣流注小腸故令不通也方赤茯苓散出聖惠方治時氣有時寒熱四肢沉重口不知味胸中噦塞小便不通宜服赤茯苓一兩前胡三分去蘆頭白蘚皮一兩瞿麥一兩子芩半兩梔子仁半兩滑石二兩川升麻三分木通一兩五錢銼上為散每服三錢水一盞煎至六分去滓不計時候溫服貝齒散出聖惠方治時氣熱毒流注小便不通貝齒四十枚白蘚皮一兩豬苓一兩去皮川大黃一兩銼碎微炒瞿麥一兩上為散每服不計時候以水一中盞半匙調下三錢良久再服以利為度犀角散出聖惠方治時氣四五日寒熱頭痛心腹煩悶小便不通犀角屑一兩柴胡去苗一兩赤芍藥一兩瞿麥一兩黃芩一兩知母一兩木通一兩銼川大黃二兩銼碎微炒滑石二兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服以得通為度柴胡散出聖惠方治時氣惡寒壯熱頭痛小便不通柴胡一兩去苗茵陳一兩川大黃銼碎一兩黃芩一兩木通一兩銼川升麻一兩梔子仁一兩川芒硝一兩茅根一兩銼上為散每服五錢以水一大盞煎至五分去滓不計時候溫服以得通為度治時氣壅毒心腹脹滿小便不通出聖惠方滑石二兩甜葶藶一兩隔紙炒令紫色上搗篩以水二大盞煎至一盞去滓不計時候溫服以得通為度療小腹滿不得小便方兼治天行細末雄黃蜜和為丸棗核大納溺孔中令入中等半寸以竹管注陰令痛搠之通
