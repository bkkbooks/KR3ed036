body:
  text: 卷一百五十時氣門時氣宿食不消附論夫時氣吐之後或病新瘥脾胃氣皆虛不能化於水谷致有宿食難消頭目多疼時發寒熱或心腹煩滿大腸結燥此皆是其候也方枳實散出聖惠方治時氣後脾胃氣虛心腹虛脹吃食不消枳實麩炒令黃人參去蘆一兩乾薑炮製甘草炙微赤銼半夏湯浸七次去滑木香各半兩白朮三分桂心三分桔梗去蘆三分上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓食前服麥糵散出聖惠方治時氣後宿食不消不思飲食麥糵微炒一兩前胡去蘆頭一兩白朮一兩檳榔一兩人參去蘆頭一兩厚朴去粗皮塗生薑汁炙令香熟一兩甘草半兩炙微赤銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓食前溫服人參散出聖惠方治時氣後胃虛心膈壅悶時有寒熱宿食不消人參二兩去蘆頭大腹皮一兩銼枳實一兩麩炒微黃赤茯苓一兩訶黎勒用皮一兩白朮一兩桔梗去蘆頭一兩麥門冬一兩半去心焙甘草半兩炙微赤銼上為散每服五錢以水一大盞煎至五分去滓食前溫服白朮散出聖惠方治時氣後宿食不消心胸壅滯乍寒乍熱白朮半兩人參去蘆頭半兩陳橘皮湯浸去白焙半兩大腹皮銼黃耆銼枳殼麩炒微黃甘草炙微赤銼各半兩訶黎勒用皮一兩沉香一兩上為散每服五錢以水一大盞煎至五分去滓食前溫服大黃散出聖惠方治時氣後宿食不消不思飲食麥糵微炒一兩前胡去蘆頭一兩白朮一兩檳榔一兩人參去蘆頭一兩厚朴去粗皮塗生薑汁炙令香熟一兩甘草半兩炙微赤銼上為散每服五錢以水一大盞煎至五分去滓食前溫服厚朴丸出聖惠方治時氣後腸胃虛冷食不消化厚朴去粗皮塗生薑汁炙令香熟人參去蘆頭枳殼麩炒微黃去瓤神麯炒微黃大麥糵炒微黃杏仁湯浸去皮尖雙仁麩炒微黃各一兩乾薑炮銼白朮各兩半甘草半兩炙微赤銼茱萸三分桂心三分上為散煉蜜和丸如梧桐子大每服食前以棗湯下三十丸白豆蔻丸出聖惠方治時氣後脾胃虛冷食不消化白豆蔻去皮草豆蔻去皮白朮人參去蘆頭陳橘皮湯浸去白焙桂心神麯炒黃三分乾薑炮銼甘草炙微赤銼各半兩上為末煉蜜和丸如梧桐子大每服食前以薑棗湯下三十丸木香丸出聖惠方治時氣後脾胃虛冷宿食不消木香三分乾薑炮銼三分人參去蘆頭枳殼麩炒微黃去瓤麥糵炒黃熟檳榔各一兩白朮一兩半甘草半兩炙微赤銼上為散煉蜜和丸如梧桐子大每服食前以薑棗湯下三十丸黑神散出活人書治瘟疫時氣有積食巴豆新好者一兩輕槌去皮以急流水兩碗浸一宿然後更煮三五十沸候冷瀝出去心膜以帛拂去水然後研如膏用厚紙十數重壓裹去油五靈脂二分黑色者為上杏仁半兩燒過後入蒜煮研豆豉二兩新軟者為妙不得令乾與巴豆膏同細研大戟半兩生用去皮裡面如粉白者妙三稜半兩生用上三味為極細末入巴豆豆豉研細後入杏仁更研細別入飛羅面半匙以井花水調如法漸次和藥和得所入臼中搗三二千下丸如綠豆大晾乾入瓶盒內或微火焙亦得如遇傷寒有食積者脈沉身體不熱即宜服之量患人臟腑虛實加減丸數服用煎薑棗湯吞下取微利為度不可太過溏泄身熱下之則為病氣結胸若病在上可吐者同生姜干嚼五丸時氣煩躁附論夫時氣病煩者由陰氣少陽氣多故身熱而煩躁也其毒氣在心上而煩躁者則令人悶而欲嘔若其人胃內有燥結而煩躁者或則譫語時繞臍痛其腹脹滿皆當察其證候而治之也方竹葉湯出聖惠方治時氣表裡未解煩躁不可忍者竹葉二兩石膏二兩麥門冬半兩去心半夏半兩湯浸七次去滑人參半兩去蘆頭甘草一分炙微赤銼陳橘皮一分湯洗去白瓤焙生薑半兩上細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服犀角散出聖惠方治時氣頭目煩疼心神躁壅大小便不利宜服犀角屑五錢防風五錢炙微赤銼檳榔一兩川升麻一兩秦艽一兩去苗木通一兩銼白蘚皮一兩甘草半兩炙微赤銼川麻硝二兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服大黃散出聖惠方治時氣表裡如火煩躁欲死宜服川大黃半兩銼碎微炒寒水石五錢川升麻五錢石膏五錢川芒硝半兩甘草半兩炙赤銼葛根五錢上為散每服不計時候以新汲水調下二錢水解散出聖惠方治時氣煩躁頭痛壯熱宜服大黃散出聖惠方治時氣頭痛壯熱不解心神煩躁宜服川大黃五錢銼碎微炒黃連五錢去須麥門冬一兩去心梔子仁五錢銼柴胡一兩去苗甘草半兩炙微赤銼上為散每服五錢以水一大盞入豉半合蔥白二莖煎至五分去滓不計時候溫服苦參散出聖惠方治時氣壯熱不解心神煩悶毒氣在胸膈宜服苦參一兩銼黃芩一兩川升麻二兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服頻服當吐為效治時氣已五六日心神煩躁不解出聖惠方竹瀝半小盞新汲水半小盞上相和攪令勻不計時候頓服又方出聖惠方用大地龍二條破腹去泥細切似小豆大小便一中盞煮令熟去滓不計時候溫服又方出聖惠方雞子清一枚芒硝末一錢上以新汲水半盞調服一方用新汲水三合調服竹葉湯治煩躁而渴不止惡寒但熱盛者崔氏常用亦佳不徒療天行凡虛羸病及病後胸上痰熱者服之皆妙黃芩一兩棗十五枚擘甘草一兩半夏一兩洗芍藥三兩前胡一兩小麥五合人參二兩粳米一升知母二兩麥門冬四合去心竹葉一把入水煮湯用栝蔞一兩生薑四兩上切以水一斗五升煮取五升分五服若天行而虛羸久病胸上痰熱亦可服之加黃耆二兩除黃芩減知母一兩除栝蔞用之大效忌羊肉海藻菘菜救生散治疫癘病壯熱煩躁頭痛體疼人參五錢五味子五錢白朮五錢麻黃去根節三兩桂去粗皮二兩厚朴去粗皮薑汁炙二兩大黃炙銼二兩附子麩炒去皮尖甘草炙各二兩上搗羅為散每服三錢匕新汲水調下後用熟水嗽口良久吃生薑熱茶一盞投以綿被覆之如陽毒汗出陰毒瀉下立瘥治時氣表裡大熱欲死方大黃寒水石芒硝石膏升麻麻黃葛根紫葛上搗篩水服方寸匕發汗麻黃湯治天行壯熱煩悶麻黃五兩去節葛根四兩梔子二十枚擘蔥切一升香豉一升綿裹上㕮咀以水八升先煮麻黃葛根二味沸去沫納諸藥煎二升五合去滓分為三服如人行五十里更進一服不利覆取汗後以粉粉身忌風及諸熱食葛根解肌湯出肘後方葛根四兩芍藥二兩麻黃一兩去節大青一兩甘草一兩炙黃芩一兩石膏一兩研大棗四枚擘桂心一兩上切以水五升煮取二升分溫三服相次服之覆取汗瘥忌海藻菘菜治天行病心悶出本草以水中細草搗爛絞汁服之治時氣熱毒心神煩躁出肘後方取生杼木削去黑皮細切里白者一升以水二升五合去滓一服八合三服又方出肘後方取術丸子二七枚以水五升挼之熱去滓食服汗吐即愈又方出肘後方取古錢一百五十七枚以水一斗煮取七升服汁盡之須臾復以五升水更煮令得一升以水二升投中合得三升出錢飲汁當吐毒出也又方出肘後方取豬膽膏如彈子大者溫服之日三服三日九服勝金方出肘後方治時氣疾熱病狂言心躁用苦參不拘多少炒黃色為末每服二錢水一盞煎至五分溫服連煎三服者有汗無汗皆瘥治天行病心悶出本草以絡石草煎服治時氣五六日心神煩躁不解用竹瀝半盞新汲水半盞和勻服之時氣煩渴附論夫時氣煩渴者此由熱氣入於腎臟故也腎惡燥今熱氣盛則腎燥腎燥故渴而引飲也方知母散出聖惠方治時氣頭疼骨肉煩疼口燥心悶外寒內熱已自下利由有虛熱未退煩渴不止宜服知母一兩人參去蘆頭一兩地骨皮一兩葛根一兩銼甘草炙微赤銼一兩石膏三兩栝蔞根二兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服赤芍藥散出聖惠方治時氣數日不解心燥渴小腹脹急臍下悶痛宜服赤芍藥三分知母三分黃芩三分玄參三分麥門冬去心三分柴胡去苗三分石膏二兩甘草三分炙微赤銼上為散每服四錢以水一中盞入生薑半分竹葉三七片煎至五分去滓不計時候溫服柴胡散出聖惠方治時氣頭疼骨肉煩疼口燥心悶外寒內熱已自下利由有虛熱未退煩渴不止宜服柴胡一兩去苗川升麻三分黃芩三分石膏二兩麥門冬一兩去心犀角屑三分葛根三分銼甘草三分炙微赤銼上為散每服五錢以水一大盞入蔥白二莖竹葉二七片煎至五分去滓不計時候溫服赤茯苓散出聖惠方治時氣頭痛雖時有汗煩渴不止宜服赤茯苓二兩甘草炙微赤銼一兩澤瀉一兩桂心一兩葛根銼一兩石膏二兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服豬苓散出聖惠方治時氣煩熱煩渴欲飲水小便不利宜服豬苓去黑皮一兩赤茯苓一兩澤瀉一兩阿膠搗碎炒微黃一兩滑石一兩上為散每服五錢以水一大盞煎至五分去滓不計時候溫服麥門冬散出聖惠方治時氣壯熱煩渴麥門冬一兩去心五味子一兩人參一兩去蘆頭石膏二兩甘草一兩炙微赤銼上為散每服三錢以水一中盞煎至六分去滓不計時候溫服土瓜根散出聖惠方治時氣大熱心胸煩渴土瓜根半兩干棗五枚麥門冬半兩去心甘草三分炙微赤銼豉五錢上細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服治時氣煩渴不止方出聖惠方地骨皮半兩阿膠半兩搗碎炒微黃蔥白二莖並須上細銼和勻每服半兩以水一中盞煎至五分去滓不計時候溫服治時氣煩渴身熱頭痛嘔逆不能食宜此方出聖惠方柴胡二兩半去苗赤茯苓二兩枳殼二兩麩炒微黃去瓤甘草一兩炙微赤銼麥門冬二兩去心上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服升麻散出聖惠方治時氣下後煩渴不止川升麻三分知母三分甘草三分炙微赤銼石膏兩半葛根一兩銼上為散每服五錢以水一大盞入竹葉三七片粳米一百粒煎至五分去滓不計時候溫服葛根散出聖惠方治時氣煩渴或嘔吐心胸不利者宜服葛根一兩銼豬苓去黑皮一兩赤茯苓一兩桂心一兩白朮一兩澤瀉一兩栝蔞一兩上為散每服不計時候以溫水調服二錢令亟飲水小便利汗出便愈又方出聖惠方黃連一兩去須栝蔞根一兩上為末煉蜜和丸如梧桐子大每服不計時候煎大麥湯溫下三十丸治時氣煩渴不止方出聖惠方葛根二兩銼蔥白五莖切上以水二大盞煎至一大盞去滓納白粳米半合豉半合以生絹裹煎良久候爛去米豉放冷不計時候溫服治時氣煩渴不止方出聖惠方取生藕搗絞取汁一中盞入生蜜一合攪勻不計時候分為二服芍藥湯方治毒瘟病及吐下後有餘熱煩渴芍藥五分黃連四分甘草二分炙黃芩二兩桂心二兩栝蔞二分上切以水五升煮取三升分三服一日令盡忌豬肉冷水海藻菘菜生蔥等干糞湯一名破棺湯解大熱天行病若大困患舌燥如鋸極渴不能服藥者宜服用陳久人糞幹一大升以沸湯一大升沃糞一食久澄清瀝取一升頓服如渴不止者依前法更服時氣鼻衄附論夫時氣鼻衄者由五臟結熱所為心主於血邪熱中於手少陰之經客於足陽明之絡故衄血也衄者血從鼻中出也方石膏飲子出聖惠方治時氣鼻衄血煩躁不止頭痛氣逆石膏搗碎二兩竹茹二兩甘草五錢炙微赤銼桂心五錢赤芍藥一兩黃芩一兩柴胡去苗一兩生地黃三兩上銼碎和勻每服半服先以水一大盞半侵伏龍肝二兩澄清一大盞煎至五分去滓不拘時候溫服治時氣心肺中熱鼻衄不止出聖惠方胡粉炒黑細研乾薑炮製為末亂髮灰細研釜底墨