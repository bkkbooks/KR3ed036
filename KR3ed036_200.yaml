草炙微赤銼半兩知母人參麥門冬去心焙杏仁湯浸去皮尖雙仁麩炒微黃各一兩上粗搗篩每服四錢水一盞煎至六分去滓不拘時候溫服麥門冬湯出聖惠方治瘧病發熱煩躁體黃小便不利令人多驚如有所見者麥門冬去心焙犀角屑杏仁湯浸去皮尖雙仁麩炒微黃常山銼甘草炙微赤銼各半兩糯米八十一粒上粗搗篩以水五盞煎至三盞去滓分為五服於發時前溫服之蜀漆湯治瘧發熱身黃小便不利蜀漆常山人參赤茯苓去黑皮桂去粗皮各一兩大黃炮半兩上粗搗每服三錢水一盞入生薑五片棗三枚擘破同煎至八分去滓溫服不拘時候常山散治瘧病身黃發熱小便不利常山鱉甲塗醋炙令黃去裙襴升麻赤茯苓去黑皮梔子仁人參各一兩上為散每服二錢溫水調服不拘時升麻湯治瘧病身黃髮熱小便不利升麻一兩常山檳榔各三分鱉甲塗醋炙令黃去裙襴知母生地黃各一兩半上銼如麻豆大每服五錢水一盞半入蔥白三寸豉三十粒同煎至八分去滓溫服不拘時常山散治瘧病頭痛發熱身黃色小便不利常山梔子仁桂去粗皮赤茯苓去黑皮甘草炙銼上等分為散每服二錢溫水調下不拘時常山散出聖惠方治瘧病頭痛發熱身黃色小便不利鱉甲去裙襴塗醋炙令黃甘草生用各一兩冬瓜汁四合車前葉一握無葉收子二合常山半兩上粗搗篩漿水二盞並冬瓜汁隔宿浸欲發日五更初以急火煎取一盞半去滓分為二服五更一服取快吐三五度至發時又服亦取吐三五度過時便得吃漿水粥補之茯苓散治瘧病但熱不寒遍身發黃小便澀滯赤茯苓去黑皮三兩桂去粗皮麻黃去節甘草炙銼各一兩上為散每服三錢新汲水調服不拘時候常山丸治瘟瘧發熱身面皆黃小便不利常山赤茯苓去黑皮黃芩去黑心各二兩香豉炒乾二合上為末以粟米飯和丸如梧桐子大每服三十丸溫酒下不拘時候茯苓湯治瘧病發熱身黃小便不利赤茯苓去黑皮白芍藥瞿麥穗各一兩白朮三分上粗搗篩每服五錢水一盞半入蔥白五寸生薑一分拍碎同煎至七分去滓食前溫服
