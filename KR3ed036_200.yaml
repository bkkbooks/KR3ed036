body:
  text: 卷二百諸瘧門久瘧附論久瘧者瘧久不瘥發汗吐下過甚真氣虛邪氣深沉以內薄沖氣不應故積歲月而難治也雖有虛痞不可攻治當先其發時動湯液以發汗蓋浸漬熏蒸而邪氣方出出則微汗小便利者表裡俱和久瘧自瘥矣方龍虎丹出聖惠方治瘧久不瘥或止或發繼月連年諸藥無效者狗頭骨鼠頭骨牛頭骨虎頭骨兔頭骨貍頭骨龍角猢猻頭骨馬頭骨天靈蓋鱉甲龜甲阿魏細研麝香細研各半兩鹿頭骨一枚雄黃一兩細研硃砂一兩細研上為末入研了藥更研令勻以軟飯和丸如雞頭大以青絹裹男左女右中指上系一丸未定即以醋茶下一丸烏梅丸出聖濟總録治諸瘧久不瘥發動無節日漸虛困羸瘦烏梅肉微炒一兩半鱉甲酒浸去裙襴炙令黃色一兩天靈蓋塗酥炙令黃色一兩虎頭骨酒浸炙黃一兩常山細銼一兩柴胡去苗一兩蜀漆葉三分肉蓯蓉去粗皮酒浸炙乾一兩知母焙乾銼三分甘草炙三分升麻三分大黃銼半兩豉炒令黃半兩桃仁二十九枚湯浸去皮尖雙仁生用上除桃仁外為細末與桃仁相和煉蜜丸如梧桐子大每日空腹未發前以枳殼桑根白皮湯下二十丸漸加至三十丸四十丸如瘥後覺冷損憊即加生乾薑地黃防風黃耆桂各一兩香豉減半日一服鱉甲丸出聖濟總録治久瘧不瘥鱉甲酒浸炙令黃色去裙襴一兩虎頭骨酒浸炙令黃色三分烏梅肉炒令乾三分麥門冬去心焙一兩石膏研碎三分常山細銼一兩白薇半兩葳蕤半兩升麻三分人參一分知母銼焙乾三分地骨皮半兩上為末煉蜜丸如梧桐子大未發前米飲服二十丸明日早晨再服三十丸如人行十里即食一碗白粥至臨發時又服三十丸不吐不利瘥後三日內將息如常法驅瘧湯出直指方治諸瘧久瘧不瘥草果仁青皮陳皮人參茯苓半夏制厚朴制蒼朮炒雞心檳榔白朮甘草炙各半兩良薑一分上銼散每服三錢姜三片棗二枚烏梅一枚空心煎服常山飲出聖濟總録治一切瘧疾經久不瘥常山鱉甲去裙襴醋炙各一兩白頭翁知母焙甘草炙銼柴胡去苗各三分青蒿一握桃枝柳枝各一握桂去粗皮半兩上粗搗篩每服四錢酒一盞半入蔥白薤白各三寸切浸一宿煎取八分去滓溫服欲發時再服烏梅蓯蓉丸一名烏梅丸治瘧久不瘥肉蓯蓉丸治久瘧不瘥羸瘦無力寒熱不能飲食烏梅肉微炒恆山銼附子炮裂去皮臍桂心各一兩虎頭骨一兩半塗酥炙令黃桃仁半兩湯浸去皮尖雙仁麩炒微黃香豉一合炒乾麝香一分細研肉蓯蓉一兩酒浸一宿刮去粗皮炙乾上為末煉蜜和搗三五百杵丸如梧桐子大每日空心以粥飲下三十丸晚食前再服鯪鯉甲酒出聖濟總録治瘧久不瘥鯪鯉甲酒浸炙令黃色半兩常山三分鱉甲去裙襴醋浸炙黃半兩烏賊魚骨去甲三分烏梅肉微炒一分竹葉一握桃仁二十四枚湯浸去皮尖雙仁豉一合蔥白七莖一切上銼如麻豆大用生絹袋盛以酒三升浸經一宿每日空腹溫服半盞良久取吐如不吐至巳午時再服三兩服如不瘥隔日更依前服之又方出經驗良方草果去皮膜七枚肥棗烏梅各五枚甘草三寸大半夏湯泡青皮各四枚生薑四塊如指大上為粗末用水一大碗入瓦瓶中濕紙密封煎至半碗發日天明服治久瘧方出聖惠方狐糞雄黃阿魏黃丹硃砂丁香末各一兩麝香一分上同研為細末醋煮麵糊和丸如雞頭實大以緋帛裹衣一丸男左女右系在臂上又方出聖惠方道人頭一兩雄黃三分細研砒霜一分細研香豉一合炒乾荷葉七枚甘草三分生用上為末研藥令勻煉蜜和丸如梧桐子大發前冷醋湯下一丸忌食熱物鱉甲白朮散出楊氏家藏方治久瘧寒熱相等汗多腰脊重痛鱉甲醋炙恆山醋煮炙白芍柴胡各一兩白朮二兩牡蠣半兩煅上㕮咀每服五錢水二鍾姜五片煎至一鍾去滓溫服不拘時候六物湯治久瘧不已寒少熱多嫩常山二錢半柴胡雞心檳榔青皮去白各三錢草果仁甘草炙各一錢半上銼分三服以大軟烏梅三枚過夏好酒一啜許新水二盞煎半盞隔宿露以紗蓋之次早黎明服若寒熱等加製厚朴二錢略暖服是日飲食皆用熱車前草湯治久瘧日多增寒壯熱不止渴飲水車前草半兩常山細銼半兩升麻半兩白粳米半合豉炒半兩甘草生半兩上粗搗篩每用三錢以水一盞半隔宿浸藥置於星月下橫一小刀子於藥上五更煎取七分去滓分溫二服空腹未發前一服相次再服良久得吐吐定即得食漿水粥常山散療患瘧經久者不過五六服常山三兩乾漆三兩熬煙盡牡蠣一兩半熬桂心二兩橘皮二兩杏仁二兩去皮尖熬上為散一服方寸匕先發熱米飲和服若先寒清酒和服空腹未發前一服服藥日惟須晚食七日內慎如前法忌生蔥生菜大效瘧丹治久瘧疾雄黃另研淡豆豉後研和飛羅白麵各半兩乳香二錢半另研黃丹一兩炒黑色桃仁一百個去皮尖上為細末用獨顆蒜研如泥新布中絞過和藥丸如雞頭實大硃砂為衣須要五月五日午時面東北方合藥忌婦人雞犬孝子僧道見每一丸當發日面東北以溫酒或無根井花水下孕婦不可服此方活人多矣如君子以天地之心為心至日誠心修合廣施於人其陰德不淺蓋藥有神助故勉之今所載傷寒證候治方皆法於仲景其録諸方親用得效故敢言之交加飲子治久瘧不已山嵐瘴氣及脾胃氣弱陰陽勝復發為痎瘧一名生熟飲肉豆蔻七個麵裹燒草果二枚一生一熟厚朴二寸一半生一半熟生薑制過用生薑二塊如棗紙裹煨半生半熟甘草二寸半一半生用一半熟用上為末每服水一碗銀石器內煎至一大盞去滓溫服發日空心服未愈再服一方無生薑名交解飲忌葷腥未效用附子七棗湯或人參建中湯不用薑棗煎只作生料添大棗瓦銚多煎日飲數盞以敵諸瘧奏效甚多又屈第五指下二節反紋側外向紋曲盡處灸三壯男左女右儒門事親當發日早灸地骨皮湯治久瘧不瘥發不以時或朝或夜肌瘦食少地骨皮升麻犀角鎊玄參各三分常山一兩細銼上粗搗篩每服三錢以水一鍾煎至七分去滓空腹未發前溫服欲吐須忍候不能禁即吐如此吐下即瘥黃耆散治久瘧四肢虛汗不止黃耆去苗細銼一兩牡蠣燒研如粉一兩麻黃根一兩知母銼焙乾一兩人參一兩上為極細末每服三錢用河水煎小麥湯未發前調下未瘥再服松羅飲治瘧久不瘥發歇無時漸至黃黑枯瘁成癆松蘿三分甘草生半兩常山細銼半兩竹葉切半兩鱉甲去裙襴醋浸炙令黃二分上粗搗篩每服五錢以水一鍾半煎至一鍾去滓空心未發前溫服以吐為瘥柴胡飲治久瘧不瘥將成骨蒸癆寒熱無時柴胡去苗半兩常山三分甘草生半兩附子炮裂去皮臍半兩乾薑炮製一分右銼如麻豆每用五錢酒一盞半煎至一盞去滓分二服空心未發時一服食後再服神功丸治久瘧不瘥惡寒壯熱百節疼痛面色黃瘦阿魏研丹砂研雄黃研各一兩麝香研一錢臘月狐肝焙研二兩上為末重午日未出時粽子丸如梧桐子大每病者以緋線系一丸男左女右中指上未瘥桃仁湯下一丸合時北面勿令雞犬婦人見治久瘧半夏湯泡七次陳皮舊者各半兩白茯苓三錢甘草一錢半旋覆花半兩上為粗末每服四錢水一盞半姜七片煎七分去滓細細啜服不拘時一日四服如是虛弱泄瀉之人間服果附湯一二劑常山散治久瘧連綿積年不瘥常山羚羊角炙令黃烏梅肉炙令燥各二兩黃芩二兩甘草一兩半炙上為散以竹葉煮飲取六七合用調常山散三方寸匕未發前一服若不瘥臨欲發又進二方寸匕老小以意量之忌海藻菘菜生蔥生菜等物治遠年勞瘧不瘥出聖惠方恆山銼附子炮裂去皮臍薄荷根各半兩麝香一錢細研阿魏一分麵裹煨面熟為度上為末和阿魏麝香同研勻煉蜜丸如梧桐子大每於食前溫酒下十五丸治瘧久不瘥出聖惠方蜘蛛五枚大者去腳研為膏蛇蛻皮一條全者燒灰蝙蝠一枚炙微焦麝香半兩細研鱉甲一枚塗醋炙黃去裙襴上為末入研藥令勻五月五日午時以蜘蛛膏入藥煉蜜同和丸如麻子大每服空心溫酒下五丸小兒茶下二丸又方出聖惠方治瘧久不瘥或止或發繼月連年諸藥無效者川大黃末一兩砒霜緑豆粉阿魏麝香各半兩上細研勻以軟飯和丸如小豆大用醋茶下一丸當吐即瘥又方出聖惠方治久瘧砒霜半兩阿魏一分川大黃半兩銼碎微炒硃砂一分細研緑豆二十八粒上為末入研藥令勻用醋飯為丸如梧桐子大臨發前冷水下一丸忌食熱物梔子湯出千金方治瘧經數年不瘥者梔子十四枚秫米十四粒或作粳米恆山三兩車前葉二七枚炙乾上㕮咀以水九升煮取三升分三服未發一服發時一服發後一服以吐利四五行為度不止冷飯止之龍骨丸治療久瘧不斷者龍骨一兩常山三兩大黃二兩附子二分炮上為末以雞子黃丸如梧桐子大先發臨發各飲服五丸常將服之療三十年瘧治瘧纍年不瘥者出聖惠方安息香白芥子道人頭各一兩桃仁二七枚上為末煉蜜和搗百餘杵丸如梧桐子大但於發時男左女右手把一丸虎睛丸出聖惠方治久瘧虎睛一對生用狗膽汁一枚天靈蓋一分生用麝香半分細研上為末入麝香同研勻以狗膽汁和丸如梧桐子大以緋帛裹一丸男左女右手中指系之如患多時生薑湯下一丸熊膽丸出聖惠方治久瘧熊膽五靈脂恆山銼野雞糞雄者各半兩上為末以醋煮麵糊和丸如黑豆大正發時冷水下一丸南鬥散常山白芷南星煨上等分每服三錢水一盞酒半盞姜三片煎去滓發日五更服雄黃散出保命集治久瘧不能食胸中鬱郁欲吐而不吐此藥吐之雄黃瓜蒂赤小豆各一錢上為細末每服半錢溫水調下以吐為度治久瘧方出本事方粉霜硃砂各二錢緑豆粉七錢上為末米糊為丸如梧桐子大每服一丸冷水五更初時下忌生冷久瘧丸治瘧百方不瘥宜服砒霜一錢研乳香半兩研半夏湯洗七遍焙乾稱一兩上重五日合同為末正午時粽子尖和丸如皂子大發時以醋湯下一丸更不再服如非重五日合藥須兩服瘥又方出聖惠方治久瘧蝦蟆大者一枚生用砒霜黃丹各一錢上將二味納蝦蟆腹中用鹽泥固濟燒令通赤取出研為末醋煮糊為丸如梧桐子大每服冷醋湯下三丸忌食熱物恆山丸出聖惠方治瘧疾積年者不過兩服新者一服竇僉判自服有驗用恆山不拘多少雞骨者為細末以雞子清一枚入蜜一匙許於飯甑上蒸或慢火熬熟和常山末丸如梧桐子大每服十五丸當發日空心冷酒或粥飲或竹葉湯吞下忌熱物一日不吐不瀉一方無蜜黃連酒出肘後方治久瘧宜服有熱當吐有冷當下三十年者可治黃連去須一兩銼常山細銼一兩上以酒一升半浸經宿將發前煎一盞分二服臨發更一服辰砂丸出危氏方瘧之為苦異於諸疾世人治之不過常山砒霜之類發吐取涎而已雖無所損傷氣多矣宜服此藥最為穩當辰砂有牆壁光明者阿魏真者各一兩上研勻和稀米糊丸如皂角子大空心濃煎人參湯下一丸一方加雄黃蘷州談逵病瘧半年前人瘧之為病雖在忌醫之列但用之略盡皆不能效邂逅故友竇藏叟先生口授此方遂愈瘧之為病雖在忌醫之列但體認得所因真的按方用藥無不見效又方白茯苓甘草各三錢上㕮咀分二服水一鍾煎臨發時頓服治多年瘧用牡蠣驢脂和烏梅為丸未發時服二三十丸又方取軸垢水洗和麵為彈丸大作燒餅未發時食一枚發時又食一枚不問久近皆安又以驢皮覆身妙治久病瘧疾連年不瘥用生牛膽一個裝糯米滿入麝香少許陰乾每服一十五粒瘧疾陳皮湯送下噎食通草湯送下隨收得裝滿烟頭上陰乾斷瘧出楊氏家藏治久瘧不愈以五月五日蛤蟆曬乾紙裹封絳袋盛之男左女右係臂上勿令病者知又方出楊氏家藏方花蜘蛛五月五日取曬乾依上用之一方用蜘蛛一枚著飯中合丸吞之又法於蘆管中密塞以管綰頸上過發時乃解去也神屋散出海上名方上龜殼燒灰研細酒調下服方寸匕露姜飲出淡寮方治脾胃聚痰發寒熱上生薑四兩連皮搗爛止用自然汁約明日當發隔夜安排將紗片遮蓋露一宿五更初攪動澄清吞吃或有吐任之即安或微利亦安醫稱瘧為鬼疾諭其倏去倏來也世不知察遂謂鬼物為祟蓋寒涎以時而潮故寒熱以時而作彭氏云幼喜啖姜近歲發瘧以藥得大吐而後止一日道中病作或者授此方至今不發蓋姜能發散寒涎露氣極寒以類導之故其效也速所謂以所喜者誘之以所惡者攻之也治久瘧痰瘧用豬膏草搗絞汁服得吐出痰也祛瘧神應丸出德生堂治久瘧及諸瘧疾用三姓人家寒食日食用乾麵每一家取一匙為細末五月五日午時採青蒿擂取自然汁和前面為丸如緑豆大每服一丸當發日早晨取無根井水送下一方用黃丹一匙炒過與面一處碾和勻藜蘆散出保命集治久瘧不能飲食胸中鬱郁欲吐不能吐者宜吐則已大藜蘆末半錢上溫齏水調下以吐為度蒼朮湯出保命集治秋深久瘧胸中無物又無痰癖腹高而食少俗謂瘧氣入腹蒼朮四兩草烏頭一錢杏仁三十個上為粗末都作一服水三升煎至一半均作三服一日服盡迎發而服局方中七宣丸治瘧之聖藥也生熟飲子出衛生家寶方治久患瘧一二服瘥烏梅半炮半生厚朴半生半薑製草果子半炮半生甘草半炙半生陳皮半生半炒半夏半炒半薑製上等分銼碎每服五錢生薑七片棗子五枚水二盞煎至八分去滓熱服立效散出鮑氏方治久瘧硫黃辰砂上為末每服一錢參湯下或加黃丹倍之大凡瘧寒多易治熱多難治燥甚者白虎湯加桂但寒不熱者朴附湯但熱不寒由傷寒而得者小柴胡湯冒濕而得者因浴而得者苓朮湯余皆究原而治之碧霞丹出經驗良方專治遠年日久瘧疾東方甲乙木巴豆取肉去油南方丙丁火官桂去皮西方庚辛金白礬北方壬癸水青黛中央戊己土硫黃揀去砂各半兩五味各研為細末上於五月旦修治了用紙各裹作五包盤盛依方位排定五方勿令雞犬婦人見安佛前每日念觀音菩薩慈號一百八遍至初五日午時以五家粽尖擂碎和藥令勻得所可丸為度丸如梧桐子大有患者以新綿裹一粒男左女右塞耳中凡婦人有患男子與安未發前一日用藥約於每日所發過一兩時久未發取去如夜瘧須候隔日未發取出如病人又甚者隨左右耳鼻皆塞病去依前法除去朴附湯出淡寮方治久發虛瘧寒熱大附子生去皮用剪作骰子生薑自然汁炒乾川厚朴去皮剪作骰子塊用生薑自然汁三浸三炒二味等分上銼散病輕者每服四錢水二大盞生薑七片棗七枚同煎至七分重者加之發日早晨並三服秦艽散出如宜方治久瘧似成癆瘵熱寒往來北柴胡常山各一兩秦艽甘草炙各半兩上㕮咀酒水童便各半盞煎當發日五更服星星散出如宜方治已表解寒熱不止服前藥未效合截半夏制南星常山草果陳皮制厚朴制檳榔秦艽柴胡蒼朮制烏梅良薑各等分上㕮咀酒水各一盞桃柳枝各七寸甘草一寸煎去滓露一宿發日雞鳴服又方用常山生煨草果各一錢東方桃枝七寸煎入生薑汁半盞露一宿五更服如瘧無甚熱先與藿香正氣散草果平胃散驅逐外邪溫胃氣有痰服二陳湯加白朮草果薑棗煎冷服真武湯加草果虛人截藥不用常山如熱非柴胡黃芩秦艽石膏不能退冷非乾薑附子肉桂川烏良薑不能溫痰非南星半夏烏梅茯苓陳皮青皮不能下通用宜常山草果檳榔草豆蔻厚朴白朮人參知母蒼朮甘草能者酌用以上二十四味藥中選用可謂中矣蓋瘧痢無正方故一一述於後衛生者幸詳擇焉大安散治久瘧不瘥不拘寒熱多少鱉甲一枚重二兩好醋煮一時辰令裙襴自脫而出淨洗別以醋煮為粗末取半兩淨者大草果五枚去皮半夏五枚生薑五塊如大拇指大連皮用甘草五寸炙大棗五枚去核上六味同搗爛並作一服以無字白紙數重裹之水濕透入灰火內煨令香熟取出以水五盞煎一盞去滓再以水二盞煎至一盞連前者和勻分二服每服發日五更暖服一盞至欲發時再暖服一盞輕者當日即止蒼耳丸出朱氏集驗方治久瘧不瘥蒼耳草子根莖皆可用上銼碎焙乾為末酒煮麵糊為丸隨時服治久瘧不瘥出本草以雞子黃加常山末為丸竹葉煎湯下治久瘧出本草用馬鞭草作煎加糖酒服祛瘧餅子出楊氏家藏方治久新瘧疾不問先寒後熱先熱後寒砒霜二錢半別研細放露下三宿白茯苓去皮緑豆粉石菖蒲甘草四味並生用各一兩上搗為細末研勻煮麵糊為丸作一百二十餅子每餅子用竹刀切十字不可切斷曬乾每服一餅子先用冷茶清半盞浸餅子在內臨臥時調勻服勞瘧附論勞瘧者以久瘧不瘥氣血俱虛病雖間歇勞動則發故謂之勞瘧邪氣日深真氣愈耗表裡既虛故食減肌瘦色悴力劣而寒熱如故也方烏梅丸出聖惠方治勞瘧連年不瘥烏梅肉微炒鱉甲塗醋炙令黃色去裙襴虎頭骨塗醋炙令黃恆山銼肉蓯蓉酒浸一宿刮去粗皮知母川升麻柴胡去苗蜀漆枳殼麩炒微黃去瓤黃連去須地骨皮木香檳榔梔子仁川大黃銼碎微炒各一兩甘草炙微赤銼豬苓去黑皮麝香細研各半兩豉一合炒乾犀角屑半兩桃仁四十九枚湯浸去皮尖雙仁熬炒微黃上為末入麝香研令勻煉蜜和搗五七百杵丸如梧桐子大每日空心煎桑根白皮湯下三十丸晚食前再服鱉甲煮散出楊子建護命方治勞瘧毛髮枯焦寒熱不定飲食減少肌肉消瘦面色青黑兩足無力非時足冷小便頻數大便不調夢遺滑精鱉甲去裙襴醋炙半兩羌活去蘆頭柴胡去苗各一分黃耆銼半兩赤茯苓去黑皮