上用猢猻頭骨一枚燒灰空心溫酒下一錢臨發再一服治寒熱鬼瘧發作無時用貍糞燒灰水服方寸匕如無以家貓糞亦好又方出聖惠方用桃心一大握搗絞取汁分為二服於發日早以井花水半盞調服至臨發再服瘧母附論夫瘧母者病瘧不瘥結為癥瘕是也邪伏於陰故久而成形不治矣其母雖或時瘥已而復發其本未除故也治宜以破削之劑以削除其病本方雄黃丸出聖濟總録治一切遠年瘧結成癥瘕雄黃研丹砂研麝香各半兩研木香鱉甲醋炙去裙襴龜甲醋炙虎頭骨酒炙羚羊角鎊屑犀角鎊屑白薇玄參當歸切焙知母焙防風去叉麻黃去根節龍膽去苗牡蠣燒赤豬苓去黑皮柴胡去苗茯神去木升麻檳榔銼地骨皮赤芍藥梔子仁黃連去須烏梅肉炒阿魏研桃仁湯浸去皮尖雙仁研炒安息香研葳蕤龍齒各三分上除別研外為細末合研勻煉蜜為丸如梧桐子大每服二十丸白粥飲下未發前服鱉甲煎丸出千金方治久瘧不瘥結為癥瘕名曰瘧母生鱉肉半斤亦用鱉甲黃芩去黑心柴胡去苗蜣螂去翅頭足炒各半兩鼠婦炒去足乾薑炮大黃生銼海藻洗去鹹水汁焙葶藶子紙上炒桂去粗皮牡丹皮厚朴去粗皮生薑汁炙銼紫葳切焙瞿麥去梗半夏湯浸去滑焙人參大戟銼䗪蟲炒射干炮阿膠炙燥桃仁湯浸去皮尖雙仁別研石葦去毛赤芍藥各一分桑螵蛸炒一兩一方作蜂窠上為細末取灶下灰三升酒二升淋灰取汁先煮鱉肉令爛絞去鱉肉後入諸藥末納鱉肉汁更煎成膏可丸即止丸如梧桐子大每服二十丸未發前溫酒下老瘧飲出三因方治久瘧結成癥瘕在腹脅諸藥不去者並治瘴瘧蒼朮泔浸草果去皮桔梗青皮陳皮良薑各半兩白芷茯苓半夏湯洗去滑枳殼麩炒去瓤甘草炙桂心乾薑炮各三錢紫蘇葉川芎各二錢上為銼散每服四錢水二盞鹽少許煎七分去滓空心服日三服仍吞下後服胃瘧內紅丸子鱉甲飲子出仁存方治瘧疾久不愈脅下痞滿病人形瘦腹中結塊時發寒熱名曰瘧母鱉甲醋炙白朮黃耆去蘆草果仁檳榔芎藭橘紅白芍藥甘草炙厚朴薑製炒上等分㕮咀每服四錢水一盞半生薑七片棗二枚烏梅少許煎至七分去滓溫服不拘時候丹砂丸一名截瘧丹出直指方治瘧母精志修合丹砂研緑豆粉去皮研粉砒霜研各半兩上於端午日靜室內面向東南用乳鉢先將緑豆研細入砒霜丹砂研一千遍用稀米粥丸如梧桐子大陰乾每服一丸未發前五更時井花水面北咽下少頃方可食如聖丸出聖濟總録治瘧疾結成癥瘕巴豆三粒去殼黑豆四十九粒砒霜研半兩上將巴豆黑豆用米醋浸一宿去皮膜入乳鉢內順研一百匝入砒霜又逆研一百匝丸如小豆大丹砂為衣每服一丸取嫩桃葉七片水一盞煎數沸傾入盞內用醋一二滴打勻通口令病人面向東方吞下如無桃葉以桃枝七寸煎湯代之經效瘧丹治瘧母結癖寒熱無已二黃丸出聖濟總録治瘧母以生砒霜黃豆末各一兩以釅醋二升一處煎成膏可丸取出別入丹砂雄黃麝香各一錢研細和搜衆手為丸如緑豆大每服五丸未發前煎生薑湯下至妙瘧丹出王氏傳信方治瘧母砒霜研半兩寒水石研一兩上先研砒在生鐵銚內用寒水石末丸之以瓷碗合定濕紙封於碗上燒候煙出熏紙黃色即止取出以紙襯於地上出火毒須臾細研為末入研了丹砂龍腦麝香各半錢許和勻湯浸炊餅丸如梧桐子大以丹砂作衣每服一丸於未發前早晨面北用井花水下忌吃熱物一時辰並忌食魚面五果十數日永瘥此藥合時須五月五日午時忌婦人雞犬及孝子見女人患男兒拈入口中令服立效此藥並不吐不瀉患者只可一服必瘥治老瘧出肘後方用龍骨末方寸匕先發前一時酒一升半煮取三沸及熱盡服溫覆取汗鹽津丸治五瘧八痞治老瘧久不斷者出本草取牛膝莖葉一把切以酒三升漬服令微有酒氣不即斷更作不過三劑止崔元亮海上方治瘧用水煎牛膝根未發前服治老瘧發無時者亦名痎瘧又呼為妖瘧方出本草取瘧龜燒作灰飲服一二錢當微利取頭燒服彌佳亦候發時煮為沸湯坐浸身亦懸安病人臥處此物生高山石下身偏頭大嘴如鶚鳥亦呼為鶚龜治老瘧出本草炙鱉甲杵為末服方寸匕至時令三服盡用火炙無不斷治老瘧母出淡寮方桃仁去皮尖略炒鱉甲醋炙恆山酒煮豆豉和梅蒸或發而研上等分蒸爛烏梅肉研膏為丸每服三十丸不拘時白滾湯吞下連日十數服忌口如常艾府幹者在封川作瘴瘧初時止熱瘴也愚用和解散及南人桃草子法漸輕以藥分和之而一日一大作用截瘧散效數日病發如前依舊用分解藥二日一發用斬瘧丹效又數日又作且苦於正氣羸弱身熱如火愚一味守清虛熱續真元之法為作冷附湯吞靈砂服至二三百粒附三隻熱漸減仍用冷附湯及四獸飲兩日後分作三日一發然當發日午後先寒繼以極熱至明日午方熱漸退第三日早方蘇醒午後發作時便沉著枕簟不能略起抬身則戰掉不堪便溺飲食俱不便也為進黃芽丹每服九粒至數服及連朝為煎七棗湯以其熱瘧亦略露之吃三隻附方漸漸不寒熱猶於當發日作戰不能起仍與七棗湯丹劑之類漸安自來瘴疾既分為間日則未有如此甚者然據指要云寒熱不斷者亦是瘧蓋瘴瘧亦不過寒熱相搏而已要之四時常飲亦是治瘴之妙藥艾之證乃瘴瘧也非江浙尋常之瘧爾紀效消癖丸出直指方治瘧母停水結癖腹脅堅痛芫花炒硃砂研細等分上為末煉蜜丸小豆許每服十丸濃煎棗湯下去癖須用芫花大戟破水之劑下後即愈然後用養胃湯瘧痢附論夫瘧痢者瘧久不瘥寒熱邪氣內傳腸胃也其病寒熱往來痢下膿血赤白相雜腹中切痛隨其陰陽而治之方前胡丸治瘧氣急黃並痢前胡去蘆頭赤茯苓去黑皮芍藥枳殼去瓤麩炒黃芩去黑心各半兩大黃生一