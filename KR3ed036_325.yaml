body:
  text: 卷三百二十五婦人諸疾門血積氣痛附論血積氣痛者惡血久積而成痛也其狀隱隱㽱痛或成塊攻築或聚或散或沉或浮蓋氣痛則血行氣澀則血滯若月水不通産後惡漏不盡或因他病使血不行以致氣血凝滯血因氣聚蘊而成積久不去則為痛方當歸煎丸治婦人血積血癖臍腹㽱痛心膈滿悶四肢煩疼口苦舌乾飲食減少漸成勞瘦當歸切焙附子去皮臍生用各半兩沒藥研硇砂研血竭各一兩禹餘糧煅赤醋淬七次延胡索各半兩以上搗研為末同酒三升調勻於石器內慢火熬成膏和後藥柴胡去苗鱉甲去裙襴醋炙黃人參乾地黃焙芍藥磁石煅醋淬七次牡丹皮各一兩木香一分澤蘭半兩上將後九味搗為細末入前膏內和丸如豌豆大每服二十丸淡醋湯下空心食前服桃仁散治婦人因月水不通血積不散氣攻疼痛積聚成塊桃仁湯浸去皮尖雙仁炒二兩劉寄奴去瓤銼碎蓬莪朮炮細炒當歸炙銼蘹香子微炒烏藥銼白朮木香陳橘皮湯浸去白瓤桂去粗皮乾薑炮銼附子炮裂去皮臍芎藭桑黃銼高良薑銼各一兩上為細末每服二錢溫酒或醋湯調下空心晚食前服當歸丸治婦人血積臍下結塊痛如錐刺或下赤白月水不調腰背痛當歸切焙芍藥吳茱萸湯洗焙乾炒大黃炒銼乾薑炒附子炮裂去皮臍細辛去苗葉牡丹皮芎藭各半兩虻蟲糯米炒水蛭糯米炒各七十枚桂去皮三分厚朴去皮薑製桃仁去皮尖雙仁麩炒各一兩上為末煉蜜和劑搗令勻熟丸如梧桐子大每服二十丸食前溫酒下加至三十丸地黃煎丸治婦人因月水不調血結不通血積小腹成塊如覆杯生地黃肥者細切研爛絞汁一十斤生薑去皮研爛絞汁一斤半二味汁於微火上煎令如稀餳乾漆炒令煙出桂去粗皮當歸切焙桃仁湯浸去皮尖雙仁麩炒生薑地黃焙芍藥牡丹皮牛膝去苗酒浸炙黃炒各二兩大黃煨一兩半水蛭糯米炒虻蟲去翅足頭炒各一百上搗羅後一十一味為末入煎地黃煎中以微火上煎硬軟得所衆手丸如梧桐子大每服七丸食前溫酒下延胡索丸治婦人血臟久冷虛積氣攻心腹臍下疼痛嘔逆痰涎不思飲食延胡索米醋炙黃三分當歸切焙沉香銼各半兩木香白朮芎藭青橘皮湯浸去白瓤焙附子炮裂去皮臍吳茱萸湯浸焙乾炒桂去粗皮京三稜濕紙裹煨別搗為末各一兩半篷莪朮銼炒一兩上為末以酒煮麵糊丸如梧桐子大每服二十丸煎生薑醋湯下日進三服不計時候勝金丸治婦人血積心腹疼痛氣刺氣脹攻築或經候不行肢節煩疼痰逆癖乾漆炒煙盡烏頭炮裂去皮臍狼毒京三稜銼碎炒黃各一兩紫葳凌霄花是也麒麟竭沒藥檳榔各半兩八味同為末硇砂巴豆二十枚去皮心膜研去油大黃單搗為末一兩芫花單搗為末半兩上先以醋二升熬大黃芫花二味末次下巴豆硇砂同熬稠其餘八味同搗細羅為末同熬成膏和劑如干硬少入煉熟蜜同和劑令得所丸如緑豆大每服七丸至十丸當歸酒下桃仁丸治婦人因月水不利血結成積氣攻疼痛桃仁湯浸去皮尖雙仁麩炒黃澤瀉白茯苓去黑皮芍藥瞿麥用穗乾薑炮裂生乾地黃焙甜葶藶紙上炒當歸切焙甘草炙芎藭各一兩大黃銼炒一兩半上為末煉蜜和丸如梧桐子大每服二十丸空心食前溫酒下米飲下亦得增減四物湯出蘭室祕藏方治婦人血積當歸川芎芍藥熟地黃莪朮荊三稜桂去皮乾漆煙炒盡上各等分為粗末每服三錢水二大盞煎如常食前沒藥丸治婦人腹內血結氣攻疼痛行經沒藥一兩研桂去粗皮當歸切炒芫花醋炙半焦乾漆炒煙透各一兩半上搗羅為末醋煮麵糊丸如梧桐子大每服二十丸溫酒下不拘時沒藥丸治婦人血氣血積堅癖血瘕發歇攻刺疼痛嘔逆噎塞迷悶及血蠱脹滿經脈不行沒藥研一兩芫花一兩用米醋二升煎至一升半濾去滓不用將醋入石器內入硇砂霜一兩巴豆肉七粒研細入醋內煎成膏入後藥末附子生去皮臍一兩檳榔銼一分木香肉豆蔻二枚炮去皮當歸銼焙桂去粗皮蓽茇各一兩斑蝥三十枚糯米炒令黃焦去翅足別研細上搗羅七味為末斑蝥沒藥研均入煎膏內和搗千百杵丸如梧桐子大初服三丸以醋炒薤白令焦黑以酒浸煎一兩沸吞下漸加五丸七丸為度如急卒血氣攻心脾以酒醋共一盞煎速吞下血瘕堅癖結塊攻心疼痛悶亂久醫不效者即入禹餘糧一兩火煅醋淬七遍為末和為丸每服五丸蘇木節三兩銼細酒三升煎至七合去滓分作三服每服下丸子三丸並服三服即血瘕隨大小腸遂下其病立瘥人弱者每服只二丸如是丈夫元臟小腸氣脾積氣症塊等疾即入丹砂一兩細研和停以生薑鹽湯吞下三丸硇砂丸治婦人血塊攻築疼痛硇砂研沒藥研各一兩粉霜半錢乾漆炒煙盡半兩乾薑炮京三稜炮各一兩桂去粗皮當歸銼焙各半兩阿魏一分醋化入白麵少許作並炙令熱木香一分上為細末醋煮麵糊和丸如緑豆大每服十五丸淡醋湯下或空心食前服薑黃散治婦人冷癖血塊虛脹月經不調瘦弱不能食面無顏色薑黃白朮各八兩生薑去皮細切三升當歸切十兩陳曲末大麥糵末各二升生地黃細切三升桃仁去皮尖雙仁杏仁去皮尖雙仁各二升青橘皮湯浸去白切三升上為末臼搗如泥水甑中鋪勻以面封之勿使泄氣蒸熟並甑置屋下三日取出藥曝乾搗羅為散酒服方寸匕日二服取利為度十日內忌生冷難消化物過十日百無所忌若煉蜜為丸亦得每服三十丸酒下日再服大黃丸治婦人月水不通結堅瘕如石腹脹血積不散大黃銼炒砂石熬沸研細各二兩蜀椒去目及合口者炒去汗半兩代赭別研乾漆炒煙盡芎藭赤茯苓去黑皮乾薑炮虻蟲去翅足並頭炒各一兩上為末煉蜜和丸如梧桐子大每服空心食前溫酒下米飲亦得漸加至三十丸芍藥湯治婦人血積氣攻心刺疼痛不已面黃體瘦經水不調芍藥芎藭當歸切焙防風去叉桂去粗皮各半兩甘草炙劑生薑地黃焙各一兩枳殼去瓤麩炒白朮各半兩上粗搗篩每服三錢水一盞煎七分去滓溫服經水久不利煎成取入芒硝半錢食前稍熱服血竭散出瑞竹堂方治婦人臍下血積疼痛血竭乳香沒藥別研白芍藥水蛭鹽炒煙出當歸麝香以上各一分虎骨炭灰炙盡黃一錢六分上為極細末每服三錢空心調酒下硇砂丸治婦人年久血積塊攻刺疼痛不可忍或嘔吐不進飲食面黃怠惰硇砂去夾石者當歸切焙芫花醋炒微焦各一兩蓬莪朮炮半兩木香一分巴豆三十粒去皮心膜去油盡上先研硇砂巴豆沒藥如粉用米醋三升同煎為稀膏後將四味搗羅為細末入在前膏內和成劑瓷合盛用時丸如梧桐子大每服七丸看患虛實臨時加減用酒醋各半盞同煎數沸通口服不得嚼仍須飲盡酒醋立瘥沒藥膏治婦人血氣積腹脅有堅癖攻築疼痛不思飲食沒藥別研木香當歸銼焙各半兩五靈脂二兩半硇砂別研半兩上搗羅三味為末入二研藥銀器內以酒各半盞同熬成膏瓷盒盛勿透氣每服旋取一櫻桃大熱酒化下不計時候日可三二服如不飲酒醋湯化下當歸丸治婦人虛冷血氣及血積隱隱㽱痛血塊攻築疼痛當歸切焙延胡索各一兩沒藥研麒麟竭硇砂研各三分上為末合研勻用狗膽和丸如梧桐子大每服十丸加至二十丸醋湯或溫酒下狗膽丸治婦人血氣狗膽一枚入巴豆七粒空甌後挂三七日乾用木香丁香硇砂槐花各半兩上為細末煉蜜丸如緑豆大每服二丸血風虛腫氣急煎薄荷酒下兒枕不散疼痛不可忍煎醋湯下産後通身走注疼痛蓮花湯下吐血不止刺薊根入小便送下血塊溫酒下血遊萆麻湯下熱疾地黃酒下敗血衝心蒲黃酒下青金丸治婦人血積氣攻衝心腹㽱痛吐逆不下食前發作神思昏悶四肢逆冷五靈脂二兩取細末一兩硝石一分同上研斑蝥不叫者去翅與糯米同炒取一分為末上同研令勻滴水丸如豌豆大每服七丸煎生薑醋湯下嚼不計時候服甚者再服愈祕傳降香湯出衛生家藏方治血氣攻刺如鑽針所刺痛不可忍及一切敗血成積無藥可療者服之即愈真降香一錢沒藥一錢麒麟竭一錢上為末每服一錢磨真降香溫酒下立止穿山甲散出楊氏家藏方治婦人血積氣塊往來刺痛經脈欲行腹腸疼痛寒熱肌肉消瘦當歸洗焙乾漆米醋炒令煙盡穿山甲石灰炒如田螺乾薑炮上件各等分為細末每服二錢溫酒調下食前治一切血氣出本草以蚶殼燒以米醋三度淬後埋令壞醋膏丸服之瘀血附論瘀血者由經水蓄聚或産後惡露不盡皆本衝任氣虛風冷所乘不能宣故血瘀也瘀血不去結痼成積則令人面黃瘦煩渴憎寒腰腹重痛久變癥瘕方調榮湯治瘀血不消臍腹引腰背俱痛川芎當歸芍藥生薑地黃三稜莪朮白芷延胡索蒲黃香附子澤蘭細辛川白薑厚朴制各三分辣桂三分桃仁湯浸麩焙二分半夏制甘草炙各三分勝金丸治婦人久積瘀血在腹內疼痛不可忍水銀二分硫黃一兩以上二味同結作砂子細研棕櫚皮燒灰乾漆搗碎炒令煙出鯉魚鱗燒灰自然銅細研麒麟竭以上各一兩狗膽一枚乾者當歸一兩微炒煮延胡索半兩虻蟲一分微炒黃去翅足水蛭一分炒令微黃烏蛇一兩酒浸去皮炙微黃桂心半兩亂髮一兩燒灰沒藥半兩上為末研令勻以酒煮麵糊丸如梧桐子大每服不計時候以熱酒下十丸麒麟竭丸治婦人經絡痞澀腹內有瘀血疼痛不可忍麒麟竭半兩沒藥半兩硇砂黃狗膽內浸一七日乾漆搗碎炒令煙出芫花醋拌炒令乾以上各一兩延胡索川烏頭炮去皮臍白附子各半兩當歸一兩銼微炒砒霜半兩伏龍肝一兩虻蟲一兩微炒去皮水蛭一兩微炒巴豆一兩去皮心研紙裹壓去油紅藍花一兩上為末用生鐵銚子內入頭醋一升先下硇砂攪勻然後下藥末一半用慢火熬如膏後入余藥末和丸如小豆大每服不計時候熱酒下五丸當歸丸治婦人經絡澀滯致有瘀血在臟結聚欲成症塊當歸一兩半銼微炒鱉甲半兩塗醋炙令黃去裙襴琥珀半兩桃仁一兩去皮尖雙仁麩炒微黃川大黃銼碎微炒菴䕡子牡丹水蛭三分炒令黃芎藭桂心以上各半兩虻蟲三分炒微黃去翅足牛膝去苗赤芍藥上為末煉蜜和搗三二百杵丸如梧桐子大每日空心服用熱酒下二十丸虻蟲散一名桃仁散治臟腑宿冷經脈不利腹中有瘀血攻刺疼痛地龍散治婦人血氣不調腹中積瘀血疼痛地龍一分微炒蜴蜥炒芎藭桂心各一兩乾薑炮半兩蘇枋木一兩銼木香蒲黃牡丹赤芍藥水蛭炒以上各三分桃仁一兩去皮尖雙仁麩炒黃上為細散每服二錢食前溫酒調下烏金散治婦人臟腑風冷宿有瘀血不消令黃瘦羸困鯉魚鱗三兩亂髮二分槐莪三分桑莪三分虻蟲一分水蛭一分川大黃一兩銼碎硇砂芫花牛膝去苗各半兩上藥併入瓷瓶子內用瓦子蓋以鹽泥固濟候乾以大火煅令通赤慢慢去火候冷取出入麝香二錢同研令細每服空心熱酒調下二錢敗蒲湯治婦人因血澀內瘀不散疼痛敗蒲燒灰當歸各二兩牡丹皮芎藭赤芍藥各一兩豉心一兩桃仁湯浸去皮尖雙仁半兩陳橘皮去白焙一兩蒲黃紙上炒半兩上粗搗篩每服三錢水一盞煎至七分去滓入地黃汁一合朴硝一錢溫服硇砂丸治婦人積瘀血在臟攻心腹時痛四肢黃瘦夜臥心煩硇砂硫黃與硇砂同結為砂子細研芫花醋拌炒令乾沒藥牡丹水蛭炒令黃當歸炒川大黃銼碎微炒虻蟲炒令黃去翅足各半兩上為末入砂子研令勻煉蜜搗三二百杵丸如緑豆大每服空心熱酒下五丸桃仁湯治婦人經水痞澀因冷血瘀不通結積臍腹為氣痛面黃體瘦桃仁大黃生用各一兩桂去粗皮當歸切焙各三分甘草炙半兩虻蟲去頭足水蛭炒焦各十枚上粗搗篩每服三錢水一盞煎至