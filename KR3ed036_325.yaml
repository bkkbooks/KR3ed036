一大匙就患處臥明日取下惡物相度強弱用藥羸弱不宜服治乳癰初作腫痛便服凡患乳癰戒不可用針若誤針著乳房立死出仁存方上以栝蔞子忍冬葉各一兩濃煎汁飲即消皂蟾散出拔萃方治婦人因露風邪氣外客於乳內結為吹奶積久不消以成奶癰此藥導其汁散其風邪出其病自然痊愈矣皂角不蛀者燒存性真蛤粉各等分一方用皂角刺上為細末每服二錢溫酒下不拘時候詩曰婦人吹奶藥蔞羅皂角燒灰蛤粉和熱酒一盞調八字雙手操散笑呵呵加乳香少許尤佳栝蔞散出危氏方如不愈者並前方治之栝蔞明乳香上為末每服二錢溫酒調下熱者加石膏末少許蔓荊實散治乳癰疼痛蔓荊實炒一兩甘草一寸半生半熟上搗羅為散每服二錢以溫酒調下日再服防風散治乳癰防風去叉半兩牽牛子炒令香二兩上搗羅為末每服二錢空心用沸湯調下取微利為度未利再服漸減服之即瘥鯪鯉甲散治乳癰疼痛結硬不可忍鯪鯉甲燒灰一兩栝蔞一枚燒灰上研和為散每服二錢空心用蔥酒調下至晚再乳初腫方出直指方上用甘草生二錢炙二錢為粗末分二次新水煎服令人吮乳又方治奶痛上用芭蕉根捶碎盦之治乳癰腫痛宜熁貼方出聖惠方鹽草根生蒻頭各半兩上搗如泥貼之立效治乳癰方出聖惠方赤小豆蛇蛻皮燒灰上以雞子白和之敷上少干即易一字散治婦人乳結痛不可忍者麝香半錢螃蟹殼不拘多少上為灰入麝香調下治乳癰瘡鼠糞粉子炒黑上各等分停加麝香少許好酒二盞送下祕方山藥半斤為末官桂二兩為末上用秈米粉打糊為丸每服一百五十丸用無灰好酒送下不拘時服次用膏藥貼痛處貝母散治乳癰貝母金銀花各二兩上為細末每服三服好酒調食後服治婦人乳癰毒氣不散冬瓜皮研取汁當歸半兩末上以冬瓜汁調塗之以瘥為度附子散治婦人乳疽及妒乳作寒熱疼痛宜服附子一兩去皮臍藜蘆半兩去蘆頭上為末用醋調敷之干即再敷之又方米粉一合炒令黑雞子白三枚上藥相和塗帛上以貼疽上開一小孔以泄毒氣燥即易之又方釜底土一兩雞子白三枚上搗相和塗之如少破奶良又方半夏末一兩雞子白三枚上藥和塗之極效又水磨出小品治婦人乳頭裂痛欲成瘡胭脂三分蚌蛤粉一兩上藥研細塗乳裂處神效治婦人乳中結塞腫硬如石成癰出聖惠方玄參白檀香各半兩上為細散用醋調塗腫結處干更塗治乳癰堅方出千金方以水罐中盛醋泔清燒石令熱內中沸止更燒如前少熱納乳漬之及冷更燒石內漬不過三燒石即愈治乳癰方出千金方鹿角治下篩以豬脂上清汁服方寸匕不過再服亦不可以錯將水服治乳癰二三日衆療不瘥但堅紫色青柳根尉方出千金方柳根削取上皮搗合熱熬令溫盛著練囊中尉乳上干則易之愈治乳癰痛不可忍出鮑氏方用餛飩草酒浸服以滓敷縛治乳癰出聖惠方用鹿角屑一兩為細末以豬膽汁調下一錢不過再服神驗以醋漿水服之亦得集驗方以豬頷下清汁一方鹿角炒微黃用橘香散一名橘皮出拔粹方治乳癰未結即散已結即漬極痛不可忍者藥下即不疼因小兒吹奶變成斯疾者並皆治之陳皮湯浸去白晾乾麵炒微黃為細末麝香研酒調二錢初發覺赤腫疼痛一服見效每服有效一方用青皮焙乾為末熱酒調下一醉膏出大全良方治奶癰石膏不以多少煅通赤取於地上碗覆出火毒細研每服三錢溫酒下添酒盡醉睡覺再進一服療乳無汁以水煮服治療婦人乳癰已穿未穿出膿大止痛斂瘡口出大全良方以芙蓉花搗研如泥若無花只取根上皮先用竹刀刮去粗皮但用內一層嫩白皮研如泥卻入蜜少許調停看瘡大小如未穿即留中孔如已穿即塞其孔其膿根自然流出盡不倦頻頻更換此方大治一切癰疽發背立見神效膿出盡卻用後藥敷干膿散出大全良方又斂瘡口烏賊骨黃丹天竺黃各一錢輕粉二錢麝香一分老降香骨三錢上研細末干糝瘡口不數日乾又方出大全良方降香節二錢天竺黃露蜂房各一錢麝香輕粉各少許上為末干糝又方出大全良方乳香沒藥黃丹各一錢龍骨二錢真樺皮二錢血竭半錢麝香二分降真節一錢上為末干糝之治乳癰初作腫痛出仁存方用萱根自然汁調敷一方出百一選方治乳癰牛皮膠不拘多少熔開用紙花攤貼奶上次以舊齒刷子一個燒灰存性研為細末酒調服甚有功效又方出百一選方用苔脯中泥調塗奶上甚妙治婦人奶癰出危氏方用仙人掌草一握好酒糟生薑各塊一處擂爛入桂末少許炒酒服滓罨腫即便止痛更不成瘡又方出危氏方用山礬菜為末食後溫酒或熱湯調下治婦人乳癰出聖惠方以人牙齒燒灰研令細以酥調塗貼腫上乳癰方出直指方治乳癰疽初發用貝母為末每服二錢溫酒調下即以兩手覆按桌上垂乳良久自通小麥面出肘後方主婦人乳癰不消用白麵半斤炒令黃色用醋煮為糊塗於乳即消又方以蔓荊根葉淨擇去土不用洗以鹽搗敷乳上熱即換不過三五度冬無葉即用根須避風茺蔚子出聖惠方治婦人勒乳痛成癰用益母草搗羅為末新汲水調塗乳上一宿自瘥生者搗爛用治乳癰痛不可忍出危氏方上搗橘葉極細攤敷帛縛之薑石救急散治乳癰腫如碗大痛甚取白薑石搗末一二斤用雞子白和如餳敷腫上干易之此方頻試驗如雞子慮罪榆白皮和搗敷即瘥乳癰月蝕瘡繞耳根以烏鴟雞膽汁敷之三日治婦人奶癰未成結者用貫衆一味為細末外用敷腫上內亦可服之牡蠣散治乳癰初發腫痛結硬欲成膿令一服瘥牡蠣取腦頭厚處生用上細研為散每服二錢研澱花冷酒調下如癰盛已潰者以藥末敷之仍更服藥一日三服樺皮散治乳癰初發腫痛結硬欲成膿令一服瘥以北來真樺皮燒灰酒服方寸匕就病乳處臥及覺已瘥治乳癰結硬疼痛方上和泥芥菜半斤銼碎以水四升煮取三升傾於瓷瓶熏乳腫處日三五度即瘥治乳癰結硬疼痛上和泥蔥半斤細銼以水四升煮十數沸於瓷瓶子內盛薰乳腫處日三五度即瘥冷即再暖以瘥為度一方搗蔥白縛之絞汁一升頓服治乳癰疼痛方上車前子一兩搗羅為散每服二錢匕溫酒調下治乳癰腫疼痛方上打雞子一枚熱酒調為一服治乳癰初發用皂角針四十九枚燒灰存性栝蔞根酒服立潰奶癰瘡用黃栝蔞一二個連皮及瓤子銼碎用無灰酒一二升於沙瓶內煮存一升去滓時時溫酒服盡再煮滓服如覺初時便服此藥即時痛止便不成瘡如已成瘡服之其瘡自穿而痛自止治乳癰痛不可忍上用地龍一二條入生薑於乳鉢內研如泥塗四旁紙花貼之治乳癰用夏枯草酒擂服仍用滓敷即日乳下三日愈又方用豬膽汁蜜搗蔥貼如水妙無比散出傳信適用方治婦人奶癰痛甚用蛇蛻皮燒灰一錢炒甘草末半錢同和暖酒下如破用生油調塗治奶癰用梨錢子煎湯洗一方用枇杷葉煎湯洗若無則用棠梨葉又方出肘後方用屎或馬屎敷並佳此消去又方用搗生地黃汁敷之熱則易小豆亦佳治乳癰疼痛寒熱至甚宜服此出聖惠方用鑿下馬蹄燒為灰細研以酥調塗緋帛上貼日二換之治婦人乳癰身體壯熱疼痛不可忍出聖惠方取蒲公草並根搗絞取汁半合酒和服之如無新者用干搗細羅為散每服調下二錢治婦人乳癰並吹奶疼痛不止出聖惠方蝦蟆一枚五月五日收陰乾者以罐子盛燒令赤候冷取出細研為散每服熱酒調下二錢治婦人乳癰熱毒腫痛出聖惠方上青牛腹下毛燒作灰細研水和服之立效又方出聖惠方治婦人乳癰不消立效上嫩皂莢刺二兩紫色者微炒搗羅為細散以溫酒調下二錢治婦人乳疽及妒乳作寒熱疼痛宜敷以醋和吳茱萸末或搗生薑或小蒜和敷之並良治乳癰宜熏耶屈律藤蔓切一斤上水二升煮取一升半瀉於小口瓷瓶中熏患處良蒺藜丸出千金方治婦人乳癰瘡腫疼痛除熱蒺藜白者微炒去刺大黃各一兩炒敗醬一分桂心人參去蘆頭薏苡仁附子炮去皮臍黃連去須黃耆去蘆當歸微炒枳實麩炒芍藥通草各三分上為末蜜丸如梧桐子大未食飲服三丸不知益至五丸日三無所忌一方無大黃敗醬黃連通草為散酒服方寸匕升麻散治婦人乳初覺腫房疼痛及欲成癰結川升麻赤芍藥甘草川大黃各一兩玄參一兩半白芷三分馬蹄三分川朴硝二兩桑根白皮三兩上件藥搗粗末羅為散每服四錢以水一中盞煎至六分去滓食前溫服敷乳方出聖惠方天南星半夏生皂莢刺燒帶生各二兩白芷草烏直殭蠶焙各一兩上為細末多用蔥白研取汁入蜜調敷若瘡口破用膏藥貼治婦人乳腫妨痛日夜不可忍出聖惠方煅爐底土一兩露蜂房半兩炒赤小豆一合川大黃一兩木香一兩桂心一兩上為細末以真麻油調塗上經宿神效治赤腫欲作癰者出百一選方用天南星為末生薑自然汁調塗初發便用以鵝翎塗之又方出百一選方上用缺盆草糯米香草又名趙侯須其葉小卻如葡萄有刺不拘多少連皮生薑一塊同研爛罨即消治奶疼方真蛤粉五錢炒上用皂角刺四五個煎湯調服加好酒一呷服後又用此藥防風大黃當歸上煎湯洗可止用手大揉久之後用口飲奶透方可治乳腫出聖惠方桂心甘草烏頭一分炮上為末和苦酒塗覆之膿為水即神效治婦人乳腫痛慮作癰毒宜服此甘草半兩一半生用一半微炒栝蔞一枚去皮瓤去子細銼令爛上以酒一大盞煎甘草取六分入栝蔞酒後宜更用此淋尉腫痛上治婦人乳腫疼痛柳白皮地松二握銼上以水五升煎至三升及稍熱並滓熏乳腫處以通手即淋尉乳上當日即退菩薩散治奶癰腫痛時發寒熱狀如傷寒不可忍已結未成並治霜杜荊子今作杖子者是十二月正月二月採之酵頭用作炊餅者欲炒勿令焦上二件各搗為細末以淨盤子擎之於佛前焚香誦南無藥王菩薩南無藥上菩薩聖號各一百八遍等分拌勻至心禱告畢抄三錢匕一蔥酒調下食後稍空進之服藥頃間度藥力到患處即令人以手揉摩之更令人吮出乳汁尤佳飲酒人多飲之令有力不飲酒者以蔥湯沖酒借氣可也得熟寐即釋然脫去矣已結未成膿者立潰並免痛楚重者不過兩服異人何伯遜高曾以來久施此藥其效如神祕而不傳近日漕司李運幹家有一人患此病懇而得方一投而愈治乳癰不可忍上用石蛀竹籤截成糖研極細羅過溫酒服先用復元通氣散佳又方用灶間倒挂塵多年者羅細末二錢以乳汁調勻溫酒調下仍以手頻按腫處即消又方用桑蟲糞曬乾為末酒下去風毒也治婦人乳腫不消上取魚枕搗末唾調塗之治乳腫痛甚者野松半斤不用洗上和鹽搗爛厚塗腫上干即換之治乳頭裂破上用苧麻根搗敷之治奶頭裂上用秋後冷露茄兒花裂開者陰乾燒灰存性水調敷之如未秋時但是裂開者亦可用療乳癰及發背四肢虛熱大渴生地黃六兩黃芩芍藥人參知母甘草各二兩升麻黃耆麥門冬栝蔞各三分大棗十二枚上以竹葉切三升以水一斗二升煮取九升去竹葉納藥煮取三升渴則飲之連翹湯治妒乳乳癰連翹芒硝各二兩芍藥射干升麻防己杏仁黃芩大黃柴胡甘草各三兩上㕮咀以水九升煮取二升五合分三服療婦人髮乳丈夫發背爛生膿血虛成氣疾黃耆麥門冬地黃人參升麻茯苓各三兩當歸芍藥遠志甘草各一兩大棗十枚上水二升煮取一升分溫三服若有是證局方排膿內補十宣散妙神效栝蔞散治婦人癰疽勞乳栝蔞一個去皮焙研為末如急用只爛研子有多者有力當歸酒浸去蘆半兩乳香一錢生粉草半兩通明沒藥一分二味別研上用無灰酒三升同於銀石器中慢火熬取一升清汁分作三服食後良久服如有奶勞便服此藥可杜絶病根如毒氣已成能化膿而黃水毒未成即於大小便中通利疾甚再合服以退為妙婦人乳癰方甚多獨此一方神效無可比萬不失一癸亥年僕處五羊趙經略廳判閫夫人年七十一歲隔一二年左乳房上有塊如鵝卵大今忽然作楚召余診僕云據孫真人云婦人年五十歲以上乳房不宜見癰見則不可治矣幸而未破恐是氣瘤謾以五香連翹湯去大黃煎服服稍減則已過六七年每遇再有腫脹再合服消立效散出直指方治發背及諸癰癤及瘰癧有效或婦人乳癰與前方間服妙紫色皂角半斤不用枯者細銼炒耐久炒赤色生粉草二兩乳香半兩別研沒藥半兩別研栝蔞五個去皮取肉並仁搗碎炒煮乾上為細末每服二錢溫無灰酒調下無時候煎服直指方名五物湯竹皮大丸出金匱方治婦人乳中虛煩亂嘔逆安中益氣生竹茹三分石膏二分桂枝一分甘草七分白薇一分上五味棗肉和丸彈子大以飲服一丸日三夜二服有熱者倍白薇煩喘者加柏實一分治婦人乳癰出危氏方火扻草皂角刺穿山甲黃蜂窩上以上件各燒存性為末入輕粉生麻油調敷瘡上療乳癰諸般癤癰疽出大全良方橘紅半兩阿膠粉炒燥粉草炙各二兩上㕮咀為二服每服用泉水一碗半煎至淺半去滓溫服治妒乳乳癰方出千金方上取研米捶二枚炙令熱以絮及故帛拓乳上以捶更立尉之瘥止已用立效療奶癰並無名癰癤出大全良方上用鼠糞不以多燒存性二分入輕粉二十文研停麻油調塗如有頭即潰無頭即消又療火瘡治奶勞奶癰等疾出危氏方上用赤小豆三升酒研爛去滓溫酒服以滓敷患處一方赤小豆為末水調塗愈又方出危氏方上用蔓荊子無子用嫩葉或花擂爛酒炒服之以滓貼患處伏龍肝出肘後方療奶發諸癰疽發背及乳上以釜下土搗取末雞子中黃和塗之加少蜜良治妒乳乳癰乳頭裂破出肘後方上取丁香搗末水調方寸匕服敷患處亦佳治奶發痛不可忍出大全良方上水楊柳根新採者一握捶碎以好酒同甘草烏梅煨至七分去滓時時溫服治婦人乳勞癰爛見肉者出危氏方上用貓兒腹下毛坩鍋煅存性為細末干敷或油調入輕粉少許青桑膏出危氏方治乳硬作痛上用嫩桑葉左採細研米飲調攤紙花貼病處此證四十以下可治五十以上不可治治之則死不治則自得終其年矣連翹湯治吹乳乳癰連翹瞿麥穗各一兩升麻玄參生乾地黃焙芍藥各三分甘草炙一分射干一分上細銼如麻豆大每服五錢水一盞半煎至八分去滓食後溫服治婦人乳結硬疼痛方出聖惠方上取鱔魚皮燒灰搗細羅為散空心以暖酒調下二錢服之治乳赤腫欲成癰者出鮑氏方白芷芙蓉葉赤芍藥紫金藤黃柏當歸上為末入雄黃研少許拌勻蜜水調服治奶癰腫痛上用栝蔞根為末入炙甘草末少許用薄荷酒調下治乳癰惡痛者用茺蔚子搗敷及取汁服效治乳腫用栝蔞黃色老大者一枚熟搗以白酒一斗煮取四升去滓溫服一升日三服若無大者小者二枚黃熟為上妒乳附論夫氣血流行則上為汁下為月水上下通達不失常度是謂平人宜通而塞則為痛熱氣復乘之則為腫向之流行者壅遏矣倘失調治則結硬成核身體壯熱甚則憎風遂為乳癰世傳氣結乳閇亦為妒乳者此也婦人女子乳頭生小淺熱瘡癢搔之黃汁出浸淫為長百種治不瘥者動經年月名為妒乳婦人飲兒者乳皆欲斷世謂苟抄乳是也宜以赤龍皮湯及天麻湯洗之敷二物飛烏膏及飛烏散佳若始作者可敷黃芩漏蘆散及黃連胡粉散並佳吹奶妒乳乳癰其實則一只分輕重而已輕則為吹奶妒乳重則為乳癰方升麻托裡湯一名內括升麻湯出濟生拔萃方治婦人兩乳間出黑頭瘡瘡頂塌下作黑眼子其脈弦洪按之細小升麻葛根連翹各一錢半肉桂黃柏各三錢當歸身黃耆炙甘草各一錢黍黏子半錢上㕮咀都作一服水酒同煎去滓稍熱服治妒乳乳生瘡方出千金方蜂房豬甲中土車轍中土各等分一方多車轂脂一味上三味為末苦酒和敷之黃連胡粉膏散出千金方黃連二兩胡粉十分水銀一兩同研令消散上三味搗黃連為末三物相和合水裡熟煮之自和合也縱不得一成且得水銀細散入粉中也以敷乳瘡諸濕瘡黃爛肥瘡等若干著甲煎為膏千金同漏蘆散治乳汁不時泄蓄積於內遂成癰名妒乳漏蘆一兩黃芩一兩去黑心米粉半兩上三味搗為細散小調如膏塗於乳上治妒乳方出千金方上燒自死蛇為灰和以豬膏塗之大良赤龍皮湯出大全良方治乳瘡上以槲皮切三升水一斗煮五升春夏冷用秋冬溫之分以洗乳亦洗諸深敗爛久瘡洗畢敷膏散千金同天麻草湯出大全良方上用天麻草切五升水一斗半煎取一斗隨寒溫分洗乳以殺癢也此草葉如麻葉冬生夏著花赤如鼠尾花亦洗浸淫黃爛熱瘡癢疽濕陰蝕瘡小兒頭瘡洗畢傅膏散千金同飛烏膏出大全良方上用燒硃砂作水銀上黑煙名棑彩者散兩熱令焦燥礬石三兩燒粉皆以絹篩了以甲煎如脂以敷乳瘡日三作散者不須和有汁自著可用散亦敷諸熱瘡及黃爛浸淫汁癢丈夫陰蝕癢溫瘡小兒頭瘡月蝕口邊肥瘡蝸瘡等並以此敷之千金同兵部手集療妒乳硬欲結膿令消及髮乳房初起微赤不急治之即殺人出肘後方上以鹿角於石上磨取白汁塗之干又塗不得近手並以人嗍卻黃水一日許即散一方燒灰酒調抹一方苦酒和塗一方出便産須知治妒乳便産須知云産婦乳汁不宜積蓄惡汁不出內為熱結腫痛煩渴手不可近成膿者名妒乳乃急於癰上用連翹湯利下惡熱毒一方出大全良方上用生地黃汁塗之熱即以口吮得汁吐去若不吮吐汁必蓄積決然作癰酸醋調塗亦可治妒乳出肘後方右用梁上塵醋和塗之亦治陰腫治女子妒乳腫上取蔓菁根生搗後和鹽醋醬水煮取汁洗之五六度瘥又搗和雞子白封之亦妙治妒乳及癰出本草以研米石捶煮令熱尉乳上取二捶更互用之以巾覆乳上令熱徹內數十遍取瘥為度也治婦人妒乳乳癰出本草取車脂熬令熱塗之亦和熱酒服治妒乳用榆木藥生服一兩頓佳
