在前近乳故也懷娠髮乳癰此卻無害此蓋氣血凝滯而成才産後便可愈又有産後髮乳癰者此乳道蓄積不去因氣逆而結成也宜常令擠乳汁令通便可愈也又有産後為小兒口中呵吹以致腫結而痛名曰吹奶宜速下其乳汁導其壅滯有輔奶又名石奶初結如桃核漸次浸長至如拳如碗堅硬如石數年不愈將來潰破則如開石榴之狀又反轉外皮名審花奶年四十以下間有可治者五十以上有此決死如未破以前不如不治以聽其終天年不可不知於其右手關上脈沉則為陰虛者則病乳癰久不瘥則變為漏男子以腎為重婦人以乳為重上下不同而性之根一也坐草以後風邪襲虛榮衛為之凝滯與夫嬰兒不能吮乳或乳為兒輩所吹飲而泄或斷乳之時捏出不盡皆令乳汁停蓄其間與血氣相搏始而腫痛繼而結硬至於手不能近前乳癰之患成矣乳癰一名妒乳惡寒發熱煩燥大渴是其證也甚則嘔吐無已咽膈窒礙何耶蓋胃屬足陽明經實通乎乳血熱入胃嘔吐何疑或者不能溫散妄以寒涼疏轉之劑行之即便癰毒自外入里嘔吐尤甚其咽膈妨礙者毒氣上衝所致也生薑甘桔湯最為咽間要藥乳粉托裡散最能返出毒氣一香散加栝蔞根止嘔止渴兩得其便也更以萬金醉膏佐之能事畢矣雖然渴而過飲水入腸胃必至下利醫理失節久而不瘥必成漏瘡又不可不防者也産後不自飲兒並失兒無飲乳乳蓄常結癰乳不飲兒令乳上腫者以雞子白和豆豉敷乳房令消結也若飲兒不泄者數捻去之亦可令大孩含水使口中為嗍取滯乳汁吐去之不含水漱去熱能令乳頭作瘡乳孔塞也産後宜勤去乳汁不宜蓄積不出惡汁內引於熱則結硬堅腫牽急疼痛或渴思飲其奶手近不得若成膿者名妒乳乃急於癰宜服連翹湯利下熱毒外以赤小豆末水調塗之便愈或數捏去乳汁或以小兒手摩動之或大人含水嗍之得汁吐之其汁狀如膿若産後不曾乳兒蓄積乳汁亦結成癰凡婦人乳癰發痛者亦生於風熱俗呼吹奶是也吹者風也風熱結於乳房經絡間血脈凝注久而不散潰腐為膿宜用益元散生薑湯調下冷服或新汲水時時呷勿輟晝夜可三五十次自解矣或煎解毒湯頓服之方治乳癰方出千金方麥門冬一升黃芩芍藥茯苓各二兩桑寄生人參黃耆防風甘草各二兩黏糖八兩大棗五枚上㕮咀以水一斗煮取三升去滓納糖一沸分作四服又方先服前件湯五日後服此丸即愈方出千金方天門冬五兩澤蘭五分大黃十分升麻六分羌活桑寄生防風人參黃耆乾地黃白芷通草黃芩枳實五味子茯神天雄芎藭當歸各一兩上為末蜜丸酒服二十丸加至四十丸麥門冬方治乳癰先用諸湯藥塗敷拓後服此麥門冬去心二兩木通人參五味子黃耆羌活去蘆頭防風去苗生乾地黃焙黃芩去黑心桑上寄生茯神去木天雄炮裂去皮臍升麻澤蘭各半兩枳殼去瓤麩炒大黃各三分當歸一分上搗羅為末煉蜜丸如梧桐子大每服空心溫酒下二十丸漸加至三十丸以瘥為度托裡散出衛生家寶方治乳癰極妙甘草一兩當歸一兩天蘿一個炒絲瓜是也栝蔞一個炒紫色皂角刺四十九個炒上件為細末每服二錢酒調下治奶結硬出朱氏集驗方凡未成瘡才覺腫硬作痛上以蔥白尉之其法用中樣小海味瓶口寬者以炭火入瓶內上以熱灰填滿平瓶口以蔥葉及蔥白捶損令覆瓶口以手帕子裹定致熱將瓶口以蔥向腫處任意輕輕尉之有驗芎藭丸出聖惠方治婦人乳癰穿穴膿水不住年月深遠蝕肉傷筋或時碎骨瘡中自出肉冷難生疼痛不可忍芎藭二兩當歸半兩桂心黃耆沉香安息香各一兩附子半兩去皮臍白芷麒麟竭丁香各半兩木香一兩枳殼羌活赤芍藥各半兩上為末煉蜜和搗三五百杵丸如梧桐子大每服空心午晚食前以甘草酒下二十丸排膿散出千金方治乳癰除惡肉蓯蓉微炙鐵精桂心去皮細辛去苗黃芩去黑心人參防己一作防風乾薑芎藭當歸各三分甘草五分上為末篩酒服方寸匕日三夜一服藥十日膿血出多勿怪葶藶散出聖惠方治婦人乳癰瘡腫焮熱疼痛宜用散毒氣甜葶藶一兩赤芍藥三分白芷一兩丁香三分黃耆一兩羊桃皮一兩硝石三分半夏一兩湯浸七次去滑白蘞一兩莽草半兩木香一兩木鱉子一兩去殼上為細散用酸漿水調和令勻攤於故帛上貼之麥門冬湯治乳癰初有異於常則先用此藥散化毒氣麥門冬去心二兩黃芩去黑心一兩桑寄生銼下兩半甘草炙令黃木通防風去叉赤茯苓去皮芍藥炒黃耆各一兩人參一兩半上粗搗篩每服三錢水一盞入乳糖一分棗三枚擘破同煎至七分去滓溫服日三早晨午時至晚各一一方無木通治乳癰黃耆白芷膏塗方黃耆白芷大黃當歸續斷各一兩薤白二兩切松脂二兩乳香半兩蠟一兩豬脂二個生地黃汁三合上取前五味銼碎以地黃汁拌勻先熬脂令沸下諸藥煎白芷赤黑色漉出下薤白松脂香蠟煎候熔盡以綿布絞去滓瓷盒內盛取塗敷乳上日三四度即瘥一方無乳香大黃散出聖惠方治婦人乳癰經年腫硬如石不消宜貼川大黃當歸微炒赤芍藥黃香芎藭防風去苗黃連去須莽草梔子仁以上各一兩膩粉一兩乳香半兩上為細散入粉和勻以雞子白並蜜調令勻塗帛上貼干即易當歸散出聖惠方治乳癰堅硬如石腫痛當歸芍藥人參枳殼去瓤麩炒一兩黃耆炒蒺藜子去角附子去皮臍雞骨各一兩薏苡仁半兩桂去粗皮一兩半上搗羅為散每服二錢以溫酒調下日三早晨午時至晚各一服一方用枳實地黃湯治乳癰生地黃汁一分合射干升麻黃連芒硝白蘞梔子大黃各半兩甘草當歸各一兩上九味碎銼以水五升煎至三升去滓下地黃汁更煎三五沸以故帛二片絞藥汁更互拓腫上一二十度再暖用即瘥治婦人乳腫不消出聖惠方川大黃莽草伏龍肝各三分上為