各三兩五味子三兩桂枝附子各半兩黃耆獨莖者一兩上為細末煉蜜杵丸如梧桐子大每服四五十丸空心酒下食前再服木瓜丸治腎經虛弱腰膝沉重腿腳腫癢疰破生瘡腳心隱痛筋脈拘攣或腰膝緩弱步履艱難舉動喘促面色黧黑大小便閉澀飲食減少無問久新並宜服之狗脊去毛六兩大艾去梗四兩糯米糊調成餅焙乾為末木瓜去瓤四兩天麻去蘆當歸酒浸製萆薢肉蓯蓉去蘆酒浸牛膝洗去土酒浸一宿各二兩上為細末煉蜜為丸如梧桐子大每服二十丸漸加至三十丸空心食前溫酒吞下鹽湯亦可羊骨補腎湯治腎虛寒耳鳴好睡日漸痿損一名羊腎湯羊脛骨五兩炙黃銼一方用羊腎磁石火煅醋淬二七遍白朮各二兩黃耆銼乾薑炮白茯苓去黑皮各一兩桂去粗皮三分上粗搗篩每服五錢水一盞半煎至一盞去滓分溫二服空心夜臥各一一方用羊脊骨一具椎碎不用脛骨人參補腎湯治腎虛寒及格寒煩熱腰背強直飲食減少氣力漸羸人參甘草炙銼桂去粗皮陳橘皮湯浸去白焙白茯苓去黑皮各半兩杜仲去粗皮酥炙銼白朮各二兩上粗搗篩每服五錢水三盞入豬羊腎各半兩生薑半分拍碎薤白一莖煎至一盞半去滓分二服空心日晚各一服乾地黃丸治腎氣不足羸瘦日劇吸吸少氣體重耳聾眼暗百病一名桂心丸桂心四兩乾地黃一斤澤瀉薯蕷茯苓各八兩牡丹皮六兩半夏一兩上為末蜜丸如梧桐子大酒服十丸日三五味子散治腎虛泄五味子二兩吳茱萸半兩細粒緑色者上炒香熱為度細末每服二錢陳米飲下頃年有一親疾每五更初欲曉時必溏痢一次如是數月有人云此名腎泄腎感陰氣而然得此方服而愈生地黃湯補腎氣虛弱生地黃二斤面一斤上同炒乾搗篩酒服方寸匕日三服地黃丸治腎虛久新憔悴寢汗發熱五臟齊損瘦弱虛煩骨蒸痿弱下血熟地黃八錢山茱萸乾山藥各四錢牡丹皮白茯苓澤瀉各三錢上為末煉蜜為丸如梧桐子大每服三十丸空心溫水下溫酒亦可三寸封髓丹出衛生寶鑑降心火益腎水滋陰養血潤補不燥天門冬去心熟地黃人參去蘆各半兩黃柏三兩甘草炙七錢半縮砂仁二兩半上為細末水糊和丸梧子大每服五十丸用蓯蓉半兩作片子酒浸一宿次日煎三五沸去滓送下前丸子空心服漏蘆丸出聖濟總録治腎虛冷補益元臟漏蘆去蘆頭生蓽茇生木香乾蠍頭毛足全者炒各半兩硇砂別研一分阿魏同醋麩和作餅子慢火炙合一分上為末煉蜜和丸如雞頭子大每服一丸煨蔥酒嚼下不拘時補腎丸出聖濟總録治臟虛攻注四肢煩熱多汗肢節痛耳內鳴羊腎一對去筋膜黃耆蜜炙銼麻黃根當歸切焙蜀椒去目並閉口炒出汗杏仁湯浸去皮尖雙仁炒各一兩上除羊腎外搗研為末煮羊腎爛細研酒煮麵糊和丸如梧桐子大每服二十丸鹽湯下空心午前各一服巴戟丸出如宜方補腎臟暖丹田興陽道減小便填精益髓駐顏潤肌治元氣虛憊面目黧黑口乾舌澀夢想虛驚眼中冷淚耳作蟬鳴腰胯沉重百節痠疼項筋緊急背髀勞倦陰汗盜汗四肢無力及婦人子宮久冷月脈不調或多或少赤白帶下並宜服良薑六兩紫金藤十六兩巴戟三兩青鹽二兩肉桂去粗皮吳茱萸各四兩上為末酒糊為丸每服二十丸暖鹽酒送下鹽湯亦得日午夜臥各一服四斤丸出醫方大成治腎經不足下攻腰腳腿膝腫癢不能屈伸腳弱少力不能踏地腳心隱痛行步喘乏筋脈拘攣腰膝不利凡風寒濕痹腳氣緩弱並宜服之宣州木瓜去瓤牛膝去蘆銼天麻去蘆細銼肉蓯蓉洗淨切各焙乾稱一斤以上四味如前修事用無灰酒五升浸春秋各五日夏三日冬十日足取出焙乾再入附子炮去皮臍龍骨塗酥炙各二兩上同為細末用浸前藥酒打麵糊為丸如梧桐子大每服三五十丸空心煎木瓜酒下或鹽湯吞下亦得此藥常服補虛除濕大壯筋骨養腎散出和劑方治腎氣虛損腰腳節節疼痛膝脛不能屈伸久病腳膝緩弱每服用一字空心豆淋酒下服訖麻痹少時須臾疾隨藥氣頓愈骨中痛嚼胡桃肉酒調下甚者三五服風寒濕悉皆治之全蠍半兩天麻三錢蒼朮制一兩附子炮去皮臍草烏頭生去皮臍各二兩上為末空心溫酒調下百一選方忠州陳太守原國暑取涼食瓜至秋忽右腰腿間疼痛連及膝脛曲折不經月右腳艱於舉動凡服治腰腳藥無效得此養腎散方一服移刻舉身麻痹不數日腳能屈伸即康寧又州令祭酒時年四十虛損兩腳不能行步進此藥二服迤邐可行三服能行盧祖常易簡方糾繆謂有子弟者忽兩足拳攣疼楚脈弦緊甚此證兩感寒多於風亦服此隨效惠倅李奉議亦嘗曰其家曾有婦人腰腳不能轉動用此即效皆風寒兩感也白朮散補腎氣虛白朮一斤肉桂半斤乾地黃澤瀉茯苓各四兩上為末米飲服方寸匕日三兩服佳四補丹何首烏泔浸春秋五日夏三日冬七日蒼朮去皮製度同上甘州枸杞酒浸一宿小茴香鹽炒令熱各等分上為細末酒打麵糊為丸如梧桐子大每服三十丸至四十丸空心好酒下青鹽丸出本事方治腎虛及足膝無力茴香三兩菟絲子末四兩乾山藥二兩青鹽一兩上將菟絲子洗淘無灰酒浸日中曬七日冬天近火煨之爆干別末將余藥末和勻酒糊丸如梧桐子大每服三五十丸鹽酒鹽湯下豫頃常服數年壯力健食有一婦人足嚲曳服此藥久之履地如故鹿角丸出三因方治腎虛傷冷冷氣入腎其痛如裂鹿茸屑一兩酥炙附子炮二兩桂心三分上為末酒糊丸如梧桐子大鹽酒下三五十丸空心服一方以局方四味理中丸每兩加澤瀉半錢鹽酒吞下治敗精腰疼神應丸治腎不足風冷乘之腰痛如折或引背痛俯仰不利轉側亦難或役用過度勞傷於腎或寢臥冷濕地氣傷腰或墮墜傷損並宜服之威靈仙去土二兩桂心當歸各一兩上為末以酒煮糊丸如梧桐子大每服三五十丸煎茴香湯或炒茴香酒下食前服婦人煎桂心湯下有孕婦人不得服一方添破故紙桃仁地膚子等分滋腎丸出衛生寶鑑治下焦陰虛腳膝軟無力陰汗陰痿足熱不能履地不渴小便閉者邪熱在血分也黃柏二兩酒洗焙知母二兩酒洗焙肉桂二錢內經云熱者寒之又云腎惡燥急食辛以潤之以黃柏之苦寒瀉熱補水潤燥故以為君以知母苦寒瀉腎火故以為佐肉桂辛熱乃寒因熱用也上為細末熱水為丸如雞頭大每服百丸至二百丸煎百沸湯下空心服頓兩足令藥易下行故也如小便利前陰中如刀刺痛有惡物下為效驗玉鎖丹出仁存方治腎經虛損心氣不足思慮太過真陽不固旋有遺瀝小便白濁如膏夢寐頻泄甚則身體拘倦骨節痠痛飲食不進面色黧黑容枯肌瘦唇口乾燥虛煩盜汗舉動力乏茯苓去皮四兩龍骨二兩五倍子十六兩上為末水糊為丸每服四十粒空心用鹽湯吞下日進三服此藥性溫不熱極有神效茯菟丸出和劑方治腎經虛損心氣不足思慮太過真陽不固溺有餘瀝小便白濁夢寐頻泄菟絲子五兩白茯苓三兩石蓮子去殼二兩上為細末酒煮糊為丸如梧桐子大每服三十丸空心鹽湯下常服鎮益心神補虛養血清小便吳茱萸丸出仁存方治腎氣自腹中起上築於咽喉逆氣連屬而不能出或至數十聲不得喘息此由寒傷胃脘腎氣先虛逆氣上乘於胃與氣相搏厄不止者難治經謂之噦故受病深者其聲噦是也吳茱萸醋炒橘皮洗淨大附子炮裂去皮臍各一兩上為細末白麵糊為丸如梧桐子大每服七十丸至八十丸食前溫生薑湯送下一方米飲下不止者灸期門關元腎腧鹿茸丸出本事方治腎虛腰痛以鹿茸不拘多少切作片子酥炙黃為末酒糊為丸如梧桐子大空心食前鹽湯下三五十丸小安腎丸出仁存方治腎氣虛乏下元冷憊夜多溲溺肢體倦怠漸覺羸瘦腰膝沉重嗜臥少力精神昏憒耳作蟬鳴面無顏色泄瀉腸鳴眼目昏暗牙齒蛀痛並皆治之香附子川烏川楝子以上各一斤用鹽四兩水四升同煮候乾制焙熟地黃八兩茴香十二兩川椒去目及閉口者微炒出汗四兩上為細末酒糊為丸如梧桐子大每服二十丸至三十丸空心臨臥鹽酒或鹽湯任下常服補虛損下元冷憊茯苓丸出永類鈐方治心腎俱虛神志不守小便淋瀝不禁磁石散療腎氣不足心中悒悒而亂目視䀮䀮心懸少氣陽氣不足耳聾目前如星火消疳痔一身悉癢骨中痛小腹拘急乏氣咽乾如膠顏色黑補腎磁石二兩研綿裹生薑二兩防風二兩桂心二兩甘草一兩炙五味子二兩附子一兩炮玄參二兩牡丹皮三兩大豆二十四枚上切以水一斗二升先於銅器中揚三百遍煮藥取六升去滓更煎取二升八合分為三服忌海藻菘菜豬肉冷水生蔥等補腎湯療腎氣不足芒硝二兩礬石二兩熬汁盡大豆上以水三升煮取一升二合去滓分再服當快下返精丸出朱氏集驗方定心養血補腎此方得之異人破故紙一兩隔紙炒令香熟白茯苓一兩去皮上為細末用沒藥半兩捶破用無灰酒煮浸藥高一指許候如稠餳狀搜成前二味為丸如梧桐子大每服三十粒隨食湯下酒糊丸亦可食前服附子丸出雞峰方治腎臟衰弱手足多冷二陽丹出雞峰方治腎虛生寒腰脊疼痛附子二兩先炮去皮臍為末酒一升半同羊肉爛煮如糜沙碗內研為膏酒炒加服羊肉四兩肉桂乾薑硫黃陽起石鹿茸白朮各一兩上以附子膏和丸如梧桐子大硃砂為衣每服三五十丸空心鹽湯下菟絲子丸補腎虛菟絲子山藥各四兩牛膝附子萆薢鹿茸各二兩巴戟茴香各一兩上件搗羅為細末以酒煮麵糊為丸如梧桐子大每服空心溫酒或鹽湯下五十丸破故紙丸治腎氣虛寒小便無度破故紙酒浸十兩蒸炒茴香鹽炒上等分為末酒糊為丸每服五十丸空心鹽酒下一方為末用豬腰子批開入藥紙裹水濕煨熟細嚼酒下沉香散治腎臟益元氣養精神常服萆薢續斷各半兩木香芎藭當歸茯苓甘草石斛牛膝枳殼只用青細辛防風各一兩上細杵羅為末每服二錢水一盞煎取八分空心和滓吃固真丹治腎與膀胱虛冷真氣不回小便滑數舶上茴香炒補骨脂炒益智子炒鹿角霜各一兩韭子二兩白龍骨一兩火煅別研如粉上為末以青鹽鹿角膠各半兩同煮酒糊為丸如梧桐子大每服五十丸溫酒鹽湯下北庭丸凡夢鬼交者蓋由腎氣虛為客邪所乘入於臟則喜夢腎既虛不能制於精因夢感而動泄久不止則令人枯瘁不澤少力北庭半兩飛過煎成霜附子一兩研為末上件二味以生薯蕷於砂盆內研調前藥為丸如桐子大仍用禹餘糧鹽等分入瓶內固濟煅通赤放冷研細以末一錢湯點下十五丸空心服之雙補丸治腎虛永涸燥渴勞倦鹿角膠二兩沉香半兩澤瀉截塊再蒸半兩覆盆子人參白茯苓宣木瓜薏苡仁炒黃耆炙熟地黃洗再蒸蓯蓉酒浸焙菟絲子酒浸蒸研北五味子石斛炒當歸酒浸焙各一兩麝香一錢上末煉蜜丸桐子大硃砂衣每五十丸空心棗湯下加味四斤丸出鮑氏方治腎肝臟虛熱淫於內筋骨痿弱起居須人足不任地驚悸潮熱飲食不生血氣蓯蓉牛膝天麻木瓜鹿茸當歸身熟地黃菟絲子五味子並酒浸各等分上為末蜜丸每五十丸酒飲任下食前王瓜散出衛生寶鑑治小便自利如泔色此腎虛也王瓜根一兩白石脂二兩菟絲子酒浸二兩桂心一兩牡蠣鹽泥裹燒末候冷去泥上為末每服二錢煎大麥粥湯調下日三服食前治腎虛腰痛出如宜方用桃仁去皮尖麵炒為末熱酒下得汗愈又制杜仲末空心酒下又炒黑牽牛取頭末入面作常食麵加花椒煮食之小便數者宜萆薢杜仲枸杞根等分㕮咀好酒漬納甕中密封入銅器中煮一日服取醉為度腰腳冷宜甕中煎酒水漬過膝上青娥丸出如宜方治腎虛腰疼筋骨少力故紙八兩炒胡桃肉去膜爛研四兩為末煉蜜丸如梧桐子大每服三四十丸食前鹽湯酒下一方加制杜仲二兩黑錫丹出如宜方治元臟久冷上盛下虛腰膝冷痛沉香葫蘆巴附子制陽起石肉桂破故紙炒茴香炒肉豆蔻制金鈴子木香各一兩錫硫砂子四兩為末炒桃仁酒下四神丸出如宜方治老人脾腎久虛夜作氣泄無度破故紙炒四兩肉豆蔻制二兩木香一兩附子炮一兩半上為末煮棗肉為丸如梧桐子大每五十丸薑湯下益智五味丸出如宜方治肝腎俱虛精氣耗散益智仁肉蓯蓉巴戟去心人參五味子骨碎補茴香覆盆子龍骨熟地黃菟絲子制等分上為末酒糊為丸如梧桐子大每服五十丸空心米湯下益腎出本草以牛膝蓯蓉酒浸服
