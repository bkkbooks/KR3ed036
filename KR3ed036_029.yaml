body:
  text: 卷二十九腎臟門總論夫腎主精腎者生來精靈之本也為後宮內官則為女主所以天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精精者腎之藏也耳者腎之官腎氣通於耳耳和則能聞五音矣腎在竅為耳然則腎氣上通於耳下通於陰也左腎壬右腎癸循環玄宮上出耳門候聞四遠下回玉海俠脊左右與臍相當經於上焦榮於中焦衛於下焦外主骨內主膀胱腎重一斤一兩有兩枚神名漂漂主藏精號為精藏隨節應會故云腎藏精精舍志在氣為欠在液為唾腎氣虛則厥逆實則脹滿四肢正黑虛則使人夢見舟船溺人得其時夢伏水中若有畏怖腎氣盛則夢腰脊兩解不相屬厥氣客於腎則夢臨淵沒居水中凡腎臟象水與膀胱合為腑其經足少陰與太陽為表裡其脈沉相於秋王於冬冬時萬物之所藏百蟲伏蟄陽氣下陷陰氣上升陽氣中出陰氣冽為霜遂不上升化為霜雪猛獸伏蟄蜾蟲匿藏其脈為沉沉為陰在裡不可發汗發汗則如蜾蟲出見其霜雪陰氣在表陽氣在臟慎不可下下之者傷脾脾土弱即水氣妄行下之者如魚出水蛾入湯重客在裡慎不可熏熏之逆客其息則喘無持客熱令口爛瘡陰脈且解血散不通正陽遂厥陰不往從客熱狂入內為結胸脾氣遂弱清溲痢通冬脈如營冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病何如而反其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如病飢䏚中清脊中痛小腹滿小便變赤黃腎脈來喘喘纍纍如鉤按之而堅曰平冬以胃氣為本腎脈來如引葛按之益堅曰腎病腎脈來發如奪索辟辟如彈石曰腎死真腎脈至搏而絶如以指彈石辟辟然色黃黑不澤毛折乃死冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病凡人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也腎藏精精舍志盛怒不止則傷志志傷則善忘其前言腰脊痛不可以俯仰屈伸毛悴色夭死於季夏足少陰氣絶則骨枯少陰者冬脈也伏行而濡滑骨髓者也故骨不濡則肉不能著骨也骨肉不相親即肉濡而卻肉濡而卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也腎死藏浮之堅按之亂如轉丸益下入尺中者死冬腎水王其脈沉濡而滑曰平反得微澀而短者是肺之乘腎母之婦子為虛邪雖病易治反得弦細而長者是肝之乘腎子之乘母為實邪雖病自愈反得大而緩者是脾之乘腎土之剋水為賊邪大逆十死不治反得浮大而洪者是心之乘腎火之陵水為微邪雖病即瘥左手關後尺中陰絶者無腎脈也若足下熱兩髀裡急精氣竭少勞倦所致刺足太陽治陽左手關後尺中陰實者腎實也苦恍惚健忘目視䀮䀮耳聾悵悵善鳴刺足少陰治陰右手關後尺中陰絶者無腎脈也若足逆冷上搶胸痛夢入水見鬼善魘寐黑色物來掩人上刺足太陽治陽右手關後尺中陰實者腎實也若骨疼腰脊痛內寒熱刺足少陰治陰腎脈沉細而緊再至曰平三至曰離經病四至脫精五至死六至命盡足少陰脈也腎脈急甚為骨痿癲疾微急為奔豚沉厥足不收不得前後緩甚為折脊微緩為洞下洞下者食不化入咽還出大甚為陰痿微大為石水起臍下以至小腹腫垂垂然上至胃管死不治小甚為洞泄微小為消痹滑甚為癃㿗微滑為骨痿坐不能起目無所見視見黑花澀甚為大癰微澀為不月水沉痔腎脈搏堅而長其色黃而赤當病折腰其軟而散者當病少血黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥扁鵲曰腎有病則耳聾腎在竅為耳然則腎氣上通於耳五臟不和則九竅不通陰陽俱盛不得相營故曰關格關格者不得盡期而死也腎在聲為呻在變動為栗在志為恐恐傷腎精氣並於腎則恐藏主冬病在藏者取之井病先發於腎小腹腰脊痛脛酸一日之膀胱背膂筋痛小便閉二日上之心心痛三日之小腸脹四日不已死冬大晨夏晏晡病在腎夜半慧日乘四季甚下晡靜假令腎病中央若食牛肉及諸土中物得之不者當以長夏時發得病以戊己巳日也凡腎病之狀必腹大脛腫痛喘咳身重寢汗出憎風虛即胸中痛大腹小腹痛清厥意不樂取其經足少陰太陽血者腎脈沉之而大堅浮之而大緊苦手足骨腫厥而陰不興腰脊痛小腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房內及勞倦發之腎病其色黑其氣虛弱呼吸少氣兩耳苦聾腰痛時時失精飲食減少膝以下清其脈沉滑而遲少為可治宜服內補散建中湯腎氣丸地黃煎春當刺湧泉秋刺伏留冬刺陰谷皆補之夏刺然谷季夏刺太溪皆瀉之又當灸京門五十壯背第十四椎百壯腎水者其人腹大臍腫腰痛不得溺陰下濕如牛鼻頭汗其足逆寒大便反堅一云面反瘦腎積脈沉而急苦脊與腰相引痛飢則見飽則減少腹裡急口乾咽腫傷爛目䀮䀮骨中寒主髓厥善忘色黑也腎病手足逆冷面赤目黃小便不禁骨節煩疼小腹結痛氣衝於心其脈當沉細而滑今反浮大而緩其色當黑而反黃此是土剋水也為大逆十死不治羽音人者主腎聲也腎聲呻其音瑟其志恐其經足少陰厥逆太陽則榮衛不通陰陽翻祚陽氣內伏陰氣外升升則寒寒則虛虛則厲風所傷語音謇吃不轉偏枯腳偏跛蹇若在左則左腎傷在右則右腎傷其偏枯風體從鼻而分半邊至腳緩弱不遂口亦敧語聲混濁便利仰人耳偏聾塞腰背相引甚則不可治腎瀝湯主之又呻而如恚恚而善忘恍惚有所思此為土剋水陽擊陰陰氣伏而陽氣起起則熱熱則實實則怒怒則忘耳聽無聞四肢滿急小便赤黃言音口動而不出笑而看人此為邪熱傷腎甚則不可治若面黑黃耳不應亦不可治黑為腎腎合骨黑如烏羽者吉腎主耳耳是腎之餘其人水形相比於上羽黑色大頭曲面廉頤小肩大腹小手足發行搖身下尻長背延延也不敬畏善欺殆人戮死耐秋冬不耐春夏春夏感而生病主足少陰汗汗然耳大小高下厚薄偏圓則腎應之正黑色小理者則腎小小即臟安難傷粗理者則腎大大則虛虛則腎寒耳聾或鳴汗出腰痛不得俯仰易傷以邪耳高者則腎高高則實實則腎熱背急綴痛耳膿血出或生肉塞耳若耳後陷者則腎下下則腰尻痛不可以俯仰為狐疝耳堅者則腎堅堅則腎不受病不病腰痛耳薄者則腎脆脆則傷熱熱則耳吼鬧善病消痹耳好前居牙車者則腎端正端正則和利難傷耳偏高者則腎偏敧偏敧則善腰尻偏痛凡人分部骨陷者必死不免俠膀胱並太陽為腎之部骨當其處陷也而臟氣通於內外部亦隨而應之沉濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷內病前治陰後治陽外病前治陽後治陰陽主外陰主內凡人生死休否則臟神前變形於外人腎前病耳則為之焦枯若腎前死耳則為之黯黑焦癖若天中等分墓色應之必死不治看應增損斟酌賖促賖不出四百日內促則旬月之間腎病少愈而卒死何以知之曰黃黑色黶點如拇指應耳此必卒死腎絶四日死何以知之齒為暴黑面為正黑目中黃腰中欲折自汗出如流面黑目青一作白腎氣內傷病因留積八日當亡是死變也面黃目黑不死黑如炲死吉凶之色天中等分左右髮色不正此是陰陽官位相法若不遭官事而應死也其人面目帶黃黑連耳左右年四十以上百日死若偏在一邊最凶必死兩邊有年上無三年之內禍必至矣冬水腎脈色黑主足少陰脈也少陰何以主腎曰腎者主陰陰水也皆生於腎此脈名曰太衝凡五十七穴冬取其井榮冬者水始治腎方閉陽氣衰少陰風堅盛太陽氣伏沉陽脈乃去故取井以下陰氣逆取榮以通陽氣其脈本在內踝下二寸應舌下兩脈其脈根於湧泉湧泉在腳心下大拇指筋是其足少陰之別名曰太鍾當踝後繞跟別走太陽其別者並經上走於心包下貫腰脊主腎生病病實則膀胱熱熱則閉癃癃則陽病陽脈反逆大於寸口再倍其病則口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛灸則強食而生災緩帶被髮大杖重履而步虛則膀胱寒寒則腰痛痛則陰脈反小於寸口其病則飢而不欲食面黑如炭色咳唾則有血喉鳴而喘坐而欲起目䀮䀮無所見心懸若病飢狀氣不足則善恐心惕惕若人將捕之是為骨厥冬三月者主腎膀胱黑骨溫病也其源從太陽少陰相搏蘊積三焦上下壅塞陰毒內行臟腑受客邪之氣則病生矣其病相反若腑虛則為陰毒所傷裡熱外寒意欲守火而引飲或腰中痛欲折若臟實則為陽溫所損胸脅切痛類如刀刺不得動轉熱彭彭若服冷藥過差而便洞瀉故曰黑骨溫病也扁鵲曰灸脾肝腎三輸主治丹金毒黑溫之病當依源為理調臟理腑清濁之病不生也腎實附論腎實熱者左手尺中神門以後脈陰實者足少陰經也腎藏精實則陽氣盛陽氣盛則生熱病苦痹身熱舌燥咽腫心煩痛嗌乾胸脅時痛喘咳汗出小腹脹滿腰背強急體重骨熱小便赤黃好怒好忘足下熱疼足脛滿痛四肢黑耳聾診其脈浮緊者腎實熱也脈經云腎實熱者病苦膀胱脹閉小腹與腰脊相引痛也腎膀胱俱實者左手尺中神門以後脈陰陽俱實也病苦脊強反折戴眼氣上搶心脊痛不能自反側癲疾頭重與目相引痛厥欲走反眼大風多汗名曰腎膀胱俱實也方瀉腎赤茯苓散出聖惠方治腎臟實熱腹脅不利心膈煩滿腰背拘急足下熱痛赤茯苓二兩丹參牡丹皮生乾地黃豬苓去黑皮子芩澤瀉五加皮牛膝去苗各三分甘草半兩炙微赤銼檳榔羚羊角屑枳殼麩炒微黃去白瓤各一兩上為散每服四錢水一鍾煎至六分去滓食前溫服大澤瀉湯千金方治腎臟實熱多怒善忘耳聽不聰四肢滿急腰背強直澤瀉銼柴胡去苗茯神去木黃芩去黑心升麻芒硝研杏仁湯浸去皮尖雙仁炒各三兩磁石碎四兩羚羊角鎊一兩大青去土淡竹葉切各二兩生乾地黃焙五兩上為散每服五錢水二盞煎至一盞去滓溫服不拘時候仙靈脾丸聖濟總録治腎臟壅盛上攻頭目胸膈咽嗌痰實不利仙靈脾威靈仙去土赤茯苓去黑皮茯神去木天麻蔓荊實香白芷山梔子仁大黃銼炒益智去皮各一兩麝香研半兩烏頭炮裂去皮臍四枚上為末煉蜜和搗千下丸如梧桐子大空心溫酒下三丸至五丸瀉腎生乾地黃散聖惠方治腎臟實熱心胸煩悶腹脅脹滿腰脊強急四肢不利生乾地黃麥門冬去心各一兩丹參赤茯苓檳榔羚羊角屑五加皮枳殼麩炒微黃去瓤牛膝去苗前胡去蘆頭黃芩各一兩甘草半兩炙微赤銼上為散每服四錢水一中盞淡竹葉二十片煎至六分去滓食前溫服榆皮散聖惠方治腎臟實熱膀胱氣滯小便黃赤澀痛不通榆白皮銼葵根銼澤瀉木通銼瞿麥赤茯苓桑螵蛸微炒甘草炙微赤銼石葦去毛各三分川芒硝二兩當歸半兩銼微炒子芩一兩上為散每服三錢水一中盞入生薑半分煎至六分去滓食前溫服大黃湯聖惠方治腎臟實熱小腹䐜脹足下熱痛耳聾腰解夢伏水中瀉腎大黃二兩銼蜜水半盞浸一宿焙赤茯苓去黑皮黃芩去黑心澤瀉菖蒲甘草銼玄參五加皮銼羚羊角鎊各一兩磁石火煅醋淬三七遍生乾地黃切焙各二兩上粗搗篩每服三錢水一盞煎至七分去滓不拘時候溫服瀉腎玄參散治腎臟實熱好忘耳聽無聲四肢滿急腰背動轉強痛玄參赤茯苓黃芩澤瀉川升麻川芒硝羚羊角屑赤芍藥杏仁湯浸去皮尖雙仁麩炒微黃各一兩甘草半兩炙微赤銼磁石二兩搗碎水淘去赤汁上為散每服半兩水一大盞半入生地