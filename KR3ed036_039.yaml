body:
  text: 卷三十九大腸腑門大小便不通附論夫脾胃大小腸膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也蓋營受水穀之真精營衛之根源大小腸膀胱得以變化皆營為之本是以小腸為受盛之官水穀初未分也及其化物歸於膀胱而為溺傳於大腸而為糟粕必曰氣化則能出矣或陰陽之氣不平寒熱相勝或氣實塞而不通或氣虛損而為遺泄或燥而結或熱而秘皆陰陽不和之病也治此者不概以寒熱為法寒劑盪滌熱劑枯燥反傷和氣耗其津液若關格不通三焦約病專以營衛之否塞乳後便難與夫老者秘澀之病又以津液不足止可滑以利之潤以滋之苟蕩以快劑則糟粕不通真氣受弊不可不知也關格大便不通謂之內關小便不通謂之外格二便俱不通為關格也由陰陽氣不和營衛不通故也陰氣大盛陽氣不得營之曰內關陽氣大盛陰氣不得營之曰外格陰陽俱盛不得相營曰關格關格則陰陽之氣痞結腹內脹滿氣不行於大小腸故關格而大小便不通也又風邪在三焦三焦約者則小腸痛內閉大小便不通曰不得前後而手足寒者為三陰俱逆三日死也診其脈來浮牢且滑直者不得大小便也大小便難者由冷熱不調大小腸有遊氣遊氣在於腸間搏於糟粕小便不得通流故大小便難也診其尺脈滑而浮大此為陽干於陰其人苦小腹痛滿不能尿尿即陰中痛大便亦然也方茱萸湯出千金方治腹脅脹滿關格大小便不通吳茱萸湯浸洗去涎曝乾微炒大黃銼炒當歸切焙桂去粗皮赤芍藥甘草炙銼芎藭各二兩人參細辛去苗葉各四兩桃白皮去粗皮一握乾薑一兩炮雄黃三分真珠末半兩與雄黃同研上將十一味㕮咀每服三錢水一盞煎七分去滓下雄黃真珠末一字酒半盞更煎三沸空心服之一方作煉蜜丸梧桐子大每服三十丸生薑橘皮湯下無雄黃木香散治下焦熱大小便不通氣脹滿悶木香黃芩去黑心木通銼炒陳橘皮湯浸去白焙各三分冬葵子研瞿麥穗各一兩檳榔赤茯苓去黑皮茅根各半兩上㕮咀每服五錢水一中盞半煎八分去滓溫服治大小便難腹肚脹滿短氣荊芥芎藭蒲黃當歸銼炒桂心各一兩䗪蟲三十枚炒川大黃二兩銼炒甘草半兩炙銼桃仁四十枚湯浸去皮尖雙仁麩炒上為末煉蜜丸梧桐子大每服三十丸生薑蔥白湯下不拘時茯苓丸治大小便不通赤茯苓去黑皮芍藥當歸切焙枳殼去瓤麩炒白朮人參各五兩火麻仁大黃銼各三兩上為末煉蜜丸梧桐子大每服十五丸至二十丸空心煎茅根湯下大黃湯治中焦熱實閉塞關格不通吐逆喘急大黃銼炒前胡去蘆頭半夏湯浸七次炒人參黃芩去黑心赤茯苓去黑皮木香檳榔銼各半兩上㕮咀每服五錢水一盞半生薑五片煎八分去滓溫服赤芍藥丸治大小便難臍腹妨悶赤芍藥桂心羌活各半兩川大黃銼炒郁李仁湯浸去皮炒川芒硝檳榔各一兩火麻仁二兩上為末煉蜜為丸梧桐子大每服三十丸空心服溫水下芍藥湯一名大黃散治大小便不通心腹滿悶不可忍赤芍藥桑根白皮銼各三兩瞿麥穗大黃銼炒榆白皮銼防風去蘆麻子仁研如膏各二兩上㕮咀每服五錢水一盞半煎一盞去滓入芒硝末五分更煎二沸空心溫服日晚再服牽牛子丸治下焦結熱腸胃燥澀大小便不通黑牽牛淘洗令淨炒令氣透便取出攤令冷取末三兩青橘皮焙連白用桑根白皮銼炒芍藥焙各一兩栝蔞根一兩木通銼一兩陳橘皮焙和白用一兩上為末煉蜜杵和丸梧桐子大每服十丸加至二十丸茶酒任下白朮散治大小便難腹脅脹滿氣急白朮牽牛子炒木通銼川大黃銼炒檳榔川朴硝各一兩陳橘皮半兩去白焙上㕮咀每服四錢水一盞煎至六分去滓空心溫服滑石湯治大小便俱不通滑石一兩半茅根車前子各三分天門冬去心焙冬瓜瓤莨菪子浮去浮者煮令芽出曝乾微炒各一兩上㕮咀每服五錢水一盞半煎至一盞去滓食前溫服日三治大小便氣壅不利脹滿關格不通木通銼川朴硝郁李仁湯浸去皮炒車前子各一兩黃芩瞿麥穗各半兩上㕮咀每服四錢水一盞煎至六分去滓溫服大黃散治關格不通煩悶大小便秘澀大黃銼二兩桂去粗皮三分冬瓜子炒一兩滑石研三兩朴硝生鐵銚子炒乾刮下紙裹於黃土內窨一宿取出細研三兩半上先研前三味為散更與滑石朴硝同研勻細每服二錢濃煎白茅根湯空心調服至晚再服黃芩湯治大小便不通黃芩去黑心二兩赤芍藥白茅根大黃生用各三兩瞿麥穗一兩半上㕮咀每服五錢水一盞半煎一盞去滓入朴硝末半錢更煎二沸空心溫服甘遂散治氣痞心腹脹喘促大小便不利甘遂煨牽牛子炒續隨子去殼葶藶子大戟各等分上為末每服半錢濃煎燈心湯空心調服利下水為度治大小便不通大黃煨牛蒡子炒羌活獨活滑石各等分上為末用熟水調下空心服即便利五宣散治大小便不通行滯氣瞿麥木通甘草虎杖滑石各等分上㕮咀每服二錢水一盞燈心數莖煎七分臨臥溫服車前子湯治大小便俱不通車前子五兩生用木通四兩銼黃芩去黑心郁李仁湯浸去皮尖雙仁各三兩上將前三味搗篩與郁李仁拌勻每服五錢水一盞半煎一盞去滓入朴硝末五分更煎二沸食前溫服日三榆白皮湯治大小便俱不通榆白皮甘草炙銼各二兩半滑石三兩桂去粗皮一兩上㕮咀每服四錢水一盞半煎一盞去滓食前服日三木通湯治大小便不通木通銼二兩大黃銼生用滑石各三兩麻子仁一合研如膏上㕮咀與麻子仁拌勻每服五錢水一盞半煎一盞去滓入芒硝末半錢更煎二沸空心服之治大小便不通腹脅堅脹蒸下部方蓮葉二兩蔥三七莖並用須去葉切皂角一挺炙銼生薑一兩切上以漿水一斗二升煮十餘沸並滓分兩度用旋旋盛入小口瓷缸中坐缸口上熏蒸冷即易之未通即傾藥於桶斛中添熱水坐蘸下部即通大黃散出肘後方治風冷氣入小腸忽痛堅急如吹狀大小便不通或小腸有氣結如升大脹起名為關格大小便不通川大黃銼炒苦參銼貝齒燒灰滑石各一兩上為末每服二錢葵根湯下不計時漿水調下一方無大黃飲下掩臍方一名蔥豆湯出危氏方治大小便不通連根蔥二三莖生薑一塊帶土者淡豆豉一十一粒鹽二匙上同研爛捏作餅子烘熱掩臍中以帛扎定良久氣透自通不然再換一劑一方搗碎為末米湯下治諸大小便不通海金沙芒硝朴硝麝香各等分上為末白湯調服大便不通者加巴豆一枚黃連散治大小便秘澀壅熱黃連川大黃各二兩好醋炒黃芩甘草各一兩炙上為末每服二錢食後溫水調下芒硝湯出千金方治關格不通脬腹妨悶大小便不通芒硝研二兩半冬葵子炒三合滑石碎三兩上㕮咀每服五錢水一盞半煎至一盞去滓入芒硝末半錢更煎二沸空心溫服一方無滑石芫花丸治大小便不利芫花炒滑石碎各半兩大黃銼炒三分上為末煉蜜丸梧桐子大每服二十丸蔥湯下治大小便不通滑石二兩葵子榆白皮各一兩上為散煮麻子汁一升半取五合分二服即通治大小便不通乾薑鹽杏仁上等分搗導之治大小便關格不通腹腸喘急立效出聖惠方水銀膩粉滑石各一兩上為末研令水銀星盡每服一錢蔥白湯調下治大小便秘結出經驗良方水銀一塊豆大研細巴豆二粒去殼膜硫黃三塊如豆大上研為膏作一劑塗於臍內良久才通即便去藥治大小便難腹中有燥糞寒熱煩迫短氣汗出腹脹方見濡臟湯治大小便難出聖惠方木香青黛各半兩麻油二合上水一大盞同煎令水盡惟有油去滓分二服冬葵根汁方治大小便不通生冬葵根淨洗二斤搗絞取汁三合生薑四兩搗絞取汁一合上攪勻分作兩服空心一服有頃再服盡即通一方不用生薑治大小便關格不通出聖惠方胡椒二十顆搗研川朴硝半兩上水一大盞煎胡椒至六分去滓入硝更煎一兩沸候溫服又方出聖惠方膩粉一錢生麻油一合上相和空心服之治大小便關格不通肚脹氣逆心煩悶絕出聖惠方蜀葵花一兩搗爛麝香半錢研上水一大盞煎至五分去滓服之如無花即取根擘破用之推車散出本事方治大小便秘經月欲死者推車蟲七個土狗七個如男子病推車蟲用頭土狗用身如女子病土狗用頭推車蟲用身上用新瓦上焙乾為末用虎目樹皮向南者濃煎汁調只一服愈治卒關格大小便不通支滿欲死二三日則殺人出肘後方苦酒硝等分上和塗臍上干則易之又方出肘後方甘遂二銖貝齒二枚上搗下以三合漿水盡服之須臾即通紫金沙散治大小便不通用紫金沙不拘多少蜂房蒂七枚搗為末每服一錢溫酒調下土馬鬃湯治大小便不通上用土馬鬃不拘多少以水淘淨用新磚煅過為粗末每服二錢水一盞煎至七分去滓溫服豬脂酒方出千金方治大小便不通用豬脂如半雞子大碎切以酒一升微煮沸投豬脂更煎一二沸分為兩度食前溫服未通再服一方用水煮三沸服汁發灰散出肘後方治大小便不通及便血用亂髮一兩洗淨燒灰為末細研每服三錢溫水調食前服日三以通利為度冬葵子湯治大小便不通用冬葵子微炒一兩搗篩用水二盞煎一盞去滓入人乳半合和勻空心服之治卒大小便不通出家藏經驗方用鹽以紙裹燒投水中服之一方以鹽實臍內即通又以和苦酒敷臍又水三升煮鹽三合使沸適寒溫竹筒灌下部又方用含硝石吐出水治大小便關格閉塞出聖惠方用蔓荊子油一合空心服之即通通後汗出勿怪治大小便關格不通肚脹氣築心悶絕出聖惠方用烏柏樹東面白皮陰乾為末如五七日不通熱水調下二錢如急用火上焙乾為妙鐵腳丸一名皂莢飲出聖惠方治大小便關格不通經三五日者用不蛀皂角燒灰研細粥飲調下三錢立通一方用皂角炙去皮子為末酒糊或煉蜜丸梧桐子大每服三十丸酒下溫水赤得一方皂角燒置於桶內熏其後下部即通治大小便不通出千金方用葵子末一升青竹葉一把水二升煮五沸頓服又方出千金方用榆白皮切一升葵子一升水五升煎取二升分三服又方出千金方用甑帶煮取汁和蒲黃方寸匕日三服治大人小兒大小便不利腹大且堅出經驗良方用故衣多垢者切一升水三升煮取一升分三服治老人虛大小便不通出經驗良方一名琥珀散用真琥珀研如粉人參湯調下亦治心痛老人虛大便不通蔥白三寸水煎蔥熟不用入阿膠一片於蔥湯內溶開溫服吳內翰母曾服得效治關格大小便不通脹滿欲死二三日則殺人出肘後方用芒硝二兩紙裹三四重炭火燒之令內一升湯中浸服當先飲湯一升已吐出乃服之治卒關格大小便不通支滿欲死及旬日一月不得大便出千金方用葵子二升水四升煮一升服內豬脂如雞子大一丸彌佳貼臍膏用甘遂為細末以生面調為糊攤紙上摻末在上塗臍中及塗臍下硬處別煎甘草水溫涼隨意服之以通為度甘遂散出危氏方治大小便不通及腹滿氣急用甘遂二兩赤皮者為末煉蜜二合和勻每一兩重分作四服日進一服蜜水下第二日二服漸加之一方用二分為散分五服熟水下如覺心下煩得微利日一服治大小便不通用羊屎燒熏鼻又治中惡心腹刺痛又方用搗蔥白以醋和封小腹上又方用茱萸南枝斷取如手第二指中節含之立下又方用雄鼠糞兩頭尖者敷臍中立效又方用莧實末半兩分二服新汲水調下又方用白礬細研末令患人仰臥置礬末於臍中滿用汲水滴之候覺冷透腹內即自然通若曾灸即於元灸盤上用紙作環子籠灸盤高一指半已來著礬末在內仍依前法用水滴之木香丸治重傷大小便不利腹痛蒼朮一兩巴豆十粒京三稜半兩炒上為末白麵糊丸綠豆大每服五七丸食後薑