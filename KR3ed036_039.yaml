出聖惠方川大黃銼炒郁李仁湯浸去皮炒各二兩吳茱萸半兩湯浸七次焙乾炒朴硝二兩半上為末每服三錢食前蜜水調下以利為度治大便卒不通氣上奔心膈出聖惠方皂莢去黑皮塗酥炙去子五靈脂各一兩巴豆霜一分阿魏半兩麩裹煨上為末煉蜜丸綠豆大每服五丸生薑湯下未效再服牽牛子丸治臟腑壅滯心腹氣悶宿食不消腰脅疼痛大腸秘澀牽牛子十兩搗取末六兩木香青橘皮湯浸去白焙檳榔各半兩上為末與牽牛子末和勻煉蜜杵丸梧桐子大每服二十丸食前溫酒下一方醋糊為丸米飲下薑湯亦可治大便難出千金方醬清三升麻油二升蔥白三寸上合煮令黑去滓待冷頓服一方不用醬清威靈仙丸出危氏方治年高氣衰津液枯燥大便秘結黃耆蜜炙枳實威靈仙各等分上為末蜜丸梧桐子大每服五七十丸薑湯熟水下一方用防風黃耆忌茶摩臍方治大便不通腹脹杏仁湯浸去白皮尖雙仁三七枚生用蔥白三莖去須葉切鹽一分上研如膏每次取如酸棗大許塗手心摩臍上三百轉須臾即利如利不止以冷水洗手即定腸結方治病後津液燥少大便不通豬膽一枚取汁沙糖少許糯米二三合燒灰存性研細上研如膏納少許入下部立通治卒大便不通或熱結或風秘及婦人產後大便不通皂角二梃去皮炙令黃為末白梅肉五枚蜜少許上將白梅肉並蜜拌和皂角末如棗大以綿裹引內下部中須臾即通穿腸丸治大便七八日不通服諸藥未效者豬膽一枚取汁蜜二兩膩粉一錢將膽蜜熬過入膩粉捏如中指長內下部立通濡臟湯主治大便不通六七日腹中有燥屎寒熱交迫短氣汗出脹滿生葛根豬膏各二錢升大黃一兩上㕮咀水七升煮五升去滓入膏煎三升澄清強人頻服羸人再服亦治小便不通豬膽導方出醫方集成治大便六七日不通奔氣上衝用豬膽一枚結口頭納下部漸解開頭倒瀉入肛門須臾即通利枳殼丸出聖惠方治大腸結實枳殼去瓤麩炒川大黃銼炒川芒硝各一兩上為末煉蜜丸梧桐子大食前生薑湯下三十丸治大便卒不通澀結出聖惠方吳茱萸五十粒生梔子十四枚川朴硝一兩上水一大盞煎至六分去滓下朴硝空心分為二服治療上氣大便秘澀杏仁五兩去雙仁尖皮熬印鹽三兩乾薑三兩上搗篩以醬汁和之令得相著作梃可長一寸半如指大兩頭尖仍以薄綿裹之於風日中曝令少干內下部中時時易之不過一易即有惡物下氣上即定內亦不服藥痛時須略忍如深內少頃痛忍之不得急出之物即出亦不大痛然可便時轉出膿及惡物多大便不澀任停之治大便不通菖蒲石鹽末各一兩上相和取半匙和烏麻脂少許綿裹內下部中即通治大便難出千金方醬清烏梅上將醬清漬烏梅灌下部中又方出千金方桑根白皮榆根白皮各一握上㕮咀水三升煮取一升半分三服又方出千金方豬脂一兩葵子一兩半上將葵子為末豬脂和丸梧桐子大每服十丸溫水服一方水三升煮取一升空心服又方出千金方葵子牛酥各一升豬脂亦可上水四升煮葵子取一升納酥煮一沸待冷分作二服又方出千金方葵子汁乳汁上等分和服之立出一方單用葵根汁生服治大便秘塞不通出千金方豬膽羊膽上用豬羊膽各一個以無灰酒灌三合許令深入即出矣出不盡須臾更灌一方加冬葵子汁和之亦妙又椒豉湯五升和豬膏三合灌之佳臨時易得可即用之又無灰濃酒半升鹽三錢匙煉成如上法紫蘇麻仁粥出醫方集成順氣滑大便男婦皆可用體虛之人風秘燥結服之皆得力紫蘇子麻子仁各不拘多少上研爛水濾取汁煮粥食之風科集驗方許學士云嘗有一貴人母年八十四歲忽腹痛頭疼噁心不能食醫家供補脾進食治風清頭目藥數日疾益甚懇予辨之予曰誤矣此老人風秘臟腑壅滯聚膈中則腹脹噁心不喜食以致頭痛神昏如得臟腑流暢諸疾悉去予進蘇麻粥而氣泄下結糞如慄十餘塊少間通利諸證悉除牛黃散治上焦熱臟腑秘結大黃一兩白牽牛頭末五錢上為末有厥冷用酒調下三錢無厥冷手足熱蜜湯調下小提盆散治大便燥結服轉藥久不通灶突墨一錢滄鹽三錢上研勻用竹筒吹一錢入肛門內立透治大便不通當歸香白芷各等分上為末每服二錢溫米飲調下蔥白散治老人及虛人大便不通出千金方蔥白三莖阿膠一片上以水煎蔥白候熟不用卻入阿膠溶開溫服一方用蜜二匙溶服又以酢和蔥封臍即通吳內翰母夫人曾用得效黃耆湯治年高老人大便秘澀綿黃耆陳皮去白各半兩上為末每服三錢用大麻仁一合研爛取漿水一盞濾去滓於銀石器內煎候有乳起即入白蜜一大匙再煎令沸調藥末空心食前服秘甚者不過兩服即愈常服無秘澀之患此藥不冷不燥其效如神一方用枳殼半兩蜜兌法治閉結腸熱及肛塞脹縮生瘡蜜三合豬膽汁二枚上以蜜入豬膽汁在內煎如飴以井水浸冷候凝捻如指大長三寸塗油納下部立通活人書單用蜜一方入皂角末在人斟酌用之一方入薄荷末代皂角用尤好又或偶無蜜只嚼薄荷以津液調作梃用之一方無豬膽治大便不通出肘後方豬尿豬羊膽上以葦筒著尿及膽縛一頭內下部入二寸灌之八錢立下治人有腸結之患天麻十兩蒺藜子一鎰緩火熬焦熟上先安置天麻於瓶中即用火熬過蒺藜子蓋其上便用三重紙封並緊從巳至未時取出蒺藜子再入熬炒准前安天麻於瓶內入炒過蒺藜子於中依前蓋又隔二伏時後取出如此七遍瓶盛出後用布拭上氣汗用刀劈剖焙乾單搗用若用御風草修事法亦同天麻提盆散治大便秘澀服藥轉致不通者滄鹽版塊三錢屋檐爛草節七個上為末研勻每用半錢至一錢竹筒吹入肛門內寸深立效潤腸橘皮丸一名橘杏丸降氣潤腸調和五臟並治三焦氣壅大便秘澀老人虛弱服不損氣及治風秘橘皮一用橘紅杏仁去皮尖雙仁麩炒黃各等分上為末煉蜜丸梧桐子大每服五十丸空心溫水下一方米飲下牽牛散治大便秘澀牽牛子半生半炒檳榔生銼各半兩上為末每服三錢生薑湯調下未利良久熱茶投以利為度大豆麨方治諸風濕痹筋攣膝痛胃中積熱口瘡煩悶大便秘澀大豆黃卷炒熟搗末一升酥半兩上研勻不拘食前後溫水調下一匙甘遂散治大便秘澀不通甘遂一兩炒木香一分上為末每服一錢溫蜜酒調下不拘時荊芥散一名倒換散治大便不通無問久新癃閟不通小腹急痛肛門腫疼出宣明論荊芥穗一兩大黃二兩半生用上為末每服二錢溫生薑蜜湯調下未通再服商陸煮豆方治大便不通商陸乾者大戟銼炒一分上㕮咀水四升棗十枚去核煎一升半下黑豆半合煎水盡揀取黑豆初吞三粒稍加之以通利為度滑石散治大便不通腹脹氣急煩悶滑石三二兩細研手足指甲剪患人自身者燒為灰研極細各分二貼上取滑石末一貼水一鍾半煎八分去滓調勻指甲灰空心辰時服粉糖丸治大腸壅結不通膩粉半錢沙糖如彈丸大一塊上研令勻丸梧桐子大每服五丸臨臥溫熟水下皂莢散治大便不通豬牙皂莢去皮酥炙半兩蒺藜子炒去角一兩上為末每服一錢鹽茶湯調下大黃丸治大便不通大黃銼炒五兩大麻仁研二兩上為末煉蜜丸梧桐子大每服十丸食後熟水下治肺熱肛門閉塞不通腫縮生瘡蜜乾薑末上和丸如指大導下部姚云欲死者蜜三升微火煎如餳投冷水中令凝丸如指大長三四寸導之良一方水四升蜜一升煎熟冷灌下部又方常服蜜煎五合大黃芒硝丸治大便暴閉不通氣悶絕大黃六兩芒硝五兩一方用朴硝上先切大黃水四升煮取二升去滓納芒硝頓服之須臾利如良久不覺以熱飲投之一方為末每服二錢溫米飲調下治干糞塞腸症腸脹痛不通毛桃花一兩濕者面三兩上和麵作餛飩煮熟空腹食之日午後腹中如雷鳴當下惡物得效治大便旬日不通鼠糞二枚白膠香半棗大上為末水丸如棗核大油塗納穀道中良久便通又方膩粉一分黃丹一錢上為末每服一錢粥飲調下治臟腑壅塞心腹間氣悶宿食不消腰脅疼痛大腸秘澀牽牛子一斤炒搗取末十兩青橘皮三兩去白湯浸焙為末上都令勻杵和蜜丸如梧桐子大每服十五丸至二十丸食前溫酒下生薑湯亦可治大便不通用礬石如指大者導下部佳又方用旱瓜蒂七枚綿裹納下部如非時醬瓜亦得治卒大便閉澀不通用削瓜菹如指大導下部中即效又方用蜜和燕屎納大孔中即通又方蜜一升水四升煮熟冷灌下部中治大便難用桃皮三升水五升煮取一升頓服一方水服桃花方寸匕無花白皮亦得又方桃葉取汁服亦佳又方用車前子及葉常服良治脹滿不通用獨頭蒜燒熟去皮用綿裹納下部中氣立通及乾薑鹽杏仁搗丸導之並佳巴豆丸治寒癖宿食及食飽不消大便不通用巴豆仁一升清酒五升浸三日三夕研碎合酒微火煎令可丸如胡豆大欲取吐下者服二丸一方巴豆一粒去皮油心膜同粳米飯二十粒為丸如綠豆大溫水下三丸蜜劑方一名霹靂煎治大便久秘攻不透肺熱應肛門熱閉塞生瘡用蜜不計多少慢火熬令作劑稀則黏手硬則脆稀稠得所堪作劑搓如棗核大粗如箸長一寸許蘸小油內入於肛門中坐良久自透或加鹽少許一方可丸六七寸長納肛門中倒身向上頭下少時作癢即通海藏曰蜜導用鹽相合亦可如用草烏頭末相合亦得鹽則軟堅潤燥草烏頭末則化寒消結可隨證陰陽所宜用之治虛人並老弱人虛秘用火麻仁淘洗淨不計多少研細用水濾取麻汁以米相和煮粥或煮蘿蔔食之一方水調服又方常煮麻子汁飲蜜五合常服亦妙熟湯濾汁服亦可蜜煎藥治大便不通用明黃蠟不拘多少油少許鹽少許捻作錠子放在肛門治大便秘澀不通用牽牛子半生半熟為末每服二錢煎薑湯調下如未通時再服及熱茶投之量虛實無時候加減服治大便不通氣奔欲死用烏梅十顆置湯中須臾去核為丸如棗大納下部少時即通治大腸久冷秘用威靈仙蜜丸梧桐子大於一更內生薑清米飲下十丸至二十丸治大便秘結用陳皮不去白酒浸煮至軟焙乾為末復以溫酒調服二錢為妙一方以米飲湯調下治大便秘澀不通用蜣螂不拘多少炒去翅足為末熱酒調下一錢治卒大便不通秘澀用綿裹鹽丸作三丸如手指大納下部中一方用食鹽和苦酒敷臍中干即易敷藥治閉結至極昏不知人用生大螺螄三枚以鹽一匙和殼內生搗碎置病者臍下二寸三分用寬帛緊繫之即大通未效用烏桕木三寸研井水服亦效就多研爛敷臍下亦可治大便不通用烏桕木長一寸許劈破以水煎取小半盞服之立通兼能利水去燥糞或用生薑削如小指長二寸塗鹽納下部中立通治下部閉不通用蒴藋根一握搗汁水和絞去滓強人服一升數用之並治腳氣治大便卒澀結不通用羊蹄根一兩銼水一大盞煎取六分去滓溫頓服治天行熱秘腸內結用胡麻油熱服一合取利為度食油損聲令體重生油殺蟲摩惡瘡治大便秘結積熱不通名獨棗湯用黑腰棗三個擘開去核灌水銀粉於棗肉孔中塞滿濕紙裹煨用生蔥茶清嚼下一方以棗汁送下又方用麻線縛定水一盞煮棗熟細嚼熱湯下一方丸梧桐子大薑湯服五丸一方面裹煨熟為末煎湯調服亦效附子散治大便冷秘用附子一枚炮裂去皮臍削去外面留中心如棗大碾為末蜜水調下一錢土瓜根用內方治大便不通用生土瓜根搗汁少許水解之竹筒中傾入下部即通玄明粉散治大便不通用玄明粉半兩每服二錢將冷茶磨木香入藥溫服即通郁李仁粥方治大便不通用郁李仁一兩去皮細研分兩服煮薄粥一碗臨熟時下郁李仁煮三兩沸傾出空心服便通未通再服一服以通利為度止服羖羊角飲治健忘多驚大便難口中生瘡羖羊角鎊人參各一兩胡黃連半兩赤茯苓去黑皮羌活去蘆附子炮去皮臍梔子仁炒牡丹皮黃芩去黑心麥門冬去心炒薔薇根皮大黃炒各一兩防己二兩甘草炙三分上㕮咀每服五錢水二盞生薑半塊拍破鹽豉四十粒煎一盞去滓更入淡竹瀝少許攪勻食前溫服秦艽湯治大腸伏瘕秘澀秦艽去苗根土一兩半防風去叉一兩一錢枳殼去瓤麩炒一兩獨活去蘆頭一兩桂去粗皮三分檳榔炮銼一兩一分牽牛子生搗一分朴硝細研一兩半湯成旋下上㕮咀每服三錢水一盞煎至七分去滓加朴硝末半錢更煎兩沸食前溫服日二檳榔丸出聖濟總錄治腸胃受熱氣不宣通瘕聚沉伏腹脅脹滿大便秘澀檳榔銼大黃銼炒枳殼去瓤麩炒二兩火麻仁研桃仁去皮尖雙仁麩炒研青橘皮湯浸去白焙木香各一兩上除桃仁麻子仁外為末同研勻煉蜜丸梧桐子大每服二十丸溫水下日二服以利為度一方無青橘皮大黃飲出聖濟總錄治小腸移熱於大腸腹脅脹滿瘕聚秘澀大黃銼絹裹蒸三度焙乾炒澤瀉黃芩去黑皮甘草炙銼各一兩半石膏研四兩山梔子仁桂心去粗皮銼各一兩半上㕮咀每服三錢水一盞半煎八分去滓空心溫服晚再服二黃湯出聖濟總錄治伏瘕大便澀秘大黃銼炒一兩半芒硝研黃芩去黑心各一兩梔子仁七枚甘草炙銼五錢上除芒硝外㕮咀每服三錢水一盞煎七分去滓入芒硝半錢煎三一二沸溫服食後臨臥檳榔丸出聖濟總錄治大腸受熱瘕聚沉伏秘澀不通檳榔炮銼一兩大黃銼炒二兩木香半兩陳橘皮湯浸去白焙一兩牽牛子二兩一兩生為末一兩炒熟另為末上四味為末入牽牛子末和為丸煉蜜於臼內塗酥杵丸梧桐子大每服三十丸空心溫酒下潤腸丸出醫方集成治發汗利小便亡津液大腸秘老人虛人皆可服肉蓯蓉酒浸焙二兩沉香銼研一兩上為末用麻子仁汁打糊為丸梧桐子大每服七十丸空心用米飲下潤腸丸出東垣試效方治脾胃中伏火大便秘澀或乾燥閉塞不通全不思食乃風結秘血結秘皆令閉塞也以潤燥和血疏風自然通麻子仁桃仁去皮尖各一兩羌活半兩當歸尾大黃煨半兩上除麻仁桃仁別研如泥外搗羅為末同上火煉蜜為丸如梧桐子大每服三五十丸空心白湯送下如病人不大便為大便不通而滋其邪盛者急加酒製大黃以利之如血燥而大便不通燥乾者加桃仁酒製大黃如風結燥大便不通者加麻子仁大黃如風澀而大便不通者加皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除之如寒陰之病為寒結閉而大便不通者以局方中半硫丸或加煎附子乾薑湯水冷與之其病雖陰寒之證當服陽藥補之若大便不通者亦當十服中與一服藥微通其大便不令閉結乃治之大法若病人雖是陰證或是陰寒之證其病煩燥脈實堅亦宜與陽藥中少加苦寒之藥以去熱燥燥止勿加如陰燥欲坐井中者其二腎脈必按之虛或沉細而遲此易為辨耳如有客邪之病亦從權加藥以去之活血潤燥丸出東垣試效方治大便風秘不通常燥結當歸一錢防風三錢羌活一兩大黃一兩濕紙裹煨桃仁二兩湯炮去皮尖麻仁三二兩半二味另研入藥皂角仁燒灰存性去皮一兩半其性得濕則滑得滑則燥結自除用之勿誤上除麻仁桃仁另研外為細末卻同拌勻煉蜜去沫為丸如梧桐子大以瓷器內盛紙封之無令見風每服五十丸三兩服後大便日後不能燥結也升陽瀉濕湯出東垣試效方治膈咽不通逆氣裡急大便不行青皮二分甘草四分槐子二分黃耆一錢黃柏三分升麻七分生地黃熟地黃各三分當歸四分桃仁二錢蒼朮五分上㕮咀如麻豆大作一服另研桃仁如泥一處同煎水二大盞煎至一盞去滓稍熱食前服麻黃白朮散出東垣試效方治大便不通三日一遍小便黃赤渾身腫面上及腹尤甚其色黃麻木身重如山沉困無力四肢痿軟不能舉動喘促吐清水吐噦痰唾白沫如膠時燥熱發欲去衣須臾而過振寒項額有如冰額寒尤甚頭旋眼黑目中溜火冷淚鼻不聞香臭少腹急痛當臍有動氣按之堅硬而痛麻黃不去節五錢桂枝三分杏仁四枚吳茱萸草豆蔻各五分厚朴三分炒曲五分升麻二分柴胡三分白朮三分蒼朮三分生甘草一錢澤瀉四分茯苓四分橘紅二分青皮一分黃連一分酒製黃耆人參各三分黃芩二分酒製炙甘草一分豬苓三分上㕮咀分作二服水二盞半先煎麻黃令沸去沫再入諸藥同煎至一盞去滓稍熱食遠服之此證宿有風濕熱伏於榮血之中其水木火乘於陽道為至盛元氣短少喘為陽火傷於四肢痿在腎水之間乃所勝之病今正遇冬寒得時乘其肝木又實其母肺金凌火剋木是大勝必大復其證善恐欠多嚏鼻中如有物不聞香臭目視𥉂𥉂多悲健忘小腹急痛通身黃腹大脹面目腫尤甚食不下痰唾涕有血目眥瘍大便不通只二服皆已驅風丸出朱氏集驗方治大便不通或年高風秘皂角七枚泡挼水兩碗巴豆四十九粒去殼心膜枳殼一兩上以皂角挼水煮乾為末去巴豆不用炒枳殼為末入木香半兩蜜丸如梧桐子大每服三十丸空心白湯下順氣丸出如宜方治大腸每秘澀即諸風病發或諸氣發大黃五兩半生半熟車前子檳榔麻仁炒牛膝酒浸郁李仁湯浸去皮菟絲子酒浸蒸山藥各二兩山茱萸防風枳殼獨活各一兩上為末煉蜜丸如梧桐子大茶酒米湯任下此藥補益通利疏風順氣各神丸治丈夫婦人膈上虛熱肺腑痰壅調三焦開胃口大小便秘結不通及腸風等疾並皆治之普濟本事方名神功丸人參半兩訶黎勒生用大黃蒸各一兩麻仁八錢上為末除去麻仁研為膏次入前藥煉蜜丸梧桐子大每服二十丸空心茶酒任下枳殼丸出濟生方治腸胃風氣壅盛大便秘澀皂角一挺去黑皮弦炒枳殼炒大黃炒羌活木香淨陳皮白芷桑白皮蜜炙各二兩上為細末蜜丸梧桐子大每服七十丸空心米飲或薑湯下三和散治七情氣結五臟不能流通脾胃不和大便秘澀方見三和湯金液丹出如宜方治臟寒大腸挾冷結滯硫黃淨揀去沙石十兩研細飛過用瓷盒子盛以水和赤石脂封固以鹽泥固濟候乾地內先埋一小罐子盛水令滿置盒子在上用泥固濟干慢火養七日七夜候足加頂上火一片煅之候冷取出研為細末上藥末一兩用蒸餅一兩湯浸握去水和為丸如梧桐子大每服三十丸多至百丸溫米飲下空心服之又宜麻仁杏仁煎湯下如大腸乾燥宜蜜導法正真丹出余居士選奇方治老人氣虛滿悶大便秘澀連日不通不敢服下藥者宜服此硫黃一兩研陳皮半兩去白五靈脂一分上先搗陳皮次搗五靈脂硫黃同搗勻麵糊丸如梧桐子大每服五十丸食前米飲下和血通經湯出東垣蘭室方靈壽縣長董監軍癸卯冬大雪時因公到真定忽有大風暴至感病托伊親張耘夫求醫診候得六脈俱弦甚急按之洪實有力其證手足攣急難明其狀大便秘澀面赤面熱此風之始加於身也主四肢者脾也以風寒之邪傷之則搐極而攣閉乃風淫末疾而寒在外也內經曰寒則筋攣正謂此也本人素飲酒內有實熱乘於腸胃之間故大便秘澀而面赤熱內則乃手足陽明受邪外則足大陰脾之經受風寒之邪乃以桂枝甘草根以卻其寒邪而緩其急搐又以黃柏之苦寒滑以瀉實而潤燥急救腎水使以升麻葛根以升陽氣行手足陽明之經不令遏絕更以桂枝辛熱入手陽明之經為引用以潤燥復以芍藥甘草專補脾氣使人不受風寒之邪而退木邪專益肺也加人參以補元氣為之輔佐加當歸身去裡急而和血升麻一錢葛根當歸身人參各一錢桂枝二錢芍藥半錢炙甘草根一錢酒黃柏二錢上銼麻豆大煎法如常令暖房中近火摩搓其手一服乃愈化積滯通大腸方楊子建護命方芫花牽牛各一兩鱉甲醋炙半兩狼毒制獨活大黃薄切醋煮乾羌活牡丹皮去心桔梗當歸牛膝荊芥穗連翹各一分半夏三錢上件依法修制芫花狼毒二味木臼中杵羅為末其餘諸藥合作一處杵羅為末後總合一處相滾令芫花狼毒與眾藥末拌勻每服二錢匕不時土器內煎蔥湯調下大橘皮丸出十便良方治大便秘澀厚朴一兩橘皮一兩杏仁一兩三分上為細末煉蜜和丸如梧桐子大每服五七十丸不時米飲下神效丸出衛生家寶方治大便秘黃梔子隔年者大黃炮甘草各等分上碾羅極細末煉蜜和丸如梧桐子大每服三二十丸略秘者用白湯下秘甚者煎橘皮湯食前服之五仁丸出澹寮方治大便秘澀可以常服杏仁酒浸去皮尖麩炒令黃取淨一兩細研郁李仁湯浸去皮尖取淨一兩細研柏子仁揀淨一兩細研酸棗仁湯浸去皮取淨一兩細研火麻子仁曬令乾用板子盛住上用磚一片壓定輕輕以手磨磚則麻自脫揀未脫者再磨之取淨者一兩細研上五味再合研令極細以水浸蒸餅為丸梧桐子大每服五十丸空心米飲吞下通秘散出十便良方治風秘大便澀香白芷不以多少焙乾上為細末每服二錢蜜少許食前溫米飲調下連進二服即通香術丸出余居士選奇方治腹脹痛臟腑秘蒼朮厚朴薑汁炙陳皮各一兩生好硫黃二兩用蘿蔔煎沸湯洗三兩次上搗羅為末浸蒸餅糊為丸如梧桐子大每服三五十丸日兩服米湯下麻仁丸出直指方順三焦潤五臟治大便秘塞不通年高老人宜服白檳榔半煨半生羌活去蘆木香各一兩肉桂去粗皮山茱萸菟絲子酒浸一宿另研為末車前子枳殼去瓤麩炒防風去叉枝山蕷各一兩半麻仁另搗研大黃半蒸半生郁李仁去皮另搗碎各四兩上為細末入另研藥拌勻煉蜜和丸如梧桐子大每服十五丸至二十丸溫水吞下臨臥服通腸丸出十便良方治大腸結不通厚朴製為末豬胰各等分上用豬胰研和丸如梧桐子大每服三十丸生薑湯下四順飲子出十便良方治大便不通面目身熱口舌生瘡上焦胃悶時欲得冷此三陽氣壅熱並大腸其脈洪大大黃赤芍藥甘草當歸各等分上為粗末每服五錢水一盞半煎至一盞溫服潤腸丸出衛生寶鑑方治胸膈痞悶大便澀滯麻子仁二兩半研極細桃仁泥半兩當歸尾半兩生甘草三二錢枳實五錢麩炒酒煨大黃一兩半白芍藥半兩木香二錢陳皮三錢升麻五錢檳榔二錢人參三錢上件除麻仁桃仁外搗為末卻入麻仁桃仁泥和勻蜜丸如梧桐子大每服七八十丸溫水食前服下治大便不通出本草研麻子相和為粥食治大便不通十日至一月出本草用冬葵子三升水四升煮取一升去滓服不瘥更服又方出危氏方用枳實皂角等分為末飯飲為丸米飲下亦妙枳實湯出濟生方治腹脹發熱大便秘實脈多洪數此名熱脹枳實去瓤麩炒半兩厚朴薑製炒一兩大黃酒蒸甘草炙各三錢桂心不見火二錢半上㕮咀每服四錢水一盞半生薑五片棗二枚煎至七分去滓溫服不拘時候嘔者加半夏一分小黃耆丸出十便良方治大腸風熱大便秘滯及五痔結核防風一兩黃耆二兩川芎半兩麻子仁一錢枳殼一錢上為細末煉蜜和丸如梧桐子大每服三十丸不拘時候米飲下麻仁丸出楊氏家藏方治大便秘結麻仁一兩另研杏仁去皮尖麩炒二錢枳實去瓤麩炒半兩白芍藥半兩黑牽牛一兩七錢上為細末滴水為丸如梧桐子大每服五十丸溫熱水送下食前麻子仁丸出三因方治趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約大便堅小便利而不渴麻子仁五兩炒芍藥枳實麩炒各八兩大黃蒸一斤厚朴薑汁炒半兩杏仁去皮尖炒另研五兩半上為末煉蜜丸如梧桐子大每服二十丸溫水下未利加五十丸一方麻仁一兩半杏仁三錢大黃一兩枳實芍藥厚朴各半兩此依局方錄出本是漢方合用大黃枳殼一斤止得合一二兩厚朴當用四錢杏仁當用六錢一方麻仁一兩二錢半芍藥一兩乃制均合理用當以理推治大腸氣秘壅熱結澀出本草牽牛子微炒搗取其中粉一兩桃仁去皮尖麩炒取末半兩上以熟蜜和丸如梧桐子大每服溫水服三二十丸不可久服以行脾腎氣故也導引法養生方云偃臥直兩手捻左右脅除大便難腹痛腹中寒口納氣鼻出氣溫氣咽之數十病愈
