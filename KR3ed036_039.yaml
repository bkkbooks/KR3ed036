積風壅者疏其風又當流行肺氣也諸有裡熱法當通利其大便然下後腸頭熱腫而墜重者此更有瘀血挾氣而蓄在下焦也當用黃連黃芩大黃輩下之於內以炒阿膠炒枳殼百藥煎為佐多入濃蜜並烏梅同煎姜一錢四五片亦可凡通利大便若用大黃巴豆等藥而大便不通者陰陽關格水火不升降故也有熱者來復丹用三黃丸薄荷泡湯下無熱者養正丹夾神保丸橘皮湯煎下儒門事親云戴人過曹南省親有姨表兄病大便燥澀無他證常不敢食飽飽則大便極難結實如鐵石或三五日一如圊目前星飛鼻中血出肛門連廣腸痛痛極則發昏服藥則疾轉劇烈巴豆芫花甘遂之類皆用之過多則困瀉止則復燥如此數年遂畏藥性急暴不服但臥病待盡戴人過診其兩手脈息俱滑實有力以大承氣湯下之繼服神功丸麻仁丸等藥使食菠蔆葵菜及豬羊血作羹百餘日充肥親知見而駭之嗚呼粗工不知燥分四種燥於外則皮膚皴燥於中則精血枯涸燥於上則口鼻焦乾燥於下則便溺結閉夫燥之為病是陽明之化也水液衰少故如此然可下之當擇藥用之巴豆可以下寒甘遂芫花可以下濕大黃朴硝可以下燥內經曰辛以潤之咸以耎之周禮曰以滑養竅老人臟腑秘澀不可用大黃老人津液少所以臟腑秘澀更服大黃以瀉之津液皆去定須再秘甚於前只可用寬潤大腸之藥更用槐花煎湯淋洗亦效更有老人發熱而大腑秘澀或因多服丹藥脾胃虛弱氣化不行遂為臟腑積熱須用神保丸得通瀉一行熱亦即退也有人因時疾瘥後秘塞不通遂致夭命大不可輕之凡大便不通皆用滑膩之物及冷水並通也凡候面黃者即知大黃難用內經謂小腸移熱於大腸為虙瘕夫小腸者受盛之官化物出焉大腸者傳導之官變化出焉二者皆以傳化為事今也小腸受熱移於大腸則陰氣盛而津液耗津液既耗不能滑利故糟粕內結沉伏而為伏瘕結聚腸間菀結大便秘澀也方痢聖餅子治年老人大便秘澀草果去皮石菖蒲去皮毛白茯苓麻黃去根節厚朴薑汁製獨活枳殼麩炒藿香白朮細辛洗去葉吳朱萸去梗甘草炙木豬苓去皮蒼朮浸良薑去蘆赤芍藥附子炮去皮臍藁本去蘆柴胡去蘆澤瀉防風去叉半夏制各等分上㕮咀每服三錢水一盞半薤白二條擘破煎至八分去滓食前空心稍溫服老人小兒量以加減用之忌生冷油膩之物京三稜丸治痃癖氣注刺痛大便秘澀京三稜煨乘熱椎碎搗為末木香當歸切焙桂去粗皮肉蓯蓉酒浸切焙牛膝去苗葉浸切焙羌活去蘆芎藭赤芍藥銼防風去叉枳殼去瓤麩炒白朮各半兩檳榔生銼郁李仁去皮尖雙仁另研如膏大黃銼炒各一兩上除郁李仁外為末與郁李仁膏同研勻煉蜜杵丸梧桐子大每服二十丸空心米飲或溫酒下以利為度茱萸湯治脹滿閉不下大黃丸治百病轉失氣川大黃三兩銼炒木香乾薑炮銼赤芍藥白朮芎藭羌活桂心檳榔郁李仁湯浸去皮炒當歸銼炒神麯炒各一兩巴豆一分去皮心研綿裹壓去油上為末入巴豆研令勻煉蜜丸梧桐子大每日空心或夜臥時以溫茶下三十丸至五十丸以利為度如要快瀉良久以熱茶投之搜風潤腸丸治三焦不和胸膈痞悶氣不升降飲食遲化腸胃燥澀大便秘硬沉香檳榔木香青皮去瓤陳皮去瓤京三稜蘿蔔子炒槐花炒枳殼麩炒去瓤枳實麩炒去瓤木通各半兩郁李仁一兩去皮上為末煉蜜丸梧桐子大每服五六十丸食前煎木瓜湯下常服滋潤腸胃導化風氣一方有大黃無木通米飲湯送下大黃丸調理胸膈祛逐壅滯推陳致新疏風順氣川大黃銼炒檳榔火麻仁郁李仁湯浸去皮尖炒各二兩牛膝去苗芎藭枳殼去瓤麩炒獨活防風去蘆桂心桃仁各一兩湯浸去皮尖雙仁麩炒上為末煉蜜杵丸梧桐子大每服三十丸空心生薑湯下大五柔丸治臟氣不調大便不通和營衛利九竅消穀益血大黃芍藥枳實蓯蓉葶藶甘草黃芩牛膝各一兩桃仁一百枚杏仁四十枚上為末蜜丸梧桐子大每服三丸日三加至二十丸酒下導水丸下劑大黃黃芩各二兩滑石四兩黑牽牛四兩另取頭末用加後項藥甘遂一兩去濕熱腰疼泄水濕腫滿久雨則加依法制用白芥子一兩去遍身走注疼痛朴硝一兩退熱散腫毒止痛久旱則加郁李仁一兩散結滯通關節潤腸胃行滯氣通血脈樟柳根一兩去腰腿沉重上為末滴水丸梧桐子大每服五七十丸或加至百丸臨臥溫水下潤腸湯一名當歸潤燥湯治理大便閉燥不通出衛生寶鑑升麻生地黃各二錢當歸尾熟地黃甘草大黃炒麻仁各一錢桃仁與麻仁另研細入煎紅花三分上㕮咀作一服水三盞先拌藥濕煎一盞去滓食前熱服一方有黃柏無紅花麻仁丸出儒門事親書郁李仁去皮另研大麻子仁另搗二味各六兩大黃二兩半半生半熟檳榔半兩乾山藥防風去蘆枳殼炒去瓤各七錢半羌活木香各五錢半上為末入郁李仁火麻子仁將藥攪勻煉蜜丸梧桐子大每服二十丸至三十丸溫水下食後加牽牛滑石亦妙大黃飲子出聖惠方治身熱煩躁大便不通骨節急痛川大黃濕紙裹煨杏仁去皮尖略炒梔子仁川升麻枳殼浸去瓤炒各半兩生地黃一兩人參黃芩甘草炙各二錢半上㕮咀每服三錢生薑五片豉二十一粒小烏梅一枚煎服一方用枳實勻氣丸治津液燥少腸胃挾風大便秘澀氣道不勻麻仁另研二兩人參訶黎勒皮枳殼去瓤麩炒桂皮去粗皮各一兩木香一兩半郁李仁浸去皮另研白檳榔大黃炙各三兩上為末入麻仁等膏再研勻煉蜜丸梧桐子大每服三十丸加至五十丸溫熟水下不計時枳殼湯治大腸壅結不通腹脅脹滿膨悶不下食枳殼去瓤麩炒甘草炙各一錢銼大腹皮銼三錢牽牛子炒百合赤茯苓去黑皮各一兩赤芍藥桑根白皮銼各三分郁李仁湯浸去皮尖雙仁陰乾半兩上㕮咀每服五錢水一盞半煎至八分去滓