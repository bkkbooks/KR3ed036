味知不在裡也不惡風寒止惡燥脈不浮知不在表也表裡既和知氣在經脈之中內經云凝於經絡為瘡癰其癰出身半以上故風從上受之故知是八風之變為瘡者也故以卻寒邪調和經脈使無凝滯也白芷七分升麻半錢炙甘草一錢酒黃芩二錢生黃芩一錢半黃耆一錢當歸梢一錢中桂少許連翹二錢生地黃一錢桔梗半錢紅花少許上㕮咀都作一服酒水各一大盞半煎至一盞去滓稍熱服臨臥一服而愈一方無當歸尾中桂連翹生地黃內托羌活湯出東垣先生蘭室祕藏方治足太陽經中左右尺脈俱緊按之無力尻臀生癰腫痛大作羌活二錢防風一錢藁本一錢肉桂七分黃柏二錢酒洗連翹一錢炙甘草半錢當歸梢一錢黃耆一錢半蒼朮橘皮各五分上㕮咀都作一服酒三盞煎至一盞去滓稍熱服空心以夾衣蓋癰上使藥力行罷去之治諸癰毒乳癰等第一藥出鮑氏方草烏南星木鱉仁赤小豆當歸鬚赤蘞白芷紫河車忍冬藤赤芍藥上等分為末淡醋和蜜調敷初效甚緊天蘿瓜汁調尤佳潰膿出鮑氏方黃連黃芩黃柏梔子大黃當歸鬚南星半夏赤芍藥白芷紫河車上等分為末依前用醋調敷點破出鮑氏方白丁香雀糞直尖起者草烏尖研斑蝥去首足上等分末極細醋調成膏於高尖軟處點破如箸頭大但此方猛烈切不可輕治一切癰腫大小便祕熱毒氣所攻發為癰腫疼痛鮮赤不可勝忍但止得一兩日未成膿者宜服此方忽先痛後腫大難治療出護命方麻黃去根牡丹皮去骨川大黃連翹當歸黃耆山梔硝石升麻桃仁貝母去心柴胡去苗羌活各一分半夏牽牛各一兩半上細杵羅為散子每服五錢水二盞煎取一盞八分食後去滓熱服取轉一行了便於腫處當頭灸以五七十壯而止若是冷腫堅硬而不痛即便不須吃前方藥只於腫處當頭再灸百餘壯而止也只是冷腫千萬不要吃藥諸癰出永類鈐方生麻油一斤黃丹四兩蠟四分上三味臘日前日午用火煎至明早下丹蠟成膏忌女人六畜見用平胃散末黃桑菰為末油調敷佛手祛毒膏出楊氏家藏方治風熱毒氣壅滯營衛血氣壅盛聚結癰腫煩疼不止肌肉敗潰及諸瘡焮赤疼痛大黃山梔子各二兩白蘞連翹各一兩升麻蒴藋各半兩上㕮咀用煉成豬脂一斤同煎候白蘞色焦濾去滓令淨量時月入黃蠟就成膏傾於瓷罐內盛候冷塗敷或攤貼之佛手散出楊氏家藏方治風濕毒氣結搏腠理氣血壅盛欲成癰腫及手足諸風癢痛妨悶及風氣結核遊走上行或久新癢疾疼痛不止漢防己苦參各四兩大黃生用白蘞各三兩藿香葉去土黃芩各一兩凌霄花甘草生用各一兩半上為細末每服用三錢沸湯泡通手淋洗凡貼癰腫出永類鈐方生地黃忍冬藤芭蕉等自然汁上調藥敷尤有功凡熏洗出永類鈐方加番蜂末楓乳上為丸燒熏去穢安氣至有功療癰腫本草以蚤休根醋摩敷之治癰腫風毒本草以蒻頭摩敷腫上治癰腫本草以蒿實吞一枚即破若熱結癰腫無頭者吞之則為頭易穴一方用九月十月採陰乾治癰腫不消本草以半夏新生者摩塗之治癰腫本草以伏雞子根搗敷之治癰本草折取苦苣莖中白汁滴上立潰治癰腫本草以蝦蟆碎塗之治癰腫惡瘡本草取紫葛根皮搗細末醋和封之治癰本草以黃耆作膏貼之治患癰苦不潰以雀屎一枚敷之立決雄雀屎頭尖者是也治癰毒本草方見本門前諸癰疽類即以米粉散射癰腫令散本草以好井水及土石間新出泉水飲之易散治癰腫惡瘡本草用螺螄絲煮洗之療癰腫本草用甘草煮熱洗之治癰瘡甚效本草用小青葉三月採生搗碎敷治癰瘡本草用黃葵花為末水調塗之立愈主癰腫本草搗鬼膊莖菜敷之瘥治癰腫本草以人髭燒灰敷瘡立愈唐李績嘗疾醫治之須得須灰服之方止太宗遂自剪須燒灰賜服之故白樂天云煎須燒藥賜功臣消癰腫本草用見腫消生苗葉爛搗貼治癰腫無頭本草杵蜀葵末敷之主癰腫瘡疹腳疼本草以螺厴草搗敷之亦煮湯洗腫處療癰腫本草用苦茄子其子以醋摩敷癰腫根亦作浴湯治諸瘡癰腫不散者本草取生白藥根爛搗敷貼干則易之無生者用末水調塗之亦可治一切惡瘡癰腫本草以風延莓煮服之治癰一切腫未成膿拔毒方見蠣粉散治癰瘡腫毒本草以芋葉和鹽研細敷之去皮膚風熱流注骨節癰腫疼痛用火炭母草葉搗爛於垍器中以鹽酒炒敷腫處經宿一易治癰腫發數處方見二聖散治癰腫未有頭必穴方以醋摩黃藥塗之治癰腫用升麻水煎綿沾拭瘡上亦治豌豆瘡又方用齒垽和黑蝨研塗之又方用東向廁溺坑中黑泥水調服之未膿即散有膿潰之治生癰毒未成頭赤腫疼痛不可忍上以竹片為圈子看腫大小作圈置腫上取馬蝗三五條置圈中令咂去毒血即消腸癰附論夫癰發於外人可得見者猶為危急之疾況隱伏腸間痛無定處又不可得而見者乎蓋癰疽五發在外則為發背發腦發眉發須發頤在內則為腸癰心癰腎癰肺癰臍癰等患治之得法尚庶幾焉一著小差枰棋去矣何則腸癰為病身皮甲錯腹皮緊急如腫之狀而按之濡體無哄熱腹無積聚者此積陰冷之所致也當以濕藥調之發汗無汗灑淅惡寒小腹腫強而按之痛小便澀數其候如淋者此內結熱之所致也當以涼劑利之其脈遲緊膿未成者可下其脈洪數膿已成者不可下甚者腹肚脹大轉側聞有水聲或繞臍生瘡膿汁穿出或臍中常常出膿或大便屢下膿血凡此皆為惡證其間寒熱氣急煩渴悸驚嘔惡唾膿咳嗽痰涎自汗自利如尋常發癰之狀亦類有此婦人尤多得之內經有曰息賁病有人得之二三年遍身微腫其後大便與臍俱出膿血遂至不救此亦腸癰之類寸口脈滑則為實數則為熱滑則為營數則為衛衛下降營上升遇熱則營衛相干血為濁敗小腹痞滿小便或難汗出或復惡寒膿為已成設脈遲緊聚為瘀血血下則愈膿成引日又諸浮數脈當發熱而反灑淅惡寒若有痛處者當積有膿脈滑澀者小腸癰出血者也千金方云官羽林婦病醫何以知林婦腹中有膿為下之即愈答曰寸口脈滑而數滑則為實數則為熱滑則為營數則為衛衛數下降營滑上升營衛相干血為腹滿痞堅小便或澀或復汗出或復惡寒膿為已成設脈遲緊即為瘀血下則愈方當歸煎出聖惠方治腸內生癰腫令人心隔間氣滯急痛壯熱嘔逆小便黃赤焮腹表發腫腫中夜間如湯沸聲速須救療當歸一兩沒藥三分麝香半兩細研乳香半兩桂心半兩硃砂半兩細研黃耆三分漏蘆自然銅丁香各半兩木香三分芎藭各半兩麒麟竭二分檳榔雲母粉沉香甘草白蘞白芷密陀僧各半兩赤芍藥三分野駝脂三兩黃犬脂三兩生地黃半斤絞取汁上藥除脂外為末銀鍋內用好酒五升慢火煎去二升即下地黃汁更煎漸膿次入野駝脂不住手以柳木篦攪如膏即下藥末更攪令勻以瓷盒盛每日空心午晚間以甘草酒下一彈丸大取塗貼患處亦良木通散出直指方治腸癰熱證腹痛而強發熱惡寒小便似淋膿未成者用此薏苡仁木通葶藶炒甘草炙川升麻桔梗桃仁浸去皮炒赤茯苓牡丹皮各一兩生乾地黃甜瓜子敗醬赤芍藥各一兩半大黃半兩朴硝一分上為散每服三錢井水一盞半姜五片煎服犀角丸出聖濟總録治腸癰並一切癰疽發背腫毒犀角屑一兩半巴豆十粒去皮心炒研去油大黃三分蒸三度銼蜀椒去目並閉口者炒去汗半兩黃芩去黑心防風去叉人參當歸切焙黃耆細銼藜蘆去蘆頭山梔子去皮黃連去須甘草炙銼升麻各半兩上為末煉蜜丸如梧桐子大每服三丸空心米飲下加至四五丸利下黃水為度牡丹散出直指方治腸癰冷證腹濡而痛時時利膿人參牡丹皮白茯苓天麻黃耆木香當歸川芎辣桂各三分白芷薏苡仁甘草炙各二分桃仁浸去皮炒三分上為末每服三錢井水煎食前服木通散出聖惠方治腸癰小便不利似淋腹中苦痛寒熱汗出時時利膿木通銼薏苡仁各一兩生乾地黃二兩甘草炙微赤銼桔梗去蘆頭各一兩丹參二兩麥門冬一兩去心赤芍藥一兩半赤茯苓一兩敗醬二兩牡丹一兩黃耆一兩銼上為粗散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服以小便利為度內補散出醫方集成治諸發已潰去舊生新老人血氣虛弱宜補之此潰後服至愈而止一名護壁都尉及治腸癰冷證癰疽等患人參當歸川芎厚朴薑製防風白茯苓桔梗焙白芷辣桂黃耆炙甘草炙各等分上為末每服三錢溫酒調下如不飲酒楠木香煎湯下諸癰熱證黃栝蔞煎湯下一方無白茯苓牡丹湯出千金方治腸癰牡丹皮一兩芍藥丹參生乾地黃切焙各二兩桔梗銼炒麥門冬去心焙各一兩半甘草炙赤茯苓去黑皮敗醬各一兩上粗搗篩每服五錢水二盞入生薑五片煎至一盞去滓空心日晚溫服甜瓜子散治腸癰腫痛妨悶氣欲絶甜瓜子二兩桃仁浸去皮尖雙仁麩炒微黃牡丹皮各一兩川大黃一兩半銼微炒川朴硝一兩薏苡仁一兩敗醬一兩當歸半兩檳榔三分上為散每服四錢水一中盞煎至六分去滓不計時候溫服牡丹散出聖惠方治腸癰未成膿中痛不可忍牡丹二分川大黃二兩銼微炒木香桃仁湯浸去皮尖雙仁麩炒微黃三分川硝一兩赤芍藥三分敗醬甜瓜子各三分上為散每服四錢水一中盞煎至六分去滓食前服以利下膿血為度伏梁丸出外科精要治環臍腫痛胃瘡疽厚朴薑汁製茯苓枳殼麩炒去瓤白朮人參京三稜炮半夏湯洗七次各一兩上為細末麵糊為丸如小豆大每服三十丸食前米湯下梅仁湯出聖濟總録治腸癰裡急隱痛大便閉塞梅核仁四十九個去皮尖大黃三兩牡丹皮一兩三分冬瓜仁四兩犀角鎊一兩半芒硝二兩半上㕮咀如麻豆大每服五錢水二盞煎一盞去滓溫服以下膿血三兩行為度赤茯苓散出聖惠方治腸癰小腹牢強按之痛小便不利時有汗出惡寒脈遲未成膿赤茯苓一兩甜瓜子二兩川大黃二兩銼碎微炒川芒硝半兩桃仁一兩浸去皮尖雙仁麩炒微黃牡丹一兩半上為粗散每服四錢水一中盞煎至六分去滓溫服日三四服之大黃湯出聖濟總録治腸癰小腹堅腫大如掌而熱按之則痛其上色或赤或白小便稠數汗出憎寒其脈遲緊者未成膿如脈數則膿已成大黃銼炒牡丹皮硝石研桃仁浸去皮雙仁麩炒芥子各半兩上粗搗篩每服五錢水二盞煎至一盞去滓空心溫服以利下膿血為度未利再服牡丹湯一名瓜子湯出千金方治腸癰小腹腫痞按之即痛如淋小便自調時時發熱自汗出惡寒其脈遲緊者濃未成可下之當有血洪數者膿已成不可下大黃蒸桃仁去皮尖各十兩牡丹皮一錢一字栝蔞子三分一作瓜子芒硝二錢上銼散以水三盞煎八分去滓入芒硝再煎沸不拘時頓服一方用冬瓜子一升無栝蔞子未效用敗毒散刪繁方用芒硝半合瓜子五合劉涓子用硝石三合云腸癰之病小腹痞堅或偏在膀胱左右其色或白堅大如掌熱小便自調時欲汗出其脈遲堅者未成膿可下之當有血脈數膿成不復可下薑黃散治內毒乾薑一兩大黃一兩生薑一兩皂角刺九個上用酒一碗水一碗同煎至一半去滓溫服滓酒水各一碗再煎溫服須用瓦器煎四聖散一名神效瓜姜散出直指方治腸癰癰疽生於腦髭背腋乳便毒神效生黃栝蔞一枚去皮粉草末四錢沒藥末三錢乳香末一錢上用好紅酒二大碗慢火煎至一碗分作兩服兩日服盡大便順下惡物妙若干栝蔞則用兩枚一方若病在上食後服病在下食前服毒已結成即膿化為水毒未成即於小便中出疾甚再合服以退為妙薏苡仁湯一名瓜子湯出千金方治腸癰薏苡仁一升牡丹皮桃仁各三兩瓜瓣仁二升上㕮咀以水六升煮取二升分再服姚氏不用桃仁用杏仁崔氏有芒硝二兩云腹中疼痛煩毒不安或脹滿不思飲食小便澀此病多是腸癰人多不識婦人産後虛熱者多成此病縱非癰疽疑是便服此湯瓜子汁出聖惠方治腸癰壯熱惡寒微汗氣急小腹痛小便澀或大便如刀錐刺痛或有濃腹中已成膿瓜子仁三合與水六合同研絞取汁當歸切焙一兩搗未蛇蛻一條燒灰研上將二味末和勻分作二服用瓜子汁調下空心日午服下膿血瘥薏苡仁附子敗醬散出鮑氏方治脈數身無熱腹無積聚按之濡此為腸癰及治腹癰有膿者薏苡仁二兩半附子炮半兩敗醬一兩一分上為銼散每服四錢水一盞半煎七分去滓空心服小便利為效一方入生薑半分同煎雞毛散出千金方治腸癰雄雞頂上毛燒灰雄雞屎燒灰各一兩上為細散每用溫酒二合空心調下一錢日晚再服燒棗散出直指方治腸癰干棗連枝燒存性川百藥煎研細等分上為末每服一錢米飲調下治腸癰腹脹皮急微汗小腹重強按之即痛小便數似淋未有膿方出聖惠方牛蒡根汁五合川芒硝一兩上藥相和煎一二沸分為二服空心及晚食前溫服治腸癰出千金方用截取檐頭尖少許燒灰水和服當作孔出膿血愈拔毒散出千金方凡腸癰其狀兩耳輪紋理甲錯初患腹中苦痛或繞臍有瘡如粟皮熱便膿血出似赤白下用馬蹄灰以雞子白和塗即拔氣不過再又方出千金方用瓜子三升搗末以水二升煮取一升五合分三服又方出千金方用死人冢上土作泥塗之治內癰未作頭者方出千金方取伏雞屎服之即瘥又方出千金方用馬牙灰和雞子塗之干則易治腸癰腹臟瘀血運撲損用大薊葉生研酒並小便任服惡瘡疥癬鹽研名四音又名刺薊山牛旁散治小腸癰毒皮軟癤不作頭本草以茅針濃煎和酒服木占斯散一名內補散治腸癰病在上當吐病在下當下膿血此謂腸癰之屬其癰腫即服諸疽痔若瘡已潰便早愈發背無有不療不覺腫去時常服去敗醬多治婦人諸産癥瘕益良方見內補散肺癰附論內經曰肺之癰喘而兩胠滿蓋肺主氣而合於息其脈反別者從肺系橫出腋下故邪氣蘊積於肺則上為喘急下連兩胠滿治宜瀉其肺臟之邪毒也肺癰病咳嗽膿血其脈數實者屬肺癰虛者屬肺痿咳而口中自有津液舌上胎滑此為浮寒非肺痿若口中辟辟燥咳即胸中隱隱痛脈極滑數此為肺癰也問曰病者咳逆師脈之何以知為肺癰當有膿血吐之則死後竟吐膿死其脈何類何以別之師曰寸口脈微而數三因云寸口脈數而實按之滑微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人口乾喘滿咽燥不渴多唾濁時時振寒熱氣之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿已成則難治寸口脈數趺陽脈緊寒熱相搏故振寒而咳趺陽脈浮緩胃氣如經此為肺癰師曰振寒發熱寸口脈滑而數其又飲食起居如故此為癰腫病醫者不知而以傷寒治之不應愈也何以知有膿膿之所在何以別知其處師曰假令膿在胸中者為肺癰其脈數咳唾有膿血設膿未成其脈自緊數若但數膿已成也凡病肺癰脈來短澀順浮大者死其色當白而多赤者亦死中府隱而微痛者肺疽也上肉微起者肺瘡也中府者穴也在雲門下一寸六分乳肋間動脈應手陷中也是以候始萌則可救膿成則多死若欲知有膿者但診其脈若微緊而數者未有膿也緊甚而數者已有膿也肺癰肺痿二證皆為難治肺癰者出於上焦客熱停於肺腑咳嗽胸膈內痛致使肺爛成癰唾膿如敗糊臭穢此難治脈關前緊後微小下虛上盛也古人以黃耆為主甘桔湯為佐然罕有安者以肺穿故儒門事親書云舞水有一富家二子長者年十三幼者十一歲皆好頓食紫櫻一二斤每歲須食半月後一二年幼者發肺癰長者發肺痿相繼而歿戴人常曰人之死者命耶天耶方生南星湯治肺有癰膿腥氣上衝嘔而咳嗽生南星一兩知母貝母去心炒生地黃阿膠炒川芎桑白皮炒甘草炙各三兩防風射干桔梗天門冬去心腦荷杏仁不去皮半夏治上銼散每四錢姜七片烏梅一個食後煎服紫蘇葉及白芷白芨各半兩桔梗湯出危氏方治男婦人咳而胸膈隱痛兩腳腫滿咽乾口燥煩悶多渴時出濁唾腥臭名肺癰小便赤黃大便多澀實者先投參蘇飲四服虛者先投小青龍湯四服並用生薑棗子煎卻服之桔梗去蘆貝母去心大當歸酒浸栝蔞仁枳殼去瓤炒薏苡仁微炒桑白皮炒甘草節防己去粗皮各一兩百合蒸半兩黃耆一兩半正地骨皮知母杏仁北五味子甜葶藶各半兩上銼散每服四錢水一盞半生薑五片煎不拘時溫服咳不渴加百藥煎熱加黃芩大便不利加煨大黃少許小便澀甚加木通車前子煎煩燥加白茅根咳而疼甚加人參白芷桔梗湯出濟生方治肺癰心胸氣壅咳嗽膿血心神煩悶咽乾多渴兩腳腫滿小便赤黃大便多澀桔梗去蘆貝母去心膜當歸去蘆酒浸栝蔞子枳殼去瓤麩炒薏苡仁炒桑白皮蜜水炙防己各一兩甘草節生用杏仁去皮尖麩炒百合蒸各半兩黃耆去蘆兩半上㕮咀每服四錢水一盞半姜五片煎至八分去滓溫服不拘時候若大便閉者加大黃小便閉者加木通理肺膏出危氏方治肺癰正作咳唾不利胸膈迫塞訶子去核百藥煎五味子微炒條參去蘆款冬花蕊杏仁知母貝母甜葶藶子紫菀百合甘草節各五錢上為末用白茅根淨洗稱三斤研取自然汁入瓷石器中熬成膏更添入好蜜二斤再熬勻候冷調和前藥為丸如梧桐子大溫水吞下黃耆散出聖惠方治肺癰心胸氣塞咳嗽膿血心神煩悶小便赤大便多澀黃耆一兩白蒺藜三分枳殼三分麩炒微黃去瓤紫蘇莖葉赤茯苓各一兩杏仁三分湯浸去皮尖雙仁麩炒微黃桑根白皮銼天門冬去心川大黃銼碎微炒各一兩當歸甘草各半兩生乾地黃一兩上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服葶藶散出危氏方治肺癰咳嗽氣急睡臥不安心胸脹滿甜葶藶子一兩半百合白附子北五味子炒甘草節羅參款冬花百藥煎各一兩紫菀去木一兩大硃砂五錢別研上為末每服二錢燈心湯調下升麻白蘞膏療腸癰肺癰方升麻白蘞漏蘆芒硝各一兩黃芩枳實炒連翹蛇銜各三兩梔子二十枚擘蒴藋根四兩上搗令細以水三升漬經半日以豬脂五斤煎令水竭去滓敷之日三若膠緊合水煎漢防己散出聖惠方治肺癰喘急咳嗽膿血心神煩悶咽乾多渴漢防己三分麥門冬三分去心桑根白皮一兩銼赤茯苓一兩枳殼三分麩炒微黃地骨皮三分前胡一兩去蘆黃耆一兩銼甘草半兩炙微赤銼上為散每服四錢水一中盞入生薑半分煎至六分去滓不拘時溫服牡丹散治肺癰胸乳間皆痛口吐膿血氣作腥臭川升麻苦梗薏苡仁地榆黃芩赤芍藥牡丹皮北甘草各等分上銼散每一兩水一升半煎五合溫服日三桔梗白朮湯治肺癰吐膿經時不瘥桔梗銼三升白朮生地黃焙薏苡仁甘草炙敗醬當歸切焙一兩桑根白皮銼一升上銼如麻豆以水一斗五升煮大豆四升取七升去豆內清酒三升合諸藥煮之去滓取三升每服一盞日三夜二升麻湯出經驗良方治肺癰吐膿血作臭氣胸乳間皆痛升麻桔梗薏米即苡仁地榆黃芩牡丹皮芍藥各五錢甘草七錢半生地黃湯治肺癰生地黃汁一升當歸切焙甘草炙白石英碎綿裹人參各一兩附子炮製去皮臍一兩白豆小者十粒白雞一雙男用雌女用雄制如食法一作雄上除地黃汁雞外銼如麻豆以水一斗五升先煎雞取七升汁去雞內地黃汁諸藥等煮取三升去滓每服一盞日三夜二服平肺湯治肺癰氣逆喘咳紫菀去土人參紫蘇去梗各一兩杏仁去皮尖雙仁麩炒橘皮湯浸去白焙各一兩黃耆一兩銼沉香半兩上㕮咀如麻豆每服五錢水一盞半煎至八分去滓溫服日三為效竹茹散出聖惠方治肺癰煩悶咳嗽膿血苦竹茹一兩生乾地黃一兩茜根半兩百合半兩杏仁半兩湯浸去皮尖雙仁麩炒黃耆一兩銼甘草半兩炒微赤銼上為粗散每服五錢水一大盞入生薑半分煎至五分去滓不拘時溫服內護排膿散出危氏方理肺癰吐膿後宜服排膿補肺嫩黃耆二兩川白芷北五味子炒人參各一兩上為末煉蜜丸如小指頭大偃仰入口含化旋旋咽下食後臨臥服專治肺癰證始萌易治膿成難治診其脈數而實症已成而膿清漸愈面色白嘔膿而止者自愈有膿而嘔食面色赤吐膿如糯米粥者不治男子以氣為主得之十愈二三婦女以血為主得之十愈七八青葦散出聖惠方治肺癰咳其聲破嗄體有微熱煩滿胸前皮甲錯者肺腫也青葦二莖薏苡仁一合甜瓜子二合桃仁五十枚湯浸去皮尖上搗碎先以水三大盞煎葦至一大盞去滓入薏苡仁等二味同煎至七分去滓不計時候分溫二服四順湯治肺癰吐膿五心煩熱壅悶咳嗽貝母去心桔梗炒紫菀去苗土各一兩甘草炙銼半兩上搗篩每服三錢水一盞煎五七沸去滓不拘時候稍冷服如咳嗽甚入去皮尖杏仁二枚同煎小兒量減華蓋散治肺癰上喘咳嗽胸膈滿悶口乾煩熱及吐血赤茯苓去黑皮甜葶藶隔紙炒桑根白皮銼各一兩大黃半兩濕紙裹煨熱上搗羅為散每服二錢姜水調下食後臨臥服葦葉湯出三因方治肺癰薏苡仁瓜瓣仁桃仁去皮尖各一兩上為銼散每服四錢水二盞先以葦葉一握煎取一盞去滓入藥六分食後服或吐膿血勿疑葶藶丸治肺癰甜葶藶隔紙炒別研細羅過杏仁去皮尖雙仁麩炒別研如膏各一兩貝母煨令黃色去心別搗再研半兩上先使不蛀皂莢肥者二兩生捶碎入在無灰酒半升內熟挼濾去滓入淨銚子中慢火熬成膏次將前三味藥拌勻旋入皂莢膏和丸如梧桐子大每服二十丸溫水下如肺氣喘急濃煎桑白皮湯下不拘時候服防己葶藶丸治肺癰防己一兩葶藶隔紙炒三分杏仁去皮尖雙仁麩炒研如脂一分上先搗前三味細羅為末與杏仁同研令勻取棗肉和丸如梧桐子大每日空心服煎桑白皮湯下二十丸日三服麥門冬湯治肺癰涕唾涎沫吐膿如粥麥門冬去心焙二兩桔梗去蘆頭五兩甘草炙銼三分上粗搗篩每服三錢水一盞青蒿葉十片同煎至七分去滓溫服稍輕者粥飲調下亦得不計時候杏仁丸治肺癰喘急杏仁去皮尖雙仁麩炒研入上搗羅為末煉蜜和丸如梧桐子大生薑蜜湯下十丸至二十丸食後臨臥服棗膏丸出醫方集成治肺積在右脅下大如杯發為癰疽陳皮桔梗葶藶研各二兩上前二味為末入葶藶研勻煮棗肉和丸如梧桐子大每服五七丸米湯送下薏苡湯治肺癰唾吐膿血薏苡仁二合黑豆百粒烏梅一個上水二盞煎至一盞入透明阿膠生蒲黃各一錢再煎沸食後服日二桔梗白散一名桔梗丸出聖惠方治咳胸中滿而振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如粳米粥者肺癰也桔梗三分貝母三分巴豆一分去心皮熬研作脂上搗篩強人服半錢羸人減之若病在膈上者必吐膈下者必利若利不止者飲冷水一杯則定忌豬肉蘆筍等葶藶湯治肺癰咳嗽上喘氣急不得臥涕唾稠黏胸膈不利葶藶隔紙後炒紫色別研如膏桑根白皮微火細銼大棗揀洗去核上用水三盞先煎桑白皮一兩棗十二枚取一盞半去滓入葶藶膏一彈子大攪化煎取八分溫服良久當吐惡物或微利三兩行其疾減後宜服補肺藥七日外病未退量人加減更一服一方瀉肺湯無大棗薏苡仁湯治肺癰心胸甲錯者薏苡仁一升苦酒三升上同煮取一升去滓微溫頓服有膿血吐出驗補肺散治肺癰已吐出膿血以此潤護真鍾乳粉一兩白滑石上為末每服三錢米飲調下夜合湯一名黃昏湯出聖惠方治肺癰咳嗽體有微熱煩滿胸前皮甲錯者用夜合白皮一兩銼以水三盞煎取一盞半分溫二服排膿散出聖惠方治肺癰得吐膿血喘急此藥排膿補肺用綿黃耆去蘆二兩生用為細末每服二錢水一盞煎至六分溫服吐膿後用甜葶藶二兩半隔紙炒令紫色為末每錢煎六分溫服治肺癰方出聖惠方薏苡為末糯米飲調下又粥內煮吃亦可一方水煎服當下膿血便愈葶藶大棗瀉肺湯出聖惠方治肺癰胸脹滿一身並面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞飲不得息以葶藶炒令黃研細丸如彈子大用水三盞煮棗十枚至一盞去棗入藥煎至七分食後服金匱令先投小青龍湯三服乃進此藥一方去棗水煎服治上隔壅熱而成肺癰兼感風寒重出用加味敗毒散入黃芩栝蔞仁薄荷當歸川白芷半夏烏梅桑白皮半料各五錢生薑生地黃燈心白茅根煎熱甚加大黃治腹癰為病小腹重抑之則痛小便數時時汗復惡寒其身背甲錯或繞臍生瘡或膿出大便療之方亦治腸癰肺癰搗生鯽魚令熟以醇酒加塗腹上集驗方出肘後方療胸中滿而振寒脈數咽燥不渴時時出濁唾腥臭久久吐膿如糯米粥是肺癰治之一名桔梗湯桔梗甘草各二兩炙上以水三升煮取一升分再服朝暮吐膿血則愈一方溫服如人行八九里再服金沸草散如宜方治肺癰嗽出膿血神悶咽燥渴大小便澀荊芥穗四兩半夏制甘草各一兩麻白制前胡旋覆花各二兩赤芍藥一兩上㕮咀薑棗煎熱服後服防己丸又紅棗百藥煎等分燒灰存性為末飲湯下桔梗湯出衛生家寶方治肺癰初萌桔梗甘草薏苡仁各二兩上為粗末每服五錢水二盞煎至一盞去渣服治肺癰喀血出永類鈐方以薏苡仁為末熟煮豬胰切片蘸藥食候空時食之蓋苡仁補肺豬胰引入經絡又薏苡仁三合搗爛水二大盞煮一盞去滓分二服佳肺癰咳血經效出永類鈐方馬兜鈴桑白皮地骨皮並蜜微炒桔梗薏苡仁以食後粳米一撮入生地黃汁少許補肺散出永類鈐方人參北五味黃耆上用羊肺豬肺瓦器煮食蘸好鍾乳粉便癰附論大便癰者謬名也乃男子血疝也難素所不載然而足厥陰肝之經絡是血流行之道路也衝脈任脈督脈亦屬肝經之旁絡也難經曰男子七疝血疝乃七疝之一也治以導水丸桃仁承氣湯或抵當湯投之若瘀血聚而不散可以大作劑料大瀉一二十行以玉燭散和血通經之類是也世人多用大黃牡蠣間有不愈者是不知和血通經之道也方七聖散治便癰大黃山梔牡蠣生栝蔞金銀花皂角針火燒出火氣甘草各等分上為細末每服半兩生薑一大塊酒水各一盞煎耗半去滓空心服以通利為度卻以藥安於腫處仍用扯自身衣帶縛住腳大指隨病左右乳香定痛膏出經驗良方治便癰先服復元通氣散黑神散打和酒調服以藥調塗南星半夏殭蠶各半兩柏霜葉一兩即芙蓉葉沒藥乳香各一兩上為末薑汁調塗極能定痛消腫及治腫毒無名惡瘡栝蔞散出瑞竹堂治便癰等惡瘡栝蔞一個去皮生薑半兩甘草半兩金銀花三錢牛蒡子三錢微炒上將藥不犯銅鐵捶碎用酒一大升煎數沸空心溫服微利為度便癰方出神效方便癰本名血疝牡蠣大黃甘草各半兩懸蔞一個案此方缺製法及服法三物湯治便癰牡蠣大黃山梔子各等分上為末水酒一大盞煎至七分露一宿溫起空心服治便癰朴硝末三錢乾薑末一錢上作一服用無灰好酒半碗空心調下宣毒散治便癰腫毒大黃一兩牡蠣一兩炒上為細末每服三錢酒二盞煎至六分和滓溫服以利為度水調掃腫上即消治便癰出神效方用冬葵子為末酒調下三兩服又方治便癰俗名𤻼𤷍欲作未作之時用皂莢不蛀者燒過陰乾為末酒調服之皂角子七個服之亦效胡桃酒方出神效方用胡桃七個燒過陰乾為末酒調服不過三服生蜜粉方出神效方用生蜜米粉調服休吃飯利小便為度治便癰出危氏方牛蒡子破故紙大黃黑牽牛上等分為細末空心酒調下一服即消神效樺皮散出永類鈐方治便癰初發即用樺皮杏仁皂角刺甜桃十二枚山梔五味各燒灰三錢穿山甲黃土炒三錢乳香沒藥各二錢酒浸別研調和麝香少許共九味前六味並作末卻加下三味可作六服酒調猛進二服即見效經驗只用豬牙皂角煨令黃色作末酒調效初發時服五香連翹散吞皂角煎丸用復元通氣散不及此淮人用蜀葵子七粒皂角半梃作末以石灰同醋調搽貼獨子肥皂莢同蒜搗貼亦佳身熱脈實先服敗毒散數服住已潰者太乙膏貼又四住散一兩十宣散二兩打和酒調又擂蔥根入蜜和勻貼腫處用紙不令走氣內服樺皮通氣等散一云服樺皮散前用胡桃煎於油中卻用酒空心嚼胡桃使大便稍利卻用樺皮散一云穿山甲燒存性為末酒服後用土塗瘡上未成即消已成即潰初作宜服復元通氣散為先腎癰附論夫腎癰於內腎相對皆由腎氣衰敗而成突起皮赤者易安陷入皮黑者難痊如精神清爽顏色紅潤飲食不減多起少臥此為善義也顏色黑黃飲食全減斯為可憂惟須詳審速療腎癰乃將理失宜勞傷氣血風寒之氣乘虛而入內舍於腎及挾邪熱其氣結聚或作寒熱脈數而實者是也消毒散出百一選方治男子腎癰婦人乳癰一切赤腫焮毒服之自散赤土一皂子大木鱉子七個炮去皮上同研令極勻分三服熱酒或米飲調下食後服不動臟腑不過一劑效治外腎癰瘡用抱雞卵殼鷹爪黃連輕粉等分為末煎過清油調塗治丈夫陰頭癰出肘後方用鱉甲一個燒為末以雞子白和敷之治腎癰及天行熱疾用烏賊骨末粉敷之甘草膏出百一選方治水穀道前後生癰謂之懸癰乃肛門及膀胱處生核子如橄欖樣或梅李狀初不作痛至旬日漸作熱不早治瘡潰膿血出日數碗有至腸腐而大便從瘡口出者其苦不可言近以數月遠至一二年亦愈須是作核未痛以前治之不過一二服便自消此病初發如松子大漸如蓮子數十日後如覺赤腫似桃李即破若破則難治服此藥此癰已破服此藥二服瘡口即合甚妙用粉草半斤內用無節者四兩如算子樣劈破了取泉石間長流水以甘草入水中浸透以炭火將甘草蘸水焙炙以一碗水盡為度不可急性擘開和將所炙甘草另用泉水五盞無灰好酒五盞用瓦罐煎至二之一如膏一起服之立愈另用有節甘草四兩仍用泉水隨罐大小煎湯漉洗患處三遍其效如神如水冷再溫熱洗一方治懸癰卒腫用硼砂半錢綿裹含咽津瘥治懸癰大黃甘草節貝母白芷上為末小酒調兼治弩氣諸瘡癤瘥虛弱人加當歸一半大黃煨一半治懸癰乖宜咽中妨悶出本草白礬一兩焙灰鹽一兩上細研為散以箸頭點藥在上瘥附骨癰附論凡身體盛熱不可當風蓋風冷之氣入於肌內則熱氣搏伏不得出故附著於骨而成癰也其狀無頭但腫而闊皮膚薄澤者以毒氣伏留於內故也法宜外散其寒內達蘊熱乃得標本之治乎方金石凌法出聖濟總録治附骨癰梔子仁半斤犀角屑麝香研各半兩桔梗銼炒二兩半石膏捶碎寒水石捶碎各四兩木通銼甘草銼炙鬱金銼各二兩青木香銼一分朴硝研四斤金二十兩上除朴硝麝香外先將寒水石石膏金以水二斗於銀器內慢火煎至一斗次下前犀角等藥七味再煎至五升以生絹濾去滓下朴硝以柳木篦攪勿住手候稍凝即住火入麝香拌令勻盛密器中每服一錢新水調下老幼加減服貫衆湯出聖濟總録治附骨癰生股上伏肉腠貫衆地骨皮穀精草枇杷葉拭去毛炙荊芥去梗蜀椒去目並閉口者各一兩案此方缺製法及服法當歸散出神效方治附骨癰及一切惡瘡當歸半兩甘草一兩山梔子十二個木鱉子一個去皮上為細末每服三五錢冷酒調下密陀僧散出聖濟總録治附骨癰密陀僧自然銅各半兩杏仁去皮尖雙仁二七枚上用苦竹筒一枚入藥在內紙封筒口慢火煨候竹筒黃色取研極細看瘡大小用藥以新汲水調勻用雞翎掃藥塗癰上甚者不過二七日效蛇皮散一名三生散治附骨癰疽癰腫疔腫諸毒根在臟腑瘡口久不合蛇皮露蜂房亂髮各半兩上燒灰存性研細每服二錢溫酒調下日三服一方其蜂房用櫥上懸得風露者其蜂黃黑色長寸許螫馬牛人及自死者用此皆有效非人家屋下小小蜂房也牛膠散出聖濟總録治附骨癰牛皮膠黃明者慢火炙令黃甘草用水一盞蘸炙水盡銼各半兩上為散每服二錢濃煎木賊湯調下空心服復取藥末以井水調膏看瘡大小攤紙貼之甘草湯出聖濟總録治附骨癰甘草炙二兩露蜂房一兩上銼以水五升煎至三升去滓以故帛二片浸湯中更互洗瘡上日三槲皮散出聖濟總録治附骨癰疽用槲皮三兩燒令煙盡細研為末每服二錢空心米飲調下日晚再服治附骨癰方出聖濟總録用生地黃取汁一盞於銀石器中煎如膏候冷塗敷腫上日三五度又方出聖濟總録用新鼠皮一張看瘡大小裁貼日二次出膿若已潰者用豬脊脂貼吮膿出盡即瘥五香連翹湯一名連翹散治附骨癰結核膿水腫痛心腸氣滿方見本門發背類內托黃耆柴胡湯出試效方治附骨癰黃耆二錢柴胡一錢羌活五分連翹一錢三分肉桂三分土瓜根一錢酒製生地黃一分黃柏五分當歸尾七分半上㕮咀作一服水三盞酒一盞同煎至一盞去滓熱服宿食消盡服一服而愈昔賈德茂男年十歲丁未四月十一日於左腿近膝股內出附骨癰肉色不變漫腫皮澤未硬瘡勢甚大其左腳乃肝之脾土也在足厥陰肝經之分少侵足太陰脾經之分具脈左三部細而弦按之洪緩微有力一方無黃柏內托黃耆酒煎湯出試效方治附骨癰柴胡一錢半連翹一錢肉桂一錢黍黏子炒一錢黃耆二錢當歸尾二錢黃柏五分升麻七分甘草炙五分上㕮咀好糯米酒一盞半水一大盞半同煎至一大盞去滓溫服空心宿食消盡服之待少時以早膳壓之使不令大熱上攻中上二焦也丁未季春二十二日蒲度主老七十因寒濕地氣得附骨癰於左腿外側足少陽膽經之分微侵足陽明分闊六七寸長一尺堅硬漫腫不變肉色皮澤深但行步作痛以指按至骨大痛與藥一服立止再日堅硬而腫消石癰附論夫人之氣血得熱則潤澤得寒則凝結石癰者寒氣凝結致熱一氣不得散故其腫結確實有核皮肉不甚熱微痛熱時自歇此寒多熱少堅硬如石之狀而謂之石癰久久熱氣乘之乃有膿也治宜溫調營衛散其寒邪使氣得陽而外發則腫硬自消而膿血出矣方沉香湯治石癰腫毒結硬疼痛口乾煩熱四肢拘急不得臥犀角湯出聖惠方治石癰熱毒氣盛腫硬疼痛口乾煩悶犀角湯鎊三分連翹射干梔子仁升麻當歸切焙各一兩大黃銼炒二兩木香三分枳殼麩炒赤芍藥上粗搗篩每服三錢水一盞煎六分去滓不計時候溫服占斯散治石癰結實已壞未壞升麻湯出聖濟總録治石癰皮色紫赤惡寒壯熱一二日未成膿者下之治石疽堅硬升麻連翹大青各一兩生地黃焙二兩敗醬絡石白蘞各半兩人參一兩大黃銼炒二兩上粗搗篩每服五錢水一盞半煎八分更入芒硝末半分去滓空心溫服微利為度黃連散出聖惠方治石癰結硬發熱紫赤色毒氣攻衝未定日夜疼痛宜用此消腫化毒止痛黃連川大黃生用白蘞馬牙黃柏銼各一兩青鹽麒麟竭各半兩赤小豆半兩炒熟杏仁四十九枚湯浸去皮尖研用上為細散用蜜水調塗癰上干則易之凝水石散出聖濟總録治癰疽結硬未成膿貼之凝水石黃柏黃耆銼黃連去須大黃石膏梔子仁白蘞各一兩上搗羅極細以漿水調如糊攤故帛上貼患處大黃散出聖惠方治石癰腫硬疼痛心腹煩悶不得宣暢川大黃一兩銼碎微炒當歸一分川芒硝黑豆皮枳殼麩炒微黃各半兩牛蒡子一分微炒芎藭一分甘草半兩生銼上為散分為三服每服水一大盞煎至五分去滓不計時候溫服以利為度木香散出聖濟總録治石癰已服前升麻湯後用此貼塗木香大黃銼炒升麻白蘞各半兩芒硝赤小豆各半兩上為散以榆白皮汁入水少許調和如糊塗故帛上貼之日二雄黃散出聖惠方治石癰風毒初結焮核堅硬雄黃細研川大黃生用磁石搗碎細研白礬燒令汁盡細辛各半兩上為細散用雞子白和生蜜調塗之干則易也練石散出千金方治癰有堅硬如石核者復大色不變或作石疽粗理黃石一斤鹿角一兩燒白蘞三兩上用醋五升先燒石令赤內醋中不限數醋減半止總搗末以余醋和如泥厚敷之干則易取消止盡更合諸漏及瘰癧其藥悉皆用之仍火針針破頭敷藥又單磨鹿角半夏末和敷之黃耆當歸散出聖濟總録治石癰久不瘥黃耆銼十兩當歸切炒八兩上為散每服三錢溫酒調下不計時候蜀漆方出聖濟總録治石癰疽蜀漆乾者半兩桑根白皮二兩上為末量多少而用以熔牛皮膠並酒調和敷腫處日三五次又方出聖惠方治石癰堅如石不作膿者梁上塵葵根莖葉各等分上醋和敷之即瘥並治石疽又塗半夏方出聖濟總録治癰疽結硬未成膿用半夏一兩為末以新水和如糊塗患處日三五次又塗莨菪子方出千金方用莨菪子二兩為末以醋調如糊塗患處干即易一方治癰始覺腫令消用莨菪末三指撮水和服之治石癰堅如石不作膿者方出千金方用生商陸根不拘多少熱搗敷之干則易取軟為度及治濕漏諸癰癤蛇蛻散出千金方用蛇蛻皮貼之經宿便瘥一方燒灰細研以醋調塗腫上又方出千金方用櫟子一枚以醋於青石上磨之以塗腫上干易不過十度愈赤小豆方治發癰至堅而有根者名為石癰治療之法當服非酒即藥勢不宜但當稍飲取令相得和散便止凡癰腫有肥人用貼宜栝蔞根和平體氣用赤小豆五合內苦酒中熬之畢搗為散以苦酒和塗擦紙上貼腫從發腫兩頭治石癰發腫至堅而有根者方出千金方用桑根白皮搗末酒敷之一方陰乾搗末煬膠和酒附腫根即拔治石癰堅如石不作膿者方出聖惠方用芫花為末水和如膏塗之胃脘癰附論內經謂人病胃脘癰者當候胃脈其脈沉細者氣逆氣逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰夫陰陽升降則營衛流通氣逆而隔則留結為癰胃脘癰者由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃脈沉細以陽氣不得下通故人迎甚盛令人寒熱如瘧皮甲錯或咳或嘔或唾膿血觀伏梁之病亦有挾胃脘癰者以其里大膿血居腸胃之外故也方連翹升麻散出聖惠方治熱聚胃脘留結為癰連翹升麻射干去尾獨活去蘆頭桑寄生木通銼各二兩半大黃銼微炒二兩以上搗為粗末木香沉香鎊薰陸香丁香麝香各等分以上搗研為細末上煎藥五錢水二盞煎至一盞半去滓入後五香末二錢再煎至一盞溫服日三服以快利為度芍藥湯出聖濟總録治胃脘蓄熱結聚成膿赤芍藥犀角鎊木通銼石膏碎升麻各二兩甘草銼朴硝玄參麥門冬去心各一兩上粗搗篩每服五錢水一盞半煎八分去滓溫服不計時候麥門冬湯出聖濟總録治熱氣留聚胃脘內結成癰麥門冬去心焙犀角鎊葳蕤薺苨赤芍藥石膏各一兩半甘草炙銼紅雪各一兩上粗搗篩每服五錢水一盞半煎八分去滓入竹瀝一合再煎三二沸溫服犀角湯出聖濟總録治胃腑實熱留結為癰陽氣不得下胃脈沉細者犀角鎊梔子仁赤芍藥赤茯苓去黑皮黃芩去黑心射干去毛大黃銼炒各一兩上粗搗每服五錢水一盞半煎至一盞濾去滓入蜜一匙攪勻再煎一兩沸食後溫服射干湯出聖濟總録治營衛不流熱聚胃口血肉腐壞胃脘成癰射干去尾梔子仁赤茯苓去黑皮升麻一兩赤芍藥白朮各一兩半上㕮咀麻豆大每服五錢水一盞半煎至八分去滓入生地黃汁一合蜜半合再煎三沸溫服不拘時候日二服癰有膿附論夫癰有膿者由寒氣搏於肌肉折血氣結聚乃成癰也凡癰不瘥不復可消者若按之都牢強者未有膿也按之牢強半軟者有膿也又手掩上不熱者為無膿若熱甚者有膿也凡覺宜急破之不爾侵蝕筋骨也方托裡排膿散出聖惠方治癰疽一切瘡腫木香一分黃耆三分銼白蘞一分占斯芎藭當歸銼微炒細辛桔梗去蘆頭赤芍藥檳榔敗醬甘草炙微赤銼桂心羌活白芷各一分上為細散每服二錢食前甘草湯調下雄黃散出聖惠方治癰疽赤腫疼痛未得膿潰貼成膿雄黃三兩細研麝香一兩細研木香半兩川大黃三分黃連一兩白芷二分桂心半兩當歸三分麩微炒黃柏三分銼檳榔二分芎藭半兩麒麟竭三分上為細散用臘月豬脂調令勻塗於絹上貼腫處候膿潰後即用膏藥搜膿生肌龍骨散出聖惠方治癰疽赤腫未得膿潰化膿止痛龍骨一兩川大黃半兩生用白蘞半兩黃耆半兩銼黃芩半兩白芨半兩牡蠣半兩燒為粉雌黃半兩細研甘草半兩芎藭半兩上為細散用豬膽調令如膏攤於帛上塗貼取穴為度大黃散出聖惠方治癰腫已作膿宜貼之川大黃當歸各一兩細辛半兩木通銼芎藭黃連赤芍藥黃耆銼白芨各一兩上為細散每用以雞子白和塗於故細布上以貼腫處燥復易之黃耆散出聖惠方治癰腫惡瘡排膿黃耆一兩半銼白蘞赤芍藥芎藭赤小豆各一兩附子羊桃根銼䕡茹牡蒙各半兩案此方缺製法及服法當歸散出聖惠方治癰疽瘡等熱毒熾盛不散已成膿潰痛不可忍止痛搜膿當歸一兩羊桃根一兩銼桂心半兩白蘞一兩木香半兩丁香榆白皮一兩銼漢防己一兩上為細散用醋漿水調如膏貼於腫上干即易之丹粉散出聖惠方治癰腫惡瘡中膿水及新瘡口未乾宜用此散令乾方黃丹二兩定粉二兩白礬二兩上藥研入瓷瓶內用鹽泥固濟慢火熁令乾後即用大火煅通赤候冷將出細研敷瘡密陀僧散出聖惠方治癰腫穴後及惡瘡膿水雖減肌肉不生宜此密陀僧一兩黃連一兩去須檳榔二分上為細散日三貼之治癰腫惡瘡內膿不止出聖惠方用蝟皮燒灰細研內瘡孔中癰煩渴附論夫癰者因寒搏於血血澀不通而熱歸之壅結所成熱氣不得宣泄內熏五臟故煩躁而渴也凡癰腫熱渴者則引飲冷氣入於腸胃即變下利亦變嘔噦所以然者本由虛熱氣逆故嘔噦逆冷乘之故下利也方連翹散出聖惠方治癰腫焮痛口乾煩渴不欲飲食連翹一兩半葛根銼川升麻枳殼麩炒微黃黃芩藍葉赤芍藥玄參白蘞羚羊角屑木通銼黃耆銼川大黃銼碎微炒甘草銼各一兩上為粗散每服四錢水一中盞煎至六分去滓不計時候溫服之黃耆散出聖惠方治癰腫體熱煩渴肢節拘急肩背疼痛黃耆一兩半生乾地黃一兩赤芍藥半兩川大黃一兩半銼碎微炒赤茯苓知母柴胡去苗川升麻各一兩當歸半兩木通一兩銼甘草半兩生銼羚羊角屑一兩上為粗散每服四錢水一中盞入小麥一百粒煎至六分去滓不拘時溫服犀角散出聖惠方治癰腫初發熱盛口乾煩渴四肢拘急骨節疼痛犀角屑知母各半兩木通三分銼赤芍藥川升麻各半兩川大黃一兩銼碎微炒葳蕤黃芩各半兩麥門冬三分去心甘草半兩生銼馬牙硝一兩半上為粗散每服四錢水一中盞煎至六分去滓不計時候溫服下三二行為度玄參散出聖惠方治癰腫成膿水不能下食心熱口乾煩渴飲水四肢羸瘦玄參一兩川升麻三分白蘚皮一兩黃連一兩去須木瓜根一兩麥門冬一兩去心赤芍藥一兩川大黃一兩半銼微炒大麻仁一兩半川硝一兩半上為散每服三錢水一中盞入生地黃一分細切煎至六分去滓不拘時溫服葛根散出聖惠方治癰腫熱甚口乾煩渴或時乾嘔葛根一兩銼甘草半兩生銼黃耆一兩銼川升麻栝蔞根麥門冬去心赤芍藥生地黃梔子仁各一兩黃芩三分上為粗散每服四錢水一中盞煎至六分去滓不拘時溫服之癰虛熱附論夫發癰虛熱者由寒客於經絡使血氣痞澀及結腫成癰熱氣壅結則血化為膿膿潰既瘥之後餘熱未盡而血氣已虛其人翕翕苦熱惙惙虛乏故謂之虛熱也方熟地黃散出聖惠方治癰發後膿潰不止肌體虛熱口乾少食熟乾地黃黃耆銼麥門冬去心各一兩黃芩半兩人參一兩去蘆頭石膏二兩芎藭當歸各半兩白茯苓一兩甘草半兩生用上為散每服四錢水一中盞煎至六分去滓不拘時溫服黃耆散出聖惠方治癰膿潰數日不止致體虛煩熱頭目昏悶黃耆銼防風去蘆頭川升麻羚羊角屑各一兩芎藭三分甘草半分人參一兩去蘆頭地骨皮半兩白茯苓石膏各一兩上為散每服四錢水一中盞煎至六分去滓不拘時溫服沉香散出聖惠方治癰膿潰已絶肌肉內虛尚餘熱不退沉香一兩銼黃芩甘草生銼各半兩熟乾地黃二兩柴胡一兩去苗栝蔞根半兩白朮三分麥門冬一兩去心黃耆一兩銼上為粗散每服四錢水一中盞入竹葉二七片小麥五十粒煎至六分去滓不拘時溫服人參散出聖惠方治癰穴後膿水過多致內虛熱人參一兩去蘆頭白朮三分麥門冬一兩去心地骨皮半兩熟乾地黃黃耆銼白茯苓各一兩甘草半兩生銼上為散每服四錢水一盞煎至六分去滓不拘時溫服
