body:
  text: 卷二百八十六癰疽門諸癰附論癰者六腑不和所生也六腑主表氣行經絡而浮喜怒不測飲食不節陰陽不調則六腑不和營衛虛者腠理則開寒客於經絡經絡為寒所折則營衛稽留於脈營者血也衛者氣也營血得寒澀而不行衛氣從之與寒相搏壅遏不通氣者陽也陽氣蘊積則生瘀熱寒熱久不散故積聚成癰腑者陽氣浮行主表故癰浮淺皮薄以澤久則熱勝於寒熱氣蘊結傷肉敗肌故血肉壞化為膿其患在表浮淺則骨髓不焦枯腑臟不傷敗故可治也五常政大論云天傾西北左寒右涼地陷東南右熱左溫高者寒下者熱故寒涼者脹溫熱者瘡下之則脹已汗之則瘡已東南二方在人則為丙小腸熱甲膽風小腸與膽皆居其下其性炎上其瘡外有六經之形證內無便溺之阻隔飲食如故清便自調知不在裡非疽瘡也止癰癤也小則為癤大則為癰其邪所受於下風濕之地氣自外而來侵加於身者也經云營氣不從逆於肉理乃生癰腫病機云諸痛癢瘡瘍皆屬心火此瘡自外而入是丙小腸左遷入於膽作痛而癢也此二方皆主血血為病必痛此元氣不足營氣逆行其初出未有傳變在於肌肉之上皮毛之間只於風熱六經所行經絡地分出矣宜瀉其風濕熱醫者只知陰復其陽則宜汗也此宜發汗者乃濕熱鬱其手足少陽致血脈凝逆使營氣周身元氣消弱也其風熱鬱滯於下其面色赫赤面腫微黯東方青埋沒之色也風木之性上衝顏必忿色其人多怒而瘡之色亦赤赫腫硬微帶黯色其瘡之形勢亦奮然高起結硬而作痛也其肺只在左手屬表左寸外洪緩左關洪緩而弦是客邪在血脈之上皮膚之間宜急發其汗而通其營衛則邪去矣以內托營衛湯發之瘡蕩者火之屬須分內外治其本若其脈沉實當先疏其內以絶其源也其脈浮大當先托裡恐邪氣入內也有內外之中者邪氣至盛遏絶經絡故發癰腫此因失托裡及失疏通又失和營衛也治瘡之法大要須明托裡疏通行營衛之三法內之外者其脈沉實發熱燥煩外無焮赤痛深於內其邪氣深矣故先疏通臟腑以絶其源外之內者其脈浮數焮腫在外形證外顯邪氣恐急而內攻故先托裡也內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和營衛也用此三法之後雖未瘥必無變證亦可使邪氣峻減而易愈脈數身無熱即內有癰諸浮數脈當發熱而反淅淅惡寒若有痛處當結為癰脈微而遲必發熱脈弱而數此為振寒當發癰腫脈浮而數身體無熱其形默默胃中微燥不知痛處其人當發癰腫脈滑而數滑則為實數則為熱滑則為營數則為衛營衛相逢即結為癰熱之所過即為癰膿身體有痛處時時苦有瘡凡癰發腫高者疢源淺腫下者疢源深大者易療小熱者難療初便大痛傷肌晚乃大痛傷骨都堅者未有膿半堅半軟者有膿發腫都軟者血瘤也非癰發腫以漸知長引日月亦不熱時時牽痛瘤也非癰諸氣結亦有腫久久不消成癰療之宜散氣氣已散若初腫處有浮氣年衰皆發癰療之宜及年盛並折散熱可無此憂發癰堅如石走皮中無根瘰癧也久不消因得他熱之疾時有發為癰也無虛勞腹中之疾或發血瘤瘡瘡狀墳起頭正盤直不當灸療療之火尉便焦爛剝刮去焦痂則血泄不可禁必死凡癰無問大小已覺即取膠如手掌大暖水浸令軟納納然稱大小當頭上開一孔如錢孔大貼腫上令相當須臾乾急若未有膿者即定不長已作膿者當自出若以鋒針當孔上刺至膿大好至瘥乃去其膠凡癰高而光大者不大熱其肉正平無尖而紫者不須攻之但以竹葉黃耆湯申其氣耳肉正平為無膿也癰卒痛以八味黃耆散敷之大癰七日小癰五日其自有堅強者寧生破髮乳若熱手不可得近者先內服王不留行散外摩發背膏若背生破無苦在乳宜令極熟候手按之隨手即起者瘡熟也須針之針法要得著膿以意消息胸背不過一寸斟量不得膿即與食肉膏散著兌頭內癰口中如體身熱歇即服木占斯散五日後癰欲著痂者即服排膿內塞散凡癰破之後便綿惙欲死內寒外熱腫自有似癰而非者當以手按腫上無所連乃是風毒勿針之宜服升麻湯外摩膏破癰口當令上留三分近下一分針之務令極熱熱便不痛破後敗壞不差者作豬蹄湯洗之日二夏用二日冬用六七日用湯半劑亦可夫癰壞後有惡肉者宜豬蹄洗去穢次敷食肉膏散惡肉盡後敷生肉膏散及摩四邊令好肉速生當斷絶房室忌風冷勿自勞煩待筋脈平復乃可任意耳緣新肉易傷傷則里潰潰則重發發則難救慎之慎之白痂最忌治癰久瘡口不合其肉白而膿血少此為瘡口冷滯乃病人氣血枯竭不潮於瘡遂致如是合用此艾葉一把入瓦器內濃煎湯避風處乘熱用艾湯澆洗瘡口四圍淨肉以絹帛兜艾葉乘熱澆沃一日一次洗了須避風仍燒松香以煙燻瘡口良久用神異膏貼之其瘡勿令厭穢之人見若不能禁忌瘡口難安藥亦無效方五香丸出千金方治虛勞客熱數發癰腫瘡癤熟地黃四兩黃耆黃芩大黃黃連澤瀉細辛各三兩甘草桂心芍藥茯苓乾漆各二兩人參一兩天門冬五兩上為末蜜和丸如梧桐子大酒服十丸日三夜一加至二十丸久服終身不發癰疽凡方中用大黃薄切五升米下蒸熟曝乾用之熱多倍大黃一方無澤瀉玄參散出聖惠方治癰腫始發熱毒氣盛寒熱心煩四肢痛疼玄參半兩甘草半兩生銼麥門冬三分去心前胡去蘆頭枳實麩炒微黃人參去蘆頭赤芍藥生乾地黃黃耆芎藭赤茯苓黃芩各一兩石膏二兩上為散每服四錢水一中盞入竹葉二七片小麥一百粒煎六分去滓不計時候溫服黃耆散出聖惠方治癰腫熱氣太盛寒熱進退黃耆銼川升麻川大黃銼碎微炒黃芩遠志去心赤茯苓赤芍藥各一兩生乾地黃二兩當歸半兩麥門冬一兩半去心人參半兩去蘆頭甘草半兩生銼上為散每服四錢水一中盞煎至六分去滓不計時溫服之生地黃散出聖惠方治發癰腫熱腫疼痛心神煩悶生乾地黃二兩玄參二兩甘草生銼赤芍藥黃耆銼木通銼黃芩當歸銼微炒地骨皮各一兩赤茯苓一兩半川升麻一兩川大黃一兩銼碎微炒上為散每服四錢水一中盞入竹葉二七片煎至六分去滓不計時候溫服蛇銜膏出肘後方療癰腫瘀血産後血積耳目暗等牛領馬鞍瘡蛇銜大黃附子去黑皮芍藥當歸細辛黃芩大戟椒去目莽草獨活各一兩薤白十四莖上切以苦酒淹一宿以鉢中盛煉豬膏二升龍銜藤一兩合膏煎名龍銜膏今又有龍草似蛇銜而葉大耳亦有取其根合煎者亦名龍銜膏肘後方云於七星火上合熬絞去滓溫酒服如彈丸一枚日再病在外摩敷之耳病以綿裹塞之目病如黍米注眥中一方不用大戟連翹飲治癰腫瘡癤排膿連翹防風去蘆各三兩玄參白芍藥薺苨各二兩甘草炙銼一兩桔梗銼炒白茯苓去黑皮各一兩黃耆銼四兩黃芩去黑心二兩桑根白皮銼炒二兩半前胡去蘆頭人參各一兩上搗篩每服五錢水一盞半煎取八分去滓溫服日二次玄參散治一切癰疽瘡腫玄參黃芩去黑心羊蹄根芍藥白芷丁香木香硝石碎半夏湯泡七次白蘞木鱉子去殼莽草上為散以醋調塗日三犀角散出聖惠方治初見皮膚有瘡恐成癰腑臟壅澀或寒熱噤癢口乾心煩犀角屑知母各一兩木通二兩銼赤芍藥川升麻薺苨葳蕤黃芩甘草生銼各一兩半麥門冬去心馬牙硝各二兩上為粗散每服四錢水一中盞煎六分去滓入竹瀝一合更煎一沸不計時候溫服內消散出聖惠方治癰腫結硬疼痛赤小豆一合熬令熟人參一兩去蘆頭甘草一兩生銼瞿麥一兩白蘞一兩當歸銼微炒黃芩防風去蘆頭黃耆銼沉香川升麻各一兩上為細末不計時候以溫水調下二錢犀角丸出聖惠方治癰腫及發背乳癰一切腫毒悉能內消腫化為水犀角屑川升麻防風去蘆頭黃芩當歸銼微炒梔子仁吳藍甘草生銼川大黃碎銼微炒巴豆半兩去皮心研紙裹壓去油黃香一兩半銼上為細末煉蜜和搗三五百杵丸如梧桐子大每服空腹以粥飲下三丸得快利為度即吃冷白粥止之未利加至五丸亦可松脂膏療癰腫膿潰內服藥外宜貼膏松脂一斤煉煮膒脂三合生椒葉一兩白蠟三兩蛇含黃耆芎藭白芷當歸細辛芍藥各一兩上切以水先煎脂蠟煬盡內諸藥三上三下白芷色黃膏成用剪故帛量瘡大小塗膏貼之日夜各一松脂貼方出千金方療癰腫當歸黃耆黃連芍藥蠟黃芩芎藭大黃各一兩細切松脂一斤半膒脂一合半上切以微火煎之三上三下綿布紋去滓向火塗生箋紙上隨大小貼之日三葛根散出聖惠方治癰腫乳癰臟腑壅滯口乾寒熱頭痛嘔噦不能下食葛根銼麥門冬去心紅雪各一兩犀角屑半兩葳蕤薺苨赤芍藥甘草生銼各三分石膏二兩上為粗末散每服四錢水一中盞煎六分去滓入竹瀝一合復煎一沸不計時候溫服一方無紅雪用黃芩一兩解毒散出聖惠方治癰瘡如覺便宜服犀角屑木通銼川麻黃赤芍藥川朴硝各一兩石膏一兩甘草生銼玄參麥門冬去心各半兩上為粗散每服四錢水一中盞煎至六分去滓不計時候溫服之療癰腫堅核下不消白蘞貼方白蘞大黃赤石脂芍藥莽草黃芩黃連茱萸上等分搗篩以雞子黃和如濁泥塗布上隨核大小貼之燥復易黃耆貼方療癰腫黃耆當歸各一兩半黃芩芎藭黃連白芷芍藥各一兩上搗篩以雞子白和如膏諸暴腫起以布攤貼之燥易腫處不覺冷便熱勢毒者加白蘞一兩王不留行散出千金方治癰腫不得潰困苦無聊賴方王不留行子三合龍骨當歸各二兩乾薑桂心各一兩野葛皮半分栝蔞根六分上為末篩食後溫酒服方寸匕日三四肢習習為度不知稍加之令人安穩不覺膿自潰即著瘡痂平復神良此殷仲堪方隋濟闍黎所名為神散癰腫即消千金翼云治癰疽及諸腫已潰者服之白蘞貼方療癰腫白蘞當歸芍藥大黃莽草芎藭上各等分搗篩下雞子黃和如泥塗布隨大小貼之燥易梔子湯出千金方治表裡俱熱三焦不實身體生瘡及發癰癤大小便不利梔子仁二十七枚芒硝二兩黃芩甘草知母各三兩大黃四兩上㕮咀以水五升煮減半下大黃取一升八合去滓內芒硝分作三服當歸消毒散治癰腫初發荊芥牛蒡子甘草防風當歸赤芍藥各等分上㕮咀每服半兩水二盞煎八分服水澄膏出儒門事親治癰腫雄黃水飛二錢黃連半兩鬱金二錢黃柏半兩大黃半兩黃丹半兩水飛上為細末量所腫處用藥多少以新汲水半盞抄藥在內須臾藥沉漫去其浮者水盡然後用槐柳枝攪藥數百餘轉如麵糊相似勻以小紙花子攤藥塗腫上更以雞翎撩涼水不住掃之解毒丸治中外諸邪毒癰腫瘡筋脈拘攣寢汗咬牙一切驚悸熱毒大黃黃連梔子黃芩各五錢牽牛滑石各一兩上為細末滴水為丸如梧桐子大每服三四十丸溫水送下加減用服之野葛散出聖惠方療癰不能潰野葛皮二分龍骨二兩乾薑半兩炮製銼桂心一兩栝蔞二兩乾者王不留行一兩上為細末不計時候以溫酒調下二錢黃耆貼方療癰腫有熱甘草炙大黃白蘞黃耆芎藭上各等分搗篩以雞子黃和如濁泥塗布上隨赤熱有堅處大小貼之燥易五黃膏消拔毒熱癰腫小兒赤眼瘡瘤大黃黃柏黃連鬱金各一兩黃丹半兩上為細末新水或蜜水調塗掃加朴硝妙黃耆貼方療癰腫黃耆大黃白芷牡蠣白蘞上各等分搗篩和雞子貼天南星膏出百選方治風毒癰癤大天南星一兩厚黃柏半兩赤小豆一分皂角一梃不蛀者燒存性上為末以新汲水調成膏皮紙貼之已結即破未破即散之立效皂桃散治腫癰半月才覺亦可消皂角燒存性胡桃燒存性牛蒡子微炒連翹生上等分為細末每服三錢溫酒調下空心食前服黃連貼方出聖惠方療癰腫已潰黃