少力故也一方治風厥無雌雞血並心肝龍骨湯出聖濟總錄治風驚恐神魂錯越不得安定若驚憂怖迫逐或驚失財或激憤惆悵致志氣不樂龍骨遠志去心茯神去木防風去叉牡蠣去黑硬令碎各一兩甘草炙銼半兩上粗搗篩每服五錢以水二盞大棗二枚去核同煎去滓取一盞空心午時各一服日日服之取瘥茯神丸出聖濟總錄治風驚恐志意不定五臟不足甚者憂愁恐懼悲傷不樂忽忽善忘朝瘥暮發甚則狂眩茯神去木菖蒲九節者去須節用米泔浸切炒乾遠志去心白茯苓人參銼三分牛黃研一分上先將五味搗羅為末然後入牛黃同研再羅煉蜜為丸如梧桐子大每服溫酒下二十丸每食後良久及夜臥時服鐵精散治驚恐妄言或見邪魅恍惚不自覺發作有時或如中風鐵精茯苓芎藭桂心蝟皮炙各三兩上搗下篩以酒服半錢匕日三不知稍增至一錢以上知之為度忌酢物生蔥白薇湯出聖濟總錄治風驚恐四肢牽掣神志不寧或發邪狂叫妄走見鬼若顛癇狀白薇焙乾細辛去苗葉各一兩半龍齒搗末三兩杏仁去黑尖雙仁炒八十枚上搗篩每服五錢以水二盞煮取八分去滓溫服空心午時夜臥各一風熱盛實即入竹瀝少許攪勻服茯神丸主心氣不定五臟不足甚者憂愁悲傷不樂忽忽喜忘朝瘥暮劇暮瘥朝發則狂眩加茯神名茯神丸不加茯神為定志丸二分合少可兩倍合方菖蒲遠志去心茯苓各二分人參三兩上搗篩服方寸匕食後日三蜜和丸如梧桐子大服六七丸日三亦得一方加茯神一兩半牛黃五銖為六物茯苓遠志菖蒲各一兩忌酢物羊肉餳豆汁煎治中風驚悸恍惚鎮心湯出千金方治風虛勞冷心氣不足喜忘恐怖神志不定或如中風防風當歸大黃麥門冬各五分此味一云五兩澤瀉大豆卷白蘞各四分此味一云三兩菖蒲人參桂心桔梗遠志薯蕷石膏三分紫菀乾薑茯苓各二分一云各三兩白朮甘草各十分糯米五合大棗五兩附子茯神各三兩秦艽六分上㕮咀以水一斗二升先煮粳米令熟去滓納藥煮取四升分服八合日三夜一一方不用粳米蜜丸如桐子大酒服十丸加至二十丸風恍惚附論夫風恍惚者以風邪經於五臟其神恍惚而不寧也蓋五臟處於內神之舍也臟氣充足神正而昌則邪不得入肝臟氣虛損邪能乘之則精神魂魄意無所持守故恍惚不寧也夫五臟處於內而氣行於外臟氣實者邪不能傷虛則外氣不足邪乘之然五臟心為神肝為魂肺為魄脾為意腎為志若風氣經之是邪干於正故令恍惚也方定心丸治心虛憂悲不樂驚悸心忪恍惚忘誤神情不寧茯苓去黑皮茯神去木各一兩琥珀另研龍齒阿膠炙令燥牛黃銼研珍珠別研犀角鎊龍腦別研麝香別研各半兩天南星牛膽內匱者甘草炙銼各一兩半遠志去心一分金箔三十片為衣銀箔三十片研入藥菖蒲酸棗仁炒天竺黃別研人參各三分虎睛一對酥炙丹砂別研四兩龍膽半分雄黃別研二兩蘇合香二兩安息香二兩同蘇合香以酒一大盞研化澄去砂腳熬成膏上除別研外搗羅為末和勻以安息香膏同煉蜜為丸如雞頭大每服一丸麝香湯化下早晚食後臨臥服牛黃紫雲丸治恍惚健忘心神不寧解煩躁清頭目鎮心安神牛黃別研麝香別研龍齒三分丹砂別研三分遠志去心天竺黃別研黃芩去黑心三分甘草炙銼一兩甘菊花擇半兩龍腦別研各一分馬牙硝別研半兩茯苓去黑皮一兩銀箔十五片研入藥金箔十片為衣鐵粉別研一兩上為末和勻煉蜜為丸如小彈子大以金箔為衣每服一丸早晚食後荊芥湯嚼下薄荷湯亦可防風散治風虛恍惚多痰運悶不欲飲食防風半兩去蘆頭茯苓一兩羚羊角屑芎藭各半兩人參三分去蘆頭細辛桂心枳實麩炒微黃半夏湯洗七遍去滑各半兩山茱萸天麻各三分龍齒一兩甘菊花甘草炙微赤銼各半兩上搗粗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌羊肉飴糖牛黃散治風恍惚狂亂驚悸牛黃一分細研防風三分去蘆頭白殭蠶半兩微炒硃砂三分細研遠志半兩去心黃連三分去須玄參川升麻各三分天門冬一兩去心焙犀牛角屑三分天竺黃半兩細研白龍腦一錢細研上搗細羅為散入研了藥都研令勻每服不計時候煎竹葉溫水調下一錢忌生血豬肉魚肉等茯神散治風恍惚心神煩亂志意不安或臥驚恐茯神一兩麥門冬一兩半去心焙龍齒二兩黃耆一兩銼甘草炙微赤半兩銼石菖蒲人參去蘆頭各一兩防風三分去蘆頭遠志半兩去心熟乾地黃一兩石膏二兩羚羊角屑一兩上搗粗羅為散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服羚羊角散治風恍惚妄語多言夜不得寐羚羊角屑黃耆各三分熟乾地黃酸棗仁微炒茯神鐵粉各一兩防風半兩去蘆頭黃連三分去須麥門冬一兩去心焙遠志去心甘草炙微赤銼各半兩上搗粗羅為散每服三錢以水一中盞煎至六分去滓不計時候溫服良人參丸治心中時恍惚不定者上黨人參鬼臼鐵精牛黃丹砂雄黃大黃菖蒲防風各一兩蜥蜴赤足蜈蚣各一兩枚上為末蜜丸如桐子大用菊花酒服七服日三夜一稍加之合藥勿用青紙忌婦人青衣人喪孝不具足人及濁穢六畜雞犬鼠等見鐵粉丸治風邪驚經五臟令人恍惚坐臥不安鐵粉細研茯神各一兩遠志半兩去心人參一兩去蘆頭防風三分去蘆頭麥門冬一兩半去心焙羚羊角屑桑螵蛸微炒各三分龍齒一兩熟乾地黃一兩硃砂一兩細研水飛過上為末入研了藥令勻煉蜜和搗三五百杵丸如桐子大每服不計時候以清粥飲下二十丸忌生血丹砂鎮心丸治風驚悸或憂愁思慮心神恍惚狂言煩悶口眼喎斜化痰利咽膈丹砂別研一兩牛黃別研龍腦別研麝香別研各一錢鉛白霜別研天竺黃各二錢天麻酒炙二兩人參茯苓去黑皮甘草炙銼各半兩上為末和勻煉蜜為丸如雞頭大每服三丸煎金銀薄荷湯化下食後臨臥服石菖蒲丸治風虛安寢寐鎮心神止恍惚化痰滯石菖蒲遠志去心鐵粉別研丹砂別研各二兩白茯苓去黑皮人參各一兩半防風去叉羚羊角鎊各三分金箔五十片三十片入藥二十片為衣上為末和勻煉蜜為丸如梧桐子大每服十五丸至三十丸煎人參湯下早晚食後服粥飲服亦得丹砂煎出聖濟總錄治心神恍惚化痰涎利咽膈丹砂別研珍珠別研犀角鎊玳瑁鎊阿膠炙燥各一兩龍腦別研麝香別研各一錢上為末和勻用安息一兩湯一盞化去渣石入蜜二兩一處於重湯內煮令化然後下前五味末熬成煎候冷方下腦麝末攪勻入瓷盒內每服一皂子大溫薄荷湯化下丹砂茯神丸出聖濟總錄治神志不寧風虛恍惚鎮驚悸補不足丹砂別研茯神去木人參各一兩乾蠍二十一枚全者去毒炒牛黃別研半兩上為末和勻煉蜜丸如梧桐子大每服十丸溫金銀薄荷湯下人參湯化亦得伏龍肝湯出聖惠方治中風心煩恍惚或腹中痛滿或時絕而復甦取灶心土五升搗為末以冷水八升和之取汁服之口噤者以竹筒灌之得下即愈鹿角散出聖濟總錄治諸臟虛邪夜臥恍惚精神不安用鹿角鎊三兩搗羅為散每服一錢鹽溫酒調下日三服羚羊角散出聖惠方治諸臟虛邪夜臥恍惚精神不安用羚羊角鎊微炒一兩搗羅為散每服一錢鹽溫酒調下日三服亦治風心煩恍惚腹中痛或時悶絕而復甦豆汁煎治風毒攻心煩躁恍惚治風恍惚妄語多言夜不得寐出聖惠方用荊瀝每服一小盞宜頻服治風虛心氣驚弱恍惚失常忽嗔恚愁志意不樂紫石英白石英乾地黃一方無硃砂龍齒附子細辛天雄茯苓人參遠志乾薑白朮桂心防風各一兩上治下篩酒服兩方寸匕日三治風虛滿頸項強心氣不定不能食方出千金方茯神麥門冬各四兩人參羌活遠志當歸甘草紫石英五味子各二兩半夏防風黃耆各三兩生薑五兩酸棗三升上㕮咀以水一斗三升煮酸棗取一斗去棗肉余藥煎取三升半一服七合日三夜二防風湯治風虛肢體微熱恍惚狂言來去無時不自知覺南方支法存所用炙得力溫和不損人勝於續命越婢風引等湯治腳弱甚良防風麻黃去節秦艽獨活以上各三兩當歸切焙遠志去心甘草炙漢防己人參黃耆川升麻白芍藥以上各一兩半夏三兩湯洗七遍石膏半兩白朮一兩真麝香一分別研候湯成後入上銼細用水一斗二升入生薑三兩切片煎濾取四升清者入麝香攪勻分四五服隨病勢加減初服以厚衣覆取微汗相去如人行十兩久更服有熱加大黃一兩炒有冷及心腹痛者倍加當歸並加桂三兩即不用大黃今每服只取粗末五錢鹽水二盞入生薑半分同煎至一盞濾去滓澄清者稍熱服不拘時候
