body:
  text: 卷一百二諸風門風驚邪附論夫風邪之狀乍驚乍喜恍惚不寧舉措失常是也蓋心者生之本而藏神今心氣虛則神不寧風邪乘虛而干之故謂之風驚邪也方地黃煎丸出聖濟總錄治風驚邪心虛冷熱不調左脅下有氣發即妨脹不食生地黃汁六升生天門冬汁五升牛髓五合生薑汁七合牛酥五合白蜜五合醇酒二升棗肉膏去核五合以上八味先煎地黃汁並酒五分減二分次下天門冬汁薑汁煎二十沸次下牛髓醇蜜棗膏煎如稀糖次下後散藥黃耆銼石斛去根人參山芋茯神柏子仁別搗研山茱萸桂去粗皮五味子防風去叉枸杞子枳殼去瓤麩炒厚朴去粗皮生薑汁炙銼白朮各半兩乾薑炮半兩赤石脂甘草炙銼各一兩遠志去心細辛去苗葉各一兩上除前八味外搗為細末入前煎中攪勻於銀器中重湯煎可丸即丸如梧桐子大每空心早食後溫酒下三十丸日再煎服之獨活丸出聖濟總錄治風驚邪及一切風肢節不利筋脈拘急頭目旋痛恍惚心忪獨活去蘆頭三分防風去叉白茯苓去黑皮各半兩阿膠炙令燥石膏碎研者各三分玳瑁鎊一兩人參一兩半甘草炙銼半兩天南星炮一兩細辛去苗葉半兩丹砂研二兩白殭蠶炒半兩丁香一分琥珀搗研一兩牛黃研麝香研各一分天麻龍腦研各半兩上為末再同研勻別用安息香二兩半搗碎以酒一升研濾去滓於銀器內慢火熬成膏和前藥於臼中杵三五百下丸如雞頭大每一丸細嚼薄荷茶下不計時甚者加一丸茯神丸出聖濟總錄治風驚邪心中恍惚驚悸恐怖精神不樂化痰潤肌清神快氣茯神去木人參遠志去心麥門冬去心焙熟乾地黃焙青橘皮湯浸去白焙甘草炙銼五味子山芋桔梗去蘆頭切焙枳殼去瓤麩炒檳榔生銼各一兩白朮桂去粗皮芍藥各半兩上為末煉蜜和丸如雞頭大每服一丸含化益智太乙丸出聖濟總錄治風驚邪及一切風舌強語澀昏迷恍惚化痰金箔一分同丹砂研珍珠一分研丹砂研一兩半同金箔研令勻玳瑁鎊一兩阿膠炙令燥一兩龍腦研半兩雄黃研半兩安息香二兩酒研濾去砂入銀器中更用蜜二兩於重湯內熬成膏為用琥珀搗研一兩麝香研牛黃研各半兩上除安息香外各細搗研訖再同研令勻細候熬安息香膏稀稠得所即將前藥入在膏內不住以槐枝攪令得所可丸即丸如梧桐子大每服一丸細嚼人參湯下如猝中用童子小便化下三丸如中風用酒化下五丸小兒風痰及驚癇以薄荷湯化下半丸鎮心丸出聖濟總錄治風驚邪冒郁煩悶伸欠倦怠化利風涎銀箔五十片水銀黑錫錫各半兩同水銀結砂子與銀箔共研龍齒人參遠志去心麝香研丹砂研犀角鎊中黃研各半兩虎睛一對酒浸一宿炙微黃佳上為末再同研勻煉蜜和丸梧桐子大每服三丸荊芥湯下食後臨臥服風引湯一名石散出聖濟總錄治驚邪風癇厥癲口有涎沫牽引口眼手足少小驚瘛瘲日數十發醫所不治大黃銼炒乾薑燒龍骨各四兩桂去粗皮三分甘草炙牡蠣各半兩凝水石赤石脂白石脂紫石英滑石各一兩半上㕮咀如麻豆每服三錢水一盞煎至七分去滓溫服日再一方有石膏末百日小兒服一合未能者綿沾著口中熱多者日四五服以意消息深師方只龍骨乾薑牡蠣滑石白石五味大丹砂丸出聖濟總錄治風痰熱氣安魂定魄鎮心神丹砂研半兩中黃研一分金箔二十片研銀箔二十片研龍腦研一分硼砂研琥珀研各一錢甘草炙銼為末犀角鎊為末羚羊角鎊為末各一分上再同研細煉蜜和丸如雞頭大每服一丸至兩丸熟水嚼服之茯神湯出聖濟總錄治風驚調心氣安神志化痰止煩渴茯神去木人參各一兩白蘚皮一分麥門冬去心焙三分枳實麩炒羚羊角屑甘草炙銼龍齒各半兩防風去三分黃芩去黑心一分上粗搗篩每服三錢水一盞入竹葉十片煎至七分去滓食後臨臥溫服追風散出聖濟總錄治風驚邪分涎利膈安神鎮心乾蠍去土頭尾全者四七枚去爪生用附子炮炒去皮臍烏頭生去皮臍白附子生天南星生各一分丹砂研一錢半麝香研半錢龍腦研半錢半夏生薑汁浸一宿切焙一分上搗研散入龍腦麝香丹砂再同研令勻細入瓷盒中盛每服半字煨蔥白酒調下日二三服漸加至一字覺體麻即減服小兒驚風服半字許桃花散出聖濟總錄治諸風驚麻黃去根節天南星炮白附子炮附子炮裂去皮臍烏頭炮裂去皮臍各一兩丹砂研麝香研各一兩乾蠍去土一兩生用上為散每服半錢薄荷溫酒調下一切風用蔥酒調下小兒每服一字薄荷蜜水調下銀粉丸出聖濟總錄治風化痰定心氣粉霜半兩天南炮一兩半鉛白霜半兩半夏湯洗七遍丹砂研一兩白礬熬令汁枯半兩水銀半兩鉛半兩二味結砂子上為末再和勻用白麵糊為丸如梧桐子大每服五丸薄荷湯下小兒丸如麻子大遠志丸出聖濟總錄定心忪化風痰治昏虛定神魂遠志去心人參白茯苓去黑皮山芋凝水石碎研各一兩上為末用白麵糊為丸如梧桐子大每服二十丸人參湯下加至三十丸安神散出聖濟總錄治風邪丹砂研鐵粉研各半兩白茯苓去黑皮為末一錢上同研令極細每服半錢鵝梨汁調下磨刀水亦得風驚悸附論夫風驚悸者以心不足為風邪所乘神魂驚怖不已則悸動不寧其證目睛不轉不能呼是也或因恐懼憂迫致損心氣驚悸者亦緣風邪搏之故耳診其脈動而弱動則為驚弱則為悸不可不察方鹿髓煎丸出聖濟總錄治久積風熱發積驚悸氣滿不安四肢虛弱不生肌肉鹿髓五合生天門冬汁三合濾清酒五合牛髓五合無牛髓牛酥一升代白蜜七合棗膏五合生地黃汁一升濾生麥門冬三合濾以上藥八味先煎地黃天門冬汁清酒五合可減二合次納麥門冬汁煎二十沸次納酥髓白蜜棗膏煎如稠餳糖傾入銀器或石器中復於重湯上煮攪如調膏即如後傾藥味茯神去木龍骨人參各一兩枳殼去瓤炒細辛去苗葉防風去叉白朮石斛去根桂去粗皮芎藭黃耆炙銼五味子各三分甘草炙銼一兩半陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙山芋各半兩山茱萸並子用柏子仁炒各三分枸杞子三分遠志去心黃連去發各半兩薏苡仁炒檳榔銼各三分上除八味為煎外搗羅為末入在煎中和搗令勻丸如梧桐子大每服二十丸加至三十丸以溫酒送下空心日午後夜臥服之薯蕷煎方出千金方薯蕷二十分甘草十四分生地黃十八片搗絞取汁煎令余半澤瀉人參黃芩各四分當歸白蘞桂心防風麥門冬各三兩山茱萸桔梗芍藥紫菀大豆黃卷乾地黃白朮芎藭乾薑蜀椒以上二十味並用搗篩極細大棗八十枚麻子仁研三升獐鹿骨髓鹿角膠八兩桑根白皮五斤忌岡上自出土者大毒近籬屋垣牆溝瀆邊者不用蜜三升地黃汁五升上以清酒二斗四升煮桑白皮麻子仁棗得一斗去滓次下地黃汁膠髓蜜煎減半納前諸末並煎令可丸如雞子黃大每服一枚日三稍加至三丸薯蕷丸出千金方治頭目眩冒心中煩郁驚悸狂癲薯蕷二十八分甘草二十分鹿角膠大黃豆卷桂心各七分乾地黃神麯當歸人參各十分麥門冬防風黃芩芍藥白朮各六分柴胡桔梗茯神杏仁芎藭各五分白蘞乾薑各三分大棗一百枚取膏上搗細羅為末合白蜜棗膏和丸如彈子大先食服一丸日三服之鎮心丸治熱風驚悸安心久服長年茯神人參龍齒研升麻石膏研黃芩茯苓麥門冬各八分去心銀箔二百片研虎睛一具炙枳實炙白蘞玄參芍藥葳蕤甘草炙各六分生薑二分上搗篩蜜和丸每食訖少時以飲服如梧桐子大十五丸日二服之漸漸加至三十丸不利忌海藻菘菜酢蒜面黏食陳臭等物薯蕷湯出千金方治心中驚悸而四肢緩頭面熱心胸痰滿頭眩冒如欲搖動者薯蕷麥門冬人參各四兩生地黃前胡芍藥各八分枳實遠志生薑各三分茯苓茯神各六分半夏五分甘草黃芩竹葉各二分秫米三分上㕮咀取江水高舉手揚三百九十下量取三斗煮米減一斗納半夏復減九升去滓下藥煮取四升分四服無江水處以千里東流水代之拔手令上頭也秦中無江水涇渭水亦可防風湯出千金方服前湯後四體尚不涼冷頭目眩轉者服之此湯大涼宜長將服藥中小小消息隨冷暖耳仍不除瘥者依此方防風石膏人參赤石脂白石脂生薑龍骨寒水石茯苓各三分桂心二分紫石一分上㕮咀以水八升煮取三升分三服石膏丸出聖濟總錄治中風邪驚悸心不安石膏研麥門冬去心焙龍齒別研人參升麻玄參茯苓去木黃芩去黑心各一兩銀箔一百片與石膏龍齒同研枳殼去瓤炒三分白蘞銼赤芍藥葳蕤各一分虎睛一對炙甘草炙銼半兩上除別研外搗羅為末和勻煉蜜和丸如梧桐子大服三十丸米飲下日三金箔十珍丸治心驚悸頭目不清金箔五片銀箔五片丹砂與金銀箔同研一兩珍珠別研琥珀別研玳瑁鎊犀角鎊各一分硼砂別研龍腦別研各一分牛黃別研半錢人參白茯苓去皮各一兩紫河車二兩茯神去木半兩甘草生銼一兩上除別研外搗羅為末和勻煉蜜和丸如雞頭實大每服一丸嚼破竹葉湯下食後臨臥服丹砂丸治風虛驚悸心神煩悶睡臥不安丹砂一兩細研水飛鐵粉一兩細研金箔五十片細研銀箔五十片細研人參一兩半去蘆頭茯神二兩秦艽一兩去苗川升麻一兩子芩一兩龍齒木香枳實麩炒微黃各一兩甘草半兩炙微赤銼白蘚皮一兩麥門冬一兩半去心焙上搗羅為末入別研了藥更研令勻煉蜜和搗五七百杵丸如梧桐子大每服不計時候以荊芥湯下二十丸忌生血等大定心丸治恍惚驚悸心神不安或風邪因虛入臟語言喜忘胸脅痛不得飲食人參桂心各二兩白朮防己茯苓乾薑防風大黃茯神桔梗白蘞各一兩牛膝十銖遠志三兩去心銀屑六銖上治下篩以蜜和丸如梧桐子大先食服五丸日三不知稍稍增之一方無牛膝有茱萸一兩銀屑十銖余悉同忌生蔥酢豬肉桃李雀肉等大竹瀝湯治大虛風氣入腹拘急心痛煩冤恍惚迷惑不知人或驚悸時怖吸吸口乾澀澀惡寒目失精明歷節疼或緩或不攝產婦體虛受風惡寒慘慘憤憤悶心欲絕者並療風痙口噤不開目視如故耳亦聞人語心亦解人語但口不得開肩背強反折百脈掣痛悉主之秦艽防風茯苓人參各二兩茵芋烏頭炮黃芩乾薑當歸細辛白朮各一兩天雄一枚炮甘草三兩炙防己二兩上㕮咀以竹瀝一斗水五升煮取四升分服一升羸人服五合佳茵芋有毒令人悶亂目花虛人可半兩良風輕者用竹瀝三升水七升小重者竹瀝五升水五升風大劇停水用竹瀝一斗忌海藻酢生菜菘菜桃李雀肉等牛黃丸治風驚悸心風狂亂牛黃一分細研硃砂三分細研天竺黃半兩細研龍腦一錢細研木香一分白附子一分炮裂犀牛屑半兩天南星一分炮裂蛜𧌴半分微炒去足鉛霜一分細研人參三分去蘆頭茯神三分天麻半兩防風半兩去蘆頭上搗羅為末入研了藥都研令勻煉蜜和搗三二百杵丸如綠豆大每服不計時候以荊芥湯下二十丸忌生血茯神湯治風驚五臟大虛驚悸安神定志方茯神防風各三兩人參遠志甘草龍骨桂心羌活各二兩白朮一兩細辛乾薑各六兩酸棗一升上㕮咀以水九升煮取三升分三服遠志散治中風心氣不足驚悸言語謬誤恍惚憒憒心煩悶耳鳴遠志黃耆茯苓白者甘草芍藥當歸桂心一方無麥門冬人參各二兩獨活四兩生薑五兩附子一兩上㕮咀以水一斗二升煮取四升每服八合人羸服五合日三夜一又一方有羚羊角無附子金箔丸治中風驚悸安神定氣金箔三十片銀箔三十片丹砂與金銀箔同研一兩牛黃別研一分鐵粉別研一兩胡黃連去苗一分鉛霜別研一分天竺黃別研半兩龍齒別研半兩麝香別研一分龍腦別研