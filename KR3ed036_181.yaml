body:
  text: 卷一百八十一諸氣門總論夫陰陽雖大本屬呼吸相通天下一氣爾人生其間大喜毗於陽大怒毗於陰一吐納一動靜何所逃哉與氣流通而已故氣平則寧氣不平則病內經曰百病生於氣喜則氣緩悲則氣消寒則氣收熱則氣泄恐則氣下憂則氣亂勞則氣耗思則氣結怒則氣逆蓋營衛通利則氣舒而不迫此喜所以氣緩也神情慘悴則氣虧而不全此悲所以氣消也經絡凝澀則氣塞而不散此寒所以氣收也腠理開通則氣升而汗出此熱所以氣泄也精卻上閉氣還下行此恐所以氣下也心多愁慮則氣散而無歸此憂所以氣亂也內外煩動則氣喘而且汗此勞所以氣耗也心有所止則氣滯而不行此思所以氣結也嗔恚傷甚則氣上而嘔心血此怒所以氣逆也此九氣者證雖不同大概診寸口脈伏腦中逆氣是諸氣上衝腦中故上氣面浮腫脹急其脈浮大不治上氣脈躁而喘者屬肺脹欲作風水發汗而愈脈洪則為氣上騰不寧伏匿者生牢強者死喘息低仰其脈滑手足溫者生澀而四末寒者死類者亦死謂形損也人有七情病生七氣七氣者寒熱怒恚喜憂愁或以為喜怒憂思悲驚恐皆通也然則均是調氣將何先氣結則生痰痰盛則氣愈結故調氣必先豁痰如七氣湯以半夏為主治而官桂佐之蓋良法也況夫冷則生氣調氣雖為豁痰亦不可無溫中之劑其間用桂又所以溫中也不然七氣相干痰涎凝結如絮如膜甚如梅核窒礙於咽喉之間咯不出咽不下或中滿艱食或上氣喘急曰氣滯曰氣祕曰氣中以至五積六聚疝癖癥瘕心傷塊痛發即欲絶殆無往而不至矣冷氣者生冷必傷脾風冷入胃或血海虛冷冷則氣生用和劑七氣治中湯沉香降氣湯大沉香丸痰結者三因七氣湯指迷七氣湯易簡二陳湯中滿者痞滿不食水氣腫脹面目俱浮枳殼散加南木香大流氣飲指迷七氣湯順氣木香散三和散五皮散加半夏茯苓上氣者氣逆上呼吸喘促分氣紫蘇湯蘇子降氣湯或嚼蘇合香丸以祕傳降氣湯送下氣膈者陰陽不和中脘窒塞五膈吐噫食不能下五膈寬中散和劑七氣湯加木香縮砂間以紅丸子佐之氣滯者滯於胸膈則脹滿滯於手足則浮腫滯於腰間則墜痛脹滿用異香散調氣散沉香降氣湯仍與神保丸或少加蓬朮煎湯利之浮腫用三和散夾生料五苓散或五皮散加桂苓青木香丸局方流氣飲加赤茯苓枳殼腰痛俞山人降氣湯局方七氣湯加橘核或辣桂煎湯調氣散吞青娥丸氣祕者停宿不消腸胃留滯大便不通蘇合香丸夾和感應丸或楊氏麝香丸局方麻仁丸並用枳殼湯送下氣傷之人多有氣不歸元遂成中狀如中風仆倒昏迷牙關緊急只是無痰此為氣中不得誤用風藥及通關利腠等劑先以薑汁泡湯調蘇合香丸次用七氣流氣飲加石菖蒲繼之氣順而蘇即以治中湯加木香以和其中使氣歸當道若更不能調則氣逆而厥又有變證喜傷於心者其氣散怒傷於肝者其氣擊憂傷於肺者其氣聚思傷於脾者其氣結悲傷於心胞者其氣急恐傷於腎者其氣怯驚傷於膽者其氣亂七證雖殊無逾於氣又有體虛者外為風冷乘之入於腹中遂諸疝發則小腹痛痛或繞腸或逆搶心甚則手足厥冷自汗嘔逆或大小便祕澀也人有血氣平和之性而無哀樂喜怒之常一種婦人平時任氣易為七情所傷適月事經年不行一身百病胸臆氣填嘔惡全不入食則吐痰或一塊如核窒塞咽喉而痛或一塊如卵築觸心下而痛或腹中塊物動而作痛攻刺腰背時發熱四肢乏力腳不能行小便白濁浮油帶下淋漓日就瘦弱全似虛勞然谷雖不食如果子雜物常喜食之卻只是有孕諺所謂孕婦做得百病者此也用藥但以二陳湯加縮砂桔梗薑棗烏梅同煎半夏理氣消痰縮砂安胎順氣桔梗以開咽喉之隔服之自然安平若妄以剛劑溫胃胎必損病無愈白濁一節謹勻燥澀二陳湯加白茯苓以下白丸子可也若夫七情所發逆氣填胸不惟核膜上氣塞咽喉甚者攻擊滿悶欲絶産後尤多有之故曰産前安胎産後調氣男女或有咽喉間核作恙者觸事勿怒飲食勿冷一切氣附論夫內經云百病所生生於五臟肺之所主獨於氣不足有餘蓋由虛實故病不同其證亦異怒則氣逆甚則嘔血及食故氣逆也喜則氣和營衛通利故氣緩也悲則心系欲絶肺葉齊舉使上焦不通營衛不散熱氣在內故氣消情怯怯則上焦閉閉則氣還還則下焦脹故氣不行而聚也寒則膚腠閉拒氣道不行氣收而不散也熱則腠理開營衛不通故汗大泄也驚則心無所倚神無所歸慮無所定故氣亂勞則喘且汗外內皆泄故氣耗思則心有所止氣留不行故氣結方七氣丸出千金方治七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣此之為病皆因積聚堅牢心腹絞痛不能飲食時去時來發則欲死有如禍祟凡寒氣狀吐逆心滿熱氣狀恍惚眩冒失精怒氣狀上氣不可當熱痛急蕩短氣欲絶不得息恚氣狀積聚心滿不思食飲喜氣狀不可疾行久立憂氣狀不可苦作臥不安席愁氣狀無故喜怒置物忽忘四方搜索不知其處四肢臃腫不得舉止亦治産後中風余疾大黃二兩半人參半夏吳茱萸柴胡乾薑細辛桔梗菖蒲各二分茯苓芎藭甘草蜀椒一用桂心石膏桃仁各三分上為末蜜丸如梧子大每服酒下三丸日三服漸加至十丸一方無茯苓芎藭甘草石膏桃仁七氣丸一名烏頭丸出千金方治七氣積聚不散在於脅腹結如杯胸中氣膈吐逆不能下食腹脅疼痛喜怒不常呼吸短氣四肢不舉烏頭大黃各七分紫菀半夏細辛丹參茯苓芎藭桃仁石膏桔梗菖蒲一升桂心人參甘草吳茱萸防葵乾薑蜀椒各半兩前胡上為末蜜丸如梧子大酒服三丸日三加至十丸一方去半夏加甘遂三分無丹參甘草七氣湯出千金方治寒氣熱氣憂氣勞氣喜氣恚氣怒氣結於膈中不思飲食五臟不調氣衰力少乾薑黃芩厚朴一作桂心半夏粉甘草栝蔞一作橘皮乾地黃芍藥各三分蜀椒三兩一作桔梗枳實五枚人參一兩淨吳茱萸五合上㕮咀以水一斗煮取三升分三服日三四七湯一名大七氣湯出三因方治喜怒悲思憂恐驚之氣結成痰涎狀如破絮或如梅核咽喉之間咯不出咽不下此七氣所為也中脘痞滿氣不舒快或痰涎壅盛上氣喘氣或因痰飲中結嘔逆噁心並宜服之婦人情性執著不能寬解多被七氣所傷遂致氣填胸臆或如梅核止塞咽喉甚者滿悶欲絶産婦尤多此證宜服此劑間以香附子藥久取效切不可謂紫蘇耗氣且新産氣血俱虛不肯多服用之效驗不可殫述半夏五兩茯苓四兩紫蘇葉一兩厚朴三兩上㕮咀每服四錢水一盞半生薑七片棗一個煎至六分去滓熱服不拘時候若因思慮過度陰陽不和清濁相干小便白濁用此藥最為切當婦人惡阻間以紅丸子尤宜服之名厚朴半夏湯一名大七氣湯局方有七氣湯用半夏五兩人參官桂甘草各一兩生薑煎服大治七氣並心腹絞痛藥味太甜恐未必能止痛順氣一方治七情所傷脘中不快氣不升降腹肋脹滿用香附子炒半斤橘紅六兩甘草二兩煎服尤妙切不可謂香附子耗氣此藥大能資血養氣或入煨木香半夏人參一兩人參散出聖惠方治憂恚寒熱喜怒及飲食阻隔內傷五臟逆氣上攻不能還下心中悸動不安人參一兩去蘆頭芍藥一兩木香一兩桂心一兩吳茱萸半兩湯浸七次焙乾微炒前胡一兩去蘆頭白朮訶黎勒皮各一兩半夏一兩湯浸七次去滑甘草半兩炙微赤銼青橘皮一兩湯浸去白膜焙熟地黃一兩上為散每服五錢以水一盞入生薑半分煎至六分去滓每於食後稍熱服七氣湯醫方集成治寒氣怒氣恚氣喜氣愁氣憂愁內結積聚堅牢如杯心腹絞痛不能飲食時發時止發即欲死兼治虛冷上氣人參去蘆肉桂去粗皮甘草炙銼各半兩半夏湯浸七次切片焙乾五兩上㕮咀每服五錢水二大盞生薑五片煎七分去滓食前熱服一方治胸痹心痛徹背心嘔吐厥逆冷汗自出用半夏湯洗七次桂心不見火為粗末每服三錢水二盞姜七片棗五個煎取一盞熱服名通氣湯七氣湯出淡寮方治七情相干陰陽不得升降氣道壅滯攻衝作痛青皮陳皮桔梗蓬莪朮辣桂藿香益智仁各一兩香附兩半甘草炙三分半夏三分制四七湯百一選方治七種氣大七氣湯錢文子曾服有效人參茯苓各三兩半夏厚朴薑汁製各三兩半上為粗末每服三錢水一盞半生薑七片棗一枚煎六分食前服大黃丸出聖惠方治七氣積聚堅牢心腹脹痛川大黃一兩銼碎微炒川椒半兩去目及閉口者微炒去汗人參三分去蘆半夏三分湯浸七次去滑桔梗三分去蘆頭菖蒲三分柴胡三分去蘆赤茯苓三分芎藭三分桂心三分桃仁三分湯浸去皮尖雙仁麩炒微黃木香三分吳茱萸三分湯浸七次炒乾微炒乾薑三分炮細辛三分上為末煉蜜和搗五七百杵丸如梧桐子大每服於食前以溫酒下十丸漸加至二十丸為度半夏散出聖惠方治七氣臟腑虛冷心腹上氣勞氣及不能飲食半夏一兩湯浸七次去滑人參一兩去蘆白朮一兩桂心一兩厚朴二兩去粗皮塗生薑汁炙令香熟附子一兩炮裂去皮臍陳橘皮三分湯浸去白瓤焙上為散每服五錢水一盞入生薑半分煎至六分去滓於食前熱服半夏散出聖惠方治七氣心腹積聚結塊如杯嘔吐寒熱胸中短氣不能食木香一兩桂心一兩人參一兩去蘆細辛半兩訶黎勒皮半兩乾薑半兩炮白朮半兩甘草一分炒微赤銼附子半兩炮去皮臍鱉甲一兩半塗醋炙令黃去裙襴吳茱萸半兩湯浸七次焙乾微炒青橘皮半兩湯浸去白瓤焙京三稜三分檳榔半分赤茯苓三分當歸三分厚朴半兩去粗皮塗生薑汁炙令香熟茴香子半兩上為散每服五錢以水一盞入生薑半分棗一枚煎至六分去滓每於食前稍熱服檳榔湯出千金方治氣實若積聚不得食息滿腹刺痛泄利不止檳榔二十枚附子一枚半夏一升細辛一兩生薑大黃茯苓各三兩紫菀柴胡各三兩橘皮甘草紫蘇各一兩上㕮咀以水一斗煮取三升分三服相去如人行十里久若有癥結堅實如石加鱉甲二兩防葵二兩氣上加桑白皮切二兩枳實厚朴各二兩消息氣力強弱進二劑後隔十日更服桔梗破氣丸白豆蔻散出仁齊直指治七氣所傷滯於胸膈窒於咽喉脹痛於心下噫氣吞酸不能飲食白豆蔻縮砂蓽澄茄丁香木香甘草炒一分青皮陳皮辣桂各二分厚朴制香附炒各三分上為末每服三錢水一盞姜三片鹽一捻煎至七分不計時候服治氣滿閉塞不能食喘息方出千金方上用訶黎勒十枚為末蜜丸如梧桐子大食後服三丸不忌諸物得利即止治氣方出千金方上用桃仁二斤去黃者㕮咀以水五升煮取三升每服一升又方出千金方上用酒服驢乳二合日二又方出千金方上用黃牛乳二升煎取一升和生乳一升空腹服之旦晚服又方出千金方上用驢乳初服三合三日後加至五合五日後加至七合七日後加至一升忌葵菜豬魚油等一方尿空腹服百日止去一切病硫黃丸出千金方治氣逆虛癖胸膈中痰噁心腹痛氣急不下飲食硫黃礬石乾薑附子烏頭桂心細辛白朮桔梗茯苓各一兩上為末蜜丸如梧子大酒服十丸日三漸加之以瘥為度一方無白朮桔梗茯苓用吳茱萸蜀椒人參皂角當歸為丸用治人大冷夏月溫飲水不解衣者一方若冷痢者加赤石脂龍骨即愈也大前胡湯治極氣傷熱喘息沖胸常欲自恚心腹滿痛內外有熱煩嘔不安甚則吐血氣短乏不欲食口燥咽乾前胡八兩半夏麻黃芍藥各四兩生薑五兩黃芩三兩枳實四枚大棗十二枚上㕮咀以水九升煮取三升去滓分三溫服紫蘇子丸出和劑方治一切氣逆胸膈噎悶心腹刺痛脅肋脹滿飲食不消嘔逆欲吐及治脾胃傷冷咳嗽痞滿或上氣奔急不得安臥