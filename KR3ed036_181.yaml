嘔噦噁心腹脅刺痛短氣噎悶噫氣吞酸不思飲食一切氣疾並皆治之常服溫中和氣進美飲食草豆蔻仁七錢炒杜茴香炒甘草炒大鹽炒乾生薑以上各一兩上為末每服一錢沸湯點服不拘時候塌氣散御藥院方順氣寬中升降利膈治中脘痞滯心腹堅脹脅下緊硬喘滿短氣噫息不通嘔吐痰水大便不調茴香炒枳殼麵炒去白茯苓人參乾薑各一兩陳皮去白青皮去白各一兩甘草炙蒼朮良薑各半兩丁香二錢半上為粗末每服三錢水一盞生薑五片煎至七分去滓稍熱服不拘時候一方加茶點滴服引氣丸御藥院方治痰氣不下心虛生熱神氣怯浮恍惚多驚人參去蘆半夏生薑制生地黃麥門冬去心青皮去白各一兩磁石二兩水飛上為細末麵糊為丸如梧桐子大硃砂為衣每服五十丸溫米飲湯送下飲食前空心服沉香升降湯御藥院方治一切氣升降不快脅肋刺痛胸膈痞塞出醫方集成沉香檳榔各二兩人參大腹皮銼炒白朮烏藥附子炒麥糵炒神麯炒厚朴去皮生薑制各二兩橘皮去白薑黃甘草炒各四兩荊三稜蓬莪朮益智仁各二兩上為細末每服二錢食前沸湯點服一方加紅花豆蔻木香丸御藥院方宣通一切滯氣宿食痰飲清利頭目消磨積蘊痃癖等疾形體瘦弱不禁宣瀉並宜服之並治腿腳沉腫不任攻擊者白豆蔻仁木香胡椒各半兩益智荊三稜炮赤捶碎蓬莪朮炮赤捶碎雷丸玄胡去白青皮去白白朮半夏湯浸七次生薑汁製陳皮去白一兩縮砂仁當歸去蘆各七錢半商枳殼一兩半面炒去瓤牽牛八兩微炒取頭二兩四錢上為細末生薑汁麵糊為丸如梧子大每服三十丸食後生薑湯下諸痰飲皆下如覺內傷可七八十丸有益無損令人肥壯老幼男女皆得服之一月以後但覺身輕為驗一方不用胡椒陳皮名順氣枳殼丸有孕婦人不可服之流氣飲子濟生拔粹方治男子婦人五臟不調三焦氣壅心胸痞滿咽塞不通腹脅膨脹嘔吐不食及上氣喘急咳嗽涎盛面目虛浮四肢腫痛大便祕澀小便不通憂思太過陰陽之氣鬱而不散壅滯成痰及腹才脹速服此藥升降陰陽汗出立愈及腳氣腫滿疼痛喘急腹脹大便不通及氣滯肩背脅走注疼痛紫蘇葉青皮去白洗焙當歸芍藥烏藥茯苓桔梗半夏湯洗川芎黃耆枳殼麵炒防風甘草炙陳皮去白三分木香一分連皮大腹子共皮計一兩銼薑汁浸一宿上㕮咀如麻子大每服稱半兩水一大盞生薑三片棗一枚擘破同煎至七分濾去渣熱服不拘時如病在心脾入菖蒲五片同煎婦人血氣入艾同煎傷寒頭疼發熱咳嗽入連須蔥白三寸同煎五膈氣入陳皮少許同煎心中怔忪入麥門冬子數粒同煎臟腑利入粳米一撮不拘時候或粗搗篩亦可一方加檳榔枳殼木香檳榔丸御藥院方治一切氣滯心腹滿悶脅肋膨脹大便小便結滯不快利噦逆酸臭宿食不消此名木香檳榔元是子和之方治腎水陰不足久服養陰發陽諸虛腫滿流濕又名潤燥通腸破積通和血氣痰涎不利胸堂酒痰食傷同治泄瀉腹脹膀胱手足四肢無力飲食麵色痿黃脾肺骨蒸勞嗽更兼口舌生瘡打撲內傷閃墜驢踢馬咬蛇傷興敗往來客旅不服水土他鄉傷寒之症同治調理便宜此方木香商枳殼麵炒去瓤青皮去白陳皮去瓤檳榔廣朮煨燒切黃連各一兩黃柏皮去粗皮香附子揀炒大黃銼碎各三兩黑牽牛生薑半斤取頭末四兩上為細末滴水為丸如豌豆大每服三十丸或五十丸加至六十丸以利為度食後生薑湯送下如不利加丸數常服疏氣消食通潤大便大腸一方無牽牛沉香降氣散醫方集成治三焦痞滯氣不宣暢心腹疼痛嘔逆痰沫脅肋噎脹噫氣不通噦逆醋臭胃中虛冷腸鳴絞痛宿食不消除反胃吐食不止及五膈噎塞心胸滿悶全不思食沉香木香丁香人參去蘆藿香葉甘草炮白朮各一兩桂花檳榔肉豆蔻縮砂仁陳橘皮去白白茯苓去皮白豆蔻青皮去白各半兩白檀川薑炮枳實炒各二兩上為末每服二錢入鹽少許水一大盞同煎至七分和滓溫服不拘時候日進三服茯苓丸一名枳殼丸治中焦氣澀胸膈痞悶飲食遲化四肢困倦嘔逆噁心常服升降陰陽消化滯氣祛痰逐飲進美飲食御藥院方白茯苓去皮一兩半夏湯浸去滑七次木香各一兩半荊三稜蓬莪朮各六兩半青皮陳皮白朮各三兩檳榔二兩半枳殼麵炒去瓤二兩牽牛頭末四兩上為細末生薑汁麵糊為丸不以多少食後生薑湯下一方如梧子大每服三十丸沉蘇飲子御藥院方治胸膈塞滯氣不通宣津液衰少沉香甘草炮黃色白檀香各二兩赤茯苓肉桂去粗皮各一兩紫蘇葉人參各半兩乾木瓜生地黃各二兩上為末每服一錢水一大盞煎至三沸湯和滓涼服小分氣丸御藥院方消滯氣和胸膈止心疼化酒食治結毒腹脅脹滿荊三稜醋浸一宿切作片子焙乾用牽牛微炒大戟細銼炒各三兩莞花醋炒甘遂搗碎炒黃色各二兩官桂去皮一兩上同杵為末以醋煮麵和丸如緑豆大每服十丸煎陳橘皮湯送下不嚼破如癥瘕腹脹氣滯如腰疼行動艱難漸加丸數日進三服以瘥為度降氣檳榔丸御藥院方治調順三焦升降陰陽進美飲食潤澤臟腑檳榔二兩杏仁一兩湯浸去皮尖麵炒上為細末煉蜜和丸如梧桐子大每服五丸生薑湯下沉香蓽澄茄丸御藥院方治六經不足內挾積冷臍腹弦急痛引腰背面色痿黃手足厥冷脅肋虛滿精神困倦臟腑自利小便滑數如廣腸小腸一切氣痛氣膈不通尤宜服之沉香蓽澄茄木香葫蘆巴炒舶上茴香破故紙並炒官桂去粗皮巴戟去心川楝子炮捶碎去核用肉各四兩附子炮去皮焙桃仁去皮尖麵炒各二兩川烏頭去皮半兩上為細末酒煮麵糊為丸如梧桐子大每服三四十丸溫酒下鹽湯亦可空心食前服一方作散每服二錢水一大盞入鹽少許煎至八分去滓服丁沉煎丸木香丁香甘松沉香各三兩藿香檀香各半兩香附砂仁白豆蔻各半兩丁皮陳皮各半兩薄荷少許腦子少許蓬莪朮三錢上為細末熬甘草膏丸不拘丸數木香神麯丸治男子婦人氣塊攻痛木香半兩神麯三兩厚朴一兩麥糵二兩乾薑一兩陳皮一兩肉豆蔻一兩荊三稜一兩舶上茴香上為細末炒薑湯調下每服二錢空心臥睡各一服忌生冷沉香透膈湯治男子婦人五種氣滯胸膈悶滿心腹疼痛翻胃吐食兩脅膨脹噎膈不通飲食減少多困少力丁香半兩木香沉香白豆蔻砂仁各半兩藿香葉白茯苓青皮去白厚朴薑製半夏薑製甘草炙各半兩肉豆蔻麵煨神麯炒麥糵炒人參肉桂草果各半兩檳榔一枚陳皮去白一兩上㕮咀每服三錢水一大盞半姜三片棗一枚煎至七分去滓食前溫服沉香降氣丸沉香五錢木香一兩三稜四兩片薑黃四兩莪朮四兩青皮四兩陳皮四兩丁香二兩丁皮五錢草果二兩燈心二兩上為細末酒糊丸如梧子大每服五十丸食後薑湯送下沉香化氣丸治男子婦人脾胃不和停滯不化胸膈飽悶嘔吐噁心腹脅膨脹臟腑閉塞氣喘急睡不安一切氣症人參沉香木香各半兩砂仁檳榔各七錢乾山藥一兩石菖蒲莪朮三稜三錢半陳皮去白青皮去白各一兩七錢半官桂一兩半蘿蔔子六兩微炒附子一斤四兩臨時炒另研黑牽牛上為末和勻淡米醋糊丸如梧子大曬乾用米醋蓋面再曬乾每服三十丸或五十丸臨臥薑湯或茶下日間莫服若膀胱疝氣攻心鹽湯下要大便利快加丸數此藥溫平不損元氣消積聚化宿氣疏風和胃消酒寬中破塊磨癖孕婦莫服破氣丸鮑氏方治氣積塊久近一切氣硫黃焰硝炒成子陳皮青皮各四兩上為末糊為丸空心飲下三十丸丁沉香丸鮑氏方治諸氣攻心腹痛及治婦人氣妙丁香沉香木香青皮肉豆蔻胡椒蓽茇檳榔一分乳香半兩麝香一錢上為細末研勻醋糊為丸如粟大硃砂為衣美酒下十五丸心疼醋湯下氣血痛燒綿灰酒下十五丸通氣阿魏丸華他中藏經方阿魏二兩酒熬沉香一兩桂半兩黑牽牛一兩炒硃砂少許巴豆半兩上先將阿魏熬成膏次入前藥為丸如櫻桃大硃砂為衣一丸酒化下沉香利膈丸沉香五錢木香五錢牙皂火燒去皮弦陳皮二兩青皮二兩莪朮二兩牽牛炒頭末一兩大黃一兩半蓽澄茄五錢麥牙一兩神麯一兩上為細末醋糊丸如梧子大每服五十丸空心陳皮湯下五香散醫字切問治男子婦人一切氣心腹滿痛牽引腰背香附子烏藥陳皮各一兩羌活二錢莪朮半兩上為細末熱酒調空心服二錢神仙楮實丸宣明論治積冷氣衝心胸及腹有蛔蟲疼痛痔瘻痃癖氣塊心腹兩肋脹滿氣急食不消化上逆氣奔於心並疝氣下墜飲食不得吐水嘔逆上氣咳嗽眼花少力心虛健忘冷風偏風等疾坐則思眠起則頭眩男子冷氣腰疼膝痛冷痹風頑陰汗盜汗夜多小便泄利陽道衰弱婦人月水不通小腹疼痛赤白帶下一切冷疾無問大小能明目益氣力輕身補髓精楮子實一升淘去泥微炒官桂四兩去皮牛膝半斤酒浸三日乾薑二兩上為末酒糊為丸如梧桐子大每服五十丸空心陳皮湯下導氣枳殼丸宣明論治氣結不散心胸痞痛逆氣上攻常服分氣逐風功不可述枳殼去殼麩炒木通銼炒青皮去白陳皮去白桑白朮銼炒蘿蔔子微炒莪朮三稜煨茴香炒白牽牛炒黑牽牛炒各等分上為末生薑汁打糊丸如梧子大每服二三十丸煎橘皮湯下補中丸出宣明論治一切氣疾心腹㽲痛嘔吐氣逆不思飲食厚朴生薑制香乾薑炮陳皮白茯苓去皮甘草炙紫各分兩上為末煉蜜和丸如櫻桃大每服一丸空心白湯下細末嚼亦得蓽澄茄丸出宣明論治中焦痞塞氣逆上攻心腹疼痛吐逆不利不思飲食蓽澄茄阿魏各半兩醋麵裹燒熟良薑二兩神麯炒青皮去白官桂去皮各一兩上為末醋糊丸如梧子大每服二十丸生薑湯下不計時蛤蚧散出宣明論治肺胃氣攻心刺痛蛤蚧一對稍炙乳香木香白茯苓丁香茴香各一兩穿山甲二錢上為末每服一錢好溫酒調下空心食前服之導氣丸出宣明論治心胸滿悶脅肋刺痛不思飲食常服寬膈進食薑黃香附子各四兩縮砂甘草各二兩丁皮甘松木香三稜白檀藿香上為末入緑豆粉二兩湯釋蒸餅為丸如梧子大每服三二十丸細嚼白湯下食後日進三服調和諸氣治心腹切痛出海外名方香附子一兩砂去毛縮砂仁一分上件為末煉蜜為丸如彈子大每服一粒細嚼薑湯下不拘時服道氣丸醫方集成宣壅導氣除脹滿利大腸大黃四兩濕紙裹煨胡椒四十九粒青皮去白陳皮去白蠍梢去毒炒茴香炒乾薑炮甘草炙各一兩黑牽牛取頭末二兩阿魏半錢用稀面和作餅子煎黃色上為末蒸木瓜湯搜勻為丸如緑豆大每服二十丸溫鹽湯下不拘時候量虛實加減服消脹丸醫方集成快氣寬中除腹脹消宿食木香黑牽牛取頭末二兩蘿蔔子各等分檳榔上為末滴水丸如梧子大每服三十丸煎生薑蘿蔔湯食後下通氣丸醫方集成治氣滯胸脅噎塞滿閉並小腸氣痛丁香皮黑牽牛各五兩益智仁白朮各一兩茴香蘿蔔子陳皮荊三稜炮蓬莪朮炮縮砂仁枳殼去白麵炒各二兩上為末麵糊丸如梧子大每服三十丸蘿蔔湯下食後服分心氣飲出如宜方治男子婦人一切氣不和或因憂愁思慮或因酒食過傷或臨食憂煩或事不遂意以此不足留滯不散停於胸膈不能流暢致使心胸痞悶脅肋脹滿噎塞不通噫氣吞酸嘔噦噁心頭目昏眩四肢倦怠面色痿黃苦口乾舌飲食減少日漸羸瘦或腸虛祕並皆療之常服升降陰陽調順三焦消化滯氣進美飲食治氣之劑率多溫熱此方獨清涼舒快紫蘇連莖葉四兩羌活半夏湯浸七日肉桂去皮青皮去白陳皮去白大腹皮桑白皮木通去節芍藥甘草赤茯苓各一兩上㕮咀每服三錢水一盞生薑三片棗二枚燈心十莖煎取七分去滓溫服一方治男子婦人脾胃不和胸膈痞塞腹脅疼痛氣促喘滿心下膨脹飲食不思嘔吐不止用五味子去梗炒茯苓去皮甘草炙陳皮洗淨桑白皮炒草果仁煨大腹皮各三兩紫蘇揀嫩枝葉二兩為粗末拌和每服四錢水一大盞姜三片許煎至七分去滓空心服名分氣紫蘇飲一方治氣滯留四肢浮腫腹急中滿膈脅膨脹急虛氣上衝小便臭濁神思不爽用木香赤茯苓一兩木豬苓去皮三分澤瀉半夏湯洗七次汁浸三宿炒枳殼去瓤麵炒紫蘇子炒檳榔炒半兩為末每服三錢水一盞半燈心五寸長二十莖煎至八分去滓入麝香少許和藥食前服名木香分氣湯又名小流氣飲降氣湯醫方集成治虛陽上攻氣不升降上盛下虛膈壅痰實喘滿咽乾不利煩渴多飲頭目昏眩腰腳無力倦怠咳嗽兼治風濕腳氣前胡甘浸炒甘草炙橘皮去白真紫蘇水淘去浮川當歸去蘆土洗桂心去粗皮厚朴去粗皮生薑浸炙齊州半夏湯浸七次洗薑汁浸五加皮薑汁塗炙黃耆各一兩人參去蘆附子泡去皮洗桔梗去蘆羌活乾薑炮各半兩上㕮咀每服四錢水一盞半蘇三葉姜三片棗二枚煎七分去滓食後溫服之一方治肺滿氣浮不能升降時時喘促兼治風冷痰嗽用紫蘇子隔紙銚內微炒前胡去蘆頭厚朴薑汁浸炒甘草炙黃陳皮去白當歸洗淨半夏曲桂心不見火黃耆生銼焙五加皮薑汁浸炙各一兩沉香一錢半不見火阿膠半兩黃秫米炒為散每服二錢水一盞入蘇三葉姜三片棗二枚煎六分去滓食後服名加減降氣湯一方無橘皮消氣湯醫方集成治血氣凝滯而心脾不和虛氣上盛腹急中滿四肢浮腫飲食無味氣不升降小便臭濁胸膈痞悶沉香木香人參半夏湯洗七次桔梗炒各半兩陳皮去白一兩青皮去瓤炒半兩木通白茯苓去皮草果仁炒大腹皮洗焙紫蘇連根用各三兩上為末每服三錢水一盞姜四片棗二枚煎七分去滓空心食前溫服歸氣散出簡易方治真氣不降胸膈痞滿心腹臍脅疼痛不進飲食歸元正氣補脾胃沉香木香丁香白姜炮肉桂去皮不火陳皮去白當歸甘草炙附子二斤六兩去皮臍縮砂仁益智仁炒葫蘆巴炒舶上茴香炒白朮川楝子肉炒豆蔻肉麵裹去面用各用一兩上為細末每服三錢水一盞紫蘇三葉木瓜四片鹽少許煎至八分食前溫服神保丸出如宜方治諸氣刺痛流入背膂及心膈腹腎諸積氣作痛宣通臟腑木香胡椒各一分全蠍七枚巴豆十個去皮心研取霜上為細末湯釋蒸餅丸如麻子大硃砂為衣每服五粒心膈痛柿蒂燈心湯下腹痛柿蒂煨薑湯下血痛米醋湯下肺氣甚者白礬輕粉各三分黃丹一分同研為末煎桑皮糯米飲送下三錢小喘桑白皮糯米飲下肝氣脅下痛茴香湯下大便不通蜜調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲任下諸氣膀胱氣脅下痛最難治獨此藥能去之有人病項筋痛諸醫皆以為風治之數月不愈乃流入背膂久之又注於脅下攣痛甚苦乃合治之一服而愈嘗再發又服病除一方用胡椒一兩蠍尾半兩去毒細末麵糊丸如粟米大每服十五丸至二十丸陳米飲下名塌氣丸中加木香一味和順臟氣消腹脅堅脹小便不利並治息積名胡椒丸
