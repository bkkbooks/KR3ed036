body:
  text: 卷一百二十四傷寒門歌訣論陰陽脈交死素問云陰陽交者死素問云失守其位者危素問云尺寸反者死素問云不當其位迭移其位者病傷寒運氣說經曰夫天地之氣勝復之作不形於診脈法曰天地之變無以脈診此之謂也歲運更移順交作變而生病者亦陰陽之常理也謂歲當陽在左而反見於右謂歲當陰在右而反見於左左右交者卜死若左右獨然非交是謂不應惟寅申巳亥辰戌丑未八年有應也謂寸尺反者死謂歲當陰在寸而反見於尺謂歲當陽在尺而反見於寸寸尺反者死若寸尺獨然非反是謂不應唯子午卯酉四年應之故運有南北政令脈有寸尺交反又北政兩寸當沉細不應而反浮大移於兩尺脈沉細不應是謂交如此者死又如南政兩寸當沉細不應而反浮大移於兩尺沉細不應是謂反如此者死若寸獨然或尺獨然不應者非交非反也上病而已舉此為例餘歲同法故經曰必先歲氣無伐天和粗工不知呼為寒熱攻寒令熱脈不變而熱疾已生制熱令寒脈如故而寒疾又起欲求其適安可得乎夭枉之由卒在此也蓋六脈與運氣勝復加臨遇正當行令當其運化之時而脈動不相同以諸論考之則大同小異若交氣交運時日及期而見無相先後不及太甚方謂之平若差之者當知其病脈也當先立其年以知其氣左右應見然後乃言死生也凡三陰司天在泉上下南北二政或左或右兩手寸尺不相應皆為脈沉下者仰手而沉覆手則沉為浮細為大者也若不明此法如過淵海問津豈能遇乎區區白手不能明曉也若能參究氣運詳考尺寸相應不相應明其補瀉而施治可謂備矣歌訣
