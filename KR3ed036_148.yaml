敗毒散出聖惠方治傷寒時氣頭痛項強壯熱惡寒身體煩疼及寒壅咳嗽鼻塞聲重風痰頭痛嘔噦寒熱並皆治之柴胡去苗甘草炙桔梗人參去蘆芎藭茯苓去皮枳殼去瓤麩炒前胡去苗洗羌活去苗獨活去苗各三十兩上為粗末每服二錢水一盞生薑薄荷同煎至七分去滓不拘時候寒多則熱服熱多則溫服生薑薄荷各少許一方無獨活傷濕加白朮腳氣焮赤熱重寒熱如瘧自汗惡風或無汗惡寒加大黃蒼朮皮膚赤疹瘙癢加蟬蛻痢純下赤胃壯能食者與數服此方和劑方為末每服三錢匕三因方為散每服四錢匕今人或用四錢重此藥性涼自利及曾汗下脈虛手足冷者勿服心脅氣觸痛或發熱背寒者勿服七聖湯治時氣頭疼壯熱肢體煩疼麻黃去根節煎掠去沫炒焙三兩蒼朮二兩炒甘草二兩炙銼橘皮湯浸去白焙一兩木通一兩銼山茵陳一兩桔梗炒一兩五錢上粗搗篩每服三錢以水一盞入生薑三片同煎至七分去滓溫服防風散治頭痛壯熱惡風百節浸疼肩背拘急面赤虛煩聲重咳嗽厚朴二兩薑製陳皮二兩甘草二兩炙藁本二兩桔梗三錢炒獨活防風蒼朮折去皮四兩上為細末每服三錢水一大盞姜三片棗二枚煎至七分溫服沸湯點亦可春夏宜用之羌活散治四時傷寒頭痛鼻塞或流清涕項背拘急惡風自汗柴胡四兩白芷一兩川芎一兩藁本一兩桔梗五錢甘草五錢獨活五錢羌活五錢上㕮咀每服三錢水一鍾半蔥姜煎至七分熱服治傷寒及時氣溫病頭痛壯熱脈盛始得一日用黃丹塗身令遍向火坐令汗出治傷寒時氣溫病頭痛壯熱脈盛取生蘘荷根葉合搗絞汁服三四升山茵陳散治時行身熱頭痛四肢疼痛山茵陳四兩石膏一兩碎研蒼朮米泔浸一宿去皮作片炒三兩麻黃去根節煎掠去沫焙一兩上為散每服二錢匕熱蔥茶清調下連並三服衣覆取汗五解湯治時氣頭痛五心煩熱語言狂亂麻黃去根節煎去沫二兩越桃一半生一半炒白朮桔梗炒石膏研杏仁去皮尖雙仁炒各一兩上粗搗篩每服三錢以水一盞生薑三片豉七粒蔥白一寸薄荷五葉同煎至七分去滓熱服如欲出汗並煎兩服衣被蓋覆瘥茵陳麻黃散治時氣頭痛壯熱或暑毒伏心狀如瘧疾山茵陳四兩麻黃去根節煎去沫焙五兩石膏碎一兩蒼朮水浸去粗皮二兩蜀椒去目並閉口者炒出汗二兩上為細散每服二錢匕點茶調下如狂言熱燥沙糖冷水調下麻黃大黃散治時氣頭痛壯熱三日內宜服麻黃去根節一兩大黃銼五錢桂去粗皮五錢黃芩去黑心半兩甘草炙銼半兩芍藥五錢乾薑半兩炮上為散每服三錢以暖酒調下衣被蓋取汗石膏湯治時行疫癘病壯熱頭痛唇乾石膏碎一兩葛根銼三分芍藥五錢貝母五錢百合五錢升麻半兩梔子仁一分甘草炙一分上粗搗篩每服三錢用水一盞半豆豉五十粒蔥白三寸同煎一盞去滓溫服豉尿湯治天行熱氣頭痛骨肉痠疼壯熱等疾若初病一日在毛髮二日在皮膚三日在肌肉必未得汗利且宜進此湯豉一升蔥白切一升小便三升童子者為佳上先熬豉及蔥白令相得則投小便煮取一升澄清及熱頓服或汗或利但得則瘥如未歇依前更進一劑頻用有效如不除進柴胡湯麻黃陳者去節二兩甘草炙二兩柴胡三兩黃芩三兩乾葛三兩石膏五兩碎綿裹豉七合綿裹三沸蔥白根切一升勿令有青夏青即熱白即冷一作桑根皮上切以水九升宿漬藥明旦先煮麻黃令沸掠去上沫然後並諸藥煮取二升七合分三服服別相去三食頃久覆取汗汗出以粉拭之惡寒多加桂心一兩忌海藻菘菜等治傷寒時氣溫病方及頭痛壯熱脈大始得一日取蔥白連根葉和搗三升許和真丹一兩水一升合煮絞取汁頓服之得吐便瘥若重再作一升盡服厚覆取汗即瘥又方用小蒜一升搗取汁三合頓服之不過再作便瘥又方用烏梅二七枚鹽五合以水三升煮取一升去滓頓服之神明白朮散出活人書治瘟疫病頭痛壯熱惡寒不解白朮銼炒二兩附子炮裂去皮臍二兩桔梗一兩細辛去苗葉一兩烏頭炮裂去皮臍四兩上為散以絹囊盛帶之居閭皆無病有病疫癘者溫酒服方寸匕覆取汗或得吐即瘥若經三四日抄三錢以水二盞煎一盞半去滓分溫三服治時氣頭痛壯熱方見時氣一日頭痛壯熱方時氣譫語附論夫時氣熱毒攻心則心神煩亂陽氣大盛遂譫言目赤心煩不得睡臥精神驚悸言語失常毒氣不除陽中結燥其脈洪數者是其候也方秦艽散出聖惠方治時氣熱毒躁悶譫言口舌乾渴不止秦艽去苗黃芩木通銼犀角屑麥門冬去心玄參藍葉梔子仁桔梗去苗頭各一分甘草炙微赤銼三分赤芍藥三分白蘚皮散出聖惠方治時氣大熱悶亂譫語白蘚皮一兩犀角屑一兩川升麻一兩大青一兩甘草一兩炙銼上為散每服五錢以水一大盞煎至五分去滓不計時候溫服治時氣譫語欲走出聖惠方生雞子白一枚川芒硝一兩細研生甘草末一錢上以井花水一中盞攪令勻吹去沫不計時候服之生地黃飲子出聖惠方治時氣心膈大熱煩悶言語失度生地黃三兩玄參一兩赤茯苓一兩麥門冬二兩去心犀角屑一兩甘草五錢炙微赤銼上細銼和勻每服半兩以水一大盞煎至五分去滓不計時候溫服治時氣煩熱如火譫語欲走出聖惠方人參去蘆頭一兩甘草炙令微黃一兩上為散每服一錢以新水調服須臾更令病人多飲冷水得吐之為效豬苓散出聖惠方治時氣但譫語煩躁不安豬苓去黑心三分白蘚皮三分澤瀉三分赤茯苓三分大青三分麥門冬一兩去心焙川大黃三分甘草半兩炙微赤銼上為散每服不計時候以新汲水調下三錢犀角丸出聖惠方治時氣熱毒在臟譫語口乾煩躁犀角屑一兩梔子仁一兩川大黃銼碎微炒一兩鐵粉一兩細研馬牙硝一兩甘草三分炙微赤銼上為末煉蜜和丸如梧桐子大每服不計時候以溫竹葉湯下三十丸大黃丸出聖惠方治時氣大熱不退譫語大便難川大黃二兩銼碎微炒黃芩一兩犀角屑一兩豬苓去黑皮一兩枳殼麩炒微黃去瓤一兩川朴硝一兩上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以麥門冬湯溫下三十丸水導散出千金方治天行病煩熱如火狂言妄語欲走白芷一兩甘遂二兩熬上二味搗篩以水服方寸匕須臾令病人飲冷水腹滿則吐之小便當赤色也一名濯腹湯此方療大急者治天行壯熱狂言謬語五六日者雞子三枚芒硝方寸匕井花水一杯上三味合攪盡服之心煩下則愈水導散治時氣病煩熱如火狂言妄語欲走甘遂五錢白芷二兩大黃四兩厚朴八兩枳實五枚芒硝三合上四味㕮咀以水一斗先煮厚朴枳實取五升去滓納大黃煎取二升去滓芒硝更煎一兩沸分再服得快利止
