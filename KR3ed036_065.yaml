body:
  text: 卷六十五牙齒門總論夫口齒者為臟腑之門戶呼吸之機關納滋味以充腸胃通津液以潤經脈故口為脾之應候齒作骨之榮華在乎一身實為大要是以黃庭經云口為玉池太和宮漱咽靈液災不幹齒治之堅牢白淨則津液美而無病矣或揩洗無方招風致病性有疏懶不能矜持滋蔓既深損蠹尤甚夫唇為飛門齒為戶門宣發五音摧伏諸谷凡有病起因口而成含惡氣以咽津益痰澼而在膈使心胸壅滯毒氣攻蒸而熏之焉得不損究其病本實有多般且疳䘌者齒齦虛軟無膿血又口䘌者其齒齦觸著即膿血出又口疳其齦不觸自然膿血出又風疳者其齒齦上齶有小孔形如蜂窠之狀又齒疳其齒骨脆爛又齒齦唇口忽變白色或作青黑色者是急疳之狀也死不過旬日宜急治之先看唇頰裡有紫赤或青黑脈處即須針去惡血不然烙之亦好附齒有黃黑色物似爛骨之狀者名為齒狀凡治齒者先看有此物即須用疳刀掠之附齒有物如蟬翼或如雞子或如絲纏著齒根亦須用疳刀掠之不爾則齒齦永不著齒根也原夫齒者骨之所終髓之所養腎實主之經云腎衰則齒豁精固則齒堅或曰手陽明之支脈入齒手陽明者大腸經也於齒何預不思大腸傳送氣道行焉壅則齒浮虛則宣露挾風則上攻頭面疳䘌則變成齲脫不相為而實相關也夫齒之為痛者五一曰風熱二曰風冷三曰毒痰四曰惡血五曰蟲蝕風氣襲虛客於齒間乘於血氣故令齦腫熱氣加之膿汁遺臭此風熱之為齒痛一也血氣不足骨髓乃虛風冷湊入停於齒根不腫不蛀日漸動搖此風冷之為齒痛二也熱則生痰毒氣上攻灌注經絡最能發痛外證壅盛嗽唾交沖此毒痰之為齒痛三也頭面有風挾熱攻齦熱搏於血故令血有瘀滯不消掣痛錐刺此惡血之為齒痛四也凡人飲食肥甘不能潔齒腐臭之氣淹漬日久齒根有孔蟲在其間蝕一齒落又度其餘至於疳䘌皆其種類必蟲殺而後痛止五也且百物養生莫先口齒不漱不洗損蠹之媒是不惟患生宿腐而宿酒毒常伏於口齒之間莫若時時洗漱之為愈也臨睡洗畢至於晨興灌漱一口吐掌中就掌洗眼自覺光明終身行之真可謂終身受用凡齒齦宣露多是疳䘌及月蝕以角蒿灰夜敷齦間使滿勿食油二三夜瘥食油干棗即發所以患齒者忌油干棗及桂心每旦以一捻鹽納口中以暖水含化揩齒及叩齒百通為之不絕不過五日齒牢密凡人齒斷不能食果菜者皆由齒根露也用此鹽湯揩齒叩齒法無不愈也神良凡人好患齒病多月蝕夜食飲之所致也識者宜深慎之以日月蝕未平時特忌飲食小兒亦然澤州李繼之忽患牙痛皺眉不語欒景先見之曰何不樂也曰牙痛欒曰曾記張戴人云陽明經熱有餘也宜大下之乃付舟車丸七十粒服畢過數下知交留飲強飲熱酒數杯熱藥為酒所發盡吐之吐畢而痛止李大服曰戴人神人也不三五日大痛大服前藥一百餘粒大下數行乃愈牙齒歷蠹附論牙齒歷蠹者皆腎氣虛弱骨髓不固氣血衰耗不能榮滿於口齒故令牙齒黯黑謂之歷蠹腎主骨齒者骨之餘也人之腎氣強勝骨髓堅固則牙齒瑩白璀璨今腎氣虛弱無以榮於骨髓故令牙齒槁而黑黃獨活丸治牙齒歷蠹齒根黯黑獨活防風去蘆頭芎藭細辛當歸沉香乾生地黃各一兩雞舌香零陵香川升麻甘草各半兩上為末以化了蠟和丸紅豆大綿裹當含一丸咽津穀精草散治牙齒歷蠹穀精草一兩燒灰馬齒莧半兩乾者甜蕪菁苗半兩川升麻半兩白礬一分燒灰乾漆一分豬牙皂莢一兩干蝦蟆三兩燒灰上搗細羅為散入缽細研令勻每用半錢敷於患處有涎即吐日三度用之皂鹽散出聖濟總錄治牙齒歷蠹黯黑皂莢一挺酥炙去皮子鹽花槐皮各半兩升麻白礬熬令汁枯甘松香細辛去苗葉各一分上為細散先以鹽揩齒後用藥半錢勻敷之升麻散出聖濟總錄治牙齒歷蠹黯黑槐枝皮半兩升麻半兩白附子炮密陀僧煅露蜂房各一分上為細散入地黃汁一合和勻陰乾每用揩齒黃丹散治牙齒歷蠹色黑黃丹半兩白礬一兩川升麻一分末細辛一分末麝香一錢細研上先研白礬黃丹令細於生鐵銚子內炒如火色取出於地上用紙一重襯以物蓋之出火毒一宿後入川升麻等三味同細研為散用半錢摻於患處效穀精草散出聖濟總錄治齒歷蠹穀精草燒灰白礬灰各一分蟾酥一個炙乾麝香少許上細研為散於宣露處貼之柳枝膏出聖濟總錄治齒歷蠹柳枝銼一握防風去苗葉銼細辛去苗葉銼鹽花各一分上用水三盞煎至一盞半去滓更煎膏以瓷器收每用薄紙剪如柳葉塗藥貼齒上麝香散出聖濟總錄治齒歷蠹麝香定粉一錢黃蠟半兩上細研前二味後熔蠟調攤紙上臨臥時剪作片子貼所患齒上胡桐淚散出聖濟總錄治牙齒歷蠹齒根黯黑胡桐淚一兩丹砂一兩麝香一分上同研極細常用揩齒脆壞欲盡方出聖濟總錄治牙齒歷蠹上用白礬不拘多少新綿裹之以所患齒咬定有涎即吐一方治齒腫枯過為末敷齒根下或熱水漱之亦治牙疼牙齒疼痛附論夫牙齒痛者是牙齒相引痛牙齒是骨之所終髓之所養陽明之脈入於齒若髓氣不足陽明脈虛不能榮於牙齒為風冷所傷故疼痛也又有蟲蝕於牙齒則齒有孔蟲居其間又傳遍余齒皆以疼痛則針灸可瘥敷藥蟲死痛止牙齒疼痛有二手陽明脈虛風冷乘之而痛者謂之風痛蟲居齒根侵蝕不已傳受余齒而痛者謂之蟲痛二者不同古方有塗敷漱渫之藥治風去蟲用之各有法也治牙疼法熱怕冷水冷怕熱湯不怕冷熱即是風牙有蟲竅者即是蟲牙熱則用牙硝鬱金雄黃荊芥之類冷則用乾薑蓽茇細辛之類牙宣於牙齦上出血腫痛用藥皆以溫湯漱之方牙藥麝香散出御藥院牢牙齒止疼痛養氣血黑髭鬢綠礬枯生地黃各半兩青黛半兩青鹽二錢石膽炒三錢訶子皮何首烏龍骨白茯苓各一兩縮砂八錢甘松四錢零陵香藿香葉各六錢百藥煎一兩細辛二錢龍腦麝香各三錢石燕子燒通赤醋淬七次半兩五倍子一兩二錢上為細末每用以刷牙蘸藥刷牙齒上待少時用溫水微漱早晨食後或臥日用三兩次防風飲出聖濟總錄治牙痛舌癢食物不得防風去叉升麻桂去粗皮白石脂研當歸切焙檳榔銼桑根白皮銼炒乾木瓜人參黃連去須羌活去蘆頭芎藭銼天雄炮裂去皮臍各三兩黃芩去黑心遠志去心半兩上㕮咀每服三錢水一盞生薑五片煎至七分去滓溫服藁本湯出聖濟總錄治牙疼藁本去苗土芎藭防風去叉蔓荊實去皮細辛去苗葉羌活去蘆頭升麻木通銼各三兩榴白皮細切二兩鹽二兩露蜂房炙擘碎狼牙草切莽草去梗各半兩大豆炒令香熟二合上搗篩每用五錢水一盞入生地黃汁少許煎十餘沸去滓熱漱冷吐齒齦用方出直指方蓽茇生地黃當歸鬚荊芥穗白芷桑白皮炒蜂房炒赤芍藥薑黃細辛藁本赤甘草生等分上為粗末每服三錢井水調頻漱齒丁香膏出聖濟總錄治牙齒痛丁香膏三兩好者以水三升煎至半升黃蠟三兩沉香二兩水三升煎至半升細辛三兩去苗葉水三升煎至半升麝香一兩別研丹砂松脂一兩煉黃耆銼一分鉛丹三兩硫黃一兩研如粉上先以銀器中煎丁香沉香汁次入細辛汁煎半以來入松脂次入諸藥末候藥無水氣即入好麻油五兩以柳木篦子攪不得住手候膏成即入銀器中盛之如牙齒冷痛以塗絹可牙齒大小貼之立效貼藥齦腫出膿血並是病蟲出也莽草散出御藥院治牙齒痛烏髭鬢牢牙莽草牛膝去苗柳枝皮取白胡蒜子生乾地黃生薑菟絲子無食子桐子漆豬牙皂角各六兩上各銼如麻豆大入藏瓶鹽泥固濟火煉一日後入地一尺二寸深埋三伏時取出露三夜不得見日氣研羅為細散每用手指蘸藥於牙上旋搽神應散搽牙痛川芎防風升麻細辛茯苓白芷香附子蓽茇甘松各等分石膏比以上加三倍上為細末每服晚臨臥刷淨牙以指蘸擦熱麻漱去常用牢牙去風羌活散出海上方治牙疼胡椒川椒川芎炮烙二錢荊芥穗白芷防風草烏羌活蓽茇露蜂房各半兩上並曬乾為末揩牙鹽湯漱之忌食動風物露蜂房散治諸牙疼不可忍者當歸細辛川芎赤芍藥白芷防風藁本升麻蜂房炒各二錢川椒五粒上作一貼用白水煎乘熱含冷吐之頻用妙清風定痛散荊芥穗一兩朴硝二兩膽礬一錢羅青二錢半防風細辛白芷全蠍升麻草烏以上各五錢上為細末每用擦牙治牙痛胡椒麝香青鹽乳香蓽茇良薑雄黃細辛烏頭上為細末牙疼時噙水一口左邊牙痛用藥些少吹入左鼻孔內右邊牙痛吹入右鼻孔內即止升麻散出聖濟總錄治牙齒疼痛生齦肉去熱毒解外風防風去叉當歸切焙升麻各一兩藁本去苗土甘草炙白芷細辛去苗土芎藭各半兩木香一分上為散於乳缽中研細塗貼齒齦粗者以水二盞藥五錢煎五七沸去滓熱漱冷吐誤咽不妨升麻散出經驗良方治牙疼腮腫升麻地黃川芎地骨皮槐子細辛皂角白芷各半兩川椒二錢半上為細末以藥少許揩牙有涎吐出用鹽灌漱專治牙疼出海上方川芎二錢升麻一兩石膏四兩蠍梢一錢細辛一兩胡椒半錢荊芥穗蓽茇一錢膽礬少許上為細末先以溫漿漱過用藥一字擦痛處又以漿水漱口再以藥擦之叩齒三遍再以溫漿漱去再不痛定痛牙散防風荊芥穗各二兩細辛一兩草烏一兩白芷一兩全蠍七錢半青鹽五錢朴硝一兩青黛五錢上為細末每用少許先以鹽湯漱淨後擦患處再漱麝香白牙散出德生堂治牙疼牙宣口臭石膏半斤炒細辛一兩刺蒺藜一兩青鹽半兩炒三柰子五錢丁香三錢甘松三錢檀香三錢白芷三錢上為細末入麝香少許研勻用手揩以唾津濕蘸藥加川芎半兩又炒茯苓散治牙齒疼痛茯苓去黑皮一分茯神去木一分松脂一分熬丹砂一分研青葙子半兩炒令焦白礬一兩熬令汁枯麝香半兩研乳香一分研上為散貼於牙齒疼痛處定愈散出聖惠方治牙齒痛乳香半兩白礬一兩燒灰黃耆銼半兩琥珀一兩松脂一兩熬汁盡青葙子一兩熬令熱不得焦丹砂半兩研如粉麝香三分好者上為散更別搗乳香煉熱為汁入前藥中如有疼痛蟲孔之中干貼之不用諸物貼藥之時未得用水其痛立止升麻散出聖惠方治牙齒疼痛川升麻半兩莽草一分桑寄生一分地骨皮半兩防風半兩細銼去蘆頭藁本一分柳枝一握銼槐白皮半兩上為散每用五錢以水二大盞入鹽末一錢荊芥五穗煎至一盞去滓熱含冷吐日三槐枝八仙散出御藥院治牙齒疼痛地骨皮生乾地黃梧桐律莽草各一兩細辛去苗半兩乳香另研青鹽各二錢半新槐枝取東引者五握細銼對本人稱重一兩上除槐枝乳香青鹽外同為細末另入槐枝乳香青鹽攪勻停分作八服每服用水三盞煎三沸去滓帶熱緩緩漱之誤咽無妨冷即吐去大止牙痛痛愈更宜再漱忌甜物檳榔散出御藥院治牙齒疼痛連齦頰俱腫去風熱消腫痛檳榔荊芥穗甘草升麻羌活藁本木香細辛各半兩上並不見火生搗羅為末每用半錢敷在腫痛處吐津誤咽無妨不拘時候延齦散出御藥院牢牙齒定疼痛固齦齶益氣血黑髭鬚大有神效澤烏頭皂角去皮子生地黃各一兩上三味同為粗末用生薑自然汁和成糰子用槐枝火燒令煙盡取出於淨地上用碗蓋一宿出火毒再搗為細末入後件藥細辛取末青鹽各三錢石膽白礬灰麝香各二錢五味另研上件入前藥中同研勻細每用搽牙病處或用刷牙蘸刷亦得早晨食後臨臥日用三次有津即吐誤咽不妨白茯苓出神效方治牙痛細辛去苗白茯苓去皮川升麻蓽茇青鹽明石膏川芎不蛀皂角去皮用酥炙黃色以上各等分上為細末早晚熨牙溫水漱之牙痛處更上少許雄黃散出醫方大成治諸牙疼雄黃細辛去苗青鹽一方有枯礬無青鹽乳香別研良薑蓽茇麝香胡椒上為細末以溫漿水刷淨後用藥末於痛處擦追出頑涎休吐了嗽數十次痛立止忌油膩一二日細辛散出聖惠方一名含漱湯療齒痛徐徐擦以涎溜為度不可嚥下獨活三兩芎藭當歸蓽茇黃芩甘草細辛各二兩雞舌香一兩上切以水五升煮成三升去滓含漱須臾悶乃吐更含之古今錄驗有甘草七寶散治牙疼膽礬錢半細辛錢半青礬砂仁滑石川芎蓽茇如有蟲用無不用五倍子一錢上為細末入麝香少許好江茶與藥對半用早晚擦牙芎藭湯出聖濟總錄治牙齒疼痛芎藭三分莽草去枝半兩獨活去蘆頭銼一兩防風去叉三分細辛去苗葉半兩郁李仁微去皮二分莨菪炒令熟一分上粗搗篩每用五錢以酒一升煎三五沸去滓熱漱冷吐草烏頭散出聖濟總錄治牙齒疼痛高良薑細辛去苗葉蓽茇白殭蠶五靈脂各半兩草烏頭米泔浸一宿去粗皮切作片炒一兩上搗羅為散凡用一字揩牙合口少時去涎盡以湯漱口柳枝湯出聖濟總錄治齒痛連牙頷疼槐枝切柳枝切黑豆各一兩蜀椒去目併合口炒去汗半兩鹽細辛去苗葉羌活去蘆頭各一分上除椒鹽外並粗搗篩先以水六盞煎取二盞去滓入椒鹽再煎取一盞通口漱之不拘時以瘥為度芎藭散出千金方治牙痛芎藭細辛防風礬子附子藜蘆莽草上各等分作末綿裹彈子大酒浸安患處含之勿咽日三次刺破極佳升麻散出御藥院治牙疼升麻荊芥穗川芎細辛去苗葉土防風各半兩椒去目微炒一錢露蜂房一錢上為粗末每用三錢水一盞煎三兩沸去滓溫漱冷即吐生地黃散出御藥院治牙齒疼痛生地黃升麻川芎防風露蜂房炒焦各一兩大皂角三錢去黑皮炒焦華陰細辛揀淨一兩上為粗末每服三四錢用水一大盞入荊芥數穗同煎至八分濾去滓微熱漱口冷即吐食後或臨臥日漱三兩次歸荊散出永類鈐方治一切牙疼川升麻川鬱金當歸細辛蓽茇白芷荊芥各等分上為末用瓦盒子貯之緊閉合口勿令泄氣每用少許揩在牙痛處以溫荊芥湯灌漱立效鹽湯亦可川芎散出海上方川芎白芷荊芥羌活硝鼠黏子升麻各等分上同煎溫漱防風散治牙痛川烏頭防風去蘆白芷各一兩川芎一兩錢半草烏頭半兩細辛去苗土淨七錢半蒼朮二兩去皮實者上先用鹽搽後方用藥末搽上效定疼追風散治牙疼全蠍香白芷細辛荊芥防風川芎川椒各一分上煎湯灌漱之溫風散出直指方治風冷齒痛當歸川芎細辛白芷蓽茇藁本蜂房炒各等分上銼每二錢並水煎沸仍含漱開笑散出聖濟總錄治牙齒痛塞鼻乳香雄黃硫黃各一分麝香半分砒霜一分阿魏半分上為末炊餅皮丸如雞頭實大如左邊痛即用藥一丸以薄綿裹塞左鼻竅內痛止即去之右邊亦然細辛散出聖濟總錄治牙齒疼痛頭面浮腫吃冷熱物不得細辛去苗葉芎藭藁本去苗土各一兩地骨皮半兩蒺藜子三分獨活去蘆頭各一兩上為散綿裹如江豆大含化咽津每日三五度易之去膈間風熱若患頭風鼻塞先以油塗頂心以手摩一二百遍次用散一錢又摩頂心依前摩數遍必瘥立勝散出御藥院治牙齒腫悶疼痛宜泄諸陽毒氣行經絡鬱滯細辛蠍梢各半錢藜蘆白礬生雄黃研豬牙皂角去皮炙各一分上同為末每用一豆許噙溫水隨患左右鼻內搐一字散出御藥院治牙齒疼痛蠍梢細辛蓽茇胡椒高良薑露蜂房炒黃各半兩上為細末每用半字噙溫水隨痛左右鼻內搐更用半錢搽牙痛有津即吐誤咽不妨不拘時候乳香定痛散出御藥院治牙齒疼痛乳香半錢青黛二錢盆硝半兩麝香一字玄胡索紅豆各三十個上為細末每用少許以指蘸藥於牙齒疼處有津即吐誤咽不妨如痛甚用藥一字噙溫水隨痛處鼻內搐透關散出楊氏家藏方治牙疼蜈蚣頭蠍梢去毒草烏頭尖如麥粒大者各十枚胡椒七粒川烏頭底如錢薄各十枚雄黃七粒如麥仁別研上為細末捻子蘸藥醋點少許於火上炙乾塞兩耳內閉口少時即可取效治牙疼出經驗良方香附子藜蘆樟腦細辛蓽澄茄防風各等分上為末擦之極驗升麻湯治牙痛川芎一錢升麻七錢半蓽茇半錢石膏二兩蠍梢五錢荊芥一錢半上為細末先用漿水漱牙用藥搽後用藥漱之甘松香散出範氏方治一切牙痛甘松香莽草各三錢硫黃半錢川烏去皮三錢北細辛去葉三錢香附子炒去毛二錢上為末以手指蘸少許揩牙上立效後用鹽湯灌漱妙治牙疼方石膏盆硝乳香沒藥雄黃川芎以上各等分上為細末如右牙疼口噙水搐右鼻內如左牙疼左鼻內搐之治牙疼方膽礬綠礬晉礬細辛雄黃玄胡索上藥末停勻如藥一兩以十分好江茶一兩和勻擦患處溫水漱數次即愈地骨皮散出聖惠方治牙齒連腮骨相引疼痛地骨皮一兩獨活一兩莽草半兩細辛半兩附子一枚生用去皮臍杏仁湯浸去皮尖雙仁麩炒微黃上粗羅為散每用半兩以酒二升浸一宿於銅器中慢火煎之稍熱含之冷吐勿咽日三用之雞舌香散出十便良方治牙齒風毒所攻疼痛不止雞舌香半兩細辛附子生去皮臍獨活各半兩川椒一分去目及閉口者微炒去汗麝香半分細研上為末綿裹如棗核大含之有涎即旋吐卻含三度瘥治牙齒疼痛不可忍者芎藭細辛防風去蘆頭附子生用去皮臍藜蘆去蘆頭莽草以上各一兩上為散以綿裹熱酒浸熨所患處兼綿裹以齒咬之勿咽其汁秦艽散治牙腫痛秦艽大黃防風梔子薄荷連翹上等分水煎漱防風散出聖濟總錄治牙齒疼痛防風去叉當歸切焙芎藭細辛去苗葉各一兩附子炮製半兩上㕮咀如麻豆每用藥五錢以水一盞入生薑五片煎十餘沸去滓熱漱冷吐藁本散出御藥院治牙齒疼痛藁本一兩川芎細辛各半兩胡桐淚三錢白礬灰二錢上為細末每用一指蘸藥搽牙病處吐津誤咽不妨治一切牙痛出海上方