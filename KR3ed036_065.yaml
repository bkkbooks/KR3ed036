半兩青鹽半兩地龍去土一分上為散早夜以齒藥揩牙齒動搖處療牙齒疼痛出聖惠方防風附子蜀椒各二兩莽草一兩炙上搗篩為散溫酒一盞和少許含勿咽汁以酒漱口十年患亦瘥治齒痛出聖惠方當歸桂心甘草炙各二兩礬石六分燒上以漿水二升取一升含之日五六瘥止治牙疼方牡蠣末三錢烏龍尾錢半乾薑末錢半麝少許上為末和勻吹鼻用神應膏出德生堂貼牙疼全蠍二十一個五倍子五錢土狗六個地龍二十一條去土上為細末蔥白二根爛搗取汁調成膏紙花貼太陽左右穴上立效麝香丸出十便良方治牙齒疼痛麝香半錢細研胡椒一分甘松香一分雄黃半分細研上為末都研令勻以水蜜和丸如梧桐子大每以新綿裹一丸安在患處咬之立效皂莢丸出聖惠方治牙疼插耳皂莢一挺谷一合蒜一頭去皮巴豆七枚去皮麩炒微黃上搗研為散每一字綿裹如梧桐子大隨疾左右納耳中立效阿魏丸出聖惠方治牙疼塞鼻阿魏臭黃砒霜各一分雄黃上細研為散以端午日子時和丸如梧桐子大如牙疼在左即於左鼻中以紙捻子塞之合口閉氣良久即定如是蚛牙納一丸有涎即吐卻香椒散出直指方治蟲症齒痛香附子紅川椒炒故紙炒各二錢蓽茇一錢上細研為末每服一錢匕日二極效桃白皮湯出聖濟總錄治牙齒疼痛桃白皮槐白皮柳白皮各二兩上銼如麻豆為六貼每貼以酒一升浸一宿煎三五沸去滓熱漱冷吐藜蘆散出聖濟總錄治牙齒疼痛藜蘆去蘆頭半兩附子炮裂去皮臍一分麝香一分研上搗羅為散每用半錢擦齒上牙有蟲孔即綿裹少許納之蜀椒湯一名如神散出和劑方治牙齒疼痛亦治舌腫強及齒腫不消及風蟲牙痤疼日夜不止臥睡不安不問年遠日近並皆療之蜀椒去目並閉口炒出汗鹽研用青色土蜂房各一分一方用露蜂房微炒上搗篩每服五錢以水三盞入蔥白三寸煎十餘沸熱漱冷吐日三五度一方無蔥白醋漿水煎亦可不可入喉中蒟醬散出御藥院治牙齒疼痛發作往來不已蒟醬細辛各半兩大皂角一挺去皮子青鹽每竅隙滿火燒存性細研用上為末如痛時用軟刷牙蘸藥刷痛處地龍散出神效方治牙齒疼痛地龍去土玄胡索蓽茇各一分上為細末左邊牙疼用一字新綿裹納左耳中右牙疼納右耳中其疼必止一字救苦散出御藥院治牙疼香白芷一兩雄黃錢半另研草烏頭半兩去皮心臍白者用心黑者不用上為細末與雄黃拌勻每用藥末少許搽於患處少時溫水漱止細辛散出御藥院治牙齒疼痛荊芥細辛露蜂房各等分上為粗末每用三錢水一大盞煎至七分去滓溫漱冷吐三聖散出御藥院治牙齒疼痛不已細辛一兩銼荊芥穗二兩銼蒼耳莖三兩銼上並㕮咀每用半兩水三盞煎至一盞半去滓熱漱冷吐誤咽無妨以痛止為度麝香玉線子豆粉半兩信一錢枯白礬一錢半上同研入麝香半錢再研為細末滴水和於手背上捻作線如用時先以漿水漱口用毛翎刷了縫中淨臨臥貼或為線子紝於縫中玄胡索散治牙疼玄胡索一錢斑蝥三個去頭尾炒白丁香三十個上為細末新汲水調為丸小豆大新綿裹左疼入左耳右疼入右耳治牙疼出危氏方雄黃沒藥各一錢乳香半錢上為末若左邊疼用藥些少搐入左鼻又吹入左耳若右邊疼用藥些少搐入右鼻吹入右耳無不效驗雄黃散治牙疼雄黃紅豆滄鹽上為細末搐一字入鼻中白礬散治牙疼屋松白礬蜂窩炒各等分上粗末醋煎熱漱冷吐追風散出瑞竹堂治諸般牙疼貫眾鶴蝨荊芥穗各等分上為㕮咀每用二錢加川椒五十粒用水一碗煎至七分去滓熱漱吐去藥立效薑黃散出海上方治諸般牙疼不可忍舒廷之撫干嘗患此遍用諸藥方無若此方之良薑黃如無以川芎代細辛白芷各等分上為散擦三兩次鹽湯灌漱立止如蛀牙疼去薑黃加蠍梢立效政和八年胡長文給事之父牙疼不可忍面腫偶無薑黃檢本草川芎亦治牙遂代之坐間便見腫消疼止後用川芎亦驗麝香散出海上方治諸般牙疼全蠍三個麝香一字細辛二錢上為細末干搽牙疼處涎出盡方用鹽湯漱治牙疼蟾酥少許巴豆去油如泥杏仁燒上研為泥用綿裹似粟米大如蛀牙扎入蛀處如風牙扎入牙縫內涎盡為驗漱牙羌活散薄荷一錢半羌活一錢大黃半錢上㕮咀作一服用水二盞煎至一盞去滓溫漱冷吐之咽亦無妨齒痛通用方出直指方蜂房炒明礬煅黃丹等分上為末飯為小丸塞齒川芎散出危氏方治面腫牙疼不可忍川芎白芷細辛各等分上為末擦兩三次鹽湯漱立止巴豆丸一名麝香丸出聖惠方巴豆十枚去皮心熬研如膏大棗二十枚取肉細辛一兩末上相和為丸以綿裹著所疼之處咬之如有涕唾卻勿咽入喉中日三瘥一方有麝香有蚛孔即納一丸立止治牙疼方絲瓜兒藤銼細川椒一撮燈心一小把上為水濃煎去滓溫漱吐之立效立住散出德生堂治牙疼如神荊芥鹽麩子蓽茇上等分㕮咀每服三錢水一盞煎七分去滓溫漱吐去涎喝散出德生堂治牙疼如神丁香石膏川芎上各等分為細末用手揩點唾津蘸藥末擦牙吐去涎再擦三上即住疼砒霜丸出聖惠方治牙疼砒霜半錢乾地龍三錢末巴豆六枚去殼上同研令細以豬脂膽和丸如麻豆大綿裹一丸於病處咬之有涎即吐白芥子吹鼻散出聖惠方治牙疼白芥子舶上蒔蘿蕓薹子各一兩上搗細羅為散每用一字如患左邊疼即吹入右鼻中如患右邊即吹入左鼻中仍先淨洗鼻中吹藥即驗白楊皮散出聖惠方治牙疼白楊樹皮一握細辛半兩露蜂房半兩上搗篩為散每用三錢以水一大盞浸一宿煎令三五沸去滓熱含冷吐治齒痛立效方出聖惠方生附子角十枚為末蟾酥綠豆大麝香一字上都研令細用糯米飯和丸如黍米大以綿裹一丸於痛處咬之有涎即吐吳茱萸散出聖濟總錄治牙齒疼吳茱萸湯浸焙炒白芷上等分為散用沸湯浸藥一錢漱疼處乳香散出聖濟總錄治牙齒疼痛不可忍乳香半分蜀椒輕炒取紅為細末一錢上二味合研為散每用半字一字揩貼痛處良久溫荊芥湯漱口立效一方研細溶蠟丸如麻子大每用一丸塞孔中蓽茇丸出聖濟總錄治牙齒疼痛蓽茇胡椒上等分為末化蠟丸如麻子大每用一丸納蚛孔中乾地黃丸一名牢牙散出千金方治牙齒疼痛及動搖生乾地黃焙三兩獨活去蘆頭一兩上㕮咀如麻豆每用五錢以酒一盞浸一宿煎十餘沸去滓熱漱冷吐以瘥為度水煎或漬一宿亦可一方二味各三兩細辛湯出聖濟總錄治牙齒痛細辛去苗葉苦參各一兩上銼如麻豆大以水一盞藥五錢煎五七沸去滓熱漱冷吐治牙齒疼痛出聖惠方槐白皮一握荊芥穗半兩上以醋一升煎至五合入鹽少許熱含冷吐以瘥為度補骨脂散出御藥院調養血氣治牙齒疼痛久不已青鹽半兩補骨脂二兩上同炒令微爆為度候冷取出搗為細末每用少許以指蘸藥搽於牙疼處有津即吐誤咽不妨每日附子散補骨脂散相間使用香附子散出御藥院治牙齒疼痛往來不歇香附子四兩細辛半兩上為粗末每用二錢水一盞煎至八分去滓稍熱漱冷吐追風散出御藥院治牙齒疼痛不止川薑炮製川椒去目各等分上為細末每用以指蘸藥無時搽牙痛處後鹽湯漱草烏頭散出瑞竹堂治牙齒疼痛動搖不穩用之闢風邪能令病牙易落草烏頭一兩炒令紫黑色用尖細辛一錢上為細末每用少許擦牙疼處後用手左右搖動日用三五次有津則吐誤咽不妨一方治風牙疼為細末先以冷水洗漱淨用手指點藥擦牙須臾立愈細辛湯出御藥院治牙齒痛久不瘥細辛蓽茇各等分上為粗末每用一錢水一盞煎至七分去滓熱漱冷吐獨活散出御藥院治牙痛不可忍諸藥不效者獨活二兩去土華陰細辛根一兩去皮上為粗末每用五錢水二盞入荊芥十穗同煎至一盞去滓熱漱冷吐無時治牙痛出神效方韶腦一錢好硃砂一錢上為末每用少許疼處搽又方出神效方好紅豆二錢花鹼少許上為末隨牙左右疼處鼻內搐之治牙疼出海上方川芎頭尖地花椒上各等分為細末搽患處
