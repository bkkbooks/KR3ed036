body:
  text: 卷一百六十六痰飲門懸飲附論夫懸飲者由臟腑虛冷營衛不和三焦痞悶因飲水過多停積不散水流走於脅則冷兩脅虛脹欲唾引脅下痛故謂之懸飲也方桂心散出聖惠方治懸飲心腹痞滿水走腸間兩脅引痛桂心一兩旋覆花半兩白朮半兩細辛半兩半夏半兩湯洗七次去滑桔梗半兩去蘆頭赤茯苓半兩一方有芍藥無茯苓澤瀉半兩附子半兩炮裂去皮臍枳殼半兩麩炒微黃去瓤前胡半兩去蘆頭上為散每服四錢以水一盞入生薑半分煎至六分去滓每於食前溫服前胡散出聖惠方治懸飲腹脅痞急宿食不化心胸滿悶前胡一兩去蘆頭半夏一兩洗七次去滑桂心一兩人參一兩去蘆頭訶黎勒皮一兩白朮一兩檳榔一兩枳殼一兩麩炒微黃去瓤甘草半分炙微赤銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓稍熱服日三四服厚朴散出聖惠方治懸飲心腹氣滯兩脅多痛厚朴去粗皮一兩塗生薑汁炙令香熟川大黃一兩銼碎微黃桂心半兩枳殼三分麩炒微黃去瓤檳榔三分上為散每服四錢以水一中盞煎至六分去滓溫服日三四服旋覆花方出聖惠方治懸飲腹滿脅痛旋覆花一兩皂角三定去黑皮塗酥炙令黃去子草豆蔻一兩去皮杏仁一兩湯浸去皮尖雙仁麩炒微黃枳殼半兩麩炒微黃去瓤川大黃一兩銼碎微炒上為末煉蜜和丸如桐子大每於食前生薑湯下二十丸治懸飲心腹氣滿兩脅多痛出聖惠方半夏三兩搗為末木香二兩旋覆花一兩檳榔三兩皂角三兩去黑皮塗酥炙令黃焦去子皮搗碎以酒一升挼取汁去滓煎成膏將半夏末以膏和作餅子以青蒿蓋出青衣如造麴法搗羅為末上為末以酒煮麵糊為丸如梧桐子大每於食前以生薑湯下二十丸小枳殼丸出聖惠方治胃不和宿寒留飲心腹痞滿脅肋刺痛嘔逆痰水不思飲食枳殼四兩炒去瓤半夏湯洗去滑白朮各三兩赤茯苓去皮乾薑炒各二兩上為細末麵糊為丸如梧桐子大每服三十丸食後生薑湯下治懸飲腹滿脅痛出聖惠方郁李仁三兩湯洗去皮微炒半夏一兩湯洗七次去滑草豆蔻一兩去皮上為末以酒煮麵糊和丸如桐子大食前生薑湯下二十丸又方出聖惠方牽牛子二兩炒皂角子仁二兩微炒上為末煉蜜為丸如梧桐子大每於食前以生薑湯下十五丸以取下痰滯為度溢飲附論溢飲謂因大渴而暴飲水水氣溢於腸胃之外在於皮膚之間故言溢飲令人身體疼重而多汗是其候也方半夏散出聖惠方治溢飲胸膈痰壅頭痛嘔逆不下飲食半夏一兩湯洗七次去滑赤茯苓三分白朮二分桔梗三分去蘆頭枳殼二分麵炒微黃去瓤前胡三分去蘆頭人參半兩去蘆甘草半兩炙微赤銼防風半兩去蘆頭大腹皮半兩銼麥門冬三分去心枇杷葉半兩拭去毛炙微黃上為散每服五錢以水一盞生薑半分煎至五分去滓不計時候溫服治溢飲在胸間不散上衝攻於頭面不能食飲宜服此方出聖惠方白朮三分木香半兩赤茯苓半兩人參半兩前胡半兩去蘆頭半夏一兩湯洗七次去滑肉桂半兩去粗皮青橘皮半兩湯浸去白瓤焙芎藭三分附子一兩炮裂去皮臍大腹皮半兩銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服白朮散出聖惠方治溢飲當發其汗白朮三分麻黃一兩去節根赤芍藥三分旋覆花半兩桂心一兩前胡三分去蘆頭甘草三分炙微赤銼五味子二分半夏三分湯洗七次去滑上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣蓋取汗如人行十里未汗再服小青龍湯出仁存方治溢飲倚息不得臥及喘滿者大青龍湯出三因方治溢飲者當發其汗並身體疼重汗不出拘急痛麻黃六兩去節桂心二兩甘草炙一兩生薑三兩石膏如雞子大一枚杏仁四十枚去雙仁皮尖大棗十枚擘上㕮咀以水九升先煮麻黃減二升乃同諸藥煮取二升絞去滓適寒溫服一升溫覆令汗汗出多者溫粉粉之一服汗出者勿服汗出多亡陽逆虛惡風煩躁不得眠脈微弱汗出惡風不可服服之則厥逆筋惕肉瞤此為逆也忌海藻菘菜生蔥又方出聖惠方治溢飲當發其汗麻黃一兩去根節桂心一兩甘草半兩炙微赤銼細辛半兩石膏一兩杏仁半兩湯洗去皮尖雙仁炒微黃上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候熱服衣蓋取汗如人行十里未汗即再服治溢飲上衝頭旋目眩氣喘腹脅虛脹宜服此方旋覆花半兩牽牛子半兩微炒杏仁湯浸半兩去皮尖雙仁麩炒微黃上為末煉蜜為丸如桐子大不拘時候生薑湯下二十丸支飲附論水飲停積胸膈不能消化支乘於心故名支飲其狀令人心下築悸咳逆喘息飲食不下身體虛浮形如腫是也方大半夏丸治支飲膈脘不利咳嗽喘滿半夏四兩湯洗七次去滑干焙為末沉香青橘皮湯浸去白焙乾薑炮白朮陳橘湯浸去白焙附子炮裂去皮臍肉豆蔻去殼紅豆蔻各半兩青州棗二兩別煮取肉同姜蜜入銀石器與半夏末和熬上為末與半夏膏和勻丸如梧桐子大每服十丸空心煎乾薑棗湯下加至十五丸旋覆花湯治支飲胸膈實痞呼吸短氣旋覆花檳榔柴胡去苗桔梗炒各一兩桑根白皮鱉甲去裙襴醋炙大黃銼炒各一兩半甘草炙半兩上銼如麻豆大每服五錢水一盞半煎至八分去滓溫服不拘時候干棗湯出千金方治腫及支滿澼飲大棗十枚大戟大黃黃芩甘草甘遂各一兩芫花蕘花各半兩上㕮咀以水五升煮取一升六合分四服空心服以快下為度旋覆花丸出聖惠方治支飲心胸壅滯喘息短氣皮膚如腫旋覆花一兩漢防己一兩赤茯苓桂心檳榔各一兩甜葶藶一兩隔紙炒令紫色前胡一兩去蘆頭枳殼半兩麩微炒去瓤上為末煉蜜和丸如桐子大每服食前以桑白皮湯下二十丸葶藶丸出聖惠方治支飲心膈痞急咳逆短氣不能下食甜葶藶二兩隔紙炒令紫色半夏一兩湯洗七次去滑前胡一兩去蘆頭訶黎勒皮一兩紫蘇子半兩木香半兩桂心一兩檳榔一兩上為末煉蜜為丸如梧桐子大每服於食前以溫酒下二十丸靈脂丹出經效濟世方治因暑月引飲水多取涼熱睡停積成飲或遇濕風流注為之支飲手足或時少力指節間疼屈伸不快或有痰食甚則及於膝足或麻或弱宜常服此藥五靈脂桂心威靈仙白茯苓細辛去葉牡丹皮去心各一兩上為細末和勻以半夏末半兩水煮薄糊丸如梧桐子大每服二三十粒不拘時候生薑湯下漢防己散出聖惠方治胸膈支飲數吐之不愈漢防己一兩半石膏四兩桂心一兩人參一兩去蘆頭前胡一兩去蘆頭白朮一兩上為散每服四錢以水一鍾煎至七分去滓不計時候溫服治心膈間支飲水滿心下痞堅面黧黑色宜服此藥出聖惠方枳實一兩麩炒微黃赤茯苓一兩半前胡一兩去蘆頭漢防己一兩半石膏二兩桂心二兩上為散每服五錢以水一大盞煎至五分去滓溫服日三四服枳殼散出聖惠方治支飲頭疼目眩心下痞悶枳殼一兩麩炒微黃去瓤澤瀉白朮漢防己旋覆花各一兩前胡一兩去蘆頭上為散每服四錢以水一中盞煎至六分去滓不計時溫服治支飲心膈痞急咳逆短氣不能下食出聖惠方郁李仁二兩湯洗去皮微炒旋覆花澤瀉各一兩皂莢三梃去皮塗酥炙令黃去子半夏一兩湯洗七次去滑枳殼半兩麩炒微黃去瓤上為末煉蜜和丸如梧桐子大每服於食前以溫酒下二十丸檳榔丸治支飲胸膈痞悶檳榔銼肉豆蔻去殼各半兩半夏湯浸去白焙乾薑炮各一兩青橘皮湯浸去白焙上為末薑汁煮麵糊和丸如緑豆大每服五丸食後生薑湯下木防己湯一名防己湯出危氏方又名桂枝湯治膈間有支飲其人喘滿心下痞悶面色黧黑其脈沉緊得之數十日醫吐之不愈者木防己三兩桂心三兩人參四兩石膏雞子大十二枚上㕮咀以水六升煮取二升分為二服虛者服即愈實者三日復發發則復與服之若不愈去石膏加茯苓四兩芒硝三合以水六升煮取二升去滓下硝令分作二服微下利即愈又方不加茯苓茯苓五味子湯出三因方治支飲手足冷多唾口燥氣從小腹上衝胸咽手足痹面熱翕然如醉因復下流陰股小便難時復眩冒嘔腫茯苓四兩桂心甘草各二兩炙五味子二兩半上為銼散每服四大錢水一盞半煎至七分去滓空心服服之沖氣即低反更咳滿去桂心加細辛咳滿止而復渴沖氣更發者以細辛乾薑為熱藥服之當遂渴反止者為支飲也支飲發當冒冒者必嘔嘔者復加半夏二兩半以去其飲飲去嘔則止其人形腫與痹加杏仁二兩半若面赤如醉胃中熱上熏加大黃三兩須詳證加減十棗湯出鮑氏方夫有支飲家咳煩胸中痛者不猝死雖一百日或一歲及懸飲咳嗽痛引胸脅其脈弦者服此方大棗十枚大戟甘遂芫花各等分上大戟甘遂芫花搗為末以水一升五合煮棗取八合去滓納藥末強者一錢羸者半錢頓服之平旦服而不下者明旦更加藥半錢下後自粥糜養咳引脅下痛者亦十棗湯主之青金丸治支飲不消喘嗽不止硫黃半兩水銀半兩半夏湯洗去滑搗末滑石研半兩上合細研勻滴水和丸如梧桐子大每服二十丸食後溫生薑湯下厚朴大黃湯一名小承氣湯出鮑氏方治夫酒客咳者必致吐血此坐久飲過度所致也其脈虛者必冒其胸中本有支飲胸滿治之之方厚朴一兩大黃六兩枳實四兩上㕮咀以水五升煮取二升分作二服溫服之化氣丸治支飲痞膈食遲化巴豆五十枚去皮心出油研如粉黃連去須半兩白麵二兩半上先將黃連搗末以水半升煎十餘沸隔一宿取白麵並巴豆粉用黃連水和硬軟得所丸如梧桐子大放干以麩二升於銚內慢火焙藥丸同炒麩黃為度以羅篩去麩取藥再於黃連水內略漉過竹器內控干每服三丸或二丸食後臨睡熱酒或水下葶藶丸治支飲氣喘不得息甘葶藶炒木香半夏湯洗七次去滑焙各一兩上為末生薑自然汁煮麵糊為丸如梧桐子大每服二十丸薑湯下不拘時服木香丸治支飲下氣木香一兩牽牛子鹽炒過黃皂莢不蛀者去皮酥炙各二兩上為末煉蜜為丸如梧桐子大每服五丸食後薑湯下小半夏加茯苓湯一名大半夏湯出直指方治嘔家渴者為飲阻本渴心下有支飲故也小半夏湯主之加茯苓者是也先渴卻嘔此為水停心下猝嘔吐心下痞膈間有水自眩悸寒痰半夏一斗洗生薑半斤茯苓四兩上切以水七升煮取一升五合分溫再服忌羊肉胡洽不用茯苓用桂心四兩有寒痰臨臥溫服熱痰加甘草一分脾胃不和去甘草入橘皮一分治支飲喘息短氣身體腫宜服此藥出聖惠方澤瀉二兩白朮一兩漢防己一兩上為散每服四錢以水一中盞煎至六分去滓不計時溫服治支飲不瘥大腹水腫喘促不止宜服此方出聖惠方芫花一分醋拌炒令乾甘遂一分煨微黃大戟一分銼碎微炒上為散每服一分空心濃煎棗湯調下以利為度神應丸治支飲胸膈痞悶飲食遲化槐花半斤巴豆五十粒和皮搗碎上同炒存一分性為末麵糊和丸如緑豆大每服二丸食後溫水下澤瀉湯出金匱方療心下有支飲其人苦冒眩白朮二兩澤瀉五兩上切以水二升煮取一升又以一升煮取五合分溫二服忌桃李雀肉等小半夏湯出三因方治飲嘔吐不渴半夏湯洗七次上為銼散每服四大錢水二盞姜十片煎至七分去滓溫服一方一日三二服服三日畢再服枳朮丸盡其痰為度論曰先消胸中氣後去膈上痰再服枳朮丸謂首尾合盡消其氣謂令痰不復作也一方每服稱一錢水一盞半生薑稱半錢切片同煎至一盞去滓溫服若腹鳴有水聲每服中加去瓤橘皮去皮茯苓各半錢治支飲久不瘥大腹水腫喘促不止葶藶熬令黃色搗丸如彈丸大大棗十二枚上先以水三升煮棗取