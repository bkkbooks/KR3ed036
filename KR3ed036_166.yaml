利後即快雖利心下續結滿為留飲未除甘遂炒令黃半兩半夏湯浸去滑生薑汁炒乾一兩上搗篩每服一錢水一大盞煎至七分去渣再入芍藥末並人參末一錢蜜半匙頭更煎三兩沸空心溫服虛人晚間服半夏丸治留飲不散膈脘不利宿飲不消嘔逆噁心方見沉香墜痰丸半夏湯治留飲不除胸中痰冷前胡散治溫飲停留肢體時疼痛氣膈痰熱客於上焦心下痞悶不欲飲食頭目眩昏前胡人參赤茯苓去皮紫蘇各七錢半陳皮去白半夏曲枳殼麩炒去瓤甘草木香各半兩上為末每服三錢水一盞半生薑七分煎至一盞去渣取七分熱服日進三服留飲宿食附論人有留飲漬積於胃受飲則飲食遲化或有酒後飲水停留於肺胃之間脾得濕氣則不能消食令人噫氣吞酸冷逆噁心腹脅脹滿不思飲食皆其候也方千金方療心腹留飲宿食沙參丹參苦參各二兩桂心二分石膏五分研人參一分大黃一分半夏五分洗乾薑五分戎鹽一分巴豆六十枚去皮心以湯煉之復熬熟令黃色別研附子一分炮上為末合以白蜜和丸如小緑豆大吞一丸日再令人先食服一丸不知稍益以知為度忌豬肉餳蘆筍生蔥名千金丸草豆蔻散治留飲宿食成癖草豆蔻一兩一分附子炮去皮臍五味子三分陳橘皮湯浸去白焙三分白朮枳實去瓤麩炒桂去粗皮乾薑炮芍藥木香鱉甲醋炙去裙襴各半兩上為末散煉蜜和丸如梧桐子大每服二十丸鹽湯下鱉甲散治留飲食成癖鱉甲醋炙去裙襴附子炮裂去皮臍桂去粗皮各三分京三稜炮銼乾薑炮陳橘皮湯浸去白焙吳茱萸湯洗炒木香厚朴去粗皮大黃銼炒各半兩上為散每服二錢溫酒或生薑湯調下當歸湯治留飲不消腹中積聚轉下當歸人參桂心甘草芒硝芍藥各二兩大黃四兩生薑黃芩澤瀉各二兩上切水三升煮取一升分三服空心食後服忌生蔥海藻菘菜九寶丸治留飲宿食脹滿吞酸嘔逆木香肉豆蔻去殼厚朴去粗皮薑汁炙麝香研丹砂研各二兩檳榔銼二兩桂去粗皮三分乳香研一兩半夏一兩半為末生薑汁和作餅爆干上搗研為末生薑汁和丸如豌豆大每服七丸橘皮湯下芫花丸主留飲宿食芫花一兩熬大黃甘遂黃連麻黃去節杏仁去皮尖雙仁熬各二兩巴豆五十枚去心皮湯煉百次令變黃色上搗篩杏仁巴豆別搗如膏令合以蜜丸如小豆大先食服一丸日再不知稍增以知為度忌海藻菘菜豬肉冷物水筍等物白朮散治胸膈留飲腹中虛滿氣逆不下飲食白朮一兩陳橘皮一兩湯浸去白瓤焙丁香半兩赤茯苓半兩桂心半兩半夏半兩湯洗七次去滑附子半兩炮裂去皮臍前胡一兩去蘆頭甘草半兩微炙赤上為散每服五錢以水一大盞入生薑半分棗三枚煎五分去滓不計時候溫服木通丸治留飲宿食寒熱煩滿木通半兩銼椒目半兩微炒去汗附子半兩炮裂去皮臍半夏半兩洗七次去滑厚朴半兩去粗皮塗生薑汁炙令香熟川芒硝一錢甜葶藶一兩隔紙炒令紫色川大黃二兩銼碎微炒杏仁一兩湯浸去皮尖雙仁麩炒微黃上為末別搗葶藶杏仁如膏和諸藥末煉蜜和搗三二百杵丸如梧桐子大每服食前以薑湯下二十丸通草丸治積聚留飲宿食寒熱煩結長肌膚補不足椒目附子炮半夏洗厚朴炙各一兩芒硝五兩大黃九兩葶藶子三兩熬杏仁三兩去皮尖熬上為末別搗葶藶杏仁令如膏合諸藥末以蜜和丸搗五千杵服如梧桐子大二丸忌豬羊肉餳等大效方中無通草未詳其名順流紫丸療百病留飲宿食心下腹痛四肢煩疼男子五癆七傷婦人産乳余疾等當歸代赭石各一分茯苓三分烏賊魚骨三分肉蓯蓉二分藜蘆五分小熬桂心三分上為末搗篩別搗巴豆令如膏白蜜和丸先食服如小豆大一丸日再不知增之欲下倍服之忌生蔥豬肉酢物野豬肉蘆筍等物桂心丸治心腹留飲宿食不化腹脹氣悶痰逆頭痛桂心半兩石膏一兩細研水飛過人參半兩去蘆頭川大黃半兩銼碎微黃附子一兩炮製去皮臍半夏一兩湯洗七次去滑乾薑一兩炮巴豆二十枚水煮一日去皮心炒上為末研巴豆令勻煉蜜搗三二百杵丸如小豆大每服食前以溫水下五丸大半夏丸治留飲宿食不消止逆溫胃半夏二兩為末生薑汁和作餅曝乾木香一錢人參三分青橘皮去白洗焙一錢草豆蔻去皮檳榔銼各三枚丁香一錢上為末用生薑汁煮麵糊為丸如小豆大每服三十丸生薑棗湯下不拘時候硇砂丸治留飲宿食不化腹脅氣痛不思飲食硇砂研一分狼毒醋炒芫花醋炒乾漆炒煙出各一兩京三稜煨銼一兩半鱉甲去裙襴炙一兩巴豆仁三錢醋煮紫色焙研上為末次入別研二味再同研勻麵糊為丸如緑豆大每服三丸食後溫酒生薑湯下芫花丸治留飲食不化芫花一兩醋拌炒令乾甘遂一兩煨微黃黃連二兩去須麻黃二兩去根節杏仁二兩湯浸去皮尖雙仁研如膏附子一兩炮裂去皮臍巴豆十枚去皮心研紙裹壓去油上為末與巴豆杏仁膏同研勻煉蜜和丸如小豆大每服食前以粥飲下二十丸當歸丸治留飲宿食心下腹痛四肢煩疼當歸一兩銼碎微炒赤茯苓三分枳實一兩麩炒微黃桂心三分川大黃半兩銼碎微炒巴豆十枚去皮心研紙裹壓去油上為末入巴豆令勻煉蜜和搗三二百杵丸如小豆大每服食前以粥飲下二丸以利為度磨滯丸治脾胃不和留飲宿食不消及纍有傷滯食已腹痛嘔噦噁心胸脅脹悶大便利不定木香青橘皮湯洗去白焙桂去粗皮各一兩巴豆霜半錢吳茱萸湯洗焙炒三兩硇砂醋上為末與硇砂巴豆霜拌勻醋煮麵糊為丸如緑豆大每服三丸加至五丸早晚食後臨臥服大便溏利時減丸數溫胃散治留飲順氣消宿食生薑半斤洗切曝乾同鹽二兩浸一宿炒過入陳橘末一兩同炒令乾丁香一分半夏為末生薑汁做餅曝乾草豆蔻大者三枚不去皮陳橘皮湯浸去白焙各一兩甘草炙銼二兩上為散每服二錢如茶點服覺脾胃寒加附子半兩炮製去皮臍半夏一兩湯浸七遍去滑切焙木香丸治留飲宿食不消枳殼去瓤麩炒二兩木香大黃紙裹煨各半兩檳榔銼芎藭郁李仁湯浸去皮焙研各一兩上為末入郁李仁拌勻煉蜜和丸如梧桐子大每服十丸至十五丸食後臨臥溫生薑湯下海藻丸出聖惠方治腹中留飲宿食不消海藻半兩去咸漢防己半兩甘遂半兩煨微黃枳實一兩麩炒微黃去瓤川椒半兩去目及閉口者微炒去汗上為末煉蜜和丸如梧桐子大每服食前以粥飲下五丸以利為度郁李仁丸治留飲宿食不消寬利胸膈消進飲食郁李仁湯浸去皮尖炒一兩青橘皮湯浸去白焙木香檳榔銼各一兩半夏六兩去皮臍漿水五升生薑半分切甘草並桑根白皮各一兩銼銀石器內慢火煮乾再添熱漿水二升煮乾去余藥只用半夏上為末麵糊和丸如豌豆大每服十五丸至二十丸食後臨臥生薑湯下大黃丸出聖惠方治留飲宿食不消大黃銼炒赤茯苓去黑皮各半兩朴硝研巴豆去皮心膜研出油各一分上為末入別研二味再同研勻煉蜜和丸如緑豆大每服五丸溫米湯下以利為度氣虛者可服高良薑丸一名大腹丸治留飲宿食醋心吐沫氣逆脹滿高良薑三兩半桃仁去皮尖雙仁炒大黃去皮檳榔生銼各三兩上為末與桃仁研勻煉蜜和丸如彈子大每服實者一丸虛者半丸空心食前溫酒下薑湯下亦可小麝香丸治脾胃氣弱不能飲食肌膚瘦瘁心胸膨悶肋脅虛脹大便祕利不定小兒諸疳黃疸吳茱萸三兩炒木香一兩桂去粗皮一兩陳粟米四兩巴豆四十粒去皮同炒黃色去巴豆上為末醋煮麵糊為丸如緑豆大每服七丸或十丸食後溫熱水下肉豆蔻丸治留飲宿食不消肉豆蔻去皮半兩麩裹煨炒巴豆七枚去皮心膜研出油半夏三分與吳茱萸半兩同用水一升慢火煮乾只用半夏焙乾上為末酒煮麵糊和丸如梧桐子大每服三丸食後茶酒下治心下堅滿此為留飲宿食宜服此出聖惠方甘遂一錢煨微黃半夏一分湯洗七次去滑上為散每服以生薑汁半合蜜半合湯一中盞相和分為三服每於食前溫服以利為度桑耳丸出聖惠方療留飲宿食不消桑耳三兩巴豆一兩去心皮研紙裹壓去油上搗和以棗膏和丸如麻子大先食服一丸不下服二丸病下即止忌野豬肉蘆筍療痰積聚嘔逆兼風虛勞陰疝方上用霜後蒺藜苗子搗十斗汁以文武火煎減半即以文火煎攪勿停候可丸止丸如梧桐子大空腹酒下三十丸煎服亦可藿香湯治留飲宿食不消止逆溫胃方見藿香散草豆蔻散治留飲宿食不消木香丸治留飲宿食腹脅脹滿不喜飲食
