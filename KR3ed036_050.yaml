body:
  text: 卷五十頭門鬚髮黃白附論足少陰血氣盛則須潤澤而黑足太陽血氣盛則發潤澤而黑二經血氣虛乏則鬚髮變為黃白然則還其潤澤復其紺黑雖有敷染之法曾不如益血補氣為常服劑蓋血氣調適則滋潤外彰其視敷染之功遠矣方駐顏苣蕂丸出聖惠方治發白令黑補益鬢顏苣蕂二斤杏仁四兩湯浸去皮尖雙仁者麵炒微黃陳橘皮一兩湯浸去白瓤焙細辛一兩附子一兩炮裂去皮臍旋覆花一兩覆盆子二兩青葙子二兩秦椒二兩去目及閉口者微炒去汗熟乾地黃四兩白芷一兩續斷一兩秦皮一兩桂心二兩生地黃五斤搗絞取汁上為末入地黃汁中以沙糖相和搗五七百杵丸如梧桐子大每日空心服以橘皮湯下三十丸晚食前再服忌生蔥蘿蔔大蒜等治掠白反黑出德生堂方白檀白芷三奈子各二錢白芨一兩甘松一錢半白茯苓二錢半回回青百藥煎針砂炒各五分滑石二錢犁兒鐵一塊瓶盛漿水浸上為末每服三錢漿水一盞於錫器瓶中頓冷澄清掠之旋飾巫云膏出醫方大成治髮鬢黃白不黑膽礬五倍子百藥煎訶子青胡桃皮木瓜皮何首烏細辛酸石榴皮豬牙皂角上等分為極細末煉蜜和丸如小錢大常於木灰內培養勿得離灰如要烏髭時用熱好酒磨化開捻髭如烏鬢時用好熱醋磨以掠頭鬢地骨皮丸出聖惠方變髭發益氣血令終身不白但黑潤而已黃白者經六十日變黑已白者服百日如漆堅牙齒益筋力四時常服地骨皮三五兩生乾地黃五兩牛膝去苗三兩覆盆子三兩黃耆三兩銼五倍子三兩桃仁四兩去皮尖雙仁別研如膏菟絲子四兩酒浸三日曝乾別杵為末蒺藜子四兩微炒去刺上為末下桃仁攪使相入煉蜜和更搗三千杵丸如梧桐子大每日空心以溫酒下四十丸粥飲下漿水下亦得服藥十日即急拔去白者二十日黑者即生神妙不可言終身不得食蒜牛肉生蔥蘿蔔等摩頂黑髮方出聖惠方治發黃浸油白芷附子去皮臍生用連翹防風去蘆頭卷柏零陸香蔓荊子蓮子躑躅花川芒硝以上各一兩上細銼用綿裹以生油二斤浸經三日略煎取藥放冷每用塗頂揩令入肉治腦血虛發白早宜服馬齒莧還黑效方出聖惠方馬齒莧子一升白茯苓二兩熟乾地黃四兩澤瀉二兩卷柏二兩人參二兩去蘆頭松脂四兩煉成者桂心一兩上為散每日空心以溫酒調下二錢漸加至三錢晚食再服一月效忌生蔥蘿蔔大蒜等柏子仁丸出聖惠方治髭發早白壯血脈令復黑柏子仁三兩酸石榴皮一兩秦椒三兩去目及閉口者微炒去汗何首烏二兩馬齒莧二兩蓮子草二兩白芷二兩旋覆花二兩上為末煉蜜和丸如梧桐子大每服空心以熱水下三十丸晚食前再服忌大蒜生蔥等地黃丸出聖惠方變白令黑補益熟乾地黃一斤牛膝一斤去苗枳殼五兩麩炒微黃去瓤茯神三兩菟絲子五兩酒浸三日曝乾別搗為末車前子五兩地骨皮三兩訶黎勒皮二兩上別取生地黃肥者搗絞取汁五升浸牛膝及地黃曝乾如前又浸曝乾以地黃汁盡為度放令乾搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服以溫酒下三十丸再服忌血食並生蔥蘿蔔大蒜等川椒丸出聖惠方治腦血虛發早白宜服補益令黑川椒五兩去目閉口者微黃炒去汗苣蕂一升瓦松半斤茜根二斤銼熟乾地黃三斤覆盆子一斤牛膝一斤去苗菟絲子五兩酒浸三日曝乾別搗為末上為末煉蜜和搗五七百杵丸如梧桐子大每服以溫酒下四十丸食前服忌生蔥蘿蔔大蒜等神不安方治年少發白及心氣虛神不安地骨皮一兩桂心三分熟乾地黃二兩白芷三分旋覆花三分訶黎勒皮三分秦椒三分去目及閉口者微炒去汗杏仁一兩湯浸去皮尖雙仁研如膏上為末煉蜜和丸如梧桐子大每日空心以溫酒下四十丸忌生蔥蘿蔔大蒜等膽礬丸出宣明論治男子年少髭發斑白土馬鬃牆蠶兒石馬鬃石蠶兒半夏川五倍子各一兩生薑二兩胡桃十個真膽礬半兩上為末和作一塊絹袋子盛如彈大熱酒水各少許浸藥絞汁淋洗頭髮一月神效變白髮神效揩齒藥方出聖惠方酸石榴一枚以泥裹燒令通赤候冷去泥取用槐枝茄子根與槐枝同燒令煙絶急以物蓋之候冷取用馬齒莧蘭香菜並根薄荷石膏五倍子燒蒸川升麻以上各一兩上為散用揩齒不惟變白為黑兼牢固牙齦地仙丹出聖惠方令發黑延年久服可貌如童子齒落重生行如奔馬夜視有光久服為地仙遠志一斤去心白茯苓一斤熟乾地黃一斤地骨皮一斤麥門冬一斤半去心焙苣蕂一斤蒸曝乾去皮上為末以棗肉和木杵臼搗千餘杵丸如梧桐子大每日空腹以溫酒下四十丸晚食前再服忌生蔥大蒜蘿蔔等五神還童丹出瑞竹堂歌曰堪嗟髭發白如霜要黑元來有異方不用搽牙並染髮卻將五味配陰陽赤石脂與川椒炒辰砂一味最為良茯神能養心中血乳香分兩要相當棗肉為丸桐子大空心溫酒十五觴七服之後君休摘管教華髮黑油光兼能明目並延壽老翁變作少年郎赤石脂川椒炒辰砂茯神乳香以上各一兩上為末棗肉和丸如梧桐子大每服三十丸空心溫酒下菟絲子丸一名牛膝丸治髭發黃白可變令黑及治鬚髮禿落不生出聖惠方菟絲子酒浸三日別搗地骨皮各三兩枳殼去瓤麩炒八兩生牛膝搗絞取汁半升生地黃搗絞取汁半升上將前三味搗羅為末以牛膝地黃汁和作餅子曝乾再搗羅煉蜜丸如梧桐子大每服十五丸早食後溫酒下如心中熱米飲下一方生搗為末煉蜜和丸每日空心生薑湯下三十丸漸加至五十丸久服忌生蔥蘿蔔大蒜人參丸出聖濟總録治發髭白能變令黑人參五兩熟乾地黃焙天門冬去心焙白茯苓去黑皮各十兩胡麻仁湯浸去皮炒五升上為末煉蜜丸如梧桐子大每服十丸食後溫酒下胡麻丸出聖濟總録治髭發白可變令黑胡麻仁炒杏仁去皮尖雙仁炒研各二兩桂去粗皮一兩黑豆黃二兩生地黃搗絞取汁一升上先將地黃汁入鍋煎三兩沸次入杏仁熬膏余藥並搗羅為末投入同煎令稠丸如梧桐子大每服十丸早食後溫酒下臨臥再服之甜瓜子散出聖惠方治血氣虛腦髓空竭諸臟虛乏血氣不足少如蒜髮及憂愁早白遠視䀮䀮得風淚出手足煩熱恍惚忘誤遠年下痢服之一月大驗甜瓜子一升微炒白芷一兩當歸二兩銼微炒芎藭二兩甘草二兩炙微赤銼上為散每於食後以酒或溫水調下二錢服之一方有松子去皮令白髮還黑方一名秦椒散出千金方旋覆花秦椒隴西白芷各一升桂心一兩上件搗篩以井花水服方寸匕日三服三十日白髮還黑禁房室若不信將此藥拌飯喂貓兒一月白處變黑此乃神效一方或酒茶溫調亦得乾漆丸出聖濟總録治髭發白可以變黑乾漆炒令煙盡柏子仁微炒生乾地黃焙熟乾地黃焙各一兩上為末研糯米飲和搗三五百杵塗酥丸如梧桐子大每服三二十丸空心溫酒下治髭鬢早白令變為黑方出聖惠方硫黃一兩細研酸石榴皮一兩天竹黃半兩細研磁石二兩燒醋淬七遍研飛過上先以和了面少許裹硫黃納於石榴皮中又用面都裹石榴皮於瓷碗中盛飯甑內蒸兩遍取出曬乾搗羅為末次入天竹黃磁石等末相和更研令勻煉蜜和丸如緑豆大每日早晨以杏仁湯下二十丸其藥服六七日以來覺頭癢便是效也白者自落黑者再生神效駐顏益心神方出聖惠方染鬢髮發白為黑熟乾地黃半斤牛膝四兩去苗杏仁半斤湯浸去皮尖雙仁微炒研如膏菟絲子三兩湯浸三日曝乾搗末上為末都研令勻以煉蜜和搗三五百杵丸如梧桐子大每服以溫酒下四十丸食前服忌生蒜蔥蘿蔔秦椒丸出聖惠方治髭發黃悴秦椒去目及閉口炒出汗生乾地黃焙旋覆花白芷各一兩上為末煉蜜和丸如梧桐子大每服三十丸米泔水下不拘時蜀椒丸出聖濟總録治髭發白可還黑色蜀椒去目並閉口者杏仁去皮尖雙仁各八兩熟乾地黃一升上先銼地黃入淨瓷器中以酒一升浸一宿取出與杏仁同搗如膏次用炭火燒地令赤以釅醋潑之乘熱將椒置其上以盆覆之四面泥塗令勿透風候冷取出搗羅為末合和前膏入糯米飯一升同搗三百杵丸如梧桐子大每服三十丸空心溫酒下地黃丸出聖惠方治人年四十髭發俱白還黑生地黃肥者銼五斤五加皮牛膝酒浸焙各五兩上先將地黃入淨瓶中以酒五升浸一宿取出曝乾入甑九蒸九曝後同後二味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下一方搗細羅為散每日空心以溫酒調下二錢若於羹粥中吃亦得此藥能化白令黑添益筋力忌生蔥蘿蔔大蒜等三倍丸出聖惠方補益明目壯氣延年令人好顏色變鬚髮令黑其功不可盡述川椒取紅一斤牛膝三斤去苗生地黃三十斤淨洗搗絞取汁上為末用生地黃汁拌之令勻曬乾即更拌以地黃汁盡為度曬乾搗羅為末和於木杵臼搗千餘杵丸如梧桐子大每日空心及晚食前以溫酒下四十丸忌生蔥蘿蔔大蒜等變白髮令黑填骨髓去萬病方出聖惠方熟乾地黃四斤杏仁一斤湯浸去皮尖雙仁研如膏訶黎勒皮半斤上為末入杏仁同研令勻以煉蜜和搗三二百杵丸如梧桐子大切不得令孝子女人見每服以溫酒下三十丸食前服漸加至四十丸為度於瓷器內密貯之變白功效不可具述忌生蔥蘿蔔大蒜等變白不老出本草多收桑椹曝乾搗末蜜和為丸每日服六十丸治婦人蒜髮用乾柿子五個香湯煮爛枸杞子搗為末合和爛研丸如梧桐子大每日空心服及臥時前濃煎香湯下五十丸治髮鬢黃赤令黑方出千金方用羊糞燒灰以臘月豬脂相和塗之日三夜一取黑即止又方出聖惠方用黑豆三升以水七升煮黑豆令極爛去豆再煎令稠常用塗發良治發黃出海上方用臘月豬脂和羊屎灰蒲灰等分封頭三日一為之一醉烏髮治頭須白再黑方生地黃汁一升訶黎勒十個磨兩頭酸石榴三個大者取汁緑礬半兩研硇砂研硫黃研各半兩上藥同入瓷瓶中內用二味汁浸密封勿令透氣至四十九日後取出其訶子狀若黑梅至夜臨臥含一枚咽津到曉爛嚼以酒一盞下之三二日後再服忌蔥大蒜蘿蔔近效換白髮及髭方熊脂二兩臘月者佳白馬鬐脂一兩細切熬之以綿濾絞汁婆羅勒十棵其狀似芙齊子去皮取汁俱以指甲掐之即有汁生薑一兩一鐺中煮之母丁香半兩上為末其脂煉濾之以藥末相和令勻另取一小槐枝左攪數千遍少頃即凝或似膏即拔白髮以辰日良槐枝點藥拔一條即以藥入髮根孔中以指頭熟揩之令藥入十餘日便黑髮生槐枝散出聖濟總録治須黃白揩牙方槐枝如箸大者青鹽胡麻子仁炒黑色生乾地黃各一兩皂莢不炷者去皮子二梃上銼碎入瓷瓶中用瓦片蓋紙筋泥固濟仍蓋上留一穴如錢眼大候乾以文武火燒煙盡放冷為末每旦揩牙畢余藥塗須上少頃洗之治髭鬢黃赤一染即黑出醫方大成生薑半斤生地黃一斤各淨洗研自然汁留滓上用不蛀皂角十梃去黑皮並筋將前藥汁蘸皂角慢火炙黃用藥汁盡為度前藥滓同入罐內用火煅存性為末用鐵器盛藥末三錢湯調停三日臨睡將藥蘸髭鬢即黑服菊增年變白方用菊以三月上寅日採名曰玉英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生者根莖也陰乾百日各取等分以成日合搗千杵下篩和以蜜丸如梧桐子大三服七丸百日身體潤一年白髮變黑二年齒落復生三年八十者變童兒必效染白髮方出十便良方用揀細粒烏豆四升以醋漿水四升煮汁去卻豆以好灰汁淨洗髮待乾以豆汁熱塗之以油帛裹之經宿開之待乾即以熊脂塗揩還以油帛裹即黑如漆一塗三年不變驗又方醋煮大豆色黑時去豆煎令稠塗之又方用搗木槿葉以熱湯和汁洗之亦佳染白髮方用黑桑椹一升蝌蚪子即蝦蟆子瓶盛密封懸東屋角百日盡化為黑泥染鬚髮如漆又取二七枚和胡桃脂研如泥拔去白者點孔中則生黑者一方無蝦蟆子栝蔞散治須黃白揩牙取栝蔞實一枚開頂作蓋子取瓤並子用青鹽一兩細研杏仁去皮尖三七粒同栝蔞瓤並子納入栝蔞內卻將頂蓋蓋了麻線系定鹽泥固濟炭火煅煙盡去泥取膏為末早夜揩牙一方無青鹽一方用濕紙兩三重包裹次用蚯蚓泥並紙筋一處搗為筋泥包裹於濕紙上厚一指許用酒圓勻不破紙綻於日中曬乾用熱炭二斤四邊上下煅之火多則恐曝裂徐徐添火候泥球通紅有青煙焰出即藥成去火掃淨地尺許置泥球其上以新瓦盆蓋食頃系去泥皮取藥細研晨起日中臨睡以指蘸藥擦牙令極熱即取效速仍不輟用之百日髭鬢可致如黑先有白者摘去以余藥搽於鬢間後來發不生白矣其治口齒之功未易具陳變白令黑方生乾地黃覆盆子以上各一斤地骨皮一斤上為末煉蜜和搗三五百杵丸如梧桐子大每服以溫酒下四十丸食前服忌生蔥大蒜蘿蔔等白髮令黑方八角附子一枚大酢半升上以銅器中煎兩沸納好礬石大如棋子許一枚消盡納香脂三兩和令相得攪至凝內竹筒內拔白髮以膏塗拔根即生黑髮也治髭鬢髮黃赤令黑方生柏葉切一升豬膏一斤上搗柏葉為末以豬膏和為二十丸用布裹一丸納泔汁中化破沐之日一用一月後漸黑光潤拔白令黑取除日自拔白以鱉脂塗之又黑狗膽塗之又白狗乳塗亦得又方用大豆五升酢漿水二斗煮取五升沐之治鬢髮黃赤方用燒梧桐灰以乳汁和塗敷鬢髮並膚肉鬢髮即黑酸榴漿方治鬚髮黃白令還黑色用酸石榴五月內於東南枝上揀平坐不側而大者一枚於頂上筋札眼子深一寸余用水銀半兩灌於眼子內不得封閉從風日雨露至十月葉落盡時取下殼內盡成水每用時以魚胞裹指頭點藥捻之療發黃用熊脂塗髮梳之散頭入床底一食頃即出便盡黑不過一升脂驗治年衰發白用桑葉丫枝名雞桑最堪入用椹利五臟關節通血氣久服不飢多收曝乾搗末蜜和為丸每日服六十丸變白不老一方取黑椹水漬之頻沐發即黑備急拔白毛令黑毛生方用拔去白毛後隨即以好白蜜敷拔處即生黑毛眉中無毛以針挑傷敷蜜亦生眉毛也又一方以石子磨丁香汁拔白毛急用手以敷孔中即生黑毛如毛髮白取梧桐搗汁塗上必生黑者一方用白蜜敷發孔即不復生也治鬢黃剪爪甲搔令毛孔中血出以蜜塗之即生黑毛令發不生用蚌灰鱉脂相和新拔毛即塗毛孔上永不生令人發不白以大麥食之久食之良治蒜髮用蔓荊子壓油塗頭能變蒜髮變白方出本草用丁香以生薑汁研拔去白髮塗汁孔中即異常黑也劉君安頭不白方出本草以己發燒灰合頭垢等分合服如大豆許三丸名曰還精令頭不白變白方出本草多取烏臼子壓為油塗頭令黑治白髮出本草鑷去白髮消白蠟點孔中即生黑者變白髮出本草以槐黑子水吞之變白令黑耐老明目輕身出本草以龍葵子赤珠者服之若能生食者不食他菜十日後則有靈異不與蔥薤同啖榮養髭發附論夫腎主骨髓腦為髓海發者腦之華髓之所養也衝脈為經絡之海其浮而外者循腹上行會於咽喉別絡唇口血盛則滲灌皮膚生毫毛此髭發所本也若髭發不生或生而黃悴則腦虛衝脈衰無以榮養故也須以藥治之令潤澤也方地黃丸出聖惠方榮養髭發堅牙齒補血氣益顏色延年生地黃三斤搗取汁杏仁三升去皮尖雙仁點地黃汁研如膏丁香三兩胡桃瓤一斤同杏仁別研烏麻油一升點地黃汁研絞取汁大麻油一升木香牛膝切人參茯苓去黑皮各三兩無食子三兩訶黎勒皮三兩箋香沉香銼安息香搗如棋子水煮爛各二兩柳枝皮炙乾鹽花各三兩松脂精好者以布袋盛湯煮自化出湯冷自凝如未白便換布袋煮極白取八兩龍腦研一分白蜜一升酥一升上將搗研藥令極細同諸藥與地黃汁調如膏瓷瓶盛分三瓶每瓶約七分不可令滿坐爐中磚上四面用火候瓶中藥沸即以柳枝攪欲干旋添地黃汁以盡為度時時抄看可丸乃止候藥冷丸如彈子大以蠟紙蓋頭勿令泄氣每食後含一丸咽津日三夜一十日覺百日大效初服藥處淨室一月忌萊蔔藕蒜常食少生薑即效零陵香油方出聖惠方治發令黑光滑潤梳頭零陵香半兩烏麻油一斗茅香半兩蓮子草一兩細辛半兩藁本半兩白芷半兩生鏵鐵五兩搗碎訶黎勒皮一兩沒石子一兩酸石榴皮一兩牛膝一兩去苗白檀香一兩沉香一兩地骨皮半兩芎藭半兩上細銼並鏵鐵以綿裹入油中浸四十九日藥成常用梳頭經年尤驗浸油長髮令黑光潤澤方出聖惠方生麻油五升干桑椹一兩梔子花一兩訶黎勒皮一兩蓮子草一兩細辛半兩白芷半兩藁本一兩零陵香一兩白蘞各一兩酸石榴皮一兩生鐵三斤搗碎硝石一兩地骨皮一兩沒石子一兩上細銼並生鐵以綿裹入油中浸經四十九日後藥成常用梳頭經年尤效治風益發令潤澤不白令油塗頭方干蓮子草半兩蔓荊子細辛藁本柏子仁芎藭白芷甘松香零陵香白檀香以上各一兩胡桃二十棵去皮鏵鐵一斤搗碎上都銼並鏵鐵以綿裹用清油五斤於瓷器中浸半月藥成常用塗頭一月後甚驗惜梳髮神效散出海上方當歸荊芥黑牽牛白芷威靈仙側柏葉訶子各等分上為細末隔夜滲在發中次早理之能去風屑垢膩解梳結苣蕂七子丸益髭發變白為黑甘菊花三兩旋覆花三兩吳白芷三兩白茯苓三兩牛膝三兩覆盆子三二兩半炒旱蓮子一兩半上為細末煉蜜搜和搗杵一二千下丸如梧桐子大每服三十丸空心溫酒送下食後再服三十丸良久少飲酒引動藥力如此日進三服兩個月髭髮鬢如鴉更治一切氣益脈補下元忌生蘿蔔豬羊血蔥蒜忌月日如右並忌服藥如左每月至此日無得服藥止吃素面昔日唐李升服此藥壽至七十歲全無白髮若試此藥用白犬一隻食藥六十日乃黑正月初四二月初六三月十二四月十六五月十八六月二十四七月二十一八月十五九月十六十月十三十一月十四十二月初七槐桃膏出聖惠方榮養髭發瓦松半生半燒灰鐵粉鏵鐵醋淬十遍搗研羊糞半生半燒灰槐枝細銼各一兩胡桃仁一斤上除瓦松等三味外將胡桃仁與槐枝搗作一團填小瓶中令實又取槐枝斫長二寸密插於瓶中與瓶口齊更取一瓶子須盛得前藥瓶子者勘合然後置地坑陷空瓶子與地面齊其向上瓶子即壅馬糞火燒一宿候冷開之其向下瓶子腹中有油清則取此油調前三味塗頭每日淨洗再換藥柏葉散出御藥院方常使榮養髭鬢側柏葉四兩何首烏地骨皮白芷各二兩上為粗末每用半兩入生薑十片水一大盞煎五七沸去滓淋洗髭鬢臨睡用槐實膏出聖濟總録治腦虛髭發枯悴目暗槐實去皮取黑者炒搗末一合生地黃搗取自然汁一合馬牙硝研三錢酥煉一兩上以銀石器盛地黃汁文武火熬先下槐實末次下馬牙硝不停手攪常令如魚眼沸候煎減一半即下酥更煎三二十沸傾出置瓷閣中每臨臥以棗核大內鼻中去枕仰臥展足腦中出惡水勿驚三倍丸出聖濟總録榮養髭發固牙齒補益血氣丹砂研一兩磁石煅研二兩神麯炒研二兩上搗研為末細羅別以豬腎三隻去脂膜用濃酒二升熬腎爛去腎取酒和藥末丸如緑豆大空心溫酒或熱水下二十丸三物膏出聖濟總録榮養髭發柳枝桑枝槐枝各銼一升上以水二斗同煮至一斗去滓入好鹽一斤熬成膏瓷盒盛臨臥揩牙滋榮散出御藥院方長養髭發落最宜生薑焙乾一兩人參一兩上為細末每用生薑一塊切斷蘸藥末於發落處搽之日二次用汞蛭油方出聖濟總録榮養髭發汞一兩乾水蛭七枚為末上以銀三兩作一小盒盛汞與水蛭以蚯蚓土和泥固濟約半指厚深埋在馬糞中四十九日取出化為黑油用魚胞作指袋時蘸少許捻髭上其油自然倒行至髭根變黑烏金散出聖濟總録榮養髭發牢牙草烏頭四兩青鹽二兩上將青鹽為末同入藏瓶內瓦子一片蓋瓦上鑽一竅外用紙筋泥固濟仍留一竅候乾用火煅黑煙盡青煙出為度以新黃土罨一宿取出為末逐日未洗面前揩牙候洗面了方漱日三瑩肌膏出御藥院方治毛髮長茸散頻剃復生不盡者以膏貼之次日茸毛隨膏藥自退瑩淨再不復生乳香二錢研瀝青三兩上慢火同化開入小油一處煎沸硬軟得所臨臥塗患處明旦用溫淡漿洗去蒺藜散上服蒺藜子一石當七月八月熟時收日乾舂去刺然後杵為末每服二錢新汲水調下日三服勿令中絶斷谷長生服之一年以後冬不寒夏不熱服之二年老者復少發白復黑齒落重生服之三年身可長生治發不落方劉君安曰欲發不脫梳頭滿千遍用羊糞和雁膏敷毛髮三宿即生金陵草煎方益髭發發白為黑用金陵草一稱六月以後收採揀擇無泥土者不用洗須青嫩不雜枝梗者爛搗研新布絞取汁又以紗絹濾令滓盡內通油器鉢盛之日中微煎又取生薑一斤絞汁白蜜一斤合和入煎中以柳木篦攪勿停令薑蜜勻日中煎之令如稀餳為藥成矣每旦日及午後各服一匙以溫酒調服欲作丸日中再煎令可丸如梧桐子大依前法酒服三十丸及時多合製為佳其效甚速又方出聖惠方用東行棗根三尺橫安甑上蒸之令汁出收之敷發即長治血脈虛極須不得潤澤宜用此方用桑根白皮銼一斤柏葉銼一斤以水三斗淹浸煮五六沸去滓沐頭數數為之發即潤澤南燭煎出本草益髭發及容顏兼補暖方上於三月三日採南燭葉並蕊子入大淨瓶中干盛以童子小便浸滿瓶固濟其口置間處經一周年取用每日一兩次溫酒服之每酒一盞調藥一匙極有效驗治病後頭病不可理通頭法出十便良方上以生麻油二升將頭髮解開安銅沙羅中用油淹漬之細細將叉子領發斯須並自通潤毛髮滑肌膚益血色出本草方以胡麻葉作湯沐浴良黑潤毛髮出本草方以柏葉燒取汁塗頭去風潤髮出本草以白油麻葉搗和漿水絞去滓沐之治發出本草以木瓜浸油梳頭浸油益發神效方出衛生家寶方蓮花須一兩陰乾零陵香一錢卷柏葉白芷芎藭防風各半兩上件細切以綿裹入生椒七十粒生麻油半斤浸於新瓶中埋地中七日取出婦人塗發極佳兼治頭髮落不生極佳作香澤塗發方出肘後方依臘澤藥內漬油裹煎即用塗發亦綿裹煎之鬚髮墮落附論夫足少陽膽之經也其榮在須足少陰腎之經也其華在發衝任之脈為十二經絡之血海其別絡上唇環口若血盛則榮於鬚髮故鬚髮美若血氣衰弱經脈虛竭不能榮潤故令鬚髮禿落也方生髮膏治熱沖發須落松葉切蓮子草煉成馬鬐膏棗根皮切各一升韭根切蔓荊子碎各三分竹瀝豬脂各二升防風白芷各二兩辛夷仁吳藍升麻芎藭獨活寄生藿香沉香零陵香各一兩上以棗根煮汁竹瀝等浸一宿以脂等煎之候白芷色黃膏成以塗頭髮及頂上日三五度妙治眉發墮落出千金方白芷附子防風芎藭莽草辛夷細辛黃芩當歸蜀椒各一兩大黃一兩半蔓荊子一升馬鬐膏五合豬膏三升上藥十二味㕮咀合二膏微火煎白芷色黃膏成先洗頭髮用膏敷如常澤法勿近面則面生毛也蔓荊子膏出聖惠方治血虛頭風鬚髮禿落不生蔓荊子三兩桑寄生三兩桑根白皮二兩白芷二兩韭根二兩鹿角屑二兩馬鬐脂五合五粒松葉三兩甘松香一兩零陵香一兩生烏麻油三斤棗根皮汁三升上細銼綿裹納脂及油棗根汁中浸一宿慢火煎數攪候白芷色焦黃膏成去滓收瓷盒中每日揩摩鬚髮不生處十日後即生鬢髮禿落生髮膏出聖惠方莽草一兩防風升麻白芷薺苨各二兩蜣螂四兩驢鬐膏貓膏一作狗膏豬膏馬鬐膏熊膏各半斤上諸膏成煎各半升合煎諸藥沸取下停冷復上火三五沸濾去滓敷頭當澤用之一方有雄雞膏無驢鬐膏治頭風發落並眼暗方蔓荊實三兩研桑寄生桑根白皮各二兩韭根切三二合白芷二兩甘松香零陵香各一兩馬鬐膏三合烏麻油一升松葉切三合甘棗根白皮汁三升上細切諸藥納棗根汁中浸一宿數數攪令調濕匝以後旦內油脂中緩火煎之勿令火熱三五日候棗汁竭白芷色黃膏成去滓每日揩摩鬢髮及梳洗其藥浸經宿臨時以綿寬裹煎之膏成去滓綿濾以新瓷瓶盛稠濁者即先用卻不堪久停特勿近手摩壞也南燭草煎丸出聖惠方治血氣虛憊鬚髮禿落不生縱生色黃不黑宜服南燭草酸石榴皮旱蓮子苗各五斤上以上三味於端午日內收於瓷瓶中泥封令密安日中至六月中旬取出皆如黑餳研之又以生地黃五斤絞取汁及白蜜五合同煎上件三味成膏次下諸藥末地骨皮四兩熟乾地黃四兩訶黎勒皮二兩秦椒三兩去目及閉口者微炒去汗白芷二兩旋覆花二兩桂心二兩杏仁三兩湯浸去皮雙仁麩炒微黃上為末入上件膏中用緩火煎可丸如梧桐子大每日空腹以溫酒下三十丸晚食後再服服至四十丸日鬚髮皆生黑而復光忌生蔥蘿蔔大蒜摩膏出聖惠方一名蘭如膏治頭中二十種風發禿落摩之即此療頂如剝似銅盆者蜀椒三兩半莽草二兩乾薑半夏桂心䕡茹附子細辛各一兩並生用上細搗篩以生豬脂剝去筋膜稱取二十兩和前件藥合搗令消盡脂其藥成矣先以白米泔沐發令極淨夜摩之經四五日即毛孔漸漸日生軟細白皮毛十五日後漸漸變作黑髮至一月四十日待發生五寸以上任止若至五日不停彌佳好酥及生油和藥亦得又傷寒鼻塞但以摩之瘥茯苓朮散一名通神效治發白及禿落白朮一斤一方用蒼朮茯苓澤瀉豬苓各四兩桂心半斤上搗散服一刀圭日三食後沸湯調服一方酒或米飲調服後三十日發白變黑容貌改紅筋骨強盛久服通神明治須鬢禿落出聖惠方附子二兩去皮臍生用荊實二兩柏葉三兩烏雞糞三合松葉三兩上相和於新瓷瓶中盛除干百日出之搗羅為末以馬鬐脂和如膏塗之經十日即生治頭風一切風發禿落更不生頭中二十種病頭眩面中風以膏塗之方䕡茹三兩半去皮細辛附子各二兩桂心半兩上搗篩以豬膏勿令中水去上膜及赤脈二十兩搗令脂消盡藥成搗訖仍研恐其中有脂膜不盡以生布絞掠取汁以密器貯之先用桑柴灰汁洗髮令淨一方云桑灰兩日洗待乾以藥摩須令入肉每日須摩如非十二月合則用生烏麻油和極效治鬢髮脫落令生長方出海上方生柏葉切一升豬膏三升附子四枚上為末以膏和為三十丸用布裹一丸內泔汁中煎沐髮長不落其藥密收貯勿令泄氣三聖膏出醫方大成治髭發脫落能令再生附子蔓荊子柏子仁各三分上以烏雞膏和搗三千杵貯新瓷器中封百日出以馬鬐膏和以敷頭訖巾裹之勿令見風日三敷即生肘後方不用柏子仁以酒漬澤沐一方無馬鬐膏和用藥塗在髭發落處三五日即生自然牢壯不落治梳頭髮不落棐子三個去皮捶碎胡桃二個去皮側柏葉四片如手大上和合用雪冰三日取水用梳髮永不脫落兼能潤澤治鬚髮禿落不生令生出聖惠方生薑汁一合生地黃汁一合羊子肝汁一合上相和令勻夜臥塗之十日便生治脈極虛寒鬚髮墮落令發潤澤方出聖惠方麻子三升碎白梧葉切一把上以米泔汁二斗煮五六沸去滓用以洗沐則鬢不落而長治鬢髮墮落出千金方上以泔煮桑葉去滓沐發七遍長六尺石灰酒治頭髮落不止方及治眉須用石灰三升細篩水拌令濕炒令極熟至焦以木柴投入火即著為候停冷取三升絹袋貯之以酒三斗浸三宿初服半合日三四夜二稍加至一合神效一方密封冬浸十四日春秋七日取服常令酒氣相接服之一月即新者生也沐頭湯出海上方治脈極虛寒鬚髮墮落令發潤澤方用桑根白皮切三升以水五升淹漬煮五六沸去滓洗髮數數為之自不復落一方用長三尺者當甑飯上蒸之承取兩頭汁以塗髮鬢則立愈治頭風毛髮落不生方出千金方用鐵上生衣研以臘月豬脂和塗之日三亦治眉毛落治發易長而黑出聖惠方多取烏麻花瓷器盛密蓋深埋百日出用之塗發療人須鬢禿落不生長方出聖惠方用麻子仁三升秦椒二合置泔汁中一宿去滓日一沐一月長二尺也一方無秦椒治發落不生令長方出聖惠方用麻子一升熬黑壓取油以敷頭長髮妙三十日後漸生胡麻散出王氏博濟方治五癩頭面遍身生赤核麻木鼻內聞腥穢鬚髮退落胡麻子三兩輕濫何首烏三兩蔓荊子一兩威靈仙一兩九節菖蒲一兩苦參一兩荊芥穗菊花沙苑白蒺藜鼠黏子炒各一兩上件一十味藥洗潔淨控干如治大風但鼻目耳不動並可療之每服一錢薄荷茶酒任下日用五七服不以時候如才覺便吃半月見效如已患年歲須服一月方始見功及五十日可減一半服及百日永瘥其鬚髮自生如治皮膚風疾瘙癢疥癬之類即入下四味與前六味為末以薄荷自然汁和酒調下一錢若腎臟風攻注亦宜服之如吃此藥至三五日須頻暖浴貴其汗出也治發落出本草取黃蕡麻汁煮粥食之治頭風熱並女人發落出本草以芭蕉油敷之眉發須不生附論夫足少陰之血氣其華在發足少陽之血氣盛眉美足陽明之血氣盛須美諸經血氣盛則眉髭鬢髮俱美澤若血氣虛少枯竭則變黃白而不生若風邪乘其經絡血氣改變則異色惡發必生宜以藥敷之令生好發也方松葉膏出聖惠方治血虛風熱所攻眉發須不生松葉半斤蓮子草半斤馬鬐膏半斤煉成膏者韭根半斤防風一兩去蘆頭蔓荊子二兩白芷一兩辛夷仁半兩川升麻半兩吳鹽半兩芎藭半兩獨活半兩桑寄生半兩藿香半兩沉香半兩零陵香各半兩上細銼先以桑根白皮一斤以水八升煮取五升去滓又以竹瀝一升相和浸漬諸藥一宿後以豬脂二斤煎候白芷色黃膏成濾去滓於瓷器中盛每用塗之日三五度妙治血憊腦虛頭風致髭眉須疏薄不生宜用此方出聖惠方蔓荊子半兩白芷附子防風去蘆頭芎藭莽草辛夷黃芩細辛洗去苗土當歸漢椒去目以上各一兩川大黃一兩半上都細銼以馬鬐膏一斤豬脂二斤以慢火同煎候白芷色黃住火去滓放冷用瓷合盛淨洗塗之日三上良治眉發髭不生兼令黑方出聖惠方鐵粉二兩附子二兩去皮臍生用羊躑躅三兩蓮子草二斤零陵香三兩沒石子五顆蔓荊子二兩上粗羅為散以生油五升浸五七日後用慢火煎取一半以下去滓於瓷盒內盛貯血虛無眉髭發每日塗之神驗切不得塗著口鼻恐有毛生青蓮膏出聖惠方治血虛眉發髭不生宜用此方蓮子草汁三升生苣蕂油一升牛乳一升甘草二兩細銼上相和於鐺中以慢火煎之才似魚眼沸便攪之勿住手直至沫盡為熟澄清濾去滓盛於不津器中每用候夜臥時身仰臥每鼻孔點三五點如小豆大至六七遍止良久乃起有唾須唾卻勿得咽之啜少湯飲如此點半年白者即黑落者重生其藥良驗忌生蒜蘿蔔辛辣物松脂膏出聖惠方治眉發髭不生松脂二兩附子二兩去皮臍生用蔓荊子半斤上為末以烏雞脂和瓷器中盛密封頭於屋北陰乾百日藥成細研以馬鬐膏和薄塗於上不生處勿令近面又方出聖惠方柏葉切一斤附子二兩去皮臍生用上為末以豬脂和作二十丸每日一丸在米泔中化開洗之每日用之十日後再生新者余藥以綿裹密器貯之勿令泄氣治生眉毛方出聖惠方鐵生衣亦作鐵粉牆上青衣外臺祕要作爐上青衣上為末以水和塗之即生治發落不生出本草先以醋泔清淨洗禿處以生布揩令大熱臘月豬脂細研入生鐵煮沸三二度敷之遍生治眉毛鬢髮火燒瘡瘢毛不生方出千金方用蒲灰以正月狗臘和敷則生生髮方出肘後方塗頭黑潤頭髮取側柏葉陰乾作末和油塗之治眉發髭不生方出聖惠方用羊糞灰三斗以水淋取汁洗之三日一洗不過十洗大生令白髮不生出本草以麻子五升研桐葉一握搗相和浸三日去滓沐發令白髮不生治發落不生用豹脂塗無發處朝塗而暮生生髮令長附論夫足少陰之經血所榮也氣盛則髮長而美若虛則發不長方胡麻膏出聖惠方長髮令速生及黑潤胡麻油一升臘月豬脂一升烏雞脂一合丁香一兩半甘松香一兩半零陵香二兩芎藭二兩竹葉二兩細辛二兩川椒二兩去目苜蓿香二兩澤蘭一兩大麻仁一兩桑根白皮一兩辛夷一兩桑寄生一兩蔓荊子各一兩防風三兩去蘆頭杏仁三兩湯浸去皮尖雙仁莽草二兩柏葉三兩上都細銼米醋浸一宿漉出納入油雞脂豬脂中以慢火煎候白芷色焦黃膏成綿濾去滓以瓷盒盛淨先頭塗之日二用三十日發生長髮塗香油方出聖惠方松皮二兩天雄三二兩去目莽草一兩秦艽一兩去苗獨活二兩川烏頭三二兩川椒二兩去目白芷二兩芎藭二兩辛夷二兩甘松一兩零陵香一兩沉香一兩羊躑躅一兩木香一兩藿香一兩甘菊花一兩牛膝一兩去苗松葉半斤杏仁三二兩湯浸去皮上細銼以醋五升漬一宿漉出以生烏麻油六斤於鐺內微火煎令沸候白芷色焦黃膏成以綿濾去滓瓷器盛一依塗油之法任意塗之以發生為度生髮膏出聖惠方細辛防風續斷芎藭皂莢柏葉辛夷仁各一兩寄生二兩澤蘭零陵香各二兩蔓荊子四兩桑根汁一升韭根汁三合三勺竹葉切三合松葉切六合烏麻油四大升白芷六兩上以苦酒桑根汁韭根汁漬一宿以綿裹煎微火三上三下白芷色黃去滓濾以器盛之用塗摩頭髮日三兩度一方無苦酒漬生髮膏胡麻油一升雁脂一合丁香甘松香各一兩半吳藿香細辛椒各二兩澤蘭白芷蔓荊子苜蓿香大麻子各一兩芎藭防風莽草杏仁各三兩去皮竹葉切三五合上切以酢漬一宿煎之以微火三上三下白芷色黃膏成去滓以塗發及頂尤妙又方令發速長黑烏喙莽草續斷皂莢去皮子澤蘭竹葉細辛白朮各二兩辛夷防風各一兩柏葉切四兩杏仁別搗松葉各三兩豬脂三升上先以米酢漬一宿以脂煎三上三下膏成去滓塗發及頂上敷藥時忌風令發速長而黑方出聖惠方烏喙三兩去皮臍生用莽草三兩續斷三兩皂莢二兩去黑皮並子澤蘭三兩白朮三兩細辛各三兩辛夷一兩柏葉一兩防風一兩竹葉一兩杏仁各一兩湯浸去皮尖雙仁生用上細銼以隔年米醋三升漬一宿漉出以麻油二升豬脂二斤同煎藥焦黃藥成去滓以瓷器盛每使淨洗頭了塗之三十日效治頭風烏喙膏生髮令速長黑而光潤烏喙莽草石南草續斷皂莢去皮子煎澤蘭白朮各三二兩辛夷仁一兩柏葉切碎豬脂半三升上以苦酒漬一宿以脂煎於東向灶釜中未煎之先放三堆土每三沸即下放一堆土候沸定放一堆土三次畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小兒當刮頭日三塗大人數沐日塗之甚驗蓮子草膏治發須禿落令重生兼黑潤出聖惠方蓮子草汁二升熊白脂一大合豬鬐膏一合生麻油一合柏白皮三合山韭根切三合瓦衣切五合上以銅器煎之候膏成去滓收貯每於梳頭塗膏令頭髮生又黑治婦人長髮方零陵香白芷蔓荊子蓁樹生附子藿香各一兩荊芥枝半兩上㕮咀綿包扎於瓶內用香油一斤浸卻用紙封口埋地內半月取刷之近效生髮方出聖惠方蔓荊子青葙葉蓮子草各一分附子二枚碎頭髮灰二匕上以酒漬納瓷器中封閉經二七日藥成以烏雞脂和塗之先以泔洗然後敷之數日生長一尺也生髮牆衣散出聖惠方牆衣五合曝乾搗末鐵精一合合歡木灰二合水萍末三合上搗研以生油和少許如膏以塗發不生處日夜再即生髮效令發易長方出聖惠方蓮子草絞汁取三升麻油二升羊乳一升豬脂一升上先煎乳一沸次入脂等更煎三兩沸放冷以瓷盒貯之每日塗發七日之外不長盡長長髮方出聖惠方蔓荊子三升大附子二枚上以酒一斗二升漬之以瓷器盛之封頭二十日藥成先以灰汁淨洗鬚髮拭乾取烏雞脂煎以塗之一日三遍凡經七日然後以藥塗日三四便澤以汁櫛發十日長一尺勿近面塗恐有毛生一方無烏雞脂令發易長出聖惠方熊脂一兩蔓荊子一兩上相和令勻以醋調塗之發即漸長常用長髮藥用亂髮洗淨曬乾以油煎令焦就鉢內細研如膏擦之長髮又法凡婦女禿髮即以漢椒四兩用酒浸密室內坐擦之其發自然長紫金油用鯽魚膽二十枚鐵鉎一片五錢重訶子五枚煨去核鬱金二枚銼黃芩半兩銼黑豆一大合紫草半兩零陵香半兩生薑汁一大合和勻生絹袋子盛取竹瀝油四兩麻油一十二兩入藥袋子於有油瓷盒內浸密封放涼處半月取出逐日搽頭百日內如漆永不落治稀黃香芎油治頭風發落不生用秦椒白芷川芎各半兩蔓荊子附子零陵香各二錢半細銼用綿裹以生麻油半斤於瓷器內浸三七日塗發稀少處不可滴面上去風生髮柏枝油用柏枝幹者秦椒半夏各三兩㕮咀用水兩碗煎至半碗入蜜少許再煎一兩沸每用時入生薑汁少許調勻擦無發處每日兩次去風生髮烏韭方用烏韭石衣燒為灰沐頭長髮此是陰岩濕處山石上苔長者可四五寸治發落不生令長用雁肪敷之主生毛髮以胡麻生油塗頭令人生髮生髮以羊屎燒灰和雁肪塗頭上三日生長髮方以石荊生水旁者作灰汁沐頭生髮生毛髮以白犬乳汁塗孔中即生黑髮若欲不生拔去毛髮以鱉膏塗之即不生矣長髮方用續斷汁沐頭主生髮出本草以水萍作湯沐浴又為膏敷之長髮出本草挼皂莢葉沐頭長髮出本草以松葉子作油敷頭主生髮去風癢出本草取庵摩勒子壓取汁合鐵粉和油塗頭初塗發脫後生如漆令腦滿發不白而長生用槐子以相連多者為好十月巳日採之新盆盛和泥百日皮爛為水核如大豆服之生毛髮出本草用金星草根捶碎浸油塗頭良治無頭髮出本草用瓜蒂葉生搗汁塗之即生生眉附論足太陽之經其脈起於目內眥上額交巔血氣盛則眉美有毫血少則眉惡又眉為風邪所傷故眉脫皆是血氣傷損不能榮養也方烏蛇丸出聖惠方治風毒眉毛墮落宜服烏蛇肉酒浸炙令黃白附子炮裂白殭蠶微炒乾蠍微炒防風去蘆頭以上各半兩麝香一分細研鹿脛骨半兩塗酥炙令微黃藿香半兩臘月烏一隻燒為灰上為末煉蜜和搗三二百杵丸如梧桐子大每日空心以溫酒下二十丸夜臨臥再服治眉毛脫落宜用此方用蓮子草搗絞取汁磨生鐵塗之以手揩摩令藥氣透肉一日可三兩度塗之為妙又方出聖惠方用白礬十兩燒令汁盡細研為末以蒸餅和丸如梧桐子大每日空腹以溫水下七丸日加一丸至四十丸日減一丸周而復始效生眉毛方出聖惠方用菁荊子四兩微炒為末以醋和每夜塗之又方出聖惠方用七月烏麻花陰乾為末生烏麻油浸每夜敷之治眉癢毛落方出聖惠方用垂柳葉陰乾搗羅為末以母生薑汁於生鐵器中調夜間塗之漸以手摩令熱為妙生眉發出本草以鱧腸草汁塗之生速而繁洗法鬼舐頭
