研乳香一分研上二味內瓜中用蓋子合了竹籤定之飯上蒸三四次爛成膏子每服三五匙地黃酒化下生地黃汁半盞無灰上釀二盞和之用一中盞暖熱化膏本事方云有人患此病自午後發黃昏時定豫曰此患必先從足起經言十二經絡各有筋惟足少陰之筋自足至頂大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又曰陽中之陰肺也自離至兌陰旺陽弱之時故靈實卑法云離至干腎氣絶而肝氣弱肝腎二臟受陰氣故發於是時豫授此方二服而愈烏頭丸聖濟總録治筋急轉筋舒展不能草烏頭用鹽水浸三日取出洗切麩炒麩焦為度去麩荊芥穗各八兩上為細末別用宣州木瓜二枚炊熱去皮瓤入前藥杵令勻用酒煮麵糊和丸如梧桐子大每服三十丸加至五十丸食前木瓜湯下日三薏苡仁湯治肝虛筋脈不利腹急筋見脅肋脹滿薏苡仁防風去叉桂去粗皮當歸切焙各一兩酸棗仁炒二兩白茯苓去黑皮海桐皮萆薢芎藭各半兩上㕮咀如麻豆大每服三錢水一盞半煎至八分去滓溫服不拘時候治筋骨攣急本草用秫米一石曲三十斤和地黃一斤茵陳蒿一斤炙令黃依釀酒法服之柏子仁丸聖惠方治肝虛寒筋急腹滿脅脹面色青黃背膊痠疼羸瘦無力柏子仁黃耆銼白茯苓去黑皮楮實覆盆子五味子附子炮裂去皮臍石斛去根酸棗仁炒鹿茸酥炙去毛桂去粗皮白朮沉香銼枳實麩炒熟乾地黃焙各二兩上為末煉蜜和搗二三百杵丸如梧桐子大每服三十丸空心及晚食前忌生冷油膩羌活湯一名白茯苓散治肝臟風筋脈或疹腹肋急痛口眼偏斜四肢疼痛聖惠方羌活去蘆頭白朮麻黃去根節煮掠去沫焙側子炮裂去皮臍丹參當歸銼炒防風去叉萆薢羚羊角鎊屑各三錢白茯苓去黑皮桂去粗皮各半兩上銼為麻豆每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候茯苓湯治肝氣不足筋脈急見心腹壅滯左脅妨脹不思飲食白茯苓去黑皮前胡去蘆頭白朮鱉甲塗醋炙黃去裙襴沉香銼黃耆銼各一兩桂去粗皮枳實麩炒黃各半兩生乾地黃五味子各三錢上搗篩每服三錢水一盞生薑三片煎至七分去滓溫服不拘時忌莧菜搓滾舒筋法用大筒長一尺許兩頭通一杖子穿過以繩系兩頭於坐椅上每坐則以腳踏竹筒上以腳搓滾之勿計功程兩日便覺骨寬暢試猛伸腳足與常日瘥遠不越兩月病筋當伸治結筋本草以杓打人身上結筋二下筋散矣筋極附論夫筋極者主肝也肝應於筋筋與肝合肝有病從筋而生又曰以春遇風為筋痹痹不已復感於邪內舍於肝陽氣入於內陰氣出於外若出於外為風風虛則筋虛筋虛則喜悲其色青蒼見於眼下若傷寒則筋不能動十指甲皆痛好轉筋其源以春甲乙日傷風風在筋為肝風也若陽氣內發發則筋實實則好怒肝傷熱則咳咳則脅下痛不可轉動又腳下滿痛故曰肝實風也筋絶不治九日死何以知之手足爪甲青黑呼罵不息者是也筋應足厥陰厥陰氣絶則筋急厥陰者肝脈也與筋合聚於陰器而脈絡於舌本脈不榮則筋急筋急則引卵縮舌卷則筋先絶庚日篤辛日死方羌活散聖惠方治筋極風冷所傷攣痹不仁宜服羌活天麻各一兩芎藭三錢酸棗仁微炒一兩鹿角膠一兩搗碎炒令黃燥五加皮三錢薏苡仁麻黃各一兩去根節萆薢銼羚羊角屑人參去蘆頭白附子炮裂各三錢牛膝一兩去苗秦艽三錢去苗烏蛇肉酒浸炙令黃肉桂去皺皮各一兩犀角屑茵芋各三錢側子一兩炮裂去皮臍地骨皮三錢防風一兩去蘆頭上搗羅為細散每服空心及晚食前以豆淋酒調下一錢桑枝酸棗仁煎出聖惠方治筋極身體拘急四肢疼痛行履不得宜服酸棗仁三兩一半炒熟一半生用羚羊角屑一兩海桐皮二兩銼羌活二兩仙靈脾赤箭各一兩萆薢一兩銼杜仲一兩去粗皮炒虎脛骨一兩半塗酥炙黃防風一兩去蘆頭石斛一兩半去根銼牛膝去苗巴戟附子炮裂去皮臍木香生乾地黃各一兩蜜四兩真酥一兩桑枝一握長一尺銼上除酥蜜桑枝外搗羅為散用清酒七升煎桑枝令色微黃去桑枝後下藥末更煎一二十沸次下酥蜜煎成膏子看稀稠得所瓷合盛每服食前以溫酒調下一茶匙天雄丸出聖惠方治筋極身體拘急脅下多痛不可轉動指節筋脈不利五加皮散出聖惠方治筋極肢節拘急攣縮疼痛五加皮茵芋防風去蘆頭各一兩天南星半兩炮裂白花蛇二兩酒浸炙黃取肉天雄炮裂去皮臍白殭蠶微炒乾蠍微炒各一兩蜂兒半兩微炒桂心三分酸棗仁一兩微炒當歸三分麻黃一兩去根節甘草半兩炙微赤銼乾薑半兩炮製銼上搗羅為細散每於食前以暖酒調下一錢地黃丸出本事方治筋極養血熟乾地黃十分頑荊一分山茱萸五分黑枸杞炙地膚子白朮乾漆蠐螬干炙天雄車前子各三分萆薢山芋澤瀉牛膝各一兩上為細末煉蜜和杵如梧桐子大每服五十丸空心臨臥溫酒下羚羊角散出聖惠方治筋極四肢拘急頭項強直爪甲多青脅肋脹痛宜服羚羊角屑五加皮各一兩防風三錢去蘆頭酸棗仁一兩炒赤茯苓當歸桂心各三錢桃仁三錢湯浸去皮尖雙仁炒黃枳實半兩麩炒黃芎藭檳榔各三錢甘草半兩炙赤銼上搗篩為散每服四錢以水一中盞生薑三片煎至六分去滓溫服不拘時候黃耆散出聖惠方治筋極則筋急多怒口乾熱燥不已宜調脈解煩黃耆銼酸棗仁炒各二兩桂心一兩石膏三兩木通銼赤芍藥各三兩黃芩柘白皮銼羚羊角屑各一兩上粗搗羅為散每服四錢水一中盞煎至六分去滓溫服不拘時候乾地黃丸治筋極益筋骨除四肢疼痛筋實極筋虛極
