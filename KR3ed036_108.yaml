用生薑汁和香油於癢處再三敷而搽之小朱散聖濟總録治風癮疹久不瘥每發先或心腹痛痰噦麻痹筋脈不仁成塊赤土有沙石者不可用當歸切焙各等分上搗羅為散冷酒調下二錢兼用塗藥方慎火草大葉一名景天花生薑和皮不洗等分研鹽量多少上同研塗摩癢處如遍身癮疹塗發甚處自消礬石塗方治風赤白癮疹積年不愈每發遍身腫久恐入腸傷人礬石生搗末三兩青酒三升上先煮酒令沸次入礬石末煮如稀糊塗之一方入小便一升治遊風癮疹赤土細研香白芷各一兩上為細末每服二錢用茶清調下治皮膚風熱遍身生癮疹地黃茵陳蒿各一斤上用米一石曲三斤和地黃一斤茵陳炙令黃一作釀酒法服之自消又方以牛蒡子浮萍等分用薄荷湯調下二錢日二服愈亦治筋骨攣急治瘙癮疹方出肘後方礬石細辛各一兩上以酒三升漬令消塗洗立愈積年入腹者亦得瘥治赤疹方禹餘糧半夏各等分上和以雞子黃合搗先取新布拭瘢上令赤以藥塗之勿令見風二十日滅矣十餘歲瘢不瘥平復如故杏葉煎揩拭方出聖惠方治風癮疹頑癢杏葉切五升蒴藋根切一升上以水一斗半煮取二升去滓用綿浸藥汁揩拭所患處日三兩度治風癮及疹癮出聖惠方白礬石灰各一兩上合和研令勻以生薑自然汁調如稀糊薄塗患處日二度立效治風瘙癮疹遍身皆癢搔之成瘡出聖惠方茵陳五兩生用苦參五兩上細銼用水一斗煮取二升溫熱得所蘸綿拭之日五七度瘥治風瘙癮疹出聖惠方用巴豆二兩以水七升煮取三升故帛染汁拭之大人小兒以意加減茱萸方治風瘙癮疹治風瘙癮疹出聖惠方用酪和鹽熱煮摩之隨手即消又方出千金方用石灰淋取汁洗之良一方石灰隨多少和醋漿水塗疹上隨手即滅大豆浸酒治風瘙癮疹又方出聖惠方用牛膝為末酒下方寸匕日三並治骨疽癩病及㾦癗又方出千金方用芥子末漿服方寸匕日三次白朮飲出千金方治風瘙癮疹治癮疹百療不瘥者亦治赤疹出聖惠方用景天花一斤一名慎火草細搗取汁敷上熱炙手摩之再三度瘥芒硝湯出千金方治癮疹百療不瘥者亦治赤疹用芒硝八兩以水一斗煮取四升適寒溫棉染拭之一方用湯和拭之清肌散治暴發癮疹苦出而暴沒或作痠痛黑狗脊甘草荊芥各等分上生研冷水調去滓服半碗入口即效大凡人患風疹有暴發者其證或熱或不熱忽煩躁遍身瘙癢發出癮疹此由是濕氣乘熱暴入脾經若不快出或致傷腸煩悶治癮疹出千金方用白芷刺燒存性為末溫酒調二錢服一方用白芷根葉煮汁洗之治風疹瘙癢不可忍亦治風熱皮膚燥癢因而生瘡本草用赤土不拘多少研細每服三錢荊芥茶調下食後荊芥酒調下亦得如氣實人用蜜水調尤妙一方溫酒調下赤土即代赭洗方出聖惠方治風瘙癮疹遍身癢成瘡方見白殭蠶丸用蠶砂一升新水二斗煮取一斗三升去滓溫熱得所密室洗之宜避風清肌散出危氏方治風寒暑濕外搏肌膚發為癮疹遍身瘙癢或赤或白咽乾或作寒熱用敗毒散一兩半加天麻薄荷各三錢蟬蛻七個去足翼分作六服每服水一盞半生薑三片煎溫服立效石南酒聖濟總録治風癮疹經旬不解用石南葉去粗莖生用三兩為末每服半錢至一錢許用酒三合煎一沸空心溫服松葉酒聖濟總録治風瘙癮疹三十年不瘥蒴藋湯出肘後方治一切風癮疹出聖惠方用蒴藋一兩切碎以水三碗煎至五七沸冷暖得所洗患處一方煮蒴藋湯以少酒塗之一方治癧瘍風以蒴藋淋灰取汁洗患處訖以醋研木防己塗之並瘥蛇銜草敷方出肘後方治風癮疹赤色以蛇銜草搗極爛敷之瘥赤疹者由冷濕搏於肌中甚即為熱乃成赤疹得天熱則劇冷則減是也枳實酒出簡易方治遍身白疹瘙癢不止用枳實不拘多少麵炒黃切片去粗皮每服二大錢用酒浸少時去枳實但飲酒最妙用水煎枳實洗患處尤佳一方醋浸令浥浥炒熱用綿裹尉疹上治癮疹出肘後方用楝皮以水濃煎浴之大效治風疹入腹身體強舌乾燥硬出聖惠方用蔓荊子三兩為末每服溫酒下一錢治風癮出肘後方用水煮蜂房取二升入芒硝敷上日五度即瘥露蜂房今蜂窠也白殭蠶丸出淡寮方治風遍身癮疹疼痛成瘡苦參飲治瘡疹最多亦可治癩疾雲母散出肘後方治風疹遍身百計治不瘥者用雲母粉煅為末以清水調服之看大小以意酌量與之少多服如治風熱再服尤妙治一切疹一名枳實湯出肘後方用枳殼以水煮為煎塗之干即又塗之良一方銼煎湯洗服亦得治赤白遊疹以物發疹用蠐螬破碎取汁塗患處妙紫葳散治身上游風疹毒方治久疹有時發動脅疼如打用六月七月取地膚子乾末酒服方寸匕日五六服療癮疹煩滿及血不止用新濕馬矢絞取汁服二升微者一升愈乾者水濕取汁療三十歲癮疹耳目合昏春秋輒發方於南屋東頭第一梁壁外以細灰布地大小足容兩腳躡灰上訖使病人徑去勿反顧炙腳十趾間炙灰上隨病人年為狀車瑗道方療風疹方用生蔥一大束三尺以上圍者並根鬚鹽三大升以香漿水三石煮取二石並注於浴斛中適令熱浸雖積年患者不過三兩度浸必瘥枳殼湯治風疹癢不止治風瘙癮疹方出肘後方上燒石令熱赤以投水中納鹽數合及熱浸之良又方出聖惠方用大戟五兩水七升煮取五升洗之日再治風疹癢不止方用蕓薹菜三握細銼爛研絞取汁於疹上熱指時時上藥令熱徹又續煎椒湯洗又方用苦參五兩銼搗為煉蜜和丸如梧桐子大每於食後以溫水下三十丸又方出聖惠方用蛇蛻皮一條以水一升煎取半升以雞翎一莖湯熱時蘸藥揩上即瘥治暴氣在表攻皮膚上癮疹作瘡出千金方用槐枝葉洗之治風疹風科集驗方杜甫詩有除𦸁草一篇蜀中謂之毛𦸁芒可畏觸人如蜂蠆擇取先者以此草點之一身皆失葉背紫者入藥齊抗結事守縉雲日少氣力風疹繼作服仙茅遂愈風科集驗方八九月時採得竹刀子刮去黑皮切如緑豆粒米泔浸兩宿陰乾搗篩熟蜜丸如梧桐子大每旦空肚酒飲任便下二十丸禁食牛乳及黑牛肉大減藥力也續傳信方南唐筠州刺使王紹顏所著因國書編録西域婆羅門僧服仙茅方其方當時甚盛故今江南但呼此藥為婆羅門參黃土湯旅舍方治赤疹瘙癢煩躁昏悶用伏龍肝即灶下黃土研細每服二錢生薑蜜湯調下治風癮疹方本草以楓香水煎熱泄洗治風疹本草用緑豆生研絞汁服治遍身風疹本草以側子令酒調服治皮膚風本草以槐花炒服治皮膚風本草以五加皮葉可作蔬菜食之治風瘙癢癮疹本草以柳木中蟲屑作湯浴之大效苦參丸本草治人病遍身風熱疹細癢痛不可忍連胸頸臍腹及近隱皆然涎痰亦多夜不得睡治風瘙癮疹身癢不止用燕子窠內土水和敷之系抱子處土惡風附論夫惡風者皆五風厲氣所致也風有青白赤黑黃之異其毒中人五臟則生蟲亦有五種蟲生息滋蔓入於骨髓五臟內傷形貌外應故食肝則眉睫墮落食肺則鼻柱倒塌食脾則語聲變散食腎則耳鳴如雷鼓之聲心不受食食心則為不可治是故謂之惡風方殊聖散聖濟總録治惡風天麻菖蒲九節者米泔浸焙乾何首烏乳香研菊花蔓荊實威靈仙地骨皮仙人骨胡麻防風去叉枳殼去瓤麩炒益母草烏蛇酒浸去皮骨小荊子蒼耳苦參沙參丹參人參元參紫參荊芥各半兩上為散每服二錢用溫酒調下食前後各一服隔宿先吃豬𦚟一枚早晨並服三服白朮散聖濟總録治惡風無問新久四肢不仁一身盡痛頭目眩倒口面喎斜白朮微炒人參秦艽去苗土當歸切焙天雄炮裂去皮臍各三分附子炮裂去皮臍烏頭炮裂去皮臍各二兩乾薑炮裂一兩蜀椒去目並閉口者炒出汁一兩防風去叉桂去粗皮防己銼萆薢炒白蘞桔梗去蘆頭炒黃耆細銼各三兩山茱萸麻黃去根節先煮掠去末焙乾茵芋去粗莖甘草炙各三分細辛去苗葉半兩上為末每服二錢許溫酒調下空心午時各一服未效漸加服之覺口唇𤸷痹即減服之胡麻散聖濟總録治惡風胡麻一斤去浮者一半煮熟一半生用天麻乳香研何首烏蒼耳松花角蒿款冬花克領草菖蒲人參苦參元參沙參丹參威靈仙去土各二兩甘菊花三兩蔓荊實二兩紫參二兩上為散每服二錢用溫酒調下如病深漸至三錢服至旬余若覺遍身疼痛是效豆蒸丸聖濟總録治惡風原蠶蛾全者二十八枚炒羊靨二十八枚折開炙乾豬靨二十八枚如前炙安息香犀角屑沒藥研人參甘草炙銼何首烏大黃銼炒遠志去心各一兩角蒿蒲公草蒼耳地錦益母草土馬鬃枸杞自角蒿以下七味各一兩事治淨用黑豆蓋覆甑中蒸令黑豆軟熟不用黑豆將藥曝乾上為末入鵝梨汁並煉蜜和丸如櫻桃大每服十丸不以時米飲嚼下如聖散聖濟總録治惡風胡麻二斤九蒸九曝天麻一兩乳香研松脂研款冬花旋覆花蒼耳人參元參沙參苦參紫參丹參松花白茯苓去黑皮各半兩木香丁香各一分胡麻子花一分上為散和勻每服三錢用薄茶調下日三四服不計時服藥分五日遍身及百骨節疼痛起止不得乃見效也兩三日後卻得安及一月身體黑瘦方漸平復天麻散聖濟總録天麻防風去叉細辛去葉苗附子炮裂去臍藁本去苗烏蛇酒浸用肉羌活去蘆頭芎藭菊花桂去粗皮麻黃去根節先煎掠去沫焙乾乾薑炮裂獨活去蘆頭甘草炙阿膠炙令燥白蘚皮各半兩上為散每日空腹溫酒調服二錢許漸加至三錢日二春夏煎當歸酒調下秋冬煎蒲黃酒調下野葛膏治惡風毒腫疼痹不仁瘰癧患瘡癰疽腫脛腳弱偏枯百病野葛犀角蛇銜莽草外臺作茵芋烏頭升麻防風蜀椒乾薑鱉甲雄黃巴豆各一兩丹參二兩躑躅一升上㕮咀以苦酒四升浸之一宿以成煎豬膏五斤微火上煎三上三下藥色小黃去滓以摩病上此方不可施之憤狠之人胡洽無丹參躑躅有細辛又蘇恭方白芷吳茱萸附子當歸代巴豆雄黃蛇銜鱉甲五參散聖濟總録治惡風人參沙參丹參元參苦參木通銼蒺藜子炒去角烏蛇酒浸去皮骨乾蠍去土天麻赤箭何首烏去黑皮陳橘皮湯浸去白焙各一兩黃芩去黑心半兩原蠶蛾一分上並生用搗羅為散每服三錢許熱茶調下服及半料即減服二錢整初服三日後覺先頭項脊膂身上疼痛乃藥力與病相擊也當安臥復時許即無事如或身上有瘡腫服藥一日後便覺漸減麻黃湯治惡風毒氣腳弱無力頑痹四肢不仁失音不能言毒氣衝心有人病者但一病相當即服此第一服次服第二服麻黃一兩大棗二十枚茯苓三兩杏仁三十枚防風白朮升麻當歸芎藭芍藥黃芩桂心麥門冬甘草各二兩上㕮咀以水九升清酒二升煮取二升半分四服日三夜一覆令小汗粉之莫令見風獨活湯第二服獨活四兩乾地黃三兩生薑五兩葛根桂心甘草芍藥麻黃各三兩上㕮咀水八升清酒二升合煎取二升半分四服日三夜一腳弱特忌食瓠子蕺菜犯之一世治療不愈威靈仙丹一名丹參散聖濟總録治惡風何首烏丸聖濟總録治脾肺風惡等疾何首烏石菖蒲荊芥穗蒼耳胡麻炒各一兩元參沙參苦參白花蛇酒浸去皮骨炙烏蛇酒浸去皮骨炙各半兩為末煉蜜和丸梧桐子大每服十丸茶酒任下如要作散每服二錢用溫酒調下白花蛇散聖濟總録治惡風白花蛇一條酒浸取肉三兩露蜂房微炙苦參銼防風去叉丹參梔子仁山芋各二兩半秦艽去苗土一兩上為散每日空心用溫酒調下二錢匕至三錢匕日再蔓荊實散聖濟總録治肺臟風毒發作如癩變成惡風證蔓荊實揉去白皮生用四兩胡麻搗為末炒熟一兩半天麻二兩菊花未開者良生用四兩天南星炮裂一兩枸杞生用四兩苦參搗取粉四兩上為散每服溫酒調下二錢匕日三夜一每服宜去食後稍遠恐藥食相犯防風酒聖濟總録治惡癩病防風去叉切碎一斤天麻銼碎五兩黍米一石枸杞根刮去皺皮去心銼碎用五斤好白曲一十五斤上將防風天麻枸杞根三味同水六斗煮取三斗去滓置於不津器中將黍米依造酒法蒸饋蒸訖曲米拌分三釀如常法又取槐白皮一斤細銼並用三年純黑貓兒去皮腸肚外爛煮同銼槐白皮相和入酒酒熟壓去糟每服溫飲三四合至五合日二夜一天蓼散聖濟總録治惡風天蓼葉焙乾一斤天麻三兩何首烏去黑皮酒炒王不留行微炒各二兩上為散每服二錢匕以熱漿水調服日三不計時烏蛇膽汁方聖濟總録治惡風烏蛇膽一枚冬瓜子一枚截去五寸許去瓤用梨一枚上掘地可深三尺掃拭令淨潔以物盛冬瓜置其內次安烏蛇膽梨於其上以物隔之用土蓋覆三七日一看冬瓜未甚壞則候七七日看蛇膽梨渾化為汁在冬瓜皮內即取汁每服溫一茶腳許小可風疾以匙頭濕過攪酒吃三兩服愈乳香散聖濟總録治惡風乳香研三錢胡麻水淘去浮者稱一斤文火炒香天麻慢火炙令黃色三兩上為散每城三錢匕飯後先炒著口內煎荊芥茶旋呷旋咽服五七日後覺遍身無力昏悶時勿怪乃藥力也即於腰眼兩邊相去量病人一寸半許各灸二七壯如麥粒大若鼻塌者用秋黍枝子去皮中心通作眼安在鼻中身上有腫處自消常服即煉蜜搜和為丸如梧桐子大溫酒下三五丸玉粉丸聖濟總録治惡風礬石一兩細研生炊餅劑一枚上和勻卻作炊餅蒸熟乘熱丸如梧子大每服三十丸食後茶清下勝玉散聖濟總録治惡風攣諸風角蒿五月採者去根九蒸九曝為末胡麻九蒸九曝為末上每一料用角蒿末一斤胡麻末半斤更入乳香一兩別研為細末拌和令勻每服一錢或二錢匕茶酒隨意調下硫黃酒出直指方治惡風頭面肢體癮疹魁瘰用透明鋒芒硫黃二錢乳鉢內研細入醇酒再研空心飲其清者滓又研細入酒飲之連日如是硫黃能殺惡毒自大便下治惡風疾方用松脂煉投冷水中二十遍蜜丸每二丸病發則服之日三鼻柱斷者二百日瘥斷鹽及房室又天門冬酒服百日愈
