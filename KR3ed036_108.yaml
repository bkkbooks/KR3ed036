body:
  text: 卷一百八諸風門風瘙癮疹附論素問言風邪客於肌中則肌虛真氣發散又被寒搏皮膚外發腠理開毫毛淫氣妄行則為癢也所以有風疹瘙癢皆由於此又有赤疹者忽起如蚊蚋啄煩癢極者沓沓壟起搔之隨手起又有白疹者亦如此赤疹熱時即發冷即止白疹天陰即發白疹宜煮礬石汁拭之或煮蒴藋和少酒浴之良或煮石楠汁拭之良或水煮雞糞汁或煮枳實汁拭之餘一切如治丹方法俗呼為風屎亦名風尸風氣挾熱起於腠理皮膚不腫不疼發為瘙癢謂之癮疹此風熱之浮淺者也其亦有寒暑濕之氣行焉熱在表天時炎暄而燥氣乘之則為赤疹風熱在表天時寒涼而冷氣折之則為白疹赤者遇涼清而後消白者遇溫暖而後滅然則用藥加減可無權度於此哉其有浴後腠理風與夫汗出解脫而得之者隱隱微黃似赤似白凝滯於肌肉之間而四體為之重著此風熱之挾濕外證又可推矣如其不知寒暑濕之所由生概以療風熱等輩之法治殆恐痰嗽嘔渴雜證變交攻由癮疹而變為瘡疹世醫癮疹無不謂是皮膚間風熱既分冷熱冷熱則寒暑之證經曰諸癢痛瘡皆屬於心心實熱則痛虛寒則癢又陽明主肌肉屬胃與大腸亦有冷熱分痛癢不可不審世人呼白者為婆膜赤者為血風名義混淆當以理曉內則察其臟腑虛實外則分其寒暑風濕隨證調之無不愈脈浮而大浮為風虛大為氣強風氣相搏即成癮疹身體為癢養生方云汗出不可露臥及浴使人身體振寒熱風疹也白疹天陰雨冷則劇遇風亦劇得晴暖及著衣服即瘥方犀角竹瀝膏治風熱發即頭項脈掣動急強及熱毒疹癢犀角十二分升麻八分蒴藋根秦艽獨活白芨菊花白朮防己白芷當歸防風芎藭青木香寒水石碎苦參漏蘆根各四分蒺藜子二合莽草二分枳實二枚四破梔子仁七枚竹瀝三升吳藍一兩上㕮咀以竹瀝漬一宿明旦於炭火上和豬脂五升煎至九上九下以候白芷色黃膏成絞去滓納於不津器用磨風處日三次延年蒴藋膏治身癢風瘙癮疹蒴藋根切蒺藜子各一升附子獨活犀角屑薔薇根白芷防風苦參白芨升麻白蘞防己各三兩川椒莽草青木香蛇床子蛇銜草各二兩茺蔚子切一升枳實五枚炙茵芋二兩半切上㕮咀苦酒漬令淹匝一宿明旦銅器中炭火上用豬膏五升煎令三上三下以候白芷色黃膏成絞去滓納不津器中用磨風疹延年牡丹膏治項強頭痛風瘙癢疹風腫牡丹皮當歸芎藭防風升麻防己芒硝各六分芍藥三分細辛三分乾薑三分犀角屑三分漏蘆三分蒴藋零陵香梔子仁杏仁去皮尖雙仁碎黃芩大黃青木香各三分竹瀝二升上㕮咀以竹瀝漬一宿醍醐三升半煎於火上三下三上候芍藥黃膏成絞去滓以摩病上烏蛇膏出聖惠方治風瘙癢疹結腫攻衝遍身發熱痛癢及治筋脈攣急烏蛇當歸芎藭不用多了此一味木鱉子枳殼大黃各一兩天麻附子白殭蠶烏喙天南星桂心細辛吳茱萸羌活蒼朮防風牛膝川椒乾葛白芷各半兩上並生用細銼以頭醋半升浸一宿用臘月豬脂二斤於鐺中入藥以慢火煎看白芷變黃紫色下火濾去滓令淨入於瓷盒內盛之用摩塗於所患處立效蒴藋膏出聖惠方治風瘙癮疹皮膚苦癢搔之血出蒴藋根蒺藜子白者茺蔚子切各一升附子去皮臍獨活去苗犀角薔薇根白芷防風苦參銼升麻漏蘆防己銼各三分香附二兩枳殼去瓤五枚茵芋去粗莖一兩半蜀椒去目併合口一兩蛇銜二兩上並生用粗搗篩以頭醋浸令透過一宿先用銅石或銀器於炭火上煎豬膏五斤去滓再入藥煎令小沸約自辰至申待白芷色黃膏成停溫去滓納不津器中取摩病處一方無茵芋莽草烏蛇丸出聖濟總録治風瘙癮疹遍身腫起或赤或白癢痛難住白蛇酒浸去皮骨炙焦乾蠍炒去土白附子炮天麻防風去叉麻黃去根節先煎掠去沫焙各二兩五靈脂炒白茯苓去黑皮人參檳榔生用各一兩肉豆蔻去皮五枚牛黃銼乾研一分白殭蠶炒阿膠炙燥天南星炮桂去粗皮各一兩半上將一十五味為末入牛黃研勻煉蜜為丸如赤小豆大每服十五丸食前溫酒下臨臥再服蒺藜子湯出聖濟總録治風疹發歇不瘥或赤或白瘙癢至甚蒺藜子炒去角二兩仙靈脾防風去叉芎藭萆薢白石脂枳殼去瓤麩炒各一兩半桂去粗皮黃芩去黑心各半兩白朮麻黃去根節羌活去蘆天雄炮去皮臍羚羊角屑黃連去須各一兩旋覆花炒三分上銼如麻豆大每服五錢用水一盞入生薑二片烏梅入半棗大同煎至八分去滓溫服卷柏散出聖惠方治皮膚癮疹及風熱生毒瘡卷柏枳殼麩微炒黃去瓤羌活五加皮麻黃去根節各一兩犀角屑天竺黃赤箭藁本柔耳防風芎藭黃耆銼各半兩烏蛇二兩酒浸去皮骨炙令黃色上為細散每服食前以薄荷湯調下二錢忌熱面雞豬魚蒜麻黃湯出聖濟總録治風瘙癢癮疹時時發動麻黃去根節煎掠去沫焙桂去粗皮黃連去須當歸切焙羌活去蘆白芷各一兩王不留行甘草炙芎藭白蒺藜天雄炮裂去皮臍各一兩半桑根白皮石膏各二兩紅藍花炒半兩上銼如麻豆每服三錢水一盞生薑三片煎至七分去滓溫服升麻犀角膏療風熱毒氣癢衝出皮膚瘙即癮疹赤起兼有黃水出後結為膿窠痛悉主之升麻犀角屑白蘞漏蘆枳實連翹生蛇銜草乾薑一作藍葉芒硝研湯澄下各二兩黃芩三兩梔子三十枚擘上㕮咀以竹瀝二升浸一宿以成煉豬脂五升煎令竹瀝水氣盡絞去滓納芒硝攪令凝膏成用摩患處日五六度益加一方有大黃藍葉無干姜治癮疹癢痛方出千金方大黃升麻黃柏當歸防風黃芩芍藥青木香甘草各二兩楓香五兩芒硝一兩地黃汁一升上㕮咀以水一斗煮取三升半去滓下芒硝令消帛染拓病一炊久日四五度青羊脂膏出千金方治風熱赤疹搔之逐手成瘡青羊脂四兩甘草芍藥各三兩寒水石白芷白芨黃柏防風黃耆升麻各四兩竹葉切石膏各一升上㕮咀先以水八升煮石膏竹葉取四升去滓浸諸藥以不中水豬脂二升合煎膏成敷病上良胡麻散出危氏方治氣血風熱癮疹瘙癢胡麻子十二兩苦參荊芥穗何首烏各八兩威靈仙防風石菖蒲牛蒡子炒菊花蔓荊子蒺藜炒去刺甘草炙各六兩上為末每服二錢食後薄荷湯點服或好茶清亦得秦艽丸聖濟總録治風瘙癮疹搔之愈甚秦艽去苗土防己松脂煉成者各一兩半枳殼去瓤麩炒蒺藜子炒去角各一兩半苦參白朮芎藭防風去叉附子炮裂去皮臍蒴藋乾薑炮各一兩上為末煉蜜和丸如桐子大每服二十丸溫酒下漸加至三十丸早晚食前各一服羚羊角散出聖惠方治風癮疹遍身癢痛心胸滿悶羚羊角屑白蘚皮防風去叉麻黃去根節羌活白蒺藜微炒去刺甘草炙微赤銼各一兩黃芩人參杏仁酒浸去皮尖雙仁麩炒微黃生乾地黃各三分枳殼半兩麩炒微黃去瓤上㕮咀每服四錢以水一中盞煎至五分去滓入酒一合更煎一兩沸不計時候溫服犀角散出聖惠方治風癮疹心悶犀角屑川升麻防風去叉元參白蘚皮景天花白蒺藜微炒去刺人參去蘆沙參去蘆牛黃細研各一兩甘草炙微赤銼馬牙硝各半兩上為細散研入牛黃令勻每服不計時候以竹葉湯下二錢楓香丸出聖惠方治風癮疹不可忍楓香白蒺藜微炒去刺白蘚皮蛇床子羚羊角屑各一兩川烏頭炮裂去皮臍藁本仙靈脾小荊芥子莽草微炒赤箭景天花各半兩上為末煉蜜和丸如桐子大每於食後以溫漿水下三十丸加味羌活飲出三因方治風寒暑濕外搏肌膚發為癮疹增寒發熱遍體瘙癢隨臟氣虛實或赤或白心迷悶亂口苦咽乾前胡一兩羌活人參桔梗甘草炙枳殼麩炒川芎天麻茯苓各半兩蟬蛻去頭薄荷各三錢上為末每服二大錢水一盞姜三片煎七分不以時服莽草膏出聖惠方治身體赤癮疹而瘙癢隨手腫起皮膚生㾦癗疼痛莽草二分當歸芎藭大戟細辛芍藥芫花蜀椒附子躑躅各四分豬膏二升半上㕮咀以酒浸一宿豬膏煎之候附子色黃膏成去滓以敷病上日三一方有蒴藋同醋煎天麻散出聖惠方治風熱癮疹天麻川芎川升麻半夏制各三錢防風細辛羌活荊芥穗蟬蛻去足嘴甘草焙各二錢上細銼每服二錢姜三片並水煎服挾寒者加官桂挾暑者加柴胡黃芩挾濕者加茯苓蒼朮麻黃湯出聖濟總録治風瘙癢癮疹搔之隨手起癢腫痛煩悶麻黃去根節三兩防風去叉二兩芎藭烏喙炮裂去皮臍獨活芍藥當歸切焙蒺藜子炒甘草炙人參各一兩上銼如麻豆每服五錢用水一盞半入生薑三片煎至六分去滓溫服日再一方止用水煮服之忌生冷油膩冷物枳實丸出聖濟總録治風瘙癮疹頭面腫癢枳實去瓤麩炒一兩半天門冬去心焙獨活去蘆蒺藜子炒人參防風去叉桔梗炒各一兩半黃連去須薏苡仁炒各一兩桂去粗皮上為末煉蜜和丸如桐子大每服十五丸粟米飲或溫酒下日再不拘時候升麻膏出聖惠方治熱風毒氣衝出皮膚搔即癮疹赤起生瘡兼有黃水結為膿窠痛悉主之升麻白薇漏蘆去蘆連翹芒硝黃芩去黑心蛇銜草枳殼麩炒去瓤各三兩山梔子四十枚蒴藋四兩上細銼以水三升煎候水涸去滓干瓷器中盛遇有疾塗之楓香洗湯出聖惠方治風癮疹楓香半斤芎藭川大黃黃芩苦參當歸川升麻甘草麝香各二兩蛇床子一兩上並生用為散每用五兩以水一斗煮取五升去滓溫洗病處日二度用之防風湯出聖惠方治瘙癮皮膚癢痛心神煩悶防風去叉黃耆銼犀角鎊升麻漏蘆去蘆秦艽去土各一兩半烏蛇酒浸去皮骨芒硝研枳殼去瓤麩炒各二兩上㕮咀每服五錢許水一盞半煎至一盞去滓溫服日再一方有白蒺藜無升麻雷丸散一名丹參散出聖惠方治風瘙皮膚癮疹疼痛赤腆瘙癢隨搔生瘡雷丸人參苦參牛膝酒浸切焙白附子炮防風去叉白花蛇酒浸去淨皮骨炙甘草炙銼各二兩丹參一兩半上為細散每服二錢匕食前溫酒調下天雄丸出千金方治風瘙癮疹心中煩悶恍惚不寧天雄炮裂去皮臍一兩防風去叉一兩牛膝酒浸切焙桂去粗皮乾薑炮細辛去苗葉人參各三分栝蔞根五分白朮二兩上為末煉蜜和丸如桐子大每服二十丸空腹米飲下日二服一方加知母為末酒調服半錢匕枳實丸一名獨活丸出聖濟總録治風熱頭面身體瘙癢癮疹治身癢癮疹不止者本草以天名精揩之立已治癮疹本草以楮莖單煮洗浴治風瘙癮疹淋洗方一名馬藺浴湯出聖惠方馬藺子一方用花蒴藋礬石茺蔚子蒺藜子茵芋羊桃扁竹各三兩上㕮咀以漿水二斗煮取一斗二升納礬石洗之日三又方蒴藋防風羊桃石南茵芋芫花蒺藜礬石各一兩上㕮咀以漿水一斗煮取五升去滓納礬石令小沸溫浴之塗搽雄黃膏出御藥院方治髮際內諸癢瘡及膚起癮疹癢不可忍每用少許臨臥塗摻患處以癢住為度豬肪脂三兩天麻香白芷各三兩輕粉二錢黃蠟雄黃各五錢麝香半兩巴豆五個重半錢上以豬肪脂煮天麻白芷巴豆黃色濾去豆等不用澄清入下項輕粉等四味和勻放冷為度醉仙散聖濟總録治風遍身癮疹瘙癢麻木白朮浴湯出千金方治癮疹諸療未瘥白朮三兩戎鹽一作蒴藋礬石捶碎各半兩黃連去須黃芩去黑心細辛去葉苗芎藭茵芋各一兩上細銼以水二斗煮取一斗去滓淋洗一方有茵芋蒴藋根治延年塗風疹蒴藋根蒺藜子羊桃切楮枝切茺蔚子石鹽各半兩辛夷仁礬石各三兩上水一斗煮取三升去滓納鹽攪令消用塗風疹上下塗之一方有兔藿枳實丸出聖惠方治風熱氣發沖頭面熱皮膚生風疹瘙癢盛生瘡不能多食枳實炙蒺藜子苦參各六分人參四分獨活天門冬去心肉桂各三分白朮四分上為末煉蜜和丸如桐子大每服十丸用薄荷酒下日二加至十五丸忌蒜熱面鯉魚桃