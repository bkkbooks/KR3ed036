body:
  text: 卷一百十八寒暑濕門中濕附論夫濕者天之陰雨宿霧地之山澤蒸氣人或中之必溢於血脈而流於關節也其或久處卑濕常住水涇或冒雨露而行勞傷汗出衣里冷濕皆能為病經云濕為停著左傳曰濕淫腹疾是以受濕之人一身痛重百節痠痛四肢腫滿筋脈弛長發熱惡寒小便祕澀大便飧泄也若氣不和平濕中稍重亦令人半身不遂口眼喎斜涎潮昏塞有類風證治之之法宜利小便治濕不利其小便非其治也宜於滲濕湯方中求之切不得以火劫發汗並妄轉瀉濕家誤汗必作痓令人角弓反張如中風狀下之則額上汗出微喘小便不利者死下利不止者亦死夫寒熱風濕皆能併合為病故有風濕濕溫證各不同為治亦別不可不明辨也風濕者風氣與濕氣相搏也其證肢體煩重不可轉側筋脈掣痛不得屈伸額上微汗不欲去被或身微腫欲發其汗但漐漐身潤則風濕俱去若大發其汗則風氣去而濕氣相併也其證身體煩疼無汗惡寒發熱脈浮緩而細宜與麻黃白朮湯以發散實表除濕去寒也中濕者脈沉而細微緩以濕溢入肌膚脈則沉細夫濕者在天為雨在地為土在人為臟為脾故濕喜歸脾脾虛喜中濕故曰濕流關節中之使人䐜脹四肢關節疼痛而煩久則浮腫喘滿昏不知人著腎者腰痛身重如坐水中著脾者四肢浮腫不能屈伸挾風則眩暈嘔噦兼寒則拳拳掣痛或泄瀉發黃身熱鼻塞直視鄭聲虛汗腳氣腹中脹臍下堅次之夫風濕者是風氣與濕氣共傷於人也風者八方之虛風濕者水濕之蒸氣若地下濕復少霜雪其山水氣蒸兼值暖猥暖猥人腠理開便受風濕其狀令人懈惰精神昏憒若經久亦令四肢緩縱不隨入臟則瘖啞口舌不收或腳痹弱變為腳氣真誥云櫛頭理髮欲得多過通流血脈散風濕數易更櫛器用之夫濕溫者其人常傷於濕因而中暑或汗未乾即浴濕熱相搏則發濕溫病苦兩脛逆冷及胸多汗頭目痛苦妄言惡寒反熱關節盡疼手足倦怠不自勝持其脈陽濡而弱陰小而急治在太陰宜與茯苓白朮湯不可發汗汗出必不能言耳聾不知所在身青而色變名曰重暍如此者醫殺之耳凡男子婦人小兒手足麻痹肌肉不仁者風寒濕三氣相雜至合為痹先用黃芩芍藥湯吐之吐訖次用通解丸通而瀉之瀉訖更用辛甘之劑汗之汗瀉之後可用當歸清涼飲子兼烏荊丸除濕丹和血行經之藥則愈矣凡男子婦人病水濕瀉注不止因服豆蔻烏梅薑附酸熱之劑經曰陽氣耗減於內陰精損削於外三焦閉溢水道不行水滿皮膚身體痞腫面黃腹大小便赤色兩足按之陷而不起內經曰諸濕腫滿皆屬脾土可用獨聖散吐之如時月寒涼宜於燠室不透風處用火一盆藉火力出汗次以導水禹功量病人虛實瀉十餘行濕去腫減則愈矣是汗下吐三法俱行三法行畢臟腑空虛先宜以淡漿粥養腸胃三兩日次服五苓益元同煎或燈心湯調下亦可如大勢未盡更服神功散可以流濕潤燥分陰陽利水道既平之後宜大將息慎忌油鹽酒果房室等事三年則不復作矣方金砂流濕丸治男子婦人雜證及風濕酒濕木通一兩去皮澤瀉一兩半木香一兩白茯苓去皮大黃去皮各一兩半滑石五兩海金砂五錢牽牛頭末五兩郁李仁一兩上為細末滴水丸如梧桐子大每服五十丸至八十丸生薑湯下忌濕面如小便不通燈草湯下如傷酒生薑湯下酒疸食黃蘿蔔湯下痢疾高良薑湯下婦人血氣不調當歸湯下肢節疼痛溫酒下心痛者韭根湯下膈氣枳實湯下中風槐角湯下除濕丹出宣明論治濕客腰膝重痛足脛浮腫檳榔甘遂赤芍藥威靈仙葶藶各二兩乳香一兩研沒藥一兩別研牽牛半兩大戟炒三兩陳皮四兩去白澤瀉二兩上為細末麵糊為丸如梧桐子大每服五十丸加至八十丸食前溫水送下得更衣止後服前服忌酒二日藥後忌濕面甘草三兩日食溫淡粥補胃一方無澤瀉桂苓白朮丸出御藥院方治消痰逆止咳嗽散痞滿壅塞開堅結痛悶增進飲食調和臟腑無問寒暑濕熱吐瀉利皆能開發以令遍身流濕潤燥氣液宣平而愈解酒毒療肺痿勞嗽水腫腹脹泄瀉不能止者服之利止為度隨證調之官桂茯苓去皮半夏以上各一兩乾生薑一分白朮紅皮去白澤瀉各半兩黃連半兩黃柏二兩上為末麵糊為丸如小豆大每服三五十丸生薑湯下食後服桂苓白朮散劉先生直格方治傷寒中風冒暑飲食內外一切所傷傳受濕熱內甚或頭痛口乾或吐瀉煩渴或小便赤澀大便急痛或瀉痢間作並一切濕熱霍亂吐瀉轉筋急痛腹滿或中外諸邪所傷而兼吐瀉者濕熱之時尤用之方見桂苓甘露飲舟車丸治積聚潮熱有時胃氣不和遍身腫滿或水濕蠱氣足腫腹脹氣湊不得腹腸間結聚大便不通並皆治之甘遂煨陳皮青皮各一兩木香半兩芫花醋炒大戟漿水浸一宿各一兩大黃二兩牽牛頭末四兩取蠱加蕪荑半兩上為細末水丸梧子大每服六十丸量虛實加減食前溫水送下以利為度蒼朮復煎散治寒濕相合腦痛惡寒項筋脊骨髀腿痛膝臏痛脈沉而無力行步身沉重蒼朮四兩水二碗煎至二大盞去滓入下項藥味羌活一錢升麻澤瀉柴胡藁本白朮各半錢黃柏三錢紅花少許上煎去滓稍熱服之空心取微汗為效忌酒濕面滲濕湯治寒濕所傷身重腰冷如坐水中小便或澀或利大便溏泄皆因坐臥濕處或因雨露所襲或因汗出衣里冷濕久久得之腰下重疼兩腳痠痛腿膝或腫或不腫小便利反不渴悉能主之蒼朮白朮甘草各三錢兩乾薑茯苓各二兩橘紅丁香各一兩上㕮咀每服四錢水一盞半生薑三片棗三枚去滓食前溫服煎至六分此藥治脾胃不和嘔逆噁心大便時時溏泄尤得其宜一方減橘紅丁香名腎著湯腰重而冷痛者大宜服之或不因濕氣所傷乃是風寒相搏以致腰疼宜服生料五積散仍加桃仁數個煎服若腎虛致痛當服補藥栝蔞根湯治風濕加渴甚者石膏二兩栝蔞根三分人參防風甘草炙各半兩葛根一兩半生用乾者只三錢上銼如麻豆大每服五錢水一盞半煎至一中盞去滓服尋痛丸治走注流濕襲經絡宜用除疼痛棕櫚皮燒存性一兩半皂莢子仁二兩炒當歸去蘆頭炒乳香別研沒藥別研各一兩穿山甲酥炙一兩木香半兩麝香二錢別研上同為細末酒煮麵糊和丸如梧桐子大每服五十丸不拘時候溫酒下或木瓜湯送下滲濕湯治坐臥濕地或為雨露所襲身重腳弱關節重疼發熱惡寒或多汗惡風或小便不利大便溏泄項背強急手足時厥周身麻痹肢體微腫白朮二兩人參半兩乾薑炮白芍藥附子炮去皮臍白茯苓去皮桂枝不見火甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片大棗三枚煎至八分去滓溫服不拘時候三花神祐丸治中滿腹脹喘嗽淋閉一切水濕腫滿濕熱腸垢沉積變生疾病久病不已黃瘦困倦氣血壅滯不得宣通或風濕燥郁肢體麻痹走注疼痛風痰涎嗽頭目眩暈瘧疾不已癥瘕積聚堅滿痞悶酒積一切痰飲嘔逆及婦人經病不快帶下淋瀝無問赤白並男子婦人傷寒濕熱腹滿疼痛久新瘦弱俗不能別辨或泛常只為轉動之藥兼治久新腰痛並一切下痢及小兒驚疳積熱乳癖腫滿並宜服之甘遂大戟芫花醋拌濕炒各半兩牽牛二兩大黃一兩以上為末輕粉一錢一方無輕粉上為細末滴水為丸如小豆大初服五丸每服加五丸溫水下每日三服加至快利利後常服保養宣通氣血稍進酒食病痞悶極甚者便多服則頓攻不開轉加痛悶則初服兩丸每加兩丸至快利為度以意消息小兒丸如麻子大隨強弱增損三四歲者三五丸依前法一方崔宣武神祐丸加黃柏人參紫菀散治濕熱流注足脛浮腫痰咳等證人參川芎木香防己白朮各一兩紫菀去土皮苦葶藶炒紫色各二兩上為粗散每服三錢水一大盞生薑四片烏梅一個煎至八分去滓溫服食前日進三服慎濕面溫酒等物接骨丹逐濕氣定疼痛腫疾並皆治之骨碎補去毛一斤敗醬生地黃去土淨洗各一兩斤蒲黃半斤白麵二升上為細末一處拌勻用隔年好米醋熬滾熱調藥放溫於痛處如藥冷再用熱醋調敷如此七次用綿包之大有神效一料分作七處七日用之除濕湯治寒濕所傷身體重著腰腳痠痛大便溏泄小便澀閉平胃散加半夏曲炒藿香白茯苓白朮上各等分用水二盞薑棗煎服一方去白朮用赤茯苓黃耆建中湯治傷濕鼻塞身痛黃耆微炙辣桂甘草白芍藥各二兩上為粗散每服三錢水一盞半姜四片棗三枚煎至八分去滓食前服一方入餳糖少許再煎令溶稍熱服赤茯苓丸治脾濕太過四肢腫滿腹脹喘逆氣不宣通小便赤澀葶藶四兩防己二兩赤茯苓一兩木香半兩上為細末棗肉為丸如梧桐子大每服三十丸煎桑白皮湯下食前服牛黃白朮丸治腰腳濕氣黑牽牛頭末二兩大黃二兩白朮一兩上為細末滴水丸梧桐子大每服三十丸食前生薑湯下如要快利加至百丸五加酒方五加根莖細銼五斗六月六日曲末三斗黍米一石糯米亦得上三味以水五斗共五加同下於大釜中以木度深淺與水平刻之即更添水一石五斗並前計兩石即下火煎旋旋急火取藥汁減下至水刻處即得以大盆安淨筐筐中安淨布單兼滓漉著筐中其汁在盆中唯有五斗且別盛密封蓋之又重取所漉者五加滓以水煮之如別有五加添和同煮更佳取此汁用淘米拌飯炊之如常炊法用前五加濃汁漬曲且炊米五斗釀之餘五鬥分為兩酘如常造酒法酒熟壓漉密封頭每服一盞暖飲之漸加勿令醉又遠志十兩末之下釀中益炒玄參及蛇皮肉亦得其糟與以下食之尤佳補骨脂丸治濕傷內外衆疾俱作陽氣衰絶補益之藥百端不應唐鄭相公為海南節度七十有五越地卑濕服諸藥不應元和七年有訶陵國船主李摩訶獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之破故紙半兩揀洗為末胡桃肉去皮二十兩研如泥上胡桃肉泥入破故紙末更以好煉蜜和勻如飴盛瓷器中旦日以溫酒化藥一匙服之不飲酒者以溫熟水化下彌久則延年益氣悅心明目補添筋骨但禁食蕓薹羊血牽牛湯治腹中濕氣足脛微腫中滿氣急咳嗽喘息小便不利黑牽牛頭末一兩厚朴薑製半兩上研末每服二錢煎薑棗湯調下或臨時水丸梧桐子大薑棗湯下十三丸亦得茯苓白朮湯治冒雨濕著肌膚或因汗出浸漬或因燥熱得病覺腰重腳弱身體煩痛頭眩等證其脈細弱白朮二兩炒附子一兩生熟臨時消息茯苓去皮半兩官桂去粗皮半兩甘草半兩上㕮咀每服四錢水二盞生薑七片煎至六分去滓食前服加味朮附湯治中濕脈沉而微緩濕喜歸脾流於關節中之多使人腹䐜脹倦怠四肢關節疼痛而煩或一身重著久則浮腫喘滿昏不知人挾風眩暈嘔噦兼寒則攣拳掣痛治之不得猛發汗灼艾通泄惟利小便為佳此方主之及治大小便皆自利白朮去蘆甘草炒一兩附子炮一兩半赤茯苓一兩上銼散每服五錢水一盞半姜七片棗三枚煎七分日三服才見身痹又三服當如冒狀勿怪蓋朮附並行皮中逐水氣故爾法合加桂一兩大便堅小便利則勿加朮附湯治風濕相搏身體疼煩不能轉側不嘔不渴大便堅硬小便自利及風虛頭目眩重甚者不知食味此藥暖肌補中助陽氣止自汗白朮二兩甘草炒一兩附子熟七錢半上銼細每服三錢姜七片水一盞半煎一盞食前微溫服白朮酒治中濕口噤不知人用白朮半兩去蘆以酒三盞煎一盞頓服不能飲酒以水代日三服夜一服鮑氏方云濕喜中脾則䐜脹四肢痛久則腫喘挾風則眩暈挾寒則攣拳不可大發汗不可灼艾泄瀉當利小便大汗大下皆死無敵丸赤土四兩醋碎穿山甲蒼朮自然銅火煅七次赤小豆生用赤芍藥山梔子橘