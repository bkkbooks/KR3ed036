羌活防風甘草白茯苓各半兩木香一分人參陳皮各三錢天台烏藥三錢白朮一兩麩炒南星半兩重者一隻炮去皮切如豆大附子九錢炮去皮臍切上㕮咀每服四錢大姜十片棗二枚煎八分不拘時候黃耆六一湯出朱氏集驗方治風濕相搏肌肉瞤動先服滲濕湯次用此藥黃耆當歸甘草上等分㕮咀水一盞薑棗煎空心服葶藶木香散出宣明論治濕熱內外餘熱水腫腹脹小便赤澀大便滑泄膝脛腫滿葶藶茯苓去皮豬苓去皮白朮各一分木香半錢澤瀉木通甘草各半兩楝桂一分滑石三兩上為末每服三錢白湯調下食前此藥下水濕消腫脹止泄瀉利小便若小便不得通利而反轉泄者此乃濕熱痞閉極深而攻之不開是能反為注泄此正氣已衰而多難救也慎不可攻之而無益耳勉以救之則少少與服之則稍稍導散微似得所漸以加之以意消息一方無白朮騙馬丹出朱氏集驗方治風濕相搏手足疼痛及諸傷百損骨碎補去毛自然銅醋煅虎脛骨酥炙敗龜酥炙各一兩川烏炮草烏炒去尖各四兩半兩錢五文醋煅牛膝地龍去土五靈脂當歸乳香沒藥川芎萆薢炙羌活藁本天麻防風威靈仙去苗各半兩上為細末酒糊為丸如梧桐子大每服三五十丸溫酒下病在上食後服病在下食前服遍身疼痛不拘時服除濕丸家藏經驗方黑牽牛一斤炒帶性破故紙四兩赤芍藥四兩錢子地龍四兩去土以上為末白膠香四兩另研上用不蛀皂角三十梃挪取漿入沙鉢內慢火熬成膏和藥丸如梧桐子大每服四十丸空心鹽湯下才利便止老人虛人不宜服臨安南山昭慶院文僧正者窠山為文室設榻其中久之為濕氣所逼半年足不能舉因得此藥乃能行遂求其方余在淳安忽左足沉重恐是濕氣依方制服洞下即愈茵陳湯出如宜方治受濕瘀熱發黃小便赤澀引飲茵陳一兩半山梔子十個大黃半兩上㕮咀水煎如受濕輕宜增味導赤散藿香正氣散出如宜方治寒濕所傷身重腰腳痠疼或浮腫厚朴制陳皮制白朮桔梗各三二兩甘草二半兩半夏曲二兩大腹皮白芷茯苓紫蘇藿香各三兩上㕮咀姜水煎服獨活散出朱氏集驗方治行履費力因臥濕地而得之胡伯才感此疾得唐接骨傳此方一服而愈獨活五兩川椒三兩草烏半斤麻黃三兩防風二兩杉木節一兩荊芥一小把蔥一握上煎湯熏蒸通得手用蔥蒸湯洗以知為度更先服小續命湯姜附湯出十便良方治風濕身體周重肌自汗出大附子一兩生用乾薑三兩甘草半兩上為飲子每服四錢加生薑五片水一大盞不計時煎服附子酒出十便良方祛風除濕溫經絡散寒邪附子一個半兩以上者慢火炮去皮臍切作片子上用無灰酒五升浸附子夏二春秋五冬七日可服每服溫飲一盞常令酒氣不斷食後一方水煎入鹽空心食前更入生薑五片同煎亦得二生湯出十便良方治體虛有風外受寒濕身如在空中生附子生天南星各等分上㕮咀每服四大錢水一盞半生薑十片慢火煎至八分去滓服戊午年豫在新安有此疾張醫博子發授此方用三服愈薇銜湯出指南方治脾中濕熱薇銜一兩一分澤瀉二兩半白朮二兩半上為細末每服三錢匕米飲調下祕傳循經丸出朱氏集驗方治男子婦人兒童室女諸經絡風邪寒濕氣血留滯流注作痛筋脈攣拳並皆治之常服亦可南星三兩炮地龍三兩去土川當歸三兩酒浸川烏三兩炮去皮臍草烏一兩炮去皮臍豆餅二兩用黑豆不以多少去皮好酒煮爛候酒干擂碎捏作餅子曬乾用乳香沒藥各一兩上為末酒煮麵糊為丸如梧桐子大每服三十丸用溫酒送下不拘時候服循絡丸出朱氏集驗方治風濕流襲足膝筋骨肌肉疼痛外祖母久苦此疾不得痊服此藥而愈五靈脂二兩北防風去蘆川萆薢炮去皮臍狗脊去毛大蒼朮米泔浸虎骨打碎酒煮川烏生用各一兩草烏一兩炮去皮臍沒藥一兩研去砂乳香半兩研去砂上為細末酒煮麵糊為丸如梧桐子大每服三十丸加至五十丸溫酒食前送下不飲酒者以木瓜湯下此藥可以常服如痛大作則以小續命湯加檳榔羌活青皮煎湯痛止則勿服蓋老人恐氣虛體弱則易耗氣爾滲濕湯出十便良方治風虛濕冷頭項拘急肢體疼倦或半身不遂手足麻痹或內積陰寒腹脅脹滿飲食不進便利無度或風濕相搏自汗短氣筋脈抽掣並皆治之蒼朮陳皮去白官桂縮砂仁厚朴附子乾薑各四兩甘草二兩上為飲子不計時以生薑五片棗一個煎十銖服又方出十便良方蒼朮二兩半附子乾薑厚朴肉豆蔻陳皮細辛桂縮砂仁各一兩甘草丁香各半兩上為飲子每服三錢生薑五片京棗一枚同煎薏苡仁煎出十便良方治寒濕搏襲經絡筋脈攣急腿膝重痛行履艱難宜服之薏苡仁虎骨各八兩天麻防風附子羌活桂心各四兩乳香二兩上為細末酒煮麵糊為丸如梧桐子大每服二十丸煎防風湯下不拘時候茖蔥丸出衛生家寶治寒濕筋骨冷痛不能舉動川烏頭去皮尖生用三錢鹽豉三錢黑牽牛頭末三錢乳香一錢沒藥一錢別研上為細末用肥蔥一握洗去土用淡醋一升不犯銅鐵文武火煮蔥醋一半漉去滓慢火再熬成膏滴水中不散為度將前次末和成劑如桐子大每服一十丸或加至二十丸溫酒送下大便微利則愈朮附湯出指南方治寒濕之證白朮四兩芍藥一兩附子一兩半炮去皮臍甘草二兩炙上為粗末每服五錢水二盞姜三片棗一枚煎一盞去滓溫服真定府張大年二十九素嗜酒至元辛未五月間病手指節腫痛屈伸不利膝臏亦然身體沉重心下痞不欲食食則欲吐面色痿黃精神短少至六月診其脈沉而緩緩者脾也難經云腧主體重節痛腧者脾土所主四肢屬脾蓋以素飲酒加之時助濕氣大勝流於四肢故為腫痛內經云諸濕腫痛皆屬脾土仲景曰濕流關節肢體煩疼此之謂也以大羌活湯治之大羌活湯出衛生家寶羌活一錢升麻一錢蒼朮半錢獨活七分防風五分茯苓五分澤瀉五分威靈仙五分當歸五分白朮半錢內經以濕淫於內治以苦溫以苦發之以淡滲之又云風能勝濕羌活獨活苦溫透關節勝濕故以為君升麻苦平威靈仙蒼朮防風苦辛溫發之者也故以為臣血壅而不流則痛當歸辛溫以散之甘草甘溫益氣緩中澤瀉鹹平茯苓甘平又能利小便導其濕以淡滲之者也使氣味相合上下分散其濕也上㕮咀都作一服水二盞煎至一盞去滓溫服食前一服食後一服忌酒濕面及生冷硬物不數日良愈腎著湯出如宜方治中濕小便自利經云治濕不利小便非其治也又云中濕者脈多沉緩而微關節一身盡痛人參乾薑白朮甘草茯苓各等分上㕮咀每服四錢水煎服除風濕羌活湯夫痿者濕熱乘腎肝也當急去之不然則下焦元氣竭盡而成軟癱必腰下不能動心煩冤而不止也若身重減氣不短小便如常及濕熱之令退時或所增之病氣退者不用五味子澤瀉茯苓豬苓黃柏知母蒼朮白朮之藥只依本病中證候加減常服藥亦須用酒黃柏二分或三分如更時令清燥之氣大行卻加辛溫瀉之若濕氣勝風證不退眩暈麻木不已方見神聖復氣湯治當風臥濕遇冷所中等病用黃粱米作飯食之羌活湯治風濕久不解攻注經絡走注疼痛不可忍川芎羌活防風肉桂赤芍藥牡丹皮當歸續斷白芷各一兩用薑棗煎湯下
