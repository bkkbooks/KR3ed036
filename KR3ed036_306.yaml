body:
  text: 卷三百六諸蟲獸傷門總論凡一切蟲獸所傷及背瘡腫毒杖瘡焮發或透入里者可服木香檳榔丸七八十丸或至百餘丸生薑湯下五七行量虛實加減用之內經曰先治內然後治外是也又云犬咬蛇傷不可便貼膏藥及生肌散之類內經云先治內後治外可也先當用導水丸禹功散或通經瀉十餘行即時痛減腫消然後可用膏藥生肌散之類敷之則愈方豆蔻散治驢涎馬氣駱駝騾子兔子狗子蛇傷肉豆蔻二個自然銅二錢燒酥檳榔一個板藍根三分蛀桑子二錢甘草三錢烏梅四個川烏頭一個燒金毛狗脊一個去毛紅花二錢紅芍藥三分茅香三分甘柿蒂一十四個川楝子四個香附子二十一個苦丁香七個官桂一分半去皮乳香二分上為細末每服二分溫酒一盞調下如生氣食後服熱氣食前如要驗中毒吃大麥面拌羹吐逆者是不吐非也又一個見如吃大麥面羹一二碗令病人極吐後下諸藥大效雄黃散用搗麻子汁飲之大效或用雄黃乾薑塗之蔦莧散用蔦莧汁塗之或用烏梅巴豆各等分塗之硫黃散治熊虎爪牙所傷毒痛用雄黃硫黃紫石搗末以絳囊盛之帶以防用雄礬散用雄黃礬或用丹飛礬塗之麝香散治鼠咬用貓毛燒灰麝香少許津唾調敷一方麝香封上用帛系之葛根散治熊傷人瘡用燒青布熏瘡口毒出仍煮葛根令濃汁以洗瘡日十度並搗葛根為散煮葛根汁服方寸匕日五服瘥治虎咬瘡方用濃煮葛根汁洗十數遍次搗為散以葛根汁服方寸匕日五甚者夜二服一方以嫩絮骨燒灰為末干敷瘡處一方用白礬為末納瘡口中痛止立效一方溫水服又方用青布卷為繩燒一頭燃納竹筒中注瘡口熏之極效又方用嚼栗子塗之良治豬齧方用松脂煉作餅子貼上又方用屋溜中泥塗之治熊虎所傷毒痛用煮生鐵令有味以洗之治熊傷人瘡用蒴藋一大把銼碎以水一升漬須臾取汁飲余渣封裹瘡上治虎犬咬蛇咬用飲薤汁一升日三瘥又杵汁敷之治貓兒傷用薄荷汁塗之若中貓涎入瘡則令人悶浸椒水調莽草末塗之治蛇犬毒人用黃藥子末敷之治狗咬蚍蜉瘡蛇咬用山豆根並以水研敷之治蛇犬咬用熱人尿淋患處良治虎犬傷用摻礬末納瘡口中裹之痛止立效治虎傷但飲酒常令大醉當吐毛出又方用鼠一枚燒為灰細研先用漿水洗身後敷之甚良治虎咬瘡方用嚼栗米塗之即瘥治惡蛇瘋犬所傷用唾調人耳塞塗傷處兩頭防毒走散然非數人耳塞不可此極驗又方用萆麻子為細末臘水化白蜜調傷處可闢虎法凡入山用燒水牛羖羊角虎狼蛇皆走治虎傷用生野葛汁塗乾薑末納瘡中治貓兒所咬成瘡上以鼠血塗之立瘥山林日用法每欲出行時用雄黃一桐子大火上燒煙上以熏腳繃草屨之類及袍袖間即百毒不敢侵害邪崇遠闢治虎傷人瘡取生葛根煮濃汁洗瘡兼搗葛末水服方寸匕日夜五六服治虎狼傷瘡以月經衣燒末敷之主人畜為虎狼等傷恐毒入內者取芒莖雜葛根濃煮服之石芒生高山如芒節短江西人呼為折草六月七月生穗如荻也治虎傷以細辛雄黃等分為末納瘡中日三四易之治虎及狗咬瘡用豬膏莓搗敷之至良治蟲豸咬傷取大藍汁一碗入雄黃麝香二物隨意看多少細研投藍汁中以點咬處若是毒者即並細服其汁神異之極也昔張薦員外在劍南為張延賞判官忽被斑蜘蛛咬頂上一宿咬處有二道赤色細如箸繞項上從胸前下至心經兩宿頭面腫疼如數升碗大肚漸腫幾至不救張相素重薦因出家財五百千延賞家財又數百千募能療者忽一人應召云可治張相初甚不信欲驗其方遂令目前合藥其人云不惜方當療人性命耳遂取大藍汁一瓷碗取蜘蛛投之藍汁中良久方出蜘蛛得汁中甚困不能動又別搗藍汁加麝香末更取蜘蛛投之至汁而死又更取藍汁麝香加雄黃和之更取一蜘蛛投汁中隨化為水張相及諸人甚異之遂令點於咬處兩日而悉平愈但咬處作小瘡痂落如舊驢馬傷附論人誤被馬咬或踢踏傷損肌肉腫痛若不即治毒氣日深傳入臟腑有致死者宜急治之夫驢馬氣之病醫流少有知之者凡人宰殺驢馬及自死開剝不可犯之如開剝驢馬時切忌手指間有瘡痕及誤傷刃其涎入內毒氣發也剝活馬毒少有若自死者大毒殺人命名曰中生氣煮肉之時其半生半熟有白氣毒殺人名曰中熟氣其毒入內初時便不覺頭疼體熱走注疼痛寒熱無時而作起居如常如要知之用麥面稀湯多飲之即吐涎此知是驢馬之毒也如不吐者非也急用豆蔻散或虎骨酒飲之即可如不知者久淹日月其毒發則如眼中出其眼即枯如臂中出其臂必傷腿中出腿必瘸然幸存命也如不然則病人危篤遍身腫毒膿出肉爛死者甚衆應驗方云餘年幼時大安元年在洛南縣駐親見官中倒死馬命衆屠行開剝此時七人到此開剝之其人皆死後常見此症死者甚多余深究其法於屠戶多受此方屢經大效不忍祕之大抵頭目疼身熱比傷寒相似卻走注疼痛如常此為異耳方殭蠶散治被馬咬傷損皮肉疼痛馬鞭梢五寸燒灰雄鼠糞炒二十枚白殭蠶炒半兩上搗為末以豬脂二兩調敷咬處日三易良立效散出千金方治馬齧人及踏人作瘡毒腫熱痛馬鞭梢二寸長鼠屎二七枚用合燒為末以豬膏和塗之立愈治遂成瘡爛經久不愈者以馬鞭皮燒末豬膏和塗虎骨酒治驢馬氣傷瘡毒虎骨酥炙半兩木香三錢上為細末分作二服酒調服之治馬踢傷出經驗良方用地骨皮不拘多少為末以水調敷瘡甚效桑皮散出千金方治馬齧人陰卵脫出用推納入以桑皮細作線縫之破烏雞取肝細銼以封之且忍勿小便即愈治馬犬齧及馬骨刺傷人及馬血入舊瘡中方用取新灰汁熱漬瘡當令汁器有火數易汁勿令爛入肉三數日漬之有腫者炙石尉之日二消止治剝馬被骨刺破毒欲死上以婦人月水敷瘡口立效治馬咬人瘡有毒腫疼痛又剝驢馬傷手出聖惠方用雞冠血著瘡中三下兒馬用雌牝馬用雄一方用熱雞血浸之茺蔚散治馬咬方以益母草細切和醋炒封之效益母草即茺蔚子也治馬咬傷出傳信適用方用燒獨顆栗子灰貼瘡追毒治馬咬人或刺破瘡及馬汗入瘡毒痛用馬糞燒灰為末研敷瘡上及馬尿洗瘡佳治驢涎馬汗毒所傷神效白礬飛過黃丹炒令紫色各等分相滾合以貼患處治馬咬人毒入心方出聖惠方用馬齒菜子搗為散每服一錢溫酒調下不計時候馬齒湯食之瘥又方用蓼藍汁三大盞水二盞煎至一大盞溫服二合不計時候兼用洗瘡良治馬咬人及踏人瘡有毒腫熱痛方用灸瘡中腫上瘥猘犬齧附論凡春末夏初犬多發狂必誡小弱持杖以預防之防而不免者莫出於灸百日之中一日不闕者方得免難若初見瘡瘥痛定即言平復者此最可畏大禍即至死在旦夕凡狂犬咬人著訖即令人狂精神已別何以得知但看灸時一度火下即覺心中醒然惺惺了了方知咬已即狂是以深須知此此病至重世皆輕之不以為意坐而死者常年有之凡猘犬咬人七日輒應一發三七日不發則脫也要過一百日乃得免耳每到七日輒當搗韭汁飲一二升又當終身禁食犬肉蠶蛹食此則發死不可救矣瘡未愈之間禁食生魚及諸肥膩冷食但於飯下蒸魚及肥膩器中食者更發不宜飲酒能過一年乃佳乃若人曾食落葵中犬咬必難治若已瘥十數年後食之者便發也若重發者生食蟾蜍鱠絶良亦可燒炙食之不必令其人知初得齧毒便為之則於後不發也儒門事親云麻先生兄材行為犬所齧舁至家脛腫如罐堅若鐵石毒氣入里嘔不下食頭痛而重往問戴人女僮曰痛隨利減以檳榔丸下之見兩行不瘥適戴人自舞陽回謂麻曰脛腫如此延之二陰三陽可行乎麻曰俱不可行如是何不大下之乃命夜臨臥服舟車丸百五十粒通經散三四錢比至夜半去十四行腫立消作胡桃紋反細於不傷之脛戴人曰慎勿貼膏紙當令毒氣出流膿血水常行又一日戴人恐毒氣未盡又服舟車丸百餘粒濟川散三四錢見六行病人曰十四行易當六行反難何也戴人曰病盛則勝藥病衰則不勝其藥也六日其腫水盡戴人曰膿水行時不畏風盡後畏風也乃以愈風餅子日三服之又二日方與生肌散一付敷之而愈嗚呼用藥有多寡便差別相懸向使不見戴人則利減之言非也以此知醫已難用醫尤難方桃白散出聖惠方桃白皮三兩甘草半兩炙微赤銼杏仁三十枚湯浸去皮尖雙仁麩炒微黃成膏桂心一兩上細銼以水三大盞煎至一盞去滓入杏仁膏攪令勻分為二服良久再服蟬花散出衛生家寶方治夏月犬傷及諸般損傷蛆蟲極盛臭惡不可近之者蛇蛻皮一兩用火燒存性研為末蟬殼半兩青黛半兩華陰細辛三錢半上為細末每服三錢酒調下如六畜損傷成瘡用酒灌如犬傷用酸漿子和吃蛆皆化為水蠅子不敢再落又以生寒水石末摻上韭根散出聖惠方治猘犬咬人疼痛不止方豉一合雄鼠糞一兩杏仁韭根各一兩上件藥相和爛研敷被咬處良金黃散出聖惠方治狂犬咬傷損疼痛方白礬一兩燒灰硫黃梔子灰各半兩上件藥都研為末敷咬損處即瘥杏豆散治療狂犬咬方杏仁切去皮尖豆豉各一兩韭根一握淨洗上搗為餅可瘡大小厚一二分貼咬處大作艾炷以炙餅上熱即瘥蝟皮散出千金方治猘犬毒方頭髮蝟皮各半分上燒灰水和飲一杯口噤者折齒納藥枸杞散出聖惠方治犬咬方枸杞葉少許鹽少許上同搗令熟後敷於瘡上即愈杏桃散出聖惠方治狂犬咬人傷痛方杏仁四十枚去皮尖雙仁拍碎桃白皮切二升上用水二升先煮桃皮取汁一升去滓下杏仁再煮減半去滓溫分三服得吐乃效金粒丹治瘋犬毒蛇所傷雄黃一兩透明者大硃砂一錢上研極細旋取溫蟾酥為丸如麻子大每服一丸溫酒下不忌口一服奏效立效散治瘋狗所傷蒜杏仁上各等分一處搗爛次用些少消風急風散一捻在蒜內連瘡口四畔敷訖將艾炷灸之次服消風急風二散忌鱔鰻發風等物定風散出衛生家寶方治瘋狗咬破先口含漿水洗淨用綿搵干貼藥更不再發天南星生防風各等分上為細末幹上藥更不再發無膿大有神效不可具述凡惡狗傷人咬破多或一二年至七八年咬破處或時疼痛或先發憎寒甚至發風遍身搐搦數日不食十死八九余親見者數十人服此藥但凡犬咬破者無有不愈雄麝散出醫方集成治猘犬傷或經久復發無藥可療者用之極驗雄黃色黃而明者五錢麝香五分上各等分研和勻用酒調二錢服如不肯服者則捻其鼻而灌之服藥後必使得睡切勿驚起任其自醒候利下惡物再進前藥即見效矣終身禁食犬肉蠶蛹此毒再發則難救梔子散治療狂犬犬方梔子皮燒灰石硫黃末用搗為末敷瘡日一易救急用二三度瘥虎骨散治療狂犬咬方虎骨石灰上二味以臘月豬脂和作餅子曝乾搗末以敷之良治瘋犬齧人方出千金方用取灶中熱灰以摻瘡中帛裹系之又方出千金方用燒自死蛇一枚令焦為末納瘡孔中又方出千金方用鼠屎為末以臘月豬膏敷之用鼠一枚豬膏煎敷之又方出千金方用飲生薑汁一升一方用白姜炙尉之良韭汁亦佳治狂犬咬出本草用葈耳葉煮服之又方出千金方用燒犬尾為末敷瘡日三又方出千金方用頭垢少少納瘡中以熱牛糞塗之佳又方出千金方用苦酒和灰塗瘡中治小兒狗齧方出千金方用月一日以水一升灌之勿令狗主打狗若月盡日三升水灌之治猘犬毒方出千金方用搗韭絞取汁飲一升日三瘡愈止愈後復發者用韭根故梳二枚用水二升煮一升頓服又方出千金方用刮虎牙若骨為末酒服方寸匕刮狼牙或虎骨末服已發狂如猘犬者服即愈又方出千金方用燒虎骨敷瘡及尉之又微熬杏仁搗研取汁服之良又取燈盞殘油灌瘡口此皆禁酒豬肉魚生菜又方出千金方用桃東南枝白皮一握水二升煮取一升分二服吐出犬子又方出千金方用服莨菪子七枚日一度以水服之瘥止又取其猘狗腦上毛燒灰敷瘡上不發一方用莨菪爛搗和塗敷之又方出千金方用梅子末酒服之又方出千金方用豆醬渣塗之日三四瘥治狂犬齧人方出千金方用蛇脯一枚炙去頭搗末服五分匕日三又方出千金方用青布浸汁服三升又方出千金方用飲驢尿一二升治瘋狗傷出濟生拔粹方用口含漿水洗淨以乾薑末塗貼又方出濟生拔粹方用吮去血漿水洗畢紙上炒黃丹赤色貼之蟾蜍灰散出肘後方治狂犬咬人重發者用蟾蜍三個燒灰搗羅為末每服二錢溫水調下服時不得令人知一方焙乾敷之又剝作鱠吞蒜齏下治猘犬咬人毒氣攻心悶亂方用蝦蟆一枚燒灰細研為末以粥飲調服之即愈一方蝦蟆作膾而愈一方用砂糖同搗汁服沈約宋書曰張牧嘗為猘犬所傷醫云宜食蝦蟆膾牧甚難之醫含笑先嘗牧因此乃食瘡亦即愈治猘犬齧重發及犬咬人出聖惠方用乾薑搗為細末每服二錢以溫水調下不拘時候一方用末敷瘡口立瘥治犬咬成瘡漏方出聖惠方用石灰細研為末以醋和塗瘡上治犬咬方出聖惠方用取地龍爛搗封咬處當有毛出或收得乾者搗末用油調封之又方出聖惠方用乾葛燒灰細研為末以醋調塗之治狗咬用杏仁研細先切蔥湯洗然後塗傷處一方用馬蘭根研細塗之一方搗杏仁敷之服汁亦佳熟成膏令黑敷亦可又方出危氏方用萆麻子五十粒去殼井水研成膏先以鹽水洗咬處次以此膏敷貼或用虎骨末及虎骨一方無骨末莽草散出危氏方治狗咬涎入瘡令人昏悶用浸椒水調莽草末塗之又方出存仁方治虎犬咬人用白礬為末摻瘡內裹之亦效止痛立愈治犬咬凍瘡出危氏方並以秫米嚼敷治狂犬咬人出聖惠方用蚯蚓屎和鹽研封狂犬傷毒處出犬毛神效一方井口蚯蚓糞濕敷瘡上以物包定即瘥治療猘犬咬人出醫方集成用仍殺所咬犬取腦敷之後不復發治猘犬咬人出千金方搗地榆絞汁塗瘡無生者可取乾者以水煮汁飲之亦可末之服方寸匕日三兼敷之過百日止解狗毒杏仁礬石韭根人屎各等分上研細爛敷毒處治犬咬人重發用服蔓荊汁佳一方地榆為末敷咬處立瘥治狗咬傷用鍋墨為末桐油調塗又方用嚼杏仁沃咬破處以帛系定一方以人屎汁敷尤良治癩狗傷用真茶末桐油濃調塗傷處治癲狗咬人用清油泥於破處搓成條掐斷看油泥內直至無狗毛為度如有毛更搓然後用水調嫩米糠為膏貼之此一方賀都目傳清油泥俗云油屎治癲狗咬人出經驗良方用斑蝥七個去翅足為末夏間豆豉四十九粒去皮滴水研為膏入和斑蝥末為丸如梧桐子大盡數服白熟水下卻將穢桶盛水令病人尿小便於內停半日見小便桶內水中氣凝結如狗形則愈如不下再令服至七次始全獲安清油散出經效良方治癲狗咬人用生麻油滴豉為膏彈子大常常拭揩所咬瘡口分開豉彈見有狗毛茸茸此毒出即安無茸毛為度日間常行食用加杏仁食之尤妙又方出經驗良方凡被癩癲狗咬不可便用水洗及飯搽可用草藥名鐵薄荷又名接骨草用葉並根梗以水洗去土擂爛敷傷處用絹帛包定無令著水神效其草如菊花葉兩葉相對到秋有青花與小蓼花相似治瘋癲狗咬人出經效良方用前方須要服藥後方可常食杏仁逐其毒又方出德生堂方用斑蝥七個去頭足翅研為細末溫酒調服其毒亦從小便中出膏膜形如狗狀如小便雖出不見狗形須要服七次方可如大小便俱澀不下卻用火麻燒灰存性同沒藥末茶各少許用溫湯調服引導其毒即下又方出經驗良方當時被咬如藥不便即用生蔥連白不以多少擂爛先塗咬傷處然後服前藥虎骨酒治犬咬有一人被咬以蚯蚓屎黃泥各少許入些虎骨同調敷瘡口上一服便愈嘗有驗治狗咬著破傷風欲死者用遍白狗糞燒灰溫酒下神效紫荊皮散治狂犬傷人先以杏仁搗爛焙去毒以紫荊皮煎水又以砂糖調紫荊皮末塗治瘋狗咬用路廁架上干屎刮下用帶皮柳木槌熟搗成膏攤紙上貼傷處睡去睡覺則汗出而愈永不再發不思口治猘犬咬人出肘後方用搗乾地黃汁飲之並塗瘡口上百度止立效散治瘋狗咬傷用餓老鷹膽一個溫酒調下或四十日百日不可者不過三服愈治癲犬所傷出醫方集成用斑蝥大者二十一隻去頭翅並足用糯米一勺先將斑蝥七枚入米內於微火上炒不令米赤去此斑蝥別入七隻再於前米內炒令斑蝥色變復去之又別用七隻如前法炒以米出青煙為度去斑蝥不用以米研為粉用冷水入清油少許空心調服須又再進一服以小便利下惡毒為度如不利再進一服利後肚腹疼痛急用冷水調青靛服之以解其毒否則有傷或煎黃連水亦可不宜便食熱物治猘狗咬用葛根末塗之並飲其汁良髑骨散出肘後方治狂犬咬人及諸犬咬瘡不瘥吐白沫者為毒攻入心令人煩亂喚叫作犬聲者方用骷髏骨燒灰末以東流水和服方寸匕以活止凡狂犬咋人七日輒應一發過三七日不發則免也要過百日乃為大免每至七日輒當搗薤一作韭汁飲二三升又當終身禁食犬肉蠶蛹若食此發則不可救之瘡未瘥之間亦忌食生物諸肥膩肉及諸冷食但於飯下蒸生魚及就膩器中食便發不宜飲酒能過一年乃佳杏仁膏治狂犬咬人凡被狂犬咬人即急嗍去血急吐之勿錯咽之然後搗杏仁和大蟲牙捻作餅子貼瘡上頓灸二七壯從此以後每日灸一兩壯貼杏仁餅子灸之須要滿百日乃止百日內必莫使瘡瘥如無大蟲牙可單用杏仁亦可狂犬咬人每至七日即合一發但至七日即須搗韭汁服一大合日再服之縱非至七日但一日兩日服一兩合大妙如冬月無可取韭根搗汁服之又三兩日取杏仁一合搗碎熟研濾取汁和大蟲牙齒骨亦可用熟煎取一大升汁又燒竹瀝一合以和杏仁酪汁更煎一兩沸分三服一日便盡又取所咬犬腦以塗瘡大佳取大蟲牙齒末或大蟲脂塗之更佳須忌酒治救急療狂犬齧人無問深淺者方初被咬便以冷水洗令血斷封裹著如其瘡大及深宜放流水中浸之血斷依法封裹更不用余裹忌風千萬可畏凡初被咬即覓一切物與吃後不發也治瘋狗咬出瑞竹堂方用桃核殼半個將野人肝即人之大糞也填滿以榆皮蓋定掩於傷處用艾於桃核上灸二七十四炷即愈永不發作治瘋犬傷用白糞蟲去肚中黑研之一二碗頭頂上有赤發先拔去後敷藥干即易之治療猘犬咬人方出千金方用火炙蠟以灌瘡中一方挼蓼以敷瘡上又方用白芷末湯茶調服永不發又方用槐皮並葉敷之又方用枇杷葉以臘酒一瓶新開傾出酒令乾將枇杷葉火上燒過作黑色搽入瓶中用紙密蓋一碗飯時取出葉灰研為細末糝於破傷處隨即痛定痊可絶妙皂角散治療猘犬咬人方用淨水洗口以獨蒜切片子安在口上卻用蔥鹽全蠍皂角四味同擂細安在上用艾灸黃水出為度治狗咬傷方用磚青和牛糞敷之治狂犬咬出肘後方以犬腎心搗敷咬處治狂犬咬寒熱欲發者刺熱人血飲之治狂犬毒入心悶絶不識人方出聖惠方用取黑豆煮汁服之甚良治犬咬方出千金方用熱牛糞塗之咬處佳如無濕糞以干糞為末小油調塗立效瘋狗亦無害治狂犬齧人出聖惠方用干蛇一條酒浸炙令黃色又搗為末水調二錢日四五服治犬咬人傷處毒痛心悶方出聖惠方用火炙瘡中毒上以搗韭汁飲三合日四五服瘡瘥即止治犬傷出十便良方用鼠糞為末用冷井水洗瘡淨干別用津調塗紙壓之帛子縛之若濕乾摻治犬傷出聖惠方麝香沉香防風各等分上為末以生杏仁研酒下治犬傷細研鼠糞以生油膩調塗立效治狂犬咬人取鼠屎二升燒末研敷瘡上治狂犬咬發狂欲死以蟾蜍作鱠食之頻食數頓治狗咬瘡用見腫消生苗葉爛搗貼瘡治狗咬破傷風人參不計多少桑柴火上燒令煙絶用盞子合研為末摻在瘡上立效治狗咬用山豆根水研敷之若猘犬咬以水調服二錢治狂犬咬取百家箸煎汁飲之一方就人家乞取煎汁服之療狂狗咬人欲發者及蛇蠍惡蟲等毒藥毒以韭葉及根生搗絞汁服治狂犬毒以紫珠煮汁服之治犬咬瘡用屋漏水即以水洗屋檐承取用洗之又以水滴檐下令土溫取土以敷犬咬處瘡上治猘犬咬人出肘後方用床四角下土和成泥敷瘡上灸之一七壯在瘡中得犬毛者愈猘犬狂犬也療猘犬咬人出肘後方用地榆根末服方寸匕日一二服搗敷瘡上更佳治狗咬瘡上以竹籃耳燒灰敷狗咬處良治狂犬傷毒以白頸蚯蚓屎封之出犬毛神驗治犬咬上用黃荊葉搗急罨瘡口即安治狂犬咬人取桃白皮一握水三升煎取一升服桃白皮味苦辛平諸蟲傷附論凡諸蟲齧所傷其類不一然毒入皮膚非元氣正法不能移變故上古有移情變氣祝由之法今雖具存而逐惡去毒之劑亦不可廢也凡有一切毒螫之物必不得起噁心向之亦不得殺之若輒殺之於後必遭螫毒治亦難瘥慎之慎之方如聖散出宣明論治蛇蠍諸蟲毒傷川烏防風去蘆白芷各二兩川芎一兩二錢半草烏頭半兩蒼朮二兩去皮細辛去苗土淨七錢半上件俱不見火生用曬乾研為細末敷之如神又蛇蠍螫狗咬用口含漿水洗淨用藥末貼上三二次勤敷即愈諸小蟲血傷無口者唾津調藥搽上勤易三五次即愈麝香雄黃散出百一選方治二十七般惡蟲咬傷人及瘡腫者麝香雄黃乳香硼砂各二錢土蜂窩露蜂窩燒灰各一錢上研為末以醋調少許塗咬著處或不辨認得多疑是惡瘡三五日不療即毒入心難瘥忌雞魚膩物一方有白礬卻無乳香聖核子出濟生拔粹治蛇咬蠍螫雄黃三錢砒霜一錢皂角子巴豆各四十九個耳塞麝香少許用五月五日不聞雞犬婦人處不語搗為細末在杏子內封之針挑出為用止痛大有神效雄黃丸治百蟲齧毒氣內攻雄黃研硃砂研各半兩藜蘆去苗微炒巴豆去皮心研去油鬼臼去須三味各一分上研為末煉蜜和丸如大豆大每服三丸空腹煎乾薑湯下當轉出惡並蟲等當煩悶後以鴨為羹食之辰砂丸治百蟲齧沙蝨蛇蠍蟲毒辰砂雄黃研水飛赤足蜈蚣續隨子各一兩麝香一分上搗研為末粟米糊為丸如緑豆大每服一丸冷水下良久身上毛旋起處即是毒所傷卻用水調一丸於毛旋起處繞圍四畔其蝨自爆出雄黃散出千金方治入山草闢衆蛇治蛇傷蜈蚣蠍螫諸毒蟲咬乾薑麝香雄黃各等分上為粗散以絳袋盛帶之男左女右蛇毒塗瘡以無麝香以射罔和帶之以蜜為膏敷螫處良一方研為細末用津唾點時摻患處痛即止麝香雄黃散出經效濟世方治百蟲所傷雄黃硼砂白礬並研土蜂房炙各半兩麝香一錢上為末用醋調敷咬處日一二服甜葶藶散出聖惠方治蠶咬方甜葶藶蛇床子菟絲子鹽各一兩上搗細為散以釅醋調和如膏日三度塗之一方加麝香阿魏丸出聖惠方治闢蚊蟲及諸蟲等方臭樗皮鰻鱺魚阿魏芫花以上各半兩上為末用乳香煎汁和丸如雞頭米大燒之是蟲皆去地膽散治一切蟲齧地膽曝乾地錦各等分曝上為散每用一錢盞內用醋調卻用盞一隻合定慢火熬熱塗齧處如已齧得三兩日即先以牡蠣末一錢新汲水調下然後塗此藥藍汁膏治蟲螫傷案此方缺藥味製法及服法雄麝散治一切蟲豸蜘蛛等毒上用藍汁入雄黃麝香和塗之能化蟲為水蚌粉散治天蛇毒方上以蚌粉滑石貝母為末敷之水銀膏治惡蛇咬傷已紅腫爛者乾薑水銀豬脂臘月者各等分上揉令相得即置丸向碗中燒以竹筒籠上熏所腫處未熏先破兩處然後熏即瘥苦楝散治闢蚊蟲及諸蟲等方苦楝花柏子菖蒲各一兩上為散慢火燒聞氣自去矣硼砂散治守宮齧雄黃硼砂一分上細研為散以少許敷之雄黃散治毒蟻螫人雄黃一錢麝香半錢研細上研勻以生麻油敷之立勝散治蟲蛇蜂蠍蚖蛇蜘蛛沙蟲等傷毒大紅川椒去核十五枚豆豉十粒上同入口嚼爛唾在手心次用南星末調和得所敷傷處毒水自出續又再敷神效豆豉湯治春夏月樹木牆間有一等雜色毛蟲極毒凡人觸著者則放小毛入手足上自皮至肉自肉入骨其初則皮肉微癢以漸生痛經十數日癢在外而痛在內用手抓搔或痛或癢必致骨肉皆爛有性命之憂此名中射諸藥不能治之用好豆豉約一碗清油半盞拌豉搗爛厚敷痛上並癢處經一時久豉氣透骨則引出蟲毛紛紛可見取下豉埋在土中煎香白芷湯洗痛處如肉已爛用海螵蛸為末敷之愈海螵蛸即烏賊魚之骨也麝香敷方治一切蟲齧痛上用麝香細研一錢封齧處帛縛之一方蠶咬鼠咬用麝香細研蜜封塗之瘥用津調亦得治百蟲齧毒攻成瘡痛塗方用犀角一片以井花水磨取濃汁塗瘡上治五毒蟲螫赤腫不止馬齒莧敷方並蛇咬用馬齒莧葉洗切爛研厚敷之一方貼之亦可治一切蟲齧痛膩粉敷方用膩粉一分用生薑自然汁調敷之治麻心方並治守宮齧用青麻葉心七枚以手挼碎取汁塗之治蛇蟲咬用豬牙中垢塗齧處頓易治蚰蜒清明前一日取馬蘭正日五更煎湯灑諸處治天蛇螫毒舉身潰爛號呼欲絶者用秦皮煮汁一斗許恣意飲之初日減半及三日頓愈不知天蛇為何物或云草間黃花蜘蛛是也人遭其毒仍為露水所濡乃成此疾沈存中筆談載之甚詳一方秦皮濃煎服後用蚌粉滑石貝母末敷之昔太子中允關杞曾提舉廣南西路常平倉行部邑管一吏為蟲毒傷舉身潰爛有一醫言能治使醫視之曰此天蛇所螫疾已深不可為也乃以藥敷之其瘡有腫起以鉗拔之有物如蛇凡取十餘條而疾不起又錢塘西溪常有一田家忽病癩通身潰爛號呼欲絶西溪寺僧識之曰此天蛇毒爾非癩疾也取秦皮加上服之而愈治壁鏡咬用桑柴灰汁三度沸取汁調白礬末為膏塗瘡口兼治蛇之毒治羊辣子湯用蠶繭拶之立愈治蠶咬用苧汁塗之令苧近蠶不生也治闢蚊蟲及諸蟲等方用鰻鱺魚乾者於室中燒之即蚊子化為水矣治蚯蚓咬用濃鹽湯浸身數遍瘥浙西軍將張韶為此蟲所咬其形如大風眉鬢皆落每夕蚯蚓鳴於體有僧教以此方愈一方以石灰水浸身亦效治螻蛄咬用槲葉燒灰細研以泔別浸槲葉取洗瘡拭之納少許灰於瘡中治蛇蟲蜈蚣咬用家桑葉蒸後罨鹽挼敷瘡上葉未開枝可作煎酒又治一切風家桑葉暖無毒利五臟通關節下氣煎服除風痛出汗並撲損瘀血並治人治桑蠍咬人用丁香末蜜調塗之治蜂蠍螫人方用人參嚼封之治入山草闢衆蛇傷蜈蚣蠍螫諸毒蟲咬用常燒羚羊角使煙出蛇則去矣一方用羖角治蜘蛛咬蟲蠶咬蠼螋溺瘡用豬膏莓搗汁敷之豬膏莓似荏葉有毛治螻蛄咬蚯蚓咬其形如大風眉須落用石灰醋和塗之治惡蟲咬用酥和鹽敷之治蛇蟲傷惡瘡疥溪毒沙蝨用葫搗貼之熟醋浸之經年長者良治蟲咬用荏葉搗敷治蚰蜒蜘蛛蟻子咬用油麻研塗敷瘡瘥治諸蛇虺蠍惡蟲毒用韭根葉搗汁服之治蟲咬人用紫草塗之一方用紫草油塗之治蛐蟺咬人方及中蜈蚣毒者用雞屎敷之治蚯蚓咬痛用鴨屎敷之人屎亦可拓又以蔥白敷之治毒蛇並射工沙蝨等傷眼黑口噤手足強有毒攻腹內成塊逡巡不救宜用此方用蒼耳嫩葉一握研取汁溫酒和灌之將渣厚罨所傷處一方蒼耳敷之亦妙治蛇咬蜘蛛毒用雞卵輕敲一小孔合咬處立瘥一方取白塗四畔瘡即愈治闢蟲法用薺花置席下闢蟲治諸蟲毒用嚼青蒿葉搽之治壁鏡咬毒人必死方用醋磨大黃塗之治惡蠔螫人已紅腫者用楝木根並皮切一升以水三升和煎取二升適寒溫浸洗瘡冷即易再三瘥治惡蠔螫人紅腫爛者用胡蔥於煻火中煨令軟即出以紙隔手挼令破以棍瘡上以痛定為度李饒州多用神效治諸蛇虺蠍惡蟲毒用令煙燻瘡口令煙入瘡中佳治蛇蟲咬及疥癬惡瘡用天南星入藥炮為末用醋調敷之治蛇蟲傷用蔥莖葉搗之內加鹽少許同搗治蛇虺螫人用射罔塗螫處頻易塗腫上血出即愈治蛇蠍蜈蚣等傷用生鐵石上水磨汁塗之治蛐蚓吹用老茶研末調塗之立愈治壁鏡咬人立死方用檳榔不拘多少燒灰存性先以醋淋洗後以醋調貼之治諸蛇犬咬皆可治用黃花草為末敷傷處治蜈蚣蠍方用枯白礬不拘多少如傷左點左眼右點右眼治蚰蜒咬用木鱉子末醋調塗之治惡蟲咬出聖惠方用馬腸根生油磨塗之治百蟲所傷出衛生家寶方雄黃一兩白礬飛過硼砂一分麝香一錢露房蜂窠一分燒灰存性土蜂窠半兩生研烏梅肉半兩焙乾上一處研極細先用針挑開瘡口用醋並藥少許搽之次用醋打麵糊攤花子蓋之病小一服病大日一換治山源深遠處沙蝨土虺蛇纏丹毒傷人纍經神驗方烏賊魚骨膽礬赤足全腳大蜈蚣上三味等分細研為末如有患者速於元發端處以針挑破用闢蜈蚣闢蝨蠍蚊蟲使聞之不敢近出衛生家寶方雄黃五錢砒霜五錢柏子青練子各一升菖蒲四兩上為粗末次入雄黃砒霜同研勻每用三錢以紙裹藥燈上點於房中熏又方治壁鏡毒人必死方上溶化白蠟乘熱滴傷處痛止毒出杏黃膏出百一選方治蛇蟲所傷皆可治上以杏核七七個每磨開一竅去仁研真雄黃末填其中次以蠟封之共置一瓦合內合口更須固濟窖於向北靜處檐下七七日取出要用則捶開一核以津液調雄黃敷咬處當不移時毒氣盡作黃水消去此藥重午日合吳茱萸散治蛇蠍螫人上用乾薑嚼敷瘡上不過三四瘥又煮吳茱萸湯以漬瘡上瘥治蛇蟲咬傷先用帛片縛住兩頭免毒氣行急用手按搓去毒氣用蒼鵝糞同新水擂爛罨傷處四圍又方用黃泥調新冷水搽傷處見清水出乃止便用野決明菜搗爛酒浸濾去渣服留渣罨傷以絹帛片裹之又方名纏蛇丹凡為蛇傷蜂蠆蜈蚣毒蟲癲犬所傷皆可用雄黃為末水調塗兼用井花水及酒調吃甚效治蛇毒蠍螫咬出朱氏集驗方用醋磨雄黃塗之治蛇蟲所傷羚羊北人多食南人食之免為蛇蟲所傷和五味子炒之投酒中經宿飲之又治筋骨急強中風治蛇蟲咬出聖惠方用烏蘞莓五葉或生人家牆間搗敷瘡腫蛇蟲咬處治蛇蟲咬用茨菰葉研敷之一方用根搗爛敷治諸蟲蛇傷用菩薩草搗絞飲汁及研敷之治蛇咬瘡蜈蚣所傷出聖惠方用桑樹白皮汁敷之瘥治蛇蟲咬及蛇虺螫人用扁豆葉搗爛敷之一方用白扁豆搗汁敷之治蚖蛇惡蟲毒並疥癬癰腫瘰癧已前入腹用鹽水酒服之著瘡不爾磨敷之治蚯蚓毒腹大夜聞蚯蚓鳴於身者以鹽水浸之昔崇寧隴州兵士暑月在倅廳前跣立為蚯蚓所中遂不救數日又有被其毒教以先飲鹽湯一杯次以鹽湯洗足乃愈治蟲毒螫咬用合子草搗敷瘡上治蠶咬取大蝦蟆脊背上白汁和蟻子灰塗之治蛇蟲傷犬咬以榖樹汁敷之治蟲蛇犬等咬傷以千里及搗敷咬處治蛇蟲蜘蛛蠶咬毒入肉者以癗桐葉搗封傷又皮為末服之治蜘蛛蛇蠍毒以小薊搗絞取汁服之佳治惡蟲咬作瘡者取陽烏鸛嘴燒為末酒下服之陽烏鸛亦名陽鴉出建州治諸蟲咬用土檳榔細研油塗之階除間蟾蜍尿也治蟲蠶蛇犬咬用五毒草根醋摩敷瘡上亦搗莖葉敷之恐毒入腹亦煮服之治蛇蠍蟲咬等毒取千金䥶草搗敷瘡上生肌止痛治蜂及蜈蚣螫人取蜘蛛置肉上則能吸毒治蟲蠶蜘蛛等咬用灰藋搗碎和油敷之治蛇及蜘蛛咬用鬼叉草杵碎敷之亦杵絞汁服之治蛇犬溪等毒以風延莓煮服之治蠶有諸蟲如蠶類咬人恐毒入腹用蠶繭草煮服之生搗敷瘡亦效治蚖蛇惡蟲毒疥癬癰腫瘰癧用戎鹽水酒服之著瘡不爾磨敷治惡蟲蛇螫毒用地菘挼以敷之治蛇蟲咬用蛇莓搗敷之治蟲咬取百舌鳥巢及糞塗蟲咬處百舌鳥炙食之亦良治蟲毒以人肝藤生研服治雜蟲咬以蟾蜍糞敷之治溪毒及遊蟲用溪狗燒末服一二錢瘥治蟲蠶咬以百部根火炙浸酒空腹飲之治蛇蜂叮毒用糟敷之治惡蟲咬人入腹及咬人生瘡者取赤龍浴水服之此澤間水泉赤蛇在中者經雨取之治蝸牛蟲所毒遍身者以蓼子煮汁浸之立瘥治蟲刺螫人方用好豆豉心以足為限但覺刺即熟嚼以敷之少頃見豉中毛即瘥不見又嚼敷之晝夜勿絶見毛為度治蟲咬毒用烏雌雞糞炒服之治鼠咬人以麝香封上用帛子系之治蛇蟲沙蝨瘡用小蒜敷之治蛇虺蟲蠶狂犬等毒以紫荊木煮汁服之治狐尿刺人腫痛用熱蠟著瘡中又燒煙燻之令汁出即便愈治狐尿刺螫痛用杏仁細研一兩沸乘熱以浸螫處數易之治蛇蟲毒以蒼鵝糞敷之及舍中養能闢蛇蟲
