前子人參茯苓各一兩羌活防風各二兩上為末以水一盞散一錢煎至五分食前去滓溫服還睛散出龍木論治青風內障人參車前子地骨皮茯苓各二兩細辛防風芎藭羌活各三兩上為末以水一盞散每服一錢煎至五分食後去滓溫服補肝散出龍木論治肝風目暗內障羚羊角防風各二兩羌活車前子人參茯苓細辛黑參黃芩各三兩半上為末每服食後米飲調下一錢山藥丸出龍木論治症同前乾山藥乾地黃人參茯苓防風澤瀉各一兩上為末煉蜜為丸如梧桐子大空心茶下十丸補腎丸出龍木論治黑風內障羚羊角飲出龍木論治青風內障白附子散也永類鈐方治發散初起黑花昏蒙內障荊芥穗四兩菊花防風木賊去節各三兩白蒺藜炒去刺一兩粉草炙各一兩蒼朮制人參羌活各半兩上㕮咀每三錢煎食後服還睛散出濟生方治散翳內障人參茯苓細辛五味子桔梗各一兩車前子防風各一兩上為末以水一盞散一錢煎至五分夜食後去滓溫服復明散出東垣蘭室方治內障黃耆芩一錢半蒼朮一錢柴胡一錢連翹一錢甘草炙一錢當歸身一錢生地黃一錢橘皮半錢川芎半錢青皮三分上銼如麻豆大都作一服水二大盞煎至一盞去滓稍熱服之食後忌酒醋葷面辛熱大料物之類沖和養胃湯出試效方一名圓明內障升麻湯治內障眼得之脾胃元氣衰弱心火與三焦俱盛因遠出外飲食失節形體勞役心不得休息故生此疾服之神效柴胡七錢羌活一兩半防風半兩炙甘草一兩半當歸酒製白朮升麻各一兩白芍藥各六錢乾薑一錢五味子二錢人參葛根各二兩黃耆一兩半白茯苓三錢上㕮咀每服五六錢水三盞煎至二盞入黃芩黃連各三錢同煎至一盞去滓稍熱食後服瀉熱黃連湯出試效方黃芩酒製炒黃連酒製炒龍膽草酒製生地黃酒製各三兩升麻五分柴胡一兩上㕮咀每服二錢將先煎前藥水內入瀉熱黃連湯再煎至一盞去滓於日午飯間熱服之午後服之則陽道不行臨臥休服反助陰故也益氣聰明湯出試效方治飲食不節勞役形體脾胃不足得內障耳鳴或多年目暗視物不能此藥能令目廣大久服無內外障耳鳴聾之患又令精神過倍元氣自益身輕體健耳目聰明黃耆甘草各半兩芍藥一錢黃柏一錢酒製銼炒黃人參半兩升麻葛根各三錢蔓荊子一錢半上㕮咀每服秤三錢水二盞煎至一盞去滓溫服臨臥近五更再煎服之得腫更妙如煩悶或有熱漸加黃柏春夏加之盛暑夏月倍之若此味多則不效如脾虧胃虛去之有熱者少用之如舊有熱麻木或熱上壅頭目三兩服之後其熱皆除治老人腰以下沉重疼痛如神此藥久服令人上重乃有精神兩足輕浮不知高下若如此空心服之或少加黃柏輕浮自減若治倒睫去黃柏芍藥忌菸火酸物羌活退翳丸出試效方一名地黃丸治內障右眼小眥青白翳大眥微顯白翳腦痛瞳子散大上惡熱大便澀時難小便如常遇天熱暖處頭痛睛脹能食日沒後天陰則昏暗此證亦可服滋陰地黃丸熟地黃八錢防己二錢酒製生地黃酒製當歸身酒製焙黃柏各半兩酒製芍藥一兩三錢川芎三錢知母三錢酒浸丹參半兩茺蔚子半兩羌活三錢牡丹皮三錢寒水石一錢生用柴胡半兩或三錢黑附子一錢炮上為細末煉蜜為丸如小綠豆大空心每服五七十丸白湯送下如消食未盡候飢時服之忌言隨後以食壓之東垣蘭室秘藏方云翳在大眥加葛根升麻翳在小眥加柴胡羌活是也圓明膏出試效方治內障生翳及瞳子散大皆勞心過度因飲食失節之所致也此方收睛圓明柴胡五錢麻黃去節微搗五錢當歸身三錢生地黃半兩黃連五錢甘草二錢訶子皮二錢濕紙裹煨上先以水二碗熬麻黃至一碗掠去沫外六味各㕮咀如豆大篩末秤勻入在內同熬滴入在水中不散去沫入蜜少許再熬煎如常點之蒼朮丸出朱氏集驗方治內障上以蒼朮半斤切作片黑豆一小升用水二碗煮乾焙研為末糊丸每服三十丸空心鹽湯下外障眼附論夫膜入水輪外障此眼初患之時肝臟積熱虛勞多年發歇作時睛上有瘡可後便生障翳漸入水輪因大腸壅滯致使然也此疾宜服退熱飲子鉤割熨烙兼宜補虛鎮心丸即瘥歌曰黑上生瘡可後痕續生胬肉漸相侵時多長覆過痕了因此名侵入水輪雖即三光微可睹烏珠底下碧氛氳庸醫猛浪強鉤割遂使雙眸轉更昏玉翳浮瞞外障此眼初患之時或疼或痛皆是風毒上衝入腦積熱在乎肝膈之上致令眼內有翳如玉色相似遮瞞瞳仁如此疾狀並不宜割熨針烙但只宜服退翳散立效歌曰黑上浮雲如玉色還因瘡可後留痕枉施摩翳膏和散拱手神醫玄妙門服藥去風兼治熱還睛丸散是其因燒香供養依龍樹覓取來時清淨根旋螺尖起外障此眼初患之時忽然疼痛作時由積熱壅毒留在肺間切宜補治恐損眼也宜服搜風湯瀉肝飲子宣腸立效歌曰眼前生翳障成尖起似旋螺挈治難依舊根深將何奈時時疼痛發風癲消磨湯飲勤為服臟肺宣搜疴不還丸散解毒由他用不相應藥定無緣黃液上衝外障此眼初患之時疼痛發歇作時赤澀淚出漸生黃液直覆黑睛難辨人物皆因脾臟風冷胃家極熱切宜鐮鉤熨烙然後宜點曾青膏服通脾瀉胃湯歌曰黑睛從下生黃膜脾胃寒風熱共並疼痛發時多計較門冬犀角便能徵或鐮或點依經法若信邪巫不用爭更過燒炙無效後再來求療為施行赤膜下垂外障此眼初患之時忽然赤澀淚下疼痛癢隱瞳仁黑暗漸生翳障赤膜下垂直覆珠睛有此障蔽如雲霞之色如此病狀切宜鐮洗出血熨烙然後點清涼散服羚羊角飲子即瘥歌曰黑睛從上赤來遮臟腑元因受熱邪客氣交侵肝內壅睛輪被覆似雲霞上瞼還令瘀血盡先宜洗烙漸能瘥消停又點清涼散諸藥臨時漫減加風牽瞼出外障此眼初患之時乍好乍惡發歇無時多因淚出不止蓋因胃氣受風肝膈積熱壅毒在眼眥之間致使眼皮翻出切宜鐮洗散去瘀血熨烙三五度然後服黃耆湯用前摩風膏摩之瞼內塗白蘞膏即瘥歌曰一般風熱入雙眸此疾何緣未易除肝臟毒風翻出瞼腎因傳送入烏珠若是瞼翻還易療毒風入黑即難收銅篦輕熨摩風藥白蘞為膏瞼內塗雞冠蜆肉外障此眼初患之時皆因脾胃積熱肝臟受風漸漸入眼中致生翳膜如雞冠蜆肉或青或赤此疾宜令鉤割鐮洗熨烙然後宜服抽風湯散茺蔚子丸即瘥歌曰輪中生翳似雞冠療者先須翻出看蜆肉或青黑又赤不嫌割烙始能痊要除風熱憑湯散須用曾青點病源若言根本未全愈安心多服決明丸鶻眼凝睛外障此眼初患之時忽然癢痛淚出五輪脹起皆硬難以迴轉難辨人物宜針引血脈以摩風膏摩之此疾皆因五臟熱壅衝上腦中風毒入眼致使然也宜服瀉膈湯抽風散歌曰五輪目硬難迴轉鶻眼凝睛是本形欲識根源何所起腦中風熱臟中蒸先將針引開風壅藥壓塗摩血脈行莫教直須從內泄除嗔戒行即安平瞳仁幹缺外障此眼初患之時忽因疼痛發歇作時難忍夜臥不得睡即瞳仁幹缺或上或下或東或西長不圓正雖辨三光久後必俱損大人多患其瞳仁或白或黑不定白者腦脂下流為患黑者膽氣腎臟俱勞肝風為患宜服瀉膽散鎮肝丸補腎散立效歌曰瞳仁幹缺水全無或黑或白作形膜白即腦脂來閉塞黑色其中本自虛此狀必須疼痛後膽家風熱作勞劬各醫拱手無方救堪嘆長年暗室居轆轤轉關外障此眼初患之時皆因膈中壅毒肝臟熱極風熱入腦致令眼帶吊起瞳睛難以迴轉不辨人物有胎中患者乃不可治也若初患者急須療之宜服天門冬飲子瀉肝散歌曰上瞼藏中下瞼藏還因不肯定中央轉關恰似轆轤轉聖者留言難改張病即雖云醫不得徒教學者認形彰堪嘆永處幽幽地不識青黃坐久長方補腎丸出龍木論治黑翳如珠外障人參茯苓五味子細辛肉桂桔梗各一兩乾山藥柏子仁各二兩半乾地黃一兩半上為末煉蜜為丸如梧桐子大空心茶下十丸茺蔚散出龍木論治冰瑕翳深外障茺蔚子防風各二兩黑參細辛大黃枳殼知母芒硝各一兩芍藥一兩半上為末以水一盞散一錢煎至五分食後去滓溫服人參湯出龍木論治冰瑕翳深外障人參茯苓桔梗五味子大黃車前子黑參各一兩黃芩知母各一兩半上為末以水一盞散一錢煎至五分食後去滓溫服補勞人參丸出龍木論治逆順生翳外障人參乾地黃茯苓桔梗乾山藥防風木香細辛桂心各一兩上為末煉蜜為丸如梧桐子大空心茶下十丸烏犀丸出龍木論治兩瞼黏睛外障兼胬肉烏犀茯苓芍藥細辛黑參人參各一兩乾山藥羌活各二兩上為末煉蜜為丸如梧桐子大空心茶下十丸一方用米飲下曾青膏出龍木論治眼黃液上衝外障曾青秦皮細辛白芷各一兩乳頭香龍腦各一分黃連三分訶子木香各半兩上為末研令勻細以水二碗浸三日後煎至一碗以來綿濾滓後更入蜜四兩同煎為膏盛在瓷瓶中封之勿令泄氣用之點眼立效黃耆湯出龍木論治風牽瞼出外障黃耆茺蔚子各二兩防風一兩半人參茯苓川大黃地骨皮黃芩各一兩甘草半兩上為末以水一盞散一錢煎至五分食後去滓溫服退熱飲子出龍木論治膜入水輪外障黃芩防風茺蔚子桔梗各二兩大黃黑參五味子細辛各一兩上為末以水一盞散一錢煎至五分食後去滓溫服鎮心丸出龍木論治證同前石決明人參茯苓大黃各一兩遠志細辛乾山藥防風各二兩上為末煉蜜和丸如梧桐子大空心茶下十丸搜風湯出龍木論治旋螺尖起外障防風五味子天門冬大黃桔梗各一兩細辛芍藥各一兩半茺蔚子二兩上為末以水一盞散一錢煎至五分食後去滓溫服通脾瀉胃湯出龍木論治眼黃液上衝外障麥門冬茺蔚子各二兩防風黑參大黃知母各一兩天門冬黃芩各一兩半上為末以水一盞散一錢煎至五分食後去滓溫服羚羊角飲子出龍木論治眼赤膜下垂外障羚羊角一兩半茺蔚子黃耆各二兩黃芩天門冬黑參知母桔梗各一兩上為末以水一盞散一錢煎至五分食後去滓溫服大效紫金膏出聖濟總錄治外障退翳膜療氣毒上衝眼疼赤腫或瞼眥癢痛時多熱淚昏澀槐嫩枝芽三十條當仲春採嫩枝子亦好鉛丹細研飛過三分錢黃連緊實者七條各長二寸半輕粉三錢烏賊魚骨去甲為末二錢乳香明淨者秤一錢研細龍腦少許白蜜四兩上先將槐枝並黃連用雪水或井華水一碗半入銀石器內慢火熬及半盞去滓次入乳香又熬之候如茶腳許將蜜別熬去滓放冷入前膏及眾末攪勻再熬候如金漆色瓷器內收之每用少許點眼大妙退翳散出龍木論治翳玉色浮瞞外障石決明車前子大黃黃芩細辛各一兩防風二兩芍藥一兩半上為末以水一盞散一錢煎至五分食後去滓溫服瀉肝飲子出龍木論治旋螺尖起外障大黃車前子細辛芒硝黃芩桔梗知母各一兩上為末以水一鍾散一錢煎至五分食後去滓溫服炙肝散出聖濟總錄治外障赤肉翳膜遮睛不明石決明洗穀精草洗各四兩皂角炙去皮子一分甘草炙銼二兩木賊銼黃芩去黑心各五兩蒼朮米泔浸七日切焙半斤上為散每用獖豬肝一葉去筋膜切數縫摻藥末五錢於縫內仍摻鹽一錢合定用旋斫濕柳枝三四條擱起慢火炙香熟早晨空心冷吃盡續吃冷飯一匙壓之仍於三里穴灸三五七壯後有淚下為驗七日翳膜必退每旦用新水漱口青金丸出聖濟總錄治風毒攻眼成外障翳膜銅青真者蕤仁去皮尖與銅青共浸三宿去水研生犀角淨水研紙上飛過石決明淨水磨瀝乾各一錢龍腦研白丁香水研飛過去滓瀝乾海螵蛸水飛過各半錢上將銅青與蕤仁先研如糊次入白丁香研次入四味研極細用好墨研濃汁於淨器中和熟為丸如綠豆大每用人乳汁化開點眼未用者常以龍腦養於瓷器中清涼煎一名龍腦煎出龍木論治赤膜下垂外障龍腦膩粉馬牙硝秦皮各一兩防風黃連各三分上先將四味為末以水二碗浸藥二日後煎取二大盞濾去滓更煎三五沸納瓷合子內盛之別入龍腦膩粉攪勻用之點眼水照丸一名神仙照水膏出龍木論治眼外障翳黃蠟切片一兩蛇蛻燒灰研一分鉛丹水飛研一兩水銀一分丹砂研少許雞卵殼一枚雛烏雞始生者須要完全去裡面清並膜只用殼研如粉上先將黃蠟溶成汁次投諸藥用柳枝同攪成膏候不見水銀星可丸即丸如豌豆大捏作餅子以丹砂末為衣仍置丹砂末內養之每用一餅臨臥安在眼內至天明開眼遺放水盞內上有翳膜再洗藥以丹砂末為衣過養之其水盞預置於頭畔一方無丹砂石決明散出經驗良方治眼生外障不問男女大人小兒並皆治之石決明火煅薄荷葉各一兩蒺藜子炒去刺秤荊芥穗各二兩人參半兩蜜炙上於地上出火毒研為末食後砂糖冷水調服白蘞膏出龍木論治風牽瞼出外障白蘞白芷白芨各一兩突厥白一兩半上為細末用牛酥五兩煎為膏早晨塗在眼瞼內夜半塗亦得復明膏出儒門事親書治外障白丁香臘月收者尤佳八錢水飛過揀黃連一兩防風去蘆銼一指許新柳板方一寸者三片上以新水一升半雪水尤妙春秋兩三時冬月一宿入藥於銀石器內熬至六分去滓另用蜜一斤密陀僧研末三錢入蜜攪勻另熬以無漆匙撩點下蜜中急攪候沸湯定一人攪蜜一人旋又攪藥汁都下在內攪勻再熬三兩沸色稍變用新綿三兩濾去滓盛器中點眼如常一方云每藥半合用片腦一麥粒大不用亦可睛明散一名金蓮子散出龍木論治外障退翳膜風毒上攻眼疼赤腫瞼眥癢爛時多熱淚豬膽方出龍木論治外障眼以豬膽一枚用銀銚或瓷銚煎成膏入冰腦粒如黍米大點入眼中覺翳輕又將豬膽白膜皮陰乾合作小繩如釵股大小只用一頭燒灰待冷點翳數日後翳退雙目如舊此治翳重者尤良不過三五度瘥羚羊角飲子出龍木論治黑翳如珠外障羚羊角五味子細辛大黃知母芒硝各一兩防風二兩上為末以水一盞散一錢煎至五分去滓食後溫服細辛散出龍木論治因他患後生翳外障細辛茺蔚子各二兩黑參黃芩桔梗大黃各一兩車前子一兩半上為末以水一盞散一錢煎至五分去滓食後溫服知母飲子出龍木論治逆順生翳外障知母茺蔚子車前子各二兩桔梗大黃五味子黃芩各一兩上為末以水一盞散一錢煎至五分去滓食後溫服排風散出龍木論治兩瞼黏睛外障天麻桔梗防風各二兩五味子烏蛇細辛芍藥乾蠍各一兩上為末食後空心米飲調下一錢抽風散出龍木論治雞冠蜆肉外障防風二兩大黃桔梗細辛各一兩黃芩黑參芒硝車前子各一兩半上為末以水一盞散一錢煎至五分食後去滓溫服茺蔚子丸出龍木論治證同煎茺蔚子人參乾山藥各三兩茯苓大黃黃芩黑參石決明各一兩乾地黃一兩半上為末煉蜜為丸如梧桐子大空心茶下十丸摩風膏出龍木論治鶻眼凝睛外障黃耆細辛當歸杏仁各一兩防風松脂黃蠟各二兩白芷一兩半小麻油四兩半上為末煎成膏塗之抽風散出龍木論治證同前石決明車前子茯苓五味子各一兩人參細辛知母各一兩半上為末食後米飲調下一錢瀉膈湯出龍木論治證同前防風大黃茺蔚子黃芩黑參桔梗芒硝各一兩上為末以水一盞散一錢煎至五分食後去滓溫服瀉膽散出龍木論治瞳仁幹缺外障茺蔚子黃耆各一兩半麥門冬地骨皮黑參黃芩知母各一兩上為細末以水一盞散一錢煎至五分去滓食後溫服鎮肝丸出龍木論治證同前乾山藥二兩人參茯苓車前子石決明五味子細辛各一兩半上為末煉蜜丸如梧桐子大空心茶下十丸補腎散出龍木論治證同前澤瀉二兩乾地黃人參各一兩半茯苓乾山藥菖蒲各一兩上為末每服一錢每日空心米飲調下天門冬飲子出龍木論治轆轤轉關外障天門冬茺蔚子知母各二兩五味子防風各一兩人參茯苓羌活各一兩半上為末以水一盞散一錢煎至五分食後去滓溫服麥門冬湯出龍木論一名瀉肝散治證同前透明丸治外障熱腫臟腑實熱不通苦參四兩黃柏二兩去皮寒水石二兩芎藭一兩洗升麻一兩山梔子仁一兩上為末麵糊為丸青黛為衣麥門冬湯下食後硃砂煎治外障頑翳赤脈明硃砂細研水飛硼砂蕤仁去內外心海螵蛸去殼腦子上研令極細如粉更加入麝香少許同研乾點障白厚重者加馬牙硝少許同研將變內障眼附論夫眼疾始於淺浮久而弗圖變為內障者非一端也龍木論內障皆有其漸蓋從一眼先患後乃相牽俱損是肝腎氣虛風邪熱毒上攻眼目氣血衰微久則為害但不疼不痛久無眵淚目視如輕煙或如薄霧或見垂絲或見蠅翅或見蚊飛其初若無足慮及其成是障則慢不知省今以將變內障者敘之蓋圖難於易之意也龍木論云五風變內障此眼初患之時頭旋偏痛亦是臟腑虛勞肝風為本或因一眼先患或因嘔吐雙暗毒風入眼兼腦熱相侵致令眼目失明初覺即須急藥宜服除風湯通明丸補腎丸即效歌曰烏絲青風及黑黃甚嗟宿世有災殃後有腦脂流結白真如肉色又如霜醫人不識將針撥翳障不明卻自傷雷頭風變內障此眼初患之時頭面多受熱毒風沖頭旋由如熱病相似俗號為雷頭風或嘔逆噁心年多衝入眼內致令失明或從一眼先患瞳仁或大或小不定後乃相牽俱損眼前昏黑不辨三光初覺有患宜服瀉肝湯磁石丸立效歌曰俗號雷頭熱毒風年多衝入眼睛中瞳仁或大時或小坐對三光黑不紅腦熱流脂來結白醫師不了便針通雖然翳墜依前暗自愧庸醫枉用功方補肝丸治眼昏暗將變成內障杏仁茺蔚子青葙子枸杞子五味子茯苓去皮決明子各一兩乾地黃三兩菟絲子二兩山芋車前子地骨皮焙柏子仁大黃細辛去苗葉甘草炙銼人參黃芩去黑心黃連去皮防風去叉各一兩半上為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨臥時再服加至三十丸秦皮散治眼昏暈不以年月深淺恐變為內障秦皮去粗皮菥蓂子車前子大藍實防風去叉決明子炒各二兩瞿麥穗升麻枳殼去瓤麩炒黃連去須前胡去蘆頭梔子仁各一兩半黃柏去粗皮炙羚羊角鎊莧實各一兩上為散每服三錢溫漿水湯調下食後臨臥服空青丸治眼目昏暗漸變內障空青半兩別研飛過茺蔚子五味子炒細辛去苗葉蔓荊實柏子仁別研蒺藜子去角炒枸杞子人參去蘆頭石龍苗防風去叉各一兩決明子炒菟絲子酒浸別搗為末各二兩上為細末入空青研勻煉蜜和丸如梧桐子大食後以竹葉湯下每服三十丸日三菊花丸治眼昏暗漸成內障菊花二兩黃連去須槐子各一兩半車前子茺蔚子青葙子地膚子決明子微炒菥菟子苦參防風去叉黃芩去黑心蕤仁各一兩上為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨臥再服黃耆丸治肝虛勞兼及膀胱久積虛冷目眩見花不明漸成內障黃耆銼白茯苓去黑皮石斛去根各二兩鹿茸去毛酥炙一兩半五味子炒二兩防風去叉生乾地黃焙牡丹皮酸棗仁覆盆子各三兩上為末煉蜜和丸如梧桐子大每服二十丸空心酒下漸加至三十丸瀉肝湯治雷頭風變內障防風茺蔚子各二兩五味子細辛黃芩桔梗大黃芒硝各一兩車前子一兩半上為末以水一盞散一錢煎至五分食後去滓溫服除風湯治五風變內障羚羊角車前子各二兩芍藥人參茯苓大黃黃芩芒硝各一兩上為末以水一盞散一錢煎至五分食後去滓溫服通明補腎丸治證同前車前子石決明桔梗芍藥各一兩細辛一兩大黃一分茺蔚子生乾地黃各二兩上為末煉蜜為丸如梧桐子大空心茶下十丸石決明丸治眼昏暗漸成內障石決明槐子熟乾地黃各一兩陽起石一兩酒煮半月研極細水飛過磁石一兩半燒醋淬七遍細研水飛過菟絲子一兩酒浸三日曝乾別研桂心半兩肉蓯蓉一兩酒浸一宿刮去皮炙乾上為細末煉蜜和搗三二百杵丸如梧桐子大食後鹽湯下二十丸漸加至三十丸補腎丸治目暗浮花恐變成黑風內障澤瀉去苗葉細辛去苗葉各一兩五味子炒一兩熟乾地黃焙茺蔚子各二兩山芋一兩半一作乾山藥菟絲子酒浸焙乾別搗一兩上除菟絲子別搗外搗羅為末再和勻煉蜜和丸如梧桐子大每服二十丸空心鹽湯下磁石丸治雷頭風變內障磁石燒赤醋淬三遍五味子炒牡丹皮乾薑黑參各一兩附子炮裂去皮臍半兩上為末煉蜜為丸如梧桐子大食前茶下十丸羚羊角飲治眼漸暗及睹浮花恐變成青風內障羚羊角鎊地骨皮洗人參羌活去蘆頭玄參車前子各一兩上粗搗篩每服三錢水一盞煎至七分去滓食後臨臥溫服瀉肺飲治肝虛雀目恐變成內障防風去叉黃芩去黑心桔梗銼炒大黃銼炒芍藥各一兩上粗搗篩每服三錢水一盞半煎至一盞入芒硝半錢去滓食後臨臥溫服內障眼針後用藥附論夫胬肉攀睛淫膚垂瞼之類皆為外障審其輕重則有服食點洗之劑鉤割熨烙之法以外去者蓋其勢微淺所以除治在皮膚之表若內障之證則異於是有不癢不痛者虛實皆未定也有冰澀浮沉棗花偃月之翳淺深固不一也亦有清明無翳若未嘗縈疾苦者與未患又相似也是以論內障每重於醫藥必候之歲月其翳成熟乃用針撥或一撥之而愈或再三而愈若披雲霧睹青天白日之快方且封閉綿密以待安寧而又服藥以攻其內所以掃除盪滌絕其本根復其自然而已世之專治者甚多不可勝舉大抵以龍木為師法龍木內障二十有二可以針者一十有二皆言針後用某湯某丸則知內障非針無以取效且治眼至於針誠出於不得已豈輕用妄投耶針法具載別敘今姑以針後用藥次第列之於下方防風湯治內障圓翳針後及澀翳防風去叉茺蔚子五味子知母焙桔梗炒玄參車前子大黃銼炒細辛去苗葉黃芩去黑心各一兩上粗搗篩每服三錢以水一盞煎至六分去滓溫服食後臨臥日二次決明散治內障浮翳或如棗花或若銀釘浮淺透外七寶丸治內障冰翳如冰凍堅結睛上以針撥取之後及散翳石決明搗研二兩人參茺蔚子各一兩琥珀搗研三分龍腦研一分真珠搗研熊膽各半兩上為末煉蜜和丸如梧桐子大每服十五丸食前茶下後漸加至二十丸七寶湯治內障橫翳橫著瞳仁中心起如劍脊針後羚羊角鎊犀角鎊各一兩胡黃連車前子石決明刮洗搗研甘草炙銼各半兩丹砂研一兩上除丹砂決明外搗粗篩每服三錢以水一盞煎至七分去滓入丹砂末半錢決明末一錢再煎兩沸食後去滓溫服人參湯一名還睛湯治內障散翳狀如酥點潰爛以針撥如涎散亂針後又驚振內障眼四膽丸治內障偃月翳如凝脂一邊厚一邊薄狀如偃月針後及內障棗花翳象膽半兩鯉魚膽七枚熊膽一分牛膽半兩麝香研一錢石決明搗研一兩上為末麵糊和丸如梧桐子大每服十丸空心茶清下十丸
