為末巴豆別研蜜和丸如梧桐子大空心酒服二丸未知加至五丸日再服千金翼無柴胡水蛭丹參土瓜根牛膝湯出聖濟總録治婦人逾年月水不通臍下結塊牛膝酒浸切焙牡丹皮芍藥炒當歸切焙柴胡去苗芎藭鱉甲去裙襴醋炙羌活去蘆頭桃仁去皮尖雙仁炒黃陳橘皮湯浸去白焙白薔薇根附子去粗皮半兩炮裂荊三稜一兩半桂去粗皮半兩上㕮咀如麻豆大每服五錢水一盞半煎至七分去滓溫服空心食前當歸散出聖濟總録治婦人寒搏月水不通腹中氣滿結塊寒熱當歸切焙桂去粗皮乾漆搗炒令煙出各一兩虻蟲去翅足炒水蛭糯米同炒米熟去米芍藥細辛去苗葉黃芩去黑心葳蕤甘草各一兩大黃三兩上粗搗篩每服三錢酒一大盞煎至六分去滓下芒硝二錢煬盡再煎令沸溫服活血調經湯出德生堂專治婦人經候閉塞不通漸成癥瘕血塊者本方經驗當歸赤芍藥生地黃川芎生牛膝廣朮炒三稜官桂乾漆銼研酒炒桃仁去皮尖紅花各一兩上㕮咀每服四錢水一盞半酒一小匙同煎至八分去滓空心溫服紫葛丸出聖濟總録治月水不通臍下結塊漸覺羸瘦不能飲食紫葛銼菴䕡子牛膝酒浸切焙各一兩半水蛭十枚熬桃仁去皮尖雙仁四十九枚熬赤芍藥鱉甲去裙襴醋炙各二兩牡丹皮一兩一分瞿麥穗一兩桂去粗皮二兩上為末煉蜜和丸如梧桐子大空心服煎茅根檳榔湯下二十丸日再服漸加至三十丸虎杖湯出聖濟總録治月水不通腹中結塊㽲刺疼痛虎杖木通牛膝酒浸切焙各二兩茅根三兩桃仁去皮尖雙仁炒四十九枚大黃三兩半銼炒芒硝紫葛牡丹去心各一兩半上粗搗篩每服三錢水一盞煎至七分去滓溫服空心食前服琥珀丸治月經閉塞不通腹中成塊水蛭石灰炒虻蟲去翅足糯米炒琥珀半兩芫花醋浸焙乾桃仁浸去皮尖當歸酒浸去蘆桂枝不見火大黃各一兩上為細末大黃醋熬成膏和為丸如梧桐子大每服三十丸空心蘇木酒下牛膝湯出聖濟總録治月水不通血氣澀滯結成堅塊牛膝切焙酒浸虻蟲去翅足炒大黃銼炒黃芩去黑心各半兩水蛭炒土瓜根各一分半桃仁去皮尖雙仁炒一兩朴硝三分上粗搗篩每服三錢水一盞煎至七分去滓溫服空心食前服丹砂丸出聖濟總録治婦人月水不通肢節煩痛寒熱往來腹脅結塊攻刺疼痛日漸羸瘦欲變成癆丹砂研水銀硫黃各二錢二味同結成砂子用硼砂研膩粉各一分雄黃研一字斑蝥二十一枚去翅足麩炒焦為末上再同研勻以狗膽汁和作四十丸每服一丸空心臨臥炒鉛丹少許以酒半盞調勻燒稱錘蘸鉛丹酒微焦黑色熬溫下或産後血露不快腹內疼病皆可服桂枝桃仁湯出大全良方治氣鬱乘血經候頓然不行臍腹㽲痛上攻心脅欲死或因不行結積漸漸成塊臍下如覆杯久成肉症不可復治由驚恐憂思意所不快氣欲抑而不舒則乘於血隨氣行滯則血結以氣為血之先宜服桃仁桂枝湯下産宜服地黃通經丸已成塊者宜服萬病丸桂枝芍藥生地黃各二兩桃仁制五十枚甘草一兩一方不用上為末每服五錢水二盞姜三片棗一個煎一盞去滓溫服一方無薑棗煎地黃通經丸出大全良方治證與前桂枝桃仁湯同熟地黃二兩虻蟲去頭翅足炒水蛭糯米同炒黃去糯米桃仁制各五十個上為末煉蜜丸如梧桐子大每服空心溫酒下五丸塊消為度未知加至七丸又方出聖惠方治月經閉塞不通結瘕腹大如甕短氣欲死虎杖一斤去頭土裹干切土瓜根牛膝各取汁二斗上㕮咀以水一斛浸虎杖根一宿明早煎取二斗納土瓜根牛膝汁攪令調勻煎令如餳每以酒服一合日再夜一宿血當不滯萬病丸出拔粹方治女人月經淤閉月候不來繞臍寒痛及産後血氣不調腹中生瘕結而不散臍下堅結大如杯升發熱往來下痢羸瘦此為血瘕若生肉症證愈加重不可為也及治癥瘕等病室女氣瘕乾漆杵碎炒令大煙出待至烟頭青白如此一時久牛膝去苗酒浸一宿焙各一兩上為末以生地黃汁一升入二味藥末放石器內慢火熬候可丸即丸如梧桐子大每服空心米飲下或溫酒下二丸日再勿妄加病去止藥婦人氣血虛經不行若服破血行經藥是即殺之也謹之治月經不通臍下堅結大如杯升發熱往來下利羸瘦此為氣瘕按之若有牢強肉症者不可治未者可治出千金方生地黃二十斤取汁乾漆一斤為末上以漆末納地黃汁中微火煎令可丸每服酒下如梧桐子大三丸不知加之常以食後服治婦人經候不來數月臍腹疼痛或有一塊上下相疰飲食減少腹滿噁心大便祕澀者宜服此丸用菖蒲馬鞭草煎湯送下四十丸兩服便通治室女月水不通血結成塊多攻心腹疼痛宜服此方質汗薑黃川大黃銼微炒各半兩上為細散每於食前以溫酒調下一錢治婦人血閉腹內血塊用干陀木皮酒煎服之
