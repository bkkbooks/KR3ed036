研以醋三升熬如膏虻蟲去翅足炒黃水蛭炒黃各半兩肉桂去粗皮川大黃生用各三兩桃仁一兩去皮尖雙仁別研生用上為末以琥珀膏和丸如梧桐子大每服空心以溫酒下三十丸一方以釅醋三升熬藥芫青丸治婦人月水不通小腹宿血積滯芫青微炒硼砂水銀以小棗肉研令星盡各一分牛膝去苗藕節桂心各半兩上為末研入加水銀令勻用醋煮麵糊為丸如緑豆大每日空心以溫酒下三丸如小腹澀痛即用滑石梔子等分煎湯服之紫石英散治婦人月水不通三年內者宜服紫石英硃砂各細研水飛過虎杖銼細辛滑石以上各半分斑蝥十枚糯米炒令黃去翅足上為細散都研令勻空心以溫酒調下一錢至巳時小便先澀痛即惡物下如雞肝穿山甲丸治婦人月水不通腹脅疼痛穿山甲沒藥延胡索當歸銼微炒硼砂以上各半兩狗膽二枚乾者上為末以竹筒內盛飯甑中蒸三溜入煉蜜丸如緑豆大每於食前溫下十丸當歸散治血脈不通當歸穿山甲上為細末研勻每服二錢熱酒調下如不飲酒薄荷醋湯亦可地黃丸治血不通生乾地黃二兩柴胡秦艽赤芍藥黃芩各半兩上細末煉蜜丸如梧桐子大每服三十丸烏梅湯調下不拘時候日三昔宋褚澄療師尼寡婦別制方者蓋有謂也此二種鰥居獨陰無陽欲心萌而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞嘗讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱衆醫皆以為寒熱也倉公曰病得之欲男子不可得也何以知欲男子而不得診其脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛則思室婦人血盛則懷胎夫肝藏血故也厥陰肝脈弦出寸口上魚際則陰盛可知矣故知褚澄之言信有謂矣斑蝥散治婦人月水不通時作寒熱食少體瘦斑蝥一分糯米同炒令黃去翅足川大黃三分銼微炒水蛭一分炒令微黃當歸三分銼微炒虻蟲一分炒令黃去翅足上為末散每服於食前以溫酒調下一錢水銀丸治婦人月水不通心腹滯悶四肢疼痛水銀以小棗肉研令星盡半兩硼砂細研半兩硃砂細研半兩巴豆十枚去皮心研紙裹壓去油上都研勻以狗膽汁和丸如梧桐子大每日空心溫酒送下三丸水蛭丸出聖惠方治婦人月水不通心腹滯悶四肢疼痛水蛭十枚炒令微黃川椒去目及閉口者微炒出汗硼砂細研狗膽乾者各一分獺膽一枚乾者上為末以醋煮麵糊和丸如緑豆大每於食前當歸酒下五丸治婦人月水不通長時鬱怒不得安處往往忽似顛狂徹夜不得睡小便赤大便如常若大腑熱更加大黃三分醋煮如前出護命方當歸牡丹皮去心木通草半夏鱉甲醋炙柴胡荊芥穗羌活各一分虻蟲二十個去翅水蛭十條連翅上細杵羅為末每服三錢熱湯半盞對童子小便半盞同煎一兩沸瀉出食後吃服此藥經候行則病勢減半次便吃清心氣止煩燥方吃清心氣藥後即便吃安神思令得睡方大抵此病起於心神俱病故煩燥不得睡此須三方藥然後可治也桃仁煎出千金方治帶下經閉不通治月經不通甚極閉塞出千金方牛膝一斤麻子三升蒸土瓜根桃仁各三升上㕮咀以好酒一斗五升浸五宿一服五合漸加至一升日三服牡丹牛膝散一名桃花散出危氏方治婦人室女血閉不通五心煩熱紅花三錢半當歸五錢杜牛膝五錢桃仁去皮尖炒別研二錢半上為細末每服二錢空心溫酒下麒麟竭散出聖濟總録治婦人經候結滯不通麒麟竭鯪鯉甲炙焦水蛭炒虻蟲去翅足炒各半兩上為散水和成塊外用濕麵裹炮焦後出去取藥研為散每服一錢半煎當歸酒調下空心食前服凌霄花湯出聖濟總録治婦人血閉不行臍下鞕痛及腰痛不可忍凌霄花去萼一名紫葳芫花釅醋炒焦紅藍花各半兩沒藥一分研上搗篩每服一錢水一盞煎至六分去滓食前熱服硼砂丸出聖惠方治婦人月水不通心腹多痛硼砂一兩桂心當歸銼微炒各半兩斑蝥一分糯米拌炒令黃去翅足上為末用軟飯和丸如緑豆大每服食前以溫酒下五丸服此藥如小便澀宜服後方又方出聖惠方瞿麥木通燈心滑石甘草炙微赤銼各一分上為散以水一大盞煎至六分去滓分二服以小便利為之度蕩滯散出聖惠方治婦人經脈不通斑蝥炒去翅足半兩大黃銼炒三分水蛭糯米炒熟去米虻蟲炒各一分上為細散研勻狗膽酒調下半錢烏金散出聖惠方治婦人月水不通心神煩悶腹脅氣脹宜服亂髮一兩須是丈夫者剪來不蛀皂莢一寸挺肥者寸銼神麯三兩赤鯉魚鱗大麥糵各一兩上藥入在一瓷瓶子內實填口上安一個瓦蓋瓶口用紙筋泥固濟候乾先用慢火㶸後著大火燒令通赤去火候冷取出入麝香一錢同研令細每服於食前溫酒調下一錢治女子血脈不通出肘後方用石榴葉東生者取一握炙乾濃煎一盞服瘥婦人赤白帶下同治紅花散出朱氏集驗方治婦人經脈不通如血膈者二十服效好紅花細蘇枋木捶碎當歸上等分㕮咀每用一兩以水一升半先煎紅花枋木然後入酒一盞並當歸再服分兩服空心食前溫服烏藥散一名琥珀散治婦人心膈迷悶腹臟撮痛氣急氣悶月信不通等疾三物湯治月經不行四肢虛腫人參茯苓各一兩白朮二兩上㕮咀水一盞半棗肉子一個食前服金花散出聖惠方治婦人月水不通心腹煩悶四肢痛弱桂心一兩半斑蝥一兩去翅足麝香一錢細研上藥先用水和白麵裹斑蝥以慢火番覆燒令煙盡放冷淨卻焦面取斑蝥灰與桂心末及麝香同研令細每五更初用暖酒調下一錢服藥後或憎寒壯熱腹內撮掏疼痛或小便似淋勿怪此是藥行須臾即通如未快通隔日再服烏金散出聖惠方治婦人月水不通童男發童女發斑蝥三十七枚糯米拌炒令黃去翅足上藥入麝香一錢同研令細每於食前以熱酒生薑調下一錢服白芷散出聖濟總録治婦人月事不通白芷半兩當歸一兩