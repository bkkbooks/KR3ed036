body:
  text: 卷三百三十三婦人諸疾門月水不通附論夫婦人月水不通者由勞傷血氣致令體虛受風冷邪氣客於胞內傷損衝任之脈並手太陽少陰之經致胞絡內絶血氣不通故也衝任之脈起於胞內為經脈之海手太陽小腸之經也手少陰心之經也此二經為表裡主上為乳汁下為月水風冷傷其經血血性得溫則宣流得寒則澀閉既為冷所結搏血結於內故令月水不通也又云腸中鳴則月水不來病本於胃所以然者風冷干於胃氣胃氣虛不能分別水穀使津液不生血氣不成故也又云醉以入房則內氣竭絶傷於肝使月水衰少不來也所以爾者肝藏於血勞傷過度血氣枯竭於內也又先經唾血及吐血下血謂之脫血使血枯亦月水不來也又利血經水亦斷所以爾者津液減耗故也須利止津液生其經自下診其腎脈微澀者是月水不通也又左手關後尺內浮為陽陽絶者無膀胱脈也月水則閉又肝脈沉之而急浮之亦然時小便難苦頭眩痛腰背痛足寒時疼月水不來時恐得之時有所墮墜也月水不通久則血結於內生塊變為血瘕亦作血症血水相併壅澀不宣通脾胃虛弱變為水腫也所以然者脾候身之肌肉象於土土主能克消於水水血既並脾氣衰弱不能克消故水氣流溢浸漬肌肉故腫滿也又云經脈不通日久此非細事實為沉痼若是室女經脈不通初因貪食酸鹹之物遂致血脈乾涸變成勞病若因經脈正行誤食熱面生冷房室遂成此疾腹內顆塊誤認為胎時日稍深必見困篤也夫血寒則閉熱則停溫則流診其尺脈澀者是也微弱者本象不足沉緊者小便必時痛而有癥瘕及滿盛者有妊也若是室女月事不行必因多食鹽酸生斯疾若久不宣通變勞疾遇月信而仍誤食生冷熱面有醉以入房而其氣內隔因而阻滯非時腸鳴必使月信不來病體冒受風冷胃氣虛而不能分別水穀使津液不生血氣不成也凡月閉之疾但服琥珀丸肌瘦而利飲者血熱相搏也宜服黃連丸面白肢體浮腫肝氣弱而不能制血三聖丸及三物湯主之再候而小腹急疼痛或作顆塊而誤認為胎此為血症因血經行入房故也琥珀丸主之産後不久月信不通其故緣氣血耗散不是風寒擊搏而內攻也是血凝滯而不行久不治之便為血症使人肚如覆杯其體如水腫是脾虛而血水相併有塊者與琥珀丸如腹如蠱者與沒藥丸身腫者與九霄丸三物湯女子十四天癸至任脈通月事以時下故令有子天癸者物之自然月者以月至經者有常也其來過與不及多與少及此皆胃之故也不行尤甚者有疾生焉血既不能滋養百骸則發落面黃身羸瘦血虛則熱發故身多熱水不足則燥氣燔則金受邪金受邪則為咳為嗽則為肺痿為肺癰必矣醫見經不行則用虻蟲水蛭等行血藥見熱則用諸寒藥實出妄意就中不行以藥行之為害滋大經水枯竭則無以滋養其能行乎譬猶索萬金於乞丐之人雖捶楚並下不可得也但服以養氣益血諸藥天癸自行又有二種婦人實盛月經瘀閉利之則行矣又云月水不通者所致不一有味不化血經脈不通有先期太過後期不通有大病後熱不通有寒凝結滯不通有積聚氣結不通有心氣抑滯不通凡此所受不同治亦異蓋婦人假血為本以氣為用血氣稽流則澀而不行其為病或寒或熱臍腹堅痛肌肉消瘦久則為勞瘠之症凡婦人月水不來室女亦可內經曰月事不來皆是胞脈閉也胞脈者屬心而絡於脬中令氣上迫於肺心氣不得下通故月事不來也可用茶調散吐之次用玉燭散芎藭湯三和湯桂苓白朮散之類降心火益腎水開胃進食分陰陽利水道之藥皆是也慎勿服峻熱有毒之藥若服之則變成肺痿骨蒸潮熱咳嗽咯膿嘔血喘滿小水不利寢汗不止漸至形瘦脈大雖遇良醫亦成不救嗚呼人之死者豈命使之然也哉一婦人年二十餘歲病經閉不行寒熱往來咳嗽潮熱庸醫禁切無物可食一日當暑出門忽見賣涼粉者以冰水和飲大為一餐頓覺神清骨健數月經水自下夫衝任之脈起於胞內為經脈之海手太陽小腸之經手少陰心之經也二經為表裡心主於血上為乳汁下為月水也女子十四而天癸至腎氣全盛衝任流通經血既盈應時而下名之月水常以三旬而一見謂之平和也若後期者由勞傷血氣壅結故令月水不通也室女經閉成勞方論寇宗奭曰夫人之生以氣血為本人之病未有不先傷其氣血者世有室女童子積想在心思慮過度多致勞損男子則神色消散女子則月水先閉何以致然蓋憂愁思慮則傷心心傷則血逆竭神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽金既虧則水氣絶故四肢乾瘦木氣不克故多怒鬢髮焦筋脈痿五臟傳遍故卒不能死者然終必死矣此一種於勞中最難治蓋病起於五臟之中無有已其藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生也張氏云室女月水久不行切不可用青蒿等涼藥醫家多以為室女虛熱故以涼藥攻之殊不知血得熱則行冷則凝也方桃花丸治婦人月水不通無子由子宮風冷積血滯於膀胱故致腰膝疼痛手腳熱心背妨悶經絡不調腹內多氣四肢乏力面無血色及多䵟𪒟宜服桃仁蘇合香安息香木香檳榔川芒硝各三分水蛭炒令微黃虻蟲炒令微黃去翅足各半兩麒麟竭鱉甲塗醋炙令黃去裙襴附子炮製去皮臍柴胡去苗卷柏當歸銼微炒辛夷白芷紫石英細研水飛過禹餘糧炒醋淬七遍芎藭牡丹細辛麥門冬去心焙羌活桂心肉豆蔻去殼各一兩上為末煉蜜和丸搗三百杵丸如梧桐子大每日空心及晚食前煎茅湯下三十丸紫葳散出聖濟總録治婦人經脈不通血熱壅滯攻疰四肢皮膚癮疹並行經脈用紫葳凌霄花是也不以多少為散每服二錢食前溫酒調下服之治婦人血結月閉石淋用海藻石帆高尺余根如漆上漸軟作交羅文生海底煮汁服之治婦人月水經久不來用威靈仙為末酒調下一方用劉寄奴一方用王不留行血竭破經丹治婦人血閉不通神方錦紋大黃一兩去皮醋浸一宿硼砂一錢上為末醋和為丸如梧桐子大每服三丸好酒紅花湯調下食前服之乾地黃當歸丸一名乾地黃丸治月水不通或一月再來或隔月至或多或少淋漓不斷或來而腰腹刺痛不可忍四體沉重惟思眠臥欲食酸物虛乏黃瘦溫經湯出指南方治經道不通人參牛膝甘草各一兩當歸芍藥牡丹皮白朮官桂芎藭各二兩上為粗末每服五錢水二鍾姜三片棗一枚煎一盞去滓服地黃煎出指南方治經候至時頓然不行牛膝半兩生地黃三兩取汁乾漆一兩上以慢火同煎可丸即丸如梧桐子大每服三丸溫酒下塊消為度乾漆丸出千金方治月經不通百療不瘥臟腑宿冷惡血凝結乾漆土瓜根射干芍藥各一兩半牡丹牛膝黃芩桂心吳茱萸大黃柴胡各一兩六株桃仁鱉甲各二兩䗪蟲蠐螬各四十枚水蛭虻蟲各七十枚大麻子四合亂髮雞子大二枚庵䕡子二合上為末以蜜和丸如梧桐子大每日酒下十五丸漸加至三十丸日三仍用後浸酒服前丸藥一方無芍藥牛膝土瓜根浸酒方出千金方大麻子三升菴䕡子二升桃仁一升灶屋炲煤四兩土瓜根射干各六兩牛膝八兩桂心四兩上㕮咀以清酒三斗絹袋盛藥浸五宿以一盞下前藥良或單服之亦得大虻蟲丸出聖惠方治月經不通六七年或腫滿氣逆腹脹瘕痛宜服此數有神驗虻蟲四百枚蠐螬二百枚乾地黃一升牡丹乾漆芍藥牛膝土瓜根桂心各四兩吳茱萸桃仁黃芩牡蒙各三兩茯苓海藻各五兩水蛭三百枚芒硝一兩人參一兩半葶藶五合上為末蜜和丸如梧桐子大每日空心酒下七丸不知加之日三服一方無芒硝人參一方無桂心蠐螬丸出聖惠方治婦人月水不通或腫滿氣逆咳嗽食少蠐螬三分微炒生地黃一兩牡丹三分乾漆半兩搗研令煙出桃仁三分湯浸去皮尖雙仁麩炒微黃赤芍藥牛膝去苗土瓜根各三分桂心半兩黃芩琥珀各半兩水蛭一分炒微黃虻蟲一分炒微黃去翅足甜葶藶三分隔紙炒令紫色赤茯苓一兩海藻三分洗去鹹味桑根白皮三分銼上為末爛蜜和搗二三百杵丸如梧桐子大每於欲食前以溫酒下二十丸當歸湯治婦人月水不通臍下撮痛食減羸易當歸切焙甘草炙銼桂去粗皮木賊大黃銼炒荊三稜炮銼各一兩威靈仙去土生地黃焙王不留行檳榔玄胡索代赭煅醋淬天雄炮裂去皮臍鱉甲去裙襴醋炙各一兩半紅藍花炒三分上㕮咀如麻豆大每服五錢半煎八分去滓溫服不拘時候狗膽丸出聖惠方治婦人月水不通日漸羸瘦變為血癆及血氣結聚疼痛狗膽五枚取汁硼砂半兩膽汁浸三七日乾漆搗碎炒令煙出芫花醋拌炒令乾玄胡索以上各半兩乾薑炮製銼斑蝥糯米拌炒令黃去粗皮麒麟竭砒霜各一分伏龍肝半兩細研自然銅一兩細研虻蟲微炒黃去翅足水蛭微炒黃去翅足當歸銼微炒各半兩上為末用頭醋一升先入自然銅末煎十沸以來去卻石腳卻入銚子內入藥末一半以慢火煎成膏後便入硼砂狗膽及一半藥末和搗三二百杵丸如緑豆大每於食後以溫酒下七丸鱉甲湯出聖濟總録治婦人經候不通已經三兩月鱉甲去裙襴醋炙白前代赭煨醋淬荊三稜炮銼附子炮裂去皮臍玄胡索各一兩半大黃銼炒甘草炙銼木香桂去粗皮當歸切焙各一兩桃仁去皮尖雙仁炒二十枚紅藍花三分熟乾地黃焙三兩大腹皮銼二兩半上㕮咀如麻豆每服五錢水一盞半煎取八分去滓溫服不拘時候服治月經不通心腹絞痛欲死通血止痛出千金方當歸大黃芍藥各三兩吳茱萸乾地黃乾薑芎藭虻蟲水蛭各二兩細辛甘草桂心各二兩梔子十四枚桃仁一升上㕮咀以水一斗五升煮取五升分為五服一方有牛膝麻子仁各三兩治婦人月經不通大腑祕熱兩足痛行不得日夜不安疼痛叫聲不停肌肉消瘦出護命方麻黃去根射干秦艽荊芥穗虎杖連翹當歸牡丹皮去心牛膝官桂黃芩杏仁大黃醋煮如前牽牛芎藭各一分半夏三株大腑熱使大黃一兩上件藥作一處杵羅為末每服三錢水一盞煎取九分食後吃以大腑通暢經候通行為度若人得此病但止通大腑行經候自然安樂也地髓煎丸出楊氏家藏方通經脈補虛羸強腳膝潤澤肌膚和暢筋脈當歸丸出聖濟總録治婦人風癆氣病經脈不通漸加羸瘦不思飲食心腹脹滿遍身疼痛當歸切焙一兩半鱉甲去裙襴醋炙琥珀銼芎藭牛膝酒浸切焙桃仁去皮尖雙仁炒黃研水蛭糯米炒令焦各一兩虎杖桂去粗皮大黃一半生一半炒柴胡去苗各半兩虻蟲炒令色黃牡丹皮各二分麝香研半分上為末搗爛蜜和丸如梧桐子大每服二十丸空心薄荷酒下烏梅湯亦得三稜丸出危氏方治經脈不通氣痛滯下兼治血瘕形如鐮鐵樣當歸去毛川芎牛膝芫花三稜莪朮煨蒲黃玄胡索牡丹皮乾薑菴䕡子白芷地龍去泥土酒浸各一兩大黃二兩為末米醋一升文武慢火熬成膏上為末入大黃膏和研杵煉蜜為丸每服二十丸氣痛淡醋湯下炒姜酒亦得木通紅花酒調下鬼箭丸出聖惠方治婦人月水不通手足心熱腹滿喘急不欲睡臥心神煩悶鬼前羽川芒硝柴胡去苗各一兩水蛭一分微炒黃虻蟲一分炒令微黃去翅足川大黃銼微炒赤茯苓各三分乾漆半兩搗碎炒令煙出牡丹三分杏仁三分湯浸去皮尖雙仁麩炒微黃桃仁三分湯浸去皮尖雙仁麩炒微黃甜葶藶一分隔紙炒令黃紫色䗪蟲一分微炒黃去翅足川椒一分去目及閉口者微炒去汗上為末爛蜜和搗三二百杵丸如梧桐子大每於食前以溫酒下二十丸鬼箭散出聖惠方治婦人月水久不通已經數年以來羸瘦食少諸方不效宜服鬼箭羽半兩赤芍藥川大黃銼微炒桂心