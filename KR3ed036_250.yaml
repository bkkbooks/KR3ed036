body:
  text: 卷二百五十㿗疝門膀胱氣痛附論夫治膀胱氣痛不可忍醫者投剛劑其痛尤甚小便三日不通陰陽痞塞惟有待死適遇明醫投五苓散一兩分而為三各用蔥須三根茴香及鹽少許連服中夜下小便如黑汁三升臍下寬得睡續服硇砂丸數日而安蓋此疾本因虛而得不宜驟補邪之所湊其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之方金鈴丸出永類鈐方治膀胱腫硬牽引疼痛及小腸氣陰囊腫毛間水出並能治之金鈴子肉五兩茴香炒馬藺花炒海蛤菟絲子破故紙海帶各三兩木香丁香各一兩上為末糊丸如梧桐子大每服二三丸空心食前溫酒鹽湯任下蔥白散出三因方治一切冷氣不和及腎臟膀胱氣發攻刺疼痛又治婦人産前腹痛胎不安或血刺者兼能治血臟宿冷骨節倦痛身瘦怯弱勞傷帶癖久服盡除但婦人一切疾病宜服川芎當歸枳殼麩炒去瓤厚朴姜治炒官桂去皮青皮乾薑炮茴香炒川楝炒神麯炒麥櫱炒三稜炮蓬朮醋浸一宿焙人參茯苓芍藥木香炮乾地黃各一兩上為末每服三錢水一盞蔥白三寸煎七分入鹽少許熱服大便祕澀加大黃煎大便溏利則加訶子煎食前服治膀胱疝氣腎腫陰痛不可忍欲死者川楝子十個巴豆五個斑蝥十個一處炒黃去巴豆斑蝥不用沒藥五分八角茴香小茴香五分枳殼炒五分上為末三分溫酒送下葫蘆巴丸治腎經虛冷膀胱氣痛或陰腫偏墜或小腹有物如卵上下走痛膀胱氣外腎腫大破故紙黑牽牛二味瓦器內炒大半留小半生上末別取大蒜入巴豆濕紙裹煨軟熱去巴豆不用以蒜研入藥作劑可丸為度丸如梧桐子大每服三十丸茶清吞下青木香丸治膀胱疝氣腫痛及胃膈噎塞氣滯不行腸中水聲嘔噦痰逆不思飲食常服寬中利膈黑牽牛三兩炒香搗末三兩青木香一兩補骨脂炒香蓽澄茄檳榔用粟米飯拌以濕紙包火中煨紙焦去飯各二兩上為末入牽牛末令勻以清水拌和丸如梧桐子大每服五十丸溫熟水吞下又法出永類鈐方用青木香丸二百粒斑蝥七個去頭足翅為末同於文武火上慢炒令丸子微香以瓷碟蓋銚上頓在冷處少頃去斑蝥末取丸每服五十丸茴酒下空心服纍試之有驗茴香散出本事方治膀胱氣痛茴香金鈴子肉蓬莪朮京三稜各一兩甘草半兩炙上為末每二錢熱酒調又云每發痛甚連日只二三服立定頃在徽城日歙尉宋姓膀胱氣作疼不可忍醫者以剛劑與之疼愈甚小便不通三日矣下虛脹心悶豫視之見其面赤黑脈洪大豫曰投熱藥太過陰陽痞塞氣不得通為之奈何滴有五苓散一兩許分三服用連須蔥一莖茴香一撮鹽一錢水一盞半煎分服中夜下小便如黑汁者一二升臍下寬得睡翌日診之脈已平矣續用硇砂丸與之數日瘥大抵此疾因虛得之不可以虛而驟用補藥經云邪之氣湊其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之是以諸方借巴豆氣者蓋謂此也牽牛丸出危氏方治膀胱氣服暖藥攻成壅滯作痛黑牽牛三錢大黃二錢白礬一錢上用巴豆去皮三十粒先入銚炒焦乾去巴豆入衆藥炒香為末煨大蒜研細為丸茴香湯送下七丸治男子腎經虛弱膀胱為邪氣所搏結成痃氣皆因憂思愁慮失餐感寒疝氣攻痛有橫痃豎痃臍腹攻湊腰腳沉重不能舒伸服諸藥不效者宜速療之香附子一斤巴豆斑蝥各五十個上同一處炒令香熟去巴豆斑蝥用艾葉醋煎打麵糊為丸如梧桐子大每服三四十丸用鹽酒下念珠丸出衛生家寶方治膀胱疝氣外腎腫脹痛不可忍乳香硇砂各三錢飛黃蠟一兩上乳香研細又同硇砂研勻熔蠟和丸分作一百單八粒以線穿之露一夕次日用蛤粉為衣旋取一粒用乳香湯吞下頃年有人貨疝氣藥擔人我二字以為照目日貨千錢有一國醫多金得之用之良驗金聖散治小腸膀胱氣痛不可忍地膽半兩去翅足頭微炒滑石一兩硃砂半分上為末每服二錢用苦酒調下食前服金鈴子散出危氏方治膀胱疝氣閉塞下元小便不通疼痛不可忍服之神效金鈴子四十九個去核銼如麻豆大不得碎細用巴豆四十九個去皮赤不得碎細同炒以金鈴子深黃為度去巴豆不用茴香一兩一方用鹽炒上不用巴豆將二味為末每服二錢食前溫酒調下一名抽刀散蔥白酒空心調服儒門事親金鈴散出直指方治膀胱小腸氣外腎腫痛治膀胱氣以葫蘆巴蘹香子桃仁配合治膀胱氣甚效惟桃仁麩炒各等分半以酒糊丸半為散每服五七十丸空心食前鹽湯下散以熱米飲調下與丸子相間空心服日各一二服治膀胱氣出本事方青礬一兩白礬一兩各為粗末上用小瓦罐子一隻入藥於內用麻皮縛緊鹽泥如法堅牢固濟炭五斤煉令通紅炭盡為度取出入鹽穴內二宿去火毒為末醋糊為丸如緑豆大每服十丸空心鹽湯下或白湯亦可金蓮散一名川楝散出肘後方治膀胱氣痛巴豆三十粒去殼截斷川楝子二十四個湯浸去皮薄切片上用麩二合同炒令黃赤色去麩與巴豆只用川楝為末每服二錢溫酒調空心服一方茴香湯下得泄為效治膀胱氣急宜下氣出肘後方上蕪荑搗和食鹽末二物等分以綿裹如棗大納下部或即下惡汁並下氣佳茴香飲出朱氏集驗方治膀胱疝氣偏墜八角茴香白牽牛炒上二味各等分為細末空心酒調下去鬥丸治膀胱腎腫局方紅丸連翹丸青木香丸各一帖上用斑蝥二十一個同藥入瓷銚慢火炒令斑蝥黃黑色連藥傾在地上去火毒一周時去斑蝥卻將藥盛袋中去斑蝥屑分作十服空心酒吞服不飲酒或鹽湯下其病雖大如斗亦安香附子丸出經驗良方治膀胱氣腫痛香附子去毛淨洗用米醋煮乾為末醋糊為丸用木饅頭一個生薑一小片連皮擂爛同炒入鹽少許將水一大盞煎兩三沸去滓咽下二十丸治膀胱氣痛用檳榔二枚一生一熟搗末酒煎服之療膀胱氣急宜下氣用高麗昆布一片白米泔浸一宿洗去鹹味以水二斗煮令向熟擘長三寸闊四五寸仍取蔥白一莖二寸切斷擘之合昆布煮極爛仍下鹽酢豉調和如臛法不得鹹酸以生薑橘皮椒末等和宜食粳米飯粳米粥海藻亦依此法極下氣大效無所忌兼金丸出危氏得效方治熱入膀胱臍腹上下及脅肋疼痛便燥欲飲水按之痛者大黃濕紙裹煨八分硝石桂心甘草桃仁四十個去皮尖上為末煉蜜丸如梧桐子大每服五七丸米飲下婦人血閉疼痛亦宜服之茴香酒出朱氏集驗方治膀胱偏墜久不愈者上用燈籠草根浸酒卻將茴香炒碾用此酒調下治膀胱氣痛方出朱氏集驗方歙縣尉宋葡甫患膀胱氣作痛不可忍醫者以剛劑與之痛愈甚溲溺不通三日許學士診其脈曰投熱藥太過滴有五苓散一兩分作三服各用連須蔥一莖茴香及鹽少許水一盞半煎七分連服之中夜下小便如黑豆汁一二升臍下寬得睡明日脈已平續用硇砂丸遂愈此疾往來皆因腎虛聖惠云腎氣虛風冷所侵流入於腎不能宣散而然也卵脹腸㿗難治獨氣㿗治之易愈又有寒疝之氣注入㿗中名曰狐疝亦屬㿗病嚴氏云四㿗治法橘核丸主之漫録於後黑牽牛四兩半生用白朮半面茴香半兩澤瀉二錢海金沙二錢巴戟半兩川楝子半兩去核南木香四錢上煉蜜為丸桐子大每服二十七丸薺酢汁下空心服治一切丈夫元陽虧弱膀胱小腸虛冷非時氣痛上衝心脅疼痛難忍宜服此藥出護命方益智子去皮淨蓬莪朮各半兩茴香牛膝山茱萸牽牛炒熱續斷甘草川芎葫蘆巴防風各一分上細杵羅為末每服三錢水一盞二分煎兩三沸空心和滓吃熱湯調下二錢匕亦得腎氣附論夫腎氣內虛邪熱內入於腎經其脈洪大小便頻數所出澀少赤濁而痛此不可以牽牛行之治法瞿麥燈心煎湯調真料五苓散滲泄其熱邪水道一通勿藥有喜方蔥白散出直指方治腎氣刺痛七氣通用當歸川芎枳殼治官桂青皮川白姜茴香炒川楝子陳皮紫蘇三稜煨蓬莪朮醋浸一宿焙白芍藥茯苓木香各一兩人參沉香甘草炙各半兩上為粗末每服三錢蔥白二寸鹽少許煎服大便祕加大黃治腎氣奔豚氣穿山甲半兩麩炒木香海藻焙茴香各一兩全蠍十五個去梢毒土狗子十個去翅頭瓦焙乾黑牽牛頭末四兩香附子去皮破故紙麩炒各半兩吳茱萸一兩半上用蘿蔔一個大者剜去心肉入吳茱萸在內用糯米一碗同蘿蔔煮飯熟爛為度次將蘿蔔細切入米飯擂細茱萸曬乾同煎藥為細末用前藥與蘿蔔為丸如梧子大每服二十丸加至三十丸鹽酒送下食前服金鈴子丸出和劑方治腎氣發動牽引疼痛臍腹弦急攻衝不定金鈴子去核炒四兩益智仁葫蘆巴石菖蒲破故紙炒茴香巴戟去心各二兩木香白茯苓去皮陳皮去白各一兩上為末酒煮麵糊為丸如梧桐子大每服五十丸鹽湯溫酒下一用米飲下治腎氣半夏牽牛舶上茴香豬苓木通炒豬苓去木通不用蘿蔔子炒牽牛去蘿蔔子不用薜荔炒茴香去薜荔不用糯米硇砂三錢炒糯米去硇砂不用斑蝥三十個炒半夏色黃去斑蝥不用上為末酒糊丸如桐子大每服二十丸至三十丸鹽湯酒送下金山老艾瓜丸出直指方治腎氣攻刺及腳氣痠痛通治皆得效葫蘆巴慢火炒牛膝酒浸焙舶上茴香酒浸炒肉蓯蓉酒浸焙川續斷揀淨生用厚杜仲去粗皮薑製炒令絲斷天麻各二兩當歸酒浸焙沒藥別研各一兩上為末以艾去枝梗二兩大木瓜二枚切蓋去瓤入艾塞滿蓋定竹針插麻線系蒸爛研細和藥為丸梧桐子大每服七十丸溫酒鹽湯任下通氣丸少陰不足腎氣微少忽為寒折太陽下陷腎氣奔迫內動三焦或發熱頭疼咳嗽痰促或右脅牽痛或傳為疹子等症不一其左脈盡沉而弦按之則虛大而澀又治上氣葫蘆巴炒杜仲炒斷絲各一兩補骨脂一錢玄參三稜各五錢羌活茴香各三錢川楝子一兩半酒浸炒麻黃去節二錢春夏三錢上為細末麵糊為丸空心薑湯下五七十丸或鹽酒下代灸膏木香附子吳茱萸蛇床子馬藺花各等分上為細末姜搗熱麵攤開貼痛處梔子散出直指方治腎氣虛中有熱小腹外腎肛門俱熱大小便不通梔子仁制枳殼各半兩北梗北前胡青木香赤茯苓車前子甘草各一分上銼每三錢新水煎服壯熱加柴胡大便祕加大黃柴胡桂枝湯出直指方治腎氣冷熱不調症柴胡一兩三錢人參桂枝白芍藥生薑各半兩半夏黃芩甘草炙各三錢上銼散每服四錢棗一枚水一大盞煎七分溫服海藻丸治腎氣海藻四兩三稜六兩茴香九兩牽牛一兩二錢炒上為細末水糊為丸如梧桐子大每服三四十丸溫鹽水下青娥丸出和濟方治腎氣虛弱風冷乘之或血氣相搏腰痛如折起坐艱難俯仰不利轉側不能或因勞役過度傷及腎經或處卑濕地氣傷腰或墜墮傷損或風寒客搏或氣滯不散皆令腰痛腰間似有物重墜起坐艱辛悉能治之一方加川續斷桃仁去皮尖元胡索黑牽牛炒酌量入熱蜜丸亦可服虛極宜十補湯胡桃去皮膜二十個蒜熬膏四兩破故紙酒浸炒八兩一方芝麻同炒去芝麻取末杜仲去皮薑汁浸炒十六兩上為末蒜膏為丸每服三十丸空心溫酒下婦人淡醋湯下常服壯筋骨活血脈烏髭鬚益顏色一方不用蒜一方或加炒生薑十兩治木腎乳香沒藥地膽芫菁去翅足有種木腎要知原乳沒將研各二錢芫菁地膽二錢半去翅為末亦同前共作二十有五粒能飲酒者飲三傳空心細嚼一丸下便如脫俗做神仙治腎氣橫豎弦注痛及外腎腫脹川椒二兩小茴香生薑連皮紙包煨各二兩八角茴香八個上作一服用井水一碗河水一碗無灰酒一碗同煎至一碗露一夜分為三盞再溫每日空心一服作三日吃服畢以手摩臍下覺熱為驗甘豆湯出直指方治腎氣虛中有熱大小便不通黑豆三合甘草二錢銼姜七片上作一劑新水煎取清汁服三仙散出本事方治腎氣蓬莪朮一兩茴香二兩揀淨阿魏三錢真者上為末每服二錢溫酒調下治腎氣充心用五苓散一帖去官桂加茴香一撮作一服水二盞鹽一捻蔥白一根煎七分不拘時服海浮石散出直指方治腎氣熱症小便祕澀黃赤用海浮石為末每服二錢煎麥門冬赤茯苓湯調下五苓散生車前子竹園荽赤茯苓麥門冬去心燈心烏梅上等分煎湯調下治腎氣小便不通兼治水結不散暑症通用苦楝丸出三因方治肝腎氣虛風冷相搏攻刺心腹絞痛腰背不能禁因受流注氣腫癢疼痛久服養腎活血駐顏輕身耐老進美飲食川楝子揀十個銼碎分三分一用巴豆五粒去皮炒焦黑色去巴豆不用又用斑蝥七個炒焦去斑蝥又用海金沙七錢半同炒去海金沙不用茴香炒破故紙炒葫蘆巴炒烏藥木香炮各一兩上為末酒糊丸如梧桐子大每服三五十丸湯酒任下金鈴子丸出仁存方治釣膀胱腎氣偏墜痛不可忍川楝子五兩銼五分一分用斑蝥一個去翅頭炒去斑蝥一分分用茴香三錢鹽半錢炒熱去鹽留茴香入藥一分用牽牛三錢同炒去牽牛一分破故紙三錢同炒留故紙入藥一分用蘿蔔子一錢同炒去蘿蔔子不用上將楝子去核同破故紙茴香焙乾為末酒糊為丸梧桐子大每服三十丸溫酒空心下小腸膀胱腫硬香附子海藻煎湯調下治腎氣偏墜伏道艾葉防風駱駝糞蔥子韭子上為細末用瓦桶去底安地上內用盤子乘灰以前藥末如裝香篆細細排滿盤內以火燒著卻坐於瓦桶上令煙上熏陰囊候煙透徹其囊不墜即服補藥驗腰子散治腎氣作痛黑牽牛炒熟白牽牛炒熟等分上為末每服用三錢豬腰一副薄切開縫入川椒五十粒茴香一百粒以牽牛末遍摻入腎中線系濕紙數重裹煨香熟出火氣盡後空腹嚼吃好酒送下少頃就枕天明取下惡物即愈腎氣方用大七氣湯加炒牽牛煎服又方用生薑每個多開小孔納以川椒濕紙煨透老酒嚼下治心痛霍亂腎氣囊腫用檀香濃煎服水磨敷外腎並腰腎痛處奪命丹吳茱萸半斤分作四分酒醋小便米泔四處浸三宿取出曬乾用藥為末加海帶海藻海螵蛸澤瀉共四味同為末酒糊為丸如梧桐子大每服二三十丸食前酒送下雄黃丸治腎氣大便不通酌量輕重以溫白丸用枳殼散下白羊肉湯益腎氣強陽道用白羊肉半斤去脂膜切作片以蒜齏煮食之三日一度甚妙椒附散治腎氣上攻項背不能轉移大附子一枚六錢以上者炮去皮臍末之上每服二大錢好川椒二十粒用白麵填滿水一盞半生薑七片同煎七分去椒入鹽通口空心服本草方云腎氣自腰夾脊上曹溪穴然後入泥宮曹溪穴非精於般運者不能透今逆至此不得通用椒以引歸經則安矣蕭上達椒下達詩言椒聊且貽我握椒皆此意也治腎氣猝沖脅如刀刺痛喘息不得亦兼理小腸氣用蘹香子生搗韭葉汁一合投熱酒一鍾服之通神丸治腎氣偏墜疝氣腫痛水流不止兼腎癰此藥去敗膿勻和消膜外腫脹大桃仁二百個去皮尖研以童子小便一盞半石器文武火熬成膏刮出真阿魏三分乾蠍十個全者去毒真麝香半錢上三味研末桃仁膏和丸如梧桐子大空心酒下二丸日進二服增損腎氣丸填精補髓止渴泗洲楊吉老傳乾地黃二兩薯蕷澤瀉以上各四兩茯苓牡丹皮附子炮去皮臍桂心去皮以上各一兩山茱萸五兩上為細末蜜和為丸如梧桐子大每服十丸溫酒送下空心食前治丈夫腎氣疼痛不可忍悶絶欲死諸般氣藥不可救療緣此病乃胸膈有涎以此投藥不驗但寸關脈氣覺似洪大或沉伏俱是有涎宜服此方元胡索官桂鱉甲醋炙檳榔川芎半夏狼毒捶碎醋二碗同芫花土器內煮乾炒黃黑色木香各一分芫花牽牛各一兩吳茱萸三錢當歸牛膝大黃醋煮各一分羌活半兩上件藥爛研芫花狼毒二味為末牽牛半夏二味自作一處杵羅為末所餘衆藥合作一處杵羅為末每服六錢半芫花狼毒末半錢牽牛半夏末三錢衆藥末三錢合為一服以水一盞二分生薑二片蔥二枝瓦鍋內煎兩沸急瀉傾出和滓空心熱服吐出膠涎即安若未吐連進服尚未吐即利下膠痰便得安效若吃藥了已吐膠涎即吃後藥治丈夫腎氣吃前面方藥取痰出後便宜服此方京三稜殭蠶去絲連翹羌活當歸沉香元胡索桑寄生木香川芎各等分上細杵羅為末每服二錢水一盞煎兩沸瀉傾出非時服治一切丈夫腎氣婦人血氣疼痛不可忍面青唇黑幾於不救丈夫則攻擊臟腑腰背蜷曲婦人則腹中成塊結為癥瘕忽驟然疼痛便至危困忽經年纍月痛無暫停並宜服此此藥神驗不可具述芫花四兩沒藥麒麟竭元胡索蓬莪朮京三稜牽牛醋炙焙乾木香各半兩當歸芍藥各二兩狼毒半兩捶碎同芫花於土器內醋炒黃微黑色上先修制芫花狼毒乳鉢內研如塵又將麒麟竭沒藥亦作一處研如飛塵所餘衆藥共作一處杵羅為末方將芫花狼毒麒麟竭沒藥等末滾令均更爛研千百遍每服一錢半氣痛時蔥酒調下和滓吃不適飽食後吃也治腎氣受邪相刑于心心既受病先診其腎脈其病症若是腎邪干心即宜先吃此退腎邪散辰戌年六丙年多有此候心有冷病先吃此方萆薢牛膝茯苓石斛續斷天靈蓋酥炙各半兩羌活獨活木香川芎各一分以上細杵羅為末以小便少許化麝香三銖加蜜同煉丸如梧桐子大空心鹽湯下三十丸三仙丹出醫學切問安和腎氣進美飲食壯陽事川烏半兩炒蒼朮三兩米泔水浸茴香一兩山藥一兩金鈴子四兩去皮核肉炒萆薢五錢青鹽破故紙一兩上為末酒糊為丸如梧桐子大每服三十丸溫酒送乾物壓之此藥行四方皆可服水土防山嵐瘴氣去風濕避寒暑進飲食厚腸胃令人長肥有精神治渾身走注痛和血脈治冷積去寒疝氣小腸疼添精補髓血駐顏壯筋骨身輕體健明目暖水臟行如風語如鍾