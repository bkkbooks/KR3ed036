取出焙乾為末各二兩上為末酒糊丸如梧桐子大溫酒下三十丸木香流氣飲兼服效一方無白蒺藜枳實橘紅一方有馬藺花山藥白蒺藜丸出聖惠方治陰㿗腫大白蒺藜微炒去刺熟地黃干鹿茸去毛塗炙微黃白蘞各二兩半磁石三兩燒醋淬七次細研水飛過鐵精細研桂心續斷各一兩巴戟赤芍藥玄參木通海藻洗去鹹味牛膝去苗桑寄生澤瀉肉蓯蓉浸一宿刮去粗皮炙乾各二兩射干一兩半上各藥為末再同研令勻煉蜜和搗五七百杵丸如梧桐子大每於空心及晚食前溫酒下三十丸治㿗丸出千金方桃仁蜘蛛各五十枚桂心蒺藜子地膚子澤瀉防風五味子橘皮茯苓防葵芍藥各二兩牡丹皮細辛海藻各一兩狐陰一具上為末蜜和丸如梧桐子大每服十丸稍加至三十丸桃仁丸出聖惠方治陰㿗腫痛桃仁湯浸去皮尖雙仁麩炒微黃海藻洗去鹹味各二兩澤瀉防風去蘆頭防葵桂心赤芍藥青橘皮湯浸去白瓤焙五味子白蒺藜微炒去刺地膚子赤茯苓細辛牡丹各一兩狐陰一具炙微黃上為末煉蜜和搗三二百杵丸如梧桐子大每日空心及晚食前溫酒下三十丸治陰㿗偏大出聖惠方白蒺藜微炙去刺鹿茸去毛塗酥炙微黃白蘞磁石燒醋淬七次搗碎細研水飛過肉蓯蓉酒浸一宿刮去粗皮炙乾各一兩鐵精細研桂心木通銼牛膝去苗玄參桑寄生澤瀉各半兩熟乾地黃一兩上為末煉蜜和丸如梧桐子大每於食前溫酒下三十丸橘核丸出仁存方治四種㿗病卵核腫脹偏有大小或堅硬如石或引臍腹絞痛甚則囊膚腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗海帶洗川楝肉取肉炒桃仁去皮尖炒各一兩厚朴姜炙木通枳實炒元胡索桂心不見火木香各半兩不見火上為末酒糊丸如梧桐子大每服六十丸空心鹽湯酒任下虛寒者加川烏一兩腎腫久不消加硇砂二錢醋煮旋入有熱氣滯者加黑牽牛大黃各半兩狐陰丸出聖惠方治腎氣陰㿗腰膝冷疼陰囊腫癢狐陰一具炙微黃木香白蒺藜微炙去刺昆布洗去鹹味膃肭臍酒刷炙黃檳榔各一兩半石斛去根銼桃仁湯浸去皮尖雙仁麩炒微黃各二兩半牛膝去苗菟絲子酒浸三日曝別搗為末各二兩上為末煉蜜和搗三五百杵丸如緑豆粒大每於食前溫酒下二十丸至三十丸日再服忌熱面蕎麥豬魚黏食等物大戟丸一名麝香大戟丸治陰㿗腫脹或小腸氣痛出三因方大戟去皮銼炒黃半兩葫蘆巴四兩炒木香一兩大附子炮去皮臍一兩舶上茴香六兩訶子煨去核檳榔各一兩川楝五兩後入麝香半錢別研上為末獨留川楝以好酒一二升蔥白七枚長四寸煮川楝子軟去皮核取肉和上件藥丸如梧子大空心溫酒下五七丸至十丸薑湯亦得時發疼痛炒姜熱酒下十五丸天雄散出聖惠方治㿗小便大腫痛天雄四顆炮裂去皮臍桃仁半斤湯浸去皮尖雙仁研川楝子三十枝葫蘆巴五兩胡椒乾蠍微炒各一兩海藻三兩洗去鹹味蘹香子三兩上用酒二斗於銀器內盛煎至七分曝乾搗細羅為散入桃仁研令勻每於食前溫酒下二錢療超躍舉重猝得陰㿗出聖惠方白朮五分地膚子十分桂心一分上搗末以飲服一刀圭日三忌生蔥桃李雀肉等物一方溫酒調下三白散出和劑方治膀胱蘊熱風濕相乘陰㿗腫脹大小便不利白牽牛略炒二兩白朮半兩桑白皮陳皮木通各半兩上為末每服二錢薑湯調下空心服初進一服未覺再進此藥不損臟氣只導利留滯疝方大率多用熱藥此方唯壅熱症宜服之昔時有人患陰囊腫脹纍嘗試之有驗抵聖丸出三因方治膀胱有熱多因天氣熱而發陰㿗腫滿赤痛大便祕欲飲水按之臍腹痛續隨子薏苡仁郁李子茵芋白牽牛各一錢略炒上為末滴水丸如桐子大每服五丸一方用香姜散咽黃昏服五更利下惡物為效治腎虛陰㿗腰膝冷疼陰囊腫癢出聖惠方狐陰一隻炙微黃海藻洗去鹹味牡丹各半兩桂心三分上為末煉蜜和丸如梧桐子大每於食前溫酒下十五丸小兒服五丸治㿗陰卵偏大有氣上下脹痛或行走便發腫黃柏銼牡丹桂心防風去蘆頭各半兩上為末散每於食前溫酒下二錢荔核散出危氏方治腎大如斗不過十劑除根舶上茴香青皮荔枝核上等分銼散炒出火毒為末酒下二錢日三服蜘蛛散一名蜘蛛丸出三因方治陰狐㿗氣偏有大小時時上下脹痛蜘蛛十四個熬焦桂心半兩上為末蜜和丸梧子大米飲下十丸為散取八分飲和服日再治腎虛陰㿗腰膝冷疼陰囊腫癢出聖惠方漢椒一兩去目及閉口者微炒去汗昆布半兩洗去鹹味上為末用好酒煮麵和丸如梧桐子大每於食前冷椒湯下十丸治㿗方出千金方用楊柳枝如腳趾大長三尺二十條水煮令極熱以故布及氈掩腫處取熱柳枝更互拄之如此取瘥治陰㿗以取白頭翁根生者不限多少搗之隨偏腫處敷之一宿當作瘡二十日愈香附散出三因方治㿗脹及小腸氣用香附子不拘多少為末每用酒一盞煎海藻一錢重至半盞撈出海藻嚼細用所煎酒調香附子末二錢服一方以海藻為末以熱酒調用尤妙甚者灌之一方熱酒下荊芥末治㿗卵腫痛用昆布汁咽之一方酒煎服治水㿗偏大上下不定疼痛以取牡蠣不限多少咸泥固濟炭三斤煅令火盡令取二兩乾薑二兩炮共為細末冷水調稀稠得所塗病處小便小利即愈牡丹散療㿗偏大氣脹不能動方牡丹桂心一方作桂枝防風鐵精豉熬各等分上為末搗篩酒和方寸匕服之小兒一刀圭二十日愈嬰兒以乳汁和大豆與之大效忌生蔥胡荽一方以豉汁調下一方治病後交接勞復陰㿗腫縮入腹絞痛或便不通用蚯蚓數條絞汁服之以敷囊外即愈祕傳茱萸內消丸治腎虛為邪所襲留伏作痛陰㿗小便大或生瘡出黃水吳茱萸半酒半醋浸一宿焙乾山茱萸蒸去核馬藺花醋浸焙川楝子蒸去皮核官桂黑牽牛炒去末舶上茴香用鹽炒元胡索略炒橘皮青皮去白海藻浸洗去咸炒各一兩桃仁浸去皮炒白蒺藜炒杵皮核木香各半兩上為細末酒面稀糊丸梧桐子大每服四十丸食前溫酒鹽湯任下治陰卵潰疾去熱風可作湯沐用地膚子與陽起石同服主丈夫陰痿不起補氣益力橘核丸治四種㿗病卵核腫脹偏有大小或堅硬如石或引臍腹絞痛甚則囊膚腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗海帶洗川楝子取肉炒桃肉麩炒各一兩厚朴去皮薑製炒五錢上為末酒糊為丸每服七十丸空心鹽酒鹽湯任下虛寒甚者加炮烏一兩腹堅久不消者加硇砂二錢醋煮旋入治㿗氣初入陰囊疼痛腫起小腹兩畔相連腰胯處有兩條弦急疼痛不可忍行動難阻急於痛處弦上著灸斷其根脈然後吃此藥火腑熱唇焦赤方可吃荊芥穗白蒺藜去刺各半兩連翹羌活木香黃耆防風蔓荊子獨活芍藥山梔牽牛各一分上細杵羅為末每服二錢食後熱湯調下仍是空心吃後丸子更效荊三稜二分白蒺藜去刺一兩延胡索當歸檳榔官桂木香各一分半夏芫花牽牛醋煮狼毒捶碎好醋一碗同芫花於土器內炒令乾微黑色不要焦各四銖上為細末煉蜜丸如梧桐子大空心熱湯下三十丸大腑冷方可吃療㿗方上以桃仁搗敷之亦療婦人陰腫干即易治男子陰㿗以貍陰莖燒灰東流水服之治陰卵㿉疾以地膚子作湯沐之
