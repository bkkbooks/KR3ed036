body:
  text: 卷一百四十七傷寒門傷寒雜治附論夫風寒暑濕飲食勞倦皆能為病是為五邪冬傷於寒春必病溫春傷於風夏必飧泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽是乃四時之氣然五邪所中雖不同本皆外邪大率同類惟冬時嚴寒其毒厲尤甚人或中之病在冬時則名正傷寒若邪毒藏於肌膚至春時乘溫而發者為溫病若留連日久至夏之時乘盛暑而發為暑病所謂先夏至日為病溫後夏至日為病暑是也其病傳之次先客於太陽其病令人頭項痛腰脊強其脈尺寸皆浮太陽不已傳於陽明其病體熱目疼鼻乾不得臥其脈尺寸皆長陽明不已傳於少陽其病胸脅痛而耳聾其脈尺寸皆弦少陽不已太陰受之其病腹滿體重其脈尺寸俱微太陰不已少陰受之其病口燥舌乾而渴或背微惡寒其脈尺寸俱沉少陰不已厥陰受之其病煩滿舌卷囊縮其脈尺寸俱緩病之所傳不過三陽三陰而已其未滿三日者邪在陽經未入於裡其病在表宜汗之而愈若經四日者邪入陰經其病在裡宜下之而愈特其大略爾蓋有一日而傳至數經者亦有數日而尚在太陽者陽病雖宜發汗陽明之病反宜下之陰病雖宜下之少陰之病或宜溫之由人之稟受虛盛其傳有遲速又不傳經者當審其脈證凡此六經受病五邪脈證各不同傷風者必惡風其脈浮緩傷寒者必惡寒其脈浮緊以至傷暑脈虛傷濕脈濡人迎緊盛為傷寒氣口急盛為傷食診得五邪知其本也診得六經知其標也有病雖在表而不可汗者或在裡而不可下者或若汗之太多則津液燥竭遂至亡陽下之太早則邪氣動膈乃成結胸清濁相干則變為霍亂熱毒內瘀則變為瘀血又或為發黃者濕熱相蒸也或為發斑者陽毒太盛也陽盛之人得之於熱乃為陽毒陰盛之人得之於寒乃為陰毒蟲動則為狐惑壞病之甚則為百合若勞復陰陽易之類雖瘥後猶宜節慎變態多端不可備舉當以類求之皆以適當為良惟兩感之病表裡皆受邪為難治其他或陰證似陽陽證似陰或陰盛格陽陽盛格陰者在診病者以意詳之夫人生天地之間以氣血籍其真是故天無一歲不寒暑人無一日不憂苦故有傷寒天行瘟疫之病焉蓋冬令為殺厲之氣君子善攝生者當嚴寒之時行住坐臥護身周密故不犯寒毒彼奔馳荷重之人皆辛苦之徒耳當陽閉藏而反擾動之則鬱發腠理結臟腑津液強耗為寒所搏則腠理不密寒毒與營衛相渾當是之時壯者氣行則已怯者則著而成病矣不即病者寒氣藏於肌膚之間春則病溫夏則病熱此皆一氣使然也古之治法一日在皮當摩膏而火灸之二日在膚依法解肌而發散之汗出則愈三日在肌亦發汗愈四日在胸宜吐之五日在腹六日在胃宜下之此華他之治法也若按三陰三陽之法傳變無出仲景之論蓋治傷寒有傷寒之法治雜病有雜病之方豈能異其傳者同其治調理傷寒當按定法也初得病者頭旋噁心振寒此即素問所謂因於寒欲如運樞起居如驚神氣乃浮者是也此新傷寒如仲景明六經受病傳變者乃素問所謂熱病也若病作無次第初得病表裡不明或先熱而渴不惡寒此即江南謂之黃病北方謂之汗病或長幼遽相染著又是天行時氣新傷寒輕劑散之如蔥白散和解散皆可用如六經傳變者當如仲景法有表證者麻黃湯桂枝湯有寒證互見者各半湯見里證者小承氣湯十棗湯入里深者大承氣湯半表半裡小柴胡湯見痞及結胸者瀉心湯小陷胸湯皆可用腹滿者理中丸此過太陰者也傳少陰便見厥逆脈浮細即當投四逆輩若見厥陰證當隨證用藥不可造次此大綱仲景法如河間發表則用防風通聖散雙解散入腑三乙承氣湯大柴胡湯結胸痞滿大陷胸湯輩入陰便是附子四逆湯半表半裡和解多用涼膈益元散傷暑亦依仲景用白虎湯多是桂苓甘露飲益元散備見直指方子和法發表麻黃湯青龍湯和解涼膈散下劑大承氣湯三乙承氣湯吐劑瓜蒂散溫病天行多用涼膈散尋常發表用通聖散逐去水腫必須禹功散舟車丸如常水腫用之極驗方人參輕骨散解利傷寒頭痛壯熱項背拘急骨節煩疼憎寒惡風肢體困倦大便不調小便赤澀嘔逆煩渴傷風頭痛體熱鼻塞聲重咳嗽山嵐瘴氣潮熱往來及五勞七傷心腹痞滿冷氣奔沖攻注刺痛又治婦人血氣撮痛經候不調貝母去心白茯苓焙半夏煮各一兩枳殼去瓤炒二兩半蒼朮泔浸一宿六兩人參白朮焙白芷不見火陳皮去白秦艽去蘆赤芍藥各二兩川芎當歸去蘆焙肉桂去粗皮乾薑炮各一兩半柴胡去蘆麻黃去根節各三兩桔梗去蘆甘草炙各四兩厚朴薑製四兩上細末每服三錢水一盞薑三片同煎至七分通口服身體倦加烏梅一個咳嗽加棗子二枚同煎不拘時服蔥白散解四時傷寒頭痛壯熱項背拘急骨節煩疼憎寒惡風肢體困倦大便不調小便赤澀嘔逆煩渴不思飲食及傷風頭痛體熱鼻塞聲重咳嗽痰涎山嵐瘴氣時行疫癘並皆治之川芎蒼朮米泔浸白朮各二兩甘草炙石膏煅乾葛焙各一兩麻黃去根節三兩上細末每服三二錢水一盞薑三片蔥白二寸煎至七分熱服不拘時候要出汗並三服厚蓋取汗效神仙百解散一名神仙截傷寒四季加減百解散治傷寒無問陰陽二證其間所用藥味各隨經絡治病如傷寒在表未傳入經發熱惡寒腰痛連進二服汗出而愈若已傳經絡胸滿短氣肢體煩疼目睛微痛耳聾口燥咽乾或渴不渴手足自溫或肢厥自利或不自利小便反快服之則調中順氣祛逐寒邪如頭面感寒風傷腠理頭痛項強發熱憎寒鼻流清涕咳嗽涎痰及治風濕相搏骨節煩疼肢體沉重灑淅惡風時自汗出此藥大能調順三焦解表救里溫潤肺經正四時之氣升降陰陽進美飲食不問傷風傷寒中暑中暍骨蒸頭疼氣逆胸滿失飢吐逆眩暈噁心及已經汗後不解下之不當吐之不中此藥清而不涼溫而不壅無問老人虛人丈夫婦人孕婦小兒並宜服之如連進二服無不取效春常服免瘟疫之疾不中暑暍之病秋服之即無瘧痢冬服之不感寒毒真神仙衛生妙藥也功效不可盡述山茵陳一兩柴胡去蘆前胡人參羌活獨活甘草蒼朮米泔浸銼炒藿香去梗白朮半夏薑汁製各一兩乾葛白芍藥升麻防風去蘆藁本去蘆立春以後不加減立夏以後一料加柴胡一分赤茯苓當歸各一兩立秋以後減柴胡一分不用當歸茯苓只加乾薑炮肉桂去粗皮各一兩分麻黃去節半兩立冬以後並無加減一方無當歸有黃芩去蘆半兩上為細末每服三錢水一盞半薑三片棗三枚煎至一盞熱服不計時候並進二服如要表散加蔥白三寸淡豆豉三十粒同煎服以衣被蓋覆汗出而愈一方無山茵陳前胡八解散出和劑方治四時傷寒頭疼壯熱傷風多汗及療勞傷過度骨節痠疼飲食無味四肢疼倦行步喘乏面色萎黃怠惰少力咳嗽寒熱羸弱自汗胸膈不快嘔逆噁心人參去蘆茯苓甘草炙陳皮去白白朮藿香去土各一兩厚朴去粗皮銼生薑自然汁浸一宿炒紫色二兩半夏湯洗七次一兩上為細末每服二錢水一盞生薑三片棗子一枚蔥白三寸同煎至七分溫服不拘時候白朮散出危氏方治傷寒氣脈不和憎寒壯熱鼻塞腦悶涕唾稠黏痰嗽壅滯或冒涉風濕憎寒發熱骨節疼痛或中暑嘔吐眩暈及大病後將理失宜食復勞復病證如初又治五勞七傷氣虛頭眩精神恍惚睡臥不寧肢體倦怠潮熱盜汗脾胃虛損面色萎黃飲食不美口吐酸水臟腑滑泄腹內虛鳴反胃吐逆心腹絞痛久瘧久痢及膈氣咽塞上氣喘促坐臥不安或飲食所傷胸膈痞悶腹脅膨脹婦人胎前産後血氣不和霍亂吐瀉氣厥不省人事常服闢四時不正之氣及山嵐瘴疫神效不可具述山藥桔梗茯苓去皮甘草白芷陳皮去白青皮去白香附子各三錢兩白朮四兩乾薑炮三二兩上為細末每服二錢水一盞薑三片棗一枚木瓜幹一片紫蘇葉三片煎七分食前服若吐瀉入白梅煎喘入桑白皮杏仁煎傷寒再復入薄荷膈氣入木通三寸麝香少許中暑嘔逆入香薷産前産後氣血不和入荊芥煎霍亂入藿香煎氣厥入鹽湯調下一方無陳皮嗽入粟殼烏梅煎藿香正氣散出德生堂治傷寒頭疼憎寒壯熱上喘咳嗽五勞七傷八般風痰五般膈氣心腹冷痛反胃嘔惡吐瀉霍亂臟腑虛鳴山嵐瘴瘧遍身虛腫婦人産前産後血氣刺痛小兒疳傷並宜服之大腹皮白芷紫蘇茯苓去皮各一兩半夏曲白朮陳皮去白厚朴去粗皮薑汁炙苦梗各二兩藿香去土三兩甘草炙二兩半上為細末每服二錢水一盞薑三片棗三枚同煎至七分熱服如欲出汗衣被蓋如再汗不出加蔥白二根煎服冷嗽喘滿每服加人參一錢鹽梅一個杏仁七粒去皮尖北五味子十粒就吞青州白丸三五十粒效氣促氣壅加人參一錢沉香五半錢心腹痛加木香半錢玄胡索七粒切焙嘔惡甚加生薑三片木瓜二片痰嘔加烏梅一個寒濕腰痛心腹膨滿加生薑三片木瓜二片蒼朮切炒枳殼煨去瓤各半錢檳榔半個切片一方治憂鬱血氣流注遍體刺痛緊滿加木香一錢縮砂五粒名增減順氣木香丸荊芥散出和劑方治傷寒頭疼鼻塞流涕聲重咽乾胸膈滿悶頭痛如破天南星浸洗生薑自然汁煮軟切焙乾草烏頭炮去皮臍荊芥穗各半兩石膏研一兩上為細末每服二錢陳茶末一錢生薑自然汁半呷薄荷三葉水二盞同煎八分通口服赤散出千金方治傷寒頭痛項強身熱腰脊痛往來有時乾薑防風沙參細辛白朮人參蜀椒茯苓麻黃黃芩代赭桔梗吳茱萸各一兩附子二兩上治下篩先食酒服一錢匕日三鐵精湯出千金方治三陰三陽厥逆寒食胸脅脹滿不能言氣滿胸中急肩息四肢時寒熱不隨喘悸煩亂吸吸少氣言輒飛揚虛損黃鐵三十斤以流水八斗揚二三千遍炭五十斤燒鐵令赤投冷水中又以燒七遍如此澄清取汁二斗煮藥半夏麥門冬各一升白薇黃芩甘草芍藥各四兩人參三兩石膏五兩生薑二兩大棗三二十枚上㕮咀納前汁中煮取六升服一升日三服兩日令盡百解散出百一選方治傷寒頭痛肢體沉重惡寒發熱痰逆咳嗽困倦少力及偏正頭疼此藥專解截四時傷寒常服清神爽氣瘟疫瘴癘不生防風去蘆三兩半麻黃去蘆根三兩半白芷白芍藥各二兩川烏半兩炮去皮尖甘草菊去枝葉荊芥穗乾薑各三兩上為細末每服二錢蔥茶或蠟茶點服不拘時候煎服亦可正氣散出和劑方治傷寒陰證憎寒惡風正氣逐冷胸膈噎塞脅肋膨脹心下堅痞滿吐利嘔逆酸水咳逆怠惰嗜臥不思飲食甘草炒七錢陳皮藿香葉白朮各一兩厚朴半夏同厚朴各三兩為末生薑四兩研爛同為餅子微炒上為細末每服二錢薑三片棗一枚水一盞煎至七分食前熱服又治久患瘧疾膈氣心痛日三服常服寬中闢除瘟疫辰砂五苓散出和劑方治傷寒表裡未解頭痛發熱心胸鬱悶唇口乾焦神思昏沉狂言讝語如見神鬼及治瘧瘴煩悶未省者辰砂研白朮去蘆木豬苓去黑皮澤瀉洗銼赤茯苓去皮各十二兩肉桂去粗皮八兩上為細末每服二錢沸湯點服不拘時如中暑作渴小便赤澀新汲水調下小兒五心煩熱焦燥多哭咬牙上攛欲為驚狀服半錢熟水調杏子湯出危氏方治陽明傷風能食口苦咽乾腹滿微喘發熱惡風自汗嗜臥身重小便難潮熱而噦其脈浮弦長而數悉主之杏仁去皮尖半夏湯洗去滑五味子各二錢半芍藥桂心細辛乾薑炮大黃蒸甘草各三錢炙茯苓四錢上㕮咀每服四錢水一盞半煎至七分去滓食前服白朮散出宣明論治傷寒雜病一切吐瀉煩渴霍亂虛損氣弱保養衰老及治酒積嘔噦等證白朮茯苓去皮人參各半兩甘草一兩半炙木香一分藿香半兩葛根一兩上為細末白湯調下二錢煩渴者加滑石二兩甚者加薑汁續續飲之茯苓半夏湯出宣明論治傷寒雜病一切嘔吐或喘咳疼痛痞滿痛者茯苓一分去皮半夏一錢生薑一分取汁上銼如麻豆大水一大盞煎至四分絞汁下生薑汁溫服不計時候一方加黃芩去腐甘草陳皮去瓤各一分治風痰解肌湯出經驗良方治大人小兒傷寒熱病大人全服麻黃去節半兩冬用七錢半人參川芎芍藥獨活各半兩分前胡二錢半上㕮咀每服四錢水半盞生薑一片薄荷二葉煎至三分去滓三歲以下小兒一服分作三服口乾加乾葛二錢半川芎茶調散出和劑方治男女諸風上攻頭目昏重偏正頭疼鼻塞聲重傷風壯熱肢體煩疼肌肉蠕動膈熱痰盛婦人血風攻疰太陽穴疼但是外感風氣悉皆治之薄荷葉不見火八兩川芎荊芥去梗各四兩香附子炒八兩防風去蘆一兩白芷羌活甘草爁各三兩上為細末每服二錢食後茶清調下常服清頭目一方無香附子增損四順湯治少陰病寒多表無熱但苦煩憒默默而極不欲見光有時腹痛其脈沉細而不喜渴經日不瘥舊用四順湯除根其熱不甚用也若少陰病下利而體猶有熱者不可復與黃連龍骨湯若已十日余而下利不止手足徹冷及無熱候者可服甘草三二兩炙人參二兩龍骨二兩黃連乾薑各一兩附子中形者一枚炮上切以水六升煮取二升分再服不瘥復作甚良若下而腹痛加當歸二兩嘔者加橘皮一兩忌海藻菘菜豬肉冷水陟釐丸出浩京方治少陰病二十日後下不止陟釐四兩不用陳者當歸四兩漢防己三兩黃連三兩紫石英別搗末細研三兩豉三升厚朴三二兩炙苦酒五升上切以二升苦酒漬防己一宿出切炙之燥復納苦酒中浸又以三升苦酒漬豉一宿小蒸之研絞取汁搗下篩諸藥以酒豉和之丸如梧桐子大冷漿水服二十丸丸極燥乃可服忌豬肉冷水通氣丸治少陰不足腎氣微少忽為寒熱太陽下陷入腎中腎氣奔迪內動三焦或發熱頭疼咳嗽痰促或右脅牽痛或傳為疹子等證不一其脈左尺沉而弦按之則虛大而澀此方主之又治上氣神驗葫蘆巴一兩炒補骨脂七錢半玄參五錢杜仲一兩炒斷絲川楝子一兩半酒浸三稜五錢羌活茴香各五錢麻黃去節二錢春夏三錢上為細末麵糊為丸空心薑湯下五七十丸鹽酒下亦可順解散出百一選方治傷寒凡初受疾未分陰陽表裡皆可服之蒼朮半斤藁本水浸桔梗甘草防風獨活各四兩厚朴薑汁炒陳皮各二兩上為細末每服二錢生薑七片水一盞半煎至八分去滓溫服祭酒朴謙之説韶州醫人劉從周云盛夏發熱有傷寒冒暑二證若熱有進退則為冒暑若一向熱而不間斷者則為傷寒但當以此別之普救散出經效濟世方一名不傳散治解四時傷寒肌熱惡寒頭疼身痛汗與未汗但是陰陽二證皆可服蒼朮半斤去皮淨炒葛根四兩甘草二兩炙上為細末每服二錢水一盞半煎至七分去滓溫服或加蔥白三寸一方蒼朮米泔浸不炒甘草生用或只入山茶蔥湯調下亦得服藥訖欲出汗者須衣被蓋之酒調亦得萬安散出經驗良方治傷寒輕清發散紫蘇葉陳皮香附子去毛桔梗微炒白芷半夏湯泡薑製甘草前胡去蘆藁本各一兩乾葛二兩上為粗末每服五錢水一大盞生薑五片棗一枚煎八分去滓食前服加減法如後如熱多口渴心煩臟腑堅硬再加前胡少許口渴臟腑稀加乾葛少許嗽加桑白皮少許欲出汗極熱服無汗加麻黃去節少許體虛不出汗加桂少許風赤眼羞明不開再加前胡半兩無大熱出汗太過加麻黃根少許六君子湯出德生堂治傷寒汗下之後將見平復宜服此調理助脾進食辟邪氣大妙人參白朮黃耆白茯苓甘草山藥各等分上㕮咀每服四錢水一盞半生薑三片棗一枚同煎至七分去滓溫服不拘時候此溫之輕劑如渴加乾葛烏梅煎大便自利加陳皮厚朴砂仁肉豆蔻煎餘熱加銀州柴胡煎對金飲子出德生堂治諸疾無不愈者然傷寒後病退調理大宜用常服固元陽益氣血健脾進食和胃祛痰自然榮衛調暢寒暑不侵此藥療四時傷寒極有功效厚朴甘草蒼朮各二兩陳皮四兩一方炒黃半斤一治四時瘟疫之氣二毒傷寒頭疼發熱加淡豆豉三十粒蔥白三根同煎一治五勞七傷手足心熱煩躁不安肢節疼痛加柴胡半兩羊筒髓骨捶碎或豬筒骨亦可煎服一治痰嗽瘧疾寒熱之證加草果檳榔烏梅半夏同煎一治小腸疝氣疼痛發寒熱者加鹽炒小茴香同煎一治大便虛滑頻見加肉豆蔻一兩用麵裹煨過白朮一錢同煎一治發熱口乾加地骨皮銀州柴胡烏梅同煎一治赤白痢赤痢加黃連白痢加吳茱萸煎一常服固陽益氣健脾和氣祛痰自然寒暑外邪不侵加人參白朮黃耆同煎有虛汗加浮麥煎一治病後體虛加羊筒髓骨或豬筒髓骨其骨或捶碎同煎此汗之溫劑服數劑汗出得安如未得汗以稀粥投之厚蓋衣服取汗立愈如水氣腫滿加桑白皮煎婦人帶下加黃耆煎酒傷加丁香食傷加良薑四時渲瀉加肉豆蔻風疾加荊芥穗腿膝冷疼加牛膝渾身拘急及虛壅加地骨皮腿痹加菟絲子頭風加藁本轉筋霍亂加楠木皮以上助使只加一銖此藥不問老少胎前産後五勞七傷六極八邪耳鳴眼昏夢泄盜汗四肢沉重腿膝痠疼婦人宮臟久冷月水不調若能每日空心一服即美顏容豐肌體調三焦壯筋骨祛冷氣快心胸神效莫可盡述上㕮咀每服五錢水一盞半生薑三片棗一枚同煎至七分去滓溫服不拘時候其滓再煎日進二三服雙解散出經驗良方治傷寒渾身壯熱氣粗煩渴多汗升麻乾葛甘草荊芥蔓荊子薄荷天麻殭蠶知母貝母各半兩上為細末每服四錢水一大盞薑三片蔥白一莖煎至五分去滓溫服小兒分作三服通關散出和劑方治中風傷寒發熱惡風頭疼目眩鼻塞聲重肩背拘急身體痠疼肌肉瞤動牙關緊急久新頭風攻疾眼暗並宜服之撫芎二兩川芎一兩川烏二兩薄荷一兩白芷甘草各二兩細辛半兩上為細末每服一大錢蔥白茶清調下薄荷湯亦得不拘時候破證奪命散出百一選方治傷寒陰陽二證不明或投藥錯誤以致患人困重垂死七日以後皆可服傳者云千不失一用好人參一兩去蘆薄切水一大升銀石器內煎至一盞新水沉之取冷一服而盡汗不自他出只在鼻梁尖上涓涓如水是其應也妙慧蘇韜光云侍郎方公曾救數十餘人余宰清流日倅車申屠行父之子婦産後病時疫二十餘日已成壞證偶見問因勸其服一味人參遂安是時未知有此方適偶然暗合耳一方有生薑桂附湯出危氏方治足少陰腎經傷風胸滿心煩咽喉痛自汗腰連胻骨痠痛嘔逆吐涎沫頭痛其脈沉弦者附子生去皮臍桂心乾薑芍藥甘草炙茯苓桃仁去皮尖麩炒各一兩上為散每服四錢水二盞煎至七分去滓食前服或咽痛加桔梗半兩八物湯出危氏方治足厥陰肝經傷風惡風而倦自汗小腹急痛寒熱如瘧骨節煩疼其脈尺寸俱微而遲者桂心當歸川芎前胡防風各二三兩芍藥一兩半甘草炙茯苓各半兩上銼散每服四錢水一盞半薑五片棗三枚煎八分去滓空心溫服青膏方出千金方治傷寒頭痛項強四肢煩疼者當歸芎藭蜀椒白芷吳茱萸附子烏頭甘草各三兩上㕮咀以醇苦酒漬之再宿以豬脂四斤煎令藥色黃絞去滓以溫酒服棗核大三枚日三服取汗不知稍增可服可摩如初得傷寒一日苦頭痛背強宜摩之佳黃膏方出千金方治傷寒赤色頭痛項強賊風走風者大黃附子細辛乾薑蜀椒桂心各半兩巴豆五十枚上㕮咀以醇苦酒漬一宿以臘月豬脂一斤煎之調適其火三上三下藥成傷寒赤色發熱酒服梧桐子大一枚又以火摩身數百過兼治賊風絶良遊風走肌膚遊風所在摩之神效白膏出千金方治傷寒頭痛向火摩身體酒服如杏核一枚溫覆取汗摩身當千過藥力乃行並治惡瘡小兒頭瘡牛領馬鞍皆治之先以鹽湯洗瘡以布拭之敷膏癰腫火炙摩千過日再自消天雄烏頭莽草羊躑躅各三兩上㕮咀以苦酒三升漬一夕作東向露灶又作十二聚濕土各一升許大取成煎豬脂三斤著銅器中加灶上炊以葦薪令籜納所漬藥炊令沸下著土聚上沸定復上如是十二過令土盡遍藥成去滓傷寒咽喉痛含如棗核大一枚日三摩時令勿近目蔥豉湯出肘後方治傷寒有數種庸人不能分別今取一藥兼療者若初覺頭痛肉熱脈洪起一二日便作此方蔥白一握豉一升綿裹上以水三升煮取一升頓服取汗若汗不出更作加葛根三兩一方更加升麻三兩水五升煮取二升分溫再服徐徐服亦得必得汗即瘥若不得汗更作加麻黃三兩去節以蔥白湯研米三合水五升煮之少時下鹽豉納蔥白四根令火煎取三升分服出汗為妙又方出肘後方用豉一升綿裹以童子小便三升煮取二升分溫再服汗出為效五積散出濟生拔萃方調中順氣除風冷化痰治脾胃宿冷腹脅脹痛胸膈停痰嘔逆噁心或外感風寒內傷生冷心腹痞悶頭目昏痛肩背拘急肢體怠惰寒熱往來飲食不進及婦人血氣不順心腹撮痛經候不調或閉不通並治白芷川芎甘草茯苓去皮當歸去蘆肉桂去粗皮芍藥半夏洗七次各三兩陳皮去白枳殼去瓤炒麻黃去根節各六兩蒼朮米泔浸去皮二十四兩厚朴去粗皮四兩人參二兩一方無人參乾薑爁四兩桔梗去蘆頭十二兩上㕮咀每服四錢水一盞半生薑三片蔥白連根三寸煎至六分去滓食前熱服尋常皮風濕氣交互為病頸項強直或半身偏疼或肢體麻痹宜用此藥加麝香少許煎服寒濕腰疼每服加桃仁七枚去皮尖微炒碎之同煎服婦人經候不調心腹撮痛或閉壅不通加醋一合腹中血塊尤宜服之滿身痛加白膠香太陰經傷寒手足逆冷或積聚腹痛及虛汗不止脈細疾面青嘔吐加熟附子數片炒茴香一捻冷氣加煨薑三片鹽少許煎腳氣下疰焮然赤腫憎寒壯熱亦加大黃一錢利之久虛脾泄瀉傷食腹痛冷瀉不止加用略炒過陳米一撮烏梅一個煎名和氣散特效心腹膨脹不食亦效乳癰初作加川牛膝生地黃各二根産後或尋常血氣痛加木香延胡索半錢醋炒陳艾葉七片烏藥半錢婦人體虛腳疼加川烏去皮臍夏令熱寒氣折之秋髮寒疫大效一治感冒四時傷寒之病先服前方發散諸藥不效者二三日後汗不出表裡未解此乃二汗證傳經必先問患者渴與不渴大便虛實熱與不熱身上有無紅靨或有自利者三有嘔逆者有狂言譫語者變證不一須要詳審是何病證依方對證服藥宜以小柴胡四湯服之如有後證加減依方用藥如後方五積散性溫敗毒散性涼凡人偶些小感冒五對半析和煎服名交加散亦多驗小小感冒因風雨寒冷所襲猝然劇之正氣未耗六邪氣未深用此前數方先以助其氣使益壯則邪氣自當屏散若倉卒藥未能辦只以七蔥白鬚數莖淡豆豉一捻生薑數片水煎熱啜連進三兩盞亦能發散邪氣已入八經絡及時行疫癘則須依經按法表裡汗下不可差殊喝起散蒼朮泔浸麻黃去節荊芥各二兩石膏煅三兩大黃一兩栝蔞根乾葛芍藥白芷甘草各一兩上為細末每服二錢水一盞半生薑三片蔥白三寸煎至七分食前服川芎湯出神效方解利一切傷寒川芎藁本蒼朮上件各等分為細末沸湯點三錢須臾覺嘔逆便解如不解再服不臥散出神效方川芎一兩半石膏七錢半藜蘆半兩去土甘草二兩半生上為細末口噙水鼻內各嗅之少許吃白湯半碗汗出解白芷散出百一選方治傷寒鼻塞出清涕不已香白芷一兩荊芥一錢重上為末臘茶清調服如不用荊芥薄荷一錢亦佳清膈湯專一發散四時不正之氣及傷寒未分證候瘡疹欲出未出並宜服之又療脾寒瘧疾潮熱往來狀如骨蒸久而耳黯唇青面色黧黑口苦舌乾四肢倦怠飲食無味苦桔梗荊芥穗薄荷葉紫蘇葉甘草節栝蔞根牛蒡子乾葛各等分上各無