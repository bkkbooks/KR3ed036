半煎至八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以被繞腰以下溫令微汗瘥甘草麻黃湯治四肢腫水氣在皮膚甘草二兩麻黃四兩上以水五升先煮麻黃去上沫納甘草煮取三升溫服一升重覆汗出不汗再服慎風寒麻黃附子湯治水病發汗已其脈沉小麻黃三兩甘草三二兩附子一枚炮上以水七升先煮麻黃去上沫納諸藥煮取二升半溫服八分日三服華他赤散治傷寒頭痛身熱腰背強引頸及風口噤瘧不絶婦人産後中風寒經閉腹大丹砂十二銖蜀椒蜀漆乾薑細辛黃芩防己桂心茯苓人參沙參桔梗女萎烏頭各十八銖雄黃一十四銖吳茱萸三十銖麻黃代赭各三二兩半上治下篩酒服方寸匕日三耐藥者倍覆令汗出欲治瘧先發一時並服藥二匕半以意消息之細辛薑桂心丹砂雄黃不熬余者皆熬之實表散治腠理不密易致感冒先服此藥則感冒自然解散附子炮去皮臍蓯蓉酒浸一宿焙乾細辛去葉五味子各等分上為粗末以四味黃耆建中湯相對合和令停如本方煎服不過三四即安妙甚有理治傷寒用梅實三十枚去核以豉一升苦酒三升煮取一升半去滓服治傷寒有數種庸人不能分別今復取一藥兼治天行病若初覺頭痛內熱脈洪起至二日用葛根四兩水三升納豆豉一升煮取半升服搗生葛根汁尤佳主一切傷寒用甘草如中指長炙銼取童子小便一升煎七合空心服日再服治老少晚發傷寒三月至年末為晚發方名梔子升麻湯生地黃一斤打碎梔子三十枚擘升麻三兩柴胡石膏各五兩上五味切以水八升煮取三升分五服頻頻服若不解更服若頭面赤去石膏用乾葛四兩無地黃用豉一升煮取三升分三服忌蕪荑雪煎治傷寒麻黃十斤杏仁三斗四升大黃一斤十二兩如金色者上三味㕮咀以雪水五斛四斗漬麻黃於東向灶釜中三宿納大黃攪令調炊以桑薪煮得二斛汁去滓復納釜中搗杏仁納汁中復炊之可餘六七斗汁絞去滓置銅器中又以雪水三斗合煎之攪令調得二斗四升藥成可丸冷凝丸如彈子大有病者以三沸白湯五合研一丸入湯中適寒溫服之立汗出若不愈者復服一丸蜜盛藥勿令泄氣神仙百解散出衛生家寶方治男子婦人四時傷寒八般痞氣山嵐瘴瘧渾身壯熱憎寒或中暑或風疾灌注曲攣手足咽喉噎塞十種膈氣不思飲食無論百病初覺意思不快便先進一二服無不克效婦人産前産後及小兒一歲有病皆可服之白朮茯苓各二兩藿香葉去土橘皮去瓤甘草炙半夏擘破生薑汁製厚朴薑汁蘸炙各三兩上先將厚朴半夏為粗末用生薑四兩爛研同厚朴半夏一處拌勻於淨器中淹一宿次日焙乾卻入前五味藥拌和勻並搗為粗末每服四錢水一盞半生薑五片或七片煎七分去滓熱服傷寒並吃二服常服寬中進食或冷物傷脾臟腑不調並皆治之神效柴胡散出十便良方治邪入經絡體瘦肌熱推陳致新解利傷寒時氣中暍伏暑柴胡四兩甘草一兩上為細末每服二錢水一盞同煎至八分食後熱服此藥冬月可以潤心肺止咳嗽除壅熱春夏可以御傷寒時氣解暑毒常不可闕兼不以長幼皆可服之倉卒可以便得一方治急傷寒急傷寒氣不能言斯病難醫永無傳半夏研來熱酒飲時間免得赴黃泉一方治傷寒傷寒不覺甚半錢好茱萸水煎空心服所患即消除發汗散治傷寒一米二芎四萆麻諸般發汗不如他依方修合休交錯強如神仙聖手拿神仙不臥散出德生堂解利四時傷寒並一切風疾細辛甘草人參藜蘆川芎各等分石膏半兩上為末詞曰管甚傷寒壯熱遍醫夾腦頭風若嗅一字在鼻中嗅下教賢無病五苓散治傷寒溫熱病表裡未解頭痛發熱口燥咽乾煩渴引水水入即吐或小便不利及汗出表解煩渴不止者宜服之亦治霍亂吐利方見傷暑門以五苓散加甘草一兩炙夫疫雖以三五種而成若天行時病多假六淫及錯悶郁折而致之者既有寒溫兩疫風濕豈可不辨但證似傷寒而脈色不同與夫一方相染長幼同病即當作疫治除闢法外治濕用五苓散加炙甘草治風用桂枝湯加黃芩無不愈者其餘淫邪交結互織當以類推之治主一切天行病上取白藥研如面漿水一大盞空腹服之便仰臥一食頃候心頭悶亂或噁心腹內如車鳴㽱痛良久當有吐利數行勿怪欲服藥時先令煮漿水粥於井中懸著待冷若吐利過度即吃冷粥一碗止之不吃即困人治時行熱病亦堪發汗甚有功上用浮萍草一兩四月十五日者麻黃去節根桂心附子炮裂去皮臍各半兩四物搗細篩每服二錢以水二中盞入生薑半分煎至六分不計時候和滓熱服汗出乃瘥又治惡疾遍身瘡者取水中浮萍濃煮汁漬浴半日多效此方甚奇也火焰散出永類鈐方治傷寒惡候舶上硫黃附子去皮生用新臘茶各一兩上為細末先將好酒一升調藥分入大新碗口中於火上攤蕩令乾合於瓦上每一碗下燒熟艾一拳大以瓦支起無令火著直至煙盡冷即刮取細研入瓷合盛每服二錢酒一盞共煎七分有火焰起勿訝傷寒陰毒者四肢冷脈沉細或吐或瀉五心煩躁胸中結硬或轉作伏陽在內湯水不下先吃一服如吐卻更進一服服後心中熱其病已瘥下至臟腑中如表未解渾身壯熱脈氣洪大宜用發表藥或表解者更不發熱便得眠臥渾身有汗若少有痞結脈實方可下隔行臟腑藥漸用調和脾胃補治元氣之藥也急提盆散出千金方雜病非陰候者主之上用草烏頭不以多少生研極細為末蔥一枝肥者削去須頭圓上有蔥汁溫蘸之縱入穀道中治病後發亂不可理通頭法上生麻油二升將發解開安淨銅沙羅中用油淹漬之細將叉子領發斯須並自通一方出肘後方治傷寒手足疼欲死上取牛屎煮汁以灌之瘥止亦療時疾陰囊及莖熱腫亦可煮黃柏洗之無憂散出危氏方治傷寒調理失序毒氣內結胸腹脹滿坐臥不安日久不瘥狂言妄語大小便不通或復吐逆臘月黃牛膽以天南星為末置膽內縛令緊當風避日懸之候乾取用上為末以人參半兩煎湯七分盞調末二錢乘熱服遲頃更以熱人參湯投之或唾便溺下黃黑惡物是效治傷寒阮河南蒸法上以薪火燒地良久掃除去火可以水小灑取蠶砂若桃葉桑柏葉諸米粳及麥麩皆可趣用易得者牛馬糞亦可用但臭耳桃葉欲落時可收取干之以此等物著火處令厚二三寸布席臥上溫覆用此發汗汗皆出若過熱當審細消息大熱者可重席汗出周身輒使止當以溫粉粉身勿令遇風治暴傷寒用荊芥豉汁煎服之治傷寒無論陰陽神驗方用皂角一梃肥者燒令赤為末以水五合和頓服陰陽傷寒以酒和服治太陽傷寒用栝蔞根二兩水五升煮取一升半分二服小便利即瘥神丹丸出聖惠方治傷寒脈澀惡寒發熱體痛硃砂二兩細研水飛過附子一兩半炮裂去皮臍赤茯苓一兩川烏頭一兩半炮裂去皮臍半夏一兩湯洗七次去滑人參一兩去蘆頭上為末煉蜜和丸如梧桐子大每服以生薑湯下五丸良久吃熱粥一盞投之得汗為度若不汗汗少不解復服如前法若得汗足應解而不解者當服桂枝湯此藥多毒熱者令飲水寒者溫飲解之治瘧先發服二丸要略用細辛不用人參別有射干棗一枚名赤丸治寒氣厥逆六味青散方出聖惠方川烏頭一兩炮裂去皮臍桔梗一兩去蘆頭白朮一兩附子一兩炮裂去皮臍防風一兩去蘆頭細辛一兩上為散每服二錢以生薑湯調服服藥後食頃不汗出者飲稀粥一盞以發之暖覆汗出漐漐可也勿令流離汗出若汗大出不止者溫粉粉之如未得汗者當更服之以得汗為度橘皮湯出聖惠方治太陰病不解雖暴煩下利日十餘行而自止所以自止者脾家實腐穢已去故也陳橘皮一兩湯浸去白瓤焙生薑一兩上細銼和勻分為四服每服以水一中盞煎至六分去滓不計時候溫服桂枝芍藥湯出聖惠方治太陰病下之後腹滿時痛桂枝赤芍藥人參去蘆頭各一兩甘草半兩炙微赤銼上為散每服四錢以水一中盞入生薑半分棗三枚煎至五分去滓不計時候熱服一方無甘草朮附子湯出永類鈐方治風虛頭重眩苦極不知食味暖肌補中益精氣白朮二兩附子一枚半炮去皮甘草一兩炙上銼每五錢匕薑三片棗三枚水一盞半煎至七分去滓溫服七物黃連湯治夏月傷寒四肢煩疼發熱其人喜煩嘔逆肢滿劇如遇祟寒熱相搏故令喜煩黃連十八銖茯苓十八銖黃芩十八銖芍藥葛根各一兩甘草一兩六銖小麥三合上各㕮咀以水七升煮取三升冷分三服不能一升者可稍稍服之勢安乃臥藥主解毒氣服後胸中熱及咽喉痛皆瘥其明日復煮一劑如法服之此湯無毒但除熱下氣安病人小兒服者取三分之一以水四升煮得二升稍稍服柴胡飲子解利大人小兒傷寒餘熱不已柴胡黃芩人參甘草升麻地骨皮赤茯苓赤芍藥龍膽草各半兩上㕮咀每服四錢水一盞加薄荷沙糖同煎七分溫服無時小兒分作三服加減五苓散藥中之寶五苓散專治傷寒有大功陽證見時須去桂陰加附子水煎澄狂言亂語辰砂末頭目疼痛入川芎咳嗽多加五味子心氣不定麥門冬胃中嘔逆人參妙痰多半夏喜相逢定喘馬兜鈴最好蒼朮去濕腹中空小便閉澀加瞿麥黃芩能教大便通腹中氣塊三稜末青皮能退熱如烘麻黃用根除盜汗下部赤腫便椒紅飲水煩渴加乾葛鼻衄烏藥卻為功眼中黃色茵陳妙勞復桔梗有神功目赤令添赤芍藥茵陳退腫又相逢眼目肉赤石膏末陳皮止瀉又參同急醫水氣甜葶藶伏暑燈心浸水中二十四證真妙訣專心盡救效無窮半夏橘皮湯治傷寒雜病嘔噦風眩痰逆咳喘頭痛並風熱反胃吐食諸證半夏炮如法陳皮湯浸洗去瓤甘草炙人參茯苓黃芩去腐心各一分葛根半兩厚朴去皮一分上銼如麻豆大用水三盞生薑一分煎至一盞半絞取汁分二服食後溫服真方不換金正氣散治四時傷寒五種膈氣和脾胃止吐瀉溫中下痰飲止腹痛脹滿吞酸噫痞噎塞乾嘔噁心內受寒濕外感風邪身體沉重肢節痠疼頭昏鼻塞未分陰陽之間尤宜服之則氣自正而邪氣退及能止汗解山嵐瘴氣八般瘧疾遍身浮腫五勞七傷或風氣所灌手足腫痛全不思飲食孕婦産後産前皆可服餌霍亂吐瀉心腹疼痛又治脾氣虛弱臟腑時鳴小兒脾胃不和時氣諸疾及治四方不伏水土凡過嶺南此藥不可闕之厚朴一二兩去粗皮銼如韭葉闊長半寸以生薑自然汁淹一宿半夏二兩湯洗七次以生薑四兩取汁浸旬日曬候汁盡為度橘紅二兩甘草二兩銼炒過用藿香二兩取葉水洗蒼朮二兩去皮米泔浸一宿切作片子上先用砂鍋炒厚朴令香次入蒼朮炒令紫色又半夏炒香熟又入甘草炒黃又入橘紅炒破方始將藿香葉二兩斡開衆藥安藿香葉在中心用藥遍蓋罨定少時約藿香葉乾方可用取出同為粗末每服二大錢水一大盞生薑五片棗子一枚煎至七分去滓空心服食前亦可常服和一切氣永無瘟疫此乃不換金真方也煎時不得犯銅鐵器黃連龍骨湯治少陰脈沉腹痛咽痛苦煩體猶有熱黃連一兩黃芩芍藥各一兩分龍骨半兩上分三服每服水一盞半煎至八分去滓服葛根湯葛根一兩麻黃三分熱湯泡去黃汁焙乾甘草半兩炙桂枝去粗皮芍藥各半兩上煎煮服餌如桂枝湯小青龍湯麻黃去節半夏湯洗芍藥細辛乾薑甘草炙桂枝去粗皮各三分五味子二錢上銼如麻豆大每服用八錢水一盞半生薑四片煎至七分絞汁溫服木香檳榔丸木香檳榔青皮去瓤陳皮去白商枳殼麩炒去瓤廣朮炮溫黃連各一兩黃柏皮香附子揀炒大黃銼炒各三兩黑牽牛半斤生取頭末四兩上為細末滴水和丸如梧桐子大每服三十丸或五十丸至微利為度食後生薑湯送下化鐵丹烏梅八個不去皮巴豆十六個不去皮油胡椒四十八粒陳皮去白五錢上為細末醋煮麵糊為丸如緑豆大每服五丸至七丸食後溫生薑湯送下枳殼丸京三稜炮三兩二錢蓬莪朮炮三兩二錢白朮一兩半青皮去白一兩五錢陳皮去白一兩五錢檳榔一兩木香一兩枳殼麩炒去白一兩白茯苓去皮一兩半半夏湯洗七次一兩黑牽牛炮二兩上為細末水麵糊為丸如梧桐子大每服五十丸溫生薑湯送下食後服之一方無牽牛一名導飲丸木香三稜丸出集方書木香一兩京三稜二兩蓬莪朮炮三兩大麥糵微炒六四兩黑牽牛微炒六兩一方用牽牛一十二兩取六兩頭末上為細末生薑汁麵糊和丸如梧桐子大每服三十丸食後生薑湯送下朮附湯出十便良方若但寒頭重則眩暈肌肉痠疼牽急不得轉側漐漐汗出惡寒小便不利大便反快短氣眩暈足寒或時咽痛發熱此由寒濕之邪客搏經絡陽氣不得發泄蘊於肌肉之間謂之寒濕之邪其脈遲為小弦蒼朮四兩芍藥茯苓各三兩人參甘草各一兩附子一兩半上為粗散每服五錢水二盞煎一盞去滓溫服通解散出直指方治四時傷寒內外一切所傷蒼朮四兩輕杵去粗皮甘草二兩滑石六兩黃芩二兩石膏四兩上件同為粗末每服三錢水一盞煎至七分去滓溫服日進四服如發汗用蔥白鹽豉同煎熱服如和解用生薑五片棗五枚去核同煎去滓熱服食前進三服三一承氣湯出宣明論治傷寒雜病內外所傷日數遠近腹滿咽乾煩渴譫妄心下按之硬痛小便赤澀大便結滯或濕熱內攻而為滑泄熱甚喘咳悶亂驚悸狂癲目痛口瘡舌腫喉痹癰瘍陽明胃熱發斑脈沉可下者小兒熱極驚風潮搐頻喘昏塞並斑疹黑陷小便不通腹滿欲死或斑疹後熱不退久不作痂或作斑癰瘡癬久不已者怫熱內成疹癖堅積黃瘦瘧疾疳積新久卒暴心痛風痰酒膈腸垢積滯久壅風熱暴傷酒食煩心悶亂脈數沉實或腎水陰虛陽熱獨甚而僵仆卒中一切暴喑不語蓄熱內甚陽厥極深脈反沉細欲絶或表之沖和正氣與邪熱並之於里則裡熱亢極似陰反為寒戰脈微而絶或風熱燥甚客於下焦而大小便澀滯不通者或産婦死胎不下及兩感表裡熱甚須可下者大黃半兩錦紋芒硝半兩厚朴半兩去皮枳實半兩甘草一兩上銼如麻豆大每服水一盞半生薑三片煎至七分納芒硝煎二沸去滓服黃連解毒湯出宣明論治傷寒雜病煩躁熱毒煩悶乾嘔口燥呻吟喘滿陽厥極深蓄熱內甚俗妄傳為陰毒者及汗下吐後寒涼諸藥不能退熱勢並兩感證者黃連去須黃柏黃芩大梔子各半兩上銼如麻豆大每服稱半兩水一茶盞煎至四分絞去滓溫服或腹滿嘔吐或欲作利者每服加半夏三個生全用厚朴二錢銼茯苓三二錢去皮銼用水一盞半生薑三片煎至半盞絞汁溫服名曰半夏黃連解毒湯一笑散出德生堂方治傷寒感冒蔥白七根漿水二碗煎一碗去蔥先吃後用帶拴緊腰再服酸漿水一碗即吐羌活湯出保命集方通解利傷寒不問何經中受病皆能釋然解之即或於各經受病雖不解盡亦無壞證羌活二兩防風一兩川芎一兩黃芩一兩細辛二錢半甘草一兩炙黑地黃一兩白朮二兩如用蒼朮加一兩上㕮咀每服五七錢水二盞煎至一盞無時溫服清如覺發熱引飲加黃芩甘草各一兩更隨證加頭痛惡風於白朮湯一兩內加羌活散三錢都作一服羌活散出保命集方羌活一兩半川芎七錢細辛根一二錢半如身熱依前加石膏湯四錢石膏湯出保命集方石膏二兩知母半兩白芷七錢如腹中痛者加芍藥散三錢芍藥散出保命集方芍藥二錢桂枝五錢如往來寒熱而嘔加柴胡散二錢半柴胡散出保命集方柴胡根一兩半夏五錢洗上加生薑煎如心下痞加枳實一錢如有里證加大黃初一服一錢次二錢又三錢邪盡則止論曰有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不當用桂枝宜用黃耆湯和解秋冬汗孔閉雖無汗不當用麻黃宜用川芎湯和解春夏有汗脈乃微而弱惡風惡寒者乃太陽證秋冬之脈也亦宜黃耆湯無汗亦宜川芎湯秋冬有汗脈盛而浮發寒身熱者乃陽明證春夏之脈也亦宜黃耆湯無汗亦宜川芎湯大抵有汗者皆可用黃耆湯無汗者亦可用川芎湯黃耆湯出保命集方有汗則止也黃耆白朮防風各等分上㕮咀每服五七錢至十餘錢或半兩水煎溫服清汗多惡風甚者加桂枝川芎湯出保命集方無汗則發也川芎白朮羌活各等分上㕮咀同黃耆湯稍熱服惡寒甚則反脈大浮加麻黃若傷寒食少發渴只可和胃止渴不可用太涼藥止之恐損著元氣必不能食也宜和胃白朮湯出保命集方白朮茯苓起臥不能謂之濕身重是也小柴胡湯黃芩芍藥湯起臥不安眠睡不穩謂之煩梔豉湯竹葉石膏湯解利四時傷寒混解六經邪氣宜大白朮湯出保命集方白朮二兩防風一兩羌活一兩川芎一兩黃芩五錢細辛三錢白芷一兩半石膏二兩知母七錢甘草五錢或二錢枳實五錢去瓤上為粗末每服半兩水一盞半煎至一大盞溫服清未解更一服兩服藥滓又作一服春倍防風羌活夏倍黃芩知母季夏雨淫倍白朮白芷秋加桂五錢冬桂八錢或一兩立夏之後至立秋處暑之間傷寒者身多微涼微有自汗四肢沉重謂之濕溫又謂之濕淫宜蒼朮石膏湯出保命集方蒼朮細銼半兩石膏末三錢知母銼一錢半甘草銼一錢上同和勻都作一服水兩盞煎至一盞溫服清謂內有濕熱也多不欲飲食如身熱脈洪無汗多渴者是熱在上焦積於胸中宜桔梗散出保命集方薄荷一錢黃芩一錢甘草一錢炙桔梗半兩連翹二錢山梔子仁二一錢上銼每服五錢或七錢稱半兩水煎加竹葉如大便祕結加大黃太乙丹出楊氏家藏方治傷寒傷風肢節煩疼憎寒壯熱服之解寒清熱或發熱惡寒似瘴非瘴煩躁迷悶面色紅赤頭痛如破服之微汗出立瘥天南星四兩銼炒赤勿令焦石膏四兩乾薑甘草取粉稱三兩半前胡二兩川芎二兩一分白殭蠶炒去絲嘴白附子炮防風去蘆頭各一兩上件為細末用生薑自然汁煮麵糊和丸每一兩作一十丸陰乾每服一丸細嚼用蔥白薄荷茶清送下不拘時候祛毒散出楊氏家藏方解風邪截傷寒蒼朮四兩米泔浸一宿甘草炙黃芩赤芍藥各一兩赤茯苓半兩去皮麻黃去根節半兩上為細末每服三錢水一盞半生薑五片黑豆十五粒同煎至一盞熱服不拘時候祛寒湯出楊氏家藏方祛逐寒邪解利傷寒時行瘟疫青橘皮二兩不去白陳橘皮二兩半不去白丁香皮甘草炙乾薑炮各一兩上為細末如覺身熱頭疼即抄藥一錢沸湯點下不拘時候順氣散出王氏博濟方調順冷氣解利傷寒吳茱萸洗令淨春夏用一分秋冬用半兩麻黃一兩去節人參半兩訶子半兩炒去核稱大黃三分官桂一兩去皮厚朴一兩去皮薑汁炙乾薑炮半兩陳橘皮一兩去白甘草二兩炙上為末每服一錢水一盞入薑棗煎六分通口服如外傷邪即先服此三服次服發汗丸散效益元散出直指方治身熱嘔吐泄瀉腸澼下利赤白治淋漓癃閉悶痛小腹不利胸中積聚寒熱失宜大益精氣通九竅六腑生津液去留結消蓄水止渴利中除煩熱心躁治腹脹痛悶補益五臟大養脾腎之氣或腎水不足胃土衰弱風寒外感七情內傷陰痿陽衰安魂定魄補五勞七傷一切虛損並皆治之滑石六兩膩好者甘草一兩爁上為細末每服三錢蜜少許溫水調下或無蜜亦可無論時日三服或欲冷飲者新水調下亦得解利發汗煎蔥白豆豉湯調下四錢每服水一盞蔥白五寸豆豉五十粒煮取汁七分調下並三服以效為度此藥是寒涼解散鬱熱設病甚不解多服無害但有益爾本世傳名太白散俗惡性寒兼易得之賤物而又不明素問造化之理故不取本草神驗之言而多不用焉若以隨證驗之乃凡人之仙藥不可闕也夫傷寒當汗則不可下當下亦不當汗者且知設服此藥則汗自不出而裡熱亦獲小效亦有裡熱便得宣通而愈者或半在表半在裡可解和而不可吐下發汗者若服此藥多愈或不愈亦少加減涼膈散和解尤佳或必當汗解者更加蒼朮粗末三錢同煎蔥豉湯調服尤良或孕婦不宜滑石麻黃桂枝輩發汗即用甘草一兩蒼朮二兩同為粗末每服四錢水一盞蔥白五寸豉五十粒同煎至六分去滓熱服並二三服取微汗是名逼毒散非孕婦皆可服或太白散加麻黃去節二兩如前法煎服世云神白散衆云青龍散更加滑石末與蒼朮末二倍最為發汗之妙藥乃此方唯正可汗者即用誤服之則轉加熱也名曰大逼毒散或解利兩感煎涼膈散調下益元散四錢或下乳用豬肉面羹或酒之類調下四錢不計時候日三服及宜食肉面羹粥催産溫油漿調下五錢並二三服以産為度或死胎不下者煎三一承氣湯一服調下五錢須臾更頻用溫油漿調服前後俱下而胎出可活産母也難産或死胎不下皆由風燥濕熱聚斂結滯而不能舒緩故産戶不得自然開通也藥力至則結熱頓開而産矣後慎不可溫補而反生燥熱也俗未知産後已損血液疼痛怖懼以致神狂氣亂則陰氣損虛邪熱大甚而為諸熱證由不明素問造化故不識候陰陽反妄謂産後諸虛百損便為虛冷而無熱也誤以熱味藥溫補或見煩渴者不令飲水本雖善心為害多矣豈知治病之道但以臨時審其臟腑六氣虛實明其標本如法治之而已矣此藥泛常無奇雖然為效至大而俗以為小而忽之此所以反招侮也今以加黃丹令桃紅色名曰紅玉散加青黛令輕碧色名碧玉散加薄荷葉一分細羅同為末名曰雞蘇散主療並同但以回避愚俗之妄侮爾柴胡飲子出金匱方退五臟虛熱四時加減冬三月加柴胡八分白朮八分大腹檳榔四枚並皮子用陳皮五分生薑五分桔梗七分春三月加枳實減白朮共六味夏三月加生薑三分枳實五分甘草三分共八味秋三月加陳皮三分共六味上各㕮咀分為三貼一貼以水三升煮取二升分溫三服如人行四五里進一服如四體壅滯添甘草少許每貼分作三小貼每小貼以水一升煮取七合溫服再合滓為一服重煮都成四服訶黎勒丸出金匱方長服訶勒散煨陳皮厚朴各三兩上為末煉蜜丸如梧桐子大酒飲服二十丸加至三十丸五積散出三因方治太陰傷寒脾胃不和及有積聚腹痛蒼朮泔浸一宿二十兩桔梗十兩陳皮六兩白芷甘草炙當歸二兩川芎一兩半芍藥白茯苓半夏湯去滑各一兩麻黃去節春夏二兩秋冬三兩乾薑春夏兩半秋冬二兩枳殼湯浸去瓤銼炒四兩桂心春夏三兩秋冬四兩厚朴薑製炒二兩上先將前十二味㕮咀微炒令香取出當風涼之入後枳殼桂朴三味同為細末每服三錢水一盞薑三片棗二枚煎七分食前溫服傷寒手足逆冷自汗不止脈沉細面青嘔逆加順元散一錢同煎熱服産婦難産經三兩日不能生胎死腹中或産母氣乏委頓産道乾澀加順元散水七分酒三分煎並服氣血內和即瘥胎死者不過三服當下其順元散多少量産母虛實加減傷寒發熱挾內寒者加蔥白二寸豉七粒同煎相繼服以汗解順元散出三因方烏頭炮去皮尖二兩附子炮去皮臍天南星炮各一兩木香半兩上為末同前法煎此藥治內外感寒脈沉伏遲細手足冷毛髮恂剽傷寒陰證大啜一二杯氣和汗出即愈和氣治中湯治傷寒初受病服散吐後宜服藿香人參各半兩白朮陳橘皮各三兩甘草乾薑白茯苓各一分兩上件藥搗羅為散每服二錢以水一中盞入生薑半分煎至五分即去生薑和滓不計時候溫服小柴胡湯出如宜方治傷寒後肺痿勞咳嗽黃芩人參甘草各三兩半夏制二兩半柴胡八兩上㕮咀薑五片棗一枚煎如譫語潮熱胃實大便利脈洪數宜服亡陽譫語不可下宜加桂枝芍藥湯如自利挾熱或垢赤煩渴寒熱往來宜加茯苓如傷寒喜睡脅痛胸滿有熱脈數宜服不煩渴身冷脈遲宜四逆湯如傷寒瘥後寒熱往來似瘧宜服又治乾嘔日晡發熱宜服如勞復宜服如色青難治死必吐舌如嘔逆煩燥作渴有寒熱脈數喜冷加竹茹湯活血通經湯靈壽縣董監軍癸丑年冬十二月間大雪初霽因事至真定忽覺有風氣暴至診候六脈俱弦甚按之洪實有力其證手攣急大便祕澀不通面赤面熱此風寒客加於身也四肢者脾也以風寒之邪傷之則搐急而攣痹乃風淫末疾而寒在外也內經云寒則筋攣正謂此也本人素飲酒近日為覺風氣不飲內有實熱乘於腸胃之間故大便祕澀而面赤熱內則手足陽明受邪外則足太陰脾之經受風寒之邪用桂枝甘草炙以卻其寒邪而緩其急搐用黃柏之苦寒滑以瀉實而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絶便以桂枝辛熱入手陽明之經為引用潤燥復以芍藥甘草專補脾氣使不受風寒之邪而退本邪專益肺也加人參以補元氣為之輔佐當歸身去裡急而潤燥和血升麻葛根各一錢桂枝二錢當歸身二一錢人參一錢芍藥半錢炙甘草一錢黃柏酒製二錢上㕮咀都作一服水二大盞煎至一盞去滓稍熱服令暖房中近火摩搓其手一服而愈術桂湯出東垣蘭室祕藏方治寒溫所客身體沉重胃脘痛面色萎黃麻黃一錢桂枝半錢杏仁十個草豆蔻仁半夏各半錢炒曲半錢蒼朮二錢橘皮一錢澤瀉一錢白茯苓一錢豬苓半分錢黃耆三錢分炙甘草二分上都作一服煎法如常治傷寒熱病服轉藥後病已效可臟腑仍兩三日不出後吃食減少仍覺精神不快出護命方柴胡去毛桔梗去根麻黃去根杏仁黃芩荊芥穗大黃炮熟牡丹皮去心羌活沉香木香獨活各一分升麻半兩上細杵羅為末每服二錢水一盞煎一沸急瀉出食後和滓熱服治傷寒熱毒傷脾渾身肌肉碎痛聞食即噁心思吐遍身發熱兩唇乾焦診其脈即右手關上脾脈一指偏洪緊如衆脈此即為病氣在脾宜服此方出護命方桔梗羌活杏仁麻黃去根柴胡去毛麥門冬去心大黃荊芥穗各一分半夏二銖牽牛一兩青橘皮四銖兩上先杵牽牛半夏二味為末所餘衆藥只作一處杵為末每服五錢水一盞半生薑三片蔥三枝煎衆藥末三錢沸一兩沸瀉出取汁一盞用調下牽牛半夏等末二錢食後服交加散出如宜方治憎寒壯熱或外感風寒內傷生冷及風寒二證敗毒散五積散上等分薑棗煎如體虛宜養胃湯三建湯治脈微身體冷重自汗嘔吐加丁香胡椒各半兩不臥散出十便良方截傷寒蒼朮川芎甘草藁本各一兩上為粗末每服三錢水一盞蔥白三寸同煎至八分去滓熱服不以時茯苓利膈湯出保生回車論茯苓一兩牛蒡子二兩炒香荊芥穗一兩桔梗一兩微炒甘草半兩炙紫色上為粗散每服三錢水一盞薑三片同煎六分去滓溫服日二三服不計時候解肌湯出保生回車論麻黃一兩去根節蒼朮四兩去粗皮羌活半兩甘草半兩炙荊芥穗半兩上為粗散每服三錢匕水一盞薑三片煎至六分去滓溫服續續二三服微汗出即解千金不傳散出淡寮方治傷寒兼主感風蒼朮七兩竹籃盛水中攪洗不去皮乾葛三兩半甘草七錢半上為細末每服三錢加蔥煎茶調亦可桂枝湯出鮑氏方治傷風頭痛鼻鳴乾嘔發熱自汗惡風或寒熱汗出則少解如瘧狀脈浮洪虛大桂枝一兩白芍藥一兩半甘草一兩上為散每服五錢煎八分食前服訖蓋被取微汗或發滯漏不止小便難四肢拘急加炮附一分或項強𠘧𠘧反汗出惡風加乾葛一兩半或汗後身痛脈沉遲加芍藥生薑各半兩人參一兩半或嘔逆更加茯苓半夏人參陳皮冬末春初宜桂枝湯五積散盛夏時及淋家酒家衄家於桂枝湯加黃芩名陽旦湯或夏日只用本方增芍藥名建中湯治氣痛等疾加烏藥香附炒加減香蘇散出醫方大成香附子一兩紫蘇梗二兩陳皮一兩甘草半兩上為銼散每服四錢水一盞半煎至一盞生薑三片連根蔥白二莖同煎熱服頭痛加川芎白芷頭痛如斧劈加石膏連須蔥頭偏正頭風加細辛石膏薄荷太陽穴痛加荊芥穗石膏傷風自汗加桂枝傷風無汗加麻黃去節並乾薑傷風惡寒加蒼朮傷風發熱不退加柴胡黃芩傷風咳嗽不止加半夏杏仁傷風胸膈痞塞加制枳殼傷風鼻塞聲重咽膈不和加苦梗旋覆花傷風痰涎壅盛加白附子天南星傷寒鼻內出血加茅花傷寒氣促不安加大腹皮桑白皮傷風鼻塞不通頭昏加羌活荊芥傷風不解吐血不時加生地黃傷風不解耳內出膿疼痛加羌活荊芥傷風不解咽喉腫痛加苦梗傷風中脘寒不思飲食加去白青皮枳殼傷寒嘔吐噁心不止加丁香半夏傷寒後時時作虛熱不退加人參傷風飲食不能消化加縮砂仁青皮傷風一向不解作潮熱白日至日中不退日日如是加地骨皮柴胡人參菴䕡初感風寒頭痛作熱鼻塞聲重加羌活川芎感風腰痛不能伸屈加官桂桃仁感風渾身痛不止加赤芍藥紫荊皮感風頭項強急不能轉動加羌活官桂腹肚疼痛加木香腹肚疼刺不可忍加薑黃吳茱萸七粒小腹疼痛無時不可忍加木香薑棗婦人忽然大便痛腫不能下地加木香木瓜吳茱萸婦人被性所苦胸膈痞疼脅肋痛小便急疼加木香枳殼婦人被氣疼所苦加木香縮砂仁脾胃不和中脘不快加穀芽神麯傷食吐嘔泄瀉腹痛加乾薑木香心卒痛者加延胡索酒一盞飲酒太過忽遍身發疸或兩目昏黃加山茵陳山梔子中酒吐惡加烏梅丁香婦人經水將行先作寒熱加蘇木紅花婦人産後作虛熱不退煩渴加人參地黃産後發熱不退加人參黃耆産後腰疼不止加當歸官桂冷嗽不已加乾薑五味子杏仁脾寒加良薑青皮草果腳氣加木香木瓜牛膝紫荊皮茱萸川楝子感風寒發熱頭疼加不換金正氣散感寒頭痛壯熱惡寒身痛不能轉動加生料五積散飲食不下欲吐不吐加丁香與蘿蔔子感寒頭痛發熱身疼分陰陽加敗毒石膏婦人産後風腳手疼痛生料五積散人參敗毒散加木瓜不換金正氣散加生地黃川芎同煎朮附湯出保生回車論白朮二兩銼如麥豆附子一枚以半兩為率炮裂去皮臍銼如麥豆粒上如法事治了一處於杵臼中良時治之勿令作末每四錢匕水一盞半煎及七分去滓溫服日三服不拘時候凡言日進三服者如疾勢稍重當促其數服盡而未知並當再作本湯劑半夏中和湯出保生回車論半夏二兩湯浸七次切片焙乾厚朴四兩刮去粗皮銼碎蒼朮四兩刮去粗皮銼令極碎獨活二兩銼碎草豆蔻十五個去殼銼碎以上四味一處杵碎生薑屑一斤同杵糜爛後又慢火炒紫色甘草三兩炒令紫色上如法事治一處杵碎為粗散每服抄四錢水一盞半入生薑三片棗二枚同煎至七分去滓溫服食前日進三服胃虛人可常服嵐瘴諸邪皆不能為害茯苓茱萸丸出保生回車論茯苓吳茱萸湯浸五次焙乾芍藥不問赤白皆可用黃連去須上等分為細末煉蜜為丸如梧桐子大每服十五丸二十丸溫熟水下如無蜜即用飯丸量大小加減不計時候升麻葛根湯出保生回車論升麻二兩銼葛根二兩細銼芍藥四兩銼甘草一兩炙紫色銼上杵篩為粗末每服四錢匕水一盞半生薑五片同煎至七分去滓溫服日三服不拘時候麻黃桂枝湯出保生回車論麻黃二兩去根節桂枝一兩葛根三兩芍藥三兩甘草一兩炙紫色上為粗末每服四錢水一盞半生薑五片棗子二枚同煎至七分去滓溫服日三服夜一服三苓散出保生回車論茯苓一兩桂一分白朮二兩上為細末每服二錢匕粥飲調下日二三服不計時候桂苓散出保生回車論茯苓二三兩銼桂一分上為細末每服二錢粥飲調下日二三服不計時候每服藥後飲沸湯或粥飲一盞或半盞為佳豬苓散出保生回車論獵苓茯苓澤瀉白朮阿膠先杵碎炒為末上四味等分如法事治為粗散每服四錢匕水一盞半煎八分去滓入阿膠末二錢再上火一沸溫服日二三服術桂湯出保生回車論白朮三兩銼桂一分上為細末每服二錢粥飲調下日二三服不計時候以上二藥服餌主療並與五苓同聖僧散出衛生家寶治時行一切傷寒不問陰陽不拘輕重應老幼及孕婦皆可服香白芷一斤生銼甘草半兩生銼上二味焙乾碾為粗末每服二錢水一盞棗子二枚生薑三片蔥白三寸同煎至六分熱服用衣被蓋覆如人行五六里更進一服汗出即愈此藥可卜病之好惡如煎得黑色或誤打翻即難愈如煎得黃色無不愈者煎藥之時要在志誠加減正氣散出衛生家寶治傷寒傷風不論表裡但連進二服立效藿香葉半夏研細用薑汁搜和炙黃色厚朴去皮薑炙陳皮去白甘草炙以上五味乃局方正氣散再加白茯苓草果子仁上各等分細末每服二大錢水一盞薑三片棗一枚煎七分食前稍熱服和中益胃湯出試效方治太陰陽明腹痛大便常泄若不泄卻祕而難傳作濕熱毒下鮮紅血腹中微痛脅下急縮脈緩而洪弦中之乍得按之空虛熟地黃三分當歸身酒製四分升麻半錢蘇木一分藁本二分炙甘草三分柴胡半錢益智仁二分上件都作一服水三盞煎至一盞去滓空心溫服食前一服而愈茯苓白朮湯出十便良方治傷寒服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝加此方芍藥生薑白朮茯苓各三兩甘草二兩大棗二十個上切每服半兩以水二大盞煎取一盞溫服小便利則愈忌海藻菘菜酢桃李雀肉等陰陽應象論曰人之汗以天地之雨名之又云濕盛則霖霪驟注蓋以真氣已虧胃中火盛汗出不休胃中真氣已竭若陰火亦衰無汗皮燥乃陰中之陽陽中之陰俱衰四時無汗其形不久濕衰燥旺理之常也其形不久者秋氣主殺生氣者胃之穀氣也乃春少陽生化之氣也張耘夫己酉閏二月盡天寒陰雨寒濕相雜緣官事飲食失節勞役所傷病解之後汗出不止沾濡數日惡寒重添厚衣心胸間時作煩熱頭目昏憒上壅食少減此乃胃中陰火熾盛與外天雨之濕氣峻熱兩氣相合令濕熱大作汗出不休兼見風邪以助東方甲乙之風藥去其濕以甘寒瀉其熱羌活勝濕湯主之炙甘草三分黃耆七分生甘草五分生黃芩酒黃芩各三分人參羌活防風藁本獨活蔓荊子川芎各二分細辛升麻柴胡各半錢薄荷一分上件都作一服水二大盞煎至一盞半入細辛以下輕清四味再上火煎至一盞去滓熱服之一服而止諸證悉去胡洽大露宿丸出本草主寒冷百病方礬石煉乾薑桂心皂莢桔梗各二三兩附子三二兩上搗篩蜜丸服如梧桐子大五丸日三漸增以知為度治傷寒方出本草用半夏一升洗去滑焙乾搗末小麥面一升合和以水溲令熟丸如彈丸大以水煮令面熟則藥成初吞四五枚日二稍稍增至十五枚旋煮旋服覺病減欲更重合亦佳禁食餳與牛羊肉治傷寒汗不出搐攣手腳出本草用海蛤川烏頭各一兩穿山甲二兩為末酒糊和丸大一寸許捏扁置所患足心下劈蔥白蓋藥以帛纏定於暖室中取熱水浸腳至膝上久則水溫又添熱水候遍身汗出為度凡一二日一次浸腳以愈為度治傷寒熱伏在臟腑狂躁煩滿大小便閉塞出本草取苦棗肉蜜為丸服佳治傷風寒熱骨節碎痛出汗及中風面目浮腫咽喉不通安胎養血除肝臟邪氣安中利五臟益目睛殺百藥出本草以蔥葉作羹粥炸作齏食之良治傷寒大毒嗽出本草以飴糖於蔓青齏汁中煮一沸頓服之治傷寒熱毒出本草以人糞水漬飲彌善病人兩手脈浮數而緊名曰傷寒若關前寸脈力小關後尺脈力大雖不惡風不自汗此乃陰氣已盛先見乎脈也宜投藥和之表之也調脈湯陽明少陽也葛根一兩防風半兩前胡七錢分半炙甘草半兩上為末每服五錢水二盞生薑一塊如棗大拍碎同煎如寸脈依前力小加棗三枚同煎服葛根柴胡湯陽明少陽也葛根一兩半柴胡一兩芍藥桔梗甘草各五錢上為末每服五錢水二盞生薑一塊蔥白三寸同煎服薄荷湯陽明也薄荷一兩炙甘草防風各半兩人參七錢半上為末水煎服防風湯陽明也防風一兩炙甘草四錢旋覆花桔梗各半兩製厚朴七錢半上為末生薑一塊加荊芥穗五七個同煎六物麻黃湯太陽陽明也麻黃去節一兩葛根七錢半人參半兩炙甘草半兩蒼朮去皮七錢半上為末棗二枚同煎服後猶惡風加荊芥穗七錢丁香皮半兩七物柴胡湯太陽少陽也柴胡三二兩蒼朮荊芥穗麻黃去節各一兩炙甘草七錢加當歸一兩上為末生薑一塊棗三枚蔥白三寸同煎太陽證頭項痛腰脊強發熱惡風自汗脈尺寸俱浮緩者是勞也桂枝湯主之是陰經榮藥也閉衛氣使陰氣不泄此藥為衛虛而設也若發汗過多發熱頭面搖卒口噤反背反背張者太陽兼陽明也去風養血防風當歸散主之防風當歸川芎地黃各一兩上銼每服一兩水三盞煮至二盞去滓溫服如無汗者葛根湯主之如有汗者桂枝加葛根白朮湯治傷風寒上解三陽下安太陰神方白朮二兩如汗之改蒼朮防風二兩去蘆稱上㕮咀水煎服若發熱引飲加黃芩生甘草一兩若頭痛惡風者加羌活散三錢半太陽證頭項痛腰脊強發熱惡寒無汗脈尺寸俱浮而緊是病發於陽陽者衛也麻黃湯主之是陽經衛藥也開腠理使陽氣伸泄此藥為衛實也傷寒見風脈傷風見寒脈二證大青龍湯主之易老用桂枝麻黃各半湯後改用九味羌活湯黃耆建中加當歸湯黃耆當歸各一兩半白芍藥三兩桂一兩一分甘草一兩上粗末每服五錢生薑三片棗一個水一盞半同煎至八分去滓取七分清汁日三夜二服尺脈尚遲再作一劑發表湯太陽也麻黃去節一兩半蒼朮舶上丁香皮各七錢炙甘草半兩人參半兩當歸半兩加桂枝五錢細辛半兩如多減半汗不止則加上為末生薑一塊棗三枚同煎經云有汗不得服麻黃無汗不得服桂枝若瘥則其變不可勝言故立此法使不瘥犯三陽禁忌解表神方羌活一兩半治太陽肢節痛君主之藥也然非無為主也卻亂反正之主也故大無不通小無不入關節痛非此不治防風一兩半治一身盡痛卒伍卑下之職一聽君命將令而行隨所使所引而至蒼朮一兩半別有雄壯上行之氣能除濕下安太陰使邪氣不內傳之於足太陰脾細辛五錢治足少陰腎苦頭痛川芎一兩治厥陰頭痛在腦白芷一兩治陽明頭痛在額生地黃一兩治少陰心熱在內黃芩一兩治太陰肺熱在胸甘草一兩能緩裡急調和諸藥故有國老之稱以上九味雖為一方然亦不可執執中無權猶執一也當視其經絡前後左右之不同從其多少大小輕重之不一增損用之其效如神㕮咀水煎服若急汗熱服以羹投之若緩汗溫服而不用湯投之也脈浮而不解者先急後緩脈沉而不解者先緩後急九味羌活湯不獨解利治雜病有神中風行經者加附子中風祕澀者加大黃中風並三者合而成痹等證各隨十二經上下內外寒熱溫涼四時六氣加減補瀉用之煉蜜作丸亦可加生地黃各半治兩感傷寒如神用豆淋酒煎治破傷風太陽經傷寒傳裡胸中有熱胃有邪氣傳陽明本也腹中痛欲嘔者熱在內也宜黃連湯甘草黃連乾薑人參各七錢半大棗三一枚上銼細每服五錢水煎服發熱惡寒自汗脈緩發熱惡風無汗脈緩此二證易老原用桂枝二麻黃一湯後亦改用九味羌活湯無論有汗無汗悉宜服之易老解利法九味羌活湯治傷寒唇緊用鱉甲及頭燒灰作末敷之治傷寒大熱心悶用槐子燒灰存性為末酒服方寸匕治汗不出拘攣腰腳並耳聾用荊三稜米醋浸夏月浸四日冬月浸六日杵為末醋湯調下三錢治汗後彌亂者用敗扇燒為末和粉粉身上發汗法出活人書凡發汗欲令手足俱周濈濈然一時許為佳不欲如水淋漓服湯中病即已不必盡劑然發汗須如常須腰以上厚衣覆之令腰以上汗出淋漓而腰以下至足心覺微潤病即可解若病證仍在者三日內可二三汗之令腰腳周遍為度一法無藥處可用兩手指相交緊叩腦後風府穴向前禮百餘拜汗出自解出神效方
