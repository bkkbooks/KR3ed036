去血及臨産驚動太早産時未至穢露先下致使胞胎乾燥臨産艱難並宜治服之白榆皮葵根一方用子瞿麥各一兩大麻仁去殼木通半兩川牛膝三錢去苗酒浸切焙上銼散每服三錢水一盞半煎溫服不拘時竹茹寄生湯出聖惠方治妊娠漏胎心腹㽲痛或時下血竹茹桑寄生阿膠炙燥艾葉芍藥白朮各等分上銼如麻豆大拌勻每服三錢以水一盞煎至七分去滓溫服薑黃湯出聖惠方治妊娠胎漏下血不止腹痛薑黃當歸切焙熟地黃焙艾葉焙乾鹿角膠炒燥各一兩上粗搗篩每服五錢以水一盞半入生薑半錢切棗三枚擘破煎至八分去滓食前溫服治妊娠胎漏腹痛不止心神虛煩出聖惠方熟地黃二兩半鹿茸一兩半去毛塗酥炙微黃鹿角膠二兩搗碎炒令黃燥艾葉一兩微炒苧麻根一兩半銼上為細末每於食前以米飲調下二錢艾葉飲治妊娠漏胎淋瀝不止艾葉陳者半兩乾薑炮當歸炙銼各三錢芎藭一兩上粗末每服三錢以水一盞入生薑一棗大拍碎煎七分去滓空心日午晚後各一一方治冷熱腹內不調致胎不安薑棗止用水煮芎藭飲治妊娠漏胎下血過多腹中刺痛止血安胎桑寄生湯治妊娠漏胎淋瀝下血臍腹疼痛膠艾湯出大全良方治妊娠漏胎下血過多亦治漏胎不安阿膠炙燥半兩艾葉焙乾一兩上粗搗篩每服三錢以水一盞煎七分去滓溫服早晨午時晚間各一一方醋糊為丸如梧子大每服三十丸空心米飲湯下名二氣丸地黃散出聖惠方治妊娠胎漏下血不止腹痛又云治妊娠下血如月信者若胞干非特損子亦損母矣熟地黃焙乾薑炮各三錢上為散每服二錢食前溫酒調下一方有赤石脂等分同油蜜煎出便産須知治胎氣因漏血乾澀難産者清油半兩好蜜一兩上同煎數十沸溫服滑胎即下蓋緣無血胎干所以難産他藥無益以此助血即效二黃散出保命集治婦人有孕胎漏生地黃熟地黃各等分上為細末煎白朮枳殼湯調下二兩日二服治妊娠血下如注名曰漏胞胞干便死出千金方用生地黃半斤㕮咀以清酒三升煮三沸絞去滓服一方加黃雌雞一頭治如食法一方取雞血和藥中服無時多服亦佳一方熟地黃為末以三指撮許酒服不過三服瘥療妊娠數月日猶經水時時來者名曰漏胞若因房室勞有所去名曰傷胎用赤小豆五升濕地種之令生牙干之下篩懷身數月日經水尚來以溫酒服方寸匕日三得效便停治妊娠血下不止名曰漏胞血儘子死用雞子十四枚取黃以好酒二升煮使如餳一服之未瘥更作服之以瘥為度治妊娠胎漏非時下血方出大全良方熟地黃桑寄生續斷人參各半兩艾葉炙銼細川芎當歸白朮各一錢上為細末每服三錢水一盞五分煎取一盞空心連滓服兩盞不妨苧麻湯治漏胎無故下血腹痛不可忍或下黃汁稠如漆如小豆汁野苧麻根二兩銼炒上以酒一碗水一碗加金銀花無則休用煎一碗服家種亦可用鄭氏人參湯出永類鈐方治漏胎敗血湊心日漸胎干子母危困忌生冷雞鴨魚面人參黃耆炙阿膠炒竹茹甘草炙木香不見火附子炮各半兩川芎一錢陳皮一錢苧根一錢生薑三錢炮黑上㕮咀每服四錢糯米三七粒水煎熱服克效散出朱氏集驗方治漏胎用五倍子一味為末酒調下又方出朱氏集驗方用蓮子房燒化以麵糊丸湯酒任下治妊娠下血不止名曰漏胎取雞肝細銼以酒一升和服
