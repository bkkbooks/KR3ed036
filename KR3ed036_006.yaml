body:
  text: 卷六五運六氣圖五運太過不及六氣司天在泉政令災變六十年圖天分五氣地列五行上經於列宿下臨於方隅故丹天之氣經於牛女奎璧臨於戊癸之位故戊癸歲為火運黅天之氣經於心尾角軫臨於甲己之位故甲己歲為土運素天之氣經於亢氐昴畢臨於乙庚之位故乙庚歲為金運玄天之氣經於張翼婁胃臨於丙辛之位故丙辛歲為水運蒼天之氣經於危室柳鬼臨於丁壬之位故丁壬歲為木運也然運有五氣有六以君火相火加之也六氣之化者謂寒暑燥濕風火也乃天之六氣然後三陰三陽上奉之然六氣曰主曰客司天在泉有寒暑燥濕風火之化為主者雖千載亦不易為客者六歲復會何謂主自鬥建醜正至卯之中則是大寒至驚蟄之末六十日有奇有奇謂八十七刻半厥陰木為風化用事風氣流行陽氣發動萬物發生以應春此初氣主也自鬥建卯至巳之中則是春分至立夏之末六十日有奇少陰君火為熱化用事暄淑乃行君德之象不同炎暑以應夏此二氣主也自鬥建巳正至未之中則是小滿至小暑之末六十日有奇少陽相火暑化用事此司天之位炎暑乃行以應長夏此三氣主也自鬥建未正至酉之中則是大暑至白露之末六十日有奇太陰土濕化用事雲雨乃行此四氣主也自鬥建酉正至亥之中則是秋分至立冬之末六十日有奇陽明金燥化用事清涼乃行此五氣主也自鬥建亥正至醜之中則是小雪至小寒之末六十日有奇太陽水寒化用事在泉之末嚴凝乃行此終氣主也曆法五日為候三候為氣六氣為時一歲二十四氣七百二十氣為三十年一千四百四十氣為六十年太過不及斯可見且經曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之一步凡六十日有奇六六三百六十日春溫夏熱秋涼冬寒以成一氣之令千載而有定此主氣之常也故曰地氣主靜而守護何謂客子午之歲少陰司天丑未之歲太陰司天寅申之歲少陽司天卯酉之歲陽明司天辰戌之歲太陽司天巳亥之歲厥陰司天以客加主而推其變故曰天氣動不息其六氣之源則同六氣之緒則異何也蓋天之氣始於少陰而終於厥陰地之氣始於厥陰而終於太陽是故當其時而行變之常也非其時而行變之災也故曰令其所謂春行夏秋冬之令冬行春夏秋之令此客加主之變也故其主化政令之常有暴雨疾風迅雷飄電之變冬有爍石之熱夏有悽風之清此無他天地之氣勝復郁發之故也是說也五氣麗平太過不及之徵也又有所謂平氣者故有天符歲會同天符同歲會太乙天符五者所謂敷和升明備化審平靜順之紀也何謂天符如木運上見厥陰運與司天合也何謂歲會如木運臨丁天運之丁運與年支合也何謂太乙天符天運上見少陰年辰臨午之類至於同天符同歲會以太過不及下加而然如木運太過下加厥陰曰同天符火運不及下加少陰少陽之類曰同歲會素問六微旨曰天符為執法歲會為行令太乙天符為貴人邪中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死惟有歲氣之平天地之氣得其中則民無災變之異故自前五者而然又有所謂勝復而致變者如木運不及則金勝火為木之子復能勝金則肺反受邪土運不及則木勝金為土之子復勝木則肝反受邪如是之類是謂勝復勝復之作子為母復仇也何謂化氣如甲己化土余仿此化土甲巳起丙寅數至戊辰為龍龍有變化之象戊為土故甲己化土余仿此何謂正化對化玄珠曰六氣分正化對化少陰正化於午對化於子厥陰正化於亥對化於巳太陰正化於未對化於醜少陽正化於寅對化於申陽明正化於酉對化於卯太陽正化於戌對化於辰正司化令之實對司化令之虛為醫之道須明運氣運氣之旨有太過有不及有陰陽相乘有勝有復若夫脈有氣應則平故曰從其氣則和違其氣則病然有未至而至至而不至難以一言括在乎參稽是圖也甲己歲氣土化之圖甲歲土太過歲運黅天敦阜之紀平氣備化甲歲南政太宮之音歲氣雨濕流行至陰內濕物化充成其變震驚飄驟崩潰腎水受邪病有腹痛清厥體重甚則足痿不收腳疼中滿四肢不舉脾土勝腎水木為水之子復能剋土則反溏泄甚則太谿絕者死臨辰戌為歲會甲辰甲戌上見太陰為同天符甲辰甲戌己歲土不及歲運黅天卑監之紀平氣備化己歲南政少宮之音歲氣風寒大作雨乃愆期草木秀而不實脾土受邪病則飧泄霍亂肢體重腹痛肝木克脾土金為土之子復能克肝木則反胸脅暴痛下引小腹臨辰戌丑未為歲會己丑己未上見太陰為太乙天符己丑己未乙庚歲氣金化之圖乙歲金不及歲運素天從革之紀平氣審平乙歲北政少商之音歲氣炎火盛行乃至爍石流金涸泉焦草肺金受邪病則肩背脊膂重鼽血血便注下心火克肺金水為金之子復能克心火則反心痛腦痛延及囟頂痛發熱口瘡心痛臨酉為太乙天符乙酉又為歲會上見陽明為天符乙卯復則水勝火寒雨暴至冰雹霜雪庚歲金太過歲運素天堅成之紀平氣審平庚歲北政太商之音歲氣燥行天氣潔地氣明陽氣隨陰肅殺凋零肝木受邪病則腹脅痛目赤體重胸痛血溢引小腹耳無聞甚則喘咳逆氣肩背尻陰股膝髀腨胻足痛肺金克肝木火為木之子復能克肺金則反血溢心痛胠脅不可轉側咳逆太衝絕者死臨酉為歲會庚酉上見陽明為天符庚子庚午丙辛歲氣水化之圖丙歲水太過是歲雨冰雪霜不時降濕氣變物歲運玄天流衍之紀平氣靜順丙歲北政太羽之音歲氣天地寒凝其變冰霜雪雹心火受邪病則身熱煩躁心中寒甚則腹脛腫喘咳腎水克心火土為火之子復能克腎則反腸鳴溏泄甚則神門絕者死臨子為歲會丙子上見太陽為天符丙戌丙辰辛歲水不及歲運玄天涸流之紀平氣靜順辛歲北政少羽之音歲氣水泉減草木茂腎水受邪病則身重濡瀉腫滿腰膝痛足痿清厥甚則胕腫腎氣不行脾土克腎水木為水之子復能克脾則反面色時變筋肉瞤瘛膈中及心腹痛臨醜為同歲會辛丑辛未上見太陰下見太陽為同歲會則大寒蟄藏丁壬歲氣木化之圖丁歲木不及是歲天地悽愴日月曚昧雨非雨晴非晴雨氣慘然氣象凝斂肅殺之甚歲運蒼天委和之紀平氣敷和丁歲北政少角之音歲氣燥氣乃行生氣不正涼雨時降風雪並興草木晚榮物氣內濕肝木受邪病中清厥胠脅滿小腹痛腸鳴溏泄肺金克肝木火為木之子復能剋金則反寒濕瘡瘍痱痤浮腫癰咳血夏生大熱濕變為燥草木槁下體再生臨卯為歲會丁卯上見厥陰為天符丁巳丁亥臨陽明生氣失政草木再榮壬歲木太過歲氣蒼天發生之紀平氣敷和壬歲北政太角之音歲氣風氣流行生氣淳化萬物以榮其變振拉摧拔脾土受邪病飧泄食減體重腹痛腸鳴脅滿肝木克脾土金為土之子復能勝木則反脅痛而吐甚則衝陽絕者死戊癸歲氣火化之圖戊歲火太過是歲火燔灼水泉涸物焦槁歲運丹天赫曦之紀平氣升明戊歲北政太徵之音歲氣陰氣內化其變則炎烈沸騰肺金受邪病則發瘧少氣喘咳血溢注胸脅痛心火勝肺金水為金之子復能剋火則反發狂咳嗽血泄甚則太淵絕者死臨子為太乙天符上見少陰少陽為天符癸歲火不及歲運丹天伏明之紀平氣升明癸歲北政少徵之音歲氣寒乃大行火令不正物生不長陽氣屈伏蟄蟲早藏心火受邪病則胸脅膺背痛鬱冒暴喑臂痛腎水勝心火土為火之子復能克腎則反寒中腸鳴泄瀉身熱煩躁悸陰厥上下中寒譫妄心痛寒濕下注攣痹足不任身臨卯酉為同歲會癸酉癸卯子午歲氣熱化之圖少陰司天陽明在泉初氣主位厥陰風木客氣太陽寒水二氣主位少陰君火客氣厥陰濕土三氣主位少陽相火客氣少陰君火四氣主位太陰濕土客氣太陰濕土五氣主位陽明燥金客氣少陽相火終氣主位太陽寒水客氣陽明燥金丑未歲氣濕化之圖太陰司天太陽在泉初氣主位厥陰風木客氣厥陰風木二氣主位少陰君火客氣少陰君火三氣主位少陽相火客氣太陰濕土四氣主位太陰濕土客氣少陽相火五氣主位陽明燥金客氣陽明燥金終氣主位太陽寒水客氣太陽寒水寅申歲氣火化之圖少陽司天厥陰在泉初氣主位厥陰風木客氣少陰君火二氣主位少陰君火客氣太陰濕土三氣主位少陽相火客氣少陽相火四氣主位太陰濕土客氣陽明燥金五氣主位陽明燥金客氣太陽寒水終氣主位太陽寒水客氣厥陰風木卯酉歲氣燥化之圖陽明司天少陰在泉初氣主位厥陰風木客氣太陰濕土二氣主位少陰君火客氣少陽相火三氣主位少陽相火客氣陽明燥金四氣主位太陰濕土客氣太陽寒水五氣主位陽明燥金客氣厥陰風木終氣主位太陽寒水客氣少陰君火辰戌歲氣寒化之圖太陽司天太陰在泉初氣主位厥陰風木客氣少陽相火二氣主位少陰君火客氣陽明燥金三氣主位少陽相火客氣太陽寒水四氣主位太陰濕土客氣厥陰風木五氣主位陽明燥金客氣少陰君火終氣主位太陽寒水客氣太陰濕土巳亥歲氣燥化之圖厥陰司天少陽在泉初氣主位厥陰風木客氣陽明燥金二氣主位少陰君火客氣太陽寒水三氣主位少陽相火客氣厥陰風木四氣主位太陰濕土客氣少陰君火五氣主位陽明燥金客氣太陰濕土終氣主位太陽寒水客氣少陽相火風製法風淫於內治以辛涼佐以苦以甘緩之以辛散之防風通聖散術麻散小續命湯防風湯消風湯消風丸暑製法熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之白虎湯桂苓湯碧玉散玉露散排風湯玉露丸濕製法濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之白朮木香散五苓散桂苓白朮丸葶藶木香散石膏散橘皮白朮散益元散神功散火製法火淫於內治以鹹冷佐以苦辛以酸收之以苦發之涼膈散八正散解毒丸燥製法燥淫於內治以苦溫佐以甘辛以苦下之大小承氣湯調胃散神功丸麻仁丸脾約丸葶藶丸潤腸丸四生丸寒製法寒淫於內治以甘熱佐以苦辛以辛潤之以苦堅之姜附湯二姜丸四逆湯朮附湯附子理中丸戊己丸獨治於內者承氣湯陷胸湯神芎丸大黃丸備急丸獨治於外者拔毒散水澄膏生肌散魚膽丸兼治於內者防風通聖散大柴胡湯小柴胡湯小柴胡飲子當歸飲子兼治於外者桂枝湯麻黃散小建中湯升麻湯五積散先治內謂寒藥先攻裡大黃芒硝黑牽牛之類後治外謂熱藥後攻表桂枝麻黃之類先治外但攻表用熱藥後治內但攻裡用寒藥金櫃十全五泄論天之氣一也六之則為風火燥濕寒暑故濕之氣六之一也相乘而為之五變其化在天為雨在地為泥在人為脾病則為泄故風而濕其泄也胃暑而濕其泄也脾燥而濕其泄也大腸火而濕其泄也小腸寒而濕其泄也大瘕若胃泄不已變而為飧泄飧泄不已變而為洞泄洞泄不已變而為寒中此風乘濕之變也若脾泄不已變而為霍亂霍亂不已變而為注下注下不已變而為腫蠱此暑乘濕之變也若大腸泄不已變而為䐜脹䐜脹不已變而為腸鳴腸鳴不已變而為支滿鶩溏此燥乘濕之變也若小腸泄不已變而為腸澼腸澼不已變而為臟毒臟毒不已變而為前後便血此火乘濕之變也若大瘕泄不已變而為脫肛脫肛不已變而為廣腸痛廣腸痛不已前為乳痔內為腸風此寒乘濕之變也凡此二十五變若無濕則終不成疾況脾胃二土共管中州脾好飲脾亦惡濕此泄之所由生也凡下痢之脈微且小者生浮大者死水腫脈反變浮大者生沉細者死夫病在裡者脈沉在表者脈浮里當下之表當汗之下利之脈浮滑水腫者