兩自小滿至大暑加澤瀉三錢自大暑直至大寒並依正方子午之歲少陰君火司天陽明燥金在泉氣化運行先天初之氣太陽寒水加厥陰風木民病關節禁固腰脽痛中外瘡瘍二之氣厥陰風木加少陰君火民病淋目赤氣鬱而熱三之氣少陰君火加少陽相火民病氣厥心痛寒熱更作咳喘目赤四之氣太陰濕土加太陰濕土民病黃癉鼽衄嗌乾飲發五之氣少陽相火加陽明燥金民乃康終之氣陽明燥金加太陽寒水民病上腫咳喘甚則血溢下連小腹而作寒中治法宜咸以平其上苦熱以治其內咸以耎之苦以發之酸以收之正陽湯治子午之歲少陰君火司天陽明燥金在泉病者關節禁固腰痛氣鬱熱小便淋目赤心痛寒熱更作咳喘或鼻鼽嗌乾飲發黃癉喘甚則連小腹而寒中白薇玄參川芎桑白皮炙當歸芍藥旋覆花甘草炙生薑各半兩上為散每服四錢水一盞半煎七分去滓食前服自大寒至春分加杏仁升麻各半兩自春分至小滿加茯苓車前子各半兩自小滿至大暑加杏仁麻仁各一錢自大暑至秋分加荊芥茵陳蒿各一錢自秋分至小雪依正方自小雪至大寒加紫蘇子半兩巳亥之歲厥陰風木司天少陽相火在泉氣化運行後天初之氣陽明燥金加厥陰風木民病寒於右之下二之氣太陽寒水加少陰君火民病熱中三之氣厥陰風木加少陽相火民病泣出耳鳴掉眩四之氣少陰君火加太陰濕土民病黃癉胕腫五之氣太陰濕土加陽明燥金燥濕相勝寒氣及體終之氣少陽相火加太陽寒水此下水克上火民病癘治法宜用辛涼平其上鹹寒調其下畏火之氣無妄犯之敷和湯治巳亥之歲厥陰風木司天少陽相火在泉病者中熱而及右之下寒耳鳴泣出掉眩燥濕相搏民病黃癉浮腫時作溫癘半夏湯洗棗子五味子枳實麩炒茯苓訶子炮去核橘皮甘草炙各半兩生薑炮三錢上為散每服四錢水一盞半煎至七分食前服自大寒至春分加鼠黏子一錢自春分至小滿加麥門冬去心山藥各一錢自小滿至大暑加紫菀一錢自大暑至秋分加澤瀉山梔仁各一錢自秋分直至大寒並依正方六氣凡例凡六氣數起於上而終於下歲半之前自大寒後天氣主之歲半之後自大暑後地氣主之上下交互氣交主之司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯司氣同其主亦無犯異主則少犯之是為四調若天地反時可依時及勝其主則可犯以平為期不可過也
