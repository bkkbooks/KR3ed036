body:
  text: 卷三百四十九産後諸疾門産後惡血衝心附論夫産後氣虛挾宿寒寒搏於血血則凝結不消氣逆上者則血隨氣上搶衝擊於而心痛也凡産後余血不盡因虛冷則留結與氣相搏必痛若遇久寒者血結彌甚則變成血瘕致令月水痞澀不通也又云余血奔心蓋是分解了不便與童子小便並擀心下及臥大速兼食不相宜之物所致但能依方療之無不痊可方治産後敗血衝心發熱狂言奔走脈大虛者方出拔萃方乾荷葉生地黃干牡丹皮等分不拘多少上濃煎湯調生蒲黃二錢一服即定四物湯加柴胡小柴胡加生乾地黃等分煎服亦可卷荷散出醫方大成治産後血上衝心血刺血暈氣血腹痛惡露不快初出荷卷紅花當歸各一兩蒲黃細炒牡丹皮半兩上為細末每服二平錢空心溫酒送下一月內只使童子小便調如才産後便服此藥即諸疾不生荷葉散療産後七日內宿血不散時時衝心迷悶不識人荷葉六分延胡索八分地黃汁二分上水二升煮三味取八合下延胡索空心三服忌肉食一日療産後余血攻心或下血不止心悶面青冷氣欲絶出肘後方當歸桂心川芎吳茱萸橘皮生薑芍藥各三兩上㕮咀以水三升煮取一升去滓空心服治産後余血攻心出大全良方用陳白梅捶碎濃煎湯服金黃散出大全良方治産後惡血衝心時發躁延胡索一兩蒲黃半兩桂心一分上為細末烏梅煎湯冷調下一錢生地黃湯出大全良方治産後余血奔心煩悶不知便與童子小便並擀心下及睡太疾兼食不宜食之物生地黃川芎一兩枳殼芍藥半兩上為末酒服方寸匕日三服赤龍鱗散赤鯉魚鱗二兩燒灰虻蟲半兩微炒黃去翅足狗膽半兩乾者蒲黃半兩亂髮二兩燒灰麝香一兩細研上同研令細不計時候煎生薑湯童子小便調下一錢麒麟竭散出聖惠方治産後惡血衝心痛氣欲絶麒麟竭三兩沒藥一兩木香一兩代赭石半兩麝香半兩細研上搗細羅為散每服煎當歸酒調下二錢如人行五七里候再服當下惡神效沒藥散治産後惡血衝心悶絶疼痛不可忍沒藥麒麟竭當歸銼微炒芫花炒成灰薑黃金羅蓽凌霄花以上各半兩麝香一錢研細狗膽二枚乾者上為散入研了藥令勻以醋煮麵糊和為丸如梧桐子大不計時候以溫酒調下芫花丸出聖惠方治産後惡血衝心眼前黑暗或生寒熱或時狂語或腹痛不可忍芫花香墨釜下墨當歸切微炒薑黃威靈仙以上各一兩砒黃半兩上搗為末生薑汁一盞同煎熬藥末為膏入神麯末半兩和為丸如緑豆大不計時候煎當歸酒化下七丸治産後惡血衝心迷悶出聖惠方生地黃汁半中盞凌霄根汁半中盞檳榔二枚銼羚羊角半兩為屑上相和煎至七沸入酒三合分三服溫之又方出聖惠方羚羊角一兩燒灰麝香一錢上相和細研為散不計時候以熱酒調下一錢又方出聖惠方黑豆二合酸醋一大盞上煎醋令極沸然後投入黑豆煎三兩沸便濾出每用半合或入前湯一合相合溫服血虛者服之亦效又方出聖惠方雞子一枚米泔一合醋二合上先煎醋及泔三兩沸入雞子攪令勻不計時候服半合地黃飲子出聖惠方治産後惡血衝心悶亂口乾生地黃汁三合藕汁三合童子小便三合上相和煎三兩沸分溫二服益母散出聖惠方治産後惡血衝心煩悶多渴益母草干藕節紅花子各一兩上搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服療産後惡血衝心或胞衣不下腹中血塊等疾一名備急方出大全良方用大黃一兩為末以好醋半斤熬成膏以藥末搜膏為丸如梧桐子大溫醋湯吞五丸良久取下惡物不可多服亦治馬墜內損者及惡血不散服之神效此藥難用大段虛弱不可服調藥醋不宜太酸恐傷肺臟病家醫者斟酌澤蘭散治産後因驚敗血衝心昏悶發狂如有鬼祟凡産前後諸病通治澤蘭葉石膏研各二兩白茯苓卷柏柏子微炒另研防風厚朴制細辛淨桔梗吳茱萸泡炒各一兩人參藁本乾薑炮五味子白芷川椒去合口者炒出汗黃耆川烏炮丹參各三分當歸銼蕪荑炒赤甘草炙川芎芍藥各一兩三分生乾地黃一兩半肉桂一兩一分白薇半兩阿膠半兩炒上為細末每服二錢空心臨臥熱酒調下加辰砂一匙煎酸棗湯調一服安血竭散治産後敗血衝心胸滿氣喘命在須臾宜服此真血竭研上細末三錢溫酒調服病勢危篤者盡二兩可活産後敗血衝心皆因惡露不下始則胸中微滿動加喘息者為難治産後所有諸方無如此藥神速宜久蓄之以備急用膏蜜湯主産後余血衝心痛急欲死方豬膏二分白蜜生地黃切各一升上膏煎地黃赤色出之納蜜和之令調分五服日三紫金丹治産後沖脹胸中有物狀是噎氣不調降代赭石𥓌礰石各等分案𥓌礰石之名不見藥書亦未詳系何藥的別名上為細末醋糊丸如桐子大每服三五十丸酒下胸中痛加當歸湯下久服治血癖又方代赭石桃仁三錢炒去皮尖大黃五錢上為末薄荷水為丸如桐子大每服三五十丸溫水下無時治産後血悶欲絶以烏芋搗汁服一升治産後血上薄心悶絶傷身以生地黃搗汁飲之治卒惡血欲死以雞蘇一升煮服之産後積聚症塊附論積聚症塊夫積者陰氣也五臟所生聚者陽氣也六腑所成皆由飲食不節寒熱不調致五臟之氣積六腑之氣聚積者痛不離其部聚者其痛無有常處所以然者積為陰氣陰性沉伏故痛不離其部聚為陽氣陽性浮動故痛無常處産後血氣虛弱為風冷所乘搏於臟腑與血氣相結故成聚積症塊也方桃仁散治産後余血不散結成症塊疼痛桃仁當歸鬼箭羽大黃鱉甲各一兩赤芍藥延胡索琥珀各三分川芎半兩桂心半兩上為粗末每服三大錢水一盞姜三片煎至七分去滓溫服荊三稜散治産後積血不散結聚成塊或時寒熱不思飲食荊三稜熟地黃鱉甲各一兩桂心當歸桃仁三分川芎牡丹皮劉寄奴赤芍藥各半兩大黃炒牛膝三分上為粗末每服三錢水一大盞薑黃三片煎至七分候去滓溫服桂心丸出聖惠方治産後血氣不散積聚成塊上攻心腹或成寒熱四肢羸瘦煩痛不思飲食青皮乾漆炒煙出各三分沒藥檳榔當歸桂心赤芍藥牡丹皮各半兩大黃炒桃仁鱉甲炙厚朴荊三稜延胡索各一兩上為細末煉蜜為丸如梧桐子大溫酒下三十丸硃砂丸出大全良方治産後虛中有積結成諸疾黑附子桂心白姜各半兩巴豆一錢醋浸煮去皮尖上為細末入巴豆研停醋煮麵糊丸如麻子每服三丸或至五丸冷茶下服之取瀉為度産後血氣不通當時不甚覺如在産出血少皆成癥結心腹痛硬乍寒乍熱餘氣不進不生肌肉心腹有時刺痛口乾黏手足沉重有熱狀者宜服此方出大全良方當歸芍藥甘草牛膝鬼箭羽人參三分牡丹皮虎杖白朮各六分大黃水蛭炒蒲黃各三分虻蟲十四枚制乾地黃七分朴硝十分烏梅肉炒白薇桂心各四分上為末煉蜜丸如桐子大空心酒服二十丸日兩服外臺祕要有赤石脂十分禹餘糧丸出聖惠方治婦人産後積冷堅癖禹餘糧烏賊骨吳茱萸各三兩半當歸白朮細辛乾地黃人參芍藥芎藭前胡各一兩去銖虻蟲一兩桂心蜀椒各二兩半上為末煉蜜丸桐子大每服二十丸空心酒或米飲下二十丸日三不知則加之五加皮酒治産後癖瘦五加皮一斤枸杞子一斤蛇床子一升杜仲炒一升亂髮半斤乾地黃丹參各二兩乾薑三兩天門冬四兩上㕮咀以絹袋子盛用酒三斗浸三宿一服日再稍加至十合住鱉甲散出聖惠方治産後小腹內惡血積聚成塊堅硬疼痛脹滿鱉甲一兩塗醋炙令黃去裙襴桃仁一兩湯浸去皮尖雙仁麩炒微黃川大黃三兩銼碎醋拌炒乾吳茱萸一分湯浸七次焙乾微炒桂心一兩鬼箭羽一兩牛膝一兩去苗當歸一兩炙微炒菴䕡子一兩上為散每服三錢水酒各半中盞入生薑片半分同煎至六分去滓食前稍熱服水蛭散出聖惠方治産後惡血不盡月經日久不通漸成症塊臍腹脹硬時時疼痛水蛭八十枚炒令黃虻蟲八十枚去翅足微炒牛膝一兩去苗牡丹皮半兩桃仁三分湯浸去皮尖麩炒微黃桂心半兩菴䕡子一兩當歸一兩銼炒鱉甲一兩塗醋炙令黃去裙襴乾漆一兩搗碎炒令煙出鬼箭羽三分去苗琥珀三分吳茱萸半兩湯浸七次干微炒麝香二分研入上為散入研了藥令勻每服食前以溫酒調下一錢木香丸出聖惠方治産後惡血不散積聚成塊在臍腹下堅硬疼痛木香半兩荊三稜一兩微煨檳榔一兩桂心半兩附子一兩制去皮臍沒藥半兩阿魏半兩面裹煨面熟為度桃仁一兩湯浸去皮尖雙仁麩炒微黃鱉甲一兩塗醋炙黃去裙虻蟲一分去翅足微炒水蛭一分微炒令黃當歸半兩銼微炒芎藭半兩牡丹皮半兩赤芍藥半兩硇砂半兩細研川大黃一兩半銼碎微炒乾漆一兩搗碎微炒令煙出上為末煉蜜和搗五七百杵為丸如梧桐子大每服以溫酒下二十丸日三四服鱉甲丸出聖惠方治産後積聚按之躍手飲食不進肌膚萎黃不耐勞苦嘔逆上氣月水閉塞鱉甲一兩半塗醋炙令黃去裙川大黃一兩炙碎微炒乾漆一兩搗碎炒出煙干熟地黃赤芍藥半兩芎藭半兩桂心半兩延胡索半兩牡丹皮半兩蠐螬十四枚微炒虻蟲十四枚微炒水蛭一分炒令黃當歸三分銼微炒乾薑半兩炮製銼上為末煉蜜和搗三五百杵丸如梧桐子大每於食前以溫酒下十丸桃仁煎出聖惠方治産後惡血結成症塊羸瘦無力桃仁四十九枚湯浸去皮尖雙仁研入膏生地黃汁二升生牛膝汁一升白蜜五兩以上四味同於石鍋中慢火熬如稀餳鱉甲一兩半塗醋炙令黃去裙荊三稜一兩微煨銼當歸一兩銼微炒延胡索一兩乾漆一兩搗碎炒令煙出芫花半兩醋拌炒乾水蛭四十九枚炒令黃虻蟲四十九枚去翅足微炒檳榔一兩川大黃一兩打碎微炒桂心一兩琥珀一兩上為末入前煎中搜和搗三二百杵為丸如梧桐子大每服食前以溫酒下二十丸乾漆丸出聖惠方治産後惡血不散結成症塊經脈不利乾漆一兩搗碎炒令煙出牡丹皮三分赤芍藥一兩琥珀一兩桃仁一兩湯浸去皮尖雙仁麩炒微黃牛膝一兩去苗桂心三分吳茱萸一分湯浸七次炒川大黃一兩銼微炒水蛭三十枚炒令黃虻蟲十五枚去翅足微炒菴䕡子一兩亂髮灰一錢䗪蟲二十五枚微炒大麻仁半兩鱉甲一兩醋塗炙令黃去裙襴蠐螬十五枚微炒上為末煉蜜和丸如梧桐子大每服空心以溫酒下芫花散出聖惠方治産後腹中有症塊疼痛不可忍芫花一兩醋拌炒乾川烏頭一兩炮製去皮臍乾薑一兩炮製銼木香蓬莪朮各一兩劉寄奴半兩桂心一兩當歸一兩微炒沒藥一兩上為末先以米醋五升於銀鍋中煎如稀餳後下藥搗三二百杵丸如緑豆大每服以溫酒下十丸琥珀丸出聖惠方治産後惡血不散積聚成塊琥珀一兩赤芍藥一兩桂心一兩當歸一兩銼微炒大黃一兩半銼碎微炒乾漆一兩搗碎炒令煙出虻蟲三分去翅足微炒水蛭三分炒令黃鱉甲一兩塗醋炙令黃去裙硇砂一兩細研桃仁三兩湯浸去皮尖雙仁麩炒微黃上為細末煉蜜和搗三四百杵丸如桐子大每服空心及晚食前以溫酒下二十丸硇砂丸出聖惠方治産後聚積症塊疼痛硇砂五兩望淨夥㨄者以固濟了瓷瓶一所用獨掃灰納瓶子中可一半安硇砂在中心又以灰三之後蓋瓶口以文武火煅令通赤待冷取出細研如粉川大黃半兩銼碎微炒乾薑一分炮製銼當歸半兩銼微炒芫花半兩醋拌炒乾桂心半兩麝香一分細研又為末入研了藥令勻以酒煮蒸餅和為丸如緑豆大每服空心以酒下五丸不飲酒荊湯下亦得三稜丸出聖惠方治産後症塊荊三稜一兩微煨銼木香半兩硇砂三分細研芫花半兩醋拌炒乾巴豆一分去心皮綿裹壓去油上為末研入前件硇砂巴