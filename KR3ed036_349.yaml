肉一斤煮清汁五大盞去肉入藥煎至四盞再去滓作三次服又方當歸人參等分上為末豬腰一隻薄切挑藥三錢水二盞粳米半合同煎至一盞去沫再服治蓐婦血妨以芭蕉根搗汁飲之治蓐中血暈取豬脂燒灰酒服之立驗已斃者去板齒灌之經一日亦可治産後血邪攻心狂語附論夫血邪攻心狂語者由産後臟腑俱虛敗血奔沖邪淫於心心不受觸氣血相蒸氣搏於肝神魂不定內外虛亂心氣怯弱因其體虛血邪干於心臟故狂亂或見鬼神也柏子仁散治産後荒言亂語皆由內虛是血邪攻心柏子仁遠志去心人參去蘆頭桑寄生防風去蘆頭琥珀細研當歸銼微炒熟乾地黃甘草炙微赤銼各半兩上為散每服以水一大盞入白羊心一枚切先煎至七分候去滓心下藥五錢更煎至四分去滓不計時候溫服茯神散治産後血邪心神恍惚言語失度睡臥不安茯神一兩人參去蘆頭龍齒琥珀赤芍藥黃耆牛膝去苗以上各二分生乾地黃半兩桂心半兩上為散每服用一盞先以羊腎三錢水一中盞同煎至六分去滓不計時候溫服羊腎湯治産後狂語如見鬼神皆是體虛心氣不足邪血所攻羊腎一對切去脂膜遠志三分去心白芍藥三分熟乾地黃一兩黃耆銼白茯苓人參去蘆頭防風去蘆頭獨活甘草炙微赤銼羚羊角屑以上各半兩上為散每服用一大盞先煎羊腎至七分去腎入藥五錢再煎至四分去滓不計時候溫服麝香散治産後血攻心言語無度煩悶不安麝香一分牛黃一分硃砂三分龍齒三分麒麟竭半兩上都細研為散不計時候以豆淋酒調下一錢琥珀散治産後迷悶言語錯亂琥珀一兩細研人參三分去蘆頭遠志三分去心茯神三分生乾地黃三分阿膠三分搗碎炒令黃煙鐵粉一兩硃砂半兩細研甘草一分炙微赤銼麝香一分細研上為細散入研了藥令勻不計時候以金銀湯調下一錢金烏散治産後血邪衝心言語不得心神迷悶烏鴉一兩燒灰麝香半兩虎糞一兩燒灰上同研令細不計時候以童子小便調下一錢鐵粉丸治産後體虛血邪攻心狂語或見鬼神鐵粉一兩天竹黃半兩真珠末半兩地黃半兩砒黃一兩研硃砂一分麝香一分琥珀半兩金箔二十片銀箔二十片上都研如面以粟米飯和丸如梧桐子大不計時候以竹葉湯下五丸丹砂丸治産後血邪攻心迷悶氣不足臟腑虛弱令人如癲狂怕驚或啼或笑或驚或恐言無准憑狀如鬼魅宜服光明硃砂二兩白礬二兩金箔五十片先將光明硃砂並礬納瓷瓶子中封閉了於甑上每兩度蒸至半月日取出和前金箔細研以粟米軟飯和為丸如緑豆大每服不計時候以麥冬湯下七丸麝香散治産後血邪氣攻心如見鬼神狀候似風亂語不定腹中刺痛脹滿宜服麝香一錢細研烏驢蹄護一兩燒灰亂髮二兩燒灰乾漆一兩搗碎炒令煙出上為細散研入麝香令勻不計時候溫酒調下一錢麒麟竭散治産後血邪攻心恍惚如慳狂麒麟竭一分蒲黃三分上相和研令細不計時候以溫酒調下二錢治血攻心癲狂不識人宜服此方赤馬蹄炒令焦黃白殭蠶微炒各一兩上為細散不計時候煎苦參湯調下一錢又方延胡索半兩狗膽一分乾者琥珀半兩上為細散不計時候以溫酒調下一錢童便調亦可茯苓湯治産後心氣不足血邪狂亂眠臥不安白茯苓去黑心熟地黃焙各一兩半甘草炙銼遠志去心焙獨活去蘆頭防風去叉人參各半兩白薇龍齒各一兩半研上粗搗篩每服三錢水一盞煎至七分去滓溫服不拘時治婦人産後發狂用木香附子去須皮淨為末每用二錢再入研極細真辰砂末一錢以燒通紅稱錘淬好酒調服神效八珍散治産後痰迷心竅言語不正狀如癲狂人參石菖蒲生地黃川芎各一兩硃砂別研防風去蘆各半兩細辛洗淨一錢甘草炙半兩上為末每服一錢薄荷湯下不拘時候地黃多戀膈脾胃不快者即以當歸代之黑龍丹出濟生方治産後敗血衝心不省人事狂言如癲當歸去蘆酒浸五靈脂川芎高良薑三兩生地黃三兩以上銼入砂鍋內紙筋鹽泥固濟炭火煅令通紅令冷後取出細研入後藥生硫黃花蕊石百草霜乳香琥珀上五味一兩一錢細末同前藥和勻米醋煮麵糊為丸如彈子大每服一丸服時再入炭火煅藥通紅入生薑汁內浸碎以無灰酒合童子小便頓服神效不可述治産後癲狂出永類鈐方用小柴胡湯加生地黃同煎百餘沸安又有服逍遙散外加遠志桃仁蘇木紅花每服一錢重服後再服平胃散安此先理血而後理脾者寧中膏出如宜方治産後心志不寧心血耗散狂亂見鬼人參酸棗仁各一兩辰砂半錢上為末蜜丸如彈子大每服一丸薄荷湯化下又宜研琥珀麝香燈心湯下
