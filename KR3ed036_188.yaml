body:
  text: 卷一百八十八諸血門總論夫人之所以滋養其身者唯氣與血血為營氣為衛營行脈中衛行脈外周流不息五十而復大會陰陽相貫如環無端焉蓋血猶水也水由地中行百川皆理則無壅決之虞血之周流於身上透泥丸下至湧泉灌溉諸經營養百脈內不為七情所郁外不為四氣所傷自然順適萬一微爽節宣則血氣逆亂營衛失度背於常經或澀或散或下而忘返或逆而上行乃有吐衄便利汗痰諸證生焉夫血之妄行固由積熱所致然其證多端難以概而論有因飲食過飽負重傷胃而吐者有思慮傷心並積熱而吐血衄血者有勞傷心肺又為七情所幹而咳血吐血者心主血肝藏之而脾為之統過思傷脾亦能令人吐血治之須究其因傷胃者調胃安血勞心者補益其心志血熱則清之氣鬱則順之脾傷則安之病之淺惟有早灸膏肓而已至若肺生疽瘡或從高墜下一切傷折皆能吐血傷寒汗後不解鬱結經絡隨氣湧泄吐血衄血又當從各類求之凡心主血肝藏血肺主氣血為營氣為衛六氣不傷七情不郁營衛調平則無壅決之虞節宣失宜必致壅閡遂不得循經流注失其常度故有妄行之患焉夫血之妄行也未有不因熱之所發蓋血後得熱則淖溢血氣俱熱血隨氣上乃吐衄也大抵寸口脈微而弱氣血俱虛則吐血關上脈微而芤為失血沉細者易治浮大者難治久吐不瘥面色黃黑氣血未復或發寒熱或惡寒者亦難治凡吐血有三種有內衄有肺疽有傷胃內衄者出血如鼻衄又有不從鼻孔出是近從心肺間津液出還流入胃中或如豆羹汁或如切𧗐血凝停於胃中因即滿悶便吐或去數斗至一石者是也肺疽者或飲酒之後悶滿嘔吐之時血從吐後出或一合半升是也傷胃者因飲食大飽之後胃中冷則不消化便煩悶嘔吐使所食之物與氣共上衝蹙因傷裂胃口吐血色鮮正赤腹絞痛白汗出其脈緊而數者為難治也素問帝曰病胸脅支滿妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭而肝傷故使月事衰少不來也治以烏賊骨䕡茹二味併合丸以雀卵大如小豆以五丸為率飯後以鮑魚汁下利腸中及傷肝也凡吐血後體中但覺奄奄然心中不悶者輒自愈假令煩躁心中悶亂紛紛嘔吐顛倒不安醫工又與黃土湯阿膠散益加悶亂卒至不濟如此悶者當急吐之上焦有邪則傷諸臟臟傷血下入於胃胃得血則悶滿氣逆氣逆故吐血也凡醫人不明發表攻裡亂投湯劑有誤性命更大忌夏月燔灸中脘臍下關元氣海背俞三里等燔炙千百壯者全無一效使病者反受其殃虛勞之疾凡肉食熱面辛酸之物不可食所可食者菠稜葵菜冰水清涼之物無所禁忌蓋得寒涼滑利腸骨使氣並無壅礙燥澀經曰谷入於胃脈道乃行水入於經其血乃化若不忌慎致令病人胃口閉澀則形軀漸瘦此乃死之由也但人之咯膿血衄血大小便血者可服三黃丸黃連解毒丸涼膈散加桔梗當歸大黃芍藥犀角地黃湯大作劑料時時呷之內經所謂邪熱傷於肝心之病依此調治萬舉萬全矣人之一身不離乎氣血凡病經多日療治不痊須當為之調血血之外證痰嘔燥瀉昏潰迷忘常喜湯水漱口不問男女老少血之一字請加意焉用藥川芎蓬朮桃仁靈脂生地黃北大黃為要嘔甚者多加生薑以此先利其宿瘀嗣以茯苓茯神川芎甘草調理之蓋血隨氣行氣逆而上奔則血不循於經絡而湧吐矣人之吐血出於上焦有熱固也然能用柴胡黃芩蒲黃茅花等輩而不能用枳殼北梗青皮生薑烏梅之類又不能用通利丸子以開其中脘導其大便氣如何而下降血如何而下行吾恐逆奔而上有不可得而止之者若夫依前治法血止而後又當以人參川芎當歸茯苓橘皮半夏甘草為之調理虛則加木香熱則加柴胡壅則加桑皮荊芥其人脈澀必有漱水之證必有嘔惡痰涎之證必有兩腳厥冷之證亦必有小腹結急之證或唾紅或鼻衄此皆滯血作熱之明驗也用藥不止於柴胡黃芩當以川芎白芷桃仁五靈脂甘草佐之大便祕結者於中更加大黃濃蜜使滯一通黑物流利則熱不復作吐血附論夫吐血病有三種一則緣心肺蘊熱血得熱則妄行下流入胃胃受之則滿悶氣道奔沖故令吐血二則虛勞之人心肺內傷恚怒氣逆肝不能藏血投虛而出因怒氣逆甚則嘔血三者緣酒食飽甚胃間不安或強吐之氣脈奔亂損傷心胃血隨食出此名傷胃各隨證以治之方當歸大黃湯出千金方治吐血胸中寒痛芍藥乾薑茯苓桂心當歸大黃芒硝各二兩阿膠甘草人參各二兩麻黃一兩乾地黃四兩虻蟲水蛭各八十枚大棗二十枚桃仁百枚上㕮咀以水一斗七升煮取四升分五服日三夜二黃土湯一名乾地黃湯出千金治吐血方伏龍肝雞子大二枚桂心去粗皮乾薑炮裂當歸芍藥白芷甘草炙銼阿膠芎藭各一兩生乾地黃八兩焙細辛半兩去苗葉吳茱萸二升上㕮咀以酒七升水三升合煮取三升半去滓內膠煮取三升分三服亦治血衄一方無阿膠空心食前溫服救脈湯一名人參救肺散出試效方治吐血咳血升麻柴胡人參蒼朮各一錢當歸梢熟地黃白芍藥黃耆各二錢蘇木半兩甘草陳皮各半錢上為散作一服水二盞煎至一盞去滓溫服食前羚羊角湯出聖濟總録治吐血羚羊角鎊三兩伏龍肝五兩熟艾炒一兩地榆去土牛膝去酒浸苗焙牡丹皮去心各二兩芍藥銼四兩阿膠炒令燥一兩柏葉炙大薊根各三兩雞蘇葉一握蠐螬慢火炙黃五枚上為粗散每服三錢水一盞入生薑半分拍碎同煎至七分去渣溫服二神湯出朱氏集驗方治吐血絶妙男子婦人吐紅之疾蓋是久病或操作急勞損其營衛壅滯氣血遂致妄行所致若投以藕汁生地黃等涼劑治之必求其死矣每遇患者用藥甚簡甘草炙乾薑炮等分上為末每服二錢水一中盞煎至五十七沸帶熱呷空心日午進之和其氣血營衛自然安痊不可不知地黃飲出千金方治忽吐血一兩口乾生地黃焙五兩王不留行牡丹皮各二兩赤芍藥萆薢各四兩麥門冬去心焙續斷牛膝切焙阿膠炙燥各三兩蠐螬研五枚上粗搗篩以生地黃汁三升水三升並蠐螬同煎至三升半去滓分溫六服空心食前不瘥更合數劑取瘥赤芍藥散出聖濟總録治吐唾血赤芍藥當歸切焙附子炮裂去臍皮黃芩去黑心白朮甘草炙銼各一兩阿膠炙燥二兩生乾地黃焙乾四兩上為末每服三錢空腹溫酒調下日三服桑白皮散治吐血桑根白皮六兩生薑屑六兩柏葉雞蘇各四兩小薊根五兩乾地黃七兩青竹茹一升新者地松三兩上搗散煮桑白皮飲和一方寸匕日再漸漸加至二三匕以竹瀝下亦得白朮散出醫方大成凡吐血咯血鼻衄其得之多因積熱之甚或飲食過飽馳騁傷胃絡也不然驚恐悸怒使氣逆上而不下行血隨氣而鬱積胸間久則吐血咯血鼻衄宜服此行營衛順氣止血進食退熱惟忌食熱面煎爆海味豬雞一切發風之物更不宜甚飽常令飢飽得所自然胸膈空利氣血順也昔蘇少連病此極重可謂百藥不效偶姜昌傳此方服之遂愈後濟人屢效白朮二兩人參去蘆白茯苓去黑皮黃耆各一兩蜜炙柴胡去蘆一分山藥百合去心各三分甘草半兩炙前胡去蘆一分上銼散每服一錢半水一盞姜三片棗一枚同煎至六分溫服日三服茅根散出經驗良方治吐血雞冠花馬藺菜根柳枝楓枝白茅根生薑甘草各等分上㕮咀以酒一升半童子小便一盞瓦器濟固煮至一升去滓溫服雞蘇七味湯出經驗良方治血病有二種一者緣墮地損內傷而致此病二者緣積熱兼勞而有此病若內傷自須依前內損大便血等諸方救之若積纍勞吐血更無餘候但覺心中悁悁似欲吐背上煩熱便致此病宜以此藥及桑白皮散療之雞蘇五兩生地黃切青竹茹各一升生薑桑白皮各六兩小薊根切六合生葛根切六合上切以水九升煮取三升去滓分溫三服服約相去如人行十里久若一劑得力欲重合服至四五劑尤佳隔三四日服一劑如未定則宜合前桑白皮散服之犀角湯出千金方治吐血酒客中溫疫熱毒乾嘔心煩者蒲黃犀角栝蔞根甘草各二兩葛根桑寄生各三兩上㕮咀以水七升煮取三升分三服通聖散出聖濟總録治肺損吐血嗽血金星石銀星石雲母太陰玄精石陽起石不灰木用等分以乾鍋子一枚先以羅過紫冬灰即水牛糞是也可厚一二寸鋪藥一重以灰一二寸築令實又鋪藥一重准前以灰蓋後鋪藥盡為度上下以灰封蓋以泥固濟不限藥多少皆用炭一稱於靜室中周密不通風處火煅一日一夜候冷取出於淨地掘一坑子深一尺許埋鍋子一宿取出先揀出藥塊子余以粗羅羅去灰取藥碾為末更入乳鉢研令極細即入罐子內收之每藥末一兩入龍腦麝香各半錢阿膠一分炒同研入前件藥末一兩內合和令勻每服一錢或半錢以糯米少許細研入薄荷汁各少許同煎為飲候溫調下空心日午臨臥各一服烏金散出聖濟總録治吐血及一切血病諸藥不效者鯪鯉甲犀角鎊黃明膠赤鯉魚皮各一兩胎髮一兩半獨角仙一枚去翅頭足用瓦瓶一枚底下開竅內藥以紙筋泥固濟曝乾用炭五斤簇燒候煙絶撥去火放冷取出研細為散每服一錢旋入膩粉少許吐血鼻衄不止新汲水調下産後血暈昏迷悶亂不知人冷醋湯下血氣溫酒調下咯血及血積藏毒下血赤白痢血痢腸風及五痔下血並米飲調下臨臥空腹服更相度虛實可加至二錢服藥後取下積聚物為效紫蘇散出聖惠方治吐血並衄血不止紫蘇生乾地黃各二兩桂心當歸牛膝去苗阿膠搗研炒令黃燥各一兩上為散每服五錢以水一中盞煎至五分去滓每於食後溫服之天門冬丸出醫方大成治吐血咯血大能潤肺止嗽天門冬一兩甘草白茯苓阿膠各半兩杏仁炒貝母各七錢上為末煉蜜丸如梧桐子大每服一丸咽津含化夜可十丸五通散出聖濟總録治吐血巴豆五十枚去皮白麵一兩郁李仁三百五十枚鹽豉三百五十粒伏龍肝二兩用鍋子內炒熟不住手攪以煙青為度傾出放濕地出火毒為末每服半錢溫蜜水調下如患咯血用前件藥末一兩鄆州蛤粉二兩同研羅細每服一錢薤汁半盞生油兩點食後調服阿膠散出聖濟總録治男子婦人咯血吐血阿膠炒令燥白芨白芷白蘞黃柏去粗皮蜜水浸炙赤各一兩上為散每服三錢糯米粥飲調下空心食前服小兒量減竹葉芍藥散出聖濟總録治吐血衄血大小便出血竹葉六合赤芍藥甘草炙銼各一兩阿膠炙燥三兩當歸切一兩焙半上粗搗篩每服五錢水一盞半煎至八分去滓溫服食後日二服人參湯治吐血咯血人參川芎茯苓半夏制各三分甘草各一分上銼每服三錢姜五片煎服固榮散治吐血便血白芷半兩真蒲黃炒一兩甘草炙三錢地榆去蘆一兩上為末每服三錢溫酒調服如氣壯人加石膏半兩一方用溫湯調服犀角地黃湯治寸芤血在胸吐血者生地黃二兩黃芩一兩半黃連一兩大黃半兩上㕮咀稱一兩水二錢煎至一盞去滓食後服之烏梅散治吐血馬鞭草二錢罌粟殼大者四個去瓤梗甘草二錢大烏梅一個上為粗末每服三錢水一盞半煎至八分去滓日午空心臨臥服黃耆散治吐血黃耆銼白芨白蘞黃明膠炒令燥各二兩上為散每服二錢糯米粥飲調下絿雲散治吐血柏葉百合人參阿膠炙令燥各三兩上為散每服二錢用糯米粥飲調下煮肺散治吐血補肺杏仁一百二十九粒去皮尖新瓦上焙研百合四兩糯米一合蔥白三莖同杏仁法上和勻豬肺一具入藥在內麻線系沙鍋內煮水去一半翻轉令熟竹片切藥細嚼蜜湯下服至五具為度艾葉散治吐血內崩上氣面色如土乾薑