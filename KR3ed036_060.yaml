日用三五次銅青丸一名千兩金丸出百一選方不問陰陽閉如急病內外腫塞輒至不救用之能起死治纏喉風車前草嫩者半兩銅青一二錢大黃牙皂各半兩上為末以白梅肉同研成膏每兩作十五丸用時以薄綿裹一丸內口中以線系定在外口中含化或不必綿只如此含化亦可咽津吐出涎若兩日後則難開矣牛膽膏一名佛手散出仁存方治鎖喉風神效青黛一錢研殭蠶半兩去絲朴硝一兩研甘草二錢半生上為末用臘月黃牛膽安藥在內當風掛百日再入研麝香少許每服半錢或調服或研碎吹入喉中一方不用牛膽作散筒吹喉內一方不用麝香一方各等分殭蠶散一名三白散出仁存方治喉閉殭蠶一七條馬勃拳大者瓦上揩成末白礬皂子大生天南星一個炮上為末大人一錢小兒半錢生薑自然汁調下一方無馬勃白梅丸出仁存方治喉閉及腫痛白梅二十五個取肉白礬一錢甘草末生蓖麻四十九粒去皮上同研細和丸如雞頭大以綿裹之含化粉香散出瑞竹堂方吹乳蛾即開白礬三錢巴豆二粒去皮輕粉少許麝香少許研上於鐵器上飛白礬沸入巴豆在上礬枯去巴豆不用為細末三味合吹喉啞瘴咽喉乳蛾方出瑞竹堂方雄黃五錢研鬱金五錢白礬二錢半生用研膽礬半錢上為極細末以竹筒吹入喉中立能言語治喉痹乳蛾風硼砂明礬膽礬芒硝硃砂各等分同為末上為細末吹喉中羅青散出瑞竹堂方治咽喉單雙乳蛾及治心肺積熱上攻咽喉腫痛閉塞水漿不下或喉癤重舌木舌腫脹並宜服蒲黃五錢羅青研盆硝各三錢研甘草二錢上為細末每服一錢冷蜜水調下細細嚥之吞不下雞翎蘸藥喉內掃之立效一方炒糖和丸每兩作五十丸每服一丸噙化亦可烏龍膏治急喉閉纏喉風皂角七梃捶碎水五升挼汁去滓草烏頭銼天南星銼大黃銼各一兩上併入皂角水內煮取二升濾去滓不用再熬成膏入新瓷器內候微凝入朴硝末一兩攪勻候冷入白殭蠶末一兩收之如用以半匙頭甘草湯或茶清化下灌入口內立愈如干以好酒調之不拘時候又方鴨嘴膽礬銅青輕粉胡粉明礬上各一字江茶半錢逐旋和以新汲水調呷咽之如吐即愈奪命箸頭散治急喉閉咽喉腫滿堵塞氣不得通欲死者真膽礬草烏各四錢綠礬六錢雄黃二錢上為細末每服一箸頭點上咽喉內急吐涎沫立應次以大黃甘草等分俱為粗末每服三錢水一盞半煎至一盞去滓化乳香一粒溫服滌去滓毒恐為再發一方加白礬二錢玉鑰匙治風熱喉痹及纏喉風焰硝一兩半硼砂半兩腦子一字白殭蠶一分上為末研勻以竹筒吹半錢許入喉中立愈雄黃散治纏喉風喉閉先兩日胸膈氣緊吸氣短促忽然咽喉腫痛手足厥氣閉不通頃刻不治巴豆七枚三生四熟生者去殼研熟者去殼燈上燒存性干桑黃茹二片雄黃一塊皂角子大透明者細研鬱金一枚蟬肚者研為末上再研勻每服半字茶清少許下如口噤咽塞用小竹管納藥吹入喉中須臾吐利即效一方無干桑黃茹玄參丸出聖濟總錄治纏喉風玄參白殭蠶白礬生用各一分甘草生用半分上為細散用鯉魚膽汁和丸如赤小豆大每服十丸食後溫服生薑湯下日三服開關散出王氏博濟方治走馬纏喉風及喉痹硝石六兩鉛丹四兩白礬砒霜各半兩上細研用瓷罐子一個先入硝石二兩鋪底次下砒霜又入硝石二兩方下白礬更入硝石二兩方下鉛丹後用圓瓦一片蓋口於淨地上用方磚一片襯藥罐子以炭火五斤煅令通赤罐子固濟熔成水以炭條子攪令徹底勻方去火放冷於地上經宿打罐子取藥研如粉患者用箸頭蘸冷水惹藥深點咽喉內漸漸咽津至甚者不過三兩度點伏龍肝散治喉痹伏龍肝半兩白礬煅過白殭蠶直者炒甘草生各一分上為散每服一錢匕如茶點服吐出涎立效未吐更一服治喉痹方蛇蛻白梅白殭蠶甘草各等分上為末綿裹含化咽津四聖散出德生堂方治咽喉口齒喉閉乳蛾荊芥穗牛蒡子炒碾細紫河車各三錢大黃六錢半大實者再加用上搗篩每服五錢水一盞煎八分食後臨臥時先漱後咽如聖湯出旅舍方治痰去熱利咽喉治咽中有瘡咽物不下及咳嗽咯血肺痿痰唾氣促並小兒瘡疹毒攻咽喉腫痛桔梗一兩甘草生一兩牛蒡子炒一兩麥門冬半兩上為細末沸湯調細細服入竹葉煎尤妙龍麝丹治纏喉風白礬飛過雄蛇蛻於高處凡於屋上樹枝或籬壁上者是雄蛇一兩火煅過用硼砂半兩研麝香半兩另研上研勻用牛蒡子自然汁為餅子如錢大以紅綿包噙化如牛蒡子汁稀入糊少許治喉閉方豬牙皂角二錢燒存性葛根粉一錢末茶二錢乾荷葉一錢半上為細末吹入喉中即愈治喉痹咽喉腫痛上焦風熱痰唾不利烏蛇皮燒灰白梅微炒甘草生銼各一分桂心半分上為細散每服以新綿裹二錢含咽津立通一捻金散治咽喉方銅綠黃柏香白芷各等分上為極細末入麝香少許每用一字吹入喉中如聖丸治九種咽喉殭蠶南星馬屁勃各等分上為細末用鹽梅生薑汁為丸如彈子大噙化又方殭蠶百藥煎大黃各等分上為細末鹽梅為丸如彈子大噙化通後補助紫蘇藿香甘草各等分上為散每服四錢水煎空心服治喉痹大黃朴硝白殭蠶各等分上為細末水煎量虛實用以利為度吹喉散治喉痹腫硬水漿不下白礬半兩半夏巴豆各七枚上熔白礬銼半夏巴豆在汁中候乾研細吹入喉中地龍膏治纏喉風活地龍白頸者五條白梅肉二個朴硝二錢上同研成膏挑入喉中含化一捻金散治乳蛾及風熱上攻咽喉腫痛白殭蠶去絲嘴三條薑汁浸溫炙黃色防風鼠尾者去叉二錢明礬三錢研上為細末用竹筒吹入喉內立愈治喉痹豬牙皂角蜜塗炙香別研白礬一分研雄黃半兩研上和勻以濃茶少許調一字安舌上漸嚥下有涎即吐之如牙關緊急點一字如齒藥用之治纏喉風青礬白礬雄黃各半兩上同研細以天南星三兩為末四味同和臘月用黃牛膽汁調勻捻成餅子陰乾要用時取少許為末白梅肉為丸如雞頭大外用綿裹含口中勿令咽去候汁流咽喉以吐風痰盡為度治急喉腫閉藜蘆瓜蒂雄黃上等分為末吹入鼻中蓋通關竅也半夏桂甘湯治冷證無陽咽疼喉閉辣桂甘草焙半夏制上等分銼碎每服三錢水一大盞煎半候冷少呷山豆根方治熱閉山豆根射干升麻各等分上㕮咀用井水二盞同煎至一盞去滓通口時時呷之又喉閉方牙硝五錢胭脂半錢鹽梅屑一錢上同研以雞羽送入解毒雄黃丸治纏喉風急喉閉猝然倒僕失音不語牙關緊急不省人事膈熱涎盛咽喉腫痛赤眼癰腫一切毒熱諸證華佗云其證先兩日氣緊驀然咽痛腫或手足厥冷霎時氣閉不通多死也一名雄金丸雄黃飛鬱金各一分巴豆去皮膜出油十四個上為末醋糊丸綠豆大熱茶清下七丸吐出頑涎立蘇未吐再服如未至死心頭尚溫灌藥下喉即活吐瀉無妨小兒喉嚨赤腫驚熱痰涎壅塞服二三丸量大小用一方作散茶清調下如喉閉不開用筒吹入得吐則醒比金丸治喉痹鉛白霜半兩青黛一兩甘草半兩上為末醋糊為丸如雞頭實大含化咽津痰出立效胡黃連散治咽喉中壅塞如核連頰腫痛胡黃連一分升麻半兩鉛霜研一分上除鉛霜外搗羅為散再同和勻每服半錢匕以綿裹含化咽津日三五度不計時候凝水石散治纏喉風猝然喉痹急如奔馬喉頰俱腫名為馬喉痹凝水石朴硝各半兩並用無油瓷盆盛火煅通赤合於地上出火毒一宿白殭蠶麩炒黃研如粉一兩上同研令勻每取少許摻咽喉中病甚每服二錢匕溫水調下若牙關緊急只於鼻中吸入奪命散治急喉風等證枯白礬南硼砂豬牙皂角皮弦揀去各等分上為細末吹喉中痰出即愈治喉風方明礬膽礬各二錢半馬牙硝一錢上為細末用竹筒吹入喉中手扯住鼻孔一時牙關緊急吹入鼻孔中又方豬牙皂角二錢半硼砂五倍子各一錢上為末用醋蜜調鵝翎點入口中繳出痰白礬散出聖惠方治喉痹氣悶白礬硇砂馬牙硝各半兩上於瓷盒子內盛用鹽泥固濟候乾以炭火煅令通赤取出細研用紙兩重勻攤置於濕地上以物蓋之一宿出火毒後再細研為散用半錢納於竹管中吹之喉內須臾即通如是咽門腫只以篦子抄藥點於腫處咽津即瘥馬牙硝散出聖惠方治喉痹氣欲絕馬牙硝硝石硼砂以上各半兩上以瓷瓶子內盛用鹽泥固濟候乾以慢火煅成汁良久取出候冷於地坑子內先以甘草水灑後用紙三重裹藥以土蓋之三宿出火毒後取出細研為散每服半錢用篦子抄納咽中咽津更以竹管吹入喉中瘥硝石散出聖惠方治喉痹熱毒氣盛痛硝石白礬砒霜各半兩上同細研於瓷盒中盛鹽泥固濟候乾炭火中燒令通赤取出向地坑中三日出火毒細研如粉咽喉腫閉處點少許便破治咽喉牛膝根糯米用四十九粒碾碎為末用上用水二盞煎服或生用乾用俱妙如治便毒以帶皮生薑米醋調敷之治喉中毒百發百中及咽喉一切疾出衛生家寶方皂角略炮去土高良薑各等分上為末搐鼻或已甚先須含香油一口不可吞然後搐之如已結成候少頃惡物膿血隨油而出輕者只含水如前法一用管子吹入喉中涎出愈神效不可言治喉痹出本草以牛角燒灰為末酒服方寸匕又方出本草取黃藥根以水研汁含之保安散治喉內結核不消石膽硇砂上研細每用竹筒吹之或以箸頭蘸之去涎方出危氏方草烏尖鴨嘴青膽礬各等分上為末先用釅醋煮皂角調鵝翎刷敷赤腫處開口流出涎即將綿球一指頭大以布線系定蘸前藥末吞嚥至腫毒處即抽出凡如此一二次其毒即破開口流出去盡涎血卻以後合瘡口藥點上停久溫鹽水灌漱後進食亦可合瘡口藥方用白礬黃丹麝香等分為末以銅箸點瘡口上千金療喉舌諸疾方松子苦芥子上搗以苦酒和貼上金鑰匙出仁存方治咽喉腫塞雄黃末半錢巴豆一粒去油上作一服生薑自然汁調灌下或吐或下皆愈一方細研每遇急患不可針藥者用酒瓶裝灰坐瓶嘴下裝火一炷焚之候煙起將瓶嘴入一邊鼻中用紙覆瓶口熏之立聖膏出百一選方治纏喉風巴豆齊州半夏各三七粒上將半夏輕槌每粒分作四片巴豆剝去心膜銀銅石器內用米醋三碗文武火熬盡醋為度用清醋微洗過研為膏子每患纏喉風或喉閉或癇疾用一斡耳以生薑自然汁一茶腳化下甚者灌藥少時吐出惡涎如魚凍相似立愈極有神效治喉風皂角燒灰飛礬上為末喉內去轉之一二次必效用淨水漱之治咽喉紫舌脹玄胡粉白礬各等分上為細末吹在口內立效吹喉散治喉痹乳蛾喉風明礬二兩膽礬五錢上研為極細吹患處效治喉痹方青礬半兩研杜牛膝草秋冬用根二寸春夏用心梗上同研看患處以筆蘸少許令吐膿血涎沫即愈礬硝散出朱氏集驗方治急喉痹纏喉風兼主重舌咽喉腫塞軟瘡白礬半兩飛過朴硝一錢飛過上為末摻入口中其效如神或搐鼻中一方銅箸點腫處再點瘡如穿硬則用針治急喉腫閉藜蘆豬牙皂角上等分為末吹入喉中立應丸一名如聖散出十便良方治纏喉風及急喉閉南星一個刮去皮一方炮地埋出火毒一夜白殭蠶七個上控南星心空作孔子入蠶於內濕紙裹文武火煨熟取出等分為末粥飲丸如梧桐子大如不丸只用綿裹藥末吞之亦便如開口不得揩齒上亦妙又為末每一字以生薑汁調下如開喉不得以小竹管擘口灌之涎自出小可只塗於唇上後用大姜一塊略炙過含之一方用蜜薑汁調藥將鵝毛蘸藥繳口內有涎吐出鹽礬散一名玉珍散出經驗良方治喉中乳蛾漸長塞喉者及治懸喉癰垂長咽中妨悶白礬煅為末鹽各等分上研細用箸頭頻點乳蛾上即焦硬而愈切不可挑破後有根時再發治急喉閉出經驗良方馬屁勃即灰菰焰硝各一兩上為末每用一字許吹入喉內吐涎血出立愈治走馬喉閉出朱氏集驗方白殭蠶半兩炒甘草一錢生上為細末每服一錢生薑汁調下涎出立愈治纏喉風出朱氏集驗方白礬銅綠上等分為末用一字鼻內搐之又方出海上名方生川烏頭尖膽礬上等分為末每服一字酒半呷調服如口不開即灌之二聖散出濟生方治纏喉風急喉痹鴨嘴膽礬二錢半白殭蠶去絲嘴半兩上為細末每用少許以竹管吹入喉中立愈殭蠶散一名開關散出仁存方治喉痹急喉風白殭蠶直者去絲嘴焙明白礬半飛枯半生用上等分為末每服一錢取生薑自然汁濃調嚥下小兒入新薄荷少許同薑汁研更加生蜜少許同調半錢服藥後不可飲湯水解藥欲得藥力住隔上少時也一方白梅和丸皂子大綿裹入喉涎出愈一方蜜丸含化神效方出三因方治喉閉熱腫語聲不出荊芥穗別為末蓖麻生去皮別研各等分上入生蜜少許丸如皂子大以綿裹含化急則嚼化一法用朴硝不有荊芥治喉痹方牛蒡子六分馬藺子八分上搗為散每空心暖水調服方寸匕漸加至一匕半日再服勝金散治咽喉猝腫喉閉戎鹽一兩青黛半錢上同研勻每服半錢匕或一字用小竹筒吹入咽喉咽津效治喉痹方出聖惠方白礬燒令汁枯研白附子搗末各等分上研令勻塗在舌上咽津有涎即吐之煙方出聖惠方白殭蠶三七枚直者乳香一分上為末每用一錢匕以香爐上燒開口令煙燻入喉中涎出效療喉痹急疼悶防不通方射干當歸各三兩上切以水三升煮取一升稍稍含之吐去更含升麻散出聖惠方治喉痹腫熱痛悶川升麻一兩馬藺子二兩上搗細為散每服以蜜水調下一錢治喉閉立效方出聖惠方蝸牛七枚白梅子三枚取肉上同爛研綿裹如棗核大含咽津即通治咽喉牙關緊閉出醫方集成用巴豆去殼以紙包巴豆肉用竹管壓出巴豆油在紙上以此紙作捻子點燈吹滅以煙燻入鼻中即時口鼻涎流牙關開矣一方用熱煙刺入口內即出涎或瘀血
