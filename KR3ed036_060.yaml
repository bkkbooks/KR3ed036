body:
  text: 卷六十咽喉門總論夫咽者應五臟六腑往還神氣陰陽通塞之道也喉嚨胞囊舌者並津液五味之氣本也咽門者肝膽之候也其重十兩廣二寸五分至胃管長一尺六寸主通五臟六腑津液神氣應十二時若臟熱則咽門閉而氣塞若腑寒則咽門破而聲嘶母姜酒主之熱則通之寒則補之若寒熱調和病不生矣喉嚨者脾胃之候也重十二兩長一尺二寸廣二寸其層圍十二重應十二時主通利水穀之道往來神氣若臟熱喉則腫塞氣不通烏翣膏主之若腑寒喉則耿耿如物常欲窒癢痹涎唾熱則開之寒則通之不熱不寒依臟調之咽者胃之系喉者肺氣之所通咽以咽物喉以候氣咽喉嚨三者各有所司咽者舌本之根因物之至推而納之以通胃所司者納而不出喉者候氣之呼吸以通肺所司者有出有入嚨者舌下二竅但閉口齒屈舌於上齶則津液滿以通心所司者有出無入風邪客於喉間氣鬱而熱則壅遏而為咽疼熱氣生於肺胃風毒蘊隆則腫結而為喉痹屍咽者陰陽不和脾肺壅盛風熱毒氣不能宣通故令屍蟲發動上蝕於喉或癢或疼如䘌之候也谷賊者谷芒強澀藏於米而誤食之滯於咽門不能傳化故風熱並聚與血氣相搏遂令腫刺如喉嗌之生谷賊也胃脘實熱熏炙上焦發為白頭赤根故有咽瘡之證臟腑停寒寒則氣縮如物窒礙於其間亦有喉閉之證若懸癰生於上齶雖不關於咽喉所以暴腫者亦熱氣使然也咽喉懸癰關要所繫病不急療皆能殺人凡咽喉病毒氣歸心胸前腫滿氣煩促下部洞泄不止者死候也一十八種喉風證論曰一單蛾風其形圓如小箸頭大生於咽喉關上或左或右關下難治二雙蛾風有兩枚在喉關兩邊亦圓如小箸頭大關下難治三蟬舌風自舌下再生重舌者是四牙蜞風牙齦上聚成癤毒者五木舌風其舌漸漸長大相似煮熟豬舌不能轉動者六舌黃風自舌上腫痛黃色者是七咬牙噤口風近牙窮頭作臖口噤不開者八魚口風如魚吸水者不治九聚毒塞喉風喉關聚毒涎唾稠實發寒熱仍分上下三關破毒下關難治十懸蜞蠱毒風上𦚞腫食而不能掩水外形如雞卵者十一嗆食風一名飛絲毒口中或食腥惡發泡者十二臘頰風腮臉結腫者是從牙窮頭碎此毒若成須要半月調理十三纏喉風風自耳邊過頤下赤色者是也亦有寒熱甚者傷人命十四松子風口內滿喉赤如豬肝逆張吞則關閉塞飲食不能者是用藥後口內散點松子樣腫則喉響如雷則不治十五崩砂甘口風自舌上牙齦上下腫赤口內作臖如湯熱牙齦漸爛甚者亦能脫齒十六連珠風自上作毒或初成一個碎而又作一個以至三五七九個者是十七蜂子毒或在腮臉癢爛或在喉關舌下作臖如黃金蜂者是十八走疰瘰癧風頸項結核五七個皮膚赤腫作寒熱者咽與喉會厭與舌此四者同在一門其用各異咽以納氣故嚥氣通於天喉以納食故喉氣通於地會厭與喉上下以司開闔食下則吸而掩氣上則呼而出是以舌抵上齶則會厭能閉其咽矣四者相交為用闕一則飲食廢而死矣故難經言七衡門而會厭之下為吸門及其為病也一言可了一言者何曰火內經曰一陰一陽結為之喉痹王太僕注云一陰者手少陰君火心主之脈氣也手少陽相火三焦之脈氣也二火皆主脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痹痹甚而不通則死矣夫足少陰循喉嚨挾舌本少陰上挾咽此二者誠是也至於足陽明下人迎循喉嚨足太陰挾咽連舌本手太陽循咽下膈足厥陰循喉嚨之後此數經皆言咽喉獨少陽不言咽喉而內經言一陰一陽謂之喉痹何也蓋人讀十二經多不讀靈樞經中經別一篇具載十二經之正其文云足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散上之肝貫心以上挾咽出頤頷中散於面系目系合少陽於外眥也又手心主之正別下淵液三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下是手少陽三焦之氣與手心主少陰之氣相合而行於喉嚨也推十二經惟足太陽別下項其餘皆湊於喉嚨然內經何為獨言一陰一陽結為喉痹蓋君相二火獨勝則熱結正絡故痛且速也故曰一言可了者火是也故十二經中言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也惟喉痹急速相火之所為也夫君火者猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痹則咽與舌在其間耳以其病同是火故不分也後之醫者各詳其狀強立八名曰單乳蛾雙乳蛾單閉喉雙閉喉子舌脹木舌脹纏喉風走馬喉閉熱氣上行結纏於喉之兩旁近外腫作以其形似是謂乳蛾一為單二為雙也其比乳蛾瘥小者名閉喉熱結於舌下復生一小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木者強而不柔和也熱結於咽項腫繞於外且麻且癢腫而大者名曰纏喉風喉痹暴發暴死者名曰走馬喉痹此八種之名雖詳若不歸之火則相去遠矣其微者可以咸耎之而大者以辛散之今之醫者皆有其藥也如薄荷烏頭白礬殭蠶朴硝銅綠之類也至於走馬喉痹何待此乎其生死人反掌之間耳其最不誤人者莫如砭針出血血出則病已昔余以治一婦人木舌脹其舌滿口諸藥不愈余以䤵針小而銳者砭之五七度腫減三日方平計取出血幾至盈斗又治一男子纏喉風腫表裡皆作藥不能下余以涼藥灌於鼻中下十餘行又以拔毒散敷之陽起石燒赤與伏龍肝各等分細末之日以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痹蓋龍火也雖用涼劑而不可使冷服為龍火宜以火逐之人火者烹飪之火是也乃使曝於烈日之中登於高堂之上令侍婢攜火爐坐藥銚子上使藥常極熱不至大沸通口時時呷之百餘次龍火自散此法熱行寒不為熱病捍格故也大抵治喉痹用針出血最為上策但人畏針委曲旁求瞬息喪命凡用針而有針創者宜搗生薑一塊調以熱白湯時時呷之則創口易合銅人中亦有灸法然病微者可用病速者恐遲則殺人故治喉痹之火與救火同不容少待內經火鬱發之發謂發汗然咽喉中豈能發汗故出血者乃發汗之一端也後之君子毋執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲效不幸遇大病而死矣咽喉死候者毒氣歸心胸前腫滿氣煩促下部洞泄不止此死候也實熱論一用敗毒散加黃芩半夏連翹倍用桔梗用生薑薄荷煎痰盛者加石膏同煎即效凡服此藥早晨服則午後攻作午後服則子時攻作天明退用針則無此攻作若服此藥後自利即換作虛熱醫後藥不可用服敗毒散後失音即服加減秘傳降氣湯二用生料消風散加玄參全蠍薄荷白水煎服三用前二藥不退用生料洗心散更加一二味去風毒藥為妙四用前二藥不退用防風通聖散立效虛熱論一用雙解散乃升麻葛根湯消風散加玄參黃芩薄荷煎二用秘傳降氣湯加生薑黃芩三如痰盛用桑白皮湯磨沉香吞養正丹仍用桔梗半夏湯冷水附湯等藥調理又一證上秘下瀉用秘傳降氣湯吞碧雪衣附子理中丸如無用桑白皮湯亦可喉痹者毒客於喉間氣結蘊積而生熱故喉腫塞而痹痛脈沉者為陰浮者為陽若右手關上脈陰陽俱實者是喉痹之候也亦令人壯熱而惡寒七八日不治則死喉痹附論夫喉痹者喉里腫塞痹痛水漿不得入也人陰陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結蘊積而生熱故喉腫塞而痹痛脈沉者為陰浮者為陽若右手關上脈陰陽俱實者是喉痹之候也亦令人壯熱而惡寒七八日不治則死治法先針而後藥可謂急先務矣馬喉痹之狀勢如奔馬喉間痹痛腫連頰骨壯熱煩滿數數吐氣者是也此蓋脾肺不利熱毒攻衝發於咽喉所致狗咽者喉中忽覺結塞不通如喉痹狀是也陰陽之氣出於肺循喉嚨而上下若風熱毒氣客於喉間氣結蘊積而生熱故有結塞之候俗云此疾由誤咽狗毛所致治法亦有將飯與狗分食取瘥者禳去之法也方絳雪散治熱結喉間連頰腫不消心膈煩滿木通銼桔梗銼炒檳榔各二兩枳殼去瓤麩炒犀角鎊各一兩半柴胡去苗升麻木香赤茯苓去黑皮各二兩桑根白皮銼山梔子各四兩桂去粗皮人參各二兩蘇枋木五兩訶黎勒去核五錢枚朴硝研一斤丹砂研一兩麝香研一分上除朴硝丹砂麝香外各細銼以水二斗於銀器內慢火熬至七分以生絹濾去滓再煎至五升下朴硝以柳木篦攪勿住手候稍凝即去火傾入盆內將丹砂麝香末拌令勻瓷器盛之勿令透氣每服一錢或二錢以冷蜜湯調下食後臨臥看老少加減菖蒲湯治喉痹口噤水漿不下風邪恍惚如有神鬼身體強直面目變色菖蒲秦艽去苗土桂去粗皮禹餘糧煅醋淬人參當歸切焙甘草炙銼附子炮裂去皮臍黃芩去黑心遠志去心防風去叉龍骨各半兩赤石脂芎藭赤芍藥赤茯苓去黑皮防己各一兩半上銼如麻豆大每服三錢匕以水一盞煎至七分去滓空服日再服干喉風出危氏方朴硝川烏當歸牛膝各五分錢麝香腦子各半錢硼砂三錢荊芥薄荷甘草蛤粉各五錢全蠍七個去毒上為末用清泔調春用菘菜汁調夏黃麥汁調如不能吞用豆腐切如棋子塊蘸藥入口內含化或新艾汁調下立效治喉嚨痛及喉痹並宜服之出本草以通草煎服之磨亦得急即含之治喉痹腫痛出本草取荔枝花皮根共十二分以水一升煮取六合去滓含之細細嚥汁瘥治喉痹出本草以天雄炮含之又方出本草以無患子研納喉中立開開關潤喉蓬萊雪出危氏方梅花腦子生麝香各一字硼砂三錢朴硝五錢以上別研薄荷葉百藥煎全蠍去毒防風去叉粉草各五錢以上並碾明乳香沒藥各三錢蒻葉或蘆葉盛火熨別研上為末每服少許以匙挑乾摻咽間及瘡上如在關下摻舌上並旋旋嚥下仍用薄荷桔梗甘草煎水噙漱或用生薄荷研自然汁調成膏入口噙化亦妙奪命無憂散一名玉屑無憂散如宜方治纏喉風咽喉疼痛風涎壅滯口舌生瘡心腹脹脾積痞塊小兒奶癖誤吞骨屑硬塞不下熱盛喉閉涎滿氣急或至悶亂不省人事並療之寒水石三兩煅玄參去蘆貫眾去蘆滑石研縮砂仁去殼黃連去毛茯苓炒令黃甘草炙山豆根荊芥各半兩並生用硼砂三錢上為細末每服一錢乾摻舌上後以新水嚥下不拘時任是百毒硬物可以除化如吃著巴豆杏仁石頭鐵札麥糠棘針瓷瓦子等物及諸藥毒火毒亦可用此藥每服半錢能潤三焦消五穀除三尸去八邪除九蟲趕瘟疫專醫渴疾其效如神魯直號金臺玉簡方龍腦散出聖惠方治馬喉痹頰咽痛白龍腦細研牛黃細研犀角屑羚羊角屑馬牙硝細研玄參沉香硃砂細研甘草炙微赤銼以上各一分川升麻半兩硼砂一錢細研上除龍腦牙硝搗篩為散每服三錢匕水一盞竹葉七片煎至六分去滓溫入龍腦牙硝一錢攪令勻細細含咽利咽湯治咽喉諸疾桔梗枳殼牛蒡子荊芥甘草升麻玄參大黃紫蘇人參各等分上㕮咀每服五錢水二盞煎服生犀丸治熱沖喉間連頰腫數出氣煩滿犀角鎊枳殼去瓤麩炒射干海藻洗去咸焙升麻各一兩杏仁湯浸去皮尖雙仁研百合胡黃連蒺藜子炒各三分白附子炮半兩上為末煉蜜丸如彈子大每服一丸綿裹咽津不計時龍腦丸治咽喉連頰頷腫日數深遠咽津液熱發渴疼痛龍腦研升麻甘草馬牙硝研各一分玄胡索研三分麝香研石膏碎大黃銼黃耆銼各一分生地黃二兩絞取汁上除地黃汁外搗羅為末以地黃汁和如干更入煉過蜜少許為丸如小彈子大用綿裹含化咽津日四五次不計時治纏喉風腫痛黃芩五錢酒浸升麻麻黃荊芥薄荷防風各一錢鼠黏子炒四錢生甘草一錢半京三稜三錢炒黑大黃二錢煨上㕮咀以水一碗煎至七分去滓稍溫服食後隨咽之大硼砂散治喉閉咽腫痛水米難下硼砂茯苓甘草各半兩馬牙硝盆硝朴硝薄荷葉各一二兩殭蠶二兩蛇蛻皮一條上為細末臘月牛膽汁和成膏納在膽內高懸陰乾每用一錢綿裹咽津金硝丸治咽喉痹痛不能喘息水漿不得入鬱金銼馬牙硝研甘草銼山梔子去皮栝蔞根各二兩大黃銼玄參白礬硼砂研各一分上研為末煉蜜和丸如雞頭實大每用一丸綿裹含化咽津天門冬丸治馬喉痹咽喉腫痛唇焦舌乾腮頰連腫天門冬去心焙玄參惡實炒各一兩百藥煎紫蘇葉各半兩甘草炙銼一兩半人參硼砂研龍腦研各一分上為細末煉蜜和丸如皂角子大每服一丸食後臨臥細嚼溫熟水下橘皮湯治馬喉痹勢如奔馬腫痛煩滿數數吐氣陳橘皮湯浸去白焙青竹茹生地黃切焙黃芩去黑心白朮山梔子仁各三兩赤茯苓去黑皮二兩桂去粗皮一兩芒硝研湯成下上除芒硝外粗搗篩每服三錢匕以水一盞入生薑半分拍碎棗二枚擘破煎至五分去滓下芒硝末一錢匕攪勻溫服食後日三仙方奪命丹出德生堂方治纏喉風木舌脹雙單乳蛾喉閉或誤吞雞魚骨刺竹木簽刺一切咽喉急證白茯苓密陀僧炒黃色紫河車各一兩白殭蠶直者貫眾淨縮砂仁甘草節各一兩烏魚骨去皮二錢半麝香一字上細末卻入麝香研勻同蒸餅包白麵蒸熟四兩和藥汲新井水丸如豌豆大蛤粉為衣放干十年不壞每服一丸用瓦器研碎新水半盞浸一茶時化開用匙挑藥徐滴入喉中勿急用取藥盡為度木通散出聖惠方治喉痹心胸氣悶咽喉妨塞不通木通銼赤茯苓川芒硝前胡去蘆頭桑白皮各二兩銼羚羊角屑川升麻川大黃各一兩半銼碎微炒馬蘭根一兩上為粗散每服三錢以水一中盞煎至六分去滓不計時候溫服治喉痹咽喉腫痛上焦風熱痰唾不利出聖惠方川升麻一兩半射干白藥各三分絡石甘草生銼黃藥各一兩白礬灰半兩天竺黃細研馬牙硝細研各二兩上為細散同研令勻每服以新綿裹二錢含咽津取喉中涎出危氏方草烏尖殭蠶紫貝啾啷蟲紅椒白礬山豆根皂角各等分上為細末用霜梅拌藥為丸如指頭大含化一丸取下涎然後用鹽湯灌漱吐出不可吞開喉關出危氏方薄荷山豆根各五錢麝香腦子各半錢硃砂三錢甘草青鹽川烏各五錢上為末每服半錢臘月內菘菜汁夏月黃麥挼水或葛根水調如涕唾稠黏用芭蕉水調下或蜜丸指頭大含化嗆食風出危氏方桔梗川烏草烏防風甘草大青根各五錢全蠍七個去毒紫河車五錢上為末每服用酒一盞連根蔥一根紅椒七粒燈心七莖同煎三四沸食後熱服如不安再用酒一盞入茱萸五粒同煎少時熱服之未效用芭蕉湯調下如落心肺間刺痛用宣藥利下如久不治則變為飛絲勞毒能傷人命龍腦破毒散出御藥院方治不測急慢喉痹咽喉腫塞不通盆硝研細四兩白殭蠶微炒去嘴為末秤八分錢甘草生採秤八錢青黛秤八錢馬勃末三錢蒲黃半兩腦子一錢麝香一錢上研令勻細用瓷盒子收如有病證每用藥一錢用新汲水少半盞調勻細細呷咽如是喉痹即破出血便愈如不是喉痹自然消散也若是諸般舌脹用藥半錢以指蘸藥搽在舌上下咽津如是小兒一錢作四五服亦如前法用並不計時候生銀丸治口乾咽腫喉頰脹痛人參半兩丹砂研鉛霜研錫吝脂朴硝研升麻各一分硼砂研三錢龍腦研一錢上為末和勻煉蜜為丸如皂子大每服一丸含化咽津射干湯治喉痹腫塞不通疼痛不下飲食並諸毒發動射干當歸切焙一兩升麻半兩白芷一兩甘草炙銼犀角鎊杏仁湯浸去皮尖雙仁炒各半兩上粗搗篩每服三錢匕許以水一盞煎至七分去滓溫服日三忌海藻菘菜禹餘糧湯聖濟總錄治喉痹若胃中虛有飢狀少氣不足以息四逆泄注腹脹喜噫食則欲嘔泄癖溏下口乾四肢重好怒不欲聞人聲診其脈右手關上陰陽俱虛者脾胃虛也禹餘糧煅醋淬大麻仁桑根白皮各二兩銼碎乾薑炮一兩黃連去須半兩白朮一兩棗十枚焙取肉上粗搗篩每服三錢匕以水一盞煎至五分去滓溫服食後日三服如聖勝金鋌出和劑方治證服餌與後如聖勝金鋌同品味少異朴硝四兩川芎一兩硫黃細研一兩半貫眾二兩薄荷葉荊芥穗嫩茶各半兩上為末搗生蔥自然汁搜和為鋌服藥湯使如後方同簡易如聖勝金鋌法同治喉痹並時疫毒桔梗甘草升麻連翹鼠黏子防風酒製黃芩各等分上㕮咀每服五錢水煎細嚥如聖勝金鋌出和劑方治急喉閉纏喉風飛揚單蛾雙蛾結喉重舌木舌腮頷腫痛屢經用藥不能吞水粥硫黃研川芎薄荷葉去枝梗臘茶川烏炮硝石研生地黃各二兩上為細末以生蔥汁搜和為鋌每服先用新汲水灌漱吐出次嚼生薄荷葉七片微爛用一鋌同嚼極爛以井水嚥下甚者連進三服即愈重舌腮腫先服一鋌次以一鋌安患處便消冒暑伏熱不省人事生薄荷水調研一鋌灌下即蘇行路常噙一鋌即無暑熱之患口舌生瘡不能合口並食熱物如上法服訖用水灌漱嚼薄荷十葉如泥吐出再以水灌漱嚼藥一鋌噙口內聚涎裹之如涎滿方吐出如此服三鋌便能食遇食酒醋咸酸酢脯炙爆喉中生泡須掐破吐血方著薄荷數葉以一鋌同嚼井花水吞下沙淋熱淋小便出血用車前草七葉生薑小塊研爛水調去滓嚼藥一鋌以水送下分陰陽去風熱化血為涎化涎為水常帶隨身備急一鋌可活一人小兒只服半鋌一方去川烏貫眾以嫩茶代臘茶射干丸治喉痹腫塞射干一兩豉一合杏仁湯浸去皮尖雙仁炒芎藭犀角屑各半兩升麻一兩甘草炙半兩上為末煉蜜和丸如小彈子大每服一丸含化咽津日可三五服瘥忌海藻菘菜七聖散治馬喉痹咽頰腫痛吐氣不快白礬二錢馬牙硝五錢硝石一兩鉛丹三錢硇砂一錢蛇蛻半條巴豆兩枚去殼上先研白礬牙硝硇砂三味入罐子內次入硝石次摻鉛丹於上面只用平瓦一小片蓋火燒