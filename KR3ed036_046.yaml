body:
  text: 卷四十六頭門首風附論內經謂新沐中風則為首風首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈夫諸陽之脈皆會於頭平居安靜則邪無自而入新沐之人皮腠即疏膚髮濡漬不慎於風風邪得以乘之故客於首而為首風其證頭面多汗惡風頭痛不可以出內者以邪氣之客也當先一日則病甚至其風日則少愈者陽之氣以天地之疾風名之風行陽化頭者諸陽之會與之相應也是頭者太陽之所經也六經傷寒惟太陽受病最多蓋頭居其上當風寒之沖一有間隙則若項若腦若耳若鼻風邪乘氣皆得而入之矣況復櫛沐取涼飽食仰臥之不謹乎頭風為病不必有偏正頭疼之證但自頸項以上耳目口鼻眉稜之間或有一處不若吾之體焉皆其漸也有頭疼有頭暈有頭皮頑厚不自覺知有口舌不仁莫知滋味或耳聾或頭汗或目痛或眉稜上下掣痛或鼻中聞香極香聞臭極臭或只呵欠而作冒眩之狀婦人月候適行輒梳篦多癢痛如水泡之狀凡此皆頭風證也治法大要有熱證者消風散用防風荊芥煎湯下無熱證者追風散用薄茶清下又有素患頭風之人或因傷風寒暑濕依證調理已獲輕安未幾頭風發作則不必拘泥前藥當以頭和平之劑療之其或病軀老弱先患頭風復感寒邪汗不出此等用藥無附子又不可也若夫太陽項強一證無汗惡風則為表實合用葛根湯汗出惡風則為表虛合用桂枝葛根湯是又感受風邪在頭風界限之內者也大凡人病雷頭癲干俗呼之謬名也頭痛昏眩皆因浴發而得之即為首風此因邪風在於胸中熱甚化而為痰之所致也可以茶調散吐之吐訖次用藏用丸下之後可服烏荊丸若是雷頭者上部多有赤腫結核或面血無汗經云火鬱發之開之卻之可用扉針出血則愈靈樞經云奪血者無汗奪汗者無血血汗俱蕩豈不妙哉衰老者可用涼膈解毒消風散熱為治年壯者大黃牽牛可以蕩滌積熱氣血宣通使無壅滯而愈凡頭風眩暈手足麻痹胃腕發痛心腹滿悶按如水聲可用獨聖散吐之吐訖可用清火辛涼之藥仲景曰此寒痰結在胸中而致然也夫大頭風者是陽明邪熱太甚資實少陽相火而為之也多在少陽或在陽明或在太陽視其腫勢在何部分隨經取之濕熱為腫木盛為痛此邪見於頭多在前後先出治之大不宜藥速速則過其病所謂上熱未除中寒復生必傷人命此病是自外而之內者是血病況頭部分受邪見於無形迹之部當先緩而後急先緩者謂邪氣在上著無形之部分無所不至若用重劑速下過其病難已雖有緩藥若急服之或食前或食後服皆失緩急則藥不能除病當徐徐浸漬無形之邪也或藥性味形體據象皆要不離緩體是也且後急者謂緩劑已瀉邪氣入於中是到陰部染於有形質之所若不速則損陰也此終始卻為客邪當急去之是治客以急也且治主當緩者謂陽邪在上陰邪在下若急治之不能解紛而益亂也治客以急者謂陽分受陰邪陰分受陽邪此客氣急除去之也假令少陽陽明為病少陽為邪出於耳前後也陽明為邪者首大腫也先以黃芩黃連甘草湯通炒過銼煎少少不住服或劑畢再用煨黍黏子新瓦上炒香同大黃煎或去滓納芒硝俱各等分亦時時呷之無令飲食在前得微利及邪氣已只服前藥若不已再同前次第服之取大便利邪氣則止如陽明渴者加石膏少陽渴者加栝蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活防風之類方仙方如聖餅子出海上方草烏天麻何首烏天花粉芎須半夏細辛薄荷荊芥香白芷防風羌活蒼朮松香甘松藿香晚蠶砂赤小豆菊花赤芍藥甘草花蔓荊子各等分上為細末炒麵為餅赤土為衣每服一餅細嚼茶清送下巴戟天散出千金方治頭中五十種病牛黃丸出聖濟總録治首風頭項急疼腦重四肢拘急行步有妨牛黃別研膩粉各半兩天麻酒炙桂去粗皮白附子炮乾蠍炒去土天南星炮石菖蒲附子炮裂去皮臍麻黃去根節湯煮掠去沫羌活去蘆頭芎藭當歸切焙乾薑炮獨活去蘆防風去叉各一兩麝香一分烏蛇酒浸濕紙裹煨取肉三兩上先將牛黃麝香同研後漸入諸藥末並膩粉一半煉蜜和丸如梧桐子大於膩粉內滾為衣每服五丸空心溫酒下追風散出直指方治偏正頭風疼痛面上遊風狀若蟲行川烏炮去皮尖軟石膏煅白殭蠶炒去嘴絲川芎防風荊芥甘草炙各一兩南星炮白附子炮羌活天麻全蠍地龍去土白芷各半兩草烏炮去皮尖沒藥乳香雄黃並研各一分上為末每服半錢入好茶少許沸湯調食後臨睡服搐鼻藥治八般頭風疼痛鼻塞聲重赤芍藥川芎草烏黃芩乳香各一錢沒藥半錢黃連一錢玄胡索當歸藜蘆各半錢荊芥一錢藁本半錢石膏細辛薄荷甘草炙各一錢上為細末口噙水用藥一字搐入鼻中救生丸出聖濟總録治體虛陽經為風所乘上走頭面多汗惡風頭痛及新沐中風失音不語天麻附子炮裂去皮臍烏頭炮裂去皮臍白附子炮天南星炮丹砂研半夏湯浸七次生薑汁製作餅焙乾犀角鎊屑以紙裹置懷中攘令暖方搗芎藭藿香葉零陵香葉桂去粗皮木香蠍梢炒白殭蠶炒牛黃研各半兩上為末煉蜜和劑旋丸如梧桐子大中風不語者每服五丸用漿水半盞取東南柳枝一條長七寸滴生油三滴在漿水中即攪四十九攪便灌之立瘥如小可中風只用漿水吞下三丸如小豆大天雄丸出聖濟總録治風虛腦重四肢拘急骨節疼痛天雄炮裂去皮臍黃耆銼熟乾地黃焙蒺藜子炒去角各三分白茯苓去黑皮牛膝酒浸切焙防風去叉石斛去根附子炮裂去皮臍獨活去蘆頭山芋白朮桂去粗皮各半兩上為末煉蜜和丸如梧桐子大每服十五丸加至二十丸薄荷酒或烏梅湯下茯神湯出聖濟總録治首風頭痛當先風則甚茯神去木羌活去蘆頭木通銼防風去叉細辛去苗葉蔓荊實去白皮生乾地黃焙白朮當歸切焙芍藥陳橘皮湯浸去瓤焙芎藭各一兩上粗搗篩每服三錢水一盞煎至七分去滓空心食前溫服必效丸出王氏博濟方治頭風眩暈者由氣血虛為風邪所乘也諸陽經脈上走於頭面因運動勞役陽氣發泄腠理開疏而受風邪頭風之狀面多汗惡風甚則頭疼心煩悶或因新沐發中風亦為此病久不瘥眩暈因風邪流入於腦轉而目系急目系急故成眩暈也其脈寸口洪大而長是也宜服此大效巴豆去皮出油一分丹砂研乳香研細辛去苗葉當歸切焙檳榔各半兩丁香桂去粗皮龍腦研各一錢上搗研為末蒸餅為丸如梧桐子大每發日用好茶清下一丸須是當門齒嚼冷茶下之十年病只用一粒額上汗出即瘥一方有麝香柴胡飲出聖濟總録治首風頭腫嘔噦柴胡去苗芎藭桑根白皮炙銼各一兩半白檳榔羚羊角鎊人參黃連去須天雄炮裂去皮臍各一兩旋覆花炒桂去粗皮枳殼去瓤麩炒各半兩上銼如麻豆每服三錢以水一盞生薑三片煎取七分去滓溫服茯苓湯出聖濟總録治首風頭目昏痛痰涎不利赤茯苓去黑皮一兩沉香半兩甘菊花三分訶黎勒皮二兩藿香去梗一兩木香半兩檳榔銼一兩白朮一兩枇杷葉拭去毛炙十片枳殼去瓤麩炒甘草炙各一兩上粗搗篩每服三錢入生薑鹽各少許煎至七分去滓溫服不拘時候一字經金散出危氏方治偏正頭風疼夾腦風眉稜骨痛牽引兩眼抽掣疼痛或生翳膜視物不明藿香葉荊芥穗旋覆花香白芷菊花防風各半兩石膏末細研水飛取半兩川芎半兩川烏兩頭尖者去皮尖生用二錢半天南星二錢半草烏頭一錢半上各修事挂樹日曬乾同搗為末每服一字食後淡茶調下十味如神丸出百一選方治偏正頭風墜痰涎散滯氣寬胸膈久服清頭目強腰膝晉礬枯過天門冬去心五味子南星一個大者薑汁浸炮各半兩半夏四十九粒湯浸七次麥門冬去心遠志去心各一兩甘草炙白朮人參各一分上為末生薑自然汁調飛羅面煮糊丸如梧桐子大硃砂一分為衣每服十丸至十五丸食後臨臥生薑湯下或有因驚而患頭風者宜服芎菊湯出聖濟總録治首風目暈頭痛芎藭防風去叉麻黃去根節前胡去蘆頭獨活去蘆頭各一兩菊花枳殼去瓤麩炒甘草炙銼細辛去苗葉各一半兩石膏碎研三二兩上粗搗篩每服三錢水一盞入薄荷五葉同煎至六分去滓食後溫服前胡湯出聖濟總録治首風每發胸膈滿悶吐逆痰涎飲食不下前胡去蘆頭赤茯苓去黑皮升麻各半兩木通銼一分白菊半兩桔梗去蘆頭切炒半兩枳殼去瓤麩炒旋覆花微炒各一分細辛一分半夏湯浸洗七遍半兩入生薑一兩同搗炒麥門冬去心焙半兩甘草二錢一分上粗篩每服五錢以水一盞半入生薑一棗大拍碎同煎至一盞去滓空心日午臨臥溫服治頭中痛身熱風熱方出千金方竹瀝三升升麻生薑杏仁各三兩芍藥柴胡各四兩石膏生葛根各八兩上㕮咀以水六升合竹瀝煮取二升七合分三服摩膏出千金方治頭中二十種病頭眩發落面中風蜀椒莽草各三二兩桂心䕡茹附子細辛各一兩半半夏乾薑各一兩上㕮咀以生豬肪二十兩合搗令肪消盡藥成先沐頭令淨然後以藥摩囟上日一即愈如非十二月合則用生烏麻油和塗頭皮沐頭令淨乃用之一頓生髮如昔必效方無蜀椒莽草半夏乾薑天麻餅一名如聖餅子治頭風傷風鼻塞一切頭疼並偏正頭風不問所因久服更不再發此藥最效川烏生去皮尖天麻防風乾薑羌活甘草生各一兩半夏洗天南星生各半兩上用湯浸炊餅和捏成丸每服三餅荊芥或蔥茶細嚼送下一方有川芎無羌活用生薑汁和捏成餅子陰乾一兩日曬乾服更增餅數隨意頭疼甚者更於芎辛湯方中求之若初感傷寒因汗而解尚餘頭痛者濃煎蔥白生薑湯下治中脘痰飲停積及療脾胃飲食所傷溫中快膈尤得其宜白龍丸出王氏博濟方治首風每發頭痛難忍白附子炮附子炮裂去皮臍半夏洗去滑切焙天南星炮各半兩麝香研少許凝水石三兩用炭火三斤煅通赤埋於地坑內出火毒候冷取出烏頭炮裂去皮臍一兩龍腦研少許上為細末用麵糊為丸如豌豆大每服三丸至五丸薄荷溫酒茶下空心食前服芎術湯出聖濟總録治首風頭面多汗惡風頭痛芎藭蒼朮米泔浸去粗皮切焙麻黃去根節芍藥甘草炙銼白芷石膏荊芥穗各等分上為粗末搗篩每服三錢水一盞入薄荷五七葉同煎至七分去滓熱服驅風丹出海上方草烏四兩不去皮尖川烏四兩芎須白膠香河水煮過赤土赤小豆荊芥穗夏蠶砂各六兩上為細末用白麵半斤攪勻沸湯泡為丸如梧桐子大每服十五丸至二十丸茶酒下打撲傷損乳香酒下頭風薄荷茶下渾身倦怠蘇木酒下孕婦莫服治頭風冷淚出本事方甘菊決明子白朮羌活川芎細辛白芷荊芥穗各三錢分上為細末每服一錢沸湯調下食後日三服八風湯出聖濟總録治首風頭目昏痛肢體拘急疼痛防風去叉六兩人參二兩芎藭細辛去苗葉前胡去蘆頭白芷各半兩去叉甘草炙三分羌活去蘆頭半兩上粗搗篩每服三錢水一盞入薄荷五葉煎至六分去滓溫服不拘時候頭風方出直指方川芎天麻各半兩細辛華陰者去苗土煅石膏荊芥穗白芷梢甘草微炙各二錢全蠍炙五個上為末白湯或茶清食後臨臥服消風散加蟬殼白丸子加硃砂薑汁湯下皆要藥防風散出聖濟總録治首風腦項掣痛防風去叉一兩龍骨去土二兩升麻赤芍藥黃芩去黑心各一兩葛根銼石膏碎各一兩半上粗搗篩每服五錢水一盞半煎至一盞入薑汁半合更煎一兩沸去滓空心日午夜臥溫服清神散麝香腦子雄黃青黛全蠍乳香沒藥各等分上為細末每用抄少許口含溫水搐入鼻中清香散治偏正頭風並牙疼川芎藁本各一兩防風羌活各二錢細辛三錢香白芷一