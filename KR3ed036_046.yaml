分荊芥穗末半兩上研令勻重羅每服一錢臘茶調服蜜水亦可不拘時候全蠍膏出德生堂治偏正頭風氣上攻不可忍者全蠍二十一個土狗三個五倍子五錢地龍六條去土上為細末好酒調成膏子攤在紙上貼放太陽穴上治頭風出神效方苦丁香川芎藜蘆各等分上為細末口含水鼻內搐之溫腦散治頭風川芎二兩天麻川烏炮去皮尖研銼炒黃各一兩上為細末每服二錢茶調下薄荷湯尤佳治頭風方出本事方香附子一斤炒烏頭一斤炮甘草二兩上為末煉蜜和丸如彈子大每服一丸蔥茶嚼下一字散出濟生方治頭風雄黃研細細辛洗去葉各半兩川烏尖去皮五個生用上為末每服一字薑汁茶芽煎湯食後調服治頭風出百一選方熟乾地黃半兩須日曬乾灑酒九蒸九曝者市賣者以緑礬染色不中用或無即以好大川當歸半兩代之川芎二錢附子一兩炮裂去皮臍上㕮咀每料分五服水一大盞薑三片棗一枚煎至六分去滓入細磨木香水一蚶殼再暖令熱服張裁衣得此方屢以醫人皆立效細辛散出海上方治八般頭風及眩暈噁心吐逆細辛半兩去葉川芎白芷各一分上為末搐鼻中仍以薄荷湯調川芎細辛甘草為末服之芎草散出海上方腦風附論夫內經謂風氣循風府而上則為腦風夫風生高遠始自陽經然督脈陽維之會自風府而上至腦戶者督脈足太陽之會也又太陽之脈起於目內眥上額交巔上入絡腦今風邪客搏其經稽而不行則腦髓內弱故項背怯寒而腦戶多風冷也方芎藭酒出千金方治腦風頭重頸項強眼䀮䀮淚出善欠日欲眠睡憎風劇者耳鳴滿眉眼疼悶吐逆眩倒不自禁諸風乘虛經五臟六腑皆為癲狂諸邪病悉主之芎藭辛夷天雄人參天門冬柏子仁磁石石膏茵芋山茱萸白頭翁桂心秦艽各三兩松蘿羚羊角細辛薯蕷菖蒲甘草各二兩防風四兩雲母一兩燒令赤末為粉上㕮咀以酒二斗漬七日初服二合漸加至五合日三有女人少時患風眩發則倒地為婦積年無兒服此酒眩瘥生兒平復桂心羌活丸出聖濟總録治腦風頭痛久不瘥桂去粗連皮白茯苓去黑皮麻黃去根節白殭蠶炒防風去叉枳殼去瓤麩炒烏蛇酒浸去皮骨炙苦參酸棗仁炒烏頭炮裂去皮臍犀角鎊羌活去蘆頭獨活去蘆頭龍骨郁李仁去皮研人參各等分上為末煉蜜和丸如梧桐子大每服十丸熱酒下摩頂油出聖濟總録治腦風頭旋噁心昏悶發歇不定蓮子草五六月收吳藍梔子葉生麥門冬生地黃五味並搗取汁各三升連翹秦艽去苗土甘草銼防風去叉細辛去苗葉地骨皮大青紫蘇子葉紫草茸各一兩上除前五味汁外粗搗篩用絹袋盛同五味汁煎減半去滓澄清後入生麻油一升和勻重煎又減半收入瓶內二七日細研馬牙硝四兩攪勻每用量多少摩頂上何首烏丸出聖濟總録治腦風鼻息不通清涕流出及諸風疾何首烏去黑皮三兩芍藥一兩桂去粗皮烏頭炮裂去皮臍芎藭甘草炙銼藁本去苗土甘松羌活去蘆頭天麻陳橘皮湯浸去白焙縮砂仁去皮各二兩墨煅存性一分上為末煉蜜和丸如櫻桃大每服一丸薄荷蔥酒嚼下芎連散出聖濟總録治腦風鼻息不通時出清涕項背拘急久成眩暈芎藭連翹羌活去蘆頭柴胡去苗防風去叉黃芩去黑心木賊去節荊芥穗甘菊花旋覆花各半兩地骨皮一兩甘草炙銼石膏搗研各二兩上為散每服二錢淡竹葉湯調下食後臨臥日三摩頂立成膏出聖濟總録治頭風腫癢腦熱生瘡目暗赤痛青蓮花研二朵青黛研四兩龍腦研一兩半石膏研一兩麝香研一兩半芒硝研硝石研各二兩凝水石研朴硝研各一兩桑寄生五兩蓮子草三兩白楊木皮銼二兩上以水三升先煎桑寄生蓮子草白楊皮濾去滓再煎下朴硝凝水石硝石減火微煎候凝取出曝乾細研入諸藥等再研令勻以密器盛每用二錢以生麻油研爛下清水五匙更研候如粥用少許於前頂連囟百會兩鬢處塗摩數百遍能引散毒氣一方去青蓮花用緑鹽白附子散出聖濟總録治風邪循風府上至腦戶為腦風頭痛白附子生用白朮天麻白芷各一兩防風去叉蘆薈各半兩丹砂研一分龍腦研少許麝香研少許上先將白附子等搗羅為末次將丹砂等研細同前藥末拌勻瓷器中盛早晚每服一錢用薄荷汁少許溫酒一盞調下芎香散出聖濟總録治腦風頭痛至甚芎藭藿香葉黃耆銼焙天麻各一兩槐花炒一兩蔓荊實白芷各半兩木香甘草炙銼各一分上為細散每服二錢荊芥茶或溫酒調下太乙麝香湯一名烏香散出百一選方治風邪客於腦頭痛至甚及偏正頭痛夾腦風連眉骨頂頸上徹腮項疼痛不可忍者草烏頭生用一兩細辛去苗葉二兩新茶芽二兩上粗搗如麻豆每服三錢水一盞半入真麝香一捻同煎八分去滓熱服一方無麝香為末茶清調下臨睡食後服桂心散治腦風頭痛桂去粗皮蓽茇細辛去苗葉上等分搗羅為散每用一字先含溫水一口即搐藥於鼻中偏頭痛隨痛左右用之白附子散出危氏方治腦逆頭痛齒亦痛及治年久頭痛麻黃不去節天南星炮烏頭炮去皮各半兩白附子炮一兩硃砂研麝香研乾薑各一錢全蠍去毒足五個炒一方用蠍稍五個上為末酒調半錢服訖去枕臥少時白附子丸出聖濟總録治腦風鼻息不通時流清涕多嚏不已白附子三錢龍腦研一錢麝香研半錢蠍稍微炒七枚天南星炮一兩白殭蠶微炒一錢凝水石煅過研一兩半上除凝水石外搗研為末再同和勻入白蜜不拘多少研令如稀餳狀入白麵糊半匙頭許然後將凝水石末旋入以乳椎和丸如雞頭大於凝水石末中留少許為衣慢火焙乾每服一丸細嚼薄荷熟水下茶清亦得食後服通關散出聖濟總録治腦風鼻息不通不聞香臭或鼻流清涕多嚏肩項拘急頭目昏痛風府怯寒原蠶蛾去土炒令黃白附子炮苦參益智去皮蒺藜子炒去角干薄荷各一兩上為散每服二錢溫酒調下日三服香芎散出聖濟總録治腦風邪氣留客頭痛久不已荊芥穗芎藭白芷槐蛾莎草根炒去毛甘草炙銼上等分搗羅為散茶酒調下一錢日三服羌活丸治腦風氣鼓或膈痰氣逆上衝於頭令旋暈必健散出聖濟總録治腦風頭痛甚者白花蛇酒浸三宿去皮骨炙二兩蒺藜子炒去角蔓荊實酒浸一宿焙各一分蓽澄茄二十枚白附子五枚酒浸一宿切作片子炒乾上為散每服一錢用薄荷自然汁和溫酒半盞調下食後服地骨皮散出聖濟總録治腦風頭痛時作及偏頭痛地骨皮一分荊芥穗二兩石膏研飛過二兩白花蛇酒浸炙去皮骨天南星漿水煮軟切焙各一兩上為散每服一錢入臘茶一錢湯點服食後臨臥石膏菊花散出聖濟總録治腦風頭痛難任時瘥時發石膏研飛過一兩天南星炮一兩半白殭蠶一兩炒甘菊花一兩甘草炙銼三分上為散每服二錢臘茶調下食後服芎藭湯出聖濟總録治腦風鼻息不通或流清涕多嚏芎藭細辛去苗葉黃芩去黑心各一兩荊芥穗二兩甘草炙銼半兩上粗搗篩每服三錢水一盞入薄荷七葉煎至七分去滓溫服烏金煎出聖濟總録治男子腦風頭腦俱痛及中風語澀手足無力黑豆五合淨淘羌活去蘆頭獨活去蘆頭荊芥去梗各一兩上粗搗篩以水一斗煎至一升更入無灰酒半升和令勻再煎令沸去滓盛於瓷器中每服一合溫酒及薄荷茶調下不拘時候吹鼻點頭散出聖濟總録治腦風頭痛細辛去苗葉高良薑瓜蒂各一分硝石半兩上為細散每用新水滿含一口搐藥半字入鼻中良久即定神聖散出十便良方治腦風項背怯寒腦戶極冷頭痛不可忍連眉骨項徹腮頂痛皆治之麻黃去節細辛去苗全蠍生一半炒一半藿香各等分上為細末每服二錢煎荊芥薄荷湯調下茶清亦可並治婦人血氣一方用薄荷酒遠志散出宣明方治腦風邪氣留飲頭疼不可忍者上用遠志末不以多少於鼻中搐於痛處揉之前藥可相兼用小芎辛湯出濟生方治風寒在腦或感濕頭重頭痛眩暈欲倒嘔吐不定川芎一兩細辛去蘆白朮去蘆炒甘草炙各半兩錢上銼散每服四錢水一盞半薑五片茶芽少許煎至七分不拘時候溫服一方以川芎一兩細辛半兩甘草二錢防風半夏川白芷各半兩煎同上治風濕頭疼立效勝金散治腦風頭痛鼻息不通或流清涕多嚏不已荊芥穗薄荷葉各四兩木賊去節二兩蛇蛻二條微炙上搗羅為散每服二錢茶清調下食後日三服清神散治腦風頭痛連眼目緊急肢體拘急疼痛芎藭二兩莎草根炒去毛三兩石膏研一錢兩上為散每服二錢用荊芥臘茶清調下食後服吹鼻散治腦壅頭痛蘆薈研龍腦研瓜蒂搗硝石研上等分為末每用一豆許吹之神效細辛散一名附子芎藭湯治風入腦經頭痛如破頭痛如破者謂痛連腦戶或但額間與眉相引如風所吹如水所浸遇風寒則極常欲得熱煦尉火此由風寒客於足太陽之經入腦搏於正氣診其脈微弦而緊謂之風冷頭痛出海上方細辛一兩淨川芎一兩附子炮半兩淨麻黃一分上㕮咀入連根蔥白薑棗每服五錢水一盞半煎至一盞連進三服一方無蔥棗微熱服石膏散出聖濟總録治腦風邪氣留連頭痛不已石膏火煅研天南星炮白殭蠶炒各等分上為散每服二錢蔥白二寸臘茶一錢同煎湯熟連蔥頓服良久再服穀精草散出聖濟總録治腦風頭痛吹鼻穀精草末銅緑研各一四兩硝石研半錢上研和勻每用一字吹入鼻內或偏頭疼隨病左右吹入鼻中朴硝散治時氣腦痛不止上用生麻油調朴硝塗頂上立效治破腦風頭面浮腫不醒人事者出經驗良方上用苕搖子不以多少用生薑同研極爛以酒調下熱服汗出即愈羌活附子湯出試效方治冬月大寒犯腦令人腦痛齒亦痛名曰腦風麻黃三分不去叉根節黑附子三分羌活半錢蒼朮半錢防風二分黃耆一錢甘草升麻各二分白芷白殭蠶黃柏各三分上件都研作一服水二盞煎至一盞去滓溫服食後有寒嗽加佛耳草三分川烏散出危氏方防風白附子北細辛白茯苓川烏菖蒲乾薑香白芷川芎甘草節各等分上為末每服二三錢嚼生蔥白湯調下食後服主添腦本草以鱧腸草作膏點鼻中
