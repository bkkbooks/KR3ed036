body:
  text: 卷七十牙齒門牙齒不生附論夫牙齒不生者由風疳齒齲諸疾遂致脫落久而不生也夫腎主骨齒者骨之所終髓之所養也凡人血氣強盛骨髓堅固齒雖脫落則必復生若氣血衰微骨髓虛弱則齒不能更生也內經謂男子八歲腎氣實齒更髮長至於八八則齒髮去是也法宜填骨髓養腎氣則齒可復生也方露蜂房散治牙齒不生及齒風痛露蜂房荊芥川椒地骨皮松節青鹽白礬灰各一兩上為散每用半錢綿裹於病處咬之有涎即吐細辛湯治牙齒不生及齒風連面疼痛細辛白芷芎藭露蜂房各一兩上為散以水一碗煎十餘沸去滓熱含冷吐治齒不生雌烏雞屎雄烏雞糞舊鞋底麻底尤佳上等分燒灰存性研細入麝香同研敷於齒齦上令藥不絕擦令熱為佳須擦齒槽非齒齦也余女子退齒逾年不生甚以為晚因過平江會鄉生李亮鄉察院語之李云予有方已嘗試用甚效因其說修治用之一月齒遂生雄雌散治大人小兒牙齒不生雌雄雞屎各十四顆上焙乾同研如粉入麝香少許先以針挑破損齒根下血出將散敷之年高者不過二十日生年少者十日生傷寒及自墮落者亦能治之川升麻散治牙齒不生及齒風宣露升麻白附子上等分為末入乳缽研藥末極細取八月生地黃四斤洗去土絞取汁二大盞即下別研藥攪令勻於瓷器中盛每用以柳枝綿裹一頭點藥炙令烙齒根下縫中更塗膏少許即驗治牙齒不生方雄鼠糞麝香上等分合研令細用之揩齒勿食酸鹹物效治大人小兒牙齒多年不生用黑豆三十枚牛糞火內燒令煙盡取出細研入麝香少許研勻用針挑破不生處令血出卻用藥在上不可見風忌酸鹹物治牙齒不生方取路旁遺卻稻粒於齒落處點二七其齒自生亦甚神速牙齒挺出附論夫牙齒挺出者手陽明經虛受風冷與齦間津液相搏化為濃汁則齦肉落縮齒根宣露故齒挺出也方青黛散治牙齒根挺出及蛻落疽濕攻唇破侵蝕䘌齒青黛苦參甘草各一兩雄黃丹砂莨菪礬石附子藜蘆細辛射干各半兩上為末每半錢綿裹貼齒痛處有涎吐疳䘌空腹井水調半錢服地骨皮湯治牙齒風蟲齒根挺出動搖疼痛地骨皮防風鹽細辛蔓荊實杏仁獨活青葙子當歸各一兩上搗為散每用半錢以水二大盞入鹽一錢煎至一盞去滓熱含冷吐日用二服甘草膏治牙齒挺出疼痛不可忍甘草雄黃羊腎泔澱牛屎汁青黛各一兩上先於銅器中微火煎三味脂汁五七沸次下三味藥末攪勻慢火熬成膏取桃枝如箸綿裹頭點藥熱烙齒縫中令遍日三好肉生龍齒散治牙齒根宣露挺出爛肉黑血不止疼痛搖動臭氣欲脫落龍腦黃礬白石脂各二兩桂心芎藭皂角刺各一兩上為末入瓷器中盛之每食後用少許貼之甚效有津勿咽郁李根皮丸治齒宣露挺出皆由風熱所為郁李仁根白皮熟乾地黃各三兩防風獨活青葙子各一兩上為末蜜和丸如梧桐子大每於食後以粥飲下三十丸枸杞子根散治牙齒根宣露膿血口臭枸杞根槐白根皮各二兩胡桐淚細辛各一兩川椒一分上為散每用半兩以酒二大盞煎至一盞去滓熱含冷吐蔓荊子散治牙齒根宣露挺出皆是積熱風毒所為蔓荊子生地黃地骨皮角蒿各一兩郁李根皮二兩上為散每用半兩以水二大盞煎至一盞熱含冷吐郁李根湯治牙根風挺出疼痛郁李根芎藭細辛生地黃各一兩上為末用五錢水三盞入鹽一錢煎十餘沸去滓熱含冷吐治牙齒根宣露挺出濃血口氣方枸杞根胡桐淚一兩上和勻分為末每用時以水二大盞煎一盞去滓熱含冷吐治齒日長難以飲食危氏方服白朮末及灌漱齒吐去治牙齒挺出宣露方生地黃一斤木杵搗碎入鹽二合和之上用白粉裹可厚半寸以來於煻火中燒斷煙始成去焦面入麝香一分用研為末每用少許貼於牙根上牙根動搖附論夫手陽明之支脈入於齒足太陽明之脈又絡於齒為骨之所終髓之所養若經脈虛風邪乘之血氣損少不能榮潤故令搖動也方石膽散治牙齒齦肉挺縮虛浮時有膿血齒動疼胡桐律黃礬硃砂升麻各半兩石膽二錢細辛當歸牛膝川芎棘刺地龍各二錢乳香麝香各二錢半龍腦一錢上為細末每用藥少許敷搽牙齦上吐津誤咽不妨早晨臨臥並每服食後用五六次治齒風搖動捍齒牢牙方丹砂青礬白礬馬牙硝防風細辛各半兩蠟一兩麻油松節當歸松脂黃耆豬膽半斤上銼先於鐺中煎脂濾滓次下油煎三兩沸續下銼藥煎十餘沸以綿濾過去滓更下蠟並別研藥浸火煨成膏以瓷盒盛用少許塗敷患處即瘥一方無松節有綠礬雄黃散治牙齒動搖脫落暗黑有蟲時疼痛漸至損壞川升麻吳白芷豬牙皂角生地黃川芎各半兩寒水石白茯苓各二兩細辛胡桐律雄黃各三錢麝香一錢青錢上為細末每用半字蘸藥搽患處又煎漱津吐咽不妨太和散治牙齒動搖齦肉浮腫蟲蚛發痛胡桐律白茯苓生乾地黃各半兩川芎香白芷升麻華陰細辛各三錢麝香青鹽豬牙皂角上為細末青鹽麝香另研拌勻每用藥少許以指蘸藥擦牙病處常用去疳牢牙定痛止疼神仙常春散治牙齒動搖疼痛牢牙黑髭發至老不白深有神效皂角一斤食鹽四兩香附子四兩青鹽四兩牛蒡子四兩蓮花柏藿香各一兩旱蓮草一兩麝香一分腦子一分上將皂角銼碎用小瓦盆兩個上盆底鑽水孔三個下盆裝一重皂角一重食鹽四兩都裝下盆內相合泥固炭火煉煙青為度取出同前藥研細入麝香腦子同為細末每日早晨臨臥刷牙甚妙地骨皮散治牙齒動搖吃食不穩地骨皮一兩當歸升麻寒水石桂心芎藭各半兩黃藥沉香各一兩麝香一分上為細末用貼牙齒腫者以綿裹含如彈子大日二三塊槐白皮散治牙齒動搖不住寒熱嚼物疼痛時發時止薏苡仁槐白皮地骨皮五靈脂蓽茇各半兩蛇床子乳香各二錢半麝香半分上為細末入研藥令勻每用少許貼牙痛處吐津誤咽不妨如痛不止用藥三錢水一盞煎令和滓服熱漱冷吐並不計時候芎藭散治牙齒動搖疼痛芎藭二兩細辛一兩防風一兩薏苡仁二兩地骨皮柳枝各一兩上為散每用半兩水二大盞煎至一盞去滓熱含冷吐細辛散治牙齒疼痛動搖欲落疳蟲衄血臭氣黑惡不能食細辛莽草曲頭棘針牆衣各一兩鹽花一兩半蕎麥麵三兩上細末以釅醋和蕎麵裹上件藥以炭火燒令赤又以搖揩不得者即以綿裹貼齒根上咽津無妨用後齒牢患十年者皆效麝臍散治牙齒痛動搖風蚛疼痛齦肉宣露涎血臭氣此藥常用令牙齒牢堅解骨槽風毒氣服之大有神效牛膝木律黃耆郁李仁空手皮子上等分搗碎入麝香少許裝入瓶子內用瓦蓋口留一小竅用鹽泥固濟燒令赤候煙白色即住火以新土蓋一伏時取出細研揩齒又方升麻細辛各十兩上為細末用少許揩患處須臾溫水漱口臨臥更貼少許咽津為妙五靈膏出御藥院方治牙齒動搖五靈脂松脂黃蠟各一兩黃丹二兩蟾酥少許上為瓷器中以慢火熬成膏用白熟絹上攤候冷剪作片子每夜貼於齦上有津即吐誤咽無妨此藥臨臥時用一次於惡硬物底一個牙齒根兒小裹外貼之亦不甚悶若是牙兒堅固自然得力不惡硬物也地黃散治齒動搖生地黃一斤五兩取汁山芋四兩枸杞根三兩白茯苓四兩人參四兩上先煎生地黃汁搗諸藥末用好酒一斗別煎至三升去滓入煎下地黃汁同再煎入白蜜一斤酥少許煎後可丸即成丸如小豆大每服酒下三十丸一日三服漸加至五服胡桐淚散出聖惠方治牙齒根搖動宣露生肌胡桐淚波斯鹽綠石膽丁香生地黃上等分為散每服一字塗敷齒根中神效一方出海上方治牙動搖疼痛五倍子白茯苓北細辛各五錢青鹽三錢上為細末朝暮刷之久而大效宣牙膏治牙齒動搖不牢疼痛不止麝香一字龍骨定粉各三錢半上為細末入麝香和勻用黃蠟一兩瓷盞內熔開入藥於內攪勻放冷取出熨斗燒熱鋪紙用藥攤之勻薄每用剪作紙條兒臨臥於齒患處齒齦間封貼一宿至次日早晨取出藥每夜用者如此半月消牙齒痛悶生齦肉治疳蝕去風邪牢牙齒大有神效二聖丸治牙齒動搖疼痛川烏頭蒼朮上為末醋麵糊丸梧桐子大每服七丸食前鹽湯下忌熱物少食二聖散治齒齦或退或腫牙齒動搖疼痛甜葫蘆八兩牛膝四兩上為粗散每用五錢水一盞半煎至一盞去滓微熱漱多時吐之誤咽不妨食後並臨臥日漱三四服五倍子散治牙齒動搖及外物所傷諸藥不效欲落者川五倍子乾地龍各半兩上為細末先用生薑揩牙根以藥敷之五日內不得咬硬物如齒初折落時熱黏齒槽中貼藥齒上即牢如故一方出本事方治牙齒動搖發須亦黃一服髭黑牙牢甚妙生薑半兩地黃一斤上以不蛀皂角藥十莖刮出黑皮核將前藥汁煎蘸皂角慢火炙乾再蘸再炙用藥盡為度並前藥滓同入瓷瓶內用火煅存性為末牙齒動搖用藥揩牙齦上如髭黃鐵器盛藥末三錢湯調過三日後將藥汁蘸須臨臥時用次早以黑色三夜三次用其黑如漆甚好黑聖散治牙齒動搖草烏頭三兩硼砂半兩上研細用一錢沸湯點漱口後用藥少許揩動搖處日三五度一方出千金方治齒根動欲脫落用地黃綿裹著齒上咂之又咬咀以汁漬齒根日四五度著之並咽汁十日大佳如齒挺出嚼之亦可土蒺藜散治牙齒疼痛齦腫搖動及打動牙齒用土蒺藜去角生用不以多少為粗末每服五錢淡漿水一盞煎七八沸去滓入鹽末一捻帶熱時時漱之別無所忌雖藥味不眾單方之藥取效急速或用根燒灰貼動牙即牢治牙齒動搖用黑錫半斤大鍋內熔成汁旋入桑條灰柳木捶成沙以熟絹羅為末每日早晨如常揩牙後用溫水漱在盂內以水洗眼能明目黑髭鬢諸般眼疾髭黃白者用之便黑也麻黃散治冬寒時分寒濕腦痛項筋急牙齒動搖疼痛麻黃羌活防風根藁本骨灰細辛梢升麻梢黃連草豆蔻當歸熟地黃生地黃草龍膽上為細末搽之麝香礬雄散治大人小兒牙齒動搖齦齶宣露骨槽風毒宣蝕潰爛不能入食者膽礬雄黃麝香龍骨上為細末每用一字鵝毛蘸藥掃患處又以三錢末水七分至五分熱呷滿口候冷吐去或每日揩牙溫水漱之白牙散治牙齦綻肉有牙疳腫痛牙動欲落牙齒不長髭黃口臭宜之或夏月亦可升麻根四兩羌活根龍膽根羊頸骨上同為極細末以紗羅子羅骨灰作微塵末和勻臥時刷牙先以溫水漱口用少許搽之治牙積久碎壞欲盡用礬石以綿裹嚼之吐汁後愈牢固牙齒牙齒脫落附論夫牙齒脫落者由腎氣虛弱骨髓里損不能浸潤也而又風邪之氣傳於經絡上注於齒間故今搖動脫落也方牙藥麝香散治牙齒不牢固去一切疳蝕黑牙縫去腐臭綠礬石膽細辛麝香甘松訶子皮何首烏白龍骨藿香葉縮砂仁零陵香百藥煎五倍子白茯苓上等分為細末入研者令勻先用漿水漱口每用藥少許搽牙含口內少時後用熱水漱口每日早晨用牢牙散治牙齒脫落顆鹽白礬半兩上都炒令乾為末每以槐枝點藥敷齒上有涎即吐安腎丸治虛壅牙齒浮腫疼痛肉蓯蓉桃仁故紙白朮石斛乾山藥白蒺藜川烏川巴戟川蓽薢各等分上為細末煉蜜丸如梧桐子大每服七十丸空心鹽湯送下胡桐律散牢牙止痛胡桐律生地黃升麻芎藭白芷細辛青鹽麝香燒寒水石上等分為細末每用少許搽牙痛處吐津誤咽不妨日用地骨皮散治齒疼吃食不穩地骨皮當歸升麻桂芎藭甘草紫礦寒水石莨菪子上等分為散每用二錢塗齒根下甚者綿裹如彈子大日吞三兩丸口中含化亦妙牢牙散牢牙止痛去風荊芥薄荷葉草烏頭川芎細辛白芷豬牙皂莢防風上各等分為細末溫水灌漱後用藥少許搽之再漱丁香石燕子散治腎經不足齒齦不固或動搖不牢髭鬢斑白皆治丁香石燕海馬白礬舶上茴香龍骨上等分為末每用一錢搽左右牙後用溫酒送之臨臥時用熟銅末散治牙齒非時脫落令牢定熟銅末當歸地骨皮細辛防風各一分上為細末和銅末研如粉封齒上日夜二三度三五日牢定一月忌嚼硬物封齒是先塗藥在患處用蠟紙封之血竭散出御藥院方治牙痛牙根注悶連槽骨疼痛久而不愈五靈脂密陀僧血竭石膽乳香各等分上各令研極細再同研勻每分用一字指蘸塗貼牙病處候少時用溫荊芥湯微漱有津吐去誤咽不妨牢齒如聖散治牢牙齒上疼痛石燕子乳香青鹽各一兩細辛半兩上為細末每用以紙蘸藥干搽於痛處良久溫荊芥湯漱口牢牙散治牢牙齒定疼痛寒水石生定粉龍骨烏魚骨上等分為細末每用少許搽牙不時用誤咽無妨又方牢牙定痛寒水石枯白礬鍾乳粉生定粉上各等分研極細末搽牙痛處牢牙方出海上方香附子細辛防風青鹽各一兩上為末每用如搽齒方搽之後用溫水漱之牢牙石燕子散治牙齒齦肉不固及腎弱齒疏或血出侵蝕青鹽麝香各一兩石燕子十對火燒上合研勻每用藥半錢以醋煎藥刷搽牙齦上合口少時後用溫酒漱漱吐出早晨只用一遭治牙崩出本事方信砒半錢紅丹一錢上先將砒霜傾在錢香匙上卻以紅丹蓋定文武火煅令煙盡為度研為細末先用枳殼荊芥湯灌漱吐去將前藥末揩牙上不可吞直候凝多吐下又須用前湯灌漱立效煨腎散治病齒非腫非疼虛不能嚼食先用局方嘉禾散姜煎食次以地骨皮煎湯漱之候空心以羊腰子一對切片令斷以蔥絲椒子青鹽蒺藜末固元散二錢拌勻摻於腰子內以豆蔻葉或荷葉包裹炮令熟食之服經兩日頓覺爽利飲食如故蒺藜杵去刺耿運官舊病朽齒朽者既去空齒之上下左右非腫非疼但覺齒虛不能嚼食很以為苦偶得何主簿授此一試而驗此方乃耿師道傳屢試有驗耿為人誠謹豈欺我耶信而無疑牢牙密齒出海上方用橡斗子以鹽實之兩個相合以鐵線縛定火中煅過入荊芥香白芷香附子鹽二兩細辛同為細末橡斗子餘四味各半兩治裂齒痛取死曲蟮末敷之牢固牙齒良法用良殺牛齒三十枚固濟瓶中煅令通赤取細末水一盞末二錢煎之令熱含浸牙齒即冷吐卻永堅牢或有損動者末揩之又方用蟬蛻皮研一錢井花水服治牙病牢牙赴筵散香附子高良薑鹽各三兩細辛一兩上為末作齒藥常用晚年牙不脫落甚妙治齒腫痛用繭草郁李仁各四兩水六升煎取二升去滓熱含冷吐治多食石榴損齒用石榴黑皮炙令黃以棗肉為丸空服三丸日二服又捷要方余抵臨汀未幾齒浮硬物甜物皆不能進諸藥無效冬初邀同官遊蒼玉偶說所苦李蒙之云大人病此半年遇一道人傳授每日以生鹽半盞搽牙以溫水灌漱扣齒一百二十下數日遂痊其親於余同年時適就養於次日依方試之數日果愈奇甚祛風牢牙散防風川芎白蒺藜石膏沉香青鹽香白芷細辛甘松三柰香附子荊芥穗升麻旱蓮草荷葉灰沒石子膽礬各二錢半上為細末每用搽牙胡桐淚散治牢牙齒痛胡桐淚川升麻白礬灰各一分獨活細辛麝香當歸附子白芷各半兩上細羅為散夜臨臥時先揩齒漱口令淨用少許貼之烏頭散治牙齒動搖終不堅固者宜用出牙川烏頭巴豆大硼砂硼砂大蜘蛛膩粉上等分細羅為散研入巴豆令勻每用少許著牙根一食間牙即自出治牙齒動搖卻令堅固貼齒方用皂角不限多少燒為灰研令細然後以生地汁溶團如雞子大又燒令通赤候冷搗羅為末又以生黃汁溶又燒如此三遍入乳缽中研令細每用濕紙片子摻藥貼齒神效一方入炒鹽半兩用治牙齒動搖不穩須出牙神效驗方用馬齒莧菜粗大者燒作灰研為細末入少砒霜同研令勻每用少許著齒根下問患人覺熱即令輕漱便動以手拈出後敷止血藥神效烏金散治腎氣不足齒齦不固黑牙縫及髭鬢牢牙訶子五倍子沒藥細辛甘松零陵香麝香各二一錢綠礬白茯苓百藥煎橡斗兒青鹽金絲礬上除麝香綠礬二錢二味令研其餘極細然後入諸藥拌勻稍熱水漱每日兩次用藥半錢刷牙烏髭鬢牢牙齒白間黑其功效不可具述牢牙齒散治牙無力不能嚼物升麻生地黃黃連羊骨皮參石膏白茯苓胡桐律上為極細末入麝香少許研勻臨臥搽牙復以溫水漱之益齒出本草以石膏末揩之長齒出本草以牡鼠脊骨末敷之多年不出者可長取牙方揩齒附論夫齒者骨之所終髓之所養摧伏諸谷號為玉池揩理灌漱叩琢引導務要津液榮流滌除腐氣令牙齒堅牢齦槽固密令諸疾不生也聖惠論或緣揩理無方招風致病者蓋用之失宜反以為害不可不止方刷牙散酸石榴皮白檀赤茯苓各二錢半訶子細辛一錢半百藥煎二錢半零陵香藿香川芎甘草三錢半香白芷升麻何首烏茴香沒石子縮砂仁荷葉灰青鹽銅綠綠礬橡子鬥兒金絲礬蓽茇高錢上為細末將銅綠膽礬另研極細同藥一處和勻每日侵早至晚臨臥二度刷牙其方黑髭鬢牙藥訶子白檀細辛蓽茇川芎藿香甘松白芷五味子茴香綠礬何首烏升麻青黛荷葉灰沒石子香附子石榴皮百藥煎皂角麝香膽礬零陵香各等分上等分為極細末搽之長春牢牙散烏髭發去風牙香附子白茯苓砂仁丁香川芎蒺藜百藥煎五味子金絲礬升麻細辛青鹽破故紙檀香甘松石膏膽礬沒石子訶子麝香上為細末早晚刷牙如前法玉池散治口齒諸疾細辛川升麻防風當歸川芎藁本地骨皮白芷石膏螺青青鹽各等分上十一味等分細辛倍用曬乾為細末早晚食後常揩牙若病甚用藥末三錢水一大盞姜五片黑豆五十粒煎十沸通口嗽甚妙須是日曬乾用為佳經火焙則走氣也嘉禾火口齒科張太極常用之藥因療朱丞相疾愈傳之得於其孫堅通手余嘗病牙癰賴此而效至今日用不輟細辛散生地黃地骨皮石膏白芷何首烏茯苓當歸寒水石細辛丁香川芎甘草甘松附子青鹽各等分升麻茶末上為細末用庚子日為頭刷牙每日二次以余掠鬢用津咽之白者變黑黑者不白明目暖水臟補下元沉香散出御藥院方治刷牙堅固牙齒榮養髭發沉香白檀苦楝子母丁香細辛酸石榴皮當歸訶子皮香附子青鹽荷葉灰青黛乳香龍腦麝香上等為細末每用半錢如常刷牙溫水刷漱了早晚二次用丹砂散揩齒丹砂麝香白檀香丁香皮藿香葉茅香莎草根甘松白芷升麻鉛丹豬牙皂角石膏凝水石零陵香各一兩上為末令細每日如常用揩齒揩齒細辛散細辛升麻甘松香零陵香藿香葉當歸鉛丹白芷地骨皮凝水石筍灰牛膝麝香白檀香各一分上為末以麝香同研令勻每用少許揩牙溫水漱之硃砂散揩齒令自白硃砂丁香藿香茆香附子甘松白芷川升麻黃丹白檀香豬牙皂莢石膏寒水石零陵香上等分為散都研令勻每日常用揩齒甚佳白牙散升麻骨灰白芷石膏麝香上等分為末先以溫水漱淨擦之尤妙治牙齒藥細辛草烏頭皂角上等分先將皂角炒令焦次入草烏頭次入細辛同研為末先用鹽湯漱口即用藥如常便刷牙方香白芷白茯苓各五錢丁香細辛各三錢當歸川芎甘草升麻何首烏生地黃地骨皮膽礬各二錢寒水石五錢上為細末庚日為始刷牙妙應散治牢牙疏風理氣黑髭發白茯苓遼參細辛香附子川芎白蒺藜縮砂各五錢龍骨石膏百藥煎白芷各七錢麝香上為細末每日早晨臨臥刷牙溫水漱之玉池散治牙齒垢膩不淨潔升麻藁本甘松蘭草香白芷川芎各一兩細辛青鹽生地黃各二兩地骨皮二兩皂角三梃麝香少許上為細末併入一處研勻每日早晚揩牙如常用香附子散治黑牙縫刷牙藥綠礬五倍子訶子皮石膽白芷棗核灰各三錢甘松粟縫螺髻香附子上等分為細末入麝香少許拌勻每日早晨先刷牙潔淨然後用藥刷溫水漱口候少時空吐令牙縫黑牙板白牢牙潔淨黑髭鬢永不患牙痛之病刷牙藥川芎滑石細辛白蒺藜藁本甘松石膏茯苓膽礬白檀麝香各半兩上為極細末每日刷之白牙散細辛蓽茇與防風白芷茯苓恰配芎升麻甘松香附子石膏三倍有神功白牙藥石膏香附子甘松三柰子藿香零陵香沉香川芎細辛各半兩防風一兩上細末和勻日用少許祛風瑩白牢牙白芷散揩齒白芷升麻藁本細辛沉香丁香石膏貝齒麝香各一分懸水石一兩豬牙皂角三梃上為細末早夜用如常揩牙齒去惡氣槐枝散揩齒變白髭槐枝烏賊魚骨無食子馬齒莧生地黃胡桃青桔皮地黃花皂莢檞葉蔥須各一兩上細銼入瓷餅內蓋口火燒煙出細研為散每日三上陳希夷刷牙藥牢牙齒烏髭鬢豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷葉要相當青鹽等分同燒煉研細將來使最良揩牙牢齒髭鬢黑誰知世上有仙方上各二兩除青鹽一味外其餘藥味並碎銼新瓦罐兒盛其藥用瓦蓋合罐口以麻索子系定上用鹽泥固濟約厚半寸許曬乾穿一地坑子方闊二尺約深一尺先放一方新磚後安放藥罐以口向下坐用炭火燒令透後候青垢出稍存其性去火放經宿取藥出曬乾為末每用刷牙子蘸藥少許刷上下牙齒次用溫水漱之每日早晨臨臥時一次於內旱蓮葉如馬齒花如星宿升麻形如雞骨色青綠此二味藥本出京兆府奴婢高邦才謹言牢牙烏髭鬢藥古今方論甚多稍有經驗略言如後一方加香芷一有祐德觀景碧虛先生常用此藥年至八十以上面如童子髭鬢甚黑齒落重生儀師顏亦識此人一明昌二年正統軍司書袁姓年五十歲以上髭鬢本生來黃色因患牙疼用此藥兩月髭鬢皆變色更不脫落一真祐二年陝西安撫事沙斡患牙疼數月用此藥痊可至今常用此方曾經效驗者歷歷甚多不敢虛言沉醉香散揩齒壁淨令白及治口臭沉香麝香各一錢細辛半兩升麻藁本藿香葉甘松白芷各一錢石膏四兩寒水石二兩每為細末每日早晚揩齒揩齒龍骨散龍骨細辛石膏藁本白芷芎藭升麻各一分龍葵花凝水石鹽花研各半兩上搗為散以瓷器盛別用生地黃三斤以竹刀細切曝乾入鹽花水拌於銅器中熬令黑色又取巨勝子五兩炒豬牙皂角三斤以鹽水浸一宿炙梧桐子半兩牛膝半斤切搗羅為散與前散和令勻每晨臨臥以脂點揩齒上訶子散訶子金絲礬川芎細辛砂仁人參膽礬麝香江茶各二錢上為細末臨臥刷牙牙藥方縮砂仁細辛滑石香白芷川芎百藥煎膽礬各一二錢金絲礬麝香各少許上為極細末加好茶相和早晨刷牙令黑齒如白玉一方無川芎百藥煎揩齒秦椒散秦椒馬齒莧乾漆石榴皮柳枝生地黃胡桃皮白芷皮桑白皮各等分上細銼入瓷瓶內以鹽泥固濟用炭火十斤燒以炭消為度待冷細研每日早晚揩牙髭發白即變黑升麻散揩齒去風闢口氣令白淨升麻吳白芷藁本細辛沉香石膏貝齒麝香各一分寒水石一兩上細羅為末研入麝香令勻每日用揩齒白牙藥治牙齒黃黑不瑩淨零陵香香芷青鹽升麻各半兩細辛麝香砂鍋石膏各一兩上除砂鍋石膏麝香外同為細末後入砂鍋等三味同研勻每日早晨以指蘸藥搽牙後用溫水漱口敷牙藥方縫黑水板白豬牙皂角生薑升麻熟地黃旱蓮草槐角子細辛甘遂上各等分為細末用瓷器一個鹽泥固濟入前藥留瓶口用炭火煨燒香菸出為度取出刮下為細末刷牙余津搽髭鬢色如鴉貝齒散揩牙貝齒文蛤石膏凝水石丹砂石決明各一兩龍腦海水沫上為散早晨臨臥以指蘸藥揩齒去口氣牛膝散揩齒牛膝生地黃地骨皮馬齒莧鹽豬牙皂角各一兩蘭香根二兩饋飯四兩上為散以麵裹炭火煨令煙盡取出去面細研為末揩齒紫金散揩牙烏髭鬢兼治牙齒一切疾病麻糝地黃青鹽皂莢東引桃枝柳枝桑枝馬齒上件各等分取盛三升瓦罐子一隻將前件藥物分作三處隨一味一重下於罐子內蓋覆新瓦先穿一小竅外以紙箸泥固濟候乾炭火燒通赤候竅子煙出去火塞竅子用冷黃土培一兩宿取出更用升麻白芷各一兩前藥一處為末以新瓦器密收隨時取不以旦暮揩齒表裡久用髭鬢黑潤牙齒甚白除口氣香潔合時切忌見婦人雞犬華山石刻散揩齒烏髭鬢及治牙齒諸疾若用此藥永不患病雞腸草旱蓮草茜草根晚蠶砂白礬青鹽不蚛皂莢訶子各等分上㕮咀如麻豆入瓶子內外用鹽泥固濟口上留一竅如皂角子大用木炭五斤煅之煙盡為細末每日二三次揩牙熱漱陰氣少時用漿水漱口鬢髮黃白者皆黑七寶牢牙散細辛川芎砂仁膽礬滑石綠礬各等分麝香少許上為極細末臨刷時以茶清調勻刷罷用溫漿水漱之一方不用滑石以龍骨代之尤妙刷牙藥白芷細辛寒水石石膏茯苓龍骨各一兩石燕子一枚上為極細末日用刷牙白石英散揩齒白石英珊瑚海蛤琥珀各半兩海水沫丹砂鍾乳各一分上為散每用少許揩齒鮮白細辛散揩齒細辛升麻白芷藁本沉香丁香石膏各一分上為散每日用柳枝咬頭令軟點藥揩齒為妙芰實花散揩齒髭鬢變白為黑芰實花糯米花黠子花烏菱崩桃不蚛皂莢麝香上除麝香外余藥等分為末用糯米飯為丸用武火燒令通赤候冷入麝香三分都研令細每日早臨臥先漿水漱口揩齒有效七寶散揩齒令白淨海蛤琥珀珍珠白石英瑪瑙光明各一兩麝香一分上為細散於乳缽內重研令細每日取柳枝打碎一頭點藥揩甚良及咽津無礙仙方刷牙藥烏髭鬢牢牙齒延年退老青鹽芝麻夏蠶訶子旱蓮草皂莢上等分同為末醋漿水和丸如彈子大曬乾用新瓦藏瓶內盛藥用鹽泥濟候乾留一小眼子出煙置一淨磚上用木炭火煙淡熟之後即出旋研如常刷之如已白者百日黑未白者半月見效頻刷尤妙升麻散揩牙如常時升麻生地黃皂莢干石榴子柳枝巨勝各半兩上銼細入瓷油瓶中以鹽泥固濟炭火燒通赤候冷搗研為散金牙散揩齒金牙蟾酥細辛黃芩白芷各半兩升麻一兩上為末別用蕎麥麵四兩以新麻油布一片將末裹作團頓磚上四畔以炭火燒一飯久取出候冷和團再為細末別研龍腦麝香各少許具砂鶴黃各半升再同研勻用瓷盒盛逐日點藥揩齒上即以暖水漱之如常或疼血出揩三五遍久揩黑髮髭蓮子草散揩齒蓮子草升麻牛膝茜草丁香各半兩生地黃上入瓶子內泥封頭燒令通赤取出為散如常揩齒麝香散膽礬川芎縮砂綠礬龍骨麝香上等分為細末先用漿水刷牙淨次用藥刷之余津掠髮鬢大效貝齒散揩齒令光白貝齒文蛤海蛤石決明光明砂龍腦上細羅為散於乳缽中研入龍腦令勻每日早晨及夜臨睡常用揩齒出口氣益牙齒甚驗訶子散漆牙藥牙縫黑綠礬五倍子訶子皮銅綠黃丹上先用前二味牙縫中上了後少時再用後三味依前封裹少時用溫漿水漱一方加麝香少許香附子五錢燒灰潰牙藥黑牙縫牢牙五倍子酸石榴皮黃丹上先用前藥末漿水調貼牙縫上後藥如前貼二三日見效槐枝散揩齒去風令白淨槐枝巨勝子青鹽生地黃各一兩皂莢一梃上細銼入一新瓷瓶中盛固濟於瓶口上留一竅如錢孔大然後以文火燒候瓶內藥煙為度便取出羅為散每用揩齒甚良桑棋子散揩齒常令光潤白淨干桑棋子川升麻皂莢生地黃槐白皮上細研用糯米飯為丸以炭燒令通赤候冷入麝香一分都研令細每日早晨及臨臥先以漿水漱口後揩齒仙人散地骨皮青鹽黍黏細辛上為末入麝香少許每用一字臨臥揩上茶酒漱口吐出刷牙藥治諸牙病頻刷著牙黑縫齒如白玉玄蔞穀精草松子白茯苓上將玄蔞成藥蓋之用麻繩縛定鹽泥固濟二指厚用炭火燒紅為度土坑埋冷取出去泥用青鹽少許研細早晨刷牙卻將刷牙水吐在盞中用刷牙刷在頭髮上如墨刷牙散烏藥麝香膽礬輕粉上等分為細末臨臥溫漿水漱刷將藥三兩便口內漱刷之三十日頭白再黑大有功效烏金散茯苓人參細辛麝香上等為細末臨臥刷牙鬢至齒不落去牙疳一切風證三物膏齒者骨之所終髓之所養若漱咽津液災不幹齒揩理無妨因風招病由此用三物膏揩搽令牙齒堅牢柳枝桑枝槐枝上等分以水二斗同煮至一斗去滓入好鹽一斤熬成膏瓷盒內貯臨臥揩牙妙石膏散石膏細辛柳根各等分上為末搽之牙藥方輕粉井鹽烏梅上為末加片腦麝香少許或二錢或一錢大有神效早晚刷余津就咽漱大聖散牢牙益齒揩齒皂莢訶黎勒皮鹽各一兩上搗碎以麵裹成團用槐枝火燒煙盡為度別入升麻細辛各一兩搗末每日早晚揩牙溫水漱口皂莢散揩齒皂莢羊腸草青鹽上等分細研為散每用揩齒龍花蕊散揩齒龍花蕊凝水石生地黃上等分為散日常用搽牙千金鹽湯揩齒法牙藥中第一方也兼點津洗目及治牙疼極效川百藥煎雄黃玄胡索上等分為細末先用爛研生薑揩牙搜盡涎漱去卻用此藥揩之嚥下亦可如牙腫牽連頭面用此即瘥又方黃連黃柏大黃上等分為細末生薑自然汁如梧桐子大捻作餅子陰乾貼在痛處刷牙方藥香附子大黃上等分用橡子二十個肉十八個裝滿青鹽於沙器內單擺定用碗蓋之燒存性用生象子二個並香附子大黃同為細末每日刷牙髭鬢當歸散揩牙烏髭及治牙疳出血久不瘥當歸鯽魚上等分紙裹泥固濟燒黑灰入燒鹽同和揩牙如常漱之為妙白牙散用酸棗仁蘑菇不以多少煅過加麝香少許刷牙又方蜂房白礬豬牙皂角上各等分捶碎水一碗煎沸漱口不可咽黃工部牙刷細辛藁本白芷各二兩白礬四兩生薑六兩上件為末如常用受邦齒藥香附子半斤細辛鹽各二兩上取香附子新大者去粗皮細銼用生薑一斤研取汁拌和香附子浸五七日取出去香附子不用姜滓汁後將細辛與香附子鹽同瓦炒存性逐日揩牙如常之法揩齒法欲使藥時用生薑一塊如杏仁大爛嚼須臾不去滓以左手揩三五遍就濕紙點藥末更揩十數遍含津不得吐以兩手取津塗髭發待辛辣走即細細嚥之此藥兼治腳氣腸風上氣駐顏益齒若能勤用一生白髭發一百日即黑赤者五百日黑用藥二十日即便見效也若能空心三遍用更飯用之見效即速矣苦參不可潔齒予常苦腰重久坐則傴僂十餘步然後能行有一將佐見予日用苦參潔齒因予時以齒病用苦參數年曰此病由也苦參入齒其氣傷腎能使人腰重後有太常少卿舒昭亮用苦參揩齒久病腰重自後悉不用腫疼皆愈此皆方書所不載遺山牢牙散茶芽茯苓石膏龍骨各一兩寒水石白芷細辛各二兩石燕子大者一枚上為細末早晚刷牙一方點落牙用茄柯馬尿浸三日出曬乾銼炒為末點牙即落切切勿近好牙又方用白馬糞煎巴豆揩牙即落勿近好齒胡桃灰散揩牙胡桃灰貝母各一兩上研為散每用揩牙牙齒黃黑附論腎主骨齒者骨之餘也人之腎氣強骨髓堅固則齒瑩白璀璨今腎氣弱無以榮骨髓因令牙齒枯槁而黃黑方白牙散石膏細辛地骨皮青鹽甘松藿香零陵香白芷藁本各三錢磁石末新磚末香附子麝香少許上為末搽牙宣大效龍花蕊散治牙黃黑龍花蕊郁李仁升麻黃芩地骨皮白蒺藜地柏汁吳蘭各一兩麝香龍腦半錢上為散次入腦麝細研凡口齒之疾無不治每用貼時先以柳枝淨揩齒以新汲水漱口更以鹽花於齒齦內外揩之含涎唾即吐不要漱口便取白薄紙作片子闊如韭菜以水蘸紙摻藥末少許貼齒齦上咽津亦得升麻散治齒黃黑揩齒令白升麻防風細辛各一分鍾乳凝水石白石英丹砂半兩沉香丁香麝香各一分上為細末每用少許揩齒一方有石膏無防風硃砂散治齒黃黑令白淨揩齒硃砂海蛤石膏細辛川升麻防風各二兩寒水石芎藭檳榔生地黃上為散都令勻每日早晨夜臨臥時先以暖水漱口三五度用藥揩牙齒以白紙貼藥於齦上便睡不用漱口甚效龍花蕊散治牙齒黃黑龍花蕊川升麻郁李仁生地黃地骨皮白蒺藜杏仁細辛龍腦麝香上等分為散入研令勻每欲貼時先以柳枝淨揩齒以新汲水漱口更以鹽花於齒齦內外揩之有涎即吐卻不要咽便取白薄紙剪作片子闊如韭葉以水蘸之摻藥末少許貼齒齦上便閉口勿語藥汁咽之石膏散治齒黑黃並口臭揩齒石膏凝水石丹砂升麻白芷細辛藁本各半兩沉香一兩上為散每日揩齒用柳枝咬頭令軟蘸藥末揩齒常令白去惡氣入麝香少許更佳鍾乳散治牙齒黑黃揩令鮮明潤澤鍾乳海蛤丹砂浮石白石英珍珠麝香硼砂各一分研上為細散再研令勻用柳枝咬頭令軟點藥揩齒甚妙空青散治齒黑黃揩令白淨空青皂莢曾青銅綠石膏各一分戎鹽半兩丹砂半兩麝香一分上為散用紙三五重裹以黃泥再次炭火中燒令通赤候冷去泥入丹砂麝香研令細用柳枝點揩一方無銅綠有胡桐淚升麻白芷各三分藁本散治齒黃黑揩令白潔藁本沉香細辛丁香各半分凝水石各一兩上為散每早晨臨臥時揩齒地骨皮散治齒黃黑枯燥無光澤地骨皮郁李仁生地黃各一兩川升麻一兩半藁本露蜂房各半兩杏仁一兩上為散每用一錢以綿裹常含咽津白芷散治齒黃黑揩齒白白芷白蘞莎草根白石英芎藭細辛上各等分搗研為散常用揩齒烏金擦牙藥百藥煎膽礬五倍子各等分上為細末擦牙上用漿水漱之治牙黃藥方川芎丁香上各等分為細末擦牙如雪白效揩齒方治牙黃黑令白淨鹽四兩燒過杏仁一兩上都研成膏每用揩齒甚佳治齒黑黃出十便良方揩齒用桑根白皮銼不拘多少以醋浸三日揩牙齒升麻散治齒黑黃揩令白淨升麻三分白芷藁本去苗土沉香銼細辛去苗葉丁香各半兩凝水石研各一兩上為散每早晨臨臥時揩齒
