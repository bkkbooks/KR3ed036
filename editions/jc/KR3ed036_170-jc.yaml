body:
  text: 卷一百七十積聚門肥氣附論凡積聚在左脅下如覆杯有頭足名曰肥氣肝之積也肝臟血故陰多而陽少病為氣積此由肺病傳肝肝傳脾脾以季夏適旺而不受邪氣留於肝故結為積久不愈令人發咳逆痎瘧連歲不已以夏戊己日得之以陰盛陽虛故也方酸棗仁丸出聖濟總錄治肝積肥氣久不已變瘧令人熱多寒少小便赤澀酸棗仁生用薏苡仁紫蘇子炒研木通銼黃耆銼枳殼去瓤麩炒升麻大黃銼炒坐拿草麥門冬去心焙木香赤茯苓去黑皮各一兩上為末煉蜜丸如梧桐子大每服二十丸漸加至三十丸煎麥門冬湯下蓬虆根湯出聖惠方治久積結癖氣不散左脅下如覆杯咽酸吐水面目黃痿此名肥氣並女子血瘕蓬虆根銼二兩牡丹皮銼赤芍藥各一兩桂去粗皮檳榔銼枳殼去瓤麩炒各三兩當歸切焙生薑去皮切焙半兩生地黃焙一兩半上粗搗篩每服三錢水一盞煎至七分去滓溫服空心日晚各一服防葵散出聖惠方治肥氣在左脅下結聚成塊腹䐜脹不欲飲食防葵訶黎勒皮白朮各三分郁李仁三分湯浸去皮微炒吳茱萸半兩湯浸七次焙乾微炒桂心三分枳實半兩麩炒微黃木香三分檳榔三分上為散每服三錢水一盞生薑半分煎六分去滓食前稍熱服三稜丸出聖惠方治肥氣在左脅下如覆杯有頭足令人瘦羸發寒熱不能食荊三稜川烏頭一兩炮裂去皮臍雄黃半兩細研硼砂一兩不夾石者細研青橘皮半兩湯浸干去白乾漆半兩搗碎炒令煙出鱉甲一兩塗醋炙令黃色去裙襴防葵一兩麝香一分研上為末研前藥令勻以米醋一升斤熬令稠少入面作糊和丸如綠豆大每服十丸空心溫酒送下青蒿湯治久積肥氣寒熱痎瘧青蒿自然汁一合生薑自然汁半合童便半合常山銼三分鱉甲去裙襴醋炙黃烏梅肉焙各半兩甘草炙銼一分柴胡去苗三分上除汁外粗搗篩每五錢水一盞半煎至八分入煎三味汁合少許同煎至一大盞去滓臨臥溫服麝香丸左脅下有覆杯有頭足久之令人發痎瘧熱瘧間日作始由肺病傳肝肝傳脾脾乘王而不受邪其氣留於肝故結而為積謂之肥氣其脈澀結成弦而細蓬莪朮炮一兩桂心當歸人參各半兩細辛烏頭炮去皮各一分巴豆去油一分麝香一錢上為末煉蜜為丸如綠豆大米飲下五丸至十丸食前服一方壯人五丸弱人三丸鱉甲散治肥氣在左脅下按之堅不能食脈弦而緊肌體痿瘦鱉甲一兩半醋塗炙令黃去裙襴大黃一兩半銼碎微炒當歸一兩銼微炒荊三稜一兩炮銼訶黎勒皮一兩枳殼半兩麩炒微黃去瓤吳茱萸半兩湯浸七次焙黃桃仁一兩湯浸去皮尖雙仁麩炒微黃上為散每服三錢水一中盞生薑半分煎六分去滓食後稍熱服牽牛煎丸治肥氣結聚不散腹脅脹滿嘔逆酸水食飲減少牽牛子末三兩以生薑汁半斤酒一升慢火熬如膏木香一兩附子一兩炮裂去皮臍鱉甲一兩半塗醋炙令黃去裙襴檳榔一兩桃仁一兩半湯浸去皮尖雙仁麩炒微黃細研吳茱萸半兩湯浸七次焙乾微炒硼砂一兩不夾石者細研入上為細末入牽牛子煎和溶為丸如桐子大每服二十丸食前生薑湯送下肥氣丸治肝之積在左脅下如覆杯有頭足如龜鱉狀久不愈發嘔逆痎瘧連歲月不已其脈弦而細青皮炒二兩當歸須蒼朮各一兩蛇含石醋淬三分蓬朮切三稜切鐵孕粉各三兩與三稜蒼朮同入醋煮一沸上為末醋煮米糊丸如綠豆大每服四十丸當歸浸酒下蓬虆根散治肥氣在左脅下似覆杯咽酸嘔水面目痿黃胸膈不利蓬虆根二兩銼牡丹一兩枳殼三分麩炒微黃去瓤赤芍藥一兩桂心三分檳榔一兩荊三稜一兩炮裂上為散每服三錢水一中盞煎至六分去滓食前稍熱服石葦丸出聖濟總錄治肝積氣石葦拭去毛焙荊三稜煨銼附子炮裂去皮臍吳茱萸水洗七次焙乾炒陳橘皮湯浸去白焙蜀椒揀去閉口及目炒出汗各一兩上為末煉蜜為丸如梧桐子大空腹煎荊芥湯下二十丸大黃丸出聖惠方治肥氣結聚在左脅下堅牢疼痛食少體瘦大黃二兩銼碎微炒防葵一兩木香三分乾薑三分炮裂銼川烏頭一兩炮裂去皮臍鱉甲一兩半醋炙令黃銼上為細末以陳米醋三斤熬令稠入神麯末半兩煮成火溶和諸藥末為丸如梧桐子大每日空心溫酒下二十丸以微利為度鱉甲丸出聖惠方治肥氣體瘦無力少思飲食鱉甲一枚約重二兩淨洗以醋和黃泥固臍背上約厚三分令乾荊三稜三兩銼炮川大黃二兩銼碎微炒枳殼三兩麩炒微黃去瓤木香一兩半桃仁二兩湯浸去皮及雙仁麩炒微黃細研如膏上件藥除鱉甲外搗羅為末後以泥風爐子上開口可安得鱉甲取前藥末並桃仁膏納鱉甲中用好米醋二斤時時旋放入鱉甲內以慢火熬令稠取出藥即將鱉甲淨洗去泥焙乾搗羅為末與前藥同和搗為丸如梧桐子大每日空心以溫酒服二十丸晚食前再服三稜煎丸出聖惠方治肥氣固結不散脅腹急疼食少體瘦石三稜七斤淨洗去泥銼碎川大黃三兩芫花一兩醋拌炒令乾木香一兩鱉甲三兩塗醋炙令黃去裙襴上件藥先以水二升煮三稜至一升去滓搗羅諸藥為末入前藥於銅器內慢火熬之更入米醋一升同煎熬稠候稍冷和為丸如梧桐子大每日空心以溫酒下十丸硼砂煎丸出聖惠方治肥氣積年不散在左脅下狀如覆杯天陰即疼痛硼砂二兩不夾石者細研以酒醋各一斤熬如膏乾漆一兩搗碎炒令煙出防葵一兩川大黃一兩上為細末入硼砂煎入小蒸餅和溶為丸如綠豆大每日空心溫酒下十丸木香丸出聖惠方治肝積肥氣結硬不散木香銼一兩大黃銼二兩鱉甲去裙襴銼二兩米醋三斤與大黃同煎醋淨為度焙乾上為末酒煮糊為丸如梧桐子大每服二十丸空心食前生薑湯送下治肝積氣滯左右脅下遇病作則兩邊手足頭面昏腫乾葛一錢麻黃三錢側子一枚川芍防風枳實芍藥桂心羌活甘草當歸各四錢上㕮咀生薑煎服肝之積肥氣丸出試效方治積在左脅下如覆杯有頭足不愈令人發咳逆痎瘧連歲不已厚朴半兩黃連七錢柴胡二兩椒炒去汗四兩川烏頭炮去皮一錢二分乾薑炮半錢皂角去皮弦子煨一錢半巴豆霜五錢白茯苓去皮一錢半廣朮炮二錢半人參去蘆二錢半甘草炙二錢昆布二錢半上件除茯苓皂角巴豆霜余為細末另碾茯苓皂角細末和勻另碾巴豆霜旋旋入末和勻煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再加兩丸服周而復始如積減大半勿服春夏依此法服秋冬另有加減法再各條下秋冬加厚朴半兩通前一兩減黃連一錢半若治風癇於一料中加人參茯神菖蒲各三錢黃連只依春夏用七錢惟秋冬不減空心淡醋湯送下伏梁附論內經謂病有小腹痛上下左右皆有根名曰伏梁里有膿血居腸胃之外不可攻治之每切按之欲死又曰人有身體髀股胻皆腫環臍而痛病名伏梁此風根也夫氣之所聚名曰聚氣之所積名曰積夫聚者陽氣也故無所留止積陰氣也故有形伏梁心之積也起於臍下故小腹痛上下左右皆有根里有膿血居腸胃之外故環臍而痛此為風水之病故身體脾胻皆腫名曰伏梁以其若梁之隱伏也其症有淺深居臍上為逆以邪氣之逆上行也居臍下為從以邪氣之順下行也治法不可動動之為溺澀之病故治在刺法中也夫心之積名曰伏梁起於臍上大如臂上至心下以秋庚辛日得之何以言之腎病傳心心當傳肺肺以秋適旺旺者不受邪心欲復還腎腎不肯受故留結為積故知伏梁以秋得之也千金方云經絡受病人於腸胃五臟積聚發伏梁息賁肥氣痞氣奔豚積聚始生至其已成奈何曰積之始生得寒乃生厥止乃成積人之善病腸中積者何以候之曰皮薄而至澤肉不堅而淖澤如脂則腸胃受惡惡則邪氣留留則積聚乃生則腸胃之積寒溫不次和氣消止滯氣玄積留止有聚乃起病有身體腰脾股胻皆腫環臍而痛是為何病曰病名伏梁此風根也不動動之為水脹溢之病小腹痛左右上下皆有根者伏梁也里膿血居腸胃之外不可攻治之每切按之欲死以下則因陰必下膿血上則迫胃管王永生云當臍出膈俠胃管內癰以久病也難療居臍上為逆慎勿動亟奪其氣益於大腸而著於肓肓之原在臍下故環臍而痛方訶黎勒丸出聖濟總錄治憂積伏梁氣訶黎勒煨去核二兩檳榔銼三兩半赤茯苓去黑皮柴胡去苗枳殼去瓤麩炒羚羊角鎊黃連去須防葵銼生薑切焙各一兩半黃芩去黑心一兩大黃銼炒三兩半木通銼一兩一分上為末煉蜜和丸如梧桐子大每服十丸空腹米飲下日再漸加至三十丸以利為度療痞結痃癖氣積橫梗伏梁上以鯉魚作鱠以濃蒜齏食之昔患痃癖者常夢人教每日三顆大蒜空心服遂至暝眩而愈半夏散出聖惠方治伏梁氣心下梗結滿悶不能食胸背疼痛半夏一兩半湯浸七次去滑川大黃一兩銼碎微炒桂心一兩前胡一兩去蘆荊三稜一兩炮銼當歸一兩銼焙微黃青橘皮一兩湯浸去白瓤焙鱉甲一兩半醋塗炙令黃去裙襴檳榔訶黎勒皮木香各一兩上為散每服三錢水一中盞生薑半分煎至六分去滓不拘時候稍熱服丹砂丸出聖濟總錄治伏梁氣胸下痞痛小便赤澀及驚悸不安夜多夢寐丹砂木香馬牙硝以上三味同研細人參赤茯苓去黑皮麥門冬去心焙升麻遠志去心豉各一兩生乾地黃焙二兩上除研者外搗羅為末將研者拌勻煉蜜和丸如梧桐子大每服二十丸臨臥煎桑根白皮蔥湯下川烏頭丸出聖惠方治伏梁氣結固在心下橫大如臂飲食漸少肢體消瘦川烏頭半兩炮裂去皮臍芫花半兩醋拌炒令乾荊三稜半兩銼醋拌炒桂心防葵各半兩鱉甲一兩塗醋炙令黃去裙襴乾漆半兩搗碎炒令煙出木香一兩硼砂一兩半不夾石者細研川大黃二兩銼碎醋拌微炒上為細末先以米醋三斤熬令稍稠入少面作糊和溶搗三五百杵為丸如綠豆大每服空心以溫酒下七丸漸加至十丸以取下積滯物為度隔兩日再服鱉甲湯出宣明論治伏梁積氣心下如臂痞痛不消小便不利鱉甲去裙襴醋炙黃荊三稜銼大腹銼芍藥各一兩當歸切焙上粗搗篩每服三錢水一盞木香末半錢同煎至七分去滓空心溫服日再服防葵散出聖惠方治伏梁氣在臍上心下固結如梁之狀胸膈不利飲食減少防葵荊三稜炮裂桂心赤芍藥各一兩鱉甲一兩半塗醋炙令黃去裙襴當歸一兩訶黎勒皮一兩川大黃一兩銼碎微炒枳殼三分麩炒微黃去瓤上為散每服三錢水一鍾生薑半分煎至六分去滓食前熱服乾漆丸出聖惠方治伏梁氣在心下堅牢不散胸中連背多痛乾漆一兩搗碎炒令煙出川烏頭半兩去皮臍銼碎研拌炒黃色芫花一兩銼拌炒令黃桃仁半兩湯浸去皮尖雙仁麩炒微黃雄黃一分細研鱉甲一兩塗醋炙令黃去裙襴木香半兩硼砂一兩不夾石者細研麝香一分細研上為細末入研前藥令勻以醋煮麵糊為丸如綠豆大每服食前以溫酒送十丸治奔豚伏梁氣陳皮青皮當歸白芍藥蔞根梔子甘草穿山甲各一兩上為粗末每服半兩水二盞生薑三片煎至八分去滓溫服硼砂煎丸出聖惠方治伏梁氣久積在心下橫大如臂發咳疼痛胸背拘澀腹脅滿悶硼砂二兩不夾石者細研以酒醋各半斤熬如膏乾薑半兩炮製銼附子一兩炮裂銼去皮臍檳榔一兩川大黃二兩銼碎微炒上為細末入硼砂煎更入蒸餅少許和溶為丸如梧桐子大每服空心溫酒下十五丸至二十丸大黃煎丸出聖惠方治伏梁氣心胸妨實背膊煩疼不能食四肢無力川大黃三兩銼研微炒別羅搗末以酒醋各一斤熬如膏木香一兩荊三稜一兩銼碎醋拌炒令乾桃仁一兩湯浸去皮尖雙仁麩炒微黃訶黎勒皮一兩桂心檳榔青橘皮各一兩湯浸去白瓤焙上為細末入大黃煎更入蒸餅少許和熔為丸如梧桐子大每日空心以溫酒下十丸至十五丸伏梁丸出三因方治心之積起於臍上上至心大如臂久久不已病煩心身體重股背腫環臍而痛其脈沉而芤茯苓厚朴薑汁製炒人參枳殼麩炒去瓤白朮半夏湯浸七次三稜慢火煨熟乘熱溫制上等分為末煮糊丸如梧桐子大米飲下二十丸食前日兩服作散酒調服絕勝氣塊石燕散出直指方治飲食傷冷心下結塊狀如伏梁又攻左脅車螯殼蛤蜊殼並燒灰存性為末各一兩乾薑生官桂甘草炙各一兩上為末每服二錢臨發時沸湯點服車螯蛤蜊殼治塊伏梁丸出指南方臍下如臂時起至心下又或身體肢脛皆腫始由腎病傳心心傳肺肺乘旺不受邪氣留於心結而為積其脈大而時一結或沉而芤謂之伏梁其病里有膿血居腸胃之外按之欲死比下則因陰必下膿血上則追胃脘內癰居臍上為逆居臍下為從始萌可治久則難以變成水青皮白馬尿浸三日令軟透切三兩巴豆去皮十五個與青皮同炒乾去巴豆不用羌活半兩上為末糊為丸如綠豆大米飲下十五丸未知加至二十丸治伏梁氣橫在心下不能飲食出聖惠方木香一兩硼砂一兩夾石者細研入川大黃二兩銼碎醋拌炒令乾上為細末入研過硼砂令勻以酒煮麵糊和丸如梧桐子大每服食前生薑湯下七丸治伏梁氣在心下結聚不散出聖惠方硝石半兩牽牛子一兩木香半兩上為細末以米醋二斤納藥末慢火煎令稠入少麵糊和熔為丸如梧桐子大每服空心溫酒下十丸治伏梁氣方上貯白馬尿銅器中盛取每旦服一斤治伏梁氣在心下結聚不散出聖惠方上以桃奴三兩為末空心溫酒調二錢服人參丸治心積伏梁人參一兩陳橘皮湯浸去白焙二兩搗末醋一斤煎膏射干自然銅研如粉金屑研如粉枳殼去瓤麩炒知母銼當歸切焙細辛去苗葉檳榔銼石菖蒲泔浸一宿切焙赤茯苓去黑皮麥門冬去心焙各一兩上除煎研者外搗羅為末入煎研者和勻煉蜜和丸如梧桐子大每服二十丸空心炒生薑黑豆湯下日再服加至三十丸鱉甲散出聖惠方治伏梁氣橫在心下堅硬煩悶不能食鱉甲一兩半塗醋炙炮令黃去裙襴吳茱萸半兩湯浸七次焙乾微炒郁李仁一兩湯浸去皮微炒荊三稜一兩炮銼枳實三分麩炒微黃柴胡三分去苗桂心三分檳榔一兩上件藥搗篩為散每服四錢水一中盞入姜半分煎至六分去滓食前稍熱服心之積伏梁丸出試效方起臍上大如臂上至心不愈令人煩心黃連去須一兩半厚朴去皮薑製半兩人參去蘆五錢桂去皮一錢乾薑炮半錢茯神去皮末一錢丹參炒一錢上件為細末另研巴豆霜旋旋入末煉蜜為丸如梧桐子大初服二丸每日加一丸二日加二丸漸加至大便溏再從兩丸加服淡黃連湯送下食遠周而復始積減大半勿服秋冬加厚朴半兩桂一錢春夏減黃連半兩即用一兩黃芩治心下結伏氣須用滑石粉煮作粥經宿浸色黃和鹽食之痞氣附論凡積氣在胃脘覆大如盤者脾積也痞結不通故名痞氣此本肝病傳脾脾當傳腎腎以冬適旺而不受邪氣留於脾故結為積以冬壬癸日得之久不愈令人四肢不收發黃疸飲食不為肌膚所以然者脾臟肌肉之氣能與胃行其津涎以榮養四肢若為積氣所留不能榮養故有四肢不收飲食不為肌膚之症方曲術香稜丸出德生堂方治男子婦人小兒脾積氣滯胸膈痞悶肚腹脹滿痃痞氣塊往來走注刺痛大腸酒食嘔吐酸水飲食不思婦人血氣癥瘕小兒傷食並皆治之此方比瑞竹堂方略有加味荊三稜莪朮陳皮香附子各四兩作一處用好醋二斤煮一沸時去醋焙乾白豆蔻四兩沉香四兩縮砂仁蓽澄茄木香川薑烏藥各二兩枳殼炒檳榔乾葛半夏曲炒神麯乾葛花各二兩上為末熬蘿蔔水煮糊為丸如綠豆大每服五七十丸隨意酒生薑湯下金露紫菀丸出宣明論治一切脾積兩脅虛脹臍腹疼痛草烏頭五枚去皮尖生黃連半兩官桂桔梗乾地黃乾生薑川椒蕪荑紫菀去皮柴胡防風厚朴甘草人參川芎鱉甲酒浸貝母枳殼甘遂以上各一兩巴豆三兩醋煎半日出油硼砂三錢上為末水煮麵糊為丸如梧桐子大每服五丸空心臨臥米湯下或微疏動詳虛實加減消痞丸一名大消痞丸出衛生寶鑑治一切心下痞悶及積年久不愈者黃連去須炒六錢黃芩炒黃色六錢薑黃白朮各一兩乾薑生一錢甘草炙三錢縮砂仁三錢枳實麩炒黃五錢橘皮四錢人參四錢半夏湯浸七次四錢神麯炒黃色二錢厚朴三錢豬苓二錢半一方加澤瀉上為細末湯浸蒸餅為丸如梧桐子大每服五十丸至七十丸一百丸白湯送下食後一方無人參甘草蒜紅丸出百一選方治脾積腹脹如鼓青筋浮起坐臥不得者揀丁香木香沉香檳榔青皮去白陳皮去白縮砂仁蓬莪朮炮去皮牽牛草果子各一兩肉豆蔻麵裹煨粉霜各一兩白茯苓去黑皮人參各半兩蒜二百枚一半生用一半火焙熟上為細末以生熟蒜研細用細絹取汁旋用藥末為丸如梧桐子大每服五七丸至十五丸食後淡鹽湯送下忌鹹酸魚鮓茶醬油膩醃鵝雞鴨生冷馬牛雜肉之類只吃淡白粥一百日金液丸出聖濟總錄治脾積痞氣痰逆噁心腹脅滿悶胸膈噎塞不思飲食荊三稜炮蓬莪朮炮白朮丁香皮刮去粗皮牽牛子麩炒青橘皮陳橘皮並湯浸去白焙肉豆蔻大者去殼檳榔炮各一兩乾薑炮硼砂研各半兩巴豆半兩和皮秤去皮研如膏紙壓油去盡以不汙紙為度上為末攪拌勻用頭醋煮稠麵糊為丸如綠豆大每服五丸食後米飲湯下萬安丸出仁存方治腹中成形作塊按之不移推之不動動輒微喘令人寒熱腹中時痛漸漸羸瘦久不治者多變成水虛腫亦由憂思驚恐寒熱得之陰陽痞㿃氣結成形其脈結澀謂之積氣大戟炒甘遂牽牛半生半炒五靈脂吳茱萸浸七次炒玄胡索炒各二錢半芫花醋煮炒石膏各一錢膽礬半錢研細墨燒半錢斑蝥十個去頭足炒蚖青二十枚去足炒巴豆去油半錢上為末糊丸綠豆大姜橘皮湯下三粒日二服病去五六分即住服快氣丸出聖濟總錄治脾積痞氣心腹脹滿嘔逆噫酸檳榔三枚銼木香一兩肉豆蔻去殼半兩甘遂半兩麩炒黃大戟一分炮白牽牛一兩炒墨一分沉香半兩陳橘皮湯浸去白焙上為末白麵糊為丸食後生薑湯下消痞丸治一切痞氣心腹脹滿癖氣聚滯不快青皮去白陳皮去白荊三稜泡切廣朮煨切益智炒縮砂仁當歸切焙半夏薑製牽牛炒丁香皮各一兩硼砂明者一分另研上為細末酒糊為丸如小豆大每服二十丸生薑湯送下不拘時候沉香消痞丸沉香半兩木香半兩陳皮青皮三稜蓬朮砂仁香附烏藥檳榔乾薑各一兩上為細末醋糊為丸如梧桐子大每服五六十丸用米飲湯送下食前服豆蔻湯出聖濟總錄治脾積痞氣攻注腰背痛肉豆蔻去殼赤茯苓去黑皮高良薑附子炮裂去皮臍草豆蔻去皮藿香陳橘皮湯浸去白焙各二分人參一兩檳榔十枚桂去粗皮半兩上銼如麻豆大每服二錢水一盞半入棗五枚生薑一分切碎煎至八分去滓熱服勻氣湯出聖濟總錄治脾積痞氣胃脘不安肌瘦減食
