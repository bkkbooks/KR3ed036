body:
  text: 卷二百三十二虛勞門虛勞不足附論夫虛勞不足者是因中風傷寒熱病勞損溫瘧大病之後血氣減耗臟腑未和故使虛乏不足虛乏不足則經絡受邪隨其所犯變成諸病也方肉蓯蓉丸出聖惠方治虛勞腎氣不足夢與鬼交心多忪悸頭目昏悶四肢少力不思飲食肉蓯蓉酒浸一宿刮去皴皮炙令乾熟乾地黃鍾乳粉各二兩五味子龍骨山茱萸各三分車前子一兩桂心人參三分去蘆頭牛膝一兩去苗枸杞子遠志各三分去心白茯苓一兩黃耆三分銼石斛一兩去根銼杜仲一兩半去粗皮微炙銼防風去蘆頭薯蕷石菖蒲各三分附子一兩炮裂去皮臍菟絲子二兩酒浸三日焙乾別杵為末上為末煉蜜和搗三五百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸麋茸丸出聖惠方治虛勞不足腎臟傷絕麋茸二兩去毛塗酥炙令微黃鹿茸一兩去毛塗酥炙微黃熟乾地黃二兩牛膝去苗人參去蘆頭白茯苓桂心五味子巴戟菟絲子湯浸三日焙乾別搗為末附子炮裂去皮臍蛇床子山茱萸薯蕷車前子遠志各一兩去心肉蓯蓉一兩酒浸一宿刮去皴皮炙令乾漢椒半兩去目及閉口者微炒去汗上為末取白羊腎十隻去筋膜細切爛研用好酒五升慢火熬成膏入前藥末和搗三二百杵丸如梧桐子大每服空心及晚食前用溫酒空心下三十丸熟地黃散出聖惠方治虛勞不足四肢無力不能飲食時多盜汗熟乾地黃牡蠣黃耆銼人參去蘆頭麥門冬去心白茯苓以上各一兩續斷白芍藥桂心五味子甘草炙微赤銼當歸白朮山茱萸以上各三分上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服治虛勞不足小便數四肢無力不能自持宜服此方出聖惠方石斛一兩半去根銼黃耆一兩銼澤瀉三分補骨脂一兩微炒遠志二分去心牛膝一兩去苗當歸三分人參一兩去蘆頭熟乾地黃二兩桂心三分五味子半兩白茯苓一兩鹿茸一兩半去毛塗酥炙微黃龍骨一兩上為散每服用羊腎一對切去脂膜以水一大盞半煮取汁去腎入藥五錢煎至五分去滓食前溫服晚食前覆滓再煎服之黃耆散出聖惠方治虛勞不足臟腑虛弱四肢乏力不能飲食黃耆銼人參去蘆頭陳橘皮湯浸去白瓤焙當歸附子炮裂去皮臍石斛去根銼白朮山茱萸白茯苓以上各一兩桂心三分甘草半兩炙微赤銼麥門冬一兩半去心焙上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓食前溫服胡麻散出聖惠方治虛勞不足咳逆上氣不欲飲食四肢乏力胡麻桂心甘草炙微赤銼人參去蘆頭澤瀉黃耆銼白茯苓以上各一兩五味子麥門冬去心焙地骨皮天門冬去心以上各五錢熟乾地黃一兩上為散每服四錢以水一中盞入薤白兩莖生薑半分煎至六分去滓不計時候溫服龍齒散出聖惠方治虛勞不足汗出而悶脈結心悸虛煩龍齒一兩甘草五錢炙微赤銼黃耆一兩銼麥門冬一兩去心熟乾地黃一兩人參一兩去蘆頭桂心五錢乾薑五錢炮裂銼阿膠一兩搗碎炒令黃燥上為散每服四錢以水一中盞入棗三枚煎至六分去滓每於食前溫服建中散出聖惠方治虛勞能益氣補不足方見大建中黃耆湯磁石散治虛勞脾腎氣寒飢不欲食面色黑少氣不足磁石二兩搗碎水淘去赤汁黃耆一兩銼杜仲一兩五錢去粗皮白石英一兩五味子三分白茯苓白朮各一兩桂心三分附子一兩炮裂去皮臍上為散每服三錢以水一中盞煎至六分去滓食前溫服治虛勞不足補益思食助力出聖惠方石斛一兩半去根銼桑螵蛸微炒紫芝五味子紫菀洗去苗土各三分熟乾地黃鍾乳粉各一兩遠志五錢去心附子三分炮裂去皮臍上為散每於食前以溫酒調下二錢菟絲子散出聖惠方治虛勞不足陰陽失度傷筋損脈噓吸短氣漏泄不止小便赤黃陰下濕癢腰脊如折顏色不悅菟絲子搗三兩甘草炙微赤銼各二兩棗肉桂心各三分銼杜仲五兩去皴皮銼曝乾麥門冬二兩去心生乾地黃五兩肉蓯蓉三兩刮去皴皮切上以酒五升漬三宿出曝乾復浸更曝乾以酒浸盡為度搗羅為散每服食前以溫酒調下二錢胡麻湯出聖惠方治虛勞絕傷羸極氣少不足四肢消瘦胡麻三兩熟乾地黃二兩人參一兩去蘆頭甘草一分炙微赤銼麥門冬二兩去心焙藁本三分上為散每服四錢以水一中盞煎至五分去滓食前溫服鍾乳散出聖惠方治虛勞不足益氣力思飲食鍾乳粉二兩黃耆銼桂心各一兩乾薑三分炮裂銼肉蓯蓉湯浸一宿刮去粗皮炙令乾白朮各一兩上為散每服食前以溫酒調下二錢鍾乳酒浸方出聖惠方治虛勞不足補養五臟療風氣堅筋骨益精髓鍾乳粉三兩黃耆銼牛膝去苗石斛去根節防風去蘆頭各二兩熟乾地黃五兩上細銼都以生絹袋盛以酒三斗浸三日後每於食前溫飲一小盞清神甘露丸出衛生寶鑑治男子婦人虛勞不足骨枯肉陷並皆治之生地黃汁白蓮藕汁牛乳汁生用以上各等分用砂石器內以文武火同煎熬成膏子用後藥白朮人參黃連黃耆五味子胡黃連上各等分為細末煎膏子和丸如梧桐子大每服三五十丸人參湯下八味腎氣丸出千金方治虛勞不足大渴欲飲水腰痛小腹拘急小便不利小腹脹滿羸極氣少四肢無力效驗方乾地黃八兩山茱萸薯蕷各四兩澤瀉牡丹皮茯苓各三兩桂心附子各二兩上為末蜜丸如梧桐子大酒下十五丸日三加至二十五丸仲景云常服去附子加五味子治大風冷姚公云加五味子三兩蓯蓉四兩張文仲云加五味子蓯蓉各四兩肘後方云地黃四兩附子澤瀉各一兩余各二兩五加皮酒出千金方治虛勞不足五加皮枸杞白皮各一斗上㕮咀以水一石五斗煮取七斗分取四斗浸曲一斗餘三鬥用拌飯下米多少如常釀法熟壓取服之多少任性禁房事如法將息愈虛勞嘔逆附論夫虛勞之人中焦有冷不能化谷寒氣入胃痞滿不通故雖能食而胃亦不受使氣上行令人嘔逆痞悶不安心下逆滿也虛勞嘔逆者為勞傷之人五臟不安六腑不調胃氣虛弱故也胃為水穀之海今既虛弱復有寒氣所侵則不勝於水谷故氣逆而嘔也方七香丸治虛勞脾胃虛冷寒痰嘔吐心腹脹滿㽲痛水穀不消零陵香去梗甘松香去土各一兩藿香去梗木香各一兩五錢丁香皮銼沉香各五錢麝香研紅豆蔻去皮草豆蔻去皮蓽澄茄各一兩山芋檳榔煨各二兩厚朴去粗皮生薑汁炙熟白朮半夏湯浸七遍去滑青橘皮湯浸去白焙白豆蔻去皮人參蒟醬各一兩陳橘皮湯浸去白三分甘草炙一兩五錢上搗羅為末麵糊和丸如梧桐子大每服二十丸食前生薑湯下厚朴丸治虛勞脾胃氣弱嘔吐口乾煩渴不能飲食四肢疼痛厚朴去粗皮薑汁炙熟陳橘皮湯浸去白焙白茯苓去黑皮人參乾薑炮白朮薏苡仁各一兩五錢桂去粗皮石斛去根甘草炙牛膝酒浸焙各一兩一分枳殼去瓤麩炒細辛去苗葉食茱萸大麥糵炒各三分上搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下日二服加至三十丸訶黎勒散出聖惠方治虛勞脾胃氣不和嘔逆不納飲食四肢少力胸膈煩悶訶黎勒皮一兩黃耆一兩銼白豆蔻去皮陳橘皮湯浸去白瓤焙白朮各三分半夏湯浸七遍去滑檳榔各五錢人參去蘆頭前胡去蘆頭各三分厚朴一兩去粗皮塗生薑汁炙令香熟甘草五錢炙微赤銼桂心三分上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服赤茯苓散出聖惠方治虛勞胸膈氣滿嘔逆不納飲食赤茯苓一兩陳橘皮湯浸去白瓤焙人參去蘆頭各三分丁香半夏湯洗七遍去滑各五錢黃耆銼白朮各三分五味子枳實麩炒微黃各五錢甘草一分炙微赤銼訶黎勒皮三分桂心五錢上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服藿香湯治虛勞脾胃久虛吐逆不下食藿香葉人參白茯苓去黑皮桔梗去蘆頭炒桂去粗皮木香白朮甘草炙杏仁湯浸皮尖麩炒半夏湯洗七遍去滑炒令黃各五錢枇杷葉十片拭去毛炙上搗篩每服五錢水一盞半生薑五片同煎至七分去滓稍熱不拘時候黃耆散出聖惠方治虛勞脾胃氣不和吃食嘔逆黃耆銼訶黎勒皮各一兩煨桂心五錢半夏五錢湯洗七遍去滑白朮白茯苓草豆蔻去皮厚朴去粗皮塗生薑汁炙令香熟各一兩人參三分去蘆頭陳橘皮一兩湯浸去白瓤焙甘草五錢炙微赤銼上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服半夏飲治虛勞胃氣寒中脘痞悶嘔吐多痰不思飲食半夏一兩湯洗去滑用生薑二兩同搗作餅子焙乾丁香木香各一分白朮沉香銼陳橘皮湯浸去白炒各五錢甘草炙草豆蔻五枚去皮青橘皮湯浸去白炒各一兩上粗搗篩每服五錢水一盞半生薑半分煎取一盞去滓溫服白朮湯治虛勞胸中氣滿痰飲癖結或時嘔逆不欲飲食白朮陳橘皮湯浸去白炒白茯苓去黑皮桂去粗皮前胡去蘆頭各一兩枳實麩炒半夏湯洗七遍去滑附子炮裂去皮臍各一分甘草炙五錢上銼如麻豆每服三錢以水一盞半生薑半分煎至一盞去滓不計時候溫服橘皮湯出聖惠方治虛勞嘔逆煩渴不能食四肢少力陳橘皮一兩湯浸去白瓤焙半夏湯洗七遍去滑半兩白茯苓白朮人參去蘆頭麥門冬去心黃耆銼枇杷葉去毛炙微黃各五錢甘草一分炙微赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服前胡散出聖惠方治虛勞脾胃氣滯胸膈痰壅不欲食即嘔逆前胡一兩去蘆頭赤茯苓五錢陳橘皮三分湯浸去白瓤焙枇杷葉五錢拭去毛炙黃檳榔人參去蘆頭草豆蔻去皮半夏湯浸七遍去滑甘草炙微赤銼各五錢上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服白朮散出聖惠方治虛勞脾胃氣冷食即嘔逆不食又飢白朮三分藿香五錢枇杷葉二分拭去毛炙微黃人參去蘆頭白茯苓各一兩肉豆蔻三枚去殼甘草五錢炙微赤銼厚朴一兩去粗皮塗生薑汁炙令香熟桂心五錢上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服丁香散出聖惠方治虛勞脾胃氣弱嘔逆不欲飲食四肢少力丁香人參去蘆頭各三分甘草五錢炙微赤銼白朮三分茯神一兩高良薑銼白豆蔻去皮陳橘皮湯浸去白瓤焙半夏湯洗七遍去滑各五錢上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓稍熱服不計時前胡湯治虛勞胸滿氣逆嘔吐飲食前胡三分去蘆頭柴胡去苗桔梗炒赤茯苓去黑皮各五錢大腹子三枚並皮銼半夏湯洗七遍去滑陳橘皮湯浸去白炒各一分人參上粗搗篩每用五錢水一盞半生薑一分拍碎煎至一盞去滓空腹分溫二服人參湯治虛勞脾胃氣弱嘔吐不納飲食四肢怠惰人參肉豆蔻去殼炮半夏湯洗七遍去滑黃耆銼厚朴去粗皮生薑汁炙熟枇杷葉拭去毛炙藿香去梗白茯苓去黑皮各二兩上粗搗篩每服三錢水一盞入生薑指大拍碎大棗二枚擘破煎取七分去滓空心食前溫服半夏湯治虛勞脾胃氣滯胸膈痰壅食即嘔吐半夏湯浸去滑焙乾一兩陳橘皮湯浸去白焙二兩芍藥白茯苓去黑皮白朮杏仁湯浸去皮尖雙仁別研各一兩五錢上除杏仁外粗搗篩和勻每服五錢用水一盞半入棗兩枚擘破生薑一分拍碎煎至一盞去滓分溫二服附子湯治虛勞脾胃冷弱胸滿氣逆嘔吐咳嗽腹痛腸鳴附子炮裂去皮臍甘草炙各一兩乾薑炮三分白朮炒銼一兩五錢生薑二兩同搗作餅炙半夏一兩湯洗去滑生薑二兩同搗作餅炙蒼朮米泔浸去粗皮銼炒二兩上銼如麻豆每服三錢水一盞半棗二枚擘破生薑半分煎至一盞去滓分為二服虛勞咳唾膿血附論