body:
  text: 卷三百五十六產難門總論凡婦人以血為主惟氣順則血順胎氣安而後生理和今富貴之家往往保惜產母惟恐運動故禁出入專坐臥曾不思氣閉而不舒快則血凝而不流暢產不轉動以致生理失宜臨產必難甚至悶絕一也且如貧者生育日夕勞苦血氣舒暢生理甚易何俟乎藥則孕貴於運動者明矣次則產婦妊娠已經六七個月胎形已具而世人不知禁忌恣情交合嗜欲不節使敗精淤氣聚於胞中致令子損母傷臨產必難二也何知生下兒子腦上有白膜一片滯膩如膠俗語名曰戴白生兒身有青有黑俗語名曰宿痣此是入月交合所致也如此則不特母病其子一生浸淫赤爛瘡瘍俗謂之胎蛆動逾歲月不瘥三則臨蓐太早傷筋骨或信巫卜或說鬼祟多方誤恐致令產母心驚神恐憂惱怖懼又被閒雜婦人喪孝穢濁之人沖觸若不預為杜絕臨產必難三也何以知之如偷生之女不正之屬既無產厄子母均安其理可知凡臨產初時腹疼或作或止名曰弄痛穩婆疏率不候時至便令試水試水頻並胞漿先破風颯產門產道乾澀未及其兒轉便令坐草太早兒轉亦難致令產難四也直候痛極眼中如火此是兒逼產門方用坐草即令易產如坐草稍久用力太過產母困睡抱腰之人又不穩當致令坐立傾側胎死腹中其為難產五也時當盛暑宜居深幽房屋當常令坐立開啟窗戶多貯清水以防血暈血悶血溢妄行血虛發熱之證如冬末春初天色凝寒宜密閉塞產室窒塞罅隙內外生火常令暖氣如春仍須下部衣服不可少綿方免胎寒血結無致產難六也經驗方云婦人產難重事也凡產婦入月切忌飲酒叫怒臨產時先脫尋常所著衣以籠井口則易產衣亦易下不可令人喧擾及作倉忙之狀止令老成在旁扶持看待產母惟當餐軟飯粥之類初覺微痛而不甚名曰弄痛不可便行試水探聽產母坐臥切須熟忍或服催生符藥卻不可曲腰腹垂連腰引動眼中如見火色此是兒轉又須令人扶策徐徐而行若行步艱即憑物立須臾扶策再行直至連相引陣痛頻頻又服催生符藥勉強扶行痛轉甚難於行立認是產時將至然後安詳坐草上草之時切勿太早恐兒在腰中難於轉側及胞漿先破子道乾澀皆致難產務要產婦惜力心中熱悶先以蜜一匙新汲水調下若熱悶未已以生雞子一個打破吞服直待兒逼產門頭端正然後令人抱腰其抱腰之人不得傾斜則兒順其理自然易產新產下便以新汲水令產母徐啜三二呷以涼心經不致敗血上行可省百病又有臥產者須待臥定背平著席體不傴曲則兒不失道如能依此節度必無難產之理終得分娩切忌問是男是女且服壓血藥仍令人用手或以物從心下按至臍腹惟宜避風房內常淬醋煙以防暈悶儒門事親收產傷胎論云有孕婦年十八歲臨產召穩媼三人其二極拽婦之臂其一媼頭抵婦之腹中以兩手板其腰極力為之胎死於腹良久乃下兒亦如血乃穩婆殺之也豈知瓜熟自落何必如此乎其婦因茲經脈斷閉腹如刀剜大渴不止小溲悶絕主病者禁水不與飲口舌枯燥牙齒黧黑臭不可聞食飲不下昏憒欲死戴人先以冰雪水恣意飲之約二升許痛緩渴止次以舟車丸通經散前後五六服下數十行食大進仍以桂苓甘露飲六一散柴胡飲子等調之又論云凡婦人難產者皆因燥澀緊斂故產戶不得開通宜先於降誕之日自月之日用長流水調益元散日三服產必易產後亦無一切虛熱氣血不和之疾如未入月則不宜服之以滑石滑胎故也凡人生產先知此十產證候則生產之婦永無傷損性命生產之間性命最重幸而孩子易生人不知福萬一少有艱難則須臾之間子母命懸於絲髮但世人所患者惟看生產收生之人少有精良妙手緣此而多有傾命因傷其事為十一產論一曰正產者蓋婦人懷胎十月滿足陰陽氣足忽然腰腹作陣疼痛相次胎氣頓陷至於臍腹疼痛極甚乃至腰間重痛穀道挺出繼之漿破血下兒子遂生此名正產二曰傷產者蓋婦人懷胎忽有七月八月而產忽有九月十月而產忽有經一年二年及四年五年而後產今獨以十月滿足為正產蓋一人之生陰注陽定各有時日不可改移今有未產一月以前忽然臍腹疼痛有如欲產仍卻無事是名試月非正產也但一切產母未有前面正產候即不可令人抱腰產母亦不可妄亂用力蓋欲產之婦臍腹疼痛兒身未順收生之人卻教產母虛亂用力兒身才方轉動卻被產母用力一逼遂使兒子錯路忽橫忽倒不能正身皆緣產母未當用力之所致也凡產母用力須待兒子順身臨逼門戶方始用力一迸令兒下生此方是產母用力當也若未有正產之候而用力傷早並妄服藥餌令兒下生譬如揠苗而助之長非獨無益而又害之此名傷產三日催產者言婦人慾產漿破血下臍腹作陣疼痛甚重腰重穀道挺迸頭至產門已見是正產之候但兒卻未生即可服藥以催之或有經及數日產母困苦已分明見得是正產之候但兒子難生亦可服藥以助產母之正氣令兒速得下生此名催產四曰凍產者蓋言三冬之月天氣寒冷產母經血得冷則凝結而不散因其血之不散以致兒子不能生下此之一弊為害最深然世人不知覺若冬月產者下部不可脫卻綿衣並不可臥坐寒冷之處當滿房著火令遍方常有暖氣常令產母背身向火令臍下腿膝間常有暖氣若背上心前少間寒冷須是暖炙綿衣以包之貴其血得熱則流散使兒子易生此名凍產若春秋之間天地有陰濕寒冷之氣亦可房中以微炭火暖為妙五曰熱產者蓋言盛暑之月欲產之婦當要其溫涼得所不可因熱恣意取涼及有傷損胎氣又生產之處不可多著人數切忌人多熱氣逼襲產母蓋人之血氣得熱則散熱過則損今當夏暑炎熱之盛而產母氣虛則其血得熱而上蒸能令產母發熱頭痛面赤昏昏如醉乃不知人事世有名血暈者因此而成也若產於夏月時少有清涼之氣陰雨之變產母不可任取涼恐生大病六曰橫產者蓋兒子下先露其手或先露其臂此因未當用力而產母用力之過也臍腹疼痛兒身未順則是產母用力一逼遂致身橫而不能生不幸而有此證候當令產母安然仰臥令看生之人推兒入去凡推兒之法先推其兒身令直上漸漸通手以中指摩其肩推其上而正之漸引指攀其耳而正之須是產母仰臥然後推兒直上徐徐正之候其身正門路皆順煎催生藥一盞令產母吃了方可令產母用力令兒下生此名橫產若看生之人非精良妙手不可依此法恐恣其愚以傷人命七曰倒產者蓋因其母胎氣不足關鍵不牢用力太早致令兒子不能迴轉順生便只倒下先露其足也治之之法當令產母於床上仰臥令看生之人推其足入去分毫不得令產母用力亦不得驚恐候兒自順若久不生卻令看生之人輕輕用手內入門中推其足令就一畔直上令兒頭一畔漸漸順直下得兒子身轉門路正當然後煎催生藥令產母服一盞後方始用力一送令兒生下此名倒產若看生之人非精良妙手不可依用此法恐恣其愚以傷人命八曰偏產者蓋因兒子迴轉其身未順生路未正卻被產母用力一逼致令兒頭偏柱左腿或偏柱右腿致令兒雖近門而不能生下但云兒已露頂然不知兒之所露即非頂也或左額角或右額角而已謂兒頭偏柱一畔以此不能收治之之法當令產母仰臥令看生之人輕輕推兒近上以手正其頭令兒頭頂端正向人門然後令產母用力一送即便兒子生下或是小兒之頭後骨偏柱穀道卻只露額當令看生之人以一件綿衣炙令溫暖用裹手急於穀道外旁輕輕推兒頭令正即便令產母用力送兒生也此名偏產凡遇穀道外旁推兒頭正須推其上而正之仍是小用輕力推兒上些而正之也若看生之人非精良妙手不可依用此法恐恣其愚以傷人命九曰礙產者蓋言兒身已順門路俱正兒子已露正頂而不能生下蓋因兒身迴轉肚帶攀其肩以此露正頂而不能生此名礙產收之之法當令產母於床上仰臥令看生之人輕輕推兒近上徐徐引手以中指按兒肩下撥其肚帶仍須候兒身正順方令產母用力一送使兒子下生此名礙產若看生之人非精良妙手不可依用此法恐恣其愚以傷人命十曰坐產者蓋言兒之欲生當從高處牢系一條手巾令產母以手攀之輕輕屈足坐身令兒生下非令產母臨生兒時著坐一物此名坐產若是產母兒將欲生卻令坐著一物即抵著兒不能生也十一曰盤腸產趙都運恭人每臨產則母腸先出然後產子產子之後其腸不收甚以為苦名曰盤腸產醫不能療偶在建昌得一穩婆施之一法而收之其法遇產後子腸不收之時以醋半盞新汲冷水七分碗調停噀產婦面每噀一縮三噀收盡此良法也後學不可不知歌云欲產之婦脈離經沉細而滑也同名夜半覺痛應分誕來日日午定知生身重體寒熱又頻舌下之脈黑復青及舌上冷子當死腹中須遣母歸冥面赤舌青細尋看母活子死定應難唇口俱青沫又出子母俱死總當判面青舌青沫出頻母死子活定知真新產之脈緩滑吉實大弦急死來親若得沉重小者吉忽若堅牢命不停寸口澀疾不調死沉細附骨不絕生臨產腹痛而腰不痛者未產腹痛轉甚者將產蓋腎候於腰胞系於腎尺脈轉甚弦如急珠者產婦人產乳忌反支月若值此月當在牛皮上若灰上勿令水血惡物著地則殺人及浣濯衣水皆以器盛過此忌月乃止凡生產不依圖脫有犯觸於後子母皆死若不至死母子俱病諸事皆不稱心若能依圖無所觸母即無病子亦易養凡欲產時特忌多人瞻視惟得三二人在旁待總產訖乃可告語諸人也若人眾看之無不難生胎神逐月所值方位不可修造正月在床二月在戶三月在門四月在灶五月在床六月在灶七月在房八月在廁九月在門十月在戶十一月在灶十二月在床凡孕婦入月不可洗頭方免產難及橫生逆產產難附論夫難產者由先因漏胞去血臟燥或子臟宿挾疾疹或觸犯禁忌或始覺腹痛產時未到便驚動穢露早下致子道乾澀產婦力疲皆令難產也凡看母舌青兒死母活唇口青兩邊沫出者子母俱死面青舌赤沫出者母死子活也故將產時產婦坐臥安定背平著席體不傴曲則兒不失其道若坐臥未安身體斜曲兒正轉動忽遽強𠸯氣暴衝擊則令兒趨後孔或橫逆皆由產時忽遽或觸犯禁忌坐臥不安審所為故產婦坐臥須平安正順四時方面避五行禁忌若有觸犯多致災禍者也方瞿麥湯治難產及已產胞衣不下或墮胎後血不下瞿麥穗硝石黃連滑石甘草炙各一兩王不留行延胡索當歸大黃各一兩一分生乾地黃大腹皮鬼箭羽射干威靈仙去土雷丸檳榔京三稜炒郁李仁各一兩半吳茱萸炒半兩牛蒡炒二兩上粗搗篩每服五錢水盞半入生薑五片同煎至八分去滓溫服不拘時催生湯治妊娠欲產痛陣尚疏難產經三兩日不生胎死腹中或產母氣乏委頓產道乾澀才覺痛密破水後便可服蒼朮二兩米泔浸洗切焙黃色枳殼麩炒去瓤白桔梗薄陳皮去白芍藥白芷川芎各一兩歸身一兩交趾桂去粗皮不見火半夏湯洗粉草麻黃軍姜去皮厚朴薑汁製南木香杏仁去皮尖白茯苓各五錢上為末每服二錢順流水溫暖調若覺熱悶白蜜湯或銼散入真米醋一合煎當隆暑之時恐難輕服但以五苓散用葵子燈心煎湯調下卻暑清魂滑胎易產胞漿先破則胎干難產用白蜜清油浸以熱酒令得所頓服胎氣既潤即分娩矣易生湯治婦人血氣不調心腹疼痛或月閉不通每有妊娠多難產蒼朮淨洗去皮十二兩桔梗二兩枳殼去瓤麩炒麻黃去根附子炮去皮陳皮去白各三兩芍藥白芷芎藭當歸桂去皮半夏湯洗七次赤茯苓甘草各一兩半厚朴薑製乾薑炮各二兩上除桂枳殼二味別為末外一十四味同為末慢火炒令色轉攤冷次入桂枳殼末令勻每服三錢水一盞半醋一合生薑三片煎至一中盞去滓熱服不拘時候神聖散治婦人難產及橫逆生干豬胎鯉魚皮女人亂髮三味各一兩入瓶子內燒令焦鐺墨伏龍肝細研各半兩墨煅醋淬三度當歸桂去皮芍藥白殭蠶炒白芷白附子炮芎藭各一兩上為散再研細每服三錢熱酒調下臨產腹痛時便子母無恙產後每日空心一服治月內諸血疾催生方治婦人臨產胞傷風冷腹痛頻並不能分娩王不留行京三稜煨牽牛子炒百合當歸威靈仙各一兩半雷丸大黃天雄炮裂去皮臍各一兩桂去粗皮甘草炙各三分大腹二兩上㕮咀每服五錢水一盞半煎八分去滓溫服令產安穩沉香湯從心洗即平安沉香水馬各一兩飛生鳥毛零陵香詹香龍腦蘇合香苜蓿香各一兩瞿麥二兩上以水一二斗煎取一斗去滓待至臨蓐欲平安用湯如人浴即從心上洗三五遍其湯冷即平安亦無有痛苦處無忌七聖煎治產難多時不下垂困宜服瞿麥滑石各一兩牛乳黑豆黃酥三味各二兩冬葵子一合白蜜二合上為細末以乳酥蜜調藥令勻慢火熬成稀膏每服一匙熱酒調下治產難催生用麝香一錢研水和服之立出保產無憂散胎肥氣逆臨蓐難產蓋身居富貴口食甘肥無度既飽即臥致令胞胎肥厚根帶堅固行動氣急又不預服瘦胎之藥以致臨產艱難服此可保易產當歸酒浸川芎白芍藥各二錢南木香一錢半枳殼炒的乳香另研三錢血餘二錢半即油發灰一方以獖豬心血和發灰上為末二錢水一盞煎至七分日二服濟生方有甘草一錢半炙余同一方無枳殼有硇砂甘草澤瀉湯一名聖麥散治產難及煩悶不已澤瀉一兩瞿麥去根研二兩半榆白皮銼碎二兩甘草炙令赤一兩半桂去皮木通牛膝酒浸半日切焙一兩上粗搗篩每服四錢水一盞半姜三片煎一盞去滓溫服未產便服七聖散臨產腰痛方可服延胡索沒藥白礬飛過白芷薑黃俱焙當歸桂心各等分上為細末臨產陣痛時燒鏵刃鐵令通赤淬酒調藥三錢服一二杯立產鏵刃犁頭是也此方河池縣喬醫家貨每服用錢引一道屢試有效其驗如神霹靂奪命丹治婦人恣意情性有失調理衛竭榮枯胎轉難動坐草之時用力過多腹痛又不能久忍坐草驀然氣痿目翻口噤面黑唇青口中沫出子母俱殞若兩臉微紅子死母生蛇蛻一條入在瓷罐內煅千里馬路上左腳舊草鞋一隻洗燒灰一錢發灰一錢金銀箔各一片乳香半錢別研馬明蛻蟬蛻燒灰一錢黑鉛一錢半水銀七分半依十五問中法上為末以獖豬心血為丸如梧桐子大倒流水灌下數丸如灌不下化開灌效如服藥可者更用前藥繫縛左右手上立效一方五月五日須焚香至誠修合勿令婦人雞犬見一方丸藥時每丸念救苦天尊救苦觀世音菩薩各一聲一方有千里馬無發灰一方有蠶子布無蛇蛻治產難方槐枝切二升榆白皮切大麻仁各一升瞿麥通草各三兩牛膝五兩上㕮咀以水一斗二升煮取三升半分五服牛酥煎治難產經日未生真牛酥三兩秋葵子一合白蜜二兩滑石瞿麥穗大豆黃卷各一兩上先以清酒一升研細葵子內酥蜜中微火令銷後即下諸藥慢火煎常如魚眼沸約強半如膏成則將瓷器中以綿濾之用溫酒調初服半匙漸加至一匙苧麻子根飲治難產產乳論云三十後嫁者謂之晚嫁也少嫁則筋骨軟懦易產也晚嫁則筋骨堅強所以難產入月宜常服干苧麻根新者刮削銼陳皮去白甘草炙生乾地黃焙烏梅去核取肉人參各二兩上粗篩每服二錢水一盞姜三片同煎至七分去滓溫服日夜各一催生奪命丹治婦人臨月坐草而難產者此藥於五月五日至心修合應驗牡丹皮秋少用白茯苓春少用桂夏少用赤芍藥冬少用桃仁去皮另研澤瀉各一兩上為末煉蜜丸如彈子大細嚼淡醋湯下榆白皮散治難產衛生寶鑑滑胎易產治妊娠曾有漏胎去血或臨產驚動太早產時未至穢露先下致使胎燥臨產艱難榆白皮一兩葵根一兩牛膝三分去苗瞿麥一兩木通半兩大麻仁三分上為末每服四錢水一盞煎六分去滓不計時候溫服又方黃芩一兩瞿麥滑石一兩冬葵子一兩酥一兩蜜上為散先將酥蜜於銚子內慢火煎三五沸下諸藥攪令勻更煎三兩沸以熱酒調下一匙不過再服子母平安勝金散治難產逐敗血即自生若橫逆則轉正子死腹中則胎軟膨寬即產王不留行酸漿胎死焙用茺蔚子白蒺藜去刺五靈脂行血俱生用上各等分為散每服三錢取利山水一盞半入白花劉寄奴子一撮同煎溫服車前子散治難產不下經日車前炒半兩榆白皮刮淨一兩滑石半兩當歸焙半兩瞿麥穗一兩上為散每服二錢用酒調下溫湯亦得如血水未下用大黃二錢煎湯一盞分作三服調前藥下甘草湯一名葵子散治難產腹痛胎不轉動甘草炙半兩榆白皮破一兩桂心一兩半葵子一合滑石六分上為散每服四錢水一中盞煎六分去滓溫服抵聖散治難產催生紅藍花六月六日取蜀葵花五月五日採桃花三月三日採凌霄花七月七日採大麥七月十五采各一兩上依時採取搗羅為細散每服三錢以熱酒調下立產芍藥散治難產催生赤芍藥二兩漚麻頭一握揀擇淨芎藭當歸茯神去木陳皮湯浸去白甘草炙各二兩亂髮灰一分上為散臨臥時溫酒調下二錢頻服立產滑胎散治痛楚難產榆白皮切一升瞿麥三分木通三分牛膝一兩去苗大麻仁一兩上為散每服四錢水一盞煎六分去滓溫服頻服效又方瞿麥槐枝牛膝木通榆白皮以上各一兩上細銼每服五錢水一盞煎六分去滓溫服立效催生丹療產婦生理不順產育艱難或橫或逆大有神驗十二月兔腦髓去白膜研如泥通明乳香一分細研母丁香末一錢上拌勻以兔腦髓和丸如雞頭穰大陰乾用油紙密封貼每服一丸溫水下即時產隨男左女右手中握出是驗一方治或橫或逆五行散治產難及胞衣不下難產者初覺腹痛產時未至便驚動穢物早下使子道乾澀難之一也用力太早致兒傷難之二也如是難產即將夫衣覆井口以弓弦系其腹治之以五行散主之牛膝洗去蘆酒浸一日急酒蒸為度榆皮桂心瞿麥木通以上各半兩上為細末每服二錢用熟水芝麻大三五點調下子死腹中加附子半兩車前子煎治難產車前子一升以布裹於中水熟挼漉出曝乾又以新布裹熱揉之令光滑不用搗生地黃汁一升白蜜一升好酥五合上相和微火煎常令如魚眼沸起即瀉於瓷器中每服半匙以沸湯調通口服之治難產催生瞿麥半兩桂心二錢半蟹爪半合牛膝酒浸半日焙半兩上粗搗篩每服五錢水一盞半煎八分去滓溫服如產便服滑胎散治婦人諸般惡產槐子炒麥糵炒當歸炒滑石各等分上為散每服二錢溫酒調下不拘時服療母子俱死者產難及胎不轉動者榆白皮三兩葵子五合甘草炙桂心一兩上切以水四升煮取二升服一升須臾不產更服一升忌海藻菘菜生蔥一方有黃芩名滑胎散催生丹治難產金箔三十片銀箔三十片麝香一錢硃砂半兩細研上細研如粉臘月兔腦髓和丸梧桐子大臨產時木香湯下五丸難產七丸立效又方冬葵根三分銼蒲黃半兩桂心半兩羚羊角屑三分上為散煮棗肉和丸如梧桐子大不計時候以粥飲下三十丸又方蛇蛻皮七寸炙黃蓖麻子七枚去皮研硃砂半兩麝香少許上都研為末煉蜜和丸如小豆大以溫水下二丸治產難或半生半產不下或子死腹中或著脊至坐草數日不產血氣上搶心母面無顏色氣欲絕者亦治橫生醇酒二升白蜜或煎豬膏各一升上合煎取二升再服不能再服可隨所能服之治產後噁心血不除上搶心痛煩急者以地黃汁代醇酒一方不用酒蛇蛻皮丸治難產數日不下蛇蛻皮一條燒灰臘月兔腦髓一枚車脂棗許大曝乾上除兔髓外搗羅為末以兔髓搜和為丸如梧桐子大每服二十丸溫酒下蟹爪飲一名千金神造湯治產難兼子死腹中或妊兩子一子已死一子卻活令死者出生者安蟹爪一合甘草炙半兩阿膠炙令燥一兩上㕮咀如麻豆大每服三錢以東流水一盞煎七分去滓溫服車前子散治滑胎易產車前子滑石各一兩阿膠燥一兩半上為散每服二錢蜜湯調下不時服至生月及服藥利九竅不可先服治妊娠難產方水銀一分膩粉一分兔腦十二月者上研以兔腦和丸如梧桐子大不拘時候以溫水下五丸催生如意散臨產腰痛方可服之人參為末乳香各一錢辰砂二錢上一處研臨產時急用雞子清一個調藥末再用生薑自然汁調開冷服如橫生倒生即時端順子母平善治產難累日氣力乏盡不得生兼惡露出盡胞衣不產阿膠二兩赤小豆二升上水九升煮豆令熟去滓內膠令烊每服五合不覺更服不過三服即出一方用黃明膠此方系舊用極驗一方水半盞煎八分又方槐子十四個蒲黃一合上合內酒中溫服須臾不生再服水服亦得又方生薑汁生地黃汁各半升上合煎熟頓服之治產難胞衣不出橫倒者及子死腹中母氣欲絕半夏白蘞各二兩上治下篩酒服方寸匕小難一服橫生二服倒生三服兒死腹中四服可加代赭瞿麥各二兩為佳一名催生持危散溫服不能飲者瞿麥湯調服催生柞木飲子治產難或橫或逆死胎爛脹於腹中此方屢用神效生大柞木枝一大握長一尺淨洗寸銼甘草大者五寸作五段上用新汲水三升半同入新沙瓶內以紙三重緊封之文武火煎至一升半令香覺腹痛便準備候產婦腰重疼欲坐草時溫溫飲一小盞便覺心開豁如覺再渴又飲一盞至三四盞覺下重便生更無諸苦切不可坐草早及穩婆亂下手催生藥只消一服此方至驗也若橫生倒生不過三服即正子死腹中取下能保子母俱全最為神驗有婦人問其夫曰屢服催生散不效遂令勿服以此藥濃煎一碗服少頃甦醒進些粥再與一碗困睡少時忽云我骨節都折開了快扶起我水血俱下拔出死胎全不費力可謂更生以此救人百發百中神劑且倉卒易辦毋忽治難產或倒橫不順方蛇蛻一條全者桑樹上佳蠶蛻紙一張上入新瓦瓶中鹽泥固濟燒存性為末煎榆白皮乳香湯調下一錢三服覺痛便生一方去臨產腰痛用藥三字麝香一字溫酒調下名二妙散三家水調亦得一名二退散金筆丸治難產金箔三片兔毫筆頭三個燒為灰上和停用蠟為丸如梧桐子大作一服溫酒下勝金散治難產若逆生並皆治之麝香一錢研鹽豉一兩以舊布青的裹了燒赤乳缽研上為末取秤錘燒紅以酒淬之調下一錢效嚴氏濟生方云難產者何答曰胎成之後子居腹中每食母血食血有餘遂成結塊謂之兒枕子欲生時血塊先破為散血裹其子所以難產當服勝金散要知胎成之後全在調攝令氣道平順十月滿足則產無難矣更有年少初生才覺腹痛便驚怖不安氣道不順以致難產宜服催生獨聖散及紫蘇飲瘦胎散瘦胎散治難產枳殼四兩甘草一兩分為三片刀前者生刀後者炙熱上為末空心每服一錢以茶點服自五月後一日一服至臨月不惟易產仍無胎中惡病滑胎易產莫出此方昔有河陽公主頻有難產每產則經旬痛不安艱難懼產遍尋異術遂傳此方而易產兼令胎瘦而微黑百日後方始變白若臨月之時不得上廁恐兒墮也催生治漏血產道乾澀難產痛劇以黃葵花春用苗夏用花秋用子冬用根焙搗為末酒調服神應黑神散一名神效散一名白芷散一名烏金散治難產此藥之功也人多不服以為極賤之藥大概產難或一日兩日未娩水血先下如舟坐灘殊不知香白芷百草霜再固其血服之如魚得水決自轉生兼治月水不調崩中等疾及橫生逆生能救子母性命香白芷百草霜各等分上為末每服二錢童子小便好醋各一茶腳許調勻更以沸湯浸四五分服見功甚速再服即分娩矣或用蜀葵子四十九粒白滑石末三錢順流水煎湯空心二服如人行五里即下一方煎服三因方云評曰產難不只胎側有兒枕破與敗血裹凝隨其胎息因緣自有難易其如橫逆多因坐草太早努力過多兒轉未逮或已破水其血必干致胎難轉若先露腳謂之逆先露手謂之橫法當以微針刺之使自縮入即服神應黑神散以固其血必自轉生養生方云倉皇之間兩命所繫不可不廣傳蓋贊黑神之功也或以鹽塗兒腳底抓搔之燒弓弦散治難產弓弦五寸銼碎箭干五寸銼碎上用燒作灰研為細散作一服以溫酒下其子即出未效燒服之羊肉湯寒月中產寒入產門臍下脹悶手不可犯此寒疝也若謂其有瘀血欲以抵當湯治之有曰非其治也可服張仲景羊肉湯二服愈兼治產後腹中疼痛虛勞不足裡急脅痛精羊肉四兩當歸二錢生薑一兩橘皮半兩上水三碗酒少許煎一碗分二服或少加蔥鹽亦佳如意膏治難產催生蓖麻子二七粒去殼研如膏丹砂半錢研細上一處和勻用油單一片圓如盞口大將藥攤之當臍下小腹間貼之再外以帶帛系令固候產罷並胞衣下畢速去之稍緩即脫人氣血此藥覺腹痛便宜用之貝母散治難產滑胎貝母一兩半去心秤槐子十月上巳日採之佳一兩半上為散每服三錢以熱水調下未生更服馬齒莧散治難產如覺痛甚服此散即覺平安馬齒莧常莧各曬乾三兩重午日採上為散每服二錢新汲水調服宜頻服之當歸湯治難產疑胎死腹中試驗死服之即出活服之即安及治產將至漿破血下腹中作陣疼痛漸至腰腳一名芎藭湯治難產用蛇黃以水煮研汁服治難產用豬槽上垢及土取一合和麵半升烏豆二十顆煮取汁服之治難產及已產胞衣不下或隨胎後血不下真珠研半兩伏龍肝一兩上為散每服二錢溫酒調下二聖丹治難產催生丹砂乳香各一兩上同研如粉用倒流水和丸如雞頭實大慢火焙乾產婦腹痛時用秤錘一枚洗淨濃研丹砂筆於秤錘周迴書金木水火土五字以炭火燒令通赤取出投於酒內將酒下藥一丸立產如是取死胎用水銀一皂子大蔥白一莖研如泥及當歸一錢同炒酒半盞作一服下藥一丸並酒飲盡不飲酒用酒少許和醋湯下一方用麝香酒調下貝母散治產難胎在腹中如兒並胎衣不出或胎斃貝母蒺藜子各四兩炒去刺等分上為末每服三錢米湯調下良久再服一方溫酒調下或熟水亦得相去四五里不下再服治難產催生飛生皮一枚燒灰蛇蛻一條燒灰上研為散以熱酒調下立生又方虎頭骨燒為灰兔頭燒為灰各半兩上研為散以熱酒下一錢便生又方金箔三十片硃砂一分上研令極細以臘月兔腦髓和丸如綠豆大不計時候溫酒下一丸催生散治難產牽牛子一兩微炒禹餘糧燒醋三次上為細散每服煎榆白皮湯調下二錢宜頻服又方烏牛糞一錢蓖麻子三顆去皮上都搗塗布上貼於腳心下產了即去急洗之勿令遲也治難產方取廁前已用草二七枚燒作灰水調服之粥飲調服亦得又方令夫唾婦口中二七過立出治難產及日月未足而欲產者用知母一兩為末蜜丸如兔屎大每服一丸痛不止更服一丸一法酒化下療產婦生理不順產育艱難用通明乳香一塊如皂子大為末覺腰痛時用新汲水一小盞入醋少許同調服扶立令產婦兩手捉兩燕坐婆飼藥飲之先令妊婦念醫靈藥聖三遍然後服之仍系扶行數步須臾坐草便生無痛楚如神開骨膏用乳香不拘多少五月五日午時令一人在臂背捧乳缽在凳上令一童兒以筆管透壁縫內逐粒從筆管中過入乳缽內研極細以童兒面北滴水丸如雞頭大每服一粒無灰酒吞下海上方用乳香硃砂等分為細末麝香酒調下如聖膏一名如聖散治難產兼治胞衣不下兼治死胎用蓖麻子七粒去殼細研成膏塗腳心胞衣速下十金散治難產用敗兔毫筆燒為灰細研為末生藕汁一盞調服立效若產婦虛弱及素有冷病恐藕汁動氣當於銀器內重湯調溫服之又方以大硃砂隨多少端午日曬至百日不得著雨如滿百日取研如粉用臘月兔腦髓和丸如綠豆大覺欲產粥飲下一丸良久便生其藥男左女右手中把出又方用臘月兔頭一枚燒為灰為細末蔥白煎湯調服二錢產又方臨欲產又未產吞赤小豆二十粒立效又方取梁上塵三指撮酒調服之或作丸一方治逆生救產難經日不生及不順生立效用雲母粉半兩以溫酒調服入口當產不順者即產萬不失一又一方將雲母粉澄過研細取一團如雞子大臨時無灰酒調下益母丸專治產難橫逆並安胎順氣用益母草其葉類大麻葉莖方花紫色白者不是五月採其葉莖陰乾不見日忌鐵器以石器磨為末煉蜜丸彈子大每服一丸臨產以童子小便溫送下若氣不順用木香參湯並艾醋湯送下治產難亦治催生用石燕一對令產母左右手持一隻合手不問生死胎即下治難產亦治胞衣不下神驗方以皂角末少許吹鼻中嚏子便下又方吞子二枚亦得療產婦難產催生用飛生皮令婦執之或蓋在背上帶毛亦效療臨產以榆白皮焙乾為末日三服方寸匕易產既產下兒身上皆有塗藥是其驗也治難產取貝母作末服之兼治胞衣不出取七枚末酒下療婦人產難上書紙曰坐為蒲臥為魚女屬母兒屬夫急急如律令即產婦吞之又書兩道兩手各執一道又方用土瓜根搗細羅為散醋湯調下二錢便生治難產兒不出用兔腦皮毛及頭並燒灰酒服治難產以弓弩弦縛腰及燒弩牙令赤內酒中飲之皆取法快速之義也治難產用滑石末與丹參蜜豬之脂為膏入其月即空心酒下彈丸大臨產焙服令滑胎易生治難產取真珠末一兩和酒服之立出治難產取羚羊角一枚刮尖為末酒調方寸匕一方將屑燒末酒服治難產取鱉甲燒末水服方寸匕立出治婦人生子不出用白狗血內酒中服之主下痢卒風痱伏日取之大補虛小兒驚癇止下痢治生產難用白雞距及腦燒灰酒服之治婦人難產取龍腦少許以新汲水調服立效治難產及胞衣不下即取一升人屎用薑蔥各一分煎三兩沸乘熱飲便下治產時取井花水半升頓一服立聖丹一名立聖鶴頂膏治產危急者用寒水石四兩內二兩炭五升煅通赤取出同生者研細入硃砂同研如深桃花色每用二分井花涼水調糊用紙花剪如杏葉大攤藥貼臍心干再易三過三上便產橫逆惡候死胎不下並治神驗寒水石非方解石也即今人謂之軟石膏者是也又法用雞子清少許同調合時須極至誠勿令雜人及雞犬見治產育艱難或一歲一產者可以此少間之用四物湯每服三錢加蕓薹子一撮於經行後空心服之又方用升麻葛根二兩加瞿麥干土牛膝栝蔞根豆豉炒各半兩為散分作八服空心一日二服合滓亦於每月經行後便服每服加蕓薹子一撮尤妙治難產催生上蛇蛻皮一條全者取端午日置於沙鑼中用紙一張水浸一日煎之後干收此紙有難產者剪三片紙如蛇形新汲水吞之立產或每片紙子內拌牛糞中豆與吞亦神效此男左女右手把出藥也此方端午合酸漿酒治難產用酸漿草挼自然汁每服半盞暖酒半盞調之頓服立出治難產方上吞大豆三枚至七枚立產又方上於臨月帶海馬子一枚良治難產胎衣不下方用大麻根三本以水一升煮取三合頓服之立下又方上令人含醋噀面悶即解亦治產乳暈絕療產難歷日氣力乏盡不能得生此是宿有病也雖有對症之劑倉卒亦可單吃方取馬銜一枚覺痛即令左手持之催產蠶蛻散方用蠶蛻紙一大張燒作灰研以酸漿草爛搗絞自然汁三分許酒三分微暖調下一方溫水調服亦得雞子酒療難產二三日不下用雞子一枚去清或三枚亦得以苦酒半盞投雞子酒中飲之產催生馬齒莧酒方用馬齒莧搗絞取自然汁三分入酒三分微暖服之立瘥催生石燕子取石燕子以童子小便三分摩取自然汁微暖酒下赤小豆七粒立產千錘草散療難產取鑿柄入孔里者燒末酒服之立下一方燒灰淋汁服治母已死兒子不出方但以水銀如彈丸格口內喉中捧起令下食頃又捧令起子便落又方搗菖蒲根絞取汁一二升灌口中此亦母生子死驗治日月未至而欲產者方取夫衣帶五寸燒作灰酒服立下又方取全蛇蛻一條欲痛時以絹袋盛繞腰治產難取蓖麻子二枚兩手各握一枚須臾立下治產難橫生逆生胎死胞不出方上破雄雞肋以手探取肝酒漬之須臾出肝但以飲酒入口不覺生產一方雞肝一具切以酒一盞煎六分去肝分二服治產難數日不出極困欲絕者秘方取雌烏雞令走二時許捉取刺左翅下取血又刺血門取血以醇酒一小盞和血內真丹末方寸匕攪勿令凝服之投杯即活不下亦佳治產難用本年曆頭剪一臘月三十日一行如小盡用二十九日一行卻剪為三段記定上中下作三丸依上中下三次水吞下即產治產時困悶以冬葵子一合水二升煮取半升去滓頓服之少時便產通靈散正產催生緊卷蛇蛻全者一條以蚯蚓泥裹之燒赤為末入些藥末相助酒調服若經行不產然後用此一方先覺熱悶又以新汲水調白蜜服之治產時子但趨穀道者方以熬鹽熨之自止又方搗清石末溫酒下一錢立效治兒在腹中哭以多年空屋下鼠穴中土一塊令產母服之即止又方治產時子但趨穀道者方取桃仁分破書一片作可字一片作出字依前還合令母吞之便下即此是天尊法神驗催生桂膏貼足方桂去粗皮為末雄黃末一錢上以蓖麻子三七枚去皮爛研入二味同研如膏紙上攤於兩足心貼之才產訖急去藥催生聖散子方黃蜀葵子二七枚赤小豆七枚生用上同研細童子小便三分調頓服立下一方無赤小豆聖功散治難產橫生倒長困頓不省人事兒死腹中用蜀葵子陳者不拘多少為散每服三錢酒調下如口噤斡開灌之無子用根銼碎煎汁濃滑冷服井水調服亦得如人行五七里路不來再服即分娩矣順生散治生產不正及難產者山茵陳仙靈脾各等分上件為細末每服三錢童子小便並酒共半盞溫酒下治產難數日欲死書奏作兩行字凡二十字文曰帝乙生子司命勿止即出其胞及保其子無病其母封其中央以朱印之令產婦持之甘草散預服散令易生母無疾病未生一月日前預服過三十日行步動作如故兒生墮地皆不自覺方見本門數日不產類治婦人難產令易產以海馬與產母帶之於身神驗不下臨臥燒末飲服亦可手握之枳殼散治妊娠令易生枳殼甘草糯米各等分右同炒為末米飲白湯調下一日之中三五服不計時候治令子易產方用鼺鼠飛生一枚槐子故弓箭羽各十四枚合搗丸桐子大酒服二丸令易產也又方用舂杵頭細糠燒末水服方寸匕又方用蓮花一葉書人字吞之立產治產婦臨蓐服之令兒易生取鼺鼠皮毛以與兔頭燒灰末酒下飛生丸療婦人易生產取蛇蛻皮著衣帶中鑑鼻系衣帶臨欲產時左手持馬銜右手持飛生皮令易產暑月中產有盛暑中產三日發大熱其脈虛疾而大惡露不行血攻心狂言叫奔走拿足不住乾荷葉生地黃牡丹皮上濃煎湯調服蒲黃末二錢一服即定兒即下遂安妊娠食物無度口饜甘肥既飽便睡以致胞厚胎肥臨月難產湖陽公主妊娠七八個月服效方盆弦枳殼一兩去瓤麩炒黑色甘草粉大者炙半兩上為細末空心沸湯點服勿登高廁原有胎寒腹痛休服催生奪命丹牡丹皮枳殼赤芍藥各一錢蟬蛻二錢青皮阿膠炒甘草炙五加皮蕓薹子貫眾蠶蛻紙火炙焦各半錢花蕊石半錢乳香一字計九錢一字細末煉蜜丸如彈子大臨坐草細嚼棗湯下治婦人產時忽衣下遲既產後復起早傷風吐瀉不止散吳茱萸防風羌活肉豆蔻黃橘皮藿香川芎蒼朮乾木瓜各一分官桂半兩當歸一兩上為細末每服三錢水一盞棗一枚姜二片同煎取九分空心連滓服一方黃金散詩曰黃金結實似粟米細研酒調五十粒靈丹功效妙如神難產之時能救急上取油菜子研細酒調服催生及難產橫逆水銀二錢黑鉛一錢銚內熔汁投水銀結沙上用熱絹巾紐出水銀細研汗衫紐作丸子如綠豆大臨坐草時丁香水吞下一二丸立效仍須敬仰又法先脫產婦常著衣一件蓋灶頭免胎衣不下之厄又法偷剪鍾馗左腳燒灰水下又法尋左腳舊草鞋燒灰挑三錢水下又法不作聲將花錢倒提廁頂禮倒燒急回上法用一二神效不可不作治難產密以淨紙書本州三十太守姓名燈上燒灰湯調下即產此雖厭勝頗驗走馬催生丹治產難危急橫生逆產子死腹中胎衣不下一丸可治十人雄蛇蛻一條首尾全者樹上蛻者是雄不然只取中間五寸燒煙欲盡急速取出用瓷器盆蓋於地上周圍用濕土圍之良久取出為末光明辰砂一兩研麝香研一錢右二味研極細以桃柳嫩苗各七莖如無取皮須是向東方妙取向東方者苗與硃砂麝香同研細卻入蛇蛻灰又研勻糯米飯丸如胡艽大硃砂為衣曬乾難產者淡醋湯吞下一丸不久產下便於兒手內取丸藥男左女右手中把出救命抵聖丹治產難危急辰砂有鏡面者半兩細研滴乳香半兩別蓖麻子麝香當門子真者半兩研真角屑一錢干細研黃葵子一合慢火炒磁石半兩引得針者千里及洗淨焙燒灰存性別研千里及向東方死草中尋舊草鞋一雙須左右腳全上件於乳缽中用缽捶研極細至勻熔真蠟入藥和令得所入臼杵五百數就香菸上丸如梧桐子大每遇婦人就產發覺肚痛時取順流水半盞入無灰酒吞下一丸良久分娩於男左女右手中取所服之藥以乳香湯洗油紙裹埋地中三日取出安靜處可以活三人衣不下用流水抱雞子窠中洗下盛半盞水入溫酒少許吞下立愈如產難急橫倒不正眼唇黑指中青死胎在腹用炒黃葵子一合研碎溫酒調一丸立效如見胎往來辰砂湯服一丸合時忌雞犬婦人生人丸時念北方黑帝大逞神通靈丹入口男女速生治逆生便產須知針法常用小絹針於兒手足心針入一二分三四刺之以鹽塗上輕輕送入兒得痛驚轉即縮當回順鹽塗足底又可急搔之以鹽摩母腹上治產難用古城桂木煮湯服主難產搗益母草取汁七大合煎半頓服立下無新者以乾者大握七合煎服主難產取廁籌燒取熱氣蒸上主婦人難產用郎君手與產婦手把之便生極有驗也治難產墨一寸末水服之立產治婦人產難取銅弩牙燒赤內酒中飲汁古者彌勝治婦人生女不出以枯蟬燒灰服之治婦人入月而欲產取梁上塵灶突煤二味合方寸匕酒服治婦人產難並逆橫產用銅秤錘燒赤酒淬服治難產取水龜令產婦戴之亦可臨時燒灰酒下此物出南海如龜長二三尺兩目在側旁主婦人難產以含生草產婦口中含之立產亦咽其汁主邪氣產難絕傷及主癮疹牙齒諸風疾春初採嫩槐葉並可食之治難產方用赤小豆生吞七枚出若是女二七枚佳治難產用彈丸土末一錢以熱酒調服之大有功效也數日不產附論夫難生產者緣胎氣所成子在胎中每食母血食血有餘遂成塊俗呼為兒枕子欲生時血塊先破遂為散血散裹其子胎伏熱故有難產更有少年未經生產嬌養富貴說聽異端月數將滿才覺腹痛轉動便相告報旁人擾擾產婦驚怖不安心氣蓄結是故難產要知月滿足不得妄憂有或覺腹痛之時但令老孃安存莫遣人多無使擾亂腹痛稍頻衣破將行須臾即生也依此將護必免難產之厄方甘草散一名大豆卷散治妊娠數日不產滑胎易產甘草炙一兩黃芩去黑心大豆黃卷炒乾薑炮桂去粗皮吳茱萸湯浸各半兩糯米淘淨麻子仁各一合上為散每服三錢溫酒調下若臨月每日頻服一方有大麥糵無糯米大黃丸治妊娠數日不產養胎易生大黃炒二兩枳殼去瓤芍藥各一兩芎藭三分乾薑炮厚朴姜炙半兩白朮杏仁湯浸去皮尖雙仁麩炒吳茱萸湯浸去涎炒半兩上為末煉蜜和勻丸梧桐子大每服二丸溫酒下不拘時候滑胎當歸散治妊娠數日不產當歸焙一兩麻子仁一合吳茱萸湯浸去涎干乾薑炮知母桂去粗皮黃芩去黑心甘草炙各半兩大豆炒去皮糯米各一合上為散研細每服二錢空心溫酒調下漸加至三錢若欲作丸即煉蜜丸如梧桐子大溫酒下二十丸治難產數日不生子死腹內方取真川椒二斤分為二分蒸之以布裹更互熱熨產婦臍腹中死胎便出治產經數日不出或子死腹中母欲死以瞿麥煮濃汁服之麥門冬丸治妊娠數日不產益氣滑胎麥門冬去心芎藭厚朴去粗皮姜炙枳殼去瓤麩炒芍藥赤茯苓去皮各二兩大黃炒半兩檳榔煨三枚訶黎勒煨取皮五枚上為末煉蜜和塗酥為劑搗熟丸如綠豆大每服二十丸空心酒下瞿麥湯治妊娠數日不產滑胎易產瞿麥穗去根銼榆白皮木通各二兩冬葵子揀淨一合滑石一兩上為散每服四錢以水一盞半煎至七分去滓空心溫服葵子湯治妊娠數日不產自由體性冬葵子炒一合滑石碎瞿麥去根各一兩丹參一兩半上為散每服四錢水一盞半煎七分去滓下牛酥白蜜各半合再煎至六分食前溫服入月預服治妊娠數日不產令易產方以銅弩牙一隻燒通赤投半盞食醋中臨產服之一方酒服如聖散治妊娠數日不產用生過喬紙燒灰研為細散每服二錢溫酒調下不計時治婦人難產數日不下至危急者用官桂去粗皮銼碎略炒鐵器不妨碾為細末每服三錢白湯調下立產此藥須旋合乃佳加味芎歸湯治產五七日不下垂死者及主交骨不開者用川芎當歸各一兩自死干龜殼一個酥炙生男女者婦人頭髮一握燒存性共為散每服三錢水一盞半煎服屢效約人行五里生胎死胎俱下無自死龜殼鑽龜廢殼亦可催生防葵散治難產三兩日不產喘息不調腹內疼痛防葵一兩滑石三分硃砂一分別研冬葵子三分木通三分瞿麥三分榆白皮三分銼飛生皮一分燒灰上為散每服四錢水一中盞煎至六分去滓溫服治難產或經日三五日不分娩兼子死腹中方當歸三分微炒龜甲三分塗酥炙令黃搗末上先取產多者婦人發半兩燒為灰細研入當歸末以水一大盞半煎取八分後下龜甲末煎五七沸分為二服如人行四五里便服治妊娠臨月數日不產覺不安服藥令兒手持出方照子鼻八枚燒令內醋中九次為末槐子一兩末上和研令勻煉蜜為丸梧桐子大取朱粉著銅器中搖動使丸令赤七月七日午時合之每服以東流水下三丸神驗治三日不產方取鼠頭燒灰細研以新汲水調服一錢立效又方右燒龜甲成灰研新汲水調下一錢立效酒調亦可又方取門垠里土三指撮酒調服之又方取羚羊角屑燒研為末酒調一錢服治七八日不產至困方以黃明膠一兩火炙黃焦用好酒一大盞煎不住手烊膠約一二十沸內新生雞子一枚打破鹽一錢相和頓服之立產或令婦人坐倚物上伸腰大口作二次服又方取顱鷀頭手捉之甚驗又方取益母草搗汁三合服之立下如無生者乾者一握以水一大盞煎取半盞去滓溫服治產經數日不出或子死腹中母氣欲絕瞿麥六兩通草桂心各三兩牛膝四兩榆白皮一升上㕮咀水九升取三升去滓分三服治數日不產胎上衝心欲悶絕方榆白皮滑石當歸車前子益母草以上各半兩上為細末煎生薑小便調下二錢治經日不產蒲黃地龍陳皮各等分上將地龍洗去土於新瓦上焙令微黃各為末三處貼之各抄一錢新汲水調服立產牛酥散治數日不產胎上衝心欲死牛酥半兩冬葵子炒一合滑石三分上以二味為末和牛酥置生絹袋內盛之用酒一升煎七合去滓袋之令溫每服半盞一二服如未下更服之茱萸湯治婦人數日不產下體已冷無藥甚窘以椒橙茱萸等葉濃煎湯可下手則和臍腹人門處皆淋洗即刻氣溫血行遂產或以紅花數兩速濃煎湯扶女於凳上以綿帛蘸水遏之人以水洗帛上兩頭仍以器盛水又暖又淋久而蘇遂生男子蓋遇嚴冬血冷凝滯不行溫則行矣血行則產行見也治難產三日不出以車軸脂吞大豆許兩丸一方車脂書兒足底作出字一方用酒又方燒藥杵三五遍令赤內中酒飲之立產鐵器亦得又方上燒大刀鐶以酒一杯沃之頓服即出救死不分娩者逆產附論夫逆產者蓋因妊娠初覺腹痛產時未至驚動傷早兒迴轉未竟便用力產之即令逆也又或安產之處及坐臥須順四時方面並避五行禁忌若觸犯者多致災禍方烏金散治橫生倒產子死腹中胎衣不下當歸酒浸沒藥生乾地黃蒲黃生用芍藥炒紅藍花各一兩鯉魚鱗臘月者佳桂各二兩血餘小兒胎髮真者二枚上將血餘鯉魚鱗二味用銷銀鍋子先以炭火燒灰沒藥研余為散和勻每服二錢溫酒調下不拘時滑胎煎治難產經三日或橫倒不出垂死瞿麥取穗一兩酥五兩滑石葵子各三兩黑豆皮一合白蜜四兩牛膝去苗三兩上除酥蜜外為末將酥蜜煉熟入諸藥末及乳香五兩煎以瓷器盛每服半匙溫酒或湯化下不拘時候救生散治孕婦逆生其證孕婦欲產時遇腹痛不肯舒伸行動多是曲臥腰眼忍痛其兒在腹不能轉動故腳先出謂之逆生須臾不救則子母俱亡矣烏蛇蛻一條蟬蛻二七個血餘一個即胎髮上燒灰每服二錢溫酒下並進二服仰臥霎時一手抓兒手心足心令轉其兒即時順生子母俱活用槐角子尖刺小兒腳心尤妙治逆產法大蒜七顆去皮生薑半兩蔥白去青三十莖各碎上置在一盆子中以百沸湯五碗乘熱投於盆中速扶產婦於盆上坐候冷易之凡三易則胎正又方取蒲黃用水調塗兒足心底又方取丹砂末半錢蜜調塗兒足底又方取牛齝涎絞以溫酒和服之治逆生方以鹽塗兒足底一方用鹽粉和塗又急爪搔之並以鹽摩產婦腹上即順治逆產橫生不出手足先見者以蛇蛻皮燒為末服一刀圭面向東酒服即順一方豬膏和丸服又方取蟬殼二枚治為末三指撮許溫酒服之一方用蟾蜍二枚為末酒服又方以手中指取釜底墨交畫兒足下即順生催生如聖散用黃蜀葵花不以多少焙乾為末熟湯調下二錢或有漏血胎臟乾澀難產痛極者並進三服良久腹中氣寬胎滑即時產下如無花時只用葵子爛研半合以酒調濾去滓溫過頓服亦治打撲傷損如胎死不下煎紅花溫酒調下一方紅花為末入麻油順流熟水調下一方用葵子一味研末或研硃砂為衣每服四十九粒溫酒下濟生兼服紫蘇飲或黑神丸亦佳又歌云黃葵子炒七十粒細研調酒濟君急若使臨危產難時免得全傢俱啼泣治婦人倒產上麻蕡吞二七枚即止治倒產難產用原蠶蛾煉末飲服三錢療逆產以真丹刀圭塗兒腋下治逆死及子死腹中取車輪上土以三指撮酒調下又方取彈子二枚搗羅為散溫酒調服二錢又方取甑帶燒灰研散溫酒調服二錢又方取晚蠶子紙一幅燒灰研末米飲調服暖水亦得又方取夫十指甲燒灰研末以溫酒調服又方取車前子搗為末溫酒調服二錢保安散治因漏胎胞干難產橫逆不順用蟬蛻不拘多少燈上燒存性研入真麝香少許臨時每半錢淡醋湯調下治生產不順手足已冷口噤欲死方以朱書兒左足下作千字右足作黑字手出者亦效又方用當歸銼微炒搗末酒調下二錢又方以菟絲子搗末以溫酒調下一錢效一方用米汁服又方以酒調灶突塵二錢服之效一方以苦酒服一方用灶屋上墨以酒煮一兩沸取汁服治倒產子死腹中方取酸醋一升格口灌子出艾葉湯治逆產及子死腹中用大麻仁淨揀研爛半兩水二盞同煎至一盞去滓溫服酸漿飲治橫產倒生安胎用五葉酸漿草不拘多少取自然汁半盞酒半盞染胭脂末半兩和勻溫飲之未效再服之又方取夫陰毛二七根燒以豬膏和丸如豆大水吞下兒手即握出神驗治橫逆產理不順手足先出或子死腹中以伏龍肝細研每服一錢酒調服兒頭戴出妙更用搽產母臍中亦效又方治產時子但趨穀道者方腹肚痛兒數日不下者或倒生見兒腳於上書八人名即卻順產極妙治逆產以釭中膏畫兒腳底即正治婦人橫逆產以古文錢二十文燒令赤投酒中服之立產治逆橫生瘦胎妊娠產後損月候不調崩中用百草霜白芷等分為末每服二錢童子小便醋各少許調勻更以熱湯化開服不過二服即產
