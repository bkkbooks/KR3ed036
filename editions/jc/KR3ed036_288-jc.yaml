body:
  text: 卷二百八十八癰疽門癰疽發背作寒熱附論夫發背寒熱者由寒氣客於經絡折於血氣血澀不行乃結成瘡腫又諸陽氣臻集寒化為熱熱盛則肉腐為膿此皆臟腑壅滯毒氣不得宣通故令寒熱也癰疽發背作寒熱癰疽發背病為急切然五臟腧皆在背發於何部宜精詳之其作也邪毒內鼓寒熱交攻氣血壅滯陰陽相干故令人身熱而惡寒也當以療癰疽之法治之李氏云近時有數人病背疽服前方藥未安之間遍身寒熱或先寒後熱或先熱後寒或連日作或間日作必先嘔痰然後寒熱寒熱解大汗出然後止時醫多欲用柴胡牡蠣止汗之藥又有以為瘧疾欲下常山飲子愚力辨云背疽之疾不可專以為有熱亦有氣虛而得之亦有因怒氣並氣血凝滯而得之所以發寒熱者先感寒邪脾氣不正痰盛而有此證若下柴胡必瀉肝母既虛而又瀉其子牡蠣澀氣氣血又不榮運又服澀氣藥常山飲子吐痰大損脾胃用藥如此可謂誤謬愚但令服家傳不換金正氣散祛寒邪正脾氣痰飲自消寒熱不作兼服排膿內補散以退熱方地黃丸治癰疽發背時作寒熱疼痛不食解毒生乾地黃焙二兩黃耆銼栝蔞根黃芩去黑心麥門冬去心焙各一兩半桑螵蛸十五枚銼炒大黃銼炒人參梔子仁肉蓯蓉焙前胡去蘆頭升麻芍藥知母焙王不留行各一兩遠志去心敗醬地脈草各半兩干棗一十五枚湯浸去皮核以蜜一升和蒸成膏上為末入棗膏和丸如梧桐子大每服三十丸加至五十丸空心米飲下日晚再服人參散治發背腫毒寒熱疼痛口乾心燥人參去蘆頭芎藭各一兩生乾地黃石膏各二兩甘草生銼知母各一兩黃耆一兩半銼黃芩一兩前胡一兩去蘆頭麥門冬一兩半去心赤芍藥一兩枳實一兩半麩炒微黃川升麻一兩半柏子仁一兩半上為散每服四錢水一中盞入竹葉二七片小麥一百粒煎至六分去滓不計時候溫服木通散治癰始發於背便生寒熱口乾心煩不得臥木通一兩半銼知母一兩半赤芍藥一兩當歸一兩生乾地黃一兩半川升麻一兩半黃耆一兩半銼枳實一兩麩炒微黃甘草一兩生銼赤茯苓一兩前胡一兩半去蘆頭麥門冬一兩去心黃芩五分芎藭一兩上為散每服四錢水一中盞入竹葉二七片小麥一百粒煎至六分去滓不計時候溫服枳實散治發背結硬氣盛或經一月不已作苦寒熱枳實三分麩炒微黃芎藭三分生乾地黃三分赤芍藥三分木通三分銼黃芩三分前胡三分去蘆頭知母半兩赤茯苓半兩細辛半兩人參半兩去蘆頭甘草半兩生銼黃耆半兩銼上為散每服四錢水一中盞煎至六分去滓不計時候溫服五香散升降諸氣宣利三焦疏導壅滯發散邪熱治陰陽之氣鬱結不消諸熱蘊毒腫痛結核或似癰癤而非使人頭痛惡心寒熱氣結柴胡煎治熱毒癰腫血不散初覺憎寒乾渴四肢煩悶能令速消柴胡去苗一兩知母焙一兩木通一兩半淡竹葉一百片瞿麥穗一兩連翹一兩防風二兩大黃生二兩細銼生麥門冬汁三合湯成下生藕汁三合湯成下甜硝四兩湯成下上先將八味銼如麻豆大以水三升煮取一升半去滓下甜硝令散次入麥門冬藕汁等共分為八服空腹兩服以溏利為度余藥食後緩緩服之漏蘆散治發背及一切瘡毒攻衝寒熱大腸秘澀除煩熱解毒漏蘆白蘞黃芩麻黃去根節知母枳實麩炒微黃川升麻犀角屑赤芍藥各一兩川大黃二兩銼碎微炒甘草三分上為散每服四錢水一中盞煎至六分去滓不計時候溫服犀角散治發背癰疽一切瘡腫未穴時攻刺疼痛或發寒熱渴燥不食解毒勻氣犀角鎊一分人參大黃銼炒栝蔞實焙甘草炙銼各半兩葛根銼赤茯苓去黑心檳榔銼木香各三分芎藭一兩上為散每服二錢空心晚間粥飲調下以瘥為度麥門冬散治發背壅盛作寒熱疼痛不止麥門冬一兩去心前胡一兩去蘆頭黃芩一兩川升麻一兩遠志一兩去心黃耆一兩銼赤芍藥一兩生乾地黃一兩栝蔞根一兩當歸半兩上為散每服四錢水一中盞入竹葉二七片小麥一百粒煎至六分去滓不計時候溫服黃耆散治發背熱毒氣盛作寒熱往來疼痛不止黃耆一兩銼川升麻一兩犀角屑一兩赤茯苓三分麥門冬三分去心人參三分去蘆頭赤芍藥三分石膏二兩生乾地黃三分藍葉半兩上為散每服四錢水一中盞入竹葉二七片煎至六分去滓不計時候溫服真方不換真金正氣散治疽瘡未安之間遍身寒熱或先寒後熱或先熱後寒或連日作或間日作必先嘔痰而後寒熱大汗出然後止服此去寒邪正脾氣痰飲自消寒熱不作一法用川芎半兩不用人參兼治四時感風寒冷熱之氣中傷冷物或傷瘴瘧之疾痰盛頭痛常服能闢山嵐瘴氣四時疫癘蒼朮米泔浸半日炒令黃色大厚朴紫色者去粗皮切薑汁炒各二兩粉草炙一兩真橘紅水洗淨去白兩半以上四味再入鍋內炒去火毒半夏湯洗七次薑製藿香葉人參去蘆木香去蘆白茯苓去皮各一兩一方有川芎上銼散每服三錢水一盞半生薑三片棗二枚煎至八分入鹽少許溫服無時一方最能發出風毒可與排膿內補散並行若瘡陷不發多加辣桂當歸升麻湯治癰疽始作堅硬皮色紫赤惡寒壯熱一二日未成膿者升麻連翹大黃銼炒生地黃切焙炒木香各一兩白蘞玄參各三分上粗搗篩每服五錢水二盞煎至一盞入芒硝末半錢去滓空心溫服取利為度未利再服人參散治發背未成膿身體寒熱人參當歸焙密陀僧煅沒藥研雄黃研各半兩丹砂研一錢栝蔞實二枚去瓤取皮子生用上為細散每服二錢用甘草煎湯放溫調下日三羊髓膏治癰疽始作便敗壞發寒熱疼痛及瘭疽浸淫廣大焮赤黑爛成瘡一名甘草膏羊髓甘草銼搗各二兩胡粉研大黃銼搗各二兩豬脂半斤上先熬脂髓令沸下甘草大黃煎候甘草黑色綿濾去滓入胡粉以柳篦攪勻瓷盒盛每日三五度塗敷瘡上以瘥為度神效托裡散治癰疽發背腸癰乳癰無名腫毒焮作疼痛憎寒壯熱類若傷寒之證黃耆去蘆用鹽水炙忍冬葉各五兩當歸酒浸去蘆一兩八錢粉草炙八錢上為細末每服二錢以酒一盞半煎至一盞若病在上食後服病在下空心服少頃再進留滓外敷未成膿者內消已成膿者即潰老少虛人皆可服之黃柏散治發背未潰身體寒熱亦治癰癤黃柏煙燻壁土多年者各三二兩上為細散每服二錢茅根煎湯調下仍用生薑汁調藥敷之苦茄散治發背未潰身體寒熱苦茄種甘草炙各一兩上為細散每服二錢甘草湯調下一方酒調服癰疽虛證寒戰方用明乳香研細半兩每服一錢熟水調下戰發於肝乳香著肝而溫之寒戰隨止癰疽發背發渴附論夫癰疽煩渴之證由熱氣熏灼五臟津液不足於內也蓋營衛氣血腐化為膿血則津液不得不耗津液既耗熱氣復盛則心神內煩而引飲不止然或為嘔噦下利者以五臟虛熱飲水過度氣不足以勝之故氣逆於上則嘔噦腸胃不固則變下利也此屬癰疽惡證凡病疽疾之人多有既安之後忽發渴疾而不救者十有八九疽疾將安而渴疾已作即合便服加減八味丸既安之後而渴疾之證未見亦合先服此藥以預防其未然若疾形已見卒難救療癰疽後合服補藥若用峻補之藥則發熱又況癰疾人安樂之後多轉作渴疾不可治療當預服加減八味丸如能久服永不生渴疾血氣加壯未發疽人或先有渴證亦合服此藥渴疾既安疽亦不作癰疽作熱發渴毒氣炎盛急服神仙追毒丸每日一服取下惡毒次服清膻湯萬全散五香連翹湯六味車螯散千金漏蘆湯皆可選用然下利以後尚渴不止卻用生津補氣秘傳金粉散人參黃耆散內補散之類津液生血氣實渴自止方地黃湯治癰疽虛熱大渴生地黃芍藥升麻木通甘草炙大黃銼微炒知母赤茯苓去黑皮人參當歸焙各一兩黃芩去黑心黃耆各一兩半栝蔞根二兩前胡去蘆頭一兩半小麥半升上㕮咀如麻豆每服五錢用水一盞半入竹葉七片煎至八分去滓空心溫服如小便利除木通大熱加人參晚再服以瘥為度連翹湯療患瘡腫而渴方連翹黃芩干藍大黃各三兩蜀升麻枳實炙芍藥玄參白蘞甘草炙羚羊角屑通草黃耆各二兩上切以水八升煮取二升半分三服利一兩行後更服去大黃干藍即不利忌海藻菘菜麥門冬散治發背及乳癰赤腫疼痛體熱大渴麥門冬一兩半去心黃耆一兩半銼黃芩一兩半川升麻一兩知母二兩甘草一兩生銼玄參一兩栝蔞根二兩赤芍藥一兩當歸一兩赤茯苓一兩上為散每服四錢水一中盞入生地黃半兩淡竹葉二七片煎至五分去滓不計時候溫服犀角散治發背及一切瘡腫未穴攻刺疼痛或發熱渴躁不食犀角屑一兩人參三分去蘆頭知母三分赤茯苓三分麥門冬一兩去心地骨皮一兩黃耆一兩銼甘草一兩生銼葛根三分銼栝蔞根三分川大黃三分銼碎微炒蘆根一兩銼上為散每服四錢水一中盞煎至六分去滓不計時候溫服竹葉湯治癰疽發背四肢虛熱大渴竹葉一握淨洗銼煎取汁三盞生地黃二兩黃芩去黑心人參芍藥知母甘草炙赤茯苓去黑皮各一兩升麻黃耆栝蔞根麥門冬去心焙各一兩半上除竹葉外銼如麻豆每服三錢以竹葉汁一盞入棗三枚擘破同煎至七分去滓溫服一日三服早晨午時夜臥各一服一方藥品內無竹葉汁只用竹葉煎湯名清膻竹葉湯以上方治癰疽熱盛焮腫作渴癢痛升麻散治發背及乳癰壅毒熱渴疼痛川升麻三分犀角屑半兩木通三分銼黃芩三分玄參三分麥門冬三分去心生乾地黃一兩赤芍藥半兩甘草半兩生銼葛根半兩銼蘆根三分銼上為散每服四錢水一中盞入黑豆一百粒淡竹葉二七片煎至六分去滓不計時候溫服蘆根散治發背一切癰癤身體煩燥熱渴疼痛蘆根銼連翹玄參射干川升麻梔子仁赤芍藥羚羊角屑各一兩寒水石二兩甘草三分生銼生乾地黃二兩上為散每服四錢水一中盞煎至六分去滓不計時候溫服麥門冬湯治諸癰腫臟腑壅滯口乾腳冷寒熱頭痛嘔逆不下食煩渴引飲生麥門冬去心焙二兩葛根銼蘆根生犀角鎊石膏碎葳蕤薺苨芍藥淡竹葉切甘草炙銼各二兩上粗篩搗每服五錢水一中盞半煎至一盞入硝石一錢去滓溫服不拘時一方用竹瀝半合紅雪一分更煎三兩沸去滓空心日晚溫服清心內固金粉散又名金花散辰砂別研白茯苓去皮人參去蘆各三分綠豆粉四兩研雄黃一分研甘草三分朴硝半兩別研白豆蔻仁半兩腦子麝香並研各一分上以參苓白豆蔻為末入研藥令勻每服一錢半蜜湯調下無時候生乾地黃散治發背壅熱煩渴不思飲食通治諸瘡大渴一名竹葉黃耆湯生乾地黃二兩黃耆一兩銼甘草半兩生銼麥門冬一兩去心赤芍藥一兩人參一兩去蘆頭黃芩一兩石膏二兩當歸三分半夏半兩湯浸七遍去滑上為散每服四錢水一中盞入淡竹葉二七片生薑半分煎至六分去滓不計時候溫服一方有川芎無生薑解毒散治發背熱毒焮腫疼痛煩渴犀角屑三分川升麻半兩梔子仁三分木通一兩銼麥門冬三分去心枳殼三分麩炒微黃去瓤甘草三分生銼葛根三分銼地骨皮一兩上為散每服四錢水一中盞入生地黃一分豉半合煎至六分去滓不計時候溫服黃耆飲子治發背熱渴疼痛黃耆一兩銼栝蔞根一兩赤芍藥半兩麥門冬半兩去心玄參半兩甘草半兩生銼赤茯苓半兩川升麻半兩當歸半兩上藥細銼和勻每服半兩水一中盞入淡竹葉二七片煎至五分去滓不計時候溫服黃耆湯治癰疽熱盛口燥發渴除熱止渴黃耆栝蔞根生乾地黃焙升麻各一兩梔子仁一兩芍藥一兩半黃芩去黑心一兩麥門冬去心焙一兩半上銼如麻豆每服五錢水一盞半煎至八分去滓空心溫服日晚再服黑附丸治氣虛血弱老人疽發後四肢倦怠無力或燥渴好飲水不止者黑附子一個九錢煨鹽水浸白茯苓五錢去皮茴香一兩炒川楝子一兩去皮核破故紙一兩炒交趾桂五錢去粗皮大當歸一兩去尾熟地黃淨洗切酒炒一兩上為末煉蜜丸如梧桐子大每服三十丸空心鹽湯或鹽酒下如覺脾虛食減亦用參苓白朮散兼服加減八味丸治腎虛津乏心煩燥渴或先患癰疽而才覺作渴或有癰疽而無渴皆宜服此大地黃洗焙乾卻用酒灑飯上蒸七次焙乾秤二兩重山茱萸去核取肉焙稱一兩真山藥炒一兩肉桂去粗皮淡者不用厚者不見火取末半兩牡丹皮去心澤瀉水洗切作塊酒濕蒸五次切焙真北五味子去枝梗微炒令透別為末一兩半白茯苓去皮焙以上各八錢上為細末煉蜜丸如梧桐子大每日五更初未言語前用溫酒或鹽湯吞下三四十丸神效有人病疽疾未安而渴作一日飲水數升者諸醫盡用木瓜紫蘇烏梅人參茯苓百藥煎等生津液止渴之藥服多時渴愈甚數日之後茫無功效愚用此藥服之三日渴止遂久服之不特渴疾不作氣血益壯飲食加倍強健過於少壯之年又有一士人亦患渴疾治療累載不安服此不半載而痊何也蓋其疾本起於腎水枯竭不能上潤是以心火上炎不能既濟煎熬而生渴醫者多用醒脾生津止渴之藥誤矣今八味丸降其心火生其腎水則渴自止矣其中真北五味子最為得力能生腎水平補降心氣大有功效矣李氏云凡病疽疾之人多有既安之後忽發渴疾而不救者十有八九疽疾將安而渴疾已作即便合服加減八味丸既安之後而渴疾之證未見亦合先服此藥以預防其未然若疾形已見卒難救療癰疽後合服補藥若用峻補之藥則發熱又況癰疾人安樂之後多轉作渴疾不可治療當預服加減八味丸如能久服永不生渴疾氣血加壯未發疽人或先有渴證服此藥渴疾安疽亦不作梅花飲子初作有熱煩渴便服此截定防毒內攻忍冬四兩栝蔞根葛根川芎烏梅和核生綿黃耆蘇木各一兩赤皮甘草生一兩上為粗末分作四服每服用水酒各一升同入瓷瓶內慢火熬十分去三分每服一小盞無時服此藥如毒已破其熱漸退即常服如患初作未破此藥性雖和緩大能去熱毒托裡黃耆散治口乾微熱人參甘草各半兩白朮茯苓芍藥桔梗各一兩黃耆二兩上為粗末每服三錢水一盞煎至七分去滓稍熱不拘時候六味車螯散內消癰疽取下惡毒首初便服車螯四個黃泥固濟火煅通赤出火毒一宿研為末燈草三十莖甘草節二錢炒栝蔞一個去皮用仁新瓦上炒令香上將栝蔞燈心甘草節為粗末只作一服用酒二盞煎耗半碗去滓入蜜一大匙和勻每用酒八分盞車螯末二錢膩粉少許調勻空心溫服取下惡物黃涎為效以上諸方宣利拔毒之藥可斟量輕重而用之萬不失一枸杞湯治發背癰疽熱渴悶亂枸杞枝葉五兩石膏末栝蔞根黃連去須甘草炙各一兩上㕮咀如麻豆每服五錢用水一盞半煎至八分去滓空心溫服日晚再服五味子湯治腎水枯竭運用不上致令口中乾燥舌上堅硬或如雞內金北五味子真者綿黃耆去蘆頭生用人參去蘆麥門冬去心各一兩半粉草炙半兩上㕮咀每服半兩水一盞半煎至八分去滓溫服無時候一日一夜五七服妙連翹散治瘡瘍癤腫一切惡瘡疼痛煩渴大便溏泄虛熱不寧連翹山梔子甘草防風各等分上為粗末每服三錢水一盞煎至七分去滓溫服不拘時候陳粟湯治發背乾嘔吐此因先患熱渴飲冷太過胃寒所致宜服溫脾平胃陳粟米微炒一合乾薑炮製半兩甘草炙四兩上㕮咀如麻豆每服五錢用水一盞半煎至八分去滓空心溫服日晚再服以瘥為度乾葛飲治發背作渴黃芩朴硝各五錢乾葛一兩上銼散每服三錢用枇杷葉去背上白毛淨洗同煎不拘時服凝水石煎方治發背癰疽發大渴口乾不可止凝水石石膏蜜各半斤上先搗二味石藥羅為末以水五升煎令稠即下蜜更煎成膏用瓷盒盛每日空心取一棗大含化津咽日五七服黃耆六一湯常服終身可免癰疽之疾仍大治渴疾補虛乏諸發愈後亦可服綿黃耆去叉蘆用箭竿者六兩一半生焙細銼一半用鹽水濕潤器盛飯上蒸三次焙乾銼細用粉草一兩一半生細銼一半炙黃卻細銼上為細末每服二錢早晨日午以白湯點當湯服若能飲初杯用酒調服尤妙一方用生者黃耆六兩甘草一兩㕮咀水煎常服古人以黃耆為羊肉者此也一方姜三片棗二枚煎空心服犀角飲子犀角屑三兩羚羊角屑三兩上以水八升煮取三升渴即飲盡更作之時熱恐壞懸著井底甚妙桑枝葉大治口乾取花桑枝一小升細切炒香以水三大升煎取二升一日服盡一法以花桑枝不以多少寸銼炒令香先以水於瓦罐中用文武火煮折一半去滓再入銀器內重湯煮再折一半或入少蜜亦可仙經云一切仙方不得桑枝不服出抱朴子常服療體中風癢乾燥臂痛腳氣風氣四肢拘攣上氣眼暈肺氣嗽消食利小便久服輕身聰明耳目令人光澤癰疽煩渴方參苓白朮散上以栝蔞根綠豆烏梅煎湯調下諸發附論夫五發者謂癰疽生於腦背肩鬢髯是也大概論之分為三等一者疽也二者癰也三者癤也夫疽初生如黍米大癢痛有異誤觸破之即焮展四畔赤腫沉悶牽引脅肋疼痛數日之後漸覺肌膚壯熱惡寒煩渴眩暈侵展熛漿汁出積日不潰抑之則流血者謂之發背疽也其發於腦者為腦疽也其發於鬢眉髯者以類呼也又有初生其狀無頭腫闊三四寸始覺注悶疼痛因循數日皮光微軟者甚則令人發熱惡寒頭痛煩渴者謂之發背癰也又有初生一頭色浮赤而無根腫見於皮膚之間大小一二寸者癤也三者之候惟疽最重此疾初生皆由滋味與厚衣衣服厚暖則表易招寒滋味過多則五臟生熱臟腑積熱則血脈不流而毒氣凝滯邪氣伏留熱搏於血血聚則肉潰成瘡淺則為癤實則為癰深則為疽矣亦有因服金石發動而患此疾者亦有平生不服金石藥而亦患此疾者蓋由上祖曾服餌其毒氣流傳子孫此病初生認是疽則宜速治之若氣實之人急服五香連翹湯漏蘆湯若年未五十少壯實者可服五利大黃湯化毒丸取通利臟腑一二行瘡頭上用追毒散之類貼溫熱膏劑更溻腫湯潰毒湯淋溻之如此調治以待膿成以前不可以諸藥救療以安患人之心慎懊惱觸著至膿成敗潰宜服五香湯及內托裡散茯苓湯當歸托裡散之類渴不止者服竹葉黃耆湯乳香散勿為大熱服大黃朴硝苦寒之藥若因服利藥而利不止者死矣若瘡中惡肉未退膿水不快者即用追蝕之藥或鋌子紝之上用鹿角散以醋熬為糊貼之惡肉退去好肉漸生即用搜膿散翠霞散之類紝之若瘡中毒氣未盡慎勿早斂忌早上生肌之藥縱得平復必再發其間調理次第臨時致宜將護忌慎之法耳癰疽者乳石之疾多發於陽部故在背則發府俞之間在頭則發腦以頭者諸陽所會而足太陽之經絡腦故也然腦為髓海精血之所湊而腦戶風府啞門三穴不可妄行灸刺令人有喑啞之病灸刺猶不可況癰疽之所發乎古人謂五發之病背腦為重始發皮膚若黍米然赤腫旁焮耳項痛楚寒熱當急治之稍縱不治則毒氣深入銷鑠腦髓化為膿血不可及矣故經曰癰疽不得頃時回初發疽時一粒如麻豆大身體便發熱熱生疽處肉赤熱腫大而高多生疼痛破後肉色紅紫此為外發雖大若盆碗如用藥有理則全活必矣初發疽時不拘大小身體無熱自覺倦怠生疽處亦不熱數日之間漸漸開大不腫不高不疼不痛低陷而壞爛破後肉紫黑色此為內發未作之先臟腑已潰爛則不治矣復有心腎肺癰腸癰附骨疽證心癰者乃心經有熱或好飲酒或嗜熱物積聚成熱久而不散熏發於皮膚之外氣血不流凝滯而生雖曰原道頗險而實可治宜用托裡活血之劑攻出外來腫高不陷可保無虞若陷入里亦不可恃如不飲食急須扶脾能食瘡已破穿見肉膜亦未為害但要洗滌淨潔以生肉藥摻四畔自然而愈五發附論癰發此疾腫赤高起或長或大或在婦人乳旁上為血宮積滯氣壅血澀而成也內有膿血其病易治內有白膿其病難治疽發此疾初發腫赤堅硬毒氣在皮作熱百節疼痛虛渴不已不省人事破後出血如蠶多口出膿汁七日之後急用藥有鮮血難治癌發此病初發不寒不熱腫處疼痛紫黑色不破裡面壞爛二十以前者積熱所生四十以後者皆血氣兩衰須早為治十可全一二也瘭發此病初發四畔生牛唇黑硬疼痛二十以後四十以前皆積傷之毒入胃壅聚而成四十以後六十以前乃血氣不能通行壅熱積血得之出清水者難治痼發此疾發時渾身壯熱手足不遂憎寒頭痛虛渴多汗嘔逆四肢沉重五臟煩悶是其候若出米泔汁者難治方丹參膏療發背髮乳口已合皮上急痛生肉摩腕折丹參防風白芷細辛芎藭黃芩芍藥牛膝大黃槐子獨活當歸各一兩上以臘月豬脂五升微火煎三上三下膏摩病日三四不須向火療發背髮乳房及諸惡瘡膏方黃連當歸馬齒芎藭茱萸各一兩珣珠十四枚礬石燒黃柏各半兩石葦三分去毛豬肪一斤生竹皮三合上㕮咀細切肪向美酒一升中合煎石葦焦膏成去滓有病稍稍敷上一酒服棗核大一枚忌豬肉冷水澆洗方諸發已破未破皆洗如成膿潰爛最要洗淨去故肉生新肉洗後淨干再用角貼摻藥一日一次大柏皮澤蘭莽草荊芥赤芍藥山大黃土白芷土當歸獨活各等分上銼粗散用水一斗入蔥白大椒橘葉同煎熏洗如已爛入豬蹄下膝爪骨肉煎可免干痛淨洗為度青金錠子專治腦疽發背去惡肉追膿生肌白礬枯粉霜輕粉白丁香真者炒各一錢銅綠二錢硇砂龍腦麝香各五分上為細末稠麵糊為錠子如麻黃粗細外科精義青錠子治諸惡瘡膿出不快者及多年疳瘻愈而復發無白礬犀角消毒散治發背髮腳發手發脅一切惡瘡此藥溫和大能散毒荊芥穗防風甘草鼠黏子羌活白芷獨活桔梗各等分上為末每服三錢水一盞煎至七分不拘時服神白膏貼五發未破南星大黃草烏白蘞各半兩蚌粉大柏皮各一兩小赤豆二合上為末取芭蕉頭研取油調角四畔加乳香沒藥尤妙干則芭蕉汁刷之一方無草烏止痛當歸湯治腦疽發背穿潰疼痛當歸黃耆人參官桂芍藥甘草炙生地黃各一兩上為粗末每服五錢水一盞半煎至一盞去滓溫服日進三服治癰疽腫疼發腦發背方柳樹上白木耳黃連去須乳香杏仁去皮尖各一分鹽花少許蛇床子少許新蔓荊根一握不得用隔旬者如無以菘菜代之上為末似覺有腫以溫水調敷干即易之宣毒散初發或灸後用敷貼消腫收赤暈圍聚露蜂房三兩炒略微焦南星赤小豆各一兩小米一合生草烏一分生白礬半錢上為細末用淡醋調塗四畔干即再上寒托裡散止痛消腫初發服之則消散已成則易潰既潰則生肌常服活血補損不患瘡痍黃栝蔞三個去皮取瓤子炒忍冬三兩即左纏藤乳香一兩蘇木二兩沒藥一兩半甘草節炙半兩紅紋者上為粗末每用藥一兩半無灰酒三碗同藥入瓦瓶內煮至一碗半去滓分為三服空心日午臨睡服如要常服即為細末酒糊為丸如彈子大硃砂為衣每服一丸細嚼當歸酒下打撲傷損服至五丸即安萬靈丸治背腦疽並一切惡瘡初覺一二日硃砂血竭蓮蕊各等分麝香少許上為細末酒糊為丸如黃米大每服七丸溫酒送下瘡在上食後在下食前不過二服即效鯪鯉甲散療發背乳房癰腫方鯪鯉一頭取甲爪炙桂心三分當歸二分上為散服方寸匕日三酒進忌生蔥綠雲散治五毒發瘡生於背腦一名二草散一名綠雲一醉散金星鳳尾草形如鳳尾葉背有金星者是也干稱四兩生粉草一分切上慢火焙為末分作四服每用紅酒一升煎三五沸入冷酒二升和勻入銀瓦器內封卻時時服量力飲之以醉為度立效若曾服金石重藥者此藥最妙以物枕著痛處睡良久逐下毒氣惡物次日減藥末並酒一半再進一服忌生冷油膩毒物不飲酒者新汲水調服如聖散治惡瘡背腦疽寒癰吹乳打撲傷損並治之甘草一兩半生半熟皂角三錢燒存性去皮核稱用上為細末每服三錢熱酒調下無時金銀花散治發背惡瘡托裡止痛排膿金銀花四兩無花用苗葉嫩莖代之甘草一兩上為粗末分為三服酒水各一盞同煎至一盞去滓溫服無時海上方治癰疽發背發腦等疾用楓根白皮即楓樹根旋取去土及粗赤皮就濕用為粗末每用藥一升無灰酒二升煎至八分取清汁稍熱作三服藥滓敷瘡口瘡未破敷時留瘡口既破用藥敷瘡三服可活人命神效療始發癰疽發背及乳房方用半夏末雞子白和塗良姚云生者神效以水和塗之又方用醋和墓上土茱萸搗姜小蒜薄貼並良大荊芥方治癰疽發背腦瘍等不問有頭無頭但要腫起知痛用藥一粟許於瘡頭點之少頃再點便覺肉地軟用大荊芥根洗淨細切爛研加小粉和勻隨瘡大小塗敷留口一云大荊芥即大薊一味不拘多少洗淨細切研膏塗瘡上其冷如冰初發者能消散已成腫者無不取效一云加些少米醋同研則荊芥易爛塗敷留口如一圍大才幹又換其口漸小以口潰為度治癌方用生井蛙取皮曬乾燒帶生為細末摻或蜜水調敷癌者上高下深巖穴之狀顆顆累垂裂如瞽眼其中帶青由是簇頭各露一舌毒根深藏穿孔透里男則多發於腹女則多發於乳或項或肩或臂外證令人昏迷治法急用蓖麻子等藥外敷多出其毒水如癰疽方中乳香膏神功妙貼散是也內則於小便利之蓋諸痛癢瘡皆屬於心心與小腸為表裡所當宣毒於小便但諸發蘊毒又非麥門冬燈心草之所能宣必如是齋方中立應散以地膽為主以白牽牛滑石木通佐之而後可以宣其毒矣自此又於心腎同工人之一身水不能濟火則渴而後發瘡心腎相交水火既濟於人何病之有心主血也清心行血固所當然亦使腎得其養則水有所司貞元凝合彼瘡自平更服童尿又可以灌滌餘毒切戒忌風邪入之將理一節米餔豬蹄可以益腎可以養中當加之意乳香膏神功妙貼散立應散治痼方痼發於手足或掌心或腰腿或臀下伸縮處長形平腫無頭無面低貼肌肉瞰里開瘡如𤷍而大走注牽連較之諸發煩渴為甚其患淺則可療其患深則害人或腫毒已平數月之後復於他處大發但作肉色微帶淡紅終不能救治法以癰疽類例推之大要培養內氣以防滑泄兼用膏藥吮瘡神異膏遇仙膏可貼可服復煎散治腦背疽及一切惡瘡方見黃連獨活散周子明提點傳一宗八道治五發發腦髮鬢發眉發頤發背癰疽瘭痼癌一宗藥保不死方才覺寒熱瘡已現發渴即是其證先用車螯散紫背大車螯一名車蛾每個用草先扎定上用鹽泥固濟日乾簇火煅之候通紅半時辰許爛火候通手取敲去泥以器皿合在淨地上出火毒半日許冷碾羅為細末砂合收甘草炙碾為末輕粉上每服車螯二錢末甘草末一錢輕粉炒五分溫麥門冬熟水調下五更初服至日出時候大便不痛下青綠苔或如黑煤惡物下也次用一生黃土細研炒半錢研入蒜三瓣細爛搗捉薄作三餅子不拘大小坐於瘡頭上有伏道熟艾灸之百壯少歇與飲食吃再灸之三五十壯也次用六一湯托藥真綿黃耆箭竿者是也木耆不堪誤人秤六兩以刀劈開揭薄用白沙蜜不酸者一兩微入水少許調解開易塗蘸候搓勻炙之微紫色候冷銼碎不碾羅橫紋甘草炙一兩細銼上拌勻每服抄五錢水一盞煎至七分服之日三服夜二服次服栝蔞湯栝蔞一個去皮將瓤與子銼碎沒藥一分研甘草半兩生銼上用無灰酒三升煎至一升分三服溫餌次用豬蹄湯治癰疽等腫壞消毒去惡肉香白芷甘草獨活露蜂房黃芩赤芍藥當歸各等分上先將豬前蹄兩隻只用白水煮軟將汁分兩次澄清去上面油花下面滓肉每用藥半兩投於汁中再煎五七沸濾去滓以故帛蘸藥湯中薄揩瘡上死肉惡血隨洗而下以干故帛拭乾敷竅減痛仍避風忌人口氣吹之有狐臭人不得入宅貓犬亦忌月候人不令入房次用洗藥散風邪生好肉芎藭銼白蒺藜搗去尖防風銼上等分為細末每用抄一匙頭煎令沸氣上頓候通手以帕揩洗之前藥一次換後藥兩次易二藥相間洗凡瘡破有頭便用洗藥洗訖便用薄貼敷之薄貼謂藥也太上無比靈應神異膏露蜂房一兩銼碎蛇蛻皮半兩細剪玄參半兩細銼黃丹五兩好者真綿黃耆三分細銼真杏仁一兩去皮尖略搗破童男童女亂髮洗淨日乾如雞子大上先用真麻油不用菜子油一斤入鐺便下發慢火熬候發消盡次入杏仁濾去滓再入鐺入余藥熬候焦黃再濾去滓次入黃丹候變色以新柳木篦子攪五千攪滴入水中看軟硬得所然後傾入淨瓷罐子如尚未硬更攪三百攪也攤用如常日換兩次夜換一次疽發人貼云丹膏痛如刀割不可不審不可不知也亦不得用生肌藥只貼膏藥自然斂合如醫治後時為庸醫藥罨或刀割傷風重者兼以五香連翹湯木香麝香乳香沉香藿香連翹上等分為末每服二錢水一盞煎至七分溫服無時瘡四邊以金箔先用津液吹點之也大車螯散取癌瘰痼疽四般未破者癰不用此如已破者只用五積散疏利風氣然後服諸藥大紫色車螯一個黃泥固干火煅通赤去泥末之大戟芫花醋炒甘遂甘菊檳榔大黃黃芩漏蘆三分膩粉一分上搗為末每服二錢車螯末二錢粉一錢五更栝蔞煎下良久下惡物膿血不久自止後生壯者加一服老弱量與排膿散去瘀膿化惡血止痛去寒熱防風白芷人參細辛川芎仙靈脾甘草半兩羌活二錢上為末酒調下糯米飲亦可托裡散止痛固臟腑山蜈蚣一兩當歸川烏炒白朮白芷川芎三錢麻黃一錢上為末酒下二錢姜薄荷水煎亦可敗毒散已破者服麻黃白朮蒼朮一兩荊芥甘草大黃三分黃芩半兩干薄荷一分上為散水煎服內補散癌已破膿多瘡爛肉未生者附子炮一兩白姜一兩人參甘草三錢陳皮麻黃官桂半兩上為末一錢蔥煎服食前去膿血寒熱生肌內消散癌已破未破去膿止痛退寒熱進食去瘀血紅內消即何首烏紅者一兩玄參苦參蔓荊子威靈仙半兩甘草節赤小豆三分上為末每服二錢麥門冬酒任下日五服黃芩散癌瘡爛腫化惡膿止痛活血以洗之黃芩五錢羌活五錢細辛白芷𦬣草秦皮川芎黃連三兩上為散每一兩半雄豬蹄水二升煎半去油滓煎藥濾清冷洗春冬日一洗夏日再麝香膏貼之麝香膏附子生陳皮黃連白芷當歸五錢白豆蔻五個檳榔四個羌活白姜大黃縮砂一錢皂角三條上為散麻油十兩煎八兩藥焦色為度綿濾再煎沸入黃丹五兩熬至七兩水滴成膏收瓷器中仍出火毒用時絹片火上開藥隨大小貼內消丸治痼發附子川烏各炮半兩全蠍淨殭蠶一分乳香三錢研草烏頭水煮爛去皮尖半兩雄黃沒藥一錢研上為末蜜丸梧桐子大薄荷湯下二十丸若發急者只作末每一錢茶酒任下內解散川烏炮一兩甘草半生半炙麻黃一兩沉香蒼朮防風萆薢一分杜仲半兩炙上為末每服二錢姜三片棗一個水一盞煎至六分去滓溫服上二方須潰破膿透內虛之後可服一方向友正元仲之子也淳熙八年為江陵支使攝江陵令癰發於胸臆間極痛療半歲弗愈常浴罷痛甚委頓而臥似夢而非夢見一丈夫微揖而坐傳藥方與之曰用沒藥栝蔞乳香酒煎服之且言桃源許軫知縣亦有此方但不用栝蔞其效故不速友正敬謝即如所誡不終劑而愈後詣玉泉禱雨瞻壽亭關王蓋所感夢者因繪像於家焉瘡瘍治驗戊申歲以飲酒太過脈候沉數九月十七日至真定腦之下項之上出小瘡不痛不癢謂是白瘡漫不加省是夜宿睡善甫家二日後覺微痛見國醫李公明之不之問凡三見之終不以為言又二日腦項麻木腫勢外散熱毒焮發且聞此府劉帥者近以腦疽物故便疑之三日間痛大作夜不復得寐二十二日請鎮之瘍醫遂處五香連翹明日再往又請同門一醫共視之云此疽也然而不可速療十八日得膿俟膿出用藥或砭刺三月乃可平四月如故予記醫經凡瘡見膿九死一生果如二子言則當有束手待斃之悔矣乃詣姨兄韓參謀彥俊家請明之診視明之見瘡談笑如平時且謂予言瘡固惡子當恃我無憂恐耳膏粱之變不當投五香五香已無及且疽已八日當先用火攻之策然後用藥午後以大艾炷如棗核許者攻之至百壯乃覺痛次為處方云是足太陽膀胱之經其病逆當反治脈中得弦緊按之洪大而數又且有力必當伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已必先歲氣無伐天和以時言之可收不可汗經與病禁下法當結者散之咸以耎之然受寒邪而禁咸諸苦寒為君為用甘寒為佐酒熱為引用為使以辛溫和血大辛以解結為臣三辛三甘益元氣而和血脈淡滲以導酒濕扶持秋令以益氣瀉火以入本經之藥和血且為引用既以通經以為主用君以黃芩黃連黃柏生地黃知母酒製之本經羌活獨活防風藁本防己當歸連翹以解結黃耆人參甘草配諸苦寒者三之一多則滋營氣補土也生甘草瀉腎之火補下焦元氣人參橘皮以補胃蘇木當歸尾去惡血生地黃當歸身補血酒製漢防己以除膀胱留熱澤瀉助秋去酒之濕熱凡此諸藥必得桔梗為舟楫乃不下沉投劑之後疽當不痛不拆精氣大旺飲啖進形體健予如言服之藥後投床大鼾日出乃寤以手捫瘡腫減七八予疑瘡透候遽邀明之視之明之驚喜曰瘡平矣屈指記曰不五七日作痂子可出門矣如是三日忽有宵寐之變予懼其為死候甚憂之而無可告語之者適明之入門戲謂予曰子服藥後有三驗而不以相告何也乃歷數云子二三日來健啖否乎曰然又問子腳膝舊弱今行步有力否乎曰然又問子昨宵夢有宵寐之變何不自言予為之一笑終不以此變告之也二十九日瘡痛全失去灸瘢膿出尋作痂初鎮人見劉帥病疽之苦言及者皆為悲慘聞予復病此瘡親舊相念者皆舉手加額以早安為禱十月十七日明之邀往其家乘馬過市人見之有為之失喜者蓋始於投劑至瘡痂斂都十四日而已予住在聊城見明之治梁縣楊飛卿脅癰及郭文之父腦疽楊叔能背疽不十數日皆平復然皆不若治予瘡之神也醫無不難療背腦瘡尤難世醫用技豈無取效者至於治效之外乃能歷數體中不言之秘平生所見惟明之一人而已乙未秋予自濟南迴傷冷太過氣絕欲死明之投劑應手而愈起予之死並此為二矣他日勸劉斯立傳錢乙當補述之明年秋七月二十有五日河東元好問記黃連消毒散黃連一錢黃芩五分黃柏五分生地黃四分知母四分羌活一錢獨活四分防風四分藁本四分當歸尾四分桔梗五分黃耆二分人參三分甘草三分連翹四分蘇木二分防己五分澤瀉二分橘皮二分上件銼如麻豆大都作一服水二盞煎至一盞半去滓溫服食後一方加山梔子二分五味子二分麥門冬二分枳殼二分豬苓二分名消毒潰堅湯治人發癰腫瘰癧乳癧隨病人虛實藥劑輕重用之無不作效發腦附論夫發腦者六腑不和經絡痞澀氣血不行壅結所成也此皆臟腑蘊積熱毒或乳石發動毒氣上攻於腦發於皮膚頭如黍米四畔焮赤腫硬遍於耳項寒熱疼痛若不急治毒氣傷於血肉血肉腐壞化為膿水從腦中出血肉既竭必致危殆李氏云凡腦疽及項以上有癰疽癤毒斷不可用大蒜錢子就疽頂上灸之灸之則引其氣一上痰涎膿血並起上攻傾人性命急於反掌但當急灸足三里穴並氣海穴乃漸漸服涼胸膈化血之藥人可小安此論載通神方論足三里二穴在膝下三寸是穴可灸五壯氣海一穴在臍下一寸是穴可灸二七壯或三七壯亦可以騎竹馬穴法灸之凡腦疽咽喉生疽古法皆不治之證用此灸法引毒氣歸下其理頗長得此疾者豈可坐以受斃當信而用之如五香連翹湯漏蘆湯五香湯去大黃加人參黃耆犀角國老膏萬金散皆可選用方沉香湯治發腦瘡腫焮赤疼痛煩燥沉香二分麥門冬去心焙赤芍藥玄參甘草生銼枳實熬炒升麻前胡去蘆頭大黃銼炒生乾地黃焙各一兩犀角鎊三分麝香研一分葳蕤黃耆細銼各半兩上除麝香外粗搗篩每服四錢水一大盞煎至七分去滓入麝香少許溫服不拘時黃耆散治發腦腫痛煩熱不可忍黃耆一兩半銼赤茯苓地骨皮麥門冬去心生乾地黃黃芩川升麻射干玄參赤芍藥甘草生銼各一兩上為散每服四錢用水一中盞煎至六分去滓不計時候溫服葛根散治發腦及癰腫臟腑壅滯心煩口乾腳冷寒噤頭痛嘔噦不能下食葛根一兩銼麥門冬一兩去心葳蕤三分犀角屑半兩薺苨一兩赤芍藥三分石膏二兩甘草三分生銼紅雪二兩上為粗散每服四錢水一中盞煎至六分去滓下竹瀝半合更煎一沸不計時侯溫服一方有蘆根犀角散治發腦已穴膿出後痛悶轉甚熱亂腦中若車馬走動痛不可忍石膏碎犀角鎊升麻芍藥各一兩甘草炙一兩黃耆細切二分木通銼一兩半上粗搗篩每服五錢水二盞煎至七分下朴硝一錢匕濾去滓空心溫服日晚再服未愈更入玄參三分去黃耆發腦內消散治發腦始結疼痛妨悶欲成癰疽熁之令內消硝石研二兩木通銼紫檀香甜葶藶隔紙炒白蘞莽草各一兩大黃三兩上為末每用漿水旋調得所塗於腫上干即易大黃丸治發腦及一切熱毒氣結硬腫痛通利臟腑壅滯大黃三兩銼醋浸一炊久慢火炒冷熟枳殼去瓤麩炒一兩牽牛子二兩半微炒一半生用一半木香生銼青橘皮湯浸去白焙各一兩皂莢五挺不蛀者捶碎酒一升浸挪取汁綿濾過用上為末取皂莢汁於銀鍋內慢火煎成膏入藥末和搗百餘杵丸如梧桐子大食前蔥茶下三十丸快利為度一方有檳榔一兩甘草五錢羊桃根散治癰發腦拔去瘡中毒羊桃根銼硝石研凝水石碎各一兩天靈蓋慢火燒煙絕木香白蘞各半兩上為散清水調如糊攤於故帛上貼之干即易癢則瘥乳石散治腦疽初生如黃枳實破後如盞底深半寸許花乳石研赤石脂研滑石研爐甘石研密陀僧研各半兩乳香研一分上為細散未破者醋調敷之已破者即干貼黃連餅子治發腦成癰及熱毒瘡腫黃連乳香薰陸香各一兩雄雀糞四十九粒尖細者是上為細散用蔓荊根二兩洗淨漉去水細切搗如泥若腫甚即更用蜀葵根三兩入前藥四味合搗調勻即取出於瓷器中貯之可腫頭捻作餅子厚三分許貼之干即易之止痛散治發腦結腫木香二兩紫葛一兩半銼檀香三分川朴硝二兩上為細散以溫漿水調如麵糊在絹上攤貼於腫痛處候乾即再貼以瘥為度硃砂膏治發腦及乳癰初結疼痛硃砂一兩乳香半兩上同研為末以蔥白四兩細切合研成膏每用生絹上塗貼候乾再上以瘥為度治腦癰用鹽西瓜皮曬乾燒灰存性為末香油調敷治發腦發背方取鼠剝取熱皮中心開一孔子用貼瘡上數數易之無頭者便當作頭膿出即愈治腦疽用松節細研用獖豬膽汁和合麻油敷瘡親見效
