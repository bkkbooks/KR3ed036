去枝佛耳草甘草炙人參陳皮去白阿膠蛤粉炒杏仁去皮尖雙仁麩炒各一兩上為末每服五錢水一盞半生薑三片肥烏梅一個拍碎煎至七分去滓溫服不拘時臥服尤妙安神散治痰涎喘嗽久不愈款冬花佛耳草各三錢鐘乳石白礬甘草生各一分上為末每服二錢水一盞入蠟少許煎至七分和滓溫服食後每日二服郁李仁丸治水氣乘肺動痰作喘身體微腫辰砂半夏丸治大人小孩肺壅痰實咳嗽喘急胸膈痞滿心忪煩悶痰涎不利呀呷有聲半夏湯炮葶藶別研杏仁去皮尖別研各半兩五靈脂硃砂別研各一兩上將五靈脂半夏為細末卻入杏仁葶藶硃砂末攪勻生薑汁打糊為丸如梧桐子大每服二十丸食後蘿蔔湯下葶藶散出宣明論治肺氣喘滿痰嗽睡臥不安不思飲食苦葶藶蛤蚧粉各三錢桑白皮山梔子人參各五分荊芥穗薄荷葉赤茯苓桔梗杏仁去皮尖甘草各半兩上為末每服三錢水一大盞生薑三片煎至六分去滓食後溫服參蘇溫肺湯治形寒飲冷傷肺喘嗽煩心胸滿氣不得動暢人參紫蘇葉甘草各五錢肉桂五味子木香各四兩陳皮白朮各六錢半夏薑製白茯苓去皮各半兩桑白皮一兩上為粗末每服五錢水一盞半生薑三片煎至八分去滓大溫服食後如冬寒每服中加不去節麻黃半錢先洗去沫下諸藥九寶湯出澹寮方治老人小兒婦人室女素有喘疾過寒暄不常發則連綿不已喘嗽哮吼夜不得眠麻黃薄荷陳皮各一兩官桂紫蘇杏仁去皮尖桑白皮甘草大腹子連皮各半兩上㕮咀每服三錢水一盞半生薑三片烏梅半個煎至六分去滓專心服餌其效甚著或入童子小便半盞尤佳感冒鼻流清涕亦效病各有主對不可疑其發散耗氣之說惟虛勞自汗不當用之一方罌粟殼二個去頂人參少許救生丹治大人小兒𠯜喘咳嗽其效如神虢丹馬牙硝人言各一錢細研一名夜露七宿用甜葶藶隔紙炒桑白皮半兩杏仁去皮尖半兩雞䏶胵十個上為細末同前三味和勻棗肉為丸如梧桐子大每服七丸臨臥清茶下紅椒丸出危氏方治虛癆喘嗽眩暈靈砂一兩細研人參木香大香附子杵淨大紅椒去合口並子焙出汗各半兩上為末糕糊丸如麻子大每服二十丸空心橘皮湯下胡椒半夏丸治虛寒喘嗽冷痰不止半夏乾薑各一兩胡椒丁香各一分上為細末生薑自然汁煮薄糊為丸如梧桐子大每服三十丸細嚼乾柿湯食後送下鍾乳丸出危氏方治喘嗽痰涎稠黏晝夜不止不得坐臥遠年近日並皆治之滑石半兩鍾乳粉見成者一兩南星炮切片生薑制上為末煮乾柿去蒂核搗細搜藥為丸如梧桐子大每服四十丸薑棗煎湯下氣弱人更服養正丹百花膏出濟生方治喘嗽不已或痰中有血款冬花百合蒸焙上等分為細末煉蜜為丸如龍眼大每服一丸食後臨臥細嚼薑湯嚥下含化尤佳杏仁煎出濟生方治久患肺喘咳嗽不得已眠臥不得服之即愈杏仁去皮尖胡桃肉上等分為細末研成膏煉蜜少許丸如彈子大每服一丸或二丸食後臨臥細嚼用薑湯嚥下人參湯亦可生薑煎服亦可寧神散一名寧肺散雌黃丸出聖惠方治咳嗽喘急雌黃一分雄黃一分杏仁七枚湯浸去皮尖雙仁炒微黃色上為末以蟾酥為丸如粟米大以燈心煎湯每服三五丸送下治喘嗽上氣華佗中藏經方蒲頹葉治一切肺喘劇甚者效如神焙碾為末米飲調服二錢匕並服取瘥氣味清香其實酸澀夏紅可食核如棗核類山茱萸揀葉背白者用江西謂之盧都子七七散余居士選奇方治喘嗽長皂莢三條去黑皮破開兩邊去子一莢仁巴豆十粒一莢入半夏十粒一莢入杏仁十枚用生薑汁製杏仁麻油制巴豆蜜製半夏上件一處火炙黃色研為細末每服用一字安在手掌中臨睡用生薑汁調舌點吃立有神效雄黃丸余居士選奇方治喘嗽雄黃雌黃信各一錢巴豆五粒半夏半兩湯浸七次上搗末糊為丸如椒子大每服五丸臨臥清茶下忌熱物小兒加減與服之四寶丸出仁存方治喘嗽化痰知母貝母款冬花白礬枯上等分為末以稀糊丸如梧桐子大甑上蒸過每服二十丸食後薑湯送下千金丸出仁存方治證同前南星半夏各一兩白礬一兩半枯上以生栝蔞一個去子入藥在內濕紙裹煨熟取出為末再用生白礬一兩將栝蔞瓤汁並栝蔞仁研細同丸如梧桐子大每服十五丸用淡薑湯下臨臥服之一方出仁存方治喘嗽雄黃雌黃信石黃丹上等分用鯽魚一個去腸肚洗淨量魚大小入藥在內令滿以線縛定鹽泥固濟用炭三斤燒紅候冷取出研細末浸蒸餅為丸綠豆大臨臥沙糖水下三五丸小兒一二丸每夜只一服化痰延壽丸海岳居士秘方治痰喘中滿咽喉作聲或中風偏枯不能行步並宜服之香附四兩炒南星一兩炮半夏四兩漿水浸枳殼麩炒去瓤二兩白礬半兩黑牽牛頭末四兩微黃商陸一兩上為細末酒打麵糊為丸如梧桐子大每服五六十丸生薑湯送下食遠臨臥服之嗽加人參一兩喘加紫參一兩甜葶藶丸出聖惠方治一切喘嗽不瘥甜葶藶一兩隔紙炒令紫色人參三分去蘆頭赤茯苓三分蛤蚧一對頭尾全酥炙微黃杏仁一兩湯浸去皮尖雙仁炒上為細末以棗肉和丸如梧桐子大每服三十丸日進三四服以粥飲下控痰良方出直指方治喘嗽通用虢丹白礬各二兩上以錢王磚剜一大孔先入虢丹以白礬蓋頂用炭一斤煅至火盡礬枯丹黑出火毒研細煮調面和丸如麻子大每服十五丸沸湯泡生薑汁送下諸頑痰迷塞關竅不通聲音不出以三十丸研末入全蠍少許用自然薑汁澄取清者調灌須臾吐痰立愈凡喘促胸膈膨湃寸脈急數須從權吐之中滿內實而喘者與解毒雄黃丸二黃丸出衛生家寶方治喘嗽哮呷氣急雄黃三錢雌黃三錢信砒一錢馬兜鈴三錢重杏仁七粒去皮尖上件細研將皂角五條不蛀者捶碎挼取汁一盞熬成膏子和藥安乳缽內燒皂角煙燻過丸如蘿蔔子大每服三丸臨臥齏水送下小兒一丸孕婦不可服一夜只一服喘退不可服也治感風冒寒喘嗽久不瘥或身有煩熱其脈弦緊者小柴胡湯加桑白皮北五味子薑棗煎服治喘嗽上用陳橘皮一兩水浸去穰細切用巴豆十粒去殼同橘皮炒令十分赤色傾在桌子上揀去巴豆須淨盡不用巴豆搗橘皮為末每服二錢米飲調下臨臥時服遠年二三服或瀉一兩行不妨以溫粥補之忌食毒物哮𠯜附論夫哮𠯜嗽者一名䶎齁涎在咽喉間令人喘嗽不寧甚者搖身滾肚上氣喘急頭汗身冷或時發作多由飲冷水及驚恐所致也方青金丹治𠯜天南星一兩人參二錢半半夏一兩半款冬花三錢杏仁二兩去皮尖螺青半錢百藥煎二兩五味子五錢殭蠶二個白礬半錢訶子五錢皂角一兩上為細末薑汁糊為丸如梧桐子大每服二十丸臨臥清茶送下忌生冷膩熱之物日三服黃明膠散出本事方治十六般哮嗽黃明膠一兩炒馬兜鈴仁甘草各一兩半夏薑汁浸三日重一兩杏仁去皮尖一兩人參半兩上為末每服一大錢水一盞隨病湯使煎至七分臨臥後服心嗽面赤或汗流加乾葛煎一方加白芷肝嗽眼中淚加烏梅一個糯米十四粒煎脾嗽不思飲食或噁心入姜三片煎胃嗽湧吐醍酸水蚌粉煎肺嗽上氣喘急入桑白皮煎膽嗽令人不唾用茶半錢調膈嗽咳出痰丸塊姜自然汁調嚥下勞嗽入秦艽末同煎冷嗽天曉時嗽甚加蔥白同煎血嗽連頓不住當歸生薑煎一方用棗產後嗽背膊疼痛甘草一寸黃蠟少許煎黎明嗽涕唾稠黏烏梅生薑煎氣嗽吐痛脹滿青皮去白煎熱嗽夜甚蜜一匙蔥頭白煎哮嗽聲如拽鋸入半夏三個煎腎嗽時復三兩聲入黃耆白糖煎以上十六件哮嗽病依法煎服無不效驗青金丹一名定喘寧肺丸治齁嗽內金丸出仁存方治𠯜喘雞內金二十一個信石二錢半黃丹半兩上各研細露星七宿再入白牽牛末半兩葶藶末半兩半夏二錢半共為末蒸棗肉取膏為丸如麻子大露星二宿硃砂為衣每服七丸臨臥冷清茶送下金粟丹一名雄黃解毒丸出經驗良方雞冠雄黃研令極細鬱金各二錢半巴豆十四粒去殼膜壓令油盡上為末醋煮麵糊為丸如粟大津唾嚥下或茶清下大人十丸小兒量其大小與服見效治遠年近日哮嗽妙方出本事方砒一錢面一錢海螵蛸一錢上為末水調作餅子慢火炙黃再研令細每服一字用井花水調一大鐘呷空心服良久吐出為度小兒加減與之忌食毒物紫金丹出本事方治𠯜喘信石一錢半研淡豉一兩水潤去皮研成膏上以豉丸如綠豆大每服七丸至十丸冷淡茶清下臨臥只一服後不可吃一應湯水之類今以信八分豉一兩每服二十丸一法二件成膏搽碗內艾熏入生朱末丸有一夙疾婦人患十年遍求醫者皆不效忽有一道人貨此藥漫贖一服是夜減半數服頓愈遂多金丐得此方予屢用以救人特為神異鬼哭丹一名豉破丸出經驗良方治䶎齁亦能治瘧白信石一錢白砒霜者良不用黑者寒水石四錢上各研為細末取端午日三五家粽角極薄切用建盞盛粽一過用寒水石鋪一過卻信石鋪之如後用粽角用前法鋪之如鋪盡仍將粽子蓋卻用淡豉冷水微浸取濃汁滴於盞內用乳槌搗煉成丸取劑左右心盛藥丸如大粟米大每服大人只服五丸五歲後只三丸周歲以上只一丸瘧痰未發前五更東流水初下水䶎鹽蒻燒灰調沸湯候冷吞下食䶎茶蒻燒灰調沸湯冷下或冷臘茶清下老䶎用半夏五粒生薑一大塊同擂自然汁吞下永遠不發古老飲出仁存方治魚哮嗽𠯜古老錢白梅肉各七個上水一大盞浸二宿每服一茶腳許空心服良久吐出惡物鯽魚丸出家藏經驗方治肺經久受邪氣嗽喘急初發則寒從背起冷如冰雪漸漸喘促氣不相續痰涎壅塞咯吐不出坐臥不得莫可支吾兩肩聳豎曲背弩目困憊欲絕宜服或未效再服即愈其效如神上用鯽魚重一斤者不去鱗腸只於肚下近頭處開一孔入信石一塊重一錢令深入在內卻以魚入竹筒內外用青蒿搗泥固濟候乾火煅竹筒通紅候冷出泥取魚去燒不過者研細入蚌粉三錢研得所丸如綠豆大硃砂為衣每服四丸或五六丸沙糖冷水下臨臥服之忌熱物一方喘正急時宜服之不可過多丸數欲試此藥先用豬肺一枚吹脹入數粒於肺脘內頃刻漸痿方表其效千金丸治哮𠯜𠯜藥千兩金丸奇神仙留與故人知一兩雄黃雞冠色半兩明信煅如灰一兩玄精龜背樣雌黃一兩最相宜一兩鵝管如雪色二兩明霜火上飛二兩蛤蚧巴豆炒去了殼兒六十枚同炒去豆只用粉沙糖和蜜搗須時荷葉乳為極細末浥糕調糊莫令稀丸如綠豆顆兒大每服七丸用冷齏小兒服時歲加減吃了忌酒三日期喉如拽鋸聲鳴響審問與藥莫差池此藥家傳百餘載且莫輕傳寶秘之紅散子治諸呀呷有聲睡臥不得上吐朱不拘多少極為細末米醋調時時進一二服治一切𪖲齁上用處州瓷器不以多少打碎碾為細末如齁發時每用二三錢用手指頭點津液蘸藥點舌上嚥下即效黑馬蹄香散治哮𠯜上用馬蹄香焙乾研為細末每服二三錢如正發時用淡醋調下少時刻吐出痰涎為效馬屁勃丸治哮𠯜白前方出肘後方主久患呀呷咳嗽喉中作聲不得眠臥上取白前搗為末溫酒調二錢服治久哮上用梧桐子一連紙包濕放在火煨取出安地上出火氣為末空心井花水一盞送下痰出即愈治哮喘嗽上以大南星切作片香油煎至黑色研末睡覺細嚼咽茶清嗽口不語之治吼喘咳嗽病脾胃寒不思飲食面色黃羸瘦古人名為肺脹今人卻做哮𠯜大黃黑白二牽牛等分修合成就更加檳榔為末名為奪命因由冷漿調下便時休免得胡針亂灸治齁喘出朱氏集驗方上用苦丁香三個為末水調細呷吐出稠痰即愈治䶎齁出永類鈐方白礬半兩煅天南星半兩炒至煙起巴豆半錢去皮油甘遂二錢半末上作末和勻每服大人一錢小兒半錢薑片夾嚼燈心湯臨臥一服尋常華蓋散和參蘇飲服婦人九寶湯和清肺湯加芎歸煎服療齁出本草方上取榆白皮陰乾後焙杵為末每日朝夜用水五合末二錢煎至如膠服瘥治齁䶎及吐風涎上用石莧與甘草同煮服治喉中呀呷有聲不絕上以不蛀皂角燒灰存性研細以生薑自然汁調一錢許於掌中旋旋舌舐之
