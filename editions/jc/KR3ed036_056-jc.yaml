body:
  text: 卷五十六鼻門總論夫肺為五臟華蓋開竅於鼻肺氣和則鼻亦和肺感風冷則為清涕為齆為息肉為不聞香臭肺實熱則為瘡為痛膽移熱於腦則濁涕不已謂之鼻淵惟證候不同故治療亦異肺為氣之主通竅於鼻鼻者清氣出入之道路也陰陽升降氣血和平則一呼一吸營衛行焉其或七情內蠹六氣外傷則清濁不分泥丸汨亂諸證迭起矣夫血之與氣相隨而行若臟腑生熱乘於血氣故熱氣迫血妄行自鼻孔出謂之鼻衄衄則津液中干冷則髓涕流注若風冷隨氣乘於鼻腦則津液交涕不能自收謂之流涕肺為風寒所傷津液冷滯鼻氣不宣香臭不聞於是壅作鼻齆冷氣停聚血脈陰凝歲月淹延轉加壅結於是變生息肉或風邪入鼻搏於正氣邪正相擊鼻道不通則為鼻痛或氣血壅滯上焦生熱邪熱之氣留伏不散則為鼻瘡疊是數證七情六氣皆當究其感受之原用藥有序痊愈可期執方無權迄未有所濟也此外更有濕䘌一證鼻爛汁臭下部生瘡鼻衄名酒食衄或墮車馬打撲傷損致血淖溢發為鼻衄名折傷衄簡易方云鼻證歌肺之開闔鼻為之升降陰陽總在斯鼻觀故為清氣道主聞香臭內和宜清涕鼻洞肺傷風腦冷常常出濁膿經脈壅時還上衄腦生息肉久為齆六淫外致情中郁飲食不節並勞疫遂令清濁不能分隨氣上行還壅塞有致泥丸汨亂時諸證變生非止一鼻頭微白知亡血酒渣赤瘰肺風熱時行衄血二三升龍骨止之真妙訣鼻塞氣息不通附論夫鼻塞氣息不通者以肺感風寒其氣搏結不得宣快窒塞既甚而息不能出入也巢氏謂息肉生長致氣窒塞不通蓋有未嘗生息肉而氣息不通者宜析而治之肺氣通於鼻若其臟為冷風所傷故鼻氣不宣利壅塞成齆也為冷氣結聚搏於血氣則生息肉冷氣盛者則息肉生長氣息窒塞不通也方蜀椒湯治鼻塞氣鼻不通蜀椒去目及閉口者炒出汗半兩乾薑炮一分附子炮裂去皮臍半兩肉桂去粗皮一分山芋三分細辛去苗葉半兩石斛去根一分山茱萸半兩麻黃去根節白附子炮甘草炙各半兩杏仁五十粒去皮尖雙仁炒研上銼如麻豆大每服二錢水一盞煎至七分空心去滓溫服柳金散治肺熱鼻塞涕濁不利細辛白芷與防風羌活川歸半夏芎桔梗陳皮茯苓輩十般等分咀和同二錢薄荷姜煎服氣息調勻鼻貫通辛夷湯治肺氣不利頭目昏眩鼻塞聲重咯嚀稠黏辛夷去毛甘菊花去枝節吳白芷川芎前胡去蘆頭薄荷葉去土石膏白朮生乾地黃赤茯苓去皮陳橘皮去白以上各一兩甘草炙二兩上為粗末每服五錢水一盞半煎至一盞去滓溫服食後日三服芎藭散治外傷風冷鼻塞氣息不通閉悶芎藭檳榔人參去蘆頭赤茯苓杏仁湯浸去皮尖微炒以上各等分白朮麻黃去根節肉桂去皮郁李仁湯浸去皮尖微炒甘草炙微炒等分上為散每用五錢水一大盞生薑二錢切作片子同煎至七分去滓食後溫服通鼻膏一名辛夷膏治鼻塞窒香臭不聞妨悶疼痛蓋腦戶受寒濃涕結聚白芷芎藭通草各十八銖當歸細辛莽草一方作薰草辛夷各二三十銖上㕮咀以苦酒漬一宿以不中水豬肪一升煎三上三下以白芷色黃膏成去滓綿沾棗核大納鼻中日三小品加桂心十八銖醍醐散治傷風鼻塞聲重川烏炮去皮臍撫芎甘草白芷各二兩細辛半兩龍腦薄荷一兩半上為細末每服一大錢蔥白茶清湯調下薄荷湯亦得人參湯治肺風上攻鼻塞不通人參白茯苓去黑皮黃芩去黑心陳橘皮湯浸去白炒麻黃去根節羌活去蘆頭各半兩蜀椒去目及閉口者炒出汗半兩上粗搗篩每服三錢水一盞半煎至七分去滓食後溫服人參丸出御藥院方治肺風上攻鼻塞不通人參防風去蘆細辛去苗葉黃耆銼沙參木通銼甘菊花微炒各半兩上為末煉蜜和丸如梧桐子大每服十丸溫水下日再當歸膏一名合膏出聖惠方治鼻塞不利不聞香臭當歸切焙地薰草一用木香木通一作通草細辛去苗葉蕤仁研各三分芎藭白芷各半兩上細銼以羊髓四兩同納銀石器中入諸藥微火煎三上三下候白芷黃色膏成去滓傾入閤中澄凝每以小豆大綿裹塞入鼻中日三先患熱後鼻中生赤爛瘡者以黃芩梔子代當歸細辛通關散出御藥院方治腦風鼻息不通不聞香臭或鼻流清涕多嚏肩項拘急頭目昏痛風府怯寒原蠶蛾瓦上炒黃白附子炮苦參益智去皮蒺藜子炒去角干薄荷各一兩上為散每服三錢溫酒調下不拘時候增損防風通聖散出御藥院方治肺氣不和鼻中不利黍黏子桔梗桑白皮紫菀茸以上各半兩荊芥穗四兩甘草二兩以上各生用上粗末防風通聖散各一半和勻每服八錢水一盞半生薑五片同煎去滓食後溫服補肺杏仁煎治肺傷寒氣咳嗽唾痰聲重鼻塞氣息不通杏仁去皮尖雙仁二兩研棗肉煮去皮核一半升白蜜酥生薑汁各半兩升餳一升上合和於銀石器中微火煎攪候熟每服一匙頭溫酒調下食後服皂莢散出聖惠方治鼻塞不通皂莢炙去皮並子細辛去苗葉辛夷蜀椒去目及閉口者炒出汗附子炮裂去皮臍各一分上為散每以少許吹入鼻中用半錢綿裹塞鼻中亦得木通丸出聖惠方治鼻塞氣息不通不聞香臭並有息肉及鼻齆木通銼細辛附子炮裂去皮臍以上各一兩上為末煉蜜和丸如棗核大每夜臨臥納一丸於鼻中瘥蓽澄茄丸出御藥院方治鼻塞不通蓽澄茄半兩薄荷葉三錢荊芥穗一錢半上為細末糖霜蜜和丸如櫻桃大每服一丸時時噙化咽津菖蒲散一名皂角散出聖惠方治鼻窒塞不通不得喘息菖蒲皂角炙去皮子各一兩上為散每服一錢綿裹塞鼻中仰臥少時治鼻中窒塞氣息不通者皆已有肉柱柱若不出終不能瘥余藥雖暫通利旋覆生長宜復用此法出聖惠方白雄犬膽一枚地膽二十枚上先搗羅地膽為細散納犬膽中以繩系定三日乃於日出時令病人西首臥中庭以鼻孔向日旁人以故筆黏藥塗入鼻孔中一日一度至五六日當間鼻柱里近眼痛此是欲落更復三四敷之漸漸嚏之即落取將掛於四通道上柱落後急以綿塞之慎風鐺墨散出危氏方治鼻窒塞氣息不通亦治久患鼻瘡膿極臭者用鐺墨半兩即百草霜為散每服二錢溫水調下涼水亦得槐葉湯出聖惠方治鼻窒塞氣息不通用槐葉一兩以水三盞煮取二盞去槐葉下蔥白二寸豉一合更煎五七沸去滓分溫三服不拘時治鼻窒塞不通兼治衄血出聖惠方用小薊一把水三升煮取一升去滓分服曾有人陰冷漸漸冷氣入陰囊腫滿恐死夜疼悶不能眠煮大薊根汁服之立瘥一方為末酒調服禦寒湯東垣先生蘭室秘藏方治寒氣風邪傷於皮毛令人鼻壅塞咳嗽上喘黃耆二錢人參半錢炙甘草三分黃柏二分款冬花黃連各一分防風羌活各三分佛耳草三分升麻半錢白芷三分蒼朮七分陳皮五分上㕮咀都作一服水二大盞煎至一盞去滓稍熱服治鼻塞出本草用燒麻鞋灰吹鼻中立通一名千里馬即麻鞋也治酒後熱毒鼻塞身熱利大小腸出本草以水芹莖葉搗絞取汁服之治鼻塞出本草以乾柿三枚細切粳米三合豉少許煎粥空心食之鼻塞不聞香臭附論夫鼻有生息肉不知香臭者亦有無息肉而不知香臭者生息肉不知香臭已列方劑此姑論鼻塞不聞香臭蓋鼻之窒塞或冷風乘肺或肺經壅熱冷熱固異其塞則一皆肺臟不和氣不宣通故也治塞者當審其冷熱方款冬花丸治鼻不聞香臭款冬花檳榔銼百合麥門冬去心焙桔梗炒天門冬去心焙地骨皮羚羊角鎊貝母大黃銼炒黃芩去黑心山梔子仁防風去蘆杏仁去皮尖雙仁麩炒各二兩人參一兩半郁李仁去皮炒用二兩山芋柴胡去苗各一兩半百部甘草炙苦參各一兩桑根白皮銼旋覆花各四兩牛黃研木香各半兩蛤蚧一對全者酥炙上為末煉蜜丸如梧桐子大每服二十丸至三十丸食後溫漿水下蓯蓉丸治頭旋鼻塞不知香臭肉蓯蓉酒浸一宿切焙石鐘乳研成粉五味子菟絲子酒浸別搗蛇床子炒山芋各一兩澤瀉石斛去根甘菊花細辛去苗葉續斷鹿茸去毛酒浸炙防風去蘆秦艽去苗土黃耆銼乾薑炮柏子仁別研各三分上除別研外搗羅為末同和勻煉蜜丸如梧桐子大每服二十丸空心溫酒下日再不飲酒棗湯下服藥三日後灸百會穴三七壯即貼如神膏如神膏蓖麻子去殼杏仁去皮尖芎藭印子鹽防風去蘆松脂各一分蠟半兩油一斤上先入油於銀器中次將諸藥作粗散入油中微火上煎成膏濾去滓瓷器盛每用約大小貼之日一換防風湯一名木通散治鼻塞不聞香臭出聖惠方防風去蘆半兩梔子去皮七枚升麻一兩石膏碎三兩麻黃去根節三分桂去粗皮半兩木通銼一兩一分上粗搗篩每服三錢水一盞煎至七分去滓空心溫服日再排風散治鼻塞不通不聞香臭或生息肉生瘡防風去蘆秦艽去苗土山芋吳茱萸湯浸焙炒天雄炮裂去皮臍各一兩羌活去蘆頭半兩上為散每服二錢空心溫酒調下天門冬丸治鼻塞不聞香臭天門冬去心焙白茯苓去黑皮各五兩人參枳實甘草炙各三兩檳榔銼二兩上為末煉蜜丸如梧桐子大每服二十丸食後漿水下日再暑月以牛乳下通頂散治鼻塞不聞香臭出聖惠方滑石研胡黃連末各一分瓜蒂為末七枚麝香研半兩蟾酥研一錢上同研勻每以少許吹入鼻中即瘥百部散治肺實鼻塞不聞香臭百部二兩款冬花貝母去心白薇各一兩上為散每服一錢米飲調下芎藭散治鼻塞不聞香臭芎藭辛夷各一兩細辛去苗葉三分木通銼半兩上為散每以少許綿裹塞鼻中濕即易之五七日瘥通草散出濟生方治鼻齆氣息不通不聞香臭並有息肉通草作木通細辛附子炮裂去皮各等分辛夷一錢上為末蜜和綿裹少許納鼻中一方無辛夷瓜蒂散出聖惠方治鼻塞不聞香臭瓜蒂藜蘆各一分上為散每以一錢綿裹塞鼻中日三易一方狗膽汁和綿裹塞鼻中治鼻塞多年不聞香臭清水出不止灌鼻蒺藜汁方出聖惠方取當道車碾過蒺藜一把搗以水三升煎取熟先仰臥使人滿口含飯取一合汁灌鼻中使入不過再度大嚏必出一兩個息肉似赤蛹蟲一方有黃連等分同煎治鼻不聞香臭多年日近者用三五日便聞香臭出本事方用生蔥一味分作三截早用蔥管白午用蔥管中截晚用蔥管末梢一截塞入鼻中令透里方得離澤通氣湯東垣先生蘭室秘藏方治鼻不聞香臭羌活獨活防風升麻葛根各二錢麻黃不去節一錢如冬月加之川椒一錢蒼朮三錢炙甘草二錢黃耆四錢香白芷一錢每服秤半兩水二大盞生薑三片棗二枚蔥白三寸同煎至一盞去滓稍熱服食遠忌一切冷物及風寒涼處坐臥行立溫肺湯東垣先生蘭室秘藏方治鼻不聞香臭眼多眵淚流出不止升麻黃耆丁香各二錢葛根羌活炙甘草防風根各一錢麻黃不去節四錢上為粗末分作二服水二盞蔥白二握同煎至一盞去滓稍溫食後服溫衛湯東垣先生蘭室秘藏方治鼻不聞香臭目中流火氣寒血熱冷淚多臍下冷陰汗足痿弱黃耆蒼朮升麻知母柴胡羌活各一錢陳皮青皮黃連木香各三分人參炙甘草香白芷防風黃柏澤瀉各半錢當歸身一錢半上都作一服水二盞煎至一盞去滓食遠服之溫衛補血湯東垣先生蘭室秘藏方治耳鳴鼻不聞香臭口不知五穀味氣不快四肢困倦不收行步攲側毛髮脫落飲食不下膝冷陰汗帶下喉中吤吤不得睡臥口乾舌乾嗌多太息頭不可回顧項筋緊脊痛頭旋眼黑頭痛欠嚏升麻四分柴胡稍人參熟甘草橘皮桔梗各二三分半牡丹皮蒼朮王瓜根吳茱萸各二分當歸身二分半生地黃白朮黃柏各一分黃耆一錢二分丁香二個藿香錢半半分地骨皮三分桃仁三個葵花七朵生甘草半錢上㕮咀都作一服水二大盞煎至一盞半去滓食前稍熱服治鼻塞不聞香臭出本草取大棗十五枚去皮核蓖麻子三百顆去皮二味和搗綿裹塞鼻日一度易三十餘日聞知香臭鼻齆附論夫鼻和則知香臭夫鼻為肺之竅非能自和也必肺氣流通然後鼻為用而香臭可知若心經移熱於肺致肺臟不和則其竅亦無以宣達故為鼻齆此乃內經所謂心肺有病則鼻為之不利者也或風冷傷於臟腑而邪氣乘於太陰之經則其氣蘊積於鼻而津液壅塞鼻氣不通故不知香臭鼻塞而為齆也方羚羊角丸出聖惠方治鼻齆窒塞不通氣息羚羊角屑一兩連翹漢防己麥門冬去心焙薯蕷檳榔茯神以上各二分白蘚皮人參去蘆頭羌活細辛白芷當歸黃耆銼防風去蘆頭旋覆花枳殼麩炒微黃去瓤以上各半兩上為末煉蜜和搗三五百杵丸如梧桐子大每於食後以溫水下三十丸茯神散治肺氣壅塞鼻齆不聞香臭茯神去木一兩半山芋人參各三兩赤茯苓去黑皮防風去蘆防己各一兩半山茱萸一兩半蜀椒去目併合口者炒出汗一兩甘菊花桂去粗皮細辛去苗葉芎藭貫眾白朮米泔浸一宿銼碎炒各一兩一分乾薑炮一兩甘草炙一兩半上為散每服二錢匕空心溫酒調下日再服黃耆散治齆鼻順肺氣四時服食黃耆銼人參防風去蘆防己桔梗炒芍藥黃芩去黑心生乾地黃焙澤瀉石南葉紫菀白朮米泔浸一宿銼桂去粗皮甘草炙牛膝酒浸一宿切焙赤茯苓去黑皮各三兩上為散每服一錢匕溫酒調下如要丸煉蜜丸如梧桐子大每服二三十丸溫酒下芎藭散出直指方治鼻塞為齆芎藭檳榔麻黃去節肉桂防己木通細辛白芷石菖蒲各一分木香川椒甘草焙各半分上銼每服三錢入生薑三片紫蘇葉少許水煎服山茱萸丸治齆鼻山茱萸菊花大黃銼炒各一兩一分獨活去蘆頭三分甘草炙銼一兩防風去蘆一兩秦艽去苗土一兩半蔓荊實去白皮一兩梔子去皮炒一兩附子炮裂去皮臍三分朴硝三兩三分上為末煉蜜丸如梧桐子大每服二十丸空心溫水下老人亦宜服妊娠去附子加細辛半分甘遂丸出海上方治鼻齆及鼻塞不聞香臭甘遂通草細辛附子等分上為末以白雄犬膽和為丸如棗核大綿裹納鼻中辛熱涕出四五次瘥亦治息肉一方無甘遂有甘草用羊膽汁和丸一方為末名甘遂散一方蜜丸無甘遂綿裹少許塞鼻中赤龍散治鼻齆大抵鼻者由肺氣注於鼻上榮頭面若上焦壅滯風寒客於頭腦則氣不通冷氣停滯搏於津液膿涕結聚則鼻不聞香臭遂成齆也龍腦半錢研瓜蒂十四枚黃連三大莖赤小豆三十粒上為細末研勻臨臥以綠豆許吹入鼻中出水愈通頂散出直指方治鼻齆瓜蒂藜蘆各一分皂角肉半分麝香少許上為末吹些少入鼻中亦治息肉雄黃散出直指方治鼻齆雄黃半錢瓜蒂二枚綠礬一錢麝香少許上為細末嗅些少入鼻中亦治息肉雄黃丸出聖惠方治齆鼻雄黃研一錢甘草炙銼附子炮裂去皮臍細辛去苗葉各一分上為末用羊膽汁和丸如棗核大以綿裹納鼻中移時出惡物即瘥一方用狗膽和丸細辛丸一名甘草丸出聖惠方治齆鼻不聞香臭宜塞鼻中細辛去苗葉甘草炙木通銼附子炮裂去皮臍各一分上為散以羊膽汁和如棗核大塞鼻中一方用白雄犬膽和丸服之黃白散出醫方集成治鼻齆息肉鼻痔等證瓜蒂一錢明礬一錢雄黃半錢華陰細辛一錢上為末以雄犬膽汁和丸綿包塞鼻中一方為末嗅入鼻中治齆鼻中結肉出聖惠方青甜瓜蒂二枚曬乾為末雄黃半錢細研麝香半錢細研上都研令勻用時先將指甲掐破鼻中肉然後貼藥在上日三用之又方出聖惠方治鼻齆用炙皂莢為末如小豆大以竹筒吹入鼻中又方出聖惠方用乾薑末蜜和塞入鼻中吹亦佳亦治衄血又方用鐵鎖磨石取末以豬脂和綿裹納之經日肉出瘥塞鼻瓜蒂散出聖惠方治齆鼻不聞香臭窒塞氣不宣通用瓜蒂一錢為散以半錢綿裹夜臥塞鼻中旦即去之先以病人伏面用新汲冷水淋於枕上後用藥一方以少許吹入鼻中又方出聖惠方用瓜蒂白礬等分為末以豬脂和捻如棗核大綿裹塞鼻中經日再易之以瘥為度又方以馬新屎汁仰頭含滿口灌鼻中細辛散一名瓜丁散治齆不聞香臭斷齆法出十便良方治鼻齆極臭甚如息肉者上取雄雞腎一對脬前肉令與腎銖兩等豉七粒並於新瓦上焙乾研為細末又以雞中髓和了安在鼻門前引出蟲子忌陰人雞犬鼻中生息肉附論夫鼻者肺之竅鼻和而知香臭風寒客於肺經則鼻氣不利致津液壅遏血氣搏結附著鼻間生若贅疣有害於息故名息肉方雄黃散治鼻中息肉搏鼻雄黃研細辛去苗葉木通銼蕤仁研皂莢炙刮去皮並子各一分白礬煅過半兩礬石黃泥包煅過半兩藜蘆炙地膽瓜蒂地榆洗去泥土䕡茹各三分巴豆十粒去皮殼炒黃上為散煎細辛白芷湯和塗敷息肉上以膠清和塗之亦得取瘥為度治息肉方出直指方甘遂明礬煅硃砂雄黃雌黃藜蘆瓜蒂等分上為末清蜜調敷前鼻齆二藥通用羊肺散出醫方集成治鼻中息肉肺氣壅窒不聞香臭羊肺一具薄切去筋膜炙令乾木通銼半兩一作通草乾薑炮製肉蓯蓉酒浸一宿切焙芎藭各半兩白朮米泔浸一宿銼碎炒黃四兩上為散每服一錢於食後米飲調下日二次又一方以水調藥灌入肺中煮熟細切焙乾為末每服二錢取鼻痔全蠍一錢巴豆五粒去油丁香五粒白丁香五粒即瓦雀糞螺青一匙字上為末用玄武膏藥熔開入上件藥搜丸如龍眼核大臨臥用一丸安鼻內其鼻痔肉化爛了玄武膏藥方見膏藥門二丁散治鼻中生息肉丁香七個赤小豆粟米各七粒苦丁香七個石膏少許上研為細末竹筒吹入鼻中自消了鼻不聞香臭亦可吹之或有偏頭風亦可吹用消鼻痔出本事方此方緊如欲穩慢可用前一方瓜蒂炒甘遂各四錢枯白礬炒螺青炒草烏尖炒各半錢上為末用真麻油搜和成劑令硬些子不可爛旋丸如小豆大入鼻中令達痔上其痔化為水肉皆爛下每日一次妙真珠散出聖惠方治鼻中息肉不通真珠白礬一作礬石桂心細辛各一兩木通半兩銼一作通草上為細散每用半錢綿裹納鼻中日三易之一方無桂心礬石散出聖惠方治鼻齆中息肉不得息礬石藜蘆各六錢瓜蒂二十七枚附子二錢十二銖上各搗篩合和以小竹管吹藥如小豆許入鼻中以綿絮塞鼻中日再以愈為度古今錄驗加葶藶半兩赤龍散出儒門事親治鼻中肉螻蛄赤龍爪苦丁香各三十個苦葫蘆子不以多少麝香少許上為末用紙捻點藥末用之青金散出儒門事親治鼻息肉閉塞疼痛芒硝青黛各半錢乳香沒藥各少許上為細末鼻內嗅之礬石丸治鼻生息肉礬石熬令汁枯四兩木通銼細辛去苗葉各半兩丹砂研一分上為末和勻面糊為丸如小豆大每用一丸綿裹納鼻中一日一易取下息肉則止一方蜜和丸一方捻綿細如棗核沾散如小豆並綿納鼻中羊躑躅丸出聖惠方治鼻塞鼻中生息肉不通利羊躑躅花白礬礜石細研各半兩肉蓯蓉一分上為細末以青羊脂和綿裹如棗核大納鼻中日夜四五度換之以漸消爛即瘥通草散出海上方治鼻中息肉不通利通草半兩礬石真珠各一兩上為末捻綿如棗核大取藥如小豆著綿頭納鼻中日三易之一方有桂心細辛各一兩同前搗末和使之取鼻痔出本事方巴豆十二個去殼陽起石三十個石蓮心三十個上為末每用半字許搐入鼻中又用綿塊子蘸藥塞入鼻中其痔肉化爛出吹鼻散出本事方治鼻中息肉及黃疸及暴得黃疾苦丁香乃瓜蒂十四個赤小豆丁香各十四個上慢火焙乾為末入腦子少許口內先含水次將小竹管吹藥入鼻中半盞茶末多盡為度候頭疼痛時取下地膽膏出聖惠方治鼻中息肉閉塞不通腫大點藥清消生地膽細辛去苗葉白芷上等分先搗羅白芷細辛為散次將地膽壓取汁和成膏用少許塗敷息肉上取消為度亦單以地膽汁於竹筒中盛當上灌之即消無生者酒煮汁用之治鼻痔白礬火燒飛瓜蒂各一錢細辛少許上為細末入麝香少許每用一字貼在鼻內痔上一日三次不過三日即愈治鼻痔明礬一兩蓖麻七粒鹽梅五個去核上為一處入麝香少許搗杵為丸綿子包塞於鼻內令著息肉候化清水出四邊自然玲瓏其息肉自下治鼻中息肉漸大氣息不通妨悶出聖惠方藜蘆三分去蘆頭搗為末雄黃細研雌黃細研各一分上同研令勻每用時以蜜調散用紙捻蘸藥點於息肉上每日三度則自消化不得塗藥在於兩畔恐涕落於藥上又方細辛釜底墨上為末水調塗方寸匕瓜丁散一名細辛散出直指方治齆有息肉不聞香臭此藥敷之即化黃水點滴至盡不三四日遂愈不復作瓜丁即瓜蒂細辛上等分為末以綿裹如豆許塞鼻中須臾即通鼻中息肉俗謂之鼻痔無不效地龍散一名蚯蚓散出聖惠方治鼻中息肉地龍去泥沙一分豬牙皂莢一瓣上燒灰羅細先洗鼻內令淨以蜜塗之敷藥少許在內出清水盡即息肉自除胡粉膏治鼻中息肉不通胡粉炒白礬燒令汁盡等分上為末用青羊脂和成膏以少許塗敷息肉上治鼻中息肉並鼻衄出海上方用炙蝟皮為末綿裹塞之三日治鼻中息肉不聞香臭出聖惠方用燒礬石末以面脂和綿裹著鼻中數日息肉隨藥消落又方用狗頭骨灰方寸匕苦丁香半錢研細吹鼻中息化為水一方細碾灰豬脂和貼之又方出危氏方或黃柏苦參檳榔等分為末以豬脂研敷又方出直指方或青黛槐花杏仁研敷瓜蒂膏出聖惠方治鼻中息肉不聞香臭用陳瓜蒂一分為末以羊脂和成時以少許敷之一方為末少許著鼻中必消如此三四度或以綿裹末塞鼻中地膽汁出肘後方治鼻中息肉不通利用生地膽一枚取汁塗息肉上一宿得消無生者搗干為末酒漬敷之雄黃散治鼻中息肉用雄黃五兩置砂鍋中以醋煮三複時取出薄醋洗過夜露曉收三度細研如粉每服二錢溫水調下日再不出半月息肉自出神效治鼻塞息肉不通以細辛末少許吹入鼻中自通治鼻中息肉黑靨用青蒿燒灰和石灰淋汁熬為膏點息肉黑靨又方出聖惠方用蜣螂十枚納青竹筒中以刀削去竹青油單裹筒口令密納廁坑中四十九日取出曝乾入麝香少許同研細為散塗息肉上當化為水導引法治鼻息肉云端坐直腰以鼻納氣以右手捻鼻除目暗淚若出徐徐閉目吐氣鼻中息肉耳聾亦能除又云東向坐不息三通以手捻鼻兩孔治鼻中息肉又方出聖惠方用釜底墨細篩水服之三五日瘥輕黃散出衛生寶鑑方治鼻中息肉輕粉一分杏仁湯浸去皮尖及雙仁者一分雌黃半兩麝香少許上件四味淨乳缽內先研杏仁如泥膩粉雌黃麝香同研極細勻磁合子合定每有患者不問年深日近夜臥用骨箸子或竹箸點粳米大在鼻中息肉上隔一日夜臥點一次半月見效雄黃散出朱氏集驗方治鼻痔雄黃北細辛各一錢麝香少許上三味為末嗅入鼻中又方出朱氏集驗方用人中白新瓦上火逼以溫湯調服即止又方出朱氏集驗方用好香墨濃研點入鼻中鬱金散出朱氏集驗方治鼻中息肉鬱金豬牙皂角各一二兩上用水同浸一宿火煮透鬱金爛為度去皂角留鬱金焙乾次用北細辛半兩同為末入麝香硇砂各一錢或半錢拌勻煉蜜為丸如茶子大食後煎茶下十丸治鼻內生息肉出朱氏集驗方狗頭骨化灰硇砂加少許每朝嗅半錢息肉化為水治鼻中息肉鈴上用丁香末以綿包內鼻中鼻痛附論夫九竅氣所通也或塞之斯痛矣況鼻之為竅肺氣所恃出納若肺氣受風邪與正氣相搏熱氣加之不得宣通則為出納者窒矣其竅既窒而氣之鼓作無已所以乾燥而痛也方五參散治風熱壅塞鼻乾痛腦悶頭重不知香臭人參沙參丹參玄參苦參山芋茯神去木各一兩半獨活去蘆頭細辛去苗葉麻黃去根節木通銼羚羊角鎊防風去蘆白蘚皮各一兩一分山茱萸甘菊花芎藭各一兩上為散每服三錢匕米飲調下早晚各一服沒藥散出聖惠方治風冷搏於肺臟上攻於鼻則令鼻痛沒藥研一分烏蛇酒浸去皮骨炙半兩乾蠍去頭足炒天南星炮雄黃別研當歸切焙白附子炮丹砂別研牛黃別研胡黃連白芷麝香別研丁香炒甘草炙桂去粗皮各一分上除別研外搗羅為散再同研勻每服半錢匕溫酒調下早晚食後服羚羊角湯治肺風面色乾白鼻燥塞痛羚羊角鎊桂去粗皮白茯苓去黑皮細辛去苗葉麻黃去根節防風去蘆防己杏仁去皮尖雙仁炒研麥門冬去心焙各一兩上粗搗篩每服三錢匕以水一盞煎至七分去滓溫服白蘚皮湯治肺受風面色枯白頰時赤皮膚乾燥鼻塞干痛此為虛風白蘚皮麥門冬去心焙白茯苓去黑皮白芷各一兩半桑白皮切石膏碎各二兩細辛去苗葉杏仁去皮尖雙仁炒研各一兩半上粗搗篩每服三錢匕水三盞煮大豆三合取汁一盞去豆下藥煎至七分去滓早晚食後臨臥溫服秦艽湯治因高聲呼吸冷風或因哀哭傷氣或飲食熱氣所沖皆致傷肺使氣喘促皮膚風癢四肢痠疼鼻塞干痛秦艽去苗土石膏碎甘草炙桑根白皮銼升麻大黃銼炒各一兩枳殼去瓤麩炒葛根各三分上粗搗篩每服三錢匕水一盞入淡竹葉半合煎至七分去滓溫服桑白皮湯治肺壅氣促四肢痠疼鼻塞及痛桑根白皮切升麻甘草炙秦艽去苗土大黃銼炒各一兩半石膏碎葛根各三兩上粗搗篩每服五錢匕水一盞半入竹瀝一合煎至一盞去滓早晚食後臨臥溫服治鼻壅塞全蠍四個去頭足川芎二兩燈心二錢乳香半錢上為末用紙捻子臨睡蘸藥入鼻內打嚏噴三五個限二邊除瘥治鼻塞眼昏疼痛腦悶出聖惠方用苦葫蘆子碎以醇酒半升浸之夏一日冬七日少少納鼻中一方用童子小便浸之油塗方出聖惠方治鼻塞干痛用生油一盞常以雞羽掃塗鼻內外酥亦得治氣鼻方出海上名方上以石亭脂以紫色為上紅色次之黃色勿用先研令極細再滴水數點和研半日許臨臥隨多寡以冷水調勻痛搽患處明早浣去用之半月可絕除根治卒食物從鼻中縮入腦中介介痛不出出肘後方以牛脂若羊脂如指頭大納鼻中以鼻吸取脂須臾脂消則物遂脂俱出也雁鴨脂亦可用白芷散出直指方治鼻痛杏仁水浸去皮焙細辛白芷各一錢全蠍四個焙上為末麻油調敷治鼻痛出聖惠方上以杏仁五兩個去皮壓取油塗之即瘥又敷塗藥出澹寮方上用上品硫黃為末冷水調敷鼻上夜間用敷免妨見人也
