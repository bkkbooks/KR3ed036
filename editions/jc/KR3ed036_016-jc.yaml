榮腹背相引痛不能俯仰黃芩附子各一兩甘草茯神一作茯苓麥門冬去心乾地黃桂心阿膠各二兩炒半夏薑製遠志石膏各四兩生薑六兩黏糖一斤大棗二十枚上取十三味㕮咀水一斗五升煮取五升湯成下糖分四服育神散出簡易方理心氣不寧久年不愈虛弱多驚神色昏憒怔忪善忘言語無節有類癲邪心志不定飲食無味小便白濁赤石脂別研細臨時入白茯苓去皮防風去蘆人參去蘆白朮紅芍藥各等分遠志去心紫菀茸桂心去皮不見火臨時入各等分上為末每服二錢水一盞姜三片棗一枚煎七分食後服辰砂遠志丸出本事方安神鎮心治驚悸消風痰止頭眩補腎益志白附子生用石菖蒲去毛遠志去心白茯神去木人參麥門冬去心川芎山藥半夏曲鐵粉南星銼炒黃天麻各半兩辰砂別研北細辛各一錢上為細末生薑五兩取汁入水煮糊丸綠豆大別以硃砂為衣每服二十粒夜臥生薑湯下小兒減丸數一方治憂愁思慮痰氣潮作如醉如癡精神不守大便難小便濁頭目眩暈用藥與上方同但去天麻南星耳用水糊丸如梧子大每四十丸生薑薄荷湯下日午夜臥服名遠志平肝丸一方細辛用半兩其餘品味各一兩辰砂一兩四錢入藥六錢為衣十四友丸出直指方補虛益血收斂心氣怔忪昏憒神志不寧眠臥不得經曰臟有所傷情有所倚則臥不安大治丈夫白濁婦人心氣不足白茯苓去皮一兩龍齒二兩研細水飛一方用龍骨當歸酒浸紫石英研細水飛人參去蘆茯神去木黃耆蜜炙柏子仁研細酸棗仁炒香別研肉桂不見火辛辣者遠志湯浸軟去心酒灑蒸一飯久焙乾熟地黃洗阿膠蛤粉炒各一兩硃砂三錢別研上為末拌和勻煉蜜丸如梧桐子大硃砂為衣每服三十丸煎棗湯下食後臨臥服昔韓魏公云胡總干言予舊有心疾怔忡健忘夢遺夜不得睡千怪萬狀無所不有凡世所謂心藥者無不服之皆無效驗忽遇一良醫言此疾本由憂愁思慮耗散心血而得當用地黃當歸滋養平血以心主血故也如更服菖蒲之類則心氣愈散今當收斂之又心本因用過已自百虛當用黃耆阿膠等補之乃選諸家方處之大覺有效始謂收斂藥用訶子予曰訶子但入腸胃不如龍齒肉桂大行血亦欲以行諸藥運用無害也常以此傳人無不效者此十四物吾之益友故名十四友丸其言極有理茯苓補心湯出三因方治心虛寒病苦悸恐不樂心腹痛難以言心寒恍惚喜悲愁恚怒衄血面黃煩悶五心熱渴獨語不覺咽喉痛舌本強冷汗出善忘恐走及治婦人懷妊惡阻吐嘔眩暈四肢怠惰全不納食白茯苓人參去蘆前胡半夏湯洗七次去滑川芎各三錢橘皮枳殼去瓤麥麩炒紫蘇桔梗甘草炙乾薑各半兩當歸一兩三錢白芍藥三兩熟地黃一兩半上銼散每服四大錢水盞半姜五片棗一枚煎七分去滓食前服一方有乾葛無干姜平補鎮心丹出永類鈐方治丈夫婦人心氣不足志意不定神情恍惚夜半異夢忪悸煩郁及腎氣傷敗血少氣多四肢倦怠足脛痠疼睡臥不穩夢寐遺精時有白濁漸至羸弱酸棗仁去皮隔紙炒二錢半白茯苓去皮五味子去枝梗肉桂去粗皮不見火麥門冬去心茯神去皮木車前子去土碾破各一兩二錢半天門冬去心龍齒熟地黃洗淨蒸山藥各一兩半人參去蘆半兩硃砂細研為衣半兩遠志去心甘草炙一兩半上為末煉蜜丸如梧桐子大每服三十丸空心飯飲下溫酒亦得加至五十丸常服益精髓養氣血悅色駐顏此方有五味子白茯苓車前子肉桂人參酸棗仁非惟可以治心氣不足而白濁消渴尤為切要之藥局方無此六味卻有生地黃苦梗柏子仁石菖蒲當歸只宜治心氣不足腎氣傷敗血少氣多耳一方無甘草紫石英散出聖惠方治心氣不足虛悸恐畏悲思恍惚心神不安惕惕而驚紫石英細研水飛菖蒲白茯神去木白朮黃耆銼各一兩遠志去心赤小豆炒熟附子炮裂去皮臍桂心人參去蘆頭乾薑炮裂銼防風去蘆頭龍骨細研熟乾地黃各半兩上為細散每於食前以溫酒調下二錢定心湯出三因方理心氣不足榮血衰少精神恍惚夢中失精人參去蘆白茯苓去皮茯神去木黃耆蜜炙焙各三兩白朮赤石脂研川芎厚朴薑製各二兩官桂去皮一兩紫菀茸二兩麥門冬去心一兩半甘草炙一兩防風一兩上㕮咀每服三錢水一盞赤小豆七十粒煎七分食後服分氣補心湯治心氣鬱結忪悸噎悶四肢浮腫上氣喘急大腹皮炒香附去毛炒白茯苓桔梗各一兩木通甘草炙川芎前胡去苗青橘炒枳殼麩炒去瓤白朮各三錢分細辛去苗木香各半兩上銼散每服四大錢水一盞姜三片棗一枚煎七分去滓食前溫服山茱萸丸治心氣不足山茱萸杜仲去粗皮炒茯神去木枳殼去瓤麩炒甘草炙銼貝母去心炒天門冬去心焙各一兩白茯苓去黑皮麥門冬去心焙各一兩三錢生乾地黃洗切焙百部各二兩防風去叉一兩半遠志去心半兩上為末煉蜜丸如彈子大每服一丸食後細嚼麥門冬熟水下溫服熟乾地黃散出聖惠方治心氣不足讝讝惚惚朝瘥暮甚驚悸心中憧憧胸滿不下食飲陰陽氣虛脾胃不磨不欲聞人聲熟乾地黃當歸銼微炒龍骨人參去蘆頭甘草炙微赤銼桔梗去蘆頭桂心茯神枳殼麩炒微黃去瓤各一兩半夏湯洗七遍去滑三分錢黃耆三兩遠志去心白朮各半兩上為散每服三錢水一中盞入生薑半分棗三枚白粳米五十粒煎至六分去滓不拘時溫服忌炙爆熱面補心丸出醫方大成治憂愁思慮過度心血虛寒悸恐不樂舌強話難恍惚善忘愁恚面黃多汗不進飲食紫石英火煅研細熟地黃洗菖蒲茯神去木當歸去蘆附子炮去皮臍黃耆去蘆遠志去心炒川芎桂心不見火龍齒各一兩人參半兩上為末煉蜜丸如梧桐子大每服七十丸不拘時以棗子湯下龍齒湯出直指方治理心下怔忡常懷憂慮神思多驚如墮險地小便或赤或濁官