body:
  text: 卷二百五十五雜治門卒死附論夫卒死者由三虛而遇賊風也所謂三虛者謂乘年之衰一也逢月之空二也失時之和三也人有三虛而為賊風所傷使陰氣偏竭於內陽氣阻隔於外二氣壅閉故暴絕如死也內經云出入廢則神機化滅升降息則氣立孤危蓋謂是也若臟腑氣未竭者良久乃蘇然亦有挾鬼神之氣而卒死者鬼邪退乃活也凡中惡及卒忤卒然氣絕其後得蘇若其邪氣不盡者即停滯心腹令人腹病或身體沉重不能飲食而成宿疾變而成疰也甲乙云得三虛者乘年之衰逢月之空失時之和因為賊風所傷也得三實者逢月之滿得時之和有年之盛遇賊風邪氣不能傷也方五神返魂丹出聖惠方治卒死但有微氣心上稍暖者硃砂半兩牛黃半兩安息香半兩砒霜半兩大蜘蛛五枚重午日採袋內盛通風勿死上先研四味方入蜘蛛又研勻另用不蛀皂莢三寸去黑皮以水三合搗汁便入粟米飯煮令水盡和丸如梧桐子大如中惡卒死及急風者但有微氣以新汲水研下一丸如昏迷加一丸立活無疾常服一丸至老無病治男子婦人小兒忽然行坐地死去用銅鑼金鼓眾人亂叫不移時自張口眼以熱湯灌之即認得人笑也必安南嶽紫虛魏元君起死回生散出聖惠方凡卒死者皆因一時閉氣不通原非病久命絕不救則枉死當以此藥治之用半夏一味無制度為細末以竹筒蘆筒鵝翎管吹入兩鼻死半日心頭尚溫不過三四次或噴嚏吐痰涎但元氣一通即回生矣百發百中真仙方也所謂卒死者中風死痰厥死氣死產死打死溺死自縊死中暑死諸癇死咽喉死乳鵝死心痛死小腸氣死魘死腳氣死跌死驚嚇死牆壓死鬼迷死絞腸痧死凍死針灸死受杖死失血死椒閉死醉死頭暈死煙搶淘井死諸毒蟲傷悶亂死凡居家或出路須以此藥隨身骨硬者亦可吹之刺噴嚏而出兼治六畜雖非人亦物命也一方云昔有人忽遇一異人遍身雪白自云吾即救人之藥凡人非命已死無氣吾能生之吾即半夏也可用吾為末以竹筒吹之入鼻中良久即蘇後用果驗治卒死無脈無他形候陰陽俱竭故也出千金方上牽牛臨鼻上二百息牛舐必瘥牛不肯舐著鹽汁塗面上牛即肯舐又方出千金方治卒死而四肢不收失便者用牛馬屎絞取汁飲之無新者水和乾者亦得肘後方云乾者以水溺解之此扁鵲法一方用馬屎一升水三斗煮取二斗洗足又取牛洞稀糞和一升溫酒灌口中灸心下一寸臍上三寸臍下四寸各一百壯瘥又方出聖惠方扁鵲云治忤有救卒符並服鹽湯法恐非當世所能故不載而此病在人所謂卒死與中惡鬼擊相類為治參取而用之已死者可活用搗菖蒲生根絞汁灌之立瘥一方為末吹鼻中又末納舌下屍厥之病雖死脈猶動聽耳中如微語聲股間暖是也治卒死壯熱者出聖惠方用礬石半斤水一斗半煮礬石消以浸腳及踝即蘇救卒死或先病或常居寢臥奄忽而絕皆是中惡出聖惠方上割雄雞冠取血塗其口干後復塗並以灰布死人一周一方塗喉中又吹喉中亦可塗其面吹鼻中妙治卒死而目閉者及救死或先病或常居寢臥奄忽而絕皆是中惡上騎牛臨其面搗薤汁灌耳中又末皂莢吹鼻中妙一方薤汁灌鼻中南嶽夫人方出聖惠方治卒死用搗女青屑一錢安喉中以水或酒下立活亦可醋下蔥刺耳方出聖惠方上以蔥刺耳中鼻中血出者勿怪無血難療有血者是活候也其欲蘇時當捧兩手莫放之須臾死人自當舉手撈人言痛乃止男刺左鼻女刺右鼻孔令入七寸余此方大良立效亦療自縊死療卒死而有脈形候陰氣先盡陽氣後竭故也用嚼薤哺灌之追魂湯出三因方治卒厥暴死及主客忤鬼擊飛屍奄忽氣絕不覺口噤麻黃去節三兩杏仁去皮尖二百五十個甘草炙一兩上為銼散每服四錢水一盞半煎七分去滓灌之通治諸客忤或口噤不開去齒下湯湯入口活不下分病人發左右捉搦肩引之藥下漸蘇令服盡取效千金方有桂心二兩金匱云寸脈沉大而滑沉則為實滑則為氣氣實相搏血氣入臟則死入胃則愈若卒厥唇口青身冷為入臟即死身和汗出則愈治中熱死出傳信適用方以本頭巾湯浸洗汁服救卒死亦治中惡出金匱方用雞肝及血塗面上以灰圍四旁立起治忤卒死心猶暖宜用此法出聖惠方上取蔥白納於下部及鼻中須臾即活又方出聖惠方截㹠尾取血灌之並縛㹠以枕之死人須臾活又方出聖惠方用小便灌其面數過即能語此是扁鵲法治煙薰迷悶欲死者以蘿蔔汁灌之立活干則水擂亦可又方出千金方以熨斗灸兩脅下備急方云又治屍厥治疫死者出本草用返魂香燒之死者聞香再活按漢書武帝時西國進返魂香云聚屈洞中上有返魂樹採其根於釜中以水煮候成汁去滓重火煉之如漆候凝則香成也治忤死出本草先以衣三重覆忤死人腹上乃取銅器若瓦器盛熱湯著衣上湯冷則去衣大冷更換湯即愈治卒暴亡未移時者出本草取臘月雄狐膽溫水微研灌入喉即活常須預備救人移時即無及矣起卒死救生丹華佗中藏經方大黃半兩濕紙煨膩粉半兩硃砂一分雄黃一分巴豆七個去皮去油上用鯤魚膽汁丸雞頭大用童子小便下一丸斡開口灌之納大蔥尾一寸許入鼻中如人行五七里當吐涎即愈治睡死者用蠡實根一握水絞取汁稍咽之口噤灌之蠡實即馬蘭自縊附論仲景云凡自縊死心下微溫者一日猶可活葛氏云心下倘微溫雖久猶可活二家所論必須有暖氣陰陽未盡根本尚存猶可以救苟非此雖死未久必不活也大抵自縊以升降出入之氣暴絕不通若解其繩有法者固有復生之理解失其理體雖尚溫不能無害所謂救經引其足也仲景葛氏各有辨證並解繩法宜詳審之凡自縊若覺才死徐徐捧下其陰陽經絡雖暴壅閉而臟腑真氣尚或未盡所以猶可救療若見其垂掛忽遽截斷其繩則不可救此言氣已壅閉繩忽暴斷其氣雖通而奔迸氣不能還即不復得生又云自縊死旦至暮雖已冷必可活暮至旦則難療謂其晝則陽盛其氣易通也夜則陰盛其氣難通也又云夏則夜短又熱則易活又云氣雖已斷而心微溫一日以上猶可活也蓋夏時夜短於晝又熱猶應可療心下微溫者一日以上猶可活然皆徐徐抱解不得絕截繩上下安被臥之一人以腳踏其兩肩手稍挽其發長如弦勿縱之一人以手投據胸上微重之一人摩膊臂腕屈伸之屍若僵但漸漸強屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須以少桂心湯及粥清含與之才令濡喉漸漸能咽乃稍止耳兼令兩人各以管吹其兩耳彌好此最善無不活者治自縊死出千金方凡救自縊者極須按定其心勿絕繩手抱之徐徐解之心下尚溫者以氍覆口鼻兩人吹其兩耳一方以衣物塞兩耳將竹筒納口中重吹氣入仍塞口邊莫令氣出可活又方出千金方治自縊死及中惡氣欲絕者用皂莢細辛搗屑如胡豆大吹兩鼻中又用皂莢末以蔥葉吹鼻中又方出十便良方刺雞冠血出滴著口中即活男雌女雄塗喉亦可一方男雄女雌又方出肘後方用雞屎白如棗大酒半盞和灌口及鼻中佳又方出千金方用梁上塵如大豆許各納一小竹筒中四人各捉一筒時吹兩耳兩鼻即活又方出千金方用尿鼻口眼耳中並捉頭髮一撮如筆管大掣之立活治自縊急救之方出肘後方急手掩其口鼻勿令內氣稍出二時許氣至即活治自縊急救方出十便良方牽起其頭髮以物塞兩耳以蔥葉刺鼻中兩人極力痛吹之齧其兩腳跟即活亦可塞鼻而吹其口亦活也一方捉其頭髮令其足才至地一時許即活治自縊死出千金方以藍青汁灌之治自縊死出聖濟總錄以松子油納口中令得入咽中便活又治溺死治自縊死救之未活以車載之法出聖濟總錄以絹纏身體令堅以牛車載行三十里許使人於車上立踏肩引發吹耳治邪厲縊溺魘死中暑凍死諸卒死或先疾病及寢臥忽然而絕皆是中惡出經驗良方用蔥黃心或韭黃於男左女右鼻中刺入深四五寸令從目中出血即活又方出聖惠方用綿浸好酒半盞用手按住患人手足勿令驚滴酒入鼻中又方出聖惠方視其上唇裡弦有青息肉如黍米大以針決去之瘥又方出經驗良方用羊屎燒煙熏鼻中又方出肘後方治心下尚微溫久猶可活徐徐抱解繩懸發令去地五寸許塞兩鼻孔以蘆筒納其口中至咽令人噓噓有頃其腹中礱礱轉是氣通也仍噓之若活了能語乃可置若不懸可中分發兩手牽之使發懸又方治自縊死用繩燒三指撮服之治五絕一曰自縊二曰牆壁壓三曰溺水四曰魘魅五曰產乳凡五絕皆以半夏一兩搗篩為末丸如豆大納鼻中愈心溫者一日可活溺水附論凡人沉溺水中水入腹則冷氣閉暴絕而死救活之法宜泄其水使氣得通則可復活若救之後時水不得出心下不溫者難活或經半日及一日猶有可療者謂其氣雖絕心下猶溫則亦可活也方治溺水死已經半日上取大甕覆地以溺死人腹伏甕上以微火於甕下然之正對死人心下須臾死人心下甕暖口中水出盡則蘇勿令過熱治溺水蔥汁導水取不蛀皂莢為細末以蔥白汁或棗瓤和丸如棗核大納下部中導其水自出治溺死酒灌活倒垂死人以好酒灌鼻中又灌下部或醋灌鼻中亦得治溺水死者上臥倒瀝卻水便於肚上多著灰掩之仍以皂莢末吹鼻中即活治溺死石灰壅之得活上取石灰壅之候下部中水出盡即活一方綿裹石灰納下部治溺水死導水取皂莢為末綿裹納於下部伏面向下須臾水從口鼻中出仍多取灰覆藉水盡即活治落水死以灶中灰布地令厚五寸以甑側著灰之上令死者伏於甑上使頭小垂下炒鹽二方寸匕納竹管中吹下孔中即當吐水水下因去甑以死者著灰中擁身使出鼻口即活又方掘地作坑熬數斛灰納坑中下死人覆灰濕徹即易勿令大熱㷮人灰冷更易半日便活又方取大甑傾之死人伏其上令死人口臨甑口然葦火二三把燒甑中當死人心下令煙出少入死人鼻中水出盡則活火盡後益之常以手候死人身及甑勿令甚熱當令火氣能使死人心下得暖卒無甑者於岸側穿地如甑空心下如蛀燒令暖以死人著上亦可用車轂為之勿令隱其腹令死人低頭水得出並炒灰數斛令暖以數粉身濕更易溫者外臺秘要甑作甕又方但埋死人暖灰中頭足俱溫惟開七孔水出即活又方便脫取暖釜覆之取溺人伏上腹中出水便活一方作暖衣覆之救溺水法凡人溺水者救上岸即令溺水之人將肚橫覆在牛背上兩邊扶策徐徐牽牛而行以出腹內之水如蘇即以蘇合香丸之類或老薑搽牙若無牛以活人於長板凳上仰臥即令溺水人如前法將肚抵活人身上水出則活又灸臍中百壯治溺水心頭尚溫用人抱定令頭微仰令口於鼻中吸出黃水卻先用綿絮熰其下體及陰囊處即活如無綿絮可用灰數十籮通體埋蓋只留面在外令頭仰亦可活凡溺死一宿尚可救屈死人兩腳著生人肩上以死人背貼生人背擔走吐出水即活亦療凍死又方倒懸解去衣去臍上垢令兩人以筆管吹其耳中又方熬熱沙覆死人面上下著沙只留出口鼻耳沙濕冷換之又方或熱沙或炒熱灰將溺者埋於其中從頭至足水出七孔即活又方出聖惠方解死人衣灸臍中即活數方皆效多以為氣絕而不可傷數方從便而用之又方出危氏方以酒罈一個以紙錢一把燒放壇中急以壇口覆溺水人面上或臍上冷則再燒錢紙於壇內覆面上去水即活凍死附論夫人有在路途逢風寒苦雨繁霜大雪衣服沾濡冷氣入臟致令陽氣絕於外榮衛結澀不復流通故噤絕而死若早救療血溫氣通則活又云凍死一日猶可活過此則不可療也方治凍死出聖惠方於冬月落水四肢凍直口噤尚有微氣者或因風雨霜雪冷氣入臟陽氣暴絕致噤絕凍死者上以大器中多放熬灰使暖囊盛以搏其心冷即更易心暖氣通目則得轉口亦及開可與溫酒及粥清稍稍咽之即活若不先溫其心將灰灸其身冷氣與火相搏即不活也治凍死人救活宜與此藥一兩服出傳信適用方水姜一兩和皮銼碎陳皮不去白一兩銼碎上共用水三盞煎至一盞半放溫與服不可冷不可熱又方出經驗良方用氈或藁薦裹之以索結定放在平穩處令兩人對面輕輕滾轉往來如捍氈法四肢溫和即活仍灸臍中三五壯冬月凍倒人急與冷水一兩口扶在暖溫處不得與熱湯及向火必死雪泥中行便近火即腳指隨落入井塚悶附論夫肘後云此事他方少有其說且人寡為之不俟別條今於凍死之後附此乃是地氣熏蒸蓋亦障霧之例服諸解毒犀角雄黃麝香之屬豉豆竹瀝升麻諸湯應為佳方療入井塚悶冒出十便良方凡五月六月井中及深塚中皆有伏氣入中令人鬱悶殺人如其必須入中者先以雞鴨雜鳥毛投之直下至底則無伏氣毛若徘徊不下則有毒氣也亦可納生六畜等置中若有毒其物即死不必入若無六畜當先以酒數升滴灑井塚中四邊畔停少時然後可入若覺中有些氣鬱悶奄奄欲死者還取其中水灑人面令飲之又以灌其頭及身體即活若無水取他井水用可也夏月不可淘井多致殺人出傳信適用方宜先以雞毛放井中試之如搖動不肯便下是有毒氣不可入古塚亦然五月七月尤甚如已中毒以水噀其面並含水調雄黃末一二錢轉筋入腹痛甚者使四人捉手足灸臍右邊二寸十四壯又生薑一兩擘破酒五盞煮濃頓服又醋煮衣絮令溫裹轉筋處又濃煮鹽湯通洗手足胸脅間療入井塚毒氣取他井中水灑身上至三食頃便活東井取西井南井取北井水用之又方出肘後方治五月七月深井塚有毒氣殺人入遇毒者以水噀其面並含水以雄黃犀角麝香調服怪疾雜病附論千金論云聖人之道以慈濟物博求眾藥以戒不虞倉卒之際應手皆得故有萬病方焉凡以諸方散在群典乃令學者難於討尋遂鳩撮要妙以為斯品庶使造次可得好事君子安不忘危無事之暇可預和合以備治療也方耆婆萬病丸出千金方治七種痞塊五種癲病十種疰忤七種飛屍十二種蠱毒五種黃病十二時瘧疾十種水病八種大風十二種𤸷痹並風入頭眼暗昏膜及上氣咳嗽喉中如水雞聲不得眠臥飲食不作肌膚五臟滯氣積聚壅閉不通心腹脹滿連及胸背氣鼓堅結流入四肢或脹又心膈氣滿時定時發十年二十年不瘥五種痢疾赤白諸蟲上熱下冷久積痰飲令人多睡清瘦無力陰入骨髓便成滯患身體氣腫飲食嘔逆腳腰痠疼四肢沉重行立不能久婦人因產冷入子臟臟中不淨或塞閉不通胞中瘀血冷滯出流不盡時時疼痛為患或因此斷產並小兒赤白下痢及狐臭耳聾鼻塞等病此藥萬病悉除故稱萬病丸以牛黃為主故一名牛黃丸以耆婆良醫故名耆婆丸牛黃麝香犀角各一分茯苓桑白皮乾薑桂心當歸芎藭芍藥甘遂黃芩蜀椒細辛桔梗巴豆前胡紫菀蒲黃葶藶防風各一分蜈蚣三節人參一寸硃砂一分石蜥蜴一寸雄黃黃連大戟芫花禹餘糧芫青以上各一分上並令精細除牛黃麝香犀角硃砂雄黃禹餘糧巴豆別研余者合搗重絹下篩以白蜜更搗三千杵密封下破除日旦空腹酒服三丸如梧桐子取微下三升惡水為良若卒暴病不拘平旦早晚皆可服但以吐利為度不得限以丸數病強藥少即不吐利更非他故若其發遲以熱薑汁投之若吐利不止即以醋飲兩三口止之服後忌陳臭生冷醋滑飯食大蒜豬雞魚狗牛馬驢肉白酒房事七日外始得一日服二日補之得食新米韭菜汁作羹臛粥飲食三四頓大良亦不得全飽產婦勿服吐利以後常須閉口少語於無風處溫床暖室將息若旅行卒暴無飲以小便送之為佳若一歲以下小兒有疾者令乳母服兩小豆亦以吐利為度近病及卒病皆用多積久病即少服常取微溏利為佳卒病垂死服三丸如小豆大吐利即瘥諸有痰停飲者亦得服卒中惡口噤服二丸如小豆暖水一合灌口令下微利即瘥諸有痰飲者服三丸如小豆五疰鬼刺客忤服二丸如小豆不瘥後日更服三丸男女客邪歌哭無時腹大如妊娠服如小豆日三夜一間食服之下痢服一丸如小豆日三貓鬼病服三丸如小豆未瘥更服蠱毒吐血腹痛如刺服二丸如小豆不瘥更服瘧病未發前服一丸如小豆不瘥後日更服冷癖服三丸如小豆日三間食服之常令微溏利宿食不消服二丸如小豆取利癥瘕積聚服二丸如小豆日三皆間食服之以利瘥止拘急心腹脹滿心痛服三丸如小豆不瘥更服上氣喘逆胸滿不得臥服二丸如小豆不瘥更服疳濕以一丸如杏仁大和醋二合灌下部亦服三丸如小豆鼻衄服二丸如小豆即瘥水病服三丸如小豆日二皆間食服之瘥止人弱隔日服之頭痛惡寒服二丸如小豆覆取汗傷寒時行服二丸如小豆日三間食服之小便不通服二丸如小豆不瘥明日更服大便不通服二丸如小豆又納一丸下部中一丸即通耳聾耳聤以線裹一丸如小棗核大塞瘥腫疔腫破納一丸如麻子大日一敷其根出瘥自犯疔腫血出以豬脂和敷入孔內孔中瘥止胸背腰脅腫以醋和敷腫上日一易又服二丸如小豆癩瘡先以醋泔水洗後取藥和豬脂敷之瘻瘡有孔以一丸如小豆納孔中兼和豬脂敷之痔瘡取藥塗線筋上納孔中日一易瘥止瘰癧以醋和敷上瘥刺惡以一丸納瘡孔中即瘥諸冷瘡積年不瘥者以醋和塗瘡上作餅子貼之瘥癬瘡先以布揩令汁出後取和敷上一日一易立瘥蠍螫以少許敷螫處蜂螫以少許敷螫處蝮蛇螫取少許納螫處若毒入腹心悶欲絕者服三丸如小豆大婦人諸疾胞衣不下服二丸如小豆取吐