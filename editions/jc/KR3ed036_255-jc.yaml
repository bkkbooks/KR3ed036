蒲湯下氣刺撮痛陳皮湯下腹脹滿悶蘿蔔湯下咳逆滿悶柿葉湯下小腸冷氣疼水鹽湯下膈氣翻胃丁香湯下小兒羸瘦藿香湯下脾寒瘧疾草果湯下癲狂失志柳桃湯下小便頻並茴香湯下十種水氣腫豬苓湯下血痢槐花甘草湯下五般淋瀝燈心湯下盜汗出龍膽草湯下酒積肚腹痛溫酒下赤白痢煎陳皮湯下中暑熱者沙糖水下水瀉不調生薑湯下山嵐瘴氣不服水土溫酒下婦人赤白帶下艾醋湯下阿魏藥煎治百病阿魏四分豆蔻仁七顆細研生薑十二分人參甘草炙各八分鱉甲十二分炙藕汁地黃汁各二分訶黎勒七枚去核牛膝半斤白蜜一升上為末地黃等汁煎次下藥微火煎攪勿住候如餳於不津器盛每服取一匙酒和服之萬病無憂散治風疾瘡腫疥癬或臟腑積冷壅滯氣結風勞膀胱宿冷臟腑虛衰面色萎黃內有症痞氣並常有疳蟲蛔蟲攻心腹俱痛中傷寒頭痛難忍狀若山嵐時氣瘟疫之疾並宜急服此藥宣通三五行立瘥或中風口喎語多謇澀睡後口中涎出不限時節不問男子婦人但五日一服不過三服永瘥久患腰膝疼痛腳氣腫滿運動艱難飲食無味並小兒疳痢脫肛者量大小與服一二錢行自瘥大人久泄氣痢狀若休息痢止有時但一服取下冷膿血一二升當日見效藥無四時冷熱老幼衰弱病患悉皆除之任服他藥無效蓋緣此藥搜出臟腑中積滯蟲膿故也無孕婦人久患血虛氣弱痿黃無力者亦可依方服宣通氣血自不困倦此藥凡有百病並治之其功不可具載婦人或孕陰晦時節不可服天道清明可進若雖服而疾未愈者再服妙黃耆木通桑白皮陳皮各一兩胡椒白朮木香各半兩白牽牛炒四兩別取頭末上七味為細末每服二錢牽牛末二錢生薑二錢切片煎薑湯一大盞調藥須臾又用生薑湯或溫湯送下平明可快利行三五次無妨如病息後以白粥補之痊矣一方用黑牽牛微炒為末另作一處臨時量虛實加減依前藥服如氣體稍強多著牽牛末少著七味藥弱者反此經驗方云利路耿運管望之二年前得肺疾甚異晝則右鼻濁涕終日夜則清涕如水不止良以為苦醫者只用治肺藥以辛荑為主幾年雖少損終不盡去後年余客親戚王發運家又苦腫唇高於鼻飲食不能進齒亦盡腫家有一藥用些黑牽牛才服畢瀉一兩行其腫即退初甚疑之恐牽牛之為害也腫既甚不得已進一服連瀉兩行不移時腫盡消所苦涕即止一藥而攻二病異哉異哉妙香丸治一切久遠沉積傷寒結胸太陽厥證燥郁攻不開者皆可服亦曰太聖丸巴豆去皮不去油膩粉硇砂硃砂水銀各一錢錫結砂子龍腦麝香牛黃各少許上為末煉蜜和丸如皂子大急藥時要用一丸分作二丸搏作小豆子大冷水投煎大黃湯下復烹茶一碗熱服便利一方用蠟丸無硇砂加金枸杞酒治五內邪氣消渴風濕下腦脅氣頭痛堅筋骨強陰利大小便填骨髓長肌肉破除結氣五勞七傷去胃中宿食利耳目止衄血吐血風痓補中逐水破積瘀膿血通淋長髮傷食寒瘴癘毒氣煩躁滿悶虛勞喘息逐熱破血腳氣腫痹悉主之糯米一石麥曲即常酸酒米一石用曲一斗此藥米亦得麥加五升彌加米用之惟上好者枸杞根二十斤赤皮寸半銼之以水一石漬經宿刮皮三日煮取汁五斗生地黃二十斤洗去土細切和米炊之秋麻子三斗熬蒸成細粉蒸氣出以枸杞湯淋取汁二斗香豉二斗以枸杞湯煮取汁上四味和米蒸之三物藥汁總合得五斗地黃濕即用四斗分半拌米分半及曲和釀飯如人煩即總和一處密蓋甕口經二七日壓取泥封復經七日初一度一釀用麻子二斗多恐令人頭痛酒服忌生冷醋滑雞魚面蒜油膩白酒房室等服訖一二十日將息病盡久服即少忌之奪命散治男子婦人心中積熱停痰腸垢諸毒變成百病酒面食積痃痞氣塊小腸疝諸般膈氣反胃吐食胸膈痞悶脅肋疼痛嘔吐痰逆頭目昏重偏正頭風或驚怖口苦舌乾噎氣醋心腹脹如鼓大便不通小兒赤沃飲食過多不生肌肉心中煩躁面色萎黃肌體羸瘦困倦少力夜多盜汗脾胃不和瀉痢膿血久而成血痞血瘕並皆治之每服三錢用好無灰酒一大盞少飲晚食臨臥服之仰臥睡一二更待藥行微利三兩行此藥不損真氣如婦人室女血脈不行加木香沉香枳殼煎當歸湯調服小腸氣用乾漆麥糵木通炒茴香煎湯服木通乾漆二味量病虛實用錦紋大黃四兩去皮炒存性麥糵一兩半炒檳榔七錢半茴香瞿麥地萹蓄各二錢半上為細末每服虛實加減錢數隨證湯酒服之仙人玉壺丸出千金方雄黃藜蘆丹砂礬石巴豆以上各二兩八角附子等分上先搗巴豆三千杵次納礬石又搗三千杵次納藜蘆三千杵次納附子三千杵次用雄黃三千杵次納丹砂三千杵又搗萬杵佳密封不開若用者納丹砂真珠四兩每納藥輒治五百杵納少蜜恐藥飛揚治藥用旺相吉日良時童子齋戒為良天晴明日無雲霧白晝藥成封密器中勿泄氣著清潔處大人服丸如小豆欲下病者宿勿食平旦服二丸不知者以暖粥飲發之令下下不止飲冷水以止之病在膈上吐膈下利或但噫氣即已若欲漸除及將服消病者服如麻豆大二丸卒中惡欲死不知人以苦酒沖湯和二丸日再男女與鬼交通歌笑或哭無常或腹大絕經狀如妊娠漿水服二丸如胡豆大日三夜一又苦酒和令如飴每旦敷手間使心主心主在手腕後第一約橫紋中指至暮又敷足三陰三陽及鼻孔七日愈又將服麻子大一丸日三服止惡風逆心不得氣息服一丸腹中如有蟲欲鑽脅出狀急痛一止一作是惡風服二丸憂恚氣結在胸心苦連噫及咳胸中刺痛服如麻子大三丸日三腹痛脹滿不食服一丸心腹切痛及心中熱服一丸如麻子大日三服五日瘥風疝寒疝心疝弦疝每發腹中急痛服二丸卒上氣氣但出不入並逆氣衝喉胃中暴積聚者服二丸日再腸澼隱疹平旦服一丸腹中三蟲宿勿食明旦灸牛羊肉三臠食須臾進三丸如胡豆大日中當下過日中不下更二丸爛蟲必下卒關格不得大小便欲死服二丸卒霍亂心腹痛腹滿吐下手足逆冷服二丸傷寒嗽澀時氣熱病溫酒服一丸厚覆取汗不汗更服寒熱往來服一丸瘧未發一丸已發二丸便斷寒熱老痞積服二丸日三癥結堅痞一丸日三取愈下利重下者一丸取斷食肉不消腹堅脹一丸立愈若淋瀝瘦瘠百節痠疼服一丸日三頭卒風腫苦酒若和膏敷之線裹癰疽痤癤瘰癧及欲作瘻以苦酒和敷之若瘡不可名瘑疥疽以膏同苦酒和先以鹽湯洗瘡去痂拭乾敷之齒痛綿裹塞孔中鼠瘻以豬脂和敷瘡起駁舌狗子舐之中水毒服二丸若已有瘡苦酒和三丸敷之耳聾膿血汁出及卒聾以赤穀皮裹二丸納之風目赤或癢視物昏膜淚出眥爛蜜解如飴塗注目佳若為蠱毒所中吐血腹內如刺服一丸如麻子稍加如胡豆大亦以塗鼻孔中又以膏和貼腹背上亦可燒之熏口及鼻若為蛇蝮諸毒所中及猘犬狂馬所咋苦酒和敷之又水服二丸婦人產後余疾及月不通往來不時服二丸日再婦人胸中苦滯氣氣息不利小腹堅急繞臍絞痛漿服如麻子一丸稍加之如小豆大小兒百病驚癇痞塞及有熱百日半歲者以一丸如黍米大置乳頭飲之一歲以上如麻子一丸和服上件細末大缽中滾伴兩日令極勻和糯米粉二兩添水煮糊阿膠膏和藥搗二千餘杵丸如雞頭大焙令一分干瓷瓶收置暖處但此方修合雖好然亦遲滯不若修銼生料眾藥同生姜半斤或七兩甘草三兩於瓷瓶內用水一斗五升上下文武火煮水乾為度仍除干松白茅檀香縮砂仁藿香葉勿煮焙搗為末庶香氣全所有煮者眾藥亦作一處焙搗為末末就了卻令研腦麝同香松茅數件大缽中滾三二日令藥味和合方搗為丸煮藥下水之訣以水高眾藥一寸余許文武火煮若火上藥無味卻酌量時候風為萬病之根源蓋五臟所受不同而引起病證有異善衛生者日三飲送下小兒大腹及中惡熱毒食物不化結成積聚服二丸小兒寒熱頭痛身熱及吐哯服一丸如麻子大小兒羸瘦丁奚不能食食不化漿水服二丸日三又苦酒和如桐子大敷上良一切萬病量之不過一二丸莫不立愈欲行問孝省病服一服又一丸繫頸上行無所畏至喪家帶一丸闢百鬼若獨自宿山澤塚墓社廟叢林之中燒一丸百鬼不敢近仍以蠟和一丸如彈子大著鋒囊中系肩上男左女右山精鬼魅皆畏之硃砂鶴頂丹治諸疾半夏姜炮製杏仁去皮尖山豆去皮油各四十九宿蒸餅四兩去皮干胭脂二錢為衣上同搗為泥滴醋為丸小豆大每服十丸加至十五丸此藥治二十一等證心腹膨脹陳皮湯或米湯下傷寒陳皮湯下白痢乾薑湯下赤痢甘草湯下血痢當歸湯下大小便不通磨刀水下心氣疼菖蒲根湯下心疼痛醋湯下冷病艾湯下勞氣米湯下小腸氣茴香湯下腎臟風木瓜湯下腸風痔漏瀉痢槐花湯下吐血丁香湯下陰毒傷寒蔥白湯下瘧疾桃心湯下噎食木香湯下小兒癱痹皂莢子湯下小兒驚風薄荷湯下小兒五疳八痢米湯下五咳人參馬兜鈴湯下一名鶴頂丹一方有硃砂三錢為衣湯酒食物隨下臍腹疼痛鹽湯下腰疼腳氣牽牛湯下水瀉車前子湯下婦人月水不調紅花芍藥湯下
