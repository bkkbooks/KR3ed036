body:
  text: 卷二百三十四虛勞門虛勞心腹痞滿附論夫虛勞之人氣弱血虛榮衛不足復為寒邪所乘食飲入胃不能傳化停積於內故中氣痞塞胃脹不通使人心腹痞滿也方參苓煮散治虛勞心腹痞滿不思飲食胸膈不利人參白茯苓去黑皮丁香木香桂去粗皮益智去皮青橘皮湯浸去白焙芎藭蓬莪朮炮銼乾薑炮附子炮裂去皮臍各五錢遠志去心白朮厚朴去粗皮各五錢黃耆銼炒半夏湯浸二次用生薑汁炙當歸切焙京三稜炮銼神麯炒麥糵炒各一兩肉豆蔻去殼檳榔銼訶黎勒煨去核各五枚上為散每服三錢入鹽少許水一盞煎至七分去滓溫服乾地黃丸出千金方治血虛勞胸腹煩滿疼痛瘀血往來臟虛不受谷氣逆不得食補中理血乾地黃二兩當歸乾薑麥門冬甘草黃芩各二兩厚朴枳實防風大黃細辛白朮各一兩茯苓五兩前胡六分人參五分虻蟲䗪蟲各五十枚乾漆一兩上為末蜜和丸如梧桐子大先食服十丸日三稍加訶黎勒湯出聖惠方治虛心勞心腹痞滿脅肋妨悶不思飲食訶黎勒煨去核赤茯苓去黑皮陳橘皮湯浸去白焙前胡去蘆頭各一兩白朮紫蘇葉黃耆銼人參檳榔銼草豆蔻去皮各三分桔梗炒木香甘草炙銼桂去粗皮各五錢上為散每服三錢水一盞入生薑一分切碎煎至七分去滓溫服木香煮散治虛勞冷氣心腹痞悶腸鳴腹痛飲食減少木香白朮縮砂去皮益智去皮藿香用葉人參各一兩丁香五錢陳橘皮湯浸去白焙青橘皮湯浸去白焙各四兩桔梗炒三兩桂去粗皮厚朴去粗皮生薑汁炙各二兩高良薑一分甘草炙銼五錢上為散每服三錢水一盞入生薑三片棗二枚擘破煎至七分和滓稍熱服如不及煎入鹽少許如湯點服木香散出聖惠方治虛勞冷氣不和氣攻心腹痞滿不思飲食木香五錢訶黎勒一兩煨用皮人參去蘆頭桂心白朮京三稜炮銼芎藭檳榔赤茯苓桔梗去蘆頭枳實各三分麩炒微黃陳橘皮湯浸去白瓤焙一兩吳茱萸湯浸七次焙乾微炒甘草各一分炙微赤銼上為散每服三錢水一中盞煎至六分去滓不計時候溫服人參煮散治虛勞心胸痞悶腹脅虛脹補虛進飲食人參去粗皮陳橘皮湯浸去白焙鱉甲去裙襴醋炙各一兩附子炮裂去皮臍縮砂仁去皮桂去粗皮乾薑炮柴胡去皮桔梗微炒當歸各三分切焙五味子甘草銼炒各五錢上為散每服三錢水一盞入生薑二片鹽少許同煎至七分去滓溫服每日空心午前日晚各一茵陳煎丸治虛勞下焦虛冷心腹痞滿吃食無味舌澀口乾四肢少力健脾胃茵陳蒿三兩搗為末用醋一升煎為膏鱉甲去裙襴醋浸炙令黃色京三稜煨杵碎各一兩附子炮裂去皮臍枳殼去瓤麩炒桂去粗皮青橘皮湯浸去白焙各五錢柴胡去苗一兩白朮五錢厚朴去粗皮生薑汁塗炙吳茱萸水浸一宿焙乾炒各一兩乾薑炮製五錢上除茵陳外搗羅為末用茵陳煎和為丸如梧桐子大每日空心生薑湯下三十丸如和不成更入熱蜜半夏散治虛勞心腹痞滿胸膈壅悶不思飲食半夏湯浸七次去滑鱉甲塗醋炙令黃去裙襴白朮人參去蘆頭黃耆銼赤茯苓各一兩桔梗去蘆頭甘草微炒銼木香各五錢桂心前胡去蘆頭陳橘皮各一兩湯浸去白瓤焙上為散每服三錢以水一中盞入姜半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩莧菜厚朴丸出聖惠方治虛勞冷氣心腹痞滿四肢少力不欲飲食厚朴一兩去粗皮塗生薑汁炙令黃熟木香五錢桂心附子各三分炮製去皮臍人參五錢去蘆頭黃耆三分陳橘皮湯浸去白瓤焙訶黎勒煨用皮白朮草豆蔻各一兩去皮乾薑炮製銼當歸各半兩上為末煉蜜搗和二三百杵丸如梧桐子大每食前生薑湯下三十丸白朮丸出聖惠方治虛勞冷氣心腹痞滿不思飲食四肢少力疼痛白朮一兩人參當歸各三分去蘆頭桂心附子各一兩炮裂去皮臍木香三分桔梗去蘆頭陳橘皮湯浸去白瓤焙訶黎勒煨用皮石斛去根銼黃耆各一兩銼吳茱萸五錢湯浸七次焙乾微炒上為末煉蜜和搗二三百杵丸如梧桐子大每服食前以溫酒下三十丸草豆蔻丸出聖惠方治虛勞心腹痞滿脅下妨悶不思飲食草豆蔻一兩去皮木香五分當歸三錢前胡去蘆頭人參去蘆頭檳榔白朮訶黎勒各一兩煨皮焙赤茯苓桂心陳橘皮湯浸去白瓤焙五錢上為末煉蜜和搗三二百杵丸如梧桐子大每服食前以生薑湯下三十丸桔梗散出聖惠方治虛勞心腹痞滿不思飲食胸膈不利桔梗去蘆頭陳橘皮湯浸去白瓤焙人參去蘆頭赤茯苓厚朴去粗皮塗生薑汁炙令香熟木香前胡各一兩去蘆頭杏仁湯浸去皮尖雙仁麩炒微黃甘草各五錢炙微赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服木香散出聖惠方治虛勞心腹痞滿氣攻兩脅滿痛不思飲食木香檳榔桂心各五錢青橘皮湯浸去白瓤焙當歸白朮各三分訶黎勒煨用皮柴胡去苗鱉甲各一兩塗醋炙令微黃去裙襴上為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服忌生冷油膩莧菜等訶黎勒丸出聖惠方治虛勞心腹痞滿脅下時痛不思飲食訶黎勒煨用皮厚朴去粗皮塗生薑汁炙令香熟檳榔白朮人參桂心各一兩乾薑炮裂銼吳茱萸各五錢湯浸七次焙乾微炒當歸三分上為末煉蜜和搗三二百杵丸如梧桐子大每於食前以生薑湯下三十丸蓽澄茄丸治虛勞冷氣上衝心腹痞滿腹鳴相逐或多刺痛嘔噦膨脹蓽澄茄沉香銼丁香木香蘹香子舶上者炒各五錢烏藥銼一兩白芷一兩一分葫蘆巴炒三分上為末煉蜜為丸如彈子大每服一丸生薑湯嚼下前胡丸治虛勞胸膈痞悶氣逆煩滿脅肋虛脹前胡去蘆頭人參白茯苓去黑皮陳橘皮湯浸去白瓤焙桂去粗皮白朮各一兩半杏仁去皮尖雙仁入麩炒研檳榔銼各二兩上為末煉蜜和丸如梧桐子大每服二十丸溫酒下日二黃耆建中湯一名黃耆湯療虛勞腹滿食少小便多建中丸治虛勞脾胃冷弱心腹痞滿不思飲食四肢怠惰補虛調胃人參白朮厚朴去粗皮薑汁炙乾薑炮陳橘皮湯浸去白焙枳殼去瓤麩炒各五錢訶黎勒三枚炮取皮上為末以煮棗肉和丸如梧桐子大每服二十丸生薑橘皮湯下不拘時候柴胡飲一名六奇湯治虛勞心腹痞滿不思飲食柴胡湯治虛勞氣逆心腹痞滿四肢羸瘦腹脹不下食柴胡去苗三兩枳殼去瓤麩炒二兩白茯苓去黑皮二兩白朮二兩人參一兩麥門冬去心焙一兩半上粗搗篩每服三錢水一盞入生薑半分拍碎煎至七分去滓空腹溫服日午夜臥各一白朮散出聖惠方治虛勞冷氣心腹痞滿不思飲食四肢少力白朮訶黎勒煨用皮陳橘皮湯浸去白瓤焙草豆蔻各一兩去皮人參去蘆頭桂心各三兩上為散每服四錢以水一盞入生薑半分棗三枚煎至六分去滓不計時稍熱服虛勞積聚附論夫氣之所積名曰積其本在臟陰所生也氣之所聚名曰聚其本在腑陽之所生也臟病止而不移腑病無所留止是為積聚虛勞之人陰陽傷損血氣澀滯不能宣通各隨其腑臟之氣而留結故成積聚之病也方大鱉甲丸治虛勞積聚心腹脹滿喘促氣逆面色萎黃痰嗽心忪不思飲食鱉甲一枚重二兩去裙襴醋炙柴胡去苗大黃濕紙裹煨熟乾地黃焙烏梅去核炒桃仁湯退去皮尖雙仁炒各一兩乾薑炮檳榔銼木香人參白茯苓去黑皮芎藭桂去粗皮紫菀去苗土芍藥牛膝酒浸切焙知母焙京三稜炮銼五味子白朮黃連去粗皮薑汁炙厚朴去粗皮薑汁炙黃芩去黑心陳橘皮湯浸去白炒枳殼去瓤麩炒當歸切焙各五錢上為末煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒下日三補真丸治冷勞心腹積聚羸瘦盜汗不思飲食腹脹下痢四肢無力厚朴炮製去粗皮薑汁炙蒼朮去皮米泔浸切焙各四兩陳橘皮湯浸去白焙石斛去根附子炮裂去皮臍柴胡去苗人參白茯苓去黑皮沉香各二兩丁香鱉甲去裙襴醋炙肉蓯蓉酒浸去粗皮切焙木香巴戟天去心當歸切焙草豆蔻去皮桂去粗皮訶黎勒炮去核五味子檳榔銼山茱萸杜仲去粗皮炙銼黃耆銼各二兩補骨脂炒一兩吳茱萸五錢湯浸洗三次焙乾炒上為末煮棗肉和丸如梧桐子大每服二十丸米飲下日三烏頭丸治虛勞心腹積聚及百病邪氣往來厥逆搶心羸瘦不能食破積聚並宜服之烏頭炮裂去皮臍一兩前胡去蘆頭黃芩去黑皮蜀椒去目併合口者炒出汗白頭翁水洗五次焙甘草炙銼龍骨研半夏湯浸去滑焙黃連去須吳茱萸水洗五遍焙白朮細辛去苗葉紫菀去苗土桔梗炒乾薑炮葳蕤芎藭厚朴去粗皮薑汁炙礬石燒令汁盡人參桂去粗皮生薑切焙各五錢上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下日午臨臥再服靈感丸治虛勞積聚腹脅堅滿男子婦人一切風勞冷氣頭旋眼疼手腳𤸷痹血風勞氣攻擊五臟四肢筋脈掉動面上習習似蟲行遍生瘡癬心膈煩悶腹疼虛鳴腰痛膝冷手足或冷或熱諸氣刺痛嘔逆醋心腸胃秘澀肺氣發動耳復虛鳴腳膝無力仍治婦人諸病冷血勞氣須損面黃氣刺心腹骨節痠痛月水不調經年逾月或下過多不定兼治冷熱諸痢腳氣水腫等柴胡去苗防風去蘆紫菀去苗土當歸切焙赤茯苓去黑皮乾薑炮裂桔梗炒菖蒲烏頭炮裂去皮臍厚朴去粗皮薑汁炙大黃吳茱萸湯洗焙乾皂莢去皮子酥炙蜀椒去目併合口者炒出汗陳橘皮去白炒郁李仁別研黃連去須炒巴豆各五錢去油研人參五錢上為末煉蜜和丸如梧桐子大每服空心酒飲任下五丸取微利為度如風冷氣人長服此藥最佳又宜夜服天通丸治心腹積聚脅肋刺痛肌體羸瘦不欲飲食及八風十二痹氣血不榮久服身體潤澤熟乾地黃焙五錢天門冬去心焙白朮銼乾薑炮當歸切焙石斛去根甘草炙銼肉蓯蓉酒浸去粗皮切焙芍藥人參大黃炙銼炒紫菀洗各一兩五錢白茯苓去黑皮防風去苗麻仁生研各三分白芷五錢蜀椒去目及合口炒出汗一兩杏仁三分湯浸去皮尖雙仁炒上為末煉蜜煮棗肉合和丸如梧桐子大每服二十丸米飲下日三狼毒丸治虛勞積聚腹中堅硬氣脹喘急狼毒二兩五錢醋浸尖肉桂二兩去粗皮川烏頭五錢去皮臍醋拌炒京三稜一兩炮銼紫菀三分洗去苗土附子一兩炮裂去皮臍川大黃二兩五錢銼碎微炒鱉甲一兩塗醋炙微黃去裙襴甜葶藶三分隔紙炒令紫色檳榔二兩䰿甲炙桃仁二兩湯浸去皮尖雙仁麩炒微黃木香各一兩芫花五錢醋拌炒令乾吳茱萸一兩湯浸七次焙乾微炒該一兩皂莢三分湯浸去皮塗酥炙黃焦去子上為末煉蜜和搗三五百杵丸如梧桐子大每服空心以溫酒下十丸忌莧菜濕面生冷鱉甲散治虛勞積聚或心腹疼痛四肢羸瘦小便赤不能飲食鱉甲二兩醋炙微黃去裙襴厚朴一兩去粗皮塗生薑汁令炙香熟木香檳榔各三分神麯二兩搗碎微炒京三稜一兩炮銼川大黃二兩銼碎微炒芎藭半兩桃仁湯浸去皮尖雙仁麩炒微黃青橘皮各三分湯浸去白瓤焙桂心三分當歸五錢麥糵一兩炒微黃赤芍藥一兩柴胡一兩五錢去苗上為散每服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服忌莧菜生冷橘皮丸治脾腎虛勞心腹積聚面色萎黃不思飲食胸膈滿悶青橘皮二兩麩炒黃搗羅為末醋一盞半於銀石器內文武火熬成膏木香桂去粗皮用人參訶黎勒皮炒京三稜炒銼藿香去莖厚朴去粗皮薑汁炙當歸切焙萆薢乾薑炮各五錢半夏一分湯洗十次焙上搗羅十一味為末入橘皮煎內搗三二百下丸如梧桐子大每服二十丸空心日午溫米飲下青金煮散治虛勞積聚不消心腹煩悶脾胃氣滯不思飲食青橘皮湯浸去白焙白朮木香薑黃檳榔銼郁李仁湯浸去皮炒楝實銼炒蘹香子人參益智去皮炒赤茯