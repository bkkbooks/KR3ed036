不止出聖惠方胡椒三分末生薑一兩微煅切上㕮咀以水二大盞煎至一盞去滓分溫三服治患痼冷反胃嘔噦不下食出聖惠方附子三分炮去皮臍生薑汁二升半入水三合上切附子如豆許大入薑汁中煎令汁盡更入蜜一合搗一千杵丸如梧桐子大不計時候生薑湯下二十丸漸加至三十丸治反胃病吐後補出聖惠方白朮五兩杵羅末生薑五斤搗絞汁五升入酒一升上以汁下白朮以慢火煎去半入白蜜二合酥二兩更煎和如稀餳瀉於銀器內中旋定每日空腹以清酒調下半匙服之一月百病除愈導引法出危氏方治翻胃除腹肚冷風宿疾積胃口冷食欲進退吐逆不下正坐兩手向後捉腕反拓席盡勢使腹弦弦上下七左右換手亦然椒附丸出余居士選奇方治翻胃胡椒白姜茴香川附各等分巴豆四十九粒上以巴豆去殼同炒去巴豆為細末每服半錢米飲調下藥靈砂丹出如宜方治翻胃臟寒停飲後吐靈砂一兩丁香木香胡椒各半錢上為末棗肉杵丸如綠豆大每服六十丸薑湯下清膈散出衛生家寶方治熱翻胃吐食蟬蛻五十個去盡土用滑石一兩上為末水半盞調藥一盞去水用蜜一匙調下不拘時候服黃附丸出衛生家寶方治翻胃嘔吐附子炮去皮臍上為末糊丸如梧桐子大以大黃為衣每服十丸溫水下竹葉湯出衛生家寶方治熱吐翻胃及傷寒遍身發熱冷吐亦宜服之竹葉半斤白茯苓一兩銼真珠小半夏洗一兩生薑四兩切上以水十碗煎一碗去滓溫服不計時候每服一盞連服亦可硫黃丸出衛生家寶方治膈氣翻胃不進飲食醋衣半兩乾者陳丁香半兩木香半兩石菖蒲半兩青皮半兩去白硫黃半兩研上為末酒糊丸彈子大每服一丸細嚼米飲下後用煨鯽魚米醋蘸食之次以油餅壓之黑白附子丸出衛生家寶方治翻胃白附子黑附子炮去皮白朮白茯苓各等分上為末麵糊為丸如梧桐子大蚌粉為衣每服三十丸用麻油於手心內磨動次滴水和油吞下少時便吃粥一小碗即吐吐止可服補胃藥隨老少神效厚朴丸保生集方治反胃吐逆飲食噎塞氣上衝心腹中諸疾加法在後烏頭減半更妙厚朴二兩五錢炙黃連二兩五錢紫菀去土苗吳茱萸湯洗十次菖蒲柴胡去苗桔梗皂角去皮弦子炙茯苓去皮官桂刮乾薑炮一兩人參二兩巴豆霜一兩蜀椒去目閉口者微炒出汗二兩川烏頭炮製去皮臍二兩五錢上為細末入巴豆霜和勻煉蜜和丸為劑旋丸桐子大每服三丸漸次加至以利為度生薑湯下食後臨臥此藥治療與局方中溫白丸同及治處暑以後秋冬間臟腑下利大效春夏再加黃連二兩秋冬再加厚朴二兩計四兩治風癇病不能愈者從厚朴丸依春秋加添外又於每料中加人參菖蒲茯苓去皮各一兩五錢上依前法和劑服餌治反胃又大便不通者是腸勝胃也服局方中半硫丸一二百丸如大便秘用後藥出保命集方附子五錢巴豆二枚砒豆許上為極細末生薑糊為丸如綠豆大每服一丸白湯下薑桂湯出朱氏集驗方治翻胃嘔吐立效白姜炮紅豆肉桂丁香粉草縮砂仁炒敗醬用灶心土炒上各五錢為細末每服一錢生薑自然汁一分沸湯調下治翻胃嘔吐良方出朱氏集驗方山礬葉不拘多少炮黃用黑小豆炒香田螺殼火煅上為末或酒或熟水調二三盞服之立止水煮平胃散出朱氏集驗方蒼朮厚朴制陳皮甘草四味各十兩棗肉半斤除核秤生薑二十兩切片子粟米一升洗以上是古本以下是家品白朮茯苓去皮茴香各二錢上以上藥作一處用文武火煮水約過藥三寸煮乾水為度火焙為末每服一錢空心鹽湯服安胃散出指南方治胃反嘔五靈脂杏核大以醋和麵裹燒令香熟去面白茯苓一枚杏核丁香三十粒硃砂五分人參木香各一分上為細末每服半錢茶清調下大白散出指南方治胃反嘔大天南星炮上為末散每服三錢水三盞生薑三片粟米一撮煎至一盞去滓溫服玉蕊丸出雞峰普濟方治胃虛因吐生風白丸子金液丹各五十丸上為細末煮麵糊為丸如梧桐子大每服三十丸空心米飲下胡椒丸出十便良方治寒氣攻胃效應方胡椒三十顆麝香一錢細研上搗破胡椒入麝香用酒一中盞煎至半盞稍熱服又方治胃反嘔吐多因中脘停留寒痰冷飲凝滯而食入即吐上用姜附丁香之類煎湯吞下養正丸並來復丹或用靈砂丹來復丹末以半夏末打糊為丸服之尤妙其效甚驗膈氣變翻胃用剪紅丸吐出淤血及下蟲而愈真方並附永類鈐方雄黃五錢木香五錢檳榔三稜莪朮煨陳皮貫眾去毛各一兩大黃春三兩秋冬月一兩乾漆一兩炒煙起以上八味作末糊丸壯士可五十丸又方芫花一兩醋煮巴豆二十一粒去油甘遂一兩上為末糊丸如梧桐子大候乾用紅羅包之絹線紮緊剪十段每一服前藥內加用一粒萬病轉湯使五更初服療疾醋炙肉咽婦人醋湯下名秦川剪紅丸氣膈服好蘇合香作丸咽薑汁少許喉中爆聲而愈翻胃始因噎膈所成有痰母蟲瘕非好手不能奏效出永類鈐方附子片一兩南星片一兩巴豆二十一粒去皮上用糯米一兩同炒變色去巴豆入乾薑丁香末各五錢同研作末五更早掌中舌蘸干吃半錢津化仍以陳皮湯一盞送下又蘇合香丸青州白丸打和同生薑合丸服有翻胃噎塞煩悶諸藥不效蘆根煎湯下枳殼湯下又真阿魏末少許野外人拋下干糞取作末五更初薑片蘸食能起死人趙玉田傳又翻胃吐黑汁治不食玉用蓽澄茄末為丸薑湯下而愈再令服平胃散三貼及薑汁調白虎丹治翻胃安神白虎丹化搗大蒜丸生料健脾丸出澹寮方治嘔吐反胃脾瀉白痢腸滑冷痢一切脾胃病厚朴去粗皮生銼二兩五錢半夏生白豆蔻仁草果仁甘草縮砂仁各二兩上㕮咀用生薑一斤四兩細切搗碎滓汁並用同藥一處搜和令勻丸成雞子黃大日曬乾每服一丸水一盞半煎至七分去滓食前溫服附子五苓散出朱氏集驗方治翻胃吐食大附子一個取空入五苓散在內炮熟上為細末用薑湯下十膈散出朱氏集驗方治翻胃嘔吐老薑二塊大拇指大剜空中間以好子母丁香二粒在內合住濕紙煨上以十膈散嚼生薑丁香同下生胃丹出朱氏集驗方此丹兆天之五氣回黃及谷生精生陽壯脾元實腎水翻胃吐食胃虛生風手足搐搦痰潮作聲久病全不納食胃氣欲絕最能救之人參神麯炒麥糵炒半夏各一兩谷糵炒白朮白芍藥川續斷川牛膝酒浸焙川厚朴薑汁製丁香防風各一兩五錢白豆蔻仁炮山藥白茯苓木香沉香各二兩香附子三兩縮砂仁二兩炒上為細末法丸如綠豆大每服一百丸用白湯吞下又方粟米七升生薑五斤取自然汁浸粟米蒸爛焙乾天南星一斤用生薑滓作餅真黃土泥包裹入慢火內煅令香熟去土焙為末案此方缺製法及服法青棗散出朱氏集驗方治脾胃泄瀉心膈膨脹疼痛不納飲食或作吐逆翻胃脾痛氣不能升降兼脾胃寒冷陳皮甘草乾薑良薑各等分炒上為細末每服一錢鹽湯空心點服薑棗煎亦得忌生冷魚腥酒豬肉動氣物只可吃鳩子雀兒豬肝肺等物硇附餅子出楊氏家藏方治翻胃吐食十膈五噎嘔逆不止心腹疼痛諸藥不下附子一枚重七錢者剜臍作一竅一研細砂一分在內填滿將剜去附子碎末塞口用生面作餅裹之如有剩者附子末更以一餅裹之慢煨令面焦黃為度面不用只用硇砂附子為末木香三錢丁香三錢二味同為末上件一處拌勻麵糊為丸每一兩作二十丸捏作餅子每服一餅用姜一塊如大拇指大切作兩塊置藥在內濕紙裹煨令香熟和姜細嚼米飲送下不拘時候服二氣散出楊氏家藏方治陰陽痞結咽膈塞狀若梅核妨礙飲食日久即成翻胃山梔子炒乾薑炮各一兩上研為粗末每服二錢水一盞煎至五分去滓食後熱服透紅丸出楊氏家藏方治脾疼翻胃膈氣水瀉積痢及婦人血氣刺痛皆可服之縮砂仁一百粒杏仁一百粒去皮尖巴豆五十粒去皮膜取霜坯子胭脂一錢別研川芍一兩銼研碎上為細末次入杏仁巴豆胭脂研勻湯炮雪糕糊丸如梧桐子大大人兩丸小兒丸作黍米大每服三丸脾疼石菖蒲湯下婦人血氣刺痛醋湯下翻胃膈氣丁香湯下水瀉倒流水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下並空心食前服治翻胃胸中痰滯出本草用罌子粟合竹瀝作粥食之大佳開胃出本草以蜆殼煮服之良治翻胃吐食除心胸痰水出本草以蜆爛殼溫燒為白灰飲下一錢匕蚌殼亦得治熱壅反胃及主胃閉出本草取獼猴桃搗汁和生薑汁服之佳治反胃出本草以甑帶煮汁服之開胃及腸閉出本草以小芋極滑者煮吞之治反胃出本草用附子一個最大者坐於磚上四面著火漸逼碎入生薑自然汁中又依前火逼干復碎之約生薑汁可盡半碗許搗羅為末用粟米飲下一盞不過三服瘥治反胃出本草以好井水及土石間新出泉飲之療反胃嘔吐無常粥飲入口即吐困弱無力垂死出本草以上黨人參二兩拍破水一大升煮取四合熱頓服日再兼以人參汁煮粥與啖昔李真方同友徐郎中於漢南患反胃兩日飲諸藥不瘥遂與此方當時便定瘥後十餘日發入京絳每與名醫持論此藥難可為儔也調中開胃生肌令人肥白出本草以新羅榛子食之甚驗十八味丁沉透膈散出本草治翻胃十膈五噎氣膈不進飲食又治氣滯作吐丁香五錢木香五錢肉豆蔻制白豆蔻青皮麥芽各五錢人參香附子砂仁各一兩藿香陳皮去白厚朴制沉香各七錢半白朮半夏制神麯草果各三錢半甘草一兩五錢上㕮咀薑棗煎服治反胃羸弱不欲動用仙人杖煮汁服之仙人杖是竹筍欲成竹自死者色黑如漆五月收之又方用黃犍牛口中涎服之治翻胃吐逆內陰下常濕且臭或作瘡用韶粉一分滲即瘥止常用大驗肘後方同治翻胃吐食不止用小柯子日乾為末酒服方寸匕治反胃出本草取蝟皮肉五味淹炙食之不得食骨令人瘦小
