body:
  text: 卷三十六胃腑門胃反附論夫寸緊尺澀其人胸滿不能食而吐吐出者為下之故不能食設言未止者此為胃反故尺為之微澀若趺陽脈浮而澀浮即為虛澀即傷脾脾傷即不磨朝食暮吐暮食朝吐宿穀不化名為胃反趺陽脈緊而澀其病難治翻胃者始則由七情氣鬱而生或因飲食生冷喜啖炙爆飢飽不時傷損脾胃脾之中州不能磨化水穀胃之下口不能宣達於闌門泌別之所以致氣復回升飲食而反治之之法須當運化米穀為先須泄胃之下口使氣得下達隨引水穀下透於小腸則止不吐矣翻胃者本乎胃食物嘔吐胃不受納言胃口翻也多因胃氣先逆飲酒過傷或積風寒或因憂思悒怏或因蓄怒抑鬱宿滯痼癖積聚冷痰動擾脾胃不能消磨穀食致成斯疾原其所自女人得之多由血氣虛損男子得之多因下元冷憊有才食而便吐者有食久而後翻者受病既異醫療宜審察如玉浮丸胃丹等藥及入藥靈砂丁附散之類皆可對證選而用之翻胃之症其初也未有不由五噎五膈而始者五噎五膈者喜怒不常憂思勞役驚恐無時七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不化氣留於咽嗌者為五噎結於胸膈者為五膈治療之法當順氣化痰溫脾養胃久而不治則氣體虛弱脾胃冷絕致成翻胃食罷即反或一日而反至此亦甚危矣非硇砂墜痰化積兼以剛劑暖胃不足以療此證如水穀並不能下方便集中一方用丁香附子為末於掌心舐吃亦一法也如趺陽脈緊而澀者為難治之證又有下虛之人氣上控膈其病心下緊滿痞急肌中苦痹緩急如刺不得俯仰名曰胸痞其證類乎五膈又當以岩氏栝蔞枳實丸治之臨證又宜詳審胃丹出永類鈐方硃砂稟太陰之精不經火煅以丁附等脾藥陰煉成丹平補不僭善治真陽衰虛心火怯弱不養脾土沖和失布中州虛寒飲食不進胸膈痞塞或不食而脹滿或已食而不消痰逆噁心翻胃吐食臟氣虛寒米穀不化心腹絞痛泄利不止凡是一切脾胃諸疾不問男子婦人皆可服之硃砂大塊去石者五十兩附子炮去皮臍四兩肉豆蔻麵裹煨縮砂仁蓽澄茄白豆蔻紅豆高良薑銼炒白朮厚朴薑汁炙炒胡椒益智仁麥門冬去心草果仁橘紅丁香不見火藿香葉五味子乾薑炮去土各四兩人參三兩上各如法修制銼以鍋一口用白砂蜜五斤將藥一半同蜜拌勻入銀鍋以夾生絹袋盛貯硃砂共藥入銀鍋內以桑柴火重湯煮四日四夜換蜜五斤入前藥一半和勻再煮三日三夜取砂淘淨焙乾入乳缽用玉杵研直候十分細米粽為丸如綠豆大陰乾每服十粒加至十五粒空心食前用人參湯下棗湯亦得如或嘔吐用淡薑湯下忌食豬羊肉玉浮丸出永類鈐方治男子婦人脾胃虛弱一切嘔吐及久新翻胃不問得病之由皆可服之真良方也人參白殭蠶炒去絲白朮乾薑炮丁香肉豆蔻麵裹煨橘紅白豆蔻仁麥糵炒附子炮去皮臍木香南星炮檳榔半夏湯浸七次甘草炙各等分上為末每服二錢生面一錢和勻生薑自然汁拌入百沸湯煮令極沸和丸藥丸梧桐子大用淡薑湯下不拘時病甚者不過三服惡熱藥者去附子大便秘者去肉豆蔻奪命回生散治五膈五噎翻胃嘔吐不進飲食方見膈噎門案原方丁香揀淨川芎去土白姜洗淨炮南木香不見火肉桂去皮不見火新羅參神麯以上各半兩訶子七枚取肉縮砂仁二十一粒大草果二枚炮取仁莪朮炮粉草炙以上各七分半巴豆一十四粒去殼心膜不去油冷水浸一宿別研為膏留乳缽中上曬乾為末入乳缽內和勻巴豆膏再篩過入瓦盒內以油紙蓋盒口卻用黃蠟和松脂融如法封固盒縫每以十二月上辰日或初八日黃道生氣天月二德日至誠修合如地高爽處埋土中三尺深至次年六月中伏節擇吉日晴明取出向當風處攤去濕氣以不漏瓦瓶收貯密封壯實人每服半錢臨睡百沸湯調半盞頓服仰臥片時徐以溫白粥壓下若羸弱只服一匙二三服即能進食止嘔吐續以寬中散丁香透膈湯橘皮煎丸厚朴煎丸等兼進佐助胃氣忌生冷魚腥黏膩並硬物一兩月則全愈矣孕婦不可服治胃翻朝食暮吐食訖腹中刺痛背怯冷橘皮三兩甘草厚朴茯苓桂心細辛杏仁竹皮各二兩檳榔十枚前胡八兩生薑五兩人參一兩上㕮咀水一斗三升煮取三升分三服一方有柑皮二兩丁香餅治脾胃虛寒痰逆嘔吐飲食減少五膈五噎反胃噁心並皆治之丁香木香各一兩人參蓽澄茄各三錢白豆蔻肉豆蔻半夏曲神麯各五錢白朮陳皮各一兩五錢甘草二錢上為末生薑汁煮糊作餅如棋子大每服一餅細嚼生薑湯空心下治胃反吐食不消吐逆不止人參澤瀉桂心茯苓各四兩橘皮甘草黃耆各三兩大黃一兩五錢生薑八兩半夏一升麥門冬三升上㕮咀水一斗二升煮取三升二合一服八合日三夜一羸人六合已利去大黃養胃湯出醫方大成治脾胃虛冷不思飲食翻胃嘔吐白豆蔻仁人參丁香縮砂肉豆蔻附子炮粉草炙沉香橘紅麥芽麥曲各二錢五分上為細末姜鹽湯調下每服三錢哽生散治反胃吐食丁香五錢木香二錢五分官桂心二分半人參神麯各二分半川芎七錢五分訶子七個去核巴豆十四粒水浸一宿如泥草果仁二個廣朮七分半上除巴豆外並生用為極細末入巴豆泥和勻瓷器納盛貯蜜封之此藥過臘月半辰時不見火方合藥於來年夏至後方可用每服用一銅錢半子令病人男左女右置藥米湯調成稀糊以舌舐之臥少時後用細米粥湯壓之病人多年可服二服病淺一服修合不令雞犬婦人見忌生冷硬物油膩濕面鹽醋等物止服白粥百日孕婦不可服蓽茇丸出危氏方治反胃吐酸水心胸壅悶蓽茇木香乾薑炮枳殼去瓤麩炒檳榔銼各五錢縮砂仁訶黎勒皮煨白茯苓去黑皮人參各三分上為末煉蜜為丸梧桐子大每服二十丸生薑湯下安脾散出醫方集成治胃氣先由飲食過度或憂思蓄怒宿食痼癖積聚冷痰動擾脾胃不能消磨穀食致成斯疾女人得之多由血氣虛損男子得之多因下元冷憊有食罷就吐有朝食暮吐暮食朝吐所吐酸臭可畏或吐黃水凡有斯疾乃是脾敗惟當速療遲則發煩渴大便秘水飲纖細不得入口不旋踵斃矣高良薑一兩百年壁上土三合敲碎用水二碗煮乾切成薄片南木香胡椒草果麵裹煨去殼白茯苓白朮丁香陰乾陳橘皮湯浸去瓤人參去蘆各五錢甘草炙一兩五錢上為末每服二錢食前米飲下入鹽點酒亦得甲申之春以事至臨安寓止朱家橋詹翁年六十餘苦翻胃危殆已治棺在床側適弟有宣司之闢往別而去其時詹翁已不能言及十一月自淮上歸過其門意此翁已不存為之慘然方訪問間而此翁已出迎揖見其顏色極紅潤甚驚異之問其所以乃云有一州官來歇得藥數服遂無事其後得此方用以治人皆作效丁香煮散出百一選方治脾臟腹冷胃脘受寒胸膈痞悶心腹刺痛痰逆噁心寒刺中滿臟腑虛滑飲食減少翻胃吐逆四肢逆冷但是沉寒痛冷無問久新功效不可具述治反胃前胡生薑各四兩阿膠一兩大麻仁五合橘皮三兩桂心三寸甘草五寸大棗十枚吳茱萸四合上㕮咀水三升酒二升煮取一升七合分二服鹽滾丸出危氏方治翻胃膈氣丁香木香肉豆蔻砂仁青皮陳皮胡椒蓽茇沉香各五錢上為末以大蒜瓣子不拘多少每瓣作二片去心入巴豆一粒作餅藥調麵裹蒜瓣慢火煨熟取去巴豆及面只將蒜研成膏將前項藥末一半搜和丸梧桐子大每服三十丸於鹽內滾過煎蘿蔔湯調前藥二錢吞下神效人參湯出聖濟總錄治胃反食下便吐人參澤瀉甘草炙桂去粗皮大黃銼炒各二兩陳橘皮湯浸去白切焙乾薑炮各一兩赤茯苓去黑皮四兩青竹茹三兩上㕮咀每服五錢水二盞煎至一盞去滓溫服日三夜一丹砂丸出聖濟總錄治反胃吐食日久不止大腸結燥丹砂研鉛丹研陳橘皮去白炒各五錢半夏湯浸七次去滑炒厚朴去粗皮薑汁炙麥糵炒陳曲焙代赭煅各一兩皂莢去皮子炙五錢上為末和勻糊丸如梧桐子大每服二十丸空心日午臥時用溫酒下米飲亦得藿香湯治心虛滿飲食不入時時嘔吐抑鬱短氣或大病將理未復胃氣無以養日漸羸弱反胃藿香人參桂桔梗木香白朮各五錢茯苓五錢枇杷葉十片去毛半夏一兩湯洗用薑汁製上㕮咀每服五錢水二盞入姜皮一分煎七分去滓食前服之沉香透膈丸出德生堂治反胃吐食一切膈氣噎氣只三服見效如三服不見效不可治之丁香沉香木香各一兩粉霜五錢硇砂三錢巴豆四十九個大者去油麝香一錢信二錢用錫炒去錫硃砂五錢上為末酒糊丸如粟米大每服十五丸病輕者七丸冷薑湯送下加味姜附湯治遠年近日翻胃嘔吐全不進飲食大附子一個一兩以上勻炮分四破生薑一斤取自然汁於銚內慢煮附子至干去臍焙丁香胡椒各五錢木香蓽澄茄各二錢沉香三錢甘草炙三錢干餳糟半斤生薑五兩斤同搗爛餅子焙乾上為末每服二錢燒鹽少許米湯點空心服藿香丸出聖濟總錄治反胃吐逆虛氣上攻疼腹痛多吐酸水藿香葉木香各一兩半夏湯浸去滑二兩丁香檳榔銼各三分白朮一兩蓽澄茄紅豆蔻去皮各半兩上為末酒煮麵糊丸梧桐子大每服二十丸橘湯下無時橘皮湯出聖濟總錄治脾虛胃反食下即吐陳橘皮湯洗去白焙人參甘草炙銼澤瀉各一兩赤茯苓去黑皮乾薑炮製桂去粗皮各一兩五錢青竹茹二兩上㕮咀每服四錢水一盞半煎至七分去滓溫服不拘時通橘湯出聖濟總錄治胃反不下食昆布洗去咸綠白朮各一兩丁香檳榔煨銼訶黎勒皮木香半夏湯浸七次各三分大黃銼研炒五錢上㕮咀每服三錢水一盞生薑三片煎六分去滓溫服得食則吐或朝食夜吐名曰胃反或氣噎不飲食數年羸消雖飲水亦同此方療病源云營衛俱虛血氣不足停水積飲在於胃脘則臟冷臟冷則脾不磨脾不磨則宿穀不化其氣逆而成胃反也則朝食暮吐暮食朝吐心下牢大如盆杯往來寒熱甚者食已則吐其脈緊而弦緊則為寒弦則為虛虛寒相持故食已則吐名為胃反也半夏六兩湯浸去滑人參三兩生薑一兩橘皮二兩牛涎一升舂杵頭糠一升綿裹厚朴二兩羚羊角三兩上㕮咀水八升煮取三升分溫三服相去十里久欲頻服者可至三劑半夏飲子治飲食吐逆水穀不化此為胃反半夏八分湯浸去滑厚朴炙人參白朮各四兩粳米二一合橘皮四分京棗七枚生薑七片切上㕮咀水二大升煎取一升去滓分溫四服空腹服二服忌羊肉餳安中散治遠年近日脾疼翻胃口吐酸水寒邪之氣留於內停積不消胸膈脹滿攻刺腹脅噁心嘔逆面黃肌瘦四肢倦怠又治婦人血氣刺痛小腹連腰攻疰疼痛玄胡索去皮良薑油炒乾薑炮茴香炒肉桂各五兩牡蠣煅四兩甘草炒十兩上為末每服二錢熱酒調下婦人淡醋湯調不飲酒鹽湯下不拘時吳茱萸丸一名茱萸礬石丸出衛生家寶方治年深膈氣翻胃飲食之物至晚皆吐悉皆生存不化膈上常有痰涎時嘔血胸中多痛口吐清水無時夜吐輒至晚日漸羸瘦腹中痛楚時復冷滑或閉結吳茱萸瓦上炒三分胡椒人參當歸銼焙各五錢白礬燒存性五錢甘草五錢一半生用一半紙裹五六重醋浸透火內慢煨乾又治婦人如此七次半夏一兩用生薑四兩研洗炒入罐子納薑汁並水煮候劈破看存二分白心取半夏細研為膏上為末以半夏膏和丸如稍硬添薑汁丸梧桐子大每服七丸桑柳枝各三十莖銀器內煎湯吞下日三服忌諸毒物惟可食油煎豬胰及軟物一方無白礬石半兩以鹽泥固濟之火養三日次用猛火煅通赤去火毒研冷無聲人參厚朴湯出聖濟總錄治胃氣虛弱停飲相擊發為虛脹腎氣逆上食已反出人參厚朴去粗皮薑汁炙透熟半夏