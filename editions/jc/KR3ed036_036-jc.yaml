許沸湯點服半夏丸治胃嘔吐不下食半夏湯浸七次焙伏龍肝各一兩白礬煅令汁枯鉛丹研各三兩上為末生薑汁煮麵糊丸梧桐子大每服二十丸至三十丸生薑橘皮湯下紅豆丸治諸吐逆膈氣翻胃吐食不止丁香胡椒縮砂各二十一枚紅豆十一粒上為末生薑汁為丸如皂角子大每服一丸棗二枚去核填藥麵裹慢火燒熟細嚼白湯下空心日進三服參橘湯治翻胃人參真橘紅石蓮肉各五錢透明乳香一錢五分上為末每服一錢薑湯點服樸附丸治虛寒相搏翻胃吐食中焦氣痞厚朴去粗皮銼附子炮去皮臍各一兩生薑八兩取自然汁上二味薑汁煮乾為度焙乾為末酒煮麵糊為丸梧桐子大米飲下三十丸食前一方用銀石器內慢火熬薑汁盡為度千轉丹治脾胃吐食等病牛涎半斤好蜜半斤木鱉子三十個去油皮上為末牛涎蜜一處於銀器內用慢火熬用槐條攪干為度每和白粥兩匙日進三服通胃散出經驗良方治結腸翻胃肉豆蔻雞心檳榔各一枚胡椒四十九粒上為末每服半錢空心以無灰酒枳殼末少許調服稀粥壓之治翻胃吐逆藿香葉去土香附子去毛各五錢橘皮二錢上為末每服二錢姜三片水一盞煎六分服治翻胃吐食暑氣煩躁不食小兒嘔吐泄瀉黃色殺疳蟲進食平胃散一兩硫黃硝石各五錢上薑汁煮令乾為末同平胃散酒煮糊為丸如桐子大每服二十丸米飲下六丁丸出危氏方治翻胃如神五靈脂五錢生辰砂一錢母丁香一兩不見火上為末入黃狗膽粽子尖丸雞豆大姜米湯飲下每服一丸三十年病三兩丸止本事方香靈丸只用丁香分兩不同母丁香即丁香也沈存中筆談言之甚詳治翻胃吐食孤科蒼耳生牡蠣透骨草各等分上㕮咀每服三錢水一盞半煎七分去滓溫服即用果壓之木香湯一名定胃散出十便良方治翻胃不飲食開胃和氣木香銼一分胡椒三十粒糯米一撮上同炒至米熟㕮咀分作五服每服用水一盞煎六分去滓溫服昔年乳媼得此方而愈石亭脂丸治年久胃反不止石亭脂紫背鉛各二兩鹽滷五兩上旋燒鉛煎滷中汁滓盡將鉛與石亭脂攪勻炒之或焰起即將銚子放水上焰止候勻熟水浸炊餅丸如梧桐子大每服二十丸煎石蓮干棗乾柿乾薑湯下礬石丸出聖濟總錄治胃虛氣逆食已反出礬石鉛丹各二兩石亭脂五錢生用在後入上先將前二味和勻入乾鍋內以炭半斤漸煅令通赤為度駐少更養一夜取出細研出毒兩日乃入石亭脂同研細以粟米飯和丸如綠豆大每服十五丸米湯下四季散出聖濟總錄治久患翻胃及小兒驚吐諸吐逆蘇內翰言如神硫黃細研五錢水銀一分與硫黃無星生薑四兩取汁上同研如黑煤色每服三錢酒一盞同薑汁煎熟調藥空心服衣被蓋覆當自足指間汗出迤邐遍身汗透即瘥常有人病反胃經三年不瘥消羸殆盡服藥一服汗出皆如膠腥穢不可近當日更不復吐遂瘥又小兒諸吐用此藥量兒長少服一錢以至一字用水調下吐立定此散極亂難調須先滴水以指緩緩研殺稍稍增湯使令調和若傾入湯酒盡浮泛不可服又烏頭煮散茱萸散皆治反胃惟四季散有陰陽理勝於二方今載二方於後但往來寒熱更時量腑臟寒溫用之可也茱萸散出聖濟總錄治胃氣虛冷不能飲食食已即吐酸水吳茱萸湯洗七次焙乾乾薑炮製各等分上為末空心熱酒調下三錢匕烏頭散出聖濟總錄治年深膈氣翻胃常有痰涎時時嘔吐胸中多酸水吐清水無時腹中痛楚或時秘結或時冷滑此藥主之川烏頭炮去皮川楝肉各一兩五錢檳榔木香各一兩上為末每服二錢水一盞煎至七分入鹽一撮溫服有一婦人年深翻胃服此效罌粟粥法治翻胃不下食白罌粟米二合人參三錢生山芋五寸長上細切研水一升二合煮取六合入生薑汁及鹽花少許攪勻分二服不計早晚食之亦不妨別湯丸大半夏湯出肘後方治胃反嘔吐亦治膈間痰飲半夏二升洗上以水一斗二升和蜜搗之二百四十遍煮藥取升半溫服一升余分再服治胃反食即吐出上氣蘆根茅根各二兩上以水四升煮取二升頓服之得下良交和散治遠年近日翻胃嘔吐全不進食嘉和散五膈寬中散上用見成局方二藥合而為一和勻每服三錢薑棗煎湯空心熱服治丈夫婦人老少遠年近日翻胃吐食出本事方五靈脂不拘多少為末黃狗膽汁上丸如龍眼大每服一丸好酒半盞頓湯瓶頭溫磨開服不止再服不過三服即效治翻胃吐食出本事方白礬二兩黃丹一兩上為末入瓦罐內煅令如蒸餅虛空取出以淨絹承頓地上盆蓋一宿出火毒再為末用蒸餅丸綠豆大每服三丸至七丸空心溫酒下更量老少虛實與之治逆不食及翻胃母丁香神麯各等分炒上為末稀粥調下一錢甘露湯出澹寮方治翻胃嘔吐不止飲食減少常服快利胸膈調養脾胃快進飲食常傳一富人病翻胃往京口甘露寺設水陸泊舟岸下夢一僧持湯一杯與之飲罷猶記其香味便覺胸膈少快早入寺知客供湯乃是夢中所飲者胸膈尤快遂求其方修制數十服後疾遂瘥名曰觀音應夢散一方得之常以待賓易名曰甘露湯在臨汀療一小吏旋愈切勿忽之干餳糟六分頭釀者生薑四分和皮上拌和研爛作餅子或焙或曬乾每十兩用甘草二兩炙同研為末每服入鹽少許沸湯調無時大效散出百一選方治翻胃田螺殼黃蜆殼二件不拘多少久在泥中多年陳者尤佳各各焙成白灰上每劑用白梅肉四兩田螺殼灰二兩同拌令勻作團用砂合子盛蓋了泥固縛合頂火煅令焦黑存性取出研細每服二錢用人參縮砂湯調下陳米湯亦得如無合子只用連盞兩隻相合依前法煅食前服丸覺心腹疼痛即翻胃先兆此亦能治之治翻胃吐食大雪梨一個丁香十五粒上將丁香刺入梨內用濕紙裹包四五重炭火煨熟熱服鎮脾散出聖濟總錄京三稜炮一兩五錢丁香三分上為末每服一錢沸湯點服不拘時雌黃丸出聖濟總錄治胃反嘔吐不止飲食不下雌黃一分研甘草半分生上為末爛泛為丸梧桐子大用五葉草糯米同煎湯下四丸小半夏丸出百一選方治翻胃不快飲食半夏湯洗十次胡椒各等分上為末薑汁丸梧桐子大每服三五十丸薑湯下正胃散半夏二兩天南星二兩上為末用水五升入壇內與藥攪勻浸一宿去清水焙乾重研令細每服水二盞藥末二錢姜三片煎至八分溫服至五服效加味青金丹出指南方治清濁不分中焦氣痞悶心下大如杯或時寒或時熱朝食暮吐暮食朝吐其關脈弦而緊弦則為虛緊則為寒虛寒相搏此名為格與關格同也是為反胃硫黃水銀各等分上各研細不見星子為度入木香末丁香末各等分用生薑自然汁煮糊丸梧桐子大每服十丸食前米湯下蓮子散出直指方治翻胃石蓮子四兩上為末米湯乘熱調服二方寸匕患痢噤口通用治翻胃吐水及吐食大黃四兩甘草二兩炙上㕮咀水三升煮取一升去滓分溫再服如得可則隔兩日更服一劑健胃丁香散出德生堂治反食嘔吐氣噎關格不通廣木香淨全丁香各一兩上㕮咀每服四錢水一盞半煎一盞先用好黃土和泥做成碗樣一個卻以藥濾去滓盛於土碗內食前服越數時再煎服此方有臺掾吳安之得傳於內臺蓋耘夫都司自得之效本堂試果驗蓋用土碗盛藥取其有脾土生助之功丁香附子散一名大掌中金出永類鈐方治反胃不納飲食服水並不得者大附子一個緊實者切去上頂用一小截留作蓋勿碎將下截挖一竅丁香四十九粒上將丁香安附子竅內以小截蓋之用線絆縛置砂銚內用生薑汁浸過附子慢火熬至干取附子丁香為末和勻每調少許在掌內舌舐而吃日十數次忌毒物生冷一方以生薑入丁香如前制一方以乾薑鑽穴入丁香尤易作末倉卒嘔甚者可用若煩渴則徐食糜粥宋淳熙元年冬樞侄自瀋陽往四明過婺源義烏有野服者邑醫孫道攻療眼疾密與之語孫曰君貴家子弟必藏好方畀我一二或以為人起疾密索所秘反胃方即出授之孫喜書之於冊未幾某鈐轄苦此疾危孫為極治用此方數服愈一方面裹煨為末飲下不過膈者薑汁蘸嚼治胃反食即吐出肘後方用粟米搗作面和丸梧子大七枚爛煮內醋中細吞之得下便已面亦得用之白梅丸治反胃用生硫黃將白梅研成膏丸梧桐子大每服二十丸米飲下治反胃見食即嘔噦出聖惠方用羊糞乾溼共七枚乾者碎之以童小便一大盞煎至六分去滓分三服治反胃食即吐出上氣用燒先死雞膍胵灰服男雄女雌香牛飲出危氏方治哽噎翻胃吐食用羯牛先以繩掛開口將淨布拭淨口舌卻拖牛舌出來後有涎出以碗盛之每服用八分盞為一服研好麝香末一捻打勻卻以銀盞蕩令溫先以絹帛束縛中脘胃口令極緊候氣喘一二口便服服藥時先對病人說煮白粥共服之即煎丁香汁和粥服藥罷隨與粥吃一方老牛涎沫如棗核大置水服之終身不噎丁附散出澹寮方治冷吐翻胃及吃食移時即吐緣水不勝火復還脾脾不能受即吐附子一個大者周迴鑽孔用丁香插入孔內以麵裹煨熟去面不用上以附子丁香為末同豬臀肉切片炙熟蘸藥末嚼下空心頓服十數片用生薑汁鹽湯漸下一方不用丁香用粟米一捻北棗二個煎湯調服又方一名丁附奪命散治症如前七情內郁者宜蘇合香丸寬中散附子一個生薑自然汁六兩分三分上附子不去皮臍破作兩片以薑汁二兩煮附干又破四片以薑汁二兩煮乾又破作八片以薑汁二兩煮乾細切焙乾入丁香二錢半同為末每服一錢以湯調服治翻胃出儒門事親用黃柏末飲調下鯽魚散出本事方治翻胃用大鯽魚一個去腸留膽綠礬末填滿縫口以炭火炙令黃干為末每服一錢陳米飲調下日三服大黃湯出本事方治冷涎翻胃其後於發時先流冷涎次則食吐此是勞證治之不早死在旦夕用大黃一兩生薑自然汁半茶盞炙大黃令乾又淬入生薑汁中如此淬盡切焙為末每服二錢陳米一撮蔥白二莖水一大盞煎七分先食蔥白次服其藥不十日根絕螺泥丸出經驗良方治翻胃嘔噎用田螺不拘多少洗淨磁盆水養令吐出泥用米篩張灰於地上卻將綿紙鋪於灰上去已養田螺令泥水出澄清旋去上面清水卻將泥傾於紙上候泥干調丸梧桐子大每服三十丸藿香湯下立愈仍將田螺放江中如殺食之其病不安一方用爛殼為灰末服之治翻胃朝食暮吐暮食朝吐旋即吐者出危氏方用甘蔗汁七升生薑汁一升相和打如粉分作三服正胃散治翻胃嘔吐藥食俱不下結腸三五日至七八日大便不通如此者必死之疾昔全州大智禪師方得於異人服之十全八九用偶有白水牛喉收取一條去兩頭節並筋膜脂肉有取下如阿膠黑片不可用須就宰牛人買下修事了臨病時施炙調合用好米醋一大盞浸頻翻動浸冷用微火炙乾淬醋炙再炙再淬醋乾為度不見太陽火研為細末用厚紙包收或遇陰濕時用連紙包放微火上溫焙之再收如有此疾每服一錢食前陳米飲調下輕者一服立效切不可專意殺牛取喉決不見效非惟無益於病徒然有害於物而且受殺牛之報收方君子見藥須收以濟人病治翻胃用木槿花煮糯米粥服之又方出百一選方用松節銼碎酒煎服之又方出百一選方用灶中土十餘年者為細末米飲調下三二錢經驗方並用炭灰又方用干大米殼煎汁服之又方用田上細葉紫背草杜烏藥洗淨各半空心酒煎服之又方出朱氏集驗方用驢小便昔有患此疾每服食餅及羹粥等項須臾吐出大觀中許奉御兄弟柴蔣等家時補名醫奉敕令治罄竭其術所患竟不能療漸至羸憊死在候絕朝夕忽有一衛士云服驢小便即日服二合後食唯吐一半晡又服二合人定時食粥吐即便定迨至今日午時奏知之大內