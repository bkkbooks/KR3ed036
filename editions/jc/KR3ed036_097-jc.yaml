body:
  text: 卷九十七諸風門風偏枯附論夫風偏枯者由血氣偏虛則腠理開受於風濕風濕客於半身在分腠之間使血氣凝澀不能潤養久不瘥生氣去邪獨留則成偏枯其狀則半身不遂肌肉偏枯小而痛言不變智不亂是也邪初在分腠之間宜溫臥取汗益其不足損其有餘乃可復也診其胃脈沉大心脈小牢急皆為偏枯男子則廢左女子則廢右若不喑舌轉者可療三十日起其年未滿二十者三歲死又左手尺中神門以後脈足太陽經也虛者則病惡風偏枯此由愁思所致憂思所為也方凝水石酒出聖濟總錄治八風十二痹偏枯不遂宿食虛冷五勞七傷亦治婦人產後余疾月水不調皆主之凝水石白石英白石脂代赭石礬石礜石石膏芒硝卷柏石南葉石葦各一兩天雄附子並炮裂去皮臍常山續斷芫花白朮防風去叉黃芩去黑心黃連去須大黃炒麻黃去根節熟乾地黃山茱萸杏仁湯浸去皮尖雙仁元參䕡茹狼毒半夏湯洗七次焙藜蘆菖蒲前胡去蘆頭蜈蚣炒甘草炙龍膽桔梗銼炒秦艽去苗土芍藥紫菀去苗白芷遠志去心菟絲子酒浸一宿焙各一兩上銼如麻豆盛以絹袋用水三斗七月七日曲三斤黍米三升作飯依和酒法以藥袋著釀中春秋七日冬十日夏三日酒成服半雞子殼日三並暴囊中藥滓更搗篩酒服方寸匕以體暖為度一方有桂心細辛烏頭躑躅蜀椒無芒硝大八風湯療毒風濕痹嚲曳或手腳不遂身體偏枯或毒弱不任或風經五臟恍恍惚惚或多語喜忘有時恐怖或肢節痛疼頭眩煩悶或腰脊強直不得俯仰又加腹滿食少時氣咳逆或始遇病時卒倒悶絕即不能語便失音半身或舉體不遂不仁沉重皆由體虛恃少不避風冷所致漏蘆散出聖濟總錄治中風偏枯手足不遂漏蘆去蘆頭地龍去土炒當歸切焙附子生用去皮臍各一兩半天麻二兩乾蠍去土炒黃耆細銼沒藥研丹砂研各半兩白花蛇酒浸經宿去皮骨炙取肉烏蛇酒浸經宿去其皮骨炙各半兩慄楔牛膝酒浸切焙麻黃去根節羌活去蘆頭天南星生用獨活去蘆頭虎骨酥炙黃麻黃去根節白殭蠶炒各一兩麝香研二錢桑根白皮銼炒半兩上除別研外搗羅為細末即入別研者拌和令勻每服半錢匕研胡桃酒調下豆淋酒亦得如急中風手足攣拳言語謇澀服一錢匕服了就所患病處臥立應或有汗出慎外風牛黃丸出聖惠方治中風偏枯不遂常在床枕轉動艱難牛黃細研麝香細研各一分硃砂細研水飛過天南星炮裂天雄炮裂去皮臍牛膝去苗赤茯苓威靈仙烏犀角屑羚羊角屑萆薢銼各一兩躑躅花酒拌炒乾羌活人參去蘆頭白殭蠶微炒天麻獨活防風去蘆頭芎藭當歸銼炒各一兩半烏蛇酒浸去皮骨炙微黃三兩上為末入前研了藥令勻煉蜜和丸如梧桐子大每服食前以溫酒下十五丸龍腦丸出聖惠方治中風偏枯不遂肢節疼痛行步艱難龍腦細研雄黃細研麝香各細研牛黃細研天南星炮裂躑躅花酒拌炒乾各一分硃砂細研水飛過乳香細研乾蠍微炒白殭蠶微炒安息香各半兩川烏頭去皮臍生用天麻羌活附子去皮臍生用白花蛇酒浸去皮骨炙令微黃各一兩白附子炮裂三分麻黃去根節搗碎以酒五升煎取一升去滓熬成膏五兩上為末入前研藥六味令勻另用麻黃膏和搗三五百杵丸如梧桐子大每服食前以溫酒下十丸忌生冷羊血油膩毒滑魚肉甘草湯治中偏風積年不瘥手足枯細口面喎斜精神不守言語倒錯甘草炙銼側子炮裂去皮臍桂去粗皮防己各一兩防風去叉三分附子炮裂去皮臍芎藭人參麻黃去根節煎掠去沫焙乾當歸切焙赤芍藥各一兩秦艽去苗土三分茯神去木二分白朮半兩黃芩去黑心半兩細辛去苗葉微炒半兩重甘菊花未開者一兩上銼如麻豆大每服六錢匕以水二盞入生薑半分切煎至一盞去滓入竹瀝半合更同煎沸溫服空心日晚近夜服牛膝浸酒方治風及偏枯腰膝疼痛牛膝去苗茄子根各八兩防風去蘆頭鼠黏子微炒三兩萆薢枸杞子羌活海桐皮蒼耳子搗碎附子炮裂去皮臍五加皮虎脛骨塗酥炙微黃各二兩牛蒡子四兩大麻子搗碎晚蠶砂黑豆炒熟搗碎各三合兩秦艽去苗一兩上細銼以生絹袋盛用好酒三斗密封頭浸經七日每日空心午時及夜臨臥溫飲一小盞其酒旋添味淡即換藥忌豬肉雞毒魚黏滑物烏蛇散治中風偏枯手足不遂筋骨疼痛烏蛇酒浸去皮骨炙令微黃二兩赤箭羌活防風去蘆頭桂心海桐皮藁本萆薢銼獨活當歸阿膠搗碎炒令黃燥用麻黃去根節天雄炮去皮臍枳殼麩炒微黃去瓤乾薑炮銼牛蒡子根乾者刮去皮各一兩上搗細羅為散每服不計時候以溫酒調下二錢忌生冷油膩雞豬狗肉沒藥丸治中風偏枯手足不遂言語謇澀口眼喎斜沒藥研乳香研丹砂研各半兩麝香研一分人參銼半兩烏頭炮裂去皮臍地龍去土炒玄參各一兩羚羊角鎊屑一分犀角屑鎊一分丁香一分木香一分天麻酒浸一宿細切片焙乾二兩龍腦研一分上為細末煉蜜和丸以金箔為衣櫻桃大每服一丸溫酒化下食前服日二重病者服一月瘥初患五七服即愈一方治中風手足不遂有白花蛇無玄參茱萸散治中風偏枯不遂筋脈拘急肢節疼痛山茱萸一兩半天雄炮裂去皮臍一兩半麻黃去根節川椒去目及閉口者微炒去汗萆薢銼桂心川烏頭炮裂去皮臍防風去蘆頭甘草炙微赤銼牛膝去苗狗脊莽草微炙躑躅花酒拌炒令乾石南各一兩上搗羅為散每服不計時候以溫酒調下二錢祛風丸治中風偏枯手足戰掉語言謇澀筋骨疼痛川烏頭炮草烏頭炮天南星半夏各一兩綠豆粉一兩甘草川芎藿香葉白殭蠶糯米泔浸去絲用零陵香地龍蠍梢各三錢川薑半兩炮上為末二兩用綠豆粉一兩以白麵二兩滴水為丸如梧桐子大量人虛實加減細嚼茶酒下五七丸食後初服三丸漸加天蓼木浸酒治中風偏枯不遂失音不語天蓼木十片細銼以水一石煎至五斗用此水造酒須五斗熟後浸後藥桑根白皮地骨皮石斛去根遠志去心牛膝去苗菟絲子各半斤生地黃防風去蘆頭各半兩槐子白蒺藜微炒去刺各半升烏蛇一條酒浸炙令黃烏雞糞五合炒上細銼以生絹袋盛入天蓼木酒中密封閉冬月三七日春夏二七日量性飲之令常有酒容如覺熱即減之眼鼻及面口偏者七日取正手腳不遂者半月內瘥失音服之即語此方神驗不具言之十聖天麻丸治中風手足偏枯跛謇不遂天麻酒浸焙乾地榆淨洗焙附子以生薑半兩棗四枚同煮一時去皮臍切碎焙乾炒各三兩白附子米泔浸焙乾三兩丁香半兩木香半兩雄黃研半兩黃耆細銼三兩以上七味同搗羅為末犀角鎊屑為細末真珠研各半兩牛黃研一兩麝香研一兩上除七味搗羅外五味別研然後同拌和令勻後煉蜜丸櫻桃大每服一丸溫酒嚼下移時更以熱酒一盞投之任加衣被蓋覆空心食前臨臥各一服六十歲以下兩月平復四十歲以下一月平復十日後或汗出或如蟲行勿怪如欲常服每丸分作四服逐日一服虎脛骨酒出濟生方治風偏枯半死行勞得風若鬼所擊四肢不遂不能行步但是一切諸風攣急之證悉皆治療石斛去根石南葉防風去蘆虎脛骨酥炙當歸去蘆茵芋葉杜仲銼炒川牛膝去蘆芎藭川續斷金毛狗脊燎去毛川巴戟去心各一兩上銼如豆大以絹囊盛藥以酒一斗漬之十日每服一盞燙熱服不拘時候桂心散出聖惠方治中風偏枯手足不遂筋脈拘急疼痛腹脅不利桂心枳殼麩炒微黃去瓤牛膝去苗檳榔各一兩續斷虎掌湯洗七遍生薑汁拌炒令黃各半兩重銼海桐皮萆薢銼犀角屑木香當歸羌活各三錢上搗篩為散每服四錢以水一大盞入生薑半分煎至五分去滓不計時候麻黃散出聖惠方治中風偏枯不遂輕利四肢宣祛風毒麻黃去根節羌活芎藭荊芥附子炮裂去皮臍獨活防風去蘆頭天麻甘草炙微赤銼赤芍藥桂心檳榔各半兩上搗細羅為散每服不計時候以溫酒調下二錢天雄散出聖惠方治中風跛謇偏枯不遂肢節疼痛晝夜呻吟天雄炮裂去皮臍白蘞桂心附子炮裂去皮臍薯蕷乾漆搗碎炒令煙出狗脊防風去蘆頭當歸各一兩吳茱萸湯浸七遍焙乾微炒乾薑炮裂銼枳殼麩炒微黃去瓤各半兩上搗細羅為散每服不計時候以溫酒調下二錢忌生冷油膩等物當歸湯出聖濟總錄治中風手足偏枯口面喎斜疼痛百治不能合當歸切焙白芷防風去蘆白蘚皮白朮芎藭甘草炙銼甘菊花杏仁湯浸去皮尖雙仁炒各一兩人參半兩天雄炮裂去皮臍一兩上銼如麻豆大每服五錢匕以水二盞入生薑半分切煎至一盞去滓溫服日三夜一與食相間服之金箔丸出聖濟總錄治中風偏枯手足不遂言語謇澀心神恍惚金箔研二錢丹砂研一兩阿膠炙燥二兩丁香一兩麝香研一兩龍腦研一兩牛黃研一兩墨燒過細研半兩天南星炮半兩雄黃研一兩上為細末再將研藥拌勻煉蜜丸如梧桐子大每服二丸細嚼溫酒下此藥兼療婦人血風頭目昏眩胸膈諸疾乳香沒藥丸治中風偏枯氣痹手足不能舉動沒藥研乳香研虎脛骨酥炙黃白附子炮木鱉子去殼草烏頭銼炒黑存性以上各一兩麻黃去根節三兩自然銅醋淬七次研一兩乾蠍去土炒二兩上為細末再入研藥拌勻以酒磨濃墨汁和先分作十塊每塊更分作二十丸每服一丸溫酒磨下日三五服不拘時候服之獨活散出聖惠方治中風偏枯不遂口眼不正語澀四肢拘攣獨活桂心赤箭羚羊角屑各半兩枳殼麩炒微黃去瓤芎藭當歸銼微炒細辛各一兩防風去蘆頭三分上搗粗羅為散每服四錢以水一中盞煎至六分去滓入竹瀝半合更煎一兩沸不計時候溫服忌生冷油膩豬雞肉赤車使者酒出聖濟總錄治中風濕偏枯緩縱不遂五勞七傷寒冷百病者赤車使者當歸切焙各半兩防風去叉獨活去蘆頭細辛去苗葉人參各一兩白茯苓去黑皮半兩附子炮裂去皮臍十五枚上銼如麻豆大用水一斗曲一斤五兩造酒內三斗罌中密以油袋盛罌勿令水入沉井底三宿藥成即置高燥處停二日平旦服半盞日三漸增之天南星丸出聖濟總錄治風偏枯體肢細小而痛言語神智不亂天南星半夏湯洗七次焙烏頭去皮臍草烏頭自然銅木鱉子去殼滑石各二兩乳香一分並生用上為細末用醇酒煮麵糊和丸如梧桐子大每服十丸溫酒送下川烏頭丸出聖惠方治中風偏枯不遂手足攣急疼痛川烏頭炮裂去皮臍一兩天南星炮裂半兩白殭蠶微炒三分桂心半兩赤箭一兩安息香一分麝香細研二錢牛黃細研半兩上為末研入後二味勻煉蜜和丸如梧桐子大每於食前麻黃酒下五丸兼取麻黃末三兩以酒二升慢火煎如膏放冷丸如彈子大每服以冷酒或冷水研下一丸須臾偏枯處有汗通手足舒展獨活浸酒出聖惠方治中風偏枯不遂骨節冷痛獨活桂心防風去蘆頭附子炮裂去皮臍牛膝各一兩大麻子二合川椒去目及閉口者微炒去汗天蓼木銼各二兩上並細銼以生絹袋盛以酒一斗密封頭浸三日後開每日食前及臨臥時暖一中盞飲之以藥力盡為度患者不過三兩劑必效磁石湯治中風偏枯骨酸無力磁石燒赤醋淬七次三兩防風去叉三兩五味子二兩甘草炙銼一兩玄參一二兩牡丹去心二兩附子炮裂去皮臍一兩上銼如麻豆大每服五錢匕以水二盞入黑豆三十五粒同煎至一盞去滓空心午夜臥服虎骨散出仁存方治半身不遂肌肉乾燥漸漸細瘦時或疼痛由血少氣勝風邪留於脈絡榮衛不得運行名曰偏枯謹勿用麻黃藥發汗重亡津液愈耗其血也當潤筋去風當歸二兩赤芍藥川續斷白朮藁本虎骨各一兩烏蛇肉半兩上為細末每二錢溫酒調下食後服如骨中煩疼熱者加生地黃一兩若臟寒自利者加天雄半兩一方有防風無藁本竹瀝飲子出聖惠方治中風偏枯不遂言語謇澀膈上熱心神恍惚昏昏如醉竹瀝三合羚羊角屑半兩石膏二兩茯神一兩麥門冬去心獨活各三分上細銼都以水三大盞煎至一盞半去滓入竹瀝分為四服不計時候溫服之皂莢丸出聖惠方治中風偏枯不遂行步艱難出汗肥皂莢十梃去黑皮塗酥炙令黃去子羌活二兩防風去蘆頭桂心各三兩干薄荷四兩附子炮裂去皮臍二兩上搗羅為末煉蜜和丸如梧桐子大每服以溫酒或薄荷湯下二十丸日三服常於患處有汗為效犀角煎出聖濟總錄治中風手足偏枯不遂或癱或瘓腳氣攻頭面浮腫口眼喎斜語澀多涎精神恍惚大便風秘犀角鎊屑搗細末天麻取細研末附子炮裂去皮臍取末各二兩龍腦生者研半兩威靈仙十斤紫色者上先將威靈仙用河水一石煮至三斗以絹濾去滓只取清汁更入醇酒一斗同再以銀石器中熬至一斗更澄去細滓次入天麻附子末在藥汁中再以慢火煎成膏放令溫冷後入犀角屑末龍腦末一處同攪勻同瓷盒子內盛之如有患者用薄荷湯化下一錢服之茵芋淋浸出聖濟總錄治中風手足偏枯攣躄不得屈伸茵芋去粗莖三兩獨活去蘆頭六兩防己四兩蒺藜子去角生用二升椒去目及閉口者一升上粗搗羅篩以清漿水三斗煮取二斗去滓入鹽二兩半適寒溫用淋浸所患手足水溫即止雞峰活血丹出指南方治一邊足膝無力漸漸乾瘦上牽脅肋下連膝脛筋脈攣急妨於步履由病後重亡津液血少不能榮養於筋故也乾地黃三兩白芍藥當歸川續斷白朮各一兩上為末酒糊丸梧桐子大每服三十丸溫酒下三靈丹出聖惠方治中風偏枯不遂口不收涎丹砂研三兩雌黃研一兩硫黃研半兩上先將雌黃硫黃於鍋內銷成汁後下丹砂末攪令勻候冷卻下桑柴灰汁煮三日三夜旋旋添暖灰汁日足即住刮入鼎子中以文武火逼干出陰氣盡入盒子內固濟以二十斤火煅候火銷至三五斤其藥已在盒底作一片候冷鑿取以瓷器中入水煮一日出火毒了更研令細入棗肉和研為丸如綠豆大每日空心以冷椒湯下三丸漸加至五丸服半月即瘥忌羊血山龍丸出聖濟總錄治偏風半身枯瘦肢體細小而痛蜥蜴一名山龍子酥炙二錢海蛤一錢烏頭炮裂去皮臍半錢上為細末麵糊丸分作兩粒蔥白兩枝中心分開入藥在內帛子系向兩腳心底用暖火浸以衣被覆之春夏浸至踝秋冬浸至膝自然汗出羌活散出醫方集成治中風偏廢附子一個羌活烏藥各一兩上㕮咀每服五錢水四盞慢火煎至二盞去滓分二服香豉散療三十年風躃偏枯不能行生地黃三十斤香豉三升綿裹上洗地黃㕮咀先蒸之半日暴燥更合豉蒸半日暴令燥搗下篩以酒服三方寸匕日夜三亦可水服益精爽氣服數月有神效小黃耆酒出千金方治大風虛痰癖四肢偏枯兩腳弱手不能上頭或小腹縮痛脅下攣急心下有伏水脅下有積飲夜喜夢悲愁不樂恍惚善忘此因風虛五臟受客邪所致或久坐腰痛耳聾卒起目眩頭重或舉體流腫疼痹飲食惡冷澀澀惡寒胸中痰滿心下寒疝藥皆主之及婦人產後余疾風虛積冷不除者黃耆附子蜀椒防風牛膝細辛桂心獨活白朮芎藭甘草各三兩秦艽大黃葛根乾薑各二兩山茱萸二兩當歸二兩半上㕮咀少壯人無所熬煉虛老人微熬之以絹袋中盛清酒二斗漬之春夏五日秋冬七日可先食服一合不知可至四五合日三服此藥攻痹甚佳亦不可令人吐悶小熱宜冷飲食大虛加蓯蓉二兩下利加女萎三兩多忘加石斛菖蒲紫石各二兩心下多水者加茯苓人參各二兩薯蕷三兩酒浸若盡可更以酒二斗重漬滓服之不爾可曝滓搗下酒服方寸匕不知稍增之服一劑得力令人耐寒冷補虛治諸風冷神良治中風偏枯不遂手腳冷頑強硬展縮不得及走注疼痛皂莢一斤不蛀者十截鹽二斤上相和炒令熱以青布裹熨令麻疼痛處以瘥為度治風攣拘急偏枯血氣不通利出肘後方以雁肪四兩煉濾過每日空心暖酒一杯肪一匙頭飲之續斷湯出指南方治偏枯少血當歸三兩生用生地黃二兩橘皮芍藥細辛去苗各一兩上為粗末每服五錢水二盞煎至一盞去滓溫服臟寒多利者加附子一兩炮去皮臍入前藥內大八風湯出指南方治中風偏枯失音半身不遂時恍惚當歸切焙杏仁去皮尖甘草炙桂去粗皮乾薑各二兩五味子升麻各一兩川烏炮去皮臍黃芩芍藥獨活防風川芎麻黃去節秦艽石斛去節人參茯神石膏黃耆紫菀去苗各一兩大豆三兩炒去皮上為粗末每服五錢水二盞酒一合煎一盞去滓溫服恍惚不用酒導引法養生方云正倚壁不息行氣從頭至足止愈疽疝大風偏枯諸風痹又云仰兩足指五息止引腰背痹偏枯令人耳聞聲常行眼耳諸根無有障礙又云正倚壁不息行氣從口趣令氣至頭始止療疽痹大風偏枯又云一足立地足不動一足向側相轉身欹勢並手盡急回右左二七去脊風冷偏枯不通潤中風四肢拘攣不得屈伸附論夫藏真散於肝肝藏筋脈之氣筋為肝所養筋得所養則俯仰屈伸莫或乘戾若經絡偏虛風邪乘虛客於機關則筋脈縮急干於陽絡則肩背從而拘攣此皆邪氣內盛正氣不能榮養諸筋故為四肢拘攣不得屈伸久而不已重感於邪則夜臥不寧小便滑數凡以肝藏魂其病為驚駭又腎之脈絡膀胱其直者從腎上貫肝膈而致然也蓋此由體虛腠理開風邪在於筋故也春遇痹為筋痹則筋屈邪客關機則使筋攣邪客於足太陽之絡令人肩背拘急也足厥陰肝之經也肝通主諸筋王在春其經絡虛春遇風邪則傷於筋使四肢拘攣不得屈伸診其脈急細如弦者筋急足攣也若筋屈不已又遇於邪則移變入肝其狀夜臥則驚小便數也方生犀丸出聖濟總錄治風邪客於機關筋脈縮急肢體拘攣生犀鎊木香赤箭牛膝去苗酒浸微炒芎藭天麻漿水煮一日切作片子焙乾蓽澄茄各取末二兩威靈仙去土焙乾干薄荷取末羌活去蘆頭薏苡仁酸棗仁微炒補骨脂生乾地黃焙各取末三兩黃耆銼焙何首烏米泔浸五日竹刀子切焙甘菊花杜仲去粗皮炙銼防風去叉白花蛇酒浸一日去皮骨炙黃蔓荊子桂去粗皮丹砂研厚朴去粗皮生薑汁炙令香白附子微炮白芷甘草炙銼各一兩香墨生用須年深絕好者用二兩佳上為末別入生龍腦五錢細研於淨盤中攪拌勻再羅三兩遍須是勻細煉蜜調和得入臼中杵約三千下取出每一兩分作三十丸以麝香油塗手為丸以入瓷器內收盛身體昏沉鼻塞氣悶煎人參湯嚼下二十丸日三服不拘時候上膈不利痰涎忽多以龍腦木香湯嚼下二十丸食後臨臥一日三服常服茶酒任下輕骨丹出御藥院方治中風手足緩弱肢節不伸筋脈攣急癱瘓偏風半身不遂口面喎斜語言謇澀肌肉不生一切諸風並皆治之常服此藥壯筋骨補虛駐顏色強骨生力益真氣降骨髓間風邪牛膝菟絲子肉蓯蓉並酒浸獨活當歸羌活並去土骨碎補去毛金毛狗脊去毛附子炮去皮臍萆薢蜜炒川烏頭炮去皮臍川心巴戟鹽炒破故紙葫蘆巴白芥子五味子天麻防風去蘆頭川芎全蠍續斷各一兩木香三錢沒藥並別研地龍去土甜瓜子炒木鱉子各半兩熟地黃一兩乳香半兩上為細末酒煮麵為丸如梧桐子大每服三十丸至四十丸食前溫服酒下萆薢丸出聖惠方治風毒所攻四肢拘攣骨節疼痛腳膝無力萆薢酸棗仁微炒獨活附子炮裂去皮臍石斛去根銼虎脛骨塗酥炙黃檳榔以上各一兩乾蠍半兩微炒芎藭仙靈脾丹參牛膝去苗當歸防風去蘆頭桂心狗脊赤箭海桐皮木香以上各三分麝香一分細研上為末入研了藥令勻煉蜜和丸如梧桐子大每服不計時候以溫酒下二十丸酸棗仁煎出聖濟總錄治筋骨拘急及軟風疼痛行履不得列節浸酒方出聖惠方治風骨節疼痛行履不任列節黃耆羌活桂心海桐皮虎脛骨酥塗炙黃牛膝去苗附子炮裂去皮臍各二兩防風去蘆頭茵芋生乾地黃芎藭當歸枸杞子敗龜酥塗炙微黃白芷五加皮酸棗仁以上各一兩黑豆三合炒熟上細銼和勻以生絹袋盛用酒三斗密封瓶頭浸經一七日後開取每日空心午時及夜臥熱暖一小盞飲之其酒旋旋更添或將此酒下諸丸散亦得忌生冷豬雞牛馬肉白花蛇丸出聖濟總錄治風邪客於機關筋脈縮急肢體拘攣白花蛇酒浸去皮骨取肉炙一兩蟬殼去泥土乾蠍去土炒人參天麻白殭蠶洗炒萆薢當歸切焙芎藭羌活去蘆白芷烏頭炮裂去皮臍附子炮裂去皮臍各半兩狼毒三分炮生犀角末半兩龍腦三錢別研雄黃研兩半水飛過甘草炙銼一分上研勻煉蜜和丸如皂角子大每服不拘時茶酒任嚼下一粒服之乳香丸出聖濟總錄治中風四肢拘攣筋骨疼痛乳香細研一兩烏頭炮裂去皮臍附子炮裂去皮臍雄黃細研水飛各半兩羌活去蘆頭一兩白附子炮一兩羚羊角屑一兩原蠶蛾微炒防風去叉烏蛇酒浸去皮骨炙白殭蠶炒虎脛骨酥炙一兩膩粉一分麝香細研一分赤箭牛膝酒浸切焙沒藥研各半兩上為末再同和勻煉蜜丸如梧桐子大每用豆淋熱酒下十丸如人行十里再服羌活散出聖惠方治風毒入四肢筋脈拘攣疼痛羌活天麻酸棗仁微炒羚羊角地骨皮柏子仁以上各一兩半芎藭鹿角膠搗碎炒黃側子炮裂去皮臍人參去蘆頭白附子炮裂桂心薏苡仁海桐皮各一兩牛膝去苗二兩烏蛇酒浸去皮骨炙微黃三兩犀角屑三分上為散不拘時候以豆淋酒調下二錢羌活湯出聖濟總錄治中風四肢拘攣筋急或緩縱不遂骨肉疼痛羸瘦眩悶或腰背強直或心忪虛悸怵惕不安服諸湯汗出後又覺虛困病仍未痊急服羌活去蘆頭三一兩防風去叉三兩人參三兩白茯苓去黑皮四兩芎藭二兩遠志去心二兩半薏苡仁炒三兩附子炮裂去皮臍桂心去粗皮麻黃去根節先煎掠去沫焙乾各二兩磁石煅醋淬五兩秦艽去苗土丹參各二兩五加皮二兩半生乾地黃焙杏仁湯退去皮尖雙仁炒各半兩上銼如麻豆每服五錢匕用水二盞棗二枚擘破生薑半棗大切同煎至一盞去滓溫服空心晚食前各一服若病者有熱即去桂加葛根一兩銼白蘚皮一兩炙銼四肢疼痛痿弱攣急加當歸切焙細辛去苗葉各二兩天雄丸出聖濟總錄治筋骨拘急脅下痛不可轉側天雄炮裂去皮臍桂去粗皮羌活去蘆頭當歸切焙白朮炒天麻酒炙芎藭各一兩烏藥炒陳橘皮去白焙續斷石斛去根白茯苓去黑皮乾薑炮白芷炒乾蠍去土炒乾漆炒令煙出各一兩上搗羅為末煉蜜和丸如梧桐子大每服三十丸空心荊芥酒下日二服防風散出聖惠方治風四肢不利筋脈拘急發歇疼痛防風去蘆頭羌活黃耆五加皮牛膝去苗丹參酸棗仁微炒桂心赤茯苓麻黃去根節附子炮裂去皮臍以上各一兩檳榔當歸枳殼麩炒微黃去瓤以上各三分上為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時候溫服忌生冷油膩豬雞犬肉牛黃丸出聖惠方治風毒攻四肢筋脈拘急牛黃研麝香研各半兩白附子炮裂防風去蘆頭虎脛骨酥塗炙黃大黃銼炒微黃桂心羚羊角屑各一兩烏蛇酒浸去皮骨炙令微黃白殭蠶微炒附子炮裂去皮臍各二兩天麻羌活各一兩半麻黃三分去根節上為末以無灰酒五升於銀鍋內用藥末一半同熬候如膏入余上藥並牛黃麝香和搗三五百杵丸如雞頭實大每服不拘時候以溫酒嚼下三丸乳香丸出聖惠方治中風四肢拘攣筋骨疼痛乳香研白附子炮裂羚羊角晚蠶蛾微炒烏蛇酒浸去皮骨炙令微黃羌活防風去蘆頭白殭蠶微炒以上各一兩烏頭炮裂去皮臍雄黃研水飛過附子炮裂去皮臍各半兩膩粉麝香研各一分上為末煉蜜和丸如梧桐子大每服以熱豆淋酒下十丸如人行十里再服一方加當歸三分防己麻黃湯出聖濟總錄治中風四肢拘攣急強疼痛口燥咽乾舌上白屑兼理寒冷風濕風毒肢節攣急及胸脅腰背上心腹暴痛不可轉側防己一兩一分麻黃去節先煎掠去沫焙乾一兩桂心去粗皮一兩厚朴去粗皮生薑汁炙五遍一兩半獨活去蘆頭一兩芎藭三分石膏一兩一分搗秦艽去苗土三分桑寄生三分牛膝酒浸切焙一兩一分葛根銼三分甘草炙銼三分上粗搗篩每服五錢匕水二盞煎至一盞去滓溫服日三夜一服不拘時候咳嗽者加杏仁一兩湯退去皮尖雙仁同搗天麻丸出聖惠方治中風四肢筋脈拘攣骨節疼痛少力天麻半兩蠍梢微炒沒藥各一分研麻黃去根節半兩丹砂研麝香研各一分地龍去土炒半兩防風去叉半兩烏頭去皮臍生用乳香研自然銅煅醋碎各半兩安息香一兩酒化入蜜同熬成膏上除安息香外搗研為末再同研勻以安息香膏和劑丸如梧桐子大每服不拘時候以薄荷酒下二十丸忌羊血有人患手臂不遂又有人患腿膝無力行步輒倒服之並效素有熱人減烏頭一半茵芋酒治賊風手足枯痹四肢拘攣茵芋酒主之茵芋附子天雄烏頭秦艽女萎防風防己躑躅石南細辛桂心各一兩上切以絹袋盛清酒一斗漬之冬七日夏三日春秋五日藥成初服一合日日漸增之以微散為度一方無細辛桂心西州續命湯療中風入臟及四肢拘急不遂緩急風麻黃三兩去節石膏二兩碎芎藭一兩生薑三兩黃芩一兩甘草一兩炙芍藥一兩桂心一兩郁李仁三兩去皮防風一兩當歸一兩杏仁四十枚去皮尖雙仁上㕮咀以水九升煮麻黃去上沫內諸藥煮取三升分四服初服取汗米粉於衣裹粉之忌海藻菘菜生蔥薏苡仁散出聖惠方治風手足拘攣百節疼痛煩熱心亂惡寒經日不飲食服之薏苡仁細辛各二兩黃耆銼人參去蘆頭枳殼麩炒微黃去瓤羚羊角屑赤芍藥各三分五加皮獨活麻黃去根節天雄炮裂去皮臍白朮以上各一兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時候溫服獨活散出聖惠方治風口眼不正語澀四肢拘攣獨活防風去蘆頭各一兩半枳殼麩炒微黃去瓤芎藭當歸銼微炒薏苡仁酸棗仁微炒各一兩細辛桂心羚羊角屑桑根白皮銼各三分兩上為散每服五錢以水一大盞煎至五分去滓入竹瀝半合相和不拘時候溫服酸棗仁丸出聖惠方治風毒流注四肢筋脈拘攣疼痛少得睡臥酸棗仁微炒羚羊角屑防風去蘆頭晚蠶砂檳榔以上各一兩半附子炮裂去皮臍藁本柏子仁羌活赤芍藥各一兩熟乾地黃二兩上為末煉蜜和搗二三百杵丸如梧桐子大每服不拘時候溫酒下三十丸人參湯出聖濟總錄治中風四肢拘攣舌強不能語精神恍惚人參三分石膏二兩半搗碎芍藥三二分芎藭防己銼桂去粗皮防風去叉各一兩附子炮去皮臍半兩一枚麻黃去節先煎掠去沫焙乾一兩半杏仁湯浸去皮尖雙仁麩炒四十九枚上銼如麻豆每服五錢匕水二盞入生薑半分切煎至一盞去滓溫服空心一服相去如人行五里再一服衣覆微汗勿觸外風如體中覺熱每服更入竹瀝一合同煎三沸服天麻丸治風四肢筋脈拘攣骨節疼痛天麻地龍去土焙乾川烏頭去皮臍生用乳香以上各半兩乾蠍微炒沒藥硃砂細研麝香細研防風去蘆頭各一分麻黃去根節三分上為末研入硃砂麝香令勻煉蜜和搗三二百杵丸如梧桐子大每服不拘時候以薄荷酒下二十丸忌羊血白花蛇散出聖濟總錄治筋脈拘急攣縮疼痛白花蛇酒浸去皮骨取肉炙用天南星炮天雄炮裂去皮臍乾蠍去土炒白殭蠶炒麻黃去根節湯煮掠去沫焙乾各一兩蜂房甘草炙乾薑炮各半兩上為末研勻每服二錢以溫酒調下白蘞薏苡湯出仁存方治中風拘攣不可屈伸白蘞薏苡仁芍藥桂心牛膝酸棗仁乾薑甘草各一升附子三枚上㕮咀以醇酒二斗漬一宿微火煎三沸每服一升日三扶杖起行不耐酒服五合一方有車前子烏蠍丸出危氏方治手足拳攣痛不可忍乳香沒藥別研為末地龍去土全蠍去毒草烏各五錢烏藥炒麝香各一兩蜈蚣一條去足炒川烏二隻生用去皮臍上為末麵糊丸梧桐子大每服七丸至十丸十五丸用麝香少許好小酒送下空心服服至七日略利至半月或滿身發風丹經月方沒多服其病安痊後常用生川烏沒藥浸酒日二服通氣流風湯加乳香沒藥生川烏麝香少許酒調再服不飲木瓜湯下服此忌熱食一時前安吉城內李秀才妻年六十五歲於辛亥年忽患手足不能伸屈人以為歷節風服此藥效而愈當歸散出聖惠方治風四肢不仁及不能語但拘攣背痛不得轉側當歸銼微炒桂心獨活以上各二兩麻黃四兩去根節芎藭海桐皮銼乾薑炮銼甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃以上各一兩上為末每服五錢以水一大盞入生薑半分煎至五分去滓不拘時候溫服蜂兒丸出聖惠方治風四肢拘攣疼痛蜂兒白花蛇肉天雄去皮臍天南星乾蠍白殭蠶桑螵蛸地龍以上各一兩麝香半兩細研上並生用為末以酒煮槐膠入少煉了蜜和搗三二百杵丸如梧桐子大每服不拘時候以溫酒下五丸防己湯出聖濟總錄治中風四肢拘攣筋急疼痛浮腫防己一兩半銼白茯苓去黑皮桑根白皮炙銼各二兩桂去粗皮芎藭各一兩半甘草炙銼三兩麻黃去節先煎掠去沫焙乾一兩半芍藥一兩上粗搗篩每服五錢匕水二盞入大棗二枚擘破煎至一盞去滓溫服相去如人行十里再服中間吃熱生薑稀粥投之衣覆取汗候汗解以粉粉之慎觸外風病在四肢者宜並服在晚食後良勻氣散出瑞竹堂凡腰腿疼半身不遂手足不能屈伸口眼喎斜風氣中風便用風藥治之十無一愈當以氣藥治之氣順則風散昔有人曾患風疾諸藥不愈因得此方其疾如失常服能治腰腿疼痛止白朮四兩煨沉