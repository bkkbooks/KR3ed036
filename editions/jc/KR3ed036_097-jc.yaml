根銼碎研為末米醋調隨大小敷之治手足腕中風屈伸不能者洗蘸方出選奇方蒼耳三斤和子用蒴藋三斤小豆一升鹽四兩上水十升煮五升入杯內下鹽浸手足倦即更暖換之次下後藥驅風散出選奇方乾葛防風白芍藥各二分獨活四兩分生薑四兩五兩亦得川當歸附子麻黃甘草各二兩上搗為末分作十貼每貼以水一升半煎取半升空心服未瘥更服痰結加半夏旋覆花如汗加白蘚皮三服立瘥枸杞菖蒲酒出千金方治緩急風四肢不遂行步不正口急及四肢不得屈伸方枸杞根一百斤菖蒲五斤上二味細切以水四石煮取一石六斗去滓釀二斛米酒熟稍稍飲之雄朱丸出經驗方治中風手足不遂麻痹疼痛神妙雄朱研硃砂研天麻大天南星炮裂銼淨白附子炮裂白殭蠶略炒狼毒炮桂去粗皮取有味者不見火檳榔南木香以上各半兩白花蛇烏蛇二味並用酒浸去皮骨取肉焙乾各二兩蠍梢一分略炒大川烏頭水浸一宿去皮臍切片陰乾只生用一兩半麝香研龍腦研各一錢上為末煉蜜為丸如梧桐子大每服十五丸薄荷溫酒微嚼下腹空時服屢用此得效烏龍丸出經驗方治風手足不遂痰涎語澀烏蛇一條全者去首尾約二寸作截子輕捶動酒浸一宿去皮骨焙乾荊芥穗薄荷葉威靈仙只削取根上細茸溫水急洗過令淨不得見火只曝乾以上各四兩上為末別用大不蛀皂角一斤削去黑皮捶動以長流水一斗浸宿淨揉取汁生絹濾過銀石器中慢火上熬取五分更入白沙蜜四兩再熬作稠膏與藥末拌和搗可丸即丸丸如梧桐子大每服十五丸至二十丸不拘時候薄荷湯下一日三服服五七日後覺手足疼痛乃是氣通血行不逾月自然平復後每日只可兩服一服趙偁戶部言其祖母服之得效治中風麻痹緩弱及風氣攻注手足不遂熏藥方出經驗方穿山甲艾葉椒目吳茱萸烏頭菵草上六味各等分搗為粗末每用先燒江上石五七塊通赤以盆器盛摻藥末一兩在石上候大煙起以好醋一大盞投石上令熱氣頓起便將所病手足於石盆上熏之仍用衣被蓋覆有汗出即拭去一二日一度便覺輕快職方郎高士英云其祖用之得效舒筋丸治中風手足筋急開展艱難系王聖美傳大天南星炮裂半兩杏仁湯浸去皮尖雙仁麩炒黃別研山梔子取仁略炒各一兩川烏頭炮裂半兩自然銅一兩大小燒酒內淬十數遍研細水飛過淘別研上為末入研者再拌勻更用胡桃肉二兩湯去黃皮研爛拌勻法酒煮麵糊為丸如梧桐子大每服七丸至十丸煎蔥白酒下腹空時服一日二服三五日後其身上如蟲行是效未覺即加丸數婦人血風攣卻手腳服有大效治筋脈拘攣久風濕痹下氣除骨中邪氣利腸胃消水腫久服輕身益氣力上薏苡仁一升搗為末以水作粥空心服地榆丸治風氣攻疰四肢疼痛無力此由榮衛壅滯所致久不療除漸成癱瘓大川烏頭鹽炒不得過熟去皮臍尖用一兩甜參一兩地榆一兩麝香一分別研入前四味中拌令勻上件為末五味同搗煉白蜜五兩和為丸如梧桐子大以瓷盒密封貯之每日空心食前溫酒下二十丸服此藥當有汗出是驗治中風四肢逆冷吐清水宛轉啼呼者出本草取桂二兩㕮咀以水三升煮取二升去滓適寒溫盡服治中緩風四肢不遂者出本草用豉三升水九升煮取三升分為三服日二作亦可酒漬飲之導引法養生方云手前後遞互拓極勢三七手掌向下低頭面心氣向下至湧泉倉門卻努一時取勢散氣放縱身氣平頭動膊前後欹側柔轉二七去膊並冷血筋急漸漸如消又云兩手抱左膝生腰鼻氣內七息展右足除難屈伸拜起脛中痛萎又云以兩手抱右膝著膺除下重難屈伸又云踞坐伸右腳兩手抱左膝頭生腰以鼻內氣自極七息展右足著外除難屈伸拜起脛中冷痹又云立身上下正直一手上拓仰手如似推物勢一手向下如捺物極勢上下來去換易四七去膊內風兩膊並內冷血兩腋筋脈攣急又云踞伸左腳兩手抱右膝生腰以鼻內氣自極七息展左足著外除難屈伸拜起脛中疼風身體疼痛附論夫風身體疼痛者由風濕搏於陽氣故也夫人陽氣虛者腠理易開而為風濕所折使陽氣不得發泄而與風濕相搏於分肉之間相擊故疼痛也診其脈浮而緊者則身體疼痛也方摩風神驗膏方出聖惠方治風身體疼痹頭風目眩傷風項強耳鼻俱塞硫黃細研硃砂研雄黃細研人參去蘆頭當歸細辛防風去蘆頭白芷桂心乾薑芎藭川椒去目及閉口者獨活菖蒲川大黃藁本白朮吳茱萸以上各三兩松脂半斤後入附子生去皮臍天雄生去皮臍以上各四兩上細銼以酒浸一復時然後別取生地黃半斤搗絞取汁同入豬脂中以慢火煎之取藥味盡為度以綿濾去滓後下松脂雄黃硫黃硃砂等藥以柳枝不住手攪至膏凝收於瓷盒中病在內即以酒服彈子大病在外即取彈子大熱灸手摩之即效麻黃煎治一切風手足不遂遍身疼痛語澀精神恍惚及偏枯丹砂研天南星炮裂附子炮裂去皮臍桂心去粗皮羌活去蘆頭芎藭白蘚皮海桐皮銼當歸切焙防己鉛白霜研膩粉研麝香研以上各一兩自然銅煅醋淬乾蠍去土炒虎脛骨酥塗炙烏蛇酒浸去皮骨焙天麻以上各二兩麻黃去根節一斤上除研者外為細末再研令勻用醇酒五升煮麻黃至二升去麻黃不用入蜜四兩熬如稠餳和藥成劑丸如雞頭大每服一丸癱瘓暗風四肢不遂筋骨疼痛蔥白豆淋酒嚼下驚風搐搦口角垂涎語澀神昏薄荷汁同溫酒化下破傷風用多年槐木煎取濃湯同溫酒化下如牙關緊急不開即研藥如泥用蔥葉於鼻中灌之即開錫麟脂丸治男子婦人痛風錫麟脂防風沒藥天南星炮赤小豆炒白殭蠶白附子破故紙炒川萆薢五靈脂胡蘆巴白膠香各一兩天雄一雙炮去皮臍附子一雙重六錢者炮去皮臍草烏頭二兩炮去皮臍乳香半兩糯米三合骨碎補四兩去毛自然銅二兩同錫麟脂入甘鍋內火煅一時辰醋淬上為細末用無灰酒糊為丸如梧桐子大每服二三十丸更量虛實加減胡桃酒送下空心服大治諸風神效竺參議操傳云韓宗愈子友仁苦癱瘓服藥逾年不效得此方初服便覺稍減服至一料遂能行履聞韓宗愈以醫數人皆有效也至聖丸治風氣身體疼痛筋脈拘急手足𤸷麻睡臥多涎及丹田虛冷附子炮裂去皮臍牛膝去苗酒浸焙乾海桐皮銼肉蓯蓉酒浸切焙防風去叉萆薢狗脊黑者去毛黃耆銼蒺藜子沙苑者炒威靈仙續斷蘹香子舶上者炒木香各一兩骨碎補四兩乳香研沒藥研各半兩木鱉子去殼二兩上除研者外為細末再同和勻以酒煮麵糊丸如梧桐子大每服二十丸空心嚼木瓜酒下虎骨散出聖濟總錄治風身體疼痛或手足痿痹腰股沉重牽曳不遂虎骨塗酥炙黃敗龜塗酥炙黃生乾地黃焙以上各二兩羌活去蘆頭一兩芍藥蠶砂醋炒何首烏去黑皮各一兩一分芎藭一兩半延胡索一兩附子炮裂去皮臍一兩當歸銼焙檳榔銼各一兩半牛膝酒浸切焙白芷秦艽去苗土威靈仙去土各五分皂莢子炒二兩上為細散每服空心以溫酒調下三錢匕日三服如不飲酒用童子小便一盞半薄荷一握生薑少許同煎至一盞去滓溫服獨活散出聖惠方治身體疼痛腰背拘急獨活防風去蘆頭桂心芎藭人參去蘆頭白朮茵芋海桐皮銼枳殼麩炒微黃去瓤甘草炙微赤銼以上各半兩附子炮裂去皮臍麻黃去根節赤茯苓牛膝去苗各三分薏苡仁一兩上為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服忌生冷油膩毒魚滑物茵芋散出聖惠方治風身體疼痛肢節不利羌活肉桂去粗皮海桐皮芎藭狗脊茵芋牛膝去苗松節蒼耳子微炒當歸防風去蘆木香以上各一兩附子二兩炮去皮臍麝香一分研入上為散入研了藥令勻每服不拘時候以溫酒調下二錢如不飲酒荊芥薄荷湯下亦得忌生冷油膩豬雞犬肉羌活湯出聖濟總錄治風身體疼痛筋脈拘急行榮衛除風濕羌活去蘆頭地骨皮各三兩桂去粗皮黃連去須各一兩白朮一兩麻黃去根節一兩半羚羊角鎊一兩芎藭一兩半當歸焙一兩半附子炮去皮臍甘草炙各一兩桑根白皮二兩木香各一兩上銼如麻豆每服五錢匕以水一盞半入生薑五片煎取八分去滓溫服不拘時候芎藭散出聖惠方治風身體疼痛頭目昏重芎藭麻黃去根節當歸赤芍藥以上各三分防風去蘆頭枳殼麩炒微黃去瓤白朮桂心天雄炮裂去皮臍蔓荊子甘草炙微赤銼藁本以上各半兩上為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服防風散出聖惠方治風身體疼痛轉側不得防風去蘆頭羌活當歸芎藭肉桂去粗皮各二分薏苡仁仙靈脾附子炮裂去皮臍牛膝去苗骨碎補各一兩細辛枳實麩炒微黃各半兩上為散每服三錢以水一中盞煎至六分去滓不拘時候稍熱服乳靈丸出危氏方治痛風數年不能舉動日夜呻吟不數丸即愈川烏去皮臍生用半兩生乾地黃酒浸一宿一兩木香不見火二錢半草烏頭小者去皮臍鹽炒半兩去鹽五靈脂揀去沙石微炒一兩乾木瓜酸者二兩虎脛骨一兩酥塗火炙存性自然銅火煅七次米醋淬七次別研一兩麻黃去根節微炒去汗一兩敗龜乃江湖間卜筮鑽過下截龜殼米醋浸三日炙黃色再用醋淬七錢半滴乳香好者和燈心研末二錢半去燈心上研細如粉蜜丸去白沫為丸如龍眼大每一兩重作十二丸以帶皮生薑自然汁化開一丸熱酒服更以酒半盞送下病在下空心食前服病在上食後停少時服一日二服口有少麻勿疑附子散出聖惠方治風身體疼痛四肢懈惰附子炮裂去皮臍一兩五加皮麻黃去根節獨活當歸去尾秦艽去苗赤茯苓芎藭桂心萆薢銼枳殼麩炒微黃以上各三分上為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服忌生冷油膩毒魚滑物靈效丸出百一選方男子婦人痛風錫靈脂甘鍋內煅通紅白膠香明淨者研五靈脂如瀝青成塊者當歸淨洗去蘆草烏頭去尖白附子香白芷沒藥糯米炒黃桑柴灰須是純桑木他木不可雜各一兩上為細末糯米糊為丸如梧桐子大每服三四十丸空心溫酒下羚羊角散出聖惠方治風身體疼痛筋脈拘急不可俯仰羚羊角屑一兩羌活赤茯苓薏苡仁防風去蘆節當歸赤芍藥芎藭桂心以上各三分檳榔半兩上為散每服四錢以水一大盞煎至六分去滓不拘時溫服虎骨丸出聖濟總錄治一切風遍身疼痛腳膝少力虎脛骨酥塗炙黃六兩烏頭炮裂去皮臍海桐皮銼芎藭天南星炮天麻各一兩白花蛇酒浸去皮骨炙牛膝去苗酒浸一宿焙乾蒺藜子炒去角各三兩上為細末煉蜜丸梧桐子大每服溫酒下二十丸地龍丸出聖濟總錄治風身體疼痛地龍炒一分甜瓜子炒半兩乳香研一錢骨碎補赤芍藥五靈脂當歸切炒各半兩沒藥研一分自然銅燒醋淬研二兩上除研者外為細末再和勻酒煮糊丸如梧桐子大每服十丸空心臨臥溫酒下祛風丸出聖濟總錄治風身體疼痛沒藥研木鱉子各一兩防風去叉半兩乳香研一分血竭研兩半荊芥穗半兩五靈脂研二兩半青橘皮湯浸去白焙一兩烏頭炮裂去皮臍一兩半上除研者外為細末再和勻用醇酒熬成膏丸如雞頭實大熱酒化下一丸萆薢散出聖濟總錄治風身體筋骨疼痛萆薢牛膝酒浸切焙蒺藜子炒去角枸杞子惡實炒秦艽去苗土羌活去蘆頭當歸切焙桂心去粗皮各等分上為散每服二錢細嚼少胡桃仁熱酒調下痛極者再服一服痛止者更可五服骨痛者飯後服腳膝及腹內痛者空心服之五加皮散出聖惠方治風氣壅滯身體疼痛五加皮羌活丹參赤芍藥羚羊角屑檳榔以上各三分枳殼麩炒微赤去瓤防風去蘆頭桂心各半兩上為散每服四錢以水一中盞煎至六分去滓不拘時候稍熱服沒藥丸出聖濟總錄治諸風筋骨及遍身疼痛沒藥研乳香研各二錢地龍去土半兩甜瓜子一分骨碎補五靈脂各半兩自然銅醋淬研一兩乾蠍去土炒一分上除研者外為細末再和勻醋煮麵糊丸如梧桐子大每服五丸加至七丸溫酒下羌活湯出千金方治中風身體疼痛四肢緩弱不遂及產後中風宜服之沒藥丸出聖濟總錄治風身體疼痛腰腳無力沒藥研半兩荊芥一百穗草烏頭生去皮臍劈開一兩以黑豆同炒令黃色揀去黑豆蒼朮米泔浸刮去皮二兩虎骨塗酥炙黃一兩乳香瓷盞內熔過研麒麟竭各半兩上除研者外為細末再合研勻酒煮麵糊丸如小豆大每服五丸溫酒下如疼痛甚者用豬羊筒骨髓並鹽各少許同煎熱酒下空心日中臨臥日三應痛丸出聖濟總錄治風身體疼痛烏頭炮裂去皮臍草烏頭銼炒黑楓脂香研赤小豆天南星炮威靈仙去土地龍去土各半兩上除研者外為細末再同和勻用醋煮麵糊丸如梧桐子大每服冷酒下十丸沒藥丸出聖濟總錄治風氣身體疼痛狀如繫縛沒藥研一分骨碎補威靈仙各二兩草豆蔻去皮一兩半夏湯浸七次焙自然銅燒醋淬七次研各一兩地龍去土炒三分上除研者外為細末飯丸如梧桐子大空心溫酒下三五丸海桐皮丸出聖濟總錄治一切風冷身體手足疼痛海桐皮銼防風去叉牛膝酒浸切焙羌活去蘆各半兩大附子銼二枚郁李仁去皮尖雙仁炒研一分蒴藋葉一束搗取汁一升上除蒴藋汁外為末先以蒴藋汁同酒一升熬成膏入藥末搜和為丸梧桐子大每服空腹溫酒下三十丸通氣防風散一名羌活勝濕湯治肩背痛不可回顧者此手太陽氣鬱而不行以風藥散之脊痛項強腰似折項似拔此是太陽經不行以通氣防風散主之露蜂房淋蘸方出聖惠方治風手足疼痛皮膚瘙癢露蜂房水萍茵芋附子生去皮臍各二兩蒴藋川椒各一兩去目上細銼以水五斗煎至二斗去滓淋蘸疼痛處應正丸出聖濟總錄治風氣身體疼痛血脈凝滯手足無力熟乾地黃焙一兩烏藥甜瓜子各二兩乳香研沒藥研各半兩上除研者外為細末再同和勻酒煮麵糊丸如梧桐子大空心食前溫酒或荊芥湯下二十丸麝香丸出聖濟總錄治風身體疼痛頭目不利肩背拘急肌肉痿痹痰涎壅滯胸膈滿悶麝香研半兩秦艽去土四兩獨活去蘆頭白朮檳榔以上各二兩上除麝香研外為細末入麝香研勻煉蜜和杵千百下丸如龍眼大每服一丸細嚼溫酒或用茶清下不拘時候威靈仙丸出聖濟總錄治風身體疼痛威靈仙擇三兩乳香研一分楓香脂研三分五靈脂研一兩草烏頭炒黑三分上除研者外為細末再和勻煉蜜丸如雞頭實大每服一丸生木瓜一片同嚼爛溫酒下兼治大風疾黑神丸出聖濟總錄治風身體疼痛草烏頭炒令黑存性三兩地龍去土瓦上炒過一兩五靈脂半兩麝香研一分上除研者外為末再和勻醋煮麵糊丸如綠豆大每服十丸溫酒下治風痛方天南星蒴藋花一名躑躅花上並生時同搗和作餅子甑上蒸四五遍以絺葛囊盛之候要則取焙為末蒸餅丸如梧桐子大溫酒下五丸腰腳骨痛空心服手臂痛食後服大良治渾身風痛艱難舉動不得者用松根露泥半出者佳同煮酒二盞煎至八分溫服服後患人自覺身手腳尖颼颼顫癢日進三服十餘日內即便除去病根虎骨酒出千金方治骨髓疼痛風經五臟男女皆可服用虎骨一具炭火炙令黃色捶刮取淨搗碎得數升清酒六升於磁瓶中浸密封春夏七日秋冬二七日夜開取浸五宿隨性多少稍飲之易曰虎嘯風生龍吟云起此亦有情與無情相感治風之效故亦無疑一方治歷節風塗酥炙黃用骨碎補丸出和劑方治肝腎風虛上攻下疰筋脈拘攣骨節疼痛頭面浮腫手臂少力腰背強痛腳膝緩弱屈伸不利行履艱難並宜服之荊芥穗白附子炮牛膝酒浸焙乾肉蓯蓉酒浸一個切作片焙骨碎補去毛炒威靈仙去苗縮砂仁各半兩地龍去土微炒沒藥各一錢半自然銅醋浸九遍草烏頭炮去皮臍半夏湯洗七次各半兩上為細末酒煮麵糊丸如梧桐子大每服五丸至七丸溫酒下婦人醋湯或當歸酒下妊娠不宜服之不拘時候治一切腫痛風病以刺虎根葉枝干細銼焙乾搗羅為末暖酒調服一錢匕治丈夫冷氣及風筋骨疼痛用麋角作粉常服又於漿水中研為泥塗面令不皺光華可愛又有人以麋皮作靴薰腳氣天麻飲子出衛生家寶方治氣血不足正氣與風邪相搏渾身臂膊疼痛潮熱往來倦怠心間煩躁恍惚不寧血虛難以發散不禁涼藥此藥調血退熱解勞倦進飲食輕健四肢天麻酒浸防風去蘆當歸洗淨去蘆酒浸川芎羌活威靈仙酒浸五加皮白芍藥微炒各一兩肉桂去粗皮不見火木香不見火酸棗仁微炒去皮犀角屑以上各半兩海桐皮酒浸人參去蘆白朮去苗洗乾葛細辛去苗洗甘草炙以上各三分上為粗末每服三大錢水一盞生薑二片煎至七分去滓熱服不拘時候治吹手足出經驗方睡中風吹手足或酸或疼或腫用炒熱鹽徐徐熨之微有汗出即愈余來武昌舟中睡著為風所吹右臂酸腫叩之稍人云用鹽熨之兩日而愈鐵彈丸出儒門事親地龍去土木鱉防風白芷白膠香五靈脂沒藥當歸以上各一兩草烏頭水浸炮用一兩細蜜三錢乳香另研二錢麝香另研二錢上為末糯米粥丸彈子大每服一丸生薑酒下治項強身中急痛者出本草方方見活鼠方除風痛出汗出本草用桑葉煎汁服之治風濕身煩疼日晡劇者與麻黃杏仁薏苡仁湯出本草麻黃三兩杏仁三十枚甘草薏苡仁各一兩上四物以水四升煮取二升分溫再服
