body:
  text: 卷一百八十三諸氣門上氣附論夫人一日一夜凡一萬三千五百息呼隨陽出氣於是升吸隨陰入氣於是降一升一降陰陽交通乃得亨融所謂上氣者蓋氣上而不下升而不降痞滿膈中胸背相引氣道奔迫喘急有聲者是也本於臟肺之虛復感風邪肺脹葉舉諸臟氣又上衝而壅遏此所以有上氣之候也方桔梗破氣丸出千金方治氣上下痞塞不能息桔梗橘皮乾薑厚朴枳實細辛葶藶各三兩吳茱萸白朮各六兩胡椒蜀椒烏頭各七分蓽茇一錢人參桂心附子茯苓前胡防葵芎藭各五分甘草大黃檳榔當歸各八分上為末煉蜜為丸如桐子大每服十丸酒下日三有熱者空服治上氣千金方硇砂細辛牛膝各等分上為末氣發後酒服方寸匕三日忌酒余禁如藥法又方千金方上酥一升獨頭蒜五顆上先以酥煎蒜蒜黃出之用生薑汁一合共煎令熟空腹溫服一方寸匕姜麥湯千金方治上氣短氣生薑五兩小麥一升上以水七升煮取汁一升頓服又方千金方猝得寒冷上氣方大棗二十七枚紫蘇葉莖切一升上以酒三升煮取一升半分再服水煮亦得一方加橘皮半兩無棗奔氣湯千金方治大氣上奔胸膈間諸病發時迫滿短氣不得臥劇者腹中冷濕氣腸鳴相逐成結氣半夏洗五錢吳茱萸炒五錢桂五錢人參甘草炙各三錢上㕮咀每服六錢水二盞生薑十片煎至六分去滓溫服不拘時澤漆湯聖濟總錄治上氣其脈沉者澤漆三兩切細以東流水五斗煮取一斗五升去滓澄清半夏五錢生薑紫菀一作紫參白前各五兩黃芩甘草桂心人參各二兩上納澤漆汁中煮取五升每服五合日三夜一麥門冬湯金匱方治火逆上氣咽喉不利止逆下氣麥門冬汁三升半夏一升粳米三合人參甘草各二兩大棗二十枚上以水一斗二升煮取六升去滓服半升日三夜一地黃煎聖濟總錄治上氣乏急生薑汁半升生地黃汁半升白蜜一升杏仁湯去皮尖雙仁炒二兩半研牛酥半升甘草炙銼一兩半貝母去心炒黃二兩紫蘇子研令細二兩赤茯苓去黑皮紫菀去苗土洗焙合一兩竹葉半升上先搗後五味為細末以水四升半煮取二升去滓入紫蘇子地黃汁生薑淨濾同白蜜牛酥在銅器中重湯煮攪勿住手候如稀餳以干器貯之含時細細嚥汁常令喉中藥氣不絕白前湯聖濟總錄治上氣及諸氣逆白前去苗土炒三分半夏湯浸去滑生薑汁製切五分紫菀去苗土焙乾二分麻黃去根節一兩厚朴去粗皮塗生薑汁炙三度焙乾人參各三分甘草炙銼半兩桂去粗皮杏仁湯去皮尖雙仁炒各三分上粗搗篩每服五錢匕生薑半分拍碎棗二枚水二盞煎至一盞去滓溫服日三款冬花湯聖濟總錄治上氣咽中不利款冬花去梗二兩麻黃去根節三兩五味子炒半夏湯洗去滑生薑汁製焙乾各二兩紫菀去土苗細辛去苗葉各一兩射干二兩上粗搗篩每服三錢生薑半分切棗一枚劈水一盞煎至七分去滓溫服日三夜一沃雪湯聖濟總錄治上氣不得息咽喉不利上以水二升五合先煮麥門冬生薑竹葉至一升五合內散二兩煎取一升二合去滓分二服平旦空肚服之日晚食消後服之不利每日加一劑忌油面豬犬肉小豆黏滑酸咸海藻菘菜覆杯湯療上氣呼吸牽纏肩脅欲死麻黃去節四兩甘草炙乾薑桂心貝母各三兩上切以水八升煮取二升分再服則愈忌海藻生菜昔有人先有風患兼因熱取冷當風飲酒房室體虛來春因天行病致中氣尚虛有風熱未除兼藥石太過傷於胃氣腹脹堅如石氣息不利乃自下後變四肢浮腫遊走無定小便不通更服利藥忽吐逆不止飲食便噦至掣動百脈狀如噓唏積日乃變上氣服此方加杏仁二兩與兩劑上氣得止厚朴湯療上氣煩悶嘔逆不得飲食厚朴三兩炙人參一兩半夏四兩洗生薑八兩茯苓甘草炙橘皮桂心各二兩枳實二兩炙上切以水八升煮取三升分三服忌海藻菘菜羊肉餳生蔥醋貝母湯千金方治上氣咽喉窒塞短氣不得臥腰背痛胸滿不得食面色萎黃貝母一兩生薑五兩桂心麻黃石膏甘草各二兩杏仁三十枚半夏五合上八味㕮咀以水一斗煮取三升分為三服日三降氣湯治氣不下降大便不通加枳殼杏仁煎此藥流行肺氣方見腳氣門一切腳氣類紫蘇子湯附子養氣湯醫方大成治久病方愈氣上行脹滿吐痰稠黏服此能養脾氣療濕止嘔消化水穀進美飲食附子三兩水浸削去皮臍切作片子人參切片白朮紙裹煨切片白茯苓去皮各一兩木香半兩紙裹煨切片上每服四錢水一盞八分姜七片棗三枚煎七分去滓空心食前服清中湯十便良方治上氣虛壅精神倦怠頭目不爽菖蒲家生者刮去皮須切片米汁浸三伏時漉去苦水秤八兩生薑五兩不去皮片子白朮三兩甘草二兩白鹽四兩炒與菖蒲生薑同醃一宿焙乾麻黃去根節二兩細辛去節葉一兩五味子微炒二兩桂去粗皮一兩半夏湯浸去滑生薑汁製焙乾二兩上粗搗篩每服三錢水一盞半生薑一片棗三枚去皮煎至七分去滓溫服日三一方用乾薑一兩蘇子湯療上氣搶心胸奄奄不得息腹中脹滿食吐蘇子一升大棗三十枚劈半夏三兩洗橘皮生薑桂心各一兩蜀椒二分焙出汗上切以水七升煮取二升分三服忌羊肉湯半夏湯療上氣半夏洗茯苓各四兩橘皮白朮各三兩生薑五兩檳榔十顆上切以水一斗漬一宿煮取二升七合分三服更加甘草三分人參二兩前胡三兩紫蘇一兩忌羊肉桃李雀肉醋物溫中湯聖惠方療上氣喘急胸中滿咽喉不利氣逆搶心甘草二兩炙桂心生薑一片切上切水七升半煎取三升分五服忌生蔥海藻菘菜已試鯉魚湯一名杏仁散療上氣喘急胸中滿悶咽喉不利杏仁去皮尖貝母桂心各二兩橘皮人參甘草炙厚朴炙麻黃去節茯苓胡麻白前各二兩鯉魚五斤生薑六兩半夏五兩洗上切以水二斗煮魚得一斗二升去魚肉煎藥三升二合分為四服日三夜一忌海藻菘菜醋物羊肉湯蔥等一方無貝母上氣二物散麻黃一斤去節杏仁一百枚去皮尖雙仁上藥各別搗合和細篩為散上氣發時服方寸匕可至三方寸匕以氣下為候不必常服柴胡五味湯療肺痰氣上氣氣急及咳柴胡五兩五味子橘皮紫菀貝母杏仁去皮尖雙仁者熬各三兩麻黃四兩去節甘草炙黃芩各三兩上細切搗極碎每服用麥門冬一兩去心生薑半兩竹葉一兩半療上氣急滿坐臥不安方上用鱉甲一大兩炙令黃細搗為散取燈心一握水二升煎取五合食前服一錢匕食後蜜水服一錢匕綠雲湯治上氣利頭目闢風邪新嫩柏葉一斤不用墳墓上去土淨米泔浸七日如在沸湯內淖過亦得甘草四兩生薑半斤與柏葉同搗細曝或焙令乾上為細末每服一錢沸湯點服食後治上氣上以露蜂房水煎服之主上氣上以白前酒漬服之治下氣止煩滿上用船板可作湯浴治下氣和五臟上以冬瓜煮食之治下氣消穀上以地門冬蒸若煮啖之服之百日則健壯力倍於朮及黃精也一作散並搗絞取汁服散尤益治下氣消穀去痰癖令人肥健上用蘿蔔作羹食之或炮煮和酥煎食之亦可一方生絞汁服猝上氣附論夫肺主於氣若肺氣虛或為風邪所乘則臟腑不利經絡痞塞不能宣通則猝上氣也又因有所怒則猝逆氣上衝甚則變嘔血為氣血傷也方麻黃散治猝上氣喘急氣奔欲絕麻黃二兩去根節甘草一兩炙微赤色桂心一兩馬兜鈴一兩杏仁一兩湯浸去尖雙仁麩微炒黃細辛一兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時服五味子散治猝上氣奔喘五味子一兩麻黃二兩去根節甘草一兩炙微黃銼細辛一兩貝母一兩煨微黃上為散每服五錢以水一盞生薑半分煎至五分去滓不拘時溫服青橘皮散治猝上氣胸中不利痰逆青橘皮一兩湯浸去白瓤甘草半兩炙微赤銼訶黎勒皮一兩紫蘇莖葉二兩枇杷葉半兩去毛炙微黃上為散每服五錢生薑半分以水一盞煎至五分去滓不拘時溫服細辛散治猝上氣心胸壅悶頭痛細辛半兩甘草半兩炙微赤銼人參一兩去蘆桂心三分半夏一兩湯洗七次去滑麻黃二兩去根節杏仁一兩湯浸去皮尖雙仁麩炒微黃前胡三分去蘆五味子一兩上為散每服五錢以水一盞生薑半分棗二枚煎至五分去滓不拘時溫服治猝上氣喘急方杏仁一兩湯浸去皮尖雙麩炒微黃人參二兩去蘆頭陳橘皮二兩湯浸去白瓤焙甘草一兩炙微赤銼淡竹葉梢二十七莖長一握上為散分為十服每服以水一大盞入生薑半分煎至五分去滓不拘時候溫服治猝上氣喘急腹痛乾薑一兩炮五味子一兩木香一兩上為細散不計時候以暖酒送下二錢又方燈心木通一兩陳橘皮一兩湯浸去白瓤焙上細銼以水二盞煎至一盞去滓下牛酥一分時時溫服一合半夏蘇子湯治猝上氣胸中滿塞半夏五兩洗蘇子一升生薑五兩大棗四十枚劈橘皮桂心各二兩甘草二兩炙上切以水七升煮取二升七合分作三服氣即下忌海藻菘菜羊肉湯生蔥竹筱下氣湯療猝上氣胸心滿生甘竹筱一虎口石膏一兩碎生薑橘皮各三兩甘草三兩炙上切以水七升煮竹筱取四升半去滓納諸藥煮取二升分二服此方療氣衝上不止服兩三劑瘥忌海藻菘菜療猝上氣息鳴便欲絕方桑根白皮切三升生薑切半升吳茱萸半升上切以酒五升煮三升去滓令服之入口則愈又方麻黃去節甘草炙各三兩上切以水三升煮取一升半分三服一方用水八升煮取三升八合忌海藻菘菜瘥後欲令不發者更取二升並熬杏仁五十枚搗篩蜜為丸服四十丸每日三又療猝上氣不降抬肩息鳴用乾薑三兩以酒一斗漬取一升日三服又方療猝上氣不降抬肩息鳴麻黃三兩去節桂心甘草炙各一兩杏仁四十枚去皮尖雙仁者上切以水六升煮取二升分三服此方一名小投杯湯有氣痰者亦可為散若服之冷多加乾薑三兩有痰唾者加半夏三兩洗之忌海藻菘菜生蔥投杯湯療疾病後暴上氣困篤石膏四兩碎甘草二兩炙五味子三兩大棗二十枚擘人參桂心半夏洗杏仁去皮尖各二兩麻黃三兩五去節生薑四兩上切以水一斗煮取三升一服六合日三夜一忌羊肉餳海藻菘菜生蔥等香蘇湯治下後煩氣暴上生蘇一把各用蘇子三兩香豉五兩上以水五升煮取二升頓服治猝上氣息鳴便欲絕方茱萸二升生薑三兩上以水七升煮取二升分為三服治猝上氣喘急息鳴便欲絕本草上用人參末開水調服方寸匕日五六服治猝上氣息鳴便欲絕出本草方見韭汁飲治猝患食後氣不通出本草方以柰生搗汁服之久上氣附論夫肺主於氣通於呼吸而氣之行循環表裡流注經絡也若臟腑虛弱風冷之氣並上攻於肺肺氣不足邪之所乘積留日久不能宣通則胸中氣逆喘急不利此是久上氣也方麻黃散聖惠方治久上氣喘急坐臥不安麻黃去根節杏仁湯去尖雙仁麩炒微黃赤茯苓桑根白皮銼紫蘇莖葉陳皮湯去白焙甜葶藶隔紙炒紫色各一兩上為散每服五錢水一盞生薑半分煎至五分去滓溫服不拘時如人行七里久服後葶藶丸葶藶丸用葶藶子六兩熬紫色搗如泥丸梧子大每食後棗湯飲下十丸日二服干棗十枚劈碎水一升煮五合去滓服丸杏仁散聖惠方治久上氣胸中痰滯妨悶不能飲食杏仁湯去皮尖雙仁麩炒微黃麻黃去根節柴胡各一兩去苗木香半兩半夏二分湯洗七次去滑人參三分去蘆五味子一兩大腹皮三分枳殼半兩麩炒微黃去瓤甜葶藶一兩紙包炒紫色陳皮三分湯去白焙上為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓溫服不拘時赤茯苓散治久上氣心膈不利飲食全廢咳嗽不止赤茯苓一兩桂心半兩紫蘇莖葉二分陳皮三分湯去白瓤焙杏仁三分湯去皮尖雙仁麩炒微黃訶黎勒皮