鍾乳研一兩杏仁湯去皮尖雙仁研細半兩上先將前十味搗羅為細末與鍾乳杏仁同研令勻煉蜜丸如梧桐子大每服三丸至五丸粥飲下日三服不拘時候杏仁散出聖惠方治上氣喘急不得睡臥杏仁一兩湯去皮尖雙仁麩炒微黃甘草半兩炙微赤銼紫蘇子一兩微炒麻黃一兩去根節天門冬一兩陳橘皮三分去白焙五味子三分上為散每服三錢水一大盞生薑半分棗三枚煎至五分去滓溫服不計時候桂心丸出千金方治發熱氣上衝不得息欲死不得臥桂心半兩白石英麥門冬枳實白蘚皮貝母茯神檳榔仁天門冬各二兩半人參車前子二兩前胡橘皮白薇杏仁各一兩半郁李仁三兩桃仁五分上為末蜜和丸如梧子大以竹葉飲服十丸日二加至三十丸為度竹葉飲出千金方竹葉紫蘇子各一升紫菀白前各二兩百部甘草生薑各三分上㕮咀以水八升煮取三升溫下藥盡更作蓽茇丸治上氣倚息不得臥蓽茇昆布洗炒乾吳茱萸湯洗焙微炒葶藶隔紙炒紫色杏仁湯去皮尖雙仁炒研細各一兩上先將前四味搗羅為末與杏仁同研令勻煉蜜和丸如梧子大空心服粥飲下五丸稍加至十丸治上氣急滿坐臥不得用鱉甲炙黃細搗為散燈心同煎食前服一錢食後蜜水下一錢三因神秘湯出永類鈴方治上氣喘急不得臥者淨陳皮桔梗紫蘇人參五味子各等分上㕮咀四錢水煎服直指加檳榔桑根白皮製半夏甘草姜五片煎上為散每服三錢水一盞煎至七分去滓溫服治肺壅氣喘急不得臥葶藶子三兩炒大棗二十枚用水三升煮取二升汁上末將已炒葶藶子入煮棗汁一處再取一升去滓分作二服並服之瘥
