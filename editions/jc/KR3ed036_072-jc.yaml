赤痛眼鹽綠一兩一分蜜半斤上於蚌蛤殼內每於夜臥時於火上炙令暖點目眥頭點眼方出聖惠方治眼胎赤及風赤釅漿水一升青鹽三兩上用熟銅器內貯漿水投青鹽在內浸七日後即鹽綠出以物刮入漿水中數看之又七日外取其水點眼洗眼點鹽於眥中無根妙應膏出聖濟總錄治赤眼睛赤爛昏暗用蠍虎黑者數枚用一木罐黃泥土安令實蠍虎在罐內不令損傷仍愛護其尾用紙蓋罐口於紙面上著箸引數眼子令出氣後有糞數粒不要糞上一頭黑者只要一頭白者用津唾研成膏塗在眼睫毛周迴不得揩拭候來日早溫漿水洗三次效療胎赤眼出千金方取槐木枝如馬鞭大長二尺作二段齊頭麻油一匙置銅缽中且使用童子一人以其木研之至瞑令仰臥以塗眼眥日三度瘥治胎赤眼風赤久赤用銅鏭鑼一尺以下面者一枚石鹽末如杏仁許油脂半雞子許同和取柳枝如箸一握急束齊一頭用研油脂三日狀如墨取熟艾如卵大剜地作小坑子置幾於上安艾著火合銅鏭鑼於上其下仍令通氣火盡即盛常蓋頭欲用將綿纏杖子頭點取藥著兩眥頭每夜著即臥蘇六方云頓用甚效點眼方出聖惠方治眼胎赤及風赤用馬牙硝半兩研用臘月豬膽一枚納硝入膽中浸之陰乾以少許龍腦同研點之立效獨聖還睛丸出聖惠方治眼胎赤兼生翳膜疼痛用苦葶藶半斤洗去塵土用木杵臼搗爛如餳糖取粟米飯內汁用布巾干捩去水盡少少入臼中與藥同搗令可丸即丸如綠豆大每日早晚食後以溫水下十丸
