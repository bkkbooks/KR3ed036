body:
  text: 卷七十二眼目門肝實眼附論通肝氣於目其氣和平則諸疾不生過實則生患乃有肝實眼之證令人目痛如刺久不已則目赤而生淫膚息肉治宜瀉之又當視其老壯凡人五十以前可服瀉肝湯過五十則不可或有是疾當不得已而用之此眼雖癢痛而頭不旋但漸漸昏暗如物遮定全無翳障或時生花此肝有實熱又云此因心肝滯留偏熱致使眼疼痛生翳膜經久其色如銀釘釘入黑睛此證不可治方石膏散出聖濟總錄治肝臟實熱目痛如刺漸生淫膚息肉石膏碎菊花各二兩牛黃研枳殼去瓤麩炒獨活去蘆柴胡去苗白附子炮大黃銼炒漏蘆去蘆各一兩木香乾蠍炒檳榔銼各半兩上為散每服二錢匕薄荷湯調下洗肝湯出聖濟總錄治肝實眼人參山梔子仁黃芩去黑心赤茯苓去黑皮甘菊花地骨皮芎藭柴胡去苗淨桔梗炒各一兩黃連去須甘草炙銼各半兩上粗搗篩每服三錢匕水一盞入苦竹葉七片煎至七分食後臨臥溫服瀉肝前胡湯療肝實熱目痛胸滿急塞前胡秦皮細辛梔子仁黃芩升麻蕤仁決明子各三兩芒硝三兩苦竹葉切一升車前草切一升上切以水九升煮取三升去滓納芒硝分為三服忌生菜前胡湯治肝實熱目赤乾澀前胡去蘆頭秦皮去粗皮細辛去苗葉決明子微炒山梔子仁黃芩去黑心升麻枳殼去瓤麩炒蕤仁甘草炙銼各一兩上粗搗篩每服五錢水一盞半煎至八分去滓食後臨臥溫服之羚羊角散出聖濟總錄治肝臟實熱眼目昏暗時多熱淚羚羊角鎊羌活去蘆頭玄參車前子黃芩去黑心栝蔞山梔子去皮各半兩胡黃連菊花各三分細辛去苗葉八分上為散每服二錢食後竹葉煎湯調下竹葉湯出聖濟總錄治肝臟實熱眼赤疼痛淡竹葉犀角屑木通銼炒黃芩去黑心各一兩玄參黃連去須車前子各一兩一錢芒硝二兩大黃微炒細辛去苗葉各一錢上粗搗篩每服五錢水一盞半煎至八分去滓食後溫服日二服洗肝干藍煎治肝熱沖眼眼眥赤赤脈息肉痛閉不能開熱勢彭彭及目睛黃干藍車前葉苦竹葉各三升細辛秦皮蕤仁梔子仁芍藥各三兩決明子四兩升麻二兩上㕮咀以水二斗洗煮乾藍車前竹葉取一斗去滓澄清取八升納藥煮取三升分三服須利加芒硝二兩龍膽散治肝熱烏睛浮腫赤暈昏疼龍膽草梔子仁各二錢防風小茵陳川芎玄參荊芥甘菊去萼楮實甘草各一錢上為末每服一錢半食後茶清調下決明子湯出聖濟總錄治肝臟實熱目眥生赤肉澀痛決明子炒柴胡去苗黃連去須防風去叉苦竹葉升麻各三分甘草炙銼菊花各半兩細辛去苗葉一分梔子仁煎出千金方治肝實熱目眥痛如刺梔子仁決明子蕤仁各一兩車前葉一兩六銖秦皮一兩六銖苦竹葉二握洗細辛半兩石膏二兩碎如小豆大赤蜜三合上㕮咀以井花水二升煮取七合去滓下蜜更煎取四合以綿濾之干器貯密封勿使草芥落中以藥汁細細仰臥以點目中生地黃湯出聖濟總錄治肝實熱眼熱痛不止生地黃汁蜜車前汁三味合三盞和勻升麻梔子仁各一兩細辛去苗葉各半兩芍藥一兩半玄參一兩上五味為末每服五錢水一盞半煎至一盞入前三汁共盞半再煎沸去滓溫服大麻仁湯出聖惠方治肝實熱眼痛赤大麻仁人參決明子微炒車前子黃連去須各三分訶黎勒皮秦皮去粗皮大黃銼炒各一兩上粗搗篩每服五錢水盞半煎至七分去滓食後臨臥服石決明丸出聖濟總錄治肝實熱眼目生淫膚息肉腫痛石決明一兩黃連去須車前子細辛去苗梔子仁大黃炒銼子芩各半兩菊花一兩半上為末煉蜜和丸如梧桐子大每服三十丸食後淡漿水下臨臥再服決明子丸出聖濟總錄治肝實熱目生赤脈息肉磣痛決明子車前子苦參黃連去須黃芩去黑心大黃各一兩半菥蓂子人參各一兩上為末煉蜜和丸如梧桐子大每服二十丸食後以淡漿水下臨臥再服黃連丸出聖濟總錄治肝氣壅實目痛如刺黃連去須大黃銼炒令香熟各一兩防風去叉龍膽草去土人參黃芩去黑心各三分細辛去苗葉半兩上為末煉蜜和丸如梧桐子大每服三十丸食後溫水下臨臥再服秦皮湯出聖濟總錄治肝氣實脅下妨悶筋脈痠痛眼目昏濁視物不明秦皮去粗皮羚羊角鎊各一兩半桔梗炒細辛去苗葉各半兩薏苡仁伏翼炙乾各一兩上粗搗篩每服五錢水一盞半大棗二枚劈破煎至七分入荊瀝半合再煎三兩沸食後臨臥服升麻湯出聖濟總錄治肝實熱目暗不明升麻大青薔薇根皮去黑皮各一兩射干玄參各二兩黃柏去粗皮三分上粗搗篩每服五錢水一盞半煎至八分去滓入蜜半合再煎三兩沸食後臨臥溫服麥門冬湯出聖濟總錄治肝實熱毒氣上熏目赤痛癢生麥門冬去心葳蕤秦皮去粗皮赤茯苓去黑皮各一兩半大黃生用升麻各一兩上銼如麻豆大每服五錢水一盞半入竹葉十片煎至八分去滓下朴硝末一錢更煎令沸空腹溫服洗肝散出三因方治肝熱赤脈貫睛澀痛衝風淚下兼熱血攻心防風羌活各半兩甘草一分馬牙硝二兩白蒺藜一兩半上為末每服二錢食後白湯調下瀉肝散出直指方治肝熱赤眼腫痛梔子仁荊芥大黃甘草上等分銼每服二錢水煎食後服又方出危氏方治肝有實熱郁李仁荊芥各一分甘草炙大黃各半兩上銼散每服三錢水一盞半煎食後溫服苦參丸出聖濟總錄治肝實熱多食壅物毒氣傷眼昏暗苦參車前子洗枳殼去瓤麩炒各二兩上為末煉蜜為丸如梧桐子大每服三十丸空心米飲下羊肝丸出海上方治肝經有熱目赤睛疼視物昏澀又治翳障青盲羯羊肝一具生用黃連去須別研為末上先將羊子肝去筋膜於砂盆內擂爛入黃連末杵和為丸如梧桐子大每服五十丸不拘時候熟水下禁食豬肉及冷水或暖漿水下連作五劑瘥昔唐崔承元內障喪明夜坐聞有聲問誰答昔蒙出活今來謝遂以方合服眼復明田螺方出龍木論治肝熱目腫痛取田中螺大者七枚淨洗新汲水養去穢泥重換水浸洗仍旋取於干器中著少鹽花於口上承取自出汁用點目逐個如此用了卻放之瀉肝湯治肝熱目赤羞明隱痛生瘡翳膜赤腫黃芩黃連防風山梔子各一兩大黃甘草炙各半兩上為末每服三錢水一大盞入竹葉十片同煎至八分去滓溫服如熱多每服入朴硝一錢同煎取利即止助陽活血湯出衛生寶鑑治眼發之後上熱壅甚白睛紅多眵淚無疼痛而隱澀難開此服苦寒藥過多真氣不通九竅也故眼昏花不明宜助陽和血補氣防風七分黃耆二錢甘草炙一錢蔓荊子一錢當歸五分白芷五分升麻五分柴胡三分上㕮咀都作一服水一盞半煎至一盞去滓熱服臨臥避風處忌風寒及食冷物甘菊花散治肝氣壅塞翳膜遮睛隱澀難視甘菊花一兩白蒺藜木賊防風去叉甘草炙各一兩木香一分上為細散每服一錢匕沸湯點眼不拘時除肝家熱明目去熱毒氣風眼赤淚以決明子朝朝取一匙挼令淨空心水吞之百日見夜光又一方取決明作菜食之本草腎肝虛眼黑暗附論夫天一生水在臟為腎天三生木在臟為肝腎藏精肝藏血人之精血充和則腎肝氣實上榮耳目聰明視聽不衰若精血虧耗二臟虛損則神水不足瞻視乏力故令目黑暗龍木論云眼坐起生花外障此眼初患之時眼中別無所患唯久坐多時忽然起後頭旋眼中黑花發昏良久乃定皆因肝腎虛勞受風心臟熱毒上攻致有此疾如或治療稍遲以後變為青盲切宜服鎮心丸補腎散歌曰眼中無別患蹲坐要生花初患頭旋悶心肝風觸他腎虛兼受熱房事每頻多鎮心肝要補早服莫蹉跎任信年深後為災不禁何更因諸疾作瞳子必遭疴危氏得效方云此眼與心風候相似但時時黑花起乃腎受風邪熱攻於眼宜涼腎又不痛不癢瞳仁儼然如不患者但微有頭旋及見生花或勞則轉加昏蒙俱服還睛散起在黑水上如小黑豆疼痛如淚出不可點藥此及腎虛受風熱而得悶耳宜先服羚羊角散後補腎丸凡起坐生花或覺頭旋而悶耳蟬鳴此乃腎虛兼受客熱宜節房事及多服補腎丸方填睛育嬰丸出聖濟總錄治肝臟氣虛風毒上攻兩目赤癢腫痛昏澀迎風多淚及有胬肉或風內外障青盲攀睛翳膜石決明一枚洗刷白芷白茯苓去黑心陽起石飯上炊五度桂去粗皮杏仁去皮尖雙仁炒防風去叉肉蓯蓉酒浸去皺皮陳橘皮浸去白焙梔子花生薑切焙厚朴去粗皮拌生薑炒令煙盡甘草炙銼人參磁石末飯上蒸五度各二兩青葙子蕤仁水浸各二兩升麻銼熟地黃焙各八兩龍腦一分車前子黃柏去黑皮麥門冬去心焙槐子黃連乳香各四兩烏賊魚骨去甲黃芩去心苦參各一兩上為末煉蜜為丸如梧桐子大每服六丸空心白湯下食後更服十丸漸加至二十丸夜光丸治腎虛血弱肝經不足風毒上攻眼目視物昏花久則漸成內障青盲天門冬去心焙麥門冬去心焙生地黃羅參熟地黃白茯苓乾山藥各一兩枸杞子牛膝酒浸金釵石斛酒浸草決明炒杏仁去皮尖甘菊花揀淨菟絲子羚羊角肉蓯蓉酒浸焙五味子炒甘草炙沙苑蒺藜酒浸別研黃連鎊以上各七錢半枳殼麵炒生烏犀鎊青葙子各半兩上為末煉蜜為丸如梧桐子大每服三五十丸空心溫酒下鹽湯亦可青葙子丸治腎肝風虛目昏暗視物不明青葙子桂去粗皮葶藶熟乾地黃焙細辛去苗葉茺蔚子枸杞子決明子隔紙炒五味子黃芩去黑心防風去叉白茯苓去黑皮地膚子澤瀉麥門冬去心焙各一兩半車前子菟絲子酒浸一宿另搗為末各半兩兔肝一具慢火炙令乾上為末煉蜜和丸如梧桐子大每服三十丸食後米飲下臨臥再服決明子丸治肝腎虛目黑暗或見黑花飛蠅決明丸治肝虛膈熱眼目昏暗漸成障蔽或見黑花不能遠視決明子青葙子茺蔚子車前子地膚子五味子炒細辛去苗葉枸杞子去莖蒂麥門冬去心焙生地黃焙桂去粗皮赤茯苓去黑皮澤瀉防風去叉芎藭葶藶隔紙炒紫色各一兩上為末煉蜜和丸如梧桐子大每服二十丸食後良久米飲下日三服當歸湯治腎虛眼黑瞳子散當歸身二錢黃連酒洗黃芩各二錢甘草炙三錢柴胡一兩白芍藥二錢生地黃三錢酒洗陰乾上㕮咀水煎臨臥服羚羊羌活湯治肝腎虛眼見黑花或似蠅翅羚羊角屑羌活去蘆頭黃芩去黑心附子炮裂去皮臍人參澤瀉山茱萸秦艽去苗土決明子微炒車前子青葙子各一兩半甘草微炙一兩黃耆銼二兩柴胡去苗二兩半上粗搗篩每服五錢水一盞半煎至八分去滓溫服不拘時再服空青丸出聖濟總錄治腎久虛目暗漸生翳障空青研水飛過真珠末各一分犀角屑羚羊角屑防風去叉升麻銼防己各半兩麥門冬去心焙人參茺蔚子陽起石細研前胡去蘆頭各一兩虎睛一對上為末煉蜜和丸如梧桐子大每服五丸加至十丸煎麥門冬湯下溫椒湯亦可決明丸出聖濟總錄治肝腎氣虛風熱上攻目赤腫痛決明子黃連去須人參玄參槐子升麻白茯苓去黑皮沙參各一兩地膚子青葙子苦參各三分車前子一兩半地骨皮一兩上為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨臥再服蓯蓉丸出聖濟總錄治肝腎氣虛眼目昏暗視物不明兼青盲山芋續斷人參各一兩肉蓯蓉洗淨切焙一兩牛膝酒浸切焙一兩山茱萸一兩陳面炒黃獨活去蘆頭一兩巴戟天去心杜仲去皺皮塗酥炙菟絲子酒浸一宿焙乾另研各一兩熟乾地黃焙桑寄生炒各二兩上為末煉蜜和丸如梧桐子大每服二十丸空心鹽清下加至三十丸摩頂膏治腎虛眼目昏暗及風毒上衝腦脂流下變為內障生麻油二大升酥三兩淡竹葉一握蓮子草汁一大升七八月採槐子一兩一分曾青研一兩鹽花三兩長石另研一兩半一名理石梔子葉朴硝葳蕤大青吳藍各一兩半上除油酥外細銼