body:
  text: 卷二十脾臟門總論夫脾主意脾臟者意之舍意者存憶之志也為諫議大夫並四臟之所受心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智意者脾之藏也口唇者脾之官脾氣通於口口和則能別五穀味矣故云口為戊舌唇為己循環中宮上出頤頰次候於唇下回脾中榮華於舌外主肉內主味脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五臟神明俾俾主藏營秩祿號為意藏隨節應會故曰脾藏營營舍意在氣為噫在液為涎脾氣虛則四肢不用五臟不安實則腹脹涇溲不利脾氣虛則夢食飲不足得其時則夢築垣蓋屋脾氣盛則夢歌樂體重手足不舉厥氣客於脾則夢丘陵大澤壞屋風雨凡脾臟象土與胃合為腑其經足太陰與陽明為表裡其脈緩相於夏王於季夏脾者土也敦而福敦者厚也萬物眾色不同故名曰得福者廣萬物懸根住莖其葉在巔蜎蜚蠕動蚑蠼喘息皆蒙土恩德則為緩恩則為遲故令太陰緩而遲尺寸不同酸鹹苦辛大妙而生互行其時而以各行皆不群行儘可常服土寒則溫土熱則涼土有一子名之曰金懷挾抱之不離其身金乃畏火恐熱來熏遂棄其母逃於水中水為金子而藏火神閉門塞戶內外不通此謂冬時土失其子其氣衰微水為洋溢浸漬其地走擊皮膚面目浮腫歸於四肢愚醫見水直往下之虛脾空胃水遂居之肺為喘浮肝反畏肺故下沉沒下有荊棘恐傷其身避在一邊以為水流心衰則伏肝微則沉故令脈伏而沉上醫遠占因轉孔穴利其溲便遂通水道甘液下流停其陰陽喘息則微汗出正流肝著其根心氣因起陽行四肢肺氣亭亭喘息則安腎為安聲其味為咸倚坐母敗洿臭如腥土得其子即成為山金得其母名曰丘矣四時之序逆順之變異也然脾脈獨何主脾脈者土也孤藏以灌四傍者也其善者不可得見惡者可見惡者何如其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中太過則令人四肢沉重不舉不及則令人九竅壅塞不通名曰重強脾脈來而和柔相離如雞踐地曰平長夏以胃為本脾脈來實而盈數如雞舉足曰脾病脾脈來堅銳如雞之喙如鳥之距如屋之漏如水之流曰脾死真脾脈至弱而乍疏乍散色黃青不澤毛折乃死長夏胃微濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石曰冬病石甚曰今病脾藏營營舍意愁憂不解則傷意意傷則悶亂四肢不舉毛瘁色夭死於春足太陽氣絕則脈不營其口唇口唇者肌肉之本也脈弗營則肌肉濡肌肉濡則人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也脾死藏浮之大緩按之中如覆杯絜絜狀如搖者死六月季夏建未也坤未之間土之位脾王之時其脈大阿阿而緩曰平反得浮大而洪者是心之乘脾母之歸子為虛邪雖病易治反得微澀而短者是肺之乘脾子之乘母為實邪雖病自愈反得弦而長者是肝之乘脾木之剋土為賊邪大逆十死不治反得沉濡而滑者是腎之乘脾水之陵土為微邪雖病即瘥右手關上陰絕者無脾脈也若少氣下利腹滿身重四肢不欲動善嘔刺足陽明治陽右手關上陰實者脾實也若腹中伏伏如堅狀大便難刺足太陰治陰脾脈長長而弱來疏去數再至曰平三至曰離經病四至曰脫精五至死六至命盡足太陰脈也脾脈急甚為瘛瘲微急為膈中滿食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無疾大甚為擊僕微大為脾疝氣裹大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿗癃微滑為蟲毒蛔腸鳴熱澀甚為腸㿗微澀為內潰多下膿血脾脈搏堅而長其色黃當病少氣其耎而散色不澤者當病足骭腫若水狀黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風扁鵲曰脾有病則色萎黃實則舌本強直虛則多癖善吞注利其實若陽氣壯則夢飲食之類脾在聲為歌在變動為噫在志為思思傷脾精氣並於脾則飢應在長夏病變於音者取之經恐懼而不解則傷精精傷則骨酸痿厥精時自下則病精是故五臟主藏精者也不可傷傷則失守而陰虛虛則無氣無氣則死病先發於脾閉塞不通身痛體重一日之胃而腹脹二日之腎小腹腰脊痛脛酸三日之膀胱背膂筋痛小便閉十日不已死冬人定夏晏食病在脾日昳慧平旦甚日中持下晡靜素問作日出甚王冰云日中持者謬也假令脾病東行若食雉兔肉及諸木果實得之不者當以春時發得病以甲乙日也凡脾病之狀必身重善飢足痿不收素問作善肌肉痿足不收甲乙作苦飢肌肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化取其經足太陰陽明少陰血者脾脈沉之而濡浮之而虛苦腹脹煩滿胃中有熱不嗜食食而不化大便難四肢苦痹時不仁得之房內月使不來來而頻並脾病其色黃飲食不消腹苦脹滿體重節痛大便不利其脈微緩而長此為可治宜服平胃丸瀉脾丸茱萸丸附子湯春當刺隱白冬刺陰陵泉皆瀉之夏刺大都季夏刺公孫秋刺商丘皆補之又當灸章門五十壯背第十一椎百壯邪在脾胃肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調其三里有所擊僕若醉飽入房汗出當風則傷脾脾傷則中氣陰陽離別陽不從陰故以三分候死生脾中風者翕翕發熱形如醉人腹中煩重皮肉瞤瞤而短氣也脾水者其人腹大四肢苦重津液不生但苦少氣小便難脾脹者善噦四肢急體重不能衣趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約脾約者其人大便堅小便利而反不渴脾氣弱病利下白腸垢大便堅不能更衣汗出不止名曰脾氣弱或五液注下青黃赤白黑寸口脈弦而滑弦則為痛滑則為實痛即為急實即為踴痛踴相搏即胸脅搶急趺陽脈浮而澀浮即胃氣微澀即脾氣衰微衰相搏即呼吸不得此為脾家失度寸口脈雙緊即為入其氣不出無表有里心下痞堅趺陽脈微而澀微即無胃氣澀則傷脾寒在於膈而反下之寒積不消胃微脾傷穀氣不行食已自噫寒在胸膈上虛下實穀氣不通為秘塞之病寸口脈緩而遲緩則為陽其氣長遲則為陰其氣促營衛俱和剛柔相得三焦相承其氣必強趺陽脈滑而緊滑即胃氣實緊則脾氣傷得食而不消者此脾不治也能食而腹不滿此為胃氣有餘腹滿而不能食心下如飢此胃氣不行心氣虛也得食而滿者此為脾家不治病人鼻下平者胃病也微赤者病發癰微黑者有熱青者有寒白者不治唇黑者胃先病微燥而渴者可治不渴者不可治臍反出者此為脾先終凡人病脈已解而反暮微煩者人見病者瘥安而強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈診得脾積脈浮大而長飢則減飽則見䐜起與谷爭減心下累累如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能臥是主肌肉損色黃也脾病其色黃體青失溲直視唇反張爪甲青飲食吐逆體重節痛四肢不舉其脈當浮大而緩今反弦急其色當黃而反青者此是木之剋土為大逆十死不治宮音人者主脾聲也脾聲歌其音鼓其志愁其經足太陰厥逆陽明則營衛不通陰陽翻祚陽氣內擊陰氣外傷傷則寒寒則虛虛則舉體消瘦語音沉澀如破鼓之聲舌強不轉而好嚥唾口噤唇黑四肢不舉身重如山便利無度甚者不可治依源麻黃湯主之又言聲憂懼舌本捲縮此是木剋土陽擊陰陰氣伏陽氣起起則實實則熱熱則悶亂體重不能轉側語聲拖聲氣深不轉而心急此為邪熱傷脾甚則不可治若唇雖萎黃語音若轉可治黃為脾脾合肉黃如䱉腹者吉脾主口唇唇是脾之餘其人土形相比於上宮黃色大頭圓面美肩背大腹好股胻小手足多肉上下相稱行安地舉足心平好利人不喜權勢喜附人耐秋冬不耐春夏春夏感而生病主足太陰敦敦然脾應月月有虧盈脾小大隨人唇大小上唇厚下唇薄無齶齦唇缺破此人脾不正揭聳唇者則脾高高則實實則熱熱則季脅痛滿唇垂而大不堅者則脾下下則虛虛則危危則寒寒則身重不能行步唇堅者則脾堅堅則臟安安則不病唇上下好者則脾端正端正則脾胃和利人無病唇偏舉者則脾偏痛好脹凡人分部中陷起者必有病生胃陽明為脾之部而臟氣通於內外部亦隨而應之沉濁為內浮清為外若表病外入所部則起起則前瀉陽後補陰若里病內出所部則陷陷則前治陰後治陽陽則實熱陰則虛寒寒主外熱主內凡人死生休否則藏神前變形於外人脾前病唇則焦枯無潤若脾前死唇則干青白漸縮急齒噤不開若天中等分暮色應之必死不治看色厚薄決判賒促賒則不盈四百日內促則旬朔之間脾病少愈而猝死何以知之曰青黑如拇指黶點見顏頰上此必猝死脾絕十二日死何以知之口冷足腫腹熱臚脹泄利不覺其出時面青目黃者五日死病人著床心痛氣短脾竭內傷百日復愈欲起徬徨因坐於地其亡倚床能治此者可謂神良又面黃目赤不死黃如枳實死吉凶之色在於分部霏霏而見黑黃入唇必病不出其年其穴在鼻上當兩眼是其分部之位也若年上不應三年之內禍必應也季夏土脾脈色黃主足太陰脈也其脈本在中封前上四寸之中應在背輸與舌本中封在內踝前一寸大筋裹宛中脈本從中封上四寸是也其脈根於隱白隱白在足大指端內側是也四季之月各餘十八日此為四季之餘日主脾胃黃肉隨病也其源從太陰陽明相格節氣相移三焦寒濕不調四時關格而起則臟腑傷疴隨時受癘陽氣外泄陰氣內伏其病相反若腑虛則陰邪所加頭重頸直皮肉強痹若臟實則陽疫所傷蘊而結核起於喉頸之側布毒熱於皮膚分肉之中上散入髮際下貫顳顬隱隱而熱不相斷離故曰黃肉隨病也又云灸肝脾二輸主治丹毒四時隨病當依源補瀉虛實之疴皮肉隨熱則須鐮破薄貼方咒促治疾病無逃矣脾實熱附論夫脾實則生熱熱則陽氣盛陽氣盛則心胸煩悶唇口乾焦身熱頰疼體重不能轉側足寒頸熱聲沉而心急咽喉痛而不利舌本腫強口內生瘡言語謇難涇溲不利腹脅脹滿不得安臥夢見歌樂四肢怠惰診其脈緊實者是脾實之候方治脾熱面黃目赤季脅痛滿出千金方半夏母姜各八兩枳實梔子茯苓芒硝各三兩細辛五兩白朮杏仁各四兩生地黃淡竹葉各切一升上㕮咀水九升煮三升去滓下芒硝分三服治脾熱偏一邊痛胸滿脅偏脹出千金方茯苓橘皮澤瀉各三兩芍藥白朮各四兩人參桂心各二兩石膏八兩半夏六兩生薑切一升桑白皮根一升上㕮咀以水一斗二升煮取三升去滓分三服若須利下加芒硝二兩佳清脾湯出醫方大成治脾實熱病足寒脛熱腹脹滿煩擾不得臥舌本強體重面黃頭痛右脅滿痛偏脹口苦咽乾唇裂寒熱如瘧茯苓橘皮草果去皮白朮各二錢半夏三錢湯洗七次焙人參桂心白芷甘草炙川芎各二錢上銼散每四大錢水二盞姜七片蘇三葉同煎七分去滓服欲通利加大黃略煎清脾湯治憂思過度蘊熱於脾口乾唇燥瀋裂無色用香白芷黃耆升麻人參甘草炙半夏湯洗七次上各等分散每四錢水一盞半姜五片棗二枚小麥三十粒煎七分去滓不拘時服瀉熱湯出千金方治舌本強直或夢歌樂而體重不能行前胡茯苓龍膽草細辛芒硝各三兩杏仁四兩玄參大青各二兩苦竹葉切一升上㕮咀水九升煮三升分三服食後服大黃湯出聖惠方治脾實胸中滿悶腹脅壅脹身熱頰疼咽喉不利大黃銼炒一兩赤茯苓去黑皮三分枳殼去瓤麩炒半兩甘草炙銼黃芩去黑心各一兩陳皮浸去白麥門冬去心一兩半夏洗去滑焙前胡去蘆頸各半兩上粗搗篩每服三錢匕水一盞生薑一片棗大拍碎煎