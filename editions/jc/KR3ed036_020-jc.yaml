朮三錢肉桂一兩去皺皮附子一兩炮裂去皮臍當歸三錢銼微炒草豆蔻五枚去皮厚朴二兩去粗皮塗生薑汁炙令香熟高良薑一兩銼吳茱萸半兩湯浸七遍焙乾微炒上為散每服三錢水一中盞煎六分去滓不計時稍熱服紅豆蔻散出聖惠方治脾臟冷氣攻心腹疼痛宿食不消又腹脅脹悶不思飲食紅豆蔻一兩去皮木香半兩當歸三錢銼微炒桂心半兩高良薑一兩銼芎藭三分錢訶黎勒半兩煨用皮草豆蔻六枚去皮附子一兩炮裂去皮臍陳橘皮一兩湯浸去白瓤焙白朮半兩神麯三錢微炒令黃上為散每服三錢水一中盞入棗三枚同煎六分去滓不計時稍熱服蓽茇丸出聖惠方治脾臟久積冷氣攻心腹疼痛面色青黃四肢無力不思飲食蓽茇三兩木香半兩桂心半兩白茯苓三兩檳榔一兩附子一兩炮裂去皮臍胡椒三錢厚朴二兩去粗皮塗生薑汁炙令香熟當歸三錢銼微炒乾薑半兩炮裂銼訶黎勒一兩煨用皮人參一兩去蘆頭上為末煉蜜和丸梧桐子大每服不計時粥飲下三十丸丁香丸出王氏博濟方治脾臟冷氣攻心腹疼痛及婦人血氣丁香木香白豆蔻去殼青橘皮湯浸去白焙胡椒蓽茇檳榔麝香別研各一分乳香別研半兩巴豆半兩去皮微炮細研紙裹壓油盡研成霜上將檳榔以上先為末次入餘三味和勻用醋煮麵糊丸黍米大再用硃砂為衣每服五丸茶酒任下治元氣用綿灰半錢酒調下十丸心痛煎鹽醋湯下七丸女人血氣當歸酒下五丸此藥大妙別有神效抵聖丸治脾臟冷氣攻心腹疼痛木香半兩丁香二十枚乳香研蒔蘿各一錢炒檳榔一枚銼阿魏半分湯化去砂石干桂去粗皮肉豆蔻去殼蓽茇各半兩巴豆三枚去皮心膜出油盡上為末用粳米飲或飯丸如綠豆大每服三丸至五丸食後生薑鹽湯下如痛服七丸內嚼三丸燒生薑鹽湯下溫酒下亦得鹽煎散治脾臟冷氣攻臟腑不調心腹撮痛及下元久冷烏頭水浸三日炮裂去皮臍蘹香子炒附子水浸三日炮裂去皮臍各一兩楝實七枚炮青橘皮湯浸去白焙二兩乾薑炮一兩木香硇砂去砂石各一錢蓽澄茄半兩上搗羅為散每服一錢匕水八分鹽煎四分空心和滓溫服參苓散治脾臟氣虛風冷乘之正氣相擊心腹疼痛人參白茯苓去黑皮黑豆炒黃陳橘皮去白薑汁炙縮砂各三兩京三稜二兩以新水浸令軟薄切濕杵碎焙乾炒青橘皮去白焙麥糵炒各一兩木香甘草炙銼各半兩上搗羅為細散每服二錢匕入生薑鹽少許沸湯點服木香散出聖惠方治脾臟冷氣攻心腹疼痛不可忍木香半兩桃仁三錢湯浸去皮尖雙仁麩炒微黃吳茱萸三錢湯浸七遍焙乾微炒青橘皮一兩湯浸去白瓤焙檳榔三枚桂心一兩蓬莪朮一兩當歸一兩銼微炒乾薑三分炮裂銼上搗羅為散不計時熱酒調下一錢沉香湯治脾虛不思飲食冷氣攻腹脅四肢少力吐酸水沉香桂去粗皮白豆蔻去皮各一兩青橘皮去白焙一兩半高良薑檳榔銼吳茱萸湯浸一宿焙乾炒厚朴去粗皮生薑汁炙各二錢上粗搗篩每服三錢匕水一盞煎六分去滓溫服不拘時鱉甲煎丸治脾臟久積冷氣攻心腹痛脹噁心嘔逆臍下撮痛鱉甲醋炙去裙襴硇砂不夾石者芫花醋拌炒狼毒碎銼炒乾漆炒煙盡各一兩京三稜炮銼三錢巴豆二錢去皮心研細與硇砂用醋一升同熬成膏上除硇砂巴豆外搗羅為末與巴豆膏同拌勻水煮麵糊丸綠豆大每服一丸食後生薑鹽湯下吳茱萸散出聖惠方治脾臟冷氣攻心腹疼痛不可忍吳茱萸半兩湯浸七遍焙乾微炒高良薑半兩銼桂心三錢厚朴二兩去粗皮塗生薑汁炙令香熟當歸半兩銼微炒木香半兩上為散每服三錢水一中盞煎六分去滓不計時稍熱服集聖湯治脾胃氣不足風冷乘之與正氣交擊心腹疼痛附子炮裂去皮臍桂去粗皮乾薑炮甘草炙銼各一兩蓽澄茄一分錢上銼如麻豆每服三錢匕水一盞鹽一捻煎七分去滓服吳茱萸丸治脾胃冷氣攻心腹脹痛宿食不消吳茱萸湯浸七遍炒桂去粗皮各一兩陳橘皮三錢湯浸去白焙檳榔一兩銼上為末醋煮麵糊丸梧桐子大每服十五丸生薑湯下不計時煨姜丸出和劑方治本臟虛飲食不化或成痃癖或發心痛冷水積脾結聚疼痛一切冷氣等疾附子硇砂木香生薑上用大附子五十個各重半兩者去皮臍以尖刀子剜去心子約容硇砂半錢實之卻以附子末和麵作餅子裹附子用文武火煨令黃用木香如附子之半同為細末以水為丸如雞頭大復以生薑一塊擘作兩片以藥入內濕紙裹令煨候姜熟白湯嚼下空心服吳茱萸湯治脾臟虛冷心腹疼痛用吳茱萸湯浸焙炒三兩每服一分不搗以水二盞入生薑一分切蔥白五寸切同煎八分去滓溫服食前一方用酒煎人參沖和丸出楊氏家藏方治脾經受冷心腹疼痛嘔逆中滿不進飲食兼因傷冷作瀉並皆治之人參去蘆頭白朮大麥糵炒陳橘皮湯浸去白乾薑炮甘草炙以上各二兩青橘皮湯浸去白神麯先搗細炒香二味各一兩上件為細末煉蜜為丸每一兩作一十丸每服一丸細嚼濃煎棗湯下食前常服大進飲食消穀散滯每服一丸水一盞煎至七分溫服亦得如脾胃虛弱不進飲食大便溏泄不因傷滯者可去青橘皮加肉豆蔻縮砂仁各半兩治中湯出御藥院方治脾胃傷冷物胸膈不快腹痛氣不和青皮去白人參去蘆頭甘草炙白朮陳皮去白乾薑炮各等分上為粗末每服三錢水一盞同煎至七分去滓食前溫服
