body:
  text: 卷一百三十七傷寒門傷寒發狂附論夫傷寒心狂熱者緣心屬火也心主於血陽氣盛則血並於陽熱邪攻於心絡則心神煩亂或默或歌或言笑猖狂不已言語失常驚悸不安棄衣而走此皆熱毒之氣壅滯心胸致令發狂也重陽者狂謂陽氣獨盛也傷寒熱毒既盛內外皆熱則陽氣憤嗔而發為狂越其病使人狂走妄言或罵詈不避親疏或妄見妄聞甚則至於棄衣而走登高而歌或數日不食逾垣上屋者蓋四肢諸陽之本也熱盛而四肢實是為重陽故所止處皆非素所能而病乃能也若乃因火為邪而發為驚狂及內有瘀血而外證如狂其為病雖不同然其為陽氣有餘則一也傷寒發狂者狂猖狂也謂其不寧也難經曰狂之始發也少臥不飢而自高賢也自辨智也自貴倨也妄笑好歌樂也妄行走不休也狂家所起皆陽盛致然內經曰陰不勝陽脈留薄疾並乃狂也又曰邪入於陽則狂邪入於陰則喑難經曰重陽者狂重陰者癲脈經曰陰附陽則狂陽附陰則癲病源曰陽邪並於陽則狂陰邪並於陰則癲即諸經之狂為陽盛也明矣又陽明之病惡人與火聞木音則惕然而驚心欲動獨閉戶牖而處甚則欲上高而歌棄衣而走逾垣上屋其所上之處皆非素所能者是謂陽邪並於陽明也傷寒熱毒在胃並於心臟使神不寧而志不定遂發狂也傷寒至於發狂為邪熱至極也非大吐下則不能已又有熱在下焦其人如狂者經曰熱入膀胱其人如狂謂之如狂則未至於狂但臥起不安爾其或狂言目反直視又為腎之絕汗出輒復發狂也言不能食又為失志死若此則殆非藥石之所及是為甚病焉活人歌括云發狂面赤屬重陽葶藶升麻及大黃血證身黃仍漱水尿多承氣地黃湯陰邪並於陰則癲陽邪並於陽則狂傷寒熱毒在胃併入於心遂使神志昏亂言動急速而發狂也狂之發作少臥不飢妄語妄笑妄倨妄辨妄起妄行棄衣而走登高而歌甚則逾垣上屋皆獨陽亢熱使之非吐下不能止有當汗不汗瘀熱在裡下焦蓄血面如狂者小便必利特如狂而未至於狂耳其或熏熨迫汗灼艾爇燒針令人煩躁臥起不安則謂之火邪驚狂凡是數者各有條例若夫狂言直視旋溺自遺其與汗後熱多脈躁狂言不食智者寒心重陽即陽毒脈數實狂走錯語煩躁乾嘔面赤咽痛潮熱發斑葶藶苦酒湯陽毒升麻湯梔子仁湯三黃湯大黃散升麻葛根湯加大黃狂走者水調瓜蒂末吐痰瓜蒂散亦可吐血證如狂脈微而沉身黃唇燥漱水不欲下咽無寒熱小腹硬滿小便利大便微利而黑輕者犀角地黃湯重者桃仁承氣湯或抵當丸取盡黑物為效張云太陽病不解熱結膀胱其人如狂而血自下下者愈若外不解可與桂枝湯外已解但小腹急結乃以桃仁承氣湯攻之大抵傷寒當汗不汗熱蓄在裡熱化為血故喜怒如狂陽狂寒水石黃連末各一錢冷水調下皆效發斑妄語未可下者龍膽草一物湯火邪驚狂者醫家以火熏熨迫汗及燒針灼艾而然也其人亡陽煩躁臥起不安金匱風引湯柴胡加龍骨牡蠣湯桂枝甘草龍骨牡蠣湯又以火劫腹滿微喘口乾咽爛或大便不通讝語小柴胡湯黑豆解火邪湯方龍骨救逆湯出聖惠方治傷寒脈浮醫以火劫出汗太過必亡陽心生狂熱起臥不安龍骨一兩桂心二一兩牡蠣二兩燒為粉茯神一兩人參一兩去蘆頭麥門冬二兩去心焙甘草二兩炙微赤銼蜀漆一兩上搗粗羅為末每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服犀角散治傷寒有狂熱在心恍惚或多驚不得睡臥犀角屑三分茵陳三分茯神二兩人參一兩去蘆頭梔子仁半兩赤芍藥半兩麥門冬一兩去心焙龍齒三分川升麻半兩子芩三分甘草三分炙微赤銼上搗篩為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服核桃承氣湯出聖惠方治傷寒病不解熱結在膀胱者其人如狂血自下愈外未解不可下先解其外解已但小腹結者可下之宜服內經曰甘以緩之辛以散之小腹急結緩以桃仁之甘下焦蓄血散以桂枝之辛大熱之氣寒以取之熱甚搏血加二物於調胃承氣湯之中也羚羊角散出聖惠方治傷寒心熱發狂羚羊角屑半兩黃芩半兩赤芍藥半兩茯神半兩葛根半兩銼鼠尾草半兩梔子仁半兩川大黃半兩銼碎微炒麥門冬一兩去心焙上搗粗羅為散每服四錢水一中盞入豉一百粒煎至六分去滓不計時候溫服人參散出聖惠方治傷寒邪熱傷心恍惚狂言時有痰逆不欲飲食人參三分去蘆頭桔梗半兩去蘆頭龍齒三分茯神三分半夏半兩湯洗七遍去滑遠志一分去心枳實一分麩炒微黃麥門冬三分去心沙參半兩去蘆頭黃耆半兩銼甘草一分炙微赤銼上搗篩為散每服五錢水一大盞入生薑半分棗三枚粳米五十粒煎至五分去滓不計時候溫服地骨皮散出聖惠方治傷寒心神煩熱狂語不定地骨皮葳蕤人參去蘆頭黃耆銼麥門冬去心子芩以上各一兩茯神三分甘草半兩炙微赤銼上搗篩為散每服四錢水一中盞煎至五分去滓入生地黃汁一合生薑汁一茶匙蜜半合更煎一兩沸不計時候溫服龍齒散出聖惠方治傷寒心熱狂言恍惚臥不安席龍齒二兩犀角屑一兩川升麻一兩茯神一兩半麥門冬二兩去心焙玄參一兩甜竹根三分銼赤芍藥一兩半生乾地黃二兩馬牙硝一兩半上搗粗羅為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服又方出聖惠方馬牙硝一兩鉛霜一分龍腦一分硃砂半兩鐵粉一兩上都研令細不計時候煎竹葉湯放溫調下一錢又方出聖惠方龍齒半兩牛黃一兩分細研馬牙硝一兩細研硃砂半兩細研地龍一兩微炒麝香一兩錢細研上搗研令勻不計時候以生薑蜜水調下一錢黃芩散出聖惠方治傷寒熱毒在內心煩發狂黃芩一兩甘草半兩炙微赤銼白薇一兩梔子仁一兩大青知母栝蔞川硝石白蘚皮各一兩上搗羅為散每服不計時候以新汲水調下二錢龍齒丸治傷寒邪熱在心狂言妄語精神錯亂志意不安龍齒一兩人參一兩去蘆頭茯神三分遠志半兩去心黃芩三分麥門冬一兩去心焙黃連三分去須甘草半兩炙微赤銼上搗羅為末煉蜜和搗一二百杵丸如梧桐子大每服不計時候以冷米泔送下三十丸苦參飲出聖濟總錄治傷寒欲發狂解毒止躁苦參一兩黃芩去黑心二兩甘草炙半兩上搗為粗末每服三錢水一盞煎至七分去滓入生地黃汁約半合攪勻溫服不拘時候大黃湯出聖濟總錄治傷寒熱結在內心神恍惚狂妄大黃銼炒芒硝各一兩半桂去粗皮三分大腹皮銼甘草炙銼木通銼各一兩桃仁二十一枚去皮尖雙仁麩炒上粗搗篩每服四錢匕水一盞煎至六分去滓溫服不計時候以通利為度犀角湯出聖濟總錄治傷寒九日至十日頭戰掉大汗出恍惚狂走眼見神鬼犀角屑半兩茵陳蒿三分茯神去木芍藥麥門冬去心焙生乾地黃焙各一兩半梔子仁半兩上粗搗篩每服五錢匕用水一盞半入竹葉三七片同煎至八分去滓食後溫服千金丸出聖濟總錄治陽毒發狂及癲邪狂走豬血一盞生用不灰木為末藍根連葉為末各一兩水銀一盞以錫結沙子雞子三枚只用清膩粉半錢上六味除豬血雞子清外細研入豬血雞子清拌和令勻入瓷罐子內封閉臘日合之掘地坑一尺培候端午日取出旋丸如雞頭大每服一丸生薑汁及新汲水化破服救逆湯出聖濟總錄治傷寒脈浮醫以火劫之亡陽必驚狂桂去粗皮蜀漆各一兩半甘草炙一兩牡蠣熬二兩半龍骨二兩上銼如麻豆大每服五錢匕以水一盞半入生薑半分切大棗二枚擘破同煎取七分去滓溫服人參湯出聖濟總錄治傷寒後狂言欲走口乾或時吐逆人參羚羊角屑葛根銼竹茹前胡去蘆頭麥門冬去心焙各半兩甘草炙銼一兩半夏湯浸去滑炒乾半兩上粗搗篩每服五錢匕用水一盞半入生薑一分拍碎棗三枚擘破同煎至八分去滓食後溫服柴胡湯一名加味小柴胡湯治傷寒過經不解熱結在裡狂言不定煩躁欲走柴胡去苗大黃銼炒朴硝枳殼去瓤麩炒各一兩甘草炙銼半兩上粗搗篩每服三錢匕水一盞煎取六分去滓溫服未利再服一方加枳實一錢半羚羊角散出聖濟總錄治傷寒發汗後熱毒未盡因有所驚狂言欲走羚羊角屑犀角屑防風去叉茯苓去木黃芩去黑心玄參升麻各半兩龍齒研一兩甘草炙一兩竹茹地骨皮洗焙丹參各三分上粗搗篩每服五錢匕用水一盞半入蔥白五寸同煎至八分去滓溫服香豉湯出聖濟總錄治傷寒心狂欲走緣風熱毒氣內乘於心所致豉炒令香熟三兩芒硝燒令白於濕地上用紙襯出火毒四兩上二味每取豉半兩先以水一盞煎取七分去滓下芒硝末三錢匕再煎三兩沸空腹分溫二服如人行三里更一服日夜可四服但初看是風狂者宜暫縛兩手足三服之後解之即無不愈者朴硝湯出聖濟總錄治傷寒發狂欲走是毒氣壅於上焦毒熱不散狂盛但縛手腳恐自刑害及走趁人其脈左寸洪數時時伏朴硝燒令白於濕地紙襯出火毒一分豉炒令香熟一合山梔子仁一分上粗搗篩每服三錢匕以水一盞煎至半盞去滓空腹溫服如人行十里再一服如利即止大黃湯出聖濟總錄治傷寒狂言欲走大小便不通腹痛脹滿大黃細銼微炒木香銼各一分木通銼三分升麻羚羊角屑白茅根銼黃芩去黑心各半兩上粗搗篩每服五錢匕用水一盞半入蔥白五寸同煎至八分去滓溫服鬱金散出聖濟總錄治傷寒陽盛發狂大小便不通腹脹滿鬱金大黃細銼微炒山梔子仁各三分桂去粗皮半兩甘草炙銼一分上搗羅為細末每服二錢匕食後煎蔥豉湯調下治傷寒得汗熱毒不解心煩躁悶言語不定小便赤澀大便不通狂悶欲走方出聖濟總錄大黃細銼微炒朴硝研各二兩黃芩去黑心山梔子仁大青各一兩半龍膽去土苦參各一兩上搗羅為細末煉蜜和成劑更搗三五百杵丸如梧桐子大每服二十丸食後煎麥門冬湯下量病勢更加丸數金箔丸出聖濟總錄治傷寒時行發狂妄見神鬼金箔銀箔各一十片鐵落用水淘出沙泥取鐵粉四兩青黛半兩砒霜半錢麝香半錢上研為細末入糯米粥為丸如皂莢子大新水磨下一丸如人行五里吐出涎立效不灰木散出聖濟總錄治傷寒熱實發狂煩躁悶亂不灰木二兩滑石寒水石藍根甘草生各一兩上搗研為散每服二錢匕研生粟米泔入乳糖一塊如棗大同化調服不拘時候絳雪丸出聖濟總錄治傷寒發狂眼通赤大小便血出身如金色兼治六七日狂躁發熱硝石一兩丹砂一分上二味同研如粉燒粟米飯和丸如彈子大每服一丸沙糖冷水化下服藥後便睡移時汗出為效鵲石散出醫方集成治傷寒發狂逾牆上屋黃連寒水石各等分上為末每服二錢濃煎甘草湯候冷調服一方出肘後方治傷寒發熱陽勝陰卒發狂手足溫面紅狂言狀如見鬼上用青蒿一把搗碎為末入水二盞半送下立效一方老青松蒿子童便浸三日干為末每服二錢烏梅一個煎服神白丹出宣明論治傷寒積熱及風生驚搐或如狂病諸藥不效此方不可盡述粉霜一兩用白麵六錢和作餅子炙熱同研鉛白霜一分輕粉半兩上為末滴水為丸桐子大每服十丸至十五丸米飲下量虛實加減風引湯出金匱要略方大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩凝水石滑石赤石脂白石脂石膏紫石英各六兩上為粗末以囊盛之取三指撮井花水三升煮三沸去滓溫服一升桃仁散出王氏博濟方治傷寒狂亂疏利臟腑止霍亂心疼桃仁一兩湯浸去皮尖大黃一兩川者以濕紙裹煨兩度桂心一兩去皮甘草半兩炙牙硝一兩上細銼熟炒杵羅為末不拘時候用溫水調下三錢如傷寒後有餘毒依法服大效傷寒潮熱附論夫傷寒熱毒不退伏留於臟腑而不能散即攻於表隨其旺衰而作發歇遍身壯熱或進或退故謂之潮熱也診其脈各脈各隨其五臟六腑洪數者是也傷寒潮熱者謂潮作有時由邪氣入里故病有日晡所發潮熱已而微利者有微發潮熱而大便溏者有潮熱而咳逆者有結胸而潮熱者大凡潮熱皆以邪氣內實也制方者宜酌其輕重傷寒潮熱者若潮水之潮其來不失其時也一日一發指時而發者謂之潮熱若日三五發者即是發熱非潮熱也潮熱屬陽明必於日晡時發者乃為潮熱陽明者胃屬土應時則旺於四季應日則發於未申經曰陽明居中土也萬物所歸無所復傳蓋邪氣入胃謂之入府府之為言聚也若府庫之府焉邪氣入於胃而不復傳邪氣鬱而為實熱隨旺而潮是以日晡所發潮熱者屬陽明也惟其屬陽明故潮熱為可下之證經曰潮熱者實也又曰潮熱者此外欲解也可攻其里焉又曰其熱不潮未可與承氣湯即此觀之潮熱屬於胃者昭然可見焉雖然潮熱為裡實可下之證抑或脈浮而緊與其潮熱而利或小便難大便溏者皆熱未全入府猶帶表邪當和解其外外解已而小便利大便硬者乃可攻之或謂潮熱有屬太陽少陽者乎少陽旺於寅卯太陽旺於巳午若熱於此時發者為邪未入胃豈得謂之潮熱必待日晡所發者乃謂之潮熱見其邪在胃也遇疾值病詳而驗之始見得真也潮熱者大率當下仲景云潮熱者實也大承氣湯證云其熱不潮未可與也則知潮熱當下無疑矣雖然更看脈與外證脈若弦若浮及外證兼惡寒猶有表證且與小柴胡湯以解之若腹大滿不通者可與小承氣微和其胃氣勿令大泄也仲景云日晡發熱者屬陽明也脈實者大承氣大柴胡也脈虛者桂枝也縱使潮熱當行大承氣亦須先少與小承氣若不轉失氣不可攻之後發熱復硬者大柴胡下之若胸脅滿而嘔日晡發潮熱者小柴胡加芒硝主之又有日晡發潮熱已而微利者又有微發潮熱而大便溏者或潮熱而咳逆者皆當用小柴胡也傷寒十三日不解胸脅滿而嘔日晡發潮熱已而微利潮熱者實也先服小柴胡以解外後以柴胡加芒硝湯下之陽明潮熱大便溏胸滿不去者柴胡主之冬陽明潮熱當行黃芩湯冬陽明病脈浮而緊必發潮熱發作有時但脈浮者必盜汗黃芩湯主之以上潮熱並屬陽明也太陽有潮熱仲景大陷胸湯一證結胸有潮熱者為大結胸屬太陽也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視但發熱讝語者大承氣湯主之若一服利則止後服脈弦者生澀者死弦者陽也澀者陰也陽證見陰脈者死病人有陽證而脈澀者慎不可下歌曰已成下證熱須潮病在陽明裡欲焦若有結胸並表證莫將承氣胃中調又歌曰潮熱屬胃下之和大結胸家本例圖咳逆利溏並表證勿攻只有小柴胡潮熱屬陽明一日一發日晡而作也若非日晡所發是謂其熱不潮蓋陽明旺於未申故爾惟屬陽明故潮熱為可下之證苟其脈或弦或浮大便或溏或利小便艱澀外證猶有惡寒則其熱未全入府並不可下但以小柴胡和解之是必表證已退大便硬結小便如常乃可攻也日晡潮熱甚者循衣摸床獨語如怪直視微喘脈弦者可治脈澀者不治脈不實不虛但有小柴胡湯寒熱往來寒熱間陰陽大小柴胡及桂姜結熱心煩仍喜嘔渴而頭汗用之良陽不足則先寒而後熱陰不足則先熱而後寒寒熱往來者陰陽相勝邪正交爭而作也蓋陽不足則陰邪出於表而與之爭故陰勝而為寒陰不足則陽邪入於裡而與之爭故陽勝而為熱若邪氣在半表半裡之間則外以邪入於與陽爭而為寒內與陰爭而為熱出入無拘所以乍往乍來而間作也大抵邪居表多則多寒邪居里多則多熱邪在半表半裡則寒熱相半此又可以知其受病之處用藥固自有條然小柴胡最主寒熱寒多者加桂若熱結者加大黃脈不甚實而大便澀者加枳殼寒熱相半只守本方是亦活法雖然寒熱之方來如波濤之洶湧其勢有不容通者當進之一二日候少定而圖之經所謂其盛者可待衰而已是又不可不知病至十餘日結熱在裡往來寒熱大柴胡湯下之心煩喜嘔胸脅滿不欲食寒熱往來小柴胡湯或血氣弱腠理開邪正交爭痰嘔甚者二陳湯汗下後不嘔而渴頭汗出胸脅滿小便不利寒熱往來柴胡桂薑湯方鱉甲散出聖惠方治傷寒發歇潮熱頭痛煩渴四肢無力胸膈痰滯不思飲食鱉甲一兩半去裙襴生用恆山三分銼甘草半兩炙微赤銼川大黃半兩銼碎微炒地骨皮一兩石膏二兩麥門冬二一兩去心知母半兩上搗篩為散每服三錢水一中盞入小麥五十粒煎至五分去滓不計時候溫服人參散出聖惠方治傷寒潮熱不退每發口乾渴逆飲食全少四肢無力人參一兩去蘆頭半夏半兩湯洗七遍去滑蘆根一兩半麥門冬半兩去心枳實半兩麩炒微黃黃耆三分銼赤芍藥白朮赤茯苓甘草炙微赤銼各半兩上搗篩為散每服五錢水一大盞入生薑半分棗三枚粳米五十粒煎至五分去滓不計時候麥門冬散出聖惠方治傷寒潮熱往來口乾煩躁頭目疼痛麥門冬二兩去心焙葛根一兩銼麻黃三分去根節黃芩川大黃銼碎微炒川朴硝各三分上細羅為散不計時候用新汲水調下一錢葛根散出聖惠方治傷寒潮熱口乾頭痛四肢煩疼葛根銼黃芩石膏柴胡去苗知母各一兩甘草半兩炙微赤銼上搗篩為散每服五錢水一大盞煎至五分去滓不計時候溫服柴胡散一名柴胡桂薑湯出聖惠方治傷寒經十日以上潮熱不解日晡即發壯熱如火胸滿嘔逆亦治勞瘧柴胡一兩去苗桂心半兩黃芩三分栝蔞根半兩牡蠣一兩燒為粉甘草一分炙微赤銼上搗篩為散每服五錢水一大盞入生薑半分煎至五分去滓不計時候溫服聖濟名六味柴胡湯外臺秘