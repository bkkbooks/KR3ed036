如聖加枳實湯出濟生拔粹方治傷寒噫氣者何氣使然答曰胸中氣不交故也少陰經至胸中交於厥陰水火之相搏而有聲故噫氣也甘草桔梗枳實炒各五錢上銼細每服五錢入五味子半錢水煎如聖加吳茱萸湯出濟生拔粹方治傷寒氣逆而甚無汗下證甘草桔梗吳茱萸炒各五錢上銼細每服五錢入五味子半錢同煎傷寒嘔吐附論夫傷寒嘔吐嘔者有聲者也俗謂之啘吐者吐出其物也故有乾嘔而無干吐是以於嘔則曰食谷欲嘔及吐則曰飲食入口即吐則嘔吐之有輕重可知矣傷寒嘔有責為熱者有責為寒者至於吐家則悉言虛冷也經曰太陰之為病腹滿而吐食不下自利益甚時腹自痛又曰胃中虛冷故吐也嘔家則不然嘔有熱者有寒者有停飲者有胃脘有膿者皆當明辨之嘔而發熱者柴胡湯證具與其嘔不止心下急鬱郁微煩大柴胡湯主之者是邪熱為嘔者也膈上有寒飲乾嘔者不可吐也當溫之與其乾嘔吐涎沫頭痛者吳茱萸湯主之是寒邪為嘔者也先嘔後渴者此為欲解先渴後嘔者為水停心下此屬飲家是停飲嘔者嘔家有癰膿不須治膿儘自愈是胃脘有膿而嘔者諸如此者雖有殊別大抵傷寒表邪欲傳裡氣上逆則為嘔也是以半表半裡證多雲嘔也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪是知邪氣傳裡者必致嘔也至於乾薑附子湯證云不嘔不渴為里無熱十棗湯證云乾嘔短氣汗出不惡寒者此表解里未和也即此觀之其嘔為裡熱明矣嘔家之為病氣逆者必散之痰飲者必下之嘔家多服生薑此為嘔家聖藥是要散其逆氣也又曰用半夏者以去其水水去嘔則止是要下其痰飲也嘔多雖有陽明證不可攻者謂其逆而未收斂為實也其嘔而脈弱小便複利身有微熱見厥者已為難治蓋謂其虛寒之甚醫者必審其邪氣之虛實病證之逆順為施藥治則當矣歌括曰脈浮有表並虛細嘔吐惡寒無失氣大便堅硬小便清或少或多或自利脈浮者為有表也不可下大抵脈浮而惡寒者為有表也表證未罷不可下脈虛細王叔和脈微不可吐虛細不可下嘔吐仲景云嘔多雖有陽明證切不可下惡寒者太陽陽明合病屬表可發汗若是少陰證宜溫之無失氣者謂不轉失氣也依潮大承氣湯大便堅而小便清者不在裡也桂枝湯大便堅而小便少恐津液還入胃而先硬後溏也每日三四行今日再行此津液還入胃不久當自大便也大便堅而小便多其脾為約又歌曰嘔吐陽明逆氣行數為胃熱緩寒生太陽合病利不利腎證三條各有名嘔吐陽明逆氣氣上逆則為嘔吐水穀不下是也傷寒嘔吐證表邪傳裡裡氣上逆則為嘔吐水穀不下是也傷寒嘔吐有胃熱有胃寒有水氣有膿血辨四者而已胃熱脈數或緊必有口苦舌乾煩渴之證有胃寒者脈弦而遲必有逆冷下食大小便自利之證水氣者先後嘔膈滿怔忪若胃脘膿血則腥氣燥氣奔逆上衝經所謂嘔家有癰膿不須治嘔膿儘自愈又謂服桂枝湯吐者其後必吐膿血是矣大抵嘔吐皆有所出也以下咽而出嘔也未下咽而出者吐也吐特甚於嘔耳若概以嘔無所出則其間所謂乾嘔者獨何耶嘔吐多屬陽明氣逆而上行戒不可下汗後水藥不入口者逆嘔而脈弱小便自利微熱而厥者虛極難調也生薑嘔家聖藥熱燥者烏梅代之活人書云無陽則厥無陰則嘔嘔者足陽明胃之經足陽明之氣下行今厥而上行故為氣逆則嘔仲景云嘔多雖不大便不可下可與小柴胡湯上焦得通津液得下胃氣因和浹然汗出而解大抵嘔證不一各有治法要之小柴胡湯尤相主當耳與小柴胡湯胸脅滿而嘔日晡發潮熱者柴胡湯加芒硝也若嘔不止心下急鬱郁微煩者與大柴胡湯也秘者加大黃大柴胡治嘔最妙為內有枳實故也枳實去噦壓虛氣須是去大黃仲景云嘔多雖有陽明證慎不可下官局桔梗湯最良亦用枳實耳方具第十七卷古人治嘔多用半夏生薑孫真人云生薑是嘔家聖藥仲景去嘔皆用之太陽與少陽合病必下利若不利但嘔者葛根加半夏生薑湯主之胸中有熱胃中有邪氣腹痛欲嘔者黃連湯主之太陽與少陽合病而自利若嘔者黃芩加半夏生薑湯主之金匱諸嘔吐谷不得下者小半夏湯小半夏加茯苓湯小半夏加橘皮湯皆可選用也嘔而發熱者小柴胡湯主之嘔而發渴者豬苓湯主之光嘔卻渴者此為欲解急與之先渴卻而嘔者為水停心下此屬飲家仲景云本渴飲水而嘔者柴胡不中與也宜治膈間有水赤茯苓湯主之若少陰而嘔者真武湯去附子加生薑也若汗若吐若下後虛煩不得眠若嘔者梔子生薑湯主之傷寒瘥後嘔者有餘熱在胃脘也竹葉湯加生薑主之又云吐有冷熱二證寸口脈數手心熱煩渴而吐以有熱在胃脘五苓散主之傷寒有表證渴欲飲水水入口即吐者名曰水逆由心經受熱而小腸不利故也宜服五苓散發汗後水藥不得入口為逆若更發汗必吐下不止小半夏加茯苓湯小半夏加橘皮湯主之曾輕汗下關脈遲胃中虛冷而吐乾薑黃連黃芩人參湯主之寒多不飲水而吐者理中湯去白朮加生薑主之少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此因胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當溫之宜四逆湯吐利手足逆冷煩躁甚者吳茱萸湯主之若傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之嘔吐而下利有兩仲景云傷寒發熱汗出不解心痞硬嘔吐而下利者大柴胡湯下之又有霍亂證霍亂嘔吐而利熱而渴者五苓散寒多不飲水者理中丸或有寒腹滿痛或四肢拘急下利腳轉筋理中湯加附子一枚生用並粗末作湯服之吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之少陰病吐利手足逆冷煩躁欲死吳茱萸湯主之吐利止而身體痛不休者當消息和解其外宜桂枝湯仲景大柴胡一證云傷寒發熱汗出不解心中痞嘔吐而下利者大柴胡湯主之即非霍亂也吐利已汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽湯若夏月中暑霍亂上吐下利心腹撮痛大渴煩燥四肢逆冷冷汗自出兩腳轉筋者宜服香薷散井中懸極冷頻服之乃效香薷散夏月預宜合下以備此證其他藥不能救仍須極冷並服之效矣方橘皮湯治陽明病嘔吐痰水青黃胸中煩者橘皮甘草炙葛根麥門冬去心各一兩半夏四兩切焙竹茹一兩小麥三合上以水七升先煮葛根減二升去上沫納諸藥生薑三兩煮取三升去滓再煮取二升溫服七合和胃丸治陽明病心下痛而嘔吐腹脅滿者以有停水也大黃酒浸甘遂桂枝乾薑白朮茯苓芍藥厚朴半夏洗以上各一兩巴豆十粒去皮心研如脂上搗篩入巴豆煉蜜和丸如梧子大白飲下兩丸大黃甘草湯出金匱方治食已即吐者大黃四兩甘草一兩上以水三升煮取一升分溫再服茯苓澤瀉湯出金匱方治胃反吐而渴欲飲水者茯苓半斤澤瀉四兩甘草二兩桂枝二兩白朮三兩生薑四兩上以水一斗煮取三升納澤瀉再煮取二升半溫服八合日三服文蛤湯出金匱方治吐後渴欲得水而貪飲者兼主微風脈堅頭痛文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十枚大棗十二枚上以水六升煮取二升溫服一升汗出愈豬苓散出金匱方治嘔吐而病在膈上後思水者解急與之思水者宜服豬苓茯苓白朮各等分上杵為散飲服方寸匕日三服藿香湯治傷寒後胃氣未和嘔吐不下食藿香竹茹陳橘皮湯浸去白焙麥門冬去心焙枇杷葉去毛薑汁炙各半兩人參三分上粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓溫服薤白飲治傷寒後脾胃虛冷嘔逆不下食薤白切五莖生薑切一兩附子炮裂去皮臍銼一兩分上以水一盞半煎至七分去滓再煎沸入雞子白一枚攪勻空心溫服薑朮半夏湯出保生回車論乾薑二兩炮白朮二兩半夏二兩湯浸七次片切焙乾上銼碎如麥豆粒為散每服四錢水一盞半生薑五片同煎至七分去滓溫服日進三服不拘時候
