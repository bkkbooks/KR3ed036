body:
  text: 卷一百九十七諸瘧門總論夫夏傷於暑秋必病瘧蓋傷之淺者近而暴傷之重者遠而疾痎瘧者久瘧也是知夏傷於暑溫熱閉藏而不能發泄於外邪氣內行至秋而發為瘧也經受之隨其動而取之有中三陽有中三陰者經中邪氣其證各殊同傷寒論之也五藏皆有瘧其治各異在太陽經謂之風瘧治多汗之在陽明經謂之熱瘧治多下之在少陽經謂之風熱瘧治多和之在陰經則不分三經總謂之濕瘧當從太陰經論之瘧病所謂因者病當先寒後熱寒則湯火不能溫熱則冰水不能寒以先傷寒後傷風故先寒而後熱名曰寒瘧病者先熱後寒躁煩自汗惡風以先傷風后傷寒風為陽寒為陰故先熱而後寒名曰溫瘧病者但熱不寒陰氣孤絕陽氣獨發心氣煩悗手足熱而欲嘔必渴以傷於暑熱名曰癉瘧病者寒熱身重骨節煩疼脹滿濈濈自汗善嘔因汗出復浴濕舍皮膚及冒雨濕名曰濕瘧病者寒多不熱但慘慼振慄病以時作此以陽虛陰盛多感陰濕陽不能制陰名曰牡瘧五種瘧疾以外感風寒暑濕與衛氣相併而成也瘧病內所因者病者寒熱顏色蒼蒼然善太息如死狀以蓄怒傷肝氣鬱所致名曰肝瘧病者心煩欲飲清水反寒多不甚熱乍來乍去以喜傷心氣耗散所致名曰心瘧病者寒多腹中熱痛或渴或不渴不熱不泄腸鳴汗出以思傷脾氣鬱涎結所致名曰脾瘧病者心寒甚發熱間喜驚而有所見以憂傷肺氣凝痰以致名曰肺瘧病者手足寒漉然腰脊痛發熱大便難目眴以失志傷腎所致名曰腎瘧五種瘧疾以臟氣不和鬱結涎飲而成也瘧不內外因者病者發寒熱一歲之間長幼強弱或染時行變成寒熱名曰疫瘧以歲運推之病者寒熱時作夢寐不祥多生恐怖名曰鬼瘧宜用禁避厭禳之法病者乍寒乍熱乍有乍無商方多病此名曰癉瘧當隨方土所宜治之病者寒善飢而不能食滿腹急痛病以日作名曰胃瘧六腑無瘧唯胃有者蓋飲食飢飽所傷胃氣而成世之謂食瘧或因諸瘧飲食不節變為此證也病者經年不瘥瘥復再發遠行久立不至微勞力皆不任蓋因表裡俱虛客邪未散真氣不復疾雖暫間少勞便發名曰勞瘧亦有數年不瘥百藥不斷結症癖脅名曰老瘧亦曰瘧母瘧備內外不內外三因外則感四氣內則動七情飲食飢飽勞逸皆能致瘧經中所謂夏傷暑秋必痎瘧者此則因時而序耳不可專隅以此論之則知溫病飧泄咳嗽不可拘也夫瘧之始發先起於毫毛伸欠乃作寒慄鼓頷腰背俱痛寒去則內外皆熱頭痛而渴欲飲身上發冷者以陰陽上下交爭虛實更作若陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷太陽虛則腰背頭項俱痛少陽虛則心體懈倦心惕惕然三陽俱虛則陰氣勝骨寒而痛並於陽則陽實而陰虛太陰虛則不嗜食而善嘔嘔已乃衰少陰虛則熱多寒少嘔甚其病難已厥陰虛則腰腹痛小便不利如癃三陰俱虛則陽氣勝熱勝悒悒不樂陰盛則內寒陽虛則外寒一生於內故中外皆寒陽盛則外熱陰虛則內熱一生於外故中外皆熱此皆因外感寒暑風濕內郁喜怒憂驚蘊積痰飲所至飲食飢飽勞逸之所為也病氣與衛氣並居故病作衛氣晝行陽夜行陰得陽而外出得陰而內薄所以日作其氣內則薄於五臟橫連於募原其道遠其氣深其行遲不能與衛氣俱出故間作以衛氣一日一夜大會於風府日下以節以此日作稍晏至二十五日至骶骨二十六日入脊內其氣上行故曰益早也瘧氣所以更盛更虛當氣之所在者在陽則熱躁在陰則寒靜極則陰陽俱衰衛氣相離則病休衛氣集則復病也於是有日作間日作早晏不同又邪氣中於頭項者氣至頭項則作中於背者氣至背則作中於腰脊者至腰脊則作各隨其所中而作但衛氣之所在與邪氣相合則病作也更有疫瘧鬼瘴等瘧亦以邪氣中外氣之所為也除癉瘧純熱寒瘧先寒牝瘧無熱外諸瘧皆先寒而後熱又經曰無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗為其病逆未可治也知此則病方來與正作與將過皆不可治以反傷正氣不可不知也夫肺病為瘧者乍來乍去令人必寒甚則發熱善驚如有所見此肺瘧證也若人本來語聲清雄忽爾不亮拖氣用力方得出言而反於常人呼共語真親不應雖曰未病勢當不久此則肺病聲之候也察病觀疾表裡相應依源審療乃不失也心病為瘧者令人心煩甚欲飲清水多寒少熱若人本來心性和雅而忽卒急反於常倫或言未訖便住以手剔腳爪此人必死禍雖未及呼曰行屍此心病聲之候也虛則補之實則瀉之不可療者明而察之肝病為瘧者令人色蒼蒼然氣息喘悶戰掉如死若人本來少於悲恚忽爾嗔怒出言反常乍寬乍急言未訖以手向眼如有所思若下節病禍必至矣此肝病聲之候也其人若虛則為寒風所傷若實則熱氣所損陽則瀉之陰則補之脾病為瘧者令人寒則腹中痛熱則腸中鳴鳴已則汗出若其人本來少於喜怒而忽反常嗔喜無多言自笑不答於人此是脾病聲之候也不盈旬日禍必至腎病為瘧者令人悽悽然腰脊痛而宛轉大便澀身掉不定手足寒熱若其人本來不喜不怒忽然謇而好喜怒反於常性此腎已傷雖未發覺聲其候也見人未言而前開口還開口不聲舉手爪柵腹此腎病聲之候也虛實表裡浮沉清濁宜以察逐而療之夫瘧脈者自弦弦數者多熱弦遲者多寒弦小緊者可下之弦遲者溫藥已若脈數而緊者可發汗針灸之脈浮大者不可針灸之凡瘧先發食頃乃可以療之過之則失時足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇虛嬌切暍暍然熱止汗出難已刺郄中出血足少陰之瘧令人聲體懈倦寒不甚熱不甚久惡見人見人心惕惕然若多汗出甚刺足少陰足陽明之瘧令人先寒洒洒淅淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明附上足太陰之瘧令人不樂好太息不睡多寒熱汗出病至則善嘔嘔已乃衰則取之則善足少陰之瘧令人悶吐嘔甚多寒熱多寒者欲閉戶而處其病難已足厥陰之瘧令人腰痛小腹滿小便不利如癃狀非癃也數小便意恐懼氣不足腸唈唈刺足厥陰肺瘧者刺手太陰陽明心瘧者刺手厥陰肝瘧者刺足厥陰見血脾瘧者刺足太陰腎瘧者刺足太陽少陰胃瘧者刺足陽明太陰橫脈見血足經太陽瘧羌活加生地黃湯小柴胡加桂湯陽明瘧桂枝及白虎二湯黃芩芍藥加桂枝湯少陽瘧小柴胡湯主之太陰瘧小建中湯異功散少陽瘧小柴胡加半夏湯厥陰瘧四物元胡苦楝附子湯肝瘧四逆湯通脈四逆湯胃瘧理中湯理中丸心瘧桂枝加黃芩湯腎瘧桂枝加當歸芍藥湯肝病面清脈弦皮急多青則痛形盛胸脅痛耳聾口苦舌乾往來寒熱而嘔以上是形盛當和之以小柴胡湯如形衰骨搖而不能安於地治之以羌活湯本草云羌活為君也瘧證取以少陽如久者發為痹瘧宜以鈚針刺絕骨穴復以小柴胡湯治之心病面赤脈洪身熱赤多則熱暴病壯熱惡寒麻黃加知母石膏黃芩湯主之此由不發汗久不愈為瘧也淹疾項腫面赤身熱脈洪緊而消瘦婦人則亡血男子則失精脾病面黃脈緩皮膚亦緩黃多則熱形盛依傷寒說是為濕溫其脈陽浮而弱陰小而急治太陰濕溫自汗白虎湯加蒼朮主之如久不愈為溫瘧重宜白虎加桂枝主之淹疾內消食少無力故曰熱消肌肉宜以養血涼藥內經曰血生肉肺病面白皮澀脈亦澀多白則寒暴病澀癢氣虛麻黃加桂枝令少汗則去也傷寒論云夏傷於暑汗不能出為癢若久不痊為風瘧形衰面白脈澀皮膚亦澀形羸氣弱形淹衛氣不足腎病面黑身涼脈沉而滑多黑則痹暴病形冷惡寒三焦傷也治之以姜附湯或四逆湯久不愈為瘧暴氣衝上吐食夜發俗呼為夜瘧太陽經桂枝湯證形衰淹疾羸瘦風痹痿厥不能行也夫瘧脈自弦弦數者多熱弦遲者多寒弦而小緊者宜下弦遲者宜溫浮大者宜吐治療之法當先發散寒邪不可驟用截補之藥若截則補住邪氣其證變異不能即愈致成癆瘵者有之發散之藥熱多宜小柴胡湯參蘇飲清脾湯之類寒多者宜養胃湯四獸飲發散不退然後以常山飲勝金丸截而不愈久則脾氣虛敗唯宜多進養脾驅痰之藥脾氣一盛自然平復此證既愈尤當節飲食謹勞傷妨其再作如煙瘴之地居人常患瘧疾者又當隨其方土所宜藥性施以治法客旅來居瘴地宜服平胃散草果飲先以防之凡富貴膏粱之家病瘧或間日或頻日發或熱多寒少宜大柴胡湯下過三五行次服白虎湯或玉露散桂芩甘露飲之類如不愈者是積太甚以神芎三花神祐丸調胃承氣湯等劑大作料下之後以長流煎五苓散服之或服小柴胡湯亦可或先以恆山散吐之後服涼膈白虎之類必愈矣大忌發熱之物雞豬魚兔五辛之物犯之則再發也凡田野貧寒之家病瘧為飲食粗糲衣服寒薄勞力動作不與膏粱法同臨發日可用溫脾散治之如不愈服辰砂丹治之必愈矣吃罷此藥以長流水煎白虎湯服之不宜食熱物夫先熱後寒可與解散風邪如川芎白芷青皮紫蘇之類或細辛檳榔佐之一證先熱後寒此為傷寒壞病與瘧大略則同熱多寒少小柴胡湯熱少寒多小柴胡湯內加官桂寒瘧自感寒而得無汗惡寒攣痛面慘轉而為瘧寒陰氣也故先寒後熱可與發散寒邪生料五積散增桂養胃湯或良薑乾薑官桂草果之類甚則姜附湯附子理中湯暑瘧者暑勝熱多得之一名癉瘧陰氣獨微陽氣獨發但熱不寒裡實不泄煩渴且嘔肌肉消鑠宜用小柴胡湯香薷散嘔者縮脾飲加生薑溫服下消暑圓躁甚者少與竹葉湯恆山柴胡於暑證最便濕瘧者冒襲雨濕出汗澡浴得之身體痛重肢節煩疼嘔逆脹滿合用五苓散除濕湯加蒼朮茯苓等寒多者朮附湯最良牝瘧者久受陰濕陰盛陽虛陽不能制陰所以寒多不熱氣虛而泄悽慘振振柴胡桂薑湯減半黃芩加半夏治之為當食瘧一名胃瘧飲食無節飢飽有傷致然也凡食啖生冷咸藏魚鹽肥膩中脘生痰皆為食瘧其狀若飢不能食食則中滿嘔逆腹痛青皮陳皮草果半夏縮砂白豆蔻作劑或四獸湯下紅圓子自有奇功瘴瘧夾嵐瘴溪源蒸毒之氣致然也自嶺以南地毒苦炎躁濕不常人多瘴瘧其狀血乘上焦病欲來時令人迷困甚則發燥狂亦有啞不能言者皆由敗血瘀心毒涎聚於脾坡仙指脾胃為實熱所致又有甚於傷暑之瘧耳治之須用涼膈疏通大腸小柴胡加大黃治瘴木香丸觀音丸皆為要藥如前數證經久不瘥真氣已耗邪氣猶存則有所謂勞瘧瘧母者焉表裡俱虛真元未復雖暫止小勞復作謂之勞瘧法當調養氣血川芎當歸官桂芍藥輩所不可無彌年閱歲經吐汗下榮衛虧損邪氣伏藏脅間結為症癖謂之瘧母此證未可直攻急作烏頭七棗湯以扶其里候其內氣已充繼此經效瘧丹消癖丸下之取愈大抵瘧之初得三數日間如火燎原不可響邇波濤洶湧未易回瀾當俟其稍定而圖之經所謂其盛者可待衰而已瘧方來與正發及將解不可投藥耗其真氣投藥當於未發以前兩時之先或遲發日凌晨空心與之諸瘧之脈大約尺寸俱弦或浮數或緊實或緩澀或虛遲或左手濡而右手盛或尺寸盛而關中濡總前治法弦數多熱者寒之弦遲多寒者溫之浮弦浮緊浮數其邪在表者可汗弦實沉實數實其邪在裡者可下若夫調胃氣利痰水分陰陽行三焦是又治法之綱領也渴又水漿藥入輒吐人參煎湯效亦猶有說焉嘗讀二廣攝生見其論議若瘴瘧若暑毒每用疏轉之劑取下根源果有先傷暑後發瘧涉年餘者度其腹中有癖水磨沉香下解毒雄黃圓黑血如泥泄下極臭由是獲愈因知諸瘧皆有根在治法之外又當隨輕重而利導之實者與巴豆大黃虛者用養正丹輩不然恆山於瘧每每作效何耶蓋瘧家多蓄黃水恆山為能破其癖而下其水也恆山治瘧罌粟殼治痢人皆薄之故也然其痢日久腹中無痛當澀腸則豈容下澀瘧以痰水作恙法當吐痰逐水豈容不為之吐下於斯時也不有罌殼恆山之劑其何以為對治乎但中間有藥補之耳凡瘧皆因停中腹蓄黃水惟水不行所以寒熱不歇此瘧家受病之處治暑瘧純熱以香薷散加青皮北大黃兩個烏梅同煎侵晨溫服寒瘧多寒以二陳湯加青皮良薑多用姜同煎侵晨吞神保圓五粒並欲取下毒水以去其病根寒熱自解發瘧嘔吐勿用恆山有中年人臟腑久虛大便常滑忽得瘧疾嘔吐異常惟專用人參為能止嘔其他瘧劑並不可施遂以茯苓二陳湯加人參縮砂白豆蔻進一二服病人自覺氣脈頗消於是寒熱不作蓋白豆蔻能消能磨流行三焦榮衛一轉寒熱自平繼今遇有嘔吐發瘧之證或其人素嘔而發瘧謹勿用恆山惟以生蘿蔔生薑各研自然汁半盞入蜜三四匙烏梅兩個同煎吞局方雄黃丸三四粒候其利下惡血痰水即以人參川芎茯苓半夏縮砂甘草調和之萬一嘔不止而熱不退卻用真料小柴胡湯多加生薑主治其或嘔吐大作而又發熱但先為治瘧熱嘔自定仍以小柴胡湯繼之瘧有水有血水即水飲也血即瘀血也惟水飲所以作寒熱惟瘀血所以增寒熱恆山逐水則固也苟無行血藥品佐於其間何收十全之效耶斷自今瘧家或衄血或唾血或大便血絲或瘧中經水適來適去皆是血證當以恆山草果檳榔烏梅甘草作劑於內加五靈脂桃仁為佐入生薑濃蜜同煎以主治之瘧證寒熱不歇不息有根凡瘧固當以風寒暑濕而治之或汗或下或吐或瀉活人方書之格法雖盧扁不能違矣然常見瘧之經久而不歇其故自必有根在也根者何曰根在於水水久積則為癖瘧母惟敗血為暑熱之毒惟飲與水皆生寒熱故暑之脈虛水故也痃癖之脈結聚挾水飲者為之逐水消飲結癖者必痛為之攻癖散血暑毒隨證而疏利之寒熱不除吾未信也常山治瘧須用佐瘧家多蓄痰涎黃水恆山為能吐之利之是故然耳其有純熱發瘧或蘊熱內實之證投以恆山大便點滴而下似泄不泄須用北大黃為佐大泄數行然後獲愈或曰巴豆丸子相依而行亦能泄也是又不然巴豆攻於下積苟用湯滌血熱不可以無大黃瘧方來與正發不可服藥在於未發兩時之先瘧病交爭轉為深害寒熱之瘧此傷寒一證而實非瘴瘧也其人肝脈浮盛頭痛怯風大抵小柴胡湯加青皮紫蘇之類嘔者多用生薑渴者加烏梅其或傷暑兼之小柴胡湯加香薷入生薑烏梅同煎可也抑猶有說焉寒熱之根必通利不能除也萬一其根未除又當以麻仁丸神保丸輩與之亦先解後攻之意也治瘧總要不過吐汗下當下而下不盡腹中尚有餘痛或大便一泄之後不復再泄但時時點滴而出者須再下之大黃以佐恆山可也當汗而不匝頭汗至胸而手足無汗者須使一身皆汗之青皮以佐紫蘇可也所謂吐者須出盡水飲若作吐劑常山豈容移哉究竟收效必矣瘧之為厲大抵連綿有病瘥以後或飲食失節或患怒傷中或梳洗感風又再發者何以處之曰熱多者二陳湯加青皮甘草熱少者二陳湯加青皮草果堅守胃氣而已二藥並用生薑烏梅蜜水同煎空心進劑其間斡運更用巴豆丸子疏利大便以泄毒氣其何厲之有或藥已服過多致腹痛可用生薑甘草煎湯溫和解之生薑解諸毒藥若退熱用涼藥不可十分盡或餘熱些少未去不足關心自然無事否則熱去則寒起古人戒之一方多用川芎茯苓甘草少用白朮粗末水煎病後和胃收斂啟陽屢試得效柴胡退熱不及黃芩若藥弗暝眩厥疾弗瘳世俗治熱例用柴胡最為穩當至於黃芩之輩則指為大寒不敢用也不思藥病不相當鮮克有濟繼今退熱而熱不去者須用黃芩凡壯熱煩躁用柴胡黃芩大黃解利之其熱乍輕而不退合用黃芩川芎甘草烏梅作劑用黃連生地黃赤茯苓同煎臨熟入燈心一捻主之其效亦速蓋川芎生地黃皆能調血血調其熱自退諸瘧附論夫人五臟瘧有寒熱痰鬼及山嵐瘴氣諸瘧原其受病皆因調攝失宜陰陽交爭寒熱競作雖名目淺深各異而主治小異大同今以一方俱療之故曰諸瘧也方虎頭骨丸治一切瘧疾虎頭骨三兩塗酥炙黃硃砂一兩細研常山半兩銼甘草半兩炙微赤銼牡蠣粉一兩桂心一兩知母一兩乳香半兩烏梅肉半兩微附子半兩炮裂去皮臍木香半兩枳殼半兩麩炒微黃去瓤桃仁三七枚湯浸去皮尖麩炒微黃色川大黃一兩銼碎微炒麝香半兩細研上為末入研藥令勻煉蜜和搗三二百杵丸如梧桐子大每服食前用桃符湯下十五丸天靈蓋丸治一切瘧發歇寒熱神思昏悶曉夜不得安靜天靈蓋一兩阿魏半兩硃砂一兩細研麝香白芥子半兩安息香三分砒霜一兩細研豉一合炒乾烏驢蹄一兩薰陸香三分綠豆一分巴豆七粒去皮心研猢猻骨一兩虎糞中骨一兩上為末入研藥令勻端午時煉蜜和丸如皂莢子大每發日男左女右手心握一丸如未止即以新汲水下一丸忌食熱物虎骨常山丸療瘧不瘥虎頭骨炙常山甘草炙鱉甲炙烏梅葳蕤白薇升麻茯苓石膏研知母麥門冬去心豆豉熬地骨白皮上各等分合搗蜜和丸如梧子大未發前日晚空肚服二十丸至日平旦服四十丸如人行十里食白粥一碗欲發時亦服三十丸三日內慎生冷萬不可犯不久自愈忌海藻菘菜大酢生蔥生蒜莧菜麻黃白朮散治傷寒溫暑濕滯留經絡與衛相併病以日作寒熱交煎麻黃去節湯泡白朮去蘆茯苓桂心各一兩陳皮青皮去瓤桔梗去蘆白芷甘草半夏紫蘇烏梅各三分去核乾薑半一兩上為銼散服四錢水三盞姜三片棗二枚煎七分去滓當發日空心一服臨發一服亦治時疫烏梅丸治一切瘧無問遠近烏梅肉炒甘草炙銼虎頭骨炙各二兩人參桂去粗皮常山肉蓯蓉酒浸切焙桃仁各三兩去皮