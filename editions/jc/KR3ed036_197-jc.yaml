黃帝問岐伯曰瘧多方少愈者何岐伯答曰瘧有十二種帝曰瘧鬼字何可得聞乎岐伯曰但得瘧鬼字便愈不得其字百方不愈曰願聞之曰寅時發者獄死鬼所為療之以瘧人著窯土灰木一周莫令火滅即瘥卯時發者鞭死鬼所為療之用五色衣燒灰三指撮諸酒中無酒用清水服之辰時發者墮木死鬼所為療之令瘧人上木高危處以棗子塞木奇間巳時發者燒死鬼所為療之令瘧人坐篩以圍匝燃火斬邪丹出宣明論治諸般瘧疾屢發不止者綠豆小豆三十粒硃砂信砒各一錢上為末同研細滴水和丸勻分作十丸每服一丸早晨服夜間於北斗下香水厭至早晨用新倒流水下露星散出朱氏集驗方治瘧真方天下無二陳皮六兩蒼朮四兩米泔水內入生薑汁浸一宿曬乾甘草三兩厚朴以陳壁土生薑二片酒一盞和水五盞厚朴四兩煮令乾為度曬乾草果三兩木香檳榔生用半夏湯炮七次縮砂仁青皮二兩去瓤銼碎以巴豆三四粒去皮膜針穿火子青皮內炒巴豆黑去皮豆上㕮咀每服五錢水二盞姜五片烏梅棗子各二枚入酒一呷同煎五沸和滓露一宿至天明取入再同滓煎至七八分去滓空心通口服滓再煎下於未發前再煎服如熱多寒少加柴胡去半夏如寒多熱少加官桂川薑去青皮如嘔吐加丁香附子去半夏木香草果飲子出朱氏集驗方療實瘧常山柴胡各一兩甘草檳榔各半兩白姜七錢烏梅隨意加減上㕮咀每服四錢半水酒生薑一塊烏梅一枚煎未發前服再發再服不過三服愈聖餅子出楊氏家藏方治一切瘧疾黃丹火煅過研細一錢寒水石研細一錢上件同研勻用未入油瓤餅子劑如櫻桃大二十塊搜藥令勻卻分作二十餅子用炭火煎煉麻油煮熟每服一餅臨臥細嚼冷茶清送下忌熱物一時辰如隔日發即於不發日臨臥服次日毒發一次即愈合時忌婦人貓犬見截瘧散出澹寮方常山雞骨樣者良茯神去皮木肉桂去粗皮等分甘草減半熱加多之上石捶不犯鐵器也為粗散每服半兩用常酒大半碗浸一宿於臨發時早晨空心去滓冷服服後未須吃熱湯滓再浸或略煎近發時再服一方不用肉桂茯神卻用檳榔烏梅要之在人增損也凡瘧須是發作三五次後截之為妙治瘧以馬鞭草莖葉煎一盞露一夕早服寒多加薑汁出永類鈐方紅散子須當發日早晨服出三因方黃連炒色變上入好建茶合和二錢以白酒調下或溫酒調不入茶杏仁膏出十便良方治積年酒瘧並主面上風瘡方硫黃細研蝸牛殼自死干苦小者為上淨去泥土杏仁去皮炒研如膏木香米粉各等分上件藥搗羅為末入杏仁米粉硫黃都研令勻以膽汁面脂調如稀膏每夜欲臥時以淡漿水淨洗面拭乾以藥塗所患處平明以溫水洗之濕癬以米泔洗藥三五上瘥瘧丹出廣南四時攝生論砒霜黃丹砒黃各一錢阿魏一皂子大赤小豆三十五粒豆豉七個綠豆五十粒皂面三錢七分上先洗豆軟後於乳缽內爛研便入諸藥更研二三十遍令勻旋滴水丸得為度每一料藥可以丸作五十丸以來臨欲發時豬肉湯下一粒瘧丹出廣南四時攝生論雄黃豆二百粒細小者是浸三五日候軟爁研如糊砒霜一錢細研如面上合丸如梧桐子大取重五日合最好不及即四時八節日皆可以硃砂為衣切須珍惜不可令師僧女人雞犬貓兒見合成又須淨潔處功德人收掌如有患者不計年月只消兩月其藥慎不可早服須候發侵晨取井花水面向東吞下一丸訖更候將欲發時前再用新汲水吞下一丸並不嚼破如女人患即令丈夫與安藥口內吞之常山飲出鮑氏方治諸瘧不問久近寒熱多少一服效常山真好者一兩半穿山甲一兩草果一分上散每服四錢怯弱人三錢當欲發五更酒水各一盞煎一酒盞許溫服訖正臥勿動乃不吐以常山好嘔故也是日即不發青蒿散出朱氏集驗方治諸瘧甘草秦艽柴胡草果子青皮常山檳榔青蒿子各等分桃柳枝各七寸上以常山秦艽柴胡草果子青皮甘草為末每服用水盞半入桃柳枝青蒿子加烏梅一枚煎八分放冷一服增料正氣散出朱氏集驗方治瘧疾經驗金不換正氣散每服加檳榔三個烏梅一個常山少許薑棗半酒半水同煎二盞去滓五更放冷服蒜餅丸出朱氏集驗方治瘧疾經驗用蒜元酒餅子如梧桐子大每服一丸五更熱酒下或十丸亦可愈度大概積瘧有驗三虎丸出朱氏集驗方治瘧疾北常山草果甘草上各等分用白酒餅一個小者兩個同為細末生蜜為丸彈子大隔先一日鹽湯下一丸臨發又一丸發狂又一丸立效知母散出朱氏集驗方治一切瘧疾不問先寒後熱先熱後寒多寒少寒多熱少熱久瘧者一服取效贛州羅監稅傳方大有功效知母真者貝母常山檳榔上等分為㕮咀酒水各一盞煎至一盞用綿蓋定露一宿五更乘冷望東服值到巳時食乾物若吃水便吐煎時不得婦人手川烏散出朱氏集驗方治虛瘧大川烏草果子乾薑良薑各等分上銼棗七枚姜七片煎服南康劉立之用之常服有驗檳榔散出朱氏集驗方治瘧疾不問寒熱無不愈之檳榔草果子烏梅各一個常山柴胡乾葛厚朴甘草上先銼草果子烏梅之外其餘五味只以檳榔為則作一服常山多些熱多幹葛加些加生薑一大塊擘破用大湯盞作酒一盞半於未發之間前一日煎取一盞半臨臥取一盞服之留滓半盞又添起水酒共一盞半浸藥滓到天明再取一盞服之只可作一服便愈好後卻忌口三日方佳如熱多則加水寒多則加酒直要慢火煎生則吐人常山飲出朱氏集驗方治瘧余嘗服之取效常山檳榔烏梅甘草北柴胡草果子各等分上㕮咀為末薑棗前一日煎下露一宿遇發日早晨溫服仙授散加麻黃蜀漆湯出朱氏集驗方治一切瘧疾蜀漆即常山子若用葉尤佳桂心甘草茯苓黃耆五兩烏梅生地黃一個知母芍藥各二兩上㕮咀每服三錢水煎不拘時服此方出活人書治婦人產後寒熱其狀似瘧湘中名醫黃槐卿用之治瘧屢有功效檳榔散出朱氏集驗方治瘧疾大檳榔三個常山一錢烏梅一個鱉甲一錢煨上銼散雞鳴時一碗水一碗酒煎至半碗候十分冷服飲食茶湯亦要冷吃五苓散出德生堂治陰陽不分發成瘧疾加味小柴胡湯出德生堂治表裡不分發為瘧疾午後服小柴胡五錢加官桂草果檳榔各一錢夏月加香薷一錢上㕮咀加本方修制每服水二盞生薑三片棗一枚同煎去滓溫服滓再煎不拘時候前瘧須進十餘服後於當發日隔夜煎下常山飲子露一宿五更向東方服之病人更於其日潛至別處離家權避則病不復作卻不可勞涉色欲損神防有復證先寒後熱寒多熱少脈弱而渴者柴胡桂薑湯主之用此而驅之不散姜附湯主之先熱後寒熱多寒少小柴胡湯主之用此而驅之不散竹葉石膏主之如用常山飲怯瘧神應丸如服前藥未效再用川常山半斤好醋五升早晨至晚焙乾上為末水糊丸梧桐子大每服二十丸空心五更茶清吞下五十丸早晨且休吃熱水吐人故也服五日即安大蒜平胃散出朱氏集驗方治一切瘧平胃散一貼大蒜一個擂爛用一大碗井水調蒜澄清以半調平胃散飲盡又以余蒜水再飲用厚被蓋臥汗出即愈友人鄧羸叟再赴監試感此遇道人授此方服之遂安恆山湯出指南方治瘧熱多宜發汗恆山知母甘草各二分麻黃一兩上為粗末每服五錢水二盞煎一盞去滓服助以糜粥發汗栝蔞湯出指南方治瘧柴胡八兩人參黃芩甘草栝蔞根各四兩上為末每服五錢水二盞姜五片棗一個煎一盞去滓服參附大正氣散治男子婦人虛弱及瘧安後體虛如眼昏暗加淨枸杞子菊花蕊各半兩常服順氣醒脾進美飲食附子一個炮去皮臍人參去蘆不用北參藿香葉縮砂仁檳榔白朮白茯苓木香不見火益智仁草果仁煨去殼丁香不見火各半兩陳皮去白粉草沉香不見火半兩香附子炒去毛肉桂不見火烏藥炒黃枳殼麵炒去瓤青皮去皮黃耆擘開鹽水浸一宿厚朴薑製各一兩上細末羅過每二錢水一盞姜三片棗一枚煎空心服三虎丹中藏經方治瘧辰砂硫黃上熱多加辰砂寒多加硫黃並研細棗肉為丸如龍眼大當發日新水七分一盞化下通神丸出衛生家寶方治五種瘧疾熱多寒少諸瘧不效者神桃二七個桃木上自幹不落者黑豆一兩巴豆七粒去殼並心膜研細上為末以冷水和丸梧桐子大以硃砂為衣侵晨面東念藥王菩薩七遍以井花水吞下立瘥辰砂丹出衛生寶鑑治瘧疾大有神效硃砂五錢半入藥半為衣人言雄黃各五錢上件為細末入白麵六錢研勻滴水和丸梧桐子大硃砂為衣每服一丸星宿全無根水送下忌濕面熱物五獸飲子出大衍方治脾寒如瘧寒熱無時草豆蔻七個和皮青銼用厚朴半兩去皮銼烏梅十個連核去仁銼甘草人參銼一錢大棗十個連核銼肥生薑一兩連銼橘皮七個陳者連核銼上細銼了拌勻分作三裹先以鹽水蘸濕紙裹藥煨香熱第一服用一裹水一碗煎一盞溫服第二服藥用二裹並前滓以水二碗煎一大碗溫服第三服用三裹並前滓以水三碗作兩服空心食前一方有草果子無草豆蔻草豆蔻散出衛生方治一切瘧草豆蔻當歸杏仁厚朴木香麻黃豬苓半夏良薑藿香甘草吳茱萸各一兩上為飲子分一半面裹炮之炮了每劑七錢煉姜三片同煎寒時熱吃熱時放冷吃鹽津丸出澹寮方治五瘧八痞獨頭蒜不拘多少每個開七竅入去皮紅子七粒濕紙裹煨研為膏非大蒜也橘紅丁香不火木香不火蓽茇胡椒上等分為細末用蒜膏為丸如梧桐子大先嚼鹽少許令生津液乾嚥二粒漸加至三五粒臨臥服栝蔞實丸出澹寮方治胸痞中痛徹背喘急妨悶栝蔞實枳殼去瓤麵炒半夏湯洗七次桔梗各一兩上細末薑汁打糊為丸如梧桐子大每服五十丸淡薑湯下治瘧病方出肘後方用五月五日蒜一片去皮刀割令容巴豆一粒去心皮納蒜中令合以竹挾以火炙之熱搗為三丸未發前服一丸不止復與一丸又方出肘後方臨發時搗大附子下篩以苦酒和之塗背上又方出肘後方常山搗下篩成末三兩真丹一兩上白蜜和搗百杵丸如梧桐子大先發服三丸中午服三丸臥服三丸無不斷者又方出肘後方先炙鱉甲搗末方寸至時令三服盡無不斷又方出肘後方常山三兩搗下篩雞子白和之丸空腹三十丸去發食頃三十丸發時三十丸或吐或否從服藥至發過時勿飲食一剪金出衛生寶鑑治瘧疾寒熱乃聖藥也人言硫黃各等分上同研末用緋紅絹子手捻一撮於絹上裹如豆大細絲綿系纏數遭系定用剪子剪下勿得不繫緊恐藥有失每服一丸星全新汲水送下空心無得人知治瘧出本草用蒜不拘多少研極細和黃丹少許以聚為度丸如雞頭米大候乾每服一丸新汲水下面東服至妙三味湯出大衍方治脾瘧厚朴三方寸草果三個甘草二寸上三味㕮咀以生薑二兩切作片子水一碗未發前作二服盡蜀漆散出本草治瘧用蜀漆龍骨雲母等分杵末患者至發前以漿水和半錢服之溫瘧加蜀漆半分臨發時服二錢治瘧出本草用百草霜黃丹等分細研每服二錢於發日空心米飲調服不過兩服愈金不換正氣散出傳信適用方常服進飲食調榮衛正氣逐冷避山嵐瘴氣治陰陽不和往來寒熱諸般瘧疾解利四時傷寒治五種隔氣噁心痰逆或吐或瀉傷食脾胃虛弱悉宜服之藿香去沙土支梗半夏湯浸洗七次甘草炒陳皮去白厚朴去粗皮薑製草果子煨去皮蒼朮米泔水浸一宿白茯苓白朮陳曲炒上並等分為粗末每服四錢水一盞半生薑五片棗一枚同煎至七分去滓放溫服不拘時候斬邪丹出如宜方治脾寒雄黃一錢人言半分黑豆綠豆各四十九粒硃砂二粒黃丹二錢上為細末滴水為丸分作三十丸每服一丸五更井花水送下忌熱物養胃湯出如宜方治飲食傷脾成瘧不問先寒後熱半夏制厚朴制蒼朮各一兩藿香草果茯苓人參各一兩陳皮七分半甘草一錢半上㕮咀姜七片烏梅一枚煎服又方出如宜方先發二時次炭火床下令脊腳極暖被覆過時乃止此治先寒後熱神聖丹出本草治瘧以砒霜半錢研黑豆麵一錢上件二味細研滴水丸小豆大雄黃為衣未發時空心面東新水下一丸治瘧病出肘後方以常山三兩搗末以雞白和丸如桐子大空心三丸溫水下治諸瘧出本草吐瘧去寒熱以常山小麥竹葉三味和煮服之治瘧疾出本草信砒二兩別研如粉寒水石三兩別搗為末上用生鐵銚子先鋪石末一半後堆砒末在上又以石末蓋頭然後取厚盞蓋之用面醋糊紙條子密封約十重以炭火一斤安銚子在上候紙條子黑取出置冷地上候冷取之滴水為丸如豆大用辰砂為衣候乾入瓷盒收每人服時於發日早臘茶清下一丸一日內不得熱物合時先掃灑淨室不得令婦人犬貓雞鼠等見收得亦然如若婦人患則男著在口中男子患亦然治瘧疾用桃東引枝上葉不拘多少每葉一片用豆豉七粒一處搗極勻丸如梧桐子大合藥須五月五日午時合忌雞犬婦人見每服七丸絕早面東冷水吞下治瘧冷病者取毛建草一握微碎縛臂上男左女右勿令近肉便成瘡子
