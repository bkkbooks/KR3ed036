溫服治腰腳疼痛攣急不得屈伸及腿膝冷麻杏仁二兩湯浸去皮尖雙仁焙炒微黃桃仁二兩湯浸去皮尖內仁焙炒微黃上用研為膏煉蜜和丸如梧桐子大每日空心以溫酒下三十丸晚食前再服浸腰腳拘攣方出十便良方皂莢半斤一尺長無蟲孔者搗碎生用川椒四兩去子生用上用水五斗煎取四斗去滓看冷暖於盆中坐添至臍換如湯少即添更依此方分兩處作每日浸之經三日止每浸後以衣覆出汗切避風冷煨腎散出御藥院方治腎經積水不散流於經絡腿膝攣急腫悶往來疼痛服之甘遂半兩生木香一兩上為細末每服二錢以㹠豬腰子一隻薄批開去筋膜摻藥在內淹勻用薄荷裹定外用濕紙五重以麻縷纏定更用水蘸過乾溼得所用文武火煨熟紙干為度臨臥細嚼用溫酒送下有黃水下是其效也治腰腳疼痛攣急不得屈伸及腿膝冷麻虎脊骨一具脛骨兩莖上用酥炙塗以慢火勻炙令黃熟都捶碎投於無灰酒三斗中密封浸一七日每日空腹及晚食前溫酒隨性多少飲之治腰腳疼痛筋急行履不得取黑豆不限多少著新手巾淨拭灑水如生糵法數令人看之若得芽出令長才半寸便住不得令豆皮落便曝乾炒令熟搗細羅為散每於食前以溫酒調下二錢治腰腳疼痛攣急不得屈伸及風壅氣盛宜服用牛蒡子二升轉搗篩去粗皮微炒盆中研以無灰酒五升攪和捩汁又取滓再研取前酒攪和又捩去滓又研如此經三遍以綿濾去滓將酒盛於瓷瓶中蠟紙封頭候七日隨性取暖服之破故紙丸出經效濟世方治腰疾拘攣不能行步及固本氣破故紙二兩酒浸茴香一兩薑汁浸上焙乾為末酒糊丸如桐子大空心食前酒下三四十粒牛膝丸出聖惠方治腰腳疼痛攣急不得屈伸及腿膝冷麻牛膝三兩續斷一兩半狗脊一兩半桂心一兩川椒一兩半附子一兩半乾薑一兩半上件藥搗羅為末和搗三二百杵丸如梧桐子大每服於食前以溫酒下三十丸萆薢丸出聖惠方治丈夫腰腳痹緩急行不穩上以萆薢二十四兩合杜仲八分搗篩每旦溫酒和服三錢匕增至五錢忌食牛肉治腰髂不隨兩腳攣腫方出千金方蜀椒四兩以水四斗煮取二斗半甕盛下著火暖之懸板為橋去湯二寸許以腳踏板柱腳坐以綿絮密塞勿令泄氣若疲即出入被以粉摩之一食久更入甕常令甕下火不絕勿使湯冷如此消息不過七日得伸展並腫亦消健步丸出試效方治膝中無力伸而不得屈屈而不得伸腰背腿腳沉重行步艱難羌活柴胡各半兩防風三錢川烏頭一錢炒滑石半兩炙甘草半兩防己一兩苦參一錢酒製肉桂半錢栝蔞根半兩酒製澤瀉三錢上為末酒糊丸如梧桐子大每服七十丸空心服羌活蒼朮湯出試效方治腳無力沉重羌活三分防風五錢柴胡七分半升麻獨活各一錢葛根炙甘草各半錢黃耆二錢蒼朮一錢橘皮六分砂仁一錢黃皮半錢知母二錢半生甘草半錢草豆蔻半錢上件分作二服每服水三盞煎至一盞去滓熱服張走馬家飛步丸出朱氏集驗方此係第一方筋骨藥能去筋脈骨節手足腰背諸般疼痛攣縮不伸之患趙寺簿渠甚秘之木鱉子取肉別研去油川烏生去皮臍草烏生去皮臍白膠香白芍藥各二兩乳香一兩別研上為細末用赤小豆末煮糊為丸如梧桐子大每服十五丸木瓜湯下病在上食後臨臥服病在下空心服忌熱物片時及熱湯羊腎散出衛生家寶方治久患腰膝疼痛攣拳行動不得吳茱萸生用食茱萸生用山茱萸生用各一兩川芎生用黑牽牛生用各半兩白牽牛一錢生用上為末每服三錢羊腎一個批開入藥在內濕紙裹煨熟細嚼溫酒下日二服早空心臨臥服兼治傷寒後汗出不止兩足不得屈伸菟絲子丸出衛生家寶方治腰膝疼痛菟絲子一兩白石英九錢乾薑八錢杜仲七錢白朮六錢人參五錢上同為末煉蜜為丸如梧桐子大每服三十丸空心溫酒下治腰腳風血積冷筋急拘攣疼痛出本草取茄子根五十個細切淨洗訖以水五斗煮取濃汁濾去滓更入小鐺器中煎至一斗以來即入生粟粉同煎入稀稠得所取出搜和更入研了麝香硃砂粉同丸如梧桐子大每服旦日秫米酒送下三丸近暮再服一月乃瘥男子女人通用皆驗治腳膝筋急疼用煮木瓜令爛研作漿如粥樣用裹痛處冷即易一宿三五度熱裹便瘥煮木瓜時用一半酒同煮之䐴腰痛附論夫䐴腰者謂猝然傷損於腰而致痛也此由虛損血搏於腰脊而為若久不已則令人氣息乏少面無顏色此損腎故也方乳香趁痛散出直指方治打墜腰痛虎脛骨酒炙黃敗龜酒炙各二兩騏驎竭赤芍藥當歸沒藥自然銅醋淬細研防風白附子炮辣桂去粗皮白芷蒼耳子微炒骨碎補炒去毛各三兩牛膝天麻各二兩上為末每服一錢溫酒調下加全蠍炒腳氣通用檳榔散出聖惠方䐴腰疼痛不止膀胱風墜氣盛血脈滯留於腰間故攻擊而痛檳榔五加皮羌活各一兩澤瀉半兩丹皮半兩桂心半兩赤芍藥半兩枳殼半兩麩炒微黃去瓤防風半兩去蘆頭赤茯苓半兩羚羊角屑半兩木香半兩川大黃一兩銼碎微炒上為散每服四錢水一中盞入生薑半分煎至六分去滓每於食前溫服治䐴腰疼痛連腹中冷氣滯亦腰脊痛出聖惠方羊腎一對上切作片去心中筋膜入胡椒末一錢濕紙裹煨令熟空心食之後吃一中盞溫酒下之一方羊腎為末酒服升朝散治腰間隱痛挫閃而不能動者方見治腎虛腰痛方治䐴腰中冷痛方出聖惠方附子一兩生用去皮臍杏仁一兩湯浸去皮漢椒一兩當歸一兩桂心一兩乳香一兩白芷一兩巴豆一分去皮蠟半斤上為末熔蠟調藥末攪令勻傾出作片裹腰痛處菴䕡丸出醫方大成治墜墮閃肭血氣凝滯腰痛者菴䕡子半兩沒藥二錢半別研乳香二錢半別研杜仲去粗皮銼令絲斷補骨脂炒半兩威靈仙洗去蘆半兩官桂不見火川當歸去蘆酒浸切焙各半兩上為細末酒糊丸如梧桐子大每服七十丸空心食前酒鹽湯任下大腹皮湯出聖惠方治䐴腰疼痛腹脅脹悶大腹皮三分銼桂心一分赤茯苓半兩赤芍藥半兩木香一分澤瀉三分枳殼半兩麩炒微黃去瓤上為粗散每服四錢水一中盞入生薑半分煎至六分去滓每於食前溫服治挫氣腰痛紅曲香附白芨等分乳香少許上為末用好酒食後調服桑寄生散出聖惠方治䐴腰疼痛及元臟虛冷桑寄生桂心鹿角屑微炒杜仲去皮麩炒微黃銼各一兩上為細末每於食前以溫酒調下二錢檳榔丸出聖惠方治䐴腰疼痛不能轉動檳榔二枚牽牛子二兩微炒陳橘皮一分湯浸去白瓤焙食茱萸半兩上為末以稀餳為丸梧桐子大每於食前以溫水下三十丸以利為度治䐴腰疼痛方出聖惠方菴䕡子一兩微炒甜瓜子仁半兩微炒杜仲一兩去粗皮炙微赤銼上為細散每於食前以溫酒調下二錢治䐴腰疼痛大便壅滯心腹閃痛方出聖惠方檳榔三分木香一分川大黃半兩銼碎微炒上為散每於食前用生薑汁童子小便調下三錢以快利為度茴香酒出聖惠方治打墜凝瘀腰疼通用破故紙炒香茴香炒辣桂等分上為末每服二錢熱酒調食前進故紙主腰痛主行血治䐴腰疼痛久治不瘥方出聖惠方蛇床三兩鹿角膠一兩搗碎炒令黃燥上為粗散每服三錢水一中盞煎至五分去滓入酒二合更煎三兩沸每於食前溫服治䐴腰疼痛不可止方出聖惠方桂心一兩附子半兩去皮臍生用上為細散以生薑汁調如稀糊塗紙上貼腰中立效治䐴腰腫痛展轉不得方出聖惠方附子一枚炮裂去皮臍羌活一分上為細散分為二服每於空腹以冷茶調服良久覺腰中暖為效治䐴腰中冷痛方出聖惠方硫黃一兩半細研針砂二兩上都研於銚子內煎熬過以冷水拌令得所用紙裹纏腰中冷痛處須臾腰中如火即瘥治䐴腰痛及䏶痛方出聖惠方棘針一升銼微炒鹿角屑三升微炒上以生絹袋盛用酒一斗於瓷瓶中浸七日後每於食前溫一中盞飲之熟大黃湯出危氏方治墜閃膃腰痛不能屈伸打傷惡血瘀痛不可忍大黃切如豆大生薑各半兩上同炒令焦黃以水一大盞浸一宿五更去滓頓服天明所下如雞肝者即惡物出病即止治銼氣腰痛出經驗良方猴香子去核四兩北茴香一兩微炒上為細末熱酒下不飲酒煎木香湯下治䐴腰腫痛展轉不得方用鹿茸四兩大火燒赤後入一升酒中淬如此五遍搗細羅為散每於食前以溫酒下二錢療䐴腰出本草有血痛不可忍者病源云䐴腰者謂猝然損傷於腰而致痛也此由損血搏於背脊所為久不已令人氣自乏少面無顏色損腎故也上以桂心搗末以苦酒和塗痛處此令人喜臥可勤用之再為必瘥一方用桂節以好酒和塗治反腰痛又方出肘後方上以生地黃搗絞取汁三升煎得二升納蜜二升和煎之三五沸日服一升亦可一日盡三升以瘥止甚效治䐴腰痛出肘後方上以生葛根嚼之咽其汁多多益佳治䐴腰疼痛不可忍方出聖惠方縮砂一兩去皮為末上入釃醋二合攪令勻熬令稠次入茶末酌量拌和得所丸如梧桐子大每於空腹以醋湯下三十丸晚食前再服治䐴腰連小腹膀胱痛方出聖惠方用巴豆半顆去皮豬腎一對去心中筋膜將巴豆入腎中以濕紙裹入於煻火中煨令熱去巴豆旋冷空腹服盡須臾呷熱茶湯投之利下惡物當日見效茗葉方出海上方治攻䐴壅䐴腰痛轉動不得用煎茶五合投醋二合頓服治氣銼腰痛以一手按腰一手打噴嚏數個氣行痛止又方用鹽炒茴香煎酒下七香丸猝腰痛附論夫猝腰痛者為勞傷之人腎氣虛損故也腎主腰腳其經貫於腎絡於脊若風邪乘虛猝入腎經故猝然而腰痛也猝腰痛者謂氣脈凝滯經絡壅澀或舉重傷腰故猝腰痛也宜通行氣脈調順經絡平補腎臟則病可愈方杜仲湯出聖濟總錄治動傷腰猝痛杜仲去粗皮酒浸銼炒桂去粗皮羌活去蘆頭桂去目並閉口者炒出汗秦艽去苗土石斛去根栝蔞根續斷五加皮銼炒牡丹皮芍藥當歸銼焙各半兩上粗搗篩每服三錢水一盞酒少許同煎至七分去滓溫服不拘時桂心散出聖惠方治猝腰痛行立不得桂心一兩牛膝一兩去苗杜仲一兩去粗皮炙微黃銼五加皮三分獨活三分防風三分去蘆頭赤芍藥三分五味子半兩附子三分炮裂去皮臍上為細末每服四錢水一中盞入生薑半分煎至六分去滓每於食前溫服桂心湯出聖濟總錄治卒腰痛轉動艱難桂去粗皮牛膝去苗酒浸一宿切焙芍藥當歸銼焙威靈仙去土杜仲去粗皮酒浸銼炒芎藭大黃銼炒各一兩上粗搗篩每服二錢水一盞煎至七分去滓溫服空心日午臨臥各一芎藭飲出聖濟總錄治腎虛勞役腰猝痛芎藭丹參當歸銼焙細辛去苗葉桂去粗皮牡丹皮銼桃仁去尖雙仁炒各一兩大黃銼炒半兩上粗搗篩每服三錢水一盞半煎至一盞去滓溫服空心日午臨臥各一服烏頭丸出聖濟總錄治腎虛寒冷傷腰氣血滯猝痛烏頭炮裂去皮臍羌活去蘆頭牛膝去苗酒浸一宿銼炒檳榔銼大黃銼炒木香各一兩蕓薹子酒浸一宿研如膏一兩上為細末入研者藥和勻酒煮麵糊丸如梧桐子大每服二十丸溫酒下空心日午臨臥各一服牡丹湯出聖濟總錄治腰猝痛牡丹皮桂去粗皮續斷牛膝去苗酒浸一宿焙萆薢銼各一兩上粗搗篩每服三錢水七分酒三分同煎七分去滓溫服不拘時候杜仲酒一名杜仲散出聖惠方療腰猝然痛病源云夫傷勞之人腎氣虛損而腎主腰腳其經貫腎絡脊裡虛風邪猝入腎經故猝然而腰痛也杜仲半斤丹參半斤芎藭五兩桂心四兩細辛二兩上切以酒一斗浸五宿隨多少飲之延年經心錄同無桂心忌生蔥生菜續斷散出聖濟總錄治氣滯腰猝痛續斷威靈仙去土銼炒桂去粗皮當歸銼焙各一兩上為散每服二錢溫酒調下不拘時治猝腰痛不可忍出聖惠方狗脊一兩漏蘆一兩附子一兩炮裂去皮臍桂心一兩上為細散每服於食前以溫酒下二錢又方出聖惠方附子一枚炮裂去皮臍木香半兩檳榔半兩上為散每於食前以溫酒調下二錢烙藥方治猝腰痛至甚起坐不得附子一兩生用吳茱萸一兩蛇床子一兩上為末每用半兩以生薑自然汁調如膏故帛上於痛處貼熁用衣服系定覺通熱即瘥未退再貼治猝腰痛連腳膝疼方出聖惠方胡麻三合新者附子一兩炮裂去皮臍上熬胡麻令香同搗細羅為散每於食前以溫酒調下二錢治猝腰痛熨法方芫花半斤羊躑躅花半斤上以醋拌令濕炒令熱用帛裹分作兩包更番熨痛處即復炒熨之治猝腰痛輾轉不得用鹿角一枚長五寸酒二升燒鹿角令赤納酒中浸一宿飲之一方搗末酒服鹿茸尤佳大豆紫湯療猝腰痛拘急不得喘息若醉飽得之欲死者並作脅痛如打上用大豆一升熬令焦以好酒二升煮令熟隨多少飲勿至醉神效方治猝腰痛蕓薹一兩上為末醋調塗於蠟紙上貼痛處覺劇即去之痛止
