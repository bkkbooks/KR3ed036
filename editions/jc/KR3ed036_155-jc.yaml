body:
  text: 卷一百五十五身體門五種腰痛附論夫腎主於腰腳若腎虛損而為氣冷乘之故腰痛也又邪客於足太陽之絡令人腰痛痛引小腹不可以仰息診其尺脈沉者主腰背痛寸口脈弱腰背痛尺寸俱浮直上下此為督脈腰痛凡腰痛有五一曰少陰腎也十月萬物陽氣皆衰是以腰痛二曰風痹風寒著腰是以痛三曰腎虛役用傷腎是以痛四月䐴腰痛或墮傷腰是以痛五曰寢臥濕地是以痛故曰五種腰痛也方杜仲丸出聖惠方治五種腰痛腎經虛損致風冷乘之故多痛也杜仲一兩去粗皮炙微黃銼乾薑炮製銼半兩萆薢一兩銼羌活三分天雄三分炮裂去皮臍川椒三分去目及閉口者微炒去汗桂心三分芎藭半兩防風去蘆半兩秦艽去苗半兩細辛三分川烏頭三分炮裂去皮臍五加皮三分石斛三分去根銼續斷二兩當歸三分銼微炒五味子三合檳榔三分上為末煉蜜和搗五七百杵丸如梧桐子大每於空心以溫酒下三十丸晚食前再服桑寄生散出聖惠方治五種腰痛及腳弱不能行履桑寄生一兩附子一兩半炮裂去皮臍獨活二兩當歸三分銼微炒狗脊三分桂心一兩羌活半兩杜仲一兩去粗皮炙黃銼赤芍藥三分芎藭三分甘草半兩炙微黃銼石斛三分去根銼牛膝三分去苗海桐皮一兩銼上為粗散每服四錢水一盞煎至六分去滓每於食前溫服附子散出聖惠方治五種腰痛腎臟虛冷行立艱難附子一兩炮裂去皮臍杜仲三分去粗皮炙微黃銼五味子三分磁石三兩搗碎水去赤汁牡丹皮三分萆薢一兩銼桂心三分續斷三分牛膝三分去苗熟地黃一兩羌活三分當歸三分銼微炒木香三分枳殼三分麩炒微黃去瓤上為粗散每服用羊腎一對去脂膜先以水一大盞半煮腎令熟去腎入藥末五錢生薑半分棗三枚椒三七粒煎至五分去滓空心溫服晚食前治五般腰痛巴豆五個每個須用濕紙裹好煨熟令去殼取肉半出油半微去油五靈脂半兩火上累炮黑牽牛瓦上炒三錢白牽牛瓦上炒三錢狗脊半兩微炒去毛萆薢三錢炒沒藥三錢胡桃三個取肉研為膏上為末將前胡桃膏入醋糊為丸如梧桐子大每服五十丸風腰疼豆淋無灰酒下氣腰疼煨蔥白酒下敗精腰疼茴香酒下失血腰疼當歸酒下打撲腰疼蘇木酒下鹿角丸治五種腰痛腎臟虛冷容顏萎黃形體消瘦腰痛不可忍虛憊無力鹿角屑一斤熬令微黃菟絲子一斤酒浸一宵另搗為末遠志二兩去心肉蓯蓉五兩酒浸一宿刮去皺皮焙乾天雄二兩炮裂去皮臍熟乾地黃六兩五味子五兩桂仲二兩去粗皮炙微黃銼上為末煉蜜和搗二三百杵丸如梧桐子大每服三十丸以溫酒下空腹晚食前再服萆薢浸酒治五種腰痛連腳膝筋脈拘急痠疼萆薢三兩附子二兩炮裂去皮臍杜仲二兩去粗皮炙微黃狗脊二兩羌活二兩桂心二兩牛膝三兩去苗桑寄生一兩上細銼用生絹袋盛以酒二斗浸封七日後開每於食前用一中盞服立安丸治五種腰痛常補腎強腰脊亦治腳氣破故紙續斷木瓜牛膝酒浸杜仲炒各一兩萆薢二兩上為末如梧桐子大每服五十丸鹽湯酒任下食前服鍾乳丸治五種腰痛腎臟衰冷行立無力鍾乳粉二兩吳茱萸半兩湯浸七次焙乾炒石斛一兩去根銼菟絲子一兩酒浸一宿別搗為末附子一兩炮裂去皮臍肉桂一兩半去皺皮上為末煉蜜和搗三二百杵丸如桐子大每服空心以溫酒下三十丸食前再服服訖行二三百步鍾乳散治五種腰痛風冷氣攻腎臟致腰痛轉動不得鍾乳粉一兩防風半兩去蘆頭丹參半兩細辛半兩桂心半兩乾薑一分炮裂銼上為細散每於食前以溫酒下二錢治五種腰痛轉動艱難桑寄生丹皮桂心鹿茸去毛塗酥炙微黃續斷芎藭各一兩上為細散每於食前以溫酒調下二錢摩腰丸治五種腰痛腎臟久冷丁香末麝香半兩細碎蕓薹子末一兩硫黃半兩細研龍腦二錢細研膃肭臍末二兩上熬野駝脂和丸如雞頭實大每用兩丸熱炙手於腰間摩令熱徹為度偏壯益腎氣若摩兩腳覺漸輕健澤瀉湯治五種腰痛澤瀉半兩桂去粗皮三分白朮白茯苓去黑皮甘草炙銼各一兩牛膝酒浸切焙乾薑炮各半兩杜仲去粗皮銼炒三分上為粗散每服三錢水一盞煎至七分去滓空心日午夜臥溫服之效一名腎著散用酒煎服狗脊丸治五種積冷腰痛腳膝酸痿一名金剛骨丸狗脊去毛銼萆薢銼焙菟絲子酒浸三宿焙乾上各等分為細末煉蜜和丸梧桐子大別用新萆薢三五兩酒浸三日空心旋暖萆薢酒下三十丸服服半月後行及奔馬久立不倦一方酒煮麵糊為丸摩腰散治五種腰痛腎氣衰冷陽憊腰痛野狐頭及尾骨各一兩炙令焦黃硫黃半兩細研硇砂半兩細研黃狗陰莖一具炙微黃針砂一兩上為末取莨菪子半升酒二升浸一宿後漉去莨菪子取酒和前藥末令勻入於瓷瓶中以油單密封又坐於大瓶中以蠶砂埋卻坐於飯上蒸之以飯熟為度取出曝乾搗細羅為散以黃狗膽及脂入少許麝香同摩腰須臾即效神應丸出和劑方治腎臟不足風冷乘之腰痛如折引背膂俯仰不利轉側亦難或因役用過多勞傷於腎或因寢冷濕地氣傷腰或因墜墮傷損或因風寒客搏皆令腰痛並皆治之威靈仙去土二十兩當歸肉桂去粗皮各十兩上為末以酒煮麵糊為丸如梧桐子大每服十五丸溫蔥酒或煎茴香湯下食前服婦人煎桂心湯下加至二十丸有孕婦人不得服忌茶一方治五種腰痛不可轉動三味為末每於食前以溫酒調下二錢一方加破故紙桃仁地膚子等分鹿茸丸出十便良方治五種腰痛輕身利腳膝鹿茸二兩去毛塗酥炙微黃附子三兩炮裂去皮臍上為末煮棗肉和丸如梧桐子大每日空心以溫酒下三十丸晚食前再服治五種腰痛下焦風冷腰腳無力出聖惠方牛膝一兩去苗山茱萸一兩桂心三分上為細末每於食前以溫酒調下二錢桂附丸出朱氏集驗方治五種腰痛破故紙二兩炒附子炮肉桂各一兩上酒糊為丸每服五十丸空心酒下又方出聖惠方杜仲半斤去粗皮炙微黃銼五味子四兩天雄二兩炮裂去皮上為散每服半兩以水二大盞隔宿浸藥至五更入生薑半兩煎至一大盞去滓入羊腎二枚切去脂膜納湯中煎令熟空腹和腎吃之補骨脂散出楊氏家藏方治寒濕氣滯五種腰痛腳腫黑牽牛頭末半兩破故紙一兩炒上為末煎陳皮湯調二錢以利為度又法用豬腰子去皮膜切作兩葉入藥在內濕紙裹煨熟嚼胡桃酒下治腰痛如折加少許麝香酒調下服之治五種腰痛草烏頭一兩鮮硫黃一錢上為細末醋糊為丸如梧桐子大蒲黃為衣每服七丸醋茶湯下治五種腰痛不止方吳茱萸一兩蕓薹子一兩上為細末每用三錢生薑一兩同研令勻攤在極薄紙上貼於痛處鹿角霜方出聖惠方治五種腰痛夜多小便膀胱宿冷取鹿角嫩實處五斤先用水煮三五十沸後刷洗令淨即以大麻仁研取濃汁煮角約一伏時便軟後又須刷洗鍋器令淨更用真牛乳五斤煉專看如玉色即住細研如面每日空心服以溫酒調下二錢晚食前再服腎瀝湯出聖濟總錄治五種腰痛腎臟虛冷腳弱不能行步桑根白皮銼二兩黃耆銼五味子去梗肉蓯蓉酒浸切焙防風去叉秦艽去苗澤瀉巴戟天去心桂去粗皮山芋去皮丹參茯神去木牛膝酒浸切焙各三兩石斛去根磁石煅醋淬二十次各一兩杜仲去粗皮銼炒人參各三分上為粗末每服先用水二盞煮羊腎一雙至一盞去腎入藥末三錢匕生薑三片煎至七分去滓空心日午夜臥服人參湯出聖濟總錄治五種腰痛人參三分杜仲去粗皮銼炒桂去粗皮各一兩芍藥三分白朮熟乾地黃焙木通銼玄參當歸灼焙各三分牡丹皮半兩芎藭桑寄生各一兩防風去叉獨活去蘆頭各半兩上為散每服三錢水一盞煎至七分去滓溫酒空心日午夜臥服一方有生薑名玄參湯療腰痛以水一斗二升煮取三升日三服忌生蔥桃李寄生湯出聖濟總錄治五種腰痛不能轉動桑寄生附子炮裂去皮臍獨活去蘆頭狗脊去毛桂去粗皮各一兩杜仲去粗皮銼炒一兩一分芎藭一分甘草炙銼人參各半兩芍藥白朮石斛去根牛膝酒浸切焙各三分上銼如麻豆每服三錢水一盞煎至七分去滓空心午夜臥溫服腎主腰痛附論夫腎主腰腳腎經虛則受風冷內有積水風水相搏浸漬於腎腎氣內著不能宣通故令腰腹冷重如帶五千錢狀如坐水中形如水狀不渴小便自利飲食如故久久變為水病腎濕故也方治腎著腰痛及風冷相攻方出聖惠方桂心一兩白朮一兩甘草一兩炙微赤銼澤瀉一兩牛膝一兩去苗乾薑三兩炮裂銼杜仲一兩半去粗皮炙微黃銼茯苓四兩上為散每於食前以溫酒調下二錢一方無茯苓一方為粗散每服方寸匕酒一升煮五六沸去滓溫服日三服又方出聖惠方萆薢三分銼丹皮半兩澤瀉三分桂心三分附子三分炮去皮臍木香半兩上為細散每於食前以溫酒調下二錢牛膝散出聖惠方治腎著腰痛及膀胱有積滯冷氣膿水不下令腰痛膝不利牛膝三分去苗丹皮半兩澤瀉半兩桂心半兩檳榔一兩上為散每服四錢以水一中盞煎至五分次入酒三合更煎三二沸去滓每於食前溫服治腎著腰痛及膀胱氣壅不得宣通致腿膝沉重出聖惠方甘遂三分煨令微黃木香三分青橘皮半兩湯浸去白瓤焙桂心一分上為細散每服用獖豬腎一隻切作兩片去脂膜納散一錢入腎中用三五重濕紙裹於灰中煨令熟五更初食之後吃暖酒一中盞相次吃稀粥無妨得通利三兩行為效如未快利隔日再服磁石散出聖惠方通利宜服磁石一兩搗淬水淘去赤汁沉香半兩山茱萸半兩黃耆半兩銼桂心半兩五味子半兩肉蓯蓉半兩酒浸一宿刮去皺皮炙乾附子半兩炮裂去皮臍萆薢半兩銼白茯苓半兩牛膝半兩去苗人參半兩去蘆頭上為粗散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓每於食前溫服甘草湯一名腎著湯出危氏方腎著之為病其人身墜重從腰以下冷如水中行狀如水不渴小便自利飲食如故是其證也從作勞汗出表裡冷濕久之故得也腰以下冷痛腹重如帶五千錢者甘草二兩炙乾薑三分炮白朮四兩茯苓四兩上以水五升煮取三升服一升日三腰中即溫忌海藻菘菜桃李雀肉酢物經心錄方甘草一兩乾薑二兩余同聖惠方有當歸二兩此由腎虛桂心散治腎著腰痛連腿膝不利方見澤瀉湯治腎疰腰痛膀胱氣痛出本草用橘核微炒去殼為末酒調服愈內有積水傷為風冷所乘久而不已令人水病謂之腎著宜服風濕腰痛附論夫腎氣虛弱風寒濕氣著於腰間則令腰痛蓋腰為腎府腎經留滯風濕不得發散著於腰腳故起坐行立皆痛甚則浮腫風濕腰痛也方天雄丸出聖惠方治腎氣衰虛腰痛或當風濕冷所中腿膝冷痹緩弱天雄一兩炮裂去皮臍獨活三分杜仲一兩半去粗皮炙微黃銼附子一兩炮裂去皮臍牛膝一兩半去苗乾漆三分搗碎炒令煙出桂心一兩沒藥三分巴戟一兩鹿茸一兩去毛塗酥炙微黃蟬殼一兩酒浸焙乾虎脛骨三分酒浸炙微黃萆薢一兩銼乳香三分蛜𧌴三分微炒天麻一兩白花蛇二兩酒浸去皮骨炙微黃狗脊三分川烏三分炮裂去皮臍當歸三分銼微炒芎藭三分地龍一兩微炒硃砂三分細研水飛過敗龜一兩塗酥炙令黃麝香半兩去皮上為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服於食前以溫酒下三十丸黑豆浸酒方出聖惠方治風濕腰痛牽引流入腿脛元氣衰虛黑豆五合炒令熟熟乾地黃三兩杜仲二兩去粗皮炙微黃枸杞子羌活各一兩牛膝三兩去苗仙靈脾三分當歸一兩石斛二兩去根側子二兩炮裂去皮臍茵芋二兩白茯苓二兩防風三兩去蘆頭川椒一兩去目及閉口者微炒出汗桂心一