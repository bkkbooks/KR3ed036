body:
  text: 卷三百四十三妊娠諸疾門滑胎附論夫婦人難產者皆因燥澀緊斂故產戶不得開通宜先於降誕之月自入月之日用長流水調益元散日三服產必易產後亦無一切虛熱氣血不和之疾如未入月則不宜服之以滑石滑胎故也方滑胎丸出聖惠方妊娠令易產益氣赤茯苓赤芍藥各一兩檳榔二兩芎藭半兩訶黎勒皮三錢枳殼半兩麩炒微黃去瓤川大黃一兩銼微炒麥門冬一兩半去心焙厚朴去皮姜炒一兩上搗羅為末煉蜜和搗三五百杵丸如桐子大食前溫酒二十丸下甘草散出聖惠方凡難月前服之入月兒生墮地不覺甘草二兩炙黃芩三兩酒浸大麻仁三錢吳茱萸三錢湯浸七次炒乾薑炮二錢大豆黃卷一兩種濕地令牙出曬乾取牙用肉桂三錢去皮上搗細為散每日空心以米飲調一錢下難月前預服此藥令易產方出聖惠方冬葵子一合滑石一兩半瞿麥炒丹參各一兩半牛酥白蜜各一合上搗篩以水一大盞煎取半大盞去滓內酥蜜和調空心以米飲下一匙食前再服榆白皮散出三因方治臨產預服滑胎榆白皮槐皮瞿麥木通大麻仁各等分上銼散每服五大錢水二盞煎七分去滓日二服滑胎催生神效方益元散一兩蛇蛻一條燒灰須要牆頭及籬上蟬蛻五個全男子亂髮入油一兩內熬化穿山甲一個燒存性上為末齏水一碗入藥一處煎一沸與發攪勻冷服酥膏令易產入月便服兒不覺出或有難產經數日或生不以理百方千計終不平安者服此膏總有神效初服只以半匙漸加至一匙若太多恐嘔逆以意節量服之佳出聖惠方真牛酥一升秋葵子一斤白蜜半斤滑石搗末一兩瞿麥一兩炒大豆黃卷五錢上搗粗散先以清酒一斤細研葵子內酥蜜中微火消即下諸藥緩火煎常令如魚眼沸約煎去半即成膏以綿濾貯於瓷器中每於食前如上所說服之丹參膏滑胎催生散出聖惠方葵子滑石各一兩蒲黃木通銼各半兩上搗細散食前以溫酒調下一錢滑胎令易產方出聖惠方白蜜一合豬脂二合酒半斤上同於銀器中慢火熬令稍稠每服於空心以酒下一大匙服之榆白皮散出余居士選奇方治妊娠滑胎易生榆白皮甘草各二兩葵子一兩上為粗末每服三錢水一盞煎七分去滓溫服一方無榆白皮名葵子散車前子散出聖惠方滑胎令易產阿膠八兩滑石三兩車前子一升上治下篩飲服方寸匕日再至生月乃服藥利九竅不可先服一方用蜜湯調服神寢丸治胎滑利易產臨入月服之極有神效知蘄州施少卿方徐大丞傳通明乳香半兩另研枳殼一兩上為細末煉蜜丸如梧子大空心溫酒吞下三十丸日一服懷孕九個月以後方可服一方名寤生丸用乳香一錢酒糊為丸一方加當歸木香各等分治婦人胎氣不足能令胎滑易產常服養胎益氣安和子臟枳殼散一名六乙散瘦胎易產抑陽降氣兼治胎中一切惡疾湖陽公主服效枳殼小厚突者麩炒去瓤二兩又方用糯米浸控乾炒赤色尤佳上為細末每服二錢沸湯調空心日三服之至七月方可服忌登高廁若大便秘澀加防風體弱加大當歸去尾木香各等分如胎肥壅溢動止艱難臨產難生加乳香發灰效枳殼能逐水消脹滿逆氣若臨月多服則當產之時無脹滿逆氣產道順而易生誠有補於世也又治腸中諸疾下氣寬膈加炒去毛香附子一兩為末薑湯調下冷氣攻刺脅肋疼痛蔥白湯調下脾寒血氣成塊作痛熱酒調下大小便不通白牽牛為末加入熱湯調服一方枳殼六兩甘草一兩故加枳殼減甘草蓋未產人甘草性寒故也未產前一月日服三忌登高廁一方冷氣能飲者細嚼蔥白熱酒調下服胸膈氣閉飲食不進蔥白湯調服腎氣腫痛煨蔥白二寸茴香一撮同嚼熱酒嚥下若久久服之永不發動腰背氣痛蔥白湯調服服訖即臥少時旋能作效腳氣發動空心熱酒或木瓜煎湯調下產後血氣不和熱酒調服心腹疼痛口吐清水飲食不進胸膈膨脹鹽湯調服冷物傷脾發痛無時胡椒煎湯調下婦人血暈兩太陽疼痛頭旋欲倒者艾葉煎湯服小兒面黃胃冷吐食木瓜煎湯調服婦人經血不行手足發熱或身潮熱先用蔥白湯次用菖蒲湯調服若經血不行脾胃稍壯者當用大聖散服之數月特有神效若經血不調血臟冷痛者當用大聖散間以小溫經湯仍以紅丸子佐之又方用糯米半升淘洗控干炒為末以米飲勻湯調下一二錢服之又方治產前滑胎用臘月兔頭髓一個攤於紙上令勻候乾剪作符子於面上書生字一個覺母陣痛時用母釵子股上夾定燈焰上燒灰盞盛煎丁香調下滑胎令易產出聖惠方用大麻根二兩銼以水二中盞煎至一盞去滓服易產滑胎方一名芣苢散出永類鈐方用車前子為末酒服方寸匕不能飲者水調下詩云采采芣苜注謂芣苡能令婦人樂有子矣治產前滑胎用牽牛子一兩赤土少許研細每覺陣痛時煎榆白皮湯調下一錢枳殼散治滑胎調氣利胸膈消積滯和脾胃進飲食常服亦得枳殼二兩桑白皮一兩銼以水三碗與枳殼同煎煮乾取出去瓤淨洗細切焙乾只用桑白皮人參半兩糯米二兩炒黃色木香一錢不見火甘草一兩炙麥糵半兩炒黃上為細末每服二錢入鹽少許沸湯點服日可五服不拘時候治滑胎易產出產胎救急方枳殼五兩阿膠炒甘草一兩上為末湯調服又方束胎丸出保命集白朮枳殼去瓤炒等分上為末燒飯為丸如梧子大入月一日食前服三五十丸溫熱水下胎瘦易生也服至產則已治婦人臨產渾身痛漿破血下未得分解催產方須是漿破血下然後可吃若孕婦漿未破血未下須是渾身痛甚腰痛忽輕及數日身體困重亦可進服凡渾身痛須是腰痛方是欲產也若未是正產誤吃此藥即損母性命須是正產不下方可吃也官桂不見火者二兩去皮牡丹皮去心當歸牛膝木通滑石冬葵子上為細末每服六錢水一盞半蔥五枚煎取一盞三分空心和滓吃如人行一里再吃以兒生為度治日月未足而欲產者出本草取槐樹東枝令孕婦手把即易產又方出本草搗菖蒲根汁一二升灌喉中主易產出本草以弓弩弦燒灰為末用酒服二錢正即易生一方縛心下立產又方出本草以麝香一錢研水調之服立產鬼胎附論夫鬼胎者何人之臟腑調和則血氣充實風邪鬼魅不能幹之若營衛虛損則精神衰弱妖魅鬼精得入於臟狀如懷娠故曰鬼胎也方牡丹散出聖惠方治婦人鬼胎腹內㽲痛日夜不止牡丹乾薑炮銼桂心紫葛銼赤芍藥當歸銼炒赤箭各半兩延胡索虻蟲炒黃水蛭炒黃買子木枳殼去瓤炒白殭蠶炒地龍炒各一錢上搗篩為散每服四錢以水一中盞煎至六分去滓每於食前溫服穿山甲散出聖惠方治婦人經脈不通一月至三個月腹內有氣塊發從脅下起衝心是鬼胎穿山甲三錢炙牡丹肉桂去皮各半兩鬼臼去毛驢護杆蒲黃各一兩當歸三錢酒炒蓮子一兩川大黃半兩炒桃膠三錢檳榔一錢上搗篩為散每服三錢以水酒各半盞煎至六分去滓食前溫服雄黃丸出聖惠方治妊娠是鬼胎致腹中黑血散下腹痛雄黃細研鬼臼去毛甘草丹砂細研巴豆去心並皮油獺肝炙半兩白楊炙一兩蜈蚣一條炙黃上為細末蜜丸如桐子大空心溫酒下二十丸日二服後當利如不利加至三十丸初下清水次下蟲如馬尾狀無數病極者下蛇蠱或如假卵雞子或如白膏或如豆汁其病即除治鬼胎如抱一甕出危氏方茱萸川烏秦艽柴胡巴戟生用白殭蠶直者洗巴豆去殼不去油芫花酒煮各一兩上為末蜜丸如桐子大每服七丸蜜吞下取出惡物即愈治婦人鬼胎及血氣不可忍出聖惠方斑蝥去頭足翅延胡索炒各三枚上為細末再研如面以溫酒調下半錢以胎下為度治婦人虛羸有鬼胎症塊經候不通出聖惠方用芫花根三兩銼炒令黃色為細末每服一錢桃仁煎湯調下當下惡物治婦人經脈不通症塊脹滿腹有鬼胎方出聖惠方用葛上亭長五枚以糙米相和炒令熟去翅足碾為末分三服空心煎甘草湯調服須臾覺臍腹急痛煎黑豆湯服之當通下胎附論夫妊娠羸瘦或挾疾病臟腑虛損血氣枯竭既不能養胎致胎動而不堅固終不能安者則可下之免害妊婦也妊婦因染溫疫傷寒邪毒之氣入於胞臟致令胎死候其當胎處若冷為胎已死可下之也方催生湯出三因方治產婦陣疏難產經三兩日不生或胎死腹中或產母氣乏委頓產道乾澀才覺陣痛破水便可投之蒼朮泔浸洗炒二兩苦梗一兩陳皮六錢白芷桂心甘草各三錢川芎一錢半川烏當歸酒浸炒乾薑炮厚朴制芍藥茯苓半夏湯炮附子炮去皮臍南星炮各二錢枳殼四錢炒木香一錢杏仁去皮尖炒阿膠炒各一錢上細末每服一大錢溫酒調下覺熱悶加白蜜新汲水調下只是五積散無麻黃有川烏附子南星阿膠木香杏仁六味蟹爪散出聖惠方療羸人慾去胎不能安甘草炙乾薑人參去蘆頭芎藭生薑桂心蟹爪黃芩各一兩上㕮咀以水七升煮取二升分三服忌海藻菘菜生蔥一方加牛膝治婦人兩月孕身要行取動者枇杷葉去毛淨烏頭何首烏紅花麝香當門子研當歸硃砂各等分上為細末空心溫酒調下療去胎出大全良方栝蔞四兩桂心五兩牛膝三兩瞿麥二兩上切以水七升煎二升五合去滓分三服別如人行八九里進之無忌治動胎及產難子死腹中並妊娠兩兒一死一生服之令死者出生者安下死胎方一名香桂散出本事方桂末三錢麝香當門子一個上同研為末暖酒服須臾如手推下比之用水銀等此藥不損血氣治婦人兩月孕身要行取動者對節草一握牛膝草根一握上入蘇木好酒封瓶口火溫早晨服二朝方入狗骨灰一大錢酒調下便行治妊娠胎動不可安者宜下之出聖惠方杏仁二十枚去皮尖炒桃仁十七枚去皮尖桂心末一錢上用多年鹽梅肉和丸如梧桐子大每十丸溫酒下未下再服治臨月損動不可安出聖惠方斷弓弦二寸燒灰箭筈一枚燒灰上合研令細以清水調頓服之治妊娠得病須去胎方出大全良方用雞子一枚鹽三指撮和服之立下又方出聖惠方用麥糵五升為末和蜜一升服之立下用麥糵二兩水一盞半煎一盞分溫三服又方出大全良方用大麥曲五斗酒一斗煮三沸去滓分五服令盡當宿勿食其子如糜令母肥盛無疾苦一方用神麯酢煮或水煎服之亦得下須七月七日神麯佳療母困篤恐不濟去胎出聖惠方用虻蟲十枚搗為末酒服之即下妊娠或以不治欲下胎出肘後方用斑蝥燒末服一枚即下治妊娠或以不理欲去胎出肘後方用守宮肝蛇脫皮以苦酒和摩塗臍上及左右令溫胎即下療去胎用牛膝六七莖綿纏捶頭令碎深納至子宮忌生蔥豬牛肉治妊娠未足月胎死不出出肘後方用醋大豆取汁服三升死兒立便分解未下再服一方以醋一升格口灌之亦妙治妊娠子死腹中用雄鼠屎二七粒以水三升煮取一升去滓取汁以作粥食之胎即下治妊娠熱病胎夭腹中下之方出聖惠方用益母草搗絞取汁服一中盞立效牛膝湯出聖惠方療妊娠胎動不安子尚在腹母欲死須以此藥下之牛膝去苗銼半兩水銀二兩硃砂二兩半研上以水五大盞煮牛膝可得一半去滓即以蜜和硃砂及水銀研如膏每服以牛膝汁一小盞調下半匙服桂心散治妊娠母因疾病胎不能安可下之桂心栝蔞牛膝瞿麥各二兩當歸一兩上㕮咀每服四錢水一盞煎七分空心去滓服一方有蟹爪二合又方瞿麥桂心各一兩牛膝二兩蟹爪二合上為末空心溫酒調二錢服又方用牛膝一握細搗以無灰酒一大盞煎取七分溫二服療下死胎方用風化朴硝入硃砂同研如桃花色童便下宜下死胎又方以清油和蜜等分入湯頓服又方用蜀葵子炒末酒湯任下又方以右手持馬銜鐵左手持石燕一對合手坐死胎即下又方用新汲水濃磨京墨服又方吞雞子清一個諸方亦治死胎治胎死得效方以鹿角屑二三方寸匕煮蔥豉湯和服之立出治妊娠胎死腹中若胞衣不下上迫心用墨三寸末酒服之治妊娠胎死腹中若胞衣不下上搶心及產不出者用雀麥一把水五升煮二升汁服下死胎用茺蔚子作煎及搗取汁服之半產附論夫妊娠日月未足胎氣未全而產者謂之半產蓋由妊婦衝任氣虛不能滋養於胎胎氣不固或攧撲閃墜致氣血損動或因熱病溫瘧之類皆致半產仲景謂寒虛相搏此名為革婦人則半產漏下是也又云半產俗呼曰小產或三四月或五六月皆為半產以男女成形故也或因憂恐暴怒悲傷太甚或因勞力打撲損傷及觸冒暑熱慎勿用黑神散以其犯熱藥恐轉生他疾只宜用玉燭散和經湯之類便產須知云小產不可輕視將養十倍於正產可也又云半產即肌肉腐爛補其虛損生其肌肉益其氣血去其風邪養其臟氣將養過於正產十倍無不平復宜審之耳方安宮散治妊娠不滿月小產安胎如神黑附子炮阿膠粉炒北五味山藥黃耆炙當歸熟地黃赤芍藥木香甘草炙各一錢糯米一勺炒生薑半兩炒上銼末每服五錢苧根三寸水一盞半煎一盞通口服忌生冷補中湯養新血去瘀血補虛扶危治月未滿半產乾薑炮阿膠銼蛤粉炒芎藭五味子各一兩白朮黃土炒黃耆去蘆蜜炙當歸去蘆酒浸赤芍藥各一兩人參木香不見火杜仲去皮炒甘草炙各半兩上銼散每服四錢水一盞半煎通口服不拘時候生地黃湯治妊娠胎氣損動氣血不調或攧撲閃墜因致墮胎謂之半產及產後氣血不和惡滯不盡腹中㽲痛生地黃焙一兩大黃略煨芍藥白茯苓去皮當歸切酒炒細辛去苗甘草炙黃芩去心桂去皮各半兩上㕮咀每服五錢以水一盞半入生薑一棗大拍碎同煎一盞去滓不拘時溫服人參湯治半產後血下過多心驚體顫頭目運轉或寒或熱臍腹虛脹疼痛人參麥冬去心生地黃焙當歸切炒芍藥黃耆銼白茯苓去皮甘草炙各一兩上㕮咀每服三錢以水一盞煎七分去滓食前服芒硝飲治半產後惡露不盡氣攻疼痛血下成塊結築臍腹煩滿悶亂芒硝蒲黃芎藭桂去皮不見火鬼箭羽各半兩生地黃焙一兩桃仁去皮尖炒半兩上㕮咀每服三錢以水一盞煎七分去滓不拘時溫服一方有人參無鬼箭羽名蒲黃湯艾葉湯治半產惡露不斷心悶氣短延胡索湯治半產後氣血不快惡露斷續延胡索當歸切炒芍藥芎藭桂去皮甘草炙各一兩上㕮咀每服三錢以水一盞煎至七分去滓不拘時溫服奪命丸出簡易方專治婦人小產下血過多子死腹中其人憎寒手指唇口爪甲青白面色黃黑或胎上搶心則悶絕欲死冷汗自出喘滿不食或食毒物或誤服草藥傷動胎氣下血不止胎尚未損服之可安已死服之可下牡丹皮白茯苓桂心桃仁制赤芍藥各等分上為細末以蜜丸如彈子大每服一丸細嚼淡醋湯送下速進兩丸至胎腐爛腹中危甚者立可取出羚羊角飲治半產後心煩悶倦羚羊角屑半兩芍藥一兩枳實去瓤麩炒三錢人參一兩麥冬去心焙半兩上㕮咀每服三錢以水一盞煎至七分去滓不拘時溫服旋覆花湯出金匱方治婦人半產漏下旋覆花三兩蔥十四莖新絳少許上以水三升煮取一升頓服之香豉湯出千金方治半產下血不盡苦來去煩滿欲死用香豉一升半以水三升煮三沸漉去滓內鹿角末一方寸匕頓服之須臾血自下鹿角燒亦得治小產惡露淋瀝不斷將近月餘諸治不效出便產須知用五靈脂炒微焦為末飯糊為丸如桐子大米飲吞下三十丸或四十丸亦可應手而效一方用酒亦可全生活血湯出蘭室秘藏方治婦人分娩及半產漏下昏冒不省瞑目無所知覺蓋因其血暴下暴亡有形血去則心神無所養心與胞絡者君火相火也得血則安亡血則危火上熾則令人昏冒火乘其肺瞑目不省人事是陰血暴去不能鎮撫令血虧損也往往用滑石甘草石膏之類乃辛甘太寒之藥能泄氣中之熱是血虧瀉氣乃陰虧瀉陽使二者俱傷反為不足虛勞之病也昏迷不省者上焦心肺之熱也此無形之熱用寒涼之藥驅令下行豈不知上焦之病悉屬於表乃陰證也汗出則愈今反下之幸而不死暴虧氣血生命豈能久活又不知內經有說病氣不足宜補不宜瀉但瞑目之病悉屬於陰宜汗不宜下又不知傷寒鬱冒得汗則愈於是禁用寒涼藥也分娩半產本氣不病是暴去其血亡血補血又何疑焉補其血則神昌常時血下降亡今當補而升舉之心得血而養神不昏矣血若暴下是秋冬之令大旺今舉而升之以助其陽則目開神不昏迷矣今立一方補血養血生血益陽以補手足厥陰之不足也蔓荊子五分藁本一錢五分羌活二錢獨活二錢升麻三錢葛根二錢白芍藥三錢甘草炙二錢柴胡去苗二錢當歸身酒洗二錢生地黃一錢夏月加之熟地黃一錢川芎一錢五分防風二錢諸陽既陷何以知之血下脫故也紅花三分細辛五分上㕮咀每服五錢水二盞煎至一盞去滓稍熱服食前延齡散出大全良方治半產後補虛生肌肉平復正氣桑寄生當歸石斛川芎乾地黃續斷牛膝各半兩人參澤蘭獨活防風木香五味子細辛官桂不見火各一兩上為細末每服三錢空心入鹽煎服或煉蜜丸如桐子大空心鹽湯任下五十丸更妙也治半產出血過多不可禁止忽氣悶不識人宜服此方出護命方吳茱萸三錢石斛去頭當歸各半兩續斷蒼朮黃耆防風牡蠣火煅川芎厚朴去皮薑製龍骨炙艾葉獨活各一錢上為細末每服五錢水一盞半煎至一盞三分入棗二枚同煎空心去滓服若血出過多蜜為丸如桐子大空心鹽米湯下三十丸只進一兩服蓋此藥不可服滓也服此藥數日後血止長服補虛產子治胎死腹中半產不下出護命方官桂去皮一兩牡丹皮去心芎藭葵子上細羅為末每服五錢濃煎蔥湯調下治一切婦人半產後損傷正氣不能將養經兩三月惡露不止面色黃瘁吃食減少無力臟腑虛冷出護命方當歸一兩艾葉川芎細辛木香防風各一兩牡蠣火煅續斷石斛桑寄生各半兩上為細末每服二錢水一盞煎三四沸空心去滓服治一切婦人忽因半產正產之後將養不到血氣傷損經候過多面色青黃非時瀉痢吃食減少肌肉消瘦腹內氣痛衝心刺脅下熱下部無力耳立肩竦眼色變異將成勞候宜服此方出護命方當歸五味子牛膝白芷獨活乾地黃蓬莪朮防風巴戟去心石斛延胡索官桂去皮細辛去葉鱉甲醋炙木香萆薢藁本各一錢上為細末煉蜜丸如桐子大早朝空心鹽湯下五十丸墮胎附論夫胚胎之始賴血氣以滋育若妊娠血氣盛強陰陽之至和相與流薄於一體惟能順時數謹人事勿動而傷則生育之道得矣若衝任氣虛將攝失宜子臟風冷不能滋養於胎故每有妊則數致傷墮也夫陽施陰化故得有胎營衛調和則經養周足故胎得安則能成長若血氣虛損者子臟為風寒所苦則血不足故不能養胎所以數墮胎也其妊娠腰痛者善墮胎也夫墮胎後復損於經脈經脈既虛故下血不止也下血多者便致煩悶乃至死矣又云戴人過東杞一婦人病大便燥結小便淋瀝半生不娠惟常服疏導之藥則大便通利暫廢藥則結滯忽得胎至四五月間醫者禁疏導之藥大便依常為難臨圊則力努為之胎墮凡如此胎墮者三又孕已經三四月弦望前後溲溺結澀甚恐胎隕乃訪戴人戴人診其兩手脈俱滑大脈雖滑大以其且妊不敢陡攻遂以食療之用紅花煮菠菱葵菜以車前子苗作茹雜豬羊血作羹食之半載居然生子其婦燥病方愈戴人曰余屢見孕婦利膿血下迫極努損胎但同前法治之愈者莫知其數也為醫拘常禁不能變通非醫也奈舉世識醫者鮮是難說也方白薇丸治婦人血海冷憊不能養胎妊娠數墜白薇去蘆牡丹皮銼熟地黃焙木香不見火當歸切焙肉豆蔻仁遠志去心附子炮製去皮臍禹餘糧火煅醋淬五七次另研石膏銼研各二兩獨活去蘆切吳茱萸湯洗七次去滑焙各一兩蜀椒去梗並開口炒出汗半兩黃耆銼微炒五味子微炒桂去粗皮各三錢芎藭一兩肉蓯蓉酒浸去粗皮切焙二兩白茯苓去黑皮細辛去苗葉各一兩上除另研外搗羅為細末入研各藥拌勻煉蜜和丸如梧桐子大每服二十丸溫酒下空心食前卷柏丸出聖惠方療妊娠數墮胎皆因氣血虛損子臟風冷致胎不堅固頻有所傷卷柏鍾乳粉鹿角膠炒紫石英飛桑螵蛸炒禹餘糧煅研飛陽起石飛桂心川牛膝桑寄生北五味熟地黃各一兩牡丹皮杜仲川芎當歸各三錢蛇床子二錢上為細末煉蜜丸如梧桐子大每服三四十丸空心溫酒吞下紫石英丸一名紫石英天門冬丸出聖惠方主風冷在子宮有子常落或始成娠便患心痛乃成心疾月水未曾來服之肥悅令人有子紫石英天門冬去心五味子各三兩烏頭炮卷柏烏賊魚骨雲母燒研禹餘糧當歸川椒如常制桑寄生石南葉各一兩澤瀉一作澤蘭杜仲遠志去心肉蓯蓉桂心甘草石斛人參辛荑一作蕪荑柏子仁各二兩上為末煉蜜丸如梧桐子大溫酒下二十丸至三四十丸杜仲丸治子宮久冷妊娠數墮胎杜仲去粗皮炙銼防風去叉附子炮製去皮臍石菖蒲桔梗炒秦艽去苗土細辛肉桂去粗皮厚朴去粗皮生薑汁炒半夏湯浸二七次焙各三錢沙參熟地黃焙蜀椒去目並閉口者炒出汗乾薑炮各半兩上為末煉蜜和丸如梧桐子大空心溫酒下十五丸漸加至二十丸一月見效紫石英丸治血氣不足臟中挾寒妊娠數墮紫石英椎作圓塊以葵菜煮半日研細水飛當歸切焙鹿茸切片酒浸一宿去毛炙禹餘糧火煅醋淬七次水飛枳殼去瓤麩炒芎藭各一兩側柏微炒艾細銼醋拌炒黃桂去粗皮赤芍藥阿膠蛤粉炒黃去粉白芷各三錢烏賊魚骨去甲微炙木香各半兩上為末煉蜜和丸如梧桐子大每服三十丸溫酒下空心晚食前各一服地黃丸治婦人血氣衰弱子臟風冷妊娠數墮熟乾地黃新潤者焙一兩澤蘭嫩者山芋石斛沉水者厚朴去粗皮生薑汁炙令透肉蓯蓉酒浸切焙蛇床子炒柏葉艾嫩者續斷卷柏湯浸洗五味子各半兩上為末煉蜜和丸如梧桐子大每日空心晚間生薑艾湯下十五丸補益調中散治婦人曾傷三月四月胎芍藥銼炒當歸切焙乾厚朴去粗皮生薑汁炙續斷芎藭銼炒白朮銼炒柴胡去苗桑根白皮生銼焙乾烏梅去核枳殼去瓤麩炒各一兩上㕮咀每服五錢以水一盞半煎八分去滓溫服乾地黃散一名黃耆散出聖惠方治妊娠數墮胎子宮虛冷寒熱百病熟乾地黃黃耆銼芎藭白朮人參當歸切焙各一兩乾薑炮甘草炙吳茱萸湯洗七次焙乾微炒各半兩上為細散每服二錢食前溫酒調下忌海藻菘菜蕪荑桃李雀肉等阿膠湯治妊娠數墮胎小腹㽲痛不可忍阿膠炙令燥熟地黃焙乾切艾葉微炒芎藭當歸切焙杜仲去粗皮炙銼白朮各一兩上㕮咀每服四錢以水一盞半棗三枚擘破同煎至八分去滓食前溫服地黃湯治妊娠血氣衰微胞臟挾冷數墮胎乾地黃熟者四兩當歸切焙艾葉各一兩芎藭阿膠炒令燥杜仲去粗皮銼炒五加皮各三兩續斷三兩上銼如麻豆大每服五錢以水一盞半煎至一盞去滓溫服空心食前服之吳茱萸湯一名實胎散出便產須知療妊娠懷胎數落而不結實或冷或熱百病之源甘草炙黃耆人參川芎白朮熟地黃洗蒸吳茱萸各等分上為末空心溫酒調下二錢忌菘菜桃李雀肉醋物吳茱萸丸治子宮久冷妊娠數墮胎吳茱萸湯洗六七次蜀椒去目及閉口者炒出並各三兩高良薑洗切焙附子炮製去皮臍各一兩白朮二兩青橘皮湯洗去白麩炒黃二兩半上為末用乾柿二十枚以清酒浸令軟研膏和搗得所丸如梧桐子大每服十丸至十五丸空心臨臥溫水下茯苓散治胎月未足氣血未充輒墮胎血傷動下不止虛損困倦白茯苓去黑皮人參黃耆薄切醋石榴皮切炒陳橘皮去白炒甘草各一兩炙上為細散每服二錢以熱酒調溫服米飲亦得不拘時候桑寄生湯出聖惠方治妊娠胎動數損墮止痛安胎逼心煩悶欲絕桑寄生當歸切焙芎藭人參甘草炙等分上㕮咀每服四錢以水一盞入蔥白七寸同煎至六分去滓溫服芎藭湯治妊娠數墮胎心腹疼痛芎藭芍藥白朮阿膠炒令燥甘草炙各一兩上㕮咀每服三錢以水一盞入艾葉糯米生薑同煎至六分去滓食前服一方無白朮有人參治妊娠數墮胎方出聖惠方用赤小豆為末酒服方寸匕日二服亦治妊娠數月月水尚來捷徑方出大全良方治婦人服草藥墮孕腹痛用白扁豆生去皮為細末米飲調服方寸匕若修治不及濃煎服亦可亦解男子女人誤中砒毒亦治婦人赤白帶下炒黃為末米飲調下一方用新汲水調服治用毒藥攻胎藥毒攻心外證牙關緊急口不能言兩手強直握拳頭低自汗身微熱外證與中風相似但其脈浮而軟十死一生醫多不識若作中風治之必死無疑治婦人懷妊多墮方出華佗中藏經熟艾五斤洗淨焙乾米醋三斤煮炒乾焙為末大赭石二兩米醋淬五七次用木鱉子五個研細上為末煮棗肉為丸梧子大每服三十丸米飲下吳茱萸湯治妊娠數落而不結實或冷或熱黃耆一兩吳茱萸半兩湯洗甘草炙一兩半芎藭一兩上為細末每服二錢空心溫酒調下墮胎後心痛方出肘後方豉三升生薑五兩蔥白十四莖上以酒六升煮取三升分三服瘥墮胎方出本草以白商陸大蒜服之治落胎出本草用苦耽苗子煮汁服亦可生搗絞汁服墮胎後衣不出附論夫胎氣內動不能自安非時而墮既墮而胞衣不出者以衣帶尚與母氣相屬血氣猶固傷墮之次復加風冷血氣凝澀遂致衣不出治法宜以破血溫氣之劑服墮胎胎初下後婦人力羸不能更用氣力產胞也復遇外冷則血凝故胞衣不出也方當歸湯治妊娠墮胎胞衣不出當歸切炒牛膝酒浸切焙各一兩半木通銼滑石碎各二兩冬葵子炒一合瞿麥穗一兩上㕮咀每服三錢以水一盞半煎至八分去滓溫服未下再服以下為度牛膝散出聖惠方治妊娠五六月墮胎胞衣不出牛膝去苗芎藭川朴硝蒲黃各三錢桂心半兩去粗皮當歸一兩半上㕮咀每服四錢以水一中盞入生薑半錢生地黃一錢煎至六分去滓放溫頻服效冬葵子湯治妊娠墮胎胞衣不出冬葵子炒牛膝酒浸切焙木通銼各一兩瞿麥穗一兩桂去粗皮二兩上㕮咀每服二錢以水一盞半煎至八分去滓溫服以下為度大阿膠湯治妊娠墮胎胞衣不出阿膠炙令燥冬葵子炒牛膝酒浸切焙當歸切焙各三錢上㕮咀每服三錢以水一盞半煎至八分去滓溫服以下為度雄黃散治妊娠墮胎胞衣不下昏悶喘急者宜急救雄黃香墨研各一錢金箔三片馬牙硝一錢研上研勻每服一錢以蜜少許與溫湯調服未下更服蒲黃散出聖惠方治墮胎胞衣不出胞中㽲痛牽引腰脊蒲黃三錢桂心赤芍藥各一兩牛膝二兩去苗上㕮咀每服四錢以水酒各半盞煎至六分去滓溫服地黃酒治妊娠墮胎胞衣不出生地黃以銅竹刀切炒半兩蒲黃炒生薑切炒各一錢上㕮咀以無灰酒三盞於銀器內同煎至二盞去滓分溫三服未下更服澤蘭湯治妊娠墮胎胞衣不出澤蘭葉切碎滑石末各半兩生麻油少許上以水三盞先煎澤蘭葉至盞半去滓入滑石末並油更煎三沸頓服之未下更服蒲黃酒一名槐子丸出大全良方治妊娠墮胎胞衣不出蒲黃炒一合槐子十四枚為末上以酒三盞煎至二盞分溫二服未下更服一方治妊娠月數未足欲產腹痛用蜜丸溫酒下治墮胎胞衣不出腹中㽲痛牽引腰脊出聖惠方用蟻巢土三升炒帛裹拓心下胞自出也又方出聖惠方用好墨細研每服以溫酒調下二錢頻服效治妊娠胎死腹中胞衣不出及產後卒有別病欲至狼狽方出聖惠方用刺熱羊血飲一小盞極效又方出聖惠方用水噀其面神驗用醋少許又方出聖惠方用洗兒水半盞令母服其衣便出勿令產婦知又方出聖惠方若胞衣未下腹滿則殺人用水一盞煮豬脂一兩煎五七沸和脂服之當下治胎衣不下用蛇蛻皮炒焦為末酒調下如胎衣在腹另碾榆白皮末同煎服立下治胎衣不下用蓖麻子十四枚去殼正裹貼足下男左女右衣下即去又方出如宜方以雞子一個取清吞之又方出如宜方用鐵斧燒令通紅投酒中沸定則出飲之墮胎後血不出附論夫血性喜溫而惡寒溫則宣流寒則凝澀妊娠墮胎惡血不出者由妊娠宿有風冷在於胞臟冷搏惡血故令不下令人寒熱去來臍腹滿痛口乾燥渴手足若煩若血隨氣逆上衝於心或語言狂妄或迷悶不省至其病變不可勝數宜速以破血下氣藥治之血下乃已方琥珀煮散治妊娠墮胎後惡血不出小腹㽲痛琥珀研一錢沒藥研蒲黃當歸去苗切焙赤芍藥炒薑黃紅藍花土瓜根牛李子延胡索牡丹皮各半兩上為散每服三錢以童子便酒各半盞同煎至七分溫服心腹脹痛溫酒調下二錢鑑鼻湯治妊娠墮胎後血露不出心腹疼痛銅鑑鼻另搗細研如粉大黃銼微炒生乾地黃微炒芍藥各一兩甘草炙銼芎藭乾漆炒去煙各一錢棗七枚去核焙亂髮雞子大燒灰上㕮咀每服三錢水一盞煎至七分去滓投入芒硝少許再煎一二沸溫服相次更服大黃飲治妊娠墮胎後血不出腹中㽲痛不可忍大黃銼炒芍藥黃芩去黑心桃仁湯浸去皮尖雙仁麩炒黃色當歸微炙各一兩桂去粗皮甘草炙赤各三錢生乾地黃焙一兩半上㕮咀每服三錢以水一盞煎至七分去滓溫服食頃再服牡丹丸治妊娠墮胎後血不出寒熱腹痛牡丹皮當歸炙令赤銼芍藥白朮鬼箭羽桂去粗皮各一兩大黃銼炒三錢上為末煉蜜和丸梧桐子大每服二十丸溫酒時時服漸加至三十丸大黃湯治妊娠墮胎後血不出大黃銼炒當歸微炙甘草銼炙吳茱萸湯洗炒黃牡丹去心切白芍藥各一兩上㕮咀每服三錢以水一盞生薑一錢拍破同煎六分去滓溫服相次再服桃仁湯治妊娠墮胎後血不出往來寒熱腹痛桃仁湯浸去皮尖雙仁麩炒黃色二十枚吳茱萸湯洗炒黃二兩當歸微炙銼黃耆微炙銼芍藥各一兩醍醐二兩上除醍醐外粗搗篩每服三錢以生薑一錢拍破水一盞酒半盞煎至六分去滓下醍醐半兩攪勻溫服紅藍花散治妊娠墮胎後血不出奔心悶絕不識人紅藍花微熬過男子發燒灰研墨燒通紅麒麟竭研蒲黃隔紙炒各一兩上為散以童子小便三四分調二錢服之立瘥烏金散治妊娠墮胎後惡血不出四肢無力體熱心胸滿煩悶及諸疾血病墨二兩打折二寸挺子燒通赤用好醋一升蘸七次再燒通赤放冷另研為末沒藥研麒麟竭各一錢麝香一錢上為細散每服溫酒調下一錢如血迷心用童子小便和酒調下二錢豬膏飲治妊娠墮胎後血不出搶心痛煩憒豬膏七合白蜜三合生地黃切二兩上先將豬膏地黃相和煎令赤色去卻地黃內蜜三合攪勻分溫二服相次再服白蜜湯治妊娠墮胎後惡血不出白蜜二兩生地黃汁一盞酒半盞上將地黃汁與酒於銅器中煎五十七沸入蜜攪勻分作兩服放溫相次再服服二劑百病可愈治妊娠墮胎後敗血不出墨三兩用炭火燒紅以酸醋淬如此三遍以次瓦碗於淨地上合令冷取出細研如粉沒藥一兩另研末上合研令極細再羅過每服二錢正以煎醋調下不拘時當歸酒治妊娠墮胎後血不出當歸炙令香銼芍藥銼炒各二兩上㕮咀每服三錢正以無灰酒一盞入生地黃汁一合於銀器內慢火煎至七分去滓溫服以惡血下為度治妊娠墮胎後血不出小腹滿痛用羚羊角燒灰細研如面每服三錢正不計早晚以豆淋酒調下又方以當歸二兩酒煮下墮胎後血出不止附論夫胎不安而墮既墮而血出不止者以經養不周血投虛出甚則心神煩憒乃至昏冒也墮胎後復損於經脈經脈既虛故下血不止便致悶煩乃死矣方桑根煎丸治妊娠墮胎後血出不止胸脅心腹滿痛時復寒熱甚者桑根白皮銼二兩麻子仁淨洗五合研清酒五盞煮煎二味藥至三盞絞汁去滓棗二十枚大者取肉飴糖二兩阿膠炙令燥一兩蜜五大合棗糖膠同煎一大盞如膏乾薑炮製厚朴去粗皮生薑汁炙七次銼碎各半兩芍藥半兩蜀椒去目併合口者炒出汗肉桂去粗皮甘草炙令赤黃柏銼碎炒生乾地黃焙元參五味子各一錢上以先七味共煎成稀膏以後十味為末與前膏同和為劑塗酥更搗令勻熟丸如彈子大以溫酒下一丸食前服地榆散出聖惠方治妊娠損胎下血不止腹內疼痛地榆三錢銼乾薑一錢炮製銼當歸三錢銼微炒龍骨三錢芎藭二錢艾葉半兩微炙阿膠一錢搗碎炒令黃燥熟乾地黃一兩蒲黃三兩牛角腮一兩燒灰白朮半兩烏賊魚骨三錢燒灰上為細散不計時候以粥飲調下二錢當歸散出聖惠方治妊娠損胎後下血不止當歸三錢銼微炒龍骨三錢地榆五錢銼艾葉半兩阿膠三錢搗碎炒令黃燥牛角腮一兩燒灰熟乾地黃三錢芎藭三錢白芍半兩炒乾薑半兩炮裂銼黃耆半兩銼柏葉三錢微炙上為細散不計時候以粥飲調下二錢龍骨散一名當歸散出聖惠方治妊娠墮胎後血出不止腹痛並損動龍骨半兩炮生乾地黃焙地榆去苗細銼各一兩半芍藥各一兩乾薑炮裂蒲黃微炒阿膠炒令燥牛角腮取黃牛角內者炙令勻焦錯取末各半兩艾葉一錢為末上為細散每服二錢以煎生乾地黃酒調服米飲調服亦得忌生冷油膩豬肉魚蕪荑蒜地榆散一名龍骨散治妊娠墮胎後血出不止地榆去苗銼碎一兩當歸切焙龍骨艾葉搗取末蒲黃微炒各半兩牛角腮炙令勻焦另研一作犀角屑阿膠炒令燥生乾地黃焙各一兩一方用熟乾地黃上為細散研勻每服二錢以溫米飲粥調食前服當歸散治妊娠損胎後下血不止當歸三錢銼熟乾地黃一兩鹿茸三錢去毛塗酥炙白膠一兩搗碎炒令黃燥艾葉半兩微炒甜葶藶根三錢附子半兩去皮臍黃芩半兩上為細散每於食前以粥飲調下一錢白膠散治妊娠三兩月後或時傷損下血不止繞臍疼痛吐逆悶絕白膠一兩搗碎炒令黃燥人參去蘆頭半夏湯洗七次去滑秦艽去苗切紫菀甘草炙微赤銼各一兩上㕮咀每服三錢以水一中盞入蔥白二莖煎至六分去滓不計時候溫服地榆湯治妊娠墮胎後血出不止形體虛羸地榆去苗刮淨細銼一兩當歸炙焙切碎二兩生薑去皮切碎陰乾者艾葉搗為末各半兩赤石脂一兩上㕮咀每服三錢以水一中盞入新竹葉十片同煎至七分去滓食前溫服一方為末淡竹瀝調下二錢地黃湯治妊娠墮胎後血出不止小腹滿痛蔥豉湯治墮胎後心痛榆白皮煮散治妊娠墮胎後血出不止榆白皮刮淨銼碎當歸切焙各半兩上㕮咀每服三錢以水一盞入生薑三片同煎至七分去滓空心服膠艾湯治妊娠墮胎後血出不止腹痛亦療損動母去血艾葉搗成末一兩阿膠炙令燥半兩上㕮咀每服三錢正水一盞煎至五分去滓空腹服之未效更服小薊飲治妊娠墮胎後血出不止小薊根葉銼碎益母草去根莖切碎各五兩上以水三大碗煮二味爛熟去滓至一大碗將藥於銅器中煎至二盞分作二服一日內服盡治妊娠墮胎後血出不止用生地黃汁半盞調代赭末一錢必一日三五服以瘥為度治妊娠墮胎後血出不止用丹參去蘆頭二兩粗搗篩每服四錢以水一盞煎至六分去滓溫服食前一方酒煮溫服之日三治落胎下血不止用桑木中蠍蟲燒灰酒服方寸匕日二一方桑蠍蟲屎燒灰服治妊娠墮胎下血不盡苦煩滿欲極時發寒熱狂悶用鹿角屑一兩熬以水一大盞煎豉一合取汁六分分為三服調鹿角屑二錢服日三服須臾血下
