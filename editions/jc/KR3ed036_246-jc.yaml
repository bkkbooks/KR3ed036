吳茱萸一兩湯洗過綿裹上納釜中以水二斗煎至一斗二升入漿水二斗鹽三兩更煎五七沸去滓用新淨瓦甕子一口可容五斗者以板子闊三寸橫著於甕底將煎得汁乘熱傾入甕中候冷熱得所於密室中就甕蘸腳頻頻以湯從骭面淋之甕外以糠火微溫其甕中湯只可離腳面三寸更互換湯以得汗甚為度若汗不多可盡日蘸蘸了用生薑木瓜各一兩半銼碎同研如膏塗腳心以蠟紙裹纏定厚衣被蓋覆取汗更吃後木香湯木香散木香別搗白檳榔別搗各半兩紅雪一兩半上先將木香末三錢以水一中盞半生薑一分大蔥白三寸同煎至一盞去滓入檳榔末二錢以童子小便一合紅雪末二錢更煎一二沸去滓溫服燙腳散治腳氣地椒蒺藜子莽草荊芥穗上等分為末煎湯淋浸二豆湯出聖惠方專治腳氣腫滿大效大豆五升赤小豆三升吳茱萸一升鹽二合上取一新杉木桶先將大豆布在桶底次下小豆茱萸鹽以漿水二斗於鍋內煮沸傾入於杉桶其沸漿與藥劑勿過之即以腳於桶中踏藥上候溫漸漸踏至底唯露出腳趾覺冷即續添沸漿以盡為度密蓋覆忌風漸淋至膝候湯冷收腳撲米粉又方出聖惠方治證同前枳殼一斤五加皮半斤躑躅花一斤芫花五兩上件細銼和勻每度用藥半斤以水三斗煮取二斗去滓看冷暖於避風處淋蘸腳氣塗法出危氏方豬牙皂莢擇不蛀者大皂角不蛀者南木香上各等分為末黃子醋濃調先於腫之上不腫處用藥圍塗之闊三四寸若圈然截斷毒氣不使衝上次塗下面腫處只留腳尖不塗仍修去腳甲出毒氣時時用醋潤之一方用不蛀皂角為末入平胃散內釅醋調敷一方謂倉猝只用皂角火上燒灰存性薑汁調敷皆可用不及上方為妙蘸腳杉木節湯出聖濟總錄專治腳氣杉木節半斤銼柳蠹蟲末半斤蒴藋枝五兩銼上納釜中以水二斗煎至一斗入鹽四兩漿水一斗更煎至五沸後用淨瓦甕子一口可容五斗者以板子橫著甕底將煎得藥汁去滓乘熱傾入甕中候冷暖得所入腳踏甕中板頻頻以湯從骭面淋之其湯只可離腳面三四寸不可過腳踝仍於密室中避風以得汗甚為度湯冷即於釜中入滓更煎三五沸後去滓一依前法蘸腳蒼耳湯出聖惠方專治腳氣蒼耳子炒搗鹽赤小豆各三升上納釜中以水一石二斗煮至七斗五升去滓用淨瓦甕一口可容五斗者以板子橫甕底將藥汁乘熱傾入甕中候冷暖得所入腳踏甕中板子頻以藥汁從骭面淋之其汁只可離腳面三寸不可過腳踝仍於密室中避風以得汗為度湯冷即納釜內入滓更煎三五沸後去滓一依前法淋滯羊桃湯治腳氣腫痛行履不得羊桃蒴藋各三斤桑葉一斤上銼碎水九升煮取四升去滓用淋滯腳下不拘時以腫消為度又方治腳氣腫滿大效水葓草二斤赤小豆一升桑白皮一斤上件藥細銼和勻每用半斤以水三斗煎取二斗去滓看冷暖淋蘸汗出切宜避風又方芫花半斤水葓莖葉二斤杉木一斤上件藥細銼和勻每度用藥半斤以水三斗煎取二斗去滓看冷暖於避風處淋蘸又方桑枝二斤枳殼槐樹皮一斤柳枝三斤上件藥細銼和勻每度用藥半斤以水三斗煎煮二斗去滓看冷暖於避風處淋蘸又方蒼耳子半斤搗碎赤小豆半升鹽一兩蒴藋二斤上件藥以水三斗同煮以豆爛為度去滓看冷暖於避風處淋蘸足踏丸治腳氣腫滿疼連骨髓烏頭一兩去皮臍生搗末樟腦三兩細炒研上再研令勻釅醋煮糊和丸如彈子大置藥一丸於爐子中心踏之衣被蓋覆汗出如涎為效蘸腳黃櫨湯治腳氣黃櫨木三斤銼碎白礬一兩為末上先將黃櫨木以水二斗煎十餘沸去滓入白礬末攪勻更用瓦甕子一口可容四斗五升者以板闊三寸橫置甕底將煎得湯汁乘熱傾入甕中於密室內坐腳踏甕中橫木上蘸頻以湯從骭面淋之甕外以糠火微溫得汗為度其湯只可離腳二三寸若蘸了以綿衣裹兩腳勿令風吹其殘湯留取隔日溫過一依前法用如覺得汗甚心中悶極即取紅雪末二錢以冷漿調服麥皮膏治腳根痛不問左右但覺隱隱疼痛並是毒氣此皆凝寒之月人皆忍冷血聚不散宜先用暖水淋洗後拭乾遂以火灸覺痛處令人點藥揩摩直候藥氣透熱持紙拭去藥如常蓋覆麥皮熊白脂上等分相和以微火炒更入口脂少許調勻如膏旋旋取摩痛處即瘥又方治腳氣腫滿大效五加皮一斤豬椒莖葉二斤上件藥細銼和勻每度用半斤以水三斗煎至二斗去滓看冷暖於避風處淋蘸又方樟木三斤楠木二斤上件藥細銼和勻每度用半斤以水三斗煎至二斗去滓看冷暖於避風處淋蘸又方商陸二斤蒴藋葉二斤上件藥細銼和勻每度用半斤以水三斗煎取二斗去滓看冷暖於避風處淋蘸五枝湯洗腳上件用桃柳槐楮桑五件各取枝煎湯洗腳消腫止痛仍先吃汁三杯大庾嶺云風長老曾煎贈南陵天慶管轄立效一方有麻葉二斤水一石煎至八斗去滓溫浴每五日一浴腳氣蒸法上先以復元通氣散一方用黃耆丸倍加甘草酒糊丸每服三十丸用淡酒吞下如人行五里又進一服連三服卻用甘遂細末半兩用好醋調仍以炭三四斤生火於地上熬至十分通紅卻去火以脫底桶子一枚或二件圍住患人足沃其醋在地上急用被絮裹蓋其足得腳上有汗為妙甚者經旬可去病根一方以復元通氣散並甘草先以酒服之卻取豬腰子一枚分為四邊用甘遂末二錢傾在腰子上用托兩腳心以片帛札定仍濃煎甘草湯更服之又方主腳氣流注四肢結成腫核下散赤熱焮痛及療一切腫毒以甘遂細末醋調敷腫處濃煎甘草湯一味服之其腫即散一服未安再用二藥須兩人各買亦不可同處安頓及不許並手修合耳聾亦可煎甘草湯服之以甘遂塊塞耳腳氣洗法出危氏方上每夜用鹽塗搽腿膝至足甲淹少時卻用熱湯泡洗昔有人得腳氣諸方不效後得此方常洗不再發蘸腳椒湯出聖濟總錄專治腳氣攣腫腰胯不遂蜀椒六升未經蒸者用生綢作袋兩個每個長九寸納椒入袋中實築之仍縫袋口上將椒袋納釜中以酸漿水四斗五升入鹽二升煮五七沸用淨瓦甕子一口可容五斗者將所煮椒袋一枚及一半煮椒汁乘熱入瓦甕中候湯冷暖適腳即以腳入甕踏椒袋上蘸仍以湯頻頻從骭面淋之若甕中椒袋覺冷即換釜中熱者其湯或冷亦換釜中熱湯其使了湯並椒袋即納釜中以微火溫之常令熱亦須於密室中勿令風吹若兩腳覺似繩牽如蟲行頭項肢體皆有汗出腹中鳴此是氣下即止若汗後覺心氣悶可取冷飯吃三五口以鹿脯下之若覺微利皆是病狀通泄也若未愈即隔日或三日取舊湯袋等依前法踏蘸還以得汗及腹鳴為度其蘸腳湯只可離腳面三四寸不可過踝宜食酥蜜薑湯並鹿肉治腳氣發過心膈悶者宜用此方出聖濟總錄上取新磚兩口鑿中心作孔如球子大勿令透過即將炭火燒令通紅用米醋潑之便納蜀椒於磚孔中以物蓋上看溫暖即去襪以腳踏磚上立愈一方以甕盛椒水下著火暖之懸板為橋去湯二寸許以腳踏板板腳以棉絮密塞勿令泄氣若疲即出入被以粉摩之一食久更入甕常令甕下火不絕勿使湯冷如此消息不過七日腳得伸展並腫亦消麻黃裹足方出聖濟總錄治久蘊風濕足多冷麻隱痛難行夜常轉筋如風所吹此皆是腳氣之候上以麻黃二斤銼碎炒令極熱以帛包貯纏裹二足不得透氣良久腳上有汗候麻黃溫不用卻著綿夾襪勿令風吹如此三五次永除病根爐子法上掘地爐子一個闊一尺二寸掃拭另置新磚半頭在爐中心用細莖炭十斤燒令通赤候炭消及一半為度取去炭用釅醋四升同白馬通八斤和成泥固臍地爐子四圍俱滿將藥丸一粒置磚上伸腳踏之被蓋覆三二時辰汗盡方出腳然後用藥淋洗淋洗藥三節湯方出聖濟總錄石南節杉木節茵芋蒴藋原蠶砂麻黃根松木根蓖麻根煮絮桶中灰柳蟲糞上各三兩細銼用水一斗五升煮至一斗乘熱淋洗附子散出聖濟總錄專治腳氣連腿腫滿久不瘥附子一兩去皮臍生用上為散用生薑汁調如膏塗腫上藥干再塗以腫消為度蒴藋熏蒸方治腳氣筋攣不能行及干痛不腫日漸枯悴或腫滿緩弱上取蒴藋三斤和根葉銼長二三寸穿地作一坑面闊一尺以截柴置於坑中燒令微赤灰火淨以蒴藋布坑四邊側布一行正布一行次以故氈蓋坑口候蒴藋萎更著新者一二斤坑旁鋪薦席坐以杉木板置於坑底以腳踏板上熏之以綿衣覆腳周遍勿令氣出如燻人熱甚暫歇片時還納腳於坑中其四邊或有熱處即隨熱處著蒴藋布之如病人困即止安穩暖臥以綿衣蓋勿令露風飽食以補之三五日一熏重者不過三五熏即瘥又方出聖惠方專治腳氣腫滿大效上以黑驢糞三斗鹽四兩相和拌令勻即於甑上蒸一炊久取湯淋濃汁稍候熱氣定即淋蘸腳切宜避風又方出聖惠方蓖麻葉二斤上件藥細銼和勻每分為四度以水三斗煮取二斗去滓看冷暖於避風處淋蘸桑葉煎出聖濟總錄專治腳氣曾用諸方蘸腳後宜服白桑木用生白椹者採取軟條或帶葉者亦得細銼一石上納大釜中以水一石煎至五斗更旋添水五斗以慢火煎令常服再減至五斗去滓澄清納淨釜內更煎至二斗濾去滓納鍋中慢火熬膏約至二升如稠餳即止傾入通油瓷甕內收藏每日空心取一匙頭含化咽之如嘔逆不下亦可和粥食之服至一七日當覺四肢通暢頻頻泄氣以後兩腳或腫勿怪乃是藥力病瘥之候也金牙散專治腳氣牛膝酒一名側子浸酒方專治腳氣濕痹不仁腳弱不能行常服治腳氣上生風毒瘡腫疼痛宜此淋蘸方出聖惠方槐白皮二兩桑枝三兩苦參三兩蒴藋二兩黃柏三兩白礬一兩為末上銼以水一斗煮至六分去滓下白礬末冷熱得所密室中淋洗瘡上治腳氣腳上生風毒瘡腫不瘥宜用藥敷之方出聖惠方地骨皮二兩苦參三兩槐根白皮三兩蛇床子二兩鹽一兩羊蹄根三兩上細銼和勻分為二度以漿水五碗煎至五七沸去滓後看冷暖漸漸洗之後以故帛拭乾敷後散子一方敷前散治腳氣腳上生風毒瘡腫不瘥宜用藥敷之方出聖惠方蠶砂二兩杏仁一兩膩粉半兩上先於銚子內炒蠶砂杏仁令焦黑搗細羅為散入膩粉研令勻旋旋敷瘡上不過三五度瘥又方出聖惠方菘菜花一兩赤小豆一兩半黃連二兩上搗細羅為散旋旋敷瘡上又方出聖惠方爛蜆子殼一兩半黃連一兩馬齒莧菜二分上搗羅為細散頻敷瘡上效腳氣浸法出仁存方專治痛不可忍者正宜用此小便或自己者或童子者尤佳上暖令溫用馬桶浸二腳桶口用紙單之類隔其氣膝痛者用高桶浸至膝為妙冷則再溫牛膝散專治腳氣不能食熏洗方石南葉左纏藤一名鷺鷥藤荊芥蔥杉木上不拘多少水五升煎至三升先剪去患腳指甲用藥水在盆內將腳擱在盆沿上以布綿遮圍熏令汗出通手於腿上淋洗至腳須露出指頭候水冷方連指頭洗更先一面用晚蠶砂一升於銚內炒熱候揩腳幹了起身立將銚內蠶砂傾在地上卻將患腳踏在熱砂上如此三五次立效熏洗方治腳氣黃耆一兩蛇床子一兩木通一兩半防風半兩莽草二兩荊芥二兩上為粗末濃煎湯極滾沸擱腿在桶上熏候通手時洗之洗時須是露出指不可洗烏頭挫散淋洗腳氣川烏頭生官桂川椒各一兩蔥二莖上為銼散水一斗煮五升乘熱蒸氣先熏復以衣服之物遮泄後可隨手淋渫洗石南湯治淋滯腳氣大戟川烏頭炮去皮臍頑荊葉草烏頭生去皮尖杜仲銼炒斷絲川楝子肉川椒去目石南葉藁本去土焙上各等分㕮咀每用一兩半水五升煎三五沸乘熱熏淋洗渫拭乾勿令見風七寶散出楊氏家藏方專治經絡寒濕腿臂作痛屈伸不能此藥舒筋止痛散風去濕晚蠶砂微炒一升肉桂去粗皮