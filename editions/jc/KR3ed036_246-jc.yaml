body:
  text: 卷二百四十六腳氣門江東嶺南瘴毒腳氣附論夫江東嶺南之地卑濕春夏之間毒氣彌盛又山水濕蒸多致瘴毒風濕之疾從地而起易傷於人所以此病多從下上腳先屈弱然後痹弱頭痛心煩痰滯吐逆兩脛微腫小腹不仁壯熱憎寒四肢緩弱精神昏憒大小便不通毒氣攻心死不旋踵此皆瘴毒腳氣之類也方金牙酒一名大金牙酒方出聖濟總錄治瘴毒氣中人口喎面戾半身不遂手足拘攣歷節腫痛甚者小腹不仁名曰腳氣及治風冷濕痹金牙一斤側子炮裂去皮臍附子炮裂去皮臍天雄炮裂去皮臍各二兩人參二兩半肉蓯蓉切焙二兩獨活去蘆頭八兩白茯苓去皮用二兩當歸切焙白朮防風去叉黃耆山芋細辛去苗葉桂去粗皮茵芋炙石南微炙芎藭地骨皮五加皮湯浸炙各二三兩丹參五兩半杜仲去粗皮炙七兩萆薢三兩磁石煅醋洗七次別研十兩厚朴去粗皮薑汁炙薏苡仁一斤白芷二三兩麥門冬去心焙五兩石斛去根八兩葳蕤二兩枳殼去瓤麩炒一作枳實桔梗各三兩牛膝去苗切五兩半狗脊去毛三兩生地黃二升蒴藋四兩黃芩去黑心遠志去心蔓荊實各三兩一作牡荊子上銼如麻豆大每半料以絹袋盛入瓷甕中用好酒八斗浸密封經七日後每服取一合溫服之漸加至二合三合常令有酒氣相續以效為度藥力和平主治極多凡是風虛四肢小覺有風疴者皆須服之服者依方修合不得浪有加減大鱉甲湯出聖惠方專治江東嶺南瘴毒腳氣或其中腳膝腫滿心神悶亂寒熱痰逆頭痛口乾肩背拘急肢節煩悶不欲飲食鱉甲二兩塗醋炙黃去裙杏仁半兩去皮尖雙仁炒吳茱萸半兩湯浸焙乾陳橘皮湯浸去白穰半兩防己一兩去蘆頭麻黃半兩去根節白朮半兩知母半兩川升麻半兩貝齒四枚燒通赤赤茯苓芎藭焙犀角屑各半兩麥門冬一兩焙去心川大黃一兩碎微炒烏梅七枚去核炒石膏一兩當歸葳蕤赤芍藥各半兩甘草半兩炙半夏半兩湯浸去滑炙人參半兩去蘆麝香木香羚羊角屑各半兩上為散每服四錢以水一中盞入生薑半分薤白二莖赤小豆三十粒棗三枚煎至六分去滓不計時候溫服小金牙散療南方瘴癘疫氣腳弱風邪鬼注金牙五分牛黃一分天雄萆薢黃芩麝香蜀椒汁由跋雄黃硃砂烏頭各二分犀角四分細辛葳蕤各二分桂心莽草各二分乾薑蜈蚣一枚長六寸者炙黃連四分上搗篩合牛黃麝香搗三千杵溫酒服五錢每日三夜二以知為度絳囊盛帶男左女右一方寸匕若省病問孝不避夜行塗鼻中晨昏霧亦塗之忌豬肉冷水生血物生菜等五加皮散出聖惠方專治江東嶺南春夏不正暑濕鬱蒸臟腑虛羸腳氣發動兩腳枯疼或即浮熱腫滿或即皮肉焦燥不能久立筋急抽痛或氣衝心悶亂胸膈疼逆四肢不仁腹脹壅悶目眩頭旋並宜服之五加皮一兩薏苡仁一兩半微炒防風半兩去蘆頭牛膝三分去苗赤茯苓三分獨活半兩丹參半兩枳殼半兩炒川升麻三分麻黃一兩去根節羚羊角屑防己各三分桂心半兩黃耆三分石膏二兩上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服茯苓湯出聖濟總錄專治春夏暑濕鬱蒸毒氣攻擊腳氣發動兩腳痠疼或浮腫熱滿或皮毛焦乾或腳疼不能久立筋急抽痛時衝心悶胸膈痰積噁心欲吐四肢疼痛十指不仁腹脹氣妨頭旋目眩眼暗白茯苓去黑皮三兩薏苡仁炒四兩丹參獨活去蘆頭防風去蘆各二兩半牛膝酒浸炒焙防己五加皮黃耆枳殼去穰炒升麻各三兩麻黃去根節四兩桂去粗皮一兩半羚羊角鎊二兩石膏研如粉十一兩上除石膏外銼如小豆大每服五錢水一盞半浸一宿來晨煎取八分去滓空心溫服之日二病消不吐不利如心腹氣脹每服加連皮大腹一顆心胸虛熱加麥門冬去心一分小腹痛加芍藥黃芩各一兩心胸有痰加旋覆花一分肺氣咳嗽加杏仁去皮尖十四枚桑根白皮一分小便數加杜仲末一分語言謇澀加木通一分腎虛耳聾加磁石一錢七分不睡加酸棗仁末一錢七分乾渴不止加栝蔞一分金牙散出聖濟總錄專治嶺南瘴癘疫氣腳氣等病金牙研一兩一分牛黃研一分天雄炮裂去皮臍萆薢黃芩去黑心麝香研烏頭炮裂去皮臍各半兩細辛去苗葉葳蕤桂去粗皮莽草炙犀角鎊乾薑炮各三兩蜈蚣炙一枚黃連去須一兩上搗羅為散每服三錢用溫酒調下日三夜二以效為度又以囊盛方寸男左女右帶之赤茯苓散出聖惠方專治瘴毒腳氣胸膈氣不通乍寒乍熱頭痛心煩不下飲食宜服此方赤茯苓川升麻各一兩甘草炙微赤銼三分知母一兩犀角屑木香各三分前胡三分去蘆石膏一兩旋覆花半兩麥門冬一兩去心紫蘇莖葉檳榔各一兩上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服治腳膝疼痛不欲飲食豬苓一兩去黑皮赤茯苓一兩柴胡一兩去苗吳茱萸一分湯洗焙乾炒甘草銼炙木香黃芩犀角屑各三分檳榔一兩上為散每服四錢以水一中盞入生薑半分不計時候溫服知母散出聖惠方專治瘴毒腳氣發寒熱頭痛腳膝煩疼腹中妨悶不能飲食食則無味口乾多渴宜服之知母川升麻各三兩木香半兩赤茯苓三分鱉甲一兩塗醋炙去裙襴黃芩三分柴胡一兩半去蘆檳榔一兩半去蘆栝蔞根三分上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服木香散出聖惠方專治瘴毒腳氣初覺嘔逆煩悶頭昏不食宜服此方木香半兩檳榔一兩半夏半兩湯浸去滑犀角屑半兩旋覆花半兩赤茯苓一兩陳橘皮一兩湯浸去白穰紫蘇葉一兩甘草半兩炙微赤銼上為散每服四錢以水一中盞入生薑半分香豉百粒煎至六分去滓不計時候溫服羚羊角湯出聖濟總錄專治江東腳氣盛發上衝脾胃胸膈妨悶噫氣不暢煩熱口渴眼暗不識人羚羊角鎊犀角鎊各一兩半升麻旋覆花木香各一兩大腹皮五顆連皮子銼枳殼去瓤麩炒麥門冬去心焙前胡去蘆各一兩一分上粗搗篩每服五錢以水一盞半煎至一盞去滓空腹服之以快利為度大腹湯服前羚羊湯得快利後浮熱未除氣復嘔逆不下飲食胸膈有痰腹常如空虛大腹七顆連皮子銼犀角鎊木香各二兩前胡去蘆頭一兩半旋覆花一兩半夏湯浸七次去滑焙赤茯苓去黑皮各二兩上搗篩每服五錢以水一盞半生薑一分拍碎煎至七分去滓空腹服日再升麻湯服前二方氣退客熱未定乾渴不止胸膈尚煩腳疼痛升麻白茯苓去黑皮各二兩青竹茹一兩木香一兩黃芩去黑心一兩半石膏三兩麥門冬去黑心焙二兩桑根白皮銼二兩右粗搗篩每服五錢水一盞半生薑一分拍碎棗二枚劈破煎至八分去滓溫服日再犀角散治腳氣瘴毒心神悶亂犀角一兩木香半兩射干一兩川升麻一兩麥門冬一兩去心柴胡一兩去苗甘草半兩炙銼鱉甲二兩塗醋炙黃去裙襴上為散每服四錢以水一中盞入生薑半分煎六分去滓不計時候服厚朴湯治嶺南腳氣上攻心痛悶亂厚朴去粗皮生薑汁製木香檳榔各一兩上各搗為末先以水三盞入生薑一分厚朴末三錢煎取濃汁二盞下檳榔木香末各三錢再煎一兩沸去滓不拘早晚溫服當快利一兩行為效療冷脹毒悶方上用金牙散以湯少許和散如棗核大服之猝患吐者一服四分用之神良茯苓湯治江東腳氣盛發兩腳浮腫小便赤澀心腹妨悶氣急坐臥不得赤茯苓去皮桑根白皮銼防己木香黃芩去黑心各三兩木通細銼二兩大腹七顆連皮子銼郁李仁湯浸去皮研二兩半上搗篩每服五錢水一盞半生薑一分拍碎煎至七分去滓早晚食前服犀角湯治腳氣之疾先起嶺南稍來江東皆由卑濕得之或微覺疼痹或兩脛腫滿行走痹弱或上入腹不仁或時冷熱皆其候也若先覺此證食嘔不下氣上逆者宜服此方半夏湯治江東初患腳氣不識其候始腳脛酸重噁心頭旋嘔吐腹中刺痛胸中悶塞時憎寒壯熱如瘧者皆腳氣所致半夏湯洗去滑薑汁製黃芩去黑心各二兩旋覆花三分赤茯苓去黑皮麥門冬去心桑根白皮各二兩大腹連皮子銼五顆上粗搗篩每服五錢水一盞半入棗二枚劈破生薑一分拍破煎取七分去滓空心服之木香湯治嶺南腳氣卒發衝心悶亂木香郁李仁湯浸去皮炒各四兩防己一兩半紫蘇莖葉一兩細銼桑根白皮銼赤茯苓去皮各二兩大腹四顆連皮子銼上搗篩每服五錢水一盞半入生薑一分煎至一盞去滓不拘時溫服如倉猝不及者只以檳榔末三錢水一盞煎至七分服之亦效獨活浸酒治嶺南熱毒風盛濕氣鬱蒸腳氣發動脾肺常有虛熱心神煩悶腳膝痠疼獨活去蘆頭生乾地黃焙各三兩海桐皮二兩生黑豆皮一大升桂去粗皮一兩生沃實根一斤大麻子仁一升炒上銼如黑豆大以生絹袋盛用無灰酒三斗同納瓷甕中浸之冬七日夏三日春秋五日不限早晚隨意飲之常令有酒氣酒盡更添藥無味即再作大麻子湯治腳氣瘴氣乍寒乍熱狀如瘧疾腳氣上攻心悶咳嗽癱緩及治腳弱風毒面腫大麻子仁微炒升麻射干菖蒲甘草炙麻黃去根節大黃銼碎醋炒各一兩上搗篩每服五錢以水一盞半入豉半合同煎至七分去滓下芒硝一錢更煎一兩沸空心日午近晚各一服以微利為度解毒熱有腫滓敷之凡覺氣滿輒服一劑佳犀角湯出聖濟總錄專治江東腳氣小欲動作漸覺心悶腳脛痠疼煩熱不止犀角鎊木香前胡去蘆頭各一兩青竹茹三分麥門冬去心一兩半大腹二顆連皮子銼上粗搗篩每服五錢以水一盞半煎至一盞去滓不拘時候溫服旋覆花湯出聖濟總錄專治江東腳氣發動吐痰心悶氣隔見食噁心心下拘急旋覆花一兩赤茯苓去黑皮桑根白皮銼半夏湯洗七次去滑各二兩紫蘇莖葉細銼一兩大腹皮五枚連皮子銼上粗搗篩每服五錢以水一盞半大棗二枚劈煎取一盞去滓納生薑汁一合空腹服之如要疏利入檳榔末二錢湯成下吳茱萸湯出聖濟總錄專治江東腳氣已發兼宿冷氣衝心煩痛大便秘腹脹如鼓漸至悶亂吳茱萸湯浸焙炒一兩一分木香厚朴去粗皮薑汁炙各二兩大腹連皮子銼五枚牽牛子一兩別搗末湯成下上除牽牛子外粗搗篩每服三錢以水一盞半生薑一分拍碎煎取七分去滓納牽牛子末一錢攪令勻空心服之以大小便通利為度香豉湯出聖惠方療嶺南瘴氣煩熱腳氣衝心悶氣欲絕方香豉一升梔子十四枚擘升麻二兩上切以水四升煮取一升半分為三服即定也檳榔湯出聖濟總錄專治嶺南腳氣猝發衝心悶亂檳榔末大腹皮末陳橘皮末各為粗末三錢上先以童子小便並水各一盞煎大腹皮陳橘皮末至一盞半次下檳榔末再煎取沸去滓漸漸溫服未退再服一方用酒煎若能常飲此酒必佳及卑濕處亦佳又恐有似腳氣者即宜服之香犀酒香豉三升犀角八兩銼末上香豉如前不能九蒸九曝三蒸三曝亦得用一生絹袋貯用好美酒九升漬之五日其犀角末散著袋外每服常攪令犀角末入酒中服三合量性增減日三服其酒夏月初作多恐壞不耐久可用此方豉三合橘皮生薑蔥細切任意調和先熬油令香熟次下諸物煎熟以綿裹納鐺中著酒任性飲之一方出肘後方先煎牛乳三升令減半以五合服硫黃末一兩服畢覆取汗勿令得風中間更一服至暮又一服若已得汗不更服但好好將息護之若未瘥愈後數日中亦可更作若長服亦可煎為丸北人服此療腳多效但須極好硫黃取預備之旋覆花飲出聖濟總錄專治乍處江嶺未服水土食飲不下卑濕腳氣發動時復心悶面目腳膝浮腫氣乏唇口青黑胸膈煩熱見食吐嘔心腹妨痛冷氣結聚如有此症急服旋覆花一兩赤茯苓去黑皮二兩吳茱萸湯浸焙炒三分前胡去蘆頭一兩一分木香一兩半郁李仁去皮炒一分半夏湯洗七次去滑薑汁製二兩大腹五顆連皮子銼上搗篩每服五錢水一盞半生薑一分拍碎煎取七分去滓早晚食前服或要疏利別入檳榔末二錢服之一方出肘後方專治嶺南瘴腳氣用白礬石二斤亦可用鍾乳末附子三兩豉三升酒三斗漬四五日稍飲之若有氣加蘇子二升肘後用礬石一方出肘後方專治瘴腳氣用山柏根搗碎酒飲之又酒若水煮大豆汁飲之愈又方出聖惠方專治瘴腳氣食小豆亦佳又研胡麻酒和服之瘥治瘴毒所侵才覺腳氣急療方出廣南四時攝生論黑豆二合杉木節半兩炒生薑半兩炒童子小便半大盞上各炒後便入小便浸良久以水同煎三五沸漉去滓通口服之其疾立定續用後藥橘皮半夏枳殼去瓤麻黃茱萸狼毒上等分為散空心熱水調下三二錢治瘴毒及腳氣心狂者出廣南四時攝生論黃芩鐵華粉各一兩牡蠣燒二兩黃丹半兩炒令黑色入地炕內三日上為散每服用淡竹瀝調一錢服之治忽中瘴毒及風毒腳氣衝心悶絕方出廣南四時攝生論硫黃烏藥杉木節訶子皮青橘皮各半兩肉豆蔻檳榔上為散每服一錢小便二盞入生薑半兩拍破黑豆三合同煎取半盞分為二服空心午時服忌羊肉鵝鴨等物治瘴毒心間痞悶元藏氣虛方出廣南四時攝生論烏藥蓬莪朮白朮青橘皮白蘞高良薑枳殼去瓤麩炒等分上搗羅為散每服更入茴香末一匙以溫酒同調一錢升麻散出聖惠方專治瘴毒腳氣發動心胸燥熱悶亂氣急口乾舌焦煩渴大小腸不利川升麻一兩黃芩一兩赤茯苓一兩木香半兩犀角屑半兩川朴硝一兩麥門冬一兩去心甘草半兩炙微赤銼上件藥搗粗羅為散每服四錢以水一中盞入生薑半分青竹茹一分煎至六分去滓不計時候溫服腳氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛小滿或行起忽弱或小腹不仁或時冷時熱此其候也不即治轉上入腹便發則殺人治之多用湯酒摩膏種數既多不但一劑即可以少瘥若服此不效兼用灸法出肘後方取好豉一升三蒸三曝乾以好酒三斗漬之三宿可飲隨人多少欲預防不必待時便與酒煮豉服之腳弱可得小愈更營諸方服之獨活酒方出肘後方獨活五兩附子五兩生用上切以酒一斗漬浸三宿服從一合始以微痹為度腳氣上生風毒瘡附論夫腎主於腳若腎虛風濕所搏攻於腳膝則名腳氣因其氣血壅滯濕毒氣盛於膚腠不得宣通故令腳上生瘡也若風毒不歇其瘡漸增多汗腫痛身體壯熱經久難瘥也方石南丸出指直方專治風毒腳腫生瘡或筋攣痛重石南葉薏苡仁杏仁湯浸去皮炒微赤牽牛炒熟大腹子連皮用川芎川續斷赤芍藥赤小豆陳皮去白當歸去蘆麻黃去節各二兩五加皮牛膝各三兩宣木瓜獨活去蘆萆薢杜仲薑汁製炒各四兩上為細末以酒浸蒸餅研糊為丸如梧桐子大每服三十丸煎木瓜湯下早起日中臨臥各一服漏蘆丸出聖惠方專治腳氣腫盛生瘡久不瘥膿血長流疼痛不歇漏蘆一兩葳蕤一兩檳榔一兩枳殼一兩麩炒去瓤銼秦艽一兩去苗防風半兩去蘆頭獨活半兩五加皮三分赤芍藥三分川大黃一兩銼碎微炒焦黃耆三分銼黃芩半兩烏蛇三兩酒浸去白骨炙令微黃上為細末煉蜜和搗三二百杵丸如梧桐子大每服不計時候溫服酒送下三十丸犀角散出聖惠方治腳氣生毒瘡腫疼痛心神煩熱犀角屑三分天麻三分羌活三分枳殼三分麩炒去瓤防風三分去蘆頭黃耆三分銼黃芩三分白蒺藜三分微炒去刺檳榔一兩烏蛇一兩酒浸去皮骨炙黃白蘚皮三分甘草半兩炙微黃上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時溫服治腳氣風毒壅盛生瘡腫痛不歇出聖惠方牛蒡子一兩微炒枳殼一兩麩炒微黃去瓤防風半兩去蘆頭薏苡仁三分玄參三分獨活一兩檳榔一兩赤芍藥三分烏蛇三兩酒浸去皮骨炙微黃上為散每服三錢以水一中盞煎至六分去滓不計時溫服秦艽散出聖惠方專治腳氣風毒生瘡腫痛秦艽一兩去蘆玄參一兩地骨皮一兩獨活一兩黃耆一兩枳殼一兩麩炒去瓤杏仁一兩湯浸去皮尖雙仁炒黃上為散每服四錢以水一中盞煎至六分去滓每於食前溫服治腳腫方男子六十一歲腳腫盛生瘡忽食豬肉不安醫以藥利之稍愈時出外中風汗後頭暴腫起紫色多唾耳輪上有浮泡小瘡黃汗出以小續命湯加羌活一倍煎服之遂愈漏蘆丸療腳氣腫盛因生瘡積年不瘥膿血長流者此是風毒氣為冬間服藥酒壅滯散在腠理宜服此方療風癢及諸癬疥百病輕腰腳兼通大腸療肺中熱毒氣方漏蘆葳蕤烏蛇脯炙各二錢四分枳實一錢六分炙苦參一斤搗去筋脈取粉秦艽九分干麥門冬一錢二分去心漢防己八分玄參二錢二分白朮黃耆各一錢二分大黃二錢四分黃芩八分上搗篩煉蜜和丸如梧桐子大每服四十丸日漸再加至五十丸無論食前食後服沃實酒下藥沃實酒牛蒡根三大升枳實八兩炙毛磁石一斤綿裹薏苡仁一升玄參六兩烏蛇脯六兩炙生地黃切二大升烏豆小粒者一大升上細切絹袋盛以好無灰酒一大斗浸經三日任性多少將以下煎藥白蘞湯洗之白蘞湯洗方治腳氣風毒瘡腫疼痛漏蘆切一大升白蘞五兩槐白皮切蒺藜子五加根皮切各一大升甘草三兩炙上六味切以水二大斗煮取六升納芒硝半大升烊即洗其湯微溫如人體如瘡熱溫布搵上忌海藻菘菜腳氣雜治膏藥淋渫等附論腳氣服補藥及用湯渫洗者皆醫之大禁也此為南方外感濕氣乘虛襲入為腫痛而言非為北方內受濕氣注下足腫而言也蓋內受濕氣不能宣達宜淋渫開導泄越其邪也方防己膏出聖惠方專治腳氣風毒筋脈拘急腫滿疼痛漢防己一兩野葛一兩半犀角屑一兩莽草一兩半川烏頭一兩去皮臍吳茱萸一兩川椒一兩去目丹參一兩半躑躅花