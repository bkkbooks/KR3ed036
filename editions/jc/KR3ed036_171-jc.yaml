body:
  text: 卷一百七十一積聚門息賁附論凡積氣在右脅下覆大如杯者肺積也氣上賁沖息有所妨名曰息賁此本心病傳肺肺當傳肝肝以春適旺而不受邪復還於肺故結為積久不已令人灑淅寒熱喘咳發肺癰以春甲乙日得之所以然者肺主氣外合於皮毛今肺氣留積故有寒熱喘咳肺癰之病方半夏湯治肺積息賁咳嗽半夏湯洗去滑切片焙乾桑根白皮炙銼細辛去苗葉前胡去蘆頭各一兩半桔梗炒甘草炙銼貝母去心柴胡去苗人參訶黎勒白朮各一兩上粗搗篩每服三錢水一盞棗三枚擘破生薑半分拍碎煎至七分去滓服食後夜臥各一服桃仁煎丸治息賁氣右脅下結硬如杯心腹脹痛不能飲食胸膈壅悶咳嗽喘促桃仁三兩湯浸去皮尖雙仁細研以酒三升同硼砂煎成膏硇砂一兩半不夾石者研鱉甲一兩塗醋炙令黃去裙襴川烏頭半兩去皮臍銼鹽拌炒令黃紫菀半兩去苗土豬牙皂莢半兩去皮塗酥炙令焦黃防葵半兩木香三分檳榔三分乾薑半兩炮裂銼上為細末入桃仁硇砂煎蜜熔和丸如桐子大每服食前生薑湯下十五丸防己湯出聖濟總錄治肺積息賁下氣防己大腹取皮去子用各一兩半郁李仁浸去皮大麻仁炒檳榔銼陳橘皮湯浸去白焙桑根白皮銼炙訶黎勒微煨去核各一兩甘草炙銼半兩上除郁李仁麻仁外粗搗篩再同搗勻每服三錢入姜三分拍碎以水一盞煎八分去滓溫服空心午時以利為度紫菀散出聖惠方治息賁氣在右脅下結聚脹痛喘促咳嗽紫菀一兩去苗土吳茱萸半兩湯浸七次焙乾微炒白朮半兩鱉甲一兩塗醋炙令黃去裙襴當歸半兩桂心半兩檳榔半兩郁李仁一兩湯浸去皮微炒枳實半兩麩炒微黃上為粗散每服三錢水一盞生薑半分煎至六分去滓不拘時候溫服枳實丸出聖惠方治息賁氣腹脅脹硬咳嗽見血痰黏不利枳實半兩麩炒微黃木香半兩檳榔半兩訶黎勒皮半兩甜葶藶半兩隔紙炒令紫色赤茯苓半兩五味子半兩甘草半兩炙微赤銼杏仁一兩湯浸去皮尖雙仁麩炒微黃上為細散每服三錢水一中盞煎六分去滓不拘時候溫服大腹皮散出聖惠方治息賁氣腹脅脹滿喘急咳嗽坐臥不安大腹皮五枚赤茯苓一兩前胡一兩去蘆銼訶黎勒皮半兩檳榔半兩木香一兩漢防己半兩桃仁一兩湯浸去皮尖雙仁麩炒黃川大黃一兩銼碎微炒上為粗散每服三錢水一中盞生薑半分煎六分去滓不拘時候溫服三稜丸出聖惠方治息賁氣右脅下結聚成塊喘咳胸痛嘔吐痰涎面黃體瘦荊三稜一兩泡銼碎醋拌炒令黃川大黃二兩銼碎微炒附子一兩炮裂去皮臍鱉甲一兩半塗醋炙令黃去裙襴檳榔一兩訶黎皮二兩木香一兩桃仁一兩湯浸去皮尖雙仁麩炒微黃吳茱萸半兩湯浸七次焙乾微黃上為細末以酒煮麵糊和搗三二百杵丸如桐子大每服食前生薑湯下二十丸枳實木香丸治肺積息賁氣枳實去穰麩炒二兩木香陳橘皮湯浸去白焙人參海藻水洗去咸焙葶藶紙上炒令紫色各一兩芍藥銼丁香各三分上為末棗肉和丸如桐子大每服二十丸用炒豆煎湯下空心日午夜臥各一服漸加至三十丸檳榔散治息賁氣胸膈妨實右脅下堅急上氣咳嗽檳榔一兩赤茯苓三分赤芍藥三分吳茱萸三分荊三稜三分訶黎勒皮三分郁李仁一兩湯浸去皮微炒青橘皮三分湯浸去白穰焙上為粗散每服三錢水一中盞生薑半分煎六分去滓不拘時候溫服牛蒡子散治息賁氣令人喘咳心腹脹滿脅下疼痛牛蒡子一兩微炒木香一兩當歸一兩荊三稜一兩炮銼碎吳茱萸半兩湯浸七次焙乾炒微黃檳榔半兩川大黃一兩銼碎微炒鱉甲二兩塗醋炙令黃去裙襴上為粗散每服二錢溫酒調下食前服生薑橘皮煎湯下亦得木香丸治息賁氣胸膈滿悶腹脅堅急四肢不和食少無力木香一兩鱉甲一兩半塗醋炙令黃去裙襴桂心一兩吳茱萸一兩半湯浸七次焙乾微炒訶黎勒皮一兩半檳榔一兩半枳實一兩麩焙微黃牽牛子三兩微炒上為細末以酒煮麵糊和丸如桐子大每日空心溫酒下三十丸息賁湯治肺之積在右脅下大如覆杯久久不愈洒洒寒熱氣逆喘咳發為肺癰其脈浮而毛半夏湯浸七次吳茱萸湯洗桂心各二兩半人參甘草炙桑白皮炙葶藶炒各二兩半上銼為散每服四錢水一盞半姜七片棗二枚煎七分去滓食前服一方無人參此病患者積久看脈有力咳嗽而脅下痛者則以十棗湯下之卻用息賁湯調理其效尤速枳實湯治肺積息賁上氣胸滿咳逆枳實去穰麩炒木香檳榔銼甘草炙銼吳茱萸湯浸焙乾炒葶藶紙上炒令紫色各半兩杏仁湯浸去皮去雙仁炒三分上粗搗篩每服三錢水一盞生薑一分拍碎同煎至七分去滓溫服空心食前日三桑白皮湯治肺積息賁上氣脹滿咳嗽涕唾膿血桑白皮銼麥門冬去心焙各一兩半桂去粗皮一兩半甘草炙銼半兩陳橘皮湯浸去白焙豬牙皂莢酥炙去皮各一兩上粗搗篩每服三錢水一盞入生薑半分拍碎煎至七分去滓溫服空心晚食前各一服芫花煎丸治息賁氣結塊在右脅下疼痛芫花一兩半醋拌炒令乾為末硼砂一兩不夾石者細研用米醋二斤同芫花末熬成膏鱉甲一兩半塗醋炙令黃去裙襴荊三稜一兩銼微炒青橘皮一兩湯浸去白瓤焙上為細末入芫花硼砂膏中入小蒸餅和熔為丸如桐子大每服食前生薑湯下十丸皂莢丸治肺積息賁上氣皂莢二梃不蛀者酥炙去皮子銼桂去粗皮乾薑炮貝母去心上等分搗羅為末煉蜜和丸如梧桐子大每服空心日午生薑湯下十五丸加至二十丸五靈脂丸治肺喘久而息賁五靈脂二兩半木香半兩馬兜鈴去殼炒一分葶藶一分上為細末棗肉和丸如桐子大每服二十丸生薑湯下日三服推氣散治右脅下大如杯久不已令人灑淅寒熱喘嗽發肺癰枳殼炒桂心各半兩甘草二錢片子薑黃半兩上為細末每服二錢薑湯調服熱酒亦得不拘時候大棗丸治證如前葶藶橘皮桔梗上等分為細末以棗肉為丸如桐子大每服三十丸米飲湯下治息賁氣喘咳心膈不利出聖惠方訶黎勒皮一兩郁李仁一兩湯浸去皮微炒研木香一兩上為細末入郁李仁研令勻每服不計時候以生薑湯調下二錢肺之積息賁丸出試效方治右脅下覆大如杯久不已令人灑淅寒熱喘嗽發肺癰厚朴薑製八錢黃連去須炒一兩三錢乾薑泡一錢半桂去皮一錢巴豆霜四分白茯苓去皮一錢另末人參去蘆二錢桔梗一錢紫菀去苗一錢半白豆蔻一錢川烏頭炮裂去皮一錢川椒炒去汗一錢半荊三稜炮一錢天門冬一錢陳皮一錢青皮半錢上件除巴豆霜茯苓旋入外為末煉蜜丸如梧桐子大每服二丸一日加一丸二日加二丸漸加至大便溏再從一丸加服煎淡生薑湯下食遠周而復始積減大半止服秋冬加厚朴半兩通前秤一兩三錢減黃連七錢只用六錢加減息賁丸出試效方仲夏合其積為病寒熱喘嗽氣上奔脈澀失精川烏頭一錢乾薑一錢半人參二錢厚朴八分黃連一兩三錢紫菀一錢巴豆霜四分桂枝三錢橘皮一錢半青皮七分川椒炒去汗一錢半紅花少許茯苓一錢半桔梗一錢白豆蔻一錢荊三稜一錢半天門冬去心一錢半上件為細末湯浸蒸餅為丸如梧桐子大初服二丸一日加一丸二日加二丸加至大便微溏利為度再從一丸加服煎生薑湯送下食前忌酒濕面五辛大料熱物之類及生冷物賁豚附論夫腎之積名曰賁豚發於小腹上至心下若豚走之狀上下無時久不愈令人喘逆發骨痿少氣以夏丙子日得之何以言之脾病傳腎腎以傳心心以夏適旺旺者不受邪腎欲復還脾脾不肯受故留結為積故知賁豚以夏丙子日得之也賁豚氣者是腎之積也起於驚恐憂思所生若驚恐則傷神心藏神也憂思則傷志腎藏志也神志傷動氣積於腎而氣上下游走如豚之賁故曰賁豚其氣乘心若心中踴踴如車所驚如人所恐五臟不定食飲輒嘔氣滿胸中狂癡不定妄言妄見此驚恐賁豚之狀也若氣滿支心心下悶亂不欲聞人聲休作有時乍瘥乍劇翕翕短氣手足厥逆內煩結痛溫溫欲嘔此憂思賁豚之狀也診其脈來祝祝者病賁豚也腎脈微急沉厥賁豚也其足不收不得前後皆從驚恐得之腎間有膿故也師曰病如賁豚者氣從小腹起上衝喉咽發作欲死復還生皆從驚恐得之腎間有膿故也師曰病有賁豚有吐膿有驚怖有火邪此四部病者皆從驚恐得之火邪者桂枝加龍骨牡蠣湯主之若新亡財為縣官所捕迫從驚恐者療用鴟頭鉛革共千金翼方有飛鴻鉛丹丸主癲癇瘛瘲此意相近鉛革共解為馬桃末一云即羚羊角所言賁豚者病人氣息逆喘迫上如豚奔走之狀賁豚湯主之方治賁豚氣出直指方木饅頭乾者四兩銼先以皮入銚子炒次下豆並炒黃色茴香二兩炒上為細末每服二錢空心酒調服沉香石斛湯出聖濟總錄治腎臟積冷賁豚氣攻小腹疼痛上衝心胸沉香銼石斛去根陳曲炒各一兩人參赤茯苓去黑皮五味子微炒巴戟天去心炒桂去粗皮白朮芎藭各三分木香肉豆蔻仁各半兩上粗搗篩每服三錢水一盞姜三片棗三枚擘煎至六分去滓食前熱服七氣湯療憂勞寒熱愁思恐及食飲隔塞虛勞內傷五臟欲絕奔氣不能還下心中悸動不安桔梗二兩人參三兩一方二兩芍藥三兩茱萸七分枳實五枚炙黃芩二兩一方三兩乾薑三兩一方二兩桂心三兩一方二兩乾地黃三兩一方二兩橘皮三兩甘草三兩一方二兩炙半夏三兩洗一方二兩上以水一斗煮取三升去滓分三服忌海藻菘菜羊肉及生蔥豬肉蕪荑等千金無桂心橘皮桔梗有厚朴栝蔞蜀椒木香硫黃丸出聖惠方治腎積頻發小腹急脹疼痛唇口青黑木香硫黃研青橘皮湯浸去白焙乾薑炮桂去粗皮沉香銼肉豆蔻去殼蘹香子炒附子泡裂去皮臍銅青研檳榔銼各一兩上將九味搗羅為末與別研二味和勻搗研糯米飯為丸如梧桐子大每十丸蘹香酒下加至二十丸一方無沉香木香檳榔散出聖濟總錄治積病不散結伏奔豚發即上衝心胸令人喘逆骨瘻少氣木香檳榔煨銼沉香銼磁石醋洗煅訶黎勒去核蘹香子炒芎藭白芷炒牡蠣煅各半兩桂去粗皮陳橘皮湯浸去白焙各三分上搗羅為散每服二錢炒生薑鹽湯調下木香湯出聖濟總錄治一切風及腎臟奔豚氣上衝心胸悶亂木香一兩青橘皮湯浸去白焙白芷炒蘹香子炒沉香銼桂去粗皮蓬莪朮焙炒杉木節各半兩枳殼去瓤麩炒木瓜焙各三分上搗羅為散每服二錢炒生薑鹽湯下神效丸治疝氣奔豚嬰孩溺秘疝氣因何得邪風在腎經流傳並血聚如此漸成形冷氣結在臟因茲小腹疼本經無別法疏利藥通靈芫花半兩醋浸炒木香檳榔三稜各半兩炒茯苓青皮全蠍附子炮硇砂桂各二錢半上將硇砂用水浸瓷盞內沉去泥土留湯平頭同餘藥頓成膏子糠醋打糊為丸如綠豆大每服三十丸空心溫水送下沉香丸出聖惠方治奔豚氣小腹積聚疼痛或時上攻心胸壅悶沉香半兩阿魏半兩以少面和熔作餅子炙令黃木香一分桃仁半兩湯浸去皮尖雙仁麩炒微黃吳茱萸一兩湯浸七次焙乾微炒檳榔半兩蘹香子半兩青橘皮一兩湯浸去白瓤焙蛜𧌴一兩生用硇砂三兩不夾石者細研以湯一盞化澄去滓取清內銀器中煎成霜研上件藥為末入硇砂令勻以酒煮麵糊和丸如梧桐子大每服食前以姜鹽湯下二十丸蘹香子丸出聖濟總錄治腎臟久積氣膀胱虛脹上攻膨滿疼痛蘹香子三兩微炒為末水米醋二斤熬如餳附子炮裂去皮臍一兩青橘皮湯浸去白焙木香狼毒炒當歸切各焙三分阿魏研以酒一斤煎取半硇砂一兩半研沸湯化澄煎取霜入阿魏同熬如餳入蘹香煎攪勻自然銅煨醋碎研各一兩半上除煎研外搗羅為末同入煎