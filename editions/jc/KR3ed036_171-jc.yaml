沸用調平胃散三錢空心服此藥有功效但不能去根治奔豚氣上下衝走悶亂面青出聖惠方檳榔三枚搗羅為末生薑半合上藥以童子小便一大盞微熬過入前藥二味攪令勻分為三服如人行五六里進一服須臾下利為效桂枝加桂湯出指南方治奔豚氣官桂五分芍藥三分甘草二兩上為粗末每服五錢水二盞姜五片棗一枚煎至一盞去滓服奔豚丸出試效方治發於小腹上至心下若豚狀或下或上無時久不已令人喘逆骨痿少氣及男子內結七疝女人瘕聚帶下厚朴薑製七錢黃連去須炒五錢白茯苓去皮二錢川烏頭炮半錢澤瀉二錢苦楝酒煮二錢玄胡索一錢半全蠍一錢附子去皮二錢巴豆霜四分菖蒲二錢獨活一錢丁香半分肉桂去皮二分上除巴豆霜茯苓另為末旋入外為細末煉蜜為丸如梧桐子大初服二丸一日加一丸二日加二丸漸至大便溏再從一丸服淡鹽湯送下食前周而復始病減大半勿服秋冬加厚朴半兩通前一兩二錢如積勢堅大先服前藥不減於一料中加燒存性牡蠣三錢癲疝帶下病勿加解鈴丸出楊氏家藏方治奔豚氣疼痛手足拳縮不可忍者茴香一兩同青鹽一兩研細同炒蠍梢一分去毒炒蓬莪朮用紙數重裹油內蘸燈上燒過銼碎一兩上件為細末酒煮麵糊為丸如梧桐子大每服三十丸溫酒鹽湯送下空心食前奔豚湯出千金方治氣奔急欲絕者吳茱萸一升石膏人參半夏芎藭各三分桂心芍藥生薑各四分生葛根茯苓各十分當歸四兩李根皮一斤上十二味㕮咀以水七升清酒八升煮取三升分三服木香散出聖惠方治奔豚氣上衝心胸悶亂臍腹脹痛飲食轉嘔木香一兩青橘皮半兩湯浸去白瓤焙檳榔一兩白朮半兩沉香一兩蘹香子半兩木瓜三分焙乾桂心一兩蓬莪朮半兩杉木節半兩上件藥搗細羅為散每服不計時候以溫酒調下二錢治奔豚氣及內外腎釣並霍亂轉筋出本草以椒葉和艾及蔥研以醋湯拌罨並得一方以椒葉搗傳外煎水洗腳息積附論內經謂病脅下滿氣逆二三歲不已病名曰息積夫消息者陰陽之更迭也今氣聚脅下息而不消積而不散故滿逆而為病然氣不在胃故不妨於食特害於氣而已其法不可灸刺宜為導引服藥藥不能獨治者蓋導引能行積氣藥力亦借導引而行故也導引法積聚心腹脹滿附論夫臟腑不和則血氣留滯而成積聚蘊結氣不宣通與臟氣相傳故令人心腹脹悶煩滿短氣若為寒邪所並則傳於腑陰陽相擊而致心腹疼痛甚則泄痢也方木香三稜丸治胸膈痞悶腹脹滿脅肋痛食飲遲化四肢困倦嘔逆噁心口苦無味積滯冷物不思飲食癥瘕疣癖堅硬氣塊並宜服之小兒傷食服之其效如神木香丁香砂仁紅豆姜屑炒甘松水洗良薑厚朴薑製香附子炒枳實炒枳殼蘿蔔子各一兩荊三稜石三稜雞爪三稜檳榔青皮去瓤陳皮去白各一兩半莪朮醋炙神麯炒麥芽炒甘草炒各二兩牽牛炒蒼朮泔浸一半醋浸一半各八兩蓽澄茄白豆蔻雷丸青木香藕節各半兩上為細末滴水丸如梧桐子大每服四五十丸溫生薑湯送下食後服太乙神明陷冰丸治諸疾破積聚心下支滿寒熱鬼注長病咳逆唾噫闢除眾惡殺鬼逐邪惡氣胸中結氣咽中閉塞有進有退繞臍惻惻隨上下按之跳手心中慍慍如有蟲狀毒注相染減門雄黃油煮一日丹砂礬石當歸大黃各二兩巴豆一兩犀角鬼臼射罔藜蘆各一兩真珠附子各一兩半麝香牛黃人參各半兩蜈蚣蜥蜴各一枚芫青五枚烏頭八枚杏仁四十枚斑蝥四十枚樗雞三七枚地膽三七枚桂心三兩上為末蜜和搗三萬杵丸如小豆大先食飲服二丸如不知稍加仍以藥二丸安門戶上使眾惡不敢近家及視病人夜行獨宿服二丸令眾惡不敢近身傷寒服之無不即瘥治心腹疝瘕脅下及小腹滿堅痛有積寒氣入腹使人腹中冷發則上搶心氣滿飲食喜嘔出千金方大黃茯苓各一兩半桂心黃芩吳茱萸細辛人參蜀椒各半兩乾薑一兩六銖男發灰半兩牡丹甘草芎藭蓯蓉䗪蟲各十八銖芍藥防葵虻蟲厚朴半夏各一兩上為末蜜丸如梧桐子大每服五丸日再漸加之沉香餅子出御藥院方治飲食停積胸膈痞滿脅腹疼痛嘔吐不止沉香木香桂去粗皮藿香葉硇砂另研各等分荊三稜蓬莪朮青皮陳皮紅豆訶子皮縮砂仁半夏芫花醋炙乾漆炒出煙檳榔薑黃巴豆去皮益智以上為粗末慢火炒令褐子色各等分上為細末打白麵糊丸如小豆大捏作餅子初服七餅子漸加至十餅子更量虛實加減溫生薑湯食後服參苓丸出聖濟總錄治積聚脹滿減食黃瘦人參赤茯苓去黑皮細辛去苗土干熟地黃焙枳實去瓤麩炒當歸焙麥門冬去心焙附子炮裂去皮臍乾薑炮大黃銼炒厚朴去粗皮塗生薑汁炙桂甘草炙銼各一兩烏頭炮裂去皮臍桔梗炒紫菀去苗土蜀椒去目並閉口炒出汗各一兩上為末煉蜜和丸如梧桐子大每服七丸空心溫酒下日再漸加至十丸以知為度芍藥湯出聖濟總錄治積聚心下脹滿甚則泄痢氣不升降赤芍藥赤石脂大腹皮荊三稜煨銼桂去粗皮桑根白皮銼焙各一兩半肉豆蔻去殼一枚桃仁去皮尖雙仁炒三十枚附子炮裂去皮臍白朮木香枳殼去瓤焙炒當歸切焙麻黃去根節黃連去須各一兩上銼如麻豆大每服五錢水一盞半入生薑三片同煎至八分去滓溫服訶黎勒散出聖惠方治積聚心腹脹滿不能下食四肢瘦弱訶黎勒三分煨用皮木香三分檳榔三分前胡半兩去蘆頭桂心半兩荊三稜半兩炮銼當歸半兩銼微炒黃耆半兩銼人參半兩去蘆頭枳殼半兩麩炒微黃去瓤白朮半兩赤茯苓半兩芎藭半兩厚朴三分去粗皮塗生薑汁炒令黃熟青橘皮三分湯浸去白瓤焙上為粗散每服三錢水一中盞生薑半分棗三枚煎至六分去滓每服食前稍熱服之硇砂丸治積不消心腹脹滿化氣消積大黃銼炒乾漆炒出煙青橘皮去白焙芫花另搗末芎藭各半兩硇砂別研沒藥別研桂去粗皮當歸切焙烏頭去皮臍巴豆去皮心膜出油盡荊三稜煨銼鱉甲去裙襴醋炙蓬莪朮煨銼各一分上搗羅十味為末用釅醋半升於銅石器內下芫花硇砂巴豆三味慢火煎漸添醋一升即入十味並沒藥末同熬成膏放冷別入陳曲末一兩半拌和丸如綠豆大每服三丸至五丸茶酒生薑湯任下烏頭丸療心腹積聚脹滿少食多見繞臍痛按之著手寒中有水氣女人產後余疾大人風癲少小風驚癇百病之症元嘉中用療數人皆良有一人服五服藥即出蟲長一尺餘三枚復出如牛膽黑堅四枚中皆有飯食即愈病源云積聚成病蘊結在內則氣行不宣通還轉於腑臟故心腹脹滿則斂悶而結氣也烏頭七枚炮乾薑皂莢連皮子炙蜀椒炒出汗各五分桂心吳茱萸各四分菖蒲柴胡附子炮人參厚朴黃連茯苓桔梗各三分上搗篩煉蜜和丸如梧桐子大每服二丸日三稍加至十五丸忌豬肉冷水醋物生蔥羊肉餳一方無附子消痞丸治積濕熱毒甚者身體面目黃心脅腹滿嘔吐不能飲食者痿弱難以運動咽嗌不利肢體焦尪眩悸膈熱坐臥不寧心火有餘而妄行上為嗽血衄血下為大小便血腸風痔漏三焦壅悶癉熱消渴傳化失常小兒疳積熱黃連乾葛各一兩黃芩大黃黃柏梔子薄荷藿香厚朴茴香木香揀桂青黛各半兩牽牛二兩上為細末滴水丸如豆大每服十丸新水下溫水亦得小兒丸麻子大病本濕熱為佳快活丸治胸膈飽悶木香橘紅青皮縮砂仁檳榔枳殼蓽澄茄白朮乾生薑三稜各三錢廣木神麯甘草各半兩上為細末滴水發丸如綠豆大每服六十丸用生薑湯下食後沉香煎丸出聖濟總錄治積聚心腹脹滿不思飲食沉香木香青橘皮去白焙阿魏醋化面和作餅炙胡椒沒藥研檳榔銼丹砂研硫黃研硇砂研高良薑各一兩巴豆霜二錢丁香半兩上除研藥外搗羅為末一處研勻用重湯煮蜜丸如梧桐子大每服三丸煎橘皮湯下枳實丸出聖濟總錄治久積氣不散心胸滿悶四肢不收痞膈不通枳實去瓤麩炒一兩白朮檳榔銼陳橘皮湯浸去白各三分甘草銼炙昆布洗出咸焙生薑切炒各一分赤茯苓去黑皮青木香桂去粗皮訶黎勒皮大黃煨銼各半分草豆蔻去皮一兩上為末煉蜜丸如梧桐子大每服二十丸生薑木瓜湯下乾薑丸出聖惠方治積聚心腹脹滿食少乾薑半兩炮炒皂莢一兩去黑皮塗酥炙令黃炒去子菖蒲三分川烏頭一兩炮裂去皮臍柴胡三分去苗人參三分去蘆頭黃連三分去須桂心三分赤茯苓三分吳茱萸半兩湯浸七次焙乾微炒厚朴一兩去粗皮塗生薑汁炙令香熟川椒去目及閉口者上為細末煉蜜和搗三二百杵丸如梧桐子大每服於食前溫酒送下二十丸肉豆蔻散出聖濟總錄治積心腹脹滿宿食不化氣刺㽲痛泄瀉善噫吞酸食欲嘔吐手足逆冷白豆蔻去皮三分桂去粗皮丁香附子炮裂去皮臍各半兩高良薑陳橘皮去白焙木香甘草肉豆蔻去殼各一分人參半兩枳殼去瓤麩炒半兩上搗羅為散每服二錢煎木瓜生薑湯調下荊三稜煎湯出聖濟總錄治腑臟不和氣血留滯積聚痞滿心腹妨悶食物減少煩悶短氣荊三稜煨銼大腹連皮子炙延胡索天雄泡裂去皮臍芎藭白朮各一兩半桃仁湯浸去皮尖雙仁炒三十枚桂去粗皮當歸切焙硝石郁李仁湯浸去皮各一兩上㕮咀如麻豆大每服四錢用水一盞半入生薑二片煎七分去滓溫服開結導飲丸出聖惠方治飲食不消心下痞悶
