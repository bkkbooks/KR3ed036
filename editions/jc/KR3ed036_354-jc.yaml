瞿麥黃芩冬葵子各二兩通草二兩大棗十一枚上以水七升煮取二升半分作兩服大麻仁散出聖惠方治產後小便淋瀝疼痛大麻仁一兩榆白皮一兩銼葵子一兩瞿麥半兩甘草一分炙銼上為散每服三錢水一盞煎至六分去滓溫服滑石散治產後淋滑石五兩通草車前子葵子各四兩上治下篩酢漿水服方寸匕稍加至二匕療產後血淋車前子瞿麥各四兩黃芩三兩鬱金末一兩上以水六升煮取二升下鬱金末分三服瞿麥湯治產後淋痛因虛損有熱氣客於胞中血隨小便出為血淋淋者如雨之淋者也內虛則起數內熱則小便澀痛乃曰淋瞿麥黃芩通草各半兩大棗十二枚上以水一盞半藥四味每四錢煎至大半盞去滓服治產後小便淋不通七八日滑石六錢葵子三錢寒水石四錢上為散每服三錢水一盞半煎至大半盞空心服治產後小便淋瀝不通葵子一合朴硝八分上水二升煮取八合下硝分四服又方熨法用蛇床子炒乘熱布裹之熨患處亦治陰痛治產後小便淋瀝腹脅脹滿時腹疼痛用鼠婦半兩炒為末每服半錢溫酒調下治產後小便血附論夫產後損於血氣虛而挾瘀熱血氣得熱則流散滲於脬故血隨小便出也方石葦散治產後臟有積熱致小便出血石葦去毛三兩榆白皮銼三兩黃芩三兩木通銼二兩赤芍藥一兩冬葵子二兩甘草二兩上為末每服三錢水一盞煎至六分去滓食前溫服一方無甘草茜根散治產後小便出血茜根一兩石葦去毛木通銼各二兩子芩一兩生乾地黃一兩滑石二兩上為散每服三錢水一盞煎至六分去滓食前溫服又方瞿麥一兩黃芩冬葵子木通銼茜根當歸各一兩上為末每服四錢水一盞煎至六分去滓食前溫服又方貝齒五枚燒灰葵子一兩車前子一兩滑石二兩生乾地黃一兩茜根一兩上為末每服二錢食前溫水調下又方車前子二兩瞿麥黃芩鬱金蒲黃各一兩上為末每服二錢茅根湯食前調下又方治產後小便出血亂髮灰洗淨燒滑石各半兩上為末令勻每服一錢生地黃汁調下一方無滑石米飲調服又方生地黃生刺薊各半斤上搗絞汁每服一小盞食前飲下又方生乾地黃阿膠搗炒各一兩上為末每服二錢食前茜根湯調下小便頻數不禁附論夫產後小便頻數不禁者此由脬內宿有冷氣因產後發動冷氣入腹虛弱不能制其小便故也方雞䏶胵湯治產後小便頻雞䏶胵二三具雞腸三具洗乾地黃當歸甘草各三兩麻黃四兩厚朴人參各三兩生薑五兩大棗二十枚上㕮咀水一斗煮䏶胵及腸大棗取七升去滓納諸藥煎取三升半分三服鹿茸散出聖惠方治產後臟虛小便數多鹿茸一兩去毛塗酥炙黃耆銼一兩半牡蠣一兩半燒為末人參一兩去蘆頭熟乾地黃二兩當歸銼炒一兩五味子一兩甘草炙銼半兩雞䏶胵炙一兩半上為末每服二錢食前粥飲調下栝蔞湯出千金方治產後小便數兼渴栝蔞根麥門冬甘草黃連各二兩人參生薑各三兩大棗十五枚桑螵蛸二十枚上㕮咀以水七升煮取二升半分三服一方無麥門冬忌豬肉冷水桑螵蛸散出聖惠方治產後小便數此胞有宿冷冷氣又入腹中虛弱不能制其小便故數有遺尿者冷在胞囊漏不禁也桑螵蛸三十個燒鹿茸酥炙黃耆各三兩牡蠣煅人參厚朴赤石脂各二兩上為末空心粥飲調下二錢外臺方無厚朴石脂有甘草生薑不禁加龍骨龍骨散出聖惠方治產後小便數多龍骨一兩牡蠣一兩燒為粉桂心半兩菝葜銼一兩烏藥一兩桑螵蛸炒半兩熟乾地黃切一兩半上為散每服三錢水一盞生薑半分棗三枚煎至六分食前溫服又方出聖惠方雞䏶胵十具炙熟乾地黃半兩當歸銼半兩牡蠣一兩燒為粉厚朴三分去粗皮塗生薑汁炙黃耆銼一兩上為末每服二錢食前溫酒調下又方出聖惠方黃耆銼一兩鹿茸一兩去毛塗酥炙桑螵蛸一兩微銼牡蠣一兩燒為粉雞䏶胵一兩微銼上為末每服二錢食前粥飲調下麥門冬散出聖惠方治產後小便數兼煩渴麥門冬去心三分龍骨三分當歸三分銼微炒黃耆三分銼甘草一分炙銼上為散每服三錢水一盞生薑半分棗三枚煎至五分去滓食前溫服又方出聖惠方桑螵蛸半兩炒龍骨二兩上為細末每服二錢空心食前粥飲調下療產後遺尿不知出出便產須知白薇芍藥上等分為細末以酒服方寸匕日三服療產後小便不通出聖惠方用雞尾燒作灰細研溫酒調方寸匕日三固脬散出楊氏家藏方治婦人臨產時手傷胞破小便不禁用黃絲絹自然黃者不用染成三尺以灰汁煮極化爛用清水洗去灰令淨入黃蠟半兩蜜一兩白茅根二錢馬屁勃末二錢以水一升再煎至一盞空心頓服服時斂氣服之不得作聲如作聲無效治產後遺尿用故雞窠中草燒作末酒服二錢匕瘥治產後小便不禁出肘後方用雞屎燒灰空心酒服方寸匕治產後小便不禁用雞子燒灰酒服日三治產後小便不記度數小腸虛損方出護命方當歸五味子石斛牛膝牡蠣火煅各半兩萆薢白芷各三分益智子去皮一兩龍骨一分上為細末煉蜜丸如梧桐子大早朝空心鹽湯下四十丸病減即住只作散子吃不吃滓補脬飲出危氏方治婦人產後傷胞動破終日不能小便但漏濕不幹黃絲絹生者一尺剪碎白牡丹皮末千葉者它無效白芨末一錢上用水一碗煎至絹爛如餳空心頓服服時不得作聲作聲不效
