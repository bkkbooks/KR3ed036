body:
  text: 卷三百五十四產後諸疾門寒熱附論產後乍寒乍熱者何答曰陰陽不和敗血不散能令乍寒乍熱產後血氣虛損陰陽不和陰盛則乍寒陽盛則乍熱陰陽相乘則或寒或熱若因產傷勞臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣陰陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以別之時有刺痛者敗血也但寒熱無他證者陰陽不和也增損四物湯用法不一皆隨病加減乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二臟邪大抵一陰一陽閉即作寒熱陰勝故寒陽勝故熱只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會而復作大調經散五積散入醋煎佳方紅藍花散出聖惠方治產後寒熱頭痛手足疼惡露不快心腹刺痛紅藍花一兩甘菊花當歸銼微炒芎藭蓬莪朮赤芍藥鬼箭羽桂心以上各一兩牛膝去苗劉寄奴赤茯苓桃仁湯浸去皮尖雙仁麩炒微黃羚羊角屑以上各三分生薑半分上為散每服四錢以水一中盞煎至六分去滓不拘時候溫服黃耆散出聖惠方治產後乍寒乍熱骨節疼痛四肢無力面色痿黃黃耆一兩銼附子三分銼去皮臍鬼箭羽半兩當歸三分銼微炒芎藭半兩桂心半兩牡丹半兩赤芍藥三分鱉甲一兩塗醋炙微黃去裙牛膝三分去苗桃仁三分湯浸去皮尖雙仁麩炒微黃赤茯苓三分上為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服療產後惡寒壯熱一夜三五度發惡語口中生瘡時時乾嘔困乏悶絕人參獨活白蘚皮葛根防風遠志青竹茹各六分茯神八分白蘞十分玄參十二分竹瀝二升半上銀一斤水一斗五升煎取七升下諸藥重煎取三升分三溫服忌魚酒面等物豬腎湯出聖惠方治產後體虛寒熱發歇四肢少力心神煩悶不思飲食豬腎一對去脂膜切作四片豉半兩生薑半兩拍碎白粳米一合桂心半兩人參半兩去蘆頭當歸一兩黃耆半兩銼蔥白三根切上細銼以水二大盞煎至一盞去滓食前分為三服赤芍藥散出聖惠方治產後血氣不散乍寒乍熱骨節痠痛唇口乾焦心胸悶亂赤芍藥人參去蘆頭防風去蘆頭當歸銼焙生乾地黃紅藍花藕節以上各一兩芎藭三分羚羊角三分上為散每服四錢以水一中盞入生薑半分黑豆五十粒煎至六分去滓不拘時候溫服增損四物湯出大全良方治產後陰陽不和乍寒乍熱如有惡露未盡停滯胞絡亦能令人寒熱但小腹急痛為異人參當歸芍藥乾薑各一兩甘草四錢上㕮咀每服四錢水一盞生薑三片煎至七分去滓熱服無時候一方無甘草有乾地黃一方云大抵一陰一陽閉即作寒熱陽勝故熱陰勝故寒只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會而復作大調經散五積散入醋煎佳石膏散出聖惠方治產後寒熱頭痛石膏二兩黃芩一兩半桂心一兩半生乾地黃一兩牡蠣二兩燒過赤芍藥二兩上為散每服四錢以水一中盞煎至六分去滓不拘時候溫服蓬莪朮散出聖惠方治產後惡血滯留憎寒壯熱心腹癘痛蓬莪朮一兩當歸一兩銼微炒蒲黃三分桂心三分川大黃一兩銼碎微炒桃仁一兩湯浸去皮尖雙仁麩炒微黃色上為散不計時候以暖酒調下二錢治產後乍寒乍熱通身溫壯心胸煩悶出肘後方知母生乾地黃劉寄奴鬼箭羽羌活當歸銼微炒以上各三分柴胡一兩去苗鱉甲一兩塗醋炙微黃去裙襴上件藥搗粗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服芎藭散出聖惠方治產後血氣不散體虛乍寒乍熱骨節疼痛四肢少力芎藭芍藥黃芩各二兩桂心一兩甘草二兩炙上以水六升煮取二升分三服此於蔣家得此方無桂加生地黃一斤知母散出聖惠方治產後壯熱憎寒四肢少力不思飲食知母當歸銼微炒鬼箭羽劉寄奴白朮以上各二兩桃仁一兩半湯浸去皮尖雙仁麩炒微黃上件藥搗粗羅為散每服三錢以水酒各半盞煎至六分去滓不計時候溫服療產後寒熱心悶極脹及百病出肘後方以羚羊角燒末用酒服方寸匕未瘥再服橫產後寒熱心悶極脹及百病以馬通絞取汁一盞以酒和服之瘥瘧疾附論產後血氣未至和平邪氣客於風府循膂而下與衛氣大會陰陽交爭虛實更作寒熱相移其始發也起於毫毛伸欠及作寒慄頭額腰脊俱痛去則內外皆熱頭痛如破渴欲冷飲是寒熱瘧之證也瘧證曰並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱有產後病瘧而作寒熱有一日一發或一日二三發或間一日一發或三兩日一發或先寒後熱或先熱後寒或寒多熱少或熱多寒少或但寒但熱者亦有產前病瘧而產後未愈者最難用藥如柴胡常山信砒等斷不可用今有草果飲子生熟飲子用之有效如易簡方四獸飲亦可用方秦艽湯治產後瘧先寒後熱頭痛發渴骨節痛秦艽去苗土麻黃去根節煎掠去沫焙烏梅去核炒常山甘草炙麥門冬去心炒青蒿子柴胡大黃炮銼當歸切焙鱉甲醋炙去裙襴赤茯苓去黑皮各一兩上粗搗篩每服五錢匕水一盞半生薑三片煎至八分去滓當未發前服欲發時再服草果飲方出危氏方治婦人產後瘧疾寒熱相半者或多熱者半夏炮赤茯苓甘草炙草果炮去皮川芎陳皮白芷各二錢青皮去白良薑紫蘇各一錢乾薑四錢上㕮咀每服三錢以水一大盞姜三片棗二枚同煎至七分去滓當發日侵早一連進三服無有不安犀角飲治產後寒熱瘧往來不歇犀角屑麥門冬去心焙升麻洗焙知母切當歸切焙甘草炙生乾地黃焙鱉甲醋炙去裙襴石膏打碎柴胡去苗各一兩上粗搗篩每服五錢以水一盞半煎至一盞去滓當未發前服欲發時再服木香丸治產後一切瘧木香常山銼牡蠣炙燒赤大黃炮銼知母焙鱉甲炒炙去裙襴烏梅去核炒當歸切焙各一兩丹砂別研半兩麻黃去根節煎掠去沫焙上為末煉蜜和丸如梧桐子大每服二十丸溫酒下當未發時服芍藥飲治產後寒熱瘧頭疼體痛煩渴赤芍藥一兩當歸切焙二兩柴胡去苗一兩麥門冬去心焙一兩半黃芩去黑心一兩白茯苓去黑皮一兩半白朮銼三分甘草炙半兩鱉甲去裙襴用醋炙二兩常山三分上粗搗篩每服五錢以水一盞半生薑三片棗二枚煎至八分去滓溫服當未發前不拘時候人參飲治產後寒熱往來不已煩渴體痛人參甘草炙厚朴去粗皮薑汁炙各三分知母半兩常山半兩麥門冬去心焙柴胡去苗豬苓去黑皮白茯苓去黑皮各二兩上粗搗篩每服五錢以水一盞半生薑三片煎至半盞去滓當未發前服生熟飲子出危氏方治產後瘧疾多寒者肉豆蔻草果仁厚朴生去粗皮半夏陳皮甘草大棗去核生薑上各等分細銼和勻一半用濕皮紙煨令香熟去紙與一半生者和勻每服秤五錢重水二盞煎至七分食前一服食後一服烏梅飲治寒熱瘧產後發渴頭痛烏梅肉炒黃連去須柴胡去苗人參各一兩甘草炙三分當歸切焙一兩半常山半兩生乾地黃焙三分上粗搗篩每服五錢以水一盞半生薑三片棗二枚煎至八分去滓當未發前溫服知母飲治產後寒熱瘧發或間日發知母半兩白茯苓去黑皮一兩烏梅肉銼三分大青半兩麥門冬焙去心一兩柴胡去苗一兩甘草炙三兩當歸焙切一兩上粗搗篩每服五錢以水一盞半生薑三片棗二枚煎至八分去滓當未發前服欲發時再服柴胡湯治產後諸瘧寒熱往來煩渴柴胡去苗黃芩去黑心人參當歸切焙生乾地黃焙甘草炙豬苓去黑皮各一兩上粗搗篩每服五錢以水一盞半煎至八分去滓當未發前及空心日午臨臥服七勝飲治產後寒熱瘧煩渴引飲頭疼體痛乾薑半兩炮黃連去須桃仁去皮尖雙仁炒當歸切焙常山銼柴胡去苗豬苓去黑皮各一兩上粗搗篩每服三錢以水一盞煎至七分去滓當未發前空心溫服欲發時再服常山飲治產後寒熱瘧常山甘草各一兩黃芩去黑心石膏碎各二兩烏梅去核熬十四枚當歸切焙二兩芍藥一兩半上粗搗篩每服五錢以水一盞半生薑三片棗二枚煎至八分去滓當未發前溫服小柴胡湯治產後寒熱瘧大黃散治婦人天行瘧病因產後心下痞悶氣逆潮熱小便澀秘不通者大黃陳皮黑牽牛各一兩炒上為末每服三錢清茶調下若加半兩木香名大通散無憂散出衛生家寶方治產後瘧疾蘿蔔子不拘多少炒上一味為末每服二錢米飲調下只一服立效治產後腎勞如瘧者如婦人體熱用豬腎體冷用狗腎燒灰酒服之大小便秘澀附論內經謂大腸與膀胱受五臟濁氣名曰傳化之府此不能久留輸寫者也婦人大小腸本挾熱者既產之後血氣暴竭津液內涸燥熱相搏大小腸秘澀不能傳導故大小便俱不通也方三脘散治產後臟腑壅滯腸胃燥澀大小便秘兼治腳氣大腹皮炙銼紫蘇莖葉沉香木瓜切焙獨活去蘆頭各一兩白朮芎藭木香陳橘皮去白焙甘草炙銼檳榔麵裹煨熟去面各三分上為粗末每服三錢以水一盞煎至六分去滓溫服不拘時候一方有羌活檳榔散出聖惠方治產後大小便秘心腹脹滿氣促檳榔一兩車前子三分冬瓜仁三分川大黃一兩銼木通一兩銼桂心半兩甘草半兩炙銼當歸半兩銼炒滑石一兩川朴硝一兩上為散每服三錢水一盞煎至六分去滓不計時候溫服柴胡湯治產後內熱大小便不通柴胡去苗黃芩去黑心陳橘皮湯浸去白切焙澤瀉石膏椎碎羚羊角鎊各三分梔子仁一兩赤茯苓去黑皮一兩芒硝別研為末一兩半上粗搗篩八味每服三錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎一滾溫服榆白皮散出聖惠方治產後大小便秘澀小腹疼痛榆白皮三分銼木通一兩銼黃芩半兩當歸三分銼葵子半兩赤芍藥半兩滑石一兩蒲黃半兩川大黃一兩銼炒上為散每服三錢水一盞生薑半分煎至六分去滓不計時溫服茯苓丸治產後大小便不通赤茯苓去黑皮赤芍藥當歸切焙人參枳殼去瓤麩炒白朮銼炒大麻仁別研如膏各半兩大黃銼炒三兩上搗羅七味為末與麻仁研勻煉蜜和丸如梧桐子大每服二十丸煎茅根湯送下以利為度梔子仁湯治產後大小便不通梔子仁石膏碎黃芩圓小者澤瀉柴胡去苗赤芍藥銼葳蕤各一兩半車前葉切半升上粗搗篩每服三錢以水一盞煎至七分去滓食前溫服以利為度檳榔散治產後大小便不通臍下疼痛兼腹滿急脹檳榔銼半兩桂去粗皮芎藭獨活去蘆頭木香各半兩大黃銼炒郁李仁去皮尖雙仁別研赤茯苓去黑皮各一兩上為散每服二錢匕食前溫水調下以利為度木通飲治產後大小便秘澀木通銼炒冬葵根銼各三兩黃芩去黑心甘草炙銼當歸切焙蒲黃微炒陳橘皮湯浸去白焙瞿麥穗各半兩上粗搗篩每服五錢以水一盞半煎至八分去滓溫服日再桃仁散出聖惠方治產後大小便秘澀心腹脹滿時時拘作疼痛桃仁一兩湯浸去皮尖雙仁研葵子一兩川大黃一兩銼炒甜瓜子一兩青橘皮一兩湯浸去白瓤檳榔一兩當歸一兩銼炒甘草半兩銼炒上為散每服三錢水一盞煎至六分去滓不計時溫服木通散出聖惠方治產後大小便不通木通大麻黃葵子滑石檳榔枳實甘草各半兩上為粗末每服三錢以水一盞半煎至七分去滓溫服赤芍藥丸治產後風虛壅結大小便不通赤芍藥一兩一分桂去粗皮一兩瞿麥取穗三分大黃銼炒半兩檳榔銼當歸切焙羌活去蘆頭各二兩上為末煉蜜和丸如梧桐子大每服二十丸米飲下以利為度木香丸治產後因腫滿小腹急脹大小便不通木香一兩炮牽牛子二兩炒別搗為末防己陳橘皮去白炒各半兩訶黎勒炮去核羚羊角鎊檳榔銼各一兩上為末煉蜜和丸如梧桐子大每服二十丸煎生薑橘皮湯下以利為度石葦湯治產後大小