body:
  text: 卷三十三腎臟門腎虛漏濁遺精附論素問云夫腎精者身之本也蓋五臟六腑皆有精腎為都會關司之所聽命於心人能法道清淨精氣內持火來坎戶水到離宮陰平陽秘精元密固矣若夫思慮不節嗜欲過度使水火不交精元失守由是為赤濁白濁之患焉赤濁者是心虛有熱也常因思慮而得之白濁者腎虛有寒也過於嗜欲而得之其狀凝而如油光彩不定小便溺濁稠如膏糊皆嗜欲思慮之所致耳各分受病之由旋以治法坎離既濟陰陽協和然後火不上炎而神自清水不下滲而精自固安有赤濁白濁之患哉雖然思慮過度不特傷心亦能病脾脾土虛而腎不足故土邪剋水亦令人便下渾濁史載之云夏則土燥而水濁冬則土堅而水清醫常峻補則疾愈甚若以中和之藥療之水火既濟土自堅其精固矣遺精白濁二證脈息多澀醫經曰男子二八腎氣盛天癸至天癸者精之本也腎臟不足皆由不善衛生喜怒多勞憂愁思慮嗜欲過度起居不常遂致心火炎上而不熄腎水散浸而無歸上下不得交養心腎受病令人遺精白濁腎受病者亦令人遺精白濁皆心腎不交關鍵不密之故耳腎病者當禁固之心病者當安寧之更有少壯之人情動於中所願不得意淫於外一門內有是證者大要於治之法不宜秘固秘固則愈甚惟當以後方豬苓丸主之蓋半夏有利豬苓導氣使通之也但虛損精滑之人卻不宜服無因而出者曰尿因聞見而出者曰精心不足而腎熱者曰赤濁心不足而腎冷者為白濁陰不升陽不降是以有情濁不分又有脾精不禁小便漏濁淋瀝不止手足腰背痠痛用蒼朮等劑使脾精生於陰也邪客於陰神不守舍故心有所感夢而後泄也其候有少年氣盛鰥曠多時強制情欲不自覺知此泄如瓶之滿而溢者也人或有之是為無病勿藥可矣心家氣虛不能主宰或心受熱陽氣不收此泄如瓶之側而出者也人多有之其病猶輕令和平之劑補之臟腑精弱其元久虧心不攝念腎不攝精此泄如瓶之破而漏者也人或有之其病最重須當大補陽或謂夢泄尤甚於房勞此世習聞其說者也又有神氣消磨異性橫生風邪乘虛致干其正往往與妖魅交媾是尤甚也宜用法藥互取之方韭子丸出千金方治房室過度精泄自出不禁腰背不得屈伸食不生肌兩腳苦弱此藥治之韭子一升甘草一兩桂心半兩紫石英半兩當歸二兩禹餘糧一兩遠志一兩山茱萸一兩天雄一兩紫菀半兩薯蕷半兩細辛一兩茯苓一兩殭蠶半兩菖蒲半兩人參一兩杜仲一兩白朮二兩乾薑二兩芎藭二兩附子石斛各一兩大棗五十個牛膝一兩乾漆半兩天門冬一兩半茯苓一兩黃耆一兩菟絲子一兩乾地黃二兩蛇床子半兩上為細末入牛髓令白蜜棗膏合搗三五千杵丸如梧桐子大空心服每服十五丸日再服可加至二十丸玉鎖九真丹出危氏方治元氣不足思慮太過腎經虛損真陽不固旋有遺泄小便經歲白濁或淡赤或如膏或夢寐精泄甚則身體拘倦骨節痠疼飲食不進面色黧黑容枯肌瘦唇乾舌燥虛煩溫汗舉動力乏多服效白龍骨半斤磁石醋淬七次硃砂各一兩牡蠣煅一兩紫稍花一兩半家韭子菟絲子各二兩鹿茸酒浸炙白茯苓一兩川巴戟一兩官桂一兩肉蓯蓉酒浸桑螵蛸酒浸當歸各二兩木香不見火遠志甘草水煮取肉蒼朮各一兩茴香炒吳茱萸炒川楝子炒桑寄生各半兩沉香半兩綿黃耆一兩附子炮去皮臍一兩上為末煉蜜和丸如梧桐子大每服五十丸溫酒鹽湯下棘刺丸治虛勞諸氣不足夢泄失精方見小便淋秘門小便利多類案原方棘刺石龍芮巴戟天各二兩厚朴麥門冬去心菟絲子萆薢一方作草雖葳蕤柏子仁乾地黃小草細心杜仲牛膝蓯蓉石斛桂心防葵各一兩烏頭半兩上為末蜜和更搗五六千杵丸如梧桐子大飲下十丸日二加至三十丸以知為度入藥虞砂丸出危氏方治諸虛百損白濁耳鳴當歸酒浸鹿茸去毛鹽水酒炙黃耆各一兩沉香一兩北五味半兩遠志一兩酸棗仁一兩茴香炒吳茱萸去核破故紙炒牡蠣煅熟地各二兩人參二兩龍骨煅附子巴戟各一兩虞砂一兩上為末酒糊丸每服五十丸至七十丸溫服鹽湯下龍齒補心湯出直指方治諸虛不足潮熱心內驚惕睡臥不寧小便油濁龍齒煅人參當歸酒浸熟地各一兩桔梗焙酸棗仁半兩麥門冬去心半夏曲各一兩白朮炒甘草各半兩炙枳殼麩炒白茯苓去木遠志一兩肉桂二錢半黃耆七錢半炙上為末每服三錢水盞半姜五片粳米一撮同煎不拘時服鹿茸益精丸出直指方治心虛腎冷漏精白濁鹿茸去毛酥炙桑螵蛸瓦上焙肉蓯蓉當歸巴戟天去心菟絲子酒浸杜仲鹽水炒斷絲益智仁川楝子去皮取肉赤石脂韭子炒禹餘糧煅用醋淬碎為度各三錢破故紙山茱萸龍骨二兩滴乳香一分上為末酒糊丸如梧桐子大每服七十丸食前白茯苓煎湯下茸菟丸出經驗方治心腎不交小便滑數精神耗散腰腳無力鹿茸肉蓯蓉乾地黃萆薢杜仲五味子白茯苓各二兩木瓜一兩巴戟枸杞子川牛膝補骨脂青鹽各二兩菟絲子金鈴子各五兩蓮肉八兩上依法炮製為末酒煮山藥末糊為丸如梧桐子大每服五六十丸空心溫酒或鹽湯送下暖腎丸出直指方治腎虛多溺或小便不禁而濁葫蘆巴炒一兩破故紙炒半兩川楝子炒研一兩益智仁二兩熟地黃三兩鹿茸酥炙赤石脂各一兩山茱萸一兩代赭石醋煅龍骨各半兩海螵蛸一兩艾醋煮丁香沉香乳香各二錢禹餘糧醋煅碎三錢上為末糊丸如桐子大每服五十丸煎菖蒲湯送下子午丸出危氏方治心腎俱虛夢寐驚悸常自煩悶短氣不樂消渴停飲下赤白濁甚至四體無力眼昏形瘦耳鳴頭暈惡風怯冷榧子去殼二兩蓮肉去心枸杞子白龍骨川巴戟去心破故紙炒真琥珀各一兩芡實一兩半赭石白礬枯赤茯苓各一兩白茯苓二兩文蛤半兩蓮花半兩牡蠣煅一兩上為末酒蒸肉蓯蓉一斤爛研為丸如梧桐子大硃砂為衣煎萆薢湯空心吞下忌勞力房事十四友丸補諸虛不足益血收斂心氣治怔忡不寧精神昏倦不安赤白濁甚心腎丸治水火不濟心下怔忡夜多盜汗便赤夢遺方見諸虛門補虛固精類案原方菟絲子淘酒蒸二兩麥門冬去心二兩上為細末煉蜜為丸如桐子大每服七十丸空心食前鹽湯下鹿茸散治臟腑久虛夢泄鹿角屑一兩鹿茸酥炙一兩白茯苓三錢人參一兩桑螵蛸細研一兩芎藭一兩當歸一兩破故紙炒龍骨各半兩柏子仁去殼甘草炙各一兩榧子酒浸一宿半兩上為末每服三錢半生薑五片棗三枚粳米百粒食前煎服家韭子出直指方治腎氣不足精遺方見小便淋秘門小便遺失類案原方家韭子六兩鹿茸四兩蓯蓉酒浸牛膝酒浸熟地黃當歸各二兩巴戟去心菟絲子酒浸各一兩半杜仲去皮金石斛去苗桂心乾薑炮各一兩上為末酒和丸如梧桐子大每服五十丸加至百丸空心食前鹽湯酒下小兒遺尿多因服寒亦稟受陽氣不足則作小丸服遠志丸出直指方治腎不足遺精白濁驚悸健忘夢寐不安足脛痠疼遠志去心取肉地黃洗天門冬去心龍齒各一兩研麥門冬去心五味子一兩車前子半兩白茯苓去木地骨皮各一兩三錢桂六錢山藥炒熟地一兩半上為末煉蜜和丸如梧桐子大每服五十丸食前粳米湯下芡實丸出危氏方治思慮傷心房勞傷腎心腎不交精元不固面少顏色驚悸健忘夢泄小便赤澀遺精白濁足脛痠疼耳聾目昏方見諸虛門補虛固精類案原方芡實蒸去殼蓮花須各二兩茯神去木山茱萸取肉龍骨生用五味子枸杞子熟地黃酒蒸焙韭子炒蓯蓉酒浸川牛膝去蘆酒浸焙紫石英煅七次各一兩上為細末酒煮山藥糊為丸如桐子大每服七十丸空心鹽湯任下瑞蓮丸出濟生方治思慮傷心便下赤濁白茯苓去木石蓮肉炒去心龍骨生用天門冬去心麥門冬去心遠志去心甘草煮柏子仁炒研當歸酒浸紫石英醋煅七次酸棗仁炒去殼龍齒以上各一兩乳香半兩各研上為末煉蜜為丸如梧桐子大硃砂為衣每服七十丸空心溫酒棗湯下降心丹出直指方治心腎不交盜汗遺精及熱藥過多上盛下虛小便赤白常服鎮心益血方見諸虛門補益諸疾類案原方熟乾地黃淨洗酒灑蒸焙乾天門冬去心麥門冬去心各三兩茯苓去皮人參遠志甘草煮去蘆茯神山藥各二兩肉桂去粗皮不見火硃砂研飛各半兩當歸去蘆焙三兩上為末煉蜜為丸如梧桐子大每服三十丸煎人參湯吞下清心蓮子飲一名加味清心飲治心中客熱煩躁赤濁肥脂石蓮肉白茯苓各一兩益智仁水浸出肉薑汁炒遠志水浸取肉麥門冬去心人參各半兩石菖蒲車前子白朮一兩澤瀉甘草炙各二錢上銼散每服三錢添燈心一握煎熱加薄荷少許韭子丸出千金方治小便失精及夢泄精方見諸虛門補虛固精類案原方韭子微炒令香鹿茸去毛塗酥炙令黃色楮實淘去浮皮乾微炒澤瀉肉蓯蓉酒浸一宿去粗皮炙乾附子炮裂去皮臍各一兩石斛遠志去心柏子仁桂心去皮牛膝去苗巴戟川椒去目及閉口者微炒去汗白朮薯蕷覆盆子各三分杜仲去粗皮炙微黃色黃耆銼狗脊去毛枳殼去瓤麩炒蛇床子芎藭五味子乾薑銼制各半兩上為末煉蜜為丸和搗三五百杵如梧桐子大每服空心以溫酒下三十丸加至四十丸為度妙應丸出直指方治赤白濁通用真龍骨辰砂厚朴以腐草鞋重包插定火煅並研細石菖蒲各二錢半川楝子煎去皮取肉半兩白茯苓二兩益智仁三兩石蓮肉一兩砂仁三兩桑螵硝瓦上焙菟絲子酒浸一宿各半兩上以藥碎研為末糊丸如梧桐子大每服五十丸煎人參酸棗仁湯下臨臥服或粳米飲送下韭子丸治虛勞夢泄方見諸虛門補虛固精類案原方用韭子七升淨揀以醋湯煮千百沸取出焙乾旋炒令作油麻香搗羅為末煉蜜丸如桐子大每服空心溫酒下二十丸加至三十丸固精丸出濟生方治嗜欲過度勞傷腎經精元不固夢遺白濁肉蓯蓉酒浸薄切焙陽起石煅研鹿茸燎去毛酥炙韭子炒龍骨生用赤石脂煅七次川巴戟去心白茯苓去皮鹿角霜附子炮去皮臍各等分上為細末酒糊為丸如梧桐子大每服七十丸空心鹽酒鹽湯任下十補丸治真氣虛損下焦耗竭臍腹強急腰腿疼痛亡血盜汗遺泄白濁大便自利小便滑數或三消渴疾飲食倍常肌肉消瘦陽事不舉顏色枯槁久服補五臟行榮衛益精髓進飲食方見諸虛門補虛固精類案原方附子炮去皮臍乾薑炮桂去心菟絲子酒浸焙研巴戟去心厚朴去皮炒薑製遠志去心薑汁浸炒破故紙炒赤石脂川椒炒出汗去子者二兩用上為末酒糊丸如桐子大每服三十丸至五十丸空心溫酒或鹽湯任下薰草湯治夢失精薰草一兩人參一兩乾地黃三兩白朮芍藥各二兩茯神一兩桂心甘草炙各二兩大棗十二枚上切以水八升煮取三升分為二服每服如人行四里一方又有茯苓三兩忌桃李雀肉大酢海藻菘菜生蔥石斛散治男子夢泄精石斛七分桑螵蛸紫菀各二分乾漆煮五味子乾地黃鍾乳粉研遠志皮附子炮去皮臍各二分上搗和為末以酒服方寸匕漸增至二匕日三服忌豬冷水蕪荑蓮子清心飲一名清心蓮子飲治心中蓄熱時常煩躁因思慮勞力憂愁抑鬱致小便白濁或有沙粒夜夢遺失遺淋瀝便赤如血或因酒色過度上盛下虛心火炎上肺金受克口舌乾燥漸成消渴睡臥不安四肢倦怠男子五淋婦人常下赤白帶病後氣不收斂陽浮於外心煩熱方見諸虛門補虛益氣類案原方黃芩麥門冬去心車前子甘草炙各半兩石蓮肉去心白茯苓黃耆蜜炙人參各七錢半上銼散每服三錢麥門冬十粒水一盞半煎取八分去渣水中沉冷空心食前發熱加柴胡薄荷煎小溫金散出危氏方治虛熱