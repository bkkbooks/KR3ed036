一盞生薑五片棗二枚擘破煎至七分去滓空心溫酒服鹿茸散治精極虛損夢中失精陰氣微弱小腹拘急體重耳鳴鹿茸酒浸龍骨露蜂房炙各半兩澤瀉白茯苓菟絲子酒浸一宿桂去皮牛膝酒浸切焙石龍芮赤芍藥各一錢韭子炒二錢巴戟去心三錢上為散每服三錢空心溫酒調下或煉蜜丸如梧桐子大空腹溫酒下二十丸加桑螵蛸亦得天門冬散治精極五臟六腑俱虛偏身及骨髓煩疼宜服天門冬二兩去心羚羊角屑一兩人參一兩黃耆一兩枸杞子一兩酸棗仁一兩芎藭一兩車前子當歸桂心各一兩澤瀉一兩甘草半兩上為末每服四錢水一盞煎至六分去滓入竹瀝半合蜜一茶匙同煎三兩沸不計時候忌鯉魚鹿茸丸治精極上焦熱下焦冷補十二經脈添髓養血宜服鹿茸四兩去毛酥炙硃砂二兩細研水飛過野雞脛骨二兩天門冬二兩車前子二兩菟絲子二兩酒浸一宿曝乾為末雀腦二十枚肉蓯蓉酒浸一宿刮去皮三兩熟乾地黃三兩上為末煉蜜與羊脛髓拌和搗三二百杵丸如梧桐子大每服空心及晚食前以酒服三十丸忌鯉魚生血羌活補髓丸一名羌活丸治精極髓虛空中傷臟腑方見羌活丸茯神散治精極實熱勇悍多驚壯熱茯神一兩柴胡二兩去蘆黃耆三兩銼遠志一兩去心天門冬二兩去心人參一兩澤瀉二兩生地黃二兩甘草一兩炙上為散每服三錢以水一鍾入淡竹葉七片煎至六分去滓不計時候溫服竹葉黃芩湯治精極實熱眼視不明齒焦發落形體疼痛通身虛熱竹葉切二兩黃芩茯苓各三兩麥門冬大黃各二兩甘草二兩生地黃六兩芍藥四兩生薑六兩上諸藥以水九升煮取三升去滓分三服石斛湯治精極實熱眼視不明齒焦發落形衰通身虛熱甚則胸中煩悶夜夢泄精小草石斛去根黃耆麥門冬去心生地黃酒洗白茯苓玄參各一兩甘草炙半兩上羅勻每服四錢水一盞半姜五片煎至八分去滓溫服不拘時候竹葉湯治精極實熱眼視不明齒焦發落形衰通身虛熱甚則胸中煩悶泄精生地黃五兩芍藥四兩黃耆茯苓澤瀉甘草麥門冬去心各三兩上銼散每服四錢水一盞半姜五片淡竹葉十片煎七分去滓不拘時服生地黃煎治精極補骨髓生地黃十斤搗絞取汁牛酥白蜜各一斤上先以慢火煎地黃汁減半納牛酥更煎良久次下蜜攪令勻候稀稠得所於瓷器中盛每日空心午時及晚食前溫酒下半匙補益鹿茸煎治精極骨髓虛竭用鹿茸五兩去毛塗酥炙令微黃為末以清酒二升於銀鍋中慢火煎膏盛於瓷器中每服空心及晚食前以溫酒下半匙白淫附論內經曰思想無窮所願不得則意淫於外入房太甚宗筋弛縱發為筋急乃為白淫夫腎臟天一以堅為主志意內馳則精因而出思想為淫房室太甚則固者搖矣故淫溢不守隨流而下也然本於筋痿者以宗筋弛縱故也方七珍丸王氏博濟方補真益氣壯腰膝進飲食治小兒白淫肉蓯蓉半斤細切酒煮爛研成膏補骨脂炒巴戟天去心附子炮去皮臍各二兩杏仁湯浸去皮尖桃仁湯浸去皮尖胡桃仁研各一兩上將後六味搗研為末與蓯蓉膏同研勻更入煉蜜搗三五百杵丸如梧桐子大每服一丸熱酒化下日三服一名四神煎蓮實丸治下元虛冷小便白淫蓮實去皮附子炮去皮臍巴戟天補骨脂炒各二兩覆盆子炒一兩山茱萸一兩龍骨研半兩上為末煮米糊和丸如梧桐子大每服二十丸空心鹽湯下龍骨湯治小便白淫及遺泄無故自出龍骨研五兩人參白茯苓甘草炙牡蠣煅桂去粗皮熟地黃焙各二兩上為散每服五錢水一盞半煎至八分去滓食前服內補鹿茸丸一名曰鹿茸丸治勞傷思虛陰陽氣虛益精止白淫金鎖丸一名金鎖子丸治下元虛小便白淫夜夢遺泄石斛散治陽虛憊小便白淫石斛去根巴戟天去心菟絲子酒浸二宿別搗各三兩杜仲去粗皮炙銼桑螵蛸炒各一兩半上為散每服二錢空心溫酒調下至晚再服白石英散治小便白淫白石英研肉蓯蓉酒浸焙澤瀉韭子各一兩白粳米淘五合上為散每服二錢米飲調下食前日三服秘真丸宣明論治小便白淫不止精氣不固及有餘瀝或夢寐陰人通泄龍骨研一兩訶黎勒炮取皮五個縮砂仁去皮半兩丹砂研一兩留一錢為衣上為末煮糯米粥為丸如綠豆大以丹砂為衣每日空心熱酒下一丸夜臥冷水下三丸勿多服或大便秘欲通用蔥湯點茶服之即通陽起石丸楊氏家藏方治下元虛憊耳鳴面黑腰背疼痛遺泄白淫手足冷肌瘦陽起石煅研一兩白芷黃蠟各半兩生砒研一分上將三味同研勻以黃蠟為丸如梧桐子大每服三丸空心冷鹽湯或冷酒下微溫亦可藥後忌熱食少時久服美進飲食補下元暖腰腳天雄散治腎臟虛冷小便白淫方見虛勞門虛勞失精類案原方天雄三兩炮裂去皮臍石斛去根生補骨脂微炒天麻麋角屑澤瀉巴戟五味子沉香續斷蓯蓉酒浸一宿刮去粗皮炙乾菟絲子酒浸三日曝乾另搗為末龍骨山茱萸杜仲去粗皮炙微黃銼防風去蘆頭膃肭臍酒浸炙令微黃木香各一分上為末煉蜜和搗五七百杵丸如梧桐子大每日空心以酒下三十丸鹽湯亦得附礬丸治白淫過甚附子炮去皮臍二兩礬石二兩熬去汁上為末水煮麵糊和丸如梧桐子大每服十丸至二十丸空心夜臥清茶下黃連丸治心腎氣不足思想無窮小便白淫黃連去須白茯苓去黑皮上等分為末酒糊和丸如梧桐子大每服三十丸煎補骨脂湯下不拘時金泊丸衛生寶鑑治下焦虛小便白淫夜多夢泄原蠶蛾破故紙韭子炒各一兩牛膝酒浸肉蓯蓉龍骨山茱萸桑螵蛸菟絲子酒浸以上各一兩上為細末煉蜜為丸如梧桐子大每服三十丸溫酒下空心食前服補真玉露丸衛生寶鑑治陰盛精脫淫樂脛酸白茯苓白龍骨火煅韭子酒浸各二兩菟絲子酒浸一兩上為細末米醋同麵糊和丸如梧桐子大每服五十丸溫酒下鹽湯亦得每空心食前服待少時以美飯壓之
