膏各半兩白附子生一兩滑石二兩上為細末麵糊和丸如梧桐子大每服十丸食後荊芥湯下立效丸治頭風痛不可忍豆豉四兩焙川烏二兩生去皮臍殭蠶一兩炒石膏二兩煅地龍半兩去土炒蔥子半兩生上為末蔥汁煮糊為丸如梧桐子大每服二十丸生蔥茶下通頂散治風頭痛偏正頭痛不可忍者龍腦研地龍去土炒瓜蒂赤小豆炒馬牙硝研各等分上為散每用一小豆許食後含水搐入兩鼻內地龍散治風頭痛地龍去土炒半夏生薑汁搗作餅焙令乾再搗為末赤茯苓去黑皮各半兩上為散每服一字至半錢生薑荊芥湯調下兼治婦人產後頭痛旋覆花湯治風頭痛旋覆花菊花芎藭甘草炙各半兩皂莢酥炙去皮子一兩上粗搗篩每服三錢水一盞荊芥穗三莖茶末一錢同煎至七分去滓溫服活人書葛根湯治太陽病頸項強無汗惡風為表實葛根一兩麻黃去節三分官桂芍藥甘草炙各半兩上銼散每服四錢姜五片大棗一枚水一盞半煎服芎藭散治風頭痛芎藭莎草根炒去毛各一兩藿香葉荊芥穗各一兩石膏碎研一兩半上為散每服二錢荊芥湯調下食後服石膏丸治風盛痰壅頭疼不止石膏煅通赤淨地出火毒以器覆之一兩白附子炮一分半鉛霜研丹砂研龍腦研各一分上研如粉薄荷汁煮麵糊和丸如梧桐子大丹砂為衣每服二丸好茶嚼下天香散專治久年頭風甚者治頭痛不可忍方馬牙硝研半兩蘆薈研少許瓜蒂三枚為末大羊膽二一枚臘月收上藥入膽內線縛暗處陰乾細研瓷盒盛左痛吹右鼻右痛吹左鼻兩度愈槐實散治風頭痛清頭目化風痰槐實炒八兩荊芥穗四兩甘草炙一兩防風去叉三兩上為散每服一錢茶酒任調下食後服天南星散治風頭痛心膈煩熱壅滯頭面虛汗及上焦壅熱並治之天南星半夏各一兩二味為末水八升浸兩伏時逐日換水日足取出陰乾附子生末六錢烏頭生末七錢上同研勻大人半錢小兒一字生蔥薄荷茶調下桂枝葛根湯治太陽病頸項強汗出惡風表虛桂枝芍藥甘草各七錢葛根一兩三錢上銼散每服四錢姜五片大棗一枚煎服皂莢散治風頭痛皂莢豬牙者七梃燒灰烏頭一枚炮裂去皮臍莎草根七枚生上為散每服一錢臘茶調下並三兩服治風頭痛及偏頭痛吹鼻方萊菔子半兩生薑汁半合上相和研極細絞取汁入麝香少許滴鼻中搐入立定偏頭痛隨左右用之治一切風痰及頭疼不可忍方藜蘆一兩雄黃一分研上為散研勻每服半錢至一錢溫水調服取吐一方只單搗藜蘆取細末每搐少許作嚏藥亦妙治鼻塞及頭痛風痰馬牙硝研細半兩地黃汁一合上相和於銅器中用慢火煎令乾硬取出研細每挑少許入鼻搐上吐痰即瘥篋中惡實方治風頭及腦掣痛不可禁者摩膏主之上用牛蒡莖葉搗取濃汁二升合無灰酒一升鹽花一匙須緩火煎令稠成膏以摩頭痛處風毒散自止亦主時行頭痛摩時須極力令作熱乃速效冬月無苗用根代之亦可治一切風虛常惡頭痛欲破者上用杏仁去皮尖乾研為末水九升研濾如作粥法緩火煎令如麻沸起取和羹粥納酒一匙服之每食前不限多少服七日後大汗出禁風冷豬雞蒜大酢一劑後諸風減瘥春夏忌酢少作服之秋九月後煎服之上清丸出經效濟世方治風痰頭痛不可忍者大天南星茴香等分上生用為末鹽醋煮糊為丸如梧桐子大食後薑湯下二十粒又方南荊散出經效濟世方天南星一個重一兩荊芥穗一兩上為末生薑汁煮糊為丸如梧桐子大食後薑湯下二十丸二聖散出御藥院方治風頭痛上焦壅滯心膈煩熱及治偏頭痛硝石細辛華陰者去苗葉各一分上研為細散每服用半字發時搐入不痛邊鼻內如未已方搐痛邊鼻內或用紙捻子蘸藥紝鼻中如未已方搐痛邊鼻內菊花湯一名救生散治風頭痛石膏丸出聖濟總錄治風毒上攻頭痛石膏研菊花防風去叉葛根銼各二兩上為末煉蜜和丸如梧桐子大每服二十丸加至三十丸食後臨臥熟水下芎藭散治風壅頭痛荊芥散出聖濟總錄治風邪客於陽經頭目重及頭面虛汗連腦痛荊芥穗半兩烏頭尖一分雄黃研一錢白殭蠶直者炒一分上為散每服一錢荊芥茶調下每服藥訖臥少時都梁丸一名芷彈丸王定國因被風吹項背拘急頭目昏眩太陽並腦俱痛自山陽拿舟至泗州求醫楊吉老既診脈即與藥一彈丸便服王因款話經一時再作並進兩丸病若失去王甚喜問為何藥答云公如道得其中一味即傳此方王思索良久自川芎防風之類凡舉數種皆非但一味白芷耳王益神之此藥初無名王曰是藥出自都梁名人可名都梁丸也大治諸風眩暈婦人產前產後乍傷風邪頭目昏重及血風頭痛服之令人目明凡沐浴後服一二粒甚佳暴寒乍暖神思不清頭目昏暈並宜服之出德生堂上用香白芷大塊擇白者新潔者先以棕刷刷去塵土用沸湯泡洗四五遍為細末煉蜜和丸如彈子大每服一丸多用荊芥點臘茶細嚼下食後常服諸無所忌只干嚼亦可一方如熱風冷酒調冷風熱酒調下一方細嚼川芎蔥白茶清送下又方出經驗良方治頭風腦骨痛上用水浸皂莢春浸三日夏秋五日冬十日就水洗淨新瓦焙乾為末每用一字茶調服又將少許吹入鼻中治猝中惡風頭痛方出千金方上搗生烏頭以大酢和塗故布上薄痛處須臾痛止日夜五六敷逐痛處敷之搗烏頭須去皮一方塗於頂上腦角太陽穴風府之上須臾痛止又方出千金方上用羊膽入玄精石末陰乾水調一字吹鼻中立止大蒜搐鼻法一名搐鼻法出仁存方治頭風頭痛不可忍亦可搐小兒驚風上用蒜七個先燒地通紅掃出火將蒜去皮逐個於紅地上磨成膏子在地上卻將殭蠶一兩去嘴足安在蒜上用碗覆定四邊勿透氣來日取出只用殭蠶為末先含水一口將藥末豆大搐於鼻內立效治風頭痛每天欲陰雨頭風先發者出聖惠方上用桂心一兩為末以油調如膏以敷頂上並額角一方用酒調下豉湯方出肘後方治頭風痛上用豉湯洗頭避風即瘥枕頭方出聖惠方治風頭痛百藥不瘥上用食茱萸葉細銼灑酒拌勻以絹袋盛之於甑中蒸熟乘熱分兩包子更換枕之取瘥為度烏金煎出聖惠方治風頭痛語澀健忘黑豆一升淨淘獨活一兩荊芥一兩石膏三兩黃芩一兩上細銼以水五大盞煎至一大盞入無灰酒一升攪濾去滓再煎如稀膏盛於瓷盒中每服食後用溫酒調下一茶匙吹鼻散出聖惠方治風頭痛及偏頭疼瓜蒂末地龍末苦瓠末硝石末各一兩錢麝香末半錢上藥末都研令勻先含水滿口後搐藥末半字深入鼻中當取下惡物神效通頂散出濟生拔萃嚏藥石膏川芎赤小豆瓜蒂各一錢藜蘆少許上為細末噙水搐之治風頭痛每天欲陰頭風先發者方及風毒上攻頭暈眼昏一名菊花散出聖惠方甘菊花芎藭各一兩上為細散每服不計時候以溫酒調下二錢一方茶清調下又方出聖惠方上熟煮大豆納飯甕中作漿日日溫洗頭良藿香散治風客於陽經頭重疼痛及偏湊一邊繞額角痛治猝中惡風頭痛出千金方用芥子為末酢和敷頭一周時神朮散出華佗中藏經方治傷風頭痛聲重蒼朮四兩川芎一兩藁本二兩甘草一兩炙上㕮咀每服二錢水一盞生薑三片同煎至七分通口服不拘時候消風散出保生回車論治風頭疼龍腦薄荷二兩去土令淨荊芥穗二兩羌活半兩川芎半兩細辛去苗用一分白朮二兩銼石膏研極細水飛日乾一分甘草半兩炙紫色上杵羅為末每服二錢茶清或醇調酒調下熱服日三服不計時候一切風寒或沐浴之後並宜服之治一切風攻頭目痛用天南星一個掘地坑子火燒令赤安於坑中以醋一盞沃而蓋之不令透氣候冷取出為末每服一字以酒調下重者半錢許
