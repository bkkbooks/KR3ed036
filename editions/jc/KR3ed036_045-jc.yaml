body:
  text: 卷四十五頭門偏正頭痛附論夫頭圓象天故居人身之上為諸陽之會頭疼之疾非止一端如痛引腦巔陷至泥丸宮者是為真頭痛旦發夕死夕發旦死非藥物之可療今人之體氣虛弱者或為風寒之氣所侵邪正相搏伏留不散發為偏正頭疼其脈多浮緊者是也方川芎散治頭風偏正頭疼川芎七錢半細辛羌活槐花甘草香附子石膏以上各半兩荊芥穗薄荷葉菊花山茵陳藁本白芷勾藤防風去蘆頭以上各一兩上為細末每服一錢食後茶調下一日三服忌發風物一方無藁本白芷丸白芷石斛乾薑各一兩半細辛五味子厚朴肉桂防風茯芩甘草陳皮各一兩白朮一兩半上為細末煉蜜為丸如梧桐子大每服三十丸不飢不飽時清米湯飲下飛虎散專治偏正頭疼白附子香白芷荊芥穗石膏煅研川芎天麻薄荷葉防風以上各半兩蒼朮一兩米泔浸烏頭尖一兩黑心者不用明白者佳上為細末每服一錢臨臥茶清調服後忌食熱物千金散治偏正頭疼諸證川芎細辛防風甘菊花甘草石菖蒲青藤根全蠍細茶芽藁本各一兩上粗搗每服五錢水一盞半蔥白一根同煎至七分去滓食後臨臥服滓再煎一方如眼目疼痛者加貫眾一兩王瓜散專治偏正頭痛王瓜燈心炒黃色木香川芎天麻麻黃去節防風去蘆頭細辛去苗甘草炙各半兩荊芥穗一兩半上為細末每服二三錢食後熱茶清調下川烏散治偏正頭痛傷寒冷打撲折碎破傷風頭面虛腫嘔逆噁心川烏草烏頭藿香葉川芎甘草白芷川蠍各半兩雄黃六分上為細末每服一錢入好茶半錢百沸湯點趁熱服之如破傷風每用大半錢以蔥白三寸細嚼滾熱酒大半碗調服甚者如人行五里再一服即愈通天散治偏正頭疼並夾腦風壅滯明目赤芍藥川芎黃連玄胡索黃芩草烏頭當歸雄黃別研各等分上為細末每服少許紙捻子蘸藥納之鼻中清空膏治偏正頭痛年深久不愈者兼療風濕熱頭痛上壅損目及腦痛不止羌活防風黃連炒各一兩柴胡七錢甘草一兩半炙川芎五錢黃芩一兩半酒炒細梃子者良上為細末每服二錢熱盞內入茶少許湯調如膏抹在口內少吃白湯送下臨臥如苦頭痛每服可加細辛二錢如太陰脈緩有痰名曰痰厥頭痛去羌活防風川芎甘草加半夏一兩半如偏頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只於白虎湯中加好吳白芷徹清膏川芎二錢三分蔓荊子一錢細辛一分生甘草半錢薄荷葉三分藁本一錢甘草半錢炙上為細末食後茶清調下一錢或半錢二錢皆可芎黃湯治偏正頭疼外傷風邪鼻塞聲重清涕多嚏者川芎半兩雄黃研水飛一錢細辛去苗葉一錢半荊芥穗三錢全蠍五枚炒大川烏一兩枚炮去皮臍切碎炒黃色上為細末每服半錢茶少許白湯點服不拘時候盞落湯治偏正頭痛頭風麻黃去根節七錢半人參去蘆五錢陳皮去白七錢甘草去皮八錢御米殼去隔瓤頂蒂三分蜜炒黃色上㕮咀每服五錢生薑七片煎至七分去滓溫服食遠服白龍丸治一切風偏正頭疼鼻塞腦悶大解傷寒及頭風遍身瘡癬手足頑麻川芎藁本細辛白芷甘草上等分為末每藥四兩入煅了石膏末一斤水和為丸每一兩作八丸每服一丸食後薄荷茶嚼下風蛀牙痛一丸分作三服干揩後用鹽湯漱之更用蔥茶嚼下一丸一方有陳皮通頂散嚏藥梅煎散川烏去皮尖白附子石膏半夏南星各一兩上為細末每服二錢水一盞薄荷七葉白梅一個煎至七分食後臨臥服或嘔吐加生薑十片昏暈入蔥白茶調下半字散川烏一個去皮尖炮草烏七個去尖炮川芎半兩石膏一兩煅荊芥一兩上為細末每服半錢茶清調服忌食鯉魚石膏丸治偏正頭疼噁心痰逆石膏四兩川烏一兩生去皮硝石一兩半玄精石二兩煅上為末姜糊丸如梧桐子大每服十五丸荊芥湯下食後服乳香散治偏正頭疼損眼目赤眼睛痛乳香盆硝青黛各半兩加腦子少許上研勻痛邊鼻內搐一字真珠散治偏正頭風頭疼盆硝一錢半白滑石一兩乳香一錢半片腦少許上各研為細末再同研細每用一字口噙水鼻內搐之神效散治偏正頭痛川芎一錢牡丹皮二錢半去骨滑石二錢研米殼三錢蜜炒黃上㕮咀每服五錢生薑一兩水一盞半煎至七分去滓臨臥溫服抽刀一字散生烏頭去皮鹽水浸一月取出切片又以生薑汁浸一宿炒乾如急用只炮去皮尖不必浸也細辛蟬蛻川芎各半錢一處炒上為細末每服一字茶清調下盞落散治偏正頭疼不可忍米殼去頂膈淨二兩柴胡五錢桔梗五錢甘草五錢上羅搗每服五錢水一盞煎至七分入燈草一莖去滓食後服若不住疼痛加生薑五片依前煎服藥先聞藥汁後服川附散川芎白附子牛蒡子荊芥各等分上為細末每服二錢臘茶調服治偏正頭疼豬牙皂莢去皮弦香白芷白附子各等分上為末每服二錢食後臘茶清調下右痛右側臥左痛左側臥兩邊皆痛仰臥又方硝石一兩研青黛一錢地龍皮一錢炒上為末搐鼻內一方名青龍散每用半字以下含水滿口搐藥鼻中即不痛右痛右搐左痛左搐兩邊痛左右俱搐立止懸樓散治偏正頭疼懸樓一枚焙乾銼細赤瓜子七枚焙乾大力子四兩焙黃色牛蒡子是也上為細末每服三錢食後溫酒茶清任下忌動風熱之食石膏散治偏正頭痛石膏二一兩芍藥一兩赤白皆可用川芎三錢上各生用為細末每服一錢茶清調下並吃三服神效麝香散一名太一麝香湯治偏正頭疼夾腦風連眉項頸徹腮項疼痛者星烏石膏散南星草烏石膏煅以上各兩上為細末每服一錢姜三片薄荷七葉鹽梅一個水一盞煎至半盞如頭風注眼先將此藥熏服時再溫連白梅服之急風散治男子婦人偏正頭疼夾腦風太陽穴痛坐臥不安生川烏炮去皮臍辰砂研飛各二兩生南星洗去皮四兩上為細末每用酒調塗痛處兼治小兒傷風鼻塞清涕酒調塗囟門上不可服龍香散治偏正頭痛不可忍地龍去土微炒為末乳香半兩上為細末每用一錢摻在紙上作紙捻子燈上燒令煙出鼻內聞煙氣至靈散一名細辛散一名透頂散治偏正頭痛雄黃得深黃紅而雞冠色者佳臭黃勿用細辛真者去蘆洗上等分為末每用一字左痛搐左鼻右痛搐右鼻口中噙水搐之一方治偏頭疼名透關散一方如左痛搐右鼻右痛搐左鼻名透頂散必勝散一名必效散治風寒流注陽經以致偏正頭疼久年不愈此藥最有神效附子大者一隻生去皮臍切為四段以自然生薑汁一大盞浸一宿火炙乾再於薑汁內蘸再炙再蘸以盡為度高良薑與附子等分上為末每服二錢臘茶清調下食後連進二服忌熱物少時點頭散治偏正頭痛川芎二兩香附子去毛四兩炒上為細末每服一錢好茶清調下常服可除根一方等分空心熱酒調下明目又治婦人血風治偏正頭疼川芎盆硝各等分上為末用一字搐入鼻中立效一方治偏正頭疼上用穀精草一兩為末以白麵和貼紙上安痛處干即易之白殭蠶方治偏正頭疼並夾腦風連兩太陽穴疼痛上用白殭蠶細研為末用蔥茶調服方寸匕一方治卒頭痛熟水調下大附丸一名蔥附丸治氣虛壅上攻偏正頭痛不可忍欲倒卓者上用大附子一枚炮去皮臍為末蔥汁糊為丸如綠豆大每服十丸至十五丸茶清下一法以川烏頭炮去皮尖為末韭葉自然汁和丸治風虛痰涎頭疼服如前法立效散出德生堂方治偏正頭疼上用蓖麻子不拘多少去殼研爛紙上攤貼在左右太陽穴上即住疼一方研爛取汁於頭偏痛處塗之治偏正頭痛方出經驗良方上用朴硝萆薢等分為末搐鼻中立醒二芎餅子出濟生方治氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼上腦巔吐逆噁心目瞑耳聾常服清頭目化風痰撫芎川芎乾薑炮藁本去蘆蒼耳炒南星炮去皮防風去蘆甘草各等分上為細末生薑汁浸蒸餅丸如雞頭子大捏作餅子曬乾每服五餅細嚼茶酒任下不拘時候如聖餅子出永類鈐方治男子婦人氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼上腦巔吐逆噁心目瞑耳聾常服清頭目消風化痰暖胃氣太一散治偏正頭疼發散風壅上清頭目甚妙川芎石膏藜蘆甘草生各等分上為細末每服少許鼻內搐之微嚏為妙一字散出朱氏集驗方治偏正頭痛全蠍八個防風一分殭蠶半兩天麻一兩川烏一個炮南星一個重半兩以上者研為末生薑自然汁和成一塊入硃砂一粒豆大乳香一粒豆大和南星用文武火煨令香熟切作薄片焙乾上同為末入麝香硃砂各半兩拌勻每服一字食後蔥酒茶調下救苦神白散出衛生寶鑑治男子婦人偏正頭疼眉骨痛兩太陽穴痛及熱上攻頭目目赤不已項筋拘急耳作蟬鳴川芎甘草炙一錢甘松去土赤芍藥香白芷兩頭尖川烏頭去皮臍各六錢上為細末每服二錢溫茶清調下服藥飲熱水半盞許川芎神效散衛生寶鑑治風熱上攻偏正頭痛無問微甚久新川芎川烏頭生去皮臍吳白芷天南星麻黃去根以上各半兩甘草一分上為細末每服三錢水一盞生薑三片煎至七分投清茶酒半盞和滓溫服密室避風如人行至七里再服汗出為度其痛立愈通關散楊氏家藏方治偏正頭風頭旋腦痛鼻塞聲重四肢倦怠又治目赤腫癢昏澀羞明冷淚不止漸生翳膜胬肉遮障數年不愈者服之神驗山茵陳薄荷葉去土藁本去土木賊去節當歸洗焙川烏頭炮去皮臍尖蟬蛻去土七味各二兩川芎甘草炙香白芷羌活去蘆頭蓽茇以上五味各三兩石膏一兩半麻黃一兩去根節荊芥穗五兩防風去蘆頭五兩上件為細末每服一大錢臘茶調下食後雄黃散楊氏家藏方治一切風虛氣攻火炎上偏正頭痛嘔吐涎沫服之神效草烏頭肥實心白者水浸三宿切作片慢火焙乾二兩乾薑一兩炮防風去蘆頭當歸洗焙天南星炮藁本去土肉桂去粗皮甘草炙雄黃不夾石通明者別研白殭蠶炒去絲嘴川芎以上九味各半兩上件為細末入雄黃研勻每服一錢先嚼煨蔥三寸入生薑汁五七點茶清調下食後忌熱物少許茶調散出余居士選奇方治偏正頭風諸藥不愈者宜服此香白芷二兩半炒川芎一兩銼炒甘草一兩銼炒川烏頭半兩炮銼上四味搗羅為末每服二錢好茶少許薄荷三葉沸湯調下如暴傷風頭疼可加蔥白二寸細切和茶調下頭面風附論方書所謂頭面風者即眩暈是也然眩暈既涉三因不專為頭面風者如重傷風寒暑濕在三陽經皆能眩暈頭重項強但風則有汗寒則制痛暑則熱悶濕則重著吐逆眩倒屬外所因喜怒憂思致臟氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經亦使人眩暈嘔吐眉目疼痛眼不得開屬內所因或飲食飢飽甜膩所傷房勞過度下虛上實拔牙金瘡吐衄便利去血過多及婦人崩傷皆能眩暈眼花屋轉起則眩倒屬不內外因頭面風者由體虛之人陽脈為風所乘也諸陽之經皆上走於頭面若運動勞役陽氣發泄腠理開疏而受風邪謂之首風其狀頭面多汗惡風頭痛又新沐未乾不可便臥使頭重身熱或煩悶又夏月露下臥露墜面上令面皮厚成瘡癬作面風也方巴戟天散出聖濟總錄治頭面遊風巴戟天去心二兩菊花擇芎藭乾薑炮防風去叉石南葉白朮烏頭炮裂去皮臍附子炮裂去皮臍細辛去苗葉蜀椒去目並閉口者炒出汗山芋人參去蘆頭桔梗去蘆炒秦艽去土栝蔞實切焙乾澤瀉甘草炙銼羌活去蘆頭天雄炮裂去皮臍山茱萸熟乾地黃焙各一兩上為末每服一錢半加至二錢食前溫酒調下日再入頂散出千金方治頭面脹滿腦瘛偏枯發作有時狀如刀刺失聲音痠疼面目變青方山茱萸芎藭防風獨活各一兩細辛薯蕷莽草白朮牛膝石南甘草各一兩烏頭通草菖蒲附子麻黃天雄蜀椒桔梗各一兩六銖上粗搗篩酒服方寸