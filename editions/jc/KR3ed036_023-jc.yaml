四兩炒木香不見火一兩肉豆蔻麵裹煨二兩上為細末燈心煮棗肉丸如梧桐子大每服七十丸薑湯鹽湯下半夏飲治脾胃虛弱不能飲食乾噦噁心或水穀不化半夏為末生薑汁製作餅曝乾厚朴去粗皮生薑汁炙各二兩人參陳橘皮湯浸去白焙白朮各一半兩上粗搗篩每服三錢匕水一盞半生薑五片棗二枚擘破同煎至八分去滓溫服木香丸治脾胃虛寒宿食不消留滯成塊心腹疼痛木香丹砂研各三錢蓬莪朮煨銼京三稜煨銼各一兩巴豆二十粒去皮心膜出油上為細末醋煮麵糊丸如豌豆大每服二丸至三丸食後臨臥生薑橘皮湯下丁香丸治脾胃虛寒宿飲不消兩脅滿痛丁香丁香皮乾薑炮陳橘皮湯浸去白焙各一兩巴豆霜五分上搗羅四味為末入巴豆霜拌勻再羅用好酒煮麵糊丸如綠豆大每服五丸至七丸食後溫生薑湯下阿魏丸治脾胃虛寒宿食不消腹脹腸鳴通和五臟阿魏研半兩蠍稍炒搗麝香研各一分丹砂研半分桃仁四十九枚去皮尖雙仁生研上研令勻酒煮麵糊丸如梧桐子大每服一二十丸溫酒下不嚼早晨日中臨臥各一服溫白丸治脾胃虛冷一切病半夏湯浸切作片生薑汁浸焙二兩白朮一分丁香一分上為末生薑汁麵糊丸如梧桐子大每服十丸濃煎生薑湯下食前空心服如腹痛嘔逆食後服丁附丸出楊氏家藏方治脾胃受寒虛冷者嘔吐不止丁香一兩附子炮豆蔻麵裹煨胡椒各半兩上為末蜜丸每服十五丸嚼橘皮湯下木香乾姜枳朮丸出蘭室秘藏方破除寒滯氣消寒進飲食木香三錢乾薑五錢炮枳實一兩炒白朮一兩半上為細末荷葉燒飯丸桐子大每服三五十丸溫水下食前半夏湯治脾胃虛冷飲食不化嘔逆多痰半夏白礬水煮焙白扁豆各一兩人參枳殼去瓤麩炒各半兩上為粗搗篩每服二錢匕水一盞生薑三片棗一枚擘破同煎至七分去滓溫服不拘時候胡椒丸一名乾薑丸治脾胃虛冷大腸泄瀉飲食不化胡椒一兩烏頭炮裂去皮臍乾薑炮赤石脂各半兩上為末麵糊丸如梧桐子大每服十五丸至二十丸空心食前米飲下玄胡丸出德生堂理中焦不和脾胃積冷心下虛痞腸腹中疼痛或飲食過多胸脅逆滿噎塞不通咳嗽無時嘔吐冷痰婦人血氣肚腹疼痛癥瘕氣結蟲煩不安玄胡當歸青皮蓬朮檳榔雄黃另研木香各一兩三稜二兩上為末水糊為丸如梧桐子大每服三十丸生薑湯下不拘時候小三稜煎丸治宿食不消心腹脹滿吐逆吞酸京三稜蓬莪朮各四兩芫花一兩上同入瓷瓶內用米醋五升浸滿封瓶口慢火煨微干取出前二味杵碎仍用余醋炒芫花微焦並焙乾為末醋煮麵糊丸如梧桐子大每服三丸至五丸生薑湯下婦人醋湯下一方橘皮湯下厚朴湯治脾胃虛冷氣逆嘔吐不能下食厚朴去粗皮塗生薑汁炙熟三兩人參陳橘皮去白炒各一兩上粗搗篩每服五錢匕水一盞半同煎至八分去滓溫服治脾胃冷弱腹中積冷脹滿刺痛肘後方上以肥狗肉半斤米鹽豉等煮熟頻吃一兩頓愈治食生冷雜物或寒時衣薄當風或夜食便臥不即消心腹煩痛脹急或連日不化方上燒地令極熱即敷薄薦若莞席安臥覆取汗即立愈也吳茱萸散出聖惠方治脾胃虛冷水穀不化心腹疼痛四肢無力少思飲食吳茱萸半兩湯洗七遍焙乾微炒當歸三錢分銼微炒乾薑三錢分炮裂銼厚朴二兩去粗皮塗生薑汁炙令香熟桂心半兩枳實半兩麩炒微黃人參三錢分去蘆頭甘草半兩炙微赤銼麥糵一兩微炒上件藥搗篩為散每服三錢以水一中盞入棗一三枚煎至六分去滓食前稍熱服之厚朴湯出永類鈐方治脾胃虛冷腹痛泄瀉胸膈痞悶脅肋脹滿嘔逆噁心不思飲食厚朴去粗皮十斤用生薑二斤制棗一斗六升丁香皮八兩鹽炒十五斤甘草炒十二斤丁香枝十二兩上為末每服二錢水一盞生薑三片棗二個擘破同煎至七分熱服常服溫中順氣進飲食每服一錢沸湯點服食前胡椒湯出和劑方治脾胃受寒胸膈不利心腹疼痛嘔逆噁心常服溫暖脾胃去寒順氣紅豆肉桂不見火各一兩胡椒六兩乾薑焙三兩桔梗焙三十兩甘草炙七錢兩上為細末每服一大錢入鹽少許沸湯點服不拘時快氣湯出永類鈐方大治脾胃虛冷酒食所傷胸膈不快嘔逆噁心吞酸吐水口淡舌澀不思飲食並宜服之甘草炙十八兩乾薑炮二斤半粟米炒十三三十兩桔梗炒三斤上炒鹽可秤一百二十錢重同為細末每服一錢沸湯點服食前木香調中丸出醫方大成治因飲食不調致傷腸胃心腹脹痛臟腑泄瀉米穀不化木香青皮去白陳皮去白肉豆蔻麵煨檳榔三稜炮訶子草豆蔻仁各等分上為末麵糊丸如梧桐子大每服六十丸食前熱米飲下治脾胃臟腑傷冷飲食不化積漸成水頭面黃腫氣力微小用小豆一升水六升生薑三兩捶碎半夏一兩不捶碎以上作一處爛煮令熟臨水乾時先抽豆汁一兩盞著在瓶內慢火煮豆熟卻取豆出熬令豆乾空心頻吃豆一盞以來至晚日西卻用先抽者豆汁下後方藥出楊子建萬全護命方生牽牛熟牽牛各半兩羌活防風吳茱萸桔梗細辛黃橘皮各一分半夏一二銖上細杵羅為末每服四錢入生蔥三枝水一盞對煎先抽者豆汁半盞調下和滓吃治脾氣虛弱食著硬物只在脾上經三四年不化凡所吃者硬物如嚼不爛者冷肉之類但脾上有不化之物吃熱酒後輕噯哺一聲即聞其物臭氣出楊子建萬全護命方吳茱萸官桂草豆蔻各一分芫花狼毒各半兩捶碎鱉甲醋炙一兩半夏三銖牽牛一兩半上芫花狼毒先用醋兩碗於土器內煮乾炒黃微黑色研為末更杵牽牛半夏二味自作一處所餘諸藥只作一處杵羅為末每服五錢用狼毒芫花末半錢牽牛半夏末一二錢半諸藥末二錢作一服土銼納濃煎蔥湯調下吃晚食前服一日一夜不轉加牽牛末半夏末一錢治脾臟虛冷宿食不消輕吃些物後便吐酸水面黃少氣力大腑泄瀉方出楊子建萬全護命方厚朴黃橘皮各半兩枇杷葉去毛防風川芎吳茱萸肉豆蔻獨活甘草炮各一分乾薑三銖半夏二銖上細杵羅為末每服二錢匕水一盞煎取八分去滓吃三黃丸出蘭室秘藏方治傷羊肉濕面辛辣滋味之物黃芩二兩黃連去須酒洗一兩大黃濕紙裹煨一兩上為極細末湯浸蒸餅為丸如綠豆一倍大每服五七十丸至百丸白湯下臨時量所傷多少加減服之除濕湯出蘭室秘藏方治傷馬奶子並牛羊酪水半夏湯洗七次一錢車前子炒香五分澤瀉半兩甘草炙二錢神麯炒黃色一兩紅花二分上同為極細末每服二錢匕白湯調下棗附丸出十便良方治脾氣虛弱大腸冷滑臟腑泄瀉米穀不化飲食無味乏力短氣常服益脾壯氣用附子七錢以上者秤十兩不去皮同大棗二升於銀石器內用水慢火同煮藥上常令有兩指許水面水耗則旋添熱湯煮一日取出附子每個切作三片再同棗一處又煮半日取附子削去皮薄切片焙乾為末別煮棗肉爛研和丸如梧桐子大每服五十丸漸加至一百丸空心米飲下半夏平胃散一名安中散大治胃虛寒熱百病脾寒痰盛不思飲食人皆宜服之出保生回車論半夏二兩湯浸洗七次切片焙乾厚朴四兩薑製陳皮六兩去瓤焙乾甘草二兩炙焦黃蒼朮六兩米泔浸一伏時去皮切焙乾上並銼一處慢火炒焦杵篩為粗散每服三錢水一盞生薑三片棗一枚同煎六分去滓溫服食前日進三服厚朴煎出十便良方治脾胃久積冷氣不思飲食三焦不調中臟虛乏開胃進食厚朴附子炮各二兩陳皮訶子乾薑桂茯苓甘草各一兩上為細末煉蜜和丸如梧桐子大每服三十丸如大段膈氣進不得以水酒共一盞煎藥末二錢和滓下三十丸棗肉和丸尤佳健脾湯出十便良方調中養氣消化宿食生薑一斤切片青鹽三兩研拌一宿焙乾草豆蔻大麥糵陳橘皮各二兩甘草一兩上為細末每服一錢白湯調下空心木香橘皮丸出續易簡方治脾胃虛弱飲食所傷久不消化或成泄瀉及氣不升降常服溫脾暖胃快膈進食荊三稜炮切蓬莪朮炮切黑牽牛微炒烏梅連核用青皮去白橘紅各一兩木香縮砂仁肉桂去粗皮各半兩丁香各一分上為細末醋糊為丸如梧桐子大每服三十丸食後臨臥熟水米飲任下棗合丸出澹寮方治脾胃虛冷乾嘔噁心嘔吐痰沫全不思食十膈五噎丁香半兩不見火半夏曲一兩胡椒二錢乾薑二錢炮木香二錢不見火上為細末生薑汁浸蒸餅為丸每兩作十五丸每服一丸用大棗一枚去核入藥在內濕紙裹煨令香熟去紙細嚼溫生薑湯送下中寒治驗出衛生寶鑑方參政商公年六十二宿有胃虛之證至元己巳住夏於上都時正六月霖雨大作因公務勞役致飲食失節每旦臍腹作痛腸鳴自利一二行不喜飲食懶言語身體困倦其脈沉緩而弦復時眩以年高氣弱脾胃宿證加以霖雨及勞役飲食失節重虛中氣難經曰飲食勞倦則傷脾不足而往有餘隨之若臟火不及寒乃大行今脾胃正氣不足腎水必挾木勢反來侮土乃薄所不勝乘所勝也非甘辛大熱之藥則不能瀉水補土雖夏暑之時有用熱遠熱之為戒亦云有假者反之是從權而治其急也內經云寒淫於內治以辛熱薑附辛甘大熱以瀉寒水為君脾不足者以甘補之人參白朮甘草橘皮苦甘溫以補脾土胃寒則不欲食以生薑草豆蔻辛溫治客寒犯胃厚朴辛溫厚腸胃白茯苓甘平助姜附以導寒濕白芍藥酸微寒補金瀉木以防熱傷脾氣為佐不數服良愈附子溫中湯出衛生寶鑑方治脾胃虛弱中寒腹痛腸鳴自利谷時不化不喜飲食懶語言困倦嗜臥黑附子炮裂去皮臍七分乾薑炮七分草豆蔻曲裹燒熟去皮三錢人參五錢白朮五錢炙甘草五錢陳皮三錢厚朴三錢白茯苓五錢白芍藥去皮五錢上件銼如麻豆大每服五錢或至一兩水二大盞半生薑五片煎至一盞三分去滓溫服食前神麯補中丸出楊氏家藏方治脾胃虛寒飲食遲化胸膈痞悶腹脅脹滿口苦無味噁心咽酸倦怠嗜臥滑泄下利神麯五兩炒乾薑三兩炮川椒炒出汗去目二三兩上件同為細末別用神麯末三兩煮糊和為丸如梧桐子大每服五十丸溫米飲下食前參藿散出朱氏集驗方治脾胃積冷吐逆不納飲食宿食不消氣不升降嘔吐酸水心腹膨脹腳手虛浮甘草白芷各一兩丁香皮半兩厚朴三兩制上㕮咀每服三錢姜三片紫蘇五葉水一盞煎至七分服之無時如虛浮入黑豆五十粒濃煎忌生冷魚腥動氣等物理脾散出如宜方治脾胃虛冷不進飲食吐多黃水肉桂良薑陳皮制青皮甘草炙各一兩訶子五個草豆蔻三個川烏炮一個上㕮咀姜煎空心服又名進食散木香橘皮丸出楊氏家藏方治脾胃虛弱飲食所傷久不消化或成泄瀉及氣不升降常服溫脾胃快氣進食京三稜炮切蓬莪朮炮切烏梅連核用各一兩肉桂去粗皮半兩縮砂仁半兩黑牽牛微炒一兩上件為細末醋煮麵糊為丸如梧桐子大每服十五丸至二十丸食後臥熱水米飲送下沉香溫脾湯出衛生寶鑑方治脾胃氣虛冷心腹疼痛嘔逆噁心脅肋脹滿不思飲食四肢倦怠或泄瀉吐利沉香丁香木香桂去粗皮附子炮去皮臍人參去蘆川薑炮白朮甘草炙白豆蔻仁縮砂仁各等分上件為細末每服三錢水一盞入生薑五片棗一枚同煎至七分去滓熱服空心食前作粗末亦可療男子女人脾虛腹肚氣薄食不消化面上黑點出本草以乾柿二斤酥一斤蜜半斤先和酥蜜鐺中消之下柿煎十數沸用瓷器貯之每日空腹服三五枚久服甚良
