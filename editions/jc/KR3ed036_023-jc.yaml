body:
  text: 卷二十三脾臟門脾胃俱虛附論夫右手關上脈陰陽俱虛者足太陰與陽明經俱虛也病苦胃中如空狀少氣不足以息四逆寒泄注不已名曰脾胃俱虛也方千金大養脾丸出和劑方治脾胃虛弱停寒留飲膈氣噎塞反胃吐食心胸痞滿脅肋虛脹胸腹刺痛牽引背膂食少多傷言微氣短口苦舌澀噁心嘔噦喜唾咽酸久病泄痢腸胃虛滑或大病氣不復常飲食無味形容憔悴酒後多痰並宜服之常服養脾壯氣多進飲食枳殼神麯陳皮去白麥糵炒茴香白姜炒炮縮砂去皮肉豆蔻三稜炮茯苓去皮良薑薏苡仁益智去殼胡椒木香白扁豆炒丁香白朮紅豆藿香去梗山藥苦梗炒人參甘草炙蓬朮炮上各等分為末煉蜜為丸如彈子大每服一粒細嚼白湯送下溫酒亦得空心食前常服養益脾胃大進飲食一方無胡椒名養脾丸治證同前參附大正氣散治男子婦人虛弱及瘧安後體虛如虛眼昏暗加淨枸杞子揀菊花蕊各半兩常服順氣快脾進美飲食附子一個炮去皮臍人參去蘆不用北參木香不見火藿香葉縮砂仁檳榔白朮白茯苓益智仁草果仁煨去殼丁香不見火各半兩陳皮去白粉草炙香附子炒去毛肉桂不見火烏藥炒黃枳殼麩炒去瓤青皮去白黃耆擘開鹽水浸一宿沉香不見火半兩厚朴薑製各一兩上為細末羅過每服二錢水一盞姜三片棗二枚煎空心服當歸丸補脾安胃調氣止痛治脾虛寒身重不舉語音沉鼓厲風傷痛便利無度當歸酸棗仁乾薑各八錢兩芎藭乾地黃天雄各六兩地骨皮黃耆各七兩大棗二十枚吳茱萸五合甘草秦椒葉厚朴秦艽各四兩桂心防風附子白朮各五兩錢上為末蜜丸如梧桐子大酒服三十丸加至四十丸日再服人參補虛湯出千金方治脾胃俱虛苦肌寒痛木香頓散治脾胃虛弱停食不化心腹絞痛腸滑自利嘔吐膨脹木香不見火縮砂仁良薑炒乾薑炮丁香各半兩胡椒陳皮去白紅豆取仁草果仁甘草各三錢白豆蔻仁二錢青皮去白三錢上㕮咀每服三錢水一盞半姜三片棗二枚煎取一盞去薑棗再以銀器盛所煎藥於重湯內再煎八分空心熱服蓬朮煎丸和劑方治脾胃虛弱久有傷滯中脘氣痞心腹膨脹脅下堅硬胸中痞塞噎氣不通嘔吐痰水不思飲食或心腹引痛氣刺氣急及療食症酒癖血瘕氣塊時發疼痛嘔噦酸水面黃肌瘦精神困倦四肢少力又治婦人血氣不調小腹㽲痛並皆治之豬胰一具京三稜蓬莪朮二味醋煮令透切焙為末各四兩以上二味同豬胰入硇砂熬膏川楝子去核山藥檳榔枳殼去瓤茴香炒附子炮去皮各二兩硇砂半兩上件碾細莪朮末入豬胰硇砂膏同醋糊為丸如梧桐子大每服十五丸生薑湯下婦人淡醋湯下不計時候更量虛實加減常服順氣寬中消積滯化痰飲一方鹽湯或溫酒下參苓壯脾丸一名大養脾丸治脾胃虛弱胸膈痞悶脅肋脹滿心腹刺痛反胃吐食口苦吞酸胸滿短氣肢體怠惰面色痿黃及中焦痞不任攻擊臟腑虛寒不受峻補或因病氣衰食不復常稟受怯弱不能飲食及久病泄痢腸胃虛滑並宜服之人參白朮茯苓去皮肉桂去粗皮不見火縮砂仁去皮乾薑胡椒麥糵神麯山藥白扁豆炒上等分為末煉蜜丸如彈子大每服一丸細嚼白湯下溫酒亦得空心食前常服育神養氣和脾補胃進美飲食百一選方阿魏丸治脾胃怯弱食肉食麵或食生果停滯中焦不能克化致脹滿腹疼嘔惡不食或利或秘悉主之阿魏酒浸化官桂不見火蓬朮炮麥糵炒神麯炒青皮去白蘿蔔子炒白朮百草霜二三錢巴豆去殼油三五七個乾薑炮一分兩上為末和勻用薄糊丸如綠豆大每服二十丸不拘時薑湯送下面傷用麵湯下生果傷用麝香湯下參苓白朮散出和劑方治脾胃虛弱飲食不進多困少力中滿痞塞心忪氣喘嘔吐泄瀉及傷寒咳噫此藥中和不熱久服養氣育神醒脾悅色順正辟邪蓮子肉去皮薏苡仁縮砂仁桔梗炒令深黃色各一斤白扁豆薑汁浸去皮微炒一斤半白茯苓人參去蘆甘草白朮山藥各二斤上為細末每服二錢棗湯調下小兒量歲數加減思食調中丸醫方集成治脾胃久弱三焦不調胸膈痞悶肢體倦怠嘔逆噁心飲食進退氣道不勻或吐痰水陳曲炒麥糵炒半夏曲陳皮去白烏藥各一兩檳榔三錢人參三錢分木香沉香各五錢半兩白朮二一兩五錢上為細末蜜調白麵糊為丸如梧桐子大每服三十丸食前溫米飲送下啟脾丸百一選方治脾胃虛弱氣不升降中滿痞塞心腹膨脹腸鳴泄瀉不進飲食人參白朮青皮湯洗去瓤神麯炒麥糵炒陳皮湯洗去白瓤縮砂仁厚朴去粗皮銼薑製一宿炒乾薑炮以上各一兩甘草炒一兩五錢上為末煉蜜丸如彈子大每服一丸細嚼米飲下食前服補脾胃瀉陰火升陽湯出濟生拔粹方羌活一兩升麻八錢柴胡一半兩黃耆一兩臣人參七錢臣甘草一兩炙黃芩一兩黃連去須酒製五錢炒為臣為佐石膏少許腹脹微用過時去之從權蒼朮一兩去皮泔浸銼碎秤上件㕮咀每服秤三錢水二盞煎一盞去滓大溫服早飯後午飯前間日服藥前宜減食宜美食服藥訖忌語話一二時辰許及酒濕面大料物之類恐大濕熱之物復助火邪而愈損元氣也亦忌冷水及寒涼淡滲之物及諸果恐陽氣不能生旺也宜溫食及薄滋味以助陽氣大抵此法此藥欲令陽氣升浮耳若滲泄淡味皆為滋陰之味為大禁也雖然亦有從權而用如見腎水旺及督任沖三脈旺盛則用黃柏知母先洗訖火炒制加之若分兩則臨病斟酌不可久服恐陰氣而為害也小便赤或澀當利之大便澀當行之亦從權也得利勿再服此雖立食禁如無可食之物一切禁之則胃氣失所養矣亦當從權而食之以滋胃也升陽益胃湯濟生拔粹方脾胃乏虛怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口乾舌乾飲食無味大便不調小便頻數不嗜食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不升故也當升陽益胃羌活五錢柴胡三錢獨活五錢白朮三錢防風五錢以其秋旺故以辛溫瀉之人參三一兩炙甘草一兩半夏湯洗一兩此一味脈澀者宜用澤瀉二三錢不渴勿用黃耆二兩黃連二兩錢橘皮不去瓤四錢茯苓三錢小便利不渴者不用白芍藥五錢何故秋旺用人參白朮芍藥之類反補肺為脾胃虛則肺最受病故因時而補易為力也上㕮咀每服秤三錢生薑五片棗二枚去核水三盞煎一盞去滓溫服早飯午飯間服禁忌如前其藥漸加至五錢止服藥後如小便利而病加增劇是不宜利小便當少去茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須薄滋味之食或美食助其藥力益升浮之氣而滋其胃氣也慎不可淡食以損藥力而助邪氣之降沉也可以小役形體使胃與藥得轉運升發慎勿太勞役使復傷若脾胃得安靜尤佳若胃氣稍強少食果以助谷藥之力經云五穀為養五果為助者此也黃耆人參湯濟生拔粹方脾胃虛弱必上焦之氣不足遇夏天氣熱盛損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故或熱厥而陰虛或寒厥而氣虛口不知味目中溜火而視物䀮䀮無所見小便頻數大便難而結秘胃脘當心而痛兩脅下痛或急縮臍平周圍如繩束之急或則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌強腰背胛眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若陰氣覆在皮毛之上皆天熱之熱助本病也乃庚大腸辛肺金為熱所乘而作當先救元氣理落庚辛之不足人參去蘆五錢分炙甘草二分白朮五分橘皮五分不去白黃耆一錢如自汗過多時更加一錢炒曲三分五味子九個蒼朮五分無汗或有汗多更加五分升麻六分麥門冬去心五分當歸酒洗二分用身黃柏酒洗三分以救水之源上㕮咀都作一服水二盞煎至一盞去滓稍熱服食遠或空心服之忌酒濕面大料物之類及過食冷物等如心痞悶加黃連二分或三分如胃脘當心痛減大寒藥加草豆蔻仁五分如脅下痛或縮急加柴胡二分或三分如頭痛目中溜火加黃連二分或三分川芎三分如頭目不清利上壅下熱加蔓荊子三分藁本二分細辛一分川芎三分生地黃三二分如氣短精神如夢寐之間困乏無力加五味子九個如大便澀滯阻一二日不見者致食少食不下血少血中伏火而不得潤也加當歸身生地黃各五分桃仁三枚湯洗去皮尖另研麻子仁泥五分如大便通所加之藥勿再服如大便又不快利者勿用別藥少加大黃煨五分如不利者非血結血秘而不通也是熱則生風其病人必顯風證單血藥不可復加之當服黃耆人參湯藥只用羌活五錢防風五錢二味㕮咀以水四盞煎至一盞去滓空心服之其大便必大走也一服便止如胸中氣滯加青皮皮薄清香可愛者一分或二分並去白橘皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之也如氣滯大甚或補藥太過或病人心有憂滯鬱結之事更加木香二分或三分白豆蔻仁二分縮砂仁二分或三分與正藥同煎服之如腹不痛不惡寒者加白芍藥半錢黃芩二分卻減五味子升陽除濕防風湯濟生拔粹方治如大便閉塞或裡急後重數至圊而不能便或少白膿或少有血慎勿利之以舉其陽則陰氣自除矣蒼朮泔制四兩防風二錢白朮一錢白茯苓一錢白芍藥一錢上㕮咀除蒼朮另作片子水一碗半煮至二大盞納諸藥同煎至一大盞去滓稍熱服空心食前又方濟生拔粹方治脾胃又衰體重肢節疼痛大便泄小便閉塞以升陽防風藥治之羌活獨活柴胡升麻各一錢防風根截半錢甘草根截半錢上㕮咀水四中盞煎至一盞去滓稍熱即服愈益氣湯濟生拔粹方治白樞判素有脾胃虛損證目疾時作面目睛俱黃小便或黃或白大便不調飲食減少氣短上氣怠惰嗜臥四肢不收六月中目疾作以瀉肝散下數行而前疾增劇予謂大黃牽牛雖能除濕熱而不能走經絡下咽不入肝經大黃苦寒重虛其胃牽牛味辛能瀉氣重虛肺本嗽大作蓋標實不去本虛愈甚適當暑雨黃證增劇於脾胃肺中瀉外經中之濕熱防風三分生薑五分蒼朮三分茯苓二分澤瀉三分升麻二分此藥能走經除濕熱而不守本故不瀉本臟補肺與脾胃本中氣之虛弱橘皮二分青皮一分人參五分甘草生二分白朮二分白芍藥二分此藥皆能守本而不走經不走經者不滋經絡中邪守者能補臟之元氣也五味子三分麥門冬二分人參二分黃柏一分此藥去時令浮熱濕蒸上件銼如麻豆大都作成一服水二盞煎至一盞去滓稍熱空心服之製半夏白朮天麻湯濟生拔粹方治脾胃證時煩躁胸中不利大便不通以藥利數行復添吐逆食不能下痰唾稠黏湧出不止眼黑頭旋噁心煩悶氣短促上喘無力不欲言心神顛倒目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥蓋因胃氣已損復下兩次則重虛其胃而痰厥頭痛作矣宜服此天麻半錢人參五分白朮一錢蒼朮五分橘皮五分半夏湯洗七次一錢五分黃耆五分白茯苓半錢澤瀉五分炒曲一錢乾薑三錢分黃柏二分大麥糵曲一錢五分上㕮咀每服半兩水二盞煎至一盞去滓帶熱服食前此頭痛苦甚謂之足太陰痰厥頭痛非半夏不能療眼黑頭旋非天麻不能除黃耆甘溫瀉火補元氣人參甘溫瀉火補中益氣二術甘苦溫除濕補中益氣澤瀉茯苓利小便導濕橘皮苦溫益氣調中升陽面消食蕩胸中滯氣大麥糵曲寬中助胃氣乾薑辛熱以滌中寒黃柏大苦寒酒洗以主冬天少火在泉發燥也人參芍藥湯濟生拔粹方治脾胃虛弱氣促憔悴人參三分黃耆一錢五味子五個白芍藥一錢炙甘草一錢當歸身三分麥門冬一錢上㕮咀每服水一盞半煎一盞去滓稍熱服之升陽湯濟生拔粹方一名黃耆補胃湯治一日大便三四次溏而不多有時泄瀉腹中鳴小便黃黃耆三錢一分甘草二錢升麻六三分柴胡三分橘皮三分益智仁三分當歸身三分紅花少許上㕮咀分作二服每服水二大盞煎至一盞去滓稍熱服食前升陽除濕湯濟生拔粹方治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困弱並宜服之陳皮三分升麻柴胡神麯防風各五分蒼朮一錢甘草三分羌活五分大麥糵曲三分如胃寒腸鳴者加澤瀉三五分豬苓三分益智仁五分半夏三分半錢生薑三片棗三個同煎至半服之非常腸鳴不用上㕮咀作一服水三盞煎至一盞去滓空腹服益胃湯濟生拔粹方治頭悶勞動則微痛不喜飲食四肢怠惰燥熱氣短口不知味腸鳴大便微溏黃色身體昏悶口乾不喜食冷黃耆二分甘草二分黃芩三分當歸梢五分蒼朮一錢五分陳皮五分升麻五分柴胡三分白朮三分人參三分半夏二分益智仁二分上㕮咀作一服水二大盞煎一盞去滓稍熱服食前忌飲食失節生冷硬物酒濕面一方紅花少許名人參益胃湯生薑和中湯濟生拔粹方治食不下口乾虛渴四肢困倦柴胡二分藁本半分錢羌活七分升麻三分蒼朮一錢黃芩二錢生用酒黃柏二分生甘草二一分炙甘草二一分橘皮二分人參五分白朮五分葛根五分上㕮咀水二盞生薑五片棗二枚擘開煎一盞去滓稍熱服之食前養胃湯醫方集成方治脾胃虛寒嘔逆噁心腹脅脹痛腸鳴泄瀉或外感寒熱如瘧骨節煩疼並治之及不得臥淅淅惡風洒洒惡寒唇口乾面目虛浮不思飲食藿香去梗厚朴薑製半夏湯洗茯苓各一兩人參三分白朮五錢甘草炙二分草果五錢附子炮陳皮去白各三分上㕮咀每服四錢以水一盞半生薑五片棗子二枚烏梅半個煎服之常服溫胃消痰下氣闢寒疫草豆蔻丸濟生拔粹方治脾胃虛而心火乘之不能滋榮上焦元氣遇冬腎與膀胱之寒水旺時子能令母實致肺金大腸相輔而來克心乘脾胃此大復其仇也大勝必大復故皮毛血脈分肉之間元氣已經於外又大寒大燥二氣並乘之則苦惡風寒耳鳴及腰背相引胸中而痛鼻息不通不聞香臭額寒腦痛目時眩目不欲開腹中為寒水反乘痰唾沃沫食入反出常痛及心胃痛脅下急縮有時而痛腹不能努大便多瀉而少秘下氣不絕或腸鳴此脾胃虛之極也胸中氣亂心煩不安而為霍亂之漸膈咽不通噎塞極則有聲喘喝閉塞或日陽中暖室中稍緩口吸寒風則復作四肢厥逆身體沉重不能轉側頭不可以回顧小便溲而時躁此藥主秋冬寒涼大復氣之藥也草豆蔻仁一錢四分麵裹煨熟用仁吳茱萸八分湯洗去蘆焙乾橘皮八分益智仁八分白殭蠶八分或六分生甘草六分熟甘草六分青皮六分桃仁浸洗去皮尖六七分澤瀉一分小便數加減半黃耆八分半夏一錢湯洗神麯四分人參八分薑黃四分麥糵曲炒一錢五分當歸身六分柴胡二分或四分詳脅痛輕重用上為細末桃仁另研如泥一處研勻湯浸面蒸餅為丸如梧桐子大每服三五十丸白湯送下斟酌加減曲術丸一名椒曲丸治脾氣久虛不進飲食停飲脅痛腹脹滿臟腑虛滑止而復作痼冷積傷久不愈神麯白朮各五兩乾薑官桂辛辣者吳茱萸炒紫川椒各三兩上為細末薄糊丸如梧桐子大每服三五十丸生薑湯下食前空心服有飲加半夏曲二兩癸亥中予作數劑自服飲食倍進一方用米飲下醫方集成方二神丸治脾腎虛弱全不進食泄瀉不止破故紙四兩炒肉豆蔻二兩生上為細末用大肥棗四十九枚生薑四兩切片同煮棗爛去姜取棗剝去皮核用肉研為膏入藥和杵丸如梧桐子大每服三十丸鹽湯下有人全不進食服補脾藥皆不效予授此方服之頓然能食此病不可全作脾虛蓋腎氣怯弱真元衰劣自是不能消化飲食譬如鼎釜之中置諸米穀下無火力雖終日米不熟其何能化嘗記服菟絲子淨淘酒浸曝乾日抄數匙以酒下十日外飲啖如湯沃雪亦如此理也又方以前方內加木香半兩茴香一兩名四神丸又方以前方內加神麯麥糵各一兩亦名四神丸補脾散治脾泄不止食積不消癥瘕塊結大腸滑泄臟毒下利腹痛腸鳴麥糵炒三兩神麯炒二兩茴香炒草果逐個用麵裹煨熟厚朴制乾薑炮陳皮各一兩木香生五錢甘草炙五錢上為末脾泄瀉訶子湯入鹽調下二錢脾虛腸鳴氣不和瀉不止炒姜酒調下常服鹽湯點空心食前服黃耆補中湯黃耆一錢人參八分甘草炙五錢白朮五錢蒼朮五錢陳皮五錢澤瀉三分豬苓三分茯苓三分上㕮咀用水二盞煎至七分去滓大溫服下和中丸御藥院方治脾胃怯弱陰陽不和三焦氣澀心腹痞悶嘔逆痰甚頭目不清困倦少力飲食減少肌體瘦瘁肢節煩疼常服和中順氣升降陰陽消痰止嘔長肌起困進美飲食藿香葉去土人參陳皮用巴豆二錢半炒焦不用巴豆各一兩丁香五錢白朮白茯苓去皮半夏湯洗生薑汁浸各二兩木香半兩上為細末水煮麵糊和丸如梧桐子大每服五十丸食前煎生薑湯下又方用生薑自然汁打糊為丸食後米飲湯下燒胃丸一名八味厚朴丸治脾胃虛冷疼痛瀉痢方見八味厚朴丸八味理中丸百一選方治脾胃虛弱胸膈痞脹腹滿時痛滿身重四肢不舉嘔吐痰水腸鳴泄瀉食飲不化白朮四兩川薑縮砂仁麥糵各二兩人參神麯白茯苓各一兩甘草炙一兩半上為細末煉蜜丸每服分作十丸薑湯空心嚼下或加半夏曲一兩入鹽點服亦得名八味理中湯理中湯丸養生要藥緩急便得篋中常貯不可無之其丸者得蜜而潤入脾為快溫補為宜若以盪滌寒邪祛逐冷積則湯為捷且免蜜之滯脾也治腹脹善噫食則欲嘔泄澼溏下口乾四肢重好怒不欲聞人聲忘誤喉痹補之出千金方黃連一兩禹餘糧二兩白朮乾薑各三兩大麻子五兩桑白皮八兩大棗二十枚上㕮咀以水一斗二升煮取三升分四服蘇橘丸人參一兩半橘紅一兩砂仁一兩紫蘇葉二兩五錢乾生薑七錢甘草七錢五分茯苓一兩五錢上為細末煉蜜為丸每兩分作五丸細嚼熱水下一丸治中湯和劑方治脾胃不和飲食減少短氣虛羸而復嘔逆霍亂吐瀉胸痹心痛逆氣短氣中滿虛痛膈塞不通或大病瘥後胸中有寒時加咳唾並宜服之又治太陰傷寒手足溫自利不渴腹滿時痛咽乾其脈尺寸俱沉細人參去蘆甘草炒乾薑炮白朮銼青皮炒陳皮洗去白各二兩上為粗末每服三錢水一盞半煎至一中盞去滓稍熱入鹽點服空心或霍亂氣虛未禁熱藥者尤宜服之一方若胃脘有寒痰浮於上嘔吐不已者半夏等分丁香減半名丁香溫中湯木香消穀丸御藥院方治脾胃俱虛不能消化水穀胸膈痞悶腹脅時脹連年累月食減嗜臥口苦無味虛羸少氣又治胸中有寒飲食不下反胃翻心霍亂嘔吐及病後新虛不勝穀氣或因病氣衰食不復常並宜服之木香半兩青皮洗淨焙乾陳皮洗淨焙乾各四兩桂去粗皮乾薑炮各二兩牽牛八兩半生半熟上為細末水煮麵糊為丸如小豆大每服十五丸加至二十丸米飲下日進二服不拘時候加減思食丸御藥院方治脾胃俱虛不消化水穀胸膈痞悶腹脅時脹連年累月食減嗜臥口苦無味虛羸少氣又治胸中有寒飲食不下反胃翻心霍亂嘔吐及病後新虛不勝穀氣或因病氣衰食不復常並宜服之神麯炒黃大麥糵炒黃各五二錢烏梅四兩乾木瓜切五錢白茯苓去皮揀甘草細銼炒各二兩五錢上為細末煉蜜為丸如櫻桃大每服一丸細嚼白湯下不拘時候如渴時噙化一丸生津液進飲食治脾胃虛熱豬皮陳橘皮紅生薑人參蔥白上切擘之合陳米水煮如羹去橘皮空腹食之消食丸和劑方治脾胃俱虛不能消化水穀胸膈痞悶腹脅膨脹連年累月食減嗜臥口苦無味虛羸少氣又治胸中有寒飲食不下反胃翻心霍亂嘔吐及病後新虛不勝穀氣或因病氣衰食不復常並宜服之烏梅去核焙乾乾薑炮各四兩小麥糵炒黃三兩神麯搗末炒六兩二錢上為末蜜搜為丸如梧桐子大每服十五丸加至二十丸米飲下日進二服不計時一方不用蜜以蒸粟米飯為丸四炒丸瑞竹堂方治脾胃虛弱脾土不能化痰成窠鬥停於胸臆飲食既少復遲當以實脾土痰下氣順肉豆蔻一兩用鹽酒浸破故紙同炒乾燥不用故紙山藥一兩酒浸北五味子同炒五味子炒乾燥不用五味子厚朴二兩去粗皮青鹽一兩同炒黑色青鹽不見煙為度不用鹽大半夏一兩每個切二塊木豬苓亦作片水浸同炒燥不用豬苓上為細末酒糊丸如梧桐子大辰砂一分沉香一分作二次上為衣陰乾每服五七十丸空心鹽湯下或米飲湯或用鹽酒湯送下藿香安胃散出衛生寶鑑治脾胃虛弱不進飲食嘔吐不待腐熟藿香丁香人參各二錢五分陳皮五錢上為細末每服二錢水一盞半生薑三片煎至七分去滓冷服食前白朮六乙湯出和劑方治脾胃不和心腹痞悶脅肋䐜脹口苦無味嘔噦噁心不思飲食面色痿黃腸虛自利肌體瘦弱膈氣翻胃白朮去蘆六兩甘草炙一兩上為細末每服二盞水一盞煎八分空心食前服或沸湯點服育神溫胃逐濕消痰不拘四時並宜服之蓽澄茄丸出濟生方治脾胃虛弱胸膈不快不進飲食用蓽澄茄不拘多少為細末薑汁打神麯末煮糊為丸如梧桐子大每服七十丸食後淡生薑湯下治脾胃氣虛食即汗出用豬肝一斤薄片於瓦上曝令熟干搗篩為末煮白粥布絞取汁和眾手丸如梧桐子大空心米飲下五十丸日五服又主脾胃氣冷吃食嘔逆下赤白痢如麵糊一方治心腹虛膨手足厥冷或飲過苦澀涼劑晨朝未食先嘔或聞食即吐不思飲食此乃脾胃虛弱用山藥一味銼如小豆大一半銀石器內炒熟一半生用為末米飲調下自獲其功八味湯出醫方集成治脾胃虛寒氣不升降心腹刺痛臟腑虛滑吳茱萸湯洗七次乾薑炮各二兩陳皮木香去皮肉桂丁香人參去蘆當歸洗焙各一兩上㕮咀每服四錢水一盞煎至七分溫服不拘時厚朴湯出濟生拔粹方治脾胃寒心腹滿及秋冬客寒犯胃時作疼痛厚朴薑製一兩橘皮去白一兩甘草炙乾薑各五兩茯苓去皮一兩上粗散每服五錢匕水二盞生薑三片煎至一盞去滓溫服食前忌一切生冷之物戊火已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦平甘溫以淡泄之扶持胃氣以期平也白朮散出宣明論治傷寒下後餘熱以藥下之太過胃中虛熱飲水無力也當生胃中津液多服此人參白朮木香白茯苓甘草銼炙藿香葉各一兩乾葛二兩銼上為末每服三錢至五錢水一盞煎至五分溫服如飲水者多煎與之無時也如能食而渴白虎湯加人參與服之一方用乾薑和中丸治服寒藥脾胃虛弱宜服補胃進食橘紅一錢人參一錢乾木瓜二錢乾生薑一錢炙甘草三錢上為末蒸餅為丸如梧桐子大每服三五十丸溫水送下食前樸附丸治脾胃久虛谷腸滑泄臍腹絞痛腸鳴泄瀉肢體無力此藥補益脾氣止心腹撮痛溫胃進食厚朴五兩去粗皮銼散子塊附子一兩半銼大塊去皮臍生薑五兩不去皮淨洗切片子青州棗一百個先將四味用水五升一處煮候水盡揀出棗子外將其餘三味焙乾與後藥同為末人參一兩乾薑一兩炮去皮訶子一兩炮肉豆蔻一兩上七味為末將棗去皮核和藥為丸如梧桐子大每服三十丸早晚食前用陳米飲下法制姜附丸治脾胃虛弱香附子炒去皮毛秤一斤米泔水浸秋冬三日夏春一日一夜漉出新水洗浸入銀器中水三碗令香附子上有水寸餘次取大蒜二十頭去皮膜取仁鋪在香附子上慢火煮之候蒜如糊即用銀匙不住手攪二三百轉以蒜不見而汁干為度取出候冷每香附子一個橫切四五段慢火焙乾冷入後藥神麯炒黃六兩乾薑炒四兩蓽茇丁皮胡椒縮砂仁炒各二兩上為極細末湯浸一宿蒸餅為丸如梧桐子大每服五十丸隨湯亦可下不拘時候浸蒸餅待湯已入蒸餅了稍冷用新布包裹捩去水方可用藥如覺難丸入少麵糊為丸不妨更加淨陳皮二兩用鹽水浸焙乾尤妙如寒多加附子二兩桂一兩周馬帥之祖承奉因靖康初自泗州逃難山陽夜行墜古塚中已先有人在矣至晚各散出於塚外得幅紙裹太平錢八十四文紙上有此藥方云江南土下人弱疾當作於脾胃脾元壯實則飲食美健自然無病壯脾有藥曰法制姜附丸先祖甫弛擔即合此藥無日不服一生無病壽八十四祖母安人服之又九十六母永國夫人服之壽九十八婆婦雖老皆飲食不減壯年甚妙曲糵湯出十便良方治脾胃虛弱中脘不健飲食遲化麥糵一斤神麯四兩半夏一二兩甘草茯苓二兩陳皮二兩生薑一斤鹽半斤炒上為細末乾淨瓷瓶盛停三五日令氣味調和方用沸湯點服不拘時此方妙處全在陳皮製令渾無藥味方可闢寒湯出十便良方治脾寒胃弱嘔逆噁心腹脅脹痛茴香三兩高良薑二兩丁香一分甘草二兩銼白鹽三兩同甘草炒胡椒五錢上為細末每服一錢沸湯點服不拘時候六君子湯出朱氏集驗方治脾胃虛弱生風多困人參白朮茯苓甘草半夏曲沒石子上等分為末水七分盞入冬瓜子少許同煎膠飴丸出十便良方治脾胃虛弱飲食減少易傷難化無力肌瘦乾薑為細末上以白餳銼如櫻桃大以新水浴過入鐵銚子灰火中煨令溶和薑末如梧桐子大每服三十粒空心米飲下水沃雪湯出十便良方治脾胃虛腹脹減食甚者成水氣作水治即愈附子四兩去皮臍切作片子小豆四升水一斗煮令水盡揀出附子末之上以生薑自然汁煮糊和丸如梧桐子大每服三五十丸陳皮湯下團參散出衛生家寶方治脾胃虛弱冷氣作痛婦人心痛白朮切焙縮砂去殼官桂不見火高良薑沸湯泡三次切焙以上各二兩人參一兩甘草四兩炙草果去皮訶子炮捶取肉去核舶上茴香炒桔梗細切麩炒各一兩神麯一兩五錢陳橘皮四再去瓤上為細末每服一錢鹽少許烏梅一半個沸湯點服蘇脾散出衛生家寶方治脾胃虛弱冷食所傷胸膈不快良薑三錢縮砂一兩去殼陳皮八錢去生白白朮五錢甘草一兩草果五錢去殼京三稜半兩蒼朮半兩上為細末每服二錢入鹽點服如加薑棗煎亦佳進食丸出衛生家寶方治脾胃久虛飲食減少腸滑或痢肢體乏力精神疲劣並宜服之肉豆蔻仁一錢分厚朴五錢去粗皮丁香一錢分木香一錢分蓽澄茄一錢分良薑五錢微炒五味子一錢分生薑三二兩去皮切作小塊子上件以前藥味碾為粗末入切生薑同再拌碾或杵成膏取出入密器內罨一宿次日取出焙乾碾為細末煮粟稠粥為丸如梧桐子大每服三五十丸煎生薑橘皮湯或米飲下早晚食前服之日進三服草果厚朴丸出衛生家寶方治脾胃虛弱全不思飲食腹痛滑泄腸胃怯薄關節不通此藥去濕厚腸胃固元臟大進飲食充飢膚去酒毒厚朴一兩五錢削去粗皮洗切水煮數十沸漉干杵細以姜等分研細拌和罨兩宿焙乾入後藥陳皮一兩湯浸一日乾秤不去白乾薑五錢炮草果子一兩紙裹水浸炮令香熟去皮秤白朮五錢洗銼麩炒訶黎勒一兩紙裹水濕煨乾取肉秤桂半兩去粗皮每一兩取半兩淨縮砂仁一兩去殼湯泡洗再去膜秤上為細末水煮麵糊為丸如梧桐子大每服五六十丸空心食前白湯下罄脾丸出衛生家寶方治脾氣虛弱四肢倦怠面色痿黃飲食減少常服補氣益脾元實臟腑長肌肉駐顏色令百病不生陳皮四兩去瓤別為末白麵一兩五錢青鹽四兩南木香一兩不見火益智仁一兩青皮一兩去白焙乾秤京三稜一兩炮蓬莪朮一兩炮粉草一兩茴香一兩揀去枝梗上件先將青鹽細研同陳橘皮末以水調作稀糊慢火上煎攪數沸入白麵熬成膏和前件藥搗千下丸如梧桐子大每服三四十丸食前鹽湯溫暖酒米飲任吞下胃風湯出衛生家寶方治脾胃久冷心脅脹滿腹疼腸鳴不思飲食川芎一兩白朮一兩人參五錢白茯苓五錢五味子一兩訶子三二個濕紙裹煨訶黎勒三個同前製法檳榔二個官桂五錢去皮川乾薑五錢油塗炙陳皮一兩去白薏苡仁一兩微炒神麯五錢麥糵五錢甘草五錢炙附子一個去皮炮製去尖切作片上為細末每服二錢水一盞棗子一個煎七分溫服厚朴溫中湯出衛生寶鑑方治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作痛厚朴薑汁炒一兩陳皮去白一兩炙甘草五錢乾薑炮七錢草豆蔻仁五錢茯苓去皮五錢木香五錢戊火已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦甘以淡泄之氣溫胃和痛自止矣上為細末每服五錢匕水二盞姜三片煎至一盞去滓溫服食前忌一切生冷之物白茯苓陳皮丸一名緩中丸治脾胃虛弱六脈俱弦而指下虛食少而渴不止心下痞腹中或痛或窄狹如繩束之急小便不利大便不調精神短少此藥專治大渴不止腹中窄狹而食減少神效出濟生拔粹方白茯苓陳皮乾生薑人參各一兩如脈弦或腹中急甚加甘草三錢炙秋減姜一半上為末煉蜜為丸如彈子大每服一丸白湯煎化下食前茱萸丸出朱氏集驗方治脾胃虛冷嘔逆醋心脹悶不快大效吳茱萸揀淨三兩酒洗焙黑附子炮製去皮臍五錢官桂二兩蓽茇一兩胡椒一兩蓽澄茄一兩厚朴薑製一兩乾薑炮一兩上件八味杵為細末煉蜜丸如桐子大每服二十丸食前溫米飲下一日三服甚效正脾散出十便良方治大病之後脾氣虛弱中滿腹脹四肢虛浮狀若水氣此藥主之蓬莪朮香附子茴香陳橘皮甘草上等分為細末每服二錢煎燈心木瓜湯調下白豆蔻丸出朱氏集驗方補脾胃虛弱飽則胸間虛滿白豆蔻炒仁縮砂仁炒人參白朮茯苓去皮丁香白姜炮粉草麥糵各一兩炒良薑五錢上為細末煉蜜丸如彈子大每服三十丸食前煎人參棗湯嚼下烏雞煎丸出朱氏集驗方補脾胃虛弱大附子炮去皮臍川當歸各一兩紅椒五錢白茯苓七錢上為細末用烏雞一隻將米醋爛蒸合末為丸如梧桐子大每服五六十丸空心鹽湯溫酒任下參朮湯出蘭室秘藏方治脾胃虛弱元氣不能勞於心肺四肢沉重食後昏悶黃耆一二錢人參五分炙甘草一錢升麻柴胡各三分酒黃柏二分橘皮青皮各五分曲末七分蒼朮一錢當歸二錢分上㕮咀都作一服水二大盞煎法如常益智和中丸秋季合益智仁一錢二分黃耆人參各五錢炙甘草二錢五分麥門冬曲末當歸身乾生薑橘皮各五錢草豆蔻仁四錢縮砂仁七分桂枝桂花一錢五分大麥糵二分半黃連一錢生地黃一錢薑黃二分木香二分上為極細末湯浸蒸餅為丸每服二三十丸溫水送下細嚼亦得煮豬肚散暖脾胃治虛冷補臟氣進飲食生精血附子炮去皮臍乾薑炮陳橘皮去白甘草炙肉桂去粗皮肉蓯蓉酒浸炙縮砂仁茴香炒肉豆蔻麵裹煨高良薑蓽茇以上一十一味各一兩上件為細末每藥五錢用獖豬肚一枚去脂水洗三五度入藥在內更以蔥白一七莖鹽二錢同入豬肚內以線系定用淡漿水煮令爛為度切作片子任意食之食前脾胃虛冷水穀不化附論夫損其脾者調其飲食適其寒溫臟腑充實脾胃和平則能推服水穀而無積滯若食飲不節寒溫失宜致脾胃氣弱冷氣乘之則不能腐化水穀而四肢身體無所稟養令人噫氣生熱腫脹膨悶壯熱增寒頭痛如瘧也方礞石丸治脾胃虛寒宿食不消攻脅下痛磨氣塊取虛積宜服礞石研乾薑炮蓬莪朮煨銼豬牙皂莢燒存性為末芫花醋炒焦桂去粗皮大黃蒸熟銼焙搗碎末京三稜炮銼搗末硇砂木香肉豆蔻去殼各一兩青橘皮湯浸去白焙墨燒過白豆蔻去皮檳榔銼各五錢丁香訶黎勒皮胡椒各一分巴豆一兩五錢去皮心膜研出油上除大黃京三稜並研藥外搗羅為末用醋三升飛硇砂於銀石器內慢火熬三十沸次入巴豆又熬十數沸又入京三稜末又熬五七沸次入白麵二兩無灰酒半升又熬二十沸次入大黃末又熬五七沸下諸藥末不住用柳枝攪成膏硬軟得所候冷入末臼搗一千杵為丸三等或如綠豆大或如麻子或如黃米每服五丸或七丸生薑湯下量臟腑虛實加減婦人心痛醋湯下丁香丸治脾胃虛寒宿食不消丁香硇砂木香桂去粗皮乾漆炒煙出附子炮裂去皮臍蓬莪朮煨銼乳香研京三稜煨銼墨大黃銼炒搗末巴豆霜先秤了取霜芫花醋炒焦沒藥研乾薑豬牙皂莢去皮子炙青橘皮湯浸去白焙上除硇砂大黃巴豆霜乳香沒藥外搗羅為末以釅醋一升化硇砂去滓入銀石器中慢火煎之次下巴豆霜攪勻兩食久次下大黃末熬成膏拌諸藥更入醋煮麵糊和搗一千杵丸麻子大每服三丸至五丸溫酒或熟水下得微利佳更量人虛實加減乳香煎丸治脾胃虛寒心腹痞滿宿食不消乳香沒藥丹砂木香沉香蓬莪朮煨銼枳殼去瓤麩炒檳榔銼烏頭炮裂去皮臍各一兩硇砂別研水飛狼毒銼醋炒乾漆炒煙出各一兩五錢阿魏一錢分醋化去砂石面和作餅炙楝實取肉搗末四兩芫花醋炒焦五錢青橘皮湯浸去白焙三錢分上除搗羅外將乳香沒藥丹砂別研與楝實末同入石器內用釅醋一升慢火熬成膏都入諸藥拌勻丸綠豆大每服十五丸臨臥溫水下五香丸治宿食不消腹脹膨悶丁香木香沉香安息香乳香硇砂丹砂研肉豆蔻去殼桂去粗皮京三稜煨銼當歸切焙陳橘皮湯浸去白焙檳榔銼蓽澄茄各一分附子炮裂去皮臍半兩巴豆十粒去皮心膜出油上先將安息香乳香硇砂三味細研用少酒浸良久餘十一味搗羅為末將丹砂巴豆與前三味通研令勻酒煮麵糊為丸如麻子大每服五丸至七丸熟水下生薑湯亦得蓽澄茄散出聖惠方治脾胃虛冷食即欲嘔心腹脹悶水穀不消四肢無力蓽澄茄五錢木香五錢白豆蔻五錢去皮白朮五錢檳榔五錢草豆蔻五錢去皮訶黎勒皮五錢肉豆蔻五錢去殼白茯苓五錢乾薑五錢炮裂桂心三錢分枳殼五錢麩炒微黃去瓤丁香半兩陳橘皮半兩湯浸去白瓤微炒甘草半兩炙微赤銼厚朴一兩削去粗皮塗生薑汁炙令香熟用上件藥搗羅為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓食前稍熱服沉香煎丸治飲食不消噫氣生酸面黃腹脹臟腑不調沉香丁香木香胡椒沒藥丹砂別研水飛高良薑檳榔麵裹煨熟去面硇砂別研水飛用石器慢火熬干青橘皮湯浸去白皮焙石硫黃別研水飛各一兩阿魏醋浸去砂白麵和作餅炙縮砂去皮吳茱萸陳者湯洗取用沉者炒各半兩巴豆去皮心膜出油二錢五分上除研藥外搗羅為末與研藥和勻煉蜜丸如綠豆大瓷盒貯封每服二丸食前臨臥溫生薑橘皮湯下更量虛實大小加減青木香丸治脾胃風勞冷氣木香一兩五錢厚朴去粗皮生薑炙一二兩五錢人參芎藭附子炮裂去皮臍羌活去蘆頭桂去粗皮白朮枳殼去瓤麩炒檳榔銼甘草炙銼陳橘皮湯浸去白焙吳茱萸湯洗焙乾炒各一兩黃耆銼熟乾地黃焙各二兩上為末煉蜜為丸如梧桐子大空心溫酒下二十丸溫脾丸治脾胃氣弱大腹冷則下痢少腹熱則小便難賁響腹滿喘氣虛乏乾嘔不得食溫中消穀療脾益氣法曲熬吳茱萸小麥糵各五合熬枳實三枚炙桂心厚朴炙當歸茯苓各三兩細辛乾薑麥門冬去心人參桔梗附子各一兩炮甘草炙三兩上搗篩蜜和丸如梧桐子大空腹飲服七丸日三服亦可加大黃二兩忌海藻菘菜豬肉冷水生蔥生菜酢物人參柴胡湯治脾胃不調宿食留滯腹脹發熱嘔逆酸水日漸羸瘦柴胡去苗人參白朮赤茯苓去黑皮桔梗炒陳橘皮去白焙五味子當歸切焙細辛去苗葉大黃銼炒各一兩半夏湯洗七遍去滑炒乾一兩厚朴去粗皮生薑汁炙香熟二兩五錢桂去粗皮