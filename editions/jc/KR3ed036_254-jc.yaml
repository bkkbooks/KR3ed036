body:
  text: 卷二百五十四雜治門中惡附論夫病者卒心腹脹滿吐利不利如干霍亂狀世所謂中惡是也由人精神不全心志多憂遂為邪鬼所擊或復附著沉沉默默寤言譫語誹謗罵詈訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失人有欺心已知其兆登高涉險如履平地或悲泣呻吟不欲見人其狀萬端如醉如狂不可概舉此皆神鬼及諸精魅附著惑人或復觸犯忌諱土地神靈為其所作非有真實但隨方俗考驗治之中惡者是人精神衰弱為鬼邪之氣卒中之也夫人陰陽順理榮衛調平神守則強邪不幹若將攝失宜精神衰弱便中鬼毒之氣其狀卒然心腹刺痛悶亂欲死又凡卒中惡腹大而滿者診其脈緊大而浮者死緊細而微者生又中惡吐血數升脈數細者死浮焱加疾者生中惡者瘥後余勢停滯發作則變成疰也方備急散一名雄黃散出聖惠方治卒中惡客忤五屍入腹鬼刺鬼排及中蠱毒注吐血下血及心腹疼痛脹滿寒熱毒病雄黃研二兩丹砂研一兩附子炮裂去皮臍一兩一分桂去粗皮藜蘆各一分蜀椒去目並閉口炒出汗半兩野葛三分芫花醋炒四分巴豆仁三十五個去心熬上將巴豆別治如脂余細為散以巴豆合搗令勻瓷器貯之密封勿泄氣遇急病水服一分許加至半錢凡老幼減半病在頭當鼻衄在膈上則吐在膈下則利在四肢則汗出而愈闢穢丹能闢穢氣細辛半兩甘松一兩川芎二兩上為細末水丸如彈子大久窨妙每燒一丸加麝香少許如無亦可桃皮湯出聖惠方治中惡氣喘急心腹痛胸脅脹滿短氣桃皮一握東引者白楊皮一握梔子仁十四枚真珠研當歸切焙桂去粗皮各二兩附子炮裂去皮臍一兩吳茱萸湯浸焙炒半兩上除真珠外銼如麻豆每服五錢水一盞半入生薑大棗煎至一盞去滓納真珠末半錢攪勻溫服一方無白楊皮當歸散出聖惠方治中惡心腹痛胸脅短氣當歸二兩銼碎微炒梔子仁一兩桃白皮二兩附子一兩炮去皮臍赤芍藥一兩蓬莪朮一兩桂心一兩吳茱萸一兩湯浸十次焙乾微炒上為散每服三錢水一盞入豉五十粒煎至六分去滓即時溫服桃皮湯治中惡心痛胸脅㽲刺喘急桃東行白枝皮銼一握丹砂研一兩梔子仁十四枚當歸切焙三兩桂去粗皮三兩附子炮裂盡去皮臍一兩吳茱萸湯浸焙乾炒香豉炒各五合上除丹砂外銼如麻豆勻每服五錢水一盞半入生薑半分切碎煎取七分去滓入丹砂末半錢溫服雄黃膏一名五毒神膏出肘後方雄黃二兩硃砂二兩當歸二兩椒二兩烏頭一升薤白一升上以苦酒漬一宿豬脂五斤東南陳蘆煎五上五下絞去滓納雄黃硃砂末攪令相得畢諸卒百勞溫酒服如棗核一枚不瘥更服得下即除四肢有病可摩癰腫諸病瘡皆摩敷之夜行及病冒霧露皆以塗人身中尤佳硃砂丸出聖惠方治中惡客忤垂死硃砂一兩細研水飛過雄黃一兩研水飛過麝香一分別研入附子一兩炮裂去皮臍為末巴豆二十枚去皮心研紙裹壓去油上細研令勻煉蜜和搗三五百杵丸如麻子大每服不計時以粥飲下三丸不利更服三丸漸加至五丸七丸以利為度空青散出聖惠方治中惡客忤垂死空青一兩細研麝香一分細研硃砂一兩細研水飛過雄黃半兩細研上研相和令勻每服醋一合相合調散半錢不計時候又用湯一合與醋相勻服之須臾即吐為妙朱犀散出經驗良方治中惡中忤鬼氣其證暮夜或登廁或出郊野或遊空屋或人所不至之地忽然眼見鬼物鼻口吸著惡氣驚恐倒地四肢厥冷兩手握拳鼻口出清血性命須臾不救此證與屍厥同但腹不鳴心脅俱暖切勿移動即令人圍繞打鼓燒火或燒麝香安息香蘇木樟木之類醒方可移歸犀角半兩鎊屑研末生麝香一分大硃砂一分上為細末每服和勻二錢用井花水調灌服如無前件藥只用單方桃枝湯出危氏方用雄黃為末每服一錢桃枝葉煎湯灌下如無雄黃只用後方又方出危氏方用故汗衣或用濁衣著在上身多時久遭汗者佳濁衣者久著上身內衣也男用婦衣婦用男衣燒灰每服二錢百沸湯點灌服雄黃丸出聖惠方治患鬼氣出鬼毛方獨顆蒜一枚雄黃一錢杏仁一分湯浸去皮尖雙仁炒上都研為丸如麻子大每日空心以粥飲下三丸靜坐少時鬼毛自爪甲中出矣當汗出即瘥備急丸一名追魂丹出聖惠方療心腹卒暴百病中惡客忤心腹脹滿卒痛如錐刀刺氣急口噤風氣滯迷絕不知人巴豆去心去油乾薑炮大黃各二兩上為細末以蜜為丸如梧桐子大每服三丸溫水送下不拘時候服之一方為散研以水三合灌之亦可棗穰為丸停屍卒死者以暖水化服之若不下捧頭起灌令下喉須臾瘥未知更與三丸腹當鳴轉即吐下便愈若口已噤閉亦須折齒灌之藥入喉即瘥此藥無問一切雜病並能治之麝香散出聖惠方治卒中惡心腹刺痛去惡氣麝香研一分犀角屑半兩木香半兩上為散拌勻每服二錢空心熱水調下日再未止更服亦可漿水調服吳茱萸散出聖惠方治中惡心神煩悶腹脅刺痛宜服韭根一握切烏梅十四枚碎吳茱萸湯洗焙乾炒二兩半上以潦水五升煮之以病人櫛納其中三沸櫛浮者生沉者死煮取三升時飲之備急散治卒中惡心痛脹滿欲吐短氣大黃二兩桂心四兩巴豆一分去心皮熬研上為散取一錢以湯七合和服當吐下即愈雄黃散出聖惠方治卒中惡心腹㽲痛刺急脹滿雄黃半兩赤小豆半兩炒熟瓜蒂半兩上為散每服不計時以溫漿水調服一錢服至錢半當小吐若不吐加至二錢又方出聖惠方治中惡悶亂腹痛心膈不利宜服吐桂心一兩生薑三兩梔子十四粒豉五合人參蘆頭一分酒銼上搗碎以酒二升微煮之去滓頓服之取吐為度一方無人參蘆頭三神方能闢死氣蒼朮二兩米泔浸兩宿焙乾白朮半兩甘草半兩上為末每服二錢入鹽少許白滾湯點服治中惡吐血欲死用水煮蘇木汁一升服之治中惡出千金方用蔥心黃刺鼻孔中血出愈肘後方云入七八寸無不見效又方出千金方用大豆二十粒為末雞子黃並酒相和頓服雞子白亦可又方出千金方使人尿其面上可愈肘後方云此扁鵲法伏龍肝散出千金方治中惡並蠱毒冷水和伏龍肝如雞子大服之必吐又方出千金方上溫二斗豬肪頓服之又方出千金方車𨊧脂如雞子大溫酒烊令熱服之又方出聖惠方用臘月野狐腸燒灰以水服方寸匕又方出本草用香墨為末水服一錢犀角散治卒中惡心痛及心風煩悶熱毒筋骨中風用犀角研為末和水服之治中惡氣欲死出聖惠方取釜底墨半兩鹽一錢和去滓研入熱水一盞調服艾葉湯出聖惠方治中惡遁屍心腹及身體痛甚者短氣不語以手按之得其痛處則病人色動恐人近之宜艾葉敷取生艾小葉挼碎敷痛上厚寸余以沸湯和灰作泥令熱敷艾上冷則易之不過再敷愈一方以熨斗者火熨艾上令一平人在病人中惡毒處輕輕連熨數遍暖氣運動即愈治中惡心氣欲絕出聖惠方取新牛糞絞汁服無新者以乾者浸汁服或干以水煮之若口不開拗口納藥也又方出十便良方仰臥以物塞兩耳以竹筒納病人鼻中使兩人痛吹之塞口旁無令氣得出半日病人即噫則勿復吹也治卒中惡氣絕出聖惠方取真硃砂書舌作鬼字額上亦書之大良又方出肘後方先以衣三重藉服上以銅器著衣上隨取少許茅於器中燒之茅盡益之勿頓多也取愈乃止救卒中惡死及卒死出肘後方令二人以衣壅口吹其兩耳極則易人又可以竹筒吹之並捧其肩上側身遠之莫臨死人上又方出肘後方取雄鴨就死人口上斷其頭以熱血瀝口中並以竹筒吹其下部極則易人氣通下即活互吹之治卒暴死用鯉魚齒燒灰酒服方寸匕扁鵲陷米丸出肘後方療內脹病並蠱疰中惡等及蜂百毒雄黃一兩真丹砂別研一兩礬石熬一兩生礬石一兩半燒灰鬼臼一兩半蜈蚣一枚赤足者炮炙斑蝥去翅足龍膽附子炮各七枚藜蘆七分炙杏仁四十枚去尖皮熬上搗篩蜜和搗千杵腹內脹滿病中惡邪氣飛屍遊走皆服二丸如小豆若積聚堅結服四丸取利泄下蟲蛇五色若蟲疰病中惡邪飛屍遊走皆服二三丸摩痛上若蛇蜂百病若溪毒射工其服者視強弱大小及病勢輕重加減服之中和湯出衛生家寶方治忽感惡氣昏悶暈倒逆冷氣絕卒中驚氣四肢厥冷用香附子不拘多少為末每服二錢白湯調服心痛醋湯服救卒死或先病痛或常居寢臥奄然而絕皆是中惡救之方出肘後方上破白犬以拓心上無白犬白雞亦佳又方出肘後方上取丹雄雞冠血管吹納鼻中治破腹中惡血殺蟲用馬鞭草生搗水煎去滓再煎如飴空心酒服一匙惡血皆下良治中惡及救死或先病常居寢臥奄然而絕以韭搗汁灌鼻中一方用薤汁治中惡心痛孫真人食忌本草用苦參一兩酒一升半煮取八合乘熱頓服治鬼氣注忤中惡心腹痛背急氣喘惡夢常悸為鬼神祟撓者以古櫬板用水酒和東引桃枝同煎服當得吐下彌古者佳杉材最良千歲通神治忽心中惡心口吐清水者出本草取高良薑根如骰子塊含之咽津逡巡即瘥若臭亦含咽更加草豆蔻同為末煎湯常飲之佳辟惡氣出本草以臘月鼠燒灰為末服一錢水調之佳辟惡氣出本草取兜納香燒之能闢遠近惡氣治惡氣令人身香羹出本草用白茅香煮服之亦可作湯浴之去惡氣出本草取橙子穰和鹽蜜細細食之治惡氣溫中消食出本草取擾殿以豆漿汁食之芳香好味治惡脹滿出本草以桃橛煮服之三載者良除身中一切惡氣不潔之疾令人白淨肌體滑澤以天門冬煮食除邪辟惡出本草以麝香一劑安於枕盒中枕之治惡氣心痛出本草以吐舌木酒煮服一合祛鬼氣出本草用迷迭香燒之去鬼辟惡出本草以五月五日取楝葉佩之治中惡疰忤心腹痛出本草以腐竹根先入地者煮服之一名鬼齒先入地者亦名鬼針治鬼氣中惡疰忤心腹痛惡夢鬼神出本草用糧罌中水浸一合多飲令人心悶伏鬼物惡氣出本草用磨石燒赤熱投酒中飲之治惡氣中惡心腹痛鬼疰出本草以釣樟材用酒煮服之辟邪惡鬼出本草以火槽頭帶之辟惡出本草以酒服之昔三人晨行山中一人健一人病一人死健者飲酒病者食粥死者空腹凡酒力辟惡勝於作食治惡鬼神注刺痛霍亂以䈥子磨散酒飲服治中惡鬼氣出本草取廁籌燒取熱氣徹上治中惡與卒死鬼擊亦相類為治皆參取而用之若已死並用出本草上搗菖蒲生絞汁灌之立瘥屍厥之病卒死脈猶動聽其耳如語聲股間暖是也亦以此方治之治中惡客忤垂死出本草以麝香一錢重研和醋二合服之即瘥治中惡疰忤出本草用熱暖姜酒一碗服即止治中惡脫肛出本草用年久筆頭燒灰水飲之治中惡心腹刺痛出本草以羊尿燒熏鼻中治惡病出本草以松葉陰乾搗為屑丸服無不瘥辟惡出本草以琥珀帶之辟邪惡氣出本草用真降香令小兒帶之辟惡出本草以丹砂帶之辟惡鬼出本草以虎爪懸小兒背上殺鬼去邪氣出本草以桃木中蠹食之治鬼氣出本草取樗木根皮一握細切以兒童小便二升豉一合浸宿絞取汁溫一沸三五日一度服辟邪惡去鬼氣出本草以蘇合香俗雲師子尿赤黑色燒之治百病一切惡氣疰病出本草以麝香研末以水服之療一切鬼氣出本草取初生艾實作乾菜食之治鬼氣出本草取青蒿子為末酒服之方寸匕瘥治鬼氣出本草取必慄香煮服之並燒殺鬼毒出本草用堇菜生取汁半升服即吐出一名堇葵治鬼氣出本草以白蒿子末和酒服之良治鬼氣注忤出本草以枕材煮汁服之治心腹惡氣取艾葉搗汁飲之治卒噁心腹不安以茴香莖葉煮食之即瘥治百惡氣取艾子和乾薑搗作末蜜丸如梧桐子大空心服三十丸以飯三五匙壓之再服其鬼神即速走出能消一切冷血田野之人與此方相宜也療惡疾以狼毒秦艽等分搗末酒服方寸匕日日常服之瘥辟惡以雄黃服之鬼魅附論夫心者精之合神之舍也心氣不足精神衰弱邪氣乘虛而感則為鬼魅其狀令人喜怒不常情思如醉或狂言驚怖向壁悲啼夢寐多魘與鬼交通病乍寒乍熱腹滿短氣不能食診其脈人迎氣口乍大乍小乃鬼魅所持之候也方阿魏散治夢與鬼交通及狐貍精魅等方野狐皮焙炙豹鼻焙各七枚狐頭骨一具炙雄黃一兩膃肭臍一兩鬼箭羽一兩露蜂房一兩白朮一兩虎頭骨炙一兩驢馬駒駞牛等毛各四分燒作灰若骨蒸氣如泥加死人胸骨一兩炙阿魏二兩炙上搗篩為散攪使調勻又先以水煮松脂候烊接取以和散和散之時勿以手攪將虎爪攪和為丸如彈子大以熏患者欲熏之時蓋覆衣被勿令藥氣輕泄別搗雄黃為末以藉藥燒藥節度一如薰香法其藥一分於床下熏彌善忌桃李雀肉等雄黃散治五臟六腑氣少亡魂失魄五臟不安忽喜忽悲恐怖如有鬼物皆發於大驚及當風從高墜下落水所致悉治之雄黃一兩細研黃芩半兩黃連三分去須黃柏一分銼川大黃半兩銼碎微炒黃耆半兩銼桂心半兩細辛半兩黃環半兩澤瀉半兩山茱萸半兩蒲黃二分麻黃半兩去根節人參半兩去蘆頭上羅為散每服不計時以溫酒調下一錢日三服不止稍增至二錢服羸劣者更加人參五分十分合一方有生地黃二分一方有蜀椒五分乾薑四分九精丸治感鬼魅邪氣驚怖悲啼休作無時一名九物牛黃丸牛黃研二兩荊實二兩曾青研二兩五屑研二兩雄黃研二兩空青研二兩赤石脂研二兩元參二兩龍骨二兩上為末蜜丸如小豆大每服一丸食前溫酒下日三以止為度黃環丸治邪氣鬼魅脈見人迎氣口時大時小黃環五兩琥珀研二兩丹砂研二兩生銀水磨細二兩龍膽二兩白頭蚯蚓微炒一兩元參去心一兩大黃銼炒一兩䕡茹一兩上為細末酒煮麵糊和丸如綠豆大雞鳴及日中時用溫麝香酒下十丸稍加至二十丸以止為度煞鬼五邪丸治邪氣鬼魅所持妄言狂走恍惚不識人丹砂研一兩半龍骨一兩半鬼臼去毛炙一兩半赤小豆一兩半鬼箭羽去莖二兩半桃仁湯浸去皮尖雙仁炒研五十枚芫青三十枚炒去翅足上除研者外搗羅為細末入雄黃丹砂再研拌勻熔蠟和丸如彈子大囊盛之男左女右繫於臂上小兒繫於頭合藥時勿令婦人雞犬見亦可用蜜和為丸如梧桐子大每服一丸米飲下日服數次不拘時候神定即止大殺鬼丸絕一切鬼魅魍魎虎頭骨三兩雄黃一兩研細鬼臼一兩去發天雄一兩去臍皂莢去子及皮一兩蕪荑一兩藜蘆一兩去蘆頭上羅為末煉蜜和丸如杏核大伏屍惡疰為患者燒一丸安室四角熱疾時氣燒一丸安床頭邊牛馬疫疾燒一丸安圈中虎爪丸治狂邪鬼魅妄語狂走恍惚不識人一名殺鬼丸虎爪燒三兩丹砂細研一作赤朱雄黃研細蟹爪燒各一兩上除研者外為細末再入研者拌勻熔蠟為丸如梧桐子每至正旦及有狐魅處焚之甚妙以熏巫人即神去一方無蟹爪用鱉爪消松脂和丸如芡實大堂中燒四物鳶頭散治鬼魅東海鳶頭是由拔根黃牙石又名金牙防葵各一分莨菪子一分水淘去浮者水煮金牙出曝炒令黃色上藥搗篩以酒服方寸匕欲病人見鬼增防葵一分欲知鬼主者復增一分看驗防葵莨菪並令人迷或恍惚如狂不可多服又方治女人與鬼物交通獨言笑或悲思恍惚雄黃人參防風各一兩五味子一升上為散早以井花水服方寸匕日三服又方松脂三兩烊雄黃一兩上用虎爪攪令調如彈子一丸夜納籠中燒之令女裸坐籠上被急自蒙唯出頭耳過三熏即斷鹿角散治妖魅病人不論鬼是男女喜夢鬼通致精神恍惚用鹿角鎊屑搗羅為細末水服方寸匕自言則瘥一方用酒調服三服治精魅感著語言狂亂悲怖不常不飲食用水銀一兩入漿水一盞炭火上煎取三分去火取生水銀如豌豆大空腹服一丸晚再服一丸日三或作神符裹生水銀空腹吞之雄黃散治鬼迷不寤及卒魘用雄黃研如粉吹入病人兩鼻中瘥桂亦佳闢諸邪祟附著及小兒驚哭恐悸於安息處取一皂子焚燒令煙起邪自去治百邪鬼魅服頭垢如小豆大又方治鬼魅用水服獺肝末日三千金翼用獺肉末療癲狂鬼魅及蠱毒用鵲巢多年者燒之亦敷瘻瘡良治鬼魅傳屍溫疫魍魎神等取古廁木以太歲所在日時當戶燒熏之闢百邪鬼魅以雄黃佩之鬼神不能近入山林虎狼伏濟川毒物不敢傷辟邪魅以白芥子燒灰服治鬼魅神邪及狐魅以豹鼻和狐鼻煮服之治妖魅以狐心肝生服治人臥忽不寤勿以火照照之殺人但痛齧其腫及足拇指甲際多唾其面即活以菖蒲末吹兩鼻中又桂末吹舌下治狐魅以鷹嘴及爪燒灰為末和飲服之治精魅邪氣以桃符煮汁飲之一以桃雙丸散服之一以桃仁每夜嚼一顆合蜜塗手面良治妖魅瘟疫硃砂雄黃上為末調醋滴入鼻中鬼魘附論夫鬼魘者屈也謂夢裡為鬼邪之所魘屈也凡人其寐也魂交其覺也形開若形數驚恐心氣妄亂精神懾郁志有搖動則有鬼邪之氣乘虛而來入於寢寐使人魂魄飛蕩去離形骸故魘不得寤以致死必須人助喚並以方術治之乃蘇若在燈光前魘者是魂本由明出喚之無忌若在夜暗處魘者忌火照火照則魂不復入乃至於死又人魘須遠呼不得近而急喚恐神魂或致飛蕩也方鎮心丸治心氣怯弱常多魘夢恍惚謬妄紫石英研二兩丹砂研一兩雄黃研白茯苓去黑皮茯神去木銀屑菖蒲桔梗去蘆頭炒人參乾薑炮遠志去心甘草炙銼各二兩防風去蘆頭防己當歸切焙桂去粗皮鐵青各一兩細辛去根留葉一兩上為末煉蜜為丸梧桐子大每服十丸食後以熱水下日三增之大定心湯治心虛悸恍惚多忘或寐驚魘神少不足人參茯苓茯神遠志去心赤石脂龍骨乾薑當歸甘草炙白朮芍藥大棗桂心防風紫菀各二兩上切以水一斗二升煮取三升半分為五服日三夜二忌如常法人參散出聖惠方治心氣虛悸恍惚多忘或夢寐驚魘神氣不足人參去蘆頭茯神遠志去心赤石脂龍骨乾薑炮裂銼當歸銼微炒甘草炙微赤炒白朮白芍藥熟地黃桂心防風去蘆頭紫菀去苗土以上各一兩上搗為散每服四錢水一中盞入棗三枚煎六分去滓不計時溫服日三茯神散出聖惠方治虛羸心氣乏弱多魘茯神一兩黃耆一兩銼甘草一兩炙微赤銼白芍藥一兩乾薑一兩炮製銼遠志二兩去心人參一兩去蘆頭桂心一兩上搗為散每服五錢水一大盞煎至五分去滓不計時溫服八毒赤丸出濟生拔萃治男子婦人染著神鬼謂之鬼疰病服之甚有效驗礬石雄黃硃砂牡丹皮附子炮藜蘆巴豆各一兩蜈蚣一條上為細末煉蜜為丸如小豆大每服六七丸至十丸冷水送下無時昔副使許可道至雄州請醫看脈乍大乍小乍短乍長氣血不勻邪氣傷正本官說走路到邯鄲驛中夜夢一婦人著青衣不見面用手於脅下打了一拳遂一點痛往來不止寒熱不食醫言乃鬼擊也可服八毒赤丸本官言常讀明醫錄中看李子愈八毒赤丸為殺鬼枚子遂與藥三粒臥服旦下清水二斗立效可謂如神合時宜齋戒心志小定心湯治形體虛羸心氣怯弱多魘善忘茯神去木一兩甘草炙銼芍藥乾薑炮遠志去心人參桂去粗皮各二兩上銼如麻豆大每服五錢水一盞入棗二枚劈煎至七分去滓溫服日三外臺秘要有川芎無甘草伏龍肝散出千金方治鬼魘不寤用伏龍肝為末吹鼻中或以桂心末以蘆管吹入兩鼻中雄朱散出衛生家寶方或到客官驛及久無人居冷房睡中為鬼物所魘旦聞其人呃呃作聲便令人叫喚如不醒此乃鬼魘也不急救則死牛黃雄黃各一錢大硃砂半錢上為末每挑一錢床下燒一錢用酒調灌之凡人好魘出本草以桃仁熬去皮尖三十枚以小便下之雄黃散出聖惠方治卒魘用雄黃為末細篩以管吹入鼻孔中一方加桂心末佳麝香散出十便良方療卒魘用虎頭為枕一方枕麝香一分於頭邊又灌麝香少許治卒魘出十便良方令一人坐頭邊守一人於戶外呼病人姓名坐人應曰在便蘇治魘死不覺者出千金方慎燈火勿令人手動牽牛臥其上即覺若卒不能語取東門上雞頭為末以酒服之又方出聖惠方治卒魘昏昧不覺魂魄外遊為邪所執錄切忌火照上用皂莢為末如大豆許作丸吹鼻中嚏則氣通起死回生集驗方治中惡闢魘出千金方用雄黃如棗大系在腋下令人終身不魘張文仲云男左女右帶之一帶頭上尤妙又方出聖惠方治臥忽不寐勿以火照殺人但痛齧拇指甲際而唾其面則活如不醒者移動些子徐喚之若用燈即存如無燈切不可用燈照取搗韭汁吹鼻孔中及灌兩耳如冬月用韭根取汁灌之口中並兩鼻孔又方出經驗良方用桃柳枝東邊者各七寸煎湯三盞候溫灌服又方出經驗良方用灶心土捶碎為末每服二錢新汲井花水調灌更挑半指甲吹入鼻中治卒魘出聖惠方以菖蒲吹入兩鼻中以桂末納於舌上亦得治卒魘出金匱方上剔取左角發方寸燒末酒和灌令入喉立起半天河取竹籬頭雨水及高樹穴中所盛天雨能殺鬼精恍惚妄語勿令知之與飲瘥破棺散一名復生散出經驗良方治魘寐卒死及為牆壁竹木所壓水溺金瘡卒致悶絕產婦惡血衝心諸暴絕證又兼治自縊死一切橫死心溫並用之用半夏湯洗七次去滑不拘多少為末每一大豆許吹入鼻中即活但心頭溫者一日可活又方治心下溫一日可活用生薑汁調蘇香丸灌之效治卒魘不寤出聖惠方以蘆管吹兩耳並將其人頭髮二十莖作繩納鼻孔中或割雄雞取血以管吹入喉咽大良治魘及惡夢出聖惠方用麝香不拘多少安頭邊佳又灌麝香少許在口中治卒魘不寤卒魘之人多語聲不出不必高叫但敲臥床其人當自寤治卒魘死出十便良方以井底沉泥塗死人目令人垂頭就井呼姓名即活又方勿以火照但痛齧其足後跟及足大指爪甲即活齧其踵不覺者宜用礬石散方見鬼擊門又方以鹽湯灌之又方出肘後方以瓦甑覆病人面上使人疾打破甑則寤又方出肘後方以牛蹄或馬蹄臨魘人上亦可治卒死青牛尤佳卒魘不覺及凡人喜魘及惡夢者出肘後方取火燒死者灰著枕中履中枕之即止闢魘寤出肘後方以真赤罽方一尺以枕之治卒死或魘死者出肘後方掐兩手中指甲內即醒治卒魘昏不覺出肘後方以筆毛刺兩鼻中男左女右展轉即起也治卒魘夢寐不祥將霹靂石作枕即無此患導引法養生方云拘鬼門制鬼戶名曰握固法屈大拇指著四小指內抱之積習不止眠時亦不復開令人不魘魅又云人魘勿燃火明喚之魘死宜暗喚之好唯得遠喚不可相近而急喚亦恐失魂魄也又魘不寤候人眠睡則魂魄外遊為鬼邪所魘屈其精神弱者魘則久不得寤乃至氣暴絕所以須旁人助喚並以方術療之即蘇也鬼擊附論夫精足則神旺精耗則神衰精神耗衰血氣虛弱則邪氣易襲故邂逅鬼邪相遇則為鬼擊之病一名鬼排言鬼排觸於人也其得之無漸卒著人如矛戟所傷令人胸脅腹滿急痛不可抑按或即吐血或衄或下血輕者或獲免重者每至不救治宜符禁之法兼以辟邪安正之劑今巫覡實見人忽被鬼神所擊刺擺𢱡者或犯其行伍或遇相觸突或身神散弱或愆負所招輕者獲免重者多死猶如周宣燕簡輩事不為虛也必應死者亦不可療要自不得不救之耳方瓜蒂散治鬼排鬼刺下血麝香皂莢去皮子雄黃細研藜蘆去蘆頭瓜蒂以上各一分上為末如大豆大以竹筒吹入鼻中得嚏則氣通便活若未嚏復吹之以嚏為度礜石散一名吹鼻散又名倉公散治鬼氣排擊心腹刺痛吐下血死不知及臥魘齧踵不覺者諸惡毒病此是漢文帝時太倉令淳于意方生礬石一分以水和赤土裹之炭火三斤燒兩炊久取出去赤土上為散以竹筒吹大豆許入鼻中得嚏則氣通氣通即活未嚏者復吹之又一方加丹砂麝香各半分升麻散治卒得鬼擊如刀刺胸脅腹內急痛不可按仰或即吐血或鼻中出血或下血升麻獨活去蘆頭桂去粗皮各半兩上為散每服一錢溫酒調下一方去桂加犀角屑半兩一方去獨活加大黃半兩治卒鬼擊如中箭忽然一點痛如炷不可忍以桃皮一片將裡面濕處貼痛上匙頭安枕枝皮緊搓艾一團如大胡桃安匙頭灸之須臾痛微散又方治鬼擊忽然不寤若火照之則殺人但痛齧其踵後足拇指甲際而多唾其面即活上作犀角枕佳或以青木香納枕中並帶亦闢魘寐治鬼擊病鬼擊之病得之無漸卒著人如刀刺狀胸脅腹內絞急切痛不可抑按即吐血或鼻中血出或下血一名鬼排雞糞白如棗青花麻一把上酒七升煮取三升熱服須臾發汗若不汗盛火炙熨斗熨兩脅下使熱汗出愈又方治鬼擊之病得之無漸卒著人如刀刺狀胸脅腹滿㽲刺疼痛不可抑按或即吐血鼻中出血下血一名鬼排以熟艾如雞子大三枚水五升煎取三升頓服之治鬼擊之病及兵刀所傷血漏腹中不出煩滿欲絕卒中以雄黃粉酒服一中盞日三血化為水治鬼擊之病得之無漸卒著如刀刺狀胸脅腹內絞急切痛不可抑按或吐血衄血下血一名鬼排斷白犬頭取熱血一升飲之無白犬白雞亦佳治卒中鬼擊及救卒死或先病或常居寢臥奄忽而絕皆是中惡以雞冠血瀝口中令人下咽及破此雞以拓心下冷即葉於道旁得烏雞佳又方以豬脂取雞子大服未瘥再服亦可一方以醋一合煮沸灌喉中良又方以刀鞘三寸燒末水飲之又方治鬼擊用犢子屎半盞酒三升煮服之亦治中毒又方治鬼擊用燒鼠矢如黍米許水和服不能以水飲和少許納喉中又方以好醇酒吹兩鼻一方用醋吹鼻中治鬼擊狀卒著如刀刺胸脅腹內絞急切痛不可按摩或吐血及鼻中衄血用鹽一盞水二盞和服以冷水噀之吐即瘥一作鹽一兩又方豆粉一撮於水中攪飲之又方用蓬莪朮研酒服一盞治鬼打鬼注邪氣鍛鍖下鐵屑水漬攪沫出澄清去滓及暖飲三盞治夢中被殺刺或杖打諸般不祥卒然衄血吐血及下血甚者九竅皆有病名鬼擊亦名鬼排升麻獨活地黃續斷各半兩桂一分上為末熱水服日三卒忤附論夫卒忤者亦名客忤謂邪客之氣卒然犯人精神也此是鬼厲之毒氣中惡之類也人有魂魄衰弱則為鬼氣所犯忤喜於道間門外得之其狀心腹㽲痛脹滿氣衝心胸或悶絕不識人面色變異腑臟虛竭者不即治乃至於死然其毒氣有輕重輕者微治而瘥重者克臟腑雖當時救療餘氣停滯久後猶發乃變成疰也方礬石丸出聖惠方治卒中忤礬石半兩黃泥煨燒細研附子半兩炮裂去皮臍雄黃半兩細研真珠半兩細研巴豆半兩去皮心研紙裹壓去油藜蘆半兩去蘆頭蜈蚣一枚微炙去足麝香一分細研犀角屑半兩細辛三分斑蝥七枚糯米拌炒微黃去足翅上為末入研了藥令勻煉蜜和搗三百杵丸如小豆大每服不計時以溫酒下一丸日二服蛇蜂蠍所中以藥摩之效正氣散療客忤心腹絞痛脹滿氣衝心胸煩燥壯熱或氣悶又刺痛此鬼魅之氣麝香一錢茯神人參天門冬去心鬼臼菖蒲等分上為末蜜為丸如梧桐子大服十丸日三溫酒下太乙神精丹出千金方治客忤霍亂腹脹滿痛屍疰惡風癲狂鬼諸蠱毒妖魅溫瘧凡一切惡毒並皆治之丹砂曾青雌黃磁石各四兩金牙二兩半上各搗篩惟丹砂雌黃雄黃用釅醋浸之曾青好酒浸之各於鍋器中漬以紙密封訖日中曝百日經夏急五日亦得無日以火暖之然後各研令如細粉以釅醋同拌使乾溼得所納土釜中以六一泥固臍勿令泄氣干後安鐵環施腳高一尺五寸置釜上漸放火無軟硬炭等皆得初放火取熟一兩秤炭各三分二分長置釜上盡即益如此三度盡用熟火然後再益生炭其過三上熟火以外皆須加火漸多乃至一伏時其火已欲近釜即就釜下益炭經兩度即罷火盡極冷然後出之其藥精飛化凝著釜上五色者上三色者次一色者下雖無五色但色光明皎潔如雪取佳若飛上不盡更冷與火如前以雄雞翼掃取或多或少不論研和棗膏丸如黍粒一本云丹砂曾青雄黃雌黃各二斤丹砂以大醋瓷器中漬曾青美酒漬紙密封閉日曝一百日雄黃雌黃各油煎九日九夜去油膩訖更搗數千杵皆勿研之別以大醋拌令浥浥然納藥土釜中以雄黃在下次雌黃次曾青次丹砂以乾土泥塗勿令余毫毛許干以剛炭火燒之九日九夜去釜五寸九日九夜至釜底九日九夜侵釜腹三寸三九二十七日冷之一日一夜以刀子於釜腹際刮著一匝開之取丹丹成訖細研如粉以棗膏和一切丹不得用蜜皆用棗膏學者宜知舊不用磁石金牙今加而用之治遍風大風惡疾癲癇癧癤鬼打等最良服法平旦空服一丸以黍米為度其瘧病日久百方不瘥又加心腹脹滿上身面腳等並腫垂死者服一丸吐即瘥亦有不吐瘥者若不吐復不瘥者更服一丸半仍不瘥者後日增半丸漸服無有不瘥氣亦定當吐出青黃白物其因瘧兩脅有癖塊者亦當消除若心腹不脹滿者可與一丸日日加之以止為度不必專須吐亦可一丸即瘥勿並與服亦可三日一服皆須以意斟酌量得其宜或腹內有水便即下者忽怪若患瘧日近精神健亦可斟酌病人藥性並與兩丸作一丸頓服之皆午後食勿使熱豉將粥任意食之若病瘧盜汗虛弱者日服一丸至二日吐即止若患瘧不汗氣復不流腳冷者服一丸至三日若不汗氣復腳即暖有潤汗不止三日吐即止若患瘧無顏色者服藥後三日即有顏色亦有須吐瘥者亦有服少許而瘥者亦有殺藥強人服三四丸始覺藥行者凡人稟性不同不可一概與之但作黍米大服之為始漸加以止為度藥力驗勿並多服特慎油麵魚肉蒜當清淨服之若有患久不瘥在床羸瘦並腹脹滿及腫或下利垂死者與藥救之亦或瘥也又一說癥瘕積聚服刀圭以飲漿水送下治諸卒死中惡客忤霍亂腹滿體惰五屍疰惡風疰忤大病相染易死亡滅門癲狂鬼語已死氣絕心上微暖者扶起頭以物擊口開琢去兩齒以漿飲送藥藥下即活諸久病者日服一刀圭覆令汗汗出即愈不愈者不過再服亦有不汗而瘥復有不汗不愈者服如上法加半刀圭以瘥為度常以絳囊帶丸散刀圭男左女右小兒系頭上闢瘴毒惡氣時氣激射小兒患此可以苦酒和之塗方寸紙上著小兒心腹上令藥在上治之亦有已死者冬二日夏一日與此藥同服得藥下便活若不得入腹不活若加金牙磁石者至五服內必令人吐逆下利過此即自定其藥如小豆大為始從此漸小不得更大大風惡亂癩可二十服偏風癧癤諸惡風癩病等亦可二十服自余諸惡病皆止一二服量人輕重強弱不得多與若欲解殺藥但食爛煮肥豬肉服此藥後小應頭痛身熱一二日來大不能得食味後自漸得氣味五日後更能食若貪食過多者宜節之若服藥下悶亂可煮木防己湯服之即定凡言刀圭者以六粟為一刀圭一說云三小豆為一刀圭作土釜法取兩齒瓦盆各受二大斗許以甘土塗其內令極干又法作一瓦釜作一熟鐵釜各受九升瓦在上鐵在下其狀大小隨藥多少不必依此說一本云搗好甘土絹篩水和作泥硬軟如瓦坯泥泥一升納細紙搗可受十斤亦可隨藥多少作之陰乾三十日置日中曝亦三十日多翻轉向日乾訖以糠五石納釜中糠四面土攔擁之令糠遍釜周迴上下各厚七寸以火從下放五日五夜勿令人近土及待冷一日一夜乃取掃拭令淨以黃丹醋和如稀粥掃其中令厚一分乃納藥丸合九丹八石招魂太清諸神大丹皆用作釜作之萬成終不落節其石釜六一泥及鐵釜皆除之勿更用也此釜一具久轉前後數十周回不動此法師甚秘之余欲令後來天下學士得解之所以委曲具述之也作六一泥法赤石脂牡蠣滑石礬石黃礬蚯蚓屎滷土以上各二兩上取釅醋以足為度若無滷以鹽代之先作甘土泥以泥各別裹前黃礬等五種作團裹之勿令泄氣以火燒周三日最好一日亦得出破團取藥各搗碎絹篩然後與蚯蚓屎滷土等分以醋調和之如粥既得醋可用二分醋一分水和用取瓦盒以此泥塗之如曾青如蚯蚓屎如黃連加即佳如崑崙碌亦得瘥病丹砂亦堪硃砂亦得舊不用磁石金石今加之用治萬病惡風神良凡有患年遲積歲不可治者須合此一釜皆以王相日天氣清明齋戒沐浴如法合之述曰古之仙者以此救俗特為至秘余以大業年中數以合和而苦雄黃曾青難得後於蜀中避難遇雄黃大賤又于飛烏元武大獲曾青蜀人不識須令識者隨其大小作蚯蚓屎既是如此千金可求遂於蜀縣魏家合盛一釜以之治病神驗不必論宿症風氣百日服之皆得痊愈故取而敘述焉凡雄黃皆以油煎九日九夜乃可入丹不爾有毒慎勿生用丹有熱毒不堪服宜慎之還魂散一名還魂湯出聖惠方治卒客忤鬼擊飛屍奄忽氣絕無復覺知或已死口噤即發口下湯湯入口不下者捉病人發左右搖動引之藥下復增取盡一升須臾立效麻黃三兩去根節杏仁三兩浸泡去皮尖雙仁焙桂心三兩甘草一兩炙微赤銼丹砂半兩上搗為散每服四錢水一中盞煎至六分去滓分三服一方無丹砂桔梗散出聖惠方治卒客忤不能言桔梗末一兩麝香一分上研勻每服以溫水調下二錢服之細辛散出肘後方治卒客忤停屍不能言細辛桂心各等分上為細末納口中桔梗散出肘後方治卒客忤停屍不能言燒桔梗二兩末米飲服之仍吞麝香如大豆許佳附子散出肘後方治卒口噤不開者停屍不能言用生附子末置管中吹納舌下一方搗末吹喉中麝香散出肘後方治客忤惡氣垂死用麝香一錢重研和醋二合服之即瘥又方治卒忤即今人所謂中惡者與卒死鬼擊亦相類為治皆參用用鹽八合以水三升煮取一升半分二服吐之即愈又方治卒中客忤死出肘後方用人血和真珠如梧桐子大二丸折齒納喉中令下又方治卒忤停屍不能言者出肘後方用真珠末以雞冠血和丸如小豆大納口中三四枚瘥
