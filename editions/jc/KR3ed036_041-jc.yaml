body:
  text: 卷四十一小腸腑門總論小腸腑者主心也舌是其候也心合於小腸小腸者受盛之腑也號監倉吏重二斤十四兩長二丈四尺廣二寸四分難經甲乙云三丈二尺大二寸半徑八分分之少半後附脊左回疊積其注於迴腸者外敷臍上回運環反十六曲常留水穀二斗四升其一斗二升是水一斗二升是谷應主二十四氣也難經云十六曲盛谷二斗四升水六升三合合之大半甲乙云受三斗三合合之大半唇厚人中長以候小腸小腸病者小腹痛腰脊控睪而痛時窘之復耳前熱若寒甚獨肩上熱及手小指次指之間熱若脈滑者脈經作陷甲乙同此其候也小腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於肓結於臍故取之肓原以散之刺太陰以與之取厥陰以下之取巨虛下廉以去之按其所過之經以調之左手關前寸口陽絕者無小腸脈也苦臍痹小腹中有疝瘕主月即冷上搶心刺手心主治陰心主在掌後橫文中入一分左手關前寸口陽實者小腸實也苦心下急熱痹小腸內熱小便赤黃刺手太陽治陽手太陽在手小指外側本節陷中小腸有寒其人下重便膿血有熱必痔小腸有宿食常暮發熱明日復止小腸脹者小腹䐜脹引腹而痛心前受病移於小腸心咳不已則氣與咳俱出厥氣客於小腸夢聚邑街衢心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結扁鵲云手少陰與太陽為表裡所以表清裡濁清實濁虛故食下腸實而胃虛故腑實而不滿實則傷熱熱則口張口為之生瘡虛則傷寒寒則便泄膿血或發里水其根在小腸先從腹起小腸絕不治六日死何以知之髮直如干麻不得屈伸自汗不止小腸實附論夫小腸者受盛之官心之腑也手太陽其經也其氣盛則為有餘故左手寸口人迎以前脈陽實者小腸實也實則生熱是故有身熱來去口瘡心煩身重汗不出小便不利之證治宜瀉之方升麻散出聖惠方治小腸實熱口乾舌燥心胸煩悶小便不利川升麻黃柏銼杏仁湯浸去皮尖雙仁麩炒微黃犀角屑栝蔞根桑根白皮銼葵子木通葳蕤川大黃銼碎微炒各三錢甘草半兩炙微赤銼上為細末每服四錢水一中盞煎至六分去滓食前溫服犀角湯出聖惠方治小腸實熱心煩口瘡小便赤澀犀角鎊瞿麥穗杏仁去皮尖雙仁麩炒梔子去皮赤茯苓去黑皮木通銼黃連去須各二分白茅根一分銼甘草半兩炙銼麥門冬去心焙一兩上為粗搗篩每服三錢匕水一盞入竹葉二七片煎至六分去滓溫服不拘時候柴胡澤瀉湯出千金方治小腸熱脹身熱手足心熱汗不出心中煩滿結塞不通口瘡身重柴胡澤瀉橘皮黃芩旋覆花枳實升麻芒硝各三兩生地黃切一升上咀以水一斗煮取三升去滓下芒硝分三服無時鬱金散出聖惠方治小腸實熱熱則心下急痹口舌生瘡鬱金一兩白附子三分炮裂羌活一兩甘草半兩炙微赤銼黃連一兩去須黃芩三分川大黃一兩銼微炒麥門冬一兩半去心焙川升麻三分上為細散每服食後煎麥門冬湯調下一錢忌炙爆熱面鬱金散治小腸實熱心下急痹口舌生瘡鬱金一兩白附子炮半兩羌活去蘆頭三分甘草炙銼半兩黃連去須一分黃芩去黑心半兩側柏半兩大黃銼炒半兩乾蠍去土炒各半兩上為細散醋和勻每服二錢匕食後薄荷熱水調下生薑蜜湯下亦得赤茯苓湯出聖惠方治小腸實熱面赤多汗小便不利急痛木通去節赤茯苓去皮檳榔生地黃洗焙黃芩赤芍藥以上各三分甘草炙微赤銼半兩麥門冬去心焙三分上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候一方無生薑煎瞿麥湯一名黃連散聖惠方治小腸實熱小便黃赤結澀不通瞿麥穗犀角鎊豬苓去黑皮防己各三分黃連去須車前子木通銼各一兩甘草炙銼一兩上搗篩每服三錢匕以水一盞煎取七分去滓溫服不拘時木通散聖惠方治小腸實熱心胸煩悶小便澀少腹中急痛木通一兩銼檳榔羚羊角屑赤芍藥黃芩當歸銼微炒車前子各三分甘草半兩炙微赤銼上為散每服四錢水一中盞煎至六分去滓食前溫服大黃丸出千金方治小腸熱結滿不通大黃芍藥葶藶各二兩大戟朴硝各三兩杏仁五十枚巴豆去油七枚上為末蜜和丸如梧桐子大食後飲服大人七丸小兒三丸日二熱去日一服麥門冬湯楊子建護命方治小腸實熱脈氣盛實小便下血麥門冬去心焙知母蒲黃黃芩去黑心木通銼升麻各一分大黃銼炒三分上搗篩每服三錢匕水一盞煎至八分去滓食後溫服滑石散治下焦滯熱陰中疼痛小便難澀滑石一兩研甘草炙銼大黃銼炒黃耆銼地椒山梔子去皮各半兩乳香一錢研上為散食前乳香酒調下一錢匕未愈再服胡荽湯治小腸風熱小便黃赤澀結不通胡荽車前子木通銼防己瞿麥穗犀角鎊黃連去須各等分上為散每服五錢匕水一盞半煎至八分去滓食後溫服日進三服射干湯楊子建護命方治小腸實熱小便赤澀疼痛不可勝忍射干黃芩去黑心麥門冬去心焙大黃銼焙知母木通銼等分上為散每服三錢匕水一盞入蔥白五寸切碎同煎至八分去滓食後溫服以利為度若三服以上未通急煎芎藭湯一盞投之即下自早至夜可兩服不可常吃海蛤丸出聖惠方治小腸實熱小腹脹滿小便赤澀海蛤三分漢防己半兩甜葶藶半兩隔紙炒令香檳榔半兩木通半兩銼豬苓半兩去黑皮上為末煉蜜和丸如梧桐子大每服食前煎冬葵根湯下二十丸地黃湯聖惠方治小腸實熱心中煩悶小便出血生地黃白茅根各半兩蔥白二莖焙上銼如麻豆大水三盞煎至一盞半去滓食前分溫三二服小腸虛附論夫小腸者受盛之官心之腑也手太陽其經也其氣虛則為不足故左手寸口人迎以前脈陽虛者小腸虛也虛則生寒是故有顱際頭角偏痛耳聾不聰驚跳小便數之證治宜補之小腸者受盛之官化物出焉承奉胃司受盛糟粕受已傳於大腸是謂化物而出也其經有寒則亦傳於大腸故化物難而又腸中脹痛便痢赤白脈經謂小腸寒則令人下重便膿血者是也方牡蠣丸楊子建護命方治小腸虛寒小便頻數便下久而有膜如乳酪狀牡蠣火焙細研萆薢續斷益智子去皮石斛去根芎藭牛膝酒浸切焙狗脊去毛五味子石硫黃另研山茱萸巴戟天去心龍骨等分上為末煉蜜丸如梧桐子大空心鹽湯下四十丸小便止即已不必再服一方杵為末入鹽煎空心頻頻服不止再煉蜜丸服烏梅丸治小腸寒下痢赤白烏梅一百個乾薑炮黃連去須各三兩當歸切焙細辛去苗葉附子炮裂去皮臍桂去粗皮蜀椒去目並閉口炒出汗黃柏去粗皮銼人參各一兩上將九味搗為細末以苦酒漬烏梅一宿去核蒸令爛別搗如泥攪藥勻更入煉蜜少許和丸如梧桐子大每服十丸至二十丸米湯下食前日二服益智丸楊子建護命方治小腸虛寒小便後餘瀝陰痿不起益智子去皮萆薢狗脊去毛芎藭巴戟天去心乾木瓜續斷牛膝酒浸切焙各半兩附子炮裂去皮臍大者一枚上為末煉蜜和丸如梧桐子大每服四十丸空心鹽湯下蘹香子丸一名附子丸出聖惠方治小腸虛冷小腹疼痛不可忍蘹香子炒桂去粗皮各一兩附子炮裂去皮臍當歸切焙蓽澄茄木香赤石脂各三分蜀椒去目及閉口者微炒出汗半兩上為末煉蜜和丸如梧桐子大每服溫酒下二十丸空心食前一方有川烏頭三分炮裂去皮臍溫腸丸治小腸虛寒下痢便膿血腸滑懊憹補骨脂炒一兩肉蓯蓉酒浸去粗皮焙一兩半狗脊銼三分獨活去蘆頭須三分附子炮裂去皮臍巴戟天去心鹿茸酒炙去毛各一兩五味子三分上為細末煉蜜丸如梧桐子大每服三十丸鹽湯下或酒下亦得乾薑黃連湯出千金方治小腸虛寒頭偏痛耳頰痛痢下赤白腸滑心中懊憹腹中㽲痛裡急後重乾薑三兩炮當歸切焙黃柏去粗皮地榆各四兩黃連去須阿膠各二兩炙令燥石榴皮三枚焙上㕮咀以水七升煮取二升五合去滓下膠煮取膠烊盡分三服一方加茴香沉香湯出聖惠方治小腸虛寒臍下急痛小便滑數沉香銼桂去粗皮附子炮裂去皮臍白龍骨各一兩木香當歸銼微炒各二錢各三分枳實去瓤麩炒半兩上銼如麻豆每服三錢水一盞入生薑二片煎至六分去滓食前熱服木香丸治小腸寒便痢赤白腸滑木香黃連去須訶子皮無食子各半兩赤石脂一兩半厚朴去粗皮生薑汁炙銼碎當歸切焙各三分上為細末煮棗肉和丸如梧桐子大每服二十丸食前溫米飲下吳茱萸散出聖惠方治小腸虛冷小腹如刀刺或繞臍結痛冷汗出吳茱萸一分湯浸七遍焙乾微炒厚朴半兩去粗皮塗生薑汁炙令香熟芎藭半兩乾薑半兩炮裂銼甘草半兩炙微赤銼附子三分炮裂去皮臍上為散每服三錢水一中盞煎至六分去滓不拘時候稍熱服之椒附丸一名鹿茸丸出聖惠方治小腸虛冷小便頻數椒紅炒出汗桑螵蛸酒炙龍骨生用一方白者燒過用山茱萸取肉去核附子炮去皮臍鹿茸酒蒸焙一方用酥炙上等分細末酒糊丸如梧桐子大每服七十丸空心鹽湯送下一方煉蜜丸厚朴散治小腸受寒腹痛下重便痢膿血厚朴去粗皮生薑汁炙銼黃連去須微炒乾薑炮當歸切焙各一兩白茯苓去黑皮無食子各半兩上為細末每服二錢粥飲調下食前服阿膠湯治小腸寒腸中痛下赤白阿膠炙燥二兩桂去粗皮生薑切焙乾各半兩黃連去須三分上為散每服五錢以水一盞半煎至一盞去滓稍熱服日三寸金丸出百一選方治元陽虛弱寒氣攻衝膀胱小腸發腫作痛或在心脅之間牽連小腹連屬陰間致身體憎寒撮痛不可忍楮實子川楝子炒各一兩半巴豆炒七個去皮殼全蠍炒四十個當歸去蘆酒浸一宿一兩半上為細末用浸當歸酒打麵糊和丸如雞頭實大空心溫酒鹽湯下吞二丸或三丸並進二服蓬莪朮散楊子建護命方治小腸虛冷時發刺痛蓬莪朮炮銼蘹香子炒芎藭牛膝酒浸切細各半兩桂去粗皮一分上為散每服三二錢放銀石器內煎蔥湯調下牛膝丸楊子建護命方治小腸虛冷小便頻數日夜五六十次牛膝酒浸切焙續斷芎藭各半兩萆薢二兩上為末煉蜜丸如梧桐子大空心鹽湯下四十丸或用鹽煎服亦得厚朴散出聖惠方治小腸虛冷氣小腹卒㽲痛如割胸脅氣滿悶亂不可忍厚朴一兩去粗皮塗生薑汁炙令香熟高良薑一兩銼當歸三兩分銼微炒桂心一兩芎藭三分白芍藥三分上為散每服三錢水一盞煎至六分去滓不拘時稍熱服木香湯治小腸有寒下痢赤白腹痛下重木香三分黃連去須微炒當歸切微炒各一兩附子炮裂去皮臍一兩半厚朴去粗皮生薑汁炙三兩吳茱萸湯洗七遍焙乾炒半兩上為散每服三錢水一盞煎至七分去滓稍熱食前服斷弓弦散出續易簡方治小腸虛冷寒撮痛並婦人血刺心痛五靈脂蒲黃等分上同研為散每服二錢須先用釅醋一合熬藥成膏以水一小盞煎至七分熱呷之治小腸虛熱忽因酒後頓吃冷水並薺汁梨子柑子果食生冷之類冷氣偏勝裹著熱氣結於小腸其病狀臍下結塊如癰腫堅硬不痛連通外腎俱腫宜服此方診其脈小腸脈短此即陰中有伏陽也但結塊當臍下堅硬不痛者服之無有不驗也出楊子建護命方吳茱萸一分川芎半兩木通草十銖半夏二銖上件細杵羅為末每服三錢以水一盞蔥三二莖同煎取八分空心和滓吃喉間得腫處癢即續進一盞其腫處癢後散滿一腹即吃後方行氣藥治小腸冷熱不調取結氣方出楊子建護命方吳茱萸木通草芎藭官桂大黃炮熟細辛藁本獨活各一分生牽牛熟牽牛各半兩半夏四銖上件細杵羅為末每服四錢牽牛半夏末二錢諸藥二錢合為四錢濃煎蔥湯空心調下以大腑快為度未通快再酌量臟腑尋常有熱即使大黃若不帶熱即不使也萆薢散楊子建護命方治小腸頻數不計度數臨小便時即陰莖內疼痛不可勝忍凡人得此疾必先大腑秘熱不通水只就小腸中行大腑乾涸即不通也大腑熱甚即渾身熱心煩常思涼處愛吃涼水如此得之重也詳此候本因貪酒好色臟腑中有熱毒之氣亦行於小腸故小便時疼痛也若不因貪酒必平生愛吃葷膩酸辛熱毒之物又因色傷小腸氣虛水就小腸行致有斯疾此與淋病不同但小便頻數每度止有一盞半盞已來若是澀而疼痛者治之又不同也治小便頻數不計度數臨小便時疼痛不可勝忍宜服此方萆薢一兩用水浸少時漉出用鹽半兩相和鍋內炒乾去鹽不用川芎一分上件細杵羅為末每服三二錢水一盞同煎取八分和滓空心服兩三盞後便吃後方化毒湯楊子建護命方治肝肺熱毒蒸郁臟腑因生積滯其積者如腐爛瘀血之類熱毒熾盛腸乾大涸又因色傷小腸虛冷水道乘虛只行於小腸故小便常數而疼痛不可勝忍急宜服此化熱毒方然後非時以蔥湯洗穀道並納藥於穀道中令上下相感引水道下入大腑即自然小便不數疼痛自止也緣此病大腸熱竭津液小腸虛損下熱藥通小腸則大腸愈涸而病愈增下冷藥通大腑則小腸愈數而病不減當此之際醫之莫不為難也嘗以此方治之得驗故備錄之使後來者觀之更生高見則萬世生靈無夭折者矣治小便頻數肝肺有熱以此疼痛宜服此化方杏仁牡丹皮去心黃芩虎杖麻黃去根節木香芍藥柴胡升麻紫菀貝母去心連翹荊芥穗羌活各等分上件細杵羅為末每服二錢匕生薑二小塊同煎取八分濾去滓食後徐徐熱吃服此藥後常暖蔥湯於腳盆內探手掬水洗穀道使大腸與肺氣交感表裡上下相通引行水道轉入大腸漸次後通即小便得減並不疼痛也大腸既通吃後方藥便吃稍次積滯方乃得全安大腸若仍不通即以牽牛半兩皂角半兩杵為細末舊笙管盛藥末二錢匕納在穀道中一寸已來吹之即下化積滯通大腑方方見大腸腑門大便閉澀不通類利小腸出本草以小麥苗絞汁服之滑小腸出本草用冬葵子細銼以水煎服一盞食之一方葵子葉煮汁服之治小腹堅大如盤胸中滿能食而不消出本草用麴末服方寸匕晨晚日二服
