body:
  text: 卷一百六十八積聚門總論夫積有五而聚有六積者生於五臟之陰氣也聚者成於六腑之陽氣也此皆陰陽不和臟腑虛弱風邪搏之所以為積為聚也有如憂思喜怒之氣人之所不能免六腑屬於三陽太陽利清氣陽明泄濁氣少陽化精氣有如都會之府主轉輸以為常也若夫六腑失常則邪氣聚而不散始發既無根本上下無所留止其痛亦無常處故在上則格在下則脹傍攻兩脅如有坯塊易於轉動故非五積之比也凡診其脈駃而緊者積聚也脈浮而牢者積聚也脈橫者脅下有積聚也脈來小沉實者胃中有積聚也大抵病各有證治各有方如診心腹積聚其脈牢強急者生弱急者死又諸脈實強者生沉小者死此又不可不察也外臺秘要云肝之積名曰肥氣在左肋下如覆杯有頭足久不愈令人發如瘧連歲月不已以季夏戊己日得之何以言之肺病傳肝肝當傳脾脾季夏適旺旺者不受邪肝欲復還肺肺不肯受故留結為積故知肝之積以季夏戊己日得之也心之積名曰伏梁起臍上大如臂上至心下以秋庚辛日得之何以言之腎病當傳心心當傳肺肺以秋適旺旺者不受邪心欲復還腎腎不肯受留結為積故知伏梁以秋庚辛日得之也脾之積名曰痞氣在胃管覆如大盤久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸日得之何以言之肝病當傳脾脾當傳腎腎以冬適旺旺者不受邪脾欲復還肝肝不肯受故留為積故知痞氣以冬壬癸日得之也肺之積名曰息賁在右脅下覆如大杯久不愈令人灑淅寒熱喘逆發肺癰以春甲乙日得之何以言之心病傳肺肺當傳肝肝以春適旺旺者不受邪肺欲復還心心不肯受故留結為積故知息賁以春甲乙日得之也腎之積名曰賁豚發於小腹上至心下若奔豚之狀上下無定久不愈令人呃逆骨痿少氣以夏丙丁日得之何以言之脾病當傳腎腎當傳心心以夏適旺旺者不受邪腎欲復還脾脾不肯受故結為積故知賁豚以夏丙丁日得之也此為五積診得肺積脈浮而毛按之辟易時下氣逆背相引痛少氣善忘日暄皮膚寒秋愈夏劇主皮中時痛如蝨緣狀甚如針刺之狀時癢白色也診得心積脈沉而芤時上下無常處病少腹中熱面赤咽乾心煩掌熱甚即吐血主身瘛瘲主血瘲夏瘥冬劇色赤也診得脾積脈浮大而長飢則減飽則見復起與谷爭累累如桃李起見於外腹滿嘔泄腸鳴四肢重手足勁寒脅痛引小腹男子得疝也女人病淋也身無膏澤善腫厥不能臥主肌肉損色黃也診得肝積脈弦而細兩脅下痛邪走心下足脛轉筋爪甲枯黑春瘥秋劇色青也診得腎積脈沉而急苦脊與腰相引飢則見飽則減病腰痛小腹裡急口乾咽腫傷爛目盲脛骨中寒主髓厥善忘色黑也六腑者大小腸胃膽膀胱三焦者也屬於三陽太陽利清氣陽明泄濁氣少陽化精氣如都會之府主轉輸以為常也六腑失常則壅聚不通故實而不轉虛而不輸隨氣往來痛無定處在上則格在下則脹傍攻兩脅有如坯塊易於轉變非五臟比也夫喜傷心者自汗不可疾行不可久立故經曰喜則氣散怒傷肝者上氣不可忍熱則來蕩心短氣絕不得息故經曰怒則氣擊一作上憂傷肺者心系急上焦閉營衛不通夜臥不安故經曰憂則氣聚思傷脾者氣留不行積聚在中脘不得飲食腹脹滿四肢怠惰故經曰思則氣結悲傷心者善忘不識人置物在處還取不得筋攣四肢浮腫故經曰悲則氣急恐傷腎者上焦氣閉不行下焦回還不散猶豫不快嘔逆心惡故經曰恐則精卻驚傷膽者神無所歸慮無所定說物不竟而迫故經曰驚則氣亂七者雖不同本乎一氣臟氣不行鬱而生涎隨氣聚積堅大如塊在心腹中或塞咽喉如粉絮吐不出咽不下時去時來每發欲死狀如神靈所作逆害飲食皆氣所生成治之各有方也夫積者傷滯也傷滯之久停留不化則成積矣其於臟腑皆因觸冒以成積病惟脾胃最易受觸蓋日用飲酒積或過多停滯難化或吐或嘔或泄或痢當是之時法宜推蕩然後助養脾胃所推蕩者便宜酌量人之虛實傷滯之輕重而推蕩之停滯一消則不成積若不早治久之必成積聚癥瘕矣所謂積者有積氣積肉積酒積茶積食積痰更有婦女月經不通遂成血積積者五臟所生氣之所積名曰積其始發有根本其痛不離其部由陰氣所生也聚者六腑所成氣之所聚名曰聚其始發無根本其痛無常處由陽氣所生也然又癥瘕癖結者積聚之異名也證狀不一源其病本大略相類但從其所得或診其證狀以立名爾且或隱或見腹內按之形證可驗也瘕者為瘕聚推之流移不定也癖者僻側在於脅肋結者沉浮結強於內然有得之於食有得之於氣有得之於憂思有得之於風寒凡使血氣沉滯留結而為病者治須漸磨潰削使氣血流通則病可愈矣夫衛氣留於腹中蓄積不行脈強及急腹皮急甚不可刺云黃帝曰衛氣之留於腹中蓄積不行莞蘊不得常所使人肢脅胃中滿喘呼逆息者何以去之伯高曰其氣積於胸中者上取之積於腹中者下取之上下皆滿溢者傍取之黃帝曰取之奈何伯高曰積於上者瀉人迎天突於喉中積於下者瀉三里於氣衝上下皆滿者上下取之於季脅之下深一寸重者雞足取之診視其脈大而弦急及絕不至者及腹皮急甚者當從陰引陽取穴於腹募不可刺也夫不可刺者宜灸也一則沉寒痼冷二則無脈陽之絕也三則腹皮急而陽陷也舍此三者余皆不得灸若病在兩寸脈者及腹皮急甚者當從陰引陽取穴於腹募五臟病取五臟募六腑病取六腑募若病在兩尺脈者當從陽引陰取穴於背腧五臟病取五臟腧六腑病取六腑腧元氣病取六腑於募筋骨有形病者取五臟腧募其病不在天之陽不在地之陰在腹中者兩儀之間人事也故取季脅下一寸元氣病取之右筋病取之左故曰在中者傍取之此其理也灸者燔取之儒門事親書論云息城司侯聞父死於賊乃大悲哭之罷便覺心痛日增不已月餘成塊狀若覆杯大痛不止藥皆無功議用燔針炷艾病人惡之乃求於戴人戴人至適巫者在其傍乃學巫者雜於狂言以謔病者至笑其笑不忍回面向壁一二日心下結梗皆散戴人曰內經言憂則氣結喜則百脈舒矣又云喜勝悲內經自皆有法治之不知何用針灸哉一緇侶好茶成病積在左脅戴人曰此與肥氣頗同然痎瘧不作便非肥氣雖病十年不勞一日況兩手脈沉細有積故然吾治無針灸之苦但略為施治可享壽盡期先以茶調散吐出宿茶水數升再以木如意探之又湧數升皆作茶色次以三花神祐丸九十餘粒是夜瀉二十餘行膿水相兼燥糞瘀血雜然而下明日以除濕之劑使服十餘日諸苦悉蠲神清色瑩顯慶寺僧應公有沉積數年雖不臥床枕每於四更後心頭悶硬不能安臥須起行寺中習以為常人莫知為何病以藥請於戴人戴人令湧出膠涎一二升如黑礬水繼出黃綠水又下膿血數升自覺胸中如失巨山飲餌無算安眠至曉寄西華縣癢山東顏先生有積二十年目視物不移細字不觀當心如頑石每發痛不可忍食減肉消黑䵟滿面腰不能直因遇戴人令湧寒痰一盞如片粉夜以舟車丸通經散下爛腸葵菜汁七八行病十去三四以熱漿水粥飲之復去痰一大盆次日又以舟車丸通經散前後約百餘行累無少隱不五六日面色䵟去食進目明心中空曠遂失頑石所在素問曰積聚留飲痞膈中滿濕積霍亂吐下瘕症堅硬腹滿皆大陰濕土乃脾胃之氣積聚之根也積者不散聚者不化留者不行飲者停滯痞者不通隔者阻也中滿下澀為積霍亂吐下為留飲同瘕症者症徵也瘕假也斯疾乃五臟六腑陰陽變化與衰之制也亢則害承乃制及則反以謂水得燥則消散而得濕則不消乃為積飲也謂人形精神與營衛血氣津液出入通流謂夫腠理閉密乃為痞也謂腸胃膈絕傳化失常而為滯也土主形體腹滿於中央乃曰中滿以傳化失度故甚則霍亂吐瀉也症者腹中堅硬按之應手然水體柔順而今反堅硬如此者亢則害承乃制也瘕者中雖硬而忽聚忽散無其常故其病未及症也經曰血不行而滯故血肉凝而為瘕也小腸移熱於大腸乃為虛瘕大腸移熱於小腸謂兩熱相搏則血溢而為伏瘕血澀不利月事復滯而不行故云為疝瘕為狀與伏同瘕與疝同為傳寫誤也世傳冷病亦有熱或陽氣鬱結怫熱壅滯而堅硬不消者世傳為寒症瘕也或堅痞腹滿急痛寒主筋縮故急主痛寒極血凝柔而反堅土化制之故堅痞而腹滿或熱鬱於內而腹滿堅結痛不可忍者皆可為寒誤矣何不以脈證辨之凡諸疾病皆有陰陽寒熱宜以詳之大抵治積或以所惡者攻之或以所喜者誘之則易愈如硼砂水銀治肉積神麯麥糵治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若群隊之藥分其勢則難取效反損所謂譬猶獵不知兔廣絡原野冀一人獲之術亦謬矣須是認得分明是積聚然後增減用藥不爾反有所損廣五行記永徽中有僧維則病噎不能食語弟子曰吾死之後便可開吾胸中視有何物言絕而卒弟子果開視胸中得一物形似魚而有兩頭遍體皆肉鱗弟子置器中跳躍不止戲以諸味皆隨化盡時夏中藍盛適有一僧以藍貯器中其蟲繞逐器中走須臾化為水此乃五症五噎證後人因此藍治噎候矣積聚附論經曰病有積有聚何以別之積者陰氣也聚者陽氣也陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所生積之為病其始發有常處其痛不離其部上下有所終始左右有所窮處聚之為病其始發無根本上下無所留止其病無常處此積聚之別也方秘方三稜煎丸三稜陳皮五靈脂各三兩蘿蔔子白芍藥檳榔香附子草豆黑牽牛各二兩糖球四兩木香枳殼枳實縮砂乾漆神麯麥糵蓽澄茄白朮片姜益智硇砂草果延胡索菖蒲乾薑烏藥紅豆各一兩蓬莪朮二兩醋炙白豆仁五錢炒官桂一兩上為細末粉糊為丸如梧桐子大每服五十丸空心溫薑湯送下秘傳掌中金丸真氣衰弱飲酒多傷停於胸膈往往用感應丸如聖膏理中丸之類又不能克化任意取服轉致傷真元臟腑別生他疾惟此藥能消化酒食消痰飲寬中利膈久服永無胸膈不快之疾不動臟腑不損真元加檳榔木香各一兩名檳榔丸又調和氣陳皮一斤去白濕秤生薑淨洗與陳皮對下切片如伏中二味曬炒甘草二兩半夏湯洗七次三兩薑汁和餅伏中曬炒神麯麥糵各二兩砂仁白豆蔻各一兩上為末姜糊丸如桐子大服三四十丸薑湯下效方主心腹積聚四肢痹躄舉體風殘療百病虎骨野葛各三兩附子一十五枚甘草細辛各一兩杏仁巴豆去皮心芎藭切各一升椒雄黃各二兩上以苦酒漬周時豬脂六斤微煎三上三下完取附子視黃為度絞去滓乃內雄黃攪使稠和密器貯之百病皆摩敷上唯不得入口服若服之或如棗大納一合熱酒中須臾後拔白髮以藥敷之即生烏髮諸瘡毒風腫及馬鞍瘡等洗即瘥牛領亦然破塊丸一名陰陽丸治受瘴結成氣塊腹中不能消散服之即效出危氏方蓽茇一兩大黃一兩一生用上為細末入生麝香少許煉蜜為丸如梧桐子大每服三十丸空心冷水或冷湯下日三服紫菀丸紫菀去苗細刮淨蓯蓉酒浸人參檳榔茯苓去皮官桂去皮乾薑炮白朮柴胡去苗土大黃炒黃連去須桔梗當歸去蘆淨洗防風去蘆羌活鱉甲醋煮去裙襴陳皮去白酒浸車前子防己石菖蒲熟地黃酒浸吳茱萸湯浸七次川烏炮去皮臍川椒去汗用殼巴豆去皮心膜油麥門冬去心上各等分為細末煉蜜為丸如桐子大初服快利為度如不利至七丸酒服或用粥飲溫水亦得治疾癖氣塊及諸黃病毒氣衝心繞臍如蟲咬又治六種水蠱病寒反胃吐逆飲食不消時行無度婦人月露蘊結不調或多或少月前月後猶如懷胎又二十四種風頑晝夜不安夢與鬼交頭生白髮或歌或笑有鬼魅服此藥皆驗楊駙馬患衝心病每日飲食頻吐遍身枯瘦每日服此藥五丸至二十日瀉出肉蝦蟆六個白膿二升而愈京兆尹趙京先患火風痰眉毛脫落骨肉瘡疾服此藥一月瀉出癲蟲數十條馬尾長相似其病即愈河南劉府尹妻患眼不明一年服此藥二十日瀉出肉鱉六個肉如針相似眼明如初蔡太師妻患赤白帶下作氣血崩服五丸至八九丸瀉出赤水一升內有肉塊下如雞子大今此藥療一切病有孕婦人不可服腸風痔漏溫酒下赤白痢訶子湯下中風甘草湯下心痛溫酒下蟲咬心痛檳榔湯下墜馬心悶四肢不散溫酒下氣噎乾荷葉湯下轉筋霍亂生薑湯下一切風疾升麻湯下瀉痢黃連湯下寸白蟲檳榔湯下喘嗽杏仁湯下頭腫熱湯下打撲傷損溫酒下腰痛黑豆淋湯下食積氣塊麵湯下因傷酒溫酒下肺氣杏仁湯下臍下疼芍藥湯下宿食不消生薑湯下陰毒傷寒溫酒下脾氣陳皮湯下金露丸出和劑方治腹內積聚症塊久患大如杯及黃瘦宿水朝暮咳嗽積年冷氣時復腹下盤痛弦結衝心及兩脅徹背連心疼痛氣不息氣繞臍下狀如蟲咬不可忍諸般水氣反胃吐食嘔逆飲食多噎五般痔漏腳氣走疰風有如蟲行手足煩熱夜臥不安睡語無度小兒驚疳婦人五邪夢與鬼交沉重不思飲食昏昏如夢不曉人事欲死懼多或歌或哭不定月候不調心中如狂身體羸瘦莫辨其狀但服此藥萬不失一無不平愈是病皆療更不細述草烏頭炮黃連各二兩桂心不見火乾薑炮桔梗吳茱萸湯浸七次茯苓去皮柴胡去苗乾地黃洗焙蜀椒去目炒厚朴薑製人參去蘆菖蒲泔浸一夕紫菀去苗鱉甲醋炙芎藭洗焙枳殼去瓤麩炒貝母去心甘遂炮一方用甘松甘草炙防風各一兩巴豆去心膜用醋煮二十沸焙乾取一兩不去油用上為細末以麵糊為丸如梧桐子大每服五丸心中疾患薑湯下心痛酸石榴皮湯下口瘡蜜湯下頭痛石膏湯蔥茶下一切脾胃氣橘皮湯下傷寒麻黃蔥湯下腳氣水氣杏仁湯下水瀉氣瀉龍膽草湯下赤痢甘草湯下白痢乾薑湯下赤白痢甘草薑湯下胸膈咽悶通草湯下婦人血氣當歸酒下如不飲酒當歸煎湯亦得疝氣風氣小腸氣及下墜附子湯下常服及應急諸般痰患凡米飲熟水茶酒任下如傷冷腹痛酒食所傷酒疸黃疸氣結痞塞鶴膝風並用鹽酒下治三十六種十二症無不醫治此藥前人用之效者馬遂臨老渾身楚痛不思飲食每夜五丸至七日下血如雞肝者二百餘片臭膿二升以此遂愈三原主簿陳勝妻有病十五年羸瘦腹中楚痛不可忍服藥至旬日下青蟲六十四條如箸頭身赤色及藥水五升遂愈京兆府工曹柳行余著床經年服至十日下肉蜣螂百有餘個青黃水一升許遂愈王元覽有門客久患羸瘦吃食轉吐服之下肉蝦蟆七個青水一升遂愈興國寺僧澄清患癰塊十五年服十日下肉蛇二條遂愈後來又患風疾眉毛盡落服至百日出五色蟲若干青水三升遂平復此元覽進方時所陳也後代鄭教授云此方於杜相公府子弟處曾用之無不治效如與小兒吃時一丸分作四丸量兒大小可三五丸合此藥如煮巴豆時須是躬親自數三十沸便傾出焙乾若沸過藥即無力服此藥別無所忌只驗定病證不定用湯有差其效不速也松煙餅子治積氣塊消食快氣細墨五分燒研陳皮五錢去白牽牛五錢別研取頭末五錢牡蠣火煨煅神麯炒三稜火煨密陀僧研五靈脂研硇砂研麥糵各五錢炒大黃一兩北棗一十四枚燒存性斑蝥一兩去翅足糯米同炒乾漆炒去煙白丁香研青礞石研各一錢巴豆一兩去皮濕紙裹燒黃色為度蓬莪朮一錢煨大戟去蘆芫花醋浸一宿上為細末水打麵糊為丸如皂角子大捻為餅子記以所有傷煎湯送下或麵湯亦可小兒三餅大人看虛實稟氣加四五餅不嚼吞服其積塊漸漸近下再進一服又覺近下或積塊疵血痢塞大人小兒久痢或休息痢並男子婦人年深不服水土及暑月變成惡痢米物不消五塊逆膈胃吐食心胸悶閉酒疸食黃勞嗽上喘嘔逆涎沫心閉驚恐口苦噁心小便淋澀大便不通傷寒餘毒婦人胎前產後敗血困生變成積塊飲食平常遍身疼痛腰強腿硬手足冷厥九種心痛十般積熱九般水氣霍亂吐瀉久病瘦弱但有此證並皆治之一方用陳皮湯下溫白丸治臟腑積聚症癖氣塊腹多疼痛按或有形肢節煩熱腰腳痠痛及婦人血癖經候不調赤白帶下等疾柴胡去苗紫菀去苗土吳茱萸湯浸焙乾炒菖蒲桔梗銼炒荊三稜煨銼赤茯苓去黑皮人參黃連去須炒乾薑炮桂去粗皮蜀椒去目併合口者炒出汗巴豆去皮心膜研出油淨皂莢去皮炙黃鱉甲去裙襴醋炙各一兩烏頭炮裂去皮臍黃耆銼末各二兩當歸切二兩焙厚朴去粗皮生薑汁炙二兩上為末煉蜜和搗一千下丸如梧桐子大每服三丸加至四五丸溫酒下利下惡物為度化氣丸治男子婦人遠年日久茶酒氣食過度成積一切氣候服之如神官桂陳皮青皮丁香木香縮砂各一兩三稜莪朮各二兩茯苓一兩半人參好者一兩香附半斤甘草厚朴蘿蔔子將軍即大黃各二兩枳殼炮檳榔各三兩黑牽牛四兩頭末上為末黑牽牛一斤取頭末四兩以三分分之生用二分炒一分和勻打醋糊須要著鍋方可搜勻丸如梧桐子大每服三四十丸薑茶任下仍驗老弱盛衰加減用之法制檳榔傳信適用方治酒食過度胸膈膨滿口吐清水一切積滯雞心檳榔一兩切作細塊白豆蔻取仁一兩縮砂取仁一兩鹽二兩揀丁香一兩切作細塊粉草一兩切作細塊真陳橘皮半斤去白切作細條生薑半斤切作細條上件用河水兩碗浸一宿次日用慢火砂鍋內煮乾焙乾入新瓶收每服一撮細嚼飲酒下為細末湯點亦可