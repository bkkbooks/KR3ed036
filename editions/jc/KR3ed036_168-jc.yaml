白芷巴豆去油各半兩大黃別末乾漆各一兩木香青皮胡椒各一分檳榔肉豆蔻各一兩上為細末水二升煎巴豆五七沸後下三稜大黃末同煎五七沸入硇砂同煎成膏便入諸藥和勻丸如綠豆大年深氣塊生薑湯下四五丸食積熱水下白痢乾薑湯下赤痢甘草湯下血痢當歸蔥酒亦可硃砂守病丸一名太上老君守病丸硃砂三錢硼砂一錢橘紅三錢粉霜一錢輕粉一錢龍骨一錢白膠香一兩半琥珀一錢硇砂一錢雄黃一錢石腦油二錢千口土不入藥水中浸用上將硼砂硇砂雄黃各乳研卻用石腦油消銀大砂鍋內將上三味乳細末和勻用銅匙子不住手攪砂鍋外用一大鍋滾湯將砂鍋頓放湯鍋中煮仍不住手攪直至油炒雄黃乾黑色成膏為度卻取去砂鍋候冷定乾硬再入乳缽細研卻入余藥末同研勻用大銅匙將藥末入熱湯內蕩自然成劑用手捏成塊就於湯火邊旋捏下丸如櫻桃大隨丸即放入千口土水碗內浸之候冷定硬出底干收貯服之用新水送下未時前後服次日服五積丸一方無龍骨白膠香粉霜用赤石脂五積丸巴豆麵裹燒去殼取肉一兩黃柏末五錢使君子肉五錢蛤粉五錢苦楝根末五錢雷丸五錢上為末和勻滴水為丸如桐子大每服一十五丸煎使君子肉湯下固腸散白朮滑石甘草寒水石煨牡丹皮人參白茯苓綠豆粉各五錢上為末空心米飲調下二錢病虛者三服忌生冷硬物半月撾脾丸南星四兩半夏二兩舶上硫黃二兩輕粉三錢錫膠三錢雷丸一兩干胭脂五錢白牽牛炒一兩上為末酒糊為丸如小豆大每服三十丸生薑湯下日進二服快活丸消酒食去積滯散冷氣枳殼青皮陳皮丁香砂仁烏藥各一兩三稜蓬朮香附蘿蔔子慄楔麥芽各三兩上糊丸桐子大服三五十丸茶酒任下硇砂煎丸出聖惠方治積聚氣久不消散腹脅脹痛面無顏色四肢不和硇砂二兩不夾石者細研醋一升半與芫花末同煎如膏芫花一兩炒令黃色搗羅為末川烏頭半兩炮裂去皮臍川大黃一兩銼碎微炒木香半兩當歸半兩鱉甲一兩塗上醋煮令黃去裙襴桂心半兩蓬莪朮半兩荊三稜半兩炮銼乾漆三分搗碎炒令煙出青橘皮三分湯浸去白瓤焙上為細末同煎煎中更入小蒸餅和搗三百杵丸如桐子大每服食前溫酒下十五丸檳榔湯治積聚結實腹滿刺痛泄利不止透膜丸出聖濟總錄取積聚硇砂一錢乳香一錢粉霜一錢硝石礞石各一分二味同研勻細溶作汁用皂角子三枚旋放入煙絕為度候冷研每料用末三錢硫黃膩粉白丁香密陀僧荊三稜末各一錢巴豆二十一粒去皮心膜醋煮紫色研上為末研勻用棗肉丸如綠豆大每服七丸至十丸煎生薑橘皮湯下小兒皂角子湯下麝香寬中丸出簡易方理中脘不快胸膈痞悶嘔吐噁心腹脅刺痛飲食不思麝香二錢別研沉香四錢細銼木香半兩甘草炙一兩白檀香別末一兩甘松去土陳皮去白薑黃各二兩香附子炒去毛一兩縮砂仁一兩五錢上為末次入麝香研和熬甘草膏為丸桐子大每服三十丸細嚼沸湯下不拘時候恆山丸出千金方治脅下邪氣積聚寒熱往來如溫瘧恆山蜀漆白薇桂心鮀甲附子白朮鱉甲䗪蟲貝齒各一兩蜚虻六銖上為末蜜丸如梧桐子大以米泔清服五丸日三服三稜煎丸三稜八兩杏仁蘿蔔子大硼砂各一兩五錢神麯麥糵青皮乾漆各二兩縮砂丁香蓬朮各一兩五錢上為細末薄糊丸如梧桐子大每服二三十丸飲湯下如聖丸治積聚癖塊一切所傷吃食減少日漸黃瘦巴豆去皮心膜研出油一兩丁香三錢烏梅去核一兩半乾漆搗碎炒煙出一兩滑石一錢上先搗羅四味為末然後入巴豆同研勻用粳米飯同爛搗丸如粟米大每服二丸至三丸隨所傷物下更量虛實加減太乙神明再造感應丹出危氏方治因虛滯冷內積陰寒形羸氣弱因虛有傷停積胃脘不能運化或因氣傷冷失飢寒飽餐過多嘔吐不止心痛腹脹疼不可忍或大便頻並或久痢赤白或霍亂吐瀉又治中酒嘔噦心胸痞悶不思飲食又治久病荏苒歲月漸至虛弱羸瘦飲食遲化大便或閉或瀉不拘久新積冷氣病並皆治之不過三服便見痊愈此藥性溫無毒不損胃氣只磨化濕冷積聚治氣旋丸如綠豆大每服三五丸量虛實加減溫湯下不拘時候常服進食消酒毒令人不中酒又治小兒脾胃虛弱累有傷滯每服黍米大五粒乾薑湯下不拘時候治病即有神效此藥近世盛行有數方唯此方乃太乙神明再造功效神異肉豆蔻二兩荊三稜一兩炮銼揀丁香一兩蓽澄茄一兩川面姜二兩炮木香一兩百草霜二兩黃蠟四兩一作酒蠟巴豆一百粒去皮研取霜杏仁一百粒去皮尖另研清油一兩上先將肉豆蔻荊三稜丁香蓽澄茄川面薑木香百草霜一處為細末同巴豆杏仁霜一處拌勻先下油熱次蠟熬熔傾在藥末內和成劑旋丸如綠豆大每服三五丸熱水下食後臨臥服小兒如黍米大二三丸乾薑湯下傷滯糞白有效五積散治五積六聚並酒積蠱氣所傷石榴皮荊三稜巴豆五靈脂甜葶藶大戟芫花甘遂杏仁大黃烏梅鹽豉各等二分以上一十二味頭醋三碗煮盡干於砂鍋內炒黃色加陳皮青皮木香瞿麥豆蔻砂仁六味在內一處相和研為細末每服一錢空心溫酒調下病重二錢如為丸以醋打糊為丸如綠豆大每服一十五丸至三十丸傷酒葛根湯下傷食鹽湯下氣蠱木香湯下水蠱樟柳根湯下順逆丸主久寒積聚氣逆不能食大黃一錢黃芩厚朴炙乾地黃桂心滑石杏仁去皮尖熬黃連麥門冬去心各四分上搗合下篩以蜜和丸如梧桐子大每服十丸日再服後食不知稍增以知為度忌蕪荑生蔥豬頭肉黃藥針砂丸針砂青皮陳皮乾漆黑牽牛白礬青礬綠礬各四兩蒼朮半斤米泔浸一兩上除蒼朮半斤餘四味用米醋兩碗將三礬共針砂煮令醋乾共為末醋糊為丸如桐子大每服三十丸一日一服積氣丸出聖濟總錄治一切積滯痰逆噁心霍亂吐瀉膈氣痞滿脅肋積塊胸膈膨悶嘔噦多痰泄痢不止代赭石煅醋碎研礞石研各一兩桂去粗皮赤茯苓去黑皮硼砂研青橘皮去白焙各半兩胡椒四十九粒巴豆去皮心膜研四錢上搗羅四味為末與四味研者和勻酒煮麵糊丸如梧桐子大每服一丸至三丸食後木香湯下三稜煎丸出和劑方治積順氣寬中消積滯化痰飲治中脘氣痞心腹堅脹脅下緊硬胸中痞塞喘滿短氣喑心氣不通嘔吐痰逆飲食不下大便不調或瀉或秘杏仁湯浸去皮尖麩炒黃色硼砂飛研一兩神麯碎炒麥糵炒各三兩青皮去白乾漆炒蘿蔔子微炒各二兩三稜生細銼搗為末八兩以酒三升石器內熬成膏上為末以三稜膏勻搜和丸如梧桐子大每服十五丸至二十丸溫米湯飲下食後服加阿魏丸薑湯下蓬莪朮丹出御藥院方治久患癖瘕積聚心腹脹悶飲食減少四肢困倦欲成癆瘵常服調和營衛美進飲食消積聚長肌肉蓬莪朮荊三稜木香白芍藥鱉甲各半兩白朮人參各一兩當歸二錢半上為細末用浸蒸餅為丸如豌豆大每服三十丸食後溫粥飲下握藥宣疾巴豆乾薑韭子良薑硫黃甘遂白檳榔各等分上為末研飯為丸如中指頭大用時早朝用椒湯浸手了麻油塗手掌中握藥一丸移時便瀉欲得瀉止即以冷水洗手男左女右手心握本事方有肉桂附子生薑橘皮丸出楊氏家藏方治氣消飲去痰溫中散寒美進飲食陳橘皮一斤生薑一斤薄切神麯二兩上為細末麵糊和丸如梧桐子大每服五七十丸米飲熱水下食後無問老幼皆可服七香丸通中快氣丁香檀香益智仁甘草各一兩木香蓬莪朮一兩半香附子一兩半上七味甘草膏丸如雞頭子大服時薑湯嚼下兩三粒治一切結實沖胸膈惡氣用水薑汁煎服治積聚痰飲不下飲嘔逆及腹內諸疾宣一切宿滯以續隨子研碎酒服之不過三顆當下惡物又單方日服十粒瀉多以酸漿水薄醋粥吃即止治身熱腹中積聚邪氣痞中如火燒煩悶以凝水石研水飲之治胸膈中積食以醋水引之下氣止渴用溫荸薺臨臥啖三枚而寢生熟皆宜取積妙應丸家傳經驗專取男子女人小兒諸般積滯氣多因茶酒生果肉面所傷又為悲憂喜怒之氣鬱結心懷積成癖脾癥瘕大如杯碗不消諸種蟲積及治黃疸水蠱遍身浮腫翻胃吐食九種心痛一切風症婦人血瘕淋帶經脈不通腹內如懷胎孕及成鬼胎小兒脾疳積滯並皆治之此藥不動元陽真氣服後肚腹平復亦不疼痛雖年幼氣弱小兒加減服有利無害檳榔一斤大黃一斤牽牛末半斤杜仲半斤蕪荑仁半斤另研雷丸半斤鶴蝨四兩錫灰四兩阿魏二兩另酒化開揉上為細末用皂角去皮弦子淨一斤半熱水泡浸搓橘水汁濾去滓與藥末皂角水再入糊為丸如梧桐子大每服稱四錢重作一服五更用蔥白七根熬湯送下仍以棗兒三個食之壓藥次早天明臟腑一行後取下惡積之物如有積者盡去數行如只見稀水無積物即用溫薄米粥補住治諸般積滯神效沉香一錢木香半錢雷丸二錢青皮半錢荊三稜一錢黑牽牛頭末一錢半石三稜一錢縮砂半錢重蓬莪朮一錢檳榔半錢重白牽牛頭末一錢重上為細末先將水一大碗隔宿滾五七沸露一宿空心每服四錢調服如多時不動再服二錢行五七遍不止用白米湯補之小兒服二錢婦人加琥珀吃藥後忌諸般生冷物油醬醋三日用白粥妙香丸出聖濟總錄治積聚留滯胸膈痞悶嘔噦吐逆心腹刺痛脅肋脹滿噫氣吞酸宿食不消痃癖結塊四肢倦怠不思飲食檳榔一錢銼桂去粗皮丹砂研麝香半錢分研桃仁去皮尖雙仁炒各半兩巴豆二十五粒去皮心膜研出油附子炮裂去皮臍一兩上為末溫浸炊餅和丸如桐子大每服一丸食後溫木香湯下生薑湯下亦得更量虛實加減積氣丸出聖濟總錄治一切積滯痰逆噁心吐瀉霍亂膈氣痞滿脅肋積塊胸膈膨悶嘔噦心疼泄瀉下痢大戟龍膽木香各半兩杏仁去皮尖雙仁炒研代赭煅醋淬赤石脂水飛研各一兩巴豆去皮心膜研出油一錢上研極細以麵糊為丸如梧桐子大陰乾經十日方可服每三丸至五丸木香湯下溫湯熱水亦可感應丸出衛生家寶方治虛中積冷氣若有傷停積胃脘不能傳化或因氣傷冷因飢飽食醉酒過多心下堅冷兩脅脹痛心腹大疼霍亂吐瀉大便頻數並後遲滯久痢赤白膿血相雜米穀不消愈而復發又治中酒嘔吐痰逆噁心喜唾頭旋胸膈痞悶四肢倦怠不欲飲食又治妊娠傷冷新產有傷日久有積寒吃熱藥不效者又治久病形羸荏苒歲日漸致虛弱面黃肌瘦飲食或進或退大便或秘或澀不拘久新積冷並悉治之大病不過三服便見全愈此藥溫無毒並不燥熱損胃氣亦不吐瀉只是磨化積聚消逐濕冷療飲食所傷快三焦滯氣旋丸如綠豆大每服三五粒量虛實加減溫水吞下不拘時候服進飲食消酒毒令人不中酒又治小兒脾胃虛弱累有傷滯糞白鮓臭下痢水穀每服五粒黍米大乾薑湯下不拘時候百草霜用村莊家鍋底上刮者細研二兩南木香去蘆頭二兩半杏仁百四十枚肥者去雙仁及皮尖湯浸一宿別研丁香肉豆蔻去粗皮用各一兩巴豆七十枚去皮心膜炒研細出盡油如粉川乾薑炮製一兩上除巴豆粉百草霜杏仁三味外餘四味搗為細末與前三味同拌研令細用好蠟匱和先將蠟六兩熔化作汁以重綿濾去滓以好酒一斤於銀器內煮蠟熔數沸傾出候酒冷其蠟自浮取蠟稱用凡春夏修合用清油一兩於鍋內熬令末散香熟次下酒煮蠟四兩同化作汁就鍋內乘熱拌和前項藥末秋冬修合用清油一兩半同煎煮熟作汁合匱藥末成劑分作小錠子以油單紙裹旋丸服餌此高殿前家方也若腹疼痛不可忍者當服此藥以大便通利為效或未通更宜倍加丸數雖多服無害以利為期若利後腹大不調或泄瀉不止或愈見絞痛當以家菖蒲煎湯解之卻於㕮咀方中選藥調理自能平復或者見服藥之後痛或愈甚既已流利而痛未除便謂前藥之訛殊不知乃陰陽擾亂臟氣未平久當自定積聚湯一名大攻氣湯治積氣或一邊或左右或不循行上下或肌肉之間如雞刀所銼其氣不得見令人腹中痛滿由驚憂思怒或冒寒熱留而不去為伏郁之氣因氣流行隨經上下相搏而痛久令人痞悶其脈短澀胃之聚氣狀如癥瘕攻刺腰脅上氣滯塞小腹䐜脹大小便不利或泄瀉淋瀝無度三稜莪朮青皮去白陳皮去白桂心不見火藿香葉桔梗去蘆銼炒益智仁香附子各一兩半甘草三錢炙上㕮咀每服五六錢水二盞煎至一盞去滓溫服食前捶鑿丸療腹中積聚邪氣寒熱消穀甘遂蕘花芫花桂心巴豆杏仁桔梗各一錢上蕘花芫花熬令香巴豆杏仁去皮熬令變色赤各藥搗下細篩搗合丸以白蜜搗萬杵丸如小豆大一丸日三行常將服之傷寒增服膈上吐膈下瀉小兒亦服婦人兼身亦服名曰捶鑿以消積滯忌豬肉蘆筍生蔥
