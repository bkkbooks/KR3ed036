body:
  text: 卷二百二十八虛勞門虛勞導引法養生方云唯欲嘿氣養神閉氣使極吐氣使微又不得多言語大呼喚令神勞損亦云不可泣淚及多唾洟此皆為損液漏津使喉澀大渴又云雞鳴時扣齒三十六下訖舐唇漱口舌仰上齒表咽之三過殺蟲補虛勞令人強壯又云兩手拓兩頰手不動抬肘使急腰內亦然住定放兩肋頭向外肘膊腰氣散盡勢大悶始起來去七通去肘臂之勞又云兩足跟相對坐上兩足指相向外扒兩膝頭住席兩向外扒使急始長舒兩手兩向取勢一一皆急三七去五勞腰脊膝痛傷冷脾痹又云跪一足坐上兩手䏶內卷足努踹向下身外扒一時取勢向心來去二七左右亦然去五勞足臂疼悶膝冷陰冷又云坐抱兩膝下去三里二寸急抱向身急勢足兩向身起欲似胡床住勢還坐上下來去二七去腰足臂內虛勞膀胱冷又云外轉兩腳平蹋向陰端急蹙將兩手捧膝頭兩向極勢捺之二七畢身側兩向取勢二七前後努腰去心勞痔病膝頭冷調和未損時須言語不瞋喜偏跏兩手抱膝頭努膝向外身手膝各兩極勢挽之三七左右亦然頭須左右仰扒去背急臂勞又云兩足相蹋令足掌合也蹙足極勢兩手長舒掌相向腦項之後兼至膊相挽向頭膊手向席來去七仰手七合手七始兩手角上極勢腰正足不動去五勞七傷臍下冷暖不和數用之常和調適又云一足蹋地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去五勞三里氣不下又蛇行氣曲臥以正身復起踞閉目隨氣所在不息少食裁通腸服氣為食以舐為漿春出冬藏不財不養以治五勞七傷又云蝦蟆行氣正動搖兩臂不息十二通以治五勞七傷水腫之病又云外轉兩足十遍引去心腹諸勞內轉兩足十遍引去心五息止去身一切諸勞疾疹又云正偃臥以口徐徐內氣以鼻出之除裡急飽食後小嚥氣數十令溫寒者乾嘔腹痛從口內氣七十所大填腹後小嚥氣數十兩手摩令極熱以摩腹令氣下也
