body:
  text: 卷二百七十六諸瘡腫門許真君七十二證土虺瘡證第一夫土虺瘡證者初生蕎麥皮相似腫硬無頭腦熱著骨只發憎寒俗名疔瘡此名土虺之證也宜服奪命返魂散紫燕瘡證第二夫紫燕瘡者初生如黃豆相似無頭面只發憎寒腫硬逐添如近心則熱燥吃食無味喉中不利霍亂憎寒無時是紫燕瘡證也治法如前紅絲瘡第三夫紅絲瘡者初生如牛眼睛相似苗兒如絲走徹不止及發熱憎寒身體沉重霍亂吐逆先服奪命丹追魂散半錢後用針當紅絲頭針破出血宜服四聖散以麝香散敷之魚臍瘡第四夫魚臍瘡者初生如覆盆相似內有紅筋頭破只出赤水涓涓不住不疼不痛此是魚臍瘡之證也紫燕瘡發背第五夫紫燕發背瘡者初生似大頭癤狀如白米大多發黑紫色破如蜂窠相似只發寒熱身體倦悶宜服前藥治之紫燕發發瘡第六此瘡生面上侵鬚髮際紫燕發須瘡第七此瘡多生口邊須里紫燕腦疽瘡第八此瘡多生頂上宜急救魚臍發背瘡第九此瘡多生背上硬腫內有紅絲魚臍發發瘡第十此瘡多生在發邊是魚睛瘡破之黃水出魚臍腦疽瘡第十一夫此瘡者多生於頂上宜救之以上六證並前項紫燕發背憎寒困悶身體昏亂吐吃無味宜服奪命丹追魂散急救之若遲透入臟腑難治誤人性命精疽瘡第十二夫此瘡者多生於男子婦人小便之處只發腫硬俗名下疳瘡遲治爛人皮肉宜用佛手散貼之頂疳瘡第十三夫此瘡者多生人發須用沒藥貼之背疳瘡第十四夫此瘡者多生人手足背上破時多出白膿水不止不赤不腫經年不可宜用如聖水沉膏貼之腦疳瘡第十五夫此瘡多生於胸脅左右不疼不痛破之白膿水出宜用水沉膏貼之腿疳瘡第十六夫此瘡多生腿上治法同前乳疳瘡第十七夫此瘡多生於男子婦人左右乳上下依前用藥以上六證苗硬成眼子黑色不可治如白色者用丸藥紝之上用水沉膏貼之骨疳瘡第十八夫此瘡者初生如指面大頂上有赤靨破後膿水不止宜服乳香散止痛丸子藥紝沒藥散貼之紫骨疳瘡第十九夫此瘡者初生苗破頭上瘡子汙徹向外出紫色膿水從里翻向外是證也宜服萬靈針頭丸里托用沒藥貼之白骨疳瘡第二十夫此瘡者初生形如紫骨疳瘡相似肉破也不同有如豬肺出赤水從里翻向外疼痛不止治之依前用藥紫金丹瘡第二十一夫此瘡者初生無頭腦不異色只發憎寒疼痛不止是紫金之證宜用萬靈針頭丸用乳香散貼之咽喉單乳蛾第二十二咽喉雙乳蛾第二十三咽喉癧瘡第二十四水癧瘡第二十五子母瘡第二十六乳癧瘡第二十七以上六證咽喉內瘡用針鉤搭開用奪命散吹入咽喉中從服白龍丸治之凡內外癧子瘡只可用藥里托外貼小便內取之乳疳瘡第二十八夫乳疳瘡者初生如苗乳下若指許腫硬汁成膿或乳頭上下膿水出不止宜服針頭丸上用水沉膏貼之三五次上觀紫燕瘡第二十九下觀紫燕瘡第三十論曰心蔽骨上下一寸二分為紫燕瘡三月以後毒氣入臟腑遍行四肢此是死證服奪命丹追魂散救之遲治則死也勿輕之上觀魚臍瘡第三十一下觀魚臍瘡第三十二論曰若心蔽骨上下一寸三分外屬魚臍之證三二日以前未破時服奪命丹救之必愈若破死證不可治紅絲膿沽瘡第三十三螻蛄瘡第三十四其瘡初發時苗破之只流赤水或白膿水不止膿到處破肉皆是螻蛄之證也用萬靈針頭丸相膿水盡紝上丸子藥上用麝香散貼之走馬牙疳瘡第三十五口疳瘡第三十六其瘡多生於人口上下齒根遲治即蝕透唇口上不可用惡瘡藥以三亭散貼之疔瘡第三十七其瘡俗言土虺瘡初生黑焦頭只發憎寒滿身拘急霍亂吐逆宜服奪命丹返魂散救之痔漏第三十八腸風瘡第三十九其瘡多生於男子婦人大腸頭在裡為腸風有㾦癗為痔若破膿出為漏此瘡因飲食太過坐臥於濕地上冷氣入內為患筋瘤瘡第四十其瘡多生於胸背上著骨腫硬不消疼痛不止宜服乳香散托之水沉膏貼之撮毒散掃之火焰丹瘡第四十一其瘡多生男子婦人手足赤腫熱痛走徹不止宜用撮毒散掃之鴉啖瘡第四十二其瘡多生於人曲文中苗硬如鴉嘴相似白色者可治黑色者不可治乃鴉啖之證用丸藥紝上後服萬靈針頭丸里托即愈咽喉魚臍瘡第四十三咽喉紫燕瘡第四十四其瘡多生於男子婦人咽喉中不可用瘡藥針刺破用吹喉散吹入喉中涎出為效用後白龍丸治之必愈魚臍瘡第四十五紫燕瘡第四十六疔瘡第四十七其三般瘡多生於男子婦人左右脅下此瘡如初生二三日苗不破者可治服奪命丹魚臍瘡第四十八紫燕瘡第四十九疔瘡第五十其三般瘡多生於右脅下初生三二日苗不破可治依前法用藥肉瘤瘡第五十一其瘡初生苗似腫癤破後肉色不同無黑色疼痛不止口出赤水有似筋膜內翻向外是肉瘤之證宜服乳香散定痛丸藥紝在瘡口後服萬靈針頭丸托裡甚效血瘤瘡第五十二其瘡初生腫硬如碗苗破紫黑色血出疼痛不止是其證也有此證者急用丸子藥紝之服乳香沒藥散定痛不止再以奪命丹救之紫靨瘡第五十三其瘡初生似疱瘻苗紫色腫硬不消破時徹吐血外不疼痛昏沉閤眼不開吃食無味如癡如醉是其證也宜服奪命丹次服追魂散更紝藥丸於瘡口內三日外服萬靈針頭丸托裡令不若醉人才可回也氣瘤瘡第五十四其瘡初生並無疼痛不異色苗未破可服萬靈針頭丸內托外用撮毒散掃之如破更用丸子藥紝在瘡口內其瘡自回膽次瘡第五十五其瘡初生形惡疼痛不止其苗破似鴉啖瘡成坑子常出紫黑膿水是此證也宜服乳香散次紝丸子藥後服萬靈針頭丸托裡用麝香散貼之髮乳瘡第五十六其瘡多生婦人乳上常言吹乳覺初發憎寒次發紅硬乃應本證未破用撮毒散掃之後用萬靈針頭丸內消治用沒藥膏貼之骨刺瘡第五十七其瘡初生著骨熱疼赤腫不消是其證也宜服乳香散定痛如人年少氣實者可服妙應犀角丸下瀉三兩行後用撮毒散掃之次服萬靈針頭丸里托之鶻刺瘡第五十八其瘡多生於人腳板底常言石隱瘡也宜服乳香散次服萬靈針頭丸如破用沒藥膏貼之泒癧瘡第五十九其瘡多生於男子婦人及小兒頂上只一個不可用惡瘡藥先於小腸內取過次用沒藥膏貼之腳踝瘡第六十其瘡多生於男子婦人腳踝上破後宜服萬靈針頭丸里托之乳香散貼之乳風瘡第六十一其瘡多生於人臂上左右兩股間癢痛不止宜用桃花散貼之不可次用動臟腑藥行三五次用一捻散貼之疳瘡第六十二其瘡多生於人耳內疼痛不止時流黃水是證也用萬靈針頭丸托裡後用綿條子去其膿血用筒兒吹桃花散於耳內三五次大有效黑斑𤵜瘡第六十三其瘡多生小兒身上有似倒陷黑疱宜煎蘇木湯下萬靈針頭丸發瘡托裡白瘤瘡第六十四其瘡多生於小兒手足上赤腫不消用撮毒散掃之效腎疳瘡第六十五其瘡蓋因不慎色欲生於男子婦人小便處用漿水洗淨用佛手散貼之赤瘤瘡第六十六其瘡多生於男子婦人腿膝上赤腫熱痛宜用撮毒散掃之麻根瘡第六十七其瘡多生於男子婦人手足瘙癢不止爪破疼痛宜用桃花散貼之血風瘡第六十八其瘡多生於男子婦人手足肋脅下紅紫腫硬走風不止是證也宜用桃花一捻金散貼之效紫靨花瘡第六十九其瘡多生於男子婦人頭面上用枯白礬水相調掃之立效血刺瘡第七十其瘡初發熱疼痛渾身拘急憎寒霍亂吐逆急用藥截次用奪命丹追魂散托裡得氣定後用乳香散定痛白粉瘡第七十一其瘡多生於男子婦人面上常言香瓣瘡屋漏水研枯礬淋洗香乳瘡第七十二其瘡生於男子婦人乳上桃花散或一捻金散貼之立效追魂丹治七十二證走徹惡瘡托裡南硼砂砒霜蓽澄茄輕粉硃砂粉霜另研芒硝以上各一錢蜈蚣一對飛廉一對水馬四十九個片腦一錢上研細末蟾汁為劑用竹刀子切如黃米大不得用手和每服一丸溫酒下忌食米湯葷腥魚膩冷物等萬靈針頭丸治七十二證走徹惡瘡乳香一錢麝香一字米腦一字犀角三錢砒霜一字夜遊將軍一個白芨半兩蟾汁一個玄黃色半兩寒食麵三錢上為末就濕研勻用孩兒乳汁和黃米大每服二三丸就溫酒送下小兒黑疱子煎蘇木湯送下忌白米粥小豆葷腥奪命丹治七十二證走徹惡瘡金頭蜈蚣一對麝香一錢輕粉一錢硃砂少許上為細末用蟾汁和劑不得用手和用竹刀子切成黃米大瓷碗內搖之成丸放乾用翎子筒盛之經年不變色吐逆噁心不拘時候每服三二丸溫酒下奪命追魂散治七十二證惡瘡毒入腸寒熱往來吐逆麝香一錢金頭蜈蚣一對炒乾黃色雄黃三錢濕生蟲四十五個新瓦焙乾焦上研細大人每服半錢小兒半字熱酒調下乳香散治七十二證惡瘡疼痛不可忍乳香二錢甘草一錢皂角針二錢為末上為末每服二錢用無灰酒一盞煎至三五沸和滓溫服身體風毒瘡附論夫風毒瘡者由內熱外虛為風濕所乘則生瘡也所以然者肺主氣候於皮毛脾主肌肉氣虛則膚腠開為風濕所乘內熱相搏故身體皆生瘡也方白花蛇方治風毒攻身體生瘡或時發癢腫痛白花蛇一條去皮骨海桐皮白芷防風去蘆頭獨活制羌活白朮附子去皮臍天南星半夏湯洗七次去滑前胡去蘆頭細辛乾蠍桂心漢椒去目木鱉子去殼當歸吳茱萸蒼朮各一兩上銼細以米醋二斤煎三兩沸和藥勻拌經一宿用臘月豬脂煉成者三斤苦參湯淋浴後以暖酒調下半匙外以膏塗在瘡上令熱為度日三遍服用苦參散治身體生風毒瘡或癢痛不止熏浴方治風毒攻身體生瘡或時發癢痛久不瘥黃櫨苦參細辛黃柏麻黃根半夏蒿本藜蘆去蘆頭吳茱萸枳殼狼牙桃枝連葉槐枝桑枝柳枝白礬各二兩上銼細和勻分為三分每度用一分以水五斗煎取三斗布濾去滓極熱入盆中於上坐熏令汗出後通手即淋浴冷即止以熱水拭乾避風澡浴方治遍身熱毒風瘡及疥癬瘙癢防風一兩去蘆頭白芷一兩細辛一兩苦參吳茱萸苦楝子藜蘆去蘆頭莽草麻黃根各一兩川椒半兩去目鹽二兩上細銼以水五斗煎取三斗去滓乘熱洗浴水冷為度余滓重煎如前法用治身體生風毒瘡膏藥白蠟一兩麻油五兩桑根白皮一兩銼黃耆一兩銼木鱉子仁一兩膩粉一分乳香一分研細胡粉一兩研細上先煎麻油後下桑白皮黃耆木鱉子煎令焦去滓後入白蠟候熔即離火次下膩粉胡粉乳香等以柳木篦攪令勻即膏成納瓷器中盛二三度塗之治風毒攻身體生瘡赤焮腫痛膩粉半兩洛粉半兩杏仁半兩湯浸去皮尖雙仁黃柏半兩銼黃丹半兩麝香一錢細研黃連半兩去須上為細末入麝香等研勻日二三上用油調塗之水銀膏治風毒身體生瘡水銀一兩以熟棗瓤和研令星盡松脂一兩硃砂一兩細研土蜂窠一兩黃柏一兩銼川大黃一兩上除水銀硃砂另為末以煉成豬脂二斤煎為膏放冷取水銀硃砂入膏中相和攪勻塗瘡上日二換之茅膽膏治身體生風毒瘡茅膽一兩茅針裡面肉是也梔子仁一兩苦參一兩銼黃蠟三兩清麻油半斤膩粉半斤上茅膽等三味為末先以油蠟慢火熬候蠟銷入前藥末並膩粉不住手攪勻瓷合盛每用少許塗瘡上日四五度清涼散治諸毒攻身體上瘡赤焮腫痛黃連去須檳榔枳殼去瓤黃芩貝母赤小豆炒熱各等分上為末先以蔥白煎湯洗瘡拭乾後用生油調塗一日三上之澡浴方治遍身熱毒風瘡及疥癬瘙癢茵芋石楠莽草蛇床子羊躑躅白礬各二兩上細銼分為五貼每度取一貼以水一斗煎至五升去滓乘暖洗浴日再用之破心散出聖惠方治身體風毒生瘡赤腫疼痛豉一合炒煙絕黃連一兩半去須赤小豆一合杏仁一兩湯浸去皮尖雙仁細研胡粉一兩上研為末入胡粉杏仁令勻以酥和塗之黃連散出聖惠方治身體生風毒瘡臭穢不可近黃連去須胡粉密陀僧白芷白蘞各半兩上為末先以鹽湯洗瘡後用生油調藥以羽毛傅之甚者日二上治身體生毒風瘡白鴿糞四兩燒為灰天麻一兩麻黃一兩去根節防風一兩去蘆頭上為細散每於食後溫酒調下一錢水銀膏治身體生風毒瘡治身體生風毒瘡赤爛頭出白膿汁方出聖惠方晚蠶砂三兩杏仁一兩湯浸去皮尖雙仁上相和於銚子內炒令杏仁焦黑為末旋取摻瘡上瘑瘡附論夫瘑瘡者初作亦如肥瘡喜著手足常相對生隨月生死痛癢折裂春夏秋冬隨瘥隨劇者是也瘑瘡疥癆之類由風熱濕毒客搏皮膚變化生蟲於皮肉之間手足尤甚赤根白頭相對並生狀如小豆或若茱萸子浸淫癢痛抓之汁出折裂成瘡此蓋脾肺壅滯風濕乘之與熱毒搏結聚而成治宜疏滌於內敷藥於外淋浴之類次第以治之凡瘑瘡積久不瘥者由膚腠虛則風濕之氣停滯蟲在肌肉之間則生長常癢痛故經久不瘥也方白花蛇散出聖惠方治熱毒風濕皮膚生瘑疥白花蛇一條去皮骨酒浸炙令微黃蜂房三兩微炙苦參四兩銼防風四兩去蘆頭丹參三兩梔子仁三兩薯蕷三兩秦艽三兩甘菊花二兩玄參三兩白蒺藜三兩微炒去刺獨活三兩案此方缺製法及服法樗雞膏出聖濟總錄治瘑瘡樗雞十二枚蜜蜂十三枚蚖青八枚去翅足炒蜈蚣二條長五寸者無以野葛二兩代之斑蝥六十枚去翅足藜蘆去蘆頭䕡茹鉛丹各一兩豬脂二斤附子炮製去皮臍二兩巴豆六十枚去皮上除鉛丹外銼碎先熬豬脂令沸下諸藥煎至半日濾去滓綿布絞過再煎下鉛丹以柳木篦攪令勻以瓷合盛取塗摩瘡上日三五上以瘥為度漏蘆散出聖惠方治風瘑熱疥腫漏蘆一兩羌活二兩川升麻一兩木通一兩炒枳殼二兩麩炒微黃去瓤赤芍藥一兩甘草一兩炙微赤銼川朴硝二兩防風二兩去蘆頭上搗篩為散每服三錢以水一中盞煎至六分去滓每於食後以溫服黃連膏出聖濟總錄治濕瘑積年不瘥瘡汁浸四畔好肉復變成瘡瘡色赤黑癢不可耐搔之血汁出者黃連去須黃柏去粗皮杏仁去皮尖蔓荊子胡粉水銀各一兩豬脂一斤豉心三合上除胡粉水銀豬脂外銼碎先熬脂令沸下諸藥煎候黃黑色漉出以綿布濾過入胡粉水銀攪令勻以瓷合盛取塗摩瘡上日三五度即瘥一方水銀內掌中唾研之然後攪胡粉等以塗瘡上仍取黃連末粉之候汁徹即易之雄黃膏出聖濟總錄治瘑瘡雄黃研黃連去須為末各一兩黃芩去黑心末松脂各二兩亂髮灰一分末豬脂六兩上先熬脂令沸下松脂煎令熔盡即下藥末以柳木篦攪令勻瓷合內盛取塗摩瘡上以瘥為度水銀膏出聖惠方治瘑疥癬瘡宜塗之水銀一兩白礬一兩蛇床子一兩黃連一兩去須䕡茹一兩上搗羅為末以臘月豬膏七合入水銀和研以水銀星盡膏成敷之神效一方無䕡茹楝子方出千金方治瘑疥癬瘡百療不瘥楝實一斤桃皮苦參地榆根各五兩上㕮咀以水一斗煮取五升稍溫洗之日一度螺殼散出聖惠方治瘑瘡伏龍肝膏塗摩方出聖濟總錄治瘑瘡伏龍肝一兩細研楮木白汁一合豬脂二兩小蒜去皮半兩細研上和調令勻取塗摩瘡上日三五度即瘥治瘑瘡方雄黃一兩黃芩二兩松脂二兩發灰如彈子丸大上以白膏與松脂合搗以敷瘡上汪文仲備急用黃連又方楮木白汁一合苦酒二合小蒜半合釜月下土一合上和如泥蜜調塗之干復塗之胡粉膏出聖濟總錄治瘑疥癬有蟲胡粉三兩研水銀二兩皂莢十挺以水浸絞濾取濃汁一升上先熬皂莢汁至五合下胡粉水銀以柳木篦攪令勻瓷合盛先以鹽湯洗瘡取塗摩瘡上日三五次即瘥水銀膏出聖濟總錄治瘑瘡及惡瘡水銀唾研入藥黃連去須為末胡粉研各一兩上和研勻以乳汁調如糊塗敷瘡上日三五次即瘥唾和之亦可又方出聖濟總錄治卒得瘑瘡常攻在兩腳亂髮燒灰頭垢各三分蝸牛殼二七枚燒灰上研為末以豬脂調塗敷瘡上日三五度即瘥又方出聖濟總錄吳茱萸洗培赤小豆屋塵各二兩上搗篩為末用豬脂調如糊先用鹽湯洗取塗瘡日三五度瘥又方出千金方治瘑瘡搗桃葉和鯉魚鮓糂封之亦可以鮓薄敷上治蠶瘑惡瘡等出本草以蠶蛹子研敷之沉香瀝塗敷方出聖惠方治瘑瘡燥濕沉香半斤劈如指許大松節半斤劈如指許大上以布袋盛於麻油中浸半食久濾出取一口瓷坩穿底作孔大如雞子以松葉一小把鋪安孔上取藥袋入坩中以白鹽覆之用泥固封令厚五分藥上以火燒坩下著碗一口盛取瀝流入碗中候火盡即取瀝塗敷瘡上日三五度以瘥為度韭塗敷方出千金方治瘑瘡生韭一把細切醋一升上和煎令韭爛細研更熬如糊取塗敷瘡上日三五度瘥一方用生韭一握切研暖酒五合浸良久布絞取汁塗揩瘡上治卒得惡瘑瘡常攻在兩腳方出聖濟總錄人屎燒灰二兩水銀半兩上用生油調塗敷瘡上三五度即瘥療瘑瘡但是腳腰以下名為瘑此皆有蟲食之蟲死即瘥此方立見驗出肘後方用醋泔澱一碗大麻子一盞白鹽炒研末一撮和掩瘡上瘡中有孔如針穴皆蟲食之也先溫泔洗淨拭乾敷一二度即瘥治干瘑濕瘑疥癬方出聖惠方取楝根生蔥白豬脂和搗塗之又方出千金方治瘑瘡炒臘月糖敷之良又方出千金方燒故履絲為末敷之又方出千金方燒松根取汁塗之又方出聖濟總錄治卒得瘑瘡常攻在兩腳以蜂蜜不拘多少細研入醋調塗敷瘡上日三五度即瘥又方出聖濟總錄生刺蛇取血塗敷瘡上日三五度即瘥又方出聖濟總錄治瘑及丹毒取苧根刺碎不拘多少爛搗令細入醋調塗敷瘡上日三五度即瘥一方搗根敷之不用醋荊瀝塗洗方出聖惠方治瘑瘡以荊條一把燒瀝汁塗敷瘡上日三五度即瘥躑躅花塗洗方出聖濟總錄治瘑瘡用躑躅花三斤以水五升於瓷瓶內浸半日濾去滓取洗瘡上日三兩度更炙鮓塗摩瘡上蟲當出即瘥治疣目耳瘑瘡及月蝕瘡繞耳根用烏雄雞膽日三塗之治卒得瘑瘡常對生在兩腳及諸惡瘡出肘後方塗白犬血立愈又方以皂莢十枚苦酒四升煮之去滓煎如飴以敷瘡上又方治瘑瘡及丹疹以新瓦一口安雞屎陳酒下著火煎之成膏塗之或水煮雞屎汁拭之佳治瘑瘡疥癬方出聖惠方用苦參末三兩以蜜調塗之野葛膏出聖濟總錄治久瘑瘡野葛黃連去須細辛去苗葉杏仁去皮尖莽草芍藥制藜蘆去苗頭附子去皮臍亂髮灰䕡茹芎藭白芷桂去粗皮藁本去苗土烏頭白朮吳茱萸洗焙乾雄黃研礬石研倭黃當歸各一兩斑蝥去翅足巴豆去皮蜀椒去目及合口黃柏去粗皮蛇床子各半兩豬脂三斤半上除雄黃礬石豬脂外銼碎先熬脂令沸下諸藥煎候白芷黃黑色漉出以綿布絞濾過即下雄黃礬石末以柳篦攪令勻瓷合盛每日三五度取摩塗瘡上即瘥五黃膏出聖濟總錄治久瘑瘡毒雄黃研黃連去須黃柏去粗皮黃芩雌黃研木香白芷各一兩亂髮如雞子許雞舌香半兩豬脂一斤半狼跋子四十枚上除豬脂外銼碎先熬脂令沸下諸藥亂髮煎盡漉出以綿布濾去滓瓷盒盛取塗摩患上日三五次即瘥外臺秘要用苦酒半斤漬諸藥一宿藜蘆膏出聖惠方治瘑瘡經年瘙癢引白膿久則有蟲生藜蘆去苗頭黃連去須苦參各一兩半雄黃研礬石洗過細研松脂各二兩研豬脂一斤上除雄黃松脂豬脂外銼搗羅為末先熬豬脂令沸下松脂熔盡即下諸藥末以柳篦攪令勻瓷合盛一切風瘡不問深淺經年不瘥成疽瘡肥汁出不生痂百藥療之不瘥悉主之痔疥瘡頭赤熱者起瘡便生白膿是也黃爛瘡者淺但出黃汁名肥瘡也浸淫者淺瘡搔之經年不止是也瘙瘡者初起如疥搔之轉甚瘡汁相連著者是也瘑瘡者初作亦如搔瘡喜著手足相對痛癢春夏秋冬隨著是也並取塗摩日三五上以瘥為度一方無黃連杏仁膏出聖濟總錄杏仁四十粒湯浸去皮尖雙仁黃連去須為末藜蘆去苗頭為末各一兩水銀一分豬脂十兩巴豆四十枚去皮心研上先熬豬脂令沸下諸藥以柳篦攪下水銀令勻以瓷盒盛先用鹽湯洗瘡去痂取塗摩瘡上日三五上以瘥為度丹砂膏出聖濟總錄治三十年瘑瘡及小兒干瘑濕瘑瘡壞爛丹砂研雄黃研雌黃研各一兩䕡茹三兩末亂髮灰半兩豬脂一十六兩上右面向東先熬豬脂令沸下諸藥末以柳篦攪令勻瓷盒盛用鹽湯洗瘡取塗摩瘡上日三五上即瘥乳香蠟油膏出直指方治瘑瘡久不瘥杏仁水浸去皮曬乳香各三錢硫黃輕粉各一錢半蠟半兩麻油一合上研極細先熬油沸入蠟熔盡次入諸藥煎攪成膏放地上冷出火毒瓷器收用又方出聖惠方治瘑癬瘡經年久不瘥硼砂一分細研大麻仁三兩搗爛鹽一分細研醋澱一大盞上都以醋澱和攪令勻先以溫漿水淨洗拭乾敷藥日二三上瘥有孔穴多蟲者效亂髮灰膏塗敷方出聖濟總錄治濕瘑積年不瘥四邊肉青起亂髮灰蛇蛻灰各一分豬脂一兩上細研二味以脂調如糊先用曲末一升石灰湯二升攪和令勻洗瘡了塗敷瘡上日三五度即瘥羊蹄散出千金方治久瘑疥濕瘡浸淫日廣癢不可堪搔之黃水出瘥後復發用羊蹄根去土細切熱熬以醋和熟搗淨洗瘡敷之一時間以冷水洗之日一度又陰乾作末癢時搔則汁出以粉之又以生蔥根揩之一方取根勿令婦人小兒雞犬見去土用白蜜相和搗敷瘡上干蝦蟆塗敷方出千金方治濕瘑用干蝦蟆一個燒灰細研為末以豬脂調塗敷瘡上日三五度即瘥胡燕窠塗敷方出聖惠方治濕瘑用燕窠取大者曾抱子窠羅為末先以漿水甘草鹽煎湯洗瘡了塗傅之日三五度即瘥若患惡刺以醋和糊塗裹定三兩日易刺出即瘥或以白芷大腹皮煎湯先洗之後摻窠末治燥瘑出千金方醋和灰塗之又方出本草熱牛屎塗之治卒得瘑瘡常對生兩腳出肘後方搗桃葉以苦酒和塗皮亦可用治熱毒風皮膚生瘑疥出聖惠方螺殼一兩爛煮亂髮半兩燒灰龍膽末半兩胡粉半兩上都研細末用油腳調塗之月蝕瘡附論夫月蝕多小兒有之蓋由嗜甘肥榮衛不清風熱毒熱之氣蘊蓄臟腑其瘡多生於兩耳及鼻面間並下部諸孔竅側侵蝕之甚則潰爛黃赤汁流達於筋骨月初則瘡盛月晦則瘡衰以其隨月盈虛故名月蝕或謂小兒以手指月而生未必然也方兔頭散出聖濟總錄治月蝕下部濕䘌臘月兔頭一枚燒過代赭一兩地黃葉灰半兩虎頭骨炙令黑赤色二兩貝子燒過七枚小蘇半兩五月五日蝦蟆自死者一枚燒灰上為散以綿裹如棗核大納下部中兼每日空心新汲井花涼水調下半錢以瘥為度胡粉散出直指方治月蝕瘡胡粉微炒黃白礬煅虢丹煅黃連淨輕粉各二錢胭脂一錢麝少許上為末先以漿水入鹽洗拭後摻藥如瘡干麻油調敷水銀膏出聖濟總錄治月蝕瘡多生在兩耳上及竅旁隨月盈虛水銀一分胡粉研黃連去須為末松脂各半兩豬脂四兩上先熬脂令沸下松脂諸藥末及水銀攪令勻瓷盆盛之先以鹽湯洗瘡塗敷日三五度甘草散出聖惠方治月蝕瘡甘草末青蛙自死者燒作灰母豬蹄甲燒作灰救月杖燒灰各一兩上搗羅研拌以蜜調塗敷瘡上日三五度一方無甘草膩粉散出聖惠方治月蝕瘡膩粉一兩黃連一兩去須搗為末胡粉一兩炒令微黃松脂一兩上都細研先以溫鹽漿水洗瘡令淨拭乾以散敷之如瘡干用生油調塗以瘥為度又方虎頭骨末豬脂各三兩浮萍屑一兩上和調如糊先用鹽湯洗瘡塗敷瘡上日三五度硫黃塗敷方出聖濟總錄治月蝕瘡息肉石硫黃細研䕡茹末各一兩斑蝥去足半兩細研上搗研和勻先用鹽湯洗瘡後塗敷瘡上如干者以豬脂調和塗敷日三五度半夏根散出聖濟總錄治月蝕濕蟲瘡䘌半夏根五月五日取一兩木瓜根烏頭各一兩上陰乾細銼搗羅為散每取棗核許大以綿裹納穀道中日二為度礬石塗敷方出聖惠方治月蝕瘡礬石研石硫黃研各半兩蝦蟆五月五日自死者一枚燒作灰上研細為末先以鹽湯洗瘡塗敷日三五上以瘥為度小兒耳後瘡亦用甚效茱萸湯治月蝕瘡息肉茱萸根地榆根薔薇根各一兩上細銼以水五升煎至二升半去滓溫洗瘡冷即止日三兩度洗之仍敷以他藥一方為末以鹽湯洗瘡敷之日三豉塗敷方出聖濟總錄治蝕瘡入鼻口及九竅孔並諸瘡豉蝦蟆五月五日取一枚自死者上將鹽豉不以多少填滿蝦蟆腹掛於屋北令乾燥以紫泥裹之貼釜鍋底下三炊久燒之取去泥搗細研為細末塗敷瘡上干即以豬脂和七月七日修合亦得日上三五上鼓皮醋出聖惠方治月蝕瘡鼓皮如手掌大醋二升上以醋浸皮經一宿取塗汁敷瘡上日三五度又去醋燒作灰脂和敷之亦用救月杖鼓皮甚佳酥粉塗敷方出聖濟總錄治月蝕瘡酥二兩胡粉一兩和研上調和如糊塗敷瘡上日三五度又方出聖濟總錄射干三兩甘草炙一兩上粗搗篩每服五錢用鹽水一盞半煎至八分濾去滓空心溫服午時晚間再煎服塗敷方出肘後方治猝得月蝕瘡蝦蟆一枚自死者兔屎月望夜取上破蝦蟆腹納兔屎滿合定於炭內燒過細研為末塗敷瘡上日三五度又方一名聖灰散治小兒月蝕瘡耳後耳下或鼻內生瘡是也出聖惠方地龍糞燒赤為末豬脂各三兩上調塗敷瘡上日三五次以瘥為度塗敷方治猝得月蝕瘡出聖惠方取羅摩草研絞取汁塗敷日三五度療大人小兒猝得月蝕瘡方出聖惠方取五月五日蝦蟆燒灰以豬膏和塗之瘥止又方取燭燃照瘡使燭熱氣相及瘡即愈又方出肘後方取虎頭骨二兩搗碎以豬脂一斤煎之以骨焦黃色去滓塗之為度治月蝕瘡陰瘡痿瘡出本草取鱁鯷魚燒灰敷之一名鰾生南海治月蝕瘡及月割耳出本草以救月杖燒為灰油和敷之治耳後月蝕瘡出本草取桂子研碎敷摩瘡上治月蝕瘡夫月蝕瘡者生於兩耳及鼻面間並下部諸孔竅側及至筋骨月初則瘡盛月末則瘡衰以隨月生因名之為月蝕瘡也又小兒耳下生瘡亦名月蝕世云小兒見月以手指之則病此瘡也其生諸竅中則有蟲矣久不瘥則變瘻矣上以地龍糞一合用豬脂和令勻塗之下注瘡附論夫足三陰之脈脾腎肝之三經也並起於足大小趾之內循足附內踝前臁膝脛中若風熱毒氣乘之則榮衛凝澀嵇留不行氣脈下注於腳膝間故令皮膚腫硬結核成瘡膿水不絕綿歷歲年愈而復發以毒氣自上而下如水之注故名下注瘡此瘡生於腳胻名下注瘡俗謂之褲口瘡或因物打撲而成者其瘡口狹皮膚極闊皮薄如竹膜極癢痛終日黃水流出延蔓而生甚者數年不愈又易於傳過他人患此者須忌房室則易愈方治臁瘡方鼠糞杉樹刺雞子殼苦參桃枝柳枝五條松枝麩漿皂角雀糞松明不拘多少芍藥干木棉子芝麻桑枝蛇殼鍋底煤杜仲當歸上各四錢俱曬乾將松明捶碎掘地一孔納碗一口用破箕片擱上如做松瀝制度候火盡揭起即將汁敷瘡上自然痊疴忌酒面一應發氣熱毒物隔臁膏出經驗良方治內臁及外臁瘡當歸白芷五倍子黃連雄黃各半兩乳香三錢末沒藥海螵蛸血竭黃柏白蘞白芨厚朴各半兩黃丹六錢輕粉木合三盠上為細末和乳香輕粉清油調成膏用油單貼藥敷瘡上綿帛縛定了有膿水出解開刮去不潔再貼藥如此數次即愈須先用鹽湯洗淨片帛拭乾待片時水氣干然後貼藥熨洗蒴藋湯出聖惠方治腳瘡久傷風毒攻衝腫焮膿水不止蒴藋一兩藜蘆一兩去苗頭鬱金一兩苦參一兩白芷一兩水葒一兩甘草一兩生用桑根白皮一兩柳枝去葉細銼五合苦楝子細銼二合藁本半兩枳殼半兩鹽末二兩上細銼以水二斗煎取一斗五升濾去滓用軟帛兩事替換承蘸搵熨洗患處水冷為度余滓煎用如聖丸出聖濟總錄治腳膝下注生瘡熱腫痛草烏頭去皮大銼油煎令焦楓香脂研赤小豆躑躅花地龍去土用火燒地赤色將醋洗過放地龍在上用碗蓋一時許取用威靈仙仙靈脾蒺藜子炒去刺乾蠍去土炒白殭蠶瓦上炒天南星炮防風去蘆各半兩上搗研為末醋煮麵糊和丸如綠豆大每服十丸至十五丸空心溫酒送下淋浴海桐皮出聖惠方治風毒流注兩腳生瘡腫爛疼痛行履不得海桐皮地骨皮黃耆甘草生用黃連去須枳殼炙木香乳香狼牙白芷牛膝去苗白礬各一兩上銼散令勻分為六貼每取一貼以水四升煎至三升去滓熱熏之瘡上通手淋洗以熱衣拭乾避風淋蝶莽草湯出聖惠方治腳上生瘡莽草榆白皮甘草生用玄參苦參鬱金羌活獨活五加皮防風去蘆頭枳殼細辛各五兩上細銼分為十貼每貼用漿水一斗五升煎取一斗別入白礬末二兩投藥湯內及淋蝶日用之牛黃金虎丹出危氏方治足面生瘡下連大指上延外踝臁骨每發兼旬昏暮癢甚爬搔出血如泉痛楚不可忍夜分漸已明日復然天雄炮去皮臍一兩白礬枯煅天南星湯洗天竺黃研膩粉研各二兩一錢牛黃研二錢雄黃研飛十二兩半生龍腦四錢金箔六十五片為衣上為末煉蜜搜和每一兩半作十丸金箔為衣每服一丸新汲水下之臟腑有所下即愈黃耆丸出聖濟總錄治腎臟風虛下注腰腳生瘡行步艱難筋脈拘攣不得屈伸腰骽冷痛者黃耆銼蘹香炒烏頭炮製去皮臍楝實去皮防風去蘆蒺藜子炒去角赤小豆地龍去土炒烏藥各等分上為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下或鹽湯亦得婦人醋湯下空心日午服治臁瘡方出直指方雄黃雌黃硫黃白礬煅各二錢厚黃柏鷹爪黃連去須各二兩輕粉半錢虢丹煅二錢上為細末外先以荊芥蔥頭入鹽少許煎湯洗拭乾又用麻油一酒盞煎巴豆肉二錢濾清筆蘸抹藥末摻上甚妙勝金散出聖濟總錄治下注並惡瘡多年不效者黃連一兩半半炒半生用鬱金生用半兩天南星一枚紫鉤藤白蘞白芨各一分膩粉少許上搗研為散每用時先濃煎蔥椒湯淋洗去瘡皮拭乾次以清唾調藥散敷或用紙花子蓋之亦得如瘡濕即乾摻治男子婦人臁瘡下藥不效者乳香末黃連末黃柏皮末薄荷末黃蜀葵花頭四十九個焙乾為末黃刺魚一個煅為末連須蔥頭七個焙乾為末上末和勻先取蟬殼蜂窩防風煎湯洗瘡口如瘡濕乾摻若瘡上扎定防備清水出三日內生肉覺癢甚突出內外卒不落須待其干用酥油塗四邊十餘日其痂落下內皆生肉永除其根黃蠟膏出德生堂方治臁瘡槐條椿皮桃條楝條柳條荊芥上熬湯無時湯洗拭乾用黃蠟於紙上攤膏一十個將十層都拴於瘡上日三次洗瘡除去著瘡蠟紙一個不候一月即愈無問年深日近累曾依方醫治得效驗治臁瘡久不愈出經驗良方干豬糞半兩燒存性乳香一錢檳榔半兩龍骨二錢輕粉少許沒藥一錢上為細末先以燒鹽湯洗瘡軟熱絹帛拭乾清油調敷濕干塗蘭香散出聖濟總錄治一切風毒惡瘡及下注瘡或痛或癢白蘭花香葉陰乾百合黃柏蜜炙銼黃蜀葵花焙胡粉研各一兩上搗研為散以醋調塗瘡上如有汁即干敷黃白散出聖濟總錄治下注生瘡黃柏蜜炙白堊蕪荑併為末各一分膩粉研二錢杏仁去皮尖雙仁研膏七枚上再同研勻先以鹽漿水洗候乾以藥散敷之鯽魚散出聖濟總錄治下注瘡鯽魚去肚腸一枚黃連去須半兩鉛丹密陀僧碎胡粉研各一錢上將前三味入鯽魚肚內卻纏合固濟了燒通紅取出候冷同粉研為細末用豬膽汁調敷瘡上治遠年近日臁瘡黃丹飛輕粉密陀僧麝香少許龍骨上各等分為細末用漿水洗淨瘡口干貼之治臁瘡方明礬白松香四兩百草霜二兩黃丹五錢輕粉半分上為細末於瘡上貼治臁瘡溜氣瘡黃丹火飛過定粉松香揀淨白礬火飛過硫黃少許上將香油熬滾下黃丹松香再滾下余藥又一滾攪勻成膏攤白厚紙上貼瘡以輕絹扎縛一日一換瘡口平不須換只用舊膏藥香油潤之枳殼丸枳殼去瓤麩炒三兩生乾地黃焙防風去蘆五加皮銼各二兩黃耆銼三兩羌活去蘆頭一兩上為末煉蜜和丸如梧桐子大每服二十丸加至三十丸早晚食前酒溫下治臁瘡下注五倍子二兩燒存性黃丹三錢飛過白礬一兩枯龍骨半兩雄黃少許白石脂半兩上為細末先將蔥鹽湯洗瘡見赤肉然後將前藥敷在瘡上用藥如法厚者卻用帛子包縛著不要動直候乾自脫去瘡皮臁瘡膏羌活二兩獨活二兩當歸二兩黃丹二兩龍骨二兩輕粉三錢上為末和勻用香油調用厚油紙攤藥在內油紙夾著貼瘡上治臁瘡敗船灰輕粉白芨獐腦黃丹等分上用香油調成膏攤在油紙袋內先煎溫蔥湯洗淨以帛扎住藥在瘡上用了一面翻轉如前用一方無輕粉若得糞船灰妙又方無輕粉白芨桐油調治臁瘡方直指方木香檳榔五倍子白芷貝母各等分上為細末先以桑葉白芷煎湯洗拭乾後以藥末摻上良神效方治下注瘡累年不已去息肉生好肉排膿止痛治臁瘡方出德生堂老瀝青淨一兩黃蠟五錢雄黃四錢另研乳香三錢另研輕粉一錢上先將瀝青化開卻下黃蠟重煎綿布濾過卻下乳香雄黃輕粉三味柳條攪勻得所成膏藥用稀絹一層攤藥在上再以絹帛在膏藥上夾定拴在瘡上三二日換一次三換可愈治臁瘡方出百一選方詹武子年三十歲時曾患此用之即安後屢有效黃柏白芨白蘞黃丹另研上等分研為極細末入黃丹拌勻入輕粉多少隨意以蜜和如藥劑勿令稀薄捏成餅貼瘡上深者填滿以帛片包紮一日一易後來瘡干漸好或有裂處只須乾摻以瘥為度檳榔散出危氏方治臁瘡方全蠍七個斑蝥十四個檳榔一個巴豆十四個上先用清油一兩半慢火煎先入全蠍次斑蝥次巴豆隨下檳榔巴豆黑色方入黃蠟一兩候熔去滓不用只用蠟油入後藥硫黃研生者黃丹火飛過螵蛸各一錢黃柏皮炙蛇床子研各一錢雄黃研白膠香黃連杏仁輕粉清油膠香用油洗溶上為末同入清油調敷瘡上立效治下注生瘡方出聖濟總錄白礬燒枯二分黃連去須半兩膩粉一錢烏雞子取白一枚上將前三味搗研為末以雞子白調塗如有膿即用鹽蔥湯洗後用藥驢蹄散出聖濟總錄治腎臟風毒下注生瘡驢蹄二十片燒灰密陀僧研一分輕粉一錢麝香少許上再同研勻先拭去膿汁次用藥乾摻日三四次瘥檳榔散一名檳榔膏出危氏方治裡外臁瘡遠年不瘥亦治打撲腳脛上成瘡此最難愈檳榔銼半兩干豬糞半兩燒存性龍骨一分膩粉二錢上搗羅三味入膩粉研勻先以鹽湯洗瘡熟絹搵干以生油調藥如膏貼瘡三日一易三五易定瘥忌無鱗魚鮓熱面凡脛內外瘡世謂裡外臁瘡最難得瘥此方神妙一方甘草鹽湯淨洗瘡口治多年不效者乳香灰人骨灰輕粉淡菜等分上為細末先將槐柳條煎湯洗瘡淨用藥搽貼之治臁瘡方苦麻根疥肚蝦蟆江石千轉蜣螂球上各等分為末敷之翠玉膏出濟生拔粹治臁瘡瀝青一兩黃蠟二錢銅綠二錢沒藥一錢上將銅綠為細末入油調勻將瀝蠟火上溶開下銅綠攪勻入沒藥勻傾在河水盆內拌勻油紙裹口旋捻餅子貼瘡紙封三日一易治足瘡方出百一選方用牛黃金虎丹半粒服之趙子固母劉氏年紀八十左右足面一瘡下連大指上延外踝以至臁骨每歲輒數發發必兼旬累月昏暮癢甚爬搔移時出血如泉流呻吟痛殆不可忍夜分即漸已明日復然每一更藥則瘡轉大而劇百試不驗如是二十餘年康熙甲辰仲冬之末先生為太府丞一日母病大作相對悲泣無計困極就睡夢見四神明之僧默座一室之內傍有一長几子固母倚坐因而發嘆一僧問其故子固答之以實僧云可服牛黃金虎丹又一僧云硃砂一服亦好既覺驚異試取藥半粒強服之良久大痛舉家大悔既而下礧磈物如鐵石者數事是夕瘡但微癢不痛而無血數日成痂自此遂愈硃砂之說竟不復試先生因圖僧像如所夢者而記其事金虎丹出和劑局方治中風痰涎壅塞所用牛黃龍腦膩粉金箔之類皆非老人所宜今反取奇效意為熱積臟腑而發於皮膚歲久根深未易洗滌故假涼劑以攻之不以常瘡論也神僧之夢蓋孝感云治臁瘡方松香多沒藥黃丹乳香少上細末將蔥涎調攤在黑紙油單上用箬扎一孔針線縫之先用蔥椒湯洗用豬肉貼瘡如水並蟲出貼之治臁瘡方川柏一兩赤石脂三錢各研勻末黃丹一錢石頭紫色上末用真油調裡外以油單紙貼以針刺孔貼瘡口三日換轉貼如孔深者用川黃連三錢龍骨錢半各研為末先用荊芥苦參湯洗將此三味摻入藥再加輕粉七分萬靈膏治臁瘡芝麻油二兩黃蠟二兩乳香龍骨上將乳香龍骨為末先將油煎過次下二味攪勻冷攤油紙上貼之治臁瘡方樟腦一錢船灰細末黃丹百草霜各二錢上用油紙溫水洗去油干入藥用香油調包隔紙貼於瘡口上一二日翻換治臁瘡方出德生堂之方黃連黃柏密陀僧輕粉各等分碾末上用黃蠟化開和藥一處敷貼瘡上紙花蓋仍先洗淨麒麟竭散出聖惠方治腳上生瘡疼痛傷於風毒膿水不止生肌麒麟竭一分訶梨勒一錢黃連一分去須檳榔一枚上為末看瘡眼大小薄敷瘡上以瘥為度治血註腳桑桂菇牛屎菇又名石灰菇生地上如白石成塊者碎其中有灰起肥株桂菇胎髮男用男女用女用三個上用三菇焙乾各五錢重胎髮燒灰存性併為末和前藥濕則搽干清麻油塗治臁瘡腳肚上細瘡水流不止延蔓漸大出仁存方豬毛燒灰雄黃蠮螉窠上等分為末麻油調敷治臁瘡方出直指方中鯽魚二尾洗淨穿山甲炙黑入皂角末二錢滿尺皂角一條擘開兩片夾鯽魚麻扎煨乾燒存性上為細末以井水洗盡膿汁用白竹葉一葉針插多孔縛於瘡上候水出盡然後以麻油輕粉調藥敷瘡上羌活丸出聖濟總錄治腳膝生瘡風毒下注羌活去苗頭天麻各二兩白花蛇寸截漿水煮熟去皮骨再用酒浸一宿安柳杖子上慢火炙乾用四兩上為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下空心日午臨臥服蚓泥散出聖濟總錄治下注瘡韭菜地蚯蚓燒過赤一兩膩粉一分麝香半錢上各研為散再同和勻每用先煎蔥湯洗了將藥干敷治臁瘡方冬青葉臘豬膽百草霜二味和勻上取冬青葉與本人嚼爛先用蔥椒湯洗淨瘡口以膽霜敷後卻敷嚼藥在上三四次可奇妙梔子散治遠年日久內外臁瘡山梔子不拘多少火燒成灰篩羅為細末輕粉少許乳香各半錢上再研為末相和用瓷器盛貯每用時先將蔥白花椒煎湯洗瘡稍歇再溫漿水又洗一次候惡水去盡再將白水煎百沸候溫再洗但瘡口膿水血絲清水各盡又用粉帛拭乾然後敷之如干者香油調敷濕者乾摻但惡瘡口滿實軟絹帛護之中硬不作膿者未可用如腫軟有膿者依前法再洗敷貼之三兩次即愈乃一藥二洗之功也地榆散出御藥院方治足脛熱毒腫滿按之不起地榆荊芥蒴藋苦參各等分上研末每藥二兩水三大碗煎三五沸去滓避風熱洗患處冷再溫治臁瘡方象骨一兩斑蝥五錢砒霜五錢上各火煉砂碾成末用香油調將油單紙縫成袋子裝藥在內封殺袋口用齏水洗淨榜於瘡上兩日翻轉再貼每四日一換治臁瘡方出德生堂龍骨煅輕粉黃丹炒各三錢上為細末先用蔥椒漿水溫洗洗盡後用絹帛揩乾卻將藥末填入瘡口內令滿以生薑切薄片貼封瘡口次用厚紙隨瘡大小裹之絹帛拴住一服而愈治累年腳瘡方出聖惠方蔓荊花三分三月三日採曬乾赤小豆三分黃連一兩去須上為末敷瘡上日三用之治腳瘡方出聖惠方龍骨二兩枇杷葉五兩蜣螂五枚燒灰上同麝香少許膩粉一分相和細研勻摻瘡上不過三五上治臁瘡方出百一選方干胭脂輕粉少許上研極細先以溫水洗瘡片帛裛干然後用藥深者填滿以瘥為度治臁瘡方出德生堂輕粉一錢黃連末二錢上用豬膽一個針刺七孔滴膽汁於藥內調成稠糊用竹片攤滿瘡口上用白紙數層蓋藥以青絹繫緊拴住過了十日再換藥如法緊拴住解下時瘡痂隨紙脫矣一方先用蔥白及槐條水洗之後用藥得效臁瘡藥黃連三錢明礬三錢上㕮咀用水一碗煎至一停入冬青葉四十九個浸於藥水內每用一葉光面著瘡口上貼之外用軟紗帛縛定頻換仍用藥水搭濕甚有效豆連散出聖濟總錄治下注瘡赤小豆黃連去須等分上為散先用溫漿水洗令淨用藥散同豬膽汁調塗之一日三換之也火府丹出聖濟總錄治下注腳瘡甘遂肥實連珠者一兩薄切練布袋盛之芎藭一分銼如豆上以大紙籠罩香爐令至密不漏煙頂留一竅垂甘遂囊下燒芎藭一塊令煙燻甘遂欲過更燃以芎藭盡為度取甘遂搗末三十歲以上氣盛者每服三錢氣虛者二錢羯羊腎一對劈開勻分藥末在內淨麻纏定炭灰炙過臨臥爛嚼溫酒下隨人酒量能飲一斗者可飲五升以高物支起雙腳一服即瘥治痛癢方舶上硫黃雄黃各等分上為細末用柏油黃蠟約量化開一處相和作膏子搭之治臁瘡方牽牛芝麻上詩曰牽牛一合三處分一次下鍋逐次增芝麻一合也須炒搗爛成膏始方好箬葉煮熟來包敷製作照依瘡大小不問遠年近日生旦夕之間見分曉先用蔥椒湯洗盡瘡口貼之痊愈早治臁瘡方輕粉三錢官粉七錢上為細末以溫漿水洗瘡後用敷之以生薑一斤蓋合用紙封定遠年不過三敷近年一敷即效治臁瘡方出德生堂五倍子五錢輕粉二錢上為末小油調塗仍先洗淨以五倍子燒灰尤妙治腳瘡方出聖惠方蜣螂三枚燒灰豉三兩密陀僧一兩上相和研如糊貼之治腳瘡方出聖惠方𦸈藪一枚豉三兩上分為兩處一半燒為灰一半為末相和研令勻用臘月豬脂調塗荷葉藁本湯治腳脛生瘡浸淫腿膝膿汁淋漓熱痹痛癢乾荷葉四錢藁本一分上為散以水二斗煎減五升去滓溫暖得所淋渫仍服前大黃左經湯佳治臁瘡久不愈者以川烏頭黃柏各等分為末用唾津調塗紙上貼之治腳肚上細瘡初則如粟漸大爬搔不已成片包腳相交黃水流出癢不可忍久成痼疾最難愈者出仁存方用百藥煎研極細唾津調敷自外而入先以貫眾煎湯淋洗卻用藥治臁瘡方用鱔魚數條黃色者尤好打死先用油塗其腹置瘡上盤屈令遍帛子系定食頃覺瘡痛不可忍然後取鱔魚看腹有無針眼大竅子皆蟲也如未盡再以數條依上再縛蟲去盡卻用死人脛骨燒灰麻油調敷瘡上或以骨灰一兩入好茶末此日用二錢同藥調亦可治臁瘡方用大柏皮黃連蜜炙焦黃等分為末干敷或蜜調敷治臁瘡方用大柏皮蜜炙霜葉等分為末干油調敷之或用蜜調敷亦可治臁瘡成膿累月不幹用上等好砂糖先以鹽湯淋洗綿帛拭乾用津唾塗卻以此敷上三日愈神效治外臁腳瘡用累經燒過窯灶黃土研極細入黃柏赤石脂黃丹輕粉拌勻以清油調稀用油絹盛藥敷瘡上以布絹縛定藥縱癢不可以手開動直候十數日後瘡愈去之一方無黃丹治臁瘡方用血竭一味為細末摻在瘡上以干為度治臁瘡方用地骨皮去粗皮用竹刀刮粉焙乾為細末貼之治臁瘡方用隔年駐車丸碾末敷之極妙如無新者亦可治臁瘡方治內外臁瘡及諸般惡瘡一名三羊散用羊糞不相黏者燒灰存性為末敷之入輕粉尤佳一方用瓶一個入糞在內鹽泥封固燒存性研為末入膩粉先用溫水淨洗去瘡皮搵干用糞末一匙粉一匙拌勻摻瘡上尤佳治臁瘡方陳仲山司丞家有一老奶婆九十餘歲每以此藥治人無不效者用左腳上舊草鞋名千里馬不得犯手以棒挑取於水內遍洗淨晾乾燒黑灰研為末入輕粉少許先以鹽漿水洗耳恭聽瘡搵干然後敷之乾者生油調濕者乾摻便成痂甚妙或云端午日以左手提右腳舊草鞋燒兼用治軟癤郭醫其子也親曾得效治臁瘡方出百一選方用冬瓜葉焙乾碾為末摻敷或只用青葉包裹瘡上亦得雖瘡痛不妨甚者亦不過三兩次即效治內外臁瘡方出百一選方用六一泥是薤地中蚯蚓糞新瓦上火煅通赤地上出火毒為細末入輕粉少許先以溫齏洗淨搵干清油調塗一云用犬血敷亦可危氏方瘡生腳入胻名下注瘡俗謂之褲口瘡或因物打撲而傷損者其口狹其肉極闊皮薄如竹膜極癢痛終日黃水流延蔓而生甚者數年不愈又易於染過他人患此者忌房室則易愈治貼腿上瘡出百一選方用滑石末塗之治腿膝生瘡有膿者出百一選方用五倍子細碾摻之苦參散出聖濟總錄治下注熱毒瘡苦參白花蛇酒浸去皮骨炙蒺藜子炒去角白芷各一兩上為散每服一錢半加至二錢半溫酒調又方亦治臁瘡出瑞竹堂方用好粉油調在碗里取艾燒煙燻黃色敷瘡上效治臁瘡方出百一選方取煮酒瓶頭泥田中黑者為上山上者不可用於火中燒通紅放冷出火毒研令極細麻油調成膏子再用包煮酒瓶頭蒻葉量瘡口小大一樣剪兩片將一片於蒻葉上攤藥膏子再將一片合之以蒻葉光面安在瘡上用帛子扎定不可令藥著好肉恐反侵損敷藥了痛即止惡水出三兩日一換不過一兩敷即生石榴肉若能忌口愛護遂絕根本一云不須燒土但研末亦佳馮安時說陳仲山云此法甚妙常以醫數人矣治臁瘡方出經驗良方先用薄鐵器盛鹽一撮火上焙過熱湯浸起澄清溫洗瘡淨拭令乾用藥乾摻瘡上用大馬蜂空窠煅為末清油調塗治臁瘡方出經驗良方用多年水中艌船油石灰為末摻之即安治臁瘡方出經驗良方用雞肫黃皮焙乾為末清油調塗治臁瘡方用陰地上青苔草焙乾為末清油調塗狗脊膏出經驗良方治臁瘡用商草黑狗脊生用各一兩為末口含漿水洗之口嚼杏仁調藥攤瘡上紙貼絹帛固之五七日一換癢痛不可動直至連換三次可效治臁瘡方出經驗良方先用齏汁煎湯淨洗拭乾用蔥涎調真輕粉敷上夏月取荷花片陰乾隨瘡口大小剪蓋之以帛扎定令有些水膿以指拭從側畔出忌毒食不半月可除根無齏汁用水四碗煎沸入醋半盞竹葉膏出直指方治兩腳骨臁瘡用小網蝦三十枚去頭殼尾以糯米飯一合研細臨臥以帛扎患處上下以青紗罩瘡將蝦飯敷青紗上別用青紗罩蝦飯之上系定至五更初解紗連蝦揭起掛空閒處皆是小赤蟲即以漢椒蔥白煎湯候溫淋洗次用舊茶籠內白竹葉隨瘡大小剪貼軟帛系之一日兩換直待汗水出盡方以好膏藥貼逐日煎苦楝根湯淋洗仍換膏藥直待生肉將滿則不用膏藥其瘡口只如箸尾許可以血竭或真降香節夾白蘞收平瘡口切忌動風下氣等件治臁瘡方以豬蹄下甲燒灰敷之良治臁瘡方出直指方先用酸漿水溫暖淋洗次用生覆盆子葉瓦上煅干碾極細乾摻紗扎次日以新水濕去痂又用溫漿水洗拭摻藥良粉麝散出危氏方治外臁瘡臭爛數十年不愈者用生龜一個烏者打死去肉取殼酸醋一碗炙醋盡為度仍煅令白煙盡存性用碗蓋地上出火毒為末入輕粉麝香拌勻臨用先以蔥水洗干方用藥摻上治腳脛骨上作瘡久爛黑或發孔或臭穢不可近出危氏方用蚰蜒十數條小竹篾穿定瓦上焙乾為末真清油調敷登時取效隔壁膏出危氏方治臁瘡用多年老杉木節燒灰真清油調蒻葉盛隔貼在瘡上以絹帛系定不數貼而愈洗藥出朱氏集驗方用海桐皮石榴皮等分煎湯淋洗令淨然後用熏藥熏藥出朱氏集驗方用牛蒡子半兩研為末入紙捻子內燒熏之然後塗藥治冷臁瘡方出危氏方用鹿角灰發灰乳香為末清油調敷有一種臁瘡赤腫而痛用黃連黃柏之類皆涼藥也久而不愈其瘡冷矣卻用溫藥治之當愈此陰陽寒熱往來之理也治足上生瘡臭穢潰爛出危氏方用漏藍子一枚燒為末入膩粉少許井水調塗效必效散出聖濟總錄治下注瘡爛肉陷用鯽魚一條去腸入頭髮不拘多少燒灰碾散先用蔥湯洗瘡口次以藥敷之蒜灰散出聖濟總錄治諸惡瘡下注氣血冷新肉不生用蒜一百顆去根苗切以鐵鍋內露地燒令通熱扇去灰入蒜在內用一淨盆蓋之周圍以淨土護不令透風經一宿取出扇去灰土搗研令極細不拘多少干敷瘡上此治冷惡瘡最妙熱毒惡瘡不可敷令肉轉爛故也豆粉散出聖濟總錄治下注腳膝生瘡不可垂腳腫用綠豆粉石器內炒黃濕地上出火毒研細先以溫水洗瘡干敷甚者再敷即愈治臁瘡下注用橡斗不以多少於橡斗內各滿裝鹽兩碗相合用麻線縛住用瓦罐盛貯用鹽泥固濟炭火內燒過碾為細末入烏龍尾不以多少合和用淡漿水洗過瘡將好清油調搽忌動風之物仍入麝香少許瘡有膿干貼然後用江茶清油調成膏子於前藥上面如膏藥相似貼護用新綿子包裹敷藥大有神驗臁瘡頭黑四畔紫者有蟲瘡頭白者無蟲有蟲者用覆盆子為末撒在餅上然後搭在瘡上取出蟲為驗治臁瘡方用訶子不以多少燒灰為末香油調搽治臁瘡方用絲瓜包雞子不以多少燒灰為末貼之治臁瘡方以五月五日收苧葉曬乾貼瘡有效治臁瘡方用隔年蔥白煨熱搗為膏捻成餅子炙熟先用童便洗淨卻以蔥餅熱貼之冷再易追惡水後用貼過餅子童便洗淨新瓦焙乾為末摻之妙治臁瘡方以冬青葉用鹽滴水浸留久不妨臨用時取出清水洗淨去鹹味瘡上貼之一日一易待紅水出不可遽輟治臁瘡方以蔥漿水洗淨帛淹去膿囊厚貼輕粉了用蝸牛不以多少搗爛作膏藥貼定瘡可自落治內外臁瘡方取瘡內蟲子取杏仁細嚼貼在瘡上用枯白礬末摻在杏仁上病人便臥少時瘡有蟲子出如頭髮絲取了用藥斂之治毒氣攻注足脛久瘡不瘥用白朮為細末鹽漿水洗瘡干貼一二日一換佳治腳痛成瘡先銼水蓼煮湯令溫熱得所頻頻淋洗候瘡干自安治腳上生惡瘡調之下注用鹿角燒灰為細末輕粉油調塗瘡上治內外臁瘡用北棗核燒灰干敷之治臁瘡用爐甘石散二分重加煅過枯明礬一分五靈脂半分為末先用溫水於瘡上洗淨後用藥末於四周遠遠摻上用手指輕勻開次日再用手輕輕拭出膿水再用水濕瘡加藥摻自可治臁瘡膏以百草霜不拘多少黃蠟一小塊熔開勻成餅先以醋水洗淨貼上以片帛裹之一方用蠟燭油治內外臁瘡以牛蹄退下甲燒灰酒調敷上良治臁瘡用白膠香黃蠟香油熬成膏滴水中凝為度作成餅貼患處若多年者以豬脂滴水在瘡上治臁瘡用刺杉桂皮浸在廁中年久撈起曬乾為細末摻上治臁瘡用楮樹葉於未霜時收夾於書壓干剪去邊先用蔥湯洗瘡挹干用葉貼之紗帛扎定遇癢再洗如前貼治臁瘡先用蔥白漿水熬湯洗淨瘡口絹帛掩干徐以輕粉末摻瘡口上用五靈脂黃柏各等分碾為細末涼水調貼敷瘡上紙蓋三五十上即平復治臁瘡方先用扁柏枝或牆上舊稻草煎湯溫洗瘡拭乾然後用蓖麻子去殼研細為膏入好明淨松香一處入些少桐油看稀稠研搗為泥又入黃丹和勻攤藥於油紙包隔油紙貼在瘡上貼數日再換藥貼之即愈看瘡大小用藥治腳疼痛不瘥方出聖惠方取多年牆壁上爛干蜆殼泥裹燒過為末敷之應效三聖散花蕊石散復元通氣散追風獨活散上各一貼合和藥調空心服治下注瘡用皂莢燒存性油調塗皇散出衛生家寶治臁瘡腳瘡插芹大蚌蛤殼薄者不拘個數燒為灰細研末篩過上每看瘡大小用施入輕粉拌和瘡濕乾摻上瘡干津唾調塗不可近水治臁瘡累年不效出傳信適用方鯽魚一條用麻油煎魚熟為度去魚只留油調藥穿魚不拘多少鹽泥固濟候火煅存性為末輕粉麝香少許研勻先以鹽湯洗瘡卻用前件油調藥塗之荊芥湯出楊氏家藏方治臁瘡地骨皮三兩何首烏三兩荊芥穗苦參海桐皮各二兩草烏頭一兩上㕮咀生絹袋盛用水三升煎數沸盛在盆內乘熱熏瘡口通手淋洗挹干以後四蛻散貼之四蛻散出楊氏家藏方敷臁瘡烏雞子殼已抱出雞兒者蛇蛻各半兩燒灰烏頭魚骨去硬皮一兩龍骨一分上為細末每用入膩粉少許濕即乾摻干即油調敷之木香散出楊氏家藏方治下臟風毒攻注臁上生瘡浸潰不止瘡口不斂肌肉不生黃連密陀僧檳榔各等分上為細末每用少許摻瘡口如膿干以津唾調敷之如臁瘡先以溫鹽湯洗後用陳箬葉貼又宜木香貝母五倍子白芷等分為末摻瘡上水流延旁漸大宜雄毛散治臁瘡經年不瘥累效出永類鈐方大黃黃連黃柏赤芍當歸尾蕪荑貫眾白芷等分上為末卻研烏賊龍骨輕粉虢丹四味清油熬加頭髮一握蔥根同熬一半多用上藥調搽白紙封拴之作熱癢不可動數日愈又方出永類鈐方於鹽中揀如黑泥者曬乾為末乾摻濕則水調塗又先用蘆皮席燒灰濾淋水洗干卻用藥治臁瘡方出澹寮方干胭脂白蠋地骨皮羊糞卜黏者左腳草鞋不得犯手棒梃於水打洗即干隔年駐車丸上六味乃百一選方六方或各用並用在人臨時看瘡論藥以裁之也但當先用蔥鹽椒洗其瘡卻以前藥化灰存性或碾細末入輕粉臘月豬油敷之乃服他藥治瘡臁骭內外瘡出鮑氏方用川椒煎湯洗淨真茶末蠟燭油調敷又方出鮑氏方五倍子醋調敷留瘡勿遮以車前草去脈貼之汗自出又方出鮑氏方用烏雞子二個黃麻油一兩亂髮一錢輕粉一錢文武火熬成膏湯煮甘草洗淨乃敷貼又方出鮑氏方以乾漆燒存性輕粉麻油調敷四香散出楊氏家藏方治臁瘡地龍糞火煅通紅新瓦盆蓋覆出火氣五兩寒水石火煅通紅依前出火氣三兩龍骨木香檳榔黃柏去皮降真香槐香研以上六味各一兩牡蠣三兩煅乳香別研雄黃研以上二味各半兩上為細末先用荊芥湯洗次將帛子挹干乾摻或麻油調敷不得入膩粉治臁瘡藥如神用刺蝟皮燒灰存性入輕粉生油調塗臁瘡方貓頭一個柳柴七根枳殼一個巴豆七個毛桃七個上燒灰為末貼瘡上
