body:
  text: 卷七十八眼目門內外障眼附論夫眼生翳膜或新或久皆緣腑臟之間風邪毒熱沖發於上蘊結不散其狀非一是故障有內外翳有浮沉或淺或深有可治不可治醫工往往以鉤割針鐮熨烙之法取快一時曾不知此法不慎反致盲瞽蓋翳膜之病有可以鉤割針鐮熨烙者有專宜服藥者有先服藥及洗點而後用鉤割針鐮熨烙者誠能研究經旨洞考六脈已知腑臟虛實然後心諦目察曰是可以服藥曰是可以點洗曰是可以針鐮鉤割則豈有妄致損傷者乎方蕤仁丸治內外障眼蕤仁三兩黃連去須車前子各二兩人參麥門冬去心焙各三分青葙子湯浸焙乾防風去叉生乾地黃焙黃芩去黑心秦艽去苗土各一兩半甘草炙銼天門冬去心焙丹砂炒升麻炒苦參炒羌活去蘆頭地膚子決明子炒菊花炒玄參炒地骨皮炒各一兩一分羚羊角末一兩半上搗羅拌勻煉蜜為丸如梧桐子大食後煎百合湯下二十丸加至三十丸但有瞳仁不拘內外翳並治之甘菊湯治內外障翳一切眼疾甘菊花大黃銼炒旋覆花升麻石決明芎藭各半兩羌活去蘆頭地骨皮洗青葙子車前子石膏碎木賊銼炒黃芩去黑梔子仁草決明炒甘草炙銼荊芥穗防風去叉各一兩黃連去須五分上粗搗篩每服三錢水一盞蜜少許同煎至七分食後夜臥去滓溫服觀音丸治內外障失明或欲結青光內障或赤脈疼痛血竭熊膽研各二錢人參蛇蛻皂角水洗新瓦焙各半兩木賊去節童便浸焙蒼朮童便浸三宿焙威靈仙鷹爪黃連去須地骨皮洗曬蔓荊子茺蔚子車前子川芎當歸羌活蟬蛻曬洗石決明煅存半生各一兩蠶蛻紙七幅上為細末用羯羊肝一具去筋膜慢火煮半生熟帶血性和藥同搗以粟米粉用肝汁煮糊丸如梧子大每服七八十丸溫米泔下或石菖蒲湯下食後常服金絲膏治內外障眼赤筋瘀肉瘀血翳膜遮障昏澀多淚宣黃連川黃連並用竹刀刮去須黃柏去粗皮各半兩青鹽二錢明乳香研一分黃丹羅過二錢秤重三錢沒藥硇砂各半錢新丁香四十九粒重一錢燈心長白者三百根青州大棗二十四個真白蜜四兩煉過上銼碎溫湯急浴過控干仍不得犯銅鐵器納井華水一升銀石器或砂銚子內慢火熬勿可緊候熬至一盞以生絹濾去滓放冷入蜜再入銀石器或砂銚子內熬至七分再濾去滓入於乾淨磁器中密封勿令泄氣於檐下滴漏處掘深一尺埋之用水一桶照滴漏檐於埋處坑子上猛傾下次日取出隨入生龍腦好麝香各半錢南硼砂馬牙硝各一皂子大同研極細入膏中每點一粟米磁石丸治內外障翳不問年月遠近及一切眼疾磁石煅醋淬十遍肉蓯蓉酒浸切焙各三兩牛膝酒浸切焙桂去粗皮巴戟天去心遠志去心乾薑炮地骨皮洗附子炮裂去皮臍覆盆子黃耆銼防風去叉柏子仁別研各一兩生乾地黃切洗焙鹿茸去毛酥炙各二兩白茯苓去黑皮二兩半上為末煉蜜丸如桐子大每服二十丸鹽湯酒下空心日午近夜各一還睛湯治內外障眼退翳膜去風毒甘菊花蔓荊子蒺藜子炒去角穀精草牡蠣燒芎藭仙靈脾生地黃各半兩蛇蛻五條羌活去蘆頭防風去叉桑皮蟬蛻洗地骨皮洗各一兩上為粗末搗篩每服二錢水一盞竹葉二片荊芥兩穗煎至七分去滓食後臨臥溫服精明湯出聖濟總錄治內外障翳羚羊角鎊二兩當歸切焙黃芩去黑心梔子仁淡竹葉芍藥木賊大黃銼炒荊芥穗石決明各一兩上粗搗篩每服四錢苦竹葉十片水一盞半煎至七分去滓溫服日三八子丸出聖濟總錄治風毒氣眼翳膜侵遮不計久新及內外障眼青葙子決明子炒葶藶子炒車前子五味子枸杞子地膚子茺蔚子麥門冬去心焙生乾地黃洗焙細辛去苗肉桂去皮赤茯苓去黑皮澤瀉防風去叉黃芩去黑心各一兩上為末煉蜜和丸如梧桐子大每服二十丸至三十丸茶清下溫米飲亦得日三菩薩膏出楊氏家藏治內外障眼滴乳南硼砂各二錢腦子半錢蕤仁四十九粒去皮殼熬蕪荑四十九粒沙蜜一兩上先將蕪荑蕤仁研去油入諸藥再研取沙蜜於湯瓶上蒸溶以紙濾過同諸藥攪勻用瓦瓶盛貯遇患挑少許在盞用沸湯泡洗大仙飲出直指方治內外障翳目睛疼痛石決明煅存半生明爛石膏生川芎木賊去節童便浸一夜鹽各一兩杏仁浸去皮半兩甘草炙二錢上為細末每服二錢食後臨臥用燈心薄荷少許煎服枸菊丸出御藥院方治內外障眼有翳暈或無翳視物不明甘菊花揀淨枸杞各二兩川芎薄荷葉各一兩蒼朮六兩米泔浸三日一日一換水去皮曬乾上為細末煉蜜為丸如彈子大每服一丸食後細嚼茶清下日進二服夢靈丸出聖濟總錄治內外障眼及浮花不見物芎藭散出聖濟總錄治內外障眼翳膜鹽術散出直指方治內外障眼蒼朮四兩日換米泔浸七日刮去皮細切入青鹽一兩同炒黃去鹽不用木賊去節二兩童便浸一宿曬一方水浸焙乾上為末每服一錢溫米泔調下或滲入飲食中任服甚驗不拘時候服點眼方治眼生翳膜及內外障洗眼方出聖濟總錄治內外障及翳膜赤脈昏澀以桑條二三月間採嫩者曝乾淨器內燒過令火自滅成白灰研每用三錢入瓷器或銀石器中以沸湯泡打轉候澄傾清者入於別器內更澄以新綿濾過極清者置重湯內令熱開眼淋洗逐日一度但是諸眼疾皆效靈圓丹治男子婦人攀睛翳膜癢澀羞明赤筋碧暈內外障瘀肉風熱赤眼甘菊花川芎白附子柴胡遠志去心羌活獨活青葙子仙靈脾酥炙石膏防風全蠍青皮陳皮荊芥楮實木賊去節甘草黃芩以上各一兩蒼朮米泔浸焙四兩上為末水浸蒸餅丸如彈子大每服一粒食後細嚼荊芥湯或茶清送下日三服忌酒面明上膏出龍木論一名光明膏治遠年近日不睹光明內外障眼攀睛瘀肉眩眶赤爛隱澀難開怕日羞明堆眵有淚視物茫茫時見黑花或瞼生風慄或翳膜侵睛時發癢痛兼治口瘡塗之立愈白沙蜜一斤黃丹四兩硇砂別研乳香青鹽輕粉硼砂腦子各二錢並別研麝香半錢別研金星石銀星石井泉石雲母石各一兩烏賊魚骨黃連去須各半兩上於淨室中不得令雞犬婦人見用銀石器慢火先炒黃丹令紫色次下蜜候熬得珠不散其色皆紫次入臘月雪水三升再熬二十餘沸將余藥研成末一處同熬用箸滴於指甲上成珠不散為度以厚紙三張鋪在筲箕上傾在紙上濾過再用瓶子盛放在新汲水內浸三晝夜去火毒其水日一易之看病眼輕重臨晚用箸蘸藥點大眥頭以眼澀為度若治內障用面水和成條捏作圈子臨臥置眼上傾藥在內如此用之一月見效通神膏出經驗良方一名通聖膏治內外障一切眼疾椒黃丸出危氏方一名仙翁方治一切內外翳膜遮障磣澀疼痛羞明怕日胬肉攀睛及冷熱淚蜀椒去目及閉口者炒去汁一兩干熟地黃洗切焙三兩一方等分上為細末煉蜜和丸如梧桐子大每服五十丸食後臨臥米飲送下一方用生熟地黃各二兩椒同靈應丸出朱氏集驗方治內外障眼黃連大者蕤仁各二兩石決明一兩太陰玄精石陰陽火煅草決明各一兩羊子肝七個去膜竹刀切上用多年粟米飲為丸如梧桐子大每服二十丸臨臥時用臘茶吞下翳膜厚者不過一月近者不過十日服至七日烙頂以助藥此方宋公琪丞相早歲知綿州有典史黃仁鍔患赤眼喪明夢得神人惠之聖餅子出余居士選奇方治內外障眼昏暗久患風毒氣眼並宣服石決明先搗碎水飛細川椒去子車前子楮實子羌活牛蒡子新瓦上炒青葙子木通蒼朮米泔浸一宿木賊去節獨活白蒺藜去尖刺蛇蛻皮洗爆過令黃地膚子以上各一兩太陰玄精石滑石寒水石雲母石磁石鹽泡過擠干以上五件用瓷瓶子納泥固濟入土坑子內以慢火煅之令出火毒以水飛令細曬乾草決明荊芥甘草甘菊花旋覆花各二兩蟬蛻一兩水洗淨密蒙花三兩五錢上為細末入五石在內拌勻煉蜜丸每一兩藥劑分作十餅子每服一餅子臘茶嚼下日三服不拘時候單服蒼朮法出十便良方補下部明目治內外障神效以金州大塊蒼朮一斤足秤分作四分每分作四兩四兩以無灰好酒浸三日四兩以醋浸三日四兩以童子小便浸三日日兩易四兩以米泔浸五日一日一換上件日足漉出更不淘洗便切片或焙半乾使黑芝麻四兩如不足只二三兩亦得如無只使黃色者同入在𨫼上炒令乾香然後搗羅為末仍同前浸藥酒煮稀糊為丸如梧桐子大若少添藥醋亦不妨每服四五十丸以湯或酒任下花乳石散出衛生家寶方治多年內外障花乳石一兩細研水澄為粉焙乾防風一兩去蘆頭川芎一兩甘菊一兩甘草半兩炙牛蒡子半兩揀去灰土秤炒白附子一兩上為細末每服二大錢臘茶調下不拘時候太陰玄精石散出衛生家寶方治內外障眼玄精石一兩細研必須真者石決明半兩火煅存性蟬蛻一兩洗去沙泥羌活半兩甘草四兩菊花一兩去枝梗上焙為細末每服一錢用麥門冬煮水調下食後服有神效夢靈丸出衛生家寶方治內外障眼防風一兩蜜炙石決明一兩水一升煮乾菊花二兩威靈仙一兩蕤仁一兩穀精草一兩枸杞子一兩蒼朮一兩米泔浸一宿銼焙蚌粉一兩飛過上研為細末用雄豬肝一具竹刀切去筋膜和藥搗一千下入面少許共搗丸如梧桐子大食後鹽湯下三十丸忌煎爆酢豆腐等毒物地黃丸出衛生家寶方治內外障及眼見飛花此藥平補壯氣血悅精神先服此方半月次服羌活丸五日然後用立應散搐鼻熟地黃二兩酒蒸二次焙生地黃二兩川當歸一兩半去蘆川牛膝一兩金釵石斛一兩切酒浸焙菟絲子一兩酒浸炒別研車前子一兩防風一兩枳殼略洗去瓤麩炒一兩杏仁麥炒先用湯泡過去皮尖別研一兩上為末煉蜜丸如梧桐子大每服三十丸空心鹽湯下日一服還睛散出衛生家寶方治青盲內外障眼忽然不見物者川芎一兩龍膽草一兩去蘆頭楮桃兒一兩青者木賊一兩仙靈脾一兩半甘草三分淡竹葉半兩上為細末每服二錢用新汲水調下日進三服不拘時候五退還光丸出衛生家寶方治內外障眼刺蝟皮一兩麩炒去麩不用枳實一兩蠶蛻半兩炒防風一兩蟬蛻一兩炒蒼朮一兩米泔浸炒乾蛇蛻一兩炒草決明一兩豬前爪一兩燒灰存性甘草一兩炒上為細末煉蜜為丸如梧桐子大每服二十丸好茶下一日一兩服立應散出衛生家寶方治內外障昏澀多淚及暴赤眼一切目疾並治之日三次搐鼻鵝不食草淨洗香白芷洗當歸去蘆頭洗雄黃別研川附子炮以上各等分躑躅花減半上為細末入麝香少許和勻含水搐鼻內去盡濁涕眼淚為度食後少空用木賊散出衛生家寶方治內外翳障木賊去節甘菊枸杞子荊芥穗蒼朮米泔浸三日熟乾地黃上等分為末更入蛤粉和勻每服二錢先用豬肝四兩切開摻藥在內甑上蒸熟食後細嚼白湯送下蟬花丸出衛生家寶方治年深日近諸般內外障眼風毒氣毒翳膜赤脈逆順橫開胬肉攀睛瞼眩赤爛多膿多淚昏暗不明視物茫茫並治之密蒙花威靈仙去蘆白蒺藜炒去尖木賊去毛節草決明炒菊花去梗楮實子炒石決明火煅蟬蛻麻油淨洗青葙子瓦上炒川芎羌活生以上十二味各半兩旋覆花甘草荊芥穗以上各一兩上研為細末煉蜜為丸每兩作十五丸每服一丸細嚼用濃煎燈心麥門冬湯送下食後臨臥時日三服乳香丸出永類鈐方治男子婦人血不舒活內外翳障乳香沒藥別研五靈脂麻黃去節附子炮當歸川烏炮草烏炮牛膝酒浸川芎肉桂羌活全蠍去梢鹽水炙防風殭蠶洗炒等分上為末酒糊丸如梧桐子大身熱痛薄荷湯下冷痛姜酒下損傷松節酒下頭痛蔥茶下婦人血風當歸酒下常服鹽湯下二十丸煮肝散出楊氏家藏方治內外障翳眼上用豬肝二兩批開以夜明砂末二錢匙摻在肝內麻線纏定用水一升煮令肝轉白色取出爛嚼用煮肝湯送下食後服治內外障眼搐藥出東垣蘭室方麻黃根一兩當歸身一錢上同為粗末炒黑色入麝香乳香少許仍為細末含水以鼻內搐之蕤仁散出聖濟總錄治內外障翳蕤仁決明子各三分黃連去須柴胡去黃葳蕤黃芩銼各一兩甘草半兩炙微赤銼川大黃三分銼碎微炒上為粗散每服三錢水一盞煎至六分去滓食後溫服葳蕤丸出聖濟總錄治眼生翳膜疼痛昏澀視物不明葳蕤車前子熟地黃焙各四兩升麻黃芩去黑心秦艽去苗土枳殼去瓤麩炒白茯苓去黑皮黃連去須獨活去蘆頭地骨皮決明子微炒山梔子仁白檳榔生銼各一兩半赤芍藥芎藭各二兩秦皮一兩上為末煉蜜和丸如梧桐子大每服三十丸熟水下食後日二服撥雲丹專治眼翳等疾川芎黃連當歸白蒺藜微炒各一兩半羌活川椒去子柏子各七錢荊芥穗密蒙花甘菊花蟬殼各一兩栝蔞二三錢薄荷葉二兩蔓荊子二兩微炒地骨皮去土焙乾蛇蛻皮甘草湯煮焙乾木賊二兩去節童子尿浸一宿焙乾上為細末煉蜜為丸如彈子大細嚼食後茶清送下內障氣者木香湯下睛暗當歸湯下好酒亦可婦人血暈當歸湯下小兒斑痘瘡翳疔子半夏煮穀精草湯下一方無羌活木賊秘傳去翳聖金膏出海上方爐甘石五兩童便煅浸三十次卻研極細用黃連龍膽草各一兩當歸三錢煎水兩碗飛過訖重湯蒸乾再研約百次要冷如冰面極細其石須揀色白麵極細微者黃色只好合粉烏賊魚骨半兩研細入煎黃連五兩用水洗淨曬乾卻將一兩切碎煎水四兩研為細末重羅過再研極細用水飛過卻於砂銚內煮此藥最難細冬月用雪水洗淨曬乾再研方細乳香三錢要通明滴乳用黃連水飛過密陀僧半兩火煅醋淬研細水飛過輕粉一錢研細入藥沒藥三錢用黃連等水飛過南硼砂一錢研細入煎白丁香一錢水飛過重湯煮乾再研入藥煎黃丹一兩用鐵銚火煅過研細末水飛過重湯蒸乾再研多時須極細入煎硇砂半錢淨水洗去泥以水入鐵銚煮乾如鹽樣白方好再研細入藥煎龍膽草一兩截碎水煎蜜四兩用水一盞於銅銚內煎用蔥白二莖攪蜜候煎了放於地上用紙一片蘸取去面上蠟當歸半兩淨以一半焙乾研細末再用些水研入藥一半煎水用鷹條一錢以水一碗飛過用研丁香沒藥用水淘飛過合研入煎須多淘淨稱上先用當歸黃連龍膽草三味截碎用銚子煎二大碗水用此水研乳香沒藥飛過再用此水飛過鷹條白丁香獨將黃連四兩洗淨令乾碾為細末重羅過又碾飛過或別作法研磨但要極細於沙銚內和淨蜜四兩同煮卻旋入諸藥煎成膏可丸即止惟獨後入下二味麝香半錢重研細羅過腦子半錢重研細羅過候前藥成膏卻入此二昧此藥遠年眼疾皆治須隨病輕重以為大小丸與之每以淨湯一大雞子殼大淨湯內化開日溫洗五七次或如麥粒大點眼尤妙前麓開翳散治眼生翳障神效白蒺藜炒搗去刺蒼朮洗淨童尿浸二宿日換一次蟬殼洗曬菜花蛇皮去頭尾及脊上一線皮不用用皂角水洗新瓦上焙乾好川芎杏仁水浸去皮防風羌活白芷各半兩華陰細辛獨活各四錢白附子生明爛石膏荊芥穗真蚌粉各三錢上為細末每服一錢半沸湯點茶清調以舌浸於藥中良久毒涎自出又別換藥食後臨臥服仍用點翳膏穀精散治大人小兒眼中生翳疼痛並暴發赤眼羌活蟬殼蛇蛻防風穀精草菊花木賊甘草大黃山梔子黃連沙苑蒺藜各等分上為末每服半錢熟水調下捲簾散治新久病眼昏澀難開翳膜遮睛或成胬肉連赤爛常多冷淚或暴發赤眼腫痛爐甘石四兩碎朴硝半兩細研黃連七錢捶碎水一碗煮數沸除去滓以上先將爐甘石末入鍋內開口煅令外有霞色為度次入黃連朴硝水中浸飛過候乾又入黃連半錢水飛過再候乾次入之膩粉別研黃連末半兩青鹽白丁香另研膽礬乳香另研鉛白霜各研一兩銅青一兩半硇砂另研白礬生用一半飛過二錢半共用半兩上為末同前件藥合和令勻每用少許點眼車前子丸治熱毒眼暈白翳覆腫車前子決明子黃連去須藍實各二兩一分黃芩去黑心玄參沙參瞿麥穗地骨皮秦皮蕤仁去殼各一兩三分上為末煉蜜和丸如梧桐子大每服三十丸熟水下食後日二服明目防風丸治熱眼風上衝頭面因食酒面炙爆等物眼生膜者防風去叉決明子枳殼去瓤麩炒黃連去須槐子赤茯苓去黑皮甘菊花各一兩半細辛去苗葉一兩生乾地黃焙車前子各二兩半黃芩去黑心一兩上為末煉蜜和丸如梧桐子大每服十五丸食後米飲送下日再服胬肉昏暗等諸症皆能除之覺愈即止神效退翳散當歸川芎大黃草決明龍膽草薄荷黃連黃芩防風荊芥梔子上各等分白翳大者用黃酒煎赤障用白水煎服之效香連膏治眼生翳膜白沙蜜五兩絹濾去滓硇砂五錢通明者研乳香研一錢青鹽一錢鉛丹一錢黃連去須三兩為細末以上六味除蜜外並用新汲水三盞於銀石器內同煎至一盞後入蜜更用慢火熬成膏不住手攪候引之如絲線以重絹絞去滓入瓷瓶內盛貯水銀半錢輕粉一錢龍腦一錢麝香研一錢上除前膏外將後四味一處細研勻入藥膏內用油單封三五重系定如春夏秋各時即以麻繩子墜在井底一七日取出若冬月合時即於背陰處封閉二七日出之除打損眼外並可治車前散治眼生翳膜遮障睛瞳及內障青盲車前子菊花蛇蛻燒灰甘草炙銼京三稜泡銼石決明研草決明炒各一兩井泉石研二兩枳殼麩炒一分上為散每服一錢食後用熟水調下不拘時候九龍散治諸般障眼翳膜攀睛羌活酒浸龍膽草甘草菊花荊芥蒼朮米泔浸秦皮海螵蛸木賊去節童子小便浸一宿各一兩上為末每服二錢米泔水調服茶酒亦可補肝散出危氏方治圓翳熟地黃白茯苓去皮甘菊細辛各半兩甘草半錢炙芍藥三分柏子仁一分防風一分北柴胡一兩去蘆上銼散每服三錢水一盞半煎食後服神效膏出聖濟總錄治翳膜遮障見風淚出點眼鉛丹二兩蜜半斤以絹濾過硼砂一豆大明淨者青鹽一錢馬牙硝三錢白龍腦一錢白礬一大豆燒過大豬膽兩枚要新好者上併入瓷瓶內和勻用重湯於鍋內煮候紫色為度兼不住手攪之藥成只於瓶內盛貯封固每遇使時旋取些小以井華水調用銅箸子點有淚下以帛拭之候淚住即再點每晝夜可三五度洗眼湯出千金方治熱上攻目生翳障熱痛淚出秦皮黃柏決明子黃連黃芩蕤仁各十八銖梔子七枚大棗五枚上㕮咀以水二升浸煮取六合澄清仰臥洗日一次洗眼紫金膏出和劑局方治遠年近日翳膜遮障胬肉攀睛昏暗多淚瞻視不明或風氣攻注瞼生風粟或連眶赤爛怕日羞明隱澀難開並能治之硃砂別研硼砂別研赤芍藥當歸洗焙各一分雄黃研飛二錢麝香別研半分黃連去須半兩乳香別研上為細末共入研藥拌勻再擂煉蜜搜和為丸如皂莢子大每次用一丸安淨盞內以沸湯泡開於無風處洗藥冷閉目少時候三兩時再煨令熱依前洗一丸可洗三五次不得犯銅鐵器內洗如暴赤眼腫者不可洗之補腎丸出危氏方治圓翳巴戟去心山藥破故紙炒茴香牡丹皮各半兩肉蓯蓉一兩洗枸杞子一兩青鹽一分後入上為末煉蜜丸如梧桐子大每服三十丸空心鹽湯下八味還睛散出危氏方主散翳白蒺藜炒去尖防風粉草炙木賊各半兩山梔子半兩草決明一兩炒蟬蛻一分青葙子一分微炒春雪膏治眼生翳膜上星者用川黃連四兩洗淨用水三碗煎至半碗去滓再用水一碗煎至一盞二者並作一處慢火熬一小盞用磁器盛不犯鐵器又用獖豬膽一個取汁生羌活一兩洗淨和皮搗取汁用白沙蜜一斤濾過熬成膏入麝香片腦輕粉各半錢同乳香少許細研入膏內攪勻磁器盛貯用時加入撥雲膏撥雲膏斑蝥三個去頭足麵炒過青娘子紅娘子各二個先制硼砂一錢蕤仁五個去殼炒上同研極細同春雪膏一日五六次點愈仙術散出聖濟總錄治眼目翳膜遮障昏暗退翳蛇蛻洗焙一錢蒼朮米泔水浸一宿切焙二兩黃芩去黑心半兩甘草炙銼木賊各一兩蟬蛻洗穀精草各一分上為散每服一錢空心臨臥冷水調下通肝散出危氏方治水障翳山梔子蒺藜炒去尖枳殼去白荊芥各半兩車前子牛蒡子各一分炒甘草五錢炙銼上為末每服二錢苦竹葉湯調食後服撥雲散出聖濟總錄治風毒眼翳膜遮障菊花防風去叉白蒺藜炒去角羌活去蘆頭柴胡去苗甘草炙銼各一兩上為細散每服二錢以水一盞煎至六分食後臨臥和滓溫服之重明散出經效濟世方治兩眼生翳膜連眼眶赤爛久不效者並治之若一時赤眼一服即效黃鷹條一錢細研白丁香一錢細研乳香一錢細研爐甘石一分燒赤白礬一錢飛過麝香少許上為細末每次以燈心少點入眼眥內百點膏出東垣蘭室方治翳膜不問六七年遮障瞳仁者當歸身六分甘草六分防風八分蕤仁去皮三分黃連揀淨洗二錢銼如麻豆大水一大碗熬至一半再入前項藥上各銼麻豆大蕤仁別研如泥同熬至滴水不散去滓入蜜少許再熬少時為度臨臥點一云令病人心靜點之至目微痛為度日點五七次但欲多點使藥力相繼也故名百點膏昔有張濟明者眼病翳六年以至遮瞳仁視人如覺雲氣遮障點此藥五七日翳退一半道人開障散出直指方治諸障翳蛇蛻洗焙剪細蟬蛻洗焙黃連去須各半兩綠豆一兩甘草生二錢上銼細每服二錢食後臨臥新水煎服曾青散主退翳五神散出經效濟世方治眼疾退翳膜荊芥穗烏賊魚骨木賊白朮各一兩甘草半兩炙上為細末每服一錢食後米飲調下點翳子方烏頭蠍梢硇砂信白丁香上等分為細末豬鬃點之照水丸出聖濟總錄治目生翳障龍腦滑石丹砂通明者烏賊魚骨去甲各秤一錢上研細再同研和勻先用黃臘如皂子大兩三塊於新白瓷盞內慢火上熔用紗帛子濾過再於淨盞內再熔了將前藥末同共拌和捏作餅子如半破豌豆大用薄絹或紗袋子盛了以硇砂半兩放在淨碗內上交橫安竹片放藥在上面鋪著借硇砂氣熏用大缺子一片合碗口勿令透氣掘一地坑放藥碗在坑內用竹簟子一片蓋了然後以黃土蓋之七日取出淨瓷瓶中收貯去硇砂不用如患浮翳膜侵瞳仁及一切目疾但臨臥將一餅貼在眼眥頭即睡至曉用水一碗向東覷水其藥自落在水中淨浴卻用絹帛子包裹起安潔淨處臨臥依前再使每餅可用半月候藥力慢時再易一餅如兩目有疾即用兩餅重明膏出瑞竹堂一名洗眼藥治眼內雲翳無問遠年不退及諸般眼疾昏花只內障不治白沙蜜二兩水飛過半斤訶子四個沉水洗去核黃丹二兩水飛過柳枝東南向者四十九條上將蜜煉淨用絹濾過盛於磁器內將訶子黃丹入蜜內於爐上熬用手一順攪之文武火不許太過熬成金絲膏用手捻不黏手為度又用東南上槐條子折寸長一白枝用水三大碗煎至一碗將前膏子用槐條水解稀稠得所用淨磁器收貯蓋封於地上頓放三日令去火毒再用絹濾過方用熬藥時忌雞犬婦人水照丹出經效濟世方治眼中翳膜真珠末一字硃砂一字象牙半錢烏賊魚骨半錢上為細末熔蠟丸如黍米大每用臨臥置眼中隨左右用來早以水一盞開眼放藥水中翳膜盡下神妙摩頂膏出聖濟總錄治一切眼疾翳膜遮障兼能生髮涼腦治頭痛蓮子草藍青各一握油一斤上將二味細銼納瓶中以油浸之紙封頭四十九日每夜臥時令人以鐵匙點藥摩頂腦上四十九遍至一百二十遍住此藥須五月五日平旦時合白末眼藥去雲翳朵梯水飛一兩碗糖霜淨五錢大海螺火煅為末一兩水飛上為細末用少許點眼青末眼藥明目去翳安白蘆海螵蛸黑丁香各三錢即鼠糞上為細末用少許點眼密蒙花丸出聖濟總錄治眼障翳密蒙花黃柏根洗銼各一兩上為末煉蜜和丸如梧桐子大每服十丸至十五丸食後臨臥熟水下或煎餳湯下黃金膏出聖濟總錄一名黃柏膏治一切眼疾退翳復明膏出聖濟總錄治目障翳肉昏暗馬牙硝研一兩半酸漿草乾者五兩上於六月六日用童子尿浸於日中曝之夜或陰雨覆之晴即露之尿耗即旋添至七月初去酸漿草只空曝小便令乾收之別以新盆蓋藥埋淨地深可五寸以來至來年夏至前二日收之其霜飛上盆子蓋以烏雞毛掃取患者以一米粒安大眥頭避風點水丹出危氏方治眼翳及外障赤翳貫瞳仁攀睛等惟翳厚者效辰砂半錢海螵蛸一錢上於乳缽內細研水飛過澄取用黃蠟少許熔開入藥待用時就火上旋丸如蘿蔔子大臨睡用一丸點眼角內緊閤眼睡著次日用溫湯洗下未退更用一次妙王居用云常病眼障全不見物只用生辰砂一塊每日眼中擦之海上方云不數日障翳盡退目明如初通光散出聖濟總錄治攀睛翳膜昏澀風毒腫痛洗眼方用栝蔞一枚割下頂蓋取瓤並子同豬膽搗勻卻入在栝蔞內用元蓋蓋之坐淨土上取桑條子十兩約長四五寸簇栝蔞上用炭火燒扇之煙盡將成炭即住扇冷和灰通研極細每用二錢沸湯浸澄清去滓洗之杏仁膏出聖濟總錄治眼翳障膜遮但瞳子不破者以杏仁三升湯浸去皮尖雙仁每一升以麵裹於煻火灰中炮熟去面研杏仁壓取油又取銅綠一錢與杏仁同研以銅箸點眼瘥白龍散一名馬牙硝散治翳明目治眼生翳膜出聖濟總錄以薺菜和根莖葉不拘多少洗淨焙乾研為細末每夜臥時先淨洗眼了挑半粒米許安兩大眥頭澀痛莫疑翳膜不日自落治目翳方出聖濟總錄以芥子一粒輕手挼入眼中候日出以井華水雞子清洗之治熱翳漫睛方出千金方以羊筋漱口熟嚼夜臥開目納之即閉目睡明日即瘥亦治眯目不明立消膏出直指方治浮翳粟翳霧膜遮睛用雪白鹽於淨器中生研少許以大燈草蘸鹽輕手指定浮翳就點凡三次不痛勿驚屢效去翳障生血止痛方出家藏經驗方用蠐螬汁滴目中及飴炙食之愈陳氏經驗方云晉書盛彥母氏失明躬自侍養母食必自哺之母既病久至於婢僕數見捶撻婢忿恨因彥暫行取蠐螬飴炙食之母食以為美然疑是異物密藏以示彥彥見之抱母慟哭絕而復甦母目豁然從此遂愈孟子曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見本草云蠐螬汁滴目中去翳障余在曲江有將官以瞽離軍因閱晉書見此叅以孟子之言證以本草之說呼其子俾羞時而供勿令父知旬日後目明趨庭伸謝因錄以濟眾指甲散出龍木論治眼翳兼諸物入眼以左手中指甲洗淨候乾以刀刮其屑用燈草蘸點眼中翳處一二次即去或用懷孕婦人爪甲屑置目中去翳障鼓捶草方出仁存方退翳上將鼓捶草根獨莖者寸截用薄綿裹塞鼻內翳即退隨目左右塞之神聖粉治目生翳墨運方治眼中障膜明目去障翳解熱毒出本草以菥蓂子食之久食視物鮮明四月八日收實良治眼上生翳用頭上膩垢為丸如梧桐子大更以指甲刮些末安眼中以些少水滴之令人仰臥傾以手揉眼兩邊淚出卻以燈心一莖於眼中燃起翳膜即去旋覆花散出聖惠方治翳從下生及翳膜上黑睛旋覆花桑根白皮銼羚羊角屑赤芍藥各一兩黃連去須甘草各半兩微炙赤銼川升麻黃芩各三分上為粗散每服三錢以水一鍾煎至六分去滓每於食後溫服忌炙爆豬肉還睛膏出聖濟總錄治一切障翳黃連去須鉛丹水飛過各一兩黃柏去粗皮半兩桃仁去皮尖雙仁者杏仁去皮尖雙仁者各七粒龍腦研半錢白沙蜜四兩上除龍腦鉛丹蜜外各搗碎用井水二盞及蜜鉛丹攪勻浸三日後入銀石器內文武火熬至一半綿濾去滓入龍腦成膏瓷盒子內密封掘地埋一宿出火毒不拘時候點之撥雲散出德生堂方散風毒退翳障及赤爛眩者白蒺藜防風羌活川芎荊芥甘菊花蟬蛻各二兩上為細末每服二錢桑白皮熬水食後服珊瑚散出聖惠方治眼赤痛生翳障遠視不明癢澀珊瑚三分龍腦半錢硃砂二分上先研珊瑚硃砂如粉次入龍腦研令勻每以銅箸取一米許日三四度點之神效蕤仁煎出聖濟總錄治眼生翳障昏暗點大人小兒眼澀腫赤隱痛蕤仁去皮尖鋪在銀盂底黃連去須淨洗鋪蕤仁上各二兩上用古老錢四十九文鋪在黃連上次用井華水二盞浸不得過錢用七年熟艾四兩緊打成一炷在古老錢上燒密蓋盂口不令出氣候燒過艾炷去灰並古老錢黃連蕤仁等取下艾煙在水內入白蜜二兩同煎至一盞去滓次用麝香龍腦各二分硼砂一錢細研和膏再熬熟密封入井水內浸七日出火毒凡遇障翳先用白湯洗眼燈心點藥入眼內日三度勿令見風亦治暴赤眼及風眼淚癢柏竹瀝膏出龍木論治一切赤眼障翳黃柏去粗皮刮細末滿傾竹內慈竹一段去兩頭節上用磚對立置竹磚上兩頭各安淨碗以干竹火燒令瀝出盡收之以釵股銅箸點眼摩障翳方用雞卵殼研摩之治熱翳赤障出本草用斫斷千歲蘽藤以水浸從一頭吹取氣滴目中石決明方出龍木論用石決明味鹹平無毒主目障翳痛青盲涼血明目殼磨目障翳亦名九孔螺也圓經云決明殼大者如手小者如三兩指海人啖其肉亦取其殼漬水洗眼七孔九孔者良十孔者不佳決明散出永類鈐方治障膜石決明煅枸杞子酒浸一宿木賊去節荊芥穗晚桑葉羌活穀精草去根粉草炙旋覆花蛇蛻蜜炙蒼朮制菊花各等分上為細末每服二錢茶清調食後服枸杞丸出衛生家寶方治遠年近日翳膜遮障內外障眼木賊一兩去節童便浸一宿淨洗三五次枸杞子一兩炒乾家菊花一兩去枝葉削皮蒼朮三兩泔水浸一夕淨洗上為末煉蜜丸如禾穗子大每服一丸食後用好茶嚼下神妙散出衛生家寶方點翳膜障眼朴硝二兩安豆腐淋過將瓦盞煅辰砂半錢乳香半錢玄明粉一分腦子三錢麝香三分膽礬半錢硇砂半錢南硼砂半錢上為細末以銅箸點之研須極細海州聖婆婆眼藥出衛生家寶方治一切翳障攀睛赤脈瘀肉或癢或疼朴硝一兩硼砂研極細硃砂研細腦麝各少許上用瓦盞一隻於火上熔朴硝成珠子卻入硼砂等細研用蜜為丸如芥子大吹一粒入眼中通利膏出鮑氏方治翳膜障明時多熱淚方見通和膏五退散出澹寮方治眼中翳障蟬蛻蛇蛻蠶蛻殼豬蛻蹄鯪鯉甲菊花防風草決明石決明甘草各等分上為末每服二錢薄荷數葉水一小盞煎服秦皮丸出聖濟總錄治黏睛翳秦皮去粗皮黃柏去粗皮炙黃芩去黑心防風去叉柴胡去苗黃連去須各一兩葳蕤炙木通銼各一兩半甘草炙半兩上為末煉蜜丸如梧桐子大每服三十丸食後臨臥時溫水下治赤障白膜風淚出本草以青羊膽點之
