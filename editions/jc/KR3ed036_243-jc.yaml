餘則隨發動臨時消息但有風氣之人春末夏初及秋暮得通泄則不困劇所謂通泄者如麻黃牽牛郁李仁之類是已不必苦駃利藥也麻黃獨活湯治腳氣皮肉𤸷痹筋骨疼痛手腳弱緩行履艱難麻黃去根銼獨活去蘆頭杏仁湯浸去皮尖雙仁炒各一兩半丹參附子炮裂去皮臍五加皮細辛去苗葉牛膝酒浸切焙芎藭桑根白皮白殭蠶等分上銼如麻豆每服五錢水一盞半煎至八分去滓溫服空心食前日再服加減至寶丹專治腳氣止疼痛除風濕石膏水煮三十沸二兩當歸酒浸檳榔各二兩骨碎補去皮毛四兩炒淨三五次月寶砂五兩醋煮乾白蒺藜炒赤去尖刺用三兩木瓜生用紫金皮去骨生各三兩淮烏三個起一兩者炒赤二兩白膠香二兩淨水煮十數沸冷水中訖上為末蜜丸如彈子大嚼生薑一塊空心以好酒一盞送下多以酒助力服後一時久用外應散蒸淋洗一方除紫金皮木瓜加防風小黑豆一方加芍藥一方除紫金皮石膏加白朮木香川烏趂痛丸治三十年腳氣發歇疼痛不仁步履艱難鯪鯉甲一兩用蛤粉一兩同炒黃色去粉地龍去土炒二兩小薊根葉銼一兩惡實二兩五靈脂一兩乳香研半兩沒藥研半兩甜瓜子生皂莢刺炒竹蛀末各一兩上為末爛研蒜肉為丸如彈子大每服一丸用熱酒二合磨下食前服思仙續斷丸治肝腎風虛氣弱腳不可踐地腰脊疼痛風毒流注下經行止艱難小便餘瀝此藥補五臟內服調中益精涼血堅強筋骨益智輕身耐老思仙木五兩即杜仲也五加皮防風薏苡仁羌活川續斷牛膝各三兩萆薢四兩生地黃五兩上為細末好酒三升化青鹽三兩用木瓜半斤去皮以鹽酒煮木瓜成膏和杵丸如梧桐子大每服三五十丸空心食前溫服酒鹽湯下膏子少益以酒糊犀角散治腳氣疼痛皮膚不仁心神煩悶睡眠不安犀角屑三分防風一兩去蘆羌活一兩秦艽一兩去苗桂心半兩赤芍藥一兩大腹皮一兩銼牛膝一兩去苗檳榔一兩上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服代灸膏治腳氣腫痛不可忍者南星半夏白芷川烏川椒白芨馬藺子各一兩乳香沒藥各三錢另研上為細末酒調敷貼疼劇處干則以熱水潤濕之日換二次防風湯治風毒腳氣無力𤸷痹疼痛四肢不仁失音不語及風毒衝心防風去叉半兩大棗七枚去核桂去粗皮麻黃去根節當歸切焙各半兩檳榔為末一兩犀角鎊一分赤茯苓去黑皮半兩上除檳榔外銼如麻豆每服五錢水二盞煎至一盞去滓入檳榔末一錢再煎一二沸溫服不拘時候敗龜散治腳氣及筋骨疼痛敗龜蕓薹子研白芥子研木鱉子去殼研自然銅煅醋淬各半兩硫黃研地龍炒各一兩上為末每用末並白麵一匙頭醋調作餅隨患處大小貼桑根白皮湯治濕毒風腳氣瘴氣四肢𤸷痹疼痛不仁桑根白皮銼三分防風去叉升麻各半兩犀角鎊一分芍藥半兩檳榔銼二枚淡竹瀝不拘多少上除竹瀝外粗搗篩每服五錢水一盞半煎至七分入竹瀝半合再煎沸去滓溫服空腹日二服川烏丸治腳氣疼不能行步川烏略炮草烏略炒五靈脂去石土茴香各一兩略炒黑豆四兩炒焙乾以上同為末分二處赤土細研礬朱是也百草霜上將前五味藥末一半以赤土細末三分之一同和令勻以米醋糊為丸如梧桐子大又將藥末一半以百草霜末三分之一同和令勻亦以米醋糊為丸如梧桐子大如腳氣以紅丸者十五粒黑丸者五粒並作一服用松節木瓜赤芍藥煎湯送下食前入少甘草同煎尤佳如風氣以黑丸十五粒紅丸者五粒同一服食前清茶下葛邦美傳名昌宗他與賣此藥人同邸見其修合默記之合服果得效大腹飲治腳初覺風毒攻作腳膝虛腫筋骨疼痛或𤸷痹不知痛癢或氣喘煩悶宜速服大腹並子銼十枚杏仁湯浸去皮尖雙仁炒各二兩木瓜切焙生薑切片桑根白皮銼各二兩吳茱萸湯浸焙炒二分黑豆五升上先將豆並生薑以水五盞煎令浮去豆即將藥搗篩入湯內同煎至三盞去滓分二服空心溫服良久再服取利為度天麻丸治風濕腳氣筋骨疼痛皮膚不仁天麻生用五兩麻黃去根節十兩草烏炮去皮藿香葉半夏炮黃色白麵炮各五兩上為細末滴水丸如雞頭子大丹砂為衣每服一丸茶酒嚼下日三服不拘時烏頭細辛散治腳氣痛不能行步川烏頭香白芷細辛防風不見日陰乾上各等分並生用為末每服一錢於鞋內鋪以腳踏之妙或用絹囊盛之此方得之於仙超然辰砂丹治足掌疼辰砂一錢生麝半錢蠍稍一錢去尾尖乳香半錢上用皴皮草烏去皮尖三錢合為末一半入藥一半米醋調煮熟取起和丸如綠豆大每服五十丸空心溫酒下何首烏散治腳氣流注歷節疼痛腳膝熱疼皮膚麻痹兩腳痹攣何首烏不計多少切作半寸厚以黑豆不計多少水拌令勻濕就甑內蒸用豆一重何首烏一重蒸令豆爛為度去豆曝乾秤用一斤仙靈脾切牛膝銼各一斤二味共酒浸一宿焙乾烏頭去皮臍半斤切入鹽二兩半炒黃色去鹽用上為散每服二錢溫酒調下日三服粥飲亦可調服木瓜丸治腳氣疼痛青鹽川芎各三二兩為末大木瓜一枚宣州大者佳上將木瓜先切下蒂蓋去心穰入二藥末安內用瓜蒂蓋之麻皮纏定用面固濟慢火燒面熟為度去面用瓜肉極爛研以麵糊丸梧桐子大每服二三十丸空心夜臥酒下濕潤不可丸著慢火和盆烘乾即可丸趂痛丸治腳氣上攻及風毒走注疼痛白芥子甘遂大戟以上三味並生為末各一兩五錢上用白麵一兩半滴水同和作餅子爆令焦黃勿令黑色細碾為末用醋煮麵糊為丸如梧桐子大每服一十丸冷酒下不得嚼破量虛實加減服消毒膏治走注風腳疼痛筋脈拘攣馬牙硝一兩煅草烏頭二枚燒存性上和勻每用三錢以面和自然薑汁一盞慢火同熬成膏子攤於帛上熱貼疼處日二次換之木瓜丸此方治腳氣止痛去濕去風木瓜大者一隻乳香一兩為末上以木瓜去皮穰切下蓋入乳香在內蒸爛研搗干為丸如梧桐子大每服三四十丸溫酒下亦可以此膏敷貼痛處尤好杜仲湯治腳氣緩弱腫疼痛杜仲去粗皮炙為末三兩生地黃汁三合上先將杜仲末以水二盞煎至一盞去滓入地黃汁三合酒二合再煎三五沸溫服空腹近晚各一服又方出海上名方治腳掌疼敗毒散五積散上二件和勻入乾木瓜十片紫蘇十葉同煎服獨活散貼腳氣止疼痛用綠豆粉三兩銀石器中慢火炒令黑色再研為細散用井水調成膏攤絹帛上隨痛處貼之服前趂痛丸腳氣止痛方出醫方大成用蓖麻子七粒去殼研爛如泥同蘇合香丸打碎和貼腳心痛處即止又方出醫方大成用草烏一味以麴酒糟搗爛貼痛處即止如無曲糟生薑汁調草烏亦可治腳氣發痛出經驗良方以時吃煮熟蘿蔔令飽以下其氣米醋調飛羅面罨痛處虎骨酒出本草方治腰腳疼痛攣痹不得屈伸及腿膝冷麻用虎骨一具及脛骨二莖用酥炙黃捶碎同無灰酒三斗密封七日空心晚食溫之隨意飲養腎散治腳氣腎氣虛損腰腿疼痛曲折不能舉動艱難麻痹軟弱全蠍半兩天麻三錢蒼朮去粗皮一兩草烏頭去皮臍二錢生黑附子炮去皮臍二錢上為末拌勻腎氣豆汁酒調一大錢豆用黑大豆能除去腰腳筋骨疼痛其效如神藥氣所至麻痹少時須臾隨藥氣頓愈如是骨髓中痛用胡桃酒下此藥傷寒中風皆治忠州陳太守云渠前知坊州因暑中取涼食瓜至秋忽然右腰腿間疼痛連及膝脛曲折不能經月右腳艱於舉動凡治腰腳藥服之無效兒子云安刑曹在商熙助教處得養腎散方服之才一服移刻舉身麻痹不數刻間腳遂屈伸一服即康寧又坊州鹽酒年幾四十虛損兩腳不能行步試與此藥初進二錢大腿麻木遂能起立再服二錢大小指拇皆麻迤邐可行三服馳走如舊太室居士得此方幹道己丑歲在鄂州都幕府日宋判院審言久病腳膝緩弱不能行傳之數日來謝云此疾經年無藥不服得方次日即合二服見效五服良愈今有力能拜起矣後數日又云因浴遍身去薄皮如糊肌骨遂瑩其效如神治腳氣心痛出百一選方用乾木瓜研細末煎大聖散服之昔姚克溫閣中苦此病數服腳氣心痛悉愈治腳氣及風寒暑濕四肢攣急疼痛不可踐地方見本門風寒暑濕腳氣類用好醋一盞皂角五枚捶碎煎成膏子次入乳香一兩令勻凡有病處將羊毛筆蘸藥塗痛處次表紙貼之少許木香散治腳氣緩弱皮肉頑痹肢節疼痛羚羊角鎊陳橘皮湯浸去白焙木香三分萆薢一兩銼車前子半兩牛膝細銼酒浸焙乾杏仁湯浸去皮尖獨活去蘆頭丹參桂去粗皮杜仲去粗皮細銼炒秦艽去苗土各一兩上㕮咀每服三錢水一盞入生薑半分拍破同煎至七分去滓空心溫服日午近晚各一服補藥五加皮治腳氣皮膚不仁發歇不定五加皮銼人參吳茱萸湯洗焙乾惡實炒桂去皮檳榔三分銼芎藭赤茯苓柏子仁各一兩厚朴薑汁炙枳殼去瓤麩炒郁李仁湯浸去皮尖研牛膝酒浸切焙各一兩半杜仲去皮炙銼羌活各三兩上為末煉蜜為丸如梧桐子大每日空心以溫酒下三十丸不飲酒者橘皮湯下治腳氣風腫從足至膝脛腫滿連骨痛用蓖麻子葉切蒸薄裹日二三易即消導引法法云坐兩足長舒自縱身內氣向下使心內氣和適散然後屈一足安膝下努長舒一足仰取指向上便急仰眠頭不至席兩手急努向前頭向上努挽一時各各取勢來去二七遁互亦然去腳疼腰膊冷血冷風痹日日漸損又云覆臥旁視內踵主腰以鼻內氣自涵七息除腳中弦痛轉筋腳痠疼腳痹弱又云舒兩足坐散氣向湧泉可三通氣徹到始收右足屈卷將兩手急捉腳湧泉挽足踏物一時取勢手足用力逆氣向下三七不失氣數尋去腎中冷氣膝冷腳疼又云一足屈之足指抑使急一足安膝頭散心兩足跟出氣向下一手招膝頭向下急捺一手向後拓席一時極勢左右亦然二七去膝痹疼急又云一足踏地一足向後將足解谿安腨上急努兩手偏相向後側身如轉極勢二七左右亦然去足疼痛痹急腰痛
