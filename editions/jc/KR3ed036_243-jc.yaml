body:
  text: 卷二百四十三腳氣門腳氣緩弱附論夫腳氣緩弱者皆感於風毒所致初得此病多不即覺或先無他病而忽得之或因眾病後所得始得卻甚微飲食嬉戲氣力如故當熟察之其狀自膝至腳已有不仁或即痹或淫淫如蟲所緣或腳指及脛洒洒痠痛或屈弱不能行或微腫及酷冷或疼痛或緩縱或不遂或攣急或至困能飲食者或有不能者或見飲食而嘔吐惡聞食氣或有物如指發於腨腸徑上衝心氣上者或舉體轉筋或壯熱頭痛或胸心忪悸寢處不欲見明或腹內苦痛而兼下者或言語錯亂有妄誤者或眼濁精神昏憒此皆病之證若治之稍緩便上入腹入腹或不腫胸脅氣滿便即殺人急者不全日緩者或一二三月初得此病宜速治之不同常病既入臟則難療也方天門冬煎方凡腳氣之疾皆由氣實而死終無一人以服藥致虛而殂故腳氣之人皆不得大補亦不可大瀉終不得畏虛故預止湯不服也如此者皆死不療憂恚積思喜怒悲歡復隨風濕結氣咳時嘔逆吐食以變大小便不利時泄利重下溺血上氣吐下乍寒乍熱臥不安席小便赤黃時時惡夢與死人共食飲入塚神室魂飛魄散筋極則傷肝傷肝則腰背相引難以俯仰氣極則傷肺傷肺則小便澀有血目不明髓極則陰痿不起住而不猝骨極則傷腎傷腎則短氣不可久立陰疼惡寒甚者卵縮陰下生瘡濕癢搔之不欲止汁出此皆為腎病甚者多遭風毒四肢頑痹手足浮腫名曰腳弱一名腳氣醫所不療此皆主之天門冬二斤半去心搗壓取令汁盡白蜜三斤煉枸杞根切三斤半淨洗水二石五斗煮取一斗三升澄清用蘇三斤煉生地黃切三斤半搗壓如天門冬法獐骨一具碎以水一石煮取五斗澄清用上納銅器中微火先煎門冬地黃汁減半乃合煎取大斗二斗下後散藥煎取一斗納銅器中重釜煎令隱掌可丸平旦空心酒服如梧桐子大二十丸稍加至五十丸擇四時王相日合之忌生冷醋滑雞豬魚蒜油麵蕪荑等散藥如下茯苓柏子仁白朮桂心葳蕤菖蒲遠志去心薯蕷人參石斛牛膝杜仲細辛澤瀉獨活蔓荊子枳實炙芎藭黃耆蓯蓉續斷狗脊黑者萆薢白芷巴戟五加皮覆盆子橘皮胡麻仁大豆卷各二兩甘草六兩炙薏苡仁一斤大棗一百枚煮作膏石楠三二兩茯神二兩蜀椒一兩炒出汗阿膠十兩炙鹿角膠五兩炙上搗篩內煎中有牛髓鹿髓各加三斤大佳小便澀去柏子仁加秦艽二兩乾地黃二兩陰痿失精去葳蕤加五味子二兩頭風去柏子仁加菊花二兩防風二兩小便利陰氣弱去細辛防風加山茱萸二兩腹中冷去防風加乾薑三二兩無他疾須依方合之凡此煎至九月下旬採藥立冬日合而服之至五月上旬止若十二月臘日合者經夏至七月下旬即服之若停經夏不壞當於舍北陰處入地深六尺填沙置藥沙中上加少土覆之即經夏不壞也女人先患熱者得服冷者勿服忌羊肉餳生菜生蔥醋物海藻菘菜桃李雀肉青魚酢等麻黃湯出海上方療惡風毒氣腳弱無力頑痹四肢不仁失音不能言語毒氣衝心有人病者但病相當即服此藥麻黃一兩去節防風二兩大棗二十枚劈白朮茯苓二兩升麻三二兩芎藭桂心芍藥黃芩麥門冬去心當歸甘草炙各二兩杏仁三十枚去皮尖上切以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗散之莫令見風忌海藻菘菜生蔥桃李雀肉酢物獨活湯出千金方獨活二四兩乾地黃二三兩芍藥二兩葛根二兩桂心二兩生薑五兩麻黃去節二兩甘草二三兩炙上切水八升酒二升煮取二升五合去滓分四服日三夜一犯之一世不愈忌海藻菘菜蔥蕪荑腳弱忌食瓠子蕺菜厚朴湯出千金方並治諸氣咳嗽逆氣喘嘔吐半夏七兩洗乾地黃一二兩生薑一斤吳茱萸二斤一方用三兩芎藭桂心厚朴炙芍藥當歸人參各一兩黃耆甘草炙各三兩上切以水二斗煮豬蹄一具取一斗二升去肥肉酒三升合煮取三升分四服如人行二十里久更進忌羊肉餳蕪荑蔥海藻菘菜風引獨活湯出海上方兼補方獨活四兩人參二兩附子一兩炮大豆二斤桂心防風芍藥黃耆乾薑當歸各二兩茯苓甘草炙各三兩升麻一兩半上切以水九升清酒三升合煮取三升半去滓分四服如相去二十里久更服忌海藻菘菜豬肉冷水生蔥酢物八風散出千金方療風虛面青黑土色不見日月光明腳氣痹弱面青黑主腎不見光明主肝補腎調治肝蓯蓉八分烏頭二分炮鍾乳粉四分研薯蕷續斷黃耆各四分麥門冬去心四分五味子二分澤瀉四分遠志皮去心四分細辛四分菟絲子十四分酒浸龍膽秦艽石葦去毛柏子仁牛膝杜仲菖蒲蛇床子山茱萸防風白朮乾薑甘草炙人參各五分石斛天雄各六分乾地黃茯苓萆薢各四分附子炮六分上加菊花十二分搗篩酒服方寸匕日三不知加至二匕忌豬肉冷水羊肉餳海藻菘菜蕪荑桃李雀肉酢物等內補秦艽石斛散出千金方治風濕虛腳弱手足拘攣疼痹不能行腳趺腫上膝小腹堅如繩約氣息如憂恚不能食飲者皆由五勞並七傷腎氣不足受風濕故也此方悉主之石斛附子天雄桂心獨活各一兩天門冬一兩秦艽烏頭人參乾薑當歸防風杜仲各二三十銖山茱萸莽草桔梗細辛麻黃前胡五味子各十八銖蜀椒白芷白朮各半兩上治下篩酒服方寸匕日再不知稍增至二匕虛人三建皆炮實人生用風氣者本因腎氣虛既得病後毒氣外滿則灸泄其氣內滿則藥驅之當其救急理必如此至於風消退回體虛弱餘毒未除不可便止服此推陳致新極良此既人情可解無可疑焉側子酒療腳氣不隨側子四兩炮生石斛碎三兩磁石八兩獨活三兩秦艽三兩甘草三兩炙紫蘇莖一握前胡四兩防風三兩茯苓八兩黃芩三兩五味子四兩防己三兩桂心三兩丹參三兩蜀椒三二兩炒出汗山茱萸四兩碎芎藭二兩細辛二兩當歸二三兩白朮四兩乾薑三兩薏苡仁一升三合上薄切以絹袋盛清酒四升浸五日一服四合日再細細加至八九合溫飲慎生冷豬肉蒜面其中間覺熱渴得飲豉酒豉仍須蒸暴之忌海藻菘菜桃李雀肉生蔥生菜及醋物等煮散地骨白皮十二分麻黃六分去節杏仁八分去皮尖兩仁防己二十分黃芩十分細辛五分薏苡仁二十分羚羊角屑八分茯苓十二分澤瀉六分生石斛二十分人參六分白朮十分大黃六分磁石二十分丹參十分犀角屑八分蒺藜子十二分甘草十分炙桂心六分生薑十二分前胡八分上粗搗篩度覺使極調三兩為一劑以後藥汁二升煮取一升頓服之日服一劑以小便利為度忌海澡菘菜生蔥桃李雀肉醋物等小飲子法大棗五枚掰桑根白皮五兩白前二兩橘皮二分上切以水五升煮取二升將煮前散慎如藥法煮散療腳氣經春夏及秋腳弱或腫氣時上衝心身體痹悶者獨活茯苓牛膝漢防己白朮黃耆麻黃去節柴胡各六兩當歸防風橘皮桂心人參各四兩附子三兩生用磁石十六兩碎如豆羚羊角三兩屑生薑杏仁半夏洗吳茱萸檳榔碎丹參八兩上件諸藥不著分兩自隨時加減餘二十物切如豆分作三十貼每貼著生薑一兩合皮碎切杏仁十四枚去皮尖碎以水二升煮取七合去滓頓服之日一服或二日一服冷多加吳茱萸半兩熱多加麥門冬半兩大熱以竹瀝一升代水嘔逆食不下加半夏一兩毒悶加青木香二分以意消息之患人大便難加大黃半兩脹滿食不消加檳榔三二枚所加藥病痊即止不常服忌豬肉冷水羊肉餳生蔥桃李雀肉酢物又方療諸腳氣弱未至大發尋常服獨活漢防己麻黃去節茯苓丹參牛膝各六兩磁石十六兩碎黃耆防風人參犀角各六兩升麻青木香桂心各四兩石膏十四兩碎吳茱萸八兩生薑半夏洗檳榔大者杏仁大黃各二兩上將十六物搗切如豆分作三十分分和為一服服以檳榔三枚生薑二一兩合皮切杏仁十四枚去皮尖以水二升三合煮取七合去滓日晚或夜中服之日一服若氣盛時日二服亦可尋常或二日一服或三日一服若心下嘔逆者加半夏一兩嘔定止若大便澀者可去磁石加大黃一兩大便利即停忌生蔥醋物羊肉餳等物防己散治腳氣緩弱頑痹心神煩悶言語蹇澀不欲飲食漢防己一兩麻黃一兩去根節赤茯苓一兩丹參一兩牛膝一兩去苗獨活一兩黃耆一兩銼防風一兩去蘆頭人參半兩去蘆頭犀角屑一兩木香半兩桂心一兩石膏一兩半夏半兩湯浸去滑川大黃半兩碎微炒杏仁一兩湯浸去皮尖雙仁麩炒微黃桑白皮一兩銼附子一兩炮裂去皮臍枳殼半兩去瓤麩炒微黃上為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候溫服風緩湯治腳氣弱體痹不仁毒氣上入臟胸中滿塞不通食輒吐失味獨活甘草石膏各三兩羚羊角犀角各半兩麻黃防風當歸升麻橘皮吳茱萸桂心半夏鱉甲各二兩枳實一兩生薑六兩大棗二十枚貝齒七枚烏頭一兩一作烏梅七枚上㕮咀以水一斗四升煮取四升一服一升若有少許熱者加乾地黃二兩黑虎丹治腳氣筋骨軟弱步履不隨白朮五加皮肉桂各半兩檳榔黑小豆半升川烏黃耆白茯苓赤芍藥杜仲各一兩半附子熟地黃烏藥各一兩生蒼朮羌活當歸川牛膝虎脛骨白蒺藜各半兩上為末麵糊丸如梧桐子大每服五十丸空心鹽酒下天雄散治腳氣緩弱頑痹行立無力天雄半兩炮去皮臍羌活半兩木香半兩川大黃三分銼碎微炒大麻仁三分桂心半兩訶黎勒皮三分枳殼三分麩炒微黃去瓤青橘皮半兩湯浸去白瓤焙萆薢三分銼防風三分去蘆頭獨活三分芎藭三分山茱萸二分桑白皮一兩銼大腹皮一兩銼漢防己半兩檳榔三分郁李仁一兩浸去皮炒上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服術膏酒治腳氣弱風虛五勞七傷萬病皆主之方生白朮洗淨一石五斗搗取汁三斗煎取半青竹三十束束別三尺圍各長二尺五寸徑一寸燒取瀝三斗煎取半蔓荊二十五束束別三尺圍各長二尺五寸徑頭二寸燒取瀝三斗煎取半生五加皮根三十六斤淨洗訖銼於大釜內以水四石煎之去滓澄清取汁七斗以銅器中盛大釜內水上煎之取汁三斗五升其煎諸藥法一準五加例生地黃根五六斗粗大者搗取汁三斗煎取半上白朮等五種藥總計得汁九斗五升加糯米一石五斗上小麥曲八斤曝乾為末以藥汁六斗浸面五日待曲起第一投淨淘米七斗令得三十遍下米置淨席上以生布拭之勿令不淨然後炊之下饙以余藥汁浸饙調強弱更蒸之待饙上痂生然後下於席上調強弱冷熱如常釀酒法醞之甕中密蓋頭三日然後第二投更淘米四斗一如前法投之三日後即加藥如下桂心甘草白芷細辛防風當歸麻黃芎藭各六兩附子五兩牛膝九兩乾薑五加皮各一斤上㕮咀訖第三投以米四斗淨淘如前法還以余汁燒饙重蒸待上生痂下置席上調冷熱如常釀法和上件藥投之三日外然後嘗甘苦得中訖密封頭二七日乃壓取清酒一服四合日再服細細加以知為度溫酒不得過熱慎生冷醋滑豬鯉魚蒜牛肉等神驗防風湯療腳弱防風二兩獨活二兩黃芩二兩茵芋二兩葛根二兩芎藭二兩細辛一兩蜀椒一兩炒出汗防己一兩桂心一兩芍藥一二兩麻黃一兩去節石膏一兩碎生薑三兩烏頭三枚炮茯苓三兩甘草二兩上切以竹瀝一斗煮取四升去滓分六服一日一夜服盡其間可常作赤小豆飲有人腳弱先常服竹瀝湯四劑未覺增損作此方後覺得力云脈沉細駃風在內者作此湯也忌海藻菘菜醋物冷水生蔥生菜等防風湯出千金方治肢體虛風微痙發熱肢節不隨恍惚狂言時不自覺誤南方之僧法存所用此多得力溫和不損人為勝續命越婢風引等湯亦治腳弱甚良羅廣州一門及南州土人常用此方防風麻