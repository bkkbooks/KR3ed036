耆胡洽云南方治腳氣弱與此別添用升麻一兩半夏芍藥各二兩合十三味本只有一十味減當歸石斛名小風引湯刪繁方無石斛以療肉極寒肌肉變舌痿名曰惡風甘草湯出千金方治腳弱舉身浮腫反胃食谷吐逆胸中氣結不安而寒熱下利不止小便難服此湯即愈甘草人參各一兩半夏一升桂心蜀椒各三兩小麥八合大棗二十枚生薑八兩吳茱萸二升上㕮咀以水一斗三升煮小麥取一斗去麥納諸藥煮取三升分為六服加味四斤丸出濟生丸治肝腎俱虛精血不足足膝疲弱步履無力如受風寒濕氣以致腳痛腳弱者宜服之虎脛骨酥炙二兩宣木瓜一個去皮瓤蒸天麻肉蓯蓉酒潤焙川烏各一兩川牛膝一兩半酒浸沒藥乳香各半兩上為細末入木瓜膏杵和入少酒糊為丸如梧桐子大每服七十丸空心溫酒鹽湯任下食前牛膝丸治下經氣弱風濕毒氣與氣血相搏皮膚不仁足痛不能履地上攻眼目迎風淚出牛膝酒浸焙乾山茱萸各一兩半防風去叉羌活去蘆頭烏頭炮裂去皮臍各一兩芎藭地龍去土炒檳榔銼各半兩上為細末酒煮麵糊丸如梧桐子大每服二十丸鹽湯下空心食前服五獸三匱丹出醫方大成治因氣血耗損肝腎不足兩腳痿弱鹿茸酥炙麒麟蠍即草蠍也虎脛骨酥油炙牛膝去蘆酒浸狗脊赤草根也燎去毛各等分以上五味修合為末即五獸丹料也辰砂一兩為末附子大者一枚生去皮臍割旋中心空入辰砂於內宣木瓜一枚剜去心刀薄去皮入上附子於以旋附子末蓋附子口正坐於銀暖罐內重湯蒸十分爛附子白為度即三匱丹也上用三匱丹研成膏調前五獸丹末為丸如雞頭大以木瓜酒或降氣湯下屢傳人家無不效患不再發若無腳氣隻手腳弱而無力者服之尤佳更以分腳氣之要言之風寒濕三毒各隨所喜而入風喜入肝病多在筋濕喜入脾病多在肉寒喜入腎病多在骨推類治之亦思過半矣籲願為良醬力學者當在乎致知致知當在乎格物物不格則知不至若曰只循世俗眾人耳聞目見謂之知君子謂之不知也羌活湯治腳弱及中風緩弱羌活去蘆頭五兩葛根銼桂去粗皮半夏湯浸去滑焙各四兩乾薑炮三兩防風去叉一兩去蘆甘草炙銼二兩上為散每服五錢水一盞半煎至一盞去滓溫服空心至日午再服日三服越婢湯出直指方療風腳痹弱兼治肉極熱則身體精脫腠理開汗大泄利風氣下焦腳弱麻黃六兩去節石膏半斤碎白朮四兩大附子一枚炮生薑三兩大棗十五枚掰甘草二兩炙上切以水七升先煮麻黃候沸掠去上沫納諸藥煮取二升分三服覆取汗一方用附子二枚忌海藻菘菜豬肉冷水桃李雀肉等黑豆煎出聖惠方治腳氣緩弱無力不能行步黑豆三升附子三兩生用去皮臍天雄二兩生用去皮臍以上三味用水一斗同煮候豆爛熟即出薄切焙乾去豆用豆汁天麻二兩五加皮二兩牛膝二兩去苗威靈仙二兩上為細末入豆汁中煎如稀餳每於食前以溫酒調半匙服枳實湯治風毒心腹虛脹腳氣痹弱不能行步枳實去瓤麩炒草豆蔻杉木節銼大腹銼青橘皮湯浸去白取焙白朮各一兩上為散每服五錢水一盞半入生薑三片煎至一盞去滓食前溫服日三三聖散出仁存方治手足拘攣口眼喎斜左癱右瘓骨筋疼痛腳弱無力行步不正亦服之當歸酒浸肉桂玄胡索炒上等分為末每服二錢溫酒調下臨臥日進三服除孕婦外老幼皆可服湘中黃槐卿父子三世用此二藥功效甚多乳煎硫黃散出肘後方治腳氣久虛緩弱黃牛乳三升硫黃研如粉一兩上先將牛乳煎令減半每服以乳五合入硫黃末二錢調和服之服畢宜厚以衣被覆臥取汗勿令見風午時日晡各再一服得汗不用再服若病未痊三五日可再服無牛乳羊乳亦可獨活酒出聖惠方治腳氣久虛脈沉細緩弱附子炮裂去皮臍用二兩半獨活去蘆頭二兩半上銼如麻豆大盛以酒袋納瓷瓶中以醇酒五升浸密封三日後旋取從一合飲之加至服半盞長令體中酒氣相接未效再服以瘥為度柳白皮湯治風氣緩弱疼痹腫滿用柳白皮三升細銼如棋子大以水一石煎取六斗取一小甕子可受一石者納湯甕中以兩木橫甕底腳踏其上湯不得過三里穴如此三度即消如浸時使湯常熱佳食慄方一名防腳氣法治腳氣風痹緩弱腎虛腰腳無力用生栗子每日二十三顆食之次食豬腎粥佳松葉酒出千金方治腳弱十二風痹不能行服更生散數劑及眾治不得力服此一劑便能行遠不過兩劑愈用松葉六十斤㕮咀以水四石煮取四斗九升以釀五斗米如常法別煮松葉汁以漬米並饙飯泥釀封頭七日發澄飲之取醉得此力者甚眾神妙單服松脂散出千金方治一切風及大風腳弱風痹方熏陸法亦同用松脂三十斤以棕皮袋盛系頭鐺底布竹木置袋於上以石五顆壓之下水於鐺中令蒲煮之膏浮出得盡以後量更三十沸接置於冷水中易袋洗鍋更洗煮如此九遍藥成搗篩為散以粗羅下之用酒服方寸匕日二初和藥以冷酒調藥入服後飲熱酒行藥以知為度如覺熱即減不減令人大小便秘澀若澀宜食蔥羹仍自不通宜服生地黃汁微取泄利除忌大麻子以外無所忌禁若欲斷根加茯苓與松脂等分蜜和為丸但食淡面餺飥日兩度只食一小碗勿多食也作餺飥法硬和麵熟接煮五十沸漉出冷水淘更置湯中煮十餘沸然後漉出食之服松脂三十日後即覺有驗兩腳似有水流下是效如恐秘澀和一斤松脂茯苓與棗慄許大酥即不澀服經一百日後腳氣當愈仙經云服松脂一年增尋一年服二年增壽二年及服之十年則增壽十年凡合酒法皆薄切藥以絹袋盛之內酒中密封頭春夏四五日秋冬七八日皆以浸足為度去滓服酒盡後其滓搗酒服方寸匕日三服大法冬宜服酒至立春宜停立效丹出百一選方治腳緩弱及膝弱甚者紹興府戒珠寺一僧病數十年不能行服此藥而愈亨老亦傳此方以附子用麵裹煨熟去皮臍蔥自然汁丸如梧桐子大每服五六十丸空心煎蔥白湯酒下吃少溫粥蒸餅壓之一方用生附子以蔥涎和丸溫酒鹽湯下十五丸至二十丸治暴腳弱疼用赤蓼燒灰淋汁浸以蒸桑葉立愈一方煮湯淋洗治暴腳軟疼用樟柳根細切如小豆大煮令熱更入綠豆爛煮為飯每日如此服餌以差為度療腳氣屈弱若田舍貧家無藥者可釀菝葜及松節酒皆善出肘後方用菝葜一斛淨洗銼之以水三斛煮取九斗以漬曲又以水二斛煮滓取一斛以漬飯釀之如酒發熱沛取飲隨意多少若用松節及葉亦准此法其汁不厭多也患腳氣屈弱積年不能行腰脊攣痹及腹內堅結者服之不過三五劑皆平復如常神效烏附蓯蓉丸治腿腳無力大壯筋骨人參當歸乳香各半兩沒藥丁香菟絲子各兩半自然銅一兩火煅虎脛骨半兩火煅古老錢十二文醋淬川牛膝白膠香龍骨煅木香蓯蓉訶子蓖麻川烏半兩敗龜二兩五靈脂何首烏川芎五味子五倍子赤芍藥黑附子炮金銀根桑螵蛸各半兩檳榔二錢半縮砂木鱉子川楝子各半兩硃砂二錢半破故紙地龍葫蘆巴巴戟骨碎補威靈仙各一兩上為細末醋打麵糊為丸如梧桐子大每服三十丸鹽湯送下枳實散治腳氣緩弱上氣𤸷痹脹滿不能食枳實去瓤麩炒黃二兩桂皮去粗皮二兩白朮赤茯苓去黑皮各三分上為細末每服三錢匕空心以溫酒調服近晚再服豉湯治腳氣緩弱疼痹腫滿豉三升蜀椒一升生用生薑和皮銼二斤上以水一斗五升煮一沸貯在小甕子中著二小木橫甕下腳踏木上湯不得過三里穴以故衣塞甕口勿令通氣微著糠火燒勿令甕冷使湯常熱歇令片時浸腳丫急將綿衣蓋兩腳令暖勿令觸冷風臨臥浸之佳牛膝湯治腳氣手足緩弱膝疼痹上熱下冷或時心悶或嘔吐牛膝去苗酒浸焙銼萆薢麥門冬去心焙乾赤茯苓去黑皮黃耆銼炒芎藭防風去叉丹參各一兩半重陳橘皮湯浸去白焙人參附子炮裂去皮臍獨活去蘆頭桂去粗皮各五兩甘草炙銼當歸切焙各四兩杏仁湯退去皮尖雙仁炒黃十五枚上銼如麻豆每服五錢水一盞半生薑一分拍碎同煎至一盞去滓溫服不拘時日三服附子膏出聖惠方治腳氣風毒疼痛乃緩弱無力附子二兩吳茱萸川椒各一兩白芷二兩前胡一兩芎藭白朮桂心各一兩當歸二兩細辛漢防己各一兩上件藥細銼用綿裹以醋二升漬一宿用豬脂三斤慢火煎令藥色黃膏成絞去滓盛瓷閤中每取摩所患處嘉禾散出如宜方治腳氣皆因脾胃虧損血弱筋虛因四氣或因飲食而發枇杷葉薏苡仁茯苓人參縮砂仁甘草炙各二兩杜仲石斛隨風子木香藿香沉香陳皮制各二錢穀芽桑白皮白豆蔻青皮各半兩半夏制神麯各一錢五味子檳榔各半兩白朮一兩丁香半兩上㕮咀薑棗煎療血虛入乾柿一枚煎療氣膈吐逆入韭白煎療胃弱夜叉丸出澹寮方川烏大者二兩切作片子用捶碎大蒜一枚烏豆半兩同煮豆熟為度留汁用青鹽一兩蒼朮一兩連須蔥白一束研爛同汁浸一夕上同為細末好谷醋同煎煮豆汁為丸梧桐子大每服三十丸木瓜鹽酒空心下治久患腳氣不曾寧息膝痛筋寒步履疼朮附木香加倍飲石楠數服有神功用白朮附子木香加倍飲石楠丸數服有神效療久年腳氣或老年膝疼不能行步者用局方術附湯倍用附子加木香一錢水三盞生薑五片木瓜三片煎取一盞二分去滓送下局方石楠丸五十粒數服立愈或元氣弱者煎前飲子送下震靈丹十粒治腳痛緩弱患在風濕熱風證出直指方以烏藥順氣散加麻黃白芷主之濕證以金不換正氣散加茯苓生乾薑主之七枚有功容易事也煮肝散出德生堂方治肝痿腳弱及傷寒手足干小不隨軟不可行紫菀桔梗蒼朮芍藥各一兩上為細末每服四錢羊肝半斤大竹刀切犯水勿令血散入鹽醋蔥姜酒同煮熟空心日進三服此藥見其肉生一兩日間生及復舊亦東坡先生家藏方得效有名姓者甚多橘皮丸出指南方治膝脛痿弱橘皮不以多少淨去枝梗日曬乾上為末煉蜜丸如梧桐子大每服三十丸薑湯下烏頭銼散出指南方治膝脛痿弱川烏生官桂川椒各一兩蔥二莖上為銼散水一斗煮五升乘熱蒸氣先熏以衣覆之勿泄氣候可通手淋渫洗之續斷丸出指南方治膝脛痿弱洗後覺無力者宜之續斷杵去筋石楠茵芋各三兩附子半兩乾地黃三兩上為末酒糊丸梧桐子大每服三十丸食前用米飲下大鱉甲散出指南方治膝腳內實腫疼大便不通者宜下鱉甲二兩防風麻黃白朮石膏知母升麻茯苓橘皮川芎杏仁人參半夏當歸芍藥甘草葳蕤麥門冬各一兩大黃吳茱萸赤小豆各一兩犀角木香雄黃各半兩羚羊角一分川烏頭貝齒各七個上為粗末每服五錢水二盞姜五片棗一枚韭白一束煎一盞去滓入麝香少許攪勻溫服椒仁丸出指南方治膝脛痿弱胸中痞悶小便不通正宜服椒仁商陸橘皮桑白皮等分上為細末麵糊為丸如梧桐子大米飲下三十丸以通為度檳榔丸出指南方治服藥之後痿痹漸退但微痛者宜之檳榔芎藭等分上為細末煉蜜丸如梧桐子大每服三十丸薑湯下以大便通為度鹿茸丸出指南方治嗜欲太甚膝脛疼弱鹿茸五兩乾地黃菟絲子牛膝各二兩萆薢一兩附子半兩乾漆半兩炒煙盡上為細末酒糊丸如梧桐子大每服三十丸用米飲下黃耆散出指南方治膝脛腫按之沒指時時痛癢漸生瘡瘍黃耆枳實各一兩土蒺藜赤小豆各二兩甘草半兩上為細末每服二錢米飲調下療腳弱出本草以孔公柏搗末酒浸飲下治腳弱出本草以松節浸酒服之愈腳氣痹攣附論夫腳氣痹攣者由風寒濕三氣並客於分肉之間真氣不周故為痹也其風氣最多則腫為行痹走無常處其寒多者則為痛痹其濕多者則為著痹冷而無汗濡也