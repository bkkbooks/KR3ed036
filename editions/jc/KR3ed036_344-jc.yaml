涉險若偶然胎不安腰痛者須服安胎藥一二服得安即止又云生產雖然觸穢排次須要在先入月一日貼產圖並日遊胎殺所在並借地法於妊婦房內北壁上仍依位設床帳厚鋪茵蓐周密使無孔竅夏月亦鋪厚薦用好油單薄席紗帳以備之常焚香令潔淨備辦湯藥器物既覺欲產不得喧鬧人多雜亂大小愴惶驚動產婦宜預擇年高歷練坐婆一人並穩當曾經慣習婦人一兩人扶持不得揮霍恐產婦憂驚又忌閒雜外人並喪孝觸穢之人看視切不得驚動傷早若坐婆拙不能體候胎氣方轉動之際便為欲生多端下手驚動傷早則橫倒之憂從此而致也產寶方云妊婦欲產腹雖痛而腰不甚痛者未產也且令扶行熟忍如行不得則憑物扶立行得即行或衣漿先下然後作陣若腹痛眼中如火生此是胎離腎經兒逼產門也即取藥一二服即扶上蓐草切不可坐草早務要產婦用力存養調停須令坐婆先說論之如覺心中煩悶可取白蜜一匙用新汲水調下或覺飢即吃軟飯或粥少許亦須預備勿令飢渴恐產婦無力困乏也若不飢渴亦不須強食大凡生產自有時候不可強服催生滑胎等藥或因坐草早勢不獲已則服之若無事強服恐變生他疾又須戒之若妊娠已滿十月形體成就神識咸備分氣趨產宜服滑胎湯藥凡婦人妊娠入月不可沐頭使冷氣流於足太陽之經多令子橫逆不順戒之戒之夫人之受胎陰注陽生造物已有分定豈容置一毫人力於其間耶竊聞有以命書究其吉凶克害臨產之際私心意謂時乖故不令坐草驀遇胎轉便為時良催發坐草急產意在迎就好時而避惡時殊不知妊婦欲產不得產未當產而強取生以致蹉跌逼迫使產母不勝痛憤而失全生豈有巢毀卵不破乎又如愛指失掌掌既已失指何存焉世之評命書者心雖自愧不可追悔但以數終藉初舉之意而殞者只得聽其不幸哀哉大凡懷孕雖云十月之胎亦有七八月而先產者或過月而方生者如堯母妊十四個月乃娠婦稟受氣血壯弱之不同蓋猶命書所謂五行欲其自足勿用胎元者是也且晝夜十二時分作百刻人之氣息一萬三千五百呼吸之間便生賢愚安可力取時之好惡而避貧奪富哉然命書曰人之在幼禍福未萌當考目擊之端倪驗作他年之證兆是已生之人猶不可前知休咎況以未生之子伺候好時預定貴賤可乎若如所欲則是不由造物而反由人嗜命書者故當窮其造物限量之數察其天地盈縮之理無以偏見而枉殺人胡不聞窮婦偷生而獲康寧者乎蓋無他阻傷故得任情性生於自然也今若以誠言切宜戒若以為狂言只聽其自為之且聞之者尚不寒而慄奈母子何為之者後雖悟歿於非命然已獲殺人之過陰譴亦自難逃餘切思之可謂恩生於害而恩未生則害先至矣籲可畏哉婦人產乳忌反支月若值此月當在牛皮上苫灰上勿令水血惡物著地殺人及浣濯衣水皆以器盛過此忌月乃止凡生產不依產圖脫有犯觸於後母子皆死若不至死即母子俱病諸事皆不稱心若能依圖無所犯觸母即無病子亦易養凡欲產時忌多人瞻視惟得三二人在旁總待產訖方可告諸人也若人眾視看無不難產凡產婦第一不得匆匆忙忙旁人極須穩審皆不得預緩預急及憂悒憂悒則難產若腹痛眼中火生此兒迴轉未即生也兒出脫一切人及母皆忌問是男是女始落地即急取口中惡物與新汲水五合咽忌與暖湯物勿令母看視穢物凡產婦戒食熱藥麵食當識此飲食當如人肌溫溫也又云胎神逐月所值方位不可修造正月在床二月在戶三月在門四月在灶五月在身六月在灶七月在房八月在廁九月在門十月在戶十一月在身十二月在床臨月產室貴乎無風不可太暖暖則生風汗出腠理開便中風昏冒而不知人急服愈風散繼以交加散服後以右手搔頭大豆紫蘇湯獨活湯皆可收生傷胎者蓋婦人臨產之時必召穩媼三人其二媼極拽婦之臂其一媼頭抵婦之腹中兩手扳其腰極力為之胎死於腹良久乃下兒亦如血乃媼婦殺之也豈知瓜熟自落何必如此乎於是因茲經脈斷閉腹如刀刺大渴不止小便悶絕主病者禁水不與飲口舌枯燥牙齒黧黑臭不可聞食飲不下昏憒欲死宜先以冰雪水恣意飲之約二升許痛緩渴止次以舟車丸通經散前後五六服下數十行食大進乃以桂苓甘露散六一散柴胡飲子調之則安又有一婦患似前證急取秤鉤續以壯繩以膏塗其鉤令其母兩足向外偃坐左右各一人腳上立足次以鉤其死胎命一壯力婦人咬牙拽出死胎下敗血五七升其母昏困不省待少頃以新汲水灌之漸咽二日大醒食進次日服四物湯血止數日方愈凡婦人產前或煩渴欲水吃者不若飲米飲為佳月空方位略逐月安產藏衣忌向方位略安產藏衣十三神吉凶方位略安床帳藏衣及藏穢物法略十二月產圖略推婦人行年法第一略產婦推行年法十三歲至四十九歲略入月預備藥物保氣散佛手散枳殼散神寢丸保生丸榆白皮散催生丹黑神散花蕊石散大聖散黑龍丹催生符葵子黃連竹茹烏梅海馬雌雄石燕理中丸棗子陳皮延胡索桑寄生夜合枝蒲黃紅藍花桂心蛇蛻半夏白朮茯苓人參甘草補骨脂羚羊角當歸赤芍藥神麯牡丹枳殼竹瀝枳實細辛鯉魚鱗灰羌活麝香桃仁狗膽郁李仁亂髮灰杏仁童子小便瞿麥蘄艾水銀沒藥川芒硝麒麟竭防風豆豉琥珀秤錘桑根白皮酸醋木通芎藭無灰酒乾薑川升麻紫葛荷葉虎脛骨香墨紅花子生地黃白蜜羖羊角蘇方木熟硃砂劉寄奴羚羊角灰以上藥妊娠三數月即須求覓各州土上好者曬曝收拾一一題記分明置一靜處恐臨時忙迫不可卒求更宜細審勿令錯用生地黃肥好者窖之生母姜略點收生藕和本泥收濕處雞子𤺌中收酸頭糠醋煎三四沸干瓶盛之黑豆揀之布拭用紙袋貯一斗艾上件藥入月一日皆須收足產婦雜要物白米煮粥砂瓶煎藥爐銚子醋炭盆湯瓶軟硬炭洗兒頭發肥皂臥交椅子斷臍綿及剪刀斷臍本不用刀只用帛裹或牙齧斷燈籠火把繳巾油燭發燭燈心小石子三五十顆貯一筐子中臨產燒下沃醋兩盆子盛更置產婦面前醋氣必須猛烈無小石以小磚子代之搘床頭磚八塊一臘取一塊止三臘恐臨時半難求覓盛衣瓶葫蘆尤好洗兒盆大書字號雜用盆乾柴竹並茅砂盆雜席蒲盒各一項濾藥布絞地黃汁布新柳木米錘碎暖水釜五斗以上者泥在近處入月後晝夜須要暖水軟厚氈半領干蓐草採二三束干馬糞石余欲產布放地蓐大妙馬皮一張鋪馬糞上馬銜一具臨產執之產下去之赤馬通每日收不用幹者童子小便三升產婦入月切不得飲酒恐臨產心神昏亂亦不得驚動恐未及產時左右驅使人亦不可吃酒入月門前不得停留形跡客宿上已前貯備頗為猥細若言所切無過於斯通識者方驗其不可忽略也入月安產圖略日曆法略推日遊法略安置產婦法略逐日產母生子宜向方略胎殺避忌產前將護法略逐日日遊神略月遊胎殺略體玄子借地法略十干日遊胎殺略產婦衣色及首指並起日法略十二支日遊胎殺略禳謝法略六甲旬遊胎殺略禁草法略孕婦藥忌歌蚖斑水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類烏喙側子及虻蟲牛黃水銀並巴豆大戟蛇蛻及蜈蚣牛膝藜蘆兼薏苡金石錫粉及雌雄牙樸芒硝牡丹桂蜥蜴飛生及䗪蟲代赭蚱蟬胡粉麝芫花薇蓹草三稜槐子牽牛並皂角桃仁蠐螬和茅根欓根硇砂與乾漆亭長溲疏𦬣草中瞿麥䕡茹蟹爪甲蝟皮鬼箭赤頭紅馬刀石蠶衣魚等半夏南星通草同乾薑蒜雞及雞子驢肉兔肉不須供切忌婦人產前用此歌宜記在心胸禁水法略產前將護法按諸家產論云凡產婦入月忌飲酒產時心神昏亂臨產之時不可令旁人喧擾大小匆忙慮致驚動產母只可令熟事產婆及穩當謹慎老成親密三兩人扶持產母初覺腹痛且宜任意坐臥勉強飲食恐致臨產氣力虛羸若腹痛漸甚唯且熟忍仍可按節次漸服滑胎榆白皮散一二服服藥之法慎勿太早須得其時又旁人不得逼迫且須令人扶策徐徐而行若行步稍難即憑物而立須臾扶策再行直至腹痛連腰相引陣痛頻時即服催生丹一服更且勉強扶行陣痛轉甚難以行立認是產時將至即服催生符畢然後安詳上草上草之時慎勿傷早若太早則子在腹中難以轉側又須仔細體候直待兒逼欲生然後令抱腰也抱腰之人不得傾斜則兒得順其理自然易產也又有臥產者亦待臥定背平著席體不傴曲則子不失其道苟或不能依此節適必致產難縱或倖免必須變生諸疾產後將護法按經云婦人非止臨產須憂至於產後大須將理慎勿以產時無他乃縱心恣意無所不犯犯時微若秋毫感病重於嵩岳且才得分娩切忌問是男是女看血下多少隨證服壓血運藥良久吃粥服四順理中丸便令人從心下按至臍腹日五七次若有疾證即隨證服藥粥藥相間頻頻飲餌宜閉目而坐背後倚物左右肩承常令直立兩膝雖時眠睡頻令喚覺須過一復時方得上床亦須立膝高榰床頭厚鋪裀褥遮圍四面窒塞孔隙以御賊風一臘之內常開醋煙以防暈悶一臘之後漸加滋味或以羊肉及雌雞煮取濃汁作糜粥直至百晬常服當歸丸當歸建中湯四順理中丸日各一兩服以養臟氣補血脈兩臘之後方得食糜爛肉食滿月之內尤忌任意飲食觸冒風寒恣情喜怒梳頭用力高聲作勞工巧之類及上廁便溺如此節養將攝以至百日始得氣血和調腑臟平復設不依此即致產後余疾
