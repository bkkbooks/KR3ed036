body:
  text: 卷九十六諸風門風痙附論夫太陽中風重感於寒濕則變痙也痙者口噤不開背強而直如發癇之狀搖頭馬鳴腰反折須臾十發氣息如絕汗出如雨時有脫易得之者新產婦人及金瘡血脈虛竭小兒臍風大人涼濕得痙風者皆死溫病熱盛入腎小兒癇熱盛皆痙痙喑厥癲皆相似久厥成癲宜審察之其重者患者耳中策策痛皆風入腎經中也不治流入腎則喜卒然體痙直如死皆宜服小續命湯兩三劑也若耳痛腫成塊生汁作癰癤者乃無害也惟風宜防耳針耳前動脈及風府神良方牛黃丸出聖惠方治風痙身體強直牙關緊急心神昏昧牛黃細研麝香細研龍腦細研各一分硃砂細研水飛過三分白殭蠶微炒鹿角膠搗碎炒令黃燥各半兩白花蛇酒浸炙去皮骨二兩白附子炮裂天麻白蒺藜微炒去刺赤茯苓白芷羌活獨活蔓荊子麻黃去根節漢防己木香檳榔藁本防風去蘆頭乾蠍微炒當歸銼微炒各一兩上為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒研下十丸天麻丸出聖惠方治風痙四肢強硬口噤不開天麻烏蛇酒浸炙微黃去皮骨各二兩白殭蠶微炒桂心防風去蘆頭蟬殼川烏頭炮裂去皮臍白附子炮裂羌活細辛獨活各三分附子炮裂去皮臍羚羊角屑各一兩乾薑炮製銼天南星炮製各半兩麻黃去根節一兩半乾蠍微炒三分上為末煉蜜和搗三五百杵丸如酸棗大每服不計時候以溫酒研下一丸麻黃散出聖惠方治風痙身體強直口噤不能言神思昏悶麻黃去根節羌活附子炮裂去皮臍赤茯苓芎藭各三分桂心黃芩羚羊角屑蔓荊子酸棗仁各半兩防風去蘆頭一分甘草炙微赤銼半兩上搗篩為散每服四錢以水一中盞煎至五分去滓入淡竹瀝一合更煎一兩沸不計時候溫服衣覆汗出避風白附子丸出聖惠方治風痙口噤身體強直迷悶不識人白附子炮裂白殭蠶微炒麻黃去根節防風去蘆頭麝香細研各一兩膩粉一分天南星炮裂羚羊角屑各三分白朮半兩赤箭白花蛇酒浸炙微黃去皮骨各二兩上為末入麝香膩粉研令無聲以糯米粥和搗三二百杵丸如梧桐子大每服不計時候以溫酒研下十丸麻黃湯出聖濟總錄治風痙身體強直口噤不知人事麻黃去節先煎掠去沫焙乾二兩甘草炙銼當歸焙黃芩去黑心各一分石膏搗碎一兩桂去粗皮芎藭乾薑炮各半兩附子炮去皮臍半兩杏仁湯浸去皮尖雙仁炒二十枚上銼如麻豆每服五錢匕水二盞煎至一盞去滓入荊瀝半合更同煎三五沸溫服日二夜一一方治風痱身體不能自收不能言語冒昧不知人者不用荊瀝每服六錢匕水三盞煎至一盞半去滓分溫二服空心夜臥各並二服初服一日猶能自覺者勿熱服服訖密室臥用厚衣覆微汗出漸減衣未汗出更用熱生薑稀粥投之汗出忌觸外風並治上氣咳逆若面目大腫但得坐不得臥凡產婦並病人已曾大汗者不可服若虛羸人但當少服天麻散出聖惠方治風痙口噤腰背強直不可轉側天麻獨活麻黃去根節各一兩半當歸銼微炒防風去蘆頭桂心細辛附子炮裂去皮臍蔓荊子各一兩上搗羅為散每服四錢以水酒各半中盞入生薑半分煎至五分去滓不計時候溫服天麻湯出聖濟總錄治風痙身如板直偏身硬強天麻半兩羌活去蘆頭人參桂去粗皮白朮麻黃去節先煎掠去沫焙乾杏仁湯浸去皮尖雙仁炒各一分附子炮裂去皮臍一枚上銼如麻豆每服五錢匕生薑一棗大水二盞煎至一盞去滓入酒半盞再煎一沸熱服服後以生薑稀粥投之取汗日二服續命湯出聖濟總錄治風痙口噤不開身背強直發如癇狀麻黃去根節先煮掠去沫焙獨活去蘆各一兩半升麻葛根銼各半兩羚羊角屑桂去粗皮各一兩防風去叉一兩半甘草炙銼一兩上㕮咀每服六錢匕水二盞浸一宿明旦煎取一盞去滓溫服衣覆避外風每年春分後常服二三劑即不患天行傷寒及諸風邪等疾甘草湯出聖濟總錄治風痙口噤不語肢體強直神識不明甘草炙一兩一分銼羌活去蘆一兩一分附子炮去皮臍半兩人參半兩防風去叉一兩上銼如麻豆每服四錢匕水一盞半入生地黃汁一合先同煎至八分去滓次入荊瀝竹瀝各半合同煎三沸溫服日夜各一服附子湯出聖濟總錄治風痙口噤不語身體強直附子炮去皮臍一分羌活去蘆頭防風去叉桂去粗皮各二兩上銼如麻豆每服五錢匕水二盞煎至一盞入竹瀝一合更煎三沸去滓溫服空心食前日二服羚羊角散出聖惠方治風痙口噤身體強直不知人事羚羊角屑附子炮裂去皮臍當歸銼微炒桂心防風去蘆頭阿膠搗碎炒令黃燥各一兩麻黃去根節天麻獨活各一兩半上搗羅為散每服四錢以水酒各一中盞煎至一盞三分去滓不計時候分溫二服當歸散出聖惠方治風痙搖頭口噤身體強直當歸銼微炒細辛防風去蘆頭桂心附子炮裂去皮臍薏苡仁芎藭各一兩獨活麻黃去根節各二兩上搗羅為散每服四錢以水酒各半中盞入生薑半分煎至五分去滓不計時候溫服蒼公當歸酒治風痙當歸防風各三兩獨活半兩麻黃一兩一分附子炮去皮臍上為末每服五錢水二盞煎一盞去滓溫服龍膽湯治五臟生風發痙日夜數十發者防風黃連草龍膽白殭蠶炒各半兩上為粗末每服五錢水二盞煎一盞去滓溫服承氣湯治剛痙大便不通十數日者厚朴四兩去皮姜二兩同搗爛焙乾大黃二兩枳實半兩麥麩炒去瓤芒硝一兩半上除芒硝外併為粗末每服十錢水二盞煎一盞半去滓入芒硝半錢匕攪勻再煎三兩沸微熱服療賊風痙出本草上以鐵屑炒使極熱用投酒中飲酒治中風痙通身拘急口噤不省人事婦人產後亦宜服之上用獨活一兩為末以酒一大盞煎至七分去滓入竹瀝一合分二服治中風痙口噤面青手足急強婦人產後亦宜服之上用竹瀝一升分為五服微溫頻服大效風痓附論夫風痓病者身熱足寒頭項強急惡寒時頭熱面青目脈赤獨頭動搖卒口噤背反張以發熱惡寒不惡寒有汗無汗分剛柔者風寒痓也脈沉細即為濕痓瘡傷未合風入為破傷風濕入為破傷濕二者害人最急倉卒不知其因甚難認癰疽瘰癧膿潰之後尤宜謹之太陽風痓證候始則發熱腹痛喘息涎浮次則牙緊頭搖十指微動漸加項背強直轉側不仁甚者昏困失音目睛直視滑泄不禁身腰反張如此則十不救一新產血虛汗出傷風亦作痓證凡產後發熱口苦舌謇唇急手指微動便急作風痓病療之方紫湯方治中風無問男子婦人中風脊急身痓如弓雞屎二升大豆一升防風三兩切上以水三升先煮防風取三合汁豆雞屎二物鐺中熬之令黃赤色用酒二升淋之去滓後用防風汁和分為再服相去如人行六七里衣覆取汗忌風大豆紫湯出聖惠方治風痓昏迷吐沫抽掣背脊強直產後中痓上用黑豆炒焦好酒淋之取清汁酒一盞獨活銼三錢煎七分溫服又連續進劑以瘥為度此湯大能去風消血結如妊娠折傷胎死腹中服此並瘥人為邪氣所幹則發而為病若氣若血若痰若水若風若寒若暑若濕腑臟表裡冷熱虛實各有受病之處用藥之法必究其原而後可以起病否則前賢所謂獵不知兔廣絡原野冀一人獲之術亦疏耳是可以人試伎乎哉一方用羌活得汗則愈歸荊湯出指南方治風痓昏迷吐沫抽掣背脊強直產中痓通用當歸荊芥穗各等分上為末每服二錢水一盞酒少許煎七分灌下如牙關緊用銅匙斡開以雞羽蘸藥入口或用童尿調下或以芎藭代當歸亦妙風角弓反張附論夫風角弓反張之狀腰背反折不能俯也由風邪客於諸陽之經邪正相搏風氣勝則筋脈縮急腰背反折如弓之形也方天麻丸一名朱附丸出聖惠方治中風角弓反張口噤不語四肢拘急並腎臟風毒攻注手足頑麻一切急風天麻白附子炮裂附子炮裂去皮臍牛膝去苗白殭蠶微炒羌活阿膠羚羊角屑防風去蘆頭各一兩天南星炮裂蟬殼硃砂細研各半兩膩粉麝香細研各一分乾蠍微炒半兩白花蛇酒浸去皮骨炙令微黃二兩上為末入研了藥令勻煉蜜和搗三二百杵丸如雞頭實大每服以生薑汁薄荷汁各少許入熱酒二合相和研下一丸不計時候頻服一方無薄荷汁犀角散出聖惠方治中風角弓反張心神煩亂口噤不語犀角屑麻黃去根節羌活附子炮裂去皮臍杏仁湯浸去皮尖雙仁麩炒各一兩防風去蘆頭桂心研白朮皮人參去蘆頭芎藭白茯苓細辛當歸各三分石膏二兩甘草炙微赤銼半兩上搗羅為散每服四錢以水一中盞入生薑半分煎至五分去滓入竹瀝一合更煎一兩沸不計時候溫服龍腦丸出聖惠方治中風身如角弓反張不語昏悶龍腦細研一錢麝香細研蟬殼牛黃研入各一分乾蠍微炒天南星炮裂硃砂細研阿膠搗碎炒令黃燥香墨白附子炮裂防風去蘆頭羚羊角屑肉桂去粗皮羌活各半兩烏蛇肉酒浸炙令微黃三分上為末入研了藥令勻煉蜜和搗三五百杵丸如綠豆大每服不計時候以溫酒研下十丸麻黃散出聖惠方治卒中風身如角弓反張口噤不語麻黃去根節石膏各二兩防風去蘆頭羚羊角屑獨活五味子前胡去蘆頭桂心附子炮裂去皮臍人參去蘆頭芎藭當歸甘草炙微赤銼杏仁湯浸去皮尖雙仁麩炒微黃各一兩上搗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服枸杞浸酒出聖濟總錄治中風身如角弓反張及婦人一切血風上攻下注若久服悅澤顏色滋潤皮膚退風益氣強力枸杞子晚蠶砂炒各半升惡實炒蒼耳子炒各一升防風去叉天麻子炒各二升茄子根二升洗令淨細切蒸一復時須是九月九日採牛膝酒浸細切惡實根切炒各一斤桔梗銼炒羌活去蘆頭銼秦艽去苗土銼石菖薄九節者銼各二兩上以夾絹袋盛用好法酒三斗浸密封閉勿令通氣七日方開開時不得面對瓶口每服一盞溫過空心食前臨臥服常令有酒容久病風疾不過一月瘥薏苡仁散出聖惠方治中風身如角弓反張心胸滿悶薏苡仁芎藭桂心各一兩當歸細辛前胡去蘆頭羌活茵芋生乾地黃萆薢羚羊角屑各三分甘草炙微赤銼半兩上搗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服天雄散出聖惠方治中風身如角弓反張口噤者天雄炮裂去皮臍獨活羚羊角屑白蘚皮防風去蘆頭躑躅花酒拌微炒麻黃去根節芎藭酸棗仁微炒桂心各一兩牛黃研入一分川烏頭炮裂去皮臍半兩上搗羅為散入研了藥令勻每服不計時候以溫酒調下二錢頻服以汗出為度麻黃飲出聖濟總錄治中風身如角弓反張四肢不遂煩亂口噤麻黃去根節湯掠去沫焙乾三兩防風去蘆桂去粗皮白朮人參芎藭當歸焙甘草炙銼乾薑炮各二兩附子炮裂去皮臍一兩杏仁湯浸去皮尖雙仁麩炒三十枚上銼如麻豆每服五錢匕水一盞半煎取一盞去滓溫服不拘時候小虫嚴蜜湯出聖惠方治惡風角弓反張飛屍入腹絞痛悶絕往來有時筋急少陰傷寒口噤不利大黃二兩雄黃青羊脂各一兩當歸乾薑桂心乾地黃芍藥甘草細辛各四兩吳萸茱三兩上㕮咀以水二斗煮取六升分六服重者加藥用水三斗煮取九升分十服羚羊角散出聖惠方治中風身如角弓反張筋脈拘急疼痛羚羊角屑一兩肉桂去粗皮一兩半細辛半兩赤茯苓芎藭當歸酸棗仁微炒防風去蘆頭各三分羌活茵芋丹參各一兩上搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服威靈仙散出聖惠方治中風身如角弓反張言語謇澀心神煩亂威靈仙二兩獨活羚羊角屑麥門冬去心焙桂心赤茯苓防風去蘆頭細辛麻黃去根節五加皮薏苡仁各一兩上搗羅為散每服四錢以水一中盞入生薑半分煎至