鎊乾薑炮白殭蠶酒炒羌活去蘆頭晚蠶炒沙各半兩麝香研一分上除研藥外搗羅為細末與研藥拌勻煉蜜為丸如綠豆大每服二丸加至三丸若風口噤化七丸熱酒灌下再用五丸投之龍腦牛黃丸治急風涎潮稍退風留四肢變為癱瘓手足不遂口眼喎斜龍腦別研牛黃別研槐膠通明者阿膠炒令燥膩粉水銀以棗肉同研無星各一分乾蠍去足真酥酒炒一分阿魏半分麵裹燒令面熟去面不用白花蛇酒浸去皮骨炙肉用麝香別研各一兩分鉛白霜別研半兩上先將槐膠阿膠乾蠍白花蛇搗羅為細末再入諸藥研勻煉蜜和丸如皂子大新病者每服一丸細嚼生薑湯下更以酒少許衝下常於密室內避風服藥後覺病處汗出氣息上升涎痰出或暴利一兩行腹內鳴轉三服後即覺減退後三日再一服如聖散治急風狐心肝三副烏鴉二隻去嘴爪翅並臘月者以上二味將次新藏瓶一枚斡開口子內之瓦蓋合留一眼子外以紙筋泥固濟泥干以火燒令赤候煙細無香氣去火蓋定眼子候冷取出以絹帛裹地坑內碗覆出火毒一復時取出細研為末龍腦研麝香研各二錢牛黃研半錢犀角鎊琥珀各一字金箔銀箔各十片真珠麻子大者五顆小者十顆細研丹砂研二錢上搗研極細同前藥研勻每服一錢匕薄荷自然汁入酒少許調下空心日午臨臥各一服大黃丸治急風手足拳攣不得屈伸大便秘澀百節痛不能行走大黃煨乾薑炮白殭蠶炒天麻白附子炮天南星炮附子炮裂去皮臍半夏湯洗去滑各一兩牛黃研半兩膩粉一分麝香研半分上為末煉蜜和丸如雞頭大每服一丸冷酒化下天南星散治急風及破傷角弓等風天南星切作片子水浸一宿焙乾半夏湯洗去滑乾蠍微炒白殭蠶微炒細辛白附子炮裂各半兩肉桂去粗皮一兩膩粉一分白花蛇酒浸去皮骨炙微黃一兩犀角屑天竺黃各三分上細羅為散不計時候以溫豆淋酒調下一錢防風丸治中急風防風去叉白殭蠶炒乾蠍酒炒白附子炮丹砂研五靈脂研羌活去蘆頭天麻天漿子去殼入藥末研各半兩牛黃研一錢上為細末拌勻糯米煮糊和丸麻子大薄荷酒下五丸加至七丸或口噤研化灌下小兒急驚風荊芥薄荷湯下二丸至三丸追風散治一切急風角弓反張四肢抽掣牙關緊急骨節疼痛及破傷風烏頭去皮臍附子去皮臍白附子白花蛇酒浸去皮骨焙丹砂研各一兩蠍梢麝香研各三分膩粉研一分天南星去臍一兩上並生用搗羅六味為細散入研藥合研勻瓷盒收每服半錢至一錢豆淋酒或煎蔥白酒調下口噤者用少藥揩牙即開為妙牛黃金虎丹治急中風身背強直口噤失音筋脈拘急鼻乾面黑遍身壯熱汗出如油目瞪唇青心神迷悶形體如醉痰涎壅塞胸膈喉中如拽鋸聲白礬枯過天竺黃研天南星湯洗焙為末用牛膽和作餅焙乾如無牛膽用法酒蒸七晝夜膩粉研各二十五兩牛黃研二兩半生龍腦研五兩天雄炮去皮臍十二兩半金箔八百片為衣雄黃研飛一百五十兩上為末煉蜜溲和每一兩半作十丸以金箔為衣每服一丸以新汲水化灌之扶坐使藥行化良久續以薄荷自然汁更研化一丸灌之立愈肥盛體虛多涎有風之人宜常以此藥隨身備急忽覺眼前暗黑心胸悶亂有涎欲倒化藥不及急嚼一丸新汲水下小兒急驚風一歲兒服綠豆大一丸薄荷自然汁化灌之更量歲數隨時加減有孕婦人不可服透關丸治中急風榮衛痹滯頭目昏暈額角偏痛手足無力舉動戰掉語言謇澀心神不寧麻黃去根節二兩麝香研天麻各半兩沒藥研乳香研地榆甜瓜子黑參川烏頭生去皮臍各一兩上為末以酒一升慢火熬成膏更重入煉蜜丸如梧桐子大每服三十丸溫荊芥湯下不計時候附子散治急風面青口噤心悶有涎不可出者附子酒浸過炮裂去皮臍白附子生用白殭蠶生用天南星生用海桐皮半夏湯洗七次去滑各一兩狼毒以醋煮半日細切曝乾乾薑炮製各半兩麝香細研一分上搗細羅為散入麝香都研令勻每服以熱豆淋酒調下二錢良久再服必吐涎出相次以熱蔥酒一盞投之蓋覆令有汗為效蛜𧌴散治急風四肢搐搦口面喎戾不知人事蛜𧌴微炒白附子炮裂獨活槐螵蛸微炒天麻桂心各一兩白殭蠶微炒天南星炮裂膩粉各半兩上搗細羅為散不計時候以溫酒調下一錢烏蛇散治急風言語謇澀心胸煩悶四肢緊急烏蛇肉酒浸炙微黃白殭蠶微炒天麻各一兩天南星炮裂白附子炮裂半夏湯洗七次去滑各半兩附子炮裂去皮臍一兩蟬殼微炒牛黃細研各一分上搗細羅為散不計時候以溫酒下二錢薄荷湯調下亦得雄黃散治急風及破傷風立效雄黃細研白附子炮裂天南星醋煮十沸炙乾各三分牛黃細研一分麝香細研一錢蛜𧌴微炒白殭蠶微炒各半兩天麻白花蛇酒浸炙微黃各一兩上搗細羅為散入研了藥令勻不計時候以溫酒調下一錢天麻散出聖惠方治急風四肢拘攣牙關緊急失音不語天麻附子炮裂去皮臍各一兩天南星炮裂白附子炮裂麻黃去根節桂心烏頭炮裂去皮臍各三分半夏湯洗七次去滑乾薑炮製銼各半兩上搗細羅為散每服以豆淋酒調下二錢蓋覆當有汗出良久未汗即再服之土蜂丸出聖惠方治急風筋脈拘急口眼喎斜土蜂十枚雄黃硫黃硃砂各一分兩膩粉龍腦麝香各一錢乾蠍十枚頭足全者炙蟬殼十枚微炒上都研為末用槐膠和丸如綠豆大每服不計時候以熱豆淋酒下十丸頻服汗出為度蠐螬丸出聖惠方治急風眼前暗黑心躁吐涎四肢不舉蠐螬乾者槐蚛糞乾地龍微炒蛜𧌴微炒烏頭去皮臍生用各半兩蠶砂微炒天麻各一兩白花蛇酒浸去皮骨炙令微黃二兩晚蠶蛾微炒一分上為末用烏驢腦髓和丸如梧桐子大每服不計時候以熱酒研下十丸其藥於臘月預修合之銀星丸出聖惠方治急風涎盛口眼喎斜言語謇澀天南星為末牛乳拌炒乾細研四兩白附子為末生薑自然汁拌炒乾細研二兩麝香研灶突中煤細研蠍梢炒水銀各一兩鉛一兩與水銀結炒子研牛黃研半兩上合研令勻煉蜜和丸如綠豆大每服十丸至十五丸煎甘草黑豆湯下小兒慢風痰涎不利服三五丸欲利者以龍腦膩粉薄荷汁調下一方有石腦油無麝香名牛黃丸阿膠散出聖惠方治急風口眼不開筋脈拘急阿膠搗碎炒令黃燥當歸銼微炒桂心附子炮裂去皮臍麻黃去根節各一兩乾蠍微炒白殭蠶微炒蟬殼微炒各半兩上搗細羅為散每服以溫酒調下二錢良久以蔥酒投之令汗出為效未汗再服赤箭丸出聖惠方治急風涎在胸膈悶亂不已赤箭天南星炮阿膠搗碎炒令黃燥乾蠍微炒半夏湯洗七次去滑各三分雄雀糞膩粉各半兩麝香細研二錢上為末煉蜜和丸如綠豆大不計時候以溫生薑酒研下七丸為妙七寶丸出聖惠方治中急風及中惡不識人面青四肢逆冷丹砂研玳瑁鎊於沙盆內同丹砂研細末安息香煉去沙石各三兩雄黃研龍腦研麝香研琥珀搗碎別研各半兩上以六味合和同研一日取安息香以無灰酒五合別入胡桃瓤二兩同研以葛袋子貯碗盛於飯甑上蒸三升粟米飯熟為度更研如稠糊和前六味如干即更入煉蜜丸如雞頭大每服生薑汁合童子小便二合化下半丸或一丸如人行五里再服汗出清利即愈孕婦不可服分涎散出衛生寶鑑治急風口噤手足搐搦涎潮作聲不得出藿香葉蠍梢一方用乾蠍白附子炮各一分天南星炮半兩丹砂研膩粉研粉霜研各一兩上先將四味搗羅為末次入丹砂膩粉粉霜同研勻每服一錢匕至二錢薄荷茶調下未吐利再服白荊花丸出聖惠方治急風腰背強硬口眼牽急白荊花微炒半兩烏頭炮裂去皮臍半夏湯洗七次去滑天南星炮裂各一分膩粉水銀以棗瓤研令星盡各半分白花蛇酒浸去皮骨炙微黃二兩上為末入水銀都研令勻煉蜜和丸如綠豆大不計時候以熱酒下五丸天南星丸治中急風天南星炮白附子炮乾蠍酒炒白花蛇酒浸去皮骨炙用桂去粗皮附子炮裂去皮臍各半兩上為末煉蜜和丸如梧桐子大用膩粉半兩滾以粉盡為度每服熱酒下三丸衣覆出汗避外風治急風不語兼注氣攻刺背痛白附子炮白殭蠶炒天麻乾蠍酥炙各一兩白花蛇肉酥炙半兩胡粉一錢上為末煉蜜和丸如梧桐子大每服二丸冷酒下再用熱酒投汗出即瘥乾蠍散出聖惠方治急風頑涎壅悶不知人事乾蠍微炒桑螵蛸微炒蟬殼微炒白附子炮裂膩粉各一分白殭蠶微炒半兩上搗細羅為散不計時候以溫酒調下一錢天麻丸治中急風天麻半兩白附子炮半兩半夏一分湯浸生布挼洗七次入姜一分同搗焙天南星炮各半兩乾蠍酒炒一分上搗羅為末用豬膽一枚溲和為丸如小豆大每服空心薄荷酒下五丸至七丸小兒如大麻粒大薄荷湯下一丸至三丸歸命丸治急風中人身背強直面黑鼻乾口噤不語蛇黃紫色者火煅令通赤取出以紙襯地上出火毒一宿杵羅為末研如面用四兩重鐵粉一兩獖豬糞用瓶子盛貯固濟燒才煙盡為度候冷研細二兩丹砂研半兩麝香研一錢上研極細糯米粥和丸如雞頭大一切風用薄荷酒磨下一丸小兒半丸疳熱冷水磨一丸分作四服合時忌婦人雞犬見如是大人小兒中風口噤反張涎滿者灌下一服立省小兒被驚及發熱並以薄荷酒磨下少許此藥又名神穴丸合了排漆盤中日內曬之及干翻看每丸有一小穴通丸其藥中空也舊法須端午及甲午日合急即不須急風方出直指方硃砂一字輕粉一點巴豆去油如霜少許全蠍一枚蟬殼二枚去土上為末合和大人盡劑用薄荷泡湯調下小兒分半用乳汁調下或吐痰或瀉毒物皆效蛜𧌴散治中急風乾蠍炒白附子炮附子炮裂去皮臍天南星湯浸軟銼小塊以生薑汁炒各半兩上為散每服一錢匕生薑汁調下天麻散治中急風天麻天竺黃天南星乾蠍並生用等分上為散每服半錢匕溫酒調下小兒半字半夏丸出聖惠方治急風吐涎四肢拘急腰背強硬半夏天南星乾蠍烏頭去皮臍各半兩上並生用搗羅為末以黑豆麵糊和丸如綠豆大每服不計時候以溫生薑酒下十丸治急風立效方出聖惠方土蜂子二七枚針簽燈上微炙乾蠍二七枚全者生用雄黃細研半兩牛黃細研一分上用極細粳米飯和丸如梧桐子大不計時候以溫酒研下五丸治急風吐痰方薺苨防風銼各二兩生薑汁二合上將前二味以水五盞煎取三盞每一盞入生薑汁半合空心服之良久即吐痰並惡物等紫桂散治急風吐痰桂去粗皮為末發灰研各一兩上和勻為散以好酒一升調灌之取吐凡中風人口噤或不咽藥即用黑豆三二升以青布裹於醋湯鐺內蘸及熱熨前後心並胸腹令風氣散即得藥下或炒鹽醋灰亦得一方治中風失音不語用藥末內舌下良久以溫水衝下一方以溫酒調服尤妙一方以水煎不計時候分溫三服無亂髮蝴蝶散治急中風牙關緊不能轉舌語澀礬蝴蝶密陀僧各三分上同研勻每服半錢匕溫水調灌之若牙緊不能下藥即鼻中灌之六神湯出衛生寶鑑方治老人急中風虛涎潮口噤昏沉不醒天雄一個炮去皮臍大附子一個用七錢的塊去皮臍天南星半兩炮切片薑汁浸半日半夏半兩炮切片薑汁浸半日人參半兩白朮半兩上為銼散每服三大錢水二大盞生薑二十大片同煎至八分去渣溫服不計時候治一切丈夫婦人急中風痰悶倒不省人事口中涎溢宜服此上以不損皂角一條捶碎揉取濃漿新布濾過土器內暖令溫和挈開口灌一盞吐涎即安未吐更灌一盞主口癖眼急風出本草用枳茹刮取上青為末欲至瓤上者得茹五升微火灼去濕氣以酒三升漬微火暖令得藥味遂性飲之治卒中急風身直不得屈伸反覆者出本草刮取枳木皮屑謂之枳茹一升酒一