body:
  text: 卷二百五十七食治門總論夫天產動物地產植物陰陽稟質氣味渾然飲食和德適節而無過則入於口達於脾胃入於鼻藏於心肺氣味相成神乃自生平居暇日賴以安平日兼足於此一有疾病資以治療者十去其九是以別五肉五果五菜必先之五穀以夫生生不窮莫如五穀為種之美也辨五益為助為充必先之為養以夫五物所養皆欲其充實之美也非特如此精順五氣以為靈若食氣相惡則為傷精形受五味以成體若食味不調則為損形陰勝陽病陽勝陰病陰陽和調人乃平康故曰安身之本必資於食不知食宜不足以存生人日食有成敗百姓日用而不知苟明此道則安臟腑資血氣悅神爽志平疴去疾夫豈淺淺耶扁鵲云人之所依者形也亂於和氣者病也理於煩毒者藥也濟命扶危者醫也安身之本資於食救疾之速必憑於藥不知食宜者不足以存生也不明藥者不足以除病也此上二事有靈之所要也若使不學誠可悲夫是故食能排邪而安臟腑悅神爽志以資血氣若能用食平疴釋情遣疾者可謂良工長年餌老之奇法極養生之術也夫為醫者當須先洞曉疾病知其所犯以食治之食療不愈然後命藥藥性剛烈猶若御兵兵之猛暴豈容妄發用乖其宜損傷處眾藥之投疾氾濫亦然高平生常稱食不欲雜雜則或有所犯有所犯者或有所傷或當時雖無災苦者積久為人作惡又食啖鮭餚務令簡少魚肉果實取益人者而食之凡常飲食每令節儉若貪味多餐臨盤太飽食訖覺腹中膨脝短氣或致暴疾仍為霍亂又夏至以後迄至秋分必慎夫肥膩餅臛酥油之屬此物與酒漿瓜果理極相妨夫在身所以多疾者皆由春夏取冷太過飲食不節故也又魚膾諸腥冷之物多損於人斷之益善乳酪酥等常食令人有筋力膽干肌體潤澤卒多食之亦使臚脹泄利漸漸自已黃帝曰五味入於口也各有所走各有所病酸走筋多食酸令人癃不知所以然方俞曰酸入胃也其氣澀以收也上走兩焦兩焦氣澀之不能出入不出即流於胃中胃中和溫即下注膀胱膀胱走胞胞薄以耎得酸則縮卷約而不通水道不利故癃也陰者精筋之所中聚也故酸入胃走於筋也咸走血多食鹹令人渴何也答曰鹹入胃也其氣走中焦注於諸脈脈者血之所走也與咸相得即血凝凝則胃中汁泣汁泣則胃中乾渴渴則咽焦焦故舌乾喜渴血脈者中焦之道也故鹹入胃走於血辛走氣多食辛令人慍心何也答曰辛入胃也其氣走於上焦上焦者受使諸陽者也姜韭之氣重至榮衛榮衛下時受之卻留於心下故慍慍痛也辛味與氣俱行故辛入胃而走氣與氣出故氣盛也苦走骨多食苦令人變嘔何也答曰苦入胃也其氣燥而湧泄五穀之氣皆不勝苦苦入下脘下脘者三焦之道皆閉則不通不通故氣變嘔也齒者骨之所終也故苦入胃而走骨入而復出齒必黧疏甘走肉多食甘令人噁心何也答曰甘入胃也其氣弱劣不能止進於上焦而與谷俱留於胃中甘入則柔緩柔緩則蛔動蛔動則令人噁心其氣外通於肉故甘走肉則肉多粟起而胝黃帝問曰谷之五味所主可得聞與伯高對曰夫食風者則有靈而輕舉食氣者則和靜而延壽食谷者則有知而勞神食草者則愚癡而多力食肉者則勇猛而多嗔是以肝木青色宜酸心火赤色宜苦脾土黃色宜甘肺金白色宜辛腎水黑色宜咸內為五臟外主五行色配五方肝合筋其榮爪心合脈其榮色脾合肉其榮唇肺合皮其榮毛腎合骨其榮發多食酸則皮槁而毛失多食苦則筋急而爪苦多食甘則骨痛而發落多食辛則肉胝而唇褰多食酸則脈凝泣而色變肝病宜食麻犬肉李韭心病宜食麥羊肉杏薤脾病宜食稗米牛肉棗葵肺病宜食黃粟雞肉桃蔥腎病宜食大豆黃黍豕肉慄藿酸走筋筋病勿食酸苦走骨骨病勿食苦甘走肉肉病勿食甘辛走氣氣病勿食辛咸走血血病勿食鹹米飯甘麻酸大豆咸麥苦棗甘李酸慄咸杏苦桃辛黃黍辛葵甘韭酸藿咸薤苦蔥辛牛甘犬酸豕咸羊苦雞辛肝苦急急食甘以緩之肝欲散急食辛以散之用酸瀉之禁當風心苦緩急食酸以收之心欲耎急食鹹以耎之用甘瀉之禁溫食厚衣脾苦濕急食苦以燥之脾欲緩急食甘以緩之用苦瀉之禁溫食飽食濕地濡衣肺苦氣上逆息者急食苦以泄之肺欲收急食酸以收之用辛瀉之禁無寒飲無寒衣腎苦燥急食辛以潤之開腠理致津液通氣也腎欲堅急食苦以結之用鹹瀉之無犯焠𤌿無熱衣溫食是以毒藥攻邪五穀為養五肉為益五果為助五菜為充精以食氣氣養精以榮五色形以食味味養形以生力此之謂也神藏有五五五二十五種形藏有四方四時四季四肢共為五九四十五以此輔神可長生久視也精順五氣以為靈也若食氣相惡則傷精也形受味以成也若食味不調則損形也是以聖人先用禁以存性後治藥以防命也故形不足者溫之以氣精不足者補之以味氣味溫補以存形精岐伯云陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精化為氣氣傷於味陰味出下竅陽氣出上竅厚者為陰薄者為陰之陽氣厚者陽氣薄者陽之陰味厚則泄薄則通泄氣薄則發泄厚則秘塞壯火之氣在衰少火之氣在壯壯火食氣氣食少火壯火散氣少火生氣辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陰陽調和人則平安春七十二日省酸增甘以養脾氣夏七十二日省苦增辛以養肺氣秋七十二日省辛增酸以養脾氣冬七十二日省苦增酸以養心氣季月十八日省甘增酸以養腎氣果實檳榔味辛溫澀無毒消穀逐除痰澼殺三蟲去伏屍治寸白豆蔻味辛溫澀無毒溫中止心腹痛止嘔吐去口臭葡萄味甘辛平無毒主筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年治腸間水調中可酒常飲益人逐水利小便覆盆子味甘辛平無毒益氣輕身令發不白大棗味甘辛熱滑無毒止心腹邪氣安中養脾氣平胃氣通九竅補少氣少津液身中不足大驚四肢重可和百藥補中益氣強志除煩首烏治腸澼久服輕身長年不飢神仙生棗味甘辛多食令人熱氣脹若寒熱羸瘦者彌不可食傷人藕實味甘寒無毒食之令人心歡止渴去熱補心養神益氣力除百病久服輕身耐老不飢延年一名水芝生根寒止熱渴破流血雞頭實味甘平無毒主濕痹腰脊膝疼補中除暴疾益精氣強志意耳目聰明久服輕身不飢耐老神仙芰實味甘辛平無毒安中補五臟不飢輕身一名莢黃帝云七月勿食生菱芰作蟯蟲栗子味鹹溫無毒益氣厚腸胃補腎氣令人耐飢生食之甚治腰腳不遂櫻桃味甘平澀調中益氣可多食令人好顏色美志性橘柚味辛溫無毒主胸中寒熱逆氣利水穀下氣止嘔咳除膀胱留熱停水破五淋利小便治脾不能消穀卻胸中吐逆霍亂止瀉利去寸白久服去口臭下氣通神輕身長生一名橘皮陳久者良津符子味苦平滑多食令人口爽不知五味梅實味酸平澀無毒下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑痣惡疾止下利唾少口乾利筋脈多食壞人齒柿味甘寒澀無毒通和五氣主腸澼不足及火瘡金瘡止痛木瓜實味酸鹹溫澀無毒主濕痹腳氣霍亂大吐下後腳轉筋不止其生樹皮無毒亦可煮用榧實味甘平澀無毒主五痔去三蟲殺蠱毒鬼疰惡毒甘蔗味甘平澀無毒平氣和中補脾氣利大腸止渴去煩解酒毒耎棗味苦冷澀無毒多食動宿病益冷氣發咳嗽芋味辛平滑有毒寬腸胃充肌膚滑中一名土芝不可多食動宿冷又烏芋味苦甘微寒滑無毒主消渴熱痹益氣一名籍姑一名水萍三月採杏核仁味甘苦溫冷而利有毒主咳逆上氣腸中雷鳴喉痹下氣產乳金瘡寒心奔豚驚癇心下煩熱風寒去來時行頭痛解肌消心下急殺狗毒五月採之其一核兩仁者害人去之杏實尚生味極酸其中核猶未硬者採之曝乾以食甚止渴去冷熱毒扁鵲云杏仁不可久服之令人目盲眉發落動一切宿病桃核仁味甘苦辛平無毒破瘀血血閉除邪氣殺小蟲治咳逆上氣消心下煩除卒暴積血破癥瘕通月水止心痛七月採凡一切果核中有兩仁者並害人不可用其實味酸無毒多食令人有熱黃帝云飽食桃仁水浴成淋病李核仁味苦平無毒主僵仆躋瘀血骨痛實味苦酸微溫澀無毒除痼熱調中宜心不可多食令人虛黃帝云李子不可和白蜜食蝕人五內梨味甘微酸寒澀有毒除客熱止心煩不可多食令人寒中金瘡產婦勿食令人萎困寒中林檎味酸苦平澀無毒止渴好唾不可多食令人百脈弱柰子味酸苦寒澀無毒耐飢益人心氣不可多食令人腹脹久病人食之其病尤甚安石榴味甘酸澀無毒止咽燥渴不可多食損人肺枇杷葉味苦平無毒主惡不止下氣定咳削取生樹皮嚼之少少咽汁亦可煮汁冷服大佳胡桃味甘冷滑有毒不可多食動痰飲令人噁心吐水吐食菜蔬枸杞葉味苦平澀無毒補虛羸益精髓諺云去家千里勿食蘿藦枸杞此則言強陽道資陰氣速疾也蘿藦味甘平無毒一名苦丸其葉厚大作藤生摘之有白汁出人家多種亦可茹或作生啖亦可蒸煮食之補益與枸杞葉同瓜子味平無毒令人光澤好顏色益氣不飢久服輕身耐老又除胸滿心不樂久食寒中可作面脂一名水芝一名白瓜子即冬瓜仁也八月採白冬瓜味甘微寒無毒除小腹水脹利小便止消渴凡瓜味甘寒滑無毒去渴多食令陰下瘡濕生瘡發黃疸黃帝云九月勿食被霜瓜向冬發寒熱及溫病初食時即令人慾吐也食竟心內作停水不能自消或為反胃凡瓜入水沉者食之得冷病終身不瘥越瓜味甘平無毒不可多食損腸胃胡瓜味甘寒有毒不可多食動寒熱多瘧病積瘀血熱早青瓜味甘寒無毒食之去熱煩不可久食令人多忘冬葵子味甘寒無毒主五臟六腑寒熱羸瘦破五淋利小便婦人乳難血閉久服堅骨長肌肉輕身延年十二月採葉甘寒滑無毒宜脾久食利胃氣其心傷人百藥忌食心心有毒黃帝云霜葵陳者生食之動五種流飲飲盛則吐水凡葵菜和鯉魚食之害人四季之月土旺時勿食生葵菜令人飲食不化發宿病莧菜實味甘寒澀無毒主青盲白翳明目除邪氣利大小便去寒熱殺蛔蟲久服益氣力不飢輕身一名馬莧一名莫實即馬齒莧菜也治反花瘡小莧菜味甘寒滑無毒可久食益氣力除熱不可共鱉肉食成鱉瘕蕨菜亦成鱉瘕邪蒿味甘溫澀主胸膈中臭惡氣利腸胃苦菜味苦大寒滑無毒主五臟邪氣厭谷胃腸痹大渴熱中暴疾惡瘡久食安心益氣聰察少臥輕身耐老耐飢寒一名茶草一名遊冬冬不死每於四月上旬採齏菜味甘溫澀無毒利肺氣和中殺諸毒其子主明目目痛淚出其根主目澀痛蕪青及蘆菔菜味苦冷澀無毒利五臟輕身益氣宜久服蕪青子明目九蒸曝療黃疸利小便久服神仙根主消風熱毒腫不可多食令人氣脹菘菜味甘溫澀無毒久食通利腸胃除胸中煩解消渴本是蔓菁也種之江南即化為菘亦如枳橘所生土地隨變芥菜味辛溫無毒歸鼻除腎邪大破咳逆下氣利九竅明目聰耳安中久食溫中又云寒中其子味辛辛亦歸鼻有毒主喉痹去一切風毒黃帝云芥菜不可共兔肉食成惡邪病苜蓿味苦辛平澀無毒安中利人四體可久食荏子味苦辛無毒主咳逆下氣溫中補髓其葉主調中去臭氣九月採陰乾用之油亦可作油衣蓼實味溫辛無毒明目溫中解肌耐風寒下水氣面目浮腫卻癰疽其菜辛歸舌治大小腸邪氣利中益智黃帝云蓼實過多有毒發心痛和生魚食之令人脫氣陰核疼痛求死婦人月事不調食蓼及蒜發為血淋帶下二月勿食蓼傷人腎扁鵲云蓼久食令人寒熱損骨髓殺丈夫陰氣少精蔥實味辛溫無毒宣肺氣辛歸頭明目補不足其莖白平滑可作湯主傷寒寒熱骨肉闢痛能出汗治中風面目浮腫喉痹不通安胎殺桂其青葉溫辛歸目除肺中邪氣安中利五臟益目精發黃疸殺百藥毒其根鬚平主傷寒頭痛蔥中涕及生蔥汁平滑止尿血解藜蘆及桂毒黃帝云食生蔥即啖蜜變作下利食燒蔥並啖蜜擁氣而死正月不得食生蔥令人面上起遊風格蔥味辛微溫無毒除瘴氣惡毒久食益膽氣強志其子主泄精薤味苦辛溫滑無毒宜心辛歸骨主金瘡瘡敗能生肌肉輕身不飢耐老菜芝也除寒熱去水氣溫中散結氣利產婦病人諸瘡中風寒水腫生搗敷之骨在咽不下者食之則去黃帝云薤不可共肉作羹食之成瘕疾韭亦然十月十一月十二月勿食薤令人多涕唾韭味辛酸溫澀無毒辛歸心宜肝可久食安五臟除胃中熱不利病人其心腹有痼冷者食之必加劇其子主泄精尿色白根煮汁以養髮黃帝云霜韭凍不可生食動宿飲飲盛必吐水五月勿食韭損人滋味令人乏氣力二月三月宜食韭大益人心白蘘荷味辛微溫澀無毒主中蠱及瘧病搗汁服三合日二生根主諸瘡蓁菜味苦大寒無毒主時行壯熱解風熱惡毒紫蘇味辛微溫無毒下氣除寒中其子尤善雞蘇味辛微溫澀無毒主吐血下毒一名水蘇羅勒味苦辛溫平澀無毒消停水散毒氣不可久食澀榮衛諸氣蕪荑味辛平熱滑無毒主五內邪氣散皮膚骨節中浸淫溫行毒去三蟲能化宿食不消逐寸白散腹中寒溫喘急一名無菇一名𦽄蓎盛器物中甚闢水蛭其氣甚臭即北山榆子作之凡榆葉味甘平滑無毒主小兒癇小便不利傷暑熱困悶煮汁冷服生榆白皮味甘冷無毒利小便破五淋花主小兒頭瘡葫荽子味酸平無毒消穀能復食味葉不可久食令人多忘華佗云葫荽菜患氣臭䘌齒人食之加劇復肉患利氣者彌不得食食之發宿病金瘡尤忌海藻味鹹寒滑無毒主癭瘤結氣散頸下硬核痛者腸內上下十二水腫利小便起男子陰氣昆布味鹹寒滑無毒下十二水腫癭瘤結氣瘻瘡破積聚茼蒿味辛平無毒安心氣養脾胃消痰飲白蒿味苦辛平無毒養五臟補中益氣長老發久食不死白兔食之仙吳葵一名蜀葵味甘微寒滑無毒花定心氣葉除客熱利腸胃不可久食鈍人志性若食之被狗齧者瘡永不瘥藿味鹹寒澀無毒宜腎主大小便數去煩熱香菜辛微溫主霍亂腹痛吐下散水腫煩心去熱甜瓠味甘平滑無毒主消渴惡瘡鼻口中肉爛其葉味甘平主耐飢扁鵲云患腳氣虛脹者不得食之患永不除蓴味甘寒滑無毒主消渴熱脾多食動痔漏病落葵味酸寒無毒滑中散實熱潤澤人面一名天葵一名蘩露蘩蔞味酸平無毒主積年惡瘡不愈者五月五日日中採之即名滋草一名雞腸草干之燒作焦灰用扁鵲云丈夫患惡瘡陰頭及莖作瘡膿爛疼痛不可忍久不痊者以灰一分蚯蚓新出屎泥二分以少水和研絞如煎餅面以塗瘡上干則易之禁酒面五辛並熱食等黃帝云蘩蔞合粗鮓食之發消渴病令人多忘別有一種近水渠中溫濕處冬生甚壯類葫荽一名雞腸萊可以療痔病一名天葫荽蕺味辛微溫有小毒主蠳螋尿瘡多食令人氣喘不利人腳多食腳痛葫味辛溫有毒辛歸五臟散癰疽治䘌瘡除風邪殺蠱毒氣獨子者最良黃帝云生葫合鯖魚鮓食之令人腹內生瘡腸中腫又成疝瘕多食生葫行房傷肝氣令人面無色四月八月勿食葫傷人神損膽氣令人喘悸脅肋氣急口味多爽小蒜味辛溫無毒主歸脾腎主霍亂腹中不安消穀理胃氣溫中除邪痹毒氣五月五日採曝乾葉主心煩痛解諸毒小兒丹疹不可久食損人心力黃帝云食小蒜啖生魚令人奪氣陰核痛求死三月勿食小蒜傷人志性茗葉味苦鹹酸冷無毒可久食令人有力悅志微動氣黃帝云不可共韭食令人身重蕃荷菜味苦辛溫無毒可久食卻腎氣令人口氣香潔主辟邪毒除勞弊形瘦疲倦者不可久食動消渴病蒼耳子味苦甘溫葉味苦辛微寒澀有小毒主風頭疼寒痛風濕痹四肢拘急攣痛去惡肉死肌膝痛溪毒久服益人氣耳目聰明強志輕身一名相菜一名地葵一名葹一名長思蜀人名羊負來秦名蒼耳魏名只刺黃帝云戴甲蒼耳不可共豬肉食害人食甜粥復以蒼耳甲下之成走注又患兩肋痛立秋後忌食之吳茱萸味辛苦大溫無毒九月採停陳久者良其子閉口者有毒不可用止痛下氣除咳逆去五臟中寒冷溫中諸冷實不消其生白皮主中惡腹痛止齒疼其根細者去三蟲寸白黃帝云六月七月勿食茱萸傷神氣令人起伏氣咽喉不通徹賊風中人口喎不能語者取茱萸一升去黑子及合口者好豉三升二物以清酒和煮四五沸取汁冷服半升日三得小汗瘥蠆螫人嚼茱萸封立止蜀椒味辛大熱有毒主邪氣溫中下氣留飲宿食能使痛者癢癢不痛久食令人乏氣失明主逆氣逐胃中寒冷去死肌濕痹心痛下冷氣除五臟六腑寒百骨節中積冷溫瘧大風汗自出者止下利散風邪合口者害人其黑子者有小毒下水仲景云熬用之黃帝云十月勿食椒損人心腸傷血脈乾薑味辛溫無毒主胸中滿咳逆上氣溫中止漏血出汗逐風濕痹腸澼下利寒冷腹中痛惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良生薑味辛微溫無毒辛歸五臟主傷寒頭疼去痰下氣通汗除胃中寒咳逆上氣止嘔吐去胸中膈上臭氣通神明黃帝云八月九月勿食姜傷人神損壽胡居士云姜殺腹內長蠱久服令人少志氣傷心性堇葵味苦辛平無毒久服除人心煩急動痰冷身重多懈惰蕓薹味辛寒無毒主腰腳痹若舊患腰腳痛者不可食必加劇又治遊腫丹毒益胡臭解禁祝之輩出五明經其子主夢中泄精與鬼交者胡居士云世人呼為寒菜甚辣胡臭人食之病加劇隴西氐羌中多種食之竹筍味甘微寒無毒主消渴利水道益氣力可久食患冷人食之心痛野苣味苦平無毒久服輕身少睡黃帝云不可共蜜食之作痔又曰苣味苦平無毒益筋力黃帝云不可共酪食之作蟲茴香菜味苦辛微寒澀無毒主霍亂闢熱除口氣臭肉和水煮下少許即無臭故曰茴香醬臭末中亦香其子主蛇咬瘡久不瘥者搗敷之又治九種瘻蕈菜味苦寒無毒主小兒火丹諸毒腫去暴熱藍菜味甘平無毒久食大益腎填髓腦利五臟調六腑胡居士云河東隴西羌胡多種食之漢地鮮有其葉大厚煮食甘美經冬不死春亦有花其花黃生用結子子椹治人多睡扁竹葉味苦平澀無毒主治浸淫癬疥疽痔殺三蟲女人陰蝕扁鵲云煮汁與小兒冷服治蛔蟲芹菜味苦酸冷澀無毒益筋力去伏熱治五腫黃病生搗絞汁冷服一升日二黃帝云五月五日勿食一切菜發百病凡一切菜熟者熱食時病瘥後一切肉並蒜食禁行房病發必死時病瘥後未健食生青菜者手足必青腫時病瘥未健食青菜禁行房病更發死十月勿食被霜菜令人面上無光澤目澀痛又瘧發心痛腰疼或致心瘧發時手足十指爪皆青困痿穀米與薏苡仁味甘溫無毒主筋拘攣不可屈伸久風濕痹下氣久服輕身益力其生根下三蟲名醫云薏苡仁除筋骨中邪氣不仁利脾胃消水腫令人能食一名𧆐一名感米人多種食之胡麻味甘平無毒主腸中虛羸補五內益氣力長肌肉填髓腦堅筋骨療金瘡止痛及傷溫瘧大吐下後虛熱困乏久服輕身不老聰明耳目耐寒暑延年作油微寒主利大腸產婦胞衣不下者摩瘡痛生禿髮去頭面遊風一名巨勝一名狗蝨一名方莖一名鴻藏葉名青蘘主傷暑熱花主生禿髮七月採最上標頭者陰乾用之白麻子味甘平無毒宜肝補中益氣肥健不老治中風汗出逐水利小便破積血風毒腫復血脈產後乳余疾能長髮可為沐藥久服神仙飴味甘微溫無毒補虛冷益氣力止腸鳴咽痛除唾血去卒嗽大豆黃卷味甘平無毒主久風濕痹筋攣膝痛除五臟胃氣結積益氣止毒去黑痣面䵟潤澤皮毛宜腎生大豆味甘平無毒生搗淳醋和塗之治一切毒腫並止痛煮汁冷服之殺鬼逐水脹除胃中熱卻風痹傷中淋露下瘀血散五臟結積內寒殺烏頭三健解百藥毒不可久服令人身重其屑熬味甘平無毒主胃中熱去身腫除痹消穀止腹脹九月採黃帝云大豆屑忌豬肉炒豆不得與一歲以上十歲以下小兒食食竟啖豬肉必擁氣死赤小豆味甘平冷無毒下水腫排血膿一名赤豆不可久服令人枯燥青小豆味甘鹹溫平澀無毒主寒熱熱中消渴止泄利利小便除吐逆卒澼下腹脹滿一名麻累一名胡豆黃帝云青小豆合鯉魚鮓食之令人干黃五年成干屑病大豆豉味苦寒澀無毒主傷寒頭痛寒熱痹脹氣惡毒焦燥滿悶虛勞喘嗽兩腳疼冷殺六畜胎子諸毒扁豆味甘微溫無毒和中下氣其葉平主霍亂吐下不止蕎麥味酸微寒無毒食之難消動人熱風其葉主食動刺風令人身癢黃帝云作面和牛羊肉熱食之不過八九頓作熱風令人眉發落又還生仍稀少涇邠以北多患此病大麥味鹹微寒滑無毒宜心主消渴除熱久食令人多力健行作面溫消食和中熬末令赤黑色搗作曲止泄利和青醋醬服之日三夜一小麥味甘微寒無毒養肝氣去客熱止煩渴咽燥利小便止漏血令女人孕必得男作曲六月作者溫無毒主小兒癇食不消下五痔蟲平胃氣消穀止痢作面無毒不能消煩止熱不可多食長宿澼加客氣難治青粱米味甘微寒無毒主骨痹熱中除消渴止泄痢利小便益氣力補中輕身長年黃粱味甘平無毒益氣和中止泄痢人呼竹根米又卻當風臥濕寒中暑白粱米味甘微寒無毒除熱益氣粟米味鹹微寒無毒養腎氣去骨痹熱中益氣陳粟米味甘寒無毒主胃中熱消渴利小便丹黍米味苦微寒無毒主咳逆上氣霍亂止泄利除熱去煩渴又白黍米味甘辛溫無毒宜肺補中益氣不可久食多熱令人煩黃帝云種黍米合葵食之令人成痼疾又以臘脯著五種黍米中藏儲食之多令人閉氣陳廩米味鹹酸微寒無毒除煩熱下氣調胃止泄痢黃帝云久藏脯臘安米中滿三月人不知食之害人糵米味苦微溫無毒主寒中下氣除熱秫米味甘微寒無毒主寒熱利大腸治漆瘡酒味苦甘辛大熱有毒行藥勢殺百邪惡氣黃帝云暴雨後飲酒者膈上變為伏熱食生菜飲酒莫炙腹令人腸結扁鵲云久飲酒者腐腸爛胃清髓蒸筋傷神損壽醉當風臥以扇自扇成惡風醉以冷水洗浴成疼痹大醉汗出當以粉粉身令其自干發成風痹當日未落食訖即莫飲酒終身不幹嘔飽食訖多飲水及酒成痞病稷米味甘平無毒益氣安神補虛和胃宣痹粳米味辛苦平無毒主心煩斷下利平胃氣長肌肉溫中一云生者冷燔者熱糯米味苦溫無毒溫中令人能食食多熱大便硬醋味酸溫澀無毒消癰腫散水氣殺邪氣蠱毒血暈扁鵲云多食醋損人骨能理諸藥消毒熱鹽味鹹溫無毒殺鬼蠱邪注毒氣下部䘌瘡傷寒寒熱能吐胸中痰澼止心腹卒痛堅筋骨不可多食傷肺喜咳令人色膚黑損筋力扁鵲云鹽能除一切大風疾痛者炒熨之黃帝云食甜粥竟食鹽即吐或成霍亂鳥獸人乳汁味甘平無毒補五臟令人肥白悅澤馬乳汁味辛溫無毒止渴牛乳汁味甘微寒無毒補虛損止渴入生薑蔥白止小兒吐乳補勞羊乳味甘微溫無毒補寒冷虛乏少血色令人熱中驢乳汁味酸寒一云大寒無毒主大熱黃疸止渴母豬乳汁味平無毒主小兒驚癇以飲之神妙馬牛羊酪味甘酸微寒無毒補肺臟利大腸黃帝云食甜酪竟即食米醋者變作血瘕及尿血華佗云馬牛羊酪蚰蜒入耳者灌之即出黃牛及白羊酥味甘微寒無毒除胸中客氣利大小腸又治口瘡牝牛酥味甘平無毒去諸風濕痹除熱利大便去宿食醍醐味辛平無毒補虛去諸風痹百鍊乃佳甚去五月蝕瘡添精神填骨髓久服增年熊肉味甘微寒無毒主風痹不仁筋急五緩若腹中有疾聚寒熱羸瘦者食熊肉病永不除其脂味甘微寒治與肉同又去頭瘍白禿皮䵟鱠食欲嘔吐久服強志不飢輕身長年黃帝云一切諸肉煮法不熟生不軟者食之成瘕熊及豬二種脂不可作燈其煙氣入人目失明不能遠視羖羊角味酸苦溫無毒微寒主青眼明目殺疥蟲止寒泄心畏驚悸除百節中結氣及風傷蠱毒吐血婦人產後余痛燒之殺鬼魅闢虎狼久服安心益氣輕身勿令中濕有毒髓味甘溫無毒主男子婦人傷中陰陽氣不足卻風熱止毒利血脈益經氣以酒服之亦可久服不損人青羊膽汁冷無毒能主人身筋脈治青眼明目肺平補肺治嗽止渴多小便傷中止虛補腎不足去風邪肝腎補肝明目心主憂逆膈中滿補腎氣虛弱益精髓頭痛主小兒驚癇煮以浴之蹄溫平主丈夫五勞七傷肉味甘苦大熱無毒主暖中止痛安乳余疾及頭腦中大風汗自出虛勞寒冷能補中益氣力安心止驚利產產不利時患病頭肉平主風眩瘦疾小兒驚癇丈夫五勞七傷其骨熱主虛勞寒中羸瘦其宿有熱者不可食生脂止下利脫肛去風毒婦人產後腹中絞痛肚主胃反治虛羸小便數止虛汗黃帝云羊肉醋食之傷人心亦不可共生魚酪和食之害人凡一切羊蹄甲中有珠子白者名羊懸筋食之令人癲白羊黑頭食其腦作腸癰羊肚共飯飲食常久必成反胃作噎病甜粥共肚食之令人多唾喜吐清水羊腦豬腦男子食之損精氣少子若飲食者爛研如粉和醋食之然終不若不食為佳青羊肝和小豆食之令人目少明一切羊肝共生椒食之破人五臟傷心最損小兒彌忌水中柳木及白楊木不得同器中煮羖羊肉食之丈夫損陽女子絕陰暴雨後不可食羊肉髓及骨汁成煩熱難解還動利凡六畜五臟著草自動搖及得咸醋不變色又隨地不汙又與犬犬不食者皆有毒殺人六月勿食羊肉傷人神氣沙牛髓味甘溫無毒平胃氣通十二經脈理三焦微溫骨髓補中續絕傷益氣力止泄利去消渴皆以清酒和緩服之肝明目膽可丸百藥味苦大寒無毒除心腹熱渴不止下利去口焦燥益目精心主虛弱腎主濕痹補腎氣益精力主小兒驚癇肉味甘平無毒消渴止唾涎出安中益氣力養脾胃氣不可常食發宿病自死者不可食喉嚨主小兒痹黃犍沙牛黑牯牛尿味苦辛溫微平無毒主水腫腹腳俱滿者利小便黃帝云烏牛自死北首食其肉害人一切牛盛熱時卒死者總不堪食食之作腸癰患甲蹄牛食其蹄者誤食蹄中巨筋令人作肉刺獨肝牛肉食之殺人牛食蛇者獨肝患疥牛馬食之令人身體癢牛肉共豬肉食之必作寸白蟲凡丹黍米白酒牛肉共食亦作寸白蟲尤忌人不利者自死牛肉必加劇一切牛馬乳汁及酪共生魚食之成魚瘕六畜屬人一生莫食十二月勿食牛肉傷人神氣馬心主喜忘肺主寒熱莖痿肉味辛苦平冷無毒主傷中除熱下氣長筋強腰脊壯健強志利意輕身不飢黃帝云白馬自死食其肉害人白馬玄頭食其腦令人癲白馬鞍下烏色徹肉裡者食之傷人五臟下利者食馬肉必加劇白馬青蹄肉不可食一切馬汗氣及毛不可入食中害人諸食馬肉必煩悶者飲以美酒則解白酒則劇五月勿食馬肉傷人神氣野馬陰莖味酸鹹溫無毒主男子陰痿縮少精肉辛平無毒主人驚癇筋脈不能自收周痹肌不仁病死者不任用驢肉味酸平無毒主風狂憂愁不樂能安心氣病死者不任用其頭燒卻毛煮取汁以浸曲釀酒甚治大風動搖不伏者皮膠亦治大風狗陰莖味酸平無毒主傷中丈夫陰痿不起腦主頭風風痹下部䘌瘡中息肉肉味酸鹹溫無毒宜腎安五臟補絕傷勞損久病大虛者服之輕身益氣力黃帝云白犬合海鮋食之必得惡病白犬自死不出舌者不可食犬春月狂若鼻赤起而燥者此欲狂其肉不任食九月勿食犬肉傷人神氣㹠卵味甘溫無毒除陰莖中痛驚癇鬼氣蠱毒寒熱賁豚五臟邪氣陰攣縮一名㹠顛陰乾勿令敗㹠肉味辛平有小毒不可久食令人遍體筋肉碎痛乏氣大豬後腳蹄甲無毒主五痔伏熱在腹中腸癰內蝕取酒浸半日炙焦用之四蹄小寒無毒主傷撻諸敗瘡母豬蹄寒無毒煮汁服之下乳汁甚解石藥毒大豬頭肉平無毒補虛乏氣力去驚癇鬼毒寒熱五癃腦主風眩心平無毒主驚邪憂患心悸氣逆婦人產後中風聚血氣驚恐腎平無毒除冷利理腎氣通膀胱肝味苦平無毒主明目豬味微寒無毒補中益氣止渴斷暴利虛弱腸微寒無毒主消渴小便數補中焦虛竭其肉間脂肪平無毒主煎諸膏藥破冷結散宿血解斑蝥芫青毒主洞腸挺出血多者猳豬肉味苦酸冷無毒主狂病多日不愈凡豬肉味苦微寒宜腎有小毒補腎氣虛竭不可久食令人少子精發宿病益筋骨閉血脈虛人肌有金瘡者食之瘡尤甚豬血平澀無毒主卒下血不止美酒清者和炒服又主中風絕傷頭中風眩及諸淋露賁㹠暴氣黃帝云凡豬肝肺共魚鱠食之作癰疽肝共鯉魚腸魚子食之傷人神㹠腦損男子陽道八月勿食豬肺及飴合食之至冬發疽十月勿食豬肉損人神氣鹿頭肉味平主消渴多夢接骨止血治癰腫莖主勞損蹄肉主腳膝骨中疼痛不能踐地骨主肉虛續絕傷解骨可作酒髓味甘溫主丈夫婦人傷中脈絕筋急痛咳逆以酒和服腎平主補腎氣肉味苦溫無毒補中強五臟益氣力肉生者主中風口僻不正細細碎銼以薄僻上華佗云和生椒搗薄使一人專看正則去之不爾復牽回不僻處角鎊取屑一升白蜜五升溲之微火熬令小變色曝乾更搗篩服方寸匕日三令人輕身益氣力強髓補絕傷黃帝云鹿膽白者食其肉害人不可和蒲白作羹食發惡瘡五月勿食鹿肉傷人神氣胡居士云鹿性驚烈多別良草恆食九草余者不食常群處必依山崗產歸下澤饗神用其肉者以其性烈清淨故也凡餌藥之人不可食鹿肉服藥不得力所以然者以鹿常食解毒之草是故能治毒散諸藥故也九草者葛葉花鹿蔥鹿藥白蒿水芹甘草齊頭蒿山蒼耳薺苨獐頭微溫無毒主虛損泄精肉味甘溫無毒補益五臟填髓益氣力悅澤人面獐無膽所以怯弱多驚恐黃帝云五月勿食獐肉傷人神氣麋脂味辛溫無毒主癰腫惡瘡死肌寒熱風寒濕痹四肢拘緩不收頭風腫氣通腠理柔皮膚不可近男子陰冷痿一名宮脂十月取黃帝云麂肉共蝦肉食之令人心痛生麂肉共雉肉食之令人作痼疾虎肉味酸無毒主噁心欲吐益氣力止多唾不可熱食壞人齒虎頭虎肉治風邪眼睛主驚癇豹肉味酸溫無毒宜腎安五臟補絕傷輕身益氣冬食利人貍肉溫無毒補中輕身益氣亦治諸注黃帝云正月勿食虎豹貍肉傷人神損壽兔肝青暗肉味辛平澀無毒補中益氣止渴兔無脾所以能走蓋以屬二月建卯木位也木剋土故無脾焉馬無脾亦能走也黃帝云兔肉和獺肝食之三日必成遁屍共白雞肝心食之令人面色黃一年成痹共姜食變成霍亂共白雞肉食之令人血氣不行二月勿食兔肉傷人神氣生鼠微溫無毒主踒折續筋補骨搗薄之三日一易獺肝味甘有小毒主鬼疰蠱毒卻魚鯁止久渴皆燒作灰酒和服之獺肉味苦溫無毒主時病疫氣牛馬時行病皆取汁停冷服之六畜灌之狐陰莖味甘有小毒主女子絕產陰中癢小兒陰㿗卵腫肉並五臟及腸肚味苦微寒有毒主蠱毒寒熱腑臟痼冷小兒驚癇大人狂病見鬼黃帝云麝肉共鵠肉食之作癥瘕野豬青蹄不可食及獸赤足者不可食野獸自死者伏地不可食獸有岐尾不可食家獸自死共膾汁食之作疽瘡十一月勿食經夏自臭脯肉病作頭眩丈夫陰痿甲子日勿食一切獸肉大吉鳥飛投人不肯去者口中必有物口中無物拔一毛放之大吉一切禽獸自死無處傷不可食三月三日勿食鳥獸五臟及一切果菜五辛等物大吉丹雄雞肉味甘微溫無毒主女子崩中漏下赤白沃補虛溫中能愈久傷之瘡不瘥者通神殺惡毒黃雌雞肉味酸鹹平無毒主傷中消渴小便數而不利腸澼泄利補益五臟絕傷五勞益氣力雞子黃主除熱火灼爛瘡疰可作琥珀神物卵白汁微寒主目熱赤痛除心下伏熱止煩滿咳逆小兒泄利婦人產難胞衣不出生吞之白雄雞肉味酸微溫無毒下氣去狂邪安五臟傷中消渴烏雄雞肉味甘溫無毒補中止心痛黑雌雞肉味甘平無毒除風寒濕痹五緩六急安胎黃帝云一切雞肉合魚汁食之成心瘕雞居五色者食其肉必狂若有六趾四距玄雞白頭家雞及野雞鳥生子有文八字雞及野鳥死不伸足爪此種食之害人雞子白共蒜食之短氣雞子共鱉肉蒸食之害人雞肉獺肉共食之成遁屍注藥所不能治食雞子啖生蔥變成短氣雞肉犬肝腎共食之害人生蔥共雞犬肉食之令人穀道終身流血烏雞肉合鯉魚肉食生癰疽雞兔犬肉共食必泄利野雞肉共家雞肉食之成遁屍屍鬼纏身四肢百節疼痛小兒五歲以下飲乳未斷者勿食雞肉二月勿食雞子令人常噁心丙午日食雉肉丈夫燒目首女人死血妄見四月勿食暴雞肉作內疽在胸腋下出瘡孔丈夫少陽婦人絕孕虛勞乏氣八月勿食雞肉傷人神氣雉肉味酸微寒無毒補中益氣止泄利久食令人瘦嘴主蟻螻黃帝云八月建酉日食雉肉令人短氣八月初勿食雉肉損人神氣白鵝脂主耳卒聾消以灌耳毛翎攻水毒肉味辛平利五臟鶩肪味甘平無毒主風虛寒熱肉補虛乏除寒熱利臟腑及水道黃帝云六月勿食鶩肉傷人神氣鴛鴦肉味苦微溫無毒主瘻瘡清酒浸之炙令熱以薄止亦炙服之又治夢思慕者雁肪味甘平無毒主風攣拘急偏枯血氣不通利肉味甘平無毒久服長髮鬢眉益氣不飢輕身耐暑黃帝云六月勿食雁肉傷人神氣越燕屎味辛平無毒主殺蠱毒鬼注逐不祥邪氣破五癃利小便熬香用之治口瘡肉不可食入水為蛟龍所殺黃帝云十一月勿食鼠肉損人神氣石蜜味甘平微寒無毒主心腹邪氣驚癇痙安五臟治不足益氣補中止腹痛解諸藥毒除眾病和百藥養脾氣消心下煩不食飲止腸澼去肌中疼痛治口瘡聰明耳目久服強志輕身不飢耐老延年神仙一名石飴白如膏者良是今諸山崖處味酸噞食之心煩其蜂黑色似虻黃帝云七月勿食生蜜令人暴下發霍亂黃蜜蠟味甘微溫無毒主下利膿血補中續絕傷除金瘡益氣力不飢耐老白蠟主久泄澼瘥後重見血者補絕傷利小兒久服輕身耐老不飢生於蜜房或木石上惡芫花百合此即今所用蠟也蝮蛇肉平有毒釀酒止癩疾諸凡痿痹心腹痛下結氣主益精氣強男子陽道交接不倦甚效泄精不用相連者魚曵魚味甘無毒主百病鰻鱺魚味甘大溫有毒主五痔漏殺諸疾䱉魚肉味大溫黑者無毒主補中養血治瀋唇五月五日取頭骨平無毒燒服止久利鱔魚平無毒主少氣吸吸足不能立地黃帝云四月勿食蛇肉鱔肉損神害氣烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁並閉陰蝕腫痛寒熱症瘕無子驚氣入腹腹痛環臍丈夫陰中痛而腫令人有子肉味酸無毒益氣強志鯉魚肉味甘平無毒主咳逆上氣黃疸止渴黃帝云食桂竟食鯉魚害人腹中宿症病者食鯉魚害人鯽魚味甘平無毒主一切瘡燒作灰和醬汁敷之三二日又去腸癰黃帝云魚白目不可食之魚有角食之發心驚害人魚無腸膽食之三年丈夫陰痿不可起婦人絕孕魚身有黑點不可食魚目赤作膾食瘕病醋食之害人一切魚共菜食之作蛔蟲一切魚尾食之不益人多有勾骨著人咽害人魚有角白目皆不可食凡魚赤鱗不可食魚無腮不可食魚無全腮食之發癰疽鯆魮魚不益人其尾有毒治齒痛鰕𩷦魚有毒不可食二月庚寅日勿食魚大惡五月五日勿以檝魚子共豬肝食之必不消化成惡病不利者食一切魚必加劇致困難治穢飯鯘肉臭魚不可合食之害人三月勿食鮫龍肉及一切魚肉令人飲食不化發宿病傷人神氣失神恍惚鱉肉味甘平無毒主傷中益氣補不足療腳氣黃帝云五月五日以鱉子共包魚子食之作癉黃鱉腹下成王字不可食鱉肉兔肉和芥子醬油食之損人鱉三足食之害人鱉肉共莧蕨菜食之作鱉瘕傷人蟹殼味酸寒有毒主胸中邪熱百結痛喎僻面腫散漆燒之致鼠其黃解結散血愈漆瘡癢益經氣黃帝云蟹目相向足斑者食之害人十二月勿食蟹鱉損人神氣又云蟹鱉肉共豬肉食之害人秘果菜共龜肉食之令人短氣飲酒龜肉並菰白菜令人生寒熱六甲勿食龜鱉害人心神螺蚌共菜食之令人心痛三日一發蝦鱠共豬肉食之令人常噁心多唾損精色蝦無須腹下通黑色者食之害人大忌勿輕食十一月十二月勿食蝦蚌著甲之物凡魚頭無正白連珠至脊上不可食也無腸膽魚不可食魚有黑點不可食魚頭似有角不可食魚無腮不可食鯷魚赤目須不可食不可合烏雞肉食生魚目赤不可作鱠食魚不可合鸕鷀肉食鯷魚不可合鹿肉食之鯽魚不可合豬肝及猴肉青魚不可合小豆藿食魚汁不可合六畜自死肉食青魚鮓不可合胡荽及生葵麥醬食鯉魚鮓不可合小豆藿食蝦不可合雞肉食蝦無須及腹下通黑及煮之白皆不可食鯉魚不可合白犬肉食鯉魚不可合蘩蔞菜作羹鱉目凹不可食鱉腹下有如王字不可食鱉不可合雞鴨子食之鱉肉不可合莧菜食之亦不可合龜共煮之龜不可合瓜共飲酒共秋果食蟹目相向及足斑目赤者不可食之病人不可食鯷魚鱠魚䱉魚等妊身不可食龜魚鱠桂天門冬忌食鯉魚又云人有食蟹中毒煩亂欲死服五蠱黃丸得吐下皆瘥夫蟹未被霜多毒熱煮乃可食之或云是水莨所為彭蜞亦有毒蔡謨食之幾死食治中風附論夫風者四時五行之氣亦布八方順十二月終三百六十日各以時從其鄉來為正氣之風風在天地為五行在人為五臟之氣生長為萬物非毒厲之氣人人常觸之遇不勝之氣乃病人之身唯在血與氣故身內血氣為真身外風氣為邪邪者風也是以聖人言避風如避矢故今人中風多病死者是不避邪毒氣也宜以食治之方發汗豉粥方出聖惠方治中風傷寒壯熱頭痛三二日豉一合荊芥一握麻黃三分去根節葛根一兩梔子仁三分石膏三兩搗碎綿裹蔥白七莖切生薑半兩切粳米三合上以水三大盞都煎至二盞去滓納米煮作稀粥服之汗出為效如未有大汗宜再合服之葛粉撥刀方出聖惠方治中風手足不遂言語謇澀精神昏憒葛粉四兩荊芥半兩蔥白一握生薑半兩切香豉一合鹽花半兩羊腎骨髓一兩川椒五十枚去目並閉口者上以水五大盞先煎荊芥等取汁三盞和葛粉切作撥刀入汁中煮熟頓食之豉粥方出聖惠方治中風手足不遂口面喎僻言語謇澀精神昏悶豉半升荊芥一握薄荷一握蔥白一握切生薑半兩鹽花半兩羊髓半兩上將藥先以水三大盞煎豉荊芥等十餘沸去滓下薄荷等入米煎作粥食之羊肚食方出聖惠方治中風羊肚淨制如食法一枚粳米淨淘一合蔥白七莖豉一合生薑細切一分蜀椒去目併合口炒去汗三十枚上六味將五味藥拌勻入於羊肚內爛煮熟切如常食法淡五味日食一枚十日止蔥豉薏苡仁粥方出聖惠方治中風頭疼心煩苦不下食手足無力筋骨疼痛口面喎斜言語不正蔥白一握豉三合薄荷一握薏苡仁三合牛蒡根切半升洗去粗皮上藥以水五大盞煮蔥白牛蒡根薄荷豉等煎去二盞半去滓入薏苡仁煮粥空腹食之薏苡仁粥方出聖惠方治中風筋脈攣急不可屈伸及風濕等薏苡仁三合薄荷一握荊芥一握蔥白一握豉一合上以水三大盞煎薄荷等取汁二盞入薏苡仁作粥空腹食荊芥粥方出聖惠方治中風言語謇澀精神昏憒口面喎斜白粟米淨淘二合半荊芥穗銼薄荷各一握豉三合上四味先將三味以水三升煮至二升去滓取汁一升半投米煮粥空心食之一方用白粱米冬麻子粥方出聖惠方治中風五臟風熱言語謇澀手足不遂大便壅滯冬麻子炒搗研用仁半升白粟米淨淘三合薄荷荊芥穗各一握上四味先以水三升煮薄荷荊芥二味去滓取汁二升以此汁研麻子仁濾過下白粟米煮粥空腹食之一方用青粱米惡實根粥方出聖惠方治中風不語惡實根去黑皮切一升生薑切三兩陳橘皮去白切二兩青粱米淨淘三合上四味以水五升先煮三味二升去滓下米煮粥空腹食之良葛粉索餅方出聖惠方治中風心痹熱言語謇澀精神昏憒手足不遂葛根半斤搗取粉四兩荊芥穗銼一握豉三合上三味以水四升煮豉並荊芥穗六七沸去滓汁次將葛粉和作索餅於二味中煮熟每空腹少入滋味食之人參粥方出聖濟總錄治中偏風胃悶燥煩食飲不得人參一兩銼如粟以水四升煮至二升去滓下米粟米五合雞子一枚去黃用清薤白一合切上先用人參汁煮粟米粥將熟下雞子清入薤白切一合候熟食之如食不盡可作兩次葛粉飯方一名葛粉粥出聖惠方治中風狂邪驚走心恍惚失志及治手足不遂言語謇澀嘔吐昏憒不下飲食葛粉搗取粉四兩粱粟米飯半升上以漿水浸飯漉出入葛粉拌勻於豉汁內急火煮熟著五味蔥白食之日三仍勿雜食補益大棗粥方出聖濟總錄治中風虛恐驚悸如人將捕之四肢沉重大棗七枚去核青粱粟米二合上以水三升半先煮棗取汁一升半去滓入米煮粥食之葛實葉菹方出聖惠方治中風煩燥口乾手足不遂及皮膚熱瘡葛實葉嫩肥者一斤切酥半兩上先以湯煮葛實葉三五沸取出以新水淘過布絞去汁入於五味汁中略煮點酥食之蒼耳葉根方出聖惠方治中風頭痛濕痹四肢拘攣痛蒼耳嫩苗葉一斤酥一兩上先煮蒼耳三五沸漉出用豉取汁一合水二大盞半煎取汁一盞半入蒼耳及五味作羹入酥食之煮黑豆方出聖惠方治中風濕痹筋攣急痛胃中積熱口瘡煩悶大腸澀秘黑豆半升煮令熟酥五兩上相合令勻不調食前後食一兩匙酸棗仁粥方出聖惠方治中風筋骨風冷頑痹或不睡酸棗仁半兩炒令黃研米以酒三合浸汁粳米三合上以粳米煮粥臨熟下酸棗仁汁更煮三五沸空心食之天蓼粥方出聖惠方治中風半身不遂腰背反張用天蓼木三斤細銼以水一石煮取二斗去滓每取汁一升納粳米一合煮粥稍熟食之一方用糯米治癩疾烏雞酒方出聖濟總錄治中急風背強口噤舌直不得語目睛不轉煩熱苦渴或身重或身癢用烏雌雞一隻去毛嘴腳破開去腸肚以酒五升煮取二升去滓分溫三服相繼服盡汗即愈不汗者用熱生薑蔥白稀粥投之蓋覆取汗又雞腸肚勿去腸中屎緊急兩頭勿傷動煮汁服之作羹亦可皂莢芽菹方出聖濟總錄治中風用皂莢嫩芽不限多少先煮熟絞去汁炒過入五味與紅粳米飯隨意食不可多烏驢皮食方出聖惠方治中風手足不遂骨筋煩痛心躁口乾面目喎偏用烏驢皮一張揉洗如法蒸令極熟條切於豉汁中著五味調和更煮過空腹食之羊頭鱠方出聖惠方治中風頭眩羸瘦手足無力用白羊頭一枚治如食法蒸熟細切以五味調和作鱠食之熊肉羹方出聖惠方治中風手足不遂及風痹不仁筋急腳氣等疾用熊肉一斤去筋膜熟煮細切如常法調和作羹入五味任意食之烏驢頭肉方出聖惠方治中風頭眩心肺浮熱手足無力筋骨煩痛言語謇澀一身風搖又主風狀憂愁不樂能安心氣用烏驢頭一枚洗如法蒸令熟細切更於汁中煮著蔥蒜鹽等並點少許酥任性食之驢肉亦可作醃臉或煮食之亦得及作粥並可治中風濕痹五緩六急方出聖惠方用野駝脂一斤煉熟濾去滓收於瓷盒中每日空腹溫酒一中盞調下半匙治中風攣急疼痛方出聖惠方用雁脂五兩煉熟濾過收於盒中每日空心溫酒一中盞調下半匙薯蕷撥刀方出聖惠方治心虛風眩頭痛用生薯蕷不限多少去皮磨如稀糊和白麵作撥刀豉汁五味調和食之薏苡仁粥方出聖惠方治中風四肢拘攣不得屈伸言語謇澀大腸壅滯筋骨疼痛薏苡仁三合冬麻子搗碎半斤上等分以水三升研麻子取汁用煮薏苡仁粥空腹食之治中風濕痹五緩六急骨中疼痛不能踏地宜吃烏雌雞羹方出聖惠方用烏雌雞一隻治如食法煮令熟細臠以豉汁薑蔥蒜醬調和作羹空腹食之治中風腳膝疼痛不能踐地宜食鹿蹄肉羹方出聖惠方用鹿蹄一具洗如法煮令熟擘細於五味汁中煮作羹空腹食之耐風寒方出本草用熊掌得酒醋水三件煮熟則瞋大如皮球食之耐風寒食治癇風癲附論夫風邪癲癇者因血氣虛風邪入於陰經故也人有血氣榮養臟腑若血氣少則心虛而精神離散恍惚不安因為風邪所傷則發癲也又癇病者亦曰積血風氣熱發則仆地涎沫無所覺者是也宜以食治之方豬心羹方出聖惠方治風癇驚癇憂恚虛悸氣逆及婦人產後中風驚邪恍惚豬心一枚枸杞葉半斤蔥白五莖切上各細切於豉中調和作羹食之作粥及蒸炒食之亦得石膏粥方出聖惠方治風邪癲癇口乾舌難心煩頭痛暴熱悶亂石膏半斤粳米三合上以水五大盞煮石膏取二大盞去石膏用米煮粥欲熟入蔥白二莖豉汁三合更同煮候熟空心食之石膏可三度用野狐肉方出聖惠方治驚癇風癇精神恍惚言語錯謬歌笑無度兼五臟疾冷蠱毒寒熱用野狐肉一斤及五臟治如食法於豉中作羹調以五味食之或作粥臛炙蒸並得或以羊肉或鯽魚汁替汁亦得然不如豉汁病人吐出清涎為效白雄雞羹方出聖惠方治風邪癲癇不欲睡臥自能驕倨妄行不休言語無度安五臟下氣用白雄雞一隻治如食法以水煮爛熟擘開肉於汁中入蔥白姜五味作羹空心食之豬頭鱠方出聖惠方治風邪癲癇發歇不定用豬頭一枚水煮熟停冷切作鱠以五味食之驢肉醃臉方出聖惠方治風邪癲癇及愁憂不樂安心下氣用驢肉五斤水煮肉細切於豉汁中著蔥醬作醃臉食之或作羹亦得猳豬肉膾方出聖惠方治風邪癲狂病經久不瘥或歌或笑行走無時用猳豬肉五斤水煮熟切作膾入五味取任食之食治風熱煩悶附論夫風熱者由膚腠虛風熱之氣先傷皮毛而入於肺風在胸膈肺氣壅滯不通令人頭面浮熱心神昏悶故謂之風熱也宜以食治之方酸棗仁煎餅方出聖惠方治風熱心胸煩悶不得眠臥酸棗仁三分炒熟搗末人參一分末茯神一分末糯米四兩水洗細研白麵四兩上藥末入米麵中水調作煎餅食之並著肉臛五味食之可淡竹瀝粥方出聖惠方治熱毒風心膈煩悶或小便赤澀淡竹瀝一合石膏一兩搗末黃芩一分搗碎粟米三合蜜半合上以水二大盞半煎石膏黃芩至一盞半去滓下米煮粥熟入竹瀝及蜜攪勻候熟任意食豉粥方出聖惠方治風熱攻心煩悶不已豉二合青竹茹一兩米二合上以水三大盞豉竹茹取汁一盞半去滓下米煮粥溫食茯苓粥方出聖惠方治心胸結氣煩悶恐悸風熱驚邪口乾赤茯苓一兩麥門冬一兩去心粟米一合上細銼先以水二大盞半煎至一盞半去滓下米煮粥溫食大棗粥方出聖惠方治風熱煩悶頭眩腸癖腸中邪氣養皮膚氣血十二脈絡周通安神除恍惚大棗二十七枚茯神半兩粟米二合上細銼水二大盞煮至一盞半去滓下米煮粥溫食之良煮梨湯方出聖惠方治風熱攻心煩悶恍惚神思不安梨三枚切沙糖半兩上以水一大盞煎至六分去滓溫食後分二次服煮天門冬方出聖惠方治風熱煩悶口熱多渴天門冬二斤去心蜜二合上以水五升煮天門冬各十餘沸漉出以新汲水淘三五遍瀝乾又以水三升和蜜又煮五十沸和汁取於不津器中逐日吃三兩飲汁一合立效木通粥方出聖惠方治風熱多睡頭痛煩悶木通二兩銼粳米二合上以水二大盞煮木通取汁一大盞半去滓下米煮粥溫食竹葉粥方出聖惠方治風熱風癇心煩驚悸甜竹葉二握細切粟米二合淨淘上以水二升煮竹葉取一升去滓投米作粥食或作白粥即入竹瀝二合攪勻食之亦得又方用苦竹葉煎牛蒡方出聖惠方治風熱解丹石諸藥毒用牛蒡嫩葉一斤洗如法好酥隨多少煉牛蒡葉熟更洗去苦味重以酥及五味伴炒食之兼堪下飯秋冬用根佳春夏用葉妙木通粥方出聖惠方治風壅心膈煩熱口舌乾渴木通三兩銼生地黃五兩切粳米三合上以水三大盞煎取二盞去滓入米煮粥食之食治傷寒諸病
