body:
  text: 卷二百二十四諸虛門平補附論夫一陰一陽之謂道偏陰偏陽之謂疾不明乎道末有能治人之疾者世人貪餌藥石惟務酷烈非徒無益反傷和氣故方書論平補之法欲陰陽適平而已方神仙苣蕂子丸一名益壽凡黃精木通當歸黃耆蓮子廣木香枸杞子肉蓯蓉酒浸熟地黃酒浸何首烏人參破故紙酒浸柏子仁巴戟酒浸去皮山茱萸苣蕂子煎去皮燥干乾山藥菟絲子酒浸杜仲酒浸酸棗仁五味子酒浸各二兩天雄一對如無附子亦可石菖蒲酒浸楮實子甘菊花牛膝酒浸三日小茴香炒各一兩川烏頭炮白茯苓覆盆子遠志去心酒浸焙天門冬酒浸去皮各一兩上為細末春夏煉蜜為丸秋冬棗肉為丸如梧桐子大每服三十丸溫酒空心下日進二服諸病盡除耳聾眼暗並皆治之服至一月真氣完成至五十日頭白再黑百日顏如童子若遇冬天單衣不寒年老七十無子服此藥生數子年至百歲忌服日期正月初四日二月初七日三月初六日四月十八日五月十六日六月二十七日七月二十四日八月二十九日九月二十一日二十四日十月全忌十一月二十四日十二月二十日還童丹一名保靈丹一名延壽丹一名陰陽丹出德生堂大能壯氣血筋力助脾胃進飲食益顏色添精髓固元陽沉香白茯苓木通熟地黃晚蠶蛾桑螵蛸巴戟酒浸去心安息香研益智仁牛膝酒浸葫蘆巴酒浸各一兩木香一兩半紅花沒藥研蓮蕊蓮肉淨細墨燒煙五色龍骨煅硃砂各五錢菟絲子酒浸七錢半蓯蓉一兩二錢酒浸破故紙七錢酒浸青鹽三錢麝香一錢海馬一對微酥炙炒母丁香七錢上為細末酒糊為丸每服三十丸加至五十丸空心酒下此藥不濕不燥老少可服大通氣血駐顏生精服之七日見效夏月茶清下妙乾物壓之附子蓯蓉丸出聖濟總錄主平補壯元陽附子炮裂去皮臍一枚肉蓯蓉酒浸一宿焙楮實酒浸一宿蒸熟補骨脂炒蘹香子炒菟絲子酒浸一宿蒸熟研焙牛膝酒浸切焙杏仁去皮尖兩仁炒白茯苓去黑皮當歸切焙蓽茇炒桃仁去皮尖雙仁炒各半兩遠志去心山茱萸打破炒柴胡去蘆頭黃耆銼細巴戟天去心各三分蕪荑炮山芋各一兩大蒜煨六顆蜀椒去目及閉口炒出汗黃蠟各二兩上除蓯蓉桃杏仁楮實蒜蠟外並搗羅為末先取精羊肉去皮骨一斤半細切用水煮熟次入好酒三升熬爛次入黃蠟候熔都取出細研入楮實桃杏仁蓯蓉蒜一處爛研如膏入前藥末和丸如梧桐子大每服十五丸至三二十丸空心鹽湯酒下小丹一名彭祖丸出三因方主補勞益血去風冷消百病諸虛不足老人精枯神耗女子絕傷斷緒久服益壽延年安神寧志定魂魄滋氣血脈絡開益智慧釋散風濕耳目聰明筋力強壯肌膚悅澤氣宇泰定熟地黃肉蓯蓉酒浸各六兩五味子菟絲子酒浸各五兩柏子仁別研天門冬去心蛇床子炒覆盆子巴戟去心石斛各三兩續斷澤瀉人參山藥遠志去心炒焦山茱萸菖蒲去毛桂心白茯苓杜仲銼炒絲斷各三兩天雄炮去皮臍一兩煉成鍾乳粉扶衰三兩續老二兩常服一兩氣虛則不用上為末蜜丸如梧桐子大食前酒服三十丸至五十丸忌五辛生蔥蕪荑餳鯉血虛人去鍾乳倍地黃多忘倍遠志茯苓少氣神虛倍覆盆子欲光澤倍柏子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤瀉吐逆倍人參石斛丸出聖濟總錄主平補諸虛不足石斛去根遠志去心檳榔煨銼牛膝酒浸一宿焙桑螵蛸炙焦研再炒桂去粗皮乾薑炮各半兩五味子炒覆盆子微炒巴戟天去心微炒肉蓯蓉酒浸去皴皮焙枳殼去瓤麩炒柏子仁研各二兩澤瀉二分陳皮去白二兩鹿茸一對去毛酥炙蒺藜炒各三分天雄炮去皮臍菟絲子酒浸搗爛焙三日各二兩上為細末和勻煉蜜為丸如梧桐子大每服三十丸空心鹽湯下補骨脂丸出聖濟總錄主平補諸虛益精壯陽補骨脂炒松脂山芋白茯苓去黑皮各半斤杏仁湯浸去皮尖雙仁炒焦三升胡桃肉棗各一斤鹿角膠炙燥十兩桂去粗皮牛膝酒浸切焙澤瀉菖蒲薏苡仁萆薢檳榔煨銼獨活去蘆頭蒺藜子炒去角蛇床子各一兩生地黃二十斤取汁上除地黃汁外搗羅為末煎地黃汁成入藥點蜜和丸如梧桐子大每服空腹溫酒下三十丸經驗補益方石菖蒲川當歸白蒺藜菟絲子木香各三分丁香酒浸破故紙炒沒藥各三分半八角茴香四分半鹽炒熟為度木通七分去皮炙川楝子七分麩炒馬蘭花七分半醋浸炒桂花龍骨葫蘆巴炒吳茱萸湯浸洗七次各五分錢仙靈脾九分半醋炙蛇床子五分地膚子四分上為細末用羊羔兒精肉一斤以刀刮去筋膜無灰酒熬成膏子為糊丸如梧桐子大每服五十丸空心酒下乾物壓之溫補藥沉香木通木香丁香八角茴香杜仲炒去絲葫蘆巴炒楮皮炒破故紙炒川萆薢韭子炒甘草焙肉桂穿山甲地龍菊花枸杞子各一兩無名異二分半青木香一兩上為細末蜜糊為丸梧桐子大溫酒下三十五丸空心服壯元丹治肝腎虛精血不足眼昏黑花迎風有淚頭暈耳鳴服之甚效或腎風下疰腰腳沉重筋骨痠疼步履無力陰汗盜汗濕癢生瘡常服耐寒暑進飲食黑髭發潤肌膚壯筋骨牛膝酒浸三日蓯蓉酒浸一日熟地黃川芎覆盆子各二兩石斛一兩半去根菟絲子一兩酒浸三日當歸續斷巴戟白茯苓山茱萸肉枸杞子肉桂五味子防風杜仲炒各一兩半上為細末用蜜丸如梧桐子大每服五十丸空心食前用鹽湯酒下歸茸丸補諸虛當歸酒洗鹿茸酒浸炙北黃耆鹽水炙沉香靈砂三兩研北五味子炒遠志肉酸棗仁吳茱萸茴香炒破故紙炒牡蠣煅熟地黃蒸人參龍骨煅附子炮巴戟各一兩上煅制如法酒糊丸如梧桐子大每服七十丸空心溫酒下溫補藥溫補下元壯筋骨安神定志去痰驅風乳香沒藥木香沉香當歸酒浸肉蓯蓉酒浸破故紙酒浸川續斷酒浸半夏茴香白茯苓天麻官桂琥珀各一兩杜仲二兩麝香辰砂各一錢為衣上為細末酒糊為丸如梧桐子大每服五六十丸空心溫酒或鹽湯下乾物壓之沉香豬肚丸出百一選方沉香丁香木香木通川椒炒蓽澄茄陳皮葫蘆巴炒破故紙吳茱萸桂巴戟去心茴香炒牛膝肉蓯蓉附子炮去皮臍各三兩檳榔銼肉豆蔻各四兩上為細末生豬肚一個去脂先用生絹袋盛藥末令在豬肚內縫合用酸漿水一桶於銀石鍋內煮令豬肚軟取出放冷不用豬肚將藥焙乾酒麵糊為丸如梧桐子大每服五十丸溫酒下婦人醋湯下與壯氣丸相間服此藥雖男子藥婦人久病氣虛服之大驗史忡華母親服取效團參丸出百一選方團參桑白皮銼各二兩人參陳皮洗桂去皮白朮訶子去核麥門冬去心大腹皮銼炒杏仁炒去皮尖半夏曲各一兩檳榔銼芫花醋炒附子炮去皮澤瀉吳茱萸炒枳實麩炒去瓤各半兩上為細末姜麵糊為丸如梧桐子大每服米飲下十丸未效加至三十丸劉尉服時去芫花加牽牛粉半兩取效牽牛隻取第一次粉用丸作大丸或以水一盞煎服尤妙石菖蒲丸出聖濟總錄主平補諸虛久服輕身延年活血益氣潤澤肌膚石菖蒲九節者佳一兩半柏子仁杜仲去粗皮炙銼百部山芋甘草炙銼五味子炒貝母去心丹參各一兩人參蒸防風去叉白茯苓去黑皮茯神去木各一兩遠志去心半兩生乾地黃焙二兩麥門冬去心焙二兩上為末煉蜜和丸如彈子大每服一丸空心食前熟水嚼下日進三服摩腰膏補下元虛敗白濁若摩一丸空心食前熟水摩腰下如火至二丸血脈舒暢三丸顏色悅澤十丸骨健身輕氣全精足骨髓堅完母丁香木香硃砂藿香附子乾薑沉香桂生硫黃枯礬吳茱萸雄黃杏仁陳皮各二錢麝香輕粉各一分上除麝香輕粉為末卻入前味研勻蜜丸小雞頭實大每服用老薑汁煎滾傾在盞將一丸浸汁中良久化破研之為汁令人蘸藥於腰上摩之藥盡為度須臾腰上如火但是諸虛之病悉能治之地黃煎丸平補諸虛生地黃二十斤洗搗取汁熟乾地黃焙二斤甘草銼半斤炙鹿角膠炙四兩生乾地黃焙二斤菟絲子酒浸別搗醇酒一斗用無灰者白蒺藜炒去角牛膝酒浸切焙乾漆末用酒拌和炒令煙盡白檳榔煨銼白茯苓去黑皮枳殼去瓤麩炒萆薢覆盆子去梗各四兩上除生地黃汁並酒外並各細搗羅為末先取地黃汁與酒五升於銀鍋內慢火煎三二十沸次下鹿角膠攪勻消盡次下地黃末又次下諸藥添酒以柳枝不住攪候堪為丸即分為二十劑余以蠟紙塞於寬瓷瓶內封貯逐一劑旋取丸如梧桐子大每服三十丸加至五十丸空心食前溫酒下余藥收經三月餘取於日中曝之依前收封貯兼治虛勞諸風等疾牢牙齒榮髭發久服堅筋骨長肌肉悅顏色聰耳明目令人壯健萬病不生用地黃酒下尤佳延年丸一名枸杞子丸平補五臟治百病固真丸治諸虛不足常服補益五臟接助真陽潤澤肌膚強壯筋骨川烏頭鹽炒黃色去鹽熟地黃浸洗焙秦椒各二兩肉桂去皮茴香酒浸炒威靈仙山藥仙靈脾五味子炒各一兩萆薢附子炮去皮臍白茯苓去皮當歸洗焙牛膝酒浸一宿石菖蒲各半兩上為末煉蜜和搗千餘下丸如梧桐子大每服五十丸空心溫酒鹽湯下一方無牛膝坎離丸治心脾腎三經不足蒼朮八兩銼如豆大泔浸二日或焙或曬乾分作四處一分用真烏頭一兩去皮臍切作片子又用川楝子淨肉一兩同蒼朮一處炒焦黃色為度一分用川椒去目一兩又陳皮一兩破故紙一兩酒浸一宿炒令乾次下蒼朮川椒一處炒黃色一分用茴香淨一兩青鹽一兩半食鹽炒半夏一兩先下蒼朮炒熟次下茴香等一處炒黃色一分用醇釀酒醋各一碗煮蒼朮令自乾燥入後藥麥門冬去心三錢焙乾天門冬去心三錢焙茯神去粗皮木三分炒遠志去心三分焙沉香一兩焙鹿茸燎去毛酥炙葫蘆巴酒浸焙川巴戟去心酒浸炒各五分錢當歸酒浸淨焙人參去蘆枸杞子雀腦川芎陳皮去瓤各半兩上為細末好酒煮神麯末二兩打糊為丸如梧桐子大每服四丸空心服如補心棗湯下補腎溫酒鹽湯送下飛步丹茅山蒼朮半斤米泔浸一宿切片子用老蔥白同炒半黃色為度小茴香四兩炒杜仲炒去絲肉蓯蓉酒浸菟絲子酒浸各一兩為餅八角茴香炒南木香生韭子酒浸破故紙炒川楝子取肉炒葫蘆巴炒川牛膝酒浸各半兩胡桃肉六十枚去皮油用好川烏二枚炮裂去皮臍上為末煮酒為糊丸如梧桐子大每服七十丸加至百丸好酒送下空心食前心腎丸理水火不濟恍惚多忘心忪盜汗夜夢驚恐小便白濁精滑夢泄腰膝緩弱四肢痠痛補氣血生津液安神定志此方皆宣利諸患脫症自泄不止醫不能治服心腎丸博金散金鎖丹此三方得效復以壯年精不自泄三藥互換間服五味子去枝人參去蘆遠志去苗甘草煮捶去骨附子炮去皮臍龍骨煅白茯苓去木山藥當歸去蘆酒浸黃耆蜜炙各一三兩蓯蓉酒浸牛膝酒浸熟地黃洗蒸各二兩菟絲子酒浸蒸研成餅二兩鹿茸火去毛用好酒塗炙一兩上為末用浸藥煮糊為丸如梧桐子大每服七十丸棗湯送下平補鎮心丹出和劑方治丈夫婦人心氣不足志意不定神情恍惚夜多夢異忪悸煩郁及腎氣傷敗血少氣多四肢倦怠足脛痠疼睡臥不穩夢寐遺精時有白濁漸羸弱熟乾地黃生乾地黃乾山藥天門冬麥門冬去心柏子仁茯神各四兩一本七兩辰砂少研別研為衣桔梗炒各三兩石菖蒲九節蜜煮十六兩遠志去心甘草煮三四沸七兩當歸去蘆六兩龍骨一兩上為細末煉蜜為丸如梧桐子大每服三十丸空心飯飲吞下溫酒亦得漸加至五十丸宜常服益精髓養氣血明視聽潤肌膚駐顏色三至丸出永類鈐方主補虛損生精血去風濕壯筋骨明目聰耳強健腰腳和悅陰陽既濟水火久服百病不生鹿角鎊細以真酥一兩無灰酒一升煮乾慢火炒乾蒼耳酒