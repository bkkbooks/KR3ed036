斑龍丸出百一選方鹿角膠以酒浸膠數日煮糊丸入眾藥鹿角霜研為細末菟絲子洗淨酒浸兩夜蒸研柏子仁淨者別研熟地黃好者酒浸二宿蒸焙余酒入在膠內各十兩上先焙鹿角霜菟絲子地黃幹了碾為細末方入柏子仁在眾藥內研卻將鹿角膠酒約三四升煮糊丸於石臼內杵三千下令熟丸如梧桐子大早晚空心五十丸至一百丸止逐日早晚服久大有功效鹽湯或酒任下熟乾地黃丸出本事方專治虛熟乾地黃五兩菟絲子四兩別研鹿茸三兩附子二兩沉香一兩上為細末入麝香半錢煉蜜杵丸如梧桐子大每服三十丸至五十丸鹽湯溫酒任下五補丸出和劑方昔麗正殿學士李子昭幼好道嘗棲名山往來茅嵩間三十載傳此二方人參茯苓去皮地骨皮乾地黃牛膝各等分上搗篩蜜和丸如梧桐子大空腹以酒飲下三十丸稍增至五十丸日再此是五補丸服五日十日及半月自覺氣壅即服後七宣丸服經二三日覺氣散還服五補丸若病候未退稍稍增之常自審以取調適中須五補及七宣丸並須合服之夫人所疾皆因風不宣散即成擁緩熱風若氣不流行即成痃癖冷氣轉生眾病皆因此由尋其本源都為不閒將理覺虛則補覺風氣擁即利利即腰背更虛且凡是利藥皆急服便透過未能蓄泄諸病凡是補藥皆滯服未見效先覺風氣發動明知宣補必藉氣機之流行調適中和名曰五補七宣此所以安七魄鎮五臟堅骨髓養神明久服長生百病日去發黑行及奔馬七宣丸大黃煨五兩枳實炙五兩青木香柴胡各五兩甘草四兩炙訶黎勒皮五兩桃仁六兩去尖皮炒上搗篩蜜和丸如梧桐子大以酒服二十丸稍加至五十丸病在下空心服病在上食後服之以宣利為度增減以意量之若風氣結聚宿食不消兼石皮沙毛在腹中服經七八日乃盡出下似牛涎魚腦等若病深痼則須半月或一月專服之不用五補丸若積年腰膝疼痛寒冷如水石腳氣衝心潰悶將死頭施暗倒肩背重悶心腹脹滿胸膈閉塞風毒腫氣連及頭面及大小便或利澀脾胃氣不理不能飲食服之盡瘥夜臥腳轉筋掣疼痛恍惚眠寢不安等疾以飲食之盡瘥此藥功效不可盡說如前十數種病攻擊則須七宣丸令除自外輕病不妨與五補丸兼服循環不輟補養無限不問男女老少並可服餌但須量氣力細察候之加減服若嬰孩可與三丸五丸稍稍加之取通利其二方當須經久常服不限春夏秋冬朝夕行止間藥性甚善禁如常法平補蓯蓉四倍丸出聖濟總錄蓯蓉酒浸一宿去粗皮切焙二兩菊花六兩牛膝酒浸一宿切焙四兩枸杞子八兩上為末煉蜜丸如梧桐子大每服三十丸空心溫酒下山芋四倍丸出聖濟總錄性平補除風痰益壽延年山芋半兩枸杞子一兩甘菊花二兩熟乾地黃焙四兩上為末煉蜜丸如梧桐子大空心食前鹽湯下三十丸溫酒亦得四金丸出聖濟總錄能平補五臟壯筋骨益顏色美飲食肉蓯蓉酒浸一宿焙牛膝酒浸一宿焙天麻青鹽細研各三兩上除鹽外為末鹽與藥和勻用木瓜一枚除心蒸爛去皮入臼中與四味藥同搗丸如梧桐子大若干少少入酒丸每服五十丸空心夜臥暖酒下萬壽地芝丸出御藥院方能和顏色利血氣調百節黑髮堅齒逐風散氣愈百病生地黃天門冬去心各八兩菊花枳殼去瓤麩炒各四兩上為細末酒蜜麵糊為丸如梧桐子大每服三十丸漸加至四十丸五十丸空心溫酒下晚食前再服黃連茯苓丸出御藥院方壯水源降心火黃連白茯苓各四兩破故紙微炒菖蒲各半兩上為細末酒麵糊為丸如梧桐子大每服六十丸食前溫水下之玄菟丹出百一選方能治腎水枯竭津液不生消渴諸症並皆治之一方有人參菟絲子十兩五味子七兩一名玄芨白茯苓五兩蓮肉二兩上為細末以山藥六兩打薄糊為丸每服五十丸鹽酒任下復春丹出醫方大成穿心巴戟酒浸萆薢酥炙破故紙酒浸一宿芝麻同炒熟去芝麻揀淨杜仲酥炙去絲以上各等分上為細末胡桃仁十五個煎水去皮另研如泥與前藥用酒打麵糊為丸如梧桐子大每服三十丸至四十丸空心好酒下忌油膩之物豬羊血綠豆粉芫荽漿水冷物俱忌服之大效平補枸杞子丸出聖濟總錄石斛去根一兩鹿茸去毛酥炙地骨皮各一分上焙搗羅為末以紅枸杞子自然汁二合無灰酒一合白蜜半兩熬成膏丸如梧桐子大每服三十丸空心溫酒或生薑湯下平補仙術丸出聖濟總錄蒼朮三斤米泔浸一宿切炒為末生乾地黃切焙為末一斤枸杞子為末二斤上為末用好酒二升先調枸杞子末成膏次將蒼朮地黃二藥同搗三百杵丸如梧桐子大每服三十丸空心新汲水下又外用枸杞子為末一斤同蒼朮地黃二藥成膏為度三才丸出御藥院方能滋陰養血潤補不燥養氣和神天門冬去心生地黃各三兩二味用柳甑箄以酒灑之九蒸九曝乾用人參去蘆二兩上同為末以棗肉為丸梧桐子大每服三十丸食前溫酒下日進三服歲久為驗一方用蜜麵糊為丸或米飲亦可服封髓丹出御藥院方專降心火益腎水黃柏三兩縮砂仁四兩半甘草二兩上為細末水煮麵糊稀和丸如梧桐子大每服五十丸用蓯蓉半兩切作片子酒一大盞浸一宿次日煎三四沸去滓送下空心食前服雙芝丸出家藏經驗方麋鹿茸各五兩隻用一色亦得鎊細酒浸夏一宿春秋二宿冬浸三宿取出絞瀝令乾慢火焙川附子二個六錢者炮去皮臍沉香七錢上為細末鹿角膠三兩麩炒別為末用酒慢火熬成膏入麝香三錢研細搜藥入臼搗數百杵令勻和丸如梧桐子大每服三十丸空心溫酒下加至五十丸一方無麝香麋茸丸出十便良方主治腎經虛腰不能反麋茸一兩如無麋茸以鹿茸代菟絲子取末一兩舶上茴香半兩上為末以羊腎二對如法酒煮爛去膜研如泥和丸如梧桐子大陰乾如腎膏少入酒糊佐之每服三五十丸溫酒鹽湯下芙蓉丹出濟生方能治心腎不足氣不升降用心過度驚悸多忘附子一兩炮硃砂半兩上為末煮糊為丸鹽湯空心下五十丸雙補丸出朱氏集驗方能治下部弱腎水冷平補不燥不熱熟地黃補血菟絲子補精各半兩上為細末酒糊丸如梧桐子大每服五十丸人參湯下如氣不順沉香湯下如心氣虛茯苓湯下如心氣煩躁不得眠酸棗仁湯下腎氣動茴香湯下小便少車前子湯下小便多益智湯下此法乃劉子壽之祖在京師辟雍得史戴之傳此法服之四十年年八十矣固真丸一名鹿角霜丸出御藥院方專治腎經虛損真元不足以鹿角一對用殺者去頂骨截作三寸長短解作兩半秤准斤兩用河水浸七日每日一換新水浸候日數足每角一斤入好黃蠟一兩用瓷缸子內以河水用桑柴火煮三伏時不得住火如水少漸添浸著角後煮得角軟削去黑皮只取霜曬乾將煮角汁再以慢火熬成清膠每用鹿角霜一斤入上好者雪白茯苓五兩刮去黑皮二味同搗為細末將鹿角膠水搜和為丸如梧桐子大每服五十丸空心用溫酒下漸漸加至一百丸亦得若不吃酒以清水飲下亦可常服暖丹田補真氣活血脈健筋骨添精固氣延年助陽丙丁丸出本事方能生血養氣降升水火附子一個九錢重炮川烏一個七錢重炮當歸二兩酒浸赤芍藥五兩沉香益智各半兩上為末浸當歸酒煮麵糊丸如梧桐子大硃砂為衣每服五十丸空心溫酒鹽湯任下婦人淡醋湯下麝香鹿茸丸出百一選方能治諸虛不足當歸酒浸一宿鹿茸去皮酥鹿角霜各三兩麝香三錢細研肉蓯蓉酒浸一宿附子炮裂去皮臍各二兩上為細末用鹿角膠四兩熔作汁和丸如梧桐子大每服五十丸空心酒鹽湯下日一服鹿角膠同用難和藥可入湯二三合同煮如缺以阿膠代之治大病後不足病虛勞補虛取七歲至十五歲以上黃牛乳一升水四升煎取一升如飢稍稍飲不得多服十日住治虛弱出本草用鯽魚一味五味熟煮食之服大豆法長肌膚益顏色填骨髓加氣力補虛又能嗜食瘦人服兩劑即令肥充不可識肥人不得服之用大豆五升取肥好者一依作醬法料理取黃搗末以絹篩之以豬肪脂銷煉如法去滓以膏和豆末作丸訖以油紙裹之置於密器中收之一方服如梧桐子大五十丸漸加至一百丸日再酒飲任下一無所禁服十日以後食不知飽也鎮心丸明目鎮保心氣寧養神志宣暢氣血解諸邪壅黃疸鼻衄小水淋痛宜服之黃芩去黑皮大黃各一兩炙熟荊芥穗龍腦薄荷去根甘草炙芍藥山梔子各二兩上為末麵糊丸如梧桐子大每服三十丸溫熟水下不拘時候熟乾地黃丸出衛生家寶方常服平補益顏色填骨髓去勞倦膈熱喀血等疾熟乾地黃十兩溫湯洗過焙乾秤枸杞子五兩揀擇淨洗焙乾秤肉桂半兩不見火去粗皮上件先將熟乾地黃枸杞子二味搗為細末別搗桂為細末一處拌勻煉蜜為丸如梧桐子大每服三十丸至五十丸空心食前用溫酒或溫熟水下日二服養真丸出余居士選奇方能治內補腑臟外充百脈資血平氣調筋強力進食養精更宜常服功不可述當歸去蘆酒浸一宿湯洗過焙乾熟地黃洗淨焙乾各秤三兩北五味子去梗一兩川芎人參茯苓白朮黃耆各一兩上件為細末煉蜜丸如梧桐子大每服三十丸食前米飲吞下椒紅丸出醫學切問能安五臟壯筋骨明目去昏進飲食川椒三二兩巴戟去心茴香川楝子肉山藥各一兩上為末酒為丸如梧桐子大溫酒吞下五十丸空心下老人加附子一兩通用炮過養腎丸出醫學切問性平補人參一兩破故紙一兩上為末胡桃一百個取肉為丸每服五十丸空心溫酒送下陽起石丸出孟氏詵詵方能治丈夫陰陽衰微陽事不舉才交即泄寒精自流胸中短氣陰汗盜汗冷痛或癢而生瘡出黃濃水宜服此藥助陰壯陽遠志洗取肉半兩陽起石煅沉香不見火北五味嫩鹿茸酸棗仁出皮桑螵蛸微炒白龍骨白茯苓鍾乳粉各一兩天雄一兩薑汁製去臍菟絲子二兩上末煉蜜丸如梧桐子大每服四十丸至五十丸炒茴香白茯苓煎湯吞下若強壯人服覺火熱去天雄加肉蓯蓉平補蓯蓉煎十便良方能補虛填精髓蓯蓉五味子山茱萸杜仲茯苓牛膝酒浸切焙菟絲子薯蕷巴戟上件等分搗羅為細末以酒煮麵糊丸如梧桐子大每服三十丸空心米飲下下氣補益出本草以荏子研之雜米作糜食之甚肥美補治方出本草以金櫻子熬作煎酒服有效十精丸出百一選方專治下部常服吳茱萸茴香臺椒三味同炒焦黃色破故紙炒良薑炒川楝子去核皮陳皮青皮蒼朮大川烏用青鹽炒赤色去皮尖上十味各一兩同為細末酒和為丸每服二十丸至三十丸空心鹽湯酒任下婦人米醋湯下六益丸出朱氏集驗方專補脾腎乃劉通真家秘方丁香木香肉豆蔻麵煨白附子炮附子炮一兩者尤妙血茸上件各一兩為末酒和為丸如梧桐子大每服三五十丸溫酒下
