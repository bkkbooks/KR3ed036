body:
  text: 卷二百四十一腳氣門一切風寒暑濕腳氣附論夫太陽經腳氣病者頭痛目似脫項強腰脊連體樞循髀外出外踝之後循京骨至小指外側皆痛者乃足太陽膀胱經為風寒暑濕流注自汗者為風勝無汗疼痛為寒勝熱頑為暑勝重著腫滿為濕勝諸經皆當如此推究太陽經隨四氣發散愈此太陽經腳氣治法方麻黃左經湯出醫方大成治風寒暑濕流注足太陽經手足攣痹行步艱難憎寒發熱無汗惡寒或自汗惡風頭疼眩暈腰重關節痛麻黃去節乾葛細辛白朮切米泔浸防己桂心不見火羌活防風甘草炙茯苓各等分上㕮咀每服四錢水二盞姜三片棗一枚煎至七分去滓空心服自汗去麻黃加桂芍藥重著加朮橘皮無汗減桂加杏仁澤瀉所加並等分少陽經腳氣證病者口苦善太息脅痛面垢體無膏澤頭頷目銳眥痛缺盆並腋下馬刀腫自汗振寒發熱胸中脅肋髀膝外至胻絕骨外踝及諸節指皆痛者乃足少陽膽經為風寒暑濕流注之所為四氣偏勝例如前說治之宜隨四氣和解少陽經腳氣治法微別於太陽宜參之方半夏左經湯出醫方集成治足少陽經為風寒暑濕流注發熱腰脅痛頭疼眩暈嘔吐宿汁耳聾驚悸熱悶心煩氣上喘滿肩膝腿痹縱緩不隨半夏湯洗去滑乾葛細辛白朮茯苓桂心不見火防風乾薑炮黃芩小草甘草炙柴胡麥門冬去心各三分上銼散每服四大錢水一盞半姜三片棗二枚煎七分去滓空心服熱悶加竹瀝每服半合喘滿加杏仁桑白皮陽明經腳氣證病者悽悽寒熱呻欠口鼻乾腹脹髀膝臏中循胻外兼下足跗入中指內間皆痛者乃足陽明胃經為風寒暑濕流注之所為四氣偏勝並如上說治之宜隨四氣微利之陽明經腳氣治法方大黃左經湯出醫方集成治風寒暑濕流注足陽明經使腰腳痹痛行步艱難朝夕昏塞大小便秘澀腹痛嘔吐或復下利惡聞食氣喘滿肩息或自汗譫語妄言大黃蒸細辛去苗茯苓防己一方無羌活黃芩前胡枳殼去瓤麩炒厚朴去皮銼薑汁製甘草炙杏仁麩炒去皮尖別研上銼散每服四大錢水一盞半姜三片棗二一枚煎七分去滓空心熱服腹痛加芍藥秘結加阿膠喘加桑白皮紫蘇小便秘加澤瀉四肢瘡癢浸淫加升麻所加並等分三陽併合腳氣證治病者憎寒壯熱自汗惡風或無汗惡寒眩暈重著關節掣痛手足拘攣疼痛冷痹緩縱不隨心躁氣上嘔吐下利此皆三陽經中風寒暑濕其脈必浮弦緊數大料神秘左經湯出醫方集成治風寒暑濕流注足三陽經手足拘攣疼痛行步艱難憎寒發熱自汗惡風頭眩腰重關節掣痛或猝中昏塞大小便秘澀或腹嘔吐下利惡聞食臭髀腿頑痹緩縱不隨熱悶驚悸心煩氣上臍下冷痹喘滿肩息麻黃去節乾葛細辛厚朴薑製炒茯苓桂心防己枳殼麩炒去瓤羌活防風去叉柴胡黃芩小草即遠志苗白姜炮半夏湯洗去滑甘草麥門冬去心各等分上銼散每服四錢水一盞半生薑三片棗二枚煎至七分去滓空心服自汗加牡蠣白朮去麻黃腫滿加澤瀉木通熱甚無汗減桂加橘皮前胡升麻腹痛吐利去黃芩加芍藥附子炮姜大便秘加大黃竹瀝喘滿加杏仁桑白皮紫蘇所加並各等分凡有此病詳認證狀逐一加減無不愈者常服下氣消痰散風濕退腫進飲食令人不虛江南諸師固秘此方雖父子兄弟不傳學者敬之加減敗毒散出醫方大成治三陽經腳氣流注腳踝上焮熱腫寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殼去瓤麩炒桔梗甘草炙人參茯苓川芎大黃蒼朮米泔浸各等分上銼散每服四大錢水一盞半姜三片薄荷二錢煎七分去滓熱服不過二服愈皮膚瘙癢赤疹加蟬蛻煎太陰經腳氣證治病者腹滿夾咽連舌系急胸膈痞滿循胻骨下股膝內前廉內踝過核骨後連足大指之端內側皆痛者乃足太陰脾經為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重溫散之方六物附子湯出三因方治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利惡風怯寒頭面手足時時浮腫附子炮去皮臍桂心各四兩白朮三兩甘草炙三二兩防己四兩茯苓三兩上銼散每服四錢水二盞姜七片煎七分去滓溫服少陰腳氣證治病者腰脊痛小指之下連足心循胻骨內踝入跟中上腨內出膕中內廉股內皆痛上衝胸咽飢不能食面黑小便淋閉咳唾不已善恐心惕惕若人將捕之狀小腹不仁者難治足少陰腎經為四氣流注之所為也四氣偏勝並如前治之各隨其氣所中輕重而溫散之方八味丸出金匱方治少陰腎經腳氣入腹不仁上氣喘急嘔吐自汗此證最急以腎乘心水剋火死不旋踵凡小腹不仁者速治之牡丹皮澤瀉茯苓各三兩附子炮去皮臍桂心各二兩山茱萸山藥各四兩熟地黃八兩上為末煉蜜丸如梧桐子大每服五十丸溫酒或米湯食前送下厥陰經腳氣證病者腰脅偏疼從足大指連足趺下廉上膕至內廉循股內絡陰器抵小腹夾臍諸處脹痛兩腳攣急嗌乾嘔逆洞泄者是足厥陰肝經為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重調理之方神應養真丹出危氏方治足厥陰肝經為四氣進襲肝經左癱右瘓涎潮昏塞半身不遂手足頑麻語言蹇澀頭旋目眩牙關緊急氣喘自汗心神恍惚肢體緩弱上攻頭目下注腳膝榮氣凝滯遍身疼痛兼治婦人產後中風及角弓反張墮車落馬打撲傷損瘀血在內當歸酒浸天麻川芎羌活白芍藥熟地黃各等分一法無羌活入木瓜熟阿膠等分上為末蜜丸如雞子黃大每服一丸木瓜菟絲子浸酒下腳痹薏苡仁浸酒下中風溫酒米湯下乳香宣經丸出和劑方治體虛為風寒暑濕所襲四氣相搏半身不遂手足頑麻骨節煩疼足脛浮腫惡寒發熱漸成腳氣肝腎不足四肢攣急遍身攻注或閃打撲跌內傷筋骨及風邪內搏男子疝氣婦人經脈不調常服活血止痛補虛壯筋骨威靈仙去蘆洗烏藥去木茴香炒川楝子銼炒牽牛子炒橘皮去白萆薢防風各三二兩五靈脂乳香各半兩草烏黑豆一合同煮竹刀切看透黑為度去皮半兩上為末酒糊丸如梧桐子大每服五十丸鹽湯酒任下婦人醋湯下食前服四蒸木瓜丸出危氏方治肝腎脾三經氣虛為風寒暑濕搏著流注經絡竭日曠歲治療不痊凡遇六化更變七情不寧必至發動或腫滿或頑痹及憎寒壯熱嘔吐自汗威靈仙苦葶藶同入黃耆續斷同入蒼朮橘皮同入烏藥去木與黃松節同入上各半兩以大木瓜四個切蓋去穰入前件藥仍用蓋簽定酒灑蒸熟三蒸三曬取藥出焙乾為末研瓜為膏搜和丸如梧桐子大每服五十丸空心溫酒鹽酒任下世傳木瓜丸最多惟此方有效當敬之黃松節茯神心木也川膝煎方出危氏方治肝腎虛為風寒濕毒所中流注腿膝歷節疼痛如錐刀鍛刺不可名狀牛膝二兩去蘆干烏頭十個端正若捶碎以紙袋盛以烏豆一斗藉覆蒸一日取出去豆不用去皮尖者為妙上不要見銅鐵器及火與日木臼搗碎牛膝再入石磨中磨為末酒糊為丸如梧桐子大每服四十丸用無灰酒一瓶中樣木瓜一個切作片入瓶中煨木瓜爛為度用此酒下不拘時候然肝氣惡鐵忌則有之不見火日此好事者妄忌且如烏頭牛膝採時豈一向陰乾也蒼朮散出經驗良方治一切風寒濕熱令足膝痛或赤腫腳骨間作熱痛雖一點能令步履艱苦及腰膝臀髀大骨疼痛令人痿躄一切腳氣百用百效蒼朮米泔浸一日一夜鹽炒黃柏去粗皮酒浸一日一夜炙焦各四兩上銼散每服四錢水一盞煎七分溫服日進三四服勝駿丸出醫方集成治元氣不足真氣虛弱及諸寒濕氣進襲手足拳攣腳指連腳面拘急走注疼痛筋脈不伸行步不隨常服益真氣壯筋骨黑髭鬚滑皮膚一切足弱鶴膝諸風附子一枚炮去皮臍當歸酒浸一宿天麻酒浸牛膝酒浸酸棗仁炒熟地黃酒浸防風去叉各三二兩木瓜四兩乳香半兩別研麝香一分別研全蠍去毒木香各一兩沒藥別研羌活甘草炙各一兩上為細末用生地黃三斤洗淨搗爛如泥入無灰酒四升煮爛如膏以前藥和勻杵令堅每兩作十丸每服一丸細嚼臨睡酒下地黃膏春夏極多入冬或無地黃只煉蜜為丸如梧桐子大每服五十丸鹽湯溫酒下後附加減法檳榔萆薢蓯蓉酒浸破故紙炒巴戟去木上各一兩內熟地黃當歸各減一兩尤妙如服此藥五七日或半月見效甚速行步如飛乃名勝駿側子酒治腳氣雖差至冬季間常須服此方側子二兩炮乾薑二兩石斛八兩丹參三兩牛膝二兩甘草二兩炙防風三兩熟地黃四兩芎藭二兩當歸三兩桂心三兩五味子三兩白朮二兩秦艽三兩防己二兩川椒二兩去汗獨活三兩山茱萸四兩細辛二兩黃芩二兩茯苓四兩附子一兩炮上㕮咀絹袋貯以酒三斗五升浸秋冬七日春夏五日一服四合日二細細加之以知為度得食羊鹿獐肉雞肉亦得食忌海藻菘菜豬肉冷水桃李雀肉生蔥生菜蕪荑酢物導氣飲出仁存方治寒濕腳氣赤腫疼痛心腹膨脹頭面手足浮腫身體腰背疼痛並皆治之羌活獨活木瓜薏米青皮陳皮桑白皮大腹皮枳殼檳榔青木香紫蘇甘草大腹子赤茯苓木通上各等分㕮咀每服四錢水一盞半煎至八分去滓食前服熱者加大黃濕者加蒼朮木瓜牛膝丸一名木瓜丸出和劑方治寒濕腳氣冷濕下注腳弱無力及腎經虛弱腰膝沉重腿腳腫急筋脈拘攣或時疼痛步履艱難二便不利日見倦困木瓜肉蓯蓉酒浸炙石楠藤當歸去尾烏藥熟地黃杏仁去皮尖川牛膝去苗黑牽牛炒陳皮去白續斷去蘆赤芍藥各等分上為末酒糊丸如梧桐子大每服三十丸空心用木瓜煎湯吞下鹽湯亦可未效用羌活木瓜浸酒或加川牛膝溫暖一盞許吞下大腹湯治腳氣痹攣寒搏筋脈不能轉側大腹子連皮銼四枚防己青橘皮湯浸去白焙紫蘇莖葉木通銼羌活去蘆頭萆薢地骨皮五加皮酒浸炙黃芎藭各一兩木香半兩訶黎勒皮焙五兩上搗篩每服三錢匕水一盞入生薑半分拍破同煎至六分去滓食前溫服日晚再服木瓜牛膝丸出醫方集成治寒濕腳氣冷濕下注腳弱無力或腫急疼痛兼治婦人血風大固腎氣活血壯筋骨木瓜大者三四個切開蓋去瓤先用糯米漿過鹽焙乾為末卻將鹽末入瓜內令滿仍用蓋針定蒸三次爛研作膏川烏大者去皮尖用無灰酒一升浸薄切煮乾研為膏用三兩重牛膝酒浸萆薢一方無茴香炒羌活青皮青鹽別研入狗脊燎去毛巴戟海桐皮九件各一兩上為末入青鹽和勻將前二膏搜和為丸如硬再入酒杵數千下丸如梧桐子大每服五十丸食前鹽酒湯任下朮附湯出海上方治寒濕腳氣筋骨手足一切疼痛諸症附子炮去皮臍半兩白朮六錢人參洗去蘆二錢半杜仲去皮姜炒去絲六錢甘草炙官桂去粗皮秤各二錢半川薑七錢半炮當歸去土酒浸一宿焙乾一兩二錢半牛膝去根酒浸焙乾秤半兩上為粗末每服半兩水二盞煎至八分溫熱服病在上者食後病在下者食前服騙馬丹出瑞竹堂治寒濕腳氣四時疼痛補五臟壯筋骨補精髓注顏黑髮鬢行步健大宜常服葫蘆巴鹽炒黃色破故紙鹽炒香金剛骨酒浸一宿酒鹽炒骨碎補去毛鹽炒甜瓜子鹽炒黃色胡桃仁另研細以上各一兩乳香另研沒藥另研自然銅火煅醋蘸十餘次以上各半兩上除自然銅另研外為細末醋糊為丸如梧桐子大每服三十丸溫酒送下病在上食後病在下食前日進三服五斤丸出楊氏家藏方治筋血不足腰腳緩弱行步艱辛一切寒濕腳氣並皆治之沒藥別研一斤川烏頭炮去皮山藥各四兩大木瓜去皮瓤一斤天麻透明者切焙一斤牛膝去蘆頭用無灰酒浸一宿控干切焙用一斤肉蓯蓉酒浸一宿切焙一斤虎骨塗酥炙黃色四兩上將木瓜蒸爛研作糊和藥末為丸如丸不就更用元浸牛膝