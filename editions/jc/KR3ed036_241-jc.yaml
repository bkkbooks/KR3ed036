桐子大每服三十丸空心溫酒鹽湯任下蒼朮丸治腳氣祛濕痛養腎水順氣疏風蒼朮一斤用四兩酒浸四兩米泔水浸四兩醋浸四兩青鹽水浸冬五日夏三日依前分作四處一分椒一兩炒一分黑牽牛一兩炒一分茴香炒一分破故紙炒同炒訖去伴藥止用蒼朮上為末醋糊為丸空心酒鹽湯任下年五十以上加沉香一兩木香二兩巴戟二兩熨痛膏治寒濕客搏經絡四肢骨節疼痛乾薑炮大麥炒各二兩上件為細末每服用一兩以童子小便半升同熬成膏稀稠得所趁熱用蓖子攤上痛處紙蓋以帛子包裹系定燒新瓦片厚紙裹熨藥上令乾透治腳氣及風寒濕痹四肢攣急腳疼不可踐地用紫蘇二兩杵碎水二升研取汁以蘇子汁煮粳米二合作粥和蔥豉椒姜食之風腳氣附論內經謂暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂寒暑風濕之氣皆本乎地人或履之所以毒易中於足也因病從腳起故謂之腳氣又況五臟流注脾與腎肝之經絡皆起足指故有風毒腳氣之病其證或見食嘔吐或腹痛下利或溲便不通或胸中驚悸不欲見明或語言錯妄或頭痛壯熱或身體冷痛轉筋脛腫𤸷痹緩縱其狀不一治療不可緩也凡小覺病候有異即須大怖畏決意急治之傷緩則氣上入腹或腫或不腫胸逆滿上氣肩息者死不旋踵寬者數日必死不可不急治之但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死故不可緩也風毒之氣入人體中脈有三品內外症候相似但脈有異若脈浮大而緩宜服續命湯兩劑應瘥若風勝宜作越婢湯加白朮四兩若脈浮大而緊轉快宜作竹瀝湯若病人脈微而弱宜服風引湯此脈多是因虛而得之若大虛短氣力乏其間可作補湯隨病冷熱而用之若未愈更服竹瀝湯若病人脈浮大而緊快此是三品之中最惡脈也或沉細而快者此脈正與浮大而緊者同是惡脈浮大病在外沉細病在內治亦不異消息以意耳形容似可而手腳未安且至弱數日之中氣上即便命終如此之脈往往有人得之無一存者急服竹瀝湯要湯勢常令相及勿令半日之中空無湯也此湯竹瀝汁宜多服之若不極熱服後輒停在心胸更為人患每服當使極熱若服竹瀝湯得下者必佳也若已服三劑竹瀝湯病及脈勢未折而苦脹滿可服鱉甲湯下之若湯勢盡而不得下可以丸藥助湯令下下後更服竹瀝湯輒令脈勢折氣息料理便緩服三十二味八風散佳凡初得病便摩野葛膏日再頑痹腳弱都愈乃止若服竹瀝湯脈勢自折如未病時氣力運轉腳未能遽行而體力充足然後漸漸行步病重者瘥後半年始能扶而行耳既覺脈正體瘥但當勤服八風散勿以一腳未能行輕加余治余治未必全得益更生諸惡失此諸治方也人有疑野葛膏有人聞竹瀝湯云恐傷腰腳者即勿令與治知此人天性不可與醫故也竹瀝湯有三首輕者服前方重者服次方再重服後方此風毒乃相注易病人宜將空缺服小金牙散以少許塗鼻孔耳門中視病困人及吊新亡人雖強健人亦宜服之亦以塗耳鼻乃可臨近亡人及視疾者絳囊袋入一方寸匕男左女右臂膊上此散服宜從少為始病人尤宜飲赤小豆飲冬服側子金牙酒續命湯治風毒病初得似時行毒病而脈浮緩終不變快此告不治或數日而死或十數日而死或得病便不識人或發黃或發斑或目赤或下部穿爛者此最急得之即先服續命湯一劑服葛根麻黃湯下之若故不折更與續命湯三劑必瘥大凡腳氣入腹大便必秘當通大便而後風寒濕毒之氣在內者方宜散通之不得其法毒擾臟腑邪毒無所出反能成虛而益病局方雖有三和散兼用大黃等之劑亦莫能愈至於流連變作上奔絞痛嘔吐號啼治之惟三將軍丸最捷若不守用此藥遽行別藥或不得其當則立見其毒勝痰逆悶絕喘息汗流昏塞搐搦咬齒坐視垂死而已杉節湯亦最妙凡腳氣初得腳弱時宜速灸之並竹瀝湯灸訖即可服更進八風散無不瘥者宜急速治之若人但灸而不能服散服散而不能灸如此者半痊半死雖得瘥者或至一二年復更發動覺得便依此法灸之及服散者治十十愈此病輕者一時雖不作治之不當根本不除久久至於殺人不可不精以為意凡灸八處第一風市穴可令病人起正身平立垂兩臂直下舒十指掩住兩髀便點當手中央指頭髀大筋上是灸之百壯多亦任人輕者不可減百壯重者乃至一處五六百壯勿令頓灸三次灸之佳第二伏兔穴令病人累支端坐以病人手掩橫膝上支下旁與曲膝頭齊上旁側支際當中央灸百壯亦可五十壯第三犢鼻穴在膝頭蓋骨上際外骨邊平處以手按之得節解即是一云在膝頭下近外三骨箕踵中動腳以手按之得屈解是灸五十壯可至百壯第四膝眼穴在膝頭骨下兩傍陷者宛宛中是第五三里穴在膝頭骨節下一支附脛骨外是一云在膝頭骨節下三寸人長短大小當以病人手支度取穴灸百壯第六上廉穴在三里下一支一附脛骨外是灸百壯第七下廉穴在上廉下一支一云附脛骨外是灸百壯第八絕骨穴在腳外踝上一支一云四寸是凡此諸穴灸時不必一頓灸盡壯數可日日繼續灸之三日之中灸令盡壯數為佳凡病一腳則灸一腳兩腳則灸兩腳凡腳弱病皆多兩腳又一方云如覺腳惡便灸三里及絕骨各一處兩腳惡者合四處灸之各少許隨病輕重大要雖輕不可減百壯不瘥速以次灸之多多益佳一說灸絕骨最要人有患此腳弱不即治及入腹腹腫大上氣於是乃須大法灸凡諸輸及諸管關節腹皆盡灸之並服八風散往往得瘥者覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩腳諸穴有得全瘥者凡量一支之法覆手並舒四指對度四指上中節上橫過為一支支有兩種有三指為一支者此腳弱灸以四指為一支也亦依支法存舊法梁丘犢鼻三里上廉下廉解谿太衝陽陵泉絕骨崑崙陰陵泉三陰交足太陰復溜然谷湧泉承山束骨等凡一十八穴舊法多灸百會風府五臟六腑輸募頃來灸者悉覺引氣向上所以不取其法氣不上者可用之耳其要病已急恐不救者悉須灸之其足十指去指奇一分兩足凡八穴曹氏名曰八沖極下氣有效其足十指端名曰氣端日灸三壯並大神效其八沖可日日灸七壯氣不上即止病者非深相委悉慎勿為人灸之慎之慎之凡灸八沖須小作艾炷也方白茯苓丸治風毒腳氣緩弱腰脊急痛臂膊痠疼心胸痰壅氣逆脅滿白茯苓去黑皮石斛去根肉蓯蓉酒浸切焙酸棗仁炒五味子炒天雄炮裂去皮臍續斷澤瀉銼當歸切焙各一兩半人參白蒺藜炒羚羊角鎊枳殼去瓤麩炒五加皮銼黃耆炙銼防風去叉細辛去苗葉炒獨活去蘆各一兩杜仲去粗皮炙蘇一兩雲母粉別研二兩菟絲子酒浸銼別研三兩甘草炙一兩熟地黃焙鹿角膠炙令燥各二兩上為細末入細研雲母粉菟絲子和拌勻再羅煉蜜為丸如梧桐子大每日早晚食前各煎棗湯下二十丸追風毒散出直指方治腳氣熱多證疏泄風毒羌活一兩雞心檳榔防風桑白皮炒各半兩郁李仁炒大黃生各一分上銼散每服三錢黑豆一百粒煎服熱甚大便秘澀更加大黃一錢同煎服黑豆飲治一切風毒腳氣腰腳疼軟等黑豆三升檳榔煨七枚桑根白皮炙二兩生薑郁李仁湯浸去皮尖炒各一兩上銼如麻豆每服五錢水一盞半煎取一盞去滓溫服不拘時候芍藥丸治風毒腳氣心胸煩悶多痰咳嗽背膊臂疼大便澀芍藥木香枳殼去瓤麩炒各三分檳榔細銼大黃銼炒各半兩上為末煉蜜為丸如梧桐子大食後溫水下二十五丸加至三十丸滴乳膏治腳手關節入風疼痛大蒜一個剝去皮搗細滴乳香二錢沒藥二錢白膠香三錢明阿膠三錢上件用好酒一二盞許煎熬使大蒜爛成膏為度次入沒藥酒干再添用草烏頭尖二錢桂枝二錢木鱉三錢併為細末入前藥內一處煎熬稠黏為膏略候溫乘熱敷上痛處外用皮紙貼再用粗紙揉軟醋沃火烘熱裹定良久即癢痛愈神效不可具述烏頭丸主治腳氣皮肉身體諸風烏頭一兩附子三兩炮麻黃四兩去節檳榔加枳實四兩炒上為末煉蜜為丸如梧桐子大每服五丸日三忌豬肉冷水如生用附子烏頭二味丸如麻子大每服五丸溫酒送下大腹子散治風毒腳氣肢節煩疼心神壅悶大腹子紫蘇木通桑白皮羌活木瓜荊芥赤芍藥青皮川獨活以上各一兩枳殼二兩重去瓤炒微黃用之上㕮咀每服四錢水一盞姜五片蔥白七寸煎七分去滓空心溫服紫蘇散治風毒腳氣遍身拘急刺痛大小便赤澀不思飲食嘔逆或寒或熱腹內積痰濕惡腳腫一名太效紫蘇飲子紫蘇木通桑白皮茴香各一兩羌活獨活荊芥木瓜青皮甘草各半兩大腹子十個枳殼二兩上㕮咀每服三錢水一大盞姜三片蔥白一莖同煎飛步丸治男子婦人風毒腳氣腫疼北防風北細辛半兩木瓜一兩川烏六錢炮草烏一兩半生半熟晚蠶沙一兩火焮草半斤並九蒸九曝焙乾蒼耳葉半斤同蒸焙上為末醋糊為丸如梧桐子大鹽酒湯或鹽酒吞下三十丸空心甚效此藥宜久服之白楊皮酒治風毒腳氣手足拘攣用白楊皮東南西向北去地三尺者取一斤半勿令見風去皮細銼熬令黃赤以清酒一斗納不津器中漬之密封頭勿令泄氣冬月二七日春夏一七日開取飲量以人酒性量多少服之日五六服常令酒力相續取瘥為度白楊皮白色者佳不要近塚墓者此藥服之最妙鍾乳酒治風虛勞損腳氣疼痛羸瘦拘攣弱不能行鍾乳八兩丹參六兩石斛杜仲各五兩芎藭當歸各四兩附子桂心天門冬五兩牛膝防風黃耆秦艽乾薑各三兩山茱萸薏苡仁各一升上㕮咀清酒三斗漬之三日初服三合日再服後稍加之以知為度石膏湯治腳氣風毒熱氣上衝頭面赤筋急鼻塞去來時令人昏憒心胸恍惚或若驚悸身體戰慄手足緩縱或酸痹頭目眩重眼枯鼻乾辛熱氣出口中或患味甜諸惡不可名狀者石膏龍膽草升麻芍藥貝齒甘草鱉甲黃芩各一兩橘皮二兩羚羊角一兩當歸二兩上㕮咀以水八升煮取三升分為三服馬藺花煎丸治五臟元虛風毒上攻下注腳氣等馬藺花巴豆春夏二十二粒秋冬三十八粒拍破和殼同芫花用醋一升半煮醋乾焙白附子炮羌活去蘆頭陳橘皮湯浸去白焙破故紙各一兩牽牛子檳榔銼各半兩附子炮裂去皮臍切同馬藺花以水一升半煮乾水焙芫花醋炒各一兩上搗羅為末醋煮麵糊為丸如梧桐子大每食前或臥時空心服自五丸加減服至十丸丈夫艾鹽湯下婦人橘皮湯下麻黃湯治惡風毒腳氣痹弱四肢不仁失音不能言毒氣衝心麻黃去根節湯煮去沫一兩防風去叉赤茯苓去黑皮當歸切焙各三兩升麻芎藭白朮芍藥麥門冬去心焙黃芩去黑心桂去粗皮甘草炙銼各二兩杏仁湯浸去皮尖雙仁炒黃三十枚上粗搗篩每服五錢水一盞酒半盞入大棗一枚擘破煎至一盞去滓溫服日三夜一麻黃湯治風毒腳氣屈伸無力痿痹不仁麻黃去根節防風去叉各一兩半桂去粗皮三分當歸切焙一兩白檳榔切焙一兩黃芩去黑心犀角鎊赤茯苓去黑皮升麻各一兩半上㕮咀每服五錢水一盞半棗二枚掰開煎至一盞去滓空心溫服不老地仙丹治腎臟風毒輕腳壯筋蓯蓉酒浸焙當歸酒浸焙乾虎骨酒炙黃牛膝酒浸焙乾各一兩赤小豆半兩蒺藜炒搗去刺川椒去目出汗川芎各一兩血竭半兩萆薢鹽水煮乾一兩白南星炮白附子炮何首烏黃耆蜜炙各三分防風半兩杜仲薑汁製羌活沒藥別研各三分地龍去土木鱉子去油獨活三分茴香炒乳香別研各半兩上為末酒糊丸如梧桐子大每服四十丸木瓜陳皮湯下犀角飲子治風毒入腰腳暴悶痛生犀角屑蜀升麻黃芩干藍漢防己枳實炙各二兩漏蘆三兩炙白蘞一兩梔子仁十個甘草炙二兩上切以水八升煮取二升三合絞去滓分溫三服不問食前後忌海藻菘酢又外用方用大黃三兩梔子四十顆取軟白布剪三二十孔子內藥汁中浸濕敷瘡干則易淋渫蒴藋湯治風毒腳氣骽膝𤸷痹赤腫行履不得皮骨如蟲行宜用淋渫茄秸亦作羊桃蒴藋蒺藜子蒼耳柳木蠹末海桐皮柴胡茯苓皮水紅以上各半兩上銼碎每用藥四兩水五碗煎取三碗去滓淋渫洗避風冷地仙丹專治風痹腳氣有久患白癜風去牽牛加枳殼服之得效一名神翁地仙丹天仙子一兩川椒去子併合口者三兩木鱉子四兩白膠香五兩煮過別研五靈脂三兩陳黑色好者用好酒浸投水淘去絹濾過曬過黑牽牛六兩黑豆八兩赤土九兩即土朱草烏七兩小而堅實者淨洗用鹽在油中並炒令色焦黃坼裂候冷以紙布之類揩令淨上為末同入白膠香木鱉子末用隔年好醋打糊和杵千百下為丸如梧桐子大每服三十丸茶清下病甚者頻進酒送亦可海桐皮酒治風毒流於腳膝行立不得海桐皮五加皮川獨活防風枳殼杜仲炒各一兩牛膝薏米各二兩生地黃半斤上細銼綿裹以無灰酒二升浸春七日秋冬五日夏三日每服三二杯空腹服日三四度常令酒氣醺醺不絕重者不過兩劑又方海桐皮二兩牛膝川芎羌活地骨皮各一兩甘草半兩薏米二兩生地黃半斤上用酒浸如前法亦治腰膝痛有效一方有五加皮又方治腳氣風氣以端午日採蒼耳葉略曬用好酒九蒸九曝為細末酒打飛羅面為丸如梧桐子大每服空心木瓜溫酒或木瓜湯下六七十丸昔有人苦腳氣服此不惟病去年逾九十行步如飛治風腳氣用童子小便兩大瓶用木瓜皮四兩分在兩瓶內煎小便百沸腳盆盛頓更替熏之以綿絮蓋腳汗出即愈不時熏五六次神效木香丸治風毒腳氣攻於手腳腳緩弱沉重虛腫疼痛木香沒藥研附子去皮臍生用烏藥銼蒺藜子炒天南星湯浸一七度焙白附子炮各一兩硇砂研一分木瓜一枚去頭蒂核作甕子上先將硇砂研細入木瓜內濕紙五七重裹煨熟爛研成膏次將餘八味搗羅為末以木瓜膏和丸如梧桐子大每服十丸空心冷酒下一方用川烏頭半兩炮去皮臍一名木香沒藥丸五柔丸治腎虛冷受風或頭風兼風毒腫腳氣等大黃一斤蒸三度前胡去蘆頭二兩半半夏湯浸去滑焙芍藥肉蓯蓉去粗皮切焙赤茯苓去黑皮銼用細辛去苗葉葶藶子銚子內隔紙炒紫色當歸銼炒各四兩上為末煉蜜搜和丸再入臼內搗三千杵丸如梧桐子大每服五丸空腹米飲下加至七丸以大便通利為度日三檳榔湯治風毒腳氣無力𤸷痹四肢不仁失音不語毒氣衝心檳榔銼半兩防風去叉桂去粗皮當歸切焙赤茯苓去黑皮各一兩犀角屑一分麻黃一兩細末上除麻黃外並搗篩每服先取麻黃末二錢匕水一盞半煎至十餘沸掠去沫入藥末五錢匕用大棗三枚拍碎同煎至七分去滓空心溫服近晚再服蘆根湯治風毒腳氣昏煩壯熱頭痛嘔吐口乾生蘆根銼一兩半赤茯苓去黑皮細銼葛根銼知母焙乾銼麥門冬去心焙淡竹葉炙各三分甘草炙半兩銼上為散每服五錢水一盞半煎至八分去滓食後溫服晚再服摩傳神明膏治風毒腳氣不仁及緩弱無力一名附子膏附子十四枚小者三十枚炮裂去皮臍吳茱萸一兩生用芎藭銼白芷銼蜀椒去目及閉口者炒汗出一兩半前胡去蘆頭白朮桂枝去粗皮當歸切焙各三兩細辛去苗葉三兩防己三兩上搗篩以新綿裹納淨器中以醋五升浸一宿用臘月豬膏一斗納鍋中煉去筋膜入前酢中與所浸藥以文武火三上三下候變色稀稠得所濾去滓攪勻成膏瓷器中盛密封頭每有患風痹不仁旋取以手摩之揩摩令入皮膚若多腫即去細辛以牛酥代豬膏亦佳茱萸散出千金方治風冷腳痹偏枯半身不遂晝夜呻吟醫所不治吳茱萸乾薑白蘞牡荊千金翼作牡桂附子天雄狗脊乾漆薯蕷秦艽防風各半兩上治下篩先食服方寸匕日三藥入肌膚淫淫然三日知一月痊附子湯治腳氣風多𤸷痹筋骨疼痛四肢不仁腳緩弱履地不得者此方治之附子一枚重半兩者炮裂去皮臍麻黃去根節一兩半細辛去苗葉三分杏仁湯浸去皮尖雙仁炒微黃四十枚芎藭一兩一分牛膝去苗酒浸焙乾丹參去根節防風去叉獨活去蘆頭五加皮炙令黃各一兩上銼如麻豆每服五錢用水一盞半入生薑半分拍破同煎至一盞去滓溫服空心日晡午時衣覆微令汗出茵芋丸出本事方治風氣積滯成腳氣常覺微腫發作或痛茵芋炒薏苡仁各半兩郁李仁一兩牽牛子一三兩半上為末煉蜜和丸如梧桐子大每服二十丸五更薑棗湯下未利加至三十丸日三以快利為度利後白粥補之葫蘆丸出仁存方治風毒腳氣章航山曾留耕嘗服之蒼耳五月五日採九蒸九曝取二兩淨左纏藤取嫩葉日乾秤二兩淨葫蘆巴二兩一兩同海金沙炒赤色去沙不用一兩同去殼巴豆十四粒炒巴豆色赤去豆不用上為末醋糊為丸每服四十丸鹽湯送下吳茱萸湯治風毒腳氣吳茱萸湯浸三次焙乾炒桂去粗皮各半兩上搗篩每服三錢水一盞半生薑半分拍破同煎至六分去滓食前溫服日晚再服紫雪療腳氣毒遍內外煩熱口中生瘡狂易叫走及解諸石草熱藥毒祛邪熱猝黃等瘴疫毒癘猝死溫瘧五屍五注心腹諸疾絞刺切痛蠱毒鬼昧野道熱毒小兒驚癇百病最良方金牙散出聖濟總錄治腳氣金牙研曾丹研礜石研泥裹燒半日丹砂研雄黃研朴硝研寒水石研代赭石研龍骨研犀角屑研獺肝炙鸛骨炙貍骨炙巴豆去心皮熬大黃野葛皮炙各三分牛黃另研麝香另入升麻桂心附子用生者去皮鬼臼鬼督郵黃環青木香鳶根本草有鳶尾此云鳶根即是用鳶尾之根也牡蠣熬蘇合香研另入常山茯苓黃耆知母龍膽各三二兩露蜂房玉支𦬣草一本作茵芋鬼箭羽徐長卿石長生蜀漆當歸桔梗白薇各一兩蜈蚣二枚炙蜥蜴一枚炙芫青炙地膽炙亭長炙各三十九枚椒四十九枚去汗及合口者上合搗為散以湯如桃李許和散三分匕或如棗核服之常患者日再服猝患取利吐者服四分匕若以絳袋裹方寸匕匕帶之闢諸惡癘忌食生冷蘆筍生蔥菜豬肉冷水醋物陳臭生血等物合藥用臘月旺相日勿令穢汙風見之以臘紙裹用二年此藥能冷熱能虛實說其功效猝不可盡述矣石楠丸出和劑方治風毒腳弱少力腳重生瘡腳下隱痛不能踏地腳膝筋攣不能屈伸項背腰脊拘急不快風毒上攻頭面浮腫或生細瘡出黃赤汁或手臂少力或口舌生瘡牙齦宣爛齒搖發落耳中蟬聲頭眩氣促心腹脹悶小便時澀大便或難服之補益元氣令人筋骨壯健耳目聰明婦人血氣亦可服之不拘時候赤芍藥二兩五加皮三兩萆薢四兩當歸去蘆麻黃去根節陳皮赤小豆各二三兩獨活去蘆四兩薏苡仁牽牛子炒石楠葉各三二兩木瓜四兩杏仁去皮尖雙仁炒赤者用二兩大腹皮川芎杜仲銼炒各二兩牛膝去苗二三兩上為末以酒浸蒸餅為丸如梧桐子大每服十丸至十五丸多至二十丸木瓜湯下早起日中臨臥各一服偏風腫滿服之亦效一方有川椒續斷虎骨酒出本事方治去風補血益氣壯筋骨強腳力虎脛骨真者萆薢仙靈脾薏苡仁牛膝熟地黃各二兩上細銼絹袋盛浸酒二斗飲了一盞入一盞可得百日婦人去牛膝治一切熱毒氣及風毒腳氣出本草用大豆和甘草煮湯飲之橘皮丸治一切風毒腳氣吃食不下陳橘皮一斤以童子小便浸一日去白用炭火半秤燒地令赤以酒一升灑於熱地上將橘皮鋪在地上著盆合一宿時朴硝一斤漿水二升煎令水盡用白茯苓去黑皮四兩上為細末煉蜜為丸如梧桐子大每服三十丸食後溫水下空心米飲下亦可以利為度利多減服治風毒腳氣脛腫捻之則陷出肘後方用牽牛子為末蜜丸如小豆大每服五丸薑湯下利小便即愈亦可整用吞之其子黑色正似葵核形市人亦賣之木瓜丸出海上方治腳氣去風木瓜一個小續命湯去附子為末一兩上以木瓜去皮穰切下蓋入續命湯末在內蒸爛研搗干為丸如梧桐子大每服三四十丸蘇木煎湯溫下亦可以此作膏敷貼痛處尤好一方有川椒末二錢桑枝方出十便良方本方云桑枝性平不冷不熱可以常服療遍體風癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕悅耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服用桑枝細切一小升熬令香以水三大升煎取二大升一日服盡無問食前後治腳氣風痹不仁五緩筋急用熊肉半斤於豉汁中和姜椒蔥白鹽醬作醃酢空腹食之治風氣腳弱用龜殼炙之為末酒調服地龍丸出朱氏集驗方治風氣腳痛不可忍川楝子肉一兩用巴豆炒不用巴豆全蠍二錢好面一兩破故紙三錢用斑蝥炒不用斑蝥茴香二錢半用黑牽牛一錢炒不用黑牽牛葫蘆巴二錢半用海金砂一錢炒不用海金砂自然銅半兩煅醋淬水蛭兩條麝香炒敗龜半兩石薜荔半兩用鹽醋浸一時焙無名異四錢炒檳榔三錢不見火天竺黃半兩紅曲半兩瓦上焙穿山甲四錢炒地龍三錢去土炒古錢十二個用砂鍋子盛爐內煅成汁醋淬上為細末將乳香一錢麝香一錢沒藥三錢辰砂半兩為衣醋煮麵糊為丸如梧桐子大溫酒送下驅風丹出澹寮方治風氣腳氣遠年近日疼痛腫滿時或發動或患歷節白虎及筋脈拘攣等症川烏一兩不去皮尖大者破作四邊小者破作兩邊卻銼如骰子大用麻油煎令黃色去油焙乾赤小豆一兩擇去綠黃豆草烏四兩雞心者不去皮臍破作兩邊擇去心中黑者只取心內白者銼如骰子大秤二兩油制如川烏法再同鹽一兩拌和水微淹著浸三日夜一日一度漉轉候日數足取出水再用鹽一兩同炒黃色去鹽勿令焦本用滷汁浸三日夜去滷汁炒恐滷汁不常有故以鹽水代之地龍四兩置陰潤處少時用綿紗裹定輕輕捶篩去土取肉不用更秤雞心檳榔二兩銼焙上為細末用黃子酒一碗好頭面五錢重煮糊為丸梧桐子大每服三十丸空心麝香冷鹽湯下如熱酒熱食之類俱未可便食庶不大麻木如初服未可丸數多服而後不大麻木時又可略增也忌香菜茵陳豆豉及一切動風物橘皮丸出十便良方治腳氣有風人氣不順致生熱而大便秘用此藥不損人進飲食散脹滿調中下氣偏宜腳氣黃橘皮四兩乾生薑一兩上為細末以蜜半斤同熬成膏丸如梧桐子大每服三十丸生薑湯下食前治風毒腳氣吐逆方出海南四時攝生論方延胡索一兩炮蓬莪朮一兩半蚌粉四兩醋炒上為散炒黑豆令香熟水煎三五沸入姜少許更煎一兩沸取汁調一錢服之治五臟風毒腳氣心腹脹滿方出海南四時攝生論方附子炮川芎當歸桂心木香檳榔陳橘皮蘿蔔子上等分為散納蘿蔔子取仁別研相和更與諸藥再研令勻空心調酒下四生丸出海南四時攝生論方治腳膝骨節毒風行履不得川狼毒黑附子海桐皮天南星上等分生用為末頭醋煮糊為丸綠豆大每服十丸鹽湯或冷酒送下赤小豆丸出朱氏集驗方治風腳氣赤小豆半生半炒香附半生用半酒炒晚蠶沙半生半炒草烏頭半生半麻油炒上等分加陳倉米三分之一半生半炒為末酒糊為丸梧桐子大每服十丸空心茶酒任下乳香應痛丸出朱氏集驗方治腳氣風損神效川烏生用不去皮尖油制如前草烏生用不去皮尖鹽制如前紅花銼焙當歸酒浸銼焙天台烏藥銼焙乾葛銼焙白芍藥洗銼焙蘇木銼生乾地黃洗銼骨碎補燎去毛雞骨真降香銼金毛狗脊燎去毛自然銅入銀鍋內炭蓋口及四圍煅紅入好黃子醋內淬二三次可研為度乳香杵碎用香爐盛大幹箬葉一片虛架在香爐口上約去火二寸許次將乳香置箬葉上候炙熔滾用水潤濕小竹篦子炒撥覺滾定取出候冷研沒藥杵碎酒浸爛研候諸藥末或別入同丸上各一兩為細末用好白酒濃腳一碗好頭面半兩煮糊為丸如梧桐子大每服三十丸空心溫鹽酒下禁忌如前凡腳氣發作先服驅風丹大痛稍愈即間服藥候痛全愈專服此藥必如常歲每歲則痛一月今年服此一料只痛半月二十日明年已發未發再服一料止痛十數日又明年再服一料則終身不復作矣但腳氣年深背駝腰曲手足攣拳者服前項二藥雖未能猝去病根然亦能免大腫痛此藥不特專治腳氣但是風損皆可服之以上二藥常用微火烘焙恐發潤故也如白虎歷節之類皆可服五生丸出衛生家寶方治腳氣及風氣攻四肢金毛狗脊去毛川烏防風去蘆川萆薢蓬莪朮以上各一兩日曬乾上件碾為細末用法醋糊為丸如梧桐子大每服十五丸鹽湯鹽酒空心下治腳氣中虛風出本草以羊皮去毛作臛食之治風血腳氣疼痹踠損瘀血痛不可忍出本草取扶杉木白皮火炙酒浸服之理風熱消腳氣出本草以苦竹筍蒸煮食之治腳氣風氣出本草取鯉魚作鱠與食之效治風毒腳氣及久積風冷腸痔下血出本草以杜仲葉嫩時採食之亦宜乾末作湯服
