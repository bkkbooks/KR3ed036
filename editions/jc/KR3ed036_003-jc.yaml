body:
  text: 卷三方脈總論辨七表八里脈法浮芤滑實弦緊洪為七表遲緩澀微沉伏濡弱為八里浮為中風左手寸口脈浮中風發熱頭痛關脈浮腹脹胃虛尺脈浮大便難右手寸口脈浮肺風鼻塞關脈浮食不消化尺脈浮小便澀芤為失血及血實左手寸口脈芤吐血或衄血關脈芤大便下血尺脈芤小便赤及下血右手寸口脈芤胸中有積血關上脈芤腹內有瘀血尺脈芤小腹疼痛下血滑為吐逆寸口滑胸滿氣逆關滑胸中寒吐逆不欲食尺脈滑為下痢婦人月信不通滑脈但在寸關皆主吐逆實為下痢寸口實胸中熱關脈實腹中滿寒疝氣急下痢尺脈實小腹滿痛小便澀弦為拘急寸口脈弦胸中急痛關脈弦胃中寒心下拘急尺脈弦小腹急滿左右弦皆主拘急緊為痛寸口脈緊頭中痛關脈緊心下痛尺脈緊臍下痛左右緊皆主痛也洪為熱寸口脈洪胸脅熱滿關脈洪胃中有實熱吐逆無常尺脈洪小腹滿陰中痛左右洪皆主熱也遲為寒寸口脈遲上焦有寒關脈遲中焦有寒尺脈遲下焦有冷左右遲皆主寒緩為風結寸口脈緩皮膚不仁關脈緩腹中有風結尺脈緩下焦有寒左右緩皆主風寒微為氣結寸口脈微上焦寒氣痞結關脈微胃中寒心下痛愊愊然尺脈微小腹有寒聚左右微皆為氣痛澀為血滯寸口脈澀陽氣虛衛氣虛不足關脈澀心血氣虛榮氣不足尺脈澀脛逆冷腹中雷鳴左右澀皆主氣不足沉為水寸口脈沉胸中有寒飲關脈沉心下滿短氣尺脈沉腰痛腳弱急有水氣左右沉皆主水伏為物聚寸口脈伏胸有物聚關脈伏有水氣溏泄尺脈伏水穀不化左右伏皆有物聚濡為虛損寸口脈濡氣少虛損多汗關脈濡苦下重虛弱尺脈濡發熱惡寒左右濡俱主虛損弱為筋痿寸口脈弱陽氣虛汗自出關脈弱胃氣不足小熱大虛尺脈弱骨肉痠疼左右弱皆主虛浮芤相搏中風衄血浮滑相搏中風吐逆浮實相搏中風下痢浮弦相搏中風拘急浮緊相搏中風體痛浮洪相搏中風發熱論七表形候歌浮如指下捻蔥葉浮者陽也主風虛運動之候浮應東方木木生風故脈高虛而浮泛其狀初尋之若透皮膚之間按之不足舉之有餘似乎太過其脈虛軟混然如指下捻蔥葉之狀謂之浮凡息數盛急主風邪之候浮洪中風體熱浮滑中氣痰逆浮緊則風痰體痛浮緩氣痰體倦虛氣相併也微浮者虛勞冷汗寸浮主頭目昏痛關浮氣滿不食尺浮腎臟虛風浮入肺竅壅塞主大腸不利芤則中虛有兩頭芤者陽也榮衛妄行失血之候也氣則關膈不能續故脈來指下尋之其狀兩頭則有中間全無脈者氣之府也血為榮氣為衛血隨氣氣引導血也氣既失道而不能相隨故絕處者為氣所格也按則兩頭有中間無指下尋之若散之狀謂之芤凡芤主失血芤浮主風吐血芤滑氣逆吐血微芤便中利血寸芤而緊吐血膈痛關芤乃瘀血停留兼滑亦吐血尺芤即小腸便血而痛也右尺芤則大腸下血滑似動珠往來利滑者陽也主氣交併逆動之候也滑應北方壬癸水故脈往來流利圓滑如珠象水貌也其狀指下尋之三關如珠動按之則定不出圓圓湊指滑利若按動珠之狀謂之滑滑者陰氣壅陽氣虛滑而數者主寒熱滑而洪者主吐逆翻胃緊滑者主體倦小腸急痛微滑上部或冷逆下部則下痢氣痛寸滑主上吐逆關滑胃中積冷尺滑主上熱下冷而虛躁也實向浮中取次求實者陽也象中央戊己土之位故體來實高下取之皆有主三焦滿也其脈指下尋之未絕舉之有餘而積陽於內壅而不散三焦氣滿指下按浮中沉氣壅於中脈來高下各得其所故脈之狀似實也寸實主胸中伏熱不能進食關實中焦氣滿膨刺也弦若箏弦時帶數弦者陽也象東方木位氣血收斂之貌指下尋之脈若箏弦而小直氣血收斂筋脈不能舒暢故脈象弦貌按之不足舉之有餘若箏弦小直時帶數曰弦主拘急勞急體痛乏力虛汗寸弦頭目痛關弦胸積冷胃中時逆惡寒尺弦丹田冷而盜汗虛夢寸弦胸中急痛關弦主心中拘急尺弦主小腸急痛緊伏琴絃促軫留緊者陽也主三陽並盛風氣搏擊伏於陽絡之候也故尋之三關通度緊急如促琴軫此由陰陽相搏氣血交爭指下尋之有餘舉之指下數而並非洪也緊脈形大於弦故似琴絃狀曰緊緊主狂躁而神亂不定或緊滑則吐逆寒熱緊而甚數主熱體疼寸緊主頭疼關緊主胸膈疼尺緊主丹田急痛洪舉有餘來極大七陽為表定其由洪者陽也應南方火主榮絡大熱而氣灼爍之候脈來盛極指下按之如火之炎上象火升騰如掩壓之貌故也又曰按之在膚混然若浮實有力而大曰洪洪主吐逆又曰近君火為陽中之陽故陽氣升而穀氣不能轉故乃吐耳寸洪上焦熱壅關洪胃熱而吐身熱而悶尺洪主便赤如血澀痛也七表病脈浮為在表為風應人迎為氣應氣口為熱為痛為嘔為脹為痁為喘為厥為內結為滿不食浮大為鼻塞浮大長為風眩癲疾浮滑疾為宿食浮大而澀為宿食滯氣浮短為肺傷諸氣浮滑為飲走利浮細而滑為傷飲浮滑急緊為百合病浮數為大便堅為小便數浮緊為淋為癃閉浮緩為不仁芤為失血微芤為衄血寸芤為吐血關芤為大便出血尺芤為下焦虛小便出血滑為吐為滿為咳為熱為伏痰為宿食為蓄血為經閉為鬼疰為血氣俱實滑散為癱緩滑大為結熱滑實為胃熱和滑為妊娠滑而大小不勻必吐為病進為泄利滑而浮大小腹痛弱則陰中痛大便亦然實為熱為嘔為痛為氣塞為喘嗽為大便不禁實緊為陰不勝陽為胃寒為腰痛弦為寒為痛為飲為瘧為水氣為中虛為厥逆為拘急為寒癖弦緊為惡寒為疝瘕為癖為瘀血雙弦為脅急痛弦而鉤為脅下刺痛弦長為積隨左右上下緊為寒為頭痛骨內痛為咳為喘為滿浮緊為肺有水緊滑為蛔動為宿食為逆吐緊急為遁屍緊數為寒熱洪為脹為滿為痛為熱為煩洪實為癲洪緊為癰疽為喘急亦為脹洪大為祟洪浮為陽邪來見七表脈名一浮者風虛運動之候浮脈應金於時為秋萬物至秋而終草木華葉皆落其枝獨在若毫毛焉故其脈之來輕虛浮泛千金云按之不足舉之有餘按之不足則知其虛於下也舉之有餘則知輕浮於其上也昔人喻如捻蔥葉之狀也者誠得之故浮有風與虛二候之診二芤者失血之候芤之為物兩旁有中間虛脈之應於診者有若是古人因取以名之也人之一身所資賴者惟氣與血血以榮之氣以衛之故榮氣衛氣相恃以行兩不相失然後經脈流通而無間斷芤脈之診則不然蓋陽邪所盛血與氣失其道路不能相繼續故其脈之狀舉指浮大而軟按之兩頭實而中間虛也凡診見之皆失血三滑者氣血相併逆動之候滑脈屬水故往來滑利如珠而中有力按之即伏不進不退外柔內剛應水之象原滑之由陰氣壅而陽氣虛陽氣者衛外而為固也陽為邪勝虛弱而不能固護保持陰氣壅甚而不息為滿為吐由此故也四實者三焦氣滿之候實應土之象脾主中州而屬土焉實本脾虛之診而以實名之者蓋脈之來舉指有餘按之不足浮中沉皆有力而言之也且人之五臟非脾不養脾居其中灌溉四旁脾氣平和則陰陽升降上下往來流而無滯脾若受邪而虛弱則陽伏而不散中壅而實塞三焦氣滿形於診者由此而然五弦者血氣收斂之候血榮氣衛脈之所依也氣衛於外以充皮膚血榮於中以營經絡周一體而無間應百刻而不違此乃平人之常也而乃賊邪干之則膚腠戢閉經絡凝滯氣血因之以收斂而不散故筋脈皮膚皆為之拘急而不得舒暢在於指下若按箏弦緊直帶數者是也四時之脈春亦謂之弦正以陰氣之所入寒氣之所勝至春則血氣方向於溫舒當弦爾若十二經脈之中非其時診見之是謂血氣收斂拘急之候六緊者寒激搏伏於陽絡之候指下尋之三關通度來往速利按之有餘舉指甚足狀若洪弦千金所謂弦與緊相類蓋以似之而非仲景云脈緊如轉索而無求子以緊脈按之實數似切繩狀誠得之矣夫陰陽和則氣血調陰陽逆則氣血爭平人之常無所忤犯陰陽未嘗不和也及有所感觸在陽受之則為陽邪而以陽並陰在陰受之則為陰邪而以陰並陽陰陽並毗血氣所以不得其平者此爾緊脈之診則以陽邪並於陽絡而三陽並壅故其證身熱體痛內煩躁擾復痞逆也七洪者榮絡大熱血氣燔灼之候洪應南方丙丁火於時為夏萬物至夏盛極長大脈氣象之故夏脈亦貴於洪非其時診見洪脈在於十二部之中皆為邪熱候夫洪者水也洪而大焉血氣之在人無異乎水以不依其道逆行而為洪惟氣與血欲其常不可暴也而邪熱所勝偏陽隆盛則榮衛之行不得其道乃氣壅而血溢故其脈之來舉按皆極大輕手尋之於膚已得混混然若浮若實有力而軟內經曰夏日在膚泛泛然萬物有餘亦論洪脈之盛大也論七表脈變例七表脈者是客邪傷乃陰乘陽也其證身熱惡寒是外陽而內陰見也七表脈但熱而不惡寒者是內外皆陽也如七表證自汗惡風卻得八里脈者當用麻黃桂枝各半湯如八里證自汗惡風得七表脈亦用麻黃桂枝各半湯如有汗不惡風者黃耆白朮黃芩湯如無汗不惡風者蔥豉湯脈如浮滑而長為三陽里禁不可發汗經曰陽盛陰虛汗出而死仲景曰脈浮當汗三陽當汗者謂陽中有陰夫表者是陽分也浮亦陽分也脈浮客陰也故當發汗且陽中有陰者陽乃榮衛之分客陰自外入居之故宜汗出而發去之經曰在上者因而越之此說非謂陽中有形跡之陰是陽中客邪之陰居其表也三陽之表是三陽之標也無形經絡受客陰乃表之表也為陽中陽分也客宜去客陰邪也故前說陽中有陰當汗若三陽之裡是三陽之本也主有形受邪膀胱與胃是也既受在有形之處惟宜利小便下大便則愈此乃陽中之陰也此說言主前說言客若不窮主客邪正之理必傷人命三陰當下者三陰者臟也外有所主內無所受所主者皮毛血脈肌肉筋骨也無所受者無所受盛也在三陽經絡中有邪者是為無形乃陰中之陽可汗而已是經絡無形受寒邪當發汗去之為三陰標之病也三陰本者臟也盛則各歸於胃是有形病也當自各經絡中藥入胃下去之此乃三陰當下也是為陰中之陰可去之者陰中者主也有陽者客邪也言陰經中受陽邪染於有形物中不得出者可下略說八里乃陽乘陰也其證身涼四肢厥惡熱是外陰而內陽但寒不熱不渴者是內外皆陰也仲景云厥深熱亦深厥微熱亦微口傷爛赤因發汗得之夫七表八里發汗吐下者治傷寒必當仔細論之七表八里互相交變一說六脈交變浮滑長為三陽乃陽中有陰沉澀短為三陰乃陰中有陽當審察表裡分其內外以辨虛實治從標本萬舉萬當夫標本者太陽有標本之化少陰亦然太陽標熱而本寒從此生七表少陰標寒而本熱從此生八里太陰標本皆陰少陽標本皆陽惟陽明與厥陰不從標本而從乎中也此乃六氣之標本也叔和所載者是七表八里九道脈計二十四道脈之標本也有皆從標從本從乎中者假令太陽少陰各有標本之化太陽脈浮少陰脈沉此乃沉浮交內經曰若從標本論之是為長短交長以發汗短以下長曰陽明短曰太陰長者陽明當解表利小便短者太陰當下土鬱則奪之下令無壅礙故長脈發之短脈下之是滑與澀交滑居寸而熱澀居尺而寒滑居尺而熱澀居寸而寒澀脈居尺寸皆損氣血滑居尺寸皆助陰陽內經曰滑脈曰生澀脈曰死是三陰三陽變化表裡也七表脈主治云岐子云左手三部寸關尺受邪非謂主位之脈皆客邪之脈也一浮者陽也主咳嗽氣促冷汗自出背膊勞強夜臥不安按之不足舉之有餘陰不足陽太過寒則傷形熱則傷氣故肺咳嗽氣促宜小柴胡湯柴胡黃芩五味子半夏制各半兩白芍藥人參桑白皮各二錢半上㕮咀每服一兩水二盞生薑七片煎至七分去滓食後溫服按之不足舉有餘冉冉尋之指下浮臟中積冷榮中熱欲可生精要補虛臟中積冷按之不足榮中有熱舉之有餘陽有餘陰不足也治之宜地骨皮散人參地骨皮柴胡黃耆生地黃各一兩半白茯苓半兩知母一兩石膏二兩上㕮咀每服一兩水二盞生薑七片煎至七分去滓細細溫服連夜頓服生精補虛地黃丸寸浮中風頭熱痛主脈浮客脈又浮主客同宮主太陽中風頭痛有汗脈浮緩桂枝湯無汗脈浮緊麻黃湯風在上焦如太陽頭痛汗出轉陽明頭痛白虎湯少陽頭痛小柴胡湯太陽頭痛羌活湯關浮腹脹胃虛空主脈弦客脈浮風寒熱相合致胃中虛空何謂胃虛夫脈浮者風邪也弦者肝脈也以木能剋土致胃中虛空理中丸主者風在中焦子能令母實而變為寒也東垣去乾薑加厚朴陳皮是為調中湯製厚朴陳皮去白製半夏各一兩白朮一兩半人參五錢甘草炙三錢上㕮咀每服一兩水二盞生薑七片煎至七分去滓食前服尺部見之風入肺大便乾澀故難通腎脈沉反見浮脈為風火所乘肺氣虛而不能生水浮脈行於水中知水反不能勝火浮主諸風之脈尺部見之是陰虛陽盛之意也風入肺者何也是金水之虛水既衰弱金無所恃是木火之實火助木而生風腎氣虛故風入肺燥使津液內竭故太陽乾澀而燥內經曰侮所不勝已乘所勝也火侮其水而勝其金薄其子而囚其母治之以七聖丸風在下焦檳榔木香羌活川芎桂各半兩大黃郁李仁各一兩上為細末蜜丸桐子大每服三十丸漸加之微利為度生薑湯下二芤者陽也主淋瀝氣入小腸脫血病者皆從太陽在寸則吐血在下瀉血在中者緩之芤脈在上加減梔子湯梔子四個碎香鼓半兩先以水二盞煮梔子仁至七分入豉煮三五沸去滓溫服得吐止芤脈在中宜瀉黃散藿香葉山梔子仁甘草各半兩防風三兩石膏一兩上㕮咀水二盞煎一盞細細服無時芤脈在下宜豬苓湯豬苓滑石澤瀉阿膠炒各等分上㕮咀水二盞用前味煎至一盞去滓後入阿膠化開指下尋之中且虛邪風透入小腸居患時淋瀝兼疼痛大作湯丸必自除云岐子云芤主血凝而不流凡人之十二經絡以應溝渠是榮衛氣血不散不能盈滿經絡故見芤脈主淋瀝小便膿及血大作湯丸者四物湯地黃丸補之桃仁承氣湯瀉之一云大柴胡湯如秘加大黃寸芤積血在胸中主脈浮客脈芤浮芤相合血積胸中熱之甚也治之以犀角地黃湯血在上焦生地黃二兩黃芩一兩半黃連一兩大黃一兩半上㕮咀水二盞秤一兩煎至一盞去滓食後服之關內逢芤腸里癰主脈弦客脈芤弦芤相合積血於腸中是肺先受邪傳入大腸當用桃仁承氣湯血在中焦又云芤脈在中或吐血生癰治抵當丸或地黃丸抵當丸大黃水蛭炒裂各半兩虻蟲三錢上㕮咀為細末煉蜜為丸桐子大每服二十丸食後溫水下利為度未利加數服之尺部見之虛在腎小便遺瀝血凝濃主脈沉客脈芤沉芤相合積血在下抵當丸抵當湯主之血在下焦或以加減桃仁承氣湯桃仁半兩甘草二錢半大黃一兩桂三錢上㕮咀每服一兩水二盞姜七片煎至一半去滓入芒硝三錢化開食後服以利為度未利再服又云上焦有血先便後血下焦有血先血後便中焦有血便血齊作三滑者陽也主四肢困弊腳手痠疼小便赤澀仲景曰衛氣前通小便赤澀腰中氣熱先中膀胱又云小便赤澀大便難是實熱加減大柴胡湯主之赤芍藥柴胡各一兩枳實大黃黃芩各半兩甘草三錢上㕮咀每服一兩水二盞姜七片煎至一半去滓溫服以利為度未利再服滑脈如珠動曰陽腰中生氣透前腸脛酸只為生寒熱大瀉三焦必得康云岐云夫小便赤澀腰中生氣是命門所生其脈流利數而疾宜大承氣湯主之熱多寒少故宜瀉以辛寒厚朴制一兩枳實麩炒大黃各半兩芒硝三錢上㕮咀用水一碗姜十片先煎厚朴枳實至一鍾半再入大黃煎至一鍾去滓入芒硝化開午食後溫服未利次日晚食後服之滑脈寸來多嘔逆主脈浮客脈滑浮滑相合而為嘔生薑半夏湯主之有往來寒熱者小柴胡湯主之寒在上焦緩者半夏湯製半夏一兩茯苓二兩上㕮咀每服一兩水二鍾姜七片煎至一半去滓食後服不嘔吐者止不止者再服關滑胃寒不下食主脈弦客脈滑弦滑相合引寒入胃致不能食春夏平胃散秋冬理中丸主之如有表者小柴胡加桂湯半夏湯主之寒在中焦小柴胡湯加桂湯柴胡黃芩赤芍藥各一兩人參半兩甘草炙三錢桂四錢上㕮咀每服一兩水二盞姜七片煎去滓溫服尺部見之臍似水飲水下焦聲瀝瀝主脈沉客脈滑沉滑相合寒結膀胱附子四逆湯寒在下焦炮附子炮生薑各半兩白朮一兩甘草三錢桂七錢上㕮咀每服一兩水二鍾煎至一鍾去滓食前溫服四實者陽也主伏陽在內脾虛不食四肢勞倦實脈尋之舉有餘伏陽蒸內致脾虛食少只緣生胃壅溫和湯藥乃痊除潔古云脾脈本緩反得客脈實緩實相合主胃中有熱故脾氣溫反實故不食也食少氣不宣通故為胃壅上出膿血是也一云氣寒則不宣通溫則流行伏陽者藏熱於胃脾熱而食少胃中虛熱多生壅腫治之以藿香半夏散藿香葉製半夏各一兩丁香半兩上為粗末每服三錢水一鍾半姜七片煎去滓食前熱服云岐曰脾受熱而反虛故不能食溫和湯藥乃平胃散是也實脈關前胸熱甚主脈浮客脈實浮實相合陽氣有餘胸中熱其實在上焦宜涼膈散主之山梔子仁一兩連翹黃芩各二兩大黃半兩薄荷一兩半上為粗末每服一兩水二鍾同竹葉七片煎至一盞去滓入蜜少許食後服當關切痛中焦任主脈弦客脈實弦實相合熱在胃中可用調胃承氣湯實在中焦尺脈如繩應指來腹脹小便應不禁主脈沉客脈實沉實相合沉勝實則是水勝火也乃主勝客乾薑附子湯主之實勝沉則是火燥去水乃客勝主也大承氣湯主之此二證俱小便不禁實在下焦一云朮附湯主之亦主勝客也附子炮半兩白朮一兩甘草炙三錢上㕮咀每服半兩水一大盞半煎至一鍾去滓食前溫服五弦者陽也主勞風乏力盜汗多生手足痠疼皮毛枯槁弦脈五臟俱傷蓋木剋土故也弦脈為陽狀若弦四肢更被氣相煎三度解勞方始退常須固臍下丹田脈如箏弦緊而急主四肢相煎木旺土衰四肢者辰戌丑未四末也土位也固臍丹田者八味丸是也古云木多損土以傷肌肉漸以成勞左傳曰風淫末疾固臍丹田為脾言之寸部脈緊一條弦胸中伏痛狀繩牽主脈浮客脈弦浮弦相合胸中急痛屬少陽以小柴胡湯和解之弦在上焦關中有弦寒在胃主客脈俱弦知木氣有餘致寒氣大實於胃中附子理中丸主之弦在中焦下焦停水滿丹田主脈沉客脈弦沉弦相合風寒氣有餘下焦停水朮附湯主之弦在下焦六緊者陽也主風氣此太陽少陽相合主伏陽上衝變為狂病宜黃連瀉心湯黃連生地黃知母各半兩黃芩二兩甘草半兩上㕮咀每服一兩水一盞半煎服緊脈三關數又弦上來風是正根元忽然狂語人驚怕不遇良醫不得痊潔古云此是三陽合病緊數太陽也弦多少陽陽明也故實則譫語云岐曰其脈緊洪而實陽氣有餘之象主熱即生風發作狂語可用小承氣湯主之生地黃黃芩山梔子仁各一兩大黃半兩上㕮咀水煎一兩以利為度緊脈關前頭裡痛主脈浮客脈緊浮緊相合諸頭痛皆屬三陽太陽頭痛羌活湯主之必愈入腑大承氣湯下之少陽頭痛在經小柴胡湯主之入腑小承氣湯下之陽明頭痛在經白虎湯主之入腑調胃承氣湯下之其脈弦而頭痛者內外也大柴胡湯主之緊在上焦到關切痛無能動主脈弦客脈緊弦緊相合太陰受邪脾中切痛治之以芍藥湯赤芍藥二兩甘草半兩桂三錢上㕮咀水煎一兩加生薑七片服如實痛加大黃大承氣湯當揀而用之緊在中焦隱指寥寥入尺來繳結繞臍常手捧主脈沉客脈緊沉緊相合繞臍痛者太陰與芍藥湯主之不已是寒濕在脾腎也朮附湯主之緊在下焦桂枝芍藥湯桂一兩芍藥炙甘草各半兩上㕮咀每服一兩入薑棗煎服七洪者陽也主頭痛四肢浮熱大腸不通燥糞結澀口乾遍體疼痛潔古云此乃是正陽陽明身熱目痛鼻乾不得臥則知病在陽明經也洪脈者按之實舉之盛洪者陽太過陰不及頭痛四肢熱大便難小便赤澀夜臥不安治法陽證下之則愈如下之隨證虛實有大承氣湯大柴胡湯桃仁湯隨證用之此證有兩脈按之無舉之盛當解表不可下下之則死按之盛舉之無不可表當下下之則愈洪脈根元本是陽遇其季夏自然昌若逢秋季及冬季發汗通腸始得涼云岐曰其脈舉按皆盛本為相火之象發汗從表裡從表宜麻黃湯從里宜大承氣湯麻黃湯麻黃芍藥各一兩葛根一兩三錢豉一百蔥白三莖上㕮咀每服一兩水二盞生薑七片煎服無時以得汗而解未汗再服仲景謂身體疼痛立夏脈洪大診知其病瘥也通腸七宣丸七聖丸大柴胡大承氣可選而用洪脈關前熱在胸主脈浮客脈洪浮洪相合熱結於胸中涼膈散加減用之或連翹湯主之連翹二兩柴胡當歸生地黃芍藥各半兩黃芩一兩大黃三錢上㕮咀一兩水煎服之洪在上焦到關翻胃幾十重主脈弦客脈洪弦洪相合胃熱不停翻胃衄吐以酸苦藥除之或和之以調中湯大黃比眾藥減半葛根黃芩芍藥桔梗茯苓藁本白朮甘草炙各等分上㕮咀水煎一兩服之不拘時候日二三服洪在中焦如秋冬寒在胃中不可用胃中有餘熱也又云熱在胸者涼藥不可遲也胃化火衝出其食諸逆衝上皆屬於熱食不得入更向尺中還若是小便赤澀腳痠疼潔古云洪尺由陰不及陽也從下至上先損腎肝故小便赤澀骨痿筋緩云岐曰主脈沉客脈洪沉洪相合小便赤澀閉塞不通宜澤瀉散主之赤茯苓澤瀉各半兩桑白皮山梔子仁各一兩上㕮咀水煎一兩服之得小便利為度不除者腎氣不通可用大柴胡加大黃下之洪在下焦凡此七表雖名陽脈有用熱藥者何答曰陽中有陰故也通上下中二十一道脈證用藥法者七表之病在於上下調之上下在中者和之於中辨其脈證知其主客用仲景之藥無不效也七表脈春夏得之為順秋冬得之為逆海藏云浮中風寒芤失血滑吐實下應須別弦為拘急緊為痛洪大從來偏主熱論八里形候歌沉若爛綿尋至骨沉者陰也主陰盛陽乘之候沉者重也陰氣厥逆陽氣不舒故脈沉指下尋之似有舉之全無緩度三關重取之若按水中綿索之狀其來不能透於皮膚但於肉下得之曰沉主冷氣攻擊四肢疼逆寸沉伏冷痰於胸中關沉冷氣膨刺尺沉腰重便數膀胱冷痛又尺沉主肺弱水氣痛微於指下細如絲微者陰盛陽衰之候指下尋之脈來而小細細如絲往來極微進退尋之若有若無曰微微主氣虛冷逆崩中敗血陽道怯弱寸微膈間冷逆關微主氣促下流尺微丹田氣冷陰汗氣短緩小於遲來往慢緩者陰也主衛氣有餘榮血不及之候故指下尋之往來遲緩也緩者榮中不流而衛氣獨行不得與陰道相續故來遲緩往來不急不慢不能甚有力透肌曰緩緩主四體倦怠寸緩主膚皮頑痹關緩主腹中風結腎氣上攻夜多虛夢尺主風緩不利澀則如刀刮竹皮澀者陰也主陽虛陰衰之候積氣虛弱陰陽澀滯尋之似有舉之全無前虛後實來而不往如刀刮竹皮之狀澀者不快之貌曰澀澀主氣怯精寒不能自禁及女人胎氣不安敗血不止寸澀胃中積冷食不能轉關澀主榮氣散失不充肌肉尺澀丹田積冷夜夢遺精女人敗血胎中冷痛遲重欲尋來隱隱遲者陰也主陰盛陽衰指下重手乃得由陰絡透於陽絡陽氣不來陰氣獨上而榮衛凝泣血氣痞澀故指下按之隱隱而來一息間三至曰遲主四肢厥冷體重惡寒寸遲心寒時戰關遲肚中冷痛憎寒尺遲腰重體寒便泄伏潛骨重似來時伏者陰也主三陰毒氣伏於三陽關格閉塞之候指下尋之似有呼吸定息全無冉冉不離其所骨間隱隱而來湊指復去其力不能接至肌骨下乃得之曰伏主毒閉塞四肢血氣不能相交而渾身沉重手足厥冷寸伏積冷毒氣灌胸關伏主腸間積冷閉寒尺伏虛冷水氣伏結不消小腸膨冷痛濡湊指邊還怯怯濡者陰也主榮中怯而衛氣虛指下按之似有冉冉還來湊指欲按依然卻去往來軟大曰濡主少氣乏力目昏耳鳴下部虛冷寸濡主肝虛心煩關濡氣虛精神恍惚尺濡惡寒冷汗體倦弱按輕綿重不知弱者陰也主虛氣攻表指下尋之輕手乃得重手稍無往來無力自至乃去輕手若按輕綿之狀曰弱主虛邪上攻血氣困乏少年人憂老人稍順寸弱穀氣虛弱食不能消關弱氣多虛尺弱腎臟風攻損皮膚左右皆主筋痿也八里病脈微為虛為弱為衄為嘔為泄為亡汗為拘急微弱為少氣為中寒沉為在裡為實為水為寒為喘為癥沉緊為上熱下冷沉重而直前絕者為瘀血沉緩而中散為寒食成瘕沉重不至寸徘徊絕者為遁屍沉遲為痼冷沉重為傷暑發熱沉緊為懸飲緩為在下為風為寒為弱為痹為疼為不仁為氣不足為眩暈緩而滑為熱中緩而遲虛寒相搏食冷則咽痛澀為少氣血為亡汗為氣不足為逆冷為下痢為心痛澀緊為痹為寒濕遲為寒為痛遲而澀為癥瘕咽酸伏為霍亂為疝瘕為水氣為溏泄為停痰為宿食為諸氣上衝為惡膿貫肌濡為虛為痹為自汗為氣弱為小便難濡而弱為內熱外冷自汗弱為虛為風熱為自汗八裏脈名一微者陰盛陽衰氣虛怯弱之候其脈之狀指下尋之往來甚微冉冉尋之若有若無細細如絲故謂之微夫陽因而上衛外者也人之所以輔衛於一體運行於四肢者陽氣而已平旦人氣生日中而陽氣隆日下而陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄苟為煩勞擾動則煎厥由生大怒而氣不下行血菀於上使人薄厥皆陽氣之傷也微脈之診由陽道衰羸氣欠而逆虛寒之極爾故主敗血不止漏下便數體重腰疼面無光澤諸證生焉二沉者陰氣厥逆陽氣不舒之候沉與浮相對浮以陽邪所勝血氣發越而在外故為陽主表沉以陰邪所勝血氣困滯而不振故為陰主裡沉脈之狀指下尋之似有舉之全無緩度三關狀若爛綿或者謂沉與伏相類然沉者但沉而已未至於伏也所謂伏者潛伏之謂固有閉匿者矣沉則異於是但血氣羸弱而不自振故其脈來不能透於膚但按之至骨肉則有餘也且氣之在人壯則形體強盛衰則形體羸弱惟人不知所以貴其生而晝則醇酒淋其骨髓夜則房室輸其氣血六淫外賊七情內擾於是真陽凋瘁榮衛耗竭百病俱生率原於此三緩者衛氣有餘榮氣不足之候血流據氣氣動依血二者相資不得相失緩者乃榮中不流衛氣獨行不相續接故其脈來之且順去之且遲舉之且散徐徐然不能甚有力透於膚表故曰緩緩應之象主脾者土也以緩為正扁鵲云脈如九菽之重與肌肉相得者脾部也其為緩可知矣然脾之緩乃為常者其脈在中故也至於十二經診見之則異於是蓋血以氣為先氣以血為從今氣獨行而血凝泣則偏陽獨勝而衛壅矣脈之緩者原此烏得不為之病乎或難之曰緩之與遲二脈幾類何以辨之予曰緩脈大而慢遲脈小而衰緩者衛有餘而榮不足遲者陰氣盛而陽氣衰二診不侔當明察焉四澀者陽盛陰虛之候敷而施之陽之正也斂而澀之陰之正也脈有陰陽適平則血氣不至於相勝是為平人今也陽氣有餘陰氣有虛乏陰不能和陽其血既欠斂而澀之非澀之正也是以為陰之病內經曰澀者陽氣有餘滑者陰氣有餘千金云脈滑者多血少氣脈澀者多氣少血以二經義考之陰余則為氣欠陽余而且澀則為血欠氣欠則血有餘故滑脈之來流利而且圓血欠則氣有餘故澀脈之來艱澀而且散澀與滑相對故兼取而論之無求子云澀細而遲往來難時一止余居士喻澀脈如刀刮竹皮之狀誠得五遲者陰盛陽衰之候由陰絡透於陽絡陽氣不下陰氣獨上因而榮衛凝澀血氣痞阻故其脈指下尋之重手乃得一息之間隱隱而來三至而已是謂遲也夫呼吸定息脈來五至平人之常今一息三至榮衛之行僅得漏水之半而已遲孰甚焉此無他由心氣不交於腎故也蓋心腎之相為氣液猶陰陽之相為寒暑日月之相為晝夜者也今也陰氣獨上陽氣不下交腎氣虛升則元臟不能獨固三焦之路閉塞榮衛何自而流通脈行之所以遲者職由於此其為病必冷汗肢節痛肌膚黑瘦體寒腹痛重覆不暖六伏者陰毒之氣伏於陽絡關膈閉塞之喉指下尋之似有呼吸定息全無冉冉尋之不離其部於骨間隱隱而來湊指復去有力不能上於肌肉則無至骨節則見所以然者由毒氣閉塞三關不利故四肢厥冷血榮氣衛凝結而脈為之伏也七濡者榮怯沖虛之候夫血榮氣衛相隨以行流注於一身其晝夜之有經不可失也今榮中怯弱衛氣缺乏自經絡達於皮膚無以與之為流通則脈行之道濡而不進故指下尋之似有按之依前卻去曰濡昔人喻如按水中帛誠得之凡診見濡脈皆為血氣虛弱之候歌曰濡而不進為濡脈虛軟如按水中帛血榮氣衛總皆虛三部逢之俱病亟八弱者虛氣攻表之候故其脈見於膚表狀如爛綿輕手乃得重按即無怏怏不能前進又如浮漚之勢近手稍按則無矣凡見弱脈皆為虛氣攻表陰絕之候又婦人新產客風面腫論八里脈變例濟生拔萃云夫八里脈者乃右手三部寸關尺受邪者也陽乘陰也是微沉緩澀遲伏濡弱八里脈也有里之表乃三陰經絡總稱標之名也有里之裡者乃三陰之本脾腎肝總稱之名也且三陰標者為陰中之陽本者為陰中陰也盛則歸於胃土乃邪染有形故里之表是陰中之陽當漬形以為汗宜發之主宜緩里之裡是陰中之陰分也當急下之客宜急是知諸中客邪當急諸主自病當緩前說七表乃春夏具三陽此說八里乃秋冬具三陰當推移所在主客相合脈證依緩急治之假令惡寒者里之表也當與麻黃附子細辛湯緩發之是漬形以為汗也如有不惡風寒而反欲去衣身涼面目赤四肢逆數日不大便小便赤澀引飲身靜重如山譫語昏冒脈沉細而疾數者是足少陰經反受火邪也是里之裡病乃陰中之陰陽邪也此客邪當急下去之以大承氣湯除之仲景桂枝脈得麻黃證或麻黃脈得桂枝證遞用麻黃桂枝各半湯如桂枝證二停麻黃證一停當用桂枝二麻黃一湯法或麻黃證二停桂枝證一停當用麻黃二桂枝一湯法或麻黃脈桂枝證取脈為主脈便為二停證為一停用麻黃二桂枝一湯治之或桂枝脈麻黃證亦脈為二停證作一停用桂枝二麻黃一湯治之大抵聖人謂脈者司人之命故以證為主多從脈而少從證也舉此脈證交互二法是不合全從於脈亦不合不從於證如合證當兩取之如證交變法中只合從脈不從證也然亦不拘亦當臨時消息傳受逆從原證來理所投去處及天之時令且七表有下者為內外皆陽緩下入里有汗者為內外皆陰緩汗七表有汗者為外陽而內陰急汗八里有下者為內陽而外陰急下故素問設標本之化立四制之法為此說也八里脈主治云岐子曰八里脈者乃右手三部寸關尺受之此八里脈乃客邪之脈主位之脈三部主脈寸澀關緩尺數是也此皆主隨客變也一微者陰也主敗血不止面色無光微脈發象秋冬在陰為慘陰太過陽不及是血不能守水勝火也血不止者治之以香芎湯香附子一兩半白芍藥當歸各一兩芎藭半兩上為粗末水煎一兩食前服指下尋之有若無漩凝敗血小腸虛崩中日久為白帶痛下多時骨髓枯此腎氣有餘命門不足當補命門命門者男子藏精女子系胞崩中白帶者命門敗也經水崩中謂之骨已枯伏龍肝散主之是為血不能守水勝火也治婦人血去精亡筋骨皆損陰不成形養血補虛宜當歸芍藥湯當歸白芍藥熟地黃各一兩乾薑半兩上㕮咀水煎一兩食前服微脈關前氣上侵陽虛內氣上衝冷則生氣主脈澀客脈微澀微相合逆氣上侵可用膈氣散主之微在上焦又云肺氣上衝當以補肺散主之又治勞嗽阿膠一兩半甘草三錢黍黏子二錢半馬兜鈴半兩炒杏仁去皮尖十個上為粗末水煎半兩食後溫服如糯米煎更妙又均氣散治不足當關鬱結氣排心主脈緩客脈微緩微相合太陰虛痞勻氣散主之補肺散亦可微在中焦尺部見之臍下積身寒飲水即呻吟主脈數客脈微數微相合陰盛陽虛治之以二氣丹微在下焦又云脈微飲水呻吟者陽虛也治之以八味丸呻吟者困重形於外也二沉者陰也主氣脹兩脅手足時冷虛氣衝心悶而不痛乃曰虛痞健胃建中湯理中湯是也手足冷治之以八物湯當歸白朮人參乾薑各一兩附子炮去皮白芍藥桂各半兩丁香三錢上㕮咀水煎一兩不拘時按之似有舉還無氣滿三焦臟腑虛冷氣不調三部壅通腸健胃始能除沉者陰也壅者虛結也言通腸者溫也局方溫白丸主之健胃者以理中湯主之寸脈沉兮胸有痰主脈澀客脈沉澀沉相合留滯胸中變為痰治用化痰玉壺丸中加雄黃或半夏丸半夏一兩湯洗雄黃三錢別研上為末生薑汁糊丸如梧桐子大每服三十丸至五十丸生薑湯下沉在上焦當關氣短痛難堪主脈緩客脈沉緩沉相合胃中有寒即痛可以九痛丸或橘皮半夏湯陳橘去白三兩半夏制枳殼炒去瓤各一兩白朮茯苓桂各半兩上㕮咀每服一兩生薑七片水煎食前服沉在中焦若在尺中腰腳重小便稠數色如泔主脈數客脈沉數沉相合客勝主也寒氣有餘命門三焦敗而虛故小便如泔八味丸中加桂附治之一法用黃耆丸主之沉在下焦三緩者陰也主四肢煩滿氣促不安證在太陽風傷衛氣當服桂枝湯一云主四肢煩滿氣促不安枳朮湯主之白朮枳實麩炒甘草各半兩上㕮咀入生薑七片水煎半兩食後溫服來往尋之狀若遲腎間生氣耳鳴時邪風積氣來沖背腦後三針痛即移太陽中風脈緩頸項強急不得轉側可針風池風府浮白穴則痛移也用桂枝湯主之若緩大者屬脾緩脈關前搐項筋主脈澀客脈緩澀緩相合風邪傷衛項筋緊急可用桂枝湯不已葛根湯主之或羌活湯緩在上焦羌活升麻黃芩葛根石膏各一兩麻黃去節湯浸去黃汁焙防風藁本蔓荊子細辛各半兩上㕮咀每服一兩入生薑七片水煎溫服無時當關氣結腹難伸主脈客脈俱緩脾濕太盛胃中太虛七氣湯主之半夏制一兩人參官桂甘草炙各半兩上㕮咀每服一兩入生薑七片水煎溫服無時不已復煎蒼朮四兩去皮泔水浸一碗煎取二大盞去滓入桂枝白芍藥茯苓各二錢再煎取一盞服不已再服或建中湯主之腹難伸者局方溫白丸主之緩在中焦尺上若逢症冷結夜間常夢鬼隨人主脈數客脈緩數緩相合反為寒病宜桂枝加乾薑湯治之桂枝一兩白芍藥乾薑各半兩炙甘草四錢上各㕮咀加生薑棗煎不已用半硫丸緩在下焦夢鬼者三焦虛氣神不守故也白芍藥一云白朮四澀者陰也主痛身疼痛女子有孕胎痛無孕敗血為病澀脈如刀刮竹行丈夫有此號傷精婦人有孕胎中痛無孕還須敗血成主亡血失精婦人孕病或帶下赤白或敗血聖惠方烏金散治敗血局方四物湯地黃丸失精權道藥龍骨丸主之龍骨苦楝子各二兩上為細末醋糊丸梧桐子大空心溫酒下五十丸又云亡血失精半產漏下俱宜用酒煮當歸丸澀脈關前胃氣升澀脈見處氣血俱傷金有餘損傷萬物主脈與客脈俱澀是也金有餘故升於上治之以勻氣散或利膈丸桔梗湯澀在上焦桔梗一兩半夏制半兩陳皮三兩厚朴一兩枳實麩炒半兩上㕮咀每服半兩食後水煎生薑服當關血散不能停主脈緩客脈澀緩澀相合故曰血散可用溫經丸如胃不和調中丸澀在中焦尺部如斯逢逆冷體寒臍下作雷鳴主脈數客脈澀數澀相合陽氣內虛陰氣有餘故為逆冷治之以華澄茄散或五補丸選用之牆在下焦人參茯苓地骨皮熟地黃牛膝去苗酒浸各一兩上蜜丸如桐子大每服三十丸溫酒下空心稍增至五十丸服至十日及半月覺氣壅即服七宣丸經數月覺氣散即服五補丸凡人所疾皆因風不宣散即成壅緩熱風若氣不流行即成痃癖冷氣轉生諸疾尋其本由都為不嫺脈理覺虛則補覺壅則宣常須五補七宣必相兼服之久服可去百病也五遲者陰也主腎虛不安遲本土也遲脈人逢狀且難遇其季夏不能痊遲者陰也季夏陽也此證為失時反候陽盛陰虛治之宜瀉心肺補腎肝瀉心者導赤散補腎者地黃丸神工診著知時候道是脾來水必干季夏見遲脈是土剋水也故不能痊寸口脈遲心上寒主脈澀客脈遲澀遲相合主陰盛之故為心上寒治之以橘皮丸不已朮附湯白朮附子炮去皮臍乾薑炮桂各一兩上㕮咀煎一兩食前服遲在上焦當關腹痛飲漿難主脈緩客脈遲緩遲相合腹中痛甚桂枝加附子湯桂附子炮各一兩甘草三錢半上㕮咀煎服或理中丸脈回以消食丸遲在中焦流入尺中腰腳重厚衣重覆也嫌單主脈數客脈遲數遲相合水能剋火陰氣盛可用附子理中丸遲在下焦六伏者陰也主毒氣閉塞三關四肢沉重手足自冷主伏脈行於筋下氣伏於內陰毒伏氣切三焦不動榮家氣不調不問春秋與冬夏徐徐發汗治能消經曰清形以為汗麻黃附子細辛湯或秋冬以升麻湯春夏以麻黃湯當緩與之陰盛陽虛汗之則愈積氣胸中寸脈伏主脈澀客脈伏澀伏相合主胸中積氣治以沉香丸或加減溫白丸伏在上焦濁氣在上則生䐜脹當關腸澼常瞑目主脈緩客脈伏緩伏相合主中焦伏而不散乃風濕之氣故腸澼瞑目治以五膈寬中散白豆蔻一兩縮砂仁青皮陳皮去白丁香各二兩厚朴制八兩甘草炙木香各一兩半香附子炒八兩上為極細末每服三錢白湯點服無時清上實下如發之用羌活前藥不已然後用此伏在中焦一云血散則腸澼不散則瞑目尺部見之食不消坐臥非安還破腹主脈數客脈伏數伏相合邪勝寒之甚而不能化食故破腹坐臥不安治之以生薑棗湯白朮一兩黃耆茯苓白芍藥各半兩上為粗末每服半兩入生薑煎服不已養脾丸伏在下焦清氣在下則生飧泄臟不藏矣七濡者陰也主少力五心煩熱腦轉耳鳴下元極冷按之似有舉之無髓海丹田定已枯四體骨蒸勞熱甚臟腑終傳命必殂髓者腎之精四體骨蒸者腎氣衰絕終傳者七傳也土來剋水必殂也濡脈關前人多汗主脈澀客脈濡澀濡相合肺氣虛也而衛不能固於榮故多汗桂枝湯主之濡在上焦當關氣少精神散主脈緩客脈濡緩濡相合精神散失乃氣衰弱也治之以定志丸或四君子湯加茯神濡在中焦至此難治也尺部綿綿即惡寒骨與肉疏都不管主脈數客脈濡數濡相合主骨痿不能起於床五損至骨俱盡故不治八弱者陰也主氣居於表生產後客風面腫氣弱多傷也三關怏怏不能前只為風邪與氣連年少得此須憂重老弱逢之病卻痊脈若爛綿者陽氣弱也以應秋毛之脈氣弱多傷怏怏者輕手乃得不前者重手稍無是也少年得此須憂重者乃春夏也此時當洪大而有力今反無力而不前故憂其重也是春夏為逆秋冬為順老弱逢之病卻痊老弱者秋冬也秋冬脈當浮毛故為順關前弱脈陽道虛主脈澀客脈弱澀弱相合陽氣虛也治之以五補丸為久補四逆湯急治之關中有此氣多疏主脈緩客脈弱緩弱相合胃氣內虛故氣多疏散治之以益黃散平胃散選用之弱在中焦若在尺中陰氣絕痠疼引變上皮膚主脈數客脈弱數弱相合主下部損腎氣內絕既陰絕陽盛疼引於皮膚是三焦無陰鎮撫離其原也氣已損於肺無法可治也
