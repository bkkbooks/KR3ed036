薑各五錢上白米二盞同碾為細末每服二大錢水一盞入生薑一片同煎至七分通口服如臟腑不和加丁香十四粒石蓮心七粒同煎七分通口溫服空心食前厚朴煎丸醫方大成溫中下氣理脾進食常云補腎不若補脾然胃既壯則飲食進飲食既進營衛血氣自盛矣厚朴一斤極厚者去皮銼指面大用生薑二斤不去皮淨洗切片用水五升同煮水盡去姜只焙乾厚朴乾薑舶上茴香各四兩附子二兩炮去皮臍甘草銼半寸長二兩二味再用水五升同焙厚朴處煮水盡不用甘草只將乾薑厚朴焙乾上同為末生薑煮棗肉丸如梧桐子大每服五十丸米飲下厚朴丸治風經驗方治脾胃氣弱胸中滯悶痰飲不思食或大便不調厚朴去粗皮塗薑汁炙香焦一兩木香一分兩陳橘皮去瓤焙一兩檳榔四個肉豆蔻仁四個上為末別用神麯一兩杵碎炒熟為細末以生薑自然汁調煎作糊和為丸如梧桐子大每服二十丸至三十丸生薑湯下稍空服紫蘇散王氏博濟方治肝元風盛刑于脾胃致多飧泄調順中脘平和胃氣紫蘇葉一分揀擇淨控干紫花白朮半兩細銼微炒黃色肉豆蔻一分去殼青橘去白一分蠻姜半分炮縮砂仁一分川芎一分甘草一分炙天雄一分銼碎以鹽一分同炒令黃色佳上件九味同為細末每服二錢水一盞入生薑三片同煎至五分溫服日進三服白豆蔻散王氏博濟方補中益氣調順脾元心胸滿悶不思飲食上熱下冷宜服白豆蔻仁五錢肉豆蔻仁三個肉桂去皮五錢白朮一兩青橘皮去瓤五錢甘草三分炙厚朴去皮薑汁炙五錢上件七味同為細末每服三錢水一盞入生薑二片粟米少許棗三二枚同煎至七分去滓熱服之人參訶子散王氏博濟方和胃氣進飲食草豆蔻二枚煨甘草半兩炮茯苓五錢人參一分訶子二枚炮陳皮去白半兩蒼朮一分炙上同為末每服二錢入煨姜一塊水一盞煎至七分溫服桂附丸衛生家寶方治脾胃進飲食香附子厚朴陳皮甘草蒼朮桂心三稜肉豆蔻一個煨阿魏各五錢別研上為末酒糊為丸如龍眼大每服一丸生薑一塊切開作孔安藥在內合定濕紙裹煨候熟鹽湯嚼下煮樸丸衛生家寶方補氣化痰溫脾進食好厚朴去皮取四兩附子三二兩去皮生用切作片陳皮二兩不去白川乾薑一兩銼青州大棗取肉半斤上件入鍋內用水浸過藥二指煮盡為度慢火炒乾不得令焦入舶上茴香一兩炒白朮一兩白茯苓一兩神麯二兩炒別為末上一處為末用神麯糊為丸如梧桐子大空心食前下一百丸米飲吞下平胃煮散衛生家寶方寬中利膈消酒進食快脾胃止嘔逆霍亂吐瀉闢四時惡氣時氣嵐瘴諸病或酒食後尤宜進之此藥療疾有異效不可盡述蒼朮四兩洗淨銼細作片子先以米泔浸一宿漉出復用清水浸一宿漉出焙乾或曬乾用白朮二兩橘皮去白二兩棗四兩銼碎厚朴去粗皮了取四兩先以姜自然汁浸一宿火上炙令香銼細生薑四兩切作片甘草二兩銼作半寸許上件依數修合事了以瓷鍋或銚或瓶入藥在內以水淹浸約二三寸許文武火煮乃不緊不慢火候煮藥伺干將出火焙燥碾羅為細末每服二錢水一盞入生薑二片棗二枚同煎至八分服白水煎亦得或沸湯點服並宜早晨常進一服空心九寶湯衛生家寶方和中化痰快脾胃用真厚朴去粗皮秤三兩半夏三兩沸湯泡九次切成片焙乾作粗末二味共六兩和作一處用生薑十二兩淨洗和粗皮搗令細同厚朴半夏罨一宿日曝乾卻入後藥甘草炙桔梗一兩去蘆頭切碎酒炒金黃色藿香三兩陳皮三兩人參一兩紫蘇葉三兩上為粗末每服三大錢水一盞入紫蘇十葉煎至六分去滓不拘時候服正脾散衛生家寶方調脾養胃順氣治倦怠腹痛進飲食此藥大治酒後數圊如痢氣瀉脾疼等疾不可具述凡嶺外瘴瘧若能空腹一服永無所苦緊實大蒼朮一斤米泔浸一宿去皮薄切焙乾秤粉草二兩南木香一兩不見火桂心一兩去粗皮不見火吳白芷一兩粉姜一兩益智仁一兩陳橘皮二兩去瓤荊南茴香一兩上為細末每服一大錢水一中盞紫蘇二葉或棗子一個同煎至七分入鹽少許通口吃食前日三服如大便壅秘則食後時以青木香丸服得臟腑氣快為妙健脾丸經效濟世方溫暖脾胃增進飲食厚朴一斤去皮切棗二升去核切生薑一斤去皮切上三味先入鍋內猛火炒勻攪候紫焦傾出為粗末每末一斤入良薑四兩乾薑四兩炮裂神麯四兩同為細末麵糊為丸如梧桐子大每服三五十丸空心米飲送下加附子二兩炮去皮臍和中丸出濟生拔粹方補脾胃進食乾生薑橘皮人參各一錢乾木瓜二錢炙炙甘草二三錢上為細末湯浸蒸餅為丸如梧桐子大溫水送下調脾散續易簡方治脾胃少有不和可常服蒼朮米泔浸一宿冬浸二宿銼焙乾炒赤色秤八兩乃省秤半斤或秤一十兩乃足秤半斤實入兩是厚朴去皮五兩薑汁炒甘草炙一兩上為細末每服二錢用燒鹽湯點七分盞服或用水一盞姜三片棗二枚煎七分食前服或作銼散溫脾暖胃散廣南四時攝生論陳橘皮白朮厚朴各一兩上為散每服一大錢水一盞入薑棗同煎至七分空心溫服沉香養脾丸華佗中藏經方人參白朮川面姜炮甘草炙丁香木香肉豆蔻麵裹煨縮砂八味各五錢沉香一錢分上為細末煉蜜丸一兩作十粒每服一粒嚼下食前服化下亦得枇杷葉散朱氏集驗方調理脾胃清膈下氣去積滯舒氣除痰推陳納新養生之要藥不可缺也丁香乾薑半夏湯浸洗沉香枇杷葉薑汁塗炙肉豆蔻麵包煨各三錢甘草炙五錢五分白豆蔻仁炒陳皮縮砂仁炒各六錢茯苓去皮白朮各一兩檳榔二錢五分煨青皮四錢五分木香四錢上㕮咀每服三錢水一盞半生薑三片棗子一枚煎至七分不拘時候運脾散十便良方縮砂白朮人參藿香肉果丁香神麯各一兩甘草五錢上件為細末非時以橘皮湯點之通中健胃消食中和湯十便良方調適陰陽通流營衛養脾調胃快飲食治脅肋脹滿止嘔逆噁心白朮四兩黃橘皮厚朴人參甘草茯苓各二兩五錢上為細末每服二錢水一盞入生薑三片煎至七分去滓食前溫服安胃丸衛生寶鑑方治寒邪傷胃溫中補氣安胃進食縮砂二錢陳皮三錢木香一錢白朮五錢青皮二錢白茯苓二錢乾薑三錢炮大麥糵五錢上為細末湯浸蒸餅為丸如梧桐子大每服三十丸溫水送下食遠忌冷物補中丸衛生寶鑑方補脾虛調胃進飲食止瀉痢定痛厚朴一兩乾薑五錢炮白茯苓一兩去皮陳皮一兩去白甘草一兩炙上為細末煉蜜為丸如櫻桃大每服一丸空心食前白湯化下嚼亦得沉香湯楊氏家藏方溫脾快膈進食除嘔逆沉香五錢甘草五錢炙檀香三錢分白豆蔻三兩縮砂仁六分半木香三錢分麝香半錢字另研上件為細末入麝香研勻每服一錢入鹽少許沸湯點服進食散朱氏集驗方調脾進食療腹脹吐逆青皮陳皮甘草肉桂附子炮草果子訶子良薑白姜上等分㕮咀生薑三片棗子一枚水一盞半煎至一盞空心一日三服厚朴煎丸詵詵方凡補脾胃進飲食滋營衛保固精血孫兆云補腎不如補脾胃蓋脾能養餘臟也茴香炒黃川椒炒少時各四兩附子炮益智仁各二兩梓樸半斤去皮銼如指面大用生薑半斤帶姜皮切作片子用水三升慢火煮乾去姜乾薑四兩銼碎如骰子大用甘草二兩銼半寸長水五升同煮焙乾去甘草上為細末用生薑煮肥棗約一斤去皮取肉研為丸如梧桐子大每服五十丸空心米飲下此藥溫中升降氣血進飲食化痰涎極有神效人能常服此藥久則補助脾氣無白濁白淫之證自然無病丈夫婦人皆可常服拾珍散出簡易方治大病之後氣不復常乏力短氣神情不樂口苦無味揀參白朮白茯苓黃耆蜜炙白扁豆薑製山藥各一兩縮砂仁桔梗五味子甘草炙各五分上為細末每服三錢水一盞姜三片棗二枚煎至七分食前服之助氣益脾胃用鶻嘲鳥一枚煮炙食之頓盡一枚至驗鶻嘲似鵲尾短黃色在深林間飛翔不遠一名鸜鵒一名鳴鳩或呼為骨鶻甘平無毒硇砂丸以硇砂不計多少用罐子內著硇砂上面更坐罐子一個用紙筋白土和上下俱泥了窨干後從辰初時便用蒼耳草自在落下葉將來搗羅為末藥上鋪頭蓋紙上面罐子內用水坐著水旋添火燒從罐子外五寸以來圍繞欲盡更添火移向前罐子周迴火盡更促向前計一伏時為度更不移火即閒雜人及婦人不得見一伏時住取來搗羅為末醋麵糊為丸如梧桐子大每服逐日十丸至十五丸溫酒或米飲下並無忌若熟燒吃二三斤進食無病脾胃俱實附論夫右手關上脈陰陽實者足太陰與陽明經俱實也病苦脾脹腹堅搶脅下痛胃氣不轉大便難時反泄利腹痛上衝肺肝動五臟主喘鳴多驚身熱汗不出喉痹精少名曰脾胃俱實者也方瀉熱方千金方大黃麻黃黃芩各四兩杏仁赤茯苓甘草橘皮芒硝澤瀉各三兩上㕮咀水九升煮三升絞去滓納大黃煮兩沸去滓下芒硝分三服大黃瀉熱湯千金方治脾脈厥逆大腹中熱切痛舌強腹脹身重食不下心脾急痛大黃細切水一升半別漬一宿甘草各三兩澤瀉茯苓黃芩細辛芒硝橘皮各二兩上㕮咀以水七升煮三升三合去滓下大黃更煎兩沸去滓下芒硝分三服瀉黃散危氏方治脾胃壅實口內生瘡煩悶多渴頰痛心煩唇口乾燥壅滯不食藿香葉七錢石膏煅縮砂仁山梔子仁各五錢甘草炙五錢防風去蘆四兩上銼同蜜酒炒香焙為末每服三錢水一盞煎至七分溫服不拘時候
