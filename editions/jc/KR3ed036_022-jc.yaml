body:
  text: 卷二十二脾臟門兼理脾胃附論夫人身之脾胃專藉之以容納五穀而克化之脾屬土而居五臟之中寄旺於四時之內以土能容載萬物故好靜其脈常喜沉細而緩帶浮緊洪數者即有病之脈也尋常理脾助胃之道當用以平和之藥又須時其飢飽不以生冷之物傷之不為寒暑所侵不為七情所傷如是則氣體自然充實百病不生將理失宜或為六淫七情相干為嘔為泄為滿為喘變生諸證矣方綾錦養脾丸出御藥院方治大補脾胃極進飲食調順三焦保養營衛脾腎俱虛冷氣攻刺心胸腹脅小肚疼痛嘔逆痰水口苦噫氣吞酸及膀胱冷氣奔沖腰背臍腹絞痛手足微冷小便頻數又治猝暴心疼霍亂吐逆婦人血氣癥瘕心腹刺痛此藥誠如綾錦之美麗故以名木香丁香沉香紅豆蔻大椒官桂去粗皮附子炮裂去皮臍各一錢一分白茯苓去皮白豆蔻去皮肉豆蔻川薑炮製蓽茇蓽澄茄縮砂仁甘草銼炙黃人參去蘆頭白朮訶子肉陳皮去白神麯打碎微炒良薑銼炒麥糵炒黃各二錢五分厚朴去粗皮生薑制破故紙微炒上二味各六錢一分上為細末煉蜜和丸每兩作六丸此藥雖有三五味辛熱煉蜜合和成約四兩半藥並煉淨熟蜜約四兩半計九兩分作五十四丸每丸一錢六分有餘若服此藥一料大補如前法每服一丸細嚼好酒或薑湯米湯沸湯送下不拘時候沉香溫胃丸出御藥院方治脾胃虛弱三焦痞塞中脘氣滯胸膈滿悶宿寒留飲停積不消心腹刺痛脅肋膨脹嘔吐痰逆噫氣吞酸腸鳴泄利水穀不化肢體倦怠不思飲食常服可益脾胃大進飲食溫中消痞寬膈順氣沉香銼陳皮去白青皮去白人參去蘆頭大麥糵炒乾薑炮神麯炒白茯苓桂並去粗皮甘草炙各一兩揀丁香木香高良薑銼丁香皮切白豆蔻仁蓽茇縮砂仁紅豆各五錢白朮銼炒二兩大椒二錢五分上為細末煉蜜和丸每兩作一十丸每服一丸食前細嚼生薑湯下和胃丸出和劑方治脾胃不和中脘氣痞心腹脹悶不思飲食嘔吐痰逆噫氣吞酸面色萎黃肌肉消瘦腹脅刺痛便利不調少力及嗜臥體重骨節痛及治虛勞脾胃虛弱飲食不化心腹痞滿並常宜服此藥老幼氣弱皆可常服能溫中和脾胃調進飲食厚朴去粗皮銼碎以生薑二兩研爛同炒半夏一半湯洗曬乾微炒一半生薑汁製作餅炙黃神麯碎炒鱉甲九肋大者一枚黃泥外固以米醋二碗化硇砂一兩放鱉甲內慢火熬干取二兩細研如粉用麥糵微炒白朮銼炒肉桂去粗皮各二兩枳殼去瓤麩炒三稜炮青皮去白炒人參各三兩陳皮去白訶子炮去核各四兩檳榔當歸各一兩五錢芍藥甘草炒各一兩乾薑炮赤茯苓去皮各三分上為細末蜜丸如小豆大每服二十丸至三十丸微嚼破溫水下不計時候大健脾丸出醫方大成調中養氣和胃健脾治中焦積寒胸膈氣痞嘔逆噁心腹脅疼臟腑虛滑飲食多傷困倦少力肢體怠惰少精神肉桂去粗皮銼用厚朴去粗皮細銼用生薑一兩研爛同淹一宿炒令香熟甘草炙各一兩肉豆蔻麵裹煨乾薑炮丁香胡椒附子炮去皮臍木香蓽茇神麯炒白朮麥糵炒人參去蘆白茯苓去皮白豆蔻各五錢訶子麵裹煨去核二錢五分上為細末煉蜜丸如彈子大每服一丸細嚼溫米飲下食前吳茱萸丸一名木香利膈丸大理脾胃胸膈不通調中順氣方治冬三月陰氣在外陽氣內藏當外助陽氣不得發汗內消陰火勿令泄瀉此閉藏周密之大要也盛冬乃水旺之時水旺則金旺子能令母實肺者腎之母皮毛之陽元本虛弱更以冬月助其令故病者善嚏鼻流清涕寒甚出濁涕嚏不止比常人大惡風寒小便數而欠或上飲下便色清而多大便不調夜寒無寐甚則為痰咳為嘔為噦為吐為唾白沫以至口開目瞪氣不交通欲絕者主之吳茱萸草豆蔻仁各一錢二分橘皮益智仁人參黃耆升麻各八分澤瀉白殭蠶薑黃柴胡各四分當歸身甘草炙各六分木香二分青皮三分大麥糵一錢五分半夏一錢上為細末湯浸蒸餅為丸如綠豆大細嚼三十丸白湯送下無時夏三月大暑陽氣在外陰氣在內以此病而值此時是天助正氣而挫其邪氣不治而自愈矣然亦有當愈不愈者蓋陰氣極盛正氣不能伸故耳且如膈咽不通咽中如梗甚者前證作治法當從時利膈丸泄肺火以黃耆補中湯送下如兩足痿厥行步惟艱欹側欲倒臂臑如折及作痛而無力或氣短氣促而喘或不足以息以黃耆人參甘草白朮蒼朮澤瀉豬苓茯苓橘皮等作湯送下滋腎丸一百五十丸六七月之間濕熱之令大行氣短不能言者加五味子麥門冬如心下痞膨悶食不下以上件白朮蒼朮等湯送下消痞丸五七十丸更審而用之溫脾散出醫方大成青皮陳皮縮砂仁舶上茴香炒桔梗白芷厚朴各一兩木香香附子白朮各五錢甘草一兩五錢紅豆三分良薑一兩麥糵五錢乾葛一兩上㕮咀每服三錢水一盞半棗一枚煎七分空心服導氣枳殼丸德生堂方理順三焦調理脾胃去脹滿及痞悶不通氣不舒快枳實炒木通青皮炒陳皮炒桑白皮三稜炒莪朮炒檳榔麥糵炒神麯炒黑白牽牛炒小茴香西木香各半斤五錢上為細末蘿蔔熬水煮麵糊為丸如梧桐子大每服五十丸溫水無時下木香分氣丸出濟生拔萃方善治脾胃不和心腹脹滿兩脅膨脹胸膈滿悶痰嗽喘息醋心乾嘔咽喉不利飲食不化並皆治之大有效木香檳榔青皮去白陳皮去白瓤薑黃玄胡蓬莪朮炮乾生薑當歸白朮赤茯苓去皮肉豆蔻枳殼麩炒荊三稜濕紙裹煨香秋冬加丁香炒上為細末用白麵糊丸如小豆大每服三五十丸生薑湯下忌生茄馬齒一方無枳殼陳皮大藿香散出百一選方治一切心肺脾胃氣變為萬病服之皆愈盛季文傳於賀方回云昔在河朔因食羊肝生脾胃泄瀉之病兼以濃血仍發脾氣嘔吐霍亂心腹撮痛時出冷汗四肢厥逆不可忍邑宰万俟湜懷此藥煎以進用遂愈再服定藿香葉二兩木香青皮去瓤麩炒神麯炒人參去蘆肉豆蔻麵裹煨良薑炒大麥糵炒訶子煨去核白茯苓甘草炒厚朴薑汁製炒陳皮去白各一兩白乾薑五錢炮上為細末每服二錢吐逆瀉痢不下食或嘔酸苦水翻胃噁心並用水一盞煨生薑半塊擘破同煎鹽一捻安盞中候煎藥及七分熱呷水瀉滑泄腸風臟毒陳米飲熱調入鹽少許下赤白痢煎甘草黑豆湯下脾元受虛邪變為寒熱或脾胃虛冷醋心氣脹宿滯酒食噫滿不化膈上不快面色積黑痰氣作暈頭目眩掉水一盞姜三片棗一枚擘破同煎七分入鹽少許嚼薑棗湯熱服胃氣呃噫生薑自然汁半茶鍾入鹽點熱呷絕不思食或吃少氣弱膈滿煨姜一小塊先嚼入鹽點熱服中酒亦如之一切氣膈變成百病如上服之不拘時如湯點入姜鹽紫蘇尤佳大能消食順氣利膈開胃功不可細述又方出百一選方主脾氣不調有寒熱或下閉塞調五臟不利嘔逆飲食者大黃六分杏仁去皮尖雙仁炒附子炮當歸乾薑桂心各四分人參細辛芍藥茯苓半夏洗黃芩蜀椒炒出汗各三分玄參五三分上搗篩蜜和丸如梧桐子大飲服六丸日三增至十丸忌豬羊肉冷水餳生蔥生菜酢物等深師無半夏附子育氣湯出御藥院方通流百脈調暢脾元補中脘益氣海思進飲食大益脾虛疼痛祛陰寒止腸鳴白朮丁香人參木香白茯苓藿香縮砂仁肉豆蔻蓽澄茄甘草炙各五錢乾山藥一兩陳皮去白青皮去白各三錢一分上為細末每服三錢木瓜湯空心點服鹽湯亦得一方加白檀香五錢瀉脾丸調中利飲食除胃中積聚寒熱老人將服長肌肉令人光澤黃芩杏仁去皮尖雙仁熬澤瀉通草芎藭桂心白朮乾薑各五分茯苓黃耆乾地黃各六分附子二分炮麥門冬四分去心上搗篩蜜和丸服如梧子大二丸日三服忌豬肉冷水桃李雀肉生蔥酢物蕪荑等白朮沉香散出百一選方墜氣益脾胃沉香人參紫暈者白茯苓半夏曲訶子肉木香川薑各一兩白朮乾山藥各一兩五錢甘草六錢丁香五錢附子二個炮上為細末每服二大錢水一中盞生薑三片棗子一枚木瓜一片煎七分食前服桂麴丸出醫方集成健脾胃進飲食助克化生冷溫中下氣治食少易傷胸滿噁心或心腹疼痛病後衰弱氣不復常人參蓽茇白朮乾薑炮高良薑微炒縮砂仁肉豆蔻麵裹煨陳皮湯浸去白桂枝去粗皮各一兩甘草銼炒丁香各五錢神麯三兩銼塊炒熟上為末熟湯泡蒸餅和丸如梧桐子大食前一時米飲下五十丸至七十丸豆蔻橘紅散出醫方集成溫脾養胃升降陰陽和三焦化宿食丁香木香各一兩白豆蔻仁人參去蘆厚朴薑製神麯炒乾薑炮半夏曲炒橘紅去白甘草炙藿香葉去土白朮各五錢上㕮咀每服三錢水一盞姜三片棗一枚煎七分溫服和中益氣丸出御藥院方治脾胃不和氣不升降嘔吐減食口苦吞酸胸滿短氣肢體怠惰面色萎黃中焦虛痞不任攻擊臟氣久寒不受峻補又療心胸愊愊如滿五飲停滯不散常服和中益氣進美飲食或大便不通尤宜服之木香丁香各五錢肉豆蔻茴香微炒香荊三稜炮銼白豆蔻仁人參去蘆頭桂去粗皮各一兩縮砂仁二兩青皮去白陳皮去白各四兩上為細末白麵糊和丸如梧桐子大每服六十丸至七十丸食前溫生薑湯下通膈丸出醫方集成快氣進食利胸膈消膨脹丁皮蓽澄茄白豆蔻檀香粉草各五錢縮砂仁香附子各一兩木香二錢片子薑黃二一兩甘松丁香各一三錢上為末用蓽澄茄為母以布蘸水塗濕筐盤一邊滾蓽澄茄就干筐盤一邊上藥末又滾就濕處一邊拌濕再就干處一邊上藥末即法丸也丸如梧桐子大每服三十丸白湯送下宮方七香丸出直指方治消食快膈和胃止痛木香丁香檀香甘松淨丁皮橘紅縮砂仁白豆蔻仁三稜醋煮蓬朮醋煮焙乾各五錢大香附炒去毛二兩五錢上為末研米糊丸綠豆大每服三四十丸薑湯下一方用油餅湯泡和丸木香啟中湯補脾胃進飲食寬膈順氣人參白朮茯苓甘草半夏枳殼香附縮砂白豆蔻木香陳皮各等分上如法修制為㕮咀每服六錢水一盞半生薑七片棗一枚同煎至八分去滓溫服木香枳殼丸治寬胸膈進飲食消食快氣木香檳榔陳皮去白黃連去須廣朮煨當歸去蘆枳殼去瓤麩炒青皮以上各五錢黃柏香附子去毛麩炒各一兩半牽牛頭末二兩上為細末滴水為丸如梧桐子大每服五七十丸食後薑湯送下若有瘡毒急服百丸至二百丸看人虛實加減服但利五七行立消毒腫丁香和胃丸治脾胃不和中脘氣痞胸膈停痰嘔吐噁心脅肋刺痛飲食無味肢體倦怠常服溫中和胃止嘔進食丁香木香沉香各五錢藿香葉白茯苓去皮白豆蔻仁陳皮去白白朮人參各一兩半夏薑製三兩上為細末生薑汁麵糊為丸如梧桐子大每服三十丸至五十丸煎生薑湯下不拘時候大七香丸治脾胃不和三焦滯氣不宣通腹脅脹滿胸膈噎塞食飲遲化氣刺氣疰中酒吐酒常服消穀進食穀神丸治消食健脾益氣進美飲食人參縮砂香附子炒去毛三稜炒莪朮煨青皮陳皮神麯炒麥芽炒枳殼炒去瓤各等分上為細末粳米糊丸如梧桐子大每服三十丸空心米飲吞下鹽湯下亦可是齋安中湯治脾胃一切疾不利三稜炮莪朮炮川薑炮良薑炮陳皮連白草果仁益智仁甘草炙各一兩一分神麯炒麥糵炒各三分上為細末每服二錢食後鹽湯點服大蓽澄茄丸和脾胃進美飲食治脾胃虛滿消積滯化痰飲宜服蓽澄茄一兩青皮去白廣朮煨陳皮去白川丁皮半夏洗七次厚朴去粗皮薑製各二兩五錢赤茯苓去皮四兩麥糵炒三兩上為末生薑汁麵糊為丸如梧桐子大每服六七十丸溫生薑湯送下不拘時候白朮湯治理脾和胃順氣進食白朮厚朴桂心乾薑桔梗人參當歸茯苓甘草各等分上㕮咀每服四錢水一盞棗二枚煎至八分去滓溫服不拘時候茯苓分氣飲治脾