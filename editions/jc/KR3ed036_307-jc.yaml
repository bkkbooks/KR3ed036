body:
  text: 卷三百七諸蟲獸傷門蛇傷附論夫蛇火蟲也熱氣炎極為毒至甚五方所出名稱不同惟廣南尤多彼山崇地濕水火蒸郁所生最盛蘄黃之地蛇類稍眾南方有一山居水中當四五月之交群蛇吐毒氣凡高數丈蒸若雲霧每至中夏瘴氣盛行亦緣此也凡蛇類不可悉狀其毒極微不能殺人者惟花蛇烏蛇故入藥品凡見蛇不言正名但云蟲及地索之類以避之或入山及履深草宜帶雄黃麝香避之蛇入人家者燒羖羊角令煙遍覆即去矣有青蝰蛇正綠色喜緣木及竹上與竹木色一種人卒不覺若人入山林中行脫能落頭背上然自不甚齧人齧人必死那可屢肆其毒此蛇無甚大極大者不過四五尺世人皆呼為青條蛇其尾二三寸色異者名矯尾最烈蜴凡中蛇不應言蛇皆言蟲及云地索勿正言其名也惡蛇之類甚多而毒有差劇時四月五月中青蛙三角蒼虺白頸大蜴六月七月中竹狩艾蝮黑甲赤目黃口反鉤白蛙三角此皆蛇毒之猛者中人不即治多死又有赤連黃頷之類復有六七種而方不盡記其名水中黑色者名公蠣山中一種亦相似不常聞螫人又有鉤蛇尾如鉤能倒牽人獸入水沒而食之又南方有𠯜蛇人或傷之不死終身伺覓其主雖百人眾中亦直來取之唯遠出百里乃可免爾又有拖蛇長七八尺如船舵狀毒人必死即削取船舵煮汁漬之便瘥凡大蛇多是神不可妄殺之又額上有白色狀如王字者有靈或有角形者此是欲變為龍也但蛇類雖多今皆以青條矯尾白頸艾腹其毒尤劇大者中人若不即治一日間舉體洪腫皮肉坼爛中者尚可得二三日也青喹中人立死虺毒急於眾蛇不早療之多斷人手足凡被蛇螫第一禁第二藥無出此二者有全劑雄黃麝香可預辦今凡俗知禁者少尋按師術已致困斃惟宜勤事諸藥或經行草路何由皆齎方書故山居者宜令知禁法也又惡蛇螫著人即頭解散言此蛇名黑帝其瘡冷如凍凌此大毒惡不治一日即死若頭不散此蛇名赤帝其毒小輕瘡上冷不治故得七日死凡蛇傷瘡未愈禁熱食熱食便發治之依初被螫法也夫蝮蛇者形不甚長頭匾口尖頭斑身赤紋斑色亦有青色黑色者人犯之頭腹貼著地者是也江東諸山甚多其毒最烈草中行不可不慎又有一種狀如蝮而短有四腳能跳來齧人名為千歲蝮中此必死然其齧人竟即跳上樹作聲云斫木斫木者但營棺具判其不救若云搗菽搗菽者猶可急療吳音呼藥云菽故也方大黃湯治毒蛇傷牛膝大青草下馬草胡麻草鐵掃草將軍草槐花頭淡竹葉小青各等分上同搗汁用煮酒調服粗敷瘡口將針破傷處用蔥鹽湯洗淨方可敷如無將軍草雄黃少許白礬散出聖惠方治諸毒蛇所傷解毒白礬熬汁枯研羖羊角燒灰研各半兩乾薑炮一兩射罔一分雄黃麝香研各一兩上為細散用敷瘡上凡蛇畏雄黃疑有蛇處於舍下微火燒雄黃蛇並散蛇咬丹治毒蛇傷野菊花二錢半麝香二錢香白芷各一錢雄黃二錢上為末用好醋調搽雄黃散治諸毒蛇咬毒氣攻心迷悶雄黃研麝香研乾薑炮為末各半兩巴豆一分去皮膜心出盡油研上和勻每服一字以新汲水調下才中便服得利則毒氣微消未利更一二服一方用丹砂椒黃敷方出十便良方治一切毒蛇咬迷悶閉口椒一兩為末蒼耳苗五兩為末生薑汁二合硫黃半兩為末上相和敷之椒香方出聖惠方治毒蛇咬毒氣攻心腹悶亂方豉四兩椒去目薰陸香各三兩白礬炒灰二兩上以相和爛搗以唾調敷傷處牛角散治蛇螫人竅出血凡蛇瘡未愈禁熱食犯此便發治依初螫法出聖惠方貓兒糞三兩燒灰乾薑一兩銼雄黃一兩牛角䚡二兩燒灰上為散以津唾調敷於螫處雄辛散治惡蛇瘋犬所傷詩曰細辛蓽茇及雄黃好酒研來入麝香不問惡瘡並惡犬管教一服便安康上等分為細末每服二錢好酒調下半夏散治蛇咬方麝香雄黃半夏巴豆上等分為末敷之麝香散治蛇螫人竅出血凡蛇瘡未愈禁熱食犯此便發治依初螫法麝香一分細研雄黃一分細研半夏一分生用上細研令勻敷之即愈蒼耳散治蛇螫人竅出血白礬二兩研大麻黃五兩銼蒼耳莖葉五兩銼上用水一斗煮至六升去渣下白礬末溫浸之細辛散治毒蛇所傷方細辛白芷各三錢雄黃二錢上細研令勻入麝香少許每服二錢溫酒調服諸般惡毒自散而安又一方有白芨治諸蛇毒方男子陰間毛二七枚含之有汁即咽卻秘方也中蛇毒勿渡水渡水則痛甚於初螫亦當先存想作大蜈蚣前已隨後渡若乘船渡不作解法殺人輕粉散治蛇傷舊墨一塊指大燒存性輕粉一分許亂髮一拳大燒存性上為末好酒調服一過便愈調敷咬處雄黃散治蛇咬及惡瘡痛雄黃半夏生乾薑生各等分上為細末貼蛇咬處各惡瘡上石灰散治蟲蛇蜂蠍蚖蛇蜘蛛沙蟲等傷蜈蚣草雄黃石灰各等分上搗為末敷螫處桂香散治諸蛇咬毒氣攻心桂去粗皮栝蔞根各二兩上為細末以小竹筒盛密塞帶行卒為毒蛇所傷即敷之此藥療諸蛇毒塞不密則氣泄不中用二蟲膏治諸蛇咬毒氣攻心迷悶地龍五枚蜈蚣一枚於端午日收赤足者上以相和爛搗敷之椒蒜敷方治諸蛇咬痛腫椒合口蒜各等分上用同搗令熟敷之瘥一方用蒜葉硼砂散治諸蛇咬痛腫上以硼砂一兩細研為末以園內生蔞蔥就上取卻蔥角尖傾入硼砂末卻以角尖覆一七日握出蔥傾硼砂汁於一張緊薄紙上陰乾每在傷處取錢孔大紙貼之立愈青黛散治蛇毒及一切蟲傷但有少氣可以下藥即活神效不可言倉卒無藥去處以大藍汁一碗雄黃二錢調勻點在所傷處並細服其汁無藍靛花青黛代之亦可仍用艾灸傷處椒葫方治蝮蛇毒上取合口椒胡荽苗等分搗敷之無不瘥胡粉散治蝮蛇毒大蒜胡粉上搗和敷之鹿角散治蝮蛇毒豬脂鹿角灰上以和塗之大蒜方治蛇螫人瘡已愈餘毒在肉中淫淫痛癢方大蒜小蒜各一升上合搗以熱湯淋汁灌瘡大良一方小蒜汁滓敷上麥門冬散治惡蛇咬傷頓撲不可療者及毒氣入腹遍身腫痛者上用香白芷為末麥門冬去心濃煎湯調下頃刻咬處出黃水盡腫消皮合仍用此藥滓塗傷處如氣未絕無不活者若傷輕只用辣母藤挼敷之更酒調雄黃亦妙以新汲水調下半兩許毒氣自消一方用熱酒調下諸方皆用麥門冬水蓋欲洗護心氣也昔臨川有人以蛇貨藥為業一日方作場為蝮所齧即時殞絕一臂大如股少頃遍身皮脹作黃黑色遂死有一道人旁觀出言曰此人死矣我有一藥能療但恐毒氣深重或不可治諸君能相與證明方敢為出力眾咸竦踴觀之乃每求錢二十文以往才食頃奔而至命汲新水解裹中藥調灌之四肢應手消復良久如故其人能起與未傷時無少異遍拜謝之觀者且鄭重謝道人道人曰此藥不難得亦甚易辦吾不惜傳眾人乃香白芷一物也法當以麥門冬湯調服適來事急不暇姑以水代之吾今活一人可行矣拂袖而去郭邵州訪得其方適有鄱陽一醫調一升以杖抉傷者口灌入此藥盡覺腹中榾榾然黃水自其口中出矣又一卒夜值更舍為蛇所齧身腹俱赤腫欲裂以此飲之即愈薑黃方治諸蛇毒螫人慾死上用乾薑雄黃等分同研用小絹袋盛係臂上男左女右蛇聞藥氣逆避人螫毒敷之細辛散治蛇咬上用細辛雄黃等分為末津調之亦可雄黃餅子散治蛇咬欲死方上用雄黃不以多少萵苣汁和作餅子候乾為末每用少許貼瘡口立愈一方好酒調化服之就用藥塗傷處櫻桃散治諸腫蛇傷上以櫻桃葉用生薑同擂碎入酒搗研調服之滓敷傷處一方無姜服之茜草散治土蛇咬先用蓼草搽於咬傷處後用茜草去根擂碎用井花水調服日進三五服渣敷傷處治蛇毒見肘後方先密取荇葉當其上穿勿令人見以再覆瘡口上一時著葉當上穿穿即折牙出也又方細辛白芷各一錢研雄黃一錢研上加虎骨麝香敷之雄靈散治毒蛇咬傷昏悶欲死者五靈脂一兩真者酒洗去砂石乾用雄黃半兩明淨者研上為細末每服二錢酒調灌之就以藥末調塗傷處瘡口良久再一服神驗昔有人被毒蛇所傷良久已昏困有老僧以酒調藥灌之二錢頃刻遂蘇及以藥津塗咬處良久復灌二錢即愈凡有中其毒者用之無不效驗一方無雄黃白芷散治毒蛇咬上用婦人扎髻繩扎定瘡處如無頭繩麻油繩亦可用雄黃香白芷末摻之用新汲水調末服之或熱酒送下皆良一方無雄黃單用香白芷末摻服又云諸方皆用麥門冬水蓋欲洗護心氣也地龍散治青蝰蛇螫地龍三條鹽半兩炒上相和研令爛以面圍毒處敷藥於上須臾化為水不過三兩度雄礬方治蛇傷詩曰忽然蛇咬傷雄黃與白礬一時研來搽毒住不等閒治蛇蟲傷用巴豆數粒研細貼瘡上蓼汁飲上搗生蓼汁飲之少少以渣敷瘡上或以藍青敷之亦可治諸蛇咬痛腫用黑豆葉五兩細銼搗敷瘡上日四五度一方唾塗咬處熟嚼豆葉敷之虻蟲散治蛇螫人竅中出血凡蛇瘡未愈宜禁熱食犯此便發治依初螫法用虻蟲初食牛馬血者二七枚燒為灰以溫水調服治蛇螫人竅中出血用黑豆五升碾碎分為二份於盆中以水浸過三寸深令浸螫處良久去舊豆著新豆復浸不過三兩易即愈兼以豆為末以調敷之更妙治蛇入口並七孔中用割母豬尾頭滴血著口中即出並著孔中得治因熱逐涼有蛇入口中挽不出毒蛇所傷用以刀破蛇尾入生椒三二粒裹著即出有人伐木倦臥山中遭此得法遂活此蛇有逆骨慎不可以力拔之無椒但辛物亦可雞角散治天蛇傷用雞子白刷瘡內候癢燒皂角末摻之治蛇傷毒用繩縛住兩頭以五加皮葉擂爛敷貼又方用烏桕葉擂爛敷貼傷處及葉於口嚼汁服之愈治毒蛇及一切蟲傷但有少氣可以下藥即活神效不可言用貝母為末調酒儘量飲之頃刻酒自傷處為水流出水盡為度卻以藥滓敷瘡上若所傷垂死但有少氣服此即活一方以貝母末塞瘡口妙不可言蘇韜光寓務光城外魁星館有人書此方於壁間云此方神效治一切蛇毒所傷方赤腳大蜈蚣一條瓦上焙乾雄黃巴豆霜各一錢麝香少許上為細末以杏核數個各磨成一竅去仁填藥在內令滿卻以蠟塞竅臨用時啟蠟以針挑藥末塗傷處候黃水出即瘥畢後塞其竅可救數人石中黃散治蛇傷槐花頭五倍子去蟲石中黃粉上各等分為末水調塗治蛇傷先用冷水洗後用茱萸二合水一碗研取汁服之將滓敷瘡一方用酒調下油調敷治因熱逐涼睡熟有蛇入口中挽不出方用艾灸蛇尾即出若無火以刀周匝割蛇尾截令皮斷乃將皮倒脫即出小品同之七八月中諸蛇毒旺不得泄背齧草木即枯死名為蛇蚳此物傷人甚於蛇螫即依蛇螫之法療之治蛇入人口中並七孔中者方以患人手中指等截三歲大豬尾以器盛血傍蛇瀉血口中拔出之治卒為蛇繞不解方用熱湯淋之無湯令人尿之治蛇齧方用人屎厚塗之將帛裹之即消治蛇毒方用消蠟注瘡上不瘥再注之又方用母豬耳中垢敷之牛耳中垢亦可用治蝮蛇毒方令婦人騎度三過又令坐上一方令婦人尿瘡上又方用生麻楮葉合搗以水絞去滓漬之又方用薑末敷之干復易一方以射罔塗腫上血出即愈又方用雞屎二七枚燒作灰投酒中服之一方用雞糞白燒灰酒調服之又方用面圍上令童男尿著中燒鐵令赤投中冷復燒著之二三度瘥又方用搗紫莧取汁飲一升以滓封瘡上以少水灌之又搗冬瓜根汁連滓以敷之又方用梳中垢如指大長一寸尿和敷之又方用青銅鏽敷瘡上又方用炙梳汗出熨之治蛇傷方用酒研水邊烏桕根吃即活治蛇骨刺人毒痛方用鐵精如大豆許納管中吹入瘡中良亦用鐵粉又方用燒死鼠為末敷之治蛇傷用續隨子半生半炒為末酒下三月九個四月十二個五月十五個三服隨月加減治毒蛇尿草木著人似刺扎便腫痛肉爛若手腳著之指節墮脫落方用研砒霜和膠漬塗之治蛇毒用秦龜肉可生搗罨敷之治蛇傷用蚯蚓乾者熬末用之土蛇中人用刮蠳龜尾以敷之便愈抱朴子云蠳龜啖蛇南人皆帶蠳龜尾以闢蛇也治毒蛇齧方用菰蔣草根灰取以封之其草似燕尾者是大效治蛇咬傷成瘡用暖酒洗瘡上日三易闢眾蛇方雄黃生薑乾薑各等分上粗杵以絳囊盛男左女右臂系之蛇則迸走若被蛇傷即用貼之立瘥又方以雄黃帶之入山林即不畏蛇治蝮蛇瘡用石龍藤絞取汁洗並服之汁亦去蛇毒心悶刀斧諸瘡封之立瘥治蛇咬毒入腹者用取兩刀於水中相磨飲其汁治蛇虺螫人用獨頭蒜酸草搗絞敷所傷處治蛇咬瘡用蒜去皮一升搗以小便一升煮三四沸通手即入漬損處從夕至暮初被咬以未腫速嚼蒜封之六七易治毒蛇螫人用搗地榆根絞取汁飲兼以漬瘡治蛇咬用堇汁生杵敷之毒即出矣治一切惡蛇所咬命欲臨死方一切惡蛇所傷先用繩索迎頭系定不要令毒入臟腑即傷人性命也雄黃一兩碎研麝香半兩上揉取龍腦薄荷自然濃汁一盞入雄黃麝香末在內先用藥汁洗咬處次用雞羽蘸藥從痛腫處滴下入咬處瘡口中只管不住手掃令出盡黑色惡血所傷之處即不壞爛也候血出黑盡仍用薄荷大藍滓裹定一日一換之治蛇咬毒入腹用水萍搗絞汁飲之妙又方用頭醋煮青竹筒合於螫處須臾黃水流出即瘥治蛇咬用取胡瓜敷之數易良又方用五兒齒燒灰敷之治蛇傷毒氣入腹悶絕不知人事者用北細辛為末或急用細嚼亦可酒調下以渣敷瘡上尋四畔有紅線路用滓捍毒氣出須臾便見瘡上如火焰起乃是毒氣出也治蛇傷方用蒲公英科根作泥貼傷處白麵膏藥封之白芷散治蛇傷用香白芷為末水調下頃刻傷處出黃水盡用末水調塗敷傷處如不暇研嚼細敷之亦可治惡蛇所傷用好醋浸鴨嘴膽礬末少許塗傷處藥到即愈又方用野藍葉取汁滴傷處又以酒和汁相浸飲一杯妙治蛇咬人用苦蕒搗爛敷之治毒蛇氣入腹用麥門冬研細沸湯調下又以仙人掌研汁灌之治白花蛇骨刺腫痛方亦治蛇咬用生遠志搗碎酒煎服以滓罨之如無生者乾者亦可治蛇咬用辣母藤五葉者鹽嚼敷之以治蜈蚣螫如神又方出百一選方用生龍腦敷之治蛇傷蝮蛇螫方出百一選方急取蝦䗫搗爛罨痛處極妙仍將絹片輕輕包定藥又以頭垢敷之妙一方蝦䗫肝塗之一方治蛇螫人其牙折入肉中痛不可堪塗之立出一方生蝦䗫一枚爛杵碎敷之治蛇毒出聖惠方用黃荊葉袋盛敷瘡腫上即瘥爛搗帛裹敷腫處又方用閉口椒並葉搗敷之即止治毒蛇咬用杏仁去皮尖三個定粉少許合貼傷上治蛇咬出十便良方用取獨頭蒜刀切安在瘡上艾燒七次去毒治蝮螫人出十便良方急掘地作坎以埋所螫處堅築其上毒則出土中須臾痛緩乃出徐徐以藥療之治蛇傷蝮螫出肘後方急取蜈蚣搗為泥罨在傷痛處極妙仍將絹片輕輕拴定藥又以頭垢敷傷處一方燒蜈蚣末敷瘡上治青蝰蛇螫出千金方用雄黃末敷瘡上沸汁出即愈亦用銅青敷瘡中治蛇咬用燒桑刀塗麝香少許和刀上以烙齧處令皮破即瘥又方用生蠶蛾陰乾為末敷齧處孔中數易之其蛾有生子者妙治蛇螫出聖惠方用狼牙草六月以前用葉以後用根生㕮咀以槲葉裹煻火炮令熱用布裹冷即易之又方用醋草熟搗以敷螫處仍將膩幞頭罨之數易其醋草似初生短嫩苜蓿苗便是治蛇齧人用豬屎熬令焦末藍一把水三升煮取二升投屎攪和以洗之瘥治蛇毒出聖惠方用獨狼牙搗臘月豬脂和以敷毒立瘥又楊炎南行方云六月以前用葉以後用根生㕮咀以槲葉裹之煻火炮令熱用熨瘡上冷即止治青蝰蛇用破烏雞熱敷之治蛇螫人出肘後方用嚼鹽唾瘡上訖灸三壯復嚼鹽唾上又方出肘後方用蠟及蜜等分於鐺中消令和以無節竹筒著瘡上以蠟蜜灌竹筒令下入瘡中瘥無蜜唯蠟用之亦得又方出肘後方用急尿瘡中乃拔刀向日閉氣三步以刀掘地作小坑以熱湯沃坎中取泥作三丸如梧桐子大服之取少泥塗瘡上治虺蛇毒用搗葵根以敷之一方取葵汁服之又方用頭垢敷瘡中又方用搗葎草以敷之立愈神良治眾蛇螫用常思子葉搗取汁飲一升以滓敷瘡上又以鬼目葉敷之止其痛又方出肘後方用搗鬼針草敷之又方出肘後方治蛇螫人瘡已合而餘毒在內或淫淫痛癢用搗大蒜塗之以少鹽豉合搗尤佳備急治虺蛇螫人用搗小蒜絞之飲其汁以滓封瘡上又方用繩縛瘡上一寸許即毒氣不得走便令人以口嗍所螫處取毒數唾去之毒盡即不復痛口嗍小腫無苦狀治蛇咬方五月五日前七日即齋不得食飲酒肉五辛仍先向桑下覓菟葵先知處記之至五月五日中時先以手摸桑木陰一遍乃著上摸索之訖即以口齧取菟葵嚼使熟以唾塗手熱揩令遍五月七日潔齋如前七日內亦不得洗手後有蛇蠍螫者以手摩之即瘥止治土蛙蛇諸蛇傷用婆婆針或葉細擂井水和服滓敷甚者不過二三服治諸毒蛇出千金方用鹽四兩水一斗煮十沸沸定以湯洗冷易之治蛇咬欲死方出海上名方用蒼耳心爛嚼敷之立效治蛇螫疼痛宜服此方出聖惠方用白礬一兩甘草一兩生用為散如蛇螫著之時心頭熱燥服此用新汲水服一錢即止如有些少腫氣用白礬鹽漿水萵苣根煎三五沸淋之即除如大段蛇螫著未及修事藥物用耳塞少許入在螫著瘡口內以酸醋一滴在瘡口上即止治蛇螫人瘡已合而餘毒在內或淫淫痛癢方出聖惠方用取甲煎塗之神驗蠍螫同用治蛇咬蠍螫出十便良方用燒刀子頭令赤以白礬置上候成汁便熱滴於螫處立愈此極神驗得活者數十人真元三十二年有兩僧流向鄧州俱為蛇齧令用此法救之敷藥簡便更無他苦又方出聖惠方治蛇咬毒用苦葫蘆根爛搗封瘡口上立瘥治遭惡蛇所螫出聖惠方用蛇皮貼於傷上灸之引去其毒氣即止一方煎洗三兩度治闢蛇法出肘後方肘後姚氏仙人入山草法闢蛇之藥雖多唯以武都雄黃為上帶一塊上秤五兩於肘間則諸蛇毒物莫之敢犯他人中者便摩以療之又帶五蛄黃丸良丸有蜈蚣故也凡人入山伐松有大赤足蜈蚣置管中繫腰又有蠳龜啖蛇帶其尾亦好日喙彌佳禁法中亦有單行輕易者令疏其數條然皆須受而後行不爾到山口住立存有蛇一頭乃閉氣以物屈刺之因左回兩步思作蜈蚣數千以依身便行無所畏也治蛇螫人瘡已合而餘毒在內或淫淫痛癢方出聖惠方用遠志嚼爛以敷之並內一片子於螫處瘡孔中數易之又方出聖惠方用雞子打破頭作孔合著螫處逡巡雞子黑又換以可為度立效散出朱氏集驗方治蛇傷垂死者鐵蛟龍一名水藕一名金蓮花取根二兩銼片焙乾知母貝母各一兩雄黃半兩天雄一個生用紫河車三兩大川烏一個真北細辛上為細末用生地黃酒調服即愈如鼻口血來生酒地黃加雄黃丸下如傷風隨脈證用發散藥並服之見瘡口腫不消用針腫處候毒氣出即安如有孕婦人則除天雄少用川烏忌食葷物肖南仲方屢效治蛇毒取夾蛇龜肉搗置敷傷處亦刮蠳龜尾以敷之其瘡便愈小黑中心折者無用不可食肉可生搗罨瘡治蛇咬瘡以蓼蕎搗敷瘡上預防蛇毒以栝蔞為末內著竹管密塞之帶行中毒急敷之緩乃不救治蛇毒以蚤休根醋摩敷之中虺蛇毒取茺蔚莖汁敷之良治蛇毒以野豬齒燒作灰服治蛇咬以梫木葉搗細封之治蛇蟲咬用生芋葉和鹽研細敷之治蛇蟲咬瘡以感藤葉生研敷瘡上感藤一名甘藤又名甜藤生江南山谷如雞卵大斫藤斷吹氣出一頭甘汁甘美如蜜治蛇犬等毒以青黛摩敷之治蛇虺螫人以射罔塗螫處頻易治蛇咬以樳木皮葉煮湯洗亦可作屑敷之治蛇含草毒以知時子急服解之治人蛇齧者以蜘蛛汁塗之療一切蛇蟲蠶咬以預知子搗敷傷上治蛇咬用豬槽中水以浸瘡有神驗治蛇咬方取黑豆葉銼杵敷之日三易良抱朴內篇云相國張公文蔚莊在東都柏坡莊內有鼠狼穴養四子為蛇所吞鼠狼雄雌情切乃於穴外坋土恰容蛇頭俟其出穴果入所坋處出頭度其迴轉不及當腰咬斷而劈蛇腹銜出四子尚有氣置於穴外銜豆葉嚼而敷之皆活治蛇咬毒以雄黃少許末敷之登時愈蛇種雖多唯蝮蛇及青金蛇中人為至急不治一日即死人不曉治之方術者為二蛇中人即以刀急割瘡肉投地其肉即如火炙須臾盡焦而人得活也此蛇七月八月毒盛之時不得齧人其毒不泄乃以牙刺大竹木即時焦枯治蛇咬以射罔塗肉四畔漸近瘡習習逐病至骨瘡若有熟膿及黃水出者塗之若無膿水有生血及新傷肉破即不可塗立殺人治蛇咬用苦苣莖葉研碎敷傷處苦苣即萵苣也治蛇蟲咬傷瘡痛以烏蘞莓根搗敷並飲其汁良治蛇咬毒悶欲死續隨子七顆味辛溫有毒在皮重臺六分味微苦寒有毒系出滁州葉似鬼臼上二味搗篩為末酒服方寸匕瘥兼唾和少許敷咬處立瘥治蛇蟲傷搗蒜貼之熱醋浸之經年者良治蛇犬咬毒取黃藥根研塗之一方研汁服亦得治蛇毒用水蓼葉搗敷之若毒入內心悶絞汁服治蛇犬咬以韭搗敷之治蛇咬用荏子葉搗敷之治蛇虎毒諸瘡以菟葵搗汁飲之及塗瘡能解毒止痛治蛇咬以蚯蚓屎並鹽研敷之治蛇犬等咬以熱尿淋患處治蛇犬並犬咬毒用梅根以酒及水磨服敷之亦佳療蝮蛇用絡石絞取汁洗之服汁亦去蛇毒心悶治蛇蠍所咬用鉛灸熨之治蛇咬以馬藺生搗汁服之治蛇咬以苦杖葉搗敷傷處治蛇毒用獨行根水摩為泥封之日三四立瘥治蛇咬毒以茱萸子一兩為末冷水調分為三服立瘥主蛇虺及蟲等螫以蛇繭草取根葉搗敷咬處當下黃水愈主蛇咬以萬靈藤杵篩以水和如泥敷上治青蛙蛇毒急灸瘡中三五壯毒則不行又用雄黃乾薑末射罔和之敷瘡治毒蛇所傷五靈脂一兩雄黃半兩同為末以酒調藥二錢灌之昔有人被毒蛇所傷良久之間人已昏困有老僧以酒調藥二錢灌之遂蘇及以藥渣塗咬處良久復灌二錢其苦皆去問之乃此方耳治蛇蟲食飲中得之咽中如有物不下吐不出悶心熱服馬兜鈴即出又服麝香一錢瘥即吐蟲出治諸毒所傷用青黛雄黃等分同研為末新汲水調下二錢服之治蛇犬虎狼毒惡蟲等齧上以鐵漿涼服之解毒不入腹內也治蛇虺螫人用茭草根燒灰封之本草云茭草荻根也治蛇虺蟲螫上以紫珠煮汁服之治蛇蟲咬及毒箭用薺苨根搗末以酒服之治蛇傷上用五靈脂為末酒調二錢服仍以少末摻瘡口妙又方上用雄黃為末以豬血調敷治中蛇毒以細辛雄黃等分為末摻瘡口內三四易之蠍螫附論凡蠍螫人有雌雄之辨雄者痛止一處雌者流散無定世傳禁祝之法雖眾然湯熨塗敷之劑亦不可廢也凡蠍五月六月毒最盛時云有八節九節者毒氣彌甚螫人毒熱流行牽引四肢皆痛過一周時方始定也方吹鼻散治蠍螫藜蘆去蘆頭丁香蜀葵花蕊豬牙皂莢酥炙去皮蓽茇半兩上搗為末每用一字螫左邊吹右鼻螫右邊吹左鼻一方用麝香蠍螫藥治蠍螫白礬生川烏半夏生乾薑生黃丹各等分半上為細末酸醋調塗螫處效雄黃消毒膏治蠍螫不可忍雄黃砒霜各半兩巴豆三錢白礬生一兩上為細末黃蠟半兩熔開入藥末銚內攪勻為錠子如棗大用時將錠子簽於燈焰上炙開滴於螫著處其痛立止雄黃蠟丸治蠍螫不拘男女疼痛不可忍者煮酒蠟半兩木鱉子三個去殼巴豆二七枚去皮雄黃末一錢上件除蠟外研勻化蠟為丸如彈子大用時以火炙磨痛處五月五日或四殺日合之忌見雞犬婦人蓽茇散治蠍螫卒疼藥未及者水洗方蓽茇膩粉蕤仁木鱉子各等分上取五月五日午時面南搗為細末修合之時不可令婦人孝子見螫著右邊以少許點左眼螫著左邊點右眼馬齒塗敷方治蠍螫馬齒莧生切大蒜生切二味各半兩共細研乾薑一分不炮為末上一處和勻塗螫處止痛出毒散治蠍螫石榴花艾葉心蜀葵花各等分上搗為末水和塗之五月五日取陰乾佳虎骨散治蠍螫卒痛虎頭骨炙板藍子蓽茇各一分上於五月五日午時搗為細末用燈心點藥少許於眼大眥男左女右點之神效如卒暴用不必重五日合硼砂散治蠍螫方上取齒中殘飯敷之又豬脂封之又射罔封之硼砂和水塗上愈蜀葵花散治蠍子咬雄黃二錢李子仁一錢蜀葵花葉五月五日午時採葉半錢上為末用針於蠍傷疼處撥用藥搽之一上散治蠍螫痛半夏一字生用為細末雄黃一半另研巴豆一個去皮研如泥上同和勻敷上膩粉散治蠍螫膩粉一分香墨少許蓽茇少許上搗為散每用半麥許點大眥角男左女右其痛立止五穀方治蠍螫上以五穀燒作灰熱塗之和松脂雄黃燒灰更良作法如甲煎為之熨痛丸治蠍螫雄黃研礬石熬令汁枯各半兩上再同研消蠟初乘熱丸如彈子大以蠟紙收藏遇螫將藥火上炙令熱熨痛處冷又炙熨數次此藥不限年歲常收用之礬夏散治蠍螫痛不可忍上用白礬半夏等分為末酸醋調貼痛上毒出鉛丹塗敷方出肘後方治蠍螫疼痛不定上用鉛丹半兩細研以醋調塗螫處治蠍螫卒痛藥未及者水洗方出千金方上以新汲冷水若著手足以冷水漬之水微暖則易之著余處者冷水浸故布㩉之小暖則易治蠍螫方出千金方凡蠍有雌雄雄者痛止一處雌者痛牽諸處若是雄者用井底泥塗之溫則易雌者用當瓦屋溝下泥敷之若治無雨可用新汲水從屋上淋下取泥治蠍毒及壁鏡毒人出仁存方上熔化白礬乘熱滴傷處痛止毒出治蠍螫方出千金方用取生烏頭為末唾合敷之一方以頭醋調敷之一方用嚼乾薑塗之治蠍螫用研蜘蛛汁敷之瘥治蠍螫人痛不止出千金方用貓兒屎塗傷處日三複易治蠍螫人用半夏研水塗之立止治蠍毒用麻蕡葉搗敷之效麻蕡今人績布者是也治蠍螫痛不止方用楮樹白汁塗之立瘥治蠍螫出朱氏集驗方用礬石一兩醋半升煎之投礬末於醋中浸螫處井底泥敷治蠍螫出肘後方用醋摩附子敷之治蠍螫出聖惠方用蜀葵花心陰乾為細末唾浸調貼一方龍絞葵汁塗之治蠍螫出海上名方以生地磨生薑塗之又方出海上名方用南星末醋調搽之治蠍螫出聖惠方用豬脂搽之又以冷水浸之自效治蠍螫人用畫地作十字取上土水服五分瘥又方用嚼茱萸以封之立愈又方出聖惠方用深削桂心醋磨塗之立定又方用挼馬莧菜封之瘥又方出十便良方用搗蒜塗之療蠍螫人用溫酒以漬之又搗豉作餅如錢大貼螫處以艾灸七壯療蠍螫人用苦李子仁嚼以封之即瘥又方用挼蛇銜取汁以敷之瘥又方用木碗率取此螫處即以木碗合之便瘥又方出肘後方用挼鬼針草取汁敷之即瘥治蠍毒螫人上於五月五日取椿樹上膠捻作塊子以椿葉裹藏淨器中螫時即取膠就火上微烘於患處熱按之二三次愈又方出聖惠方用射岡草搗封之溫酒漬之又射岡汁塗之治蠍螫不以男女疼痛不可忍者出旅舍方用蔥白切一片厚二分許置所螫處以艾灸三壯又方出聖惠方用溫醋漬所痛處數易之愈須預為溫下醋湯方不爾離醋極痛治蠍螫傷詩曰曾聞蠍螫徹心田休候雞兒叫曉天耳塞調來疼處抹除毒減痛卻依元治蠍螫出德生堂方用酸醋先滴在疼痛處即以膽礬末搽之又方出德生堂方用知母嚼爛吐疼處又方出德生堂方患者自把口咂或他人咂之徐吐去毒不疼為度治蠍螫出德生堂方即以前神仙奪命丹一丸磨水塗之立住疼三上無不驗方見咽喉門喉痹類仙方奪命丹按原方白茯苓密陀僧炒黃色紫河車白殭蠶直者貫眾淨縮砂仁甘草節各一兩烏魚骨去皮二錢半麝香一字上細末卻入麝香研勻同蒸餅包白麵蒸熟四兩和藥汲新井水丸如豌豆大蛤粉為衣治蠍螫人用石榴花葉及皮爛搗炒令熱封疼上冷即易之又方出聖惠方用黑角梳掌熱炙熨之又方出聖惠方五月五日取蝸牛殼黃色者三七枚為末要用時以醋調塗之甚效又方四月八日五更時取蒼耳陰乾搗為末每用以醋調敷之又方用驢耳垢敷之又方用滴蠟燭熱脂於螫處三兩度易之治蠍螫著手足方用雄黃末少許醋調塗之治蠍螫人用人參嚼以敷痛處立瘥又黃丹塗之瘥又方用溫湯浸之良又方用硼砂以水研塗之立愈治蠍螫急作小艾炷於螫處灸暖小便洗烏白散治蠍螫不可忍烏魚骨一兩白礬二錢上同碾極細末每用不拘多少在左壁者左鼻孔內㗜之如在右者右鼻㗜之治蠍螫萵苣子入鹽同嚼貼痛處少時其痛便止治蠍毒以槐枝炮熨之治桑蠍咬人用丁香末蜜調塗之治蠍螫人嚼乾薑塗之治蠍螫以火槽頭橫井上立愈治蠍螫以烏頭末少許頭醋調敷之治蠍毒以麻葉搗汁敷之良治蠍角法甄立言此蠍毒陰蛇即非蜂蜈蚣之輩自有小小可忍者有經一日一夜不可忍者京師偏饒此蟲遍用諸藥塗敷不能應時有效以意用竹依作小角留一節長三四寸孔徑四五分若指上可取細竹作之才令搭得螫處指用大角角之氣漏不嗍故角不厭大大即嗍急痛速作五四枝鐺內熟煮取以角螫處冷即換初被螫先以針刺螫處出血然後角之熱畏傷肉以冷水暫浸角口二三分以角之此神驗不可以口嗍毒入腹殺人軌公云炙即瘥以熱角嗍之猶火灸也
