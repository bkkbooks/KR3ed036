body:
  text: 卷一百九十一水病門總論黃帝問岐伯曰水與膚脹鼓脹腸覃石瘕何以別之岐伯曰水之始起也目窠上微腫如新臥起之狀頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也膚脹何以候之膚脹者寒氣客於皮膚之間𪔣𪔣然而堅腹大身盡腫皮厚按之其腹陷而不起腹色不變此其候也鼓脹如何鼓脹者腹脹身腫大大與膚脹等其色蒼黃腹脈起此其候也腸覃何如腸覃者寒氣客於腸外與胃氣相搏正氣不得榮因有所繫癖而內著惡氣乃起息肉乃生始也如雞卵稍以益大至其成也若懷子之狀久者離歲月按之即堅推之則移月事時下此至其候也石瘕如何石瘕者生於胞中寒氣客於子門子宮閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下之曰膚脹鼓脹可刺耶曰先瀉其脹之血絡後調其經刺去其血脈師曰病有風水有皮水有正水有石水有黃汁風水其脈自浮外證骨節疼痛其人惡風皮水其脈亦浮外證浮腫按之沒指不惡風其腹如鼓不滿不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉處證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿心水者其人身重而少氣不得臥煩而躁其人陰大腫肝水者其人腹大不能自轉側脅下腹痛時時津液微生小便續通脾水者其人腹大四肢苦重津液不生但苦少氣小便難也肺水者其人身體腫而小便難時時鴨溏腎水者其人腹大臍腫腰痛不得溺陰下涇如牛鼻上汗足為逆冷面反瘦師曰治水者腰以下腫當利小便腰以上腫當發汗即愈問曰有病下利後渴飲水小便不利腹滿因腫何故答曰此法當病水若小便自利及汗出者自當愈內外傷辨云金匱要略云腰以上腫者發汗乃愈腰以下腫者當利小便又云治濕不利小便非其治也病腰下有水氣牡蠣澤瀉散主之治濕則五苓散主之孫真人治皮膚腫以五皮散主之乃述類象形之故也若果有水則水青龍加芫花湯主之病人乾嘔微利發熱而咳為表有水表證罷咳而脅下痛為里有水十棗湯主之於病又當詳審此病皆從虛損所致大病或下利後婦人產後飲水不即消三焦決瀆失職小便不利水乃相結漸漸蓄聚遂流諸經絡故也水有十種不可治者有五第一唇黑傷肝第二缺盆平傷心第三臍出傷脾第四背平傷肺第五足下平滿傷腎此五傷必不可治凡水病忌腹上出水出水者一月死大忌之夫腎主元氣天一之水生焉肺主沖化地四之金屬焉元氣乃水中之火所以太陽合少陰主精髓以滋血沖化乃土中之金所以太陽合陽明主肌肉以養氣今腎虛則火虧致傷陽水凝滯肺滿則土隘使陰金沉潛衛氣凝滯而不理血淖經絡而不通上為喘急下為腫滿故經云腎為少陰肺為太陰其本在腎其末在肺皆至陰以精水也所以能聚水而生病者蓋腎為關鍵關鍵不利樞機不轉水不運行滲透經絡皮膚浮腫諸證不同以短氣不得臥為心水兩脅疼痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水大小便閉澀為胃水小腹急滿為小腸水惟茲十水謂之正水又有風水皮水石水黃汗以義考之風合歸肝皮合歸肺黃汗歸脾石水歸腎雖名理不逾證候少異如風水脈必浮惡風皮水脈浮按不沒指石水脈沉腹滿不喘黃汗脈沉遲致發熱多涎療治之法當辨其陰陽脈證若陰水為病者脈來沉遲色多青白不煩不渴小便澀少而清大便多泄陽水為病者脈來沉數色多黃赤或煩或渴小便赤澀大便多秘腰以上腫者宜發汗腰以下腫者宜利小便然後實其脾土土盛自能攝養腎水其腫自消虛弱者又當溫補下元又有內挾七情之氣停滯涎飲腹滿脅脹名為氣分及少血血熱生瘡變為腫痛名為內熱又當隨證施治不可一途而取要知此證脈浮大者生沉細者死臨證施治宜詳審焉治法大要身有熱者水氣在表可汗身無熱者水氣在裡可下其間通利小便順氣和脾胃俱不可緩耳然而證雖可下又當推其重輕不可過用芫花大戟甘遂猛烈之劑一發不收吾恐峻決者易固閉者難水氣復來而無以治之也然水之為腫曰風曰氣曰血合而有三焉風腫者皮粗麻木不仁走注疼痛氣腫者皮厚四肢瘦腹脅臌脹或煩躁漱水迷忘驚狂嘔逆煩悶皮間有紅縷赤痕者是血腫者婦人經脈壅閉敗血停腐尤多見之然婦人懷胎亦有氣遏水道而虛腫此但順氣安脾飲食無阻既產而腫自消若產後發虛則虛退而告殂矣大凡虛腫先起於腹而後散於四肢者可活先起於四肢而後歸於腹者不治至若蠱脹而肚上有筋腹滿而大便滑泄久瘧而轉作虛浮男從腳下腫而上女從身上腫而下或內硬或手掌平並不治當審而察之也大凡水病難治產後更須慎於口味又復病水人多嗜食不禁所以此病難愈也代有醫者隨逐世情意在財物不理本性病人慾食或於貴勝之處勸食羊頭蹄肉如此者未見有一愈者又此病百脈之中氣水俱實治者皆欲令瀉之使虛羊頭蹄極補那得瘳愈所以治水藥多用葶藶子等本草云葶藶久服令人大虛故水病非久虛不得蠱脹但腹滿不腫水脹四肢面目俱腫大醫者不善診候治蠱以水藥治水以蠱藥或但見脹滿皆以水藥如此者仲景所云愚醫殺之此疾所忌者喪孝產乳音樂一切生冷一切魚蒜房室喧戲酢滑一切肉黏食米豆油膩並禁不得食及不得用心其房室等猶三年慎之永不復發不爾者雖瘥復發發後更不可治也古方有十水丸歷驗多利小便不能述錄也水腫附論夫水腫之病以脾腎氣虛不能制水水氣妄行溢於皮膚其證股冷膚腫時作咳嗽不得安臥小便黃澀以手按腫處隨手而起是也方徐玉煮散出千金方治水腫利小便牛角䚡防己羌活人參丹參牛膝升麻防風秦艽生薑紫菀杏仁附子石斛各三兩桑白皮六兩橘皮二兩白朮澤瀉茯苓郁李仁豬苓黃連各一兩上為末篩為粗散以水五升煮三升取一升頓服日再不能者但一服二三日以前可服主利多而小便澀者用之大驗檳榔丸出聖濟總錄治水腫及療老小虛腫大病後浮腫作喘檳榔煨附子炮去皮臍吳茱萸水浸曝乾炒乾薑炮防己厚朴去粗皮塗薑汁炙甘草炙各一兩葶藶紙上炒紫色杏仁浸去皮尖雙仁炒椒目微炒赤茯苓去黑皮黃耆銼炒麻黃去根節炒桂去粗皮栝蔞去皮白朮銼微炒海藻洗去鹽炒各一兩半上為細末煉蜜丸如梧桐子大每服米飲下十丸日三稍加至十五丸未知加至二十五丸得小便利為度丁香散治腹脹硬滿水腫遍身小便澀少丁香一錢胡椒益智各一錢半青皮去白陳皮去白甘草炒各三錢茯苓白朮連翹桑白皮炒木香枳殼去瓤麩炒木通車前子炒各二錢上為細末每服三錢水一盞半生薑五片煎至七分和滓溫服食前日進三服復元丹出醫方大成治水腫夫心腎真火能生脾肺真土今真火氣虧不能滋養真土故土不能制水水液妄行三焦與氣脈閉塞樞機不通喘息奔急水氣盈溢滲漏經絡皮膚溢滿足頸尤甚兩目下腫腿股間冷口苦舌熱干心腹堅脹不得正偃則咳嗽小便不通夢中虛驚不能安臥附子炮二兩南木香煨茴香炒川椒炒去汗獨活一方用羌活厚朴去皮銼薑製炒白朮炒陳橘皮吳茱萸炒桂各一兩澤瀉一兩半肉豆蔻炒半兩檳榔半兩上為末麵糊丸如梧桐子大每服五十丸紫蘇湯下空心食前服此藥世傳屢驗其君臣佐使與造物同妙一日三服先次施利頃次乃腫消喘止蓋藥能助真火以養真土運動樞機安平必矣法當禁絕食鹽半年乃不再作當歸散出醫方集成治如前當歸洗木香煨赤茯苓桂心檳榔赤芍藥牡丹皮陳皮木通白朮各銼炒乾等分上為末腳膝頭面腫大小便不快每服二錢水一盞紫蘇淡竹葉淡木瓜一片如指大同煎八分溫服日三如已愈常服早晚二覺氣下或小便快是效臟寒去檳榔臍已凸添大腹皮木通豬苓各一兩忌烏雞肉鹹酸海味物一方無白朮茯苓丸出千金方治水腫茯苓白朮椒目各四分木防己葶藶桂心各二兩澤瀉五分甘遂十二分赤小豆前胡芫花芒硝七分別研上為末煉蜜和丸如梧桐子大蜜湯下五丸日一稍加以知為度消腫丸出醫方大成治水腫喘滿小便不利滑石木通白朮黑牽牛炒通脫木赤茯苓茯神半夏洗各一分陳皮一分木香半分瞿麥穗丁香各一錢上為末以酒糊為丸如梧桐子大每服四五十丸燈心麥門冬湯下導水茯苓湯出德生堂治水腫頭面手足遍身腫如爛瓜之狀手按而塌陷手起隨手而高突喘滿倚坐不得息不能轉側不能著床而睡飲食不下小便塞澀溺出如割便絕少雖有而如黑豆汁煮服喘嗽氣逆諸藥不效本堂用此即愈亦嘗驗其病重之人服此藥時要如熬阿剌吉酒相似水一斗止取藥一錢服後小水行時即漸添多直至小便變清白色方為全愈澤瀉赤茯苓白朮麥門冬去心各三兩紫蘇木瓜檳榔各一兩陳皮砂仁木香大腹皮各七錢半如病重者前藥計一十八兩重可均作三大服每服再加去心麥門冬二兩燈草一大把均半兩重水一斗於砂鍋內下藥五兩重熬一大碗再下小銚內煎至一大盞五更空心服滓再煎服連進三服自然利小便上㕮咀五錢重水二盞燈心二十五根煎八分去滓空心服沉香琥珀丸出德生堂治水腫一切急難證小便不通者琥珀杏仁去皮炙赤茯苓各半兩澤瀉半兩紫蘇真者沉香葶藶炒郁李仁去皮殼各一兩半橘皮去白防己各七錢半上為末煉蜜為丸如梧桐子大以麝香半錢為衣每服二十五丸加至五十丸前胡人參湯送下空心服量稟氣虛實加減用藁本丸出聖濟總錄治水腫久不瘥藁本去苗葶藶炒紫色各一分大戟微炒蜀椒去目及合口者炒出汗澤漆微炒巴豆去皮心麵炒出油者赤小豆微炒澤瀉各半兩甘遂微炒一兩牽牛子炒熱十分連翹微炒半兩上為末煉蜜為丸如梧桐子大每日空心溫酒下一丸加至二丸服後小便多如白水即住鬼箭羽散出千金方有人患水腫腹大其堅如石四肢細小勞苦足脛腫飲食便氣急此終身疾服利下藥不瘥者宜服此藥將以微除風濕利小便消穀歲久服之乃可得力瘥後可常服鬼箭羽丹參白朮獨活各五兩秦艽豬苓各三兩知母海藻茯苓桂心各二兩上㕮咀以酒三斗浸五日服五合日三任性量加漸加之大腹皮湯出醫方大成治濕熱氣內攻心腹脹滿並水腫小便不利大便滑泄並宜服之橘皮去白一兩半木香二錢半滑石六兩檳榔三錢白朮一兩茯苓去皮一兩木豬苓去皮澤瀉肉桂各半兩甘草二錢上㕮咀每服四錢水一盞姜五片煎六分溫服大小便秘澀先服十棗湯後服此葶藶丸出醫方集成治腹中有濕熱氣目下作腫如新臥起之狀兩足脛腫病在腎少陰也標在肺太陰也故胸滿氣急咳嗽喘息有音每就臥則右脅有氣上衝左腋與脅益相牽引不快少思飲食甜葶藶半兩郁李仁湯去皮熬紫色稱三分將二味別研如膏令極勻白朮半兩牽牛子半兩一半生一半熟桑白皮赤茯苓漢防己羌活陳橘皮澤瀉上為細末與上二味同研煉蜜和入臼內杵之丸如梧桐子大初服十丸空心晚食前日二服生薑皮湯下不知加至二三十丸以知為度葶藶木香湯出醫方集成治水腫腹脹大便滑泄葶藶炒香白朮豬苓去皮各一分茯苓三分桂枝二錢滑石三兩澤瀉木通甘草炒各三錢木香半錢一方無白朮上為細末白湯調二三錢食前日夜四服若小便不得通而返滑泄者此濕熱痞悶極深而攻之不開故能反為滑泄此正氣已衰而多難救也不可強攻之而無益勉以救之則少少與服之使稍稍導散微以得所