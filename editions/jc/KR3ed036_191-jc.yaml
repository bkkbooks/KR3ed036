弱虛人平人常服保養宣通氣血進飲食削痞滿甚者更多服如頓攻不開轉加痛悶初服二丸每服加二丸至快利為度以意消息小兒丸如麻子大隨弱壯增減二至四歲者三五丸依前法大黃湯出聖濟總錄治水腫大黃銼碎醋炒二兩桂去粗皮甘草炙銼人參細辛去油研各一兩桑根白皮炒黃色銼二兩上粗搗篩每服用水三盞藥伍錢匕大棗二枚擘破同煎至九分去滓入蔥白餳一匙頭更煎一沸溫服日三桑白皮丸治水腫桑根白皮取上有白點者北陰下根白皮銼炙黃二兩郁李仁湯浸去皮炒商陸微炙葶藶紙上炒紫色牽牛子炒熟巴豆清水煮一日去皮尖心膜出油盡各一兩上為末煉蜜丸梧桐子大每服茶湯下十五丸利三五行見效即止烏鯉魚湯出危氏方治水腫腹腫又治四肢腫烏鯉魚一條赤豆桑白皮白朮陳皮各一兩蔥白五根上用水三碗同煮不可入鹽先吃魚後服藥正陽丹出三因方專治水腫宣木瓜干四兩濕者一個銼童子小便清酒各一升煮爛絞汁大豆煮去皮乾十兩人參一兩附子炮半兩銀硃二分上為末入銀硃研勻以木瓜膏丸如梧桐子大每服五十丸米湯下牽牛子湯出聖濟總錄治水腫牽牛子檳榔煨銼木香赤茯苓去黑皮陳皮去白炒各一兩上粗搗篩每服二錢匕水一盞煎三兩沸去滓溫服此藥不獨療水病凡肺氣腳氣賁豚氣上築心胸不可忍皆治之芫花湯出聖濟總錄治水腫及肢滿痰飲芫花湯炒黃色大黃銼碎醋炒甘遂微炒甘草微炙銼大戟去皮微炒各一兩上粗搗篩每服三錢匕水二盞棗一枚擘破同煎至九分下芒硝半錢匕更煎一沸去滓溫服以利為度防己丸出聖濟總錄治水腫眠臥不得防己海蛤研各一兩葶藶一升蒸熟甘遂微炒一分杏仁十枚湯浸去皮尖雙仁炒碎研上先將葶藶杏仁一處拌和後以三味為末再研勻入棗肉和丸梧桐子大每服米飲下十丸漸加至二十五丸以微利為度青木香丸出直指方通水寬中利膈行滯氣消飲食治胸噎食塞腹脅脹痛心悶不開腸中水聲嘔噦痰逆不思飲食青木香五兩蓽澄茄補骨脂炒檳榔炒各十兩牽牛子六十兩炒香搗取末二三十兩上為末入牽牛末令勻漸入清水和令得所丸如綠豆大每服二十丸茶湯熟水任下食後服每酒食後可服五丸或七丸小兒一歲一丸妊婦不可服木防己丸療水病木防己八分川大黃八分別搗人參八分葶藶十分熬杏仁八分去皮尖雙仁熬紫色別搗上搗篩蜜和丸先食後初服七丸如梧桐子大日再日加一丸至十二丸還日減一丸至七丸復漸加至十二丸循還服之以白飲服若病人熱多加黃芩八分如病人冷多加厚朴八分如病人久心驚加鉤藤八分忌酒面羊肉其牛肉一色永斷不得食牛黃桂枝湯療水腫牛黃六銖研桂枝十二銖又一方云桂六銖牡蠣十二銖熬研椒目十二銖葶藶半升熬一方云用一升上搗篩蜜和丸如梧桐子大米飲服七丸日再小便利為度忌生蔥越婢加朮湯出指南方治水腫從腰以上俱腫惡風小便不利腎水上溢其狀大腹喘滿不得臥宜此湯發汗麻黃去節一兩半石膏三兩甘草半兩白朮一兩上㕮咀為末每服四錢用水一盞半煎至七分去滓服不以時候導水丸出瑞竹堂治水腫黃芩二兩去粗皮大黃二兩去粗皮酒浸二三時紙裹煨滑石四兩研細飛去末渣牽牛四兩其治法正用一斤炒香取頭末四兩上為細末滴水為丸如梧桐子大每服五七十丸臨臥溫水送下如加黃連薄荷葉川芎各二錢半即神芎丸也詳證加後藥甘遂一兩久脹則加除濕熱腰痛泄水濕腫白芥子一兩除通身走注疼痛朴硝退熱散腫止痛久脹則加郁李仁散滯結通關節行水腫通滯樟柳根去腰痛沉重以上各一兩妙香湯治一切水氣四肢腫滿蘹香子炒烏藥高良薑湯浸焙乾青橘皮去白各一兩上粗搗篩每服二錢匕酒半盞煎數沸去滓稍熱服逐氣散治水氣兼治水腫白商陸去粗皮薄切曝乾黃顙魚三枚大蒜三枚綠豆一合上搗羅為散用水一升同煮以豆爛為度先食豆汁送下又以汁調下藥散二錢匕水氣內消一方以商陸根煮綠豆令熟去商陸取綠豆任意食之不用大蒜大麝香丸療三焦決漏水在脅外名曰水病腹獨腫大在腹表用麝香三分研雄黃六分研甘遂十二分熬芫花十二分熬上搗合下篩和以白蜜丸如大豆每服二丸酒下日三服可漸加至四丸節飲食禁肥肉生菜之類大黃丸治水腫利小便大黃白朮木防己各等分上為末蜜丸如梧桐子大米飲下十丸小便利為度不知增之三仁丸治水腫喘急大小便不利郁李仁杏仁炮去皮尖薏苡仁以上各一兩上為細末用米糊為丸如梧桐子大每服四十丸不拘時候米飲下人參丸治水腫人參木防己各八分杏仁八分去尖皮雙仁熬紫色搗細葶藶十分熬川大黃八分搗上搗篩蜜和丸如梧桐子大日服十二丸吳茱萸丸治水腫腹脹吳茱萸四兩甜葶藶二兩炒甘遂一兩水煮上焙乾為末蜜丸梧桐子大晨午臥米飲下各服七丸歸表湯治水氣四肢俱腫羌活二氣半青皮半兩炒黑牽牛頭末一兩上為末每服一錢以樟柳根綠豆桑白皮煎湯調下通經散治水腫陳皮去白當歸各一兩甘遂上為細末每服三錢溫淡酒調下臨臥服導源飲治各種水氣白茯苓皮二兩車前子大腹皮水洗通草木通薏苡仁炒以上各一兩天仙藤桑皮郁李仁冬瓜子炒木香納懷內取燥以上各一兩半赤石脂甜葶藶八錢用黑棗拌勻蒸用大杏仁一兩去皮尖雙仁炒令微黑另搗當歸一兩半去蘆酒洗上為細末用真藕粉打糊為丸如梧桐子大每服三十丸漸加至五六十丸食前溫酒下如患人素不飲淡鹽湯下益腎散甘遂依前合度上為細末每服三錢以獖豬腰子細批破以椒鹽等物淹透爛切摻藥在內以荷葉裹燒溫酒調下服玉並散栝蔞根二兩甘遂一兩治用上為細末以麝香湯調下三錢臨臥服白茯苓湯治水腫白茯苓澤瀉各二兩郁李仁五錢上㕮咀作一服水一碗煎至一半常服無時從少至多服或煎得澄入生薑自然汁在內和麵食或做粥飯作常食五七日後覺脹下再益以白朮散大戟散治水腫腫大如鼓或遍身皆腫大戟木香白牽牛頭末各等分上為細末每服用三錢以豬腰子一付批開摻在內燒熟空心食之如食左腰子拓右臂右腰子拓左臂如腫不能全去於腹臍旁塗甘遂末甘草水少許其腫盡去如腫因氣水氣為腫者加橘皮前白茯苓湯內加之如因水為濕腫者煎防己黃耆湯調服五苓散如因熱為腫者八正散如以熱燥於肺為腫者乃絕水之源也當清肺除濕水自生矣於附子湯中加黃芩如熱在下焦陰消使氣不得化者當抑陰而陽氣自化藥內加黃連如鼓脹之病治之以雞屎醴酒調服如水脹之病當開鬼門潔淨府前白茯苓湯主之大戟丸治水腫久不瘥大戟炒陳橘皮去白焙各三分巴豆一粒去皮大麥內微炒熟不用大麥上為末用大麥麵糊丸如梧桐子大每服三丸生薑湯下空心日晚服麝香丸治水腫麝香研半分芫花炒黃三分甘遂微炒去皮半兩上為末煉蜜丸梧桐子大強壯人酒下一十五丸老弱人十丸桃皮酒療水腫桃皮三斤削去上黑取里黃皮麥曲一升秫米一升上以水三斗煮桃皮令得一斗以五升汁漬麥曲五升汁漬飯釀如酒法熱漉去滓可服一合日三耐酒者增之以體中有熱為候小便多者即是病去便愈忌生冷一切有毒食物大戟湯療水病無問年月深淺雖證脈惡亦主之大戟當歸橘皮各一兩上切以水一大升煮取七合頓服利水二三斗而痊至重不過再服便瘥禁毒食一年水下後更服永不作此方出張尚谷治水腫利小便葶藶四兩生用桂心一兩上為末蜜丸梧桐子大米飲下三丸日三又方療身體腫滿水氣急臥不得郁李仁末面各一升上和作餅子七枚燒熟空心服熱食四枚不知加一枚以至七枚大便通利氣便瘥麻黃甘草湯治水腫從腰上下俱腫以此湯發汗麻黃四兩去根節甘草二兩上㕮咀每服三錢水一盞半煮麻黃再沸內甘草煎至八分溫服取汗慎風冷有患氣促積久不得瘥遂成水腫之病服之有效但此藥發表老人虛人不可輕用宜詳審桃紅散治正水脹急大小便不利逆欲死方甘遂半兩半生半炒用坯十二兩研上為末研勻用一錢以白麵四兩水調入藥揉和切作棋子大白水煮浮更不得使鹽料物只淡飲候大小便利去五六分卻用後藥調補平胃散附子炮白朮各一兩丁香半兩上為末和勻每服二錢水一盞姜七片棗三枚煎七分不拘時候日三五服若腫未退可灸三陰交穴及命門穴腫退必矣治大小便閉水腫方大黃防己各二錢半上為末蜜丸梧桐子大米飲下十丸小便利為度澤瀉散治水腫白朮澤瀉各等分上為細末煎服或為丸煎茯苓湯下之末治之法黃耆芍藥建中之類以調養之忌房事魚酒等物二氣湯治水腫腹滿牽牛子甘遂一分微炒上粗搗篩分作二服每服水二盞煎至五分放溫細細服不拘時候又方治水腫及暴腫方出河東裴氏傳經效葶藶三兩漢防己末四兩上葶藶杵六千下令如泥即下防己取綠頭鴨就藥臼中截頭瀝血臼中血盡和鴨頭更搗五千下丸如梧桐子大患甚者空腹白湯下十丸稍可者五丸頻服五日止此藥利小便有效療水腫方皂莢一梃去皮子焙烏餳五兩上以酒二升煮取六沸絞去滓頓服之須臾即小便二三升腫消忌一切肉面生冷咸酢食一年療水病方烏頭一大升粒小者桑根白皮五大升細切上為末以水五升和煮汁濾去滓於銅器中重湯煎如餳可作丸即成服取利小便為度禁房室及生死馬肉油膩面酒等治水腫出千金方商陸一斤白者炒羊肉六兩上以水一斗煮取六升去滓和肉蔥豉作膾如常法食之加鹽亦可一方加生鯉魚作湯煮服治水腫利小便出千金方用牽牛子末水服方寸匕日一以小便利為度治水腫出保命集方用螻蛄去頭尾與葡萄同研露七日曝乾為末淡酒調下暑月用佳治水腫出保命集方用棗一斗鍋內入水止有四指用大戟並根苗蓋之以盆合之熟為度去大戟隨時食盡棗決愈治水腫出經驗良方用椒目茯苓皮二味不拘多少煎湯水飲治水氣虛浮脹出百一選方昔滁州公候使酒庫攢司陳通病此垂死醫者已不下藥偶一婦人云是道人所授服之病自小便而下幾數桶遂愈用大蒜一個爛研以蛤粉和無分兩可丸即止如梧桐子大每服十丸白湯下若氣不升降即以大蒜一頭每瓣切開逐瓣內入茴香七粒濕紙裹煨香熟爛嚼湯送下治水腫有小女子發腫臍凸服之效出百一選方用黑豆煮皮乾為末米飲調下三錢建炎初有吳內翰女孫發腫臍凸無醫者吳檢外臺得此方服之立效下水腫方亦治小便澀用黃犍牛溺一飲三升不覺更加服老小減半亦可日至夜小便利瘥勿食鹽治溫毒水腫方用生大豆煮食之治水腫坐臥不得頭面腫及身體出肘後方取芫花桑枝燒灰淋汁煮赤小豆空心食餐飽飢即食不得飲葛氏方桑枝取東引者黃雌雞方治腹腫水癖水腫用雌雞一隻加赤小豆一升同煮候豆爛即食其汁日二夜一每服四合補腎扶陽氣治冷氣若瘦者漸食之良先患骨熱者不可食也鯉魚方出肘後方用鯉魚一頭極大者去頭尾及骨唯取肉以水二斗赤小豆一大升和魚肉煮可二升以上汁生布絞汁去滓頓服盡如不能盡分為二服溫服訖當下利利盡即瘥一方療腳腫腹滿下氣用鯉魚白煮食之腹有宿石瘕亦可食治卒刺手水腫用搗韭及藍置其上以火炙熱即瘥香薷方出十便良方治水病腫脹不消食用香薷乾者五十斤銼內釜中以水淹之水出香薷上一寸煮使氣力都盡清澄之微火煎令可丸每服五丸如梧桐子大日漸增之以小便利為度一方用香薷銼煮令濃及熱量服之治頭上皮虛腫薄如蒸餅狀如裹水用口嚼小麥面敷之瘥大豆酒療水腫兼治風虛水氣用大豆三升以水六升煮令熟出豆澄汁更內美酒五升微火煎如餳服一升漸增之令小便利則腫消也療水腫用黃連末以蜜和搗萬杵丸如梧桐子大米飲服二丸可加至三四丸禁飲水並冷物又方出鮑氏方用苦酒一升飲之一方取鹽豉各一撮水煎飲之一方取用木蒂滿虎口搗取汁飲之散腫丸治水腫小便澀用葶藶二兩微炒為末棗肉丸如梧桐子大桑白皮湯下每服三十丸日進二服一方用甜葶藶甘遂散治水腫甘遂炒蓬莪朮炮青橘皮湯浸去白焙各一兩大戟微煨桂去粗皮各二分石菖蒲米泔浸炒乾木香各半兩上為散每服用蔥湯下一錢空腹服漸加至二錢微吐瀉為度亦治腳氣治水癊海蛤二兩炙研三日漢防己二兩棗肉二兩杏仁二兩葶藶子六兩上為末以棗肉加煉蜜為丸梧桐子大每服一錢空腹服加料五加皮散出朱氏集驗方治水腫先用五加皮飲加澤瀉薑棗煎可先服三服次用大戟甘遂等分為末麵糊為丸如彈子大用樟柳根桑白皮綠豆煎濃湯細嚼空心下赤小豆粥出朱氏集驗方治水腫屢效赤小豆炒焙加樟柳根頭細切片黃魚生細切豬腰一對生細切燒鹽少許上先將赤小豆煮濾去滓不用將豆樟柳根頭大白陳米煮粥若得大樟蓼同煮尤妙無亦可候粥七分熟卻入黃魚與獖豬腰同煮覺魚與豬腰皆熟方入燒鹽吃之不過月立愈病輕者其效尤速治腫疾安後多不絕痕跡或以病未除方已復作又難以更用去水藥宜此方以防之出澹寮方上以子烏為末先用酒調一服仍用醋調遍塗腫處二三次自不作矣子烏恐傷人服時只一錢分水散出楊氏家藏方治面浮腫土狗一枚輕粉一分上為細末每用少許搐鼻中其黃水盡從鼻出一方出鮑氏方商陸煮綠豆任意食之一方出鮑氏方白茯苓棗核仁等分為末米飲下二錢治水病初得急危出本草即用冬瓜不限多少任意食之神效無比治水腫氣結宿滯腹中虛鳴出本草以越王余算煮服之治水腫出本草以橘子取汁飲之治水腫下水氣出本草以楓脂香煮汁服治水病初得危急出本草以烏牛尿每服一合瘥治水腫浮氣及風瘧出本草以瓶香土姜芥子等煎浴湯洗之治水腫出本草以綠鴨頭煮服之治水腫出本草以水松蒂食之生海底治水腫利小便出本草以水萍搗汁服之消水腫出本草以榆嫩葉作羹食之楊子建護命方治肝臟實熱相刑于脾遂生浮腫漸欲成水病宜服此方川芎羌活獨活細辛荊芥穗防己連翹各一分木香三銖半夏三銖上為細末每服二錢食後熱湯下藿香散方草豆蔻黃橘皮藿香川芎甘草乾薑赤小豆煮熱焙乾杵為末秤牽牛各半兩上為細末每服三錢空心熱湯調下和滓服但初患水病之有肝熱證候應將此兩方藥封和服餌以取平安若無肝熱證候只服此方也但一切水病之人不可暴取使服藥過度即傷損正氣應徐徐取之一度取未盡停待一兩日更取一度莫令傷正氣治初病水之人腹肋脹滿頭面兩足皆腫宜服此方浮腫亦可服護命方乾薑三分半夏羌活牽牛各二兩上為細末每服四錢用白麵一兩與藥末相和作面羹入水一碗蔥五根煮麵熟和汁盡吃取利一行又腫藥用針砂鐵蛾用鐵匠家打下鐵屑飛落者以入雞子製法用上等醋煮半日去鐵蛾取醋和蒸餅為丸薑湯服三十至四十丸以效為度亦得借鐵蛾氣耳出永類鈐方日華子云煎汁服之不留滯於臟腑借鐵蛾之氣以制肝木木弱不能克脾土伐其剋土之邪而水腫自消矣治水腫坐臥不得頭面身體悉腫用葫蘆根刮去皮搗汁一合和酒一合煨暖空心服當微吐利治水腫水氣用樟木煎汁服之導引法養生方云蝦蟆行氣正坐動搖兩臂不息十二通以治五勞水腫之病又云人臥時勿以腳懸蹋高處若久遂致成腎水也十水附論夫十水之病腫從腳起上氣而咳名為白水其根在肺腫從面目起名為青水其根在肝腫從目胞起名為黃水其根在脾腫從股起名為黑水其根在腎腫從胸起名為赤水其根在心腫從腹起名為氣水乍實乍虛乍去乍來其根在腸腫從頭面起至足名為懸水其根在膽腫從腹內起有堅塊四肢小腫名為石水其根在膀胱腫從四肢起腹大名為風水其根在胸腫從腹起名為里水其根在小腸凡此十水生於臟腑各從其根究其所本則肺與腎而已故內經曰其本在腎其末在肺皆積水也又曰津液充廓其魄獨居精孤於內氣耗於外形不可與衣相保蓋腎氣虛弱水氣脹滿上攻於肺肺氣孤危腎為水害子不救母故陰精損於內陽氣減於外三焦閉澀水道不通水滿皮膚身體為腫治之之法備見於內經經云平治權衡去菀陳銼微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽以布疏滌五臟故精自生形自成骨肉相保巨氣乃平也紫金膏出傳信適用方治十種水氣蛇含石二兩用炭一秤將蛇含石用新鐵鍋盛內入炭中煅紅用米醋二升投蛇含石入醋中赤石脂一兩研細末針砂五兩水淘洗焙乾用米醋二升用蘆根去瓤於砂鍋內煮乾為度再入鐵銚內於炭中煅紅取出冷定吹去灰研細木香一兩切作片子焙乾肉豆蔻二兩洗紙裹炮焙熟禹餘糧三兩羌活一兩去蘆頭川白姜一兩炮川芎一兩白茯苓一兩當歸一兩去尾頭切片子酒浸一宿杜茴香一兩炮香白蒺藜一兩川附子一隻重七錢者炮去皮尖三稜一兩炮青皮一兩去瓤陳皮二兩去白牛膝一兩切酒浸一宿官桂一兩切蓬朮一兩炮上為細末用無鹽蒸餅湯泡為糊丸如梧桐子大每服三十丸至五十丸溫酒吞下空心食前服如不食酒白水亦得忌鹽三月房室一年患人若皮甲錯眼黑臍凸肚皮光有青筋起並可用藥患人所食之物宜精作可食豬肉肝尖肚子白魚白松菜只用蔥椒醋佐食切不宜用鹽大海藻湯出聖濟總錄治十種水病海藻洗去咸焙芫花炒焦豬苓去黑皮連翹澤瀉炒郁李仁去皮尖雙仁研陳橘皮湯浸去白桑根白皮銼炒白蒺藜炒各一兩藁本去苗土昆布洗去咸大戟炒防己葶藶炒朴硝甘遂炒杏仁去皮尖雙仁炒各半兩檳榔煨銼七枚上粗搗篩每服四錢匕水一盞半生薑棗大拍碎同煎至八分去滓空腹溫服日一以利為度神仙萬金丸出醫方大成專治十種水氣逐陰固陽扶危正命足膝微腫上氣喘滿小便不利便是水氣證速服此藥取全效耳此藥神效功與取水藥不同用蛇黃大而丸者三兩以新坩鍋子盛用炭火一秤煅煅過將赤鉗鍋子出火急傾入釅米醋二升內候冷取出研至無聲上用針砂真者五兩賣者多雜鐵屑宜精揀擇水淘極淨磚上煅透候冷一處研至無聲如粉即止以上二物為主其次量人虛實入後藥治水氣多是冷藥惟有此方既非甘遂葶藶芫花之比有下項藥輔佐故老人虛人皆可服次入後藥羌活川芎牛膝酒浸一宿木通炒黃白茯苓肉豆蔻炮桂心去粗皮杜茴香略炒蓬莪朮炮乾薑炮白蒺藜以上各半兩更量虛實老人斟酌增入下列各藥虛人老人全用壯人減半用青橘皮去白炒附子炮去皮臍制京三稜煨當歸酒浸一宿炒陳皮上為細末拌極勻湯浸蒸餅握去水和藥再搗極勻丸如梧桐子大空心酒或白湯下三五丸忌鹽三個月一撮不可入口淡且以醋少許調和飲食病者不能忌鹽服藥徒勞無功果欲救病即須忌鹽至誠服藥只於小便內旋去並不動臟腑病已停服此藥每服一二服時兼以溫和調補氣血之藥將理此神方也溫白丸出直指方治十種水病積聚脹滿症癖塊痛久瘧諸風吳茱萸湯浸七次炒柴胡桔梗石菖蒲乾薑肉桂黃連茯苓人參川椒去目隔紙炒出汗厚朴制皂莢去皮巴豆去皮膜出油紫菀茸各半兩川烏頭炮去皮臍一兩半上為細末和勻煉蜜丸如梧桐子大每服三丸食後薑湯下加至五七丸為止治水腫時用五苓散加炒牽牛入生薑汁略煎送下集香湯沉香丁香各二錢木香青木香藿香葉川芎赤茯苓檳榔枳殼甘草乳香一錢半麝香一字別研上為細末每服二錢半姜三片紫蘇三葉空心煎服凡虛腫先用諸香以透其關絡然後審查證療補藥方肉桂去粗皮青皮去白乾薑炮蓬朮醋煮軟肉豆蔻雞心檳榔桔梗各等分依法治上為末每服三錢百沸湯點服空心日午晚食前服此二方治水腫病余見鄉人有患水疾半年後得名醫獲瘥余遂百計求之對此醫人多酬黃白之物遂得此二方余試用之百發百中獲濟者可無數世間所有水病方藥無出此二方之上者余初出本事方前集尚有此集後二帙初深秘之今所出前集已盛行於世此後集今亦略傳其一二人者使天下皆得躋盡天年毋致枉斃云一方無川芎檳榔丸治十種水氣腹脹喘嗽大小便澀檳榔一兩甜葶藶一兩隔紙炒甘遂半兩煨微黃漢防己半兩川椒目一兩當歸一兩微炒木通一兩川大黃一兩微炒滑石一兩澤瀉半兩商陸一兩牽牛子一兩微炒陳橘皮一兩湯浸去白豬牙皂角半兩去皮微炒上為末醋糊和搗三五百杵為丸梧桐子大每服空心粥飲下二十丸以利為度未得快利再服之芫花散治十種水氣證候極惡諸醫不療者芫花醋拌炒乾澤瀉郁李仁湯浸去皮微炒牽牛子微炒甜葶藶炒紫色漢防己各一分滑石三分海蛤半兩細研甘遂半兩微黃瞿麥半兩檳榔半兩大戟一分微炒上為細末每服一錢空心煎橘皮湯調下日一服當先瀉下碧綠水後下如爛羊脂即瘥如未下如爛羊脂者日再服之牽牛子丸出聖惠方治十種水氣遍身浮腫小便澀喘促不止牽牛子三分微炒甘遂一分煨微黃漢防己一分滑石半兩蘧麥半兩椒目一分微炒檳榔半兩澤瀉一分微炒桑白皮半兩甜葶藶半兩炒紫色郁李仁一兩湯浸去皮微炒上為末煉蜜和丸梧桐子大每服空心煎木瓜木通燈心湯下二十丸以利為度未得快利即再服之十水丸出聖濟總錄療十種水腫腫從頭諸書云腳起名為白水其根在肺椒目主之腫從面起名為青水其根在肝甘遂大戟主之腫從目胞起名為黃水其根在脾甘遂主之腫從腹起名為氣水乍實乍虛其根在大腸芫花主之腫從股起名為黑水其根在腎玄參主之腫從頭面起至足名為懸水其根在膽赤小豆主之腫從腹內起有堅塊四肢腫名為石水其根在膀胱桑根白皮主之腫從四肢起腹大名為風水其根在小腸巴豆主之腫從胸中起名為赤水其根在心葶藶主之椒目炒大戟炒甘遂研炒玄參葶藶炒芫花炒赤小豆桑根白皮炙澤瀉巴豆去心皮膜研出油上等分隨其病始所在增其所主藥皆自一分主豆四分去心皮搗末下篩蜜和丸如梧桐子大每服三丸得下為度不下日三亦可為散每服半錢匕便利明朝復服如法再服病愈即止禁飲但得食乾物耳又十水丸出本草方治水腫大戟炒治青水葶藶炒治赤水甘遂炒治黃水藁本去苗土治白水連翹去根治黑水芫花炒令焦治氣水桑根白皮炙銼治石水赤小豆治懸水巴豆去皮心炒油出治風水上等分隨證所主倍之搗羅為末煉蜜丸如綠豆大每服三丸至五丸米飲日三人弱者以意節之萬勝散治十腫水氣海帶海藻海蛤芫花炒醋浸甘遂大戟甜葶藶樟柳根續隨子巴戟去心各等分上為末每服三錢至五錢溫酒調下臨臥服間日再服大戟丸出聖惠方治十腫水氣遍身腫滿喘急煩悶心腹壅滯大小便不利又用赤茯苓湯下忌鹽一百二十日緣鹽能化水故也外忌魚鮓麵食一切毒物及生冷等物此方千金難得大戟炒甜葶藶炒紫色芫花炒醋拌令乾甘遂煨令微黃澤瀉桑根白皮赤小豆炒熟巴豆去皮心出油澤漆上為末入巴豆研勻煉蜜和丸如梧桐子大每服三丸空心粥飲下檳榔丸出聖濟總錄治十腫水氣檳榔三個炮大戟炒半兩牽牛子炒滑石碎海蛤瞿麥穗旋覆花甘遂炒各一兩上為末用軟飯和丸綠豆大每服七丸至十丸煎商陸湯下若作散每服一錢匕亦煎商陸湯調下如躁用米飲調下如已利動服葶藶丸葶藶丸出聖濟總錄葶藶炒杏仁不去皮各一分上為末米糊和丸如小豆大每服十五丸煎杏仁湯下三硝丸出聖濟總錄治十腫水病朴硝色青白者煉熟二兩芒硝色青白者硝石色青白燒之有金色者各一兩同上二味研令極細椒目微炒各一兩搗羅為極細葶藶炒紙上莨菪子炒各一兩杏仁二兩去皮尖雙仁以上藥味各別為末與諸藥合搗一千杵上用大棗三十一枚煮熟去皮核炒令水氣盡和為劑或硬即添少許熟蜜杵千下為丸如小豆大每服十五丸空心煎生薑湯下加至二十丸以利為度不宜食飽沖冒霜寒並單衣受風冷雖夏中亦宜就溫禁食鹹味難消之物不宜悲喜憂勞兼不得近生產房室等事惟宜吃粳米蔥薤生薑橘皮禁鹽一年永不發動檳榔湯出聖濟總錄治十腫水氣遍身洪腫氣喘小便澀檳榔三枚牽牛子炒葶藶炒桑根白皮一兩赤小豆炒半兩郁李仁一兩炒去皮尖防己豬苓各三錢去黑皮上粗搗篩每服五錢匕水二盞生薑一棗大拍碎同煎至一盞去滓溫服空心日三服以利為度大戟丸出宣明論治十種水氣腫脹腹滿寒熱咳嗽心胸痞悶背項拘急膀胱緊腫於小腹小便不通反轉大便溏泄不能坐臥並急喘大戟芫花炒甘遂海帶海藻郁李仁續隨子各半兩樟柳根一兩以上八味為末入後藥硇砂輕粉粉霜各一錢龍腦各一錢水銀硃砂一皂子大巴豆二十粒生用去皮上同研勻用棗肉為丸如綠豆大每服五丸至七丸龍腦臘茶送下食後服虛實量為加減陳橘皮散出聖惠方治十種水腫氣皮膚脹滿三焦壅閉上喘大便不通陳橘皮一兩木香半兩牽牛子一兩川大黃一兩枳實半兩羌活半兩烏臼皮半兩漢防己一兩上為末每日空心濃煎桑根白皮湯調下三錢以利為度大戟丸出聖惠方治十腫水氣遍身腫滿上氣喘促小便澀大戟一兩微炒牽牛子一兩微炒皂莢一兩去皮塗酢炙黃焦去子海蛤一兩細研甜葶藶一兩炒紫色川大黃一兩銼微炒桑根白皮一兩郁李仁一兩湯浸去皮微炒上為末煉蜜和丸搗百杵如梧桐子大每日空心溫酒下十丸以利為度續隨子丸出聖惠方治十種水氣喘促腹脅鼓脹小便不通續隨子海蛤細研甜葶藶漢防己甘遂煨微黃郁李仁湯浸一兩去皮微炒滑石以上各半兩膩粉一分上為末煉蜜和丸如梧桐子大每日空心粥飲下七丸當得快利如未利晚食前再服川朴硝丸出聖惠方治十種風氣此方出神仙密藏經人間無本因鄭鍊師向天臺金壇上石壁所記有數本緣得傳療諸疾自行此方二十餘年得效者甚多凡水氣有十種此方俱療一瘥以後永不再發但能斷得咸物無不效者此是仙方得之石壁金壇所記有靈驗有人先患腳氣十餘年發盛便成水病四時之中遍身腫滿腹硬如石水飲難下彌覺飢渴但喘粗不得睡臥頭不著枕二百餘日無間晝夜即呷粥飲常須倚物而坐羸弱異常因服此藥當時氣散數日後肚硬盡消二十餘日後氣力如舊既神效亦平穩川朴硝二兩微研川芒硝一兩細研馬牙硝半兩細研川烏頭去皮臍為末椒目微炒為末甜葶藶炒紫色莨菪子各一兩去浮於水者泡芽出炒黃色杏仁二兩湯浸去皮尖雙仁微炒黃上葶藶杏仁莨菪等相和先搗一千杵取大棗十枚去核與上藥細研勻煉蜜和丸如梧桐子大每服二十七丸煎桑根白皮湯下空心服大黃丸出聖惠方治十種水氣面目四肢滿腫心腹虛腫三焦壅滯坐臥喘急大黃銼炒滑石大戟去皮炒甘遂炒芫花醋炒焦椒目炒葶藶炒各一分上為末煉蜜為丸如小豆大每服一丸空心桑白皮湯下日再漸增以知為度一方粥飲下四石丸出聖濟總錄治十種水氣滑石甘泉石白石英續子仁寒水石研硇砂研細和作餅子用濕面四兩裹藥餅燒紫色去面各二兩白丁香半兩上為末麵糊丸如梧桐子大每服五丸生薑湯下第一日三服第二日四服第三日五服以利為度利已用次藥補之木香丸出聖濟總錄取下水氣補藥木香青橘皮湯浸去白焙各一兩蓬莪朮二錢上為末麵糊為丸如綠豆大每服十丸白湯下再蘇丸出聖濟總錄治十種水氣大通三焦大戟炒甘遂炒春麥面炒巴豆去心膜麵炒去油盡乾薑炮桂心去皮大黃銼炒各半兩上為末煉蜜丸如小豆大每服十丸空心茶清下以利為度巴戟丸出聖惠方治十種水氣通身腫脹食不消化心腹脹滿巴豆十枚去皮心用紙裹去油大戟半兩微炒甜葶藶半兩生用川大黃半兩銼炒桂心半兩芫花半兩醋拌炒乾杏仁半兩去雙仁者炒黃去皮尖上為末入巴豆杏仁研勻煉蜜和丸梧桐子大每服空心溫茶下七丸如人行五里飲熱茶一次得利下黏滑物者效神助散一名葶藶散出醫方集成方治十種水氣面目四肢遍身俱腫以手按之隨手而起咳嗽喘急不得安臥腹脹口苦舌乾小便赤澀大便不利澤瀉二兩豬苓二兩去黑皮黑牽牛二兩半微炒去末葶藶二兩炒香別研椒目一兩炒香木香上為末每服以蔥白三莖漿水一盞煎至半盞入酒半盞調藥末三錢絕早面向東服本事方云服藥後如人行十里久用漿水蔥白煮稀粥至蔥爛入酒五合熱啜須一升許不得吃鹽並面自早至午當利小便三四升或大便利喘定腫減七分隔日再服既平之後必須大將息及斷鹽忌房室等二年一方無木香木香湯出聖濟總錄治十種水腫氣木香陳橘皮焙湯浸去白白朮桑根白皮炙銼桂去皮各半兩木通炒三分上粗搗篩別用牽牛子二兩於鐵銚內以紙襯手攪乘熱搗羅為末每服以前藥末三錢匕同牽牛末一錢半匕水一盞半煎至八分去滓五更溫服平明時吃冷生薑茶粥次用蕪荑桑根白皮各一分煮白羯羊肉半斤爛熟與吃檳榔丸出聖濟總錄治十種水氣防己檳榔煨銼郁李仁去皮尖各研炒三分葶藶二分上為末煉蜜丸如小豆大每服十丸空心服用後方葶藶湯下葶藶湯出聖濟總錄葶藶炒桑根白皮炙銼百合各一兩上粗搗篩每服三錢匕水一盞煎至六分去滓溫服日三以便利為度若鼓氣微結加甘遂一兩附己丸出聖濟總錄治十水定喘急防己陳橘皮湯浸去白焙大戟炒苦葶藶紙上炒各半兩上為末棗肉為丸如梧桐子大每服二十丸溫水下不拘時大戟芫花散出聖惠方治十種水病腫滿喘急不得臥大戟一兩微炒芫花一兩炒苦葫蘆二兩炒去子甜葶藶一兩炒上為細末每服一錢陳大麥面二錢水一盞煎至四分每日空心和滓溫服良久腹內作雷聲更飲熱茶投之使大小腸通利不過三服效胡椒丸出海上名方治十種水氣腳腫脹上氣喘滿巴豆十枚去皮膜心用竹紙數重出油盡為度頻換紙胡椒二百粒生用上為末醋糊為丸如綠豆大每日一丸淡薑湯下食後服實者日二服虛者一服如小便頻數為效服一兩月大效忌麵食咸物大忌濕面虛實丸出聖濟總錄治十種水氣滑石好白者二兩膩粉一兩上先搗研滑石令極細次入膩粉和勻熬木瓜濃汁成膏丸如綠豆大每服七丸五更空心溫米飲下日只一服至五七日覺腹攪痛小便多為效忌鹽一百日覺效便服補脾胃藥治水病瘥後常服此藥永不發方出聖惠方大麻仁二兩微炒研如膏黑豆三兩炒熟去皮上為末煉蜜和丸如梧桐子大每日服三十丸空腹粥飲下治十種水病腫滿喘促不得臥出聖惠方大戟一錢蕎麵二錢上件藥水和作餅子慢火燒令黃熟碾為末空心茶清調下一錢相次以大小腸利為度治十種水氣不瘥垂死出鮑氏方用青頭鴨一隻治如食法細切和米並五味煮令極熟成粥空腹食之治十種水病腫滿喘促不得臥出肘後方用螻蛄五枚干為末食前湯調服半錢匕至一錢匕小便通效又方用鯉魚一頭重一斤者煮熟取汁和冬瓜蔥白作羹食之效澤漆方出聖惠方治十種水氣用澤漆十斤於夏間採取嫩葉入酒一斗研成汁二斗於銀鍋內慢火熬如餳即止磁瓦器內收每日空心溫酒調下一茶匙以愈為度治十種水不瘥垂死出肘後方用羊肉半斤切粳米三合水三升蔥椒豉作粥食十水丸出楊氏家藏方治十種水氣四肢腫滿面目虛以手按之少時方起喘急不得安臥小便赤澀遠志去心石菖蒲一寸九節者椒目炒羌活去蘆頭巴戟肉豆蔻麵裹煨六味各一兩澤瀉甜葶藶研炒黃木豬苓去皮白牽牛炒黃各半兩上件為末麵糊為丸如梧桐子大每服二十丸加至三十丸溫米飲送下空心食前服冬瓜丸出楊氏家藏方治十種水氣浮腫喘滿大冬瓜一枚先於頭上切一孔取中間瓤不用以赤小豆水淘淨填滿冬瓜中再用蓋片合定用竹籤簽定以麻線繫牢紙筋黃泥通身固濟陰乾用糯米二升取糠片兩大蘿鉗冬瓜在內以火炙著糠內煨之俟火氣盡取出冬瓜刮泥令盡薄切片子並豆焙乾上為末煮麵糊為丸如梧桐子大每服五十丸煎冬瓜子湯送下不拘時候小便利為度商陸散出楊氏家藏方治十種水氣取水商陸根取自然汁一盞甘遂末一錢上用土狗一枚自死者細研同調上藥只作一服空心服日午水下忌食鹽一百日忌食甘草三日制綠豆出朱氏集成綠豆二合半水三碗半入瓷器內煮候乾熟大附子一雙去皮臍作切兩片用上取出乘熟空心只吃綠豆其附子留住次日將附子兩片一併用綠豆二合半水三碗半同煮乾熟乘熱空心吃綠豆第三日再別用附子綠豆二合半如前法度服之又第四日亦如前第二日法度服之每一日臨臥時吃豆但依此法服四日其水從小便下腫自消退如未退仍以前藥服之忌生冷毒物鹽酒六十日無不效者治十種水氣方大戟芫花甘遂續隨子大黃牽牛末各一兩肉果二錢硇砂一錢上為散子作三服水調下或作丸子未消再服忌房事又方治十種水氣並根源證狀方法出存仁方一青水先從左右肋腫起根在肝大戟炒黃二赤水從舌根腫起根在心葶藶隔紙炒三黃水從腹腫起根在脾甘遂炒黃四白水從腳腫起根在肺藁本五黑水從陰腫起根在腎連翹六玄水從面腫起根在外腎芫花醋煮炒七風水從四肢腫起根在胃澤瀉八石水從腎腫起根在膀胱桑白皮九皮水從腹滿腫起根在小腸巴豆去油盡十氣水或盛或衰根在腹赤小豆上十種水病各有根苗種種不同看十種病根除一味將九味等分遂制者依法修合為末煉蜜為丸如梧桐子大每服二十丸赤茯苓湯下不拘時候日三服忌鹽一百二十日及魚鮓麵食一切毒物忌房事此病去生甚遠取死將近甚勿忽湧水附論夫內經言肺移寒於腎為湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水然也夫腎為肺之子而注水大腸為肺之腑而為傳道之官肺受寒邪宜傳入腎皆受寒邪則水閉鬱而不流且無所歸故客於大腸而不下夫水本流下今乃壅於大腸不得宣通宜其滿溢如囊裹漿也旋覆花丸出聖濟總錄治湧水腹中動鳴作水聲兼治痰飲肋脹滿旋覆花桂心去粗皮枳實去瓤麩炒人參各一兩一錢乾薑炮芍藥白朮一兩半赤茯苓去黑皮三兩烏頭炮去皮臍狼毒礬石各三兩細辛去蘆頭土焙大黃炒黃芩去黑心葶藶隔紙炒厚朴去粗皮吳茱萸炒湯浸芫花炒焦醋浸半日陳橘皮焙各一兩去白甘遂炒三分上為末煉蜜丸梧桐子大每服五丸酒下二日不知稍加丸數以知為度大黃附子丸出聖濟總錄治湧水腹滿大黃炒銼旋覆花附子炮去皮臍赤茯苓去黑皮椒目桂心去皮芫花炒焦醋浸狼毒乾薑炮芍藥枳實炒細辛去苗葉各二兩上為末煉蜜丸梧桐子大每服三丸熟水下漸增之早晚食前臨臥各一服豬苓丸出聖濟總錄治湧水豬苓去皮三分牽牛炒一兩葶藶炒半兩桑根白皮一兩赤小豆炒半合郁李仁去皮炒湯浸防己各二兩大腹皮三個去皮生薑焙一兩上為末煉蜜丸如小豆大每服十五丸米湯下未效加至二十丸日三葶藶丸治湧水腹滿不堅疾行則濯濯有聲葶藶炒澤瀉各一兩豬苓去皮椒目桑根白皮杏仁去皮尖雙仁麩炒大戟炒甘遂炒大黃炒黃芩各一兩去黑心芫花炒焦一兩酒浸蕘花半兩上㕮咀如麻豆大每服五錢匕水一盞煎七分早晚食前溫服以利為度檳榔丸治湧水檳榔牽牛子炒赤小豆炒郁李仁炒湯浸去皮桑根白皮銼肉豆蔻去殼杏仁去皮尖雙仁麩炒各一兩上為末煉蜜丸小豆大每服十丸以溫水下日再豬苓飲專治湧水小便澀臥即喘急豬苓去皮桑根白皮炒防己百合郁李仁各一兩半研瞿麥一兩木通二兩銼上粗搗篩每服三錢匕水一盞半煎至一盞去滓食前溫服如人行五里再服通草飲專治湧水腸鳴腹大木通二兩銼桑根白皮炒石葦去毛赤茯苓去皮防己澤瀉各一兩半大腹皮炮四枚上粗搗篩每服三錢匕水一盞半煎至一盞去滓食前溫服如人行五里再服海蛤湯專治湧水海蛤紫菀去苗土遠志去心各一兩大戟木香防己各半兩上粗搗篩每服二錢匕水一盞半煎至八分熱服若取下惡水即以白粥補之禁鹽一百二十日再不得服芫花甘遂藥商陸丸專治湧水及諸般水腫商陸一斤焙陳橘皮二兩湯浸焙木香一兩赤小豆面四兩上為末以汲水和丸如綠豆大每服二十丸橘皮湯下椒目丸一名防己丸治湧水腹滿腸間有水聲葶藶丸出聖濟總錄治湧水腹滿小便難葶藶炒一兩半滑石二兩杏仁湯浸去皮尖雙仁二兩半研上為末棗肉和丸梧桐子大食前木通湯下十丸日二服蓖麻單方出聖濟方治湧水心下如數升油囊濯濯作聲日不用食但欲飲水久則成瘕用蓖麻子去皮二十枚服如上法以病盡為度五日內只吃白糜粥
