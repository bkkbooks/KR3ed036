引胸腹脹霍亂用黃龍膝切一升黃龍膝者樟木膝也斷切以氣從里冒出者好也以水四升煮取八合為一服一劑不止更服一劑良驗或宿食不消霍亂或乾霍亂或吐利不止或不吐利並悉療之療霍亂轉筋及四肢已冷強氣絕心上微暖者猶可救之用硃砂二兩熟研蠟三兩和之為丸待冷著火籠中如熏衣被厚覆勿令煙泄兼床下著火令微微暖徹良久當汗則漸氣通便活忌生血物近效療腳轉筋及渾身轉筋用暖水稍熱於浴斛中坐浸須臾便瘥如湯沃雪又方治霍亂轉筋不止用芥菜子不拘多少擂細水調敷臍上又方治腳轉筋用獨頭蒜一個嚼一半於患處腳上猛搽一半用水送下一時立效治轉筋方出肘後方用燒鐵令赤以灼踵白肉際上近後當從鐵以隨足為留停令成瘡兩足皆爾須臾間熱入腹不復轉筋便愈可脫刀燒蝦尾用之即瘥又方出肘後方用燒蜈蚣膏敷之即瘥又方出聖惠方用橘皮二兩湯浸去白穰焙以醋漿水一大盞煎至五分去滓服又方出聖惠方用釜底墨末暖酒調下二錢頻服之又方出聖惠方用釅醋和米粉摩塗轉筋處三二升煎五七沸看緊慢令換之治腳轉筋方出聖惠方用木瓜一兩以酒一升煎三七沸溫酒服之治霍亂轉筋出聖惠方用木瓜楂子煮汁食之與木瓜切稍等余無有益江外常為果食人參散出廣南四時攝生論治霍亂吐逆及痢並腳轉筋人參去蘆頭於白朮木瓜乾者各一兩姜炮半兩上為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候溫服木瓜散出聖惠方治霍亂吐利轉筋心膈煩悶木瓜乾者桂心各一兩草豆蔻半兩去皮上為散每服三錢水一中盞煎至六分去滓不計時候溫服又方出聖惠方扁豆五十粒木瓜一分皂莢子十枚上炒黃為散以水一大盞煎至五分去滓頓服立效治卒轉筋出醫方集成以香薷煮汁頓服半升止治霍亂轉筋入腹無可奈何者出醫方大成用醋煮青布拓之冷即易治躄筋急出本草用白酒煎桂塗之治霍亂轉筋用山梔子二枚燒灰為末水調服之廣濟療轉筋方出本草取故綿多取釅醋甑中蒸及熱用裹病人腳冷更易又方出聖惠方治霍亂轉筋不止上燒編薦索灰研三指撮以熱酒調服之瘥治肝虛轉筋出肘後方用赤蓼莖葉切三合水一盞酒三合煎至四合去滓溫分二服治霍亂腳轉筋出本草用吳茱萸和艾以醋湯拌塗之妙治霍亂轉筋出本草取蓼子一把去兩頭以水二升半煮升半頓服之治霍亂轉筋出本草多取蓼煮湯及熱以腳浸之治霍亂轉筋出本草以鹽一升水一升半作湯漬之治霍亂轉筋出本草以榲桲煮汁飲之主霍亂身冷轉筋於床下取廁籌燒取熱氣徹上治霍亂轉筋出本草以新研粟米清水和濾取汁服之腹胃冷者不宜多服治霍亂手足轉筋出本草以銅器或瓦器盛熱湯熨之亦可令蹋器使腳底熱徹亦可以湯拓之冷則易用醋煮湯更良煮蓼子及吳茱萸汁亦好以綿絮及破氈腳湯淋之貴在熱徹治腳轉筋兼暴風通身冰冷如癱瘓者出本草取蠟半斤以舊帛綿絹並得約五六寸所患大小加減闊狹先銷蠟塗於帛上看冷熱但不過燒即便乘熱纏腳仍須當腳心便著襪裹腳得冷即更易之亦治心燥驚悸如覺是風毒兼裹兩手心治腳膝筋急痛出本草以木瓜煮令爛研作漿粥樣用裹痛處冷即易一宿三五度熱裹便瘥煮木瓜時入一半酒同煮之導引法治轉筋不止者出千金方男子則以手挽其陰牽之女子則挽其鬢髮左右邊灸霍亂附論夫霍亂灸之或雖未能立瘥終無死憂不可逆灸或但先腹痛或先下後吐當隨病狀灸之法治先心痛及先吐者出肘後方灸巨闕七壯在心下一寸不效更灸如前數外臺秘要療下痢不止上氣灸五十壯灸巨闕治吐下不禁兩手陰陽脈俱疾數者灸心厭骨下三寸又灸臍下三寸各六七十壯治下痢者灸谷門三七壯在臍旁二寸男左女右一名大腸募不瘥更灸如前數甲乙針經天樞一名長溪一名谷門夾臍兩旁各二寸陷者中治下痢不止者出肘後方灸大敦七壯在足大指本節後內側白肉際治先腹痛者灸太倉二七壯穴在心厭下四寸臍上一寸不止更灸前數治苦繞臍痛急灸臍下三寸二七壯名關元良療霍亂心腹痛脹吐痢煩悶不止則宜灸之令病人覆臥伸兩擘膊著手則以小繩正當兩肘骨尖頭從背上量度當脊骨中間繩下點之去度又以繩度病人口至兩吻截斷便中折之則以度向所點背下兩邊各依度長短點之三處一時下火灸便絕定神驗艾炷火稍加也治泄痢所傷煩欲死者灸慈宮三七壯柱橫骨兩邊各二寸半橫骨在橫臍下橫門骨是轉筋在兩臂及胸中者灸手掌白肉際七壯及灸膻中中府巨關胃管尺澤並治筋拘頭及足背愈灼艾法出仁存方治霍亂轉筋欲死絕惟腹中有暖氣者灸承筋七壯取繩量圍足從趾至跟匝捻取等折一半以度令一頭至跟踏地處引繩上至度頭即是穴起死人又以鹽納臍中令實就鹽上灸二七壯一方灸氣海穴臍下一寸半二七壯妙療霍亂神秘起死出濟生方用物橫度病人口中屈之從心鳩尾度以下頭五壯橫度左右復灸五壯此三處並當先灸中央畢更橫度左右也又灸脊上以物圍令正當心厭又夾脊左右一寸各七壯是腹背各灸三處療霍亂已死上屋喚魂者又以諸療皆至而猶不瘥捧病人覆臥之伸臂對以繩度兩肘尖頭依繩下夾背脊大骨穴中去脊各一寸灸之百壯無不活者所謂針灸法此最善已試數百人皆灸即起坐或以此術傳其子孫世世皆稱之療手足逆冷者灸三陰交穴在足內踝直上三寸臁骨際陷中左右七壯不瘥更灸如前數治手足逆冷出肘後方灸大指上爪甲際七壯治乾嘔者灸間使各七壯在手腕後三寸兩筋間不瘥更灸之治乾嘔者灸心主各七壯在掌腕上約紋中吐不止更灸如前數療苦煩悶脹滿灸心厭下三寸七壯名胃管治轉筋四逆灸兩乳根黑白際各一壯外臺秘要灸兩乳邊連黑外近腋白肉際各七壯可至二七壯療吐下痢者治走哺轉筋灸踵踝白肉際各三七壯及灸小腹下橫骨中央如前數治轉筋灸湧泉六七壯在足心下當拇趾大筋上又灸足大趾下約中一壯治轉筋不止灸足踵聚筋上白肉際七壯立愈治筋入腹痛欲死出肘後方四人持手足灸臍上一寸十四壯身不動勿復傷之又灸股里大筋去一寸一分半臍左邊二寸治霍亂轉筋令病人合面並臥伸兩手著身以繩橫量兩肘尖頭依繩下夾脊骨兩邊相去各一寸半灸一百壯無不瘥主霍亂腳轉筋及入腹以手拗所患腳大拇趾灸當腳心下急筋上七壯療霍亂轉筋不止漸欲入腹凡轉筋能殺人起死之法無過於灸灸法惟三處要穴第一承筋穴在腳腨下際取穴法以繩從腳心下度至腳踵便截斷度則回此度從腳踵還量向上盡度頭當腨下際宛宛中是穴灸三七壯則定又不止則灸湧泉在足心下當足大指中節後一寸半正當大筋上是穴又灸足跟後黑白肉交際當中央此三處要穴灸之不過二三七壯必定療轉筋在兩臂苦胸脅者灸手掌白肉際七壯療轉筋十指筋攣急不得屈伸灸手踝骨上七壯良扁鵲療筋脛骨痛不可忍灸屈膝下臁橫筋上三壯腹腸轉筋灸臍上一寸十四壯痧證附論夫痧證之病蓋江南舊無今皆有之原其證古有不載所感如傷寒頭痛嘔惡渾身壯熱手足指末微厥或腹痛悶亂須臾能殺人宜先濃煎艾湯試之如吐即是方艾湯方出仁存方用五月蠶蛻紙碎煎安碗中以碟蓋之以百沸湯泡艾碗許仍以引紙封裹縫良久乘熱飲之就臥即愈又方出危氏方近時只看頭額上胸前兩邊有小紅點在於皮膚者用紙捻成條或大燈草微蘸香油燈上點燒於紅點上焌爆者是又名水傷寒用樟木煎湯服或蔥豉湯汗出愈如腹痛不止又用針於兩手十指近甲稍針出血即愈又法出危氏方治痧證用苧麻蘸水於頸項兩肘及臂兩膝腕等處戛掠見得血凝皮膚中紅點如粟粒狀然後蓋覆衣被吃少粥或蔥豉湯清油蔥茶得汗即愈使皮膚腠理開發鬆利誠不藥之良法也又法出危氏方兩足墜痛亦名水渡於兩腳曲膝內兩筋兩骨間刺出血愈名委中穴絞腸痧方有一證心腹絞痛冷汗出悶脹欲絕俗謂攪腸痧今考之此證乃名乾霍亂而致此亦由山嵐瘴氣或因飢飽失時陰陽暴亂而致急用鹽湯吐法此法救人不一用鹽半盞以熱湯數碗泡鹽令患人盡服連至數碗不住手方可卻以雞羽掃咽喉間即時吐所吃鹽湯盡出其證即愈又方出醫方集成治絞腸痧證手足厥冷腹痛不可忍者用手蘸溫水於病者膝彎內拍打有紫黑點處以針刺去惡血即愈治絞腸痧痛不可忍或輾轉在地或起或臥其腸絞縮在腹此是中毒之深須臾令人死古方乾霍亂是也急用鹽一兩熱湯調灌入病人口中鹽氣一到腹其腹痛即定也又方用石沙炒令赤色冷水淬之良久一二合服之愈又方出經驗良方陳樟木陳艾陳壁土各等分上為細末水濃煎去滓連進三四服即安又方出經驗良方治心痛絞腸痧腹痛嘔吐泄瀉及霍亂中暑煩渴不省人事用馬糞研同蜜擂濾過新汲水下隨手即愈治絞腸痧痛者欲死可活用蠶生子連紙用手掌一片剪如錢大按於碗內上用一盞覆之然後將熱滾水一盞沿盞縫澆入去待少刻熱服立效又方用多飲艾湯亦可治絞腸痧其病身熱肚腹疼痛咽喉剌剌澀疼是也用礦灰一小塊為細末半盞服之立效治痧子絞腸病危急之甚用黑神散用童子小便調服如不止再調服立愈
