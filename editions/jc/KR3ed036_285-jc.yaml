body:
  text: 卷二百八十五癰疽門癰疽等瘡內消法附論夫治病必先求其本而後治其標癰疽諸瘡雖發於外而本乎中熱之所出始覺經絡壅滯氣血悶郁有瘡瘍之證則熱氣初作營衛未礙肌肉未腫腫而未腐之時特可疏滌風熱通導而去之逮其毒氣已結則不可論內消法恐熱毒不出反以內攻適所傷之先後遲速之用不可不審方黃連獨活散治背疽一切惡瘡初發腫甚者服三四服即消散羌活一錢半獨活五分防風五分藁本一錢半苦黃芩一錢半黃連五分當歸身三錢知母一錢酒浸洗生地黃一錢酒浸洗連翹三錢黃耆一錢半防風梢半錢酒浸洗人參五分陳皮五分蘇木五分甘草身一錢一分半用根足炙黃柏一錢半當歸梢五分桔梗一錢澤瀉七分甘草梢半錢漢防己五分上㕮咀只作一服水一碗煎至五分入好酒半盞臨臥服滓再煎節續服即瘥寒水石膏治一切癰疽發背熱毒猛異攻肌肉赤色腫痛不可忍欲成膿及已成膿並風毒熱在關節欲結成癰便令內消寒水石二兩羊蹄根一兩銼硝石一兩丁香三兩川大黃一兩白蘞三分木香三分附子三分去皮臍黃連一兩去須榆白皮三分銼莽草三分赤小豆一合漢防己一兩半夏三分玄參一兩甘草一兩生銼上為細散每用時以生蜜一合地黃汁一合旋調以成膏攤於生絹上貼干即易腫消為度小犀角丸治腸癰乳癰發背一切毒腫服之化為水巴豆二十二枚去皮膜必炒出油細研之大黃蒸焙一兩一分當歸去蘆一兩犀角三兩梔子去皮干蓼藍黃耆去苗升麻黃芩防風去蘆人參甘草炙各一兩上為細末入巴豆勻煉蜜搜和為丸如梧桐子大每服三丸溫湯下利三兩行吃冷粥止之不利加至四五丸初服取快利後漸減丸數取微溏泄為度老少以意加減腫消及和潤乃止利下黃水覺腫處微皺色變即是消後一切腫皆內消神驗不可論忌熱面蒜豬肉蘆筍魚海藻菘菜生冷黏食排膿內消散治癰疽發背活血排膿消毒紅腫內消何首烏一兩當歸川芎生地黃川續斷各洗焙芍藥白芷半夏曲藿香葉紫草茸甘草炙各三錢半茯苓半兩上粗末每服三錢新水二分酒一分薑棗煎服有熱者加燈心只用水煎服之內消散凡是癰疽皆宜服之人參甘草瞿麥各二兩赤小豆醋一升浸熬當歸豬苓黃芩各二兩白蘞薏苡仁黃耆各三兩防風一兩升麻四兩上下篩以酒服方寸匕日三夜二常服取瘥花蕊石散治癰疽始發未變膿令內消花蕊石火煅黃蜀葵花龍骨去土塗酥炙研鬱金銼胡粉烏賊魚骨去甲草龍膽去土梔子仁大黃銼各一兩上為散量多少以津唾調成稀膏敷之頻以唾潤日一易瞿麥散排膿止痛利小便從小便出毒氣瞿麥穗赤小豆當歸川芎白芷黃耆赤茯苓各半兩辣桂甘草各二錢半上末每二錢半酒調下乳香散治諸癰腫初發及火灼乳癰令內消乳香半兩水銀粉一分黃柏二兩半白芨一分白蘞鉛丹大黃各一兩上為細散水調貼之有膿時乾摻消毒散內消癰疽惡毒當歸白芷甘草生赤小豆紫草茸各半兩貝母三兩上為散每服三錢空心溫酒調下日再服內消托裡散治諸癰癤紅內消山蜈蚣天名精山慈菇甘草節各等分上為散每服三錢酒二盞煎取一盞服牽牛子散治一切癰疽瘡癤焮腫未穴先疏通臟腑牽牛子二兩一半生一半炒木香青橘皮湯浸去白焙陳曲炒各半兩上為末每服三錢匕五更初以生薑茶調下至天明通轉三兩行自止後以薤白粥補之鄭殿選方治癰疽發背七日前腫痛未潰者宜服則化膿血惡水自小腑中出其毒自消栝蔞一枚甘草三寸乳香大研皂角刺半兩去骨取皮上細末好酒三升銀石器內熬至二盞微溫兩次服大全內消散一名羚羊角散內消癰疽惡毒才覺便服亦治發背穿山甲截片以谷芒糠炒脆三兩當歸半兩甘草二錢半生上為末每三錢溫酒調下一方甘草根浸酒調下內消散治瘡腫久不愈皂角刺皮一兩為末乳香研二錢上為末和勻每服二錢匕酒一盞煎至七分溫服其毒內消或微利是效內消散一名小車螯散治發背癰疽腫毒痛苦不可忍者車螯一枚背上紫色光厚者是用黃泥裹定火煅通赤放冷去泥搗為末上一味以栝蔞一枚打碎用酒一碗於銀石鍋內慢火熬及一盞濾去滓入膩粉一錢匕同以酒調飯後服之取下如魚涎為驗內消散一名穿山甲散癰疽惡瘡方萌才覺便服及治血氣凝滯手足赤腫用穿山甲插入谷芒熱灰中候焦黃為末入麝隨意每服二錢半溫酒調下或栝蔞煎酒調下尤妙日進兩服治些小癰癤方結未成不可用膏藥貼宜以藥塗使自內消方取生鹿角尖於砂盆內同老米醋濃磨時以鵝翎塗拂於癰癤四圍當中留一口遇干再塗一二日即內消治癰癤方每覺有些小癰癤疼痛發熱時便用生粉草節不炙不焙隻日曬乾若無日於焙籠蓋上微火烘乾碾為細末以熱酒調三二錢服連進數服疼痛與熱俱止蠣粉散治一切癰腫未成膿者拔毒以牡蠣白者為細末水調塗干更塗或干貼效一方治軟癤用油調治一切癰腫未破疼痛令內消用生地黃杵如泥隨腫大小攤於布上摻木香末於中再攤地黃一重貼於腫上不過三五度漏蘆煮散治瘡癤癰腫內消方見千金漏蘆湯蠟礬丸治癰疽發背瘰癧漏瘡惡瘡衛護內膜驅解諸毒自然內消神效方見神仙黃礬丸木占斯散治癰疽已成膿水內消方見桔梗散內消丸治瘡腫初生及瘰癧結核熱毒鬱滯服之內消薄荷葉皂角不蛀者各半斤水煮軟牽牛半斤取頭末青皮陳皮各一兩沉香半兩廣朮泡三錢京三稜泡三錢上為細末並勻頭末用煎膏和丸如豆大每服三十丸煎連翹湯送下食後癰疽托裡法附論癰疽諸瘡氣血虛微肌肉寒冷膿汁清稀毒氣不出瘡久不合或聚腫不赤結硬無膿外證不見者並宜托裡邪氣外散膿汁早成毒有所泄而不內攻也方木香散治發背癰疽一切瘡腫托裡排膿木香黃耆細銼白蘞木占斯芎藭當歸切焙細辛去苗葉桔梗炒赤芍藥檳榔生銼敗醬甘草炙桂去粗皮羌活去蘆頭白芷各一兩上為細散每服二錢匕甘草煎酒調下空心午時日晚各一服以瘥為度內塞散治癰疽日漸焮長續斷人參芍藥熟地黃焙附子泡裂去皮臍枳殼去瓤麩炒甘草炙銼芎藭細辛去苗葉桂去粗皮各一兩檳榔銼一兩半黃耆銼當歸切焙各二兩肉蓯蓉切焙酒浸三分蜀椒去目併合口者炒出汗半兩上為散每服三錢匕空心溫酒調下日再服補虛助氣飲治諸癰疽疏轉後宜黃耆銼一兩人參白茯苓去黑皮甘草炙銼五味子芎藭獨活去蘆頭桂去粗皮青橘皮湯浸去白焙各一兩麥門冬去心焙當歸切焙杏仁去皮尖雙仁炒黃熟乾地黃焙各重一兩半上搗篩每服五錢匕水一盞半生薑三片棗二枚去核煎至八分去滓不拘時溫服托裡茯苓湯防風桔梗芍藥五味子川芎甘草熟地黃麥門冬去心桂去粗皮各一兩當歸黃耆茯苓各一兩半上為末每服五錢水一盞半煎至一盞去滓溫服內托營衛湯風木之性上衝顏必忿色其人多怒其瘡之色亦赫赤腫硬微帶黯色其瘡之形勢亦奮然高起結硬而作痛也其脈止在左手左手主表左寸外洪緩左關洪緩而弦是客邪在於血脈之上皮膚之間宜急發其汗而通其營衛則邪氣去矣黃耆半兩防風二錢連翹二錢羌活一錢甘草炙一錢黃芩一錢人參一錢當歸身一錢半蒼朮三錢紅花三錢桂枝五分柴胡二錢上㕮咀只作一服水酒各一大盞同煎至一盞溫服內托千金散治腦背癰疽乳便等惡瘡人參當歸黃耆芍藥川芎防風甘草栝蔞白芷官桂桔梗以上各三錢金銀花二錢上㕮咀每服須秤藥七八錢重水二大盞煎至七分入酒半盞去滓溫服如痛甚者倍加當歸芍藥或加乳香二錢日進三服一服之後瘡口內有黑血出者或遍身汗出皆藥之功效也如病勢猛惡須稱藥一兩水一大碗煎服未成膿者自散已成者不用針砭自透此藥累經功效內托散當歸芎藭黃耆厚朴去皮桔梗防風甘草炒官桂去皮人參白芷芍藥各一兩上為細末每服三錢溫酒調下或木香湯亦得此藥專治癰疽潰後內虛者或氣弱人初覺生瘡瘍亦可服內消宜詳細用之一方無芍藥加大黃焙除桂末另研將各藥慢火烘乾為末攤紙上出火毒然後將桂末拌和前藥調服御用托裡散當歸赤芍藥牡蠣大黃初覺者倍加火煨山梔子黃芩栝蔞皂角針金銀花朴硝連翹以各等分上為㕮咀末每服三錢水一大盞同煎至七分去粗渣服不拘時候治一切惡瘡發背疔癰疽等瘡初出者只一服便消去毒腫甚欲作膿者吃二服能消腫收膿散血毒止痛甚妙如神用黃耆甘草各五錢水煎服托裡黃耆湯治癰疽諸瘡潰後膿出多內虛亦治發背黃耆細銼白茯苓去黑皮桂去粗皮麥門冬去心焙當歸切焙人參遠志去心各一兩甘草炙錢半五味子一兩半上搗篩每服四錢匕水一盞半煎取一盞去滓溫服不計時候日二玉蕊托裡散黃耆四錢人參白芍藥當歸乳香熟地黃蓮花葉沒藥甘草各三兩上粗末每服七錢酒水各一盞同煎至七分去滓溫服渣再煎不拘時如有熱加連翹三錢托裡當歸湯當歸黃耆人參熟地黃川芎芍藥柴胡甘草炙各一兩上粗末每服五錢水一盞煎至六分去滓食前溫服托裡散治癰疽欲發未潰及已潰服之內托不使透膜栝蔞子去瓤稱鬼繫腰皮皂角刺射干即仙人掌根開紅花者是天羅瓜茴香漢椒各一兩木鱉五個去殼上焙乾為末麵糊調作餅炙乾為末每服二三錢酒調下不飲酒以木香湯調下托裡散川烏頭炮茯苓各三兩乾薑炮麻黃去節甘草各一兩半炙杏仁炒去皮尖五味子桂心各一兩上為粗末每服五六錢水一盞半煎至一盞去滓食前溫服托裡六倍散治癰疽黃耆細銼一兩如或膿多倍之赤小豆三分口乾倍之芎藭半兩若肉未生倍之栝蔞去皮三分小便不利倍之白蘞三分瘡口不合倍之當歸切焙一兩若痛倍之上為細散溫酒服三錢日三夜二凡癰疽大堅者未有膿半堅半有膿當上皮薄即有膿便可破之所破之法宜下逆上破之令膿易出膿深難見上肉厚宜火針之若外不別有膿可當上按之內便隱痛中央堅者未有膿按之更痛於前者已熟也內追毒丹清心解毒散大硃砂雄黃各五錢生麝香一錢生犀角琥珀以上並別研細黑角沉香各五錢上為末煉蜜丸梧桐子大每服二十丸燈心薄荷湯下黃耆茯苓湯治諸瘡潰後托裡除虛熱黃耆白茯苓官桂去皮麥門冬五味子川芎各一兩上為粗末每服五錢姜三片棗三枚水一盞半煎一盞去滓溫服食前日三服五香散治癰疽內攻五臟煩悶不安排膿托裡或似癰癤而非使人頭痛噁心寒熱諸熱毒腫痛結核沉香銼乳香研丁香木香藿香各一兩上為細散入乳香和勻先以清酒五升黃耆五兩寸截瓶內封閉浸一宿旋取一盞微溫調下一錢匕日三夜二不可犯鐵器一方水煎服無黃耆服候瘡出膿加當歸半兩保安湯治瘡托裡或已成者速潰栝蔞新者一個去皮火焙金銀花半兩沒藥通明者一錢研甘草生薑各半兩上為細末用好無灰酒三升於銀石器內煎至一升分作三盞三次飲盡病微者只一服如托裡藥不能發散必作瘡者用此黃耆托裡散托裡內虛止痛黃耆白茯苓各一兩甘草生二錢半乳香別研一錢半上末每服二錢酒小盞慢火煎如膏再添酒調服內虛加當歸托裡玄參散治托裡止渴解熱煩渴玄參人參甘草炙甘菊花各等分上為細末每服二錢綠豆湯調下亦名內托散托裡散栝蔞一個去皮生甘草一寸上銼細酒一盞煎至七分食後溫服生犀散托裡排膿以皂角針不計多少粗大紫色者藏瓶中鹽泥固濟炭火燒通存性放冷出碾為細末每服一錢薄酒微溫調下暑月陳米飲下神仙截法治癰疽發背一切惡瘡等預服此毒氣不內攻可保無虞以真麻油一斤銀器內煎熬數十沸傾出候冷用無灰酒兩碗浸油內約至五大盞許重湯溫稍熱通口急服一日盡之為妙感疾數日者亦宜急服之聞獵者云凡誤中藥箭急飲麻油則藥毒不行後果於西山親睹人被虎箭穿股者號叫不忍聞急以麻油灌之良久遂定此法傳授之於吳安世云吾家三世用之無不驗向又聞鄭學諭德甫云見渠尊人曾用之有驗故備錄之粉乳托裡散癰疽初發便服或毒氣入里衝心煩悶吃嘔嗽喘以至泄瀉急用此頻服托裡出毒氣自內發起於外此藥又能內消已發未發皆可服神效方見內托散內補防風散治諸瘡熱退膿不止托裡方見內補散托裡散消諸瘡毒疽疹發背腫毒等甘草一兩黃耆半兩桔梗半兩青橘皮半兩上為細末每服一錢水一盞煎三沸去滓溫服食後臨臥托裡連翹散柏葉半兩乾者黃耆一兩炙萱草根半兩乳香一分研甘草半兩連翹半兩上為末溫酒或米飲下一錢服不拘時癰疽大小便不通附論癰疽之人經絡壅閼氣血結聚營衛津液因以虧燥邪熱內鼓流注於大小腸氣不疏通故大小便俱不通治法宜通其閉塞導去邪毒使勢無深入穿通臟腑茲治之要法也夫發背大小便不通者由寒客於經絡血否澀則生熱蘊結成癰氣壅在腑臟熱入腸胃故令大小便不通也方玄參丸治發背及諸癰腫大小便不通心腹壅悶煩躁玄參一兩川升麻三分梔子仁半兩黃芩一兩黃耆三分銼川大黃二兩銼砂微炒沉香三分甘草半兩生銼藍葉半兩犀角屑三分木通三分銼連翹三分川芒硝二兩上為細末煉蜜和搗三二百杵丸如梧桐子大不計時候煎竹葉湯下三十丸以通利為度小麥湯治癰疽取利下後熱微退小便不利小麥三合人參甘草炙銼芍藥石膏碎黃耆細銼木通銼生乾地黃焙升麻黃芩去黑心前胡去蘆頭各半兩麥門冬去心焙三分上搗篩每服五錢用水一盞半入竹葉七片大棗三枚擘破同煎至一盞去滓空心溫服日晚再服蘧麥散治諸癰排膿止痛利大小便蘧麥赤芍藥各一兩黃耆銼當歸銼微炒各二兩桂心赤小豆微炒各一兩川大黃銼碎微炒滑石各二兩川朴硝二兩芎藭白蘞麥門冬去心各二兩上為細散每於食前以溫水調下三錢以利為度內疏黃連湯治嘔逆發熱而煩脈沉而實腫硬木悶而皮肉不變色根系深大病遠在內臟腑秘澀當急疏利之黃連山梔子芍藥當歸檳榔木香薄荷連翹黃芩桔梗甘草以上各一兩上為末每服一兩水一盞半煎至一盞次後加大黃一錢再服加二錢以利為度如覺無熱證大便不秘澀止用復煎散時時服之稍有熱證卻服黃連湯大便秘澀則加大黃如此內外皆通營衛和調經絡自不遏絕矣玄參丸治發背諸癰腫丹石藥毒頭痛壯熱大小便不利玄參一兩升麻梔子仁黃芩去黑心各半兩黃耆細銼三分大黃銼炒一兩半吳藍半兩犀角鎊屑三分木通銼二兩連翹三分朴硝研一兩半上先以十味為細末再同朴硝研勻煉蜜和丸梧桐子大每日空心米飲下十五丸如不利加至二十丸取快利三兩行為度瀉下膿化為黃水即瘥檳榔丸治癰腫發背一切惡瘡及乳癰結聚腫硬熱痛大小便秘澀檳榔一兩芎藭半兩羌活半兩川大黃二兩銼碎微炒羚羊角屑三分人參半兩去蘆頭枳殼三分麩炒微黃去瓤牽牛子二兩一半生一半微炒陳橘皮半兩湯浸去白瓤焙木香半兩上為細末煉蜜和搗三二百杵丸如梧桐子大每於食前以粥飲下三十丸以利為度木香丸治發背一切惡瘡及乳癰結聚腫硬熱痛臟腑餘毒閉塞可服通泄調氣解毒亦治石癰木香一兩檳榔生銼三分芎藭羌活去蘆頭各半兩大黃銼炒一兩附子炮製去皮臍人參各半兩枳殼麩炒去瓤三分牽牛一兩半炒半生陳橘皮湯去白焙半兩上為細末煉蜜為丸如梧桐子大以瓷合內盛之每日空心粥飲下三十丸通利一兩行如不利加至四十丸五十丸以通疏為度甚者夜臥時更服二十五丸蘧麥散治發背癰疽瘡腫大小便不通心腹壅悶蘧麥一兩滑石一兩半梔子仁一兩石韋一兩去毛玄參三分絡石一兩川大黃一兩銼碎微炒黃耆一兩銼紅雪二兩上為散每服四錢以水一中盞入蔥白二莖煎至六分去滓不計時溫服葵子散治發背腫硬疼痛大小便不通心神煩悶葵子二兩川芒硝二兩當歸一兩黃芩一兩木通一兩銼甘草半兩生銼麥門冬一兩去心羚羊角屑三分上為散每服四錢以水一中盞煎至六分去滓不計時候溫服木通散治癰疽臟腑氣壅大小便不通木通銼黃芩各一兩梔子仁三分漏蘆川大黃銼碎微炒木瓜根銼甘草炙微銼各一兩上為粗散每服三錢水一中盞煎至六分去滓不計時溫服以通利為度木通湯治發背癰疽及乳癰毒氣攻臟腑大小便不通木通銼黃芩去黑心各一兩山梔子去皮漏蘆根土瓜根大黃銼炒甘草炙銼各三分上搗篩每服五錢用水一盞半煎至一盞去滓下朴硝一錢再煎三兩沸空心溫服未利再服內消升麻湯治人年四十以前氣血盛多若患瘡疽大小便秘者一方治癰疽內消大黃升麻當歸黃芩去腐枳實炒去瓤一方用枳殼芍藥各二兩五錢甘草炙一兩半上㕮咀每服五錢水一盞半煎至七分去滓食前稍熱服大麻仁丸治發背及一切癰疽臟腑滯澀大小便不通大麻仁一兩半木香半兩枳殼一兩麩炒微黃去瓤甘草三分生銼川大黃銼焙一兩微黃牛蒡子一兩微炒上為末煉蜜和搗三二百杵丸如梧桐子大不計時候以溫水下三十丸通利為度山梔子湯治表裡俱熱三焦不通發背疽瘡及癰癤大小便不利山梔子仁十五枚大黃銼微炒二兩黃芩去黑心一兩半知母焙甘草炙銼各一兩上搗篩每服五錢用水一盞半煎至一盞去滓下芒硝一錢空心溫服日再大黃散治癰疽臟腑壅熱太過心神煩悶大小便不通川大黃銼碎微炒川升麻梔子仁川朴硝葵子各半兩上藥銼碎用水二大盞煎取一盞三分去滓分溫三服以快利為度芒硝散治發背大小便不通心神煩躁臍腹妨悶方川芒硝二兩川大黃一兩碎微炒梔子仁一兩甘草一兩生銼黃芩一兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服朴硝丸治癰疽瘡發大小便秘澀不通朴硝研大黃碎炒杏仁湯浸去皮尖雙仁炒研葶藶子微炒各二兩上先以三味為細末入朴硝和勻煉蜜為丸如梧桐子大每食後煎黃耆湯下二十丸以通利為度未利再服大黃湯治年未及四十氣血強壯苦癰疽無定大小便不通利及治發背上初於𤵜一名五利大黃湯大黃銼微炒升麻各二兩黃芩去黑心一兩梔子仁十枚去皮上搗篩每服五錢用水一盞半煎至八分去滓下芒硝一錢空心溫服快利三兩行為度未利再服一方甘草二兩炙內去芒硝導毒丹癰疽大便秘紫草栝蔞連皮上銼新水煎服或用黑豆一盞入生薑紫蘇煎湯亦得孫真人單煮大黃湯宣熱拔毒大便秘者方可用上用錦紋大黃酒浸去皮不以多少銼如麻豆大煮服快利此要法也諸癰疽大便秘方一方名獨聖湯治服金石炙爆飲酒房勞癰疽疼痛用甘草生一兩銼碎井水濃煎入酒調服能疏導惡物癰疽後補虛羸附論素問云形不足者溫之以氣精不足者補之以味大抵病瘡毒後焮熱痛楚心氣煩壅胸膈妨悶不能飲食所以患瘡毒人須藉飲食滋味以養其精以助其真不日可補安全經云牌為倉廩之官胃為水穀之海主養四旁須用調理進食為上不然則真元虛耗形體尫羸惡氣內攻最難調護可服茯苓開胃散人參內補散嘉禾散仍兼服五香加犀角人參黃耆湯排膿內補十宣散之類是也參苓順氣散亦宜服之方加味十全湯老人癰疽後補氣血進飲食不美用黃耆去叉蘆銼令二寸長捶匾以冷鹽湯溫潤蒸三次焙乾銼大地黃先洗焙乾以酒灑飯上蒸十次銼焙乾二味各一兩人參去蘆切焙川芎微焙大當歸去蘆酒洗切去頭尾留中焙乾白茯苓去皮切焙粉草炙白芍藥揀有皮者直刮去皮切焙桂心去粗皮淡者不見火切天台烏藥隆興者可橘紅去白白朮米泔浸半日切焙麩炒黃北五味子去梗微炒以上十一味各半兩上㕮咀每服一兩用水一碗生薑五片棗二枚同煎至八分碗去滓取清汁分作二服留滓曬乾碾為細末後常服再用薑棗煎服人參內補散芍藥黃芩去心茯苓去皮各三兩粉草一兩半炙桂心不見火人參去蘆各一兩麥門冬去心當歸酒浸去蘆焙熟地黃洗淨焙木香不見火各二兩上為細末每服二錢水一盞姜三片棗一枚煎至八分無時溫服薔薇丸治風濕體痛不能飲食兼癰疽後補虛羸薔薇根枸杞根各一百斤食蜜生地黃各十斤上㕮咀先以水煮二根令味濃取二斛去滓次內地黃煮令爛絞去滓微火煎令如粥次內蜜攪令相得每食後服如彈丸許將理法凡癰疽妄用惡草愈滋其毒不忌飲食反害其瘡皆非正法宜如後法將理避風邪少睡臥勿驚憂勿嗔怒徐行動省言語戒閨房絕思慮防觸穢聽好事瘡頻洗藥常助盥漱聞香二便順序擇飲食內充無飢飽失度敷藥運動屈伸瘡口常加愛護食法灸法熨法
