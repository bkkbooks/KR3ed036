body:
  text: 卷三百二金瘡門金刃所傷附論夫金刃所傷瘡有微甚生死所繫要在原經絡所在觀變動之形察微妙之脈昔人謂天窗眉角腦戶臂里跳脈髀內陰股兩乳上下心鳩尾小腸及五臟六腑腧皆不可傷此所謂原經絡所在也破腦出血戴眼直視不能語言咽中沸聲口急唾出兩手妄舉肌肉不生按之乾急或青黃汁出或瘡邊寒清內消臭敗或前出赤血後出黑血或血出不止白汁隨出此所謂觀變動之形也診其脈虛細小者生微緩者遲者生反此謂難愈此所謂察微妙之脈也三者兼得則治藥庶幾矣夫金瘡有久不瘥膿汁不絕肌肉不生者其瘡內有碎骨斷筋伏血腐肉缺刃竹刺久而不出者令瘡不愈喜出清汁當破出之瘡則愈矣治金瘡者無大小冬夏及始初傷血出便以石灰厚敷裹之既止痛又速愈無石灰灰亦可用若瘡甚深未宜速合者納少滑石令瘡不時合也方治金瘡白藥黃皮黃芩赤芍藥甘草木鱉去殼當歸生地黃黃耆黃連牡丹地骨皮桑白皮各一錢半白芷馬蓼梢葉生者一錢火煅過上桐油三兩煎焦黃色少停用疏生布濾去滓再煎油稍熱入細白版松香一片慢火煎須頻頻柳枝攪勻卻又入乳香沒藥虢丹各七錢煎數沸出火頃時以少綿敷於前濾藥滓布上濾過先用瓦缽滿盛清水八分將濾藥於缽水中卻去清水中如繃面狀繃三二百度愈繃愈白故名白藥常以清水浸俯於冷地上用物遮蓋勿令塵入五七日一換水刀斧一應金傷量傷孔大小取一塊填於傷孔中以白紙裹之隨手不痛日一換五日生肉筋斷加杜仲續斷各二錢同煎收瘡口加龍骨半錢碎了煎入藥內打損只敷於油紙上貼之即愈卻不須入接筋龍骨之劑治金瘡及些小出血出本草用通草煮汁釀酒飲之一方起了通草貼之血止瘡合草須以滑面貼瘡乃佳治金瘡傷折瘀血內損補筋肉消惡血出本草用質汗以酒消服之亦敷痛處治金瘡出本草用枸杞根去上浮粗皮一種近白者一種色微紫極薄陰乾末敷瘡有神驗如聖散治一切金刃傷及諸般傷損中風等疾蒼朮六兩米泔浸一宿雄黃三錢通明者生白朮一兩五錢川烏四兩炮裂去皮臍草烏一兩半同上浸兩頭尖不用白心者炮四兩細辛二兩半去土淨蠍梢五錢微炒川芎一兩半去蘆白芷一兩半防風二兩半去蘆上碾為細末如金刃箭傷先以藥末一錢重干貼傷口後用溫酒調一二錢服之仍以軟帛封裹瘡口腹破腸出先剪去指甲潤油於手上將腸款款納入以細桑白皮縫合瘡口然後敷上藥末溫酒調服二錢不可多服一切金刃傷並打撲損傷中風搐倒牙關緊閉以剪股揭開口溫酒調二錢灌下即愈再休服若再發則再服沒藥散出聖惠方治金瘡內損久不瘥沒藥乾薑炮裂銼密陀僧紅藍花子麒麟竭雌黃細研安息香當歸銼微炒各半兩墓里石灰一兩炒令黃豬膽三枚煅干上為末外貼一日一換內損溫酒調下一錢定痛乳香散專治金傷病證並折骨打撲傷損虎骨半兩酥炙穿山甲火炮炒些許乳香二錢沒藥二錢敗龜板一兩當歸鬚半兩紫金皮二兩半兩銅錢五個無自然銅火煉醋浸骨碎補半兩上為細末好酒調下每服一錢重病沉二錢重損上者食後服損下者食前服為妙王不留行散出金匱方治身有瘡被刀斧所傷王不留行十分八月八日採蒴藋細葉七分七月七日採桑東南枝白皮十分三月三日採甘草十八分川椒三分除白及閉口者炒出汗黃芩二分乾薑二分芍藥二分厚朴二分上桑根皮以上三味燒灰存性勿令灰過各別杵篩合制之為散服方寸匕小瘡即粉之大瘡但服之產後亦可服如風寒桑東枝勿取之前三物皆陰乾百日用生肌止血立效方出聖惠方治金瘡闢一切風冷續筋骨石灰二升搗生地黃青蒿汁和作團焙之令赤細研芎藭艾葉熬黃狗頭灰細研地松密陀僧各半兩黃丹一兩麒麟竭三分細研上為細末研勻密封之每有金瘡敷之如聖散治金瘡破傷風蛇蠍咬狗咬腫癤丹瘤諸疔發背搭手腦疽臁瘡湯火牙疼杖瘡雷頭風癩干風遍身麻木常服甚妙一切小血傷無口並皆治之川烏頭防風去蘆白芷各二兩川芎一兩二錢半草烏頭半兩細辛去苗土淨錢半蒼朮二兩去皮實者上俱不見火都生用曬乾研為細末敷之如金刃所傷初傷者藥到血定以帛片系定其瘡如日久不可去瘡口痂口噙漿水淨洗搵干貼三二次即愈如破傷初發時用藥一錢熱酒一盞不拘時調服用被蓋取汗為驗如病重每服一錢半如多時汗不出再加藥一錢依前取汗或涎出為驗如男子婦人洗頭感風疼痛用藥一錢溫酒調服汗出即愈太乙膏出聖惠方治金瘡箭鏃不問輕重以此敷之並治癰疽癤毒白芷乳香沒藥蒼朮白膠香石膏醋炒黃丹各五錢上為末用真清油四兩桐油真者亦可以黃蠟一兩先煎油柳枝攪次入白芷等四味煎少頃卻入膠香石膏黃丹得同煎試欲成珠卻入蠟同煎片時用生布濾過瓦器收藏用油單攤之損傷敷瘡口自然肉不痛速愈獺膽丸出聖惠方治金鏃去後瘡疼痛不可忍獺膽獖豬膽鯉魚膽各一枚為一處青黛栝蔞根沒藥各一分當歸半兩銼微炒上為末與膽汁研和令勻入瓷閤中盛收經七日後用之每用一丸如小豆大旋旋取紝在箭瘡內疼痛立止矣木香檳榔散出儒門事親治刀箭所傷木香檳榔黃連乳香輕粉密陀僧各等分上為細末乾摻之先以口噙漿水洗瘡敷一方加黃柏麝香乾薑散治聖惠方治一切金瘡止痛闢風乾薑甘草炙桂心各一兩當歸三兩芎藭四兩蜀椒三兩出汗上搗散以酒服方寸匕日三忌海藻菘菜生蔥又方出聖惠方治金瘡久不瘥宜敷白蘞黃芩艾葉各二兩狗頭骨灰五兩地松三兩石灰五合上搗篩為末粉瘡上立愈龍骨膏出危氏方治金瘡真龍骨海螵蛸五倍子赤石脂黃丹煅過或不用只使血竭尤佳石亭脂一方不用石亭脂只用麝上等分為末塗患處如傷大先以冷鹽水洗淨卻用黃桑生漿塗四圍待水乾皮斂即干敷若小傷只以冷鹽水略洗敷之密陀僧敷散出聖惠方治金瘡久不瘥諸藥未效密陀僧十兩黃丹一斤炒金紫色生肌草一斤白蘞半斤突厥白一兩石灰一斤炒上為細末以敷瘡上帛封勿令水濕鉛白霜散出儒門事親治刀箭所傷鉛白霜干胭脂寒水石各等分腦子白蘞輕粉各少許上為末乾摻患處當歸散出聖惠方治金瘡避風止痛方當歸半兩銼微黃川椒半兩去目微炒出汗揀去合口者澤瀉半兩附子一兩去皮臍炮川芎一兩上為末若金瘡有折瘀血用酒調下一錢日三服刀箭傷牛膽大灰不以多少白芨半兩乳香血竭各少許上用新牛膽內盛藥物窨干為末每用少許干貼不得犯婦人手開麒麟竭散治金瘡久不瘥傷筋骨疼痛不止麒麟竭三兩黃丹炒令紫色白蘞白芨各五兩葛布三尺燒灰上為細末於傷中處干敷之立效雄黃散治刀箭所傷雄黃乳香沒藥麝香少許上為末量瘡大小干貼治刀鐮所傷千人心香灰千人手門扉後塵千年土門檔土青龍蔥汁上捻和作一塊如有刀鐮所傷旋割為末貼之治破血在心腹蘇木半兩南乳香沒藥各一錢生薑一塊長約二寸上捶破用瓦器以濕紙遮口不與走氣好酒慢火溫時服一盞金瘡藥白龍骨一兩密陀僧五錢千年石灰一兩大黃一兩作塊子燒灰了上上為細末干貼瘡口上急風散治久新諸瘡破傷中風項強背直腰反折口噤不語手足抽掣眼目上視喉中鋸聲及取箭頭方見諸風門破傷風類按原方丹砂一兩麝香一分研生烏頭同草烏一處為末一分草烏頭一兩一半生用一半以火燒存性以米醋內淬令冷上為細末和勻治剝馬驢傷手以熱雞血及熱浸之治中刀箭悶絕取蟕蠵刺血飲便瘥治刀斫箭所傷赤石脂白茯苓龍骨各一兩上為細末敷瘡口立愈刀箭藥石灰一斤多年者龍骨四兩刺薊一小束上為末杵作泥為餅子或為散貼患處端午日合尤良續斷骨治金瘡蜀續斷蛇含草防風各三兩上切以豬脂三斤於東向露灶煎之三上三下膏成去滓若深大瘡者但敷四邊未可使合若淺小瘡者俱通敷使相連能止血住痛亦可為丸以酒服之黑虎散治一切金傷黑狗頭一個豬牙皂角三個鹽梅五個上用香油十二兩同浸一宿前藥九炙九浸如煎有人唾浸投之炙油干存性研細為用黃柏散治寒濕金瘡舉發打撲傷損黃柏黃芩等分為末蘿蔔葉一握搗細如無用子亦可上為末以酸米醋調敷患處多多用藥干醋解之治金瘡木賊三兩麻黃去節一兩甘草七錢半上為末每服五錢熱酒調下先整骨了夾定飲之令醉排膿散枳實十六枚芍藥六分桔梗二分上為散取雞子黃一枚以藥散與黃柏等揉和令相得飲和服之日一服排膿湯甘草二兩桔梗三兩大棗十枚上㕮咀以水三升生薑一兩煮取一升溫服五合日再服新石灰散治金瘡止血除疼痛闢風續筋骨生肌肉新石灰二升青蒿切艾葉切各一斤上先搗青蒿艾葉絞取濃汁拌石灰令盡曝乾研入黃丹突厥白朮各三兩令勻封金瘡血止立效治刀瘡潰及合口神驗金瘡深者若以藥速合則潰宜用滑石四兩一方一兩黃丹一兩上同研細乾摻患處一名黃石膏玉真散一名神助散出楊氏家藏方治金刃傷打撲傷損及破傷風天南星防風各半兩上為細末摻上瘡口後以溫酒調下一錢如牙關緊身似弓用藥二錢童子小便調下但鬥毆內傷二錢調酒下傷欲死者童子小便灌下並進立效一方敷瘡口仍不作膿神驗又方五倍子燒灰存性燈草燒灰存性上共乳香為末敷傷處仍以帛子扎定檳榔散治金瘡黃丹散一名桃紅散出危氏方治金瘡並一切惡瘡上等黃丹欶石膏不以多少火煅通紅上研細和勻如桃花色摻傷處甚妙治金瘡定疼痛方以紫皂角針二兩用麥麩炒黃黑色碾為細末次入乳香沒藥末各半兩令勻每服二錢用酒調下神妙丸出朱氏集驗方以威靈仙根和烏豆焙乾為末酒麵糊丸空心下五十丸見效廣東馮師乾云渠當年腰下為金瘡所傷遇春則發痛入小腹有不可忍忽傳此方療之神妙治刀箭金瘡藥龍骨紫石英上為細末貼瘡上定血闢風治金瘡出危氏方黃柏半斤半夏四兩上為末每用半兩生薑半兩生地黃取自然汁調塗攧處如折斷用絹帛封縛次杉木皮扎定干則頻搽薑地黃汁潤之百草散一名備急百靈膏一名大效方出聖惠方治金瘡以五月五日平旦使四人出四方各於五里內採一方草木莖葉每種各半把勿令漏說一事日正午時細切碓搗並石灰極令爛熟一石草斷一斗石灰先鑿大實中桑樹令可受藥取藥納孔中實築令堅仍以桑樹皮蔽之以麻油搗石灰極黏密泥之令不泄氣又以桑皮纏之使牢至九月九日午時取出陰乾百日藥成搗之日曬令乾更搗絹篩貯之凡一切金瘡傷折出血登時以藥封裹治使牢勿令動轉不過十日即瘥不腫不膿不畏風若傷後數日始得藥須暖水洗令血出然後敷之此藥大驗平時無事宜多合以備倉卒金瘡之要無出於此雖突厥質汗黃柏末未能及之一方云採時不得回顧任意摘取方回入杵臼內爛搗如泥量藥多少以意入石灰和勻取出拍成膏日中曝乾遇用旋取捻碎若刀斧傷干敷取血止為度湯火傷冷水調開塗敷蛇蠍犬咬以溫水洗以津液調敷疥瘡先抓損以藥末干敷濕癬以醋調敷之其效如神紫金散出危氏方治金瘡中臟刀斧傷見血欲死者用紫膝香即降真香也刮末碾細敷之一方用花蕊石散朱氏集驗方云周崈班緣捕海寇被寇以提刀所傷血出不止分明筋如斷骨如折用花蕊石散掩之血不止痛不定有兵士李高言其在軍中被人傷中欲死見統領以藥掩之血止痛定明日瘡靨如鐵遂安又無瘢痕告統領祈此方只用紫膝香瓷刮下石碾碾細敷之又方出危氏方用門扉後塵敷之立瘥治刀傷斧斫方一名血竭散出百一選方用五倍子一味為末干貼瘡上效一方炒黑為細末摻瘡口妙亦名小血竭凡殺傷不透膜者用乳香沒藥各一皂角子大研爛以小便半盞好酒半盞同藥通口服然後用花蕊石散或烏賊魚骨或龍骨為末敷瘡口立止殺傷氣偶未絕取蔥白熱鍋炒熟便敷傷處頃即再易其痛自止但青葉亦可灰彈散出聖惠方治刀斧傷及多年惡瘡並金瘡止血用多年石灰細碾雞子清調成團煅過候冷再碾細若刀斧傷摻之患處若多年惡瘡以薑汁調敷一方單用石灰摻上患處裹定並瘥如無石灰灰亦可用治金瘡方用磁石厚朴白藥或槐花入沙鍋中泥固燒存性但得一味為末敷之立愈又方用新桑白皮松葉車前根葉並搗爛敷之刀斧傷用隔年四月苧葉揉令極軟覆在傷處縛定血止也鮮苧葉亦可又方以紫蘇研末敷之良治金瘡傷至重但不透膜者用海味中咸白鰾揀大片色白而有紅絲者成片鋪在傷處以帛子扎血止如膏脂出不傷內膜者即剃去傷人頂心發以熱熨斗不令傷人知於新剃頂上一燙膏脂即入以桑白皮線縫合用血結草木臘葉磁石為末干敷瘡上即合又方以五月五日採馬鞭草缺盆草血見愁擂爛同風化石灰為末合和候乾再為細末塗之即愈神仙刀箭藥妙不可言一名桑葉散取桑葉陰乾為末干貼如無旋熨乾末敷之一方用新桑葉研取白汁塗之能合金瘡治金瘡並一切惡瘡用雲母粉敷之絕妙治金刃所傷瘡若深未宜速合者用少滑石末敷之治人倉卒中金刃刮花乳石為末敷之亦效治金瘡用冬葵子葉燒灰及搗干葉末並取根搗敷之皆妙治療金瘡用苦芺五月五日採曝乾燒作灰水和服之甚驗一方春初採艾葉陰乾為餅用時入生薑汁服之良一方熟艾拓敷之治金瘡傷折瘀血用天南星根為末敷傷處治刀斧折傷及一切金瘡以白殭蠶不拘多少炒令黃色細研為末敷之立效又方用狼牙草莖葉熟搗敷之兼止血一方藎草根敷之又方用蛇蛻全搗敷之佳藍汁飲治金瘡治金刃初傷取生青蒿搗敷上以帛裹創血止即愈陽起石散治刀箭所傷用陽起石燒研末新水調塗腫病處白灰散治刀斧傷見血及惡瘡用石灰不以多少端午日午時取百草搗汁濾過和作餅子入韭菜汁調陰乾為末少許敷上搽少時血止便安五月五日取灰尤佳如腸潰出桑白皮線縫合罨之帛系定效一方用晚蠶砂生為末摻勻綿裹之瘡愈血止一方蘇木五倍子末封之吳內翰父少保守南雄州有刀傷人腸潰者以此藥治之全二人之命一方只用韭汁和石灰宜端午日合治刀斧傷磕搽及破傷風浮腫者用薑汁調平胃散敷塗若急卒只以生薑和皮爛搗罨患處止痛截血且無疤痕倉卒易得療金瘡方割氈方一寸燒灰研細以敷之瘥黑氈尤妙封裹勿動直待生肌杏仁方一名石灰膏用杏仁去皮尖搗如泥石灰等分以豬脂合之淹足合煎令杏仁黃絞去滓以塗瘡上日五六過愈一方亦主犬馬被金刃所傷並皆治之又方以蛇銜草搗敷之瘥晉異苑云昔有田父見蛇被傷又見蛇銜一草著其瘡上經日傷蛇乃去田父取其草以治瘡皆驗遂名曰蛇銜草又方出聖惠方用五月五日掘葛根曝乾搗末敷瘡上止血止痛又方出本草用釣樟根刮取屑敷瘡上神驗五月五日採又方燒牡蠣末敷之佳桑皮方出聖惠方治金瘡或壓損斷裂及金瘡血出不止者剝取新桑皮作線縫之又以新桑皮裹之以桑白汁塗之極驗小瘡但以桑皮裹即瘥又方出本草以桑白皮燒灰和馬糞塗瘡上立瘥治金瘡若驚瘡血復出及未愈而交接血湧出多死急以蒲黃敷之又方取所交婦人衣帶三寸燒灰末服亦以粉瘡灸手令熱以熨瘡上良若驚而腫者燒小鐵出灼瘡中不療則須臾殺之出肘後方治金瘡即瘥方出肘後方取生地松三四升搗如泥餅封瘡上無問大小即合神良治刀斧傷並磕破血出方用頭髮一兩皂角二兩皆燒存性為末加倒吊灰貼上即止又方刮杉條皮瓤貼之尤妙治刀箭傷出海上名方用香白芷爛嚼和生土敷之途成道者不可用治金瘡血出用胡椒末隨即摻之妙又方用海船縫內久年油灰碾碎摻之佳治刀刃傷用旱蓮子即水栝蔞以香油一處揉之敷瘡口上藥蛆方治金瘡內爛生蛆者出濟生拔粹方以皂礬飛過干貼其中即死治金瘡出千金方燒乾梅為炭搗末敷之一宿即瘥亦治打傷止血一作白梅干鹽梅亦可又方出千金方用麻葉三斤以水三升熟煮取二升半為一服又方出千金方取蚯蚓屎以水服方寸匕日三亦治金瘡煩悶治金瘡出百一選方用猴猻頭草黃花子如蒺藜骨䤪者一名草血竭用其子爛研或爛嚼敷傷處血立止治破血在心腹用薊葉焙乾摻瘡中亦止血治金瘡血痢用野豬脂碎銼以酒服之瘥胡堇草方治五臟榮衛肌肉皮膚中瘀血止疼痛散血用胡堇草絞汁塗金瘡上良糯米膏出聖濟總錄治金瘡用糯米三升揀去粳入米瓷盆內於端午前四十九日以冷水浸之一日兩度換水輕以水淘轉逼去水勿令攪碎浸至端午日取出陰乾生絹袋盛掛通風處旋取少許炒令焦黑碾為末冷水調如膏藥隨大小裹定瘡口外以絹帛包定更不要動直候瘡愈若金瘡誤犯生水瘡口作膿紅腫漸甚者急以藥膏裹定一二食久其腫處已消更不作膿直至瘡合若竹木簽刺者臨臥貼之明日看其刺出在藥內若金瘡及水毒不可換藥恐傷動瘡口治金瘡久不瘥出聖惠方以白楊木皮細銼熬令乾搗細為末每服以溫酒調下二錢日三四服治金瘡金傷皮肉裂開方用黃蠟熱酒溶化服之其口自合花蕊石散出和劑局方治一切金刃箭鏃傷中及打撲傷損貓狗咬傷或至死者應急於傷處摻藥其血化為黃水再摻藥便活更不疼痛如內損血入臟腑熱煎童子小便入酒少許調一大錢服之立效若牛抵腸出不損