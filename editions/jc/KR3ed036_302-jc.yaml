愈後必不仁亦致痛煩而終身不完至於小碎之骨即當出之不爾則膿血不絕肌亦不斂矣夫金瘡始傷之時半傷其筋榮衛不通其瘡難愈以後令不仁也若被創截斷諸解身軀肘中及腕膝髀若踝際亦可連續須在急及熱療之其血氣未寒碎骨不去令人痛煩膿血不絕日久不能得安諸中傷人臟者十死一生方續斷散治金瘡傷中筋骨續斷生地黃焙地榆芍藥蛇銜甘草炙銼當歸切焙芎藭附子炮裂去皮臍人參杜蘅各二兩乾薑炮一兩肉蓯蓉酒浸切焙二兩細辛去苗葉一兩桂去粗皮一兩半牡蠣煅研一兩一方無牡蠣蜀椒去目併合口者炒出汗半兩上為散每服二錢溫酒調下空腹日午夜臥各一服骨碎補丸治一切金刃傷及筋骨風冷所中疼痛骨碎補炙去毛三兩敗龜醋炙虎骨酒炙澤蘭葉白薇各一兩山芋一兩自然銅煅醋淬七次山茱萸桂去皮各一兩當歸切焙肉蓯蓉切焙三分熟乾地黃焙五味子乾薑炮各半兩白檳榔生銼附子炮裂去皮臍各一兩肉豆蔻去殼二枚上為末煉蜜丸如梧桐子大每服二十丸空心溫酒下欲作散每服一錢匕溫酒調下並空心日午臨臥服杜蘅散治金瘡筋骨斷令續杜蘅生乾地黃各二兩半蛇銜草地榆各二兩銼乾薑炮裂半兩川椒去目及合口煮令汗出桂心各半兩當歸銼微炒芎藭赤芍藥各一兩半肉蓯蓉酒浸一宿去粗皮炙乾用一兩半人參去蘆甘草炙微赤銼附子炮裂去皮臍各一兩上為細散每服不計時候以溫酒調下二錢葛葉散治金瘡續筋骨斂血止痛葛葉地松苗續斷石灰末旋覆花地黃生用益母草麥門冬去心各五兩上搗絞七味取汁和石灰調作餅子曝乾再搗為散敷所傷處麒麟竭散治刀箭傷筋斷骨止痛定血闢風麒麟竭白芨各半兩黃柏銼甘草炙微赤銼白芷白芍當歸銼微炒密陀僧各一兩上為細末每用時以少許乾摻瘡立效敗弩箭散即地黃散治金刃弓弩所中筋急不得屈伸敗弩箭燒作灰秦艽去苗洗淨土熟乾地黃焙各半兩附子焙裂去皮臍一兩大棗三枚取肉焙杜仲去粗皮炙各半兩當歸切焙一兩上七味搗羅為散每服二錢匕溫酒調下空腹日午夜臥各一服一方有續斷無大棗沒藥散治金瘡傷筋骨疼痛沒藥一兩當歸銼微炒地龍微炒自然銅細研各三分肉桂去粗皮川烏頭炮裂去皮臍乾薑炮裂以上各半兩上為細末每服不計時候以溫酒調下一錢地松苗散治金刃傷筋骨止血生肌地松苗石灰末旋覆苗葛葉青蒿苗麥門冬苗各五兩上除石灰外切碎搗絞取汁和石灰作餅子曝乾再搗羅為散敷瘡上五月五日合佳一方有益母苗骨碎補散治金瘡傷筋骨疼痛不可忍骨碎補去毛麩炒微黃自然銅細研虎脛骨塗酥炙令黃敗龜塗酥炙微黃各半兩沒藥一兩上為細末每服一錢以胡桃仁半個一處爛嚼用溫酒一中盞下之日三四服催潮散治針鐵箭頭等鋒刃氣入皮肉筋骨害人不能出天南星半夏生各一兩上為細末每服一錢熱酒調下先嚼生薑少許後嚼生薑少許以滓窨曲廉檳榔散治金瘡捽筋破骨並血不止檳榔銼黃連去須並生用上等分搗羅為散干敷之瘡上如瘡口乾用香油潤瘡口摻藥瘡上續骨妙方用馬蘭草花葉去根以五月五日採取陰乾為細末酒調服立效治金瘡續筋骨又方出肘後方用石灰細篩以麻油和之作丸如栝蔞許大以炭火燒赤放冷搗篩為末又以油和燒凡如此十遍為細散敷瘡神效又方出聖濟總錄取葵菜根爛搗敷之立瘥治金瘡續筋斷骨令還續方出聖惠方多取蟹頭黃及腦並足中肉熬末納瘡內治傷斷筋骨續筋方出聖惠方取旋覆根搗汁滴瘡中仍用渣敷瘡上封之十五日即筋骨便續更不用易金刃腸出附論夫金刃所傷有腸出者有腸出已斷者視其輕重之證可決死生腸有一頭見者不可續也若腹痛不可忍短氣不能食近則一日遠則三日治無及矣腸有兩頭見者可速以桑白皮挼為線或以麻縷續之仍取雞血塗隙勿令氣泄推納之更以前線縷綴縫瘡口亦以雞血塗之腸有出而不斷者當以大麥粥取其汁洗腸而內之綴縫瘡口如前法然後作研米粥飲二十餘日稍作強糜百日後始得飯食不可飽飽則腸痛宜常以湯飲助之被傷肚皮俱破腸出在外只腸全斷難醫傷破者不斷皆可治療腸及肚皮破者用花蕊石散敷之線上輕用手從上縫之莫待糞出用油捻活放入肚內肚皮裂開用麻縷為線或捶桑白皮為線亦用花蕊石散敷線上須用從里重縫肚皮不可縫外重皮留外皮開用藥摻待生肉如傷孔大肚腸與脂膏出放入內則用縫如孔小隻有膏出先用清心藥與服用手擘去膏不用縫此膏出者已無用了不可復入肚中反成禍只須擘去不妨此是閒肉但放心去之肚肉被傷者專用退利大小腸不可待秘恐成重患方磁石散出聖惠方治金瘡腸出宜入之磁石煅研滑石研鐵精各二兩上等分同研細末每服一錢匕以溫酒調下空腹日午晚間各一服夜臥二服及以針砂塗腸上其腸自收入一方用白米飲服一方無鐵精治金瘡腸出方出聖惠方取人屎干為末以粉腸即入若腸干取濃麵漿濕腸上即入以冷水噀而令吸氣即易入治被傷腸出不斷出欲燥而草土腸著出聖惠方作大麥粥取汁洗腸推納之常研米粥飲之二十日稍稍作強糜百日後乃可瘥草土當踧在皮外乃以干馬矢敷瘡上治金瘡中腸出不能入者出聖濟總錄以小麥三升用水九升煮取五升絹濾過候冷含噴瘡上漸入以冷水噴其背不宜多令人見亦不欲令傍人語又不可令病人知或尚未入取病人臥席四角令病人舉身搖須臾腸自入十日內食不可飽頻食而少勿使病人驚則殺人縫金瘡腸出者方見桑皮方又方出本草治金瘡腸出者以桑白皮作線縫之更以熱雞血塗上立愈唐安藏剖腹用此法效毒箭所傷附論夫箭鏃毒藥入皮膚肌肉間令人短氣悶絕口噤唇乾血雖止而腹痛不能言其人如醉者為難治若瘀血應時出其瘡溫而熱間能言則可治也巢氏論毒箭有三種曰嶺南夷俚用焦銅作箭鏃次嶺北諸處以蛇蟲毒熬物汁著管中漬箭鏃及有以草藥為之者三種傷人皆不易治唯急飲糞汁可以御其毒小緩則毒氣深入不可救也方梨母子煎出聖惠方中毒箭後皮內瘀腫方梨母子一斤去核爛研鹽面搗之曝乾再搗用絹羅之去滓瀆子五兩一作鹽麩子綠豆三兩炒熟不灰木三兩以牛糞火燒赤藍子五兩黃連三兩獨棵慄三兩生用黑豆三兩炒熟大糞燒五兩赤芍藥二兩上為末煉蜜為膏每一匙溫酒下日三四服一方加甘草銼生用治毒箭及馬汗方不灰木散出聖惠方不灰木二兩以牛糞火燒令赤色密陀僧一兩黃柏半兩銼膩粉一分麝香一分上為末鹽水洗患處敷搽日一換之雄黃散出聖濟總錄治藥毒箭頭在身未出雄黃細研一分粉霜半兩研蜣螂四枚為末生用巴豆三粒去殼別研為末生用上再同研為散以銅箸頭取乳汁調點瘡上頻頻用之七日瘡熱箭頭自出解毒雄黃散出聖惠方療毒箭所傷雄黃細研大麻仁微炒各一分蘆根半兩銼白蘞半兩上為細末每服以溫酒調下一錢日四五服治中射罔箭藍子散出聖惠方藍子五合升麻八兩王不留行甘草各四兩上制下篩冷水服二方寸匕日三夜二又以水和塗瘡干易之治中毒箭方一名蘆根散出聖惠方蘆根一兩藍葉一兩紫檀半兩不灰木二兩以牛糞火燒令赤色為末上為末每用一錢以薑汁調下粥飲一服不拘時候乾薑散出肘後方治毒箭乾薑末一作乾葛末鹽上等分再同研勻敷瘡上毒自出藍汁飲出聖惠方治毒箭所中搗藍汁一升飲之並以敷瘡上若無藍取青布漬絞汁服之並淋瘡中鏃不出搗死鼠肝塗之鼠腦亦得用之即出又方出聖惠方煎地黃汁作丸以熱水服之百日箭出或作膏調服亦得葛根飲治毒箭所中貝子散出聖濟總錄用貝子搗羅為末每服一錢匕溫酒調下不拘時候日三四服此方治中毒並治金瘡止痛又方出聖惠方取雄黃末敷瘡上日四五度汁出便愈治毒蛇咬瘡亦妙又方出聖惠方取蘆根自然汁每服半盞許日二夜一一方飲藕汁唯多為妙蘆根煮汁亦可一方貝齒末服一錢匕大良甘草飲出聖濟總錄治毒箭用甘草三兩細銼用水二升煎取一升絞汁每服一小盞溫飲日三服仍淋瘡上生薑飲出肘後方治毒箭用生薑半斤切研如泥取自然汁飲五分一盞未退再服更無疤痕一方煮薑汁飲三二升甚佳旋覆散出聖濟總錄治毒箭用旋覆根不拘多少搗為散每服二錢匕以溫酒調下日三服不拘時候仍用敷瘡中若無根花並子亦可用治毒箭所傷煩亂欲絕出肘後方用大麻子三升搗取自然汁每服半盞來日再服秦龜飲治俚人毒箭傷用秦龜血飲之良治卒被毒箭及金瘡方出千金方用麻蕡仁數升杵飲汁瘥又方出肘後方煮藕取汁飲之飲多益良療毒箭方出千金方以鹽鋪瘡中灸鹽上三十壯一方多飲豬血良治毒箭及馬汗方用大虻蟲於端午日收之陰乾為末每服一錢挑破瘡口敷之後以醋糊膏子貼之即追出毒治卒被毒箭中人才破肉爛者即便死人飲人糞汁以糞塗瘡上良治著藥弩藥箭用曲蟮泥為末搗豆豉和勻為丸桐子大每服五十丸隨傷上下用五六服一月安治毒箭所傷出本草以菩薩石為末敷之良治中藥箭方出本草交廣夷俚人用焦銅作箭嶺北諸處以蛇蟲毒熬物汁著管中漬箭鏃此二種才傷皮便漬膿沸爛而死若中之者以飲月水屎汁並以敷之亦可惟此最妙治毒箭鏃及深山大蝮中人出本草速取病者當頂上十字𠢐之令皮斷出血以芍藥末瘡上並敷所傷處其毒必攻上下泄之當出黃汁數升則悶解治毒箭蟲蛇咬出本草以芋麻根搗汁塗之治毒箭出本草以薺苨搗罨之治毒箭出本草以芋葉罨敷之一方用生芋同鹽研細敷之解藥箭毒出本草用鵝抱篩末以酒調服之有效箭鏃金刃入肉附論夫凡箭鏃金刃入肉治宜速出之或有碎一日亦須去盡然後塗敷諸藥不然其瘡必不合縱後少愈亦常作疼痛若神驚血亂氣奪則死矣方續斷膏一名當歸續斷膏出聖濟總錄治箭頭入肉赤腫僻風斂瘡當歸續斷骨碎補桂去粗皮附子澤蘭芍藥白芨牛膝羌活芎藭木香麒麟竭生乾地黃白殭蠶白附子各一兩沉香丁香各半兩栝蔞二枚大者烏蛇肉白蘞白芷玄參各一兩杏仁桃仁各三分上細銼入麻油四斤豬脂一斤驢脂三兩用文武火煎三日濾去諸藥入乳香三兩松脂六兩更煎一日用生絹濾卻粗滓再用五斗大主鐵鍋細羅鉛丹三斤炒令紫色旋入前藥油煎令紫色即旋退火以藥油滴少許水碗內成珠子為度以瓷石器密收依前法用抵聖散出聖濟總錄出箭頭附子二枚重半兩者炮裂去皮臍檳榔二枚一生一熟大黃銼木香各一分巴豆半兩去皮漿水煮三二十沸麩炒黃研出油肉豆蔻去殼吳茱萸先焙炒當歸銼焙黃連三錢去須豬牙皂莢酥炙去黑皮並子各一分蒼鼠銼焙乾研末一兩芎藭陳橘皮湯去白焙乾薑炮桂去粗皮蕪荑各一分上為細末沒藥酒調下一字匕只三服箭頭自出虎舌丸出聖濟總錄點藥箭頭令自出干虎舌半兩用石臼杵搗為末生草烏頭尖末三錢楮實末三錢磁石半兩用石臼杵搗為末性緊者水銀三錢同磁石末一處研細令水銀星盡丹砂一錢研硫黃舶上得一錢硝石三錢同硫黃研硇砂透明者二錢研金牙半兩石臼杵搗為末上一處於乳缽內更研極細石腦油為丸如黍米大令兩頭尖角合子盛貯每出箭頭一枚用藥一丸竅內將銅箸點入箭瘡內即以好酒少許摩瘡四畔次將紅散子摩瘡須臾覺瘡極熱而癢其箭頭當日內自出次以生肌金華散摻瘡內以紫金膏封之紅散子出聖濟總錄摩瘡上蔓陀羅子草烏頭尖麒麟竭蓖麻子去殼細研茄子花各半兩上為細散以好酒調下如膏於瘡口上塗摩之箭頭自出雄黃丸出聖濟總錄治箭鏃不出雄黃研獨角仙硇砂砂不灰木威靈仙去殼木槿花各一分鼠一枚心頭取血研入眾藥內上除鼠血外搗為散和勻煉蜜丸黃米大納在瘡口箭頭自出牡丹散出聖濟總錄治金瘡箭頭在骨遠年不出牡丹去心白蘞各一兩桑白皮銼二兩藿香葉丁香麝香研各一分上為散每服二錢匕溫酒調下日三淺者十二日深者二十日箭頭自出雄黃丸出楊氏家藏方治骨中箭頭方雄黃一分蜣螂一分研不灰木一分以牛糞火燒赤色威靈仙一分朝陽花一分鼠一枚去頭取血上為末入鼠血並煉蜜和丸如黃米大納瘡口其箭鐵不計遠年自出蠐螬丸出聖惠方治金瘡箭頭鏃在骨中遠年不出方蠐螬五枚乾者螻蛄三枚乾者赤小豆一分赤鯉魚鮓一兩硇砂一錢紅花末三錢上研細以鮓研和丸如綠豆大如瘡口在只於瘡口內紝一丸如無瘡口以針撥破納藥不過三丸箭頭自動輕搖即出巴豆丸出聖惠方治肉中箭頭巴豆一枚去皮膩粉一分砒少許細研磁石半兩細研蜣螂一個為細末上以雞清和丸綠豆大先以針撥開瘡口用女子乳汁化一丸在撥開處上用醋面紙封貼貼處當癢癢極不可忍則其鐵自出也多年者兩上新者一上箭鏃自出治箭鏃入肉出聖惠方雄黃蜣螂膩粉砒霜巴豆去皮各一分上為末先以兒乳汁濕箸頭點藥入瘡內當癢不過三兩上便出矣半夏散出聖惠方治金瘡箭頭在肉中不出半夏湯洗七次去滑白蘞牡丹各一兩桑皮白皮銼二兩上為末每服以溫酒調下一錢日三服出箭頭方蜣螂自死者十個土狗子三個婦人發灰少許上蜣螂去殼取白肉與二味同研如泥用生塗中箭處如膏搽後內微癢以兩手蹙之其箭頭自出解骨丸出聖惠方治箭鏃不出雄黃研蜣螂研象牙末各等分上搗研為散煉蜜丸如黍大納瘡口內後細嚼羊腎脂麻摩貼之覺癢箭頭自出治箭鏃不出出聖惠方蜣螂五月五日取者佳斑蝥各七枚去翅頭足曝乾細研砒黃細研半兩上和勻入青竹筒三寸內卷蠟紙塞口更以蠟紙封定廁中浸三七日取出洗曝乾每用豆許待癢按之自出出箭頭方出濟生拔粹方角蜣螂不計多少全用乳香麝香不計多少上為細末撥動箭撥藥於瘡口內治箭鏃入肉出聖惠方斑蝥二七個蜣螂一七個硇砂一錢上為末都入竹筒內封頭納入廁中七日取後於陰地內埋之七日取於瓷合內盛之每用時取少許於瘡上塗之其箭鏃自出白蘞散出聖惠方治金瘡箭在肉內不出白蘞半夏各等分上制下篩酒服方寸匕日三淺瘡十日出深瘡二十日出終不住肉中牡丹皮散出聖惠方治箭鏃及諸刀刃在咽喉胸膈諸隱處不出者牡丹皮一分白鹽二分一方作白蘞上制下篩以酒服方寸匕日三服出治箭鏃入骨取不出疼痛不可忍宜用此方出聖惠方巴豆三枚蜣螂三枚上研塗所傷處候痛定微癢忍之極癢不可忍即撼動拔出用生肌膏藥敷之以黃連管仲湯洗畢以牛膽制風化石灰敷之兼治惡瘡夏候鄆云初在潤州得之方鏃箭出後速以生肌膏敷之說者云兼治瘡鄆得方後至洪州旅舍主人妻患背瘡呻吟鄆遽用此方試之愈治箭頭不出出聖濟總錄磁石生搗研極細雄黃研各三分上同研令勻每服二錢匕綠豆水調下空心十日後輕撥便出手足上用此藥貼之自出白蘞散一名丹散出聖惠方治箭頭不出白蘞三分牡丹去心三分上為散每服三錢匕溫酒調下空腹日午夜臥各一服一方加鹽等分萬類灰散出聖惠方治金瘡及箭入肉不出腫痛萬類灰弓弦灰各三兩上共研為散每二錢匕用蓼藍汁調下日再服治刀箭傷緊閒者血竭一枚滑石上為末敷之出血不止立效又方龍骨二錢般灰六兩乳香一兩上為末敷之立效治箭鏃方用射罔以塗之治卒中箭不出或肉中有聚血出千金方取女人月經布燒灰屑酒服之治箭鏃及諸刀刃在咽喉胸膈諸隱處不出者出千金方用酒服瞿麥方寸匕日三瘥又方出千金方服栝蔞汁塗箭瘡上即出一方用根搗敷瘡日三易治針折入肉中並箭諸物刺出千金方刮象牙為末水和聚著折針上即出又方出千金方用磁石吸鐵者著上即出取箭鏃方出危氏方用天水牛一個獨角小者尤妙用小瓶盛之用硼砂一錢研細用水些少滴在內浸自然化水以藥水滴在傷處箭頭自然出也淮西總管趙領衛名屬殿岩密之子云仇防禦方張循王屢求不得因秦知德壽宣取以賜之有奇效與楊氏方中用巴豆蜣螂者大率相似赤小豆飲出聖惠方治箭頭入肉及入腹不出用赤小豆半升以水五升煮令爛熟取汁每服一盞空腹日午夜臥服一方和酒相次服之服盡為度治箭頭在咽喉中或胸膈中及諸處不出者出聖惠方用鼠肝五具細切爛研敷之兼以鼠腦髓或鼠頭血塗之並良專治人針折在肉不出並刀刃傷又方出聖濟總錄以生鼠皮一枚及前兩足燒作灰用豬膏和塗之即出牛膝膏出聖濟總錄治箭在咽喉中或胸膈中及諸處不出者搗牛膝不限多少作末以熱水調塗箭頭即出若火瘡灸瘡不能愈者塗之效又方出聖濟總錄以白頭蚯蚓十四枚納銅器中次入研細鹽一兩於日中曝並化作汁塗有箭鏃並刃傷處須臾癢則出療箭頭及諸刃頭在咽喉胸膈諸隱處不出者出葛洪肘後方嚼杏仁不限多少塗之研杏仁細敷之又方出聖濟總錄搗烏梅不限多少為散水和塗之即出又方出聖濟總錄取蠐螬不限多少細研取汁塗之血止即出箭鏃中傷在咽喉胸膈不出及針刺不出者出聖惠方用螻蛄即土狗蟲乾者濃煎汁滴上三五度箭頭自出一方以螻蛄腦十枚細研塗瘡上亦出治出箭頭出本草以慄肉生吃七個又生嚼敷可出亦罨惡刺治箭頭不出及惡刺破癰出本草以人牙齒垽和黑蝨研塗之出箭頭治折箭刺入膿囊不出堅燥及鼠僕取薔薇灰末方寸匕服之十日鑱刺皆穿皮出效萬聖神應丹出衛生寶鑑出箭頭魚骨針麥芒遠近治之用莨菪子一名天仙子取著中一子服本枝華花實全者好於端午日前一日特不語尋見莨菪子言道先生你卻在這裡哪道罷用柴灰自東南為頭圍了用木椑子橛取了根周細於次日端五日未出時依前特不語钁只一钁取出土用淨水洗了不令雞犬及婦人見於淨室中以石臼搗為泥丸如彈子大黃丹為衣以紙袋封了懸於高處陰乾如有人著箭不能出者用緋絹盛此藥干於臍中用綿裹肚繫了先用象牙末於瘡口上貼了後用前藥如瘡生合用刀子刺開貼之最驗葛根飲治箭鏃不出及治毒箭所傷用生葛根三斤銼細研絞取自然汁每服半盞不拘時候日三治一切金瘡無有不效者又云葛白屑熬黃敷瘡止血立效治箭鏃石不出方用黑羊糞搗末敷之待瘡口開即以生鼠刺取血滴瘡口中須臾即出神鈴散治箭頭在骨內取不出大雄鼠一枚上件去皮骨取精肉薄劈焙乾碾為細末每服二錢熱酒調下若覺箭瘡癢不得抓忍癢少時箭頭自出不拘時候磁石丸出箭頭斑蝥五十枚全者屁盤蟲五十枚去頭翅磁石一兩四面緊者硇砂一兩別炒巴豆二十枚去殼不用川烏頭二十枚生用不去尖上件為細末以棗肉為丸如鼠糞大塞瘡口內箭頭自出如瘡口生合不見於舊瘢上灸三十壯以津液化藥敷在灸瘡上用濕紙貼定候瘡開以物枕瘡口臥良久箭頭自出鼠油膏出箭頭鼠一枚熬取油蜣螂皂莢燒灰定粉龍骨上四味各一錢乳香少許別研上件為細末以鼠油和成膏子點藥瘡口內其上更用磁石末蓋之箭頭自出凡箭鏃及諸壯刺沒肉中頭尾猶可揣得者應破上以鉤針引出之若深藏不見者難療多死又箭中骨骨破碎者須全出去碎骨盡得藥敷之不爾瘡永不合亦死鐵勇丹治金箭頭入腹內及在身體諸處竟或著骨斷折不能取者獺膽七枚如無只用赤鯉魚膽一十四枚磁石四邊緊者血竭銼研澤瀉赤小豆紫葛根蒼耳子赤芍藥以上七味各半兩樟柳枝三兩以上並生用焙乾為細末酒煮赤小豆麵糊入膽汁同和為丸如梧桐子大如在腹內每服二十丸濃煎赤小豆樟柳枝湯並酒各半盞送下不拘時候日三四服立出在骨節禁穴內不可取者用後藥硇砂別研砒別研巴豆霜斑蝥上四味各一字蜣螂十枚螻蛄七枚蠐螬七枚上七味研細入前藥二十丸一處再研用石腦油為丸如綠豆大每用一丸塞瘡口內上用雲母膏蓋口日一換藥不過三五日其箭即出矣湧鐵膏取箭頭一切針刺入肉盡皆治之糞鼠頭一個螻蛄四十九個芫青一兩土消蟲十個巴豆一兩馬肉蛆一兩焙乾信一兩醬蛆一兩焙乾夏枯草一兩硇砂一兩磁石一兩黃丹一兩地骨皮一兩蘇木一兩蜣螂一兩石腦油三兩蒿柴灰三升上將灰汁石腦油用文武火熬成膏次下地骨皮等末令勻瓷器內收臨時用看瘡勢大小點藥良久箭頭自然湧出神聖膏取針鐵入皮膚車脂不以多少上成膏子者好攤在紙上如錢許二日一換三五次其針自出鳥翎散取針鐵誤入皮膚鳥翎三五枚火炙焦色上碾為好醋調成膏子塗在瘡上紙蓋一兩次其針自出神效
