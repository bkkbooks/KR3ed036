神丸服之由是晝亦得睡十日後安撫曰不得睡三月餘今因睡不已莫非他證否予曰不然衛氣者晝行陽二十五度夜則行陰亦二十五度此乃衛氣交入陰分循其天度故安穩而得睡也何病之有焉十三日晡微有悶亂不安於前沖和湯又加柴胡三分以升少陽之氣飲三服至十五日全得安臥自汗惡寒躁熱胸膈痞先小便多服藥之後減半大便一二日行鼻聞香口知味飲食如常脈微弦而柔和按之微有力大阿膠丸出楊氏家藏方治一切中風半身不遂口眼喎斜併產後中風及風氣注痛遊走不定白花蛇酒浸取肉四兩烏蛇酒浸取肉虎脛骨酥炙海桐皮赤箭以上四味各三兩麻黃去根節蟬蛻去土天南星酒浸一宿木香白殭蠶炒去絲嘴半夏湯洗煮薑汁製附子炮去皮臍尖白朮以上八味各二兩半全蠍去毒粳米炒香白芷防風去蘆頭白附子炮川芎以上五味各二兩阿膠蚌粉炒沒藥別研肉桂去粗皮細辛去土葉人參去蘆頭犀角屑硃砂別研麝香別研以上八味各一兩半上件同為細末煉蜜為丸每一兩作十丸每服一丸空心生薑酒磨下小兒每丸分作四服薄荷湯化下乳香宣經丸出仁存方治中風寒濕半身不遂手足頑麻骨疼足腫惡寒發熱漸成腳氣或閃肭傷筋骨男子疝氣婦人血不調威靈仙苦葶藶同黃耆續斷同蒼朮陳皮同烏藥茯神術同上各半兩每二味木瓜一個在內如常法三蒸三曝蒸時用酒灑然後焙乾為末研瓜膏為丸如梧桐子大每服十五五十丸鹽湯鹽酒任下食前八味順氣散出德生堂治中風得病之源多因憂思鬱結心神不安又為酒色過度邪氣乘虛而入腠理以致半身不遂口眼喎斜語言謇澀神志昏憒筋力攣拳痰涎壅滯麻痹不仁遍身疼痛此疾先當調氣不當治風大宜服之人參白朮白芷烏藥青皮陳皮白茯苓各一兩甘草半兩如痰盛可加南星半夏各半兩如氣不順加廣木香半兩上㕮咀每服五錢水盞半煎至七分去滓溫服無時服如藥有南星半夏必加生薑七片棗二枚同煎服臨臥時可服活絡丹或青州白丸子蘇合香丸三藥相間服之大妙烏金煎出經驗方治中風半身不遂手足麻痹疼痛大附子二個生去皮臍重一兩雄黑豆一百粒上用水一大碗入銚子煮候豆爛則先漉出豆其附子且於豆汁內更煮直令汁干不令焦爛取附子收起貯磁盒內將黑豆以溫水淘過先取一粒至十五粒入口爛嚼如糊未得嚥下更逐將黑豆嚼直候一百粒一齊嚼爛如糊滿口便用熱酒半盞猛衝下別用熱酒半盞漱牙縫內黑豆滓令淨嚥下然後就患處一邊臥蓋覆必有汗出明日又將收起者附子依前煮黑豆一百粒嚼服第三日亦依前煮服訖方治將附子二個劈為八片各以濕紙包裹每日空心爛嚼一片熱酒下如前法並逐日蓋覆取微汗甚者不過似此三兩次用效嘗見人用此藥數驗無疑聖散子出經驗方治偏風半身不遂一切風麻痹疼痛及破傷急風等草烏頭皮小皺有蘆頭者可用削去皮尖凡無蘆頭者不可用四兩川芎當歸藁本防風桂不見火天南星生雄黃研入以上各半兩白芷乾薑生以上各一兩上十味為末每服一字用煨蔥白麝香酒調下空腹食前服病甚者可服半錢逾時方可進飲食治熱風中人忽悶倒不知人事半身不遂口眼喎斜其病所起蓋因酒色之傷或多服熱藥後恣行淫欲愛食昏膩上焦氣滯下部虛弱精神空竭上膈氣昏致生斯病其病候必先於一年或數月前覺上膈氣者睡中口內生涎頭目昏重忽然悶倒不知人事喉中涎並膠涎滿口宜服取涎散後服疏風氣方若喉中朝涎並多填塞喉中方進取涎散若無朝涎口目喎斜不須進此方出護命方治風痰取涎散方出楊子建護命方須識是熱方可吃半夏三分硝石半兩牽牛一兩羌活獨活射干荊芥穗天南星殭蠶各一分上為細末每服四錢熟湯調下和滓吃若人牙關急口不開急以木杓柄斡口開灌之以吐涎為度未吐更進一服治熱風中人悶倒不知人事先要吃前面取涎散子後吃此疏風氣方大臟熱方可吃出楊子建護命方荊芥穗防風桑寄生羌活獨活芍藥乾蠍天麻白花蛇酒浸炙十餘度炙黃熟去骨不用只用肉附子火炮去皮半夏麻黃去根木香蔓荊子川芎殭蠶去絲沉香麝香硃砂牡丹皮去心官桂各一分龍腦三銖上為細末了然後入硃砂龍腦麝香同研令如塵每服三錢以姜三片濃煎薄荷湯調下食後吃治大風半身不遂風腰腳不遂附論夫風腰腳不遂者腰腳運用不能相繼也蓋肝主筋腎主骨肝腎氣虛風邪攻之則流傳筋骨走注腰腳故令機關不利不能相隨也方金鳳丹出聖濟總錄治肝腎久虛風邪攻注腰腳不遂五靈脂天麻酒浸一宿焙各三兩烏頭炮裂去皮臍楓香脂研各二兩乳香研各一兩地龍去土炒三兩半沒藥研半兩木鱉子去殼二兩海桐皮銼一兩黑豆去皮各一兩草烏頭炙薄荷葉乾蠍全者去土狼毒炮各一兩牛膝酒浸切焙一兩丹砂研半兩附子炮裂去皮臍各一兩當歸切焙一兩半自然銅煅醋淬骨碎補去毛虎骨酥炙各一兩龍腦研麝香研各一錢上為末以生薑蔥白汁和丸如雞頭子大每服一丸生薑蔥酒下走注風乳香酒下卒中風薄荷酒下卒中暗風雞冠血酒下半身不遂松明酒下婦人產後破血氣煎黑豆酒下不可食蔥婦人產後虛腫及頭面生瘡遍身癢痛白芷酒下諸風疾治之皆效羌活丸出聖濟總錄治風冷下注腰腳不遂五勞七傷六極並諸風痹羌活去蘆頭鹿茸去毛酒炙牛膝酒浸切焙干熟地黃切焙酸棗仁炒菟絲子酒浸別搗山茱萸巴戟天去心茯神去木防風去叉五加皮銼桂去粗皮五味子蛇床子炒各半兩黃芩去黑心白蘚皮羚羊角鎊各一分生乾地黃焙一兩上為末煉蜜丸如梧桐子大每服二十丸至三十丸空心溫酒下日再乾地黃丸出聖濟總錄治風腰腳不遂膝脛沉重飲食減少日漸無力熟乾地黃切焙大麻仁炒研各二兩萆薢炒五加皮銼石斛去根赤芍藥防風去叉各一兩牛膝酒浸切焙桂去粗皮酸棗仁炒羌活去蘆頭木香各三分附子炮裂去皮臍一枚牡丹皮半兩檳榔二枚銼上為末煉蜜丸如梧桐子大每服十五丸至二十丸空腹溫酒下日再竹瀝湯出聖濟總錄治風腰腳痹弱或腳脛轉筋或皮肉脹起如腫而按之不陷心中煩懊不欲飲食或夙患風氣者竹瀝湯成下甘草炙銼秦艽去苗土細辛去苗葉白朮炒黃芩去黑心桂去粗皮防風去叉各一兩乾薑炮葛根防己各半兩升麻三分麻黃去根節煎掠去沫焙三兩用附子炮裂去皮臍半枚上除竹瀝外銼如麻豆每服五錢匕水一盞半煎至八分去滓入竹瀝一合更煎一沸溫服空心日晚各一服茯神丸出聖濟總錄治風腰腳不遂行履不得丈夫五勞七傷六極並治諸風痹茯苓去木五加皮防風去叉桂心去粗皮五味子蛇床子炒各一兩羌活去蘆頭鹿茸去毛酒炙牛膝酒浸切焙山茱萸菟絲子酒浸別搗酸棗仁炒巴戟天去心各一兩半熟乾地黃切焙三兩上為末煉蜜丸如梧桐子大每服二十丸至三十丸溫酒下早晚食前各一服萬金散出危氏方治風補虛順榮衛通血氣治腰膝沉重腳弱無力醫官杜壬治手足風累驗續斷杜仲去粗皮炙香切防風牛膝酒浸焙細辛華陰者白茯苓人參當歸切焙桂去粗皮取有味處不見火甘草炙各一兩川芎獨活秦艽去土熟乾地黃各半兩上粗末每服五錢匕水二盞煎至一盞濾去滓不拘時但空心熱服本事方有白芍藥共十五味前十味秤兩同後四味各三兩細末每服二錢水二盞生薑三片棗一枚同煎至七分空心食前稍熱服文潛云予嘗病左臂不遂後已痊愈而手指不便試治不驗遂服此藥才半劑而愈因名續斷湯錄驗方治手足麻木不仁用杏仁防風秦艽羌活附子等分粗末三大錢水一盞半姜三片煎至七分去滓入生地黃汁兩合再煎數沸空心服名小防風湯一方治血虛體弱加鹿茸肉蓯蓉各半兩白蘚皮湯出聖濟總錄治風腰腳不遂四肢𤸷痹口噤不語手臂腳膝痿弱顫掉白蘚皮女萎防風去叉細辛去苗葉升麻蒼耳炒桂去粗皮附子炮裂去皮臍五味子炒用各一兩半黃芩炙銼二三兩菖蒲九節者去須節米泔浸切焙蒺藜子炒去角各一兩半上銼如麻豆每服五錢匕水一盞半煎至八分去滓食前溫服日再萆薢丸出聖惠方治腰腳不遂骨節痠痛筋脈拘急行履稍難兩脅抽痛萆薢三兩牛膝細切浸焙白檳榔煨酸棗仁炒防風去叉各二兩杜仲去粗皮炙丹參赤芍藥郁李仁去皮尖炒石斛去根各一兩半當歸炙一兩一分桂去粗皮二兩上為末煉蜜丸如梧桐子大每服空腹暖酒下三十丸牛膝湯出聖濟總錄治風腰腳不遂牛膝去苗土羌活去蘆頭羚羊角鎊各半兩升麻酸棗仁炒芍藥各三兩分防風去叉虎脛骨酥炙各一兩梔子仁二枚上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時候服黃耆湯出聖濟總錄治風腰腳不遂腿脛𤸷痹疼痛不可忍黃耆炙銼獨活去蘆頭防風去叉酸棗仁炒茯苓去木各一兩白蘚皮三分羚羊角鎊半兩桂去粗皺皮半兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心晚食前各一巴戟湯出聖濟總錄治腎臟風冷腰腳不遂補理腎臟虛風巴戟天去心覆盆子炒羚羊角鎊地骨皮牛膝酒浸切焙酸棗仁炒各半兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服早晚食前各一服桑寄生丸出聖濟總錄治風腰腳不遂桑寄生黃耆炙銼熟乾地黃焙枳殼去瓤麩炒各二兩蔓荊子炒一兩上為末煉蜜丸如梧桐子大每服二十丸空心溫酒下日再牛膝丸出聖濟總錄治風腰腳不遂攣急疼痛牛膝酒浸切焙四兩白朮炒萆薢炒各八兩烏頭炮裂去皮臍一兩丹參炒二兩上為末煉蜜丸如梧桐子大每服十丸至十五二十丸溫酒或鹽湯下早晚食前各一附子飲出聖濟總錄治風冷腰腳疼痛不遂由少年服冷藥太過補暖調氣附子一枚炮去皮臍防風去叉羌活去蘆頭一兩牛膝切焙酒浸三分上㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服早晚食前各一茯苓湯出聖濟總錄治冷濕風虛腰重不遂腳膝浮腫溫腎白茯苓去黑皮乾薑炮澤瀉各一兩桂去粗皮一兩半上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心食前夜臥各一服杜仲酒出千金方治腰腳疼痛不遂風虛杜仲八兩石南二兩羌活四兩大附子五枚上㕮咀以酒一斗浸三宿每服二合日再偏宜冷病婦人服之即效萆薢散治中風腰腳緩痹行步艱辛不穩萆薢二十四個杜仲八錢上為末早朝溫服調三錢加至五錢忌食牛肉雄豆散出聖濟總錄治風腰腳不遂筋急行履不得用雄黑豆緊小者不拘多少以新汲水淨淘漉干頻灑水俟生糵才及半曝乾炒熟不退皮搗羅為散每服二錢至三錢匕溫酒調下日三至半月後所患處覺有觸動是驗紫葳散出聖濟總錄治風腰腳不遂用紫葳東引根即凌霄花根是也炙銼搗羅為散每服二錢匕空心溫酒調下蒴藋散出聖濟總錄治風腰腳不遂用蒴藋根去皮土切焙搗羅為散每服一錢匕空心溫酒調下漸加至一錢半治一切風筋骨節緊急腰腳不遂上以金牙石燒浸服之良治骨軟風腰膝疼行履不得遍身瘙癢出本草以何首烏大而有花紋者同牛膝銼各一斤以好酒一升浸七宿曝乾於木臼內搗末蜜丸每日空心食前酒下三五十丸
