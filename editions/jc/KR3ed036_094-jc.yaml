body:
  text: 卷九十四諸風門中風半身不遂附論夫胃者為水穀之海水穀之精化為氣血氣血充盛則身體滋榮而風邪不能為寇脾胃既弱水穀虧耗所以滋養者不足氣血偏虛又為邪風所侵此所以半身不遂病苦悲傷不樂惡聞人聲少氣時汗出臂偏不舉診其脈寸口沉細是也又寸口偏絕者則偏不遂兩手俱絕則不可治也又云世傳左為癱右為瘓此說尤非何者經有偏中半身不遂之候則癱瘓之候當以左右俱中者名之又云春夏得之難治秋冬得之易治春夏者陽氣上騰火力方盛風火相得而旺故難治也秋冬者陽氣下降火力漸微則易治也此說亦未可必惟其中之淺深者為難易耳治法兼理肝腎為得蓋肝主筋腎主骨風中肝腎則筋骨癱瘓也方鐵骨丹治諸風癱瘓拳攣半身不遂川烏頭草烏頭各炮去皮臍尖川芎當歸酒浸曬辣桂川續斷洗曬華陰細辛補骨脂炒烏蛇洗酒浸取肉用曬乾七錢半直殭蠶炒去絲木鱉子去殼炒熟麻黃去根節酒浸曬羌活獨活堅白南星炮熟白蒺藜炒搗去刺薏苡仁天麻酒浸曬蒼朮炒各半兩萆薢鹽水煮乾杜仲去粗皮銼蓋注裂炒焦各一兩牛膝酒浸曬一兩虎脛骨洗酒浸炙焦白附子炮各三兩秦艽二錢半全蠍去毒炒三錢半川五靈脂四錢自然銅燒紅醋淬七次三兩重巴戟酒浸去心曬防風滴乳香沒藥炒各半兩麝香半錢令別研上細末乳香沒藥別研漸入拌和以浸藥酒調飛面煮糊研築丸彈子大每服一丸溫酒磨下或宣州木瓜煎湯下黑豆淋酒下不拘時候服仍間用高良薑碎一升煎湯圍熏湯盆浴最妙未服藥前須以斑蝥二十一個去翅足用黑豆一中盞慢火同炒焦只用七個並豆入全蠍十四枚微炒五靈脂二錢半為末糕糊丸如麻子大每服二十一丸老酒下先去其風根烏犀丸治中風半身不遂身體頑麻烏犀角屑羚羊角屑天南星醋浸一宿炒令黃色天雄炮裂去皮臍天麻桂心白殭蠶微炒乾蠍微炒川烏頭炮裂去皮臍芎藭白朮當歸乾薑炮銼白芷細辛牛膝去苗檳榔青橘皮湯浸去白瓤炒白附子炮裂桑螵蛸微炒阿膠搗碎炒令黃燥以上各一兩獨活一兩烏蛇酒浸炙令黃去皮骨防風去蘆頭麻黃去根節各一兩牛黃細研麝香細研各一分上為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服食前以溫酒下十丸天雄丸出聖惠方治中風半身不遂言語謇澀肌膚頑痹筋脈不利骨節疼痛天雄炮裂去皮臍天麻附子炮裂去皮臍麻黃去根節仙靈脾乳香道人頭以上各一兩羚羊角屑桑螵蛸微炒蟬殼牛膝去苗桂心當歸芎藭羌活白殭蠶微炒五加皮薏苡仁防風去蘆頭乾蠍微炒硃砂細研以上各半兩烏蛇肉二兩酒浸炙微黃牛黃一分細研麝香一分細研上為末煉蜜和搗五七百杵丸如梧桐子大每服以溫酒下二十丸漸加至三十丸日三四服秦艽散出千金方治半身不遂言語錯亂乍喜乍悲角弓反張皮膚風癢秦艽獨活胡洽用烏頭黃耆人參各二兩防風山茱萸桂心石斛胡洽用萆薢各一兩半附子細辛當歸芎藭胡洽用桔梗五味子甘草白朮乾薑各三十銖麻黃遠志胡洽用防己天雄各一兩白蘚皮三十銖胡洽用白蘞甘菊花二兩胡洽用蜀椒茵芋十八銖胡洽用茵草上治下篩酒服方寸匕日再漸漸加至二匕又云治風無新久並補茯神湯出聖濟總錄治中風手足一邊不收精神健忘茯神去木三兩防風去叉牛膝去苗枳殼去瓤麩炒防己銼秦艽去土玄參堅者芍藥黃耆細銼澤瀉白蘚皮銼獨活去蘆各二兩桂去粗皮一兩半五味子半斤人參半兩薏苡仁炒半升羚羊角鎊屑二兩石膏研半斤麥門冬去心焙半兩甘草炙銼一兩半磁石十二兩烈火燒赤醋淬十次淘用別搗上除磁石外粗搗篩每用藥一兩磁石末半兩別入杏仁七枚去皮尖碎以水四盞同煎至二盞去滓分二服微熱服之空心並午時各一服每自仲春宜服至季夏即住一方用枳實無枳殼仍忌生冷海藻等物天麻散出聖惠方治中風半身不遂沉重天麻白附子白殭蠶炒防風去叉麻黃去節甘菊花擇白蘚皮藁本去苗土羌活去蘆頭獨活去蘆頭細辛去苗土阿膠炙令燥乾蠍去土炒烏蛇酒浸去皮骨炙各三兩當歸炙銼桂去粗皮白茯苓去黑皮乾薑炮甘草炙各一兩半上為散每空腹暖酒調三錢匕服忌生菜豬雞肉油膩赤箭丸出聖惠方治肝腎久虛外中風毒半身不遂肢節攣急腰間痠痛漸覺羸瘦赤箭一兩茯神一兩五加皮一兩防風去蘆頭一兩牛膝去苗一兩半獨活蛇床子酸棗仁微炒山茱萸巴戟仙靈脾萆薢銼熟乾地黃桂心以上各一兩鹿茸去毛塗酥炙令黃附子炮裂去皮臍石斛去根各二兩菟絲子三兩酒浸三日曬乾別搗為末上為末煉蜜和搗三二百杵丸如梧桐子大每於食前以溫酒下三十丸仙靈脾浸酒方出聖惠方治中風半身不遂肢節疼痛無力仙靈脾天麻獨活天雄炮裂去皮臍牛膝去苗五加皮芎藭茵芋萆薢狗脊海桐皮鼠黏子蒼耳子川椒去閉口及目微炒去汗以上各一兩虎脛骨二兩塗酥炙黃桂心當歸石斛去根以上各一兩半上細銼以生絹袋盛用好酒二斗浸之密封經七日後每日不計時候溫酒飲一小盞常令酒氣相續其酒出一盞入一盞以藥味薄即止荊瀝湯出聖濟總錄治中風半身不遂心虛風熱發即恍惚煩悶筋脈攣急荊瀝旋入麥門冬去心生二兩人參一兩地骨皮銼洗焙二兩梔子仁一兩甘草炙一兩半黃芩去黑心一兩白茯苓去黑皮各一兩芎藭一兩桂去粗皮一兩細辛去苗葉一兩杏仁酒浸去皮尖雙仁炒一兩豉炒微幹一合半防風去叉一兩海桐皮一兩石膏一兩半竹瀝旋入上除荊竹瀝外十五味㕮咀如麻豆大每用一十二錢匕以水四盞入生薑一分切煎取二盞去滓入荊瀝竹瀝各一合更煎五沸分四服日三夜一間食服之良一方用白蘚皮無海桐皮白蘚皮湯出聖濟總錄治中風半身不遂口不能言及治諸風偏枯白蘚皮炙銼附子炮裂去皮臍白朮防風去叉麻黃去根節先煎掠去沫焙乾用葛根獨活去蘆頭防己人參茯神去木當歸切焙各一兩半甘草炙杏仁湯退去皮尖並雙仁炒兩半石膏碎三兩桂去粗皮一兩白芷半兩上㕮咀如麻豆大每用藥十七錢匕以水三盞煮取一盞半去滓分溫三服日二服夜一不拘時候一方治風痱入生薑半分同煎黑龍丸治中風半身不遂口眼喎斜手足拘攣或生嚲曳語言謇澀心多驚悸其狀多端各隨所中此由氣血俱虛腠理疏弱風邪外中真氣失守邪正相干故為是病宜服之方見資壽黑龍丹側子湯治中風手足不遂口眼喎斜側子炮去皮臍一分附子炮去皮臍一分獨活去蘆頭一兩芎藭秦艽去苗土各一兩麻黃去根節先煎掠去沫焙用一兩半木通一兩磁石用烈火燒赤醋淬十次淘用三兩山茱萸山芋各一兩杜仲去粗皮銼白蘚皮各一兩半甘草炙桂心去粗皮各一兩防風去叉半兩上㕮咀如麻豆大每用十五錢匕以水四盞入生薑一分切煎至二盞去滓分溫三服日一服夜並二服服此湯訖惟暖覆所患處微取汁慎外風白芷湯治中風手足一邊不遂言語謇澀白朮白芷芎藭防風去叉各半兩石膏一兩半羌活去蘆頭一兩牛膝去苗狗脊去毛麻黃去根節先煎掠去沫焙乾用半兩葛根一兩桂去粗皮一兩半附子炮裂去皮臍一兩薏苡仁炒萆薢炒半兩杏仁湯退去皮尖並雙仁炒各一兩上㕮咀如麻豆大每十八錢匕以水四盞入生薑一分切煎取二盞去滓分溫三服微熱服日二夜一摩挲丸治中風癱瘓半身不遂口眼喎斜言語謇澀精神昏塞步履艱難或肌肉偏枯手足嚲曳或筋脈拘攣不得屈伸及氣痹之疾諸風身體疼痛天麻一斤去苗洗辰砂細研水飛天台烏藥自然銅燒赤醋淬麝香別研生龍腦別研雄黃飛研薰陸香別研烏犀鎊屑別為細末各四兩地榆去苗丁香木香黑參揀潤者洗淨淘去土焙乾八兩真珠末研二兩川烏頭炮裂去皮臍八兩上為末研勻煉蜜和丸如楮實大每服一丸溫酒化下不拘時候服訖避風處衣被蓋覆令汗出患重者服一月全安輕者半月瘥初患者五七日可安八風九州湯治男子婦人寒冷不自愛護當風解衣汗出臥冷濕地半身不遂或俯仰屈伸難周身淫痹四肢不收狀如風狂飲食減少手足苦冷或不遂麻黃四兩去節甘草炙乾薑附子炮防風獨活各三兩石膏綿裹茯苓白朮芎藭柴胡當歸人參各三兩杏仁四十枚去皮尖二枚細辛二兩上㕮咀以水一斗清酒五升漬三夜煮取四升分為三服一日令盡若病人羸瘦者用水煎服藥訖厚覆當汗出微微去上衣汗解皆以粉收之忌生菜海藻菘菜酢李豬肉雀肉化風丹治一切中風半身不遂言語謇澀神昏錯亂洗頭破傷血風驚風服之皆效防風二兩羌活獨活各一兩麻黃去根節白芷芎藭桂枝川烏炮去皮臍藁本去土茯苓去皮白附子全蠍去毒甘草炒皂角燒存性各半兩上為細末水浸蒸餅為丸如彈子大陰乾每服一丸細嚼溫酒下日三服涎痰薄荷酒下破傷豆淋酒下傷風蔥白酒下婦人血氣當歸酒下小兒驚風人參細嚼溫薄荷酒下日二服附子散治中風半身不遂肢節無力疼痛附子炮裂去皮臍防風去蘆頭五加皮萆薢薏苡仁桂心牛膝獨活當歸杜仲去粗皮炙黃銼海桐皮木香仙靈脾枳殼麩炒微黃去瓤以上各一兩上為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服三石丸治中風半身不遂病若悲傷惡聞人聲少氣多汗偏臂不舉凝水石火煅遍赤研為細末三兩半石膏煅令赤研一分天南星炮裂去皮臍陽起石煅令通赤研為細末一錢一字天雄炮裂去皮臍草烏頭炮去皮臍為末白附子炮為末乾蠍去土炒白殭蠶炒各半錢龍腦研麝香研各一錢海蛤洗通赤研二兩蟬殼去土炮干為細末半錢上研令細入白麵一錢半令勻煉蜜和丸如雞頭子大每服一丸細嚼荊芥薄荷湯下茶酒亦得不拘時候御風丹治一切中風半身不遂神昏語謇口眼喎斜婦人頭風血風暗風倒僕嘔噦涎痰手足麻痹川芎白芍藥桔梗細辛去葉防風各一兩川羌活白殭蠶炒天南星姜炙各半兩麻黃去根節白芷各一兩半乾生薑甘草炒各三分硃砂二錢半為衣上為細末煉蜜為丸如彈子大每服一丸熱酒化下食前日三服神昏有涎者加硃砂一錢半麻黃散出聖惠方治中風半身不遂頭目昏痛心煩體熱麻黃去根節葛根銼各二兩桂心犀角屑地骨皮丹參白朮獨活芎藭石膏甘菊花各一兩甘草半兩炙微赤銼上為散每服四錢以水一中盞煎至六分去滓不計時候溫服忌油膩毒滑魚肉仙酒方治大風手足拳攣半身不遂川牛膝一斤洗淨秦艽一兩洗淨切防風二兩洗淨枸杞子二兩洗淨蠶砂二兩洗淨牛蒡子炒一升桔梗二兩洗蒼朮二斤去皮蒸爛用地黃一兩八錢洗當歸一兩八錢洗淨用天麻五兩洗淨上用無灰糯酒二斗以前藥於淨瓷缸內浸用七重淨白紙密封七日勿用婦人封取藥成若用時人面勿得於缸口內覷每酒一盞日進三服年深重風不過二斗忌濕面等物常每日一服人參湯一名參桂湯出千金方治中風半身不遂手足拘急不得屈伸身體痹冷或時瘛瘲或身背強直不語或狂言妄動或角弓反張或欲得食或不能食或大小便不利悉皆治之人參一兩半桂心去粗皮麻黃去根節先煎掠去沫焙乾用各一兩當歸切焙乾獨活去蘆頭甘草炙銼各一兩半石膏碎三分黃芩去黑心乾薑炮各半兩杏仁湯退去皮尖雙仁炒四十枚上粗搗篩每用藥十二錢匕以水三盞煎取一盞半去滓分溫二服空心並服服可相去如人行五里衣覆令汗出解即食白粥慎外風未汗復更煎並服之唯汗出得瘥服藥後如人行七八里用熱生薑稀粥投汗出活絡通經丸出三因方治半