胃中虛客氣上逆故使硬也下利而心下痞生薑瀉心湯甘草瀉心湯並主之若下利不止者當治其下焦赤石脂禹餘糧湯主之蓋生薑瀉心甘草瀉心湯皆治中焦此利在下焦若只治中焦則利益甚耳服赤石脂禹餘糧湯利復不止者當利其小便五苓散主之凡痞脹瀉心湯不愈然後可與陷胸丸下之不可用陷胸湯蓋太猛只用陷胸丸大抵結胸與痞皆應不然表未解者不可攻也仲景云當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連黃芩湯外證未解心下妨悶者非痞也謂之支結柴胡桂枝湯主之胸脅滿微結小柴胡加乾薑牡蠣湯主之若太陽證未除而數下之遂恊熱而利利不止心下痞硬表裡不解者桂枝人參湯主之十棗湯大柴胡湯皆治心下痞此方尤難用須是表證罷不惡寒身涼其人熱汗出發作有時頭疼心下痞硬滿引脅下疼乾嘔短氣者乃可行十棗湯表未解者甚不可用也大柴胡湯治傷寒發熱汗出不解心中痞硬嘔吐而下利者非大柴胡不可也若發汗吐下後心下痞硬怒氣不除者旋覆代赭湯主之有旋覆代赭湯證之人其或咳逆氣虛者先服四逆湯其胃寒者先服理中丸次服旋覆代赭湯為良旋覆代赭湯是解心下痞硬證宜詳察之又云傷寒心下滿者謂正當心下高起滿硬者是也不經下後而滿者則有吐下之殊若下後者又有結胸痞氣之別經曰病人手足厥冷脈乍緊邪結在胸中心滿而煩亂飢不能食病在胸中當吐之又曰脈浮而大心下反硬有熱屬臟者攻之不令發汗屬腑者不令攻之茲二者為不經汗下而心下滿者或吐之看其邪氣之高下高者則因而越之下者則因而竭之其要在泄其邪也至如陽明病雖心下硬滿又未可攻經曰陽明病心下硬滿不可攻之攻之利遂不止者死利止者愈是氣自表傳裡至於心下留結為實者則不可下乃吐之可也若未全為實者則不可下故此戒也又邪氣在表未應下而強下之邪氣乘虛結於心下實者硬滿而痛為結胸虛者滿而不痛為虛結經曰嘔而熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖下之不為逆必蒸蒸而振卻發熱汗出而解若下之心滿而硬痛者此為結胸但滿而不痛者此為虛痞蓋實邪留結則為硬痛虛邪留滯則但滿而不硬痛也結胸熱實脈沉而緊心下痛按之若硬者大陷胸湯主之明其邪實可知矣脈浮而緊而反下之緊反入里則作痞按之自濡但氣痞耳明其邪虛可知矣病發於陽而反下之熱入因作結胸病發於陰而發下之因作痞表邪未罷醫反下之胃中空虛客動於隔陽氣內陷心中因硬則為結胸須陷胸湯丸攻之可也傷寒中風醫反下之心下痞硬而滿醫見心下痞為病不盡而復下之其痞益甚此非結熱但以胃中空虛客氣上逆故使硬也須諸瀉心湯散可也二者俱是心下滿硬一為虛一為實凡投湯者大須詳審結胸雖為實邪眾皆共知當用陷胸湯丸下之或脈浮大者則不可下之則死即是猶帶表邪未全結實下之重虛其里邪深結則死設其結胸形證悉具而加之煩躁者又為不治之疾藥之所以能勝邪者必待胃氣施布藥力始能溫汗吐下以逐之其邪氣勝胃氣絕者湯藥縱下胃氣不能施布雖神丹難為效也又云傷寒腹滿者俗謂之肚脹是也華佗曰傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃謂入腑也是在腑也猶未全入里者雖腹滿為里證故亦有淺深之別經曰表已解而內不消非大滿猶生寒熱則病不除是其未全入腑若大滿大實堅有燥屎自可除下之雖四五日不能為禍謂之邪氣已入腑也傷寒邪入腑是里證已深故腹滿乃可下之多矣如經曰其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯發汗不解腹滿痛者急下之本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝芍藥湯主之大實痛者桂枝加大黃湯主之少陰病腹脹不大便者急下之諸如此者皆里證也雖曰腹中滿痛者此為實也當下之然腹滿不減者則為實也若腹滿時減者又為虛也則不可下經曰腹不減減不足言當下之金匱略曰腹滿時減復如故此虛寒從下上也當以溫藥和之蓋虛留滯亦為之脹但比之實者不至堅痛也大抵腹屬太陰證也陽熱為邪者則腹滿而咽乾陰寒為邪者則腹滿而吐食不下自利益甚時腹痛自太陰者屬脾土也治中央故專主腹滿之候又發汗吐下之後因而腹成滿者皆邪氣乘虛內客而為之而所生又各不同經曰發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之傷寒吐後腹脹者調胃承氣湯主之傷寒下後心煩腹脹滿臥起不安者梔子厚朴湯主之有當溫者有當下者有當吐者何邪氣不一也但發汗後腹滿當溫之邪氣在表因發散則邪去胃為津液之主發汗亡陽則胃所虛而不能敷布諸氣壅滯而為脹滿是當溫散可也吐後腹滿可下之邪氣在胸者則可吐之則邪去人安若吐後邪氣不去加之腹脹者是胸中之邪下傳入胃擁而實故主脹滿當須下之可也下後腹滿可吐者邪氣在表未傳入腑而妄下之也自表乘虛而入鬱於胸中而為虛煩氣上下不得通利者腹為之滿故當吐之可也凡為醫者要識邪氣所起所在審其所起知邪氣之由來觀其所在知邪氣之虛實發汗吐下之不瘥溫補針艾之適則十全之功自可得也聖濟總錄論曰傷寒心腹脹滿者以臟氣不調邪氣入乘正邪相搏故令人心腹脹悶而滿然臟有虛實邪有冷熱若吐下以後病不除內外有熱心腹脹悶而痛者此為實也若其素有冷癖因病發熱服冷藥及飲水過度水結心下動於痼滯心腹脹滿者此為虛也活人歌括云問君腹脹是如何只謂陰陽氣不和若是曾經汗吐下依方調治莫蹉跎腹脹者何也陰陽不和也桔梗半夏湯最良仲景太陽證發汗後腹脹滿者厚朴半夏甘草人參湯太陽證下後心煩腹脹滿臥起不安者梔子