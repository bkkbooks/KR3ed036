body:
  text: 卷二百七十三諸瘡腫門諸疔瘡附論夫稟形之類須存攝養將息失度百病萌生故四時代謝陰陽遞興此二氣更相擊怒當是時也必有暴氣夫暴氣者必有卒然大風大霧大寒大熱若不時避人或遇之此皆入人四體頓折皮膚流注經脈遂使腠理壅隔榮衛淤滯陰陽之氣不得宣泄變成癰疽疔毒惡瘡諸腫至於疔腫若不預療死不逮辰若待著訖乃欲求方其人已入木矣所以養生之士須早識此方凡是瘡痍無所逃矣凡療疔腫皆刺中心至痛又刺四邊十餘下令血出去血敷藥藥氣得入針孔中佳若不達瘡內療不得力又其腫好著口中頰邊舌上光赤黑如珠子慘痛應心是也是秋冬寒毒久結皮中變作此疾不即療之日夜根長流入諸脈數道如箭入身捉人不得動搖若不慎口味房室死不旋踵一曰麻子疔其狀肉上起頭大如黍米色稍黑面邊微赤多癢忌食麻子及衣布併入麻田中行二曰石疔其狀皮肉相連色烏黑如黑豆甚硬刺之不入肉內陰陽微痛忌瓦礫磚石之屬三曰雄疔其狀疱黑頭黶四畔仰瘡疱漿起有水出色黃大如錢孔形高忌房事四曰雌疔其狀瘡頭稍黃向里壓亦似灸瘡四畔疱漿起心凹色赤大如錢孔忌房事五曰火疔其狀如湯火燒灼瘡黑黶四邊有疱漿起如赤粟米忌火灸爍六曰爛疔其狀色稍黑有白瘢瘡中潰潰則有膿水流出瘡形大小如匙面忌沸熱食爛帛物七曰三十六疔其狀頭黑浮起形如黑豆四畔起大赤色今日生一明日二後日三乃至十若滿三十六藥所不能治如未滿三十六者可治俗名黑疱忌嗔怒蓄積愁恨八曰蛇眼疔其狀瘡頭黑皮上浮腫其形如小豆狀似蛇眼大體硬忌惡眼看並嫉妒人見之及毒藥九曰鹽膚疔其大如匙面四畔皆赤有黑粟粒起忌食鹹物十曰水洗疔其狀大如錢形或如錢孔大瘡頭白里黑黶汁出中硬忌飲漿水水洗渡河十一曰刀鐮疔其狀瘡闊狹如薤葉大長一寸左側肉黑如燒灼忌刺及刀鐮切割針刃所傷可以藥治十二曰浮漚疔其狀瘡體曲圓少許不合長而狹如薤葉大肉黃外黑黑處刺不痛肉黃處刺之則痛十三曰牛拘疔其狀肉疱起掐不破十四曰紅絲疔其狀如紅線初起手足漸漸引長入腹則死此疔治法最易但於明處仔細尋其紅絲以針挑斷著小艾炷灸一壯無事十四種瘡初起必先癢後痛先寒後熱熱定則寒多四肢沉重頭痛心驚眼花若大重者則嘔逆嘔逆者難治其麻子疔一種始末為癢所錄忌者不得犯觸犯觸者即難療其浮漚疔牛拘疔兩種無所禁忌縱不療亦不能殺人其狀寒熱與諸疔同皆以此方療之萬不失一欲知犯觸之狀但脊強瘡痛極甚不可忍者是也夫疔瘡者以其瘡形如釘蓋之狀者是也氣客於經絡五臟內蘊毒熱初生一頭凹腫痛青黃赤黑無復定色便令煩躁悶亂或憎寒頭痛嘔吐心逆以針刺瘡不痛無血是其候也其候本因甘肥過度不慎房酒以邪毒蓄結遂生疔瘡內經曰膏粱之變足生大疔此之謂也其治之法急於艾炷灸之若不覺痛者針疔四邊皆令血出以回瘡錠子從針孔紝之上用膏藥貼之仍服五香連翹湯漏蘆湯等藥疏下之為效若或針之不痛無血者以燒猛火鐵針通赤於瘡上烙之令如焦炭取痛為效亦紝前錠子用膏藥貼之經一二日膿潰根出服托裡湯散依常療之以取平復如針不痛其人眼黑或見火光者不可治也此邪毒之氣入臟腑故也養生方云人汗入食肉食之則生疔瘡不可不慎也疔腫者由風邪毒氣入於肌肉所生也凡有十種一者瘡頭烏而強凹二者瘡頭白而種實三者瘡頭如豆垽色四者瘡似葩紅色五者瘡頭內有黑脈六者瘡頭赤紅而浮虛七者瘡頭葩而黃八者瘡頭全薄九者瘡頭如茱萸十者瘡頭如石榴子亦有初如風疹搔破青黃汁出里有赤黑脈而小腫而有全不令人知忽衣觸手摸著則痛若故取不便處亦有肉突起如魚眼之狀赤黑慘痛徹骨九結皆變至爛瘡瘡下深孔如大針穿之狀疔瘡含蓄毒氣突出兩寸痛癢異常一二日間害人甚速是尤在癰疽之上也內經以白疔發於右鼻赤疔發於舌根黃疔發於口唇黑疔發於耳前青疔發於目下蓋取五色之應五臟各有所屬部位而已然後肩或腰或足發無定處在手足頭面骨節間者最忌大抵瘡頭黑破如釘四畔帶赤如火盤根突起隨變焦黑未幾腫大而光轉為濕爛深孔透肌如大針穿之狀外證心驚頭痛拘急惡寒四肢痛強或寒熱交作頰舌間赤黑點點如珠若毒入腹心則煩悶嘔逆恍惚癡眠其斃可立待也治法以調心氣為上蓋疔瘡蓄毒壅結於心如茯苓茯神遠志益智蓮子石菖蒲之類佐以川芎當歸皆舒豁心經之劑也心氣清毒自消散外所敷者用銷蝕惡肉輩膽礬綠礬鉛霜斑蝥等類以餅藥調和而筆敷之爛其肉而後翦隨敷隨爛次第剪平卻以生髮蛇皮土蜂窠皂莢刺各燒留性白芨減半併為細末以平瘡口或銷蝕惡肉輩敷之則疼則以排膿內補散多用酒調以醉之又有一種瘡頭黑深形如魚劑破之黃水滲出四畔浮漿是曰魚劑疔瘡其毒尤甚通前治法即癰疽方中萬疾解毒丸以清心行血湯使服之以井花水敷磨之實為妙藥諸瘡莫急於疔瘡有魚眼疔多發於足非神手不能治也大凡治疔瘡先以披頭針當頭刺之直至患者知痛處才引針而出血隨之流則以蟾酥追毒丹納之針孔中仍以紙捻送下使近痛處其上封以乳香膏四旁腫處敷之烏龍膏或有赤暈敷以解毒散三兩日瘡潰拔去仍覆以乳香膏膿盡生肌並如治癰之法治魚眼疔之法先以針刺之不痛則瘡根已走矣用療漏瘡之法以榆皮隨俞穴所往探之榆皮所不及之處則針破引榆皮而出再自針穴尋之若針破處病人知痛血出則是活肌肉矣即於針瘡納蟾酥丹覆以乳香膏再於正瘡上針孔中納蟾酥丹三兩粒仍覆以乳香膏則其疔瘡之根即回元所潰而愈有絲瘡症乃疔瘡之類醫若不識無治法害人最速其瘡生手足間有黃泡其中或紫黑色即有一條紅絲迤邐向上而生若至心腹則使昏亂不救其絲或有生三兩條者治法以針橫截紅絲所至之處刺之止使血出以膏敷之更不發動即愈矣此症得於喜怒不節血氣逆行而生內翰洪舜俞以惡瘡生齶上久不治嵇名內疳瘡初如蓮花痔根蒂小而下垂大治法以勾刀決斷其根燒鐵器令七八分赤烙之以止血次以雄黃輕粉粉霜香白芷白蘞為散敷其上令病人側臥以槐枝作枕以支其牙頰間毋使口合一兩時許瘡瘢定令病者自便治日得膿便漸治之愈若此證久不治即四邊肉漸成死肌法用槐枝枕支起病者牙勿使得合以小鐮去惡肉令盡即撒生肌散止仍用乳香膏護之自非飲食時且令病人側臥支其牙夾毋使口合則津液不衝動瘡藥三日後肌肉漸生才可病人自便無所礙矣洪內翰云此證若醫家不識則無治法以至不救良可惜也此證得之作勞氣血虛憊方蒼耳膏蒼耳子二合荊芥子二合葵子二合黃蠟十兩木香白狗糞石長生當歸藁本玄參丁香黃芩干馬齒雄黃研細末蝦蟆灰乳香研一兩上細銼以豬脂三斤煎三二十沸濾去渣次下乳香蠟又煎三兩沸候冷入雄黃蝦蟆灰攪勻以瓦器盛密封使塗於故帛上敷日三度換之千金托裡散治一切瘡腫發背疔瘡黃耆一兩半厚朴二兩川芎一兩防風桔梗各二兩白芷一兩連翹二兩芍藥官桂甘草人參各一兩木香沒藥各三錢乳香二錢當歸半兩上為細末每服三錢酒一大盞煎三二沸和滓溫服諸疔瘡方生髮拔一丸如雞子大攤在一尺緋絹上雄黃一豆許皂莢刺二十一針赤小豆二十一粒上粗末撒放發上卷熟緋絹作一圍外用發繩十字縛定熨斗內烈火燒帶性為末入地骨皮末焙之作兩服空心酒下治疔瘡方黃連羌活白殭蠶青皮獨腳菜防風赤芍藥獨活蟬蛻細辛甘草各等分上㕮咀每服五錢先將一服入澤蘭葉少許姜十錢重同擂爛熱酒和服然後用酒水各半盞姜三片煎服病勢退減後再加大黃少許煎服略下一兩場湯去餘毒更用白梅蒼耳子研爛貼瘡上拔去根腳一方無獨腳菜返魂丹治十三種疔瘡硃砂膽礬各一兩半血竭銅綠蝸牛各一兩生用雄黃白礬各二兩枯輕粉沒藥蟾酥各五錢麝香少許上為末和搗蝸牛蟾酥極爛和藥時旋入藥內為丸如雞頭大每服一丸令病人先嚼蔥白三寸吐在手心內將藥丸裹蔥白內用熱酒一盞吞下如重車行五里許有汗出即瘥如不能嚼蔥爛令研裹藥下曾有一僧貨此藥極有效予合救人累效真妙方也破棺丹治疔黃走徹不止甘草京三稜各三兩山梔子牽牛各二兩地黃連翹銀花牡蠣赤芍當歸各二兩大黃三兩半上為細末煉蜜為丸如彈子大每服一丸用童便化開服之食前忌酒生破物紫金膏治疔瘡龍腦輕粉膽礬各二錢沒藥四錢乳香三錢巴豆蓖麻仁研黃丹石灰蕎麥淋麝香少許上為細末熬五七次灰水與蓖麻子仁熬再與金膏藥內托連翹散疔瘡出時皮色不變及不疼痛按搖不動身發寒熱便是此瘡有魚睛疔紫硯疔諸般疔瘡如瘡黃上用針刺仍服內托散自然消散連翹一兩甘草一兩半大黃七錢薄荷七錢黃芩半兩朴硝二兩白芷赤芍生地各一兩黃梔七錢上為粗末每服一兩水一碗燈心竹葉煎七分如其人喘加人參少許大病只三四服如服了心煩嘔用不二散止不二散以甘草半兩豆粉一兩分作二服酸齏水下神效回疔膏治諸般疔瘡惡瘡瘤痔桑柴棗柳柴谷杆草施風草蕎麥秸各一斤雞糞石灰各四兩五錢上除石灰外俱燒灰用滾水淋汁一二碗熬至半盞用鍋底煤相調成膏如瘡不破將瘡撥破搽之不過三度全可如熬藥忌婦人雞犬見之並忌諸般惡物聖力散治諸疔瘡腫草烏頭白芨白蘞木鱉子金毛狗脊地龍各二錢半麝黃丹各少許上研為末用針到生肉痛者用藥黃水出為度奪命丹治疔瘡發噁心及諸惡瘡蟾酥半錢硃砂三錢輕粉半分白礬一錢寒水石一錢銅綠一錢麝少許海羊二十個令研即蝸牛也上為細末將海羊令研為泥就藥一處丸如綠豆大如丸不就時好酒成之病輕者一丸二丸重者三丸未效再服服藥法先將生蔥白嚼一大口極爛置手心丸藥合以熱酒送下臥汗出為愈立馬回疔丹治疔瘡走徹不止金腳信蟾酥血竭硃砂輕粉各半錢龍腦麝一字沒藥半錢上為細末生草烏頭汁為錠如麥子長大用時將瘡頂刺破將藥一錠放瘡內第二日瘡腫為效走馬赴筵丹治疔瘡沒藥乳香硼砂硇砂雄黃輕粉各三錢片腦一分麝香少許上為細末蟾酥汁為丸如黃米大每服一丸用酒送下奪命返魂散治一切疔瘡發寒熱昏悶不語不思飲食並治之大黃連翹山梔各二錢半巴豆杏仁加牽牛頭末人言五錢用大蒜五個去心填入人言同燒過性為末苦丁香一錢上為細末每服重者一錢輕者半錢用新汲水調下見效如病重無脈吃下藥一頓飯時吐了藥便醫不得治疔瘡蟾酥半錢硃砂三錢輕粉半錢血竭一錢蝸牛一十八個放二三宿如黃米色研枯礬二錢銅綠一錢花蕊石五錢上為細末蝸牛令研為泥同藥丸如不就加青酒和丸如綠豆大每服一丸生蔥三五莖嚼入藥內熱酒送下如行五里汗出為效用青金散塗之勿食冷水青金散寒水石二錢枯礬銅綠輕粉人中白各二錢炒麝蟾酥上為細末不以多少先用竹針刺破四邊貼藥其疔瘡自破立效走馬赴筵丹金信雄黃巴豆輕粉硃砂百草霜各二錢片腦少許麝少許上為細末蟾酥為丸芥子大每服一二丸入消毒丸三四丸冷水送下六月中伏修合忌雞犬婦人見之消毒丸白丁香二錢黃丹一錢巴豆一錢上為細末水打麵糊為丸如蘿白子大每三四丸入赴筵丹二三丸冷水送下飛龍奪命丹天南星半夏巴豆去皮心各一錢硇砂信黃丹乳香斑蝥十六個去翅足麝少許上為細末用五月五日蟾酥和合為丸如黃米粒大每服三五丸或七丸或九丸隨人虛實加減以無灰酒送下瘡在上者食後在下者食前服如瘡大者加丸服藥後忌熱食熱湯冷水一二時辰其瘡並不犯刀後疔自出無事忌油膩葷腥濕面五七日服藥後覺瘡痛皮膚紅是藥之效也如患者昏憒牙關緊者斡開口灌可治服藥後飲涼酒數口藥疾行也丁香散治疔腫等瘡丁香七枚緋帛曲頭棘刺臘月大豆黃各一兩母豬屎鹽一分亂髮蒼耳子上將七味以緋帛裹於熨斗內火燒令研為散每服二錢匕空心酒下蓋取汗若無汗任飲酒以汗為度奪命丹治疔瘡毒氣向里邪氣入內水食不下並皆治之兼治癰疽大有神效硃砂膽礬真血竭銅綠各一錢枯白礬二錢雄黃三錢蟾酥輕粉各半錢上為細末麵糊丸如梧桐子大每服一丸先用蔥白三寸令病人自嚼碎連藥熱酒送下睡如重車行五里之久汗出或發熱一陣即愈或利為度如病人不能嚼蔥擂碎蔥白裹藥如前吞服如不省人事斡開口灌之病在上食後服病在下食前服一方用蝸牛一錢生用與蟾酥同搗入回瘡蟾酥錠子出外科精要治疔瘡毒氣攻心欲死以針刺其瘡向心行處但覺痛有血氣下錠子若累次止心痛則近皆不痛無血者急針百會穴痛有血者下錠子若無血以親人熱血代之猶活三四況瘡初發如何治之無不效大抵疔瘡生於四肢及胸背頭頂骨節間唯胸背頭頂最急初生痛癢不常中陷如釘蓋撼之有根壯熱噁心是也天南星款冬花巴豆仁黃丹各一錢獨活半錢白信一錢斑蝥去頭足十個上為極細末用新蟾酥和藥如黍米大捻作錠子每遇疔瘡先以針刺其瘡必不知痛者有血出者下錠子如覺痛不須再用若更不知痛在所瘡行處迎奪刺之至有血知痛即止其元瘡亦覺疼痛以膏藥敷之膿出自瘥用錠子法度以銀作細筒子一個約長三寸隨針下至瘡痛處後以銀絲於筒內推至痛處天疔散出外科精要專治一切疔瘡及惡瘡初生以藥塗之急服托裡內消散雄黃一兩香白芷二錢山丹花蕊二錢牛蒡根採去皮天丁名皂角刺蒼耳菜大力子各半兩上五月五日受氣修合為細末每用好醋塗紙封之疔瘡上有黑甲者必須胡桃油浸次塗之自可赤芍藥散出濟生拔粹方專治一切疔瘡癰疽初覺增寒疼痛金銀花赤芍藥各半兩大黃七錢半枳實二錢栝蔞大者一個當歸甘草各三錢上為末水酒各半盞煎至一大盞去渣溫服不計時候地骨皮散出聖濟總錄專治疔腫地骨皮半兩小麥麻子各十粒燒灰緋帛曲頭棘刺半夏炒亂髮一團如雞子大燒灰上研和勻令每服二錢空心溫酒調下至曉再服蒼耳散出聖濟總錄凡疔腫塗敷諸藥後如犯觸者蒼耳子二七粒露蜂房一兩棘刺二十七枚緋帛方五寸亂髮青蒿二七莖丹砂一分研別入上將六味銼碎於熨斗內燒灰細研為散入丹砂末和勻每服二錢空心溫酒調下日曉再服保生錠子一名拔毒膏出神效方專治疔瘡背疽瘰癧一切惡瘡金腳信二錢雄黃三錢輕粉一錢硇砂三錢麝一錢半巴豆四十九個另研文武炮用尤妙上為細末用黃蠟五錢溶開將藥和成錠子冷水浸少時取出旋丸捏作餅子如錢眼大將瘡頂撥開每用點一餅次用神聖膏藥後服煎十五味千金托裡散若瘡氣入腹危者服破棺丹上方加蟾酥不用蠟止為末尤妙破棺丹出濟生拔粹方此即調胃承氣湯煉蜜丸是也山梔子牽牛末大黃各一兩甘草京三稜炮各七錢上煉蜜丸如彈子大酒化服之忌冰水透骨散治一切疔腫惡瘡其效不可盡述蟾酥半錢八角兒五個去殼硇砂輕粉麝少許巴豆一錢去皮上先將巴豆研如泥次下余藥同研極細以油紙裹定如有瘡並諸般惡用針微撥破貼藥少許其瘡自消散如不散者亦追瘡毒即得潰塌又如成膿無頭癰疽腫微撥破用藥二次便得自破凡療惡瘡可用牛黃丹一名枸杞散出鮑氏方專治十三種疔亂髮雞子大一團牛黃梧子大反鉤棘二十七枚赤小豆七粒緋帛方一尺地骨皮二兩末上枸杞其藥有四名春名天精夏名枸杞秋名卻老冬名地骨春三月上建日採葉夏三月上建日採枝秋三月上建日採子冬三月上建日採根凡四時初逢建日取葉枝子根等四味並炮干若得五月五日午時各和太良如不得依法採者但一種亦得用緋繒一片以裹藥取匝為限亂髮牛黃反鉤棘針末赤小豆末先於緋上薄布亂髮以牛黃末等布上曝即卷緋繒作團以發作繩十字縛之熨斗火熬令沸後間即搗作末取枸杞四味合搗絹篩取二匕和合前一匕共為三匕令相得又分為二分早朝空心溫酒服一分日二為之也齊州榮姥方出千金方大凡是疔腫皆用治之牡蠣九兩鍾乳二兩枸杞根皮二兩白姜石一斤軟黃者白英石一兩桔梗一兩半上各搗篩合和令調先取伏龍肝九升為末以清酒一斗二升攪令渾澄清取二升和藥捻作餅子大六分厚二分其濁滓仍置盆中布餅子於籠上以一幅紙藉盆上以泥酒氣蒸之仍數攪令氣散發經半日藥餅子干乃納瓦缸中每一重紙一重藥遍布勿令相著以泥密封三七日干以紙袋貯干處舉之用法針刺瘡中心深至瘡根並刺四畔令血出以刀刮取藥如大豆許納瘡上若病重日夜三四度著輕者一二度著重者二日根爛出輕者半日一日爛出當看瘡浮起是根出之候若根出已爛者勿停藥仍著之藥甚安穩令生肌易其病在口咽及胸中者必外有腫異相也寒熱不快疑是此病或清水和藥如二杏仁許服之日夜三四服自然消爛或以物剔根出即瘥若根不出亦瘥當看精神自覺醒悟合藥以五月五日為上時七月七日次之九月九日臘月臘日皆可若急須藥他日亦得要之不及良日也修合須清淨處燒香毋令孝子不具足人產婦六畜雞犬等見之凡有此病忌房室豬牛雞魚生韭蔥蒜胡荽酒醋面等若犯觸諸忌而發動者取枸杞湯和藥服並如後方二方以後方最是真本趙姥方姜石二十五兩牡蠣十兩茯苓三兩枸杞皮四兩上四味各搗篩合和先取新枸杞皮切六升水一斗半煎取五升去渣納狗尿二升許攪令調澄取清和前藥熱搗作餅子陰乾病者以兩刃針當頭直刺瘡痛徹出針刮取藥末急納瘡孔中勿令歇氣並遍封瘡頭上即脹起針挑根即取出重者半日以上即出或已消爛挑根不出亦自瘥其病在內者外當有腫相應並皆惡寒發熱疑有瘡者以水半盞取藥如桐子大五枚和服之日夜三服自消若鬚根出服藥一日以雞羽剔吐即隨吐根出若不出根亦自消爛在外者亦日夜三度敷藥根出常敷勿住即生肉易瘥若犯諸忌而發者取枸杞汁一盞和藥末一錢匕服之日二三服並單飲枸杞汁彌佳又以枸杞汁攪白狗屎取汁服之更良合訖即用不待乾所言白狗屎是狗食骨其屎色如石灰故直言狗白屎也如預造取五月五日七月七日九月九日臘月臘日者尤良神驗或有人忽喉中痛乍寒乍熱者即是其病當急以藥療之無故而痛惡寒發熱者亦是此病但依前服之立瘥前後二方同一法亦主癰疽取疔瘡藥治一切疔腫懸癰出千金方用蒼耳莖根苗但取一束燒為灰醋泔藍靛和如泥先以針刺瘡口上四邊數下令血出度藥氣可以入針孔中即出血敷藥干即易之不過數度即拔根出其內消已結膿破潰者再不用針刺即以藥塗之余以正觀四年忽口角上疔腫造甘子振家母為帖藥經十日不瘥余以此藥塗之得愈常以此藥救人無有不瘥者故特論之以傳後嗣疔腫方殆有千首皆不及此雖齊州榮姥方亦不能勝此勿造次更易也又方出千金方用蒼耳草又名半員來草只用根紅軟者擂爛無灰白酒調勻服次用鹽梅肉研爛以豬膽汁和塗瘡頂上其毒即散又先用好京墨薑汁研爛用薑片蘸墨塗四圍腫熱處即效一方止用蒼耳子根葉童子小便絞取汁令服一升日三或燒灰和臘月豬脂敷一方以苗搗汁飲之滓敷一方或子或葉或根研爛米醋腳調塗腫立散如已去肉疔了再敷仍研汁服以瘥為度治疔瘡方用筀竹筒一個刮去竹青要見竹黃為度兩頭留節只於一頭節上鑽一竅如綠豆大卻將綠豆入於筒內令滿舊綿絮口小或用白紙塞其竅用磚一塊繫縛竹筒上又用長繩一條帶墜沉於寺觀側坑內半年或三月愈久為好卻取竹筒洗淨破其竹筒取出豆於長流水洗一日取起候水乾研丸如丁香相似約四分長再陰乾收起如有疔瘡用針於瘡畔鑽一兩竅將藥插入竅內其疔毒自潰而出隨症去毒藥疔腫方出本草以荊芥一名假蘇為末和醋敷一方切以水五升煮取二升冷分二服亦辟邪毒氣治疔瘡腫甚者出聖惠方用附子末醋和塗之干即再塗治疔腫方出本草以斑蝥一枚捻破針劃瘡上作十字封之根乃出連翹散連翹當歸尾羌活獨活防風赤芍赤小豆各五錢大黃二錢木香辛夷慈菇薄荷紅內消杜白芷升麻甘草忍冬草各三四錢不拘若潮不退加黃芩梔子仁各三錢朴硝四錢上為末酒調服不拘時候薄荷湯亦可喘加人參大病三四服愈如頬嘔甘草半兩豆粉一兩為末酸齏水下如割瘡去了疔子止血用毛鐵甲為末敷口角瘡方出危氏方霜梅十個大黃五錢上為塊子用石灰炒過去石灰入黃丹為末乾摻瘡口上滴滴金治疔硇砂輕粉人言雄黃硃砂各一錢麝香少許上為細末瘡頭上針刺開貼藥黃水出效麝香丸治疔瘡又治諸氣發背木香一分胡椒巴豆二十四粒全蠍七個麝香少許上為末泡蒸餅丸如綠豆大硃砂為衣溫湯下量人虛實三丸七丸十丸服之硇砂散出宣明論治一切疔瘡硇砂雄黃砒霜天南星各等分麝香少許上研為細末用竹針開用藥封黃水出瘡已疔瘡錠子蒼耳白芷甘草雄黃各半錢硇砂一錢上研細末用活蝦蟆擠出腦髓和五味酥為錠子五月五日午時修合白牙塗敷方出聖濟方治疔瘡毒白牙燒研附子搗為末雄黃研半夏各半兩豬脂四兩上將四味搗研為末以豬脂調如糊先針刺瘡頭即塗敷日三五藥貼之少時如病深取疔病淺即取出黑紫色血即愈又方用核桃一個平開二片取出肉用口嚼碎卻將肉安放半片殼內頭上留一竅合在瘡上即痊可又方出聖惠方治惡腫疔瘡及雜瘡先灸瘡上三度以鍾乳末六錢及醬粒研敷上須臾拔根盡出又方出聖惠方用益母草莖葉搗爛敷瘡上又絞取汁五合服之即內消又方出聖惠方用竹箭桿刮取茹作炷就上灸之二七度治疔根入腹方出聖惠方取牡豬糞和水絞汁服一二合立瘥又方出聖惠方用鬼傘形如地菌多叢生糞堆上見日消黑者取燒灰以針刺瘡四邊至瘡痛作孔納藥孔中經宿瘡發用鑷拔根出治疔腫出本草用獨竹根細搗水調敷之治疔腫出根出本草以䖦蟱作膏塗之飛龍奪命丹治一切惡疔瘡硃砂南星半夏黃丹血竭乳香沒藥硼砂硇砂各二錢人言三錢麝香少許巴豆十二粒斑蝥十一個上為細末蟾酥為丸如紅豆大五分中一分加斑蝥二個人言少許捻成錠子如半粒小麥大每一瘡針破見血下錠子一粒飯黏白紙封護用藥一丸噙在舌上覺麻冷水吞下忌熱物片時重者隨時服藥不必盡劑一服時黃水流出為妙病原先癢後痛先寒後熱如傷寒病忌房事並諸毒物魚腥凡病人眼紅見火光難治蟾酥乾用化開為度鐵粉散專治冷疔瘡經年不效用此藥大妙多年生鐵三兩炒黃丹半兩麝少許輕粉少許松脂一錢道人頭微炒存性一兩硇砂三錢半雄黃三錢加蟾酥不以多少尤妙上將瘡四圍刺破以小油調藥末置於瘡內緋帛封之數日疔自出如瘡入腹嘔逆者煎道人頭濃汁飲之五香湯治疔腫破毒氣沉香藿香雞舌香青木香薰陸香各二兩射干三兩升麻四兩鱉甲二具炙去黑皮藍實五合大黃犀角各二兩鹿齒六枚炙烏梅十四枚上以水九升煮取三升分為三服一方有楓香無薰陸香以水一斗五升煎至一斗淋浴腫毒處名五香膏回瘡錠子治疔瘡大效草烏頭一兩蟾酥巴豆七個麝上為細末麵糊和就捻作錠如有惡瘡透頂不痛無血者用針深刺到痛處有血出用此錠子紝之上用膏藥貼之疔瘡四畔紝之其疔二三日自然拔出此藥最宜緊用此症大抵與傷寒頗類其中亦有可針鐮出血者亦有久而敗爛出膿其間變異百端不可不慎也治疔瘡方土蜂窩穿山甲茄根海螺殼各等分上研極細用臘豬脂調為膏每用指頭蘸藥於瘡磨之又蘸又磨待瘡化黃水出盡即日痊神效白石脂散治紫靨疔瘡不疼遍腫腋下有根如雞卵白石脂燒赤石脂各半兩雄黃一分乳香二錢案本方缺製法及服法日本國敷治疔瘡巴豆塗方巴豆十粒半夏一枚附子半枚蜣螂一枚上各為末以人糞相和看瘡大小作紙圈子圍瘡口以藥泥瘡上絹貼之一日三易治疔腫瘡毒方川大黃五錢牽牛二錢半故紙二錢半大律系牛蒡子二錢半上為末用好酒吃一錢一方用酒調服又方生大豆黃三十二枚全者緋頭三條如無用五寸緋代亂髮雞子大一團上以緋裹亂髮牢纏於灰火上燒得黑煙欲盡即出之冷入瓷器中研如粉以酒空腹服之方寸匕平明至午時覺四體舒通覺瘡輕即瘥如未依前服之瘥止若犯之瘡即出膿血未經犯六七日平貼忌如常服又方療疔瘡蜂窩七枚直緋手大亂髮拳大上各燒為灰作末酒一小升和服之瘥止未瘥作之一方溫水調下奪命輕粉散治疔瘡不出疔鐵渣一兩輕粉二錢麝香少許上研為細末每瘡用針開十字口將藥放入瘡內用醋調麵糊敷貼神效青金散治疔黃柏人言黃丹上為細末各等分針開破貼上黃水出立效又方旋腫人言一分白礬甘草各三分上為細末瘡圍挑破敷藥治疔瘡方附子去皮巴豆去皮胡粉各一兩上為末用烏麻油調膏先以針刺瘡四邊血出即以藥封之其四面亦以藥蓋勿令泄氣其根自出又方治疔腫石灰三分馬齒菜二分上搗以雞子白和敷之一方二味等分末之夾破好肉然後納藥於孔中即妙犯疔瘡方上瘡根爛再塗以瘥為度大黃散出聖濟總錄治疔腫敷方大黃銼炒秦艽去土藜蘆去頭石硫黃硇砂各一兩上將前三味搗羅為散與後二味研者和勻水調塗敷日三五次以瘥為度治疔腫方乾薑胡椒龍骨斑蝥皂莢各一兩上搗篩為末以酒和封貼日一度更服後藥消毒散出濟生拔粹方治疔瘡毒氣入腹昏悶不食丁香乳香各一錢蟬殼貫眾紫地丁各半兩上為細末溫酒調下二錢神仙金丸出經驗良方治疔黃入發癰疽諸般惡瘡乳香沒藥各二錢巴豆四十粒海浮石半兩草烏頭一兩炒上為末醋麵糊丸如綠豆大三二日瘡服十丸五六日瘡服十五丸瘡在上食後瘡在下食前服如嘔吐再服三四丸凡服先以冷酒一盞送下服藥後忌食熱物一時如瀉多用冷白粥補之土鬼丹出直指方治疔腫金頭蜈蚣一條膽礬銅綠白賊骨各一錢麝上細末以紙捻蘸麻油黏藥引入瘡中如瘡頭硬即灸破或針刺破然後入藥紫金丹治諸般疔瘡人言硃砂雄黃各一錢巴豆四枚硇砂一錢半上為細末棋子面相和錠子紝在瘡內立效四聖旋丁散治疔瘡生於四肢其勢微者巴豆仁半錢白殭蠶輕粉硇砂各二錢上為細末先以好醋調藥塗上以紙封之次服托裡之藥其疔根自出蒼金砂散出濟生方取疔瘡蕪菁根鐵生衣各等分上和搗以大針刺作孔復削蕪菁根如針大前鐵生衣塗上刺孔中又塗所搗者封上仍以方寸匕緋帛塗貼之有膿出即易須臾拔根出立瘥忌油膩生冷等物紫金丹治疔瘡白礬四兩丹二兩用銀白石器內熔礬作汁下丹使銀釵子攪之令紫色用文武火毋令太過不及如有瘡先以周迴挑破上藥用唾津塗上數度著毋令瘡干其瘡潰動取疔出也兼瘡顏色紅赤為效如藥未成就再杵碎炒令紫色二黃散治疔瘡雄黃雌黃上等分為末先用針刺四圍及中心醋和塗之一方加麝治疔瘡最有功效方蟬蛻殭蠶上為末酸醋塗四圍留瘡口俟根出稍長然後拔去再用藥塗瘡一方不用醋用油調金砂散治疔瘡硇砂雄黃上等分研細用生蜜就於角盆子內收貯用遇患先用銀篦兒挑破瘡口去惡血然後用一豆大藥安入瘡內用紙貼即效毒氣入腹多嘔吐欲死者即服內托香粉散內托香粉散滴乳半兩綠豆粉一兩上為細末煎生甘草湯調三錢時時飲之常令灌潤胸膈治疔瘡危篤者二服即愈輕者一服立效方土蜂房蛇蛻各一具上作一處器皿中盛用黃泥封固火煅存性研為細末每服一錢空心酒服少頃腹中大痛痛止其瘡已化為黃水仍服五聖散五聖散大黃生薑各一兩栝蔞一個皂針二兩甘草一兩銀花一兩半上為㕮咀用好酒二升同煎八分去滓服不拘時候耆老丹治一切疔瘡發背惡瘡等疾白浮石半兩沒藥二錢上為細末醋糊為丸如桐子大每服六丸冷酒送下白膏藥治疔瘡及一切惡瘡官粉四兩芝麻油九兩上為砂銚內文武火慢煎不宜大火火大色黃火小透油也又方疔腫塗敷諸藥後如觸者棘刺銼陳橘皮二兩上以水五升煎至一升半去滓分溫三服空心白酒日午晚間各一以瘥為度治疔腫斑蝥敷方斑蝥一枚蒜皮一片上取針撥破瘡頭納斑蝥於瘡口中以蒜皮蓋定日一度瘥治疔腫胡麻塗敷方胡麻燒灰針砂上和勻研細用醋調如糊塗腫上日三易瘥治疔腫毒氣二灰散塗方棘針三枚丁香七枚上同於瓶內燒令煙斷研末以滿月孩子糞和塗腫上日三兩度瘥又方半夏生用石灰等分上搗末以敷瘡上必效療疔瘡方舊廁清絞取汁青竹茹燒作灰上研和清攪一百遍稀調成膏刺瘡四邊令遍先以唾和麵瘡四面瀉藥漸漸令滿其中仍三五度換之晬時瘡爛挑拔去根即瘥根未出更著之神效又方巴豆二七枚去皮半夏一七枚搗末上以寒食餳和之以針刺瘡四邊令微到底即以藥塗之立拔出以澤瀉末填瘡孔中便瘥又方療疔腫鼠屎亂髮上等分燒作灰針瘡頭納藥大良治疔瘡無問雌雄方鐵粉一兩蔓荊根三兩上搗和如泥封腫上日三換之治惡腫疔瘡及雜瘡方皂莢一兩去黑皮麝一兩研上為細散入麝和勻以人糞少許和如泥塗封五日後開之根自出矣又方治疔腫用老鴉眼睛草擂碎酒服又方以鼠新坌土以小兒屎和敷之又方以鐵衣末以人乳和敷之立可又方以小豆花為末敷之瘥又方以四神丹一枚當頭上安經宿根即出又方以銀蓽茇破瘡皮唾津調野灰菜灰些小點上血出為度又方以面和臘月豬脂封上瘥又方以蒺藜子一升燒灰醋和封上經宿便瘥又方以皂角子取仁作末敷之五日內瘥玉山韓光方治疔腫以艾蒿一擔燒作灰以竹筒中淋取汁一二合和石灰如面以針刺瘡中至痛即點之點三遍其根自拔亦大神驗正觀中用治三十餘人得瘥又方出聖惠方用黑牛垢封之又方出千金方以雌黃研一分為細散每日三五度敷腫上如干用醋塗以瘥為度一方針刺四邊及中心塗雄黃末神驗一云塗黃土蟾蜍膏出危氏方治疔腫取蟾酥以白麵黃丹搜作劑丸如麥顆狀用指甲爬動瘡上插入重者針破患處以一粒納之仍以水沉膏貼之取蟾酥法用蟾蜍破於眉稜上以手捻出酥於油紙上或桑葉上用新瓦盛下然後插在陰處經宿則自乾白於鵝翎筒內盛之或加蒼耳子沒藥乳香血竭血竭真者輕浮入口甜味水沉膏出危氏方以白芨末半錢水盞內盛下澄去水卻皮上攤開貼瘡上治數種疔瘡方用大青葉是處山內有冬間無類枇杷葉又取臭紫草及馬蹄草各等分擂爛酒一碗浸藥濾去滓燙溫酒服三服立愈春夏取葉草擂作餅干如用再擂酒溫服又方車輻軸脂白鹽蕪菁根釜底墨各等分上為末和以臘月豬脂封上以酢及水和敷之並得又方白馬齒亂髮髑髏各一兩枸杞白皮三分上燒作灰以酒服方寸匕不瘥至二專治疔瘡出神效方用生蜜與隔年老蔥去須葉用白一處研成膏先將瘡用竹篦刺破然後用葉於瘡上攤之用緋白蓋覆如人行二十里覺疔出然後以熱醋湯洗之立瘥治疔瘡方取蟾酥油調封口立效又方出本草用苦蕒根搗爛敷之又方出聖惠方以白蘞為末敷之又方出肘後方以針刺斷四圍用石榴末著瘡上以面圍四畔灸以痛為度灸訖以石榴末納瘡口內急封之經日根自出愈若大赫瘡已灸之以蜣螂乾者末之和鹽水塗瘡又方取前藥以帛貼著仍取半錢藥和水服之止心中毒氣更有趙婆婆藥常用大效方在大方中宜五月預合又方取蒼耳草節內蟲七七四十九條捶破入人言些小再捶成塊用針將患處刺破見血乃用此藥封在瘡上其疔用手撮出愈救疔瘡方以十二月豬膽風乾和生蔥搗碎塗諸般疔瘡白殭蠶散治疔腫敷方以白殭蠶半兩炒為末刮開瘡頭上敷之日三根爛即出一方用水調封之又方出千金方以鐵漿不限多少每日食後飲一盞即瘥又方出千金方治疔瘡刺瘡頭及四畔令汁極出搗生慄黃敷上以面圍之勿令黃出從旦至午根即拔矣又方出千金方以面圍瘡如前法以針亂刺瘡銅器煮醋令沸瀉著面圍中容一盞冷則易之三度根出即愈又方出聖惠方取蛇蛻皮如雞子大以水四升煮三四沸去滓頓服立瘥一方燒灰或炙焦為末雞子清調塗治疔瘡出本草以鏨菜搗碎敷之治疔瘡方以棘十枚放置瘡上以荻箔繩作炷灸瘡上根即出治疔腫垂死出聖惠方以菊葉一握搗汁服一升入口即活冬用根一方用根舂細合患處用些鹽舂即愈治疔瘡出仁存方以馬齒莧燒灰和多年醋滓先灸疔腫以敷之一方馬齒莧和梳垢封之根出治疔瘡海上方用蟬殼七個煅為細末用蜜調搽瘡口又以磁石末細研醋調敷立拔根出又方亂髮雞子大一團緋帛方三寸棘刺七十枚蒼耳三七枚上合燒作灰研成散每以半盞水許服方寸匕日二三瘥止慎風熱忌同前慮有犯觸加鹿角鱉甲蜂房三物等分燒灰為散若有犯者依前服之甚效治疔腫病忌見麻勃見之即死者胡麻燭燼針砂各等分上為末以醋和敷之神仙追毒丹大黃芒硝牛蒡子各一兩半上為細末煉蜜為丸硃砂血竭為衣如彈子大童子小便化開空心溫酒服一捻散治疔子全蠍蟬蛻人糞下土各等分上研末蜜調為餅子拇指面大當三錢若遇患每一餅入香油一盞中大頓滾三四沸停溫服油滓敷瘡上用圈子扎定對周疔自拱出一捻金散治疔疽惡瘡不出疔內消蒲公英取汁鹽泥生人腦耳塞是也後二味各等分上為末用蒲公英掘折取白汁和二味為小餅兒有瘡用竹刀割破上一餅用膏藥封貼大有神效此藥定疼內消蛇蛻散治疔腫兼治瘡口內久不合蛇蛻皮一兩半露蜂房半兩亂髮雞子大一團童子便炒上銼碎於熨斗內燒灰細研為散每服二錢空心米飲調下蓋覆出汗更服一方云露蜂房並用五月五日採忌七日不得食鹽酒肉五辛等物疔瘡方出本草以鸕鷀屎和豬油封上瘥疔瘡方出本草以生薺苨根取汁一合去滓敷不過三治疔腫患火丹瘡方以龍葵和土杵敷之尤良治患疔腫中風頭痛者方以驢馬屎熨瘡滿五十遍極效治疔腫方以五月初三日採取旱蓮草焙乾須要天色晴明之夜有露時露過七日遇有瘡腫齧碎放瘡上以消毒膏貼之二三日疔脫仍服敗毒散數服凡七十二種皆治之但七日傳經者不治備急療疔腫姚方云疔毒為瘡肉中突起如魚眼狀赤黑痠痛是寒毒之結變作此疾始作服湯及如療丹法便瘥又支太醫云有十三種疔瘡初起皆患寒熱又三十六疔亦是其十三種數內或今日生一明日生二或生三或生十滿三十六疔皆療之方出肘後方以蛇皮炙末和鼠矢以針刺破瘡納中即拔出瘥又方出聖惠方取馬牙齒燒作灰先以針刺破瘡令破以灰封之用面周匝圍之候腫軟用好酢洗卻灰其根即出當便瘥一方搗末臘月豬脂和敷之根即拔又方出千金方以針刺破瘡頭取人熱糞塗上干易之不過十五遍即出又以硇砂封上熱毒入腹以枸杞根切煎服之如犯觸亦然加干糞亦得若犯瘡未死者灌廁清大一升亦瘥一方人糞尖敷又方以五月五日取牡狗矢燒作灰敷瘡數易之
