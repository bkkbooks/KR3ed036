body:
  text: 卷二百七十七諸瘡腫門漆瘡附論夫漆雖有毒性有所畏毒即中之亦有氣適然相近者中毒有輕者癢始於面而胸臂膝腨應之頭面腫起赤繞於目搔之隨手生㾦癗已而細瘡如粟重則遍身作瘡小如麻豆大如棗李腫焮痛楚旋瘥旋發如火灼之狀是也此疾雖有小著遍身頭面似疹乳腫生瘡痛癢毛髮脫落心煩恍惚不得睡因療之遲遂為他疾或便成風癩亦可畏也方四和膏方出聖惠方治漆瘡遍身焮赤疼痛麻油松脂各二兩黃蠟桂去粗皮為末各一兩上同熬成膏塗之黃松末湯洗方出聖濟總錄治漆瘡黃櫨一個鹽二兩上以水一斗煮取五升去滓洗之日三五度治漆瘡方出聖惠方以生柳葉三斤細切用水一斗五升煮取七升適寒溫洗之日三老柳皮尤妙又方出千金方以濃煮鼠查葉以洗漆瘡亦可搗葉取汁塗之又方出千金方以爛搗七姑草封之一云七姑草和芒硝塗之無芒硝即朴硝最妙韭熨之效又方出千金方以貫眾為末以塗瘡上干以油和之即愈又方出千金方以羊乳汁塗之又方出千金方以芒硝五兩湯浸洗之一方以水塗之又方出聖惠方以礬石著湯中令消洗之又方出千金方以啖豬肉嚼穄谷塗之又方出百一選方以穀精草煎湯放溫洗立效收稻了田間生矮根成株叢生如鼓槌而小者又方出百一選方以生薑汁搽亦得又方用煎杉木水洗即安數數用即除小兒尤佳治漆瘡面腫用大粟葉煎洗挹干以香油塗之鐵漿方出聖濟總錄治漆毒傷人以鐵漿濾隨量飲之以瘥為度或用鐵漿洗之豬膏塗方出聖濟總錄治漆瘡以豬膏五兩熬去滓停塗之蟹黃塗方出肘後方治漆瘡以螃蟹取黃塗敷瘡上日三五度或以水洗之數數洗亦效蜀椒湯洗方出聖惠方治漆瘡以蜀椒去目及閉口者一兩用水五升煮至三升去滓熱洗瘡上後嚼生糯米敷之荷葉湯洗方出肘後方治漆瘡以荷葉燥者一片以水一斗煎取三升洗了以貫眾末摻之干則以油和塗薤汁塗方出肘後方治漆瘡以薤搗取汁塗之煮薤葉洗亦佳地松塗方治漆瘡以地松一兩搗汁二合入芒硝一分和塗之雞子塗方出肘後方治漆瘡以雞子黃一枚塗瘡上干則易之不過三次治漆瘡出聖惠方以水煎黃櫨湯頻浸洗一云用汁煎洗最良一方入生油調塗立當退下瘡皮痛止也又方出聖濟總錄以糯米生研塗之治漆咬出肘後方用韭葉研敷之一云搗韭和塗之煮薤葉洗之佳治漆瘡以五月五日採苦芺微曝乾作灰可敷面目通身漆瘡亦取莖生食之但不可多食之耳又方出直指方以臘茶用麻油調塗之又方出危氏方以磨鐵槽中泥塗之磨刀石下泥亦得蕪湖二漆牙相爭其人以漆一桶自頭澆之其人患瘡幾死以此方治之而愈又方以蓬莪朮貫眾煎湯洗之又方以莧菜根煎湯洗之如無便清油搽亦可療猝得漆瘡方方闕又方以嚼秫米塗之又方以造酒小曲搗末粉之干即以雞子白和塗之良又方以挼慎火草若雞腸草塗之七姑草亦佳又方以鹽湯頻洗之大良又方以馬尿洗之瘥止又方出傳信適用方以蕓薹葉或用子搗汁塗之又方出聖惠方以青椒半兩醋醬一碗戎鹽五顆煎七沸以綿蘸塗之又方出聖惠方以蛤粉用新汲水調塗之又方出聖惠方以油麻子搗令極爛以蔓荊菜汁調塗之又方出聖惠方以槲樹皮一斤細銼以水一斗煎至六升溫溫洗之又方出聖惠方以櫸樹枝葉二斤細銼以水一斗煮取六升淋洗瘡上兼以葉搗絞取汁塗之治漆瘡出本草以糞藍煎湯洗之治漆瘡出本草以赤瓜煮汁洗瘡效治漆瘡出本草以好井水及土石間新出泉水飲之一方洗之即愈治漆瘡出本草以漢椒湯洗之即愈治漆瘡出本草用蚯蚓破之去泥以鹽塗之便成水敷之即效湯火瘡附論夫水火之氣當因其勢而利導之湯火誤傷毒熱方熾通導而泄其氣可也苟救目前痛楚遽以冷物淋溻則熱毒畏寒而內搏致有爛骨傷筋之患非熱氣本然也湯火之傷本非血氣所生之病故治不及於湯藥特在乎塗敷膏浴專治其外而已凡火燒慎勿以冷水淋之火瘡得冷熱氣更深轉入骨壞人筋骨難瘥初被火燒急向火更炙雖火痛難忍一食之久即不痛神驗治火燒悶絕不識人以新尿冷飲之及冷水和蜜飲之口噤撬開與之然後以下方治之方治湯火藥大黃黃芩黃柏黃連知母貝母乳香沒藥輕粉甘草密陀僧山梔子上碾為細末用雞子清加蜜調搽不住手掃本方藥等分臘鼠膏出聖濟總錄治湯火瘡除熱滅瘢臘鼠大鼠連毛一枚研丹研半兩琥珀研半兩乳香研蘆薈研石螺殼車螯殼蛤蜊殼各一兩上除鼠外搗羅為末用清油一斤黃臘並臘月羊脂豬脂各四兩並鼠入銀石器內同熬濃去滓次入麝香珍珠末各一分調勻盛瓷瓶內密封沉於井中二七日欲急用只少頃取上用鵝毛掃五七次立愈治中熱油及火燒除痛出本草以楓柳白皮燒為末敷之兼治灸瘡亦同妙治湯火瘡出本草用鉛丹敷之治火燒瘡令不著風水止血除賊風出本草以烏氈燒為灰酒下二錢七珍散治湯火瘡痛不可忍木鱉二錢去油大黃黃連黃芩黃柏鬱金各二兩梔子仁三錢上為細末小油調掃瘡上如聖散治湯火所傷清涼膏出聖惠方治湯潑火燒止疼痛解火毒潤肌生肉梔子仁黃連去須切白芷各一分生地黃二兩蔥白十枚擘黃蠟半兩清麻油四兩上細銼於油鐺中煎以地黃焦黑為度綿濾去渣澄清卻於鐺內入蠟慢火熬候蠟消傾於瓷合內每使時用雞翎掃小許塗瘡上取瘥為度治湯火瘡出千金方柏白皮蛇銜生地黃梔子仁黃芩苦竹葉各一分上㕮咀以羊髓半斤煎三上三下去滓塗瘥止麻子膏療火燒入肉壞爛麻子二合取仁碎柏白皮山梔子碎白芷甘草柳白皮各一兩上㕮咀以豬脂一斤煎三上三下去滓以塗瘡上日三治湯沃入肉壞爛出千金方杏仁附子三兩甘草一兩羊脂五兩松脂雞子大上㕮咀以不中水豬膏五兩煎塗之四黃散出衛生家寶方治湯潑火燒熱瘡腫痛大黃黃連黃柏黃芩白芨各等分上為末水調成膏用雞翎塗瘡上冰霜散出濟生拔粹方治火燎損傷漆熱毒傷皮爛肉大痛牡蠣燒明朴硝寒水石生青黛各一兩輕粉少許上為細末新水調次油調干貼痛處立止神效黃柏散出危氏方治湯火傷雞子殼黃柏皮朴硝大黃寒水石各等分上為末白水調塗極效治湯火瘡貫眾大黃寒水石知母黑狗脊各等分上為細末有膿者乾摻無膿者小油調敷又方出聖惠方連子草梔子黃芩胡粉柏葉各一兩上為細末以羊髓和搗稀稠日可三度以翎羽塗之此方去毒止痛無瘢痕甚妙止痛膏出聖惠方治灸及湯火所損晝夜啼呼止痛滅瘢羊脂松脂各二分豬膏蠟各二分上取松脂等於銚中切脂嚼蠟著松明上少頃銚火燒諸物皆消以杯盛汁敷之松明是把松本節也治湯火瘡出德生堂用廚房下溝泥塗治湯火瘡出危氏方黃連黃柏輕粉各等分朴硝少許上為末入清油用合子合住飯上蒸調塗立愈治火瘡方出千金方梔子四十枚白蘞黃芩各五兩上㕮咀以水五升油一斤合煎令水氣歇去滓待冷以淋之令溜去熱火毒則肌得寬也作二日任意用膏敷湯散治之治火爛瘡膏出千金方竹葉甘草各二兩柏白皮四兩上㕮咀以豬脂一斤半煎三上三下去滓冷以敷之集驗方用生地黃四兩神效當歸膏一名白膏方出聖惠方治湯火傷初起瘭漿毒侵展赤痛毒氣壅盛腐爛成膿斂瘡口生肌肉拔熱毒止疼痛當歸黃蠟各一兩麻油四兩上先將油煎令當歸焦黑去滓入黃蠟急攪之放冷入瓷合內每使時用帛子攤貼之一方有白蠟柏葉散出聖濟總錄治湯火所傷柏葉焙梔子仁各一兩胡粉研半兩上搗研為末以羊髓五大合熔銷和藥以木為研三五百遍一日三次塗之瘥赤石脂散出經驗良方治湯火所傷赤爛熱痛赤石脂寒水石大黃各等分上為末以新汲水調塗傷處神聖散治湯火所傷杏仁焦炒出衣粉子炒黃色牛糞燒灰上各等分為細末冷水調用翎毛掃之一方用香油塗治湯潑火傷出聖惠方黃丹一分黃連末一錢微炒檳榔一枚細銼微炒搗作末上為末相合勻先以鹽水淨洗然後以散敷於瘡上止痛散出聖惠方治火燒瘡桃膠松脂黃柏各半兩上為細散用梨汁生蜜調塗瘥換肌散出楊氏家藏方治湯火傷疼痛不可忍洗面腳三兩炒黃色柏葉一兩炒黃色上為細末用清麻油調稀翎毛搵藥拂傷處疼痛立止又方出聖惠方嫩樹上楸葉半斤濕者貓兒毛一兩蠟半兩上以油煎二味令焦濾去滓下蠟令消收於不津器中先以溫水洗瘡後用藥塗之治湯燙方出百一選方韶粉四兩臘脂一斤上用柳木槌於淨器中研千下淨瓶器收之遇火燙即敷上痛立止無瘢痕止痛膏出聖濟總錄治湯火所傷皮肉未破爛只熱痛者塗敷朴硝研一兩爐星灰是炭爐內火正盛時退卻火取熱灰放冷細絹篩取三兩上和勻冷水調如糊塗所傷處頻換即瘥立應膏出聖濟總錄治湯火所傷皮肉已破爛者生柏葉焙乾二兩糯米焙乾三兩上為細末冷水調如糊塗腫處頻換即瘥龍泉散出聖濟總錄治湯火蕩燒熱焮腫井泉石赤白脂各等分上研為細散油調塗薤葉膏出聖濟總錄治湯火所傷熱疼用之永無瘢痕薤葉半和白用赤石脂各一分上搗研如泥敷瘡上新瓦散出聖濟總錄治湯火所傷新瓦煅醋淬二十遍使過煉銀鍋子煅碎二十遍各五兩上搗研為散生油調敷梔子散出聖濟總錄治湯火所傷梔子仁白礬灰上等分搗羅為散用黃膠熬膏塗之又方用搗薤子塗立效拔毒膏出聖濟總錄治湯火所傷鉛丹炒過蛤粉研上不拘多少合研如桃花色為度生油調作膏濕紙壓干攤貼治湯火燒毒氣入腹即殺人宜利去之出聖濟總錄白扁豆生末白膩各二錢上同研熱水調服當瀉出毒小兒半服治湯火所傷神妙蓖麻子蛤粉各等分上為末研膏湯損用油調塗火瘡水用調塗雞黃膏治湯火所傷熱雞子十個取黃炒膩粉十文上攪勻用雞翎掃瘡上永除瘢痕治湯火灼未成瘡黍米曲等分為末上各熬令赤以雞子白和敷之一方用女曲大黃寒水散治湯火瘡大黃一兩生寒水石半兩上為細末清油調掃燒破處治湯火破瘡出聖惠方川大黃柏白皮各等分上為末以生地黃汁調塗之治火燒瘡急痛出聖惠方梔子二兩燒灰細研柳白皮二升切以豬脂二斤於鐺內緩火煎柳白皮焦黃去滓入梔子灰攪令勻成膏待經宿即用塗之治火燒瘡豬毛土糞各等分上並燒灰細研以生油調塗效又方出聖惠方寒食白麵半匙梔子仁一兩上為細末與面相和以新汲水調塗之鼠膏塗敷方出聖惠方治火燒瘡及灸瘡不瘥痛不可忍以死鼠頭一枚用臘月豬膏煎令消盡以敷之干再敷之瘥不瘢痕神效亦治小兒火瘡治火瘡敗壞及中熱油方以柏白皮切以臘月豬膏合淹相得煮四五沸色變去滓敷瘡上一云柏白皮末一斤以水五升煎至二升濾去滓熬成膏塗之即愈又方出千金方以榆白皮嚼塗之治湯火方出儒門事親以多年廟上𧉚與走獸為末小油調塗湯火處立效又方出儒門事親以牆上青苔燒灰小油調塗燒湯處又方出儒門事親以生地黃旋取新者爛搗取自然汁小油黃蠟少許銀石器中熬成膏子用雞翎掃瘡上治湯火蕩瘡無問新舊出外科精要以青槐枝一兩銼碎入綠豆粉一兩同炒黃色入輕粉一錢同為細末油調塗之止痛滅毒又方出儒門事親以血餘灰與臘月豬脂調塗之凡被湯火熱油痛不可忍方出外科精要取廨下黑淤泥量傷大小用多少次加老薑汁麻油十分之一共研勻搽傷處即愈一方以渠中青泥塗之又方出聖惠方以尿桶下濃腳搽傷處又方出外科精要以雄鼠糞兩頭尖者燒存性麻油輕粉塗即愈以上皆處處有之乃有奇效治中熱油及火燒除外痛出聖惠方以丹參八兩細銼以水調取羊脂二斤煎三上三下以敷瘡上愈治湯蕩火燒出海上名方用湯瓶中咸不以多少細研入膩粉少許用麻油調塗之又方出海上名方取淋過灰滓以水調得所即時攤於燒蕩處半寸許立效又方出海上名方取舊煎銀爐中燒過焦黃土研細如粉以生蜜調攤於帛上貼之瘥即止或用前金銀煉鍋唯是出火次數多者為上被傷即以冷水急於石上磨汁重重塗敷不見赤痕即止任其自干剝落是驗其間不要有一點如星許偶塗敷不慎輒起紅炮糜爛經月不瘥以此知此方神效也又方出海上名方以注竹末用新水調塗之治湯火瘡出十便良方以皂中土篩細以新汲水調敷即瘥一方以甘草末調塗之又方出仁存方用臘月豬脂調光粉研極細令勻敷又方出醫方集成用螺螄殼多少乾白者火煅為末如瘡破用干藥摻之如不破入輕粉清油調敷之治惡瘡尤妙治湯火所傷出醫方集成用大黃當歸各等分為末以清油調敷之濕則乾摻用冷水又方出德生堂方以杉木皮燒灰存性為末濕用末摻乾用雞子清油調塗一方云用刮杉木皮稂敷之乾用油調搽之即愈永不復發治湯蕩火燒已潰膿出不已者熱毒疼悶神效出百一選方先以梔子煎湯放溫洗淨搵干以赤焦大油餅炭上燒存性灰研細敷之一方用山梔子細研雞子清調敷亦可以毛輕拂上立便冷如水稍愈即用升麻烘乾研末冷水調敷又方出聖惠方用大黃為細末以米醋調敷或食猝不能得末只於新淨瓷器上以醋磨敷亦可一方用蜜調和或冷水調塗膏之亦可治湯火傷出百一選方以苦杖碾為細末清麻油調塗之瘡愈仍無瘢痕舊跡又方出百一選方用無名異末輕粉油調塗之如破乾摻或用黃柏水調立愈治湯火蕩方出百一選方以炊布燒灰存性以鹽水調隨敷不半日而愈蓋炊布受湯上氣多返用以出湯毒水猶以鹽水取鹹味耳醫者知此亦可喜昔張德俊云頃年從餘杭入京赴官因焚降真木犀香自開甑上為熱氣所熏面即浮腫口眼為之閉更數醫不能治最後一醫云古無此證請以意療之於是取僧寺久用炊布以此法治之愈又方以冷麵糊塗之舊爛者尤佳又方出百一選方用白瓷器末湯煮過碾極細以油調塗立效或用煉銀坩堝子搗為細末調塗之亦可治湯燙方出百一選方以蔥白沙糖二味相等爛研敷之痛立止仍無瘢痕又方出百一選方初燒湯著只用醋糟裹之不痛即止倉猝中若得酸醋洗之尤妙不腫痛蛤蜊散出衛生家寶治湯蕩火燒瘡以蛤蜊殼不拘多少炙焦黃色搗羅為散以生油調如膏敷之如水冷仍無痕一方用蜜水調敷之痛立止不膿不瘢吳內翰居鄉中鄰家釜翻一小兒自頭至踵皆傷急以敷之啼立止遂無恙此藥唯才傷便隨手用即效少緩即不及當預合下苦參散出衛生寶鑑治湯蕩火燒瘡以苦參不拘多少為散新水調如膏塗之一方用油調搽神須散出聖濟總錄治火湯燒傷熱毒瘡癤以赤石脂研為散生油調塗之濕則摻或雞子清調敷玄精石散出聖濟總錄治湯火傷疼痛不可忍以太陰玄精石不拘多少鍋子內大火煅紙襯於地坑內出火毒一宿研細散看多少用冷水調雞翎掃之疼痛立止黑神散出百一選方治湯火所傷以白麵不拘多少炒令焦黑以紙傾在地上出火毒候冷取研細每用一匙新汲水調塗患處熱痛立止一方用生油調敷清淨膏出聖濟總錄治湯火所傷以生山芋不拘多少去皮爛研成膏塗在上疼痛立止不成瘢痕定痛膏出聖濟總錄治火燒湯蕩以綠豆不拘多少炒令微焦研細以生油調塗瘡上痛即止成已散出聖濟總錄治火燒瘡以干牛糞燒灰細研生油調塗一方烏牛糞燒灰和豬脂調塗臘脂塗方出聖濟總錄治湯火所傷以臘月豬脂不得經水細銼用乾淨器研爛淨瓶盛之以油單蓋埋幽陰地近水處深一尺許經夏取出用時以鵝毛掃損處治大人小兒把火炭爛手方出聖濟總錄以鼠一枚用烏麻油鐺中煎盡取汁塗瘡又方出聖惠方以酪塗之干即易治湯火瘡出聖濟總錄以大豆煎濃汁塗之干即易經班一方用黑豆治火燒瘡止痛令無瘢痕出海上名方以酸醋傾淨地上磨取醋泥敷之昔有人抱孩子擁爐不覺落火上遽以醋泥敷之至晚不痛亦無瘢痕治湯瘡以木蘭油煎令消入蠟敷之治火瘡敗壞出肘後方以雲母粉同生羊髓和搗如泥塗之一方用胡粉調塗治沸湯火燒爛瘡以杵生胡麻如泥厚封之治湯火瘡毒用沸甲草爛研如膏貼之治湯火燒破瘡出肘後方取兔腹下白毛燒膠以塗毛貼瘡上待毛落瘥治火燒瘡出肘後方以燒胡桃稂令黑杵如脂敷瘡上治湯火燒未成瘡出聖惠方取豆漿汁敷之治湯火瘡方用槐皮煎膏貼之止痛長肉及消癰腫湯洗亦可治湯火灼已成瘡及中熱油燒外痛出聖惠方以白蜜塗之又以竹中白膜貼上三度一方生蜜塗之效治湯火瘡未起出千金方以梔子仁燒灰麻油和封之厚乃佳已成瘡燒白糖灰粉之燥即瘥一方用熬面和塗治火瘡滅瘢方以赤地利二兩搗末生油調敷之治湯火瘡出肘後方以白膠用水煎膠令稀稠得所待冷塗瘡上又方以烏古瓦取土底深者既古且潤三角者用為末敷之一方水磨塗之又方出肘後方用濕牛屎敷之痛立止常自良方一以新熱牛糞塗之一以雞子白調敷治熱油湯火燒痛不可忍出聖惠方取狗毛細剪以烊膠和毛敷之瘡漸瘥比至痂落亦不痛一作牛皮膠昔吳內翰家婢夜炊釜翻傷腿膝以夜不敢白比曉已潰爛用此治之而愈又方取石膏搗末細研用粉瘡愈治湯火灼瘡痛不可忍出肘後方用石灰細篩水調塗之干即易一方銚子內炒令黃放地上出毒生油塗一方煅令通赤水油調亦好不煅亦得紫雪出百一選方治湯蕩火燒痛不可忍或潰爛或惡瘡用松樹皮燒灰二錢瀝青一分研為細末清油調敷濕乾摻忌冷水洗日三一方不用瀝青以松樹皮乾為細末入輕粉少許生油調稀敷如不住紗絹帛縛定即生痂神效又方出傳信適用方以芭蕉水雞翎掃之又方出聖惠方以好酒浸洗傷處良久痛止無痕治火炙以百合根浸酒空腹飲之治湯火所傷未成瘡出聖惠方取栝蔞根燒灰用雞子黃和封之一方用雞子白調亦可治大人小兒湯火燒瘡出百一選方以柏葉入臼中濕搗令極爛如泥冷水調作膏敷傷處用帛子系定三兩日瘡當斂仍滅瘢一用燒灰存性為末雞子清調敷如干再上蜜調亦可或搗末以脂和塗瘡上干即易一方以山梔子葉爛搗塗之治湯火灼令不痛又速愈瘢痕出本草以人屎和鷹屎白日敷上痕自落亦用蜜和之又方出經驗良方用糯米一合炒令透骨焦黑放地上出火毒研為細末用水調搽用雞子清調亦可愈後無痕一方豬脂調亦可又方出經驗良方用芝麻不拘多少炒存性研為末清油調隔宿敷上不痛亦無瘢痕毛髮再生一方生擂爛敷之亦佳又方出經驗良方用燒了骨灰重羅過或雞子清調敷水亦可又方出經驗良方用大黃苦杖焙為末清油調塗又方出經驗良方用金櫻子樹根水洗去泥土瓷瓦片刮根上皮擂爛水濺皮破生泡並可塗如干再塗定痛不生疤瘢一方用葉燒灰去火氣小油調塗或研爛入鹽敷之又方出聖惠方以新汲井水一盞清油一盞攪勻稀稠得所塗患處隱士裴心傳一方調蜜漿飲之又方出經驗良方以稗草灰水調塗已破者干貼又方出經驗良方以燒羊糞灰醋調塗又方出經驗良方用羊脛炭即小硬炭燒赤為末蜜調塗新水散出百一選方治湯火以蒻乾者燒灰德生堂方小油調塗如干新汲水調塗煮酒瓶頭蒻尤妙乃大尖竹葉是也又方出經驗良方一名降雪散治湯火瘡用霜後芙蓉桑葉等分陰乾為末蜜調塗敷之如濕乾摻經驗方陳氏曰余在淳安設醮炷香爐中偶白膠香滾起沾拈痛不可忍便成泡偶得此藥敷之痛止又方出經驗良方用柳白皮柏皮爛研敷之干則再敷極能定痛去火毒更無疤痕又方用楊梅皮不拘多少去粗皮碾成末瓦器內熬成濃汁以罐盛起如遇用時鵝毛塗患處立愈不生痂痕又方削生梨肉貼之能止痛易瘥治湯火傷未成瘡者用小麥炒黑為度研為末膩粉減半油調塗之治火燒瘡用炭皮為末摻上如神雞黃油一名至聖膏治湯火燒用雞子煮熱去白用黃放銀石鍋內炒乾待俱化成油去火毒翎毛掃上即時痛止且無瘢痕入韶粉尤佳一方夜明砂等分為末香油調敷濕乾摻一方用生白塗絕妙一方用殼燒灰麻油調敷之又方以牡蠣火煅研成粉用夜明砂等分為末香油調敷濕則干敷治烘方用飛羅面一兩鹽三錢蜜調稀稠得所敷貼妙甚不犯火湯火傷及治一切毒腫用大黃朴硝等分為末汲新水調塗痛止無瘢痕及敷腫處妙又方用臘月豬脂炒石灰敷之亦妙又方用櫸樹皮搗汁敷之治湯火瘡用湯退豬毛帶黑皮用麥麩炒過二味研為細末用清油調塗治湯火瘡用山茶花用瓶盛貯作煉膏敷瘡上治湯火燒不問男女老幼皆治用蕎麥麵不以多少炒黃色井水調塗掃攤貼如神治湯火瘡敷方以劉寄奴不拘多少為末先以糯米漿雞翎掃傷處然後摻藥並不痛亦無痕大凡湯著急以醋調茶鹽末塗之護肉不壞然後用別藥敷之妙治湯火灼爛用白蘞柏皮敷之鼠油膏治湯蕩火燒瘡用香油一斤大鼠二個去皮腸同油內煎熟濾去滓每用時鵝毛蘸藥搽患處治湯蕩火灼成瘡以柳皮燒灰以粉塗之一方無粉以豬脂生煎柳白皮取汁塗之柏皮彌佳一方蜜和塗之治人向火生火斑成瘡有汁及治火氣入瘡用黃柏皮薄荷花末摻之即愈一方用黃柏皮為末摻之立愈薄荷煎塗亦可治燒蕩方用木炭搗羅為末每用不拘多少小油調如稀麵糊用雞翎蘸藥掃患處治湯火傷以烏賊魚骨灰煅為末水調敷保生救苦散治火燒或熱油蕩脫肌肉及諸瘡血不止如神瘡變黑色上此藥如神藥力盡卻變紅和也用生寒水石不計多少為細末油調塗或乾用貼之立效應驗方名救苦湯治刀斧及狗咬湯傷不可忍者或用水調塗之亦可幹上痛立止與無瘡同不作膿無一分苦楚日近完復永無破傷風證療湯火所灼未成瘡者取暖炭灰以水和敷之亦以灰汁洗之又方以苦酒和雄黃塗之又方以豬膏和米粉塗之日五六過良肘後同此二方既令不痛又使速愈又無瘢痕已試有效救急療湯火瘡無問大小秘要方出十便良方取粟熬令焦黑投水中攪之良久濾取汁重煎如糊以塗瘡上並滅瘢又方出聖惠方取黍米煮粥和雞子白敷瘡良療湯火爛方取商陸根搗末以粉瘡上療火油及天火瘡初出似痱子漸漸大如水泡似火燒瘡赤色熱痛須臾浸淫胤開滿身漸多急速者是也以蕓薹不限多少搗絞取汁芒硝大黃生鐵水各等分搗大黃末相和芒硝等以蕓薹汁調如稀糊以禿筆點藥敷瘡上干即再點頻用極有效閻師云蕓薹冬月煮取汁洗亦可又療猝被火燒苦劇悶絕不識人方出十便良方取新煮小便飲一升及冷水和蜜飲之口噤不開者可撬開灌之其悶瘥然後療外乃喜千金方古今錄驗崔氏小品同又治湯火傷出百一選方用紫桑椹子搗爛收之以塗傷處如藥干入臘月水浸之一方用桑椹子塗之一方收桑椹法以淨瓶收之久自成水以雞翎掃敷之又方出德生堂以燒馬糞敷上即愈又方以黃蜀葵花干為末井花水調敷之又方以冬青樹嫩頭搗爛取汁敷患處即愈治火燒瘡以白刺葉漱口嚼細安又用蝦蟆竹根搗汁安患處取瘡口柿杆兒皮烘燥出火氣研末用又方出百一選方以干桑葉為細末瘡干蜜調敷濕則乾摻一方取霜下桑葉水調敷之又方以榆柳皮燒灰為末入輕粉濕則乾用干則香油調搽效並無痕又方出德生堂方用絲瓜葉搗爛取汁塗又方出德生堂方以大黃五靈脂末塗又方以猝被湯蕩火燒瘡痛爛悶不止兼令瘡不成瘢痕取大麻子如常法煮麻腐稀稠得所以敷之干即換之又方出聖惠方以牛膝苗搗取汁煎如膏以雞翎塗令遍即痛止日敷三兩度瘥又方出聖惠方以桃葉及鹽和煮作湯洗之治火燒瘡赤焮疼痛方出聖惠方以臘月酒油煮麵糊一盞以青竹筒貯之每日塗於瘡上治火燒瘡腫痛方出聖惠方取鱔魚皮燒作灰細研如面用生油調塗瘡上並不成瘢痕又方出聖惠方以豬毛燒灰細研和膠水調稀如糊塗經五日以來煎椒湯洗卻重更塗之即無痕自然銅散出聖濟總錄治湯火瘡及一切惡瘡自然銅密陀僧各一兩並煅研甘草三兩為末黃柏二兩為末上一處研細收淨器中水調塗或乾者新水擂煙燻迷悶欲絕用蘿蔔嚼汁下咽即生乾者新水擂爛飲之凡被火傷出醫集成急以火灸雖極痛強忍一時即不痛勿以冷物浥之熱氣不出爛人筋也薤白膏治火燒瘡治湯火所傷出百一選方用柿漆塗之更無瘢痕治一切湯火所傷方出本草初著即以女人乳汁塗之瘥治湯火瘡雖膿水出皮肉潰爛者不過敷兩三次即安出百一選方蛇莓本草音繆上爛搗敷之以瘥為度錢文子佃客因遺火燒灼遍身潰爛偶遇一道人敷此方用之即安更無瘢痕本草不言治湯火燒又方出百一選方用黃瓦刮取細末濕者乾摻藥乾者麻油調塗又方出百一選方以薤白不拘多少搗爛以鵝翎敷之更無瘢痕又方出百一選方王仲杞以干甑草燒灰存性敷之凝石散出楊氏家藏方治湯火所傷皮肉潰爛赤焮腫痛膿水不幹或瘡痂未退肌膚急痛一應惡瘡悉能收斂寒水石三兩煅成粉蛤粉一兩上同研勻每用雞清入生油調稀以翎毛搵藥掃傷處無痕散出楊氏家藏方治湯火傷臘茶不拘多少上為細末用煮酒腳調敷如無煮酒腳只用好酒亦得神效散出楊氏家藏方治頭面湯潑火傷肌肉雖已平復遂成瘢痕鬢髮不生江茶生面各等分上研勻用生麻油調塗患處一日易之如湯傷出如宜方以水花曬乾油調敷之火瘡通用又生柏葉擂爛塗又用柳白皮末藥妙如火傷出如宜方用香油白水相等成膏調寒水石末塗之又用久藏醃卵灰搽又黃芩末水調敷黃柏散出楊氏集驗方治湯火瘡雞子殼黃柏樹皮朴硝上等分為末白水調塗極妙湯火傷出東垣蘭室方寒水石大黃燒黃柏油燒各等分上為末敷之如神散出危氏方治湯火方以里陳江茶著葉燒灰碾細羅過用生油輕粉調敷若濕者乾摻痛止無痕陳侍制桷奉道甚謹冬日澡浴偶坐橙倒不敢以手捺地遂墜身火爐邊有傷人傳此方用之效近效方出危氏方治湯火瘡以山枇杷柴取皮焙乾為末生蜜雞子清調敷療灼瘡及熱焱瘡出本草用荊莖煮汁洗有效治湯火瘡滅瘢以臘日取活鼴鼠煎為膏敷之良治火瘡出本草用黃蜀葵葉搗碎敷瘡上療湯火灼瘡出本草用井內泥敷之溫則易之治湯火瘡爛出本草用小麥麩醋炒貼窨治湯火灼出本草以餅爐中灰細羅過芝麻油調羽掃不得著水仍避風治湯火瘡出本草以黃櫨煮湯洗之治腫毒湯火瘡及風疹出本草以水萍㶸之治火瘡以虎屎中骨為屑敷之灸瘡附論夫火艾焮毒不忍者為血俞內通臟腑也陶隱居謂灸炳不依定俞或犯日時禁忌天地不和之氣及灸後食毒不慎房室與夫灸數過多皆令火毒發痛紅腫痛楚經久不瘥方黃耆散治灸瘡止痛抽火毒吮膿黃耆白芷白芨白薇當歸芍藥防風去蘆甘草細辛去苗葉各一兩嫩桑枝一分垂柳枝一兩乳香研一分鉛丹六兩清麻油一斤上除乳香麻油鉛丹外細銼以油浸一宿次日煎候白芷黃黑色綿濾去滓下鉛丹以柳篦攪候變黑色滴水為珠子即入乳香末足攪令勻以瓷合盛用薄紙塗貼瘡日二上或膿水多易藥時用蔥湯軟帛掃洗貼膏以瘥為度生肌膏治灸瘡久不瘥止疼痛防風去蘆頭白蘞赤芍藥當歸芎藭桑根白皮杏仁湯浸去皮並尖木香丁香各一兩甘草一兩垂柳枝銼三合亂髮洗黃丹五兩麻油一斤清者上除香二味搗羅為末余並細銼以油浸一宿慢火熬柳枝色黃黑綿濾去滓澄清拭鐺令淨慢火熬藥油入黃丹用柳木篦不住手攪令黃丹色稍黑取少許滴於水內捻看得所入香末又攪令勻傾於不津器中盛每用看灸瘡大小以紙上勻攤貼之每日三兩度換仍煎柳枝湯洗勿令傷風治灸瘡腫痛用雁屎白人精相和研敷之又方用白薤切一斤豬脂一斤細切以苦酒浸經宿微火煎三上三下去滓敷上治灸瘡不瘥用兔毛燒灰存性敷之即愈止痛生肌解火毒方治灸瘡久不瘥用黑豆半升水五升煮成濃汁去豆放溫以綿裹指頭點湯洗瘡四面令極淨候瘡中膿出瘡痂自落便摻止痛生肌散薤白膏治灸瘡經久不瘥薤白生地黃拍碎三兩梔子仁一兩杏仁去皮尖一兩胡粉三兩白芷一兩酥三兩羊背膒脂一升上除酥脂外細銼先以酥脂微火煎烊下薤白等藥候白芷色赤以綿濾去滓用瓷器盛下胡粉攪令勻塗帛上貼之三兩上以瘥為度治灸瘡久不合以白茅香花敷之治針灸瘡發紅以醴腸草敷之立已治灸瘡不發者以白魚作鱠食之良治灸瘡方灸瘡不瘥日別灸上六七壯自瘥黃連散治灸瘡痛不可忍黃連去須赤小豆馬蹄燒灰大黃楸葉等分上為散每用半錢以生麻油調塗之當歸膏治灸痛當歸焙甘草銼胡粉研羊脂各一兩豬脂三兩上除羊豬脂粉外搗羅為末先熬脂令沸下藥末粉等以柳篦攪令勻瓷合盛取塗敷瘡上以故帛貼之日一易以瘥為度一方無豬脂梔子仁塗敷方治灸瘡疼不可忍梔子仁石灰地椒黃柏塗蜜炙鉛丹各半兩上為散塗敷瘡上日三五上即瘥薤白膏治灸瘡生肉止痛亦治火燒瘡薤白當歸各二兩白芷一兩羊髓一斤上㕮咀合煎以白芷色黃藥成去滓取敷之日三治灸瘡有膿不瘥薤白一握胡粉石灰各一兩臘月豬脂一斤上先煎薤白令黃去之綿裹石灰煎數沸去之次以胡粉納膏中令勻調塗以故布貼上日三一方無石灰柏皮膏治灸瘡發腫火毒疼痛柏白皮三兩當歸一兩薤白五兩豬脂一斤上除薤白豬脂外細銼熬脂令沸下藥煎候薤白赤黑色以綿布絞去滓瓷盒盛塗敷瘡上日三五度即瘥一方無豬脂甘草膏治灸瘡痛不可忍甘草為末半兩乳香少許研蠟少許上熬蠟入二藥末成稀膏貼之止痛生肌散治灸瘡石膏一分燒過者牡蠣半兩燒過者滑石一分上為末凡用之時切護勿令中風仍須洗瘡令淨然後摻之薄薄令遍以軟綿帛系之候肌生可用白皮膏柏皮膏治灸瘡久不瘥柏樹白皮末伏龍肝各四兩豬脂半兩煉上用熬成膏濾去滓入瓷器中每用時薄薄塗之上以油單隔軟帛裹治灸瘡蠟三兩松脂五兩上合剪紙貼之日三治灸瘡久不瘥肉爛疼痛方密陀僧煅過研白礬飛令汁枯研上等分研勻先煎連子草汁洗瘡去痂後以藥敷之綠雲散養灸瘡止痛柏葉芙蓉並重五日午時採上不拘多少陰乾搗羅為散每灸瘡黑蓋子脫了即用井水調少許如膏藥攤楮紙上貼之養膿更無痛楚治灸瘡膿不瘥白蜜一兩烏賊魚骨二枚一方作一兩上相和塗之治灸瘡取車𨊧脂塗上良又方用石灰一兩搗羅為末絹篩豬膏和令相得微火上煎數沸以暖湯先洗瘡訖以布裹灰熨瘡上三過便以藥貼瘡上灸之又搗薤敷治灸瘡痛腫急方用皂下黃土搗為末以水和煮令熱漬之治針灸瘡血出不止方以燒人屎灰敷之以蓮子汁洗瘡後敷之又方用死蜣螂為末以豬脂和塗之治灸瘡久不瘥癢痛出黃水方用楸葉或根皮不拘多少搗羅為末敷瘡即瘥蔥白塗敷方治灸瘡血不止用蔥白一握研絞取汁塗敷瘡上日三五度又方以荼菜搗敷止痛易瘥治灸瘡不瘥者以牛屎熱灰敷之治灸瘡久不瘥用豬肉毛燒灰敷之又用桃膠和水銀擂研塗之治灸瘡之中風冷腫痛方但向火灸之瘡得熱則痛至痛止日六七灸愈四時貼護方治灸瘡未著痂及出膿不合者春以柳絮夏以竹膜秋以新綿冬以兔毛內托黃耆丸治針灸傷經絡流膿不止黃耆八兩當歸三兩洗肉桂去皮木香乳香沉香各一兩上為末用綠豆粉四兩薑汁煮糊丸如梧子大每服五十丸熱水送下不拘時馬汗入瘡附論夫諸瘡未愈而為馬汗淹漬或馬尾垢及馬屎尿及坐馬皮韉並有毒令人身體壯熱疼痛焮腫毒氣淫溢則嘔逆悶亂傳入腹亦能殺人方硇砂散治馬汗入瘡方雄黃研硫黃研礬石研硇砂研各一兩巴豆二十個去皮不出油附子去皮臍生用半兩上搗研為末用醋和丸如雞頭大將一丸分為兩處用醋貼若瘡口合卻須微撥破紅色處磨出黃水瘥薑黃散治馬骨刺肉方雄黃乾薑各半兩上搗研為末調敷刺處青皮散治驢涎馬汗入瘡方冬瓜青皮陰乾用為末貼瘡上一方挑瘡口敷之少頃即退白礬散治馬汗入肉雄黃白礬各等分用烏梅三個捶碎巴豆一個合研為末以半錢用油調敷患處黃丹散治驢馬汗入瘡白礬二錢飛過黃丹三錢炒紫色上用為細末塗患處如干油調塗治馬汗入瘡疼痛方用雞毛燒灰每服一錢水調服一方以酒服方寸匕治馬汗入瘡毒氣攻痛方用馬鞭上手執處皮燒灰研細和豬膏塗瘡上一方馬鞭梢燒灰用豬脂塗瘡上治馬汗入瘡腫痛方用醇醪飲任意令醉醒必愈治馬汗入瘡遍身毒氣攻方用莧菜水煮熱取汁淋洗瘡上一方五月午日預採收良治馬汗入瘡方用石灰煅赤研細用少許敷瘡上治馬骨所刺毒氣攻人方用大麻仁半升細研以水少許解去滓取汁每飲一盞頻頻服治馬骨刺肉中疼痛方用馬齒莧研細以水少許解去滓每服一盞更以汁洗於刺處又用小便洗之治馬骨刺肉中成瘡痛方出聖惠方用小蒜葉細搗炒暖塗上兼以湯淋汁灌瘡上良治馬汗入瘡疼痛毒氣攻作膿心滿欲絕者用燒粟稈作灰煮濃淋瘡須臾白沫出盡即瘥白沫者是毒氣也治馬汗入瘡腫漸甚宜急療之遲則毒深難理出肘後方用川生烏頭末敷瘡口良久黃水出立愈治馬汗馬毛入瘡中腫痛入腹害人出聖惠方用井花作湯浸痛處冷水亦得數飲好酒即愈又石灰敷之治馬汗入肉毒氣引入紅線出海上名方用烏梅和核爛搗為末以頭醋和為膏先將瘡口以針刺破但出紫血迄有紅血出用帛拭乾以膏敷上以帛系定一方無醋爛嚼塗瘡上治馬血入瘡中及治馬咬人作瘡有毒熱疼痛及瘡久不瘥出千金方以婦人月經血塗之治驢涎馬汗入瘡出傳信適用方用遠志去心為末用酒調塗治馬血入瘡中出千金方服人糞如雞子大復以糞敷瘡上治剝死馬馬骨傷人手毒攻欲死方出千金方用死馬腹中屎以塗之即瘥用馬糞乾者一物粉瘡孔如瘡口大先以馬尿洗之大驗絞糞汁微溫飲之效治馬毒瘡出本草用堇菜搗汁洗並服之又方出聖惠方用人糞泥之又搗馬齒莧敷之一方乾者燒灰敷瘡兼以馬糞汁洗瘡甚佳治驢涎馬汗入瘡出傳信適用方用頭垢和壁土貼之又方出傳信適用方用烏梅肉黃丹等分為末以唾調塗又飲淡豆豉汁一碗治驢涎馬汗入人肌肉者出傳信適用方用驢子鬃燒灰挑破所入汗處見血然後用麻油調塗之治馬汗入人瘡疼痛方出聖惠方用煮豉作湯及熱漬之冷復易之治馬汗馬毛入人瘡中腫痛欲死方出聖惠方用沸湯令得所浸洗之取瘥治馬汗入瘡方出千金方用驢耳中垢敷之兼治馬血入瘡效治馬骨所傷毒氣攻人慾死方出聖惠方用馬糞絞飲其汁即效兼燒末水服二錢日四五服治馬骨所刺及馬血入人體故瘡中毒疼痛欲死者出聖惠方用熱灰汁更番漬之常令熱終日為之冷即易數日乃愈若心痛而瘡腫不消者炙石熨之一方用熱桑皮灰汁更番漬之治馬血入瘡方用嚼粟米肉爛塗之治馬骨所刺及馬血入舊瘡中毒痛欲死方用酒漬馬齒莧少少飲之治驢涎馬汗入瘡出傳信適用方用干冬瓜燒灰淨洗瘡口搽藥在內一方用冬瓜青皮陰乾為末敷之治驢涎馬汗入瘡方以馬汗中粟子一個烏梅一個嚼爛作十丸每一丸用針挑破瘡貼之絹帛系之治馬汗入瘡及一切毒入腹不可療者用葶藶子一兩炒研以水一升浸湯服取下惡血惡核腫附論夫惡核病者肉中忽有核累累如梅李核小者如豆粒皮肉瘮痛壯熱𤺢索惡寒是也與諸瘡根瘰癧結筋相似其瘡根瘰癧因瘡而生是緩無毒惡核病猝然而起有毒若不治入腹煩悶殺人蓋由冬月受溫風至春夏有暴寒相搏氣結成此毒也但服五香湯主之又以小豆末敷之亦煮湯漬時時洗消後以丹參膏塗之令核盡消凡惡核初似被射工毒無常定處多惻惻然痛或時不痛人不痛者便不憂不憂則救遲救遲即殺人是以宜早防之尤忌魚雞豬牛馬驢等肉其疾初如粟米或似麻子在肉裡而堅似疱長甚速初得多惡寒須臾即短氣取吳茱萸五合作末水一升和之取汁頓服以滓敷上服此汁令毒散止即不入腹也入腹則成禍矣切慎之方五香散一名五香連翹湯治肉中或有惡核生腫破不消惡肉惡脈瘰癧腫結氣出聖惠方雞舌香各一兩射香一分細研薰陸香一兩射干紫葛銼川升麻獨活桑寄生甘草生銼連翹各一兩川大黃三兩銼碎微炒木香沉香各一兩上為散入麝香研勻每服三錢水一中盞煎至五分去滓入竹瀝半合更煎一二沸溫服日三服連翹散出聖惠方治項上惡核焮腫連翹川升麻獨活木通銼木香沉香各一兩桑寄生丁香各半兩川大黃二兩切碎微炒上為細散每服以清粥飲調下二錢日三服獨活散出聖惠方治惡核風結腫毒四肢煩熱拘急獨活木香射干連翹甘草生銼桑寄生川升麻沉香川大黃生用各一兩上為散每服四錢水一中盞煎至六分去滓入竹瀝半合更煎一二沸放溫服之日三服得快利為度丹參膏出肘後方治惡核腫白蘞散出聖惠方治惡核焮腫不消及癰疽白蘞川大黃赤石脂赤芍藥芥草黃芩黃連去須吳茱萸各一兩上為末以雞子清調如泥塗於布上貼腫處干即易之黃耆散出聖惠方治惡核焮腫疼痛黃耆一兩半銼黃芩芎藭黃連去須白芷赤芍藥當歸各一兩上為末以雞子清調如泥塗於布上貼腫處干即易之貼惡核散赤小豆豬牙皂角硝石黃柏木鱉子各半兩上為末雞子清調塗氣體壯實者仍服涼膈散或四順清涼飲之類治惡核腫結不散方出肘後方吳茱萸末一兩小蒜二兩上搗為汁敷之日三換以瘥為度治惡核蝸牛蟾酥以針挑破貼之治惡核肌黃患腫以針破用香油燒竹滴油在患處又方用火炮姜搗碎如飛鹽刺核破揩黃水流出亦妙後用蓖麻子百粒去殼搗爛加小七香丸一握和成丸綠豆大分作二分服熱酒送下以利為度治惡核腫不散用鮮鯽魚杵敷之一方用鯉魚燒灰調醋敷之或加天仙子米醋調勻敷患處尤佳治結核出本草用堇菜乾末和油煎成膏摩結核上日三度瘥遊腫附論夫遊腫之狀者青黃赤白無復定色遊於皮膚之間肉上微光是也方鬱金散出聖惠方治遊腫攻頭面焮腫赤熱疼痛鬱金甜葶藶川芒硝川大黃生各半兩赤小豆一合伏龍肝二兩上為末以生雞子白並蜜少許調令稀稠得所塗之干即便塗治赤白遊腫方出聖惠方蕓薹子半合米醋一雞子殼鹽一錢上搗爛如泥煮依腫大小塗紙上貼之如走即隨處貼之不過三兩上又方出聖惠方川大黃一兩生用豉一合紫檀一兩上為細末以醋和敷之干即再敷治青白赤遊腫微痛方出聖惠方川大黃二兩生蒲黃二兩伏龍肝二兩上為細散水和如泥薄敷之干即再塗治遊腫赤者方川大黃二兩慎火草五兩上合搗塗之干即再塗又方出聖惠方用紫檀香二兩為末水調塗之治遊腫流遍身赤色入腹即死方用生豬肉敷上數數換之其肉百鳥食之自死惡甚也治白遊腫方出聖惠方用生羊脂塗之治遊腫方出本草用瓷塸中里白灰醋磨敷之瓷器物初燒時相隔皆以灰為泥然後燒之塸瓷也但看里有即收之赤遊腫若遍身入心腹即殺人出百一選方灶下黃土為末油塗勿令乾治赤遊腫若遍身入腹即殺人出百一選方以白豆末水和塗若入腹及陰者以護火草取汁一盞干即末之水調服出邵州備急方馬敏叔親曾為其子用甚妙所用白豆者謹按外臺丹疹方搗護火草封之神良治遊風腫赤頰熱者出本草以慎火草根研為末水調掃患處治遊腫出本草以紅藍花苗生搗敷之治赤白遊腫出本草以豉蟲搗敷之惡肉附論夫惡肉者身里忽有肉如小豆突出細長及如牛馬乳亦如雞冠之狀不癢不痛久不治長不已由春冬被惡風所傷風入肌肉結瘀血積而生也方漏蘆散一名漏蘆湯出聖惠方治惡肉漏蘆白蘞黃芩白薇枳實麩炒微黃川升麻甘草生銼赤芍藥川大黃銼微炒麻黃去根節各半兩上為散每服三錢水一中盞煎至五分去滓不計時候溫服大黃膏出聖惠方治惡肉久不瘥川大黃生用附子去皮臍生芎藭雄黃細研真珠末各一兩黃芩白蘞䕡茹研為末白礬燒汁盡細研各二兩上大黃等五味並銼先以豬脂一斤半煎十餘沸濾去滓納雄黃真珠䕡茹白礬攪令勻塗於惡肉上蝕惡肉散出聖惠方硫黃馬齒莧白礬燒令汁盡䕡茹丹參各半兩上為細散塗敷惡肉上治惡肉不瘥方出聖惠方䕡茹末半兩白礬三分燒令汁盡雄黃三分細研上同研為細散敷肉上治瘡中惡肉出方出聖惠方用生烏梅二十七枚燒灰為末敷瘡中惡肉上惡脈附論夫惡脈之病其狀赤絡忽起巃嵸而聚若死蚯蚓之狀又若水在脈中長短隨絡脈所生得之春冬惡風入於絡脈瘀結而成是疾久不治則結脈變為瘻病宜服五香連翹湯及竹瀝等治之刺去其血仍敷丹參膏亦用白雞屎塗之方五香連翹湯出肘後方治惡脈宜服此湯及敷丹參膏服五香湯敷小豆則瘥木香湯出聖惠方治惡脈腫毒木香吳茱萸洗焙微炒升麻薰陸香雞舌香雄黃甘草炙鱉甲醋浸炙去裙射干各半兩上搗篩每服五錢鹽水二盞煎至一盞去滓空心溫服日晚再服一方以水三升煎二升去滓用故帛三五重浸湯中更互拓腫上不計遍數亦可丹參膏出千金方治惡核瘰癧風結諸腫丹參蒴藋各二兩秦艽獨活烏頭白芨牛膝菊花防風各一兩一作防己𦬣草葉蜀椒躑躅花各半兩上十二味切以苦酒二升漬之一宿豬膏四升俱煎令酒竭勿過焦去滓以塗諸瘡上日五度塗故布上貼之此膏亦可服得大行即須少少服五香湯加茱萸犀角湯出聖濟總錄治惡脈腫毒氣攻脈中猝腫痛結作核或似癰癤而非時使人頭痛寒熱氣急數日腫不除木香藿香葉沉香薰陸香雞舌香吳茱萸湯浸洗微炒犀角鎊各一兩上粗搗篩每服五錢鹽水二盞煎至一盞去渣空心溫服日晚再服其渣熱拓腫上冷即易之升麻湯出聖濟總錄治惡脈毒腫升麻一兩烏梅肉二兩梔子仁十二枚上粗搗篩每服五錢鹽水二盞煎至一盞去渣空心溫服日晚再服余渣熱拓患上五香湯治惡脈病黃耆散出聖濟總錄治惡脈毒腫以黃耆細銼四兩搗羅為細散水調敷日三五度又方出聖濟總錄以漆頭䕡茹二兩為細散水調敷上日三五度結陽附論內經謂結陽者腫四肢夫熱勝則腫而四肢為諸陽之本陽結於外不得行於陰則熱菀於四肢故其證為腫況邪在六腑陽脈不能和陰則氣留之以其氣留故腫也方白蘚皮散出聖濟總錄治氣菀四肢腫實不散令人氣壅犀角湯一名犀角散治結陽四肢腫滿熱菀不散或毒攻注大便閉澀防己丸治四肢腫熱氣脈壅滯升麻湯出聖濟總錄治熱毒流於四肢腫痛不消升麻大黃銼如半粟大醋炒紫色各二兩前胡去蘆頭梔子仁射干去毛炙各一兩半黃芩去黑心犀角鎊屑一兩豉炒半兩羚羊角鎊屑半兩上粗搗篩每服三錢鹽水一盞半煎一盞去渣食後溫服日三木香丸出聖濟總錄治結陽氣壅四肢腫熱大小便秘澀木香芎藭羌活去蘆頭桂去粗皮各二兩檳榔煨大黃銼如半粟大醋炒紫色郁李仁湯浸去皮研如膏各四兩上先以六味為末入郁李仁再研勻煉蜜和丸梧桐子大每二十或三十丸生薑湯下空腸臨臥各一服
