body:
  text: 卷三百一下部瘡門總論陰瘡者有三等一濕陰瘡二妒精瘡三陰蝕瘡又曰下疳瘡蓋濕者由腎經虛弱風濕相搏邪氣乘之瘙癢成瘡浸淫汗出狀如癬瘡是也妒精由壯年精氣盈滿久曠房室陰上生瘡赤腫作渴煩悶癢痛是也陰蝕瘡由腎臟虛邪熱結下焦經絡痞澀氣血不行或房勞洗浴不潔以致生瘡隱忍不醫焮痛尤甚袖瘡在裡手抓無妨疼痛炷悶或小便如淋陰丸腫痛或經十數日潰爛血膿肌肉侵蝕或血出不止以成下疳若身體壯熱煩渴惡寒宜急治以大豆甘草湯漬之潰毒湯等洗之服五香連翹漏蘆湯疏之更以截疳抵聖散乾摻四畔摩風膏潤之後以將護忌慎之渴不止者竹葉黃耆湯大便軟者服托裡茯苓等藥調治之腎臟風論曰實則為痛虛則為癢癢之出於腎虛也明矣腎屬足少陰之經囊間濕癢謂之腎臟風世所共知也孰知宗筋聚於陰器足厥陰之肝系焉惟腎主虛惟肝主風人之精血不充內為嗜欲所耗外為風冷所乘風毒濕氣皆從虛入囊間其有不癢濕者乎腳下其有不瘡瘍者乎療治之法先當疏散風邪流行濕毒夫然後以芎歸活血與細辛蒺藜驅風數輩潤養而平治之若欲遽用川烏故紙燥烈之劑吾恐攔住內邪病無由愈間有患者為酒面炙爆所傷腎虛而挾熱如豬肚黃連蒸為丸子不可無其或不施藥餌一切從事於熱湯雖沃之暫止然真氣愈泄肝腎愈虛或者未知攸濟方宣毒方治腎餘氣瘡苦參荊芥當歸川芎玄參白芷各半兩黑牽牛一兩半烏蛇一條青黛半兩一半入藥一半為衣上先將牽牛巴豆肥白者去殼三十粒慢火炒令巴豆黑色去巴豆用黑牽牛同前九味為細末卻將煨熟大蒜擂細看稠得所丸時入糊和丸如梧桐子大每服十丸鹽酒下浴毒丸出外科精要方治小腸風陰瘡癢痛木通藁本枳殼管仲白芷荊芥甘松薄荷各等分上㕮咀用藥二兩水五升入芒硝半兩煎至三升熱洗浴瘡陰瘡膏治男女陰瘡米粉一酒杯許芍藥黃芩牡蠣附子白芷各十八銖上㕮咀以不中水豬膏一斤微火上煎三上三下候白芷黃膏成絞去滓納白粉和敷瘡上豬蹄湯出聖惠方治陰瘡膿血不絕豬蹄二枚黃柏三分銼敗醬三分黃芩半兩黃連三分甘草一兩銼營實根一兩上搗羅為散用漿水二升煎至一升半熱用洗之七寶檳榔散出德生堂經驗方治下元玉莖上或包頭內有疳瘡漸至蝕透不愈者檳榔密陀僧雄黃輕粉黃連黃柏朴硝上為細末入麝香一錢和勻再研細先用蔥白漿水洗淨軟帛拭乾如瘡濕干糝如干小油調塗玉粉散治下陰瘡疼不止寒水石煅密陀僧滑石各半兩膩粉麝香各少許上為細末油膩或干貼牡蒙散出聖惠方治陰下生瘡濕癢失精牡蒙菟絲子柏子仁蛇床子肉蓯蓉各二兩上制下篩酒服方寸匕日三以知為度一方無蛇床子宣風散出仁齋直指方治疏肝腎風大雞心檳榔二個桑皮半兩甘草焙三兩牽牛生取一兩炒上為末每服二錢蜜湯調下全蠍散出仁齋直指方治腎臟風發瘡疥雞心檳榔一大個破開以黃華丹一錢合在內溫紙裹煨明硫黃研二錢生虢丹二錢全蠍三枚焙上為細末入膩粉半錢麝香少許於瓷器收每用少許麻油調抹兩掌先以鼻嗅男以兩掌掩外腎女以兩掌掩兩乳各睡至醒次日又如此用藥屢效又方出仁齋直指方上用大紅川椒去目水蘸濕半日夾生杏仁研膏搽手如上法亦驗烏頭丸出衛生家寶方治腎臟風上攻下疰生瘡並癬川烏二兩草烏一兩二味以黑豆半升煮透軟去皮切日乾天麻地龍去土白附子各半兩上為細末酒糊為丸桐子大每服二三十丸空心食前鹽酒或鹽湯下輕黃散治玉莖上生瘡不幹見骨者大黃三錢燒灰存性黃柏二錢燒灰存性輕粉少許久年壁土東向者一錢上先用溫熱水洗淨血水以綿帛拭乾然後藥乾摻切忌房室硫黃散出聖惠方治陰上生瘡硫黃半兩赤石脂半兩麝香一錢膩粉一錢上藥都和如粉每先以甜淡漿水溫洗令淨挹干貼之牡蠣散治陰囊兩傍生瘡或陰濕水出甚癢甚苦夜則抓之無足後必自痛或兩腋汗腳柄心常濕汗無所奈何此藥主之予親得之此症受苦數十年得此方隨用二三日如法搽之二十餘年不發實為神效枯白礬四兩黃丹炒二兩牡蠣粉二兩上為細末遇夜睡手捏藥於癢處痛擦之不一時又擦之三四次後頓減次夜再擦雖大減又擦後日自然平復如腋汗亦有頓擦方可腳汗先擦大減又擦後裝藥於靴或鞋底上腳板上塗藥纏腳裹之亦可麻黃根粉治腎勞熱陰囊生瘡麻黃根石硫黃各二兩米粉五合上制下篩如常用粉法搽瘡上粉濕更搽之胡連散治陰生瘡腫痛胡粉三錢黃連末一錢五倍子末一錢上藥都和研為散先以甘豆湯淨洗拭令乾以藥末敷於瘡上日再用之天雄散治陰生瘡腫痛天雄一枚末膩粉一錢麝香一錢上細研為散以溫漿水洗瘡淨後用津液塗之夾鹽散治陰瘡及惡瘡鼓子草根一把大麥三十粒鹽少許上搗令爛敷瘡上一易經三日後三日一易遠志散治莖中痛囊津液不行遠志去心五倍子焙蛇床子各等分上為細末每用藥末五錢水三升入蔥白三寸同煎五沸去滓熱淋渫效桑枝湯治陰瘡桑枝二握銼蔥二握上以水三升煎至二升去滓稍熱浴瘡上一方水煎桑白皮湯洗之蚯蚓散治陰莖瘡豆粉一分蚯蚓二分上用水研塗上干又敷之一方用豉一分黃白散治近穀道四畔時復生泡癢而生痛無非風毒流行去風乾水足矣黃柏皮黃連去須白礬煅過白蛇皮燒灰各等分上為細末重篩入麝香臘茶末各少許和勻津唾調塗過癢抓破水出即塗如水多即干搽石灰散治腎漏陰囊先腫後穿破出黃水瘡如魚口能致命上用五倍子同石灰炒黃色去灰攤地出火毒砂盆內研為細末不犯銅鐵干搽瘡上五七次愈又方上用豆豉燒灰貼之蛇床散治陰囊生瘡疼痛上用川椒荊芥火掀草蛇床子煎湯洗後用雞清調朴硝末塗之即見效荊芥湯治玉莖上生瘡上先用荊芥黃柏煎洗後用黃白真蚌粉荊芥青黛為末干糝瘡上丹胞散治莖上生瘡臭爛者上以豬胞一個連尿去一半用新磚兩口炭火煅新磚將豬胞連尿於磚上焙乾不住手來回移放於兩口磚上輪流不歇以尿干為度研為末入黃丹一錢先用蔥湯以鵝毛抹洗以舊綿帛滲干此藥搽三五次立見效鱉灰散治男子陰頭癰不能治者及治婦人陰瘡脫肛上用鱉甲頭燒灰以雞子白和敷之地連散治玉莖上生瘡上用地骨皮煎湯洗訶子連核燒存性為末干糝川連散治下部注瘡上用宣連為細末漿水調成餅攤於碗麵上內用艾及川甲三片燒煙覆碗熏成黑色再取下如是者五次以黃連餅黑色為度地上出煙毒再研細濕塗干清油調塗三四次先用黃柏藿香茵陳煎湯溫洗煎蜜散療男子陰瘡損爛上爛煮黃柏洗之又用白蜜塗之一方蜜炙焦為末敷於瘡上蠟茶湯治陰囊上瘡上用蠟茶為末先以甘草煎水洗後用貼妙豬脂散治天行䘌瘡上用豬蹄燒灰以豬脂和敷日五六用桃熊散治熱病後下部生瘡上取濃煮桃白皮如稀錫納少許熊膽以綿蘸藥納下部瘡上黃柏散治揩襠上先用熱溫水洗過揩痛處卻用黃柏皮末一錢和勻新米泔調塗或用新米泔調服三五服水瘡湯療陰瘡陰邊如粟粒生瘡及濕癢上以槐北面不見日處白皮一大握鹽三指一撮以水二大升煮取一升洗之三五遍適寒溫用若涉遠恐衝風即以米粉和塗神效蠟燭平胃膏治腎臟風瘡上用平胃散以蠟燭油煎過候冷調敷瘡愈合掌散治腎臟生瘡上用檳榔硫黃為末臨睡用香油調掌心上鼻嗅之卻以藥抱外腎睡二三日用之效治陰癢生瘡上嚼胡麻塗之驗治玉莖上生瘡不幹見骨者上用烏賊魚骨末按滿瘡口以紙纏之治揩襠上用嫩楓葉搗爛搽之立愈又方上用老鴉酸草又名酸毒草搗爛搽之立愈以冷水洗之又方上用馬屁勃即灰菰尋常採收如有此疾先用溫水或冷水輕輕洗淨以菰為末摻患處如新菰不必為末將菰搽患處治男子腎生瘡癬作癢上以百草霜用香油調搽立效治陰囊上瘡上用甘草煎湯溫洗卻用臘茶末就敷貼一方用地龍糞輕塗治天行䘌下部生瘡上濃煮桃皮如糖以納下部中若口中有瘡含之治陰瘡上用狼牙五兩細銼水五升煮至三升溫洗之治下部生瘡已至潰爛上服牡丹方寸匕日三服又方用桃皮葉杵水漬會濃者去渣著盆中漬之蟲出療男子陰瘡上以蜜煎甘草末塗之大良比有人患下瘡爛欲斷者以豬肉湯漬洗之後用黃連黃柏等為末敷之治陰癢痛上用車前子以水三升煮三沸去滓服治陰生瘡上燒杏仁研為末敷之淫汁方治莖物腫爛上用大腹皮一升夾苦參荊芥煎湯溫洗拭以津唾塗次用油發燒存性入些白艾末敷逐日煎湯蜜洗換藥或用乳香龍骨散仍服蠟礬丸併發灰用米飲調下淋渫藥治莖痛囊縮津液不行上用蛇床子去皮揀淨四兩為粗末每用藥一兩水二碗煎一碗半去滓乘熱熏下部候通手淋浴臨睡用松節散治腎風瘡上用松節和羖羊尿白礬一處燒瀝油搽瘡上立效治下部癢蟲方出聖惠方硃砂一分細研白礬一兩燒灰芎藭半兩上為末每用綿裹一錢納下部中日再易之又方出聖惠方用蛇一條如指粗者掘地作坑置蛇於中燒之取有孔板覆坑上坐熏之其蟲盡出神效方出仁齋直指方治莖頭三五孔小漏瘡出血微膿上用香發燒存性敷干則津唾調發灰食前服烏喙湯治若有息肉突出上以苦酒三升浸烏喙五枚三日一洗一日夜三四度瘥治陰下濕導引法養方導引法云臥令兩手布膝頭取踵置尻下以口納氣腹脹自極以鼻出氣七息除陰下濕少腹裡痛膝冷不隨治人下部中癢出十便良方上以蒸棗取膏以水銀熟研丸之令相得長二三寸以綿薄裹納孔中蟲出瘥治穀道中瘡上以水中荇葉細搗綿裹納下部日三胡粉散療陰瘡黃柏黃連各三分胡粉一合上為末調塗日三婦人綿裹棗核大納之髓痛如刺方出肘後方但服生射干汗取下亦可服丸藥下之云作走馬湯亦在屍注中訶子散治妒精瘡有富家子唐靖者年十八九未娶忽於陰頭上生瘡初只針眼大畏疼不敢洗刮日久連莖爛一二寸許醫不止用膏藥貼之愈疼有道人周守真謂此名下疳瘡亦名妒精瘡緣此為後生未娶精氣溢盛陽過興起當泄不泄不泄強泄脹斷嫩皮怕痛失洗日久遂爛有害性命若治此瘡須是斷房事數月先用荊芥黃柏皮馬鞭草銼入蔥前湯洗令去膿靨以訶子燒灰入麝香乾糝患處令睡時吃冷水兩三口勿令陽道興起傷斷瘡靨靨堅即安雙妙散出十便良方療男子陰卒腫方雞翮六枚燒蛇床子等分上二味為末以飲少許隨卵左右取雞羽又方出十便良方煮桑根皮汁洗之又方出十便良方治陰下濕癢成瘡吳茱萸三合上用水三升煮三五沸以洗之諸瘡亦甚妙也治蟲已食下部肛盡腸穿者用長股蝦蟆青背者一枚雞骨一分並燒灰為末合吹下部令深入數用大驗治下部蟲齧用梅葉桃葉杵一斛蒸之令極熱納小器中大布上坐蟲死茴香散出千金方治陰瘡風冷所傷疼痛白蒺藜附子茴香子上件藥等分搗細為散每於食前以溫酒調下二錢止痛丸出聖惠方治陰痛不可忍吳茱萸二兩檳榔一兩茴香一兩上件搗羅為末用醋煮麵糊和丸如梧桐子大不拘時候以熱酒下二十丸陰頭生瘡溪螺溪港中螺也舊者為妙上甘鍋煅過為細末仍先以鹽水洗五七次後以此藥敷之又方治穀道生泡癢而復痛此風毒流行證枯礬半錢和勻米泔調塗此方專治行路揩襠穀道痛仍用水先洗唾調散出本草治同前上五倍子末唾調敷治陰頭上生瘡出本草上以蜜煎甘草塗之瘥治陰莖上瘡痛爛出本草用豉一分蚯蚓濕泥二分水研和塗上干易禁熱食酒菜蒜治毒攻下部生瘡者出本草用槲苦皮合櫸皮煮汁如飴糖以導之一方出本草治腎瘡腰痛蛇床子五倍子蕪荑煎湯以帛囊盛稍熱洗之先鹽洗服或以蕪荑剪草黃連全蠍黃柏末麻油調敷濕陰瘡附論夫虛勞陰瘡者為腎氣榮於陰今腎虛不能榮則津液汗出於陰也虛則為風邪所乘客於腠理而正氣不泄邪正相干在於皮膚故癢搔之則生瘡也方天雄丸治虛勞陰痿濕癢搔之汁生瘡小便淋漓或赤黃莖中痛甚者失精劇苦尿血目視䀮得風淚出腳弱不能久立宜服天雄一兩炮裂去皮臍蛇床子三分細辛半兩川大黃半兩銼碎為妙杜仲三分去粗皮炙微黃銼柏子仁三分白茯苓三分防風半兩去蘆頭萆薢三分銼菖蒲三分澤瀉三分栝蔞三分桂心三分遠志半兩去心川椒半兩去目閉口者微炒去汗牛膝三分去苗石葦半兩去苗山茱萸三分白朮三分上搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服食前以溫酒下三十丸蛇床子丸治虛勞陽氣衰絕陰痿濕癢生瘡蛇床子三分續斷半兩薯蕷半兩桑寄生半兩肉蓯蓉一兩酒浸一宿刮去皺皮炙乾附子半兩炮製去皮臍菟絲子一兩酒浸三日曝乾別掉為末遠志半兩去心莨菪半兩小淘去浮者水煮芽出焙乾為黑色上搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫酒下三十丸小浴方治虛勞陰濕癢生瘡川椒一兩半蛇床子苦參一兩半白礬一兩香附子一兩桂心三分白芷一兩狗脊一兩細辛一兩上搗粗羅為散每用一兩以水三升煎至二升去滓傾入盆子內但承熱氣坐盆子上熏之良久通身便洗患處甚者不過三五度乳香龍骨散治外腎濕癢淫爛龍骨一錢石膏生五倍子各一分白芨乳香黃丹各半分麝少許上為細末先以苦參大腹皮紫蘇莖葉溫洗後敷螵蛸散治虛勞陰濕生瘡桑螵蛸灰一分牡蠣粉半兩米粉一分胡粉一分麒麟竭一分密陀僧一分上研細末如粉用塗瘡沐浴長春散治男子下元虛濕久冷陰囊左右夜癢抓之則喜任之則痛成瘡流水為害甚苦此藥見效及婦人下部陰濕胎元冷牡蠣蛇床子破故紙官桂紫霄花乾荷葉各等分上㕮咀每服一兩半水一小鍋入蔥白數莖煎至八分去滓先熏後洗卻用枯礬一兩半入黃丹半兩蛤粉半兩一處和勻研末洗用手捏藥搽濕癢處螵蛸散治陰瘡或癢桑螵蛸灰一分胡粉一分硃砂一分麒麟竭一分上細研如粉貼於瘡上黃粉散治陰囊上生瘡黃水流注有妨行步五倍子黃柏滑石輕粉等分上為細末貼之數次即愈硫黃散治虛勞陰濕生瘡麻黃根末半兩硫黃半兩細研米粉一分上研令勻細每用如粉塗之麒麟竭散治虛勞陰濕生瘡麒麟竭半兩坐拿草三兩黃柏半兩上搗羅為末入膩粉一分都研令勻如瘡破有膿水即幹上如無膿水即以生油調塗臘茶散治陰瘡癢瘡出黃水久不瘥者一名五倍散臘茶五倍子各等分膩粉少許上為細末先以漿水蔥湯洗之頻敷椒湯尤佳一方不用臘茶黃龍散治濕干瘡癬黃汁浸淫色如香瓣黃柏龍骨赤石脂各一兩上為細末好酒調掃瘡或干貼之槐白皮湯出聖惠方治虛勞陰濕癢生瘡槐白皮二兩黃柏一兩半香茅葉一兩半上細銼以水三升煎至二升去滓看冷暖洗之烏梅散出聖惠方治虛勞陰濕癢生瘡烏梅十四枚青錢四十文鹽三錢上以水酒各一升於銅器內煎至升半去滓看冷暖洗立效一方與臘茶散相隨用之一方有醋一升一方水煎服佛手散治濕疳瘡癬癢痛皮爛黃丹炒黃二錢豆粉炒黃二兩上研勻清油調掃瘡上後摻如聖散如聖散石膏黃芩去皮心各一兩上為細末乾摻之瘡上先以佛手散豬寄湯出聖惠方治虛勞陰濕癢生瘡豬蹄二枚銼槐樹寄生細銼二升上以水五升煮取三升去滓看冷熱洗瘡三五度用之永瘥玉粉散治陰瘡浸淫不止白礬枯定粉各等分上細末先浴淨掩干摻之雌雞散治陰下濕癢上用黃雌雞先以粉滑石為末和飯與雞食之後取雞食甚補益蒲黃散治男子陰下濕癢上用蒲黃末敷之三次良千金論曰有人自少至長陰下常有乾癬者宜依癬方主之有五勞七傷而得陰下癢濕搔之黃汗出者宜用補丸主之仍須敷藥治亦有患妒精瘡者以妒精方治之夫妒精瘡者男子在陰頭節下婦人在玉門內並似疳瘡作半劑食之大痛疳則不痛苦參湯療陰囊下濕癢瘡上煮槐皮苦參黃柏及香薷汁洗之並良礬石散出海上方治陰囊上生濕瘡黃水流注有妨行步上白礬不以多少研為末入冷水內洗瘡即愈療陰下濕癢成瘡出聖惠方上煮桃皮和黍米汁洗之療陰下濕癢瘡出十便良方上用甘草一尺以水五升煮取三升漬洗之日三四度便愈治陰囊濕癢瘡豬蹄兩腳槐枝里白皮切一升上以水煮洗瘡一日五六遍永瘥治血驅風散出仁齋直指方治肝腎囊濕癢腳下瘡癬當歸川芎白芷華陰細辛白蒺藜炒去刺桃仁浸去皮焙白芍藥半夏制塊潤五靈脂甘草生各三錢蒼朮炒杜仲薑汁炙炒去絲辣桂天麻薏苡仁橘紅檳榔厚朴枳殼各五錢上銼每服三錢水二盞半姜五片天棗二枚煎至七分濾清暖熱入乳香末少許食前服乳香以佐心氣使心腎相交或有熱證去桂乳香加黑豆煎銅綠散出濟生拔粹方治男子婦人陰部淹瘡五倍子細研五錢白礬一錢銅綠少許輕粉一匙乳香五分上為細末洗淨摻之治男子婦人陰瘡濕癢上用槐實末摻之及煎水洗之治陰生濕疱瘡及陰蝕瘡出三因方上取石硫黃研如粉敷瘡上日三以蔥椒白礬湯洗淨次以藥敷之又方燒杏仁搗塗之青黛散出危氏方治下部生濕瘡熱癢而痛寒熱大小便澀食亦減身面微腫因食魚蝦發風熱物得之上馬齒莧四兩研爛入青黛一兩再研勻塗上立有神效仍服八正散日三服生薑平胃散治腎風瘡及下部濕上用生薑皮炒焦為末濕者干敷之干瘡搔靨香油調敷如覺熱不可忍用平胃散解去之或入平胃散於姜皮末內敷之自然伏大熱宣毒散出詵方治丈夫陰氣盛陽氣微弱風寒之氣乘虛而客於腎經故陰囊濕癢而微熱一種但癢而不濕一種在陰根並毛際癢一種濕不癢一種無汗者謂之毒氣不泄此藥治之全蠍微炒白殭蠶炒去絲嘴蟬蛻洗淨去土炒焙乾各半兩石燕三兩醋碎火煅令酥上末每服二錢用鹽酒煮豬腰子一對蘸藥嚼之以元煮酒送下用蒸餅乾吃壓之頻服見效此方亦治腎臟風濕流注生瘡癢甚者一概神效兼用卷柏散洗卷柏散出詵方治陰濕生瘡出汗癢甚服前藥去腎臟風此作洗藥卷柏荊芥蕙川烏大艾葉升麻去下根節露蜂房晚蠶沙藁本頭各一兩上為散每服二兩水三大碗煮取一半濾去滓先熏後洗瘡安即止大抵人不可以熱湯浴洗得腎氣耗散早年目昏又腳無力治陰上生瘡似吃蟲所食連年不效出護命方上以糊粉一件食刀上煅令通赤與椒末相袞生油調塗之頻塗必效治陰腫痛出永類鈐方苦楝根白楊根木香吳茱萸檳榔各等分上為末敷一方出永類鈐方密陀僧黃連硃砂上為末敷一方出永類鈐方五倍子黃連膩粉為末甘草烏豆煎湯洗拭敷之又瘡類疼不可忍出永類鈐方香豉一合地龍新糞水少和成膏塗之陰邊生瘡濕癢出永類鈐方用枯皮向北不見日者取煎湯洗三黃湯料煎湯陰囊濕癢生瘡及痕瘡出澹寮方五倍子煨末輕粉上為末敷吳茱萸散出澹寮方治風寒濕注下成瘡檳榔一兩硫黃半兩吳茱萸一分川烏頭一個上四味為細末摻瘡上乾者油調敷之療疳濕時行熱熛瘡出本草以青羊膽和醋服之良治男子陰癢痛出本草以白殭蠶七枚為末用酒調下方匕治陰冷漸漸冷氣入陰囊腫滿恐死疼悶不得眠出本草以大力根煮汁服立瘥治陰毒痿出本草以無食子燒灰用敷之治陰腎痿弱囊下濕癢出本草用無名木皮煎取其汁小浴極妙治丈夫陰囊濕瘡出本草以鑄鏵鋤孔中黃土為細末摸之亦去陰汗最佳治陰莖熱瘡出本草用鉞爪燒為灰敷之治陰痿出本草取露蜂房燒灰酒服之療瘡及濕癢出本草用枯白皮北向不見日處大握水二升煮之一升洗之三五遍冷復暖若涉遠恐風即以米粉敷效治陰囊下濕癢及瘡本草方以槐枝煎湯洗之妒精瘡陰蝕瘡下陰疳蝕㿗風附論㿗風證為男子精血不調被風冷所襲致陰下濕癢之不已流注手腳悉生瘡瘍名曰㿗風世謂腎臟風者乃認㿗為腎也㿗屬宗筋繫於肝胃陽明養之陽明主肌肉此經流入四肢生瘡正胃之㿗風非腎臟風也方蒺藜散出仁齋直指方治㿗風上攻耳鳴目眩下注陰濕瘡癢蒺藜炒杵刺草烏頭水浸三日逐日換水去皮各半兩白芷白附子生蒼朮炒荊芥穗各二錢半上為細末米糊丸如梧桐子大每服三十丸上則茶清下則鹽酒服烏頭煮鹽方出三因方治原臟氣虛㿗風入胃上攻頭痛眼赤眵淚昏澀口乾咽燥下注四肢疼痛歷節陰下濕癢足脛腰膝遍生瘡風水浮腫川烏頭洗淨者大破開小者全用蒼朮吳茱萸各四兩荊三稜半兩白鹽十二兩水煮四味候烏頭透控乾洗淨鹽上為末米糊丸如梧桐子大每服五十丸空心溫酒鹽湯任下之凡水病必忌鹽此藥用鹽無所忌四生散出三因方治㿗風上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注陰濕四肢瘙癢遍體生瘡及婦人血風瘡白附子沙苑蒺藜黃耆羌活各等分上為末每服二錢鹽酒送下有豬腎破開入鹽摻藥間煨服亦佳一方用豬子一枚切開去筋膜入藥少許於內濕紙裹煨炮熱再入藥三錢浸酒調藥並腰子嚼吃令盞底淨盡三五服或只用鹽酒調亦可或腰子一枚分兩次用羊腰豬腰皆用雄豬羊者為妙蛇床子散溫中坐藥上以蛇床子仁為末以白粉少許和勻令相得如棗大綿裹之自然溫矣陰汗附論夫虛勞損腎氣不足故陰汗冷夜自泄風邪乘之則搔癢也方海桐皮散治陰囊濕癢黃連全蠍硫黃花椒大腹皮樟腦海桐皮白芷輕粉黃皮蛇床枯礬榆樹皮斑蝥少許徑松皮剪草上為細末蠟油調敷山茱萸散出御藥院方治腎氣虛弱陰囊多汗或冷腫痛不消或牽引少腹時發疼痛並皆治之山茱萸吳茱萸硇砂飛紫霄花零陵香藿香葉丁香皮以上各半兩木通細辛木鱉子天仙子蛇床子續斷遠志各二錢上為粗末每服用一匙水一碗煎五七沸先以熱氣熏後浴亦蓋避風琥珀藥出御藥院方治陰囊瘙癢不已及自汗不收西琥珀黃丹各六錢枯白礬一錢麝香四錢龍泉粉二兩上為細末每用半錢摻在手心於患處搽牡蠣散治男女陰汗濕冷癢疾牡蠣灰蛇床子川烏菟絲子良薑各半兩上為細末用藥三錢白麵一錢酒醋熱調勻渫洗浴之或塗外腎帛包尤妙浥干方出御藥院方治津液不善攝泄汗玄府不閉汗多腠疏不止滑石二兩白芷寒水石粉半兩黃丹坐看多少用顏色如桃紅為度上為極細末和勻每用乾摻患處蛇床湯治囊濕蛇床子吳茱萸荊芥細辛上各件少許煎湯洗之多年壁上土細碎紗袋盛撲即可乾荷葉散出直指方治陰囊腫痛濕潤瘙癢及陰痿弱乾荷葉牡蠣粉蛇床子浮萍草各等分上為細末用籮篩每用兩匙水一碗同煎三五沸濾去滓淋渫洗避風冷真蛤散出仁齋直指方治陰汗濕癢爐甘石綠者一分真蛤粉黃連五倍子各半分一名文蛤一方用油調敷之妙上為細末摻洗以蜂房大腹皮煎湯溫洗牡蠣蛇床子散治陰汗上用牡蠣和麻黃根蛇床子乾薑為粉敷之鹽梅湯療陰囊下濕癢皮剝上用烏梅十四枚錢四十文三撮鹽苦酒一升於銅器內總漬九日洗之又煮槐皮黃柏汁及香果汁並良爐甘石散出仁齋直指方治陰汗濕癢綠色爐甘石一分真蚌粉上為細末撲敷陀僧散出百一選方治陰汗神效上用密陀僧好者研令極細蚌粉撲使之干瘡用津調敷五加皮湯出海上名方治陰癢有汗上用五加皮煎湯洗之密陀僧撲之百藥煎末敷之安腎丸出危氏方治陰汗不止上以安腎丸用舊干醬煎湯入鹽少許調下大蒜丸出危氏方治陰濕癢上用大蒜不以多少煨剝去皮爛研淡豆豉末搜丸如梧桐子大硃砂為衣每服三十丸棗子燈心煎湯送下洗方出危氏方治陰汗濕癢用蛇床子酒浸炒白礬陳醬煎水淋洗治陰癢汗出出肘後方上嚼生大豆黃塗之亦療屎尿瘡東垣先生蘭室秘藏方一富者前陰常臊臭又因連日飲酒腹中不和求先師治之曰夫前陰者足厥陰肝之脈絡循陰器出其梃末凡臭者心之所主散入五方為五臭入肝為臊此其一也當於肝經中瀉行間是治其本後於心經中瀉少衝乃治其標如惡針當用藥除之酒者氣味俱陽能生里之濕熱合於下焦為邪故經云下焦如瀆又云在下者引而竭之酒是濕熱之水亦宜決前陰以去之是合下焦二法之治清震湯治陰部時癢而有臊臭之狀柴胡一錢澤瀉一錢車前子半錢木通半錢生地黃三分當歸身三分草龍膽三分上件煎藥銼如麻豆大都作一服水三盞煎至一盞去滓稍熱服空心腹中宿食消盡服之使美膳壓之此藥柴胡入肝為引用澤瀉車前子木通其滲泄之味利小便赤除臊氣是名在下者引而竭之生地黃草龍膽之苦寒瀉酒熱更前兼車前子之類以徹肝中邪氣肝生血用當歸以滋肝中血不足也固真湯治兩丸冷前陰痿弱陰汗如水小便後有余滴尻臀並前陰冷惡寒而喜熱膝亦冷升麻梢二分羌活梢一錢酒黃柏一錢蒼朮半錢柴胡梢一錢炙甘草一錢草龍膽二分澤瀉一錢半黃柏二錢知母二錢上銼如炙麻豆都作一服水三盞煎至一盞去滓稍熱服空心腸空服之以早飯壓之恐犯胃氣瀉肝湯治小便溺黃臊臭淋瀝兩丸如冰陰汗浸多升麻半錢柴胡五分羌活根一錢酒黃柏一錢蒼朮半錢漢防己一錢紅花一錢藁本二分當歸二分豬苓三分澤瀉四錢黃芩半錢麻黃根三分上件銼如麻豆大都作一服水三盞煎至一盞去滓臨臥服大忌酒濕面青紅湯治外腎冷兩髀陰汗前陰痿陰囊癢臊氣柴胡二錢甘草梢二錢酒黃柏二錢升麻一錢半當歸梢一錢漢防己一錢紅花一錢羌活梢一錢澤瀉一錢半麻黃根一錢草龍膽一錢茯苓一錢五倍子二十個上銼如麻豆大都作一服水三盞煎至一盞去滓稍熱服食前忌酒濕面房事椒粉散治前陰兩丸濕癢秋冬尤甚夏月微減麻黃子一錢黑狗脊半錢斑蝥一錢豬苓三分肉桂二分當歸梢三分輕粉少許紅花少許蛇床子半錢川椒上為末乾摻上避風寒冷熱處坐臥補肝湯治前陰冰冷並陰汗兩腳痿弱無力黃耆七分人參三分炙甘草根一錢半葛根三分升麻四分柴胡二分羌活二分陳皮二分當歸二分黃連一分黃柏二分白茯苓三分澤瀉二分蒼朮半錢曲末二分豬苓二分知母一分防風二分上銼如麻豆大都作一服水二大盞煎至一盞去滓稍熱服空心忌酒濕面淋渫藥丁香散出御藥院方治腎氣虛弱陰囊多汗或冷腫痛不消或牽引小腹時發疼痛並皆治之紫霄花丁香肉桂蛇床子吳茱萸細辛去苗以上各半兩紅豆川芎莨菪子黑狗脊藿香葉甘松山茱萸以上各一兩蜀椒微炒一兩香附子芫花巴戟木香甜葶藶香白芷槐子炒蕓薹子天雄炮製不去皮以上各三分上件另粗末每用酸漿水三升藥末一兩鹽少許煎五七沸漸漸乘熱小浴下部臨臥用之溫腎湯出試效方治面色痿黃身黃腳痿弱無力陰汗麻黃六分防風一錢半白朮一錢澤瀉二錢豬苓一錢白茯苓一錢升麻一錢柴胡一錢酒黃柏一錢蒼朮一錢半上件分作二服水二大盞煎至一盞去滓食前稍熱服一時辰許方食治陰汗出本草用無食子燒灰先以微溫湯浴了即以帛微裹後敷灰囊上甚良治陰汗出本草以莨菪子煎湯洗之豬蹄湯治陰汗豬蹄一具劈破浮萍草三兩上以水三升煮取半升去滓以瓶子盛汁納陰瓶中漬之冷即出拭乾便敷後藥粉之又粉法薔薇根皮黃柏各三分朴硝蛇床子各一分甘草一分炙上為散用前法浸洗後以敷瘡上雞子治主著硇砂案主著硇砂意義待考上取雞子一枚煮熟剝取肉更用生雞子二個傾取白和熟研令細以帛裹之立定甘柏散主著硇砂案主著硇砂意義待考甘草黃柏白礬燒令汁盡上為末敷之瘡上
