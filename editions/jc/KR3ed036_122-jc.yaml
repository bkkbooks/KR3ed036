body:
  text: 卷一百二十二傷寒門傷寒賦第一韻咳嗽惡風惡寒身疼咽痛肉瞤筋惕無汗口燥咽乾寒熱往來似瘧發狂喘渴霍亂吐泄譫語下利黃斑第二韻至如痞滿結胸躁煩嘔噦頭汗出飲水漱水背惡寒吐血衄血多眠不眠固有差殊潮熱發熱亦分優劣不可汗汗後惡寒不可下下後有熱熱多寒少乾嘔不得汗頭疼百脈一宗腹脹小便難臟結第三韻觀夫傷寒脈緊傷風脈遲既有傷寒見風之候也又立傷風見寒以別之風濕中濕兮大小便則秘利可見風溫濕溫兮發正汗則危惡難醫溫毒則發斑有準中暍則自汗無疑夏病曰熱春病曰溫晚發在於二月風病曰痓壞病曰瘧疫癘行乎四時第四韻因知兩感病曰雙傳類傷寒有四證三陰無頭疼身熱三陽有合病並病四肢逆冷謂之厥指頭微寒謂之清舌厚曰苔聲重曰鄭有表寒有裡寒有陰盛有陽盛頂天履地人為物之最靈剖腹易心醫者人之司命第五韻豈不聞無求子真一世之雄長沙公乃百川之宗喜壯熱止其利曰斷下厥而利反能食曰除中當下而汗為亡陽為厥竭為譫語當汗而下為痞氣為懊憹為結胸服麻黃湯煩躁者必衄血服桂枝湯嘔逆者必吐膿戰掉謂之振慄動悸一曰怔忡唇上生瘡狐惑便成濕唇飢不能食蛔厥即吐長蟲第六韻大抵醫有賢愚疾無今古陰受之則入於五臟陽受之則入於六腑無汗而煩躁者可服青龍無汗而喜渴者勿投白虎陽明自汗而引飲者五苓散甚非所宜太陽自汗而溲數者桂枝湯不可妄與發散屬以辛甘湧泄系乎酸苦姜專主嘔嘗稽思邈之書桂本墜胎請驗安常之語第七韻抑又聞脾受賊邪者大勢已去脈見離經者其風莫當陽墮發狂則逾垣上屋日晡潮熱或循衣摸床口噤咬齒者大承氣乾嘔脅痛者十棗湯動氣理中加白朮腹痛桂枝增大黃桂枝下咽陽盛則斃大承入胃陰盛乃亡陰脈沉細而緩陽脈浮弦而長傷食傷寒須辨人迎氣口有根有本必診太谿衝陽第八韻斷之曰協熱而利者其腸必垢協寒而利者其腸似鴨誤服湯丸者食不及新觸犯禁戒者死必不臘宜乎古人之所云治傷寒則有法傷寒詩及賦凡論傷寒者先須有定名陽經多體熱陰證少頭疼了了心中印搖搖指下明補湯須是熟利藥不嫌生百問真條貫千金作典型前賢思濟世著論列仙經活人證治賦云風緩寒緊暑虛熱洪風溫濕溫或汗多或汗少風濕中濕有便秘與便通原夫陽虛則陰從內出而寒陰虛則陽自外入而熱惡寒者為表汗則必愈結熱者為里下之隨徹非汗候又不可下表裡無證但和解有浮脈復作里煩內外俱見惟滲泄意曰脈以證別證因脈尋陽脈浮長弦而盛陰脈細微緩而沉治證據陽盛即下胃腑初得腎臟病直溫少陰如脈浮多曰有表但病在太陽而究心皮膚為衛血脈為營營行中外衛行肌肉陽證屬胃陰證屬臟胃入里臟尤深豈不以惡寒一也有熱屬陽無熱屬陰結熱一也不渴為表見渴為里有先溫乃汗之證有先解後攻之理身疼作熱診之浮則腑候外應體痛自利診之沉則臟家病起熱而胸滿噦曰支飲涼而脅堅嘔為里水體如火反欲被寒在骨髓熱在皮膚身極冷猶惡衣寒在皮膚熱在骨髓大抵無身熱無頭疼則溫以陰經之劑有痰妨有胸滿則吐其膈上之忪三陽明俱可下惟合病惡寒者有表當汗並太陽在外解若桂枝入胃者本條用攻所以陽盛有桂枝之斃陰盛多承氣之凶當下而汗為無陽為厥竭為譫語當汗而下為痞氣為懊憹為結胸失下則血凝氣滯而熱厥失汗則熱閉狂妄而蓄膿下汗脈數久便堅當解瘀紅之毒少陰熱壯與斷下轉加熱悶之凶當思無汗煩躁而脈浮緊者可服青龍無汗喜渴而脈單浮者勿投白虎用熱遠熱之為當用寒遠寒而後愈陽明自汗引飲則五苓散非可輕進太陽自汗數溲則桂枝湯不容妄取發散為陽藥以甘辛湧泄為陰劑惟酸苦口噤咬齒大承氣吐取豉行奔豚動氣用桂心嘔由姜主又當知陰病陽脈與汗後而平靜者活陽病陰脈兼汗已而疾洪者亡厥而煩加吐泄腎證未易保厥而利反能食除中何以當或氣逆嘔悶或臍硬肢強或口噤汗戰或肝弦土傷兩感之與臟結臟厥多日而為毒陰毒陽煩躁結胸重暍尋衣而直視囊縮咳逆離經代脈以皆戕斷之曰陽明無汗少陰反熱取表以溫少陰口燥陽明汗多急攻其內下腹滿下囊縮皆陰證之下劑溫漏虛溫澀脈乃陽家之溫輩至曰陰極發燥熱極發厥與夫陰證似陽陽證似陰又當識脈之所在警省云傷寒證候頃刻傳變傷寒治法繩尺謹嚴非可以輕心視之也其間種類不一條例浩繁是固難矣至於陰極發熱熱極發厥陰證如陽陽證如陰腳氣似乎傷寒中暑似乎熱病與夫蓄血一證上熱下冷乍寒乍熱甚至四肢發厥昏迷悶絕凡此等類尤當審思而明辨之若疑似未別體認未明姑且試探切不可妄投決病之劑方藥雖微生死之系也可不謹哉玉函經論生死歌訣上玉函經論生死歌訣中玉函經論生死歌訣下活人書三陽合病歌三陽有合病而三陰無合病不可不知也傷寒合病脈浮長長是陽明浮太陽目痛鼻乾知屬胃陽明頭疼腰痛是膀胱太陽少陽證具悉分明脈更浮弦屬兩經浮太陽弦少陽若是弦中得長脈少陽之病合陽明弦少陽長陽明脈浮而長者太陽陽明合病浮而弦者太陽少陽合病弦而長外有少陽證者少陽陽明合病也浮大者太陽脈長者陽明脈弦者少陽脈太陽陽明脾約是也大便堅小便利者其脾為約用脾約丸惡寒者升麻葛根湯不惡寒反惡熱大便不秘者白虎湯不惡熱大便秘或譫語者調胃承氣湯下之太陽少陽脅下硬滿往來寒熱及有餘證者便與小柴胡湯少陽陽明病因發汗因利小便已而胃中燥實大便難者調胃承氣湯陽明病人本風盛氣實也三陽明無表證者俱宜下大柴胡大小承氣三陽明俱宜下惟惡寒中寒為病在經與太陽合病屬表可發汗麻黃湯並病歌並者譬如二人博金並歸一家之義太陽元與陽明病後並歸來作一家尚有太陽宜發汗太陽證罷下無差太陽初得病發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒者是也若發大汗不出則氣怫鬱不得越散當汗不汗煩躁不知痛處其人短氣但坐此緣汗出不徹故也何以知之蓋脈澀也更當與麻黃湯發其汗則自愈矣太陽之證未罷時用桂枝麻黃各半湯微發其汗太陽證已罷但只有陽明證者當與大承氣湯下之宜矣傷寒十勸傷寒與他證不同投藥一差生死立判李子健傷寒十勸不可不知人家有病招醫未至或無醫者知此十勸則不至有誤所益非輕今詳具之一傷寒頭痛及身熱便是陽證不可用熱藥傷寒傳變共六經而太陽為首太陽病頭疼身熱少陰病有身熱而無頭疼厥陰病有頭疼而無身熱故知頭疼身熱即是陽證若妄投熱藥決致死亡二傷寒必須直攻毒氣不可補益邪氣在經絡中若隨證早攻只三四日痊若妄謂先須補益再行攻毒則便毒氣愈熾多致殺人矣三傷寒不思飲食者不可服溫脾胃藥傷寒不思飲食自是常事終無餓死之理如理中丸之類不可輕用若陽病服之致熱氣增重多至不救丁香巴豆之藥尤不可用四傷寒腹疼亦有熱證不可輕服溫暖之藥難經云痛為實故仲景論腹有時痛之證有曰病甚者加大黃夫痛甚而加大黃意可見也惟身冷厥逆而腹痛者方是陰證須消息之每見腹痛便投熱藥多致殺人五傷寒自利當看陽陰證不可例服補藥暖藥止瀉藥自利惟身不熱手足溫者屬太陰身冷四逆者屬少陰厥陰其餘身熱下利屬陽見當隨證依仲景之法治之每見下利便投熱藥及止瀉藥者多致死亡六傷寒胸脅痛及腹脹滿不可妄用艾灸嘗聞村落見有此證無藥即用艾灸多致毒氣隨火而盛膨脹發喘以死不知胸脅痛自屬少陽腹脹雖屬太陰仲景以為當下之證七傷寒手足厥冷當看陰陽不可例作陰證厥有陰厥有陽厥醫者少能分辨若陽厥而投熱藥殺人速於用刃蓋陽病不至於熱極不能發厥仲景所謂熱深厥亦深者是也熱深而更與熱藥寧能得活耶但看初得病而身熱至三四日後熱氣已深大便秘小便赤或譫語昏憒及別有熱證而發厥必是陽厥宜急用承氣湯以下之若初得病身不熱大便不秘自引衣蓋時或下利或小便數不見熱證而厥逆即是陰厥方可用四逆湯夫厥之所以使人疑者為其脈皆沉也然陽厥脈沉而滑陰厥脈沉而弱又陽厥時復指爪卻溫或有時發熱陰厥則常冷此為可別八傷寒病已在裡即不可用藥發汗傷寒病須看表里如發熱惡寒則是在表證宜發汗如不惡寒反惡熱即是里證若一例發汗則所出之汗不是邪氣是真氣邪未除而真氣先涸死者必矣又別有半在表半在裡之證及無表裡之證不惟皆不可下亦皆不可汗但隨證治之九傷寒飲水為欲愈不可令病人恣飲過度病人大渴當與之水以消熱氣故仲景以飲水為欲愈人見此說遂令病者恣飲因而為嘔為喘咳為呃逆為下利為水結胸為小便不利者多矣故如病人慾飲一碗只可與半碗常令不足者斯為善矣十傷寒初安不可過飽及勞動或行房或食羊肉及食豬骨汁並飲酒病方愈不須再服藥兼脾胃尚弱食飽不能消化病即再來謂之食復病方好氣血尚虛勞動太早病即再來謂之勞復又食羊肉行房並死食豬骨汁並飲酒者再病必重也凡飲食滋味所以養生自非服藥煉液焉能不飲食乎然食之有妨反能為害竊見時人不善調攝以致疾病競起初不知其因飲食而致之者苟全生之家須知切忌之物焉凡所食之味有與病相宜與身為害宜則益體害則成疾以此致危例皆難療凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病更宜冷飲之肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘春不食肝夏不食心秋不食肺冬不食腎四季不食脾辨曰春不食肝者為肝氣主敗脾氣若食肝則又補肝脾氣尤敗甚不可救又肝旺之時不可以死氣入肝恐傷魂也若非旺時即虛以肝補之佳餘臟准此凡肉及汁落地不著塵土者不可食豬肉落水浮者不可食諸肉及魚若狗不食鳥不啄者不可食諸肉不幹火炙不動見水自動者不可食諸肉有點者不可食六畜肉熱血不斷者不可食父母及身本命肉食之令人神魂不安食肥肉及熱羹不得飲冷水諸五臟及魚投地塵土不汙者不可食穢飯餒肉臭魚食之皆傷人自死肉及閉口者不可食六畜自死及疫死皆有毒不可食獸自死北首及伏地者食之殺人食生肉飽飲乳變成白蟲一作血蟲食疫死牛肉令病洞下亦致堅積宜以利藥下之腑臟諸甕中有毒及經夏食之發腎病惡風黃帝針經曰衛氣者所以溫分肉充皮膚實腠理司開闔者也風邪中於衛也則必惡風風則傷衛寒則傷營為風邪所中則分肉不溫而熱矣皮毛不充而緩矣腠理失其實則疏而不密開闔失其司則泄而不固所以惡風也是惡風寒二者均為表證則惡風比之惡寒而輕也惡寒者嗇嗇然憎寒也雖不當風而自然寒矣惡風者謂常居密室之中幃帳之內則舒緩而無所畏也一或用扇一或當風淅淅然而惡此為惡風者也惡寒則有屬於陽者有屬於陰者及其惡風則悉屬於陽非若惡寒之有陰陽也故曰三陰之證並無惡風者此也惡風雖悉在表而發散又自不同若有汗而惡風者則為中風當解其肌里證雖具而惡風未罷者皆當先解其外也又有發汗多而亡陽與其風濕皆有惡風之證蓋以發汗多漏不止則亡陽外不固是以惡風也必以桂枝加附子湯溫其經而固其衛風濕相搏骨節煩疼濕勝自汗而皮腠不密是以惡風也必以甘草附子湯散其濕而實其衛由是觀之惡風屬乎衛者可知矣歌括曰病人衛中分入風脈緩而浮是本宗自與傷寒分兩證不堪例作一般攻宜服桂枝湯惡風汗出怯風吹脈緩而浮但解肌發汗亡陽成漏者溫經之法莫遲緩惡風者見風則怯密室之中無所惡也風傷衛氣虛則腠理不密由是而汗出也證雖屬表不可發汗但微解肌而已衛者陽也風亦陽也所以表怯而惡風蓋亦陽虛故陽邪出而乘之特其病在皮膚邪氣尚淺耳桂枝湯桂枝加葛根湯主之壯熱者與參蘇飲發汗太過衛虛亡陽汗漏不止而惡風者法當溫經用桂枝附子湯或小便難四肢拘急難以屈伸並用桂枝附子湯身熱惡風項強胸脅滿手足溫而渴小柴胡湯風濕者惡風不欲去衣骨節間煩疼掣痛不得屈伸汗出短氣小便不利或身微腫者甘草附子湯惡寒傷寒惡寒者風寒客於營衛之中也惟其風寒客於營衛則洒洒然惡寒也惟其營衛之受風寒則嗇嗇然不欲舒也其惡寒者非寒熱之謂也又非惡風也且惡風者見風至則惡若居密室之中幃帳之內則坦然自舒也至於惡寒則不待風而寒雖身大熱而不欲去衣者是也寒熱之寒謂寒熱更作熱至則寒無矣其惡寒雖發熱而不欲去衣也甚則至於向火被覆而猶不能遏其寒也所以然者由陰氣上入陽中或陽微或風虛相搏之所致也一切惡寒屬表雖里證悉具而微惡寒者亦是表未解也猶當先解其外候不惡寒為外解乃可攻裡也經曰發熱而惡寒者發於陽也無熱而惡寒者發於陰也謂如傷寒或已發熱或未發熱凡惡寒者必繼之以發熱此則發於陽也若惡寒而蜷脈沉細而滑者此則發於陰也在陽者可發汗在陰者可溫里惡寒雖悉屬表而在表者亦有虛實之別若汗出而惡寒者則為表虛無汗而惡寒者則為表實表虛可解肌表實可發汗又有止稱背惡寒者背者胸中之府諸陽受氣於胸中而轉行於背內經曰人身之陰陽者背為陽腹為陰陽氣不足陰寒氣盛則背為之惡寒若風寒在表而惡寒者則一身盡寒矣但背惡寒者陰寒氣盛可知也經曰所謂少陰病一二日口中和而背惡寒者當灸之處以附子湯者是也又或乘陰氣不足陽氣內陷入陰中表陽新虛而背微惡寒者經所謂傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之者是也二者一為陰寒氣盛一為陽氣內陷又何以明之也蓋陰寒為病則不能消耗津液故於少陰病則曰口中和及陽氣內陷則熱爍津液故於太陽病則曰口燥舌乾而渴也二者均是背惡寒欲辨陰陽寒熱不同者於口中之潤燥可知歌括云惡寒發熱發於陽陰病憎寒身體涼解表桂枝並越婢溫中須索理中湯又論曰發熱微惡寒者柴胡桂枝湯桂枝二越婢一湯發汗後反惡寒者虛也太陽或發熱或未發熱必惡寒也有汗桂枝湯無汗麻黃湯明證俱宜不惟惡寒者表未解也桂枝湯少陽頭汗出而微惡寒者小柴胡湯加桂發熱微惡寒柴胡加桂枝湯惡寒大抵多屬表惟少陰雖惡寒而脈必沉細也宜四逆理中輩以溫之先服四逆湯次服理中湯少陰惡寒而蜷下利手足溫者小建中湯惡寒而蜷時時自煩不欲厚衣大柴胡湯又云汗後惡寒宜芍藥湯脈沉發熱四肢倦疼仍燥下利厥逆四逆湯發汗後復熱似灼精神狂亂譫語更加不食脈單疾醫經號曰陰陽交交者死也言發汗後不為汗衰脈准前單疾依前寒熱者再須看脈候如何若還有表重加汗之里證下之即除汗之宜大柴胡湯下之大小承氣湯又云汗後陽虛微惡寒下之陰弱還生熱皆緣醫者誤於調停致使病家多下則失血發汗則損氣損氣則脈微故惡寒也四逆湯或芍藥甘草附子湯失血則脈澀故發熱也苦葶藶酒湯此皆仲景所謂不當汗下而誤汗下故有此二證也夫惡寒者皆為表證或里證備具而微惡寒者是表猶未解當先解表俟不惡寒然後可以攻裡惡寒家不可近火氣及過覆衣被恐寒熱相搏脈道沉伏愈令寒不可遏但服和表等劑溫而散之汗後反惡寒者為虛芍藥甘草附子湯不得復發其汗心下痞而惡寒者表未解也當先解表用桂枝湯表解然後攻痞用三黃瀉心湯入生薑汁凡脾胃素虛之人遇暑月或飲冷水或多吃茶或餐瓜果之屬易致生冷壞脾寒氣蓄聚陰上乘陽故寒從背起冷如冰當以溫藥主之寒熱傷寒寒熱者謂往來寒熱也經曰邪正分爭往來寒熱者言邪氣之入也而正氣不與之爭則但熱而無寒也乃有熱而寒者謂其正氣與邪氣分爭於是寒熱作矣爭則氣鬱不發於外而寒熱爭焉爭甚則憤然而熱故寒已而熱作焉茲乃寒熱之理也或謂寒熱者陰陽之勝也陽勝則熱陰勝則寒此陰陽之爭也何則蓋以寒為陰而熱為陽里為陰而表為陽邪之客於表者為寒邪與陽相爭則為寒矣邪之入於裡者為熱邪與陰相爭則為熱矣其邪氣在於半表半裡外與陽爭而為寒內與陰爭而為熱矣表裡之不拘內外之不定或出或入由是而寒熱且往且來也是以往來寒熱屬半表半裡之證邪居表多則多寒邪居里多則多熱邪氣半在表半在裡則寒熱亦半矣審其寒熱多少見其邪氣淺深矣小柴胡湯專治往來寒熱而又立諸加減法亦為邪氣在半表半裡未有定處往來不常又寒熱如瘧與夫發熱惡寒似是而非者設也然寒熱如瘧者作止有時者也若往來寒熱則作止無時或往或來日有至於三五發者甚者十數發與瘧狀有以異也至於發熱惡寒者為發熱時寒不見惡寒時熱不見也不若此熱已而寒寒已而熱者雖然既往來寒熱屬半表半裡當和解之又有病至十餘日而結熱在裡復往來寒熱者亦可與大柴胡湯下之不可不知也活人書云往來寒熱者陰陽相勝也陽不足則先寒後熱陰不足則先熱後寒往來寒熱有三證用小柴胡湯大柴胡湯柴胡桂枝幹薑湯有表證而往來寒熱者用小柴胡湯有里證而往來寒熱者大柴胡湯或以里證而往來寒熱者皆可用柴胡桂枝幹薑湯也仲景云血弱氣虛腠理開邪氣入與正氣相爭往來寒熱休作有時者小柴胡湯主之又云傷寒五六日往來寒熱胸脅苦滿默默不欲食心煩喜嘔或胸煩而不嘔或下或腹中痛或脅下痞或心下悸小便不利或渴或不渴身有微熱或咳者小柴胡湯主之傷寒十餘日熱結在裡往來寒熱者大柴胡湯主之傷寒五六日已發汗復下之胸腹滿小便不利渴而不嘔頭汗出往來寒熱心煩柴胡桂枝幹薑湯太陽證發汗後依前寒熱者須看脈候如何若脈浮數或洪大則表證猶在當再表也桂枝湯或桂枝二麻黃一湯之類醫人為見已汗下而寒熱不敢再表誤也蓋脈浮為在表表之必愈也或得汗而解復如瘧狀日晡發熱者屬陽明也若脈實者可下之宜大柴胡湯大承氣湯若發汗後身惡寒者虛也發汗後身發熱者實也惡寒者芍藥甘草附子湯發熱者調胃承氣湯若陰證大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之歌曰熱多寒少屬膀胱不嘔清便各半湯尺脈若遲為血少脈皆微弱號無陽熱多寒少陽乘陰也以上三證並屬太陽脈浮緊者可汗或脈遲弱者和解之清便自可者大便如常也不嘔清便自可桂枝麻黃各半湯尺脈遲血少者先用小建中湯加黃耆以養血如脈尚遲再作一劑候脈不遲即以小柴胡桂枝二越婢一湯治之若脈浮緩熱多寒少亦可發汗脈皆微弱無陽者用桂枝二越婢一湯治之也汗余寒熱脈中論若見憎寒法用溫沉實當攻浮在表風溫誤汗熱而煩汗後寒熱邪氣未解徹也脈浮洪者邪在太陽法當再汗脈沉實者邪在陽明又須下之若厥陰餘熱加以下利厥逆惡寒者四逆湯溫之無疑矣憎寒者屬厥陰大汗出熱不去拘急體痛下利厥逆四逆湯溫之脈沉實者屬陽明得汗後如瘧狀日晡發熱大柴胡湯承氣湯下之若身惡寒則為虛用芍藥甘草附子湯身發熱則為實用大承氣湯脈浮洪者屬太陽汗後寒熱桂枝二麻黃一湯風溫不惡寒若誤發汗必心煩熱渴獨語葳蕤湯風溫家汗後大熱脈躁名陰陽交不治熱病已得汗而脈躁盛者亦不治詳見陰陽交條有再汗再下之劑發熱傷寒發熱者謂怫怫然發於皮膚之間熇熇然而散者是也與潮熱寒熱若同而異與煩躁相類而非煩躁者在內者也潮熱之熱不失其時寒熱之熱寒已而熱相繼而發至於發熱則無時而發也有謂翕翕發熱者有謂蒸蒸發熱者此則輕重之不同表裡之區別耳所謂翕翕發熱者明其熱在外也故與桂枝湯發汗以散之所謂蒸蒸發熱者明其熱在內也故與調胃承氣湯攻下以滌之其發熱屬表者即風邪客於皮膚陽氣怫鬱所致也其發熱屬裡者即陽氣下陷入陰中所致也觀其熱所從來而汗下之證明其辨曰若熱先自皮膚而發者邪氣之在外也若熱先自里發而達於表者邪氣之在裡也此二者為邪氣在表裡而發熱也惟其在表在裡俱有發熱故邪之在半表半裡者亦有發熱之證何者以表證未罷邪氣傳裡里未實是為半表半裡其發熱者或始自皮膚而漸傳於裡或始自內熱而外達於表蓋邪氣在表發熱者則表熱里未熱也邪氣在裡發熱者則裡熱甚而達於表也其在半表半裡發熱者則表裡俱發熱但其熱又輕於純在表者也經曰發熱惡寒者發於陽也無熱惡寒者發於陰也然少陰病始得之亦有反發熱者蓋熱亦在表也特與麻黃附子細辛湯發其汗是以發熱為傷寒之常也或陰陽俱虛與其下利新汗後又皆忌其發熱也經云脈陰陽俱虛熱不止者死下利發熱者亦死內經云汗出輒復熱而脈燥疾不為汗衰狂言不能食者此名陰陽交交者死也此亦忌發熱也詎可與尋常發熱一概而論耶醫者更當明辨之活人書云發熱而惡寒者屬太陽也太陽病必發熱而惡寒蓋太陽主氣以溫皮膚分肉寒氣留於外皮膚緻密則寒慄而發熱宜發其汗麻黃湯大青龍湯主之若發熱微惡寒者桂枝二越婢一湯主之若吐利而發熱惡寒者霍亂也太陽病發熱而渴不惡寒為溫病若發汗已身體灼熱者為風溫也身熱汗出濈濈然者屬陽明病脈浮者宜桂枝湯微汗之脈實者調胃承氣湯下之便不秘者白虎湯和解之若陽明病發熱汗多者宜承氣湯急下之蓋汗多發熱者胃汁干故也仲景云太陽證汗後不惡寒但惡熱者實也當和其胃氣宜調胃承氣湯太陽病三日發汗不解蒸蒸發熱者屬於胃也宜下之脈細頭疼嘔而發熱者屬少陽也少陽發熱小柴胡湯主之不可發汗發汗則譫語病人不渴外有微熱者小柴胡湯加桂枝主之此法不特傷寒也仲景云表有熱者小柴胡加桂也里有熱者白虎加人參也太抵身熱不飲水者為表也口燥煩渴者為里也二藥均治發熱然分表裡不可不知也發汗已身灼熱者名風溫素問云汗出而身熱者風熱也因其人素傷於風復傷於熱風熱相搏即身熱常自汗出此名風溫病人無表裡證發熱七八日脈雖浮數宜大柴胡湯下之大便閉者加大黃假令已下脈數不解身熱消穀善飢至六七日不大便者有瘀血也抵當湯主之若傷寒瘥後更發熱者小柴胡湯主之脈浮者以汗解脈實者下之又問陰證有發熱者乎太陰厥陰不發熱少陰發熱有二證仲景謂之反發熱也少陰病初得之發熱脈沉者麻黃細辛附子湯主之少陰病脈沉發汗則動經此大略之言耳脈雖沉而發熱在表亦當以甘辛之藥泄肝而溫散也仲景云傷寒之候從風寒得之表中風寒入里則不消須用溫藥少汗而解少陰病下利清穀裡寒外熱手足厥逆脈不出者通脈四逆湯主之大抵陰病發熱終是不同脈必沉或下利手足厥也煩熱傷寒煩熱者與發熱同而異也發熱者怫怫然發於肌表有時而已者是也煩者為煩而熱無時而發者是也二者均是表熱而煩熱為熱所煩非若發熱之時作時止也故謂之煩熱經曰病人煩熱汗出則解又曰發汗已解半日許復煩脈浮數者再與桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈即此觀之則煩為表熱明矣故又有煩疼即是熱疼又有煩渴即是熱渴也以煩為熱又何疑焉至於胸中煩心中煩內煩虛煩皆以煩為熱設傷寒至六七日手足三部脈皆至大煩而渴口噤不能言其人躁擾者與脈和大煩目腫瞼內際黃者又皆為欲解所以言大煩者以肌表大熱則是邪熱欲去泄越於外也故為欲解內經曰謹熟陰陽以意調之舌上苔傷寒舌上苔者蓋舌乃心之官法應南方火本紅而澤傷寒三日以後舌上有膜白滑如苔甚者或燥或澀或黃或黑是數者熱氣淺深之謂也邪氣在表則舌上無苔及邪氣傳裡津液結搏則舌上生苔也寒邪初傳未全成熱或在半表半裡或邪氣客於胸中者皆舌上白苔而滑也經曰舌上有苔者以丹田有熱胸中有寒邪初傳入里故也少陽病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯是邪氣在半表半裡者也太陽病若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之是邪氣客於胸中者也臟結宜若可下舌上苔滑者則云不可攻也是邪未全成熱猶帶表寒故也及其邪傳為熱則舌上之苔不滑而澀矣經曰傷寒七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之是熱耗津液而胃汁已干也若熱聚於胃則舌為之黃是熱邪已深也金匱要略曰舌黃未下者下之黃自去若舌上色黑者又為熱之極也黃帝針經曰熱病舌乾黑者死以心為君主之官開竅於舌黑為腎色見於心心屬火腎屬水邪熱已極鬼賊相刑故知必死觀其口舌亦可見其逆順矣歌括曰飲食如常時下利更見舌上白苔時連臍痛引陰筋者臟結元來死不醫無陰證不往來寒熱其人反靜舌上白苔者不可攻也可刺關元穴仍與小柴胡湯又曰舌苔大熱療應難利腹疼兮嘔惡寒懊憹脅堅並中滿更兼臟結六條看尺寸脈緊口中熱氣而乾燥足冷蜷臥鼻中涕出舌上苔滑勿妄治也或七八日以來微熱手足溫為欲解者或過七八日以上反行大熱者難治若腹疼者必欲利也與理中湯若惡寒者必欲嘔也與小柴胡湯更加人參栝蔞根又太陽病誤下者胃中空虛客熱動膈令人懊憹梔子豉湯或太陽證具其脈浮緊下之而懊憹舌苔用藥相同少陽證脅下硬滿不大便而嘔舌上白苔小柴胡湯陽明之證中濕舌上生苔以丹田有熱胸中有寒濕故也五苓散主之臟結亦屬陽證舌上白苔病有本條舌黃者法當下之舌黑者不治胸脅滿傷寒胸脅滿者謂胸脅間氣塞滿悶也非心下滿者也脅滿者謂脅下氣脹䐜滿也非腹滿者也邪氣自表傳裡必先自胸脅次經心腹而入胃入胃為入腑也是以胸滿多帶表證脅滿多帶半表半裡證也經曰下後脈促胸滿桂枝去芍藥湯主之又曰陽明病喘而胸滿者不可下宜麻黃湯是胸滿屬表而鬚髮汗者也蓋胸中去表猶近也及脅滿則更不言發汗但和解而已經曰設胸滿脅痛者與小柴胡湯主之胸滿不去者小柴胡湯主之本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱脈弦緊者小柴胡湯主之是知胸脅滿屬半表半裡明矣大抵胸脅滿以邪氣初入里尚未停留為實氣鬱積而不行致生滿也和解斯可矣若邪氣留於胸中聚而為實者非湧吐則不可也故華佗曰四日在胸吐之則愈是邪氣已收斂而不散漫者則可吐之內經曰其高者因而越之病在胸膈之上為高越之為吐也又經曰病在胸中當吐之病應發汗若下之而煩熱胸中窒者則以梔子豉湯吐之若胸中痞硬氣上衝咽喉不得息者此為胸中有寒也則以瓜蒂散吐之二者均是吐劑然梔子豉湯吐胸中虛煩客熱也瓜蒂散吐胸中痰實宿寒也若能審明藥劑之輕重辨別邪氣之淺深對證投湯而不效者未之有也胸滿者胸膈間氣塞滿悶非心下滿也脅滿者脅肋下氣脹䐜滿非腹中滿也胸滿多帶表證脅滿多在半表半裡之間太陽病下後脈促胸滿桂枝去芍藥湯蓋病在衛氣芍藥入營其性利故去之陽明喘而胸滿者此猶帶表證不可下與麻黃湯脅胸俱滿或脅硬痛此半表半裡之證並用小柴胡湯和解之胸中虛煩客熱或經汗下後煩熱實塞逆氣搶心並用梔子生薑湯胸中痰實宿寒瓜蒂散吐之又陽明病心下硬滿不可下下之遂利不止而死法當用吐詳見結胸解按此則胸中虛寒而氣痞也或用半夏瀉心湯生薑瀉心湯孫用和云胸滿則諸瀉心湯審證用若邪氣客於胸中法當湧吐經所謂其高者因而越之是也然又有汗吐下後邪氣乘虛入而為煩是則胸中客熱以梔子豉湯吐之此吐劑之輕者也不經發汗吐下邪氣留聚煩滿是則胸中宿寒以瓜蒂散吐之此吐劑之重者也均之為吐又當權變又胸膈不快䐜滿閉塞唇青手足冷脈沉細少情緒或腹痛此屬太陰也近人多不識陰證才見胸膈不快便投熱藥非其治也大抵陰證者由冷物傷脾其證胸膈䐜滿面色及唇口皆無色澤手足冷脈沉細少情緒亦不由嗜欲但內傷冷物或損動胃氣遂成陰證復投巴豆之類胸膈愈覺不快或下利經一二日遂致不救蓋不知寒中太陰也太陰者脾之經也又問曰凡飲食不節胸膈不快寒中陰經何以治之答云急作理中湯加青皮陳皮銼如麻豆大服一二劑胸膈即快枳實理中丸五積散尤良又傷寒汗出兩脅疼痛或乾嘔此十棗湯證也仲景云太陽中風嘔逆下利表解者乃可攻之其人漐漐汗出發作有時頭疼心下硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之大抵脅下痛者此為有飲須分表裡乾嘔微利發熱而咳為表有水小青龍湯加芫花主之身體涼表證罷乾嘔脅下痛為里有水十棗湯主之然十棗湯非小青龍湯之可比須量人之虛實為要小腹滿傷寒小腹滿者臍下滿是也小腹者下焦所治難經曰下焦者當膀胱上口主分別清濁其治在臍下邪氣入而至於下焦結而不利故小腹滿也胸中滿心下滿皆氣耳並無物也及腹滿又有燥屎為之者若至於小腹滿則非氣矣必有物聚而始為滿焉所以然者身半以上同天之陽清陽歸之身半以下同地之陰濁陰歸之清者在上濁者在下內經謂清陽出上竅濁陰出下竅當出不出積而為滿是在上而滿者氣也在下而滿者物也所為物者溺與血爾邪氣聚於下焦則津液不得通血氣不得行或溺或血留滯於下是以脹滿而硬痛也若從心下至小腹皆硬滿而痛者是邪實也須大陷胸湯下之若但小腹硬滿而痛小便利者則是蓄血之證小便不利者則是溺澀之證經曰小腹滿應小便不利今反利者為蓄血也又曰小腹硬小便不利者為無血也小便自利其人如狂者血證諦也其小便利而小腹滿者為太陽隨經瘀血在裡太陽自入府者也經曰太陽病熱結膀胱其人如狂血自下者愈其外未解者尚未可攻當先解外外解已但少府急結者可攻之桃仁承氣湯主之是小腹硬滿為物聚於下可知矣滲之利之參酌隨宜可為上工短氣傷寒短氣者氣短而不能相續也似喘而非喘若有氣上衝而實非氣上衝也喘者張口抬肩搖身掖肚之謂也氣上衝者氣時時上衝也所謂短氣者呼吸雖數而不能相續似喘而不抬肩似呻吟而無痛者是也經所言短氣者眾實為難辨之證愚醫莫識其治為誤者多矣要識其短氣之真者氣急而短促者是也短氣有責為虛者有責為實者要當明辨之經曰趺陽脈浮而緊緊則為寒浮則為虛虛寒相搏則為短氣此短氣之虛者也短氣腹滿而喘身有潮熱此外欲解可攻裡也此短氣之實者也又有屬表者有屬裡者要當審視之經曰短氣但坐汗出不徹故也更發汗則愈與夫風濕相搏汗出短氣小便不利惡風不欲去衣甘草附子湯主之者是邪氣在表而短氣者也乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之與夫太陽病醫反下之短氣躁煩心中懊憹陽氣內陷心中因硬則為結胸大陷胸湯主之是邪氣在裡而短氣者也虛也實也表也里也皆作短氣又何以辨其虛實也大凡心腹脹滿而短氣者邪在裡而為實也心腹濡滿而短氣者邪在表而為虛也大抵短氣為實金匱要略曰短氣不足以息者實也又水停心下亦令短氣金匱要略又曰食少飲多水停心下微者短氣即此觀之短氣之由亦眾矣必審其形似使的而不惑必審其邪氣在表在裡之不差隨證攻之自無不愈者矣氣短者呼吸短促而不能相續是也其有呼多吸少者皆不救千金曰少氣不足以息者危金匱曰短氣不足以息者實也大抵短氣亦有表裡虛實之差心腹脹滿而短氣者邪在裡而為實也心腹濡滿而短氣者邪在表而為虛也其或怔忡氣短此則因水停心下所致體認不真差之毫釐謬以千里矣又氣短潮熱腹滿而喘者此為外欲解而裡實也小承氣湯大柴胡湯風濕相搏汗出短氣小便不利惡風不欲去衣其邪在裡甘草附子湯食少飲多水停心下亦令氣短小半夏湯身涼乾嘔短氣汗出不惡寒此表解而里有水十棗湯服之太陽短氣煩躁心中懊憹或結胸大陷胸湯丸動氣傷寒動氣者乃築築然動於腹中者是也臟氣不治隨臟所至發泄於臍之四旁跳動築築然謂之動氣難經曰肝內證臍左有動氣按之牢若痛心內證臍上有動氣按之牢若痛肺內證臍右有動氣按之牢若痛腎內證臍下有動氣按之牢若痛是臟氣不治腹中氣候發動也動氣應臟是皆真氣虛雖有表裡之證亦不可汗下經曰動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤是發汗而動肝氣者也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷是下之而動肝氣者也動氣在上不可發汗發汗則氣上衝正在心端是發汗而動心氣者也動氣在上不可下下之則掌握煩熱身上微冷熱汗自泄欲得水自灌是下之而動心氣者也動氣在右不可發汗發汗則衄而渴飲則吐水是發汗而動肺氣者也動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸是下之而動肺氣者也動氣在下不可發汗發汗則無汗心中大煩骨節苦痛目暈惡寒食則反吐谷不得下是發汗而動腎氣者也動氣在下不可下下之則腹滿猝起頭眩食則下清穀心下痞是下之為動腎氣者也其脾內證當臍有動氣經特曰臍之四旁動氣不可汗下而獨不言脾蓋當臍有動氣者以脾主中州為胃以行津液發汗吐下耗損津液必先動脾其餘四臟動氣發動妄有汗下猶先動脾脾家發動氣者詎可動之也所以特不言之也傷寒所以必看外證為當者蓋不在脈之可見必待問之可得也發汗吐下者務要審諦舉此動氣類可知矣歌括云奔豚動氣數般方左右高低細揣量去朮理中並用桂不堪汗下例中詳動氣者臟氣不調築築然跳動隨臟所主而行見於臍之左右上下也大抵真氣內虛水結不散氣與之搏即發奔豚以其走動衝突如豚之奔雖有發表攻裡之證汗下並不可也其不言當臍動氣者何也蓋脾胃為中州以主津液妄施汗下必先動脾是以不言而喻也舉此動氣非問證何以知之然則調理傷寒貴於纖悉問證動氣諸藥詳見不可汗不可下條例中太陽病下之後氣上衝者桂枝湯若不上衝不可與也若從腹上衝於心桂枝加桂湯發汗後臍下悸者欲作奔豚也茯苓桂甘大棗湯動氣通用理中湯去朮加桂蓋桂利小便泄奔豚故也奔豚亦名腎氣白朮燥腎閉氣是以去之汗吐下後心下逆滿氣上衝胸起即頭眩其脈沉緊誤汗之則動經故其身振振搖動茯苓桂甘白朮湯主之此方用白朮者蓋以誤汗動經故以白朮閉其汗也奔豚動氣脈沉弱肢體冷可與養正丹動氣證治論用柴胡桂枝湯鬱冒傷寒鬱冒者蓋郁為鬱結而氣不舒也冒為昏冒而神不清也世謂之昏迷者是也鬱冒之來皆虛極而乘寒則有之矣經曰諸乘寒者則為厥鬱冒不仁又曰太陽病先下之而不愈因復發汗以此表裡俱虛其人因致鬱冒汗出自愈所以然者汗出表和故也是知因虛乘寒乃生鬱冒頭眩傷寒頭眩者眊非毛而見其毛眩非玄而見其玄眊為眼花眩為眼黑眩也運也眊也三者形俱相近有謂之眩運者有謂之眩冒者運為轉運之運世謂之頭運者是矣冒為蒙冒之冒世謂之昏冒者是矣少陽之為病口苦咽乾目眩以少陽居表裡之間表邪所傳漸行於里中氣已虛故時時目眩也二陽並病頭項強痛或眩冒以少陽與太陽並病故眩者責其虛也傷寒有起即頭眩與眩冒者皆因發汗吐下後所致是其陽虛也故針經有曰上虛則眩下虛則厥眩雖為虛而風家亦有眩者蓋風主運動故也傷寒陽明病但頭眩不惡寒者故能食而咳其人必咽痛為陽明中風是風亦主頭眩也諸如此者皆非逆也及其諸逆發汗劇者言亂目眩而死嗚乎病勢已成可得半愈及病勢已深雖神醫其能治之耶冒因虛極有傷寒頭疼胸堅屬三陽汗吐下後脈沉自利者理中湯冒者蒙冒之謂眩者眩運之謂上虛則眩諸虛極而乘寒則冒二者皆病似眩輕而冒重也婦人新產血虛挾寒必冒冒家自汗則愈若少陰病下利止而頭眩時時自冒者皆虛極而脫也其諸逆發汗劇者言亂目眩雖遇歧扁其能起之乎太陽並病頭項強痛或眩冒胸中痞硬刺太陽戒不得發汗少陽本證亦有自眩見本條陽明中風頭眩自有本條汗吐下後虛煩脈微或緊心下痞脅下痛氣上衝胸眩冒身搖筋脈動惕久而成痿茯苓桂枝白朮甘草湯甘草乾薑湯四逆湯隨輕重用太陽病若下之不愈因復發汗以此表裡俱虛其人必冒冒家汗自出而愈又痰飲聾冒厥逆少與易簡三生飲感濕頭重眩暈芎術除濕湯金匱曰產婦亡血復汗寒多故冒又曰產婦厥冒其脈微弱不能食大便堅蓋血虛則厥而必冒也搖頭傷寒搖頭者蓋頭者諸陽之會也諸陽之脈皆上於頭諸陰脈皆至頸胸中而還陽脈不至則頭為之搖傷寒搖頭有三皆所主不同也有口言而搖頭者里痛也以里有痛者語言則劇欲言則頭為之戰搖也有曰獨搖頭猝口噤背反張者痙病也以風盛於上風主頭搖故也里痛非邪也痛使之然痙病非逆也風使之然至於陽反獨留形體如煙燻直視搖頭者名曰心絕蓋心藏神而為陽之本陽根於陰陰根於陽陰陽相根則營衛上下相通矣絕則神去而陰竭陽無根則不能主持故頭為之搖矣玉函曰灌苗者必固其根伐木者必枯其上內絕其根外作搖頭又何疑焉心絕者真病也風痙里痛者邪氣也觀其頭搖又當明其臟痞也搖頭直視形似煙燻為真病心家已絕若痙病有反張口噤頭搖者蓋頭者諸陽之會諸陽有乖則頭為之搖然有心絕而搖頭者有風盛而搖頭者形證皆不類焉蓋陰根於陽陽根於陰陰陽相根氣血所以周流而無間心絕則神去而陰竭陽獨無根不能自主是以頭搖經所為陽反獨留形如煙燻直視搖頭者此也至於太陽發痙則風盛於上風主乎動是以頭搖經所謂獨頭搖猝口噤背反張者此也言而搖頭者頭中有痛言則痛甚痛則必搖經所謂搖頭言者里痛也又曰言者為虛不言者為實是也合而言之均是搖頭析而分之曰實邪曰虛邪曰真病又當明其臟痞云搖頭直視形如煙燻者心家絕也為真病不治太陽發痙搖頭口噤背反張身熱足冷各有本條搖頭言者其里有病言者虛也可與如聖餅及芎辛湯服之項強傷寒項強者蓋太陽經脈起於目內眥上額交顛上入絡腦還出別下項循肩膊內挾脊抵腰中經曰太陽之病項脊強痛而惡寒以太陽感受風寒則經脈不利而項為之強頸為之急爾傷寒頸項強急者太陽表證也必發散而解之可也太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之太陽病項背強𠘧𠘧無汗惡風者葛根湯主之是皆發散之劑也二者皆是項背強而發散有輕重者蓋發熱汗出惡風者為表虛表虛者可解肌無汗惡風者為表實表實者可發汗是以為治不同也桂枝加葛根湯方是桂枝湯加麻黃葛根葛根湯方亦是桂枝湯加麻黃葛根然深解究之無汗惡風為表實正可發汗則於桂枝湯中加葛根麻黃為當矣汗出惡風者為表虛表虛者宜解肌恐是桂枝湯中但加葛根而不加麻黃也𠘧音殊引頸之貌𠘧短羽鳥也短羽之鳥不能飛騰動則先引伸其頸爾項背強者動亦如之非如几案之幾而偃屈也太陽傷寒項背強其或太陽中風加之寒濕而成痙者亦項強也經曰病者身熱足寒頸項強急惡風時頭熱面赤目赤獨頭面搖口噤背反張者痙病也金匱要略曰太陽病其證項背強𠘧𠘧然脈反流動者此為痙桂枝加栝蔞湯主之然項背強雖悉屬太陽證當發散而又有結胸病者項亦強如痙狀下之則和宜大陷胸丸主之臨病之際審其表裡可汗可下隨證投湯則萬全矣傷寒頭項強急太陽表證也當發散而解之若誤下則太陽邪風乘虛入里則為結胸太陽病項背強無汗而惡風則為表實宜葛根湯汗出惡風則為表虛宜桂枝湯加葛根不加麻黃太陽誤下而成結胸亦項強宜大陷胸丸凡太陽傷風復感寒濕身有熱而足有寒及頭搖口噤背反張脈沉遲者此為發痙可與桂枝加栝蔞根湯項強而脅下滿者可與小柴胡湯直視傷寒直視者蓋視物而目睛不轉動者是也水之精為志火之精為神目者心之使也神所寓焉肝之外候也精所榮焉針經曰五臟六腑之氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑睛血之精為絡氣之精為白肌肉之精為約束裹擷筋骨血氣之精與脈併為繫上屬於腦五臟血氣調和精氣充榮則目和而明矣傷寒目直視者邪氣壅盛冒其正氣使神志不慧五臟之精氣不上榮於目則為之直視傷寒至於直視為邪氣已極證候已逆多難治經曰衄家不可發汗汗則額上陷脈息緊急直視不能眴不得眠以肝受血而能視亡血家肝氣已虛目氣已弱又發汗亡陽則陰陽俱虛所致也此雖錯逆猶未甚也逮乎狂言反目直視又為腎絕直視搖頭又為心絕此臟氣脫絕也直視譫語喘滿者死下利者亦死又劇者發則不識人尋衣摸床惕而不安微喘直視皆邪氣盛而正氣脫也其或有目中不了了睛不和無表裡證大便難身有微熱者是非直視也此為內實也可用大承氣湯大柴胡湯下之直視為不治之疾目中不了了為可治之候二者形證相近宜熟視之歌曰直視無神不轉睛衄兼少血汗猶輕遺溺喘泄搖頭證脈澀尋衣並猝傾又論云水之精為志火之精為神五臟六腑之精皆上注於目病人邪氣極盛冒其正氣遂使神志不慧目不轉睛而為之直視證候最逆不救者多並有反目倒竄眼睛上勝此則腎絕雖有神丹不可救矣又衄血不可汗汗之則額上陷脈緊急直視不能眴不得眠又發汗亡陽則陰陽俱虛必至直視二者不治雖逆猶未甚也狂言遺尿反目直視為腎絕不治直視譫語喘滿者不治下利者亦不治搖頭直視形如煙燻心絕不治尋衣摸床惕惕不安微喘直視日晡潮熱下之脈弦者生脈澀者死弦為陽澀為陰是陽病見陰脈邪盛而正脫也無表證目中不了了睛不和大便難者此非直視蓋內實也可與大柴胡湯或小承氣湯下之不仁仁柔也不仁謂不柔和也癢不知也痛不知也寒不知也熱不知也任其屈伸灸刺不知是謂不仁也由邪氣壅盛正氣閉伏鬱而不發營衛虛少不能通行所以然也內經曰營氣虛則不仁針經曰衛氣不行則為不仁經曰營衛不能相將三焦無所仰身體痹而不仁即是言之知營衛血氣虛少不能通行而為不仁者明矣經曰諸乘寒者則為厥鬱冒不仁此言厥者以正氣為寒氣所乘而厥也非四肢逆冷之厥也何者蓋鬱冒為不仁為不知痛癢不得為屍厥之厥即經曰少陰脈不至腎氣微精氣少奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為屍厥其乘寒之厥鬱冒不仁即此屍厥可知矣若越人入虢診太子為屍厥以鬱冒為不仁為可治刺之而得痊實神醫之診也嗚呼設或脈浮而澀身汗如油喘而不休水漿不下形體不仁此又為命絕雖有越人其能起之歟歌曰不仁口腹及膚皮痛癢寒溫總不知正氣重為邪氣伏營虛衛弱厥如屍經曰乘寒則為厥鬱冒不仁蓋其血氣虧少不能周流於一身於是正氣為邪氣所阻故肢體痛癢不知厥如屍而鬱且冒也苟其不仁脈或浮洪發喘無已水漿不下汗出如油是氣絕於命門束手待盡而已甘草乾薑湯桂枝芍藥湯加乾薑或桂枝麻黃各半湯以意量用少陰脈不至腎氣微精血少寒氣上奔血結心下陽氣退下熱歸陰股與陰相動令其身不仁是謂屍厥頭汗傷寒頭汗者蓋頭者諸陽之會也邪搏諸陽津液上湊則汗見於頭也邪熱內蓄蒸發腠理遍身汗出者謂之熱越若身無汗則熱不得越熱蒸於陽故但頭汗出也何者以三陰之經皆上至頸胸中而還不循於頭獨諸陽脈上循於頭爾經曰但頭汗出身無汗際頸而還小便不利渴引水漿此為瘀熱在裡身必發黃為熱不得越而上達者也又熱入血室與其虛煩或陽明被火及水結胸皆但頭汗出也俱是熱鬱於內而不得越者也此數者或吐或下皆欲除其熱也或謂頭汗之證悉屬陽明而為裡熱也而有不屬陽明屬表者乎且邪但在表者則為頭汗之證必也寒熱相搏與邪氣半在表半在裡者乃有頭汗也傷寒五六日發汗而復下之胸脅滿微結小便不利渴而不嘔是頭汗出往來寒熱心煩及傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者皆邪氣半在表半在裡令頭汗出也濕家但頭汗出欲得被覆向火者乃寒濕相搏令頭汗出也茲數者皆邪氣相干令頭額自然汗出又不謂之逆其小便不利則惡見頭汗出也濕家下後亦惡見頭汗出也茲二者乃為頭汗之逆者也何則以小便不利而成關格若頭汗出陽脫也經曰關格不通不得尿頭無汗者生有汗者死濕家下後若額上汗出而微喘者亦陽脫也經云濕家下之額上汗出小便不利者死下利不止者亦死脈經曰陽氣上出汗見於頭者蓋陽脫也則知可治而治知不可治而不治欲得十全之工者在於明辨而審的也歌括曰要知頭汗非陰證際頸而還似發黃心水滿時名水結曾經汗下別推詳又歌曰頭汗諸陽氣上熏身黃尿秘引漿頻心忪水結譫語血表裡柴胡小是珍又論云諸陽之經循於頭三陰則至頸而還也裡虛表實腠理致密熱不得越陽氣上騰津液上湊而汗出於頭抑亦裡虛內涸使然耳夫裡虛則不可下內涸則不可汗頭汗之證無所謂表邪汗之固不可也若無陽明熱入血室燥糞譫語候過經利之以小承氣湯是可無以權之哉大抵寒濕相搏與夫邪在半表半裡之間則有頭汗設或小便不利內外關格頭汗則為陽脫濕家誤下額上汗出而喘或小便不利或大便自利亦為陽脫二者皆不可治臨證又當審之又發黃證頭汗及頸而止小便難引水漿此受濕也茵陳湯五苓散主之水結胸證心下忪滿無大熱頭汗出小半夏加茯苓湯譫語頭汗是為血熱病屬陽明可與承氣湯若心下懊憹而頭汗者梔子豉湯半在表半在裡及餘證並小柴胡湯寒熱往來微惡寒為表脅下滿大便堅為里汗下後胸滿微結寒熱心煩嘔渴為表未解柴胡桂枝幹薑湯或柴胡桂枝湯又病人表實裡虛玄府不開則陽氣上出汗見於頭凡頭汗出者五內乾燥胞中空虛津液少也慎不可下下之是謂重虛然頭汗出者有數證傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦有里也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也小柴胡湯主之傷寒五六日已汗下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此表未解也柴胡桂枝幹薑湯主之病人但頭汗出身無汗際頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃五苓散茵陳湯陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之心滿緊無大熱頭汗出者茯苓湯主之仲景云傷寒心下緊滿無大熱但頭汗出者此名為水結胸故頭汗出刺期門隨其實而瀉之濈然汗出下血譫語則愈汗出譫語者有燥屎也過經乃可下之下之早語言必亂表實裡虛故也自汗傷寒無汗者七證自汗者九證太陽傷寒無汗剛痙無汗少陰病無汗太陰病無汗厥陰病無汗陰陽易病無汗陽明病反無汗此七證也自汗者九證衛不和自汗病人臟無他病時發熱自汗出而不愈者衛不和也先其時發汗則愈屬桂枝湯太陽病發熱汗出而不愈者風並於衛則營弱而衛強故發熱汗出欲散風邪者宜桂枝湯又病常自汗出者此為營氣和營氣和者衛不和也以衛氣不與營氣和諧之故耳營行脈中衛行脈外復發其汗營衛和則愈傷風自汗太陽病發熱汗出惡風脈緩為中風屬桂枝湯又云太陽病項背強𠘧𠘧反汗出惡風桂枝加葛根湯主之汗出而渴者五苓散不渴者茯苓甘草湯雖然仲景云傷風自汗用桂枝然桂枝湯難用須當仔細消息之假令傷風自汗若脈浮而弱設當服桂枝湯服後無桂枝脈息證候而煩者即不可再服也若傷風自汗而小便數者不可與桂枝也仲景云太陽病自汗四肢拘急難以屈伸小便難者可於桂枝湯內加附子服之若小便數者慎不可與桂枝附子湯宜用芍藥甘草湯若誤用桂枝附子攻表便咽乾煩躁厥逆嘔吐作甘草乾薑湯與之以復其陽俟厥愈足溫更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者與調胃承氣湯微瀉則止其譫語蓋芍藥甘草湯主脈浮自汗小便數者寸口脈浮為風大為虛風則生微熱虛則兩脛攣小便數而仍汗出則為津液生不可誤用桂枝湯宜服芍藥甘草湯補虛退風熱通治誤服桂枝湯後病證仍存者風溫自汗太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名風溫其脈陰陽俱浮自汗出身重多眠語言難出葳蕤湯風濕自汗風濕相搏關節煩疼脈沉而細汗出短氣小便不利難經云病而多汗者謂之濕溫中暑自汗太陽中熱者暍是也其人汗出惡寒身熱而渴屬白虎湯陽明病自汗不惡寒反惡熱汗自出者屬陽明也若陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓複利其小便故也故仲景云陽明病發熱汗多者急下之陽明病其人汗多以津液外出胃中燥大便必硬譫語者屬調胃承氣湯雖然陽明病汗多固宜急下若小便自利者是為津液內竭雖爾不可攻之須自大便導之宜用蜜煎導法陽明病汗出而脈遲微惡寒者表未解也宜桂枝湯陽明病應多汗若脈浮無汗而喘者發汗則愈宜麻黃湯亡陽自汗太陽病發汗多遂漏不止其人惡風當溫其經宜桂枝加附子湯傷寒脈尺寸俱緊而汗出者亡陽也此屬少陰法當咽痛復吐利其人熱不去內拘急四肢疼厥逆而惡寒者四逆湯主之汗多不止者可用溫粉撲之若汗多不止必惡風煩躁不得臥者先服防風白朮牡蠣湯次服小建中湯可也柔痙自汗太陽病發熱脈沉細搖頭口噤背反張汗出而不惡寒者名柔痙小續命湯主之也霍亂自汗吐利汗出發熱惡寒四肢拘急手足厥逆者四逆湯主之雖然少陰不得有汗而少陰亦有反自汗出之證陰證四肢逆冷額上及手背冷汗濈濈者亡陽也陽明病法多汗而陽明亦有反無汗之證不可不察也歌曰自汗傷風暑不消風溫風濕衛難調無陽霍亂並柔痙更與陽明共九條又論云胃氣所以密腠理而固津液也衛為邪所幹不能護衛於是而汗出焉寒傷營氣汗獨無之惟風暑濕之邪有干於衛皆為自汗之證也若夫寒已入里寒極生熱熱則營衛通腠理開又為陽明自汗是其熱越而汗出矣治法各有本條若因汗出以致發潤或汗出如油如珠凝而不流此皆不救他病見之亦然太陽傷風自汗脈浮緩者桂枝湯汗出而渴或小便難者五苓散不渴者茯苓甘草湯自汗小便數者勿用桂枝以芍藥甘草湯主之自汗小便數不心煩微惡寒腳攣急桂枝附子湯加人參以調營腳必伸也太陽中暑汗出惡寒身熱而渴者香薷散白虎湯或用小柴胡湯風溫多眠喘息自汗若誤汗之必身灼熱譫語並用葳蕤湯風熱額上自汗關節疼重宜微解肌通用敗毒散余見本條衛不和者臟無他病時發熱自汗出桂枝湯亡陽者太陽證發汗多遂漏不止而惡風用桂枝加附子湯又少陰病尺寸脈緊反有汗出額上手背冷汗為亡陽主咽痛吐利四肢疼急厥逆惡寒四逆湯汗多不止溫粉撲之若汗不止惡風燥不得臥服防風白朮牡蠣湯次服小建中湯咽痛口乾吐利汗出發熱惡寒手足拘急厥冷四逆湯又中暑霍亂煩渴香薷散柔痙太陽病身熱項強反張口噤瘛瘲汗出小續命湯陽明汗多而渴譫語大便硬調胃承氣湯若小便自利而汗出者為津液少不可攻但用蜜煎導法若汗多者胃汁干也急下之宜大承氣湯陽明汗多而渴勿用豬苓湯陽明病反無汗脈浮而喘者用麻黃湯無汗傷寒無汗者蓋以汗乃津液之所積也為風暑濕氣所幹外湊皮膚則為自汗若寒邪中經腠理致密津液內滲則無汗而無汗之由又有數種如傷寒在表及邪行於腠理水飲內蓄與亡陽久虛等證皆令無汗其傷寒無汗則腠理致密也風中衛則自汗寒中營則無汗經所謂太陽病惡風無汗而喘及脈浮緊無汗發熱及不出汗而煩躁陽明病反無汗而小便利二三日嘔而咳手足厥若頭痛鼻乾不得汗脈浮無汗而喘及剛痙無汗是數者皆寒邪在表而無汗者也其邪氣行於里無汗者為邪氣在表熏發腠理則汗出邪氣內傳不外蒸發者則無汗經所謂陽明病無汗小便不利心中懊憹者身必發黃及傷寒發熱無汗渴欲飲水無表證者白虎加人參湯主之與夫三陰為病不得有汗是數者皆邪行於里而無汗者也其水飲內蓄而無汗者蓋水散而為津液滲而為汗水飲內蓄而不行則津液不足而無汗經所謂服桂枝湯或下之仍頭痛項強翕翕發熱無汗心下滿微痛小便不利桂枝湯去桂加茯苓白朮湯主之是津液內滲而無汗者其陽虛無汗故也諸陽為津液之主陽虛少故無汗經所謂脈浮而遲為無陽不能作汗其身必癢陽明病反無汗其身如蟲行皮中之狀此以久虛故也皆陽虛而無汗者也如此者病之常也又焉得異哉當汗而不汗服湯一劑病證仍在至於服三劑而不汗者死病也又熱病脈躁盛而不得汗者謂陽脈之極也死茲二者以無汗為真病詎可與其餘之無汗者同日而語也歌曰傷寒無汗分為七剛痙三陰與太陽更有陽明反無汗下連陰易應魁罡又云傷寒躁盛身無汗或用麻黃汗不行此是諸陽之脈極百中無一可全生若還無汗渾身癢脈更浮遲本屬虛自是無陽難作汗建中朮附載醫書無陽身癢桂枝麻黃各半湯陽明主有汗今反無汗如蟲行皮中朮附湯建中湯汗不流是汗出時蓋覆不周汗出不均致手足腰背攣搐也用牛蒡根散腠理為風暑濕所幹皆令自汗惟寒邪中經腠理致密則津液內滲獨無汗也此皆傷寒在表則然耳若陰病若水飲與夫亡陽久虛亦皆無汗隨證治之各有本條惟熱病脈躁盛而不得汗此陽證也當汗無汗與麻黃湯三劑而汗不出者此不可治也知其可進則進知其不可則已君請擇於斯二者小柴胡湯證云陰病不得有汗蓋三陰證本無汗其或有汗者亡陽也又陽明病必發潮熱若診其脈但浮者必有盜汗也黃芩湯主之不得汗甲乙經云熱病脈常躁盛而不得汗者此陽脈之極也死脈躁盛而得汗者生大抵傷寒營衛俱病則無汗麻黃湯葛根湯大青龍湯蔥豉湯可選而用之若傷寒連服湯劑而汗不出者死如中風法蒸之溫熱之氣於外迎之無不得汗也蒸法用薪火燒地良久掃除去火以水灑之蠶砂柏葉桃葉糠麩皆可用相和鋪於燒地上可側手厚上鋪草蓆令病人當上臥其汗移時立至用溫粉撲之移病人上床其最得力者蠶砂桃葉柏葉也無蠶砂亦得取糠麩乃助添令多耳不用亦得傷寒亦有氣虛不能作汗者仲景云脈浮而遲為無陽不能作汗其身必癢宜桂枝麻黃各半湯主之陽明病法多汗反無汗如蟲行皮中狀者此以久虛故也宜朮附湯黃耆建中湯歌曰汗不得時亦須蒸躁盛還無未必生身癢浮遲惟各半陽明虛證若蟲行又論云傷寒欲得汗與麻黃湯數劑而汗不出者不治熱病脈躁盛而不得汗者諸陽之極也亦不治二者蓋真病也亦有發熱而厥忽兩手或一手無脈是猶重陰欲雨之時必濈濈然大汗而解其或投藥無汗而脈不至者亦不可治也然亦有諸虛血少津液中干亦不能作汗病人有挾宿恙如痰飲癥瘕之類亦能隔汗而不出也少血者養血以汗之痰癖者開關以汗之皆活法也若夫汗出如油喘而不休未有得生者也身癢脈浮遲為氣虛無陽不能汗桂枝麻黃各半湯陽明病反無汗如蟲行皮中者久虛也朮附湯建中湯發汗上下遍身衣被如常腰以下厚蓋若蓋覆不周汗出不匝不流必致肢體攣搐牛蒡根散手足汗傷寒手足汗出者蓋四肢為諸陽之本而胃主四肢手足汗出者陽明之證也陽經邪熱傳並陽明手足為之汗出陽明為津液之主病則自汗出其有自汗出者有手足汗出者悉屬陽明也何以使之然也若一身自汗出者謂之熱越是熱外達者也但頭汗出者是熱不得越而熱氣上達者也及手足汗出者為熱聚於胃是津液之旁達也經曰手足漐漐汗出大便難而譫語者下之則愈由此觀之手足汗出為熱聚於胃可知矣或謂熱聚於胃而手足為之汗出其寒聚於胃而有手足汗出者乎經曰陽明中寒者不能食小便不利手足濈然汗出此欲作痼瘕即是中寒者也其熱聚於胃為可下之證其寒聚於胃為不可下又何以明之要明於此二者必曰大便初硬後溏為胃中冷水穀不別故也是以不可下者也若大便難譫語者為陽明證其則是可下之證臨病之際須宜細審歌曰手足如何汗不休胃中熱聚液旁流熱家燥糞為譫語寒證難分水穀流又論云手足汗出熱聚於胃而津液之旁達也亦有寒聚於胃致之挾寒則水穀不分蘊熱則燥糞譫語陽明病手足漐漐汗出譫語大便難此熱證也與大承氣湯下之陽明中寒不能食小便不利手足濈濈然汗出大便初硬後溏水穀不分則不可下少與理中湯怫鬱怫鬱者陽氣蒸越形見於頭面肌膚之間聚而不散也其證則有異焉大便硬而氣短者實也汗下後而得噦者虛也若虛若實當詳審之小便不利時有微熱大便乍難怫鬱而不得臥此燥糞裡實也承氣湯主之吐下後極虛而汗之則怫鬱復與之水以發其汗因而得噦此胃中寒也桂枝人參湯加茯苓太陽初得病發汗不徹並歸陽明續自微汗面色赤者陽氣怫鬱也解肌湯主之或汗又不徹其脈緊澀與麻黃湯陽脈浮陰脈濡弱妄以火熏熨欲令汗出客熱得火內則驚惕外則怫鬱蒸肌身自發黃小柴胡湯加黑豆與之歌曰怫鬱陽蒸聚體膚便堅為實噦為虛二陽並病容顏赤火迫身黃驚惕余戰慄傷寒戰慄者形相類而實非一也合而言之戰慄非二也析而分之則有內外之別焉戰者身為之戰搖是也慄者心戰是也戰之與慄內外之別也昧者通以為戰慄也通為戰慄而不知有逆順之殊經曰胃無穀氣脾澀不通口急不能言戰而慄者即此觀之戰之與慄豈不異哉戰之與振振輕而戰重也戰之與慄戰外而慄內也戰慄者皆陰陽之爭也傷寒欲解將汗之時正氣內實邪不能與之爭則便汗出而不發戰也邪氣欲出其人本虛邪與正爭微者為振甚者則戰戰已正勝而解矣經曰病有戰而汗出因得解者何也病人本虛是以發戰者是也邪氣外與正氣爭則為戰戰其愈者也邪氣內與正氣爭則為慄慄其甚者也經曰陰中於邪心內慄也表氣微虛裡氣不守故使邪中於陰也方其裡氣不守而為邪中則正氣怯弱故成慄也戰者正氣勝慄者邪氣勝也傷寒六七日欲解之時當解而汗出其但心慄而鼓頷身不戰者已而遂成寒逆似此證多不得解何者以陰氣內盛正氣大虛不能勝邪反為邪所勝也非大熱劑與其艾灼又焉得而御之歌曰戰動於身慄動心正邪勝負兩般爭振振汗出將痊愈鼓頷虛寒病已深又論云戰慄皆陰陽之爭戰者身為之搖也慄者心戰而惕也邪氣外與正氣爭則為戰慄戰者正氣勝慄者邪氣勝戰卻愈慄其已甚乎振振汗解者蓋邪氣欲出其人不虛故邪與正爭發而為戰正氣勝則得汗而解矣傷寒病六七日欲愈者必振振汗出而解其有身不戰而但鼓頷心慄者遂成寒逆此陰氣內盛正氣內虛不能勝邪反為邪氣所勝當以四逆湯姜附湯並御之經云陰中於邪者心內慄也又云邪中下焦陰分則為戰慄足脛逆冷合用四逆湯姜附湯仍與養正丹振傷寒振者森然若寒聳然振動者是也傷寒振者皆責其虛也至於欲汗之時其人本虛必蒸蒸而振卻發熱汗出而解振近於戰而輕者為振戰為正與邪爭爭則為鼓慄而戰振但虛而不與爭故止聳動而振也下後復發汗必振寒者為其表裡俱虛也亡血家發汗則寒慄而振者為其血氣俱虛也諸如此止於振聳耳其振振欲擗地者及身為振振搖者二者皆發汗過多亡陽經虛不能自主持故身為振搖也又非若振慄之比經曰若吐下後心下逆上衝胸起則頭眩發汗則動經身為振振搖茯苓桂枝白朮甘草湯主之太陽病發汗不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之二者皆用溫經益陽滋血助氣之劑未有不獲全濟之功者瘛瘲瘛則急而縮瘲則緩而伸病至於瘛瘲熱氣極矣蓋熱極生風風主乎動故筋脈相引而伸縮不寧傷寒至此疾熱過甚診視調理難乎否乎內經曰太陽終者戴眼反折瘛瘲汗出不流瘛瘲之為絕證也如此苟能用滌熱祛風之劑以折其勢間有可活之者滌熱如柴胡梔子輩祛風如防風羌活輩是也又風溫證妄以火熏必然發黃劇則狀如驚癇時時瘛瘲經云一逆尚引日再逆促命期設或為醫所誤只得用金匱風引湯火邪用黑豆解歌曰瘛為引縮瘲為伸熱極風生並在經滌熱祛風猶可望火熏發表定歸冥筋惕肉瞤傷寒筋惕肉瞤者蓋傷寒頭疼身痛惡寒發熱必然之證也其於筋惕肉瞤則非常常有之者必待發汗過多亡陽則始有之內經曰精則養神柔則養筋發汗過多津液枯少陽氣大虛筋肉失所養故惕惕然而跳瞤瞤然而動也太陽病脈微弱汗出惡風不眠者大青龍湯服之則必厥逆筋惕肉瞤此為逆也太陽病發汗汗出不解其人仍發熱頭眩身瞤動振振欲擗地者真武湯主之動氣在左不可發汗發汗則頭眩汗出不止筋惕肉瞤即是觀之筋惕肉瞤由發汗過多亡陽可見矣茲雖逆也然於發汗亡陽而表虛者治以溫經益陽則可矣或因吐下發汗後表裡俱虛而有此證者又非若但發汗後之所同也經曰傷寒吐下後發汗虛煩脈甚微八九日心下痞脅下痛氣上衝咽喉筋脈動惕者久而成痿此為逆之甚也太陽病發汗復下之表裡俱虛復加燒針因胸煩面色黃膚瞤者難治此逆之甚者也發汗吐下者庸可忽諸歌曰筋惕身瞤發汗多酌量真武更無過左邊動氣如輕汗此證難醫奈命何論云汗出過多津液涸少陽氣偏虛筋肉失其所養故惕惕瞤瞤而跳動也張氏特設真武湯以救之然本方不特溫經助陽而其中朮苓薑附皆於胃氣有關焉素問云脾胃中風則肌肉瞤蓋脾主肌肉胃為津液之海是雖過汗法當溫經助陽又不可不以胃氣為本雖然已經吐而復汗下汗下而復燒針則其逆為尤甚也經曰傷寒吐下後發汗脈微心脅痞痛虛煩眩冒氣上衝咽筋脈動惕者久而成痿又曰太陽汗後復下表裡俱虛復加燒針因胸煩面黃膚瞤者難治以至汗出如油口噤肉戰呻吟喘促者不治然則汗吐下可不謹乎陽氣之柔者養筋發汗過多病軀無陽筋必戰動或虛人脈微或傷風自汗妄用大青龍湯便有厥逆筋惕肉瞤之證俱用真武湯羸甚者去芍藥有熱證者去附子尤貴酌量用之應發汗證而腹中左右上下有動氣者並不可汗若汗之即筋惕身瞤其左邊動氣者尤不可汗發汗則頭眩汗不止筋惕肉瞤其候最逆且先服防風白朮牡蠣散次服小建中湯十救一二太陽病發汗不解發熱心悸頭眩振振擗地真武湯吐下後心下逆滿氣上衝胸起則頭眩脈沉緊身振搖者茯苓桂枝白朮甘草湯久而成痿者通用若心下痞滿兼與枳桔湯加茯苓甘草懊憹傷寒懊憹者鬱悶之貌即心中懊憹鬱郁然不舒暢憒憒然無奈何比之煩悶為尤甚也由下後表中陽邪乘虛而陷鬱而不髮結伏於心胸之間故如是也經曰表未解醫反下之胃中空虛客氣動膈心中懊憹又曰下之益煩心懊憹如飢即是陽氣內陷為諸懊憹也其治之之法或吐之或下之若發汗吐下後虛煩不得眠劇者必反覆顛倒心中懊憹與陽明病下之其外有熱手足溫而不結胸心中懊憹飢不能食但頭汗出二者為邪熱鬱於胸中當用梔子豉湯吐之以湧其結熱也陽明病下之心懊惱而煩胃中有燥屎者與陽明病無汗小便不利心中懊憹身必發黃二者為邪熱結於胃中當用大承氣湯茵陳湯攻之以滌其內熱也識諸此者吐下之不瘥湯劑之適當則無不愈矣或當汗反吐療熱以溫則變證百出發斑發黃者多矣欲為醫者須詳究之歌曰懊憹心間用陷胸舌間苔白脈俱洪發黃須與茵陳輩燥糞陽明承氣攻又論云懊憹者懊憹鬱悶之狀蓋由表證誤下正氣內虛於是客氣乘虛入而動膈胸煩懊憹心中微疼特未如結胸之甚也然由是而結胸亦不難矣短氣煩躁胸中懊憹心下因硬則為結胸用陷胸湯舌上白苔虛煩不得眠心中懊憹或飢不能食頭汗出此邪熱鬱於胸中也用梔子豉湯吐之陽明病下之後胸中懊憹而煩有燥糞此熱鬱於胃也承氣湯攻之陽明無汗小便不利心中懊憹者必發黃用茵陳湯是則胃中邪熱前後二部脈俱洪也鄭聲傷寒鄭聲為邪音也孔子曰惡鄭聲之亂雅樂也又曰放鄭聲遠佞人鄭聲淫倿人殆是謂鄭聲為不正之音也傷寒鄭聲者則其聲如鄭衛之音之不正也經曰虛則鄭聲今汗後或病久人聲轉者是也以此為虛從可知已又鄭聲者重語也正為聲轉也若聲重而轉其本音者亦是矣昧者不知此妄以重為重疊之謂與譫語混而莫辨遂止以身熱脈數煩渴便難而多言者為譫語以身涼脈小自利不渴而多言者為鄭聲如此則失仲景之本意矣況仲景之書三百九十餘證曲盡傷寒形候未有脫落而不言者若以鄭聲為多言則於三陰門中益須條見所以鄭聲別無證治者是不以譫語為類也雖曰虛矣亦止為正氣虛而不全故使轉聲而不正也明者鑑此幸詳究之小便自利小便自利非血證則腎虛也惟血證則小腹結而如狂惟腎與膀胱俱虛則不能約束制水液是二者小便皆自利也若腎虛而挾熱者則乍瀝乍旋謂之小便數下焦有熱小腹必滿應小便不利反自利者此血證也法當下之又有病在太陽遍身發黃其脈沉結小腹雖堅而小便不利此則非血若或小便自利其人如狂血證諦矣下之抵當湯丸陽明自汗應小便少而反自利者津液竭也糞雖硬但以蜜煎導之豬膽汁亦可少陰四逆小便自利為虛寒四逆湯或真武湯去茯苓若小便白亦是下焦寒與四逆湯小便數大便硬此為脾約脾約者麻仁丸主之張氏云趺陽脈浮而澀浮則胃氣強澀則小便數是為脾約趺陽胃脈也此證消穀引飲蓋胃壯熱也傷寒脈浮自汗小便數若胃不和而譫語者少與調胃承氣湯太陽自汗四肢拘急心煩微惡寒腳攣急小便數誤服桂枝湯得之便厥可與甘草乾薑湯芍藥甘草湯太陽汗吐下後小便數大便因硬用小承氣利之小便尿血證治論用延胡索散歌曰小便自利血相干蜜導陽明腎證寒脾約譫語腳攣急太陽汗下大便艱又云小便自利者太陽證下焦有熱小腹必滿小便必不利而反利者血證也抵當湯少陰證四逆而小便自利者虛寒也四逆湯真武湯去茯苓太陽證下焦有熱小腹必滿應小便不利而反自利者血證也抵當湯主之陽明證自汗出應小便少而小便自利者津液內竭也屎雖硬不可攻之當用蜜導之少陰證四逆而小便自利者血證也抵當湯真武湯去茯苓主之又問小便數者何也以腎與膀胱俱虛而有客熱乘之也二經既虛致受於客熱虛則不能制水故令數小便熱則水行澀澀則小便不快故令數起也診其趺陽脈數胃中熱即消穀引飲大便必硬小便即數也太陽病自汗四肢拘急難以屈伸心煩微惡寒腳攣急若小便數慎不可行桂枝也宜用甘草乾薑湯芍藥甘草湯大抵溲數則大便難仲景云趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻仁丸主之太陽病若汗若吐若下後微煩小便數大便因硬者與小承氣湯和之則愈又云傷寒脈浮自汗小便數若胃中不和譫語者少與調胃承氣湯下利傷寒下利多種須辨識陰陽勿令差誤三陽下利則身熱太陰下利手足溫少陰厥陰下利身不熱以此別之大抵下利挾太陽脈證不得即用溫藥俗醫但見下利便曰陰證用溫熱藥鮮不發黃生斑而死也太陽陽明合病必下利葛根湯主之下利而頭疼腰疼肌熱目痛鼻乾其脈浮大而長者是其證也太陽少陽合病自下利黃芩湯主之若嘔者黃芩湯加半夏生薑下利而頭疼胸滿或口苦咽乾或往來寒熱而嘔其脈大而弦者是其證也陽明少陽合病必下利其脈不負者順也負者逆也因相剋賊名為負也下利身熱胸脅痞滿乾嘔往來寒熱其脈長大而弦者是其證也蓋陽明屬土其脈長大少陽屬木其脈弦若合病則土被木賊更兼下利為胃已困若脈不弦者順也為土不負負者死也自利不渴屬太陰四逆湯理中湯主之自利而渴屬少陰白通湯白通加豬膽湯通脈四逆湯豬苓湯真武湯四逆加人參湯可選擇而用之其餘下利皆因汗下後證也大抵傷寒下利須看脈與外證下利而脈大者虛也脈微弱者為自止下利日十餘行而脈反實者逆下利脈數而滑者有宿食也下之則愈脈遲而滑者實也其利未得便止更宜下之下利三部脈皆平按其心下硬者急下之協熱利者臍下必熱大便黃色乃腸間垢汁為之寒毒入胃臍下必寒腹脹滿大便或黃白或青黑或下利清穀濕毒氣盛則下利腹痛大便如膿血或如爛肉汁也下利慾飲水者以內有熱也下利譫語者有燥屎也寒毒入胃者四逆湯理中湯白通湯加附子四逆散加薤白主之協熱利者黃芩湯白頭翁湯三黃熟艾湯薤白湯赤石脂丸濕毒下膿血者桃花湯地榆散黃連阿膠散雖然自利而渴屬少陰而三陽下利亦有飲水者乃內有熱也若少陰自利清水心下痛口乾燥者卻宜下之不可不知也少陰泄利下重不可用熱藥先濃煎薤白湯內四逆散緣四逆散用枳實芍藥之類又尋常胸中不和腹中腸鳴下利生薑瀉心湯最妙此二法不特傷寒證也仲景云趺陽脈浮澀少陰脈如經者其病在脾法當下利注云脾虛不能制水腎氣平和故少陰如經也浮則胃熱澀則脾寒所以不能克消水穀而下利也歌曰傷寒下利多般數須辨陰陽勿差誤惟有陽明合少陽若還克賊名為負又云腎虛下利苦咽乾不識惟知臟有寒協熱胃寒並濕毒利而譫語下之安下利而譫語者有燥屎也調胃承氣湯太陽陽明合病脈浮大而長下利者葛根湯太陽少陽合病下利脈必浮而弦黃芩湯嘔者湯中加半夏生薑少陽陽明合病下利胸脅滿乾嘔或往來寒熱其脈長大而弦者為負負者死但長而不弦為順脈數而滑或遲而滑者有宿食也宜下之小承氣湯自利不渴屬太陰四逆湯理中湯自利而渴屬少陰脈微者白通湯厥逆脈不至者白通豬膽汁湯通脈四逆湯咳而嘔渴心煩不得眠者豬苓湯三陰下利法當溫之自利清水心下痛口乾燥者即宜下不可不知也溫之四逆理中輩下之大柴胡承氣湯也三陽下利亦有飲水者乃有熱也治如腸垢法下利心中痞自有痞而下利條大便硬結雖宜下亦有諸般不可攻腸垢鶩溏分冷熱不妨步躡古人蹤華佗云寒即溏熱即垢古人云歲火不及寒火乃行陽明病大便硬結宜下之若有表證不可下須依法調之見不可下條腸垢即熱也協熱而利臍下必熱黃芩湯白頭翁湯赤石脂丸鴨溏者寒也協寒而利臍下必寒四逆湯理中湯濕毒便膿血者桃花湯黃連阿膠湯遺溺水液之餘者入胞而為尿使胞中虛寒不能約制水液加以邪氣乘之故使溺自遺而不禁也風溫脈浮自汗體重多眠鼻鼾喘息恬不欲言誤下則小便不利直視失溲三陽合病腹滿身重口中不仁面垢譫語遺溺不可下少與白虎湯膀胱瀦水下焦不攝則亦遺溺經云邪中下焦陰氣為慄足膝逆冷便溺妄出合用四逆湯下焦蓄血小腹結急小便自利不禁輕者桃仁承氣湯重則抵當湯丸狂言直視遺尿為腎絕不治歌曰遺尿風溫戒利腸腹膨身重合三陽下焦不攝兼停血腎絕狂言互證詳漱水不咽陽明病頭疼身熱口燥但漱水不欲入咽者必衄也若病人無表證不發寒熱胸腹滿唇口燥但欲漱水不欲咽者此為有瘀血必發狂也輕者犀角地黃湯甚者抵當湯歌曰漱水陽明衄血時頭疼口燥熱生肌發狂瘀血無寒熱犀角桃仁類例推又論云唇燥口乾血證中類有之必欲取水而灌漱也然漱水而不飲水何哉蓋渴者易為飲陽熱入里胃中液干患不與水耳惟夫上焦瘀血下焦蓄血乘肺發燥渴證獨無是以漱水而不欲下咽也漱水條例惟血證有焉陽明身熱頭疼漱水不欲入咽必衄血也脈微者用犀角地黃湯桃仁承氣湯無表證不寒熱胸腹滿唇燥口乾漱水不欲咽小便少此為瘀血在裡其人必發狂輕者犀角地黃湯或桃仁承氣湯甚者抵當湯或抵當丸以取盡黑物為度尋衣摸空華佗云病人手循衣縫者不治間有一二活者幸也吐下後不解多日不大便日晡潮熱不惡寒獨語如見怪劇者不識人尋衣撮空怵惕不安微喘直視微者但發熱譫語並用大承氣湯下之若得大便後脈弦者生脈澀者死弦為陽澀為陰是陽病見陰脈也太陽病用火熏之以致發黃陽盛則欲衄陰虛小便難陰陽俱虛身體枯燥頭汗及頸口乾咽爛腹滿微喘或不大便譫語甚者嘔噦循衣摸床此證小便利則可治歌曰尋衣妄語最堪憂下後弦陽病可瘳脈澀為陰終不救發黃還須小便流傷寒方藥附論論曰桂枝湯本為解肌若其人脈浮緊發熱汗不出者不可與之常須識此勿令誤也蓋桂枝湯本專主於太陽中風其於腠理致密營衛邪實津液禁固寒所勝者則桂枝湯不能發散也必也皮膚疏自汗風邪干於衛氣者乃可投之也仲景以解肌為輕以發汗為重是以發汗吐下後身疼不休者必與桂枝湯而不與麻黃湯者以麻黃湯專主於發汗其發汗吐下後津液內耗雖有表邪而止可解肌故須桂枝湯小和之也桂味辛熱用以為君必以桂為主者以桂為宣導諸藥之先行是猶辛甘發散之意蓋發散風邪必以辛為主此桂枝所以為君也芍藥味苦酸微寒甘草味甘平二物用以為臣佐者內經所謂風淫所勝平以辛佐以苦以甘緩之以酸收之是以芍藥為臣而甘草為佐也生薑味辛溫大棗味甘溫二物為使者內經所謂風淫於內以甘緩之以辛散之是以薑棗為使也薑棗味辛甘固能發散而此又不特專於發散之用以脾為胃主行其津液薑棗之用專行脾之津液而和營衛也麻黃湯所以不用薑棗者謂專於發汗則不待行化而津液得通矣用諸方者請熟究之又曰輕可去實麻黃葛根之屬是也實為寒邪在表皮腠堅實營衛不行津液內涸之表實非腹痛便難之裡實也聖濟總錄曰汗不出而腠密邪氣勝而中蘊輕劑所以揚之即麻黃葛根之輕劑耳麻黃味甘苦用以為君者以麻黃為輕劑而專主發散是以為君也桂枝為臣者以風邪在表又膚緩而理疏者則必以桂枝解其肌是以用桂枝為臣寒邪在經表實而腠密者則非桂枝所能獨散必專麻黃以發汗是麻黃所以為君而桂枝所以為臣者也內經云寒淫於內治以甘熱佐以辛苦者茲類是與甘草味甘平杏仁味甘苦用以為佐使者內經曰肝苦急急食甘以緩之肝者營之主也傷寒營勝衛固血脈不利必用味甘之物以緩之故以甘草杏仁為佐使也且桂枝湯主中風風則傷衛風邪並於衛則衛實而營弱仲景所謂汗出惡風者此謂營弱衛強者是矣故桂枝湯佐以芍藥用和營也麻黃湯主傷寒寒則傷營寒邪並於營則營實而衛虛內經所謂氣之所併為血虛血之所併為氣虛者是也故麻黃佐以杏仁用利氣也若處方之妙理製劑之淵微明通君子熟而察之乃見功焉又曰青龍東方甲乙木神也應春而主肝專發生之令為敷營之主萬物出甲開甲則有兩歧肝有兩葉以應木葉所以謂之青龍者以發散營衛兩傷之邪是應肝木之體耳桂枝湯主中風麻黃湯主傷寒二者發散之純者也及乎大青龍湯則不然雖為發汗之劑而所主亦不一也必中風脈浮緊為中風見寒脈傷寒脈浮緩為傷寒見風脈是風寒兩傷也風兼寒寒兼風必用大青龍湯專主之也見茲脈證雖欲與桂枝湯解肌以祛風而不能已其寒則病不去或欲與麻黃湯發汗以散寒而不能去其風則病仍在茲仲景所以特立大青龍湯以兩解之麻黃味甘溫桂枝味辛熱寒則傷營必以甘緩之風則傷衛必以辛散之此風寒兩傷營衛俱病故以甘辛相合而為發散之劑表虛膚緩者則以桂枝為主先桂枝而後麻黃是以桂枝為君麻黃為臣也表實腠密者則以麻黃為主先麻黃而後桂枝是以麻黃為君桂枝為臣也甘草味甘平杏仁味甘苦為助佐麻黃以發表大棗味甘溫生薑味辛溫相合佐桂枝以解肌石膏味甘辛微寒風陽邪也寒陰邪也風則傷陽寒則傷陰營衛陰陽為風寒兩傷則非輕劑所能獨散也必須合輕重之劑以同散之乃得陰陽之邪俱散營衛之氣俱和是以石膏為使重劑而又專達肌表者也夫大青龍湯發汗之重劑也用之稍過則又有亡陽之失經曰若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也又曰一服汗出者停後服多服則汗多亡陽陽虛則惡風燥煩不得眠也即此觀之劑之輕重可見矣用湯者宜詳審之又曰青龍象肝木兩歧而主兩傷之疾中風見寒脈傷寒見風脈則為營與衛兩傷故以青龍湯主之蓋傷寒表不解則麻黃湯可以發中風表不解則桂枝湯可以散惟其表且不解而又加之心下有水氣則非麻黃桂枝可以發散必須小青龍湯以祛除表裡之邪氣耳麻黃味甘辛溫為發散之主表不解應發散之則以麻黃為君桂味辛熱甘草甘平甘辛為陽佐麻黃以為發散之用二者所以為臣芍藥味酸微寒五味子味酸溫二者所以為佐寒飲傷肺咳逆而喘則肺氣逆內經曰肺欲收急食酸以收之乾薑細辛半夏三者所以為使心下有水則腎氣燥內經曰腎若燥急食辛以潤之是以乾薑半夏為使以散水寒逆氣水寒散津液通則汗出而解矣心下有水氣散行所傳不一故又增損之證若渴者去半夏加栝蔞根水蓄則津液不行氣燥而渴半夏味辛溫燥津液者也去之則津液易復栝蔞根味苦微寒潤枯燥者也加之則津液通行是為渴所宜也若微利去麻黃加芫花水氣下行潰入腸間則為下利下利者不可攻其表則汗出而脹滿麻黃專為表散非下利所宜故去之芫花微寒味酸苦為湧泄之劑水去利則止芫花下水故加之若噎者去麻黃加附子經曰水寒氣冷相搏其人即噎又曰病人有寒復發汗胃中冷必吐蛔噎為胃氣辛則散其寒而噎者為當兩相佐之是以能祛散冷寒之氣若小便不利腹滿去麻黃加茯苓水蓄在下焦不行為小便不利少腹滿凡邪客於體者在外者可汗之在內者可下之在上者可湧之在下者可泄之水蓄下焦滲泄可也發汗則非當故去麻黃而茯苓味甘淡專行津液內經曰濕淫於內以淡滲之滲溺在行水甘淡為所宜故加茯苓若喘者去麻黃加杏仁喘為氣逆麻黃髮表去之則氣易順杏仁味甘苦溫加之以泄逆氣又曰大承氣湯者承者順也傷寒邪氣入胃者謂之入府腑之為言聚也胃為水穀之海營衛之源水穀會聚於胃變化而為營衛邪氣入於胃則胃中氣鬱滯糟粕秘結壅而為實是氣不得舒順也本草曰通可去滯泄可去閉寒而不利閉而不通以盪滌為用使塞者利而閉者通則正氣得以舒順故以承氣名之玉函曰宜下必以苦宜補必以酸酸收而苦泄也枳實味苦寒潰堅破結是以枳實為君厚朴味苦溫內經曰燥淫於內治以苦溫泄滿除燥則以苦溫為輔是以厚朴為臣芒硝鹹寒內經曰熱淫於內治以鹹寒人傷於寒則為病熱氣聚於內則為胃實鹹寒之物能消熱實故以芒硝為佐大黃味苦寒內經曰燥淫所勝苦以下之熱氣內勝則津液消而腸胃燥苦寒之物盪滌邪熱故以大黃為使是大黃有將軍之號也承氣湯下藥也用之尤宜審之必大滿大實堅有燥屎乃可投之也如非大滿則猶生寒證而病不除況無滿實者而結胸痞氣之病生矣是以脈經有曰傷寒有承氣之戒古人亦特謹之又曰大柴胡湯者經云虛者補之實者瀉之輕重之際臨證者須消息焉蓋大滿大堅有燥屎非快劑則不能泄大小承氣湯之峻所以泄堅滿者也如不大堅滿邪熱不甚只可用輕緩之劑以逐邪熱大柴胡湯是也經曰傷寒發熱七八日雖脈浮數者可下之宜大柴胡湯又曰太陽病過經十餘日反二三下之後四五日證仍在者先與小柴胡湯不必急下鬱熱微煩者為未解也可下大柴胡下之則愈是知大柴胡為下劑之緩者也柴胡味苦平微寒傷至於下則為熱氣應火而歸心苦先入心折熱之劑必以苦為主故以柴胡為君黃芩味苦寒玉函曰大熱之氣寒以折之掃除邪熱必以寒為助故以黃芩為臣芍藥味酸苦微寒枳實味苦寒內經曰酸苦湧泄為陰泄實折熱必以酸苦故以芍藥枳實為佐半夏生薑味辛溫大棗味甘溫辛者散也散逆氣者必以辛甘者緩也緩正氣者必以甘故以半夏生薑大棗為之使也一方加大黃以大黃有將軍之號功專盪滌不加大黃恐難切下必應以大黃為使也用方者審而行之可得十全之功矣又曰小柴胡湯者傷寒邪氣在表者必發表以為汗邪氣在裡者必盪滌以取利其於不內不外半表半裡者既非發汗之所宜又非吐下之所施是當和解小柴胡湯為和解表裡之劑也柴胡味苦平微寒黃芩味苦寒內經曰熱淫於內以苦發之邪在半表半裡則半成熱矣熱氣內傳之不可則迎而奪之先必散熱是以苦寒為主故以柴胡為君黃芩為臣以成徹熱發表之劑人參甘草味甘邪傳於裡則裡氣不治甘以緩之是以甘物為之助故用人參甘草為佐以扶正氣而復之也半夏味辛微溫邪初入里則裡氣逆辛以散之是以辛物為之助故用半夏為佐以順逆氣而散邪也裡氣平正則邪氣不得深入是以三味佐柴胡以和里生薑味辛溫大棗味甘溫內經曰辛甘發散為陽表邪未入里氣已逆既未作實宜當兩解其在外者必以辛甘之物發散故以生薑大棗為使輔柴胡以和表七物相合兩解之劑當矣邪氣入里未有定處乘虛而湊則所傳不一故有增損以御之胸中煩而不嘔去半夏人參加栝蔞實煩者熱也嘔者氣逆也胸中煩而不嘔則熱聚而氣不逆邪氣欲漸成實也人參味甘為補劑去之使不助熱也半夏味辛為散劑去之以無逆氣也栝蔞實味苦寒除熱必以寒泄熱必以苦加栝蔞實以通胸中鬱熱若渴者去半夏加人參栝蔞根津液不足則渴半夏味辛性燥滲津液物也去之則津液易復人參味甘而潤栝蔞根味苦而堅堅潤相合津液生而渴自已苦腹中痛者去黃芩加芍藥宜通而寒則痛邪氣入里裡氣不足寒氣壅之則腹中痛黃芩苦寒苦性堅而寒中故去之則中氣易和芍藥味酸苦微寒酸性泄而利中故加之則裡氣得通而痛自已若脅下痞硬去大棗加牡蠣內經曰甘者令人中滿大棗甘溫去之則硬寢散酸以收之牡蠣味酸鹹寒加之則痞消而硬去若心下悸小便不利者去黃芩加茯苓心下悸小便不利水蓄不行也內經曰腎欲堅急食苦以堅之黃芩苦寒去之則蓄水浸行內經曰淡味滲泄為陽茯苓甘淡加之則津液通流若不渴外有微熱去人參加桂不渴則津液足去人參者以人參為主內之物也外有微熱則表證多加桂以取汗發散邪也若咳者去人參大棗生薑加五味乾薑肺氣逆則咳甘補中則氣愈逆故去人參大棗之甘五味子味酸肺欲收急食酸以收之氣逆不收故加五味子之酸生薑乾薑一物也生者溫而乾者熱寒氣內淫則散以辛熱蓋諸咳皆本於寒故易生薑以乾薑是相假之以正溫熱之功識此之小小變通觸類而長之可也又曰梔子豉湯內經曰其高者因而越之其下者引而瀉之中滿者瀉之於其內有邪者漬形以為汗其在皮者汗而發之治傷寒之法雖有變通終不越此數法也寒邪自表而傳裡留在胸中為邪在高分則可吐之是越之之法也所吐之證亦自不同如不經汗下邪氣蘊鬱於膈則謂之膈實應以瓜蒂散吐之瓜蒂散吐胸中實邪者也若發汗吐下後邪氣乘虛留於胸中則謂之虛煩應以梔子豉湯吐之梔子豉湯吐胸中虛煩者也梔子味苦寒內經曰酸苦湧泄瀉為陰湧者吐之也湧吐虛煩苦為主是梔子為君煩為熱勝也湧熱者必以苦勝熱者必以寒香豉味苦寒助梔子以吐虛煩是以香豉為臣內經曰氣有高下病有遠近證有中外治有輕重識其所以為治依而行之斯為良矣又曰半夏瀉心湯凡陷胸湯攻結也瀉心湯攻痞也邪氣結而不散壅而不通則為結胸陷胸湯為直達之劑塞而不通痞而不分則為痞瀉心湯為分解之劑所以謂之瀉心者謂瀉心下之邪也痞與結胸有高下焉結胸者邪結在胸中故治結胸曰陷胸湯痞者邪留在心下故治痞曰瀉心湯黃連味苦寒內經曰苦先入心以苦泄之瀉心者必以苦為主是以黃連為君黃芩為臣以降陽而升陰也半夏味辛溫乾薑味辛熱內經曰氣欲走急食辛以散之散痞者必以辛為助故以半夏乾薑為佐以分陰而行陽也甘草味甘平大棗味甘溫人參味甘溫陰陽不交曰痞上下不通為滿欲通上下交陰陽必和其中所謂中者脾胃是也脾不和者以甘補之故用人參甘草大棗為使以補脾而和中中氣得和上下得通陰陽得分水升火降則痞消熱去而大汗以解矣又曰瓜蒂散香華佗曰四日在胸則可吐之此迎而奪之之法也千金方曰氣浮上部須塞心胸胸中滿者吐之則愈此隨證治之之法也大約傷寒四五日邪氣客於胸中之時也加之胸中煩滿氣上衝咽喉不得息者則為吐證其乃可投諸吐藥而萬全之功有之矣瓜蒂味苦寒內經曰濕氣在上以苦吐之寒濕之氣留於胸中以苦為主是以瓜蒂為君赤小豆味酸溫內經曰酸苦湧泄為陰分湧膈實必以酸為助是以赤小豆為臣香豉味苦寒苦以湧滿寒以勝熱去上膈之實必以苦寒為輔是以香豉為使酸苦相合則胸中痰熱湧吐而出矣其於亡血虛家所以不與者以瓜蒂散為駛劑重亡津液之藥亡血虛家補養則可重亡津液必不可全用藥君子必詳究焉又曰大陷胸湯者結胸者邪在胸中處身之高分邪結於是宜若可吐然所謂結若緊結之結不能分解者也謂陽受氣於胸中邪氣與陽相結不能分解氣不通壅於心下為硬為痛是邪正固結於胸中非虛煩膈實之所同是非攻下之物不可理也經曰低者舉之高者陷之以平為正結胸為高邪陷下以平之故治結胸曰陷胸湯甘遂味苦寒苦性泄寒熱雖曰泄熱而甘遂又有以直達之蓋陷胸破結非直達者不能透是以甘遂為君芒硝味鹹寒內經曰鹹味下泄為陰又曰咸以軟之氣堅者以咸軟之熱勝者以寒消之是以芒硝為臣大黃味苦寒將軍也盪滌邪寇除去不平將軍之功也是以大黃為使利藥之中此為快劑傷寒錯惡結胸為甚非此湯則不能利之也又曰茵陳蒿湯玉函曰小熱之氣涼以和之大熱之氣寒以取之發黃者熱之極也非大寒之劑則不能徹其熱茵陳蒿味苦鹹寒苦湧泄為陰酸以湧之苦以泄之泄熱者以苦為主故以茵陳蒿為君心法南方火而主熱梔子味苦寒苦入心而寒勝熱大熱之氣必以苦寒之物勝之是以梔子為臣大黃味苦寒宜補必以酸宜下必以苦盪滌邪熱必假將軍攻之故以大黃為使苦寒相合雖大熱大毒亦得利而解矣又曰白虎湯白虎者西方金神也應秋而歸肺熱甚於內者以寒下之熱甚於外者以涼解之其有中外俱熱內不得泄外不得發者非此方則不能解之也夏熱秋涼暑暍之氣得秋而止秋之令曰處暑是湯以白虎名之謂能止熱也知母石膏苦寒內經曰熱淫所勝佐以苦甘又曰熱淫於內以苦發之欲徹表熱必以苦為主故以知母為君欲徹裡熱必以甘寒為助是以石膏為臣甘草味甘平經曰熱則傷氣寒以勝之甘以緩之粳米味甘平經曰脾欲緩急食甘以緩之熱氣內甚消爍津液則脾氣燥必以味甘平之物緩其中故以甘草粳米為之使是太陽中暍得此湯而蕩除之即熱見白虎而盡矣立秋後不可服以秋則陰氣半矣白虎為大寒劑於秋深之時若不能禁而服之則為噦逆不能食而成虛羸者多矣又曰五苓散者苓者令也通行津液克伐腎邪專為號令者苓之功也五苓之中茯苓為主故曰五苓散茯苓味甘平豬苓味甘平甘雖甘也終歸甘淡內經曰味淡滲泄為陽利大便曰攻下利小便曰滲泄水飲內蓄須滲泄之必以甘淡為主是以茯苓為君豬苓為臣白朮味甘溫脾惡濕水飲內蓄則脾氣不治益脾勝濕必以甘為助故以白朮為佐澤瀉味鹹寒內經曰鹹味下泄為陰泄飲導溺必以咸為助是以澤瀉為使桂枝味辛熱腎惡燥水蓄不行則腎氣燥內經曰腎惡燥急食辛以潤之散濕潤燥是以桂枝為使多飲暖水令汗出愈者以辛散水氣外泄是以汗出而解也又曰理中丸者心肺在膈上為陽腎肝在膈下為陰此上下臟也脾胃應土處在中州在臟曰孤居三焦之中此丸專治故曰理中丸人參味甘溫內經曰脾欲緩急食甘以緩之緩中益脾必以甘為主是以人參為君白朮味甘溫內經曰脾惡濕甘勝濕溫中勝濕必以甘為助是以白朮為臣甘草味甘平內經曰五味所入甘先於脾脾不足者以甘補之補中益脾必先以甘是以甘草為佐乾薑味辛熱喜溫而惡寒者胃也胃寒則中焦不治內經曰寒淫所勝平以辛熱散寒溫胃必先以辛是以乾薑為使脾居中州邪氣病之則上下左右無病不至故又有諸加減焉若臍下築者腎氣動也去白朮加桂氣壅而不泄則築然動白朮味甘補氣去白朮則氣易散桂枝辛熱腎氣動者欲作奔豚也必服辛味以散之故加桂以散腎氣經曰以辛入腎能泄奔豚氣故也吐多者去朮加生薑氣上逆者則吐多術甘而壅非氣逆者之所宜也千金方曰嘔家多服生薑此為嘔家聖藥生薑辛散是以吐多者加之下多者還用術氣泄而不收則下多術甘壅補使正氣收而不泄也或曰濕勝則濡泄術專除濕是以下多者加之悸者加茯苓飲聚則悸茯苓味甘滲泄伏水得所宜也渴欲得水者加朮津液不足則渴術甘以補津液腹中痛者加人參虛則痛本草曰人參味甘溫補可去弱即人參羊肉之屬是也寒多者加乾薑辛能散也腹滿者去白朮加附子內經曰甘者令人中滿術甘壅補於腹滿家則去之附子味辛熱氣壅鬱腹為之滿以熱勝寒以辛散滿故加附子內經曰熱者寒之寒者熱之此之謂也又曰四逆湯者四肢逆而不溫也四肢者諸陽之本也陽氣不足陰寒加之陽氣不相順接致手足不溫而成四逆此湯伸發陽氣卻散陰寒溫經暖肌故以四逆名之甘草味甘平內經曰寒淫於內治以甘熱卻陰扶陽必以甘為主是以甘草為君乾薑味辛熱內經曰寒淫所勝平以辛熱逐寒正氣必先辛熱是以乾薑為臣附子味辛大熱內經曰辛以潤之開發腠理使津液得通也暖肌溫經必憑大熱是以附子為使此奇制之大劑也四逆屬少陰少陰者腎也腎肝位遠非大劑則不能達內經曰遠而奇偶制大其服此之謂也又曰真武湯真武者乃北方水神也而屬腎用以治水焉水氣在心下外帶表而屬陽故治以真武湯青龍湯主太陽病真武湯主少陰病少陰腎水也此湯可以和之真武之名得矣茯苓味甘平白朮味甘溫脾惡濕腹有水氣則脾不治經曰脾欲緩急食甘以緩之滲水緩脾必以甘為主故以茯苓為君白朮為臣芍藥味酸微寒生薑味辛溫內經曰濕淫所勝佐以酸辛除濕正氣是以芍藥生薑酸辛為佐也附子味辛熱內經曰寒淫所勝平以辛熱溫經散濕是以附子為使也水氣內漬至於散漫則所行不一故有加減之方焉若咳者加五味子細辛乾薑咳者水寒射肺也肺氣逆者以酸收之五味子酸而收也肺惡寒以辛潤之細辛乾薑辛而潤也若小便利者去茯苓專滲泄也若下利者去芍藥加乾薑酸之性泄去芍藥以酸泄也辛之性散加乾薑以散寒也嘔者去附子加生薑氣上逆則嘔附子補氣生薑散而不相損則氣順矣增損之功非太和孰能貫之又云建中湯內經曰肝生於左肺藏於右心位在上腎處在下左右上下四臟居焉脾者土也應中央處四臟之中為中州治中焦生育營衛通行津液一有不調則營衛失所育津液失所行必以此湯溫建中臟是以此湯名焉膠飴味甘甘草味甘平經曰脾欲緩急食甘以緩之健脾者必以甘為主故以膠飴為君甘草為臣桂辛熱辛散也潤也營衛不足潤而散之芍藥味酸微寒酸收也泄也津液不通收而行之是以桂芍藥為佐生薑味辛溫大棗味甘溫胃者衛之源脾者營之本黃帝針經曰營出中焦衛出上焦是以衛為陽陽不足者補之必以辛營為陰陰不足者補之必以甘辛甘相合脾胃健而營衛通是以薑棗為使或謂桂枝湯解表芍藥數少建中湯溫里而芍藥數多殊不知二者遠近之分故其制方亦有多少之差皮膚之邪近則制小其服桂枝湯芍藥佐桂枝以發散非與建中湯同體爾心腹之邪遠則制大其服建中湯內用芍藥佐膠飴以健脾非與桂枝湯同用爾內經曰近而奇偶制小其服遠而奇偶制大其服此之謂也又云脾約丸者約者約束之約也內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數而大便艱故曰其脾為約麻仁味甘平杏仁味甘溫內經曰脾欲緩急食甘以緩之麻仁杏仁潤物也本草曰潤可去枯腸胃乾燥必以甘潤之物為主是以麻仁為君杏仁為臣枳實味苦寒厚朴味苦溫潤燥者必以甘甘以潤之破結者必以苦苦以泄之是以枳實厚朴為佐以散脾之結約芍藥味酸微寒大黃味苦寒酸苦湧泄為陰是以芍藥大黃為使以下脾之結燥潤腸胃化津液則大便利而小便亦不數矣又曰抵當湯者人之所有者氣與血也氣為陽氣流而不行者則易散以陽病易治故也血為陰血蓄而不行者則難散以陰病難治故也血蓄於下非大快毒之劑則不能抵當其邪之甚故治蓄血曰抵當湯水蛭味鹹苦微寒內經曰咸勝血血蓄於下勝血者必以咸為主故以水蛭為君虻蟲味苦微寒苦走血血結不行破血者必以苦為助是以虻蟲為臣桃仁味苦甘平肝者血之源血結則肝氣燥內經曰肝苦急急食甘以緩之散血緩結是以桃仁為佐大黃味苦寒內經曰濕氣在下以苦泄之蓄血亦濕類也蕩血逐熱是以大黃為使四物相合而方劑成病與藥對藥與病宜雖毒重之疾亦獲全濟之功矣
