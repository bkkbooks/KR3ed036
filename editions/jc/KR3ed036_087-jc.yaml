body:
  text: 卷八十七諸風門總論風為天地浩蕩之氣正順則能長養萬物偏邪則能傷害品類人或中之鮮有不致斃者是以聖人推為百病長原夫風與氣一也塞乎天地之間則陰陽不同在乎人身之中則吹呵有別陽為風故風無形而有其勢陰為氣故氣有質而無其威吹則冷而勁為風呵則溫而和為氣是以四時之內八風二十四氣者以候陰陽消長之機也大塊噫而為風山澤蒸而為氣風勁則氣清氣濃則風息在人亦然人生天地之中負陰抱陽稟沖氣以為和上古之人其知道者法於陰陽和於術數飲食有常節起居有常度不妄作勞故精氣內安形神外全病安從來今時之人以酒為漿以妄為常醉以入房以欲竭其精神以耗散其真不知持滿不時御神務快其心逆於生樂致陰陽不調腑臟氣偏榮衛失度氣血錯亂經絡空虛腠理不密外邪因得以傷之風邪之中人也其狀奄忽蓋風性緊暴善行數變其中人也卒其眩人也暈激人涎浮昏人神亂千金方風論有七十二種究其大法則以五風為首五風者謂肝心脾肺腎五臟之風也其言生死各亦不同肝風之狀踞坐不得低頭青色圍繞目額者可治宜於肝俞灸之若上喘目直視唇口俱青或面目大青黑一黃一白者死心風之狀汗自出偃仰不可轉側唇色正赤語言狂妄者生宜於心俞灸之若唇面青黃黑赤色不定眼瞤動不休或面目時時悚動者心絕也五日而死脾風之狀踞坐而腹滿不嗜食一身通黃四肢不收口吐涎沫者尚可治也宜灸脾俞若手足俱青木賊土敗必死矣肺風之狀偃臥胸滿喘而不休冒悶汗出鼻不聞香臭不得臥鼻下至口色白者可治宜於肺俞灸之若失血及妄言色黃者不治七八日而死腎風之狀踞坐而腰腳痛重視脅肋邊未有黃色者可治宜於腎俞灸之若齒黃面如土色者死至於六腑本無中風惟胃有之以胃為水穀之海變化五味以資五臟虛則風邪亦得以中之胃風之狀額上汗出飲食不下隔塞不通腹滿去衣則䐜脹張口肩息心下澹澹食寒則泄孫真人云新食竟取風為胃風瘧論亦然五臟中風其脈皆浮但兼以本脈而見於本部與人迎相應也假令肝中風則左手關部與人迎脈並浮而弦者也余皆仿此大抵肥人多喜中風以其肌膚軟脆風邪易中入之則深龐老故云人肥則風氣不得外泄即為熱中而目黃人瘦則風氣外泄即為寒中而泣出蓋可知矣得此疾者診其脈遲浮者吉急疾大數者凶大腸閉澀為順下利為逆口目俱閉者易治口目俱開者難治骨熱多煩者損其熱藥臟寒下利者損其冷劑治之當隨病之淺深慎無執著諸方論中所謂左癱右瘓者由邪氣中人邪氣反緩正氣反急正氣引邪喎僻不遂風賦有云氣虛則瘓無左右血澀而癱中兩邊以此而知氣血俱虛則癱瘓兩證俱有若氣順血澀則為癱風癱風者筋脈拘急攣拳也若血順氣虛則為瘓風瘓風者嚲軟抬動不能也不必左為癱而右為瘓瘓風不可全用風藥當以理氣藥兼而用之癱風則當以益血補筋去風藥治之則萬舉萬全矣予歷觀古方治諸風不問病之輕重表裡淺深皆以小續命湯加減用之此良法也但小續命湯內無通氣藥不可獨用若能以通氣湯散兼而服之必成其功矣宋氏云治風之法當以緩散中通氣為先通則痰氣不熏蒸風亦可得以攄散誠哉是言也小續命湯通治諸風惟偏枯則不可多用蓋偏枯者其人血不榮於一邊小續命湯復發汗亡血故也偏枯者半身不遂肌肉枯瘦骨間疼痛神智如常治之宜養血大八風湯續斷湯風痱者身無痛處但四肢緩縱神智昏亂不甚語言微有知則可治以其風散涎注關節氣不能行故四肢不遂也治之先進太乙神精丹三粒次以西州續命湯風癔者奄不知人咽中噫噫然有聲以其邪中心肺涎潮鼻塞心肺間閇故不能言宜用小續命湯獨活湯風柔者以風熱入於肝臟使諸筋攣急屈不可伸經曰寒則攣急熱則弛張風顫者以風入肝藏經絡之氣不守正位故使頭招搖而手足顫掉也風喑者以風冷之氣客於中滯而不能發故使口噤而不能言也風痹者由風寒濕三氣襲於經絡舍於血脈留於榮衛故使身頑肉厚不知痛癢其證則有筋骨血肉氣之五痹以屬五臟諸痹始得之在外速治之無不愈者及其邪氣深入各傳於臟無不危殆故曰風中脈則口眼喎斜中腑則肢體廢風入臟則性命危矣又有中風之病卒暴昏迷涎浮胸中上下相引聲如引鋸皆由飲食過度嗜欲無節停留胃中使氣脈關隔不得運行榮衛失度臟腑怯弱風邪暴客相摶成涎雖投治風藥永不得下蓋涎浮上部填塞心胸諸風閉塞急當吐之使快為度然後急進續命湯近世方書多雲中風不可吐久後令人壞一臂蓋藥中多用水銀粉大損脾胃脾胃既損四肢不舉理之必然殊不知古人治法其高者因而越之病在胸上為高越之為吐也如硃砂丸止是吐胸上積涎於脾胃何損用之必效若無涎亦慎與吐恐脾胃俱虛嘔血而死不可不知世有氣中方書無載考其至理皆由喜怒不節氣血暴傷蓋暴怒傷陰暴喜傷陽怒則氣逆喜則氣緩氣血失常亂於胸中壅於經絡滯則生風漸漸無力昏困欲倒治之當順氣理血不可妄投風藥至如新沐中風名曰首風飲酒中風名曰漏風又曰酒風入房中風名曰內風又曰勞風各有治法夫風之為病有瘙癢者有癮疹者有疼痛者有瘡瘍者有聾瞽者有歷節者有顛厥者有狂妄者千狀萬化莫不由五臟而生矣大抵人之有生以元氣為根榮衛為本根氣強壯榮衛和平腠理致密外邪客氣焉能為害或因喜怒或因憂思或因驚恐或飲食不節或勞役過傷遂致真氣先虛榮衛失度腠理空疏邪氣乘虛而入及其感也為半身不遂肌肉疼痛為痰涎壅塞口眼喎斜偏廢不仁神智昏亂為舌強不語頑痹不知精神恍惚驚惕恐怖或自汗惡風筋脈攣急變證多端治療之法當推其所自若內因七情而得之者法當調氣不當治風外因六淫而得之者亦先當調氣然後依所感六氣隨證治之此良法也但髮直吐沫搖頭上攛面赤如妝或頭面青黑汗綴如珠眼閉口開聲如鼾睡遺尿不知人者皆不可治風者百病之始善行而數變行者動也風本為熱熱勝則風動宜以靜勝其躁養血是也治須少汗亦宜少下多汗則虛其衛多下則損其榮治其在經雖有汗下之戒而有中臟中腑之分中腑者宜汗之中臟者宜下之此雖令汗下亦不可過也汗多則亡陽下多則亡陰亡陽則損其氣亡陰則損其形初謂表裡不和宜汗下之表裡已和是宜治之在經也其中腑者面顯五色有表證而脈浮惡風惡寒拘急不仁或中身之後或中身之前或中身之側皆曰中腑也其治多易中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便秘結皆曰中臟也中臟之病難治也六腑不和留結為癰五臟不和九竅不通無他乃在經也初證既定宜以大藥養之當順時令而調陰陽安臟腑而調榮衛少有不愈者也風中腑者先以加減續命湯隨證發其表如兼中臟則大便多秘澀宜以三化湯通其滯初證已定別無他變以大藥和治之大抵中腑者多著四肢中臟者多滯九竅惟有中腑者多兼中臟之證至於舌強音澀久服大藥能自愈也有中風濕者夏月多有之其證身重如山不能轉側宜除風勝濕去熱之藥切不可針灸治之氣血痰水受病於內者也風寒暑濕致寇於外者也人之一身血氣既虛陰陽不守飲食居處嗜欲無節衝風臥地調護不周於是經絡空疏腠理開徹風邪乘其虛而入之挾熱則痿墮緩弛挾寒則急痛拘攣自其邪氣之入人也邪氣反緩正氣反急正氣引邪為喎僻為竄視為掣縱為搐搦為癱瘓為反張在於陽則皮膚緩在於陰則為腹裡急緩則四肢不能收急則一身不能仰皆隨其邪氣所至表裡淺深而有證也種類雖多大要有四血氣偏虛半身不遂肌肉枯瘦骨間疼痛謂之偏枯神智不亂身體無痛四肢不舉一臂不隨謂之風痱能言則可治忽然迷僕舌強不語喉中窒塞噫噫有聲謂之風癔身有汗則生風寒濕三氣合而為痹其人肉厚身頑不知痛癢風多則走注寒多則疼痛濕多則重著在筋則筋屈而不伸在脈則血凝而不流在肉則不仁在骨則癃重夫是之謂風痹傷風一證發熱煩躁頭痛面光惡風自汗蓋風能散氣故有汗也風家脈浮者病在表脈實者病在裡脈虛者病在臟脈促者病在上浮則發散實則疏導虛則溫之而病人壯盛胸喉澎湃者瓜蒂散少少吐之俗謂熱則生風大綱然爾多有胃虛氣虛血虛虛極而生風者若諸虛證候天雄附子官桂川烏又必不可闕治法大要盡以消痰順氣為先順氣用南木香蘇合香香櫞輩消痰用南星半夏細辛殭蠶輩如石綠鐵焰水銀輕粉鉛霜朴硝等劑謹勿妄施寒毒入胃則血脈凝澀真氣消鑠不旋踵而成廢人治風良劑小續命湯為上排風湯次之然二藥主風不主氣須以人參順氣散烏藥順氣散佐助其間氣一流行則風亦疏散矣至若口開手撒瀉便遺尿眼合不開汗出不流吐沫氣粗聲如鼾睡面黑髮直頭搖手足口鼻青冷口噤而脈急數皆為不治之證若中於肝者人迎與左關上脈浮而弦面目多青惡風自汗左脅偏痛中於心者人迎與左寸口脈洪而浮面舌俱赤翕翕發熱喑不能言中於脾者人迎與右關上脈浮微而遲四肢怠惰皮肉瞤動身體通黃中於肺者人迎與右寸口脈浮澀而短面浮色白口燥多喘中於腎者人迎與左尺脈浮而滑面耳色黑腰脊痛引小腹隱曲不利中於胃者兩關脈並浮而大額上多汗隔塞不通食寒則泄凡此風證或挾寒則脈帶浮遲挾濕則脈帶浮澀二證俱有則從偏勝者治之若因七情六淫而得之者當先調氣而從治風邪倉卒之際救此急證宜先以皂角細辛㗜入鼻內通其關竅次以蘇合香丸擦牙連進以生薑自然汁並三生飲候其甦醒然後次第進以順氣排風續命之類張仲景曰欲療諸病當先以湯盪滌五臟六腑開通諸脈治道陰陽破散邪氣潤澤枯朽悅人皮膚益人氣血水能淨萬物故用湯也若四肢病久風冷發動次當用散逐邪風氣濕痹表裡移走居處無常處者散當平之次當用丸丸藥者能逐風冷破積聚消諸堅癖進飲食調和榮衛能參合而行之者可謂上工故曰醫者意也又曰不須汗而強汗之者出其津液枯竭而死須汗而不與汗之者使諸毛孔閉塞令人悶絕而死又不須下而強下之者令人開腸洞泄不禁而死須下而不與下之者使人心內懊憹脹滿煩亂浮腫而死又不須灸而強與灸者令人火邪入腹干錯五臟重加其煩而死須灸而不與灸之者令人冷結重凝久而彌固氣上衝心無地消散病篤而死風者百病之長善行而數變位列東方甲乙也時春升也人甲膽乙肝是也四氣調神論云春三月此謂發陳發皮毛發腠理三冬陳積惡氣是明發汗宜陽氣升天地俱生萬物以榮生而勿殺予而勿奪賞而勿罰春氣之應養生之道也或曰此論春時之令生養之道人病八風所害難入此說答曰素問之道皆謂人養生失宜而作病也至真要大論四反治為證當通因通用順月令升發以滋陽道而反補之為之治經云風從上受之惟宜宣發以去之繆刺論云夫邪氣之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於脾胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉凡治諸病先別陰陽故經云陽盛陰虛下之則愈汗之則死陽虛陰盛汗之則愈下之則死仲景云發表攻裡本自不同夫八正之氣風其至以時乃生萬物者也切避其寒暑有和風有大暑風有涼風有大寒折木風沖後八風中人則病謂之虛風冬天大寒之風中人則暴死治之大要先繆刺皮毛孫絡以出其血無令邪氣得入於經脈百病皆然俱出皮毛間血絡也若冬月閉密陽氣不令妄泄至春氣升旺之時故膽風得用事矣此由脾胃榮氣上行者是也故曰清陽為天清氣出上竅耳目口鼻舌喉也清陽發腠理津液上出於皮毛養血脈七神所依元氣因流者也清氣實四肢清陽之氣護衛皮毛邪不得犯充塞天地在人則實皮毛可開闔者也明春升肝膽之氣上衝於天即謂之穀氣一體不須兩認胃之穀氣大矣哉滋養天真元氣此即七神主萬化者也又云榮氣常與衛風相合隨此即春風肝膽之氣故風不可折也治法正則周身元氣不差忒矣豈可便以大苦寒之劑妄下之及龍麝硃砂牛黃諸鎮墜之藥瀉之惟其不知而妄用以致傷生是失內經之旨故也中風附論夫風者天地山川之氣也所發遠近有二焉一者天地八方五行四時之氣為近風春秋冬夏各依其時從東西南北天涯地際八卦之鄉來者為遠風溫涼寒暑從微至盛各隨其孟仲季以順十二月周一歲也溫涼寒暑之氣是風也動則靡靡然靜則含含爾是天地之風也經曰諸邪風者非是時行乘節之風亦非山川鼓振之風是人間庭巷門戶窗牖之徑氣爾天無風之日其恆有徑氣人長居其間日月積久乃能虛人膚肉入人百脈流注五臟六腑則致生病焉凡四時風者春九十日名曰清風傷人為肝風夏九十日名曰陽風傷人為心風秋九十日名曰涼風傷人為肺風冬九十日名曰寒風傷人為腎風其分布八方亦異名也太乙之神隨其節居其鄉各王四十五日風雲皆應之東北方艮之氣立春王名為條風一名為凶風王四十五日東方震之氣也春分王名為明庶風一名嬰兒風王四十五日東南方異之氣立夏王名為清明風一名弱風王四十五日南方離之氣夏至王名為景風一名大弱風王二十七日合仲夏也仲夏中央之氣戊己王十八日合夏至都四十五日王皆同在此仲夏者非孟仲之仲也是天地之正中五行之所會四季之所同其一節而火土二氣王之分夏數為二位故為仲夏也西南方坤之氣立秋王名為涼風一名謀風王四十五日西方兌之氣秋分王名為閶闔風一名剛風王四十五日西北方干之氣也立冬王名為不周風一名折風王四十五日北方坎之氣冬至王名為廣莫風一名大剛風王四十五日由此四風之變而生八風八風者八方之風也若從其鄉來者主長養萬物則人少病若不從其鄉來而從所勝來者為賊邪害於萬物則人多病是故聖人避風如避矢然風之傷人或為熱中或為寒中或為厲風或為偏枯或為癱瘓或角弓反張風者善行而數變其病各異其名不同也中風者凡風之傷人或為寒中或為熱中或為厲風或為偏枯或為賊風故以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以四季戊己傷於風者為脾風以秋庚辛傷於風者為肺風以冬壬癸傷於風者為腎風風中五臟六腑之輸亦為臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風外在腠理則為泄風故曰風者百病之長也至其變化乃為他病無常方焉是知風者善行而數變在人肌膚中內不得泄外不得散因人動靜乃變其性有風遇寒則食不下遇熱則肌肉消而寒熱有風遇陽盛則不得汗遇陰盛則汗自出肥人有風肌肉厚則難泄喜為熱中目黃瘦人有風肌肉薄則常外汗身中寒目淚出有風遇於虛腠理開則外出悽悽然如寒狀覺身中有水淋狀時如竹管吹處此是其證也在風遇於實腠理閉則內伏令人熱悶是其證也肝中風者人迎並左關上脈浮而弦在天為風在地為木在人臟為肝肝虛喜中風為類相從故脈應在左關肝風之狀多汗惡風色微蒼頭目瞤左脅偏痛嗜甘如阻婦狀筋急攣痹不伸診在目其色青心中風者人迎與左寸口脈洪而浮在天為熱在地為火在人臟為心心虛因中邪風乃子母相因故脈應在左寸口心風之狀多汗惡風色微赤翕翕發熱喑不能言飲欲食食則嘔診在舌其色焦赤脾中風者人迎與右關上脈浮而微遲在天為濕在地為土在人臟為脾脾虛因中邪風為勝克故脈應在右關上脾風之狀多汗惡風薄黃四肢怠惰皮肉瞤動發熱短氣不欲飲食嗜臥如醉人診在唇其色黃肺中風者人迎與右寸口脈浮澀而短在天為燥在地為金在人臟為肺肺虛因中邪風為乘克故脈應在右手寸口肺風之狀多汗惡風色皓然白口燥而喘逆氣肩息身重背痛面脹浮腫晝瘥暮甚診在鼻其色白腎中風者人迎與左尺中脈浮而滑在天為寒在地為水在人臟為腎腎虛因中邪風為子母相感故脈應在左尺中腎風之狀多汗惡風色如炲面龐然浮腫腰脊痛引小腹隱曲不利昏寢汗愈多志意惶惑診在耳其色黑胃中風者人迎與兩關上脈並浮而大以胃為水穀之海納五味以滋養五臟虛而中邪風故其狀額多汗飲食不下隔塞不通腹善滿失衣則䐜脹張口肩息心下淡淡食寒則泄大腸中風者臥而腸鳴不止灸大腸俞百壯可服續命湯賊風邪氣所中則傷於陽外先受之客於皮膚傳入於孫脈孫脈滿則入傳於絡脈絡脈滿則輸於大經中成病歸於六腑則為熱不時臥止為啼哭其脈堅大為實實者外堅充滿不可按之按之則痛也經絡諸脈旁支去者皆為孫脈也凡中風脈無不大者非熱也暴風脈也中風有冷熱陽病則熱陰病則冷冷則用溫風藥熱則用涼風藥不可一概用也凡中風皆不可吐出涎人骨節中皆有涎所以轉動滑利中風則涎上潮咽喉中滾響以藥壓下涎再歸骨節可也不可吐出若吐出涎時間快意非久枯了手足不可不戒小兒驚風亦不可吐出涎其患與大人同方其發搐搦之時不可捉住手足捉住則涎不歸手足當不隨但寬抱之可也凡中風涎潮於心卒然中倒當時扶入暖室中扶策正坐用好醋炭熏之令醋氣衝入口鼻間良久其涎聚於心者自可收歸輕者即蘇重者亦省人事惟不可吃一滴湯水入喉如吃湯水則其涎永繫於心終不能去必成廢人不可不知凡中風口開手撒眼閉遺尿聲如鼾睡髮直吐沫搖頭上攛面赤如妝或頭面青黑汗出如珠循衣摸床神昏不語皆死證也蓋口開者心氣絕也遺尿者腎氣絕也手撒者脾氣絕也眼閉者肝氣絕也鼻鼾者肺氣絕也中風口噤脈遲浮者吉急實大數者凶凡中風浮緩為癱瘓浮滑為風痰浮實為風熱浮細為風虛不浮不沉大小有力息數調勻者可治虛細獨大獨小遲者不可治口開者心氣閉絕也遺尿者腎氣閉絕也手撒者脾氣閉絕也眼合者肝氣閉絕也鼻鼾者肺氣閉絕也備此五證尤不可治五證中才見一證猶當審餘證以救療蓋以初中風則眼合者多痰止則鼻鼾者亦多惟遺尿口開俱見為惡心為五臟主腎為一身根本誠不可閉絕也方八瓊丹出聖濟總錄治五臟中風偏風賊風偏枯手足不隨硫黃水銀二味同結作沙子曾青丹砂雄黃白石英紫石英鉛丹玄精石胡粉各一兩硝石二兩以上十一味各細研入瓷盒盛盒上留一眼子外用六一泥固濟畢候乾以文火養一復時後閉盒眼子用大火燒令通赤去火放冷取出以紙裹藥地內埋三日去火毒取出研令極細入後藥龍腦麝香牛黃天竺黃並細研琥珀虎骨酥炙甘草炙烏蛇酒浸三日去皮骨炙天南星炮天麻各一兩白附子炮麻黃去根節乾蠍炒官桂去粗皮木香附子炮裂去皮臍檳榔銼獨活去蘆頭細辛去苗葉阿膠打碎炒燥各一兩白朮白殭蠶炒犀角鎊羚羊角鎊芎藭蟬蛻去土膩粉研各半兩上除前焙研外余搗研為末再同研勻煉蜜和搗一二千下丸如小彈子大每服一丸細嚼以豆淋酒下輕病只溫酒嚼下靈寶丹出聖濟總錄治諸中風凡人生自幼稚至於老耄率多因風而致疾或嗜食傷飽或不食失飢或渴而失飲或飲而過量或因五味之傷或冒熱衝風或大寒近火或暴露濕或刺損肌膚撲傷肢體或失節宣或多嗜欲緣此風趨諸竅或留一偏遂使手足不隨言語謇澀或痛連骨髓或痹襲皮膚瘙癢如蟲行𤸷痹如鐵石或多痰好唾或健忘多嗔血脈不行面色乾瘦久在床枕起便須人語澀面浮精神困耗皆其證也若積歲不愈肢節不能運動者但如法服十數粒即效亦有中風卒斃者但心頭未冷取藥五粒以醋調摩臍中一千餘遍當從臍四面漸暖待眼開後以熱醋研下十丸入口即活凡病不問輕重年月深淺先以紅雪通中散三錢茶調下須臾更以熱茶投令宣瀉一兩行便依法煎姜豆湯下三粒當以他人熱手更摩所患處須臾熱徹當覺肉內有物如火至病所一二百日內及一年內風疾不能下床者一服三粒十服後便可行步如患至重者每利一度後隔日服五粒又住三五日即更利不過三十粒平復如故若打傷撲損多年每遇天陰疼痛舉動不能者可五七服服此藥多者疾去後藥力常在其方如後丹砂一兩半研如皂子大絹袋盛以蕎麥灰下汁煮三複時取出研如粉硫黃一兩先搗研如皂子大絹袋盛以無灰酒煮三複時取出研如粉自然銅一兩先搗碎更研如粉雄黃一半兩碎如皂子大絹袋盛以米醋煮三複時取出研如粉上四味用有蓋瓶子先以金箔三片鋪瓶底上便入硫黃又以金箔兩片蓋之次入雄黃又以金箔兩片蓋之次入丹砂又以金箔兩片蓋之次入自然銅又以金箔三片蓋之以瓶蓋合卻不用固濟於灰內坐瓶子令穩以火養三日三夜第一日用熟炭火半斤圍瓶子去瓶子三寸第二日用熟炭火十兩去瓶子二寸半第三日用炭火一斤去瓶子二寸以火盡為度候冷取藥出以紙三重裹藥於淨濕土中埋至來旦取出更研令細磁石煅醋淬一七遍搗研如粉陽起石研如粉理石研如粉紫石英研如粉上四味各三分用有蓋瓷瓶子先入磁石次入陽起石次入理石次入紫石英其所入金箔一依前法以蓋合之不用固濟用火養三日三夜第一日用熟炭火一斤去瓶子三寸第二日用炭火三斤去瓶子二寸半第三日用炭火半斤去瓶子二寸一日至夜任火自銷候冷取出藥用紙裹入濕土中埋至來旦取出更研令細牛黃龍腦麝香膃肭臍酒刷炙龍齒腦脛骨酒塗炙令黃上六味各一兩搗羅為末更研如粉石鐘乳十兩以絹袋盛先以長流水煮半日後棄水別用水五斗煎取一斗留煮後草藥外更留鍾乳水三合磨生犀角三分苦參遠志去心巴戟天去心烏蛇酒浸去皮骨炙仙靈脾天麻各一兩一分上七味搗羅為末以前鍾乳水一斗煎至七升用生絹濾去滓澄清木香肉豆蔻去殼鹿茸去毛塗酥炙桂去粗皮炙一兩半延胡索胡桐淚各三分上六味搗羅為末以前鍾乳汁七升煎至四升以生絹濾去滓澄清半夏湯洗七遍去滑當歸切焙各一兩上二味搗羅為末以前鍾乳汁四升煎至三升以生絹濾去滓澄清芒硝一兩細研生地黃汁一升無灰酒一升童子小便一升皂子仁一兩半搗羅為末上以地黃汁等連前三升計六升貯鍋中於靜室內以文火養至一升下金石藥末在內以柳木棍攪勿令住手稀稠得所去火然後入牛黃等六味攪令極勻即下皂子仁末及磨下犀角水以綿濾過入在藥內研於缽內以乳椎研三五千轉此藥黏如膠須用力研之研訖分為三分內一分入上件芒硝別更研令勻並丸如梧桐子大此藥三名一名歸命丹一名返魂丹入芒硝者名破棺丹如有中一切風牙關緊急及屍厥暴亡者以熱醋研三兩丸灌在口中下得咽喉中即活如要常服空心溫酒下二丸七寶丸出聖濟總錄治中風涎潮言語謇澀精神恍惚煩悶內有熱氣在下使大腸秘澀熱氣乘虛上衝則神志昏昧宜順三焦化痰牛黃麝香龍腦丹砂雄黃各一分同研天竺黃研白殭蠶炒白花蛇酒浸去皮骨炙白附子炮天麻各半兩蠍梢炒一分天南星酒浸一宿切作片子焙半兩膩粉真珠末各研一分錢蛇黃煅醋淬自然銅煅醋淬七遍鐵粉研銀礦煅乳香研蘆薈研犀角鎊鉛白霜研各一分龍膽桑螵蛸炙芎藭人參胡黃連原蠶蛾炒各半兩上為末煉蜜為丸如皂子大每服一丸薄荷湯化下食後臨臥服卒病不拘時服吳秦艽丸出千金方治風注入肢體百脈身腫角弓反張手足痠痛皮膚習習身體盡痛眉毛墮落耳聾驚悸心滿短氣魂志不定陰下濕癢大便有血小便赤黃五勞七傷萬病皆治秦艽川椒人參茯苓牡蠣細辛栝蔞根麻黃各十八銖乾薑附子白朮桔梗桂心獨活當歸各一兩黃芩柴胡牛膝天雄石南杜仲莽草烏頭各半兩甘草芎藭防風各一兩半上為治下篩盛以葦袋食前溫酒一升服方寸匕日三服急行七百步更飲酒一升忌如常法至聖太乙散出聖濟總錄治中風身癱瘓半身不遂口眼喎斜語言謇澀形神如醉驚悸狂言夜臥不安或周身麻痹皮膚不知痛癢四肢不舉身重如石腰膝強硬或筋脈拘攣瘛瘲不能行步百關壅閼痰涎痞滯或卒急中惡客忤屍注鬼氣邪魘屍厥暴亡不省人事等疾犀角鎊仙靈脾真珠末滑石研胡黃連惡實炒人參地丁草去根白茯苓研去皮蠶砂炒甜硝研板藍根鬱金各一兩大黃研牛黃研血竭研木通銼梔子仁馬牙硝研蒼朮銼去黑皮荊芥穗芍藥延胡索玳瑁鎊琥珀研各半兩甘草炙二兩半上為末如中風不語用新水調下一錢匕如口噤即灌下若能咳嗽夜半當省人事灌藥四次後不咳嗽者必不可救卒中惡風涎不止用白礬末半錢匕太乙散一錢匕和勻以新汲水調下慢慢灌之即活龜甲湯出聖濟總錄治中風手足不隨舉體疼痛或筋脈攣急龜甲醋炙虎骨酥炙各六兩海桐皮羌活去蘆頭丹參獨活去蘆頭萆薢牛膝去苗酒浸切焙五加皮酸棗仁炒各三兩附子炮裂去皮臍天雄炮裂去皮臍天麻去蒂防風去叉威靈仙去土芎藭各二兩半當歸切焙桂去粗皮紫參各三兩薄荷焙乾六兩檳榔煨六兩菖蒲九節者去須米泔浸後切焙一兩半上銼如麻豆每用八錢匕水一盞酒一盞生薑十片同煎去滓取一大盞溫分三服空心日午夜臥服要出汗並二服如人行五里以熟生薑稀粥投厚衣覆汗出慎外風通神散出聖濟總錄治中風昏憒肢體不收不以緩急烏蛇去皮骨酒浸炙躑躅花酒浸炒蟬蛻生用天南星生薑汁浸炒乾麻黃去根節天麻酒浸炙牛膝酒浸切焙防己銼羌活去蘆頭獨活去蘆頭地龍去土生用石斛去根酒浸炒桂去粗皮皂莢去皮子酒浸炒乾蠍生用附子炮裂去皮臍白附子半生半炮烏頭炮裂去皮臍丹砂別研各一兩麝香別研半分上除別研外搗羅為散每服一錢至二錢匕溫酒調下日三服大麻仁丸出聖濟總錄治中風諸疾大麻仁研吳茱萸湯浸焙炒麻黃去根節枳殼麩炒去瓤白芷各半兩天雄炮裂去皮臍當歸切焙各一兩茯神去木三分秦艽去土細辛去苗葉烏頭炮裂去皮臍白朮各三分天門冬去心炒獨活去蘆頭蜀椒去目並閉口炒出汗防風去叉羚羊角鎊桂去粗皮各一兩白檳榔煨一兩半熟乾地黃切焙三兩上為末煉蜜和丸如梧桐子大每服空心溫酒下三十丸日三服四白丹出保命集能清肺氣養魄中風者多昏冒氣不清和也白朮人參縮砂白茯苓香附子甘草防風川芎各半兩白芷一兩白檀一錢半知母二錢羌活薄荷獨活各二錢半細辛二錢麝香一錢別研龍腦半錢別研牛黃半錢別研藿香一錢半甜竹葉二兩上為細末煉蜜為丸每兩作十丸臨臥嚼一丸煎愈風湯嚥下能上清肺氣下強骨髓大秦艽散出危氏方治風壅痰盛四體重者或軟瘓疼痛或拘攣麻痹顫掉口乾目赤煩熱睡臥不寧條參去蘆川羌活去蘆枳殼去瓤赤芍藥苦梗去蘆前胡去蘆川芎白芷黃芩薄荷天麻桑白皮去赤防己防風粉草荊芥穗赤茯苓木瓜川牛膝去苗各等分上銼散每服四錢水一盞半生薑三片煎溫服不拘時候羚羊角丸出聖濟總錄治中風手足𤸷痹行履艱難羚羊角屑桂去粗皮白檳榔煨銼五加皮銼人參丹參柏子仁枳殼去瓤麩炒附子炮裂去皮臍杏仁去皮尖雙仁炒黃各一兩半茯神去木防風去叉熟乾地黃焙麥門冬去心焙各二兩南木香牛膝酒浸切焙各一兩薏苡仁二兩半上搗羅極細煉蜜和丸如梧桐子大每服空心溫酒下三十丸日二服大鐵彈丸出直指方治中風癱瘓口眼喎斜筋骨攣疼肢體麻木自然銅燒紅醋淬七次兩半虎脛骨酒浸炙黃當歸酒浸焙白附子炮川烏炮去皮臍五靈脂炒麻黃去節各一兩沒藥酒浸焙乳香全蠍焙安息香白芷白殭蠶炒去絲各半兩烏蛇肉酒浸焙乾三分木鱉二十一個去殼炒熟硃砂麝香各一分上為末以酒煮安息香入飛白麵糊為丸如彈子大每服一丸溫酒磨下防風通聖散出保命集治一切風熱鬱結氣血蘊滯筋脈拘攣身倦手足麻痹肢體焦痿頭痛目眩腰脊強痛耳鳴鼻塞口苦舌乾咽噎不利胸膈痞塞咳嗽喘滿涕唾稠黏腸胃燥澀便溺淋悶或腸胃蘊熱鬱結水液不能浸潤於周身而為小便出多者或濕熱內甚而有溏泄者或表之正氣與邪熱並甚於里陽極似陰而寒顫煩渴者或熱甚變為瘧疾久不已者或風熱定注疼痛頑麻者或腎水陰虛心火陽甚熱暴甚而中風或暴喑不語及暗風癇病或破傷中風時發潮搐並小兒熱甚驚風或癍疹未出不快者更熱劇黑陷將欲死者或風熱瘡疥久不愈者並解酒熱毒及調理傷寒發汗不解頭項肢體疼痛宜服之防風川芎當歸芍藥大黃芒硝連翹薄荷以上各半斤麻黃去節半兩石膏桔梗黃芩各一兩白朮山梔子荊芥穗各三錢滑石二兩甘草一兩人參半兩半夏一兩生薑制一方去芒硝加牛膝半兩酒浸上為粗末每服一兩生薑同煎日再服若勞汗當風為皶郁乃痤勞汗出於玄府脂液所凝去芒硝加芍藥當歸若生癮疹或赤或白倍加麻黃鹽豉蔥白出汗麻黃去節亦去芒硝若依前方中加四物黃連解毒三藥合而飲之日二服若小便淋閉去麻黃加滑石連翹煎藥湯調木香末二錢匕若腰脅痛走疰疼痛加硝石當歸甘草一服內各二錢調車前子末海金砂末各一錢若破傷風每一兩加荊芥穗大黃各二錢調全蠍末一錢羌活末一錢若諸風潮搐小兒急慢驚風大便結秘邪熱暴甚腸胃乾燥寢汗咬牙筋轉驚悸肌肉瞤動每一兩加大黃二錢梔子仁二錢調茯苓三錢羌活末一錢若解利四時傷寒內外所傷每一兩加益元散一兩蔥白十莖鹽豉一合生薑半斤雨水一碗同煎五七沸溫服一半以箸投之吐罷後服一半稍熱服汗出後立解若飲酒中風身熱頭疼如破者加黃連須二錢蔥白十莖依法立愈若頭旋腦熱鼻塞涕時下每一兩加薄荷黃連各二錢半若風傷於肺咳嗽喘急每一兩加半夏桔梗紫菀各二錢若撲跌傷損肢節疼痛腹中惡血不下每一兩加當歸大黃各三錢半調沒藥乳香末各二錢宣明論方有縮砂無芒硝名賈同知通聖散內經曰膽移熱於腦則辛額鼻淵鼻淵者濁涕下不已也王注曰膽液下澄則為濁涕下不已如水泉故曰鼻淵也此為足太陽脈與陽明脈俱盛也如氣逆者調木香末一錢乳香末二錢硫黃大黑神丸出聖濟總錄治急慢中風白殭蠶炒桂去粗皮天南星炮各半兩牛膝炒令煙出乾蠍酒炒人參白茯苓去黑皮各一分麻黃去根節先煎掠去沫焙乾二兩天麻一兩半白附子炮烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙硫黃研丹砂研水銀各一兩雄黃研半兩上前十二味搗羅為末各頓一處後四味各細研用銚子先下硫黃後下丹砂水銀雄黃交武火結成砂子待冷刮取搗羅為末先取一瓷瓶上磨瓦一小片作蓋鑽一竅可度得綠豆用六一泥固濟瓶子火熁令乾卻入砂子末在瓶內按令平實然後下蓋子泥合縫留竅子候乾用火半秤四面約四寸已來燒至一食頃更加火漸近瓶子待黑氣出盡後取濕紙搭瓶竅上如紙才幹便易之至三十易為止待冷取出細研以酒浸潤一宿再焙為末每石藥末一兩入前藥末二兩同研取勻煉蜜丸如雞頭實大中風者以豆淋酒研下一丸至二丸以厚衣服覆出汗未汗更服用熱生薑稀粥投汗出慎外風大秦艽湯出保命集治中風外無六經之形證內無便溺之阻隔知為血弱不能養於筋故手足不能運化舌強不能言宜養血而筋自榮也秦艽石膏各二兩甘草川芎當歸羌活獨活防風黃芩白芍藥白朮吳白芷生地黃熟地黃白茯苓各一兩細辛半兩上銼每服一兩水二盞煎至一盞去滓溫服無時如遇天陰加生薑七八片如心下痞每服一兩內加枳實一錢同煎亦作楮實備急黑神丸出聖濟總錄治中風雄黃研硇砂研丹砂研硫黃研水銀先以慢火生鐵銚內熔硫黃銷始傾入水銀急以火箸攪恐焰起即離火以濕布搭滅候冷刮取與上四件同搗研此五味各一兩取一湖南燒藥罐子先用六一泥固濟待乾入上件研者末都入罐子中實按令平連蓋子泥四縫只留一寸縫不泥令慢火勻養一復時加火近罐子燒令通赤縫中有煙焰出即急抽火令人按蓋子急泥合縫周遍用淨篩土窨定藥罐子不得令露透出藥氣上以大盆合之來日取出藥搗羅用濕重帛包裹以淨濕土內窨盆令出火毒三日三夜逐日取盆微灑水日滿取藥再研如粉入後藥末犀角鎊一兩牛黃研半兩天竺黃研鹿茸酥炙去毛各一兩升麻天麻各一兩木香半兩乾蠍酒炒一兩阿膠慢火炙燥二兩天南星牛膽煮一復時曝乾一兩上將後十味除研外搗羅為末次入牛黃天竺黃並前研五味再同研勻用青州大棗蒸熟去皮核研如膏和藥搗一千杵丸如梧桐子大中風急風牙關急口噤不開用豆淋酒生薑酒去滓研二丸至三丸斡開口灌下如人行五里更一服連三服汗出解宜食生薑酒粟米粥此藥宜三月三日五月五日或臘月於淨室中焚香齋沐修合切忌禽獸並婦人等見五積散出如宜方陳皮制六兩麻黃三兩枳殼六兩白芍藥川芎當歸甘草炙茯苓半夏制肉桂白芷各三兩厚朴乾薑各四兩蒼朮制二十四兩桔梗十二兩上㕮咀慢火炒令色轉續入肉桂枳殼薑蔥散去麻黃名和氣飲入麝香一方只加乳香蘇合香丸出如宜方治卒然眩暈白朮青木香硃砂烏犀屑沉香麝香訶黎勒丁香蓽茇白檀香香附子以上各二兩薰陸香龍腦各研蘇合油各一兩安息香二兩八錢為末用好酒一升熬成膏將蘇合油入之上末入研藥令勻用安息香膏同白蜜和成臨用時旋丸又擦牙關或薑汁化下仍宜皂角細辛末㗜鼻通關竅太乙赤丸出聖濟總錄治中風積涎在膈下四肢癱瘓不知人事丹砂硼砂硇砂鉛白霜粉霜硫黃細研各半兩金箔銀箔各十片與前六味同研金牙研紫石英研天麻羌活去蘆頭獨活去蘆頭巴豆去心膜出油盡干牛膝炒煙出各半兩上為末用黃蠟三兩熔作汁拌諸藥乘熱丸如雞頭實大用丹砂為衣入瓷盒盛每服一丸用糯米飲半盞龍腦膩粉各少許薄荷自然汁同化下取下風痰為效
