body:
  text: 卷二百九泄痢門濡瀉附論夫內經曰濕勝則濡泄甲乙經曰寒客下焦傳為濡瀉夫脾為五臟之至陰其性惡寒濕今寒濕之氣客於脾則不能裨助胃氣腐熟水穀致清濁不分水入腸間虛莫能制故洞泄如水隨氣而下謂之濡泄方堅中丸治脾胃受濕滑泄注下黃連去須黃柏赤茯苓去皮白朮澤瀉各一兩陳皮人參肉豆蔻白芍藥半夏桂各半兩上為細末水浸蒸餅和丸如梧桐子大每服五七十丸食前溫米飲下肉豆蔻散治腸胃受濕濡泄不止兼治暴瀉肉豆蔻去殼黃連去須炒訶黎勒去核炮各三分甘草炙銼赤茯苓去黑皮乾薑炮白朮各半兩厚朴去粗皮生薑汁炙一兩上為散每服二錢空心食前米飲調下日三當歸散治腸胃寒濕濡泄腹內㽲刺疼痛當歸切焙木香乾薑炮肉豆蔻去殼炮各半兩訶黎勒炮去核黃連去須炒各三分上為散先用水四盞入甘草生薑各一分黑豆半合並半生半炒同煎至二盞去滓分作二服每服用調散三錢空心日午服之加味五苓散治伏暑熱二氣及胃濕泄瀉注下或煩渴小便不利赤茯苓去皮澤瀉木豬苓去皮肉桂不見火白朮各一兩車前子半兩上㕮咀每服四錢水一盞半姜五片煎八分去滓溫服不拘時或進來復丹亦可炙肝散治飲食生冷內受風寒泄瀉無度乾薑炮半兩大附子炮半兩縮砂仁半兩肉豆蔻二個小茴香四錢炒川小椒四兩上為末每服三四錢用白羊肝三二兩或獖豬肝或豬羊腰子批開放藥在內鹽末二錢蔥白二根同肝一處紙裹潤濕燒香熟為度細嚼生薑湯下或米湯酒送下食前空心服之訶黎勒散治寒濕傷脾濡瀉訶黎勒炮去核吳茱萸湯浸焙炒木香蕪荑各半兩黃連去須炒一兩上為細散每服二錢空心米飲調下白豆蔻湯出聖濟總錄治腸胃虛濕濡瀉無度腸痛飲食不化白豆蔻去皮訶黎勒炮去核乾薑炮陳橘皮湯浸去白焙炒各半兩厚朴生薑汁炙三分上搗篩每服五錢切薤白三寸水一盞半煎七分去滓空心溫服日午再服枳殼湯出聖濟總錄治濡泄暴下不止甘草炙銼阿膠炙燥各半兩黃連去須微炒枳殼去瓤炒三分厚朴去粗皮生薑汁炙秤一兩上搗篩每服五錢水一盞半煎一盞去滓空心溫服日再桂附丸出聖濟總錄治濡泄水痢久不止桂去粗皮附子炮裂去皮臍乾薑炮赤石脂各一兩上為末煉蜜丸如梧桐子大每服二十丸空心日午米飲下日再附子湯出聖濟總錄治腸胃寒濕濡泄不止及冷痢色白食不消化附子炮裂去皮臍甘草炙銼阿膠炙燥各半兩黃連三分上銼如麻豆大每服五錢水一盞半煎至一盞空心溫服日再一名甘草湯白朮丸出聖濟總錄治脾胃受濕濡瀉不止健脾白朮乾薑炮各三分人參三分厚朴去粗皮生薑汁炙一兩上為末煉蜜丸如梧桐子大每服三十丸空心米飲下日再豆蔻散出宣明論治脾胃受濕濡泄不止而腸痛滑痢肉豆蔻去殼炮五枚甘草炙銼一兩厚朴去粗皮薑汁炙一兩半上為散每服二錢米飲下或湯調下食前溫服豬苓丸出聖濟總錄治腸胃寒濕濡泄無度嗜困不食豬苓去黑皮半兩肉豆蔻去殼炮二枚黃柏去粗皮炙一兩上為末米飲丸綠豆大每服十丸食前熟水下附子丸出聖濟總錄治濡泄不止或晝夜無度附子炮裂去皮臍高良薑各一兩甘草炙銼一分上為末陳米煮糊丸如梧桐子大每服二十丸米飲下不拘時候樗根丸出聖濟總錄治濡瀉裡急後重數走圊樗根皮銼一兩甘草炙銼一兩枳殼去瓤麩炒半兩上為散每服二錢粥飲調下食前一服止戊己丸出濟生方治脾胃不定濕熱乘之泄瀉不止水穀不化腸鳴腹痛對金飲子出濟生拔萃方治濡泄平胃散五錢五苓散二錢半草豆蔻麵裹煨熟半兩上相和勻作四服生薑三片棗二枚水煮白朮芍藥湯出保命集治太陰脾經受濕水泄注下無度體重微滿困弱無力不欲飲食暴泄無數水穀不化宜此和之白朮芍藥各一兩甘草五錢上銼每服一兩水二盞煎至一盞溫服如痛甚者宜蒼朮芍藥湯蒼朮芍藥湯出保命集蒼朮一兩芍藥一兩黃芩半兩上銼每服一兩加淡味桂半錢水一盞半煎至一盞溫服如脈弦頭微痛者宜蒼朮防風湯蒼朮防風湯出保命集蒼朮防風各二兩上銼同前煎服如下血者宜蒼朮地榆湯蒼朮地榆湯出保命集蒼朮二兩地榆一兩上銼同前煎服以上證如心下痞每服各加枳實一錢茯苓一二錢如小便稍利以及腹痛漸已瀉下微少宜訶子散止之法云大勢已去而宜止之附子丸出聖濟總錄治寒濕濡泄久不瘥附子一兩炮裂去皮臍甘草炙炮一兩上為末煉蜜丸如梧桐子大每服二十丸空心生薑湯下日再厚朴湯一名黃連丸出聖濟總錄治傷濕濡泄不定亦治水穀痢久不瘥吳茱萸湯洗三五次一分赤芍藥半兩肉豆蔻四枚去殼檳榔銼四枚上搗羅為散每服三錢用不經水豬肝四兩去筋膜批為薄片重重摻藥置一鼎中入漿水一碗酉宛半合蓋覆煮肝熟入鹽秤用一錢蔥白三莖細切生薑彈子許拍破同煮水欲盡空心為一服如服食之初微瀉不效此是逐下冷氣少時自止渴即以粥湯飲之一方為丸桐子大每服十丸粥飲下一方用破故紙即補骨脂豬肚丸出危氏方治臟寒泄瀉先用製成厚朴附子二味生薑棗煎服空心仍服此豬肚丸川烏炮附子炮各二兩乾薑炮白朮厚朴各一兩半良薑炒肉豆蔻煨蓽茇禹餘糧火煅醋淬丁香縮砂仁桂心各一兩上為末用獖豬肚一具淨洗以川椒一兩去目茴香一兩大麴二兩入豬肚內用線縫定酒醋煮爛取出川椒茴香大麴焙乾為末均和前藥以豬肚杵和得所為丸梧桐子大每服五十丸空心米飲下人參湯療中焦虛寒洞泄補虛人參三兩甘草三兩黃芩二兩當歸三兩茯苓四兩芎藭三兩厚朴四兩炙乾薑四兩粟米二升上切以水一斗五升煮米取熟去米澄取七升下諸藥煎取三升分三服忌海藻菘菜大酢等物訶黎勒丸出和劑方治腸胃虛冷內受風冷水穀不化泄瀉注下腹痛腸鳴胸滿氣短又治腸胃積寒及純白或有青黑日夜無度及脾胃傷冷暴瀉手足逆冷脈欲絕並宜服之訶黎勒皮川烏頭炮去皮臍縮砂仁白礬煅各四十兩木香肉豆蔻去皮炮乾薑炮各二十兩龍骨洗赤石脂各八十兩上為末用粟米飲為丸梧桐子大每服二十丸至三十丸溫粟飲下食前服甚者加倍丸數一方有附子無砂仁木香散出和劑方治脾胃虛弱內挾風冷泄瀉注下水穀不化臍下㽲痛腹中雷鳴胸膈痞悶脅肋虛脹及積寒久痢腸滑不禁肢體羸困不進飲食木香當歸去蘆細焙肉豆蔻仁炮甘草爁丁香各二十兩赤石脂十兩附子去皮臍醋煮切片子焙乾十兩藿香葉先焙四十兩訶黎勒皮十五兩上為末每服一大錢水一盞半生薑三片棗一個煎六分空心溫服木香訶黎勒丸出聖濟總錄治洞泄大腹切痛腸鳴不化食訶黎勒煨生核三分木香半生半炒共二兩白朮炙肉桂去粗皮蕪荑炒各一兩半附子炮裂去皮臍厚朴去粗皮生薑汁炙焦各二兩良薑炒一兩甘草炙銼半兩乾薑炮一兩肉豆蔻去殼一兩上為末陳曲末煮糊為丸梧桐子大每服三十丸煨生薑鹽湯下肉豆蔻丸出聖濟總錄治脾胃虛寒洞泄注下腹脹腸鳴肉豆蔻五枚去殼木香一分蠍梢炒一分橘皮去白炒乾薑炮附子炮裂去皮臍胡椒各半兩上為末麵糊丸豌豆大每服十五丸米飲下黃連飲出聖濟總錄治脾寒洞泄黃連去須炒訶黎勒煨去核地榆芍藥炒各半兩木香當歸切焙各三分甘草炙二分上細銼每服五錢水一盞半煎至八分去滓溫服日三七棗湯出和劑方治脾胃虛弱內受寒氣泄瀉注下水穀不化腹脅脹滿臍腹㽲痛心下氣逆腹中虛鳴嘔吐噁心胸膈痞悶困倦少力不思飲食茴香去皮炒川烏炮去皮臍縮砂取仁各八兩益智去皮一斤乾薑炮四兩厚朴去粗皮薑製一斤上為粗末每服五錢水一大盞棗七枚同煎七分去渣溫服空心食前豆附丸一名桂香丸出和劑方治男婦腸胃虛弱內受風冷水穀不化泄瀉注下腹痛腸鳴手足逆冷服諸藥不效亦治臟腑虛為風濕寒所搏冷滑注下不禁老人虛人危篤服之肉豆蔻炮白茯苓焙附子炮去皮各四兩木香不見火乾薑炮肉桂去粗皮各二兩丁香不見火一兩上為細末薑汁麵糊丸梧桐子大每服五十丸至一百丸用薑湯下粥飲亦得空心食前一方或加訶子半兩一方不用木香茱萸斷下丸出危氏方治臟腑寒腹痛泄瀉不止甚效艾葉炒赤石脂川薑各半兩吳茱萸二兩半炒縮砂仁肉豆蔻附子炮去皮臍各一兩上為末麵糊丸梧桐子大每服五七十丸米飲食前下昔趙通判名從簡甲辰年丁母憂食素之久苦瀉日七行首尾幾年每服他藥不過三兩日復作後得此方而愈又數年間遇瀉服之即效二黃丸出聖濟總錄治洞泄寒中黃連去須炒黃柏去粗皮炙銼附子炮裂去皮臍烏梅肉炒乾薑炮各半兩甘草炙銼一兩上為末煉蜜丸梧桐子大每服二十丸至五十丸空心米飲下固腸散出直指方治脾胃虛弱內受寒氣泄瀉注下水穀不分冷熱不調下痢膿血赤少白多或如魚腦腸滑腹痛遍數頻並心腹脹滿食減少力宜並服之陳米炒二十兩木香不見火一兩肉豆蔻生用罌粟殼去蒂蓋蜜炙二兩乾薑炮甘草炙各二兩半上為細末每服二錢酒一盞生薑二片棗一枚煎至七分溫服不計時如不飲酒水煎亦得忌酒面魚鮮等物加味三建湯出危氏方治洞泄不止大川烏綿附天雄三味並炮鹽水浸去皮臍木香肉豆蔻炮裂訶子去核各一兩上銼散每服三錢生薑十片紅棗二枚鹽梅一個陳米一撮同煎空心熱服未效仍服來復丹溫中丸出聖濟總錄治脾胃虛寒洞泄不止四肢逆冷心腹㽲痛肉豆蔻仁硫黃研乾薑生用附子炮裂去皮臍龍骨上等分為細末麵糊丸梧桐子大每服三十丸食前艾葉湯下厚朴乾薑丸出聖濟總錄治脾胃虛冷洞泄不止厚朴去粗皮生薑汁炙三兩姜干炮二兩附子炮去皮臍白朮各一兩訶黎勒皮三兩上為細末醋煮麵糊丸如梧桐子大每服二十丸至三十丸空心食前熱米飲下日三烏梅丸出聖濟總錄治大腸洞泄水穀入即注下烏梅肉炒四兩附子炮去皮臍黃連去須炒五兩乾薑炮二兩肉豆蔻去殼五枚上為末煉蜜丸梧桐子大每服三十丸米飲下黃連阿膠湯出千金方治洞泄水穀注下亦治熱痢黃連去須阿膠炙燥烏梅肉炒各二兩山梔子仁三千枚黃柏去粗皮銼一兩上搗篩每服五錢水一盞半煎八分空心食前溫服日二附子丸出聖濟總錄治洞泄寒中注下水穀或痢赤白食入即出不消兼治膿血痢附子炮去皮臍烏梅肉炮干各一兩乾薑炮一兩半黃連去須炒二兩上為末煉蜜丸梧桐子大每服五十丸空心米飲下日晚再服如神散出聖濟總錄治洞泄不拘冷熱注下不止附子炮去皮臍白朮推碎用漿水煮半日焙乾各一兩甘草炙銼乾薑炮各半兩上為散每服一錢空心米飲調下如熱瀉新汲水調下天仙子丸出聖濟總錄治大腸洞泄不止天仙子乾薑炮陳橘皮湯浸去白焙各一兩訶黎勒一兩上為粗末用醋拌勻一宿炒令黃色再為細末醋煮麵糊和丸桐子大每服二十丸食前米飲下紅豆散一名玉粉散出衛生寶鑑方治洞泄寒中注下不禁不思飲食紅豆揀乾薑炮硫黃細研附子大者炮去皮臍各一兩上為散每服一錢空心溫粥飲下再服當愈豆蔻附子散出聖濟總錄治脾胃久寒大腸虛滑洞泄肉豆蔻仁麵包炮熟附子去皮臍銼鹽炒縮砂去皮各半兩木香半分上為散每服一錢食前米飲調下丁香散出王氏博濟方治脾胃冷洞泄丁香二錢厚朴去粗皮生薑汁炙半兩檳榔一枚炮銼肉豆蔻去殼二枚麵包炮熟上為末每服二錢熱粥飲調下一方粥飲煎三兩沸溫服以少許清粥飲送下黃連當歸湯出聖濟總錄治洞泄寒中水穀不化黃連去須當歸切焙甘草炙銼各二兩酸石榴皮銼炒四兩上搗篩每服五錢水一盞半煎八分去滓空心食前溫服豆蔻湯出聖濟總錄治洞泄不止肉豆蔻七枚去殼烏頭白朮各一兩上用油四兩先煎後二味俟白朮黃色烏頭外裂里黃取出烏頭去皮臍入肉豆蔻三味銼如麻豆每服三錢水一盞煎八分去滓空心食前稍熱服大輪散出聖濟總錄治脾胃氣寒大腸虛滑日夜不止木香丸出本草方治氣冷下瀉木香半兩川烏一兩生上為末醋糊丸桐子大陳皮湯下三五十丸來復丹出德生堂治配類二氣均調陰陽奪天地衝和之氣乃水火既濟之功可冷可熱可急可緩補損扶虛善理營衛養心腎上實下虛氣悶痰心腹疼冷臟腑虛滑不拘男女老幼危急但有胃氣無不獲安硫黃用甘草熬水酒潤細研硝石細研用厚朴水酒潤各半兩上和勻一處同淹少時用砂銚於文武火上炒令交構氤氳相結取出埋土中去毒氣卻碾為末用糯米糊為丸如黃豆大每服三五十丸濃米湯空心服治卒暴冷下下部疼痛用燒磚令熱大酢沃之三重布覆坐上即瘥附子湯出聖濟總錄治洞泄不止兼治霍亂用附子一枚重七錢炮去皮臍細切分二服每服水一盞鹽半錢煎至六分去滓溫服健脾湯一名健脾散出聖濟總錄治寒中洞泄不止及年高久瀉洞泄方出直指方用車前子末米飲下朮附湯出直指方治洞泄白朮蒼朮各二兩芍藥三兩茯苓四兩附子乾薑各一兩上為粗末每服五錢水二盞煎至一盞去滓溫服朮附丸出指南方白朮附子各一兩橘皮各二兩上為粗末煉蜜丸梧桐子大每服三十丸米飲下姜附湯出指南方治陰寒暴下乾薑三兩附子三分甘草一兩上㕮咀每服五錢水二盞煎至一盞去滓溫服金液丹出指南方用好硫黃一斤研用一瓷瓶內盛令七分滿以瓦子蓋口通用鹽泥固濟曬乾用磚砌作爐中心掘地安一罐子合口與瓶底相當滿盛水去口一指許坐藥瓶在上將熱炭火下在爐內蓋藥罐子可厚三五寸每日用炭一斤簇著瓶卻以熱炭連大蓋子更用磚蓋爐子如此七伏時撥去候打開色赤黃為上其滓石盡澄在下刮去細研為末以浸蒸餅丸如梧桐子大每服五十丸至百丸空心米飲下白食不消者為寒不療方出肘後方黃連一兩甘草炙附子炮阿膠炙各半兩上水三升煮一升分為再服附子赤石脂丸出楊氏家藏方治老人虛人腸胃虛寒洞泄不禁附子炮去皮臍取末一兩赤石脂研細一兩上件拌勻醋煮麵糊為丸梧桐子大每服五十丸食前溫米飲下姜樸丸出鮑氏方治中寒洞泄乾薑厚朴等分上為末蜜丸梧子大任下三十丸樸附丸出朱氏集驗方厚腸胃止寒泄助元氣進飲食兼治脾腎氣弱手足浮腫川椒去目茴香各二兩青鹽一兩附子四兩去皮生用切作片子生厚朴生薑各四兩上用水三升於銀器內慢火煮水盡為度焙乾為末煮糊為丸蒜煮壯脾丸出朱氏集驗方厚朴蒼朮白茯苓各二兩陳皮七錢甘草二錢半訶子一兩附子川烏各一兩生薑半斤棗子五十枚大蒜十個去皮煮爛上細末神麯和丸每服百十丸空心米飲鹽湯任下諸痢附論夫一切痢者謂痢無定或水穀或膿或血或青或黃或赤或白變雜無常或雜色相兼而痢也夾熱則黃赤熱甚則變膿血也冷則白冷甚則青黑皆由飲食不節冷熱不調胃氣虛弱故變色也治痢要訣痢出於積滯積物積也滯氣滯也物積欲出氣滯而不與之出所以下墜裡急乍起乍止日夜凡百餘度病家所請莫不求其止孰知物積氣滯有如是之證耶世人但見有上項證候不論色之赤白脈之大小一皆通利行之物積用巴豆大黃輩氣滯用枳殼桔梗青皮蓬朮輩二者兼濟必能收功其間佐以黃連阿膠丸效驗尤著者蓋痢疾多因人伏暑食熱酒面炙煿醞釀而成其阿膠尤大腸之要藥有熱毒留滯則能疏導無熱毒留滯則能平胃市肆或無丸子即以阿膠當歸青皮赤茯苓黃連作劑入烏梅濃蜜同煎最能盪滌惡穢積滯既去遍數自疏嗣是卻以木香茯苓縮砂白豆蔻陳皮甘草調之自然喜食食則糟粕入於大腸然後真人養臟湯易簡斷下湯可止方增損建脾丸出千金方治丈夫虛勞五臟六腑傷敗受冷初作滯下久則變五色赤黑如爛腸極臭穢羸瘦身重胃冷飲食不消泄瀉不止鍾乳粉三兩赤石脂三兩礬石乾薑蓯蓉桂心五味子澤瀉遠志寄生柏子仁白頭翁人參天雄當歸石斛石榴皮牡蠣龍骨甘草各二兩上為末蜜丸酒服二十丸加至三四十丸此一方止痢神效水煮木香丸出御藥院方治脾胃受濕臟腑滑瀉腹疼痛日夜無度腸鳴水聲每欲痢時裡急後重或下赤黃或便膿血也並宜服之木香去須丁香訶子皮當歸藿香葉黃連生薑制各一兩厚朴青皮去白白芍藥陳皮去白甘草炙枳實麩炒乾薑炮各半兩乳香肉豆蔻砂仁各一兩半御米殼蜜水拌炒黃色六兩上為細末煉蜜丸彈子大每一丸水一大盞煎至七分和滓稍熱食前服治痢仙方歌曰八痢臨終事可危仙方等分與君醫三香止痛尤為妙四白和中不可虧甘枳更加罌粟殼訶榆全藉石榴皮半夏厚朴黃連橘救苦端教在片時丁香沉香木香白朮白芷白茯苓白芍藥甘草枳殼訶子地榆酸石榴皮半夏厚朴黃連陳皮罌粟殼蜜炙上各一錢作五服白加生薑煎赤加烏梅煎諸痢患無新舊如藥療之暫瘥還發此即縱以新藥止之終存其根本由腸胃中冷熱不調病根固結必須湯藥滌之以泄病勢痢後更以藥物補助之有此候者依後附子等六味湯以利之後服高良薑十味散以補之附子炮細辛甘草炙人參各二兩乾薑三兩大黃五兩上切以水七升煮取二升四合去滓分三服溫服如人行十里久一服此方當得快利痢中有惡物如魚腦狀或如桃李但異於常切勿怪之將息經三四日宜合後高良薑等十味散補之高良薑細辛黃耆白朮苦參各五兩丁香二兩人參乾薑各四兩豆蔻子三兩赤石脂六兩上藥為散以米飲下之初服一方寸匕日再服之稍加至二三忌生菜桃李雀肉等神應散出危氏方治痢緊嚴絕妙金罌草梗肉豆蔻訶子地榆甘草罌粟殼去蒂萼當歸去尾茯苓白朮枳殼去瓤烏梅各一兩丁皮木香住痛各五錢陳皮一兩取紅生血若紅痢不用上為丸五色痢用春茶陳皮煎湯下如是末是用蜜一匙春茶烏梅煎服加減木香煮散出危氏方治一切痢神效木香甘草當歸肉豆蔻人參官桂芍藥訶子烏梅去核阿膠蚌粉炒白茯苓各五錢罌粟殼一兩半去蒂蜜炒上銼散每服四錢水一盞半生薑三片紅棗二枚同煎去滓空心服大斷下丸治下痢滑數肌肉消瘦飲食不入脈細皮寒氣少不能言有時發虛汗由脾胃虛耗耗則氣奪由穀氣不入胃胃無主以養故形氣消索五臟之液不收謂之五虛此為難治要能食者生及臟腑停寒臍腹㽲痛附子炮肉豆蔻麵包煨牡蠣煅秤各一兩細辛去土蒂七錢半乾薑炮白龍骨研赤石脂研酸石榴皮醋煮乾為度焙乾各一兩半高良薑去蘆一兩半白礬枯訶子去核各一兩上為末醋糊丸梧桐子大每服三十丸粟米湯下一方白湯下無白礬訶子加減平胃散白朮厚朴陳皮各一兩甘草七錢檳榔木香各一兩半桃仁黃連人參阿膠白茯苓各半兩上為細末同平胃散煎服如血多加桃仁如熱泄加黃連如小便澀加茯苓如氣不下後重加檳榔如膿加阿膠如腹痛加芍藥甘草如濕多加白朮如脈洪加大黃四時以胃氣為本久下血則脾胃虛損血不流於四肢入於胃以致血痢治痢如聖散治一切痢疾無問久新或赤或白或赤白相雜日夜無度悉能治之紹熙壬子浙東提舉黃郎中施此藥頗有效驗當歸地榆縮砂仁赤石脂陳皮甘草乾薑訶子肉石榴皮罌粟殼各等分上為粗末三錢重作一服水一盞入烏梅一個煎至七分去滓赤痢冷服白痢熱服赤白痢溫服年高娠婦小兒皆可服忌生冷油膩等物斷痢湯治胸心下伏水半夏一升生薑五兩茯苓甘草龍骨各一兩附子一兩人參黃連各三兩大棗十二枚上㕮咀以水八升煮取三升分三服治諸痢及赤白痢不瘥羸瘦用鼠尾草煮汁服亦可將粥飲調下一方赤下用赤花白下用白花尤佳治痢方用生雞子一個連紙一幅烏梅十個有肉者取雞子白攤遍連紙日乾折作四重包撮烏梅安熨斗中用白炭火燒乘煙將盡時以碗蓋覆候冷研令極細入水銀粉少許和勻如大人患分為二服小兒分為三服不拘赤白痢空心井花水調服如覺臟腑微有疏利便不需要再服元青丸治下痢勢惡頻並窘痛或久不愈諸藥不能止須可下之以開除濕熱痞悶積滯而使氣液宣行者宜以通之兼宣利積黃瘦中滿水腫腹脹兼治小兒驚疳積熱乳癖諸症唯泄瀉者勿服黃連去須黃柏大黃甘遂芫花醋拌炒大戟各半兩牽牛四兩取末二兩以上同細末輕粉二錢青黛一兩上為末勻水丸小豆大初服十丸後每服加十丸空腹日午臨臥三服以通利為度後常服十五二十丸數日後得食久病未瘥除者再加取利利後卻常服以意消息病去為度後隨症用之小兒丸如黍米大或麻子大退疳驚熱積不須下者常服十丸昔一人常用頗能清利頭目寬膈美食使髭鬚遲白久用亦能黑髭鬢固牙齒使遲老氣華於面而手足陽明經恰貫注之憂思則氣結而血液不行燥熱拂鬱而血衰不能榮養故早蒼黃鬢白此藥能使陽明氣血宜通效輕粉粉霜硇砂另研雄黃研硃砂信砒巴豆去皮各一錢黃丹三錢蠟三錢上先研粉霜次旋入硇砂研細下雄黃硃砂信砒再研下丹粉研勻別研巴豆爛為油與前藥研勻近火上炙控熱別研蠟軟入藥勻搓作劑旋丸小豆大新水下一丸小兒黍米大或止吐瀉痢疾調桂苓甘露散或益元散亦得秘方養臟湯治五色痢經驗陳皮去白枳殼去瓤黃連去須南木香烏梅去核各五錢罌粟殼去蒂膜蜜炙一兩厚朴去粗皮薑汁炙杏仁去皮尖甘草各五錢上銼散五色痢黑豆棗子煎服紅痢生地黃春茶甘草節煎服五色久不效加龍骨赤石脂人參芍藥一兩為末蜜丸烏梅甘草湯下粟米飲亦可乳香散治痢疾重者數服止人參白朮當歸地榆阿膠各一兩蚌粉炒黃甘草各一錢乳香少許肉豆蔻二枚麵裹煨上銼散每服三錢以水一盞煎七分去滓溫服仍兼服來復丹地榆散治大人小兒脾胃氣虛冷熱不調下痢膿血赤多白少或因腸胃乘虛為熱毒所滲下痢純血臍腹㽲痛裡急後重口燥煩渴小便不利純下鮮血或先經下痢不應服熱藥而誤服熱藥蘊毒不散積於腸間滲而成血者並宜服之地榆炒乾葛各半斤茯苓去皮赤茯苓各六兩乾薑炮二兩當歸去苗三兩甘草炙四兩罌粟殼蜜炙十二兩上為末每服二錢用溫熟水調下不拘時小兒三歲可服半錢更量歲數加減與之若下痢純白或下紫黑血腸滑不禁者不可服黑虎丹治痢疾不止者用十二月殺的豬膽可收一百之上將雄黃豆裝入膽內麝香少許陰乾看人大小每服五七粒為細末如紅痢甘草湯下如白痢生薑湯下獨神丸治一切赤白痢不問新久百藥不效者一名獨聖丸用罌粟殼十兩分作三分一分生用去蒂萼及瓤一分醋炒一分蜜炙為末用蜜丸小指頭大紅痢生地黃春茶煎湯嚼下白痢烏梅甘草節但為末二錢陳米鹽梅湯亦效一方姜煎一方用米醋一盞且炙且蘸候盡色黃為度焙乾研為末煉蜜丸彈子大每服一丸水一盞入生薑如指面大一塊捶破煎八分通口服樗白皮散治下痢諸藥不效用樗白皮一握粳米五十粒蔥白一握甘草一二寸豉二合水一升煎取半升頓服小兒量大小加減陟釐丸治百病下痢及傷寒身熱頭痛目赤四肢煩疼不解協熱下痢或醫已吐下之腹內虛熱煩欲得冷飲食不能消腹中急痛溫食則吐乍熱乍冷狀如瘟瘧或小便不利氣滿嘔逆下痢不止水中陟釐五兩厚朴一兩漢中木防己六兩黃連二兩隴西當歸四兩紫石英三兩三歲醇苦酒五升上好豉三升上皆取真新者以苦酒二升漬防己極令潤出之留苦酒置以利刀切防己厚令一分使厚薄悉等以板瓦覆著炭火上以厚紙藉瓦上布滿取防己以著紙上訖從頭依次翻周而復始令色槁燥復漬向余苦酒中更出著瓦上熬之如此盡苦酒止勿令火猛徐徐熬令極燥各搗下篩畢都合搗千杵以餘三升苦酒漬豉一宿明旦以瓦盆盛之以一盆覆之蒸五升上下須火氣通流熱出之於盆中研豉以新布絞取濃汁如棗膏法以和藥搗三千杵頃為丸皆如水中雞頭子大分著數囊中懸令陰乾取燥乃更盛著函以蠟蜜封其際勿令見風塵此藥三丸為一劑平旦井花水服一劑晝服一劑暮服一劑皆水服之初服宜少食當於未食前服藥若飲食消腹中調和者日可一服若已瘥三二日可一服消息以意若病重藥力未行者但益服之日可四五劑或時下不止者當復更增令腹中有藥力飲食消是其效也新服藥未安調當水飧助藥力心中瞭然後可作羹臛但當冷食之耳若有時不喜冷食者正是藥力盡耳復益服藥至一宿許則復欲盡冷也若欲不復藥者但稍溫食藥力自盡矣服藥不必強多飲水自隨體調耳久虛服之如法禁熱食生魚肉蒜生菜酒緣酒力發藥力令病者煩熱也又禁腥物及諸肥膩難消物皆莫食若有風病加防風一兩人虛可加石斛一兩若宿有下痢脾胃損弱者可加太一餘糧二兩半取石中黃軟者若婦人產後疾加硫黃二兩小便黃赤不利加蒲黃一兩依方消息之無不得效胡洽云舊有五石赤石脂白石英鍾乳礬石並禹餘糧石各四兩常以二目合之泊宅編云姚祐自殿監邊入座母夫人病痢諸藥不效令李昂筮甄革有真人指靈草語之一日登對上訝其色悴具以實奏詔賜一散子數服而愈久乃知椿莢子一味為末耳余撿本草椿莢主大便下血今處處有之夏中生莢樗之有花者無莢有莢者無花常見生樗上未見椿有莢者然世俗不辨椿樗之異故俗中皆以此為椿莢其實樗莢耳注云樗皮主再痢日華子云樗皮溫無毒止瀉及腳風入藥時用蜜炙藥性論云樗白皮之性號微熱無毒能治赤白痢腸滑痔疾瀉血不止下白利或血治大人丹痢出本草用紅蜀葵葉搗汁服之若恐腹痛即暖飲之白馬骨出本草治水痢以白馬骨莖葉煮汁服主水痢不問冷熱出本草取松楊皮濃煎令黑冷服一升瘥治水痢出本草治水痢後渴不止出本草以赤瓜實汁服之治水痢出本草以葎草煮汁及生汁服之澀腹止瀉出本草以橡斗子煮食之亦可止瀉主水痢出本草以探子生食之九盞湯出本草主下痢不問冷熱赤白略帶休息久下悉主之以黃連長三寸三十枚秤重一兩半龍骨如棋子四枚重四分附子大者一枚姜一兩半並切先以水五合著銅器中去火三寸煎沸便下著生土上沸止又添水五合如此九上九下內諸藥著火上沸輒下著土上沸止又復九上九下度可得一升頓服即止張仲景治痢紫參湯出本草用紫參半斤甘草二兩以水五升內紫參甘草煎取半升分溫作三服斷下藥以酸石榴皮須老木所結及陳久者微炙為末以燒粟米飯為丸梧桐子大食前熱米飲下三十至五十丸以知為度如寒滑加附子赤石脂各一倍治下痢心胸滿脹不快腹中雷鳴或嘔吐方黃連橘皮甘草各二兩龍骨生薑半夏各三兩人參大棗十五枚上搗以水一斗先煮一大沸內藥煮取三升分四服並妊娠良阿膠梅連丸治下痢不問久新赤白青黑疼痛諸症金井阿膠淨草灰炒透明白別研不細者再炒研細烏梅肉去核炒黃柏銼炒黃連當歸焙赤芍藥乾薑炮赤茯苓各半兩上為末入阿膠研勻水丸桐子大溫米飲下十丸食前夜五六服小兒丸如綠豆大忌油膩物痢藥乳香散白梅一兩燒灰棗子一兩燒灰罌粟殼一兩燒灰訶子半兩燒灰上為細末每服三錢水一小盞乳香黑豆大一塊同煎七分不拘時溫服治痢方用蠟茶細末不拘多少白梅和丸赤痢甘草湯下白痢烏梅湯下泄瀉不止陳米飲下每服二十丸團茶尤佳大凡痢疾不問赤白當先辨冷熱之異若手足和暖則為陽當先服五苓散粟米飲調下次服感應丸二十粒即愈若手足厥冷則為陰當服暖藥如已寒丸附子湯之類如此治痢無不效有人夏月患痢一日六七十行用五苓散立效木香散治痢疾腹痛南木香五錢地榆一兩黃連七錢青皮去瓤赤芍藥枳殼煨去瓤乳香甘草各五錢上為末每服二錢熱湯調服酸石榴皮散治一切痢不問赤白或一日之間一二百行一服便疏再二三服即愈石榴皮陳皮甘草川當歸罌粟殼去蒂瓤各半兩銼散水用十盞煎取三盞次用下藥茯苓七錢粉草七錢北五味子七枚一作棗子上為末將前藥汁入此三味再煎五七沸去滓空心服甚者不過兩劑輕者一劑立效治痢如神烏梅七個楮實子七個甘草七寸杏仁七枚米殼七個雄黃豆四十粒棗十個生薑七片上㕮咀水煎無時服治一切痢諸治無效宜服此藥巴豆五七枚去皮心研紙裹壓出油桃仁二十枚去雙仁湯浸去皮尖麩炒黃杏仁二十枚去雙仁湯浸去皮尖麩炒令黃硃砂一分硫黃一分砒霜一分麝香半錢上同研令細用軟飯和丸綠豆大每服以粥飲下三丸忌食熱物遇仙立效散治諸般惡痢或赤或白或濃淡相雜裡急後重臍腹絞痛或下五色或如魚腦日夜無度或噤口不食不問大人小兒虛弱老人產婦並宜服此御米殼去蒂蓋炒黃川當歸洗甘草各二兩赤芍藥酸石榴皮地榆上為粗散每服三錢水一盞半煎七分去渣空心溫服小兒量歲數加減以瘥為度忌生冷油膩腥臊等物一方赤茯苓北棗等分黑豆散小黑豆炒川楝子烏梅甘草乾薑罌粟殼三個去蒂瓤上銼散煎七分將紗濾過澄自然汁空腹服治大人小兒痢疾胡椒甘草米殼蔥白干棗杏仁竹葉七片上㕮咀水煎服之神效又方治暑毒濕氣下痢上用雄黃一味干蒸研為末甘草煎湯調服即效如聖飲治痢檳榔半兩大附子半兩甘草半兩地榆半兩陳橘皮二錢去白上為粗末每服半兩作一服水一盞半紫蘇莖舊者一二寸煎至一盞空心食前熱服留渣再煎如瀉不止必多服屢試皆效救命延年男婦一切重痢黃連六兩乾薑川當歸阿膠各三兩上為末米醋煮阿膠令消盡量藥多少令醋恰好不可剩將藥末搜醋丸梧桐子大每服二十丸飯飲吞下駐馬丸主救命延年治男婦一切重痢消食止痢令人強健及服食未能斷谷者以橡斗子啖之蓋橡斗子非果殼而最益人氣無氣而受氣無味而受味常服最佳平補散治痢後不止手足冷此藥補之溫脾正氣白朮甘草陳皮各二錢茯苓木香各一錢肉豆蔻三枚煨上為末服煎藥後則可服鹽湯下一錢日三四服痢止手足溫食進卻住服金粟湯治男婦室女小兒一切下痢不問新久冷熱不調日夜無度臍腹絞痛即痢肢體困倦小便閉澀不思飲食漸瘦又治傷生冷脾胃虛弱飲食不消腹脹腸鳴泄瀉不止連月不瘥並宜服之陳皮去白一兩一分車前子炒四兩乾薑炮二兩甘草炒罌粟殼去瓤蒂蜜炒各半斤上為末每服二錢水一盞棗一個姜二片煎七分空心食前稍熱服或飯飲調下亦得忌生冷油膩魚鮓醬等物治痢疾黃連巴豆去殼各二兩上和炒赤色分揀各另研為末以綠豆打糊為丸粟米大作記認二處各自安頓巴豆末作一處為丸黃連末別作為丸白痢黃連丸二十粒米湯或米泔下赤痢用巴豆丸二十粒井水下黃連丸一名黃連阿膠丸療痢無問冷熱並主之犀角丸但是痢服之無不效犀角屑取黑色紋理粗者鏟後秤佳宣府黃連金川黃柏赤色緊薄者苦參多買輕搗川當歸五物取粉上等分別搗搗了秤和為散空腹爛煮糯米飲和一寸匕服之日再忌黏滑生菜油膩腸風黑散治營衛氣虛風邪冷氣進襲臟腑之內或食生冷或啖炙煿或飲酒過度積熱腸間致使腸胃虛弱糟粕不聚大便鮮血臍腹疼痛裡急後重或肛門脫出或久患酒痢大便頻並並皆療之敗棕燒木饅頭燒烏梅去核甘草炙各二兩上為細末每服二錢水二盞煎至一盞空心溫服治痢紫菀桔梗赤芍藥白朮以上各等分上為細末每服三五錢細切羊肝拌之作面角兒燒服之白湯送下食前蒼朮芍藥湯治痢疾痛甚者蒼朮一兩芍藥一兩黃芩桂各五錢上銼每服一兩水煎訶子散如腹痛漸已泄下微少宜止之訶子皮一兩生熟各半木香半兩黃連三錢甘草炙各二錢上為細末每服二錢以白朮芍藥湯調下如止之不已乃內有餘邪訶子散內加厚朴一兩竭其邪氣也若泄久不愈者多為傳變痢疾太陰傳至少陰是為鬼邪先以厚朴枳實湯防其大變黃連阿膠湯治毒痢及腸蠱注下血如豚肝心煩腹痛又脈或大或小浮焰而起下血如豚肝五內切痛此或因服五石湯丸逼損氣甚則血自百脈經絡而來注下甚蠱毒此為難治阿膠一兩炒黃連二兩黃柏一兩炒梔子仁半兩上為粗末每服四錢用水一盞煎七分去滓服不拘時聖棗子出醫方集成治一切下痢臍腹㽲痛木香一錢半乳香別研沒藥別研各一錢肉豆蔻二枚麵裹煨上為末每服一錢大幹棗一枚去核先入一半藥末在內次用水浸巴豆半粒再入藥末半錢合定用油餅紙裹一指厚火煨面熱為度去面巴豆不用則細嚼棗藥空心米飲下一方用乳香一兩研肉豆蔻二兩煨作末陳米糊丸效豬肝丸出千金方治下痢腸滑飲食及服藥俱完出者豬肝一斤熬干黃連烏梅肉阿膠各二兩胡椒如棋子大上為末蜜丸梧桐子大酒服二十丸日三亦可為散調服方寸匕郁子丸出危氏方治痢後風手足不能屈伸或麻痘症變手足筋急亦能治之郁李仁枳殼川獨活鱉甲醋炙黃上等分為末木瓜湯調下治一切痢有效出聖惠方寒水石一分附子一分炮去皮為末砒霜一分定粉一分上都研粉以水浸蒸餅和丸如黍米大每服三丸不拘時以新汲水下忌食熱物又方出聖惠方硃砂二兩硫黃一兩砒霜半兩黃丹一兩微炒上件細研如粉水浸蒸餅和丸桐子大每服以冷飲下一丸忌食熱物又方出聖惠方巴豆十枚去皮心出油硫黃三分硃砂三分上為細末研如粉以麵糊和丸綠豆大每服以新汲水下二丸忌食熱物又方出聖惠方白礬一兩燒灰硃砂半兩麝香半錢上都研如粉糯米飯和丸如黃豆大每服不計時以二宜湯下十丸又方出聖惠方巴豆七枚去皮心出油深色胭脂二錢上先研巴豆為末次入胭脂同研令細煮棗肉和丸黍米大每服以冷飲下三丸小兒一丸忌食熱物黃丸子出醫方大成止諸痢黃連八兩枳殼四兩大黃柏皮四兩上為末麵糊為丸空心飲湯下如裡急後重加枳殼湯下參附湯出危氏方人參綿附炮去皮臍肉豆蔻微火煨裂上銼散每服二錢水一盞半生薑七片棗二枚煎食前服治痢緊嚴絕妙金櫻花葉及子罌粟殼去瓤及蒂萼醋炒上為末用蜜丸手指頭大五花痢用春茶陳皮煎湯如痢用蜜一匙春茶烏梅煎湯服下香茸丸出危氏方治下痢危困氣血衰弱麝香半錢別研臨時入鹿茸燎去皮毛酥炙一兩上鹿茸為末再入麝香以燈心煮棗肉為丸梧桐子大每服五十丸空心食前用米飲下若再添入乳香半兩尤有效楊梅方和五臟能滌腸胃除熱潰氣切不可多食甚能損齒及筋亦能治痢用楊梅燒灰服之獨聖丸治痢上用川烏頭一個好者柴炭火燒煙欲盡取置地上盞子合良久細研用酒蠟丸大如麻子每服三丸若赤痢用黃連甘草黑豆煎湯冷吞下如白用黑豆甘草煎湯放冷吞下如瀉及肚疼水吞下每於空心服之忌熱物治癆痢及癥瘕甚效用羊腎合脂為羹以蒜韭食脂一升甚驗治下痢用小麥炒粉一合和服斷治痢藥出百一選方用罌粟殼並去核鼠查子各數枚焙乾為末米飲下治噤口痢鼠查子即糖球百水散出百一選方治一切痢不問赤白或一日之間一二百行只一服便疏再三服即愈魏不伐方罌粟殼三斤去皮上下蒂頂隔銼成片子蜜炒令赤色淨秤厚朴三斤去粗皮淨炒用生薑汁淹一宿炙令薑汁盡為度上為細末每服二三錢米飲調下忌生冷油膩魚酥毒物三日三神丹治痢疾濟世丹治痢疾巴豆七枚去殼膜丁香四十二個胡椒四十二枚上藥為末糯米和丸綠豆大每服一丸赤米飲下白薑湯下赤白姜飲湯送下男婦皆可小者小丸一方各用一百三十三個赤痢蜜湯下白痢赤砂糖湯下痢疾藥黃柏一兩用蜜炙透巴豆肉三錢不去油上為末滴水為丸梧桐子大每服三丸赤甘草湯下白薑湯下小兒一丸心痛艾醋湯熱服氣噎薄荷湯下治千百種雜下出肘後方黃連三兩烏梅四十枚上以水八升煮取四升停冷內雞子白一枚攪調又煎取二升分為三服一方下痢熱諸治不瘥為末蜜丸桐子大每服二十丸日三夜一薑茶治痢法出危氏方治赤白冷熱諸痢及暑毒食毒治痢下腹痛肚熱手不可近用老生薑切如豆許與茶葉等分用新汲水煎一服一方如白痢用蜜赤痢用姜未效服真人養臟湯加芍藥當歸立止若熱痢即留姜皮冷即去皮大妙治痢一名沙調散出經驗良方用臘茶不拘多少新舊細研如赤痢用蜜同水煎白痢用連皮姜研自然汁同水煎每水一盞煎半盞空心服二服即愈經驗方用臘茶二錢湯點七分傾一蛤蜊殼生麻油在內攪勻空心服之須臾腹痛大下即止予少年親服之作效真方聖散子治男婦脾胃受濕中脘停寒吃物頻傷心胸滿悶脅肋膨脹腸鳴虛痞小腹堅痛臍下強急或大便不調水穀遲化裡急後重下痢膿血或五色或便如魚腦或如豆汁或有鮮血或如爛肉日夜無度久不愈嗜臥怠惰虛瘦肢體沉重寒熱時作此藥固養脾胃溫中止腹痛服之有效御米殼五兩搗碎醋炙黃色甘草炙黃赤石脂烏魚骨去皮肉豆蔻麵包煨去面揀丁香訶子皮乾薑炮各二兩上為末每服先用水一盞入乳香少許煎七分沸調藥末二錢和滓食前熱服治痢疾用臘月雀兒割開腸肚皮共毛全去皮巴豆一個放在內到沙石罐內盛頓炭火燒作黑研細另用好酒煮黃臘百十沸將蠟取出磁盞內化開黃蠟即與雀兒末一處為丸每服一二十丸不拘時候如紅痢甘草湯下白痢乾薑湯下花紅痢甘草乾薑湯下蘹香子方治瘴痢渾身熱連背項用茴香子搗取汁服治痢亦治瀉血用芫荽子一合搗碎赤者用糖水調白者用生薑自然汁調溫服一方酒調服又方用砂糖水雜椒作料等物將烏龜去殼爛煮食之以多為度即愈交和散治痢用御米殼去隔蒂乾淨安排新瓦上炙焦黃為末次入平胃散如赤則用御米殼末二錢白則用平胃散二分和飲湯調下治暑痢用五苓散粳米煎湯送下消暑丸治痢用杜蒺藜炒為末酒調二三服楮實方治瘴痢無問老少日夜百餘度者取干楮葉三兩熬搗為末煎烏梅湯服下方寸匕又兼取羊豬里膜內殼道痢出即止治疳痢方取樗根搗絞汁一雞子殼許和粟米泔一雞子殼許服以知為度效驗如神小兒加減用之治痢用黃丹不拘多少熔黃蠟和劑為丸豌豆大每服三丸赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾姜兼用之一方治痢東榆西柳樹南桃塞北云桑節節高此是周公出行法萬兩黃金也不消治卒下痢多驗方用韭葉煮鯽魚鮓食之治暴痢方用小鯉魚一尾燒為末米飲服之大人小兒俱服得一方鯉魚去鱗紙裹火煨煮粥飲下又方用搗蒜兩足下貼之
