body:
  text: 卷六十九牙齒門齒風腫痛附論齒風腫痛者齒根虛浮牙齒疼痛或遇呼吸風冷其痛甚愈則齦槽腫赤乃至動搖此蓋手陽明經虛風客其脈流注齒間故為齒風腫之患也夫手陽明之支脈入於齒齒是骨之所終髓之所養若風冷客於經絡傷於骨髓冷氣入齒根則齒痛也若蟲蝕齒而痛者齒根有孔穴蟲在其間則針灸不瘥若敷藥則蟲死其痛乃止也方雄黃丸治風齒腫痛雄黃丹砂麝香桂檳榔鹿茸乾薑防風天南星黃耆白茯苓半夏白附子白殭蠶附子各一分上為末煉蜜和丸如梧桐子大每用十丸空心酒下胡桐淚散治手陽明經虛風熱所襲敷流齒牙攻注齦內則至腫結妨悶甚者與齦間津液相搏化為膿汁宜服此藥胡桐淚石膽黃礬蘆薈各半兩硃砂細辛當歸牛膝川芎各二錢半亂頭髮灰麝香各一錢川升麻半兩上為細末先以甘草湯漱口後用藥少許敷之如常用少許揩齒去風退熱消腫化毒牢牙永無宣露血疳之疾清上防風散治上焦不利風熱攻衝氣血鬱滯牙齒悶痛肉虛腫鼻塞聲重頭昏目眩並皆治之防風細辛薄荷葉各一兩川芎獨活荊芥天麻甘草白檀香白芷各半兩片腦子一錢上同為末入腦子再研勻細每服二錢淡茶清調勻稍熱漱冷吐不計時候如覺頭昏目牙齒腫悶用熱清茶調三錢食後服亦得細辛散治久患風牙疼痛疳䘌細辛羌活藁本當歸附子牛膝木香甘草各半兩皂莢礬石各少許上為散常用揩牙永瘥升麻散治陽明經有熱攻注牙齒腫痛疏風毒升麻細辛防己枳殼各一兩羌活大腹子郁李仁大黃牽牛麻仁各三兩上為末煉蜜和丸如梧桐子大每服三十丸食前溫酒下地黃散治風熱攻注陽明齒痛齦腫或血出宣露地黃防風細辛薄荷葉地骨皮藁本各一兩蘭草葉荊芥穗當歸各半兩上為粗末用四錢水一盞半煎一盞去滓微熱漱口冷即吐不拘時地骨皮湯治牙齒風腫地骨皮白楊皮細辛各一兩鹽二錢蒼耳生地黃蜀椒杏仁二十枚上為粗末每服五錢以水一盞半煎入地黃汁半合煎至一盞去滓熱漱冷吐日三五度酒煎亦佳白礬湯治齒痛風腫搖動發作不時兼蛀牙白礬乾薑蘆薈蛇床子各一兩甘草細辛各半兩蜀椒防風半兩上搗篩每用二錢以酒一盞調勻煎三五沸熱漱冷吐落盡欲令生含漱一日日不食鹽則生甚良一方加附子半兩升麻湯治一切風齒疼痛升麻細辛甘草防風露蜂房甘松各一兩地骨皮雞蘇葉四兩上為粗末每服三錢水一盞同煎七分溫漱冷吐應痛散治陽明有風熱攻注牙齒疼痛細辛白芷升麻各三錢南硼砂川芎鉛白霜龍腦各一錢麝香半錢上為細末頻擦牙痛處吐津誤咽無妨不拘時候莽草散治風壅熱氣上攻齒齦浮腫或連頰宣痛或宣露血出莽草川升麻柳枝槐角子鶴蝨地骨皮藁本槐白皮各等分上㕮咀每服一兩水一碗入鹽少許煎七分去滓熱含冷吐日三次升麻地黃散治風氣上攻牙齒疼痛齦腫連腮頰緊急升麻生地黃地骨皮青鹽川芎各半兩皂角細辛槐角子半兩上為細末少許揩齦上有涎吐了誤咽不妨雄黃散治諸般風腫牙疼雄黃細辛青鹽石膏良薑蓽茇麝香胡椒各等分上為極細末早晚擦於牙上漱三五次吐了再擦其痛處即止蜀椒散治牙疼及頭牙齦風腫口急不開面目虛腫蒴藋五兩蜀椒一兩吳茱萸獨活烏賊魚骨桃膠各一兩桂心半兩酒一合上切以水二升煮取八合投蒴藋汁及酒更煎取一小升去滓含之就病處日三以瘥為度附子湯治牙齒風痛不得眠睡附子防風細辛獨活甘草各三分莽草芎藭半兩上為粗末用五錢水二盞煎十餘沸去滓熱漱冷吐日三五度蜀椒湯治頭面風口齒疼痛不可忍蜀椒莽草雀李根獨活各二兩錢細辛芎藭防風各一兩上㕮咀以酒二三升半煮三五沸去滓含之冷吐更含之勿咽汁一方有白朮無蜀椒如齒齦間血出用生雀血塗之便愈白芷升麻散治風牙疼痛及齒齦腫硬不消川芎升麻藁本石膏白芷各一兩細辛六錢皂角一兩上為末紗羅三度每用刷牙蘸藥少許刷牙用溫水漱小至寶丸治風牙病荊芥防風何首烏威靈仁蔓荊子菖蒲苦參各三兩上為細末煉蜜為丸如彈子大每服一丸細嚼茶酒送下驅風散治風牙疼細辛草烏各一兩蠍梢五錢荊芥穗防風各一兩半升麻半兩沒石子一兩上為末擦患處莽草散治風牙痛莽草一兩白芷三分細辛一兩半芎藭半兩升麻一兩荊芥穗一兩半上為散揩齒良久以鹽湯漱口香芎湯治骨槽風壅齒痛不可忍或牙齒動搖並口內生瘡者芎藭羌活細辛防風莽草郁李仁各半兩上為粗末每五錢以水一盞半煎三五沸熱漱冷吐之立妙一方有桃李仁治風蚛牙疼不可忍者白芥子胡椒白殭蠶草烏頭七枚乾蠍七枚乳香一塊上為末每用真酥調少許如膏點在疼處蒴藋湯治風齒腫痛及頭面腫痛口急不開蒴藋桂桃膠蜀椒吳茱萸烏賊魚骨一兩上銼每用五錢以水一盞煎十餘沸去滓更入酒半盞又煎十餘沸熱漱冷吐蜀椒湯治風齒痛不可忍莽草細辛菖蒲牛膝枳殼各半兩蜀椒三十粒上銼如麻豆大以水三盞煎三五沸熱漱冷吐巴豆丸治一切風齒疼痛巴豆胡椒高良薑烏頭桂各一分麝香少許上為細末煉蜜和丸如梧桐子大以綿裹置於痛處咬之勿咽津液露蜂房散治齒風腫痛露蜂房豬牙皂角川椒荊芥鶴蝨細辛各等分上為㕮咀煎一二沸灌漱去涎即愈一方米醋煎一二沸冷漱涎上即愈芎藭湯治風齒疼痛腫及口臭芎藭當歸獨活細辛白芷各一兩上為粗末每用五錢以水一盞煎至七分去滓熱含冷吐如此三五易治風齒及蚛牙疼痛不可忍狼牙草根柳蛀屑莨菪子槐枝半兩皂莢一分上細銼和勻分為三度每度以漿水二大盞煎七分去滓熱含冷吐蛇蛻皮散治風齒疼痛不可忍蛇蛻皮蠶砂柳枝吳茱萸槐枝各一兩上細銼每服五錢水一大盞煎七分盥漱稍熱含之冷吐效獨活酒治風牙齒疼痛獨活莽草細辛各半兩附子防風各半兩上細銼以酒一升半煎至一升熱漱冷吐一方無防風郁李酒治齒風腫痛呼吸風冷其痛愈甚齦槽腫赤郁李根細辛椒半兩槐白皮柳白皮上細銼每用藥一兩酒升半煎三五沸去滓熱漱冷吐蓽茇散治諸陽氣虛風攻牙齒疼痛不任寒熱嚼物隱痛蓽茇苦參防風升麻各一兩藁本上為散每用三錢水一盞煎六七沸熱漱冷吐石燕子散治齒牙風冷疼痛及齒齦不密固石燕子茯苓細辛寒水石香白芷各一兩上為細末入研藥勻每用藥半錢以指蘸擦牙齦上合口少時後用溫鹽湯微漱一兩口存藥性食後或日用一兩遍升麻散治陽明經受風邪入齒牽引牙槽疼痛不止升麻香附子細辛莽草各等分上同為細末用三錢水一盞煎至七分去滓熱漱冷吐日用三四度定痛散治牙風疼痛立效華陰細辛川烏頭香白芷各一兩乳香二錢上為末每用少許撩牙痛處用涎吐之須臾以鹽水灌漱濟生方除白芷川烏用全蠍草烏漱毒散治風熱攻蛀牙齒疼痛久而不愈細辛薄荷葉荊芥穗地骨皮上為粗末每用七錢水二盞煎至一盞半去滓食後溫漱冷吐川椒散治牙風腫疼露蜂房去土殭蠶淨川椒去子茄蒂各等分上並燒灰存性入鹽擦之去涎即愈荊芥湯治風熱齒痛荊芥腦荷升麻細辛上等分為末每服二錢以沸湯點漱口含咽並用擦牙草烏頭散治牙風疼痛兩頭尖七個草烏頭七個全蠍七個殭蠶七個去嘴足上為細末用指點擦於痛處唾唾勿咽然後漱之吐出又方蓽茇細辛良薑白礬上等分細末和勻一半於牙痛處擦之須有稠涎出盡覺注津液用溫水漱之濕生蟲丸治風齒疼痛濕生蟲一枚胡椒一顆巴豆一枚去皮上先研胡椒細次下巴豆濕生蟲研令勻用軟飯和丸如綠豆大以綿裹一丸咬之良久涎出逐旋吐立效一方粟米大納蟲孔中痛立止效驗不可名狀草烏頭散治一切風齒疼痛飲食艱難揩擦草烏頭二枚炮膽礬研細辛各一錢去苗葉上為細末每用一字以指頭搽有涎吐之皂莢湯出聖濟總錄治諸風齒疼痛皂莢一錠去皮子炙令黑色銼露蜂房一枚劈碎鹽一分上銼分三貼以漿水一盞煎十餘沸去滓熱漱冷吐殭蠶散治風壅牙疼殭蠶藁本白芷各等分上為細末每以少許揩牙疼處用鹽水灌漱立馬見效杏辛散出海上方治風腫杏仁十個去油細辛焙乾十雄黃別研十上為末男左女右搐鼻中妙又方出海上方草烏尖皂角炒黃道人頭各等分上為末揩痛處鹽湯漱之草烏散治牙疼牙疏又治風腫牙疼極效草烏四個緊小如鳥啄者不去皮全蠍二個胡椒三十粒上同為細末揩牙出涎即以荊芥湯灌漱微覺麻少頃即定槐白皮散治齒風疼痛不止槐白皮地骨皮各一兩松節三兩銼上為散每用五錢以漿水二中盞煎五七沸去滓熱含冷吐皂莢散出聖惠方治齒風蚛疼痛不可忍皂莢炒黃焦荊芥胡椒各一兩上為末每用三錢以水一大盞煎至七分去滓熱含冷吐皂莢丸治齒風痛或蟲痛不可忍根下有孔豬牙皂角二錠去皮子漢椒七枚去目莽草半兩上為末以棗肉和丸如芥子大每用一丸納蚛孔中有涎即吐卻芎附湯治齒疼痛芎藭二兩附子炮製去皮臍上為末每用三錢水一盞煎至八分去滓熱漱冷吐治熱毒風攻牙齒疼痛附子燒灰一枚礬石燒灰一分上為細末每用少許揩齒逡巡散治風牙疼痛不拘新久一服立效高良薑一塊約二寸全蠍一枚瓦上焙乾上為末以手揩蘸藥如齒藥用須擦令熱徹須臾吐出少涎以鹽湯漱口大妙亦治腮頰腫痛鮑子明常患風牙腮頰腫痛不能忍予以此方授之出涎數口即愈此藥樂清丐者所傳疑丐者是異人一方先用酸漿水漱牙細辛散常用去風血不蛀茄蒂曬乾燒灰細辛各等分上和勻擦之治齒風連面疼痛不可忍者細辛一兩黑豆一合上熬豆令熟然後以好酒二大盞同煎至一大盞去滓熱含冷吐治頭面風口齒疼痛不可忍用雞屎白燒灰以綿裹置齒痛處咬之又以敷齒根亦可一方以醋漬煮含之又方出千金方治齒痛用煮枸杞汁含之又方出千金方含驢尿須臾止治風熱上攻齒痛余前任淮西幕府己酉冬被檄來和州至含山縣齒痛大作忽於刀鑷人處得草藥一捻許以湯炮少時冷暖隨意以手指蘸藥水浥痛處即定明日若人歸去余因傳得其方後以治人多效用皺面地蔥子即本草豨薟又名地菘者每用少許湯泡一云即是鶴蝨余之所用正此物也季誠方用鶴蝨一枚擢置齒中高堅云以醋煎鶴蝨漱口其痛立定尤妙治風齒敗口臭用芎藭含之大蒼散治牙床風腫每用大蒼朮切作兩片於中穴一孔入鹽實之濕紙裹燒存性取出研細以此揩之去風涎即愈以鹽湯漱口治牙疼並疏又治風腫牙疼極效用獨子肥皂去子以青鹽實之用紙裹水浸潤入火燒存性更入生樟腦子十五文同研細揩之又方出海上方用生薑一塊破開入巴豆肉一粒濕紙裹慢火煨香為度去巴豆切姜為末揩之於疼處奇妙一方候姜熟用出巴豆紙壓去油卻以新綿少許裹巴豆在內隨蚛孔大小加減用綿塞蚛牙中其痛立止用三次蚛牙自落妙不可言專治風腫氣腫牙疼及風蛀牙痛馬敏叔說一村媼苦牙痛百藥不效用此即愈用天蘿即生絲瓜一個小者擦鹽火燒成灰存性成末擦上痛處腫處涎盡即愈上乃嚴月軒家傳屢效之方自患此症一試而不再痛後以水調藥末掩上腫腮上尤妙前有此方治蛀牙據月軒云此物但能去風若蛀牙則不效治齒牙痛用豬牙皂角於灰火內煨過銼碎用蔥白漿水同熬去滓乘熱漱冷吐之立止治風齒疼頰腫出肘後方用獨活酒煮熱含之一方銼碎以水二大盞煎至一盞去滓熱含冷吐治齒風宣露治療牙風取東牆下朽骨削之如疼牙齒許大於煻灰中煨燒令熱於所痛處齧之冷即易之治風牙疼痛方用木鱉子去殼磨稀調上患處治風牙疼痛方用胡絲饅頭草將鹽少許於掌心揩碎擦之即愈風齒疼痛頰腫及治血出不止用蘭草五兩水一斗煮取五升熱含吐之一日盡又酒煮獨活熱含之治患牙壅腫疼用敗毒散加荊芥穗石膏防風桔梗大黃煎服後服防風通聖散更加石膏芒硝防風全蠍大黃煎服治風蚛牙頤頰腮腫痛用芭蕉自然汁一碗煎及八分乘熱漱牙腫處漱盡即止凡是風牙用之必愈頤頰腫而痛者風牙也頤頰不腫只牙齦腫痛蚛牙也治風蛀牙疼方及治熱風頭痛用杏仁燒令煙盡去皮以亂髮裹之咬於所患齒下其痛便止熏諸蟲出並風便瘥重者不過再服熏之即效槐枝散治牙齒腫痛牙齦宣露氣臭齒挺出時發疼痛常用去疳癆牙細辛去土川芎白芷各一兩蠍梢生二錢半上為細末每用半錢擦在牙疼處有涎即吐誤咽無妨早晨臨臥日用一兩遍治風氣攻注牙齒腫痛華佗中藏經方藁本剪草細辛上等分為粗末每服三錢水二大盞煎至一盞半以下乘熱漱之過微覺痛少頃自止一方治一切風腫牙寒濕腦風項筋急牙摧齦脫麻黃三兩柴胡半兩羊腦骨灰三錢羌活根一錢半當歸半錢白芷桂枝細辛半錢蒼朮升麻一錢半上為末極細漱口指擦牙疼處立止立應散出楊氏方治風蚛牙疼楊梅根皮厚者一兩去粗皮川芎麝香少許別研上件為細末研勻每用一字先含溫水一口次用藥於鼻內搐之涎出病止為妙救急療齒風動痛出本草採取蒼耳一握以漿水煮入鹽含之少許治牙齒痛上攻腫痛獨活地黃上二味各三兩為末每服三錢水一盞煎和滓溫服臥時再用治口齒風疳慝血以槐白皮煎漿水煮含之腎虛齒痛附論夫齒者骨之精華骨乃腎之所主外板則為齒內床則為牙人腎氣強則齒自堅腎氣衰則齒必病且手陽明大腸之脈入於齒灌注於牙倘風寒壅熱之氣鬱滯心胸沖發於口則齒為之病矣輕者為宣露齦頰浮腫重則為疳䘌齲脫之證也亦有腎虛氣壅齒痛宣露當進補腎藥隨症治之足少陰經虛氣血不能榮養骨髓故因呼吸風疼或漱寒水則令齒痛而不已方沉香延齡散治風牙腎虛牢牙補腎生津液沉香川芎生地黃藁本零陵香砂仁人參熟地黃防風沒石子荊芥藿香片腦木香石膏地骨皮白蒺藜桂心母丁香檀香白芷杜蒺藜炒去刺石菖蒲以上各半兩當歸天麻訶子細辛何首烏枸杞子青鹽甘松乳香龍骨槐角子香附子各七錢半露蜂房一兩蓽茇二錢柳枝四兩錢炒膽礬一錢半石燕子五個火煅海浮石一兩麝香一錢上為細末早晚擦牙鹽湯漱然後咽之無食子散治腎虛齒痛揩齒黑髭無食子干馬齒莧蓮子草石榴皮巨勝子生地黃柳皮取白羌活去蘆頭訶黎勒皮牛膝生薑皮生胡桃皮白芷各一分皂莢一梃不蚛者去皮炙青鹽上銼如麻豆大瓷瓶子盛密蓋泥封頭炭火燒令赤候冷取出搗羅為散更以濕紙攤用盆蓋一復時出火毒每用柳枝湯漱口揩齒雞腸草散治腎虛齒痛揩齒烏髭鬢駐顏雞腸草白礬碎訶黎勒蘹香子旱蓮子晚蠶沙青鹽茜根皂莢各一兩麻粉半兩上除礬並青鹽蘹香青鹽蠶砂外各銼長半寸用藏瓶一枚開口入諸藥在內紙筋鹽泥固濟以炭火半斤煅盡火放冷取出研如粉早晨食後夜臥揩三兩上頃之漱口天雄散治腎虛齒痛天雄炮裂去皮臍當歸切焙細辛去苗葉附子炮裂去皮臍甘草炙銼乾薑炮生地黃切焙苦參藜蘆各半兩去苗上為細末揩貼齒痛處日三五上勿咽津每藥盡即以水漱之地黃散治腎虛齒痛烏髭鬢揩齒升麻銼一兩訶黎勒搗二枚白鹽花半分麻糝末第一遍打者四合生地黃二兩丹砂一兩細研臨燒時以沙牛糞汁調之免飛上粟饋天合上拌勻以淨沙瓶中盛密封泥裹陰乾以炭火七斤燒炭盡取藥細研為末每欲用先以生薑一塊爛嚼吐卻以左手指揩三五遍就點藥揩十數遍含津不吐兩手取津塗髭發待辛辣定則咽之兼治腳氣腸風莽草散治腎虛齒痛揩齒烏髭亦壽延長莽草生薑乾薑豬牙皂角生地黃菟絲子胡麻子上各四兩銼如麻豆大入藏瓶內鹽泥固濟火煅一日後入地一尺一寸深埋三服時取出露三夜不得見日氣研為細末用如齒藥法揩牙地黃散治腎臟虛食冷熱物齒揩痛生地黃切焙一兩白茯苓去黑皮防風去叉獨活去蘆頭枸杞子山芋各半兩上為細末煉蜜丸如梧桐子大空心煎棗湯下十丸至十五丸三枝散治腎虛齒痛槐枝柳枝桑枝晚蠶砂青鹽麻糝上銼如麻豆大鹽泥固濟一罐子曝乾後入諸藥在內歇口於地坑子內四面炭火煨燒令通赤時用柳枝攪撥轉燒令勻煙盡去炭火用濕紙三五重蓋罐口候冷出藥研為末瓷盒盛每日揩齒日久良勝金散治腎熱上蒸牙齦浮腫牙齒疼痛或腎原虛冷牙齒搖動或赤腫痛風牙蟲牙並皆治之上老生薑十兩切作錢薄攤箕內冷水縮次用砒霜一錢重細研拌姜令勻留少許砒放熔銀坩沙鍋子內砒拌生薑於上按令緊用新瓦一片蓋鍋內烈炭火煅令煙盡傾於盆內盞子合定存性要成黑炭不可白卻蓽茇全蠍華陰細辛胡椒上焙乾薑炭亦為細末拌勻每用手指點少許如黑豆大揩牙齦上閉口候有涎沫即吐出立效柴胡湯治腎虛牙齒齦腫膈上熱柴胡枳殼黃連厚朴上等分搗篩每用五錢水二盞煎至一盞去滓食後分二服麝香散治腎虛齒痛揩齒麝香小豆麵蜀椒青鹽上為末用揩齒後以溫水漱之治腎虛齒痛硫黃甘松上等分為細末百沸湯泡熱漱口神效治腎虛髓少齒痛生地黃川芎各一兩上以煎湯漬齒根無時骨碎補散治腎虛氣攻牙齒血出牙齦癢痛揩齒骨碎補炒黑色二兩上為細末漱口後揩齒根良久吐之臥時再用咽津不妨治老人牙疼因腎氣虛弱或因用涼藥擦牙所致用肥皂一枚去核入鹽在內用鐵綿扎合以鹽泥固濟火煅黑末擦牙加減牙藥麝香散治腎氣虛弱齒者骨之所終髓之所養也若腎氣實則骨髓堅固齒無病矣綠礬石膽五倍子訶子皮何首烏龍骨藿香葉甘松各四錢縮砂仁細辛白茯苓零陵香百藥煎青黛龍腦生地黃麝香各半兩上為細末入研藥勻如常法用少許刷牙蘸藥刷牙齒上合口少時後用溫水漱口吐之每日早用齒齦宣露附論夫牙齒者雖為骨之所終髓之所養得齦肉而固濟可以腎堅牢今氣血不足揩理無方風邪襲入客於齒間則令肌寒血弱齦肉縮落漸至宣露齦肉腐爛永不附著齒根也方升麻散治牙齒宣露齦肉腐爛升麻防風藁本細辛白芷地骨皮露蜂房木香甘松丁香沉香柳枝心上為散以一錢貼患處齒齦上咽津以瘥為度茜根散治齒齦宣露口臭血出茜根升麻甘松牛膝銼細辛羌活硫黃槐白皮皂莢鹽花芎藭地骨皮各一分上細銼同入瓶子內燒勿令煙盡取出去火毒後搗研為散揩齒甚妙雞舌香散治牙齒宣露口臭血出不能飲食雞舌香當歸青葙子乾薑菖蒲莎草根木香青黛胡桐淚棘刺上等分為散每用綿裹半錢含化咽津更於患處齒齦貼一方無青葙子有細辛玉池散治風蚛牙疼腫癢搖動齒齦潰爛宣露出血口氣等疾悉能治地骨皮香白芷川升麻防風細辛川芎槐花當歸藁本甘草各等分上為末每用一字許揩牙或大段痛即取二錢水一盞半生薑三片煎至一盞稍溫漱候冷吐之殊效或用金沸草散熏漱佳一方有刺蒺藜白牙藥真珠散治齒齦宣露牙黃黑不白真珠白檀石膏烏魚骨白石英浮石各半兩硃砂香白芷川升麻川芎各二兩半上為細末每用少許以指蘸藥擦牙合口良久吐津後溫水漱口地黃散治口齒宣露䘌蝕腫癢生地黃牛膝地骨皮升麻羌活芎藭藁本細辛各一兩胡桐淚上為散先用溫鹽湯淨漱次藥揩了更不漱早起臨臥治大人小兒牙疳宣露輕者枯礬青黛銅綠生朴硝甚者綠礬蘆薈麝香龍骨血竭各少許上以齏水溫漱然後用藥敷貼紅棉散治牙齒宣露疼痛並齒浮動柳絮麝香紫石英凝水石海蛤龍腦丹參白石英上為散每服半錢揩牙良久漱口不計時候獨活散治頭目發昏散風熱治陽明經不利邪毒攻注牙齒齦肉虛浮宣露根下動搖發動又治偏正頭痛漸漸攻注眼目或發疼痛視物不明其藥功效不可具述川芎獨活羌活防風各半兩細辛荊芥鄆薄生地黃各三錢上為粗末每服三錢水一盞煎至八分去滓溫服食後日三二服細辛湯治風牙腫疼宣露細辛升麻芎藭荊芥穗木通各半分莎草根莽草半兩上為粗末每用五錢水一盞煎七分熱漱冷吐日三兩次白楊皮湯治牙齒宣露白楊皮地骨皮防風細辛蔓荊子杏仁生地黃上銼如麻豆每用五錢以水二盞煎至一盞去滓留八合入酒一盞更煎三五沸熱漱冷吐即瘥地黃散治風齒血弱齦肉縮漸至宣露生地黃莽草生薑乾漆豬牙皂角皂麻子菟絲子各四兩上入瓶內以黃泥固濟火煅一日後入地一尺二寸深窖卻三伏時取出盒子盛露三夜不得見日氣搗羅為散如齒藥用之防風湯治齒根出露搖動疼痛防風蔓荊子細辛川升麻地骨皮赤茯苓芎藭上等分銼和勻每用半兩以水一大盞酒一盞煎至一盞去滓熱含於患處冷即吐含盡為度日二盡此一劑瘥矣胡桐律散治齒齦腫悶宣露出血胡桐律川芎細辛白芷各半兩生地黃青鹽寒水石上用細末每用二錢水一盞入柳枝黑豆少許同煎至七分去滓熱漱冷吐後日三二服芎藭散治牙齒浮腫宣露鮮血不止芎藭胡桐淚石律防風白芷莽草各一兩上為散每用半錢揩牙鹽湯漱之常用齒藥牢牙去風冷蚛齲宣露不問老少用之甚妙槐枝柳枝皂莢鹽四兩降真香白膠香各半兩上同入瓷瓶納黃泥固濟糠火燒一夜候冷取出研細用如常法一方無降真香白膠香三因方謂石佛庵主年七十餘云祖上多患齒痛脫落得此方效數世用之齒白齊密乃良方也牢牙散治牙齒宣露栝蔞根白芷雞舌香白檀香麝香上等分為散每用半錢揩牙無不奇效芎藭散治齒齦宣露疳䘌蝕芎藭木香乳香丁香各一分鹽半兩上為散每用少許患處敷貼日三五上即瘥細辛散治牙齒浮腫宣露疼痛細辛荊芥莽草升麻各一兩胡桐淚半兩上為粗末用五錢水二盞槐枝十數莖鹽二錢同煎令濃熱漱冷吐地黃散治牙齦宣露癢疼血出生地黃細辛皂莢各一兩白芷一兩上入藏瓶內以紙泥固濟曝乾用炭火燒令煙盡取出放冷研令極細次入白殭蠶末一分甘草末二錢再研令勻早晨或臨臥以少許揩牙齦良久溫水漱口松節湯治牙齒宣露腫癢松節細辛蜀椒胡桐淚上等分銼如麻豆大每用五錢水二盞煎十餘沸熱漱冷吐以瘥為度一方用酒煎藁本散治牙齒風齦腫宣露膿出氣臭藁本升麻皂莢各半兩石膏一兩半上為散臨臥時以手指蘸揩擦齒上微漱藥氣密陀僧散治牙齒齦宣露腫悶生瘡或有膿血密陀僧雄黃石膽麝香上等分為細末每用少許干貼患處吐津誤咽不妨不計時候治齒齦宣露以蚯蚓屎水和為泥火燒令極赤研之如粉臘豬脂和敷齒上日三次永瘥治齒痛宣露涎血臭氣川芎竹葉鹽細辛各少許上水三盞煎兩煎熱含漱冷吐海蛤散治牙齒宣露海蛤硫黃乾漆上等分更入麝香少許研為散先淨帛拭患處以藥敷之有涎吐之青黛散治牙齒宣露青黛樺皮蝦蟆上等分於乳缽中研令細每用少許敷齒宣露處立驗有津吐之雞舌香散治風冷乘於齒間發泄疼痛口氣宣露雞舌香麝香射干上等分搗羅為散入麝香再拌和勻每少許揩牙良久湯漱之牛膝散治齒齦宣露風癢牛膝細辛上等分為散更於乳缽中細研敷宣露處日三五上即驗一方用蠟和丸如蓮子大以綿裹一丸痛處咬之白殭蠶散治風毒壅滯齒齦虛腫出血宣露疼痛白殭蠶麝香上等分研令勻每用少許揩齒良久荊芥湯稍熱漱口冷吐出治牙齒齦宣露有膿血出及小兒蟲疳齦葶藶胡桐淚各半兩上為散於患處摻之即瘥一方治熱毒上攻宣露出血齒痛齦腫亦治舌出血百草霜鹽上各等分研細乾擦舌上其血自止治牙宣明礬黃連上等分為末候睡著擦牙上驅毒飲治熱毒上攻宣露血出齒齦腫痛不可忍者上屋遊即瓦上青苔不拘多少洗淨煎湯澄清入鹽少許一小盞微溫頻漱之治牙宣出百一選方用赤荊芥同為細末揩齒上以荊芥湯漱治牙宣牙癰用蠶蛻紙不計多少燒灰存性揩入口瘡則用乾摻齒縫血出不止以紙紝子蘸乾用蟾酥少許敷血出處立止小薊散治牙齒宣露出血用百草霜小薊者附子炒去毛真蒲黃各五錢為末揩牙齒上立愈治軸車開不可合用天南星末生薑汁調敷綿縛合一宿愈去風也又法一人以手措牽其頤以漸推之則復入矣推當疾出其指恐齧傷又法飲大醉睡中搐鼻嚏自正蚺蛇膏治牙露用蚺蛇膏和麝香末敷之治齒齦宣露每旦捻鹽納口中以熱水含遍齒不過五日齒即牢密治牙宣熱爛用羊蹄草含化即可治牙痛有血臭氣用地骨皮不拘多少煎湯漱畢咽之又治上膈咯血併骨蒸勞麝香散治熱多寒少牙露肉齦脫血出齒動欲落大作疼痛心火上炎腎水不足壅腫浮動乍作乍止解一切風熱麻黃根草蔻生地黃益智當歸升麻熟地黃骨灰黃連人參麝香漢防己上為細末用溫水漱口淨擦之其痛立止麝香膏治大人小兒齒齦損爛及走馬疳麝香豬牙皂角白礬水銀苦楝根綠礬密陀僧膩粉黃柏上等分為末用無灰酒三升熬成膏患者先漱口塗之久患者取藥一匙砒霜末各一錢半和勻使絕妙齒痛牙齦宣腫方香附子乳香細辛防己荊芥各三錢上搗羅為細末早上揩痛處如大段痛時即煎防風湯先漱盥了多著藥擦之一日三次每次一飯久為佳牙宣出永類鈐方當歸尾黃竹葉上等分為末同鹽漱牙動牙宣血出淨香附子薑汁浸宿曬乾為末漱口牙藥紫金散解風熱散積壅去口氣止牙宣揩牙白療齦腫及一切疼痛處上用生地黃不拘多少入罐口煅存性碾為細末早晚用少許擦之溫水漱口大有奇效路鈴梁園材云都下一家專貨此藥兩宮常以數千來贖其門如市鄰人咸訝其不曾見修制之上密叩厥子遂得是方治牙齒宣露用蘩蔞燒灰以揩齒宣露然燒灰減力不若干作末有益也治牙齒宣露以蚺蛇膽和麝香末敷之齒間血出附論夫熱邪僭在上流傳於手陽明之支脈入於齒頭面有風而陽明脈虛氣挾熱乘虛入齒齦搏於血則令齒齦虛腫甚者齒間出血蓋血性得溫則宣流故也方烏金散治齒齦血出及腫癢風冷疼痛槐白皮豬牙皂角威靈仙生乾地黃酸石榴皮何首烏青鹽各一兩細辛升麻各半兩麝香上為細末入前燒者藥並麝同研令勻每用半錢揩牙良久以溫湯漱口如早作齒藥用尤妙一水調藥半錢塗在紙上於牙齒上貼之三兩次即愈柳枝散治齒齦血出柳枝桑皮槐枝皂莢丹砂生地黃麝香凝水石小薊根上等分搗研為細散每用揩齒良雄黃麝香散治牙齒腫爛出血雄黃銅綠枯礬血竭麝香輕粉黃丹黃連各一錢上為細末每服少許隨病大小敷上角蒿散治齒痛宣露血出不止角蒿細辛升麻各半兩地骨皮牛膝各一分上藏瓶內燒灰存性搗羅為散每用一錢摻濕紙上患處貼當歸湯治酒醉牙齒湧血出亦治齒風痛當歸礬石桂心細辛甘草各一兩上㕮咀以漿水五升煮取三升含之日五六夜三二無細辛水煎亦可治牙宣出血藁本零陵香甘松三柰荊芥上等分水煎漱之如刷牙用砂鍋末治齒齦間血吃食不得黃連白龍骨馬牙硝各一兩白礬龍腦一錢上為細散研入龍腦令勻每用半錢敷齒根下龍骨散治齒齦血出不止白龍骨生地黃乾薑曲頭棘刺白礬上等分搗羅為末每用半錢揩敷齒齦上即瘥生雞桃花散治牙齒內血出並有竅眼時時吐血寒水石粉硃砂甘草腦子上等分為細末每用少許干捻有竅處龍腦散治牙齒疼痛間出血去口氣闢風冷龍腦蔓荊實細辛升麻各一兩上為細散入龍腦拌勻每用半錢揩牙良久溫湯漱口鬱金散治齒出血鬱金白芷細辛上等分為末擦牙仍以竹葉竹皮濃煎入鹽少許含咽或炒鹽敷治牙宣出血明白礬乳香麝香少許上同研細輕手擦良久鹽湯灌漱神效散治牙縫血出草烏頭青鹽皂莢各一分上瓦器內燒灰存性每用一字揩齒立效生地黃湯治齒齦血出生地黃大豆柳枝上等分將豆及柳枝炒焦以無灰酒四盞沃之即下地黃根煎五六沸去滓熱漱冷吐治齒齦血出不止方乾地龍末白礬灰麝香末上同研令勻於濕布上塗藥貼於患處一方治齒齦間津液血出不止細辛二兩甘草一兩上㕮咀以酸酒二升煎取一升日夜旋含之及熱尤良必勝散治齒衄蒲黃螺兒青等分上等分為細末每用少許擦患處少待用溫鹽水漱之荊槐散治牙宣出血或痛槐枝荊芥穗上等分為末擦牙仍煎服胡粉散治牙出血不止胡粉麝香各半錢上同研細散臨臥淨揩牙漱口訖干貼兼能牢牙治齒齦間津液血出不止用礬石一兩燒水三升煮取一升先拭血乃含之以後不用朽人牙齒根落不用之可也又方治齒根血出用苦竹葉濃煮與鹽少許寒濕得所含之冷即吐一方無鹽又方治齒出血不止用刮生竹皮二兩苦酒浸之令其人解衣坐使人含噀其背上三過仍取竹茹濃煮汁勿與鹽適寒溫含漱之竟日為度治酒醉牙齒湧血用燒釘令赤注血孔立止治酒醉齒有血出用枸杞為末煎湯漱之然後吞下立止根亦可靈芝散治出血齒痛用川五靈芝以米醋煎汁含咽治齒疼齦間出血極驗用鹽末每夜厚封齒齦上有汁瀝盡及臥其汁出時仍叩齒勿住不過十夜疼血止更久尤佳長忌豬肉油菜等又方用食茱萸又齒痛酒煎含之治牙疼肉爛血出不止用草烏頭大者去皮臍高良薑等分為散先用溫鹽湯漱口了搵藥少許揩齒涎出立效凡齒宣露多是疸及蝕用角松灰夜塗齒上齦間使滿勿使食油菜三度即瘥食油菜即發並桂心常忌沙糖干棗又方出肘後方每日二捻東牆衣口中暖水含扣百遍常為勿脫不五日宣齒即牢良驗凡齒痛疼皆由月蝕食深慎為妙矣治齒縫勿煞血出不止方用胡桐淚半兩研羅為末貼齒縫如血出不止再貼神效治齒浮動齦腫出血方用屋下塵煤細羅為散揩敷齒根下又方出聖惠方用燒銅箸烙血出處以白礬灰敷之治大人牙宣出血極多用消毒散加大黃赤芍藥當歸生地黃等分同煎服仍敷貼前藥或以綿紙蘸藥塞牙縫中二妙丸治齒衄巴豆蓽澄茄各七枚上研爛為細末綿裹左齒痛納之左耳右齒痛納之右耳齒縫出血方齒縫出血不止他藥不能治者鹽注之蘭室寶鑑用門冬煎湯漱之亦良又方治齒縫出血蓋上實下虛也用八味丸服之即愈治牙齒出血及走馬疳上用頭髮䬣𩟐用刮面刀子細切銚內慢火炒存性為末治齒縫多血以鹽湯常漱即已益齒走血驗也治齒齦間津液血出不止用苦竹茹四兩以醋漬一宿含之一方用酒治齒縫中血出以紙紝子蘸乾蟾酥少許於血出處按立止骨槽風
