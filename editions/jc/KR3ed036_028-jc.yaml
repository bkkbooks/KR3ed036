body:
  text: 卷二十八肺臟門肺痿小便數附論內經曰臟真高於肺又曰真氣奪則虛今肺中冷則肺之真氣不足而其人上虛則無以制下故上為肺痿下為小便數以至吐涎沫而欲咳不能咳者皆其證也治法當以溫藥和之方白茯苓湯治肺痿小便數甚者吐涎沫欲咳不能者白茯苓去黑皮桂去粗皮附子炮裂去皮臍白芍藥各三分補骨脂炒黃耆銼各一兩蜀椒去目及閉口者炒四十顆肉蓯蓉酒浸切焙一兩半上搗篩如麻豆大每服三錢水一盞煎至七分去滓溫服食前臨臥日三黃耆湯治肺痿小便數無力不進飲食黃耆銼熟乾地黃焙各二兩桂去粗皮白芍藥當歸焙切各一兩麥門冬去心焙一兩半白龍骨甘草炙銼各半兩上搗篩每服五錢水一盞半入生薑五片大棗二枚煎至八分去滓溫服空心食前日三龍骨湯治肺痿小便數漸覺氣弱龍骨黃耆銼肉蓯蓉酒浸切焙各一兩白薇牡蠣煅附子炮裂去皮臍各三分甘草炙銼半兩上搗篩如麻豆大每服三錢水一盞入生薑三片大棗二枚煎至七分去滓溫服空心食前日三五味子湯治肺痿小便數五味子款冬花去梗桂去粗皮人參各二兩麥門冬去心焙桑根白皮各三兩上搗篩如麻豆大每服六錢水二盞入生薑和皮五片大棗二枚粳米三十粒煎至一盞去滓溫服空心食前日三熟乾地黃治肺痿小便數熟乾地黃焙芎藭各五兩桂去粗皮人參各三兩桑根白皮二兩上搗碎如麻豆大每服五錢水一盞半煎至八分去滓溫服三味湯出聖惠方治肺痿多涎唾小便數者此肺中已冷必多頭眩甘草四兩乾薑炮白芍藥各二兩上搗篩如麻豆大每服五錢水一盞半煎至一盞去滓溫服不計時候肺臟痰毒壅滯附論夫肺臟痰毒壅滯之病其證目眩頭旋胸膈痞滿常多痰唾不思飲食鼻聞腥臭蓋肺主氣居於膈上為四臟之蓋邪熱壅熏散胸膈津液相搏故鬱結成痰也方半夏散出聖惠方治肺臟久積痰毒在於胸膈不散少思飲食半夏一兩湯洗七次去滑木香半兩人參一兩去蘆頭檳榔三分桔梗半兩去蘆頭陳橘皮三分湯浸去白焙前胡一兩去蘆頭赤茯苓二兩桂心半兩旋覆花半兩麥門冬一兩去心枇杷葉三分拭去毛炙微黃細辛三分甘草半兩炙微赤銼枳殼二兩麩炒微黃去瓤上為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌爆熱面豬犬肉等人參防己湯治肺臟壅熱咽喉腫痛頭目昏重煩飲食客熱痰毒大小便閉澀人參半兩防己一兩羌活去蘆頭芎藭檳榔銼連翹天麻玄參防風犀角鎊木香各半兩惡實微炒甘草炙各一兩上羅勻每服三錢水一盞入生薑三片蔥白一寸煨熱同煎六分不拘時候去滓溫服甘菊花散出聖惠方治肺臟痰毒胸膈壅滯甘菊花人參去蘆頭大腹皮銼半夏湯洗七次去滑木香白朮威靈仙桔梗麩炒微黃去瓤肉桂去皺皮訶黎勒皮赤茯苓郁李仁湯洗去皮尖炒甘草炙微赤銼各一兩上為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服人參散出聖惠方治肺臟痰毒壅滯氣逆咳嗽不思飲食人參一兩去蘆頭麻黃三分去根節甜葶藶三分隔紙炒令紫色枳殼三分麩炒令黃去瓤木通三分炒烏梅七枚用肉微炒桔梗三分去蘆頭紫菀三分去蘆頭桑根白皮三分銼甘草半兩炙微赤銼赤茯苓半兩款冬花三分上為散每服三錢水一中盞生薑半分煎至六分去滓不計時候溫服旋覆花散治肺臟痰毒壅滯頭旋目眩旋覆花半兩人參半兩去蘆頭枇杷葉半兩拭去毛炙微黃赤茯苓一兩蔓荊子一兩前胡一兩去蘆頭桔梗防風各半兩去蘆頭甘草半兩炙微赤銼枳殼一兩麩炒微黃去瓤半夏三分湯浸七次去滑上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌炙暴熱面射干散楊子建護命方治肺臟積熱才食辛酸熱毒之物即咽中痰壅射干杏仁去皮尖雙仁炒麻黃去根節煮去浮沫紫蘇子炒羌活去蘆頭甘草桔梗牡丹皮柴胡去苗枇杷葉去毛上等分粗搗篩每服二錢水一盞生薑二片同煎取八分食後臨臥服柴胡湯治肺壅熱痰毒頭眩嘔逆柴胡去苗甘草炙各一兩芎藭獨活去蘆頭羌活去蘆頭貝母去心款冬花各半兩麻黃去根節桑根白皮銼各一兩半上粗搗篩每服三錢水一盞煎至七分去滓溫服不計時候桑白皮散治肺臟痰毒滯心胸滿悶肩背煩疼不欲飲食桑根白皮一兩銼半夏半兩湯浸七次去滑赤茯苓一兩前胡一兩去蘆頭大腹皮三分銼白朮半兩木香半兩甘草炙一分微赤銼川大黃一兩炙微銼碎上為散每服三錢以水一中盞生薑半分煎至六分去滓不計時候溫服前胡湯治肺熱咳嗽痰壅氣喘不安前胡去蘆頭一兩半貝母去心白前各一兩麥門冬去心焙一兩半枳殼去瓤麩炒一兩芍藥赤者麻黃去根節各半兩大黃蒸一兩上諸藥銼如麻豆大每服三錢以水一盞煎取七分去滓食後溫服日二貝母飲治肺臟熱咽喉及口乾咳嗽氣促痰壅貝母去心百合各一兩半紫菀去苗桑根白皮桔梗炒各一兩麥門冬去心焙一兩半大黃蒸七錢半甘草炙半兩上粗搗如麻豆大每服三錢以水一盞煎取七分去滓食後溫服日二潤腸丸治肺壅盛心胸滿悶咳嗽煩喘咽膈痰滯不欲飲食大便多秘桑根白皮銼甜葶藶隔紙微炒防己天門冬去心焙枳殼各半兩麩炒去瓤檳榔銼一分牽牛子白者炒香搗羅取細末一兩上為末煉蜜和丸如梧桐子大每服二十丸煎人參湯下不拘時服木通湯治久嗽肺熱咳唾稠濁胸滿痛悶木通桔梗桑根白皮升麻黃芩去黑心各一兩半牽牛子炒一兩地黃生切三兩上粗搗如麻豆大每服五錢以水一盞半煎取八分去滓溫服日二六神散治肺臟痰毒壅滯人參百合白朮山芋白茯苓去黑皮各一兩甘草炙半兩上為散每服二錢白湯點服日三紫蘇子散楊子建護命方治肺臟多熱面上生瘡胸中積滯或痰唾稠黏或睡中口內有涎紫蘇葉桔梗麻黃去根節煮去浮沫羌活去蘆頭牡丹皮連翹各一兩上搗篩每服三錢水一盞半煎至一盞去滓溫服日三一方為末黑神丸治肺臟壅實痰嗽秘滯皂莢不蛀者一斤切長一寸於銚於內炒令煙盡後作次序下杏仁以下四味俱炒杏仁去尖半夏知母貝母各一兩上同炒令黑色便入酥一兩攪勻後入巴豆霜半兩糝在藥上更得攪動急著器物蓋令不得煙出縫以濕紙固濟候冷出於地上以紙襯攤勻蓋覆出火毒一宿杵羅為末以醋麵糊為丸如綠豆大每服三丸至五丸生薑湯或茶湯酒任下臨臥服款冬花丸治肺氣不調上膈痰滯喘滿氣促語聲不足款冬花半兩焙馬兜鈴杏仁去皮尖雙仁炒各一分桂去粗皮一錢苦葶藶膈紙炒半兩上為細末煮棗肉和丸如梧桐子大每服二十丸食後臨臥以溫水下栝蔞湯潤肺化痰利咽膈大栝蔞五枚去殼取瓤並子點剁令勻細微以白麵同作餅子焙乾搗羅為末稱三兩山芋杏仁去皮尖雙仁麩炒令黃入盆內研令極細末各三兩甘草炙取末一兩上將山芋與栝蔞同於銀石器中慢火炒令香熟取出與甘草杏仁末和拌勻更用鹽花三分細研同和勻每服一錢沸湯點服前胡湯治肺喘毒壅滯心膈昏悶前胡去蘆頭紫菀洗去苗土訶黎勒皮枳實麩炒微黃以上各一兩上為散每服一錢不計時候以溫水調下硝石半夏丸治肺熱胸中痰實咽喉不利化痰硝石半夏湯浸七次去滑焙各半兩上先搗半夏為末次入硝石同研令細再入白麵一兩三味拌勻更羅過滴水丸如綠豆大老兒風痰逆上大腑熱不識人薑湯下二十丸常吃三丸肺臟傷風冷多涕附論夫肺臟虛弱氣血不足則風冷之氣傷於肺也肺主氣氣之所行循環經絡若氣虛則外邪入侵真氣與邪氣相搏故令咳逆惡寒語聲散失目眩頭旋鼻多涕也方桂心散出聖惠方治肺臟外傷風寒頭目不利多涕白朮三分厚朴一兩去粗皮塗生薑汁炙令香熟赤茯苓三分人參三分去蘆頭桂心三分陳橘皮一兩湯浸去白瓤焙半夏半兩湯浸七遍去滑附子三分炮裂去皮臍五味子三分麻黃三分去根節乾薑半兩炮製銼杏仁半兩湯浸去皮尖麩炒微黃細辛半兩甘草半兩炙微黃銼上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩豬魚肉等細辛散出聖惠方治肺臟外傷風冷時有咳嗽頭目不利多涕細辛三分芎藭半兩乾薑半兩炮製銼杏仁半兩湯浸去皮尖雙仁麩炒微黃赤茯苓三分白朮三分附子三分炮裂去皮臍前胡半兩去蘆頭甘草半兩炙微赤銼陳橘皮一兩湯浸去白瓤焙厚朴一兩去粗皮塗生薑汁炙令香熟桂心半兩上為散每服二錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服忌生冷油膩濕面前胡散出聖惠方治肺臟因傷風冷痰嗽不止心膈煩滿或時嘔逆鼻中多涕前胡一兩去蘆頭桔梗半兩去蘆頭半夏半兩湯洗七次去滑白朮三分人參三分去蘆頭枳殼三分麩炒微黃去瓤桂心一兩甘草半兩炙微赤銼陳橘皮一兩湯浸去白瓤焙細辛半兩枇杷葉半兩拭去毛炙微赤銼厚朴一兩去粗皮塗生薑汁炙令香熱上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服人參散出聖惠方治肺臟傷風冷咳嗽多涕心膈痰逆不欲飲食人參三分去蘆頭半夏半兩湯浸七次去滑乾薑半兩炮製銼白茯苓半兩白朮半兩甘草半兩炙微赤銼五味子半兩肉桂半兩去粗皮黃耆半兩銼陳橘皮一兩湯浸去白瓤焙訶黎勒三分煨用皮上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服當歸人參湯出聖惠方治肺傷冷鼻中多涕四肢疼痛不思飲食當歸人參乾薑白朮白茯苓去黑皮甘草炙銼芎藭陳橘皮湯浸去白焙細辛去苗葉白芍藥各半兩桂去粗皮七錢半上搗篩每服三錢水一盞入生薑一片大棗三枚煎至七分去滓不計時候稍熱服白朮散出聖惠方治肺臟傷風冷頭目昏重常多清涕少思飲食白朮半兩人參一兩去蘆頭肉桂半兩去皺皮桔梗半兩去蘆頭細辛半兩甘草半兩炙微赤銼厚朴一兩半去粗皮塗生薑汁炙令香熟陳橘皮一兩湯浸去白瓤焙杏仁三分湯浸去皮尖雙仁麩炒黃上為散每服三錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服厚朴散出聖惠方治肺臟傷風冷咳嗽頭疼不可忍及多涕厚朴一兩半去粗皮用生薑汁炙令香熟前胡一兩去蘆頭桂心一兩石膏一兩赤芍藥一兩貝母一兩煨令微黃甘草一兩炙微赤銼杏仁三分湯浸去皮尖雙仁麩炒微黃上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服麻黃湯治臟感風冷多涕麻黃去根節先煮掠去沫焙一兩前胡去蘆頭白前去苗各三分甘草炙半兩桑根白皮銼炒一兩紫菀去土一兩杏仁湯浸去皮尖雙仁麩炒微黃半兩上搗篩每服三錢水一盞入蔥白三莖煎至七分去滓食後服日三桂心丸治肺寒內外合邪清涕多語聲不出桂去粗皮細辛去苗蘆白芷防風去叉乾薑炮甘草炙芎藭各一兩上為細末煉蜜丸如梧桐子大每服三十丸溫水飲下食後服紫菀湯治肺寒痰逆鼻多清涕紫菀去土升麻天門冬去心焙貝母麩炒黃各一兩上搗篩每服三錢水一盞入生薑三片大棗二枚同煎至七分去滓溫服不計時候杏仁麻黃湯治肺冷多涕杏仁湯浸去皮尖雙仁炒一兩麻黃去根節先煮掠去沫半兩五味子炒甘草炙銼各一兩上搗篩每服三錢水一盞入生薑一棗大煎至七分去滓溫服肺臟傷風冷聲嘶不出附論夫腑臟皆受氣於肺肺主於氣氣為陽陽氣平和則聲通暢也若形寒飲冷兩寒相感則傷於肺是以風冷為陰陰邪搏於陽陰陽不調氣道不通故令聲嘶不出也