body:
  text: 卷四方脈總論九道病脈細為氣血俱虛為病在內為積為傷濕為後泄為寒為神勞為腹滿為憂傷過度細而緊為癥瘕積聚為刺痛細而滑為僵仆為發熱為嘔吐數為熱為虛為吐為痛為煩渴為煩滿動為痛為驚為攣為泄為恐虛為寒為虛為腳弱為食不消化為傷暑促經並無文釋曰其促有五一曰氣二曰血三曰飲四曰食五曰痰但藏熱則脈數以氣血痰飲留滯不行則止促止非惡脈也結為痰為飲為血為積為氣釋曰氣寒脈緩則為結數則為促雖緩數不同結亦當如促脈分別可也散經無文釋曰六腑氣絕於外則手足寒上氣五臟氣絕於內則下利不禁甚者不仁其脈皆散散則不聚病亦危矣革為滿為急為虛寒相搏婦人半產漏下釋曰革者革也固結不移之狀三部應之亦皆危脈也代一藏絕他藏代至釋曰代真死脈不分三部隨應皆是如前所列皆本聖經學者當熟讀令心開眼明識取體狀然後交絡互識所謂六經流注五臟相傳各以部位推尋使瞭然不昧其如隨病分門諸脈證狀尤當參對審詳之如是精誠方可為醫者不爾則傍倚聖教欺罔賢良為含靈之巨賊幸宜勉旃九道脈名一長者有餘而過也故屬於陽其脈舉按皆有餘冉冉尋之往來流利出於三關如持竿之狀是謂長也病應渾身壯熱坐臥不安神思恍惚甚則陽虛內勝三焦不利法宜汗而散之二短者不及之脈故屬於陰凡物短長各有所宜適當其可然後為中夫長短未始有定體質於中而過者為長質於中而不及者為短有中短乃見焉其脈按舉之間雖往來洪盛而不及本位故曰短病應邪氣內結宿食成瘕心腹切痛三關不利陽邪虛搏三焦氣厥外為寒熱內則便硬於法宜引而竭之三虛者陰也不實之象陽為實陰為虛陽氣自得傳肝氣不勝則少力多驚故其脈動為虛指下尋之不足舉之亦然往來無力似浮而弱不欲內固之意是謂虛狀原其病本陽邪內結恍惚無定故發狂熱厥與夫譫言妄謬夢寢虛驚在小兒則主驚風四促者陽盛也陽邪上忤氣有偏盛偏衰故也其脈指下按之有餘舉之洪數下游三關並朝寸口雖盛疾如此必時一止而乃復來謂之促夫脈之行度亦有陰陽之從陽邪奔止血朝於心榮衛趨蹶徐疾不常脈則因之時止而促爾其病令人三焦不和積聚憂思氣逆而厥故上盛下虛上溢下絕其候宜脈退不宜進故法以退之者生進之者死五結者陰盛也真陽已極衰弱也夫脾布中和因陽而發陽衰陰盛則脾氣忤而不能施化故脈來緩緩然時一止而復來或往或來或聚或散謂之結凡以膠塞而不可解陰盛故也病應四肢勞倦憂悶煩躁切痛上下連連相續氣忤不施故法宜通導以去其結也六代者陰也內經曰代則氣衰蓋心散則氣衰不能下應於土脾不得安其常故脈代也說文曰代者更也脾不安常而然其脈按之動而復起冉冉尋之不能自還病應形容羸瘦不能言正氣欲絕神無所居七牢者堅也固圍之象氣之鬱結故若是仲景云寒則牢堅而沉結指下尋之不見舉之全無重按尋之小而有力斷續不常見故曰牢蓋重陰之所入以陰包陽故似無而按有病應骨中疼痛氣血不守榮衛解散是以胸中氣促而並夫脾與胃相為表裡十二經脈之所本而平人之常氣皆稟於胃今已脾胃不能符合則生生之道曷可全乎法以牢為水火相刑必死之候八動者陽與陰相搏也仲景云陰陽相搏名曰動又曰數脈見於關上下無頭尾厥厥搖者曰動以其脈混混然指下尋之似有舉之全無冉冉尋之不離其處病應四體虛勞煩滿崩中及久病血虛於內溢而自利歌曰舉無見處覓方逢體倦虛勞利血膿女子崩中宜速救血虛崩潰藥無功九細者精氣虛弱之極而形容不足內經曰細則氣少其脈之狀稍稍應指往來如綿至微而不絕謂之細脈雖為虛弱之極然必應於診者為正要之精氣既已怯弱陽道由是衰微病必脛酸髓冷力乏精遺皮毛焦乾形容枯瘁溫之以氣補之以味豈可緩也哉歌曰指下尋之極細微脛酸髓冷不支持遺精發槁形枯瘁速灸關元豈可遲九道脈主治一長者陽也潔古云長法干此陽明脈故尺寸俱長身熱目痛鼻乾不得臥當汗陽化氣也長脈迢迢度三關指下時來又卻還陽毒在臟三焦熱徐徐發汗始能安云岐曰陽毒在臟何由言發汗非在五臟之本陽毒之氣在五臟之標何為五臟之本肝心脾肺腎是也何為五臟之標血毛皮脈肌肉筋骨是也以其在五臟之標故徐徐發汗者為在標之深遠也急則邪不能出發之以升麻湯發在陽明標一法加羌活麻黃中治法以地骨皮散治渾身壯熱地骨皮茯苓各半兩柴胡黃芩生地黃知母一兩石膏二兩如自汗已多加知母㕮咀入生薑煎徐徐發者汗之緩也二短者陰也主四肢惡寒腹中生氣宿食不消短法坤腹中有宿食當下之短主陰成形陰不化谷也短脈陰中有伏陽氣壅三焦不得昌臟中宿食生寒氣大瀉通腸必得康宿食生寒氣何由通暢謂陰中伏陽故也使三焦之氣宣行於上下故用巴豆動藥也外藥隨見證應使之此在上脈交論內細說之病久溫白丸新病備急丹三虛者陰也主少力多驚心中恍惚小兒驚風虛怯離虛脈者離火也中虛之象心主血也血虛則脈息難成驚風治以瀉青丸恍惚心中多悸驚三關定息脈難成血虛臟腑生煩熱補益三焦便得寧恍惚者陽主動之貌脈難成往來之象煩熱者血虛也欲令氣血實故補益三焦命門以助心神之氣也是以男子藏精女子系胞宜以加減小柴胡湯主之柴胡去苗黃芩各一兩地骨皮人參知母半夏制茯苓各一兩炙甘草三錢白芍藥八錢上㕮咀每服一兩生薑水煎久疾虛煩不得眠酸棗仁湯治之四促者陽也促脈象坎主中盛滿之象遇坎而退則是脈八九至並寸口漸漸退則活退則陰生逆之促而散也一云促者熱數並居寸口陽太過陰不及也促脈前來已出關常居寸口血成斑忽然漸退人生也若要痊除命在天升多而不降前曲後居如操帶鉤曰死漸退者以陽得陰則解如散絲者獨陽脫陰知命在天也五結者陰也主四肢氣悶連痛時來結脈象兌金動而有止曰結應腹中之右旁故曰結聚也血流而不行氣滯而不散脾主四肢結而不通故悶痛積氣生於脾臟旁大腸疼痛陣難當漸宜稍瀉三焦火莫謾多方立紀綱生氣是三焦之氣旺於脾臟旁脾受濕而反熱傳至大腸故發疼痛乃大腸金受三焦火邪故入大腸藥瀉三焦火邪則愈禁暴用寒藥急攻當緩緩下之六代者陰也主形容羸瘦口不能言不因病羸瘦脈有止曰代代真死脈也若暴損氣血以至元氣不續而止可治以人參黃耆湯人參白茯苓熟生黃甘草炙地骨皮各半兩黃耆白芍藥桔梗天門冬半夏制當歸各一兩陳皮去白二兩上㕮咀入生薑十片水煎一兩去滓食前服滋養血氣調和榮衛和順三焦通行血脈若傷寒代者炙甘草湯代脈時時動若浮再而復起似還無三元正氣隨風去魂魄冥冥何所居浮甚陽太過沉甚陰太過浮甚八至九至死在外沉甚一至二至死在內脾脈居中土之象生三元正氣代者似有似無曰代風邪害於脾故云正氣隨風去七牢者陰也牢脈象震其脈不來不往曰牢其性緊而急前後水火相乘之象水能剋火得相勝則死脈入皮膚辨息難時時氣促在胸前只言水火相刑剋欲要痊除更問天牢者木也前後有水火相乘之象以牢為陰助水剋火故云命在天又云水火併於胸寒熱發於表之象以為牢脈也八動者陰也主四體虛崩中血痢動脈象艮山也不來不往曰動山止之貌動而不移也崩中血痢治之以赤石脂丸及禹餘糧湯動脈根源氣主陰三關指下礙沉沉血山一倒經年月志士名醫只可尋以衛為葉榮為根血去則根亡而葉凋此脈寸有尺無絕無根葉此尺脈第三同斷病也宜內補丹出元戎方一云動主血敗不止面色無光治之以養血氣八物湯當歸白芍藥地黃熟用白朮各一兩人參乾薑炮茯苓桂各半兩上㕮咀每服一兩生薑七片水煎食前服九細者陰也主腰痠髓冷乏力折精腎無所養陽不榮於下陰不榮於上陰陽不能相守乏力無精治法春夏地黃丸秋冬八味丸主之乏力無精脛里酸形容憔悴發毛干如逢冬季經霜月不療其疴必自痊細脈象巽風也為木風主發陽氣內不潤於皮毛致毛髮乾至秋則失秋時氣平故不療自愈此諸陽發於春夏諸陰發於秋冬故也普濟茴香丸主之上氣浮腫本在表宜解肌湯葛根黃芩各一兩麻黃去節半兩赤芍藥四錢上㕮咀一兩生薑七片水二盞煎至一盞去滓熱服食前若汗出浮腫是邪從汗出浮者陽也當發散而解之若不愈諸消腫藥治之肩息頻者喘者脈浮而滑亦在於表宜麻黃湯發表也十怪脈名一釜沸之狀如湯湧沸指下尋按之中央起四畔傾流有進有退殊無息數但見其為湧沸而起是為釜沸而已故曰如湯如羹蓋水火之相沸有激而為之者水勝火也火從上者也而與水相沸不得其已而終亡也脈至若是三陽之數極而亡陰之候蓋火為陽水為陰以陽亡陰以水勝火所以取於釜沸者名與義俱得之者也夫陰在內陽為之守也陽數極而亡陰則氣無所守故奔騰而沸湧氣亡則形亡此所以為必死且榮衛周流乎一身凡五十度是為百刻之常此以呼吸往來計之也釜沸之狀氣有出而無入有來而無往則計二十五度而終是為百刻之半故診見之旦占夕死夕占旦死二魚翔之狀宛如魚遊於水面但尾掉而身首俱不動其脈浮於膚上不進不退指下尋之其首定而尾緩搖時起時下有類乎魚之遊於水是為魚翔也夫魚之為物浮陽者也陽潛則在於淵未翔也陽升則在乎渚斯翔也脈至若是者乃以三陰數極不能與陽相使故動翔應診於膚表主腎與命門俱絕衛氣與榮血兩亡陰陽別論曰別於陽者知病從來別於陰者知死生之期脈至於此陰極而亡陽則不可期以日矣故夜半占日中死日中占夜半死三彈石之狀堅而促來遲去速指下尋之至搏而絕喻如指彈石辟辟然堅而不可入故曰彈石此真臟脈見也夫春弦夏洪秋毛冬石四時之常也故腎欲石然石而有胃氣為可治但石而無胃氣則死矣石之為物堅而且實方冬時氣沉而在骨故脈欲堅而實素問云冬日在骨蟄蟲周密君子居屋然而有胃氣存焉故曰應四時今胃氣先絕真脈獨見命本已喪何可久也不可期以時日惟見戊己日即死矣四解索之狀指下散亂息數無准或聚或散如繩索之解而無收約由腎與命門氣皆亡形枯髓竭故脈之應如是也夫索之為物糾而成之者也糾則合解則散合則包而實散則利而流內經曰冬脈如營萬物之所以合藏故兩尺之脈則宜糾而合包而實者為正今也根本離索真氣無所結固而解散不能以糾合矣則脈亦如之故解索之脈形於兩尺者以戊己日篤辰巳日死五屋漏之狀如屋之漏滴滴然不相連續或來或止時動時復其診亦如之謂之虛屋漏此脾胃已絕穀氣空虛失於長養之令者然耳夫脾主中州呼吸之間脾受穀氣脈行有常今胃氣與榮絡俱絕而呼吸不得其常則脈以應之如屋之漏時滴時止豈復能有常哉期以八日而死六蝦游之狀指下尋之若蝦游於水面不進不退瞥然驚掉而去冉冉尋之杳然不見須臾復於指下隱隱而來應診不動倏爾還去脈之異狀間忽有全類此者故目之曰蝦游病應其人魂魄飛揚而形獨存但略有少穀氣而無所附托也夫穀氣以真氣為本相附而周榮於一身以應十二脈之動今也真氣既喪而穀氣獨存則神無所依故魂魄飛揚矣魂陽也遊而無定魄陰也止而有守魂魄之所依真氣而已若無所依而飛揚則形與神不能相保遠者期以七日近者二日而死矣七雀啄之狀來而急數頻絕而止良久准前復來若雀啄食之狀蓋來三而去四也由脾元穀氣已絕於內腸胃虛乏無所稟藏而不能散於諸經則諸經之氣隨而亡竭矣夫五臟六腑生於真氣養於穀氣真氣亡則無所本穀氣亡則無所養無所本者死無所養者亦死四十三難曰平人不食飲七日而死胃中谷氣俱盡則雀啄之脈可見也八偃刀之狀尋之如循刀刃責責然無進無退其數無准故曰偃刀由心元血枯真火之象無所歸宿而胃氣獨居不能相為導續是傷於真心者如此心主血也肺主氣也血榮氣衛脈之所依以行血枯而衛氣獨居則心不能剋制而肺金勝矣刀金也金之為物剛而利也其脈之狀應於診者皆氣之使然也故有取於偃刀焉若是者期以四日而死九轉豆之狀脈來應指混然如豆之周旋展轉不進不退殊無息數故謂之轉豆者不通之象也血氣雖已敗然其動必轉焉及三元正氣已散五臟六腑空虛中無所流矣象曰行屍其死可立而待也十麻促之狀應指如麻子之戚促散亂分雜殊無均和之意蓋麻之生也其徵不一谷之甚細而分錯者也由肺元已絕衛氣已枯榮氣獨澀而陰陽錯亂故取於麻促之狀也輕者三日而死重者寅時死矣辨脈動止投數法脈一動一止二日死一經云一日死脈二動一止三日死脈三動一止四日死或五日死脈四動一止六日死脈五動一止七日死脈六動一止八日死脈七動一止九日死脈八動一止十日死脈九動一止十一日死經云十三日死若立春死脈十動一止立春死一經云立夏死脈十一動一止立夏死一經云夏至死脈十二動十三動一止者立秋死又一經云立冬死脈十四動十五動一止者立冬死一經云立夏死脈二十動一止一歲死又一經云立秋死脈二十五動一止二歲死一經云一歲死又云立冬死脈三十動一止三歲死脈四十動一止四歲死脈五十動一止五歲死脈來四十投而一止者一藏無氣卻後春草生而死脈來三十投而一止者二藏無氣卻後三歲麥熟而死脈來二十投而一止者三藏無氣卻後二歲桑椹赤而死脈來十投而一止者四藏無氣歲中死脈一來而久住者宿病在心主中脈二來而久住者病在肝支中脈三來而久住者病在脾下脈四來而久住者病在腎間脈五來而久住者病在肺支間五脈病虛羸人得之者死所以然者藥不得而治針不得而及如是壯盛人可治氣全故也五用乖違病脈察脈必以人迎氣口分內外所因者乃學診之要道也所以脈贊云關前一分人命之主然既有三因固不可盡詳而考之於理自備且如疲極筋力盡神度量飲食飢飽叫呼走氣房室勞逸及金瘡挫折虎狼毒蟲鬼疰客忤畏壓溺水等外非六淫內非七情內外不收必屬不內不外雖難經曰人迎緊盛傷於寒氣口緊盛傷於食殊不知飲食入胃能助發宿蘊其所以應於氣口者正由七情郁發因食助見本非宿食能應氣口且如宿食脈有浮大而微澀者有數而滑實者在陰則澀在陽則滑宿食不化脈則沉緊宿食成瘕脈則沉重此等各證皆曰傷胃曾何關於氣口耶且如疲極筋力其脈弦數而實筋痛則動皆傷肝也凝思則滑神耗則散皆傷心也絃動耗氣脈濡而弱叫呼走氣脈散而急皆傷於肺也房勞失精兩尺浮散男子遺精女子半產弦大而革皆傷腎也況臟寒蛔厥脈自微浮及為緊滑胃虛不食其脈必緩亦有微濡五飲停伏浮細而滑久蓄沉積沉細而軟形虛自汗脈皆微濡揮霍變亂脈自沉伏僵仆墜下脈則細滑踒折傷損瘀血在內疝瘕症癖五內作痛脈皆弦緊中寒症結脈則遲澀五積六聚食飲痰氣伏留不散隧道積滯脈皆促結三消熱中尺中洪大癲狂神亂關上洪疾氣實脈沉血實脈滑氣血相搏脈亦沉實婦人妊娠脈則和滑遁屍屍疰脈沉而不至寸或三部緊急鬼祟附著脈兩手乍大乍小乍短乍長陽邪來見脈則浮洪陰邪來見脈則沉緊鬼疰客忤三部皆滑洪大嫋嫋沉沉澤澤但與證不符者皆五屍鬼邪遁疰之所為也如診得此等脈證雖與人迎氣口相應亦當分數推尋三因交結四句料簡所謂單內單外不內不外亦內亦外亦不內外脈理微妙藝能難精又如忽見異像驚惑眩亂脈多失序急虛卒中五臟閉絕脈不往來譬如墮溺脈不可察與夫金瘡踒折頓走血氣脈亦無准學者當看外證不必拘脈診百病決死生法診人溫病三四日不得汗出脈大疾者生脈細難得者死診人溫病穰穰大熱其脈細小者死診人病甚而脈不調者難瘥診人病甚而脈洪易瘥診人頭痛目痛卒視無所見者死診人溫病下利腹中痛甚者死診人病汗不出出不至足者死診人病瘧腰脊強急瘛瘲者不可治診人熱病七八日氣不喘脈不數者當後三日溫汗汗不出者死診人熱病七八日其脈微細小便赤黃口燥舌焦乾黑者死熱病未得汗脈盛躁得汗者生不得汗者難瘥熱病已得汗脈靜安者生脈躁者難治熱病脈躁盛而不得汗者此陽之極也十死不治熱病已得汗脈常躁盛陽之極也亦死熱病已得汗常大熱不去者死熱病已得汗熱未去脈微躁者慎不得刺治也熱病發熱甚熱者其脈陰陽皆竭慎勿刺汗不出必不治診癲病脈實堅者生脈沉細小者死診人心腹積聚其脈堅急者生虛弱者死若腹大脹四肢逆冷其人脈形長者死診人心腹痛痛不得息脈細小遲者生堅大疾者死診人腸澼下膿血脈沉小流連者生數疾大熱者死診人腸澼下白沫脈沉者生浮者死診洞泄食不化下膿血脈數微小者生堅急者死診腸澼下膿血脈弦絕則死滑大則生凡腸澼之屬身不熱脈不弦絕滑大皆生弦澀皆死診諸腸澼下膿血有寒者生熱者死診諸腸澼其脈滑者生浮者死弦絕澀者皆死診咳嗽脈沉堅者死浮直者生診吐血衄血脈滑小弱者生實大者死診唾血脈堅強者死滑者生病吐血而嗽上氣其脈數有熱不得臥者死病咳嗽羸瘦脈堅大者死診傷寒咳嗽上氣其脈散者死謂其形損故也診嗽脫形發熱脈堅急者死診嗽而嘔腹脹而泄其脈弦細欲絕者死診諸咳嗽其脈浮軟者生沉伏者死診上氣脈數者死診人肌瘦脫肛形熱不去者死診上氣面浮腫肩息其脈大不可治加力必死診人消渴其脈數大者生細小浮短者死診人消渴脈實大病久可治脈小緊急不可治診人病蟲下蝕肛陰其脈虛小者生脈緊急者死診人腸澼筋攣其脈小細安靜者生浮大堅者死診人被風不仁痿厥其脈虛者生堅急疾者死診人上氣喘息低昂其脈滑手足溫者生脈澀四肢寒者死診人汗出若衄其脈小滑者生大躁者死診人陰陽俱竭者見其齒上如熟豆其脈小躁者死診人寒熱瘛瘲其脈代絕者死診金瘡血出太多脈虛細者生實大者死診人從高頓僕內傷臟腑其脈堅強者生小弱者死診傷寒熱盛脈浮大者生沉小者死診傷寒已得汗脈沉小者生浮大者死診心腹積聚其脈勁強者生沉小者死診厥逆汗出脈堅強急者生虛緩者死診水病脈洪者可治微細者不可治診水病陰閉其脈浮大者生沉細虛小者死診水病腹大如鼓脈實者生虛者死診泄注脈緩時小結者生浮大數者死診人內外身體俱冷而汗出微嘔而煩擾手足厥逆不得安靜者死診寒氣上攻脈實而順滑者生實而逆澀者死診金瘡出血脈沉小者生浮大者死診人卒得中惡脈大而緩者生堅而浮者死堅細而微者亦生診中惡吐血數升脈沉數細者死浮大而疾者生診人為百藥所傷脈微細者死洪大而速者生診老人脈微陽羸陰強者生脈躁大加息者死陰弱陽強脈至而代期月而死診熱病三五日身體熱腹滿頭痛食飲如故脈直而疾者八日死尺脈澀如堅為血實氣虛也其發病腹痛逆滿氣上衝此為婦人胞中絕傷有惡血久成結瘕黍穄赤而死脈來細而微者血氣俱不足細而來有力者穀氣不充得即轉動棗葉生而死左手寸口脈偏動乍大乍小不齊從寸口至關關上至尺三部之位處處動搖各異不同其人仲夏得此脈桃葉落而死右手寸口脈偏沉伏乍小乍大朝來浮大暮夜沉伏浮即太過魚際沉浮即不至關中往來無常時時復來者榆葉枯落而死左手尺部脈三十動一止又須臾還三十動一止乍動乍疏不與息數相應其人雖食谷猶不愈蘩草生而死右手尺部脈三十動而一止止而復來來如循直木如循張弓弦絙絙然如兩人共引一索至立春而死扁鵲診諸反逆脈法脈浮短者其人肺傷諸氣微少不過一季死法當嗽也脈湧湧不去者死脈分絕者死蓋上下分散也脈來洪大盛而堅硬者血氣俱盛實也病若閉目不欲見人脈當得肝脈強急而長而反得肺脈浮短而澀者死病若開目而渴心下牢者脈當得緊實而數反得濡而微者死病若吐血復鼽衄脈當得沉細而反浮大牢者死病若大腸泄脈當微細澀而反得緊大而滑者死又形脈與病相反者死病若頭痛目痛脈反澀者死病若四肢厥逆脈反浮大而短者死病若腹痛脈反浮大而長者死病若腹滿而喘脈反滑利者死病若耳聾脈反浮大而澀者死病若腦痛脈反大而緩者死左有病右痛下有病上痛此為逆逆者不可治脈來沉之即濡浮之不止推手者半月死人形病脈不病者生脈病形不病者死人病屍厥呼之不應脈絕者死脈當大反小者死肥人脈細小如絲欲絕者死羸人得躁脈者死人自澀而脈來往滑者死人自滑而脈來往澀者死人自小而脈來往大者死人自短而脈來往長者死人自長而脈來往短者死人自大而脈來往小者死尺脈上應寸口大遲者半日死診五臟六腑十二經脈皆有相反逆即為死候也辨七診脈法七診脈諸家經論不盡分別今顯脈形狀並疾病有可療者不可療者同論於中獨大者皮膚壯熱喘息上衝其脈通度三關多出少入與太過相似兩手並極此乃不治之疾獨小者四體微寒中膈氣閉腹沖兩脅其脈沉度於三關名曰獨小小者氣也不治之疾獨寒者惡寒也四肢俱冷伏陽在內其脈指下沉沉如爛綿按之不知所在此不治之疾獨熱者四肢俱熱臟腑亦熱其脈洪數故曰獨熱可治之疾獨遲者其脈三部俱遲氣在脾膚致有不安可治之疾獨疾者寸關急數尺脈微虛熱在於胃致使口乾心燥鼻塞頭痛可治之疾獨陷者其脈軟隱在肌肉陰陽並然四肢不舉疼痛在骨名曰獨陷可治之疾診三部脈虛實決死生法三部脈實長病得之不治三部脈虛長病得之不治虛而澀長病亦死虛而滑亦死虛而緩亦死虛而弦急癲癇亦死矣三部脈浮而結長病得之死浮而滑長病亦死三部脈弦而數卒病得之死三部脈微而伏長病得之死三部脈粗長病得之死卒病得之生三部脈潎潎如羹上肥長病得之死卒病得之生三部脈連連如蜘蛛絲長病得之死卒病得之生三部脈軟長病不治自愈卒病得之生三部脈如革長病得之死卒病得之生三部脈累累如貫珠長病得之死三部脈如水淹然流長病不治自愈三部脈如水之流者長病得之生卒病得之死三部脈實而滑長病得之瘥卒病得之死三部脈羸非其人得之死三部脈堅而數如張弓弦蠱毒病必死三部脈浮而數長病得之生卒病得之死三部脈數軟蠱毒病得之生三部脈細長軟長病得之生微而緊亦生三部脈芤長病得之生三部脈細而數長病得之生三部脈弦急長病得之生三部脈實而滑長病得之生實而緩則生實而緊亦生三部脈緊急癲病可治辨脈虛實法人有三虛三實者謂有脈之虛實有病之虛實有診之虛實也脈有虛實者脈來濡者為虛緊牢者實病有虛實者出者為虛入者為實言者為虛不言者為實緩者為虛急者為實有診之虛實者濡者為虛牢者為實癢者為虛痛者為實外痛內快為外實內虛內痛外快為內實外虛又邪氣盛則實精氣脫則虛何者是重實大熱病氣熱脈滿者是也脈盛皮熱腹脹前後不通為五實脈細皮寒氣少泄痢飲食不入為五虛辨損至脈法脈有損至何謂也曰至之脈一呼再至曰平三至曰離經四至曰奪經五至曰困六至曰命絕何謂損一呼一至曰離經二呼一至曰奪經三呼一至曰困四呼一至曰命絕此損之脈也至脈從下上損脈從上下也損脈之為病奈何曰一損於皮毛則皮聚而毛落二損於血脈血脈虛少則不能榮於五臟六腑三損於肌肉肌肉消瘦則飲食不為肌膚四損於筋筋緩則不能自收持五損於骨骨萎則不能起於床反此者至脈之病也從上下者骨萎不能起於床者死從下上者皮聚而毛落者死治損之法奈何曰損於肺者益其氣損於心者調其榮衛損於脾者調其飲食適其寒溫損於肝者緩其中損於腎者益其精此治損之法也察色論論曰聲合五音色合五行聲色符同然後定臟腑之榮枯若滋榮者其氣生如翠羽雞冠蟹腹豕膏烏羽是也枯夭者其氣敗如草滋衃血枳實枯骨如炲是也至於青赤見於春赤黃見於夏黃白見於長夏白黑見於秋黑青見於冬是謂五臟之生者以五行之相繼也得肝脈色見青白心脈色見赤黑脾脈色見黃青肺脈色見白赤腎脈色見黑黃是謂真藏之見者以五行之相剋也若肺風而眉白心風而口赤肝風而目青脾風而鼻黃腎風而肌黑以風善行數變故也肝熱而左頰赤肺熱而右頰赤心熱而顏赤脾熱而鼻赤腎熱而頤赤以諸熱皆屬火故爾以至青黑為痛黃白為熱青白為寒以五氣不同故爾鼻青為腹水氣白為無血黃為寒赤為有風鮮明為留飲而五色取決於此故爾然審病者又皆以真脾為本蓋真脾之黃是謂天之氣五色修明病雖久而面黃必生者以其真氣外榮故也察聲色決死生法凡人赤者欲如帛裹硃砂不欲如赭色也白者欲如白璧之色不欲如白堊也青者欲如蒼璧之色不欲如藍也黃者欲如羅裹雄黃不欲如黃土也黑者欲如漆不欲如炭也凡色青如草滋黑如炲黃如枳實赤如衃血白如枯骨有此五色者併為死候也凡青如翠羽黑如烏羽赤如雞冠黃如蟹腹白如豚膏有此五色者併為生候也病人耳目鼻口有黑色起入口者必死病人兩目皆有黃色起者其病當愈病人耳目及頰顴上赤者五日死病人有黑色出於額上及髮際至鼻脊兩顴上五日死病人及健人黑及白色入目鼻口者五日而死病人及健人面忽如馬肝色望之如青近之如黑者死病人口如魚口不能復閉而氣出多不返者死病人妄語錯亂及不能語者不可治熱病可治病人循衣縫譫言者不可治病人屍臭甚者不可治病人目回回直視肩息者一日中死病人面青人中反者三日死病人面無精光似土色不能食者四日死病人目無精光及牙齒黑色不可治病人面黃目黑九日死病人面白目黑者不可治病人面赤目白者十日死病人但張其口不能閉者三日死病人面赤目青者立即死病人面黑目白者八日死病人目系傾者七日死病人齒忽變黑者十三日死病人髮直者十五日死病人遺尿不覺者死病人唇口忽乾者必死病人爪甲青者必死病人頭目久痛卒視物不見必死病人舌卷及卵縮者死病人面黑目直視惡風者死病人面黃目白者不死病人面黃目青者死病人面黃目赤者不死病人面色青目白者死病人面目俱黃即不死病人面目俱白者即死病人面青唇黑者死病人發如干麻喜怒者死病人發與眉衝起者死病人面色黑兩脅下滿不能自轉反者死病人卒腫面色蒼黑者死病人手掌腫無紋者死病人臍腫反出外者死病人陰囊莖俱腫者死病人手足爪甲下肉黑者死病人汗出不流舌卷者死病人唇反人中滿者死病人陰陽絕目眶陷者死病人五臟已奪神氣不守聲嘶者死病人陰結陽絕目精脫恍惚者死病人陰陽俱絕裂衣掇空妄言者死病人陰陽俱泄絕失音不能言者死病人榮衛竭絕面浮腫者死病分氣血晝夜衰旺夫百病晝則增劇夜則安靜是陽病有餘乃氣病而血不病也百病夜則增劇晝則安靜是陰病有餘乃血病而氣不病也晝則氣行晝者陽也主行陽道也氣也無形質而象天也熱也火也動輕也主外也動而不息者也氣主呴之春也浮也夜者陰也主行陰道也血也有形質而象地也寒也水也靜重也主內也靜而濡潤者也血主濡之秋也降也冬也沉也病有夜則惡寒晝則安靜是陽氣自旺於本部也有夜則安靜晝則惡寒是陰氣上溢於中也有夜則惡寒晝亦惡寒此陰部太盛兼有其陽乃病之極矣亟瀉其陰峻補其陽病有晝則發熱夜則安然是陰氣自盛於本部也有晝則安然夜則燥煩是陽氣下陷於陰中也名曰熱入血室病有晝則操作夜則煩躁是陽極太盛兼有其陰當亟瀉其陽峻補其陰為陰氣將竭重陽者生重陰者死宜亟攻之病有晝則惡寒夜則煩躁飲食不入病名曰陰陽交交者死矣病機論論曰察病機之要理施品味之性用然後明病之本焉故治病不求其本無以去深藏之大患故掉眩收引膹郁腫脹諸痛癢瘡皆根於內夫百病之生也皆生於風寒暑濕燥火以知化之變也經言盛者瀉之虛者補之余昔以方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪汙工巧神聖可得備聞靈樞經曰刺久而猶可拔汙久而猶可雪莊子曰雪猶洗也岐伯曰審察病機無失氣宜此之謂也黃帝曰願聞病機何如岐伯對曰諸風掉眩皆屬於肝少慮無怒風勝則動肝者罷極之本魂之藏也其華在爪其充在筋以生血氣其味酸其色蒼為將軍之官謀慮出焉此為陰中之少陽通於春氣其脈弦王注曰肝有六大葉一小葉如木甲坼之狀經所謂其用為動火乃木之為動火太過之政亦為動蓋火木之主暴速所以掉眩也掉搖也眩昏亂也旋運皆生風故也是以風火皆屬陽陽主動其為病也胃脘當心痛上支兩脅膈咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆裡急緛戾脅痛嘔泄甚則掉眩癲疾兩脅下痛引少腹令人怒也虛則目視䀮䀮無所見善恐如人將捕之凡病肝木風疾者以熱為本以風為標故火本不燔遇風烈乃焰肝本不甚熱因金衰而王肺金不勝心火木來接於金故諸病作矣其為治也燥勝風王注曰風自木生燥為金化風余則制之以燥肝勝治以清涼之氣也木氣之下金氣承之又曰風淫於內治以辛涼肝欲散急食辛以散之故木主生榮而主春其性溫故風大則反涼而毀折是兼化制其木也故風病過急反而中外燥濕是反並金化也故非為金制其本是甚則如此中風偏枯者由心火暴甚而水衰不能制則火實剋金金不能平木則肝木勝而兼於火熱則卒暴僵仆凡治消癉僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也故內臟氣平則敷和太過則發生不及則委和諸痛癢瘡瘍皆屬於心靜則神明熱勝則腫心者生之本神之象變也其華在面其充在血脈為陽中之太陽通於夏氣其脈鉤其味苦其色赤為君主之官神明出焉此為主官陽中之陽也王注曰心形如未敷蓮花中有七空以導引天真之氣神明之宇也經所謂其用為燥火燥性動其明於外熱甚火赫爍石流金火之極變也燔𤋲山川旋及屋宇火之災眚也故火非同水水智而火愚其性暴速其為病也當胸中熱嗌乾右脅滿皮膚疼痛寒熱咳嗽唾血血泄鼽衄嚏嘔溺色變甚則瘡癢胕腫肩背臑痛缺盆中痛瘍疼身熱驚惑惡寒戰慄譫妄悲忘衄蔑語笑瘡瘍血流狂妄目赤胸中痛脅支滿脅下痛胸膺肩胛間痛背痛虛則胸腹大脅下與腰背相引而痛其為治也以寒勝熱王注曰小熱之氣涼以和之大熱之氣寒以取之甚熱之氣汗以發之發之不盡制之制之不盡求其屬以衰之又曰壯水之主以制陽光經曰氣有多少病有盛衰治有緩急方有大小此之謂也是以熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之心欲耎急食鹹以耎之君火之下陰精承之木氣之下是故火主暴虐也故燥萬物者莫暵乎火夏月火熱極甚則先失氣熏味而萬物反潤以水出液林木津流及體熱極而反汗液出是火極而反兼水化俗以難辨認是作非不治巳極反攻王氣是不明標本但隨兼化之虛象妄為其治反助其病而害於生命多矣故此藏平則升明太過則赫曦不及則伏明王注曰百端之起皆自心生諸濕腫滿皆屬於脾味知氣化濕勝則濡泄脾者倉稟之官本營之居也名曰器能化糟粕轉味而出入者也其華在唇其充在肌其味甘其色黃又名諫議之官五味出焉此至陰之類通於土氣為陰中至陰脾也其脈緩王注曰脾形象馬蹄內包胃腕象土形也其用為化兼四氣聚散復形群品以生溉灌肝心腎肺主於時寄王四季經所謂善不可見惡可見也其液入驟注其災霖潰其為病也胕腫骨痛陰痹按之不得腰脊頭頸痛時眩大便難陰氣不用飲食不欲咳唾則有血積飲痞膈中滿霍亂吐下為善飢肉痿足不收脅䐜嘔吐泄注下王注曰脾熱之生虛則腹滿腸鳴飧泄食不化者有胃之寒者有胃之熱者色白澄澈清冷皆屬於寒色黃水赤渾濁皆屬於熱故仲景曰邪熱不殺穀水性疾速此之謂也其為治也風勝濕濕自土生風為木化土余則制之以風脾盛治之以燥故濕傷肉濕勝則濡泄甚則水閉胕腫王注曰濕為水水盛則腫水不行肉色已消又曰濕氣為淫皆為腫滿但除其濕腫滿自衰若濕氣在上以酸吐之濕氣在下以苦泄之以淡滲之治濕之法不下小便非其治也故濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之若濕上甚而熱治以苦溫佐以甘辛以汗為散而止濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之脾苦濕急食苦以燥之又曰土氣之下木氣承之本草曰燥可去濕桑皮赤小豆之屬王注曰半身以上濕氣有餘火氣復郁所以明其熱能生濕經所謂風寒在下燥熱在上濕氣在中火遊行其間是以熱為用矣故土主濕雲雨霒而宏靜雨熱極甚則飄驟散落是反兼風木製其土也若脾濕土自壅燥去其濕以寒除熱脾土氣衰以甘緩之所以燥泄積飲痞膈滿腫濕熱乾涸消渴慎不可以溫藥補之故積溫成熱性之溫乃勝氣之藥也臟喜新而惡陳常令滋澤無使乾涸故此土平則備化太過則敦阜不及則卑監諸氣膹郁皆屬於肺肺氣常清利燥勝則乾肺者氣之本魄之處也其華在毛其充在皮其味辛其色白而為相傅之官治節出焉為陽中之少陽通於秋氣其脈毛王注曰肺之形象人肩二大葉一小葉中有二十四空行列以布分諸臟清濁之氣經所謂其用為固其變肅殺其眚蒼落其為病也骨節內變左胠脅痛寒積於中感雪太涼變候咳腹中鳴注泄鶩溏咳逆心脅滿引小腹善暴痛不可反側嗌乾面塵色惡腰痛丈夫㿗疝婦人少腹痛浮虛鼽尻陰股髀腨胻皆病皴揭實則喘咳逆氣肩背痛汗出尻陰股膝髀虛則少氣不能報息耳聾嗌乾其為治也熱勝燥燥自金生熱為火化金余則制之以火肺勝則制之以苦又曰金氣之下火氣承之燥淫於內治以苦溫佐以苦辛以苦下之若肺氣上逆急食苦以泄之王注曰制燥之勝必以苦溫故受干病生焉是以金主於秋而屬陰其氣涼涼極天氣清明而萬物反燥若火是金極而反兼火化也故病血液衰也燥金之化極甚則煩熱氣鬱痿弱而手足無力不能收持也凡有聲之痛應金之氣故此臟氣平則審平太過則堅成不及則從革也諸病寒熱皆屬於腎水靜養動耗寒勝則堅腎者主蟄封藏之本精之處也其華在發其充在骨其味鹹其色黑為作強之官伎巧出焉為陰中之陰通於冬氣其脈石王注曰腎臟有二形如二豆相併而曲附於膂筋外脂里白表黑主藏精故仙經曰心為君火腎為相火是言在腎屬火而不屬水也經所謂膻中者臣使之官喜樂出焉故膻中者在乳之間下令在於腎是火居水位得升則喜樂出焉雖君有二火之氣論其五行造化之理同為熱也故左腎屬水男子以藏精女子以系胞右腎屬火遊行三焦興衰之道由於此故七節之旁中有小心是言命門相火也經所謂其變凝冽其清冰雹其為病也寒客心疼腰腿痛大關節不利屈伸不便苦厥逆痞堅腹滿寢汗實則腹脛腫喘咳身重汗出憎風虛則胸中痛大小腹痛清厥意不樂王注曰大小腹大小腸也此所謂左腎水發痛也若夫右腎命門相火之為病少氣瘡瘍疥癬癰腫脅滿胸背首面四肢浮腫腹脹嘔逆瘛瘲骨節痛引動注下溫瘧腹中暴痛血溢流注精液目赤心熱甚則瞀昧暴痛瞀悶懊憹𠸻嘔瘡瘍驚躁喉痹耳鳴嘔湧暴注瞤瘛暴死瘤氣結核丹熛皆相火熱之勝也其為治也寒勝熱熱勝寒若熱淫於內治以鹹寒火所勝平以鹹冷故相火之下水氣承之如寒淫於內治以甘熱佐以甘辛寒淫所勝平以辛熱又曰腎苦燥急食辛以潤之腎欲堅食苦以堅之故水本寒寒極則冰水如地而能載物冰發而雹雪是水寒亢極反似剋水之土化是謂兼化也所謂寒病極者反腎滿也左腎不足濟之以水右腎不足濟之以火故此髒水平則靜順不及則涸流太過則流衍諸厥固泄皆屬於下厥謂氣逆固謂禁固氣逆則肝腎失守失守則不能禁固出入無時燥濕不恆故氣下則愈也經所謂厥氣上行滿脈去形諸痿喘嘔皆屬於上肺者臟之長也為心之華蓋故肺熱葉焦發痿躄是氣鬱不利病喘息而嘔也嘔謂嘔鹹水火氣炎上之象也胃膈熱甚則為嘔也若衰火之炎痿躄則愈利肺之氣喘息自調也道路開通吐嘔則除凡病嘔湧溢食皆屬之火也王注曰內格嘔逆食不得入是有火也經所謂三陽有餘則為痿易王注曰易有變易常用自痿弱無力也故此者熱之明矣諸熱瞀瘛皆屬於火熱氣甚則濁亂昏昧也瞀瘛乃昏也經所謂病筋脈相引而急名曰瘛者故俗謂之搐是也熱勝風搏並於經絡故風主動而不寧風火相乘是以熱瞀瘛而生矣治法祛風滌熱之劑折其火勢熱瘛可立愈若妄加灼火或飲以發表之藥則取死不旋踵諸禁鼓慄如喪神守皆屬於火禁慄驚惑如喪神守悸動怔忡皆熱之內作故治當以制火劑其神守血榮而愈也諸痙項強皆屬於濕寒濕同性水火同居故足太陽膀胱經屬水而下所以濕可傷也其脈起目內眥上額交於顛上其支者從顛入絡於腦還出別下項故主項強太陽表中風加之以濕客於經中內挾寒濕則筋脈搐急故頸項強而不柔如此太陽傷濕當詳有汗治以疏濕祛風緩發表而愈也諸逆衝上皆屬於火沖攻也火氣炎上故熱甚則鬱於內也諸脹腹大皆屬於熱肺主於氣貴乎通暢若嘔湧溢食不下也肺脹而腹大是以火主長而高茂形見彰顯升明舒葉皆腫之相也熱去則見順利也諸躁狂越皆屬於火胃實則四肢實而能登高也故四肢者諸陽之本經所謂陽勝陰則脈流薄疾病乃狂是以陽勝則使人妄言罵詈不避親疏神明之亂也故上善若水下愚若火此之謂也治之當以補陰瀉陽奪其食則病已也諸暴強直皆屬於風暴虐而害也強勁有力而不能和柔也乃厥陰風木勢甚而成此王注曰陽鬱於內而陰行於外千金曰強直為風治瀉火補金木能自平也諸病有聲鼓之如鼓皆屬於熱腹脹大而敲之有聲如鼓者熱氣甚則然也經所謂熱勝則腫此之類也是以熱氣內郁不散而聚所以扣之如鼓也諸腹脹大皆為里證何以明之仲景曰少陰病腹脹大不便者急下之宜大承氣湯所謂土勝水則干急與大承氣湯下之以救腎水故知無寒其熱明矣諸病胕腫疼酸驚駭皆屬於火胕腫熱勝於內則傷氣滯故也疼酸由火實制金不能平木則木王而為酸者肝之味也故經所謂二陽一陰發病主驚駭王注曰肝主之原火其本也自心火甚則善驚所以驚則動而不寧也故火衰水平治之本也諸轉反戾水液渾濁皆屬於熱熱氣燥爍於筋故筋轉而痛應風屬於肝也甚則吐不止暍熱之氣加之以泄濕勝也若三氣雜乃為霍亂故仲景曰嘔吐而利名為霍亂故有乾霍亂濕霍亂得其吐利邪氣得出名曰濕霍亂也十存八九若不得吐利揮霍撩亂邪無所出名曰乾霍亂十無一生者皆以冒暑中熱飲食不節寒熱氣不調清濁相干陰陽乖隔則為此病若妄言寒者大誤矣故熱則小便渾而不清寒則潔而不濁故井水煎湯沸則自然混濁也諸病水液澄澈清冷皆屬於寒水液為病寒也故水清淨其氣寒冷水穀不化而吐利其色白腥穢傳化失常食已不飢雖有邪熱不殺穀而不飢者無倦而常好動其便色黃而酸王注曰寒者上下所以出及吐出溺出也又曰小寒之氣溫以和之諸嘔吐酸暴注下迫皆屬於熱流而不腐動而不蠧吐嘔吐酸者胃膈熱甚則鬱滯於氣物不化而為酸也酸者肝木之味或言吐酸為寒者誤也暴注者是注泄也乃腸胃轉化失常經所謂清氣在下則生飧泄下迫者後重裡急窘迫急痛也火性急速而物不化故也俗云虛坐弩責而痛也諸澀枯涸乾勁皴揭皆屬於燥澀枯者水液氣衰少血不榮於皮肉氣不通利故皮膚皴揭而澀也及甚則麻痹不仁涸乾者火多水少繫辭云燥萬物者莫暵乎火故火及熱甚水溢干而不調潤於身皮膚乃啟裂手足有如斧傷而深二三分者冬月甚而夏月衰故法曰寒能收斂收斂則燥澀皴揭熱能縱緩則滋榮潤澤此皆屬燥金之化也王注曰物之生滑利物之死枯澀其為治也宜開通道路養陰退陽涼藥治之榮血通流麻木不仁澀涸幹勁皴揭皆得其所慎勿服烏附之藥經所謂金木水火土運行之數寒暑燥濕火風臨御之化則天道可見民病可調凡受諸病者皆歸於五行六氣勝復盛衰之道矣王注曰人生有形不能無患既有其患亦常有逃生化出陰陽者也故曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令得調達而致和平此之謂也三因論夫人稟天地陰陽而生者蓋天有六氣人以三陰三陽而上奉之地有五行人以五臟六腑而下應之於是資生皮肉筋骨精髓血脈四肢九竅毛髮齒牙唇舌總而成體外則氣血循環流注經絡喜傷六淫內則精神魂魄志意喜傷七情六淫者寒暑燥濕風熱七情者喜怒憂思悲恐驚若將護得宜怡然安泰役冒非理百病生焉病症既成須尋所自故前哲示教謂之病源經不云乎治之極於一者因得之閉戶塞牖系之病者數問其經以從其意是欲知致病之本也然六淫天之常氣冒之則先自經絡入內合於腑臟為外所因七情人之常性動之則先自臟腑郁發外形於肢體為內所因其如飲食飢飽叫呼傷氣盡神度量疲極筋力陰陽違逆乃至虎狼毒蟲金瘡踒折疰忤附著畏壓溺等有背常理為不內外因金匱有言千般疢難不越三條以此詳之病源都盡如欲救療就中尋其類例別有三因或內外兼併淫情交錯推其深淺斷以所因為病源然後配合諸證隨因施治藥石針艾無施不可內外傷論辨脈古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是但其說有所未盡耳外感風寒有餘之證是從客邪來也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裡乃行陰二十五度故外感寒邪則獨左寸人迎脈浮緊按之洪大緊者急甚於弦是足太陽寒水之脈按之洪大而有力中見手少陰心火之脈下與壬合內顯洪大乃傷寒脈也若外感風邪則人迎脈緩而大或大於氣口一倍或兩倍三倍內傷飲食則右寸氣口脈大於人迎一倍傷之重者過之少陰則兩倍太陰則三倍此內傷飲食之脈若飲食不節勞役過甚則三脈遍見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經曰侮所不勝寡於畏者是也故氣口脈急大而數時一代而澀也澀者肺之本脈代者元氣不相接脾胃不及之脈洪大而數者心脈刑肺也急者肝脈挾心火而反克肺金也若不甚勞役惟右關脾脈大而數謂獨大於五脈數中微緩時一代也如飲食不節寒溫失所則先右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也宿食不消則獨右關脈沉而滑經云脈滑者有宿食也以此辨之豈不明白易見乎辨寒熱外傷寒邪之證與飲食不節勞役形質之病及內傷飲食俱有寒熱舉世盡將飲食失節勞役不足之病作外傷寒邪有餘表實之證反瀉其表枉死者多矣外傷寒邪發熱惡寒寒熱並作其熱也翕翕發熱又謂之拂拂發熱發於皮毛之上羽毛之拂明其熱在表也是寒邪犯高之高者也皮膚毛腠者陽之分也是謂之元氣所滋養之分也以寒邪乘之郁遏陽分不得伸故發熱也其面赤鼻氣擁塞不通心中煩悶稍似袒裸露其皮膚已不能禁其寒矣其表上虛熱止此而已其惡寒也雖重衣下幕逼近烈火終不能御其寒一時一日增加愈甚必待傳入里作下證乃罷其寒熱齊作無有間斷也其內傷飲食不節或勞役所傷亦有頭痛項強腰痛與太陽表證微有相似余皆不同論中已辨之矣內傷不足之病表上無陽不能御風寒也此則常常有之其燥熱於腎者間而有之與外中寒邪略不相似其惡風寒也蓋脾胃不足營氣下流而乘腎肝此痿厥氣逆之漸也為胃氣平常飲食入胃其營氣上行以輸其心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所稟受皮膚間無陽失其營衛之外護故陽分皮毛之間虛弱但見寒或居陰寒處無陽日處便惡之也此常常有之無間斷者也但避風寒及溫暖處或添衣蓋溫養其皮膚所惡風寒便不見矣是熱也非表傷寒邪皮毛間發熱也乃腎間受脾胃下流之濕氣閉塞其下致陰火上衝作蒸蒸而燥熱上徹頭頂旁徹毛皮渾身燥熱作須待裸衣露居近寒涼處則已或熱極而汗出亦解彼外傷惡寒發熱豈有汗出者乎若得汗出則病愈矣以此辨之豈不如黑白之易見乎當內虛而傷之者燥熱也或因口吸風寒之氣鬱其陰火使咽鬲不通其吸入之氣欲入為鬲上衝脈之火所拒使陰氣不得入其胸中之氣為外風寒所遏鬱郁而不得伸令人口開目瞪極則聲發於外不能上下塞於咽中而氣欲絕又或噦嘔咽吐而燥熱發必有所因凡有此證其表虛惡風寒之證復見矣表虛之弱為陰火所乘燥發須臾而過表虛無陽不任風寒復見矣是表虛無陽常常有之其燥熱則間而有之此二者不齊作燥作寒已寒作燥已非若外傷之寒熱齊作無有間斷也百病俱有身熱又謂之肌熱又謂之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待陰陽既和汗出則愈矣慎不可以此上辨之以其虛實內外病皆有之故難辨耳只依先說病人自覺發熱惡寒之熱及躁作之熱上辨之為準則矣辨外感內傷惡風外感八風之邪乃有餘之證也內傷飲食不節勞役所傷皆不足之病也其內傷亦惡風自汗若在溫暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似細分之時異耳外感風邪自汗頭痛鼻流清涕常常有之一日一時增加愈甚直至待入里作下證乃罷語聲重濁高厲有力鼻息壅而不通能食腹中和口別味大小便如常筋骨疼痛不能動搖便著床枕非扶不起其內傷與飲食不節勞役所傷者亦惡風居露地中兼大漫風起卻不惡也惟門窗隙紙中賊風來大惡也與傷寒傷風俱不同矣況鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或不下或不飲食三者互相有之腹中不和或腹中急而不能伸口不別五穀之味小便頻數而不渴初勞役得病食少小便赤黃大便常難或秘或結或虛坐只見些小白膿時有下氣或泄黃如糜或溏泄色白或結而不通若心下痞或胸中閉塞如刀劙之痛二者亦互相見不並出也有時胃脘當心而痛上肢兩脅痛心臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胸中其氣無止息甚則高喘熱傷元氣令四肢不收無氣以動而懶倦嗜臥其外感風寒俱無此證故易為分別耳復有一等乘天氣大熱之時在於路途田野中勞形得之更或有身體薄食少勞役過甚又有修善長齊之人有氣久虛而因勞役得之者皆與陽明熱白虎湯證相似必肌體捫摸之壯熱必躁熱悶大惡渴而飲水以勞過甚之故亦身疼痛始受病之時特與中熱得有餘之病相似若誤與白虎湯旬日必死此證脾胃太虛元氣不足鼻口中氣皆短促而上喘至日轉以後足陽明得時之際病必可減若是外中熱之病必到日晡之際大作譫語其熱增加大渴飲水煩悶不止其勞役不足者皆無此證尤易為分解若得有難決疑似之證必當待一二日而求醫治療必不至錯矣或因勞役動作腎間陰火沸騰事閒之際於大舍之內或於陰涼處或解脫衣裳更有新浴或身閒於背陰處坐臥其陰火不行還歸腎間皮膚腠理極虛無陽但風來或為寒涼所遏表虛不任其風寒自認外感風寒求醫解表以重絕元氣取禍如翻掌苟幸而免者致虛勞氣血皆弱不能完復且表已虛之人為風寒所遏亦是虛邪犯表始病一二日之間時與外中賊邪有餘之證頗有相似處故致疑惑諸醫者只於氣少氣盛上辨之其外傷賊邪必語聲前輕後重其聲高厲而有力若是勞役所傷飲食不節表虛不足之病必短氣氣促上氣高喘懶語如有所問難勉強對答一兩句其聲困弱而無力至易見也分內外傷治法內經調經篇云夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑乃天之邪感則傷人五臟是八益之邪故曰風從上受之其中人也高俗言傷風傷寒者是也治法邪在皮者汗而發之其生於陰者得之飲食居處陰陽喜怒乃水之寒熱感則害人六腑是七損之病故曰濕從下受之經言飲食勞倦則傷脾俗言內傷飲食是也又云勞則氣耗熱伏榮中陽氣不得伸故頭痛耳鳴九竅不利皆腸胃之所生也治法邪在下者引而竭之帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛此重明八益之邪傷人中人也高是客邪表受風寒帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故決然不痛此清虛之地氣傷人也必從足始故曰地之濕氣感則害人皮肉筋脈夫百病之變皆生於風雨寒暑及飲食居處陰陽喜怒針經解云若身形不虛外邪不能傷故知百病皆由喜怒不節勞役形體飲食不調胃氣一失榮氣不生陰火乘之清氣伏匿於下焦陰火陰血上湧閉塞九竅元氣逆行百病之變由是來矣是知清靜之氣不可妄勞胃氣不可不養若能志閒而少欲心安而不懼形勞而不倦乃天清地淨百骸和暢得盡天年帝曰善陰之生實奈何岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走上故曰實矣夫陰氣逆上者盛怒得之非喜也喜則氣和此喜之一字傳寫誤矣前已有說血之與氣並走於上則為大厥厥則暴死是謂盛怒也先說熱中一段內云血並於上為善怒舉此兩段為證言喜者誤矣帝曰陰之生虛奈何岐伯曰喜則氣下悲則氣消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣辨云陰虛者說飲食居處陰陽喜怒按陰陽應象大論云喜怒傷氣今言喜氣下行者非也喜則氣和以此證之飲食勞倦是為陰病非陽喜之病皆陽氣不足陰氣有餘但遇天陰寒心不樂病必增加故言悲則氣消若遇晴暖心喜樂或美食充口其病皆去聖人立法只宜補陽復其陽道知非喜傷氣也帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也此一段帝問在表陽病在裡陰病四證陽虛則外寒陽勝則外熱此明客邪傷表六淫有餘之證陰虛則內熱陰盛則內寒飲食脾胃病始於熱中終於寒中岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通則寒氣獨留於外故寒慄陰慄謂心寒慄也非戰動又明陽虛生外寒此風寒傷表有餘病也陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱此再明濕從下受之病之形狀乃水穀之寒熱則害人六腑此中焦不足脾胃先受病乃飲食勞倦始受熱中陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞不通衛氣不得泄越故外熱此乃末傳客寒化熱當下也故經云人之傷於寒則為病熱是也陰盛生內寒奈何岐伯曰厥氣下密寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則血脈不通其脈盛大以澀故中寒此再明脾胃不足勞役形體中焦榮氣受病末傳寒中惟宜補陽瀉陰帝曰陰與陽並血氣以並病形以成刺之奈何岐伯曰刺此者取之經隧取血於營取氣於衛用形哉因四時多少高下此一段明脾胃榮氣不足從陰引陽並瀉血絡經隧榮者主血陰氣也衛者主氣陽氣也夫行針之道必先知形之長短骨之廣狹循三備法通計身形以施分寸故曰用形也四時多少高下具在下篇此脾胃不節榮衛不行始病熱中經隧陰血三里陽氣帝曰血氣以並病形以成陰陽相傾補瀉奈何此復問八風表邪及傷寒客邪在外有餘之證惟宜瀉之血氣以並及陰病勞役脾胃濕從下受中虛不足之證岐伯曰瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃屈言欲開其穴而泄其邪氣切謂急也言急出針也予詳切字之義非急出針也切其穴路以防真氣泄止出其針以利其路獨令邪氣出令針頭引出其邪恐針帶出真氣此切之意也針解論云疾而徐則虛者疾出針而徐按之也大氣謂大邪氣也屈謂退伏也有餘外證帝曰補虛奈何岐伯曰持針勿置以定其意候呼內針氣出針入針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之此治法不足內病脾胃也帝曰夫子言虛實者有十生於五臟五脈耳夫十二經脈皆生其病按甲乙經曰皆生百病太素同今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之岐伯曰五臟者故得六腑以為表裡經絡之節各生虛實其病所居隨而調之病在脈調之血心主脈脈主血榮病治在心調血脈病在血調之絡肝主血血病治在肝調之絡病在氣調之衛肺主氣其病治在衛此五臟之氣也視何臟以調之病在肉調之分肉脾主肉病在血絡以鋒針決之故曰血實宜決之病在筋調之筋肝主筋病在筋治在肝血病在骨調之骨腎主骨骨病治在腎熱則疾之寒則留之燔針劫刺其下及與急者筋病在脾者以燔針劫刺治在經筋急者熨絡先令氣行也病在骨淬針藥熨腎主骨以大寒為骨痹者先藥熨淬刺淬刺即燔針也病不知所痛兩蹺為上病在陰蹺陽蹺癲癇瘛瘲不知所苦兩蹺為上者取中脈穴是足太陽太陰外踝下也身形有痛九候莫辨則繆刺之病在於左而右脈病者巨刺之大氣不能過關尺者巨針刺之必矣謹察其九候針道備矣調經篇云夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒夫風雨寒暑者自外而感傷其形傷形為有餘當瀉之仲景之書已備至於飲食居處陰陽喜怒自內而致傷其氣傷氣為不足當補之諸書所載略而未詳今隨證立方並四時加減詳論之諸方載脾臟門飲食勞倦類醫學發明沖督任脈云二十八難曰奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裡上至風腑入屬於腦任脈者起於中極之下以上毛際循腹裡上關元至咽喉衝脈者起於氣衝並足陽明之經夾臍上行至胸中而散夫督任沖三脈者為一源始於二陰之間分為三脈任脈者起於會陰穴根於曲骨入前陰中出腹裡過臍上行附足厥陰之經為生化之源也貫穿諸經無所不繫焉沖者分為二道起於會陰根於氣衝為二道入腹中夾臍兩旁上行附足陽明之脈至胸中而散一說上至腦耳上角下至足內踝絡跗上若搐如引繩之狀上下動之若一貫諸經之脈無所不到以其從胃脈故也十二經之海也併為生化升降之主督脈者出於會陰根於長強上行脊裡至於巔附足太陽膀胱之脈膀胱者謂陽之首又曰巨陽榮衛之氣系焉督脈為附督者都也能為表裡上中下十二經之病焉此督任沖三脈之起末也今邪客沖督二脈系根在下焦下焦者里也地道也血也陰分也自臍以下至足少陰分下至骨髓主行陰二十五度於夜所受之邪客之於內俗呼為雜病焉散於十二經絡百病形相無有定止其邪之張也有若流水犯於少陰之脈甚則煩心神明不安加勞役則如干霍之狀瞋目則魂如去浪甚則內閉九竅外壅肌肉衛氣散解陽道不行名曰煎厥乃陰氣大盛大勢之來也其苦百端不可名狀病之重者無過於此折人天年治當從陰引陽先瀉沖督以三稜針挈其陰火是治其源瀉以苦寒之劑佐以辛熱乃寒因熱用為下焦如瀆經云在下者引而竭之聖人之法以其近於二陰故從權也然閉於便溺者可也如便溺已通不當利大小便宜泄之於其內急宜苦酸味薄者從陰中以升發陽氣佐以辛甘溫熱於陽分使得徹於皮毛衛氣之分亦是助榮衛之氣此藥若服當一大瀉此一瀉反助陰氣從權泄熱不得已而用之不極勿用當從火鬱是為上治從陰發陽候其陽道升氣平乃止骨空論三脈為此類頗異三十六難曰臟各有一耳腎獨有兩者何也曰腎兩者非皆腎也左為腎右為命門命門者諸精神之舍元氣之所繫也故男子以藏精女子以系胞故知腎有一也潔古云一者男子婦人皆以左為腎右為命門男子藏精者氣海也婦人系胞者血海也所主者二受病者一也東垣云夫腎有兩者分水火之異左腎屬水腎氣通於耳又主骨又主大便難取足少陰右腎屬火男子藏精施化婦人系胞有孕啟玄子曰男曰作強女曰技巧造化形容生化則異受病則同叔和云尺脈第三同斷病又云積液多成唾水勝也焦煩水易虧火勝也水勝則瀉水火勝則瀉火仲景以姜附湯瀉水大承氣湯瀉火是傷寒變證也人人生命皆繫於此得不辨乎三十七難曰邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五臟則陰脈不和陰脈不和則血留之血留之則陰脈盛矣陰氣太盛則陽氣不得榮也故曰格陽氣太盛則陰氣不得榮也故曰關陰陽俱盛不得相榮也故曰關格關格者不得盡其命而死矣經言氣獨行於五臟不榮於六腑者何也曰氣之所行也如水之流不得息也故陰脈營於五臟陽脈營於六腑如環之無端莫知其紀終而復始而不覆溢人氣內溫於臟腑外濡於腠理解云邪在五臟者以明水穀之寒熱感則害人六腑是飲食不節勞役形體以傷六府元氣有虧陽氣不行便為七損之病五臟乃傷內經云陰虛生內熱傳變之極則陰盛生內寒者是也邪在六腑者是明天之邪氣感則傷人五臟是外生風邪八風之變天有八風人有五臟乃八益之邪外傷筋骨筋骨疼痛非扶不起謂系屬五臟故以五臟明之也內經復解之云陽虛生外寒傳變甚則雲陽甚生外熱與此意同故外傷風寒者謂之寒傷形筋骨乃應內傷飲食勞役者謂之熱傷氣肺之元氣乃應皆始受病之邪也又曰五臟不和則九竅不通正謂飲食不節勞役形質脾胃有傷奇邪陰火之作過也六腑不和則留結為癰陽氣盛有餘之邪也經曰風寒傷形憂恐忿怒傷氣氣傷臟乃病臟病形乃應形傷筋骨乃應此形氣內外之相應也天之邪氣風寒六淫客邪有餘之變始則陽受外寒暮傳下行入里而為陽盛生外熱飲食所傷水穀之寒熱先為憂喜忿怒所傷元氣飲食勞役為之變應諸病從此變而不出矣故憂喜忿怒飲食不可不慎也
