body:
  text: 卷三百二十三婦人諸疾門血風勞氣附論夫婦人血風勞氣者由氣血虛損經候不調或外傷風邪內挾宿冷致使陰陽不和經絡痞澀腹中堅痛四肢痠痛月水或斷或來面色痿黃羸瘦又有因產後未滿百日不謹將護臟腑虛損百脈枯竭遂致勞損久不瘥則變寒熱休作有時飲食減少肌膚瘦瘁遇經水當至即頭目昏眩胸背拘急四肢痠痛身體煩熱足腫面浮或經水不通故謂之血風勞氣也方琥珀丸出大全良方治血風虛上熱下冷或發動即心中煩熱困乏無力不美飲食酸心口瘡月水不調肌肉瘦腹痛腹鳴或有氣塊攻衝或時作寒熱頭旋痰逆手足麻痹並亦常服琥珀當歸木香川芎防風檳榔各四兩三稜炮桂心各一分白朮洗柴胡人參各三分青皮吳茱萸洗炮去黑全蠍炒附子炮草蔻赤芍藥柏葉白芷各等分桃仁去皮尖炒敗龜甲酥炙各六兩天麻三分上薄黃麵糊丸補中丸出余居士方治婦人虛損諸疾川芎白芍藥黃耆當歸人參各半兩白朮地黃各一兩陳皮半兩上為細末蜜丸如梧桐子大每服五十丸至七十丸溫水下人參養血丸出永類鈐方治婦人稟受素弱血氣虛損常服補衝任調經候暖下元生血氣烏梅肉三兩熟地黃五兩當歸二兩川芎赤芍藥蒲黃炒各一兩人參一兩上為細末蜜丸如梧桐子大每服八十丸溫酒米飲任下加減大建中湯治婦人胎前產後一切虛損月水不調臍腹㽲痛往來寒熱自汗口渴芍藥二兩當歸川芎黃耆桂各一兩甘草炙白朮各三分上為末每二錢半水一盞半生薑棗同煎至六分去滓食前溫服溫中丸治衝任虛損血氣虧傷月水斷續來不應期或多或少腹中㽲痛不實客熱煩壅咽燥舌乾心神忪悸頭目暈眩肢體倦怠腰背引痛筋脈拘急帶下赤白飲食進退或發寒熱生地黃生薑二味各一斤切碎研取汁將炒地黃汁卻將地黃汁炒生薑白茯苓去皮黃耆蜜炙延胡索炒麥門冬去心烏梅肉焙以上九味各一兩上為末別用白艾葉一斤水一斗取濃汁熬成膏和前藥外加牡蠣龍骨各一分上為末每服三錢水一盞生薑兩片棗二枚同煎取一盞空心去滓吃若經候流下不止請和滓吃無妨治婦人肝腎冷外感寒氣伏在子宮血海虛損經後過多小便如米泔汁背上有一片寒冷時口中即吐清水吃食減少氣力微細宜服此方出護命方當歸補骨脂牛膝續斷川芎各半兩吳茱萸獨活細辛各一分川椒三銖去黑皮上為末煉蜜丸如梧桐子大空心鹽米湯下三十丸治婦人血海虛損血下不禁每經候行時流下數日不止面色青黃身體倦怠無問老少血山崩倒俱可進服出護命方當歸續斷五味子芎藭蒼朮龍骨萆薢赤石脂火煅石斛去頭牡蠣火煅人參各半兩獨活炙艾葉各一分上為末每服五錢水一盞煎七分入鹽煎取一盞四分空心去滓吃兩三服未止急煉蜜丸如梧桐子大空心鹽米湯下四十丸內補當歸丸出永類鈐方治血氣虛損月水不調或崩中漏去血過多肌體羸困及月候將行腰腿重痛真蒲黃炒三分半乾薑炮四兩淨熟地黃半兩阿膠炒當歸洗續斷甘草炒川芎各四兩白芍藥二兩附子炮裂白芷白朮各三兩肉桂半兩吳茱萸湯泡炒焙三兩上為末煉蜜丸如梧桐子大每服五十丸食前溫酒或鹽湯下案此處缺方名及症狀木香川芎當歸洗焙青蒿子肉桂去粗皮天仙藤香白芷乾薑炮八味各半兩上為細末煉蜜為丸每服一兩用水一盞化開入生薑三片烏梅一枚同煎至七分通口服如骨蒸熱極若用酒水各半盞同煎至七分服渾身疼痛用溫酒化下血氣痛炒生薑酒化下不拘時候艾煎丸出蘭室秘藏方治婦人諸虛北艾葉大當歸各二兩香附子四兩上醋煮半日焙乾為末再用醋煮糊丸艾醋湯下耆味丸出蘭室秘藏方補虛敗黃耆四兩鹽水浸火炙北五味二兩上為末米糊丸空心鹽酒下治四十歲以上以下婦人血海虛損經候過多成片流下不可禁止出護命方乾地黃補骨脂當歸續斷萆薢白芷炙艾葉五味子石斛川芎各一分牡蠣半兩火煅上為末每服三錢水一盞生薑一片棗一枚同煎取九分空心去滓吃和滓吃亦得治五十歲婦人血臟虛損經候過多每行時成片子流下不可禁止方婦人老少不同治證亦異血海虛而生療自別少年虛損者生而益之也老而虛損者竭而止之也出護命方當歸續斷五味子牡蠣火煅白芷萆薢石斛各半兩炙艾葉防風川芎牡丹皮紫巴戟白芍藥人參去蘆頭赤芍藥白朮附子炮去皮臍五加皮茴香微炒十九味各一兩上為細末酒煮麵糊為丸如梧桐子大每服五十丸溫酒或鹽湯下空心臨臥服鹿茸萬病丸出楊氏家藏方補養氣血久服令人有子熟乾地黃洗焙當歸洗焙鹿茸塗酥炙為末上件各等分為細末煉蜜為丸如梧桐子大每服五十丸空心食前米飲或酒下鹿茸丸出十便良方治婦人子宮臟虛損肌體羸瘦漏下赤白臍腹撮痛瘀血在腹經候不通虛勞洒洒如瘧寒熱不定鹿茸一兩陽起石半兩麝香三銖地黃三兩上二味搗羅為末合陽起石麝香拌勻煉蜜為丸如梧桐子大每服三十丸空心酒下或米飲任下人參丸出十便良方養陰生血補虛人參鹿角膠熟地黃芍藥白朮當歸川芎各一兩上為末煉蜜丸如梧桐子大每服三十丸空心米飲下沉香煎丸出楊家藏方治婦人一切虛羸瘦等疾沉香二兩桔梗去蘆頭前胡柴胡荊芥穗麻黃去根節白芍藥茴香炒橘皮去白甘草炙八味各一兩上為末每服二錢水一大盞煨生薑一塊切破薄荷少許同煎至七分去滓熱服不拘時候澤蘭丸治氣血不調肢體瘦弱熟地黃一兩半澤蘭去大枝梗人參去蘆頭黃耆去蘆牛膝去蘆酒浸一宿焙乾赤石脂各一兩白茯苓去皮木香白朮半分萆薢酒浸一宿銼附子炮去皮臍續斷各三分乾薑炮肉桂去粗皮芎藭當歸去蘆酒浸一宿銼碎微炒黃甘草微炒赤各半兩上為末煉蜜丸如梧桐子大每服三十丸空心食前溫米飲下產一百日每日常服壯氣益血固真丹治元臟久虛及小腸腎余膀胱疝氣五般淋疾精滑精漏小便白濁及婦人赤白帶下漏下血崩子宮血海虛冷等疾並皆治之製蒼朮先去土米泔浸逐日換新新泔水春五日夏三日秋七日寒冬十日切作片子焙乾秤一斤分作四處每四兩入茴香一兩鹽一兩同炒令術黃色為度四兩入川烏一兩炮製去皮尖切作片子並川楝子一兩和皮核打開同炒令術黃色為度四兩入紅椒一兩去目併合口者破故紙一兩同炒令術色黃為度四兩用好酒好醋各半斤一處同煮二十三沸聚術同焙乾上一處為末用煮藥酒醋打麵糊為丸如梧桐子大每服二十丸男子溫酒鹽湯任下空心食前婦人醋湯下此藥性溫無毒小便頻數為妙滋補湯出楊氏家藏方補諸不足調養血氣悅澤顏色充肌膚進飲食生乾地黃熟乾地黃洗焙劉寄奴去根澤蘭葉麻黃不去節乾葛青蒿苦梗知母天仙藤地黃芩各一兩炒人參秦艽鱉甲黃耆各半兩上㕮咀每服三錢水一盞酒一分豬筒骨一莖炙焦分為四服桃柳枝各七寸杏仁五粒去皮尖捶碎煎至七分去滓溫服加烏梅半個尤妙一方加當歸白芍藥人參鱉甲丸治婦人一切虛損肌肉瘦瘁盜汗心忪咳嗽上氣經脈不調或作寒熱不思飲食杏仁湯浸去皮尖炒人參當歸赤芍藥甘草炙柴胡桔梗去蘆各一兩地骨皮宣黃連去須胡黃連各一分肉桂去粗皮木香各半兩麝香另研半分鱉甲重二兩者醋煮黃上為細末用青蒿一斤研爛絞汁童子小便五升酒五升同熬至二升以水次入真酥三兩白沙蜜三兩再熬成膏冷方下眾藥末搜和令勻丸如梧桐子大每服五十丸溫酒送下不拘時候熟乾地黃散治婦人勞傷血氣臟腑虛損風冷邪氣乘虛客搏肢體煩疼頭目昏重心多驚悸寒熱盜汗羸瘦少力飲食不進逍遙散治血氣勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜臥血熱相搏月水不調臍腹脹痛寒熱如瘧又療室女血弱陰虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸白芍藥一兩柴胡一兩去蘆甘草半兩炙白茯苓一兩去皮白朮一兩當歸去蘆頭酒浸一宿微炒一兩上㕮咀每服五錢水一盞煎至七分去滓空心溫服枳殼丸一名枳實飲子出王氏博濟方治婦人手足煩熱夜臥多汗肌肉黃瘦經候不調四肢煩倦心胞滿悶狀如勞氣枳殼去瓤麩微炒半夏曲薑製麩炒赤芍藥各一兩柴胡黃芩各一兩上為細末每服二錢水一盞生薑一塊擘破棗二枚煎至八分去滓溫服候五心煩熱及身體壯熱潮熱照方續服桃仁煎丸出王氏博濟方治月經不調阻致不通桃仁三兩湯浸火炒川大黃川朴硝各二兩虻蟲炒去翅頭足上為末用醋五斤入金銀鐺內慢火熬成膏可丸如梧桐子大當日晚不食夜飯溫酒下一丸不嚼破即取下赤小豆汁似雞肝小蝦蟆衣色再候鮮紅即住服氣力加散出大全良方治血虛肌熱又治小兒脾虛蒸熱羸瘦不能食白朮白茯苓白芍藥各一兩甘草半兩上為細末薑棗煎二錢服治婦人血氣並五勞七傷上野蘭根採無時彼土人取此並天回雞翁藤崖梭算四味洗淨去粗皮焙乾等分搗羅為末溫酒調服二錢婦人服之忌雞魚面羊血丈夫無所忌筒骨煎出大全良方治諸虛勞疾羸瘦乏力腰背引痛心煩喘嗽唾膿嘔血頑涎壅盛腫臥有妨胸滿氣促夜多盜汗發焦耳鳴皮寒骨蒸一切五勞七傷等疾並皆療治地骨皮粉草北柴胡前胡烏藥案此處有缺文筒骨煎方藥味不全並缺製法服法下方缺方名症狀亦不全上脈不利或時腹痛乾嘔不思飲食日漸困乏琥珀一兩細研當歸一兩銼浸微炒芎藭半兩木香半兩桂心半兩羌活檳榔各三分沒藥半兩牛膝一兩去苗硃砂三分細研水飛過延胡索桃仁三分湯浸去皮尖雙仁炒熟乾地黃半兩薑黃半兩硇砂三分不夾石者細研鱉甲一兩塗醋炙黃去裙蘇合香半兩柴胡一兩去苗赤芍藥半兩川大黃一兩銼碎微炒麝香一分細研上為末研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服三十丸食前溫酒下蘇合香丸治婦人勞風血氣四肢羸弱不能飲食心腹時痛經絡澀滯蘇合香三分琥珀三分細研麒麟三分牡丹三分生乾地黃一兩紫石英一兩細研水飛過細辛半兩柴胡一兩去苗續斷三分鱉甲一兩塗醋炙微黃去裙芎藭三分麥門冬一兩半去心當歸三分銼微炒延胡索半兩藕節三分蒲黃木香桂心藁本桃仁三分湯浸去皮尖雙仁炒檳榔各半兩上為末煉蜜和搗三五百杵丸如梧桐子大空心及晚食前桃仁湯下三十丸鱉甲丸出聖惠方治婦人血風勞氣四肢羸瘦疼痛經絡不利飲食無味漸加虛困鱉甲紫菀桂心川芎防風川牛膝當歸秦艽人參桃仁琥珀各一兩麝香一分黃耆赤芍藥虻蟲制水蛭制鬼箭白朮羌活各二分熟乾地黃一兩半上為細末煉蜜和丸如梧桐子食前溫酒下三十丸人參湯出聖濟總錄治婦人血氣風勞肌瘦寒熱咳嗽盜汗減食人參荊芥穗柴胡去苗白朮鱉甲去裙襴醋炒酸棗仁紫菀去土黃耆銼厚朴去粗皮薑汁炒二兩木香桂心去皮白茯苓去皮桔梗炒枳殼去瓤麩炒陳橘皮細辛去苗大腹皮各一兩沉香半兩五味子一兩上為末搗篩每服三錢水一盞生薑三片烏梅半枚同煎至七分去滓溫服日三虎骨丸出聖濟總錄治婦人血風勞氣四肢拘急百節疼痛身體煩熱經脈不利虎骨酥炒生乾地黃各三兩防風去叉延胡索芍藥枳殼去瓤麩炒丹參五加皮桔梗炒薏苡仁巴戟天去心各一兩半桂去粗皮當歸銼茯神去木各一兩檳榔銼五枚大麻仁研羚羊角鎊郁李仁湯浸去皮各二兩上為末煉蜜和丸如梧桐子大每服二十丸溫酒下茯苓丸出聖濟總錄治婦人血風勞氣四肢少力月候不調臍腹痛白茯苓去皮當歸焙防風去