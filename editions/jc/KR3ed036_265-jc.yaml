body:
  text: 卷二百六十五服餌門丹藥附論夫輕清上騰重濁下結乾道有凝明之氣散作星辰坤靈韜變化之精流於金石備諸藥品皆載神功陰陽既合於運行水火宜專於信候遂能去其火毒全備至和實由煅煉之勤乃著玄微之驗矣穀神論云含津煉氣吐故納新上入泥丸下注丹田謂之內丹陽龍陰虎水液金精二氣交會烹煉而成謂之外丹修真之士先成內丹後煉外藥內外相應則神仙可致也方神仙中品黃龍丹出聖濟總錄赤石脂十兩黃牛乳汁三升白沙蜜一斤乳香通明者一斤甘草三兩末白粳米三斗五升分作五次炊藥以熟為度上將赤石脂為末以生絹夾袋子貯之於甘水淨盆內浸半日以手揉擺在水中候澄下刮入紙箱中控干取五兩精細者入銀盒內盛之第一次於上七日淘米七升如炊飯相似安藥盒在內炊之飯熟為度夜中去其盒蓋露之星辰下一宿第二次於月望日依前法炊之亦去其盒蓋夜露月明中一宿第三次於二十四日早晨依前法炊之去其盒蓋於日中曝之要取日月星辰之氣足第四次先將牛乳三升入大盒內於慢炭火上逼令如魚眼沸下乳香候化次入前三次炊煮赤石脂末用柳木篦攪令勻傾於乳缽內細研復入盒依前用米七升安盒在內炊之米熟為度第五次以蜜二斤入盒內依前慢火逼之如魚眼沸即下前藥不住手用柳木篦攪勻入甘草末三兩同熬令帶濕便住再用米七升安藥盒在內炊米熟為度取盒於新水盆內浸半日取出於淨處安頓初服時選天德日欲明時空心焚香面東七拜以好酒調下一匙許此乃出世延年仙丹無金石之毒亦無誤生理服食之後乃得四氣調和經絡無滯但許傳授度人不可窺利則其效神速晉廣平中華岳朱山人自幼慕道年六十餘遊鐘山遇異人授此丹信而服之至唐龍紀改元寓揚州開元觀時已數百餘歲矣復授道士周重興且曰此丹服之旬余自覺臟腑通快精神清爽凡風癆氣冷一切大病悉皆除去若及兩料腸變為筋可與天地齊久凡人先須養脾脾王則肝榮肝榮則心壯心壯則肺盛肺盛則元臟實元臟實根本固是謂深根固蒂長生久視之道也修合用新潔器可盛一兩藥銀盒一隻可盛五斗物銀盒一隻新瓦盆三隻可盛一斗物木甑一隻蓋甑盆一隻新淨鍋灶一副新淨乳缽一副銀匙一柄銀小杓兒一枚細竹小罩籬兒一枚柳木篦一枚淨木柴一百斤神仙返魂丹出聖濟總錄起死扶衰延齡卻老丹砂雄黃雌黃各三兩上先細研雄黃雌黃二味用竹筒盛埋北方地中三日取出先傾出一半當心置丹砂亦研令細卻用傾出一半蓋之又用雲母粉以絹袋子揉洗出曝乾塞筒子口埋地內只露筒口用炭火於筒中畔圍之緩緩燒三七日養化成水為度傾藥水盛銅器內垂井中五日無井只用深盆中盛水三四寸更置大豆半升在內即安藥器於水上浸五日亦得然後逐夜於露下露之才日出收候藥水赤色可丸即丸如胡麻子大密收貯若有人卒死者安在口中即活生人服者終身無病每月旦日服一丸若中毒藥其毒自吐出凡有七名一曰返魂二曰再生三曰追命四曰固壽五曰來蘇六曰知命七曰得道其功不可具言此乃錢忠懿王所傳長壽真人素丹砂方出聖濟總錄輕身卻老強力悅色丹砂成塊者四兩青鹽半斤硼砂一兩別研分作三分磁石一斤大火煅四十九度逐度釅醋淬上先將磁石青鹽同為末醋拌令浥浥分作四股先一停鋪盒底將丹砂如蓮子排一重用硼砂一分糝蓋了上用磁石青鹽蓋之又布丹砂如前都三層著餘一分藥末蓋之按令實先用瓦子一片蓋盒更用淨磚一片安爐底灰四寸鋪磚上乃坐藥盒於灰上更用灰蓋盒上四面各及四寸切在子細用頂火四兩養七日待冷取出除瓦片卻用圓盒蓋卻用赤石脂固了口更用鹽鉛白蚯蚓糞紙筋和搗遍固盒四面令極牢了依前坐爐中磚上以火蓋用生熟火三斤一上煅通赤良久退火用灰五升罨卻待冷取輕輕鑿開取砂看伏火如灰色一塊除卻匱硃砂不折第一轉也更用硼砂一兩青鹽半斤二味熟研如粉入少許研如糊入前匱中和拌令乾濕得所准前法布砂鋪藥卻不固濟只合定在灰池中用火三兩養之復時可五度添火勿令絕養七日息火待冷取出砂看紫色佳是第二轉也只是較脆即將搗研如粉入青鹽少許同研即以重紗細裹可拌作彈子大以線系定用醋磨京墨重重厚塗曬令徹里干坐丸子於盒內定不固濟上以灰勻蓋只用三兩火養三複時大火五斤一上煅通赤冷取其砂丸當如雪色第三轉也成矣取砂淘淨洗去鹽味焙乾用真牛乳一合並砂入有節青竹筒內以油絹裹筒口緊墜於井內七日取曬乾研如粉煮棗肉拌為丸如綠豆大甲辰日齋潔焚香服一丸每日加一丸至第七日卻減至一丸又加至如初至六十日有應效至一年身輕健三年行如奔馬力過百夫久服長生能運氣脈為地仙矣顏如童子齒落更生發白再黑忌羊血死肉魚鮮物太清四扇丹出聖濟總錄安心辟邪治一切惡氣丹砂四兩研如麻豆上巳採桃花二十兩真蜜一斤同入銀器中重陽煮至五月朔日以新水淘淨滌取砂令童子面東研之麒麟碣四兩選真者五月二日入丹中研沒藥四兩透明者五月三日入丹砂研麝香四兩全以當門子五月四日入丹砂同研上先取出黨人參一兩甘草一分並細銼五月一日日未出時採露水一升直蜜三兩同浸之至端午日熬水至半去滓入大麥面作糊和稍硬劑之丸如楝實大每服以沉香溫水二合嚼下一粒或半粒補心導血駐顏益氣調和百脈去邪氣尤闢時疫疫歲即全家齋潔旦起面東以井花水各人嚼下一粒斷不染疾久服則心安無夢邪氣不犯面有紅光合時忌女人貓犬壓穢常於淨潔處藏之一名通神保明丹兼治婦人血氣衝心疼痛丈夫元氣不足及一切惡氣等症生薑酒下婦人炒姜醋湯下痁瘧臘茶下一粒或半粒量疾大小服神仙太乙煅丹出聖濟總錄輕身延年聖無知煎掠去白花焙乾研二斤硝石五兩細研分作十分每一度煅入一分絳礬細研五兩麻油一百兩分作十分每一度煅入一分上先將礬鹽入硝一分拌和研勻用麻油十兩和了入固濟五升瓶內以灰火十斤煅將瓦蓋瓶焰絕炭盡為度取出細研更入硝一分油一分准前用炭十斤煅盡如此十度計用炭一百斤足後取藥搗羅為末旋取少許細研湯浸蒸餅和丸如梧桐子大每服十丸加至二十丸空心冷水下久服眾疾皆愈髭發如漆筋骨輕健耳目聰明元方云服一年日行二百里五年通仙神仙靈砂丹出聖濟總錄延年益壽悅顏色堅臟腑壯腰腳益血固精水銀四兩硫黃一兩半上先熔開硫黃即投水銀以鐵匙炒作青砂子秤定四兩如重再炒去盡黃乃已方用煅藥盒子一隻口差小者入青砂子在內用新茶盞一隻底差大平淨面厚者盛新汲水七分許安盛砂盒上以細羅赤石脂末水拌作泥厚黏外縫令周密盒下坐熟火猛焰得所微扇熁之盞中水耗旋添常令有水約半日許令火自冷取起盞底成靈砂一簇打下秤得多少未盡者再用火依前熁之砂成以絹袋盛水煮三五沸或浸半日漉干細研如粉水煮半夏糊為丸如梧桐子大每服一丸空心井水下真到中脘旋下丹田當覺溫暖忌羊血神仙伏火內固丹出聖濟總錄補經育神延年悅色丹砂一兩錫藺脂一兩上以漿水二碗同煮水盡為度用沙盒子一枚將煮過砂用蜜滾過使白附子末再滾為衣卻用黑附子末水調裹砂在心中上下用蜀椒鋪底蓋滿盒子又用油調蛤粉固濟口縫外用鹽泥紙筋封固候乾用炭火五斤煅火盡候冷取出用紙裹丹砂入地竅埋一宿取出細研以糯米作糊丸如梧桐子大每日服一粒清淨水下久服無毒神仙益壽二氣丹出聖濟總錄丹砂二兩水銀一兩同研百合花夜合花干菊花槐花不拘多少同為末上用小瓷盒將四花為末盒下用一半次入丹砂水銀緊捺更用知母末蓋盒定赤石脂固縫鹽泥固濟候乾移磚上用醋灰都裹定炭三五斤煅頂火炭盡為度候冷取出細研油單裹垂入井水中浸三宿出火氣次取蒸三遍出水氣次用棗肉丸如綠豆大每服一丸酒下延年兼治諸般氣疾久服身中更不出蟲蝨二煅神丹法一煅銀茅二煅金茅非尋常伏火硃砂之比趙彥正有序言不多錄白附子六兩地骨皮川椒枸杞子石葦細辛各三兩天茄子三兩上並不事治杵羅為末用瓷盒子一枚須是徑三寸圍九寸高四寸並用大寸先將藥末入盒子內可厚一指以來實築然後將顆塊硃砂五兩或七兩或十兩蜜拌令勻以墨染紙裹之安在盒子中心上更用藥末周圍實築至盒子口可留一分更鋪以椒一分滿之又用墨紙一重蓋中心油調蛤粉固盒口縫鐵線十字系定盒子用紙筋和膠泥大率五斤泥一斤沙土相和捏塑泥要不裂也固濟盒子周圍可厚一指半陰乾平地安定不得用物亦不得作坑然後以醋拌灰滾定周圍包了泥又周圍立木炭三十斤並盒子上用炭以瓦圍束勿令炭落上用熟炭一斤令漸漸生著至半日通著直至來日冷打開盒子取出硃砂其形塊大小輕重都不變但紫色耳再用蜜拌如前三煅成丹共十八斤十斤炭此法奇妙煉時忌婦人雞犬孝子見崑崙紙多上墨尤佳太素丹一名白丹出余居士選奇方治停寒肺虛痰實喘急咳嗽經久痰中有血及療氣虛感冷滑泄脾胃羸弱不進飲食此藥治一切危困之疾神效益陽退陰治虛損痼冷及吐瀉暴脫傷寒陰證手足厥冷真陽起石二錢新瓦上用熟火爁過通紅為度去火候冷研極細煉成鍾乳粉一兩上合研令勻用糯米粽子尖拌和丸如雞頭大臨和時入白石脂一錢須大盤子不住手轉候八九分堅硬陰乾用新粗布以滑石末出光每服二粒至三粒空心人參湯陳米飲下白丹焰硝三兩細研白礬三兩細研寒水石四兩研細塊子砒霜一兩細研上用燒藥罐子一個盛得十兩藥者先用火炙以生薑汁塗數遍炙乾先下砒末在罐子底按實次下焰硝末按實次下白礬末按實次下寒水石末蓋頭填滿罐子上用圓瓦兒蓋合口坐在地上簇炭五斤發頂火煅煙盡為度去火候冷取藥砒撮在底刮令淨盡研極細砒另研尤好次入純白石脂一兩只用好白磰上亦得同研細如粉滴水和成劑於手心內以數入內轉手丸如梧桐子大先陰乾或曬或焙令十分乾一併入新坩鍋子內用圓瓦兒蓋合口坐在磚上簇炭三斤一煅通紅為度用鈐坩鍋子傾丹入一厚瓷碟內如玉霜白每服一二粒空心用冷水吞下以乾物壓之忌溫熱物少時有孕不可服此藥如無藥罐只用煉得五十兩銀坩鍋子兩個分藥作兩處按實燒亦可此藥大治虛寒壯脾胃進飲食有大效寒水石南人謂之軟石膏範忠宣公法鍊金液丹透明硫黃四兩豬肪脂半斤上先將硫黃碎為小塊子以沙石銚子煉豬脂成汁去卻筋膜後下硫黃在內急以柳枝子攪才候消不可煉過卻便下火先用湯一盞以新綿罩其上將所熬硫黃並脂傾在綿上硫黃沉脂浮候冷撥去脂將凝住硫黃以皂角水洗十餘遍候不黏膩以柳木槌研三五日細如粉水浸蒸餅為丸如梧桐子大每服三十五丸米飲下陳瑩中錄此方云潁川範忠宣公家法也忠宣無問老幼有病無病旦旦服之如嗜茶飯以硫黃為脂所制不留臟腑間壯氣養真莫甚於此真仙法也太上紫霞丹升降陰陽神仙藥也福州石醫方硫黃研細針砂羅去細者各四兩五倍子一兩打破上同用沙鍋內以水煮一時放冷先揀了五倍子不用然後淘去針沙將硫黃池紙一張於灰上滲干團作球用荷葉一枚裹之安地上以大火煅候藥紅即攔去火經宿研令極細用膏飯和丸如皂角子大陰乾每服一二丸空心白湯下此藥治氣虛頭痛如神水金丹透明