溫水下五粒以鉛作桶可重二斤以銅作筒可重三斤忌羊血太陽紫粉丹治男子久冷婦人血氣冷勞五膈氣反胃痃癖一切冷病無不瘥者硫黃馬牙硝水銀各三兩上以無灰酒旋點於乳缽中同研候水銀星盡即止日中干之布於鐺內瓷器碗合之以鹽泥如法固濟候乾了鐺下漸漸以三四兩火養半日漸加至七八兩火經一復時待冷取藥細研以白蜜拌令瀝於竹筒中盛糯米飯上蒸一炊久又出之更細研以棗肉和丸如梧桐子大每日空心以鹽湯或酒下三丸久冷入加至五丸服青花丹治霍亂吐瀉腹脹冷氣心痛腸風血氣虛冷病小兒疳疾神效空青定粉白石脂硃砂桃花石各一斤鹽花四兩上同研如面入瓷瓶子中以鹽蓋之固濟候乾了以一斤二斤火於瓶子四面逼之候熱四面著一秤火漸漸煅一食久任火自銷候冷開取水飛去鹽味曬乾更入麝香一分同細研令勻以爛飯和丸如麻子大每日空心以溫酒下五丸忌羊血太陽流珠丹治一切風冷風氣癥瘕結塊女人血氣赤白帶下腸風下血多年氣痢痃癖常吐清水反胃吐逆神效硫黃一斤馬牙硝四兩鹽花四兩炒令轉色硼砂二兩伏火者上同研如面入瓷瓶內按實上更以炒鹽蓋之出陰氣如法固濟將入一鼎下先熔鉛半斤壇藥瓶子以鐵索括定又銷鉛注入鼎令沒瓶子固濟了入灰爐中以火養鉛常以熱為候如此一百日滿出鼎別以小火養三日日滿大火煅令似赤即止放冷取出如琥珀以寒泉出火毒細研為末以棗穰和丸如綠豆大每日空心以茶下三丸四靈丹駐顏補益黃丹水銀鋼鐵錯末硼砂以上各二兩上研入瓷盒中固濟令乾安於灰爐中盒上灰厚三寸常以一斤火養一百日日足以十斤火煅任火自銷放冷取出細研以濃甘草湯拌於飯上蒸一炊久出火毒細研為末以水浸蒸餅和丸如梧桐子大每服空心以溫酒送下三丸百日見效四靈丹治筋骨風角弓風腎臟風熱毒風皮膚風大風感厥風並皆治之其功如神硼砂三兩水銀一兩硃砂一兩硫黃二兩上將硼砂硫黃同研如面於瓷盒中盛之如法固濟令乾入灰爐中其上灰厚三寸以火三兩養一七日開取藥入水銀硃砂各一分同研以水銀星盡為度依前入盒養一七日如此四度計二十八日開取藥細研以水飛過入竹筒中密封頭於飯上蒸兩炊久及熱取出於地上以紙襯盆合一周時出火毒了用粟米飯和丸如綠豆大每日空心以溫酒下三丸十日後加至五丸忌羊血伏火玄石櫃靈砂丹補益筋骨駐顏色治女人風冷暖子宮久服不老延年硃砂三兩細研紙裹磁石一斤半搗碎細研淘去赤汁盡上以石腦油十二兩拌磁石令浥浥相入先固濟一瓷瓶子令乾入磁石一半於瓶子內築令實中心剜作一坑子可容得硃砂用紙裹了入櫃子上以余藥蓋之築令實瓶口以瓦子蓋勿固之以小火逼陰氣盡候瓶子通熱即聚火一秤已來煅之令上下通赤任火自消待冷開取砂已伏矣去紙灰取砂細研如面以生薑汁稀調之安於茶碗中飯上蒸三炊久曬乾研如粉以棗肉和丸如小豆大每日空心以溫酒下三丸忌羊血玄英散祛風熱利三焦耐寒暑駐顏容久服去萬病川朴硝五斤以瓶燒令通赤細研如粉淡竹瀝一升上將竹瀝拌硝令勻濕用大竹筒一枚先以牡蠣粉半斤築入竹筒中次下硝了又以牡蠣粉半斤築之以蠟紙三重封之勿令通氣安在甑中四面以黑豆埋之令沒筒口蒸一復時待冷去豆開筒去牡蠣粉取硝細研如粉每日食後水調一錢服之服至三二斤漸耐寒暑少汗服至五七斤駐顏色去萬病一生無汗夏月可以衣裘冒炎毒履冰霜無懼矣金液含化靈丹補益延年卻老功力不可具載山澤銀末八兩硃砂二兩五錢上先鋪銀末一兩於瓷盒中即排硃砂塊子勿令相著上以銀末蓋之令勻又布硃砂塊子又以銀末蓋之候硃砂盡即以鹽花蓋上令滿盒子口按實如法固濟入灰池中盒子上灰厚四寸常以二兩火養七日七夜勿令火猛但令盒子熱可通人手為度日滿取出重翻排過一依前法重固濟以火四兩養之二十日後加火至二三斤燒可一炊久放令極冷取出細研入龍腦半分同研如粉以藕汁和丸如粟米大每日空心含三丸津液咽之如要作油每一兩以桂心末一錢大羊腎膒脂煉成者彈子大入龍腦一錢和研兩日久入銀盒子中埋於糠甑中蒸三伏時當自化為油每日含如豇豆大去疾補益延年駐顏卻老神仙之基也忌羊血含化硃砂丹祛熱毒風鎮心神治萬病返老駐顏功力甚大不可具述硃砂三兩馬牙硝三兩硝石三兩上同研如粉入瓷瓶中以重紗油紙三重密固瓶口重湯煮之常如魚眼沸水耗即以熱水添之不歇火三七日夜滿開瓶子其硝並在瓶四面收之細研任服其硃砂即在中心取出細研以小瓷盒子中盛固濟微火養一日加火一斤煅令通赤放冷開取細研以棗肉和每一兩砂可丸得三百六十丸每日早晨含化一丸如要多含俱依分兩酌度修煉為丸婦人服之亦佳忌羊血金液丹治臟腑積冷腰腳疼痛四肢虛羸下元衰憊磁石半斤硫黃三兩上以童子小便一斗燒磁石赤於小便中淬以盡為度候乾入硫黃同研令細卻入瓶子中以六一泥固濟陰乾坐於灰池中常以火半斤養一七日滿即止更常用火五斤燒一七日足放冷出之以熟絹包裹納於井底一伏時出火毒候乾研為末用蒸餅和丸如麻子大每日空腹以溫酒下七丸神效無比紫霞丹補暖臟腑添益精髓延年駐顏祛風逐冷治痔漏瘰癧筋骨疼痛婦人服之益子宮神妙硝石水銀雄黃硃砂硫黃與水銀結作砂子各一兩金箔一百片上同研令勻取一瓷瓶子鹽泥固濟待乾入藥於瓶子內其瓶蓋鑽一竅如半錢孔大蓋瓶口訖仍內煻灰中煨之不得便令火大恐藥飛走專候竅中陰氣盡以泥鹽固塞其竅以火半斤養三日滿即用火一斤燒一七日候冷取出