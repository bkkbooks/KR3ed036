秤一兩上為細末煉蜜丸如梧桐子大用硃砂龍腦為衣每服三二十丸煎人參湯食後臨睡服長藥陸慶長寺丞診脈拔劑與史載之許叔微為伯仲其家傳方書一編載此方云人以為補下元而使氣實杜士謂不然先補心氣而五臟實心氣正而元氣自實也若更以藥補下元尤妙此方極養心氣若止補元氣耗心氣非養氣之理也中年以後宜服之此說極有理雖名醫亦少知之神仙紫霞丹出選奇方硃砂一兩上用小粉盒子一個天南星半夏等分為末先用一錢在下安硃砂放中上又以一錢蓋頭頂次用赤石脂為末水調糊縫口外用鐵線扎定以六一鹽泥固濟厚一寸許六七日先以慢火養半日後用火煅通紅為度候冷取出研為末次用禹餘糧四兩釘頭代赭石二兩紫石英一兩以上三味火煅通紅以好醋淬七遍為度再用赤石脂三兩生用硫黃醋煮乾一兩附子二個炮製去皮臍海螵蛸一兩去殼上件為細末再用乳缽研無聲為度次用新糯米粽爛研和丸黍子大新布袋盛此桂府滑石打作片子同藥打光瓷盒盛之每服三丸至五丸空心煎濃棗湯下忌豬羊血久服壯元陽益真氣婦人子宮久冷血海虛憊宜服之功效不可具述張子華伏火丹出十便良方辰砂五兩顆塊不夾石者每炒一兩用匱藥一兩白附子三兩椒目三兩天南星五兩地骨皮五兩上將匱藥四味為末先將硃砂以紙裹作一塊次以蜜和匱藥卻用裹砂烈叫以紙重裹入盒子內下地坑初一火用炭三十斤次用二十斤次用十五斤次用十斤每火仍換匱藥令冷取出去匱藥將砂子細研半夏糊為丸如雞頭大每服一二粒空心米飲下三皇真人煉丹方出本草丹砂一斤色發明者研末重絹篩之令靡靡以醇酒不見水者沃丹撓之令如封泥狀盛以銅盤中置高閣上勿令婦人見曝之身自起居數撓燥復沃之當令如泥若陰雨疾風復藏之無人處天晴出曝之盡酒三斗而成能長曝之三百日當紫色握之不汙手如著手未乾可丸欲服時沐浴蘭香齋戒七日勿令婦人近藥過旁丸如麻子大常服平旦向日吞三丸服之一月三蟲出服之五六月腹內諸疾皆瘥服之一年眉發更黑歲加一丸服三年神人至酒藥附論夫酒者谷糵之精和養神氣性惟剽悍功甚變通能宣利腸胃善導引藥勢今則兼之名草成彼香醪莫不採自仙方備乎藥品疴恙必滌功效可憑故存於簡編耳方地黃酒出聖惠方治風羸益氣力輕身明目令人能食久服去萬病婦人服之更佳生地黃胎粗者切一石五斗於淨木臼中搗以生布絞取汁五斗大麻子一斗微炒搗爛糯米一石擇揀細曲十斤搗細杏仁一斗去皮尖雙仁者炒黃搗為膏上先將地黃汁五斗入甕浸曲候發炊米二斗作飯冷暖如人體取杏仁麻子末各一升二合拌和酘曲汁中待飯稍冷又炊米一斗以杏仁麻子各一升二合拌一依前法酘之如此凡八酘訖待酒沸定封泥二七日即取熟清溫服一盞再服之地黃酒出聖惠方補益變白肥地黃一斤搗碎糯米五斗熟炊面曲五斤搗碎上相和於盆中熟揉於不津瓶中密封春夏三七日秋冬五七日滿啟之當中有一盞綠汁是真精也宜先酌飲之余以生布絞取別置器中任從飲之續釀使其相接不過三劑發黑若以新牛膝搗絞取汁三斤用拌鐼即變白更急矣地黃酒出聖惠方大補益令人不衰發不白生地黃一斗細切糯米淘淨上相和炊熟攤令絕冷更和曲末二斤同入於七斗酒中攪令相得入於甕中熱即歇頭冷即蓋甕有汗即拭之候熟壓漉冬溫夏冷日飲三杯黃精酒主治萬病延年補養發白再黑齒落更生黃精四斤天門冬三斤去心術四斤松葉六斤枸杞根五斤上都銼以水三石煮取汁一石浸曲十斤炊米一石如常法釀酒候熟任飲之忌桃李雀肉又方黃精五斤細切糯米五斗淘淨與黃精同炊為飯曲末七斤半上取曲末候飯冷相和入甕中中如常造酒法候熟壓取酒每日常暖飲一兩盞黃精酒出聖惠方主萬病延年補養發白再黑齒落更生黃精去皮三斤天門冬去皮三斤松葉枸杞根各五斤上為粗末以水三石入前藥在內煮取二石用糯米一石細曲半秤蒸米同曲入在前藥水中封閉二七日熟任性飲之延年益壽返老還童除萬病天門冬酒出聖惠方補五臟六腑不調亦令無病天門冬三十斤去心搗碎以水二石煮取汁一石糯米一石淘淨細曲十斤搗碎上炊米熟相拌入甕密封三七日候熟壓漉冬溫夏冷日飲三杯天門冬酒延年不老淳酒一斗細曲末一斤糯米一斗淘淨天門冬煎五升取天門冬去心皮搗絞取汁火煎如稀飴上先以酒浸曲候曲發熱炊糯米為飯適寒溫將天門冬煎都拌和令勻入不津甕中密封秋夏一七日數看勿令熱過春冬三七日候熟取酒每服五合日再服枸杞酒出聖惠方強筋骨留容顏枸杞根不生塚上者洗淨去蒼皮寸銼一石以水二石煮取一石去渣入小麥曲末十斤候曲發即用拌糯米秫共一石淨淘炊之令熟攤冷暖得所即下後藥桃仁三升去皮尖麩炒令微黃大麻仁三升炒令香熟烏麻仁三升炒令香三味並搗碎甘菊花十兩生地黃一斗切上都搗熟入上件曲米中攪拌令勻入於甕中候發定即泥甕頭三七日令熟初開甕下芻取清然後壓如常法冬溫夏冷隨性飲之不令至醉為妙枸杞酒出聖惠方除五臟邪氣消渴風濕下胸脅氣利大小腸填骨髓長肌肉治五勞七傷利耳目消積瘀傷寒瘴氣虛勞呼吸短氣及腳氣腫痹並主之米二石黍糯並得細曲十斤搗碎生地黃三十斤洗淨細切枸杞根二十斤刮去浮皮寸銼以水二石漬三日煮取汁一石豆豉二斤以枸杞湯煮取汁秋麻仁三升微炒細研以枸杞湯淋絞取汁上以地黃一味共米同蒸熟候飯如人體溫溫以藥汁都和一處入甕瓶密蓋頭經三七日即開冬溫夏冷日可飲三杯神仙枸杞子酒出聖惠方療虛羸黃瘦不能食服不過兩劑必得肥充無所斷禁枸杞子五升乾者搗碎生地黃切三升大麻子五升搗碎上先蒸麻子令熟攤去熱氣入地黃枸杞子相和得所納生絹袋中以無灰清酒五斗浸之密封春夏七日秋冬二七日取服多少任情性常令體中微有酒氣醺醺為妙枸杞根釀酒出聖惠方治風冷虛勞枸杞根切一石鹿骨一具打碎上以水三石煎取汁一石去滓澄清入糯米一石淨淘炊熟細曲十斤搗碎都和一處入甕瓶密封三七日開冬溫夏冷日飲三杯枸杞酒出千金方用枸杞根一百三十斤切以東流水四石煮一日一夜取清汁一石漬曲一如家釀法熟取清貯不津器中納乾地黃末二斤半桂心乾薑澤瀉蜀椒末各一斤商陸末二升以絹袋貯入酒底緊塞口埋入地三尺堅覆上三七日沐浴整衣冠再拜平曉向甲寅地日出處開之其酒赤如金色旦空腹服半斤十日萬病皆愈二十日瘕痕減惡疾人以水一升和酒半升分五服愈千金翼又云若欲服石者取汁中青白石如棗杏大者二升以水三升煮一沸以此酒半合置其中須臾即熱可食生枸杞子酒出聖惠方主補虛長肌肉益顏色肥健能去勞熱用枸杞子五升以好酒二斗搦勿碎浸七日漉去滓飲之初以三合為始後即任性飲之石斛酒出聖惠方主補虛勞益氣力除腰腳痹弱利關節堅筋骨及頭面遊風石斛四兩去根黃耆二兩丹參二兩杜仲去粗皮牛膝去蘆人參去蘆頭五味子白茯苓山茱萸薯蕷萆薢防風生薑以上各二兩枸杞子天門冬去淨心薏苡仁以上各三兩細辛一兩上都細銼以生絹袋盛用酒五斗於瓷甕中浸之七日開初溫服三合日再服漸至一盞為度又方出聖惠方治風虛勞腹內冷不能多食石斛四兩去根丹參芎藭杜仲去粗皮防風去蘆頭陳橘皮湯浸去白焙白朮人參去蘆頭桂心五味子白茯苓黃耆薯蕷當歸以上各二兩乾薑炮製牛膝去苗各二兩甘草一兩炙微赤上細銼生絹袋盛用清酒五斗於甕中漬七日開初溫服三合日再服漸加至一盞為度又方出聖惠方治風痹腳弱腰胯冷疼利關節堅筋骨令人強健悅澤宜服石斛十兩去根牛膝八兩去苗杜仲四兩刮去粗皮丹參四兩生地黃切一斤曝令水氣干上細銼以生絹袋盛用清酒五斗於甕子中密封浸七日開每服一中盞日可二三服之薯蕷酒出聖惠方治頭風眩不能食補益氣力薯蕷山茱萸白朮五味子以上各八兩防風十兩去蘆頭人參去蘆頭丹參生薑以上各六兩上細銼生絹袋盛用清酒三斗入瓷甕中浸七日開每度溫飲一盞日三盞為定生薯蕷藥酒出聖惠方補虛損益顏色上將薯蕷於砂盆中爛研然後刮下於銚子中先以少酥炒一大匙令香次旋添入酒一盞煎攪令勻空腹飲之佳菊花酒出聖惠方治八風十二痹補虛損不足菊花五加皮枸杞根白朮以上各八兩甘草秦艽去苗各四兩生地黃一斤切上搗碎以水三石煮至一石以槽床壓之取汁用糯米一石炊熟細曲十斤搗碎拌和令勻入於甕中密封三七日取飲任性不能過醉菊花酒出聖惠方壯筋骨補髓延年益壽耐老菊花生地黃枸杞根各五斤上搗碎以水一石煮取汁五斗炊糯米五斗細曲碎同拌令勻入甕密封俟熟澄清每溫飲一盞日三服硫黃藥酒出本草老硫黃花椒各二兩訶子七十二個上三件各以生絹夾袋子盛麻線系口如法每用酒一斗浸十日為度硫黃永不換椒一季一換訶子七十二日一換如服一升卻入好酒一升如服半升卻入好酒半升服至經年髮鬢再黑暖水臟明目皮肉紅潤康健延年久服無毒自然減棉衣合時忌雞犬婦人見每晨朝服一盞臨臥再服服餌五加方出本草魯定公單服五加酒以致不死臨隱公佯托死時人亦莫知悟耳張子聲楊建始王叔才李世彥等皆服此酒而房室不絕得壽三百年有子二十人世世有得服五加酒散而獲延年不死者不可勝計或只為散以代湯茶而餌之驗亦然也雞蘇酒出本草以雞蘇釀酒並漬酒常服之佳煎藥
