殭蠶炒犀角屑玳瑁屑天麻人參白茯神甘草炙各一兩龍腦研麝香研雄黃研真珠研天竺黃研鐵粉研各一兩硃砂研五錢兩金箔銀箔各二百五十片上為細末真腦油和丸每兩作十丸瓷合內收每服取一丸人參湯化下或竹葉湯新汲水亦得如中風不語涎潮亦治剛痓柔痓婦人產後角弓反張鐵彈子丸治一切風癱緩卒中烏頭炮裂去皮臍五靈脂附子炮裂去皮臍各四兩狼毒半兩防風去蘆地龍炒各二兩桂去粗皮一兩半虎骨燒存性一兩自然銅煅醋淬七次三兩乳香研半兩沒藥研三兩半麝香研三錢龍腦研二兩錢發灰半兩當歸切焙芎藭各一兩乾蠍去土炒半兩海桐皮銼半二兩天麻一兩白花蛇酒浸去皮骨炙半兩上為細末用生薑自然汁和杵三五百杵丸如櫻桃大每服一丸分作四服癱緩風生薑熱酒化下𤸷麻薄荷酒下皮膚風毒結聚腫痛溫酒下偏頭疼夾腦風臘茶清下婦人血風攻注四肢或癢或痛心腹刺痛當歸酒下並早晚食後服秘傳羌活散治一切風證甘草黃芩鼠尾者生地黃肥者連翹山梔子蔓荊子當歸滑石桂府者香白芷湯洗荊芥陳者石膏明者用薄荷吉州羌活臺芎水洗赤芍藥獨活麻黃陳皮桔梗防風上各等分㕮咀每服一兩二錢初服藥之時必加大黃朴硝動臟腑數行用溫粥補之量病虛實加減春冬多利數行夏微動一二行便補自後每日一貼不加大黃朴硝用水煎至分數如病人血色如黑者多加當歸生地黃病人麻木處或刺痛甚多加羌活白芷麻黃赤芍藥煎藥當用文武火於沙石器內煎存下藥滓曬乾多加朴硝在內煎湯洗浴如無當歸以蘇木代之闢風丹出御藥院方治諸風疾無問新久者半身不遂口眼喎斜語言蹇澀精神昏憒痰涎並多咽嗌不利及風虛頭痛目眩旋暈欲倒或心忪健忘恍惚不寧手足麻痹顫掉無力筋脈拘急骨節煩疼行步艱難並宜服之獨活洗土焙防風去蘆頭吳白芷麻黃去節微炒桂藁本白芍藥去皮天麻各一兩川烏頭炮裂去皮槌碎炒黃藿香葉洗淨甘草銼炒全蠍去毒炒黃白花蛇酒浸去皮骨各半兩川芎七錢羌活去苗白殭蠶炒遠志湯浸去心焙乾各半兩三分硃砂二兩為衣白附子炮裂搗碎炙微黃牛膽南星炒黃各四兩錢上為細末煉蜜為丸每兩作十丸硃砂為衣每服一丸細嚼或化服用生薑湯下麝香湯亦得如破傷風豆淋酒下急風癇病人參湯下不拘時候此藥攻效不可具述烏犀丸出聖惠方治一切風烏犀角屑半兩天麻一二兩桂心一兩防風一兩去蘆頭羌活半兩附子一兩炮裂去皮臍人參一兩去蘆頭海桐皮一兩當歸一兩去蘆芎藭一兩乾蠍半兩微黃羚羊角屑一兩萆薢一兩銼藁本半兩蔓荊子半兩麻黃一兩去根節白附子半兩炮裂白殭蠶一兩微炒龍腦一分細研麝香一分細研上搗羅為末入龍腦麝香等研令勻煉蜜和搗三五百杵丸如櫻桃大每服一丸嚼破以薄荷酒下躑躅摩風膏出聖惠方治風肢節多疼肌肉頑痹或遍體瘡癬或癮疹風瘙宜服躑躅花羌活防風去蘆頭芎藭杏仁酒浸去皮細辛當歸以上各一兩白蘞白芨白芷丹參苦參玄參桂心附子去皮臍川烏頭去皮臍皂莢去黑皮漢椒去目莽草川大黃以上各半兩上件藥細銼以米醋一升拌令勻濕經三宿後以慢火炒令乾用臘月豬脂二斤以慢火同煎一日候藥味出盡以新布絞去滓更以綿濾過再入鐺中煎以柳木篦不住手攪成膏候凝收於瓷盒中每用一丸如彈子大摩於病上如臘月煎之經久不壞也川芎石膏湯出醫方集成治一切風熱上攻頭目昏眩或痛或悶或風痰喘嗽或目疾時發壅生翳膜或鼻塞口瘡煩躁多渴或便溺淋閉或瘡癬皴揭並宜服之清利頭目宜通氣血並一切風熱或中風偏枯結焦解中外諸邪所傷及調理汗病下之前後並汗後餘熱勞復傳染等疾川芎山梔子荊芥穗當歸切焙芍藥生大黃菊花人參白朮各半兩甘草三兩石膏防風去蘆薄荷葉連翹各一兩滑石四兩寒水石黃芩桔梗各三二兩縮砂一分上為粗末每服三四錢水一盞煎六分去滓食後溫服日進二三服或為細末溫水調下二三錢忌生薑醋發熱諸物人參羌活散治一切風疾人參半兩羌活半兩防風半兩去蘆天麻三錢甘草半兩半夏一兩川烏半兩生用去皮臍白芷半兩川芎半兩細辛四錢藁本半兩南星一兩白茯苓半兩陳皮半兩天台烏藥半兩木香半兩另入枳殼半兩赤芍藥半兩當歸半兩上㕮咀每服四錢水一盞半生薑五片同煎至一盞入麝香少許攪勻空心食前服如手足疼痛加乳香沒藥如熱多加荊芥穗半兩大聖黑神丸治癱緩及一切諸風疾木香一兩躑躅花紫葳花各半兩烏頭炮裂去皮臍烏蛇酒浸去皮骨慢火炙各四兩乾蠍去土炒一兩蒼朮炒二兩防風去蘆二分兩白芷一二兩麻黃去根節二兩芎藭三兩厚朴去粗皮生薑汁炙二兩芫花醋浸炒一兩桂去粗皮二三兩芍藥一兩陳橘皮湯浸去白焙二兩天南星炮一兩吳茱萸湯浸焙炒一兩半自然銅煅醋淬別研為末六兩上為末入自然銅末和勻煉蜜和杵三二百下丸如雞頭大每服一丸溫酒化下日三服不飲酒薄荷湯下如傷風三日豆淋酒下連三服以熱蔥粥投之衣被蓋出汗防風羌活丸宜四時常服永無風疾之患防風羌活五加皮芍藥人參丹參薏苡仁玄參麥門冬去心四分乾地黃大黃青木香各六分松子仁磁石各八分研檳榔子五分枳實炙八分牛膝八分茯神八分桂心八分上搗篩和蜜為丸如梧桐子大以酒服十五丸日二服漸加至三十丸為度忌豬肉魚蒜生蔥酢蕪荑二提金箔治一切諸風甘草人參天麻芍藥薄荷荊芥川芎乳香沒藥白芷甘松鬱金藜蘆桔梗甘菊花藁本茯苓防風細辛上各等分為細末每用少許㗜鼻內大效
