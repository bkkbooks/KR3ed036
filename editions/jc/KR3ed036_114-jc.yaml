body:
  text: 卷一百十四諸風門諸風難治附論素問云凡諸風掉眩強直支痛緛戾裡急筋縮皆足厥陰風木之位肝膽之氣也風者動也掉者搖也所謂風氣甚而頭目眩運由風木王則是金衰不能制木而木能生火故風火多為熱化皆陽熱多也風為病者或為寒熱或為熱中或為寒中或為厲風或為偏枯或為腰脊強痛或為耳鳴鼻塞諸證皆具其病各異其名不同經云風者善行數變腠理開則灑然寒閉則熱悶風氣俱入行於諸脈分肉之間與衛氣相干其道不利致使肌肉憤䐜而有瘍也衛氣所凝而不行故其肉有不仁也分肉之間衛氣行處風與衛氣相搏俱行肉分故氣道澀而不利氣道不利風熱內郁衛氣相持肉憤䐜而瘡出衛氣被風鬱不得傳偏升凝而不行則肉不仁也謂皮肉𤸷而不知寒熱痛癢如木石也經曰風者百病之首也其變化乃為他病無常風氣所發也以四時五運六氣千變萬化沖蕩推擊無窮安得失時而絕也故春甲乙傷於風者為肝風夏丙丁傷於風者為心風季夏戊己傷於風者為脾風秋庚辛傷於風者為肺風冬壬癸傷於風者為腎風五臟之風其證各異肺風之狀多汗惡風色白時嗽短氣晝則微暮則甚心風之狀上同善怒色赤病甚則言不可快肝風善悲色微蒼嗌乾善怒時憎女子脾風身體怠墮四肢不收色薄微黃不嗜飲食腎風面疣而浮腫脊痛不能正立其色炲隱曲不利又曰風寒熱諸疾之始生也人之臟腑皆風之起謂火熱陽之本內經曲直動搖風之動也眩暈吐嘔謂風熱之甚也夫風熱怫鬱風火生於熱以熱為本而風為標凡言風者即風熱病也氣壅滯筋脈拘倦肢體焦痿頭目昏眩腰脊強痛耳鳴鼻塞口苦舌乾咽嗌不利胸膈痞悶咳嘔喘滿涕唾稠黏腸胃燥熱澀便溺淋閟或夜臥寢汗咬牙睡語筋惕驚悸或腸胃怫鬱結水液不能浸潤於周身而但為小便多出者或濕熱內余而時有溏泄者或因亡液而成燥淋閟者或因腸胃燥郁水液不能宣行於外反以停濕而泄或燥濕往來而時結時泄者或表之陽和正氣衛氣是也與邪熱相合併入於裡陽極似陰而戰煩渴也表氣寒故戰裡熱甚則渴或虛氣久不已者經言邪熱與衛氣併入於裡則寒戰也並出之於表則發熱並則病作離則病已或風熱走注疼痛麻痹者或腎水真陰衰虛心火邪熱曝甚而僵仆或卒中久不語或一切曝喑而不語語不出聲或暗風癇者或洗頭風或破傷或中風諸潮搐並小兒諸疳積熱或驚風積熱傷寒疫癘不能辨者或熱甚怫結而反出不快者或熱黑陷將死或大人小兒風熱瘡疥及久不愈者或頭生屑遍身黑紫白斑駁或面鼻生紫赤風刺癮疹俗呼為酒刺者或成風癘世傳為大風疾或腸風痔漏並解酒過熱毒兼解利諸邪所傷及調理傷寒已發汗頭項身體疼痛者並兩感諸證兼治產後血液損虛以致陰氣衰殘陽氣鬱甚為諸熱證腹滿澀痛煩渴喘悶譫妄驚狂或熱極生風而風熱燥郁舌強口噤筋惕肉瞤一切風熱燥證鬱而惡物不下腹滿撮痛而昏者惡物過多而不吐者不宜服之兼消除大小瘡及惡毒兼治墮馬打破傷損疼痛或因而熱結大小便澀滯或腹腰急痛腹滿喘悶者凡此諸風所感不一當隨證而治也方烏犀丸出和劑方治丈夫婦人卒中諸風牙關緊急膈上多痰或語蹇澀口眼喎斜用薄荷汁與酒各少許化三丸服之良久再服立有大效又治癱瘓暗風癇病手足潮搐心神不安遍身頑麻腸風痔漏腎藏風毒上攻下疰婦人血風頭旋吐逆皮膚腫癢遍身疼痛白朮米泔浸一宿切焙乾微炒白芷乾薑炮枳殼去瓤麩炒天竺黃細研虎骨酒醋塗炙令黃厚朴去粗皮薑汁塗炙令黃敗龜酒醋塗炙令黃何首烏米泔浸一宿煮過切焙桑螵蛸微炒縮砂仁蔓荊子去白皮丁香晚蠶蛾微炒各三分萆薢微炙細辛去苗藁本去土槐膠阿膠杵碎炒陳皮微炒去白羌活去蘆半夏湯洗七次薑汁浸三日炒天南星湯洗生薑自然汁煮軟切焙乾炒黃麝香別研天麻酒洗切焙茯苓去皮獨活去蘆人參去蘆羚羊角鎊藿香葉去土檳榔肉桂去粗皮沉香麻黃去根節川烏燒令通赤留煙少許入坑內以盞覆新土圍食頃出白殭蠶去絲嘴微炒白附子微炮乾蠍防風去蘆白花蛇酒浸一宿去皮骨炙熟用肉烏蛇酒浸一宿炙去皮骨令熟用肉木香各一兩石斛去根水銀蟬殼去土微炒川芎肉豆蔻去殼微炒附子水浸後炮去皮臍硫黃末用瓷盞盛慢火養成汁然後卻入前水銀如青泥細研龍腦別研硃砂研飛雄黃研飛牛黃別研各半兩狐肝三具臘月採取同烏鴉一隻入新瓦盆內以瓦盆子蓋頭用泥固濟用炭火一秤燒令通赤待煙盡取出候冷研令極細烏鴉一隻臘月採取去嘴並翅足用膩粉別研一分當歸去蘆酒浸焙乾烏犀鎊各二兩上搗研令細煉白蜜合和入酥再搗五千下丸如梧桐子大常服一丸不時薄荷湯或茶嚼下草靈寶丹出楊氏家藏方治一切風疾及風濕走注疼痛口眼喎斜手足頑麻大有神效其藥味俱宜揀淨然後秤分兩須要精最不可草率又治一切中風及八風五痹癱瘓嚲曳眉角牽引項背拘強牙關緊急心中悸悶神情如醉遍身發熱骨節煩疼肌肉麻木腰膝沉重皮膚瞤動狀若蟲行又治陽虛頭痛風寒入腦目旋暈轉似在舟舡耳內蟬鳴有如風雨之聲應風寒濕痹腳氣緩弱及打撲復於筋骨或遇天陰一身盡痛不得睡臥並皆治之川芎枸杞子當歸去蘆苧細辛去苗葉淨菊花去根枝淨白芍藥荊芥去根淨五加皮去骨淨白蘚皮去骨淨枳殼去瓤淨薄荷去根梗威靈仙去土淨木香粉甘草炒淨沒藥研川附子炮裂去皮臍淨草烏頭炮裂去皮臍淨香附子炒去毛淨金毛狗脊炒去毛淨人參去蘆淨地骨皮去骨土淨防風去蘆頭淨羌活去蘆淨香白芷柴胡去苗土淨升麻去蘆淨麻黃去根節淨烏藥以上各四兩天麻四兩酒浸去苗川楝子去核取肉四兩炒何首烏四兩酒浸白朮四兩去蘆淨炒石斛四兩去根淨炒車前子四兩酒浸自然銅四兩煅醋淬七次研水飛白牽牛四兩炒研末地龍去土淨四兩炒麝香一兩一半為衣研乳香研硃砂二兩研為衣川烏頭四兩炮裂去皮臍淨槐角子四兩炒大黃四兩炒烏鴉二隻臘月者泥固濟炭火煅紅取出用烏梢蛇一條酒浸取肉四兩炙風梢蛇一條酒浸取肉四兩炙白花蛇酒浸一條取肉四兩炙藥末成然後定蜜分兩上件為細末煉蜜為丸如大龍眼大每服一丸空心臨臥細嚼用無灰酒送下芽茶清亦可臘月最可修合蠻夷酒出千金方治久風枯攣三十年著床及諸惡風眉毛墮落乾地黃獨活丹參礜石各一兩麥門冬附子甘遂各二兩赤石脂三二兩半乾薑蕪荑焙芫花柏子仁各一合蘇子一升蓯蓉茯神一作茯苓金牙薯蕷白朮杜仲石南牡荊子山茱萸款冬花各十兩十八銖白芷烏啄烏頭人參狼毒蜀椒防風細辛礬石寒水石牛膝麻黃芎藭當歸柴胡芍藥牡蠣桔梗狗脊一作枸杞天雄各半兩石斛桂心各六錢銖上㕮咀以酒二斗漬夏三日春秋六日冬九日一服半合蜜室中合藥勿令女人六畜見之三日清齋乃合一方無芎藭加大棗四十枚大排風散出聖惠方治一切風天麻二兩羚羊角屑三分羌活一兩防風一兩去蘆頭芎藭一兩甘菊花三分山茱萸三分薯蕷三分細辛三分藁本三分獨活一兩秦艽三分去苗麻黃一兩去根節枳殼二一兩麩炒微黃去瓤蔓荊子三分白蒺藜一兩微炒去刺黃耆三分銼酸棗仁三分微炒丹參半兩鹿角膠三分搗碎炒令黃燥莽草半兩微炒炙地骨皮半兩白蘚皮半兩漢防己三分桂心三分牛膝三分去苗附子三分炮裂去皮臍薏苡仁三分杜仲半兩去皴皮炙微黃銼石南半兩當歸三分生乾地黃三分萆薢半兩銼側子三分炮裂去皮臍蒼耳苗半兩乾薑三分炮裂銼阿膠三分搗碎炒令黃燥人參三分去蘆頭犀角屑三分白朮三分白芷三分川椒三分去目及閉口者微炒出汗茵芋三分甘草半兩炙微赤銼杏仁半兩湯浸去皮尖雙仁麩炒微黃上搗羅為散每服食前以溫酒調下二錢生薑薄荷湯調服亦得忌生冷雞豬肉大黑神丸治一切風曾青一兩硫黃一兩水銀一兩與硫黃結為砂子硃砂一兩雄黃一兩白石英一兩紫石英一兩白礬一兩黃丹一兩半金箔五十片銀箔五十片硝石一兩定粉一兩大陰玄精一兩以上藥研令細入於固濟了瓶子中其瓶子上開一小竅子用出陰氣初以小火食養二日候陰氣出盡以鹽埿塗塞竅便以大火煅令通赤候冷以濕砂土培瓶子一復時出火毒畢取出藥更研如粉白龍腦一兩麝香一兩牛黃一兩半膩粉一兩天竺黃一兩真珠末半兩琥珀半兩以上細研與諸藥臨時合和鹿胎一兩半烏蛇二兩半去皮骨狐貍骨一兩虎脛骨一兩甘草一兩敗龜一兩以上並塗酥炙搗羅為末天南星一兩炮裂白附子一兩炮裂天麻一兩麻黃一兩去根節乾蠍一兩微炒蟬殼一兩桂心一兩木香一兩檳榔一兩獨活一兩細辛一兩附子一兩炮裂去皮臍白殭蠶一兩微炒犀角屑一兩半羚羊角屑一兩半上搗羅為末與諸藥同研令勻煉蜜和搗三千杵丸如酸棗大每服以豆淋酒研下一丸忌一切毒滑魚肉動風物奪命還真丹治一切癱瘓中風癩病將死不救洗頭風驚癇吐涎暗風血風婦人產前產後血氣不調及諸筋骨節疼痛神效天麻人參木香白朮菟絲子酒浸藁本去土川獨活川芎各一兩半白殭蠶炒黃芩全蠍去毒半夏薑製熟地黃焙蔓荊子甘草炒桂生地黃地骨皮薄荷葉黃連淨菊花各一兩防風茴香炒知母杜仲炒絲斷茯苓柴胡茸桔梗陳皮去白枳殼炒去瓤石膏當歸焙各二兩羌活三兩白芍藥麻黃去根節各一兩半細辛去葉半兩蛤蚧一對炙金箔四十片為衣上為細末煉蜜為丸每兩作十丸細嚼酒熱茶下不拘時候婦人調血香附子末酒調送下食前日進三服龍虎丹治丈夫婦人新得久患急緩風半身不遂手腳筋衰及風毒攻注遍身瘡疥頭風多饒白屑毒風面上生瘡刺風狀如針刺癇風急倒作聲頑風不忍痛癢瀝風頸生駁斑暗風頭旋眼黑皶風面生赤點肝風鼻悶眼瞤偏風口眼喎斜節風肢節斷續脾風心多嘔逆酒風行步不前肺風鼻塞項痛膽風令人不睡氣風肉似蟲行腎風耳內蟬鳴陰間濕癢黑牽牛爁藿香葉生天麻去苗牛膝去苗酒浸切焙微炒硫黃結砂天竺黃生研細辛去苗洗半夏湯洗七次生薑汁炙白乾薑炮三兩附子炮去皮臍何首烏去粗皮羌活去蘆洗焙獨活去苗柴胡去苗川芎洗桔梗生各二兩寒水石燒通赤研飛一斤茴香淘去土焙甘松洗去土焙肉桂去粗皮五靈脂生白芷生菊花去土川烏炮去皮臍白殭蠶去絲嘴炒縮砂仁生各五兩牙硝研木香生水銀與硫黃用慢火結成砂子雄黃研飛麝香研各一兩地龍去土焙炒硃砂研飛白蒺藜爁防風去苗各三兩龍腦研半兩烏蛇酒浸炙去皮骨八兩上為細末煉蜜為劑如雞頭大每服一丸用薄荷酒嚼下日進一服重即兩服產後驚風亂道見物硃砂酒磨下產後身多虛腫血風頻增昏沉身如針刺發隨梳落面黃心逆並煎當歸酒嚼下日進兩服若治傷寒炒蔥豉酒嚼下一二服蓋覆出汗立愈小兒驚風薄荷酒化下少許大人急風口噤失音等薄荷酒化灌之當常服茶酒任下不拘時候服神效神效活絡丹出德生堂方治男子婦人卒曝中風不省人事倒地不能起坐諸藥不效此藥二丸好酒一大盞化開灌下如口眼喎斜語言蹇澀身體麻痹口噤失音不語痰涎壅盛筋脈拘攣手足不能屈伸骨節疼痛不能轉側精神昏憒臨臥一丸細嚼或爛研好酒嚥下便睡覺有汗受汗無汗將病手背隨即舒拳至天明起用人扶策行動至早飯後依前扶策行動至日西再服一丸可痊又治婦人產後暗風洗頭偏頭風旋暈欲倒用藥一丸細嚼或研開好