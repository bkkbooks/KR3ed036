為丸捏作瘡子樣曝乾先灸破瘤頂三炷然後以藥餅蓋上用黃柏末以水調貼數日自然乾枯下落餅金散治枯瘤子砒霜一兩砒黃腳一兩巴豆半兩去皮出油木鱉子一兩去皮研如泥上同為細末入石腦油和一塊用紙二十四重裹藥磁合內盛入地二尺埋兩個月取出陰乾後入輕粉一錢雄黃半錢粉霜二兩乳香一錢沒藥三錢蟾酥一錢上同前藥研為細末先放瘡子項上灸三炷唾調塗之上用紙封三重每日上次洗藥休去了金黃散作錠子瘤子破了用此藥紝在四邊自落姜酒下早晚各一丸如小腸氣加三丸切生薑三錢炒焦酒下如傷酒二丸飛白礬生薑自然汁調下婦人心氣痛醋湯下二丸紫蘇子膏治項氣成瘤方見紫蘇膏生肉膏治癰瘤潰漏及金瘡百瘡方當歸附子甘草白芷芎藭各一兩薤白生地黃各半兩上㕮咀以豬脂三斤煎白芷地黃去滓稍以敷之日三次蔓荊實丸治瘤蔓荊實去白皮炒一兩甘草炙銼一兩羊靨二十枚去脂膜別搗白蘞半兩椒目一分小麥面微炒一兩昆布黃耆湯一名麥門冬丸治瘤腫麥門冬去心焙昆布洗去鹹味焙各三分黃耆焙大黃銼一錢蒸陳橘皮湯浸去白焙杏仁湯浸去皮尖雙仁炒甘草炙銼各一兩上為末與靨末相和以好醬更搗丸如梧桐子大每服酒下五丸消毒散治毒氣項下結核欲成瘤者皂角子五百枚慢火炒黃薄荷乾者二兩檳榔銼半兩甘草炙銼連翹各一兩上為散每服二錢半食後臨臥米飲調下臘茶亦可深師療瘤脂細瘤方吳茱萸一分礬石燒芎藭當歸大黃黃連芍藥白蘞黃芩各二分上合搗下篩和雞子塗著細故布上隨瘤大小厚薄貼之燥輒易換著藥當熟作膿脂細細從孔中出探知膿血盡著生肉膏若膿血不盡因復起故也繫瘤子自落方砒黃砒霜硼砂各半兩巴豆五粒去皮心蚖青七枚去頭足翅糯米拌炒以黃為度斑蝥七枚去頭足翅糯米拌炒以黃為度上研為末先取蜘蛛網及絲共搓為線子水濕塗藥末於上貼瘤子中常以藥末養遇有患者以線系之留線頭如痛即不用系其瘤自黑而干如核桃大者三四日自落如茄子大者半月落更大者不過二十八日如瓜者不過一月如血瘤系之血出者服定血藥咽服藥治之黃芩散治諸瘤血出黃芩去黑心黃柏去粗皮銼黃連去須鬱金各半兩上為散入寒食麵五錢半水調貼之小黃膏治瘤黃柏黃芩大黃各等分上為末以水調為糊比枯瘤藥大一遭塗之三日一易至八九日不取直候可取治小瘤方治先用甘草煎膏筆蘸妝瘤四圍干後復妝凡三次然後用藥大戟芫花甘草上等分為末米醋調別用筆妝敷其中不得近著甘草處次日縮小又以甘草膏妝小暈三次中間仍以大戟芫花甘遂如前法自然焦縮凡骨瘤肉瘤膿瘤血瘤石瘤皆不可決惟脂瘤決去其脂粉則愈蓋六種瘤尤不可治治則殺人信一兩硫黃一兩井泉石二兩玄精石一兩上將藥研作小塊入砂鍋內赤石脂並鹽泥固濟勿令透氣入於文武火內燒煙盡取出放在地上冷定取藥後入輕粉一錢乳香二錢硼砂二錢沒藥二兩雄黃二錢上同研為細末用蒸餅心和為小錠子塗敷四邊大效驗治贅瘤如破者用藥餅一枚安破處漸漸腐化去之不破者用針挑動用藥信五錢研硫黃五錢研白丁香四錢斑蝥十六個去頭足翅巴豆十六個去殼油雄黃四錢輕粉二錢上為細末用油餅邊和丸如彈子大捏作餅子龍膽丸治氣瘤龍膽去蘆頭炙一兩昆布洗去鹹味炙海藻洗去鹹味炙各二兩馬刀研海蛤研香草各半兩大黃銼炒一分上為末煉蜜和丸如梧桐子大用破綿裹一丸朝暮含咽之白頭翁丸治氣瘤方見必效主氣癭方二色丸治一切腫赤皮膚毒及瘤天南星半夏甘遂大戟各三錢乾薑胡艽肉桂蓽茇各二錢代赭石一兩大黃生用三錢上取前四味以漿水一升煮水盡為度曬乾餘六味同搗為末每用一錢巴豆三枚燒得焰起盞合卻候冷與前藥一處研更用醋一盞煎成膏共藥同丸如綠豆大少分兩處丹砂為衣一用膩粉為白衣此兩等顏色白者或捏作餅子亦可用治瘤子每服一丸生薑湯下神效散治項氣瘤結附贅日漸增長豬羊靨各三十枚調入鹽膽內蘸過令乾久只用鹽亦得陳皮去白焙炒一兩上為散每服二錢匕空心米飲下初結時不可數服覺消減不用久服治瘤雄黃一錢人言一錢一分上研為細末稀粥糊調藥攤在瘡頂兒上用針挑破以藥貼之紙封好治白瘤方白礬硫黃等分上為末以醋調和封上治瘤子獨掃子本草名地膚子白礬上等分為末煎湯洗不數次即盡去陳郎中曾親用之果驗枯瘤方用銅綠為細末刺破瘤糝在上以膏藥貼之南星膏治皮膚頭面生瘤不可輒用針灸大者如拳小者如粟或軟或硬不疼不痛宜服此方用生南星大者一枚去土薄切細研桐黏為膏滴好醋五七滴如無生者以乾者為末投醋研為膏先將小刺病處令氣透以藥膏攤紙上像瘤大小貼之三五次易換覺癢便瘥系瘤法兼去鼠奶痔用芫花根淨洗帶濕不得犯鐵器於石器中搗取汁用線一條浸半日或一宿以線系定經宿即落未落再換線不過兩次自落後以龍骨並訶子末敷瘡口即合依上法系鼠奶痔瘻亦得效系瘤法蘇沈良方亦有用蜘蛛者然費力不如此捷徑如無根只用花泡濃水浸線亦得昔趙氏嘗用以繫腰間一瘤不半日即落亦不痛治果報面生贅瘤用艾圓灸十壯即用醋磨雄黃塗紙上剪如葉獅子大貼所壯處更用膏藥重貼二日一換候癢搔出膿如綠豆粉即愈治瘤方用舊牛皮洗淨煎為凍常食之瘤若破如豆腐極臭治瘤方用鹿肉剖如厚脯炙令熱拓掩一日四炙四易擠出膿便愈不除更炙新肉用之良治瘤用人精一合半亦得青竹筒盛火上燒炮之以器承取汁密置器中數敷瘤上良蓖麻子方治大人小兒項下結核漸成癭瘤用蓖麻子炒黃風中吹乾每服溫湯下一枚不拘時候日服三五枚服之五日後搗玄參為散食後溫米飲調下一錢匕與蓖麻相間服三日後依前只服蓖麻五日後卻與玄參同服三日周而復始系瘤方用稻上花蜘蛛十餘枚置桃李枝上候絲垂下取東邊者紝為線子系定瘤子七日候換瘤子自落昔人病瘤如拳大以此係之至三換瘤子自干一夜忽失所在天明於枕邊得之如一干粟又方用狗屎拌雞子敷之去膿水如前方說敷生肉膏取瘥治肉瘤先將麻布擦令血熱方上藥大者用藥四五次小者用藥三四次以至根頭不痛有血暈即止辨瘤數種於後軟筋瘤帶經絡垂米瘤開如米脂瘤肉如粉番花瘤形如石榴花肉瘤色紅茄子瘤色如紫茄氣瘤肉實骨瘤硬實血瘤色如系茄軟白油瘤搽開如牛血上十般瘤子惟有七般可醫如軟瘤番花瘤並自有破者不可療用藥之際切須審察贅瘤方用綿紋大黃醋磨塗瘤上漸消白瘤方令先極搔刮以繩縛之即愈又取東向木空中水刮瘤上洗之凡一日三次即愈治身上生贅肉用海藻為末敷仍煎海藻酒服之則去治贅瘤用茄子咬去蒂於贅瘤上搽千百遍以茄撇於地上茄若爛瘤平復矣平復以點贅瘤法凡剪去薄皮以藥貼之痂落即去大者內捻出一肉片子仍須搽令血熱方可用藥治瘊子用濃研好京墨筆抹在瘊子上候乾更抹以多為妙數次即失去又方用買路紙不令人見揩後密藏撇於路上街磚下紙爛則疾愈矣又方用青柴燒出水搽之治瘤腫悶方羊靨一兩乾者青橘皮一兩湯浸去白瓤焙乾燒銀沙鍋一兩上為末用糯米飲和丸如梧桐子大每於食後以木通湯下二十丸井金湯治枯瘤癧大有神效土黃二錢雄黃二錢硼砂二錢研粉霜一錢輕粉一錢乳香半錢沒藥半錢上為細末假令瘤子如胡桃許用藥末少許用津唾調稀糊得所攤去瘤子項上如小錢許唾津濕紙花兩重蓋之後用黃熟膏蓋之黃龍膏用黃柏一味為細末唾調攤在紙上生肌青龍散訶子皮高茶龍骨上等分為細末干糝上做土法砒黃研為末三兩木鱉子半兩去殼巴豆半兩不去油硼砂另為末二兩上砒黃一處為末後用木鱉子同石腦油和成一塊油紙裹定埋於坑內四十九日取出收於磁器盛劈作小塊枯瘤子藥方桑柴灰二碗膩白石灰三碗朽木三兩干桑耳三兩草烏頭半斤川烏頭四兩上朽木等四味燒灰存性同煎桑柴灰勻用水一桶淋汁如法微火成膏敷之治頭面瘤子用蛛絲勒瘤子根三二日自然退落治宿肉贅瘤上以螲蟷燒為末和臘月豬脂敷之治癭根瘤贅息肉上用博落回和百丈青雞桑灰為末敷之治係指並贅瘤方上以花蜘蛛網絲於黃丹中養之係指與瘤夜至旦自下釘棺鐵斧聲去人身上胬肉可候釘棺時專聽其聲聲發之時便下手速塗二七遍以後自得消平也產婦勿用
