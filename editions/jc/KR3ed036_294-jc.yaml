body:
  text: 卷二百九十四癭瘤門總論夫癭瘤者多由喜怒不節憂思過度而成斯病焉大抵人之氣血循環常欲無滯留之患調攝失宜氣凝血滯故為瘤為癭者多結於頸項之間瘤者隨氣凝結於皮肉之內忽然腫起狀如桃李子久則滋長醫經所謂癭有五種瘤有六證五癭者石癭肉癭筋癭血癭氣癭是也六瘤者骨瘤脂瘤血瘤石瘤膿瘤肉瘤是也治療之法五癭不可決破決破則膿血崩潰多致夭枉六瘤者脂瘤可破去脂粉則愈外五瘤亦不可輕易決潰慎之諸癭瘤附論夫氣血凝滯結為癭瘤癭則憂患所生著於肩項皮寬不急槌槌而垂是也瘤則隨氣留住初作桃李之狀皮嫩而光漸如杯卵是也其肉色不變者謂之肉癭其筋脈呈露者謂之筋癭其赤脈交絡者謂之血癭隨憂患而消長者謂之氣癭堅硬而不可移者謂之石癭癭之名有五者此也一曰骨瘤二曰脂瘤三曰肉瘤四曰膿瘤五曰血瘤六曰石瘤瘤之種有六者此也凡癭瘤雖無痛癢然最不可決破決破則膿血崩潰滲漏無已必至殺人其間肉瘤攻療尤所不許若夫脂瘤氣癭隨順用藥尚庶幾焉方海藻丸海藻洗去鹹味曬乾一兩海蛤煅松蘿各七錢半研當歸川芎官桂白芷細辛藿香白蘞明礬煅昆布洗去鹹味曬乾各五錢上為細末煉蜜和丸如彈子大每服一丸含嚥下之穿癭丸治癭瘤結硬通草二兩杏仁去皮尖研牛蒡子去油各一兩射干昆布去咸訶黎勒海藻去咸各四兩上為末煉蜜和丸如彈子大噙化咽津下日進三服海藻散治癭瘤海藻洗去鹹味焙一兩一錢昆布洗去鹹味焙一兩半白茯苓去黑皮半兩海蛤研木通銼桂去粗皮各半兩羊靨十枚去脂炙令黃上為散隨時溫酒下三錢半夜一服治瘻瘤方昆布洗去鹹味焙二兩桂心逆流水柳須各一兩海藻洗去鹹味焙乾薑各二兩炮製羊靨七枚陰乾上為末煉蜜和丸如小彈子大含一丸咽津隨時忌五辛濕面熱物海蛤散治癭瘤海蛤研海藻馬尾者洗去鹹味白茯苓去黑皮人參半夏水煮一兩洗去滑切焙各半兩上為散每服一錢匕入豬靨子末一錢匕甜藤一尺去根五寸取之甘草一寸水五盞同煎取一盞半分三次每次調散二錢匕臨臥服男人四服女人八服次用丸藥宣下除毒丸治癭瘤服海蛤散後宜服此巴豆鐵串穿燒去心用大黃末各半兩上研末端午日粽子為丸如綠豆大空心冷茶下三丸良久熱茶投之下多以冷粥止之連殼丸治氣瘤及癭連殼微炒二兩石榴皮醋焙乾薑炮各三分半枳殼麩炒去瓤一兩上為末更入百草霜一兩麝香少許各細研打醋麵糊為丸如小豆大每日空心用胡椒米飲湯下三十丸至五十丸豬靨散治氣瘤癭獖豬靨二七枚半夏洗去滑二十二枚上為散每服溫酒調一錢匕臨臥垂頭服海藻酒方治頸下卒然結核漸大欲成瘤癭用海藻洗去鹹味一斤酒二升漬一宿取三合飲之酒盡將海藻曬乾搗為末酒調一錢一日三服即瘥如浸時用絹袋盛了春夏浸二日秋冬浸三日柳根酒治瘤癭用柳根三斤須水所經有露出者水一斗煮取五升用米三升釀之酒成每服飲半升空心日午及臨臥時各一服治癭瘤鬼氣疰用鉛錫為末和清油敷之癭附論夫癭者由憂恚氣結所生亦曰飲沙水沙隨氣入於脈搏頸下而成之初作與癭核相似而當頸下也皮寬不急垂膇膇然是也恚氣結成癭者但垂核膇膇然無脈也飲沙水成癭者有核癗癗然無根浮動在皮中又云有三種癭有血癭可破之有息肉癭可割之有氣癭可具針之養生方云諸山水黑土中出泉流者不可久居常食令人作癭病動氣增患癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邊也乃不急膇然則是癭也中國人息氣結癭者但垂膇膇無核也長安及襄陽蠻人其飲沙水病癭有核癗癗耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也北方婦人飲沙水者產後得乳甚難非針不出是以比家有不救者良由此也凡癭袋脹悶養生論云兩山夾山其人多癭土厚水深其人多癭地勢使然也此可服人參化癭丹自消癭藥多用海藻海帶味屬鹹寒儒門事親書云新寨一婦人年四十餘有癭三瓣戴人以鹽吐之三湧三汗三下癭已半消次服化癭之藥遂大消去夫病在上者皆宜吐亦自有消息之法耳方化癭丹治癭海藻海帶昆布澤瀉木通豬靨羊靨各五枚海蛤連翹上為細末研靨為丸如雞頭子大每服一丸臨臥噙化一方無木通療癭昆布六分洗去鹹味海藻七分洗去鹹味松蘿乾薑桂心各四分通草五分上搗篩煉蜜為丸如梧桐子大每服七丸即住在頸下之癭欲至食時即先飲少許酒卻下丸子然後食禁酢蒜鹽酪臭肉倉米若癭大者加倍用藥令取瘥又方療頸下卒結硬核欲成癭昆布洗去鹹味海藻洗去鹹味各一斤上細切好酒五升浸七日量力取數服酒更浸兩遍藥力盡當以此酒下藥彌良一方為末蜜和丸如杏核大含之稍咽汁日四五度甚佳木通散治頸下卒然結囊欲成癭木通銼海藻昆布各洗去鹹味松蘿桂心蛤蚧塗酥炙令微黃白蘞琥珀各一兩上為細末每服不拘時候以溫酒調下二錢海藻散療癭海藻八兩洗去鹹味貝母二兩土瓜根二分小麥面二分炙上為散酒服方寸匕日三昆布丸治一切癭病不問新久昆布洗去鹹味一兩海藻洗去鹹味一兩小麥好醋煮乾一兩上為細末煉蜜和丸如杏核大每服一丸食前噙咽治癭項蒲黃三兩如有熱寒水石代之豬靨羊靨各五兩去脂膜焙乾上為細末用餳糖為丸如彈子大噙化療癭方昆布洗去鹹味三分松蘿三分海藻洗去鹹味五分上研為末丸如杏核大含咽津日三夜二甚佳治忽生癭病一二年者用萬州黃藥子三斤須緊重者為上如輕虛即是他州者其力即慢須用焙取無灰酒一斗投藥中泥封固瓶口以糠火燒一頓飯時停住令酒冷即令患者時時飲一盞不令絕酒氣經三日後常把鏡自照覺銷即停飲不爾便令人頸細也旁邊糠火不可多堆燒酒氣香出瓶頭有津即止火不待經宿也已驗如神忌食毒物療癭方用醇苦酒一升漬小麥一升含溫瀝出曝乾燥後不須使苦酒浸曝麥燥搗篩以海藻五兩別搗以和麥末令調酒服方寸匕日三禁食鹽生魚及生菜生肉又方用秫米三升取圓葉白楊皮十兩去土蒼者慎勿令見風細切五升煮取二升濃汁漬曲末五兩用前件秫米依酒法釀之俟熟了封塞十七日後空心服一大盞日再服三日即效又方用小麥三升三年米醋三升漬麥曝乾更浸使醋盡又曝乾搗篩為散別搗昆布為散每服取麥散二匕昆布散一匕但飽食訖清酒和服之若不能飲酒者以水和服亦得服盡即瘥多服彌善無所禁但不用舉重及悲啼煩惱事救急療癭方用鼠黏草根一升湯洗細切除皮者一升以水三升煮取一升半分三服溫下去服過時如人行四五里一服宜頓服六劑病即瘥一方削皮細切取三大升搗篩為散煉蜜和丸如梧桐子大每服一十丸日日服之稍稍加至三十丸以無灰酒進之治癭以杜蘅食之五癭附論石癭泥癭勞癭憂癭氣癭是為五癭石與泥則因山水飲食而得之憂勞氣則本於七情之所感氣則隨之或上而不下或結而不散是也破結散主治五癭堅硬而不可移名石癭皮色不變名肉癭筋絡露結名筋癭赤脈交絡名血癭隨憂愁消長名氣癭五癭皆不可妄決決破則膿血崩潰多致夭枉宜服以下諸方方五癭丸菖蒲海蛤白蘞續斷海藻松蘿官桂心蜀椒去目及閉口者倒掛草半夏各二兩神麯二兩羊靨百枚上搗篩為末以牛羊髓脂和為丸如梧桐子大日服三丸一方以醬浸牛羊髓脂為丸破結散治五癭等症海藻洗去鹹味龍膽草海蛤通草昆布洗去鹹味礬石枯松蘿各三分麥曲四兩半夏海帶各三分上為末每服方寸匕酒調日三服忌豬肉雞魚豆辛生菜及諸毒物十日知二十日愈一方有貝母無海帶海藻散治五癭海藻洗去鹹味海蛤各三兩昆布洗去鹹味半夏湯洗七次去滑細辛土瓜根松蘿各一兩木通銼白蘞龍膽各二兩上為細末每服一錢匕酒調服日再不得作勞用力昆布洗去鹹味焙三兩白蘞木通銼海蛤研松蘿各二兩桂去粗皮海藻洗去鹹味焙各三兩上為細末每服溫酒調下二錢匕日二服不拘時候禁生冷醋滑雞豬肉魚蒜等物玉壺散治三種癭海藻去鹹味焙海帶去鹹味焙昆布去鹹味焙雷丸各一兩青鹽廣朮各五錢上為細末陳米飲為丸如榛子大每服一丸含化咽津不拘時候常令藥不斷如蜜和丸亦可一方無青鹽廣朮又方小麥面一斤海藻一斗洗去咸焙時生礬石十兩上以三年米醋浸小麥面曝乾各搗為散合和服一方每日可用四五服含津乃咽之禁食薑五辛豬肉魚生菜並忌吹打及誦讀耳語等聲又方取鹿靨以佳酒浸令汁出炙乾內酒中更炙令香含咽汁味盡更易盡十具愈治五癭上以昆布一兩並切如指大酢漬含咽汁愈氣癭附論夫癭之初結者由人憂慮志氣常逆蘊蓄之所成也又飲沙石流水毒氣不散之所致也皆是肺脾壅滯胸膈否澀不得宣通邪氣搏頸故令漸漸結聚成癭宜早療之便當消散也方白前湯治氣癭初作白前昆布洗去鹹味炙乾厚朴去粗皮生薑汁炙杏仁湯浸去皮尖雙仁炒陳橘皮湯浸去白曬乾切細附子炮製去皮臍海藻洗去鹹味炙乾半夏湯洗七次甘草炙銼各一兩小麥醋浸一宿曝乾三合上銼如麻豆每服三錢匕水一盞半生薑一片棗一大枚拍碎煎至八分去滓食後溫服日三次杏仁丸治氣結頸項蓄聚不散成癭杏仁去皮尖雙仁炒令黃連殼各一兩海藻洗去鹹味焙一兩一分訶黎勒煨去核二兩半昆布洗去鹹味焙木香各二兩蔓荊實揉去皮羊靨炙各一兩檳榔銼陳橘皮去白焙乾各半兩上為末煉蜜和丸如梧桐子大每服三十丸空心米飲下仍常含化一丸因氣成癭海藻洗去鹹味焙海帶昆布洗去鹹味焙木通銼甘草各一兩訶子薄荷各半兩杏仁湯浸去皮尖雙仁煎上為細末煉蜜和丸如雞頭子大噙化忌油膩鹽物必效主氣癭方一名白頭翁丸兼治氣瘤白頭翁半兩昆布十分洗去鹹味焙海藻七分洗去鹹味焙通草七分玄參連殼子各八分桂心三分白蘞六分上搗篩為末煉蜜和丸如梧桐子大每服五丸用酒調服忌蒜面豬肉魚及生蔥等物治氣結喉中蓄聚不散欲成癭白茯苓去黑皮三兩半夏湯洗去滑生薑切焙各二兩昆布洗去咸焙海藻洗去咸各五兩桂去粗皮陳橘皮去白焙各一兩上為末煉蜜和丸如杏仁大含化一粒細細嚥津令藥不絕紫蘇膏治咽喉氣噎塞成氣癭紫蘇子炒桂去皮大黃銼炒當歸切焙乾薑炮各半兩陳橘皮湯浸去白焙一兩蜀椒去目併合口者炒令出汗一分豬脂臘月者煎去滓半斤上㕮咀如麻豆大先以水六升煎至二升綿濾去滓以豬脂白煎成膏取塗癭上日夜各一次以瘥為度忌生蔥治氣癭問荊一兩出海島羯羊靨五枚去脂炙蜀椒去目及合口者炒令出汗甘草炙各一分小麥曲末二兩熬上研為散羊靨一種別搗為末相和加好漿水浸更搗作丸如小棗大一服五丸無禁忌昆布丸治氣癭初結喉中壅悶不治即漸腫宜服此昆布洗去鹹味焙訶黎勒皮檳榔各一兩松蘿半兩乾薑半兩炮銼桂心半兩海藻一兩洗去鹹味焙木通二兩銼上為末煉蜜和丸如梧桐子大每於食前煎好酒溫下二十丸又方昆布一兩洗去鹹味海藻一兩洗去鹹味訶黎勒皮一兩枳殼半兩麩炒去瓤上為末煉蜜和丸如杏核大常含一丸以津咽又方琥珀一兩大黃一兩銼微炒昆布半兩洗去鹹味上為末煉蜜和丸如梧桐子大每日空心及晚食後溫酒下二十丸一方又名琥珀丸又方檳榔三兩海藻二兩洗去鹹味昆布三兩洗去鹹味上為細末煉蜜和丸如小彈子大每日常含一丸徐徐咽津一名檳榔丸忌鹽治氣癭海藻洗去鹹味海帶海螵蛸上等分為細末酒煮空心服治氣癭用海藻為末露一宿清晨不須洗面旋汲井花水調面東禮拜面東服每日如此服之至半月如已消減不可再服則瘥必矣針砂方專治氣癭用針砂浸於水缸平日飲食皆用此水十日一換針砂服之半年自然消散以針砂能解毒也治氣癭用羊靨一具去脂含汁汁盡去皮日一具七日含便瘥療氣癭方用平旦手挽癭令離項掏其下根脈斷愈一日一度掏易愈者七日難愈者三七日礬蠍散治項氣又名癭氣白礬一兩生令細全蠍半兩上將礬為末用耳鍋一個將蠍用麻黃包了線扎定將礬分作兩處一半在底一半在上全蠍在中心用瓦片子蓋定再用鹽泥固濟候乾用熱火二斤煅一斤將取出為細末每服一錢入麝香少許將獖豬靨一個切入藥內用濕紙包五七重火煨熟取出臨臥時細嚼津液送下海帶丸治癭氣久而不消海帶南貝母青皮陳皮上各等分為細末煉蜜和丸如彈子大食後噙化一丸海藻潰堅丸治癭氣盛大久而不消海藻洗去鹹味海帶昆布洗去鹹味各一兩青鹽半分廣朮半兩上為細末煉蜜和丸如指尖大每服一丸噙化而下治一切癭已結成將潰未潰時上用皂角刺四兩牽牛子四兩洗淨掃闊磚石上鋪定皂角刺糝牽牛子在上燃火燒之火成速以盆碗合之候冷勿使成灰為末每服一錢半或二錢飯飲調下癭病咽喉噎塞附論夫癭病咽喉噎塞者由憂恚之氣在於胸膈不能消散傳於肺脾故咽之門者胃氣之道路喉嚨者肺氣之往來今二經為邪氣所乘致經絡否澀氣不宣通結聚成癭在於咽喉下抑鬱滯留則為之出納者噎塞而不通病癭者以是為急也方半夏散治癭氣咽喉腫塞心胸煩悶半夏湯洗七次去滑射干牛蒡子炒研各一兩杏仁湯浸去皮尖雙仁炒令黃羚羊角屑木通銼桔梗去蘆頭昆布洗檳榔赤茯苓各三分枳殼半兩麩炒微黃去瓤甘草半兩炙微赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服桂心散治癭氣咽喉腫塞桂去粗皮昆布洗去鹹味海藻洗去鹹味甘草各半兩炙微赤銼白麵炙一兩龍膽海蛤洗去鹹味土瓜根半夏為末生薑汁和作餅子曝乾吳茱萸湯洗去涎焙炒牡蠣燒各一兩半上為散每服二錢匕酸漿水調下食後臨臥時服治癭氣咽喉腫塞煩悶宜服此方木通一兩銼昆布一兩洗去鹹味乾薑一分炮治銼射干三分甜葶藶一兩隔紙炒令紫色羚羊角屑三分人參半兩去蘆頭海藻半兩洗去鹹味檳榔三分上為末煉蜜和丸如梧桐子大不拘時候以酒下二十丸治癭氣咽喉腫塞胸中滿悶昆布三兩洗去鹹味大黃一兩木通一兩銼海藻一兩洗去鹹味射干一兩枳殼半兩杏仁湯浸去皮尖炒二兩牛蒡子二兩海蛤一兩上為細末煉蜜和丸如梧桐子大每服不拘時候以粥飲湯下二十丸昆布散治癭氣結腫胸膈不利宜服此方昆布洗去鹹味海藻洗去鹹味松蘿細辛半夏洗七次去滑海蛤細研甘草炙微赤銼白蘞各一兩龍膽去蘆二兩土瓜根檳榔各一兩上為散每於食後以溫酒調下二錢不得用力勞動療癭結氣方昆布一錢二分洗去鹹味馬尾海藻一錢洗去鹹味杏仁八分去皮尖通草麥門冬去心連翹乾薑陳橘皮各六分茯苓八分松蘿三兩上為末煉蜜和丸含之齒微微嚼藥袋子汁出入咽中日夜勿停看有問荊加四分忌自嗔及勞動油膩等物二靨散一名寶金散治癭氣豬羊靨各十枚暖水洗去脂膜切焙海藻洗去咸炙乾海帶各一兩丁香木香琥珀麝香研細各一兩真珠半分研上為散每服一錢匕熱酒一盞調下垂頭臥片時絕去房室男女不消十服見效男子婦人患此病者百日見效婦人有孕不可服治癭結腫漸大宜服此方海藻洗去鹹味海帶海蛤細研昆布洗去鹹味木香以上各二兩金箔五十片細研豬靨七枚炙乾羊靨七枚炙乾上為散每夜臨臥時以溫酒調下二錢仍不得著枕臥如不得法癭即難治訶黎勒丸治年深癭氣噎塞訶黎炒去刺檳榔海藻洗去鹹味焙各一兩乾薑炮白茯苓去黑皮龍膽桂去粗皮各三分昆布洗去鹹味焙一兩上為末煉蜜和丸如酸棗大每服一丸含化不拘時海藻丸治咽喉中噎悶成癭海藻洗去鹹味微炙乾檳榔銼昆布洗去鹹味炙乾訶黎勒皮文蛤研各三兩海蛤研半夏湯洗七次生薑切焙各二兩小麥米醋浸三宿曝乾三合上為末煉蜜和丸如彈子大每服一丸含化下日三通氣丸治癭氣咽喉腫塞毒氣壅悶不通木通銼射干杏仁湯浸去皮尖雙仁炒訶黎勒煨去核海藻洗去鹹味焙乾黃耆各一兩白茯苓去黑皮三兩惡實微炒昆布洗去鹹味焙上為末煉蜜和丸如彈子大每服一丸含化下日三治癭氣胸膈壅塞咽喉漸粗宜服此方商陸二兩昆布二兩洗去鹹味射干一兩木通一兩銼海藻一兩洗去鹹味羚羊角屑一兩杏仁一兩湯浸去皮尖雙仁麩炒微黃牛蒡一兩微炒上為散每服三錢水一盞入生薑半分煎至六分去滓不拘時候溫服羊靨丸治咽喉不利頸項漸粗將成癭病羊靨二七枚炙黃切人參一兩半木通銼一兩海蛤研細昆布洗去鹹味炙乾三兩上為細末煉蜜和丸如梧桐子大每服十五丸至二十丸米飲下日再服昆布丸治咽喉塞冷氣上築妨悶漸成癭氣昆布洗去鹹味炙乾杏仁湯浸去皮尖雙仁炒研犀角鎊人參二兩半吳茱萸洗焙乾炒海藻浸去鹹味炙乾各二兩乾薑炮葶藶子紙上炒各一兩上為末煉蜜和丸如桐子大每服二十丸米飲下日三次連翹丸治癭病咽喉噎氣塞連翹木通銼乾薑炮各一兩羊靨炙七枚昆布洗去鹹味焙一兩杏仁去皮尖雙仁炒一十七枚車前子微炒一兩半夏為末生薑汁和作餅子曝乾一兩上為散每服二錢匕米飲調下日二服食後臨臥下治癭氣咽喉腫塞宜服此方松蘿一兩昆布二兩洗去鹹