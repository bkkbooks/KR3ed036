body:
  text: 卷二百八十二癰疽門總論經云黃帝問於岐伯曰癰疽何以別之岐伯答曰榮衛稽留於經脈之中則血澀不行血澀不行則衛氣雍遏而不通故生大熱熱盛則肉腐為膿然不能陷肌膚於骨髓骨髓不為焦枯五臟不為傷損故命曰癰黃帝曰何謂疽岐伯答曰熱毒熾盛下陷肌膚骨髓皆焦枯內連五臟血氣涸竭當其癰下筋骨良肉皆無餘故命曰疽疽者其上皮夭以堅如牛領之皮癰者其上皮薄以澤此其候也黃帝曰善然五臟不調則致癰久患消渴之流亦多發癰疽之疾岐伯曰喜怒不測飲食不節陰氣不足陽氣有餘榮衛不行血氣不通而熱相搏乃發為癰疽凡服乳石之人常須小勞怡悅神思夫乳石之氣隨開而行遇閉而止止則血脈凝澀瘡疣生焉或不遂志欲加之以怫鬱憂憤蓄結貪咨驕狠飢飽勞逸負恃之變遂致血氣夭結凝固而為病論云夫陰陽蘊結臟腑為之積聚血氣凝澀榮衛為之壅滯陽滯於陰則生癰陰滯於陽則生疽癰疽之生有內有外內則生胸腹腑臟之中外則生膚肉筋骨之表凡此二毒發無定處而有常名夫壅滯之本者始於血老不作汗肉陳不脫垢蒸氣不能外達留積遂成內熱所為也夫癰疽之生膿水之成非天降非地出蓋積微之所成也凡癰疽癤腫才萌之時並須以湯水疏解之欲治此疾先須辨識定其淺深究其根源療之必愈熱發於皮膚之間是以浮腫根小至大過二三寸者為癤也六臟積熱騰出於外肉之間其發暴盛腫皮薄光軟侵展廣大為癰也五臟風毒積熱切焮於筋骨風毒猛暴初出一頭如㾦癗形白焦枯觸之應心者疽也癰起於六腑浮達易理若燎原之火外潰膚肉疽生於五臟沉澀難治若陶室之燧內消骨髓癰則易治唯難將息而遲瘥疽則難療易得痊復癤與癰初生並宜灸之為其氣本浮達以火導其熱令速暢也疽則宜烙不宜灸為其氣深須達其源也及已盛成膿慎勿可灸則須針烙方能瘥也凡瘡癤生於外皆由內熱所致當要服藥以下之終須外療以求瘥服藥所以助療法也夫療癰疽須以湯液疏其內針烙疏其外然則癰疽有虛有實虛則補之實則瀉之有實熱者易療虛寒邪熱多者難愈腫起堅硬膿稠者為實腫下軟漫膿稀者為虛蓋病者多為方法而無次序臨時愴惶何能辨識此疾淺深是以斃也凡癰疽瘰癧不問虛實寒熱皆由氣鬱而成經云氣宿於經絡與血俱澀而不行壅結為癰不言熱之所作而後癰者此乃因喜怒憂思有所鬱而成也此屬內因又有熱被風冷搏之血脈凝滯不行熱氣壅結而成亦有陰虛陽氣湊襲寒化為熱熱盛則肉腐為膿此屬外因寒熱風濕所傷而成也又服丹石及炙爆酒面溫床厚被所致或盡力房室精虛氣竭所致者此屬不內外因所傷而成之也如是但陰陽不平有所壅結皆成癰疽而此二毒發無定處當以脈別之浮洪滑數則為陽微沉緩澀則為陰陰則熱治陽則冷治癰疽之疾有二十餘證熛發痼發石發同巖發蜂窠發蓮子發椒眼發連珠發竟體發有腸癰內發腦發背眉發腮頷發肺癰腎癰乳癰臍癰臀發腿發外有手發足發穿當發鬚髮瓜瓤發大率隨病淺深分證內外便行施治不可遲緩毋致孔洪方為妙手凡癰疽始作便有發熱惡寒或有痛處脈浮而緊是欲為癰疽非傷寒之候也經言五臟不調致疽六腑不和生癰一曰熛疽急者二三日殺人緩者十餘日殺人二曰癰疽急者十餘日殺人緩者一月死三曰緩疽急者一年殺人緩者數年四曰水疽所發多在手足數年猶可療疽者數十種其要如此於氏法癰之疾所發緩地不殺人所發若在險地宜令即外消一為腦戶二為舌本三為懸雍四為喉節五為明脈六為五臟俞七為五臟系八為兩乳九為心鳩尾十為兩手魚十一為腸屈之間十二為小道之後十三為九孔十四為兩腨腸十五為神主之舍凡十五處不可傷而況於癰乎若癰發此地遇良醫能不及大膿者可救至大膿害及矣黃帝曰願聞癰疽之形與其期日岐伯曰癰疽之極十八種癰疽發咽名曰猛疽猛疽不療則血化為膿膿不瀉塞咽半日死其化膿者瀉已則含豕膏勿冷食三日而已一云勿食發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急療三十日死髀內曰股股外曰髀膝上股下骨稱曰股胻也發於脅名曰敗疵敗疵者女子之疾也灸之其狀大癰膿治之其中乃有生肉大如赤小豆療之方銼連翹草及根各一斤以水一斗六升煮之竭取三升則強飲厚衣坐釜上令汗出至足已發於尻者名曰銳疽其狀赤堅大急療之不療三十日死發於脛者名曰兔齧其狀赤至骨急療之不療害人發於足上下者名曰四淫其狀大如癰不急療百日死又發於肩及臑者名曰疵癰其狀赤黑急療之此令人汗出至足不害五臟癰發四五日逆爇之上灸百壯石子當碎出也不出可益壯又石癰者始發皮際相親著赤頭不甚堅微痛熱熱漸自歇便堅如石故謂之石癰難消又不易可得自熱縱愈皆百餘日也又發癰兩頭牽而旁推無根者又不痛結筋非癰也發癰狀如蛇雖極大此肉瘤非癰也腫一寸至三寸癤也三寸至五寸癰也五寸至一尺癰疽也一尺至三尺名曰竟體疽腫成膿九孔皆出諸氣憤郁不遂志欲者多發此疾癰及疽血瘤鼠乳石癰結筋瘰癧皆不可就針角針角少有不及禍者發於腋下赤堅者名曰米疽療之用砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀挾纓急療之太素經曰頸前曰纓發於股陰者名曰赤施不急療六十日死在兩股之內不可療一云六十日死發於膝者名曰疵疽其狀大癰色不變寒熱而堅勿石之死須其柔色異乃石之者生冷不熨之柔乃破之準例破之也又諸癰腫之發於節而相應者不可療太素經云膿入節間故不可療也又發於陽者百日死又發於陰者三十日死丈夫陽器曰陽婦人陰器曰陰又發於內踝者名曰走緩其狀癰也肉色不變數其輸數而止其寒熱不死冷石熨其所由之俞又發於足旁者名曰厲疽其狀不大初從小指發急療之去其黑者不消輒益不療百日死傍云足外側也又發於胸者名曰井疽狀如大豆三四日起不早療下入腹入腹不療十日死太素經云寒熱不去十日死又發於足趾者名曰脫癰其狀赤黑死不療不赤黑可療療不衰急斬去之得活不去者死又發於膺者名曰疳疽其狀如谷實栝蔞常苦寒熱急療之去其寒熱不療十日死死後出膿又發於頸者名曰夭疽其狀大而赤黑不急療則熱氣下入淵腋前傷任脈內熏肝肺十餘日死太素經云項之前曰頸也凡五臟六腑募中府隱隱而痛者肺疽也上肉微起者肺癰也中府在雲門下一寸六分乳肋間動脈應手陷中是巨闕隱隱而痛者心疽也心上肉微起者心癰也巨闕一穴在鳩尾下一寸是期門隱隱而痛者肝疽也肉微起者肝癰也期門二穴在第二肋傍一寸半直上兩乳章門隱隱而痛者脾疽也上肉微起者脾癰也章門二穴在季肋端一名長平一名肋宛京門隱隱而痛者腎疽也上肉微起者腎癰也京門二穴在期門下五分是中管隱隱而痛者胃疽也上肉微起者胃癰也中管一穴名太倉在上管下一寸天樞隱隱而痛者大腸疽也上肉微起者大腸疽也天樞二穴在臍兩旁各二寸陷中是丹田隱隱而痛者三焦疽也上肉微起者三焦癰也丹田一名石門一名精室一名命門一穴在臍下二寸關元隱隱而痛者小腸癰也上肉微起者小腸癰也關元一名液門在臍下三寸上驗其人所募依據此審定癰疽淺深病從何臟腑發先曾食何乳石又驗其氣虛實參詳而療之背面九處不可患瘡第一入髮際為玉枕亦為舌本第二項頸節第三為崇骨第四大椎第五脊骨兩邊肺俞及心俞穴第六脊骨兩邊脾俞穴第七脊骨兩邊腎俞穴第八後心第九膂尾骨穴正面五處不可患瘡第一喉骨為垂膺第二當胸前為神舍第三為心鳩尾第四當兩乳穴第五臍下二寸為腸屈之間側面三處不可患瘡耳下近耳後牙車尖央陷中為喉脈當膊下一穴為肩骨承山上三寸一穴腨腸凡患人目中赤脈從上下貫瞳子者一脈一年死二脈二年死若脈下者藥之必瘥又曰患人面忽有赤色甚多貫上下如胭脂有赤色從額上下至鼻又黑色出額上大如指及連鼻上至眉又有赤色垂者併為死候不可藥夫癰疽破潰其形狀有逆有順眼白睛黑而眼小一惡也不能下食納藥而嘔食不知味二惡也傷痛渴甚三惡也頸項轉動不便四肢沉重四惡也聲嘶色脫唇鼻青黑面目四肢浮腫五惡也煩躁時嗽腹痛渴甚泄利無度小便如淋六惡也膿血大澀焮痛尤盛膿色敗臭不可近之七惡也喘粗氣促恍惚嗜臥八惡也未潰先黑久陷面青唇黯便汙者九惡也更有氣噫痞澀咳嗽自冷自汗無時瞪目耳聾恍惚驚悸語言顛錯皆是惡證動息自寧飲食知味一善也二便利調二善也神彩精明語聲清朗三善也膿潰腫消色鮮不臭四善也體氣和平五善也五善見三則吉諸惡見四必危若五善並至則善無以加九惡駢臻則惡之劇矣病者脈數身無熱證反淅淅惡寒若有痛處皆發其癰腫欲知有膿無膿以手掩上若熱者為膿不熱者無膿此亦大略說也若脈不數不熱而痛者蓋發於陰也不疼尤是惡證不可不知凡熱盛脈數即用漏蘆並單煮大黃等湯若不甚熱脈緩弱只投五香連翹湯其他依四節八事次序便推三因以用其藥未有不全濟也診其脈浮數而洪緊者其瘡腫臖作當身熱煩渴飲食知味此乃六腑不和大則為癰小則為癤其勢雖急投以涼劑亦多全活診其脈沉細而伏或沉緊而數初發之瘡甚微或無瘡頭身不發熱而內燥體重煩疼情緒不樂胸膈痞悶食不知味或惡聞食氣此五臟不調為疽屬陰蓋癰癤則屬腑故發之浮而淺其勢雖急而作毒緩疽則屬臟毒氣內蓄之深勢雖緩而反急若瘡疽之人膿血大泄脈滑數者難治也凡瘻膿多或如清泔脈滑大散寒熱發渴者治之無功也若患肺癰者咳嗽膿血脈見洪滑治之難痊矣大凡診脈見浮數應當發熱而反惡寒雖頭項拘急四肢煩痛或復戰慄渴甚者但有痛處欲發瘡腫也脈洪大者瘡疽之病進也如瘡疽結膿未成者宜下之腫潰之後脈見洪大則難治若自利者不可救治也仲景曰脈數不時見則生惡瘡也又曰肺脈俱數則生瘡也診諸脈洪數者里欲有膿結也瘡腫膿潰之後而煩痛尚未痊退者診其脈洪滑粗散難治也以其正氣虛而邪氣實也瘡腫之病診得芤脈膿潰後易治以其脈病相應也若瘰癧結腫診得牢脈者不可內消也瘡疽之人得實脈宜急下之以其邪氣與臟腑俱實故也弦洪相搏外緊內熱欲發瘡疽也瘡腫潰後得澀脈無妨也瘡腫脈短真氣短也瘡腫之病脈來細而沉時直者裡虛而欲變證也潰後脈數而勻舉自瘥也凡諸瘡腫潰後其脈澀遲緩者皆易愈以其脈候相應是有胃氣也瘡腫得沉脈邪氣沉瘡腫脈虛宜托裡和氣養血也瘡腫得軟脈補虛排膿托裡大抵瘡家沉遲濡弱皆宜托裡瘡腫脈促宜急下之大凡瘡腫之病脈促結者難治而況見代脈乎凡瘡疽腫大按之乃痛者膿深也小按之便痛者膿淺也按之不甚痛者未成膿也若按之即復者有膿也不復者無膿也必是水也若發腫都軟而不痛者血瘤也發腫日漸增長而不大熱時時牽痛者氣瘤也結微腫久而不消後亦成膿此是寒熱所為也留積經久極陰生陽寒化為熱以此潰必多成瘻凡療癰疽以手掩其上大熱者膿成自軟也若其上薄皮剝起者膿淺也其腫不甚熱者膿未成也若患瘰癧結核寒熱發渴經久不消者其人面色痿黃被熱上蒸已成膿也至於臟腑腸胃內瘡內疽其疾隱而不見目既不見手不能近可以診其脈而辨之有患胃脘癰者當候胃脈人迎者胃脈也其脈沉細者氣逆則甚甚則熱聚胃口而不行胃脘而為癰也若其脈洪數者膿已成也設脈遲緊雖膿未就已有瘀血也急宜治之不爾則邪毒內攻腐爛腸胃不可救矣肺癰疾初萌則可救膿已成則必死不可不慎也久咳膿如粳米粥者不治嘔膿而止者自愈也或繞臍生瘡而膿從瘡出者或有出臍中者惟大便下膿血者自愈也癰疽發背俗以腫痕所至為暈非真暈也暈生於瘡口之旁如紅筋之狀才見暈則非美證矣一暈二暈以至三暈尚可措手若四暈五暈是臟腑蘊受銳毒斷斷難醫凡五子日夜半五丑日雞鳴五寅日平旦五卯日日出五辰日食時五巳日禺中五午日日中五未日日胅五申日晡時五酉日日入五戌日黃昏五亥日人定此日時遇疾發者皆不起也夫治癰疽發背發腦髮鬢發須發頤發肋發腰發腿或發於四肢或婦人乳癰不問男女一見有此疾者皆可即便用此法灸之無不安愈其法先令病人以肘憑几豎臂腕要直用篾一條自臂腕中曲處橫紋男左女右貼肉量起直至中指尖盡處截斷為則不量指甲卻用竹槓一條令病人脫衣騎定令身正直前後用兩人扛起令病者腳不著地又令二人扶定勿令僵仆卻將前所量臂腕篾從竹槓坐處尾骶骨盡處直向上貼脊背量至篾盡處為則用墨筆點定此只是取中非灸穴也卻用薄篾作則子量病人中指節相去兩橫紋為則男左女右截為一則就前所點記處兩邊各量一則盡處即是灸穴兩穴各灸五壯或七壯止不可多灸不問癰生何處並用此法灸之無不愈者一云可視疽發於左則灸右發於右則灸左甚則左右皆灸蓋此二穴心脈所過之處凡癰癤皆心火留滯而生灸此則心火流通即見安愈可以起死救危有非常之效屢試屢驗矣素問云諸痛癢瘡皆屬於心又云榮氣不和逆於肉理乃生癰腫榮者血也心能行血心滯則血為之不行故逆於肉理而生癰腫灸此穴使心火調暢血脈流通愈於服藥多矣又法初覺背有點白粒並赤腫先從背脊骨第二椎下陷中兩旁相去同身寸各一寸五分名熱腑穴此穴宣泄背上諸陽熱氣兩處可灸七壯止同身寸法取男左女右中指頭比至近掌橫文為三寸對摺點定從脊骨點定處橫量兩頭盡處是穴大抵人年四十以上最宜灸此其背永無癰瘡之苦凡癰疽初作不論腫赤闊狹可依後論墨圍津潤一二日覺毒勢盛便以獨頭蒜切作片薄如錢樣安置毒上以艾炷不論壯數灸之惟多為妙人皆謂熱極不可復灸殊不知癰疽本寒邪所傷艾火攻散乃善本因血化熱盛分肉之間不能外泄皮膚頑厚漸逼入內譬如強盜入室迫近於主主力且弱以兵鬥之不若開門與出乃順所以灼艾火攻特破其肌則邪毒無所容留而真氣不耗灸則任其潰乃調膿排痛如錐刀所刺壞肉壞筋而膿從骨間出既傷臟膜此不復治付之無可奈何雖人老壯亦用施治或處於僻鄉無藥可贖或居貧乏無力可得不問貧富貴賤均可施治但頭上瘡及項以上見瘡不可就瘡項上輕易灸之反生大禍但可以騎竹馬取穴法及足三里穴灸之多獲其效凡蒜餅上灸者本草名葫又名蒜味辛溫有毒主散癰腫不宜多食然假火勢以行藥力或有灸去葫不用只以艾炷安毒上便灸此法可施治頑疽痼發之類必假火熱攻令速潰大抵用葫灸法若有赤腫紫黑或有惡腫葫灸法施治至妙灸癰疽發背其灸法正在不痛者灸至痛痛者灸至不痛或有灸而癢者大抵初灸即痛毒氣方聚漸次相攻作痛無疑皮肉既傷又有灼艾時間或作癢令人抓其旁者又有初灸而不痛者毒氣內陷病人昏倦惡腐不散多壯不痛又云癢者灸至不癢痛者灸至不痛仍復追毒排膿次乃外敷消腫內外兼治又云癰疽不可不痛又不可太痛悶亂不知痛者為難治若諸瘡經久不瘥變成瘻者宜用硫黃灸法其法硫黃一塊可瘡口大小安之別取少許硫黃於火燒用釵尖挑起取焰點硫黃令著三五遍取膿水乾瘥為度若其發背初生即宜土餅灸法灸之初覺背上有瘡痛癢頗異認是發背即取淨土水和捻作餅子徑一寸厚二分貼著瘡上以艾作炷灸之一炷一易餅子其瘡粟米大時可灸七七壯其瘡如錢許大日夜不住灸以瘥為度疳瘻惡瘡諸醫不驗取蠐螬剪去兩頭安瘡口上以艾灸之七炷一易不過七枚無不效者又法用乞火婆蟲灸之同前法累驗之神效人皆秘之往往父子不傳凡發背皆發出自腸胃流入五臟仕流多腳氣為主或有先服乳石並熱肉面房室過度皆作此疾縱身不曾服乳石先代服亦有此病或有下痢人服面過度亦有患者諸依後方萬不失一發背一覺有腫即須審脊根硬軟如硬頭一點白繞四邊紫黑色時掣痛憎寒不食狀若天行此石癰知是此狀即須當上灸百壯艾炷大如鼠屎許大凡發背初亦一點白四邊赤色漸胤長大成杯盞並碗許大四邊生飯疤小小瘡如粟米許大亦時時抽掣痛此兩狀皆是死病十日內堪醫十日以外不濟就中冬月得此病即延得三五日其發背初覺即須當頭灸二十一壯如杯許大即五花灸之各二十一壯即服牛蒡子栝蔞葛粉第二服犀角湯瀉之不然服犀角丸亦得大效也忌梨鯉魚面酒肉漿水粥凡癰疽發背初生如黍粟粒許或癢或痛覺似有即用湯水淋射兼貼藥熁之經一兩日不退須當上灸之一二百壯如綠豆許大凡灸後卻似焮痛經一宿乃定即火氣下徹腫內熱氣被火導之隨火而出也若能於瘡頭四邊相去各一寸以來更五花灸尤妙其瘡若只知癢即宜隔豉餅灸之其豉餅須以椒薑鹽蔥相和爛搗捏作餅厚薄如三錢以來當瘡頭豉餅上灸之若覺大熱即微取起少頃再安只灸七壯而已豉餅若干更換新者尤佳瘡若痛即須再灸仍壯數惟多為妙若是疽即不宜灸夫疽初生形如㾦癗頭白焦枯氣本深沉治者既不精辨亦便灸之或癰癤成膿之後亦竟灸之皆能害人初灸三壯不覺痛者為上肉已夭其下膿深及至數壯之後焮痛必倍為熱氣益盛膿伏肉內攻之火灼其外轉增毒甚不可不知也頭維在額角髮際本神旁一寸承光在頭上五處穴後二寸半神庭在髮際直鼻上承泣在目下七分直瞳子陷中是絲竹空在眉後陷中膺窗在胸下一寸六分兩乳中腦戶在枕骨上強間後一寸半風府在腦後髮際一寸大筋旁宛宛中啞門在項後髮際宛宛中脊中在第十一椎節下間三陽絡在臂上大脈溝止一寸下關在耳前動脈是也耳中耳門禁不灸人迎在頸大脈應手俠結喉旁通五臟石門在臍下二寸女子禁不灸伏兔二穴在臍上六寸地五會在足小趾次趾本節後間去俠谿旁一寸五分以上據針經並禁不可灸或於上出瘡癤亦不得便灸且以諸方法及湯水注射並用諸藥㶸之若已成膿即須針烙出之為其內已有膿縱針烙出之即並無妨大抵膏粱之人既得斯疾於心有慊一毫冷藥斷不肯服醫者又不執術只得循情首以十宣散投合其意便以膏藥敷貼於外殊不知毒氣方盛之時外被敷藥閉其毫孔內服溫藥助其毒氣致令熱毒之氣無路發越內攻臟腑傾人性命急如反掌古人云癰瘡未破毒攻臟腑一毫熱藥斷不可用癰瘡已破臟腑已虧一毫冷藥亦不可用此先後之要訣也內托散又名萬金散又名曰托裡散五香連翹湯沉麝湯甚者追毒丹又名神仙萬病解毒丸及漏蘆湯以上皆宣熱拔毒之藥既灸之後毒氣有路而出服藥之後使毒氣不傷臟腑然後玩味方論或命醫者商榷疾證依法調治亦未晚也若有煩熱口燥咽乾大腑秘難六脈沉實而滑或洪數有力便可投之以漏蘆湯大黃等藥或追毒丸為宣熱拔毒之計或有瀉證醫者不可便歸咎於藥以為張本之計殊不知患癰疽之人每有泄瀉皆是惡候若疑似之間但服內托散次以五香連翹湯沉麝湯五七日之後繼之以國老膏萬金散牛膠飲子忍冬酒柞木散黃礬丸遠志酒之類皆可選用以為破敵之需以上諸方不冷不熱不問老幼少壯陰陽虛實冷熱多服為妙自有奇功凡癰疽始作皆須以大黃等藥極轉利之既利之後病人當自知之勿以困苦為念若曰與其腹背潰爛臟腑焦枯膿血流漓孔穴穿空備諸惡而死不若利而死況有生道哉古聖賢立法率用五香連翹漏蘆等湯道路貧苦恐不能及即單煮大黃甘草作湯以利之須排日不廢直至膿潰漸有生意即服黃耆等藥排膿止痛千金外臺備矣世醫不學蔽以妄意不達標本皆曰瘡發於表豈可轉利死者比比良可悲夫一初覺得背疽之疾便合服內托散又名乳香萬金散後來方免變證口舌無瘡此藥但可服十數服止便以騎竹馬灸法灸之或用隔蒜灸法灸之亦可一即合繼服五香連翹湯此藥如大便寬快內熱既退即合住服若一二日之後大便再閉須合再服要取利毒氣至盡然後住服亦合看病人虛實量其輕重而進藥一疽破後多服排膿內補散無嘔逆用酒調下有嘔逆木香湯下又若癰疽破後當終始服餌不可輟一癰疽初作之時便要著艾既灸之後便宜用麥飯石膏四圍塗敷以護其根腳不可使開中心卻要留癰口如錢大使毒氣出如癰漸小隨其大小敷之直候疽破膿潰之後口收只有徑寸許用神異膏貼敷卻住用麥飯石膏癰疽才破有口便合用豬蹄湯洗其初連日洗五日後間日洗欲安之際三日一洗一癰疽既破膿血潰多五七日後方可用神異膏貼若根腳小五日後貼如闊大須七日十日後可貼敷一癰口將收之際最忌用急澀斂口之藥只宜用神異膏貼多見昧者破此一段不過病者厭於將理醫者急欲獲利不思毒氣發泄未盡其疾再來人命自此不救癰疽將安之際宜多服加味十全湯以補其氣血庶使肌肉易生故也一前後病疽之人多是先發渴而後背疽作或有背疽安而後發渴疾因此不救者甚多若有渴疾之人宜專服加減八味丸能使渴疾安疽疾不作若驟得背疽之疾既安之後不問有無渴證便宜常服加減八味丸此藥非特可以杜絕渴疾之將來亦且大能滋益氣血生長肌肉使精神強健此乃累試之驗忍冬丸亦妙又名鷺鷥藤一前方須是居於州縣及有力之家方得及之若居僻鄉及無力之人只可用鷺鷥藤酒一名忍冬草此一方終始服餌俟其疽破即以神異膏貼之然神異膏所用藥料皆非貴細難得之藥前後用此百發百中一嘔逆有二證一證謂初發時不曾服內托散伏熱在心一證有氣虛脾氣不正而嘔當仔細審察病證參酌用藥若是因熱而嘔者外證心煩身熱癰作痛即是伏熱在心合用內托散服三兩服即止不可多服若是氣虛而嘔其證心不煩熱遇早便嘔或聞穢氣而嘔早晨宜服嘉禾散如有寒熱宜服家傳不換金正氣散仍五更初兼服山藥丸以補腎凡瘡家皆用宣利去其毒根盪滌陳莝假如神仙追毒丸六味車螯散五香連翹湯千金漏蘆湯用藥無過此法更當詳辨稟賦強弱臨時加減大抵治瘡要法須是臟腑堅而不秘通而不泄則真氣不耗邪無所留如治秘結神功麻仁丸最妙謂如老人腸胃虛津液耗便秘不利精神昏濁服之必安可以類推凡瘡潰之後尚覺虛熱可與五香湯內加犀角末黃耆人參之類如大便秘小便赤可與五香湯加大黃朴硝大抵癰疽不可舍五香湯假如治瘡溫藥必有桂以通血脈疏理不足宣導百藥冷藥必用地黃補五臟內傷不足通血脈益氣力填骨髓長肌肉解毒除熱用萬金散一方用乳香綠豆粉二味乳香消諸癰腫毒綠豆壓熱下氣消腫解乳石服至一兩則香透徹瘡孔中出二味真良藥也氣血聞香則行聞臭則逆大抵瘡多因榮氣不從逆於肉理郁聚為膿稍得香味血行氣通必無凝滯多服五香連翹湯萬金散秘傳金粉散凡瘡家本自腥穢又加臭惡因而相觸反成大患毒氣入胃令人咳逆古人用香可謂有理且如飲食之中調令香美益其脾土養其真元可保無虞凡癰疽之疾初服頭藥失序或不曾服內托散又無藥宣得內毒致令熱毒衝心經咽喉口舌生瘡甚至生紅黑菌變證甚速難於醫療合預備琥珀犀角膏治之向曾有人因疽而生此證醫者以為心臟絕盡皆設辭退醫進此藥一日而安當先服犀角散防有此證又宜熟視詳審俟其潰熟膿透於外其勢盈盈欲出只用替針丸自瘡頭咬開不半日許其膿自出切不必用針刀也腎脈虛盛當用補藥而有牴牾處如用鹿茸附子之藥是抱薪救火如用平補之藥腎氣猝難平復若俟河之清晏向曾有人苦疽疾正生此一證諸醫無策愚云昔嘗聞一名醫講論凡人遇五更初腎氣必開若一語言咳嗽口唾即腎氣復合遇腎開時進一服平補藥其功效勝尋常服峻補之藥十數服愚以此策獻之遂選用山藥丸所用皆平補腎氣全無僭燥偏重之藥依此法而進詳以告病者與其侍旁之子弟如法而服藥三日而醫者診脈已平復矣凡有疽疾之人腎脈虛弱未可便如古人之論以為不可治若有人痼冷虛弱危因之疾如其法而用藥可謂用力寡而收功倍矣如是病人氣弱不進飲食合服嘉禾散如購到現成散子每五兩宜加人參丁香木香沉香白豆蔻仁各二錢重昨曾有人苦疽疾醫者用藥失序久用不痊因致虛弱不欲飲食愚欲進嘉禾散而諸醫爭言內有丁香發熱不可用殊不知治疽之藥丁香預其一況有因怒氣而發疽今嘉禾散中所用之藥盡是平和益脾胃降氣者辨論不勝遲遲數日服他藥無效猝於後用之而病人方能進食自此以後遇早晨住服他藥必進嘉禾散一服疾安而後已夫瘡腫之生於外者由熱毒之氣蘊結於內也蓋腫於外有生頭者有漫腫者有皮厚者有皮薄者有毒氣深者有毒氣淺者有宜用溫藥貼熁者有宜用涼藥貼熁者有可以干換其藥者有可以濕換其藥者深淺不同用藥亦異是以不可不辨也若瘡腫初生似有頭者即當貼溫熱藥引出其熱毒火就燥之義也於四畔赤焮處搗生寒藥貼熁之折伏其熱勢驅逐其邪惡撲火之義也夫生寒藥勢氣力精全性味雄健或有醫者不本物理皆通用藥草膏之類欲使尫瘠者敵其勇夫不亦難乎又有粗工不審逆從便用寒藥敷貼驅逐邪毒復入於內歸於肝心十死八九矣大抵敷貼之藥欲消散腫毒血脈疏通寒熱逆從斷其去就焉慎不可執方無權安能散於鬱結不成膿乎其腫皮厚者以故軟帛或以花子塗藥貼熁之待其藥干換其腫皮薄者即用疏紗或薄紙塗藥貼熁之其藥未乾即當換之若是膿潰之後即貼溫肌生肉膏藥要在逐臭腐排惡汁取死肌生良肉全藉溫熱膏劑之力也切勿用寒涼之藥水調貼之夫血脈喜溫而惡寒若著冷氣過理即血滯難瘥矣濟生方嵇論治法云金人大定間有遇異人傳狗寶丸得之者以獻之偽主其後嵇乃事偽朝以外科奉御療將士金瘡有功金主以其本賜焉嵇治瘡凡癰疽疔漏瘡皆以狗寶丸為第一義先投狗寶丸半時次投熱蔥粥以助之厚被蓋覆病者使汗出周流則毒勢隨汗而解若汗不出則不可療矣汗罷則瘡之陷者必起散者必聚以烏龍膏敷其腫若腫之外有赤暈者則以解毒散敷之凡敷藥必以自外向里塗之看正瘡之大小凡正瘡之上不許加分毫藥每日隨證服五香連翹湯並十奇散綠豆粉等藥大率以狗寶丸為先以烏膏解毒散次之而服餌之藥則隨藥氣陰陽虛實而用之空心必服加減八味丸以助元氣俟瘡潰以針決放膿訖然後以乳香膏敷正瘡之上若尚有未盡膿則於膏藥當中直剪一孔以通膿水膿水欲盡以生肌散敷瘡口仍以乳香膏覆之更不須剪破膏藥乳香膏一日一換候瘡口欲合即便不換膏藥矣烏龍膏之功在於消腫解毒散之功在於收暈暈收即不須用解毒散而烏龍膏直候瘡潰敗膿出盡然後已癰發背者皮薄腫高多有椒眼數十粒疽發背者皮膚頑硬狀如牛頸之皮二證皆宜灼艾癰成膿則宜針其針宜用馬銜鐵為之形如薤葉樣兩面皆利可以橫直裂開五六分許取去毒血覺病便輕須先灸而後裂可服神仙追毒丸利去毒根次服排膿托裡藥調治疽成膿則宜烙可用銀篦大二寸長六寸火上燒令赤急手熨烙毒上得膿利為效亦服神仙追毒丸排膿托裡藥調治凡療癰疽用針灸點烙其功甚大嘗有一婦病癰在背之左高大而熱未破之間有醫者云可烙彼時有一老成人云凡背之上五臟俞穴之所繫膈膜之所近烙之不得其法必致傷人醫答曰但宜淺而不宜深宜橫入而不宜直入恐傷破膜子宜下而不宜上恐貯膿血得此訣盡用無妨也於是燒鐵火箸烙之肉破膿出如湍水自此而愈當時真是恐人非劊子手者不能為之烙後真有神效若不能識生熟淺深上下橫直之要妙不若不烙之為愈陳日華云世人於瘡癤始發輒用針灸十死八九蓋毒方殷以火助之宜其危也聞烙之功卻大方其已熟未潰之時用鐵箸一烙極是快意方扇火欲著時誠是恐人予久聞此已深知其功於臨時猶且顫悸況於未曾經歷之人乎烙後膿水流通百無所忌名曰熟瘡只忌雞肉恐瘡突開穴口宜向下要膿水流通仰則倒貯然須是熟於用烙者識淺深知穴道審生熟非其時則所出皆是生血當其時則出黃膿瘀肉予見人烙瘡者甚多用尖針烙者不得法用平圓頭者甚妙蓋要孔穴通透尖針頭細其口易合徒爾嚇人針出復合未必為功惟用平圓如鎖衡緯鋌之類乃妙即烙得通不得治者便用法敷之不能保養瘡口必再合口合則不能必其效用牛膝根之法亦為妙也治癰癤不問老幼少壯初發癰腫急用蜞針亦是開門放出毒氣之一端也療癰疽諸般瘡癤欲愈必癢及療腎臟濕癢妙方鹽之功用甚著予一日髀上生一癤以火烙之作效數日瘡口欲合四邊癢甚不可忍令人以絹帛蘸湯熨洗甚快快定復癢再熨再癢三熨覺倦醫者云凡洗熨最損人氣血每見病疽之後被洗熨隨至眩絕是時予癢並作醫者取鹽一撮於四緣遍擦便覺瘡內外清涼少定作一般美快更不復癢嗣後偶灸瘡臨可作金櫻子癢甚取鹽擦之其效如初癢甚則重擦隨其輕重不覺損人鹽入瘡口亦無妨害嗣後身體或有癢處亦以鹽擦隨即除去且復佳甚世人多有於瘡癤初發時用油鹽擦之令熱遂結聚不成亦此意也癤初發時取五更未語之唾以手潛抹亦是一法腎臟濕癢無藥可治亦用鹽擦得效此親試也夫癰疽者頭少腫處多出膿不快者宜針烙膿未盛以前不可不以諸藥貼熁救療以安病者之心膿成即當棄葉從針烙也即至膿成即當決意不可疑懼痛頃刻之間以至內潰古今同斃斯疾十有八九深識之士當斷去就夫患癰疽已成結腫須有出處療之無不針針無不瘥未有不針不刺而瘥者未有針刺及時而不瘥者夫痛之極也眾熱聚攻膏膜為之腐爛肌肉為之敗潰內通貫臟腑若不針烙決潰熱毒無從而解膿瘀無從而泄或過時不針即反攻於內內既潰敗欲望其生豈可得乎則針烙取瘥實為良法疑而不決為必死之患或隱諱此疾或懼痛不針此神奪其識死期將至癰則皮薄宜針疽則皮厚宜烙古法無烙惟有針刺烙即火也亦謂之燔針劫刺以其有劫病之功也今用烙法多瘥殊隱妙於鐵針法本用鈹針烙法當用火針似火箸磨頭令尖如棗核圍滑用燈焰燒須臾火作炬數蘸油燒令赤皆須近下面烙之一烙不透即再烙之令透若其攻稍廣即須散烙數處並令透則氣疏達膿水易出不假按抑實者捻發為紝虛者以紙為紝塗引膿膏藥紝之兼以膏藥貼之常使開潤勿令急燥若其人羸瘠勿頓出膿徐徐令出癰疽廣大膿潰多者懼一時之痛不肯四畔多下針烙惟開三兩處而巳欲望早愈不亦難乎常見有開腫者不審淺深所烙或當時無膿經宿方潰或下針不出別處生頭或抑捺掀動益加損疼真氣轉傷經云病淺針深則氣血伏沉病深針淺則毒氣不泄反為大癰也如務求速瘥腫內余膿及膿根未盡便令瘡合後必再發諸發腫都軟而不痛者即並宜針烙若發於背者即須用水角乃得痊愈凡治癰疽發背腫高堅硬膿稠焮盛色赤者宜用水角陷下肉色不變軟漫膿稀者不用水角角法於寬淨室中不當風處平實地掘一小坑口稍闊於瘡腫深一尺以下去此坑二尺外又為一坑子口闊三四寸旁穿兩坑令相同灌水並令去坑面二寸於地上腰背下先鋪油單三兩重避地氣即以席薦東西鋪坑口兩畔令患者以瘡合坑上無令偏側腰間布氈褥務令安穩則得久角角口兩畔以繒帛遮擁兼蓋覆水坑口勿令通泄熱被水引下滲地中臥一炊久為度瘀滯膿血並泄角中熱盛者日夜三四遍腫氣不侵每日或兩度亦得候其毒解熱退水角方止中間以庸醫昧於深理就施針艾尤不能精用水角則太早以火攻則稍遲何者疽之萌生而用水角則內熱毒畏冷逼之卻入腠理皮肉堅厚毒氣內攻肉變為膿以致內潰深可哀也疽之已成而乃火攻則火相擊令人煩悶加其虛憊可不慎乎或富貴之人遭遇此疾多貯水銀以為水角尤妙用水銀角法揀穩實地穿一坑口稍闊於瘡腫處深可四五寸先於坑中布紙五六重襯水銀諸餘鋪設一依前方其水銀多至一升以來如無只三五合亦得今之名外科者多是膠柱不善變通立性粗率惟以針刀為快始用毒藥塗搽其外內施冷藥以虛其胃外以塗藥閉塞毛竅致使毒氣無從所出內外交攻血氣溷亂則正氣愈虧邪氣滋盛其瘡腫臖根腳散闊而患者疼痛昏迷醫者恣其所措毒勢爛漫卻云痛者易療操心則狠輕視人命以窺微利卻以軟言慰論病者殊不興念人之痛楚頃刻難堪反以毒藥麻癡好肉務施刀剪云去蠹肉如此為醫與屠劊何異哉言至於此惻然寒心故善惡之證全在醫之工拙所致患者忌作勞叫怒嗜欲飲食如干濕面炙爆煎炒醃藏法酒生冷滯膩牛羊雞鵝魚並不可食性熱者發熱冷者損脾胃毒者發病皆當戒之病者之房深戒有腋氣之人並有孕婦人月經現行婦人孝子僧道毋令入房房內常令灑掃潔淨焚好香氣方使血氣流暢易得安愈合藥之時亦忌此等人見之又忌見雞犬貓畜諸癰疽附論夫癰疽瘡腫之作者皆五臟六腑蓄毒不流則皆有矣非獨因榮衛壅塞而發者也其行也有處其主也有歸假令發於喉舌者心之毒發於皮毛者肺之毒發於肌肉者脾之毒發於骨髓者腎之毒發於下者陰中之毒發於上者陽之毒發於外者六腑之毒發於內者五臟之毒故內曰壞外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑則易治感於五臟則難瘳也又近骨者多冷近膚者多熱近骨者久不愈則化成血蟲近虛者久不愈則傳氣成漏成蟲則多癢少痛或先癢後痛生漏則多痛少癢或不疼不癢內虛外實者多痛少癢血不止則多死膿疾潰則多生方藤黃飲子治一切癰疽瘡腫金銀花黃耆防風川烏羌活大黃赤芍藥薄荷連翹麻黃當歸石膏黃芩桔梗白朮白茯苓各四兩荊芥甘草各三錢山梔子半兩人參七錢半滑石六錢芒硝一錢上為粗末每服半兩水二盞生薑三片或白水煎服大內塞排膿散治發背癰腫經年痊後復發此因風火或結氣在內經脈閉塞至夏月以來出攻於背久不治積聚作膿血為瘡內漏方山茱萸五味子茯苓乾薑各六分甘草石斛人參桂心芍藥各五分巴戟天麥門冬乾地黃蓯蓉遠志各八兩當歸石葦芎藭各四分附子二分地膽菟絲子三分上末酒服方寸匕日三夜一外臺秘要有瞿麥一云地麥地膚子也無地膽稍加之常服終身不患癰癤乾地黃丸凡壯熱人能常服之終身不患癰疽令人肥悅耐勞苦乾地黃五兩芍藥甘草桂心黃耆黃芩巴戟天栝蔞根遠志各二兩石斛當歸大黃各三兩人參一兩天門冬蓯蓉各四兩上為末蜜丸如桐子大酒服十丸日三加至二十丸李根皮散治癰疽發背及大小瘰癧曾有人患骨從瘡中出兼有三十餘癰癤服此散瘥李根皮一斤栝蔞根半夏各五兩通草白蘞桔梗厚朴黃芩附子各一兩甘草當歸各二兩葛根三兩桂心芍藥各四兩芎藭六兩上治下篩酒服方寸匕日三瘡大困者夜再服之狗寶丸一名寸金丸二名返魂丹三名再生丸四名追命丹五名延壽丸六名來蘇丸七名知命丸八名得道丸若有人患瘡身未爛者與三丸服之嚥下便活如口噤但斡開牙關研下三丸灌之下咽喉中立生此方善治發背腦疽癰疽癰腫遍身附骨腫痛先覺時飲引口中煩渴發寒發熱四肢沉重身體壯熱瘰癧疔瘡並皆治之蟾酥二錢狗寶一兩金頭蜈蚣七個頭尾全用羊酥炙黃色膩粉雄黃沒藥南乳香各一錢狗膽一個乾者用之麝香一分粉霜黃蠟各三錢烏金石一錢硇砂半兩頭首兒乳一合鯉魚膽一個乾者用之上同為末除黃蠟乳汁二味熬成膏子同為丸如綠豆大小兒如芥子大每服一丸病重者加至三丸用白丁香七個研爛調新汲水送下用衣服蓋出汗為度大段疼痛無頭瘡腫不過三服立效以後只吃白粥常服十宣散留頭與四邊以後烏龍膏貼之一方有鉛白霜排膿內塞散一名內補防風散治大瘡熱退膿血不止瘡中肉虛疼痛楊氏家藏方云名內補散治癰疽瘡癤未成者服之即散已結就者服之速潰敗膿自出惡肉自去疼痛頓減飲食如常不生嘔吐諸般惡疾防風茯苓白芷桔梗遠志甘草人參芎藭當歸黃耆各一兩厚朴二兩桂心二分附子二枚赤小豆五合酒浸熬上制下篩酒服方寸匕日三夜一溫酒米湯調下一方每服三錢不拘時候氣實並少壯人去附子一方無茯苓附子赤小豆遠志名十全內補散所用藥惟人參當歸黃耆各二兩外余各一兩為末溫酒調下日夜各數服以多為妙服至瘡口合更服為佳所以補前損杜後害也不飲酒人濃煎木香湯下然不若酒力之勝也以後只吃白粥常服十宣散留頭與四邊以後烏龍膏貼之一方有鉛白霜木香拓腫湯治諸瘡疽始發腫焮增長熱痛木香犀角大黃梔子仁升麻黃芩黃連射干黃柏白蘞甘草炙朴硝紫檀羚羊角各一兩上㕮咀入生地黃汁五合如無用生乾地黃五兩銼碎和勻每用藥五兩水一斗煎至七升入麝香五錢淨帛蘸藥熱拓腫上日兩三度冷再換荊芥散治一切癰疽不問發肩發背作臖疼痛並宜服此即便消散其效如神荊芥薄荷山蜈蚣老翁發天花粉蕪荑茹片敗荷心川白芷赤芍藥豬牙皂角切炒以上各等分淮烏大者一個煨紅內消倍其數甘草十五喜甜加用上為末每服二錢薄荷茶清調下欲快利用酒調效若服經日未見效恐是涼藥澀血可加當歸羌活如熱重雄黃酒調乳癰加萱草根研汁調其餘候只用酒下不飲麥門冬去心煎湯亦可但較緩耳敷藥諸般癰疽發腫赤痛不可忍未成角散已成角破用至瘡口合而止荊芥和根碎銼赤芍藥大柏皮土當歸山大黃白芨赤蘞白蘞寒水石煨或炒草烏各等分土白芷天南星赤小豆商陸根即中榕根銼片子焙上為末生地黃自然汁調角四畔或苦齏根汁腫用商陸根研汁未潰則滿體塗上或有尖起處則留出瘡口萬金膏治癰疽發背五發瘰癧陰毒痛不能忍並治或有腫毒侵內沉伏者吸毒於外川烏草烏白芷黃柏皮藁本荊芥蟬蛻肉桂白殭蠶赤小豆乳香沒藥蠶砂天花粉上等分為末薄荷汁和蜜調塗患處以紙掩住或薑汁地黃汁調搽皆可如干用地黃汁薄荷汁皆可刷濕木通散凡內消先用此藥退潮止渴解熱以升麻葛根湯表散後服此藥木通瞿麥荊芥薄荷白芷天花粉甘草赤芍藥麥門冬去心生乾地黃山梔子車前子連翹各等分上銼散每服二錢燈心生地黃煎熱潮加淡竹葉煎溫服上膈食後下膈空心老人氣虛者宜加當歸羌活李嗣立五香連翹湯治一切積熱惡核瘰癧癰疽惡瘡發腦發背乳香甘草木香沉香各七錢半連翹去蒂射干即萹蓄根一云當門子升麻黃耆生去皮蘆木通去節桑寄生大治此疾如無真者可倍用升麻代之獨活以上各七錢半丁香去枝梗不見火半兩麝香一錢半另研上為粗末每服三錢水一盞煎至七分去滓溫服銀器煎尤妙如無銀銚用瓷器入銀一片或釵環之類同煎其中無大黃多服無妨大便秘者加大黃七錢半外科精要云服此二日後與漏蘆湯相間服之一方有大黃無黃耆一方加藿香本方原有竹瀝芒硝恐泥者不能斟酌故缺之知者自加減一方無丁香五香連翹湯治疽作二日後宜以此藥服之去五臟毒氣神效桑白皮無好者寧缺之木香連翹沉香黃耆升麻木通各七錢半麝香獨活各七錢半丁香乳香另研大黃銼炒甘草各半兩上㕮咀每服四錢水一大盞煎至八分去滓溫服乾地黃丸治虛熱消瘡癤乾地黃四兩大黃六分芍藥王不留行茯苓甘草遠志麥門冬人參升麻黃芩各三兩桂心六兩上為末蜜和丸如梧子大酒服十丸日三加至二十丸一方有枳實三兩一方無甘草遠志麥門冬人參升麻黃芩神秘陷脈散黃耆人參並去蘆川當歸酒洗去蘆川芎赤芍藥粉草地骨皮五加皮忍冬葉橘紅各一兩乳香沒藥並另研各半兩上為粗末每服三錢水一盞酒半盞煎至一盞去滓溫服不拘時排膿內補散治發背瘡潰後因飲食有傷調攝不到發熱不住用以退熱一名梔子黃芩湯漏蘆連翹山梔子仁黃芩去心防風石葦如無用桑白皮生甘草生犀角屑人參去蘆苦參去蘆白茯苓去皮各二錢半生黃耆一兩去蘆上為粗末每服四錢水一中盞煎至六分去渣溫服竹葉黃耆湯治癰疽發背煩渴及一切惡瘡淡竹葉二兩生地黃八兩黃耆當歸川芎甘草黃芩去心芍藥人參麥門冬去心半夏湯洗石膏各三兩上為粗末每服五錢水一盞半竹葉五片生薑五片煎至一盞去滓溫服外臺秘要有大棗三十枚擘五香連翹湯如不用五香曰七味連翹湯沉香藿香葉木香丁香各一兩麝香一字另研連翹射干獨活寄生草升麻各一兩甘草炙一兩大黃一兩半上七味㕮咀與前五味和勻每服五錢水一盞半煎至一盞去滓溫服取利為效未利再服食前方內五香為粗末另研
