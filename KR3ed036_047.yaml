録治頭目風眩邪氣鼓作時或旋暈天麻羌活去蘆頭藁本去苗土白芷芎藭芍藥細辛去苗葉麻黃去根節各二兩麝香研牛黃研各一分上為末煉蜜和丸如皂子大每服一丸研薄荷酒下清神散出御藥院方治頭風旋暈面目瞤動神志不清鼻塞聲重王瓜細碎炒令黑色川芎防風薄荷葉白芷荊芥穗羌活細辛去葉甘草炙各一兩香附子二兩炒上為細末每服一二錢食後茶清點服或溫水亦得治風頭眩惡風吐冷水心悶方出千金方防風一二兩澤瀉一作澤蘭天雄一作人參細辛附子薯蕷茯苓各一兩白朮二兩半桂一兩半乾薑半兩上治下篩酒服方寸匕常令酒氣相接則脫巾帽解發梳頭百過復投一升酒便洗手足須臾自熱解發以粉粉之快然便熟眠愈亦可洗頭而汗出川芎散出保命集方治風熱上衝頭目眩熱腫及胸中不利川芎槐子各一兩上細末三錢如胸中氣滯不利生薑湯調目疾茶調風熱上攻搗末一兩水煎服食後槐子散出保命集方槐子黃芩木賊蒼朮各等分上為細末茶清調下食後人參順氣散出如宜方治風上攻頭目昏痛耳鳴目眩鼻塞肉瞤拘急治諸風熱痰頭目眩暈如宜方南星四兩防風二兩甘草一兩上㕮咀每服五錢水一盞半薑十片煎服面上如蟲行加全蠍治頭眩令人好顏色出本草以菊花茯苓合為丸以煉成松脂和每服如雞子一丸治頭眩暈經久不瘥四體漸羸飲食無味好食黃土蒼朮三斤去皮毛研為末曲三斤上二味酒和丸如梧桐子大曝乾米飲送下二十丸日進三服忌桃李雀蛤等主中風頭眩心肺浮熱手足無力筋骨煩疼言語似澀一身動搖以烏驢頭一枚燖洗如法蒸令極熟細切更於豉汁內煮著五味調點少酥食之效膈痰風厥頭痛附論夫膈痰風厥頭痛者謂膈上有痰氣不下行復感風寒痰相結其氣厥逆上攻於頭故令頭痛也亦有數歲不已連腦痛者蓋風寒在於骨髓也故云膈痰風厥頭痛其脈伏而時見若手足寒冷至節則死夫厥逆頭痛者頭痛齒亦痛數歲不已是也蓋腦為髓海繫於頭齒為骨余屬於腎因犯大寒寒氣內著骨髓髓以腦為主腦逆故令頭痛齒亦痛也方牛黃鐵粉丸治風痰氣厥頭痛心胸壅喘滿噁心牛黃研一錢鐵粉研一兩半水銀砂子半夏生天南星炮各一兩膩粉研一分粉霜研二錢丹參研三分乾蠍去土炒一分白附子生半兩上為細末拌勻煮棗肉和丸如梧桐子大每服五丸至七丸生薑湯下臨臥服金犀丸治風痰氣厥攻擊頭痛痰逆噁心退風壅化痰金箔三十片犀角鎊一兩龍腦研一錢麝香研一分丁香一分丹砂研水飛二兩天南星炮一兩半夏二兩洗去滑焙天麻半兩白礬枯一兩上為細末拌和再研勻煮棗肉丸如梧桐子大每服十五丸溫薑湯下芎藭湯治胸膈風痰氣逆厥上攻頭痛嘔吐痰飲芎藭獨活去蘆旋覆花防風去叉藁本去苗土細辛去苗葉蔓荊子各一兩石膏研碎甘草炙各一半兩上粗搗篩每服三錢生薑二片荊芥三五穗水一盞同煎至七分去滓食後稍熱服犀角半夏丸治風痰攻衝頭痛利咽膈和胃氣進飲食去風氣犀角鎊生木香桔梗銼炒各半兩天麻人參各一兩半夏洗去滑二兩半丹砂細研檳榔煨銼青橘皮浸去白焙各三分上為細末拌和令勻生薑自然汁煮麵糊和丸如梧桐子大每服十五丸加至二十丸淡薑湯下不計時候天南星丸治風虛痰頭目旋暈肢節拘急天南星半兩炮裂華陰細辛半兩附子半兩去皮臍防風半兩去蘆白附子半兩炮裂芎藭半兩天麻一兩半夏半兩湯洗七遍去滑旋覆花半兩上為細末薄糊為丸如豌豆大每服三十丸至五十丸荊芥薄荷湯下不計時候附子散治痰厥頭痛胸滿短氣嘔吐白沫飲食不消附子半兩炮裂去皮臍前胡半兩去蘆頭半夏半兩湯洗七遍去滑枳殼半兩麩炒微黃去瓤檳榔半兩石膏二兩杵碎芎藭半兩人參半兩去蘆頭上細銼和勻每服四錢以水一大盞入生薑半分煎至五分去滓不計時候溫服乳香散治風痰攻擊頭痛惡心胸膈煩滿咽乾多渴乳香一兩以生薑自然汁一盞煮乳香令軟於乳鉢內研細濾去滓入面少許銀器內慢火熬成膏鐵粉研水飛一兩半夏洗七次焙二兩丹砂研水飛一兩鉛白霜研一兩皂角根白皮銼二分天南星半兩生用上為細末拌和再研勻以乳香膏和丸如梧桐子大每服十五丸加至二十丸生薑薄荷湯下食後服麝香天麻丸治風痰氣厥頭疼目眩旋暈四肢倦怠精神不爽眠睡不寧天麻酒浸一宿焙防風去叉芎藭各一兩甘菊花三分天南星一枚重一兩者先用白礬湯洗七次然後用水煮令軟切作片子焙乾麝香研二錢上為末拌勻煉蜜丸如雞頭實大每服一丸細嚼荊芥湯下不拘時候化痰丸治風痰氣厥頭痛利胸膈進飲食半夏湯浸去滑別搗二兩天南星炮白附子炮丹砂研各一兩檳榔煅銼半兩丁香一分上為細末以生薑自然汁煮前半夏末作糊和丸如梧桐子大每服十五丸加至二十丸薑湯下不計時候蔥白湯治冷熱膈涎發時頭痛悶亂欲吐不得者蔥白二十莖烏頭甘草真珠恆山各半兩桃葉一把一作枇杷葉上件㕮咀以水酒各四升和煮取三升去滓內珠每服一升吐即止防風散治痰厥頭痛防風一兩去蘆頭甘菊花一兩牛蒡子一兩微炒白附子一兩炮裂前胡一兩去蘆頭石膏二兩細研水飛過上為散每於食後以生薑茶清調下二錢石膏丸治痰厥頭痛目眩心膈不利石膏二錢三兩細研水飛過甘菊花二兩附子一兩炮裂去皮臍防風一兩去蘆頭枳殼一兩麩炒微黃去瓤郁李仁一兩湯浸去皮尖微炒上為末煉蜜和搗三二百杵丸如梧桐子大每於食後及夜臨臥時以溫水下二十丸導痰湯治一切痰厥頭目旋暈或痰飲留積不散胸膈痞塞脅肋脹滿頭痛吐逆喘急痰嗽涕唾稠黏坐臥不安飲食不思半夏湯泡七次四兩天南星炮去皮橘紅去瓤麵炒枳實去瓤麩炒赤茯苓去皮各一兩甘草炙半兩上㕮咀每服四錢水二盞生薑十片煎至八分去滓溫服食後一方無甘草玉露丸出王氏博濟方治風痰氣厥攻擊頭痛胸膈不利嘔逆食少半夏湯洗七次為末薑汁和作餅子焙白附子炮天南星炮各二兩龍腦研一分白礬研一三分上以前三味搗羅為末研入白礬腦子令勻煮薑汁麵糊為丸如豌豆大每服二十丸食後薑湯下菊花散治風痰氣厥頭疼昏眩菊花一兩白附子炮三分枳殼去瓤麩炒三分防風去叉半兩甘草炙一分上為散每服二錢以臘茶清調服不拘時候白附子丸出經效濟世方治風虛痰盛頭目昏眩天南星生天麻半夏湯洗七遍川烏頭生去皮臍白附子生用上等分為細末入腦麝少許瓷盒內閉一兩宿清水丸如梧桐子大硃砂為衣每服五七粒加至十粒食後茶清或薑湯下服時微以齒碎之靈砂丹出仁存方治痰飲頭痛南星炮半夏炮白附子炮白礬各一兩牙皂半兩上為末別用皂角膏丸如梧桐子大每服三十丸硃砂為衣食後薑湯下天南星丸治風痰壅盛胸膈不利攻擊頭痛天南星炮白附子炮半夏漿水浸三日切焙各一兩木香一分上為末生薑汁和丸如緑豆大每服十丸食後生薑湯下順元散出醫方大成治體虛痰氣不順頭目眩暈南星一兩炮川烏頭附子各半兩木香二錢半上粗搗每用三錢水一盞薑十片煎熱服治痰厥頭痛宜吐之方出聖惠方茶末四錢人參蘆頭一分燈心一大束上以水一盞煎至五分去滓溫服如人行五里未吐再服治卒頭痛如破非中冷又非中風是胸膈中痰厥氣上衝所致名厥頭痛吐即瘥方出聖惠方釜下墨四錢附子炮三分上為末以冷水服少許當吐愈一方有桂心一分忌豬肉冷水等物又方出聖惠方常山四分甘草半兩上切以水七升煮取三升每服一升不吐更服亦可納蜜半升忌生蔥生菜海藻菘菜治痰厥頭痛方出聖惠方旋覆花一兩牛蒡子一兩微炒上為散不計時候以臘麵茶清調下一錢又方出聖惠方附子半兩生用半夏半兩生用上為散每用一錢以水調如膏用紙適大小塗藥貼在太陽穴上藥干疼止立驗治痰厥頭痛及卒頭痛如破非中冷又非中風出聖惠方以梅實十個納鹽二錢酒一中盞合煎七分去滓非時溫服吐即住烏梅亦可山芋丸治厥逆頭痛及齒痛骨寒山芋天雄炮裂去皮臍硫黃研白茯苓去粗皮五味子磁石煅醋淬五七遍熟乾地黃焙各一兩上為末酒煮麵糊為丸如梧桐子大每服二十丸至三十丸食前溫酒下附子湯治風寒內著骨髓上連於腦頭痛齒痛附子炮裂去皮臍桂去粗皮五味子白茯苓去黑皮石膏煅人參補骨脂炒各一兩上銼如麻豆大每服三錢水一盞煎至七分去滓溫服椒附丸治厥逆頭痛齒痛骨寒蜀椒去目並閉口者炒出汗一分附子炮裂去皮臍一兩木香炮細辛去苗葉各半兩上為細末酒煮麵糊為丸如梧桐子大每服二十丸空心日午臨睡溫酒下三五七散一名大三五七散治厥逆頭痛方見大三五七散半夏白朮天麻湯出試效方丁未十月中範天騋之內素有脾胃之證時顯煩躁胸中不利大便不通因乘寒出外晚歸又為寒氣怫鬱悶亂大作氣不能伸故也疑其有熱服疏風丸大便行其病不減將其藥少再服七八十丸大便復見兩三行原證不瘳增添吐逆食不能下咳唾稠黏湧出不止眼澀頭旋噁心煩悶氣短促上喘無力以言心神顛倒兀兀不止目不敢開如在風雲中頭痛如裂身重如山四肢厥冷不得安臥先師料前證是胃氣已損復下兩次重虛脾胃病名曰痰厥頭痛與半夏白朮天麻湯治之再服而愈天麻半錢半夏一錢半黃耆半錢人參半錢白朮一錢蒼朮橘皮澤瀉茯苓各半錢炒曲一錢麥糵面二錢乾薑二分黃柏二分此頭痛苦甚為足太陰痰厥頭痛非半夏不能療眼黑頭旋風虛內作非天麻不能除其苗謂之定風草獨不為風所動也亦治內風之神藥也內風者虛風是也黃耆甘溫瀉火補元氣實表虛止自汗人參甘溫益氣瀉火補中二術俱苦甘溫除濕補中益氣澤瀉茯苓利小便導濕橘皮苦溫益氣調中升陽曲消食蕩胃中滯氣大麥糵寬中助胃氣乾薑辛熱以滌中寒黃柏苦寒酒製以療冬天少火在泉發燥也上件㕮咀每服半兩水二大盞煎至一盞去滓帶熱服之石膏散出衛生家寶方治痰熱蓄於胸中嘔吐上熱頭痛石膏一兩研天麻防風去蘆大青白附子殭蠶去絲嘴炒令赤羌活以上各用半兩麝香一分別研甘草一分炙上件為末香豉一合湯浸軟碾細和藥杵一千下丸如彈子大微火焙乾每服一丸細嚼濃煎薄荷湯下八風丹出楊氏家藏方治體虛有風痰壅盛頭目昏重口眼牽引面若蟲行及癱緩諸風並宜服之附子去皮臍川烏頭去皮臍炙草烏頭去皮尖白附子半夏天南星香白芷天麻去苗川芎細辛去土葉以上十味各半兩並生用硃砂半兩別研麝香一兩別研上件併為細末入白麵五兩一處研勻水和為丸每一兩作一十二丸陰乾每服一丸細嚼茶清或溫酒送下食後臨臥十珍丸出楊氏家藏方治諸風掉眩痰厥頭旋項背拘急肢體疼痛麻木不仁草烏頭八兩一半生去皮臍尖一半炮天南星五兩三錢河水浸三日炮縮砂仁二兩肉桂去粗皮川芎防風去蘆頭香白芷桔梗去蘆頭炒以上五味各二兩七錢麻黃去根節七兩細松煙墨二兩燒醋研上件為細末煉蜜為丸每一兩作三十丸每服一丸嚼細茶酒下食後拒風丸出楊氏家藏方治風虛痰厥頭痛眩暈如在舟車之上天南星二兩炮半夏二兩浸洗七次切焙藁本去土細辛去葉土防風去蘆頭羌活去蘆頭獨活去蘆頭川芎以上六味各一兩上件為細末生薑汁煮麵糊為丸如梧桐子大每服三二十丸生薑湯下食後蓽茇散出楊氏家藏方治年深頭風痰厥嘔吐惡聞人聲頭不能舉目不能開蓽茇不以多少上為細末每服一大錢茶清調下仍搐少許鼻中食後大芎辛湯出如宜方治氣虛痰飲腎氣諸厥頭痛及頭暈舉頭似屋宇旋轉如在舟中此有虛風痰三證附子烏頭天南星乾薑炮川芎細辛甘草各等分上件㕮咀以薑五片茶芽煎食後服一方去附子乾薑甘草加石膏白芷韭汁丸如梧桐子大嚼生蔥茶下名七生丸治八般頭風諸厥頭疼如體虛痰腎氣丸諸厥頭痛服大芎辛湯無效宜黑錫丹
