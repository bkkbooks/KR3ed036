body:
  text: 卷四十七頭門風頭旋附論夫風頭旋者以氣虛體怯所稟不充陽氣不能上至於腦風邪易入與氣相鼓致頭暈而旋也又有胸膈之上痰水結聚復犯大寒陰氣逆上風痰相結上衝於頭亦令頭旋方旋覆花湯出聖濟總録治熱毒風上攻頭旋欲倒或嘔吐不止惡見日光不思飲食旋覆花前胡去蘆頭菊花防風去叉羌活去蘆頭熟乾地黃焙杏仁去皮尖雙仁炒令黃色各一兩玄參白殭蠶炒黃芩去黑心白朮半夏為末薑汁製作餅炮干藁本去苗土甘草炙銼當歸切焙人參赤茯苓去黑皮各一兩上粗搗篩每服五錢水一盞半生薑五片煎至八分去滓食後溫服蔓荊子散出聖惠方治風頭旋暈悶起則欲倒蔓荊子三五分赤箭半兩細辛半兩麥門冬一兩去心焙地骨皮半兩石膏一兩黃芩三分防風三分去蘆頭羚羊角屑三分枳殼三分麵炒微黃去瓤芎藭三分茯神三分甘菊花三分甘草半兩炙微赤銼半夏三分湯浸七遍去滑上粗搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服忌熱面飴糖羊肉療熱風頭旋心悶衝風起即欲倒方麥門冬去心山茱萸茯神苦參各八分地骨皮薯蕷人參蔓荊子沙參防風芍藥枳實大黃各六分甘菊花龍膽各四分上搗篩蜜丸每食訖少時以蜜水服如梧桐子大二十丸日二漸加至三十丸不利忌酢物熱面炙肉禁豬肉魚黏食漢防己散出聖惠方治上焦風痰攻頭目旋暈心神煩亂宜服漢防己一兩羚羊角屑三分人參三分去蘆頭荊芥三分芎藭三分半夏半兩湯浸七遍去滑赤茯苓三分旋覆花半兩防風半兩去蘆頭前胡一兩去蘆頭細辛半兩麥門冬一兩去心焙枳實三分麩炒微黃甘草半兩炙微赤銼上粗搗羅為散每服三錢以水一中盞入生薑二片煎至六分去滓不計時候溫服忌飴糖羊肉遠志散一名天雄散出聖惠方治風頭旋眼暈常似屋轉起即旋倒者方見天雄散甘菊花散出聖惠方治風頭旋忽忽如醉痰逆不下飲食甘菊花三分天麻一兩石膏二兩芎藭三分獨活三分防風三分去蘆頭白朮三分茯神一兩杏仁半兩湯浸去皮尖雙仁麩炒微黃羚羊角屑三分杜若三分黃芩三分甘草半兩炙微赤銼上粗搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服麝香天麻丸聖濟總録治風頭旋目黑肩背拘急恍惚忪悸肢節疼痛宜服麝香研一錢半天麻天南星炮白附子炮羌活去蘆頭赤茯苓去黑皮乾蠍去土炒丹砂研防風去叉桂去粗皮蟬蛻洗炒各一兩半烏蛇酒浸去皮骨炙二兩鉛霜研一分上除研者外搗羅為末再同研勻煉蜜和丸如梧桐子大每服二十丸溫酒下荊芥湯亦得不拘時候芎菊散聖濟總録治諸陽受風頭目旋暈目視昏暗肝氣不清芎藭甘菊花擇各一兩羌活去蘆頭三分防風去叉三分細辛去苗葉白殭蠶炒各三分草決明旋覆花擇蟬蛻洗焙各一錢密蒙花擇天麻荊芥穗甘草炙各半兩上為細散每服二錢水一盞煎至七分食後溫服湯點亦得摩頂細辛膏治風頭旋細辛三兩當歸三兩桂心三二兩天雄二兩去皮臍生用白芷一兩半芎藭一兩半乾薑一兩烏頭二兩去皮臍生用松柏枝四兩生地黃五斤取自然汁硃砂一兩細研豬肪三斤上搗篩如麻豆大以生地黃汁浸一宿先煎豬肪銷去筋膜下火停冷下地黃汁並浸者藥同煎令白芷黃色去滓入硃砂末用柳木篦不住手攪令凝收於瓷合內用摩頭頂上甚效菊花丸治風頭旋目暈欲倒胸中痰逆兼治筋骨疼痛甘菊花擇枸杞子擇天麻酒浸切焙獨活去蘆頭木香芎藭防風去叉羌活去蘆頭天竺黃研赤茯苓去黑皮蔓荊子去皮藁本去土各等分上為細末煉蜜和搗三百杵丸如梧桐子大每服十丸荊芥湯下不拘時候旋覆花丸治肺脾風痰攻心膈煩滿頭旋目暈不納飲食旋覆花半兩枳殼二一兩麩炒微黃去瓤石膏二兩川升麻半兩前胡一兩去蘆頭防風一兩去蘆頭羚羊角屑三分赤茯苓三分黃芩三分白蒺藜三分微炒去刺川大黃三分銼碎微炒甘草半兩炙微赤銼上搗羅為末煉蜜和搗三二百杵丸如梧桐子大每於食後煎竹葉湯下三十丸羚羊角湯治熱毒風上攻頭旋目暈耳內虛鳴或身體癮疹麻痹羚羊角鎊二兩菊花三兩防風去叉羌活去蘆頭前胡去蘆頭藁本去苗土玄參黃芩去黑心杏仁去皮尖雙仁炒令黃色菖蒲甘草炙銼各一兩上粗搗篩每服五錢水一盞半煎至八分去滓食後溫服之療頭面熱風頭旋眼澀項筋強急心悶腰腳疼痛上熱下冷健忘方肉豆蔻十枚去皮人參犀角屑枳實炙各六分黃連白朮大黃各八分甘草炙苦參旋覆花各四兩分檳榔仁十顆上搗篩蜜和丸如梧桐子大以酒飲服二十丸漸加至三十丸日三服無問食前後服之不利及忌生菜熱面蕎麥酒蒜豬肉海藻菘菜桃李雀肉等蛇蛻飲治頭旋心悶發即欲倒蛇蛻去土炙皮二兩蚱蟬去頭翅足炙四十枚柴胡去苗沙參赤芍藥葛根各一兩石膏碎杏仁去皮尖雙仁炒令黃各三分兩麻黃去根節三分牛黃如大豆粒十枚研湯調下上除牛黃外粗搗篩每服五錢水一盞半煎至八分入蜜竹瀝牛黃各少許更煎三兩沸去滓溫服療風邪氣未除發即心腹滿急頭旋眼暈欲倒方芎藭獨活防風白朮杏仁去皮臍尖枳實炙各二兩茯神三兩生薑四兩羚羊角屑黃芩各一兩上切以水九升煮取三升分為三服日三忌桃李雀肉並蒜大酢面等白朮散治風頭旋心胸不利白朮一兩前胡一兩去蘆頭防風三分去蘆頭枳殼二分麩炒微黃去瓤赤茯苓一兩蔓荊子三分甘草半兩炙微赤銼半夏半兩湯浸七遍去滑芎藭三分上粗搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服前胡散治上焦風痰頭旋目暈不欲飲食前胡一兩去蘆頭白朮一兩防風一兩去蘆頭枳殼一兩麩炒微黃去瓤茯神一兩細辛半兩蔓荊子三分半夏七三分湯浸七遍去滑甘草半兩炙微赤銼上粗羅為散每服三錢以水一中盞入生薑半分薄荷七葉煎至六分去滓不拘時候溫服芎藭散出聖惠方治風頭旋發則心腹滿拘急眼暈欲倒芎藭三分獨活半兩防風半兩去蘆頭赤茯苓三分杏仁半兩湯浸去皮尖雙仁麩炒微黃白朮半兩枳殼三分麩炒微黃去瓤黃芩半兩羚羊角屑半兩上粗搗羅為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候溫服獨活散治風頭旋手足厥逆身體疼痛心亂反倒如癲發歇無恆羚羊角散治一切風頭旋本因體虛風邪乘於陽經上注於頭面遂入於腦亦因痰水在胸膈間犯大寒使陽氣不行痰水結聚上衝於頭則令頭旋方見風頭眩類荊芥丸出聖濟總録治風頭旋目痛眩肢體拘急手足少力荊芥穗四兩細辛去苗葉芎藭白殭蠶炒各一兩天麻一兩半羌活去蘆頭防風去叉蒺藜子炒去角各二兩上為末煉蜜丸如雞頭大每服一丸食後細嚼荊芥茶下溫酒亦得羚犀湯出聖濟總録治暗風頭旋眼黑昏眩倦怠痰涎壅盛骨節疼痛胸膈痞滯咳嗽喘羚羊角鎊石膏碎甘草炙銼旋覆花紫菀去苗土以上各一兩前胡去蘆三分細辛去苗葉半兩犀角鎊一分上粗搗篩每服三錢水一盞入生薑一棗大拍碎煎至七分去滓食後溫服人參丸出聖濟總録治風頭旋目眩痰逆噁心胸膈痞滯咳嗽痰涎喘滿嘔逆不欲飲食人參甘草炙銼白朮旋覆花微炒各一兩麥門冬去心焙前胡去蘆頭枳殼去瓤麩炒各二兩木香半兩上為細末以湯浸炊餅和丸如梧桐子大每服二十丸食後溫生薑湯下八風散出聖濟總録治風頭旋目暗昏眩肢節疼痛手足麻木上膈壅滯或發寒熱荊芥穗芎藭防風去叉獨活去蘆頭甘草炙銼麻黃去根節各一兩人參二兩上為散每服二錢水一盞入生薑三片薄荷三葉煎至七分去滓溫服山茱萸散出聖惠方治風頭旋目疼體痛防風山茱萸川芎甘菊花細辛天雄炮山藥各半兩上為細末每服二錢溫酒調食前服十便良方無天雄防風丸出聖濟總録治風頭旋眩暈肩背拘急發熱惡寒肢節疼痛防風去叉甘草炙各一兩羌活去蘆頭半兩獨活去蘆半兩桔梗去蘆炒半兩芎藭白芷各三分上為末煉蜜丸如櫻桃大每服一丸食前後荊芥湯嚼下芎藭散出聖濟總録治風頭旋眼目昏花痛眩暈倦怠心忪芎藭人參前胡去蘆頭白殭蠶炒各一兩防風去叉蔓荊子天麻酒浸一宿焙各半兩上為散每服二錢食後溫酒調下白蒺藜丸出聖濟總録治風頭旋目暈痰逆蒺藜子炒去角旋覆花擇皂莢去皮子燒灰惡實炒各一兩龍腦研二錢麝香研一錢菊花擇二兩上為細末煉蜜和搗三百杵丸如雞頭子大每服一丸細嚼溫酒下食後服白朮飲出聖濟總録治風邪在胃頭旋不止復加嘔逆白朮厚朴去粗皮薑汁炙甘菊花各半兩人參白芷防風去叉各一兩上粗搗如麻豆大每服五錢水一盞半入生薑五片煎至一盞去滓食前溫服松香散出聖濟總録治風頭旋肩背拘急肢節疼痛鼻塞耳鳴面赤咽乾心忪痰逆眼見黑花當風淚出松實去殼白芷當歸研焙切芎藭甘草炙各三兩甜瓜子洗一升上為細散每服二錢食後以荊芥薄荷茶清調下防風飲子專療風痰氣發即頭旋嘔吐不食防風人參橘皮各二兩白朮茯神各二三兩生薑四兩上切以水六升煮取三升去滓分溫四服中間任食一日令盡忌大醋桃李雀肉蒜面等物貼頂膏出聖濟總録療頭風悶亂鼻塞及頭旋眼暗皆主之萆麻去皮杏仁去雙仁皮尖石鹽芎藭松脂防風上等分先搗石鹽以下四種為末別搗萆麻杏仁相次入訖即蠟紙裹之有病者先灸百會三壯訖刮去黑髮使淨作一帛貼子裁好於灸處塗膏貼上兩三日一易之其瘡於後即爛破膿血出以帛貼之似爛柿蒂出者良一方用濃煎前七物相和一方無防風天雄散一名大五七散治風頭旋口喎目痛耳聾方見大三五七散延年療頭風旋不食食則吐方前胡三兩白朮防風枳實炙茯神各三兩生薑四兩上㕮咀以水六升煎取二升濾去滓分溫三服忌桃李雀肉酢等秦艽飲子吐方療心虛感風頭旋心忪痰飲築心悶昏恍忽不能言語宜微吐痰此候極重秦艽常山人參羚羊角屑各三兩生甘草三兩生用上切以水六升煮取二升絞去滓分溫二服日再如人行四五里久進一服取快吐不利忌生菜生蔥熱面蕎麥豬肉魚海藻菘菜祛痰丸出聖濟總録治風頭旋痰逆噁心咽膈不利天南星生半夏生赤茯苓去黑皮乾薑炮陳橘皮湯浸去白焙各等分上為細末稀麵糊丸如梧桐子大每服三十丸加至四十丸溫米飲下不拘時候鴟頭丸出聖惠方治風頭旋每發眩冒鴟頭一枚炙令黃䕡茹一兩白朮一兩川椒一兩去目及閉口者微炒去汗上為末煉蜜和搗三五百杵丸如梧桐子大每服食前以溫酒下二十丸藿香散出本事方治風頭旋目暈痰逆噁心不思飲食藿香葉零陵香莎草根炒去毛各等分上為散每服二錢食後臘茶清調下日三松花浸酒方聖惠方治風頭旋腦皮腫痹上用松花並苔春三月取五六寸如鼠尾者不計多少蒸細切一升用生絹囊貯以酒三升浸五日每服空腹暖飲五合晚食前再服乾薑方治頭旋眼眩上以乾薑為末熱酒調一錢服立效蟬殼方聖惠方治風頭旋腦轉上用蟬殼二兩微炒為末非時溫酒下一錢治頭風頭旋聖惠方上用九月九日菊花曝乾取家糯米一斗蒸熟用五兩菊花末攪拌如常醞法多用細面曲為良候酒熟即壓之去滓每暖一小盞服止逆湯傳信適用方治頭目眩暈吐逆蓋胃冷生痰致有此疾纍用效川乾薑二兩炮甘草一兩炙赤銼上搗羅為粗末每服四五錢用水二盞煎至八分食前熱服化風丸楊氏家藏方治風氣上攻頭目眩暈項背拘急鼻塞不通神思不爽藁本去土川芎荊芥穗細辛去葉土甘草炙