body:
  text: 卷一百三十傷寒門傷寒一日候附論夫傷寒一日太陽受病太陽者膀胱之經也為三陽之首故先受病其脈絡於腰脊主於頭項故得病一日而頭項腰脊痛也傷寒一二日發熱惡寒頭痛腰脊強尺寸脈俱浮此是太陽膀胱經之病也太陽病頭痛發熱汗出惡風宜桂枝湯輕者只宜柴胡桂枝湯太陽病頭痛發熱無汗惡風宜麻黃湯輕者只宜桂枝麻黃各半湯麻黃湯桂枝湯二者均為解散正分陰陽不可不慎也仲景謂無汗不得服桂枝有汗不得服麻黃常須識此勿令誤也今人才見身熱頭痛便發汗不知汗空閉而用麻黃汗空疏而用桂枝湯傷寒傷風其治不同古人必無汗者方可發汗方桂枝湯出聖惠方治傷寒一日太陽受病頭項痛腰脊強壯熱惡寒桂枝附子炮裂去皮臍乾薑炮裂銼甘草炙微赤銼以上各半兩麻黃二兩去根節上為散每服四錢水一中盞入蔥白二莖煎至六分去滓不計時候稍熱服如人行五里以稀蔥粥投之衣蓋取汗如未汗一依前法再服麻黃湯出聖惠方治傷寒一日頭痛身體百節痠疼惡寒宜服麻黃一兩去根節桂心三分甘草半兩炙微赤銼芎藭一兩杏仁三分湯浸去皮尖雙仁麩炒微黃附子三分炮裂去皮臍赤芍藥三分白朮三分上為散每服四錢水一中盞入生薑半片黑棗三枚煎至六分去滓不計時候稍熱服如人行五里再服厚覆取汗解肌湯出聖惠方治傷寒初患一日體熱頭痛麻黃一兩去根節甘草一分亦作一分半炙微赤銼赤芍藥半兩葛根一兩半銼石膏半兩桂心三兩去粗皮杏仁半兩湯浸去皮尖雙仁麩炒微黃上為散每服四錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱頻服衣蓋以汗出為效一方不用棗細辛散出聖惠方治傷寒初得一日壯熱頭目四肢疼痛細辛一兩赤芍藥一兩桂心三分乾薑半兩炮附子半兩炮裂去皮臍甘草半兩炙微赤銼上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候熱服良久吃蔥粥投之衣蓋出汗治傷寒一日脈弦而數頭項腰脊痛身熱煩滿不得睡臥出聖惠方麻黃一兩去根節乾薑炮半兩銼石膏一兩上為散每服五錢以水一大盞入豉半合蔥白二莖煎至五分去滓不計時候稍熱頻服衣蓋出汗桔梗散出聖惠方治傷寒一日壯熱頭痛惡寒桔梗二兩去蘆頭細辛半兩川烏頭一兩炮裂去皮臍麻黃半兩去根節白朮半兩防風半兩去蘆頭桂心一分兩乾薑半兩炮吳茱萸一分湯浸七遍焙乾微炒上為末每服不計時候以溫酒調下二錢衣蓋出汗為度如未出汗即再服之人參散出聖惠方治傷寒一日頭痛壯熱煩悶其脈洪數宜服人參半兩去蘆頭桂心三分赤芍藥半兩白朮半兩乾薑半兩炮麻黃三分去根節甘草一分炙微赤銼上為末每服四錢水一中盞煎至六分去滓不計時候溫服四五服汗出為效石膏飲子出聖惠方治傷寒一日頭痛壯熱心神煩悶石膏一兩搗碎柴胡半兩去苗豉一合微炒麻黃一兩去根節蔥白二莖薄荷一分上細銼都以水二大盞煎至六分去滓不計時候稍熱分為三服如人行二三里時相續服盡厚蓋取汗解肌湯出聖惠方治傷寒一日邪氣毒在皮膚肌肉宜服麻黃半兩去根節桑根白皮半兩銼赤芍藥一分梔子仁一分前胡一分去蘆頭甘草一分炙微赤銼桂心一分杏仁一分湯浸去皮尖雙仁麩炒微黃上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候稍熱頻服以厚衣蓋出汗前胡散出聖惠方治傷寒初覺頭痛膈上痰壅宜服前胡一兩去蘆頭人參一兩去蘆頭細辛半兩桂心一兩陳橘皮一兩半湯浸去白瓤焙赤茯苓一兩附子二兩炮裂去皮臍訶黎勒一兩半用皮甘草一分炙微赤銼上為散每服五錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服麻黃散出聖惠方治傷寒初覺一日頭項腰脊痛惡寒麻黃半兩去根節乾薑半兩炮蔥白三莖豉一合上細銼以水二大盞煎至一盞三分去滓不計時候稍熱分為三服衣蓋出汗治傷寒初得一日壯熱頭項腰腳疼痛宜服出聖惠方麻黃一兩半去根節葛根一兩銼赤芍藥三分柴胡一兩去苗桂心三分石膏一兩上為散每服五錢以水一大盞入豉半合椒二七粒蔥白二莖薄荷二十葉煎至六分去滓不計時候稍熱服服藥後吃蔥豉粥投之以衣蓋出汗治傷寒初覺憎寒壯熱頭痛口苦宜服出聖惠方桂心一兩赤芍藥一兩甘草三分炙微赤銼上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候稍熱服須臾吃蔥豉粥投之衣蓋取汗出為度如若未汗即宜再服知母散出聖惠方治傷寒一日頭痛項強上連風府壯熱憎寒體痛口苦宜服知母一分麻黃半兩去根節乾薑半兩炮蔥白四莖豉半合上俱細銼和均分為二服水一大盞煎至五分去滓不計時候稍熱服之衣蓋取汗出為度如若未汗即宜再服葛根湯出聖惠方治傷寒一日初覺頭痛惡寒壯熱腹內熱脈洪大葛根一兩一作半兩蔥白五莖豉一合柴胡半兩去苗生薑一兩黃芩半兩上都細銼以水三大盞煎至一盞半去滓不計時候稍熱分為三服如人行五里時再服衣蓋取汗又方出聖惠方麻黃一兩去根節附子半兩炮裂去皮臍銼生薑半兩銼切蔥白五莖切豉一合上都細銼以水二大盞煎至一盞半去滓不計時候稍熱分為三服如人行五里時再服衣蓋出汗神丹丸出聖惠方治傷寒一日頭痛遍身壯熱時時惡寒宜服發汗人參一兩去蘆頭川草烏一兩炮裂去皮臍半夏三分湯洗七次去滑銼赤茯苓一兩硃砂半兩細研水飛過上為末煉蜜和搗百餘杵成丸如梧桐子大每服不計時候以生薑湯下十丸服後良久吃蔥豉粥投之以衣覆體取汗出為度如若未汗即宜再服附子湯出聖惠方治傷寒一日壯熱頭痛其背惡寒者宜服附子一兩炮裂去皮臍赤茯苓半兩赤芍藥半兩人參半兩去蘆頭白朮半兩桂心半兩上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服治傷寒一日頭痛先宜煎蒴藋湯淋背發汗出聖惠方蒴藋五兩槐枝三兩柳枝四兩桃枝三兩構葉四兩銼豉一升蔥白十莖上細銼以水三斗煎取二斗去滓放無風處看冷暖淋背訖便吃蔥豉粥吃粥後以衣覆之取汗出為度蔥豉湯出聖惠方治傷寒初得一日壯熱頭痛宜服蔥白三莖切麻黃一兩去根節銼豉一合生薑半兩碎上以水二大盞煎至一大盞半去滓不計時候稍熱分為三服頻服衣覆出汗治傷寒一日服蔥豉湯不得汗宜服出聖惠方葛根一兩銼蔥白三莖切豉一合上以水二大盞生薑半兩同煎至一盞半去滓不計時候稍熱分為三服頻服衣覆出汗青膏方出聖惠方治傷寒初得一日在皮膚頭痛項強四肢煩疼宜用當歸三兩川椒三兩去目及閉口者芎藭三兩吳茱萸三兩白芷三兩附子三兩去皮臍生用川烏頭一兩去皮臍生用莽草二兩上俱細銼以醇酒浸之良久漉出以煉成豬脂四斤和入煎至藥色黃絞去滓不計時候以溫酒服如生棗大日三服稍稍增之若頭項強即摩之黃膏方出聖惠方治傷寒一日目赤頭痛頸項強直賊風所入宜用川大黃半兩附子半兩去皮臍生用細辛半兩乾薑半兩川椒半兩去目及閉口者桂心半兩巴豆二十一粒去皮心上俱細銼以醋浸一宿漉出以臘月豬脂一斤煎令附子黃色即止濾出滓以瓷盒盛之傷寒赤色發熱酒服一丸如梧桐子大又以摩身數百遍兼治賊風及毒氣走注肌膚之間隨風氣所在摩之甚良白膏方出聖惠方治傷寒一日目赤惡寒肢節疼痛並療惡瘡及小兒頭瘡牛頭馬鞍瘡癰腫以膏摩之皆宜用天雄二兩去皮臍生用川烏三兩去皮臍生用莽草三兩躑躅花三兩上以酒三升浸一宿漉出用煉好豬脂三斤與藥一處放銅器內文武火煎令諸藥皆焦黃色即成膏去滓以瓷器盛之有患者摩之百遍即藥力行到傷寒咽痛含如棗核大日三咽之瘥其膏不可近目治傷寒一日至二日應汗者作此湯葛根半兩烏梅十四枚蔥白一握豉一升綿裹上切細以水九升煮取三升分為三服初一服便厚覆取汗出粉之治傷寒暴發出本草以荊芥豉汁煎服之傷寒二日候附論夫傷寒二日陽明受病陽明者胃之經也主於肌肉其脈絡於鼻入於目故得病二日肉熱鼻乾不得眠也諸經在表表始受病在於皮膚之間故可摩膏火炙發汗而愈也傷寒二三日身熱目痛鼻乾不得臥尺寸脈俱長皆是陽明胃經受病也傷寒二日陽明經受病可發其汗非正陽明也正陽明者身熱汗出不惡寒反惡熱故可下也今言二三日傳陽明經身熱目痛鼻乾不得臥尺寸脈俱長者是太陽陽明可表而已若無汗尚惡寒宜升麻湯有汗惡寒者表未解也宜桂枝湯無汗脈出其人喘者與麻黃湯又問十二經皆一而陽明有三何也有太陽陽明有少陽陽明有正陽陽明也太陽陽明者本太陽病若發汗下後若利小便此亡津液胃中乾燥因本傳屬陽明也太陽陽明脾約是也大便堅小便少其脾為約少陽陽明者本轉到少陽因發汗利小便胃已燥實大便難也正陽陽明者病人本風盛氣實也三陽明可下唯惡寒中寒病為在經與太陽合病屬表可發其汗蓋太陽與陽明合為脈必浮大而長外證必頭痛腰疼肌熱目痛鼻乾也脈浮大者太陽也長者陽明也頭疼腰痛者太陽也肌熱目痛鼻乾者陽明也尚惡寒者可升麻湯汗之若不惡寒反惡熱大便不秘者自利解利之不惡寒反惡熱大便秘兼或譫語者屬胃家氣也可調胃承氣湯下之又問二陽有合病有並病何也脈浮大而長頭疼腰痛肌熱目痛鼻乾者合病也太陽初得病時發其汗汗先出不徹轉屬陽明續自微汗出不惡寒者並病也三陽皆有合病唯三陰無合病不可不知也太陽證罷但發出熱手足漐漐汗出大便難而譫語者下後愈宜用大承氣湯若太陽證不罷不可下宜用桂枝麻黃各半湯小發汗設面色赤陽氣怫鬱在表當解之熏之若發汗不徹陽氣怫鬱不得越散當汗不汗煩躁不知痛處其人氣短但坐蓋以汗出不徹故也更以麻黃髮其汗則愈何以知汗出不徹以脈澀知之方桂枝附子湯出聖惠方治傷寒二日陽明受病陽明者主於肌肉其氣往來如寒熱鼻乾不得眠臥面赤身熱有此病證宜服桂枝一兩附子一兩炮裂去皮臍甘草半兩炙微赤銼赤芍藥半兩上為散每服三錢水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服汗出即愈人參湯出聖惠方治傷寒二日頭痛鼻乾面赤壯熱四肢煩疼人參三分去蘆頭訶黎勒皮三分乾薑一分炮裂銼桂枝三分赤茯苓一分附子三分炮裂銼去皮臍甘草一分炙微赤銼上搗篩為散每服三錢水一中盞煎至六分去滓不計時候溫服汗出即瘥麻黃湯出聖惠方治傷寒二日頭痛發熱煩悶宜服麻黃一兩去根節桂心三分石膏三分黃芩半兩甘草一分炙微赤銼芍藥半兩一方赤芍藥杏仁二十一枚湯浸去皮尖雙仁麩炒微黃上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱頻服汗出即愈解肌湯出聖惠方治傷寒二日頭痛壯熱骨節煩疼宜服乾薑二兩炮製麻黃一兩去根節赤芍藥三分黃芩三分石膏一兩上為散每服五錢水一大盞入蔥白二莖豉半合煎至五分去滓不計時候稍熱服如人行五里時再服汗出即瘥吳茱萸散出聖惠方治傷寒二日皮膚頭痛項強四肢煩疼宜服吳茱萸一兩湯洗七遍焙乾微炒當歸一兩微炒銼芎藭一兩附子一兩炮裂去皮臍白芷一兩川烏頭一兩炮裂去皮麻黃一兩去根節川椒一兩去目及閉口者微炒出汗上為散每服五錢水一大盞入生薑半分棗三枚煎至七分去滓不計時候稍熱分為二服以衣覆體取汗即瘥荊芥湯出聖惠