臟腑傳變陽經先受病故次第傳入陰經似陽主生故太陽水傳是陽明土土傳是少陽木微為邪也陰主殺故木傳是大陰上土傳是少陰水水傳是厥陰木至六七日當傳厥陰肝木為移氣克於脾土脾再服賊邪則五臟六腑皆困而危殆衛營不通耳聾囊縮不知人而死矣速用承氣湯下之可保五死一生古人云脾熱病則五臟危又云土敗木賊則死若第六七日傳厥陰脈得微緩微浮為脾胃脈也故知脾氣全不再受克邪無所容否極泰來營衛將復水升火降則寒熱作而大汗解矣方小柴胡湯出聖惠方治傷寒病六日其病深結在臟是三陰三陽俱受病若五臟六腑營衛皆不通其人難治柴胡二兩去苗黃芩一兩赤芍藥一兩半夏半兩湯浸七次去滑枳實半兩麩炒微黃人參二兩去蘆頭甘草半兩炙微赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服大承氣湯出聖惠方治傷寒六日體重四肢煩疼多渴或譫語不知人事如此病證者胃中有結燥不通川大黃二兩銼碎微炒枳實二兩麩炒微黃川芒硝二兩厚朴一兩去粗皮塗生薑汁炙令香熟上為散每服四錢用水一中盞煎至六分去滓不計時候溫服以利為度如人行十里時未利再服瀉心湯出聖惠方治傷寒六日心胸妨悶煩熱不解面赤大渴壯熱身體疼痛此證是毒氣攻心半夏半兩湯浸七次去滑人參半兩去蘆頭木通一兩銼甘草一兩炙微赤銼黃芩一兩川大黃一兩銼碎微炒上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服人參散出聖惠方治傷寒六日嘔噦不定頭疼體痛時有虛汗此證是冷熱未和人參三兩去蘆頭柴胡三兩去苗黃芩一兩甘草一兩炙微赤銼白朮一兩半夏半兩湯浸七遍去滑厚朴一兩去粗皮塗生薑汁炙令香熟上為散每服三錢用水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服黃芩湯出聖惠方治傷寒六日發汗不解嘔逆小便不利胸脅痞滿微熱而煩黃芩桂心赤茯苓各一兩前胡三兩去蘆頭甘草半兩炙微赤銼半夏一兩湯浸七次厚朴一兩去粗皮塗生薑汁炙令香熟上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服柴胡桂枝湯出聖惠方治傷寒六日發熱惡寒肢節疼痛微嘔心下痞結外證未去桂枝一兩柴胡二兩去苗芎藭一兩人參一兩去蘆頭黃芩一兩赤芍藥一兩枳殼二兩麩炒微黃去瓤甘草半兩炙微赤銼半夏一兩湯浸七次去滑上為散每服五錢以水一盞入生薑半分棗三枚煎至五分去滓不計時候溫服牡蠣散出聖惠方治傷寒六日其人已發汗而不解胸脅滿小便不多利渴而不嘔但汗出往來寒熱而煩牡蠣一兩燒為粉甘草一兩炙微赤銼乾薑半兩炮柴胡二兩去苗栝蔞根一兩木通一兩銼桂心一兩黃芩一兩厚朴二兩去粗皮塗生薑汁炙令香熟上為散每服三錢以水一中盞煎至五分去滓不計時候溫服人參散出聖惠方治傷寒六日吐瀉百骨疼痛腳冷腹熱人參三分去蘆頭柴胡三分去苗白茯苓三分牡蠣三分燒為粉黃芩三分白芍藥三分桂心三分半夏三分湯浸七次去滑甘草三分炙微赤銼乾薑三分炮上為散每服三錢以水一中盞入生薑半分棗三枚煎至五分去滓不計時候溫服豬苓散出聖惠方治傷寒六日發熱煩悶渴欲飲水得水而吐其脈浮數小便不利者豬苓三分去黑皮白朮三分澤瀉一兩桂心半兩赤茯苓三分丁香三分厚朴去粗皮生薑汁炙令香熟一兩半甘草三分炙微赤銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服葛根散出聖惠方治傷寒六日燥煩渴肢節解痛小腹急滿陰縮葛根三分銼石膏一兩柴胡一兩去苗川升麻三分知母三分梔子仁半兩甘草三分炙微赤銼川大黃一兩銼碎微炒上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服大青散出聖惠方治傷寒六日心躁煩悶四肢疼痛小腹滿急大青三分柴胡一兩去苗梔子仁一分川升麻三分知母三分石膏一兩甘草三分炙微赤銼上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服通關散出聖惠方治傷寒六日脈沉細不足者附子一兩炮裂去皮臍乾薑半兩炮甘草半兩炙微赤銼黃耆三分銼桔梗半兩去蘆頭防風三分去蘆頭羌活半兩五加皮半兩桂心三分上為散每服三錢以水一中盞煎至六分去滓不計時候溫服柴胡散出聖惠方治傷寒六日頭疼壯熱百節疼痛柴胡一兩去苗川升麻三分黃芩三分知母一兩赤芍藥一兩大青三分石膏二兩梔子仁一兩川大黃一兩銼碎微炒杏仁三分湯洗去皮尖雙仁麩炒微黃上為散每服四錢以水一中盞入生薑半分豉五十粒煎至六分去滓不計時候溫服一方無生薑麻黃升麻湯治傷寒六七日其人大小寸脈沉遲手足厥逆下部脈不至咽喉痛不利唾膿血泄利不止麻黃二兩半去節升麻五分當歸五分葳蕤一作菖蒲知母黃芩各二分麥門冬去心一作天門冬桂心芍藥乾薑石膏碎甘草炙茯苓白朮各一兩上切以水一斗先煮麻黃減二升掠去上沫納諸藥煮取三升去滓溫分三服相去如炊三斗米頃令盡汗出便愈忌海藻菘菜蔥醋桃李雀肉等物黃芩湯治傷寒六七日發汗不解嘔逆不利小便不通胸脅痞微熱而煩黃芩桂心各三兩茯苓四兩前胡八兩半夏半升洗上切以水一斗三升煮取六升為六服每日三服間食生薑粥投以取小便為度忌羊肉餳生蔥酢物小柴胡湯治傷寒六七日不解寒熱往來胸脅苦病默默不欲飲食心煩喜嘔寒疝腹痛前胡八兩半夏半升洗生薑五兩黃芩人參甘草炙各三兩干棗丁二枚擘上切以水一斗煮取三升分為四服忌羊肉餳海藻菘菜黑奴丸出聖惠方治傷寒六日熱毒在臟胸中煩悶口噤不能言唯欲飲水成壞傷寒醫所不療麻黃二兩去根節灶下黃土二兩川大黃二兩黃芩二兩川芒硝二兩灶突墨二兩梁上塵二兩上為細末煉蜜和丸如彈子大每服不計時候以井華水下一丸治傷寒熱病五六日愈加困重吃疏藥後下糞如紫黑色病勢不減神思昏昏小腹脹滿狂妄不省人事甚則腹中有塊堅硬不散其脈反結伏此其毒氣攻血腹內有瘀積物此候九死牡丹皮去心射干羌活荊芥穗大黃黃芩桃仁去尖並雙仁者連翹玄參麥門冬去心柴胡去毛山梔麻黃去根沉香上細杵羅為末每服三錢以水一盞半煎兩三沸食後和滓服苦參湯出仁存方治傷寒熱病五六日以上熱不除黃芩二兩苦參三兩生地黃一兩上㕮咀每服四大錢以水一盞半煎至七分去滓服傷寒七日候附論夫傷寒七日病法當小愈陰陽諸經傳病終故也今七日以後反甚者欲為再經病也再經病者是經絡重受病也方桂枝湯出聖惠方治傷寒七日不解頭痛有熱在裡大腸秘澀與承氣湯後其小便清者病不在裡屬在表也當鬚髮汗若頭痛者必衄桂枝一兩赤芍藥一兩甘草一兩炙微赤銼麻黃一兩去根筋柴胡一兩去苗芎藭一兩厚朴二兩去粗皮塗生薑汁炙令香熟上搗粗羅為散每服四錢以水一大盞入生薑半分棗三枚煎至六分不計時候熱服衣覆微汗如人行十里未汗再服知母散出聖惠方治傷寒七日脈浮發熱無汗渴欲飲水無表證知母一兩石膏一兩甘草半兩炙微赤粳米半合人參半兩去蘆頭葛根半兩銼上都銼以水二大盞半煎至二盞去滓不計時候分為三服溫服前胡湯出聖惠方治傷寒六七日發熱汗出不解心中痞堅前胡二兩去蘆頭赤茯苓二兩白朮二兩川大黃一兩銼碎微炒赤芍藥一兩枳實一兩白芷半夏一兩湯浸七次去滑厚朴二兩去粗皮塗生薑汁炙令香熟甘草一兩炙微赤銼上搗粗羅為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服麻黃散出聖惠方治傷寒七日大下後脈沉遲手足厥逆喉咽不利胸膈煩躁唾膿血泄痢不止為難治此方主之麻黃二兩去根筋當歸一兩銼微炒川升麻一兩知母一兩赤芍藥一兩天門冬一兩去心桂心一兩赤茯苓一兩甘草一兩炙微赤銼石膏二兩白朮一兩乾薑一兩炮裂銼上搗粗羅為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服柴胡散出聖惠方治傷寒七日不解心煩腸中有結燥譫語柴胡二兩去蘆頭半夏一兩湯浸七次去滑赤芍藥一兩甘草半兩炙微赤銼知母一兩黃芩一兩川大黃二兩銼碎微炒陳橘皮一兩去瓤湯浸人參一兩上搗粗羅為散每服四錢以水一中盞入生薑半分煎至五分去滓不計時候溫溫頻服稍利為度葶藶苦酒湯出活人書治傷寒七八日內熱不解葶藶一合紙上炒研膏生艾汁半升無生艾煮艾汁或用艾根搗取汁苦酒米醋是也半升上三味同煎取七合作三服傷寒八日候附論夫傷寒八日病不解者或是諸陰陽經絡重受於病或因發汗吐下之後毒氣不盡所以病證猶在也鱉甲散出聖惠方治傷寒八日熱勢彌重大便結澀心腹痞病飲食不下精神恍惚譫言妄語鱉甲一兩塗醋炙令微黃去裙襴細辛一兩吳茱萸三兩湯浸七次曬乾微炒白蘚皮一兩附子三分炮裂去皮臍枳實一兩麩炒微黃去瓤茵陳一兩大黃一兩銼碎微炒黃芩半兩赤芍藥半兩甘草半兩炙微赤銼葳蕤半兩上搗篩為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服以微利為度附子湯出聖惠方治傷寒八日風溫相搏身痛心煩不能自轉側不嘔不渴下之浮脈者附子一兩炮裂去皮臍桂心一兩白朮一兩白芷一兩甘草半兩炮炙微赤銼葛根一兩人參一兩去蘆頭陳橘皮一兩湯浸去白瓤焙上細銼和勻每服半兩以水一大盞入生薑半分棗三枚煎至七分去滓不計時候分溫二服茵陳湯出鮑氏方治傷寒七八日內熱結身黃如橙小便不利腹脹並酒傷瘀熱在內發熱頭有汗身無汗茵陳一兩淡竹葉大黃三錢半梔子五大個通草二錢上為散以水二盞煎茵陳次下後藥至一盞調三味五苓散下紅丸子甚效千金只前三件專治傷寒發黃汗並治谷疸川大黃一兩半銼碎微炒桂心三分上搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服微利為度犀角散出聖惠方治傷寒八日煩熱不退四肢疼痛犀角屑一兩川升麻一兩半柴胡一兩半去苗葛根一兩半銼吳藍一兩甘草一兩炙微赤銼上搗篩為散每服四錢以水一中盞煎至六分去滓次入馬牙硝三錢更煎二三沸不計時候溫服又方出聖惠方柴胡一兩去苗黃芩一兩犀角屑三分茯苓三分人參一兩去蘆頭甘草半兩炙微赤銼上搗篩為散每服四錢以水一大盞煎至六分去滓次入馬牙硝三錢更煎二三沸不計時候溫服生地黃丸出濟生拔萃方病人七八日後兩手脈沉遲細微膚冷臍下滿或狂或燥大便實而色黑小便自利者此蓄血證具也若年老及少年氣虛弱者宜此方主之生地黃自然汁一升如無生地黃只用生乾地黃二兩乾漆半兩炒煙欲盡生藕自然汁半升如無藕用刺薊汁半升如無刺薊汁用刺薊末一兩藍葉一握切碎乾者用末半兩水蛭十個炒大黃一兩銼如骰子大桃子仁半兩細研虻蟲二十個去翅足翅肉炒黃上一處入水三升半同慢火熬及二升以來放冷分三服投一服至半日許血未下再投之此地黃湯比抵當湯丸其勢稍輕如無地黃與藕汁計升數添水同煎抵當湯丸恐用之太過有不止損血之候故立此湯衄不可汗者蓋為脈微也脈浮緊者麻黃湯主之脈浮緩者桂枝湯主之脈已微者犀角地黃湯主之
