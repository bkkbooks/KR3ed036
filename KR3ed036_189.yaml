body:
  text: 卷一百八十九諸血門吐血衄血附論夫口鼻之中俱出血者由因勞熱而成蓋以血者本屬於心經脈流行不息一時停滯不利百病俱生或有憂悸之所因或有卒驚之所致此皆食飽過度飲酒勞傷壅滯積蓄於心胸熱毒熏蒸於肝肺臟腑既蘊邪熱則血流散上行故令吐血而致鼻衄也方天門冬湯出醫方大成治思慮傷心吐衄不止遠志去心甘草水煮白芍藥天門冬去心黃耆去蘆藕節阿膠蛤粉炒沒藥當歸去蘆生地黃各一兩人參甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎八分去滓溫服不拘時刺薊散出聖惠方治吐血衄血及大小便下血不止刺薊白芍藥白朮人參去蘆頭生乾地黃鹿角膠搗碎炒令黃色各一兩芎藭桂心黃芩各半兩上為散不計時候以生地黃汁調下二錢竹茹散出聖惠方吐血衄血此為內損或勞傷所致青竹茹白芍藥白朮人參當歸各一兩生乾地黃三兩甘草半兩炙微赤銼上為散每服三錢以水一中盞煎至六分不計時候溫服伏龍肝湯出千金方治五臟熱結吐血衄血嘔血伏龍肝雞子一枚生竹茹一升芍藥當歸黃芩芎藭甘草各二兩生地黃一斤上㕮咀以水一斗三升先煮竹茹減三升下藥取三升分作三服一方有桂心人參散人參黑豆燈心淡竹茹放棒行扁柏腦茅根紫萍上等分㕮咀同煎服或為細末以紅酒調下地黃散一名生地黃飲出千金方治口鼻皆出血血上行胸心氣急及大便出血生地黃八兩蒲黃一升地骨皮五兩黃芩去黑心芍藥生竹茹各三兩上㕮咀以水八升煮取三升七合分溫三服當歸湯出聖惠方治衄血吐血不止心胸疼痛當歸乾薑芍藥阿膠各二兩黃芩三兩上㕮咀以水六升煮取二升分三服一方為散以生地黃汁調二錢扁柏散治男子衄血沿街草梔子葉地竹扁柏上等分先將蒜薑水研淺鍾飲之令睡隨後將四件用水二碗煎至淺碗服黃芩芍藥湯出醫方大成治虛家不能飲食衄血吐血黃芩白芍藥甘草各等分上㕮咀以水二盞煎一盞服一方加生薑黃耆鬱金散出聖惠方治吐血衄血不止鬱金木香飛羅面黃柏銼各一兩甘草一兩半炙微赤銼上為散以生地黃汁一大盞旋拌藥後焙令乾又拌之地黃汁盡為度再搗細為散不計時候煎青竹茹湯調下二錢藕汁散出聖惠方治吐血衄血不止生藕汁生地黃汁大薊汁各三合生蜜半匙上和令勻每服一小盞細細令呷之不拘時候一方有牛蒡根無大薊根蒲黃飲治吐血鼻衄不止糯米炒蒲黃青黛白麵各一兩上為末水調五錢服麥門冬飲子出聖惠方治吐血衄血至一斗不止者宜服生麥門冬汁五合生刺薊汁五合生地黃汁五合上相和於銀鍋中略暖過每服一小盞調伏龍肝末一錢茅蘇湯出直指方治吐血衄血茅花三錢紫蘇莖葉二錢上㕮咀以新汲水一碗煎至七分去滓乘熱調生蒲黃二錢漸漸服仍以蒜兩顆煨熟捶扁貼敷兩腳中心少頃自覺胸中有蒜氣其血立止若下部出血可以煨蒜敷手心尤佳白芍藥散出肘後方治咯血衄血白芍藥一兩犀角末一分上為末新汲水服一錢以血止為度雞子白丸出聖惠方治吐血衄血雞子白三個好香墨二兩上搗為末以雞子白和丸如梧桐子大不計時候以生地黃汁下十丸蛤粉散出百一選方治吐血兼治衄血上用蛤粉白膠香等分以好松煙墨汁調服胡黃連散治吐血衄血生地黃胡黃連各等分上為末用豬膽汁為丸如梧桐子大每服五十丸臨臥煎茅花湯送下茅花湯出百一選方治吐血衄血用茅花不計多少煎湯服治吐血衄血不止用干石榴皮末吹鼻立止蘿蔔飲一名萊蔔飲出楊氏家藏治諸血熱吐血衄血用生蘿蔔取汁半盞入白鹽少許服之立效如無生蘿蔔只用蘿蔔子一分微炒紫蘇葉莖半分銼散用煎亦效一方用蘿蔔汁入鼻中治吐血鼻紅用生薑一分搗絞汁並壯健丈夫小便一升乘熱頓飲瘥治吐血鼻衄用茅香花煎湯服之又方用陳紅米泔水一鍾溫服三豆湯出朱氏集驗方治飲酒太過衄血吐血起則無事眠則甚服諸藥不效服此而愈烏豆赤小豆緑豆上各等分溫水服瀉心湯一名三黃湯出淡寮方治心氣不足吐血衄血大黃三兩黃連黃芩各一兩上㕮咀以水三升煮取一升頓服之宜食前通服亦能治霍亂之疾神效加生地黃清水煎四服大便通利便愈或曰心氣不足可更瀉乎仲景曰若心氣獨不足不當有衄血也必邪熱因心不足以客之故吐衄也以苦泄其熱則以苦補其心蓋兩全之有是證者無不取效量虛實與之治吐血衄血出危氏方用山梔子燒灰谷醋調服一方用梔子甘草每服三錢煎五分溫服黃芩散出聖惠方治吐血衄血或發或止皆心臟積熱所致宜服用黃芩一兩去心中黑腐為散每服三錢以水一中盞煎至六分不計時和滓溫服衄血一月者暴驚所致出聖惠方以刺羊血熱飲之即瘥一方用新羊血慎勿刺羊取血神道不祐當無瘥也鼻衄附論夫脾移熱於肝則為驚衄脾土也肝木也木本剋土今脾熱令土氣反盛逆往乘木是木之虛不能制土故受脾之移熱也肝之神為魂而藏血虛熱則魂神不定故驚也凡血與氣內營臟腑外循經絡相通而行於身周而復始血性得寒則凝澀熱則流散而氣者肺之所主也肺開竅於鼻熱乘於血則氣亦熱也血氣俱熱血隨氣發出於鼻為衄也診其寸口脈微芤者衄血寸脈微苦寒為衄血也寸口脈微弱尺脈澀發熱而弱為無血必厥其人微嘔夫當眩不眩而反頭痛痛則為實下虛上實必衄也肝脈不和為衄脈陰陽錯而浮必衄血脈細而數及在關上法當吐而不吐其面頰上小赤眼中白膚上有細赤脈如發直趣至黑瞳子者當衄病人面無色無寒熱脈沉弦者衄也從春至夏為太陽衄從秋至冬為陽明衄連日不止者其尺脈必徑徑則睛上浮白白上浮黃若目睛明慧而僅衄血未止脈滑小弱者生實大者死衄血而脈小滑者生大躁者死鼻衄脈沉細者生浮大而牢者死養生方云思慮則傷心心傷則吐血衄血也金匱言鼻頭色白者亡血設令微赤非時者死病人色白皆亡血也凡時行衄不宜斷之如一二升以上恐多者即以龍骨末吹之即愈以至九竅血俱出者謂之大衄膽移熱於腦熱盛則陽絡溢溢則衄出血汗者謂之衄蔑治法各有方方克效方出聖濟總録治鼻衄甘草炙銼桑耳焙各三分枳殼去瓤麩炒大黃銼炒半兩麥門冬去心焙槐實炒各一兩半白芷雞蘇葉百合黃耆銼白前連翹檳榔各一兩銼薑黃二兩上搗篩每服五錢水一盞半入生薑三片同煎至八分去滓溫服雞蘇丸出如宜方治肺熱腦中鬱熱衄血兼治血淋吐血口臭等證方見龍腦雞蘇丸治鼻衄及暴下血出本草上煮白茅針服之成白花者功用亦同針即芽筍也治衄血出本草用車前葉生研水搗汁飲之甚苦治鼻衄出本草以椰子皮煮汁服之伏龍肝湯出千金方治鼻衄伏龍肝半兩芎藭一分細辛去苗葉半兩白芷乾薑炮芍藥甘草炙銼吳茱萸湯浸一宿與大豆同炒去豆各一兩上粗搗篩每服三錢酒一盞煎至七八分入生地黃汁一合更煎一二沸去滓溫服日三一方酒水同煎門冬飲子一名人參飲出試效方治脾胃虛弱氣促氣弱精神短少衄血吐血人參五分黃耆二錢五味子五個芍藥一錢甘草一錢紫菀一錢半一方不用當歸身麥冬各二錢上㕮咀分作二服每服水一盞八分煎一盞去滓稍熱服食後一方無紫菀比金方治邪熱上攻鼻衄煩悶鬱金雪水煮令透切爆幹一兩白茯苓去黑皮白石英紫石英水銀各一分甘草生銼一分龍腦研半錢黑鉛半錢與水銀銅鍋炒上除腦子外搗研為末用黃牛膽汁和丸如彈子大每服一丸煎甘草湯放冷磨下伏龍肝散治五臟熱結鼻衄心胸煩悶伏龍肝當歸赤芍藥黃芩各二兩犀角屑刺薊各一兩生乾地黃三兩上為散每服三錢水一大盞入青竹茹一雞子大煎至五分去滓溫服加味理中湯治飲酒過多及啖炙爆熱食動血物發為鼻衄人參白朮甘草炙乾薑炮乾葛川芎各等分上為散每服四錢水一盞煎七分去滓溫服蒲黃散治鼻衄蒲黃柏子仁研當歸切焙阿膠炙燥棕櫚燒存性研亂髮灰研各一錢上搗研為散每服二錢生藕節自然汁調下如肺損吐血用地黃自然汁調下腸風下血用糯根皮煎湯調下婦人帶下艾湯調下生地黃湯治上熱衄血生地黃酥洗二兩阿膠酥炒一兩川芎北梗蒲黃甘草生各半兩上銼碎每服三錢水煎熟入生薑汁二匙溫服麥門冬散治鼻衄生地黃三錢生麥門冬三錢生薑一錢白藥蒲黃各二錢白蜜一合上搗細以井水二大碗煎七分分兩服止衄散治氣虛發衄神效無比方黃耆六錢赤茯苓白芍藥當歸生地黃阿膠甘草各二兩柏葉把上為末每服二錢煎黃耆湯下生地黃湯治鼻衄生地黃八兩黃芩一兩阿膠甘草各二兩柏葉把上㕮咀以水七升煮取三升去渣內膠煎取二升半分三服睡黃散治鼻衄芡實一兩半雄黃研馬牙硝甘草生銼各半兩牛黃研一錢上為散每服二錢用豬膽汁與新汲水調下相次便睡微有汗出為效如時氣發黃舌脹咽喉腫及熱極者如前法斟酌多少服之黃連散治大人小兒熱盛乘於血血隨氣散溢於鼻而致鼻衄血得寒則凝澀結聚得熱則流散妄行黃連黃柏柏葉甘草各等分上為末每服二錢水一盞豉二十粒煎五分溫服涼血地黃散治營中有熱及肺壅鼻衄生瘡一切丹毒生地黃赤芍藥當歸川芎各等分上㕮咀水煎去滓量大小加減鼻衄加蒲黃生瘡加黃芩丹毒加防風川芎三黃散治實熱衄血大黃實紙裹蒸川芎黃連淨黃芩等分上為末每服二錢井水調服食後三奇散治衄血不止亂髮灰一錢人中白半錢麝香一分上為細末鼻中搐少許立止一方不用麝香以發灰人中白為末湯調服立止龍麝散治鼻衄伏龍肝半兩麝香一錢羊脛炭皮拍碎炒令通赤一兩上細研如粉每服二錢冷水調下或研小薊汁調下亦得明膠散治肺積熱極衄血吐血一名伏龍肝散方見伏龍肝散傳效衄方以灶下黃土吹入鼻又取井底青泥封面上數易之又方生地黃三兩研取汁生薑半兩研取汁阿膠半兩杵碎炒令黃燥為末上以生薑地黃汁入阿膠末和勻於銀器內暖過漸漸服之兼治吐血又方出聖惠方豉二合艾葉如雞子大鹿角膠二兩杵碎炒黃燥上以水二大盞煎取一盞二分分為三服徐徐服之地金湯出聖濟總録治鼻衄生乾地黃焙生干藕節各二兩上細銼如麻豆每服三錢水一盞煎至六分去滓食後臨臥溫服玉塵散出聖濟總録治肺癰鼻衄白麵箬葉灰各三錢上研令勻分為三服食後井花水調下刺薊湯出經驗良方治鼻衄大薊根一兩相思子半兩上粗搗篩每服三錢水一盞煎至七分去滓放冷服地黃散出肘後方治鼻衄及膈上盛熱乾地黃龍腦薄荷各等分上為細末冷水調下又方出危氏方槐花烏賊魚骨各等分上半生半炒為末吹入鼻又驗方出肘後方以新生白茅腹中裹白胎長五六寸者取一握五升水煮取一升服又芍藥末吹鼻中又方出千金方治鼻衄以冷水淨漱口含水以蘆管吹二孔中一方冷水面漿調服又方出千金方以亂髮五兩燒作灰以管吹鼻中棗核大不止益之吹以血斷止並水服方寸匕日甚者日夜二已困不識人者服亦佳一方用好墨點入醋井水調下又方出千金方取人屎尖燒灰水服並吹少許鼻中止一方於五月五日修同上又方出千金方又濕布溥胸上又方出千金方醇酢和土塗陰囊上干易之又方出千金方以韭根蔥根取汁滴鼻中著一棗之大內鼻少時更著兩三度瘥蔥白搗汁亦得白芨散出三因方治鼻衄立效嘔血咯血肺損或食飽負重得者服之愈用白芨不拘多少為末冷水調用紙花貼鼻窊中效一方用雪水調如無以新汲水調自兩眉際敷至鼻上以編子緊繫頭摺紙系令緊時蘸冷水浥藥上飯頃即止去藥又方用黃膠即阿膠蕩令軟貼鼻窊中及鼻頭至頂及髮際三寸止一方熔膠糊塗帛貼額上仍用末雄黃綿裹內下部畫粉方出瑞竹堂方治鼻衄血出不止一二服除根用白土即畫匠所用畫粉極細研每服五錢新汲水調服止治鼻衄出經驗良方治大人小兒鼻衄乃血熱不循經而壅從鼻出也血隨氣行而肺主氣外屬鼻故出血也以春多衄者用生地黃研取汁加蒲黃少許砂糖井花水調和頻服之愈秋夏衄者用車前草研取汁同生薑汁蜜井花水和飲之即愈先用滓塞兩鼻四時衄者生蘿蔔搗汁同生薑汁蜜和井水調飲之良四時皆可用蘿蔔汁仰頭滴入鼻中即止又方出經驗良方用伏龍肝不以多少為末以荊芥汁調下即止又方用雞腳草捼水吃以滓塞鼻又方出經驗良方用白藥煎銼碎燒灰存性大紅棗銼碎燒灰存性二味為末糯米飲湯溫服一方煎湯洗鼻頻縮藥入鼻又方出經驗良方以青黛為丸用肥棗擘開去核入青黛在內濕紙包慢火煨一餉待冷細嚼新汲水吞下治鼻中出血用茅屋上青苔曰屋遊以新汲水研一盞浮滓與服其血立止枇杷葉方用枇杷葉去毛焙乾為末用茶調下一二錢日三亦治鼻赤治鼻鼽血以左臂血用紙捻點左眼上亦如之又方以好麻紙捻納鼻中頃之打嚏即愈此方甚奇有人一夕常衄盈盆百藥不效用此遂愈治衄血以燈盞數枚以百沸湯煮逐枚漉出乘熱安頭上冷即易之又蒲黃二錢先用新汲水調下老人不用次用米腦細研以熱馬糞汁調上件腦子用鵝毛羽掃入鼻中立止馬糞熱即有汁冷無汁又赤芍藥末冷水調服又五倍子一兩為末新綿燒灰等分米飲調下譙知閣患病用此而愈搐鼻方治鼻衄用駝糞不拘多少用新藏瓶一個打開底入糞在內燒成灰取出研細用麝香少許研勻隨衄血鼻搐之一方無麝香為細末搐鼻中防己散治鼻衄用防己三兩三搗羅為散每服二錢新汲水調下老人小兒取一錢服更用熱湯調少許鼻中嗅氣佳亦用糯米飲調下烏沙散一名香墨汁治鼻衄用細煙香墨二兩為細散每服一錢臘茶清調下或濃磨以蔥白蘸塞鼻中或點入鼻內亦可一方蔥汁磨墨滴鼻中吹鼻方治鼻衄吐血用柏葉石榴花為細末每用少許吹鼻中一方用花片塞於鼻中止貼背膏治鼻衄用京三稜大者一枚以濕紙裹於慢火中煨熟乘熱捶碎搗為細末醋煮麵糊調貼背第五椎上貼鼻方治鼻衄用鹿角膠不計多少以沸湯浸軟貼鼻坳上更以酵面調令稀稠得所若左竅出血則塗右邊右竅出血則塗左邊扎耳方治鼻衄用延胡索為末以綿裹扎耳內左衄扎右右衄扎左左右俱衄則兩耳俱扎蔥白汁治鼻衄血用蔥白一握搗絞取汁投酒少許點兩點入鼻瘥衄血方用川鬱金末並水調下亦治吐血又方用槐花半生半炒末吹入鼻一方治鼻衄以鯉魚鱗炒成灰研為末冷調下一二錢一用頭髮燒灰搐入鼻中先口含水即止治鼻衄方本草用鉛白霜為末取新汲水調二字治鼻衄出血不止心悶欲絶用乾薑削令頭尖微煨塞鼻中又方用麻鞋底燒灰吹鼻孔中立效亦治鼻塞止鼻衄本草用香薷乾末以水服之治鼻衄出血兩孔不止謂之血汗以新汲水磨黃藥子一碗勿令太稀頓服立瘥又方用藕節取汁服之或滴入鼻中又方用故屏風紙燒灰細研溫酒調下一錢立止又方用貝母二兩炮黃搗羅為末以漿水調二錢服良久再服又方用穀精草為末以熱麵湯調下二錢治鼻大衄有效上用貫衆根為末調服一錢匕止鼻血有效治鼻衄上用刀刮指甲末吸入鼻中即止治卒鼻衄出聖惠方上取水一罐鑽底作小孔令射病人頂上名音門以新汲水四五罐即止音門在頂後宛宛中淋不過一兩罐即止又方出肘後方上水和粉一升如粥飲之立瘥又方出千金方上綿裹白馬矢赤馬矢亦好塞鼻又新馬矢悉可用甚者飲汁一二升無新者水浸乾者或用新屎汁灌鼻中亦效一方用赤馬通又方出肘後方上苦酒漬綿塞鼻又方出肘後方上左孔衄縛右足小指右孔亦如之兩孔衄皆縛又方出聖惠方療人少小患鼻衄小勞輒發及大人小兒鼻衄血犯著便出者用桑耳不計多少炒令焦搗末每衄發輒以杏仁大塞鼻數度即可斷又方出聖惠方上以鹽半兩炒碾為末分為二服以冷水調下未止更服又方出聖惠方上以槲葉搗絞取汁每服一小盞頓服即止又方出聖惠方上以胡粉炒令光黑以醋調一錢服之即止又方生地黃湯出千金方治鼻衄昏迷不省昔有婦人經血半年不行因見地黃汁飲數杯後即通利是知地黃治血甚驗又生地黃三五斤取汁使患者生吃吸汁三斤許又以其滓塞鼻須臾血止服汁尤佳一方用一兩細銼於銀石器中以酒一中盞煎三沸去滓頓服其血立止一方煮服之忌酒炙宜食粳米朱氏集驗方云昔汝州牧因驗尸有保正趙溫不詣尸所問之即云衄血已數斗昏困欲絶遂使人扶掖以來鼻血如簷溜平日所記治衄數方即合藥治之血皆衝出謂治血莫如地黃遣人尋生地黃得十餘斤不暇取汁因使之生吃漸及三四斤又以其滓塞鼻須臾血定後子婦吐血有醫者教取生地黃自然汁煮飲之日服數升三日而愈昔有一婢病經血半年不通見釜中飲汁以為棄去可惜輒飲數杯隨即通利地黃活血其功如此地黃但用新布拭之淨搗汁勿用水洗立效散一名龍骨散出聖惠方治鼻中衄血及咯吐血不止用龍骨一兩搗碎以水一大盞煎至半盞溫服盡一方用五色者煅研細末吹一豇豆許入鼻中立止又方出聖惠方用生葛根搗取汁每服一小盞三服即止又方用垣衣搗爛取汁每服一小盞頻服吹鼻散出聖惠方治鼻卒衄血用釜底墨細研以少許吹鼻中即止塞鼻方出聖惠方治鼻衄用蝟皮一枚燒灰細研每用半錢綿裹內鼻中數易之一方燒末吹鼻中又方出聖惠方用蒼耳莖葉搗絞取汁每服一小盞頻服又方出千金方飲小薊汁良一方用根生搗汁飲止鼻紅水出肘後方上調決明子貼腦心黃耆芍藥湯出試效方治衄血多歲面黃眼澀多眵手麻木黃耆三兩炙甘草三兩升麻一兩葛根半兩羌活半兩芍藥一兩上㕮咀每服三錢水二盞煎至一盞去滓溫服之十五服而愈六脈細弦而澀按之空虛面色必白而兼不澤者脫血也此大寒證以辛溫補血益血以甘溫甘熱滑潤之劑以佐之則愈此亡血亦傷精氣七蒸方出朱氏集驗方治鼻衄鹿茸七兩分七處蒸酸棗仁半兩去殼石蓮肉半兩去心白茯苓一兩菟絲子一兩淨洗肉蓯蓉一兩益智仁一兩去殼北茴香半兩青鹽拌勻上將鹿茸切片分作七味用碗七隻各蒸一味以好酒一升每處用藥一味同浸一宿連碗排飯上蒸飯熟取出為度和勻焙乾為末以山藥十兩煮糊為丸如梧桐子大硃砂為衣每服五十丸至一百丸棗湯下獨聖散出朱氏集驗方治鼻衄用鏡面草又名螺靨草水洗擂爛入酒濾去滓取汁服枯骨丸出指南方治吐血衄血烏賊魚骨䕡茹等分上為細末雀卵和丸小豆大每服五丸鮑魚汁下阿膠散出指南方治陰虛衄血黃耆白朮桔梗甘草山藥阿膠各等分上為粗末每服五錢水二盞取一盞去滓服剪金散出指南方治鼻衄上剪金花連莖葉不以多少陰乾用濃煎汁溫服立效治衄血四方出十便良方一吃生蔥四五莖碎去大頭一個於醋中時時啜之一滴水於硬地上磨大蒜作泥膏隨左右貼腳心立止仍以冷水使洗令淨一緊紙實塞耳中此方取法於酒注也一搗諸葛菜或水蘇或蘿蔔菜取汁吃一盞治鼻衄出本草用粟米粉水煮服之鼻衄方出本草以桔梗為末水服方寸匕日四五亦治吐下血治鼻紅出本草以白茅香花塞鼻中治鼻衄出本草以珊瑚末吹鼻中止衄出本草用萆麻葉油塗炙熱尉囟上治鼻衄出本草以金瘡小草葉挼碎敷之又風化石灰杵為丸日乾臨時刮敷山根上治鼻衄出本草上取壁錢蟲汁點鼻中乃壁結網蜘蛛如錢圓者是也又方出旅舍備要方治鼻衄上取青蒿塞鼻中即止治鼻紅吐血淋疾出本草上以船底苔並炙甘草鼓汁濃煎湯旋呷治鼻衄出血數升不知人事上以石榴花與柏葉等分為末吹鼻中鼻血不止附論夫營氣之行常與衛氣相隨則氣與血未嘗相離肝藏血肺主氣營衛和平則氣血順次若人腑臟有熱侵乘血氣血性得熱流溢妄行而肺開竅於鼻故其發於鼻為衄鼻衄不止者臟虛血盛故也內經云脾移熱於肝則為驚衄蓋脾土也肝木也今脾移熱於肝則木不能剋土肝藏血其神魂悸故致衄血之病方雞蘇飲出聖濟總録治衄血不止雞蘇白茯苓去黑皮射干各一兩半白芷桔梗炒天門冬去心焙當歸切焙大黃銼炒甘草炙各一兩桂去粗皮半兩上㕮咀每服二錢以水一盞生薑三片煎取六分去滓空腹溫服紫參湯出聖濟總録治鼻衄不止紫參蒲黃生地黃各二兩黃芩去黑心赤茯苓去黑皮赤芍藥當歸焙各二兩甘草炙一兩半上銼如麻豆大每服三錢水一盞入阿膠二片炙令燥同煎至七分去滓溫服不拘時候刺薊湯出聖濟總録治鼻衄不止刺薊黃芩銼炒赤芍藥各三分大黃銼炒蒲黃二兩側柏葉四兩生乾地黃焙甘草炙銼各五兩上為粗末搗篩每服三錢水一盞煎至七分去滓溫服刺薊湯出聖惠方治鼻衄血出經日不止刺薊苦參黃連去須梔子仁生乾地黃川大黃銼碎微炒側柏葉各一兩上為散每服五錢水一大盞入青竹茹半雞子大煎至五分去滓溫頻服茜根散出聖惠方治鼻衄日夜不止面無顏色昏悶生乾地黃半兩赤芍藥三分柏葉一兩阿膠半兩杵碎炒黃燥當歸半兩赤茯苓三分上為細散每服煎黃耆湯調下二錢蒲槐散出聖濟總録治鼻衄不止蒲黃槐花各半兩防己人參各一分上搗研為散每服一錢新汲水調下食後服子芩散出聖惠方治鼻衄不止子芩一兩蒲黃伏龍肝青竹茹各三分上為散每服三錢水一盞煎至六分去滓入生藕汁一合攪勻溫服地黃丸出千金方治鼻出血不止乾地黃梔子甘草等分上治下篩酒服方寸匕日三如鼻疼者加豉一合鼻有風熱者以蔥汁和丸如梧桐子大服五丸麝香散出醫方大成治鼻衄不止白礬枯過另研半兩麝香另研半兩白龍骨黏舌者另研半兩上研令勻每用一字先用冷水淨洗拭去鼻內血洟然後吹藥於鼻中或以軟紙濕過蘸藥鼻內尤妙麝香散出聖濟總録治鼻血不止麝香二錢滑石末人中白各半兩上同研為散每服二錢熱酒調下一方有銀硃無滑石每用少許鼻搐之立效厚朴丸出聖濟總録治鼻衄不止厚朴去粗皮瓦礫並沙薑糞堆瓜苗心上等分搗羅為末蜜為丸如雞頭大每服三丸蔥一握細切面一匙鹽半錢同炒黃沸湯點下天竺黃散出聖濟總録治鼻衄不止天竺黃芎藭各一兩防己半兩上搗研為散每服一錢新汲水調下肺損吐血者用藥二錢匕生面一錢匕水調下並食後服千針散出聖濟總録治鼻衄不止刺薊木賊各一分白麵一錢上為散每服一錢研青蒿心七枚新水調下並二服五苓散出如宜方治夏月伏暑鼻衄不止澤瀉二兩半肉桂一兩白朮豬苓赤茯苓各一兩半上為末同百草霜末茅根煎湯下又方出聖惠方生地黃汁一升白蜜半兩蒲黃二兩上相和微暖過每服一小盞頻服之三汁飲出聖惠方治鼻中血出不斷心欲悶絶刺薊汁二合生地黃汁一合生薑汁半合上調和令勻徐徐飲之仍將滓塞鼻中生葛散出濟生方治鼻衄不止生葛根小薊根各半斤上洗淨搗取汁每服一盞燙溫服不拘時候又方出朱氏集驗方治鼻衄不止生蒲黃半錢青黛半錢上用生藕汁作一服調下一方用井花水調下又方出海上名方黃藥子蒲黃上等分為細末每服二錢新汲水調下玉粉散出聖惠方治鼻衄日夜不止頭痛心煩石膏研牡蠣旁研令極細如粉各一兩上研勻為散每服二錢新汲水調下候血滴間斷時再以水調藥如稀糊滴鼻中雞蘇散出聖濟總録治鼻衄不止雞蘇二兩防風去叉一兩上為散每服二錢溫水調下更以雞蘇葉於新水內揉軟內鼻竅即止二花散出聖濟總録治鼻衄不止酸石榴花一分黃蜀葵花一錢上為散每服一錢水一盞煎至六分不拘時候溫服車前散出聖濟總録治鼻衄不止欲死車前子末牛耳中垢等分上和成梃子塞鼻中立止柳枝散出聖濟總録治鼻衄不止人參一分寒食楊柳枝門旁插者是也上為散每服一錢新汲水調下並二服參蓮散出聖濟總録治鼻衄不止人參一錢蓮子心一錢上為散每服一錢新汲水調下通神散出聖惠方一名伏龍肝散治衄血不止心神悶亂頭旋欲倒亂髮燒灰伏龍肝等分上研為散每服三錢新汲水調下蝸牛散出聖濟總録治血熱沖肺鼻衄不止蝸牛煿幹一分烏賊魚骨半錢上搗研為散含水一口搐一字入鼻內吹鼻散出聖濟總録治鼻衄血不止茅草十莖亂髮一小團上燒為末研勻每以少許吹鼻內又方出聖惠方羊脛炭皮二兩搗碎醋拌燒令通赤故紙三十張多年者燒灰上研細為散以新汲水調下三錢龍骨散出聖惠方治鼻衄不止眩冒欲死吹鼻龍骨半兩亂髮一雞子大燒為灰上研如粉以少許吹入鼻中立止山梔散出朱氏集驗方治鼻衄不止昏悶欲死上用山梔子不拘多少燒為細末每用少許吹入鼻中立止一方用竹刀破作兩邊一邊用濕紙裹煨令熟一邊生用同研為末酒調服一方曾服燒煉藥方致鼻血者生用煎湯解之蔡子涯云同官無錫監酒趙庇兄衄血甚已死入殮血尚未止一道人過其門聞其家哭詢問其由道人云是曾服丹或燒煉藥豫有藥用之即活囊間出藥半錢匕吹入鼻中止良久得活萊蔔飲出危氏方治鼻衄不止上用蘿蔔不拘多少搗取自然汁每服一盞入鹽少許冷服不拘時候或滴汁少許入鼻中用藕汁亦可一方無灰酒服扎指方出濟生方治鼻衄不止上用線緊扎中指中節如左鼻出血扎左手中指中節右鼻出血扎右手中指中節兩鼻出血左右俱扎之治鼻衄不止上用滑石白帶青色者為末和米飲服之又白茅花無花以根煎湯咽蘇合香丸雞蘇丸男女皆可服又方出海上方用蘆花燒灰吹少許入鼻內即止栗灰散出聖濟總録治鼻衄不止上用宣和大栗子七枚逐一微剝破連皮燒存性碗蓋候冷入麝香少許同研每服二錢溫水調下黃藥散出肘後方治鼻衄不止上用黃藥子一兩為散每服二錢煎阿膠湯調下良久以新汲水調生面一匙投之法紙散出聖濟總録治鼻衄血出不止上病人衄血時以紙接血候滴滿紙將紙在燈上燒作灰每一張作一服新汲水調下不得令病人知燈心散出聖濟總録治鼻衄不止上用燈心一兩焙搗羅為散入丹砂一錢研每服二錢用米飲調下當歸散出聖濟總録治鼻衄不止上用當歸切焙搗羅為散每服一錢米飲調下大蒜貼足方一名一金散出肘後方治鼻衄不止諸藥不驗上用大蒜一枚去皮研細攤作餅子如錢大厚一寸許若左竅出血貼於左腳心下線系定右竅即貼右腳心兩竅俱出即俱貼之血止即以溫水洗腳心令去蒜氣一方以摩手心亦可治鼻衄不止出聖濟總録上用玄明粉以冷熱水調臨臥服二錢瘥又方出聖惠方上用楮葉搗絞取汁一二升漸漸溫飲之即止如未止再服治鼻衄不止欲絶者出經效良方上以茅花無用根每服一大把細銼水兩碗煎濃至一碗分二服一方用黃茅根為末米泔水調下又方出本草上用萱草根洗淨研汁一大盞生薑汁半盞相和時時細呷治鼻衄不止胸中痞悶出聖惠方上以生水蘇即雞蘇五合香豉二合合杵研搓如棗核大內鼻獨聖散出肘後方治鼻衄不止服藥不應上用糯米微炒黃為末每服二錢新汲水調下治鼻血出不止出肘後方上以醋和糊粉半棗許服治鼻衄久不止出聖濟總録上以定州白瓷細搗研為末每抄一剜耳許入鼻內立止治鼻衄連日夜不止眩冒欲死灌鼻方出聖惠方上用青葙草不限多少細銼搗絞取汁一兩合少灌入鼻中即止又方出聖惠方用生薑研汁滴入鼻中立止治鼻衄屢醫不止出聖惠方上用栗殼五兩燒灰研為末每服二錢以粥飲調服神白散出楊氏家藏治鼻衄不止蛤粉一兩研羅五七次槐花半兩炒令焦研為末上研令極勻細每服一錢新汲水調下小兒只用半錢兼治便血不止不拘時候寸金散出衛生家寶治鼻衄不止石州黃藥子半兩土馬鬃牆上有者是甘草生各一分上為細末每服二錢新汲水調下未止再服立止治鼻衄不止或素有熱而暴作諸藥無效者出試效方以白紙一張作八牒或十牒於極冷水內濕紙置頂中濕尉頭尉至一重或二重紙干立止治鼻衄出血數升不知人用生茅根取汁每服一合立止又方用艾灰吹鼻中治鼻衄不止但服洗心散立效治鼻血不止用龍鱗薜荔研水飲之大薜荔亦可
