body:
  text: 卷一百九十三水病門濕腫附論夫腎主水脾胃俱主土土性剋水脾與胃合相為表裡胃為水穀之海今胃虛不能傳化水氣滲於經絡浸漬臟腑脾得水濕之氣加之則病脾病則不能治水故水氣獨歸於腎三焦不瀉經脈閉塞故水氣溢於皮膚而令腫也方除濕丹出經驗良方治腰腳腫足脛浮腫筋脈拘攣便尿不利目赤瘡疥癰疽發背走注腳氣疥癬惡瘡並皆治之澤瀉檳榔乳香另研威靈仙赤芍藥大戟水煮甘遂水煮各一兩陳皮青皮沒藥另研黑牽牛頭末各半兩上為末麵糊為丸小豆大溫湯下三十丸葶藶丸御藥院方治脾胃受濕流於四肢足脛浮腫小便澀少苦葶藶微炒研黑牽牛生取頭末白朮各半兩郁李仁去皮研赤茯苓去皮心桑白皮各三分漢防己川羌活澤瀉各三兩陳皮湯浸去白焙乾各二分上為末用棗肉和為丸如梧桐子大每服五十丸溫酒送下不拘時聖靈丹出衛生寶鑑治脾肺有濕喘滿腫盛小便赤澀苦葶藶四兩炒木香檳榔茯苓麵裹煨防己木通人參各二錢半上為細末同棗肉為丸如梧桐子大煎桑白皮湯下大半夏湯出危氏方治脾土受濕不能制水水漬於腸胃溢於皮膚漉漉有聲怔忡喘息名曰水脹半夏浸洗陳皮茯苓桔梗檳榔甘草各等分上為散每服三錢水一盞半生薑三片煎溫服濕腫胃氣有本至元戊寅五月間積雨淋淫魯齋許仲平先生時年五十有八歲面目肢體浮腫大便溏多腹脹腸鳴時痛飲食減少命豫治之脈弦細而緩魯齋曰年壯時曾多服牽牛大黃藥面目四肢有浮腫今因陰雨故大發豫曰營運之氣出於中焦者胃也胃氣弱不能布散水穀之氣榮養臟腑經絡皮毛故濕氣行澀而為腫大便溏多腹腫腸鳴皆濕氣勝也四時五臟皆以胃氣為本五臟有胃氣則和平而安若胃氣虛不能運動滋養五臟則五臟脈不和平若向來氣盛者其脈獨見輕若病太甚則心死故經曰真臟之脈弦無胃氣則死君之疾幸而未至於甚尚可調補人知多服牽牛大黃為一時之快不知其為終身之害也遂以平胃散加白朮茯苓草豆蔻仁數服而溏瀉腸鳴腹痛皆愈飯食進至如常其肢體浮腫以導滯通經湯主之良愈導滯通經湯專治脾濕有餘胃氣不宣通面目手足浮腫陳皮一兩桑白皮一兩木香五分茯苓五分上㕮咀每服五錢水二盞煎至一盞去滓食前溫服牽牛丸專治一切濕熱腫滿等病黑牽牛黃芩大黃大椒滑石各等分上為末酒煮麵糊為丸如梧桐子大每服五丸至七丸生薑湯下食後服量虛實加減用之海金砂散專治脾濕太過通身洪腫喘不得臥及腹脹如鼓牽牛一兩半半生半熟甘遂半兩白朮一兩海金砂三分上為末每服二錢煎清水一盞調下食前服得利止後服一方不用白朮赤茯苓丸專治脾濕太過四肢腫滿腹脹喘逆氣不宣通小便赤澀葶藶四兩防己二兩赤茯苓一兩木香半兩上為末棗肉為丸如梧桐子大每服三十丸煎桑皮湯下食前服牽牛湯專治腹中有濕氣足脛微腫中滿氣急咳嗽喘息小便不利黑牽牛頭末一兩厚朴薑製半兩上為末每服二錢煎薑湯調下或臨時水丸如梧桐子大薑棗湯下三十丸防己湯出鮑氏方治濕氣浮腫防己四兩白朮三兩甘草二兩上為末每服三錢薑三片棗一枚水煎服治脾虛受濕發腫一切虛腫皆治出朱氏集驗方大附子大者十枚去皮破四塊用赤小豆半升藏附子於中慢火煮附子透熟後去豆將附子焙乾上為末用薏苡仁粉煮糊為丸如梧桐子大每服百十丸空心冬瓜湯下或蘿蔔湯下治水癊病者出本草以獺毛皮作褥履著之並煮汁服治水癊出本草取蔥根白皮煮汁服之一盞當下如病未已再取根搗碎吸取其氣水自下下濕丸出本草以蜆糟水煮服之良去陰一水出本草以烏臼子油服一合令大利治水毒中人一名溪毒一名中濕一名水病似射工而無物出本草以小蒜三升㕮咀於湯中煮莫令大熟大熟即無力捩去滓適寒溫以浴若身體發赤斑紋者即是治濕水出本草以駁驢尿絞汁一服五合良燥水者畫體成字者為燥水用牝驢尿不成字者為濕水用駁驢尿猝浮腫附論夫身面卒浮腫者亦水病之候也此由腎脾虛弱之所為也腎主於水今腎虛故水妄行脾主於土脾虛不能制水故水流散入皮膚令身面卒然浮腫也方澤瀉湯療寒熱當風飲多暴腫身如裂脈浮數者澤瀉三兩炒知母二兩海藻二兩丹參三兩秦艽二兩木防己二兩豬苓二兩去皮大黃三兩通草二兩青木香二兩上切以水九升煮取三升分三服忌酢物柴胡湯出聖惠方治頭面身體猝浮腫喘促柴胡三分銼川芒硝二兩上為散每服四錢水一盞煎至六分去滓溫服日三四服鯉魚湯出聖惠方治卒身面浮腫大腸澀大便難上氣喘促鯉魚二斤洗去鱗腸令淨赤茯苓一兩澤漆一兩杏仁半兩湯浸去皮尖雙仁桑白皮二兩銼紫蘇莖葉一兩上為細末先以水五升煮魚取汁三升去滓魚內藥煮取二升去滓每服於食前溫服一中盞其魚亦宜食之商陸飲子出聖惠方治卒身面浮腫腹大小便不利喘息稍急商陸柳樹根嫩桑枝各一兩大麻子三兩搗碎桂心一兩上為散每服半兩水一大盞煎至五分去滓空心溫服如人行五里大小便當利未利晚再服之甜葶藶丸出聖惠方治卒身面四肢浮腫脅氣脹滿小便不利漢防己海蛤研細椒目微炒川芒硝赤茯苓各一兩甜葶藶二兩隔紙炒紫色上為末和煉蜜杵三二百杵為丸如梧桐子大每服以後四味湯下三十丸日三服下丸藥湯方出聖惠方木通一兩銼桑根白皮一兩銼百合一兩郁李仁半兩湯浸去皮微炒上為散每服三錢水一大盞煎至六分去滓下前丸藥又方出聖惠方治頭面四肢卒浮腫大小便澀及前陰腎腫甜葶藶二兩隔紙炒令紫色牽牛子微炒海藻洗去鹹味焙豬苓去黑皮澤瀉各三兩昆布二兩洗去鹹味焙上為細末煉蜜和搗三二百杵丸如梧桐子大每服二十丸煎大麻子湯下日三服赤茯苓湯出聖惠方治頭面身體卒浮腫赤茯苓一兩枳殼一兩微炒陳橘皮半兩湯浸去白焙甘草半兩炒多銼牽牛子二兩微炒上為散每服五錢水一盞煎至五分溫服日三四服甜葶藶丸治頭面四肢卒浮腫小便澀及前陰腎腫甜葶藶二兩隔紙炒令紫色海蛤一兩細研川大黃三兩銼碎微炒甘草二兩煨令黃焙杏仁一兩半湯浸去皮尖雙仁麩炒黃上為細末棗肉和丸如梧桐子大每服二十丸空心煎木瓜通草湯下以利為度甘遂麻黃散出聖惠方治卒身面目腫喘急氣促大小便赤澀甘遂一兩煨微黃麻黃二兩去根節桑根白皮一兩半銼上為細末每服煮赤小豆汁調下二錢日再服以利為度治卒身面浮腫腹脹大小便不利喘息方出聖惠方赤小豆一升椒蔥十莖細切硝石一兩上以水五升並蔥同煮令豆熟候水乾於砂盆中入硝石研膏每日空腹以暖酒下半匙葶藶丸出聖惠方治卒身面浮腫上氣喘促甜葶藶半兩隔紙炒紫色搗爛如膏漢防己一兩末杏仁半兩湯浸去皮尖雙仁生搗如泥上件藥和勻入棗肉和搗三二百杵丸如梧桐子大每服煎橘皮湯下三十丸日三四服甘遂丸出聖惠方治卒身面浮腫上氣喘促甘遂半兩煨令微黃蒜瓣半兩煨熟研黑豆半兩炒熟上件藥除蒜外搗為細末蒜並棗肉和丸如梧桐子大每服木通湯下十丸日二服又方療身體暴腫滿榆皮搗屑隨多少雜米上令和作粥食小便利則痊甘遂方出肘後方治卒腫滿身面背洪腫大小便澀用甘遂一分粉之豬腎一枚分切為臠入甘遂於中以火炙之令熟分二次食如人行四五里當覺腹鳴小便利治卒腫滿身面皆腫出肘後方用芫花菟絲子各一升酒五升浸二三宿每服一升日二服療卒腫滿身面背洪大出肘後方用大鯉魚一頭以醇苦酒二升煮之令苦酒盡訖乃食魚勿用酢及鹽豉不可同他物雜食也一服未愈再作愈又方出肘後方用車下李樹中仁十枚研令細粳米三合研令破內四升水中煮作粥令得一二升服之日三如未消則更增數枚療猝患腫滿曾有人忽腳趺腫漸上至膝足不得踐地諸療不瘥以葫蘆葉埋熱炭灰中令極熱以敷腫上冷又易一日夜消又方出肘後方治卒身面腫滿皆洪大用大豆一斗煮熟漉飲汁及食豆不過數度必愈小豆尤佳又方出肘後方取雞子黃白相合和塗腫處干復塗之又方出肘後方用杏葉銼煮取令濃及熱漬之亦可服治身體頭面忽有暴腫處如吹者出千金方以巴豆三十粒連皮研碎用水五升煮取三升去滓以綿點抵上腫處即消勿近目及陰又勿近口又方以生參薄切之貼頭上核佳又方以磁石為末醋和敷之又方以甘蕉根搗爛塗患處蕉子不中食治卒心腹水病浮氣水腫用胡燕卵中黃頓吞十枚即瘥治卒腫身面皆洪大方出肘後方商陸根一斤刮去皮薄切之煮令爛去滓內羊肉一斤下蔥頭鹽如食法隨意食腫瘥後亦宜作此亦可常搗商陸與米作餅子食之又方出肘後方切商陸一升以酒三升漬三宿服五合至一升日三服之凡此滿或是虛氣或是水飲氣化此方皆治之又方出肘後方防葵末溫酒服一兩或多至二三服身潤又治小不仁亦效治卒腫滿身面皆浮出本草以大生豬肝一具細切煮熟頓食之勿與鹽乃可用苦酒妙膜外氣附論聖濟總録論曰諸家方書論水病甚詳未嘗有言膜外氣者唐天寶間有徒郁子者始著膜外氣方方書本末完具自成一家今並編之然究其義本於肺受寒邪傳之於腎腎氣虛弱脾土又衰不能制水使水濕散溢於肌膚之間氣攻於腹膜之外故謂之膜外氣其病令人虛脹四肢腫滿按之沒指是也徒郁子之論病本云膜外氣者或謂水氣者起於他疾不可常定或因瘧或因腎藏中風或因肺腑傷冷或因膈上氣或因沖熱遠行或因酒肉中所得始於肺終於腎或因咳嗽或多涕唾或因蓄聚冷氣壅塞不散遂使肺藏熱氣攻心或因腎臟冷氣不能化水流入膀胱病在大腸膜外所以切脈不能知針灸不能及蓋人腎為命本不可虛也本固即葉茂本虛即易枯況四時衰旺皆承腎藏之氣腎損則五臟皆衰以致胃弱而脾不磨氣結而小便澀輕重之候在大小便耳若小便不通則氣壅攻系腹內衝出膜外化而為水使人手足頭面浮腫若大小便微澀則微腫極澀則極腫大小便俱不通三日即遍身洪腫至重則陰亦腫夫陰腫有二有腫而小便自出者有腫而小便極澀者又有莖頭連小腹臍皆腫者此病為死候若患此疾腫亦不常定或先手足面目浮腫或先腰肋微腫或先手足之腫其候或消或甚三五日稍愈或三五日再發亦以小便通澀為候積漸變成洪腫婦人得之與此略同凡患此疾令人腹脹煩悶胸間氣急此由肺脹甚即喘如牛吼坐臥行立不得或中夜後氣攻胸心腫者一年二年方死有一月兩月死者若將息失度誤食毒物十日五日即甚也愚醫多以針灸出水為功又以鯉魚赤小豆為藥又令病人飲黃牛尿服商陸根反有所損少有瘥者大抵此病尤忌針灸華他云患水病未遇良醫者不得針灸言氣在膜外已化為水水出即引出腹中氣水盡則死扁鵲云水病在膜外常藥不可療惟神針良藥可也有此疾者宜向陽行坐遇陰雨則愈覺壅滯房中常須存火服後夜臥覺胸間熱甚宜含紅雪與好茶之類慎勿飲酒及冷茶水若渴宜吃五靈脂湯方録在卷後尤忌鹽生冷醋滑方防己湯出聖濟總録治膜外氣水病不限年月深淺洪腫大喘防己大戟木香赤茯苓去黑皮海藻洗犀角屑胡椒白朮葶藶防風去蘆木通桑根白皮紫蘇陳橘皮炙牽牛子訶黎勒去核郁李仁白檳榔各一兩大黃二兩麝香少許湯成下不用研上等分惟大黃一味倍用並須新藥銼稱為二劑以水三升宿浸明日五更用鐺內火煎減去一升絞取飲可分三盞平旦空心服一盞如人行五里更服一盞又如人行五里更服一盞至第三盞即微利三兩行若腹中實者至日午即轉瀉下宜用盆盛驗之必有惡濁黃水或惡濁青黑物出三五升並氣化為之瀉若不甚困慎勿止之必自住若覺力乏即以常服漿粥補之後隔三五日更服一劑則還依此法服之按徒郁子先生云服第一劑則病減半至第二劑則去根本前後歷試絶重者朝服一劑而暮已瘥根本深者服藥當日腫消能起但覺小腹內有塊結則須後劑去之其藥滓慎勿拋棄布囊盛懸於風中他日或覺微有發動則更煎藥滓可更治兩人徒郁子先生云家有此藥滓懸於戶上一家中不患疫氣此飲不獨治水氣凡是氣病皆治之若患肺氣不限年月深淺於此藥二十味中減去大黃及訶黎勒加貝母人參以童子小便煎每日空心服之當去病根有患肺氣困重者因逢患水氣人服此藥偶當永瘥有人一生患腳氣時時衝心服此飲亦除根本以此推之但是氣病皆治不獨治水氣而已産婦及娠婦服之亦無妨小兒及老者隨意加減瘥後宜服順氣丸順氣丸出聖濟總録治水氣防己一兩半大黃二兩半犀角鎊訶黎勒皮牽牛子赤茯苓去黑皮葶藶炒海蛤芎藭乾地黃炒木通銼大戟桑根白皮銼微炒陳橘皮去白防風去須郁李仁去皮木香各一兩上搗羅為末煉蜜為丸如梧桐子大每服十丸空腹米飲下覺壅不快則加至十五丸覺通則減至三五丸大小便不通即加至三十丸此藥不獨治水氣其功與前飲相類若患水氣人服前飲後腫消便服此順氣丸氣順血滑體氣輕健即止患腳氣人長合此藥將行備急服前飲差百日內即宜服五靈湯五靈湯出聖濟總録治水氣訶黎勒皮木通銼赤茯苓去黑皮防己銼陳橘皮湯浸去白焙各一兩上粗搗篩每服五錢水一盞半煎至一盞去滓渴即飲之覺熱即吃好茶一方無訶黎勒皮有葶藶隔紙炒十水丸出聖濟總録治膜外水氣身腫藁本去苗土澤漆微炒大戟微炒連翹葶藶紙上炒甘遂微炒芫花醋浸炒黑桑根白皮炙銼赤小豆微炒各三分巴豆去皮心膜麩炒去油盡一兩上為末煉蜜丸如小豆大每服五丸空心米飲下不利加至十丸澤漆丸出聖濟總録治膜外水腫澤漆微炒一兩水銀煉葶藶紙上炒大戟微炒銼郁李仁湯浸去皮炒枳殼去瓤麩炒各一兩半甘遂椒目炒各一兩上為末煉蜜為丸如小豆大每服十丸空腹米飲下未利加至十五丸牛李子丸出聖濟總録治膜外水氣牛李子炒吳茱萸水浸一宿炒乾青橘皮去白炒各半兩杏仁湯浸去皮尖雙仁炒半兩葶藶紙上炒少許牽牛微炒半兩上為末用水蒸餅子為丸如小豆大每服三十丸夜後煎橘皮湯下轉為度白牽牛散出聖濟總録治膜外氣白牽牛炒青橘皮去白焙炒木通銼各一兩上為末每服一錢匕煎生商陸湯下大便黃水為度忌鹽一百日甘遂餅出聖濟總録治膜外水氣甘遂大麥面各半兩上為末以水和作餅子燒熟熱食之如不利以熟飲投之如利以冷水洗手面即止一方治十種水氣為末空心以蔥白煎湯調服之治膜外氣及氣塊方上以延胡索不限多少為末豬胰一具切作塊作炙熟蘸藥末食之水氣心腹鼓脹附論夫水氣心腹鼓脹者由脾腎二臟俱虛故也脾主於土腎主於水土能剋水今脾胃虛弱不能制水使水氣停聚在於腹內故心腹鼓脹也薑蔻散出直指方治胸滿腹脹大瀉不止時或乾嘔人參川厚朴制草果仁良薑訶子炒川白薑各一分南木香一分半丁香皮蒼朮炒真橘紅甘草炒各一分肉豆蔻炒縮砂仁茯苓各一分半藿香一分上銼散每服三錢水煎食前服仍以木香縮砂煎湯濃調正料參苓白朮散佐之炮腎散出聖濟總録治水氣腫滿巴戟天去心麩炒黑甘遂炒各一分檳榔一枚生用一枚炒用木香葶藶紙上炒各一分大麥糵芫花醋浸炒黃色陳橘皮去白炒各半兩膩粉一分沉香銼澤瀉各一分上為散每服二錢用豬腰子一隻以竹刀子割開去筋膜作三片摻藥末在內用濕紙裹慢火煨令香熟先煮蔥白三莖令熟細切將蔥白與粟米同煮粥一碗先食粥一半方食腰子藥後再食粥令盡臨臥服如至五更大小便並下赤黃惡物乃驗檳榔丸出聖惠方治水氣心腹鼓脹四肢羸瘦喘息促急食飲漸減小便澀少臍下妨悶檳榔一兩海蛤一兩細研桂心半兩訶黎勒皮一兩木香一兩漢防己桑根白皮銼郁李仁各一兩湯浸去皮炒旋覆花半兩上為末煉蜜和丸搗三二百杵丸如梧桐子大每服三十丸煎木通湯下日三服檳榔散出聖惠方治水氣腫滿檳榔二枚生郁李仁去皮尖炒芫花炒甘遂炒續隨子木通銼各二兩海蛤一錢橘皮去白瓤微焙商陸各一分上為末每服一錢溫酒調下臨臥服至五更取下惡物吳茱萸丸出聖惠方治水氣腹腫脹上氣喘促吳茱萸湯浸七次干微炒甘遂煨令微黃各半兩甜葶藶三兩紙上炒紫色椒目一兩半微去汗檳榔一兩赤茯苓一兩半皂莢一兩去皮塗酥炙黃焦去子上為末煉蜜丸如梧桐子大每日空心及晚食前以粥飲下二十丸以利為度木香丸出聖惠方治水氣心腹鼓脹木香檳榔各半兩硇砂三分細研青橘皮三分湯浸去白吳茱萸半兩湯浸七次焙炒巴豆三枚去皮心研細壓去油上為末以釅醋一大盞熬硇砂巴豆為膏入末相和丸如緑豆大每服五丸煎青橘皮湯下食前服紅丸子出楊氏家寶方治一切飲食不化氣滿膨脹紅丸子三百粒巴豆二十粒去殼微炒取巴豆變為度上為末蜜和丸小豆大用橘皮湯送下十丸不拘時煎木香湯下尤佳羊桃根散出聖惠方治水氣心腹膨脹大小便澀羊桃根銼桑根白皮銼木通銼大戟銼炒各半斤上為末以水二斗煮五升去滓熬如稀餳每服空心一茶匙得大小便一時通利三兩行為效宜吃漿水粥補之甘遂散出聖惠方治水氣心腹鼓脹上氣喘促甘遂煨令微黃檳榔各半分牛蒡子微炒商陸各一分上為細末每服用豬肉一斤切作四五片摻藥半錢用濕紙裹煻火中煨熟空心頓服之微呷酒三二合須臾下利為效奪命丸出聖惠方治水氣腫滿大戟麩炒甘遂炒各一分苦葶藶半兩一半生一半熟用澤瀉一分半上為末煮棗肉和丸如梧桐子大若四肢腫者名為順水溫漿水下三丸星月上時服至天曉利下惡物若四肢瘦腹腫者名為逆水煎苦葫蘆子陳曲湯下三丸小便頻快是效三日後服補藥礬石丸礬石丸出聖濟總録治水病補藥白礬半兩雄黃研丹砂研各一分上為末粟米飯和丸緑豆大丹砂為衣每服五丸至七丸食前生薑湯下日二治腹腫大腹陳皮一兩巴豆十粒炒青皮一兩去瓤甘遂三錢同炒上為散帶濕同炒去巴豆甘遂只以二皮為末卻用蘿蔔子煎湯候冷臨臥時調服一錢大至中夜再調服半錢大若氣腫則氣泄而散有水則下水有積則下糞明早調四君子湯合胃苓湯補理後宜多服胃苓湯不然再發無法以治再用此藥亦不能取效如欲服胃苓湯可去甘草因與甘遂相反用麥門冬煎湯調下一兩服亦可大戟丸出聖惠方治水氣腫入腹鼓脹惡飲食大戟銼碎研皂莢去皮子炙黃焦烏頭各一兩上為末煉蜜和丸梧桐子大每服空心溫水下五丸當下利一兩行以瘥為度商陸豆方出朱氏集驗方治水氣腫滿生商陸切如麻豆赤小豆各等分鯽魚三枚去腸存鱗上為末將二味實魚腹中以綿縛之水三升緩煮豆爛去魚只取二味空腹食之以魚汁送下甚者過二日再為之不過三劑雞屎醴散出宣明論治鼓脹證主胃病氣逆病有心腹脹滿旦食不能暮食致令胃逆不散大腸不時痞滿大黃桃仁雞屎醴乾者各等分上為末每服一錢生薑三片煎湯調下食後臨臥服治水鼓腹脹生大豆桑柴灰汁上煮服下水莨菪丸出千金方治水氣腫鼓脹小便不利莨菪一升羊肺一具青羊佳湯炮肺即薄切之干搗作末上以三年大酢漬莨菪一伏時出之熬令變色熟搗如泥肺末與藥和蜜搗為丸如梧桐子大食後一食久以麥門冬煎水飲服四丸日三以喉中干口黏妄言為候數日小便大利佳連山療韋司業侄云前所送下數用神效麥門冬飲法出千金方麥門冬二十五個去心米二十五粒上以水一大合入二味煮之米大熟去滓以飲服丸每服常作蠡魚方療腫滿上用以蠡魚至難死猶蛇性合小豆白煮甚效又方治腹滿不能藥者用煨生薑內舌下治水浮氣腫腹脹滿小便澀少用水牛蹄一隻湯洗去毛作如食法隔夜煮令爛熟取汁作羹將蹄細切空心飽食又主水氣治大腹浮腫小便澀少用水牛尾一條去毛細切作膾蒸之極熟吃之煮食亦佳又牛肉一斤蒸熟以薑醋空心食之又水牛皮煉煮蒸熟細切於豉汁中食之又烏犍牛尿半升空心飲之利小便治腫滿者出肘後方用白椹樹皮一握水二升煮取五合白檳榔大者二枚末之納入更煎三五沸湯成服之治水病肚脹四肢腫用胡瓜俗名黃瓜不破作二片不出子醋煮一半水煮一半俱爛空心頓服須臾下水神化利機丸專治腹脹水氣旦食不能暮食食則脹滿服藥得利則減盡方如故乃陰陽不分致使然也小便赤澀大便結硬熱結於中胃氣不能還濕氣乘虛而入於奇經八脈遍身作腫也治之當利其小便調其榮衛胃氣利則愈矣淋澀癃閉更難尤宜服之出海岱居士祕方澤瀉一兩二分半椒目一兩半昆布海金砂三兩木香半兩茴香五分炒滑石一兩苦葶藶一斤酒浸宿焙乾上件為末用黃柏末水一盞煎成膏子丸如梧桐子大每服五十丸溫酒食前送下橘蒜丸出朱氏集驗方治心腹痞脹用大蒜去皮每一瓣鑽一竅入去殼巴豆一粒用濕紙裹煨熟去豆不用上用蒜搗成膏入紅橘末與蒜膏一味同杵成泥為丸如梧桐子大每服三五十丸米飲薑湯下海上方以陳皮包大蒜膏一味杵成為丸米飲下大腹皮湯出楊氏家藏方治濕熱內甚心腹脹滿水腫小便不利大便滑泄野雞餛飩法出朱氏集驗方治腹腫野雞不問雌雄一隻陳皮茴香炒生薑馬芹子炒川椒炒上用釅醋浸一宿蒸餅和雞肉同作料為餡少著鹽外用麵皮包作餛飩煮熟爛食用又早晨先服嘉禾散食後吃餛飩日中服導氣枳殼丸晚間不用野雞餛飩湯卻用前件料物調和野雞肉食後停息少時服錢氏八味腎氣丸木香丸出指南方治鼓氣木香檳榔陳皮商陸木通各半兩上為末麵糊為丸如梧桐子大每服十丸米飲下治鼓脹嘉禾散四桂散等分上為細末薑棗煎服水氣腳膝浮腫附論夫腎屬於水而主腰腳膝若腎氣虛弱者風濕毒氣所搏則腎氣不足不能宣通水液水液不入於小腸致水氣流溢浸漬皮膚故令腳膝腫浮也腎者陰氣也主於水而又主腰腳腎虛則腰腳血氣不足先從虛而腫也方檳榔散出聖惠方治水氣腳膝浮腫大小便不利上氣喘息檳榔一兩木香桂心各半兩紫蘇莖葉一兩切郁李仁湯浸去皮微炒一兩半赤茯苓去黑皮木通銼陳橘皮湯浸去白焙一兩牽牛子一兩炒上為末每服空心煎桑根白皮湯調下二錢夜臨臥再服郁李仁散出聖惠方治水氣腳膝浮腫上攻於腹心肋妨悶上氣喘促小便不利郁李仁湯浸去皮微炒桑根白皮銼微炒赤茯苓去皮澤漆莖葉漢防己澤瀉銼甘遂煨令微黃陳橘皮湯浸去白瓤焙各一兩上為散每服用豬腎一對切去脂膜大豆半合洗水二大盞煮至一盞去滓入藥二錢更煎至五分去滓五更初服良久當利兩三行如未利再服商陸散出聖惠方治水氣腳膝浮腫上攻腹心妨悶喘促小便不利商陸二兩赤小豆一合木通銼澤瀉赤茯苓生薑一分陳橘皮湯浸去白瓤焙各半兩蔥白三莖上細銼水三盞煎至一盞半去滓食前溫三服大戟散出聖惠方治水氣腳膝腫滿入腹氣喘煩悶小便不利大戟一兩半銼碎微炒木通半兩銼當歸半兩銼碎微炒橘皮三分湯浸去白焙木香半兩上為散每服四錢水一盞煎至六分去滓空心溫服後當利得快利臨臥再服治從腳腫起稍上進者入腹則殺人亦治水腫出肘後方用小豆一斛煮令極爛得四五斗汁溫以漬膝以下日日為之數日消盡若已入腹者不復漬但煮小豆食之莫雜食飯及鮭魚鹽又專飲小豆汁無小豆大豆亦可用如此之病十死一生急救之一方用赤小豆治水病兩足腫者出肘後方用蔥葉及莖煮爛漬之日三五作乃佳治腿腫一月餘用水煎服香蘇飲加檳榔萆薢香附子治肺臟受水子母相生傳之於腎腎水之度受病兩股沉冷腰膝冷重而足浮腫臍腹肋滿往往外腎隨腫肉色黃黑宜服此方吃藥取轉後便吃後方藥以補之出護命方續斷乾薑川芎各半兩半夏椒目各二銖吳茱萸一分牽牛三兩上除牽牛一味自作一處杵為末所餘衆藥只作一處細杵羅為末先以生薑三兩捶碎同赤小豆半升煮爛熟俟干去薑不使杵豆些小為末每服牽牛末二錢衆藥末二錢半豆末二錢面一兩相和作面羹水一碗蔥五根同煮熟空心吃若未轉遂旋吃後方藥卻滴熟水丸如梧桐子大停待數日更取一度取水盡吃硫黃丸治腎臟受水吃藥取轉後宜服此方以補之將此藥對硫黃丸以效為期出護命方巴戟去心山茱萸續斷黃橘皮川芎各半兩通草一分上為末每服二錢生薑兩片以水一盞同煎兩三沸空心熟吃治水病經久五臟之中皆有所受面目四肢手足悉皆浮腫外之證候未明水在何臟但未傷五臟皆可服此藥若唇皮青黑則肝有所傷缺盆平心有所傷腹臍凸者脾有所傷足下平者腎有所傷背平者肺有所傷五臟中內有一臟所傷者更不可吃此藥出護命方乾薑吳茱萸續斷葶藶桔梗半夏官桂去皮羌活各一分椒目三銖檳榔半兩以上自作一處杵為末牽牛二兩自作一處杵為細末上先使生薑一兩捶碎煮赤小豆一盞已來候煮豆子臨熟時先抽豆汁兩盞用一瓶盛之卻煮豆熟焙乾空心將干豆子半盞來用拌飯半碗吃了停待片時卻取初間所抽煮豆汁入蔥五根重煎調前方藥和滓吃其藥每服五錢乾薑等衆藥末二錢牽牛末三錢滾為一服以通轉為度未轉次日仍舊法吃豆飯了再用豆汁下乾薑等末三錢牽牛末四錢為一服和滓吃以轉下水為度治五臟受水吃轉藥下得水後吃此方以補之出護命方桑白皮乾薑吳茱萸巴戟去心焙人參茴香肉蓯蓉去皮芎藭澤瀉銼木香研石庭脂一兩另研細所餘衆藥盡為細末上將石庭脂末與衆藥末相和煉蜜為丸如梧桐子大早朝空心米湯下五十丸須是取水盡後方可吃此藥面目四肢已全退腫即是水盡大腹水腫附論內經言水病下為附腫大腹又曰上下溢於皮膚故為附腫其證腹大四肢小陰下濕手足冷腰痛咳嗽煩疼是也蓋三焦不通水溢皮膚脹急如鼓得病之本多因大病之後或體虛勞損或食畢入水致令水氣不散使然也赤茯苓散出聖惠方治大腹水腫大便澀氣滿悶赤茯苓二兩桂心一兩川大黃二兩銼碎微炒甘草一兩炙微赤銼大腹皮一兩半銼枳殼一兩半麩炒黃細辛一兩前胡一兩去蘆頭桑白皮三兩銼上為散每服五錢水一盞煎至五分去滓溫服日三四服治大腹水腫氣息不通命在旦夕宜服此藥出聖惠方桑根白皮二兩銼昆布一兩洗去鹹味桂心一兩去粗皮牽牛子二兩微炒甜葶藶半兩隔紙微炒紫色椒目一兩微炒上為末煉蜜和搗三二百杵為丸如梧桐子大每服三十丸粥飲下不計時候牛黃丸一名海藻丸出聖惠方治腹大水腫氣息不通並風水皮膚腫滿喘急不能眠臥牛黃二分研桂心去皮牽牛子各八分椒目三分昆布洗去咸炙海藻各十分洗去沙炒葶藶子六分炙紫色上為末別搗葶藶如膏令和丸如梧桐子大粥飲下十丸日三稍加小便利為度崔氏蜜和為丸蜜湯下宣明有麝香龍腦各二分貞觀九年漢陽王患水病醫所不治余用此方日夜尿水三斗五六日即瘥雄黃丸出聖惠方治卒大腹水病雄黃六分麝香三分甘遂芫花人參各二分上搗蜜和丸如豆大每服二丸加至四丸即瘥溫酒送下鯉魚茯苓湯治水腫腹苦滿急妨害飲食凡此滿或是虛氣或是風冷氣或是飲氣鯉魚一頭重五斤者以水二斗煮取一斗去魚茯苓三兩桑白皮切炙澤瀉各五兩上取四物內魚汁中煮取四升去滓分溫服小便當利漸消甘甜丸出經驗良方治水腫腹脹甘遂半兩水煮甜葶藶一兩炒細辛去苗一兩半川椒二兩炒上為末蜜丸如梧桐子大晨朝日午臨臥各用白湯下十五丸防己丸出聖濟總録治大腹水腫口中乾燥此腸間有水防己椒目葶藶炒令紫色大黃銼醋拌炒乾一兩上為末煉蜜為丸如小豆大每服十丸米飲下日三服稍稍增之口中有津則止勿服渴者加芒硝半兩麝香丸出聖濟總録治水氣大腹腫麝香一錢研甘遂炒芫花醋炒各半兩人參一兩上搗羅為末煉蜜為丸如小豆大每服二十丸米飲下葶藶丸出聖惠方治水腫腹苦滿急妨害飲食凡此滿或是虛氣或是風冷氣葶藶七兩椒目三兩茯苓三兩上搗篩蜜和丸如梧桐子大每服十丸日三忌酢物水銀丸出聖濟總録治大腹水腫利小便水銀水煮一日一夜研十兩葶藶炒令紫色椒目各一升上為末煉蜜丸如小豆大每服十丸米飲下日再服一方有芒硝甘草丸出聖惠方治水氣腹腫大甘草炙銼防己葶藶炒令紫色各一兩上為末用酒熬為丸如小豆大每服二十丸至三十丸米飲下蘇合香丸出聖濟總録治大腹水腫利小便蘇合香水銀水煮一復時入白蘞為末各一兩一方作白薇上合研令勻煉蜜為丸如小豆大每服十丸米飲下日三大棗葶藶丸療大腹水病身體腫上氣小便澀赤臍深頸上有兩大脈動涎稠不得眠睡每腫先從腳腫亦有在前頭面腫或大便澀者服此藥大佳若先患大便利臍凸腹大腹脹手掌平滿即不可服此藥大棗四十枚肥不蚛者先以暖水浸令軟以飯甑里蒸方剝去皮核焙葶藶五兩隔紙炒杏仁五兩不取雙仁者以湯浸去皮麩炒令黃色去尖上先搗葶藶子一萬杵傾出之乃搗杏仁三百杵訖總和棗膏合搗一萬杵藥成為丸小豆大平旦空腹服八丸日晚食消更服五丸以飲汁下之三日後每旦服五丸日晚服三丸如大便利不得服此藥若正服藥次忽患痢即先食二三口飯然後吃藥若利過多停藥即可爛煮小豆勿以鹽食之忌咸黏脂膩及大冷熱物等唯得食粳粟米飯及淡醋不得吃稀粥唯只得吃飯佳如欲食粥即病發大戟丸出肘後方治水腫入腹苦滿急妨害飲食凡此滿或是風冷氣或是水飲氣大戟烏翅白朮各二兩上搗篩蜜和丸如梧桐子大旦服二丸當下漸退更服取令消乃止一方無白朮葶藶大丸出三因方治腫滿腹大四肢枯瘦小便澀濁甜葶藶隔紙炒芥菜根等分上為末蜜丸彈子大每服一丸陳皮湯嚼下只三丸小便清數服腹當依舊葶藶散出肘後方治大腹水腫小便澀葶藶炒紫色一兩杏仁二十枚湯浸去皮尖雙仁炒上搗令極爛分為十服每米飲下日二服治療卒大腹水病牽牛子二分熬厚朴一分炙上搗篩強人服三稜角殼弱人二殼酒飲隨意治久水腹肚如鼓者出千金方葶藶蒼耳子灰各二十七粒上水調和服之日二又方出千金方用椒目水洗煮熬搗如膏酒服方寸匕又方出千金方用水煮馬兜鈴服之治大腹水腫諸藥無效宜服此方出聖惠方苦葫蘆二兩微炒上為細末不計時候粥飲調下二錢皂莢酒方出肘後方治水腫入腹苦滿急妨害飲食上皂莢剝去筋皮炙令黃銼三升酒一斗漬入石器煮令沸服一升日三服治卒大腹水病蓋水病之初先自目上腫起如老蠶色頸頭脈動股里冷脛中滿按之沒指腹內轉側有水聲此其候也不即治須臾身體稍腫肚盡脹按之隨手起則病已成猶可為治此皆從虛損大病或下痢後婦人産後飲水不即消三焦受之小便不利乃相結漸漸生聚遂流諸經絡出肘後方用葶藶一升熬搗之臼上割生雄鴨雞合血共頭搗萬杵為丸服如梧桐子大五丸稍加至十丸勿食鹽常食小豆飯飲小豆汁煮食鯉魚佳也又方出肘後方用取柯枝皮銼濃煮煎令可丸服如梧桐子大三丸須臾下之又服一丸當下小水後將服三丸日三服此樹一名木奴商人用作船又方出肘後方用萆麻子熟者二十枚去皮研之水解得之三盞旦服至日中許當吐下諸水水結於裡若不盡三日後更服三十枚猶未盡更作服服後節飲及咸物等又方出肘後方用小豆一升白雞一頭治如食法以水三斗煮熟食飲汁稍稍令盡治水脹腹滿出本草用萆麻子細研水服壯人可五粒又方出肘後方用蛤螻炙令熟日食十個治大腹水病出肘後方用青雄鴨一隻以水五升煮取一升飲盡厚蓋之取汗佳葶藶湯治支飲久不瘥大腹水腫喘促不止大豆散出千金方治久水腫腹肚如鼓者用烏豆一斗熬令香勿令太熟去皮為末篩下餳粥皆食之初服一合稍加之若初服多後即嫌臭服盡更作取瘥不得食肥膩渴則飲羹汁慎酒肉豬雞魚生冷酢滑房室得食漿水粥牛羊兔鹿肉此散大飢渴時食之可忍亦勿食也此病難治雖諸大藥丸散湯膏當時暫瘥過後復發惟服此散瘥後不發終身服之終身不發矣其所禁食物常須少啖莫隨意食鹹物諸雜食等天雄丸出指南方治脾脹天雄枳實橘皮各半兩甘遂一分牽牛酒浸一宿煮令熟即去酒空干再炒取起連皮大腹子一兩酒浸一宿炒乾上為細末酒糊丸如梧桐子大每服十粒生薑湯下神祐丸出儒門事親甘遂依前大戟醋浸煮焙乾芫花醋浸煮各半兩黑牽牛一兩大黃一兩上為末滴水丸如小豆大每服五七十丸臨臥溫水下治卒大腹水病出肘後方以春酒五升浸葶藶子二升隔宿服一合小便當利治支飲久不瘥大腹水腫喘促不止出本草用甜葶藶三兩隔紙炒令紫色搗如膏丸如彈子大每服一丸以水一中盞入棗四枚煎至五分去滓不拘時溫服水氣遍身腫滿附論夫腎主水脾胃俱主土土剋水胃為水穀之海其氣虛不能傳化水氣使水氣浸漬腑臟又脾主水濕之氣土衰不能制之水氣獨歸於腎腎虛三焦不瀉經絡閉塞故水氣溢於皮膚傳流四肢所以通身腫也其候上氣體重小便黃澀腫處按之隨手而起是也款氣丸出聖濟總録治通身腫喘丁香木香沉香白檀桂去皮肉豆蔻去殼檳榔蓽澄茄大戟炒甘遂炒各一分木通一兩續隨子去皮海蛤郁李仁去皮瞿麥甜葶藶炒桑根白皮炙牽牛子各一分膩粉一分淨巴豆慢火炮去出油盡一分上為細末研合白粳米飯為丸如緑豆大每服三丸至五丸煎橘皮湯下豬苓散出千金方治虛腫腫滿通身利三焦通水道豬苓葶藶人參玄參五味子防風澤瀉桂心狼毒椒目白朮乾薑大戟甘遂各二兩蓯蓉二兩半麥曲三合赤小豆二合上粗搗篩酒服方寸匕日三夜一老小一錢匕以小便利為度豬苓散出聖惠方治水氣遍身浮腫宜利三焦通水道豬苓半兩去黑皮赤茯苓半兩甜葶藶半兩隔紙炒紫色五味子半兩川大黃半兩銼微炒大戟半兩銼微炒漢防己半兩陳橘皮半兩去白澤瀉半兩桂心半兩白朮半兩狼毒半兩銼拌炒碎椒目去汗半兩微炒乾薑半兩炮裂銼上為末每於食前以蔥白湯調下二錢得大小便利為度大豆湯出鮑氏方療風水氣舉身腫滿短氣欲絶大豆一大升杏仁一升去皮尖雙仁熬黃耆二兩白朮五兩防風三兩清酒一升木防己四兩茯苓四兩麻黃四兩去節甘草四兩炙生薑六兩上十一味切以水三斗先煮豆取一斗去滓內酒及藥煮取七升分七服自旦服之至夜令盡當下小便忌海藻菘菜桃李雀物大酢等疏鑿飲出醫方集成治水氣通身洪腫喘促氣急煩躁多渴大小便不利服熱藥不得者澤瀉赤小豆炒商陸羌活去蘆大腹皮椒目木通秦艽去蘆檳榔茯苓皮各等分上等分㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候一方無秦艽杏仁丸療水氣身腫脹滿杏仁十枚去皮尖熬蘇子五分白前六分昆布八分洗去咸李根白皮五分橘皮六分五味子六分大麻仁五分熬茯苓八分生薑八分切暴燥上搗篩蜜和丸粥清服二十丸如梧桐子大日再服稍稍加至三十丸赤茯苓散出聖惠方治水氣遍身浮腫按之沒指心腹氣脹大小便澀赤茯苓一兩漢防己一兩川大黃一兩銼微炒檳榔一兩甜葶藶一兩微炒桑白皮一兩銼木通一兩銼郁李仁一兩湯浸去皮炒陳橘皮一兩湯浸去白上為散每服五錢水一盞煎至五分去滓食前溫服以小便通利為效海蛤丸出聖惠方治水氣遍身浮腫上氣喘急小便不通海蛤一兩細研甜葶藶一兩隔紙炒海藻一兩洗去鹹味焙昆布一兩洗去鹹味焙赤茯苓一兩漢防己二兩澤漆一兩桑白皮一兩銼木通二兩銼上為末煉蜜為丸搗三二百杵如梧桐子大每服三十丸粥飲湯下不計時候牽牛散出聖惠方治水氣遍身浮腫氣息喘急小便赤澀牽牛子二兩微炒甜葶藶一兩微炒桑白皮二兩銼微炒檳榔一兩郁李仁湯浸去皮微炒漢防己一兩豬苓一兩去黑皮木通二兩銼上為散每服三錢水一盞生薑半分煎至六分去滓空心溫服如人行十里當利三二行如未利再服澤瀉湯出千金方治水氣通身浮腫四肢無力或從消渴或從黃疸支飲內虛不足榮衛不通氣不流行實於皮膚中喘息下腹中響脹眼不得視澤瀉根十兩鯉魚五斤生薑八分赤小豆二升焙茯苓三兩人參甘草麥門冬各二兩上㕮咀以水一斗七升先煮赤小豆減七升去之納藥煮取四升半一服三合日三人弱服二合日再服氣下喘止不利可加至四合晬時小便利腫氣減或小溏下若小便大利還從一合始大利便止若無鯉魚亦可若水甚不得臥臥不得轉側加澤漆一斤渴加栝蔞根三兩咳嗽加紫菀二兩細辛一兩款冬花一兩桂三兩增魚汁二升胡洽方無小豆麥門冬用澤瀉五兩杏仁一兩古今録驗無小豆治水在五臟令人咳嗽逆喘上氣腹大而響兩腳腫目下有臥蠶狀微濁不得安臥氣奔短氣有傾方復小便難少而數肺病胸滿痛宜利小便水氣迫肺翕然寒熱赤茯苓散出經驗良方治大人小兒水氣腫滿喘咳不止赤茯苓桑白皮貝母各一錢升麻甘草桔梗微炒杏仁甜葶藶炒各半錢上為㕮咀每服三錢水一盞煎六分小兒作三服牛黃通隔丸出經驗良方治大人小兒風痰喘咳積聚諸病水氣浮腫黑牽牛頭末木通大黃各等分上為末滴水丸如麻子大食後溫水下量人大小加減氣喘者桑白皮湯下杏蘇飲出醫方大成治上氣喘嗽面目浮腫治水氣浮腫腹肚脹滿小便澀用精肥狗肉五斤蒸熟空心服食之妙小鱉甲湯專治身體虛脹如微腫胸心痞滿有氣壯熱小腹厚重兩腳弱鱉甲黃芩升麻麻黃羚羊角桂心杏仁各三錢前胡四兩烏梅二十枚薤白三十根上㕮咀以水一斗煮取二升七合分三服此常用者若身體強壯欲須利者加大黃二兩續隨子丸出衛生寶録治通身虛腫喘悶不快人參漢防己赤茯苓面蒸木香半兩檳榔半兩苦葶藶炒四兩續隨子五錢海金砂五錢上為末棗肉和丸如梧桐子大每服二十丸或三十丸煎桑白皮湯食前送下實脾散出衛生寶録治脾元虛浮腫狀如水氣香茯苓散出經驗良方治水氣四肢浮腫腹脅妨悶大便祕澀木香炮赤茯苓各一錢大黃甘草鱉甲炙各二錢黑牽牛三錢頭末上為末溫熱水調下半錢以利為度治通身虛腫烏藥二兩川椒一兩蒔蘿一兩白芷一兩百藥煎三兩上為細末每服二錢用陳米飲調下治一切浮腫水氣出百一選方吳茱萸枳實各半兩赤茯苓白朮各一兩上㕮咀分三服每服水三盞薑一兩碎切煎至一盞去滓作兩服不拘時一日服盡一料忌鹽物昔錢昭遠纍以此藥治人多愈不可以常藥輕易視之又方出直指方治虛腫生緑豆一合研末橘皮二錢良薑一錢銼上橘皮二錢良薑一錢細銼煎湯候冷調緑豆未得所然後略煨連三日空心服治身浮腫用烏豆一升水五升煮取三升汁去滓內酒五升更取三升溫三服不瘥再合服之治四肢浮腫用杜蒺藜不拘多少煎湯洗去腫治人身及頭面上浮腫如蛇狀者以雨滴磚背上苔痕一錢水化開塗蛇頭上立愈治浮腫用委壤堤掃帚破者取汁浴之治浮腫腹滿不下食心悶出肘後方用豬肝一具洗切作臠著蔥白豉薑椒炙熟食之又以熱水煮單食亦得又煮豬腎一雙切作臠著生蒜齏食之一方作羹任意下飯勿與鹽乃可用苦酒妙用肝生食之亦可治患水氣兼身面腫方橘皮五分郁李仁十分茯苓八分甜葶藶六分熬紫色防己桑根白皮各五分甘遂四分熬蘇子四合上搗下篩蜜和丸取谷白皮火炙黃煮飲服十丸如梧桐子大日再若得宣通稍稍常服宣利為度渴者飲此方忌酢物鯉魚湯出聖濟總録治水病通身洪腫鯉魚去淨鱗肚頭一斤澤漆一兩半炒赤茯苓去皮甘草各一兩澤瀉杏仁湯浸去皮尖人參各一兩半上將六味搗篩先用水五升煮魚取汁一升半每服以魚汁一盞入諸藥末三錢匕煎至七分去滓溫服三二日小便利乃止治水氣腫滿方出聖濟總録楮木灰一大斗淋汁用糯米一斗赤小豆一大升桃仁去皮尖二十粒商陸一兩半麥門冬去心一合天門冬去心一合上諸藥以灰汁煮令爛空心服以飽為度飢吃飲食無妨三二日內當利治水氣身浮腫小便不利宜服此方出聖惠方大戟半兩炒海蛤一兩研滑石一兩甘遂一分煨漢防己半兩續隨子一分上為細末每服在日中空心溫蔥湯調下一錢以快為度大麻子散出聖惠方治水氣遍身浮腫大麻子三升碎商陸四兩防風三兩去蘆赤小豆一升附子一兩去皮臍生用桑根白皮三兩銼上件藥以水二斗先煮麻子至一斗入藥並小豆同煮取四升去滓每於食前飲汁一小盞相次任隨性多少食小豆郁李仁丸出聖惠方治水氣遍身浮腫皮膚欲裂心腹氣脹急大小便不利宜服此方郁李仁一兩浸炒去皮陳橘皮一兩浸炒去白甘遂一兩煨黃赤茯苓一兩甜葶藶一兩炒紫色瞿麥一兩上為末煉蜜和搗二三百杵丸如梧桐子大每服空心溫水下十丸良久當利三兩行不利即加五丸再服以利為效木通湯出聖惠方治遍身水腫木通銼苦葫蘆各一兩澤瀉防己各三分豬苓去皮海蛤各一兩研上搗篩每服五錢水七分酒三分入蔥白五寸切煎至八分去滓食前溫服當下小便數升腫消大效葶藶丸出聖濟總録治水氣遍身黃腫葶藶微炒防己陳橘皮湯浸去白焙郁李仁去皮紫蘇子赤茯苓去皮各半兩上為末煉蜜為丸如梧桐子大麝香酒下二十丸日三服以小便利為度白丸子出衛生寶鑑治水氣腫滿氣息喘急小便不利並男子女人虛損積聚及遍身黃腫膩粉半兩粉霜四錢滑石末四錢硇砂寒水石煅炙為末白丁香真者末各三錢重上先將膩粉滑石二味研勻紅紙裹更和白麵作餅子再裹合後用酒濕紙裹二十四重後用桑柴爇火燒以面熟為度取出與前藥四味一處研勻用水浸蒸餅心搦干黏和為丸如豌豆大每服煎生薑水下食前吃第一日三丸日三第二日四丸日三第三日五丸日三第四日六丸日三服後以小便無數取下水為度服四日病未下更加一日如服藥第二日覺口渴時便用後嗽口藥嗽之嗽口齒貫衆湯方出衛生寶鑑方貫衆黃連去須各半兩上搗篩每用一錢匕水一盞煎三兩沸入龍腦少許溫溫嗽之白粥養百日桑白皮湯治水氣兼身面腫桑白皮四兩橘皮二兩海藻二兩洗去咸茯苓去皮郁李仁各四兩碎赤小豆一升上切以水八升煮取二升半分三服療風腫水腫毒氣遍身方治水氣遍身浮腫坐臥不得宜服此方出聖惠方杏仁五兩湯浸去皮尖雙仁研桃仁五兩湯浸去皮尖雙仁研昆布湯洗去咸二兩赤小豆半升郁李仁三兩湯浸去皮研上件藥以水一斗煮諸藥以豆爛為度濾取汁不拘時復暖半中盞服之豆亦漸漸食之小便當利即效吳茱萸丸出千金方治水氣遍身洪腫吳茱萸蓽茇昆布杏仁葶藶各等分上為末煉蜜丸如梧桐子大每服五丸勿令飽食食訖飽悶氣急服之即愈麻子湯出千金方治遍身浮腫麻子五升赤小豆三升商陸一斤附子一兩防風三兩上㕮咀搗麻子令爛以水三斗煮麻子取汁三升去滓內藥及豆煮取四升去滓食豆飲汁送下甘遂丸出聖惠方治水氣遍身腫滿皮肉欲裂心腹內氣脹小便不利飲食不消甘遂一兩葶藶炒二兩半赤茯苓去皮一兩陳橘皮湯浸去白焙郁李仁各三分上四味為末別搗葶藶如脂內散煉蜜為丸如梧桐子大空心飲下七丸旦服如不利稍加之以利為度小消化丸出聖濟總録治水腫病通身微腫腹大飲食不化芫花炒甘遂炒大黃炒銼葶藶隔紙炒黃各一兩巴豆去心皮炒出油盡十粒上為末煉蜜丸小豆大每服飲下三丸稍增至五丸以知為度麻黃湯專治水氣通身腫麻黃去根節二兩半白朮銼碎微炒二兩甘草炙一兩石膏研碎三分赤茯苓去黑皮二兩上粗搗篩每服五錢匕水二盞半棗二枚擘破生薑一棗大拍碎同煎至一盞去滓溫服日三每服後蓋覆令汗出瘥木香丸專治通身洪腫木香肉豆蔻去皮青橘皮去白焙檳榔煨銼各一兩上為細末用棗肉丸如緑豆大每服空心溫酒下二十丸漸加至三十丸治水氣遍身浮腫上氣喘息小便不通桑皮二兩豬苓二兩商陸一兩上為細末以水五大盞入麻仁半兩小豆一合同煮至二盞半去滓為六服二日服盡桑白皮湯專治水腫通身皆腫桑白皮炙黃色銼五兩吳茱萸水浸一宿炒乾二兩甘草炙一兩上㕮咀如麻豆大每服五錢水二盞生薑糖膏一匙煎至一盞去滓溫服日再赤小豆湯專治水腫遍身小便澀腹滿赤小豆微炒一升桑白皮炙銼一兩澤漆莖葉切炒三分上將二味綿裹用水九升與小豆三味同煮熟去裹只留小豆飢則食小豆渴則飲汁以利為度芍藥湯治通身腫其脈沉遲者芍藥銼炒一兩桂去粗皮半兩黃耆銼三分上粗搗每服五錢用米醋一合水一盞半煎至一盞去滓溫服忌食鹽十全湯專治水氣通身洪腫大麻子皆取新脹肥者佳赤小豆不浮者各一石上以新者揀淨以水洗曝乾蒸麻子熟更曝乾貯淨器中欲服取五升麻子熬令黃香宜慢火休焦了為細末以水五升煮取汁盡淨器盛之明旦飲服今夜以小豆一升淘淨水浸至旦濾去水以新水煮豆大半熟即濾出令乾內麻子汁中煮爛為度佳空腹恣食三日腹當小心悶少時即止五日後小便數或赤而唾黏口乾不足為怪服訖微行不可便臥十日後針灸三里絶骨下氣如氣不泄盡再服藥連五日後不愈者取鯉魚一頭先死者去鱗尾以湯脫去骨淨洗破肚去臟以上件和小豆麻子汁和小豆同煮熟作羹入蔥豉橘皮生薑紫蘇調和食之始終斷鹽渴即飲麻子汁秋冬暖飲春夏冷飲食不可飽慎房事嗔怒大語忌酒面油醋生冷菜茹一切魚肉鹽醬五辛並治一切氣病凡作一月服之大良麻子熟時多收入新甕貯之施人可也苦瓠丸專治大水頭面遍身腫脹又治卒腫有忽腳腫漸至膝足不可踐地者苦瓠白穰實捻如大豆以麵裹煮一沸空腹吞一枚至午出水一升三四日水自出不止大瘦乃瘥三年內慎口味苦瓠雖好須揀細理者研淨不爾有毒不可用崔氏子作餛飩服二十七枚若虛者牛乳服之如此隔日作服漸加至三十七枚以小便利為度小便若太多即停止一二日治通身腫出子蘿蔔不拘多少浮麥不拘多少上二味一處浸湯服羌活散專治水氣腫氣急不能臥羌活蘿蔔子上各等分同炒香熟去蘿蔔子不用為末以鹽酒調二錢一日二服三日三服取效嘉與主簿張昌時傳土狗方出直指方治遍身腫外腎腫生土狗縮砂上等分共研細老酒調下每服一錢匕大豆散出聖濟總録治水病通身腫滿喘急大小便澀大黃豆醋拌炒大黃微煨去皮各一兩上為散每服二錢匕臨臥時煎蔥橘皮湯調下平明以利大腸為度一字湯一名大戟湯出聖濟總録治水腫通身腫滿喘急小便澀甘遂大戟去皮各一兩上銼用慢火炒令黃色搗篩為末每服一錢匕以水半盞煎三五沸便須澄出不得煎過火去滓溫服之不過十服一方用大棗湯煎服之大戟散出聖濟總録治通身腫滿喘急小便澀大戟去皮細切微炒二兩乾薑炮裂半兩上為散每服三錢匕用生薑湯調下良久糯米飲壓之以大小便利為度苦葶藶丸出衛生寶録治一切水病氣通身腫滿不可當者人參一兩苦葶藶四兩於鍋內鋪紙炒黃色上為末用棗肉和丸如梧桐子大每服十五丸煎桑白皮湯下日三服空心食前此藥極效人若不信可試驗之治水腫通身出千金方苦瓠膜二分葶藶五分上合搗為丸如小豆大每服五丸日三又方出千金方葶藶桃仁各等分上皆熬合搗為丸小豆大每服五丸服之利小便一方用杏仁又方出千金方大棗肉七枚苦瓠膜如棗核大上熟搗丸如小豆大每服三丸如人行十五里又服三丸水出更服一丸即止又方出千金方用搗生葶藶子酢和服以小便數為度又方出千金方用煎豬椒枝葉如餳空腹服一錢匕日三治水氣遍身浮腫方出聖惠方上取蔥根葉不限多少細切曬乾杵羅為末每用蔥末二錢席上塵半錢相和作散每服一錢匕於食前清粥飲調服之治水氣坐臥不得面目身體悉浮腫方出聖惠方蔥白七斤和須分作兩揭子上先以炭火燒一處淨地令赤即以蔥揭子安在地上令病人脫襪以人扶著於蔥上蹲坐即以被衣圍裹勿令透風得汗出小便利汗出黃水蔥冷即止小便多即瘥矣蒴藋酒出聖惠方治水氣通身黃腫用蒴藋根搗汁一盞以之置暖處一宿旦起空心服之瘥葶藶丸出聖惠方治水腫氣滿用葶藶子三兩蒸過搗如泥和蜜為丸如梧桐子大每服五丸加至七丸得利為佳或以葶藶一升用酒五升浸三宿每服取半盞日三小便利佳白鴨方出肘後方治水氣脹滿浮腫小便澀少用鴨白者一隻去毛及腹中一切去淨湯洗淨飯半升以薑椒釀鴨腹中縫定如常法蒸候熟食之又方出肘後方治遍身腫小便不利用豬苓五兩搗篩為末水一合調服方寸匕加至二匕牽牛散出聖惠方治水氣遍身浮腫氣促坐臥不得用牽牛子二兩微炒搗細末烏牛尿浸一宿平旦入蔥白一握煎十餘沸去滓空心分為二服水從小便中下大效一方為丸蔥白湯下加人尿令可丸服如小豆大日三治水氣通身腫方出千金方海藻銼錦紋大黃銼大戟銼續隨子去殼各一兩上件用好酒二盞淨碗內浸一宿取出曬乾後用甘遂炒黃一兩白牽牛一兩生搗取汁桂府滑石半兩淨肉豆蔻一個青皮陳皮並去白各半兩共前藥都作一處杵為細末大人每服二錢如氣實者三錢半平明冷茶清調下至辰時取水三二行腫減五七分隔二三日平明又一服腫消即止忌鹽魚肉百日五歲以上小兒服一錢以下者半錢婦人有胎不可服木香通氣丸導滯寬膈塌腫進食牽牛半斤半生半熟陳皮四兩去白破故紙四兩炒茴香一兩炒南木香一兩檳榔二兩海金砂四兩上件為末清醋為丸如梧桐子大每服三十丸熟水送下食後白朮丸治通身腫滿及病氣疾羌活白朮各半兩木通黃耆桑白皮各三兩木香二兩黑牽牛十兩半生半炒陳皮三兩上為末蜜丸薑湯下塌脹丸治水病渾身腫喘急小便不利白樟柳根三兩銼細赤小豆五兩陳橘皮去白二兩木香一兩上件為末滴水和丸緑豆大每服三十丸煮赤小豆湯下防己湯主通身體滿小便澀滯上下氣急水停不能飲食食則脹者桑白皮五兩大豆五升以水三斗並桑白皮煮取一斗去渣麻黃防己橘皮赤茯苓各三兩生薑五兩杏仁十枚去皮尖雙仁炒旋覆花一兩紫蘇莖葉二兩切上切以前件藥汁煮取三升去滓分為三服弱者分為五服相去六七里久微覆當大汗小便利腫氣消下冷多者加茱萸四兩玄參四兩忌酢物
