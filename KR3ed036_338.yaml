去蘆頭白朮各一兩柴胡去苗陳橘皮湯浸去白瓤焙各一兩半甘草炙微赤銼半兩上搗羅為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服藿香丸治妊娠腹滿溫胃氣化冷痰利胸膈思飲食藿香木香各一兩肉豆蔻去殼丁香各半兩半夏一兩生薑汁浸三宿切焙乾上為末生薑汁煮麵糊和丸如梧桐子大每服二十丸食前生薑湯下白朮散出聖惠方治妊娠心腹脹滿不欲飲食白朮黃芩各一兩陳橘皮二兩湯浸去白瓤焙上搗篩為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候溫服枳殼湯出保命集方治婦人懷胎腹脹枳殼三兩炒黃芩一兩上為粗末每服半兩水一盞半煎一盞去滓溫服治産前脹滿身體沉重枳殼湯中加白朮一兩治妊娠脹滿有熱證者身體腫脹附論夫妊娠腫滿由臟氣本弱因産重虛土不剋水血散入四肢遂致腹脹手足面目皆浮腫小便祕澀陳無擇云凡婦人宿有風寒冷濕妊娠喜腳腫俗呼為皺腳亦有通身腫滿心腹急脹名曰胎水凡妊娠之人無使氣極若心靜氣和則胎氣安穩若中風寒邪氣及有所觸犯則隨邪而生病也凡妊娠經血壅閉以養胎若忽然虛腫乃胎中挾水水血相搏脾胃惡濕主身之肌肉濕漬氣弱則肌肉虛浮水氣流溢故令身腫滿也然其由有自致或因泄瀉下痢臟腑虛滑耗損脾胃或因寒熱瘧疾煩渴引飲太過濕漬脾胃皆能使頭目或手足浮腫也然水漬於胞兒未成形則胎多損壞及其胎産日腳微腫乃胞髒水少血多水出於外故現微腫則易生也宿有寒氣因寒冷所觸故令腹腫滿也妊娠自三月成胎之後兩足自腳面漸腫至腿膝以下行步艱辛以至喘悶飲食不美似水氣狀至於腳指間有黃水出者謂之子氣直至分娩方消此由婦人素有風氣或衡任經有血風未可妄投湯藥亦恐大段者慮將産之際費力有不測之憂故不可不治於未産之前也脾合土候肌肉土氣和平則能制水水自傳化無有停積若妊娠脾胃氣虛經血壅閉則水飲不化濕氣淫溢外攻形體內注胞胎懷妊之始腫滿或必傷胎氣如臨月而腳微腫者利其小便則病可愈方木通湯出聖惠方治妊娠身體浮腫心腹脹滿小便不通木通銼香薷桑根白皮銼各一兩木香訶黎勒皮黃芩各三兩枳殼去瓤麩炒檳榔各半兩紫蘇莖葉半兩上粗搗篩每服四錢水一盞入生薑半分拍碎煎至六分去滓溫服食前日再當歸飲出大全良方治胎前諸疾或因怒中氣充子臟或充脬脈腹急肚脹腰腹時痛不思飲食四肢浮腫氣急時喘大便忽難小便忽澀玉門忽腫當歸一兩赤茯苓枳殼白芍藥川芎各二兩川白姜炮木香煨粉草各半兩上㕮咀每服三大錢水一盞半生薑三片煎至八分去滓無時溫服如稟受氣弱及南人枳殼減半如氣實及北人於內加二分服之或連日大便祕澀加蜜同煎八正散出危氏方治妊娠心氣壅胎氣八個月散墜手足浮腫急痛不安難産瞿麥銼木通銼去皮節滑石大黃銼麵裹煨切焙車前子萹蓄一名地扁竹山梔仁甘草炙各等分上銼散每服三錢水一盞茴香一撮同煎熱服勝金散出濟生方小腹虛脹者何蓋因食硬物傷胎胎既受病傳於脾胃氣虛冷逼小腹狀若奔豚或腰重大便祕澀兩脅虛鳴宜服勝金散溫中下氣疾即安矣吳茱萸去枝梗酒浸炒陳皮去白乾生薑乾薑炮川芎各一錢半厚朴去皮姜炒縮砂仁炒甘草炙各三錢上為細末每服二錢鹽湯調服不拘時候一方有木香無縮砂仁桑白皮湯出聖惠方治妊娠四肢腫滿小便不利喘促桑根白皮銼一兩枳殼去瓤麩炒商陸各半兩澤瀉三分冬葵根赤茯苓去黑皮木通銼各一兩上粗搗篩每服四錢匕以水一盞半入生薑半分拍碎煎至八分去滓食前溫服以利為度鯉魚湯出大全良方治妊娠腹大胎間有水氣腳腫通身腫滿胸肚不分鯉魚一頭二斤生薑五兩白朮五兩芍藥當歸各三兩茯苓四兩上㕮咀以水一斗二升先煮魚熟澄清取八升內藥煎取三升分五服忌桃李雀肉酢物等一方用陳皮少許同煎昔有妊婦腹脹小便不利吐逆諸醫雜進溫脾胃寬氣去脹等劑服之反致藥物不納轉加脹滿湊心驗之胎死腹中又服諸下胎藥不能通解舉家憂惶因得鯉魚湯論曰腳腫俗呼為皺腳亦有通身腫滿心胸急脹名曰胎水證遂去婦心前衣服視之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此證蓋緣懷身腹大娠婦不自知覺人人皆以謂身娠如此終不以為胎水病醫人何以得知故書此諭病家自當覺察也防己湯出聖惠方治妊娠通身浮腫喘息促小便澀防己大腹皮銼各三分桑根白皮銼紫蘇莖葉赤茯苓去黑皮各一兩木香一分上粗搗篩每服四錢水一盞入生薑半分拍碎煎至六分去滓食前溫服一方無大腹皮赤茯苓湯出聖惠方治妊娠身體浮腫心腹急滿小便赤澀及水腫赤茯苓去黑皮一兩白朮旋覆花各半兩木通銼杏仁湯浸去皮尖雙仁麩炒黃芩各三分上粗搗每服三錢匕水一盞入生薑一分拍碎煎至六分去滓食前溫服一方無木通用防己二兩不用姜煎茯苓丸出聖惠方治妊娠身體腫有水氣心腹脹滿小便澀喘息促赤茯苓去黑皮一兩郁李仁湯浸去皮研半兩檳榔銼半兩葶藶子炒令黃研三分枳殼去瓤麩炒半兩白朮炒三分上搗羅四味為末入二味同研令細煉蜜丸如梧桐子大每服二十丸煎桑白皮湯下一方加桑白皮名檳榔丸粥飲下天仙藤散出十便良方治妊婦足腫似水氣狀天仙藤洗略炒香附子炒陳皮甘草烏藥不須要天台者但得軟白香而辣者良上等分淨杵為細末每服三錢水一盞姜三片木瓜三片紫蘇三葉同煎至七分放溫澄清空心食前服日三服小便利氣脈通體輕腫漸消更不須多服療妊娠身腫有水氣心腹脹滿小便少出大全良方茯苓四兩杏仁檳榔各三兩旋覆花郁李仁各一兩上為粗末以水六升煮取三升去滓分溫三服小便通即止葶藶散出大全良方療妊娠遍身洪腫葶藶子十分白朮二十分茯苓二兩桑白皮二兩郁李仁八分上為粗末以水六升煮取二升分溫三服小便利即瘥又方出大全良方妊娠煩渴引飲致腹脹身腫不能食澤瀉葶藶各三兩茯苓枳殼上細切以水六升煮取二升分溫二服小便利即瘥澤瀉湯出大全良方治妊娠經氣壅滯身體浮腫喘促大便難小便澀澤瀉桑根白皮銼木通枳殼去瓤麩炒赤茯苓去黑皮檳榔銼各一兩上粗搗篩每服四錢匕水一盞半入生薑半分拍碎煎至八分去滓食前溫服利為度日再服腎著湯出三因方治妊娠腰腳腫痛茯苓白朮各四兩乾薑甘草各二兩杏仁三兩上㕮咀每服四錢水一盞半煎至七分食前服五皮散出大全良方治胎水亦治尋常脾虛腫滿大腹皮桑白皮生薑皮茯苓皮橘皮各等分上㕮咀每服半兩水二盞濃磨木香一呷同煎至八分去滓空心溫服亦治男子脾虛腫滿一方無桑白皮有白朮倍之名白朮散治妊娠體腫有水氣心腹急滿出千金方茯苓白朮各四兩一方無白朮黃芩杏仁各三兩旋覆花二兩上㕮咀以水六升煮取二升半分三服忌桃李雀肉鮓物寄生飲治妊娠遍身虛腫桑寄生一兩桑根白皮銼炒三分木香半兩大腹皮二分半紫蘇莖葉一兩上細銼如麻豆大拌勻每服三錢匕水一盞煎至七分去滓溫服桑白皮飲出聖惠方治妊娠四肢腫皮肉拘急小便不利桑根白皮銼炒一兩商陸根一兩半赤小豆三合羌活去蘆頭半兩上㕮咀如小豆大拌勻用水五盞入生薑七片同煮候豆熟濾去滓渴即飲汁並食豆小便利瘥一方無生薑名商陸湯豬苓散出聖惠方治妊娠身體浮腫腹脹小便不利微渴引飲氣急豬苓二兩去黑皮紫蘇莖葉木通銼各一兩上搗細羅為散每於食前以溫水調下二錢葵子散出聖惠方治妊娠身體浮腫小便不利灑淅惡寒葵子赤茯苓漢防己各二兩上搗細羅為散每於食前以粥飲調下一錢商陸赤小豆湯一名赤小豆湯出危氏方治妊娠手足腫滿攣急赤小豆商陸各等分上㕮咀每服一兩用水一碗煎至七分澄清汁服一方有澤瀉一方無澤瀉有桑白皮治妊娠從腳上至腹腫小便不利微渴引飲出鮑氏方取豬苓五兩為末以熟水服方寸匕日三服燒稱錘方出肘後方治妊娠脹滿及妊娠卒下血治妊娠毒腫方出千金方用蕪菁根淨洗去皮搗酢如薄泥勿令有汁用猛火煮二三沸適性敷腫以帛急裹之日再易寒時溫覆無根時用子若腫在咽中取汁含咽之又方出千金方用燒犍牛屎酢和敷之干則易亦可服方寸匕日三治妊婦兩腳浮腫名曰脆腳因脾衰不能制水血化為水所致用生料平胃散每服三錢姜煎服末蘇湯調服亦可治婦人身腫九月而喑啞不能言者用玉燭散二兩淨水半碗煎至七分去滓入蜜放溫時時呷之腰痛附論夫腎主腰足因勞傷動其經虛則風冷乘之則腰痛冷氣乘虛入腹則腹痛故令腰腹相引而痛其痛不止多動胎氣婦人腎以系胞妊娠而腰痛甚者則胎墮也方五加皮散出聖惠方妊娠腰疼痛不可忍或連胯痛先服此散杜仲四兩五加皮三兩阿膠炙防風金毛狗脊川芎北細辛白芍藥各二兩杏仁八十枚去皮尖炒萆薢三兩上㕮咀以水九升煮取二升去滓下膠作三服一方無芍藥生薑煎服續斷丸一名五加皮丸出聖惠方療妊娠二月三月腰痛不可忍者次服此丸續斷杜仲各十分芎藭獨活各三兩狗脊五加皮萆薢芍藥薯蕷訶子肉各八兩上為末煉蜜為丸如梧桐子大空心酒下四十丸日三服平胃散一名平安散治産前氣築刺兩脅疼痛杜仲散出聖惠方療觸動胎不安以致腰痛背痛及臍腹內痛杜仲五加皮當歸芍藥川芎萆薢各三兩人參一兩半上細銼以水七升煮取二升半分溫三服無時防風湯治妊娠身痛防風去蘆炒藁本去蘆獨活去蘆細辛去葉甘草阿膠炒令沸燥以上等分上㕮咀每服三錢水一盞煎熱服之當歸散出大全良方療妊娠氣壅攻腰痛不可忍兼治腹痛二三月娠當歸三兩阿膠甘草各二兩蔥白一斤上細銼以水七升煮取三升去滓分溫五服無時大地黃丸治産前後腰腹疼一切血疼及治氣血虛四肢不舉骨體熱疼烏梅肉當歸各一兩熟地黃二兩上為細末煉蜜丸如彈子大每服一丸白湯嚼下空心大腹皮散治妊娠氣壅攻腰疼痛不可忍大腹皮銼郁李仁湯浸去皮尖微炒澤瀉各一兩上搗篩為散每服四錢水一盞生薑半分煎至六分去滓不計時候溫服治妊娠腰痛豉二兩榆白皮三兩上熟搗蜜丸如梧桐子大每服二七丸亦治心痛溫酒下亦可服治妊娠腰痛不止方鹿角屑二兩微炒生乾地黃一兩半上搗細羅為散每於食前以溫酒調下二錢治妊娠腰痛用麻子三升以水五升煮取汁三升分為五服亦治心痛牛屎方治妊娠腰痛亦治心痛煩悶用燒牛屎焦末水服方寸匕日三服地黃酒治妊娠腰痛紫酒治妊娠腰痛如折亦治常人腰痛亦名聖酒方用大黑豆二合炒令香熟以酒一大盞煮取七分去豆空心頓服通氣散治妊娠腰痛狀不可忍此藥神妙用破故紙不拘多少瓦上炒令香熟為末嚼核桃肉半個空心溫酒調下二錢療妊娠腰背痛反覆不得用鹿角長六寸燒令赤酒中淬再燒再淬以角碎為度取酒飲之為末服亦可治妊娠卒腰背痛如折以銀一兩水三升煎取二升飲之産前軟胯甘草生薑烏梅等分銼碎上用水一大盞同煎至八分去滓服便令胯骨軟産宮受氣痛不攻作杜仲丸治衝任脈虛血海虛弱寒濕邪氣客搏胞絡妊娠腰痛小腹牽連行步力弱艱於俯仰小便白濁晝夜頻並五加皮萆薢山茱萸各三兩杜仲四兩炒去絲阿膠蛤粉炒成珠子金毛狗脊炙去毛防風去蘆頭川芎細辛去葉鹿角屑六味各二兩當歸洗焙生乾地黃各二兩上件為細末蜜糊和丸如梧桐子大每服三十丸溫酒送下或煎艾湯下空心食前服阿膠丸治妊娠胎臟受寒腰腹疼痛或因損動惡露頻下腹痛陳作香附子去毛天仙子炒令黑當歸洗焙各二兩五味子吳茱萸湯洗七遍各一兩半阿膠蛤粉炒川芎乾薑炮各一兩蒼朮三兩米泔水浸一宿焙乾上件為細末醋煮麵糊為丸如梧桐子大每服三十丸煎艾湯下或木香醋湯下空心食前治妊娠腰痛不可勝舉兩足沉重行步無力臍腹痛不可勝忍杜仲去粗皮續斷茯苓川芎防風芍藥萆薢當歸各半兩枳殼切取青細辛各一分上細杵羅為末每服三錢水一盞二分同煎取一盞去滓空心吃蜜丸如梧桐子大早朝空心鹽湯下三十丸亦得
