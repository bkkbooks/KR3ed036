body:
  text: 卷三百三十八妊娠諸疾門子煩附論夫妊娠苦煩悶者四月受少陰君火氣以養精六月受少陽相火氣以養氣若母心驚膽寒多有煩悶名曰子煩也産寶云夫妊娠而子煩若是肺臟虛而熱乘於心則令心煩也若熱而煩者但熱而已若有痰飲而煩者嘔吐涎沫才聞食氣煩躁不安也大抵妊娠之人既停痰積飲又虛熱相搏氣鬱不舒或煩躁或嘔吐涎沫劇則胎動不安均謂之子煩也方升麻湯一名麥門冬湯出聖惠方治妊娠壅熱心神煩躁口乾吐逆此證與子煩大同小異通用知母丸亦可川升麻黃芩人參麥門冬梔子仁柴胡茯神栝蔞根犀角屑各一兩知母甘草各半兩上㕮咀每服四錢水一盞煎至六分去滓溫服酸棗仁湯治妊娠煩懊虛悶四肢疼痛不睡酸棗仁炒二兩芍藥防風去叉柴胡去苗赤茯苓去黑皮犀角鎊五味子甘草炙人參檳榔銼各一兩上搗篩每服五錢水一盞半煎至一盞去滓不拘時溫服赤茯苓散出聖惠方治妊娠心煩頭項疼痛不思飲食手足多熱赤茯苓桑寄生知母百合麥門冬去心川升麻人參去蘆頭柴胡去苗以上各一兩甘草半兩炙微赤銼上搗篩為散每服四錢以水一中盞入甜竹茹一分生薑汁三分薤白七寸煎至六分去滓不拘時候溫服退熱湯治妊娠虛煩懊熱夫妊娠虛煩懊熱者以陽氣偏甚熱氣獨作心下懊悶頭痛面赤小便黃澀甚則淋痛是也病源又謂之子煩人參甘草炙黃芩去黑心各二兩當歸切焙芍藥梔子仁防風去叉柴胡去苗各一兩上搗篩每服三錢水一盞煎取七分去滓溫服食後柴胡飲治妊娠虛煩懊熱胎氣不寧手足煩倦柴胡去苗桑寄生知母切焙百合洗麥門冬去心焙升麻各一兩甜竹茹新竹茹用三兩上搗篩每服五錢水一盞半生薑三片同煎至一盞去滓食後溫服知母湯治妊娠虛煩懊熱知母切焙防風去叉黃芩去黑心甘草炙麥門冬去心焙赤茯苓去黑皮銼升麻各一兩上搗篩每服三錢水一盞生薑三片同煎至七分入竹瀝少許攪勻去滓溫服不拘時茯苓湯治妊娠虛煩懊熱心中悶亂頭暈重嘔逆四肢倦怠赤茯苓去黑皮一用白茯苓防風去叉人參白朮銼炒枳殼去瓤麩炒甘草炙各一兩上搗篩每服三錢水一盞生薑三片煎至七分去滓溫服不拘時候竹瀝湯治妊娠心下煩熱燠躁防風去叉麥門冬去心焙黃芩去黑心升麻石膏銼碎梔子仁各一兩上搗篩每服三錢水一盞竹瀝半合煎至七分去滓食後溫服日再知母飲出大全良方治妊娠心脾壅熱口乾渴苦煩悶赤茯苓黃芩黃耆各三兩知母麥門冬去心甘草各二兩上為粗末桑白皮煎湯或入竹瀝一合服不拘時候胎臟受熱最宜服之一方去黃耆知母加地骨皮犀角屑嫩葛各三分㕮咀煎如前法犀角散出聖惠方治妊娠心煩熱悶犀角屑地骨皮黃芩麥門冬去心赤茯苓以上各一兩甘草半兩炙微赤銼上為散每服四錢以水一中盞煎至六分去滓入竹瀝一合更煎一兩沸不拘時候溫服竹瀝湯一名竹葉湯出千金方治妊娠常苦煩悶此是子煩以四月受少陰君火氣以養精六月受少陽相火氣以養氣若母心驚膽寒多好煩悶宜用此方竹瀝一升一作竹葉麥門冬防風黃芩各三兩茯苓四兩上以水四升合竹瀝煮取二升分三服不瘥再作一方用知母無黃芩一方加人參半兩麥門冬湯一名竹葉湯出濟生方治妊娠四月六月多苦煩悶心驚膽怯名曰子煩白茯苓去皮一兩人參麥門冬去心防風各一兩上㕮咀每服四錢水一盞半姜五片入淡竹葉十片煎至八分去滓溫服不拘時候治妊娠恆苦煩悶此名子煩茯苓二兩竹瀝一升上以水四升合竹瀝煎取二升分三服不瘥重作亦可時合竹瀝服之治孕婦七八個月傷暑傷熱以致子煩胎氣迫上咽喉窒礙心腹脹滿下墜似痢每登廁坐時一炊久忽爾氣下方得大便一通世俗率用痢藥不知病在胎熱子煩用小柴胡湯下黃連阿膠丸或用炒阿膠淨黃連各一分枳殼比大黃半之分作兩劑烏梅姜蜜煎服候其大便調導卻以川芎茯苓縮砂甘草繼之若五苓散感應丸香連駐車非其治也治妊娠常苦煩悶此是子煩出大全良方用竹瀝隨多少時時服之自愈治妊娠子煩口乾不得臥出大全良方黃連去須為細末每服一錢粥飲調下酒蒸黃連為丸亦可一母丸出大全良方治妊娠因服藥致胎不安有似虛煩不得臥者用知母一兩洗焙為細末以棗肉為丸如彈子大每服一丸細嚼煎人參湯送下余每見醫者不識此證作虛煩治之損動胎氣宜矣有識者亦見有藥也産科鄭宗文得於陳藏器本草拾遺中也用之良驗一方用秦艽糯米湯化下名萬安丸治妊娠心中煩悶見食即吐非時噁心飲食不進非時悶絶脈洪滿大小腑實熱出楊子建萬全護命方麥門冬去心防風茯苓山梔前胡去毛升麻黃芩石膏各等分上細杵羅為末每服三錢水一盞半蔥三枝煎至六七沸食後臨臥吃子淋附論夫淋者由腎虛膀胱熱也腎虛不能制水則小便數也膀胱熱則小便行澀而數不宣妊娠之人胞系於腎腎間虛熱而成淋疾甚者心煩悶亂故謂之子淋也轉胞證候孕婦多有之患在忍縮小便或喜食煎炒或胞胎為熱所迫遂使小腸之氣逆而不通大腸之氣與之俱滯外水不能入膀胱內水不能出膀胱淋瀝數急每欲尿時痛不可言大便亦裡急似痢非痢必以手從胸間按至臍下庶可立出小便否則逆上出而不禁甚者因此腹脹浮腫治法用涼藥疏利小腸中熱仍與通泄大腸逮其腹中攪痛大便大下則溺胞隨即歸正於是小便順流宜服葵子散方地膚大黃湯出聖惠方療妊娠患子淋由腎虛膀胱熱則小便行澀而數不宣心中煩臍腹悶川大黃地膚子各三兩知母黃芩豬苓赤芍藥通草川升麻枳實甘草各二兩上㕮咀每服四錢水一盞煎至七分去滓溫服不瘥還飲地膚葵根汁忌海藻菘菜酢物療妊娠數月小便淋瀝疼痛心煩悶亂不思飲食出聖惠方瞿麥穗赤茯苓桑白皮木通葵子各一兩黃芩芍藥枳殼車前子各半兩上為粗末每服四錢水一盞煎至六分溫服安榮散出危氏方治妊娠小便淋瀝蓋小便淋瀝者何答曰本因調攝失宜子臟氣虛又緣酒色過度傷其血氣致水臟澀遂成淋瀝名曰子淋宜服安榮散通利小便麥門冬去心通草滑石各一錢當歸去蘆酒浸燈心甘草炙各半兩人參細辛洗各一錢上搗羅為細末每服用三錢煎麥門冬湯調服不拘時候服之尤妙一方止用檳榔赤芍藥各等分水煎空心服屢效或蔥白煎亦可木通湯治妊娠子淋澀痛木通銼石葦去毛各一兩赤茯苓去黑皮芍藥桑根白皮銼陳橘皮湯浸去白炒人參各三分上搗篩每服三錢水一盞半入生薑一棗大煎至八分去滓溫服冬葵子散出聖惠方治妊娠胎不安小便淋澀小腹疼痛冬葵子炒柴胡去苗桑根白皮銼赤茯苓以上各一兩赤芍藥一兩當歸三兩銼成散上搗為散每服四錢水一中盞煎入生薑半分蔥白七寸同煎至六分去滓不計時候溫服冬葵子湯出大全良方治妊娠患淋小便澀不利小腸水道熱痛冬葵子一升芍藥三兩黃芩赤茯苓車前子各三兩上㕮咀以水七升煎至二升溫分三服海蛤湯治妊娠子淋海蛤木通銼豬苓去黑皮各半兩冬葵子微炒一分滑石研一分上搗篩每服三錢水一盞入燈心十莖同煎至六分去滓食前溫服當歸湯治妊娠子淋澀痛當歸切焙芍藥赤茯苓去黑皮甘草炙銼梔子仁各半兩上搗篩每服三錢水一盞煎至八分去滓溫服人參散治妊娠子淋人參木通銼青鹽細研以湯一盞化浸前二味一宿焙乾海金沙別研各一分莎草根去毛二兩上將人參木通莎草根搗羅為細散同海金沙青鹽一處再研勻每服二錢空心酒或米飲調下葵子散出聖惠方治妊娠小便澀痛謂之子淋葵子滑石木通榆皮各等分上為末每服三錢以水一盞半蔥白七寸煎至七分食前服一方無榆皮又方出仁存方葵子滑石杏仁寒水石各等分上為末或煎或調服神效白芷散治妊娠子淋小便頻澀痛白芷三分焙鬱金阿膠炙燥滑石各一兩上搗羅為散每服二錢煎蔥白湯調下石蟹散治妊娠子淋日夜頻數澀痛夫婦人懷子而淋者謂之子淋因腎虛膀胱經客邪熱令溲少而數水道澀痛痛引於臍下者是其候也石蟹碎一枚乳香一分滑石一兩半上研細末為散每服一錢煎燈心湯調下石葦湯治妊娠小便頻數澀少疼痛石葦去毛榆白皮銼各一兩滑石二兩上搗篩每服三錢水一盞入蔥白二寸生薑二片煎至六分去滓食前溫服鯉魚汁出聖惠方治妊娠小便淋澀胎不安鯉魚一枚重一斤者理如食法葵菜一斤蔥白四兩切上以水五升煮熟加少許鹽和魚菜並汁同食之效治妊娠患淋小便數而少澀痛手足煩痛出聖惠方地膚草茅根銼大麻子各一兩上搗篩為散每服四錢以水一中盞入蔥白七寸煎至六分去滓不計時候溫服檳榔散出産經治胎前諸般淋澀小便不通醫作轉脬用他藥不愈此方屢神效檳榔一枚麵裹煨熟去面赤茯苓各等分上為粗末每用五錢水一盞半煎至七分去滓溫服空心食前尋常男子婦人血淋及小便淋瀝水道疼痛用之甚效一方治妊娠中惡心腹㽲痛溫酒調下一錢滑石湯治妊娠子淋滑石二兩研赤柳根銼半兩焙上搗篩每服五錢水一中盞半煎至八分去滓食前溫服治妊娠小便淋澀臍腹妨悶出聖惠方豬苓一兩去黑皮瞿麥一兩上搗細羅為散每服二錢不計時候煎蔥白湯調下車前子湯治妊娠患淋水道熱不通車前子五兩研葵根切一升上以水五升煎取一升半分二服葵子飲出大全良方治妊娠患子淋以葵子一升水五升煮取二升分二服一方無葵子用葵根亦可亦治小便不通甘遂散出大全良方療妊娠子淋大小便並不利氣急已服豬苓散不瘥者宜服此藥下之用大山赤皮甘遂二兩為末以白蜜二合和合如大豆粒多覺心下煩得微下者日一服下之後還服豬苓散不得下者日三服漸加至半錢以微利為度豬苓散出大全良方療妊娠小便澀痛兼療胎水亦治子淋用豬苓五兩去皮為細末用白湯調方寸匕加至二匕日三夜二不瘥宜轉下之服前藥地膚湯出大全良方療妊娠患子淋小便數出少或熱疼痛手足疼煩及子煩用地膚草三兩細切水四升煮取二升半去滓分三服日三一方作地膚子十二兩心腹痛附論夫妊娠心腹痛者或由宿有冷痰或新觸風寒皆由臟虛而致發動也邪正相擊而並於氣隨氣上下衝於心則心痛下攻於腹則腹痛故令心腹痛也妊娠而痛者邪正二氣交攻於內若不時瘥者其痛衝擊胞絡必致動胎甚則傷墮也又曰妊娠心腹疼痛多是風寒濕冷痰飲與臟氣相擊故令腹痛攻傷不已則致胎動也妊娠心痛者多是風邪痰飲乘於心之經絡邪氣搏於正氣交結而痛也若傷心正經而痛者為真心痛心為君主之官統領諸臟不可受邪邪若傷之朝發夕死夕發朝死若傷心支別絡而痛者則乍安乍甚休作有時也妊娠之人或有病而痛不已者氣乘胞絡傷損子臟也則令胎動凡胎轉移則多不安不安而動於血者則血下也雷公云心痛欲死急覓延胡妊娠臟腹虛弱冒寒濕之氣邪氣與正氣相擊故令腹痛病不已則傷胞絡令胎不安治法宜祛散寒濕安和胎氣則痛自愈方保生湯治妊娠心腹痛祛散寒濕安和胎氣紫菀去苗土柴胡去苗龍骨赤石脂各一兩半艾葉炒白朮各三分黃連去須厚朴去粗皮生薑汁炙阿膠炙令燥枳殼去瓤麩炒各一兩地榆一兩一分肉豆蔻去殼一枚益智去皮乾薑炮旋覆花炒黃芩去黑心各半兩上粗搗篩每服五錢水一盞半煎至八分去滓溫服澤蘭丸治妊娠羸瘦腰冷腹痛不欲食安胎澤蘭當歸切焙肉桂去粗皮各二兩乾薑炮一兩半芎藭阿膠炙令沸燥蕪荑藁