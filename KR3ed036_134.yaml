皮湯出聖濟總録治傷寒後熱氣上衝目生瘡翳秦皮一分竹葉一把防風去叉菊花葳蕤各半兩蕤仁去殼研一分甘草生用三分上粗搗篩都用水二升煮取一升綿濾去滓放溫洗眼不拘時防風湯出聖濟總録治傷寒後肝虛目暗視物不明或見黑花防風去叉芎藭甘草炙銼人參茯神去木獨活前胡去蘆頭各一兩細辛去苗葉菊花各半兩上粗搗篩每服五錢水一盞半煎至一盞去滓溫服早晚食後各一漏蘆連翹湯出千金方治傷寒熱毒變作赤色癰疽丹疹腫毒及眼赤痛生障翳悉主之方兼療天行漏蘆黃連翹黃芩麻黃去節白蘞升麻甘草炙各二兩大黃切枳實炙各三兩上切以水九升煮取三升去滓溫服分三服相去二食頃更服熱甚者可加芒硝二兩忌海藻菘菜等物秦皮湯治毒病沖眼忽生赤翳或白或膚腫起或赤痛不得視光痛入肝心或眼外浮腫如吹汁出生膜覆珠子秦皮前胡常山黃芩升麻芍藥白蘞枳實炙甘草炙以上各二兩大黃二兩上以水八升煮取三升分二服相去二食頃更服若盛熱者可加芒硝二兩忌海藻菘菜生蔥生菜一方加蕤仁一兩梔子仁半兩秦皮湯出聖惠方治傷寒病熱毒氣入眼生赤脈赤膜白膚白翳者及赤痛不得見光毒痛煩惱者神效秦皮升麻黃連各一兩上切以水洗去塵用水四升煮取二升半冷之分用三合仰眼以綿繞箸頭取湯以滴眼中如屋漏狀盡三合止須臾復用日五六遍乃佳忌豬肉冷水又方出聖惠方用冷水漬清布以掩目治傷寒熱毒在肝善怒筋脈疼痛神昏不欲見人兩脅脹滿不思飲食診其脈左手關脈一指大緊急宜服此方出護命方薄荷荊芥穗羌活獨活山梔黃芩牡丹皮連翹大黃各一兩硝石四銖牽牛一兩半半夏二銖上件藥除牽牛半夏硝石三味獨作一處杵所餘衆藥只合作一處杵每服六錢衆藥末四錢牽牛等末二錢以水一盞半先煎湯令服方入衆藥末四錢蔥三枝煎一沸急漏瀉取汁一盞調下牽牛等末食後和滓服傷寒咽喉痛附論夫傷寒過經而不愈脈反沉遲手足厥逆者此為下部脈不至陰陽隔絶邪中於足少陰之經毒氣上熏故咽喉或痛而生瘡也傷寒咽喉痛者少陰受邪邪毒壅遏於上焦微則咽喉痛甚則痛而生瘡又傷寒過經邪熱內盛熏於上焦令人咽喉腫痛各隨其證以法治之歌曰發斑唾血成陽毒陰虛咽中必有瘡汗出陰陽俱緊澀法當咽痛號亡陽又論曰陰證者少陰也陰陽脈俱緊主無汗有汗者曰亡陽屬少陰法當咽痛也治在自汗亡陽條大抵咽痛甘桔湯豬膚湯陰陽證皆可用也證治論口瘡赤爛蜜漬黃柏咽汁又升麻六物湯又有非其時暴寒伏於少陰之經脈微弱而咽痛次必下利古方謂之腎傷寒先用半夏桂甘湯次四逆湯一二日當瘥應少陰經傷寒皆謂腎傷寒也亦多表里無熱但苦煩憒默而極不欲見光明者時腹痛或脈沉細舊用四順湯古人知其然而用云腎病而體猶有熱者可服黃連龍骨湯若已十餘日下利不止手足徹冷凡熱證者四順湯諸方書中即不曾載黃連龍骨湯即於黃連雞子湯去雞子加龍骨半兩也四順湯丸即理中湯丸中加甘草一倍是也咽喉痛陰毒發成斑肢冷咽瘡腎著證脈緊無陽咽亦痛脈微下利又論云咽喉不利或痛或瘡谷不入而嘔吐者毒氣上衝所致也陽毒必然發斑少陰四肢必冷其有不利者可與之甘桔湯半夏散入甘草生薑其不下利或小便赤而去衣者可與桔梗湯入玄參枳殼使大便通順則黑奧之毒泄矣續以甘草生薑煎湯調之甘草生薑解其毒也腎病咽痛不利身猶熱者未可用四順湯且與黃連龍骨湯即黃連雞子湯去雞子加龍骨湯陽毒咽痛發斑吐膿血脈洪數用藥有本條各少陰咽痛咽瘡脈沉遲厥冷可吐利又陰陽脈俱緊反自汗為無陽法當咽痛而復吐利亦屬少陰並不可汗下重尉汗出以藁本粉敷之咽痛用甘桔湯豬膚湯若沉冷甚者半夏散通脈四逆去芍藥加桔梗與之咽痛通用甘桔湯上焦壅熱加枳殼前胡傷寒一證乃非時暴寒中人有伏於少陰之經頭疼腰痛其脈微若初咽痛似傷寒次必下利非咽閉之比咽痛半夏桂甘湯即半夏散是也下利四逆湯或四順湯主之證治論口瘡赤爛用蜜浸黃柏一宿取汁含熱用升麻六物湯咽中閉塞烏扇湯傷寒六七日大下之寸脈沉遲尺脈不至咽喉不利唾膿血手足厥利不止者難治麻黃升麻湯夫咽喉痛有陰陽二證脈浮數面赤斑斑如錦紋咽喉痛唾膿血者此陽證也脈沉遲手足厥冷或吐利而咽中痛此少陰證也病源云此為下部脈都不至陰陽隔絶邪客於足少陰之絡毒上衝故咽喉不利或痛而生瘡也傷寒脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利此候汗下重尉俱不可汗出者以藁本粉敷之咽喉痛者甘草湯桔梗湯豬膚湯半夏散通脈四逆去芍藥加桔梗湯麻黃升麻湯可選而用之又有伏氣之病謂非時有暴寒中人伏氣於少陰經始不覺病旬月乃發脈微弱法先咽痛似傷寒非喉痹之病次必下利始用半夏桂甘湯次四逆散主之此病只一二日便瘥古方謂之腎傷寒也方射干散出聖惠方治傷寒毒氣攻咽喉痛心煩躁熱胸膈滯悶大小便難射干枳殼麩炒微黃去瓤川升麻馬牙硝木通銼川大黃銼碎微炒玄參各一兩犀角屑三分甘草半兩生用上為散每服四錢水一中盞煎至六分去滓不計時候溫服馬藺子散出聖惠方治傷寒毒氣攻咽喉閉塞疼痛不可忍馬藺子微炒地骨皮川升麻黃芩犀角屑甘草生用大青各半兩馬牙硝二兩苦竹葉三兩銼上為散以水三大盞煎至一盞濾去滓入蜜二合同熬令稠不計時候取一茶匙含咽津木通散出聖惠方治傷寒咽喉閉塞不通小便赤澀宜服木通銼羚羊角屑川升麻射干蘆根銼甘草生用各一兩赤芍藥半兩上為散每服五錢水一大盞煎至五分去滓不計時候溫服麥門冬散出聖惠方治傷寒熱毒在心脾口舌乾燥咽喉腫痛麥門冬去心川大黃銼碎微炒漢防己葛根銼滑石玄參木通銼各半兩木香甘草生用各一分上為散每服五錢水一大盞入生薑半分蔥白二莖煎至五分去滓不計時候溫服升麻散出聖惠方治傷寒心胸氣壅閉塞不通咽喉疼痛川升麻木通銼羚羊角屑前胡去蘆頭桑根白皮銼川大黃銼碎微炒各半兩馬藺根川朴硝各一兩上為散每服五錢水一大盞煎至五分去滓不計時候溫服羚羊角散出聖惠方治傷寒咽喉疼痛心神煩悶羚羊角屑木通銼射干川升麻地骨皮各一兩蘆根銼三兩上為散每服五錢水一大盞煎至五分去滓不計時候溫服治傷寒經數日胸中煩悶咽喉噎塞痛不能飲食宜服出聖惠方射干川升麻人參去蘆頭各三分甘草生用陳橘皮湯浸去白瓤焙各半兩上為散每服三錢水一中盞入生薑半分煎至六分去滓不計時候溫服桔梗散出聖惠方治傷寒二三日咽喉痛桔梗去蘆頭甘草二兩生用苦參半兩銼上為散每服五錢水一大盞煎至五分去滓不計時候服硼砂丸出聖惠方治傷寒舌緊強硬黑色咽喉閉塞腫痛硼砂馬牙硝鬱金苦葫蘆子川大黃銼碎微炒鼠黏子微炒白礬灰黃藥梔子仁甘草生用黃芩以上各半兩上為末煉蜜並沙糖和丸如雞頭實大每服用綿裹含化咽津以瘥為度甘草散出聖惠方治傷寒二三日毒氣攻咽喉腫痛甘草一兩生用川升麻射干各半兩上細銼以水三大盞煎至二盞去滓分為四服日三服夜一服苦酒湯出聖濟總録治少陰病中痛生瘡不能語言聲不出者半夏十四枚湯洗七次切焙生雞子一個上將雞子破殼去黃入半夏在內並苦酒滿雞子殼置剪刀環中安火上令三四沸去滓少少含咽之不瘥再作服半夏湯出活人書治伏氣之病謂非時有暴寒中人伏氣於少陰經中始不覺病旬月乃發脈便微弱法先咽痛似傷寒非咽痹之病次必下利如用半夏桂心甘草湯又以四逆散主之此病只二日便瘥古方謂之腎傷寒半夏湯洗七次切焙桂去粗皮甘草炙銼上等分粗搗篩每服先以水一盞煎七沸納藥兩方寸匕更煮三沸下火放冷少少咽之用生薑二片同煎射干湯出聖濟總録治傷寒咽喉閉塞痛咳嗽多腥氣射干木通銼升麻各一兩桔梗玄參黃芩去黑心甘草炙銼各三分上粗搗篩每服五錢水一盞半煎至八分去滓食後溫服麥門冬湯出聖濟總録治傷寒咽喉壅塞小便不通氣腹脹口舌乾燥麥門冬去心焙大黃銼炒防己玄參葛根木通銼青竹茹滑石碎各半兩甘草炙銼一分木香一分半上粗搗每服五錢水一盞半入生薑半分拍碎蔥白五寸切同煎至八分去滓食後溫服連翹散出聖濟總録治傷寒熱毒未解咽喉壅塞口內生瘡連翹半兩白藥子三分丹參山梔子仁柴胡去苗各半兩甘草炙銼一分惡實黃柏去粗蜜炙半兩上為細散每服食後用蜜水調下二錢日二服地黃煎出聖濟總録治傷寒時氣肺熱咳嗽咽喉痛如有瘡生地汁半升升麻玄參芍藥柴胡去苗各一兩貝母去心三分麥門冬去心焙一兩竹葉一握白蜜五兩上除地黃蜜外細銼用水五大盞煎至二盞去滓下蜜及地黃汁慢火煎成膏每服半匙不計時咽津玄參湯出聖濟總録治傷寒咽喉痛壅塞不通口苦玄參銼碎一兩羚羊角鎊升麻射干各三分芍藥木通銼各半兩上粗搗篩每服五錢水一盞半生薑半分拍碎同煎至八分去滓食後溫服茯苓湯出聖濟總録治傷寒毒氣上衝喉中痛悶塞不通赤茯苓去黑皮半兩木通銼三分升麻羚羊角鎊前胡去蘆頭大黃銼炒各半兩桑白皮銼馬藺根朴硝各三分上粗搗篩每服三錢水一盞煎至六分去滓溫服食後牛黃散出聖濟總録治傷寒咽喉痛心中煩躁舌上生瘡牛黃研朴硝研甘草炙銼各一兩升麻山梔子去皮芍藥各半兩上搗研為細散同研令勻每服一錢食後煎姜蜜放溫調下犀角散出聖濟總録治傷寒咽喉痛口中乾燥不止犀角屑黃連去須鉛霜研栝蔞根鬱金甘草炙銼桑根白皮各半兩上為細散並同研勻每服食後用去心麥門冬熟水調下二錢大丸出聖濟總録治傷寒臟腑發熱毒氣及沖咽喉壅塞急痛升麻三兩甘草生用射干各二兩上為末入牛蒡汁和杵數百下丸如彈子大每服綿裹一丸含化咽津不拘時如和不成入煉蜜少許麻黃地骨湯出聖濟總録治傷寒頭痛身熱咽喉壅塞語聲不出麻黃去節三分地骨皮玄參各半兩五味子三分甘草炙銼乾薑炮各一分附子炮裂去皮臍半兩桔梗炒知母杏仁去皮尖酒炒各半兩上銼如麻豆每服五錢水一盞煎至六分去滓食後溫服治傷寒熱病後口乾喜唾咽痛出千金方大棗二十枚烏梅十枚上合搗蜜和含如杏核大咽其汁甚驗治傷寒熱病喉中痛閉塞不通出活人書生烏扇切一斤豬脂一斤上合煎成藥去滓取如半雞子大薄綿裹之納喉中稍稍咽之取瘥又方出千金方升麻芍藥羚羊角各三兩通草四兩射干二兩生蘆根切一斤上㕮咀以水七升煮取二升半分三服附子丸治傷寒毒攻咽喉腫毒附子炮藜蘆各等分上為末蜜和丸如梧桐子大一枚飲下含黃柏亦佳忌豬肉貍肉一方出肘後方治毒氣攻咽喉腫痛上切商陸炙令熱以布籍喉以尉布上冷復易一方出肘後方上取真䕡茹爪甲口中牙小嚼汁以漬喉當微覺異為佳絡石散出聖惠方治傷寒毒氣攻咽喉痛絡石玄參川升麻射干子芩木通銼各半兩甘草一分生用上為散每服四錢水一盞煎至六分去滓不計時候溫服之五拗散治感寒而語聲不出或至咽喉腫痛麻黃不去節杏仁不去皮尖甘草生用桔梗荊芥穗各等分上㕮咀生薑三片同煎溫咽服咽喉痛甚者煎熟後加朴硝少許
