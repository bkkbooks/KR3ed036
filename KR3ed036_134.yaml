body:
  text: 卷一百三十四傷寒門傷寒發豌豆瘡附論凡傷寒熱毒內盛多發疱瘡者以病人裡實表虛故也裡實則毒氣不能內消表虛故乘虛發於肌內而成瘡也其病大小形如豌豆其色或白或赤若頭作瘭漿載白膿者其毒則輕若紫黑色作根根在肌肉裡者其毒則重甚則周匝遍身五內七竅皆有也夫表虛里實熱毒內盛攻於臟腑餘氣流於肌肉遂於皮膚毛孔之中結成此瘡重者匝遍其身狀如火瘡若根赤頭白則毒輕若色紫黑則毒重其瘡形如豌豆亦名豌豆瘡脈洪數者是其候也方黃連飲子治傷寒毒氣未散發豌豆瘡黃連一兩去須糯米一合寒水石三兩上搗篩以水二大盞煎至一盞半去滓不計時候分溫服大青散治傷寒壯熱頭痛發瘡如豌豆遍身大青梔子仁川大黃銼碎微炒犀角屑川升麻甘草炙微赤銼以上各一兩上為散每服五錢以水一大盞煎至五分去滓溫服不計時候治傷寒熱毒未解欲生豌豆瘡發熱疼痛宜服解肌出汗方葛根一兩銼石膏二兩麻黃一兩去根節黃芩半兩赤芍藥半兩桂心半兩甘草半兩炙微赤銼上搗為細散每服不計時候以暖酒調下二錢並三服衣蓋取汗治傷寒病發豌豆瘡未成膿初覺宜服出聖惠方黃連一兩去須上搗碎以水一大盞煎至六分去滓不計時候放溫頓服便消不成膿也又方出聖惠方用好蜜遍磨瘡上亦可以蜜煎升麻摩之並數數服之又方出聖惠方木香半兩上搗碎以水一大盞煎至六分去滓頓服之治傷寒發豌豆瘡欲出宜服甘草一兩炙微赤銼上搗碎以水一大盞煎至六分去滓任食前後細細服之以防瘡出如已出即不服又方出聖惠方用清油一小盞服之即不生又方出聖惠方用生羊血一小盞頻服即不生牛血亦得又方出聖惠方牛乳四兩酥一兩上先暖乳令微沸即下酥酥消盡便空腹溫溫頻服即不生治傷寒病壯熱頭痛發瘡如豌豆遍身獖豬膽一枚上以醋半小盞合膽汁煎一沸放溫為一服不計時候治傷寒白頭瘡四邊赤腫欲發豌豆瘡出聖惠方麻黃一兩去根節川大黃一兩銼碎微炒上銼和勻每服半兩水一大盞煎至五分去滓不計時候溫服良久治傷寒發豌豆瘡未作膿方一名青黛一物湯出聖惠方用青黛一兩細研以新汲水不計時候調下一錢石膏湯出聖濟總録治傷寒天行壯熱頭痛發瘡如豌豆石膏碎二兩柴胡去苗虎杖各一兩知母焙半兩芍藥一兩山梔子仁三分上搗篩每服五錢水一盞半煎至八分去滓溫服參麻湯出聖濟總録治傷寒熱病生豌豆並疱瘡煩渴昏迷玄參一兩升麻三分犀角鎊半兩干藍葉一兩甘草炙銼三分上搗篩每服五錢匕水一盞半入蔥白三寸豉一百粒同煎至一盞去滓溫服日二二黃湯出聖濟總録治傷寒天行熱病毒氣稍盛生豌豆並疱瘡煩躁昏迷大黃銼炒半兩黃芩去黑心麥門冬焙去心芍藥各一兩甘草炙銼三分大青半兩上搗篩每服五錢水一盞半煎至八分去滓溫服治傷寒發豌豆瘡四邊赤腫方出聖濟總録胡荽一握生地黃一兩上細切搗絞取汁空心頓服一盞計升麻湯出聖濟總録治傷寒熱盛發豌豆瘡升麻半兩大黃銼碎微炒一兩黃連去須甘草炙銼各三兩山梔子仁一兩上搗篩每服三錢水一盞煎至七分去滓溫服日二犀角湯出聖濟總録治傷寒熱毒氣盛發瘡如豌豆犀角鎊二兩麻黃去根節黃連去須各半兩木香一兩上搗篩每服五錢水一盞半煎至八分去滓溫服大青湯出聖濟總録治傷寒天行壯熱頭痛發瘡如豌豆遍身大青一兩山梔子仁犀角鎊各半兩上搗篩每服三錢水一盞入豉一百粒煎至七分去滓溫服牡丹湯出聖濟總録治傷寒熱毒發瘡如豌豆牡丹皮山梔子仁黃芩去黑心大黃銼炒木香麻黃去根節上等分銼如麻豆大每服三錢水一盞煎至七分去滓溫服化毒湯出聖濟總録治傷寒發斑豌豆瘡欲出甘草微炙一兩黃連去須微炒一分上銼如麻豆大每服五錢水一盞半煎至七分去滓溫服不計時候內消散出聖濟總録治傷寒熱病欲生豌豆瘡毒未出令不成用墨一分以酒二合磨令頓服之紫草飲出聖濟總録治傷寒熱病生疱瘡煩躁迷悶用紫草並根細銼二兩搗篩每服三錢水一盞煎至七分去滓不計時候溫服竹葉湯治傷寒時氣發瘡如豌豆煩悶苦竹葉切小麥各二兩石膏碎三兩上搗篩每服五錢水一盞半煎至一盞去滓溫服不計時候龍腦丸出聖濟總録治傷寒時疾發豌豆瘡赤瘡子未透心煩狂躁氣喘妄語或見神鬼用龍腦一錢細研旋滴豬心血和丸如雞頭實大每服一丸紫草湯化下少時心神便定得睡瘡復發透依常將息遂安黑散子出聖濟總録治傷寒熱病初出豌豆瘡三五個便服此令瘡不出用臘月豬糞以新砂瓶子盛瓦蓋口炭火燒令通赤取出安地上出火毒入乳鉢研細每服空心新汲水調一錢匕紫草湯出聖濟總録治傷寒發斑疹豌豆瘡紫草荊芥惡實等分上搗篩每服三錢水一盞煎至七分去滓溫服晉中書令王珉傷寒身驗方用樺皮濃煮汁冷飲主傷寒時行熱毒發瘡特良今之豌豆瘡也治傷寒發豌豆瘡未成膿出千金方用芒硝以豬膽相和塗瘡上立效出千金方痂落無痕仍用黃土抹上良木香散出活人書治瘡煩痛者青木香一兩薰陸香礬石丁香各一兩麝香半兩上㕮咀以水四升煮取一升半分再服熱毒盛者加犀角一兩無犀角以升麻代病輕者去礬石神驗治豌豆瘡初發覺欲作膿者方出千金方用煮大黃五兩服之愈傷寒鼻衄附論夫傷寒衄者鼻中血出者是也雜病衄者責熱在裡傷寒衄者責熱在表何以言之病源曰人之肝藏血肺主氣開竅於鼻血得熱則散隨氣上從鼻中出則為衄是雜病者責熱在裡也經曰傷寒脈浮緊不發汗因致衄者宜麻黃湯傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗頭痛者必衄宜桂枝湯以此觀之是傷寒衄者責熱在表也千金翼曰吐血有三種一曰肺疽二曰傷胃三曰內衄既吐血家謂之內衄其鼻中出血者可謂之外衄是經絡之血妄行也經絡熱盛陽氣擁重迫血妄行出於鼻則為衄經曰其人發煩目瞑劇者心衄衄乃解所以然者陽氣重故也又曰陽盛則欲衄陰虛小便難言衄為經中陽盛煩傷寒脈浮鼻中燥口乾但欲漱水不欲咽者是欲衄也經曰陽明病口乾鼻燥能食者則衄又有不應發汗而強發汗因致衄經曰少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治是也衄家雖為邪熱在經而又不可發汗經曰衄家不可發汗發汗則額上陷脈緊急直視不能眴不得眠前云桂枝湯麻黃湯治衄者非治衄也即是發散經中邪氣爾若邪氣不得發散擁盛於經逼迫於血則因致衄也即非桂枝麻黃湯專治衄也太陽病脈浮緊發熱身無汗自衄者愈是經中之邪隨而散則解矣故知衄者不得桂枝湯麻黃湯發散之也衄者若但頭汗出身無汗及汗出不至足者死黃帝又皆為下治之疾臨病之際審而治則不失矣歌曰太陽自衄病將解衄後仍將脈審詳有汗脈浮雖用桂緊而無汗用麻黃桂即桂枝湯也麻黃即麻黃湯也太陽病自衄及服諸表藥後自衄者為欲解也有汗脈浮再用桂枝湯無汗脈緊再與麻黃湯脈微者犀角地黃湯又黃芩芍藥湯茅花湯衄而渴欲飲水入即吐先服五苓散次竹葉湯陰證無熱汗有血少陰證但厥而無汗強發之必動血動血者死或出口鼻或出耳目也是謂下厥上竭聖濟總録論云傷寒鼻衄者由熱氣盛血液妄行蓋心主血肝則藏之肺主氣鼻則通之心肝為熱邪所傷血則隨氣行所以隨鼻出也昔人謂陽盛則衄者蓋陽盛則熱盛熱盛則宜衄故傷寒太陽證衄血乃解謂是故也至於陰病則不宜衄蓋陰證自無熱安得而衄故少陰病但厥無汗強發之必動血從口鼻耳目出者是謂下厥上竭為難治也歌曰陽明口燥若頭疼水不下咽得衄血瘀血停留定發狂病家外證無寒熱陽明身熱頭疼鼻衄脈微者犀角地黃湯外證無寒熱者必發狂此瘀血停留也輕者犀角桃仁承氣湯甚者抵當湯取盡黑物為度方茅花湯出聖濟總録治傷寒衄血不止茅花一把上銼碎以水三盞煎濃汁一盞分二服無花以根代之一方加燈心竹茹湯出聖濟總録治傷寒鼻衄不止青竹茹黃芩去黑心各一兩蒲黃伏龍肝各半兩上粗搗篩每服五錢水一盞半煎至八分去滓下藕汁一合攪勻食後溫服犀角湯出聖濟總録治傷寒鼻衄不止頭面俱熱犀角鎊大青甘草炙各三分升麻雞蘇莖葉小薊各一兩黃芩去黑心芍藥各一兩半生乾地黃焙朴硝各二兩上㕮咀如麻豆每服五錢水一錢半煎至八分去滓溫服阿膠湯出聖濟總録治傷寒鼻衄不止此是陽毒攻肺阿膠炙令燥黃芩去黑心各一分蔥白五寸連須豉一百粒干艾葉炒半兩上細銼分作二服每服用水一盞半煎至七分去滓下生地黃汁一合攪勻食後溫服黃芩湯出聖濟總録治傷寒鼻衄不止黃芩去黑心梔子仁大黃銼炒蒲黃荊芥穗各半兩上銼如麻豆大每服三錢水一盞半煎至八分去滓溫服不拘時候金黃散出聖濟總録治傷寒鼻衄不止鬱金甘草炙各一兩黃藥子黃柏去粗皮各一兩半上搗羅為細散每服二錢冷水調下不拘時以止為度鉤藤散出聖濟總録治傷寒頭痛壯熱鼻衄不止鉤藤桑根白皮銼馬牙硝各一兩梔子仁甘草炙各三分大黃銼炒黃芩去黑心各一兩半上粗搗篩每服三錢水一盞竹葉三七片煎至六分去滓下生地黃汁一合攪勻食後溫服竹茹湯出聖濟總録治傷寒鼻衄不止青竹茹雞子大一塊生地黃半兩拍碎上以水一盞半煎至八分去滓食後溫服羚羊角湯出聖濟總録治傷寒肺熱鼻衄不止羚羊角鎊犀角梔子仁麥門冬去心焙紫菀去苗毛各三分牛黃研玄參各一分黃耆人參甘草炙各半兩赤茯苓去黑皮一兩上粗搗篩每服五錢水一盞半煎至八分去滓食後溫服日二前胡湯出聖濟總録治傷寒內熱鼻衄痰壅吐逆前胡去蘆頭甘草炙白朮陳橘皮湯浸去白焙大腹皮各三分赤茯苓去黑皮旋覆花桔梗炒各半兩半夏湯浸七遍一分上粗搗篩每服五錢水一盞半生薑一棗大拍碎煎至八分去滓食後溫服發灰散出聖濟總録治傷寒鼻衄不止亂髮一團如碗火燒成灰麝香研半錢上同研極細每服一錢匕新水調下又取少許吹鼻中立瘥四生飲治傷寒衄血心胸煩滿生地黃汁三合生藕汁二合生薊汁一合生薑汁半合白藥子一分細末上和勻於銀石器中微溫過後分二服升麻湯出聖濟總録治傷寒鼻衄不止頭痛壯熱升麻雞蘇莖葉芍藥各一分青蒿犀角鎊各半兩芒硝三分上粗搗篩每服五錢匕水一盞煎至六分去滓下地黃汁一合食後溫服地黃飲出聖濟總録治傷寒鼻衄生地黃汁二合蜜二合上攪勻頓服加減柴胡湯出經驗良方治傷寒鼻衄柴胡去蘆八錢半夏薑製二錢半黃芩去心人參去蘆甘草炙各三錢加生熟地黃共半兩上㕮咀每服二錢水一盞半生薑二片棗一枚煎至七分去滓溫服大人倍加煎服滑石湯出本事方治傷寒衄血上用滑石末不以多少飯丸如桐子大每服十丸微嚼破新水咽下立止只用藥末一錢以飯少許同嚼下亦得老幼皆可服湯晦叔云鼻衄者當汗不汗所致其血青黑時不以多少乃得止且服溫和藥以調其榮衛才見血鮮急以此藥止之血溢湯治少陰病氣厥發衄者黃藥二兩甘草炙一兩上以水三升煮取一升去滓分溫再服治傷寒鼻衄肺間有餘熱故也血因熱自止不止用此方牡蠣二兩半石膏一兩六錢上治下篩酒服方寸匕日三四亦可蜜丸如桐子大用治大病瘥後小勞便鼻衄者苦參湯治衄鼻苦參三分黃連二兩梔子二七枚擘破大黃一兩地黃生幹一