蘆頭附子二兩炮去臍白芍藥一兩桂心二兩當歸一兩銼碎微炒陳橘皮二兩湯浸去白焙白朮二兩高良薑一兩銼上搗篩為散每服四錢以水一中盞入棗三枚煎至六分去滓不計時候熱服吳茱萸湯出聖惠方治霍亂多寒手足厥冷脈絶吳茱萸半升洗焙乾當歸切焙桂去粗皮芍藥三分細辛去苗葉木通銼甘草炙各半兩上㕮咀如麻豆每服五錢以水一盞酒半盞入生薑一片拍碎大棗二枚煎至一盞去滓溫服如氣痞加葛根半兩去棗一方有木香無木通無酒附子散出聖惠方治霍亂腹滿虛鳴氣逆手足俱冷附子炮去皮臍草豆蔻去皮桂心陳橘皮湯浸去白焙高良薑銼各半兩甘草炙微赤銼上搗篩為散每服三錢以水一中盞入生薑半分煎至六分不拘時候溫服人參散治霍亂吐瀉不定四肢逆冷大渴欲水人參三兩去蘆頭附子炮裂去皮臍甘草炙微赤銼白朮乾薑炮裂銼麥門冬去心各二兩上搗篩為散每服三錢以水一中盞煎至六分去滓不計時候熱服附子粳米湯出千金方治霍亂四逆吐少嘔多者中附子一枚粳米五合半夏半升大棗十枚乾薑甘草各一兩上㕮咀以水八升煮藥取米熟去滓分三服當歸散治霍亂嘔吐及下後腹中乾痛手足逆冷當歸微炒人參去蘆頭附子炮裂去皮臍以上各一兩乾薑甘草炙微赤銼各半兩上搗羅為散每服三錢以水一中盞煎至六分去滓不拘時候熱服甘草飲治主脾腎冷氣乘心痛悶吐利四肢逆冷或則煩痛病源云霍亂而吐大下後其腸胃俱虛乃至汗出其脈欲絶手足皆冷為四逆四逆者陰陽絶也甘草炙人參乾薑厚朴炙白朮各三兩上切以水五升煮取一升五合分三四溫服如人行八九里一服忌海藻菘菜桃李雀肉等桔梗湯出聖濟總録治霍亂吐利已定汗出厥冷四肢拘急腹中痛不解脈欲絶桔梗銼炒乾薑炮各一兩甘草炙附子炮裂去皮臍各二兩上銼如麻豆每服三錢以水一盞煎至七分去滓溫服四順附子湯出聖惠方一名加味姜附湯治吐瀉過多手足逆冷脈沉細氣少不語急服及霍亂轉筋肉冷汗出嘔厄生附子白姜炮人參甘草炒各一分上銼每服四錢水二盞空腹服腹痛加桂小便不利加茯苓仍用炒鹽尉臍或用姜附湯一方附子炮去皮臍下甚加龍骨腹痛不止加當歸香薷飲一名黃連飲出聖濟總録治霍亂吐瀉四肢厥冷香薷去根二兩半藿香去根焙二兩草烏頭浸切去皮臍曬乾二兩入鹽三兩同炒烏頭黃褐色去鹽不用黃連去須吳茱萸同炒二兩黃連去吳茱萸不用取二兩以水煎服驗通脈四逆湯一名姜附湯出十便良方治霍亂脈微欲絶或惡寒四肢拘急手足厥逆或吐利已定汗出而絶四逆不解甘草炙二兩乾薑炮三兩附子炮去皮臍二兩上銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服脈出即愈面赤者加蔥白三莖同煎腹痛去蔥白加芍藥二兩嘔加生薑一分切同煎咽痛去芍藥加桔梗並人參二兩吐利止為度若身疼痛不休者消息和其脈外傷寒論中又有療諸發熱霍亂者審取之忌海藻菘菜豬肉天南星散一名回陽散出危氏方治吐下四肢逆冷不省人事南星末二錢棗五枚姜五片上水煎極熱服之一方無生薑半夏湯出危氏方治吐下四肢逆冷不省人事半夏末三錢生薑汁少許上以熱湯點一服可效白礬末點服亦驗治霍亂吐瀉冷氣攻心腹痛四肢逆冷汗出出聖惠方用硫黃一兩細研如面以熱酒調下一錢回陽散出本草治吐瀉不止或致轉筋四肢發厥虛風不省人事服此四肢漸暖神識便省用天南星為末每服三錢入京棗三枚同煎八分溫服未省再服
