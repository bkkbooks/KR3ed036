body:
  text: 卷二百一霍亂門總論霍亂有三名一名胃反言其胃氣虛逆反吐飲食也二名霍亂言其病揮霍之間便致撩亂也三名走哺言其哺食變逆者也診其脈來代者霍亂之脈代而絶者亦霍亂而轉筋蓋由冷氣入於筋故也足三陰三陽之筋起於足指手三陰三陽之筋起於手指並循絡於身夫霍亂大吐下之後陰陽俱虛血氣虛極則手足逆冷而營衛不理冷搏於筋則筋為之轉冷入於足之三陰三陽則腳筋轉入於手之三陰三陽則手筋轉隨冷所入之筋而轉由邪冷之氣擊動其筋而移轉也經曰足太陽下血氣以日少則善轉筋善踵下痛者是氣少則易虛虛而風冷乘之故也診其左手關上脈肝也沉為陰陰實者肝實也實由擊動轉筋左手尺中名神門以候脈足少陰經也浮為陽陽虛者病苦轉筋霍亂之後煩躁臥不安者由吐下之後腑臟虛極陰陽未理血虛氣亂故血氣之行未復常度內乘於腑臟故煩躁而不得安臥也人生稟命以五臟為主夫臟者即是五行內為五行外為五味五行五味便宜扶抑所以春夏秋冬逆調理之食啖不可過度凡飲食於五臟相剋者為病相生者無他經曰春不食辛夏無食鹹季夏無食酸秋無食苦冬無食甘此不必全不食但慎其太甚耳諺曰百病從口生蓋不虛也四時昏食不得太飽皆能生病從夏至秋分忌食肥濃然熱月人自好冷食更無肥濃兼食果菜無節及逐餐眠臥冷水洗浴五味更相剋賊雖欲無病不可得也所以病故人自作之非關運也書曰非天絶人人自絶命此之謂也陰陽二氣壅而反戾揮霍之間變成吐利此名霍亂輕者腳多轉筋甚者遍體轉筋夏月伏暑亦令人吐利傷寒亦令人吐利當察其由施以治法大抵霍亂脈表浮洪者可治脈表微而遲氣少不語者不可治乾上坤下其卦為否陽隔陰而不降陰無陽而不升此否之所以痞而不通也人具此陰陽揮霍變亂搏結於中卒然或瀉而不吐或吐而不瀉大抵心腹攪悶煩痛其視天地不交之否異乎否乎霍亂之證心腹卒痛嘔吐下利發熱憎寒頭痛眩暈先心痛則先吐先腹痛則先瀉心腹俱痛則吐瀉俱作甚則轉筋頽頓特反掌間蓋陽明屬胃以養宗筋暴吐暴下津液驟亡宗筋失其所養故手足攣急甚則舌卷囊縮危甚風燭矣然亦何以致此哉曰胃伏暑毒露臥早濕當風取涼風冷邪氣入於腸胃加以嗜好肥腥飲啖生冷居處不節激而發焉於是邪正相干中脘節閉氣不得通吐利暴作所謂脾受賊邪水來勝土者此也治法藿香正氣散加藿香生薑為主不惟可以溫散風邪亦可以調理吐瀉其若傷暑所致未可遽投香薷散沉冷之劑自合先治中脘如二陳湯橘皮半夏湯等次則以香薷溫服散暑解煩昧者指為脾胃虛冷遽用人參白朮訶子肉豆蔻之屬以壯胃澀腸不思風冷未散輒以參朮訶蔻攔補寒邪邪氣得之愈盛愈作縱得淹延或下利或久瀉或腹脹虛浮或中滿不食變證將百出矣抑猶有說焉濕霍亂死者少乾霍亂死者多許仁則嘗有是言矣蓋謂所傷之物因吐利而出泄泄盡則止猶可幸免若上不得吐下不得利所傷之物壅閉正氣關隔陰陽躁攪喘脹其能生乎則知揮霍撩亂如人披髮交爭必有以俟之可也古方用來復丹正取疏利之意但多則太溫莫若薑湯下香蘇飲為愈霍亂氣息少力不欲言者不治又曰治嘔吐莫先於助胃既助胃而復嘔吐者中脘挾風寒也治喘嗽莫先於調肺既調肺而復喘嗽者風寒在表或在裡也瀉利之疾固腸澀下終不作效非腸胃間留蓄風寒邪氣之所致乎故必隨其感受解散於其先則某病某藥庶乎其對證矣解散風寒不換金正氣散為上其間增益則青皮官桂良薑乾薑撮用最良若欲其清解則紫蘇荊芥柴胡乾葛等藥酌量可也惟暑亦然每每隱伏作病或為焦煩或為腹痛或泄利不止暑中類多有之治霍亂倉卒之證宜於臍中灼艾及用蓼花一把煎湯泡洗次投以姜附理中湯之類其脈洪大者易治脈微囊縮舌卷者難治又有霍亂而不吐者類吐不吐類利不利頃刻之間便致悶絶當多灌鹽湯引其必吐宿食飧盡然後以嚴氏加減理中湯治中湯款調之既愈之後煩熱多渴者以麥門冬湯調之凡諸霍亂忌與米食飲胃中得米即吐不止但與厚朴葛根飲若冬瓜葉飲但沾漬咽喉而不可多與若服湯時隨服吐者候吐定乃止診脈絶不通以桂合葛根為飲吐下心煩內熱汗不出不轉筋脈急數者可犀角葛根為飲吐下不止發熱心煩欲水可以飲米粉汁為佳若不止可以葛根薺苨飲服之問曰病者發熱頭痛身體痛惡寒而復吐利當屬何病師曰當為霍亂霍亂吐利止而復發熱也傷寒其脈微澀本是霍亂今是傷寒卻四五日至陰經上轉入陰必利今反不利者不可治也霍亂吐利者多必轉筋不渴即臍上築霍亂而臍上築者為腎氣動當先治其築治中湯主之去朮加桂去朮者虛故也加桂者恐作奔豚也霍亂而臍上築吐多者若下多者霍亂而驚悸霍亂而渴霍亂而腹中痛嘔而吐利欲得水者皆用治中湯主之霍亂吐利附論夫霍亂吐利者以三焦氣不升降而清濁相干於腸胃間若先心痛則吐先腹痛則利心腹並痛則吐利俱發治此者多以中焦為本中焦既和則清濁自分而吐利止矣諸惡風寒惡者有汗無汗重暑煩毒皆外所因蓋傷風則惡風有汗傷寒則惡寒無汗胃濕則重暑則熱煩此雖常論揮霍之間倉卒不辨遂致錯誤亂經反常為害不淺諸大喜傷心則氣散大怒傷肝則氣逆憂傷肺則氣卻驚傷膽則氣亂涎氣槃郁聚結臟腑痞隔不通遂致滿悶隨其勝復必作吐利當從內所因治之諸飽食膾炙恣餐乳酪水陸珍品脯鹽雜淆快飲寒漿強進石酒耽縱情欲不節以胃為五臟海因脾氣以運行胃既䐜脹臟復停凝臟氣不行必致郁發遂成吐利當從不外內因治之霍亂轉筋者以陽明養宗筋屬胃於大腸今暴吐津液頓亡外傷四氣內積七情飲甘膩致閉諸脈枯削於筋宗筋失養必致攣急甚則卵縮舌卷為難治又云霍亂吐利後煩渴者以陰陽反戾清氣干濁水與谷並小便閉澀既走津腎必枯燥引水自救煩渴必矣又云凡外所因必自經絡傳入臟腑須以脈證推其所因隨經絡調之則盡善矣假如傷寒在太陰經當用四逆湯少陰經當用麻黃附子湯厥陰經當用理中湯若在太陽經還用麻黃湯陽明經養胃湯少陽經小柴胡湯風暑濕亦然風則桂枝湯暑則香薷飲五苓散濕則苓朮湯滲濕儒門事親云凡嘔吐而瀉病名曰何也內經熱論云此乃轉筋霍亂之證也何氣使然此乃邪氣在於中焦使陰陽二氣不能升降其證先心痛則吐先腹痛則瀉心腹俱痛則吐瀉並作致使揮霍之間自然撩亂此證喜氣涼之物可用冰水冷調益元則愈矣大忌熱物轉筋之病治之奈何經曰勞者溫之溫者溫存之意也又一法生薑湯益元散白朮散禹功散加冰沉細細呷之渴未止者頻頻飲之如無冰新汲水亦得用之大忌白粥米湯桂附種種之燥藥不可服之服之必死如無藥處可服地漿者掘地作坑注新水於其中間渾旋旋取潑清者飲三五盞立愈方杜若丸出千金方治霍亂久將遠行預備杜若藿香白朮橘皮吳茱萸乾薑人參厚朴木香雞舌香瞿麥桂心薄荷女菀茴香上等分為末煉蜜為丸如梧桐子大酒下二十丸薺苨飲出千金方因霍亂吐下服諸熱藥吐下得止因即變虛心煩手足熱口燥欲得水嘔逆迷悶脈急數者及時行熱病後毒未盡因霍亂吐下仍發熱心懊欲裂者以此解之薺苨人參厚朴知母栝蔞根茯苓犀角藍子枳實桔梗橘皮葛根黃芩甘草各二兩上㕮咀以水一斗煮取三升分三服竹葉湯治霍亂吐利已服理中四順等湯不解者竹葉一握小麥一升生薑十塊甘草人參附子芍藥各一兩橘皮當歸桂心各二兩白朮三兩上㕮咀以水一斗煮竹葉小麥取八升去滓下藥煮取三升分三服上氣加茱萸半升即瘥理中四順湯皆大熱若有熱宜竹葉湯木瓜散出聖惠方治霍亂吐利冷氣攻心腹木瓜一兩乾者艾葉五錢當歸半兩銼微炒木香半兩桂心半兩訶黎勒三分煨用皮肉蔻半兩去殼人參半兩去蘆頭白朮三分陳橘皮一兩湯浸去瓤焙厚朴三分去粗皮塗生薑汁炙香熟上為散每服三錢以水一鍾煎至五分去渣不計時稍熱服之人參湯出聖惠方治毒冷霍亂吐利煩嘔轉筋肉冷汗出手足指皆腫喘垂死絶音不出百方不效脈不通者服此湯取瘥乃止隨吐續服勿止並灸人參附子炮裂去皮臍茯苓去黑皮厚朴去粗皮生薑汁炙甘草炙陳橘皮湯泡去白瓤當歸切焙葛根銼桂心去粗皮乾薑各三兩炮過上㕮咀以水七升煮取汁二升半分三服不拘時一方有生薑虎掌丸出千金方治霍亂永不發虎掌薇銜各二兩枳實附子人參檳榔乾薑各二兩厚朴六兩皂莢三寸白朮五兩上為末蜜丸如梧桐子大每服二丸酒下日三服一方用枳殼去枳實武德行尼名淨明患此已久或一月一發或一月再發將至死時在朝太醫院許甘巢之徒亦不能識余以此治之丁香丸出聖濟總録治飲食過傷吐瀉丁香白朮縮砂仁木香肉豆蔻去皮乾薑炮桂去粗皮三分陳橘皮去白焙一兩紅豆蔻去皮五錢枳殼去瓤麩炒半兩上為末煉蜜為丸如梧桐子大每服三十丸煎生薑木瓜湯嚼下丁香散出十便良方治霍亂吐利不止丁香桂心白朮各半兩訶黎勒煨用皮厚朴去粗皮生薑汁炙高良薑銼附子炮裂去皮臍臍三分陳橘皮湯浸去白焙木瓜乾者各一兩上為細散不計時分粥飲調下二錢乾薑湯出聖濟總録治霍亂吐利心腹疼痛氣逆手足冷乾薑炮甘草炙桂去粗皮附子炮裂去皮臍草豆蔻去皮木香高良薑炮肉豆蔻去殼麩煨乾木瓜各半兩上銼如麻豆每服三錢以水一盞煎至七分去滓溫服七氣湯出危氏方治憂思喜怒恐悲驚七氣鬱發致五臟互相刑剋陰陽反戾揮霍變亂吐利交作寒熱暈眩痞滿咽塞半夏湯洗五兩厚朴姜炙桂心各三兩茯苓白芍藥紫蘇葉橘皮各二兩人參二兩上為散每服四錢水一盞半姜七片棗二枚煎至七分去滓空腹服白朮湯治霍亂吐利白朮三兩甘草炙附子炮裂去皮臍人參各一兩桂去粗皮當歸切焙陳橘皮去白焙各二兩上銼如麻豆每服五錢以煮小麥汁一盞入竹葉一握生薑半分拍碎煎至八分大豆飲出聖濟總録治霍亂大豆香薷蘆根枇杷葉拭去毛炙竹茹前胡去蘆頭陳橘皮去白焙上等分㕮咀每服五錢以水一盞半入生薑一分切煎取一盞去滓溫服香薷丸出聖濟總録治冷熱不調霍亂吐瀉香薷一兩半白扁豆炒一兩丁香皮三兩藿香去梗零陵香各半兩益智仁一分木香一兩上為末麵糊為丸如梧桐子大每服二十丸食前溫紫蘇湯下治要除濕湯出直指方半夏曲川厚朴制蒼朮炒各二兩藿香葉陳皮茯苓赤者各一兩甘草炙七錢上銼散每服四錢姜七片棗二枚煎服霍亂而不吐者加桂吐而不瀉者去蒼朮加丁香吐瀉俱作兼腹痛者只加桂一方無茯苓散利其小水一方有木香酸棗仁湯出危氏方治霍亂吐下增劇虛勞煩擾奔氣在腦中不得眠發寒熱頭痛暈悶酸棗仁炒一兩三分人參桂心知母茯苓各三錢石膏煅半兩甘草炙二錢上銼散每服四錢水一盞半姜三片棗一枚煎七分去滓食前服理中散出十便良方治霍亂轉筋吐利不止青木香六分桂心八分炙厚朴八分白朮八分乾薑十分炮附子六分炮甘草八分炙上搗篩為散每服四錢已人行六里不定更服一錢已瘥忌海藻菘菜生蔥理中丸出聖濟總録治冷熱不調霍亂吐利宿食不消人參白朮高良薑乾薑桂去粗皮各六兩上為末煉蜜和丸如梧桐子大每服三十丸空心米飲下日再服一方有甘草無白朮除濕湯出危氏方治滿身腫者或多食生冷揮霍之間吐瀉俱作半夏湯洗一兩藿香葉五錢去土厚朴去粗皮切薑汁炒用一兩陳皮五錢去白甘草三錢蒼朮米泔浸一兩切炒赤上銼散每服四錢水一盞半生薑七片紅棗二枚煎熱服不拘時候人參湯療霍亂卒吐下不禁脈暴數者人參茯苓葛根橘皮甘草炙麥門冬去心各二兩上切以水五升煮取二升去滓溫服分三次服忌海藻菘菜醋等高良薑散治霍亂冷熱不調吐利不止高良薑銼木瓜乾者香薷以上各一兩梨葉一兩五錢人參三分去蘆頭上為散每服三錢以水一盞煎至七分去滓溫頻服胃氣丸出危氏方治憂思過度脾肺氣閉聚結涎飲留滯腸胃氣鬱於陰寒凝於陽陰陽反戾吐利交作四肢厥冷頭目眩暈或復發熱兼治老人胃寒大便反祕妊娠惡阻全不納食硫黃不拘多少豬腸內縛兩頭以米泔酒童子小便各一碗煮乾一半取出洗穢氣搽干稱十兩半夏湯洗去滑稱五兩白茯苓人參各一兩石膏一分煅一法用硫黃者上為末生薑自然汁炊餅糊丸如梧桐子大每服五十丸至百丸空心米湯入少生薑汁下紅丸子出三因方治脾胃虛冷飲食不節宿食留飲聚癖腸胃或因氣不調沖冒寒濕忽作霍亂吐利並作心腹絞痛腸胃纏刺疲苶不勝蓬朮銼二兩胡椒一兩三稜銼稱二兩米醋煮一伏時青皮三兩炒阿魏一分上為末醋化阿魏陳米粉糊為丸如梧桐子大礬朱為衣每服百丸二百丸煎生薑甘草湯下太白丸出指南方治霍亂吐利分利陰陽玄明石或名玄精石半夏各一兩硫黃三錢上為末麵糊丸如梧桐子大每服三十丸米飲下脾厥吐瀉霍亂出指南方附子炮裂去皮臍姜甘草炙豉各半兩上用水一升葉末二錢棗七枚姜一錢煎一盞溫服草豆散治霍亂水利不止吐不下食兼煩渴草豆蔻去皮丁香各半兩黃連一兩去須炒上為散每服三錢以清水一鍾入黑豆五十粒生薑半分煎至六分去滓不計時候溫服人參湯出聖濟總録治霍亂吐下人參乾薑炮陳橘皮去白焙桂去粗皮各一兩甘草炙半兩上搗篩每服三錢用水二盞入棗三枚擘煎取一盞去滓熱服連菖蒲切焙高良薑各一兩甘草半兩炙白朮半兩青橘皮去白焙一兩上為粗末每服三錢以水一盞煎十數沸傾出放溫頓服白丸療霍亂嘔吐及暴利半夏三兩洗附子四兩炮乾薑四兩炮人參三兩桔梗二兩上作散臨病和之若吐利不止者以苦酒和之飲服二丸如梧子大若不瘥復耐藥者隨意加服否者以蜜和丸忌豬羊肉餳霍亂證出拔萃方本自胃經或因寒飲或因飲水或寒暑毒或濕氣冷熱不調水火相干陰陽相搏故轉筋攣痛經絡亂行暴熱吐瀉中焦胃氣所主也察其色脈隨經標本此治霍亂吐瀉之法也如頭痛發熱邪自風寒而來中焦為熱相乘之分邪稍高者居陽分則熱熱多飲水者五苓散以散之如邪稍下者居陰分則為寒寒多不用水者理中丸以溫之如吐利後有表者解之汗出厥逆者溫之如既吐且利小便利大汗出內外熱者亦溫之如此下後汗出厥逆不解脈欲絶者四逆等湯治之如吐瀉轉筋身熱脈長陽明本病也宜和中四君子湯平胃散建中湯四君子湯茯苓白朮人參黃耆各一兩上銼如麻豆大每服一兩水三盞姜五片煎至一盞去滓溫服如吐瀉轉筋頭痛自汗脈浮者四君子湯加桂五錢主之如吐瀉轉筋頭痛無汗脈浮者四君子湯加麻黃五錢主之如吐瀉轉筋脅下痛脈弦者宜建中加木瓜柴胡湯平胃加木瓜五錢亦可也桂枝三兩半芍藥二兩甘草一兩膠飴半升生薑三兩大棗六枚木瓜五錢柴胡五錢上銼如麻豆大每服一兩水三盞半煮至一盞半去滓下膠飴兩匙煎化服吐瀉轉筋腹中痛體重脈浮而細者宜四君子加芍藥高良薑湯四君子四味各一兩芍藥良薑各五錢同前煎服如吐瀉霍亂四肢拘急脈沉而遲者宜四君子加姜附厚朴湯四君子四味各一兩生薑附子厚朴炮各三錢如吐瀉轉筋四肢厥冷建中加附子當歸湯桂枝一兩當歸三錢芍藥二兩甘草五錢膠飴半升生薑一兩附子三錢炮大棗六枚同前煎服理中丸出肘後方療霍亂吐利宿食不消白朮乾薑炮甘草炙人參大麥糵熬令黃各二兩上搗篩蜜和丸以水飲服十五丸如梧子大日再服稍加至二十丸忌海藻菘菜桃李雀肉等亂髮湯出聖濟總録療霍亂諸藥不能療亂髮一握如雞子熬令焦小蒜十四枚附子一兩炮甘草三錢炙上切以水六升煮取三升去滓溫分三服忌豬肉海藻菘菜丁香散出聖濟總録治霍亂不止丁香木香肉豆蔻去殼各一兩上為細末每服二錢以白粥飲調下熱服和氣煎出聖濟總録治霍亂吐瀉冷熱不調胡椒緑豆各一兩人參一分上生搗羅為散每服三錢以水一盞煎五六沸去滓熱服厚朴散出聖惠方治霍亂吐瀉不止厚朴一兩半去粗皮塗生薑汁炙令熟甘草半兩炙赤粗銼肉豆蔻二分去殼黃連三分去須上為散每服三錢以水一鍾煎至五分去滓溫頻服治霍亂下利吐方出聖惠方人參去蘆頭三分厚朴半兩去粗皮塗生薑汁炙令香兔骨一兩炙令黃陳橘皮二分去白湯浸焙上搗篩為散每服三錢以水一鍾入生薑半分煎至五分去滓不計時候溫服藿香烏藥散出百選方治霍亂藿香葉烏藥香附子炒各半兩甘草二錢半炙上為粗末水一大鐘煎至七分溫服藿香湯出聖濟總録治霍亂吐利不止藿香去梗半兩丁香一分白芷縮砂去皮各一兩上粗搗篩每服二錢以水一中盞煎至六分去滓熱呷不計時候正胃湯出聖濟總録治霍亂不止枇杷葉去毛炙桂去粗皮厚朴去粗皮薑汁炙陳橘皮去白焙各半兩上為粗末每服二錢用水一盞入生薑三片煎至六分去渣熱服不拘時金液丹治霍亂吐瀉硫黃一兩胡椒五錢黃蠟一兩上為末熔黃蠟為丸如白豆大每服一丸涼水送下不止再服一丸香薷丸一名香薷湯出如宜方治陰陽不順清濁相干氣射中焦名霍亂因飽食所傷然也香薷一兩半厚朴二兩黃連二兩同厚朴入生薑四兩同拌勻炒令紫色上為末每服三錢水一盞酒半盞同煎去滓井中沉冷頓服不犯鐵器兼治吐利腹中痛大渴煩躁四肢逆冷汗自出筋轉痛不可忍者高良薑湯治霍亂冷熱不調吐利杜梨枝葉三兩良薑五兩木瓜一枚上為末水六升煮取二升絞出滓空腹溫三服一方有藿香葉無杜梨理中丸出聖惠方治惡寒無汗過食生冷或飲寒漿霍亂吐下脹滿飲食不消心腹疼痛胸膈痞塞或暈緩弱脈微臥起不安手足躁擾水漿不下此由冷熱失和邪正相干清濁不分陰陽錯亂喜冷者因熱惡冷者因寒其脈弦大人參去蘆頭乾薑炮白朮去蘆頭甘草炙各三兩上銼散每服四大錢水一盞煎至七分去滓食前服遠行防霍亂煉蜜為丸如梧桐子大每服三五丸如作末每服方寸匙酒調下亦得若轉筋者加石膏煅三兩若臍上築者腎氣動也去朮加桂心四兩腎惡燥故去朮恐作奔豚故加桂吐多者去朮加生薑三兩下多者復用術悸者加茯苓二兩渴欲得水加朮合煎成四兩半腹滿加人參合煎成四兩半若寒者加乾薑合煎四兩半腹滿去朮加厚朴附子各半兩病退而不食者加白豆蔻橘紅麥糵各半兩服藥後復熱服粥一杯微自溫覆勿發揭衣被噦則加丁香吐利止身體痛不休者審其原因以和解之如初因傷風用桂枝之類所謂治有本也香蘇散治身熱無汗霍亂吐下臉赤多痰加藿香葉生烏藥烏梅生薑煎甚妙一方吐瀉不止身冷汗出無脈者可服漿水散兼桂枝湯白朮湯木瓜湯出危氏方治霍亂吐下已舉體轉筋入腹則悶絶木瓜幹一兩去瓤吳茱萸半兩湯洗茴香二錢半甘草炙一錢上銼散每服四錢水一盞半生薑三片紫蘇十葉食鹽一撮煎至七分去滓食前服仍研生蒜貼心下腳心上又用姜附湯清煎沉冷服之效熱因寒用之法也訶子散治老幼霍亂吐利一服效一方無鹽煎良薑飲治霍亂神效良薑藿香陳皮各一兩甘草炙三分上銼細每服三錢水煎服白龍骨丸治吐瀉白龍骨白善白石膏白礬各等分上為末滴水丸梧子大入乾鍋火煅紅為度每服五丸至十丸米飲湯下石膏是軟者北人謂之寒水石故可煅韓御帶施此藥甚驗四逆加豬膽湯出肘後方療霍亂吐利而汗小便復利或下利清穀裡外無熱脈微欲絶或惡寒四肢拘急手足厥逆甘草二兩炙乾薑半兩炮附子一枚生去皮破八片豬膽汁半合上切以水二升煮取一升四合溫分再服無豬膽以羊膽代之刪繁千金經心録同強人可與大附子一枚乾薑至三兩若吐之後吸吸少氣者及下而腹滿者加人參一兩諸藥皆減為一兩如厥者亦宜與理厥逆人參湯佳忌海藻菘菜豬肉等扁豆湯療霍亂吐利扁豆葉切一升香薷葉切一升木瓜切一枚乾薑切一兩上以水六升煮取二升五合絞去滓分溫三服服別相去如人行六七里並無所忌四神丸主霍亂冷實不除及痰飲百病無所不主乾薑桂心附子炮各一兩巴豆六十枚去心皮熬研如膏上為末蜜和為丸如小豆大飲服二丸取快下不下又服一丸忌生蔥野豬肉蘆筍治霍亂初覺吐利方出聖惠方香薷一兩小蒜一兩厚朴一兩去粗皮塗生薑汁炙令香熟上細銼令勻每服半兩以水一大盞入生薑半分煎至七分去滓溫服不計時服之厚朴散出仁存方治霍亂吐利厚朴二兩炙裂肉豆蔻半兩草豆蔻仁半兩上為散每服三錢以水一盞鹽一捻煎至八分去滓熱呷再服立止婦人不用鹽姜二片煎陳橘皮湯出聖濟總録治霍亂吐利陳橘皮甘草炙一兩白朮三兩上搗篩每服五錢以水一盞半竹葉十片生薑半分小麥汁半盞煎至八分去渣溫服日三胡椒湯一名豆椒散出危氏方治霍亂吐利諸藥不納兼治中暑暴下胡椒七粒生緑豆二十一粒上為末煎木瓜湯鹽湯調下一錢一方無木瓜用新汲水煎湯下治中湯治飲食居處不節以致霍亂本方青皮陳皮乾姜能散風寒蘇合香丸用枳殼一方木瓜半分煎湯調下治乾霍亂不吐不瀉氣痞於中心腹絞痛此症最惡青金丹一名的寄丹出十便良方治霍亂吐瀉不止及轉筋諸藥不效者一粒治一人及治一切吐逆翻胃不問虛實冷熱並皆治之硫黃一兩研水銀八錢以銚子內炒柳木篦不住手攪更以柳蘸以候頻頻灑候如鐵色法如青金塊方成刮下再研如粉留少半為散余以粽子尖三個醋約半盞研稀稠得所成膏和丸如雞頭實大朱研為衣每服一丸丁香湯磨化下熱服丁香湯調下一錢傷寒陰陽乘伏用龍腦冷水磨日三二服或云以木瓜湯調散並米飲亦得吳茱萸湯一名四片金出衛生寶鑑方治冒暑伏熱腹痛作瀉或利並飲水過度霍亂吐瀉其證始因飲冷或冒寒或忍飢或大怒或乘舟車傷動胃氣令人上吐下瀉吐瀉並行頭足轉筋四肢逆冷用藥遲慢須臾不救命在頃刻之間吳茱萸木瓜食鹽各半兩上同炒令焦先用瓷瓶盛水三升煮令百沸入藥煎至二升以下傾一盞冷熱隨病人服之卒無前藥用枯白礬為末每服一大錢沸湯調服更無前藥用鹽一撮醋一盞煎至八分溫服或鹽梅鹹酸等物皆可服劇本方以鹹酸二物煮香瓜湯出百選方治吐瀉不止木瓜藿香良薑上等分為散每服三錢以水一盞煎去滓熱服訶子丸出楊氏家藏方治大人小兒瀉訶子一兩藿香一兩肉豆蔻二個上為末蜜丸隨大小米飲下豌豆香薷散出聖惠方治霍亂吐利豌豆三合香薷三兩上為末以水三大盞煎至一盞半去滓服溫三服扁豆散出千金方治霍亂扁豆香薷各一升上以水六升煮取二升分服單用一味亦得桑葉湯出聖惠方治霍亂吐瀉不定桑葉一握扁竹一握上銼以水二大盞煎至一大盞去滓溫服分為三服如人行三里再服水浸丹出三因方治伏暑傷冷冷熱不調霍亂吐利口乾煩渴黃丹一兩分炒巴豆二十五個去皮心上同研勻用黃蠟熔作汁和為丸如梧子大每服五錢以水浸少