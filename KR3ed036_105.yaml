body:
  text: 卷一百五諸風門風氣附論夫風氣之狀有冷有熱冷則厥逆熱則煩惋蓋肺者生氣之原乃五臟之華蓋主通行陽氣循於皮膚分肉之間熏於盲膜散於胸腹以拒外而溫內若其氣虛則風邪因而傷之也或遇陰氣勝則四肢厥逆而為風冷遇陽氣勝則心神煩惋而為風熱二者皆因體虛受風氣能鼓作故均通之風氣也方枇杷飲一名枇杷煮散廣南四時攝生論治三焦風壅五臟虛弱遍身風氣勞悶手腳風毒氣寒熱煩躁通心肺健脾胃益腎臟正元氣止逆進食枇杷葉炙去毛木香木通銼大腹皮銼訶黎勒皮各二兩桔梗銼炒五味子厚朴去粗皮生薑汁炙鱉甲去裙襴醋炙白芷防風去叉茯苓去黑皮當歸澤瀉京三稜煨銼各半兩白朮藿香葉人參各一兩一分芍藥甘草炙銼枳殼去瓤麩炒牡丹皮知母焙各一分半夏湯洗七遍切焙一兩前胡去蘆頭上粗搗篩每服四錢匙水一盞半入生薑三片大棗一枚擘破煎至八分去滓熱服空心食前服如要作藥粥吃用時用水一升粟米一匙藥末二錢候熟次下藥末同煎至五分帶熱服之天麻防風丸一名靈砂丹治一切風氣烏蛇散出聖濟總録治一切風氣烏蛇酒浸去皮骨炙三兩肉豆蔻五枚去皮白茯苓去黑皮檳榔人參當歸切焙桂去粗皮天麻牛膝酒浸切焙甘草炙銼白附子炮麻黃去根節芎藭羌活去蘆頭藁本去苗土附子炮裂去皮臍各半兩細辛去苗葉一分乾蠍去土炒一兩白芷半兩防風去叉半兩白蘚皮一分木香半兩丹砂研一分麝香研二錢上除研者外搗羅為末再同研令勻細每服一錢匙蔥白蠟茶清調下大治虛風氣上攻兼進飲食常服只用蠟茶調下大段風涎手足不隨𤸷麻用薄荷酒調下八寶回春湯出危氏方治一切諸虛不足風疾血氣交相攻滯脈絡拘急攣拳氣不服降痰中疼痛痰涎壅盛脾胃不和飲食不進此藥去風和氣血脈大有神效凡治風不專用風藥攻之愈攻則急甚服此輕者一月重者二三月自然愈矣且無再作夫血氣和平營衛調順則風證不攻而自去矣附子炮人參麻黃去節黃芩防己香附子去毛杏仁去皮川芎當歸陳皮防風桂乾薑熟地黃生乾地黃各一兩茯神一兩半白芍藥五兩沉香川烏炮各半兩半夏一兩半白朮一兩天台烏藥半兩黃耆三兩甘草一兩上同銼散每服三錢水一盞半薑三片棗一枚同煎空心通口服常服效此方乃王翰林經進奉旨頒行而謝子充少年感風疾得此愈大通散出聖濟總録治風氣冷熱不調四肢厥逆心神煩惋白花蛇酒浸去皮骨炙天麻赤箭防風去叉藁本去苗土厚朴去粗皮生薑汁炙海桐皮銼萆薢桂去粗皮杜仲去粗皮炙銼木香茵芋切焙當歸切焙甘草炙銼威靈仙去土羌活去蘆頭白附子炮蔓荊實菊花郁李仁虎骨醋炙白芷乾蠍炒各等分上為散每服二錢匙溫酒調下空心食前臨臥日三服加味順氣散治風氣南星枳殼防風川芎殭蠶全蠍木香少許白朮白茯苓去皮當歸青皮去白木香蓬朮陳皮去白天台烏藥人參少許甘草白芍藥上各等分為㕮咀生薑三片棗一枚煎服香枳丸出聖濟總録治風氣利胸膈及心腹諸疾木香枳殼去瓤麩炒羌活去蘆頭乾薑炮桂去粗皮人參陳橘皮湯浸去白焙芎藭甘草炙銼白朮附子炮裂去皮臍京三稜煨銼大黃蒸過切焙各半兩肉豆蔻去皮一分檳榔銼一兩獨活半兩牽牛子淨淘揀焙乾一斤取粉半斤別入上除牽牛子外搗羅為末瓷盒收勿泄氣每要使時旋稱藥末一兩使牽牛子粉半兩合和研勻煉蜜和丸如梧桐子大每服二十丸至三十丸蔥白蠟茶下生薑湯溫酒亦可臨時更看虛實加減服婦人血風勞氣心腹脹痛小兒疳痢時疫癥瘕皆宜服之靈寶丸出王氏博濟方治風氣攻作陰盛則厥逆陽盛則煩惋天麻烏蛇酒浸去皮骨炙天南星各二兩附子炮裂去皮臍白附子芎藭白殭蠶微炒蔓荊實乾薑炮桂去粗皮各一兩麻黃去根節二兩三分防風去叉一兩當歸切焙三分龍腦研麝香研各一分上為末煉蜜和丸如雞頭大以丹砂末為衣每服一丸酒調化下如有急風癱緩薄荷湯下一二丸衣覆出汗立效防風丸出聖濟總録治風氣肢節疼痛四肢少力頭痛煩悶防風去叉桔梗銼炒丹砂研各二兩天麻細辛去苗葉獨活去蘆頭秦艽去苗土芎藭木香各一兩天南星用牛膽制由跋炮各一兩半甘草炙銼茯苓去黑皮各半兩藿香葉三分上研為末煉蜜和丸如雞頭大每服一丸荊芥湯嚼下食後臨臥服羌活散一名羌活丸治風氣不調頭目昏眩痰涎壅滯遍身拘急及風邪寒壅頭痛項強鼻塞聲重肢節煩疼天陰風雨預覺不安出御藥院方前胡去蘆羌活去蘆麻黃去根節白茯苓去皮川芎黃芩甘草蔓荊子去白皮枳殼去瓤麩炒細辛去苗石膏別研菊花去梗防風去蘆各一兩上為末入石膏研勻每服二錢水一大盞入生薑三片薄荷三兩葉同煎至七分稍熱服不拘時候一方麵糊為丸硃砂為衣生薑湯下檳榔丸一名木香丸治風氣調營衛利胸膈清頭目化痰涎明視聽消積滯出聖濟總録檳榔銼大黃銼炙各三兩陳橘皮湯浸去白焙木香附子炮裂去皮臍人參各一兩芎藭羌活去蘆頭獨活去蘆頭桂去粗皮各半兩京三稜煨半兩肉豆蔻六枚去皮上為末每用此末二兩別搗牽牛子取細末一兩和勻煉蜜為丸如梧桐子大每服十丸至十五丸臨臥生薑湯橘皮湯下木香丸出聖濟總録治風氣木香枳殼去瓤麩炒檳榔銼各一兩半芍藥防風去叉黃耆銼牛膝酒浸切焙茯苓去黑皮各一兩一分大黃三兩訶黎勒皮一兩三分重附子炮裂去皮臍一兩一分桂去粗皮各一兩上為末煉蜜丸如梧桐子大每服十五丸酒下日二漸加至二十丸以知為度槐膠丸出聖濟總録治風氣肢節疼痛遍身瘙癢麻木頭目昏痛咽膈煩滿槐膠二兩天麻牛膝酒浸切焙各一兩蔓荊實半兩何首烏去黑皮一兩甘草生銼一兩半人參半兩生乾地黃焙防風去叉各一兩槐花炒菊花各三分上為末用麵糊和丸如梧桐子大以丹砂為衣每服十五丸至二十丸荊芥薄荷湯下不計時候服紫蘇木通湯出聖濟總録治體虛受風因氣鼓作名為風氣冷則厥逆熱則煩惋紫蘇莖銼焙木通銼焙桑根白皮銼焙青橘皮湯去白焙各一兩荊芥穗焙獨活去蘆頭銼木瓜去瓤切焙蘹香子根銼炒羌活去蘆頭銼各半兩枳殼去瓤麩炒二兩大腹銼二十枚並皮用上㕮咀每服五錢匕水二盞生薑一分蔥二莖同煎至一盞去滓溫服空心日午臨臥各一黃耆丸出聖濟總録治風氣有熱煩惋頭面生瘡黃耆銼防風去叉地骨皮枳實去瓤麩炒各一兩羌活去蘆頭苦參當歸切焙升麻甘草炙銼各半兩大黃銼炒半兩上為末煉蜜和丸如梧桐子大每服十五丸食後溫荊芥湯送下仙茅丸出聖濟總録治風氣凝滯身體疼痛拘急腰腳沉重仙茅米泔浸去赤汁焙威靈仙去土羌活去蘆頭青橘皮湯浸皮白焙白牽牛炒白茯苓去黑皮各一兩薑黃白朮蒼朮米泔浸一宿竹刀切作片子焙各半兩上為末煉蜜和丸如緑豆大每服十丸空心鹽湯下八風散出醫方大成治風氣上攻頭目昏眩肢體拘急煩疼或皮膚風瘡癢痛及治寒壅不調鼻塞聲重藿香去土半斤白芷前胡去蘆各一斤黃耆去蘆甘草人參去蘆各二斤羌活去蘆防風去蘆各三斤上為細末每服二錢水一中盞入薄荷少許同煎至七分去滓食後溫服蠟茶清調一大盞亦得小兒虛風乳香蠟茶清調下半錢更量大小加減防風半夏丸出聖濟總録治風氣身體疼痛胸膈煩滿化痰涎利頭目防風去叉三兩半夏湯洗七次切焙一兩半天麻二兩芎藭半兩白芷一兩獨活去蘆頭半兩人參三分茯苓去黑粗皮半兩上為末酒煮麵糊和丸如梧桐子大每服二十丸不計時候荊芥湯下加至三十丸槐實丸出聖濟總録治風氣頭目昏眩化痰涎利胸膈槐實四兩肥乾者揀令淨走水洗過放干慢火上麩炒令焦微似黑色芎藭一兩皂莢六兩不蛀者銼長三四寸用長流水五升黑豆一升同煮令豆香熟為度去黑豆不用皂莢焙乾刮去黑皮塗酥慢火炙令焦為度枳殼去瓤麩炒菊花各一兩牽牛子二兩慢火炒令微焦黑色別搗羅取末一兩用檳榔三分雞心者銼木香半兩上為末煉蜜成劑再入臼內搗令熟丸如梧桐子大每服二十丸食後臨臥荊芥湯下小乳香丸出聖濟總録治風氣凝滯胸膈不快身體刺疼乳香研沒藥研各五錢五靈脂二兩半檳榔煨銼半兩肉豆蔻三枚去皮半夏二兩半用生薑四兩研汁入水一盞同浸半夏一宿切碎用少生薑汁同炒赤色牽牛子四兩搗細只羅一遍余者不用豬牙皂莢三梃去皮酥炙上為末用生薑自然汁並冷水中停和丸如緑豆大每服十五丸至二十丸生薑湯下食後臨臥服更量虛實加減天麻煎一名沉香天麻煎丸治風氣不順骨痛或生癮疹不治則加冷脾筋骨緩弱出王氏博濟方天麻乾蠍炒羌活去蘆頭防風去叉各二分五靈脂附子炮白朮赤小豆各一兩上為末先以沉香二兩酒一升瓷器煎為膏入藥搗千杵和丸如梧桐子大每服二十丸空腹荊芥湯或荊芥茶酒下過五日加至三十丸秋夏宜荊芥湯春冬宜荊芥酒春末夏初喜生赤根白頭瘡服之大佳忌一切毒物搜風大元寶飲出淡寮方治挾氣中風痰雖微去當先服此順氣並開其關竅不致枯廢然後進以風藥或非重熱氣實者亦可服天雄氣弱者以代附子沉香防風去蘆南星炮薄荷葉地龍去土木香不見火全蠍去毒各等分上㕮咀每服四錢重入生薑五片水一盞煎熟入麝香啜服不拘時繼洪甲寅歲主柳州報恩寺時州教林修職招治其女尼瘴瘧及至則悲然謂尼昏厥已久備棺衾惟候其喘息絶余視之唇口臉猶頗有紅赤色脈亦微有而伏告之曰痰厥尚或可蘇為用半夏末搐鼻蘇合香丸搽齒便覺喉中噫有聲亟煎星香飲灌下初似不能咽且令人將咽摩胸遂能吞藥眼睛轉動繼用附香飲靈砂白丸子等調理兼旬氣體復舊或謂真更生也又壬戌年間曾在連州值蹇新恩季沉傷寒病醫者過用竹葉石膏湯遂成寒厥四肢冷而強直身亦無甚暖氣惟心胸稍溫且大小便泄而似不禁脈尤微伏且亦已備後事余謂此五虛證矣法在不治試為炮雄附烏大者各一隻作三建湯熟煎一碗仍磨入沉香蕩令稍冷熱仍令人旋旋搦摩其肢體又繼用此湯吞歲丹三十粒自午至晚漸覺身體溫暖精神完復調理數日而安又嘗於封川介軒徐制使請療一軍士悶絶昏厥牙關緊噤不省人事惟喉中有聲如拽鋸鼻息真如鼾睡用豬牙皂角搐鼻遂略噴嚏牙關稍開且急令人提挈其發使頸項伸舒而灌下獨烏湯一時稍蘇頃刻諸證復作遂縛其發於竹竿上令人扶掖其體以麝香搽齒復灌下南星川烏湯良覺蘇醒才越兩時辰間病復作幸為制稀涎飲已成灌下一錢匙頃刻吐出黏涎小半盞許方得漸安凡此等證區區三十年間遇療不一雖非中疾亦不過痰涎潮上節閉咽膈謂其源則或因四氣七情或因久病而下虛上盛或小兒驚風客忤或強壯氣盛之男子婦人為癲為狂皆似風痰而閉厥一時救急亦只得用通關打痰藥也然前所用丹附不可以為定法且或生或炮或多或寡或壓以大丹或兼以紫蘇沉香之類或熱服或蕩冷而熱因寒用皆當有以權便誠不可執也黑虎丸出聖濟總録天南星齏汁煮透切片焙乾二兩芎藭一兩杜仲去粗皮炙銼半夏湯洗七兩切焙用白附子微炮續斷各半兩香墨燒令煙盡物蓋放冷研三錢上為末拌和勻用生薑自然汁煮麵糊為丸如梧桐子大每服十丸荊芥湯下食前犀角丸出衛生寶鑑除三焦邪熱疏一切風氣治風痰盛實頭目昏重肢節拘急痰涎壅滯腸胃燥澀大小便難黃連去須犀角鎊各十兩人參去蘆二十兩大黃八十兩黑牽牛一百二十兩炒別搗取粉六十兩上與牽牛粉合和為細末煉蜜為丸如梧桐子大每服十五丸至二十丸臨臥溫水下更量虛實加減獨活丸出御藥院方治風氣上攻頭目疼痛昏眩不快利膈化痰獨活去蘆頭川芎甘菊花防風各一兩乾蠍一分去土炒半夏湯洗去滑作餅子炙二兩上為末用生薑自然汁二大盞煮如膏和為丸如豌豆大每服七丸至十丸荊芥薄荷湯送下威靈仙丸出聖濟總録治風氣威靈仙去土蔓荊實何首烏去黑皮苦參上等分搗羅為末用酒煮麵糊為丸如梧桐子大每服三十丸溫酒或溫熟水下烏附丸出醫方大成去風疏氣川烏二十個香附子半斤薑汁醃一宿炒上為末酒糊為丸每服十數丸服之若只用草烏當防其麻木人也然肌體肥壯及有風疾者宜常服溫酒下治風氣手足不遂出經效濟世方用五積散薑棗煎去滓入麝香服之或先與蘇合香丸尤妙如暴中風未可服他藥先以麝香煎五積散灌之連進三服汗透便輕快此是高逢辰醫施林宗法其後用此以治他人皆立效每五積散一兩須用細研麝香二錢惟多為妙胡薄荷方出本草治風氣壅並攻胸膈用胡薄荷作茶服之立效俗呼新羅薄荷牽牛子方出本草治風氣所攻臟腑積滯用牽牛子以童子小便浸一宿後長流水上洗半日卻用生絹袋盛挂於當風處令乾每日鹽湯下三十粒極能搜風亦善消虛腫久服令人清體爽麝香烏龍丸出楊氏家藏方治一切風氣攻注腰背拘急皮膚瘙癢遍身麻木疼痛或中風口眼喎邪語澀涎潮半身不隨偏枯嚲曳天麻去苗蒼朮米泔水浸一宿白蒺藜炒去刺地龍去土炒沒藥別研羌活去蘆頭白殭蠶炒去絲嘴木鱉子去殼麩炒黃色香白芷防風去蘆頭五靈脂炒川芎十二味各一兩白膠香別研川烏頭炮去皮尖乳香別研三味各半兩全蠍去毒炒二十枚麝香一錢別研腦子一匙別研草烏頭炮去皮臍半兩上為細末酒煮麵糊為丸如梧桐子大每服十五丸至二十丸茶酒任下食後加味敗毒散出余居士選奇方治風氣上攻頭目咽燥舌澀心胸煩滿痰涎不利頭旋目眩兼解傷寒陽證腳氣踝上赤腫疼痛寒熱如瘧自汗惡風或無汗惡風服此前胡去蘆柴胡銀州者去苗人參甘草冬服用炙夏月不用羌活獨活桔梗茯苓去皮枳殼湯浸去瓤麩炒令香川芎各一兩半夏湯洗七次蒼朮米泔浸炒等分上為細末每服二錢水一盞入生薑薄荷同煎至八分去滓溫服如覺著風即並熱進三兩服微出汗立瘥熱甚者加大黃又方加地骨皮兼治骨熱病沒藥丸出衛生寶鑑治風氣頭疼及渾身痛五靈脂川烏頭灰火中略炮去皮尖切作薄片子略炒過上各等分為細末酒糊為丸如梧桐子大每服一丸細嚼用荊芥薄荷茶湯送下酒服亦得食後四聖散出王氏博濟方治風氣壅滯心胸不利精神不爽痰涎並多頭項緊急半夏湯洗七次桑白皮酥炙令黃荊芥穗陳橘皮去瓤各等分上件四味為末每服一大錢薑一小塊子水一盞同煎至七分溫服黑神丹出楊氏家藏方治一切氣上攻口眼不正肌肉瞤動又偏正頭疼頭風等疾天麻去蘆蔓荊子川烏以上三味各一兩防風去蘆頭藁本去土白茯苓去皮以上三味各七錢細辛三錢半去葉土川烏頭二錢半炮去皮臍尖牛膝酒浸一宿荊芥穗甘草銼炒上三味各三分香白芷赤芍藥以上二味各一兩二分白殭蠶炒去絲嘴細松煙墨燒過醋淬以上二味各四錢上件為細末煉蜜為丸每一兩作十丸每服一丸細嚼薄荷茶下不拘時候羌活煮散治風氣澀骨節疼痛頭目不利拘倦羌活川芎桔梗茯苓薏苡仁各一兩獨活黃橘皮人參細辛麥門冬白朮甘草各半兩上件刷去沙土細銼都微炒搗為粗末每服三錢以水一盞薑三片同煎濾取五分溫服余滓再煎不拘時候檳榔丸出王氏博濟方治通利三焦疏逐風氣寬胸膈化痰涎散腹脅壅滯清頭目化酒食毒黑牽牛四兩揀去雜物二兩炒令香起方得二兩生用重洗焙杵為末取三兩用檳榔半兩木香一分陳橘皮一分去白乾薑一分炮上為末同煮粟米糊細研搜為丸如梧桐子大曬乾以瓷盒盛之並夜臥濃煎薑湯下三十丸飲食傷煎棗湯下痰涎壅喉痛頭疼食後生薑湯下十五丸婦人産前後諸疾煎生薑湯下止渴棗湯下天麻丸治風氣壅盛頭疼目澀項背拘急鼻塞耳鳴方見防風丸香芎丸出楊氏家藏方治風氣上攻頭目昏疼身體倦怠川芎十兩天麻去苗一兩細辛去葉土半兩蓽茇二錢半甘草二兩炙上件為細末煉蜜為丸每一兩作十丸每服一丸細嚼荊芥湯下食後二香散出淡寮方治風氣食三證通用調暢胃氣須兼服之木香藿香葉白豆蔻仁半夏曲厚朴制橘皮茯苓蒼朮甘草炙各半兩益智仁縮砂各一兩丁香二錢半上粗末每二錢半薑棗煎服四君子丸出朱氏集驗方治風順氣血生乾地黃熟乾地黃當歸木瓜各等分上為細末酒糊為丸如梧桐子大每服三十丸溫酒下愈風丸出楊氏家藏方治風壅氣滯頭目不清痰多上壅天麻去苗白附子炮羌活去蘆頭天南星炮細辛去葉土香白芷川芎檳榔以上八味各一分白蒺藜微炒肉桂去粗皮半夏湯洗七次陳橘皮去白三味各七錢半上件為細末生薑自然汁煮麵糊為丸如梧桐子大每服三十丸生薑湯下食後木香丸出聖惠方治一切風氣及臟腑壅滯宿食不消心腹脹滿木香二兩羌活二兩芎藭二兩郁李仁四兩湯浸去皮微炒桂心二兩檳榔二兩川大黃四兩銼碎微炒上件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大每於食前以溫酒下三十丸欲得快利加至四十丸此藥稍溫必不虛入夜臨臥時服亦得順氣丸出保生方治風濕毒氣攻疰腿膝或腫或疼降風消食木香青皮去白檳榔各一兩郁李仁湯浸去皮研半兩黑牽牛炒取頭末三兩半麻子仁去皮別研一兩半上除郁李仁麻子仁外為細末次入郁李仁麻子仁末同研勻煉蜜和丸如梧桐子大每服三十丸加至五十丸溫麻仁湯下或用生薑湯下亦得杜翰林枳實丸出御藥院方疏導老人及虛家風氣痰實腹肋有防諸飲癖積枳實麩炒人參赤茯苓檳榔各一兩白朮半兩黑牽牛八兩別一方加木香半兩上件六味為細末稀麵糊為丸如梧桐子大每服食後以橘皮湯下十五丸漸加至二十丸如要不動時臨臥熱水下五丸加至十丸治風氣客於皮膚瘙癢不已出本草取蟬蛻薄荷葉等分末酒調一錢匙日三服治風氣客於皮膚瘙癢不已出本草以蜂房炙過蟬蛻等分為末酒調一錢匕日三二服去浮風益氣力潤皮肉出本草以緑豆煮食之風消附論夫內經謂二陽之病發心脾有不得隱曲女子不月其傳為風消夫腸胃發病傳於心脾心主血心病則血不流脾主味脾病則味不化而精不足精血不足故其證不能隱曲女子不月久則傳為風消蓋精血已虧則風邪勝而真氣愈削也方黃耆湯出聖濟總録治風消氣血虛弱黃耆薄切犀角鎊各一兩人參白茯苓去黑皮各一兩半柴胡去苗升麻秦艽去苗土芎藭木香桑根白皮銼枳殼去瓤麩炒防風去叉芍藥黃芩去黑心肉豆蔻去殼炒天麻鱉甲醋浸炙去裙襴地骨皮甘草炙銼各一兩羌活去蘆頭當歸切焙青橘皮去白切炒各三分檳榔銼桔梗去蘆頭炒各半兩上粗搗篩每服三錢匙以水一盞煎至七分去滓空腹溫服之妙大和湯出聖濟總録治風消五勞七傷等疾前胡去蘆頭枇杷葉拭去毛鱉甲醋炙白茯苓去黑皮桔梗去蘆頭炒白芷五味子白朮厚朴去粗皮生薑汁炙半夏湯洗去滑京三稜煨銼藿香去梗防風去叉各一兩人參三分柴胡去苗半兩桂去粗皮一兩半桑白皮銼當歸切焙芍藥枳殼去瓤麩炒牡丹皮甘草炙銼知母焙杏仁去皮尖雙仁麩炒各半兩上粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服之人參荊芥湯出聖濟總録治風消血氣虛損攻刺疼痛四肢無力多因黃瘁胸膈痞悶或大便多祕或時泄利荊芥穗二兩芍藥天麻芎藭當歸洗切焙京三稜煨銼黃耆薄切鱉甲醋浸去裙襴炙牛膝去苗酒浸切焙各一兩木香半兩熟乾地黃切焙柴胡去苗各一兩半防風去叉牡丹皮大腹皮各三分枳殼去瓤麩炒三兩半夏為末生薑汁作餅曝乾一兩秦艽去苗土一分人參石膏碎研白朮羌活去蘆頭款冬花擇陳橘皮去白切焙各半兩上粗搗篩每服三錢匙水一盞生薑三片棗一枚去核同煎七分去滓空心日午臨臥服菟絲子丸治風消經久不瘥漸成五勞七傷小腹拘急四肢痠疼面色黧黃唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉勞乏力心腹脹滿腳膝痿緩小便滑數房事不舉股內濕癢水道澀痛小便出血時有遺瀝菟絲子酒浸別研桂去粗皮鹿茸去毛酥炙附子炮裂去皮臍澤瀉炮石龍肭各一兩肉蓯蓉酒浸切焙杜仲去粗皮銼炒防風去叉白茯苓去黑皮熟乾地黃洗焙巴戟天去心山茱萸補骨脂炒蓽澄茄沉香銼蘹香子炒石斛去根牛膝酒浸切焙續斷各三分桑螵蛸酒浸炒芎藭覆盆子擇五味子各半兩上為末以酒煮麵糊丸如梧桐子大每服二十丸溫酒或鹽湯下空心日午服加腳膝無力木瓜湯下黃耆羌活飲治心脾受病精血虛少風氣乘之日益消削黃耆一兩半羌活去蘆頭一兩石斛去根防風去叉枳殼去瓤麩炒人參附子炮裂去皮臍茯苓去黑皮五味子牛膝酒浸切焙各一兩續斷半兩地骨皮三分牡蠣煅一兩生乾地黃切焙二兩上銼如麻豆每服五錢匕水一盞半煎至一盞去滓溫服日三服薑黃湯治風消四肢無力胸膈煩悶薑黃一兩沉香銼三分黃耆銼一兩桂去粗皮半兩延胡索人參厚朴去粗皮塗生薑汁炙芎藭防風芍藥各三分杏仁湯浸去皮尖雙仁別研羌活去蘆頭訶黎勒煨去皮各半兩上除杏仁外粗搗篩入杏仁和勻每服三錢匕旋汲井花水一盞煎至七分去滓溫服不拘時排風湯治風消肢體痠疼血脈枯耗及治風毒腳氣腫痛防風去叉當歸洗切焙白蘚皮白朮芍藥桂去粗皮芎藭獨活去蘆頭杏仁去皮尖雙仁炒別研枸杞根銼茯神去木麻黃上除杏仁外粗搗篩入杏仁和勻每服三錢匕以水一盞生薑三片煎至七分去滓空腹溫服日晚再服五補人參丸出聖濟總録治風消人參白茯苓去黑皮黃耆薄切地骨皮熟乾地黃焙乾各一兩上為末煉蜜丸如梧桐子大每服三十丸溫酒下夜臥時服之妙風厥附論夫內經曰二陽一陰發病主驚駭背痛善噫善欠名曰風厥夫胃土也肝木也木剋土故風勝而驚駭背痛土不勝木故善噫土不制水則腎氣上逆而善欠為風厥也方乾地黃丸出聖濟總録治風厥背痛善噫善欠驚恐不安熟乾地黃焙桂去粗皮續斷山茱萸鍾乳粉天門冬去心焙各半兩白茯苓去黑皮天雄炮裂去皮臍杜仲去粗皮炙銼牛膝酒浸切焙肉蓯蓉酒浸切焙柏子仁各一兩三分松脂遠志去心乾薑炮各一兩一分菖蒲山芋甘草炙銼各一兩上為末煉蜜和丸如梧桐子大每服三十丸溫酒空心下食前日二人參湯出聖濟總録治風厥志意不樂身背疼痛多驚善欠噫氣人參芎藭枳殼去瓤麩炒芍藥防風去叉細辛去苗葉桂去粗皮附子炮裂去皮臍甘草炙各半兩桔梗炒木香茯神去木各一分上細銼如麻豆大每服五錢匕水一盞半生薑半分切煎至八分去滓溫服遠志散出宣明論治風厥多驚駭背痛善欠志意不樂身背皆痛遠志去心人參細辛去苗葉白茯苓去黑皮黃耆銼各一兩桂去粗皮一兩熟乾地黃焙菖蒲白朮防風去叉各半兩上為散每服二錢匕溫酒調服空心晚食前日三服獨活湯出聖濟總録治風厥肩背痛驚駭不安善噫多欠獨活去蘆頭人參白茯苓去黑皮當歸切焙各二兩桂去粗皮遠志去心熟乾地黃焙防風去叉各一兩半細辛去苗葉甘草炙各一兩上細銼如麻豆大每服五錢匕水一盞半煎取八分去滓溫服不拘時日二茯苓湯出聖濟總録治風厥驚駭背痛善噫善欠治風厥出本草以海桐皮浸酒服風眩附論夫風眩之病起於心氣不定胸上蓄實故有高風面熱之所為也痰熱相感而動風風心相亂則悶瞀故謂之風眩大人曰癲小兒曰癇其實則一此方療治萬無不愈但恐證候不審或差違大都忌食十二屬肉而賁豚為患發多氣急氣急則死不可救若發其病者宜急與續命湯也用急時但度灸穴便大針針之無不瘥者初得針竟便灸最良灸法次列於後餘業之以來三十餘年所救活者數十百人無不瘥矣後人能曉此方幸勿參以余術焉方茯神湯出千金方治風眩倒屋轉吐逆惡聞人聲茯神獨活各四兩黃耆遠志防風各五兩生薑三兩甘草人參當歸牡蠣白朮蓯蓉附子各二兩上㕮咀以潦水一斗二升煮取三升服五合一日夜盡續命湯出千金方治風眩發則煩悶無知口沫出四體角弓目各噤不得言竹瀝一升二合生地黃汁一升龍齒生薑防風麻黃各四兩防己三兩附子三分石膏七兩桂心二兩上㕮咀以水一斗煮取三升分三服有氣加附子作一兩紫蘇子五合橘皮半兩以服續命湯口開四肢尚好定而心中尚不除者紫石湯主之獨活散一名獨活白朮散出聖濟總録療風眩厥逆身體疼痛百節不隨目眩心亂反側若癲發作無常獨活四兩白朮六分防風八分細辛人參乾薑各四分蜀天雄炮桂心各一分栝蔞六分上細篩且以清酒服半方寸匙日再忌李桃雀肉豬肉冷水生菜生蔥等一方無桂心芍藥湯出聖濟總録治風眩暗倒旋屋倒轉腦痛芍藥防風去叉石膏研碎木通各一兩葛根半兩甘菊花擇半兩麻黃去根節一兩甘草炙銼前胡去蘆頭各三分上㕮咀每服五錢匙水一盞半生薑三片棗一枚去核煎至一盞去滓入荊瀝半合重煎令沸早晚食後臨臥溫服一方無甘草荊瀝
