body:
  text: 卷八十三眼目門雀目附論晝而明視暮不覷物名曰雀目言如鳥雀不能有見於夜也夫衛氣晝行於陽夜行於陰陰血受邪肝氣不能上榮於目肝受血而能視今邪在於肝陰血澀滯至暮則甚故遇夜目睛昏不能覷物世謂之雀目龍木論云肝虛雀目內障此眼初患之時愛多癢或澀發歇時時暗以後極重之時惟昏黃都不見惟視直下之物宜服卓肝散瀉肝湯即瘥歌曰雀目雖欺不可欺小兒患者作疳醫大人肝臟虛勞事更被風來助本基花發眼前隨顧視不憂後患即無知年深百日亡雙目欲觀三光後世希高風雀目內障此眼初患之時肝有積熱衝上胃臟虛勞亦兼患風沖肝氣不足致患此疾與前疾不同見物有別惟見直上之物然後為青盲切宜服補肝散還睛丸即得效痊歌曰雀目前篇已辨根此篇何要再三論直緣病狀同中異為是風高要別陳一種黃昏無所見若觀天象總難分多年瞳子如金色欲識高風只是真兩目初醫何藥妙卓肝入口火燃薪風勞更若除根本永保千秋共萬春方還睛丸治雀目人參細辛去蘆葉白茯苓去黑皮木香知母焙用鹽水芎藭一兩石決明茺蔚子各二兩上為細末煉蜜和丸如梧桐子大空心茶清下十丸鎮肝丸一名石決明子丸治雀目補肝散治高風雀目內障人參茯苓車前子川大黃黃芩各一兩五味子防風各二兩黑參各一兩上為末以水一盞散一錢煎至五分去滓溫服防風煮肝散治雀目不計大人小兒久患不瘥防風去蘆黃連去須穀精草黃芩去黑心甘草炙銼天南星炮各二兩蛤粉半分上為細散每服一錢用羊子肝一片銅竹刀批開摻藥在內以麻縷纏定研粟米一大盞銀石鍋內煮熟放溫臨臥嚼服切忌犯鐵器一方無蛤粉療雀目方以生雀血敷目可多作之鬱金散治雀目鬱金蛤粉研各三兩大黃銼炙黃連去須雄黃研各一分新牛膽豬膽二枚上將五味為細散並豬膽拌入牛膽中填滿陰乾為細散每服大人一錢小兒半錢食後新汲水調下赤眼氣眼疳眼並治大黃車前子湯一名卓肝散出龍木論治雀目大黃煨銼車前子黑參黃芩細辛去苗葉茺蔚子各二兩上粗搗篩每服二錢水一盞散半錢入黑豆三七粒煎至五分去滓空心臨臥各一服瀉肝湯出龍木論治肝虛雀目內障大黃芍藥桔梗芒硝黃芩防風各二兩上為末以水一盞散半錢煎至五分去滓食前溫服夜明散治雀目久昏穀精草甘草夜明砂青蛤粉蒼朮各等分上為細末每服三錢豬肝二兩批開摻藥入內麻系定米泔水煮熏眼至熱分三五次細嚼豬肝湯下日均一劑光明散治雀目白蘞赤蘞井泉石虢丹龍骨各等分上為細末每服一兩水二大碗入豬肝四兩切一片同煎一碗先吃豬肝然後服煎藥送下食後白皮散出聖惠方治雀目至暮無所見宜服老白柏皮細辛地膚子各四兩烏梅三兩熟上為散每食後清酒服二方過七日三四服瘥或溫水調下又方出聖惠方治雀目不論大人小兒不久即愈黃芩穀精草蛤粉羚羊角屑各半兩上為細末散每於食後以溫水調下一錢又方出聖惠方細辛地膚子決明子松脂以上各二兩上為細散每於食後以竹葉湯調下一錢鉛丹丸出聖濟總錄治雀目年深不瘥鉛丹半兩黃芩去黑心二兩蛤粉一兩半上為細末別熔黃蠟一兩入藥內研勻更入薄麵糊丸如彈子大批豬肝作薄片裹藥米泔水煮肝熟為度爛嚼用煮肝米泔湯下空心食前臨臥再服槐芽散一名空心散出聖濟總錄治雀目及內外障眼風毒青盲暴赤眼羊梅青好者水浴過控乾研胡黃連水浴過為細末各二分槐芽切出嫩雀舌時於日未出勿食不語摘之不計多少入一青竹筒內不令雞犬等見每於天月得上候乾為末一錢半用之上研同勻細如粉入龍腦一字計更研勻蜜收每夜臥先溫淨水漱口仰面臥用葦筒子吹藥一字入兩鼻中但令如常喘息便自睡著眼中覺涼冷隔夜一次用之效如聖散出聖濟總錄治肝虛雀目夜不見物蛤粉青葙子石決明各半兩上為細散用牛肝二兩批開摻藥三錢在內麻縷扎定用米泔水煮熟為度細嚼米飲下臨臥服雞肝兔肝煮藥亦可石斛散出聖濟總錄治雀目石斛去根仙靈脾銼各一兩蒼朮米泔浸切炒半兩上為散每服三錢空心米飲調服日再煮肝散出儒門事親書治雀目青蛤粉夜明砂穀精草各等分上為細末每服五七錢豬肝內煮熟細嚼茶清下蛤粉丸出龍木論治雀目不拘遠近但日暮便不見物黃蠟上色蛤粉細研各等分上熔蠟搜粉為丸如棗子大每用豬肝一片二兩許批開裹藥一丸麻綿纏瓷器內水一碗煮熟取出乘熱熏眼候溫臨臥之時吃肝以瘥為度一方用豬腰子又方治雀目石決明一兩燒存性蒼朮三兩去皮上為細末切開豬肝入藥在內麻綿封縛入砂罐內煮令香熟令氣熏眼了都餐此肝食後治雀目盲方出聖惠方地膚子五兩決明子一升上為末以米飲汁和丸食後服二十丸至三十丸日二一方為細散每服一錢清粥飲調下煮肝散出聖濟總錄治雀目咫尺不見物用柴芥菜子真香油炒黑色碾為細散用羊肝一具分作八服每用散二錢捻在肝上以筍籜裹藥煮令熟放冷服以煮肝湯下臥時服夜明散一名聖散出聖惠方治雀目不計月日宜服亦治小兒雀目以蒼朮四兩米泔水浸一宿切作片焙乾為末每服三錢豬肝二兩批開摻藥在內用麻系定粟米一合水一合於砂鍋內煮熟熏眼俟溫臨臥服之一方用羊肝卻用河水浸蒼朮去黑皮雀盲散一名炒肝散出直指方治遇夜目不能視以建昌運螺兒蚌粉三錢為末雄豬肝一葉竹刀批開納蚌粉於中麻綿扎第二日米泔煮七分熟又別蘸蚌粉細嚼以汁送下無蚌粉以夜明砂代用夜明治內外障纏入豬肝煮帶生和汁細嚼效魚膽方出肘後方治雀目及熱毒痛以鯉魚膽及腦敷之燥痛即明療雀目方出聖惠方以七月七日九月九日取地衣草淨洗陰乾末之酒和服方寸匕日三服一月愈雀目方出聖惠方以豬肝一具細切以水一斗煮熟置小口器中及熱以目臨上大開勿閉冷復溫之取病瘥為度治雀目立驗以獾肉爛煮食一飧愈穀精丸出衛生家寶方治大人小兒雀目攀睛穀精草三兩為末羊肝一具薄切作片子三指大用精草以水二大碗同煮上和黑豆不拘多少時嚼吃如恐人不肯吃時煮出乘熱入臼內搗成如綠豆大每服三十丸茶清湯食後服小兒加減隨大小服光明散出衛生家寶方治雀目不見路夜明砂炒蚌粉炒蒼朮米泔浸炒海螵蛸各等分加黃丹上為細末用羊肝作片子安藥在中用水一盞煮乾丸細嚼用白湯吞下開明餅子出楊氏家藏方治夜眼烏賊魚骨半介黃蠟三兩上以烏賊魚骨為細末熔黃蠟共和丸捏如小兒錢大每服一餅子用豬肝二兩竹刀子批開著藥在肝內用麻皮扎定米泔水半碗煮先食肝次用原煮藥湯送下食後療目晚不見物方取鼠點之治雀目術令雀目人至黃昏時看雀宿處打令驚起雀飛乃咒柴公柴公我還汝盲汝還我明如此日咒三過作之眼即明曾試有驗肘後云刪繁載支太醫法又方用蒼朮三兩搗羅為末每服一錢不計時候以羊肝一個竹刀批開摻藥在內麻繩扎定以粟米泔一大升煮熟為度患人先熏眼藥氣盡即吃之簡要濟眾亦治小兒雀目療雀目方及遠時以生雀血敷目可多作之又一方用雄雀頭點之又方以地膚子搗取汁洗之上搗篩為末散每服三錢以水一中盞煎至六分去滓每於食後溫服決明子散出聖濟總錄治客熱沖眼赤多淚出生瘡決明子一兩川升麻枳殼麩炒微黃去瓤柴胡去苗梔子仁車前子以上各一兩細辛防風去蘆頭黃連去須各三分甘草半兩炙微赤銼上為細末散每服三錢以水一中盞煎至六分去滓食後溫服忌炙爆熱酒面梔子湯出聖濟總錄治肝心熱毒目生瘡及磣痛梔子仁半兩犀角屑一兩木通銼黃芩去黑心各半兩決明子黃連去須三分大黃銼炒車前子瞿麥穗各一兩上粗搗篩每服五錢水一盞半入竹葉七片煎至八分去滓投芒硝半錢放溫食後服臨臥再服瀉脾湯出龍木論治風赤瘡痍外障人參黃芩茯苓大黃桔梗芒硝各一兩茺蔚子二兩黑參一兩半上為細末以水一盞散一錢煎至五分去滓溫服黃連散出聖惠方治肝熱沖眼生瘡黃連一兩半去須赤芍藥蕤仁湯浸去赤皮木通銼決明子梔子仁黃芩甘草各炒赤銼各一兩上為粗散每服三錢以水一中盞煎至五分入竹葉二十片去滓每於食後溫服墜膈丸出龍木論治風赤瘡痍外障澤瀉五味子車前子知母乾山藥石決明各一兩防風一兩半上為末煉丸如梧桐子大空心茶下十丸細辛丸出聖惠方治眼赤生瘡細辛半兩黃連半兩去須蕤仁二兩湯浸去赤皮蘆薈半兩桑根白皮一兩銼龍腦一錢細研甜葶藶一兩隔紙炒令紫色上為末以龍腦同研令勻煉蜜和搗二三百杵丸如梧桐子大每服食後以溫漿水下二十丸蕤仁膏出聖惠方治眼眥風赤兩角生瘡腫爛癢痛犀角散出聖濟總錄治風熱上攻目瞼生瘡疼痛不止犀角屑黃連去須大黃銼炒令香甘草炙銼青竹茹各二兩秦皮去粗皮銼半兩上粗搗篩每服三錢水一盞煎至六分去滓投芒硝半錢放溫食後臨臥再服菊花散出御藥院方治眼赤暴赤生腫疼痛目自淚出薄荷去三兩甘草微炒二兩大黃去粗皮芒硝各一兩甘菊花去土縮砂仁各半兩上為細末每服三錢茶清調服和滓食後蒺藜子丸治眼內有瘡但睛不損者蒺藜子炒去角蟬蛻炙決明子炒各一兩木賊以盒盛之略燒存性為末一兩兔糞喂豆後收者二兩焙乾上為末用淡豆豉一兩面一匙先爛研豉入水和麵煮和丸如梧桐子大每服用淡竹葉湯下十丸加至二十丸早晚食後秦皮散出聖惠方治一切風赤眼生瘡秦皮二兩辛夷二兩黃柏五兩黃連一兩去須玄參一兩芥草一兩微炒甘草一兩炙微赤銼上為粗散每服三錢以水一中盞煎至六分去滓每於食後溫服白薇散出危氏方治眥頭結聚流出膿汁黏睛上下不痛仍無翳膜此因心氣不寧並風熱停留在瞼中宜服白薇半兩防風白蒺藜去角炒石榴皮羌活上為末米粉糊丸如梧桐子大每服二十丸白湯下杏仁龍腦膏出聖濟總錄治赤眼有瘡及生胬肉日夜難開疼痛朴硝一錢龍腦一錢一方用二錢杏仁湯浸去皮尖雙仁研七枚獖豬膽乾者如棗許大上先將杏仁入乳缽中研令細次下三味同研以盒盛經一宿每點如黍米大納目眥中眼中冷淚出至十日自瘥其藥密封覆勿令見風蕤仁膏出聖濟總錄治肝虛風癢生瘡淚多出蕤仁去皮研一分龍腦一錢胡粉如茶子許大於火上烤變赤如金色者佳酥真者如杏核許上先將胡粉蕤仁別研再取酥同研入龍腦令如膏用油帛裹或銅盒子盛勿泄氣傷風或小兒胎赤大人久患赤眼癢痛宜先取鹽花少許用絕酸漿水一升煎三五沸以綿濾取汁夜臥先以清水洗次以鹽花水洗眼拭令乾以爪甲挑取麻子許點眼眥須臾淚出目中冷落豬膽膏出聖惠方治眼目有瘡及胬肉日夜不開疼痛豬膽一枚取汁川朴硝半兩膩粉一錢龍腦一分上細研與豬膽相和經宿每用一小豆大點之蕤仁膏出聖濟總錄治風熱耳赤生瘡蕤仁去皮研如膏半兩青鹽末一錢龍腦少許上同研用孩子乳計少許調和如膏每以麻子大日三五度點眼黃連散出聖濟總錄治眼風赤澀隱腫疼生瘡黃連去須末蕤仁去皮各一分胡粉一錢上先將蕤仁去膜於銅器中用槐木杵研令極細如粉次入黃連末胡粉和更研去為度每夜臥點一黍米大在目眥頭瘥碧霞膏治大人小兒赤眼腫疼生瘡黃丹二兩枯白礬一兩淨蜜半斤上先將黃丹炒紫色入枯白礬同蜜熬紫色入水一盞再煎稀稠合宜磁器內盛每用皂子白湯半盞化開熱湯洗眼冷即再溫洗八九次不用搐鼻散出聖濟總錄治赤眼生瘡腫痛乳香一錢道人頭二兩細為末上末每用一錢香瓶子上燒煙搐鼻內治瘡入眼出龍木論仙靈脾威靈仙各等分上為末食後米飲調下二錢小兒半錢青錢湯出聖惠方治目眥爛作瘡青錢三十文鹽半合上相和以紙裹又著鹽泥裹於猛火中燒一復時取出剝去泥以湯二大盞攪濾去滓趁熱淋洗冷即重暖用之清涼包子出聖濟總錄治眼熱赤生瘡及退膜翳用宣州黃連一分為末以新水一碗面東撲取倒流水些少將黃連末勻摻在碗內用熟艾一塊如雞子大安在古老錢七文上四面更用青銅錢四十文足作四架子覆黃連碗在上點火燒艾候煙盡便掃下黃連末用夾桶袋盛再取孩兒乳汁浸時時點眼中覺口中苦透為度如暴赤眼用之立效治眼瞼里生瘡或癢或痛愈而復之出聖惠方用蕤仁一分去赤皮熟研令細以好醋和勻多用麻子大日三四度點時時暖鹽漿水洗之廣大重明湯出試效方治兩目瞼赤腫楞生瘡目多淚隱澀難開及熱痛並稍赤及眼瞼癢搔之至破爛赤腫痛不可忍龍膽草防風生甘草細辛各一錢上杵㕮咀如麻豆大內甘草不銼只作一定先以水一碗半煎龍膽草一味至一半再入餘三味煎至小半碗濾去滓用清帶熱洗以重湯坐令熱日用五七次但洗畢少合須臾許開胬肉泛常及癢赤瞼治眼瞼赤皮上生濕瘡發作有時出護命方黃柏一兩用蜜浸一時上以無皮炭燒火炙令乾不要焦碎杵為末每用五六錢煎湯洗數次便效目青盲附論夫眼者輕膜裹水故其性靜其鑑明瞻視分別物無不矚也如至氣清神爽臟乃安和稍有一臟氣傷風邪竟作目無痛癢猝然而失明為肝膽邪毒氣所傷毒氣不散上注於目故令目青盲也龍木論稱內障有變青盲者初患之時昏暗不痛不癢亦無失明至於失明與不患者相似是知青盲之狀外無異證瞳子分明而不見物由肝腎氣虛精血弱不能上榮故青盲而無所見也經曰肝氣通於目目和作之白黑養生方乃以塞路井水瀆令人目青盲豈其本哉方還暗散出聖濟總錄治青盲障翳積熱但瞳仁不損即無不治人參細辛去苗葉決明子車前子防風去蘆芎藭丹參升麻覆盆子地膚子黃連去須遠志去心茺蔚子桂去粗皮蒺藜子炒厚朴去粗皮生薑汁炙銼槐實麥門冬去心焙柏子仁白芷白茯苓去黑皮蜀漆木通銼黃芩去黑心麻黃去根節湯煮涼去汁五味子附子炮裂去皮臍菥蓂子禹餘糧煅醋淬枸杞子各一兩上為散每服二錢食前白米飲調下日再漸加至三錢填暗丸出聖濟總錄治青盲及內外障或因幼小淚出或久視傷明或因熱病瘥後兩目俱赤或因打損即有胬肉覆睛或吃食藥熱發兩目作瘡或傷煙火眇視或兩目畏日視不詳青赤或兩眥爛瘡石決明一枚淨洗別搗磁石飯上蒸五度研陳橘皮湯浸去白皮白陽起石飯上蒸五度研梔子花肉蓯蓉去粗皮切焙黑石飯上蒸五度研人參生薑切焙苦參白芷黃芩去黑心甘草炙銼白茯苓去黑皮桂去粗皮厚朴去粗皮生皮汁炒防風去蘆生乾地黃焙杏仁去皮尖雙仁炒研各二兩升麻各八兩龍腦研一分黃連去須麥門冬去心焙槐子炒黃柏去粗皮車前子乳香研各四兩蕤仁青葙子各三兩烏賊魚骨去甲並鹹味一兩上為末煉蜜和搗三萬杵丸如梧桐子大每服六丸空心米飲子下服訖即食後更服十丸加至二十丸食後即加食前不加食後仍以牛乳煎湯下二年勿食五辛熱面陳物一年勿食羊頭肝肚驢馬兔肉毒魚澤瀉湯出聖濟總錄治肝臟熱沖目赤瞻視膜翳積年青盲不見物澤瀉升麻杏仁湯浸去皮尖雙仁研決明子微炒大黃銼炒黃芩去黑心甘草枳實去根麩炒芍藥各一兩梔子仁人參赤茯苓去黑心黃柏去粗皮細辛去苗葉白朮各半兩柴胡去苗四兩青葙子二兩桑根白皮銼炙二兩上粗搗篩每服五錢以水一盞半入姜半分拍破同煎至一盞去滓入芒硝半錢放溫食後臨臥服日再五加皮湯出聖濟總錄治青盲目無所見五加皮銼玄參桑白皮麥門冬去心焙各一兩茯神去木半兩上搗篩每服五錢以水一盞半煎至七分去滓入荊瀝半合再煎一兩沸放溫食後臨臥服治眼青盲不見物多淚出聖惠方雄黃一兩細研細辛一兩乾薑一方炮裂銼黃連一兩去須蕤仁三十枚湯浸去赤皮上為細散入雄黃拌令勻以蜜二兩和納於瓷瓶中油單密蓋於飯甑蒸一炊以新綿濾過在磁盒子內盛每臨臥時取麻子大點之豬肝膏出聖濟總錄治內障青盲風赤翳膜豬肝一具於淨鐺中以水一斗同藥煮豆花地黃花槐花各二兩上為末和肝煮一時辰上有凝脂作片掠取於磁缽中以火暖之上有似酥片者即收入磁盒中以銅箸點眼槐芽散治眼青盲不見物者出聖惠方天靈蓋三兩多年爛者淨洗了塗酥炙令黃龍腦三兩去蘆頭白龍腦一錢細研上為末入龍腦研勻取黑豆五升淨淘以水煮令豆爛取汁卻煉成煎拌藥丸如梧桐子大每服以溫水下二十丸日三服頻用新汲水洗頭面凡欲服時先令患人洗淨沐浴及剃卻頂心發靜一室泥飾不得通明令安只自在供食慎護將息不勞晝夜不得見明者供湯藥及食恐食畢及藥服便出房外兼不得在房內吹燈燭忌聞燈油煙氣如此忌慎一百日若至五十日七十日便開一方竅試令患人著當便是明卻閉明處令滿百日漸開明卻已見物者緣眼氣力若不得全似尋常看物便能具於室內將息直待好安甚妙切忌羊血雜肉及動風壅滯熱喜怒房室等傷寒後青盲日久可治百一選方仙靈脾一兩淡豆豉四十九粒上以水一碗半煎至一碗露冷令病人頓飲之即瘥明目百葉丸出聖惠方治青盲百葉一兩微炙夜明砂一兩以糯米炒令黃上為末用牛膽汁拌和丸如梧桐子大每夜臨臥時竹葉湯下二十丸至五更初以粥飲下二十丸珍珠煎出聖惠方治眼青盲不見物宜點珍珠二兩白蜜二合上和合微火煎兩沸綿濾取汁日四度點之神效決明散出聖惠方治積年失明成青盲決明子三兩蔓荊子三兩蒸二夕每度燃干上為細散每於食後以溫水調下二錢烏雞丸出聖濟總錄治青盲用黃荊嫩頭春初取之九蒸九曝取半斤用烏雞一隻純黑者以米飼五日安淨板上飼以大麻子又一二日旋收糞曝乾取半淨瓷缸子內熬糞令香黃然後和荊頭搗成末煉蜜和丸如梧桐子大每服十五丸陳米飲下加至二十丸日二服治眼忽不見物如青盲狀出聖濟總錄令人爛嚼薑母以舌舐眼六七度即瘥馬齒莧方出龍木論主青盲白翳除邪氣利大小腸去寒熱以馬齒莧實一升搗為末每一匙煮蔥豉粥和攪食葉作粥及著米糝五味作羹亦得桑柴火方出龍木論治青盲此一法當用之視物如鷹鶻者有此方效上以正月二月八日三月六日四月四日五月六月二日七月七日八月二十日九月十二日十月十七日十一月二十日十二月晦日遇上杵神日用桑柴灰一合以煎湯沃之於磁器中澄令極清以葉汁稍燒洗之如覺冷即重湯煮令得所不住手洗遇上杵日不得不洗緣此神日本法也豬膽方療目盲用豬膽一枚微火上煎之可丸如黍米大納眼中食頓良一用五枚取汁於銅器內煎如膏非時點之鐵扇子治青盲並迎風冷淚以十二月桑樹上黏帶不落自干桑葉煎湯洗之數日漸覺見物半年如舊昔有一婦因喪二子啼哀不已偶然雙目不見如青盲之狀忽遇授此方服至半年其目如故魚膽方療眼盲腦痛青盲點之以鯉魚膽並腦等分調以注目眥日三度良治眼青盲瞳子不壞者上取蔓荊子三片蒸之看氣上以金中湯淋之曝乾還蒸淋如此三遍干搗細羅為散每服以溫酒調下二錢漸加至三錢空心及晚後服之密蒙花方主青盲膚翳赤澀多眼淚消目中赤脈及肝氣攻眼案此方原缺藥味及分量上水煎服治十年青盲取白大生子目未開時乳汁注目中羚羊角方以羚羊角治青盲目癢氣風頭痛水磨服古文錢治目盲障膚赤以古文錢水磨點目中亦以鹽滷浸用治明目去盲暗以羊肝薄切曬乾為末和決明子蓼子並炒香搗篩為丸每日服之補肝散療肝臟病眼青盲內或生障惡風赤痛乾薑丹參黃耆各六分甘蕤三分桂心茯苓附子炮黃連甘草炙當歸乾漆貝齒燒豬苓白朮各五分防風七分乾地黃八分上為散酒服方寸匕日五服忌海藻菘菜生菜豬肉冷水桃李雀肉等撥雲退翳丸治雲翳青盲眼疾川芎當歸白藥子楮實藁本羌活各一兩半白蒺藜各一兩蛇皮三錢甘菊花荊芥川椒七錢半密蒙花蟬殼三兩黃連三兩地骨皮薄荷各半兩上為末煉蜜丸每兩分作十丸食後氣障木香湯下睛暗青盲當歸湯下有翳清米泔下眼昏好酒下甘草湯下婦人血暈當歸薄荷湯下綿鳩丸一名羊肝丸治內外障青盲雀目眼生黑花十年翳白以上不見光明一日有效補肝丸一名地膚子丸出聖惠方治眼青盲無所見物蓯蓉丸一名還睛丸治眼青盲並無赤痛阻不見物翳障百合湯出聖濟總錄治眼欲變青盲百合黃耆銼各二兩麥門冬去心焙半兩白茯苓去黑心人參防風去蘆木通銼桑白皮銼各半兩蒺藜子炒去角酸棗仁枳殼去根麩炒石膏各一兩薏仁一合上為散每服三錢以水一中盞煎至六分去滓食後溫服蒼朮丸出聖濟總錄治青盲眼瞳子分明亦無翳膜不痛不癢內障不見物蒼朮半兩浸知母黃芩去黑心玄參甘草白茯苓人參細辛去苗芎藭木香貝母去心石決明刮燒淨茺蔚子各一兩上為細銼焙過搗羅為末煉蜜和丸如梧桐子大每服三十丸食後溫水下臨臥再服空青決明膏出聖濟總錄治青盲內障翳暈無間冷熱風等但瞳子不破者悉皆治之空青研細一兩決明子馬蹄者炒乾薑炮一分黃芩去黑心蕤仁各三分細辛去苗葉車前子黃柏去粗皮黃連去須各半兩白蜜好者二斤上為末和蜜納銅器中蓋頭勿令透氣以米五升安藥器於上蒸飯熟為度乘熱以綿濾去滓納瓷瓶子內以銅箸點眼眥若多年青盲點二十日見物防風補煎出聖濟總錄治肝虛寒目青盲視物多不明漸生障翳防風去苗白蘚皮陳橘皮去苗並去葉各一兩上粗搗篩每服五錢以水一盞半大棗二枚擘開同煎至一盞去滓放溫服決明散王氏博濟方治青盲眼夫五臟六腑之精氣皆上注於目若臟空有風邪疾隱乘之有熱則赤痛無熱則內障蓋臟腑氣血不榮盛於目故外狀不異而只不見物或加之有痰熱則生翳如蠅翅狀覆在睛上此方乃至人傳授大效石決明草決明青葙子蛇蛻炙細辛去苗葉甘草炙井泉石以上各等分上用水杵臼搗羅為散次用獖豬肝一具去膽膜淨洗瀝乾用竹刀子隨肝直切作縫用藥末一兩摻入綿縛之入生絹袋內再縛定砂鍋內米泔煮更入青竹葉一握枸杞一握黑豆三合同煮肝熟為度取出俟冷食後用竹刀隨片切食之用原煮汁送下患久只須三兩具見效又須潔淨不可犯鐵器服之未有不驗也真珠散出聖惠方治眼青盲珍珠末三分胡黃連三分地膚子一兩石決明三兩搗碎研水飛過琥珀三分天靈蓋三分燒灰母豬肝半兩切炙乾上為散每服二錢食後溫水調下臨臥再服日二牛肝散出聖惠方治眼青盲積年不愈黃牛肝一具細切曝乾土瓜根三兩羚羊角屑二兩蕤仁一兩湯浸去赤皮細辛一兩車前子二兩上為細散每服二錢空心溫水調下明目地膚子散出聖惠方治眼青盲地膚子一兩石決明一兩半搗細研水飛過羚羊角屑一兩半車前子芎藭酸棗仁微炒各一兩上為細散每服一錢以黑豆湯調下不計時候服抵聖丸出聖濟總錄治一切眼昏障翳將至青盲不問新久皆可治家菊花去梗蒂取葉焙四兩附子炮裂去皮臍切如指面大一兩蒺藜子炒去角二兩肉蓯蓉淨洗酒浸一宿切焙大黃銼紙曝燒各一兩上以無灰酒二升半同拌和入銀石器內盛貯蓋了於飯甑中蒸自早及晡取出焙乾搗羅為末如有浸藥剩酒煮黃粟米入瓶子內蠟紙封口勿令透氣於廊廡間取一地穴收之次以水一盆傾在土中浸餅一宿來日取出淨洗瓶研入腦子南硼砂麝香一塊皂子大攪勻點粟米許入眼大眥頭神仙取藥出華佗中藏經方秦皮三錢去粗銼細勻乳香一塊如棗大胡黃連三錢燈心一把七寸長棗子二個斑蝥一個去頭足古老錢七文不銼上都為粗末入無油器尤佳用井華水一大碗熬去半碗用綿絹濾過將滓以水米碗煎取一盞濾過同煎汁入新碗中熬似粥樣入小瓷盒中或角盒中盛將空青並硼砂一塊如兩豆大飛過熬干空青不熬再研入腦子多不妨麝香少許四味同入藥膏內攪勻每點一粟米許在眼中眥頭將手挪勻仰面候藥微澀過將沸鹽湯用軟帛片蘸洗冷則易之種空青法出華佗中藏方朴硝半錢白蒺藜一分龍膽草一分仙靈脾葉一錢旋覆花一錢上為細末用黃泥一塊拳大同藥和勻水調如軟飯相似作土餅一個用太平錢五文按五方排定光面黑書金木水火土五字所寫字向下錢字向上隨五方按用硼砂如豆大四顆每顆按在四方錢的孔罅中須要干黃土食蓋著土餅再將新砂盆一個蓋之此作空青法不可嫩亦不可老須得中也土餅冬月十日夏月五日取出於錢上摘取下細研入藥此為準能遠視不能近視者陽氣不足陰氣有餘也乃氣虛而血盛者陰火有餘氣虛者氣弱也此老人桑榆之象也能近視不能遠視者陰氣不足陽氣有餘也乃血虛氣盛血虛氣盛者皆火有餘元氣不足火者人身真氣之賊也元氣來也徐而和細細如線邪氣來也緊而強如巨川之水不可遏地芝丸出試效方治眼不能遠視能近視或赤腫痛及大癘風成癩悉皆治之生地黃四兩焙乾秤天用冬四兩去心秤枳殼二兩麩炒去瓤研甘菊花三兩去枝秤上同為細末煉蜜為丸如梧桐子大茶清送下一百丸溫酒亦可食後服琥珀金絲膏出楊氏家藏方治一切眼疾退翳除昏黃連去須二兩龍膽草黃柏去粗皮山梔子一處搗碎以上三味各一兩乳香一分別研白沙蜜半斤青竹葉二百葉大者剪碎上前七味用水三升同浸一伏時於銀石器內慢火熬至一升退火放冷用絹袋作五七次絞取藥汁滓腳不用於不透風處放一伏時澄下腳滓又復去之四日再傾取清藥汁更於銀器內再以慢火熬去一半次入白沙蜜同攪不得住手俟有蜜香用枝子挑出藥試之放冷再挑起有絲為度用絹袋子又濾去滓於磁盒盛之方入研細生腦子一升同膏子攪令勻每用少許以銅箸點之熊膽膏出楊氏家藏方退翳膜內障除昏澀隱痛及風毒上攻胬肉侵睛或暴赤腫痛羯羊膽一枚大者白沙蜜半兩杏仁七枚去皮尖雙仁研黃連去頭須三錢搗碎南硼砂半錢別研乳香少許別研輕粉少許馬牙硝半錢別研上先將羊膽並蜜傾在磁盞內次入黃連杏仁浸一宿綿濾過次下余藥用紙兩三重緊封口掘地坑五寸入藥盞坐定蓋之三日匙取出點之頑荊散出楊氏家藏方治一切眼疾頑荊藥全蠍去毒炒躑躅花川芎四味各一分香白芷細辛去葉土鵝不食草上三味各半錢雄黃別研沒藥別研乳香別研三味各半錢鬱金研末盆硝四錢別研腦子薄荷四錢上杵細末入研者藥令勻每用少許含水搐鼻中青玉散出楊氏家藏方治退翳除昏消瘀肉止淚療隱澀龍骨一錢白善土一錢銅青半錢輕粉一字腦子一字上件並研令細每用一字白湯泡洗神明椒菊丸出家藏方治目睛失明而睛不損者或十分不見半月取效見二三分服藥一百日收全功如冷淚及瞼緊瞼腫肝虛肝熱腎風攻注眼目及患昏花服之立愈川椒一兩甘菊二兩生地黃洗一升上生地黃控斷水脈入木臼內爛搗或砂盆內爛研以絹袋絞取自然汁可得十二兩以上去滓不用將川椒甘菊入地黃汁內浸少時漉出俟水脈斷入慢火焙之約八九分干再入地黃汁再漉再焙如此以汁盡為度焙令透干木臼內搗為細末煉蜜丸如梧桐子大以溫水下三十丸椒靈丹出家藏方治一切眼此方治人眼見一物為二之證神效不可言青鹽二兩川芎防風附子炮各一兩菊花半兩椒子四兩去蒂並子及有閉口者上件藥先將青鹽椒用好醋一碗煮盡為度後將四味藥搗羅為細末將椒裹藥為丸每服三十丸空心鹽湯下如有此證宜與丹藥門飛靈丹相間服屢經大效治洗眼方出護命方五倍子去塵土蔓荊子去蔓各一分秦皮半兩上為細末每服三錢以十分水一碗於器內煎取八分淋洗便得通明快利兼治風癢點眼方廣南四時攝生論腦子砂糖各一錢黃連末半錢銅青飛過水浸半錢爐甘石末三錢上入糖一處研勻罐兒盛了點時以少許點眼頭用水一盞銅箸洗之搐鼻方廣南四時攝生論川芎甘草細辛桔梗蠍梢七個龍腦薄荷葉上各二錢重為末再入乳缽內研細入雄黃一錢重研勻方可用搐鼻藥明眼又去頭風還睛菩薩水龍膽草一錢槐角洗切碎一錢雪水少許生珍珠二十七粒別研為細末白沙蜜少許竹上露水少許須用天水時以瓷器內服上以新瓷盒盛甑上蒸兩次研令極爛以新綿重濾過入別瓷盒內再以雪水隔盒子窨一夜又將腦子少許乳缽內先研為細末卻入前蒸雪水藥再研勻每日日中時用新筆炒如米粒大以新汲水蘸濕點入眼中閉眼俟藥行淚出方醒連使兩次右史曾南仲用之真有奇效撥雲撥翳丸出德生堂方治一切眼疾內障青盲瘀肉攀睛視物不明川芎當歸各一兩半楮膏子薄荷各半兩黃連蟬殼各五錢瓜蔞根六錢蔓荊子六錢甘菊花密蒙花各一兩荊介穗蛇蛻皮甘草湯炙各三錢地骨皮一兩白蒺藜一兩半炒川椒一兩半去目上為細末煉蜜丸如梧桐子大每一兩作十丸每服一丸食後臨臥茶清下當歸連翹湯出衛生家寶治眼白睛紅隱澀難開當歸三分黃連五分甘草三分連翹四分南黃柏五分上都作一服水二盞煎一盞去滓熱洗之目痛累年或三四年方出本草取生螺一枚以水洗之令螺口開以黃連一塊納螺口中令其螺飲黃連汁以綿注取汁著眥中除風明目去骨熱消渴益陽事出本草以枸杞葉和羊肉作羹人若渴可煮作飲代茶飲之白色無刺者良與乳酪相惡治眼花出本草北夢瑣言云有少年眼中常見一鏡子趙卿詔之曰來晨以魚鱠奉候及期延於閣內從客久集候客退方得攀接俄而臺上施一瓶芥醋更無他味少年飢甚聞芥醋香輕啜之逡巡再啜遂覺胸中豁然眼花不見卿雲君吃魚鱠太多非芥醋不快故權誑而愈其候也除目障暗出本草用越砥石磨極細汁滴目中明目出本草以菊花作枕枕之明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉洋洋如船車上者出本草以槐實合房折取除干煮服味一如茶明目出本草以風延母煮服之明目鎮心安神定志出本草以生銀水磨服之明目消翳出本草以綠鹽點眼常服明目洞視出本草以胡麻一石蒸之三十遍研末酒服每日一升明目除翳出本草以琥珀摩之明目出本草取柏葉露飲之針眼附論夫針眼者以邪熱搏於血脈上攻眼目發於瞼眥結焮腫痛赤眼白頭包裹膿汁痛如針刺治法當詳其外證隨宜砭刺決邪毒後以清腫敗熱之劑斷其根本方大黃散出聖惠方治風熱毒風忽眥眼瞼腫如米豆名曰針眼白睛似水泡疼痛不可睡臥川大黃銼研微炒黃連去須藍葉川朴硝各一兩甘菊花一兩五錢川升麻黃芩梔子仁各三兩甘草半兩炙微赤銼上為散每服三錢以水一中盞煎至六分去滓每於食後及夜臨臥溫服忌炙爆油麵生菜玄參散出聖惠方治針眼赤腫心躁風熱壅滯眼開即澀痛玄參防風去蘆頭馬牙硝子芩各一兩甘菊花羚羊角屑蔓荊子赤芍藥各三兩甘草半兩炙微赤銼上為散每服三錢以水一中盞煎至六分去滓每於食後溫服臨臥再服之牛黃散治針眼瞼內生泡如大豆隱睛腫痛牛黃細研黃連去須玄參犀角屑川升麻決明子鬱金梔子仁各一兩柴胡二兩去苗上為細散入牛黃研勻每服於食後竹葉湯調下一錢臨臥夜服之羚羊角散治肝膈虛熱生針眼腫赤羚羊角屑枳實麩炒微黃荊芥各三分茯神防風去蘆頭地骨皮各一兩麥門冬各一兩半去心焙上為散每服三錢以水一鍾煎至六分去滓入生地黃汁半合更煎至一沸每於食後溫服之麥門冬湯治目內眥成胞三五間生濃汁者麥門冬去心焙旋覆花木通銼大青各一兩半茯神去木黃連去須各一兩上粗搗篩每服五錢水一盞半煎至七分去滓入生地黃汁半合芒硝末半錢更煎三二沸食後臨臥溫服柴胡湯治熱氣衝目內眥腫起石膽散治針眼暴腫痛不得開點之眼上石膽研如粉一分黃連去須搗黃柏去粗皮搗各三分茯神去皮研銅青研芒硝各半兩上為末更入乳中衝重研令極細勻每取如黍米大點目眥頭協毒膏治針眼磣澀腫痛川大黃三兩木香一兩玄參白蘞射干川芒硝各二兩上為散以雞子白調如膏貼在眼瞼上干即易之半夏湯治熱癢目眥結成腫泡俗叫偷針兼治眼赤腫痛半夏湯洗七遍洗滑為止細辛去苗及葉各二兩前胡去蘆頭枳殼去瓤麩炒各二兩烏梅肉一兩上粗搗篩每服五錢水一盞半入生薑一棗大拍碎同煎至六分去滓食後臨臥溫服大黃湯治眼暴熱痛眥頭腫起大黃銼炒枳殼去瓤麩炒芍藥各三兩山梔子仁黃芩去黑心各二兩上粗搗篩每服五錢水一盞半煎至七分去滓食後臨臥服石膽散治眼忽結腫石膽煅令紅去火毒滑石研各一兩秦皮半兩為末膩粉二錢上同研勻用一字湯浸俟溫閉目洗兩眥頭以愈為度熁眼方治針眼暴赤成瘡疼痛羞明玄參黃芩黃連去須各一兩上為細散以豬膽汁和令稠煎帛寸許將藥大小勻攤膏貼瞼上干即易之治針眼疼痛黃連去須杏仁湯浸去皮尖黃柏各半兩上搗令碎以綿裹入生地黃汁中浸頻點目中治偷針眼用燈心二寸蘸香油點之偷針眼方治脾間積熱兼宿食不化用秦皮銼細夾砂糖水調大黃末少許利之玄參湯一名羚羊角湯治熱毒攻眼眥腫起有膿汁者宜服此藥
