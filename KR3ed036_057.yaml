body:
  text: 卷五十七鼻門鼻淵附論夫內經謂膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也夫腦為髓海皆藏於陰故藏而不瀉令膽移邪熱上入於腦則陰氣不固而藏者瀉矣故腦液下滲於鼻其證濁涕出不已若水之有淵源也治或失時傳為衄蔑瞑目之患方川烏散治腦瀉防風白附子北細辛白茯苓川烏菖蒲乾薑香白芷川芎甘草節上各等分為末每服三錢嚼生蔥白湯調下食後服川芎防風散治積年腦瀉祕方得此疾多年服一料而愈川芎防風羌活乾薑荊芥以上各一兩甘草甘松各三錢白芷半兩上為末食後酒服不能飲酒茶清湯服雞蘇丸治腦熱肺壅鼻淵多涕雞蘇葉乾者麥門冬去心焙芎藭桑根白皮銼黃耆炙銼甘草炙銼各一兩生乾地黃切焙二兩上為末煉蜜和丸如梧桐子大每服二十丸食後臨臥人參湯下荊芥散出御藥院方治肺壅腦熱鼻淵不止荊芥穗藿香葉各一兩芎藭二兩龍腦研一兩石膏研如粉一兩半莎草根炒去毛二兩上為細末每服三錢食後荊芥湯調下防風湯出衛生寶鑑治大人小兒鼻淵腦熱滲下濁涕不止久而成衄血防風一兩半人參黃芩麥門冬去心甘草川芎各一兩上為末每服半錢沸湯點服食後日三服一方用天門冬無麥門冬前胡湯治腦熱鼻塞多涕前胡去蘆頭木通銼石膏各二兩黃芩去黑心甘草炙銼各一兩半大黃銼炒一兩上粗搗篩每服三錢匕水一盞蔥白一寸豉二十粒生薑一片大棗一枚煎至七分去滓溫服不拘時細辛湯治肺虛不調鼻塞多涕咽中有涎而喘項強筋急或痛細辛半夏曲茯苓桔梗各四錢桂枝二三錢甘草二錢上為粗末每服四錢水二盞生薑四片蜜半匙同煎至七分溫服日三神效宣腦散取黃水鼻中下立效川鬱金川芎青黛水飛薄荷水黃米各三二分上為細末每服少許冷水噙之蒼耳散出海上方治鼻流濁涕名鼻淵辛夷仁半兩蒼耳子炒二錢半白芷一兩薄荷葉半錢上並曬乾為細末每服二錢用蔥茶清食後調服芎藭散治腦熱鼻淵多涕芎藭莎草根炙各二兩石膏研水飛一兩龍腦研一分上為散每服二錢食後荊芥穗茶清調下川芎丸治腦瀉臭穢服藥後忌一時久熱食草烏生用半兩去皮尖蒼朮生一兩川芎生用二兩上為細末麵糊為丸如梧桐子食後茶清下十丸南星飲出直指方治風邪入腦宿冷不消鼻內結硬物窒塞腦不宣遂流髓涕用上等大白南星切成片用沸湯蕩兩次焙乾每服二錢棗七個甘草少許同煎食後服三四服後其後硬物自出腦氣流轉髓涕自收仍以大蒜蓽茇末杵作餅用紗襯炙熱貼囟前尉斗火尉透或香附子蓽茇末入鼻中治鼻濕不已並治腦瀉用藕節芎藭焙乾為末每服二錢米飲調下治腦流鼻涕用姜或乾薑煨塞之睡至一二更去之不止再塞治鼻淵腦瀉用生附子為末煨蔥涎和如泥敷湧泉夜間用妙川芎茶調散出如宜方治其病由腎氣虛腦髓不固亦有名鼻淵薄荷八兩川芎四兩羌活甘草炙白芷各三二兩防風一兩半細辛一兩荊芥四兩上為末茶清調服如鼻淵加辛夷鼻流清涕附論夫五臟化液遇熱則乾燥遇寒則流衍鼻流清涕至於不止以肺臟感寒寒氣上達故其液不能收制如此且涕泗洟皆鼻液也以繼泣則曰涕以生於肺則曰泗涕甚曰洟此獨言涕與宣明五氣言肺為涕同意方五味子湯治鼻出清涕五味子山芋各一兩半夏湯洗去滑三分鹿茸酒浸一宿酥炙白朮米湯浸一宿銼炒各一分附子炮裂去皮臍牛膝酒浸切焙甘草炙銼檳榔銼熟乾地黃焙乾薑炮製各半兩白豆蔻去皮木香丁香各一分白茯苓去黑皮三分上粗搗篩每服二錢匕水一盞煎至七分去滓空心溫服辛夷散出醫方集成治肺虛風寒濕熱之氣加之鼻內壅塞涕出不已或氣息不通或不聞香臭辛夷仁細辛洗去土葉藁本去蘆升麻川芎木通去節防風去蘆羌活去蘆一方無甘草炙香白芷各等分上為細末每服二錢食後茶清調下一方有蒼耳一半點熱者茶調合和服細辛膏出醫方集成治鼻塞腦冷常有清涕出不已細辛蜀椒乾薑芎藭吳茱萸附子各十八銖桂心一分兩皂莢屑半兩豬膏一升上㕮咀以綿裹苦酒漬一宿取豬膏煎以附子色黃為度去滓綿裹納鼻孔中並摩鼻上一方無桂心訶黎勒散出聖惠方治肺虛外傷風冷致鼻塞常流清涕頭目昏痛四肢不利訶黎勒煨用去皮白朮各一兩防風去蘆頭細辛前胡去蘆頭木通銼各三分附子一兩炮裂去皮臍麻黃二一分去根節甘草半兩炙微赤銼上為散每服三錢水一盞入生薑半分煎至六分食後溫服細辛散治肺傷風冷鼻流清涕頭目疼痛胸膈不利細辛一兩附子炮裂去皮臍白朮桂心蔓荊子芎藭訶黎勒煨用去皮以上各三錢分枳殼去瓤麩炒微黃甘草炙微赤銼各半兩上為散每服三錢水一盞入生薑半分煎至六分去滓食後溫服川椒散出直指方治流涕大紅開口川椒微炒出汗訶子煨取肉川白姜生者肉桂川芎細辛淨白朮等分上為末每服二錢溫酒調下白朮散出聖惠方治鼻流清涕日久不止皆因肺臟虛寒心膈壅滯頭目不利白朮一兩丁香訶黎勒煨用皮桂心細辛附子炮裂去皮臍各三分枳殼去瓤麩炒微黃半兩吳茱萸一分湯浸七遍焙乾微炒上為細末每於食後溫酒下一錢芎藭散一名通草膏出聖惠方治鼻中清涕出腦冷所致通草辛夷仁各半兩甘遂一作甘草北細辛去苗桂心芎藭附子各一兩上為末蜜丸梧子大綿裹納鼻中密封塞勿令氣泄丸如麻子漸稍加大微覺小痛搗姜為丸即愈此方治腦冷所致然此疾亦有腦熱者亦有肺寒者素問云膽移熱於腦則辛頞鼻淵又曰腦滲為涕肺之液為涕當詳審之一方白狗膽和丸更佳甘遂丸出本事方治鼻多清涕甘遂一兩細辛去苗葉一兩半附子炮裂去皮臍木通銼各一兩一分乾薑炮製肉桂去粗皮吳茱萸湯浸焙乾炒各一兩上為末煉蜜和捻如棗核大以綿裹納鼻中仰臥即涕出日三易之避風以瘥為度芎藭膏出聖惠方治鼻塞多清涕芎藭細辛去苗葉吳茱萸湯浸焙乾炒蜀椒去目及閉口者炒出汗乾薑炮製皂莢炙刮去皮並子各三分上細銼以醋浸一宿納豬脂於銀器中煎候五七沸去滓傾入閣中澄凝以綿裹少許納鼻中一方有附子一味塞鼻桂膏出聖惠方治鼻常有清涕桂心細辛乾薑炮製銼川椒去目及閉口者炒出汗各半兩皂莢一分上為末以青羊脂和成膏每用如棗核大綿裹塞鼻中杏仁膏一名通鼻散出聖惠方治鼻久塞清涕不止杏仁湯浸去皮尖雙仁炒二兩附子炮裂去皮臍一兩半細辛去苗葉蜀椒去目及閉口者炒出汗各一兩上細銼以醋浸一宿用煉成豬脂一斤銀器盛微火煎之候附子黃色去滓傾入閣中澄凝以綿裹少許納鼻中塗囟上一名塗囟膏一方無蜀椒二黃散治鼻痛流臭水氣腦冷漏下硫黃黃丹炒白芷上等分為末少許吹鼻中三五次即愈灌鼻黃連汁治鼻塞多年清水出不止黃連去須二兩蒺藜苗二把上細銼水二升煎至一升取一合灌鼻中不過再灌大嚏瘥治鼻流清涕不止用白芷末蔥白搗爛和藥為丸小豆大每服二十丸茶清下傷風鼻塞清涕不止上用白芷一兩無白芷則用薄荷荊芥一錢為末以臘茶清調下鼻中生瘡附論夫心肺有病鼻為之不利蓋心肺在膈上肺開竅於鼻心肺壅熱氣熏於鼻間蘊積不散其證乾燥而痛甚則成瘡也惟能平調心火以利肺經則瘡可已夫鼻者肺之竅故肺氣通於鼻也若臟腑不調陰陽痞塞氣血壅滯營衛不通則上焦生熱邪熱之氣伏留不散上攻於鼻故令鼻中生瘡也方烏犀丸治鼻中生瘡烏犀細鎊一兩羚羊角細鎊一兩胡黃連半兩貝母微炒去心半兩知母焙三分麥門冬去心焙半兩三分天門冬去心焙半兩甘草炙一分黃芩去黑心一分人參半兩牛黃一兩別研丹砂半兩別研柴胡一兩去苗上除別研外搗羅為末入別研藥同更細羅煉蜜和丸如梧桐子大每服二十丸空心溫酒下前胡湯出聖惠方治鼻中生瘡咽喉塞閉及乾嘔頭痛飲食不下前胡去蘆頭三分升麻木通銼黃柏微炒玄參各一兩大青三分芒硝一兩麥門冬去心焙三分竹青茹三分上粗搗篩每服三錢水一盞匕煎七分去滓溫服食後日再白蘚皮湯治肺風虛熱氣脹鼻中生瘡喘息促急時復寒熱白蘚皮玄參葛根銼白前大黃銼碎微炒各二兩知母焙鱉甲醋浸去裙襴秦艽去苗土各一兩半上粗搗篩每服三錢匕以水一盞入童子小便少許同煎至七分去滓溫服如人行四五里再服升麻湯治鼻乾癢生瘡乾嘔不下飲食升麻桔梗炒黃芩去黑心犀角細鎊貝母微焙去心龍膽各半兩甘草炙一分上粗搗篩每服三錢匕以水一盞煎至七分去滓溫服不拘時候日三辛夷膏治鼻中生瘡氣塞多涕辛夷一分白芷半兩藁本去苗土甘草當歸去蘆頭各三分上細銼以清酒六合羊髓十二兩銀石器盛火上煎三五沸去滓傾入閣中澄凝以大豆許納鼻中日夜各一地黃煎治鼻生瘡癢痛不止生地黃汁一兩合苦參銼一兩酥三合鹽花二錢後入生薑汁一合上以地黃生薑汁浸苦參一宿以酥合於銅石器中煎九上九下候汁入酥盡去滓傾入閣中每以少許滴於瘡上諸風熱瘡亦佳其鹽花至半即下辛夷膏出醫方集成治鼻內生瘡疼痛或鼻中窒塞不通利及齆鼻氣不宣通並宜塗用之甚效辛夷葉一兩細辛木通木香香白芷杏仁湯浸去皮尖研各半兩上用羊髓豬脂各二兩同諸藥和於石器中慢火熬成膏子赤黃放冷入龍腦麝香各一錢為丸綿裹塞鼻中數日內脫即愈梔子煎出聖惠方治肺氣風熱鼻內生瘡山梔子去皮煨苦參木通各三兩上細銼以四兩酥同煎令香濾去滓傾入閣中每以少許滴入鼻中礬石煎治鼻中熱氣生瘡有膿臭兼有蟲滴鼻礬石一兩熬枯苦參生地黃洗令淨研絞取汁三合上為末以地黃汁並水二盞煎至三分合綿濾去滓少少滴鼻中三五度瘥大黃散出聖惠方治肺壅鼻中生瘡腫川大黃生用黃連去須各一分麝香一錢細研上為細散研入麝香令勻以生油旋調塗於鼻中又方出聖惠方杏仁一分湯浸去皮尖雙仁研為膏川大黃一分生為末上和令勻以豬脂調塗鼻中又方出聖惠方黃柏檳榔各等分上為末以豬脂調塗敷之治鼻中生瘡偷孝子帽以拭之又方出聖惠方以牛鼻津敷之又方出聖惠方以搗杏仁乳汁敷之亦燒核壓取油敷之又方出聖惠方上燒牛狗骨灰以臘月豬脂和敷之祀灶飯散治鼻中生瘡敷鼻中用祀灶飯不限多少燒為灰細羅為散以生油調塗敷之一方無香油馬絆繩散出聖惠方治鼻中生瘡敷鼻上用馬絆繩一條燒為灰研細羅以少許摻於瘡上黃柏飲治鼻中熱氣生瘡有膿臭兼有蟲用黃柏二兩去粗皮以冷水浸一兩日絞取濃汁一盞服之治鼻中生瘡及治疳蟲蝕鼻上用烏牛耳中垢敷之治鼻中生瘡出本草以生雞卵一顆開頭取白去黃著米醋拌糖火頓沸起擎下沸定更頓三度成熟熱飲酢盡不過一二次瘥止鼻洪並瘡出本草以壁錢蟲滴汁敷鼻中及瘡上疳蟲蝕鼻生瘡附論夫五臟皆有蟲蟲得風則化肺開竅於鼻肺經既虛風熱乘之鼻氣壅塞不得宣通則疳蟲因得侵蝕瘡生鼻間方椿根湯治疳蟲蝕人口鼻椿根切一升去皮鹽半合蔥白切半升椒去目及閉口者炒出汗一合豉半升上合和以醋及清泔各三升煎十數沸去滓約及一升分作三服有惡物下即效小兒量大小加減治鼻上赤瘡石葶脂輕粉雞心檳榔各一兩片腦半錢上為細末相合用唾津搽於面上臨臥塗之大有神效如聖散治疳蟲蝕鼻生瘡及鼻下赤爛胡粉半兩麝香研一字匙甜瓜蒂七枚為末入粉內同研上再同研勻蟾酥少許浸一宿次日取蟾水先和胡粉次同和丸如緑豆大每用二丸水化敷瘡上鼻下赤爛者塗赤爛處小兒每用一丸烏香散治鼻疳瘡侵蝕鼻柱草烏頭燒灰麝香研等分上同研細以少許貼瘡上青金散治疳蟲蝕鼻生瘡及鼻涕淹潰銅青白礬生研等分上同研為散每用少許敷瘡上小兒亦可用治疳蟲蝕鼻生瘡出十便良方用燒銅箸頭以酢淬之數過取酢敷之銀屑方治疳蟲蝕人口鼻唇頰作瘡穿透者洗瘡銀屑十兩水三升煎取一升一日三四度洗瘡仍於銅器中煎用又方出十便良方上以綿裹犀角灰夜臥著之又方出十便良方上燒牛骨灰末以臘月豬脂和敷之瘥治疳蟲蝕鼻生瘡出本草燒杏核壓取油敷之治鼻口急疳蟲蝕數日欲死用藍靛敷之令遍日十度夜四度立瘥鼻乾附論夫鼻乾無涕者由臟腑壅滯內有積熱攻於上焦之所致也風客肺氣通於鼻主於涕若其藏挾於風熱則津液不通皮毛枯燥兩頰時赤頭痛鼻乾故令無涕也方神明青膏出千金方治鼻中干灌之並摩服蜀椒五合皂莢黃芩石楠黃連雄黃桂心藜蘆各三銖白朮芎藭大黃澤瀉各七銖烏頭莽草續斷人參各五銖半夏當歸各十二銖乾地黃十一銖葳蕤細辛各十銖乾薑六銖戎鹽杏子大二枚附子桔梗各三二銖上件以苦酒一斗漬之羊髓一斤為東南三隅灶納諸藥炊以葦薪作三聚新好土藥沸即下置土聚上三沸三下訖藥成以新布絞去滓病在外火炙摩之在內溫酒服為丸如棗核大日三服瘥後稍益以知為度犀角散出聖惠方治肺熱鼻乾無涕心神煩悶犀角屑木通銼赤茯苓川升麻黃耆銼馬牙硝杏仁湯浸去皮尖雙仁麩炒黃以上各半兩麥門冬去心焙一兩硃砂一分研細龍腦一分細研甘草炙一分上為細散每於食後竹葉湯調下一錢木通散出聖惠方治肺臟積熱兩頰時赤皮膚枯燥鼻乾無涕頭目多痛木通一兩麥門冬一兩半去心赤茯苓一兩石膏二兩犀角屑半兩桑根白皮一兩銼杏仁一兩湯浸去皮尖雙仁炒微黃甘草半兩炙微赤銼白前一兩上為散每服三錢水一中盞煎至六分去滓食後溫服天門冬散治肺壅腦熱鼻乾無涕大腸祕澀臥眠心躁天門冬大黃升麻桑白皮枳殼甘草各半兩荊芥一兩上㕮咀每服二錢水一盞煎至六分去滓分作五服桑根白皮散治肺臟積熱皮膚乾燥鼻痛無涕頭痛心悶桑根白皮銼木通銼川大黃銼碎微炒甘草炙微赤銼以上各一二兩川升麻一兩半石膏三兩葛根三兩銼上為散每服三錢水一中盞煎至六分去滓食後溫服吹鼻散治鼻乾無涕龍腦半錢馬牙硝一錢瓜蒂十四枚為末上同細研每用一緑豆大吹入鼻中鼻皰酒齄附論夫面生齄者由飲酒熱氣衝面而遇風冷之氣相搏所生也故令鼻面生齄赤皰匝匝然也方硫黃膏專治赤鼻生硫黃香白芷栝蔞根膩粉以上各半銖錢芫菁七個去足翅一方無芫菁用天仙子全蠍一個蟬蛻五個洗去土上為細末麻油黃蠟約度如合面油法多少熬勻取下離火入諸藥在內每用少許臨臥洗面淨面油用之近眼處勿塗數日間瘡腫處自平赤消再服後藥何首烏一兩半防風黑豆去皮藁本荊芥穗地骨皮洗各一兩桑白皮天仙藤苦參赤土以上各半兩上為細末煉蜜為丸如梧桐子大每服三四十丸食後茶清送下木蘭皮膏出聖惠方治酒毒齄疱木蘭皮防風去蘆頭白芷木香牛膝去苗赤芍藥獨活杜衡當歸白附子細辛芎藭以上各一兩麝香半兩細研上細銼以臘月豬脂二斤微火熬以白芷黃為度濾去滓入麝香攪令勻瓷閣中盛每夜薄塗之何首烏丸出危氏方治肺風面赤鼻赤何首烏一兩半防風黑豆去皮荊芥穗地骨皮洗各一兩桑白皮天仙藤苦參赤土各半兩上為末煉蜜丸如梧桐子大每服三四十丸食後茶清下一方有藁本一兩治紅鼻出德生堂舶上硫黃天仙子小椒雄黃枯礬二奈子各一兩麝香輕粉少許上為細末麻油調搽瘡上梔子丸出聖惠方治酒齄鼻皰及因飲酒過多齄鼻齄疱梔子仁豉各三升大黃六兩木蘭皮半兩芎藭甘草各四兩上為末蜜和丸如梧桐子大每服十丸日三加至十五丸冬瓜子散出聖惠方治鼻面酒齄如麻豆及疼痛搔之黃水出宜服梔子仁二兩柏子仁白茯苓葵子微炒各一兩冬瓜子仁微炒二兩枳實一兩麩炒微黃上為散每於食後以粥飲調下二錢石亭脂散治酒傷肺經面上生赤鼻紅瘡石亭脂一錢當歸輕粉各半錢腦子少許檳榔三錢上為細末用絹袋盛了於鼻內聞之至夜用津唾濕瘡將藥於鼻瘡上搽磨天明用水洗去藥仍以蒼耳草五月五日午時採取陰乾用酒浸九蒸九曝研為末煉蜜和丸如彈子大每服一丸食後溫酒化下日進三服半月除之白龍散出危氏方治酒齄鼻並面上肺風瘡川芎藁本細辛甘草白芷上各等分如澡豆法更須略罨少時方以湯洗去食後服龍虎丹一貼只作一服不半月盡退局方云其人舊赤齄可畏今瑩然潔白矣肺風丸出瘡科精要治面鼻風齄及齄疱苦參二兩細辛旋覆花羌活各一兩晚蠶蛾二兩去皮翅足上為細末軟飯和丸如梧桐子大每服五十丸茶酒任下不拘時候皂角丸出聖惠方治飲酒過多鼻齄疱皂角一斤不蛀者去皮以酥五兩漸塗以慢火炙酥盡為度然後捶碎以新汲水挼用生絹濾過以慢火熬成膏防風去蘆頭獨活甘草炙微赤銼牛蒡子微炒各一兩上為末入皂角煎和丸如梧桐子大每服於食後茶酒任下二十丸肺風赤鼻草烏尖七個豬牙皂角一錢明礬五分麝香一匙字大楓油上為末和勻瓷器內於火上熔開調藥先以姜搽次用手指蘸藥搽之一日三次無不效木香膏出聖惠方治積年酒齄並生面上風瘡硫黃細研蝸牛殼自死乾枯小者為上淨去泥土木香杏仁去皮尖研如膏朱粉各半錢上為末入杏仁朱粉硫黃都研令勻以臘日面脂調如稀膏每夜欲臥時以淡漿水淨洗面拭乾以藥塗所患處平明即以溫水洗之濕疥以米泔洗了塗藥三五次亦瘥治酒齄鼻生硫黃三錢黃連白礬乳香各一錢半輕粉半錢上為細末用唾津蘸藥搽之一日二次塗須去赤為度神效白附子散出聖惠方治肺臟風毒及酒齄疱癢發歇無定白附子細辛各一兩木香白豉各半兩麝香一分細研上為末入麝香研勻水調如膏夜臥塗之治鼻皰蒺藜子梔子仁豉各一升木蘭皮半斤一本無上為末以酢漿水和如泥夜敷之日未出時暖水洗卻亦主滅瘢痕粉黃膏治肺熱鼻發赤瘰俗為酒齄硫黃一分為末輕粉烏頭尖各少許為末蘿蔔切去蓋剜作甕子入硫黃在內以竹針蓋定安正煻火煨一宿取出研細為末少許上研勻以面油調臨臥時敷早晚洗去以酥調尤佳又方乳香硫黃細辛輕粉等分上為細末用水調敷治酒齄鼻並鼻上贅肉及面上雀子斑等疾亦可點痣黃丹五文硇砂三十文研極細餅藥五十文罐子盛巴豆十個去殼膜紙裹壓去油上同入餅藥罐子中慢火熬三兩沸取下續入研細生礦灰三錢雞子清調勻酒齄鼻用雞毛掃在紅處一日一次上藥追出毒物病退即止次服消風散樺皮散之類五七貼雀子斑用小竹棒兒挑藥點患處才覺微腫即洗去不洗去恐力太猛趙君猷撫干所傳云二卿趙再可知湖州時與一詩僧相厚而僧患酒齄鼻端生赤贅數枚大者如橘小者如梅李下垂過口飲食言語皆所妨廢良自厭惡之郡有一小兵事刀鑷人但聞其善取靨誠不知其能治酒齄也一旦自言於僧請醫此疾即以藥敷之凡半月餘每日取惡物如膿血自皮膚出者甚多其贅後悉成痂落去鼻面瑩然遂以十千為謝且語二卿俾直齊閣而求得其方以傳秀卿治人良驗治赤鼻及諸般面上風瘡大楓油五十文草烏頭一個輕粉麝香各一百文上將草烏頭為末入油內熬令勻取出少時後入輕粉麝香先令研細打和得所頻頻用少許以手塗擦患處令熱旬日即瘥一方無輕粉用生薑擦患處敷藥又方治肺風酒齄鼻明礬明硫黃用紅色者好片腦少許與二藥同研上等分研為細末以指蘸藥搽患處治酒齄鼻及婦人鼻上生黑粉刺者生硫黃半兩杏仁二錢半輕粉一錢上為細末用餅藥調臥時塗上早則洗去數次絶根又方治肺風酒齄鼻生硫黃乳香白礬生用各等分上研如粉每用手指微抓動患處以藥搽之不月餘必愈治赤鼻石亭脂蟬蛻白礬上各等分為末入松香為細末用青蔥葉盛貯用黃皮湯就煮數沸取出待冷碾細入輕粉和勻香油調敷檳榔散治鼻頭赤雞心檳榔舶上硫黃等分片腦少許上為細末用漿絹帛包裹時時於鼻上搽磨鼻聞其臭效又加萆麻子肉為末酥油調臨臥少搽於鼻上終夜得聞又方枇杷葉一兩去毛陰乾新者佳梔子半兩上為細末每服二三錢溫酒調下早晨服先去左邊臨臥服去右邊效如神療治酒齄鼻一名凌霄花散人服之屢效但藥性差寒須量虛實凌霄花山梔子上等分為細末每服三二錢食後茶調下日進三服一方亦治鼻赤臨川曾景仁嘗苦是疾一日得此方于都下一異人不三次遂去根本趙太叔親服見效治鼻赤風詩曰肺風鼻赤最難醫我有良方付與伊但有硫黃為細末茄汁調塗始是奇淡寮方不用茄汁冷水調敷鼻上夜間用敷免妨人也又方上用消風散何首烏散各五貼和一處用茶清或酒送下苦參丸不拘時服忌早酒一月五風散出海上方治酒齄鼻上用小烏沉湯五貼小消風散五貼和勻以湯點服梔子仁丸出淡寮方治肺熱鼻發赤瘰俗名酒齄鼻上用梔子仁不以多少為細末黃蠟為丸如梧桐子每服二十丸食後用茶酒任下又方出百一選方治酒齄鼻用南番沒石子有竅煮水研成膏手指蘸塗甚效療治鼻面酒齄及䵟𪒟出仁存方用蜀葵花一合研細臘月脂調敷每夜用之治酒齄鼻方出直指方用白鹽常搽妙鼻中外齄瘤膿水血出出危氏方用露蜂房一個以火炙焦為末用溫酒下方寸匕每日三服又方出海上方治酒齄鼻赤皰注上面臉者用腦子不以多少真酥調塗敷之不以度數用之即瘥專治鼻中外齄瘤膿血用槲葉灰先以泔清者榆葉取汁洗蹙干納灰瘡中良專治鼻中外齄瘤膿血出者出肘後方用取正月鼠頭燒作灰以臘月豬脂敷瘡上療治鼻齄面部生瘡俗呼酒齄鼻用使君子去皮不以多少用香油一盞浸三五個臨臥時細嚼用香油送下專治酒齄鼻神效用牛黃末水調敷之專治赤鼻用豬肝一付人參潤肺散一貼加桑白皮同煮肝熟肝與藥空心皆吃療治酒齄鼻用刺薊花為末入生薑汁調瘡上入麝香輕粉少許為頭首小廝兒乳調搽大神效荊芥散出楊氏家藏方治肺風齄疱荊芥穗四兩防風去蘆頭白蒺藜炒去刺白殭蠶炒去絲嘴杏仁去皮尖甘草炙以上五味各一兩上件為細末每服二錢茶清調下食後赤龍散出楊氏家藏方涼血消風治鼻生齄疱赤土二兩半防風赤芍藥地骨皮何首烏當歸山梔子仁以上六味各二兩甘草炙一兩上件為細末每服二錢溫酒調下茶清亦得食後服越桃散出楊氏家藏方治汗出當風外受風邪面生齄疱川芎羌活去蘆頭防風去蘆頭甘菊花白蒺藜炒去刺甘草炙六味各一兩山梔子仁三錢上件為細末每服二錢茶清調下食後服萆麻子膏出楊氏家藏方專治肺風面赤生瘡並酒齄鼻歷青別研黃蠟輕粉硫黃別研萆麻子去皮研以上五味各二錢麻油一兩上件為細末將油蠟用文武火熬令蠟熔入前件藥末攪成膏子取出用瓷合子盛之每用少許於患處搽之紫葳散出楊氏家藏方治肺有風熱鼻上齄疱凌霄花半兩硫黃一兩別研膩粉一錢胡桃四枚去殼上件先將前三味和勻後入胡桃肉同研如膏子用生絹蘸藥頻頻揩之治鼻面酒齄疱出本草用鸕鷀糞一合研以臘月豬脂和每夜敷之治酒齄風鼻上赤出本草用橘子核微炒為末每用一錢匕研胡桃肉一個同以溫酒調服以知為度神效治酒齄枇杷葉不拘多少上布巾拭去毛焙乾為末每服三錢如茶點日兩三服
