body:
  text: 卷三百四刺瘡門竹木針刺附論夫竹木刺所傷若為患淺然入人肌肉久不得出則損動榮衛而作瘡或中風水則腫痛成膿淹留歲月未易治也刺傷之初宜速去之加以塗敷無致風水之孽方緑礬散出危氏方治竹草瘡發腫作疼傷時不曾出血盡被毒氣內攻痛不止夜臥不安被破時其瘡紫赤黑色較時起三五重皮是也緑礬半兩小便熬熱放礬於內候化取出曬乾丹參二錢半馬兜鈴根一錢半麝香一字研上為末漿水洗淨瘡口上敷貼立效治被刺入肉或是針棘竹木等多日不出疼痛方出聖惠方人參一兩去蘆頭龍葵根一把淨洗取皮醋少許臘月豬脂一兩上和令勻每用時取少許敷瘡上其刺自出治刺瘡疼痛不可忍者天茄苗四根長一握乾者妙乾薑一塊大者上將初種蔥白同搗黏捏作餅子貼上用麵糊紙花子按定效治手足卒中刺中水毒方出千金方韭藍青上搗置瘡上以火灸熱徹即愈蒜豆膏出聖濟總録治竹木針刺入肉不出惡瘡大蒜一棵巴豆七枚去皮上同研成膏敷之日一易皂莢灰出聖濟總録治竹木刺作膿貼皂莢一枚膽礬一分上燒作灰細研干貼之治竹木刺在皮中不出者出千金方以薔薇灰水服方寸匕日三服十日刺出溫酒調下亦得又方出千金方以鑿柄燒灰酒服二寸匕又方出千金方以頭垢塗之即出治刺在肉中不出方出千金方用牛漆根莖生者並搗以敷之即出瘡已合猶出也一方嚼牛漆根罨之即出或為末水調服亦得又方出千金方用白茅根燒末以膏和塗之亦治瘡因風致腫者一方搗白茅根敷之又方出千金方用鹿角燒末以水和塗之立出久者不過一夕一方用鹿腦厚敷之燥復易之即出又方出聖惠方用嚼白梅塗之其刺自出一方用烏梅又方出聖惠方嚼豉不以多少塗之良若治狐尿刺人者當看豉中有毛為度如無再敷之又方出千金方用溫小便漬之妨入水大妙治諸竹木刺在肉者外科精要以蠐螬蟲研敷之立出治骨刺入肉不出者出仁存方用茱萸細嚼敷之骨當爛出治竹籤在腳腿或四肢皮膚內無緣可出一名白檔酒出百一選方用白檔樹根槌碎細研酒浸平服滓罨患處即出神妙治竹木針刺入肉及雜物貼骨者以象牙屑水研敷之立出瘡即愈有人手中指為竹刺痛甚敷之愈一方以鼠腦和敷之又方出百一選方用烏羊糞爛搗水和罨傷處厚敷之佳曾有一莊僕腳上中刺不得出痛苦欲死以此藥黃昏敷上痛尤甚至四更其刺出遂安一方用豬脂和敷日三五上若不出重塗不覺刺出一云用干羊屎末獨栗膏治竹木刺及針刺入肉又方用鹹白魚鰾貼傷處然後以鰾膠燒存性灰用酒調服治竹木刺不出者爛研萆麻以絹帛襯傷處然後敷藥時時看覷若覺刺出即拔之恐藥太緊並好肉胬出也一云用絹襯出即拭之治針入肉不出用螻蛄腦捶爛塗上即出一方以螻蛄加鹽打爛塗患立出又方用硫黃研細調貼以紙花貼定覺癢其針即出又方用雙杏仁搗爛以車脂調勻貼在針瘡上即出治竹木刺不出用九里光覆上即出治竹刺簽腳不出方用苦薏搗細盦敷腫立消毒自散即出治菱角傷方上以生薑自然汁飲之絶妙取入肉刺用針挑傷處真桐油少許滴其上其刺突出鑷拔之王不留行散治竹木刺久在肉中不出用王不留行五兩搗羅為散每服一錢匕溫酒調下空腹日午夜臥各一服兼取根為末貼之或水服之亦得瞿麥散治竹木刺不出用瞿麥五兩搗羅為散每服一錢匕溫酒調下空腹日午夜臥各一服或水煮亦得梔子套方治簽刺在爪甲中痛不可出用梔子殼半個填車脂滿殼中套在指上痛處稍癢刺自然出以鑷子取之簽指亦依此法牛蒡葉散治一切金木竹所傷用蒡葉即惡實葉是六七月收者風乾為散每用量瘡口大小乾摻貼之不得犯別藥如經暑月蠅蟲下蛆在瘡上或因肌肉生合有成竅子者即用杏仁研成膏手捻作條子入在竅內其蛆蟲自出治鐵棘竹木諸刺在肉中不出及治針折入肉中出肘後方以鼠腦搗如膏厚塗則出治竹木刺入肉用蠮螉生研罯之糯米膏治竹木簽刺及金瘡水毒治八月九月中刺手足犯惡露腫多殺人以桑枝三條納煻灰中煨令極熱破斷以頭柱瘡口上令熱盡即易之盡二條則瘡自爛仍取韭白敷瘡上以布帛急裹之若有腫者更取用薤白佳治刺傷中風水疼腫出本草鯉魚目為灰研敷患處汁出即愈諸魚目皆可鮧魚目尤佳治竹木等物傷者用五爪龍擂細敷之即愈松脂方療刺入肉疼悶百理不瘥用松脂流出如細乳香敷瘡上以帛裹三五日當有根出不痛不癢不覺自落甚良治針入肉方刮指甲末同酸棗仁搗爛唾調塗上次日定出一方單用酸棗核燒為末敷之治竹木刺在肉方取柳樹上木耳煎湯漸漸服之其刺自出又方用槐白皮煮湯漬之愈又方以醋二斤置於大口瓶中取熱煻灰一升投之以刺處就瓶口熏之勿令著醋即以衣擁瓶口勿使氣泄又方用蔥白和鹽搗敷之便出又方上爛嚼栗子黃敷之自出極效治木刺入肉中不出痛方出本草取干羊屎燒灰和豬脂調塗不覺自出治竹木刺以鐵花粉敷之治竹木入肉經久不出者取魚遂鯷魚白敷瘡四邊肉爛即出刺一名鯣生南海惡刺附狐尿刺附論夫惡刺初得蛇虺毒氣經由草木水澤間有人染著忽似刺札俄致腫痛其肉潰爛若手足上著住指節墮落土人諳歷既多初覺刺時艾灸數粒十愈七八九灸弗愈者宜速以藥塗敷之夫狐尿刺者云是野狐尿棘頭上人犯之者則中多於人手指足指腫焮熱有端居不出而著此毒者則不必是狐尿刺也蓋惡毒氣耳故方亦云惡刺毒也方龍葵膏出聖惠方治惡刺龍葵根莨菪子胡荽子鼠糞杏仁湯浸去皮尖雙仁麩炒豉各半兩獨顆蒜半兩胡燕窠半兩上用漿水飲相和爛搗醋調封之每日一換經五七次瘥治狐尿刺多時不瘥方出聖惠方石鼠一枚白蘞羊糞栝蔞根各半兩上搗如膏封裹瘡上一復時其刺自出治惡刺方出聖惠方狐骨灰一分生蜜少許胡蔥少許上同研之以醋面紙封三日其刺自出矣蔥蒲膏出聖惠方治惡刺蔥白一握蒲公草兩握豉一合上搗爛用醋面紙封貼即出治惡刺方出千金方李葉棗葉上搗絞取汁點上即效野狐膏出聖惠方治惡刺用雄野狐唇爛搗和鹽封之蒼耳洗方出聖惠方治惡刺用蒼耳搗汁洗之木蟲塗方出聖惠方治惡刺取木中蟲和醋研封之無心草塗方出聖惠方治惡刺用無心草根爛搗醋和封之蔓荊牛乳敷方出聖惠方治惡刺以五月五日收蔓荊子旋搗末以烏牛乳和調敷之人乳亦得黑豆汁漬方出聖惠方治惡刺以濃煮黑豆汁漬之燕麥敷方出聖惠方惡治刺搗燕麥二三兩敷之治惡刺方出千金方以苦瓠開口納小兒尿煮兩三沸浸瘡上又方出聖惠方以莨菪根水煮浸之冷復易之治惡刺並狐尿刺方出千金方以烏叫驢尿漬之又方出千金方以熱蠟納瘡中新瘡亦善又以煙燻之令汁出即便愈又方上蒲公英草摘取根莖白汁塗之惟多塗為佳以瘥為止孫思邈云余以貞觀五年七月十五日夜左手中指背觸著庭樹至曉遂患病不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者論有此治方試復為之手下則愈痛即除瘡即瘥不過十日尋得平復此大神效故疏之蜀人名耳瘢菜關中名苟乳治惡刺出聖惠方取黑駁馬尿熱浸當有蟲出為驗一方用黑馬尿熱漬當愈數洗之一方用溫白馬尿漬之又方出聖惠方取狐屎燒灰臘月豬膏和封孔立愈治蛇骨刺人毒痛以鐵精粉如大豆以管吹瘡內治烏雄雞刺在肉中不出者及治竹木針刺用烏雞尾二七莖燒作灰以乳男子乳汁和封瘡刺當出桂蠟丸出聖濟總録治惡刺入肉用桂去粗皮搗為末熔黃蠟丸看瘡大小置瘡內濕紙三五重搭蓋以火熁候藥丸熔入肉其刺自出如無刺所傷者尤見愈速獨栗膏出聖濟總録治惡刺塗方用獨顆栗不拘多少爛嚼塗之裹以帛若有刺自出又方取米煮餅和油調須臾著瘡上即愈治惡刺出聖惠方以砒霜細研和膠清塗之又方出聖惠方用樗根白皮銼一斤米泔煮三二十沸放溫淋孔中良治狐尿刺人日夜燥渴痛不得睡臥方用蒲公草葉根搗絞取汁頻塗之瘥又方用杏仁細碎煮一兩沸承熱以浸螫處數數易之治狐尿刺人疼痛不可忍方用生栝蔞根香豉等分搗作餅敷上干即易之治狐尿刺多時不出者取牛蒡根及薤根敷之其刺自出又方取蛇蛻皮貼之自出治惡刺用硇砂和膠清塗貼其上即拔出刺治狐尿棘刺人腫痛欲死用打破雞子敷之瘥治狐尿瘡以蓼葉搗敷之玳瑁散治狐尿瘡用面末和獨頭蒜杵用玳瑁簪頭納瘡孔中蟲出愈治狐刺用上中饒磁片上色細白向陽日色所照者不以多少背陰者不可使不用底足揩去土不須洗以黃泥作一窩子盛磁片在內復以黃泥固濟或團於灶內以木柴燒令通紅只須於飯鍋下燒候飯熟已通紅矣取出放淨地上候冷打開去泥將磁片刮令極淨搗或研為細末然後入乳鉢內細研如粉無聲乃止每用少許摻瘡上即愈凡狐刺多因手足間被物簽觸損因而成瘡痛不可忍甚至於墮指仍有二種雄狐刺只一個瘡頭母狐刺七個瘡頭逐漸發出其瘡頭內黃水出不止向日視之瘡頭及四邊若有絲網其上瘡內亦如亂絲痛楚手不可近如其間有刺者是也用藥時先以口含溫鹽湯洗瘡以軟帛搵干挑藥在瘡口即安其餘瘡不須貼也滁州李直學嘗施此藥所治已千百人矣研時須用饒鉢若使石捶鉢即反被藥研下石末不可敷貼也治狐刺用爐中炭灰干罨在腫處上赤以好米醋澆之二物多用不防無力即易之赤退腫散立可見效肘後療狐尿棘刺人腫痛欲死方用熟桑柴灰汁漬之冷復易永瘥集驗狐尿刺方用熱魚汁灌瘡中治患惡刺取燕窩末以醋和如泥裹之三兩日易便瘥治惡刺瘡及浸淫瘡達身至心者死以胡燕窩中草燒為灰敷之治狐刺瘡用蟻穴中出土取七枚如粒和醋搽之治狐尿刺瘡取露蜂房煮湯洗之治狐刺毒腫用狐爪根搗敷治剝馬被骨刺破中毒欲死取剝馬腹中糞及馬尿洗以糞敷之大驗絞糞汁飲之效治狐刺瘡以麻鞋網繩如棗大婦人內衣有血者手大釣頭棘針二七枚二物並燒作灰以豬脂調敷瘡上出蟲
