氏方治癧潰與未潰皆可貼用蝸牛不拘多少以竹索穿尾上曬乾燒灰存性為末入輕粉少許豬髓調用紙花量瘡大小貼之一方取七個去肉入丁香七枚於殼內燒存性仍將肉同研成膏用棉花貼上瘰癧方用苦參四兩為末生牛膝和丸如桐子大食後暖水下十丸日三萆麻法出衛生家寶方用萆麻子炒熟旋剝取仁自初一吃一個二日二個增至三五日吃十個十五六日吃十四個至月末三十日只吃一個空心時下如是服一月足第二月不拘時候及不拘數目如吃果子之類或三或五或七或十兩月如此即愈此藥服過一生不可食豆腐則脹殺人經驗方陳氏云先兄年歲害癧時先公為杭州稅官刀鑷工獻此方初未信之偶出北關遇客二舟相差而過來者問其人所苦癧子如何往者云食萆麻子而愈歸即制而服之兩月而瘥一法用面麩炒去殼瓷器收每服三十枚日三服三次去其病根一方已破者研細醋調成膏貼之有奇效玉屑妙靈散出存仁方治瘰癧用桂府滑石二兩為末每服二錢米飲調下經驗方陳氏云余在書局見吳伯駿憂其長女之病日侵樓大防訪其所親趙司戶之母韓氏自言幼子年十一歲患此項上可見者有七十枚或授此方且云是心包絡中熱須用藥自小便出服覺小便澀急遂以意用琥珀研細濃煎燈心湯下良久旋下其物正如剝了皮葡萄肉前後下十七枚而瘡盡平復其子今為臨安參軍真神方也吳女得此方遂愈余親見其事近小兒亦患此用之立愈小兒苦此瘡始終兩年經醫不知其幾終不能去因服此藥旬日而愈後合此藥施人愈者十餘人挾大聖之名真不虛傳治瘰癧不問有頭無頭者出仁存方用大蜘蛛五個曬乾細研酥調如面脂日度二敷之用結網蜘蛛可用別的不宜用又方出仁存方用蝙蝠去腸胃新瓦上焙乾為末未破者水調攤紙上貼已破干糝之燒灰散出危氏方治癧用大田螺並殼肉燒存性灰破者干貼之未破者油調敷之經效方治瘰癧年久不愈者出危氏方用不蛀皂角子一百粒米醋一升硇砂二錢同煮醋盡炒令酥看所生癧子多少若生一個即每服一個生十個即服十個細嚼米飲湯下史氏小兒方酒煮夜臥含化三粒名破癧丹博濟方用酒浸三日文武火熬盡為度每服夜含化三粒與濟生方皂角子丸相似聖濟總録有硼砂虛弱老人休服皂角散出危氏方用不蛀皂角不拘多少每三十條作一束以棕櫚裹之縛定於溷釭內浸一月取出卻於長流水內再浸一月死水不能浣洗不可用去棕櫚曬乾為末皂角末一兩入麝香半錢全蠍七個研細勻一服一二錢酒或湯飲調下不過三次愈治瘰癧出瑞竹堂用乾薑不拘多少為末以生薑自然汁打麵糊和作劑子或丹為衣每日一次隨瘡大小入藥在內追膿盡生肉為度以瘡口合則已瘡口不斂用大黃末蔥白汁調搽即愈乃日服十宣內托散二服瘡疼痛不破者用野菊根搗爛煎酒服仍將用過菊根為末貼瘡自消不消瘡口破依煎藥劑追膿生肉斂口神效治瘰癧瘡方用全蠍四十丸將牡蠣灰同桑柴灰先用炭火於上前灰將安一窩卻把蠍放內埋用白紙一張鋪灰上用有黑點糯米二十四粒於紙上放一碗覆之蒸米黃取出見瘡放一粒即自愈凡人患瘰癧口破者活鯽魚一枚用本人小水浸死去腸肚用斑蝥七個去頭足等入魚肚中燒煅成灰入麝香少許在內即於瘡口乾糝再用黑膏貼之忌發物治癧子瘡斑蝥一兩糯米一升炒熟去頭翅取薄荷葉連翹荊芥穗各三兩為末用烏雞子清同前四味藥調和為丸如桐子大每服二十丸茶清送下治癧子瘡用鯽魚一個去腸不去鱗用萆麻仁一兩搗如泥裝入魚肚內用婦人護領油紙包定文武火內煨至焦去紙再用文武火煨只至成灰魚後煨成末每服三錢酒一盞調澄清五更不睡下惡物又方用大河魨魚子不拘多少用蒻葉包裹陰乾為末如未破者干糝治癧子瘡用松香不拘多少熔成汁新綿濾去入水九換水熔濾取出碾細每服二錢投雨前茶芽煎湯調下食後臥日進三服治瘰癧不問破與未破用之神效用舊破靴底洗淨曬乾燒灰一兩入輕粉三錢同乳香香油調和如瘡已破出膿水不須油調只干敷愈止又方用黃顙魚破開入萆麻子二三十個在肚內以綿縛定於廁坑內放冬三月春秋二月夏一月取出洗淨用黃泥固濟文武火煨帶性爛研末香油調數次又治滕瘡治盤蛇癧瘡用黃鴨黃又謂金條魚一個用線縛定放糞缸內過夜取出瓦上焙乾為末好香油調敷如不幹去油敷治癧已破未破者皆可服用黃鼠子一個全者入在瓶內鹽固濟瓶頭用火煅過熟取出為細末每服二錢用無灰酒調下治諸瘰癧方用薄紙剪成四片各長四寸以水銀膩粉各二錢雞子一枚破之取白和膩粉等攤在四方紙上看藥多少攤得若干片數仍於瓷碟中攤之藥勻為度於日內曬不得見火候八九分干和紙揭起細剪成桐子大每片丸作五十丸皂角子大煎湯溫服三丸日三空心日午臥服之第三日下鱉卵如爛杏小核之形者仍是病源不動氣治鼠瘰癧出本事方用刺蝟皮瓦上燥研為末入水銀粉干敷治漏瘡出本事方用蛇床子不拘多少瓦上焙乾為末紙捻搦藥入瘡口治瘰癧腫毒痛用粟生嚼罨之治癧方出肘後方用鉛三兩鐵器中熬之久之當有腳如黑灰取此灰和脂塗癧上仍以舊帛貼之數數去帛拭惡汁又貼如此半月許亦不痛不破瘡且自清為水永瘥陳藏器云黑錫寒治癭瘤鬼氣疰忤為末和青木敷風瘡腫惡毒治瘰癧用豺屎燒灰敷上治瘰癧疥瘡等瘡用蟾蜍屎狀如檳榔於土穴中及階除間得之新者獨軟乃蟾蜍屎也細研油調塗之治瘰癧及癬用鱔魚取血塗之治瘡瘰癧方用槲白皮三斤細切水七升煮三升去滓真硃砂方寸匕研和汁一升旦向日服之行須臾吐鼠出朝服良一方不用硃砂清涼散出聖濟總録治項下生瘰癧不論久新有熱可服用龍膽揀淨為散每服一錢匕或米飲調下食後夜臥服天陰不可服治癧已破者傳信適用方用羯羊糞焙乾為末用油調塗如瘡濕干糝又方用萆麻子研細醋調成膏貼之大有功效治瘰癧梟炙方用梟一隻取肉依常法炙熟食後五味汁下治一應癧瘡初起用貝母為細末食前頓服酒送下療項瘰癧出肘後方將死小兒腳踏之即瘥何首烏膏治瘰癧或破或不破下至胸前者皆治之用九真藤根其根如雞卵大洗生嚼常服又取葉搗覆瘡上數服即止其藥久服黑髮延年或取其頭獲之九數者服之乃仙矣其藥如杏其根亦類癧子用之如神九真藤何首烏是也治瘰癧出千金方用白殭蠶炙末篩水服五分七日三服又方出仁存方用貓兒開口取涎磨解毒丸敷之又方出仁存方用貓頭一個炙搗篩飲服方寸匕日二又方出聖惠方用狐頭敷之又方梧桐子葉𨫼上搗成灰絹羅蜜調敷干即易之貓腦骨散出千金方治癧又治鼠瘻貓腦骨莽草上各等分為末入孔中升麻調經湯出東垣試效方治頷下或頰下瘰癧此謂出足陽明胃之經中來也若瘡深遠陰曲肉底是足少陰腎中來也乃戊傳癸腎是謂夫傳妻俱作塊子堅硬大小不等並皆治之或作丸服亦可升麻八錢炙葛根五錢銼膽草酒製炒黃芩刮去皮酒浸半兩用當歸尾三錢桔梗半兩連翹半兩去心芍藥三錢炒黃柏去皮酒炒二錢等用知母酒炒一兩黃連去須五錢廣朮酒炒五錢京三稜碎切酒炒五錢甘草炙半兩生黃瓜四錢上另稱一半作末蜜為丸如緑豆子大每服百丸或百五十丸半多作㕮咀每服稱半兩若能食便硬可旋加至七八錢止水二盞先浸多半日煎至一盞去滓臥熱服腳高頭下而臥含一口作十次咽留一口在後送下丸子藥畢臥如常此制之緩也白藥散出衛生家寶治瘰癧瘡用白藥子不拘多少為末臨臥冷米飲或冷水調下一錢治癧子方龍腦一兩研薄荷一兩干皂角一兩去皮酥不沖焦黑去子用上為細末用鹽豉一合醋浸軟同搗得所如硬添醋丸如緑豆大每服十丸冷水下不計時日三四服忌咸甜動風等物龍泉散出東垣試效方治項上瘰癧馬刀將先出瘡用四稜鐵環按定不令走移作口子油藥紙捻之慎勿令合了絶其瘡之源其效至速如瘡不破或本人不肯破更以此散塗瓦松研極細龍泉粉各半兩炒半潤濕另研昆布去土三錢或五錢廣朮京三稜各半兩酒製銼炒上為細末煎熟水調塗之用此去疾尤速一二日一易之克效散出衛生家寶方治癧子瘡斑蝥四十九個不去翅足官桂半錢粳米四十九粒等赤小豆四十九粒硼砂上研為細末初服一錢次服二錢次服三錢次服四錢煎樟柳根湯送下空心服小便淋瀝為效噁心嘔吐黃水無妨其瘰癧日日自消玉燭丸治瘰癧自消血和經通當歸芍藥大黃甘草熟地黃芒硝川芎以上各等分上為粗末每服三錢水一盞生薑三片煎至七分去滓溫服日進一服七八日效治瘰癧瞿麥海藻凌霄花北壁背陰蟲別研皂角刺新者上各等分為末每服三錢米飲調下食後日二服麝粉散治癧子未破與破者急赤痛萆麻子四十九粒去皮葵菜子半兩炒輕粉半錢研麝香別研一錢上為細末每服一錢溫服酒調下日午臨臥各一服小便如米泔色不可再服止可服解毒散解之解毒散治癧子已曾宣積取毒了尚未退者宜服皂角子一百粒去刺炒黑色用連翹一兩半薄荷葉半兩日乾甘草三錢半生半炙桔梗上為細末每服一錢茶酒任意食後調下治鼠癧方信石入緑豆同研斑蝥為末去翅足用上為麵糊為丸黃丹為衣用時打破以醋浸一宿其瘡先以艾灸次用此又方白朮白茯苓甘草黃耆當歸好酒洗檳榔黑牽牛半生半熟白芷密陀僧白芍藥以上各一兩上為細末糊為丸如芥子大小兒七丸大人十丸至十五丸燈心湯下忌蔥菜油膩房色酒忌使性氣孕婦不可服復元通氣散立效治癧瘡作吐用乳香散煎甘草調服至安濟生名內托散諭甚詳治癧破膿水經年不安永類鈐方上用百十年第屋廚中壁上土為末入輕粉調敷半月瘡干愈治瘰癧已破者華陀中藏經方上用鉛炒取灰滓研細以溫鹽漿水洗淨貼之又方肘後方治癧上用馬齒莧陰乾燒灰臘月豬脂和以暖泔洗清瘡拭乾敷之日三治瘰癧出本草上上用蓼實子微炒碾為細末薄酒調二三錢服久則效效則已治新患瘰癧子不痛取桃樹枝貼上灸二七壯治瘰癧毒腫出本草上上以鐵爇及熟末凝塗之治瘰癧瘡出本草方上用胡桃瓤燒令黑未斷煙和松脂研敷瘡上治項邊癧子出本草方上以桃燒熏之治頷下瘰癧如梅李宜速消之出本草上上用海藻一斤酒二升漬數日稍稍飲之治瘰癧惡瘡蝕息肉白癜風出本草上上用馬骨燒為末淋汁先以物揩破瘡塗之治瘰癧出本草上上搗商陸根捻作餅子置癧上以艾炷於藥上灸三四壯乾熱易之治瘰癧出本草上七月七日出時收麻花五月五日收葉二件作炷子於癧上灸百壯治瘰子出本草上用苦耽苗子煮汁服或生絞汁服之苦耽苗子所在有之苗高三二尺結角如撮口袋中有子如紅朱俗人言耽發也治惡瘡瘰癧蝕息肉用白馬骨黃連細辛牛膝雞桑皮黃荊等分燒為灰淋汁塗之白馬骨江東以石榴葉短小對節者代之導引法養生方云踑踞以兩手從腳入據地曲腳加其上舉尻可用行氣治瘰癧乳癰
