body:
  text: 卷二百九十一瘰癧門總論瘰癧之名巢氏病源載三十六種千金聖惠所論瘰癧九瘻有風毒氣毒熱毒之異瘰癧結核寒熱之殊其本皆由恚怒氣逆憂思過甚風熱邪氣內傳於肝蓋怒傷肝肝主筋故令蓄結而腫其病多生於頸項之間結聚成核初如豆粒後若梅李核纍纍相連大小無定初覺憎寒壯熱咽項強痛腫結不消者當便服五香連翹湯牡蠣大黃湯疏下三兩行於上貼十香膏烏犀膏及用淋溻腫湯潰毒湯時復淋溻如此救療即得消散若未消散可服內消丸或皂莢丸之類漸以求瘥若腫結極硬荏苒日月不能內消者久必成膿若腫而稍軟其人面色萎黃皮膚壯熱上蒸膿已成也可以針決核中令其潰散則易愈也治法如瘡法於瘡口中用追毒蝕肉錠子紝之於上用烏犀十香膏貼之及托裡之劑和之經久不瘥或愈而復發或自別穴膿水透出流津不止肌體羸瘦者變成九痿內經曰陷脈為痿留連肉腠即此病也可用蒜餅子灸之然後瘡口只用紫金散翠霞散等於上任貼膏藥求瘥其將護慎治療用法無造次焉凡人少小以來動輒蓄怒或憂思驚恐抑鬱不伸多致結核於項日積月纍風毒熱氣聚焉於是腫濕開瘡起復無已甚則牽連至於腋下自腋下而蔓衍心胸殆無及矣發熱憎寒煩渴盜汗或寒熱往來或不痛其外證治法無他大抵以地膽斑蝥為主蓋瘰癧之毒莫不有根地膽斑蝥治療如法能使其根從小便中出或如粉片如塊血如爛肉皆其驗耳但病根之行小便小便亦必澀痛當以木通滑石輩導之然是痛必從小便出者何哉諸痛癢瘡蓋屬於心其或流行於小便就快也人有此患不惟懲忿寡欲謹護燥濕風寒其餘飲食百味一切戒之然投方匕之劑當以責效焉日飯蔬食而已結核在耳後或在耳前或在耳下連及頤頷或在頸下連缺盆皆謂之瘰癧或在胸極胸之側或在兩脅皆謂之馬刀手足少陽主之九頭腫瘰痛瘰癧及胸脅之間或有瘡痂腫核不消及膿水不止可滄鹽一二兩炒過以長流水一大碗煎之放溫作三五次頓服之訖良久於咽喉中以叉股引吐之去冷痰三二升通和血脈內經曰鹹味湧泄為陰銅人記少陽起於目鋭眥行耳後下脅肋過闌門瘰癧結核馬刀挾癭足少陽膽經多氣少血之病矣諸瘰癧附論論曰瘰癧諸病皆由風熱氣毒蘊積臟腑搏於肝筋所致蓋肝主筋毒氣攻於筋脈故隨肌肉虛處停結而為瘰癧多生頸腋間其狀結核纍纍相連如梅李謂之瘰癧方救苦勝靈丹一名救苦化堅湯出濟生拔粹方治瘰癧馬刀瘡挾癭從耳下或耳後下頸至肩上或入缺盆中乃手足少陽經分野其瘰癧者在於頭下或至頰車乃足陽明之分野受心脾之邪而作也今將二證合而治之黃耆一錢護皮毛間腠理虛乃活血脈亦瘡家聖藥又能補表之元氣消弱也通和陽氣泄火邪也人參三錢補肺氣之藥也如氣短喘不調有喘者用之甘草炙半錢能調和藥瀉火益胃氣升麻一錢葛根半錢真漏蘆半錢如無去此一味此三味俱足陽明本經藥也連翹一錢此一味十二經中血結氣聚必此散之瘡藥中不可無牡丹皮三錢去腸胃留血滯血也當歸五錢熟地黃五錢生地黃五錢此三味諸藥中和血生血涼血藥也白芍藥五分其味酸其氣寒能補中益肺之虛弱治腹中痛必用肉桂三分能散結積陰瘡瘍須當少用之一曰寒因熱用又為寒陰覆蓋其瘡以辛熱以消浮凍之氣或燥煩者去之陰證瘡必須用之也柴胡八分同連翹用乃少陽引用也若無馬刀挾癭瘡是不在少陽經去柴胡一味黍黏子五分無腫不用有腫用也昆布五分其味鹹若堅硬者宜用為咸能軟堅也廣朮五分用火煅京三稜煨五分瘡堅硬甚者用之不甚堅硬者不可用也益智仁三分如吐沫吐食胃上寒者用之無則去之大麥櫱面一錢治腹中縮急兼能消食補胃神麯末炒五分為食不消化故也黃連五分治煩悶一方無生地黃上同為細末白湯浸和蒸餅和勻捏作餅子日乾搗如米粒大每服三錢或二錢白湯送下量人病虛實臨時斟酌無令藥多妨其飲食此治之大法也如手足太陽脊強痛不可回顧腰似折項似拔者加獨活半錢羌活防風各一錢其防風一味辛溫若瘡在膈上雖無手足太陽經證亦當用之為能散結去上部風藥病人拘急者風也如有熱或足腿無力加炒黃柏五分用如有燥煩欲去衣者腎中伏火也更宜添加之無此證勿用服藥腹脹者加厚朴五分炒無則勿用如氣不順加橘皮更加木香如在陽明分為瘰癧者去柴胡黍黏子二味如在少陽分為馬刀挾癭者去獨活漏蘆升麻葛根更加瞿麥穗三分大抵用藥之法不惟瘡瘍諸疾病量人氣弱者當去苦寒之藥多加人參黃耆甘草之類瀉火而先補其元氣假令邪在上中下三處若在上焦加黃芩一半酒洗一半生用在中焦加黃連一半酒洗一半生用在下焦加黃柏酒洗知母酒洗防己之類選用之如大便不通滋其邪盛者加酒洗大黃以利之如因血燥大便乾燥者加桃仁酒洗大黃如風結燥不行者加麻子仁大黃如風澀而大便不行者加煨皂莢仁大黃秦艽以利之如風脈澀者有氣澀而小便者加郁李仁大黃以除氣燥如寒陰之病為寒結閉而大便不通以局方中半硫丸或煎加附子乾薑水冷與之散毒潰堅散出濟生拔粹方治馬刀瘡結硬如石或在耳下至缺盆中或至肩上於脅下皆手足少陽經中及瘰癧遍於頷或至頰車堅而不潰在足陽明經中所出或二瘡已破乃流膿水並皆治之臨臥時服藥斟酌病人飲食多少大便硬軟以意料之龍膽草半兩酒洗炒四次甘草炙半錢升麻六分柴胡半錢桔梗半兩連翹三錢葛根白芍藥黃連各二錢昆布半兩知母酒洗二次半兩當歸梢半錢栝蔞根半兩挫細酒洗黃芩梢一錢半酒洗炒一半生用京三稜三錢酒洗微炒廣朮三錢細酒洗炒黃柏酒炒四次半兩上㕮咀每服六錢或七錢水二盞先浸多半日煎至一盞去滓熱服於臥處伸足在高處頭微低每噙一口作十次咽至服畢依常安臥取藥在胸中停蓄也另攢半料作細末煉蜜為丸如緑豆大每服一百丸或一百五十丸此藥湯留一口送下更加海藻半兩炒顴骨丸出聖惠方治瘰癧鸛骨貍骨射干玄參升麻炙青木香沉香犀角並炙丁香羚羊角屑丹參甘草炙各四錢人參沙參各三兩獺肝六分連翹子六分光明砂三分研即好丹砂上搗篩蜜丸以飲服十五丸日二服漸加至二十丸空心服之下利忌生冷油膩血食並熱鮓肉海藻菘菜黏食陳臭物一方有麝香黑牽散一名神祕散一名大聖散一名牽牛丸出仁濟直指方治瘰癧經年不瘥斑蝥不拘多少去頭足濡米炒令黑色米黃為度去米就地隔紙出火毒研為末留米於空隙時服之白蠶揀直者炒去絲黑牽牛用頭末荊芥穗上三味各自為末等分用之上每服斑蝥末一錢殭蠶牽牛荊芥穗共一錢每作服調為一盞如遇此疾隔日晚飯勿食令心空先以荊芥湯調滑石末二錢重服一盞至一更再服一盞少頃用無灰酒調前四味服一盞畢便臥若小便不以溺器盛之如涕如塊為驗看項上生幾癧小便中出幾塊大抵如鼠形者多數或不足依前再服倘小便澀甚燈草煎湯調琥珀末服一二錢惡物即下荊芥調滑石末亦可如藥澀不通用生料五苓散黑豆湯調服亦可有孕婦人不可服服後小便閉澀只服燈草調琥珀一盞再用下後藥瘡未破者用桑椹不拘多少爭破紐汁入瓷器內熬成膏子滴水不散為度卻用膽礬煨炒研細等分與桑椹膏同劑攤紙上貼瘡已破者用辰砂膽礬研末微摻上忌熱毒風物瘡破不愈者用敷貼藥各半錢重蜘蛛斑蝥紅娘子水蛙地膽芫花各半錢上燒新瓦熱焙藥乾研為末先用蔥白湯洗瘡淨軟絹帛拭乾以好米醋調藥末敷上日用三次瘡水盡用生肌藥血竭龍骨乳香明礬煅過石膏煅過黃丹以上各一錢上研為末候瘡內黃水膿血盡乾摻自然生肌為效化毒散治瘰癧當歸白芍藥赤芍藥知母苧麻根白膠香甘草貝母秦艽生地黃敗龜柴胡前胡官桂熟生黃以上各一兩上㕮咀每服半兩水二盞生薑三片棗子二個煎至七分去滓溫服柴胡湯出聖濟總録治瘰癧柴胡去苗荊芥穗秦艽去苗土知母當歸桂心去皮藿香去梗甘松敗龜醋炙烏頭炮製去皮臍地骨皮楓香脂白芍藥各半兩等苧根濕稱二兩磁切芎藭一兩上並洗淨曝乾為末每服三錢以水一盞生薑三片大棗一枚同煎至七分去滓溫服早晨午食後夜臥各一服薔薇丸出千金方治身體有熱氣瘰癧及常有細疥並口中生瘡薔薇根三兩黃耆黃芩鼠李根皮栝蔞根芍藥苦參石龍芮防風一作防己白蘞龍膽各一兩梔子仁四兩上為末蜜丸如桐子大米飲下十五丸日再一方有黃柏一兩槐角煎丸出瘡科精要治瘡瘍瘰疥癬赤腫等瘡天麻川芎甘草黃藥子甘菊花人參各一兩何首烏苦參各一兩半荊芥穗防風各二兩槐角並仁另研皂角不蛀者各四兩水一斗煮軟絞汁去滓熬成膏子其皂角取肉研入膏為度上除皂角膏外槐仁與諸藥為末入膏內攪和煉蜜為丸如豌豆大每服五十丸食後竹葉湯下立應散出仁齊直指方治瘰癧已破皆可服連翹赤芍藥川芎當歸川烏尖七個生甘草炙滑石研各半兩黃芩三錢白牽牛生取末用土蜂房以水洗飲上蒸日乾各二錢半地膽去頭翅足秫米炒米黃為度三錢上為末服一大盞濃煎一錢木通湯下臨臥毒根從小便中出如粉片塊血爛肉是也如未效後再服繼以薄荷湯解其熱毒氣且地膽性帶毒濟以烏尖或衝上麻悶不能強制嚼蔥白一寸茶清下以解之如小便澀燈心煎湯調五苓散服瘡處用好膏藥貼若療癰疽用此宣導惡物本方去黃芩不用荔枝膏治瘰癧荔枝肉一兩輕粉麝香川芎白豆蔻砂仁各半錢硃砂龍骨血竭乳香各一錢全蠍五個上將荔枝肉碎擂以軟米飯和為膏看瘡大小攤貼如有三五個者止去貼為頭者妙烏蛇丸出聖濟總録治諸瘰方烏蛇酒浸去皮骨灰白殭蠶微炒大黃濕紙裹煨昆布細挫麥炒干蝦蟆一個燒灰芫青三個與斑蝥同炒連翹半兩斑蝥半兩糯米炒黃去米不用雄鴿糞取淨者一合用皂子一百粒揀圓熟肥好者尉斗內燒存性上為末煉蜜和丸如桐子大每服七丸加至九丸茶清下空心晚食後各一服成瘡者不過四十日內消干其效皆勝於轉瀉及小便內取者皂角丸出聖濟總録治諸癧豬牙皂七根三根炮二挺生炙並去皮一處椎破又用溫水浸七日夜每日揉一過去渣絹濾熬如糊母丁香四十九個龍腦研麝香研各半錢漏蘆去蘆頭木通銼紅娘子去頭足翅蘇枋木節挫滑石各一錢粳米少許上除皂角外搗研為末都入皂角沖中更和寒食麵少許為丸如緑豆大每服十丸丁香水下空心食前日三四服服時不得見日此藥內消不吐不利惡食丸出聖濟總録治諸瘰癧不限年久日近或已破或未膿及諸癰腫瘡並皆治之惡實四兩炒麝香半兩大黃煨三兩牽牛子一兩半一半生一半炒薄荷各二兩漏蘆去蘆頭挫上為末用羊頸骨髓打破煎濃汁作大麥麵糊為丸如梧桐子大每服十五丸日午臨臥嚼薄荷湯下替針丸出瑞竹堂專治一切瘰癧惡瘡龍腦二分麝香半錢輕粉一錢粉霜一錢雄黃一錢赤色者白丁香二錢直白硇砂半錢金腳信二錢巴豆十個去心膜上為末大麥面為丸如小麥粒大若用時覷瘡大小加減用如瘡破者兩丸瘡小不破者一丸用砭針破出血盡紝藥後用黃蠟封於針口如瘡腫者不妨不過三日自消遇仙無比丸出瑞竹堂治瘰癧白朮生檳榔生甘草生牽牛一半生一半炒郁李仁湯浸去皮密陀僧防風斑蝥糯米炒去皮足翅不用米以上各等分用上為末麵糊為丸如桐子大早晚煎甘草檳榔湯下每服二十丸至月後腸中微痛如小便中取下癧子毒物有如魚目狀已破自合未破自消連翹丸出聖濟總録治癧繞項如連珠連翹防己羌活去蘆木香梔子仁芍藥各二錢玄參五兩大黃一兩上為末煉蜜為丸如桐子大每服二十丸食後溫水下內消散出德生堂治癧已破未破者內消大黃半兩木香二錢連翹半兩丁香三錢梔子四錢沉香一錢沒藥二錢薄荷一錢甘草三錢黃芩三錢上㕮咀每服五錢水盞半煎至七分食後臨臥服入麝香一錢同煎三五服看病人實者加朴硝三錢虛者一錢半再煎溫服十日後再進一服後卻用大蜘蛛一個活爛研好酒一盞調用絹帛濾去滓殼服之即日內消治癧已破者出德生堂巴豆七個蝦蟆一個將巴豆放蝦蟆內將室中吊一宿一桑柴火燒存性黑豬膽一個石灰放膽內陰乾急焙乾等用陳年石灰炒黃一錢乳香一錢黃丹一錢瓷器內炒不見鐵輕粉半錢上為末於瘡口上輕糝口噙將水洗淨用軟帛浥干貼藥神聖大易膏治癧兼治八十種惡瘡小油半斤生地黃當歸川芎赤芍藥香白芷上各四兩黃丹四兩上為粗末擇水日將上件藥末油浸一宿用文武火熬過以淨好綿濾去滓再熬黃丹一錢旋旋點之用槐柳條攪截焦頭再熬盡黃丹為度滴水成珠使用治瘰癧出儒門事親斑蝥去頭足翅赤小豆白殭蠶苦丁香白丁香磨刀泥上等分為細末十歲以上服一錢二十以上服二錢五更新汲水一盞調下至辰時見效女人小便見赤白三兩次男子大便見土白色立效當日服饘粥不得吃別物大忌油膩患三四年者只一服七八年者再一服香藥丸治瘰癧硼砂乳香沒藥半夏輕粉赤石脂各等分上為細末糯米粉為丸如桐子大每服十丸加至二十丸臨臥皂角子湯下治瘰癧出儒門事親小龍肚腸一條炮乾用鱉殼裙襴炮川楝子五個牡蠣大黃牛蒡子燒存性皂角子五十個上為細末蒸餅為丸如緑豆大每服十五丸食後艾湯下日三治瘰癧先於瘡上灸三壯然後用藥漬作瘡口用活鱔魚截長一指大批開就掩在瘡口上少時覺瘡內癢急揭起魚覷上有細蟲如馬尾一節蟲出如卷三五次取盡蟲子後用斂瘡口藥龍腦一錢麝香半錢雄黃輕粉各半錢乳香一錢上為末水糊為丸如小麥大每用一丸二丸紝在瘡口內覺腫痛效紫金丹治癧子瘡硼砂一錢輕粉一錢二分紫粉一錢半麝香一錢半信一分上為末細用齏水蔥白湯口噙洗瘡淹干瘡然後貼三日洗貼三遍見效追毒散出王氏普濟方治癧子神效丁香根麝香研一錢莨菪子五十粒雄鼠糞七粒兩頭尖者以面兩匙炒令黃去面等用槲皮三斤去粗皮捶碎細挫以水二斗煎取四升濾過重煎候成膏入諸藥斑蝥三枚去足翅以糯米半合同炒炒黃去米不用上除槲皮外搗研為末暖槲皮煎令溫和諸藥攪勻貼瓷器內每服匙許空心以溫酒一盞調下臨時見病人虛實及肥瘦加減斟酌用之服了仰臨臥須臾即吐出若病根年深者如蝦蟆衣魚腸相似近者若新肉吐了以溫水漱口吃粟米淡粥補粳米亦可忌一切毒物月餘忌皂莢丸出聖濟總録治瘰癧皂莢三梃去皮用酥一兩旋塗炙薄荷干葉生大黃挫防葵各二兩膩粉少許研鴿子二枚煮熟取黃等用上為末別將皂角五挺生椎碎以水一斗揉取汁羯羊肉半斤去筋膜以皂莢水熬成膏和藥末丸如桐子大每服十丸食前米飲下日二治瘰癧廣木香青木香黃丹各半兩寒水石一兩白礬半兩人言一錢研龍骨一錢研輕粉半錢研銅錢一個投醋三次燒紅為末麝香少許研末上為末以獨蒜泥和為錠如小麥大如瘡有眼納進錠子一個蠟紙封無眼同蒜泥調紙封治瘰癧斑蝥二十四個去頭足翅用糯米炒黃色滑石五錢半防風二錢半穿山甲五錢麩炒黃色不用熬琥珀三錢真的上為末每服三錢空心米飲湯下早晨用藥至齊時一服毒物自下如瘡破用桑條水洗之無糨絹濕干後用打銀燥灰研細貼之治瘰癧出危氏方五倍子海螵蛸檳榔雷丸各一錢五靈脂一錢麝香半錢研上為末乾用清油調搽濕則干糝內消方出聖濟總録治瘰癧人參滑石各半兩丹砂研一分麝香研半錢斑蝥十四枚去頭足糯米炒黃為度去米上為末散每服三錢以溫酒調下生肌散治瘰癧白石脂二錢半生白礬三錢燒黃丹一錢研龍骨二錢煅輕粉半錢研麝香二分研上為末每日二次乾摻在瘡口上三物散出聖濟總録治瘰癧紅娘子六十枚不要衝去翅足大黃半兩陳粟米一合無即以新粟米上同炒令米黃為度共為細散初服一字每日空心調酒下第四日後服半錢及五七日覺脅下疼小便澀勿怪是藥驗也更服後藥青橘皮湯浸去白焙虎杖等分上為末以醋煮麵糊為丸如緑豆大每服五丸至七丸用青橘皮湯下前散藥相間食後臨臥服日二次用貼藥貼瘰癧方出聖濟總録用砒黃信州者細研滴濃墨汁為丸如桐子大於銚子內炒令乾後用竹筒子盛每用時於患處灸或挑破將藥半丸敲碎貼之以自然蝕落為度覺藥盡時更貼少許輕粉丸出聖濟總録治瘰癧一宗先服烏雞子一枚去黃取白盛於盞內膩粉一錢半巴豆七枚新者去皮心與粉同入雞子內蒸熟取於乳鉢內研令勻別用膩粉三錢匕於手掌中以病人津液唾調和前藥為丸如緑豆大上每服五丸荊芥薄荷茶下黃昏時服至一更如未轉更以薄荷茶投之若腹痛先取下一次第二次以水盛取見病根惡物出也或患年深只可三度轉出盡惡物其項漸小不得出風一月將息後用補藥人參玄參苦參白藥上等分銼焙為粗末每服一錢匕水一盞煎三五沸去滓溫服如瀉不止用黃連乾薑各一錢煎服不過三五服便止如瘡口未破用後膏藥自消坐拿草半兩上為末用粟米少許將酒煮成稀粥濾去滓取濃汁入煎藥調勻為膏塗於帛上子貼之不得動換瘡口永瘥托中散出聖濟總録治瘰癧一宗服黃耆銼一兩甘草炙半兩上為散每日