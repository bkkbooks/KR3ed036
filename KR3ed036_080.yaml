蛇蛻皮一條細剪上以白麵和作餅子炙令焦黑色搗細羅為散每於食後及夜臨臥時以溫水調下一錢目猝生翳出肘後方以貝齒燒灰細篩點翳上日再三時頻拭令人仰臥涼肝散出聖惠方治初發眼疼才生翳膜臟腑實者大黃赤芍藥各一兩蟬蛻當歸黃連各半兩甘草半錢上為末每服二三錢米泔水調服肝熱加淡竹葉肺熱加大黃脾熱加甘草食後服五秀重明丸出衛生寶鑑治眼翳膜遮睛隱澀昏花常服清利頭目甘菊花開頭者五百個荊芥五百穗木賊去節五百節楮實五百枚川椒去目開口者五百粒上為細末煉蜜為丸如彈子大每服一丸細嚼時時嚥下食後臨臥二服忌酒蕎麵辛熱物增明膏出楊氏家藏方治眼生翳膜隱澀難開或暴赤眼腫痛盆硝半兩硼砂三錢馬牙硝一錢青鹽半錢輕粉半錢腦子半錢麝香一分硇砂一分上件同研令極細每用粟米大點眼內羌活退翳出試效方一名復明膏治足太陽寒水膜子遮左右睛白翳在上視物不見椒樹西北根一分東南根一分羌活七分真麻黃去節三分當歸梢六分黃連二錢防風根三分生甘草梢四分柴胡根三分升麻根三分生地黃三分蕤仁六個藁本二分漢防己二分上用淨新水一大碗先將漢防己黃連生甘草梢當歸梢生地黃煎至一半下余藥再煎一盞去滓入銀石器中再煎如膏點之有效為度羌活退翳湯出東垣蘭室方治太陽寒水翳膜遮睛不能視物麻黃根二錢羌活一兩半防風一兩藁本七錢薄荷葉二錢荊芥穗七錢煎成藥加之細辛二錢川芎三錢當歸身三錢酒生地黃一五錢酒浸川椒半錢黃柏四錢酒知母五錢上㕮咀每服秤三錢水二大盞煎至一盞半入荊芥穗再煎至一盞去滓稍熱服食遠忌酒醋濕面蠍附散出衛生寶鑑搐鼻退翳膜薑黃青黛附子尖各一分全蠍一分薄荷一兩鵝不食草半兩上為細末含水搐少許撥雲散出衛生寶鑑治因眼發濕熱不退而作翳膜遮睛昏暗羞明隱澀難開川芎龍膽草荊芥穗楮實薄荷石決明草決明羌活蒼朮密蒙花白朮大黃甘草甘菊花地膚子木賊連翹香白芷白蒺藜川椒桔梗石膏各半兩檳榔一兩銼石燕子一對上揀淨為細末每服三錢溫茶清一盞調下食後一日三服忌雜魚面馬豬肉蕎麵及辛熱物還睛散出衛生寶鑑治眼翳膜昏澀淚出瘀肉攀睛川芎龍膽草草決明石決明荊芥穗野菊花野檾子楮實木賊白茯苓炙甘草白蒺藜川椒炒去子仙靈脾葉茵陳蒿以上各半兩上為細末每服三錢食後茶清調下一日三服忌雜魚肉熱物蕎麵遠年障翳附論夫障翳之疾本於風熱毒氣蘊積臟腑沖發眼目結搏而成蓋目為五臟精華肝之外候今風邪毒熱在於臟腑不得宣泄上衝於目故為障翳初則隱澀赤痛漸成翳膜遮障久而不退或至黏睛服藥難瘥是為遠年障翳方決明散出聖濟總錄治眼目一切遠年障翳眥生胬肉赤腫疼痛石決明草決明青葙子甘草炙銼黃柏去粗皮黃連去須穀精草龍骨白芷枳實麩炒牡蠣煅枸杞子蛇蛻各一兩羌活去蘆頭蒺藜子炒去角蟬蛻白附子炮黃耆銼各半兩魚子活水中生下者半兩其子用硫黃水溫溫洗過虎睛一隻切作七片文武火炙乾每一次一片上為散每服三錢五更時五陳湯茶清調下日午臨臥再服眥生胬肉赤腫疼痛不可忍者三五日見效赤白翳膜久不見者一七日減二七日其眼好安然眼根枯死者不治活者通翳如煩惱傷酒色遇風兩眼中淚出疼痛者即是活眼若或者眼無淚不疼痛者即為死眼更不用治一方有用極明穀精草忌毒魚面蒜豬肉酒色等開明丸出危氏方治年深日近翳障青盲寂無所見一切眼疾熟地黃一兩半酒浸菟絲子酒洗車前子麥門冬去心蕤仁去皮決明子地膚子茺蔚子枸杞子黃芩五味子防風去蘆頭澤瀉細辛去葉不見火杏仁炒去皮尖北葶藶炒青葙子各二兩桂皮半兩羊肝須用白羊者只用肝薄切瓦上焙乾了作末或即以肝煮研爛為丸肝少則以蜜湊之上為末丸如桐子大每服三十丸熟水下日三服忌生薑糟酒炙爆等物琥珀散方出聖惠方治積年瘀肉障翳琥珀珊瑚硇砂白者馬牙硝烏賊魚骨各半兩先於粗石上磨去其澀用好者一錢真珠末一兩上都入乳缽內研三日令極細每日三五度點之羌活丸出聖濟總錄治久患風毒氣攻眼目昏暗赤澀瘀肉生瘡翳膜遮障不明久患偏正頭痛眼目漸覺細小及夾腦風痛多見黑花羌活去蘆頭天南星炮天麻附子炮裂去皮臍旋覆花芎藭半夏湯洗十度青橘皮湯浸去白焙桑螵蛸藁本去苗一兩牽牛子六兩微炒搗取末二兩上搗為細末煉蜜和丸如梧桐子大每服二十丸食後溫湯下漸加至三十丸決明煎出聖惠方治眼遠年翳障馬蹄決明一兩半蘆薈蕤仁湯浸去赤皮一兩半秦皮搗碎黃柏去粗皮馬琦烏賊魚骨紫貝燒熱研各一兩鯉魚膽四枚波斯鹽綠三分細研上先煎決明等五味以水三大盞煎至一盞淨濾去滓次下鹽綠等五味更煎至一小盞於生銅器中盛勿令泄氣每取一豆大許以人乳調點之開目良久令淚出日二三度琥珀散出聖惠方治眼生翳障黏睛牢固經年不愈琥珀半兩真珠一兩貝齒燒灰珊瑚馬琦硃砂蕤仁湯浸去皮決明子龍腦各一分零石半兩上為末入乳缽內研如面每以銅箸取少許點之石膽散出聖濟總錄治眼生翳障經年不瘥石膽半兩琥珀真珠末珊瑚紫貝馬琦決明子各一分硃砂蕤仁湯浸去赤皮各半兩上為散更入乳缽內研令細勻每用藥一小豆大點大眥頭日二三度妙補肝散出龍木論治三十年失明者以蒺藜子七月七日收陰乾搗散食後水服方寸匕石膽丸治眼中一切障翳不消風熱毒氣上攻眼常漠漠不見物者不計年遠翳膜厚者此藥頻點極效出聖惠方石膽細研波斯鹽綠細辛鉛丹石決明搗碎細研水飛過貝齒燒灰各一兩石鹽硇砂各半兩烏賊魚骨三分秦皮雞舌香各半兩蕤仁湯浸去赤皮防風去蘆頭黃連去須各三兩決明子二兩上研為末都研令勻煉蜜和搗五七百杵收於瓷盒中每減少許更用蜜調如稀餳點黍米大於大眥頭日三兩度點之石膽丸出聖惠方治眼生翳障遠年不瘥風淚出癢爛及生息肉石膽細研硇砂細研鹽綠乾薑炮裂銼龍腦細研波斯鹽細研各一分石決明細研水飛過烏賊魚骨秦皮去粗皮細辛雞舌香各半兩黃連一兩去須決明子三分上為末入研了藥更研令勻煉蜜和丸如麻子大夜臨臥大眥頭各一丸紫金膏治男子婦人目疾遠年近日翳膜遮障攀睛胬肉拳毛倒睫黑花爛眩羞明冷淚及赤眼腫痛爐甘石好者同火煅酥研細無聲將黃連當歸身挑頭童子小便濃煎湯濾淨飛淘去沙石焙乾粗者再研再淘一法只用楊梨亦名茶採葉濃煎湯濾淨飛淘焙乾一兩黃丹一兩水飛細研乳香硇砂雄黃沒藥白丁香真者當歸輕粉麝香八味修制了各為末逐味用一錢腦子三錢各味修制了各為末逐末用二錢蜜四兩上大建盞內熬蜜沸入黃丹以柳木篦子急手攪勻約熬三兩沸卻入爐甘石復攪勻下乳香入硇砂又下雄黃次下白丁香再入沒藥又下當歸再入輕粉方下腦子麝香依次第下藥用文武火各熬三兩沸須急用篦子不住手攪勻候熬成膏不黏手為度每用雞頭大一塊沸湯化開浸湯半盞以下乘熱食後熏洗之蕤仁散出聖惠方治眼障翳多年不退石決明丸出聖惠方治眼障翳經年不消遠視不明石決明半兩搗碎細研水飛過決明子酸棗仁微炒葳蕤湯浸去皮蕤仁湯浸去赤皮胡黃連藍葉龍腦青葙子以上各半兩上為末用羊膽汁和搗百餘杵丸如梧桐子大每於食後以清粥飲下三十丸點眼金絲膏治男子婦人目疾遠年近日翳膜遮障攀睛胬肉拳毛倒睫黑花眩爛羞明冷淚及赤眼腫痛硇砂一錢研黃丹五錢晉礬一錢研黃連一兩去毛銼青鹽一錢研乳香好者三錢細研片腦二錢當歸半兩洗淨銼上用好蜜四兩除片腦外和七味納入青筀竹筒內油單紙裹筒口五七重緊繫再入湯瓶文武火煮一周時取出劈破新綿濾去藥滓方下片腦和勻磁瓶收貯再用油單紙五七重封系瓶口埋露地內去火毒候半月取出每用一粟米大黃連煎出聖濟總錄治積年風眼胎赤眼翳障膜侵黑睛不見物黃連去須曾青研如粉地骨皮白者各一兩顆鹽一分蜜一升古錢十文上搗碎以蜜漬安新瓷瓶中以重湯煮一復時後取出重以綿濾去滓納於瓶子中著地上露兩宿每以銅箸取少許點目中一日可點三五度神仙水照膏出危氏方治遠年近日眼目羞明翳膜遮障或赤箸纏裹胬肉攀睛黃丹二錢水飛過同水銀研黃蠟一兩切作片子水銀一錢細研如粉硇砂一錢水飛為末蛇蛻一條燒灰碾細烏雞子殼不拘有子者去膜細研如粉上先溶蠟成汁次入諸藥在內須是鍋子熬成膏子為丸如芥子大捻餅子用硃砂為衣如患一切眼疾用藥一餅患雙眼兩餅夜臨臥時用箸頭水濕了蘸藥一餅點於目中閉眼臥一宿直至天明起時先用黑盞盛水一盞如洗面照眼開放將眼眨動其藥落在水中少時令眼明人仔細水中看藥上取下黃色或白翳膜病毒纏在藥上用手指捻去病再用每一餅可用三日一方無硇砂琥珀煎出聖濟總錄一名貝齒散治眼遠年障翳不瘥七寶散出聖惠方治眼翳障年深日久不能消散珊瑚琥珀曾青紫貝硃砂雞子殼去白膜各半兩玉屑半兩上研令極細每用時仰臥以銅箸取少許如綠豆大點於翳上一食久乃起一日三五度點之龍腦膏出朱氏集驗方治遠年近日翳膜遮障攀睛胬肉連眶赤爛視物昏暗不睹光明隱澀多淚迎風難開立效爐甘石不拘多少揀粉紅梅花者為妙用坩堝盛火煅七次入黃連水淬浸一宿去滓將煅甘石淬七次用細研飛過曝乾羅過用三錢黃連不計多少捶碎龍膽草不拘多少洗淨曬乾不見火細研為末一錢桑柴灰羅過二錢好黃丹羅過半錢上同白蜜四兩一處入在一紫黑瓷器內文武火慢熬以竹篦子攪勻如漆色以不黏手為度切勿犯生水仍不用鐵器熬藥成依舊以瓷器盛頓每服用如皂角子大新冷水半盞化開洗三日為度每日洗數次無妨藥盞須用淨紙蓋不可犯塵灰極有功效秘金散出聖濟總錄治目暈眩自幼久患疳風攻眼生翳久藥不瘥但翳膜遮障睛不損者皆可治黃連去須沙參太陰玄精石研決明子各一兩上為散每服半錢用羊子肝一具竹刀切作縫子摻藥末在內以線系入瓶中用米泔煮熟分作三服淡吃每個分作三分朴硝散出聖惠方治眼久積頑翳蓋覆瞳仁川朴硝二兩硇砂半分通明者白礬半兩上相和研為末將小瓷瓶子以慢火炙令熱然後炒藥末徐徐入在瓶內旋以柳枝子攪撥不令著瓶子四邊又入藥末續續添火候藥盡良久斷煙以干瓶子蓋口更以大火燒經一炊久去火候瓶涼令其藥如雪輕肥便成即埋在濕土內七日出火毒訖取出細研每以銅箸取少許日三五度點之又方出聖惠方真珠一兩地榆二兩銼上以水二大盞同煮至水盡取出真珠以醋浸五日後用熟水淘令無醋氣研令極細每以銅箸取少許點翳上以瘥為度營實散出聖濟總錄治目生翳膜久不愈者營實以柳木製碨子磨之馬尾篩篩取黃肉去其黑殼不用每十兩可得四兩精肉非柳木碨子不能去殼上為末取獖豬肝薄切裹藥於中令相著投之緩火炙肝熟為散臨臥陳米飲調下二錢一法用釅醋為丸每服二十丸一法取營實內囊蒸一次曝乾為末或散或蜜丸以溫水下治積年失明方出龍木論以決明子二分杵為末食後以粥飲服治久患壅毒風熱翳膜並內外障眼出本事方真黃連去毛秦皮去皮黃柏小者去皮上等分為末每服一錢水一盞煎五七沸用夾絹濾去滓乘熱蕩洗候藥冷便止再暖又洗滓又並煎洗
