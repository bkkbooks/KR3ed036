body:
  text: 卷八十眼目門目生膚翳附論夫目生膚翳者以腑臟氣血虛實不調加以風邪痰飲鬱於膈上熏蒸既久沖發於目乃生膚翳其睛上及瞳仁有物如蠅翅之狀是為膚翳也龍木論云黑翳如珠外障此眼初患之時忽然疼痛難忍淚出不開有翳如珠子在黑睛上如大人患者肝腎俱勞毒風入眼如此疾狀不宜針灸觸撥宜服補腎丸如小兒患者即是實熱急疳只宜服羚羊角飲子歌曰黑翳珠排黑水間醫工會者始知難如神藥點翻為極服藥湯丸即得安不用強看將手撥恐因手重出青涎遇醫挑撥並燒炙要見三光路更難冰瑕翳深外障此眼初患之時或癢或痛發歇不定作時赤澀淚出眵瞞致令黑睛上膜橫立似青瑕多少不定久後為患全損眼目此疾不可挑撥摩去鉤割切宜服茺蔚散除熱人參湯點退翳清涼散立效歌曰黑睛橫豎點青瑕似翳沉沉少與多醫者細看如此狀根深入骨莫挑摩老憂久後深為患除熱除風藥最佳出入不防須省謹志心醫療別無他因他患後生翳外障此眼初患之時或即赤爛漸生翳膜侵睛蓋是瞳仁即無所見醫者細看翳心若不赤黃猶見光明宜令鉤割熨烙後點爛翳散服細辛散歌曰眼因他患後漸漸失光明初覺微生膜經年翳便成遍通睛上白日久赤黃生火燒銅箸烙用意手輕輕稍覺凝脂爛用意卻除平初時如少痛不用此求徵逆順生翳外障此眼初患之時皆因五臟虛勞風熱衝於肝膈之間漸漸生翳或從上生向下或從下生向上名曰逆順之障亦宜鉤割熨烙點膜去除暈膜然後宜服補勞人參丸知母飲子立效歌曰一般眸有翳逆順要須知從上生為逆名醫效亦遲消停經日月湯藥至還離熨烙並鉤割塗摩散卻伊從下來名順治法亦如之效速非同逆忌省即依依方決明散出聖濟總錄治眼生膚翳遮覆瞳仁決明子微炒地骨皮玄參黃連去須桔梗炒柴胡去苗茯神去木各三分山梔子仁半兩羚羊角屑一兩上粗搗篩每服五錢以水一盞半入淨洗淡竹葉十片煎至七分去滓放溫食後服臨臥再服墜翳丸出海上方治眼疾日深及白翳大者人參川當歸各一錢甘菊花一錢半北細辛北五味川芎旋覆花各二錢黃連二錢半荊芥三錢甘草七錢半黃芩防風羌活各三錢柴胡三錢半知母四兩赤芍藥白蒺藜炒各半兩木賊去節一兩以上銼散曬乾為末不要火焙然後入後藥料石膏三錢真珠一錢硼砂二錢半琥珀二錢生石決明二個火炙生麝香硫黃氣者不可用大黃氣者不妨磁石一三錢半火燒淡醋浸三次燒了出火氣用上為末前藥一處粳米糊為丸如龍眼大用硃砂三錢半別研為衣取日氣陰乾臨睡及食後細嚼三丸白湯嚥下或用鹽湯棗湯燈心湯三樣皆可決明子丸出聖濟總錄治久患膚翳遮覆瞳子兼醫肝腎虛目黑暗決明子炒蕤仁去皮地骨皮白茯苓防風去叉澤瀉麥門冬去心焙茺蔚子各一兩一方用兩半枸杞子五味子青葙子各一兩細辛三分車前子菟絲子酒浸別搗各三分生乾地黃焙乾二分黃芩杏仁湯浸去尖雙仁炒各一兩桂去皮半兩一方用一兩上為末煉蜜和丸如梧桐子大每服二十丸食後以米飲下臨臥再服此藥加兔肝一兩一分自九月起服至二月停甚妙還睛丸出直指方治眼目昏翳蟬殼洗曬熟地黃洗焙川芎蒼朮童尿換浸二宿焙白蒺藜炒去角各一兩茺蔚子羌活木賊去節童尿浸三宿曬防風甘菊荊芥蔓荊子一方不用杏仁浸去皮炒菟絲子研酒浸石決明煅存半生蛇皮酒浸洗淨焙各半兩上為細末煉蜜丸如彈子大每服一丸食後細嚼薄荷茶下黃連丸出聖濟總錄治眼熱生暈翳覆瞳仁黃連去須秦皮去皮澤瀉瞿麥各一兩車前子地骨皮去土黃芩去心沙參人參茯神去木決明子炒甘草炙各一兩半蕤仁二兩去皮上㕮咀焙過搗羅為末煉蜜丸如梧桐子大每服三十丸食後以溫熟水下臨臥再服朱僧熱翳方出直指方蟬殼洗曬半兩蒺藜炒去角半兩防風羌活川芎細辛秦皮枳實荊芥藁本甘菊甘草木賊去節童尿浸曬一宿各二錢半上為末每服一錢茶調下石決明散出聖惠方治眼生膚翳昏暗頭額疼痛石決明一兩搗碎水飛過葳蕤一兩黃連去須三分菥蓂子一兩決明子三分秦皮三分川升麻三分犀角屑一兩梔子仁三分甘菊花一兩細辛半兩甘草半兩炙微赤銼上為細散每於食後以竹葉湯下二錢白蘚皮湯出聖濟總錄治目膚翳遮睛及瞳仁上有物如蠅翅狀令人視物不明白蘚皮款冬花柴胡車前子枳殼去瓤麩炒黃芩去心各一兩甘草炙半兩百合二兩菊花蔓荊實各一兩半上粗搗篩每服五錢以水一盞半煎八分去滓食後溫服臨臥再服仙術飲出直指方治眼中翳膜蟬殼去土白蒺藜炒去角穀精草白蛇皮皂角水洗焙蒼朮一兩羌活川芎杏仁去皮木賊去節童尿浸一宿曬各一分上為末每服一錢食後蜜湯調下琥珀方治目中翳用琥珀為細末點目中療眼翳方用胡粉注翳上以療三年翳白蜜方點目中熱膜以家養白蜜為上木蜜次之崖蜜又次之通明散治眼生翳膜赤脈胬肉澀癢疼痛有淚治眼翳生膜出仁存方天竺黃井泉石石決明蟬蛻洗去翅足各一兩蠶蛻一兩蛇蛻全者一條去頭足燒存性鬱金去皮切炒木賊去節各一兩上為細末丸餅煮雄豬肝以苦竹作刀切片食後用三四片蘸藥末二錢細嚼以肝水漱口嚥下更加羌活當歸各一兩五蛻散出危氏方治目翳膜漸生並上下瞼俱赤或翻出一瞼在外者蟬蛻洗蛇蛻醋煮荊芥豬蹄蛻一分微焙穿山甲燒存性川烏炮去皮粉草各半兩蠶蛻二錢半上為末鹽湯調下二錢空青丸出危氏方治沉翳細看方見其病最深空青二錢一方用一銖五味子細辛各一兩防風二兩車前子一兩生乾地黃知母各二兩石決明一兩別研上為末煉蜜丸如梧桐子大每服十丸空心茶湯下曾青散出聖惠方治眼生膚翳及消赤脈曾青一兩貝齒半兩烏賊魚骨一兩銅綠一分輕粉一分蕤仁三分湯浸去赤皮龍腦一錢馬牙硝半兩上並細研如粉每取少許點翳上可二度點之青鹽膏出聖惠方治眼生膚翳及赤脈胬肉青鹽一分輕粉半兩蕤仁三分湯浸去赤皮硇砂一分以漿水化淨拭青銅鏡子塗硇砂水在上卻穿地作坑子可容鏡子懸面向下上以物蓋如此七日滿取出之當有青綠刮取細研雄雞糞一分烏賊魚骨半分貝齒一分燒灰龍腦一分上相和研令極細以牛酥調如硬膏每用丸如黍米大點安翳上合目便臥候藥化盡以鹽湯洗之蘆薈丸出聖濟總錄治眼熱赤痛及生膚翳蘆薈半兩研鯉魚膽七枚取汁熊膽一分研石決明一兩刮淨牛膽乾者半兩濕者汁一合麝香半分研車前子一兩上除膽外搗研細末後入膽汁同和勻煉蜜丸如梧桐子大食後米飲下二十丸漸加至三十丸菊花散出聖濟總錄治眼中膚翳侵及瞳仁如蠅翅狀菊花防風去叉木通銼仙靈脾銼木賊銼荊芥去根甘草炙各一兩上為散每服一錢食後用茶半盞同點溫服真珠散出聖惠方治眼生膚翳宜服祛風毒消翳障真珠末一兩蕤仁三分湯浸去赤皮秦皮三分銼石決明一兩水飛過細研車前子一兩細辛三分枳殼一兩麩炒微黃去瓤羚羊角屑一兩甘草三分炙微赤銼上搗細羅為散每於食後以甘豆湯下二錢忌炙爆油膩熱面葳蕤湯出聖濟總錄治眼膚翳葳蕤去皮地骨皮去土赤芍藥犀角屑黃芩去黑心茯神去木甘草炙銼升麻各一兩上粗搗篩每服五錢以水一盞半煎至八分去滓放溫食後服臨臥再服煎麓點翳膏出直指方硃砂二錢南硼砂一錢半真珠爛石膏各半錢熊膽一錢麝香少許蕤仁二十一粒炒去油皮上為細末用冬蜜研和於銚內蒸得黏入角罐收用時煎秦皮汁調銅箸點於眼眥頭淚出為效墜翳丸治沉翳細看方見其病最深蘆根湯出聖濟總錄治脾肺熱熏目赤癢生翳爛翳散出龍木論治因他患後生翳外障硃砂石決明真珠末各半兩曾青硼砂龍腦各一分上研細末每夜乾點眼中石膽散出龍木論治眼膚翳赤痛癢澀石膽半兩石鹽一兩硃砂一兩鹽綠半兩龍腦一分膩粉一錢上同研如粉每以銅箸頭取如小豆大點目中日三四度清涼散出龍木論治冰瑕翳深外障馬牙硝白礬曾青各半兩龍腦青黛各三分上為細末研令勻細為妙每至臨臥時用散乾點半分在眼內硃砂散出聖惠方治眼生膚翳目赤時痛風淚宜點此硃砂半兩貝齒五枚燒灰乾薑半分炮衣中白魚二十枚膩粉半分上同研如粉每以銅箸頭取如小豆大點目中珍珠退翳散出直指方白澤石膏烏賊魚骨真蚌粉等分小朱少許上為細末每一錢用第二次米泔調食後臨臥常服如神飲子出百一選方一名如神餅子治目生翳膜烏魚骨去皮細研木賊去節為末硃砂水飛各一錢南硼砂四錢上同研三千遍湯熔蠟少許以柳枝子攪四十九遍入腦子少許更多尤妙於五月五日合丸作餅子每用一餅子臨臥安於目眥中來早以淨水於盞內洗之臨臥再用一餅可使三四次通光丸出御藥院方治翳膜昏暈赤隱難開蒼朮去黑皮黃芩去心朴硝各二兩甘草七錢半上為細末乾柿為丸每兩作五丸每服二丸細嚼冷水送下食後服之真珠散一名盪風散治白翳覆瞳睛不見物龍腦膏出聖惠方治眼生膚翳明目龍腦半錢硼砂一豆大蕤仁三顆湯浸去赤皮出雞子殼一枚以干沙土磨雞子殼面斑點令滑為度去雞子膜用桑炭炙令乾研如粉上同研令細用牛酥和銅箸攪勻以瓷瓶盛每一日三四度取一少許點之貝齒散出聖濟總錄治目風熱赤生膚翳點眼方貝齒七枚燒灰研細真珠一分搗羅為末細研龍腦研半錢上合研如粉每點如黍米大於翳膜上日三四度磨翳膏出聖濟總錄治目生膜膚翳逆順者空青二錢片腦三錢蕤仁一兩口含去皮殼上於乳缽內研合盛取點之療眼黑翳覆瞳子膚起方貝子四枚空青礬石各一兩炙汁盡上為末取如黍米注翳上日二次療翳五十年不瘥出聖惠方貝齒一枚燒豆豉三十枚三年苦酒三升上先漬貝齒三宿消盡方內豆豉微火煎如膏取出合藥置筒中夜臥時著如小麥大於眥頭明日以湯洗之又方出聖惠方治眼生膚翳馬琦三分白龍腦半錢白礬灰一錢上同研如粉每以銅箸取如米許點之羚羊角散出保命集治冰翳久不去者主之羚羊角升麻細辛各等分甘草半分上為細末一半為散一半蜜為丸如梧桐子大每服五七十丸以米泔水煎散下之食後臨臥服點眼方治眼生膚翳治目生翳方出本草以貝子十枚燒灰研篩取如胡豆著翳上日二正仰臥令人敷之炊久乃拭之佳如炊一石米久乃滅息肉者加真珠與貝子等分一方以貝子燒作細屑末以吹眼中良又真馬琦搗末亦可療膜翳人乳方出龍木論一名刮翳膏治目熱生膚赤白膜翳障取雄雀屎細直者人乳和熟研敷之當漸消爛治翳如重者出本草用豬膽白皮曝乾合作小繩子如粗釵股大火燒作灰待冷便以灰點翳上不過三五度即瘥楮實方出龍木論一名楮白皮散治肝熱生翳亦治氣翳細點及生花澀痛以楮白皮曝乾合作一繩子如釵股大火燒作灰待冷細研如面每點於翳上三五度漸消一方用楮實子研細蜜湯調下食後服亦治小兒翳眼治赤眼後生翳膜出聖惠方以蘭香子洗淨曬乾每用一粒以箸點眼眥頭閉目即覺藥在目內團圓旋轉藥力過即不轉須臾自隨淚出翳膜在上如魚眼然再易一粒以病退為度一方為細末每服如黍米大點眼眥頭昔蘆州知錄彭大辯父在臨安暴得此疾醫曾以此藥治之坐間瞭然因得此方屢以治之又方出十便良方一名枸杞煎療眼中翳小輕者兼治眼澀痛取枸杞子及車前子葉等分手中熟挼使汁欲出又別取桑葉兩三重裹之懸於陰地經宿乃摘破桑葉取汁點目中不過三五度瘥梣木方治膚翳以方注梣苦歷木水浸皮青用洗眼即效白魚方出龍木論治眼翳用白魚末注少許於翳上書中者佳去翳方出肘後方治眼翳以東壁土亦可單用性平削末細篩點目中淚出即效又方出本草治目中一切浮花翳及眼中熱淚以烏賊魚骨細研水飛澄下復去水曝乾之熟蜜和得所點目中緩取效又方出龍木論治眼中一切浮花翳以雊𨿜目精和乳汁研滴目瞳子能見云外之物治眼生膚翳及積年翳不退方出聖惠方取著風鳥驢大肚子內蟲三五七枚曝乾入石膽半錢同研令細於磁盒內盛之勿令見風每日於翳上點三五度其翳自消傳信方出龍木論所著法最奇云眼淚癢或生翳或赤脈並皆治之用宣州黃連搗篩末蕤核仁去皮研為膏等分和合取無蟲疾干棗三枚割頭少許留之去殼核以二物滿填於中卻將割下棗頭依前合定以少綿裹之以薄為佳大茶碗量水半碗於銀器內用文武火煎取一雞子大以綿濾待冷點眼前後試數人皆應今醫家用之多得效故附之不失有驗麝香方出龍木論治風毒目中膚翳上用麝香鬚子日開之不用煎細研篩服之良若孕婦不可服白龍散出御藥院方治翳膜昏澀用川芒硝五兩除黑黃腳不用要真白如雪者於銷金銀鍋內盛用新瓦蓋口又用熟炭火約及沸用小磚火內存放先燒磚熱然後下藥在鍋磚上四面有火慢慢微近前至鍋蓋良久鍋內有聲定先去頂上火瓦鍋中覷不滯濕青白汁外用鐵器或金銀器亦得用鐵鈐鈐出鍋傾藥汁在器凝結如玉色成也若用時少研細膩入片白龍腦各等分任用通頂點眼一方單用芒硝一兩置銅器中急火上煉之放冷後細羅點眼角中夜臥時點妙每用少許鼻內搐如點少用大有神效治風翳方出千金方取死豬鼻燒灰治下篩日一以熱水下方寸匕又方出本草去膚赤有蟲如絲線者用蓬蘽葉挼絞取汁滴目中有蟲出如絲線便效石蟹丸出衛生家寶方退翳明目去肝熱地骨皮一兩枳殼一兩麩炒石蟹三兩牛膝三兩酒浸防風一兩破故紙半兩炒甘草半兩木賊半兩枸杞子半兩甘菊花半兩生地黃三兩上為細末煉蜜為丸如梧桐子大每服二十丸熟湯送下點翳眼方出衛生家寶方石蟹二錢如無蟹爐甘石代之研密陀僧一錢研白丁香一錢研硇砂一錢研如粉銅青半錢乳香半錢研蕤仁取白肉半錢去盡油上一處入乳缽研細入於密磁器收如用時旋取一二錢入片腦少許研勻別入小器中盛之一日兩三次點之神效又方出東垣蘭室方治眼中白翳柴胡二錢羌活二錢防風一錢半黃芩酒炒五錢黃連酒洗三錢甘草三錢五味子二錢黃柏五錢酒炒芍藥五錢升麻二錢當歸身龍膽草各五錢酒洗石膏一錢半黃耆三錢上㕮咀煎法如常入酒少許臨時熱服忌言語退翳膏出東垣蘭室方治黑白翳荊芥穗半錢水半盞另浸煎黃連三錢生地黃一錢當歸身六分甘草半錢水一碗熬三味至半碗再下連翹四分柴胡二分防風二分蕤仁四分青皮四分升麻二分上為細末用水三盞熬至一盞去滓更上火煎至半盞入荊芥水兩匙入蜜少許再上火熬勻點之補陽湯出試效方治陽不勝其陰乃陰盛陽虛九竅不通令青白翳見於大眥及足太陽少陰經中郁遏足厥陰肝經氣不得上通於目故青白翳內阻也當於太陽少陰經中九原之下以益肝中陽氣沖天上行此乃先補其陽後於足太陽少陰標中瀉足厥陰肝經火下伏於陽中乃次治也經云陰盛陽虛則當先補其陽後瀉其陰此治法是也每日清晨以腹中無宿食服補陽湯臨臥服益陰丸若天色變大寒大風並勞役遇日飲食不調精神不足或氣弱俱不得服候時氣和平天氣如常服之乃先補其陽使陽氣上升通於肝經之末利空竅於目也羌活獨活甘草人參熟地黃黃耆一方用黃芩白朮各一兩澤瀉研為末陳皮各半兩生地黃炒白茯苓去皮知母各三錢炒柴胡二錢去苗防風白芍藥半兩肉桂去皮一錢當歸身三錢酒炒上同為粗末每服半兩水三盞煎至一盞去滓空心宿食消盡服之連柏益陰丸出蘭室秘藏方一名瀉陰火丸羌活獨活甘草當歸尾依前制防風去蘆五味子各五錢石決明燒存性三錢草決明細黃芩黃柏知母黃連酒內先浸或酒拌潤炒一兩上為細末煉蜜為丸如綠豆大每服五十丸漸加至百丸止茶清送下常多服補陽湯少服此藥為不可勝補陽湯恐防飲食升陽柴胡湯出蘭室秘藏方一名升陽泄陰羌活柴胡補陽湯羌活獨活甘草根當歸身熟地黃各一兩人參黃耆白朮各半兩澤瀉三錢白芍藥一兩陳皮白茯苓防風各三錢生地黃五錢酒炒肉桂半錢柴胡去苗一錢半楮實半兩酒拌知母三錢酒製夏月加五錢上㕮咀每服五錢以水二盞煎至一盞去滓稍熱食後服另合一料煉蜜為丸如梧桐子大食遠茶清送下五十丸每日與前藥各一服如天氣熱甚加五味子三錢或半兩天門冬去心半兩更加芍藥半兩楮實半兩撥雲湯出試效方戊申六月徐總管患眼疾於上眼皮下出黑白翳二個癮澀難開兩目緊縮無疼痛兩手寸脈細緊按之洪大無力以此方治之黃耆一分細辛葉半錢柴胡七分生薑五分荊芥穗一錢羌活一錢半防風一錢半藁本一錢生甘草一錢升麻一錢葛根五分川芎半錢知母一錢黃柏一錢半當歸身一錢上㕮咀都作一服以水二大盞煎至一盞去滓食後稍熱服治眼疾去膚翳出本草以貝母末點眼治目膚翳出本草用井華水洗之主明目去膚翳出本草以仙人草挼汁滴目中去翳用石胡荽挼內鼻中翳自落治膚翳障膜以真珠粉點目中治目中熱膜明目以石蜜飲之治眼消翳膜及箸胬肉以馬琦刮點之目生釘翳附論夫肝心二臟久積熱毒攻發於目能生釘翳蓋肝水也在竅為目心火也於肝為子今心臟積熱熱乘於肝熏髮結聚故為釘翳釘翳根深外障此眼初患之時眼中疼痛作時赤澀淚出怕日總然治療失時致令睛上有翳如銀釘頭子相似此眼不宜鉤割熨烙難得痊效宜令服藥此是熱毒積於肝心致使然也宜服除熱飲子鎮心丸即瘥龍木論歌曰滯留偏熱在肝心疼痛生瘡詎可任熱毒即深開得後銀釘翳入黑睛深萬藥雖然摩不盡能除發歇解愁襟若乖忌省無堅固恐怕將來轉更侵方青葙子丸治肝心毒熱釘翳入黑睛青葙子藍實枳殼去瓤麩炒大黃銼炒菊花甘草炙各二兩草決明黃連去須茺蔚子細辛去苗葉麻黃去根節車前子各一兩半鯉魚膽雞膽各一枚陰乾羚羊角鎊二錢上為末煉蜜丸如梧桐子大每服二十五丸食後溫水下日三兼治內外障一切眼病青葙子湯治肉翳風邪釘翳青葙子蕤仁白茯苓去黑皮葳蕤黃連去須各一兩半秦皮二分山梔子仁秦艽去苗土甘菊花黃芩去黑心甘草炙各一兩車前子一兩半上粗搗篩每服三錢以水二盞煎至八分去滓食後服黃芩湯治白膜赤脈侵睛生翳橫衝瞳仁久成釘翳黃芩去黑心黃連去須木通銼柴胡去苗赤芍藥各二兩地骨皮山梔子各一兩半大黃蒸三度焙葳蕤甘草炙各二兩半石膏碎六兩半朴硝研五兩上粗搗篩每服五錢以水二盞煎至一盞去滓食後溫服日再葳蕤丸治頑翳釘眼獨活去蘆頭葳蕤芎藭青葙子黃連去須黃芩去黑心防風去叉赤芍藥各一兩半車前子二兩地骨皮地膚子干藍甘草炙銼各一兩上為細末煉蜜和丸如梧桐子大食後溫熟水下四十丸日再退膜丸治陽氣炎上血脈貫沖目赤腫痛瞼眥生瘡暴生釘翳漸染睛輪視物羞澀緊急難開兼倒睫拳攣熊膽半兩研牛膽汁一合豬膽五枚取汁牽牛子炒黃連去須梔子仁甘草各一兩車前子決明子枸杞子各半兩上除牛膽豬膽汁外八味同為末用二膽汁和丸梧桐子大每服五十丸食後荊芥湯下一方用溫熟水下三十丸隨膽汁以丸得為度如硬入煉蜜少許不妨羚羊角散治眼生釘翳風熱上攻淚出赤澀羚羊角防風去蘆頭川升麻茯神地骨皮蕤仁湯浸去赤皮麥門冬去心焙決明子去心焙甘草半兩炙微赤銼上粗搗篩為散每服三錢以水一盞煎至六分去滓每於食後溫服除熱飲子治釘翳根深外障黃芩黑參桔梗知母芒硝各二兩防風大黃茺蔚子各一兩上為末每服散一錢水一盞煎至五分每日空心食後去滓溫服鎮心丸治釘翳根深外障遠志人參茯苓柏子仁細辛各二兩乾山藥茺蔚子各一兩車前子一兩上為末煉蜜為丸如梧桐子大空心茶下十丸決明子散出聖惠方治肝膈熱毒眼生釘翳決明子川升麻地骨皮柴胡各一兩去苗葳蕤玄參犀角屑甘草炙微赤銼各半兩上搗粗羅為散每服四錢水一鍾煎至六分去滓每於食後溫服遠志丸出聖惠方治眼生釘翳日月深久遠志去心人參去蘆頭白茯苓柏子仁各一兩車前子一兩半決明子二兩細辛半兩茺蔚子二兩上為末煉蜜和搗三二百杵丸如梧桐子大每於空心及夜臨臥時以粥飲下二十丸抵聖散出聖惠方治眼生釘翳烏賊魚骨馬牙硝定粉各半兩食鹽一分白龍腦一錢蕤仁一兩去赤皮上同研令細每以銅箸頭取如半小豆大日三四度點之升麻湯出聖濟總錄治膀胱熱肝膈中風毒生釘翳升麻黃耆犀角屑鎊葳蕤湯浸去赤皮玄參各一兩上銼如麻豆大每服五錢以水一盞半煎八分去滓入芒硝半錢竹瀝少許空心溫服決明散出聖惠方治釘翳根腳極厚經久不瘥石決明搗研水飛真珠末琥珀各三分烏賊魚骨半兩龍腦一錢研上同研極細每以銅箸取如豆大點患處日三琥珀煎出聖惠方治眼生釘翳久不瘥琥珀一分貝齒半分硃砂半分龍腦一分馬牙硝三分煉過者上同研如面以水一大盞別入白蜜一兩攪和入通油瓷瓶子中用重湯煮以柳木篦煎取一合以來即住以綿濾於不津瓶子中盛之或銅器亦可每取少許點之一方為細散點葳蕤湯出聖濟總錄治目赤並黑睛上生釘翳疼痛葳蕤桔梗黃耆銼各一兩半羚羊角鎊一兩上粗搗篩每服五錢以水一盞煎至八分去滓下芒硝末半錢更煎一二沸食後溫服又方出聖惠方治眼生釘翳根腳極厚經久不瘥馬牙硝一分貝齒燒灰上同研如面以青驢乳三合調入銅器中以慢火炒乾又細研於瓷閤中盛之每取少許點之目生花翳附論夫目生花翳者此眼初患之時忽然發歇疼痛淚出作時遽生翳白如珠棗花陷砌魚鱗相似此為肝肺積熱壅實上衝入腦致生此疾切宜服藥治療不得失時恐後損眼也宜用摩頂膏內熱然後服知母飲子兼服山藥丸立瘥歌曰忽生白翳簇瞳仁點點如花陷切鱗肝肺五臟多壅實上衝入腦病為根膏摩頂上除風熱湯飲肝中服要頻酒面休餐諸毒物莫因小事發貪嗔方桑白皮湯出聖濟總錄治目生花翳白點狀如棗花桑白皮銼木通各一兩澤瀉犀角屑黃芩旋覆花茯神玄參川大黃炒各一兩甘菊半兩甘草一錢一分上為細散每服二錢水一盞煎六分和滓溫服摩頂膏出聖濟總錄一名青蓮膏治花翳蕤仁散出聖濟總錄治目生花翳多年不退蕤仁浸去皮秦艽去苗柴胡去苗各一兩赤茯苓一兩半川大黃銼炒半兩枳殼一兩炒車前子青葙子赤芍藥各三分上為細散每服三錢水一盞煎六分和滓溫服知母飲子出龍木論治花翳白陷外障知母茺蔚子各二兩防風細辛各一兩半桔梗大黃茯苓芒硝各一兩上為末以水一盞散一錢煎至五分食後去滓溫服羚羊角湯出聖惠方治眼生白翳如棗花羚羊角鎊一作羖羊角大黃炒銼桑根白皮銼黃連去須決明子黃芩去黑心甘菊花各一兩甘草炙銼半兩上粗搗篩每服二錢以水一盞煎六分去滓食後溫服黃芩散出聖惠方治眼生花翳不退宜服黃芩木通銼黃連羚羊角屑各一兩犀角屑半兩地膚子三分葳蕤三分甘草三分炙微赤銼上為粗散每服三錢