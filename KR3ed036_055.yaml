body:
  text: 卷五十五耳門耳耵聹附論夫耳者腎之候心之寄竅風熱搏於經絡則耳中津液結聚如麩片之狀久之則丸結不消或似蠶蛹致氣竅不通耵聹為聾方蔥液膏出聖惠方治耵聹塞耳聾強不可挑灌耳蔥汁三合細辛去苗葉附子炮裂去皮臍各一分上將細辛附子為末以蔥汁調令稀灌入耳中豬脂膏出聖惠方治耵聹塞耳聾強堅不可挑塞耳生豬脂一合釜下墨半兩研上調和成膏捏如棗核大綿裹塞耳中礬石散出聖濟總録治耵聹塞耳黃連散一名附子散出十便良方治耵聹塞耳聾強堅不得出耳中痛膿血黃連去根鬚半兩附子炮裂去皮臍一分上為散每以少許摻耳中每著先拭惡物然後吹之蚯蚓方出聖惠方治耳聾干耵聹不可出搗自死白項蚯蚓安蔥葉中用面封頭蒸令熟並化為水以汁滴入耳中滿即止不過數度即挑易出瘥後發裹鹽塞之一方療蚰蜒入耳立效一方以濕者五七條研取汁數滴耳中挑即自出柴胡聰耳湯出蘭室祕藏治耳中干耵聹耳鳴致聾柴胡根三錢連翹四錢炙甘草一錢虻蟲三個去翅足水蛭半錢炒各另研麝香少許當歸身一錢人參一錢上件除三味另研外入生薑三片水二盞煎至一盞去滓稍熱再下三味麝香等細末再上火煎一二沸稍熱服食遠服聤耳附論夫腎氣通於耳耳者腎之候若其經為風邪所乘毒氣蘊結於耳中以至膿汁俱出發悶疼痛謂之聤耳蓋耳者宗脈之所聚腎氣之所通足少陰腎之經勞傷血氣熱乘虛而入於耳其經邪隨血氣至耳熱氣聚則生膿汁故謂之聤耳也方通氣散出聖惠方治聤耳郁李仁去皮研半兩木香一分檳榔銼三枚大黃銼一兩芍藥半兩細辛去苗葉一分人參半兩山芋桂去粗皮各一兩甘草炙銼牡丹皮各一分上除郁李仁另研外搗羅為散和勻每服一錢匕空心溫酒調下治聤耳有膿龍骨枯礬海螵蛸去殼胭脂各等分麝香少許上為細末先繳耳淨將藥乾摻耳中白蘞散出聖惠方治聤耳出膿血塞耳白蘞黃連去須龍骨赤石脂烏賊魚骨去甲各一兩上為散先以綿拭膿干用藥一錢匕綿裹塞耳中菖蒲散出聖惠方治聤耳癢膿汁不止塞耳菖蒲銼焙狼毒磁石煅醋淬七遍附子炮裂去皮臍礬石燒令汁盡各半兩上為散以羊髓和少許綿裹塞耳中礬石散出聖惠方治聤耳出膿汁礬石二兩黃連一兩烏賊骨一兩赤石脂一兩上各等分為末以綿裹如棗核大納耳中日三易一方不用赤石脂一方加龍骨一兩竹蛀散一名胭脂散出聖惠方治聤耳苦竹蛀末二錢白礬二錢飛胭脂乾者半錢麝香一錢上先以綿杖卷之卻以鵝毛管輕吹一字入耳中一方加麻勃紅綿散一名紅散出醫方大成治聤耳出膿及黃汁亦治滴耳枯礬二錢胭脂半錢爐甘石研二錢麝香少許上為細末用綿子纏繳耳中膿汁盡別用綿子蘸藥或干吹少許入耳亦可如積熱上壅耳出膿水神芎丸百粒瀉三五行必瘥一方無爐甘石更服雄黃丸瀉三五行即效白礬灰散出聖惠方治聤耳出膿水久不絶方白礬灰一分白龍腦三分烏賊魚骨一分蒲黃半兩上研細散每以半錢綿裹塞耳日三易之如聖散出王氏博濟方治水入耳內膿出疼痛不止箭竿內蛀末二錢如有蟲子一處研膩粉一錢麝香一錢上研細末先以綿杖捻淨然後用剜耳子深送以綿塞定如覺放扎即是惡物要出去綿及耳塞令流出甚者三度必愈又以薄荷汁點之立效沒藥散治底耳海浮石一兩沒藥一錢麝香一字上為細末每用半字吹入耳中蠍倍散治聤耳膿出不止五倍子一兩炒全蠍三錢燒存性白礬枯一錢上為末入麝香少許吹耳中極效一方加干胭脂同枯礬為末吹入耳中尤妙聤耳方出直指方生豬脂生地黃釜下墨等分上細研以蔥汁和勻捏如棗核薄綿包入耳令潤即挑去狼牙散出聖惠方治聤耳出膿水狼牙白蘞竹中蛀屑各一分上為散以少許摻入耳中菖蒲散出聖濟總録治聤耳塞耳菖蒲銼焙桂去粗皮野葛等分上為散以雀腦髓和勻綿裹棗核大先灸耳中宛宛者七壯後用藥塞耳中日一易禹餘糧丸出衛生寶鑑方治聤耳有膿水塞耳禹餘糧一兩分燒醋淬七次烏魚骨一分釜底墨一分伏龍肝一分附子一枚去皮臍生用上件搗羅為末以綿裹如皂角子大塞耳中日再易之如不瘥者內有蟲也磁石散出聖惠方治聤耳通耳膿水出日夜不止方磁石一兩燒令赤醋淬七遍龍骨一分白礬灰一分上為細散以生地黃汁和捻如棗核大綿裹一丸塞耳中日三度易之又方出聖惠方白礬二兩木香半兩馬勃一分上為末於銚子內消松脂和捻為丸如棗核大塞耳中立效散出危氏方治聤耳底耳有膿不止真陳橘皮燈上燒黑一錢為末麝香少許別研上和勻每用少許先用綿蘸耳內膿淨上藥麝香散淡寮方治聤耳底耳耳內膿出麝香一字海螵蛸半錢上為細末研和每以半錢摻入耳內如有膿先用綿杖子卷令乾次用藥摻之治聤耳出海上方麝香炒半錢蟬殼半兩洗淨火燒存性上同研如塵用綿先卷耳內膿令淨次入藥塞耳門不得動追出惡物即愈治聤耳膿水不止出聖惠方狗膽一枚取汁白礬一錢上用臘月豬脂調和納耳中以綿裹之不過三兩上永除根本又方出聖惠方麻子一合花胭脂一分上為末滿塞耳中綿裹麝香散出肘後方治聤耳底耳耳內有膿出麝香一字別研海螵蛸半錢慢火炙八分熟存性上為末研令勻每用半字摻耳內如有膿先用綿捻以藥摻之一法用染胚枯礬等分為末以葦管吹入耳中即愈或入麝尤佳輕粉少許又礬石散出聖惠方治聤耳出膿汁附子散治聤耳耳中痛方見黃連散紅花散出聖惠方治聤耳出膿水紅藍花一分礬石半兩燒灰上為散以少許摻耳中黃連散聖濟總録治聤耳出膿水黃連去須半兩附子乾者一分上為散以少許摻耳中塞耳細辛散聖濟總録治聤耳耳中痛膿血出細辛去苗銼附子炮裂去皮臍各一分上為散以蔥汁和一錢匕綿裹塞耳中治聤耳方海上方白麻秸刮取一合花胭脂十枚上為末以綿裹塞耳中又方出聖惠方楠木一分燒灰花胭脂一分上為細末研為散每取少許納於耳中又方出聖惠方地龍微炒烏賊魚骨各等分上為末每取半錢用綿裹塞耳中治聤耳有膿出不止經驗良方用五倍子焙乾一兩及全蠍燒灰存性三錢為末摻耳中又方百一選方以雞腸草捻汁滴耳中又方海上名方胡桃肉燒為末狗膽汁為丸如桐子大綿裹塞耳中尤妙香附散出經驗良方治膿耳用香附子去毛為末以綿杖送入耳中或乾摻立效蔡邦度知府屢用皆效紅綿散出經驗良方治聤耳出膿用白礬煅成白灰每用一錢入胭脂一字研勻用綿杖子纏去耳中膿及黃水盡即用別綿杖子引藥入耳中令到底摻之即干如壯盛之人積熱上攻耳出膿水不瘥用無憂散雄黃丸瀉三五次即瘥一方枯白礬為末填耳內立效塞耳鯉魚腸方出千金方治聤耳出膿久不瘥者有蟲用鯉魚腸一具細切醋三合搗布裹棗核大塞耳中食頃痛即有蟲出著布即拔之更易新者蟲盡為度塞耳黃礬散出聖惠方治聤耳及猝腫出膿用黃礬半兩納瓶中火燒令汁盡細研為散綿裹一錢匕塞耳中或以葦管吹耳中一方用白礬為末塞耳並瘥桃仁方出千金方治聤耳出膿血塞耳桂膏出聖濟總録治聤耳中痛膿血出用桂去粗皮半兩為末以魚膏和捻如棗核大塞耳中塞耳雀腦方出聖濟總録治聤耳中痛膿血出用五月五日雀腦以綿裹少許塞耳中雞卵方治聤耳又方出聖濟總録用伏龍肝細研半兩以豬膏和如棗核大綿裹塞耳中日再易夜一易車脂膏出聖惠方治聤耳治聤耳方出聖濟總録捕活母鼠取肝一具乘肝熱時以棗核大塞耳中又方千金方治聤耳痛及膿血出用鐺墨細研先淨拭去耳中膿摻耳中一方取釜下灰吹耳中日三每換以萆麻子去之再著又方出聖惠方用茶籠上蛀屑半兩細研摻滿耳中又方出聖惠方用蒲黃細研以一豆大摻耳中生油方治聤耳又方出聖惠方用松脂為末摻耳中膿止即瘥又方出聖惠方用石首魚腦中魫子為末摻耳中即瘥羊屎方治聤耳方見羊方糞療聤耳耳中痛膿血出出肘後方用附子末以蔥涕和灌耳中取瘥單蔥涕亦佳側臥令入耳中甚良治聤耳方用白鵝尾癭納之耳中又方出傳信適用方用青橘皮燒灰研為末用綿裹如雞頭實大塞耳中日三四易又方出聖惠方治聤耳方用紅花末吹入耳中無花枝葉亦可用之又方出聖惠方用地龍末吹入耳中又方出聖惠方用地龍末及白礬灰調勻綿裹納耳中又方出聖惠方用青蒿搗末綿裹納耳中又方出聖惠方用故綿燒灰為末綿裹塞耳中又方出本草取茺蔚莖汁如豆滴耳中一方用子汁滴耳中蟲傷外毒敷之妙治少小聤耳出本草用桃仁熟末以縠裹塞耳中香礬散出楊氏家藏方治久患聤耳風冷瘡時發癢痛白礬膽礬紅花三味各一錢麝香少許蛇蛻一條燒留性上件為細末用藥少許先以新綿纏細筋頭捻令膿干然後用斡耳挑藥入耳中明日用斡耳子斡去昨日藥再用如前法以瘥為度治大人小兒聤耳熱腫痛有膿出鮑氏方穿山甲露天燒灰出火氣麝香少許上末鵝毛筒吹入三日膿干愈一方出鮑氏方治同前用蜈蚣干為末吹入耳妙一方檳榔末吹入亦妙治聤耳用五倍子先以綿捻干置末半字許入耳中耳聾有膿附論夫耳聾有膿者蓋腎臟虛勞傷血氣於津液相搏熱氣乘之則結聚於耳中腐化膿汁氣不開竅則致人聾方黃耆丸出聖濟總録治耳聾膿出黃耆銼升麻梔子仁犀角鎊玄參芒硝各一兩半乾薑炮芍藥人參各一兩大黃銼炒二兩木香一兩半黃芩去黑心一兩半上為末煉蜜丸如梧桐子大每服二十丸至三十丸煎枸杞根湯下食後良久服一方治耳腫膿水出者有食鹽無干薑蔓荊子散出直指方治內熱耳出膿汁川升麻木通赤芍藥桑白皮炒麥門冬去心生地黃前胡甘菊赤茯苓蔓荊子甘草炙各等分上銼散每服三錢薑棗煎食後臨臥服升氣散治氣不升降九竅閉塞耳痛腫聾耵聹底耳膿出川芎白芷香附紫蘇葉陳皮菖蒲當歸防風甘草以上各等分上為搗細每服五錢薑蔥煎食後服磁石湯出千金方治腎熱背急攣痛耳膿血出或生肉塞之不聞人聲磁石白朮牡蠣各五兩甘草一兩蔥白生地黃汁各一升芍藥四兩大棗十五枚生麥門冬六兩上㕮咀以水九升煮取三升分三服解瘡散治氣虛熱壅或失飢冒暑風熱上壅耳內閉痛膿血流出赤芍藥白芍藥各半兩木鱉子仁當歸甘草大黃汁各一兩升黃芩防風各二錢半上搗末每服五錢水煎食後臨臥服附子丸一名礬石膏出聖濟總録治耳聾出膿疼痛並耵聹塞耳附子炮去皮臍菖蒲米泔浸一宿銼焙礬石熬令汁枯萆麻子仁松脂研各一兩杏仁去皮尖雙仁炒二兩染胭脂半兩上為末熔黃蠟和捻如棗核大針穿一孔子令透塞耳中日一換之一方治耵聹不用黃蠟搗成膏以綿裹如棗核大塞耳中亦瘥解倉飲子出三因方治氣虛熱壅或失飢冒暑風熱上壅耳內聾閉徹痛膿血流出赤芍藥白芍藥各半兩當歸甘草炙木鱉子去殼大黃蒸各一兩上為銼散每服四錢水一盞煎七分食後臨臥服附子散出聖惠方治耳聾有膿附子一兩禹餘糧六銖伏龍肝龍骨釜底墨烏賊骨各半兩上為末取如皂莢子大綿裹納耳中日一易取瘥不瘥者有蟲加麝香一豆大真龍骨散出直指方治膿耳方真龍骨白礬煅赤小豆黃丹烏賊骨各一兩分胭脂半兩分上為細末摻耳又方出直指方明礬煅黃丹煅真蚌粉爛石膏新瓦上煅出火毒真龍骨各等分麝香少許上為細末用綿纏竹篦拭耳換綿蘸藥入耳白礬散一名松花散出聖惠方治聤聾膿水不絶方白礬半兩燒灰馬勃一分木香一分松脂