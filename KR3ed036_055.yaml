一分桃仁三個紅花少許炙甘草二分上同銼如麻豆大都作一服水三盞煎至一盞去滓稍熱服食後忌寒涼之藥利其大便一方無浮生地黃治凍耳成瘡出聖惠方柏白皮二兩榆白皮二兩桑根白皮二兩杏仁二兩湯浸去皮甘草一兩羊腦髓一斤上細銼以羊腦髓煎令黃濾去滓於瓷器中盛鵝翎點藥塗之又方出聖惠方取兔腦髓塗之又方出聖惠方治凍耳用杏仁一斤湯浸去皮壓取油塗之又方出聖惠方以棗肉敷之立愈後用麥葉煮水洗之一方出鮑氏方治耳爛出血用赤腳蜈蚣干為末隨左右吹之俱病兩吹之治耳月割瘡出本草用寡婦床頭塵土和油塗之效也治耳瘑瘡耽目用黑雌雞膽敷之日三次敷百蟲入耳附論夫百蟲入耳其類不一古方或灌以藥或導以物皆以意出之也獨驢乳牛酪二物最為良法諸蟲之入耳者灌之即化為水其入腹者則連服攻劑取瘥方立驗散出聖濟總録治蚰蜒入耳芎藭天南星炮白芷夜明沙炒豬牙皂莢炙各三分白丁香百部藜蘆各四錢草烏頭半兩海金沙一分砒霜別研蓽茇各二錢上為散與砒霜合和研勻臨時更用鉛丹調色勻瓷合收如蚰蜒入耳取少許用醋一兩滴調化以細翎毛蘸藥入耳竅微吹令藥氣行立出藥不得多多即化蚰蜒成水不出如蠍螫先點少醋在螫處摻藥半字許擦令熱立效麝香膏出聖惠方治蚰蜒入耳麝香半兩錢阿魏半錢麒麟竭一字乾漆一字白芨一字膩粉一錢硇砂半錢石膽一字生鐵屑一字上研細末以豬膽汁生薑汁蔥白汁等各少許相和令稀稠得所每用少許點入耳中其蟲化為水立驗烏頭散出王氏博濟方治蚰蜒入耳烏頭三枚木鱉子去殼七枚礬石燒令汁盡一分白丁香一撮夜明沙一分烏雞屎三塊鉛丹一分豬牙皂莢三梃炙小兒衣帶一條如無鼻內血三兩滴亦得上為散每服一字釅醋調灌入耳內少時蟲盡出備急散出聖濟總録治蚰蜒百蟲入耳芫青斑蝥並去頭足米炒各二十一枚金星石銀星石並研各一錢柳絮礬二錢狼毒一錢青黛半錢分上為散每用一字水少許和調入耳立出灌耳散出聖惠方治蚰蜒百蟲入耳雄黃萵苣子蕪荑各一兩緑礬半兩板藍根一兩一作吳藍子沒心草一兩一作蔥子用麝香研一分臨時和入上於五月五日午時和合納瓷瓶中燒為灰入麝香研勻每用藥一字生薑一塊如棗大蔥白一莖同研取汁入藥末攪和勻更用清油一合調藥灌入耳中食頃其蟲淺者自出深者自死如入腹中者以羊肉半斤作羹除油不用以前藥入在羹盆內和勻令人於盆內浸一飯時其蟲自出塞耳黃耆丸出聖濟總録治諸蟲入耳耳腫不聞語聲有膿血黃耆銼一兩芍藥半兩當歸切焙半兩乾薑炮半兩蜀椒去目並閉口一分上為末入生地黃三兩切和杵令勻以棗核大薄綿裹塞耳中日夜易之麝香驢乳汁方出聖惠方治蚰蜒入耳麝香三分緑礬半兩米醋驢乳汁各少許上調和為汁以一蜆殼盛少許傾入耳須臾耳傾出蟲化為水唯存腳子在為驗雄黃灌耳方出聖濟總録治蚰蜒入耳雄黃緑礬礬石半夏各一分上為末以醋調一字灌入耳兼治蜈蚣諸蟲入耳黃耆汁方療蟲入耳腫不聞人語聲有膿出黃耆四分乾薑二分蜀椒一分上搗末以生地黃搗取汁和用綿裹棗核大塞耳中日三夜一以瘥止治蚰蜒入耳方出聖惠方白蜜黃丹酥各半兩上相和於瓷器內同熬成膏如有不覺蚰蜒入耳者以杏仁一枚和皮尖塗膏於上綿裹塞耳門中其蟲聞藥香即奔耳門來便急抽藥以物鑷出清油膏治蚰蜒百蟲入耳痛不可忍清油一斤大蜈蚣三對入油內浸經年者妙上加腦麝每用少許點硇砂吹耳方出聖濟總録治蚰蜒入耳硇砂研膽礬研各一分上研細用雞翎管子吹一分許入耳蟲化為水治蜈蚣入耳方出肘後方桑葉一握鹽一撮上以桑葉裹鹽炙令熱掩耳上冷即易豬脂枕耳方出經驗良方治蟻及蜈蚣入耳豬脂一片豬肉一片上將豬脂煎豬肉令香安耳孔邊枕睡即出治百蟲入耳出聖濟總録桃葉心二七枚胡麻一升炒令香上先以桃葉心塞耳中其蟲必出如未出將胡麻以葛袋盛枕耳邊蟲自出又方出聖濟總録油麻一升炒研令煙出蔥白一莖細切炒令香上將蔥與麻油拌勻以瓶子盛當耳門安側睡令瓶口向耳無令傾側蟲從耳中出至瓶子內即去之又方出聖濟總録草烏頭尖礬石各等分上為末用醋調灌耳中立出又方出聖濟總録豬膏二分合青錢一十四文上以錢納豬膏中煎之去錢以豬膏少許灌入耳中治蚰蜒入耳中方出肘後方雞小一隻去毛足油上以油煎雞令黃箸穿作孔枕之又方出聖惠方萵苣葉一分乾者雄黃一分上為末用麵糊和丸如皂莢子大以生油少許化破一丸傾在耳中其蟲自出車脂膏出千金方治百蟲入耳中取車轄脂敷耳孔蟲自出肘後以療聤耳膿血出綿裹塞耳中又方出聖惠方以蔥涕灌耳中蟲即出亦治耳聾一方用生蔥汁亦可治蚰蜒入耳中出儒門事親用貓尿灌耳中立出取貓尿用盆盛以生薑擦其牙生蔥絍其耳又方出衛生寶鑑以濕生蟲研爛塗於耳邊自出一方攤紙上捻作捻安耳中治百蟲入耳出十便良方用雞冠血滴入耳中即出又方出聖惠方以酒少許灌耳中卻起行即出又方出衛生家寶方用生油調銅緑滴耳中治蚰蜒入耳方用緑礬為末水調灌耳立出又方出海上方用雄黃釅醋調灌耳立出又方出瑞竹堂用蝸牛一個全捶碎置於耳中即出一方去殼研爛滴水五七點再研勻灌耳內自出無活者尋乾者研亦可一方為末吹耳中紙糊耳其蟲自出衛生寶鑑治百蟲入耳方出肘後方搗韭菜汁和醋灌耳中即出單韭汁亦佳治蜘蛛瓦蛆咬耳出海上方用香油和鹽調塗立效治蟲入耳出直指方用桑皮搗汁灌入耳即自出治諸蟲及蝨等入耳出本事方用白膠香燒熏耳中令孔內知暖蟲自出妙治蚰蜒入耳方出本事方用半夏生為末麻油調塗耳門外蟲聞香自出治飛蟲入耳方出本事方用好酸米醋一味滴入耳內蟲必出不出即死治蚰蜒入耳方出聖惠方用牛乳一盞少少灌入耳內即出若入腹者飲一二升當化為黃水出未出更飲一方用牛酪又方出聖惠方用驢乳三合側灌入耳中有蟲從左耳入即右耳出之一方用黑驢乳即出香油方出聖惠方治蚰蜒及百蟲入耳用生香油三合少少灌入耳中若入腹者空腹服酢酪一升不出更服仍以面和燒餅乘熱敷耳門須臾即出又方出聖惠方用水銀一豆大傾入耳中欹耳孔向下於耳上擊銅器物數聲其蟲即出又方出聖濟總録用小便半盞少少灌入耳中即出又方出聖濟總録用百部切焙搗羅為末以一字生油調塗於耳門上其蟲自出又方出聖惠方用胡麻半升炒令香搗碎以葛袋盛側臥枕耳蟲聞香即自出又方出肘後方用麻油作煎餅側臥以耳枕之須臾即出李元淳尚書在河陽日蚰蜒入耳無計可為半月後腦中䘓有聲腦悶不可壓至以頭自擊門柱奏疾狀危極因發御藥以療之無瘥者為受苦不念生存忽有人獻此方乃愈治蟻入耳方出聖濟總録用醬汁一兩合灌耳中即出又方出聖濟總録用小蒜三兩握研取汁灌入耳中理一切蟲入耳皆同妙又方出聖惠方用鯉魚甲半兩燒為灰以水調濾過滴入耳中即出治百蟲入耳方出聖濟總録用火照之即嚮明出又方出聖惠方用板藍葉一握研取汁少少灌入耳中又方出聖惠方用桃葉微炙熱簪頭及塞耳中或搗爛薄綿裹枕之其蟲自出或造酥煎餅枕之一方用桃葉裹鹽炙令熱用掩耳冷即易之並佳又方出聖濟總録用鱔魚頭燒灰取屑以綿裹塞耳中立出又方出聖惠方用生薑汁一合少少灌入耳中立出又方出十便良方以刀兩口於耳上相擊作聲蟲即走出也治蜈蚣入耳方出十便良方即閉氣氣滿即吐復閉取令出或死耳中徐徐以物鉤出之若積久不出者取新熟豬肉安耳竅上即出又方出聖濟總録革帶鉤向耳孔諸蟲皆出勿令鉤羅耳竅內蟲或死在耳中即取之治飛蛾及百蟲入耳方出聖濟總録先大吸氣仍閉口掩鼻呼出氣蟲即隨氣出又方出聖惠方以葦管吹之即走出或閉氣令人以筆管亦可又方出聖濟總録以指彈齒隨左右易又方出聖濟總録以雞肉塞耳中立出治飛蟲入耳方出聖濟總録以石斛數條去根如筒子紝一邊耳竅中四畔以蠟閉塞以火燒石斛盡即止熏右耳即蟲從左耳出未出再作治蟻子入耳方亦治蚊子入耳出衛生寶鑑用豬羊脂炙令香安耳孔自出一方單用豬脂塗入耳門治蚰蜒入耳方以羊乳灌耳中即成水治小蟲蟻入耳挑不出者出本草以燈心草浸油鉤出蟲療百蟲入耳方出千金方以膽礬末和醋少許灌之即出又方以溫湯灌耳中治蒼蠅入耳方出危氏方用皂莢子研爛用生鱔魚血調灌入耳中治惡蟲入耳方出危氏方用香油稻稈灰汁灌耳蚯蚓方治蚰蜒入耳追毒膏治百蟲入耳不出用白礬雄黃各半兩細研以香油調和成膏每用一皂子大塞耳中蟲出即止治耳內有物及百節蚰蜒蟻蟲入耳或干耵聹不出出千金方取酢三年者灌之最良次用綿塞耳半日許必有物出又方出聖惠方以麻繩剪令頭散敷好膠著耳中使其物黏之徐徐引出效用弓弦尤妙但以蔥管合於耳門內吸之即出為良治蚰蜒入耳方出聖惠方用甕器於耳門上打作聲蟲聞其聲即出又方出聖惠方用銅盆於耳邊打即蟲自出或銅器亦可又方出聖惠方用地龍一條納蔥葉中化為水滴耳中其蚰蜒亦可化為水治蜈蚣入耳方出聖惠方火炙豬肉令香掩耳即出治飛蛾入耳出聖惠方用醬汁灌入耳即出一方擊銅器於耳旁即出治諸蟲入耳出危氏方用桃葉為枕蟲自鼻出形如鷹嘴人莫知其名有人蚰蜒入耳遇其極時以頭撞柱至血流不知其癢不可忍蚰蜒入耳往往食髓至盡又能孳生九蟲麻油灌妙又方出聖惠方用桃葉火尉之卷而塞耳蟲立出一方絞汁滴入耳內不一時愈一方熟挼塞兩耳中即出治水入耳方出危氏方以薄荷汁點立效治蚰蜒及百蟲入耳出聖濟總録用雞心血以生油和滴入耳內蚰蜒即出治百蟲入耳出危氏方以川椒為末一錢醋半盞浸一宿良久少許灌耳蟲自耳出又方出十便良方治百蟲入耳以油膩香物著向耳門蟲自出又方出十便良方治百蟲入耳上以火頭一畐燒雄黃少許以煙燻之蚰蜒入耳方出廣南四時攝生方麻油四兩藍根二兩於油內浸五日取出藍根不用上取雞冠血烏驢乳各少許同入油中如蚰蜒入左耳緊塞右耳向左耳內灌藥少許如經年內有蚰蜒子者先於耳內灌藥少許後用藥以手從額揩至頂隨即蓋覆臥定其蚰蜒化為黃水流出即瘥治百蟲入人耳鼻中出本草將古鑑就彼敲其蟲自出治蟲入耳出本草以萵苣汁滴耳中蟲出以其心置耳中留蟲出路蟲亦出治百節蚰蜒並蟻入耳出本草以苦醋注之起行即出治馬陸蚰蜒入耳及諸竅中出本草以驢乳灌之化為水治蚤蝨耳痛出本草以菖蒲作末炒乘熱裹之甚驗治百蟲入耳不出用車釭脂塗耳孔中自出車釭音工脂乃系車釭中油膏也
