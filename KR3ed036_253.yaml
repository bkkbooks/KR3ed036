body:
  text: 卷二百五十三諸毒門蠱毒下血附論蠱能變化毒害人有事之者以毒害人多為飲食內行之人中之者心腹懊痛煩毒不可忍食人五臟下瘀血黑如爛雞肝又云凡卒患血痢或赤或黑無有多少此皆是蠱毒粗醫以斷痢藥處之此大非也方躑躅散治蠱毒腹痛注下赤血羊躑躅乾薑藜蘆熬附子炮雄黃研巴豆去心熬野葛皮肉桂丹砂蜈蚣炙各一兩上搗散為末一兩服不知加一栗米忌豬肉蘆筍生血物蔥貍肉茜根湯治中蠱下血如鴨肝腹中疼痛急者茜根升麻犀角鎊各一兩地榆桔梗銼炒半兩白蘘荷根二兩柏皮銼黃芩去黑心各半兩上粗篩每服五錢以水半盞煎七分去滓不拘時服治中蠱下血日數十行者方巴豆十二枚芫菁藜蘆附子礬石各二分上為末別治巴豆合篩和相得以綿裹藥如大豆許納下部中日三服槲皮散治蠱毒下血如爛肉片心腹㽱痛如有物齧若不即治食人五臟乃死槲皮避陰白皮桃根白皮各四兩並細銼蝟皮灰亂頭髮各一兩大麻子汁五升上先以水五盞煮槲皮桃根皮取濃汁二盞和麻子汁每服暖汁一盞調頭髮灰蝟皮灰二錢服令患人少食旦服須臾用水一盞用雞翎引吐於中如牛涎諸蠱並出治蠱下血欲死方薔薇根銼一升牛膝五合連翹子一升蠟一彈子大上切以水四升煮三升分三服不計時治蠱吐下血方櫸皮廣五寸長一尺蘆荻根五寸如足趾大一方用薔薇根上㕮咀以水二升煮取一升頓服即下蠱一方以水酒共煎服亦得治中蠱毒下血如肝萆麻一粒去皮朴硝一錢上研細末作一服新汲水調下連作二三服效桔梗散治卒中蠱毒下血如雞肝晝夜不止臟腑悉損者用桔梗去蘆頭伏龍肝等分上搗羅為散每服以溫酒下二錢每日三服不能下藥斡開口灌之心中自定服七日止食諸臛脯物補之一方單用桔梗搗屑酒服一方搗汁服並瘥地榆散治蠱毒下血或腹痛或不痛百治不效日夜不止煩渴臭椿根東引根白皮蜜炙焙乾地榆各半兩上為細末熱米飲調下一錢牛膝酒出千金方專治腸蠱先下赤後下黃白沫連年不瘥用牛膝一兩捶散切以淳酒一升漬一宿平旦空腹服之再服便愈鼓皮散出直指方專治蠱毒下血如雞肝晝夜不絶臟腑敗壞待死而已者用鼓皮五寸薔薇五寸酒水煎服蝟皮散出聖惠方專治蠱毒下血用蝟一枚炒為灰細研以熟水調下二錢日三服苦瓠湯出聖惠方專治蠱毒吐血或下血如爛肝用苦瓠一枚切以水二大盞煎去滓以取一盞空腹溫服二服吐下蠱即愈範汪方云苦瓠有毒當臨時量之肘後方用苦酒一升煮令溫服之神驗一名苦瓠蘆治中蠱毒瀉血日夜無度腹痛不可忍者出肘後方取皂角三個炙去皮子打碎釅醋四升入瓷器中日中午時漬又以新白布三尺蓋上布上刀裂一橫口正對病人眼床下安之明日午時藥用布濾去分三服如人行十里再服若不肯服可針兩手大指端甲亦不勞深勿取針當自服或吐或利去根先取白襄荷葉四五枚放病人床席下勿令病人知若中毒則不眠其上矣一方治蠱毒以酒漬一宿去滓頓服並瘥治蠱毒暴下血以筋子根酒飲磨服療卒中蠱下血如雞肝者晝夜出血石余四臟皆壞惟心未毀或鼻破待死者以桔梗搗屑酒服方寸匕日三服不能下藥以物拍口開灌之心中當煩須臾自定服七日止當食豬肝臛以補之神良療中蠱毒下血如鵝肝晝夜不絶臟腑壞敗待死知蠱姓名方取敗鼓燒灰作末酒服方寸匕須臾自當言蠱主姓名令蠱主呼取蠱姓名即瘥聖惠方亦治小兒蠱毒一方作飲服治蠱毒血痢方見治中蠱下血治蠱毒下血如雞肝出血石余四臟悉壞心未毀或鼻破待死取馬蘭根末水服方寸匕隨吐出極神效苗似葛蔓緑子生子如橘子治蠱毒溪毒惡刺虎狼蟲虺等毒干犀根味辛平生嬰婺洪饒間苗高二三尺獨莖根如細辛千金藤味苦平生北地主商土者根大如脂黑色亦如細辛上二味不拘多少煮汁服之若研服尤良蠱毒吐血附論夫病源云蠱是合聚蟲類以器血盛之任其相啖食僅一存者名為蠱能害人食人腑臟其狀心切痛如被齧或面目青黃病變無常是由先傷於隔上則吐血也不治之食臟腑盡則死矣方太上五蠱丸一名雄黃丸出千金方專治百蠱吐血傷中心腹結氣咽喉堅塞語聲不出短氣欲死飲食不下吐逆上氣去來無常狀如鬼崇身體浮腫心悶煩痛寒戰夢與鬼交狐貍作魅卒得心痛又脅胸痛如刀剌經年纍歲著床不起悉主治之雄黃椒目巴豆莽草芫花真珠外臺用木香鬼臼礬石藜蘆各四分附子五分獺肝一分蜈蚣二枚斑蝥三十粒上藥為末煉蜜和更搗二千杵丸如小豆先食飲服一丸密封勿瀉藥氣十丸為劑如不中病後日增一丸以下利為度當下蠱種種狀貌不可具述下後每日將息服一劑三十年百病盡除忌十五辛一方無真珠巴豆有木香空心粥飲下亦以利為度治中蠱吐血以及下血方出肘後方羚羊皮方三寸得敗鼓皮亦佳苦參三兩蘘荷根三兩黃連二兩當歸二兩上㕮咀以水七升煎取二升分三服忌豬肉冷水一方加犀角升麻各三兩無蘘荷根用茜根四兩代之雄黃散出聖惠方專治中蠱吐血雄黃研一分伏龍肝研半兩獺肝如棗大炙斑蝥去翅足糯米炒十四粒上搗羅為散每二錢空心服以酪漿調下或吐蝦蟆及蛇等出為驗蘘荷根湯出聖惠方專治中蠱毒吐血蘘荷根苦參各一兩敗鼓皮燒存性三分上粗搗篩分為四服每以水一盞煎七分去滓不計時服治中蠱吐血出肘後方雄黃研丹砂藜蘆炙各一兩上搗篩為散旦以井花水服刀圭當吐蠱毒忌生物血貍肉一方無雄黃茜根湯出千金方專治蠱毒吐或下血如爛肝亦治肺疾茜根蘘荷根各半升上細銼以水五盞煎至三盞半去滓空腹分溫三服即愈又自當呼蠱主姓名茜根草即染絳草也獨效散出千金方專治諸熱毒或蠱毒鼻中及口中出血方取人屎七枚燒作火色置水中研之頓服即愈亦解百毒氣熱病之毒服訖溫覆取汗為度麥面散出聖惠方專治中毒吐血用小麥面二合分為三服以冷水調服半日服盡蠱下即瘥桔梗汁出聖惠方專治中蠱吐血及下血如鵝肝晝夜不絶臟腑敗壞用生桔梗不拘多少搗取汁每服一小盞日三服治食著諸毒肉吐下血不止痿黃方取淨胡荽子一升煮取汁停冷服半升日一夜二服即止治中蠱心痛吐血欲死方出肘後方用鹽一升醇苦酒一升煮令和一服盡立吐即愈治中蠱毒或吐下血如爛肝用蚯蚓十四條以苦酒三升漬之去蚓但服其汁已死者皆可活治中蠱毒吐血或下血皆如爛肝用蠡實曬乾搗為細末每服方寸匕以水調下隨吐下又方用蝟皮燒存性為末水服方寸匕當吐蠱毒中水毒附論夫中水毒其名有三中溪中灑中水其狀惡寒頭痛目疼心煩腦悶四肢振掀腰背骨節皆強或熻發熱神昏喜睡朝輕暮劇手足指冷二三日則蟲生下部生瘡不癢不痛人罕自覺若不即治則便膿蟲毒上食五臟熱盛煩毒注下不禁八九日死若手足指冷至一寸為微至肘膝為劇然治水毒有陰有陽其瘡正赤如截肉者陽毒也其脈緩大而數其瘡如鯉魚齒者陰毒也其脈沉細而遲陽毒雖急而易治治宜發汗陰毒雖緩而難治尤不可忽凡水毒惟高山及山峽溪源繚繞處多有之何者山高水冷日中始得陽氣故得陰氣常積而水有毒亦猶廣南山高地下氣不疏通故鬱而為瘴水毒為多陰瘴氣為多陽多陽則熱結於中多陰則指節逆冷二者為病大體與傷寒相類欲辨水毒即以熱湯數斗蒜四升搗碎納湯內洗浴若身體發赤斑者是水毒也此證劇則為洞利及齒間出血心腹煩滿下血如爛肝不食而狂皆為熱毒變化而成也至人闢卻之法略與射工相似方升麻湯治中毒寒熱升麻三兩龍腦葳蕤大青各一兩上粗搗篩每服五錢以水一鍾半煎至八分去滓溫服未瘥頻服蔥白湯治中水毒溪毒如傷寒狀蔥白一握切豉半升葛根二兩升麻三分上銼如麻豆大每服四錢以水二鍾煎至一鍾去滓溫服移時又服烏梅湯治中水毒手足指俱冷用烏梅三兩去核搗碎每服三錢以水一盞煎七分去滓不拘時頓服之五加皮散出聖惠方專治中水毒溪毒寒熱如傷寒狀用五加皮三兩洗切搗羅為散每服一錢以酒一盞調下日三夜一粥飲調下亦得一方以五加皮根燒研為末水調服牡丹散治中水毒溪毒下部蟲蝕生瘡用牡丹皮二兩搗羅為散每服二錢以酒一盞調下日三服葛藤洗方治中水毒溪毒下部蟲蝕生瘡用葛藤不拘多少以水煮取濃汁洗下部並導灌入下部良治中水毒搗藍青汁以少水和敷頭面身上令匝治中水毒手足指冷或至膝肘以浮萍曬乾為末每服三四錢以酒服又云中水病手足指冷即是若暖非其冷或一寸極或竟指未過時一寸淺至於肘膝為劇治中水毒用䔧葉一把熟搗杵以酒一盞攪服之不過三服愈治溪毒以馬齒莧絞汁一升以滓敷瘡上佳日四五遍葛氏方治射工毒治水毒中人一名中溪一名中灑一名水病似射工而無物以小蒜三升㕮咀於湯中莫令大熱熱即無力捩去滓適寒溫以浴身體若發赤斑紋者無異治病中水毒方取梅葉桃葉搗絞汁三升許以少水解為飲之小兒不能飲以汁敷乳頭與之又方用常思草搗絞汁三升並以綿裹中指以導下部飲汁日過三即愈治水毒方以燒鮫魚皮水調下二錢又方搗七姑草塗腰背諸處即瘥七姑生冬間細葉如酸莓又方以烏蒜一枚爛搗酒半盞和服瘥一名烏韭山中甚多又方搗蒼耳取汁一大盞分二服又方取蓼搗汁一盞漸飲兼以塗身令周匝立瘥用酒調又方取雄牛膝一把水酒共一盞漬絞取汁飲之日三雄牛膝莖紫白者是雌又方用大莓根搗末飲之並導下部生者用汁夏月行常多齎此藥末入水以一錢投水上流無所畏又闢射工凡洗浴以少許投水盆中即無腹中毒也治水箭有二種一種赤箭發則甚速或在手足四肢或如指大或半錢大如真紅色起泡子疼痛不可忍即時有線直衝上肚便能殺人一種白箭生處大小皆不定顏色亦赤初發不痛不癢中間微白其赤處如蝨咬不治之則便起白泡疼痛不可忍有線一道入腹則殺人但稍緩於赤箭耳大忌抓破風水入內則不治上用蛇莓草一撮帶嫩根及梗連葉五六十片淨洗爛研入酒隨人所飲多少不得過半碗酒浸半時取出草滓暖溫此酒服了以前滓入些鹽拌於瓦上微炒訖塗患處以帛縛定半日便退大抵須治於未痛之前則易切慎切慎解酒毒附論夫酒者熟谷之液也其性剽悍急疾後食而入先食而出能通關節而走膚腠上古作湯液醪醴為而不用後世嗜之無節或飲過度停積不散凝滯於胃散流諸脈熏蒸腑臟令人志亂乃至不醒有連日而無所覺知者甚則中毒而為酒疸諸熱之病也酒者大熱有毒氣味俱陽乃無形之物傷之當發汗則愈其次利小便而消其濕則分解之矣今酒客多服大寒大熱之劑下之則無形元氣受傷而有形陰血亦損乖誤甚矣金匱要略云酒疸下之久為黑疸慎不可犯蓋令上下分消其毒蘊也凡醉不得安臥不動使人搖轉不住時忌當風席地及水洗飲水交接之事昔有人飲酒過多因酒作病胸脘不快其氣擁隔服無數二陳湯竟無寸效由是不喜飲食復以調氣服之致發大熱自後只用薄荷煎雞蘇丸麻仁丸日就痊愈乃以胸脘悶隔熱在上焦使然耳又有人酷好飲酒復感寒邪服不換金正氣散以致內熱愈熾煩渴且悶汗出如雨身體怯寒續後以小柴胡湯加枳殼白芍藥解之柴胡黃芩退熱枳殼寬中芍藥調營止汗霍然痊愈然則酒客抱病其可妄以溫藥嘗試一中乎凡飲酒過多酒毒漬於腸胃流溢經絡使血脈充滿令人煩亂嘔吐為度乃至纍日不醒往往有腹背穿者是酒熱毒氣所為故飲酒須搖其身以消散也夫酒性有毒人飲之有不醒隨血脈流散故也人有榮衛否塞痰水停積者因復飲酒不止大醉大吐故酒與痰相搏不能消散故令腹滿不消也夫酒性有毒而復大熱飲之過多故毒熱之氣滲溢經絡漬臟腑而生諸病也或煩躁壯熱而似傷寒或灑淅惡寒有同溫瘧或吐利不安或嘔逆煩悶隨臟氣虛實而生病焉病症非一故云諸病也方沉檀聚香餅子出德生堂專治消化宿酒闢口氣助脾胃和飲食香附子五兩丁香二兩檀香四兩三稜二兩白茯苓二兩甘松二兩沉香一兩半白豆蔻仁二兩砂仁二兩甘草五兩木香一兩半葛花三兩乾葛四兩麝香三錢另研入藥加南硼砂一兩上為末熬甘草膏子炒飛羅面與藥末和成劑捏作小小餅兒含化葛花丸治醒酒解毒消痰葛花半兩砂仁半兩木香一兩沉香一分豆蔻一分蓽澄茄一分陳皮去皮一兩烏梅十四個半夏二十一枚湯泡七次汁浸煮曬乾切作片另用薑炒乾用山果半兩茯苓一分枳實去瓤麩炒一兩葛粉末半兩甘草炙一分上為末煉蜜為丸如龍眼大每服一丸含化葛花解醒湯出濟生拔粹治飲酒太過嘔吐痰逆心神煩亂胸膈否塞手足戰搖飲食減少小便不利白豆蔻仁半兩縮砂仁半兩葛花半兩木香半錢白朮二錢橘皮去白一錢半青皮去瓤三錢乾生薑二錢白茯苓一錢半澤瀉二錢豬苓去皮一錢半神麯炒二錢人參一錢半上為極細末稱勻每服三錢以白湯調下但得微汗酒病去矣此蓋不得已而用蓋藥味辛辣對酒服之不損元氣敵酒故耳不可頓服恐損天年沉檀快膈丸出德生堂專治酒食所傷胸膈痞悶氣逆吐痰口吐酸水香附子一斤丁皮半斤甘草一斤桂枝甘松莪朮益智仁檀香丁香各四兩藿香薑黃各二錢沉香一兩加山果子四兩上為末用砂仁杵碎取仁作母炒豆粉一斤四兩黃色和勻加前藥末為丸如桐子大每服五七丸細嚼酒水任下無時加數丸亦可六和湯治飲酒煩渴人參赤茯苓厚朴白扁豆木瓜半夏白朮藿香砂仁杏仁甘草香薷等分為末上㕮咀用生薑三片棗子一枚水煎服百杯丸出濟生拔萃專治酒停腹中膈氣痞滿面色黃黑將成癖病飲食不進日漸羸瘦如飲酒先服此藥百杯不醉亦無諸痰橘皮去白三兩木香廣朮炮三錢乾薑三兩白丁香五十個甘草炙二錢茴香京三稜炮三錢砂仁三十個白豆蔻三十個生薑一兩去皮切作片子鹽二兩淹一夜焙乾上為細末煉蜜為丸硃砂為衣每一兩作五丸生薑湯下細嚼無時一方用益智仁二十個橙香餅出御藥院方專治溫脾益胃降氣寬中生津液止煩渴消痰及治中酒不散細嚼一二餅用酒下或沉至杯中可增酒味以津化自逼人香橙皮白豆蔻各一兩木香橘紅白檀甘松各半兩蓽澄茄沉香各三錢龍腦一錢薑黃四兩研上十味為細末用甘草膏和作餅子每服二三餅細嚼用白湯下人參湯出三因方專治飲酒過多大熱煩躁言語錯謬及治房勞人參二兩芍藥蔞實枳實去瓤麩炒茯神去木生地黃洗甘草炙葛根酸棗仁各一兩上銼如麻豆大每服三錢以水一盞煎至七分去滓溫服不拘時候一方無葛根百杯丸出御藥院方專治酒不散胸膈滯悶嘔吐酸水心腹疼痛並服之沉香細切紅豆甘葛陳皮去白甘草炙各半兩丁香六錢砂仁一兩半白豆蔻二兩乾生薑一兩搗碎上九味為末煉蜜和成劑每兩作二十丸每服一丸細嚼生薑湯送下不拘時候木香分氣丸出德生堂治酒食後胸滿氣痞宜常服之本方得效香附子一斤三稜廣朮四兩丁皮四兩甘松淨四兩檀香四兩甘草一斤豆粉十兩炒黃色薑黃三兩研上為細末砂仁四兩杵碎取仁作母水為丸如雞頭大每服三五丸細嚼酒水任下無時加服豆蔻丸出聖惠方專治飲酒太過心悶腹滿吐逆喘急草豆蔻去皮二分丁香小豆人參木香高良薑檳榔陳皮泡去白焙各半兩上粗搗篩每服三錢以水一盞入生薑一分煎七分去滓不拘時溫服訶黎勒散出聖惠方專治飲酒後痰滯心膈不利腹脅脹滿訶黎勒皮一兩草豆蔻去皮半兩人參半兩桔梗半兩乾木瓜半兩桂心半兩甘草半兩炙微赤木香一分研上粗搗為散每服三錢以水一鍾入生薑半分煎至八分去滓溫服細呷之高良薑散出聖惠方專治飲酒後脾虛心胸腹脹滿不能消化頭疼心悶高良薑三兩銼人參一兩去蘆草豆蔻三分去皮白朮半兩沉香三分乾紫蘇半兩陳皮半兩湯浸去白瓤焙上搗為散每服三錢以水一中盞煎至六分去滓不拘時溫服五豆湯出德生堂專能解酒毒止煩渴能發小兒豆瘡不出並解發渴之證後成瘡痍者黑豆黃豆緑豆青豆赤小豆各五升乾葛一斤甘草一斤貫衆俱不銼上用水五斗五升臘八日用大鍋熬至豆熟為度濾去豆汁頓冷以大瓷器盛之用苦葉紙重封春夏月開用酒後渴隨意飲之小兒痘瘡不出飲即發見凡人家不可不於臘月八日留心熬之此藥水浸服之人參飲出千金方專治飲酒房勞虛受熱積日不食四月中熱飲酒不已酒入百脈心氣虛令人錯謬失常人參芍藥栝蔞根枳實知母各二兩甘草一兩生地黃八兩酸棗仁半斤茯神三兩白薇二兩上㕮咀以水一斗煮取三升分三服一方茯神作茯苓益智子散出聖惠方專治飲酒過多肚腹脹滿不消心下痞急妨悶益智子去皮三分砂仁去沙三分茅根二分草豆蔻去皮二分丁香半兩乾木瓜三分陳皮半兩湯浸去白焙上搗羅粗散每服一錢水一中盞入生薑半分煎六分去滓微溫呷之穀神丸治酒食後胸膈痞悶木香半兩砂仁二兩檀香一兩甘松一兩白豆蔻二兩薑黃片子者半兩甘草一兩銼上為細末用甘草汁為丸每一兩作十丸細嚼熟水下全真丸治男婦酒食過傷胸膈痞悶黑牽牛頭末三兩大黃半兩南木香半兩陳皮半兩甘草半兩皂角一兩淨去皮弦用文武火炙黃色上為細末用米醋打糊為丸如桐子大每服三五十丸食後溫湯送下日進三服解酒藥葛根薄荷砂仁甘草各半兩盆硝二錢半上㕮咀如麻子大每用少許細嚼解酒立效草豆蔻散出聖惠方專治飲酒過度嘔逆不止心腹脹滿草豆蔻十枚去蘆高良薑三分銼人參七兩半白茯苓二兩青皮三分湯浸去白炒上搗為散每服三錢以水一中盞入生薑半分煎六分去滓點少鹽攪勻服之葛根散解酒毒甘草乾葛花葛根砂仁貫衆各等分上為粗末水煎三五錢去滓服橘皮湯治飲酒過度酒毒積在腸胃或嘔吐不食湯水服此陳皮去白湯浸炒葛根銼甘草炙銼石膏打碎各一兩上粗搗篩每服三錢以水一盞煎至七分去滓溫服不拘時服之解酒毒治飲酒太過百藥煎乾葛枸杞子烏梅等分為末上為細末小粉糊為丸如桐子大溫白湯下二十丸石膏湯治飲酒過多大醉不醒石膏五錢葛根銼生薑細切各三兩上銼如麻豆大每服五錢以水二盞煎至一盞去滓溫服不拘時候百杯散治停酒胸膈痞悶飲食不快但是一切酒病並宜服之甘遂橘皮去白葛花一兩淨上為細末每服一錢用溫酒臥調服至夜利下酒病方愈未知再服忌食甘草藥物一二日治酒病方蔥白豉各一升上以水四升煮取二升頓服麻仁丸治連日飲酒咽喉爛舌生瘡大麻仁一升黃芩二兩肘後方作黃柏上為末蜜和丸含之一方用黃柏二兩五靈脂丸五靈脂一兩為末麝香少許研上研勻飯丸如小豆大每服十丸米飲下不拘時治因為酒毒所傷斷酒方酒五升硃砂半兩細研上都盛於瓶中密封瓶口安在豬圈內任豬搖動經七日取之飲盡為度治飲酒過度欲至穿腸取驢蹄硬處削下以水煮濃汁冷飲之襄州散將樂小蠻得此治飲酒中毒不醒方用大豆三升以水三升煮取二升去滓每服一盞不拘時候溫服之立吐即愈治飲酒醉不得安臥必須使人搖動不爾恐酒毒腐腸傷胃宜急治之以生茆根搗絞取汁每服一小盞頻服之柑皮煎散治酒毒昏悶煩渴或醉不醒用柑子皮二兩洗焙乾搗羅為散每服三錢以水一盞煎三五沸溫服或入鹽少許沸湯點未效再服治飲酒中毒方用干桑椹二合以酒一升浸一時久取酒漸飲之即解治酒醉醒方用菘菜子不拘多少每研半合以井花水一盞調服葛花散治飲酒中毒用葛花一兩搗為末沸湯點一大錢不拘時候亦可煎服葛根湯治飲酒過不醒用葛根細銼二兩粗搗篩每服三錢以水一盞煎七分去滓服不拘時候一方葛根汁一斗二升取醒止治飲酒後襲人方用干蔓荊根不拘多少蒸三次切焙乾為散每服二錢以飲酒後用新水調下一方煮汁納雞子清三枚治飲酒頭痛方用竹茹五兩以水八升煮取五升去滓令冷納破雞子清五枚攪勻更煮二沸飲二升盡瘥治飲酒腹滿不消方方見解酒毒治酒毒下血方用百藥煎二兩一兩燒存性一兩炒香共為細末每服三錢陳米飲調下解酒毒開胃口方取菰根雜鯽魚為羹服之治消酒毒明目散氣滿不能食取赤小豆花煮服之又下水氣亦治飲酒不醒治飲酒大醉恐爛腸方出千金方作湯著大器中漬之復易之酒自消夏月用之佳治飲酒大醉中毒方出聖惠方用枳椇子樹枝二兩銼每服一兩以水一大盞煎五分去滓溫服又方出聖惠方搗生葛根汁及葛藤和絞汁飲之乾葛干蒲亦佳又方上用白粳米一升水五升煮使極爛濾去滓放冷飲之治飲酒積熱遂發黃方出肘後方取雞子七枚苦酒漬之器中密封納井底一宿當軟取吞二三枚漸至盡驗栝蔞湯治飲酒發渴又欲飲酒栝蔞根三兩麥門冬去心焙一兩葛根二兩桑根白皮三兩細切上粗搗篩每服三錢以水一盞煎至七分去滓溫服之不拘時候治飲酒連日醉不醒出聖惠方用蕪青菜並小米熟煮去滓冷納雞子三枚調勻飲之二三升無雞子則單飲又方出聖惠方取水中螄螺及螺蚌等著蔥椒薑豉煮如常法飲數升即解又煮蔥豉取二升飲之瘥又煮粳米一升水五升煮爛去滓飲之加味敗毒散出海上方專治酒過度面黑肚飽人參敗毒散一貼斑蝥一個枇杷葉十片上後二味同炒黃色去斑蝥將枇杷葉入敗毒散水一碗煎至七分臨睡通口服蘆根湯若已服安和藥仍不退者及小觸動服蔥豉等湯不解者可服蘆根地榆五加皮各一握上切以水三升煎取二升服之即解專治吐酒出傳信適用方用桑樹上木耳以新瓦焙乾為末糯米飲調服之枳朮黃連丸治酒太過眼熱口瘡去痰枳實半夏白朮白茯苓黃皮黃連南星陳皮青皮黃芩用半大黃用半上各等分為末糊為丸桐子大每服六七十丸臨睡溫水送下解酒毒目黃者出本草以蛤蜊煮食之解酒渴上用上好菘菜二斤煮作羹啜之作齏菹亦得欲使難醉醉則不損人方用葛花並小豆花末了為散服二三服即不醉又用葛根飲枇杷葉飲並以雞子煮乾蒲麻子服使欲便而不病人胡麻亦可酒先食鹽一撮後則飲酒亦倍栝蔞粉出本草專解酒毒栝蔞根不拘多少水浸三日淘洗上細切研水濾取汁作粉每服三錢米飲調下草節散出本草赤馬糞中草節不拘多少略洗曬乾上為細末每服二錢米飲調下薺汁丸出本草專治酒食所傷並嗽杏仁七個巴豆一枚去皮殼硃砂少許飛淨上件一處研成膏丸如黃米大每服三五丸淡齏湯汁下臨臥服小兒一丸如酒積溫酒下治酒毒口中如膠而臭出本草食柑子而瘥即柚也口噙雞舌香即丁子香以沉香可代知母地骨皮桑白皮山梔子麥門冬甘草各等分上藥煎湯入鹽口含或早起汲井水第一汲水即井花水含之吐棄廁下即瘥酒毒肺熱咳紅四黃丸出本草宣連大黃山梔子黃芩上件略為末蜜丸冷含麝香丸出本草治飲酒稍多及傷瓜果虛熱在脾飲水無度狀似消渴大抵消中之疾往往脾氣既衰元氣耗散土不制水故水益不收冷脾有熱而元氣不衰者非消渴也此藥主之麝香當門子不拘多少上件研細以好酒濡之為丸如緑豆大每服一十丸煎枳椇子湯送下明日再服以不渴為度枳椇子亦謂之癩漢指頭蓋取其似也小兒喜食之食前服大酒不可安臥出本草常令搖動轉側又當風席地及水洗飲水最忌交接房事天南星丸出本草能去痰治酒積化酒毒南星一斤端正者上於平地上掘一窟闊五寸深一尺五寸仍略搗窟中次用剛灰於窟內簇起燒過大半除火去灰令淨以煮酒一斗澆之將南星放其中覆以瓦盆用元土泥封固盆縫勿令吐氣一宿早取出用酒水各二升和洗切作片焙乾碾末入飛過辰砂一兩薑汁糊為丸桐子大又以硃砂為衣每服五十丸至百丸生薑湯下不拘時治噦氣嘔逆出本草用糟筍中酒以小兒乳和少牛乳飲之亦可單服少許解酒毒出本草取鹽面子干搗為末食之消酒毒出本草取葛根蒸食之其粉甚妙一方搗汁飲三升即醒治嗜酒不已出本草以山蛩蟲一節燒為灰水下服之訖便不喜聞酒過一節則毒人至死解酒毒目黃出本草以蜆肉浸取汁服一方煮食之蜆子肉湖邊溪澗皆有之治醒酒止渴除痰唾去酒毒出本草方見四黃丸治斷酒方出千金方柳花臘月鼠頭灰上等分為末黃昏時酒服一杯一方水調三錢治嗜酒方以杉菌耳子七枚燒作灰投酒中飲之勿令人知知則不效治酒苦唾用葳蕤葉為散服之愈昔晉嵇紹有胸中寒痰每酒後唾服之得愈飲酒不醉方治飲酒不醉白扁豆二十五粒乾葛益智縮砂仁各等分上為末酒水各一碗熬成膏蒸餅為丸如桐子大吃酒時酒送下二丸益脾丸出御藥院方專治飲酒不醉又益脾胃葛花二兩小豆花一兩緑豆花半兩木香一分上為細末白蜜為丸如桐子大煎紅花湯下十丸或夜飲津液下五丸不醉大妙治飲酒令人不醉方出千金方柏子仁麻子仁各二兩上飲前為一服進酒三倍又方出千金方葛花小豆花各等分上為末服三方寸匕臨飲時仍進葛根汁及枇杷葉飲並能倍酒又搗生葛根及葛藤餅和絞汁飲之又幹蒲桃煎服亦佳又方出千金方取九月九日菊花為末臨飲服方寸匕亦治酒醉不醒又方出千金方六月六日取小豆花葉陰乾百日為末服之又方出千金方五月五日取井中倒生草枝陰乾為末酒服之二錢治飲酒令無酒氣方出千金方上用干蔓荊根三七枚三遍蒸為末二錢許酒後水服之神驗遇仙方詩曰丁香沉檀麝一錢更兼香附半錢先飲時少許投壺內席上春風正遇仙
