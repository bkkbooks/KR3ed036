body:
  text: 卷一百九諸風門大風癩病附論大凡癩病皆是惡風及犯觸忌害得之初覺皮膚不仁或淫淫若癢如蟲行或目前見物如垂絲或癮疹輒赤黑此皆為疾之始起便急療之斷米穀肴鮭專食胡麻松木輩最善也夫病之生多從風起當時微發久將為害初入皮膚之裡不能自覺或流通四肢潛於經脈或在五臟乍寒乍熱縱橫脾腎蔽諸毛孔腠理壅塞難通因茲氣血精髓乖離久而不療令人頑痹或汗不流泄手足痠疼針灸不痛或在面目習習奕奕或在胸頸狀如蟲行或身體遍癢搔之生瘡或身面腫痛徹骨髓或頑瘡如錢大狀如蠔毒或如䖻或如手錐刺不痛或青黃赤黑猶如腐木之形或痛無常處流移非一或如酸棗或若懸鈴或似繩縛拘急難以俯仰手足不能搖動眼目流腫內外生瘡小便赤黃尿有餘瀝面無顏色恍惚多忘其間變狀多端毒蟲若食人肝眉睫墮落若食人肺鼻柱崩倒或鼻生息肉塞孔氣不得通若食人脾即語聲變散若食人腎耳鳴啾啾或如雷鼓之音若食人筋脈支節墮落若食人皮肉頑痹不覺癢痛或如針錐所刺名曰刺風若蟲乘風走於皮肉猶若外有蟲行復有食人皮肉徹外從於頭面即起為皰肉如桃核小棗從頭面起者名曰順風從兩腳起者名曰逆風令人多瘡猶如癬疥或如魚鱗或癢或痛黃水流出初起之時或如榆莢或如錢孔或青或白或黑或黃變易無定或起或滅此等皆病之兆又云風起之由皆是冷熱交通流於五臟徹入骨中虛風因濕和合蟲生便即作患論其所犯多因用力過度飲食相違房室太過毛孔既開冷熱風入五臟積於寒熱寒熱之風交過通徹流行諸脈急者即患緩者稍遠所食穢雜肉蟲生日久冷熱至甚暴蟲遂多食人五臟骨髓及於皮肉筋節久久皆令壞散名曰癩風若其欲療先與雷丸等散服之出蟲見其蟲形青赤黑黃白等諸色之蟲與藥療者無不瘥然癩名不一木癩者初得先當落眉睫面目癢如復生瘡三年成大患急療之愈不療患成火癩者生瘡如火燒瘡或斷肢節七年落眉睫急療可愈八年成疾難以療金癩者是天所為也負功德崇初得眉落二年食鼻鼻柱倒不可療土癩者病身體塊磊如雞子彈丸許此病宜急療之六年成大患十五年不可療水癩者先得水病因節留停風觸發動落人眉須急療之經年病減蟋蟀癩者如蟋蟀在人身體內百節頭皆欲血出三年不可療面癩者蟲出如面舉體艾白難療熏藥可愈多年不可療白癩者斑駁或白或赤眉須墮落亦可療之多年難療疥癩者狀似癬瘙身體狂癢十年成大患可急療之風癩者風從體入或手足癩瘡風冷痹癡不療二十年後便成大患急療之愈蚼癩者得之身體沉重狀似風癩可療之至久積歲成大患疾速療之酒癩者酒醉臥黍穰上因汗體虛風從外入落人眉須令人惶懼養生禁忌云醉酒臥露不幸生癩也又云魚無鰓不可食食之令人五月發癩又云癩風即經所載癘風也癩之名非一證狀多端不出五種風生五種蟲是黃風生黃蟲青風生青蟲赤風生赤蟲白風生白蟲黑風生黑蟲四蟲猶可措手惟黑蟲未必有療籲此惡疾也瘡痍荼毒乍熱乍寒身體魁癗手足指脫眼爛鼻塌齒豁唇翻顏色枯黃眉須墮落頑痹痛癢不能屈伸病證之惡莫甚乎此然此雖出於風必有所致大率多因嗜欲無度勞動氣血熱發汗出不避冷濕外風遂致淫氣與營衛相干衛氣挾邪則肌肉不仁營氣泣濁脈絡瘀熱故遍身傷潰變壞人形千金所謂自作不仁極猥之業雖有悔言而無悔心故應如是亦有傳染觸犯而得者此則不謹之所招也人有斯疾切須忌鹽及一切口味幽隱林泉屏棄世務早早救療庶為全人治法以疏風殺蟲逐惡血輩為之宣通謹勿用補此風若從頭起而下者順從足起而上者逆順則易逆則難又當識此余於直指後集歷節方論見之大寒大熱不得行淫多致風癩或久病尫羸廢其肢體三因方云凡治大風須推其所因凡因風寒熱濕勞逸飲食與夫傳染不可混濫或散寒濕風濕清熱調和氣血迥然不同若例以瀉風藥治之則失其機要矣昔見一僧得病狀如白癩卒不成瘡但每旦起白皮一升許如蛇蛻醫者謂多啖炙爆所致與局方解毒雄黃丸三四服而愈豈非得其因而治之耶方水銀膏治大風疾雲母石紫石英鵝管石花蕊石玄精石井泉石石鐘乳寒水石代赭石滑石或云金星石金牙石銀牙石各等分上為細末將輕粉水銀各七錢細研入藥同研不見水銀星後用清油調去避風處搽之日二次七八日藥透牙疼出臭涎一二碗出盡用黃連貫衆各一兩煎湯漱之如腹疼用三黃丸下若有麻痹不仁用麻黃木鱉子防風當歸等分煎服得汗即安搽藥後有他病證變動者隨證用外方藥治治大風疾塗敷方出聖濟總録磁石煅醋淬玄精石研禹餘糧煅醋淬陽起石研礜石研代赭煅研金星石研銀星石研各一兩以上八味再用鹽研泥固濟以四斤熱火簇定候赤取出乘熱搗末水銀膩粉二味各半兩同放瓷碗內研令無星子取用上每用前藥末二錢匕及水銀膩粉二錢匕研大麻子三合麻子油一兩半生絹絞取汁調塗身體以藥末盡為度鋪油單襯臥以被覆出汗以轉下惡物為度未轉再塗轉後即服補藥異功散出聖濟總録治大風疾塗藥轉後服補藥天麻酒漬焙赤箭松黃鬼臼安息香研羌活去蘆頭款冬花楓香脂研天蓼花側柏葉蒼耳各一兩苦參一兩半何首烏炮去黑皮細辛去苗葉防風去蘆蔓荊實去浮皮藁本去苗土牛膝切焙地骨皮去土甘草炙銼乳香研天門冬去心焙麥門冬去心焙丹砂研萆薢木香虎骨酒炙當歸切焙天南星炮乾蠍炒烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙麻黃去根節雄黃研附子炮裂去皮臍芎藭白殭蠶直者炒桂去粗皮雞舌香研各半兩上搗研為散入雲母粉六兩研和勻每服一錢匕臘茶或米飲調下日一二服治大風神效方黃耆當歸酒浸各二兩麝香一錢大楓子肉一十兩炒香去殼草烏炮五靈脂川芎生防風生沒藥研極細去油烏藥赤芍藥萆麻子炒去殼枸杞根甘草湯煮爛為度乳香威靈仙何首烏生赤土信州白蒺藜去刺蒸伏時酒拌曬乾炒熟地黃洗曬生大黃黑牽牛水沉者用浮者不用各四兩胡麻沉者用浮不用天麻二兩炒獨活羌活蔓荊子炒木鱉子去殼白芷牛蒡子炒赤石脂研如粉荊芥苦參用糯米泔浸一夕曬乾銼石菖蒲九節者去皮毛用桑條蒸去桑條不用以上各一兩白花蛇身上有方勝尾上有腳甲夏浸一宿春秋冬三宿取出用柏柴火焙如此三次後用砂罐盛埋地中三宿出火氣勿用皮骨取肉研碎黑烏蛇制同上白殭蠶一兩去絲炒黃全蠍一兩地龍一兩去白頸去泥上煎藥一處製為末肉藥各製為末將浸蛇酒煮白米飯擂碎作糊丸如梧桐子大每服四十丸至五十丸日進三服待半月病發在外然後服大黃散令過一二行再服前藥忌一切動風諸物及房事止可食淡粥如瘡破重者加天雄少許黑龍丹出聖濟總録治大風癩硫黃別研雄黃別研丹砂別研曾青別研白石英別研紫石英別研水銀七味各半兩先將丹砂硫黃雄黃末點醋與水銀同研令水銀星盡為度金箔二三十片與前七味同研勻太陰玄精石硝石入細桑枝二三寸同熬為汁冷用馬牙硝熬乾用白礬燒令汁盡用鉛丹胡粉自玄精石以下至此同研各半兩以上藥十四味入藥罐內依後法燒天南星酒煮透切砂白附子酒煮切炒白花蛇酒浸去皮骨炙白殭蠶炒蠍梢炒天竺黃別研天麻酒煮切焙麻黃去根節煎掠去沫焙鹿胎虎骨醋炙敗龜醋炙蟬蛻微炒羚羊角鎊犀角鎊木香曲碎炒麥糵炒輕粉麝香研各半兩上除天南星以下一十九味搗羅為末外前硫黃以下十四味用燒藥瓷罐子一枚將六一泥固濟大幹以先研玄精石至胡粉六味末平分一半布在罐子內次入硫黃至金箔八味在中又盡玄精石等末在上別入金箔二十四片藥上蓋定後以六一泥固濟留半寸許不要泥合縫就淨室中掘地坑面廣二尺二寸深如藥罐子二寸又於爐中心掘一孔入一大罐滿著水坐藥罐在上下不得令水蘸濕用火一斤去罐五寸垂胎養三復時畢出藥方始泥合縫又加火至三斤仍舊去罐遠近亦三復時至滿日平明用火五斤簇藥罐子燒令通赤一食頃便去火用灰培罐子上次用濕土窨蓋令實至來日平明取出藥細研用重熱帛帶濕包裹藥置於淨新濕土上培窨三復時每日夜三次細灑水於土上常以大盆合蓋候出火毒日足別密縫一夾絹帶貯藥於銀器石器中用水二斗甘草一斤搗為末上垂藥袋不得到底煮一復時取出焙乾再研如粉與後十九味草藥末同研勻用蒸棗肉丸如櫻桃大每服一丸用苦參黃連浸酒三合磨下治一切毒氣風豆淋酒下半丸日二夜一其煮藥甘草水有瘡痍疥癬風熱毒聚淋洗即瘥應癱緩角弓反張身有癖痹急風渾身瘙癢走注疼痛破傷等風服訖蓋覆出汗遍身癖腫不散樺皮灰酒驚癇煎金銀湯腸風瀉血煎荊芥湯小兒天吊煎薄荷湯酒相解磨一丸分五服小兒夜啼驚悸研丹砂水磨一丸分八服仍以半丸緋帶子男左女右糸在臂上九江散出千金方治二百六十種大風及白癜風當歸七分石南六分附子躑躅秦艽菊花乾薑防風雄黃麝香丹砂斑蝥各四兩蜀椒連翹鬼箭羽石長生知母各八分鬼臼各十一分人參王不留行石斛天雄烏頭獨活防己莽草各十二分水蛭百枚蜈蚣二條虻蟲地膽各十枚上諸蟲皆去足翅熬炙令熟為散以酒服方寸匕日再其病入發令發白服之百日愈發還黑換肌散出衛生寶鑑治大風疾年深久不能愈以至面毛墮落鼻梁崩壞額顱腫破不至逾月取效如神白花蛇三兩酒浸一宿黑烏蛇三兩酒浸一宿地龍去土二兩當歸細辛香白芷各一兩天麻二兩蔓荊子威靈仙荊芥穗甘菊花苦參紫參沙參木賊沙苑蒺藜不灰木炙甘草天門冬赤芍藥九節菖蒲定風草何首烏胡麻子炒黃川芎草烏頭去皮臍蒼朮泔浸去皮木鱉子仁以上各三兩上為細末每服五錢匕酒調下食後酒多為妙烏蛇丸出聖濟總録治大風癩疾若眼脈斷指節零落腳下有瘡語聲嗄為不可治如未有此證宜服烏蛇一條酒浸去皮骨頭尾取三兩檀香銼丁香茜根銼紫芍銼防風去蘆苦參獨活去蘆頭沙參去蘆頭梔子仁酸棗仁生用槐子炒白芷附子炮裂去皮臍藁本去苗土羚羊角鎊蒼朮銼醋炒犀角羚羊角防己桃膠生用萆薢炒蕪荑仁炒栝蔞根銼秦艽去苗土烏藥銼各三分桑根白皮銼三兩木通銼一兩半上搗為末煉蜜丸如赤小豆大每服空心溫酒下十丸至十五丸日二不飲酒薄荷槐白皮湯下如要速瘥宜用後湯下藥桑枝湯出聖濟總録治大風癩疾下藥桑枝柳枝槐枝枸杞根黃荊根羚羊角鎊各一兩上並生用銼如麻豆大每用藥五錢匕以水一盞半煎取七分去滓下前丸藥服一月必覺四肢皮膚癢痛不可忍但宜飲酒睡不得搔抓仍頻飲食避外風如有汗必腥臭及有蟲從皮膚中出如面塵或如馬尾頭髮尖或如綿絲尖或如麩片頭黑身白形色不定但癢之後仔細看之或從小便中出或從瀉利中出者大效此疾少退終身禁房事及忌動風物時以苦參湯洗浴須換新衣其舊衣並床薦等並焚之治大風瘡草烏木鱉子白膠香五靈脂白芷烏藥麻黃桔梗枳殼天麻防風白芍藥黃耆各一兩半虎骨甘草一兩半大楓子二兩斤黑神散消風散當歸各一兩半片腦五半錢麝香一錢烏蛇二條川芎何首烏各一兩半大黃一兩通聖散一兩半上為末煉蜜為丸每服二十丸溫酒吞下不拘時候婁金丸治大風癩病茯苓丸出聖濟總録治諸癩膿潰體虛氣熱營衛不清風鼓於脈白茯苓去黑皮石斛各一兩半人參蒺藜子炒去角羚羊角鎊屑枳殼去瓤麩