三元日或年日及六月六日預合之每服空心以暖酒調下二錢服藥後或覺心逆不得使吐吐即藥無功服藥後蟲必出甚驗如未應次日再服忌生血物野貍肉治風皮膚瘙癢狀如蟲行出聖惠方蒺藜子白礬各三兩蛇床子躑躅花蒴藋根凌霄花苦參大戟川大黃茺蔚子各二兩上銼以水五升酒三升相和煎取三升去滓次入白礬末更煎三五沸以瓷器盛之旋用塗於癢處百畏丸一名丹砂丸出聖惠方治一切癩疾丹砂研水銀桂末乾薑末烏頭末菖蒲末蜀椒末藜蘆末柏子仁研膏各一兩上再同研勻先用醇酒二升於銅器中熬令減半次下諸藥末並膏更添醇酒二升攪令得所丸如梧桐子大每服三十丸薄荷茶下日三服漸加丸數三十日眉發覆生又三十日復本也一方入漆五合熬攪勻為丸陰乾每日空心及晚食前用荊芥槐白皮湯下二丸赤箭丸出聖惠方治大風疾赤箭赤柳茵芋地骨皮烏蛇各五兩白楊皮十兩去皴皮以上細銼為末以水五斗於釜內煮至一斗濾去滓澄清再煎成膏防風去蘆頭天麻青蒿末各五兩上為末以煎成膏和丸如梧桐子大每服食前以荊芥湯下十丸枳殼丸出聖惠方治熱毒風沖頭面癢如蟲行枳殼麩炒微黃天門冬各一兩半去心焙獨活黃連去須防風去蘆頭白蒺藜微炒去刺苦參各一兩銼烏蛇二兩酒浸去皮骨炙微黃苗桂一分上為末煉蜜和搗為丸如梧桐子大每服不計時候以溫水下三十丸治身體瘙癢或生癮疹如蟲行浴方出聖惠方茺蔚子白蒺藜羊桃根苦參漏蘆各五兩蒴藋蒼耳莖葉各一斤鹽三合柳蛀木半斤上銼以水一石取七斗去滓飽食看冷暖浴浸之當汗出水稍冷便出宜避風不過三日即效八葉湯出三因方淋泄大風瘡桑葉荷葉地黃葉皂角葉蒻葉蒼耳葉何首烏葉菖蒲葉上等分曬乾燒存性為末如面藥洗手面身體大風惡疾瘡痍荼毒膿汁淋漓眉發墮落手足指脫頑痹痛癢顏色枯瘁鼻塌眼爛齒豁唇揭病證之惡無越於斯負此病者百無一生猶且愛戀妻孥復著名利不仁之行仍欲更作死而無悔深可悲傷凡遇此疾切須戒鹽及一切口味公私世務悉宜屏置八仙丹出御藥院方治大風癩病白附子天麻升麻丹參威靈仙細辛赤箭各一兩蜈蚣一對酥炙去頭足上同為細末每用一兩八錢藥末用淘淨胡麻子一升重五兩炒令香熟入藥末同搗令極細煉蜜為丸分作十丸每日食後米飲嚼下一丸日進三服服之十日或一月或兩月筋骨疼痛是其驗也比至有驗切忌出入行動醉仙散一名換肌散出衛生寶鑑治大風疾遍身癮疹瘙癢麻木亦治毒氣蘊積攻衝瘍潰胡麻子牛蒡子枸杞子蔓荊子各半兩四味一處同炒白蒺藜苦參栝蔞根防風各半兩上為細末每用十五錢末入輕粉一處拌勻每服一錢茶清調下煎甘草貫衆湯漱口晨午夕各一服後五七日先於牙縫內出臭黃涎渾身疼痛次後利下膿血病根乃去八寶散治風癩松皮頑癬久不瘥者神效藿香破故紙大腹皮檳榔雄黃輕粉硫黃枯白礬各一兩上為細末小油調搽日上數次癢則搽之
