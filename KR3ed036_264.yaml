body:
  text: 卷二百六十四服餌門神仙服餌神仙去三尸九蟲附論潁陽書曰人之腹中盡有三尸為人大害三尸者托陰氣以成靈感私欲而致用邪蘊臟腑非天機清明至難沉濁者鮮不易其心矣欲生則三尸生欲滅則三尸滅故至人云欲者不欲不欲者欲反覆自明之謂也成道之速者欲去三尸先外去色味名利內平喜怒愛惡寂然虛靜屍乃無處潛留則遁跡而逝矣又曰每至夜半起端坐私誦妙靈名彭倨彭質彭矯七遍無令耳聞依守清淨法動用消息之宜繼晝不睡甲子庚申守之亦爾則妙靈飛去心神凝定五方秀氣入於靈臺童子童子者人神至精也精則成聖蕩則成愚是故聖人修之以真行之以勤若能克己勵志不出三年其道成矣心生光明久習彌廣南華謂之虛室生白秀髮靈臺即布日積數並三元六甲本命算以次扣之乾坤六甲天人玉女獻五方色數於童子合於天地天地不違合於萬象萬象不卻所求隨意而應知來藏往出有入無不可得而名心有進綱退紀之法變奇乘除之數五音六律消息加減剖析神明天道隱故不言而行自彰玄門之能事長生之妙術盡於此矣又曰妙靈三尸也常以庚申之夜上告天地記人罪過及人生籍令人早亡魂則昇天魄入於泉唯上屍獨在地上游行相承而為鬼祟或四時八節三牲祭禮不精輒與人作禍苦心痛注忤伐人生命上屍彭倨在人頭中專伐人眼故目暗面皺口臭齒疼脫落中屍彭質在人腹中伐人五臟令人少氣力多忘好作惡事敢食眾生血肉或為惡夢驚恐不安汗流不止下屍彭矯在人足中令人下關搔擾五情踴動不能自禁苦三尸為祟則害於子孫傳注不絕如學道之人不先去屍蟲徒服良藥斷谷絕味勤於吐納以求長生終不可得將知至道須究其害每至庚申日其夜不寐守之至明若覺體重疲倦宜可少眠須令數覺此三尸蟲即不得上告天地太上科律云六月八日及庚申日夜北帝開諸罪門聽群鬼物下詢訴訟其人罪滿五千則當死一守庚申三尸振伏七守庚申永絕乃得精神安宅骸室常存五神恬靜不復搔擾迷亂每夜欲臥時扣齒三七通左手撫心呼三尸名三遍則不復為害又常以寅日去手爪甲午日去足爪甲年中七月十六日去手足爪甲燒之作灰和水服之三尸九蟲永自消滅又江南芒草香三尸所惡之草煎作湯沐浴三尸自去矣又以三月四日取桃葉五升熟搗脫衣避風密室中坐其上令氣入腹中從旦至暮屍蟲悉出但疾中療難者莫過於癩次是癆瘵一染後子孫相傳時呼傳屍欲斷此疾須禁絕三尸九蟲邪氣伏盡即入諸藥世人得此疾自言宿業甘心受斃豈不惑哉是故上士修德以伏之中士守庚申以制之下士餌藥以除之方貫眾方神仙去九蟲方一曰蛔蟲狀如𧓳長四寸令人腹鳴二曰長蟲亦名蚖蟲長一尺令人心痛三曰白蟲長一寸生子孫轉大或長至四五尺亦能殺人四曰肉蟲狀如爛李令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲如蝦蟆令人嘔吐不喜七曰鬲蟲如瓜瓣令人多睡八曰赤蟲如生肉令人腹鳴九曰蟯蟲至微細狀如菜子群蟲之上也令人癆劇多則為人癩病亦為人癰疽瘡疥瘻癬蚤風等宜服出聖惠方貫眾一兩三分去伏蟲白藋蘆三兩去蚖蟲蜀漆三分主白蟲蕪荑一兩一分去肉蟲雷丸一兩半主赤蟲白殭蠶一兩主鬲蟲石蠶一兩一分主蟯蟲厚朴二兩一分主肺蟲狼牙子一兩主胃蟲上並切熬令黃搗羅為末煉蜜和丸如梧桐子大粉漿服五丸日漸加至十丸經十五日積聚下六十日百病瘥婦女服之絕孕還生子服藥須先齋戒即屍蟲奔散神靈來輔矣又方出聖濟總錄青木香一分白檳榔一枚銼桂去粗皮一分上粗搗篩每服三錢匕水一盞煎至七分去滓溫服真人去三尸方出聖濟總錄狗脊去毛七兩乾漆三兩蕪荑三兩上同熬搗羅為末煉蜜和丸如梧桐子大每服七丸米飲下三七日三尸自去或下形如小兒狀以綿帛裹之拋東流水哭之三聲咒曰汝是地鬼我是天仙急急如律令迴歸易道慎勿反顧太上科儀以甲子日灑掃庭中以半夜時放案案上安新汲水三杯一東一中一西燒降真白膠乳頭香至心面北三位稱拜郡鄉里曾孫臣某稽首再拜長跪曰奉請上帝神人上皇真人北極三臺君南鬥北斗中鬥東鬥西鬥君司命司錄司非司危君中宮戊己金紫金老君日元君三光四時五行五相尊神天師六甲父母願垂玄感降臨坐席即伏存思諸神來降定訖乃起再拜曰諸神永降去身中三尸九蟲令臣某學道登仙長生度世伏受神恩言訖長跪願諸神明日君月夫人乞賜神水降臣某頭中屍彭倨便取東杯水飲畢又言諸神明日君月夫人乞賜神水降臣某腹中屍彭質便取中央杯水飲畢又言諸神明日君月夫人乞賜神水降臣某足中屍彭矯便取西杯水飲之飲訖再拜畢上回入室寢當自有夢應見人啼泣謝去或不啼泣但謝而去者皆是驗也若無驗應即後甲子再拜為之應乃止夫覺與陽合寐與陰並覺多即魂強寐多則魄壯魂強為生之途魄壯為死之路常須拘制之上魂名爽靈字浮游中魂名胎光字合明下魂名幽精字黨形魂欲上天魄欲入泉魂魄還觀其道自然生隨魂死隨魄魂好外沈但虛心任氣五神無媱役自然神真契道矣太微靈書曰每月初三日十三日二十三日夕三魂離其身當須攝之法去枕仰眠交足左壓右交手心上瞑目閉氣三息存心中赤氣和雞從心內出上咽中相次覺體小熱則呼三魂名叩齒微呼爽靈延年貽光益祿幽精絕死三呼訖即微呼叩齒三通曰太微元宮中黃始清內煉三魂三神交寧神寶玉室與我俱生不得妄動監者天靈若欲飛行唯詣上清欲不飢渴自飲玉津每月晦朔弦望七魄不守尤須作意制之叩齒七通一呼之女即十四通呼之屍荀伏矢雀陰天賊飛毒除穢魄師呼訖咒曰太上高尊上皇至真萬神安顛七魂佩身不得越錯與惡為群長居室後俱化成仙永守身形保我得真遊行上宮同為黃賓夏禹去三尸方出聖濟總錄木香柏子香松香蘹香子各一兩上用木臼杵為末蜜丸瓷器收淨室存神安住之處燒之合時向壬方和之亦可服安神妙香丸出聖濟總錄慎固腸胃不生飢渴守煉五臟消滅九蟲綿永胎息丹砂半兩研如粉松脂三兩煉十次取一兩半鶴蝨人參白茯苓去黑皮狗脊去毛貫眾研如粉各半兩蠟二兩蜜煉乳香研如粉禹餘糧燒三度研如粉各一兩上各搗研為末取十五日合和先入蜜蠟松脂三味於銚子內化為汁和八味丸之如皂子大至誠祝曰願闢除穀氣咽息沖和便用糯米一升杏仁二合去皮尖雙仁細研白蠟一兩相和煮粥飽食一頓須臾服大豆一合熟者仍服藥一丸待十八日續更服一丸待三十四個月又服一丸即終身永無飢渴戒五辛色欲鹽醋等物若慮無力吃棗肉三七枚助之一月後更不服服時用乳香湯下渴即吃茯苓湯若要開食時吃葵菜湯一盞其藥自下收取用乳香水洗三五次於土坑內培三七日留待再服轉加靈效開食時煮淡面飯一小碗許合藥了用雲母粉收之金簡煎出聖濟總錄辟穀固氣卻滅三尸消蕩九蟲安和五臟鎮守三田輕身強志拘魂制魄延永胎根乳香四兩牛乳一斗銀石器中盛並乳香於重湯內煮旋旋燒牛乳汁以乳香化為度赤石脂半斤細研水飛過於紙箱內沙上滲干入夾絹袋盛於飯上炊九次每次出焙乾又炊以飯熟為度丹砂四兩研水飛過紙箱內盛焙乾秤蜜銀器盛重湯內熬以絹袋漉過秤取四兩上將蜜分作九分每一分拌乳香等入新竹筒中盛大者可三四枚盛了次用新桑白皮扎塞定筒中令密以黑豆大夾水拌鋪在大甑底坐竹筒次又以豆麥蓋覆過竹筒再蓋覆如法慢火炊一日三四次添水炊至夜取出筒傾藥出以瓷器盛了入焙籠內火焙一夜或未乾又焙令極干再取蜜一分拌藥令勻又以新桑白皮塞了再入水灑拌豆麥令勻又依前再炊一日如前用熱水灑三四次炊一日至夜依前取焙之如此九炊九焙放幹成煎每服抄一大匙許仍須先勻作一百二十服須先服藥床如要服藥床忌鹽醋如要治中風癱瘓半身不隨口眼喎斜語澀神昏者分作一百四十服亦須先服藥床住食藥床方出聖濟總錄白茯苓去黑皮一兩大麥面半斤桑根白皮三兩上同搗羅為末拌勻和作面劑煮作棋子大淡吃服此一斤四兩次服半月計面一秤藥計六十兩充為藥床半月後方得吃金簡煎金簡煎每用溫酒調服如日內飢即得服酒一盞或兩盞如渴即飲一兩盞溫水睡眠自在亡蟲丸出聖濟總錄去三尸紫菀去苗土醋煮熟焙半斤射干一錢白龍骨半兩上先將紫菀搗末次搗射干白龍骨和勻為散每日服一錢匕空心甘泉水調下呼三尸名即屍亡矣廣福延齡丹出聖濟總錄去三尸潔臟腑鎮七魄明耳目丹砂研如粉雄黃研如粉人參白茯苓去黑皮各二兩白朮乳香研細各四兩上各搗研為末和勻入銀器中用白蜜和如稀膏以油單封口又以水和白麵裹器物外厚兩指許每日於飯上炊候飯熟取下如此半月如藥干更入蜜和丸如梧桐子大空心溫酒下二十丸忌羊血其功甚大神仙苣蕂丸出聖濟總錄輕身壯陽卻老還童去三尸下九蟲除萬病苣蕂酒浸一宿九蒸九焙牛膝酒浸切焙巴戟天去心天門冬去心焙山芋熟地黃焙柳桂去粗皮酸棗仁覆盆子遠志去心菟絲子酒浸另搗焙乾菊花人參白茯苓去黑皮各一兩上揀擇淨搗羅為末煉蜜為丸如梧桐子大每日空心溫酒下二十丸服一月身輕體健萬病不侵青丸子返童散出聖濟總錄輕身延年除百病去三尸天門冬去心焙人參白茯苓去黑皮麥門冬去心焙白菊花各六兩上搗羅為散每日溫酒或米飲調下三錢匕不拘時候服之三年覺身輕神仙雄黃丸出聖濟總錄去三尸百蟲美顏色明耳目雄黃松脂各等分上擇雄黃如雞冠色不雜砂石者先搗研羅極細次以松脂和杵為丸如彈子大每旦以酒研下一丸服至十日腹中三尸百蟲自下面上紫黑皆除服及一月百病自瘥耳目聰明久服致神仙切勿借與人衣服皮履損人藥力精氣常欲飛去常須淨潔為佳神仙出三尸方出聖惠方附子二兩炮治去皮臍蕪荑三升乾漆二兩搗碎炒令煙出上搗細羅為散每服一合空心以水調服午晚再服七日上屍九日中屍十二日下屍並出其形似人綿袋裹之送於東流水哭之祝曰子死屬地我當昇天與子長隔易道而歸更勿回顧三日之中當慎少語又方出聖惠方白茯苓十斤去皮曬乾搗羅為末商陸白者五斤削去皮細切與茯苓同用酒浸糯米麵五斤糯米五斗淨淘炊為飯候冷令與上三味相合上等分入水五斗並釀於甕中封三七日藥成壓取汁別用黑豆熬搗羅為末煉蜜和丸如彈子大每日用藥汁一合化破一丸服之十日以上漸加如雞子黃大上屍百日中屍六十日下屍三十日悉皆爛出上黑名彭倨中青名彭質下白名彭矯此蟲與身俱生能與三業常欲人速死至晦朔且伺人罪過上白天公上屍好車馬衣服中屍好五味飲食下屍好色欲三尸若去人皆不思不飢長生不老神仙去三尸方出聖惠方熟乾地黃三兩乾漆半兩搗碎炒令煙出桂心一兩上搗羅為末煉蜜和丸如梧桐子大飯後水服七丸以知為度十日三尸盡出矣神仙去三尸方出聖惠方用硃砂五兩細研水飛過以好酒五合漬之五宿出曝乾俟可丸即丸如麻子大每服十丸水下日三三十日諸蟲悉下若有病癩皆愈神仙去三尸方出聖惠方凡砂一斤細研水飛過淳漆二升醋一斤上相和入於鐺中微火煎令可丸即丸如麻子大每日早晨以淨水下五丸三十日百病愈三尸去服之百日肌骨強服之千日司命削去死籍與天地相保改形易體變化無常日中無影去三蟲丸方出