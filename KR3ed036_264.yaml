氣力加倍飲麻仁汁轉不渴滋潤五臟若待吃食時分用葵菜子三合為末煎湯放冷食之取其藥如後初間吃三五日白米稀粥湯少少吃三日後諸般食飯無所避忌此藥大忌欲事茯苓餅子出儒門事親書白茯苓四兩為末頭白麵二兩上同調成煎餅面稀稠以黃蠟代油爆成煎餅蠟可用三兩飽食一頓便絕食至三日覺難受三日後氣力漸生熟果芝麻湯米飲涼水微用些小以潤腸胃無令涸竭開食時用葵菜湯並米飲稀粥少少服之保命丹出儒門事親書人參五兩麻子仁三兩去皮乾地黃栝蔞子炒菟絲子酒浸以上各二兩生地黃干大棗各三兩大豆黃一升煮去沫黑附子一兩生用二兩炮去皮白茯苓茯神地骨皮去粗皮蔓菁子煮熟杏仁去皮尖煎麥門冬炒去心用地膚子蒸七次黍米作粉粳米作粉白糯米作粉天門冬去心車前子蒸側柏葉煮二次以上各二兩半上同搗為細末各揀選精粹者臘月內合者妙他時不可日月交蝕不可合如合時須揀好日淨室焚香志心修合勿令雞犬婦人見又將藥末同蠟一斤半濾去滓白蜜一斤共二斤半一處熔開和勻入臼中杵二千下微火薰用酥油丸如梧桐子大每服十丸服至五日如來日服藥隔宿先吃糯米飯一頓粳米白麵皆可次日空心用糯米粥飲送下如路上行人服遇好食吃不妨要止便止如吃些小蒸餅爛嚼咽或乾果子以助藥力不吃更妙忌鹽醋日後退下藥來於長流水中洗淨再服可百年不飢辟穀方出肘後方若遇荒年穀貴無以充飢應須藥濟命用粳米一斗酒三升浸之出曝之又漬酒止取稍食之渴飲之闢三十日足一斛三升闢周年又方用麻子一升白羊脂七兩蠟一兩白蜜一合和杵蒸食不飢絕谷昇仙不食方一名松子丸出聖惠方益精補腦久服延年不老百歲以上顏色更少令人身輕悅澤松實去皮菊花各等分上搗末以煉了松脂和丸如梧桐子大或煉蜜為丸每服十丸酒下日三服可至二十丸亦可作散服二錢匕空心日午近晚服神效神仙凝雪膏方出聖惠方白茯苓三十六斤銼水煮一日松子仁十二斤松脂二十四斤煉了者上搗羅為末以白蜜二石四升納銅器釜中微火煎之一日一夜次第下藥攪令相得微火養之七日七夜止可丸即丸如櫻桃大食前酒服七丸日三服若欲絕谷頓服取飽即不飢輕身明目老者返少久服成仙矣忌食米醋等苣蕂丸出聖惠方神仙延年輕身苣蕂一斗二升去黑皮白茯苓半斤澤瀉二兩上搗細羅為散每服一合水調服之日二服令人輕身長生久服絕谷神仙服苣蕂絕谷不食方出聖惠方令人顏色悅澤氣力百倍時人命盡我獨身存秋冬不寒春夏不熱百病立愈可得神仙苣蕂二斗黑豆五升炒去黑皮上搗細羅為散每服五錢以漿水調下日三服無所忌亦可煉蜜和丸如彈子大每服一丸以漿水化破服之日三服漸至不飢顏色美好若渴但飲水勿食他物若食他物即便飢矣真人絕谷餌苣蕂方出聖惠方除痹益精補髓壯氣力用苣蕂一石揀擇令淨上甑蒸令氣遍下曝令乾如此九遍搗羅為末煉蜜和丸如彈子大每服一丸以溫酒化破服之日三服食谷者自然斷之百日病愈水洗不著身服之一年玉女侍衛一石苣蕂加茯苓二斤合搗羅為末以蜜和如上法服得力益甚漸至不渴不飢神仙秘之神仙服芍藥絕谷方出聖惠方以大豆五斗淘淨入甑熟炊三次大麻子三斗湯浸一宿漉出亦蒸三次曬乾後焙過便以輕圓木杖竿破篩取仁用之上件先將大豆為末以下麻仁搗令勻丸如拳大再入甑內從初更著火蒸至半夜子時住火寅時出甑曬乾午時杵為末服之以飽為度不得食一切物第一頓七日不飢第二頓四十九日不飢第三頓一百日不飢第四頓二千四百日不飢不問貴賤老少依法服食令耳目聰明氣體強壯容貌日增永不憔悴如渴即研大麻子漿飲轉滋臟腑若要開食用葵菜子三合杵末煎之冷服取下元藥如金色任餐諸物並無所損冬不寒夏不熱顏色光澤氣力百倍走及奔馬一方有青州大棗若遇荒年穀貴無以充糧應須藥濟命者出肘後方取稻米一斗淘沐之百蒸百曝搗日一餐以水得三十日都止則可終食不食日行三百里防飢備急固胃神方出衛生家寶方得之於圓通石壁間炒黑豆三十粒嚼至半爛繼以青松毛一把咀嚼自然物類相感津潤無滓人久食稀膳初服似乎不喜五七頓後氣味甘香平定軍在大行山中心苦遺火饑饉相仍又失耕種死者十七八王屋隱者教山中人此法全活甚眾有病腰腳者服之即愈久餌氣健不衰有益無損如要飲食不妨若無食服服並無悔又如渴飲少冷水熱湯易飢此方乃真人秘法愍念群生遭饑饉厄運故傳世間此方至簡至易二藥在處皆有凶年荒歲可廣其傳妙香丸出余居士選奇方休糧絕食白膠香乳香硃砂雄黃蠟茯苓各等分上共搗為細末煉蜜為丸如彈子大臨服之時飽食麵一腹然後服此藥可永停食身輕力健氣血愈壯避難渴食方出余居士選奇方白麵六兩黃蠟三兩白膠香上杵將面冷水煉令熟如打面同然後為丸如黑豆大用日曬乾再將蠟熔成汁了將丸子投入內打令勻候冷彈子裹放在淨處如服時每日早晨空心可服三五十丸冷水嚥下不得熱食如若食物任意不妨絕谷昇仙不食法出肘後方取松實搗為膏酒調下三錢日三則不飢渴則飲水勿食他物百日身輕日行五百里抱朴子云出肘後方漢成帝時獵者於終南山見一人無衣服身皆生黑毛跳坑越澗如飛乃密伺其所在合圍取得乃是一婦人問之言我是秦之宮人東賊至秦王出奔驚走入山飢無所食迫欲餓死有一老公教我吃松柏葉實初時苦澀後稍便吃遂不復飢冬不寒夏不熱此女是秦人至成帝時三百餘載也神仙辟穀法上以胡麻白大豆棗三物九蒸九曝作丸食令人不飢延年斷谷神仙辟穀法出聖便良方松脂研杏仁去皮尖炒為末棗肉焙乾為末茯苓去皮為末蠟熔如藥水上五味各等分合成丸如梧桐子大食後飢服五十丸便不飢功效甚多穀子煎法出十便良方取赤熟穀子絞汁煎如稠飴可用和丹砂如無穀子穀皮濃汁亦可和丹砂忌一切魚肉陳宿生冷蒜尤忌生血物及見生血物主不飢令健行出本草方以鉤栗子食之不飢耐寒出本草方取蕢麻汁煮粥食之令人不飢出本草方以蓮子熟去心為末蠟和丸日服二十丸潤五臟長年不飢出本草方用甘露水飲之延年不飢出本草方用繁露水作盤收之煎令稠食之是秋露繁濃時輕身不飢方出本草方取黃精根食之昔臨川有士人虐其使婢婢乃逃入山中久之見野草枝葉可愛即拔取根葉食之甚美自是常食久而遂不飢輕健夜息大樹下聞草中動以為虎懼而上樹避之及曉下平地其身欻然凌空而去或自一峰之頂若飛鳥焉後數歲其家人採薪見之告其主使捕之不得一日遇絕壁下以綱三面圍之俄然騰上山頂其主異之或曰此婢安有仙骨不過靈藥服食遂以酒饌五味香美置往來之路觀其食否果來食訖遂不能遠去擒之具述其故指所食之草即黃精也不飢方出本草方以術食之抱朴子云南陽文氏值亂逃蟲山中飢困欲食有一人教之食術遂不飢數十年乃還鄉里顏色更少氣力轉勝輕身斷谷出本草方以桃膠用桑灰漬之服輕身有光明在晦夜之地數月斷谷斷谷長生出本草方以胡麻九蒸九曝熬搗餌之斷谷充飢令人不飢出本草用青粱米以純苦酒一斗漬之三日出百蒸百曝裹好藏之遠行一餐十日不飢重餐四百五十日不飢止飢出本草方以天門冬蒸曝去心皮食之甚甘美仙家斷谷方出本草方用芡實蒸作粉蜜和食之可休糧絕谷長生出本草方以救藭草食之止飢方出本草方以旋花根食之不飢令人不飢出本草方主荒年食之取牛奶妳中粉食之如葛根斷谷出本草方以松葉細切如粟以水及面飲服之厚腸胃令人不飢出本草方以鳧芡化粉食之令人不飢出本草方以狼尾草子作黍食之令人不飢耐老益氣出本草方以麻子二升大豆一升炒令香搗末蜜丸日二服辟穀方出本草方取檀樹皮和榆白皮食之濟飢神仙辟穀法以立春後庚子日溫蔓菁汁合家大小並服不限多少可理時疾闢暑丹出聖惠方雄黃白石脂磁石曲灘中石丹砂上各等分各研水飛過候乾同研令勻以煉成白松脂和丸如梧桐子大每日空心以溫水下五丸服六十日後夏月可以衣裘欲不畏寒方用天門冬茯苓各等分為末服方寸匕日再服大寒單衣汗出
