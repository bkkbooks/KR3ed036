body:
  text: 卷二百五十八食治門食治霍亂附論夫陰陽不順清濁相干氣射中焦名為霍亂也皆為飽食豚膾復啖乳酪海陸百品無所不餐多飲寒漿眠臥冷席風冷之氣傷於脾胃中諸食結而不消陰陽二氣壅而乖戾陽氣欲升陰氣欲降陰陽交錯變成吐利而已百脈昏亂榮衛俱虛冷搏於筋則令轉筋宜以食治之也方訶黎勒粥方治霍亂不止心胸煩悶訶黎勒皮半兩生薑一兩切粳米二合上以水三大盞煎訶黎等取汁二盞去滓下米煮粥不計時候食之高良薑粥方治霍亂吐利腹痛等疾高良薑一兩銼粳米二合上以水三大盞煎良薑取二盞半去滓下米煮粥食之蠟粥方治霍亂後氣脫虛羸或瀉不止黃蠟半兩粳米三合細研上先以水煮粳米作粥臨熟次下蠟更煮臨蠟清溫服之食治五噎附論夫五噎者一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎由陰陽不和三焦隔絶津液不利氣不調理之所致也此皆憂恚嗔恐氣結在於心胸不得通交是以成噎宜食治之也方烏雌雞切面羹方治五噎飲食不下胸中結寒瘦弱無力烏雌雞半隻制如食法白麵四兩桑根白皮三分末赤茯苓三分末桂心末一分上三味末入面中以水煮桑根白皮湯溶面切入鍋中煮熟與雞肉調和一如常法食之羊肉索餅方治五噎胸膈妨塞飲食不下瘦弱無力羊肉四兩炒作臛白麵半斤生薑一合陳橘皮一分湯浸去白焙上以橘皮末及生薑汁和麵作索餅於豉汁中煮熟入臛食之良黃雌雞臛索餅方治五噎飲食不下胸膈妨塞瘦弱無力黃雌雞一隻去毛腸炒作臛白麵半斤桂心末二分赤茯苓一分末上以桂心等面和末作索餅於豉汁中煮入臛食之治氣噎方蜜半斤酥三兩生薑汁一合上相和以微火煎如稀餳每於酒中調一匙服之或空食亦佳桂心粥方治胸膈痰氣壅結食飲不下如似鯁噎桂心三分赤茯苓一兩桑根白皮二兩上細銼以水三大盞煎至二大盞半去滓下粳米二合煮作粥食之治噎病不下食方舂杵頭細糠半合白麵四兩上相和溶作餛飩於豉中煮食之治噎不下食方用崖蜜每於粥中化半匙食之又方用老牛噍味如棗許大置稀粥中飲之終身不噎矣勿令患人知食治反胃嘔吐食治煩熱附論夫煩熱者由陰陽更虛陰氣偏少陽氣暴勝故也亦有風熱相搏風毒攻心煩躁昏憒狂言失志宜食治之方生地黃粥方治心膈虛燥煩渴不多飲食小便赤澀生地黃一合生薑汁半合蜜一合粳米二合淡竹瀝二合上將水煮粥熟下地黃薑汁煮令熟次下蜜並竹瀝攪轉食後良久或臨臥食藕實羹方治煩熱去渴補中養神益氣除百疾令人心神娛暢藕實三兩新嫩者甜瓜皮四兩切蓴菜四兩切上以豉汁相和作羹調和食之雞子羹方治心下煩熱止渴雞子三枚蓴菜一斤半淡竹筍四兩去皮切上以豉汁相和作羹臨熟破雞子投入羹中食之黑豆羹方治癰毒攻心煩躁恍惚黑豆三合淡竹葉五十片枸杞莖葉五兩切上以水二大盞煮二味取一大盞去滓下枸杞葉煮熟入五味作羹放溫食之寒水石粥方治心下煩熱多渴恍惚寒水石二兩搗碎粳米一合牛蒡根四兩切上以水四大盞煎至二盞半去滓下米煮粥食之茯神粥方出聖惠方治心胸結氣煩熱或渴狂言驚悸茯神一兩羚羊角屑半兩粳米二合上搗細羅為面與米同煮為粥食之藿葉根方出聖惠方治氣壅煩熱或渴藿葉一斤切蔥白一握切上以豉汁中煮調和作羹食之滑石粥方出聖惠方治膈上煩熱多渴通利九竅滑石二兩碎粳米二合上以水三大盞煎滑石至二盞去滓下米煮粥溫食之酸棗仁粥方出聖惠方治心臟煩躁不得睡臥酸棗仁一兩搗為末粳米二合上煮米作粥臨熟下酸棗仁末半兩攪勻食之玉屑飯方出聖惠方治胸中伏熱心煩躁悶口乾氣逆粱米飯一盞緑豆四兩研上將飯散粉拌令勻入湯內煮令熟用豉汁和食之菘菜羹方出聖惠方通利腸胃除胸中煩熱解酒毒用菘菜二斤煮作羹淡食之作薤食亦妙葛粉粥方出聖惠方治胸中煩熱或渴心燥葛粉四兩粟米半升上以水浸粟米經宿來日漉出與葛粉同拌令勻煮粥食之食治久新咳嗽附論夫五臟六腑皆有嗽而肺最多然肺居四臟之上外合皮毛皮毛喜受風冷故肺獨易為嗽也寒氣客於肺則肺寒上氣喘急汗出胸滿喉鳴多痰唾面目浮腫故謂肺嗽也肝嗽者其狀左脅下痛甚則不能轉側心嗽者其狀嗽而心痛喉中介介如梗狀甚則咽腫脾嗽者其狀右脅痛陰陰引於肩背甚則不可轉動動則嗽劇腎嗽者其狀腰背相引痛甚則咳逆此皆由風寒冷熱所傷或飲食不節所致宜以食治之也方灌藕方出聖惠方益心潤肺治胸膈煩燥除咳嗽生藕五挺大者生百合二兩生薯蕷三兩白茯苓三兩末棗三七枚去皮核生天門冬三兩去心細切面四兩牛乳二升蜜六合上將百合薯蕷天門冬爛研加蜜更取細次入棗肉次入茯苓次又先以酥微炒蔥入粳米二合用水依尋常煮粥令稍稀空心服未瘥更作黃牛乳亦可豆蔻粥方出聖濟總録治傷寒後脾胃虛冷嘔吐逆不下食肉豆蔻去殼一枚別作末粳米淨洗二合上先將粳米如常煮作稀粥後下肉豆蔻末攪勻頓服食治虛損羸瘦附論夫血氣者所以榮養身也虛損之人精液痿竭氣血虛弱不能充盛肌膚故令人羸瘦宜以飲食補益也方灌腸方出聖惠方治虛損羸瘦精痿不能飲食宜吃大羊腸一條雀兒胸前肉三兩細切肉蓯蓉半兩細切酒浸附子末一錢乾薑末一錢菟絲子末二錢胡椒末一錢漢椒末一錢糯米二合雞子白三枚上將肉米並藥末和拌令勻入羊腸內令實系腸頭煮令熟稍冷切作餡子空心食之羊腎饆饠方出聖惠方治下焦虛損羸瘦腰膝疼重或多小便羊腎兩對去脂膜細切附子半兩炮裂去皮臍搗羅為末乾薑一分炮製搗末肉蓯蓉一兩酒浸一宿刮去粗皮搗末胡椒一錢搗末面三兩大棗七枚煮熟去皮核研為膏上將藥並棗及腎等拌和為饆饠餡溲麵作饆饠以數重濕紙裹於糠火中煨令紙焦藥熟空腹食之良久宜食三兩茶匙溫水飲壓之藥肉粥方出聖惠方治虛損羸瘦駐顏色或女人産後虛羸等疾羊肉二斤當歸銼微炒白芍藥熟乾地黃黃耆各半兩生薑一分切粳米三合上以精肉留四兩細切餘一斤十二兩先以水五升並藥煎取汁三升去滓下米煮粥欲熟入生肉更煮令熟用五味調和空心食之雀兒藥粥方出聖惠方治下元虛損陽氣衰弱筋骨不健雀兒十枚剝去皮毛銼碎菟絲子一兩酒浸二宿爆干別搗末覆盆子五味子枸杞子各一兩粳米酒各二合上搗羅為末將雀肉先以酒燒入水二大盞次下米煮粥欲熟下藥末五錢攪轉入五味調和令勻更煮熟空心食之耆婆湯方出聖惠方主大虛風冷羸弱無顏色酥一斤生薑汁一合薤白三握去須切酒三升蜜一升熟油一升川椒三合去目閉口者微炒胡麻仁一升研爛橙葉二握豉一升糖一升上先以酒浸一宿絞去滓納酒入銀器中次入酥蜜油糖薑汁等煎令沸下椒橙葉胡麻慢火煎候薤白黃赤色即濾去滓收瓷盒中每日空心燒服一合豬肚方出聖惠方補虛羸乏氣力肥大豬肚一枚淨洗如食法人參二兩去蘆頭乾薑一兩炮製銼椒半兩去目及閉口者炊去汗蔥白七莖去須粳米三合一作白粱米上搗篩入米合和相得納豬肚中縫合勿令泄氣以水五升入鐺內微火煮令爛熟空腹食之次暖酒一中盞飲之一方兼下少飯白蜜煎丸出聖惠方補虛羸瘦弱乏氣力白蜜二升臘月豬肪一升去膜胡麻油半升微熟熟乾地黃末一升上合和以銀器中重湯令可丸丸之丸如梧桐子大每服以溫酒下三十丸日三服稍加以效為度久服令人肥充好顏色煎豬肪方出聖惠方治大虛羸困極宜服用豬肪下中者半斤入蔥白一莖於銚子內煎令蔥黃即止候冷暖如人體空腹須食之令盡暖臥覆蓋至日晡後乃食白粥稀糜過三日後更宜服羊肝羹方羊肝一具去筋膜細切羊脊膂肉二條細切面一兩枸杞根五斤銼以水一十五升煮取四升去滓上用枸杞根汁煎羊肝等令爛入豉一中盞蔥白七莖切以五味調和作羹服空腹飽食之後三日續食如上法羊脊羹方治下元久冷及骨蒸羸瘦不下食白羊脊骨一具全者捶碎羊髓一兩碎之羊腎一對上用粱米一合水四升煎骨熟入羊腎一對再煎候熟取去濾過將腎切入蔥白五味如常羹食下米作粥亦可骨汁煮索餅方出聖惠方治虛損羸瘦下焦虛冷眼昏耳聾大羊尾骨一條以水五大盞煮取汁二盞半蔥白七莖去須切陳橘皮一兩湯浸去白瓤荊芥一握面三兩羊肉四兩細切上都用骨汁煮五七沸去滓用汁少許溲麵作索餅卻於汁中與羊肉煮入五味空腹食之羊肉粥方出聖惠方治虛損羸瘦助陽壯筋骨羊肉二斤黃耆一兩銼人參一兩去蘆頭白茯苓一兩棗五枚粳米二合上先將肉去脂皮取精者納留四兩細切餘一斤十二兩以水五大盞並黃耆等煎取汁三盞等去滓入米煮粥臨熟時下切了生肉更煮入五味調和空心食之黃耆粥方出聖惠方治虛損瘦弱益氣力除腸風黃耆三兩銼人參一兩去蘆頭白茯苓一兩生薑半兩白粱米三合桑根白皮一兩銼上細銼和勻每用藥二兩以水三大盞入棗五枚煎取一盞去滓下米煮粥空腹食之蓯蓉粥方出聖惠方治久積虛冷陽氣衰微白羊肉四兩切肉蓯蓉水洗切一兩粳米三合鹿角膠炒燥三分蔥白切七莖雞子二枚上以五味汁中煮粥臨熟下膠雞子空腹食之羊腎粥方出聖惠方治虛損羸瘦羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去粗皮切薤白七莖去須切蔥白三莖去須切粳米一合上先將羊腎及蓯蓉入少酒炒後入水二大盞半入米煮之欲熟次下蔥白薤白煮作粥入五味調和空腹食之羊脊骨粥方出聖惠方治虛損羸瘦乏力益精氣羊連尾脊骨一握肉蓯蓉一兩酒浸一宿刮去粗皮菟絲子一分酒浸三日曝乾別搗末蔥白三莖去須切粳米三合上銼碎脊骨水九大盞煎至三大盞去滓將骨汁入米並蓯蓉等煮粥熟入蔥五味調和候熟即入菟絲子末及酒二合攪轉空腹食之蓯蓉羊腎粥方出聖濟總録治腎勞風虛面色黃黑鬢髮焦乾肉蓯蓉酒洗去土一兩半羊腎一具去脂膜細切羚羊屑屑二兩磁石燒赤醋碎搗爛薏苡仁各三兩上羊腎磁石薏苡仁外銼細為三服每服水二升半煎至二升去滓下磁石薏苡仁各一兩半腎一具煮粥空心任意食之羊腎羹方出聖惠方治羸瘦虛損陽氣衰弱腰疼無力乃令人肥健白羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去粗皮切蔥白二莖去須切羊肺三兩切上並於豉中煮入五味作羹空腹食之黃雌雞粥方出聖惠方治虛損益氣壯筋骨去膀胱積冷補腎氣黃雌雞一隻未同年者制之如法以水五升煮取汁一升杏仁十枚湯浸去皮尖雙仁熟乾地黃三兩銼碎與杏仁同研用酒三合研絞取汁粳米三合上每用雞汁二大盞半和米煮粥欲熟下地黃杏仁等更煮令熟空心食之肉蓯蓉臛方出聖濟總録治臟腑虛損四肢乏弱不欲飲食肉蓯蓉一兩酒浸一宿刮去粗皮切蔥白三莖去須切糯米糝一兩羊肉三兩上將蓯蓉羊肉細挼和米糝及蔥都依尋常煮法作羹著鹽醋椒醬五味調和空腹食之豬肚糜方出聖濟總録治虛損豬肚腎各一具去脂膜人參三分麥門冬三分去心地骨白皮三兩上除肚腎外細銼用綿裹與肚腎同入水一斗煮熟棄藥取肚腎肉汁中入蔥白一莖細切粳米一升用微火煮熟隨意飲汁食肉補藥羊肝方出聖惠方羊肝細切一具羊脊膂肉細切一條陳曲末三兩枸杞根五兩切以水一斗二升煮取九升去滓上以枸杞根汁重煎令沸次入肝肉曲末並蔥豉汁調和漸煎如稠分作三分空腹食之枸杞羹方出聖濟總録治羸瘦虛勞枸杞一斤羊腎一對切羊肉三兩切蔥白七莖切上以五味汁煮作臛空腹食之豬腎羹方出聖濟總録治諸虛羸益氣豬腎一對切枸杞葉一斤切蔥白十四莖切豬脊膂一條去脂膜切上以五味汁作羹空腹食之雀兒粥方出聖惠方治臟腑虛損羸瘦陽氣乏弱雀兒五隻治如食法細切粟米一合蔥白三莖切上以炒肉同粟米入酒一合用水二大盞半煮作粥欲熟下蔥白五味等候熟空心食之椒腎羹方出聖惠方治下焦虛損久冷漢椒二十粒去目及閉口者酒浸一宿白麵三兩羊腎一對去脂膜細切上取椒面納拌勻熱水中下並羊腎煮熟入五味調和作羹空腹食之雞子索餅方出聖惠方治虛損羸瘦令人肥白光澤白麵雞子各四兩白羊肉四兩炒作臛上以雞子清溲作索餅於豉汁中煮令熟入五味臛空腹食之人參煮羊肉法出聖濟總録治勞補益人參一兩枸杞白皮三兩肉蓯蓉酒洗去土三分上細銼先以水三升浸藥經兩宿煎之去滓取汁一升細切蔥白一握鹽少許同羊肉半斤豉一合於藥汁中和勻入羊肚肉蓯蓉五更初煮至平旦細切食之至飽不盡續食之補腎羹方出聖濟總録治勞虛損精氣絶竭羊腎一對去脂切蔥白一分切生薑一分切上細切羊腎入五味蔥姜如常法作羹食之食紫菊法出聖濟總録治虛勞補益用正月以後五月以前採黃花紫莖菊葉食之九月採花陰乾搗末酒粥羹任意食之澤瀉羹方出聖濟總録治虛勞補益用生澤瀉花葉切五兩以水三升煮至一升半去滓下羊肚蔥豉等於汁中煮香熟任意食之老羊肚佳薏苡餅方出聖濟總録治虛勞補益用薏苡仁熟水淘搗羅如作米粉法以棗肉乳汁拌和作團如蒸餅大依法蒸熟隨性食之夏月用粉不得留經宿恐酸壞一方用羊肉作羹常法用蔥豉等熟食之苣勝粥方出聖惠方治五臟虛瘦羸損益氣力堅筋骨填骨髓用苣勝子不限多少揀去雜蒸曝各九遍每取二合用湯浸布裹挼去皮再研水濾汁煎成飲著粳米煮作粥食之或煎濃飲澆索餅食之甚佳枸杞煎方出聖惠方有人頻遭重病虛羸不可平復宜服生枸杞根細銼一斗以水五升煮取一斗五升沉清白羊脊骨一具碎銼上以微火煎取五升去滓收瓷盒中每取一合酒一小盞合暖每於食前溫服食治五勞七傷附論夫人有五勞七傷一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞蓋五勞則傷於五臟也凡人憂愁思慮則傷心發燥而面無精光也形寒飲冷則傷肺氣促咳逆也恚怒氣逆上而不下則傷肝目暗筋骨攣痛也飲食勞倦則傷脾吐逆食少不成肌膚也久坐濕地強力入水則傷腎腰腳重疼行履不任也此則五勞證候也七傷者是傷五臟七神故也肝藏魂肺藏魄心藏神脾藏意與智腎藏精與志此為六神也且五臟以六神而為主主若無臟如人無室臟若無神如室無人以此比之六神可知也今言七傷者一曰陰衰二曰精清裡急三曰精少四曰精消陽事不與五曰小便苦數囊下濕癢六曰胸脅苦痛也七曰陰寒兩脛厥此皆臟腑虛損表裡受敵肌虛筋骨不榮故曰五勞七傷之病也宜以食調適之方藥餅方出聖惠方治五勞七傷下焦虛冷小便遺精宜食啖健腰腎壯陽道附子一兩炮裂去皮臍神麯三兩炒乾薑一兩炮製銼肉蓯蓉一兩半酒浸一宿刮去皮炙乾桂心五味子菟絲子酒浸三日曝乾搗為末各一兩白麵一升黃牛乳一升半羊髓三兩棗二十枚煮去皮核漢椒半兩去目及閉口者微炒去汁酥二兩蜜四兩上搗羅為散入面與酥蜜髓乳相和入棗釀熟溲於盆中蓋復勿令通風氣半日久即將出更溲令熟浣作糊大面以上以箸子璲之即入爐𨫼中上下以火餺令熟每日空腹食一次入酵和麵更佳釀豬肚方出聖惠方治五勞七傷羸瘦虛乏獖豬肚一枚洗淨去脂人參一兩去蘆頭杏仁一兩去皮尖研白茯苓一兩陳橘皮半兩湯浸去白瓤焙乾薑一分炮製蕪荑漢椒去目及閉口者微炒去汗蒔蘿胡椒各一兩黃牛酥一兩糯米五合淘淅看肚大小臨時加減大棗二十一枚去核切上搗羅為末每用藥一兩入酥棗杏仁米等相和令勻入肚內以麻線縫合即於甑內蒸令熟切作塊空心漸漸食之藥髓餅子方出聖惠方治五勞七傷腎氣虛弱腰腳疼痛小便遺瀝乾薑一分炮裂銼漢椒半兩去目及閉口者微炒去汗桂心一分附子一兩炮裂去皮訶黎勒一分煨用皮縮砂半兩去皮作末蜜一合棗一百枚去核擘羊脊骨髓五兩白麵二斤黃牛酥三兩上搗細羅為面入諸物同和餡分為八分以溲麵包裹如常作髓餅入爐上下著火爆則須徹里過熱氣日空腹食之一次覺腰腎及膀胱暖則止羊腎羹方出聖惠方治五勞七傷髓氣竭絶羊腎一對去脂膜切肉蓯蓉一兩酒浸一宿刮去粗皮生薯蕷一兩羊髓一兩薤白一握去須切蔥白半兩去須切粳米一合上炒羊腎及髓等欲熟下米並豉汁中五大盞次下蓯蓉更入生薑鹽等各少許煮成羹食之蘹香角子方出聖惠方治五勞七傷陰陽氣乏蘹香子木香巴戟附子炮裂去皮臍山茱萸各一兩豬腎一對去脂膜細切漢椒去目閉口者微炒出汗上搗為末每對豬腎用藥末二錢入鹽溲麵像角子樣修制炭火內煨令熟薄茶空腹食之羊腎羹方治五勞七傷腎氣不足羊腎一具去脂膜切羊肉三兩嫩枸杞葉細切一升蔥白三莖去須切粳米五兩生薑切三分上先炒腎及肉蔥白生薑欲熟下水二大盞半入枸杞葉次下米五味等煎作羹食之羊髓粥方出聖惠方治五勞七傷補虛強志益氣羊髓三合羊腎一對去脂膜切細蔥白三莖去須切生薑半兩切粳米一合肉蓯蓉酒浸一宿刮去粗皮二兩上以炒腎及蔥姜欲熟入水二大盞半次入米五味等煮作粥食之蔥豉粥方出聖惠方治五勞七傷體熱喘急四肢煩疼香豉三合蔥白切半升羊髓一兩鹽花半兩薄荷三十莖上以水三盞先煎蔥白四物十餘沸下豉汁更煎五七沸去豉入米二合煮為粥空腹溫服之豬腎粥方出聖惠方治五勞七傷乍寒乍熱背膊煩疼羸瘦無力豬腎一對去脂膜切生地黃四兩切蔥白一握去須切生薑半兩切粳米一合上豬腎煮及蔥白欲熟者下豉汁五大盞入生薑地黃及米煎作粥食之黃雞粥方出聖惠方治五勞七傷益下元壯氣每服經月餘肌肉充盛老成少年宜服黃雌雞一隻去毛羽腸臟肉蓯蓉一兩酒浸一宿刮去粗皮切生薯蕷一兩切阿魏少許煉過粳米二合淘入上先將雞煮爛擘去骨汁下米及雞肉蓯蓉等都煮粥入五味空心食之肉蓯蓉粥方出聖惠方治五勞七傷久積虛冷陽事都絶肉蓯蓉二兩酒浸一宿刮去粗細皮鹿角膠半兩搗碎炒令黃燥為末粳米二合羊肉四兩細切上煮羊肉蓯蓉粳米作粥臨熟下鹿角膠末以鹽醋五味調和作兩頓食之蘿藦菜粥方出聖惠方治五勞七傷陰囊下濕癢蘿藦菜半斤羊腎一對去脂膜切粳米二合上以細切煮粥調和如常法空腹食之羊腎粥方出聖惠方治五勞七傷羸瘦陽氣不足心神虛煩白羊腎一對去脂膜切羊髓二兩白粳米二合上相和煮作粥入鹽椒空腹食之鹿腎粥方出聖惠方治五勞七傷陽氣衰弱益氣力鹿腎一對去脂膜細切肉蓯蓉二兩酒浸一宿刮去粗皮切粳米二合上以水二大盞煮米作粥熟下鹿角膠蓯蓉及蔥白鹽椒食之枸杞粥方出聖惠方治五勞七傷庶事衰弱枸杞半斤切粳米二合上以豉汁相和煮作粥以五味蔥白等調和食之雞肝粥方出聖惠方治五勞七傷陰痿虛弱雄雞肝一具細切菟絲子末半兩粟米二合上以水一大盞半入五味及蔥煮作粥空心食之豬腎羹方出聖惠方治五勞七傷陰痿羸瘦精髓並竭四肢少力豬腎一對去脂膜切枸杞葉半斤切上用豉汁二大盞半相和煮作粥羹入鹽醋椒蔥空腹食之牛腎粥方出聖惠方治五勞七傷陰痿氣乏牛腎一對去脂膜筋切陽起石四兩布裹粳米二合上以水五大盞煮陽起石取二盞去滓石下米及腎五味蔥白等煮作粥空腹食之煮羊頭蹄方出聖惠方補五勞七傷虛損白羊頭蹄一具草火燒令黃色刮去灰塵胡椒半兩蓽茇半兩乾薑半兩蔥白切半升豉半升上以水先煮頭蹄半熟納藥更煮令爛去骨空腹適性食之日食一具滿七日具即止禁生冷醋滑五辛陳臭豬雞等七日治風胎瘦病五勞七傷心虛驚悸用白羊頭一枚燖如食法煮令極熟切於豉汁中五味調和食之食治骨蒸勞附論夫骨蒸之病而多異名為療皆同一體丈夫以精神為宗婦人以血氣為本起於腎虛所致故云陰氣不足陽必湊之血氣不榮骨髓枯竭腎主於骨以先從骨熱故曰骨蒸又大都此病起於無端不問老少男女皆染斯病嬰孩之流傳注更甚其狀心胸煩滿骨節疼痛頰赤口乾或寒或熱四肢無力毛髮乾焦咳嗽頭疼精神昏悶多臥少起夢與鬼交驚悸不安時時盜汗毒氣傳及五臟日漸羸瘦宜以食治之方杏仁粥方出聖惠方治骨蒸煩熱咳嗽杏仁半兩浸洗去皮尖雙仁水研取汁生地黃三兩研取汁生薑一分研取汁蜜半匙粳米二合酥半兩上先以水煮作粥次入杏仁等藥粥煮令熟不計時候食之牛膝葉羹方出聖惠方治骨蒸勞熱背膊煩疼口乾壯熱四肢無力牛膝葉四兩龍葵菜地黃葉各四兩生薑半兩豉一合半上先以水五大盞先煎姜豉取汁二大盞半去姜豉下牛膝葉等煮作羹入少鹽醋調和食之地黃葉豬腎羹方出聖惠方治骨蒸勞瘦乍寒乍熱背膊煩疼及瘦弱無力生地黃葉四兩切豬腎二枚去脂膜切豆豉一合蔥白三莖去須切生薑一分切上先以水二大盞煎豉等取汁一大盞半去滓入地黃葉等納汁中煮更煎加鹽醋米同作羹食之枸杞葉根方出聖惠方治骨蒸勞肩背煩疼頭痛不能下食枸杞葉五兩青蒿葉一兩蔥白一握去須切豉一合上先以水三大盞煎豉取汁一盞五分去豉下枸杞葉等煮作羹調和食之地黃粥方出聖惠方治骨蒸勞瘦日發寒熱咳嗽唾血生地黃汁三合粳米一合酥半兩上以水一大盞先煮米欲熟入地黃汁次下酥候下酥熟溫溫食之蔥豉粥方出聖惠方治骨蒸勞煩熱咳嗽四肢疼痛時發寒熱豉一合蔥白一握去須切粳米二合上以水二大盞半煮蔥豉取汁一盞半絞去蔥豉入米煮粥不計時候食之酒煮鰻鱺魚方出聖惠方治骨蒸勞瘦及腸風下蟲用鰻鱺魚二斤治之如法銼作段子入鐺內以酒三大盞熟煮入鹽醋食之酸棗仁粥方出聖惠方治骨蒸心煩不得眠臥用酸棗仁二兩以水二大盞半研濾取汁以米二合煮作粥候臨熟入地黃汁一合更微煮過不計時候食之食治補益虛損於諸肉中蒸煮石英及取汁作食治附論夫石性至剛猛烈而能榮養陰陽逐氣祛風悅澤顏色但服餌有法殊切常令則煮煉取其精華調品成其法膳可安臟腑用補虛羸者耳方豬肚煮石英法出聖惠方治虛損凡人年四十以下服二大兩四十五十乃至六十以上加二兩常用四月以後服之候接秋氣石力下溫其臟補益腰腎得力終無發動白石英二兩以生絹袋盛都縫合人參一兩去蘆頭生地黃二兩切生薑一兩切蔥白七莖切豉半兩羊肉半兩切豬肚一枚淨洗粳米一合川椒四十九粒去目及閉口者上藥及石英袋並納豬肚中急系口勿使泄氣以水一斗煮至二升即停出藥肚著盤內使冷然後破之去石英袋訖取肚及汁將作羹服之每年三五度服每服石英依舊余藥換之分數一依初法釀豬肚方出聖惠方治虛損不足令人肥白悅顏色豬肚一枚淨洗白石英一兩搗碎生地黃切一合饙飯半兩紫石英一兩捶碎與白石英同線裹川椒三十粒去目及閉口者微炒去汗搗末蔥白三莖去須切鹽少許上拌和諸藥等內豬肚中以麻線縫定蒸令爛熟取出石英細切任性食之三石豬腎羹方出聖惠方治腎氣不足陽道衰弱紫石英白石英磁石捶碎淘去赤汁各三兩豬腎二對去脂膜切肉蓯蓉二兩酒浸一宿刮去粗皮切枸杞半斤切上捶三石碎布裹先以水五大盞煮石取二盞半去石著豬腎蓯蓉枸杞鹽醋醬五味末等作羹空腹食之三石水煮粥方出聖惠方治陰痿囊下濕或有瘡虛乏無力紫石英白石英各四兩磁石八兩捶碎淘去赤汁上捶三石碎布裹以水五大盞煮取二盞去石下米三合作粥食之其石每日煎用之經三個月即換之服牛乳方出聖惠方補虛益氣牛乳五升蓽茇末一兩上入銀器中以水三升和乳合煎取三升後收瓷盒中每於食前暖一小盞服之羊肉中蒸石英服餌法出聖惠方治虛損不足用精羊肉一斤白石英三兩肉切作兩段鑽作孔納石英著肉中還相合即用荷葉裹又將蠟紙裹又將布裹於二鬥米中蒸之候熟即出肉去卻石英後取肉細切和蔥椒姜等作罨肉空心食之石英水煮粥法治腎氣虛損陰痿周痹風濕肢節中疼痛不可持物白石英二十兩磁石二十兩並捶碎上以水二斗器中浸於露地安置夜即揭蓋令得星月氣每日取水作羹煮粥煎茶湯吃皆用之用卻一升即添一升服經一年諸風並瘥氣力強盛顏如童子蔥豉湯出聖濟總録治服乳石因食倉米臭肉發動者蔥白一握切豉一合上以水二升煎至升半去滓作常服豉湯服可五六劑瘥煨羊腎方出聖惠方治虛損腳膝無力陽氣不盛補益羊腎一對鍾乳粉一分上取羊腎切去脂膜分為四片摻粉令勻卻合用濕紙裹煨令熟空腹食之效白石英粥方出聖濟總録治石發用白石英五斤搗篩細研三日一乳牛十歲以上方養犢而形瘦者每日稱一兩石英末拌豆與食經七日即可取乳每朝空腹熱飲一升余者作粥任意食之百無所忌五月上旬起良如急要用亦不拘此牛糞糞地種菜供服乳人食甚佳一方研末和牛糞糞地種枸杞牛膝豆菜等食之益人服乳石後將慎紫餺飥方出聖濟總録用好烏豆任多少煮取濃汁以代水入少鹽和麵依常法作餺飥還向此豆汁中熱煮可三七沸溢則添豆汁勿令無水熟即出之任意以豬羊肉緑豆等臛澆食之或作冷淘食亦得和山芋作餺飥益佳麵餅方出聖濟總録治乳石發動用新大麥為面和肉汁作餅食之大麥面作柳葉條為羹亦佳又大麥和黑豆相拌熟蒸任意食春夏服良冒熱遠行將大麥作餅食之壓石堅肌油麵餺飥方出聖惠方補虛勞生胡麻油一升淅粳米泔清一斤上以微火煎盡泔清乃止出貯之取冷鹽湯二合將和麵作餺飥煮令熟入五味食之益腎氣強陽道出本草用白羊肉半斤去脂膜切作片以蒜齏共食之三日一度甚妙令人長脂肉肥白出本草用猯肉和五味煮食之食治心腹痛附論夫心腹者由寒客於臟腑之間與氣血相搏隨氣上下攻擊心腹而痛臟氣虛邪氣勝停積成病故令心腹痛也宜食治之方蓽茇粥方出聖惠方治心中冷氣往往刺痛腹脹氣滿蓽茇胡椒乾薑炮製銼檳榔以上各一分桂心一分粟米三合上搗羅為末以水二大盞米煮粥候熟入藥末三錢攪令勻每日空腹食之桃仁粥方出聖惠方治邪氣攻心腹痛桃仁二十一枚去皮尖生地黃一兩桂心半兩末粳米三合細研生薑一分並地黃桃仁以酒三合研絞取汁上先用水煮米作粥次下桃仁等汁更熟調入桂心末空腹食之高良薑粥方出聖惠方治心腹冷氣往往結痛或遇風寒及吃生冷即痛發動高良薑半兩粳米二合陳橘皮半兩湯浸去白上以水三大盞煎高良薑陳橘皮取汁一盞半去滓投米煮粥空腹食之蓽茇粥方出聖濟總録治心腹冷氣㽲痛妨脹不能食蓽茇胡椒各一兩桂去粗皮三分上搗羅為面每服三錢鹽水一碗半入蔥一握豉半合先煮蔥豉熟去滓次下米三合煮粥將熟入前藥末同煮少頃空腹食之高良薑粥方出聖濟總録治心腹積冷結痛高良薑搗為末半兩白米三合上先以水二大升煎高良薑取一升半去滓下米煮熟入五味調和空腹食之吳茱萸粥方出聖濟總録治心腹冷氣沖脅肋痛吳茱萸水浸去涎焙乾炒搗末半兩上先用水二升下米入蔥豉同煮熟後下茱萸末一分並鹽少許空腹食之桃仁粥方治冷氣心腹痛妨悶及治咳嗽氣喘桃仁去皮尖雙仁搗以水一升研取汁粳米三大合上以桃仁汁煮粥空腹食之紫蘇子粥方治冷氣心腹痛妨脹不能下食紫蘇子一合微炒桂心末二錢上搗碎紫蘇子以水二大盞絞濾取汁入米二合煮粥候熟入桂末食之椒面粥方治久患冷氣心腹結痛嘔吐不能下食蜀椒去目及閉口者一分炒出汗浸一宿焙乾末之白麵三兩上將椒末於面內拌勻於豉汁中煮令熟空腹食之食治腰腳疼痛附論夫腰腳痛者由腎氣不足受風邪之所為也勞傷則腎虛虛則受於風冷與真氣交爭於腰腳疼痛宜以食治之也方食羊蜜方治虛勞腰痛咳嗽肺痿骨蒸熟羊脂熟牛髓白蜜熟豬脂各五兩生薑汁五兩生地黃汁五兩上將豬羊脂煎一沸次下牛髓又煎一沸次下白蜜生薑地黃汁微火煎不住手攪膏成貯密器中每服一匙許空腹溫酒調下羹粥中服之亦得若食素者以酥代脂髓加麥門冬汁若不能食或多風者加白朮羊臟藥方治虛勞腰腳痛羊肝肚腎心肺各一具湯洗細切胡椒蓽茇各一兩豉一合牛酥一兩蔥白一握細切上先以五味相和以水七升慢火煎取五升去滓和羊肝等並汁皆納羊肚中系肚口別用絹袋盛之煮熟乘熱出切肚食之漸漸服盡藥汁羊腎餛飩方治腎氣虛損腰腳疼痛五味子山茱萸乾薑炮製川椒去目及閉口者微炒去汗桂心各一兩上搗細羅為面每日取羊腎一對去脂膜細切入散兩錢木臼納杵如泥作餡用和麵捻作餛飩以水煮熟和汁食之羊脊骨羹方治腎氣虛冷腰腳疼痛轉動不得羊脊骨一具捶碎以水一升煎取五升羊腎一對去脂膜切羊肉二兩細切蔥白五莖去須粟米二兩上炒腎肉斷血即入薑蔥五味然後添骨汁入米重煮成羹空腹食之豉酒方治下焦風濕腰腳疼痛行履無力豉二合薤白一握切洗去滑附子半兩炮裂去皮臍杵末川椒五十枚去目及閉口上相和炒至薤熟投於三升酒中更煎四五沸每取一小盞攪粥食之豬腎粥方治腎氣虛勞損腰膝疼行動無力豬腎去脂膜切一對米三合蔥姜各少許上以豉汁一升半煮粥入五味並酒調和如常法空腹食之又枸杞羊腎粥方治陽氣衰弱腰腳疼痛五勞七傷枸杞葉一斤羊腎一對細切米三合蔥白十莖上細切加五味煮粥如常法空腹食之羊脊骨羹方治腎臟風冷腰腳疼痛轉動不得羊脊骨一具捶碎蔥白四莖去須切粳米四合上以水七大盞煎骨取汁四大盞漉去骨每取汁二大盞入米二合及蔥椒鹽醬作羹空腹食之豬肚炙方治下焦風冷腰腳疼痛轉動不得豬肚一枚湯洗酒一升附子半兩炮裂去皮臍杵末上以椒蔥鹽醬並酒附子末拌和煮亦作肉炙熟空腹食之兼飲酒一兩盞勿令過度生地黃雞方治腰背痛骨髓虛不能久立身重氣乏盜汗少食時復吐利生地黃八兩飴糖五兩烏雞一隻上先將雞去皮毛及腸臟細切地黃與糖相和納雞腹中銅器貯之復置甑中蒸飯熟藥成取食之勿用鹽醋食肉盡即飲銅器中藥汁桂心酒粥方治腎臟虛冷腰腳疼痛不可忍桂心半兩末好酒一升上暖酒和桂心末空腹分為二度攪粥食之梅實仁粥方治腰腳疼痛不可轉側梅實仁半兩研令細米二合上煮米令半熟即下梅實仁相和攪令勻候熟空腹食之婆羅粥方治腎臟風冷腰腳疼痛牛膝一兩去苗銼碎酒浸一兩宿白麵四兩上將牛膝於面中拌作婆羅粥煮熟十沸漉出則以熟水淘過空腹頓食之白羊腎羹方治久積虛損陽道衰弱腰腳無力白羊腎一對去脂膜切肉蓯蓉酒浸細切一兩上相和入蔥白鹽醬椒煮作羹如常法空腹食食治脾胃氣弱不下食附論夫脾胃者位居中宮象夫土也土生萬物四藏皆主其氣故云人之虛者補之以味味以行氣氣以實志言滋形潤神必歸於食莊子云納滋味百節肥焉脾養肌肉脾胃氣弱即不能消化五穀氣弱虛則腸鳴泄痢既多則諸臟氣竭肌肉消瘦百病輻湊宜以飲食和益脾胃之氣滋潤臟腑養於經脈祛疾之甚可謂上醫故千金云凡欲治病先以食療比食療不愈後乃用藥耳方釀羊肚方治脾胃氣弱不能下食宜食羊肚一枚治如常法羊肉一斤細切食茱萸半斤末人參去蘆頭一兩搗末陳橘皮一兩湯浸去白瓤焙胡椒一分末肉豆蔻一枚去湯用末乾薑半兩末生薑一兩切蔥白二十莖切粳米五合淘鹽末半兩上取諸藥末拌和肉米蔥鹽等納羊肚中以粗線系合勿令泄氣蒸令極熟分三四度空腹食之和少醬醋無妨羊肝饆饠方治脾胃氣弱不能飲食四肢羸瘦白羊肝一具去筋脂切細肉豆蔻一枚去殼末乾薑一分炮製末食茱萸一分末蕪荑仁二分末蓽茇一錢末薤白切一合上先炒肝薤欲熟入豆蔻等末鹽湯溲麵作饆饠爐里爆熟每日空腹食一兩枚極效蓴羹方治胃氣弱不下食四肢無力漸羸瘦蓴菜鯽魚紙裹燒熟去鱗切各四兩陳橘皮湯浸去白生薑各一兩蔥白十四莖破羊骨一斤熬汁去骨上先將五味就羊骨汁中作羹空腹食之豆蔻撥刀方治脾胃氣弱食即吐嘔逆草豆蔻仁二枚煨高良薑細銼半兩生薑汁二合羊肉炒臛四兩面四兩上入面溲和干即便入黃牛乳調看稀稠得所灌入藕中逐竅令滿即於甑中蒸熟每飯後或臨臥時少少食之鹿髓煎方出聖惠方治缺鹿髓半兩蜜三合酥三合生地黃汁四合杏仁三兩桃仁三兩用杏仁各湯浸去皮尖雙仁研碎以酒浸絞取汁一升上煎地黃杏仁桃仁等汁鹿髓酥蜜煎如稀餳收瓷盒中每取一匙攪粥半盞不計時候食之杏仁粥方出聖惠方治肺氣療虛羸喘息促急咳嗽等杏仁二十一枚湯浸去皮尖雙仁研碎以三合黃牛乳絞取汁棗七枚去核粳米二合桑根白皮二兩銼生薑一分切上以水三大盞先煎桑根白皮棗姜等取汁二盞將米煮粥臨熟入杏仁汁更熟五七沸不計時候食之藥棗方出聖惠方治積年咳嗽不瘥棗七枚擘破酥一雞子大莨菪一錢水淘二次上鐺中炒令酥盡去莨菪取棗去皮食之良日三五服一方無莨菪藥餅方出聖濟總録治多年肺氣咳嗽羊子肝一具去筋膜四片麝香末二錢膩粉一錢上和麵裹燒熟空腹食之時以冷水更換浸兩手良久即住來日早晨轉下惡物有蟲如頭髮相似為驗豬𦚟方出聖惠方治上氣咳嗽胸膈妨滿氣喘豬𦚟細切一具生地黃搗破六兩餳四兩上先以炒豬𦚟即下地黃薑蔥鹽豉候熟下湯以瓷器盛每日吃半盞許食豬腎方出聖濟總録治久咳嗽不瘥豬腎二具每具上作十四孔蜀椒去目及閉口者二十八粒納腎孔中上以濕紙裹煨令勻熟去椒細嚼食之豬𦚟酒方出聖惠方治肺氣咳嗽上氣久不瘥豬𦚟細切二具大棗去皮核三十枚上以無灰酒三升同浸秋冬七日春夏三日布濾去滓隨意溫服杏仁餳粥方出聖惠方治上氣咳嗽稀餳三合杏仁二兩湯浸去皮尖雙仁熬研成膏上相和得所每取一匙攪粥半盞不計時候食之又方出聖惠方生薑汁五合沙糖五兩上煎令相和每服一匙攪粥半盞不計時候食之醍醐方出聖惠方治一切肺病咳嗽濃血不止用真酥不拘多少煉三次取醍醐每服一合瘥中風皮膚瘙癢溫酒調服治咳嗽久不瘥出聖濟總録用豬𦚟一具薄切入竹筒於煻火中炮令極熟食後吃之治勞瘦溫中補不足咳嗽出本草用蘿蔔和羊肉鯽魚煮食之食治眼痛附論夫目者肝之官血藏於肝榮養於目肝臟勞傷血氣俱虛不能榮養於目故目暗也若風熱之氣在於臟腑虛實不調故上衝於目則令赤痛久不能瘥變生膚翳者眼睛上有物如蠅翅是也宜以食治之方竹葉粥方出聖惠方治膈上風熱頭目赤痛目視䀮䀮竹葉五十片洗淨石膏三兩沙糖二兩淅粳米二兩上以水三大盞煎石膏等三味取二盞去滓澄清用煮粥熟入沙糖食之豬肝羹方出聖惠方治肝臟虛弱遠視無力補肝豬肝一具細切去筋膜蔥白一握去須切雞子三枚上以豉汁中作羹臨熟打破雞子投在內食之蔓荊子粥方出聖惠方補中明目利小便蔓荊子二合粳米三合上搗碎入水二大盞絞濾取汁著米煮粥空心食之蓮實粥方出聖惠方益耳目聰明補中強志嫩蓮實半兩去皮細切粳米三合上先煮蓮實令熟次以粳米作粥候熟入蓮實攪勻熱食之蒼耳子粥方出聖惠方治目暗耳鳴蒼耳子半兩粳米半兩上搗蒼耳子爛以水二升絞濾取汁和米煮粥食之或作散煎服亦佳青羊肝方出聖惠方用青羊肝一具細切水煮漉干以鹽醬醋調和食之立效又方出聖惠方用蔥子半升炒熟搗細羅為散每服一匙以水二盞煎取一盞去滓下米煮粥食之馬齒實拌蔥豉粥方出聖惠方治青盲白翳明目除邪氣利大腸去寒熱用馬齒實一斤搗為末每服一匙煮蔥豉粥和攪食之馬齒菜作羹粥吃並明目極佳烏雞肝粥方出聖惠方治肝臟風虛眼暗用烏雞肝一具細切以豉汁中和米作羹粥食之以效為度兔肝粥方出聖惠方治目暗青盲明目用兔肝一具細切以豉汁中作粥空腹食之以效為度梔子仁粥方出聖惠方治熱發眼赤澀痛用梔子仁一兩搗為末為四分每服用米三合煮粥臨熟時下梔子末一分攪勻食之雞頭實粥方出聖惠方益精氣強志意聰利耳目用雞頭實三合煮令熟去殼研如膏入粳米一合煮粥空腹食之食治耳鳴聾附論夫耳鳴耳聾者腎為足少陰之經而藏精其氣通於耳耳宗脈之所聚若精氣調和則腎氣強盛五音分明若勞傷血氣兼受風邪損於腎臟而精氣脫則耳聾也血氣不足宗脈則虛風邪乘虛隨入耳中與氣相擊則為耳鳴也方豬腎粥方出聖惠方治腎臟氣憊耳聾獖豬腎一對去脂膜切蔥白二莖去須切人參一分去蘆頭末防風一分去蘆頭末粳米二合薤白七莖去須切上將藥末並米蔥薤白著水下鍋中煮候粥臨熟撥開中心下腎莫攪動慢火更煮久入五味空腹食之羊腎羹方出聖惠方治耳聾耳鳴羊腎去筋膜細切一對生山芋去皮四兩蔥白一握擘破生薑細切一分上作羹如常法食之空腹飲菖蒲羹方出聖濟總録治耳聾耳鳴如風水聲菖蒲米泔浸一宿銼焙二兩豬腎去脂膜筋細切一對蔥白一握擘破米淘三合上以水三升半煮菖蒲取汁二升半去滓入豬腎蔥白及五味作羹如常法空腹食之人參粥方出聖濟總録治耳聾耳虛鳴人參末一合防風去蘆為末一分磁石搗碎綿裹二兩豬腎去脂膜細切一對上先將磁石於銀器中以水一斗煮取三升入豬腎及粳米五合如常法煮粥候熟入煎二味更煮數沸空腹服磁石羊腎粥方出聖濟總録治耳聾養腎臟強骨氣益精髓除煩熱磁石半斤搗碎淘三次綿裹置器中羊腎一對去脂膜研爛米三合上用水五升先煮磁石取汁二升去磁石下羊腎及米煮粥臨熟入酒一合調和如常法空腹食之豬腎羹方出聖濟總録治耳聾耳鳴如風水聲豬腎去筋膜細切一對蜀椒去目及合口炒出汗三十粒陳橘皮洗切半分上用五味汁作羹空腹服鹿腎粥方出聖惠方治耳聾補腎氣鹿腎一對去脂膜研爛米三合上於豉汁中五味調和煮粥如常法空腹食之磁石腎羹方出聖惠方治久患耳聾養腎臟強骨氣磁石一斤搗碎水淘去赤汁綿裹豬腎一對去脂膜細切上以水五升煮磁石取二升去磁石投腎調和以蔥豉姜椒作羹空腹服之作粥及入酒並得磁石常用煎之白鵝膏粥方出聖惠方治五臟氣壅耳聾白鵝脂二兩粳米三合上和煮粥調以五味蔥豉空腹食之烏雞脂粥方出聖惠方治耳聾久不瘥烏雞脂一兩粳米三合上相和煮粥入五味調和空腹食之烏雞脂和酒飲亦佳鯉魚腦髓粥方出聖惠方治耳聾不瘥鯉魚腦髓二兩粳米三合上煮粥以五味調和空腹食之乾柿粥方出聖惠方治耳聾及鼻不聞香乾柿三枚細切粳米三合上於豉汁中煮粥空腹食之食治三痟附論夫痟渴者有三般一者痟渴二者痟中三者痟腎若飲水多者小便又少名曰痟渴若吃食多不甚渴小便數消瘦名曰痟中若渴飲水不絶甚者腿膝瘦弱小便數者有脂液名曰痟腎此蓋由積久嗜食鹹物炙肉飲酒過度皆成痟渴然大寒凝海惟酒不冰明其酒性酷熱物無以喻如此之味酒徒耽嗜不離其口酣醉以後制不由己飲啖無度加以醋醬不擇酸鹹積年長夜酣飲不休遂使三焦猛熱五臟乾燥木石猶且焦枯如何人能不渴治之愈不愈屬在病者若能如方節慎旬日而瘳不自保惜死不旋踵方雖效驗其如不慎者何其所慎者有三一酒二房三鹹食熱面能慎此者雖不服藥自可無他不如此者縱使金丹玉粒亦不可救矣良可悲夫宜深思之今以飲食調治以助藥力也方羊肺羹方治三痟小便數羊肺一具治如食法精羊肉五兩切粳米半合蔥白五莖生薑少許鹽醋各少許上相和依常法作羹飽食之治痟渴飲水不止方黃丹三分栝蔞根一兩末蔥白一握切白麵五兩薤白一握切上黃丹等末水和麵溲餺飥先煮蔥薤白令爛熟即納餺飥煮之令熟即並汁食之羊骨湯方治痟渴羊脊骨一具連喉者豉白粟各一升薤白切一把上各分作兩處煮每度用水六升煮至三升去滓渴即溫汁量意飲之以瘥為度杏酪粥方治三痟心熱氣逆不下食煎成濃杏酪一升黃牛乳一升大麥二合研令細滑上依常法煮粥食之入餳沙糖和之更大美也藕實羹方治痟渴煩躁狂言目眩藕實去皮半斤薄荷一握蓴菜半斤上於豉汁中作羹入五味食之煮兔方治痟渴神效兔一枚新桑根白皮半斤細銼上剝兔去皮及腸胃與桑白皮同煮爛熟為度盡力食肉並飲其汁即效麥豆方治痟渴大麥仁緑豆水浸退去皮各半斤上淘淨於星月下各貯一鐺中用水二升慢煮熟次取緑豆過麥仁鐺中同煮令爛並汁收在瓷瓶內渴即飲後仍吃三兩匙麥仁緑豆尤妙藕蜜漿方治消渴口乾心中煩熱散積血生藕去皮節切煉蜜各半斤上新汲水一升半化蜜令散納藕於蜜中浸半日許渴即量意食藕並餅栝蔞根羹方治痟渴口乾心神煩躁栝蔞根生嫩者各洗細切冬瓜去瓤細切各半斤上以水六升入鹽豉半升煎至五升去豉下前二味入醋作羹分三二度食之栝蔞粉方治痟渴用栝蔞根取削去皮於新瓷中磨訖以水淘生絹袋擺如造米粉法曝乾渴時冷水調下一錢服之大效二月三月八月九月造佳用田螺活者一升水一斗煮至二升不問食前後稍稍飲汁一方用田螺五升水一斗半浸經宿渴即飲汁每旦度易水並螺一方用米一合煮作粥食之鹽豉飲出聖惠方治痟渴用濃煎鹽豉汁停冷渴即飲之又方出聖濟總録用粟米炊飯頻食之佳又方出聖惠方用大麥仁炊飯或煮粥食之佳小麥亦得水淘食良又方出聖濟總録用青小豆淨淘煮粥食之和飲食亦得又方出聖惠方用牛乳飲一小盞馬乳亦得生飲令人利熱飲令人渴蒸鹿頭方治痟渴口乾用鹿頭一具治如食法蒸熟以醬醋食之黃雌雞粥方治痟渴口乾小便數用黃雌雞一隻治如食法爛煮取肉隨意食之其汁和豉作粥食之亦妙生蘿蔔粥方治痟渴發動無時飲水不足用蘿蔔五枚搗捩取汁一大盞攪粥作飲頻吃甚效野雞肉汁方治痟渴舌焦口乾小便數用野雞治如食法以水五大盞煮取三大盞渴即取汁飲之肉任性食緑豆汁方治痟渴小便如常用緑豆二升淨淘用水一斗煮爛研細澄濾取汁早晚食前各服一小盞如覺小便濃即瘥胡豆汁方治痟渴用胡豆二合煮取汁勿用鹽隨意食之粱米粥方治痟渴及吐血心悶用青粱米半升淨淘粳米亦得以水三升煮稀粥飲之以瘥為度爛研取泔飲之亦可葵齏汁方治痟渴心悶用葵一束洗湯內略煮過別煮粟米汁如淹虀法候熟渴即飲汁以瘥為度地黃花粥方治痟渴用地黃花陰乾搗羅為末每用粟米兩合淨淘煮粥候熟入末三錢攪勻更煮令沸任意食之
