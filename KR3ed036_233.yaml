裂去皮臍青橘皮湯浸去白焙阿魏面和作餅子炙熟硫黃研菖蒲牛膝酒浸切焙五味子等分上為末麵糊為丸如梧桐子大每服十五丸空心溫酒下鱉甲散治虛勞肩背疼悶心腹脹痛腸胃虛鳴臍下拘急鱉甲塗醋炙令微黃去裙襴柴胡去苗各一兩五錢京三稜一兩炮銼當歸一兩五錢赤芍藥人參去蘆頭白朮各一兩陳橘皮三分湯浸去白瓤焙大腹皮五錢上為散每服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服芎藭散治虛勞肩背及心腹疼痛或四肢不和腹胃脹滿芎藭一兩柴胡去苗一兩五錢桂心三分赤芍藥一兩白朮一兩大腹皮三分桃仁二十枚湯浸去皮尖雙仁麩炒微黃陳橘皮三分湯浸去白瓤焙木香三分上為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服木香散治虛勞心腹痛胃氣不和腹脅脹滿木香芎藭枳殼麩炒微黃去瓤桂心桃仁湯浸去皮尖雙仁麩炒微黃陳橘皮湯浸去白瓤焙赤芍藥人參去蘆頭檳榔各二一兩上為散每服三錢以水一中盞入生薑半分煎至六分去滓食前稍熱服補骨脂散治虛勞心腹疼痛補骨脂炒五錢牛膝酒浸切焙五錢沒藥研五錢乾薑炮陽起石研蘹香子炒白茯苓去黑皮山芋各一兩上為散每服一錢溫酒調下沉香散治虛勞心腹痛小腹滯悶沉香一兩五錢附子炮裂去皮臍檳榔肉桂去粗皮陳橘皮湯浸去白瓤焙蘹香子各一兩當歸丁香各五錢上為散每服食前以熱酒調下二錢楝實丸治虛勞心腹撮痛不思飲食補益元藏平和脾胃楝實炒白朮各一兩烏藥銼蘹香子微炒補骨脂水淘去浮者微炒木香各五錢厚朴去粗皮用生薑汁炙一兩上為末酒煮麵糊和丸如梧桐子大每服二十丸空心食前溫酒或鹽湯下日三服補骨脂丸治虛勞心腹撮痛補骨脂炒楝實麩炒去核各一兩高良薑微炒一兩五錢巴戟天去心一兩葫蘆巴五錢蘹香子麩炒一兩上為末酒煮麵糊為丸如梧桐子大每服二十丸酒下鹽湯下亦得食前服芍藥湯療虛勞腹中痛夢失精四肢痠痛手足煩熱咽乾口燥並婦人少腹痛芍藥六兩桂心甘草炙各三兩生薑四兩大棗十二枚擘飴糖一升上切以水九升煮取三升去滓下糖分服七合日三夜一忌海藻菘菜生蔥治虛勞心腹或臍下疼痛兼暖脾腎順氣思食出聖惠方乾漆一兩搗碎炒令煙出京三稜一兩炮銼蓬莪朮五錢煨青橘皮三分湯浸去白瓤焙桃仁湯浸去皮尖雙仁麩炒微黃桂心各一兩上為散每服食前以熱酒調下一錢桂附丸治虛勞下元久冷心腹疼痛不思飲食桂去粗皮一兩乾薑炮五錢蘹香子炒二兩附子炮裂去皮臍一兩硫黃研五錢上為末麵糊為丸如梧桐子大每服二十丸空心鹽湯下治虛勞心腹或臍下疼痛兼暖脾腎順氣思食出聖惠方青橘皮一兩湯浸去白瓤焙桂心一兩木香一兩桃仁湯浸去皮尖雙仁麩炒微黃一兩上為散每服食前以熱酒調下一錢白芷散治虛勞元臟虛冷心腹疼痛精神倦怠白芷炒五錢巴戟天去心一兩高良薑一錢上為散每服一錢豬腎一對去筋膜入藥末煨熟細嚼溫酒下
