body:
  text: 卷二百三十三虛勞門虛勞羸瘦附論夫虛勞羸瘦者五臟之氣傷損也經所謂一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑也三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床然治損之法奈何損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也虛勞羸瘦者是五臟六腑虛損之候也凡人耽嗜聲色貪味甘肥殊無撙節唯恣情性而又外觸風寒內傷氣血表裡受病陰陽相搏久而不瘳遂成羸瘵此皆冷熱血氣之所起五勞六極之候因茲有焉脾腎勞傷肌骨枯悴故成勞瘦之病也老小尫羸為血氣不足寒氣獨積於地炎氣獨散於天天地不交故體成否體成否則肌肉不潤腠理不通胸膈氣急腸胃招滿為陰氣衝陽陽不接也或膀胱堅積肢體沉疴為陽氣不能下營陰氣獨盛也致大腸留壅湯藥不下或水穀不消更加短氣若不利關格實不得其死也方補益甘草丸治虛勞羸瘦膝冷腰疼神思昏沉肢節無力少精乏氣睡臥多驚甘草炙微赤銼薯蕷遠志去心續斷桂心人參去蘆頭防風去蘆頭天雄炮裂去皮臍石斛去根銼茯神覆盆子車前子五味子鹿茸去毛塗酥炙微黃楮實水淘去浮者焙乾山茱萸蛇床子杜仲去皺皮炙微黃巴戟萆薢銼狗脊黃耆各二一兩銼牛膝一兩半去苗白龍腦五錢細研入肉蓯蓉酒浸一宿刮去皺皮炙令乾菟絲子酒浸三日曝乾另搗為末生乾地黃鍾乳粉各二兩澤瀉一兩上為末煉蜜和搗五七百杵丸如梧桐子大每服空心以溫酒下三十丸及晚食前再服補益鍾乳天雄丸治虛勞水臟久憊腰膝疼冷筋骨無力夢寐不安陽道劣弱面色萎黃飲食不得日漸羸瘦鍾乳粉天雄炮裂去皮臍巴戟各一兩五錢蘹香子肉蓯蓉酒浸一宿刮去粗皮炙令乾菟絲子酒浸三日曝乾另搗為末補骨脂木香天門冬去心焙續斷沉香石斛去根銼丁香山茱萸附子炮裂去皮臍肉桂去粗皮當歸麝香細研白朮人參去蘆頭仙靈脾薯蕷牛膝去苗厚朴去粗皮塗生薑汁炙令香熟熟乾地黃石龍芮各一兩磁石二兩燒令赤醋淬七次細研水飛過上為末煉蜜和搗五七百杵丸如梧桐子大每日空心以暖酒下三十丸臨臥時再服如不飲酒鹽湯下亦得羊腎丸出聖惠方治虛勞羸瘦補益骨髓肌膚羊腎二對去脂膜切破焙乾人參去蘆頭白茯苓白朮各一兩桂心熟乾地黃各三二兩肉蓯蓉酒浸一宿刮去皺皮炙乾當歸蛇床子各三分枳殼麩炒微黃去瓤薯蕷黃耆澤瀉山茱萸白芍藥吳茱萸湯浸七遍焙乾微炒菟絲子酒浸三日曝乾別搗為末鹿茸去毛塗酥炙微黃遠志去心附子炮裂去皮臍牡丹石斛去根銼牛膝去苗訶黎勒煨用皮各一兩五錢上為末煉蜜和搗三五百杵丸如梧桐子大每日空腹以暖酒下三十丸晚食前再服通命丸療虛勞百病七傷六極少氣羸弱不能飲食茯苓甘草炙杏仁去皮尖熬干天門冬去心芍藥大黃當歸乾薑人參各六分牛膝乾地黃各七分黃芩紫菀蓯蓉各五分阿膠炙桂心吳茱萸蜀椒出汗石斛各三分防風乾漆熬白朮各四分上搗篩以棗膏蜜相拌和作丸食前服七丸日三不知漸增以知為度病劇者夜更一服忌蕪荑鯉魚生蔥海藻松菜桃李雀肉鮓等物川椒丸出聖惠方治虛勞羸瘦食飲無味百節痠疼神思昏沉四肢無力宜服補益強元氣令人肥健川椒一兩去目及閉口者炒去汗白茯苓柏子仁芎藭人參去蘆頭桂心黃耆乾薑當歸山茱萸附子炮裂去皮臍枸杞子薯蕷各三分枳實五錢麩炒微黃牛膝去苗厚朴去粗皮塗生薑汁炙令香熟肉蓯蓉酒浸一宿刮去皺皮炙乾石斛去根銼熟乾地黃菟絲子酒浸三日焙乾別搗為末各一兩上為末煉蜜和搗三五百杵丸如梧桐子大每服空腹以溫酒下三十丸晚食前再服松子丸出聖惠方治虛勞百病絶傷羸瘦久服強筋骨長肌肉悅澤顏色延年不老松子去皮白茯苓一兩麥門冬去心焙柏子仁薯蕷枸杞子五味子官桂山茱萸覆盆子熟乾地黃澤瀉女貞實石南黃耆銼遠志去心各一兩肉蓯蓉二兩酒浸一宿刮去皺皮炙令乾石斛一兩五錢去根銼甘草半兩炙微赤銼杜仲一兩五錢去皺皮炙令黃上為末煉蜜和搗五七百杵丸如梧桐子大每服空心及晚食前溫酒下三十丸人參湯治虛勞羸瘦肌熱盜汗四肢少力不思飲食咳嗽多痰人參一分白茯苓去黑皮桂去粗皮紫菀各五錢去苗土木香一分青橘皮湯浸去白焙半兩桔梗赤芍藥五味子各一兩芎藭訶黎勒皮羌活去蘆頭當歸切焙各五錢防己一分秦艽去苗土五錢甘草炙銼鱉甲各一兩醋炙令焦黃柴胡五錢去苗地骨皮一兩上粗搗篩每服二錢入蔥白二寸生薑半分切碎同煎至半盞去滓入童子小便半盞再煎一兩沸每日食前溫服鍾乳粉丸治虛勞少氣羸瘦無力鍾乳粉熟乾地黃焙杜仲去粗皮銼炒續斷肉蓯蓉去皺皮酒浸切焙山茱萸桂去粗皮巴戟天去心牛膝酒浸切焙石斛去根覆盆子五味子附子炮裂去皮臍菟絲子酒浸一宿白檳榔煨銼蛇床子狗脊去毛山芋各三兩萆薢一兩五錢上為末煉蜜和丸如梧桐子大每服四十丸暖酒下空心食前服谷仙散治虛勞羸瘦目風淚出耳作蟬鳴口中乾燥飲食多嘔或時下痢腹中雷鳴陰下濕癢不能久立四肢煩疼石斛去根肉蓯蓉酒浸切焙杜仲去粗皮銼炒防風去叉萆薢菖蒲麥門冬去心焙白馬莖切焙菟絲子酒浸別搗遠志去心柏實續斷山芋蛇床子澤瀉細辛去苗葉天雄炮裂去皮臍上等分搗羅為散每服三錢匕溫酒調下巴戟丸出聖惠方治虛勞羸瘦下元冷憊腳膝無力風氣相攻巴戟菟絲子酒浸三日曝乾別搗為末石斛去根銼松子去皮桂心人參去蘆頭牛膝去苗羌活附子炮裂去皮臍白茯苓各一兩鍾乳粉雲母粉肉蓯蓉酒浸一宿刮去皺皮炙令乾熟乾地黃各二兩甘菊花五味子防風去蘆頭各三分上為末入研了藥同研令勻煉蜜和搗五七百杵丸如梧桐子大每服空心及晚食前以溫酒下三十丸補益煎治虛勞肌瘦腿膝無力不思飲食和益營衛駐顏補氣滋潤肌體及治療一切皮膚生瘡生地黃四斤生天門冬一斤生藕一斤生薑八兩以上四味銼碎用生絹袋絞取汁石斛去根鹿茸酥炙去毛菟絲子酒浸一宿搗成片子焙乾黃耆銼牛膝酒浸一宿焙乾柴胡去苗地骨皮人參白茯苓去黑皮桂去粗皮木香附子炮裂去皮臍各一兩上搗羅十二味為末先將前四味自然汁於銀石器內熬耗一半入好酒一斗又熬去一半入酥蜜各半斤同熬次入上件藥末於汁內用柳枝不住手攪直候匙上抄起為度於新瓷器內盛用蠟紙封口每日空心溫酒調下一匙山茱萸散一名五洛散治虛勞身體羸瘦寒熱時作咳嗽喘滿四肢無力百節痠疼盜汗心忪恍惚驚悸全不思食肉蓯蓉丸出聖惠方治虛勞羸瘦心神健忘腰膝多疼臟腑氣虛陽事衰絶肉蓯蓉二兩酒浸一宿刮去皺皮炙令乾菟絲子酒浸三日曝乾別杵為末薯蕷牛膝去苗巴戟杜仲去粗皮炙微黃續斷白茯苓枸杞子五味子蛇床子山茱萸各一兩遠志去心柏子仁茯神各二兩上為末煉蜜和搗五七百杵丸如梧桐子大每日空腹以溫酒下三十丸晚食前再服鱉甲丸治虛勞肌體羸瘦發熱減食四肢少力鱉甲醋炙令黃去裙襴柴胡去苗各一兩五錢人參白朮麥門冬去心焙訶黎勒皮黃耆銼五味子沉香赤芍藥茯神去木生乾地黃焙木香枳實去穰麩炒各一兩上為末煉蜜為丸如梧桐子大每日空心人參湯或粥飲下二十丸至三十丸日三當歸散治虛勞羸瘦面目黧黑四肢苦重短氣不思飲食當歸去蘆頭焙乾石斛去根天門冬去心焙菴䕡子地膚子肉蓯蓉酒洗去皺皮切干焙各一兩白蘞覆盆子甘草炙令赤銼五味子各三分桂去粗皮牛膝銼酒浸焙乾附子炮裂去皮臍各五錢石鐘乳煉成者一兩一分上為散每服三錢以溫酒入少熟蜜調下空心日午夜食後服之柴胡散治寒熱體瘦肢節疼痛口乾心煩柴胡黃耆赤茯苓白朮各一兩人參地骨皮枳殼炒桔梗桑白皮赤芍藥生乾地黃各七錢五分麥門冬三兩甘草五錢上㕮咀每服四錢薑三片水煎服豬肚黃連丸治勞瘦豬肚一具以童子小便一斗煮令爛細切研如泥黃連去須一兩一分柴胡去苗一兩五錢白朮一兩鱉甲醋浸炙令黃一兩五錢紫菀去苗土杏仁湯浸去皮尖雙仁生研各一兩五錢桂去粗皮陳橘皮去白瓤各一兩乾薑炮三分人參一兩一分蕪荑仁炒令香三分上除豬肚外搗羅為末入豬肚更搗一千杵即以煉蜜相和調勻得所丸如梧桐子大每日空腹溫酒下三十丸漸加至四十丸炙豬肝散治急勞羸瘦蒼朮去粗皮木香桂去粗皮附子炮裂去皮臍人參白茯苓去黑皮厚朴去粗皮塗生薑汁炙銼牛膝銼刮令乾芍藥鱉甲醋浸炙令黃當歸去蘆頭炙令乾切青橘皮去白焙上等分為散每服用獖豬肝一具細切如柳葉用藥一兩糝拌勻以慢火炙熟空腹放溫任意食之不過三服瘥黃耆湯療體虛少氣羸瘦不堪營衛不足善驚胸膈淡冷而客熱欲冷水飲食則必腹弦滿脾胃氣少不能消食或時衄血黃耆二兩附子一兩炮大棗十四枚甘草二兩炙蜀椒一兩炒出汗生薑六兩芍藥茯苓當歸各三二兩人參三兩黃芩桂心各二兩上切以水一斗煮取三升半去滓分五服日三夜二適寒溫忌海藻生蔥菘菜豬肉冷水大酢無比山藥丸出醫方集成療虛羸治諸虛百損五勞七傷肌體消瘦補下經起陰發陽能令陽氣入腦安魂定魄開三焦破積聚消五穀益精髓安臟腑除心中伏熱強筋骨輕身明目去冷除風無所不治補益極多常服最妙七十老人服之尚有非常功力一名萬安丸薯蕷二兩蓯蓉四兩酒浸牛膝酒浸菟絲子酒浸杜仲炒澤瀉巴戟天去心山茱萸赤石脂各二兩五味子十分乾地黃二三兩茯神二兩一方作茯苓上為末以蜜和丸如梧桐子大食前以酒下二十丸至三十丸日再夜一服無所忌唯禁醋大蒜蕪荑生蔥辛物服之七日令人健四體潤澤唇口赤手足暖面有光悅消食身體安和音聲清朗是其驗十日後日長肌肉其藥通中入腦鼻必痠疼不可怪若欲求大肥加敦煌石膏二兩若生性健忘加遠志一兩少津液加柏子仁一兩一月許即充足陰下濕癢加蛇床子一兩一方用蓯蓉末八兩酒熬膏和丸古今録驗有白馬莖二兩共一十六味石斛散出聖惠方治虛勞羸瘦不能飲食面色黃黑手足多冷石斛二三兩去根銼山茱萸一兩五味子五錢萆薢三分銼遠志去心桂心各五錢人參去蘆頭黃耆各一兩銼當歸白茯苓各三分肉蓯蓉酒浸一宿刮去皺皮炙令乾附子各一兩炮裂去皮臍上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服肉蓯蓉散出聖惠方治虛勞傷憊四肢羸瘦腰膝無力不能飲食肉蓯蓉酒浸一宿刮去皺皮炙令乾熟乾地黃石斛附子炮裂去皮臍黃耆銼白茯苓牛膝各一兩去苗防風去蘆頭人參去蘆頭白朮五味子桂心各五錢上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服人參散出聖惠方治虛勞羸瘦夜臥失精心神虛煩咽喉不利少思飲食人參一兩去蘆頭龍骨一兩五錢桑螵蛸一兩微炒熟乾地黃一兩五錢桂心三分黃耆銼茯神各一兩麥門冬一兩五錢去心焙甘草五錢炙微赤銼白朮三分肉蓯蓉一兩酒浸一宿刮去皺皮炙乾上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓每於食前溫服十補丸治虛勞羸瘦補益血氣壯筋骨暖水臟肉蓯蓉酒浸一宿切焙牛膝酒浸切焙菟絲子酒浸別搗山芋續斷山茱萸五味子柏子仁巴戟天去心遠志去心各一兩上為末酒煮麵糊為丸如梧桐子大每服十五丸食前溫酒或鹽湯下知母丸主瘦病及久癊黃等知母常山各三兩甘草炙大黃麻黃去節黃芩杏仁各二兩去皮尖熬蜀漆洗牡蠣各一兩熬上為末丸如梧桐子大空心服飲下七丸後心悶即吐是此病出候不吐更加兩丸忌海藻菘菜蔥菜酒面豬肉丹砂飲治瘦病不問久近治不瘥者丹砂研牛黃研麝香研龍腦研狗脊皂莢去皮子狼牙各五錢犀角屑一兩五錢檳榔二七枚並皮銼別搗上除檳榔別搗外八味搗研極細先以水三升漬檳榔並皮只煎取一升然後下諸藥末更煎取半升不去滓分作三服如人行七里再服利六七行自止煮漿水粥食之乾漆丸治虛勞羸瘦悅澤顏色益精補氣乾漆以醋炒令煙出三兩牛膝銼酒浸焙乾三分桂去粗皮甘草炙銼肉蓯蓉酒浸去皺皮切焙令乾菟絲子酒浸別搗蛇床子炒令香白朮各五錢上搗羅七味為末入菟絲子相合令勻煉蜜為丸如梧桐子大每服十五丸空腹服以溫酒下夜食後再服乾地黃丸治虛勞羸瘦虛損少氣令人肥白生乾地黃酒浸去土炙令乾二兩銼乾漆炒令煙出五錢白朮一分半桂去粗皮五錢甘草炙令赤銼一分五釐石鐘乳煉成者一分研酸棗仁微炒去皮別研柏子仁微炒別研各一分上除研藥外搗羅為末和勻煉蜜為丸如梧桐子大每日空腹溫酒下二十丸夜臥再服漸增之獺肝丸療瘦病每日面變色腳手痠疼口乾壯熱麥門冬散治虛勞羸瘦面體少色麥門冬去心焙石葦去毛五味子菟絲子酒浸一宿別搗白茯苓去黑皮生乾地黃焙各一兩桂去粗皮五錢上為散每服二錢空腹溫酒調下日午夜食後再服久服令人老壽身輕柴胡茯苓湯療腹脹瘦病不下食柴胡茯苓各一錢二分枳實炙白朮人參麥門冬去心生薑合皮切各六分上切以水六升煮取一升八合絞去滓分溫二三服服別相去七八里吃一服不利忌生冷油膩小豆黏食桃李醋物雀肉等六奇湯治虛勞羸瘦日久不瘥並心腹痞滿不思飲食柴胡去苗厚朴去粗皮生薑汁炙銼枳殼去穰麩炒五錢白茯苓去黑皮一兩白朮各五錢京三稜醋浸炮銼一兩上為散每服三錢水一盞入生薑半分切碎同煎至八分去滓空心溫服一方白朮五錢柴胡等五味各一兩安息香湯治虛勞瘦瘠不問新久安息香研五錢天靈蓋一片塗酥炙透青木香阿魏醋化去砂石入面作餅子焙甘草炙銼各一兩上為散每服三錢童子小便一盞半豉百粒蔥白三寸拍破同煎至七分去滓溫服良久或吐利下赤白色蟲或夜夢與人別此為效驗大腹飲治虛勞羸瘦咳嗽大腹並皮煨銼訶黎勒皮各二枚陳橘皮去白炒一分豬膽一枚桃白皮一兩上除膽外粗搗篩每服五錢以童子小便一盞半先浸一宿五更煎取五分去滓摘破膽攪和服不出三服愈地黃酒療虛羸令人充悅益氣力輕身明目天靈蓋湯療瘦病天靈蓋一大兩炙研麝香半兩桃仁一大抄去皮硃砂一兩五錢光明者好豉一大升乾者上為末搗和令勻每晨空腹以小便半升和散方寸匕以水煎服瘥止不利忌生血物五補丸治男子婦人虛勞羸瘦飲食減少困倦無力人參白茯苓去黑皮地骨皮熟乾地黃焙各一兩上為末煉蜜丸如梧桐子大每服三十丸溫酒下食後臨睡服一方有黃耆一兩名人參丸硃砂丸治虛勞羸瘦諸鬼氣惡注明目丸出仁存方治諸勞極瘦睡困兔屎四十九枚硇砂如兔屎大上二味研令極細生蜜丸麻子大每服七丸以生甘草五錢碎浸一夜取汁五更初服勿令病人知是治勞藥下後頻看若有蟲急打殺以桑火油煎使焦棄急水中三日不下更服須每月三日以後望前服之忌見喪服色衣婦人貓犬之類後服治勞補氣藥取瘥此藥最治熱勞又云傷寒煩躁骨熱皆治療瘦疾方用甘草三兩炙以小便煮三四沸頓服甚良忌海藻菘菜治虛勞羸瘦及素有勞根若作便發則身體百節皮膚無處不痛或熱筋急及治腰腎冷夢與人交接泄精者肘後方用白柘東南行根一尺刮去上皮取中間皮以燒屑亦可細切搗之以酒服三方寸匕厚覆取汗日三服無酒以漿服之白柘是柘之無刺者也一方煮汁服之黃連飲出淡寮方治骨節間熱積漸黃瘦用黃連一兩銼以童子小便一大升浸經宿微煮三四沸去滓服之分二服如人行五里再服青蒿丸治丈夫婦女勞瘦病用青蒿細銼水三升童子小便五升煎取一半入青蒿汁熬為膏丸如梧桐子大空心臨臥溫酒下三二十丸能治留熱在骨節間石斛丸出千金方治男子婦人勞損虛羸傷寒冷乏力無所不治石斛二兩紫菀牛膝白朮各五分麻仁一分人參當歸茯苓芎藭大豆卷黃芩甘草各六分杏仁蜀椒乾地黃防風桂心各四分羊腎一具上為末蜜丸如梧桐子大酒服十丸日再漸增之一方有蓯蓉六分又方出千金方此方勝胡公腎氣丸及五石丸方見乾地黃丸補虛羸出本草以艾作湯空腹飲之或以蒸木瓜丸服秦艽鱉甲散出和劑方治男子婦人氣血勞傷四肢倦怠肌體瘦弱骨節煩疼頭昏頰赤肢體枯稿面色萎黃唇焦口乾五心煩熱痰涎咳嗽腰背引痛乍起乍臥夢寐不寧精神恍惚時有盜汗口苦無味不羡飲食及治山嵐瘴氣寒熱往來並能治之荊芥去梗貝母去心各一兩白芷五錢乾葛二兩一作山藥天仙藤前胡各二兩羌活肉桂各五錢青皮柴胡去須甘草秦艽去蘆洗鱉甲去裙襴炙各一兩上銼散每服三錢水一盞半生薑三片煎不拘時為末酒調亦得常服養氣血調營衛解倦怠一方有陳皮一兩無柴胡十四味建中湯出和劑方治營衛不足腑臟俱傷積勞虛損形體羸瘠短氣嗜臥寒熱頭痛咳嗽喘促吐嘔痰沫手足多冷面白脫色小腹拘急百節盡疼夜臥汗多夢寐驚悸小便滑利大便頻數失血虛極心忪面黑脾腎久虛飲食失虧血氣不足欲成勞瘵當歸去蘆頭酒浸焙乾白芍藥銼白朮銼洗甘草炙