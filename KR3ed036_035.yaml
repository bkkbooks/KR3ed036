body:
  text: 卷三十五胃腑門總論夫胃腑者主脾也口唇者是其候也脾合氣於胃胃者水穀之腑也號倉庫守內嗇吏重二斤十四兩紆曲屈伸長二尺六寸大一尺五寸徑五寸受水穀三斗五升其中當留谷二斗水一斗五升廣胲大頸張胸五穀乃容而滿上焦泄氣出其精微剽悍滑疾下焦下溉泄諸小腸凡此皆腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更滿更虛氣得上下五臟安定血脈和利精神乃居故神者水穀精氣也五臟不足調於胃故腸胃之中當留谷二斗四升水一斗一升故人一日再至後甲乙作圊後二升半一日中五升七日五七三斗五升而留水穀盡故平人不飲不食七日而死者水穀精氣津液皆盡故七日而死矣右手關上陽絶者無胃脈也苦吞酸頭痛胃中有冷刺足太陰治陰在足大趾本節後一寸右手關上陽實者胃實也苦胃中伏伏不思食得食不能消刺足陽明治陽在足上動脈脈浮而芤浮則為陽芤則為陰浮芤相搏胃氣生熱其陽則絶趺陽脈浮大者此胃家微虛煩圊必日再行動作頭痛重熱氣朝者屬胃胃脈搏堅而長其色赤當病折髀其耎而散者當病食痹髀痛病先發於胃脹滿五日之腎少腹腰脊痛脛酸三日之膀胱背膂筋痛小便閉五日上之心脾心痛閉塞不通身痛體重三日不已死冬夜半後夏日昳胃病者腹䐜脹胃管當心而痛上支兩脅膈咽不通飲食不下下取三里飲食不下隔塞不通邪在胃管在上管則抑而刺之在下管則散而去之胃脹者腹滿胃管痛鼻聞焦臭妨於食大便難胃中有癖食冷物者痛不能食食熱則能食脾前受病移於胃脾咳不已嘔吐長蟲厥氣客於胃則夢飲食診得胃脈病形何如曰胃脈實則脹虛則泄脾應肉䐃肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱其身者胃下胃下者脘約肉䐃不堅者胃緩肉䐃無小果纍標堅者胃急肉䐃多小果纍者胃結胃結者胃上脘約不利扁鵲云足太陰與陽明為表裡脾胃若病實則傷熱熱則飲水漿常渴虛則傷寒寒則苦飢常痛發於風水其根在胃先從四肢起腹滿大通身腫胃絶不治五日死何以知之舌腫溺血大便赤泄咽者咽物之門戶也膈者上焦胸中心肺之分野不通者升降之氣上不得交又云清氣在下則生飧泄泄黃如糜米穀不化者是也濁氣在上則生䐜脹腹中䐜滿不得大便難或先結後溏皆是也濁氣在上當降而不降者乃腎肝吸入之陰氣不得下而反在上也胃氣逆上或為嘔或為吐或為噦者是陰火之邪上衝而吸入之氣不得入故食不下也此皆氣衝之火逆胃之脈反上而作者也清氣在下則生飧泄者胃氣未病之日當上行心肺而經營也因飲食失節勞役形體心火乘於土位胃氣弱而下陷於陰中故米穀入而不升反降而為飧泄也膈咽之間交通之氣不得表裡者皆衝脈上行逆氣所作也蓋胃病者上支兩脅膈咽不通飲食不下取三里者是也針經云清濁相干亂於胸中是為大悗者惑也氣不交通最為急證不急去之諸變生矣聖人治此有要法陽氣不足陰氣有餘先補其陽後泄其陰是先令陽氣升發在陽分而後瀉陰也春夏之日陽氣在經當益其經脈去其血絡秋冬陽氣降伏當先治其臟腑若有噎有塞塞者五臟之所生陰也血也噎者六腑之所生陽也氣也二者皆由陰中伏陰而作也胃實熱附論夫右手關上脈陽實者足陽明經也病苦渴飲水頭痛汗不出如溫瘧唇口乾善噦乳癰缺盆腋下腫痛腹脹心懸消穀善飢溺黃名曰胃實熱也胃氣盛熱則壅澀不宣蘊積生熱面目悉黃譫妄狂語身熱多汗腹脅堅滿大便祕難皆其證也凝神散出永類鈐方收斂胃氣清涼肌表人參白朮茯苓山藥各一兩白扁豆粳米知母生地黃甘草各五錢淡竹葉地骨皮麥門冬各二錢五分上㕮咀每服三錢水一盞姜三片棗一枚煎不拘時服清陽湯出濟生拔萃方治口喎頰腮急緊胃中火盛必汗不止而小便數升麻黃耆當歸各二錢葛根一錢五分紅花桂枝酒黃柏各一分甘草炙一錢蘇木甘草生各五分上㕮咀作一服酒三大盞煎三分去滓稍熱食前服訖以火尉摩緊結處即愈夫病口喎筋急者是筋脈血絡中大寒此藥以代燔針劫刺破惡血以去其凝血內泄衝脈之火熾通熱湯一名子芩散出聖惠方治胃氣實熱苦頭痛汗不出口中乾燥人參二兩甘草炙一分柴胡去黑心葛根銼麻黃去根節白茯苓去黑皮各一兩一用赤茯苓黃芩去黑心五加皮銼各五錢石膏碎三錢上㕮咀每服三錢水一盞生薑三片煎七分去滓溫服一方無人參加味地黃湯治面熱如醉此為胃熱上熏其面加大黃以利之茯苓四兩甘草乾薑細辛地黃各三兩五味子半夏杏仁各八兩上水一斗煮三升去滓溫服半升日三橘皮竹茹湯出永類鈐方治胃熱多渴嘔噦不食赤茯苓去皮橘皮去白枇杷葉拭去毛麥門冬去心青竹茹半夏湯泡七次各一兩人參甘草炙各五錢上㕮咀每服四錢水一盞半姜五片煎八分去滓溫服無時黃芩梔子湯出聖惠方治胃氣實熱頭痛寒熱狀如溫瘧唇口乾燥或生乳癰腋下腫黃芩去黑心梔子仁犀角鎊赤茯苓去黑皮赤芍藥各一兩射干一兩大黃銼炒五錢上㕮咀每服五錢水二盞煎一盞入生地黃汁半合蜜一匙攪勻更煎數沸去滓食後溫服一方無芍藥忌炙爆熱面黃芩湯出聖濟總録治胃氣實熱口舌乾燥頭痛煩渴黃芩去黑心柴胡去苗各一兩葛根銼赤芍藥各三兩甘草炙五錢石膏碎二兩上㕮咀每服三錢水一盞煎七分去滓溫服不拘時泄熱蘆根散出聖惠方治胃實熱常渴引飲蘆根銼栝蔞根麥門冬去心各一兩赤茯苓三分知母甘草上㕮咀每服三錢水一中盞入小麥五十粒竹葉二十七片生地黃一分生薑半分煎六分去滓食後溫服黃連丸出聖惠方治胃實熱氣盛消穀善飲頭目痛衄血煩渴黃連去須栝蔞根麥門冬去心焙知母焙茯神去木各一兩上為末煉蜜丸如梧桐子大每服三十丸熱水下不拘時粥飲下亦可前胡湯出聖濟總録治胃熱乾嘔煩悶目黃燥渴前胡去苗頭一兩五錢茅根銼二兩麥門冬去心焙甘草炙各一兩黃芩去黑心五錢上㕮咀每服二錢水一盞煎七分去滓溫服不拘時茯苓飲出聖濟總録治胃腑實熱發渴飲水漿不止茯神去木一兩栝蔞根麥門冬去心焙各三兩五錢葳蕤知母焙各二兩上㕮咀每服先以水三五盞煮小麥一合淡竹葉一合余沸去滓然後下藥末五錢生地黃半兩棗三枚擘破煎一盞去滓溫呷清胃散出濟生拔萃治因服補胃熱藥而致上下牙痛不可忍牽引頭腦滿熱發大痛此足陽明別絡入腦也喜寒惡熱此陽明經中熱盛而作也升麻一錢牡丹皮五分當歸身生地黃酒製各三錢淨黃連六分不好加二分夏月倍加之上㕮咀作一服水一盞半煎七分去滓放冷服赤芍藥湯治胃氣實熱煩燥多渴唇焦口乾引飲不止黃連丸出聖濟總録治胃氣實熱煩燥多渴黃連去須赤茯苓去黑皮各三分麥門冬去心焙一兩苦參五錢上為末煉蜜丸如梧桐子大每服三十丸食後臨臥竹葉湯下犀角飲出聖惠方治實熱嘔噦吐逆不食頭痛煩渴犀角鎊枇杷葉炙去毛麥門冬去心焙葛根銼各一兩上㕮咀每服三錢水一盞煎七分去滓溫服不拘時一方有生薑半分葛根湯出聖濟總録治胃實熱煩渴咽乾吐逆葛根銼汁十兩甘草炙三兩半夏二兩生薑汁半杯漿水半升同煎焙乾上㕮咀每服三錢水一盞生薑三片竹茹少許煎七分去滓溫服不拘時地黃飲出聖濟總録治胃氣實熱唇口乾燥頭昏體倦五心煩熱生地黃汁生薑汁藕節汁生蜜各二合上調和令勻分三服不拘時地骨皮湯出聖濟總録治胃氣盛實壅澀中焦蘊積為熱口渴煩地骨皮二兩防風去叉甘草炙各一兩上㕮咀每服三錢水一盞半煎一盞去滓食後溫服薑汁飲一名三和飲子治胃中實熱吐逆心煩不下飲食生薑汁地黃汁蜜上各和勻水一盞煎八分空心服治通利腸胃除胸中煩熱解酒渴用菘菜二斤煮作羹啜之止作韭菹食亦得治胃脾熱中除渴止痢利小便益氣力補輕身長年用陳粱米炊飲食之理胃中熱去身腫健脾消穀止脹用大豆一升煮令熟杵米飲服之補氣湯出十便良方生胃中津液並治上焦虛熱夜臥口乾五味子三兩須用遼東甘草五錢白鹽炒一兩三件同拌置器中露一宿取出焙乾吳茱萸五錢上為細末乾淨瓷瓶中盛每以熟湯不拘時候點一錢服治胃氣實熱口乾唇裂中心熱燥大腑祕非時煩渴睡中口內生涎出楊子建萬全護命方大黃五錢桔梗枳殼只用青前胡葛根梔子各一分上件細搗羅為末每服二錢匕水一盞生薑三片同煎取八分食後和滓吃平胃散出醫方集成治胃經實熱口乾唇裂大小便祕澀及熱病後飲食不降蓄於胃中四肢發熱口渴無汗厚朴去皮姜炒射干米泔浸升麻茯苓各五錢芍藥一兩枳殼去瓤麩炒大黃蒸甘草炙各一兩上㕮咀每服四錢水一盞煎七分空心食前熱服治胃中熱下氣本草以溲疏作湯浴之若病胃脹滿心胃悶發熱本草即用葈耳服之治胸胃熱氣本草以蝭母草絞汁食之效升麻湯治瀉胃食熱方見本門食㑊類胃虛冷附論夫胃合於脾足陽明是其經也為水穀之海凡五味五穀入口則胃實而腸虛食則腸實而胃虛六腑實而不滿五臟滿而不實五臟氣不足調之於胃胃虛則生寒寒則苦飢心腹恆痛兩脅虛脹善鳴時寒時熱唇口乾咽喉不利飲食不下面目浮腫淅淅惡風目中急足脛寒不得安臥則是胃虛冷之證也健脾丸治虛勞羸瘦身重胃冷飲食不消泄瀉不止或作滯下變五色噦臭鍾乳粉赤石脂煅各一兩五錢枯礬乾薑炮蓯蓉酒浸石斛酒浸五味子桂心澤瀉桑寄生遠志去心焙人參柏子仁當歸酸石榴皮龍骨煅天雄炮去皮臍牡蠣粉白頭翁去苗甘草炙各一兩上為末蜜丸如梧桐子大米湯下三十丸空心服硇砂丸出聖濟總録治胃氣虛冷不思飲食陳橘皮湯浸去白焙紫桂去粗皮乾薑炮當歸切焙厚朴去粗皮薑汁炙芎藭蜀椒縮砂去皮甘草炙銼附子炮去皮臍各四兩白朮三兩五味子一兩五錢上除別研外為末用銀石鍋好酒一升白蜜十兩先下硇砂二兩阿魏五錢青鹽二兩好面一兩煎煮稀稠或糊入藥末和劑熟杵丸如梧桐子大每服二十丸生薑鹽湯送下不拘時調中散出直指方治腹虛泄瀉止嘔進食藿香葉縮砂蓬朮炮肉桂草果各五錢麥芽炒益智仁橘紅各三分蒼朮炮神麯炒甜桔梗各一兩甘草炙三錢上用乾薑茴香各五錢為末每三錢薑棗炒鹽煎服木香散出衛生家寶方治臟寒冷極及久冷傷敗口瘡下泄米穀不化飲食無味肌肉瘦瘁心多嗔恚虛陽上衝婦人産後虛冷下泄及水瀉冷痢木香一兩破故紙一兩良薑砂仁厚朴薑製各三分赤芍藥陳皮肉桂白朮各五錢胡椒茱萸各一兩肉豆蔻四個檳榔一個上為末每三錢用不經水豬肝四兩批片重重摻藥漿水一碗醋入茶腳少許入瓶蓋覆煮熟入鹽蔥白三個姜切一彈大同煮水欲盡空心作一服冷食之初微溏不妨此是逐下冷氣少時自止經年冷痢滑泄只是一服渴則飲粥湯生冷油膩忌食如不能冷食漿水暖食之或只用漿水煮豬肝丸桐子大每服五十丸用粥飲下若暴瀉只一服一方用銀石器盛煮熟乾地黃散出聖惠方治胃中虛冷肌肉不榮身體枯燥骨節皆痛熟地黃一兩白茯苓三分當歸銼炒三分麥門冬去心焙三分乾薑炒五錢川椒一分去目並閉口者炒去汗吳茱萸湯浸焙炒一分桂心三分甘草炙五錢人參去蘆一兩五味子三分木香三分上為末每服二錢溫酒食前調下忌生冷丁香溫氣湯出百一選方治胃寒嘔吐涎沫張上舍名萃云其母常服有效丁香吳茱萸湯浸炒桂心去粗皮各一兩附子炮去皮