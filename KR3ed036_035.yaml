子乾薑當歸人參各三兩赤石脂一兩桔梗女萎各二兩吳茱萸皂夾各五兩川椒二兩烏梅五十個上為末蜜酢鍾半漬梅一宿蒸三斗米下去核搗如泥和藥蜜搗三千杵丸如桐子大每服十丸白湯下日三下甚者加龍骨阿膠艾各三兩乾薑散出千金方治不能食心意冥然忘食乾薑法曲蜀椒大麥糵豆豉各一升上為末食後飲服三方寸匕日三以能食為度消食丸出千金方治數年不能食小麥糵曲各一升乾薑烏梅各四兩上四味末之蜜和服十五丸日再加至四十丸寒在胸中及反胃翻心者皆瘥消食斷下丸出千金方治寒冷者常服之法曲大麥糵各一升吳茱萸四兩上為末煉蜜丸如梧桐子大每服五十丸白湯下日三曲糵散出千金方消穀能食除腸中水氣臚脹法曲麥糵杏仁各五兩上為末食後酒服一合日三開胃生薑丸治中焦不和胃寒水穀不化噫氣不通噎氣痞滿口淡吞酸食時膨脹噦逆噁心嘔吐痰水宿食不消咳嗽脅肋刺痛寬中開胃進飲食桂心一兩甘草炙二兩生薑一斤切鹽三兩淹一宿焙乾青皮去白陳皮去白各二兩廣朮當歸縮砂四十九個上為末煉蜜丸如彈子大每服一丸食前細嚼沸湯化下平胃丸出千金方治丈夫小兒食實不消胃氣不調或濕熱閉結大小便不利者有病冷者服露宿丸熱藥後當進此丸調胃葶藶一兩杏仁五十枚大黃二兩小草甘草芍藥芎藭各一兩上為末煉蜜丸如梧桐子大每服五丸米飲下日三一歲小兒二丸漸加之千金翼有菖蒲當歸乾薑茯苓麥門冬細辛為十三味無杏仁調中益五臟開胃令人能食出本草以草果食之利五臟健胃令人能食以蛆煮食之以飯壓之不爾令人口乾開胃消食出本草以蓮藕生研服之開胃通心膈出本草以麥芽炙作熟水飲主開胃出本草以生藕蒸煮食之良開胃通利五臟用鯔魚煮食之久食令人肥健而開胃鯔魚似鯉身圓頭扁骨軟生江海水中調中消食去惡氣用羅勒即蘭香也味辛溫有小毒生食之食㑊附論夫內經曰大腸移熱於胃善食而瘦故謂之食㑊胃移熱於膽亦曰食㑊夫胃為水穀之海所以化氣味而為營衛者也胃氣和則飲食有節氣血盛而膚革充盈若乃胃受邪熱消鑠穀氣不能變精血故善食而瘦也病名食㑊言雖能食亦若飢也胃移熱於膽亦曰食㑊以膽為陽木熱氣乘之則爍土而消穀也甘露飲出聖濟總録治胃熱善食不生肌生地熟地天門冬去心麥門冬去心枇杷葉去毛黃芩石槲甘草炙枳殼麩炒山茵陳各一兩上㕮咀每服三錢水一盞煎七分去滓食後溫服日三升麻湯出聖濟總録治胃熱消穀善飢不生肌肉病名食㑊升麻梔子射干赤茯苓各三兩芍藥四兩白朮五兩生地黃蜜各一升上㕮咀六味如麻豆大每服五錢水一盞半煎一盞去滓加地黃汁半合再煎兩沸次下蜜半匙共煎取一盞溫服老少加減沉香湯出聖濟總録治胃熱消穀善飢不生肌膚沉香人參麥門冬去心地骨皮小草生甘草生地黃各一兩上㕮咀每服五錢水一盞半煎八分去滓溫服日三不拘時參苓丸出宣明論治胃中熱結消穀善食不生肌肉人參赤茯苓菖蒲遠志去心地骨皮牛膝酒浸切焙各一兩上為末煉蜜丸如桐子大每服二十丸溫米飲下日三不拘時候服乾地黃湯出聖濟總録治胃熱善食而瘦病名食㑊地黃麥門冬去心栝蔞根各三兩甘草炙枳殼黃芩各一兩上㕮咀每服五錢水一盞半煎七分去滓溫服日二三噫酸附論夫上焦有留飲脾胃挾宿寒致飲食滯於膈脘不能傳化令人脹滿氣逆所以噫酸也和胃丸出和濟方治噫酸噁心痰飲嘔逆不思飲食丁香散出聖濟總録治脾胃虛弱噫氣吞酸食飲遲化丁香縮砂白朮乾薑人參陳皮去白附子炮去皮臍各二兩高良薑桂去皮檳榔白豆蔻陳曲各五錢甘草炙木香各一分上為末每服二錢炒生薑鹽湯調下不拘時服丁香煮散出聖濟總録治噫酸吞酸不欲食丁香五錢赤茯苓桔梗白朮白芷桂半夏薑汁製甘草人參各一兩乾薑五錢檳榔高良薑白豆蔻枳殼各一分上㕮咀每服三錢水一盞半生薑三片棗子一枚煎至六分去滓食前溫服木香平氣丸出聖濟總録治心胸有痰噫酸吞酸木香沉香丁香肉豆蔻丹砂麝香各五錢檳榔麵裹慢火煨熟去面不用乳香揀通明者生薑汁內煮軟別研如膏一兩半夏湯浸七次焙乾為末生薑汁和作餅子焙乾為末二兩上除丹砂乳香半夏麝香四味別研外將木香等七味一處為末次入丹砂麝香再拌研勻細後將乳香半夏末入生薑汁煮作薄糊拌和前藥如拌和末就以生薑汁煮糊取拌和硬軟得所為度丸如梧桐子大每服十五丸至二十丸食後溫米湯送下丁香丸出聖濟總録治胃寒痰飲噫醋吞酸胸膈煩悶丁香母丁香丹砂麝香乾薑礬石飛過附子炮去皮吳茱萸杏仁去皮炒硫黃各一分巴豆三十枚去皮膜別研為膏去油上研末拌勻用蒸棗肉和劑丸緑豆大放干每服三五丸溫薑湯下不拘時丁香丸出聖濟總録治噫氣吞酸或時噁心懶進飲食丁香五味子半夏人參各五錢甘草琥珀乾薑各一兩枳殼麩炒昆布洗去鹹水訶子桂去皮各三錢上為末煉蜜丸如梧桐子大每服三十丸煎姜橘皮湯下京三稜丸出聖濟總録治噫醋吞酸消積進飲食京三稜濕紙裹煨熟別搗末二兩白朮二兩丁香五錢檳榔一兩半夏去滑四兩麝香一分研丹砂五錢研上除研者外搗羅為細末入研者藥再研令勻以生薑自然汁煮麵糊丸如梧桐子大每服二十丸三十丸木香生薑湯送下無時丁香煎丸出和劑方闢寒邪散胸膈中凝滯調順三焦和養營衛治心胸痞悶噫醋吞酸嘔逆痰水津液不收兩脅刺痛腹中堅滿口苦無味不思飲食丁香十二兩沉香二兩木香一錢五分廣皮一兩白豆蔻九兩五錢上為末別用甘草熬膏子為丸每一兩分作二百五十丸每一粒含化空心食前常服養營衛散滯氣治噫酢咽出肘後方治人食畢噫酸及醋心吳茱萸五錢人參二兩生薑三兩大棗十三枚上㕮咀水六升煮水二升先服一升日再半夏丸出聖濟總録治上焦冷氣噫酸吞酸吐沫嘔逆不思飲食半夏去滑二兩丁香五錢乾薑一錢上為末生薑自然汁煮麵糊為丸如梧桐子大每服十五丸煎水鹽湯下不拘時半夏丸出聖濟總録治上膈痰滯吞酸吐沫涕唾稠黏胸膈不利半夏用生薑炙二兩山芋一兩礬石飛過上為末用麵糊為丸每服十丸至二十丸食後臨臥生薑湯下丁香丸出聖濟總録治噫醋息臭胸中有痰丁香炒蓽茇各一兩硇砂五錢研細用百沸湯量多少化破研以淨紙濾過八次盛瓷碗內慢火熬干上同研令勻好新黃蠟二兩入瓦器內熔化入上味攪勻候溫流通手丸梧桐子大如硬難丸復近火溫之以丹砂一分研為衣每用煨生薑湯下空心夜臥各一服三丸逐日加一丸至五丸後三日加一丸至七丸止藿香半夏丸出聖濟總録治膈中有痰脾胃積冷噫醋吞酸不思飲食藿香葉一分丁香五錢半夏五兩薑汁浸一宿焙乾上為末麵糊丸如梧桐子大每服十五丸不拘時溫生薑湯下薑棗丸出聖濟總録治胃寒痰逆噫酸吞酸胸膈不利不思飲食生薑四兩丁香附子炮去皮臍各一兩上為末用蒸棗肉丸如梧桐子大每服十五丸至二十丸米飲送下不拘時治胃冷常吐清水及醋心出聖濟總録乾薑礬石飛過別研各一兩上為末以飯丸如梧桐子大蔥茶下二十丸食後服治醋心出肘後方檳榔四兩橘皮二兩上為末空心生薑湯下方寸匕一方蜜湯下又方出傳信適用方用胡桃爛嚼以乾薑湯下立愈或只嚼胡桃吃乾薑湯亦可治噎酸漿用取頭垢漿水煎煮膏服之驗一方水煎服治酸心每醋氣上攻如釅醋出肘後方用取茱萸三合水三盞煎七分頓服涎濃亦須強服近有人心如蜇破服此方後二十年不發增損成氣丸療胸膈脅滿膈上時有熱則痛腹脹多噎咽酸氣逆兩脅滿前胡枳實橘皮大黃各七分桂心吳茱萸乾薑各五分茯苓四分芍藥六分厚朴杏仁去皮炒七十個上為末篩納杏仁脂中研爛蜜和丸每服食後少時酒飲任性初服七丸如梧桐子大以氣宣下泄為度忌生蔥醋蒜茯苓湯治吐酸茯苓陳皮生薑各一錢二分白朮甘草人參桂心各六分蘇葉一錢檳榔七枚上㕮咀水九升煮二升絞去滓分溫三服每服如人行六七里未好遲三兩日便服一次老小腹微利忌生蔥酢物雀肉海藻菘菜檳榔散療吐酸水每食則變作酸水吐出檳榔人參茯苓陳皮蓽茇各六分上為末空腹取生薑五兩合搗絞汁溫內散方寸匕攪調頓服旦日一服漸加至一匕半若利多減以微通泄為度忌酢物生冷油膩豬魚等茯苓湯療心頭氣結連胸臍皆痛及吐酸水日夜不止茯苓厚朴各四兩檳榔白朮各二兩生薑十兩上㕮咀水九升煮二升七合絞去滓分溫三服每服約去如人行七八里須利加檳榔末一兩五錢湯欲熱時納之甚安穩三日服一劑屢服五六劑可則停忌酢物桃李雀肉等一方有吳茱萸人參各二兩治酢咽曲末一斤地黃三斤上合搗日乾以酒服三寸匕日三白朮散治食訖酸咽多噫飲食不下脾胃虛冷白朮一兩吳茱萸七兩湯浸七遍焙乾微炒高良薑半分上為粗散每服三錢水一中盞入生薑半分煎至六分去滓不拘時候稍熱服前胡丸治胸脅支滿膈上時寒腹脹多噫醋咽氣逆前胡一兩五錢去蘆頭枳殼一兩面炒微黃去瓤桂心一兩草豆蔻一兩去殼高良薑一兩銼乾薑五錢炮製銼赤茯苓一兩吳茱萸一兩湯浸七遍焙乾微炒赤芍藥一兩川大黃二兩銼碎微炒厚朴二兩去粗皮生薑汁炙令香熟杏仁一兩湯浸去皮尖雙仁不用麵炒微黃上為末煉蜜搗三二百杵丸如梧桐子大每服三十丸不計時候生薑湯下檳榔散治酸咽吐水及白沫飲食不消腹脹脅滿檳榔一兩厚朴二兩去粗皮塗生薑汁炙令香熟甘草五錢炙微赤銼川大黃一兩銼碎微炒白朮一兩訶黎勒皮一兩陳橘皮一兩五錢湯浸去白瓤焙桂心一兩吳茱萸五錢湯浸七次焙乾微炒上為粗散每服三錢水一盞入生薑半分煎至六分去滓不拘時候稍熱服檳榔丸治脾肺氣冷上攻胸膈嘔吐酸水不思飲食腹脅虛脹檳榔五錢高良薑三分銼陳橘皮五錢湯浸去白瓤焙桂心一分厚朴五錢去粗皮生薑汁炙令香熟訶黎勒皮五錢半夏五錢湯浸去滑草豆蔻五錢去皮白朮五錢上為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸生薑湯下不拘時候木香散治脾胃冷氣上攻胸膈切痛醋咽不能下食木香一兩厚朴一兩去粗皮塗生薑汁炙令香熟甘草一兩陳橘皮二兩湯浸去白瓤焙白朮二兩甘草五錢炙微赤銼高良薑一兩銼前胡二兩去蘆頭上為粗散每服三錢以水一中盞生薑半分煎至六分去滓不計時候稍熱服人參散治食畢即咽醋心胸氣滯腹脅疼痛不能下食人參二兩去蘆頭吳茱萸五錢洗七遍焙乾微炒木香五錢半夏一兩湯浸七遍去滑陳橘皮二兩湯浸去白瓤焙高良薑一兩銼上為粗散每服三錢以水一中盞生薑半分棗三枚煎至六分去滓不計時稍熱服半夏散治醋咽胸中氣寒飲食不下半夏五錢湯浸洗七遍去滑人參一兩去蘆頭赤茯苓一兩甘草五錢炙微赤銼吳茱萸五錢湯浸七遍焙乾微炒訶黎勒皮二兩上為粗散每服三錢以水一盞生薑半分棗三枚煎至六分去滓不計時候稍熱服陳橘皮散治噦逆酸咽胸膈不利食少腹脹陳橘皮二兩湯浸去白瓤焙白檳榔一兩人參一兩去蘆頭白朮一兩厚朴一兩五錢去粗皮塗生薑汁炙香熟上為粗散每服四錢以水一盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服療醋咽用羌活五兩搗水一升浸三宿每日溫服五合瘥生薑湯治酒食所傷心胸煩滿口吐酸水氣逆不定飲食無味胸膈不快乾生薑一斤白麵炒三斤甘草炒十三斤杏仁去皮尖麩炒另研十斤上炒鹽二十二斤同為末每服五分如茶點吃常服消食化痰寬利胸膈不拘時候除胃間酸水本草以雞蘇作生菜食之
