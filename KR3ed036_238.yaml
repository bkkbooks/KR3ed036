body:
  text: 卷二百三十八尸疰門五尸附論夫諸尸為病固不一其最重者唯五尸若得之疾速如飛走狀者名飛尸停遁不消者為遁尸沉痼在人臟腑者為沉尸衝風則發者為風尸隱伏積年不除者為伏尸唯此五尸之氣變態多端大率皆令人沉沉默默痛無常處五尸之外復有尸氣雖各有證然大同小異亦可通治之皆本是方飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哭聲便作風尸者淫躍四肢不知痛之所處每發則昏恍得風寒便作沉尸者纏骨結臟衝心脅每發絞切遇風寒便作疰尸者舉身沉重精神錯雜常覺昏廢每節氣改變輒發大惡方丹參丸治五尸蠱疰中惡客忤心腹刺痛丹參微炒一兩芍藥一兩半芎藭芫花醋炒各一兩梔子仁一兩烏頭炮裂去皮臍乾薑炮裂各一兩桂去粗皮一兩半野葛皮炙黃五錢吳茱萸湯浸焙炒半兩蜀椒去合口並目炒出汗一兩巴豆去心皮麩炒研出油盡一十枚上為末煉蜜丸如小豆大每服三丸米飲下日三服丹砂丸出聖惠方治五尸蠱疰中惡客忤心腹刺痛丹砂研一兩巴豆去心皮麩炒出油盡三十枚乾薑炮芎藭芫花醋炙炒烏頭炮裂去皮臍各一兩赤芍藥一兩半野葛吳茱萸湯浸焙炒各三分桂去粗皮一兩半上為末煉蜜丸如小豆大每服二丸米飲下空心服溫酒亦得太乙備急散出千金方治猝中惡客忤五尸入腹鬼刺鬼痱及中蠱疰吐血下血及心腹猝痛腹滿傷寒熱毒病六七日雄黃桂心芫花各二兩丹砂蜀椒各一兩藜蘆切巴豆各一分野葛三分附子五分上巴豆別治如脂余合治下篩以巴豆合和更搗調置銅器中密貯之勿泄有急疾水服半錢可加至五錢老少半之病在頭當鼻衄在膈上吐在膈下利在四肢當汗出此藥所為如湯沃雪手下皆愈方宜祕之非賢不傳也雄黃丸治五尸瘕積及中惡心痛蠱疰鬼氣雄黃研丹砂研一作真珠礬石煅牡丹皮藜蘆去蘆頭炙巴豆去心皮膜麩炒研出油盡附子炮裂去皮臍各一兩蜈蚣去足炒一枚上為末煉蜜丸如小豆大每服二丸米飲下食前服吐利為效一方治男子婦人染著鬼神謂之鬼疰病每服十丸冷水送下無時一方有桂心五疰丸一名雄黃丸出聖惠方治中惡五疰五尸入腹胸脅急痛鬼擊客忤傳尸垂死者此藥入喉即愈若口噤則斡開不可斡者扣一齒以竹管下藥先以少許湯或水納藥竹管瀉喉中丹砂一方用硃砂甘遂微煨附子炮裂去皮臍雄黃研各一兩豆豉曝乾巴豆去皮心壓出油盡各六十枚上除巴豆外搗研為末卻同研勻蜜丸如梧子大密器貯每服二十丸米飲下以知為度未知加丸數不發者粥飲投之利不止與酢飯一兩匙止之療交中五尸遁尸風尸飛尸尸疰沉尸其狀皆腹痛脹急衝心攻脅或瘰塊踴起或牽腰脊出聖惠方乾薑附子各一兩桂心二分巴豆三十枚去皮心生用上搗篩蜜和又納臼中搗萬杵服如小豆二丸此藥無所不療忌野豬肉蘆筍生蔥一方暖酒下又方出聖惠方龍骨三分藜蘆二分巴豆一分上搗和煉蜜丸空腹納井花水服如麻子大一丸又方出肘後方雄黃一分梔子十五枚芍藥一兩上水三升煮取一升半分再服雄黃丸出肘後方治猝中飛尸遁尸沉尸風尸腹痛脹急不得氣息上衝心胸及攻兩脅或瘰塊踴起或攣引腰脊雄黃研大蒜研各一兩上爛搗和丸如彈子大每服一丸熱酒化下須臾未瘥更服有尸疹者常以預收此藥丸五尸之中尸鬼接引共為病害經術有消滅之方而非世徒能用今復撰其經要以救其被毒惡氣散出肘後方治五尸鬼疰百毒桂去粗皮乾薑炮各一兩上為散每服三錢用炒鹽半錢溫水調服之一方新汲水調治猝中五尸遁尸其狀腹脹氣急衝心或瘰塊踴起或牽腰脊者出聖惠方用雞卵一枚取白吞之困者搖頭令下兼治飛尸腹痛脹急衝心一方破雞子白頓吞七枚不必再服藜蘆子丸出肘後方治中五尸腹痛脹急不得喘息上衝心胸及攻兩脅或瘰塊踴變縮引腰脊以蒺藜子炒去角二兩上為末煉蜜丸如小豆大每服三十丸食後熟水下日三服即瘥一方用白蒺藜和丸溫酒下治五尸出聖惠方用鼉肝一具熟切食盡亦用蒜齏食之一方用鱉肝療疾猝中五尸方取牙四角牙納銅器中以三尺布覆蓋著器布上燒牙令熱隨痛追逐跖下癢便瘥若屋瓦削四角炷燒用之神驗療猝中五尸今取一方而兼療之搗商陸根熬以囊盛之番尉之冷復易又方用粳米二升水六升煎二服沸之又方掘土作小坑以水滿坑中熟攪取汁飲之又方用豬肪八合銅器煎小沸投苦酒八合相和頓服即瘥又方用烏桕根銼二升煮令濃去滓煎汁磨五升則入水一兩服五合至一升良又方用漆葉曝乾搗末酒服之又方用斷鱉頭頭髮末水服可分為三度當如肉食不盡後發更作又方用梔子二七枚燒末服治猝中遁尸其狀腹脹氣急衝心或伏或起牽腰脊痛用服鹽湯取出鮫魚皮散治五尸鬼疰百毒惡氣鮫魚皮炙硃砂雄黃金牙椒天雄細辛鬼臼麝香乾薑雞舌香桂心莽草各一兩貝母五錢蜈蚣炙蜥蜴炙各二枚凡十六味搗下篩溫清酒服半錢匕日三服漸增至五分七分亦可帶之飛尸附論夫飛尸者其狀令人心腹刺痛氣息喘急脹滿上衝心胸是也此病發無由漸忽然而至疾如飛走故謂之飛尸方附子散治一切飛尸鬼疰風痹身體皆痛如針刀刺嘔逆痰癖除五勞七傷萬病一名萬病散附子炮裂去皮臍烏頭炮裂去皮臍芫青去足翅微炙雄黃研丹砂研乾薑炮裂細辛去苗葉人參莽草微炒鬼臼去毛微炒蜀椒去合口並目微炒出汗各二兩蜈蚣去頭足微炙蜥蜴去頭足微炙各一兩上為散再羅令勻空心溫酒調下半錢日再服細辛散治飛尸在人皮膚中又名惡脈亦名賊風發時氣急頭痛不在一處針灸則移發時一日或半日微瘥須臾復發細辛去苗葉一分桂去粗皮三分附子炮裂去皮臍一兩雄黃研五錢烏頭炮裂去皮臍一兩天雄炮裂去皮臍一兩乾薑炮一兩莽草微炒一分真珠研三分上為散每服空心米飲下一錢日二服一方酒服飛尸入腹刺痛方治猝有物在皮中如蝦蟆宿昔飛入腹中如杯動搖掣痛不可堪過數日即發宜服此方巴豆十四枚龍腦一兩土瓜子一兩桂一斤半上合搗碎以兩布囊貯蒸熱更番以尉之亦可煮飲稍稍服之此本在雜治中病名曰陰尸得者多死一方龍膽亦可雄黃散治一切飛尸鬼疰身痛如刺雄黃研甘草炙銼黃芩去黑心各半兩梔子去皮芍藥銼碎微炒各一兩半上為細散每服以溫酒調下二錢日再服不拘時候鬼臼丸治一切勞疾飛尸鬼疰等鬼臼去須半兩川升麻三分麝香一錢柴胡一兩去苗上羅為末煉蜜和搗二三百杵丸如梧子大每服不計時以暖酒下十丸日再服三黃散治飛尸病腫光如油色無常定處一名硃砂散黃連去須黃柏去粗皮微炒陳橘皮湯浸去白炒各一兩上搗羅為散入丹砂少許合研令勻每服二錢沸湯點服不拘時候一方熱酒下瓜蒂散治飛尸心痛氣急胸滿宜取吐瓜蒂赤小豆雄黃研各一分上為散拌勻每服空心溫酒調下一錢取吐惡物走馬湯出聖惠方治飛尸入腹脹滿刺痛氣息喘急巴豆二枚去皮心杏仁二枚去皮尖雙仁上以綿纏敲令極碎投熱湯二合指捻取白汁分三服飲之食頃當下老小量減之如惡物未下即再服通治飛尸鬼系妙葛洪肘後方飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便作風尸者淫躍四肢不知痛之所在每發昏恍得風寒便作沉尸者纏結臟骨衝心脅每發絞切遇寒冷便作尸疰者舉身沉重精神錯雜常覺昏廢每當節氣改變輒致大惡此一條後別有治法也用忍冬莖葉銼數斛煮令濃取汁煎之服如雞子大一枚日二三服治喉閉飛尸出本草取鯇魚膽和暖水攪服之納喉中飛尸上此膽至苦此魚似鯉生江湖間服之良治蠱毒飛尸喉閉出本草取覆盆子以水磨服少許治飛尸遊蠱喉中有物吐吞不得出者出本草以蚺蛇肉作膾食之治飛尸出本草取鹽麩子干搗為末食之治飛尸蠱毒瘴瘧出本草取海豚魚作脯食之一如水牛肉味少腥耳此魚生大海中治飛尸出本草以麂頭骨為灰米飲下治遊蠱飛尸者喉中刺破出本草以擋子揩之令血出當下涎沫即瘥治飛尸出本草以無患子中仁燒令香祛惡氣治飛尸蛔蟲口中疳𧈟風瘙身癢頭瘡牙齒落疥癬生如蛇蜍蚊子咬入人肉出本草以大紅蝦鮓食之初食瘡發後乃愈治飛尸遊蠱著喉氣欲絶者出本草以鳶尾根削去皮納喉中摩病處令血出為佳治飛尸出本草以紫荊木煮汁服之治飛尸及蛇虺咬用白鶴腳骨及嘴煮汁服之或燒為黑灰飲服之似鵠而巢木者為白鶴遁尸附論夫遁尸謂尸埋伏染疰連滯在於胸腹膈膜之間尋常如無病人若因喜怒不節飲食傷動其隱伏之疾發則心腹脹痛連及胠脅上衝心胸氣喘促急不得安臥者是其證也方天雄散治遁尸疰在旁人或入腹中化為蠱毒有聲或在咽喉或入諸脈不在一處入人腹內蠱成蝕人五臟入心令人面赤入肺令人面白少氣入肝令人面青善怒轉筋入腎令人呻吟面黑腰痛耳聾入脾令人面黃不嗜飲食羸瘦小便數胸中噎塞嗔喜無常及妖魅百疰為病天雄炮裂去皮臍一兩蜈蚣去足微炒一枚莽草微炒一兩乾薑炮裂雄黃研如粉各二兩烏頭炮裂去皮臍一兩半真珠研如粉一兩半桂去粗皮二兩蜀椒去目併合口微炒出汗一兩半細辛去苗葉一兩半芫青去足微炒四十九枚犀角鎊鬼臼去毛微炒各一兩上為散每服一錢空心以清酒調下日再服麝香丸治遁尸經年不瘥心腹刺痛短氣麝香研五分蜥蜴去頭足微炙一兩鸛骨微炒三寸乾薑炮製一兩羚羊鼻炙令焦黃二枚雞屎白巴豆去皮心麩炒去油盡五枚芫青去翅足微炒二十枚藜蘆去蘆頭微炙一兩鬼臼去毛微炙丹砂研如粉桂去粗皮各一兩上為末拌勻煉蜜丸如小豆大每服空心米飲下三丸日二服稍加至五丸以吐利為度鶴腦骨丸出千金方一名鶴骨丸治遁尸飛尸積聚脅痛連背走無常處或在臟或腹中忽然而痛鶴腦骨三分塗酥炙微黃一方用鶴骨三寸雄黃一兩細研水飛過野葛半兩藜蘆半兩去蘆頭微炙莽草一兩微炙硃砂一兩細研水飛一方作丹砂牡蠣一兩燒為粉筆桂心半兩蜈蚣一枚微炙去足芫青四十枚糯米拌炒令微黃去翅足斑蝥十四枚糯米拌炒令微黃去翅足巴豆四十枚去皮心研紙裹去油上羅為末研了藥令勻煉蜜和搗三五百杵丸如小豆大每服不計時以暖酒下三丸以知為度鸛骨丸治初得遁尸及經年不瘥心腹短氣鸛骨炙三寸羊鼻炙微黃二枚乾薑炮裂一兩麝香研半兩蜥蜴去頭足尖微焦一枚斑蝥去足翅微炒十四枚雞屎白微炒一兩巴豆去皮心麩炒出油盡二十枚芫菁去翅足微炒二十枚藜蘆去蘆頭微炙一兩上研為末拌勻煉蜜和丸如梧子大每服空心米飲下二丸以吐利為度木香湯治初得遁尸鬼疰心腹刺痛不可忍木香丁香各三分鬼箭羽桔梗銼炒各一兩桃仁湯浸去皮尖雙仁炒黃色子四枚一方用桃搗陳橘皮湯浸去白微炒一兩紫蘇莖葉微炒一兩半當歸焙乾各一兩白檳榔慢火煨十四枚銼上粗搗篩每服五錢以水二盞煎至七分去滓溫服日二服不計時候一方用生薑一分拍碎同煎服五疰湯治猝中賊風遁尸鬼邪心腹刺痛大腸急大黃甘草各三兩當歸芍藥各二兩烏頭十枚生薑蜜各一兩桂心四兩上羅勻別漬大黃以水九升煮取三升烏頭別納蜜中煎令得一升拌湯中去滓溫服三合如人行三十里久更進一服日三不知加至四合木香湯治初得遁尸鬼疰心腹中刺痛不可忍木香一兩鬼箭羽桔梗銼炒紫蘇莖葉炒令焦當歸焙乾各一兩半白檳榔一兩五錢上粗搗篩每服二錢水二盞入生薑一分拍碎同煎至七分去滓空心溫服日三治遁尸尸疰心腹刺痛不可忍者桂心乾薑各一兩巴豆二兩去皮心研紙裹壓去油上搗羅為散每用以醋和如泥塗於痛上干即更塗蒸尉方治遁尸飛尸及暴毒腫流入頭面四肢上芥子蒸熟焙一升搗為末以鉛丹二兩拌之分作兩處用疏布袋盛之更換蒸熱以尉痛處常使熱尉之三五度愈風尸附論夫風尸者在人四肢循環經絡其狀淫躍去來沉沉默默不知痛處若衝風則發故名風尸也方金牙散治風尸疰忤鬼氣心腹刺痛一名大附著散金牙一分細研由跋一分犀角屑一分黃芩一分麝香一分細研牛黃一分細研川椒一兩去目及合口者微炒去汗一作椒目天雄半兩炮裂去皮臍真珠半兩細研蜈蚣一枚微炙去足頭細辛三分雄黃半兩細研乾薑半兩炮裂銼黃連三分去須桂心半兩上為散入研了藥令勻每服以暖酒調下一錢不計時候川大黃散治風尸及猝中賊風遁尸邪鬼五疰心腹刺痛川大黃一兩半銼碎微炒甘草一兩微赤炙當歸一兩半銼微炒赤芍藥一兩川烏頭一兩炮裂去皮臍桂心一兩上搗為散每服四錢水一中盞入生薑半分蜜半合煎至六分去滓不計時候溫服一方無當歸空心溫酒服尸厥附論夫尸厥者陰陽氣逆也此由陽脈猝下墜陰脈猝上升陰陽雜居營衛不通真氣厥亂客邪乘之其狀如死猶脈有息而不常脈尚動而形無知也聽其耳內微響有如嘯之聲而股間暖者是也耳內無嘯聲而脈動者故當以尸厥療之診其寸口脈沉大而滑沉則為實滑則為氣實氣相搏身溫而汗此為入腑雖猝厥不知人氣復則自愈若唇正青身冷此為入臟厥不知人即死診其左手關上脈陰陽俱虛者足厥陰足少陽俱虛也故病恍惚不知人妄有所見也內經謂客於手足少陰太陰足陽明之絡五絡俱竭令人身脈皆動而形無知其狀若尸故曰尸厥蓋五絡皆會於耳中苟為邪所客則其氣逆厥上下暴隔五絡閉結而不通故俱竭而令人狀若尸焉治法當先刺其足大指內側爪甲上去端如韭葉後刺足心後刺足中指甲上各一痏後刺手大指內去端如韭葉後刺手心主少陰鋭骨之端各一痏立已不已以竹管吹兩耳使氣脈疏通內助五絡然後藥石治之方通微丸治五絡閉結病發尸厥不知人營實根五兩薔薇根是也白薇三兩虎骨獺肝微炙五靈脂各三兩丹砂另研雄黃另研代赭石另研各一兩硝石別研一兩上為末煉蜜丸如彈子大溫木香酒化下一丸日二以知為度不拘時候硃砂丸出聖惠方治尸厥脈動而無氣氣閉不通故靜如死聽其耳中翛翛有如嘯聲而股內暖者是也不治三日當死硃砂三分細研雄黃三分細研附子三分炮裂去皮臍桂心一兩半巴豆二十枚去皮心研布裹壓去油上羅末入研了藥令勻煉蜜丸如麻子大每服不計時以粥飲下五丸不知更下二丸若利多即止之返魂丹出聖惠方治尸厥不語生玳瑁硃砂雄黃白芥子麝香以上各一分上研如粉於銀器中熔安息香和丸如緑豆大沖惡不語不計時以小便下五丸孩子熱風只一丸硫黃丸出衛生家寶方治尸厥奄然死去四肢逆冷不省人事腹中氣走如雷鳴焰硝半兩硫黃一兩上細研如粉作三服每服用酒一大盞煎覺焰起傾盆內蓋了酌溫時灌服如人行五里又進一服不過三服即蘇尸厥之狀猝死脈猶動聽其耳中或有如嘯聲股間暖者是也搗干菖蒲棗核大著舌下人臥忽不語勿以火照之殺人但痛齧其踵及足拇指甲際多唾其面即活又菖蒲末吹兩鼻中又桂末吹舌下又菖蒲末棗核大納下部中又吹入兩耳內即活矣治尸厥奄然死去四肢逆冷不省人事腹中氣走如雷鳴出聖惠方用附子七枚炮熱去皮臍為散分作二服每服用酒三錢煎至一盞溫服又方出衛生家寶方用生薑自然汁半盞酒一盞煎令服灌二服卻灸頭上百會穴四十九壯兼臍下氣海丹田三百壯覺體溫暖即止治尸厥方出肘後方剪左角發方寸燒灰以醇酒一杯飲之不能飲者灌之立已又方出肘後方以繩圍兩臂腕男左女右伸繩從大椎度下行當脊上灸繩頭五十壯即活又方出肘後方尉兩脅下又取灶中墨如彈丸以漿水和飲之須臾可三四度又取梁上塵如小豆許竹管吹入鼻孔中凡尸厥為病脈動而形無所知陽脈下墜陰脈上升榮衛不通其狀如死又猶微有息其息不常人乃不知欲殯斂者療治之方以蘆管吹其兩耳極力以氣吹之立起若人氣已極可另易人吹之又方以竹管吹兩耳中不過良久即活又方出肘後方白馬尾二七莖白馬前腳目二枚合燒之苦酒丸如小豆大開口吞二丸須臾再服一丸治猝中惡暴死出聖惠方捧兩手莫放須臾即活又方出聖惠方握兩大拇指令固即活又方出聖惠方以竹管吹下部數更急吹之氣滿即活又方出聖惠方吹皂角末入鼻中令嚏即活又方出聖惠方酒磨桂心灌之即活又方出聖惠方用研麝香一錢醋和灌之又方出聖惠方取床下土小便研之灌瀝入口鼻即活白薇湯出指南方治鬱冒白薇紫蘇各三兩當歸二兩上為粗末每服五錢水二盞煎一盞去滓服倉公散出指南方瓜蒂雄黃藜蘆末礬石火煅上各等分研細末每用少許吹於鼻內以嚏省為度瓜蒂散出聖惠方赤小豆末瓜蒂末各等分上為細末每服一錢米飲調下以知為度諸疰附論夫諸疰者邪氣所疰也皆因精神衰弱經絡空虛傷於風寒暑濕飲食勞倦及傷寒不時發汗或發汗不得真汗三陽傳於諸陰五臟留滯宿食或冷熱不調邪氣流疰或感死生之氣或挾鬼物之精初為中惡客忤猝死諸尸之類雖或暫瘥必有邪氣伏於經脈流傳臟腑深挾骨髓經久不已皆成疰病變狀多端時發時瘥令人昏悶無不病處若因風寒暑熱之邪所疰則為風疰寒疰冷疰溫疰濕疰之病若因飲食勞倦之邪所疰則為食疰飲疰酒疰之病若因感生死之氣而為其邪所疰者則為喪疰哭疰轉疰之病若因挾鬼物之精而為其邪所疰者則為鬼疰邪疰尸疰殃疰之病犯土禁成疰者為土疰産後得疰者為産疰虛勞所成疰為勞疰邪氣外侵為泄疰凡此諸疰以受病之因為名也邪疰於肺則為氣疰邪疰於榮則為血疰久疰不已傷損骨髓則為骨疰凡此諸疰以病之所在為名也又有石疰者言其牢強如石走疰者言其遊走無常凡此諸疰以病之形變為名也治諸疰病者欲辨是非但覆紙於痛處燒發令焦投於紙上若發黏紙者疰氣引之也不黏者非疰也審知其因隨證治之諸疰者之診脈浮大者可治細而數者難治疰者住也言其連滯停住死又疰易旁人也疰病之狀或乍寒乍熱或皮膚淫躍或心腹脹刺痛或肢節沉重變狀多端而方云三十六種九十九種及此等五疰病皆不顯出其名大體與諸疰皆有相同方金牙散治江南三十六種人病經年羸瘦垂死服之皆瘥並帶之能殺鬼氣逐尸疰諸惡厲不祥悉主之金牙研曾青研飛硝石研礬石泥裹燒半日石膏研莽草銼玉枝雄黃硃砂寒水石龍骨蛇蛻皮炙芫青熬當歸龍膽大黃細辛防風銼大戟芫花熬野葛炙蓯蓉天雄炮茯苓附子炮烏喙炮乾薑人參桔梗桂心椒去汗目貫衆巴豆去心皮熬汁貍骨炙蜂房炙鸛骨炙各一兩上為散以酒服一錢漸增五分日三並以三角絳囊貯散方寸以擊頭及心上一方加蜈蚣蜥蜴雌黃銅鑑鼻麝香毒公忌豬肉生血物生菜冷水大醋蘆筍龍牙散龍牙茯苓各二兩半雄黃棗膏芍藥各五分乾地黃石斛胡燕屎各三分鬼箭羽烏頭羌活細切曾青露蜂房真珠桂心杏仁防風桃奴鬼臼鸛骨各一兩一方用鶴骨人參大黃各一兩半白朮二兩蘇子四合銅鑑鼻甘草橘皮芎藭鬼督郵遠志鱉甲各半兩貍陰二具一方用貍骨二分蜈蚣一枚上治下篩酒服一刀圭以知為度當有蟲從大便出一方無棗膏金牙散主邪魅心腹刺痛金牙研雄黃丹砂研礬石泥裹燒半兩寒水石芫青熬巴豆去心皮熬朴硝桔梗茯苓人參貫衆附子炮蜀椒去目汗露蜂房炙龍骨乾薑川桂烏頭炮石膏研莽草炙蓯蓉大戟芫花熬防風貍骨炙商陸根大黃細辛蛇蛻炙玉枝貝母一作牙子上等分下篩酒服五分日三忌豬肉冷水生菜生血肉大醋蘆筍麝香丸治五疰積年心痛鬼氣蠱毒百病悉療麝香研三分牛黃研藜蘆炙鬼臼去毛炙赤朱各半兩當歸切焙三分蜈蚣炙去頭足一枚芍藥銼雄黃研各半兩白茯苓去黑皮桔梗炒金牙碎桂去粗皮人參各三分獺肝炙熟一具吳茱萸湯浸焙炒貫衆各半兩丹砂研三分鬼箭羽半兩乾薑炮巴豆去皮心膜出油一兩蜥蜴去頭足一枚上研為末煉蜜丸如小豆大每服五丸空心米飲下日再稍加至七丸五野丸療五疰尸疰冷疰寒疰熱疰在身體寒熱短氣兩脅下痛引背腰脊吸吸氣少不能行飲食少面目痿黃小便難項強不得俯仰腹堅癖臍左右下雷鳴脹急手足煩疼目不明喜忘及風濕痹腰脊不隨喜夢寐百病皆療之方一名牛黃丸牛黃研麝香研蜀椒去目炮雄黃大黃桂心蜀烏頭炮蜀天雄炮硝石熬人參當歸細辛硃砂研乾薑各二分蜥蜴一枚炙巴豆五十枚去心皮鬼臼二分上搗篩煉蜜和丸如梧桐子大服三丸日再不知稍增以知為度忌豬肉蘆筍生蔥生菜生血物一方無鬼臼有芒硝以暖酒下野狐丸治五疰與鬼神狐貍精魅鬼疰交通野狐鼻七枚豹鼻七枚炙貍頭骨一枚炙雄黃鬼箭羽炙露蜂房炙白朮大蟲頭骨各一兩炙阿魏一兩驢馬狗駝牛毛各四分燒作灰若用骨加炒故人腦骨一兩炙上為末攪和令勻又以水煮松脂候煬和之時勿以手攪將大蟲爪和攪為丸用水磨下一丸分一半別搗雄黃末為衣以床下火燒之衣被覆之勿令泄藥煙並氣未汗出水磨二丸分飲一半須臾候等如汗不通約行十里再暖餘一服溫吃服後平身坐少時平身臥熱烘衣被和頭通身蓋臥令厚暖服藥處須在暖房中無令風入如汗出以燭燈照手足指及節間當有毫毛生出如青黃白色即一服見效如赤色須三次服如毛黑色必死之證如汗出以青絹拭遍身日出時於黑漆盆內洗當有蟲如麩片是驗大腸取下黑水紫黯惡黃白膿涎如諸般蟲等物是效次即服和氣藥皂莢丸治諸疰豬牙皂莢去黑皮酥炙研白馬夜眼炒令黑色研安息香炒令黑色研斑蝥以糯米炒令黑色去米並翅不用余即研粉霜二錢面二錢水滴和為餅子煨令黃色研以上各稱二錢蜈蚣一條炙令黃色研蛇蛻一條炙令黑色研雄黃研丹砂硇砂研牛黃犀角屑胡黃連各一錢上同研令勻以黃狗膽汁為丸如梧桐子大別以丹砂末為衣每服五十丸四更盡以桃仁煎湯下十疰丸治十種疰氣疰勞疰鬼疰冷疰生人疰死人疰尸疰食疰水疰土疰等雄黃巴豆各二兩人參甘草麥門冬桔梗細辛一作藁本附子皂莢蜀艽各一錢上為末蜜丸如梧子大空腹服五丸日再稍加以知為度雄黃丸治諸疰病及中惡鬼邪客忤及一切不測之病並宜服雄黃一兩細研水飛過人參半兩去蘆頭甘草半兩炙微赤銼藁本半兩桔梗半兩去蘆頭附子半兩炮裂去皮臍麥門冬一兩去心焙川椒半兩去目及閉口者微炒去汗巴豆半兩去皮心別研紙裹壓去油上羅為末入研了藥令勻煉蜜和搗三二百杵丸如小豆大每服不計時以溫酒下二丸殺鬼丸治五疰伏尸等病虎骨頭酒炙三兩藜蘆六兩豬牙皂莢炙鬼臼雄黃蕪荑仁天雄炮裂去皮臍各一兩上為末煉蜜丸如小彈子大每夜燒一丸五月五日午時合佳硃砂丸治諸疰鬼擊客忤心痛上氣鬼魘蠱毒硃砂細研白礬燒為灰藜蘆去蘆頭炙附子炮裂去皮臍雄黃各半兩細研蜈蚣一枚微炙去皮巴豆一分去皮心研紙裹壓去油上羅為末入研了藥令勻煉蜜和搗三二百杵丸如小豆大每服不計時以暖酒下二丸桔梗丸治毒疰鬼疰食疰冷疰痰疰宿食不消酒癖諸病一名藜蘆丸桔梗藜蘆皂莢巴豆附子各二兩上為末蜜和搗萬杵丸如梧子大宿不食平旦飲服二丸仰臥服勿眠至食時膈上吐膈下下去惡物如蝌蚪蝦蟆子或長一二尺下後當大虛口乾可作雞羹飲五合多並食粥一升三四日病未盡更服忌如藥法一方溫酒服名藜蘆丸麝香散治諸疰烏雌雞一隻籠罩勿與食三日與水吃至第四日後只一活蜣螂與雞食之飽後更下糞焙乾取一兩重麝香一分獺肝炙熟乾一兩上以獺肝搗為散次入麝香雞糞再研極細每服三錢以米飲調下日二治哭疰方出千金方亂髮一兩臘月豬肝一合上取豬脂煎發令消煬服之蟲死矣又方出千金方熬大豆帛裹尉之療江南疰病凡有九十九種寒熱尸疰此病隨月盛衰人有三百六十脈走入皮中或左或右或表或里如刀錐所刺乍寒乍熱喉咽如鯁食如噎胸中痛繞臍苦痛食不知味腰中難以俯仰兩膝難以屈伸面或黃或青或白或黑至死更相疰易方取桑根白皮切三升爆燥作湯淋取汁浸小豆二升如此取其汁盡蒸豆熟作羊鹿肉羹啖此豆治一切病食疰方出千金方凡食上得病名為食疰取釜下土和雞子為末酢泔漬一升和服之行五十步吐即瘥又方出千金方還取原食種數多少相似各少許和合布裹燒灰如杏仁大水服之治人皮膚中痛名症疰方出千金方以醋和燕窠土敷之治雜疰病相連續死亦治三十年衆疰出千金方搗桃仁十四枚和酒服白朮散治風入臟腑悶絶常自燥痛或風疰入身冷疰鬼疰飛疰惡氣腫起或左或右或前或後或內或外針灸流移無有常處驚悸腹脹氣滿心頭痛或恍惚悲懼不能飲食或進或退陰下濕癢或大便有血小便赤房中勞極白朮十四枚附子秦艽人參牡蠣蜀椒細辛黃芩芎藭牛膝各三分乾薑桂心防風各五分茯苓桔梗當歸獨活柴胡各四分烏頭甘草麻黃石楠莽草栝蔞根天雄杜仲各二分上治下篩平旦酒服五分訖如人行七里久勢欲解更飲酒五合為佳雄黃散出直指方治傳尸勞嗽肺管有蟲令人喉癢雄黃安息香各一分露蜂房去子燒灰桃仁去皮炒各二分麝香少許上為末每用二錢生艾葉入生蜜研汁夾和臨臥含化仍燒艾以管子吸煙熏喉氣疰附論夫氣疰者邪氣傳疰蘊伏於肺也肺主氣而通行表裡若疰氣所傳則其病隨氣遊走衝擊為痛上喘奔急飲食不下是為氣疰之候也方調氣湯治疰氣背膊疼痛心胸煩悶京三稜煨銼木香各一兩檳榔煨銼三分草豆蔻去皮一兩半高良薑一兩五錢芎藭五錢桂去粗皮人參各三分陳橘皮湯浸去白焙芍藥白茯苓去黑皮各半兩神麯微炒一兩阿魏麩裹煨研半兩上除阿魏研外粗搗篩再和勻每服三錢水一盞煎至七分去滓入研溫服千金丸治氣疰羸瘦歷年停滯胸滿結痞飲食或吐宿食不下中風鬼疰野葛炙四寸斑蝥十枚足炒雄黃研雌黃研乾薑炮鬼臼去毛微炙瓜蒂炒丹砂研礬石煉沙參莽草椒目焙各半兩地膽八枚去足麩炒上搗羅為末煉蜜丸如小豆大每服酒下五丸日二服猝中惡悶絶不知人服二丸老小一丸牛馬觸踐豬犬所齧癰腫若蟲毒所齧用一丸於掌中唾和塗瘡口毒上立愈正月旦以酒服家中大小各一丸一年不病若欲視病人先服一丸一方無干薑忌生血物牛黃丸治疰氣兼冷氣心腹痛或猝中得疰痛如鬼祟牛黃研阿魏研半兩丹砂研安息香研各半錢肉豆蔻去殼一枚桂去粗皮木香當歸切焙各一分檳榔炮銼二枚桃仁湯浸去皮尖雙仁炒四十九枚上為末用糯米飲丸如麻子大每服十丸空心溫酒下日三服蕪荑散治氣疰刺痛白蕪荑微炒附子炮裂去皮臍白檳榔煨銼陳橘皮湯浸去白焙乾薑炮桂去粗皮零陵香各一兩安息香研半兩蘹香子三分上為散每服三錢空心熱酒調下柴胡湯治疰氣胸膈滿塞心背撮痛欲絶柴胡去苗甘草炙銼各一兩半木香二兩檳榔煨銼十枚犀角鎊二兩當歸切焙一兩半麝香研旋入上麝香別研外粗搗篩每服五錢水一盞半煎至一盞去滓入麝香少許煎至八分溫服日再桃仁飲治疰氣肩膊刺痛不移桃仁湯浸去皮尖雙仁炒酸棗仁炒人參桂去粗皮丁香赤茯苓去黑皮甘草炙銼細上等分粗篩每服五錢水一盞半煎至八分去滓臨臥頓服延胡索散治風冷疰氣刺痛胃膈轉動不得四肢厥冷面目青黃又如鬼氣狀延胡索橘核人參各半兩乳香研地龍去土炒各一分上為散每服一錢溫酒調下日再木香散治猝中疰氣木香研一兩當歸切焙白朮桂去粗皮白茯苓去黑皮各一兩上為散每服二錢沸湯點服不拘時日三厚朴丸治一切氣疰大腸結澀背膊刺痛氣疰四肢及食物不消奔騰氣逆厚朴去粗皮薑汁炙三兩桂去粗皮大黃銼碎醋炒各二兩桃仁湯浸去皮尖雙仁炒三兩上為末研勻煉蜜丸如小豆大每服三十丸米飲下食後臨臥服微利即效一方加附子一兩炮裂去皮臍治三十年食疰方豉心半升生椒一合上以水二升煮取半升適寒溫用竹筒縮取汁令病者側臥手擘大孔射灌之少時當出惡物此法垂死悉治得瘥百千不可具説桃仁湯治傳尸鬼氣咳嗽痃癖疰氣血氣不通日漸羸瘦用桃仁一兩尖杵碎以水一升半煮汁著米煮粥空心食前服又方治傳尸疰以桃仁五十枚破研以水煮取四升一服盡當吐吐病不盡三二日更作若不吐非疰又方以桃仁一合爛研煎湯吃治鬼疰心痛鬼疰附論夫鬼疰者忽因鬼邪之氣排擊當時即病心腹刺痛悶絶倒僕如中惡狀得疰之後余勢不歇停積彌久有時發動連滯不已乃至於死死則疰易旁人故謂之鬼疰方太乙神明陷冰丸治諸病破積聚下心支滿寒熱鬼疰長病咳逆唾噫除衆惡鬼逐邪氣鬼擊客忤中惡胸中結氣咽中閉塞有進有退繞臍絞痛