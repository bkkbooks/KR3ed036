body:
  text: 卷三百二十四婦人諸疾門積聚附論夫婦人積聚者積者五臟所生聚者六腑所成五臟之氣積名曰積六腑之氣聚名曰聚也積者其病不離其部聚者其病無有常處皆由陰陽不和風冷搏於臟腑而生積聚也婦人病積於經久則令無子亦令月水不通所以然者積聚起於冷氣結入子臟故令無子若冷氣入於胞絡冷搏於血血冷則澀結故令月水不通儒門事親云戴人過譙都營中飲會鄰席有一卒説出妻事戴人問其故答曰吾婦為室女時心下有冷積如覆杯按之如水聲以熱手尉之如冰娶來已十五年矣恐斷我嗣是故棄之戴人曰公無黜也如用吾藥病可除孕可得卒從之戴人診其脈沉而遲尺脈洪大而有力非無子之候也可不逾年而孕其良人笑曰試之先以三聖散吐涎一斗心下平軟次服白朮調中湯五苓散後以四物湯和之不再月氣血合度數月而娠二子戴人常曰用吾此法無不子之婦此言不誣陽夏張主簿之妻病肥氣初如酒杯大發寒熱十五餘年後因性急悲感病益甚惟心下三指許無病滿腹如石片不能坐臥針灸匝矣徒勞力耳乃邀戴人而問之既至斷之曰此肥氣也得之季夏戊己日在左脅下如覆杯久不愈令人發痎瘧痎瘧者寒熱也以瓜蒂散吐之魚腥黃涎約三缶至夜繼用舟車丸通經散投之五更黃涎膿水相半五六行凡有積處皆覺痛後用白朮散當歸散和血流經之藥如斯湧泄凡三四次而方愈方鱉甲丸出千金方治女人小腹中積聚大如七八寸盤面上下周流痛不可忍手足苦冷咳噫腥臭兩脅熱如火炙玉門冷如風吹經水不通或在月前或在月後服之三十日便瘥有孕河內太守魏夫人方鱉甲桂心各一兩半蜂房半兩玄參蜀椒細辛人參苦參丹參沙參吳茱萸各十八銖蟅蟲水蛭乾薑牡丹附子皂莢當歸芍藥甘草防葵各一兩蠐螬二十枚炒虻大黃各一兩六銖上為末蜜和丸如梧桐子大酒下七丸日三稍加以知為度鱉甲丸出聖惠方治婦人腹中積聚大如杯上下流痛不可忍食噫腥臭四肢寒熱經水不通惡血停滯體瘦無力面色萎黃宜服鱉甲一兩半塗醋炙黃去裙襴露蜂房二分微炒牡丹三分牛膝一分去苗川椒二分微炒出汗去目及閉口者川大黃一兩銼碎微炒附子一兩炮裂去皮臍乾薑三分微炒吳茱萸三分湯浸七次焙乾微炒赤芍藥桂心琥珀防葵各一兩虻蟲一兩微炒水蛭一兩微炒皂莢半兩去皮子塗醋炒令黃當歸一兩銼微炒蠐螬三十枚微炒上為末煉蜜和搗五七百杵丸如梧桐子大每日空心及晚食前溫酒送下十丸薑黃丸出聖惠方治婦人虛冷血氣積聚心腹妨悶月候久不通少思飲食四肢羸瘦薑黃三分牡丹半分赤芍藥半兩桂心三分芫花一分醋拌炒乾當歸半兩銼微炒鱉甲一兩塗酥炙令黃去裙襴琥珀半兩延胡索半兩鬼箭羽半兩木香半兩硇砂半兩凌霄花半兩荊三稜二分微炒銼水蛭一分炒令微黃川大黃三分銼碎微炒乾漆三分搗碎炒令煙出上為末煉蜜和丸如梧桐子大食前以溫酒下七丸龜甲丸出聖惠方治婦人因産後虛冷堅結積在腹內月經往來不時若腹脹滿繞臍下痛引腰背手足煩或冷熱心悶不欲食龜甲一兩半乾薑赤石脂丹參禹餘糧當歸乾地黃各一兩六銖白芷一分用末代赭甘草鹿茸烏賊骨殭蠶各十八銖桂心細辛蜀椒附子各一兩上為末蜜和丸如梧桐子大空心酒下五丸加至十丸一方有牛膝無白芷紫桂丸出聖惠方治婦人心腹虛損冷積聚宿食不消冷氣時攻心腹脹滿繞臍疼痛桂心一兩吳茱萸半兩湯浸七次焙乾微炒菖蒲半兩豬牙皂莢半兩塗酥去皮炙黃去子紫菀半兩炮製銼乾薑半兩炮製銼川烏頭一兩炮裂去皮臍當歸三分銼微炒木香半兩川椒半兩去目及合口者微炒去汗蓬莪朮二分牛膝半兩去苗桃仁半兩去皮尖雙仁麩炒黃附子半兩炮裂去皮臍琥珀三分上為末煉蜜和搗五七百杵丸如梧桐子大每日空心及病發時以熱酒下二十丸乾漆丸出聖惠方治婦人積聚及惡血不散多攻心腹疼痛面無顏色四肢不和宜服乾漆一兩搗碎炒令煙出穿山甲一兩炙令焦黃檳榔三分桂心三分荊三稜半兩乳香半兩川烏頭半兩炮裂去皮臍木香半兩硇砂一兩不夾石者細研阿魏半兩面裹煨面熟為度硃砂三分研水飛過鱉甲一兩塗醋炙令黃色去裙襴巴豆二十枚去皮心研紙裹去油上為末煉蜜和丸如麻子大每服不計時候以熱生薑酒下五丸當歸酒下亦得祕方神麯五合炒枳殼白朮各六分人參四分赤石脂十分上為細末米飲調下方寸匕大黃丸出聖惠方治婦人積聚氣久不散川大黃一兩銼碎微炒鱉甲三兩塗醋炙令黃去裙襴防葵一兩半琥珀一兩乾漆一兩搗碎炒令煙出上搗細羅為末以米醋二升熬令稠入少面煮作糊和漆為丸如梧桐子大每服食前以溫酒下十五丸鱉甲散出聖惠方治婦人積聚氣心腹脹硬或時疼痛體瘦力乏不能飲食宜服鱉甲二兩塗醋炙黃去裙襴當歸銼微炒防葵各一兩吳茱萸半兩湯浸七次焙乾微炒桂心白朮青橘皮湯浸去白瓤焙木香赤芍藥各一兩甘草半兩炙微赤銼桃仁一兩浸去皮尖雙仁麩炒微黃上為散服三錢水一盞生薑半分煎至六分去滓食前積熱服治婦人勞氣食氣胃滿頭重結痛小便赤黃大便下氣出千金方烏頭黃芩巴豆各半兩半夏三兩大黃八兩戎鹽一兩半蟅蟲桂心苦參各十八銖人參硝石各一兩上為末以蜜青牛膽拌和搗三萬杵丸如梧桐子大宿不食酒服五丸安臥須臾當下下黃者小服積也青者疝也白者內風也如水者留飲也青如粥汁膈上邪氣也血如腐肉者傷也赤如血者乳余疾也如蟲刺者蠱也既下必渴渴飲粥飢食酥麋三日後當溫食食必肥濃三十日平復亦名破積烏頭丸主心腹積聚氣悶脹疝瘕內傷瘀血産乳余疾及諸不足麝香丸出聖惠方治婦人積聚氣心腹疼痛面色萎黃不能飲食麝香半兩細研木香三分當歸三分銼碎微炒附子半兩炮裂去皮臍香墨三分防葵半分硇砂三分不夾石者細研硃砂半兩細研巴豆半分去皮心紙裹壓出油研吳茱萸半兩湯浸七次焙乾微炒上為細末入研了藥令勻以醋煮麵糊和丸如麻子大服時空心以橘皮湯下三丸以利下惡滯為度磨積丸出醫方集成治女人三十六疾積氣內攻經候不調腹脅多脹或時痛不進飲食荊三稜莪朮各煨二兩茴香炒附子川楝子肉炒白芍藥乾薑各一兩半炮當歸洗一兩七錢半巴戟去心炒一兩艾葉醋炒一兩七錢半上為末酒糊丸如梧桐子大每服五十丸空心溫酒下防葵散出聖惠方治婦人心腹積聚氣時有疼痛經絡不利四肢漸瘦食少腹脹宜服防葵一兩木香一兩川大黃二兩銼碎微炒白朮一兩當歸一兩銼微炒赤芍藥二兩牛膝一兩去苗桂心一兩桃仁一兩湯浸去皮尖雙仁面微炒上粗羅為散每服三錢水一盞入生薑半分煎至六分去滓食前燒熱服五京丸出千金方治婦人腹中積聚九痛七害及腰中冷引小腹害食得冷便下方乾薑蜀椒各三兩附子一兩吳茱萸一升當歸狼毒黃芩牡蠣各三兩上為末蜜和丸如梧桐子大初服三丸日加至十丸患久冷困當服歸之此出京氏五君故名五京丸鬼箭散出聖惠方治婦人積聚氣心腹脹滿經絡滯澀四肢疼痛坐臥不安宜服鬼箭羽琥珀牛裡子穿山甲塗醋炙令黃當歸銼碎微炒桂心川大黃銼碎微炒桃仁湯浸去皮尖雙仁麩炒微黃以上各一兩上為散每服二錢以溫酒調下食前服硇砂丸出聖惠方治婦人血冷虛氣積聚疼痛硇砂三分細研百草霜半兩砒黃一分凌霄花半兩香墨一分川烏頭半兩炮裂去皮臍巴豆一分去皮心上為末入巴豆霜同研令勻用軟飯和丸如緑豆大每服於食前以溫酒下三丸治積氣堅硬作氣噎胸引背痛方大全良方白芍藥一兩半鱉甲醋炙枳殼去瓤麩炒北柴胡各一兩甘草赤茯苓各半兩上㕮咀每服三錢水一盞薑三片棗一枚煎至七分去滓溫服草粉丸子出聖惠方治婦人積聚氣又不散心腹疼痛麝香半兩細研巴豆三分去皮心紙裹壓去油飛天白六兩雄雀糞是冬月者佳炒令極熱為末上都研令勻以糯米飯和丸如梧桐子大每服空心以生薑酒下二丸楊子建護命方治婦人忽經候行次或因産後起早並誤吃生冷物傷損血氣血氣俱病因生積聚久無療變成惡物其狀腹中成塊如蛇如鼠如蟆如虎之類發作有時疼痛不可勝忍以手按之即沖手跳起宜服此方但此病經到年深其惡物帶命吃人血盡忽絶無經候通行忽經候行時只如淺紅水如此即傾危人也急宜治之所病年深不請吃吳茱萸三銖鱉甲醋炙黃延胡索楝子各半兩芫花檳榔各二兩狼毒九銖打碎同芫花用醋三碗於土器內煮乾炒令黃色以微黑色為度羌活牡丹去心附子火炮去皮桔梗牛膝白蕪荑芎藭半夏當歸川椒麝香密陀僧通草各一兩虻蟲去翅三十個水蛭三十條上件藥除芫花狼毒二味自作一處杵羅為末虻蟲水蛭鱉甲三味修制了亦自作一處杵羅為末所餘數件藥修合作一處杵羅為末件藥盡修制杵羅了三處合作一處相調令勻每服三錢空心蔥湯調下白朮散療婦人腹內冷癖血塊虛脹月經不調瘦弱不能食無顏色狀如傳尸方曲末二升麥糵末一升生地黃肥者切三升白朮八兩牛膝切三升桑甘銼三升金色者薑黃八兩一作乾薑當歸十四分生薑和皮切三升桃仁杏仁各二升去皮尖及雙仁者熱熬近用橘皮八兩上並細切於臼中以木杵搗之如泥納瓶中以物蓋口封之勿令泄氣蒸於一大石米中飯熟出入停屋下三日開出曝乾搗為散酒飲服方寸匕日二服漸加至一匕半不利初服十日內忌生冷難消之物以助藥勢過十日外即百無所忌恣口任意食之唯忌桃李若須桃李宜去木若不能散蜜丸服之亦得一服三十丸日二服去病人肥健好顏色忌桃李雀肉蕪荑乾薑丸治婦人寒熱羸瘦酸消怠惰胸中支滿肩背脊重痛腫里堅滿積聚或痛不可忍引腰小腹痛四肢煩疼手足厥逆寒至肘膝或煩滿手足虛熱意欲投水中百節盡心下常苦懸痛時寒時熱噁心涎唾喜出每愛鹽酸甜苦之物身體或如雞皮月經不通大小便苦難食不生肌乾薑芎藭茯苓硝石杏仁水蛭虻蟲桃仁蠐螬蟅蟲各一兩柴胡芍藥人參大黃當歸各二兩上為末蜜和丸如梧桐子大空心飲下三丸不知加至十丸兼療婦人瘕結脅肋下疾神仙聚寶丹利濟方治婦人血海虛寒外乘風冷搏結不散積聚成塊或成堅瘕及血氣攻注腹脅疼痛小腹脹或時虛鳴面色痿黃肢體浮腫經脈欲行先若重病或多或少帶下赤白崩漏不止驚悸健忘小便頻數或下白水時發虛熱盜汗羸瘦此藥不問胎前産後室女並宜服之常服安心神去邪氣逐敗血養新血令人有子沒藥別研琥珀別研木香煨冷取末當歸洗焙取末各一兩辰砂麝香別研各一錢滴乳別研一分一方用二錢半上研令細和停滴冷熱水搗為丸每一兩作一十五丸每服二丸溫酒磨下胎息不順腹內疼痛一切産難溫酒和童子小便磨下産後血暈敗血奔心口噤舌強或惡露未盡發渴面浮煎烏梅湯和童子小便磨下産後氣力虛羸諸藥不能速效用童子小便磨下室女經候不調每服半丸溫酒磨下不拘時候癥瘕積聚附論瘕者黃瘕青瘕燥瘕血瘕脂瘕狐瘕蛇瘕是也千金外臺言之詳矣癥瘕積聚隨氣血以分門故方云以癥瘕屬肝部積聚屬肺部不亦明乎況七者火數屬心蓋血生於心八者木數屬肝蓋血歸於肝雖曰強分理似不混夫症者堅也堅則難破瘕者假也假物成形若婦人七症八瘕則由內外不內外因動傷五臟氣血而成古人將婦人病為痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血病龍蛇魚鱉肉發蝨瘕等事皆出偶然但飲食間誤中之留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹有一物其狀如魚即生瘕也與夫宿血停凝結為胚塊雖內外所感之不同治法當以類相從所為醫者意也如以敗梳治蝨瘕銅屑治龍瘕曲糵治米瘕石灰治酒瘕此等學者可以理解也方牡丹煎丸出和劑方治婦人衝任本虛小腹挾寒或因産勞損子臟風寒搏於血氣結生瘕聚塊硬發歇臍腹刺痛脅肋緊脹腰膝疼重拘攣腫滿背項強急手足麻痹或月水不調或瘀滯澀閉或崩漏帶下小腹冷疼寒熱盜汗四肢痠痛面色萎黃多生皯𪒟羸乏少力心多驚悸不欲飲食延胡索縮砂仁各半兩赤芍藥牡丹皮各一兩山茱萸乾薑炮各半兩龍骨細研水飛熟乾地黃檳榔羌活各二兩藁本去土五味子人參白芷當歸去蘆酒浸乾山藥澤瀉續斷細者肉桂去粗皮白茯苓白朮附子去皮臍木香牛膝去苗酒浸一宿焙萆薢搗為末炒各一兩石斛去根酒浸三兩上為細末煉蜜和丸如梧桐子大每服二十丸溫酒或醋湯下空心食前二服妊娠不宜服如是血熱及夜多煩躁不用附子山茱萸萆薢乾薑此四味卻入柴胡黃連甘草牽牛子四味柴胡去苗一兩甘草一兩余各半兩同和為丸治瘕神妙婦人腹肚有塊久不消名曰瘕聚川烏七錢附子七錢木香半兩香附子半兩丹參陳皮各三錢蓬朮三稜威靈仙木賊草桂心芍藥藁本蒺藜葫蘆甘草延胡索良薑各半兩上為㕮咀每服四錢水一盞半生薑三片煎服雞鳴紫丸出千金方治婦人瘕症積聚皂莢一分藜蘆甘草礬石烏啄杏仁乾薑桂心巴豆各二分前胡人參各四分代赭五分阿膠六分大黃八分上為末蜜丸如梧桐子大雞鳴時服二丸日益一丸至五丸止仍從一起下白者風也赤者癥瘕也青微黃者心腹病也桃仁散出大全良方治月經不通産後惡露未盡積聚瘀血變成癥瘕虻蟲半兩炒令微黃去翅足水蛭炒令微黃烏賊骨鯉魚鱗燒灰芫花醋炒令乾枳殼麩炒微黃去瓤當歸炒牛膝去苗赤芍藥硇砂桂心各半兩桃仁三分浸去皮尖雙仁麩炒黃上為細末食前溫調下一錢水府丹出大全良方治婦人久虛積冷經候不行癥瘕癖塊腹中卒暴疼痛面有皯𪒟黧黑羸瘠百病經煅花蕊石研一兩半硇砂紙隔沸湯淋熬取霜半兩桂心別為末木香乾薑各一兩縮砂仁二兩紅豆半兩斑蝥一百個臘月狗膽七枚生地黃汁童子小便各一升蚖青三百個斑蝥蚖青二物並去頭足翅以糯米一升同炒米黃上為末同三汁熬為膏和上末丸如雞頭大硃砂為衣每服一丸溫酒嚼破食前服米飲亦可孕婦莫服治婦人血瘕心腹積聚乳余疾繼生小腹堅滿貫臍中熱腰背疼小便不利大便難不下食有伏蟲臚脹癰疽腫久寒留熱胃脘有邪氣方千金方半夏一兩六銖石膏藜蘆紫參蓯蓉各十八銖桂心乾薑各一兩烏啄半兩巴豆六十枚研入膏上為末蜜丸如小豆大日服二丸及治男子疝氣三稜煎出大全良方治婦人血瘕食積痰滯三稜煨莪朮各二兩煨青橘皮去白半夏湯洗七次麥芽炒各兩上用好醋六升煮乾焙為末醋糊丸如梧桐子大每服三十四丸淡醋湯下痰積多薑湯下妙應丹治諸臟氣虛損積聚煩悶及飲食中蠱毒或食水陸果瓜子卵入腹而成蟲蛇魚鱉或宿食留飲婦人産後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜臥多魘少食腹痛大便糟粕變成冷痢蓽茇木香破故紙炒各重三兩半附子四個六七錢重者去皮臍剜作甕硇砂共一兩七錢半面裹煨熱去面不用青皮亦二兩上為末麵糊搜丸如梧桐子大每服三十丸生薑橘皮湯下滯痢米湯下加至五十丸桃仁煎一名桃仁丸治婦人血積血瘕血塊經候不通潮熱月水停滯作病及癥瘕等疾神驗此藥性烈氣血虛人斟酌與之亦可下鬼塊胎桃仁二兩湯浸火炒大黃川朴硝各一兩虻蟲半兩炒黑上為末以醇醋二升半銀石器中慢火煎取一升五合下大黃桃仁虻蟲等不住手攪欲下手丸下朴硝更不住手攪良久出之丸如梧桐子大前一日不用吃晚食五更初用溫酒吞下五丸日午取下如赤豆汁或如雞肝蝦蟆衣狀未下再作如鮮血來即止續以調血氣藥補之曾有婦人小便不通臍腹不可忍衆醫作淋治以八正散之類愈不通許學士診之曰此血瘕也非瞑眩藥不可去更初用此藥日午痛大作不可忍遂臥少頃下血如拳者數塊小便如魚汁者一二升痛止得愈此藥治病的切然猛烈太峻氣虛血弱者更宜斟酌與之一方用醇苦酒煎如前法每取一雞子黃投酒中預一宿勿食服之大硝石丸治七症八瘕聚結痞塊及婦人帶下絶産並飲服丹藥腹中有癥瘕者當先下之此藥但去癥瘕不令人困硝石六兩大黃八兩人參甘草各三兩上為末以三年苦酒三升置銅器中以竹作準每一升作一刻注器中先納大黃常攪不息使微沸盡一刻乃納余藥又盡一刻極微火熬使可丸丸如雞子中黃若不能服大丸則作小丸如梧桐子大米湯下三十丸四日一服婦人服之或下如雞肝或如米泔正赤黑等三二升下後忌風冷自養如産婦四物湯當歸玄胡索威靈仙官桂各等分上為末每服三錢酒調空心服小三稜丸出醫方集成治食症酒瘕血瘕氣塊時發刺痛全不思食及積滯不消心腹堅脹痰逆嘔噦酢吞脅肋刺痛胸膈痞悶並脾氣橫泄荊三稜蓬莪朮各四兩芫花一兩去梗葉上同入瓷器中用米醋五升浸滿封器以炭火煨令乾取出稜術將芫花以余醋炒令微焦焙乾為末醋糊丸如緑豆大每服十五丸生薑湯下婦人血分男子脾氣橫泄腫滿如水用桑白煎湯下一握七丸治臟腑宿蘊風冷氣血不和停滯宿飲結為癥瘕痞塊及婦人血瘕腸胃中塞飲食不下咳逆脹滿及下痢赤白霍亂轉筋及踒擘拳攣腰脊腳膝疼痛行步不能常服健脾暖胃堅骨強陽神麯半斤炒黃大附子二個炮去皮臍甘草炙二兩上為末蜜丸左手一握分作七丸每服十丸細嚼米飯下治癥瘕積聚去三尸益氣延年卻老上以雄黃二兩細研為末九度水飛過卻入新淨竹筒內盛以蒸餅一塊塞筒口蒸七度用好粉脂一兩為丸如緑豆大日三服酒下七丸至十丸三年後道盛益力不飢玉女來侍治癥瘕積聚風痰癲狂三蟲伏尸除蘊輕身益氣令人不飢百日還年卻老上用天門冬末服方寸匕日三無問山中人間但勿廢久服益佳釀酒服之治癥瘕積聚用蔓荊子水煮二升取濃汁服治癥瘕滿腹諸藥不瘥者本草以人溺服之皆下血片塊二十日即出也癥瘕附論冷熱不調飲食不節思慮不絶喜怒不時氣弱血虛觸冒風邪冷氣入於龍門邪氣傳於胞絡搏於氣血則使月水不利次至不通漸結成塊又有月信不斷以舍合陰陽氣內入使經候不時內結積聚成塊此終身不孕宜與琥珀丸磨去之因産而復生癥瘕塊硬按之而不動掏之而不移由臟氣已虛血未復風寒所乘而凝結也沒藥丸琥珀丸治之儒門事親云沈丘王宰妻病胸膈不利只流涎沫自言咽下胃中常雷聲心間時作微痛又復發昏胸乳之間灸瘢如棋化痰利膈等藥服之三載病亦依然其家知戴人痰藥不損來求之一瀉而出雪白蟲一條長五六寸有口鼻牙齒走於涎中病者忿而斷之中有白髮一莖此正與徐文伯所吐宮人發瘕正同蟲出立安果園劉子平妻腹中有塊如瓢十八年矣經水斷絶諸法無措戴人令一月之內湧四次下六次所下痰約一二桶其中不化之物如有葵菜者爛魚腸之狀湧時以木如意攪之病積如刮漸漸乃平及積之既盡塊痕反霪如常略無少損至是而面有童色經水復行若當年少女可以有子方當歸丸出千金方治婦人臍下癥結刺痛如蟲所齧及如錐刀所刺或赤白帶下十二疾腰疼痛月水或在月前月後當歸葶藶附子吳茱萸大黃各二兩黃芩桂心乾薑牡丹芎藭各一兩半秦椒細辛柴胡厚朴各一兩六錢牡蒙一方無甘草各一兩虻蟲水蛭各五十枚上為末蜜和丸如梧桐子大空心酒下十丸日再有胎勿服之晞露丸濟生拔萃治傷寒於內氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸荊三稜莪朮各一兩銼二味並酒浸乾漆五分洗去腥炒煙盡茴香三錢鹽炒硇砂四錢別研輕粉一錢別研川烏五錢炮去皮臍青皮去白雄黃別研穿山甲炮各三錢巴豆三十個去皮黃術三稜同炒令深黃色去巴豆不用麝香半錢別研上除別研四味外為細末和勻生薑汁糊為丸如梧桐子大每服三二十丸溫生薑湯送下溫酒亦得食前見晛丹出濟生拔萃方治客寒於下焦血氣閉塞而成瘕堅大久不消者附子四錢炮去皮臍鬼箭羽三錢澤瀉肉桂玄胡木香各二錢紫石英三錢檳榔二錢半血竭一錢半別研水蛭一錢炒令煙盡桃仁湯浸去皮尖炒黃色三十個京三稜銼五錢大黃銼研同三稜酒浸一宿焙乾二錢上除血竭桃仁外同為細末和勻納元酒打糊為丸如梧桐子大每服三十丸溫醋湯送下溫酒亦得食前三聖丸治積血症瘕塊癖諸藥療理不瘥者舶上硫黃一兩水銀半兩硇砂炒去石一分上三物乳盆內細研如粉卻生鐵銚內文武火熱熔成汁以火箸攪令勻停冷劃下以紙裹置地坑內埋一宿取出再研細次以赤芍藥當歸京三稜蓬莪朮紅花各一分同用並細銼以法酒一升煎及一半漉出砂盆內研生布裂汁再熬放冷入飛羅面為糊搜丸如緑豆大治因産後傷於飲食結伏在內脅時發疼痛不可忍者當歸浸酒一升逐旋取酒暖下七丸每服磨癖塊空心溫酒下三丸至五丸所剩藥滓裂了焙乾為末別入乾薑半兩真蒲黃芫花各二分醋炒焦黃上為末以前一般糊丸如緑豆大治女人血臟冷氣攻心疼及一切血疾溫酒下十丸枳實檳榔丸出醫方大成治婦人癥瘕塊有似妊孕服此藥安養胎氣調和經候血氣通和寬膈美食可以久服枳殼炒一作枳實檳榔黃連黃柏去皮黃芩當歸阿膠蛤粉炒別研木香各半兩上為末水丸如小豆大溫米湯飲下三十丸日三服不計時候桂枝茯苓丸出金匱方治婦人宿有癥瘕妊娠經斷未及三月即動此症也經斷三月時得漏下不止胎動在臍上者為症痼害當去其症又論妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以下血不止者其症不去故也當下其症桂心不焙茯苓牡丹皮桃仁去皮尖麩炒芍藥各等分上為末煉蜜丸如彈子大每服一丸嚼細溫酒米湯送下食前服自一加至三丸治子門閉血聚腹中生肉症臟寒所致方出千金方乾漆半斤生地黃汁三斤生牛膝汁一斤上先搗漆末納汁中攪微火煎為丸如梧桐子大酒服三丸日再若覺腹中痛食後服之治卒暴症腹中有如刺晝夜啼上用牛膝二斤以酒二斗漬密封熱火灰中溫令味出服五合至一升量力服治癥瘕出華他中藏經大黃濕紙裹煨硇砂三稜濕紙裹煨乘熱細銼乾漆炒至煙盡巴豆去皮出油各一兩入醋一升熬成膏入藥如後木香丁香枳殼湯浸去瓤麩炒黃色桂各一兩半上同丸如緑豆大米湯下三丸治婦人小腸癥瘕諸疾本草以㙠末服之梁四公子傳曰交河之間平磧中掘深一丈下有㙠珀黑逾純漆或大如車輪末服之攻婦人小腸癥瘕諸疾治卒暴症腹中有物堅如石痛欲死出本草取蒴藋根一小束洗瀝去水細擘酒二升漬三宿暖溫服五合至一升日三若欲速得服於熱灰中溫令藥味出服之此方無毒已愈十六人神驗藥盡復作服之治婦人月閉風氣羸瘦癥瘕久服令人有子出本草取木麻以燒酒服八瘕附論黃帝問於素女曰吾聞天下婦人産乳有子而疾者未曾生子而病者又産乳後而中絶不復産者何也諸病從主而令婦人腹中有積聚胸脅腰背攣而痛久而八瘕之聚病深可畏不在腸胃療之或者已復其狀寧可得聞之乎對曰婦人之病皆於月病生産所致又從胞胎所起其病不同針灸食藥不得其方也黃帝曰安心其要易聞之為實受之良久詳思念其事曰善哉療將奈何素女曰誠為主説婦人胞胎之數皆在陰里萬物皆從生淵深血脈精氣所從行腎為陰陰主開閉左為胞門右為子戶主定月水生子之道胞門子戶主子精神氣所出入合於中黃門玉門四邊主持關元禁閉子精臍下三寸名曰關元主藏魂魄婦人之胞三焦之府常所從止然婦人經脈俞絡合調則月水以時來至故能生子而無病婦人榮衛經絡斷絶不通邪氣便得往入合於臟若經血未盡而合陰陽即令婦人血脈攣急小腹重急支滿胸脅腰背相引四肢痠痛飲食不調結牢惡血不除月水不時或月前或月後因生積聚如懷胎狀邪氣盛甚者令人恍惚多夢寒熱四肢不欲動陰中生氣腫內生風甚者害小便澀澀而痛淋瀝面黃黑成病則不復生子也方一曰黃瘕婦人月水始下若新傷墜血氣未止臥寢未定五臟六腑虛羸精神不治因向大風便利陰陽開閉節四邊中於濕風氣從下上入於陰中稽留不去名為陰陽虛則生黃瘕瘕之聚令人病苦四肢寒熱身重淋露不欲食左脅下有氣結牢不可得抑苦病腰背相引痛月水不利令人不産小腹下陰中如刀刺不得小便時苦寒熱下赤黃汁病苦如此令人無子療當刺關元氣衝行以毒藥有法療瘕當下即愈矣皂莢散出聖惠方療黃瘕導方皂莢一兩炙去皮子蜀椒一兩去汗細辛六分上搗散以三角囊大如指長二寸貯之取納陰中欲便悶則出之已則復納之惡血畢出乃洗以溫湯三日勿近男子忌生菜等二曰青瘕青瘕者婦人新産未滿十日起行以浣洗太早陰陽虛玉門四邊皆解散子戶未安骨肉皆痛手臂不舉飲食未復內臟吸吸又當風臥不自隱蔽若居濕席令人苦寒灑灑入腹煩悶沉淖惡血不除結熱不得前後則化青瘕瘕聚在右脅藏於背膂上與髆髀腰下攣兩足腫面目黃大小便難其候月水不通利或不復禁狀如崩中此自其過所致令人少子療之當刺胃管行以毒藥有法瘕當下即愈矣療青瘕導藥方出聖惠方戎鹽一升皂莢去皮子炙半兩細辛一兩上搗散以三角囊大如指長三寸貯之納陰中但臥瘕當下青如葵汁養之如産法三曰燥瘕燥瘕者婦人月水下惡血未盡其人虛憊而以夏月熱行疾走若舉重移輕汗出交流氣力未平而卒以急怒甚喜致猥咽不泄經脈攣急內結不舒煩滿少氣上達胸背膂小腹為急月水與氣俱不通而反以飲清水快心月水橫流衍入他臟不去有熱則生燥瘕之聚大如半杯上下腹中苦痛還兩脅下上引心而煩害飲食欲吐胸及腹中不得太息腰背重喜臥盜汗足酸削久立而痛小便失時忽然自出若失精月水閉塞大便澀難有此病令人少子療之以長針按而刺之法度行以毒藥瘕當下即愈矣療燥瘕方出聖惠方大黃如雞子大乾薑二兩黃連三兩雞膍胵中黃膜一枚炙桂心一尺蟅蟲三枚熬厚朴十顆炙郁李仁一兩去皮尖煎熬上搗散早朝空腹以溫酒一盞和三錢頓服瘕當下下畢養之如産婦法三月無子者當有三月勿合陰陽四曰血瘕血瘕者婦人月水新下未滿日數而中止因飲食過度五穀氣盛溢入他臟若大飢寒吸吸不足呼吸未調而自勞血下未定左右走腸胃之間留結不去內有寒熱與月水合會為血瘕之聚令人腰痛不可以俯仰橫骨下有積氣牢如石小腹裡急苦痛背膂痛深達腰腹下攣陰里若生風冷子門劈月水不時乍來乍不來有此病者令人無子療之症當下即愈矣儒門事親云汴梁曹大使女既笄病血瘕數年太醫宜企賢以破血等血藥治之不愈企賢曰除得陳州張戴人方愈一日戴人承詔至汴京曹大使乃邀戴人問焉戴人曰小腸遺熱於大腸為伏瘕故結硬如塊面黃不月乃用湧泄之法數年病不再旬而效女由是得聘企賢問誰治之曹大使曰張戴人企賢立使邀之凡婦人月事沉滯數月不行肌肉漸減內經曰小腸熱已滿移於大腸則伏瘕為沉沉者月事沉滯不行故云伏晛急宜桃仁承氣湯加歸大作劑料煎服立效復用四物湯補之更服宣明中檳榔丸療婦人血瘕痛出聖惠方乾薑烏賊魚骨各一兩炙桃仁一兩去皮尖炒研上搗散酒服二方寸匕日二一方無桃仁又方出聖惠方上取古鐵稱錘或大斧頭或鐵杵以炭火燒令赤投酒三升中稍飲之又方出聖惠方上桂末溫酒服方寸匕佳日二療婦人血瘕攻刺腹脅時痛導藥方出聖惠方大黃當歸各半兩山茱萸一兩皂莢一兩去皮子細辛戎鹽各六銖案此方缺服法三稜煎丸出濟生方治婦人室女血瘕月經不通臍下堅結大如杯升久而不治必成血蠱京三稜蓬朮各二兩芫花半兩青皮去瓤淨一兩半上銼如豆大用好醋一升煮乾焙為細末醋糊為丸如梧桐子大每服五十丸食前淡醋湯吞下治婦人血蠱大抵經脈不通即成血蠱馬鞭草水楊梅根杜牛膝根澤蘭根杜當歸各等分上打爛浸酒無時溫服硇砂丸治血蠱塊等疾硇砂半兩虻蟲四十九個水蛭炒黑粉霜三錢丁香乾漆炒令煙出白丁香甘遂炮牡蠣大麥炒檳榔各五錢膽礬三錢阿魏一錢研大棗五十枚去皮核木香五錢上為細末用棗肉丸每服十丸任湯使下琥珀丸出醫方集成治婦人血瘕腹中有塊攻刺小腹腫重或腰背相引而痛久而不治黃瘦羸乏琥珀別研白芍藥川烏炮去皮川牛膝去蘆酒浸鱉甲醋炙蓬莪朮炮當歸去蘆酒浸紫厚朴薑製不炒各一兩木香不見火澤蘭葉官桂不見火各半兩麝香別研半錢上為細末酒糊為丸如梧桐子大每服七十丸空心溫酒米飲任下硝石湯出千金方治虛瘕月水留為瘀血大便不通下病散堅血方硝石附子虻蟲各三兩大黃細辛乾薑黃芩各一兩芍藥土瓜根丹參代赭蠐螬各二兩大棗十枚桃仁二升牛膝一升朴硝四兩上㕮咀酒五升水九升漬藥一宿明旦煎取四升去滓下朴硝硝石煬盡分四服相去如炊頃去病後食黃鴨羹勿見風治婦人血瘕痛臍下脹不下食出拔萃方當歸二兩桂心芍藥血竭蒲黃各一兩半延胡索一兩上為細末每服二錢無灰酒調下丁香脾積丸出八宜方治血蠱莪朮三兩三稜二兩良薑二兩青皮一兩丁香木香各半兩皂莢三大枚燒存性巴豆半兩去殼別研上以莪朮三稜良薑三味同米醋一升於瓷器內煮乾將三味並乘熱切碎同焙乾為末入百草霜三匙並巴豆同細研麵糊為丸如麻仁大每服五丸或七丸至十五丸二十丸止食傷隨物下脾積氣陳皮湯下吐酸薑湯下小兒疳四君子湯下孕婦勿服如血鼓加琥珀麝香飲湯下破血瘕痛出本草用越砥石燒投酒中服治婦人血瘕出本草以烏賊魚骨細研為末米飲下之治婦人血瘕及積塊出本草以山蒜苦醋磨服多妙五曰脂瘕脂瘕者婦人月水新來若生未滿三十日以合陰陽絡脈分胞門傷子戶失禁關節散五臟六腑津液流行陰道瞤動百脈關樞四解外不見其形子精與血氣相遇犯禁子精化不足成子則為脂瘕之聚令人肢滿裡急痛疾痹引小腹重腰背如刺狀四肢不舉飲食不甘臥不安席左右走腹中切痛時瘥時甚作者少氣頭眩身體解惰苦寒惡風膀胱脹月水乍來乍去不如常大小便血不止有此病者令人無子療之當刺以長針行以毒藥瘕當下即愈矣療脂瘕出聖惠方皂莢十餘銖去皮子礬石六銖燒五味子蜀椒去汗細辛乾薑半兩上搗散以香脂和如大豆著男子陰頭以合陰陽不三行其瘕乃愈治婦人絶不復生及未曾生皆以脂瘕腹中有塊以湯煎自下尚不受子導散方出聖惠方皂莢炙去子皮吳茱萸當歸各一兩蜀椒去汗各二兩細辛熬礬石燒五味子各三兩大黃戎鹽乾薑各二兩上搗篩散以輕絹袋如指大長三寸盛藥令滿納陰中坐臥隨意勿行走小便時去之別換新者六曰狐瘕狐瘕者婦人月水當日數來而反悲哀憂恐或遠行逢暴風疾雨雷電驚恐衣被沉濕疲倦少氣心中恍惚未定四肢懈惰振寒脈氣絶精神遊亡胞氣入於陰里不去則生狐瘕之聚食人子臟令人月水閉不通小腹瘀滯胸脅腰背痛陰中腫小便難胞門子戶不受男精五臟氣盛令人嗜食欲嘔喜睡多所思如有娠狀四肢不舉有此病者終身無子其瘕有手足成形者殺人也未成者可療以長針急持刺之行以毒藥有法瘕當下即愈矣療狐瘕出聖惠方上取新死鼠一枚裹以新絮塗以黃土穿地坎足沒鼠形置其中桑薪灼其上一日一夜出絮納桂心末六銖酒服二方寸匕病當下甚者不過再服瘥七曰蛇瘕蛇瘕者婦人月水已下新止適閉未復胞門子戶勞傷陰陽未平復榮衛分行若其中風暴病羸劣飲食未調若已起當風及度泥塗因沖寒太早若坐濕地名陰陽亂腹中虛且未飲食若遠行道路飲汙井之水不潔之食吞蛇鼠之精留結不去則生蛇瘕之聚上食人之心肝長大其形若膝在臍下上還㽱左右脅不得氣兩股脛間若漆疾小腹急小便赤黃膀胱引陰中攣急腰背俱痛難以動作苦寒熱月水或多或少有此病者不復生子其瘕手足成形者殺人未成者可治之療有法行以毒藥瘕當下即愈矣療蛇瘕方出聖惠方大黃黃芩芒硝各半兩甘草大如指一尺炙烏賊魚骨二枚皂莢六枚去皮子尖醋炙上搗以水六升煮之三沸下絞去渣下硝通口溫服之十日一劑空心服服之當下八曰鱉瘕鱉瘕者婦人月水新至其人劇作疲勞衣服潤濕不以時去若當風睡兩足踐濕地恍惚覺寤跖立未安顏色未平復見所好心為開魂魄感動五內脫消若入水浣洗沐浴不以時出神不守水氣與邪氣俱入至上三焦之中募玉門先閉津液妄行留結不去則生鱉瘕之聚大如小盤令人小腹切痛惡氣走上下腹中苦痛若存若亡按之躍手不利陰里腰背亦痛不可以息月水喜敗不通面目黃黑脫聲少氣有此病者令人絶子其瘕有手足成形者殺人未成者可治之療有法度以長針按療之行以毒藥鱉瘕當下即愈矣療鱉瘕方出聖惠方大黃六分乾薑側子各半兩附子人參各九銖蟅蟲一寸匕熬桂心一兩六銖細辛土鱔各十八銖白朮一兩上搗散以酒服方寸匕日三以上八般瘕疾出古今録驗治龜瘕及心腹宿症及卒得症上以白雄雞屎無問多少小便和之於器中火上熬令燥每服方寸匕多服不限度以膏熬飯飼彌佳食症附論夫婦人食症者由臟腑虛弱月候來時食生冷之物脾胃既虛不能消化與臟氣相搏結聚成塊日漸生長盤牢不移故謂食症也方續隨子方治婦人食症積年不瘥續隨子一兩微炒雄黃一分另研木香一分胭脂一分麝香一分研入乾薑一分炮製銼硃砂一分細研硇砂不夾石者一分細研上為細末和研了藥令勻酒煮麵糊丸如緑豆大每服薑湯下三丸乾漆丸治婦人食症夾惡血氣攻刺腹脅痛不止乾漆一兩細研芫花一分醋拌炒令乾當歸一分銼微炒五靈脂一分硇砂一兩細研香墨一分麝香半兩細研巴豆十枚去皮心紙裹壓去油上為末同研令勻用醋煮麵糊和丸如緑豆大每服空心溫酒下五丸硇砂丸治婦人食症塊久不消攻刺心腹疼痛青礞石末巴豆去皮心油硃砂粉霜並研木香末各一分硇砂半兩上研令勻以糯米軟飯和丸如緑豆大每服二丸空心溫酒下取下惡物為度破症丸治婦人食症塊攻心腹疼痛巴豆十枚去心皮研紙裹壓去油川烏頭一分炮製去皮臍膽礬一分五靈脂一分芫花一分醋炙乾百草霜上為末煮棗肉和丸如緑豆大每服以生薑醋湯下五丸化症丸治婦人食症腹脹氣急面目浮腫四肢無力硇砂半兩細研巴豆十枚去皮心研紙裹壓去油五靈脂半兩乾薑半兩炮製銼雄雀糞半兩微炒黃豬牙皂莢半兩去皮子塗酥炙令黃上為末同研令勻用醋煮麵糊丸如緑豆大每服空心溫酒下五丸芫花丸治婦人宿食不消結成症塊兼血氣疼痛巴豆二十枚去皮心研紙裹壓去油芫花一兩醋拌炒令乾川烏頭半兩炮去皮臍防葵一分硇砂半兩細研麝香一錢細研上為末同研令勻用頭醋煎為膏和丸如梧桐子大每服以當歸酒下三丸香墨丸治婦人積食症及血氣香墨半兩芫花一兩醋拌炒令乾川大黃半兩銼碎微炒青礞石半兩巴豆一分去皮心研紙裹壓去油硇砂半兩細研上為末同研令勻醋煮糊丸如小豆大每服空心暖乾薑湯下五丸硫黃丸治婦人食症久不消硫黃半兩細研硃砂半兩細研青礞石半兩細研芫花一分醋拌炒令乾為末麝香一錢細研巴豆半兩去皮心研紙裹壓去油上研令勻以酒煮麵糊和丸如緑豆大每服空心以生薑酒下三丸五靈脂丸治婦人食症體瘦成癆心腹脹痛不進飲食常吐酸水五靈脂半兩硫黃半兩細研硇砂半兩不夾石者細研木香半兩芫花半兩醋拌炒令乾巴豆四十九枚去皮油上為末入研了藥令勻以醋煮麵糊丸如緑豆大每服空心生薑橘皮湯下二丸膩粉丸治婦人遠年食症黃瘦不欲飲食宜服膩粉一錢硇砂一錢青黛赤石脂各一錢巴豆十枚去心油上都研令極細以蒸餅和丸如緑豆大每日五更初酒下三丸如下得惡物看多少次日更加減服之治婦人久積食症及經脈不通心腹疼痛宜服此方出聖惠方硇砂一兩細研巴豆一兩去心紙裹壓油芫花一兩醋拌炒令乾搗末上細研令勻用酸醋三升同煎成膏候可丸即丸黍米大空心以當歸酒下三丸草粉散出聖惠方治婦人久積食症腹中結塊面身浮腫宜服雄雀糞半兩微炒細研膩粉半兩上藥以搜了面一雞子大相和擀作餅子爆熱候乾搗羅為散每服一錢五更初溫酒調服以利下惡物為效食魚鱠及生肉在胸膈不化必成症出本草上用搗馬鞭草汁飲之一升生薑水亦得即消血症附論夫婦人積年血症塊者由寒溫失節臟腑氣虛風冷在內飲食不消與血氣相結漸生塊症盤牢不移動者是也此皆因氣血勞傷月水往來經絡痞澀惡血不除結聚所生也久而不瘥則心腹兩脅苦痛害於飲食肌膚羸瘦也血之為病胃悶煩躁迷忘驚狂痰嘔汗多骨熱肢冷此外證然耳何以知其蓄在下焦曰臍下結急外熱內痛尺脈洪而數也桃仁靈脂生地黃北大黃甘草祛逐之方阿魏丸治婦人乾血氣血症塊血竭硇砂各三錢丁香二錢蓬朮京三稜沒藥各半兩芫青炒紅娘子虻蟲水蛭炒各二錢阿魏半兩乾漆四錢炒令煙盡地膽半兩斑蝥二錢炒去翅海馬一對炒甘遂半兩人參半兩當歸一兩豬脊半兩麝香少許穿山甲三錢蛤粉炒上為細末醋糊丸每服三十丸空心醋湯下琥珀丸出聖惠方治婦人積年血症塊不消若鬼胎之候琥珀研桂心牛膝芫花制檳榔桃仁各三分炒生地黃延胡索當歸各半兩鱉甲三稜乾漆炒硇砂各一兩大黃二兩虻蟲四十九枚去翅足炒水蛭四十九枚炒上為末醋煮硇砂為膏入藥末和搗三二百杵丸如梧桐子大每服十丸空心溫酒下消腹內血塊出百一選方船上茴香益智仁延胡索陳橘皮肉桂蓬朮川薑各半兩附子兩個炮去皮臍乳香沉香白朮人參當歸木香白芍藥各一兩上為細末棗肉為丸每服六十丸米醋湯吞下溫酒亦得沒藥丸治婦人血塊血積血症及候不行沒藥研麒麟竭丁香炒沉香各一錢桂去粗皮京三稜炮銼蓬莪朮炮銼當歸切炒各半兩斑蝥糯米同炒去頭足翅一分芫花半兩醋炒焦乾漆一兩炒煙出蕓薹子一分炒硇砂半兩研上搗研為末和勻醋煮麵糊丸如梧桐子大每服十丸至二十丸空心食前生薑醋湯下治風血症瘕塊出本草上取冬桑灰淋醋汁作食服三升又方出本草上取鱉一頭治如食法以桑灰汁煎如泥和諸症藥重煎堪丸衆手捻成丸日服十五丸癥瘕痃癖無不瘥者大腹皮飲出大全良方治婦人血癭單單腹腫大腹皮防己木通厚朴薑製栝蔞黃耆枳殼麩炒桑白皮炙大黃蒸陳皮青皮五味子各等分上㕮咀每服稱一兩水一盞半煎至六分去滓入酒一分溫服不以時候乾漆丸出聖惠方治婦人積年血症塊或攻心腹疼痛四肢不和面少血色飲食全少乾漆炒令煙盡大黃炒各一兩琥珀硇砂研硝石研莪朮各三分紅花延胡索桂心各半兩膩粉一分巴豆三七粒去皮心研去油用漿水三盞研如餳上為細末用棗肉和丸如梧桐子大每服五丸於日未出時煎蘇木湯吞下量患人輕重加減服之石莖散出三因方治婦人血結胞門或為癥瘕在腹脅間心腹脹滿腫急如石水狀俗謂之血蠱石莖一兩當歸尾馬鞭草紅花炒烏梅肉各半兩蓬莪朮三稜並炮蘇木節沒藥琥珀別研各一分上為末濃煎蘇木酒調下二錢不飲酒薑棗煎湯亦可調下治婦人血膈若血崩者服之經血膈者服之出百一選方生地黃熟地黃甘草炙柴胡白芍藥當歸地骨皮牡丹皮玄胡索川芎各二兩用上為粗末每服三錢水一盞同古老錢一兩文煎至熟入麻油一兩點候煎及八分去滓熱服空心食前忌魚腥之類如聖丸出聖惠方治婦人血症積久不散值天陰即疼痛宜服硇砂一分砒一分硝石一分以上三味同研如粉當歸一兩別搗羅為末桂心乾薑炮製牛李子酒拌炒乾以上各半兩一處搗羅為末巴豆半兩細研紙裹壓去油上藥用無灰酒一升入當歸末及巴豆於瓷器中慢火熬成膏下硇砂三味攪令勻次下諸藥末拌和為丸如緑豆大每日空心溫酒下三丸晚食前再服以利下惡物為度烏頭丸出聖惠方治婦人積年血氣症塊往來疼痛或吐逆不納食漸黃瘦至極者川烏頭半兩炮裂去皮臍乾薑半兩炮製銼當歸半兩銼微炒赤芍藥半兩大黃一兩微炒桂心半兩斑蝥十一枚糯米拌炒令黃去翅足上為末同醋煮麵糊丸如緑豆大每服空心以酒下五丸五靈脂丸出聖惠方治婦人積年症塊及惡血氣久不除五靈脂乾漆炒煙川烏各一兩炮麝香硫黃硇砂並研各半兩巴豆三十枚去皮醋煮赤上為末研勻醋煮麵糊丸如緑豆大每服五丸空心溫酒下生兒丹出仁存方治婦人衝任虛損經脈不調積滯留住血閉血塊血症血瘕血癖停阻腰腳臍腹久痛寒熱有時面赤口乾黃瘦困倦四肢顫掉起坐艱迤邐勞疾喘嗽盜汗便溺頻多鬢髮脫落或室女經脈滯結皆療之牡丹皮頭紅花肉桂去皮川當歸去苗各一兩丁香揀半兩硃砂半兩為末馬鳴退灰三錢上為細末煉蜜為丸如梧桐子大每服十丸空心食前熱酒下日進三服十日減病二十日驗一月大效如睡臥不寧加人參更妙視患者老少輕重加減芫花丸出聖惠方治婦人積年血症塊不消時有疼痛芫花半兩醋拌炒令乾硃砂三分細研硇砂一兩不夾石者細研麝香一錢川大黃半兩碎微炒搗作末桃仁半兩湯浸去尖雙仁麩炒黃上為末用醋煮麵糊為丸如小豆大每日空心以溫酒下十丸硇砂丸出聖惠方治婦人數年症塊不消硇砂乾漆雄黃巴豆十枚去油水銀以小肥棗研無星雄雀糞各一分上研停用棗肉丸如緑豆大空心當歸酒下三丸臨臥再服取下惡物為度黑聖散出聖惠方治婦人積年血氣症塊攻心痛疼悶亂遍宜服白馬護干一兩燒灰赤騾護干一兩燒灰紫驢護干一兩燒灰乾漆一兩搗碎炒令煙出麝香一分細研上為散入麝香更研令勻每服不計時用熱酒調下一錢治婦人積年血症塊不消腹脅疼痛出聖惠方硇砂三分硫黃三分水三大盞煮盡取出麒麟竭三分末巴豆一分去皮心紙裹除去油炒令黃上細研用糯米飯和丸如黍粒大每服空心當歸酒下五丸大黃煎出聖惠方治婦人積年血氣症塊結痛川大黃三分碎微炒鱉甲一兩塗醋炙令黃去裙襴牛膝一兩去苗乾漆一兩搗碎炒令煙出上為末用米醋一升煎為膏每服食前熱酒調下一錢大紅花丸出宣明論治婦人血積聚癥瘕經絡滯澀川大黃紅花各二兩虻蟲十個去翅足上取大黃七錢醋熬成膏和藥丸如梧桐子大每服五七丸溫酒下食後日三服烏金散出三因方治婦人血氣血症血風勞心躁煩筋骨疼痛四肢困瘦好黑豆十兩沒藥當歸各半兩洗焙乾為末上先將黑豆不犯水淨拭用砂瓶一隻入豆在內以瓦片蓋鹽泥固濟留嘴通氣炭灰二斤煅煙盡存性以鹽泥塞瓶嘴退火次日取出豆如鴉糞研細為末後入研勻不拘時候溫酒調下二錢重者不過三五服忌鯉魚毒肉水母之類治婦人積年血氣症塊結痛出聖惠方芫花一兩醋拌炒令乾當歸一兩微炒桂心一兩上為末以軟飯和丸如梧桐子大每服食前熱酒送下十丸尉症法上用茱萸二升擘之以酒和煮熟布裹尉症上冷更炒更用之症移走逐尉之候消乃止也治婦人病塊脈訣所謂澀脈如刀刮竹行主丈夫傷精女人敗血以舟車丸百餘粒後以調胃承氣湯加當歸桃仁三換水煎乘熱投之兩日又以舟車丸桃仁承氣湯瀉青黃膿血雜然而下每更深以手向下推之探之則出後三二日又用舟車丸以豬腎散佐之一二日又以舟車丸通經如前數服病十去九候晴明當未食前以針瀉三陰交穴不再旬塊已滅矣酌聖丹出仁存方治婦人血積血塊血氣産後諸血滯痛寒熱四肢困倦腳頑麻沉重黃瘦臍腹久冷巴豆三十個去皮心細研鹽醋一盞熬膏半盞沒藥半兩末蓬莪朮四錢上丸如梧桐子大每服三五丸紅花酒下三兩服積滯惡血自過空心食前服虛衰婦人加乾薑一兩治婦人血結腰腹痛上用牛膝一大把並藥不以多少酒煮服之立愈治婦人血瘕痛出本草上用大黃三兩搗篩以酒二升煮十沸頓服治婦人破血通久積上取澤蘭細銼之用絹袋盛懸於屋南畔更宜令乾用治婦人血塊出本草以牛膝干根淨洗切焙乾搗下篩酒煎溫服極效治婦人血塊出本草以蛤蜊煮食之治婦人血塊出本草用獨腳仙夏採根葉連梗焙乾為末酒煎半錢服之治老血結塊破血止血出本草用楊廬甘煮服之治破血出本草用馬莧汁飲之治破血出本草以桃根煮服之三載者良疝瘕附論大全良方云夫婦人疝瘕之病者由飲食不節寒溫不調氣血勞傷臟腑虛弱受於風冷冷入腹內與血相結所生疝者痛也瘕者假也其結聚浮假而痛推移乃動也婦人之病有異於丈夫者或因産後血虛受寒或因經水往來取冷過度非獨飲食失節多挾於血氣所成也診婦人疝瘕其脈弦急者生虛弱小者死又尺脈澀如浮牢為血實氣虛也其發腹痛逆氣上行此為婦人胞中絶傷有惡血久則結成瘕也方乾漆散出聖惠方治婦人疝瘕久不消令人黃瘦尫羸兩脅妨悶心腹疼痛乾漆炒令煙盡木香芫花醋炒赤芍藥桂心當歸川芎琥珀各半兩大黃二兩炒牛膝三分桃仁一兩麝香一分上為細末無時溫酒調下一錢當歸散出聖惠方治婦人疝瘕及血氣攻刺心腹疼痛不可忍當歸一兩微炒鱉甲三兩塗酥炙令黃去裙襴芎藭半兩蓬莪朮二分吳茱萸半兩湯淘七次焙乾微炒桂心一兩赤芍藥三分木香半兩檳榔一兩青橘皮半兩湯浸去白瓤焙川大黃一兩微炒桃仁三分去皮尖雙仁麩炒上為散每服三錢水一盞入生薑半分煎至六分去滓不計時候稍熱服琥珀丸治婦人疝瘕兼血氣臍腹疼痛不欲飲食四肢羸瘦琥珀半兩細研當歸半兩微炒芎藭半兩牛膝一兩去苗京三稜一兩煨微炒桂心半兩川大黃一兩銼碎微炒川烏頭半兩炮裂去皮尖乾漆半兩搗碎炒令煙出桃仁三分湯浸去皮尖雙仁麩炒黃鱉甲一兩塗酥炙令黃去裙襴上為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候暖酒下二十丸木香散治婦人疝瘕及血氣積聚時攻腹脅疼痛木香半兩巴豆一分去皮心麩炒黃紙裹壓去油乾漆半兩搗碎炒令煙盡吳茱萸一分湯浸七次焙乾檳榔半兩白蕪荑一分豬牙皂莢一分去皮塗酥炙令黃去子附子一分炮裂去皮臍當歸桂心乾薑炮製銼以上各一分上為末煉蜜和搗三五百杵丸如梧桐子大每日空心及痛發時煎紅藍花當歸酒下三丸桓聖丸治婦人疝瘕惡積聚並月候不通斑蝥半兩糯米拌炒令黃去翅足桂心硇砂半兩細研麒麟竭沒藥莽草微炒狼毒鬼箭羽沒心草各半兩上為末醋煮麵糊和丸如梧桐子大每日空心食前煎紅藍花溫酒下五丸桃仁散治婦人疝瘕腹中拘急心脅脹滿宜服桃仁一兩湯浸去皮尖雙仁麩炒微黃芎藭檳榔上為散每服四錢水一盞入生薑半分煎至六分去滓食前溫酒服之當歸湯治婦人寒疝虛勞不足若産後腹中絞痛當歸芍藥各二兩子母祕録作甘草生薑五兩羊肉一斤上㕮咀以水八升煮羊肉熟取湯煎藥得三升適寒溫服七合日三金匱要略胡洽不用芍藥名小羊肉湯硇砂丸出聖惠方治婦人疝瘕及積瘀血在臟時攻腹脅疼痛川芒硝硇砂各一兩當歸雄黃桂心各半兩大黃炮三稜各二兩上為細末用米醋一碗熬大黃末為膏以入余藥末和丸如梧桐子大空心溫酒吞十丸漸加至三十丸以利下惡物為度黑神丸出大全良方神麯茴香各四兩木香檳榔四枚椒炒香出汗丁香各半兩漆六兩半生半用重湯煮半日令香上除椒漆五物皆半生半炒為細末用前生熟漆和丸如彈子大茴香末十二兩鋪陰地陰乾候丸干並茴香收器中極干去茴香腎余肓腸膀胱痃癖及疝墜五膈血崩産後諸血漏下赤白並一丸分四服死胎一丸皆綿灰酒下難産炒葵子四十九枚搗碎酒煎下一丸諸疾不過三服痃氣十服膈氣癥瘕五服血瘕三丸當瘥豫族子婦病腹中有大塊如杯每發痛不可忍時子已貴京下善醫者悉常集服藥莫愈陳應之曰此血瘕也投黑神丸盡三丸大塊盡消終身不復作巴豆丸出聖惠方治婦人疝瘕及血氣疼痛巴豆一分去皮心醋炙半日桃仁三分木香半兩上為末煉蜜為丸如緑豆大淡湯空心下五丸熱酒亦可鱉甲散出聖惠方治婦人疝瘕及血氣心腹疼痛鱉甲一枚中者以小便半盞塗炙令盡為度去裙襴乾漆一兩搗碎炒令煙出當歸一兩銼微炒琥珀一兩桂心半兩上為散每服不計時候熱酒調下三錢大黃丸出聖惠方治婦人疝瘕及胞門中積瘀諸病並宜服川大黃四兩蒸飯熟為度炙乾土瓜根二兩牛膝二兩去苗桃仁三兩湯浸去皮尖雙仁麩炒微黃上為末煉蜜和搗三二百杵丸如梧桐子大每服食前粥飲下三十丸治疝瘕小腹及陰中相引痛自汗出欲死以丹參一兩杵為散每服熱酒調下二錢匕佳症痞附論夫婦人症痞者由冷熱不調飲食不節積在腹內或腸胃之間與臟相結搏其牢強推之不移名曰症言其病形徵可驗也氣壅塞為痞言其氣痞澀不宣暢也皆得冷則發動刺痛症痞之病其形冷結若冷氣入於子臟則使無子若冷氣入於胞絡搏於血氣血得冷則澀亦令月水不通也治婦人症痞及惡血氣攻心腹疼痛面無顏色四肢瘦弱宜服方恆山丸治臍下堅癖無所不治方千金云遼東都尉所方恆山大黃巴豆天雄二枚苦參白薇乾薑人參細辛根芽龍膽沙參玄參丹參各三分芍藥附子牛膝茯苓各五分牡蒙四分藋蘆六分一方云二兩三分上為末蜜丸宿勿食服五丸日三大羸瘦月水不調當二十五日服之下長蟲或下種種病除三十五日腹中所苦悉愈肌膚盛五十日萬病除斷根者有子蓬莪朮丸治婦人症痞腹痛莪朮三錢當歸炒桂心赤芍藥檳榔枳殼木香昆布琥珀各半兩桃仁鱉甲大黃各一兩上為末煉蜜丸如梧桐子大食前粥飲下二十丸穿山甲散治婦人症痞及血氣凝滯心腹妨痛四肢羸瘦時吐清水不欲飲食穿山甲炙令黃色京三稜微炮銼二兩木香檳榔桂心各一兩白朮三分鬼箭羽半兩桃仁三分湯浸去皮尖雙仁麩炒微黃川大黃銼碎微炒一兩鱉甲一兩半塗醋炙令黃去裙襴當歸銼微炒防葵各三分上為散每服四錢水一盞生薑半分煎至六分去滓食前稍服硇砂煎丸治婦人積年血氣症痞不消四肢黃瘦腹脅妨痛經絡不通宜服硇砂一兩細研乾漆川大黃各一兩以上三味並搗羅為末以無灰酒一升慢火熬成膏入後藥鱉甲一兩塗醋炙令黃去裙襴沒藥五靈脂各一兩狗膽一枚斑蝥七枚糯米拌炒令黃去翅足水蛭十枚炒令微黃巴豆七枚去皮心研紙裹壓去油上為末入煎膏和搗三二百杵丸如小豆大每於食前暖酒下五丸大黃丸治婦人症痞及惡血築心悶亂疼痛四肢不和身體羸瘦不欲飲食川大黃一兩銼碎微炒鱉甲一兩塗醋炙令黃去裙襴乾漆二分搗碎炒令煙出荊三稜一兩微炒炮銼吳茱萸半兩湯淘七次焙乾微炒琥珀三分細研桂心半兩檳榔三分防葵半兩川烏三分炮裂去皮臍上為末以釅醋一升半熬令稠煮麵糊和丸如梧桐子大每服不計時候以生薑醋湯下二十丸防葵散治婦人症痞心腹脹硬如石經絡不利四肢瘦弱少思飲食防葵郁李仁湯浸去皮微炒桂心鬼箭羽桃仁湯浸去皮尖雙仁麩炒黃川大黃銼碎微炒以上各一兩吳茱萸一分湯浸七次焙乾炒當歸一兩枳實半兩麩炒上為散每服三錢水一盞入生薑半分煎至六分去滓食前稍熱服桃仁散治婦人症痞心腹脹滿不能飲食體瘦無力桃仁一兩湯浸去皮尖雙仁麩炒微黃訶黎勒皮白朮當歸各三分醋三稜一兩微炒銼赤芍藥三分鱉甲一兩半塗醋炙黃去裙襴陳橘皮三分湯浸去白瓤焙上為散每服三錢水一盞入生薑半分煎至六分去滓食前稍熱服之鱉甲丸治婦人症痞冷氣或時攻心腹痛不能食四肢瘦弱鱉甲一兩塗醋炙令黃去裙襴木香半兩川大黃一兩半銼碎微炒當歸三分銼碎微炒用安息香半兩桂心半兩附子半兩炮裂去皮臍阿魏半兩面裹煨以面熟為度上為末煉蜜和搗三百杵丸如梧桐子大每服食前暖酒下二十丸丁香丸治婦人症痞結塊不散心腹疼痛雄雀糞炒黃鱉甲各一兩硇砂當歸炒芫花醋炙乾各半兩巴豆一分去皮心油上為末同研令勻醋煮麵糊丸如小豆大當歸酒下三丸香墨丸治婦人症痞香墨硫黃硇砂硃砂各半兩麝香一分巴豆半兩去皮心紙裹壓去油上藥同研令極細以醋煮麵糊和丸如緑豆大每服空心以溫酒下三丸水銀丸子治婦人症痞結塊不散心腹疼痛水銀一兩硫黃半兩硇砂一兩硝一分白礬一分芫花一兩醋拌炒令乾搗末上藥同研如面入銚子中簇火漸燒起將濕紙搭卻將下候冷更燒如此三度即止候冷都細研令勻用軟飯和丸如緑豆大每食前酒下七丸芫花丸治婦人症痞心腹脹硬疼痛芫花大戟甘遂各一兩木香半兩別搗為末巴豆一兩去皮心紙裹壓去油上先以芫花等四味搗碎用米醋一大盞煮令乾搗為末研入巴豆以醋煮麵糊丸如緑豆大每空心服以生薑湯下二丸穿山甲散治婦人症痞及惡血氣攻心腹痛面痿肌瘦穿山甲灰炒鱉甲醋炙赤芍藥大黃炒乾漆炒令煙盡桂心各一兩川芎芫花醋炙當歸各半兩麝香一分上為細末入麝香合勻每服一錢無時熱酒調下
