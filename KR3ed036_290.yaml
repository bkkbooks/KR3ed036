body:
  text: 卷二百九十癰疽門便毒附論夫腎為作強之官所藏者志也男女大欲不能以直遂其志故敗精搏血留聚中途而結為便毒矣夫人腳腿與小腹合縫之間精氣所出之道路也或觸景而動心或夢泄而不泄既不得偶合陰陽又不能忘情息念精與血交滯其不為腫結也幾希便毒處所上不在腹下不在腿介乎兩間之中是也嘗怪世俗無知才覺有便毒證狀必以為熱氣所攻每每薄衣露足遂使寒邪乘之熱氣轉不得散日復一日敗精宿血愈聚而愈結焉不思一身宗筋上絡於舌本下聚於陰器筋得寒則急急則縮甚至傴僂而不獲伸於斯時也百藥並陳亦難責效況復從事於寒涼者乎治法散寒利熱泄其腎邪活其血脈是為捷徑外此老人氣滯亦或有之方連翹湯治便毒腫結連翹獨活川升麻射干木通桑寄生赤茯苓甘草炙各七錢半大黃生用木香乳香沉香各半兩上銼細每服三錢水一盞半慢火煎服復元通氣散治便毒初發用此方穿山甲酒浸炙焦二兩天花粉酒浸一宿焙白芷舶上茴香炒白牽牛末炒延胡索擦去皮南木香當歸甘草炙各一兩青木香半兩上為細末每服二錢溫酒調食前服不飲酒南木香煎湯下治便毒胡椒十二粒燒過五分樺皮一兩半燒過五分穿山甲一兩蛤粉炒皂角針一兩炒山梔子一兩炒乳香半兩沒藥半兩甘草末半兩上為細末每服二錢溫酒調下食前服雙解湯治便毒門蘊熱氣外挾寒邪精血交滯腫結疼痛辣桂川大黃生白芍藥澤瀉牽牛炒取末桃仁去皮炒乾各一兩甘草半兩上為粗末每服三錢水一盞半姜五片食前服日兩服先小便快熱從小便出後大便利皆是調毒治便毒大黃黃連枳殼甘草穿山甲上㕮咀為飲子酒水各半盞煎十分濃露一宿次早空心服上半日不可吃食更忌熱物免吐又方黃瓜大黃芒硝甘草節上用水二盞煎至八分空心服調理甚妙威靈仙散治發背便毒威靈仙貝母白芷甘草各等分上㕮咀每服半兩酒水煎服治男子婦人便毒驗如神殭蠶七個炒去絲大黃一兩重麝香二字硝少許上為細末好煮酒調和必要起五更服之如過動即可如不過再用一服已成膿者小便去之未成即散千金托裡散治便毒惡瘡一服取效如經三五日已結成腫核連進二三服為妙腫則先用烏龍膏貼之蛇床子炒牡蠣煅甘草節生用大黃各二兩上㕮咀每服五錢水一盞酒半盞隔宿煎露一宿次早五更服如大便實加大黃後另下入藥去二三行臟腑病隨藥去治便毒絶妙胡桃五個栝蔞一個樺皮少許上燒存性為末酒調空心下治便毒腫痛雄黃乳香各二錢半黃柏一錢上為細末分作兩服以新水調敷自平又方治便毒大黃明礬胡桃肉各等分上同研為末丸如彈子大空心不嗽口細嚼一丸好酒送下忌煎炒熱火物退毒飲治便毒腫結穿山甲半兩蘸法醋炙焦木豬苓三錢法醋微炙上為末每服二錢食前老酒調下次以法醋煮肥皂研膏敷之妙治便毒木鱉子一兩去殼甘草節一兩上為末好酒一碗煎之熱服貝母丸治便毒瘰癧有效貝母皂角子各半斤上為細末用皂角半斤銼碎搓揉濃水濾過作膏子和藥末丸如梧桐子大每服五七十丸早晨酒下凡便毒證服二藥不效可服五香連翹湯十奇內補散治便毒並治癰腫未有頭必穴方用牛蒡子一半炒一半生碾為末空心酒調服愈單用牛蒡根敷之亦可又方用斑蝥七個去頭翅足為細末入海金沙半匙酒調露一宿早空心服忌食至午飯小便中見毒方用粥調理甚妙此方多效治便毒用楮桃三十二個酒煮服大病不禁二服無膿服者隨氣自散皂角膏治便毒癰疽等用皂角一條長尺以上者捶碎法醋煮爛研成膏敷之屢效膠方治便毒初發用水膠用水溶開塗敷若便毒已大而軟則用魚鰾膠於熱湯中煮軟乘熱研爛敷之或要換藥以熱湯洗去治便毒用紫背草研醋調敷之治便毒初發用生薑一大塊米醋一合姜蘸醋磨取千步峰泥敷於作處即千步峰即人家行步地上有高塊者是治𤻼氣即𤷍癧血餘一兩燒灰研為細末即人發錦紋大黃一兩面裹煨過豬牙皂角三錢上半為㕮咀半為末先以㕮咀用水一盞半煎至七分卻入好酒二盞去滓調前件藥末空心服之前藥分作三服又方知母一兩貝母去心一兩上各為細末紅酒調下飲醉為妙更以酒調藥塗患處治𤷍方穿山甲蚌粉同炒上為末麻油輕粉調敷石霜膏風化石灰百草霜等分上為末以米醋調鵝毛順手掃起治𤷍方亦治便毒用大幹芭蕉葉尉斗內燒存性為末麻油輕粉打和敷𤷍留頭以軟紗貼換易三次或散或破無痕一方法醋生薑自然汁調敷破毒散治便毒橫痃已成未成隨即消散應效如神滑石末三錢斑蝥炒去頭翅足三個為末上二件和勻分作三服空心食前一日服畢少用茶湯調下毒氣俱從小便中出如小便疼痛濃煎車前子木通燈心澤瀉湯頓服即已治便毒敷藥毒潰時用白芨沒藥乳香血竭為末糝效一醉散治疽𤷍貝母香白芷上等分為末酒服次飲酒醉為妙酒醒而病去矣又方煎犀角飲子調五苓散服癤附論夫癤者由風濕冷氣搏於血結聚所生也人運役勞動則陽氣發泄因而汗出遇冷濕氣搏於經絡血得冷折則結澀不通而生癤腫結如梅李也又云腫一寸二寸為癤也其不消而潰者即宜紝捻去膿至清血出若膿汁未盡其瘡合者則更發也其著耳頷頸腋下若膿汁不盡多變成瘻也方生乾地黃丸治熱毒瘡癤腫硬生乾地黃二兩川大黃二兩碎銼微炒赤芍藥赤茯苓甘草生銼王不留行遠志去心桂心川升麻黃芩麥門冬去心焙人參去蘆頭各一兩上為細末煉蜜和搗二三百杵丸如梧桐子大不計時以溫水下三十丸防風當歸散治諸般瘡癤等毒熱瘡防風半兩甘草節半兩赤芍藥半兩綿黃耆半兩當歸半兩白芷半兩左纏藤半兩皂角刺半兩肉桂陰證用一兩陽證用半兩大黃陽證用半兩陰證用一錢上㕮咀水四碗砂瓶內煎至兩碗入好酒一碗再煎一碗放溫作數起服內皂角刺左纏藤加衆藥五倍漏蘆散治熱毒癰癤漏蘆一兩木通三分銼川升麻一兩半赤芍藥一兩黃芩一兩半桑根白皮三兩銼枳殼一兩麩炒微黃去瓤甘草三分炙微赤銼上為散每服四錢水一中盞煎至六分去滓溫服日三服四服硝石散治瘡癤初生熱毒始結疼痛妨悶川硝石三分紫檀香半兩甜葶藶一分莽草一分白藥一分川大黃半兩生用白蘞半兩上為細散以漿水旋調稀稠得所塗於腫上干即易之以熱退腫消為度乳香膏治軟癤乳香半兩細研膩粉一分油一兩黃蠟半兩松脂一分密陀僧一分細研上藥先取油煎蠟松脂乳香煬後下粉密陀僧調和成膏看大小用帛上攤貼日二換之大黃散治熱毒生癤五臟壅滯及發背初欲結腫川大黃一兩銼碎微炒梔子仁半兩黃芩川升麻各一兩甘草半兩炙微赤銼上為散每服四錢水一中盞煎取六分去滓不計時溫服得快利為度胡粉散治熱毒惡癤及諸瘡腫胡粉黃連去須水銀與胡粉同研令星盡各一兩糯米一十粒赤小豆十四粒上為細末以麻油和諸藥並水銀調令勻薄塗之治軟癤雖出膿水熱痛不止方赤小豆四十九粒乳香半分粉半兩上為細散先去膿水後貼藥末三兩上效水調膏治軟癤一切腫毒黃皮白蘞甘草上等分為細末水和少蜜調貼之用井水佳治軟癤赤腫疼痛不可忍方天靈蓋一枚塗醋炙令微黃麻鞋底一隻多年故者燒灰上為細末以油和塗之治軟癤熱毒不散疼痛不止方食草豬糞冬瓜皮等分燒灰上為末先用鹽漿水洗了以生油調塗以瘥為度治軟癤乾生薑末銅青上等分和勻香油調敷留口了先用蔥椒湯洗淨軟帛拭乾敷之來日便愈神效又方生椒末釜下土各等分上醋和塗之千金方有曲末又方狗頭骨蕓薹子各等分上為末醋和敷之石灰散治瘡腫軟癤立效乾薑石灰等分上爛搗入清油相和捏作餅子罨在瘡腫上治軟癤荊芥銅緑各等分上為細末豬骨髓調塗治癰癤結腫赤熱者方用水磨半夏塗之燥復更塗治軟癤熱毒不散疼痛不止方以麻油四兩熬亂髮如雞子大成膏入烏貓兒糞末一分調勻塗於緋帛上貼之又方用鯽魚取蒿柴火燒令焦搗羅為末入生油調貼於癤上一方治骨疽腫熱未破已破或膿不已用銅器煮焙乾焦為末脂油調敷一名鯽魚膏治軟癤用建茶一盞搗羅為細末油調敷之又方用枳殼大者一枚剜去瓤令空地上磨令口平以稠麵糊搽四唇沾在癤上自破膿溜出盡更無瘢痕治瘡癤已結未結赤腫者用大天南星一個陳者為細末生面與南星等分生薑自然汁調塗腫處熱腫者只用水調不用面一方加薄荷汁塗治軟癤屢安再作者用桑螵蛸燒灰存性麻油調敷又方一名呼膿開口膏用雀抱卵殼燒灰存性為末入輕粉少許麻油調敷此物難得只以雞子抱退殼如上法用亦可一方用烏雞員卵殼燒灰存性為末以綿蘸入瘡口頻易治軟癤用螺螄殼燒灰真麻油調塗又方用椑樹上自起薄皮火炙乾為末麻油調敷治癤子方凡癤無頭者吞葵子一枚不得多服又方以燒葛蔓灰封上自消一方牛糞灰封之亦佳又方用鼠黏根葉貼之又方用水和雀屎敷之治瘡瘍諸熱毒疱瘡軟癤及聤耳名二白散用風化石灰不以多少雞子清拌勻和作彈子大日乾火煅研為細末凡瘡癤初結清油調敷已破乾摻若聤耳令患者側臥以患耳向上摻藥以干為度次日患者以爪爬去耳內藥再用藥末摻不過二三次退愈治瘡腫軟癤立效用瀝青不以多少瓦銚中火熔帶性碾為細末用天南星磨水調藥末塗瘡立效治軟癤不作頭及癰腫未有頭用茅針濃煎和酒服一方水煎茺蔚子治癤子已破用益母搗敷瘡妙治軟癤用黃米粉倒鐵器內炒黃色以新汲水調塗搽瘡上用紙干貼再不撲可待自落治軟癤用覆盆子葉微炒為末油調紙花貼獨珍膏治軟硬癤諸熱毒疱瘡用五倍子炒焦為末油調紙花貼一方水調塗仍入麻油數點療熱腫癤烿膠數塗一日十數度即瘥療小兒癤子尤良每用神效五葉湯治遍身熱癤及瘡瘍等五葉草不以多少上用水煎三五沸作浴湯洗之治癰癤方每覺有疼痛似作癰癤或發寒熱便宜用生粉草節大橫文者尤妙不炙不焙隻日曬乾為細末以酒調煮熱去滓稍熱服連進數服為妙蜞針法癰癤不以老少初發熱腫即以井邊淨泥敷之有一點先干處即瘡正頂以大筆管安其上卻用大馬黃蜞一條安其中頻以冷水灌之蜞必吮其腫血出毒如毒大蜞小須用三四條方見效蜞必死以水救活若血不止以藕節上泥止白茅花亦佳治惡癰癤腫破用胡堇草搗篩與松脂乳香花桑柴炭亂髮灰同熬如彈丸大如有其病以熱酒摩一彈丸服之其疼痛立止治瘡癤癰腫熱毒以大黃末水調敷之治癰癤以甘蕉根搗敷之效治瘡癤腫毒以車螯殼燒二度各以醋煅搗為末又甘草等分酒服以醋調敷腫上妙治諸癰腫發背及癰癤已潰爛疼痛用薔薇根更灸尉之即愈諸瘡口不合附論夫諸瘡腫皆是風邪熱毒所為若重觸風寒即冷氣入於瘡令血澀不行其瘡則常有膿水不知痛癢經久則瘡口不合也方降真香散治惡瘡封閉瘡口降真香木香麒麟竭白芷白蘞黃連去須黃柏各等分上生搗為細散不計時候用敷瘡口即瘥斂瘡散軟滑石花蕊石雞內金各半兩白芨三錢半白蘞二錢半滴乳香各一錢上滑石花蕊石灰燒通紅碗覆泥地一復時為細末次入余藥末研和干糝神效麒麟竭散治諸癰腫破成瘡口膿帶清薄宜用合瘡口長肌肉方麒麟竭一兩炒令紫色生人骨一兩燒灰人牙是也古銅末三分鴿糞一合干為末上藥都細研如粉貼之如瘡口深作紙紝子引散入瘡口裡面候肉生即合瘡口桃花散治諸瘡口不合生肌藥赤蘞炒白