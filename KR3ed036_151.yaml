body:
  text: 卷一百五十一時氣門時氣令不相染易附論凡時行瘟疫皆四時不正之氣感而病者長少率相似病苟不闢除多致傳染宜有方術預為之防又云此病皆因歲時不和溫涼失節人感乖候之氣而生病則病氣轉相染易乃至滅門延及外人故須預服藥及為法術以治之方麻黃散出聖惠方治時氣相染易者即須回避將息飲食之類不得傳食但一受病全家不安有此相染麻黃去根節三分桔梗去蘆頭三分桂心三分乾薑炮製三分防風去蘆頭三分川大黃銼碎微炙三分川烏頭炮裂去皮臍一分吳茱萸湯浸七次焙乾微炒一分川椒去目及閉口者微炒去汗一分上為散每服二錢空心用溫酒調下烏頭散出聖惠方治時氣轉相染易不止川烏頭炮裂去皮臍一分獺肝酒浸微炒一分川升麻三分川大黃銼碎微炒三分川朴硝細研三分龍腦半分細研柴胡二分去苗上為散入龍腦朴硝同研令勻每服空心以溫酒調下一錢雄黃丸出聖惠方治時氣病轉相染易乃至滅門傍至外人無有不著者雄黃一兩細研赤小豆炒熟二兩丹參二兩鬼箭羽二兩上為末煉蜜和丸如梧桐子大每服空心以溫水下五丸可與病人同床傳衣不相染也硃砂丸出聖惠方治時氣轉相染著延及外人不敢視者硃砂細研水飛過二兩雄黃細研水飛過二兩赤小豆炒熟二兩人參去蘆頭一兩鬼箭羽一兩上為末煉蜜和丸如小豆大每服空心以溫水下五丸可與病人同床傳衣不相染也治時氣熱毒令不相染易出聖惠方豆豉一升伏龍肝三錢細研童子小便三中盞上相和煎取一中盞半去滓分為三服每平旦一服令人不著瘴疫方治時氣溫毒令不相染易出聖惠方上於正月取東行桑根粗如指者長一寸以硃砂塗之懸於門上又令人帶之一方無硃砂敗鱉散出聖濟總録闢時氣瘟疫令不相染敗鱉醋炙五錢梔子仁一分大青一分羚羊角鎊一分芍藥一分馬牙硝一分前胡去苗一分紫菀去苗土一分上粗篩每服五錢以水一盞半煎至八分去滓食前溫服絶瘴散出聖濟總録闢時氣疫癘麻黃去節桂去粗皮升麻細辛去苗乾薑炮白朮附子炮裂去皮臍防己防風去叉桔梗蜀椒去目並閉口者微炒去汗芎藭上為細末每服二錢空心用溫酒調下一方用烏頭赤小豆丸出聖惠方闢傷寒瘟疫瘴癘令不相染方見鬼箭羽丸治瘟疫氣出本草以蚺蛇肉作鱠食之闢癘出本草正月之節食五辛以闢癘氣服一日薑闢瘟湯出聖濟總録闢時病瘟癘甘草二兩大黃二兩皂莢一錢並生用上細銼用水二盞煎至一盞去滓空心熱服至晚下惡物為效真珠散一名闢瘟病散出聖濟總録治闢瘟疫癘真珠研一分桂去粗皮一分雞子二枚去殼炒令黑色研貝母去心半兩杏仁湯浸去皮尖雙仁炒三分上為末再同研勻歲旦溫酒調下一錢若歲中人多病者可月望服之如遇時行病即不拘時候效一方無杏仁羌活湯出聖惠方治時氣更相傳染宜預服此方羌活去蘆頭一分桂去粗皮芎藭牡丹皮柴胡去苗桔梗炒升麻荊芥穗玄參甘草炙銼麻黃去根節木香各一兩吳茱萸湯浸焙乾炒一分牽牛炒半兩上粗搗篩每服五錢以水一盞半煎至八分去滓溫服不計時候蒼耳散出聖濟總録治闢瘟疫癘真珠研一分桂去粗皮一分雞子二枚去殼炒令黑色研上於重午日採蒼耳曝乾三兩搗羅為散每服二錢空心用井水調下闢時行瘟疫癘瘴出千金方用蕪荑不限多少搗取汁立春後遇庚子日闔家大小各溫服一二盞流金散出千金方闢瘟疫時氣方見雄黃散燒朮法出十便良方凡冒中暑熱時或久雨以蒼朮合皂莢燒闢瘟疫邪氣闢瘟病出本草用菘菜切如粟酒服方寸匕日三服闢五年瘟雌黃丸出聖濟總録闢瘟疫去百惡雌黃二兩研雄黃二兩研龍骨二兩龜甲二兩鯪鯉甲二兩虎骨二兩羖羊角二兩鎊芎藭二兩空青半兩研樗雞七枚真珠三兩研蝟皮二兩上為末再同研勻熔蠟和丸如彈子大正旦戶前燒一丸男左女右系一丸於臂上遇時行亦依此用闢瘟疫時氣塗敷出千金方雄黃二兩研丹砂一兩研菖蒲一兩切鬼臼一兩上為末同研勻以水調塗五心及額上鼻中耳門闢瘟甚驗闢瘟丸出聖濟總録治傷寒疫癘傳染及頭目昏重項膂拘急胸膈不通玄參五兩炒蒼朮三兩炒芎藭炒白芷炒羌活去蘆頭生用甘草炙銼烏頭炮裂去皮臍各一兩安息香一分龍腦研麝香研各半兩上除腦麝外搗羅為細末入腦麝拌勻粟米粥為丸如彈子大陰乾紗袋盛安近火處每服一丸時疾生薑蜜水磨下陰毒面青用熱水磨下調中丸出聖濟總録闢四時疫癘非節之氣大黃五兩銼碎炒麻仁別研一兩枳殼去瓤麩炒一兩白茯苓去黑皮一兩芍藥一兩前胡去蘆頭一兩黃芩去黑心一兩上搗研為末煉蜜和丸如梧桐子大每服十五丸食後飲下微利為度日晚臥服之佳屠蘇酒一名屠蘇飲出千金方歲旦闢疫氣令人不染溫病及傷寒大黃桔梗蜀椒各十五銖白朮桂心各十八銖烏頭六銖菝葜十二銖上㕮咀絳袋盛以十二月晦日中懸沉井中令至泥正月朔日平曉出藥置酒中煎數沸於東向中飲之屠蘇酒待三朝還滓置井中能仍歲飲可世無病當家內外有井皆悉著藥闢瘟氣也一方用虎杖一兩一錢無菝葜一方有防風一兩粉身散出千金方闢瘟病常用芎藭白芷藁本上研下篩納和米粉粉身殺鬼燒藥方出千金方闢瘟氣雄黃一斤丹砂一斤雌黃一斤羚羊角三兩蕪荑三兩虎骨三兩鬼臼三兩野丈人三兩石長生三兩猳豬屎三兩馬懸蹄三兩青羊脂八兩菖蒲八兩白朮八兩蜜蠟八升上為末以蜜蠟和丸如彈子許朝暮及夜中戶前微火燒之虎杖頭殺鬼丸闢瘟方出千金方虎杖頭五兩硃砂半兩雄黃半兩雌黃一兩五錢鬼臼一兩白莢一兩蕪荑一兩上為末以蜜蠟和丸如彈子大絳袋盛係臂男左女右懸於屋角晦望夜半中庭燒一丸闢瘟殺鬼丸出千金方熏白鬼惡氣雄黃二兩雌黃二兩羚羊角七兩虎骨七兩龍骨三兩龜甲三兩鯪鯉甲三兩蝟皮三兩樗頭十五枚空青五兩芎藭五兩真珠五兩東門上雞頭一兩上為末羊蠟二十兩並和丸彈子大正旦門戶前燒一丸帶一丸男左女右闢百惡獨宿弔喪問病各吞一丸小豆大天陰大霧日燒一丸於窗前佳赤散出千金方闢瘟疫氣傷寒及熱病藜蘆一兩躑躅花一兩牡丹皮一兩六錢皂莢一兩六錢附子六兩桂心六兩真珠六兩細辛乾薑各十八銖上為末納真珠合治之分一方寸匕置絳囊中帶之男左女右著臂自隨覺有病之時便以粟米大納著鼻中又酒服一錢覆衣取汗一日三服當取一遍汗斷瘟病令不相染著出千金方以汲水瓶一長七寸溫著病人臥席下良又方出千金方以繩度所著戶中壁屈即絶斷之主天行時氣鬼魅邪精等出本草以瓶香燒之治瘟病令不相染出千金方用桃樹中蟲屎末之以水調服方寸匕又方出千金方用新布袋盛赤豆一升納井中三日出舉家服二七粒一方男十枚女二十枚又方出千金方用菘葉末之以酒服方寸匕日三服闢五年瘟又方出千金方常以七月七日閣家男吞大豆七枚女吞小豆二七枚向日亦佳一方閣家向日吞赤小豆二七枚斷瘟疫轉相染著及至滅門延及外人無敢視者出千金方赤小豆二兩鬼箭羽二兩鬼臼二兩雄黃二兩上為末以蜜和服如小豆一丸可與病人同床傳衣治瘟令不相染出千金方用新布袋盛大豆一升納井中一宿出服七枚一方用黑豆治瘟疫出千金方用藥子二枚末水服之闢瘟方出千金方用白蜜和上色硃砂粉一兩以太歲日平旦大小勿食向東方立吞服三七丸如麻子勿令齒近之並七小枚投井中終身勿忘此法剛繁闢溫病粉身散常用方芎藭四兩藁本四兩遠志四兩白朮四兩米粉一斗研上搗篩四物為散和米粉粉身若欲多時加藥增粉用之干敷散一名干散出肘後方主闢瘟疫疾惡令不相染著氣肘後方作敷干抱朴子作敷下附子一枚一分者炮細辛一分乾薑一分麻子一分研柏實一分上為散正旦舉家以井花水各服一方寸匕服藥一日十年不病二日二十年不病三日三十年不病受師法但應三日服歲多病三日一服之忌豬肉殺鬼丸胡洽方雄黃五兩硃砂五兩研鬼臼五兩鬼督郵五兩雌黃五兩研馬兜鈴五兩皂莢五兩炙虎骨五兩阿魏五兩桃白皮五兩菖蒲五兩石硫黃五兩研甲香一兩白膠香一兩羚羊角屑蠟蜜八斤煉上搗篩十六味蠟蜜和丸如彈子大往闢瘟處燒之殺鬼去惡若大疫家可燒並帶行忌生血物羊肉餳治時疾疫出肘後方用馬蹄末屑二兩絳囊帶之男左女右蘇合香丸出危氏方凡入瘟疫家先令開啓門戶以大鍋盛水二斗於堂心用二十丸煎其香能散疫氣凡病者各飲一甌後醫者卻入診視不致相染闢時疫不相染方出十便良方以冬至前後取沙牛膽將小顆黑豆看納又不得頃膽水出任令滿以綿繫於當風處候乾收之若遇時疫動即朝起取膽納豆子七個井花水服之即不相染或云服則明目兼療內障眼闢妖法出十便良方李畋該聞集云爆竹闢妖氣鄰人仲叟家為山魈所祟擲瓦石開戶牖不自安叟求禱之以佛經報謝而妖祟彌盛畋謂其叟曰翁日夜於庭落中若除夕爆竹數十竿叟然其言爆竹至晚寂然安遂伏度瘴散出肘後方闢山瘴惡氣若有黑霧鬱勃及西南溫風皆為疫癘之候麻黃五分椒五分烏頭三分細辛術乾薑防風桔梗桂各八分上搗篩為末平旦酒服一錢闢諸毒惡氣冒霧宜服闢天行疫癘出肘後方雄黃丹砂巴豆礬石附子乾薑上各等分搗為末蜜丸平旦向日吞一丸如胡麻子大九日止令人無病常用瘟病散出肘後方真珠一分肉桂一分貝母三分雞子白熬黃黑各三分上搗為末歲旦服方寸匕歲中多病可用朔望服之有病即愈人服者當可大效一方有杏仁趙煮膏方出肘後方大黃附子細辛乾薑桂各一兩巴豆八十枚去殼上搗細苦酒漬一宿臘月豬膏二斤煎至三上三下絞去滓密器貯之初覺勃色變熱如梧桐子大一丸不瘥再服亦可火炙以摩身體數百遍佳並治賊風走遊皮膚並良可預合之一方有椒一兩單行方術出肘後方用西南社中柏東南枝取曝乾為末服方寸匕立瘥一方酒服之又方出肘後方取正月上寅日搗女青屑三角絳囊貯系戶上大吉又方出肘後方取正月朔望日及七日吞麻子大豆各二七枚投井中又以附子二枚小豆七枚令女子投井中又方出肘後方取冬至日雄赤雞作臘立春煮食盡物分他人又正月一日取東行桑根大如指懸門戶上又令人帶之一方長七寸用丹塗之又方出肘後方上埋鵲於門前斷瘟病令不相染著出肘後方取斷髮繩長七寸盜著病人臥席下闢瘟疫邪濕氣出本草以皂莢合蒼朮燒之又方出肘後方上熬豉雜米酒漬服之又方出肘後方柏子仁細辛穄米乾薑三分附子一分上為末酒服方寸匕日服三服服十日又方出肘後方用鯽魚密置臥下勿令知之又方出肘後方用麥櫱和穄米乾薑又云麻子仁可作三種服之治入瘟疫之家出三因方以雄黃末濃塗兩鼻清油亦可嚼蒜亦可飲酒更佳即不傳染與病人同床亦不相染初洗面後及臥時點之凡病家自生惡氣聞之即上入泥丸遂散百脈而成死病宜以紙捻探鼻嚏之為佳如以雄黃點鼻則自不聞並辟惡夢神良刪繁大青消毒散治天行三日外至七日不歇內熱令人更相染著大青四兩乾葛四兩梔子四兩香豉八合熬綿裹芒硝三兩生乾地黃一升切上切以水五升煮藥味取二升五合去滓下芒硝分三服忌蕪荑酒蒜等物一方有石膏八兩務成子螢火丸主病闢疾疫惡風氣百鬼虎狼蛇虺蠆諸毒五兵百病盜賊凶害皆闢之螢火二兩鬼箭削去皮羽二兩蒺藜