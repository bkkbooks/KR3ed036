用厚被蓋睡連進數服以薄粥湯佐之令四肢微汗濈濈候乾徐徐去被謹避外風自然散解若原自有汗亦須用和解或有餘熱以參蘇飲調之或尚頭疼則濃煎生薑蔥白湯下聖餅子三證既除則不必服藥但節飲食適寒溫自然平治兼能闢山嵐瘴氣四時瘟疫常服尤佳半夏湯洗七次一兩厚朴去粗皮薑汁製一兩蒼朮米泔浸一宿切炒一兩藿香葉去土半兩草果去殼半兩茯苓去黑皮半兩人參半兩甘草炙半錢橘紅七分半上㕮咀每服五錢水一盞半生薑三片烏梅一個煎至八分去滓煎服兼治飲食傷脾發為瘴瘧或中脘虛寒嘔逆噁心或寒瘧寒疫及惡寒若加附子是為十味不散金散一方熱盛加乾葛三分林檎散出和劑方治傷寒及時疫癘頭痛項強壯熱惡寒腰背四肢拘急煩疼乾嘔逆煩渴麻黃去節一兩五錢肉桂去粗皮一兩半蒼朮去皮一兩五錢川大黃一兩五錢乾葛一兩五錢石膏一兩五錢山梔子去皮一兩五錢木通一兩瞿麥一兩甘草一兩川芎一兩前胡五錢川烏頭炮去皮尖五錢藿香葉五錢上為粗末每服二錢水一盞入林檎糝十數片新者亦得煎至七分去滓稍熱服不拘時候相次再服蓋覆汗出為度一方有當歸柴胡石膏散一名柴胡升麻湯出和劑方治時行瘟疫壯熱惡寒頭痛體疼鼻塞咽乾心胸煩悶滿寒熱往來痰實咳嗽涕唾稠黏赤芍藥柴胡去苗石膏炒前胡去苗乾葛各五十兩升麻二十五兩黃芩桑白皮各三十七兩半荊芥穗三十七兩上為粗末每服二錢水一盞薑三片豉十餘粒同煎七分去滓熱服小兒分三服更量大小加減不拘時候玉屏風散出仁存方治腠理不密易感風寒頭昏眩甚則痛項強肩背拘急噴嚏不已鼻流清涕續續不斷經久不愈氣虛人不宜發散常服效黃耆四兩防風二兩白朮三兩上粗搗篩每服三錢以水一盞煎至六分去滓溫服未瘥再服五積交加散出永類鈐方治內感風寒上膈蘊熱及作痎瘧生料五積散人參敗毒散二料各等分上和勻每服四錢水一盞薑五片棗三枚煎至七分溫服不計時候香芎散出百一選方治傷風感寒發散表邪香附子去毛炒六兩藁本去蘆四兩川芎銼二兩橘皮去白二兩甘草一兩五錢炙上為細末每服三錢水一盞生薑三片煎至七分溫服不拘時候香芎散出傳信適用方治感寒傷風鼻塞頭痛及時行瘟疫老幼皆可服香附子炒去毛六兩川芎二兩香白芷二兩甘草炙二兩藿香葉四兩石膏研如粉三兩上同為細末每服一大錢熱茶調下不拘時候一方熱酒下蔥豉湯治疫癘始得頭疼壯熱蔥白二莖細切豉一合蜀椒四十九粒去目並閉口者炒出汗上粗搗篩以水三大盞煎至二盞煎二錢去滓頓服汗出瘥未愈更煎服七物赤散治傷寒闢毒氣疫病丹砂炮熱研烏頭炮裂去皮臍各二兩細辛去苗葉羊躑躅各一兩乾薑炮製研白朮切炒各一兩栝蔞一兩五錢上搗羅為散每服半錢以溫酒調服汗出解不解增至一錢匕普濟消毒飲子出試效方時毒治驗泰和二年先師以進納監濟源稅時四月民多疫癘初憎寒體重次得頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如藥之多不救張縣丞始亦得此病至此病至五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤或曰李明之留心於醫可請治之遂命診視具説其由先師曰夫人半身以上天之氣也半身以下地之氣也此邪熱客於心肺間上攻頭目面為腫盛以承氣湯下之瀉胃中之實熱是誅罰無過殊不知毒氣結於上焦也遂處方用黃芩黃連味苦寒瀉心肺間熱以為君橘紅苦平玄參苦寒生甘草甘寒瀉火補氣以為臣連翹黍黏子與薄荷葉苦辛平板藍根味苦寒馬勃白殭蠶味苦平散腫消毒定喘以為佐升麻柴胡苦平行少陽陽明二經不得伸桔梗味辛溫為舟楫不令下行共為細末半用湯調時時服之半蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆書方以貼之全活甚重時人皆曰此方天人所制遂刊於石以傳永久黃芩半兩黃連半兩人參三錢橘紅去白一錢玄參一錢生甘草一錢連翹黍黏子三錢板藍根一錢馬勃一錢白殭蠶炒七分升麻七分柴胡七分桔梗二錢上為細末服餌如前法或加防風薄荷川芎當歸身㕮咀如麻豆大每服稱五錢水二鍾煎至一盞去滓稍熱時時服之食後如大便硬加酒煨大黃二錢或三錢以通利之腫勢甚者宜砭刺之雙解散出朱氏集驗方解四時傷寒疫癘風溫濕溫不問陰陽二證表裡未辨發熱惡寒頭疼項強腰背拘急肢節疼痛嘔吐喘嗽鼻塞聲重目睛疼眩煩燥引飲往來寒熱已經汗下病熱愈甚用藥錯誤壞證惡候及不伏水土山嵐瘴氣瘧疾婦人血虛發熱凡室女小兒老人並宜服之人參一兩白朮一兩茯苓一兩升麻一兩乾葛白芍藥甘草各二兩五錢陳皮不去白二兩香附子炒去毛二兩紫蘇葉二兩五錢上㕮咀每服三錢水一盞生薑五片棗二枚煎至七分通口服如要出汗加蔥白三寸淡豉十四粒連投二三服略以被覆汗出立效不拘時候如春夏加藁本白芷各一兩此藥乃四君子湯升麻湯香蘇散合為一四君子湯主氣升麻湯解肌退熱解表香蘇散助二藥之表裡此藥性稍涼有熱者宜服之居南方瘴地或冬多愆陽當並服助效若體怯有寒及壞症已虛者恐亦難用大抵有虛寒人只服人參多亦能助寒有虛熱人只服白朮多亦能增熱此藥有乾葛升麻香附子之類性寒為多自當審之加減香蘇飲出衛生家寶方治時氣瘟疫四時傷寒頭痛壯熱惡風無汗香附子一兩炒去毛陳皮半兩浸去瓤甘草三分炙紫蘇一兩去梗麻黃一兩去節蒼朮半兩清水泔浸三宿去皮乾稱桔梗一分去蘆頭上為粗末每服四錢水一盞煎至七分去滓不計時候溫服神應散出朱氏集驗方治四時瘟疫傷寒茯苓甘草黃芩地骨皮上各等分白水煎服不過數服而愈宣和間王煥疫疾神以王有陰德以此方授之蒼朮散出朱氏集驗方截四時傷寒瘟疫蒼朮半斤炒麻黃一兩五錢去節杏仁二兩去皮尖炒甘草二兩炒上為細末每服四錢以沸湯調服不拘時候升麻葛根湯出經驗良方治大人小兒時氣瘟疫頭痛發熱肢體煩疼及瘡疹已發疑二之間並宜服之今人妄議升麻乾葛根有寒涼之性不宜服餌謹按本草升麻上品上藥味甘平解百毒闢瘟疫瘴癘邪氣治小兒風聲時氣熱疾風壅癰腫豆瘡鬼附啼泣葛根中品之上藥也味甘平主消渴身熱嘔吐療傷寒中風頭痛解肌發表出汗解酒毒芍藥味苦最平益氣通順血脈強五臟補腎氣又能治風補勞甘草上品之藥也四者合和何寒之有故並述之升麻葛根白芍藥甘草上各等分同為粗末每服三四錢重水一盞半煎至一盞去滓稍熱服日二三服以病身清涼為度小兒量歲數加減服一方加桂順解散出楊氏家藏方解傷寒瘟疫身體壯熱頭疼項強四肢煩疼惡風無汗蒼朮麻黃去節等分上㕮咀二錢水一盞入蔥白薑煎溫服柏枝湯出經驗良方治天氣不和疫癘流行可預備之以柏樹東向葉干搗為末沸湯或酒服一錢神驗治天行時氣瘟疫出本草以臘雪水溫服之解瘟病發熱出本草取生葛搗汁飲之時氣雜病
