三服不計時候溫服外臺方用五升水煮取二升四合分三服如人行十里久更服若大便澀加大黃三兩薄荷粥方出聖惠方治時氣勞復四肢煩疼宜服薄荷一握阿膠一兩杵碎炒令黃燥川升麻一兩豉心一合上細銼和勻以粳米稀粥調服厚覆取汗瘥治時氣新瘥起早勞復及食飲過多復發欲死出聖惠方以鱉甲三兩醋塗炙令黃焦去裙襴搗羅為散每服三錢以粥飲調下不計時候外臺方燒為末服方寸匕忌莧菜又方取所食物燒作灰細研每服以粥飲調下二錢治天行瘥後勞發此病復發或因起動勞役或因飲食稍多或因言語過分或緣視聽不節或為動轉不常皆成勞復若復甚者乃至不救劇於初得病時不可以復發而生輕易勞復狀一如傷寒初有如此者宜合蔥白等七味飲服之漸覆取汗蔥白連須切一斤乾葛切六合新豉一合紙裹生薑切二合生麥門冬去心六合乾地黃六合勞水八升以水以杓揚之一千遍上藥用勞水煎之三分減二去滓分三次溫服相去如人行八九里如覺欲汗漸復與之傷寒無異又依前蔥白等七味飲服之得可但遇寒溫將息以取安穩若不覺可宜合葳蕤等五味飲子服之葳蕤五兩切蔥白切一斤豉心一升綿裹粳米三合碎研雄鼠屎七枚末上藥以水七升煮藥至五升去滓取汁納粳米屑煮米爛訖納鼠屎末攪調頓服覆被安臥取汗瘥治天行病瘥後準常漸健能行履遂過限不堪起動體氣虛羸每覺頭痛唇口乾乍寒乍熱發作有時或雖能行動運轉然每作時節有前狀者名天行不了若有此宜合地骨白皮等五味飲子白薇等十味丸方細服之地骨白皮三兩白蜜三合知母三兩麥門冬五兩去心竹瀝一升上藥切知母以上和麥門冬然後以水六升煮取二升去滓納竹瀝蜜攪調溫服分三服服相去如人行十里久如覺虛不能空腹頓盡欲間食服亦佳兼主傷寒又若服前地骨白皮等五味飲子不可雖可不能全退宜合白薇等十味丸服之白薇三兩知母四兩地骨皮三兩乾地黃六兩麥門冬五兩去心甘草四兩炙蜀椒三兩葳蕤三兩橘皮二兩人參三兩上藥細切合搗篩絹羅為散蜜和丸如梧桐子大初服十五丸日再服稍加至三十丸服經三數日後自候腹中若覺熱則食前服如不能以空飲下藥宜合烏梅等四味飲下前丸忌海藻菘菜蕪荑等烏梅散烏梅十枚葳蕤五兩生薑五兩白蜜一合上切以水六升煮三味取二升去滓納白蜜攪調細用下前丸水冷暖以意斟酌縱不下丸但覺口乾渴則飲之麻黃散治溫病瘥愈食復病麻黃十分去節大黃十五分炙附子一分炮厚朴二分炙苦參六分石膏六分碎綿裹烏頭六分炮上七味搗篩以苦酒米汁和服方寸匕日三夜二服案此方原缺方名及症狀麻子一升豉一升綿裹牡鼠屎七十二枚上三味以水五升煮取二升半分溫三服立愈試之有神驗大黃丸大黃一兩蒸之二斗米下巴豆五十枚去心皮熬桂心二分硝石三分煮無者以芒硝代之乾薑二分炮上五味搗篩四味別搗巴豆令如泥令合和以蜜更搗二千杵丸如梧桐子大一丸湯服之但熱在膈上當吐膈下當利預作粥如服他吐下丸法服藥兩食頃不吐下以熱飲動之若不得吐不可更服一丸半此藥壯人可二丸此藥優於他吐下藥丸故宜大小不多冷粥解之若有瘡綿梃如指蜜和一丸塗梃頭且納瘡中晡出之不瘥更作溫病不得大便服之得下佳宿食不消亦服之飛尸遁尸服半丸日一應須臾止心腹脹滿痛服一丸瘧者依發日宿勿食清晨服一丸若壯人服二丸得吐下忍飢過發時乃食婦人産後血結中奔走起上下或絶産無子或月經不斷面目青黃服半丸小兒淋瀝寒熱臚脹大腹不欲食食不生肌三四歲如麻子日服一丸六七歲服二丸此三十日心腹諸病瘥小兒半之愈大良忌野豬肉蘆筍生蔥治時氣病起諸勞復方出肘後方用干蘇葉一把水五升煮取二升盡服之無干者生亦可用加生薑四兩豉一升又方出肘後方用濃煮甘皮服之蘆根亦佳竹葉湯治天行後寒熱牽勞下腹四肢沉重或一臥一起氣力羸弱竹葉一把小麥一升甘草一兩炙石膏二兩研茯苓二兩半夏一升洗去滑前胡二兩知母二兩黃芩二兩人參二兩生薑四兩大棗三十枚擘上十二味切以水二升煮竹葉減四升去滓納藥煮取三升分三服忌海藻菘菜醋物羊肉餳等物勞多而復發方出肘後方燒取篩末服方寸匕良治時氣病起諸勞復方葛氏肘後備急方凡得病毒愈後百日之內禁食豬犬羊肉並腸血及肥魚油膩乾魚則必大小痢下則不可復救又禁食胡蒜韭薤生菜蝦鱔等食此多致復發則難治又令到他年數發也用粉三升以暖水和服之厚覆取汗治溫病勞復及食復出本草以人屎燒灰酒服方寸匕主天行勞復出本草以故繳腳布洗汁飲帶垢者良治溫病食復出本草以杏仁兩酢二升煎取一升服之取汗瘥治篤病新瘥起早勞食飲多致復欲死方出本草用水服胡粉少許天行勞復渴出本草以故膩頭巾浸取汁暖服一方用頭上垢多時收者治交接勞復卵腫腹中絞痛欲死出本草刮青竹皮一升以水三升煮五沸絞頓服時氣瘴疫時氣疫癘附論夫人居天地間稟氣於陰陽氣和則安氣戾則病故一歲之內節氣不和寒暑乖候皆為疫癘之氣感而為病故名疫癘其狀無問長少率皆相似俗又名天行其病與時氣溫熱等病相類治各隨其證以方制之又詩曰四時疫癘會應難老幼調停總一般夏責於心冬責腎季脾秋肺與春肝又論云疫癘春感清升麻葛根湯解肌湯夏感寒理中湯麝香湯半夏桂甘湯秋感熱白虎加蒼朮湯發黃疸者茵陳五苓散冬感暖葳蕤湯四時通用敗毒散升麻葛根湯土無正行因火而名當隨其症而取之方牛黃七寶膏治傷寒時疫熱毒暑病心胸痞塞或發黃斑狂躁迷悶及久經取轉不效蘊毒滯積潮熱牛黃五分龍腦五