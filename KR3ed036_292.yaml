惠方槲白皮三斤銼丁香一兩末麝香半兩細研上以水五斗於大釜中先煮爛槲皮至一斗去滓更以慢火熬成膏後入丁香等二味攪令勻收於瓷器內食前以溫酒調下半匙天靈散出聖惠方治氣毒瘰癧遍項及流注脅腋下有頭疼痛天靈蓋一兩帶血色者入茅香水洗五七次塗酥炙令黃虎脛骨一兩塗酥炙黃上為散空心以蔥酒調下三錢晚食前再服又方出聖惠方蝸牛子二十枚生者去殼微炒黃薄荷一兩乾者丁香半兩上為末煉蜜丸如桐子大食前荊芥湯下三十丸治瘰癧腫硬如石疼痛五靈脂二兩浸醋皂莢十枚不蛀者去黑皮塗酥炙去子上搗皂角末以五靈脂膏和丸如桐子大早晨以薄荷湯下九丸臨臥以溫酒下十丸又方出聖惠方皂角針一兩燒灰槲白皮末一兩上同研令細食前以溫酒調下二錢治氣癧用赤腳馬蘭搗細蓋患處治氣毒瘰癧出聖惠方用皂莢子一斤不蛀者去皮子塗酥炙令黃色搗羅為末以精羊肉半斤細切研如糊下藥末相和丸如梧桐子大每於食前以皂角刺搗碎煎湯下十五丸服此藥一月後即有大驗熱毒瘰癧附論夫熱毒瘰癧者由人臟腑俱實氣血充盛內有積熱不得宣通熱毒之氣流於項腋之間搏於肌肉而生故謂之熱毒瘰癧也方玄參散出聖惠方治熱毒瘰癧癰腫疼痛宜服此散熱毒除根玄參連翹知母當歸雄黃細研牽牛微炒黑豆炒熱黃芩犀角赤芍藥空青茌子礬石泥裹燒半白細研各三分地膽一分以糯米炒黃為度去翅足斑蝥一分以糯米拌炒以米黃為度去翅足上為散入研了藥令勻空心以溫酒下一服一錢三五服後小便出爛肉為度連翹散出聖惠方治肝膈熱毒氣盛攻項腋生瘰癧腫痛心神煩悶背胛急疼四肢不利連翹漏蘆知母桂心黃芩玄參甘草微炙赤各三分木通銼柴胡去苗大黃微炒朴硝各一兩上為散每服四錢以水一盞煎至六分去滓每服於食前溫服以利為度紫參丸出聖惠方治熱毒瘰癧腫痛未成者內消已破者行膿紫參苦參丹參連翹各二兩膩粉麝香別研各三錢滑石二兩半上為末用玄參一斤搗碎以酒三碗浸三日去滓皂角子三百枚煨熟搗為末用玄參酒熬皂子末成膏和前藥為丸如桐子大每服一丸黃耆湯下日加一丸至患人歲數止日減一丸瘡自干有結內消犀角丸出聖惠方治熱毒結成瘰癧日夜疼痛甘草炙微赤一兩犀角屑一兩半黑豆炒熟一兩麝香半兩細研斑蝥半兩以糯米拌炒米黃為度去翅足上為末煉蜜和丸如桐子大空心以米飲下七丸服後覺瘡痛即住藥其病當從小便出卻於盆子內看之若小便澀即服木通散木通散出聖惠方木通一分銼葵子一分滑石一兩上為末以蔥白湯調下一錢日三四又方出聖惠方斑蝥一分以糯米拌炒米黃為度去頭翅足預知子一兩犀角屑一分水蛭一分微炒黃色黑豆一百粒炒熟䗪蟲一分炒令微黃去頭足翅上為末以酒煮麵糊和丸如黍米大大人每日空心以酒下五丸小兒二丸雄鼠糞丸出聖惠方治熱毒瘰癧結硬不消雄鼠糞二十一枚研綠豆粉一錢膩粉一錢斑蝥二十一枚去頭翅足以糯米拌炒米黃為度上相和研令勻以冷水和丸如小豆大空心以溫酒下二十丸兩日後再服病根即並出地膽散出聖惠方治熱毒瘰癧內消地膽一分去頭足翅以糯米拌炒令黃為度滑石半錢朴硝一分熬令汁盡上為散空心以米飲調下半錢服後覺小便中下惡物即減地膽少許十日見效又方出聖惠方雞子一枚開眼子斑蝥二十一枚去頭足翅糯米拌炒米黃為度膩粉一錢上雞子去黃留白入二味藥在內以紙蓋蒸兩炊久取出丸如小豆大每日五更初以溫酒下五丸當瀉出病根如服未效即日更服治熱毒瘰癧瘡腫疼痛宜服此方出聖惠方顆鹽一分微炒黃丹半兩微炒白礬一分燒令汁盡黃柏一分銼白蘞一分上為散每先用溫鹽漿水洗瘡令淨盡拭乾以雞子清調塗於帛上貼之山豆根方出仁齋直指方治咽喉上膈熱毒患瘰癧者常含汁嚥下仍服之山豆根紫蘇葉上用細銼煎湯臨臥服之解熱方治瘰癧四畔紅腫多結為熱證小黑豆二合紫蘇一兩生薑七片上細銼煎湯食後服治熱毒瘰癧內消方斑蝥十枚去頭足翅糯米同炒令黃色大黃一兩銼微炒上為散食前溫酒調一錢又方皂莢子二百粒不蛀湯浸經宿用炒令黃為末杏仁一百粒湯洗去皮尖雙仁微炒黃為搗膏糊為丸用蜜和上同研令勻煉蜜和丸如桐子大食前以粥飲下三十丸斑蝥散治熱毒瘰癧斑蝥三枚糯米拌炒令黃色去頭足翅滑石一分上為散分為兩服空心糯米飲調下如人行十里每服覺小腸澀即煎黑豆湯服須臾小腸內取下爛肉片子即瘥如未愈隔日再服大薊根散治熱結瘰癧用薊根一斤搗為散每服用藥三錢匕食後溫酒調下日再服瘰癧有膿附論夫瘰癧者結風於內積熱在肝榮衛不和胸膈壅滯毒熱相搏流注於筋脈結聚所成也初得即覺項邊磊磊狀若連珠面色萎黃皮膚壯熱久而不療俾熱上蒸則成膿也按內經謂榮氣不從逆於肉理乃生壅腫蓋榮氣逆則血鬱鬱則熱氣聚而為膿瘰癧之疾亦猶是也熱氣內結搏聚在肝肝主筋肝藏血久不瘥故熱聚於血血腐而為膿在於頸腋腫結相連有如梅李實是已方神應膏治瘰癧已破瘡口浸引膿水不絕及治一切惡瘡貼之去惡肉好肉自生白芨白蘞當歸桂去粗皮各一分附子一枚半兩者去皮臍乳香纏半兩東南槐枝柳枝各二條各長七寸銼鉛丹三兩巴豆三分去皮研清油六兩上各銼細於石器內先下油與白芨等煎令焦黃以白綿濾去滓入鉛丹巴豆慢火熬藥成膏先以水一碗投藥入水其藥直入水中如珠為度後刮下入瓷器內收貯每用少許量核大小塗貼黃耆丸治瘰癧結腫生膿黃耆銼木香漏蘆玄參枳殼銼炒微黃去白犀角屑桔梗去蘆頭牛蒡子微炒大黃微炒各一兩上為末煉蜜和丸如桐子大空心及晚食前以米飲下二十丸鱉甲散治瘰癧出膿血不止宜服此消死肉散毒氣使癧子轉動寬軟鱉甲一兩塗醋炙微炒黃去裙襴桑螵蛸五枚微炒狼毒三兩醋拌炒黃䗪蟲五枚微炒磁石三兩細研水飛過雄黃一兩細研麝香一錢細研雌黃一兩細研上為散入研了藥再調勻每日空心日午近夜各一服米飲調下一錢枳殼丸治瘰癧結腫穿穴生膿枳殼麩炒微黃去白玄參漏蘆大黃微炒芡實牛蒡子微炒各一兩黃耆露蜂房半兩微炒上為末煉蜜和丸如桐子大每服不計時候米飲下三十丸連翹丸治瘰癧結核於頸腋下生癰膿白蘞丸治瘰癧結腫有頭膿水不止白蘞黃耆銼木香枳殼微炒玄參烏蛇酒浸去皮骨炙色黃各一兩斑蝥十四枚去頭足翅以糯米拌炒令米黃為度上為末煉蜜和丸如桐子大每服空心逐日晚食前米飲下十丸蜂房膏治瘰癧生頭膿水不絕疼痛露蜂房一兩蛇蛻皮半兩玄參半兩黃耆二分杏仁一兩湯浸去皮尖二仁研亂髮如雞子大黃丹五兩上細銼用麻油一斤先煎發及杏仁候發消盡即以綿濾去滓下黃丹以柳木篦不住手攪候熬成膏即傾於瓷盒中盛旋取塗於帛上貼之連翹散治瘰癧熱腫肉敗生膿連翹犀角屑黃耆銼各一兩木通銼半兩用漏蘆一分杏仁一兩湯浸去皮尖雙仁麩炒微黃色玄參半兩上為散每服三錢以水一盞煎至六分去渣食前溫服紫金膏出聖濟總錄治瘰癧已破膿水不止柳枝三十條各長四寸槐枝同上麻黃六兩青者是乳香別研沒藥研柏脂各一分上為末先熬油令沸入槐柳枝煎令黑色去枝不用次入麻黃等熬成膏每用油紙攤塗之地膽丸出聖濟總錄治瘰癧成瘡有膿貼藥後服此地膽去頭足翅糯米拌炒米黃為度斑蝥去頭足翅糯米拌炒米黃為度芫青十枚糯米拌炒令黃去頭足翅牛黃別研一兩生豆黃三十一枚上為末牛黃再研勻煉蜜為丸如桐子大每服一丸空心茶下後更服尋常補益丸散去毒散出聖濟總錄治瘰癧毒氣鬱結成膿發泄不止巴豆一兩薄荷末二兩皂莢末二兩麝香研二錢鯽魚一個去腸肝上研勻四味入在魚腹內用泥固濟以炭五七斤燒存性候冷取出細研每服一錢匕用荊芥臘茶調下日三服蜂房散出聖濟總錄治瘰癧露蜂房蜜塗文火炙令青色半兩羊屎四十九枚燒白色皂莢一梃煨存性上同研和勻洗瘡口乾用此藥貼之後可服血竭散血竭散出聖濟總錄治瘰癧已破膿水不止者血竭炒研一分大棗二十枚青州者燒為灰生乾地黃焙半兩研為末上同研如面別取枳殼末三錢用水一盞煎至四分去滓調下散子半錢五更時服良久覺腸痛但只以枳殼湯細飲之即自止有惡物自小腸出為效牽牛子散出聖惠方治瘰癧頭多經久不瘥膿血不止極其疼痛者牽牛子麝香半錢細研上都細研如粉以津唾調貼之薄荷丸出聖惠方治瘰癧結成顆塊疼痛穿潰膿水不絕不計遠近皆瘥薄荷一束如碗大陰乾皂莢十挺長一尺二寸不蛀者去黑皮塗酥炙令黃上搗碎以酒一斗浸經三宿取出曝乾更浸三宿如此取酒盡為度干為散以軟飯和丸如桐子大每服食前黃耆湯下一十丸小兒酌減服之鼠灰散出聖惠方治瘰癧膿水不絕宜貼蛇腹中鼠一枚燒灰蝦蟆一枚燒灰上為末用生油調攤於帛上貼之日一度換之罐灰散出聖濟總錄治瘰癧瘡口膿水不止用糞堆里破瓦罐兒洗淨於灶掘次安在坑中燒二日令捻得碎細研乾摻瘡上紫金散出聖濟總錄治瘰癧方破用檳榔不拘多少端正者為細末先以溫漿水洗瘡以軟帛拭乾油調塗日三上用時看多少治瘰癧穿破作膿宜服此方出聖惠方用五月六月麥柴堆上新生菌子七枚熟搗先以米泔淨洗瘡拭乾貼日二度換之治有瘡口膿血出者用貍肉作羹如法食之水紅花飲出聖濟總錄治瘰癧腫核結硬不消及膿水旁穿不瘥用水紅花不拘多少一半炒一半生粗搗篩每服二錢水一盞煎至七分去滓溫服食後臨臥日三好酒調亦可服單方治瘰癧破與未破及膿血淋漓其效如神牡蠣不拘多少用灰深培上以三升米一煅候盡取八兩為細末甘草二兩上藥勻拌每服二錢食後以建茗同點日二服忌魚酒酢醬油鹽海味等此病多有人父子相傳至死如若服此藥並不疼亦不吐痢又方用牡蠣不拘多少火煅為末以糊丸如桐子大每服二十丸連翹煎湯下生肉方臘月豬脂松脂煮過收水上白者黃蠟煮過收潔淨者上各二兩用清麻油五六兩慢火熬成膏先將溫水洗去舊藥拭乾用紙剪一大團子塗藥在上蓋瘡口如癢不得動此生肉故也一日一次換藥切戒毒物輕肌散出鮑氏方治瘰癧腫痛化惡膿血寒熱煩躁肢筋無力困倦虛渴飲食少進山慈菇即塗燈花何首烏天名精甘草各三分生地黃半兩獨將軍一兩去莖上為散每服二錢薄荷七葉煎湯下活膿散出鮑氏方治瘰癧出膿不快肢節煩疼寒熱口乾防風當歸人參川芎各半兩金星草五葉羌活甘草各三錢上為散以酒下二錢日二服秦皮散出鮑氏方治瘰癧並有效秦皮三兩莽草二兩細辛苦參半兩黃連黃芩一兩大黃三分當歸上為粗末每一兩水煎去滓日一洗之碧油五枝膏出鮑氏方治瘰癧發毒出膿血瘀肉能止痛桃枝柳枝桑枝槐枝皂角枝上各一握銼細麻十兩煎至八分淨入又方明礬半錢血竭半兩黃丹四兩上用慢火熬成膏地上出火一宿用時攤在開片帛上大人小兒貼之點硬白破皆用未破不用瘰癧寒熱附論夫瘰癧者由風熱毒氣壅滯於胸膈之間不得宣通而搏於肝肝主筋故令筋蓄結而腫多生於頸腋之間浮於筋皮之中有結核累累相連大小無定其初發之時熱毒腫結故令寒熱也方曾青散出千金方治寒熱瘰癧及鼠瘻曾青附子礬石荏子各半兩栝蔞根露蜂房當歸防風芎藭黃耆黃芩貍骨甘草各二兩細辛乾薑各一兩斑蝥芫青各五枚上為末以溫酒調服一方匕日再服連翹丸出聖惠方治瘰癧結腫不散欲成膿致寒熱不退連翹大黃炒沉香薰陸香牛蒡子炒黃耆枳殼麩炒黃各一兩玄參羌活赤芍藥升麻芎藭黃芩占斯各三分紅鹽一分波斯者皂莢子四十九粒微炒黃上為末煉蜜和丸如桐子大每於食後溫水下射干連翹湯出聖惠方治瘰癧寒熱射干連翹玄參赤芍藥木香升麻山梔子前胡去蘆當歸切焙甘草炙銼各一兩大黃銼炙二兩上粗搗篩每服三錢匕水一盞煎至七分去滓入芒硝少許食後溫服日再服曾青散出聖濟總錄治寒熱瘰癧曾青研附子炮裂去皮臍礬石熬令汁枯研細荏子各半錢當歸切焙貍骨炙酥甘草炙各二兩細辛去苗葉乾薑露蜂房炙各一兩斑蝥同芫青炒芫青各五枚去頭足翅用糯米拌炒去米不用上研為散每服一錢匕空心溫酒下栝蔞子散出聖惠方治瘰癧初腫疼痛寒熱四肢不寧栝蔞子微炒皂子仁微炒牛蒡子微炒連翹牽牛子微炒何首烏大黃炒梔子仁甘草生銼白螺殼漏蘆各一兩上為散每服二錢食前溫酒調下木通丸出聖惠方治瘰癧結腫身體寒熱心胸壅滯敗醬三分大麻仁一兩大黃二兩炒赤芍藥三分犀角屑三分黑豆一兩炒熟去皮昆布一兩洗去鹹味木通一兩銼玄參一兩連翹一兩升麻一兩上為末煉蜜和丸如桐子大食後用漿水下二十丸沉香散出聖惠方治瘰癧寒熱結腫疼痛心胸壅滯沉香桑寄生射干升麻連翹各三兩大黃一兩半炒防風薰陸香藿香各三分麝香一分研細上為散入麝香研勻每服四錢水一盞煎至六分去滓溫服日三服或四服漏蘆湯出聖濟總錄一名知母湯治瘰癧結核初成時發寒熱漏蘆去蘆連翹木通銼桂去粗皮犀角屑黃芩去黑皮柴胡去苗玄參大黃銼炒知母上粗搗篩每服三錢匕水一盞煎至八分去滓下朴硝半錢匕攪動空心臨臥服以快為度土瓜根散出聖濟總錄治瘰癧發寒熱土瓜根去土連翹龍膽黃連去須苦參栝蔞根微炒大黃微炒芍藥木香上等分搗為散食後臨臥溫酒調下一錢匕日三服石燕丸出聖惠方治瘰癧結腫寒熱疼痛心腹煩壅石燕一枚細研真珠一錢麩金石三分細研木香井泉石續斷去皮各三分檳榔一兩郁李仁一兩湯浸去皮微炒上為末同研令勻煉蜜和丸如桐子大每於食後以米飲下十丸旱蓮子丸出危氏方治少長臟氣不平憂思驚恐抑鬱結聚及外傷風寒燥濕飲食結成百毒瘰癧發作寒熱遍於項腋凡遠近俱治之旱蓮子連翹子威靈仙何首烏蔓荊子京三稜醋浸濕紙裹煅赤芍藥各一兩木香二兩大皂角二挺刮去皮塗酥炙再和羊脂同炙上為末糊丸如桐子大用建茶清下三十丸或五十丸日三服小兒酌減與之食後服玄參散出聖惠方治瘰癧初生結腫發渴發寒熱玄參枳殼麩炒微黃去白木通獨活各一兩犀角屑半兩大黃一兩微炒杏仁一兩湯浸去皮尖雙仁麩炒黃上為散每服三錢水一盞煎至六分去滓溫服日三木香消毒湯出聖濟總錄治瘰瘤發寒熱煩悶木香大黃生各半兩竹葉乾者一分連翹一兩獨活去蘆半兩梔子仁一錢上粗搗篩每服三錢水酒童子小便共一盞煎至七分去滓溫服貍頭散出千金翼方治寒熱瘰癧連翹土瓜根苦參黃連栝蔞芍藥常山皮各一兩貍頭骨一枚龍膽二兩上共搗篩酒服五分匕日三忌豬肉冷水一方無貍頭連翹丸出聖濟總錄治瘰癧寒熱結硬在頸腋之下連翹玄參木香升麻各一兩大黃蒸半兩昆布去鹹味焙二兩枳殼去瓤炒一兩半大麻仁微炒別研一兩上搗篩為末煉蜜和丸如桐子大每服十五丸食前米飲下加至二十丸一方作散空心米飲調下一錢射干丸出聖濟總錄治瘰癧惡寒壯熱久則必成痿瘻白蘞散出聖惠方治瘰癧於項腋結腫寒熱宜用貼之白蘞半兩甘草玄參木香赤芍藥大黃各半兩上為散以醋調為膏貼於患上干即易之治瘰癧初起未破作寒熱出危氏方木鱉子二分去殼磨草烏半兩磨忽白連根用蚯蚓糞二分上真米醋磨木鱉子草烏二味入蚯蚓糞蔥白調勻敷癧上扯紙條貼之欲令通氣孔治寒熱瘰癧散貍骨五兩半分微炙烏頭七分炮黃連七分上搗篩為末食前以酒調服一錢匕日三忌豬肉冷水玄參湯出聖濟總錄治瘰癧寒熱先從脛腋諸處起者玄參三斤細研磁石三斤燒令赤醋淬七次細研水飛過上以生絹袋盛酒三斗浸六七日每服一盞空心臨臥溫服治寒熱瘰癧方出聖濟總錄用貍頭一枚酥炙搗為散每服一錢空心米飲調下烏犀湯出聖濟總錄治初患瘰癧皮肉寒熱赤腫犀角一錢惡實三兩炒沉香三分麝香半錢研丁香半兩玄參三分大黃銼炒木通銼射干連翹上粗搗篩每服五錢匕水一鍾半煎至八分去滓空心溫服瘰癧久不瘥附論夫風熱毒氣蘊積臟腑攻於筋脈則結為瘰癧其疾毒氣所感深者則沖發肌肉不得消散或成瘡孔膿水不絕或飲食觸犯或外因風冷所傷日久月深醫藥無效遂令久不瘥也此疾尤忌憂思恚怒氣血勞傷飲食寒冷方貫眾湯出聖濟總錄治頸生瘰癧已針瘡尚不瘥者貫眾一兩半烏蛇酒浸去皮骨一兩炙連翹生乾地黃各二兩焙鶴蝨炒一兩杏仁湯浸去皮尖雙仁炒桑根白皮銼各二兩白蘞一兩威靈仙去苗土一兩半白芨一兩半大腹皮二兩延胡索一兩半黃耆一兩半銼黃連去蘆一兩甘草一兩炙木占斯二兩上為粗末搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓食後溫服狼毒散出聖惠方治瘰癧久經年月膿水不時發焮腫狼毒銼醋拌鼠李根皮沉香連翹薰陸香雞舌香詹糖香丁香各一兩蛇銜三分斑蝥二十枚去頭足翅糯米炒黃玄參三分昆布三分洗去鹹味上為散食前以荊芥湯調下一錢麝香膏出聖惠方治瘰癧久經年月成瘻瘡者麝香雄黃半兩細研連翹恆山側子昆布狼毒黃耆敗醬各半兩斑蝥三十枚蝦蟆灰一兩細研上細銼以臘月豬脂一斤半於淨鐺中煮十餘沸去滓下諸藥以慢火煎攪候黃耆黑色用綿濾去滓收瓦合中後下麝香雄黃蝦蟆灰調令勻每用故帛上塗貼日三兩度換之立應散治癧久不愈者射干丸出聖濟總錄治風熱毒癧久不瘥惡寒壯熱勞動轉甚漸欲成瘻射干昆布去鹹味海藻洗鹹味各一兩木香黃芩去黑犀角屑各三分芍藥連翹白蘞各半兩大黃銼二兩玄參一兩一分烏蛇酒浸去皮骨二兩上為末煉蜜丸如桐子大食後溫酒下十五丸斑蝥丸出聖惠方治癧久不瘥沉注脅腋衝破皮肉膿血不止斑蝥一分去頭足翅糯米拌炒令米黃為度麝香一分細研水蛭一分微炒令黃芫青一分糯米拌炒米黃為度去頭足翅甘草半兩銼炙微赤黑豆一兩炒熟大黃一兩微炒烏蛇二兩酒浸去皮骨炙微令黃色上為末入麝香研令勻煉蜜和丸如綠豆大空心以米飲下三丸如未覺加至五丸小便中當出爛肉為效如小便較澀以溫水調滑石末一錢服之丁香丸出聖濟總錄治癧久不瘥或已破膿血甚者母丁香生半兩蒼耳苗炒一兩青箱子生皂角仁各半兩葶藶半生半炒一兩厚朴一兩去皮薑汁拌炒丹皮半兩一分研上為末用棗肉搗爛和丸如綠豆大丹砂為衣每服十丸至十五丸米粟飲下日三服漏蘆湯出聖濟總錄治瘰癧久不瘥將欲破者漏蘆半兩洗焙海藻半兩洗焙連翹一兩沉香半兩銼山梔子仁一兩一分丹參玄參各一兩上粗搗篩每服三錢匕水一盞半煎至八分去滓溫服何首烏丸出聖濟總錄治瘰癧經久不瘥何首烏去黑皮半兩黃耆細銼半兩皂莢酥炙去皮子薄荷各一兩蛇蛻皮焦灰半兩龍腦研一錢麝香研一錢上為末煉蜜丸如桐子大每服十丸薄荷茶下不拘時候犀角散出聖濟總錄治瘰癧經久不瘥犀角屑鎊蕪荑生斑蝥炒各一兩牽牛子炒黑豆各一兩生用麝香細研龍腦研各一兩上除龍腦麝香外為細末再入研藥拌勻每服一錢匕熱酒調下空心服服藥後再飲酒一盞取下惡物為度七神丸出聖惠方治瘰癧年久不瘥根株漸大流注四肢斑蝥三十枚去頭足翅糯米拌炒米黃為度露蜂房半兩燒灰蛇蛻皮一條燒灰麝香三分細研雄黃半兩細研硃砂三分細研水飛過蝟皮一兩燒灰上為末入研了藥令勻煮棗肉和丸如桐子大空心糯米飲下七丸如腹內覺有小痛及增寒即減兩丸百日之內可瘥硼砂散出聖惠方治瘰癧經久不瘥硼砂一兩斑蝥三十枚去頭足翅糯米拌炒令米黃為度乾漆一兩搗碎炒令黃色水馬三十枚去足炒黃白芨半兩滑石一兩桂心半兩上為散空心以米飲調下一錢晚食前再服麒麟竭膏出聖惠方治瘰癧久穿穴傷風冷膿水不止宜用此暖肌生肉麒麟竭一分白蘞黃連檳榔丁香龍骨各一分麝香一錢細研上為末入乳缽內研令勻用野駝脂調如膏塗於帛上貼之日用二次六神散出聖濟總錄治瘰癧久不瘥皂莢刺薄荷昆布洗去鹹味海藻洗去鹹味連翹各半兩白莢子五十枚燒灰上為細末每服二錢匕茶調下食後臥服地柏散出聖惠方治瘰癧經數年不瘥地柏半兩炒令微黃玄參三分升麻一兩牛蒡子一兩炒犀角一兩上為散食前溫水調下一錢治瘰癧經年不瘥諸藥無效者宜服此方出聖惠方蛇蛻皮一條燒灰露蜂房一兩燒灰蝟皮一兩細研斑蝥二十枚糯米拌炒米黃為度去頭足翅麝香一兩細研上為細末和丸如桐子大食前皂莢子仁湯下七丸必效散出外科精要治久患瘰癧不效斑蝥四十枚去頭巴豆十粒去皮心膜白檳榔一枚麝香半錢細研南硼砂二錢半輕粉一錢上同研極細取雞子清二個去黃調藥令勻即傾在雞子殼內濕紙數重糊定毋令透氣生飯甑內與飯一處蒸飯熟取藥曝乾研細末臨用時相度虛實虛人每服半錢實人每服一錢並用炒生薑酒下五更初服藥至平明取下惡物如覺小腹內疼痛更用蓖麻子燒灰入沒藥等分同研細用茶調下一錢便入大腸其取下惡物如爛肉老鼠兒及新成卵內雀兒是效婦人有胎不可服紫金散出外科精要治瘰癧久不痓者枯白礬半兩砒霜一錢石膽半兩黃丹二錢上為細末糯米飲粥和丸如桐子大捏作餅子爆干如瘡破者研為末糝於瘡上如不破者炙三倍研如麥大安藥餅子於炙盤上後用水沉香蓋之當去根勝令膏出聖濟總錄治瘰癧久不瘥黃連去須蛀粟子去殼甘草根銼黃蜀葵花龍骨各半兩白芨一分上為細末取榆窠上紅蟲稱三兩半候乾同為末更入粉霜三錢同研勻每用藥三錢匕入膩粉少許取雞子清調攤帛上以口濕漿水洗淨搵干貼之隔日易換連翹湯出聖濟總錄治瘰癧諸方不效連翹犀角鎊青葙子蔓荊子黃耆銼各等分上粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心食前服破毒雄黃丸出危氏方治瘰癧久作不愈寒熱往來項筋攣急已破未破可服之惡物自小便中出來通明雄黃顆塊大硃砂各二錢斑蝥二十八枚去頭足翅糯米拌炒米黃為度水銀三錢上先以斑蝥為末續以雄黃硃砂為末再入水銀細研和勻用雞子清和糯米飯調糊為丸如綠豆大每服二錢米飲或溫酒下如惡物未見下半朝再一服聖惠方有膩粉無斑蝥治積年瘰癧惡瘡疳瘡軟癤出膿及多年瘡根蝕肉腫痛不可醫者俱宜用此方出聖惠方青黛砒霜硼砂麝香各一兩粉霜一錢上入乳缽內細研以麵糊丸如小麥粒大若瘡有頭即入瘡口中以麵糊紙蓋頭須臾藥發痛後至五七日出卻瘡根便用生肌膏藥封之甚效桃紅散出聖濟總錄用血竭須真者如無以深色胭脂代之為細末以自津唾調日夜頻塗瘡成靨即用浴毒湯洗之紫紅散出聖濟總錄治瘰癧已成漏瘡歲久不愈信砒一錢礬石二錢丹鉛三錢上用瓷罐子先入砒次入礬次入鉛丹蓋之鹽泥固濟炭火煅煙候至紫色取出以紙襯於地上一個時辰出火毒研細先以溫水洗淨瘡拭乾取藥少許以生蜜調塗日夜五六次塗至五七日瘡漸斂紫黑色即用前桃紅散敷之浴毒湯出聖濟總錄黃芩去粗皮黃連去須甘草銼黃芩去黑心各二兩大豆一合柏枝一把截用上粗搗篩每用三四匕以水二升煎至一升乘熱淋洗日三四次候洗下瘤子即用平肌散敷之平肌散出聖濟總錄黃狗頭骨燒灰鯪鯉甲燒灰各一錢亂髮一團如指大燒灰上研勻如瘡口已干用自津唾調濕敷之日三四次瘡即平愈一方無鯪鯉甲治瘰癧經年不瘥常出膿血疼痛不止宜服此方出聖惠方斑蝥一分去頭足翅糯米拌炒米黃為度羚羊角屑一分麝香一分細研甘草一兩炙微赤上為末用軟飯和丸如綠豆大空心以荊芥湯下七丸蜥蜴丸治瘰癧久不瘥出膿水腫痛日夜不已治瘰癧腫硬疼痛多時不瘥宜用此出聖惠方硼砂密陀僧斑蝥雄雀糞各一兩上為末用軟飯和丸如麥粒大曝乾內入瘡口中用麵糊帛貼之五六日自落烏雞丸出聖濟總錄治瘰癧經久不瘥烏雞卵一枚錦貝子半兩上將錦貝子入雞卵內用濕紙蓋頭七重再用泥固濟火煅過後入地坑內出火毒一宿取出研細入黃柏末半兩麝香一錢同研細煉蜜為丸如綠豆大每日空心蜜水下五丸不過五服自效異效散出聖濟總錄治瘰癧經久不瘥芫青四十九枚麒麟竭一兩上同藏於瓶中燒過存性地上出火毒研細每半錢匕米飲調下加至一錢匕內消方一名必捷丸出仁齋直指方治瘰癧年遠不瘥及治大人小兒初發瘰癧令內消斑蝥一分去頭足翅糯米拌炒薄荷葉三分用烏雞子清和末為丸如桐子大空心茶清下二丸午時候服三丸臨臥服四丸次日空心服五丸臍下痛小便取下惡物為效如小便澀塞飲蔥茶少許花葉散出存仁方治瘰癧漏瘡惡瘡婦人乳癰無論痛與不痛多年不瘥者並治之黃蜀葵十五朵去蒂桑葉二十五片上熏干為末入乳香半分研勻每用少許瘡干用麻油調塗瘡濕干糝治年久瘰癧尚未交合項者皆可服出百一選方用鯽魚兩個三寸長者開去腸肚不去鱗巴豆不拘多少填魚腹內以滿為度麻皮纏定用煉熱黃泥裹了曬七分干用一二斤炭火煅過魚藥同研極細用陳米飲和丸如綠豆大每服兩粒或三粒陳米飲下日二三服忌羊肉動風發物一方加麝香少許治瘰癧久不瘥者出危氏方用生玄參搗碎敷之日三次易換木鱉膏出仁齋直指方治瘰癧發歇無已及膿血淋漓並宜服之用木鱉仁二個原紙拭去油研碎以烏雞子調和瓷盞盛之甑內蒸熟每日食後服一次服半月自消治瘰癧腫痛經久不瘥用貍頭骨塗酥炙令黃搗為散每日空心米飲調下一錢匕治瘰癧經久不瘥用斑蝥一枚去翅足微炙以漿水一盞空心下之或用蜜水下之重者不過七次而瘥治瘰癧腫硬疼痛經久不瘥出聖惠方用蝙蝠端午日收之燒灰細研如是翁癧即無頭母癧即有頭含水洗之以紙紝子紝藥於瘡孔中不過三五度即瘥若是翁以密陀僧末少許用麵糊調之即內消治瘰癧年深日久不瘥潰爛不堪膿血臭穢者用五丁草俗名貓兒眼睛連根採取不拘多少亦不切碎盛入砂鍋內澆滿冷水煎熬極爛順手不住攪轉干則再添水至熬化成稠膏入全蠍數個再熬撈去粗筋屑以香為度傾入瓷罐埋土中留口出火氣以紅帛攤貼患處兩三日自落不過三兩次即愈比及上藥先以艾炷於瘡口四圍密排灸之痛極至不痛為度膿血流出用軟物搵乾淨然後將前膏藥貼之治瘰癧經久不瘥用豬臘膏塗之
