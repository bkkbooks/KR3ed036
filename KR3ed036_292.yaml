body:
  text: 卷二百九十二瘰癧門瘰癧結核附論論曰瘰癧結核者由風熱毒氣蘊積肝經攻注筋脈鬱而不散故項腋之間結聚成核或如梅棗或如珠顆累累相連其證令人乍寒乍熱頭項腫痛四肢不安心神煩躁蓋毒氣與血氣相搏則營衛不和使之然也其浮於皮膚之中未著肌肉可以藥內消之若腫硬堅甚不可消之則以藥外化為膿及血令其潰散則易愈也方五香散出聖惠方治心膈久積熱毒肝氣留滯致項生瘰癧結核沉香木香薰陸香各一兩麝香一分細研丁香羚羊角屑子芩赤芍藥玄參當歸犀角甘草地骨皮各三分連翹升麻麥門冬去心大黃微炒黃耆銼各一兩上為散入麝香研令勻每服三錢水一盞入蘆根五寸生薑半分煎至六分去滓不計時溫服瘰癧結核黃耆七分玄參八分連翹人參升麻青木香茯苓蒼耳子甘草炙朴硝桂心各四兩大黃麥門冬去心五分羚角屑鼠黏子苦參各九分上為末搗蜜丸如桐子大酒下十丸日夜三四漸加至二三十丸以知為度忌生冷豬肉海藻菘菜鮓生蔥蒜陳臭等連翹湯出聖濟總錄治男女長少瘰癧結核在項腋下項強背痛連翹玄參木香昆布去咸焙乾枳殼去瓤炒犀角鎊各一兩半柴胡去苗甘草炙銼黃芩去黑心沉香銼當歸切焙木通銼芍藥升麻上粗搗篩每服五錢匕水二盞入生薑一片棗一枚拍碎柳枝二寸長一握細銼煎至一盞去滓溫服空心日午夜臥各一服琥珀膏出聖惠方治頸項瘰癧初起如梅子腫結硬強漸若連珠或穿穴膿潰膿汁不絕經久難瘥漸成瘻疾並治之琥珀一兩細研丁香木香各三分桂心半兩硃砂細研木鱉子去殼一兩當歸白芷防風去蘆木通各半兩黃丹七兩垂柳枝松脂二兩麻油一斤二兩上先用琥珀丁香桂心硃砂木香五味為末其餘藥並細銼以油浸一宿於鐺中以慢火煎候白芷焦黃漉出次下松脂末濾去滓再澄清油卻安鐺中慢火熬下黃丹以柳木枝不住手攪令黑色滴水中成珠不散看硬軟得所入琥珀等末攪勻於瓷器內盛用時看大小用白綿紙上勻攤貼不上數個立效永不發烏蛇丸出聖惠方治瘰癧結成顆核腫疼痛不散或破為膿水不絕此方立效烏蛇三兩酒浸去皮骨炙微黃犀角屑玄參昆布洗去鹹味甘草炙微赤枳殼麩炒微黃天麻郁李仁湯洗去皮微炒去油各三分連翹牛蒡子微炒搗大黃微炒黃耆銼漏蘆各一兩斑蝥一分以糯米拌炒米黃去頭足翅上為末煉蜜和丸如梧桐子大每服不計時候以清米飲下二十丸不過數次效五香湯一名五香連翹湯出醫方大成治一切結積熱結核瘰癧癰疽瘡癤等立見大效沉香一分連翹射干寄生無以升麻代大黃蒸各三分乳香一分麝香一錢半丁香二分甘草二分青木香一分上㕮咀每服四錢水一盞煎七分空心熱服以利惡毒為度本方有竹瀝芒硝隨熱輕重當日添減丹參膏出聖惠方療惡肉惡核瘰癧風結諸腫丹參蒴藋各二兩秦艽獨活烏頭白芨牛膝菊花防風各一兩芮草葉躑躅花蜀椒各半兩白朮一兩上切以苦酒二升浸之一宿豬膏四斤俱煎之令酒竭勿過焦去滓以塗諸疾上日五度塗故布上塗貼之此膏亦可服得大行即須少服一方有漢防己無防風升麻散治瘰癧結聚顆塊成瘡上攻頭項疼痛升麻玄參敗醬犀角屑虎杖紫葛桑根白皮甘草炙微赤各一兩連翹大黃微炒各二兩等用紅雪每服一錢湯成下上為散每服四錢以水一盞煎至六分去滓不計時候溫服犀角丸治瘰癧結核犀角屑吳藍黃芩去黑心山梔子仁巴豆去心皮炒研出油各半兩升麻黃耆銼防風去叉甘草炙各三分大黃生銼一兩半連珠草一兩上為末煉蜜和丸如桐子大每服三丸米飲下未利加至六七丸取利為度三黃丸治瘰癧腫毒結成惡核大黃銼炒當歸切焙各一兩梔子仁一分柴胡去苗三分黃連去須黃芩去黑心赤茯苓去黑皮桂去粗皮乾薑炮芍藥各半兩上為末煉蜜丸如小豆大空心溫酒每服十丸日三取微利更以意增減犀角丸治惡核瘰癧犀角鎊木香各一分硼砂研一錢白茯苓去黑皮皂角去皮子酥炙干薄荷大黃銼炒各一兩原蠶蛾何首烏天麻各一兩上為細末用生羊肉精者細切研成膏和丸如黍米大每服七丸茶清下不拘時丹參膏治惡肉惡核瘰癧初腫丹參炙銼白芨各三兩升麻蒴藋根各一兩半獨活去蘆頭防己連翹白蘞玄參杏仁去皮尖雙仁各一兩上細切以生地黃汁一升淹浸一宿鐺內微煎十沸入豬膏四斤微煎一炊久膏成去滓用摩病處日二三度斑蝥丸治瘰癧結核腫硬相連如珠顆頭項肩背煩疼斑蝥一分赤黑斑點者佳去頭翅足炒過令香豬牙皂角一分去黑皮炙令黃蛇蛻皮半兩微炙烏蛇一兩半酒浸去皮炙令微黃天南星半兩炮製去皮露蜂房二兩燒灰大黃三分微炒麝香一分研威靈仙半兩上為末入麝香研勻煉蜜和丸如梧桐子大空心以粥飲下十丸至辰巳間病下如蝦蟆衣及諸惡物丹參湯療惡肉核瘰癧諸風氣結聚腫氣諸病並治之蒴藋丹參各二兩甘草炙秦艽獨活烏頭炮牛膝各一兩躑躅花蜀椒各半兩去汗上切以水八升煮取三升溫服一升忌海藻菘菜豬肉冷水連翹丸出危氏方治瘰癧結核未破或破者薄荷二斤製取汁新者好肥皂一挺水浸去皮治取汁以上二味一處銀石器內熬成膏次之青皮一兩不去白連翹半兩陳皮一兩不去白黑牽牛一兩半半生半炒上為末用前膏子丸如梧桐子大每服三十丸煎連翹湯下食後服之十日見效一方黃連煎湯下四香飲出聖濟總錄治氣癧結核未破者丁香木香沉香銼乳香各一兩枳實去瓤麩炒半兩青橘皮湯浸去白一兩焙陳橘皮湯浸去白焙半兩上粗搗篩每服三錢匕水一盞煎三四沸去滓食後溫服日三連翹散出聖濟總錄治惡核腫痛瘰癧連翹何首烏米泔浸一宿焙干薄荷各一兩麝香研半錢升麻惡實炒白茯苓去黑皮蛇蛻皮酒浸炙各半兩上為散每服一錢匕食前溫酒調下日三犀角散出聖濟總錄治男女瘰癧結核犀角鎊人參鹿角鎊白蘞各一兩糯米一合赤茯苓男用白女用赤各去皮一分斑蝥三十枚上為細散合研令勻看大小斟酌與服每服二十以上二錢匕十歲以下一錢匕並以蜜二匙水二盞同煎至一盞先用滑石末調二錢匕後調此散夜臥時服至明小便內取下惡物三五日一服取瘥為度白蘞散出聖惠方治瘰癧結核根源深固腫硬疼痛白蘞三分黃連去須大黃黃芩莽草赤石脂赤芍藥各三分上為末以雞子白旋調塗於故帛上貼之燥即易之一方有吳茱萸五香湯出宣明論治一切惡瘡瘰癧結核無首尾及諸瘡腫用之沉香木香雞舌香各一兩薰陸香麝香各三分連翹一兩半上為末細研每服二錢水一盞煎至六分不計時候玄參湯治惡核瘰癧風結玄參升麻獨活連翹子各三兩木防己菊花各一兩上切以水八升煮取三升分服一升日三內消丸出聖濟總錄治瘻癧初結累累如梅李核日漸不消則破壞頸腋人參玄參丹參何首烏銼苦參各一兩上為末別用皂角一十挺以麻繩接續穿留索子頭盛在缸內掘地埋餅子留口用童子小便浸三七日如值雨下即蓋勿令著水候日足取出以水洗掛陰處令乾用薄荷四兩酒一升童子小便半升共前皂角同浸一宿取出煎五七沸傾出以手按取汁細布濾去滓入藥末一分在汁內用文武火熬成膏末二分入龍腦麝香各半錢同研勻丸如梧桐子大每服二十丸空心日午臨臥時薄荷茶湯下白蘞膏出聖濟總錄治瘰癧息肉結硬白蘞莽草外臺秘要作甘草玄參木香芍藥大黃生各一兩上為末以醋和如膏塗帛上貼之干極即易內消丸出外科精要治瘰癧結核熱毒鬱滯服之內消青皮陳皮各二兩牽牛半斤取頭末二兩薄荷半斤皂角半斤不蛀者去粒皮捶碎仁以水一斗煮軟揉汁去渣熬成膏上將青皮陳皮末並牽牛末和勻用煎膏子和丸如綠豆大每服三十丸食後荊芥茶清溫水皆可下紫葳散出聖濟總錄治項上瘰癧如棗李核大者先服紫葳凌霄花是海藻洗去咸焙瞿麥穗牡蠣煅研成粉左顧者真甘草炙各一兩上為細末每服一錢半匕食後白湯調下日三神妙散出聖濟總論治瘰癧腫痛成瘡牽牛子炒半生半熟青橘皮湯浸去白焙梔子仁地骨皮玄參上等分為散每服二錢匕空心糯米飲調下次日服後牛犀丸牛犀丸出聖濟總錄消毒化結聚犀角鎊半錢龍腦研半分麝香研半分紅娘子二十枚斑蝥二十一枚去頭足翅同紅娘子豆麵炒焦上為細末用豆麵糊丸如綠豆大每服一丸空心日午夜臥臘茶放溫下服至十日加至二丸除淡飯燒鹽外余並一月肉食切忌治瘰癧結核腫硬疼痛出聖惠方斑蝥十四枚去頭足翅糯米拌炒令米黃為度雄鼠糞二十枚微炒上同研令細入膩粉二錢更研以綠豆麵入新汲水和丸如綠豆大每服空心以麝香酒下三丸覺腹內痛便以硝石末一錢用酒一小盞煎一沸溫服服藥一炊久大小便當有如雀卵汁一合以來下者是效宜服藥補之雄黃丸雄黃丸雄黃細研硃砂細研麝香細研細辛人參去蘆各半兩上為細末入研了藥令勻煉蜜和丸如綠豆大每服於食前以溫酒下三丸螺子丸出聖惠方治瘰癧結核腫硬小螺子一十八枚去尖微炒斑蝥二十一枚炒去頭足翅雀兒糞六十三枚白色者微炒麝香一錢研細上為末入麝香研令勻以好豉一合爛搗研和丸如綠豆大每日空腹以蔥茶下五丸治瘰癧結核不散膩粉一錢研精羊肉二兩切細乾薑一錢凌霄花取白微出一兩上為散入膩粉都拌勻以濕紙裹三五丸重火煨熟取出作一服吃了以溫酒下仍含生薑一片恐吐臥時服至二更取下惡物五日一般服治瘰癧結核外貼令自出方出聖惠方膩粉粉霜燕子糞一分微炒斑蝥一分上研細末用臘月豬脂調勻每用小豆大安癧子上用麵糊紙封定五六七日有膿水下至半月日自出速用生肌藥貼之麝香散出御藥院方治瘰癧結核腫硬不消疼痛麝香半錢研枳殼二錢半麩炒去瓤白丁香二兩上為細末每服二錢用溫酒半盞調勻食後日進一服皂角丸治瘰癧滿項不破及結核腫者好皂角子一升玄參連翹各一兩上用水五升砂鍋內慢火煎水盡為度每服揀取好皂角子軟者三粒食後臨臥時細嚼津下硬者搗爛蜜和丸如榛子大含化半月必瘥忌酒面熟毒物治瘰癧結核人參甘草炙乾薑白蘞各四分上搗篩酒服方寸匕日三忌海藻菘菜治瘰癧結核腫痛令毒內消方硃砂細研膩粉粉霜細研各二兩上同研令勻用雞子白和丸如梧桐子大於五更初煎蔥湯下三丸良久當利如未利再服之治瘰癧結核不散出聖事方雄鼠糞小者是皂角針銼炒黃各一兩槲白皮十兩水八升煎取三升上為末每服用藥末一錢五更初暖藥汁一盞調服服後便臥良久當有大吐如未吐更進一服至吐出病如蝦蟆相似吐盡為效與溫粥食之消毒塗方出聖濟總錄治風熱結硬腫赤疼痛及腮項下腫結成核大黃二兩景天五兩護火草是也上同搗爛塗於患處干即再敷大蒜膏出聖濟總錄治瘰癧結聚大蒜三枚搗爛麝香研半錢匕上和勻敷於帛上貼一日二易旋搗最好又方出聖惠方麝香一錢細研鯽魚兒二十枚長一寸者去腹肚每魚一枚腸內入和皮巴豆一粒上入瓶子中以泥封漸漸以火燒令通赤候冷取出入麝香同研為散每日空心以溫酒調下半錢良久以熱酒投之逐下惡物每日常服下盡惡物其病自消治項上結核出海上方地骨皮榆白皮上不拘多少銼碎煎湯洗之大效丸出聖濟總錄治瘰癧一切結核斑蝥一枚黑豆七粒生茅者上同破為丸如綠豆大每服五丸茶清下小兒一丸此方用之大效鎮肝丸治瘰癧結核腫硬令內消用皂角六挺去皮弦二挺塗酥炙黃