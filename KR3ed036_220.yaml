body:
  text: 卷二百二十諸虛門諸虛門補虛壯筋骨附論夫人之有身不自愛惜竭精縱欲遂至勞傷筋骨肝腎虛弱精氣不足則骨髓枯竭形體消瘦氣血既虛則百病斯作故為虛損也腎主骨肝主筋補肝養腎使精血氣實則所以筋骨自壯也方鹿茸丸補暖下元強筋骨益精髓壯腰膝祛風利氣美顏色鹿茸一兩去毛酥炙微黃蓯蓉一兩酒浸一宿去粗皮炙乾菟絲子一兩酒浸三宿曬乾別搗為末巴戟一兩桂心人參去蘆白茯神五味子萆薢銼黃耆銼續斷遠志木香薯蕷澤瀉熟地黃石斛去根銼覆盆子蛇床子各一兩天雄白茯苓附子炮裂去皮臍柏子仁牡丹防風去蘆各半兩上為末煉蜜和搗三五百杵丸如桐子大每日空心溫酒並鹽湯下三十丸加至五十丸何首烏丸治風和血壯筋骨潤肌體何首烏一斤米泔浸一宿用竹刀切去皮切作片子焙乾赤芍藥牛膝去苗用醇酒浸一宿切焙乾熟地黃焙乾各四兩上木臼中搗羅為末以酒煮麵糊丸如桐子大每服三十丸空心溫酒或米飲下四生丸壯元氣治一切筋骨疼痛萆薢防風去叉狗脊去毛烏頭去皮臍生用上等分先以河水浸烏頭七日夜切作片每烏頭一兩用鹽半兩同炒黃次與諸藥同搗羅取細末用米醋麵糊丸如桐子大每日空心十丸漸加至三十丸溫酒或鹽湯下肉蓯蓉丸出聖惠方暖水臟壯筋骨益精氣利腰腳明耳目強志倍力悅澤顏色充益肌膚肉蓯蓉二兩酒浸一宿刮去皮炙乾令乾末附子一兩炮裂去皮臍巴戟天一兩蘹香子一兩石斛一兩去根銼補骨脂一兩川椒三分去目及閉口者微炒出汗用佳桂心一兩鹿茸一兩去毛酥炙黃木香三分牛膝去苗一兩丁香三分五味子一兩澤瀉檳榔一兩黃耆三分銼白朮三分熟乾地黃一兩人參三分去蘆訶黎勒皮三分山茱萸三分乾薑三分炮製銼硃砂一兩細研水飛過麝香半兩細研上為末研令勻煉蜜和搗一千杵丸如桐子大每日空心以溫酒下三十丸松枝丸出聖惠方治風冷強筋骨補五臟除風濕久服輕身耐老延年益氣補諸不足松枝三兩煉成者松花二兩白茯苓二兩菖蒲一兩桂心一兩生乾地黃二兩薯蕷一兩遠志一兩去心鹿角膠一兩搗碎炒令黃燥牛膝一兩去苗甘草一兩炙微赤銼檳榔一兩肉蓯蓉一兩酒浸一宿刮去皮炙令乾菟絲子一兩酒浸三日曬乾別搗為末鹿茸一兩去毛炙微黃上為末煉蜜為丸和搗三五百杵丸如桐子大每日空心以溫酒下三十丸漸加至四十丸椒紅丸壯筋骨益血脈悅顏色桂心一兩蜀椒去目閉口者炒出汗取紅三兩牛膝去苗酒浸三宿洗曝乾四兩附子二兩炮裂去皮臍巴戟一兩生地黃五兩取汁熬為膏石斛一兩去根銼鹿茸二兩去毛塗酥炙微黃肉蓯蓉三兩酒浸去皮炙菟絲子三兩酒浸一宿焙乾為末磁石二兩燒醋淬七次細研水飛過吳茱萸一兩湯浸焙乾炒硫黃一兩細研水飛過木香一兩上為末入研諸藥令勻煉蜜和搗三二百杵丸如桐子大每日空心鹽湯下三十丸烏頭煎丸補壯筋骨烏頭半斤不去皮尖水浸三二宿天麻一兩牛膝去苗酒浸一宿半兩切焙巴戟天去心半兩海桐皮補骨脂炒半兩肉豆蔻去殼半兩蘹香子炒一兩萆薢木香一兩石斛去苗半兩沉香銼一兩大棗十五枚爛煮去皮核入膏中上用黑豆半升煮烏頭以豆熟為度取出切作片子焙乾用青鹽二兩炒令黃色去鹽搗為細末以醇酒二升先暖酒令滾沸次下烏頭熬成膏然後以諸藥焙乾搗羅為末並棗膏入膏內和納得所丸桐子大每服三十丸空心鹽湯下五味子丸補虛損益氣血壯筋骨五味子熟乾地黃焙補骨脂炒牛膝去苗酒浸切焙各二兩杜仲去粗皮炙銼石斛去根山芋海桐皮銼黃耆細銼各二兩菟絲子六兩淘去浮者酒浸三日別搗取末三兩天雄半兩炮裂去皮臍上為細末煉蜜丸如桐子大每服三十丸空心溫酒下硫黃丸出聖惠方治補虛損益精髓悅顏色久服輕身倍力耐寒暑壯筋骨暖下元硫黃四兩酒煮黑色細研雄雀兒五十隻取肉研硇砂二兩細研阿魏三兩面裹煨面熱為度桂心二兩菟絲子二兩酒浸焙乾為末晚蠶砂三兩半醋浸焙乾遠志三兩去心上為末入研藥令勻煉蜜和搗三百杵丸如桐子大每日空心以鹽湯或溫酒下二十丸不問老少並宜服之補真丸補元氣壯筋骨明目駐顏蘹香子炒一兩附子炮裂去皮臍巴戟天去心各半兩陳橘皮湯浸去白焙一兩青橘皮補骨脂青鹽研各十兩牛膝去苗酒浸一宿切焙乾蜀椒去目閉口者炒出汗取紅各一兩上為細末用羊腎一對去筋膜細切於砂盆內研令極細入酒半斤煮成糊和丸如桐子大每服三十丸空心溫酒或鹽湯下蘹香子丸補虛損除風冷壯筋骨明耳目蘹香二兩炒川楝子二兩陳橘皮二兩去白瓤川烏頭二兩炮裂去皮臍萆薢二兩地龍二兩去土微炒旋覆花蜀椒去目合口者炒出汗各二兩上為末煉蜜和丸如桐子大每服二十丸空心臨臥酒下萆薢丸補虛壯筋骨益氣血萆薢一兩半當歸銼乾薑炮厚朴去皮薑汁製炙桂去皮附子炮裂去皮臍各一兩陳橘皮湯泡去白焙六兩京三稜炮銼上為細末酒煮和丸如桐子大每服三十丸空心食前鹽湯下補氣丸補虛壯筋骨治臍下撮痛及小腸氣葫蘆巴良薑炒補骨脂炒烏頭炮裂去皮臍威靈仙去土各半兩蘹香子炒一兩半檳榔生二枚上為細末醋煮糊和丸如桐子大每服十五丸空心溫酒下肉蓯蓉丸補元氣壯筋骨益精駐顏肉蓯蓉酒浸切焙牛膝去苗酒浸一宿切葫蘆巴炒蜀椒去目並閉口者炒出汗楝實去核炒蘹香子炒各一兩青鹽炒研半兩上為細末用豬腎一隻去筋膜細切將浸藥酒煮熟研爛入前件藥末和勻為丸如桐子大每服二十丸加至三十丸空心溫酒下麋角丸出聖惠方補暖下焦治風虛壯筋骨麋角屑三兩酥拌微炒巴戟三兩肉豆蔻三兩去殼微炒當歸一兩微炒檳榔二兩硫黃二兩細研水飛過乾薑一兩炮製銼上為末入硫黃同研令勻煉蜜和丸搗三五百杵丸如桐子大每服空心以溫酒下三十丸續命丸補虛益氣血實丹田悅顏色壯筋骨干柏葉一斤甘菊花未開者白茯苓熟乾地黃焙四兩松脂一斤用桑柴灰汁二斗煮令白色為度上為細末煉蜜丸如桐子大每服三十丸空心溫酒下萆薢煎丸補益丹田壯筋骨萆薢一斤用新米泔水洗淨焙乾入新瓦罐子內以酒五升浸用油單紙密封口放日中曬一七日焙乾為末補骨脂炒四兩狗脊去毛醋炙巴戟天去心牛膝去苗酒浸切焙蘹香子以鹽二兩同炒各二兩上以蜜胡桃仁相和熬如稀餳後入補骨脂末和丸如桐子大每日空心以溫酒下三十丸一方煉蜜和勻如飴盛瓦器中旦日以溫酒化下一丸熟水亦可久服延年益氣忌蕓薹羊血刪繁本草注云補骨脂令多以胡桃合服此法出於唐鄭相國自序云豫為南海節度年七十有五越地卑熱濕傷於內外衆疾俱作陽氣衰絶服乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶知豫病狀遂傳此方其藥豫初疑而未服摩訶稽顙固請遂服之經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸録傳之破故紙十兩湯浸去細皮研如泥即入前藥更以好蜜和攪令勻如飴餳盛於瓷器中旦日暖酒二合調藥一劑服後便以飯壓之如不飲人暖熟水調亦得服餌久則延年益氣悅心明目補添筋骨但忌食蕓薹羊血余無忌此物本自外蕃隨海舶而來非中華所有蕃人呼為補骨脂訛語為破故紙也婦人服之亦佳沉香丸調順脾胃補益真氣進飲食壯筋骨治虛乏輕腰膝沉香丁香肥者南木香舶上茴香炒香補骨脂炒南番葫蘆巴炒石斛去根川芎巴戟去心牛膝青橘皮去瓤以上各一兩附子半兩炮上為末煉蜜丸如桐子大每服三十丸空心溫酒下飯飲亦得久服尤妙鹿茸丸出十便方補真氣暖腎臟縮小便退陰進陽壯筋骨耐寒暑進飲食鹿茸二兩蓯蓉焙乾稱附子山藥地黃牛膝破故紙各一兩桂麝香一分上搗羅為末以酒蜜各一半煉熟丸如桐子大每服三五十丸空心酒下香茸丸又方出十便良方熟乾地黃五兩菟絲子四兩另末鹿茸三兩上為細末入麝香半錢煉蜜杵丸如桐子大每服三十丸至五十丸鹽酒鹽湯任下香鈴丸出王氏博濟方補助元氣壯筋骨進飲食療膀胱小腸等氣疾茴香舶上者慢火炒令香金鈴子麩內炒過蕓薹子炒大附子炮裂去皮臍桑螵蛸略炒馬藺花醋浸一宿炒令紫色各一兩上件六味煉令淨同杵為末酒煮麵糊丸如桐子大每服空心鹽湯下三十丸養肝丸出朱氏集驗方治養血氣壯筋骨白芍禹餘糧煅蓯蓉黃耆蜜炙當歸茯神杜仲鹿角膠炒一兩半牛膝木瓜川續斷柏子仁石菖蒲各半兩上為末醋糊丸如桐子大早空心鹽湯下青鹽丸出聖濟總録固丹田壯筋骨青鹽細研一兩蜀椒去目合口者一兩半肉蓯蓉酒浸一宿切焙巴戟天去心各二兩牛膝酒浸一宿焙上為細末用獖豬腎一對去脂膜細切研爛以浸藥酒熬為膏丸如桐子大焙乾每服五十丸空心食前溫酒或鹽湯下附子丸出朱氏博濟方大壯筋骨補益丹元進飲食化氣兼治腳氣腰膝乏力行步艱難或即疼痛或下注成瘡大附子十兩用黑豆一升水五升不犯鐵器慢火煮候豆熟附子軟為度切作片子焙令乾川芎六兩木瓜末牛膝半斤羌活四兩上為末蜜三斤和勻熬如餳膏可丸如桐子大空心食前鹽湯溫酒任下十五丸或二十丸消穀助筋骨行營衛明目輕身出本草以棐實多食一二升佳不發病令人能食治筋骨弱嘔吐以鹿髓地黃汁煎作膏服補中益氣堅筋骨通血脈興陽道用陳倉米作飯干食之補虛治風附論夫風者百病之始也清淨則肉腠閉拒雖有大風奇毒弗之能害體虛之人本臟虧耗風邪易乘其症或心神驚悸手足顫掉筋脈拘急凡此之類皆因虛挾風所致法宜補藥中加以治風之劑方地仙丸治風順氣補元陽活血大壯筋骨滑肌膚明目益壽駐顏久服輕身萆薢防風去叉白蒺藜炒狗脊去毛烏藥銼附子炮裂去皮臍白附子炮赤小豆揀地龍去土骨碎補炒蘹香子炒羌活去蘆天南星炮黃耆銼炒各半兩牛膝酒浸切焙肉蓯蓉酒浸切焙何首烏去黑皮蜀椒去合口者及目炒出汗覆盆子去蒂各一兩木鱉子三分上為末酒煮麵糊為丸如桐子大每服二十丸空心食前鹽湯或酒茶任下男子久冷元氣虛憊腳手疼痛等疾皆可服之穀神厚朴丸治真元虛弱風寒冷氣入於腸間使心腹暴痛背脊痠疼腸鳴泄瀉心虛嗜臥調順陰陽安和臟腑散風冷外邪補丹田正氣厚朴去皮生薑汁炙枳殼去瓤麩炒蘹香子炒香肉豆蔻去殼桂去粗皮白朮各一兩丁香蓽澄茄各半兩上為細末酒煮麵糊為丸如桐子大每服十丸至二十丸空心溫酒或鹽湯下婦人久冷亦可服磁石丸出聖惠方暖腰腎壯筋骨明耳目利腳膝磁石三兩燒醋淬七次細研水飛過雄黃二兩細研水飛過桂心末二兩牛酥一分雄雀糞一分菟絲子二兩酒浸三日曝乾另搗為末上將磁石雄黃二味取雞子二枚打破小頭作一孔出白調和二味令勻卻入於雞子殼內以數重紙糊定後卻與雞同抱之二十日後取出細研並菟絲子桂心二味末入牛酥等以蜜和丸如緑豆大每日空心以溫酒下三十丸補暖壯元陽氣神效蓯蓉丸補壯筋骨蓯蓉酒浸一宿切焙附子炮裂去皮臍牛膝去苗酒浸一宿切焙鹿茸酥炙去毛半兩菟絲子酒浸二宿另搗末各一兩上為細末酒煮麵糊為丸如桐子大每服三十丸鹽湯或白湯下烏頭丸補元臟壯筋骨益氣力療風寒濕痹身體手足不隨何首烏丸壯筋骨烏潤髭發益血脈助陽氣治一切風攻手足沉重皮膚不仁遍身麻木風勞風疾何首烏淨洗以竹刀刮去皮切一斤與淨黑豆一升同用新汲水浸一宿炊以豆爛為度取出曝乾天南星炮去皮臍菖蒲緊小者去皮毛各四兩牛膝去苗酒浸焙半斤上為末以酒四升醋二升慢火熬竹篦子不住手攪候將藥杵和丸如桐子大空心食前溫酒下三十丸臨臥鹽茶下十丸補骨脂丸出聖惠方暖下元補筋骨久服令人壯健悅澤顏色及因感濕陽氣衰絶補骨脂五兩微炒搗羅為末胡桃仁二兩研如脂蜜四兩訶黎勒皮沒藥細辛去苗葉洗焙天麻獨活去蘆赤石脂當歸芎藭半兩防風去叉各三分上為細末酒煮麵糊為丸如桐子大每服二十丸至三十丸溫酒下米飲亦得空心食前服如呼吸冷氣心腹疼痛裡急後重亦宜溫酒下二服牛膝蓯蓉丸治本臟虛冷暖壯筋骨去風明目牛膝切酒浸焙蓯蓉酒浸三日焙乾用補骨脂炒葫蘆巴蘹香子炮枸杞子楝實巴戟天去心白附子炮附子炮裂去皮臍青鹽羌活去蘆頭蜀椒去目併合口者炒出汗獨活去蘆頭白蒺藜炒黃耆銼炒各一兩上為細末分三處將二處藥用前浸牛膝蓯蓉酒煮麵糊為丸如桐子大每服空心溫酒下二十丸至三十丸服一月面上紅臍下暖進飲食減昏困為驗余藥為散子如傷冷腹痛用羊腎或羊肉上摻藥一錢匕青鹽半錢匕炙得香熟吃以溫酒下如患小腸氣及小便赤澀每服一錢匕入蘹香子青鹽少許水一盞煎至八分空心食前服萬安丸治虛損大補益調氣除風乾蠍炒二兩白花蛇酒浸取肉炙桃仁去皮尖雙仁炒研各四兩檳榔銼蓯蓉酒浸切木香當歸切焙蘹香子炒羌活去蘆頭芎藭天麻桂去粗皮沉香銼白附子炮阿魏米醋研用安息香研各一兩半上為末用蜜一斤拌和為丸如雞頭子大每服溫酒或茶嚼一丸硇砂煎丸治男子脾腎風勞大補益元臟和一切氣椒紅丸治本臟虛損補暖逐風冷聰明耳目蜀椒去子併合口者八兩以火燒一坑子潑酒在上次傾椒在上急用一新瓦盆緊合定四縫以新土密封一伏時取出揀取紅不用白附子炮裂去皮臍二兩木香肉豆蔻去殼各四兩陳橘皮湯浸去白焙二兩生薑四兩切作片炙黃巴戟天去心蓯蓉酒浸切焙牛膝酒浸切焙五味子炒桂心去粗皮補骨脂微炒黃蘹香子微炒蒺藜子炒去角各一兩檳榔銼半兩上為末用羊腎四對去筋膜細銼入青鹽二兩於沙盆內同研和前藥為丸如桐子大若調時更入少麵糊和丸每日溫酒下三十丸鹽湯下亦得空心食前服天仙丸治腎臟久虛補暖逐風木香一兩硫黃二兩柳木椎研一七日頻以甘草水灑蘹香子微炒四兩桂去粗皮附子炮裂去皮臍各三兩葫蘆巴補骨脂金鈴子酒焙巴戟天去心檳榔銼牛膝切酒浸焙萆薢青橘皮浸去白焙沉香銼各一兩上為末酒煮麵糊為丸如桐子大空心鹽湯或酒下十五丸加至二十丸加五味子尤佳此藥亦名大王辰丹蛜𧌴丸出聖惠方治腎臟久積風冷小腹氣滯腰膝痠痛臍脅冷痛飲食減少四肢無力蛜𧌴天麻附子炮裂去皮臍木香補骨脂葫蘆巴牛膝去苗石斛去根銼檳榔巴戟天硫黃細研水飛過硇砂細研阿魏研入桃仁湯泡去皮尖雙仁不用另研如膏以上各一兩上為末入研了藥令勻用酒三升入前藥末中拌勻攪以慢火熬如膏和余上藥末更搗三二百杵丸如桐子大每服以熟生薑酒下二十丸肉蓯蓉煎丸治上熱下冷元臟風虛膀胱氣攻四肢腰腳無力疼痛頭目昏眩腹脅妨悶大虛補益肉蓯蓉好肉者酒浸薄切焙乾稱一斤巴戟天去心附子炮裂去皮臍蘹香子微炒各四兩牛膝去苗用半斤酒浸一宿炒乾與蓯蓉二味搗羅為末用無灰酒二升入銀石瓦器中重湯煎成膏葫蘆巴桂去皮木香青橘皮肉豆蔻去殼白附子炮山芋乾蠍用黃色頭尾全者微炒各二兩上除膏外細搗羅為末候膏成稀稠得所便入諸藥末一處和丸如桐子大空心溫酒或鹽湯下二十丸恐藥軟但於盤內攤可丸即丸入新瓷器中盛服藥一月見效百日後諸病俱退仙茅丸治風順氣調利三焦明耳目益真元壯筋骨駐顏色仙茅切片刮去皮米泔浸曝乾羌活去蘆頭白朮狗脊去毛白茯苓去皮各一兩薑黃菖蒲白牽牛各一兩半威靈仙去土二兩何首烏去黑皮蒼朮浸切焙防風各一兩上並生用細搗為末以生白蜜和為劑再入臼杵一二千下丸如桐子大每服十五丸至二十丸冷水下不嚼婦人月事不通紅花酒下半月見效卻老蓯蓉丸治腎臟虛損補真臟氣去丹田風冷調順陰陽和胃進食肉蓯蓉酒浸切焙二兩山芋五味子炒各一兩澤瀉菟絲子酒浸三日焙乾另研取末赤石脂研白茯苓去粗皮山茱萸焙熟地黃焙覆盆子去梗石斛去根各一兩巴戟天去心上為細末酒煮麵糊入蜜少許同和丸如桐子大每服二十丸至三十丸溫調下粟米飲亦得空心食前服硇砂丸出聖惠方治腎臟風冷氣臍腹疼痛硇砂乾薑炮製銼檳榔當歸銼微炒桂心乾蠍微炒苦楝子烏蛇肉酥拌微炒蘹香子附子炮裂去皮臍沉香子以上各一兩木香半兩上為末用好酒一升先煎硇砂消後用紗絹漉去石相次下諸藥末慢火煎之候可丸即丸如雞頭子大患者以熱酒化二丸服黃耆羌活丸治腎臟虛風補益元氣黃耆略炙炒羌活去蘆銼米泔浸一宿焙附子炮裂去皮臍蒺藜子炒去角烏頭炮裂去皮尖沙苑蒺藜生用牛膝酒浸一宿焙木鱉子去殼防風去叉淨洗銼萆薢淨洗切各一兩狗脊去毛生用一兩半上為細末酒煮麵糊為丸如桐子大每服二十三十丸空心鹽湯下牛膝丸補虛損逐風氣益精駐顏壯筋骨通血脈牛膝酒浸切焙益智炒大棗用燈心煮熟去皮核各四兩蜜一斤煉乾薑炮一兩半桂去皮二兩半厚朴去皮生薑汁炙三兩遠志去心各一兩陳橘皮湯泡去白焙二兩烏頭炮裂去皮臍上除蜜棗外搗羅為末先將肉棗同藥末研後入蜜同丸若干燥即浸藥酒添助少許和丸如桐子大每服二十丸至三十丸空心鹽酒下十華飲出衛生寶鑑治元氣虛損理脾胃風解二毒傷寒除腰膝疼痛療酒色傷憊霍亂吐瀉偏風冷疼麻痹痛腳氣腫注行履不得等疾附子炮裂去皮臍黃耆銼羌活去蘆白朮漂炒桔梗銼炒青皮湯泡去白焙乾薑炮桂去皮甘草炙五加皮用吳茱萸一兩以水一碗用煮水盡為度去茱萸取五加皮細切焙乾各一兩上粗搗每服三錢水一盞入生薑二片大棗三枚擘破煎至六分去滓不拘時候溫服一方加附子乾薑桂各半兩余品味同入鹽煎一方有人參無桔梗人參地黃丸治下經不足去風冷邪氣調順脾胃壯氣明目進飲食人參巴戟天去心肉蓯蓉酒浸一宿切焙白朮甘菊花菟絲子浸酒一宿焙乾搗末五加皮銼石斛去根柏子仁另研熟地黃焙各一兩上件為末煉蜜和丸如桐子大每服三十丸溫酒下食前服牛膝附子煎丸出王氏博濟方治男子下元虛冷傷憊筋骨衰弱遍身癮疹及風氣上攻下注疼痛不可忍者牛膝去苗細切五兩酒浸三日取出研如麵糊用酒於銅銀瓷器內慢火熬成膏虎骨酥炙黃色附子炮裂去皮臍各三兩補骨脂炒葫蘆巴肉蓯蓉酒浸三日細切焙各四兩巴戟天去心生用仙靈脾去莖生用一兩芎藭上搗羅八味為細末用牛膝膏和入臼杵令軟得所丸小彈大若難丸更入熟蜜少許同丸早晨夜臥溫酒化下一丸服一月永無風氣等疾海桐皮丸治下臟風虛耳內蟬鳴久服壯筋骨駐顏色利胸膈調脾胃補虛海桐皮銼楝實銼炒蘹香子石斛去根牛膝寸截酒浸一宿焙乾一兩檳榔煨銼一兩芎藭一兩木香上為末煉蜜丸如桐子大每服溫酒或鹽湯空心下二十丸至三十丸小牛膝丸治腎臟虛冷風氣等疾牛膝寸截用酒一碗浸一伏時煮三兩沸搗爛取汁熬成膏防風去叉附子炮人參赤小豆揀各二兩地龍去土檀香銼各半兩乳香三分上搗七味為末入膏和丸如黃豆大每服十五丸至二十丸空心鹽湯下覆盆子丸出聖惠方治諸風虛補暖下元變白髮久服神效覆盆子半斤五粒松半斤枸杞子六兩秦皮四兩川升麻三兩苣蕂五兩楮實五兩水淘去浮者曝乾微炒上為末以生地黃汁一升好醋半升蜜半斤酥七兩先煎地黃汁等十餘沸入藥末和丸如桐子大每服於食後以溫酒下三十丸如不飲酒以漿水下切不得食白蒿青蒿荏子蘿蔔蒜等物椒紅丸出聖惠方大補益治風毒健脾胃止咳逆消酒食暖下元補諸虛憊川椒十兩微炒附子四兩炮裂去皮臍白蒺藜二兩微炒去刺巴戟二兩硫黃二兩細研水飛過硇砂二兩細研鹽花二兩上為末研令勻用獖豬腎五對煮熟去脂膜研爛如糊入諸藥末和乾溼得所搗一二千杵丸如桐子大每日空心以鹽湯下三十丸或酒下亦得地骨皮丸治風溫補血氣地骨皮牛膝菟絲子焙枳殼去瓤麩炒遠志去心熟乾地黃炒各六兩上並用酒浸三日焙乾為末用浸藥酒煮麵糊為丸如桐子大每服三十丸空心溫酒下烏頭丸出王氏博濟方治補暖水臟虛冷壯筋骨縮小便大治風烏頭一斤用東流河水浸七日每日三度換水日滿取出去黑皮並皮尖切作柳葉片入牽牛子一合同炒候香熟即去牽牛子不用蘹香子炒另搗為末二兩青鹽五兩另研蜀椒去目併合口者炒去汗牛膝各五兩細切以好酒浸七日爛研陳橘皮酒浸去白焙二兩上用牛膝膏和勻入臼再搗千下丸如桐子大每日空心鹽湯或溫酒下十五丸至二十丸牛膝須酒浸後爛研與諸藥末拌和恐難得細或只將牛膝浸日足焙乾為末卻將浸牛膝酒煮糊和末為丸亦得若更利膈湯散最相宜也一方無陳皮納青鹽蜀椒牛膝止用四兩余藥味同鹿茸丸治元臟虛損一切風冷鹿茸去毛酥炙附子炮裂去皮臍當歸酒浸一宿焙白朮細辛去苗葉生用桂去皮生用各一兩上為細末煉蜜為丸如桐子大空心每服日午鹽湯下二十丸至三十丸沉香紫桂丸治丈夫元臟氣虛損及婦人血海虛冷月脈憊漏五般帶下臍腹㽲痛及一切虛風冷氣攻注桂去粗皮烏頭泡裂去皮臍赤石脂燒各一兩蜀椒去目合口者炒出汗各半兩乾薑炮上為末酒煮麵糊和丸如桐子大每服二十丸空心食前醋湯下丈夫鹽湯下除風散治八部諸風延年卻老駐顏色益氣血白朮甘菊花白茯苓去皮天門冬去心各一兩天雄炮裂去皮臍半兩上為細散每服一錢匕溫酒調下空心食前日進二服硇砂丸出聖惠方治水臟憊傷久積風冷硇砂半兩硝石一分青鹽半兩白礬一兩黃丹一兩上細研令勻用瓷瓶子盛固濟瓶口以炭火七斤煅令通赤放冷取出細研以糊和丸如緑豆大每日空心以粥飲下十丸內養丸聖濟方一名草還丹一名益壽地仙丸治本臟虛風皮膚瘡腫固濟丹田五緯丸治虛損補暖丹田去風冷氣附子一枚炮裂去皮臍為末桂去皮為末各一兩乾薑炮為末二錢硫黃細研上同研細麵糊和丸如桐子大丹砂為衣遇脾胃冷不思飲食腹中疼痛頻頻洞瀉及赤白痢並膿煎艾湯放冷下十丸良久再服怕冷物用冷水下十丸如小兒有此患化下一丸如冬天遠出早行亦用冷水下五七丸大禦寒氣此藥不熟甚溫亦無反惡大無所忌常服五七粒永不患結胸陰毒傷寒等症不拘時候服四靈丸治腎虛還元保命壯氣除風苣蕂子一兩白茯苓去皮五兩生乾地黃焙麥門冬去心焙各一兩上為細末煉蜜丸如桐子大每服三十丸煎棗湯下水飲亦得服至百日自覺有異通神三靈丸治本臟諸虛延年益壽祛風氣通營衛活血脈壯腰腳柏葉四斤米泔浸七日每日換泔洗淨至次日取出近日陰處曬乾杵為末松枝四兩用滴乳香以桑葉灰汁內煮半日以上候化取出絞取淨汁入新水內候凝細研如粉上為末同拌勻煉和丸劑再杵一千下丸如桐子大每日空心臨臥茶酒或溫水下五十丸煨腎丸治虛風補暖黃耆蒸過焙乾白蒺藜炒羌活去蘆頭各半兩上為散每服豬腎一對入末四錢入鹽少許摻於腎內濕紙裹煨熟食之次用溫酒一盞投之妙蓯蓉丸治腎虛補元臟除諸風益脾實腎烏頭一斤炮裂去皮臍入米泔浸七日逐旦換水七日了別搗生黑豆末一斗以水二石煮烏頭作片子如盞大漸添豆末入水自平明煮至黃昏取出去豆末止將烏頭片子於長流水內浸半月出熱毒日滿陰乾入青鹽三兩同結末蓯蓉半斤酒浸二日入飯甑蒸三度每度添酒滿再蒸候蒸得如泥軟入砂盆內研爛牛膝半斤酒浸二日一日一焙乾搗為細末上以烏頭牛膝末入在蓯蓉膏內和勻丸如兩皂子大每服一丸溫酒嚼下日二三服永絶脾胃冷氣烏頭丸治風氣暖水臟去腰膝痠疼臍腹虛冷用川烏頭不以多少淨洗曬乾寬掘地坑子一所卻用好土實填築於好土內取作坑子一所亂削坑子口周回如法然後用炭火燒令通赤卻去火用釅醋一碗傾在坑子內候滲盡便勻鋪排烏頭在內使好土蓋覆厚一寸以來築卻然後坑口頭以炭火密排燒之斟酌欲熟於坑口邊取出一枚看之以軟熟為度其藥又不得令生又不得太焦切在用意取出曬乾搗羅為末以粳米飲和丸如桐子大每服溫酒或鹽湯下十丸加至二十丸為度曲囊丸出千金方治風冷補虛弱亦主百病方乾地黃薯蕷牡蠣天雄蛇床子遠志杜仲鹿茸桂心五味子鹿藥草石斛車前子菟絲子蓯蓉雄雞肝蠶蛾各等分上十七味欲和任意搗末蜜丸如小豆大酒服三丸加至七丸日三夜一禁如常法須常有藥氣大益人服藥十日以後少少得強烏頭丸出廣南四時攝生論大補暖疏風治氣空心常服即無諸疾川烏頭一斤以川中者無積草者先以黑豆一斗用水與烏頭同煮水乾旋添湯煮豆爛為度出豆不用烏頭去皮臍以竹刀切作片用鹽四兩湯化為水將烏頭同煎爛研成膏子乃用後藥肉豆蔻四斤沉香一兩半破故紙一兩微炒巴戟天一兩去心海桐皮二兩牛膝二兩半茴香二兩微炒甘草半兩天麻一兩半虎脛骨一兩檳榔一兩上為散入烏頭煎攪和入臼內杵搗臨時看硬軟少許入蒸餅丸如桐子大每日空心鹽湯或溫酒下二十丸煎烏頭或用青鹽更妙金粉丸出王氏博濟方治風冷氣流注腰腳疼痛行步艱難久患不瘥川烏一兩每個劈開作片子牛膝一兩去毛酒浸洗切之何首烏一兩劈破上用大豆一斗淘淨先入一半甑內次下三味更用余豆蓋蒸半日只取藥陰乾為末別入地黃金粉一兩拌勻以酒和丸桐子大空心木瓜酒下三十丸或二十丸濟危上丹出衛生家寶方治虛極生氣産後尤妙乳香研五靈脂研硫黃研陳皮去白太陰玄精石研以上四味用石器內微火炒桑寄生真阿膠炒上等分為末同和用生地黃汁糊丸如桐子大溫酒下二十丸救陽湯出十便良方治陽微陰勝風寒侵襲真氣暴衰形寒脈結神識不明心胸痰滿嘔逆清涎頭目昏眩不覺倦臥自汗不止飲食不入下利頻數臍腹疼痛肢體困倦並主之川烏頭乾薑各四兩搗碎同炒轉色上為粗末每服三錢以水三盞煎一盞去滓食前溫服寒多加良薑二兩汗出多加牡蠣一兩痰加附子二兩風加防風一兩肢節痛加桂一兩火輪丹即豨蘞丸出鮑氏方補虛損益真元除諸等風症用豨蘞草葉如芥菜而狹長長高三尺秋乃花實苗色赤杆色緑為上青色次之節葉對生其根白枝杆方花小而黃向上開下有金絲紋是也其根枝圓花黃而大向下開如杓葉深緑下無金絲葉不相對者鶴蝨也豨蘞草略似蒼耳牛膝高於鶴蝨案原方缺藥味及原製法及服法一諸般風氣痢桑株上木耳湯下冷氣乾薑湯下軟風頑麻風殭蠶湯下諸般勞風溫酒鹽湯下奔豚風膈氣腎俞風乳香湯下筋骨風炒皂角子湯下血風血氣蕓薹子湯下久血痢荊芥湯下蛔蟲食厥及一切風參湯下小兒腎腫陳米飲下痃癖風檳榔湯下除風血補益出本草以陳恩岌浸酒服之治風血去諸冷益老起陽出本草用鹿藥浸酒服之主一切風血補益並諸疾出本草以羊不吃草煮服之亦浸酒服補虛消痰附論夫脾胃者倉廩之官播萬物氣澤以埤諸臟腑者也脾土也土能制水則水不溢虛損之人脾胃氣弱故於水穀不能克消土氣不能勝水津液停積結聚上膈是為痰也令補虛兼以助脾之藥則痰自消矣方天麻煎丸出聖濟總録治肝腎久積風冷痰滯氣上攻眼目腫澀疼肌肉瞤動心神倦痰去涎少壯筋骨補元氣益心利肺天麻半斤淨洗焙乾搗末牛膝酒浸切焙一斤搗為末杏仁湯浸去皮尖雙仁細研四兩生地黃五斤好者淨洗於臼內杵取汁三升上同於銀器內以新水三斗煎至七升以布絞取汁卻將滓於木臼內搗令極細後以水三五升浸取汁同於銀器內熬更用無灰酒五升安息香三兩慢火煎成膏後入葫蘆巴二兩天雄炮裂去皮臍石斛去根沉香銼桂去皮巴戟天去心玳瑁醋炙為末檳榔白花蛇酒浸炙去皮骨各一兩當歸切焙一兩酸棗仁炒一兩芎藭一兩遠志去心三分大腹和皮銼一兩獨活去蘆頭三分乾薑炮製一兩益智去皮三分木香一兩上除前四味外搗羅為末入前膏內和為丸於木臼內杵一二千下丸如桐子大每服以酒下二十五丸加至三十丸若常服空心一服有疾早晚一服枇杷前胡湯一名枇杷葉湯出聖濟總録補益五臟去痰飲三焦虛熱風勞毒氣攻手足寒熱煩躁方見虛勞門虛勞痰飲類附子湯出聖濟總録體勞倦四肢拘急腹內刺痛體弱風疾頭痛腎臟傷憊胸臆噎塞久疾冷氣婦人血海冷滯補不足附子炮裂去皮臍烏頭炮裂去皮臍柴胡去土前胡去蘆黃耆芎藭白朮人參木香當歸切焙羌活去蘆頭甘草炙桔梗炒白芷地榆桂去皮各一兩上銼如麻豆大每服三錢水一盞生薑二片棗二枚蔥白一寸同煎七分空心服五味子出聖濟總録治痰盛利胸膈和脾胃肺氣止嗽思食治心經虛熱咽喉舌乾澀壅悶口內生瘡五味子人參訶黎勒皮炒白朮白茯苓去皮桔梗炒枳殼去瓤麩炒前胡去苗土貝母去心炒甘草炙陳橘