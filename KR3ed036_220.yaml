重足痛行步艱難腿膝無力補丹田壯筋骨磁石二兩炭煅醋淬七次硇砂半兩上捶碎入沙罐子內鹽泥固濟木炭火燒令通赤候冷取出細研以煮羊腎一對細爛研取汁入少面為糊和丸如桐子大陰乾每服三十丸空心食前鹽湯下黑錫丸出本草方治虛心久冷黑鉛硫黃各三兩結砂子舶上茴香附子葫蘆巴破故紙川楝肉肉豆蔻巴戟木香沉香各半兩上將砂子細研余藥末研勻入碾自朝至夕以黑光色為度酒糊丸如桐子大陰乾布袋內絞令光瑩如丈夫元臟虛冷真陽不固三焦不和上熱下冷夜夢鬼交覺來時汗流滿面肌體燥澀耳內虛鳴腰背疼痛心氣虛乏精神不寧飲食無味日漸羸瘦並膀胱久冷夜多小便婦人月事愆期血海久冷惡露不止赤白帶下及陰毒傷寒面青舌卷陰縮四肢厥冷不省人事急用棗湯吞一二百粒即便回陰命無不活但是一切冷疾鹽酒湯下空心吞下三四十丸婦人艾醋湯下此藥大能調治營衛升降陰陽安和五臟灑陳六腑補益虛損回陽反陰功效神聖麋角丸出聖惠方治久積虛冷補暖下元溫中治氣麋角屑三兩酥拌炒微黃蓯蓉二兩酒浸一宿去皮炙乾補骨脂二兩微炒附子炮裂去皮臍巴戟各二兩木香桂心龍骨蘹香子一兩硫黃一兩細研水飛過上為末入硫黃同研令勻煉蜜和搗三二百杵丸如桐子大每日空心以鹽湯下三十丸附子丸治元氣虛冷婦人赤白帶下血海諸冷附子一兩炮裂去皮臍硇砂上搗研為末酒煮糊為丸桐子大每服三十丸男子鹽湯婦人醋湯下空心服附子丸出十便良方補暖下元附子半斤生用硫黃二兩細研水飛過上以新汲水浸附子七伏時每一伏時換水一遍並不令見日氣日數足陰乾去皮臍搗羅為末入硫黃攪令勻以羊腎三對去筋膜研以酒三升煮令稠和末看硬軟得所搗三五百杵丸如桐子大每日空心以鹽湯下二十丸附子煎方出傳信適用方治虛冷用生附一個重九錢以上者生去皮臍切片捶碎亦得用水三大盞入晉棗十枚生薑切二兩以炭火銀石器煎別用水一盞遇沸即以水旋點之點盡水煎至一大盞為度取滓再用水二盞煎至一盞共用沉香磨一錢青鹽一錢再煎沸即止放溫分作二服畢以蒸餅壓之再溫第二服用重湯不可再煎也補真丹出宣明論治男子元臟虛冷興陽助腎不燥黑附子一兩炮陽起石酒蘸燒灰三錢海馬二對乳香雌黃為衣血竭各三錢石蓮子半兩擘去心皮黑錫炒去砂子半兩石燕子一對入鍋內燒紅用鹽泥固麝香一分上搗末合為丸每服二十丸用五香湯下空心五香湯出宣明論沉香箋香乳香麝香檀香各等分上為末每服半錢煎湯下十補丸出楊氏家藏方治元臟虛冷臍腹刺痛脅肋脹滿泄痢腸鳴困倦力竭小腸氣痛等疾並皆治之玄胡索炒葫蘆巴炒蓽澄茄茴香木香補骨脂炒巴戟去心蓯蓉酒浸一宿切焙川楝子炒以上各一兩九味附子炮去皮臍半兩上件併為細末麵糊為丸如桐子大每服五十丸以硃砂為衣溫酒鹽湯任下空心食前白澤丸治臟腑虛冷真元不固腸鳴泄痢心腹撮疼氣逆嘔吐自汗無時陽起石一兩半煅令通赤研附子炮去皮臍取末一兩半鍾乳粉煉成好者二兩白檀香滴乳粉麝香一錢另研上件和勻滴水成劑分作六十丸每服一丸一盞水化開生薑三片煎至七分通口溫服空心食前黑錫丹治上實下虛真元衰憊陽氣耗損陰氣獨盛上喘氣促泄瀉嘔逆自汗心忡小便頻數一切虛寒並皆治之黑錫四兩新銚中以火熔開用香撥去錫滓入硫黃半兩用炒過取出碾為細末稱二兩別入硫黃末二兩二味和入銚中煉成汁取下銚候冷再見火如此三次令研為末舶上茴香微炒附子炮去皮臍川楝子肉炒破故紙炒肉豆蔻麵裹煨木香微炒以上六味各一兩上為細末卻將黑錫末一處和勻酒煮糊為丸如桐子大每服五十丸病勢重加一百丸空心食前米飲送下服畢以乾物壓之鐘乳石丸治臟寒腹痛下痢不禁鍾乳粉煉成者半兩硫黃半兩另研白礬一分火飛陽起石一分另研上為細末煮糊丸如小豆大每服十丸粟米飲下空心食前下固本丹治男子一切虛損衰弱夜夢顛倒遺精失溺小便白濁婦人血海久冷崩中帶下久無子息皆可治之牡蠣白者生為細末別用好醋和為丸子入火燒令通赤放冷稱四兩白石脂二兩硫黃一兩半陽起石一兩上件同研為末煮湯和丸如桐子大陰乾入合子內以赤石脂封口外用鹽泥固濟候乾煅令鬼焰絶埋黃土內出火毒三時辰取出每服五十丸溫酒或米飲空心送下艾硫丸去邪養正補真益脾治髓冷血虛腰痛腳弱及傷冷心腹疼痛霍亂吐利自汗氣急下元久虛小便頻數婦人衝任不足月水愆期腹肋刺痛崩漏帶下全不思食兼治傷寒陰症手足厥冷脈微自汗熟艾十兩用水一升煎成膏子將膏子塗艾上令勻日中曬乾乾薑十兩炮生硫黃別研細生二兩附子二枚炮去皮臍上件為末麵糊和丸如桐子大每服三十丸至五十丸溫米飲下食前服硫黃尉法治臟腑虛冷吐利不止及陽虛陰盛真氣脫弱欲灸不能勝火力者宜用此法硫黃萆薢子七枚去皮細研上件同研令細每用藥二三錢填在心臍內令滿以衣被蓋定用尉斗入文武火慢慢尉之白日須是尉半日夜間尉半夜盡多時為妙香茸丸補下元虛憊面色黧黑能除一切寒冷病及小腸尿白脬寒附子二個重六錢以火炮裂去皮臍葫蘆巴洗淘淨白茯苓去皮安息香酒洗化下滓酒浸作糊丸藥如無安息香以鹿茸代茸以酒洗浸炙黃桃仁麩炒去皮蓯蓉酒浸切焙木香以上各二兩麝香一錢入麝與茸謂之香茸丸去麝與茸用安息香謂之安息丸上為細末酒糊為丸如桐子大每服三十丸空心食前鹽湯送下膃肭臍丸治五勞七傷真陽衰憊臍腹冷疼肢體痠疼腰背拘急腳膝緩弱面色黧黑肌肉消瘦目眩耳鳴口苦舌乾飲食無味腹中虛鳴肋下刺痛心腹慘戚夜多異夢日少精神小便滑數大便溏泄時有遺瀝陽事不舉但是風冷濕氣皆可服之膃肭臍一對用酒蒸熟打和後藥天雄炮去皮臍附子炮去皮臍川烏炮去皮臍陽起石煅鍾乳粉各二兩人參硃砂研極細沉香不見火別研鹿茸酒浸各一兩上為細末用膃肭膏子入少酒糊入臼內杵和為丸如桐子大每服七十丸空心用鹽酒鹽湯任下青蛾丸出風科集驗方魏將使方序云舶上破故紙人呼為補骨脂亦名婆固脂也溫精髓補勞傷夜自泄腹冷洞瀉卻令腰疼飲食少味行步無力能補五臟去百病益肌膚壯筋骨活血駐顏黑髭烏髮豫年過八十出宦南海忽忽不樂況粵俗卑濕寒燥不常痛傷內外陽道痿絶鍾乳硫黃一二十方皆不效有舟人李摩訶來授豫此方服之七日強氣壯陽道微動半月以來意充力足目明心悅神效不可具述故録以傳元和十三年二月十日嶺南節度使鄭胄詩云晚年持節向番禺人事兼加並劣疏取得風光歸掌內青蛾不笑白髭鬚破故紙六兩淘洗淨者焙乾隔紙炒香為末用胡桃瓤四兩浸去膜研如泥上件和煉蜜丸如桐子大每服三十丸溫酒鹽湯下空心臨臥漸加至五十丸食豬羊腰子以助藥力似覺水甜食美有效禁食蕓薹菜羊血惡甘草或研如泥和蜜瓷器內以熟水或酒調服便以飯壓之為妙一方加杜仲四兩銼如骰子大麩炒黃色治腎虛腰疼祕精益陽老者服之還童少者服之行步如飛一方入生薑十兩炒正氣丹出十便良方治陰寒內盛元臟不足陽氣暴脫下焦傷竭手足厥逆戰栗背寒膝冷臍腹疼痛大便滑泄小便頻數行步艱難面色枯槁嘔逆喘急咳逆自汗霍亂轉筋寒疝及傷寒陰盛脈微欲絶溫固精氣大益脾胃硫黃附子乾薑桂各等分上為細末水煮麵糊和丸如桐子大每服三十丸食前溫米飲下山茱萸湯出十便良方東莎劉先生溉固足經益陽火玉抱肚法茱萸吳茱萸各四兩胡椒二兩蛇床子生二兩大川烏頭一兩高良薑一兩生以上六味為粗末以好酒拌勻不可大濕裹一伏時慢火炒令乾不得有煙取出放冷牡蠣十兩乾薑香白芷浮萍草陰乾各二兩上十味為粗末每服水二盞以來稱藥一兩煎五七沸去滓盛盆內以氣熏足候通手淋洗如冷再暖亦得凡淋浴了著襪臥為佳若小浴尤佳若浴坐湯中須用水五斗藥末二兩半煎十餘沸通手及可坐之如冷再暖之以手淋腎腧愈妙淋了便須熟寢勿得見風五七日一淋效不可具述若臥覺腰膝微出汗尤廳須飽食可浴補虛冷消食出本草以䔋木皮中面作餅食之或作飯餌之朝真丹出本草治風虛傷寒冷暴作水瀉日夜三二十行腹痛不止夏月路行備急硫黃二兩牛角研令極細枯白礬半兩同細末上藥水浸蒸餅去水脈了和丸如桐子大硃砂為衣每服十五丸至二十丸溫米飲下鹽湯亦可治虛冷短氣上用川椒三兩去目合口者以生絹袋盛用無灰酒五升浸經三日後隨性飲之
