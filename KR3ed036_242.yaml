喘或心脅有塊毒勝痰逆痞滿搐搦昏悶上視咬齒甚重垂絶不知人宜此藥以救急出危氏方杉木節銼一升橘葉銼一升北地無葉以皮代之大腹子七枚和皮銼童子小便三升上煮取一大升分作兩服如一服得快利即止不利再服余以前真死矣會有教者得皆不死恐他人不信有類余病故傳焉唐柳州纂救三死方云腰腳氣夜半痞絶脅有塊大如石且死因大寒不知人三日家人號哭滎陽鄭洵美傳杉木湯服半碗頃大下三下氣通塊散海桐皮散治濕腳氣及腎風下注滿腳生瘡癢痛膿水出海桐皮草烏頭銼碎鹽炒地龍炒去土蒺藜子炒去角各一兩上為散每服二錢匕用冷酒調下服之於空心夜臥時檳榔湯出聖惠方治濕腳氣膝浮腫氣攻入腹腹滿氣急面如土色大小便不通氣欲絶檳榔二兩銼訶黎勒七枚取皮大腹皮二七枚牽牛子二兩炒上為末以童子小便一升生薑一分掰破先下大腹皮及訶黎勒末各二錢匕煎至七合次下檳榔牽牛末各二錢匕更煎令沸不限早晚旋旋服之以快利三五行為效或加蔥白三七寸木瓜檳榔丸一名木香丸出聖惠方治濕腳氣上攻心神悶亂不能下食宜服此方檳榔二兩吳茱萸半兩湯浸七次焙乾炒木瓜一枚大者木香一兩上為末切木瓜頭作蓋子去瓤納藥末於中卻蓋以竹籤簽定於飯甑中蒸爛以刀子削去皮細研丸如梧桐子大每服不計時候以溫酒下三十丸獨活散治乾腳氣兩脛漸細疼痛時發寒熱或臟腑不利毒氣上攻獨活去蘆頭附子炮裂去皮臍各一兩牽牛二兩微炒搗細取一半粉上為細末每服二錢炒蔥白酒調下蜜湯亦可或一二服得利即止未利再服大黃丸一名萬靈丸出楊氏家藏方治乾溼腳氣膝脛疼痛大便祕澀小便赤黃大黃生破故紙炒黑牽牛炒各一兩上為末用不蚛皂角十梃水浸一夜揉汁濾去滓熬膏和前藥末為丸如梧桐子大每服十五丸空心溫熟水送下烏藥散出王氏博濟方治乾溼腳氣烏藥一兩蒔蘿炒一分上為細散溫酒調下二錢乾腳氣用楝實五枚銼碎漿水一升煎至五合去滓調下烏附丸一名黑附丸出三因方治乾溼腳氣附子八錢重去皮臍黑豆半升入瓷瓶中慢火煮以附子爛為度上熟豆一合同附子研為餅焙乾為末煉蜜為丸如皂角子大每服二丸空心麝香酒嚼下治乾溼腳氣出海上方破故紙一兩炒黑牽牛一分生上為細末每服一大錢木瓜酒調下空心食前服治乾腳氣出海上方昔有楊監獄晚年患此苦親見用之有效大黃黑豆上等分為細末用冷水調厚塗之以紙貼其上干則再換訶黎勒丸出聖惠方治乾腳氣上攻心胸壅悶訶黎勒皮二兩塗酥火炒令黃檳榔二兩上為細末煉蜜和丸如梧桐子大每服於食前以溫酒送下三十丸治乾腳氣心腹煩悶腳膝疼痛出聖惠方蘿蔔子一兩微炒羌活一兩上為散每服四錢水一中盞煎至六分去滓每於食前溫服治濕腳氣上攻心胸喘促悶絶檳榔二兩吳茱萸三分湯浸七遍焙乾炒上為散每服用童子小便一小盞入生薑汁一茶匙暖令溫不計時候調下二錢治乾溼腳氣並腎勞㿗疝氣開胃用蘹香子得酒服之良桃花散出聖惠方治濕腳氣及腰腎膀胱宿水並痰飲不下食用桃花陰乾量取一大升但隨虛滿不須按捺搗為散紗羅篩下之溫清酒和一服令盡通利為度空腹服之須臾當轉下可六七行但宿食不消化等物總宜瀉盡若胃中間覺空虛進少許軟飯及糜粥無不即安不似轉藥虛人明朝但覺腰腳輕快使人踴躍食味倍佳腳先腫者一宿頓消如囊中貯物傾卻相似又無毒意易將息惟忌葫菜豬肉三月內腹虛大都不宜刻削慎生冷酸滑五辛酒面及黏食肥膩四五日外諸食復常鹿茸丸出百一選方治濕腳氣腿腕生瘡用鹿茸五味子川當歸熟乾地黃各等分為細末酒糊丸如梧桐子大每服三四十丸溫酒或鹽湯下食前又服川芎當歸二味等分同煎以調荊芥細末一二錢食後再服煎四物湯調消風散二三錢只服此三藥後絶不發葛楚賢作湖州僉判日苦此疾一年半服此三藥不終劑而愈空心先服五生丸治風毒乾溼腳氣渾身一切風痛及服諸藥不得效者川烏草烏南星五靈脂沒藥等分生用上為細末以醋調五靈脂末作膏子研和為丸如梧桐子大每服十丸空心溫酒下草聖丸出楊氏家藏方治乾溼腳氣及下部一切瘡癢乾木瓜白殭蠶炒去絲嘴荊芥穗草烏頭炮去皮尖上各等分為細末麵糊為丸如梧桐子大每服十丸加至十五丸空心溫酒鹽湯任下神妙丸一名金龍丸治乾溼腳氣骨里作疼或熱或腫或不腫引至膝上走疰難忍隨手見效赤腳蜈蚣全者一條一方不用全蠍二十一個黑豆三十七粒不焙尤佳地龍去土焙草烏生各半兩上為細末糯米糊為丸如赤豆大空心麝香冷酒下七丸如人行二十里將荊芥茶一盞投之服後行如不能動步則垂腳初服時忌食熱物如利了腳腫處便皺且不疼但初服時漸麻動更加二三丸亦可極神效一方有川烏大效牛膝丸治一切乾溼風毒腳氣遠年近曰發動無時不能移步浮腫疼痛牛膝天麻宣木瓜肉蓯蓉各一斤銼用好酒五升浸一伏時於銀石器中文武火煮酒干為度焙乾沒藥四兩別研川烏四兩生去皮臍尖虎骨半斤酥炙黃黑豆三升同烏頭煮兩時辰取出切開用鹽二兩炒上為末煉蜜為丸如梧桐子大每服三十丸空心溫酒鹽湯送下補瀉丸余居士選奇方治乾腳氣及腿膝無力行步艱難南木香川芎檳榔大黃大麻仁去皮研如泥牛膝酒浸枳殼麩炒以上各三兩官桂黑附子炮裂去皮臍萆薢續斷杜仲薑汁製五加皮防風山茱萸以上各二兩生薑屑羚羊角屑訶子皮炮取去皮以上各一兩半上除檳榔附子不見火同為細末次將大麻仁研如泥拌勻煉蜜為丸如梧桐子大空心食前溫酒下三十丸加至五十丸忌魚面生果熱物如常服無忌此藥其效如神矣神效丸出朱氏集驗方治乾溼腳氣骨里疼痛或腫或不腫並治之川烏一枚略去皮草烏半兩略去皮地龍半兩去土全蠍四十二個去毒黑豆四十二粒去皮蜈蚣一條去頭足上焙乾為末入糯米糊為丸麝香為衣用冷酒下七丸至十丸少頃用荊芥穗些少先嚼用茶清灌漱之其效如神用之果有驗也獨聖散出朱氏集驗方治乾溼腳氣不問新舊悉能療之用平胃散一貼紫蘇梗細銼同煎通口服如是濕腳氣則一貼可愈紫蘇梗不用葉及不問新舊腳氣上氣附論夫風濕毒氣之中人多從下起足先受之故名腳氣毒氣循經上入於肺則氣道奔迫升降不順故令上氣喘滿也方萆薢湯治腳氣上氣喘滿嘔逆咳嗽減食萆薢當歸切焙木香牛膝酒浸切焙上桂去粗皮黃連去須各一兩延胡索芎藭天雄炮裂去皮臍檳榔銼代赭石碎研桑耳石葦去毛威靈仙去苗土射干各一兩半上為散每服五錢水一盞半入生薑五片煎取八分去滓不拘時候溫服貝母丸治腳氣咳嗽貝母去心三分蛤蚧一對洗淨酥炙黃紫菀去苗土防己細銼桑根白皮銼炒人參赤茯苓去黑皮銼款冬花大黃銼炒天門冬去心焙葶藶子隔紙炒白檳榔銼百部紫蘇子炒各一兩木香杏仁湯浸去皮尖雙仁炒各半兩上為細末煉蜜和丸如梧桐子大每服十丸空心服米飲下日午再服海蛤丸治腳氣上衝頭目浮腫咳嗽喘乏氣促心胸脹兩脅及腰重小便澀胯冷腿膝疼腫無力海蛤研如粉訶黎勒皮焙柴胡去苗赤茯苓去黑皮杏仁湯浸去皮尖雙仁炒牽牛子炒令熟各一兩半貝母去心焙陳橘皮湯浸去白焙桑根白皮炙銼白檳榔銼大黃銼炒郁李仁湯浸去皮別研枳殼去瓤麩炒各一兩赤芍藥一兩半上為細末煉蜜為丸如梧桐子大每服空心煎棗湯下二十丸日午再服桑白皮散出聖惠方治腳氣上氣坐臥不得咽喉不利四肢煩疼桑根白皮二兩銼射干三分枳殼三分麩炒去瓤赤茯苓一兩貝母三分煨微黃白前三分生乾地黃一兩半柴胡一兩去苗甘草半兩炙微黃赤芍藥三分天門冬三分去心百合三分檳榔三分上為散每服四錢以水一中盞入生薑半分煎至六分去滓不拘時候溫服紫蘇散出聖惠方治腳氣上氣心胸壅悶不得眠臥紫蘇莖葉一兩桑白皮一兩赤茯苓一兩紫菀三分洗去苗土白前三分木通一兩銼檳榔一兩百合三分甘草半兩炙微赤銼杏仁三分湯浸去皮雙仁炒上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服茯苓湯治腳氣上逆喘急心下妨悶不能食赤茯苓去黑皮銼桑根白皮炙銼白朮各二兩半檳榔防己旋覆花陳橘皮湯浸去白焙大黃杏仁上為散每服三錢先別用麻黃一分水一盞半煎五七沸掠去沫下藥並生薑一分拍破同煎至六分去滓空腹溫服日晚再服旋覆花湯治腳氣循經上乘於肺令人上氣喘滿旋覆花三兩羌活去蘆頭芎藭桑根白皮炙銼肉桂去粗皮青橘皮去白焙附子炮裂去皮臍赤小豆各一兩萊蔔子炒香一兩上銼如麻豆大每服三錢以水一大盞煎至七分去滓空心時溫服橘皮防己湯治腳氣腫滿上氣陳橘皮湯浸去白焙防己一兩桑根白皮銼各二兩吳茱萸湯浸焙炒檳榔銼各一兩大腹並子銼七枚生薑銼炒三兩甘草炙銼半兩上為散每服五錢水一盞半入蔥白三莖切同煎至八分去滓溫服空心食前風引湯療痹滿上氣遍身脹膝疼並去風濕疼痛大豆三升附子三兩炮枳實炙澤瀉橘皮各四兩甘草炙茯苓防風各三兩上切以水二斗酒二升煮大豆取一斗去滓納藥煮取三升分三服三劑腫消去大豆澤瀉更服三劑瘥忌豬肉冷水海藻菘菜醋訶黎勒散出聖惠方治腳氣上氣胸中滿悶不能下食訶黎勒皮一兩蘿蔔子三分微炒紫蘇莖葉一兩木通一兩銼赤茯苓三分檳榔一兩陳橘皮三二分浸去白桑白皮二兩銼上為散每服四錢水一中盞入生薑半分煎至六分去滓不計時候溫服半夏湯治腳氣上入腹腹急氣上胸膈真氣欲絶半夏二兩湯洗去滑炒黃用肉桂去粗皮三兩乾薑炮一兩蜀漆一兩半甘草炙銼人參附子炮去皮臍各半兩上銼如麻豆大每服三錢水一盞煎至六分去滓溫服空心服日午晚間各一初服消停藥力大恐氣上不得下宜減服之牛膝散治腳氣兼上氣痹滿不能食牛膝細切酒浸焙乾硇砂研如粉細辛去苗葉丹參去蘆頭白朮郁李仁湯浸退皮尖別研各三兩上除研者外搗羅為散再入研藥拌勻每服二錢食前以溫酒調服春秋冬之月宜服夏月熱不可服之春秋冬服之消腫利小便兼補益除風虛治冷脹少食烏豆泄腳湯治腳氣上氣抬肩喘衝心痛用烏豆二斗以水五斗煮取二斗五升分在兩甕中盛每甕中浸一腳遣人從膝向下淋洗百遍以來久病者不過再浸亦差加減木香丸先泄腳後服木香二分白芍藥二分枳殼去瓤麩炒黃用二分檳榔四枚細銼肉桂去粗皮半兩大黃銼炒二兩上為細末煉蜜為丸如梧桐子大空腹溫酒下十五丸日午再服漸加至三十丸以大便通利為度杏仁煎方治腳氣乘肺上氣喘促杏仁湯浸去皮尖雙仁炒一兩百合去細皮掰洗令淨一兩入水二升同研甘草生麻黃不去節射干各半兩上除百合外細銼入在百合汁中煎取一升去滓貯在淨器中每日不限早晚取一合溫服之此藥不得久停惟宜旋合旋服桂苓湯治腳氣上氣喘滿心下煩悶桂去粗皮三兩澤瀉銼赤茯苓去黑皮銼乾薑炮各三二兩上為散每服三錢水一盞煎至七分去滓空心服日午晚各一服大麻子湯治腳氣脹滿煩悶喘促大麻子炒檳榔末一錢生薑汁一合上先以童子小便一盞研麻子汁檳榔末生薑汁銀器盛重湯微煎三兩沸空心溫服紫蘇湯治腳氣上氣不問冷熱一切氣紫蘇葉一兩半銼白茯苓去黑皮一兩陳橘皮湯浸去白焙半兩上為散每服三錢水一盞入生薑半分拍破同煎至七分去滓空腹溫服日晚再服若患人四體熱者加麥門冬一兩去心焙患冷者加厚朴一兩去粗皮生薑汁炙小便澀者加桑白皮一兩炙大便祕者加檳榔一兩銼霍亂腹脹加甘草一兩炙銼瘧加黃連人參皆隨病狀以意加減硇砂牛膝三物散療腳氣上氣病源云此由風濕毒氣初從腳上後轉入腹而乘於肺故名上氣也硇砂牛膝細辛各三兩上為細散酒和服方寸匕日再經四五服即效桑白皮湯治腳氣面目腫上氣眠臥不得氣欲絶桑根白皮炙黃三兩陳橘皮湯浸去白焙一兩葶藶子紙上炒黃紫色另搗二兩上除葶藶子別搗外粗搗篩入葶藶末再搗勻每服三錢先用棗五枚掰破水一盞半煎至一盞去滓入藥末再煎至七分去滓溫服如人行五里以來再服後當利一二行腫氣下即差三五日服一劑紫蘇湯出聖惠方治腳氣上氣不止蘇莖葉三兩白前一兩桑白皮二兩銼上為散每服四錢以水一中盞生薑半分煎至六分去滓不計時候溫服木香檳榔湯治腳氣衝心煩悶上氣喘急木香三分檳榔半兩銼上為散每服三錢水一盞入蔥白二寸掰破煎至七分去滓下紅雪二錢生薑汁半合童子小便一合再煎一兩沸溫服檳榔湯出聖惠方療上氣檳榔三二七枚碎杏仁四七枚去皮尖搗上以小便一升煮半升分為二服相去五六里許時此方甚下氣一日一服之佳如腹中欲須利檳榔並子槌碎如前煮汁服即快利也治腳氣上攻心腹煩悶出聖惠方大麻仁三合檳榔一兩末上先將麻仁研成膏入檳榔末研令勻丸如梧桐子大每服不拘時候煎童子小便送下二十丸薑汁飲治腳氣上氣悶絶者開胃口令人能食用生薑四兩和皮搗取自然汁早晨取半合以溫湯半合和服之每如人行十里一服日三豌豆湯淋泄方治腳氣抬肩喘以豌豆二升用水五斗蔥白十莖掰破椒三分煮取湯二斗傾入兩瓷甕以腳各安在一甕中浸遣人從膝上淋洗百遍如無瓷甕瓦甕亦得患極重者不過兩次效治腳氣上氣入腹腫方用野椒根除土皮細銼一升以酒二升安瓶中泥頭煻火燒得一沸然後溫服一盞甚效惟忌冷肥食物其餘不禁治腳氣上氣出肘後方取鯽魚一尺長者作鱠食之一兩頓即瘥鯉魚亦佳
