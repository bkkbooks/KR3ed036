body:
  text: 卷二百四十二腳氣門風濕腳氣附論夫腳氣痹攣者寒氣多也寒搏於筋脈而為痛則筋急不能轉側行步艱難甚則不可屈伸也方羌活御風湯治腎肝筋骨虛弱言語艱難精神昏憒及治風濕內弱風熱體重或瘦而一肢偏枯或肥而半身不遂心亂則百病生靜則萬病息是以此方能安定心神養陰調陽使無偏勝羌活甘草炙防風去蘆黃耆去蘆人參去蘆蔓荊子川芎細辛去苗葉枳殼去瓤麩炒地骨皮去骨麻黃去根知母去皮甘菊薄荷去枝枸杞當歸去蘆獨活白芷杜仲炒去絲秦艽去苗柴胡去苗半夏湯洗薑製厚朴薑製防己熟地黃各二兩芍藥去皮黃芩去黑心石膏四兩生地黃白茯苓去黑皮三兩蒼朮四兩桂枝一兩淨前胡三兩上銼每服一兩水二盞煎至一盞去滓溫服如遇天陰加生薑三片煎空心一服臨臥再煎滓服更有四時加減之法烏蛇丸出直指方治風寒腳氣隱痛痹癢烏蛇四兩酒浸取肉焙虎骨醋浸洗淨各作酒炙二兩末巴戟去心蓯蓉酒浸焙黃松柏枝酒浸研官桂防風獨活續斷五加皮薏苡仁當歸川芎木香各半兩乳香乾生薑各一分石斛半兩作末上為末酒麵糊丸如梧桐子大每服四十丸木瓜橘皮煎湯送下加味獨活寄生湯出濟生方治風傷腎經虛弱坐臥當風著濕所得腰痛若不速治流入腳膝乃為偏枯冷痹緩弱疼腫或腰攣痛腳重痹癢正宜服之獨活三兩桑寄生無真者續斷代杜仲制炒去絲細辛去苗牛膝去苗酒浸秦艽去心茯苓去皮白芍藥桂心不見火芎藭防風去蘆甘草炙人參熟地黃洗蒸當歸去蘆各二兩上為銼散每服四錢水二盞煎七分空心服氣虛下利或中脘不快者除地黃倍加生薑並治新産婦人腹痛不得轉動及腰腳攣痹弱不屈伸此方最除風清血一方有附子一枚無寄生人參甘草當歸近人將此方治歷節風並腳氣流注甚妙為丸加乳香沒藥酒服效小續命湯出經效良方治男女久近腳氣風濕漢防己桂去粗皮人參去蘆杏仁去皮尖炒赤白芍藥甘草麻黃去根節芎藭各一兩淨防風去蘆一兩半何首烏四兩川牛膝一兩黃芩去黑心草烏頭去皮尖切片炒黃半兩附子去皮尖半兩人壯實不用上為細末用大木瓜二個好酒一瓶小鍋炭火慢煮十分爛去皮瓤於瓦盆內研爛搜和前藥如硬燥就用煮木瓜酒添搜和為丸如梧桐子大每服三十丸空心溫酒下常服此藥去根黃耆湯治風濕腳氣黃耆炙銼桂去粗皮芍藥各三兩細辛麥門冬去心焙赤茯苓去黑皮當歸切焙陳橘皮去白焙人參前胡去蘆頭甘草炙銼各二兩半夏四兩湯洗去滑焙烏頭十五個炮裂去皮臍蜀椒去目及合口者炒汗出一兩上銼如麻豆每服五錢匕水一盞半生薑三片大棗三枚掰破同煎至一盞去滓溫服日三夜一海桐皮散治風毒流入腳膝行履艱難向夜筋脈痹攣疼痛海桐皮銼獨活去蘆頭五加皮銼防風去叉郁李仁炒去皮別研如膏各一兩杜仲去粗皮炙銼枳殼去瓤麩炒薏苡仁炒牛膝酒浸切焙虎脛骨酥炙惡實炒熟乾地黃焙乾各一兩半朴硝另研二兩上為散入郁李仁膏並朴硝同研勻每服二錢匕溫酒調下早晚食後夜臥各一服牛膝丸治風濕毒氣留滯經絡壅遏營衛致腳膝腫痛不仁牛膝去苗酒浸一宿切焙肉蓯蓉酒浸一宿切焙防風去叉海桐皮銼自然銅煅醋淬七遍威靈仙狗脊去毛烏頭炮裂去皮臍各一兩乳香研半兩骨碎補去毛四兩地龍去土炒二兩沒藥研半兩木鱉子去殼炒四兩上除乳香沒藥外搗羅為細末再入研者二藥和勻酒煮麵糊丸如梧桐子大每服三十丸溫酒空心食前服加減芎芷香蘇散出經驗良方治男女初患腳氣其病有筋一條自腳脛骨至臀及腰起痛皆因風濕所感先鬚髮散川芎甘草香附子白芷縮砂仁陳皮紫蘇葉萆薢川獨活荊芥穗乾木瓜檳榔各等分上為粗末每服四錢水一盞半生薑三片棗二枚並煎三四服腳氣稍愈可服下藥蓯蓉丸一名木瓜丸出傳信適用方治風濕腳氣客搏筋脈痹攣不仁肉蓯蓉酒浸切焙牛膝酒浸切焙天麻黃耆銼何首烏米泔浸一宿竹刀刮去皮木瓜去皮作片以上各十兩好酒一斤浸候藥酒干取出與後藥同焙狗脊去毛銼續斷銼萆薢銼各二兩上為末用木瓜三枚去皮剜作甕子入青鹽一兩在內閉口飯上蒸令爛熟搗成膏和上件藥末為丸如木瓜膏少即添入酒糊丸如梧桐子大每服三十丸鹽湯或酒任下不拘時候石楠丸治腳膝攣痹去風濕活血脈益元氣石楠白朮牛膝三味酒同浸一宿焙乾防風去叉天麻枸杞各二兩黃耆銼二兩桂去粗皮鹿茸醋炙去毛各一兩半上為末用木瓜一枚去皮瓤炊令爛熟搗成膏和藥末更用麵糊少許同為丸如梧桐子大每服三十丸至五十丸空心溫酒下鹽湯亦得薏苡仁酒方治風寒濕氣中腳搏於筋脈痹攣不可屈伸者薏苡仁炒白蘞芍藥酸棗仁乾薑炮甘草炙各五兩附子炮裂去皮臍一兩上銼如麻豆大以酒五升漬一宿微火煎沸去滓瓷器貯之每服一小盞甚者常使人扶行少飲酒者可隨性飲之常令有酒氣佳飛步丸出瑞竹堂治陰陽風濕腳氣手臂舉動不起無問遠年近日並皆治之紫金皮二斤取頭末八兩揀時嚼似腦子未透頂者方佳又名滑藤根木鱉子四兩竹刀切片用三年醋浸三宿焙乾用肥川烏二兩半去皮生用蒼朮二兩五錢米泔水浸五加皮二兩半焙上為細末醋糊為丸似魚眼睛大每服三十丸至五十丸空心鹽及木瓜少許細嚼和藥無灰酒送下忌動風之物經驗立應散出醫方集成治風濕腳氣麻黃去根節炒殭蠶各二兩炒斷絲丁香一錢沒藥五錢另研乳香五錢另研上為末每服一兩用酒一碗調服取醉蓋覆得汗愈曾經蒸炮者難愈治風濕腳氣腫痛不可行步出經驗良方用苦瓜葉去刺及莖只用葉不拘多少採嫩葉者尤佳擂爛葉用燒皮散一貼生薑自然汁調塗腫處其痛即止半夏丸治風濕腳氣痰壅頭痛半夏湯浸七次去滑曝乾二兩上為末生薑自然汁和丸梧桐子大每服二十丸食前生薑湯下日三沉香三味散出經驗良方治腳氣初發去風濕檳榔麵裹煨去面甘草微炒木香不見火陳皮去白芎藭白朮各七錢半大腹皮炙黃羌活去蘆紫蘇葉宣木瓜切焙乾沉香各一兩上每服五錢水一大盞煎至六分溫服中年人弱病宜服朮附湯壯盛者人參敗毒散加大黃木瓜煎服不時服之病腳氣常服尤妙地黃丸出本事方主益氣血補肝元祛風濕壯腳膝熟地黃一兩牛膝石斛各三分肉蓯蓉茵芋防風川芎五味子桂心附子薏苡仁以上各半兩上為末煉蜜丸如梧桐子大每服三四十丸酒吞下空心食前服人參湯治腳氣風濕痹弱人參防風去叉各二兩芍藥炒銼甘草炙銼當歸切焙各一兩半赤茯苓去黑皮半兩肉蓯蓉去皴皮酒浸焙黃耆銼各二兩陳橘皮湯浸去白焙桂去粗皮龍骨各一兩上粗搗每服三錢半水一盞半入大棗三一枚掰破生薑二片同煎至一盞去滓服日三夜一通津丸出御藥院方治一切腫滿風濕腳氣攣腫宣導小水愛飲水者常服妙必見效赤茯苓木通大腹子破故紙炒蓽澄茄木香苦葶藶隔紙炒以上各半兩白牽牛五兩微炒取頭末二兩半上為細末水麵糊為丸如梧桐子大每服五六十丸漸加至七八十丸陳皮燈心湯下食後服或食前亦得敷藥出瑞竹堂治風濕腳氣草烏白芷防風獨活羌活上等分為細末用生地龍數條研爛和藥末米醋調敷葶脂丸出瑞竹堂治風濕腳氣好川烏一兩生用無名異二兩研石亭脂一兩生用研上為細末用蔥白搗爛取自然汁丸如梧桐子大每服一錢空心生蔥淡茶下日止一服木瓜丸出聖惠方治風濕腳氣上攻胸腹壅悶痰逆木瓜一兩乾者陳皮一兩湯浸去白瓤焙人參一兩去蘆頭桂心半兩檳榔二兩丁香半兩上揀淨為細末煉蜜搜和更搗五百杵為丸如梧桐子大每服十五丸煎陳皮湯下空心午後可二三服漸加至三十丸一方用生薑湯下抱龍丸出仁存方治肝腎臟虛風濕進襲流注腿膝行步艱難漸成風濕腳氣足心如火上氣喘急小腹不仁全不進飲食赤小豆四兩略炒五靈脂白膠香破故紙炒地龍炒狗脊火燎去毛木鱉子去殼海桐皮威靈仙草烏米泔浸三日淨洗去皮尖上各一兩為末酒糊為丸如梧桐子大辰砂為衣每服五十丸空心鹽湯或酒任下通逐邪氣淋泄方主益氣補肝元祛風濕壯腳膝穿山甲炒黃色如左癱者用穿山甲左邊及前後二爪如右者如右法川烏頭紅色海蛤各一兩上為末每服三錢生薑自然汁調和得所敷在腳心用綿子扎定又以水數升煎數沸噓曲踿內次用衣被蓋身出汗氣腥臭為度小續命湯出如宜方治風濕腳氣痹弱不能轉側防己麻黃人參肉桂黃芩甘草灸白芍藥杏仁川芎各一兩附子半兩防風一兩半上㕮咀每服四錢姜七片棗二枚同煎不拘時溫服如筋骨掣痛宜虎骨散又方出鮑氏方紫荊藤蛇床大黃輕粉白芷蕪荑雄黃全蠍等分上為末麻油調敷仍以芥菜湯下石楠丸五聖散出朱氏集驗方治腳氣夫腳氣之患皆因坐立濕地或因行腳熱脫鞋及著濕鞋其風濕之氣易入初在皮膚次傳經絡甚至內入骨髓遂成此疾發作時必然行步艱難痛不可忍若不治之漸次傳在心胸甚則並在臟腑歲久則傷命深可哀嘆余因授到一方能療此疾極有功效試之果驗沉香流氣飲人參敗毒散三和散小續命湯除去附子香蘇散上五件各一貼加檳榔三十個餿麵包煨熟去面及川楝子十枚京南芍藥二兩共三件並銼碎同前五貼藥共一處和勻作五服水二盞姜三片棗一枚木瓜三片同煎至一盞濾滓再煎二次與藥合和用瓦器盛貯將紗片蓋瓦安頓屋上露一夜次早取下暖熱調復元通氣散半貼空心服此藥不問男子婦人小兒均可加減服用其效不可盡述增加敗毒散一貼出朱氏集驗方大黃荊芥穗各半兩拌和上分作二服依本方煎服以大便流利為度過秋則以香蘇散間服亦如前服二項藥虛弱人略少些微又方出朱氏集驗方何首烏黃連赤小豆緑豆粉各等分上為末用生地黃煎湯候冷調塗亦如前法干則用醋潤玉淨瓶出朱氏集驗方紫雲根長葉成叢者是上生採等分細切入好茶末二三錢同擂爛每用一丸如三錢大用瓦器碗盛水化開同煮數沸候冷如前法此藥專治赤腫熱痛者立效赤骨丸出楊氏家藏方治風濕攻注腳踝腫痛或筋脈牽急疼痛天南星大者赤小豆生用上等分為細末麵糊為丸如梧桐子大每服三十丸淡薑湯下食前治腳氣風濕出本草以紫蘇子和高良薑橘皮等分蜜丸如梧桐子空心下十丸治腳膝風濕出汗少力多疼痛及陰汗用燒磨作灰細研末一匙頭沸湯投之淋洗痛處乾溼腳氣附論夫腳氣者由體虛感於風毒故也然腳氣有干有濕有陰有陽乾者不腫濕者腫滿在臟為陰在腑為陽病雖一原所受各異其於虛實不等取捨殊途為療當憑形證也夫乾腳氣者由腎虛房事不節或當風取涼臥不覆足或行立濕地或夏月以冷水洗腳腠理開疏風邪氣搏於腳膝入於經絡血脈痞澀皮膚頑痹脛弱枯細日夜痠疼飲食減少肌體羸瘦心腹氣滯大便不通風毒上攻心神煩悶四肢無力其候腳膝不腫故名乾腳氣也夫濕腳氣者由體虛當風臥濕醉後取涼風濕毒氣猝搏於腳膝之所致也此皆由腎虛膀胱宿有停水經絡痞澀不得宣通即先腫滿漸攻心腹毒氣不散遍入四肢兩腳熱疼心胸燥悶上氣喘急咳嗽稠黏面目虛浮腹脅脹滿見食嘔吐壯熱頭疼小便不利大便祕澀風氣凝滯皮膚生瘡其候腳膝浮腫故名濕腳氣也方羚羊角飲治乾溼腳氣羚羊角鎊羌活去蘆頭桂去粗皮牛膝酒浸焙乾白茯苓去黑皮杏仁去皮尖雙仁研郁李仁湯浸去皮半夏湯洗七次去滑附子炮裂去皮臍麻黃去