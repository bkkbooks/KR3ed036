上件藥搗細羅為散每於食前以熱酒調下二錢治冷白帶下桑寄生芍藥柏葉各四分桑耳禹餘糧各六分吳茱萸乾地黃各八分烏賊魚骨五分上為細末空心用飯飲調下二錢補經固真湯白文舉正室白帶常漏久矣諸藥不效診得心包尺脈極微其白帶流而不止其病在帶脈叔和云崩中日久為白帶漏下多時骨髓枯言崩中者始病血崩不已久下則血少復亡其陽故白滑之物下流不止是本經血海時枯津液復亡枯乾不能滋養筋骨以本部行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋益津液以大辛熱之氣味藥補其陽道生其血脈以苦寒之藥泄其肺而救上熱傷氣以人參補之微苦溫之藥為佐而益元氣名曰補經固真湯炙甘草柴胡各一錢乾薑末三錢橘皮半錢不用皮人參一錢白葵花十六個去萼剪碎生黃芩一錢另銼郁李仁一錢去皮尖另研如泥上件除黃芩外以水三大盞煎至一盞七分再入黃芩同煎至一盞去滓空心大熱服之候少時以早飯壓之丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經脈少時其脈二尺俱弦緊而洪按之無力其證自覺臍下如冰求厚衣被以御其寒白帶白滑之物雖多間下如有屋漏水下時有解血不多右尺脈時洪微屋漏水多暴下者是急弦脈為寒多如洪脈時見乃熱少合而言之急弦者北方寒水多也洪脈時出者是命門包絡之火也黑物多赤物少合成屋漏水之狀也當歸一錢半熟地黃白芍藥川芎各半錢阿膠煬六分丁香四分生艾葉一錢上川芎地黃丁香為細末當歸酒洗銼艾亦銼都作一服水五大盞先煎作一盞半去滓入膠煬再上火煎至一大盞帶熱空心候宿食消盡服之三兩服愈治婦人白帶下不止面色萎黃繞臍冷痛牡蠣一兩燒為粉當歸一兩銼微炒龜甲一兩塗醋炙令黃白馬蹄屑一兩炒微黃白赤脂二兩乾薑一兩炮裂銼上件藥搗細羅為散每於食前以艾葉湯調下二錢硇砂丸治婦人白帶下臍腹冷痛面色萎黃日漸虛困硇砂一兩細研白礬灰半兩乾薑半兩炮裂銼川烏頭一兩生去皮臍上件藥搗細羅為末醋煎湯為膏丸如緑豆大每於食前以熱酒送下十丸肉豆蔻丸治婦人白帶下腹內疼痛肉豆蔻一兩去殼附子二兩炮裂去皮臍白石脂一兩上件藥搗細羅為末煉蜜和丸如梧桐子大每於食前以熱酒下二十丸又方禹餘糧一兩醋燒淬七次龍骨一兩乾薑一兩炮製銼附子一兩炮裂去皮臍上件藥搗羅為末煉蜜和丸如梧桐子大每於食前以溫酒下二十丸香附丸治婦人白帶下元虛冷香附子二兩醋煮吳茱萸白薇各一兩上為細末酒糊為丸如梧桐子大每服五十丸米湯下空心服白薇丸治婦人白帶不止白薇揀一兩赤芍藥烏賊魚骨去甲各半兩上為末煉醋一盞熬成膏丸如梧桐子大每服二十丸食前熟水下日再治婦人白帶下臍腹冷痛面色萎黃日漸虛困乾薑一兩炮製銼禹餘糧二兩炮醋淬七次阿膠一兩搗碎炒令黃燥上件藥搗細羅為散每於食前以粥飲調下二錢又方蛇床子一兩白芷一兩上件藥搗細羅為散每於食前以粥飲調下二錢治婦人白帶下臍腹冷痛面色萎黃日漸虛困及排膿血惡物以白葵花一兩陰乾為末空心溫酒下二錢如赤帶用赤芍治婦人白帶下用禹餘糧一兩乾薑等分赤帶下禹餘糧一兩乾薑半兩將禹餘糧用醋淬同薑為末空心任酒湯調下二錢匕女人白帶用天門冬搗汁井花水調服治婦人白帶用春澤湯一貼後服生料五苓散一貼銅五錢銀五錢共作一鍋熔了投些少明砂及牙硝淬淨瀉出打小片子用足色藥在鍋內插小片子卻用瓦陀蓋了煮煅如藥得下則添藥末一次卻煮三兩個時辰提鍋出候冷破鍋出牌片出再為坯關色足不走而分兩不折足色藥硐銅板未成者是青鹽各一兩明礬金綿礬各五錢重生硫黃焰硝各二錢半重辰砂一錢半膽礬一錢上合細末以瓷瓶盛候用坯關之法以坯關入鍋底神在上蓋頭並瓦蓋頭發火自微至著時是藥煬著時牌煬作汁連出候取出卻用淨鍋子倒於所提前足色藥及後坯關在鍋者久後多再用所惡恐有物在內坯關法青鹽黃鉛即黃丹也用研為末入鍋在火作汁候取面上者乾淨稱一兩用沉在底者不用礬紅兩絲是將泥礬過煅成紅礬上二件和勻研細用時再用鹽調用禹餘糧丸治婦人帶下五色臍腹冷痛漸加黃瘦四肢少力禹餘糧二兩燒醋淬七次白芍藥一兩桑鵝一兩半微炙黃連一兩去須當歸二兩銼微炒艾葉一兩微炒芎藭三分川大黃三兩銼碎微炒生乾地黃二兩白龍骨二兩阿膠一兩搗碎炒令黃燥上件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大不計時候以酒下三十丸柏葉散治婦人帶下五色四肢黃瘦心煩食少柏葉一兩微炙牛角䚡一兩燒灰芎藭三分黃耆一兩銼禹餘糧二兩燒醋淬七次白芍藥三分龍骨一兩白朮三分丹參三分枳殼一兩麩炒微黃去瓤上件藥搗細羅為散每於食前以溫酒調下二錢禹餘糧散治婦人帶下五色久不止一名阿膠散禹餘糧煅醋淬七次鹿茸去毛酥炙牡蠣煅炙赤石脂各二兩阿膠炙燥當歸銼炒白芍藥蒲黃各一兩烏賊魚骨燒赤一兩半上為散每服二錢食前溫酒調下鹿茸丸治婦人帶下五色久不瘥漸加黃瘦鹿茸一兩去毛塗酥令炙黃白芍藥三分桑鵝一兩微炙黃連一兩去須艾葉一兩微炙芎藭一兩當歸一兩銼微炙阿膠二兩搗碎炒令黃燥禹餘糧一兩燒醋淬七次上件藥搗羅為末用軟飯和丸如緑豆大每於食前以溫酒下二十丸當歸丸治婦人帶下五色腹痛羸瘦食少當歸一兩銼微炒鱉甲一兩塗醋炙微黃去裙襴川大黃一兩銼碎微炒白朮三分蓽茇半兩胡根半兩訶黎勒皮二分檳榔三分枳殼二分麩炒微黃去瓤上件藥搗羅為末煉蜜和搗三二百杵丸梧子大每於食前以溫酒下三十丸續斷丸治婦人帶下五色久不止臍下痛續斷三分丹參三分當歸三分微炒白芷半兩艾葉三分微炒阿膠三分搗碎炒令黃燥桑寄生三分干蘭花半兩上件藥搗羅為末以醋浸蒸餅和丸如梧子大每於食前以溫酒下三十丸又方早蠶鵝綿二兩燒灰蛇床子末二分麝香一錢上件藥同研如粉每於食前以溫酒調下一錢禹餘糧散治心燥四肢痠疼所下五色腰腳臍中緊痛禹餘糧醋煅地榆阿膠赤石脂紫金皮茴香側柏各等分上為末每服二錢米飲調下五灰散治崩中帶下者或因月候未止而有觸傷或産後早起久懸廁上為風所傷各隨五臟而為五色白如涕赤如血黃如爛瓜青如藍汁黑如衃血蓋有帶脈在腰如帶之狀有穴名帶脈在腰上灸此可愈其病生於帶下故名曰帶下艾灰礬灰蓮蓬灰牡蠣灰海螵蛸燒焦上為末每服二錢糯米飲調下食前神效三良散治婦人五色帶下不止吳茱萸墨豆同炒寒食麵乾薑炮各一兩上為散每服二錢食前溫酒調下日三服治五色帶下方用赤大豆煎湯日三服又方用燒馬左蹄為末以酒服方寸匕日三服又方治五色帶下上煮甑帶汁服一杯良治冷熱不調或帶下或下白青黃者用酸石榴子五枚合殼舂絞取二升汁每服五合至二升盡即斷小兒以意服之二三合一方子殼皆為末酒調下白堊丸出濟生方治婦人白帶久而不止面生皯𪒟繞臍疼痛腰膝冷痛日漸虛困産後白帶並宜服之白堊火煅禹餘糧煅醋淬七次鱉甲醋炙烏賊魚骨醋炙當歸去蘆酒浸鵲巢灰乾薑炮紫石英火煅醋七次金毛狗脊燎去毛附子炮去皮臍芎藭各一兩艾葉灰半兩香附子醋煮二兩鹿茸燎去毛切片醋炙一兩上為細末醋煮糯米糊為丸如梧桐子大每服七十丸空心用溫酒米湯飲下禹餘糧丸一名吳茱萸丸治婦人久赤白帶下胞絡傷敗月水不調漸成崩漏氣血虛竭面黃體瘦臍腹裡急腰膝疼痛肢體煩痛心鬆頭眩手足發熱禹餘糧二兩燒醋淬七次白石脂二兩當歸一兩銼微炒鱉甲一兩塗醋炙微黃去裙襴狗脊二分去毛白芍藥三分白朮一兩附子一兩塗醋微炙桑寄生一兩柏葉一兩微炒厚朴一兩去粗皮塗生薑汁炙令香熟乾薑一兩炮裂銼吳茱萸半兩湯浸七次焙乾微炒上件藥搗羅為末煉蜜和搗二三百杵丸如梧桐子大每於食前以熱酒下三十丸或米飲下芍藥散一名熟乾地黃散出聖惠方治婦人赤白帶下經年不瘥漸漸黃瘦白芍藥牡蠣煅桂去粗皮附子炮製去皮臍黃耆銼龍骨龜甲醋炙芎藭各一兩乾薑炮三分白芷半兩熟乾地黃焙一兩半上為散每服二錢食前溫酒調下鹿角膠丸一名鹿茸丸出聖惠方治婦人赤白帶下不止鹿角膠炙燥桑耳微炒乾薑炮牛角䚡炙鹿茸去毛醋炙各一兩半赤石脂白龍骨附子炮裂去皮臍上為末煉蜜丸如梧桐子大每服三十丸食前黃耆湯下一方有艾葉半兩附子散出聖惠方治婦人久黑白帶下臍腹冷痛腰膝麻疼附子一兩炮裂去皮臍當歸桂心硫黃硇砂一兩細研白礬灰一兩鹿角尖屑一兩炒黃禹餘糧一兩燒醋淬七次上件藥搗細羅為散每於食前以溫酒調下一錢川椒丸出聖惠方治婦人久白赤帶下臍腹冷痛川椒二兩去目及閉口者微炒去汗艾葉一兩微炒乾薑一兩炮裂銼白石脂二兩芎藭三分阿膠一兩搗碎炒令黃燥熟乾地黃二兩伏龍肝一兩細研上件藥搗羅為末煉蜜和搗三五百杵丸如梧桐子大每於食前以熱酒下三十丸瓜栝散出聖惠方治婦人久赤白帶下不瘥羸困栝蔞一枚並皮細銼白礬一兩研碎硝石一兩硫黃一兩研碎以上栝蔞白礬二味於銚子內炒令黑色然後入硝石硫黃又同炒令相入為度禹餘糧二兩燒醋淬七次狗脊去毛半兩末麝香一錢細研上件藥都細研為散每於食前以溫酒調下二錢又方出聖惠方白芍藥三分乾薑半兩炮製銼地榆二兩銼白礬二兩燒汁盡上件藥羅為散每於食前以粥飲調下二錢當歸散一名鹿角膠散出聖惠方治婦人白帶下不止面黃體瘦繞臍冷痛當歸銼炒桂去粗皮白龍骨白朮鹿角膠炙燥各一兩附子炮裂去皮臍上為散每服二錢食前粥飲調下川大黃散出聖惠方治婦人赤白帶下胞中有積滯川大黃一兩銼碎微炒川朴硝一兩當歸一兩銼微炒虻蟲一分微炒去翅足桃仁一兩湯浸去皮尖雙仁麵炒微黃桂心半兩上件藥搗細羅為散每於空腹以溫酒調下二錢治婦人帶下久不瘥引下惡水方乾薑炮末鹽杏仁去皮尖雙仁炒各一兩研青礬煉汁盡半兩藜蘆炙二兩上搗研極細煉蜜和劑捻如梔子大以綿裹納陰中即惡水下阿膠丸出聖惠方治婦人赤白帶下阿膠二兩搗碎炒令黃燥緑礬一兩燒赤白石脂二兩釜底墨二兩烏賊魚骨一兩燒灰上件藥搗羅為末用軟飯和丸如桐子大每於食前以熱酒下三十丸又方出聖惠方白礬二兩燒汁盡釜底墨二兩烏賊魚骨一兩微灰上件藥搗羅為末用軟飯和丸如梧桐子大每於食前以粥飲三十丸又方一名赤石脂散出聖惠方白芍藥一兩赤石脂一兩乾薑一兩炮裂銼上件藥搗細羅為散每於食前以粥飲調下二錢又方出聖惠方扁竹葉切三合赤車使者半兩紅藍花半兩上件藥以酒二大盞煎至一盞去滓分為二服食前服之又方出聖惠方用凌霄花二兩搗細羅為散每於食前以溫酒調下二錢伏龍肝散出聖惠方治婦人赤白帶下久患不瘥肌瘦黃瘁多困乏力棕櫚不以多少燒灰火燃急以盆蓋陰令火住伏龍肝於鍋灶直下去取赤土炒令煙盡屋梁上塵懸長者如無以灶頭虛空中者炒令煙盡於淨地出大毒上等分碾和令停入龍腦麝香各少許每服二錢溫酒調下淡醋湯亦可患十年者半月可安一親戚婦人年四十五經年病崩漏不止面黃肌瘦發黃枯稿語言無力服諸藥不效延僕診之六脈微和問服何藥當歸川芎澀血諸品丹藥服之皆不效僕遂合博子濟方伏龍肝散兼白礬丸服之愈白芍藥散出聖惠方治婦人赤白帶下臍腹疼痛年月深久不瘥者乾薑三兩白芍藥半兩上各炒黃色用為末空心米飲調下方寸匕又云加香附子等分甘草減半一方不加附子甘草治婦人赤白帶下年月深遠日漸羸瘦起止不得宜服此方出聖惠方用取刺薊根不限多少曝乾稱每一斤以童子小便五升浸一伏時曝乾搗細羅為散每日空心及晚食前以暖酒調下二錢桑耳續斷散出聖惠方治婦人帶下五色無問新舊艾葉散出聖惠方治婦人赤白帶下日夜不止體黃瘦不思飲食搐鼻香出大全良方治婦人子宮久冷赤白帶下牡蠣煅黃狗頭骨煅紫稍花韶腦母丁香蛇床子破故紙桂心各等分上為細末煉蜜丸如雞頭子大臨時用一粒治赤白帶下骨立者出大全良方用地榆一斤先銼用水三斗煮至一半去滓再煎如稠餳綾濾空心服三合日二服醋煎丸出楊氏家藏方治血海久冷赤白帶下月候不調臍腹刺痛高良薑銼碎入油炒黃二兩乾薑炮二兩金毛狗頭脊去毛二兩附子四枚重六錢炮去皮臍尖上為細末別用艾葉末二兩釅醋三升煎至一升半次入面一兩再熬成膏和前藥末為丸如梧桐子大每服三十丸淡醋湯下空心食前一方出鮑氏方蓮蓬燒灰一倍白礬用末半倍上米飲調下赤白帶下十年者亦愈出鮑氏方春綿棕櫚茅花敗荷蓮蓬帽紗與綿同燒百草霜上為末每服二錢入腦麝溫酒醋湯下茱萸浴湯出楊氏家藏方治下焦虛冷臍腹疼痛帶下五色月水崩漏淋瀝不斷杜仲炒去絲吳茱萸湯洗七次蛇床子丁香皮五味子各一兩木香半兩丁香半兩上銼如麻豆大每用半兩以生絹袋盛之水三大碗煎數沸乘熱熏下部通手淋浴早晚兩次熏洗金銀丸出楊氏家藏方治婦人衝任不足子藏久寒肢體煩疼帶下冷病牡蠣一兩煅粉硫黃二兩生用上為細末麵糊丸如梧桐子大每服二十丸米飲下食前服玄胡苦楝湯出試效方治臍下冷撮痛陰冷大寒帶下調經固真湯出試效方冬後一月微有地泥水泮其白帶再有陰戶中寒立此方一服而愈麻黃不去節半錢杏仁二個桂枝少許炙甘草半錢黃耆七分人參當歸身各半錢高良薑一錢白朮半錢蒼朮二分澤瀉羌活各一錢防風二分柴胡四分獨活藁本各二分升麻生黃芩各五分乾薑炮二分白葵花七朵去萼上㕮咀如麻豆大除黃芩麻黃各另外都作一服先以水三大盞半煎麻黃一味令沸掠去沫入余藥同煎至一盞七分再入生黃芩煎至一盞去滓空心宿食消盡日高時熱服之待一時許可食早飯桂附湯出試效方治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黃柏半錢為別用知母半錢又治不思飲食者加五味子治煩惱面上麻如蟲行乃胃中元氣極虛加黃耆一錢半人參七分炙甘草升麻各半錢上㕮咀都作一服水二盞煎至一盞去滓稍熱服食遠一方如少時常飽有時似腹脹夯加白芍藥半錢升陽燥濕湯一名助陽湯出衛生寶鑑治白帶下陰戶痛控心而急痛身黃皮膚燥身重如山陰冷如水防風一錢柴胡一錢半良薑一錢乾薑半錢橘皮半錢白葵花二錢生黃芩半錢一作黃柏郁李仁一錢甘草一錢上銼如麻豆大分作二服水二盞煎至一盞去滓稍熱服食前少時以美膳壓之當歸附子湯出衛生家寶治臍下冷痛赤白帶下良薑一錢乾薑一錢附子一錢柴胡七分升麻五分當歸二錢蠍梢五分炙甘草三分炒鹽三分黃柏少許為引用上為末粗每服五錢水五盞煎至一盞去滓稍熱服或為細末酒糊丸亦得固真丸出試效方治白帶久下不止臍腹冷痛陰中亦然目中溜火壅其上視物䀮䀮然無所見牙齒惡熱飲痛須得黃連細末搽之乃止惟喜干食大惡湯飲此病皆寒濕乘其胞內故喜干而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水浸肝而上溢致目䀮䀮而無所見齒惡熱飲者是少陽陽明經伏火也白石脂一錢以水燒赤水飛研細日乾乾薑炮四錢黃柏酒製白芍藥各半錢白龍骨二錢柴胡一錢當歸身酒製二錢前症乃寒濕為之也治法當大瀉寒濕以丸子藥治之故曰寒在下焦治主病宜緩以制丸大忌湯散以白石脂龍骨以枯其濕以炮乾薑大辛熱瀉寒水以黃柏之大寒為因用又為嚮導故云古者雖有重罪不絶人之後亦為之伏其所主先其所因之意久瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢導之恐辛熱之藥大甚損其肝經故微瀉之當歸身辛溫大和其血脈此用藥之法完備矣上除石脂龍骨水飛研外同為極細末水煮稀麵糊為丸雞頭大曬乾空心候宿食消盡煎百沸湯令大溫多用送下無令胃中停滯待少時以早膳壓之是不令熱藥犯胃也忌生冷硬物酒與溫面小陰丹朱氏集驗方治婦人赤白帶下月候不調諸虛不足當歸白芍藥各四兩白朮茯苓藁本白芷延胡索各一兩熟地黃酒蒸牡蠣草鞋包煅各半兩人參沒藥各二兩甘草炙南木香各一兩赤石脂煅七錢大附子一兩炮去皮臍蠶蛻紙燒以多為貴上為末煉蜜為丸如彈子大每服一丸空心酒服石脂散朱氏集驗方治白冷精帶下陰挺脫出或青黑黃白腹下攻痛胸悶頭旋眼暈耳聾啾啾痰上壅赤芍藥四兩炒乾薑香附子二兩上為細末每服三錢空心酒下如帶赤冷即用陳米飲下煎阿膠艾湯尤妙若要順氣加茴香妙應丹出衛生家寶治婦人一切冷氣赤白帶下吳茱萸當歸艾葉蒼朮禹餘糧火煅碎為末另火上等分用米醋煮數沸焙乾仍用醋糊丸如梧子大每服五十丸醋湯下治婦人脫陰白帶下無藥可治服此藥立有應驗出衛生家寶附子七錢去皮尖生狗頭燒灰四兩白礬一兩枯綿灰半兩棕櫚灰半兩腦麝少許上為細末醋糊為丸如梧桐子大每服二十丸空心用麝香醋湯吞下一日三服堅中丸出十便良方治室女白帶下半夏一兩豬苓二兩銼別為末上同炒半夏令黃色取半夏為末水糊為丸如梧桐子大焙乾白湯下二十丸不以時留豬苓末養此丸子鹿角膠散治婦人白帶下不止面色萎黃繞臍冷痛鹿角膠白龍骨附子桂白朮各一兩上搗羅為散每服於食前以粥飲調下二錢乾薑丸治婦人久赤白帶下臍腹冷痛方乾薑阿膠伏龍肝細研各一兩白石脂熟乾地黃各二兩上搗羅為末用蜜和搗三五百杵丸如梧桐子大每服食前以熱酒下三十丸海蛤丸出王氏博濟方治小腸積敗婦人赤白帶下並五淋舶上茴香半夏芫花醋炒令乾紅娘子去翅頭足略炒玄胡索川苦楝硇砂去砂石取霜用海蛤羌青去上頭足微炒各等分上件藥味一處杵羅為末醋煮麵糊丸桐子大用硃砂為衣每服十丸鹽湯下婦人醋湯下五淋生薑湯下心氣痛生薑醋湯下取惡物為效治婦人血海虛冷赤白帶下肌肉消瘦臟氣虧損弱絶無骨肉宜服此方六腑熱不可吃出護命方石斛去根白芷萆薢狗脊去毛益智子去皮山茱萸牡蠣火煅杜仲去皮赤石脂龍骨各半兩艾葉半兩甘草藁本各一分當歸一兩上為細末每三錢水一盞二分大棗三枚同煎四五沸空心去滓吃白薇丸出衛生家寶方治婦人血臟氣弱四肢倦怠不思飲食氣冷微疼赤白帶下血崩婦人一切諸病皆治白薇五兩淨洗地黃二兩洗焙牛膝酒浸一宿焙當歸酒浸一宿焙山茱萸焙肉桂不見火白朮訶子皮石斛附子炮熟去皮尖黃連乾薑肉豆蔻生人參焙蓽茇焙檳榔生茯苓焙沒藥生研麒麟竭生大黃焙肉蓯蓉去皮毛切焙木香焙薯蕷焙以上各一兩上為末煉蜜為丸如梧桐大每服二十丸空心日午鹽酒下鹽湯亦可治婦人帶下出本草以榆莢和牛肉作羹食之破血壅脹帶下崩中不止者出本草以麻根洗淨搗碎用水煮服之效治婦人帶下漏下出本草以淡菜羹食之任意治女子帶下出本草以白殭蠶七枚為末用酒調方寸匕服立效治婦人赤白帶下出本草以薤作羹食之治婦人赤帶下出本草用懸鉤根皮濃煮服之治婦人帶下五色俱治之出本草取黃磚石燒令微赤熱以面以五味和作煎餅七個安磚上以黃栝蔞敷面上又以布兩重令患病人坐下令藥氣入腹加熏之有蟲出如蠶子不過三五度瘥治女子帶下便溺不利出本草以雀卵白和天雄菟絲子末為丸空心酒下五丸治赤白帶下臍腹冷痛面色萎黃日漸虛困治白帶下用禹餘糧一兩味甘寒用醋淬過研為末乾薑一兩味辛大熱研為末治赤帶下用禹餘糧一兩味甘寒用醋淬過研為末石薑半兩味甘溫研為末上二分各隨症令和用藥每服二錢空心溫酒調下治月候湛濁赤白帶下多年不瘥者用石燕子淨洗刷去泥土杵羅為末以磁石吸去杵頭鐵用時以堅磁鉢內以硬乳槌研細水飛過取白汁如甘乳者掠去曝乾服半錢至一錢清飯飲調下溫水亦得須常服勿令歇服之及一月諸疾皆愈赤白濁附論夫婦人小便白濁白淫者皆由心腎不交養水火不升降或由勞傷於腎腎氣虛冷故也腎主水而開竅在陰陰為溲便之道胞冷腎損故有白濁白淫宜服局方金鎖正元丹或因心虛而得者宜服平補鎮心丹降心丹威喜丸若因思慮過度致使陰陽不分清濁相干而成白濁者然思則傷脾故也宜服四七湯吞白丸子此藥極能分利更宜小烏沉湯每貼加茯苓一錢重益智二十八枚去殼碾鹽煎服方二豆散出危氏方治耳鳴心內躁腰腳疼重腹內虛鳴臍下冷痛頻下白水如泔湛濁症白豆蔻肉豆蔻丁香巴戟丁皮白茯苓蒼朮桂心黑附火煨各一兩白朮人參山藥桔梗茴香粉草各五錢上銼散每服三錢水一盞半生薑三片紫蘇葉三度煎空心溫服鹿茸散治婦人久積虛冷小便白濁滑數不禁勝金丸出危氏方治渾身壯熱頭疼臍下㽱痛下淡紅水當歸去尾白芍藥鹿茸燎去毛酒炙鱉甲川芎白朮大艾炒側柏葉赤石脂醋煅川白芷烏賊魚骨各等分上為細末蜜丸如龍眼大每服一丸空心鹽酒下或敗棕燒灰調酒吞下薑黃散出大全良方治血臟久冷腹脹疼痛小便濃白如泔片子薑黃二兩大附子炮一兩赤芍藥柳桂紅藍子三稜各半兩牡丹皮芫花醋浸炒木香郁李仁去皮沒藥各一分上為細末每服一錢酒煎服如腹痛用當歸沒藥為末以水七分酒三分同煎至七分熱服內金鹿茸丸出醫方集成治婦人勞傷血脈胞絡受寒小便白濁晝夜無度臍腹疼痛腰膝無力黃耆雞內金牡蠣鹿茸遠志肉蓯蓉五味子龍骨桑螵蛸附子各等分以豬脂入白礬一塊安在鍋銚中煅熟以白放尿清泡吃治婦人久積虛冷小便白濁滑數不禁用鹿茸屑炒黃為細末空心溫酒調服二錢又方用雞䏶胵炙為末空心溫酒調下二錢治婦人白濁出永類鈐方用百草霜一錢入椒末炒鹽少許豬肝一片三指大批開入上藥紙裹慢火煨熟細嚼以濁酒空心下食後服酸棗仁湯
