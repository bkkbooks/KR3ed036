body:
  text: 卷三百三十一婦人諸疾門赤白帶下附論夫帶下有三十六種色雖不同所致則一皆自勞傷過度損動經血致令體虛受於風冷風冷入於胞絡搏其血之所成也衝脈任脈為經脈之海衝任之為病女人則帶下而手太陽為小腸之經也手少陰心之經也心為臟主於裡小腸為腑主於表此二經之血在於婦人上為乳汁下為月水衝任之所統也衝任之脈既起於胞內陰陽過度則傷胞絡故風邪乘虛而入於胞損衝任之經傷太陽少陰之血致令胞絡之間穢液與血相兼連帶而下冷則多白熱則多赤冷熱並則赤白雜下間有五色者是五臟俱虛各隨其色而應也病者起於風氣寒熱之所傷或産後早起不避風邪風邪之氣入於胞門或中經脈流傳臟腑而發下血名為帶下若傷足厥陰肝之經其色則青如泥色若傷手少陰心之經其色赤如紅津若傷手太陰肺之經則其色白形如涕若傷足太陰脾之經則其色黃如爛瓜若傷足少陰腎之經則其色黑如衃血此為其候也問曰風邪氣之所中是人皆受之何為婦人獨有此病答曰五臟六腑男女雖同其中細微各有差別緣婦人有胞門子臟風冷中之則為所病若男子則為他病矣又問何以名為帶下復有冷熱者何答曰脈有數經名字不同奇經八脈有帶在腰如帶之狀其病在於帶脈之下其有冷熱者即隨其性也婦人平居之時血欲常多氣欲常少方謂主氣有原百疾不生倘或氣倍於血氣倍生寒血不化赤遂成白帶氣平血少血少生熱血不化經遂成赤帶寒熱交併則赤白俱下有室女或室後虛損而有此疾者皆令孕育不成以致絶嗣凡有是症速宜治之久而不治令人面色皯𪒟肌肉瘦瘠腹脅脹滿攻刺疼痛甚至足脛枯細多苦逆冷尫羸不能食矣診其脈右手尺脈浮浮為陽陽絶者無子苦足冷帶下也凡婦人赤白帶下或出白物如脂可服導水丸禹功散或單用無憂散量虛實加減泄訖服桂苓丸五苓散葶藶木香散同治濕法或用獨聖散上湧亦可也室女白帶下可用茶調散吐之吐訖可服導水丸禹功散瀉之次服葶藶木香散四物湯白朮散之類則愈矣治白者同瀉濕法則是也婦人有濁汙水不止亦同此法也方沉香牡丹丸治婦人血海久虛經候不利赤白帶下白氣衝心多發刺痛四肢困煩沉香三分牡丹皮去心赤芍藥當歸桂心川芎黃耆去蘆蜜炙人參茯苓山藥白芷橘紅吳茱萸炮七次炒白巴戟去心木香牛膝酒浸去苗枳殼去瓤麩炒肉豆蔻製厚朴生乾薑白龍骨各半兩上為末煉蜜丸如梧桐子大每服二十丸空心溫酒下若心腹痛煎白芷酒下治女人諸帶下方大黃附子茯苓牡蒙牡丹桔梗葶藶各三兩厚朴人參當歸虻蟲蜀椒吳茱萸柴胡乾薑桂心各半兩細辛二兩半上為末蜜和丸如梧桐子大每服空心酒服二丸不知加之以腹中溫暖為度一本有麻子三兩澤蘭半兩無蜀椒葶藶黃耆丸出聖惠方治婦人腑臟冷熱相攻心腹內絞痛腰間時痛赤白帶下面色萎黃四肢羸乏黃耆一兩半銼龍骨一兩當歸一兩銼微炒桑寄生一兩鹿茸二兩去毛塗酥炙令黃地榆一兩銼乾薑三分炮裂銼木香一兩代赭一兩白石脂一兩赤石脂一兩人參一兩去蘆頭艾葉一兩微炒芎藭一兩卷柏一兩半微炒訶黎勒皮一兩熟乾地黃一兩半上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每於食前以暖酒下三十丸竹茹丸出大全良方治婦人崩中赤白帶下當歸白朮青木香蠶蛻煅黑棕刷煅穿山甲煅各一兩地榆竹茹川芎白茯苓粉草血餘煅牡蠣煅綿子煅各半兩熟地黃四兩赤石脂煅三兩上件藥用綿子裹定入瓶內用鹽泥固濟用炭火半煅存性卻同前藥碾為細末煉蜜丸如梧桐子大每服四十丸空心酒調下卷柏丸出濟生方治婦人室女腑臟冷熱相攻心腹絞痛腰痛腿痛赤白帶下面色萎黃四肢羸乏黃耆去蘆頭蜜炙熟地黃洗各一兩半卷柏醋炙赤石脂煅醋淬七次鹿茸醋炙白石脂芎藭代赭石煅醋淬七次艾葉醋炒一兩桑寄生鱉甲醋炙當歸去蘆頭酒洗微炒地榆各一兩木香不見火龍骨各半兩乾薑炮三分上為末醋炙糯米糊為丸如梧桐子大每服七十丸空心食前用米飲送下治婦人及女子赤白帶方出千金方禹餘糧當歸芎藭各一兩半赤石脂白石脂阿膠龍骨石葦一兩六銖烏賊骨黃柏白蘞黃芩一作黃連續斷桑耳牡蠣各一兩上為末蜜丸如梧桐子大空心米飲下十五丸日再加至三十丸為度白馬蹄丸出千金方治女人下焦寒冷成帶下赤白濁白馬蹄鱉甲鯉魚甲龜甲蜀椒各一兩磁石甘草杜仲萆薢當歸續斷芎藭禹餘糧桑耳附子各二兩上為末蜜丸梧子大酒服十丸加至三十丸日三服一本無鱉甲桂心飲治月經不調變為帶下桂去粗皮芍藥各一兩虻蟲去翅足炒水蛭微炒硝石土瓜根面塵微炒大豆續斷牡丹去心當歸炙各半兩野狐肝焙乾一分桃仁去皮尖雙仁炒一百粒上粗搗篩每服三錢水一盞煎至七分去滓食前溫服日三海蛤丸出宣明論治婦人小便濁敗赤白帶下五淋臍腹疼痛寒熱口乾舌澀不思飲食海蛤半夏芫花醋炙紅娘子去翅足訶子炒川楝子麵裹煨去皮玄胡索茴香一兩炒乳香三錢硇砂半兩硃砂半入藥半為衣沒藥各一兩當歸一兩半上為末醋糊為丸如小豆大每服五丸至七丸醋湯下量病人虛實加減小牛角䚡散出千金方治帶下五賁一曰熱病下血二曰寒熱下血三曰經脈未斷為房事則血漏四曰經來舉重傷任脈下血五曰産後臟開經利五賁之病外實內虛方牛角䚡一枚燒令赤鹿茸禹餘糧當歸乾薑續斷各二兩阿膠三兩烏賊骨龍骨各一兩赤小豆二升上治下篩空心服以酒服方寸匕日三一方無鹿茸烏賊骨桑寄生散一名龜甲散出聖惠方治婦人赤白帶下久不止腰腿痠痛面黃體瘦四肢少力桑寄生桑耳炙當歸銼炙各一兩白芍藥芎藭各二分烏賊魚骨燒灰柏葉炙各一兩龜甲醋炙一兩半禹餘糧煅醋淬七次二兩吳茱萸湯洗焙炒半兩上搗研為散每服二錢食前溫酒調下金不換丸治婦人子宮虛憊或服冷藥過多致令赤白帶下淋瀝不止或産後用力過多陰門突出不收一應不正之疾並宜服之當歸半兩熟地黃一兩川白芷半兩五倍子一兩白石脂煅六兩禹餘糧半兩煅七次用醋浸赤石脂煅一錢龍骨煅六錢熟艾一兩附子七錢上為細末醋糊丸二十丸用艾葉煎酒米飲亦得虛加附子一個艾煎丸出百一選方治婦人一切虛寒胎前産後赤白帶下或成血瘕久服此藥自然融化伏道艾燥去塵土擇淨枝梗取葉稱五兩先用大肥淮棗十二兩砂瓶內水煮爛去核同艾葉一處搗爛如泥捻成薄餅子猛火焙乾乘熱急碾為末大漢椒去目枝梗併合口者取淨稱五兩以阿膠二兩米醋三升用椒於砂瓶內煮極干取出焙燥碾細末當歸去蘆及須酒浸洗白芍藥真白者川芎白薇附子大者炮去皮臍卷柏取青葉澤蘭去枝梗取葉以上各焙乾稱用熟乾地黃如鋪上賣者須淨洗漉去浮者曬乾酒浸蒸曬再入酒浸蒸五次七次如餳糖煎香美方可用亦焙乾稱上同為細末與前艾葉椒末稱勻米醋丸如梧桐子大每服五七十丸至百丸二百丸艾醋湯空心食前服此藥一婦人因産後虛寒嘔惡不食腹痛如割時作寒熱後出盜汗瘦悴骨立臍腹之左結成硬塊其大如掌冰冷雖盛暑此虛處獨無汗每塊微動則痛不可忍百藥治不效夢中忽有人授以此方因服之噁心寒熱盜汗輒止盡一料遂平復獨血塊如故服至五六料其塊自融化而出如魚凍萬靈丸治婦人諸虛痼冷腰腹困疼赤白帶下一切虛冷當歸焙川芎熟地黃焙茯苓乾薑炮桂白朮芍藥甘草附子各等分上為細末煉蜜為丸如彈子大每服一丸熱酒化下或作小丸如梧桐子大溫酒米飲下空心食前日進二服桑耳散出聖惠方治婦人赤白帶下桑耳一兩微炒白芍藥三分黃耆三分銼肉豆蔻一兩去殼阿膠一兩搗碎炙令黃燥熟乾地黃一兩當歸一兩銼微炒蒲黃半兩桔梗一兩去蘆頭上件藥搗細羅為散每服食前以粥飲調下二錢芎藭湯一名溫中芎藭湯出千金方治帶下漏血不止及風虛冷熱勞損衝任月水不調崩中暴下腰重裡急淋瀝不斷及産後失血過多虛羸腹痛或妊娠胎動不安下血連日小便頻數肢體煩倦頭暈目暗不欲飲食芎藭乾地黃黃耆芍藥吳茱萸甘草各二兩當歸乾薑各三兩上㕮咀以水一斗煮取三升分三服若月經後因有赤白不止者除地黃吳茱萸加杜仲人參各二兩桑耳湯治婦人帶下赤白是虛損因風得之或房室無忌得之桑耳微炒三分芍藥黃耆銼熟地黃焙阿膠炙燥各一兩地黃煅醋淬五次燒赤蒲黃微炒白堊燒赤各一兩半上粗搗篩每服三錢水一盞半入豉半合煎至八分去滓食前溫服日三治帶下有病無子藥十四日下血二十日下長蠱及青黃汁出三十日病除五十日肥白方出千金方大黃破如豆粒煮令黑色柴胡朴硝各一斤芎藭五兩乾薑蜀椒各一升茯苓如雞子大一枚上為細末蜜丸梧桐子大先食米飲服七丸不知加至十丸以知為度龍骨散治婦人帶下龍骨乾薑炮各一兩當歸焙禹餘糧煅醋淬五七次阿膠炙燥續斷各二兩牛角䚡炙焦三兩上為散每服三錢食前溫酒調下日三服柏葉散治婦人帶下腹痛柏葉炙黃二兩芎藭芍藥白芷乾薑炮牡丹去心各二兩當歸焙半兩上為散每服二錢食前溫酒調下乾柿煎丸治婦人衝任久虛下血不時及赤白帶下連年不止盜汗咳嗽肢節痠疼血海虛冷臍腹刺痛不進飲食日漸瘦弱乾柿十枚去蓋細切沉香銼一兩杵末好酒三升同乾柿浸半日文武火熬成膏研細入諸藥禹餘糧四兩紫色者燒赤醋淬十度研細吳茱萸湯浸一宿去浮者慢火炒白朮陳橘皮去白焙烏頭酒浸一宿炮裂去皮臍各一兩乾薑炮半兩地龍去土二兩瓦上慢火炒上搗研七味為末入前膏和搗一二十杵丸如梧桐子大每服二十丸至三十丸溫酒或醋湯下麒麟竭湯出聖惠方治婦人血傷赤白帶下小腹疼痛麒麟竭地榆黃柏去粗皮炙各一兩禹餘糧煅赤醋淬五次赤芍藥銼炒各一兩半熟乾地黃切焙四兩一作生乾地黃上粗篩每服三錢水一盞煎至七分去滓溫服不拘時候一方為細散食前粥飲調下二錢白蘞丸出千金方治室女衝任虛寒帶下純白及治漏下赤白鹿茸醋蒸焙二兩白蘞金毛狗脊燎去毛各一兩上為細末用艾煎醋汁打糯米糊為丸如梧桐子大每服五十丸空心溫酒下一方為末空心米飲服方寸匕日三服土瓜根散出全陽方治帶下經水不利小腹滿痛經一月再見者土瓜根芍藥桂枝蟅蟲各三分上杵為散酒服方寸匕日三服阿膠散治婦人血崩不止赤白帶下阿膠炒燥白龍骨赤石脂乾薑炮各半兩上為細末每服二錢熱酒調下崩漏艾湯下茅花散治血崩不止赤白帶下茅花一握炒棕樹皮三寸嫩荷葉三張甘草節二兩上為細末空心酒調一匙尖服棕毛散治赤白帶下血崩漏下胎氣久冷臍腹疼痛棕毛燒灰存性蒲黃炒各等分上每服三錢好酒調下空心食前日進二服香附子散治赤白帶下百草霜一兩當歸香附子紫金皮烏藥各八錢伏龍肝一兩上為末以水牛膏同茴香炒用酒調三大錢不拘時候通口服忌食魚腥母豬等肉治産後赤白下腹絞痛不可忍方黃連四兩黃柏三兩阿膠炙蒲黃各一兩當歸六分黃芩二兩上搗蜜為丸如梧桐子大米飲下六十丸日二夜一服立定艾茱丸治婦人子宮久冷赤白帶下艾葉一斤蒼朮香附子吳茱萸橘皮各四兩上用米醋五升慢火煮至醋乾為度曬乾為細末醋糊為丸如梧子大每服七十丸淡醋湯送下空心食前服桑寄生湯治婦人帶下三十六種不同桑寄生炙芎藭艾葉炙各一兩當歸焙一兩白膠炙燥半兩上粗搗篩每服三錢水半盞酒半盞同煎至七分去滓食前溫服日三若服此湯口乾渴者加茅根切二合生地黃一兩麥門冬去心一兩治婦人一切赤白帶下臍腹疼痛乾薑二兩炮艾三兩糯米湯粥和過燒乾神麯三兩炒吳茱萸一兩半炒當歸一兩半炒上為末醋打前艾葉末糊為丸如梧子大每服二十丸至三十丸食前溫酒送下白芷丸治婦人帶下腸有敗膿淋漓不已腥穢殊甚遂至臍腹更增冷痛此蓋為敗膿血所致卒無已期須以此排膿白芷一兩單葉紅蜀葵根二兩即單葉古梅根無根以蘇木節代之亦可白芍藥白礬燒枯別研各半兩蠻蟄上為末蠟丸如桐子大空腹米飲下十丸或十五丸候膿候膿盡仍以他藥補之白馬髦散治帶下方下白者取白馬髦下赤者取赤馬髦隨色取之白馬四兩鱉甲十八銖牡蠣一兩十八銖上為治下篩空心酒下方寸匕日三服加至一匕半一方白馬蹄衛生湯白芍藥當歸各二兩黃耆三兩甘草上為粗末每服半兩水二盞煎至一盞空心服如虛者加人參一兩白朮二兩月事不來先服降心火之劑後服局方五補丸後以衛生湯治脾胃以補氣血可也沒藥散治婦人血氣不調赤白帶下腰痛宮冷男子膀胱小腸氣痛疝氣沉墜痛悶香附子炒四兩乾薑一兩半炒白芍藥五靈脂各二兩炒上為細末每服二錢熱酒調下心痛醋調下食前日進二服治婦人子宮久冷赤白帶下白礬一兩硫黃一兩黃丹半兩硇砂半錢上為末新瓷碗內先鋪硫黃次鋪白礬上用黃丹蓋之文武火燒令白色為度再與麝香半錢同研勻細每服半兩新綿子裹如彈子大水蘸過於陰門內深之其安三日則藥力盡惡物纏白自落三次病愈醋糊作丸牛角䚡散治婦人血氣不和赤白帶下牛角䚡三兩燒灰桂心半兩當歸二兩酒浸牛膝半兩去苗上件藥搗細羅為散每於食前以溫水調下二錢煮附子丸專治婦人子宮久冷赤白帶下香附子去毛一片當歸二兩酒浸艾葉一兩人參一兩木香一兩上用銀石瓷罐一個可容五升者入艾葉香附子於內將好醋用慢火煮至一伏時候微干搗為餅用藥碾為細末煮藥米醋糊為丸如梧桐子大每服五十丸至七八十丸用淡醋湯送下空心食前服之白芷散出大全良方治婦人赤白帶下白芷一兩海螵蛸二兩燒胎髮一團煅上為細末空心溫酒調下二錢白礬丸出聖惠方治婦人血臟久冷赤白帶下補虛退冷暖血海白礬四兩大附子二個黃狗頭骨燒灰四兩上為末米粟粥為丸如梧桐子大每服三十丸醋湯吞下或米飲亦可空心日三服忌生冷毒物苦楝丸出保命集治婦人帶病熱入小腸為赤熱入大腸為白皆任脈經虛也苦楝淬酒浸茴香炒當歸各五分上為細末酒糊為丸如梧桐子大每服五十丸空心溫酒送下赤者熱入小腸白者熱入大腸其本濕熱冤結於脈不散故為赤白帶下也冤屈也結帶也屈帶而病熱不散先以十棗湯下之後服苦楝丸大玄胡散調下之熱去濕除病自愈也保命集云腰腿疼痛四物四兩加羌活防風各一兩天仙丸出楊氏家藏方治婦人一切虛冷赤白帶下小便膏淋變成虛損附子一枚及七錢者炮去皮臍川烏頭炮去皮臍尖海帶去土海藻去土茴香微炒葫蘆巴天仙子湯浸微炒硫黃別研乾薑炮各一兩上共為細末用獖豬肚一枚去脂淨洗入藥在內以酒醋水共一升慢火炙豬肚軟爛取出細切入鐵臼內搗為丸如梧桐子大每服五十丸空心溫醋湯下忌甘草龍骨散出大全良方治婦人赤白帶下或因候經不斷者上以龍骨燒灰為細末空心煎艾葉湯調下二錢補骨脂煎治婦人帶下並腳弱補骨脂炙安息香研各一兩胡桃仁二兩上搗研極細煉蜜為調稀餳每服半匙空心溫酒調下火龍丹治婦人赤白帶下腹肚疼痛及冷痛蛇床子二兩微炒枯白礬二兩韶粉三錢上為末醋糊丸如彈子大干胭脂為衣綿裹納於玉戶內坐不多時覺下微疼勿疑其病卻取綿子上如爛粉每日一丸暖肚止冷疼緑礬丸出聖惠方治婦人赤白帶下連年不瘥緑礬一兩燒赤釜底墨一兩烏賊魚骨一兩炙黃上件藥同研為末以粟米飯和丸如梧桐子大每服食前以暖酒下十五丸又方出聖惠方白芍藥一兩艾葉一兩微炒乾薑一兩炮裂上件藥搗羅為末以軟飰和丸如梧桐子大每於食前以粥飲下三十丸治帶下方出千金方枸杞根一斤生地黃五斤上㕮咀以酒一斗煮取五升分為三服水煮亦得破故紙散出大全良方治赤白帶下破故紙石菖蒲等分並銼炒上為末每服二錢用菖蒲浸酒調服更入斑蝥五分去翅頭足糯米同炒黃去米治赤白帶下出經驗良方石菖蒲檔子等分為末上鹽酒溫調下治婦人赤白帶下及尿水不止如崩之狀出經驗良方芍藥炒令紫色以紙盛地上出火毒黃狗頭骨各二兩燒存性上為末每服二錢溫酒下如聖丹一名火龍丹出神效方治婦人經脈不調赤白帶下枯白礬四兩蛇床子二兩上為細末醋糊為丸彈子大干胭脂為衣綿裹入陰門內熱極再換治婦人赤白帶下龍骨半兩舶上硫黃三錢上為末每服半錢無灰舊酒調空心服一日二服不問年月遠近盡令全效神功丹治婦人赤白帶下如神枯白礬五錢一分烏頭一個炒黃上為細末蜜丸如彈子大綿包之臨臥納陰門內自效治婦人赤白帶下連年不瘥出聖惠方牛角䚡二兩燒灰馬芹子一兩上件藥搗細羅為散每於食前以溫酒調下二錢治婦人帶下赤白年月深久不瘥方出聖惠方凌霄花熟乾地黃各一兩上件藥搗細羅為散每於食前以溫酒調下二錢益母草散出大全良方治赤白惡露下不止用益母草開花時採陰乾為細末空心溫酒調下二錢日三服廣濟治帶下病方出大全良方用芍藥七兩熬黑為末每服三錢匕以酒調下治帶下出肘後方用雲母粉溫水調下三錢匕立見神效乳香散出大全良方治赤白帶下用草果一個