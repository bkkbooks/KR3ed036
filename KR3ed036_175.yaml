body:
  text: 卷一百七十五積聚門寒癖附論寒癖者有癖積在脅下遇寒即痛是也此由飲冷過度停積不散能使氣道升降胃臟和調則飲食消化陳寒癖積亦自去矣寒癖之為病是飲水停積脅下痃強是也因遇寒即痛所以謂之寒癖脈弦而大者寒癖也方白朮丸出聖濟總錄治冷癖氣困服熱藥發熱心驚虛悸下冷上熱頭風嘔逆白朮陳橘皮去白焙各半兩白芷三二分防風去叉芎藭吳茱萸湯洗七遍焙乾山芋厚朴去粗皮塗生薑汁炙熟桂去粗皮大麥糵炒乾薑炮防葵銼各一兩甘草炙銼茯神去木人參各一兩上為末煉蜜和丸如梧桐子大每日空心溫酒下二十丸白朮丸出聖濟總錄治久寒宿癖心腹刺痛痰逆嘔吐飲食不消下利羸瘦白朮吳茱萸湯洗七遍焙乾炒各二兩桔梗炒一兩當歸切焙赤茯苓去黑皮各一兩乾薑炮二兩桂去粗皮附子炮裂去皮臍細辛去苗葉生乾地黃焙椒去目並閉口者炒出汗甘草炙銼各一兩上為末煉蜜和丸如梧桐子大每服空心溫酒下二十丸桔梗丸出聖惠方治寒癖氣發即脅下痛引膀胱裡急氣滿不下食桔梗一兩去蘆頭枳殼二兩麩炒微黃去白瓤焙人參一兩去蘆頭鱉甲一兩塗醋炙令黃去裙襴吳茱萸三分湯浸七遍焙乾微炒當歸一兩銼微炒桂心三分白朮一兩大麥糵一兩半炒微黃乾薑一兩炮裂銼青橘皮一兩湯浸去白瓤焙川大黃二兩銼碎微炒上件為末煉蜜和搗三二百杵丸如梧桐子大每服以溫酒下二十丸日三四服千金丸出聖濟總錄治寒癖宿滯食飲不消丹參去蘆頭半兩乾薑炮二兩附子炮裂去皮臍人參戎鹽研如粉各半兩半夏湯泡去滑焙乾一錢半大黃銼炒二兩苦參銼桂去粗皮各半兩石膏二兩研如粉巴豆三十枚上為末再同研勻煉蜜和丸如小豆大每食後溫酒下三丸葫蘆巴丸出聖濟總錄治寒癖留滯不消葫蘆巴補骨脂各一錢木香茴香子炒各一分楝實炒半兩硇砂研一錢銅綠研一錢五靈脂研膩粉研各一分巴豆二錢去皮心膜不出油研草烏頭半兩用麩和巴豆同炒黑色上搗研為末用薑蔥汁和丸如豌豆大看虛實炒鹽酒下三五丸空心服白朮丸出聖惠方治寒癖氣腹脹不思飲食四肢少力白朮一兩甘草半兩炙微赤銼厚朴一兩去粗皮塗生薑汁炙令香熟訶黎勒一兩煨用皮陳橘皮一兩湯浸去白瓤焙芎藭一兩桂心三分大麥糵一兩炒微黃乾薑三分炮裂銼人參三分去蘆頭上件藥為末煉蜜和搗三二百杵丸如梧桐子大每服生薑棗湯下三十丸日三四服大沉香煨姜丸出聖濟總錄治寒癖積氣疼痛下利沉香一兩半硇砂研木香各半兩附子一枚炮裂去皮臍黑三稜炮銼雞爪三稜炮銼京三稜炮銼各半兩青橘皮各半兩湯浸去白焙當歸切焙各一兩上搗研為末酒煮麵糊和丸如小櫻桃大每服用生薑一塊剜作甕子入藥一丸以濕紙裹煨令香熟安地上出去火毒少時細嚼鹽湯下吳茱萸丸出聖惠方治久寒癖積胸脅痞滿心腹堅硬短氣嘔逆手足厥冷腰背引痛吳茱萸湯洗七遍焙乾炒一兩附子炮裂去皮臍半兩厚朴去粗皮生薑汁炙透白礬燒令汁盡研如粉人參半夏湯浸去滑七遍焙乾枳實麩炒乾薑炮各三分桂心各去粗皮三分上為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下一方有甘草無白礬木香丸出聖濟總錄治寒冷癖積虛中積滯及下痢心腹疼痛木香硇砂研各半分附子去皮臍生用高良薑胡椒各一分硫黃研半分巴豆二十八粒去皮心膜出油研上為末再同研勻用粟米飯和丸如綠豆大每服五丸煎乾柿湯下臨臥服枳實湯出聖濟總錄治寒癖飲食不化心下虛滿如水狀枳實麩炒白朮各一兩半夏湯洗去滑曝乾前胡去蘆頭各二兩桂去粗皮半兩甘草炙銼各一兩赤茯苓去黑皮二兩上粗搗篩每服五錢以水一盞半生薑一小塊拍碎同煎至八分去滓溫服空心日午臨臥各一服烏頭丸出聖惠方治寒癖氣結澀不通繞臍切痛宜服川烏頭三分炮裂去皮臍甘草半兩炙微赤銼甜葶藶三分隔紙炒令紫色川大黃三分銼碎微炒芎藭半兩赤芍藥半兩桂心半兩上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸露宿丸治大寒冷積聚方方見露宿丸丁香丸出聖濟總錄治寒癖積塊丁香沉香附子炮裂去皮臍硇砂研各半兩陳曲末三兩上除硇砂陳曲外搗羅為末用木瓜一枚大者破開去瓤入硇砂於木瓜內甑上蒸爛次入諸藥末都研看軟硬次入陳曲末看得所為丸如梧桐子大每服五丸茶湯下或溫酒嚼下如要疏轉可服十丸小兒一丸巴豆丸出肘後方治寒癖積聚巴豆三十枚去皮心研紙裹壓出油杏仁五十枚湯浸去皮尖雙仁炒令熟研如膏桔梗銼炒皂莢去黑皮子塗酥炙黃色藜蘆各二兩去苗微炒上件搗羅為末入研藥拌勻煉蜜和丸如梧桐子大每服食前米飲下一丸日二次欲利者服二丸皂莢丸出聖濟總錄治寒癖虛冷久積成塊進食化痰解風秘皂莢不蚛者去黑皮並子塗酥炙肉蓯蓉酒浸一宿薄切焙乾白芷附子炮裂去皮臍各一兩上為末煉蜜和丸如梧桐子大每服二十丸溫酒熟水任下空心食前服如關膈不利服暖藥不得者服此便通快療腹中冷癖水穀陰結心下停痰兩脅痞滿按之鳴轉逆害飲食大蟾蜍一頭去皮及腹中物支解之芒硝大人用一升中人七合羸小五合一升上以水六升煮取四升一服一升服後未得下更服一升得下則九日十日一作出肘後方治寒癖宿食久飲不消大便秘上用巴豆仁研令大熟一升清酒五升煮三日三夜再微火煎成膏丸如豌豆大每服一丸即下欲吐者服二丸治久寒癖積胸脅痞悶心腹堅硬短氣嘔逆手足厥冷腰背引痛出肘後方上用茱萸八兩硝石一斤生薑一斤以酒五升合煮取四升先服一服一升不痛者止勿再服之下病後好將養之又方出肘後方上以大黃八兩葶藶四兩芒硝四兩熬令汁盡熟搗蜜和丸如梧桐子大食後三丸稍增五丸又方出肘後方上用貝母二兩桔梗二兩礬石一兩巴豆一兩去皮心生用搗千杵蜜和丸如梧桐子大一服二丸病後少少減服又方出肘後方上用茯苓一兩茱萸三兩搗蜜和丸如梧桐子大服五丸日三服掌中春出德生堂方治肚腹癖積手足厥冷筋骨疼痛熨之自愈針砂三兩硇砂三兩白礬腳底黑者六錢上為細末一處研勻以砂銚盛酒醋炒熱紙裹再以手帕裹熨痛處如極熱略住再熨直至藥無力覺冷方住溫胃丸出聖濟總錄治冷癖醋心嘔逆宿食不消中酒後腸中雷鳴時發腹痛一切虛冷等吳茱萸湯洗醋炒陳曲炒黃陳橘皮湯浸去白焙白朮人參桂去粗皮熟乾地黃焙甘草炙各一兩上為末煉蜜和丸如梧桐子大空心米飲下十丸酒癖附論胃弱之人因飲酒過多酒性熱使渴而引飲遇氣道痞澀酒與飲俱不化停在脅肋結聚成癖其狀按之有形或按之有聲脅下弦急脹滿或致痛悶肌瘦不能食但因酒得之故謂之酒癖夫酒癖者由飲酒多食魚膾之類腹內痞滿因而成渴又飲水水氣與食結聚兼遇寒氣相加所以成癖氣停積於脾胃脾胃得癖氣不消化故令宿食不消腹內脹滿噫氣酸臭所以謂之酒癖宿食不消也方七香丸出瑞竹堂方治酒食過傷停飲消積寬膈快脾丁香乳香研木香麝香研安息香研沉香各錢半藿香各二錢半青橘皮去瓤陳皮去白檳榔麵裹煨訶子皮荊三稜麵煨蓬莪朮煨肉豆蔻麵煨各一兩桂一二兩半去皮細墨半兩豬牙皂莢一兩巴豆七錢去殼不去油別研入上為末用陳米四兩與皂莢墨巴豆一處炒令米黃用重紙裹候冷同前藥碾為細末白麵糊為丸如黃米殼大每服五七丸至十丸食後薑湯送下如不利服一十五丸利三二行勿多服大枳殼丸治一切酒食所傷胸膈痞悶脅肋脹滿腹中疼痛飲食不消痰逆嘔吐噫醋吞酸飲食遲化並宜服之百種丸出御藥院方治調順三焦理治痞氣去積聚酒癖癥瘕青皮陳皮並去白神麯蘿蔔子麥糵並炒京三稜蓬莪朮炮各二兩益智仁雷丸各一兩枳實麩炒四兩牽牛炒三兩上為細末水麵糊丸如梧桐子大每服十五丸食後生薑陳橘皮湯送下鱉甲大黃丸出聖濟總錄治宿食酒癖鱉甲生末大黃生末吳茱萸末各二兩硇砂火枯半兩與上三味用米醋二升慢火煎成膏入後藥陳橘皮湯浸去白焙白朮木香肉豆蔻去殼枳殼去瓤麩炒各一兩京三稜炮各一兩上十味搗羅後六味為末將前鱉甲煎搜和丸如梧桐子大每服二十丸酒飲任下空心服加至三十丸半夏散出聖惠方治酒癖宿食不消胸心脹滿嘔逆不納飲食小便赤黃半夏一兩湯浸七遍去滑前胡二兩去蘆頭白朮一兩甘草三分炙微赤銼茵陳一兩枳殼一兩麩炒微黃去瓤赤茯苓各一兩黃芩一兩半當歸三錢上件藥為散每服三錢以水一中盞生薑半分煎至六分去滓不計時候溫服大黃桃仁丸一名大黃丸出聖惠方治酒癖痰多脅脹上氣喘不下食飲大黃銼炒桃仁去皮尖雙仁炒研芎藭陳橘皮湯浸去瓤焙蜀椒去目並閉口炒出汗各一兩乾薑炮高良薑小草各三分上為細末煉蜜和搗三百杵丸如梧桐子大每服三十丸粥飲下日三服水銀煎出聖濟總錄治酒癖食塊痰積及血氣血刺血塊陰陽二毒水銀鉛各半兩結砂子膩粉半兩硇砂通明者蓬砂各一兩礞石一分巴豆二粒去皮心膜出油研上除膩粉外合研勻用大棗八枚去核以水調膩粉分填於棗內以濕紙五重逐枚裹之灰火內煨熟去紙並棗皮將棗肉與前藥同研勻每服皂子大一丸安舌上勿嚼用薑棗湯吞下取下積滯效紫金丸出聖濟總錄治酒癖食積逐痛氣代赭石末硇砂末巴豆霜各一分木香末丹砂末各二錢匕膩粉礞石末各三錢匕上合研勻細以燒粟米飯為丸如小豆大每服二丸至三丸冷橘皮湯下雄鬆散治酒積疸雄黃甘草甘松木香大黃各二錢丁香一十枚巴豆一十二個去皮出油另研入上為細末每服半錢清茶調下至一錢臨臥時服微利米粥將理之吳茱萸丸治酒癖久積飲食不消面色萎黃四肢無力宜服吳茱萸三分湯浸七遍焙乾微炒川大黃三兩銼碎微炒小草一兩白朮一兩赤茯苓一兩桃仁一兩湯浸去皮尖雙仁麩炒微黃柴胡一兩去苗上件藥為末煉蜜和搗三二百杵丸如梧桐子大每服以粥飲下三十丸日三服乾薑丸治酒痃癖水不消兩脅脹滿時作嘔吐腹中如水聲乾薑一兩炮裂銼枳殼一兩麩炒微黃去瓤陳橘皮三錢湯浸去白瓤焙葛根一兩銼白朮一二兩甘草半兩炙微赤銼上為細末煉蜜和搗三二百杵丸如梧桐子大每服三十丸粥飲下日二服三稜散治酒食所傷脾胃胸膈不快腹脅脹滿嘔吐酸水翻胃脾疼及食積氣塊攻刺腹脅不思飲食日漸羸瘦又治年高氣弱三焦痞塞常覺煩悶並宜服之蓬莪朮煨益智仁京三稜煨切青皮去白各二兩白茯苓焙四兩甘草一三兩上為細末每服二錢用水一大盞棗一枚擘破鹽少許同煎至半盞溫服不拘時候常服寬胸利膈消酒食和胃一方每服一二錢少鹽煎吞金黃丸治酒積食積諸積硬塊京三稜香附子半兩澤瀉二錢半巴豆四十九粒出油黍米粉黑牽牛二錢半上為末用梔子煎湯和丸如綠豆大每服三丸至五丸如心痛艾醋湯下七丸海藻丸治酒癖因酒後飲水停留於胸膈之間及兩脅痛短氣而渴宜服海藻一兩洗去鹹味漢防己一兩甘遂半兩煨微黃吳茱萸一兩湯浸七遍焙乾微炒川椒一兩去目及閉口者微炒去汗甜葶藶一兩隔紙炒令紫色芫花一兩醋拌炒令乾上件藥為末煉蜜和搗三二百杵丸如梧桐子大每服以溫酒下七丸日三服治酒癖食不消化胡椒半兩乾薑半兩炮裂銼馬芹子半兩高良薑半兩銼麥糵半兩微炒陳橘皮一兩湯浸去白瓤焙上件藥為