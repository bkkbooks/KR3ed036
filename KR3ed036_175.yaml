熟去面取散每服三錢匕空心服用冷生薑水調下午後再服又方陳橘皮三分湯浸去白瓤焙附子三分炮裂去皮臍乾薑三分炮裂銼防葵三分吳茱萸各三分湯浸七遍焙乾微炒鱉甲一兩塗醋炙令黃去裙襴木香三分上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以生薑棗湯下三十丸檳榔丸出聖惠方治痃癖氣發即兩脅急痛四肢煩悶不能食宜服檳榔一兩枳殼三分麩炒微黃去瓤桔梗三分去蘆頭人參三分去蘆頭白朮半兩桂心半兩柴胡一兩去苗陳橘皮三分湯浸去白瓤焙川大黃一兩銼碎微炒芎藭半兩草豆蔻一兩去皮上件藥搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫酒下三十丸桔梗丸療冷痃癖氣發急引膀胱痛氣滿不能食桔梗枳實炙鱉甲炙人參當歸白朮各四分桂心吳茱萸各三分乾薑四分甘草炙五分大麥糵熬六分上搗篩蜜和丸如梧桐子大每服十丸酒下日再服稍加至二十丸忌蔥蒜豬肉莧菜海藻菘菜桃李雀肉等鱉甲散出聖濟總錄治腹內痃癖積聚心胸刺痛面無顏色鱉甲去裙襴醋炙附子炮裂去皮臍木香白朮京三稜煨銼檳榔各三分半生半熟銼大黃微炒桂去粗皮高良薑炒芎藭各半兩黑神丸出聖濟總錄治痃癖不能食心脅刺痛發作有時並膀胱小腸冷滯乾漆六兩半生用重湯煮半日令香陳曲茴香子各四兩木香銼細椒紅丁香各二兩檳榔四枚銼除椒紅外五物皆半生半炒上六味搗羅為末用漆和丸如彈子大取茴香子末十二兩鋪蓋陰乾並茴香收器中養藥及干乃去茴香瓷盒盛若腎膀胱氣小腸氣痃癖七疝下墜五膈血傷產後諸血漏下赤白並一丸分四服死胎一丸用綿灰酒化下難產炒葵子四十枚搗碎酒煎濃汁化下一丸諸疾不過三服人參丸主痃癖氣不能食人參八分白朮枳實炙桂心各六兩橘皮四分甘草炙桔梗各五分上搗篩蜜和為丸如梧桐子大每服十五丸酒下日二服加至二三十丸禁生冷豬肉生蔥桃李雀肉海藻菘菜木香散出聖濟總錄治痃癖積聚氣不能飲食及五膈並婦人血氣木香一分蓬莪朮炮銼六兩京三稜炮銼益智去皮各二兩陳橘皮去白焙四兩甘草炙銼三兩上為散每服二錢匕食鹽點湯調服不計時候白朮湯出聖濟總錄治痃癖氣每發疼痛不能飲食白朮木香益智去皮各一兩京三稜微煨熟銼三兩檳榔銼一兩半上粗搗篩每服三錢匕水一盞煎至七分去滓不計時候稍熱服京三稜丸出聖濟總錄治痃癖急痛不能飲食京三稜五兩搗末以好醋一碗同熬成稠膏蓬莪朮炮銼益智去皮青橘皮去白焙各一三兩冬用檳榔夏用木香各一兩半上四味搗羅為末以京三稜膏和丸如綠豆大每服二十丸加至三十丸生薑湯下食後服京三稜散出聖惠方治痃癖氣每發痛不能食京三稜三兩微煨銼益智子一兩去皮吳白朮木香各一兩上件藥搗粗羅為散每服三錢以水一中盞煎至五分去滓不計時候稍熱服
