body:
  text: 卷七十七眼目門目澀痛附論夫諸脈皆屬於目目者血之府故人臥則血歸於肝肝受血而能視血氣和調則上助於目力而能臥視若肝臟有熱血脈壅燥則津液不能榮潤故目中干痛而磣澀也又悲哀內動液道開而泣下甚液枯則燥其燥而澀痛者亦一證也方決明子丸出聖濟總錄治目赤昏暗澀痛心燥恍惚決明子炒升麻車前子白茯苓去皮赤芍藥地骨皮山梔子黃連去須青葙子葳蕤牽牛子炒蕤仁去皮各一兩半秦皮去粗皮銼黃芩去黑心秦艽去苗土甘菊花大黃銼炒甘草炙銼各一兩上為細末煉蜜為丸如梧桐子大每服二十丸溫水下食後服臨臥再服甘菊花散出聖濟總錄治風毒氣攻眼昏澀疼痛甘菊花羌活去蘆木賊荊芥穗芎藭各四兩甘草炙銼防風酒浸一宿黃耆切附子炮過蟬蛻洗蛇蛻一條卷在青竹上炙白蒺藜去角旋覆花石決明泥裹燒令通赤別研以上各一兩上除附子蛇蛻石決明外余皆銼碎於新瓦上烙令燥同附子等一處搗為細散每服二錢用第二米泔煎熱後調下空心日午夜各一服菊花散出聖惠方治肝心壅熱眼澀痛甘菊花防風去蘆決明子梔子仁黃芩車前子川升麻玄參地骨皮柴胡去苗麥門冬生地黃甘草炙微赤銼羚羊角屑各一兩上搗篩為散每服三錢以水一鍾入淡竹葉二十七片煎至六分去滓每於食後溫服忌炙爆油膩熱面生果菜青葙子丸青葙子蕤仁人參地骨皮麥門冬去心焙赤茯苓去皮各半兩澤瀉前胡去蘆枳殼去瓤麩炒甘草炙銼菊花防風去蘆各一兩半黃連去須二兩上為末煉蜜為丸如梧桐子大每服三十丸食後溫湯下前胡散湯治風毒上攻眼目赤澀或胬肉侵睛頭旋心悶前胡去蘆頭旋覆花各二兩桔梗銼炒犀角鎊羌活去蘆頭杏仁去皮尖雙仁炙黃生乾地黃玄參黃芩去黑心甘草炙銼防風半夏為末生薑汁製曝乾各一兩上為粗散每服五錢以水一盞半生薑一分切碎煎至八分去滓食後溫服防風湯出聖濟總錄治肝臟風熱沖目赤澀痛風淚腫合兼治倒睫防風去叉甘菊花葳蕤旋覆花升麻決明子微炒秦皮去粗皮黃連去須梔子仁甘草炙令赤銼麥門冬去心焙各一兩上粗搗篩每服五錢以水一盞半煎至七分去滓食後臨臥溫服點眼金華水治肝臟有熱血脈壅滯津液不榮目中乾澀磣痛黃連末一分硇砂豌豆大一塊研細乳香黑豆大一塊研杏仁去皮尖雙仁七枚銅綠一字煅過膩粉一錢研龍腦半錢研滑石半錢研青古老錢二文與諸藥同浸艾灰研半錢上細末研令勻與古老錢入在綿子內用井華水浸三七日後點目眥頭蟬蛻散治目腫澀痛或生翳膜兼時疾後餘毒攻目方見蟬殼散黃牛膽煎治眼澀黃牛膽汁鯉魚膽汁豬膽汁羊膽汁各半兩熊膽一分胡黃連一分搗末黃連一分去須為末秦皮一分搗末白蜜三兩上將黃連秦皮胡黃連等末入白蜜並膽汁拌和入瓷瓶子內以油單封頭牢系坐飯甑中蒸以飯熟為度用新綿濾過每以銅箸取如麻子點目眥頭日二三度玄參湯治風目痛磣澀玄參茯神去木各二兩防風去叉升麻各一兩羚羊角鎊秦艽去苗土紫菀去苗土赤芍藥各一兩上㕮咀每服五錢以水一盞半煎至六分去滓食後臨臥溫服車前子丸治肝中久熱目常澀痛車前子決明子微炒梔子仁枸杞子熊膽各半兩黃連去須甘草炙微赤銼各三兩牽牛子炒熟一兩牛膽汁一合豬膽五枚取汁上除膽外為末於三味膽汁中熬可丸即丸如梧桐子大每服食後以溫水下十丸玄參湯治眼澀痛連頭額偏痛肝心風熱壅滯所致羚羊角湯治肝肺風熱壅目澀痛密蒙花湯治肝熱目澀磣痛昏暗視物不明密蒙花一兩枳實蒺藜子炒去角甘菊花防風去叉蛇蛻各半兩上為細末每服一錢許食後臨臥溫水調下日三羚羊角散治眼目澀痛漸漸昏暗羚羊角屑赤芍藥蕤仁湯浸去赤皮赤茯苓甘草炙微赤銼地骨皮麥門冬去心焙乾各一兩上㕮咀每服二錢以水一中盞煎至六分去滓每於食後溫服通膈薺苨散治眼磣澀心胸煩悶治一切眼昏暗赤澀疼痛怕見風日難開方龍腦一錢黃丹半兩雄黃蕤仁湯浸去赤皮銅綠青鹽膩粉各一分上研如粉用白蜜半斤相和一團瓷瓶盛納於釜中重湯煮一復時取出候冷即用點三五度相次用鹽湯洗之切宜避風洗眼方治眼赤磣並癢方見防風湯麥門冬湯一名木通湯治眼睛如針刺痛目系急注磣澀疼痛麥門冬去心焙旋覆花木通銼黃芩去黑心茯神去木各一兩大黃銼炒三分上粗搗篩每服五錢以水一盞半煎至六分去滓投地黃汁一合更煎三兩沸放溫入芒硝半錢許食後臨臥服蘆根湯治脾熱肺熱目眥赤癢赤磣澀痛黃連膏治眼赤澀疼痛不開兼飛血赤痛黃連去須蕤仁去赤皮研細辛各一兩川升麻黃柏各半兩石膽豆大別研上細銼水三大盞煎至一盞半綿濾去滓入白蜜四兩相和煎令汁稠入研了石膽拌令極勻每日點少許於兩目眥上石決明散治肝臟熱壅目赤澀痛石決明井泉石石膏碎甘草生銼各一兩黃連去須菊花各二兩上為散每服二錢許濃煎竹葉熟水調下洗眼方治眼目無時赤澀痛方見秦皮湯洗明散治眼目澀痛諸疾蛤粉膩者木賊各四兩蒼朮一斤半泔浸七日去皮切焙乾上為末每服一錢以茶酒調下洗眼玉明散治眼多淚磣痛赤澀秦皮刮銼作片子溫水中洗四十九遍搗三千杵白滑石打碎青鹽二味同研如粉上等分再同研勻每用一字熱湯浸放溫洗眼切避風少時玄精石散出聖濟總錄治眼赤澀玄精石半兩研如粉無以牙硝代之黃柏去粗皮炙搗末一兩上研令極細點兩眥頭枸杞汁點眼方出十便良方治眼赤痛兼有翳者枸杞葉車前子葉各二兩上熟攪之使汁欲出又別出大桑葉裹之懸於陰地經宿乃輕取汁點目中不過三五度瘥點眼黃連煎出聖濟總錄治肝熱赤目乾澀磣痛用黃連去須半兩銼如麻豆分作二分一分磁器內炒紫色一分生用同和別以木炭灰二錢許與黃連同用沸湯半盞浸良久以細熟絹濾取汁瓷器盛就冷水內沉令極冷點眼中或更細研少許龍腦相和尤佳治眼澀痛方出龍木論治目痛澀不能視物及看日光並燈火光不得者用熱羊頭眼中白珠子二枚於細石上和棗汁研之取如小豆大安眼睛上仰臥日二夜二不過三四度瘥大黃丸出聖惠方治上焦積熱眼赤澀痛治眼去昏澀益明快生熟地黃各二兩椒一兩上為末蜜丸梧桐子大每服二十丸空心鹽湯下芎藭湯出東垣先生蘭室秘藏方治目晝夜隱澀難開羞明惡日視物昏暗赤腫而痛芎藭蔓荊子各五分細辛根二分防風一錢半甘草炒白芷各一錢上㕮咀都作一服煎法如常臨臥服之治眼澀出衛生家寶方甘菊枸杞子油麻川芎等分上為細末食後嚼嚥下凡眼澀出衛生家寶方以薄荷湯煎洗目癢急及赤痛附論夫肝經虛而風邪乘之則目癢心熱盛而血行湧溢則目赤二者各有所本今赤且癢而復瞼又急則以風熱交攻於內而又外冒寒冷之氣故其證如此亦有癢而復痛者蓋邪毒方熾氣血不得流通故時痛也龍木論云眼癢極難任外障此眼初患之時忽然時時癢極難忍此疾肝臟每有客風膽家壅熱衝上遂令眼目癢極難忍切宜銻洗出瘀血火針針陽白穴太陽穴然後服烏蛇湯補肝丸還睛散即止癢歌曰時時睛癢極難忍此病根由誰與尋瞳子連氣清淨府遭他風熱上來侵他須陽白將針刺湯用烏蛇可自輕此日不忘丸與散教君不染病根深危氏得效方云眼癢極甚瞳子連眉頭作癢不能收驗此因清淨府先受風熱宜服驅風一字散也方防風丸出聖濟總錄治眼生翳目系急其翳生瞳仁上及瞼腫合痛如針刺防風去叉山芋赤芍藥山梔子仁白茯苓去黑皮各一兩半葳蕤芎藭各三兩車前子三兩秦皮去粗皮澤瀉獨活去蘆頭白檳榔煨銼甘菊花擇羚羊角鎊各一兩上為細末煉蜜和丸如梧桐子大每服二十丸空心臨臥煎苦竹葉湯送下羚羊角丸出聖惠方治肝風氣上熱下冷眼瞼瞳仁癢揉之不止羚羊角屑枸杞子菟絲子酒浸三宿曝乾烏末各一兩半細辛赤茯苓地膚子桂心獨活秦艽去苗藍實芎藭葳蕤各一兩車前子二兩甘草半兩炙微赤銼防風一兩去蘆頭上為末煉蜜和丸如梧桐子大每服空心以粥飲下三十丸晚食前再服驅風一字散出危氏方治眼痛癢翳膜川烏半兩炮去皮臍羌活防風各一分川芎荊芥各三錢上為末每服二錢食後薄荷湯下防風湯出聖濟總錄治風熱眼赤痛癢不定防風去叉甘菊花細辛去苗葉黃連去須各三分芎藭赤芍藥羚羊角鎊枳殼去瓤麩炒甘草炙人參各半兩黃芩去黑心石膏碎各一兩上㕮咀每服五錢以水一盞半煎至一盞去滓食後臨臥溫服夏枯草散出直指方治眼痛癢翳膜夏枯草大香附杵淨童尿浸一宿曬木賊去節童尿浸曬細辛連翹蠶蛻紙炒焦存性川芎當歸赤芍藥蟬蛻洗曬各半兩甘草微炒炙腦荷各二錢半上為末每服二錢茶清米泔任下如無蠶紙以夜明砂代用犀角芎藭散一名羚羊角散治久患眼疾瞼緊難開視物不真菊花湯出聖濟總錄治肝風邪熱沖眼澀赤痛癢不定甘菊花擇地骨皮去土升麻防風去叉黃連去須赤茯苓去黑皮各半兩葳蕤柴胡去苗木通銼各一兩上㕮咀每服五錢以水二盞半入竹葉七片煎至一盞去滓入芒硝末一錢許食後臨臥溫服如腹臟易利少用芒硝升麻散出聖濟總錄治目昏下淚赤癢升麻乾薑炮各半兩山梔子仁決明子炒車前子地膚子茺蔚子各一兩黃芩去赤心龍腦搗研各二兩上為細散每服二錢以米飲調食後服日三明水膏出聖濟總錄治風毒眼癢痛赤澀生瘀肉烏頭去皮臍生用青鹽白礬各半兩附子一枚去皮臍生用銼乳香半兩分銅青硇砂各一分黃連去須一兩半上銼如麻豆大用井華水五盞入瓷石鍋子內以慢火熬至七分綿濾去滓入研了龍腦半錢臨臥服之補膽丸出龍木論治眼癢極難忍外障前胡馬兜鈴柴胡茯苓各一兩半人參黑參桔梗細辛各一兩上為細末煉蜜為丸如梧桐子大每服空心茶下一十丸一方米湯下三十丸沙參散出聖惠方治風氣攻瞼眥致眼癢急似赤不赤沙參去蘆頭防風去蘆頭甘菊花赤芍藥地骨皮枳殼麩炒微黃去瓤各一兩甘草半炙微赤銼一兩黃耆一兩半銼上為散每服四錢以水一盞煎至六分去滓不計時候溫服之烏蛇散出聖惠方治眼風熱赤癢急日夜不止烏蛇二兩酒浸去皮骨炙令黃藁本防風去蘆頭赤芍藥羌活各一兩半芎藭一兩半細辛甘草各半兩上為細散不計時候以溫水調下二錢一方無甘草用米飲調下絳雪散出聖濟總錄治肝心風熱邪毒上攻目赤癢紅雪生麥門冬去心葳蕤秦皮去粗皮赤茯苓去黑皮升麻各一兩淡竹葉五七片上除紅雪外搗為散每服三錢以水二盞煎至一盞炒紅雪半錢許調勻食後溫服還睛散出龍木論治眼癢極難忍外障防風二兩車前子黑參決明子五味子細辛各一兩半知母半兩上為細末每日食後米飲調下一錢葛根湯出聖濟總錄治眼癢瞼急葛根銼烏賊魚骨桑根白皮地骨白皮各一兩半白魚皮各一兩上㕮咀每服五錢以水一盞煎五分去滓食後臨臥溫服之良石膽膏出聖濟總錄治風毒退翳膜去風癢石膽半錢烏賊魚骨半字乳香一錢蜜一皂角子大龍腦少許上合研勻入新汲水半盞相和以帛濾過入瓷瓶內用新汲水浸瓶十日每用點眼用青鹽湯熱洗點時不得犯銅鐵箸只用雞翎瀝在眼內熊膽膏出聖濟總錄點眼古銅錢二十一文完用甘菊花四兩黃連去須鬱金黃柏去粗皮蜜炙各二兩以上四味菊花揉碎黃連以上三物細銼用水二升入銅錢同於銀石器中慢火熬至一升新布濾去滓入後藥鉛丹太陰玄精石井