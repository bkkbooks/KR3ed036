研半兩黃連去須一兩輕粉五分上以新綿裹水一盞浸一時日三五度點之梔子仁湯出聖濟總錄治飛血赤脈及痛腫方見梔子湯洗眼車前草方出聖濟總錄治目飛血赤脈暴發熱痛車前子草細切半兩干藍葉切二升淡竹葉淨洗銼三握上以水四升煎取二升濾去滓微熱洗眼冷即重暖以瘥為度一方入好鹽半兩冷洗良蕤仁洗眼湯出聖濟總錄治飛血赤脈及發痛蕤仁去皮研一兩細辛去苗葉半兩苦竹葉洗細物三握上以水二升煎取一升濾去滓微洗眼冷即再暖以瘥為度點眼蕤仁膏出聖濟總錄治風熱飛血赤脈仍癢痛無定蕤仁去皮細研用半兩好酥一栗子大上將蕤仁與酥相和研令勻攤碗內後取艾一小團燒令煙出既出即將碗覆煙上熏符艾煙盡即止重研令勻每以麻子大點眥頭日三度櫸皮洗眼方出聖濟總錄治飛血赤脈櫸皮去粗皮二兩古文錢七文上以水一升半煎取七合去滓熱洗冷則再暖魚膽敷眼膏出十便良方一名神效方治飛血赤脈及痛暴赤眼澀鯉魚膽五枚黃連去須為末半兩上取膽汁調黃連末納磁盒盛於飯上蒸一時取出干即入蜜少許調似膏塗敷目眥日五七度目血灌瞳仁附論目屬肝肝受血而能視則目之瞻視必資血苟因物損傷致血脈散亂則敗血侵睛灌注瞳仁其痛如針刺然無翳膜亦或由肝氣閉塞血無所歸而得宜引血歸肝若為風熱伏留胸膈壅滯則血上行而注於目也亦有因用針失度惡血不消流漬於眼則疼痛難忍宜早療之免有所損也龍木論云又血灌瞳仁外障此眼初患之時忽因物誤刺著或即針之失度致令一眼先患後乃相牽俱損蓋為疼痛難忍臥時好眼安著枕上使流毒血在好眼先患之以致俱損也先宜服止疼痛沒藥散後服墜血明目丸點摩挲石散立效歌曰眼因射刺五輪虧疼痛眶中若受錐好眼臥時安著枕使流惡血隔光輝可憐清淨無瑕翳沉沒明珠甚可危須用婆娑為藥點卻交惡血本鄉歸方車前子散出醫方大成治肝經積熱上攻眼目逆順生翳血灌瞳仁羞明多淚密蒙花去枝葉羌活菊花白蒺藜炒去刺粉草草決明車前子各炒黃芩龍膽草淨洗各等分上為細末每服二錢食後飲湯調服生乾地黃散出聖惠方治眼肝心積熱血灌瞳仁腫痛生乾地黃一兩蒲黃三分犀角屑三分黃連三分去須黃芩玄參川升麻各一兩川大黃一兩銼碎微炒甘草半兩炙微赤銼上為散每服三錢以水一中盞煎至六分去滓每服於食後溫服忌炙爆熱面治眼血灌瞳仁生障膜出聖惠方用生地黃汁每溫服一小盞頻服以瘥為度麥門冬散出聖惠方治眼血灌瞳仁昏澀赤痛麥門冬一兩半去心焙川大黃銼碎微炒黃芩地骨皮玄參葳蕤各一兩犀角屑甘草炙微赤銼各半兩上為散每服三錢以水一中盞煎至六分去滓入馬牙硝半錢每於食後溫服之墜血明目丸出龍木論治血灌瞳仁外障石決明芎藭五味子乾山藥知母各一兩細辛人參各一兩半上為末煉蜜丸如梧桐子大空心茶下一十丸麥門冬湯名瀉肝散出龍木論治血灌瞳仁昏澀疼痛兼治轆轤轉關外障麥門冬去心焙大黃銼炒黃芩去黑心桔梗銼炒玄參各一兩細辛去苗葉芒硝研各半兩上除芒硝外粗搗篩每服五錢以水一盞半煎取七分去滓下芒硝末少許食後臨臥溫服人參湯出聖濟總錄治血灌瞳仁澀痛兼治內障散翳人參赤茯苓去黑皮一方用白茯苓細辛去苗葉五味子桔梗炒各一兩車前子防風去叉各半兩一方各二兩上粗搗篩每服五錢以水一盞半煎取七分去滓食後臨臥溫服通血丸出危氏方治血灌瞳仁生地黃焙赤芍藥甘草五錢川芎防風荊芥當歸尾各一兩上為末煉蜜丸如彈子大食後荊芥薄荷茶嚼下血既散而歸肝又恐眼目生花須再用還睛散決明湯出聖濟總錄治血灌瞳仁石決明人參芎藭細辛去苗葉五味子各一兩赤茯苓去黑皮一二兩上為粗搗篩每服五錢以水一盞半煎七分去滓食後臨臥溫服真珠散出聖惠方治眼血灌瞳仁生障膜真珠末水晶琥珀末各半兩硃砂馬牙硝半兩龍腦少許上為同研如粉每服以銅箸取如半小豆大點之槐花當歸散治眼目血灌瞳仁眼睛脹痛槐花炒赤四兩何首烏川芎當歸各一兩甘草少許上為細末每服二錢食後米泔水調下沒藥散治眼血灌瞳仁疼痛不可忍沒藥一兩半麒麟竭一兩川大黃銼碎微炒川芒硝生乾地黃各一兩上為散於食後溫水調下二錢服之一方無生乾地黃婆娑石散出龍木論治血灌瞳仁外障婆娑石少許曾青半兩龍腦石膽各一分上為末令細早晨夜後點眼又方出仁存方一名㩉眼膏治眼血灌瞳仁障膜生地黃五兩爛研川大黃一兩搗羅為末上相和以帛子剪作片子如兩三指長闊勻攤藥於上以銅器中盛仰臥㩉眼覺熱即更換冷者芎黃散出衛生家寶方治血灌瞳仁及睛疼白牽牛炒大黃煨川芎各等分上為細末每服三錢臨臥用砂糖水調下睛疼溫酒調下桔梗丸出保命集方治太陽經衛虛血灌瞳仁瞼腫頭中濕淫膚脈睛痛肝風盛眼黑腎虛桔梗一斤牽牛頭末三兩上為末煉蜜為丸如梧桐子大每服四十丸加至百丸食前溫水下日再服治眼臃方出本草以五加皮花搗末酒調服自止赤脈衝貫黑睛附論夫眼者五臟之精華若風邪熱毒內干臟腑則隨其經絡上衝於目故令赤脈衝貫黑睛也上下左右各有部分不可不察其從大眥侵睛而癢者肺胃脈熱也其從小眥起者手少陽脈動虛熱也其自上而下者足太陽脈動邪熱也其自下衝上者足陽明脈動邪熱也其源不同當察其部分依經以治之龍木論云眼小眥赤脈外障此眼初患之時皆從小眥漸生赤脈奔大眥睛上皆因三焦聚熱上衝肝膈壅熱使然治療稍遲恐損眼也宜服犀角飲子後點摩翳膏即瘥歌曰赤脈根源小眥中安然漸漸覺不沖三焦聚熱為災患欲療洗冷飲子通浮大必須鉤割烙頻頻用藥即消融鹹酸冷熱房中事謹戒猶如受戒同摩頂明目膏出聖濟總錄治風熱沖目赤脈胬肉生麻油二升真酥五兩車前子葉淡竹葉洗銼鹽花研各半兩吳藍大青黃連去須山梔子仁生犀角鎊甘草炙麥門冬去心槐白皮柳白皮黃芩馬牙硝別研朴硝馬齒莧實研各一分上除硝鹽油酥外細銼綿裹入通油膩瓷瓶中綿冪口重湯煮三伏時捩去滓新綿濾置生鐵器中每日飯後及臥開發滴頂心生鐵熨斗子磨頂三千下兼去目中熱毒昏脹痛澀前胡湯出聖濟總錄治肝實熱赤脈衝睛前胡去蘆升麻秦皮去粗皮決明子微炒蕤仁去皮研如膏各二兩菊花二兩半細辛去苗葉梔子仁各一兩苦竹葉洗芒硝湯澄一分大黃銼炒碎一兩上除芒硝竹葉外粗搗篩每服五錢以水二盞入竹葉七片煎至一盞去滓入芒硝一錢許放溫食後臨臥服真珠散出聖惠方治風熱赤脈貫黑睛及有花翳真珠末琥珀各二分龍腦丹砂各半分硇砂小豆大上同研細末每日三五次點之犀角散一名生犀飲治眼赤脈沖貫黑睛熱毒腫痛心躁煩亂犀角飲子龍木論治眼小眥赤脈外障犀角羚羊角大黃人參茯苓知母黃芩各一兩桔梗防風各二兩上為末以水一盞散一錢煎至五分食後去滓溫服黃芩湯出聖濟總錄治風熱目赤痛赤脈貫黑睛生翳黃芩去黑心木通銼枳殼去瓤麩炒甘草微炙銼葳蕤山梔子仁生乾地黃各一兩芒硝湯澄下上除芒硝外粗搗篩每服五錢以水二盞煎取一盞去滓入芒硝一錢食後溫服臨臥再服羚羊角湯出聖濟總錄治眼目疼腫赤脈攻黑睛黃連煎出聖惠方治肝臟壅熱目生赤脈沖貫黑睛赤痛不止黃耆湯出聖濟總錄治眼上下赤脈貫黑睛黃耆銼芍藥知母升麻犀角屑各一兩半苦竹葉五十片上㕮咀每服五錢以水二盞煎至一盞去滓入芒硝少許再煎沸溫服不拘時芍藥湯出聖濟總錄治目小眥赤脈利心肺芍藥芎藭黃芩去黑心大黃銼炒熟甘草炙赤銼各半兩黃連去須一兩上㕮咀每服五錢以水二盞半煎至一盞去滓食後臨臥溫服之羚羊角丸出聖濟總錄治肝肺壅熱眼生胬肉赤脈澀痛及眼障翳膜目睛癢痛羞明及小兒風疳爍陽眼赤羚羊角末昨葉何草炒絹內洗去土各一兩生乾地黃洗焙鬱金炮土上出火毒各二兩甘草生銼何首烏去白皮者各一兩上細銼曝乾搗羅為末煉蜜和丸如梧桐子大每服十五丸濃煎淡竹葉黑豆湯放冷食後臨臥服小兒丸如綠豆大每服七丸至十丸摩翳膏出龍木論治眼小眥赤脈外障兼治血灌瞳仁漸生翳障石決明一分真珠末一分水晶一分硃砂一分龍腦一分琥珀二分上為末如粉面後入酥為膏每至夜後點眼立效一方不用酥通明湯出聖濟總錄散三焦熱治小兒眥偏赤赤脈射黑睛木通銼葳蕤甘草炙各一兩半黃芩去黑心枳殼去瓤麩炒各一兩上㕮咀每服五錢以水二盞煎至一盞去滓下芒硝及下生地黃汁各少許再煎沸食後溫服蕤仁煎出聖惠方治眼風熱磣澀生赤脈沖注瞳仁熱淚疼痛蕤仁一兩湯浸去皮研青鹽三分黃連一兩去須搗研上以醋漿水一中盞煎取一小盞去滓納一銅器中別取鯉魚膽烏雞膽各一枚取汁入煎藥汁中用槐枝如指大長一尺去皮作槌研之不住手自晝研到夜以綿濾過於瓷盒中盛每以銅箸少許點眼眥中切避風也
