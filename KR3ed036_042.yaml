者飽食訖應小便而忍之或飽食訖而走馬或小便急因疾走或忍尿入房亦皆令胞轉或胞落並致於死矣方石葦湯一名鬼箭散治胞轉小便不通石葦去毛一兩榆白皮銼一升鬼箭羽二三兩滑石碎四兩葵子木通銼一方作通草甘草炙銼各三兩上粗搗每服五錢水一盞半煎至一盞去滓溫服一方無甘草有瞿麥滑石湯治胞轉小便不通滑石碎一兩亂髮燒灰鯉魚齒雀糞各一兩分琥珀半兩芒硝一分上粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服滑石散治胞為熱所迫或忍小便俱令水氣迫歸胞屈僻不得充脹外水應入不得入內溲應出不得出小腹急痛不得小便小腹脹不治害人寒水石二兩白滑石一兩葵子一合亂髮灰車前子木通去皮節各一兩上銼散水一斗煮取五升時時服一升即利琥珀湯治胞轉小便不利煩悶琥珀大黃銼炒滑石碎一兩車前子車前葉各一兩上粗搗篩每服二錢匕水一盞蔥白半兩拍碎煎至七分去滓溫服不拘時服通草湯治胞轉不得小便雀糞半合車前子滑石各四兩通草一作木通芍藥各二兩上切羅勻以水七升煮取三升服五合日三食前得立愈琥珀湯治胞轉臍下急滿或因霍亂而得琥珀研一兩阿膠炙燥半兩別搗蔥白切二七莖車前草銼三兩一方用子上先用水五盞煎蔥並車前草至三盞許濾去滓次下膠末候消次又下琥珀末微煎過分作三服不拘時候溫服治胞轉不得小便川大黃一兩銼碎微炒琥珀細研一兩車前葉二兩上為末每服四錢以水一中盞入蔥白三莖煎至六分去滓不拘時候溫服又方亂髮燒灰三兩滑石二兩川芒硝一兩上細研令勻用桃白皮一斤搗以水絞取汁二升不拘時候以汁一小盞調下二錢芍藥湯治胞轉小便不利赤芍藥車前葉木通各一兩上細銼每服五錢匕水一盞半煎至一盞去滓溫服滑石湯治胞轉小便不通八九日丈夫婦人皆治滑石碎一兩半寒水石碎一兩一方用石膏冬葵子半兩上粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服蔥白湯治小便卒暴不通小腹脹急氣上衝心悶絶欲死此由暴氣乘膀胱或從驚憂氣無所伸鬱閉而不通流氣衝胞系不正陳皮三兩葵子一兩蔥白二莖上銼散水五升煮取二升分三服洗方治胞轉小便不通先用良薑蔥頭紫蘇葉各一握上煎湯密室內熏洗小腹外腎肛門留湯再添蘸綿洗以手撫於臍下拭乾綿被中仰坐腳自舒其氣次用蜀葵子二錢半赤茯苓赤芍藥白芍藥各半兩上銼散每服三錢煎取清汁乘熱調蘇合香丸三丸並研細青鹽半錢食前溫服蒲黃散治胞轉不得小便經三四日困篤欲死蒲黃滑石各一兩上搗羅為散每服二錢匕雞子清調下一方用溫酒調服一方用水治胞轉欲死及不溺方上取豆醬清和灶突中墨如豆大納陰孔中立愈治胞轉不得小便方吸芥真琥珀一兩蔥白十四莖上以水四升煮取三升去蔥白取琥珀末細篩下湯中溫服一升日三服大利亂髮散治忍小便不時起便胞轉小便不得四五日困篤欲死無脈服此瘥滑石二兩亂髮三兩燒灰上二味搗篩取生桃白皮一斤熟煮以水合絞得汁二升以汁服散半盞日三服即愈其但淋者取亂髮三兩燒灰滑石五兩合搗為散服方寸匕日三一方有鯉魚齒一兩無桃白皮治胞轉不得小便雞子一枚敲破取黃以溫水調服之不過三服秦艽湯治胞轉不得小便秦艽不拘多少去苗土上粗搗篩每服五錢水一盞半煎至一盞去滓溫服車前草飲治胞轉急卒不得小便車前草一握去根洗淨銼上以水三盞煎至二盞去滓分三服連並服不拘時一方用子一斤水一斗煮取四升分四服治飽食後或忍小便或走馬忍小便或大走及入房皆致胞轉臍下急滿不通用亂頭髮急纏絞如拳大燒為末醋四合攪令和二方寸匕服之訖即炒熟黑豆葉蹲坐其上治胞轉小便不得用阿膠三兩水二升煮七合頓服又方用豉五合以水三升煮數沸頓服之又方用連枷簡燒灰水服之又方用筆頭燒灰水服之又方燒死蜣螂二枚末水服之又方納白魚子莖孔中又方用酒和豬脂雞子大頓服之又方用麻子煮取汁頓服之治胞轉小便不能通用炒鹽半斤囊盛尉小腹治忍小便胞轉用自己爪甲燒灰水服之治小便久致胞轉取梁上塵三指撮以水服之治小便久致胞轉以蒲黃裹腰腎令頭至地三度通一方取蒲黃服三四錢早午晚日三服良治卒小便不通及胞轉方炙桑螵蛸搗為末米飲服之半盞許早午晚日三服良治胞轉不得小便方用蒲席捲人倒立令頭至地三反則通胞囊治法凡尿不在胞中為胞屈僻津液不通以蔥葉除尖頭納陰莖孔中深三寸微用口吹之吸取津液大通即愈
