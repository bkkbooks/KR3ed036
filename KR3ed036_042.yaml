body:
  text: 卷四十二膀胱腑門總論夫膀胱者主腎也耳中是其候也腎合氣於膀胱膀胱者津液之腑也號水曹椽名玉海重九兩二銖左回疊積上下縱廣九寸受津液九升九合兩邊等應二十四氣鼻空在外膀胱漏泄黃帝曰夫五臟各一名各一形腎乃獨兩何也岐伯曰膀胱為腑有二處腎亦二形應腑有二處臟名一腑名二故五臟六腑也一說腎有左右而膀胱無二今用當以左腎合膀胱右腎合三焦左手關後尺中陽絶者無膀胱脈也病苦逆冷婦人月事不調望月則閉男子失精尿有餘瀝刺足少陰經治陰在足內踝下動脈是也右手關後尺中陽絶者無子戶脈也病苦足逆寒絶産帶下無子陰中寒刺足少陰經治陰左手關後尺中陽實者膀胱實也病苦逆冷脅下邪氣相引痛刺足太陽經治陽在足小趾外側本節後陷中右手關後尺中陽實者膀胱實也病苦小腹滿引腰痛刺足太陽經治陽病先發於膀胱者背膂筋痛小便閉五日之腎小腹腰脊痛脛酸一日之小腸脹一日之脾閉塞不通身痛體重二日不已死冬雞鳴夏下晡一云日夕膀胱病者少腹偏腫而痛以手按之則欲小便而不得肩上熱若脈陷及足小指外側及脛踝後皆熱若脈陷取委中膀胱脹者小腹滿而氣癃若腎前受病傳於膀胱腎咳不已咳則遺溺厥氣客於膀胱則夢遊行腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄腠理疏者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也扁鵲云六腑有病徹面形腎足少陰與膀胱足太陽為表裡膀胱總通於五臟所以五臟有疾即應膀胱膀胱有疾即應胞囊傷熱則小便不通膀胱急尿苦黃赤傷寒則小便數清白或發石水根在膀胱四肢小其腹獨大也骨絶不治齒黃落十日死膀胱實熱附論夫左手尺中神門以後脈陽實者足太陽經也病苦逆滿腰中痛不可俯仰面腫目黃口舌燥咽腫痛體重四肢氣滿小腹偏痛胞轉不得小便頭眩痛煩滿脊背強體熱名曰膀胱實熱也內經曰膀胱不利為癃者以此方赤茯苓散出聖惠方治膀胱實熱腹脹小便不通口舌乾燥咽腫不利赤茯苓瞿麥各一兩射干半兩子芩桑螵蛸微炒漢防己羚羊角屑川升麻川大黃銼微炒大青木通銼各三分上為散每服三錢水一盞煎至六分去滓不拘時候溫服葵子湯出永類鈐方治膀胱實熱腹脹小便不通口舌乾燥咽腫不利赤茯苓去皮木豬苓去皮冬葵子枳實麩炒瞿麥木通去節黃芩車前子炒滑石甘草炙各等分上㕮咀每服四錢水一盞姜五片煎至八分去滓溫服不拘時候榆皮散出聖惠方治膀胱實熱小便赤澀榆白皮銼車前子葵根木通銼瞿麥白茅根銼黃芩各三分桑螵蛸微炒赤茯苓各一兩上為散每服三錢水一盞生薑一片同煎至六分去滓食前溫服大黃散出聖惠方治膀胱實熱腹脅脹滿小便不利川大黃銼微炒冬葵子瞿麥各一兩黃芩赤茯苓去皮紫蘇莖葉檳榔木通銼白茅根銼各三分上為散每服三錢水一盞生薑一片煎至六分去滓食前溫服梔子散出聖惠方治膀胱實熱心腹煩悶小便不利梔子仁一兩石膏二兩白茅根一兩銼赤茯苓一兩犀角屑一兩木通一兩銼黃芩一兩甘草半兩炙微赤銼上為散每服五錢水一大盞入淡竹葉二十片生薑生地黃半兩煎至七五分去滓食前溫服忌炙爆熱面豬苓散治膀胱實熱小便不通腰腹重痛燥煩木豬苓去黑皮防己銼梔子仁各一兩滑石碎車前子檳榔生銼大黃生銼各二兩上為散每服二錢溫熟水調下或水一盞煎至七分溫服亦得梔子仁湯一名瀉脬湯出千金方治膀胱實熱小便不通煩悶不解腰脊痛舌乾咽腫梔子仁二兩一作瓜子仁石膏四兩赤茯苓去黑皮知母炒各二兩生地黃淡竹葉各切半升芒硝一兩上粗搗如麻豆大每服四錢以水二盞煎至一盞去滓溫服一方入蜜煎服漢防己散出聖惠方治膀胱實熱小便不通漢防己一兩海蛤半兩滑石一兩葵子半兩豬苓半兩去黑皮瞿麥半兩上為散每服食前濃煎木通湯調下二錢瞿麥飲治膀胱實熱小便不通壅閉煩躁瞿麥穗黃芩去黑心甘草生銼木通銼各一兩葵根洗銼車前子各半兩上為散每服四錢取水一盞半煎至一盞去滓溫服檳榔飲治胞囊實熱溲便癃閉日夜不通檳榔生銼羚羊角鎊大黃銼各半兩甘草炙銼赤茯苓去黑皮防己銼各二兩上為散每服五錢用水一盞半煎至一盞去滓溫服升麻散出千金方治膀胱實熱小便不通舌乾咽腫升麻大青各三兩射干玄參黃柏去粗皮薔薇根白皮各四兩上粗搗如麻豆大每服五錢以水一盞半煎至一盞臨熟入蜜一匙打勻去滓服一方下蜜更煎兩沸細細含咽名升麻煎石膏湯治膀胱實熱小便癃閉舌燥引飲煩悶石膏生生梔子去皮赤茯苓去黑皮甘草炙銼木通銼各一兩上為散每服三錢取水一盞煎至六七分去滓溫服車前子散治膀胱利小便解煩熱車前子海金沙井泉石滑石碎各一兩葶藶紙上炒一分上為散每服二錢用蜜熟水調下未利再服一方治小便不通用新汲水食前調下滑石湯出千金方治膀胱急熱小便黃赤滑石八兩子芩三兩車前子冬葵子一升榆白皮四兩上㕮咀以水煮取三升分三服抵聖丸治膀胱熱多因天色發熱外腎腫脹赤痛大便燥澀而飲水按之臍腹痛者續隨子薏苡仁郁李仁茵芋白牽牛各等分上各等分為末滴水和丸如梧桐子大每服五丸以靈祕散下黃昏時服五更利下惡穢之物一方用香姜散咽靈祕散宣連二兩去須細銼小塊生薑四兩銼如緑豆大上拌勻密器收貯經宿於銀石器內慢火同炒至黃焦黑去姜不用揀取黃連為末每服二錢空心淡清茶調吞下抵聖丸兼金丸出二因方治熱入膀胱臍腹上下兼脅肋痛疼便燥欲飲水按之痛者大黃八錢濕紙裹煨硝石桂心甘草各四兩炙桃仁四十枚去皮尖細研上為末煉蜜丸如梧桐子大每服五七十丸空心米飲送下婦人血閉疼痛亦宜服之坎離丸滋腎水益元氣補下元不足去膀胱積熱知母一兩黃柏黃連各等分上為末水丸如梧桐子大食前服溫水送下五十丸芒硝散治膀胱熱結不通芒硝另研半兩赤茯苓去黑皮為末一兩上為末研和勻每服二錢以蜜熟水一盞調下心煩熱燥者冷蜜水下治膀胱實熱腹脹小便赤澀水氣流腫出聖惠方取浮萍草曬乾細羅為散每服食前蔥白湯調下一錢一方治胞轉不得小便冷水調下二錢治膀胱積熱小便赤澀不快麥門冬去心山梔子子芩茯苓升麻麻黃去根各一兩分通草四銖上細杵羅為末每服二錢水一盞煎至八分食後徐徐熱服治膀胱虛熱下砂石澀痛利水道出本草以故甑蔽燒灰研食前溫酒調下一錢許膀胱虛冷附論左手尺中神門以後脈陽虛者足太陽經也病苦腳中筋急腹中痛引疼腰背不可屈伸轉筋惡風偏枯腰痛外踝後痛肌肉振動耳聾忽忽不聞惡風颼颼作聲小便利多項背尻痛小便不禁尿多白色面黑脛酸兩脅脹滿名曰膀胱虛冷也內經曰膀胱不約為遺溺方龍骨丸出千金方治膀胱腎冷坐起欲倒目䀮䀮氣不足骨痿龍骨柏子仁乾地黃甘草防風各五分禹餘糧白石英桂心黃耆茯苓各七分五味子羌活人參附子各六分兩山茱萸玄參芎藭各四分磁石杜仲乾薑各八分上為末蜜丸如梧桐子大空心酒服三十丸日二加至四十丸石斛散出聖惠方治膀胱虛冷兩脅脹滿腳脛多疼腰脊強痛小便滑數石斛一兩去根銼附子一兩炮裂去皮臍五味子三分澤瀉三分當歸三分微炒牛膝三分去苗白茯苓三分沉香三分人參去蘆頭三分桂心三分磁石三二兩搗碎水淘去赤汁黃耆半兩銼蘹香子三分肉蓯蓉一兩酒浸去皴皮微炒枳實三分麩炒微黃上為散每服三錢水一盞生薑二片煎至五分去滓食前溫服蓽澄茄丸出聖惠方治膀胱虛冷氣腹脅脹滿腰腳冷痛面色多黑體重無力蓽澄茄一兩安息香木香各一兩肉桂一兩半去粗皮附子一兩炮裂去皮臍當歸半兩銼微炒補骨脂蘹香子各一兩沉香檳榔肉豆蔻去殼青橘皮湯浸去白皮瓤微炒吳茱萸湯浸七遍焙乾微炒桃仁各半兩浸去皮尖雙仁麩炒微黃上為細末酒煮麵糊和搗三二百杵為丸如梧桐子大每服食前以溫酒下二十丸腎瀝湯出聖惠方治膀胱及腎臟虛冷小便色白稠濁日夜無度恆腰脅疼痛肉蓯蓉一兩酒浸一宿刮去皴皮炙乾漢椒去目及閉口者微炒出汗五味子各半兩附子一兩炮裂去皮臍乾薑半兩炮裂銼人參去蘆頭黃耆銼澤瀉芎藭牛膝去苗各三分當歸半兩銼微炒石斛三分去根銼磁石二兩搗碎水淘去赤汁以帛包桂心半兩上為散每服五錢水一大盞用羊腎一對切去脂膜每用磁石包子及入棗三枚煎至五分去滓食前溫服杜仲散出聖惠方治膀胱虛冷氣攻注腰胯疼痛杜仲一兩去粗皮炙微黃銼附子一兩炮裂去皮臍石斛三分去根銼檳榔當歸銼微炒牛膝去苗桂心丹參去蘆頭木香白茯苓青橘皮湯浸去白瓤焙蘹香子各三分上為散每服三錢水一盞生薑三分煎至六分去滓食前溫服鹿茸丸出聖惠方治膀胱虛冷面色萎黑小便不禁腰胯痠痛兩脅脹滿不能飲食肌膚消瘦鹿茸去毛塗酥炙微黃肉蓯蓉酒浸去皴皮微炙附子各一兩炮裂去皮臍桑螵蛸半兩微炙石斛一兩去根銼蘹香子鍾乳粉研入白龍骨沉香各一兩菟絲子一兩半酒浸三宿別搗如泥焙乾磁石一兩半燒醋淬七遍搗碎細研水飛過木香一兩上為細末研藥令勻以酒煮麵糊和丸如梧桐子大每服以溫水酒下二三十丸漸加至四十丸空心及晚食前服黃耆丸出聖惠方治膀胱及腎臟久虛積冷上焦煩熱小便滑數如米泔黃耆銼熟乾地黃土瓜根各一兩玄參三分栝蔞根白龍骨菝葜銼牡蠣各一兩燒為粉人參二三分去蘆頭桑螵蛸三分微炒五味子一兩沉香一兩上為細末煉蜜和搗三五百杵丸如梧桐子大每服食前以粥飲下三十丸韭子丸出醫方集成治膀胱腎冷小便白濁滑數日夜無度赤石脂煅韭子炒川牛膝酒浸去蘆土牡蠣煅覆盆子酒浸附子炮去皮臍桑螵蛸酒炒鹿茸酒蒸焙肉蓯蓉酒浸龍骨生各一兩雞膍胵燒灰沉香不見火鎊各半兩上為細末酒糊為丸如梧桐子大每服七十丸空心鹽湯鹽酒任下一方無牡蠣治膀胱冷咳唾則有血喉喘息出千金方羊腎一具人參玄參黃耆桂心芎藭甘草各三兩茯苓四兩地骨皮生薑各五兩白朮六兩上㕮咀以水一斗二升先煮羊腎減三升去腎下藥煮取三升去滓分為三服韭子散出聖惠方治膀胱虛冷小便白濁滑數日夜無度韭子一兩微炒赤石脂一兩土瓜根一兩狗脊一兩牛膝一兩去苗牡蠣二兩燒為粉黃耆一兩銼附子一兩炮裂去皮臍鹿茸一兩去毛塗酥炙令微黃肉蓯蓉一兩酒浸一宿刮去皴皮炙令乾上件藥搗細羅為散每服食前以溫酒調下二錢桑螵蛸散出聖惠方治膀胱虛冷小便滑數色如泔澱桑螵蛸一兩微炒赤石脂二兩補骨脂二兩微炒狗脊三分萆薢一兩銼白龍骨二兩韭子三分微炒鹿茸二兩去毛塗酥炙令微黃肉蓯蓉四兩酒浸一宿刮去皴皮炙乾菟絲子三二兩酒浸三日曝乾別杵為末上件藥搗細羅為散每服食前以溫酒調下二錢乾地黃散出千金方治膀胱虛冷小便數漏精稠厚如米白泔熟乾地黃焙三分赤雄雞腸兩具雞膍胵兩具桑螵蛸炒牡蠣煅龍骨煅黃連去須各一兩白石脂肉蓯蓉酒浸焙赤石脂各五分上搗篩八味同雞膍胵併入雞腸中密縫於甑內蒸令熟銼碎焙乾搗羅為末每服二錢以溫酒調下磁石散治膀胱虛冷飢不欲食面色萎黑腰脅疼痛磁石二兩搗碎水淘去赤汁黃耆一兩銼杜仲一兩去粗皮炙微黃銼五味子一兩白石英二兩細研入白茯苓一