body:
  text: 卷三十七大腸腑門總論夫大腸腑者主肺也鼻柱中央是其候也肺合氣於大腸大腸者為行道傳瀉之腑也號監倉椽重二斤十二兩長一丈二尺廣六寸當臍右回疊積還反十二曲貯水穀一斗二升主十二時定血脈和利精神千金明堂外臺同難經云長二丈一尺大四寸徑一寸之少半十六曲盛谷一斗水七升半鼻遂以長以候大腸右手關前寸口陽絶者無大腸脈也若少氣心下有水氣立秋節即咳刺手太陰治陰在魚際間右手關前寸口陽實者大腸實也苦腸中切痛如針刀所刺無休息時刺手陽明治陽在手腕中瀉之大腸病者腸中切痛而鳴濯濯冬日重感於寒則泄當臍而痛不能久立與胃同候取巨虛上廉腸中雷鳴氣上衝胸喘不能久立邪在大腸刺肓之原巨虛上廉三里大腸脹者腸鳴而痛寒則泄食不化大腸有寒鶩溏有熱便腸垢大腸有宿食寒栗發熱有時如瘧狀肺前受病移於大腸肺咳不已咳則遺失便利厥氣客於大腸則夢田野肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裹大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結扁鵲云手太陰與陽明為表裡大腸若病實則傷熱熱則脹滿不通口為生瘡食下入腸腸實而胃虛食下胃胃實而腸虛所以實而不滿乍實乍虛乍來乍去虛則傷寒寒則腸中雷鳴泄青白之利而發於氣水根在大腸大腸絶不治何以知之泄利無度利絶則死病者乍寒乍熱損肺傷氣暴嗽嘔逆或體熱發斑喘咳引氣名白氣貍以秋三月源從陽明系手太陰受疫淫邪之氣若腑虛為陰邪所傷則乍寒乍熱臟實為陽毒所傷則體熱發斑大腸實附論夫右手寸口氣口以前脈陽實者手陽明經也病苦腸滿善喘咳面赤身熱喉咽中核狀名曰大腸實熱也大腸者傳瀉行導之腑也其氣盛實燥熱生焉傳瀉不利腸中痛如錐刀所刺或生鼠乳腫脹痛悶大便不通腹脅脹滿腰背重痛上氣喘滿皆大腸氣實之證也夫大腸實實則生熱熱則腸結脹滿善氣喘咳身面熱喉中噎乍實乍虛乍來乍去大腸有宿滯則發寒栗如瘧之狀祕澀不通則是大腸實熱之候也茯苓麻黃湯出聖濟總録治大腸實熱令人氣脹滿白茯苓去黑皮麻黃去根節各一兩半黃耆銼大青銼桂去粗皮各三分細辛去苗葉杏仁湯浸去皮尖雙仁炒各一兩一分石膏三兩碎丹參半兩五味子陳橘皮去白焙甘草炙銼貝母芎藭各一兩枳殼麩炒三枚上㕮咀帛裹三錢井華水一盞半煎八分去滓溫服羚羊角散出聖惠方治大腸實熱心神煩躁口內生瘡羚羊角屑三分甘竹茹川朴硝川大黃銼炒各一兩黃芩梔子仁紫蘇莖葉杏仁湯浸去皮尖雙仁麩炒玄參木通赤茯苓各三分甘草半兩炙銼上㕮咀每服三錢水一中盞煎六分去滓入生地黃汁一合更煎一兩沸不計時溫服生薑泄腸湯出千金方治大腸實熱腹脹不通口內生瘡生薑橘皮青竹茹黃芩梔子仁白朮各三分桂心一兩茯苓芒硝各三兩生地黃十兩大棗十四枚上㕮咀水七升煮取三升去滓下芒硝分二服一方無桂心名瀉白湯檳榔丸出聖惠方治大腸實熱氣壅不通心腹脹滿大便祕實檳榔大黃蒸麻子仁炒去殼別研枳殼麩炒羌活去蘆牽牛炒杏仁去皮尖炒白芷黃芩各一兩人參半兩上㕮咀為末煉蜜丸梧桐子大每服四十丸空心用熟水送下以大腑流利為度杏仁湯出聖惠方治大腸實熱大便不通上氣喘咳心神煩悶杏仁湯浸去皮尖雙仁炒甘草炒銼各一兩赤芍藥黃芩去黑心麥門冬去心焙細辛去苗葉五味子各三分石膏碎二兩大黃銼炒一兩半上㕮咀每服三錢水一盞煎六分去滓食前溫服大黃丸出楊子建護命方治大腸祕熱心胸煩躁頭痛便難腹脅脹滿口舌乾燥大黃炮銼半兩桔梗炒枳殼麩炒去瓤芎藭羌活去蘆木香柴胡去苗獨活去蘆頭各一分牽牛子一兩半炒熟半生用上為末熟煮萊蔔入藥末同於木臼內搗令丸得為度丸梧桐子大每服三十丸食後臨臥熟湯下加至四十丸赤茯苓散出聖惠方治大腸實熱頭痛目眩驚狂喉痹腹脹滿悶手足煩疼赤茯苓麥門冬去心檳榔各一兩川大黃一兩半犀角屑枳實麩炒各三分杏仁湯浸去皮尖雙仁炒丹參各半兩石膏二兩上㕮咀每服三錢水一盞煎六分去滓食前溫服忌熱面炙爆柴胡散出聖惠方治大腸實熱氣壅不通心腹脹滿發歇寒熱柴胡去苗赤芍藥檳榔各一兩枳實麩炒杏仁湯浸去皮尖雙仁麩炒黃芩漢防己各三分川大黃三兩銼炙甘草半兩炙銼上㕮咀每服三錢水一中盞煎六分去滓食前溫服大青湯出聖濟總録治大腸熱滿腸中切痛或生鼠乳大便不通大青銼三分麻黃去根節石膏碎芒硝碎黃柏去粗皮生乾地黃焙各一兩半枳殼麩炒去瓤赤茯苓去黑皮各一兩上㕮咀每服三錢水一盞半入苦竹葉十片煎八分去滓溫服日三服橘皮湯出聖濟總録治大腸熱咳脅滿掌中熱陳橘皮去白炒芒硝紫蘇葉各一兩半白朮一兩甘草炙銼桂去粗皮各半兩石膏瑩淨者三兩碎杏仁炒一分去皮尖雙仁上㕮咀每服三錢水一盞半淡竹葉十片蔥白四寸劈破煎八分去滓溫服日三治白氣貍肺腑臟溫病陰陽毒臟實為陽毒所傷體熱肌膚髮斑氣喘引飲色昏白者紫菀茸一兩梔子仁升麻前胡各三分石膏炒半兩葶藶炒一分杏仁去皮尖炒甘草炙各半兩上㕮咀每服五錢水二盞煎七分去滓食前服大腹皮湯出聖惠方治大腸實熱腸脹不通熱氣上衝口內生瘡大腹皮三兩銼柴胡去苗訶黎勒皮枳殼麩炒去瓤各一兩川大黃銼炒川朴硝各二兩羚羊角屑三分甘草半兩炙透上㕮咀每服三錢水一中盞煎至六分去滓食前溫服大腹湯出聖濟總録治大腸實熱腹脹不通熱氣上衝口內生瘡大腹皮大黃生銼各三兩木香一兩訶黎勒皮三分枳殼去瓤麩炒一兩半芎藭三分上㕮咀每服三錢更入朴硝一錢水一盞半煎至八分去滓溫服神功丸出余居士選奇方治氣壅大腸風熱大便不通方見加味宰功丸治腸痛如打用大豆半升炒令焦酒一升煮令沸熟取醉瀉白湯出鮑氏方治大腸實熱腹脹不通挾臍痛喘不能久立口內生瘡陳皮淡竹葉黃芩梔子仁黃柏皮一兩半茯苓芒硝一兩生地黃五兩上為散每服四錢棗煎空心服大腸虛附論夫右手寸口氣口以前脈陽虛者手陽明經也病苦胸中喘腸鳴虛渴唇乾目急善驚泄白名曰大腸虛冷也其候胸中喘腸鳴虛渴唇乾皮膚乾燥目急善驚滑泄骨節疼痛不能久立蓋大腸者傳導之官變化出焉寒邪客於其間則令氣虛弱不能自固而成諸疾診其脈右手氣口以前陽虛者是也款冬花丸出聖惠方治大腸虛冷欠呿咳氣短少腹中痛款冬花七分桂心五味子各六分乾薑芎藭甘草炙各五分附子炮四分桔梗四分蘇子五合蜀椒一升百部汁七合白蜜一升干棗五十枚擘去皮研為脂薑汁上為末將蘇蜜汁和微火上煎丸梧桐子大每服溫酒下三十丸加至四十丸日再忌海藻菘菜豬肉冷水生蔥草豆蔻散出聖惠方治大腸虛冷腸鳴腹痛下痢不思飲食草豆蔻去皮陳橘皮湯浸去白瓤焙各一兩高良薑銼三分桂心丁香木香白朮當歸銼炒白豆蔻去皮肉豆蔻去殼各半兩甘草一分炙銼上為末每服一錢食前以薑棗湯調下木香丸出聖惠方治大腸虛冷切痛腸鳴食不消化木香白朮桂心蕪荑炒高良薑銼各一兩訶黎勒煨用皮一兩半附子二兩炮裂去皮臍厚朴二兩去粗皮薑汁炙肉豆蔻去殼乾薑三分炮甘草炙各半兩乾薑三分炮上為末用神麯末煮作糊丸梧桐子大食前薑棗湯送下十丸治白氣貍肺腑臟溫病陰陽毒大腸腑虛為陰邪所傷寒熱互作上氣咳逆大腸飧泄色皓皓白者白朮人參各一兩乾薑炮麥糵炒各三分白茯苓五味子肉豆蔻草果烏梅甘草炙各半兩上㕮咀每服五錢水盞半煎七分去滓食前服吳茱萸散出聖惠方治大腸虛冷腸鳴腹痛食不消化吳茱萸湯浸七次焙乾炒肉豆蔻去殼乾薑炮銼甘草炙各半兩銼陳橘皮二兩湯浸去白焙高良薑銼縮砂去皮神麯搗碎炒白朮各一兩厚朴二兩去粗皮薑汁炙上為末每服一錢食前粥飲調下訶黎勒散出聖惠方治大腸虛冷腸鳴泄痢腹脅氣痛飲食不化訶黎勒一兩半煨用皮附子炮去皮臍陳橘皮湯浸去白各一兩焙當歸銼炒肉豆蔻去殼各三分桔梗去蘆木香各半兩吳茱萸湯浸七次焙炒甘草炙銼各一分上㕮咀每服三錢水一中盞入生薑半分棗三枚煎六分去滓食前稍熱服防風丸出聖濟總録治大腸氣虛又因傷風冒雨大腸中下血防風去叉芎藭各一分黃耆銼白朮各半兩五味子續斷陳橘皮湯浸去白瓤各一分石硫黃研一兩上為末煉蜜丸梧桐子大空心鹽米湯下三十丸訶黎勒丸出醫方集成治大腸虛冷腸鳴泄瀉腹脅氣痛飲食不化訶黎勒麵裹煨附子炮去皮臍肉豆蔻麵裹煨木香不見火吳茱萸去梗炒龍骨生用白茯苓去皮蓽茇各半兩上為末薑汁煮糊為丸梧桐子大每服七十丸空心米飲下黃連補湯出千金方治大腸虛冷痢下青白腸中雷鳴相逐黃連四兩茯苓芎藭各三兩酸石榴皮五片地榆五兩伏龍肝雞子大一枚上㕮咀水七升煮取二升半去滓下伏龍肝末分三服附子湯出聖惠方治大腸虛冷腰痛羸瘦附子炮去皮臍一兩半人參乾薑炮赤芍藥桂去粗皮甘草炙各一兩上㕮咀每服三錢水一盞棗三枚煎六分去滓食前溫服茱萸丸出聖濟總録治大腸虛冷飲食減少非時飧泄吳茱萸湯洗焙乾炒訶黎勒皮丁香草豆蔻去皮芎藭防風去叉各一分石硫黃研一兩上為末煉蜜丸梧桐子大空心陳米飲下三十丸黃連湯出聖濟總録治大腸虛冷痢下白膿腸內虛鳴相逐黃連去須酸石榴皮焙赤石脂各三兩白茯苓去黑皮乾薑炮各三兩半桔梗炒二兩上㕮咀每服五錢水一盞半煎八分去滓溫服日三服柴胡丸出聖濟總録治大腸虛冷腹痛不能久立或腰中虛鳴柴胡去苗土枳殼麩炒去瓤各一兩半白朮三分白茯苓去黑皮一兩丹參去根炙黃耆銼各二兩上為末煉蜜丸梧桐子大空腹粥飲下三十丸日三服朴附丸出聖濟總録治大腸虛冷便利滑泄不思飲食腸鳴腹痛厚朴去粗皮生薑汁炙一兩附子炮去皮臍半兩甘草炙一兩乾薑炮一兩上為末酒煮麵糊丸梧桐子大每服五十丸食前溫米飲下大建中湯出聖濟總録治大腸虛乾薑炮一兩半芍藥甘草炙銼桂去粗皮各一兩上㕮咀每服二錢棗三枚去核餳一塊水一盞煎七分去滓空腹溫服日三服乳豆丸出濟生方治大腸虛寒滑泄不止鍾乳粉一兩肉豆蔻半兩面裹煨香去面不用上為末煮棗肉杵為丸梧桐子大每服七十丸空心食前米飲送下治大腸虛冷用鰻鱺魚煮酒服蓋其魚能補虛固腸湯出鮑氏方治大腸虛寒利下青白腸中雷鳴大便不節小便赤上氣充胸不能久立身重腹急當臍痛酸石榴皮半兩黃連炒地榆皮一兩粟殼醋炙茯苓一兩半上為散每服四錢薑五片烏梅一個煎空心服腸風下血附論夫腸風臟毒下血者皆由飽食過度房室勞損坐臥當風恣餐生冷或啖炙爆或飲酒過度營衛氣虛風邪冷氣進襲臟腑因熱乘之使血性流散積熱壅遏血滲腸間故大便下血血清而色鮮者腸風也濁而色黯者臟毒也肛門射如血線者蟲蛀也又有陽氣不升血隨氣降而下血者下虛也下血之脈脈多洪大而芤蓋弦者勞也芤者下血也治療之法風則散之熱則清之寒則溫之虛則補之治法合宜無不效者也大便下血或清或濁或鮮或黑或在便前或在便後或與泄物並下此由內外有所傷感凝停在腸胃隨氣不通亦妄行之類故曰便血方書以鮮血為腸風瘀血為熱毒濺注為腸痔受病之初或因大腸有熱毒血潮於下或因下虛而腸臟無脂膜血得以滲入及其久則成痼疾矣亦時有所感觸而發之如遇熱發則為瘀血遇寒發則為清鮮遇濕發則為豆汁血色亦因而轉不可拘以一説人之滋養一身惟氣與血血為營氣為衛營行行脈中衛行行脈外故心主血肝藏之而脾為之統貴於氣順則血調若內因七情並酒食所傷外為四氣相干則血氣逆亂營衛失度皆能令人下血若風入腸胃者其脈浮下血必在糞前是名近血停積於大腸者其脈沉滯血在糞後又名遠血臟寒者其脈沉微下血無痛積熱者其脈洪數純下鮮血甚則鮮血多而不止兼痛傷濕者脈沉而遲下血如豆汁令人面無顏色時寒時熱脈浮弱按之絶者下血也治法大要先當解散腸胃風邪熱者與敗毒散冷者與不換金正氣散風邪既去然後隨其冷熱而對治之或曰血遇熱則行止血多用涼藥如地榆散柏皮湯黃連阿膠丸酒蒸黃連丸輩施之熱證固當然爾其或陽虛陰走正氣不得歸元則用理中湯附子理中湯震靈丹黑錫丹輩治之如之何而廢之要之芎藭湯一劑又調血之上品熱者加茯苓槐花冷者加茯苓木香此則自根自本之論也雖然精氣血氣生於穀氣旺惟大腸下血大抵以胃藥收功真料四君子湯參苓白朮散及枳殼散小烏沉湯和之胃氣一回血自循於經絡矣然腸風之血自腸中來蟲痔之血肛門邊傍別有小竅射如血線是也肛門既脫腐血浸淫於其間則俱化為蟲蠹蝕腸口滴血淋漓自此又不能約而收之矣當以蕪荑艾葉苦楝根輩為之化蟲血屬於心雖曰川芎當歸主血當以茯苓茯神佐之前輩止血亦不用甘草但增棗入藥用之儒門事親書云棠溪欒彥剛病下血醫者以藥下之默默而死其子企見戴人過而問之曰吾父之死竟無人知是何證戴人曰病挫其心也心主行血故被挫則血不禁若血溫身熱者死火數七死必七日治不當下抑下之不滿數企曰四日死何謂病挫心戴人曰智不足而強謀內不足而強舉心安得不挫也欒初與鄰爭屋不勝遂得此病企由是拜服而學醫又論曰凡人有臟毒下血何謂也生氣通天論曰邪熱傷肝因而大飽筋脈橫解腸癖為痔故膿血者血隨熱行參差入於腸胃之間乃成瀉血也若身體壯熱則為難治身涼者可治也可先調中清血蕩除積血瀉之三二行瀉後服芍藥柏皮丸黃連解毒湯五苓散益元散各以新汲水調下五七錢甚者取地黃汁半盞服之則愈矣又積年腸風下血不止者由人氣血衰弱臟腑虛憊或飲食勞損或毒氣風邪蘊蓄在臟腑流注於大腸既虛下血致面色萎黃四肢消瘦或纍月連年諸醫不瘥故曰積年腸風下血也內經謂結陰者便血一升再結二升三結三升邪在五臟則陰脈不和陰脈不和則血留之結陰之病以陰氣內結不得外行血無所稟滲入腸間故便血也方黃耆湯治腸風下血黃耆三兩槐實小薊桑耳乾地黃焙當歸炙銼黃連去須白芷各一兩半草豆蔻二枚去皮芎藭赤石脂天雄炮去皮臍龍骨各二兩黃芩去黑心半兩紅藍花訶黎勒皮延胡索厚朴去粗皮薑汁炙桂去粗皮各一兩上㕮咀每服五錢水盞半薑一錢煎八分去滓食前溫服日二服乾地黃湯治大便下血並多年腸風飲食不得熟乾地黃焙赤石脂各二兩延胡索牡蒙桔梗黃耆銼龍骨各一兩半當歸切焙黃連去須白芷地榆木香紅藍花炒各一兩桂去粗皮三分乾薑炮黃芩去黑心各半兩上㕮咀每服五錢水一盞半煎八分去滓溫服無時五香聖散出聖惠方治腸風氣滯流注下部致生腫結牽引腑臟不和時發疼痛經久下血太多虛乏羸瘦沉香黃耆銼枳殼麩炒去瓤熟乾地黃各一兩麝香研半兩乳香一分木香藿香銼炒檳榔當歸銼炒白茯苓白蒺藜炒去刺川大黃銼炒白芍藥卷柏炒芎藭各三兩上為末每服二錢食前粥飲調下內補散出聖惠方治腸風痔疾失血過多虛乏羸困不欲飲食續斷熟乾地黃各二兩人參去蘆附子炮去皮臍當歸銼炒芎藭黃耆銼白芍藥桂心麥門冬去心白茯苓乾薑炮銼五味子各一兩白芷甘草炙銼各三分上㕮咀每服四錢水一盞棗三枚煎六分去滓溫服日三四服白花蛇丸出聖惠方治腸風下血日夜不絶疼痛至甚白花蛇二兩酒浸去皮骨炙黃杏仁半兩湯浸去皮尖雙仁炒黃耆銼胡荽子炒蝟皮炙焦人參去蘆鯉魚皮燒灰附子炮去皮臍當歸銼炒皂莢樹耳炙各一兩枳殼麩炒去瓤男兒發燒灰肉桂去皺皮各二兩上為末煉蜜杵丸梧桐子大每服三十丸食前人參湯下升陽去熱和血湯醫方大成治腸澼下血作勞其血即出有力而遠射四散如篩春節二月中下二行腹中大作痛乃陽明氣衝熱毒所作也當去濕毒和血而愈是其治也又名除濕熱和血湯生地黃牡丹皮生甘草各半錢熟甘草黃耆各一錢當歸身熟乾地黃蒼朮秦艽肉桂各三分橘皮二分升麻七分白芍藥一錢半上㕮咀作一服水四盞煎一盞去滓稍熱服空心宿食消盡服之白朮散出聖惠方治腸風痔疾失血虛損羸瘦飲食無味面色萎黃四肢乏力白朮石斛去根銼續斷天門冬去心各三分黃耆熟乾地黃人參去蘆肉蓯蓉酒浸一宿去皺皮炙牛膝白茯苓各一兩桂心甘草去蘆炙銼各半兩上㕮咀每服四錢水一中盞生薑半分棗三枚煎至六分去滓不計時溫服內補黃耆丸出聖惠方治腸風痔病下血太多虛羸無力黃耆銼槐子仁炒枳殼麩炒去瓤各三兩白蒺藜炒去刺烏蛇肉酒浸炙鹿茸去毛塗酥炙附子炮去皮臍蝟皮炙當歸銼炙沉香檳榔厚朴去粗皮薑汁炙各一兩上為末煉蜜杵丸梧桐子大每服三十丸食前桑枝湯下熟乾地黃丸出聖惠方治內腸風冷大便下血不止熟乾地黃龍骨燒赤黃耆銼紫蘇子炒蒲黃當歸附子炮去皮臍艾葉炒白礬燒令汁盡阿膠碎炒各一兩枳殼半兩麩炒去瓤上為末煉蜜杵丸梧桐子大每服三十丸空心及晚食前粥飲送下三十丸黃耆散出聖惠方治腸風