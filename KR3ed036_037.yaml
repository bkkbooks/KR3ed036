每服二十丸食前粥飲調下又方出聖惠方槐耳半斤切皂莢十梃剝去皮子硇砂一兩細研上用米醋三升煎取一升去滓後再入鐺中以文火養成膏入硇砂和勻丸如梧桐子大每服十丸空心及晚食前溫粥飲送下治積年腸風下血疼痛出聖惠方灶突墨二兩荊芥木香各一兩上為末水浸蒸餅為丸梧桐子大每服三十丸食前槐子湯下治積年腸風下血面色萎黃下部腫痛出聖惠方緑礬二兩燒赤釜底墨烏賊魚骨炙焦各一兩上為末粟米飯為丸如梧桐子大每服三十丸食前煎赤糙米湯送下又方出聖惠方皂莢去黑皮塗酥炙去子蕓薹子炒各一兩枳殼二兩麩炒去瓤上為末煉蜜丸梧桐子大每服二十丸食前枳殼湯下治大便下血不止出聖惠方生乾地黃二兩阿膠碎炒白蘞五兩上㕮咀每服三錢水一中盞入竹葉二七片煎至六分去滓食前溫服治腸風出本草五倍子白礬各半兩上為末順流水為丸梧桐子大每服七丸空心飯飲下忌酒治腸風瀉血出本事方牽牛五兩牙皂三兩不蚛者上水浸三日後除皂角將酒一升煮令乾焙為末煉蜜丸梧桐子大每服七丸空心溫酒下空心日午夜臥各一服或轉下黃物不妨病後可常服每服五丸飯飲送下治腸風及熱毒下血或因食熱物發動出本事方金星草陳乾薑各三兩上為末每服一錢新汲水調下空心當歸赤小豆散出千金方治先血而後便謂之近血及治大腸祕赤小豆五兩浸出芽曬乾一法熬令坼當歸一兩上為末漿水服方寸匕日三四服治臟毒下血名卷柏散出危氏方地柏生土石傍高四五寸根黃如絲莖細上有黃點正似柏枝曝乾用一作卷柏黃耆各等分上為末每服二錢用米飲調下治便血及臟毒下血經年瘦者出仁存方槐花五倍子各炒焦等分上為末糊為丸梧桐子大每服五六十丸食前米飲下荊芥散經驗良方治腸風下血荊芥穗縮砂仁各等分上為末每服三大錢用糯米飲調下不拘時日進三服一方食前服地榆湯百一選方治下血遠年不瘥地榆洗焙乾刮卷柏不去根洗淨各等分上㕮咀水一碗砂瓶內煮數十沸通口服不拘時每用一兩茱萸丸出直指方治腸風下血二三十年者鷹爪黃連吳茱萸各等分上新瓦上同炒候茱萸香熟黑色為度去茱萸不用將黃連為末空心溫酒下二三錢米飲下亦得又方黃連茱萸陳米糊丸梧桐子大每服五十丸米飲下日二服更以胃風湯煎如法吞下一方又名剪血丸用木香一兩用濕紙裹炮香為末同酒糊丸切忌鹽藏白酒雞肉鮓醬
