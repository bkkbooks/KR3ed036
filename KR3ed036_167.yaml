body:
  text: 卷一百六十七痰飲門痰逆不下食附論夫痰逆不下食者由胸膈壅滯津液不通痰水結聚不能消散流行於脾脾性惡濕得水則脹滿心胸不利多痰而逆故令不下食也方黃耆散出聖惠方治痰止逆和胃思食調利五臟黃耆一兩銼半夏半兩湯浸七次去滑人參三分去蘆頭桂心半兩陳橘皮三分湯浸去白瓤焙赤茯苓三分白朮三分甘草三分枳殼三分麩炒微黃去瓤芎藭半兩訶黎勒皮三分上為散每服四錢以水一中盞入生薑半分棗三枚煎至六分去滓不計時候熱服枇杷葉散出聖惠方治痰逆溫胃口思飲食青橘皮半兩湯浸去白瓤焙草豆蔻半兩去皮前胡一兩去蘆頭枇杷葉一兩微黃拭去毛炙半夏一兩湯洗七次去滑人參三分去蘆頭赤茯苓一兩大腹皮半兩銼白朮一兩厚朴一兩去粗皮塗生薑汁炙令香熟上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候熱服丁香散出聖惠方治痰積心胸氣噎嘔逆飲不下丁香一兩陳橘皮一兩湯浸去白瓤焙赤茯苓一兩半夏半兩湯洗七次去滑人參三分去蘆頭雞蘇三分麥門冬三分去心甘草一分炙微赤銼上為散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候溫服木瓜散出聖惠方治痰逆不思飲食化涎益脾胃乾木瓜一兩高良薑半兩銼陳橘皮半兩湯浸去白瓤焙桂心半兩訶黎勒皮半兩沉香半兩厚朴半兩去粗皮塗生薑汁炙令香熟甘草一分炙微赤銼半夏半兩湯浸七次去滑上為散每服三錢以水一中盞入生薑半分棗二枚煎六分不計時候熱服療心胸中痰積氣噎嘔逆食不下柴胡橘皮各六分茯苓十分人參麥門冬去心雞蘇各八分生薑檳榔各四分末湯成下上切以水八升煮二升五合絞去滓分三次溫服相去如人行七八里進一服未瘥三日更服一劑以利為度忌酢物生冷油膩黏食檳榔散出聖惠方治胸中痰壅嘔逆不納飲食四肢少力腹內小鳴檳榔三分半夏一兩湯洗七次去滑赤茯苓一兩白朮二兩青橘皮半兩去白瓤湯浸焙草豆蔻半兩去皮前胡一兩去蘆頭杏仁二分湯浸去皮尖雙仁麩炒微黃上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服治痰逆不能下食調和胸膈宜服此方出聖惠方前胡一兩去蘆頭半夏半兩湯洗七次去滑木香三分赤茯苓三分白朮一兩陳橘皮半兩湯洗去白瓤焙厚朴三分去粗皮塗生薑汁炙令香熟上為散每服四錢水一中盞入生薑半分煎七分去滓不計時候溫服治痰逆暖胃口思飲食宜服此方出聖惠方白礬一兩燒灰半夏半兩湯洗七次去滑乾薑半兩炮製銼上為末以生薑汁炙麵糊為丸如梧桐子大每服不計時候以薑棗湯下二十丸木香丸一名消痰丸出聖惠方治痰逆暖脾胃不思飲食方見消痰丸三聖散出儒門事親防風三兩去蘆藜蘆去苗心加減用之或一兩或半兩或八分瓜蒂三兩揀淨研碎以紙卷定連紙銼細去紙用粗羅子過另放末將滓炒微黃次入末一處同炒黃用上為粗末每服約半兩以齏汁三茶盞用二盞煎三五沸去齏汁入一盞煎至三沸卻將原二盞一處熬沸去滓澄清放溫徐徐下之不必盡劑以吐為度半夏棋子出十便良方治久病濕冷不下食嘔吐不止停飲在胃中上以半夏五兩洗搗羅為末取二錢以白麵一兩水和搜切棋子水煮麵熟為度生薑醋調和食之稀涎散出儒門事親豬牙皂角不蟲蛀者去皮弦稱一兩炙黃用緑礬二兩晉礬藜蘆各半兩上為末每服半錢或一二錢斡開牙關漿調下灌之治痰壅嘔吐逆心胸滿悶不下飲食出本草用厚朴一兩塗生薑汁炙令黃為末非時粥飲調下二錢匕療胸中多痰頭痛不飲食出本草用礬石一兩以水二升煮取一升納蜜半合頓服須臾時出涎痰如未吐當飲少熱湯即吐一方治痰涎用白礬痰飲食不消附論病源夫痰水者結聚在於胸腑膀胱之間久有不散流行於脾脾惡濕得水則脹脹則不能消食也或令腹裡虛滿或水穀不消化或嘔逆皆其候也方御愛紫宸湯出德生堂解宿酒嘔噦噁心不進飲食良薑丁香甘草陳皮各二兩藿香官桂茯苓檀香各一兩木香半兩砂仁葛花各一兩乾葛一兩上㕮咀每服四錢水一盞半煎至八分去滓不拘時候服高良薑散出聖惠方治痰飲破冷氣化宿食高良薑三分銼肉桂一兩去粗皮厚朴一兩去粗皮塗生薑汁炙白朮一兩陳橘皮三分湯浸去白瓤焙木香三分赤茯苓一兩訶黎勒皮一兩大腹皮三分人參一兩去蘆頭草豆蔻半兩去皮甘草半兩炙微赤銼上為散每服五錢水一盞入生薑半分煎至五分去滓不拘時候溫服白朮散出聖惠方治氣膈痰飲兩肋下痛食不消化白朮一兩柴胡一兩去苗赤芍藥三分檳榔一兩陳橘皮三分湯浸去白瓤焙厚朴一兩去粗皮塗生薑汁炙令香熟桔梗一兩去蘆頭訶黎勒皮三分桂心半兩甘草一分炙微赤銼上為散末每服五錢以水一盞入生薑半分棗三枚煎至五分去滓不計時候溫服枳實散出聖惠方治胸中痰飲冷熱不調食不消化體重多臥枳實麩炒二兩微黃附子一兩炮裂去皮臍紫蘇莖葉三分白朮一兩人參三分去蘆頭川大黃三分銼碎微炒大腹皮三分銼麥門冬三分去心半夏三分湯洗七次去滑甘草一分炙微赤銼吳茱萸一分湯浸七次焙乾微炒上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不拘時候溫服訶黎勒皮丸出聖惠方治痰飲心胸積滯氣不宣通飲食不消訶黎勒皮一兩神麯三分炒微黃前胡一兩去蘆頭枳殼三分麩炒微黃去瓤桂心一兩白朮一兩人參三分去蘆頭檳榔一兩木香一兩川大黃一兩銼碎微炒上為末煉蜜和丸搗三二百杵丸如梧桐子大每服不計時候以生薑橘皮湯下三十丸前胡丸出聖惠方療心頭痰積宿食水嘔逆不下食前胡白朮甘草炙各五分旋覆花豆蔻仁各三分人參麥門冬去心各六分枳實炙大黃各四分上搗篩蜜和為丸如梧桐子大空肚酒下二十丸漸加至三十丸日再服不甚利忌桃李雀肉海藻菘菜熱面炙肉魚蒜黏食生冷等物或用生薑荊芥湯亦可前胡散出聖惠方治脾胃虛冷痰飲結聚飲食不消前胡一兩去蘆頭丁香三分陳橘皮一兩湯浸去白瓤焙大腹皮一兩銼枇杷葉三分拭去毛炙微黃草豆蔻一兩煨去皮半夏三分湯洗七次去滑甘草半兩炙微赤銼乾薑半兩炮製銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不拘時候溫服半夏散出聖惠方治痰飲積聚食不化半夏一兩湯浸七次去滑赤茯苓一兩訶黎勒皮一兩紫蘇莖葉一兩陳橘皮一兩湯洗去白瓤附子一兩炮裂去皮臍枳實半兩麩炒微黃皂角一梃去皮塗酥炙令焦黃去子甘草半兩炙微赤銼上為散每服五錢以水一大盞入生薑半分煎五分去滓不計時候服人參散出聖惠方治胸中積聚痰飲時有嘔逆胃氣不和食不消化人參一兩去蘆頭半夏一兩湯洗七次去滑陳橘皮湯洗去白瓤焙一兩上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候溫服療胸膈痰飲食啖經時則並吐出食皆不消其人初空腹一兩日驟食還服吐之極不便此由痰飲聚下絶不通服此丸宣通下氣吳茱萸白朮澤瀉芍藥漢防己赤茯苓各二兩川大黃二兩上搗篩蜜和丸如梧桐子大飲服二十五丸忌桃李仁雀肉酢物治胸多有痰頭痛不欲食及飲酒瘀痰方出肘後方上用桂四兩甘草二兩附子一枚炮水六升煮取三升分為三服暖胃暖胃除痰進食消食方出護命方木香一分肉豆蔻二枚去皮半夏半兩去臍孔薑汁浸熬令黃色為細末上為末蒸餅丸如芥子大酒後食以津液下五丸至十丸空心服赤茯苓湯治痰飲乾嘔食不消化及脾胃胸膈治痰飲飲食不消化乾嘔人參旋覆花橘皮細辛各一兩澤瀉白朮杏仁枳實各二兩茯苓柴胡生薑半夏芍藥各三兩上㕮咀以水九升煮取二升七合分三服日三驅痰飲子治痰飲神效如人頭痛背痛飲食嘔惡皆痰飲之證天南星切作十片湯浸七次半夏湯洗七次青皮去白陳皮各一兩去白赤茯苓草果子去殼稱切碎各半兩上六味㕮咀每服二錢水一鍾生薑七片棗子一枚煎七分通口服不拘時候如飲酒先服一服酒後再一服或以次日夜醒又一服永無痰飲膈痰結食附論夫膈痰者氣不降津液否澀水飲之氣聚於膈上久而隔食故令氣道奔迫否滿短氣不能臥甚者頭目眩暈常欲嘔吐是也聖惠方論云夫痰結實者由痰水積聚於胸腑間冷氣相搏結實不消故令心腹否滿氣息不利頭眩目暗常欲嘔逆故言痰結實也方百合湯治痰食上焦有熱壅塞不利百合枳殼去瓤麩炒麻黃去根節天雄炮去皮臍款冬花昆布洗去咸各兩半貝母去心當歸切焙五味子紫菀去苗土白石脂黃連去須各一兩黃芩去黑心桂去粗皮旋覆花焙各半兩上為㕮咀如麻豆大每服五錢水一盞半入生薑三片同煎至八分去滓溫服柴胡地骨皮湯治膈痰結實氣不升降柴胡去苗地骨皮赤茯苓去黑皮芎藭大黃葛根銼芍藥茵陳蒿甘草當歸切焙升麻各等分如心燥加麥門冬各一兩上搗篩每服三錢水一盞半食後臨臥服去滓金箔丸治膈痰結實咽喉不利咳喘急龍腦研珍珠研末金箔研十五片牛黃研麝香研各半兩馬牙硝研硼砂各半兩丹砂研一兩甘草末二兩上合研令勻煉蜜和丸如雞頭大每服一丸食後溫薄荷湯或人參湯嚼下前胡散治胸中宿食痰結實飲減少或發寒熱臥不欲起前胡一兩去蘆頭旋覆花半兩桂心半兩人參一兩去蘆頭川大黃一兩銼碎微炒甘草半兩炙微赤銼半夏一兩湯浸七次去滑檳榔一兩杏仁半兩湯浸去皮尖雙仁麩炒微黃上為散每服五錢水一大盞入生薑半分煎五分去滓不計時溫服八珍丸治膈痰結實胸不利喘嗽嘔逆丹砂研半兩犀角鎊羚羊角鎊牛黃研茯神去木搗末龍腦各二錢天南星牛膽內製陰乾一錢硼砂研一錢上合研令勻煉蜜和丸如雞頭實大每服一丸食後人參荊芥湯嚼下丹砂丸治膈痰結實頭旋噁心肢節疼痛丹砂研半兩半夏湯浸七次焙天南星炮蝦梢炒白附子炮白殭蠶炒各一兩硼砂研牛黃研各一錢上為末合研令勻麵糊和丸如梧桐子大每服五七丸食後荊芥湯下銀粉丸治膈痰結實滿悶喘逆化痰粉霜鉛白霜白礬熬令汁枯水銀鉛與水銀結炒各半兩天南星炮一兩半半夏湯洗七次去滑焙丹砂研各一兩上各研為末合研令勻麵糊和丸如梧桐子大每服三丸食後薄荷湯下小兒丸如麻子大犀角湯治膈痰結實頭目昏暈不思飲食犀角鎊人參黃芩去黑心柴胡去苗各一分甘草炙半分白茯苓去黑心麥門冬去心焙升麻各半兩上細銼每服半兩水二盞煎至八分去滓食後服木香丸一名香橘丸治膈痰結實胸膈不利頭目昏眩不思飲食木香一分牽牛子炒半夏湯洗七次焙白礬熬令汁枯各一兩檳榔青橘皮湯浸去白入鹽炒各半兩上為細末煮棗肉和丸如梧桐子大每服二三十丸食後生薑湯下治痰膈食心胸壅滯常欲嘔逆不能下食宜服此藥出聖惠方半夏湯浸七次去滑一兩郁李仁一兩湯浸去皮微炒旋覆花半兩前胡一兩去蘆頭桔梗半兩去蘆頭枳殼半兩麩炒微黃去瓤上為散每服三錢以水一大盞入生薑半分煎至六分去滓不拘時候溫服四味半夏丸治痰隔結實寬利胸膈半夏生用四兩白礬生用三兩粉霜研半兩牽牛子生搗取粉三兩上合搗研為末合研令勻生薑自然汁煮麵糊為丸如梧桐子大以丹砂為衣每服七丸至十丸食後臨睡溫水下龍腦丸治膈痰結實咽喉不利龍腦研三錢丹砂研一兩白礬熬令汁枯半兩半夏湯洗七次去滑陰乾為末三兩上各研令勻生薑自然汁煮麵糊和丸如豌豆大每服