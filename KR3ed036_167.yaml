上又用燈草蓋約厚一指以煮豆培之候乾取出於器內收貯每服一兩粒細嚼食後溫水或冷水下半夏仍依疼痛飲類製半夏法人參散出本事方治邪熱於經絡肌熱痰嗽五心煩燥頭目昏痛夜多盜汗此藥補和真氣解勞倦婦人血熱虛勞骨蒸皆宜服人參白朮白茯苓柴胡半夏當歸赤芍藥乾葛甘草各一兩子芩半兩上為細末每服三錢水一盞生薑四片棗二枚煎至八分不拘時候帶熱服但是有勞熱證皆可服熱退即止大抵透肌解熱乾葛第一柴胡次之所以升麻葛根湯為解肌之冠也雙玉散出保生集門方治痰熱而喘痰湧如泉寒水石石膏各等分上為細末煎人參湯下三錢食後服解熱毒治痰壅出本草以砒霜生不和石色赤甚如雄黃者以冷水磨服甚效去熱解痰出本草以茗𦾵煮汁同煮粥食之良治風熱痰盛用老茄子黃大者不計多少以瓷瓶盛貯於中經一年盡化為水取入苦參末同丸如梧桐子大每服食已及欲臥時酒下三十丸其功甚效又方用蘿蔔子為末溫水調一匙頭咽下良久出涎末如是癱緩風以此吐後用緊疏藥服疏服和氣風散即瘥寒痰附論氣為陽陽不足者不能銷鑠水飲遇脾氣虛弱氣道否膈則聚飲而成痰浸漬腸胃上為嘔逆吞酸下為洞泄寒中久不已則令人消瘦倚息短氣妨害飲食昔人治痰飲多以溫藥和之正為此也難經曰肺太過則外證面白善嚏悲愁不樂欲泣其內證喘嗽上渴逆氣煩心胸滿煩熱夜則涕出多嚏悲愁鼻不通肺金脈水名以子助母也心脾肝皆受寒邪涎出水反傷土寡於畏也腑中大寒病名寒中痰白作泡肺中氣虛而為水助母也當於肺中瀉腎中火非辛熱之藥不能退也口中痰沫胃中寒而不和以辛甘熱去之飲酒多有此證也方草豆蔻散出聖惠方治心膈冷氣痰飲胸中悶或吐清水不納飲食草豆蔻一兩去皮澤瀉半兩人參半兩去蘆頭桂心二分白朮三分赤茯苓半兩半夏三兩湯洗七次去滑陳橘皮三分湯洗去白瓤焙細辛半兩附子三分炮裂去皮臍厚朴一兩去粗皮塗生薑汁炙令香熟甘草一分炙微赤銼上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服高良薑散出聖惠方治胸膈冷氣痰飲口中清水自出脅急脹痛不欲飲食此由胃氣虛冷高良薑三分銼細辛三分桂心三分桔梗半兩去蘆甘草三分湯浸七次訶黎勒皮一兩白朮二分赤茯苓三分半夏三分湯洗七次去滑陳橘皮三分湯浸去白瓤焙厚朴一兩去粗皮塗生薑汁炙令香熟人參半兩去蘆頭上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服木香散出聖惠方治冷痰飲氣滯心胸滿悶不下飲食木香半兩赤茯苓三分檳榔半兩木通三分銼半夏三分湯洗七次去滑枳殼半兩麩炒微黃去瓤草豆蔻三分去皮甘草一分炙微赤銼人參半兩去蘆頭白朮三分陳橘皮三分湯洗去白瓤焙前胡三分去蘆頭上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服一方治胸膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多吐口中清水自出脅肋急脹痛不欲食皆胃氣弱受冷故也其脈喜沉弦細遲半夏生薑各五分芍藥三兩茯苓四兩細辛旋覆花橘皮桂心人參甘草桔梗各二兩上㕮咀以水一斗煮取三升分三服病先有時喜水下者用白朮三兩去旋覆花若欲得利者加大黃二兩須微調者用乾薑地黃溫肺湯出危氏方治肺虛久感風邪客寒飲發則喘嗽不能坐臥嘔吐痰沫不飲食白芍藥六兩五味子去梗炒乾薑肉桂去粗皮半夏煮熟焙陳皮去白杏仁甘草各二兩細辛一兩上為粗散每服三大錢水一盞半煎至八分以絹濾汁食後服兩服滓再煎一服一方去白芍藥細辛二味可加減用訶黎勒皮散出聖惠方治膈冷滯痰飲嘔逆不下飲食四肢不和訶黎勒皮三分厚朴一分去粗皮塗生薑汁炙令香熟人參三分去蘆白朮三分半夏三分湯洗七次去滑桂心一兩甘草半兩炙微赤銼陳橘皮三分去白瓤湯洗焙乾薑半兩炮裂銼上為散每服五錢以水一大盞入生薑半分棗三枚煎至五分去滓不計時候溫服半夏散出聖惠方治胸中冷痰飲氣滿不欲食半夏一兩湯洗七次去滑陳橘皮三分湯洗浸去白瓤焙桂心一兩赤茯苓一兩人參三兩去蘆頭細辛三分甘草三分炙微赤銼乾薑三分炮製銼上為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時溫服丁香茯苓湯出聖惠方治脾胃虛冷寒宿飲留滯以致嘔吐涎沫或有酸水不思飲食木香丁香各四兩乾薑炮一兩半附子炮去皮臍半夏洗七次肉桂去皮各一兩陳皮去白一兩縮砂半兩上㕮咀每服四錢水二盞薑七片棗一枚煎七分不拘時候服一方有茯苓無肉桂半夏湯治冷痰癖飲胸膈痞滿嘔逆不止白朮人參赤茯苓去黑皮桂去粗皮甘草炙附子炮裂去皮臍各二兩半夏湯洗七次切焙三兩上銼如麻子大每服五錢以水一大盞半入生薑半分切煎取七分去滓溫服食前日三服半夏散治冷痰消食溫胃止逆半夏湯浸去滑焙乾為末薑汁和作曲焙乾杏仁去皮尖雙仁麩炒研各二兩木香半兩桂心去粗皮一兩陳橘皮一兩湯洗浸甘草炙銼一兩乾薑炮三分上搗篩每服三錢水一盞生薑三片煎至七分去滓溫服前胡散出聖惠方治痰腹脅脹滿嘔逆不下食胸中冷前胡一兩去蘆頭半夏一兩湯洗七次去滑人參半兩去蘆頭桂心半兩乾薑半兩炮陳橘皮一兩湯浸去白瓤焙白朮半兩上為散每服五錢水一大盞生薑半分棗三枚煎至五分去滓不拘時候溫服泄白丸出和劑方治膈脘脹滿痰涎不利頭目昏暈吐逆痰沫生硫黃別研天南星生用半夏生用各一兩盆硝玄精石各半兩附子一個六錢重者生去皮臍上為末入細面三兩令停勻水和為丸如梧桐子大每服三十丸沸湯內煮令浮漉出生薑湯送下食後服蓽茇散治胸中冷痰上焦客熱心下停時發醋心咽喉唾乾嘔而渴蓽茇桂去粗皮麻仁高良薑各三分人參白朮各一兩甘草炙銼半兩乾地黃炮厚朴去粗皮生薑汁炙各一兩半上為散酒調一錢日再服如要丸即煉蜜和丸如小豆大溫酒下二十丸大半夏湯出千金方治痰冷癖飲胸膈中不利半夏一升白朮三兩生薑八兩茯苓人參桂心甘草附子各三兩上八味㕮咀以水八升煮取三升分作三服厚朴丸治冷痰不消胸膈不利解酒食毒厚朴去粗皮八兩切用生薑十兩細切同搗細焙乾慢火炒桂心去粗皮五兩乾薑四兩炮蜀椒去目並閉口者炒出汗二兩上為細末煉蜜和丸如梧桐子大每服二十丸溫熟水下治脾胃米飯下中酒吐逆生薑湯下人參丸治咯唾冷痰膈脘不利不思飲食人參半夏湯洗去滑白礬燒令枯乾薑炮製上等分為末將皂角五梃去皮子挼濾取汁煮成膏和上件藥為丸如梧桐子大每服二十丸溫水下不拘時候法制半夏方治冷痰利胸膈一應諸痰悉治之半夏半斤湯洗四十九次用法酒二升浸一日焙乾丁香皮末三兩白礬四兩草豆蔻去皮二兩半為末上同入酒內浸春夏七日秋冬半月候日滿只取半夏於溫湯內浴過火焙乾不計時候嚼下三五粒用臘茶下或酒下亦得小半夏湯治病心腹虛冷遊痰氣上胸膈不下食或嘔逆者半夏一升生薑一斤桂心三兩甘草一兩上㕮咀以水七升煮取二升半分三服千金丸出百一選方治中冷停食不散痰實不入食硫黃通明者別研如粉白茯苓乾山藥各二兩附子去皮臍生用半夏湯浸去滑青皮去白各一兩上為細末拌勻湯浸炒餅為丸或用淡麵糊為丸如梧桐子大每服三十丸至五十丸空心食前服一方治冷痰桂胡椒白芥子黑芥子大戟甘遂上等分水糊為丸如梧桐子大每服十丸薑湯下丁香半夏丸一名檳榔丸出拔粹方治心下停飲冷痰頭目昏暈睡臥口中多涎檳榔二分丁香一兩半夏一兩細辛半兩乾薑半兩人參上為細末生薑汁煮糊為丸如梧桐子大每服三十丸薑湯下日三服食後白豆蔻湯治胃虛氣寒飲食無味嘔逆冷痰噫時聞食氣白豆蔻去皮檳榔銼半夏為末薑汁和作餅焙乾上為末篩每服二錢水一盞生薑三片煎至七分去滓溫服溫中化痰丸出和劑方治證與前一切痰飲類溫中化痰丸同乾薑炮半夏煮各一兩細辛去葉洗胡椒各半兩白朮焙二兩上為末薑汁打糊為丸如梧桐子大每服三十丸至五十丸湯飲不拘時候強中丸一名強中二薑丸出三因方治胃脘虛寒冷痰留滯痞塞不通氣不升降口苦無味不思飲食亦治溫脾胃消寒痰茶積高良薑細銼乾薑炮淨拭陳皮去白青皮各稱一兩去瓤半夏湯洗去滑二兩上為末用生薑自然汁煮麵糊為丸如梧桐子大每服二三十丸生薑湯下中滿氣痞服之甚妙一方有南星半兩炮一方不用生薑汁丸鹽湯送下空心服一法前藥並不炮製吳茱萸湯治胸冷痰心下煩滿欲吐不下食吳茱萸湯洗焙炒半夏湯洗七次切焙桂去粗皮人參各二兩甘草炙一兩上㕮咀如麻豆大每服五錢以水一盞半入生薑半分切大棗二枚煎取一盞去滓溫服日三礬石丸治冷痰溫胃利膈思食白礬枯研芎藭乾薑炮半夏碎銼薑汁浸透炒各一兩上為細末煮棗肉和丸如梧桐子大每服十五丸至二十丸生薑湯下不拘時候薑桂丸出拔粹方治寒痰咳嗽脈沉面色黧黑小便急痛足寒而逆心多恐怖南星洗半夏洗各一兩官桂一兩去粗皮上為細末蒸餅為丸如梧桐子大每服三五十丸生薑湯下食後局方中胡椒理中丸仲景吳茱萸湯亦可如心下痞悶者加枳實五錢如身熱甚者加黃連五錢如體重加茯苓白朮各一兩如氣逆上者加苦葶藶五錢如氣促者加人參桔梗各五錢如浮腫加郁李仁杏仁各五錢如大便祕加大黃五錢如痰而能食者大承氣湯微下之如痰而不能食者厚朴湯主之一方食後用防己丸或玉粉丸亦可丁香半夏丸出王氏博濟方治胃冷有痰不思飲食丁香一分白礬半兩研半夏二兩水浸七日每日早換水日足取出切片曝乾上為細末薑汁和丸如小豆大每服二十丸薑湯下食後一方鹽湯下如膈上有痰涎只服三服墜下立見效奇效湯治冷痰壅盛胸膈不利胃口冷脾氣弱嘔吐痰涎木香半兩附子炮裂去皮臍半夏湯浸七次切焙各二兩上㕮咀銼如麻豆大每服三錢水一盞半生薑半分切大棗二枚煎至一盞去滓空心溫服蓽茇丸治疼痰飲食不下膈脘不快蓽茇炒一兩乾薑炮半兩訶黎勒煨去核三分上為細末煮麵糊和丸如梧桐子大每服二十丸薑湯下不拘時候治疼痰飲胸膈氣滿吐逆不思飲食宜服此方一名半夏散出聖惠方半夏二兩湯洗七次去滑乾薑一兩炮丁香一兩上為散不計時候以薑湯粥飲調下一二錢倍術散治酒癖五飲停水在心下或兩脅胃中膈間動搖有聲白朮二兩附子炮去皮臍一兩上銼散三服水一大盞生薑十片煎空心服臟腑微動即安一方除附子加乾薑肉桂各一兩為末蜜和丸如梧桐子大每服二十五丸米湯下食前大效二生湯出傳信適用方專治痰胃冷附子生去皮臍半夏生用上各等分㕮咀每服四錢水二盞薑十片煎至七分去滓溫服空心入少木香煎佳一方去半夏用南星附子湯薑附湯出千金方治痰冷癖氣胸滿短氣嘔沫頭痛飲食不化生薑八兩附子四兩生用破上二味㕮咀以水八升煮取二升分四服又主猝風忌肉冷水等一方附子炮製一方治痰涎上用檳榔為末白湯點一錢一方出聖惠方治冷痰飲噁心上用蓽茇一兩搗為末於食前清粥飲調半錢服胡椒理中丸出衛生家寶方治脾胃虛寒氣不宣通咳喘急逆氣虛痞胸膈噎悶腹脅滿痛迫塞短氣不能飲食嘔吐痰水不止豆蔻湯出聖惠方治痰冷嘔逆胸膈不利飲食不下草豆蔻去皮半夏湯浸七次去滑焙各半兩陳橘皮湯浸去白焙三分上搗篩每服三錢水一盞生薑五片煎至七分去滓溫服不拘時候吳茱萸湯治冷痰吞酸吐水胸中不理吳茱萸湯洗七次焙炒半夏湯洗七次焙附子炮裂去皮臍各一兩上㕮咀如麻豆大每服三錢水一盞半生薑五片煎至五分去滓溫服不拘時候鐵刷湯出衛生家寶方治積寒痰飲嘔吐不止胸膈不快不下飲食半夏四錢洗草豆蔻丁香乾薑炮訶子皮各三分生薑一兩上㕮咀用水五盞煎至二盞半去滓分三服相繼不拘時候大吐不止加附子三錢生薑半兩薑曲餅子出十便良方治冷痰厥逆生薑二斤切作片子以鹽二兩淹一宿焙乾半夏曲一兩半大杏仁三十枚甘草二兩丁香半兩上搗為末糯米糊丸為小餅子每以白湯嚼下三五餅白朮散出保命集方治夏暑大熱或酒飲冷痰濕不止膈不利白朮茯苓半夏洗黃芩各等分上為粗末每服五錢至七錢水二盞入生薑十片煎至一盞去滓調陳皮末一錢神麯末一錢食後服法曰大熱大飲蓋酒味熱而引飲冷冷與熱凝胃胸中不能散而成濕故痰作甚者亦吐之吐後服五苓甘露燥濕去痰之劑順氣散出醫方集成治氣虛痰盛不得眠臥氣中痰厥尤宜服之南星一兩炮川烏附子各半兩木香二錢半上㕮咀每服三錢水一盞薑十片煎熱服痰厥
