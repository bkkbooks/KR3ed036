後方令病人著地仰臥以冷水終日淋其面良排風湯出和劑方治男子婦人風虛濕冷邪氣入臟狂言妄語精神錯亂其肝風發則面青心悶亂吐逆嘔沫脅滿頭眩重耳不聞人聲偏枯筋急曲拳而臥其心風發則面赤翕然而熱悲傷瞋怒張目呼喚其脾風發則面黃身體不仁不能行步飲食失味夢寐倒錯與亡人相隨其肺風發則面白咳逆唾膿血上氣奄然而極其腎風發則面黑手足不遂腰痛難以俯仰痹冷骨疼諸有此候令人心驚志意不定恍惚多忘服此安心定志聰耳明目通臟腑諸風悉主白蘚皮白朮芍藥桂心川芎當歸杏仁防風甘草各一兩獨活麻黃茯苓各三兩生薑四兩上㕮咀以水一斗煮取三升每服一升覆取微汗可服三劑此藥大理營血摧抑肝實有風脈來浮實有力目赤脅疼口苦心煩錯語多怒宜加羚羊角熱盛者加犀角肝虛有風脈來浮虛無力當取綿黃耆不能言者加荊瀝一方每服四錢薑棗煎溫服治中風發狂出本草取釭中膏如雞子大以熱醋攪令消服之治風狂憂愁不樂能安心氣出本草方以驢肉一斤切於豉汁內煮五味和醃臘食之作粥及羹並得治若發狂者出本草取車轂中脂如雞子熱溫淳苦酒以投脂甚攪令消服之令盡風邪附論夫風邪者謂風氣傷於人也故病有五邪一曰中風二曰傷暑三曰飲食勞倦四曰中寒五曰中濕其為病不同風邪中人以腑臟虛而心氣不足也人以氣血營衛為主以風氣外至為邪腑臟而氣不足則風邪乘虛而干之經言病有五邪而中風居其一此之謂也又曰風者善行而數變故其發不自覺知狂或妄言悲喜無度乃其證也風邪客於肌膚虛癢成風疹密瘡風邪入深寒熱相搏則肉枯邪客半身入深真氣去則偏枯邪客機關中即拘攣筋中亦然邪淫於臟夢臟大形小淫於腑夢臟小形大邪隨目系入腦則目轉眩邪中精則散視見兩物風邪入臟寒氣客於中不能發則啞啞喉痹舌緩不時服藥針灸風逐脈流入臟使人猝喑緩縱發痙致死風入陽經則狂入陰經則癲陽邪入陰病則靜陰邪入陽病則怒若因熱食汗浴通腠理得其風自出則覺肉中如針刺步行運力欲汗亦如此也方紫石英丸出聖濟總録治邪入臟心虛氣不足夢寐驚恐紫石英研一兩海蛤白茯苓去皮白石英研菖蒲杏仁去雙仁尖皮熬石硫黃研遠志去心阿膠炙令燥卷柏去土炒鐵精研細辛去苗葉牛黃研各半兩麥門冬去心焙當歸切焙大豆黃卷生銀銼屑大黃蒸三次炒鍾乳粉肉蓯蓉酒浸切焙乾薑各一兩一分白朮白蘞前胡去蘆各一分大棗去核炒乾二十枚人參防風去叉山芋石膏碎研赤芍藥桔梗去蘆炒柏子仁烏頭炮裂去皮臍桂去粗皮熟乾地黃焙甘草炙各三分上為細末煉蜜為丸如桐子大每服空心食前用粥飲下丸日二服外臺祕要加澤瀉秦艽二味各六分黃耆六分半夏八分人參湯千金方治風邪鬼氣往來發作有時或無時節者人參防風烏頭乾薑澤瀉桔梗狗脊遠志附子黃芩獨活秦艽牡蠣五味子山茱萸前胡細辛石膏川芎蜀椒牛膝甘草石南桑白皮桂心麻黃竹皮白朮橘皮各一十八銖鬼箭茯苓各十二銖大棗十六枚上㕮咀以水六升酒六升合煮取四升分五服日三夜二鎮心丸出聖濟總録治風邪驚悸恍惚悲傷或夢寐不安遠志去心一兩一分鐵精杏仁川芎麥門冬去心焙牡蠣各一兩半龍齒研白茯苓去皮各二兩防風去叉當歸去心切焙人參鬼臼白朮生地黃丹參桔梗去蘆炒甘草炙各一兩一分紫菀去土卷柏山茱萸桂去粗皮乾薑炮防己白蘞羚羊角鎊各一兩牛黃別研半兩麝香另研三分銀箔四百片另研虎睛一對酒浸炙令黃另研上為細末煉蜜和丸如桐子大每食後下二十丸稍加至三十丸日再服定神安志丸療風邪狂亂失心金銀箔各一百片和合石膏研龍齒研鐵精研地骨白皮茯神黃芩生乾地黃升麻茯苓玄參人參各八分虎睛一具微炙牛黃生薑屑各四兩麥門冬一錢去心枳實炙甘草炙葳蕤芍藥各六分遠志去心柏子仁白蘚皮各五分上搗篩以蜜和丸食訖少時煮生枸杞根服如桐子大二十丸二服漸加至三十丸不利熱曲海藻菘菜蕪荑炙肉醋蒜黏食陳臭油膩金箔丸聖惠方治風邪狂亂失心安神定志金箔五十片細研銀箔石膏一兩龍齒一兩鐵粉二兩細研人參茯神一兩遠志一兩去心硃砂一兩細研防風黃芩一兩犀角屑一兩虎睛一對酒浸一宿微炙牛黃生地黃一兩川升麻一兩地骨皮一兩玄參麥門冬一兩半去心焙枳實半兩麩炒微黃甘草半兩炙微赤銼上為末入研了藥研令勻煉蜜和丸搗三五百杵如桐子大每服不計時候以薄荷湯下二十丸小八風散出千金方治迷惑如醉狂言妄語驚悸恐怖恍惚見鬼喜怒悲憂煩滿顛倒悒悒短氣不得語語則失忘或心痛徹背不嗜飲食惡風不得去帷帳時腹疼熱惡聞人聲不知痛癢身悉振搖汗出委頓頭重浮腫爪不能榮頸痛強直口面喎戾四肢不隨不仁偏枯攣掣不能屈伸悉主之方天雄當歸人參各五分附子天門冬防風蜀椒獨活各四分烏頭秦艽細辛白朮乾薑各三分麻黃山茱萸五味子桔梗白芷柴胡莽草各三分上治下篩合相得酒服半方寸匕漸至一匕日三服以身中覺如針刺狀則是藥行也鎮心丸治胃氣厥實風邪入臟喜怒憂心氣不足恍惚多忘夜不得寐諸邪氣病悉主之秦艽一兩柏實當歸乾漆熬白蘞杏仁去皮尖熬川芎各三分澤瀉一兩地黃六分防風人參各四兩甘草一兩炙白朮薯蕷茯苓乾薑各三分麥門冬去心二兩前胡四分上搗篩以蜜和丸如桐子大先食飲服十丸日三不知稍增之忌桃李雀肉海藻菘菜蕪荑酢物鎮心丸一名牛黃丸治老少心氣不足虛弱時有小苦勞則劇風邪百病主之人參湯治風邪入心臟忽心痛驚恐小腸微痛乍寒乍熱心中悶而色青赤虛勞邪氣方見人參飲菖蒲湯出聖