body:
  text: 卷一百一諸風門風驚附論夫風驚者由體虛心氣不足為風邪所乘也心藏神而主血脈心氣不足則血虛虛則血亂血亂則氣並於血氣血相併又被風邪所乘故多驚心神不安名曰風驚也又云風驚者心氣不足風邪干之而心不安定也內經曰心者君主之官神明出焉又曰主明則下安今心氣不足風邪相乘陰陽不和情思錯亂神魂散越故動作多驚也又曰昔一人被火驚患疾舉身羸弱四肢無力面色蒼黃左脅下身有積塊如臂狀每發則痛無時食不減大便如常小便微黃視其部分乃足厥陰肝經兼足少陽膽經也蓋甲膽乙肝故青其黃者脾也診膽脈小此因驚也驚則膽受邪腹中當有驚涎緑水遂以舟車百五十丸浚川散四五錢大加生薑自然汁平旦果下緑水四五行或問大加生薑者何也且如膽木乘胃土此土不勝木也不勝之氣尋救於子己土能生庚金庚為大腸味辛者為金如大加生薑使伐木然先不開脾土無由行也遂用舟車丸先通其閉塞之路是先瀉其所不勝復用薑汁調浚川散大下之次瀉其所勝也大抵陽干克陽干腑臟克腑臟故也方牛黃珍珠丸出聖濟總録治風驚鎮心安神化涎牛黃研珍珠研琥珀研麝香研天竺黃研甘草炙銼鉛霜研雄黃研人參茯神去木天南星牛膽匱者各二錢天麻龍腦研一錢半金箔銀箔各一十片同研入藥鐵粉研各一錢丹砂研半兩上為末同拌勻煉蜜和丸如雞頭大別用大金箔五片滾為衣每服一丸細嚼人參薄荷湯下小兒半丸十黃散出千金方治五臟六腑血氣少亡魂失魄五臟覺不安忽忽喜悲心中善怖如有鬼物此皆發於大驚及當風從高墮下落水所致悉主之雄黃人參各五分大黃黃柏黃耆細辛桂心各三分黃連黃柏蒲黃麻黃各一分黃環澤瀉山茱萸各二分黃芩二分上治下篩末食後溫酒服方寸匕日三不知加至二匕羸劣者更加人參五分合十分一方有牛黃二分一方有蜀椒五分乾薑四分一方加硃砂三分金箔散出聖惠方治風驚手足顫掉精神錯亂金箔細研銀箔各五十片細研鐵粉研細二兩龍齒麥門冬各一兩半去心焙人參去蘆頭琥珀細研犀角屑酸棗仁各一兩微炒茯神一兩半防風去蘆頭葳蕤玄參露蜂房各三分炙微黃牛黃半兩細研上搗細散入牛黃金箔銀箔更研令細每服不拘時候以薄荷酒調下一錢大定心湯出聖濟總録治心虛中風驚悸恍惚多忘或夢寐驚魘志少不足人參白茯苓去皮茯神去木遠志去心龍骨乾薑炮當歸切焙甘草炙白朮芍藥桂去粗皮紫菀去苗土防風去叉赤石脂各二兩上㕮咀每服五錢許水二盞入棗二枚擘破煎至一盞去滓溫服日三夜二天南星丸出聖濟總録治風驚鎮心化涎天南星大者逐日換水浸五日慢火煮五七沸切作片子曝乾麵炒令黃香烏蛇酒浸取肉炙乾白殭蠶直者麵炒令黃天麻各一兩乾蠍全者炒黃色白附子炮雄黃研琥珀杵研各三兩麝香一分研牛黃研樟腦研各半兩丹砂一兩半研上除研者外搗為末各研勻於瓷器收密封勿令透氣旋煉蜜和丸如雞頭大每服一丸荊芥人參湯化下茯神丸出聖惠方治風驚恍惚心神不安茯神川升麻玄參生地黃各一兩牛黃一分細研虎睛一對酒浸一宿微炙石膏細研樟腦各二兩麥門冬一兩半去心炙金箔細研銀箔各五十片細研鐵粉細研二兩上為末煉蜜和搗丸如梧桐子大每服不計時候以人參湯下二十丸雄黃丸出聖惠方治五臟風虛六腑邪熱風熱相搏令寐即驚恐憂患寤即恍惚怔忪忽悲喜怕怖如狂雄黃川大黃沉香薯蕷硃砂人參安息香川椒鐵粉防風附子白茯苓上為末入研了藥令勻煉蜜和丸如梧桐子大每服不拘時候人參茯苓湯下二十丸驚氣丸出危氏方治驚憂積氣心受風邪發則牙關緊急涎潮昏塞醒則精神若癡服之紫蘇子一兩略炒附子炮去皮臍一作生用南木香不見火南星浸洗薄切片薑汁浸一夕白殭蠶炒去絲角天麻花蛇酒炙去骨橘皮一作橘紅麻黃去節各半兩乾蠍去毒硃砂各一分留少許為衣上為末入腦麝少許同研極停煉蜜杵丸龍眼大每服一粒金銀薄荷湯化下溫酒亦得軍中一人犯法褫衣將受刃得釋神失如癡與一粒服訖而寐及醒病已失矣江東有一婦人已失心數年受此方不終劑而愈若狂厥去附子加鐵粉化痰鎮心抑肝邪若多恚怒肝邪大盛鐵粉能制伏之素問言陽厥狂怒治以鐵落金制木之意也一方不用天麻奪命散治急慢二驚及中風白附子天南星全蠍每個用薄荷葉包裹線縛定生薑汁蘸過炙三次黃色為度麻黃去節防風去蘆黑附子炮半夏湯洗七次天麻各一錢硃砂別研麝香各半兩上為細末三歲兒一服以小錢抄半錢匕用生薑自然汁薄荷水化滴酒一二點立愈急驚加硃砂膩粉少許不用酒甚者三兩服小銀箔丸出聖濟總録治心邪虛風悸安神清膈化涎水銀用錫結砂子半夏湯洗七遍去滑入全姜搗曝乾天南星炮白礬枯人參各半兩白茯苓去皮鉛霜研各一分膩粉一兩青黛一兩銀箔二十片研入藥上為末水煮麵糊和丸如梧桐子大每服十丸食後臨臥人參薄荷湯下鐵精丸出聖惠方治風驚狂言妄語不能得睡臥鐵精犀角人參去蘆頭茯神防風各一兩去蘆石菖蒲遠志各三分去心麥門冬去心焙生乾地黃各一錢半上為末煉蜜為丸如梧桐子大每服不拘時候以粥飲下二十丸犀角丸出聖惠方治風心神驚恐睡臥不安四肢煩熱犀角屑人參去蘆頭茯苓川升麻檳榔樟腦硃砂各半兩細研金箔研銀箔各五十片細研上為末入研了藥令勻煉蜜為丸如桐子大每服不計時候以人參竹葉湯下二十丸一方用茯神龍齒丸出聖惠方治風虛心驚不定龍齒人參去蘆頭茯神各一兩遠志去心防風各三分去蘆鐵粉一分細研甘草半兩炙微赤銼金箔細研銀箔各五十片研上為末入研了藥令勻煉蜜為丸如桐子大每服不拘時候以粥飲下十五丸牛黃散出本草治大人小兒驚風退熱取涎硃砂水銀各一錢麝香牛黃狗黃各一字腦子真者半錢雄黃零陵香各半兩上為末頓一處臨時和勻每服一匙或半錢薄荷湯入銀箔同調下如用取涎入萆麻二粒去油藥末二錢和勻只可服半字薄荷茶清調下量大小虛實加減與之用補龍腦煎出聖濟總録治驚風心膈生涎樟腦研蠍梢炒水銀研麝香研膩粉研丹砂研天南星薄荷汁浸一宿切炒白附子炮製各等分上搗研為末用石腦油和為煎每服一皂角子大薄荷湯化下食後臨臥服鉛金丸出聖濟總録治心受風邪鎮驚利頭目化痰壅鉛霜半兩研金箔十片研入藥半夏三分湯洗淨生用天南星生用雄黃研各二兩白礬生用防風去叉各半兩白茯苓去皮一兩半上為末水煮麵糊丸如桐子大每服十五丸食後臨臥生薑薄荷湯下藥丸了不可見日小定心湯出聖濟總録治心氣不足風邪所乘驚悸恍惚睡夢多噩白茯苓去皮四兩桂去粗皮三兩甘草炙芍藥乾薑炮遠志去心人參各二兩上㕮咀每服五錢匕水二盞入棗二枚擘破煎至一盞二分去滓溫服日三夜一人參散出聖惠方治風驚悶亂恍惚人參去蘆頭龍齒各二兩生熟地黃白茯苓犀角屑小草各一兩麥門冬一兩半去心焙上搗粗散每服三錢以水一盞煎至六分去滓不拘時溫服加味壽星丸出危氏方治因事驚涎留心包精神不守事多健忘譫言妄語如有所見不得安臥或風涎潮作首足抽掣或心虛煩躁天南星三兩真珠母一錢製半夏六兩真琥珀枯礬各五錢大硃砂一兩研為衣上為末生薑自然汁煮麵糊為丸桐子大每服三十五丸淡薑湯下心氣狂甚加鐵粉一兩氣不順人參湯下驚悸金銀器灶心土湯上氣煩躁淡竹葉麥門冬湯寧心定氣石菖蒲痰盛喘急桑白皮湯下治小兒急驚麥門冬青竹葉慢驚冬瓜仁木香湯下鐵粉散出聖惠方治風驚心神不安鐵粉光明砂天竺黃鉛霜各一兩上為末每服不拘時竹瀝調下半錢壽星丸一名琥珀丸出濟生方治心腹因驚神不守舍風涎潮作手足抽掣事多健忘舉止失常精神昏塞譫言妄語不得安臥或痰迷心竅妄語如有所見並宜服之天南星一斤先用炭火三十斤燒一地坑通紅去炭以酒五升傾坑內候滲酒中下南星在坑內以盆覆坑周遍用灰擁定勿令走氣次日取出為末一方用米醋沃之硃砂另研二兩琥珀另研一兩上研停生薑汁煮麵糊丸如梧桐子大每服三十丸加五十丸煎石菖蒲人參湯送下淡薑湯亦得食後臨臥服之或去琥珀亦效若心氣狂甚入鐵粉一兩一方治暗風以獖豬心血為丸人參或麥門冬湯下皆瘥一方用真金箔解毒雄黃丸一名雄黃救命丹治因風致驚眼斜反張手足瘛瘲背急發搐治驚癇風神情恍惚語言錯謬歌笑無度兼五臟積冷風毒寒熱用狐肉一片治如食法以豉汁中煮五味作羹或作粥多食並瘥一方以羊骨汁鯽魚共煮服之亦良密陀僧散出朱氏集驗方治風驚氣入心語言不能者密陀僧研如粉以茶調一錢一服即愈風狂附論夫風狂之狀始發則少臥不飢自高自賢自辨自貴蓋人之營衛周身循環晝夜不窮一失其平則有血並於陰而氣並於陽者有血並於陽而氣並於陰者陰陽二氣虛實不調風邪乘虛而入並於陽則謂之重陽故其病妄笑好樂妄行不休甚則棄衣而走登高而歌或至數日不食故曰狂也風邪入血使人陰陽二氣虛實不調若一實一虛則令血氣相併氣並於陽則為狂又肝藏魂悲哀動中則傷魂傷魂則狂妄不精不敢正當人而筋攣兩脅骨不舉毛悴色夭死於秋又云夫三陽並三陰則陽虛則陰實故癲三陰並三陽則陰虛而陽實故狂論曰陽入陰其病靜陰入陽其病怒則狂矣多陰陽氣暴折畜怒不決之所致故經曰陽明常動太陽少陽不動不動而動為大疾此其候也治要之法何曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落為後飯夫生鐵落者下氣疾也方珍珠散出聖惠方治風狂妄語心熱狂走不知人珍珠研牛黃研丹砂研各半兩金箔研銀箔研各五十片麝香研一分鐵粉研天竺黃研人參樟腦研各三分一作龍齒黃芩去黑心一兩防風去叉犀角鎊各半兩茯神去木三錢麥門冬去心焙一兩半遠志去心甘草炙胡黃連甘菊花白附子炮各三分白蘚皮羚羊角鎊各三兩上除研外搗羅末入研藥拌勻每服一錢匕漸加至二錢匕薄荷溫湯下或梨汁調下忌生血牛黃丸出聖濟總録治中風邪狂亂失志心多恐怖牛黃研一兩鐵精研三分虎睛研一對石膏研龍齒研各二兩銀箔研一百片金箔一百片與牛黃鐵精虎睛石膏龍齒銀箔再同研地骨皮茯神去木升麻玄參人參各二兩麥門冬去心焙三兩枳實去瓤麩炒葳蕤去土赤芍藥各一兩半生乾地黃焙甘草炙銼黃芩去黑心各二兩上除研外搗羅為末入研藥拌勻煉蜜為丸如桐子大食後煎枸杞根皮湯下二十丸日再服漸加至三十丸禹餘糧飲一名五邪湯出千金方治風邪所中驚狂啼哭或歌或笑禹餘糧煅研防風去叉桂去粗皮赤芍藥遠志去心獨活去蘆頭白朮人參牡蠣熬秦艽去苗土石膏捶碎甘草炙銼各二兩雄黃研一作黃丹茯神去木菖蒲蛇蛻炙防己各一兩上㕮咀每服五錢匕以水一鍾半煎取七分去滓食後服日再服牛黃丸出聖惠方治風狂喜怒不恆或欲狂走不自覺知牛黃研一分遠志去心白龍骨各一兩鐵粉研二錢龍腦研一錢甘草炙半兩茯神人參去蘆頭黃連去須鉛霜研犀角屑防風去蘆頭各一兩麥門冬去黑心一兩半硃砂一兩研水飛上為末入研了藥都令勻煉蜜為丸如桐子大每服不拘時以溫水下二十丸忌生血虎睛湯出聖惠方治風狂叫笑不時喜怒無常登高逾垣言語不避人虎睛一對慢火熬鴟頭並肝一具炙白茯