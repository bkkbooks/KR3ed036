半兩上粗搗篩每服三錢匕水一鍾煎至六分去滓溫服不計時龍虎丹出瑞竹堂治男子婦人心神恍惚陽明經大盛時復驚懼哭泣口發狂言不避親疏一切風病等龍骨研虎骨酥炙箭頭硃砂研人參遠志甘草水煮去皮酸棗仁炒去殼各一兩大天南星三四枚泔水洗浸去皮滑涎控干竹刀剜成罐裝硃砂末以南星末蓋之豬心一個取新殺獖豬帶血熱心納置南星在內以燈草裹豬心外用麥門冬草洗淨不以多少包之甑上九蒸九曝取出南星於金銀器內盛之取日精月華之氣暴露七晝夜搗羅為末後加余藥一同和勻上為細末用無灰酒打麵糊冷定和搜成劑丸如梧桐子大每服五七十丸空心溫酒送下小兒丸如黃米大每服三五十丸人參湯下病甚重者不過二十丸即愈除根不發乳香丹砂煎出聖惠方治心經風邪化上膈痰涎乳香鉛白霜牛黃丹砂龍腦各一分別用研犀角鎊別取細末再同上五味研令極細半兩升麻炒三十錢匕大黃末炒三十錢匕上拌勻煉蜜和作劑每服一皂子大用溫薄荷湯化下食後臨臥服羚羊角散出聖惠方治風邪入臟心神煩亂恍惚頭目眩痛羚羊角屑一兩防風去蘆頭二錢半芎藭二錢半茯神二錢半麻黃一兩半去根節石膏二兩羌活二錢半甘草一兩炙微赤銼上為散每服四錢以水一中盞煎生薑半分煎至五分去滓入竹瀝一合更煎三二沸不計時溫服桑螵蛸丸出聖濟總録治丈夫婦人心風癲邪桑螵蛸四十九枚醋浸炙令焦黃色酸棗仁石菖蒲阿魏研麝香研丹砂研蛇黃煅醋淬研各一分上為細末麵糊丸如小豆大每服十五丸至二十丸食後生薑薄荷湯下黃芩湯出聖濟總録治風邪心熱神不安黃芩去黑心一兩半麥門冬去心焙白茯苓去黑皮各二兩淡竹茹三分羚羊角鎊防風去叉各一兩半石膏碎研三分上為末每服六錢匕以水二盞煎取一盞半去滓下朴硝一錢匕食後分三服如人行四五里一服荊芥湯出醫方集成治一切風邪上攻頭目咽隔不利或傷風發熱頭疼鼻塞聲重並皆服之荊芥穗十二兩天麻去苗附子炮白附子炮烏藥當歸洗川芎各一兩上為細末煉蜜和丸每兩作十丸硃砂為衣服一丸食後細嚼茶清任下酒下亦得防己湯治久風邪入肝脾二經言語不轉漢防己防風桂心附子各半兩威靈仙三分麻黃半兩上為細末每服四錢水一盞煎至七分去滓溫服日三四用竹瀝荊瀝地黃汁各一盞生薑汁半盞和勻服之五邪湯治五邪氣入人體中鬼語諸妄有所語閃亂恍惚不足意志不定發作往來有時人參白朮茯苓菖蒲茯神各三兩上切以水一斗煮取三升先食服八合日三忌桃李雀肉羊肉餳酢物茯神湯出千金方治五邪氣入人體中見鬼妄語有所見聞心悸跳動恍惚不定茯神人參菖蒲茯苓各三兩赤小豆四十枚上㕮咀以水一斗煮取二升分三服防葵散出千金方治狂邪發無常披髮大叫喚欲殺人不避水火防葵人參貫衆各五兩防風桂心各三兩上㕮咀以水一斗煮取三升分四服稍服亦可治狐貍出千金方諸色精魅作種種惡鬼令人恐怖狂癲風邪方雄黃六升油一斗二升上破雄黃如棋子大鐺中以盆合頭作灶微火煎九日九夜不得少時火絶亦不得火冷灶火熱微不絶神驗蝦蟆散出千金方治風邪不識人不能語者用蝦蟆燒灰硃砂等分每服一錢水調下日三四服一方無硃砂治風邪出聖惠方不識人不能語者用燒人屎灰酒服慎生冷酢滑豬雞魚蒜等及治癲狂伏龍肝湯出肘後方治風邪苦參丸出肘後方治狂邪發作無常披頭散髮大叫欲殺人不避水火用苦參為末以蜜為丸如梧桐子大每服十丸薄荷湯下治心虛風邪所乘精神恍惚健忘方出十便良方用鏵鐵四斤久經用者以炭火燒令赤投水如此七遍即堪打碎如棋子大以水二斗浸經二七日每服水一盞日三一方投醋中商陸丸出千金方治中風邪狂用商陸根生去皮稱十二斤半細切以水一石向東鍋灶內煎減半去滓更以緩火煎如膏可丸即丸如桐子大每服熱水下十丸加至十五丸合藥時勿令雞犬婦人見未效即加二十丸至二十五丸又方可服莨菪方及大豆紫湯皆以汗出為度又一方以竹瀝下十丸白兔藿香飲主風邪熱狂用白兔藿香宜煮服之干則搗末敷諸毒妙又方出聖惠方用伏龍肝研細每服一錢以水調下日四五服桂附丸出衛生寶鑑治風邪冷氣入乘絡或臟腑暴感風寒上乘於心令人猝然心痛或引背膂乍輕乍甚經久不差川烏頭三兩炮去皮臍黑附子三兩炮去皮臍乾薑二兩炮赤石脂二兩蜀椒去目二兩微炒開節桂二兩去粗皮上搗為末蜜和為丸如梧桐子大每服三十丸溫水送下覺至痛處即止若不知加至五十丸以知為度若早服無覺至午時再二十丸若久心痛每服三十丸加至五十丸一盡劑終身不發治風邪通潤骨髓出本草方以醍醐服之補五臟逐十二風邪惡氣並治濕風出本草方以鱔魚常作臛空腹飽食便以衣蓋臥少頃當汗出如白膠汗從腰腳中出候汗盡暖五木湯浴須慎風一日更三五日一服
