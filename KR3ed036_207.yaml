body:
  text: 卷二百七泄痢門總論難經云有胃泄有脾泄有大腸泄有小腸泄有大瘕泄蓋胃者為黃胃水穀海也故瀉則色黃食不化脾者為胃行其津液者也故瀉則腹脹滿嘔吐大腸謂白腸故瀉則大便色白腸鳴切痛小腸謂赤腸故泄則便濃血少腹痛瘕者血聚也濁陰之氣結聚於內留滯而不行則裡急後重數至圊不能便故謂之大瘕泄也胃為水穀之海其精英則流布以養臟腑其糟粕則傳送以歸大腸腸胃虛弱或挾風或挾寒或傷暑傷熱停冷蓄熱冷熱不調泄瀉諸症皆能致之挾風者自汗惡風痛引腰背挾寒者筋節拘急身體怯寒傷暑者面垢燥渴渴引水漿傷濕者肌肉虛浮肢體重著冷則腸鳴肚冷而手足涼熱則腸燥肚熱而手足溫冷熱不調者乍澀乍溏由熱積於內不能去其積徒以冷藥水飲之熱氣無所發泄故冷與熱兼而下注其或冷積於中不能去其滯徒以熱藥壓之冷積不得宣故熱與冷合而成瀉泄或澀或溏裡急後重是其候也外此則傷食一症失飢傷飽胃不能消心腹膨脹所下酸臭治法當究其感受之源然後為之施治不究其源吾恐決潰四出莫知其終矣然腸胃合氣以消水穀水穀既分安有所謂泄人皆以泄為脾恙而不知腎病有泄焉腎瀉何如曰腹痛無定似痢非痢骨弱面黑腳下時冷者是也諸泄瀉用不換金散服除濕湯之類以去風濕以安腸胃此上品藥也次則溫脾養胃之劑投之是為正法然用之而不作效抑且腹痛走上走下或臍間急痛腰脊疼酸骨節軟弱面色黧悴尺脈虛弱病安在哉曰此腎泄也當以破故紙生薑官桂乾薑木香當歸輩主之仍用安腎丸為佐其或腎水下涸心火上炎燥渴口苦多飲無度此陰陽離絶也識者憂焉至若泄痢之後腹滿身疼是則為表裡俱病先當溫里急與四逆湯然後解表急以桂枝湯與之肝木脾土木能勝土古人慮之固也經肝腎氣虛為病泄瀉亦孰知腎者所以守司於下而肝者又門戶要束之具束則不瀉也不然泄瀉而面色青慘者古書謂肝經所受致寒時用當歸厚朴湯以主之果何意哉太素曰五泄有溏泄鶩泄飧泄濡泄滑泄也此乃是五泄者青是感肝木之象其色青赤者受心火之氣其色赤白者得肺金之氣其色白黃者得脾土之氣蒼者土氣之下其色黃腎水隨之其色蒼也泄瀉之症經中所謂飧泄濡泄溢泄水穀注下是也大腸為五穀傳送之官脾胃虛弱飲食過度或為風寒暑濕之氣所侵皆能令人泄瀉如傷於風其脈必浮下必帶血當以胃風湯驅散之如寒氣所傷脈必沉細腹肚切痛下必青黑當以附子理中湯治中湯等溫暖之若傷於暑則脈必沉微煩渴引飲其下如水當飲服五苓散來復丹以分利之或夾食則又當以胃苓湯下蘇感丸若濕氣所中其脈沉緩腰腳冷痹小便不利則其下黃黑色當以滲濕湯藿香正氣湯調之因停食而泄者下必臭類抱壞雞子或噫氣作酸先服感應丸推其食積而後理脾氣體虛弱及年高之人脾氣虛敗而自痢者又當投以四柱散蔻附丸若脾腎氣虛清晨泄下一二次二神四神丸主之又有腎氣虛而泄者又須金鎖正元丹以固之凡治瀉之法先理其中焦分利水穀然後斷下醫之大法如此若腳氣泄瀉各以類求滑泄一症最忌五虛五虛者脈細皮寒少氣前後泄痢飲食不入者是也若得糜粥入胃泄瀉止則可治也五泄之病胃小腸大瘕三症皆以清涼飲子主之其泄自止厥陰症加甘草以緩之少陰症裡急後重再加大黃又有太陰陽明二症當進退大承氣湯主之證不能食也當先補而後泄之乃進藥法也先煎厚朴半兩制水煎二三服後未已謂有宿食不消又加枳實二錢同煎二三服泄又未已如稍進食尚有熱毒又加大黃三錢同煎泄止住藥如泄未止為腸胃有久塵垢滑黏加芒硝半合宿垢去盡則愈也陽明症能食是也當先泄而後補謂退藥法也先用大承氣湯伍錢水煎服如痢過泄止既服芒硝後熱稍退減大黃一半再煎兩服如熱氣雖已其人必腹滿又減去大黃與枳實厚朴湯又煎三兩服如腹滿退泄亦自愈後服厚朴湯數服則已如大便虛滑久不愈太陰傳少陰為痢為賊邪宜以厚朴枳實湯主之儒門事親書云東門一男子病泄痢不止腹鳴如雷不敢令坐坐則下注如傾諸醫例斷為寒症乾薑官桂丁香豆蔻之屬枯礬龍骨皆服之矣何針不燔何艾不炷遷延將二十載矣一日問於戴人戴人曰兩手寸脈皆滑余不以為寒然其所以寒者水也以茶調散湧寒水五七升無憂散泄積水數十行乃通因通用之法也決以五苓散淡劑滲泄通利之又以甘露散止渴不數日冷食寒飲皆如故此法王啓玄稔言之奈無人用之哉而又云凡大人小兒暴注水痢不止內經曰此名曰暴注速瀉久而不愈者為洞瀉注下此乃火運太過之病也火星暴注故也急宜用新汲水調下甘露飲子五苓散天水散或用井花水煎此藥於冷服之病即瘳矣不可用御米殼乾薑豆蔻聖散子之類縱然泄止腸胃氣滯不通變為腹脹此法宜分陰陽利水道乃為治法之妙也凡泄瀉水穀不化日夜無度腹中雷鳴下痢丸散可用導水丸禹功散泄之或病人老弱氣虛可用無憂散泄之再觀病勢強弱候三日可服胃風湯以治其風如不愈者更服桂枝麻黃湯汗之則愈內經曰夫風之中為腸風飧泄啓玄子云風入胃中上熏於胃故食不化而作泄又云暮食不化為飧泄故風宜出汗腸中鳴者風以動之動而有聲慎不可用罌粟豆蔻乾薑大燥之藥病濕者燥之去其濕則愈病甚者攻之不動反能為害經曰其減則漸其加則甚可用五苓散去豬苓加人參凡下痢膿血腹痛不止者何也諸痛癢皆屬於心火也可用通解丸加減瀉之量其虛實用之次用消濕散加生薑大棗芍藥服之瀉訖又用新汲水調五苓散服之又一法煎燈心湯調下益元散五七錢此病大忌油膩葷腥熱物夫瀉痢兩症因腸胃先虛虛則六淫得以外入七情得以內傷至於飲食不節過食生冷多飲寒漿動擾腸胃則成注下注下不已余積不消則成滯下治瀉之法先當分利水穀車前子煎湯調五苓散是也次則上焦中焦正中湯及治中湯是也理中不效方可斷下乳豆丸固腸丸是也或尚腹痛未宜斷下斷下太早必成痢疾惟當調中化積痛輕者宜服治中湯蘇合香丸腹痛更甚者必然成痢也醫經所謂腹痛甚者必下痢也宜進靈砂丹以逐其積此丹用之屢驗瀉者止疼者愈有疾者內化且不動臟腑大凡痢疾不先去積雖獲暫安後必為害或陰陽相搏冷熱不調而成瀉痢者當進香連丸更有脾腎頓虛腹脅膨脹飲食不化而泄瀉者宜助脾腎棗肉丸是也今之人久瀉不止多投來復丸誤矣蓋來復內用硝石硫黃皆有利害青皮陳皮又有導性豈宜服之如夏月暴瀉乃可服也臟腑泄痢其症有多種大抵從風濕熱也是知寒少熱多故曰暴泄非陰久瀉非陽溲而便膿血知氣行而血止也宜大黃湯下之是為重劑黃芩芍藥是為輕劑治法宜補宜泄宜止宜和和則芍藥湯止則訶子湯有暴下無聲身冷自汗小便清利大便不禁氣難喘息脈微嘔吐急以重藥溫之漿水散是也後重則宜下腹痛則宜和身重者除濕脈洪者去風膿血稠黏以重藥竭之身冷自汗以毒藥溫之風邪內縮宜汗之鶩溏為痢當內之在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之盛者和之去者送之過者止之除濕則白朮茯苓安脾則芍藥桂枝黃連當歸宜通其氣則檳榔木香如泄痢而嘔上焦則生薑橘皮中焦則芍藥當歸桂茯苓下焦則治以輕熱藥甚以重熱藥若四肢懶倦小便少或不利大便走沉困飲食減宜調胃去濕白朮茯苓芍藥三味水煎服如發汗惡寒腹不痛加黃芩為主如未見膿而惡寒乃太陰欲傳少陰也加黃連為主桂枝佐之如腹痛甚者加當歸並芍藥如見血加黃連為主桂當歸佐之如煩躁或先便血後白膿或發熱或惡寒非黃連不止此上部血也如惡寒脈沉或血腰痛或血臍下痛非黃芩不止此中部血也如惡寒脈沉先血後便非地榆不能止此下部血也唯脈浮大者不可下至冬赤白痢者是冷熱乘於血血滲腸間與津液相雜而下甚者腸虛不復故赤白連滯久不瘥也凡痢久不瘥脾胃虛弱則變嘔噦胃熱氣逆故嘔也氣逆外有冷折不通故噦亦變為䘌蟲食人五臟也三尸九蟲常居人腸胃腸胃虛則動上食於五臟則心懊憹而悶齒齦唇口並生瘡下食於腸則肛門傷爛而穀道開也輕者可治重者致死大腸蟲痢者冷熱之氣也在腸間先下赤後下白連年不治侵傷於臟腑下血雜白如病蟲之狀名為腸蟲也有休息痢者胃脘有停飲因痢積久或冷氣或熱氣乘之氣動於飲則飲動而腸虛受之故為痢也冷熱氣調其飲則靜而痢亦休腸胃虛弱易為冷熱其邪氣或動或靜故其痢乍發乍止為之休息痢也夫水穀之精化為血氣津液以養臟腑受風邪入腸胃故痢則津液空竭臟腑虛燥故痢而兼渴也渴而引飲即痢不止翻益水氣脾胃已虛不克消水水氣流溢侵漬肌肉則變成瘇也病有數種有水痢有谷痢有血痢有膿痢有膿血相和痢有腸澼痢其水痢者本由脾氣熱消穀作水穀氣不停便生此痢谷痢者由脾氣冷穀氣不消而生此痢血痢者毒熱在腹血流入腸故有此痢膿痢者由積冷所致膿血相和痢者由冷熱相擊便致此痢腸澼痢者由積冷在腸間垢洟不能自固便有此痢色數雖多其源則一皆緣飲食不節將息失宜也腸垢者腸間津液也由熱滯蘊積腸間虛滑所以因下痢而便腸垢也診下痢之脈如微小者生浮洪者死沉弦者下重脈大者未止緊者邪氣未解脈弱而微渴必自愈腸澼下膿血者脈宜微滑也若弦急者必死手足厥冷無脈灸之不溫脈不還反微喘者死身寒者生發熱者死臨病之際由此驗治之萬不失一下痢脈滑而數有宿食當下之下痢脈遲而滑者實也利為未止宜急下之下痢脈反滑當有所去下乃愈下痢不欲食者有宿食當下之下痢而腹痛滿為寒實當下之下痢腹中堅者當下之下痢而譫語者腹內有燥屎宜下之下痢二部皆平一作浮按其心下堅者急下之下痢已瘥至其年月日時復發者此為下不盡更下之愈風寒下痢者不可下下之後心下堅痛脈遲此為寒但當溫之脈沉緊下之亦然脈大浮弦下之當已下痢脈浮大此為虛以強下之故也設脈浮滑者因爾腸鳴當溫之下痢脈遲急為痛未欲止當溫之得冷者滿而便腸垢下痢身軀疼痛急救里諸溫之屬可與理中四逆附子湯熱藥下痢大孔痛者當溫暖之下痢腹脹滿身軀疼痛者先溫其里乃攻其表下利清穀不可攻其表汗出必脹滿下痢氣者當利其小便下痢脈反浮數尺中自澀其人必清濃血下痢脈數而渴者今自愈設不瘥必清膿血有熱故也下痢脈沉弦者下重其脈大者為未止脈微弱數者為欲自止雖發熱不死下痢脈沉而遲其人面少赤下利清穀必欲冒汗出而解病人必微厥所以然者面戴陽下虛故也下痢有微熱而渴脈熱者今自愈下痢脈數有微熱汗出今自愈設脈緊為未解下痢脈反強發熱身汗者自愈下痢脈大浮弦下當已下痢舌黃燥而不渴胸中實下不止者死下痢後脈絶手足厥冷晬時脈還手足溫者生不溫者死下痢手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負跌陽者為順凡六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者下不自禁下甚者手足不仁也痢與瀉名目不同而感受之源一也治療之劑大要以散風邪行滯氣開胃脘為先不可遽用肉豆蔻訶子白朮輩以補住寒邪不可遽投罌粟殼龍骨牡蠣輩以閉塞腸胃邪氣得補而愈盛補之愈盛而愈作不為纏擾撮痛則為裡急後重所以日久延淹而未已也痢之赤白其赤者熱乘於血血滲大腸則赤也若風邪挾熱則所下黃而赤其白者冷搏腸間津液凝滯則白也若寒邪並之則所下白而黑冷熱相交故赤白相半重者狀若膿涎而血雜之輕者膿涎中間微有赤縷是也內挾風邪故清血流注或濕毒乘虛入腸胃之間則下如豆汁或有瘀血是也論者以手足寒為冷手足溫為熱於理甚當亦當以赤白而並觀之雖然風寒暑濕感之於外者也其大嚼而傷飽而宿酒漿醯以成積滯房闥縱情加奔走勞役以耗精血非此病之生於內者乎必明別內外而推度之則受病淺深用藥輕重知有定向矣下痢壯熱須用敗毒散加陳米間與五苓散黃連阿膠丸下痢雖曰有積有暑如用藥不效即是腸胃有氣邪熱者赤毒者與敗毒散冷者白者不換金正氣散加木香若下痢熱極煩並窘痛或久不愈諸藥不能者須下之以開除濕熱痞閉積滯而使氣液宣行者宜以遂之以宣利積熱也凡治痢不可拘於無積不成痢之說也專以去積為先豈有一歲之內獨於夏秋之間人皆有積亦須明其脈體之由辨其風寒暑濕所中蓋風邪入胃水來勝土不為暴下則為痢疾其疾所發症候不一有赤痢白痢赤白痢冷痢熱痢蠱痢氣痢噤口痢積痢血痢久痢休息痢膿血痢五色毒痢凡下痢赤黃但欲飲冷小便順利得熱則更極心煩燥喜渴脈虛大而數或沉實有力由乘虛熱入於胃湊於下焦津液不分並於大腸謂之協熱痢先以小承氣湯一二服蕩之次以五苓散加車前子以利小便次以黃連阿膠丸治之治痢陟釐丸烏梅丸松皮散等暴痢服之何有不瘥其溫脾湯健脾丸若不用之焉能得愈大凡痢有四種謂冷熱疳蠱冷則白熱則赤疳則赤白相雜無復節度多睡眼澀蠱則純痢瘀血熱則多益黃連去其乾薑冷則加以熱藥疳則以藥吹灌下部蠱毒則以蠱法治之藥既主對相當痢者復自勉勵服餌焉有不愈者哉方炙肝散治脾胃虛弱五癆七傷肌體羸瘦全不思食久患泄瀉腸滑不止心胸滿悶臍腹疼痛或便膿血困倦無力四肢沉重及心勞口瘡並皆治之木香白朮生犀角山茵陳去梗白豆蔻縮砂仁桂去粗皮人參去蘆頭黑附子炮裂去皮臍石斛銼炒狗脊去皮川芎良薑柴胡去苗訶子炮去核草豆蔻炮裂去皮臍各一兩半陳皮去白白芍藥乾薑炮桔梗防風紫菀去土紫參去皮白蕪荑炒去皮吳茱萸洗焙乾各半兩上為末每二錢羊肝二兩去筋膜薄批摻藥入蔥白生薑食鹽各少許拌勻文武火煨熟用粥下食前日二服木香豆蔻丸治臟腑冷極久冷傷胃口瘡下泄米穀不化飲食無味肌肉消瘦心多嗔怒婦人産後虛冷下泄及一切水泄冷痢脾泄此方於東坡家藏方內言用此藥與人莫不神應備録病愈人名姓茲不備述豫用此方十餘年無不取效脾瀉者即愈而瀉痢只一服見效惟熱痢熱瀉不治蓋藥主熱也隨症用之木香破故紙各一兩良薑七錢半砂仁七錢半厚朴七錢半赤芍藥半兩陳皮半兩官桂半兩白朮半兩胡椒二錢半吳茱萸熱水洗三錢半肉豆蔻四個檳榔一個上為末用漿水煮豬肝和藥搗勻仍用些麵糊為丸如梧桐子大每服五七十丸空心熬稀米粥飲送下訶黎勒丸治五泄痢訶黎勒半生半煨並去核肉豆蔻去殼木香各三分乾薑炮甘草炙銼各半兩上為末煮醋糊丸梧桐子大每服二十丸至三十丸米飲下鍾乳健脾丸治男子婦人虛損羸瘦身體沉重脾胃冷弱飲食不消腹脹雷鳴泄瀉不止又治腸虛積冷下利清穀或下純白腹中疼痛及久痢赤白腸滑不禁少氣羸瘦不思飲食並宜治之肉桂去粗皮人參去蘆黃連去須乾薑炒龍骨各一兩蜀椒去目及閉口者微炒出汗五兩當歸去須石斛去根各一兩大麥糵炒一兩附子炮去皮臍三錢細辛去苗土茯苓去皮神麯碎炒赤石脂各一兩鍾乳粉一兩半上為末入鍾乳粉和勻煉蜜為丸如梧桐子大每服三十丸食前服溫米飲下日三服一方通治男女集驗無細辛龍骨丁香豆蔻散治脾胃虛弱宿寒停積或食生冷物內傷脾胃泄瀉注下水穀不化胸滿氣短嘔逆噁心臍腹㽲痛脅肋脹滿腹內虛鳴飲食減少及積寒久痢純白或白多赤少日夜無數或脾胃虛寒泄瀉日久愈而復發者並宜服之京三稜炮木香不見火厚朴去粗皮薑汁製芍藥肉豆蔻炮人參乾薑炮茯苓白者去皮各五兩甘草炙吳茱萸湯泡七次焙丁香各二兩蒼朮去皮七兩上為細末每服三錢水一盞姜三片棗一枚同煎至八分空心食前溫服不及煎入鹽少許湯點服亦得白朮聖子散治一切瀉痢久不瘥並婦人産後痢亦治御米殼三兩蜜塗當歸乾薑炮石榴皮甘草訶子肉豆蔻陳皮去白白朮縮砂仁芍藥各等分上為末每服二錢水一大盞入乳香少許同煎和渣服固腸丸治痢及泄瀉肉豆蔻面里煨龍骨煅研水飛阿膠阿粉炒木香濕紙裹煨附子炮乾薑炮製赤石脂煅七次醋淬碎人參去蘆以上各一兩沉香半兩鎊不見火白朮二兩炒訶子去核三兩上為末粳米糊丸如梧桐子大每服七八十丸空心米飲下服藥後覺熱去附子加茱萸一兩黃連一兩大溫脾丸治脾胃虛弱冷氣攻衝飲食不化心腹脹痛嘔吐吞酸痞噎及腸鳴泄痢水穀不分面黃肌瘦食減嗜臥並皆治之常服溫脾益胃消穀進食如久虛痼冷食少多傷尤宜常服吳茱萸湯泡七次焙大麥糵炒肉桂去粗皮各五兩甘草炙桔梗人參乾薑炮各三兩附子炮去皮臍細辛去苗各二兩枳實麵炒一分半神麯碎炒三兩一錢上為細末煉蜜丸梧桐子大每服二十丸溫酒下米飲亦得日三服空心食前一方用枳殼訶黎勒散治泄痢無度訶黎勒母丁香各五枚甘草炙銼一錢肉豆蔻面里燒一枚上為散米飲調下半錢食前服纏金丹和劑方治大人小兒一切瀉痢無問冷熱赤白連綿不瘥愈而復發腹中疼痛者咸宜服之方濟一名不二丸硇砂一方無乳香各二錢半杏仁去皮尖巴豆去皮心膜出油各八錢半黃蠟硃砂各一兩木鱉半兩白膠香一錢黃丹二兩半砒霜醋煮煅三錢半或研磁罐子以赤石脂固縫鹽泥固濟燒通赤候冷取出上為細末熔蠟攪和丸如麻子仁大每服一丸小兒半丸水泄新汲水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下每服宜臨臥服孕婦莫服忌熱物一二時辰一方熔蠟為劑入油二十點令軟油單裹旋丸肉豆蔻丸出御藥院方治腸虛脾弱停積風冷大便泄瀉水穀不化腹脅脹痛下痢膿血遍數頻頻裡急後重嘔逆噁心肢體困倦飲食減少肉豆蔻麵裹煨黑附子炮去皮臍川薑炮桂去粗皮硫黃研白朮炒當歸去蘆頭各一兩川烏頭炮去皮臍白豆蔻各半兩訶子皮一兩上為細末醋麵糊丸梧桐子大每服三十丸空心米飲下水煮木香丸仁存方治腸胃虛弱風濕進襲泄泄水穀滯下膿血㽲刺疼痛裡急後重日夜無度及純下白痢淡紅黑痢當歸洗白芍藥甘草炙訶子去核各半兩青皮陳皮各一兩縮砂仁木香炮各一分厚朴去粗皮切薑製一兩罌粟殼切醋淹炒五兩上為末蜜丸一兩作五丸每服一丸水一盞煎七分食前溫服凡血得熱則淖溢故行得寒則凝滯故瘀當審其風熱風冷二症與蠱痢大別外有血痔血枯肉衄酒利肺疽腸胃大蓄遠近瘀血等各有門類不可混雜積冷積熱及水熱實而下痢者以大黃湯下之養生方亦云疏滌之使不知有寒熱風濕虛實之不同若隨意妄用被害多矣籲可傷哉一方有乾薑無縮砂仁厚朴白朮調中丸瑞竹堂治脾胃不和心下堅痞兩脅脹滿臍腹疼痛噫宿腐氣霍亂吐瀉米穀不消久痢赤白膿血相雜多日羸瘦不思飲食神麯四兩炒白朮半兩人參去蘆白茯苓去皮豬苓去黑皮澤瀉各三錢木香二錢官桂去粗皮一錢半甘草去皮炙一兩乾薑炮一兩上為末麵糊丸梧桐子大每服五七十丸空心淡薑湯下加味六君子湯出德生堂治一切脾胃虛熱泄瀉之症及傷寒病後米穀不化腸中虛滑發渴微痛久不瘥者及治小兒脾疳泄瀉得痢人參白朮白茯苓甘草黃耆山藥砂仁各一兩加厚朴七錢半肉豆蔻麵炒研七錢半上為末每服二錢飲水調服不拘時如熱煎麥門冬水調服震靈丹出直指方治脾瀉腹痛無定處似痢非痢骨痛面黧腰腳時冷禹餘糧火煅醋汁淬不計遍次手捻碎為度丁頭代赭石如上修制赤石脂紫石英杵碎以上各四兩入於鍋內以瓦蓋鹽泥固濟候乾用硬炭一十斤煅通紅火盡為度入地坑內出火毒二宿研末用滴乳香別研沒藥五靈脂並去砂石研各二兩硃砂一兩研上併為細末糯米粉糊丸小雞頭子大風乾每服三丸用炒故紙入棗湯調鍾乳粉少許空心下小兒腎泄白膿褐汁面黯齒脫畏人怯寒震靈丹末入紫鍾乳粉以棗煎炒故紙取熱汁調下胃風湯出直指方治大人小兒風冷乘虛入客脾胃風散氣故血行大腑多便鮮血水穀不化泄瀉注下腸胃濕毒下如豆汁腹脅虛滿腸鳴或下瘀血日夜無度臍腹㽲痛腸風下血婦人下血過多面黃力倦服此尤能滋補但味甜恐傷穀氣耳人參白朮茯苓當歸芍藥桂心芎藭各二兩防風半兩上羅勻每服三錢水一大盞陳粟米百餘粒煎取七分去滓熱服小兒量力與服今人多用此治痢止瀉者皆非所宜但血痢脾胃虛弱宜服瘧痢皆生於脾虛而有痰外冒風暑致陰陽分爭寒熱更作休作有時病名曰瘧若脾胃虛而受積內挾風暑致臟腑不調赤白雜下登廁頻數病名曰痢痢瘧二病外證雖不同要知皆能傷耗氣血治瘧之法當先分陰陽然後與之驅絶治痢之法當先除積滯然後與之調止由是而知痰者瘧之根積者痢之源治之者必先其要可也一方有甘草無防風易簡加減胃風湯又云若加熟地黃黃耆等分足為十味名十補湯若虛勞嗽加五味子若有痰加半夏若發熱加柴胡若有汗加牡蠣若虛寒加附子若寒甚加乾薑皆依本方等分若骨蒸發熱飲食自若者用十補湯加柴胡二兩服之者氣短加人參若小便不利加茯苓若脈弦澀加川芎若惡寒加官桂若脈澀加當歸若腹痛加芍藥若胃熱濕加白朮潔古云黃芩防風為上使黃連為中使地榆為下使若血瘀色結者陳血也加熟地黃若血鮮色紅者新血也加生地黃若寒熱者加柴胡肌熱者加地骨皮若脈洪實痛甚者加酒浸大黃一方無防風當歸散出危氏方住瀉痢地榆陳皮罌粟殼去蒂萼瓤當歸去尾赤芍藥甘草肉豆蔻煨黃連上各等分為末每服二錢冷水調服沒石子丸出危氏方治臟氣虛弱大腸滑泄次數頻仍日漸羸瘠不進飲食或久患赤白痢脾瀉等病並皆治之白朮白茯苓各二錢白姜切作片子炒赤白脂別研丁香不見火訶子濕紙裹炮取淨皮各二錢肉豆蔻麵裹炮沒石南番者面炮各二兩上和勻用湯泡蒸餅為丸梧桐子大每服三四十丸米飲吞下食前一日三四服棗肉丸亦得感應丸出仁存方治臟腑停積臍腹疼痛米穀不化下痢赤白泄瀉注下丁香木香各一兩半肉豆蔻二十枚百草霜研二兩巴豆七十粒乾薑炮一兩杏仁一百四十粒去皮尖研成膏上除巴豆百草霜杏仁外余為細末和勻用好蠟六兩溶濾去滓更以好酒煮蜜蠟溶俟冷取出稱用凡春夏用清油一兩至秋冬用油一兩半熔蠟作汁和藥末搗成劑旋丸如緑豆大每服十丸加至三十丸米飲下薑湯亦可食前服三五丸地榆湯聖濟總録治泄痢無問老小地榆銼酸石榴皮甘草炙銼各三分阿膠炙燥半分龍骨半兩白石脂半兩赤芍藥三分厚朴去粗皮生薑汁炙三分上搗篩每服五錢水一盞半煎一盞去滓空心日午溫服斷痢散治一切瀉痢腹痛久不瘥肉豆蔻丁香乾姜炮各二錢半甘草炙陳皮訶子去核各一兩御米殼去蒂蜜浴炒三兩上為末每服二錢半水一盞乳香一粒粟米百粒同煎至七分去滓服食前霍亂吐瀉冷水服大聖金真散出宣明論治一切寒熱赤白痢疾溏泄等御米殼半斤炒乾薑半兩炮甘草