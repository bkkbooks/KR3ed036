下四錢不計時候日三服宜服肉面羹粥催生用溫油漿調下三錢並二三服以産為度或死胎不下者煎三一承氣湯一服調下五錢須臾更頻用溫油漿調服前後俱下胎可活産母也凡難産或死胎不下皆由風熱燥澀緊斂結滯不能舒緩是故産戶不得自然開也其藥力至則熱結頓開而産矣慎不可溫補而反生燥熱也俗未知産後日夜損血疼痛怖懼以致神狂氣亂則陰氣損虛邪熱太甚而為諸症由不明素問造化故不識症候陰陽反以為産後諸虛百損便為虛冷而無熱也誤以熱藥溫補或見渴甚者不令飲水本為善心但為害多矣豈知治病之道俱以臨時審其臟腑六氣虛實明其標本如法治之而已矣此藥之常多用雖為效至大俗以病異藥同將為妄行反招侮慢今用若加黃丹令桃紅色是以名之紅玉散若加青黛令輕碧色名碧玉散若加薄荷葉末一分同研名雞蘇散主療並同但以回避愚俗之妄侮耳二勝丸名香豉丸出宣明論治泄瀉虛損不問新久者治痢亦可鹽豉紫薑去皮各等分上同杵為膏丸如梧桐子大每服三丸至五丸米飲湯下如未愈赤白痢腹脅痛更與杏仁丸一方用豆豉丸服五十丸杏仁丸出指南方治一切赤白瀉痢腹痛裡急後重者杏仁巴豆去皮各四十九個上藥同燒存性研細如泥用蠟匱定旋丸如桐子大每服一二丸煎大黃湯下間一日一服一方無蠟匱醋糊為丸梧桐子大每服一丸米飲下勝金膏出宣明論治一切泄瀉痢不已諸脈浮洪者及多日不已脈小者立止巴豆皮楮實葉同燒存性上為末蠟蜜丸如緑豆大每服五丸煎甘草湯下消內靈砂丹治瀉痢去積滯黃蠟一兩巴豆十四枚去殼作兩片入黃蠟內熬巴豆黑為度上件去巴豆不用將硇砂二錢用水煮乾只用一錢重仍入黃蠟並再熬就入硃砂末一二錢以黃蠟紅為度候冷刮下如用時旋丸小兒三錢只服十丸如黍米大大人服十丸如大麻子大白痢白薑湯下赤痢甘草湯下空心服如病人身體涼脈微弦細皆是好症便用此藥止如病人身上有冷熱初不可便止先服前藥十丸次服五苓散加車前同煎三服小便清退盡熱方可再用前藥止住如尚有熱止之決不住反生疼痛如止了熱而又不止住者可用後藥治瀉痢用正氣散一貼加烏梅棗子罌粟殼煎服治暴瀉痢用百草霜研末米飲調下止泄痢下食開胸膈痰實結氣下氣止渴用干橘皮一斤搗為末蜜為丸每食前酒下三十丸治下焦冷又取陳皮一斤杏仁五兩炒去皮尖合搗加蜜為丸每日食前三十丸下腑臟間虛冷及腳氣衝心心下結硬勝金丸治瀉久痢當歸二兩用吳茱萸一兩用炒香熟去茱萸不用只用當歸黃連三兩上為細末煉蜜丸如桐子大每服三十丸米飲下三神丸出和劑方治清濁不分泄瀉注下或赤或白臍腹刺痛裡急後重用臺烏頭三個去皮尖一個炮一個醋煮透一個燒成灰存性為末醋糊為丸如緑豆大每服二三十丸水瀉用逆流水下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下一方醋煮者只生用亦可一方云草烏水泄井花水並空心服忌腥臊熱毒生冷大人五七丸小兒三丸治泄痢並下痢赤白出仁存方用敗毒散陳米五十粒煎服治禁口痢妙一方加薑棗煎服一方治禁口痢晝夜無度脈勢遲者藥四錢陳米百粒姜三片棗二枚煎去滓食前溫服名倉廩湯經驗方陳氏曰余弟二子年十歲病用此藥一服效治寒熱泄痢瘴瘧寒邪氣泄下痢陰氣不足止渴及病酒頭痛用小豆花於鍋中煮三沸調和作羹食之肉豆蔻方治脾瀉以豆蔻二顆米醋面調裹之置灰中煨令黃焦和麵研末更以炒了檔子末一兩相和又焦炒陳倉米為末每用二錢煎作飲調前二物三錢旦暮各一服便瘥治泄痢益氣和中去當風臥濕遇冷所中等病用黃涼米作飯食之治瀉痢取艾葉三月三日採作煎其治冷者患冷氣取熱艾麵裹作餛飩大如彈子一方為干餅子生薑煎服白澤丸治脾元積冷臟腑虛寒真元不固腸虛泄痢心腹攢痛氣逆嘔吐自汗無時陽起石火煅通赤研附子炮去皮臍取末各半兩白檀香取末滴乳香別研麝香別研各一兩鍾乳粉揀好者二兩上和勻滴水成劑分作六十丸每服一丸水一盞化開姜三片煎至七分通口溫服食前空心一方附子只用一兩去麝香加天雄一兩炮去皮臍火輪散治虛滑泄下寒不禁及暴脫欲死案此方原缺藥味製法及服法治諸色瀉痢方出朱氏集驗方夏日臟氣不和而瀉宜以香薷湯調胃苓散若有裡急後重宜進胃氣湯加枳殼仍以麵炒去瓤若有積滯宜進蘇感丸若水瀉宜進酒蒸黃連丸梅膠丸出十便良方治瀉痢黃連四兩烏梅二兩訶子阿膠茯苓當歸各一兩上為細末湯浸蒸餅糊丸每服三十至四十丸泄瀉米飲下赤痢甘草湯白痢乾薑湯下固腸散主瀉痢日久不止羸不能食肉豆蔻生用木香不見火訶子炮去核乾薑炮阿膠炒陳皮去白罌粟殼醋炙各等分上為末生薑三片紅棗一枚煎至七分臨臥服御米丸出朱氏集驗方治一切瀉痢肉豆蔻訶子白茯苓白朮各一兩石蓮肉棗肉當歸各半兩罌粟殼一兩半蜜炙乳香一錢上為末水糊為丸每服三十五丸米飲下如血痢減豆蔻白朮當歸罌粟殼澤蘭散出朱氏集驗方澤蘭葉微炒川中謂之荀苗米囊皮薑汁或蜜汁炙去膜甘草炮蒿豉以五月五日用青蒿真艾葉各等分同豆豉搗亂餅之日乾上以清水一盞半煎再痢赤加黃連白加乾薑和氣飲出續易簡方治腹痛腸鳴泄痢蒼朮一兩四錢桔梗一兩二錢枳殼去粗皮微炒橘皮各六錢白芍藥白芷川芎當歸赤茯苓桂去粗皮半夏湯洗七次甘草炙各半兩厚朴去粗皮薑製乾薑各四錢吳茱萸炒半兩上銼散每服四錢水一盞半生薑三片煎至八分去渣食前通口服二滓並煎大霍香散出如宜方治心肺脾胃氣變泄痢心腹攢痛藿香木香青皮神麯肉豆蔻大黃柏人參甘草炙厚朴制乾薑半兩訶子制白茯苓陳皮各一兩上為末每服二錢陳米飲入鹽調熱服大治脾泄小丁香散出王氏博濟方治腸虛泄痢丁香一分附子一兩炮製去皮切作片子生薑去皮二兩細細切用上件三味除丁香外同於銚子內炒令黃色碾細為末每服一錢溫粥飲調下木香熱呷散廣南四時攝生治一切瀉痢木香半兩肉豆蔻一斤去皮濕紙里炮肉桂去無味者一分陳橘皮一分紫花術二分濕紙裹煨甘草炙半分上為散每服一錢水六分煎五六沸傾下熱呷如霍亂吐瀉不止入薄荷二葉同煎熱呷忌生冷物地榆散治瀉痢或血痢地榆微炒當歸微炒阿膠糯米炒黃連去須訶子肉炒取肉稱木香懷干烏梅肉去核稱淨以上各半兩上等分為末煉蜜為丸如桐子大每服二三十丸陳米飲吞下先公昔在括蒼病痢逾月得此方而愈余在霅上士人蘇子病此為甚其婦翁孫億來告急録此方以與旋即痊安致謝云蔻香丸出家藏經驗方和脾順氣止泄痢治腹疼並臟寒大便青色腹肚虛鳴頻並不止木香人參甘草炙各一兩罌粟殼蓋房炒黑色二兩肉豆蔻十枚醋麵裹煨黃赤色去面不用上為細末煉蜜為丸隨大小加減旋丸清粥飲化下無時服及療寒熱泄瀉驚風入脾霍亂吐瀉不納奶食大便不消化痢下赤白石榴皮煎湯化下臨時黃掌書元善三世醫小兒共有數十萬皆妙此一也吾家諸孫服之有效大人亦可服之溫中厚朴湯老人虛平時多腹脹心下痞有妨飲食或刺痛泄痢氣痞厚朴去皮細銼甘草細銼生薑細切洗青州棗切以上各等分上上二味杵令為末方入生薑棗再杵令勻然後取出以火焙至干再入鍋釜內慢火炒至紫色杵羅為細末每服一錢搽生薑少許沸湯點空心服以知為度氣味殊美兼愈腹疾治泄痢以建茶合醋煎服之止泄痢並渴以鉤粟子食之止瀉痢調中去熱健人用小麥面作餅食之止泄以甜藤葉搗汁服之治腸虛泄痢用五倍子為末熱湯服治痢泄以青蒿為末飯飲調五錢服之治四時暴泄痢四肢冷臍腹疼用坐深湯中浸至腹上頻頻作生陽佐藥無速於此虛寒人始坐湯中心戰仍常令只守
