body:
  text: 卷一百十一諸風門白癩附論夫白癩之候語聲嘶嗄目視不明四肢𤸷痹關節熱痛如火燔灼脊膂拘急肉如刀劈手足頑弱身體癮疹鼻生息肉目生白珠肉如針刺或生癮疹而色斑白故謂之白癩也方烏蛇散出聖惠方治白癩語聲嘶敗四肢𤸷痹瘙癢生瘡烏蛇酒浸去皮骨炙葛根銼各一分兩苦參紫參沙參人參芎藭天麻酒浸切焙乾黃芩去黑心木通銼地骨皮防風去蘆防己莽草葉白朮蒴藋木蘭皮去粗皮黃連去須附子炮裂去皮臍烏頭炮裂去皮臍牛膝去苗檳榔煨銼熟乾地黃切焙葳蕤芍藥桂去粗皮玄參堅者龍骨研石膏研如粉升麻菊花未開者微炒蒺藜子炒去角秦艽去苗土細辛去苗葉天雄炮裂去皮臍各二錢當歸切焙甘草炙銼遠志去心巴戟天去心蒼耳花炒乾各二分錢吳茱萸湯洗焙炒麝香研各半兩上為細散每服二錢匕空腹溫酒調下漸加至三錢匕晡時再服蝮蛇頭丸一名蝟皮丸出聖惠方治白癩鯪鯉甲丸出聖惠方治白癩鯪鯉甲三斤片炙微黃蝮蛇半條酒浸炙微黃斑蝥糯米拌炒微黃去翅足虻蟲炒微黃水蛭生蜘蛛生乾者附子各三兩二枚炮裂去皮臍蜈蚣一條炙微黃去足魁蛤半枚蠐螬三枚生雷丸十枚水銀與硝石點豬汁令研星盡硝石川大黃銼碎微炒桂心川芒硝麝香滑石龍骨礬石灰黃連各半兩去須石膏一兩細研水飛過巴豆十五枚去皮心研絹裹壓去油川椒一分去目及閉口者微炒去汗上為末煉蜜和丸如梧桐子大每服空心及晚食前以溫水下兩丸白花蛇散出聖惠方治白癩語聲嘶嗄目視不明四肢𤸷痹關節熱痛身體癮疹鼻生息肉白花蛇酒浸去皮骨炙二兩天麻槐子微炒羌活去蘆頭防風去蘆頭晚蠶砂微炒蔓荊實白蘚皮威靈仙去土枳殼去瓤麩炒各一兩甘草炙銼半兩上為細散每服一錢匕溫酒調下不計時候苦參酒出聖惠方治遍身白點搔之屑落或癢或痛白色漸展世呼白癩苦參去土皮心銼五斤露蜂房銼五兩蝟皮銼一具上用水六斗煮取三斗去滓細曲四斤半炊黍米三斗醞如常法酒熟每飲三合至五合日二夜一以瘥為度一方無蝟皮天麻煎出聖惠方治白癩風天麻生用一斤半天蓼木生用三斤上銼如大豆粒用水三斗五升煎至一斗壓去滓於銀器石器中慢火煎如稠餳每服半匙荊芥薄荷酒調下不拘時日二夜一一月見效治白癩塗方出聖惠方葛上亭長四七枚去翅足與糯米同炒米熟為度不用米為佳干蝮蛇一枚頭尾全者炙黃去鱗及腹中腸肚等物一作大蝮蛇上搗羅用生絹袋貯以酒五升甕瓶中慢火煮酒及一升以下將綿囊蘸藥汁摩塗癩上日二夜一如不急痛日夜可五七次塗之商陸酒出聖惠方治白癩大風眉須墮落八風十二痹著脈拘急肢節緩弱手足痹𤸷艾葉酒出肘後方治白癩亦治大風癩用干艾葉濃煮取汁每一斗米曲用艾葉五兩重隨曲米多少用煎濃汁拌浸醞如常法酒熟不拘時稍稍飲之常令酒勢相接醺醺然治白癩出聖惠方用馬鞭草不限多少為末每服食前用荊芥薄荷湯調下一錢服之良治白癩出本草以大蝮蛇一條勿令傷以酒漬之大者一斗小者五升以煻火溫令稍稍熱取蛇一寸許以臘月豬脂和敷上或以蝮蛇一條及他蛇亦得燒坐其上當有赤蟲如馬尾出仍取蛇肉塞內鼻孔中烏癩附論夫烏癩初覺皮肉變異肌腠之間淫淫躍躍如蟲行動眼前有物如絲懸布時發驚恐言語錯亂皮肉癮疹如桃李實或赤或黑手足𤸷痹不知痛所或腳下痛不可踐地凡食之時開口取氣而鳴語亦如是身體生瘡兩肘如縛此名黑癩皆由惡風日漸傷損血氣不營所致也方蝟皮丸出聖惠方治烏癩蝟皮一枚炙令黃海蛤一枚大者炙蚺蛇頭一枚炙黃虻蟲五枚去翅足炒鯪鯉甲炙五片蠐螬二枚炙一作生用葛上亭長去翅足炒十五枚一作生用水蛭五枚炒一作生用斑蝥十五枚將水蛭亭長斑蝥虻蟲四件共用糯米少許同炒米熟為度去米不用蜈蚣一條去頭足炙附子二枚炮裂去皮臍蜘蛛大者炙三枚雷丸十五枚巴豆七枚去皮心膜出油大黃銼如米粒醋炒半兩水銀半兩與丹砂同研點醋研令水銀星盡丹砂半兩研桂去粗皮半兩麝香半錢兩黃連去須半兩石膏研一兩蜀椒去合口者並目炒半兩芒硝生用別研一兩龍骨別研半兩滑石別研一分礬石枯研一兩甘遂一分與芝麻同炒麻熟為度去麻不用上搗羅及別研同拌和令勻煉蜜為丸如梧桐子大每服熟水下一丸至二丸空心臨臥各一服未效加一丸小便時莖中覺痛是蟲已化如涕下也痛多即止一丸痛少許加至三丸一方治白癩有硝石蟅蟲無斑蝥溫酒送下硫黃散出聖惠方治烏癩瘡久不瘥硫黃水浮石槐白皮寒水石白礬不灰木蝸牛子牡蠣金星礬石蟬殼銀星礬石握雪礬石密陀僧馬牙硝麝香雄黃亂髮灰蜂窠灰雌黃上藥各一錢唯白礬五錢搗研為末用水銀半兩以津唾殺研如泥別入膩粉一分以生麻油四兩都調令勻每於患處遍塗之效大黑神膏方出聖惠方治烏癩及諸癩遍身生瘡及多膿血川烏頭芎藭雄黃研後入胡粉研後入川升麻木防己雌黃研後入黃連去須白礬藜蘆黃柏各半兩巴豆去皮油杏仁各十四枚去皮松脂如雞子大亂髮如雞子大上細銼如大豆粒以豬脂二升並藥同煎以亂髮消盡濾去滓後入雄黃雌黃胡粉調攪令勻收入瓷閣中每取塗於瘡上一日至夜三度塗之每度熱鹽湯洗過然後更塗之勿令入口眼雄黃塗藥方出聖惠方治烏癩皮膚變黑生瘡腫痛殺蟲雄黃白礬紫石英白石英馬牙硝太陰玄精石金星礬石銀星礬石各一兩上為末入瓷盒中用白土泥固濟候乾用炭火五斤燒令通赤即止以蓋罨藥合候來日取出於濕地上紙襯盆蓋出火毒三復時再研如粉取楓樹膠煮汁和調每日塗之以瘥即止露蜂房酒一名苦參酒出聖惠方治烏癩葛葎草浴方出聖濟總録治烏癩葛葎草三稱銼細淘益母草三一稱銼細淘上葛葎取蘺垣上者益母草取近屋者用水二石五斗煮取一石五斗濾去滓盆甕中浸浴一時辰久方出著舊布袍用被衣覆之又再暖令熱復浸浴一時辰久方出入溫室著舊布袍被衣蓋覆汗出勿令見風明日復作如入湯後舉身瘙癢不可忍令旁人捉手勿令搔動食頃漸定後隔三日一浴其藥水經浴兩次即棄之馬先蒿散出聖惠方治烏癩苦參飲出聖惠方治烏癩用苦參根白皮五斤細銼如麻豆生絹袋貯以好酒三斗冬浸七日夏浸四日每用溫飲二合至三合日二夜一漸加至五七合雌黃散塗方治烏癩及殺蟲用雌黃半兩研以米醋和雞子清如膏塗瘡上干即更塗聖惠方用雞子黃大腹子膏敷方出聖惠方治烏癩用大腹生者二枚如無生者乾者亦得用皮全者勿令傷動以酒一升浸緩火熬令酒盡藥干搗羅為末煉臘月豬脂調和如膏敷之烏頭丸出衛生家寶方治宿患風癩遍身黑色肌體如木皮膚粗澀及四肢麻痹用草烏頭一斤放竹籮內以水浸將瓦子於籮內就水中礱洗之如打菱角法直候礱洗去黑皮及尖撈起令乾用麻油四兩鹽四兩入銚鍋內同炒黃色傾去油只留鹽並草烏頭再炒令黑色煙出為度取一枚劈破心內如米一點白恰好也如白多再炒趁熱杵羅為末用醋糊為丸如梧桐子大干之每服三十丸空心食前溫酒下大風眉須墮落附論夫大風病鬢眉墮落者皆從濕冷得之或因汗出入水得之或冷水入肌體得之或飲酒臥濕地得之或當風坐臥樹下及濕草上得之或體癢搔之漸漸生瘡經年不瘥即為風疾八方之風皆能為患客於經絡久而不去與血氣相干則使營衛不利淫邪散逸故面色敗皮膚傷鼻柱壞鬢眉鬚髮皆落也方白蒺藜散出聖惠方治大風惡疾或二年三年眉須墮落者手足疼悶骨節煩腫面色黑皮肉漸變白蒺藜炒芎藭各二兩山梔子去皮防風去蘆各一兩三錢分萆薢炒羌活去蘆頭白芷炒升麻各二兩白茯苓去黑皮二兩半遠志去心菖蒲九節者泔浸切焙乾蔓荊實細辛去苗葉微炒茵芋去粗莖芍藥麻黃去根節煎掠去沫焙乾龍骨刮去土人參當歸切焙桂去粗皮各一兩一錢分白朮微炒一兩附子炮裂去皮臍三二枚甘草炙銼桔梗切焙各一兩半上為細散每用溫酒調下二錢匕至三錢匕空心午時前各一服如口乾舌澀喉里煙生鼻中猝痛是佳應也甚即煎少許甘草湯解之枳殼散出聖惠方治大風癩病眉發墮落熱毒風入五臟身體頭面生瘡枳殼去瓤麩炒黃耆炙銼蒼耳炒白朮微炒蒴藋銼白蒺藜炒防風去蘆生用升麻生用梔子仁各三分漏蘆去蘆頭黃連去須人參天門冬去心焙防己乾薑炮芎藭丹參去苗土炙麻黃去根節煎掠去沫焙白芷微炒甘草炙銼葛根銼各半兩玄參堅者三兩烏蛇酒浸去皮骨炙一兩上為散溫酒調下二錢匕加至三錢匕空心夜臥服防己散出聖惠方治大風癩眉須墮落及身面瘙癢腹中煩熱身上癮疹起如棗核疼痛生瘡防己銼一半兩烏蛇酒浸去皮骨炙三兩獨活去蘆頭秦艽去苗土黃耆炙銼丹參去苗土微炙烏頭炮裂去皮臍松脂煉過放冷研人參苦參銼白朮炒桂去粗皮芍藥各一兩一錢分芎藭黃連去須蒺藜子炒去角白茯苓去黑皮天門冬去心焙葛根銼各一兩半乾薑炮蜀椒炒出汗去閉口者並子各一兩玄參二兩上為細散每服空心食前夜臥溫酒調下二錢匕漸加至三錢匕漏蘆湯出聖惠方治大風癩身體成瘡眉須墮落㾦癗瘙癢搔之黃水出者漏蘆去蘆頭白茯苓去黑皮烏蛇去皮骨酒炙獨活去蘆頭黃耆炙白蘞生薑切炒大黃銼碎醋炒各一兩升麻生用麻黃去根節煎去沫焙枳實去瓤麩炒芍藥防己玄參甘草炙附子炮裂去皮臍各三分梔子仁一兩一錢分石膏銼一兩半上銼如麻豆每服五錢匕以水一盞半煎取一盞去滓溫服要利空心臨臥各二服白花蛇散出聖濟總録治大風疾眉須墮落皮肉已爛成瘡者白花蛇去皮骨酒炙烏蛇去皮骨酒炙乾蠍全者去土炒白殭蠶炒各一兩地龍去土炒半兩雄黃醋熬研一分蜈蚣十五條赤足全者炒蠍虎十五枚全者炒蜜蜂炒一分丹砂研一兩黃蜂炒一分胡蜂炒一分龍腦研五分上為散每服一錢匕溫蜜水調下日三五服側子丸治大風癩眉須墮落身上有瘡手足脹悶𤸷痹攣縮鼻梁未壞側子炮裂去皮臍一兩三分白芷微炒附子炮裂去皮臍天麻酒浸切焙龍骨防風去蘆制各一兩一分蔓荊實一兩半白蒺藜炒二兩白朮炒一兩人參山芋生乾地黃焙當歸切焙各三分上為末煉蜜和丸如梧桐子大每服空心溫酒下三十丸日再服漸加至五十丸唇舌微痹為效慎避外風皂莢丸治大風眉須墮落等疾大皂角二斤不蛀者酥炙過銀銅器中入水揉碎煎成膏子入後藥羌活去蘆頭三兩木香萆薢各二兩附子炮裂去皮臍半兩白牽牛麩炒郁李仁去皮尖碎研獨活去蘆頭檳榔用雞心者煨大黃銼炒青橘皮去白焙何首烏去黑皮各二兩上十一味為末入皂莢膏搜和勻搗杵丸如梧桐子大曝乾常服薑湯下二十丸加至三十丸病甚者稍增之山梔子散治大風癩疾眉須墮落遍身𤸷痹手足攣結山梔子去皮二兩半芎藭一兩半藁本去苗土三分當歸切焙蔓荊實各一兩桔梗銼焙一兩三錢羌活去蘆頭白蒺藜炒白茯苓去黑皮防風去蘆各二一兩一錢側子炮裂去皮臍天麻各半兩上為散每日空腹服溫酒調下二錢加至三錢夜臥時再服服至一料眉須再生莽草散治十年大風毛髮禿落癮疹生瘡氣脈不通抓搔不覺痛癢莽草三兩微炙附子炮裂去皮臍乾薑炮製銼石斛去根銼天雄炮裂去皮臍躑躅花酒拌炒令乾白蘞川烏頭炮裂去皮臍石南桂心各二兩細辛川椒各一兩去目及閉口者微炒去汗上為細散每服以溫酒調下三錢後以羊脯下藥日再服勿大飽食羚羊角飲治大風癩身上生瘡並面部浮腫眉須墮落四肢𤸷痹羚羊角鎊甘草炙銼各三分獨活去蘆頭山梔子仁各一兩半防風去蘆一兩枳殼去瓤麩炒黃耆炙銼蒺藜子炒丹參去苗土微炙玄參木通銼各一兩一錢上粗搗篩每服五錢匕以水一盞煎取七分去滓溫服每日早食後及夜臥各一服雷丸散治大風疾神驗方其風有五種象五行金木水火土黑蟲者是業報之疾不可治也餘四般蟲但服此藥無不瘥者此方是聖人之法非凡俗所解凡青黃赤白黑蟲在人骨體之中往來無礙若蝕人肝則眉須先落若蝕人肺鼻柱崩折不聞香臭若蝕人脾則語聲變散若蝕人腎則耳鳴啾啾心不受病故不言之若蝕人筋肢節墮落若蝕人肌則頑痹不知痛癢身上似有蟲行或有皰肉起似桃李小棗或多生瘡癬或狀如魚鱗或形如榆莢青黃赤黑變易不定從頭起者名曰順從足起者名曰逆風起之由皆因冷熱交通流於五臟徹入骨髓氣血內虛風濕相搏即便生蟲又因用力過度食飲相違酒後行房汗入骨髓亦患斯疾若欲治者先服此散出蟲為驗見青黃赤白便可治之皆得除愈若黑蟲出者此疾無方對治也其四般蟲肌肉欲壞眉須墮落者皆以服此藥為美雷丸硝石細研硃砂細研水飛過阿魏各一兩面裹煨以面熟為度雄黃細研雌黃各三錢細研藜蘆去蘆頭犀角屑紫石英各半兩細研水飛過斑蝥芫青各十二二十枚與斑蝥用油麻小合同炒麻熟為度取出上為細散又用苦參四五兩硝石四兩搗碎以生絹袋盛入瓷瓶中以無灰酒一斗浸七日密封頭每取一中盞暖過於食前調下散二錢祛風活血散治大風癩眉落鼻塌等證當歸川芎白芍藥地黃赤芍藥連翹防風川椒各一兩小茴香七兩肥皂角十四個重揉水漉淨將前藥浸入水內一日後取出漉去火焙乾上為細末酒糊為丸如梧桐子大每服三五十丸煎蘇木薄荷湯不拘時下蘇木煎丸治大風眉須墮落退皮去爪甲換骨蘇枋木三兩捶碎以酒一斗煎至一碗去滓附子一枚炮裂去皮臍烏頭一枚炮裂去皮臍天麻酒浸焙一兩乾蠍去土酒浸一分草烏頭半兩用水浸浮香研沒藥研各半兩雄黃水飛過半兩上除蘇枋木外搗羅為末將蘇枋木酒和藥末為丸如黑豆大每服五丸至七丸用淡豉湯下衣被蓋汗出婦人用紅花酒下乳香丸出聖惠方治大風癩卒無眉須者乳香炒軟後冷研人參紫參去苗土沙參去苗土玄參去苗土苦參銼搗取粉天麻酒浸切焙菊花未開者佳枳殼去瓤並用麩炒各半兩上為末煉蜜和丸如梧桐子大酒下二十丸日二夜一百日內瘥六十日內兩鼻中出血是愈候也治大風眉須已落卻令再生方出聖惠方烏麻油一升丁香一兩生薑汁生鐵末各一合附子木香訶黎勒皮垣衣各三分羊糞三十枚為細末入油及生薑汁中以不津器盛於馬糞中埋三七日藥成塗藥法以中指點於生鐵器內摩三七下即塗要生處熱揩之以干為度十五日內眉須皆生何首烏丸出聖惠方治風氣留滯皮膚不仁眉須墮落多生瘡癬身體瘙癢等何首烏刮去黑皮十二兩白牽牛揀干薄荷各三兩肥皂莢三斤一斤去皮子椎碎用法酒三升浸兩宿揉濃汁去滓於銀石器中熬成膏一斤炭火燒令煙盡收放濕紙上盆覆之候冷用一斤去皮酥炙令焦搗末上搗羅三味為末用皂莢膏和劑使膏盡為度熟搗丸如梧桐子大每服十五丸加至二十丸不計時候溫酒下日三服得效方治大風頭面髭發挽落青鹽散出聖惠方治大風疾眉須墮落遍身結腫皮肉頑痹青鹽白礬各一斤禹餘糧三二斤上為細散更研令勻入瓷罐子內盛瓦子蓋頭固濟初用炭火二斤燒漸漸添火至二稱以來從早晨燒至夜常須添炭至一稱火盡為度隔宿候冷取之細研如粉用夾熟帛包裹取一方淨土水撈令浥中心焙藥兩日出火毒又別取胡麻子六斤揀簸淨潔稱之九蒸九曝畢炒令香熟搗羅為末每三兩胡麻子末管一兩燒者藥末相和令勻每服用荊芥茶調下二錢空心及晚食前服其效不可具述萆麻法出聖惠方治大風疾眉毛脫落治癩塗眉法出儒門事親半夏生用羊糞燒焦各等分上為末生薑自然汁調塗二聖散治發眉自落鼻梁崩倒肌膚有瘡如癬松葉浸酒方出聖惠方治大風疾豬鬃松葉二斤切麻黃五兩去根節上細銼以生絹袋盛以清酒二斗浸秋冬七日春夏五日日滿開取每服溫一小盞服常令醺醺以效為度側柏丸出聖惠方治大風癩令生眉須用側柏葉不計多少九蒸九曝搗羅為末煉蜜和丸如梧桐子大空心食前夜臥各一服熟水下五十丸百日毛生治大風頭面髭鬚脫落用毗黎勒燒灰干糝患處立效馬先蒿散出聖惠方治大風癩疾骨肉疽散百節疼酸眉須墮落身體習習癢痛者以馬先蒿細銼炒為末每空心及晚食前溫酒調下二錢匕一方治烏癩荊芥薄荷湯下一方治癩用酒服一名馬薪蒿一名爛石草百靈藤粥方出聖惠方治大風等疾用百靈藤四兩以水一斗煎至二升去滓入粳米四合煮作粥於溫室中澡浴了服之衣覆取汗汗後皮膚退如麩片每隔日一服五六十日後漸愈毛髮即生治大風瘡未出眉毛落方出聖惠方生漆半兩生地黃三斤淨洗研絞取汁以上二味相和入於銀鍋中以重湯煮用柳木篦攪候成膏用和後藥烏蛇二兩酒浸去皮骨炙微黃白附子一兩炮製雄黃半兩細研如粉上為末更都研令勻以前膏和丸如梧桐子大每夜後以溫酒下七丸汗出為度石灰酒出千金方主生毛髮眉須去大風石灰一石拌水和濕蒸令氣足上曲一斗二升松脂煉成十斤為末黍米一石上先以大鍋內炒石灰以木扎著灰中火出為度以枸杞根五斗水一石五升煮取九斗去滓以淋石灰三遍澄清以石灰汁和漬曲用汁多少一如釀酒法訖封四七日開服常令酒氣相及為度百無所忌不得觸風其米泔及飯糟一事以上不得使人畜犬鼠食之皆令深埋卻此酒九月作二月止恐熱膈上熱者服後進三五口冷飯壓之婦人不能飲食黃瘦積年及蓐風不過一石即瘥其松脂末初酘釀酒攤飯時勻散著飯上待飯冷乃投之此酒飯以冷為度不爾即酸宜知之一方用柏脂商陸釀酒方治大風疾眉須墮落皮肉頑痹筋脈不利方見商陸酒烏金丸治大風疾眉須墮落鼻柱崩倒語音不利坯子胭脂別研硃砂別研人參去蘆頭乳香別研藕節羊蹄根青竹茹烏賊魚骨甘草炙細松煙墨燒黑川芎十一味各三錢草烏頭炮去皮尖一錢上件為細末酒煮麵糊為丸每一兩作十丸每服一丸細嚼茶清下不拘時候一方有凌霄花忌雞豬酒面醃臟等物若犯陰陽交會其病復作切宜永戒大風出蟲附論夫蟲動物也皆風之所化風入五臟化生五蟲則成五癩入肝其蟲青入心其蟲赤入脾其蟲黃入肺其蟲白入腎其蟲黑四蟲皆可治惟黑蟲為難療或所傷未深專意治之亦有瘥者方雄黃散治大風癩於瘡內取風毒涎殺諸癩蟲塗敷雄黃白礬紫石英白石英馬牙硝太陰玄精石金星石銀星石各一兩以上同搗研為細末入瓷盒中用白土紙筋泥固濟火燒通赤以濕土蓋窨來日取出於淨濕地上用紙襯盒出毒三伏時灑地土令濕麥飯石陽起石禹餘糧石紅皮石密陀僧不灰木各一兩蒲黃微炒石灰風化者定州細瓷末各半兩砒霜一錢研鉛丹研青鹽研亂髮灰各一兩水銀膩粉各三錢上同研令細以不見水銀星子為度每以生麻油調塗患上有風毒膠涎出為度不過一月效烏蛇丸治風癩殺五蟲胡麻子四兩烏蛇肉酒浸焙干蜂房炙各半兩苦參檳榔獨活桃仁浸去皮日乾白蒺藜炒去刺各一兩皂莢刺炒焦貫衆各七錢半蕪荑雷丸雄黃硫黃各半兩硃砂二錢半蝦蟆二個去頭足炙焦上細末以長皂角十條水三升揉取濃汁去滓煎成膏和藥末丸如梧桐子大每服三十丸空心溫酒下獨活散治大風癩出五蟲獨活去蘆頭三錢分雄黃研半兩青黛研一錢分麻黃去節先煎掠去沫焙乾半兩水銀一分與丹砂雄黃點醋同研以水銀星子盡為度尤妙阿魏生研一錢分雷丸炮丹砂研滑石搗研各半兩石膽研牛黃研紫石英研各一錢分斑蝥四十枚與糯米同炒去翅足米不用芫青四十枚與糯米同炒熟去翅足米不用上為細散每服一錢匕空心溫酒調下不得飽食晚再服當有蟲從小便中出或當日三四日至十日方出若瀉出赤蟲如爛櫻桃或如豆麥或瀉出黃蟲似黃涕青蟲似青菜汁白蟲似馬尾蟲遇藥氣即死或隨大便下惟黑蟲如豆豉汁此為難治硃砂散治大風肌膚不仁頭面身上瘡顏色腫黑腹內生蟲鼻柱崩倒硃砂細研水飛過紫檀漏蘆雄黃細研白蘞紫石英細研水飛過犀角屑龍骨石膏各一兩細研水飛過雌黃細研石膽細研阿魏各半兩生用牛黃一分細研硝石一兩半上為細散入石藥末更同研令勻每食前以溫酒調下一錢如飢即宜吃小豆飯及棗湯食勿令過飽飽即其蟲難出服藥後小便似淋即以盆子盛看當有蟲出當日便出或三五日方出者或蟲出即且服藥日候蟲盡便瘥阿魏雷丸散出聖惠方治大風疾五臟生五蟲五蟲者各隨五臟之色惟黑蟲為難治當先服藥出蟲以驗其色阿魏生研一錢分雷丸生用三分雄黃研半兩丹砂研滑石研石膽研各一分硝石研半兩白蘞銼犀角鎊各一分牛黃研半兩紫石英研半兩斑蝥芫青各三二十枚與糯米同炒去翅足米不用上為散每服一錢匕空腹溫酒調下飢即食小豆羹飯為良慎勿多食但半飽即止常宜覺飢若食飽蟲出遲也日晡腹空時更服一錢匕若覺小便似淋痛不問早晚即更服一錢匕大飢即食若覺欲小便似痛澀即就一瓷器中尿出看之其蟲或如爛筋狀各隨其臟辨蟲色也熟艾方出聖惠方治大風癩熏出蟲艾葉別揉令熟砒霜研水銀與雄黃同研膩粉研硫黃研丹砂研阿魏酒化去砂石面和作餅炙附子炮裂去皮臍搗雄黃細研入水銀點醋再研令星子盡始入膩粉砒霜硫黃丹砂同研各一兩麝香研半兩豬牙皂莢一斤去皮子別研為末上除艾葉皂莢別搗為末外併合和細研用紙四張先布艾次糝皂莢末又次糝諸藥末卷刀切如餅餤著碗內燒以小木甑子籠碗以衣襯四邊坐於上熏以衣被遮擁定不令透出氣熱悶蟲即出黑虎丹出聖惠方治大風諸癩惡蟲內蝕形骸變壞天靈蓋三兩蝦蟆三個去頭足燒存半生生人中白桃仁浸去皮各三二兩麝香一錢硫黃雄黃各一兩穿山甲熱灰插焦皂莢刺燒存半生各半兩老刺佳輕粉二錢半上煉蜜為丸如梧桐子大每三十丸月首五更米飲連日服取蟲盡則愈殺瘵蟲通用黑虎丸一名黑虎丹出聖惠方治大風癩疾下癩蟲及皮膚瘡腫手足節墮天靈蓋塗酥炙三兩蝦蟆去皮及腹肚中物炙乾塗酥再炙一枚麝香研一分桃仁湯浸去皮尖雙仁炒三兩雄黃研一兩人中白研二兩杏仁湯浸去皮尖雙仁炒六兩上為末再研勻煉蜜為丸如梧桐子大空心日午用蕪荑湯下二十丸至三十丸一方以溫粥飲下三十丸雷丸散一名水銀雷丸散出聖惠方治風癩取蟲水銀硫黃雄黃雷丸阿魏貫衆末各二錢半麝香半錢雌黃各二錢半用乳鉢點醋同研令星盡為度上研極細每一錢天明溫酒調下明日又服一方無貫衆有萆薢通神散一名二聖散出聖惠方治大風癩疾凡是鼻梁未折服之蟲出無不愈硫黃酒出直指方殺癩風蟲用明硫黃乳鉢研細三錢酒調空心飲清汁明日添硫黃再研入酒如前或添大楓油妙諸石丸出聖惠方治大風疾取五色蟲金星石銀星石雲母石禹餘糧石滑石自然銅磁石生乾地黃陽起石龍仙石出齊州龍涎石密陀僧凝水石各一兩上搗碎以罐子盛用炭火十斤煅以火盡為度取出搗研為末醋煮麵糊為丸如小豆大每服十五丸用後補藥下補藥茯苓散出聖惠方白茯苓去黑皮人參天麻苗木香枸杞根狗脊去毛天麻芎藭蓬莪朮景天慎火草是也青葙子海桐皮各一兩銼上各生用為散每服二錢匕白花蛇酒調下日三服忌雞豬肉魚蒜一百日當效五仙浴湯出楊氏家藏方治淋洗大風毒氣殺五蟲斂瘡口雄黃一兩別研何首烏苦參荊芥朴硝四味各一兩上件為粗末用水五升先浸藥三日次煎數十沸用如浴湯法其蟲即漸死將藥湯潑棄無人處卻換新衣服著切忌房室如有肉壞生瘡者炒槐花為末乾摻瘡口其瘡自然長肉白虎風附論夫白虎風之狀或在骨節或在四肢其肉色不變晝靜而夜發發則痛徹骨髓或妄言妄語有所見者是也蓋由風寒暑濕之毒乘虛而感播在經絡留於血氣蓄聚不散遇陽氣虛弱陰氣隆盛則痛如虎齧故以虎名焉痛如掣者為寒多腫滿如脹者為濕多汗出者為風多巢氏云飲酒當風汗出入水遂成斯疾久而不愈令人骨節蹉跌為癩病者誠有此理也後人宜慎之方虎骨散出聖惠方治白虎風走注疼痛發歇不定積年不效者虎骨酥炙黃烏梅肉赤茯苓去黑皮銼肉蓯蓉酒浸切焙人參鱉甲去裙襴醋浸炙甘草炙芍藥各二一兩當歸切焙三錢分前胡去蘆三分白朮豆豉慢火微炒紫菀去土黃耆銼焙各一二兩常山炒枳殼去瓤麩炒犀角鎊知母切焙各一分升麻柴胡去苗桔梗炒天靈蓋酥炙桂去粗皮木香各三分桃仁湯浸去皮尖雙仁炒四十九枚上為散每服溫酒調下二錢匕空心臨臥各一服若為丸即煉蜜和丸如梧桐子大每服溫酒下二十丸至三十丸酸棗仁散出聖濟總録治白虎風歷節疼痛不可忍酸棗仁炒半兩敗龜酥炙黃二兩秦艽去苗土一兩半虎骨酒炙黃二兩羌活去蘆一兩防風去叉一兩一分芎藭一兩一分桂去粗皮白芷蒲黃炒牛膝去苗酒浸切焙附子炮裂去皮臍各一兩枳殼去瓤麩炒當歸切焙各一兩半上為散每服溫酒調下三錢匕空心夜臥各一服酸棗仁散出聖惠方治白虎風痛徹骨髓晝靜夜發酸棗仁半兩微炒敗龜三分塗酥炙令黃虎脛骨一兩塗酥炙微黃羌活牛膝去苗桂心附子炮裂去皮臍枳殼去瓤麩炒微黃各三分地龍微炒當歸各一兩沒藥乳香各半兩補骨脂微炒赤芍藥各三分上搗細羅為散每服不計時候以溫酒調下二錢白頭翁煎出聖惠方治白虎風四肢疼痛至夜轉甚不可忍者白頭翁二兩牛膝去苗附子炮裂去皮臍桂心羌活去蘆頭赤芍藥各三分赤茯苓人參去蘆頭各半兩防風去蘆頭三分虎脛骨一兩塗酥炙微黃牡丹半兩當歸三分酥一合生薑汁二合上都搗羅為細散用好酒五升都煎如餳每服不計時候以溫酒調下一茶匙服藥後仍須炒蠶砂尉之為妙雄黃散塗方出聖惠方治白虎風疼痛走轉不定雄黃莽草藜蘆去蘆頭各一兩斑蝥二一十枚赤小豆半合白礬蕪荑皂莢燒灰蛇床子吳茱萸各三分硫黃半兩細研附子一兩去皮臍生用巴豆十五枚去皮心上搗細羅為散都研令勻每用散一錢以生油調薄塗於痛處日二易之甚妙虎骨散出聖惠方治白虎風疼痛及走注不定虎骨酒炙二兩地龍去土炒兩半牛膝酒浸切焙硇砂湯煮令枯肉桂去粗皮芎藭當歸切焙密陀僧研各一兩躑躅酒炒一兩半沒藥研一兩延胡索炒乳香研各半兩上為散拌勻每服一錢匕溫酒入少童子小便調下虎骨散出危氏方治白虎風肢體疼痛發則不可忍虎骨酥炙二兩花蛇酒浸取肉用天麻防風去蘆乳香別研川牛膝去蘆酒浸白殭蠶炒去絲嘴川當歸去蘆酒浸桂心不見火各一兩甘草炙全蠍各半兩去毒麝香一分錢別研上為細末每服二錢溫酒調服或用豆淋酒調服亦可不拘時候虎杖散出聖惠方治白虎風血脈結滯骨髓疼痛發作無時虎杖一兩半桂心一兩當歸一兩半赤芍藥天雄炮裂去皮臍桃仁湯浸去皮尖雙仁麩炒微黃芎藭枳實麩炒微黃羌活防風去蘆頭秦艽去苗木香各一兩上搗粗羅為散每服三錢以水一中盞入生薑汁半分煎至六分去滓不計時候稍熱服之沉香湯出聖惠方治白虎風骨中疼痛不可忍入夜即甚走注不定沉香半兩虎骨酥炙黃二兩檳榔炮半兩生乾地黃銼焙三錢分當歸切焙一錢分芎藭半兩白芷微炒鬼箭羽各一分芍藥半兩地龍微炒一分羌活去蘆頭半兩上粗搗篩每服六錢匕以水一盞酒一盞桃枝七寸薤白三四莖同煎至一盞去滓溫服空心午時各一服疾甚即夜添二服羌活散出聖惠方治風寒暑濕毒氣攻筋脈或在骨節或在四肢名曰白虎風者羌活去蘆頭附子炮裂去皮臍天麻防風去叉牛膝酒浸切焙蒺藜子炒去角芎藭烏頭去皮臍生用乾蠍全者木香白附子炮麻黃去根節等分上為散每服一錢匕溫酒調下初且服半匙匕三日後漸加羌活散出聖惠方治白虎風風毒攻注骨節疼痛發作不可忍者羌活側子炮裂去皮臍秦艽去苗桂心木香芎藭當歸牛膝去苗附子炮裂去皮臍骨碎補各一兩桃仁三十枚湯浸去皮尖雙仁麩炒微黃上搗粗羅為散每服三錢以水一中盞入生薑半分煎至五分去滓不計時候稍熱服虎骨散出聖惠方治白虎風肢節疼痛發則不可忍虎脛骨塗酥炙令黃白花蛇酒浸去皮骨炙令微黃龍骨防風去蘆頭乾蠍微炒桂心當歸羌活各一兩麝香一分細研白殭蠶一兩微炒牛膝一兩去苗天麻一兩上搗細羅為散研令勻每服不計時候以豆淋酒調下二錢沒藥散治白虎風流注筋骨疼痛沒藥一兩獨活一兩半虎脛骨二兩塗酥炙令黃晚蠶砂微炒芎藭各一兩半防風去蘆頭蔓荊子當歸赤芍藥桂心各一兩上搗細羅為散每服不計時候以熱酒調下二錢羌活湯出聖濟總録治白虎風痛甚不可忍者羌活去蘆頭三分防風一兩去叉秦艽去苗土芎藭各一兩半當歸焙一兩半大腹連皮用三枚桃仁湯浸去皮尖雙仁炒二十一枚牛膝去苗酒浸切焙乾一兩附子炮裂去皮臍三分上銼如麻豆大每服五錢匕以水二盞入生薑一棗大拍破煎至一盞去滓溫服日二夜一廣濟療白虎方犀角屑當歸芍藥各六分牛膝沉香青木香虎頭骨炙各八分檞木葉一握炙麝香一分研上㕮咀用水六升煮取二升六合去滓分溫三服如人行四里進一服別加麝香末服之忌生菜熱面蕎麥蒜地龍散一名當歸散出聖惠方治白虎風疼痛遊走無定地龍白色少泥肥者微炒桂去粗皮白芷炒白殭蠶炒威靈仙漏蘆芎藭當歸切焙各半兩上為散每服熱酒調下一二錢匕日三夜一烏頭散出聖惠方治白虎風走注疼痛烏頭炮裂去皮臍地龍炒羌活去蘆頭虎骨酒炙延胡索當歸切焙沒藥研防風去叉各一兩上搗羅為散每服二錢匕冷酒調下空心食前日二服麝香丸出聖惠方治白虎風不計月日遠近夜加疼痛走轉不定不可忍者麝香細研雄黃細研硃砂細研各一分兩地龍三分微炒白附子半兩炮裂芫花三分醋拌炒令乾斑蝥五枚同糯米炒令黃去翅足狼毒三分銼醋拌微炒上搗羅為末以醋煮麵糊和丸如緑豆大不計時候以溫酒下五丸牛膝散出聖濟總録治白虎風疼痛難忍牛膝去苗酒浸切焙當歸切焙各一兩虎骨二兩酥炙黃赤芍藥一兩芒硝別研一半兩芎藭半兩桃仁去皮尖雙仁炒二十枚上為散每服空心用溫酒調下一錢至二錢匕七神散出聖濟總録治白虎風晝靜夜發痛徹骨髓不可忍狂言妄見防風去叉羌活去蘆頭桂去粗皮地骨皮去土芎藭細辛去苗葉虎骨酒浸一宿酥炙黃上等分搗為細散每服錢匕溫酒調下赤芍藥散出聖惠方治白虎風筋骨疼痛至夜加甚四肢懈惰赤芍藥羌活各一兩仙靈脾一兩半虎頭骨二兩塗酥炙令黃天雄炮裂去皮臍芎藭桂心各一兩上搗細羅為散每服不計時候以薤白湯調下二錢麝香散出聖惠方治白虎風骨節疼痛不可忍者麝香研半兩沒藥研乳香研各一兩虎牙長大者用一付四個天麻二兩蜈蚣十條赤足完全者酒浸三日曝乾上為細散和勻每服二錢匕溫酒調下不拘時日二三服皂莢散方出聖惠方治白虎風疼痛皂莢旅生蕎麥白蒺藜穀精草五靈脂蕓薹子各半兩上搗細羅為散用釅醋調塗之效燕窠土丸方出聖惠方治白虎風寒熱發歇骨節微腫徹骨疼痛燕窠土二兩伏龍肝二兩飛羅面二兩砒黃一錢水牛肉脯一兩炙令黃別搗羅為末上搗細羅為散後入砒黃牛脯末等和令勻每將少許以新汲水和如彈丸大於痛處摩之候痛止即取藥拋於熱油鐺中原蠶蛾散出聖惠方治白虎風晝夜遊走疼痛原蠶蛾炒一分白殭蠶炒半兩蟬蛻炒地龍白色少泥者微炒各一兩分上為散先用干脯一片炙熟安病人所臥席底當痛處不得令知若其夜痛甚難治痛緩即易治來日待病人起後取脯看必有異色者脯色赤每服用散三錢匕脯色青黯每服四錢匕溫酒或米飲調下空心服藥後更吃酒令小醉汗出即愈白殭蠶散一名地龍散出聖惠方治白虎風痛不可忍白殭蠶炒臘茶炙各一兩甘草炙三分地龍白色少泥者微炒一兩上為散每發時空心服二錢匕午後服一錢匕臨臥服兩錢並用熱酒調下又先取蠟一兩入銚子中熔成水投桂末半兩攪勻攤於紙上炙令熱服第一服藥了即貼向痛處用熱綿裹之一方無甘草每服溫酒調下二錢不拘時阿魏散出聖惠方治白虎風身體疼痛不可忍轉動不得阿魏半錢匕乳香研好茶末各一錢地龍十五條白色少泥者佳微炒上為散分二服空心夜食後並用熱酒調下服藥後更吃熱豆淋酒投及吃熱薑稀粥以布被覆取微汗通體當瘥一方不用酒止用好茶調下亦可蠐螬散出聖惠方治白虎風疼痛晝靜夜發蠐螬七枚研爛甘草炙末炒五錢沒藥研乳香研各一錢上同研爛分二服每服煎酒一盞二三沸調下不計時虎骨散出聖惠方治白虎風疼痛走注不定虎脛骨酥炙二兩羌活去蘆頭附子炮裂去皮臍地龍炒各一兩上為散每服二錢匕溫酒調下不計時候一方無附子有防風附子散出聖惠方治白虎風止疼痛附子炮裂去皮臍虎腦骨各一兩酥炙令黃桂心去粗皮一分上為散每服溫鹽酒調下一錢匕至二錢匕空心午時各一服治白虎風痛走注不定無問老少出聖惠方炭灰五升無炭灰桑灰亦得紗羅羅之一遍蚯蚓糞一升搗之紅蘭花七捻新者佳上一處攪和熬令熱取好釅醋暖之拌令浥浥以故布三四重裹分作四分更互當所患處尉之數數轉勿住手挼之冷暖得所寧令小熱不得作冷冷即再熬令熱又尉之並用後咒法曰青𬿚皮青毛出黃𬿚皮黃毛出赤𬿚皮赤毛出白𬿚皮白毛出黑𬿚皮黑毛出急出吾口神吾口聖唾山山崩唾石石裂得汝字汝不去斫頭斫頭急急如律令其咒法先令人唾痛處以手挼之不住手便即誦此咒不限遍數以瘥即停當誦咒不得令病人及旁聞咒須先淨漱口潔淨良效療白虎風方豬肉三串大麻子一合好酒半盞上和麻子口含噀上將豬肉手劈向痛處來去咒曰相州張如意張得興是汝白虎本師急出咒訖將安床下瘥送路頭神驗防風散出聖惠方治白虎風走轉疼痛兩膝熱腫防風去蘆頭地龍微炒漏蘆各二兩上搗細羅為散每服不計時候以溫酒調下二錢虎骨散出聖惠方治白虎風走注疼痛不定虎脛骨塗酥炙黑附子炮裂去皮臍上各一兩為末每服溫酒調下二錢匕日再服治白虎風走轉疼痛兩膝熱腫出聖惠方麒麟竭硫黃細研各半一兩上搗細羅為散研令勻每服不計時候以溫酒調服一錢薰藥方出聖惠方治白虎風疼痛徹骨不可忍者精豬肉四兩切作片子安息香二兩上將肉裹香即用一瓶子內著灰火火上著一銅片子隔之即安香於上燒之以瓶子口就痛處熏之以衣遮蓋勿令透氣三兩日瘥抵聖散出聖濟總録治白虎風骨髓疼痛至夜轉甚用虎脛骨不計多少打破酒浸蘸酒旋炙令黃脆為散每服半錢入薄荷末一錢匕人參末半錢匕煎乳香酒調下烏蛇浸酒方出永類鈐方治白虎風朝野僉載商州有人患大風家人惡之山中為茅屋遷徙居焉有烏蛇墜酒甕中病人不知飲酒漸瘥甕底尚有蛇骨方知其由也取烏蛇一條洗刷去塵土用好酒一斗浸一七日後每日煎一盞溫服如吃盡酒取烏蛇焙乾為末溫酒調下一錢匕獨勝散治風毒腫白虎風方治白虎風用鋪飯於患處使丹雄雞食之或黃腳雞亦可又取熱糞封之取伏於患人床下一方用丹雄雞糞塗之治白虎風所患不以積年久無效痛不可忍者出肘後方用腦麝不限多少細銼焙乾酒浸常服以醉為度即瘥今之寄生楓樹上者方堪用其葉亦可制砒霜粉尤妙治白虎風筋骨節急痛方見治筋骨風急痛治白虎病用雞子揩病處咒願送糞堆上不過三度即瘥白虎為糞神愛吃雞子
