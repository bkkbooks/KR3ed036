用麻繩縛以濕紙包定火中煨熟取汁絹帛蘸汁揩眼冬青方出海上方治赤眼以新磚二片冬青葉五斗搗自然汁浸磚數日令透取出掘地坑架磚於內四下空覆之日久後磚上粉霜起取霜入腦子少許無亦得點眼大妙治赤眼煎海桐皮洗又方用烏骨雞新膽以燈心點眼治眼赤眶上用田螺養去泥靨用黃連末一錢敷在螺肉內化作水用鵝毛掃之一用海螺一方以小鹽花納螺靨中用器盛之取吐出汁點目用後放之人乳方治目赤痛多淚兼解牛肝馬肉之毒用首生男乳合豉濃汁服之神效一方單用人乳點眼治赤眼癢痛上用黃芩為末煎湯漱並洗艾葉方治赤眼用艾令燒起以碗蓋之候煙上碗成煤取下用溫水調化洗瘥一方加入黃連尤佳蕪菁子散治赤眼痛以蕪菁子用大醋煮令熟用井花水服方寸匕日三盡一斗能夜視有所見羊肝生方治目熱赤痛視物不明上青羊肝一具細切以水淘漉出瀝乾以蔥醬鹽醋食之療目赤痛及胎赤上用豬膽和鹽綠五分皆效療赤眼方用杏仁四十九枚去皮為末絹袋纏飯底蒸之乘熱絞取汁以銅青胡粉各如大豆許乾薑食鹽各如大豆許熟研之以鵝毛沾取掠眼中眥頭日三度療赤眼不問久近用硇砂三兩以酢漿垍器中浸日中曝之三日藥著器四畔乾者取如豆大夜著兩眥瘥併入石鹽石膽等分用之尤佳治眼疼方用新磚浸糞池中年久取出安放陰冷處生花刷下卻以腦麝少許和研點之梔子湯治目赤上取山梔子七枚鑽透入糖灰火煨熟以水一升半煎至八合去滓入大黃末三錢絞勻食後旋旋溫服點眼方出聖惠方治眼赤痛鵝梨一枚大者搗絞取汁黃連半錢為末膩粉一字上用綿裹黃連膩粉納梨汁中浸一日取少許點之療眼赤口乾唇裂方石膏一斤綿裹生地黃汁赤蜜各一斤淡竹葉切五升上以水一斗二升煮竹葉取七升去滓入石膏取五升半下地黃汁蜜取三升細細服之忌蕪荑治氣毒赤腫熱痛眼出本事方好宣連半兩生龍腦自然汁半盞上煎取一盞點洗之食飽後服一呷須用人實壯可服虛弱者不可服又方出海上方治赤痛雞爪黃連去須不犯鐵器用水煎湯卻以艾炷於碗中撈起浮艾再用碗覆之必欲盡取出洗之甚妙蓋艾煙有廣大之功無艾則黃連反能傷眼治一切赤痛眼忽生翳膜方出護命方真腦子不拘多少上件須是上等真正好藥非時點如粟顆一兩粒在眼中治眼赤痛皮上生濕瘡遠年不效方出護命方上淨洗舊銅錢一文淨洗青江石一個用銅錢南蜜於石上磨取濃汁三四滴在盞內卻用干瓦一片上燒炙艾一壯用盞合定令炙艾煙燻盞底銅蜜如此七壯取蜜用塗眼立效治一切眼赤痛浮花翳膜遮睛視物不明忽多昏暗觀覽不決但一切眼疾俱可治療神效不可具述出護命方真腦子一銖不是真者不可使用反有所害牙硝四銖膩粉用半錢與腦子自作一處研如粉黃丹一兩上先研硝黃丹二味似飛塵以無沙蜜四兩入黃丹牙硝二味在內以長節苦竹筒盛之用油單封裹頭系定不令失氣亦不要令以竹筒口納於鍋內煉水煮竹筒一時辰取出候冷開油單傾取藥汁不用滓以新垍瓶子盛藥汁卻入腦子膩粉二味在內仍以水煮瓶子候藥汁即熱用銀箸攪令勻取出冷收之非時以箸點一兩滴在眼中但一切百般眼疾無有不治治赤眼出衛生家寶方凡患眼皆治不動臟腑蒼朮一兩切作片米泔水浸一宿焙乾牛蒡子一兩荊芥一兩草決明一兩龍骨半錢上為細末每服三錢米泔水下臨臥飯後茶清亦得如眼腫入木賊一兩栝蔞散出衛生家寶方治赤眼痛不可忍小團栝蔞籬上長藤蔓結實如彈子大色紅皮上皮毛九十月間採曝乾槐花炒赤芍藥上等分為末每服二錢臨臥溫酒下洗眼方出衛生家寶方當歸黃連赤芍藥葳蕤上等分併為㕮咀每次用四錢以水一大碗於銀銚內煎至六七分貯於金銀或銅石器內紙幕之於紙上開一竅一眼就竅熏之候藥稍溫淋洗冷即止如再欲治即煎熱一服可使三五次治赤眼方出衛生家寶方白牽牛上不拘多少為細末爛煮蔥白研如泥和末為丸如綠豆大每服五粒食後用蔥湯下服訖睡半時如要速效加至十五粒止碧天丸出試效方治目疾累服寒涼不愈兩眼蒸熱如火熏而不痛紅絲血脈滿目貫睛霧悶昏暗羞明畏日或上下瞼赤爛或伏風土而內外眥皆破洗之大有神效瓦粉炒一兩銅綠七分為末枯白礬二分上先研白礬銅綠令細旋旋入瓦粉同研勻熟水和之共為百丸再用一丸熟湯半盞浸一兩時辰洗至覺微澀為度合半時許洗畢瞑目便睡為妙又名一井珠丸一丸可洗十日如再用湯內坐令熱此藥治其標為裡熱以去矣若裡實者此藥不宜㗜藥碧雲散出試效方青黛一錢蔓荊子川芎各一錢二分鬱金一錢石膏一錢三分細辛一錢薄荷一錢紅豆一個上為細末口噙水鼻內搐之芎辛湯出試效方治兩目晝夜隱澀難開羞明畏日目赤視物昏暗神效芎藭蔓荊子細辛六分防風一錢半甘草香白芷各一錢上㕮咀都作一服水二盞煎至一盞去滓稍熱服臨臥服明目細辛湯出東垣蘭室方治兩眼發赤微痛羞明畏日怯風寒怕火色眼眵成柳睡多糊隱難開眉攢腫悶兩鼻常塞流涕唾如膿大便微硬喜食冷物麻黃根三錢羌活根三錢防風三錢藁本一錢川芎半錢細辛少許白茯苓一錢蔓荊子六分荊芥穗一錢三分當歸梢一錢生地黃六分椒八個桃仁三十個紅花少許上件銼如麻豆分作四服每服水二盞煎至一盞去滓稍熱服之忌酒醋濕面及風寒處行立坐臥治赤腫眼出鮑氏方黃丹炒紫蜜熬去沫桃枝攪勻以飯汁化開羽刷目中眼赤出鮑氏方蔥白湯洗以銅錢百個桑白皮同洗煎之又方出鮑氏方酒下黑神散臥時服又方出鮑氏方硼砂三錢腦半錢杏仁去皮尖朴硝研各三錢蕤仁二錢紙包壓出油研成膏角管收用