則因風冷所傷內則以肺脾積熱內外為疾漸加成癢故令目赤爛也方硇砂石脂丸出聖惠方治眼風淚赤爛腫痛積年生障翳青石脂硇砂決明石搗研水飛過青鹽腦子細研決明子乾薑炮裂銼各一分烏賊魚骨鹽綠黃連秦皮細辛各半兩上為末龍腦研令勻煉蜜和丸如麻子大每服一丸以少溫水化點大眥頭日三四度追風散治頭風注眼赤爛去翳川烏防風細辛甘草炙川芎白芷荊芥蒼朮各一兩草烏半兩薄荷全蠍上為末茶清或酒調下亦可食前服硇砂煎出聖濟總錄治眼赤風淚爛癢翳膜硇砂研半分決明為末鹽綠烏賊魚骨為末龍腦研上以臘月水兩碗浸三日及七日每日攪一度候日滿以綿濾去滓用石器盛日三兩度菊花湯出聖濟總錄治風毒氣攻眼生瘡爛腫菊花升麻黃連白茯苓去黑皮防風去叉木通蕤仁葳蕤地骨皮各一兩上粗搗篩每服五錢匕以水一盞入竹葉十片煎至八分去滓空心及臨臥服胡黃連煎出聖惠方治風目赤爛怕見風日疼不可忍胡黃連牛黃研黃柏去粗皮各一兩龍腦別研麝香別研一錢熊膽別研一分烏豆一分乳梨汁半斤一方一升上先搗胡黃連黃柏烏豆篩為粗散以水三盞銀器中煎至一半綿濾去滓入梨汁牛黃腦子麝香熊膽以文武火熬成膏頓出於瓷器內盛入地埋四十九日取出每點如半米大通聖膏一名金水膏出三因方治熱淚並眼眶赤爛兼治生翳膜澀癢疼痛乳香研硇砂各半字麝香青鹽各一字當歸研碎半錢白礬飛半錢黃連去蘆白蜜四兩上件除蜜外先將七味研爛卻同蜜一處拌勻入竹筒內以油紙三重緊扎定放鍋內煮自早至午方破開取藥用綿絹濾過入於瓶內牢封埋土內經宿取出用銅箸點了閤眼少時復以洗之眼翳薄者點三五次即隨藥下點藥箸以金為之最妙多點取效尤速陸氏續方為細末艾膏為丸如梧桐子大每服七八十丸溫酒米飲下治肺壅熱眼目赤爛腫痛或生翳出聖惠方胡黃連甘草炙微赤黃連去須黃柏各二兩蜜二兩燈心一束淡竹葉一握用水浸過龍腦一錢細研上除龍腦蜜外搗篩為散用雪水三大盞入蜜於瓷器內煎至一鍾濾去滓候冷入龍腦用瓷瓶盛之不計時候點之大全寶光散出瑞竹堂方治遠年近日風眩爛眼除昏退障止淚截赤定疼黃連半斤當歸白礬生各二兩杏仁去皮尖乾薑各二兩四錢蕤仁一兩六錢去油皮赤芍藥三兩六錢甘草二兩三錢草龍膽四兩八錢上用骨刀子銼細黍米大每用一錢水一大盞煎數沸去滓熱洗黃連散出聖惠方治赤眼久患不瘥赤爛時癢腫痛視物不得黃連去須古字錢二七枚龍腦半錢杏仁二七枚湯浸去尖研蚌粉一兩細研蜜一兩不食井花水一大盞上件藥都浸三七日每日攪一遍日足點之勝金散出德生堂方治赤眼爛眩癢痛流淚此方極驗銅青二錢爐甘石浸三五次燒紅小童便浸妙青鹽一錢金腳蜈蚣一條全蠍七個去毒輕粉半錢麝香少許上為末每用少許溫水調敷眼日三次三日即愈洗眼秦皮湯出聖惠方治眼赤爛黃連散治目赤眥爛去瘡衝風淚出黃連雄黃各一兩半細辛去苗二分黃柏三分乾薑一分上搗羅為散研令細以蜜盛每取二黍米大許點兩眥日二度洗輪散治風毒攻眼眥赤爛見風淚出癢痛復明丸治眼赤爛腫癢爐甘石半兩童子小便淬七次銅綠一兩水飛乳香三錢白土子一兩三錢水飛枯礬三錢上除乳香另研為細末生蜜為丸柏皮湯出聖惠方治眼爛赤癢痛不止黃柏蕤仁各一兩黃連三分苦竹葉二握上細銼以水三升煎取二升去滓稍熱淋洗冷即重暖用之四物登皮散出聖濟總錄治眼連瞼赤爛澀痛羞明乾薑炮製半兩滑石研秦皮去粗皮各一兩膽礬走水上為散每用水半錢以沸湯浸澄清洗之蕤仁膏出聖濟總錄治風眼兩眥赤爛蕤仁三七枚去皮膩粉一錢七分龍腦半錢杏仁十枚水浸去皮尖上同研令極細入好酥少許再研成膏臨臥先以溫漿水洗眼拭乾面油塗之柴胡洗眼湯出聖濟總錄治眼赤爛微腫赤痛多時柴胡去苗蕤仁去皮黃連去須升麻各一兩上粗搗篩以水二升煎取一升半去滓淋洗如冷再暖洗三五遍金波膏出王氏博濟方治眼瞼眥赤爛迎風淚出或癢或痛瘀肉黃連四兩黃柏皮二兩二味椎碎以水二升浸一宿於銀石器內熬成膏蕤仁去皮研半兩杏仁去皮尖炒研四十九粒上以杏仁蕤仁入前藥內同熬及一大盞更濾過及入好蜜九分更入麝香白礬硇砂各一錢並飛研空青三錢如無以銅青代之略椎碎龍腦二錢以絹袋盛在藥內又熬及一半滴少許於冷水內不散即止用小瓶密封再飯甑上蒸三遍遂次於井內沉過令冷銀器內收如常點之黃連散出永類鈐方治肝受風熱瞼眥赤爛乳香一錢半別研黃連去須半兩荊芥穗燈心一百莖上㕮咀每服二錢水二盞煎至一盞去滓熱服綠袍散治風毒眼連眶赤爛及拳毛倒睫銅綠青鹽各二錢輕粉一字蠍尾二枚上為細末每用一錢漿水一盞調洗三次黃柏散出聖惠方治赤眼久患不瘥赤爛時癢腫痛視物不得黃連半兩黃柏半兩古錢七枚蕤仁三七枚湯浸去赤皮上以水二大盞煮取半盅綿濾去滓銅箸點之蕤仁膏出聖惠方治眼風熱赤爛春雪膏治眼赤爛疼痛不可忍片腦一分蕤仁二錢收霜蜜三錢生用濾去滓上研為膏點之又方出聖惠方治赤眼久患不瘥時癢腫痛視物不得黃連一兩去須搗為末古字錢五文蜜二兩上以竹管盛於飯甑上蒸一炊久綿濾取汁點之竹葉散出聖惠方治眼赤久患不瘥赤爛時癢淡竹葉一兩黃連一兩去須黃柏一兩半上銼以水二大盞煎取一鍾濾去滓日三四度點之雄黃散雄黃半兩細研細辛一分龍腦半錢細研上研令勻每至夜臥時以銅箸點之碧雲散出聖惠方治眼赤爛臘月豬脂五兩爛去滓銅青一兩細研膩粉半兩上藥盛油瓷瓶內以箸攪令勻冷凝結成膏每用先以熱鹽漿水洗眼後塗一大豆許於赤爛處日三用之又方出危氏方治爛眩風眼兩眥癢痛用此點之藥淚俱下流出小蟲陸景淵之子曾苦此淚漬兩頰成瘡百藥不效因理故書得此方試點之須臾藥淚俱下循瘡中流出其間有小蟲自此遂愈黃連淡竹葉各一兩柏樹皮乾用半兩濕用二兩上以㕮咀以水二升煎至五合稍冷用滴兩眥及洗之日三四度一方用五倍子為末貼之整睫散出聖濟總錄治瞼爛風眼疾白善土膽礬各半錢上生為散沸湯浸洗眼瞼不要洗入眼裡勝金丸出聖濟總錄治風毒眼癢痛連瞼赤爛並暴赤眼銅綠白礬各等分上以炭火燒令煙盡為度細研如粉用砂糖和為丸如豌豆大於南末粉內滾過每用二丸熱湯半盞浸化洗眼如冷更暖日三五次白龍散治目赤眥爛癢痛不可忍柴胡散治目赤爛一捻金散出聖濟總錄治風赤障眼四邊肉爛冷淚常出不止用朴硝半兩研調水點之驅風散治爛眩風赤眼又方出危氏方治眼癢或因布巾拭破眼瞼致成爛眼不得幹好白礬一兩煅過銅青三錢上同研細和勻如水白再加銅青每用半錢熱湯泡洗澄清以手蘸開眼如法洗必澀不可拭乾但閉目坐待澀止自然眼開如藥冷洗三五次效治風爛瞼風眼出經驗良方蕤仁肉杏仁各一兩湯浸去皮尖上同研入膩粉少許為丸熱湯化洗又方出經驗良方治爛瞼風眼用筍箬包九里光草煨熟捻入眼中一方出千金方治目赤爛取三指撮鹽置古文錢上以火燒赤投少許醋中浸沒錢以綿沾汁注眥內膩粉膏出聖惠方治眼赤爛不開用膩粉一兩以口脂調如膏每日大眥上點三五次又方出聖惠方取馬硝一兩納於豬膽內懸於霜露中旋旋掠取上面霜點眼或入蕤仁黃連末少許點之極妙又方出聖惠方取雞冠血點眼中日三五度治眼赤爛風赤開不得者出聖惠方以戎鹽細研水和點目中味鹹無毒可用一方用青鹽一兩以水二升煎至一升半濾去滓微熱洗眼冷即重暖不限度數洗之又方出危氏方治爛眩風赤眼用青礬火煅研出火毒每用半錢熱湯一盞泡溫洗治爛瞼拳毛倒睫治爛瞼風眼出海上方用螺一個以水養數日浸去泥沙候靨開以銅綠一豆大許入在內即化成水以鵝翎蘸水刷點瞼上數次即愈不可用余藥治別人只可醫一人也治瞼爛風眼出經驗方用山礬葉三十葉扯碎老薑三四十斤用水飯上蒸洗患處治爛瞼風眼出直指方用綠色爐甘石燒紅童便淬三次出火毒一日夜研為細末同黃連末用童便浸取漬點眼胞仍取覆盆子軟葉入男孩兒乳汁研為丸置眼眥頭引蟲出治爛瞼風一抹膏出海上方以麻油浸蠶砂三兩一宿研細以篦子塗患處隔宿即愈不問新舊經驗方陳方云表兄盧少樊嘗患此疾用之而愈親筆余冊消風散治爛瞼風眼雙目赤爛經年不安或癢或痛用消風散加白皮煎湯調下即用目生胬肉類驅風散湯之銅青湯治爛瞼眼點眼方出聖惠方治赤眼久患不瘥赤爛時癢痛視物不得治一切赤目爛眼疼癢不可忍者及昏暗隱澀不能開漸生翳膜多淚羞明如神秦皮䒽草甘草晉棗黃柏燈心黃連上等分銼如兩指大片子將棗子擘開每一合於無鐵器內盛之煎十餘沸通手用軟帛蘸洗後鼻中出香氣為度歸黃散出海上方當歸生地黃輕粉黃連赤芍藥各少許杏仁三枚去皮尖上㕮咀用絹袋裹用水一盞煎熱熏眼卻以別物裹藥閉眼熨之點眼方出海上方爐甘石半兩硇砂硼砂各一錢白礬腦子麝香各半錢上為細末用沸湯洗眼五七次方傾前藥末在內再洗還睛紫金丹治目眶眩爛歲久不愈俗呼為赤害是也當以三稜針刺眶外以瀉熱如眼生倒睫拳毛兩目緊急蓋內伏火熱而攻陰氣法當去其內火邪熱眼皮緩則毛立出翳膜亦退用手法攀出肉瞼向外以針刺之出血以左手爪甲亦針鋒迎之黃連三兩小便曬乾為末爐甘石一十四兩燒炊七遍研碎連末拌之黃丹三兩水飛當歸三錢南乳香三錢硇砂一錢小盞內放於瓶口熏之麝香一錢白丁香真者半錢輕粉一字白砂蜜二十兩上將白砂蜜於石器內慢火去沫先下甘石次下丹以柳枝攪過次下余藥以枯為度作丸如雞頭大每服一丸溫水化開洗之碌丹散子出衛生家寶方治男子婦人小兒一切赤爛瞼風眼黃丹白礬膽礬各半錢一處煅過白鱔二錢銅青二錢上為細末每用半錢沸湯泡洗治風毒爛瞼眼出衛生家寶方五倍子鷹爪黃連去蘆洗淨蔓荊子去皮淨洗各半錢肥大京棗二個上用新砂瓶貯水淨二升入四味藥炭火同煎取一升澄清以棗子點清藥汁不住挹眼瞼凡可六七次挹之藥汁如冷再暖令挹時須先微閉眼治爛眩風眼出衛生家寶方蕤仁五倍子荊芥穗上等分為銼散每服三錢濃煎去滓通手洗之即瘥白龍散出華佗中藏方治風毒赤爛眼眶倒睫冷熱淚不止白鱔一兩銅綠一錢別研上研同勻滴水和為雞頭子丸每服半錢百沸湯化開以手指洗眼亦得治爛眶風眼出華佗中藏方宣州黃連半兩大棗肉三七枚去核上一處用雪水一升砂鍋內文武火煮留一盞許過三七日以銅箸點食後臨臥日可三四次點之青金散治爛眩風眼赤腫熱癢銅青滑石蚌粉等分輕粉少許上為末桑葉煎湯泡洗少加青鹽去胬肉翳膜少加真白礬治爛瞼眼五倍子蔓荊子擇淨捶碎二味等分煎水洗治目赤爛出本草以馬腦石熨之治目赤爛熱障出本草用那耆悉取汁洗之療目赤爛出本草以欒傘合黃連作煎甚效洗輪散出仁存方治爛瞼眼黃連十文槐花少許上為細末入輕粉十文拌勻以生男兒乳汁和之用小盞盛於甑上蒸候飯蒸熟取帛裹藥於眼上拭三兩次即效干拭之屢驗治爛眼風眼上以黃桑柴灰淋汁澄清溫溫洗之
