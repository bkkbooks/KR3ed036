body:
  text: 卷七十三眼目門目赤痛附論夫內經謂心主血又曰肝受血而能視蓋肝開竅於目若肝氣壅盛心經熱實熱氣既熾血乃湧溢而上衝於目故令目赤痛也難經所謂痛者為實宜散壅滯決邪實則病可見已凡人患赤眼急欲效者多服洗肝散一時取愈而睛枯矣凡病目者先當服安腎散為佳又云清涼藥不可用而服鎮墜藥乃良方青葙子丸治目赤熱痛羞明淚出或生翳障青葙子五味子地骨皮菟絲子酒浸別搗為末生乾地黃焙決明子炒葶藶子隔紙炒各三兩麥門冬去心焙車前子地膚子葳蕤赤茯苓去黑皮子芩澤瀉防風去叉各二兩半兔肝一具炙乾杏仁去皮炙雙仁炒研細辛去苗葉桂去粗皮各一兩上為末煉蜜為丸如梧桐子大每服二十丸食後米飲下日三服青葙子散出聖濟總錄治目赤痛青葙子決明子炒黃連去須秦艽去苗土前胡去蘆頭大黃銼炒各一兩升麻黃芩去黑心梔子仁秦皮去粗皮枳殼去瓤麩炒地骨皮玄參赤芍藥各半兩羚羊角車前子各三分菊花甘草炙半兩上為散每服三錢食後溫熱水服臨臥再服春夏加白芷一兩秋冬加防風一兩麥門冬湯出聖濟總錄治眼赤痛生障翳乍瘥乍發多淚羞明隱澀腫癢心神煩躁麥門冬去心焙防風去叉玄參地骨皮遠志去心大黃炒車前子茺蔚子決明子蔓荊實去白皮細辛去苗葉黃芩去黑心黃連犀角屑甘草炙各二兩上粗搗篩每服三錢水一鍾煎至七分去滓食後溫服車前子散出聖濟總錄治目昏赤痛兼倒睫赤眼車前子二兩石決明炒一兩半蕤仁去皮一兩半龍膽半兩青葙子梔子仁各一兩菊花地膚子甘草炙前胡三分上為散每服三錢空心粟米飲調下食後臨臥再服黃芩湯治赤眼痛黃芩去黑心梔子仁三分大青黃連去須決明子炒各半兩地骨皮一兩半木通秦艽去苗土各三分大黃炒一兩半甘草炙一兩上粗搗篩每服五錢水一盞半煎一盞去滓入馬牙硝半錢食後溫服臨臥再服前胡湯出聖濟總錄治赤眼疼痛如脫視物不明兼治肝虛風眼前胡二兩去蘆決明子炒防風去叉車前子各一兩甘菊花黃連半兩細辛三兩苦參三兩枳殼麩炒升麻各二兩上粗搗篩每服五錢水一鍾半煎至一盞去滓入馬牙硝半錢溫服臨臥再服如已疏利則不用硝旋覆花湯出聖濟總錄治目赤痛兼風毒沖目睛痛旋覆花升麻秦艽去苗土羚羊角鎊防風去叉葳蕤各一兩黃連去須柴胡去苗各半兩黃柏去粗皮半兩甘草炙半兩上粗搗篩每服五錢水一盞半煎至一盞去滓食後溫服臨臥再服夜光丸出衛生寶鑑治赤眼翳膜昏花宣連訶子去瓤各二兩當歸一兩銅綠二錢以上四味㕮咀用河水三升同浸兩晝夜入銀石器熬取汁一大盞約八分來得所覷滓黑色為度生絹綢取汁再入文武火熬槐柳枝攪滴水成膏為度取豵豬肚子二個先去脂以禾稗葉梢於水內搓洗換水無度令淨細切入黃連膏內煮黑色取出用之黃丹四兩新水內淘去滓炒焙乾研細用鵝梨十枚竹刀去皮核生布絞取汁用青鹽六兩細研蜜一斤煉去滓蠟十兩止爐甘石一兩童子小便一大碗炭火燒紅蘸之小便盡甘石如粉白為度研極細上將梨汁入甘石入膏子熬五沸入青鹽以槐柳熬至褐色方盛瓷甕冰冷水浸拔去火毒臘月合為妙正月十一月次之余月皆不可石蜜煎點眼療赤眼馬牙硝點眼方出聖濟總錄治赤眼澀障翳侵睛磣痛馬牙硝半兩蕤仁去皮研七粒杏仁去皮尖雙仁炒研三七枚烏賊魚骨去甲研半兩石膽碎為綠豆大黃連為末象膽研一分赤石脂一綠豆大研真珠十粒泥裹燒去泥研上同研極細瓷合盒內盛之每取黍許大旋用清水和點梔子湯治赤眼澀痛梔子仁黃連去須半兩黃芩去黑心半兩枳殼麩炒三分龍膽一兩甘草炙三分芍藥一兩大黃炒一兩半上粗搗篩每服五錢水一盞半煎一盞去滓食後溫服臨臥再服葳蕤湯出聖惠方治赤眼痛見明不得並濕癢葳蕤黃連去須秦皮去粗皮決明子炒各一兩半菊花防風去叉梔子仁甘草炙各一兩上粗搗篩每服五錢水一盞半煎至一盞去滓食後溫服臨臥再服地骨皮湯出聖濟總錄治赤眼痛地骨皮茺蔚子各一兩半防風去叉黃芩去黑心玄參大黃銼炒細辛去苗葉各一兩芒硝二兩上粗搗篩每服三錢水一盞煎至七分去滓食後臨臥溫服祛風退熱湯出聖濟總錄治目昏暴赤邪熱攻瞼膜隱腫瘀成瘡眥爛乍瘥乍發防風去叉當歸焙乾去土芍藥甘草人參柴胡去苗各一兩大黃炙山梔子各半兩上粗搗篩每服三錢水一盞煎至七分去滓食後溫服石決明丸出聖濟總錄治肝臟熱極目赤澀痛淚不止風濕癢心膈壅滯頭目常疼石決明一兩細研水飛過黃連去須玄參地骨皮防風去蘆梔子仁子芩獨活茯神車前子甘菊花青葙子枳殼麩炒微赤秦艽去苗五加皮決明子葳蕤沙參去蘆蕤仁浸去赤皮川大黃微炒茺蔚子各三分上為末煉蜜和搗三二百杵丸如梧桐子大不計時候以薄荷湯下二十丸羚羊角散出聖惠方治肝臟久積風熱兩眼赤痛上焦壅滯頭重心煩四肢不利羚羊角屑茯神車前子甘菊花決明子防風去蘆羌活赤芍藥蔓荊子黃芩川升麻山梔仁麥門冬去心甘草炙微赤柴胡去苗各三分枳殼一兩麩炒微黃去瓤上為散每服四錢水一盅煎至六分去滓食後溫服忌炙爆熱面油膩等物治眼赤澀痛方出聖惠方蜜四兩黃丹三兩黃連一兩去須別研為末膩粉半兩蕤仁半兩湯浸去赤皮細研龍腦一分細末杏仁湯浸去皮尖細研麝香一分細末銅綠一兩水一茶碗浸七日用絹濾過只用水去滓上除麝香龍腦外拌和令勻入瓷瓶中用油單密封以重湯煮一日入腦子麝香以銅箸攪令勻後滴水在內如琥珀色藥成如常法點眼槐皮洗眼湯出聖惠方治眼赤痛槐皮二兩秦皮一兩黃連半兩淡竹葉一握蕤仁一兩浸洗去赤皮梔仁半兩黃柏半兩馬牙硝半兩青鹽一分上粗搗為散每用藥一兩水三大盞入古字銅錢十四文煎至二盞去滓每暖三合洗眼日三度宜避風黃連膏出聖惠方治赤眼痛不開竹葉湯治眼赤痛淡竹葉洗淨三握黃連一兩青錢二七文大棗十枚去核車前子切五合上都銼以水三升煎取一升去滓微熱淋洗眼冷重暖不拘次數以瘥為度黃芩湯治熱毒攻眼小眥偏赤疼痛不可忍黃芩去黑心枳殼一兩去瓤麩炒葳蕤木通甘草炙各一兩半上銼如麻豆每服五錢水一盞半煎至一盞入地黃汁半合芒硝一錢再煎取沸去滓食後良久溫服二次胡黃連散出宣明論治不問久新赤目疼痛不能坐臥並大人小兒口瘡胡黃連檳榔各半兩麝香少許別研上為細末點之如口瘡每服半錢麝香一字勻口瘡大小貼之忌食魚肉油膩之物魚膽貼眼膏出聖惠方治眼赤痛鯉魚膽一枚黃連半兩去須川大黃半兩上魚膽汁和調末藥以瓷瓶盛之於飯上蒸之熟為度取出如干即入少許熟水調如膏塗於帛上貼在眼瞼地龍糞餅子出聖惠方治眼赤痛地龍糞半兩研梔子仁半兩牛蒡根半兩生者上件藥搗令熟便軟得所捏作餅子閉目臥榻於目上時時易之療眼赤飲方前胡黃連秦皮黃芩各二兩梔子仁二兩碎決明子二兩半蕤仁二兩竹葉切一升上切以水六升煮取二升五合去滓分三服食後服忌豬肉玄參湯治目赤生翳玄參柴胡去苗決明子炒石膏羌活去蘆細辛去苗葉一兩黃芩去黑心地骨皮各三分上粗搗篩每服五錢水一盞半煎至一盞用竹葉七片去滓投入芒硝半錢食後臨臥溫服玄參湯一名羚羊角湯治肝心風熱目赤痛石膏散出聖濟總錄治心焦壅熱目赤口乾石膏碎甘菊花羌活去蘆頭白附子炮白殭蠶炒玄參黃連去須上等分為散研勻每服二錢生薑茶清調下療眼赤方蕤仁黃芩梔子仁黃連秦皮各二兩竹葉切一升上切以水五升煮取一升六合分三服忌豬肉療眼赤熱方前胡防風決明子黃連蕤仁各二兩竹葉切一升上切以水六升煮取二升分為五服忌豬肉竹葉湯竹葉一握犀角屑升麻乾葛各二兩黃芩麥門冬去心各三兩上切以水六升煮取二升分為三服通隔薺苨湯治目赤痛及澀腫薺苨四兩石膏地骨皮甘草微炙各二兩葛根銼三兩黃芩去黑心一兩上粗搗篩每服三錢水一盞入竹葉七片煎至六分去滓放溫食後服臨臥再服黃耆湯治熱毒攻眼黑暗通赤黃耆銼芍藥知母升麻各一兩半犀角鎊一兩半苦竹葉五十個上銼如麻豆大每服五錢水一盞半煎至一盞入麻硝一錢煎再至沸去滓食後溫服忌炙爆熱面洗輪散出王氏博濟方治風毒攻注眼目赤疼大退翳膜去瘀肉洗風沙鐵屑磁末因入目澀痛仙靈脾去梗秦皮去粗皮黃連去須槐花炒等分生犀鎊少許上為細末散每用半錢以清水調澄清洗之沙末等只三兩洗自退在水如風毒眼用一錢水一盞煎至七分乘熱淋洗黃連丸治赤眼黃連去須蒺藜子炒去嘴一兩半枳殼去瓤麩炒石決明炒各一兩豉炒一合上為末煉蜜丸如梧桐子大每服二十丸食後溫漿水下加至三十丸枸杞煎出聖惠方治目赤痛晝夜疼痛不止枸杞葉研取汁半斤杏仁去皮尖雙仁十枚黃連去須搗末一分青鹽研半錢膩粉一錢上為末以新綿裹納淨瓷閤中將枸杞汁調候至一伏時絞去滓以銅箸點少許目眥頭日三五度五黃散出御藥院治目赤黃連黃芩黃丹大黃各半兩黃柏一兩上為末每用一錢水蜜調成膏攤在絹花子上隨目赤貼太陽穴治赤眼方出儒門事親銅綠輕粉牙硝麝香等分腦子少許上研為細末干貼之截赤眼方出儒門事親黃連綠礬杏仁甘草銅綠各等分上為粗末水煎洗甚效光明散出海上方治赤眼黃連一兩當歸一分淡竹葉三十片赤芍藥二錢赤棗五個上為粗末分為四次各用水一碗半煎至三分以紙蓋上小取一孔熏之隨手即洗之效陳氏經驗方云昨在鄂渚一時皆病此赤眼利用此方無不效者因得方廣以濟人棗連膏治患赤眼日夜疼痛不可忍者棗五個黃連白礬少許甘草乳香少許上件煎成膏子滴在眼中效一方無乳香赤眼方上取真珠黃連為細末納螺中須臾汁出取汁點之瘥久患內障加車前子乾地黃麥門冬等分為末蜜丸酒服眼梢赤藥出濟生拔粹方黃連三錢白礬三錢水飛銅綠半錢密陀僧一錢輕粉少許上為極細末少許點之大黃丸治上焦積熱目赤澀痛川大黃銼碎微炒梔子仁五兩薺苨五兩葛根銼一兩上粗搗篩每服五錢水一盞半竹葉七片去滓取溫食後臨臥服瀉肝防風湯出聖濟總錄治目赤痛防風去叉茺蔚子大黃銼炒桔梗銼炒各二兩上粗搗篩每服五錢水一盞半煎至一盞去滓入芒硝半錢食後臨臥溫服如已疏利即不用入芒硝蒼朮散出聖濟總錄治目赤痛蒼朮一兩蟬蛻木賊銼黃芩去黑心各半兩上生搗為散每服一錢新汲水調下食前服後仰臥少時再服竹葉煎出聖惠方治目赤痛竹葉淨切二握大棗劈破五枚古文銅錢七枚黃連去須末半兩上合和納銅石器中以水一升煎至五合濾去滓又重煎三合納瓷瓶中每以銅箸點少許目眥頭日三五次一方無大棗綿染敷目眥治目赤痛出千金方雄黃細辛黃連乾薑各二錢上合治如粉以綿裹釵股唾濡頭拄藥末納大眥頭急閉目目中淚出須臾止勿將手近勿將帛裹勿洗之一方加礬石五味子各六銖一方去細辛用礬石四味各六銖又方出千金方雄黃乾薑黃連礬石各六銖上合治如前方一方加細辛六銖通腦散出御藥院方治目赤腦熱寒水石燒赤飛過研細二錢腦子研細一錢南硼砂另研細半錢上共處一處研勻極細每用少許鼻內搐無時用冰池散出御藥院方黑豆炒去皮為細末馬牙硝研青黛研各一兩腦子研一錢少許上為細末如粉每用一錢涼蜜水調如麵糊相似攤