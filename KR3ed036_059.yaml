body:
  text: 卷五十九舌門總論夫凡舌者主心小腸之候也舌重十兩長七寸廣二寸半善用機衡能調五味也凡有所啖若多食鹹則舌脈凝而變色多食苦則舌皮稿而外毛焦枯多食辛則舌筋急而爪枯乾多食酸則舌肉肥而唇揭多食甘則舌根痛而外發落又曰心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味內合五臟之氣也若臟熱則舌生瘡引唇揭赤若腑寒則舌本縮口噤唇青寒宜補之熱宜瀉之不寒不熱依臟腑調之舌縮口噤唇青升麻煎主之舌者心之官主嘗五味以榮養於身資於脾以分布津液於五臟故心之本脈繫於舌根經絡脈繫於舌旁肝脈循陰器絡於舌本凡此三經或為風寒濕所中使人舌捲縮而不能言或憂怒思恐所郁則舌腫滿而不得息心熱則破裂生瘡肝壅則出血如湧脾閉則白胎如雪諸證雖異治之各有方舌者脾脈之所通心氣之所主和則知味資於脾而榮於身者也二臟不和風寒中之則舌強而不能言壅熱攻之則舌腫不能語更有重舌木舌舌胎出血等證皆由心脾虛風熱所乘而致耳更有傷寒舌出過寸此慮毒熱攻心也但舌瘡一證不得因實熱所致亦有虛熱上攻而就者卻不可倒用涼藥也貴乎鎮墜寧心而已局方所載黑錫養正二丹並以冷鹽水送下用之多效重舌附論夫大人小兒重舌候者心脾有熱故也心候於舌而主血脾之絡脈又出舌下心火脾土二臟子母也有熱則血氣俱盛其狀附舌下近舌根遂令舌下血脈脹起如小舌狀故謂之重舌蓋心開竅於舌足太陰之脈屬脾絡胃上膈俠咽連舌本散舌下故也方紅雪煎出聖濟總録治心脾有熱生重舌羚羊角鎊升麻吳藍黃芩去心芍藥人參大青淡竹葉切各一兩檳榔為末三兩木香為末三兩木通銼山梔子去皮丹砂研蘇枋木椎碎煎葛根各一兩椎碎朴硝研一升桑根白皮一兩枳殼去瓤麩炒三分麝香研半兩甘草炙二兩上除朴硝蘇枋木丹砂木香麝香檳榔外銼如麻豆大以水二斗五升煎至九升濾去滓再煎數沸下朴硝不住手以柳篦攪候水腳欲盡下蘇枋木汁更煎三五沸於新砂盆中次下木香檳榔麝香丹砂等末攪令勻每服一錢匕綿裹咽津甚者蜜水調下一錢匕食後服之石膏煎出聖濟總録治心脾積熱生重舌及時行陰黃丹石發動一切熱毒石膏凝水石滑石並碎各一斤鬱金研犀角鎊屑各一兩黃芩去黑心五兩升麻三兩山梔子去皮二兩黃連去須三兩芒硝研一斤馬牙硝研半兩上先以石膏凝水石滑石等用水三斗入金十兩無金入銀十兩亦得先煎金石藥汁至一斗五升澄清次入犀角鬱金草藥等再煎至七升去滓再煎先下芒硝煎三兩沸次下馬牙硝攪令化不住手攪良久用一新瓦盆盛貯一兩日凝結每服一錢匕用蜜水調下大人小兒以意加減服牛黃散出聖濟總録治重舌牛黃研人參各半兩白茯苓去黑皮三分大黃銼炒半兩當歸切焙一分甘草炙半兩丹砂研一分麝香研半兩上為細散每服半錢匕溫水調下甚者加至一錢匕食後服朴麝散出聖濟總録治重舌及天行陰黃丹石發動一切熱毒朴硝研五兩麝香研一分黃芩去黑心半兩山梔子去皮一兩甘草炙一分淡竹葉一握蘆根銼一兩上銼五味如麻豆大入研者二味以新汲水三升將藥入鐺中煎約半升以來去滓澄清取瓷瓶一個傾藥汁在內以物蓋定瓶口用鹽泥固濟慢火煅一復時去火放冷卻將瓶安在水中無令水至瓶口浸經一宿至明日打破瓶子取藥如金色研為細散每服半錢匕冷水調服綿裹咽津亦得牛黃散出聖惠方治重舌口中涎出水漿不收牛黃龍腦硃砂各一分太陰玄精石二兩上細研為散每度用藥一半錢先於重舌上以鈹針刺破出血用鹽湯漱口然後摻藥於舌上咽津神驗芝隱方出海上方治重舌或不能言乾薑蒲黃上等分為末干搽即愈蓋二藥陰陽得中宋度宗春月欲賞花飲宴不意一夜舌腫滿口不能飲食蔡御診進此方立效因此入內黃柏湯治舌腫及重舌黃柏甘草炙銼各一兩上粗搗篩每服三錢水一盞煎至七分去滓食後溫服治重舌皂角刺燒灰為末朴硝少許細碾為末上先以手蘸水搽口內並舌上下將藥摻在舌上下涎出自消治重舌口中涎出方出聖惠方驢乳一升豬乳一升上相和煎至半升不拘時候服半匙蒲黃散出危氏方治重舌上戴妨礙不能言口中涎出用新真蒲黃羅細數敷之吐出又敷之立消亦治舌腫敷舌上不過數上愈須真者可用李莫安撫內子夜半忽不能言燭之乃舌下生一舌上戴急取外臺檢此方五七敷即愈一方炒碾為末摻之治重舌出經驗良方用竹瀝漬黃柏隨時點舌上朴硝散出經驗良方治重舌喉痹用朴硝黃丹細散摻重舌上用竹筒以半錢許吹入喉中即破吐涎而愈甚者不過兩次又方出經驗良方用五靈脂一兩去砂石為細末用米醋一大碗煎旋噙漱口即安又方出經驗良方用皂角四五皮不蛀者去皮弦炙令乾地上出火毒荊芥穗少許二味為細末米醋調塗腫處即消治重舌木舌出危氏方用川烏尖巴豆為末米醋調刷患處即效木舌須先服勝金散開關竅治重舌口中涎出水漿不收出聖惠方用簸箕舌燒為灰細研以溫酒調下一錢又方出聖惠方用伏龍肝研如粉以牛蒡汁調敷之效又方出聖惠方用蛇蛻皮燒灰研令細以少許敷之效一方治小兒重舌燒蛇蛻皮為末唾和塗舌上瘥治重舌口中涎出方出聖惠方上取田中蜂房燒灰細研以好酒和敷喉下立愈杏仁膏出聖惠方治口舌熱干或舌上生苔語言不真升麻杏仁去皮尖甘草炙各一兩黑豆五十粒去皮上為細末入白蜜五合生地黃汁五合慢火熬成膏子丸如雞頭大噙一丸咽津舌上生苔立用薑蘸冷水搽洗之薄荷蜜煎出淡寮方治舌上生苔苔乾澀語話不真白蜜薄荷自然汁各等分上以生薑片先蘸水揩洗再用硃砂雄黃硼砂腦麝為末敷之良未效更加玄明粉一方先以生薑蘸水揩洗用薄荷自然汁白蜜作煎服之治大人小兒重舌腫起舌下出鮑氏方用地鱉蟲和薄荷研汁帛包捻舌下腫處重舌極證出鮑氏方用指去爪先於舌下筋上捺至根漸漸深捺入如此三次又用指蘸水取項後燕窠小坑中筋自上干下至小窟深深捺入亦三次小兒若飲乳勝前即病去矣半夏酒治重舌滿口上用半夏二十枚水煮過再於水中泡片時乘熱用好酒一升浸密封頭良久取酒乘熱含冷時即吐又含熱者以瘥為度內服此並瘥服歸荊湯獨活酒人為邪氣所幹則發而為病若氣若血若痰若水若火若風若寒若暑若濕腑臟表裡冷熱虛實各有受病之處用藥之法必究其原而後可以起病否則前賢所謂獵不知兔廣陸原野冀一人獲之術亦疏耳豈可以人試伎乎哉一方用羌活得汗則愈歸荊湯出指南方治風痙昏迷吐沫抽掣背脊強直産後中痙通用當歸荊芥穗各等分上為末每服二錢水一盞酒少許煎七分灌下如牙關緊用銅匙斡開以雞羽蘸藥入口或用童尿調下或以芎藭代當歸亦妙舌腫強附論夫手少陰為心之經也其氣通於舌足太陰脾之經也其氣通於口太陰之脈起於足大指入連舌本心脾虛為風熱所乘即隨脈至舌熱氣留於心血氣壅滯故舌腫腫則脈脹急則舌腫強也心氣通於舌脾脈俠咽連舌本散舌下心脾二經受風邪則舌本強不能卷舒又或熱氣加之則腫腫則脈筋脹急勢連咽喉礙於呼吸法宜刺之泄去惡血及藥餌之儒門事親書云南鄰朱老翁六十餘歲身熱數日不已舌根腫起和舌尖亦腫腫至滿口比原舌大二倍一外科以燔針刺其舌兩旁下廉泉穴病勢轉凶戴人曰血實者宜決之以扉針磨令鋒極尖輕砭之日砭八九次血出約一二盞如此者三次漸而血少痛減腫消夫舌者心之外候也心主血故血出則愈又曰諸痛癢瘡瘍皆屬心火燔針艾火是何義也方白茯苓湯出聖濟總録治舌腫強白茯苓去黑皮牛黃研各三分犀角屑一三分甘草炙人參羚羊角屑白朮桂去粗皮熟乾地黃焙各半兩上粗搗每用三錢匕水一盞煎至七分去滓溫服日三射干湯出聖濟總録治木舌腫強及天行病丹石發動一切熱毒射干木通銼大黃銼炒馬蘭子各一兩半漏蘆去蘆頭升麻當歸切焙桂去粗皮甘草炙各一兩上粗搗篩每服五錢匕水一盞半煎至八分去滓分溫二服日三夜二牛黃散出聖惠方治舌腫強牛黃細研漢防己各三分甘草炙銼人參去蘆頭羚羊角屑生乾地黃牛蒡子微炒桂心各半兩犀角屑一分上為散入牛黃研令勻每服三錢水一中盞煎至六分去滓不計時候溫服柴胡散出聖惠方治腹中虛熱舌本強直口吻兩邊痛舌上有瘡咽食不得柴胡去苗川升麻梔子仁赤芍藥木通各二兩銼黃芩大青杏仁各一兩半湯浸去皮尖雙仁石膏三兩上為散每服五錢水一大盞入生薑半分煎至五分每於食後溫服金沸草散出危氏方治風寒傷於心脾令人憎寒發熱齒浮舌腫荊芥穗四兩旋覆花前胡麻黃去節各三兩甘草炙赤芍藥半夏湯浸七次各一兩上銼散每服四大錢水一盞半薑七片棗二枚煎七分去滓漱口吐一半吃一半世醫用此發散傷風傷寒及加杏仁五味子治咳嗽皆效治舌腫牙疼辛未年有人患舌腫如吹滿塞其中粥藥不入其勢甚為大煎一劑乘熱以紙籠氣衝之即愈黃連湯出聖濟總録治傷寒舌腫黃連去須大黃生用各一兩大青五根升麻黃柏各半兩甘草炙三分上粗搗篩每服五錢匕水二盞入黑豆一撮同煎至一盞去滓分溫二服病未退每服更加芒硝末半錢匕湯成下以微利為度治心脾壅熱生木舌腫脹一名玄參散出聖惠方玄參升麻大黃犀角各七錢半甘草半兩上為末每服三錢水一盞煎五分溫服牡蠣散出聖濟總録治牙疼連牙關急口眼相引木舌腫強不能轉牡蠣煅研伏龍肝附子炮裂去皮臍白礬煅研各半兩上為散以酒和如泥每用一錢於患處塗貼吐津正舌散出危氏方治中風舌本強難轉語言不正神妙蠍梢去毒一分茯神木銼微炒一兩龍腦薄荷焙乾二兩上為細末每服一二錢溫酒調食後服或以搽牙頰間亦得柴胡散出聖濟總録治舌本強兩邊痛柴胡去苗升麻各一兩梔子仁半兩上為散每服一錢匕用熟水調下日三服蒲黃散出海上方治舌忽然腫硬或出血如湧蒲黃海螵蛸末各等分上為細末每用少許塗舌上瘥治木舌漸腫大滿口若不急治即塞殺人方太醫局紫雪一分竹瀝半合上研紫雪以竹瀝和之時時抹入口中礬飛散出海上方白礬飛百草霜各等分上為末捻糟茄自熟水調若口噤挑灌之妙二聖散治舌根腫咽喉不利紅芍藥甘草各等分上㕮咀每服三錢水一盞煎至七分去滓溫服仍漱咽之礬石散出聖惠方治舌強不能言語白礬研肉桂去粗皮各一兩上為散每用一錢匕或半錢匕安舌下或舌上立瘥蟅蟲散出聖惠方治舌腫滿口言語不得蟅蟲五枚炙鹽半兩上細研為散以水二盞煎至十餘沸去滓熱含冷吐以瘥為度麝香散出聖濟總録治舌強不語麝香皂莢各半兩上為散每用半錢摻舌腫上吐津舌腫強方出直指方蛇皮燒存性全蠍各等分上為末少許摻敷之治舌曝腫宜摻藥方出聖惠方乾薑半夏各一分湯浸七遍去滑上為細散每用少許摻在舌上以瘥為度百草霜散一名黑散子治舌腫起如豬胞肪忽然硬腫逡巡塞悶殺人出危氏方用釜下墨末以醋厚敷舌下脫去更敷須臾即消若先決出血汁竟敷之彌佳凡此患人皆不識或錯治益困殺人甚急但看其舌下自有噤蟲形狀如螻蛄或如臥蠶仔細看之有頭尾其頭少白燒鐵釘烙頭上即熱使自消一方釜下墨和鹽等分瀝清水塗腫處令遍表裡良久即愈一方用醋調尤妙一方用井花水調釜下墨鹽成膏敷舌上立愈治舌腫強滿口方滿口含糖醋少許時熱通即止蒲黃散膏治舌腫滿口不能言用蒲黃調成膏敷舌上下以萆麻碎紙卷燒煙燻之隨即消縮治舌腫脹用好硼砂為細末用薄批生薑蘸藥揩舌腫處少時即退又方治舌強不語用蛇膽一枚焙乾碾為末敷舌上有涎吐之半夏酒治舌腫滿口氣息不通須臾殺人急以手指刺破潰出惡血亦可用微針決破次用此藥用半夏十二枚以苦酒一升煮取八合稍稍漱口熱含冷吐半夏動人咽喉以薑汁解之一方密封頭良久取出含之蚯蚓方治舌腫滿塞喉欲死用蚯蚓一條以少許鹽花化為水以塗咽喉舌上良久漸消甘草湯治舌猝腫起滿口塞喉氣息不通頃刻殺人以針決舌下兩邊第一大脈出血銅箸燒令赤尉瘡數遍令血絶用甘草不拘多少濃煎湯熱含冷吐又方治大人小兒重舌腫起舌下用朴硝研水敷咽喉外其內用成塊者含涎出乃平又方用地鱉蟲和薄荷研汁綿包蘸舌下腫處治舌用葈耳葉挼安舌下令涎出去目黃好睡治跌倒舌因牙誤枕綻破者用生薑切作薄片貼之治舌根腫疼不可忍者用升麻湯加柴胡枳殼山梔子用水二盞煎至一盞去滓服之立效治舌忽然硬腫逡巡塞悶殺人方或血出如湧一名蒲黃散用烏賊魚骨蒲黃等分為末每用少許塗舌上瘥一方只用蒲黃摻上瘥縮舌膏一名如神散出仁存方治舌腫懸下尺許及傷寒熱毒攻心舌出數寸用片腦成片頻敷於舌上三四次合就無事又方出經驗良方用萆麻仁三四十粒乳鉢研細取油塗紙上二幅炭火上燒紙一幅熏舌上未退又燒一幅取令此證退如未愈再合用之令愈為度如治牛舌出亦好一法染黃紙卷捶碎萆麻子燒煙燻之其舌竟退入巴豆方出經驗良方治傷寒後不能轉攝舌出不收者用巴豆一枚去油取霜用紙捻卷之納入鼻中其舌即收治舌猝腫起如吹泡或如豬脬形滿塞喉氣息不得通須臾不治殺人便以指刮破舌兩邊或破血出尤好亦可以鈹刀決兩邊破之以瘡膏敷之出聖惠方又方出肘後方刺舌下兩邊大脈血出勿使刺著舌下中央脈血出不止殺人如上治不愈或血出數升則燒鐵篦令赤尉數過以絶血也又方出仁存方治舌忽然腫破用釜下墨煙和鹽塗舌上下酒調米醋調皆安舌強不語出永類鈐方用白礬桂心末敷之硬腫悶塞塗釜底上炱煤和鹽等分為末塗之一用赤小豆末醋調塗如神散出御藥院方治舌腫強及齦腫不消露蜂窩椒末青鹽各等分另研為末上件每用各炒一錢和勻用水一盞半煎至八分去滓熱漱冷吐藥盡為度舌縮口噤附論夫心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味內合五臟之氣也若臟熱則生瘡唇揭青色若臟寒則舌本縮而口噤唇青寒宜補之熱宜瀉之不寒不熱依臟腑調之方獨活解噤膏療舌小腸腑寒應舌本縮口噤唇青獨活芎藭苦李根皮各三兩天雄炮防風細辛桂心各一兩蜀椒二合莽草十葉豬肪二片上㕮咀綿裹以苦酒一升漬一宿以豬肪微火煎之去滓膏成凝以綿裹少許口含於舌下壓之取瘥日三度易之又生艾葉敷法無生艾葉者取乾者搗之以水淹一升熱搗以帛塗之於腫塞處上封裹之以瘥為度龍石散治大人小兒上膈壅毒口舌生瘡咽嗌腫塞疼痛妨悶每用少許摻貼患處咽津小兒瘡疹毒氣攻口齒先用五福化毒丹掃後仍再用此藥摻貼立效硃砂研飛二兩半寒水石燒赤二斤生腦子研二錢半上為末每日五七次用夜臥摻貼妙吹喉散治三焦大熱口舌生瘡咽喉腫塞神思昏悶並能治之蒲黃一兩盆硝八兩青黛一兩半上用薄荷汁一升將盆硝青黛蒲黃一處用瓷罐盛慢火熬令乾研細每用一字或半錢摻於口內良久出涎吞之不妨或喉中腫病用筒子入藥半錢許用力吹之無不立效一方無蒲黃舌上出血附論夫心主血在竅為舌若心臟蘊熱則血得熱而妄行或溢於心之竅故有舌上出血之證甚者出如湧泉方治舌上黑有數孔大如著出血如湧泉此心臟病戎鹽黃芩一作葵子黃柏大黃各五兩人參桂心甘草各二兩上為末蜜丸如梧桐子大以飲服十丸日三亦燒鐵烙之香參丸治心臟熱盛舌上出血人參生蒲黃麥門冬去心焙當歸切焙各半兩甘草生乾地黃焙各一兩上為末煉蜜丸如小彈子大每服一丸溫水化下日三四服升麻湯治心臟有熱舌上出血如湧泉升麻銼茜根銼小薊根銼各一兩半艾葉去梗一握凝水石碎三兩上粗搗篩每服三錢匕水一盞同煎至七分入生地黃汁一合更煎一二沸去滓溫服寸金散治心經煩熱血妄行舌上出血不止新蒲黃三錢新白麵三錢牛黃研生龍腦各半錢上研極細生藕汁調下一錢匕食後臨臥服日二文蛤散治熱壅舌上出血如泉方五倍子洗白膠香牡蠣粉各等分上為末每用少許摻病處或燒鐵篦熱烙孔上阿膠散治舌上血出不止阿膠炒燥蒲黃黃耆細銼各一分上為細散每服一錢匕生地黃汁調下並二服熟艾湯治心經蘊熱舌上血出及諸失血熟艾用糯米半合炒松黃柏葉炙各半兩上粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候紫霜丸治舌上出血竅如針孔紫金沙即露蜂房頂上實處是研一兩蘆薈研二錢貝母去心四錢上為末煉蜜和丸如櫻桃大每服一丸水七分一盞化開煎至五分溫服吐血衄血每服一丸酒半盞化開服治舌上出血如簪孔方黃連半兩黃柏三兩梔子二十枚上以酒二升漬前藥一宿去滓煮三沸頓服聖金散治舌上忽然血出不止黃柏一兩青黛一分上為細散每服一錢匕食後新汲水調下日二服鬱金散治心臟積熱血脈壅盛舌上血出鬱金一兩當歸切焙半兩上為散每服一錢匕煎生薑烏梅湯調下地黃散出聖惠方治舌出血如簪孔者生乾地黃焙乾鹿角膠炒令乾燥各一兩上為散每服二錢匕食後糯米飲調下必勝散出危氏方治舌衄真蒲黃略炒螺兒青各等分上為末每用少許搽患處少時溫鹽水漱之治舌硬忽出血不止用木賊煎湯漱之良清心散治舌上出血並九孔出血用刺薊一握研絞取汁以酒半盞調服如無生汁只搗乾者為末冷水調下三錢匕兼治大衄黃柏散治心臟熱極舌上血出用黃柏二兩塗蜜慢火炙焦搗羅為散每服二錢匕溫糯米飲調下治舌上忽出血如簪孔者出聖惠方用香薷汁一升日三服一方細嚼即止一方作香術治舌上出血如針孔出聖惠方用豉二三升水三升煮之沸去滓服一升日三服一方用豉一合水一碗煮數沸溫服一盞治下血治舌上出血如簪孔出聖惠方用赤小豆一升杵碎水三升和攪取汁飲一方用苦酒和塗舌上治舌出血不止無故出血仍有小竅此名舌衄出朱氏集驗方用槐花曬為末敷舌上或炒槐花地上出火毒敷之如舌腫以真蒲黃末乾摻之治自行被攧穿斷舌心血出不止以米醋用雞翎刷所斷處其血即止仍用真蒲黃杏仁去皮尖硼砂少許研為細末煉蜜調藥稀稠得所噙化即安治舌上出血如簪孔者出聖惠方用巴豆一枚燒作屑亂髮如雞子大燒末以酒調服之治舌上出血如泉方出聖惠方以燒鐵箸熱烙孔中良治舌上出血如泉用五倍膠香牡蠣粉末摻之或燒鐵箸烙其孔
