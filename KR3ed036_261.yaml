body:
  text: 卷二百六十一乳石門乳石發寒熱頭痛附論夫五行五臟皆互相主肝雖處中而為臟首位在甲乙惠養懷仁故應春而王也為心之母餘臟循而次生焉心為王主身神毅而無纖不察四臟為四鄙四鄙有擾王必懷憂四臟和平則王有悅悅則榮衛不錯憂則經絡患生心不受邪所病者為憂藥能致也肺為風府施於太穹為呼吸之門氣息之道也諸臟紊亂氣息皆形誰能出不由戶耳若熱風盛心憂則頭痛若過憂則心煩熱盛必寒寒盛必熱倚伏之道足可明焉皆由風狂邪熱之謂也但平風熱抑狂邪榮衛自然通泰也若乳石發動寒熱頭痛者以石熱壅積將適失度陰陽之氣不得和平也蓋陽病發熱陰病發寒一於熱則偏於陽一於寒則偏於陰時寒時熱則榮衛交爭陰陽相勝若傷寒諸瘧之狀是也且服乳石之人將息過溫榮衛壅滯氣血不和陰陽二氣更相乘克陽勝則熱陰勝則寒陰陽不等虛實相併則生寒熱疾因其榮衛否塞石氣在於臟腑不得宣通致心肺有熱毒之氣上攻於頭則令頭痛也方麥門冬丸出聖惠方治諸石發動口乾時作寒熱似鬼神病麥門冬去心焙五兩大黃銼炒苦參葳蕤梔子仁五加皮銼黃芩去黑心犀角鎊芍藥升麻大青各一兩甘草炙三分上為末煉蜜搜和更搗勻丸如梧桐子大每食後以蜜水下十五丸漸加至二十丸犀角丸一名麥門冬丸治乳石發動口乾寒熱似鬼神為病犀角屑五加皮銼黃芩去黑心各一兩苦參大黃銼碎微炒芍藥各一兩半大青甘草炙各三分麥門冬去心焙三分上為末煉蜜和丸如梧桐子大食後以蜜水下十五丸漸加至二十丸早晨日午晚後各一服石膏散出聖惠方治乳石發動寒熱鼻塞頭痛石膏二兩白蘚皮枳殼麩炒微黃去白玄參薺苨葳蕤各一兩黃芩二分前胡一兩去蘆頭甘草生銼半兩上為散每服四錢以水一盞入生薑半分蔥白七寸煎至六分去滓不計時候溫服葛根湯出聖惠方治乳石熱寒熱頭痛後似天行四肢煩疼心躁口乾多渴不能下食葛根麻黃去根節各三分石膏二兩搗碎梔子仁三七枚甘草生銼碎半兩甜竹葉一握生薑半兩豉一合蔥白七莖並須上細銼以水五大盞煎至二盞半去滓分五溫服不計時芍藥湯出聖濟總録治乳石毒經二三十年發動為寒熱或寒或熱似寒中者或欲食或不欲食若服紫石英發熱者熱悶昏昏喜臥常不欲飲食脈氣所生臟氣不和礜石發熱燥如戰石硫黃熱鬱如熱極者身並破芍藥赤茯苓去黑皮人參藍實黃芩去黑心甘草微炙赤各一兩薺苨二兩蔓荊子一升上除蔓菁子外搗為粗末每五錢用水四盞先煮蔓菁子一合至三盞去滓次下藥末煎至一盞半去滓溫三服早晨日午晚後各一服效知母散出聖惠方治乳石發動寒熱頭痛百節痠疼唇口乾焦舌卷語澀知母石膏川升麻木通銼川芒硝黃芩獨活各一兩甘草半兩生用上為散每服四錢以水一中盞半生薑半分竹茹一分黑豆半合煎至六分去滓不計時候溫服麻黃湯出聖惠方治乳石發動頭痛寒熱不可解者麻黃三分去根節豉一合甘草生用梔子仁赤芍藥姜生薺苨各半兩上細銼以水五大盞煎至三盞半去滓不計時候分溫五服升麻湯出聖惠方治乳石發熱如火頭痛寒熱煩悶嘔逆升麻前胡去蘆頭甘草炙各二兩銼黃芩去黑心三兩枳殼去瓤麩炒黃連去須栝蔞生地黃切焙三兩梔子仁十四枚上粗搗篩每服四錢水二盞入豉一合綿裹煎至一盞去滓溫服早晨日午各一心煩加麥門冬一兩稍冷加生薑一兩鴨通湯出聖惠方解散除熱白鴨通五升沸湯二斗半淋之澄取汁二斗梔子仁二十枚豉三升麻黃八兩冷石二兩一作滑石石膏三兩甘草五兩上以五味㕮咀以鴨通汁煮取六升去滓內豉三沸分服五合若覺體冷小便阻利其間若熱猶盛小便赤促服之不限五合宜小營當漸進食不可食令少但勿使多耳前胡湯出聖惠方治乳石發如傷寒寒熱狀兼似瘧前胡去蘆頭黃芩去黑心甘草炙銼知母各二兩牡蠣煅石膏各三兩生薑一棗大切棗三枚擘破上粗搗篩每服四錢以水一盞半煎至八分去渣溫服三黃湯折石熱通氣泄腸胃解肌大黃三兩黃芩甘草炙各二兩梔子二七枚豉一升麻黃一兩去節上切以水九升煮麻黃去上沫下諸藥煎取三升半下大黃三五沸去滓分服以瘥止麻黃湯去石毒麻黃去節三兩甘草炙二兩豉一升綿裹上切以水五升煮取一升去滓分溫再服豬膏湯解大熱豬膏二兩炒豉一升上以水三升煮豉取汁二升納豬膏服七合日三服石人飲宜清冷不宜濁熱濁熱即氣壅否惟酒須熱也香豉湯治乳石發內虛熱外風濕不解治乳石發若得時氣冷熱不調動乳者皆由寒熱所致其狀似瘧久不療能損人縱服湯藥亦難瘥宜作生熟湯浴之方出聖濟總録以溫湯半浴盆如過熱投小冷水解之即於湯中坐須臾百節開寒熱之氣皆從毛孔中出變作流汗若心中熱悶者還服少許熱湯即定久乃出湯以衣被覆蓋睡豁然平復如患大重者不過三兩度又方若熱盛可向冷地臥腰下以厚物薦之腰以上令薄使受稍涼即起不得過度若熱解寒不解者可飲熱酒三合使解之若寒解後頭重耳鳴滿眼漠漠心下痛者用清酒二合飲之便瘥寒溫宜依此法療頭痛欲裂方取當歸二兩清酒一升煮取六合飲至再服若競顫惡寒或發熱如溫瘧者為失食忍飢失洗不行又食臭穢故也出聖濟總録宜急飽食冷食冷水洗數行即愈乳石發苦熱解折附論夫五形之人其性各異則土形之人骨聳氣清水形之人體薄氣長木形之人筋骨粗壯聲圓而長火形之人性急氣尖而散其有痼疾者則先服草藥病愈後始服石必速應也凡土火二形之人性躁氣高而肥盛多火氣若更服石益之於炎物盛必衰自焚之召也若覺禍發速宜下之只如痼疾之人服石者病氣久強石熱尚薄不能破其病但增其熱亦能損人若熱不濟者亦可速下自余形人服之者如有發動但以石投之自然而瘥下可見小熱即求大冷為山九仞功虧一簣醫者意也詳而行之方葛根湯治下石葛根紫草各八兩犀角屑十二兩露蜂房十兩炙芒硝大黃各二兩薺苨人參各七兩玄參甘草炙銀屑細研四兩豬脂十二兩臘月者上以無灰酒漬經十日其豬脂用酒一升煎取脂三兩取銀屑和研納藥中每日空心服一匙千金翼方云量力多少服之忌熱面多肉海藻蒜等物人參湯治雖服乳石等而常患冷此由不先服溫湯而服石等以其病藥各在一處丹石不行則病所以依舊患冷宜依此法溫之冷自瘥石勢行人參茯苓乾地黃當歸桔梗甘草炙芍藥各二兩大黃四兩上切以水三升煮取一升二合去滓分服之乳石發上沖頭面及身體壯熱附論夫乳石發動上衝頭面及身體壯熱者由將適過度臟腑否塞氣不得宣通也乳石之性緩而且速能捍風寒逐暑濕導經脈行飲食之氣在陰則補其不足在陽則能發其炎陽虛陰盛則二儀亢位所以炎上腑之受邪則表熱氣膈至陰之伏也脈形陽浮而數陰伏而沉理之於經自然通泰若炙之於經絡則血脈遄流或全抑之則乖於石性理而兼助則表裡周榮若遇小發可自勞力按摩不可即大熱不已者別法隨事擇用解散方薺苨散出聖惠方治乳石發熱上衝頭目頑熱昏悶口乾心煩躁大小便不利心神恍惚薺苨枳殼麩炒微黃去瓤各一兩犀角屑茯神地骨皮子芩木通銼玄參各三兩石膏麥門冬去心焙一兩半川芒硝二兩甘草兩半生用上為粗散每服四錢以水一中盞入生薑半分煎至六分去滓入蜜半合更煎一兩沸不計時候溫服黃耆湯出聖濟總録治乳石發胸背頭中游熱黃耆銼芍藥甘草赤茯苓去黑皮人參石膏碎生地黃切焙生薑切炒各二兩麻黃去根節湯煮掠去沫二兩桂去粗皮一兩麥門冬去心焙二兩上粗搗篩每服四錢水二盞入竹葉十片棗二枚擘破同煎至八分去滓溫服早晨日午夜臥各一五加皮散出聖惠方治乳石發動毒氣上衝頭面煩熱小便赤澀四肢疼痛五加皮銼赤茯苓玄參各一兩吳藍葉三分黃芩瞿麥柴胡去苗木通銼各一兩甘草半兩生用赤芍藥三分大麻仁一合上為散每服四錢以水一中盞煎至六分去滓不計時候溫服犀角散出聖惠方治乳石發熱上攻頭面四肢骨節煩疼口乾心躁不思飲食犀角屑玄參知母黃耆銼葳蕤各三兩赤芍藥柴胡去苗生麥門冬去心赤茯苓地骨皮各一兩甘草半兩生用上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服射干散出聖惠方治乳石發熱上攻頭面及咽喉腫塞四肢煩熱不下飲食射干犀角屑川升麻枳殼麩炒微黃去瓤黃芩川芒硝玄參川大黃銼微炒各一兩甘草半兩生用上為粗散每服四錢以水一中盞煎至五分去滓入蜜半合更煎一兩沸不計時候溫服余甘子散出聖惠方治乳石發熱上攻頭面煩熱咽喉不利舌粗語澀大小便不通余甘子三分紅雪三兩犀角屑一兩子芩獨活葛根銼川升麻防風去蘆甘草半兩生用上為細散每服不計時候用生地黃汁二合調下二錢薺苨散治乳石發動熱氣上攻頭面眼昏心神熱燥四肢煩疼口乾不食薺苨石膏各二兩甘草三分生用藍子半兩赤茯苓赤芍藥黃芩玄參各一兩蔓菁子三合炒上為散每服四錢以水一中盞半入黑豆半合生薑半分青竹葉三七片煎至六分去滓不計時候溫服葳蕤散出聖惠方治乳石發動頭面熱四肢煩疼大小便壅滯葳蕤黃芩川大黃銼微炒川朴硝各一兩大青五分犀角屑三合川生麻五分梔子仁甘草生銼各半兩上為散每服四錢以水一中盞煎至六分去滓溫服以快利為度療精神如失氣攻上骨熱柴胡升麻黃芩澤瀉各三兩淡竹葉切一升生地黃切三斤干藍芒硝各二兩上切以水八升煮取三升去滓下芒硝分服取利止忌如常法前胡湯下氣除熱增損竹葉湯解散下氣竹葉切黃連麥門冬去心人參各二兩枳實炙梔子各一兩甘草炙茯苓各二兩上切以水八升煮取三升分服之瘥柴胡湯療膈上熱柴胡黃芩甘草炙茯苓麥門冬去心枳實炙生地黃各三兩竹葉切一升上切以水一斗煮取三升去滓分服黃芩湯出聖濟總録治乳石發動心熱如火黃芩去黑心枳實去瓤麩炒各二兩梔子仁十四枚栝蔞根芍藥甘草炙各一兩厚朴去粗皮薑汁炙一兩上粗搗篩每服四錢水二盞煎至一盞去滓溫服早晨日午食前麻黃湯療服升麻湯內解外不解者麻黃去節升麻大黃黃芩石膏各三兩甘草一兩炙梔子仁三合上切以水九升煮取三升分服之瘥一方無大黃納麻黃四兩甘草三兩余分量同主下氣解肌折熱澤瀉湯療腹中無妨直患虛汗澤瀉知母石膏碎各二兩當歸甘草炙人參桂心黃芩茯苓各二兩竹葉切三升麥門冬三兩去心上切以水一斗二升煮竹葉取一斗去滓下諸藥煮取四升分服瘥忌如常法麥奴湯出聖濟總録治桃花石發即心噤身熱頭痛宜溫清酒隨多少服之酒行即瘥亦可服大麥麩並此湯大麥奴陰乾麥門冬去心焙各二兩桂去粗皮一兩半人參甘草炙各一兩上粗搗篩每服四錢水二盞入蔥白四寸同煎至一盞去滓溫服早晚食前各一麥門冬散出聖惠方治乳石發熱上衝頭面口舌乾燥麥門冬去心焙石膏各三兩葳蕤葛根銼各一兩甘草半兩生用上為粗散每四錢以水一中盞入生乾地黃一分蔥白七寸豉一百粒煎至六分去滓不計時候溫服療石熱將行體微篩嗇茱萸葳蕤各一兩豉心一升蔥白一握上切以水四升煮取減半分服散石熱出本草以卑柿生啖之治丹石發熱結出本草用紅蜀葵葉煮食治丹石發熱出本草以稷米作飯食之熱消治丹毒丹石發熱出本草以牛肝和腹內百葉作生薑醋食之乳石發煩渴附論夫石性