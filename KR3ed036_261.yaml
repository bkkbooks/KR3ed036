土克過必宣二氣俱虛而肝必怒陽氣既乏則發轉筋變吐加腎肝之病也宜速止之仍溫足而兼復調以五味其病必痊矣方香葇湯出聖濟總録治乳石發霍亂轉筋不止香葇三分木瓜乾者去瓤人參厚朴去粗皮生薑汁炙熟陳橘皮湯浸去白焙各一兩桂去粗皮半兩上粗搗篩每服五錢水一中盞半入生薑半分切煎取八分去滓溫服不計時候高良薑湯出聖濟總録治乳石發霍亂轉筋及心腹痛高良薑銼半分桂去粗皮一兩木瓜乾者去瓤二兩上粗搗篩每服三錢以水一盞煎至七分去滓溫服不計時候木瓜湯出聖濟總録治乳石發霍亂吐利轉筋木瓜大者一枚去瓤薄切倉粳米一合上以水二盞煎至一盞去滓時時溫服一合棠梨木瓜湯出聖濟總録治乳石發霍亂轉筋棠梨枝一握木瓜大者一枚去瓤上細銼分四服每服以水一盞入生薑五片煎至七分去滓熱服不計時糯米飲出聖濟總録治乳石發霍亂吐利不止及轉筋用糯米淘淨三合細研以少許汁水攪如乳狀頓服立止桑葉飲出聖濟總録治乳石發轉筋不吐不下氣急用桑葉一味切二兩以水五盞煎至一盞半去滓分溫二服早晚各一高良薑飲出聖濟總録治乳石發吐利轉筋氣急用高良薑一味銼五兩粗搗篩每服三錢以酒一盞煎至六分去滓溫服早晚食前各一服亦療暴腹痛惡血氣急木瓜飲出聖濟總録治乳石發霍亂轉筋氣急用木瓜一味一枚去皮子切焙乾銼如麻豆大每服三錢以水一盞半煎至八分去滓溫服飲盡更作無木瓜只以枝葉並根代之治乳石吐利不止轉筋入腹欲死方出聖濟總録用生薑半兩切以酒一盞煎五七沸去滓頓服之治乳石發動霍亂㽲痛不可忍方出聖濟總録用吳茱萸淘淨炒香二兩以酒三盞煎至盞半分為二服得下利即瘥空腹食前各一治乳石發霍亂轉筋入腹方出聖濟總録用雞屎白半兩搗羅為末每服二錢空心服以溫水半盞調頓服之乳石發心腹痛噤附論夫服乳石之人膈間有寒胃脘有熱寒熱相搏氣逆攻腹乘心攻心腹痛其寒氣盛乘於熱氣榮衛否塞不通寒氣內結於心故心腹痛而心噤寒也方前胡散出聖惠方治乳石發動心胸壅悶腹痛寒噤不食前胡去蘆檳榔桂心各半兩赤茯苓二兩白朮二分犀角屑赤芍藥各三兩木香甘草炙微赤各半兩上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服木香散出聖惠方治乳石發動心腹痛噤四肢寒顫不欲飲食木香半兩犀角屑赤芍藥白朮各三分當歸銼炒三分人參去蘆枳殼麩炒微黃去瓤黃芩各半兩上為粗散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候稍熱服白朮散出聖惠方治乳石發動體顫寒熱心腹痛噤不能飲食白朮柴胡各一兩去苗當歸銼微炒三分青橘皮三分去白焙桔梗去蘆半兩甘草炙銼半兩桂心半兩上為粗散每服四錢以水一中盞入生薑半分棗二枚煎至六分去滓不計時候少熱服茅香花散出聖惠方治乳石發動心腹痛噤吐逆不下食茅香花桂心各半兩芎藭檳榔赤芍藥各三兩麥門冬一兩半去心焙上為粗散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服人參湯療心腹痛不解若通身顫寒者榮衛不通故也人參枳殼炙黃芩甘草炙茯苓各一兩麻黃三兩去節上切以水八升煮取四升去滓分服治腹痛不可忍者取鹽一合熬以水二升煮取水一升頓服即得吐止若吐利止心中煩悶及渴不止取竹瀝一升分服即止心中復似冷取茱萸一兩於鐺炒搗末以水二升煮取一升著少鹽澄清服之即瘥桔梗湯出聖濟總録治乳石發動心腹痛冷熱相搏若心腹內有諸疾痛違常煩悶惛亂者急解之出肘後方取冷熱清酒一二升漸漸稍進覺少寬更進冷食其心痛者最急若肉冷口噤但折齒下熱酒瘥若心痛如刺者為應食不食應洗不洗寒熱相擊氣結不通填於心中故也宜數飲熱酒任性多少酒氣行經絡通達淋以冷水又冷淹手巾搭著苦處溫復易之須臾解也解後可速與冷食食多益善乳石發心腹脹滿附論乳石發心腹脹滿者以飲食居處皆犯溫懊石勢壅遏不得宣通故腑臟之間熱氣相搏而心腹脹滿也又以腹脹欲斷衣帶者亦以寢處之溫失食失洗不時動役之過但能冷食冷洗當風而立則脹滿自消矣服石之人髮狀非一或發於外陽則頭身皮膚作病癰腫頭痛是也或於內陰則反冷藏虛口瘡吐血是也凡氣內溫五臟外榮經絡石性清淨不喜煩穢目所睹鼻所聞皆欲馨香不願郁腐因成種種之症也或食陳臭生酸之物貯於胃腑胃腑不受推諸臟諸臟不受即肝膈痞滿或為臚脹而堅積便發心痛亦非心自然而痛為穢觸神氣也覺此候者可速滌腸胃無令留壅不然即成痰癖其心轉痛方葳蕤湯出聖濟總録治乳石發動心胸痞脹熱毒葳蕤黃芩去黑皮升麻乾薑炮柴胡去苗各一兩半芍藥黃連去須各一兩石膏四兩梔子仁七枚上粗搗篩每服三錢水一盞入生薑一分拍碎並豉少許同煎至六分去滓下芒硝半字令沸溫服如人行十里許再服日二快利即止黃芩湯一名黃芩散出聖濟總録治乳石發腹脹頭痛先有癖實不消或飲酒食肉所致時苦心急痛者大黃湯出聖濟總録治乳石發動上氣熱實心腹滿小便赤大便不利痞逆沖胸口焦燥目赤痛大黃銼炒一兩黃芩去黑心三兩黃連去須銼甘草炙銼麥門冬去心焙各二兩上粗搗篩每服五錢水一中盞半煎至八分去滓納芒硝一錢再煎三兩沸溫服早晨近晚各一通利即愈石膏湯出聖濟總録治乳石發大熱心腹滿脹石膏大青各三兩黃芩去黑心升麻芍藥各二兩上粗搗篩每服五錢水一盞半煎至一盞去滓分溫二服如腹痛加續斷二兩香豉湯出聖濟總録治乳石發內有虛熱胸腹痞滿外風濕不解肌肉拘急豉二兩梔子仁十四枚蔥白一握切黃芩去黑心三兩上除蔥豉外粗搗篩每服先以水三盞煮蔥豉至一盞下藥四錢更煎至八分去滓溫服甘草湯出聖濟總録治乳石發內熱結不除或以飲酒冷食澡洗猶不解或腹脹頭痛眼目疼或先由癖食不消或連飲不食或作心痛甘草炙銼黃芩去黑心大黃銼炒二兩上粗搗篩每服五錢水一盞半煎至八分去滓溫服早晨晚後各一服導氣丸出聖濟總録治乳石發心腹脹滿用牽牛四兩搗羅為末以生薑自然汁煮麵糊和丸如梧桐子大每服五十丸生薑湯下治乳石發腹脹欲裂者為久坐下熱及衣溫失食所致出聖濟總録宜數冷食冷飲洗當風取冷須臾愈之乳石發痞結羸瘦附論陰氣積於下陽氣盛於上升降不時則成痞結羸瘦況服乳石者飲食不節將適失度熱氣熾於陰陽隔而不通水穀之氣不能潤養肌體則肌肉枯燥胸膈痞塞腸胃脹滿久則正氣衰微日益羸瘦固其宜也治法當升降痞隔調適陰陽如是則痞者通石勢息也方當歸湯出聖濟總録治乳石發後虛熱羸乏胸膈痞滯心腹脹滿或腰腳痛者腎澀當歸切焙甘草炙銼芎藭遠志芍藥麥門冬去心焙赤茯苓去黑皮各二兩黃芩去黑皮桂去粗皮各一兩五味子三兩生乾地黃焙四兩上粗搗篩每服五錢先以水五盞入白羊腎一隻去筋膜切煎至三盞去腎下藥入生薑一分大棗二枚擘破更煎至二盞去滓分溫二服食前空心飲黃耆湯出聖濟總録治乳石熱盛虛弱痞結羸瘦調順陰陽去熱益氣黃耆銼人參生乾地黃焙甘草炙銼白芍藥各二兩桂去粗皮黃芩去黑心赤茯苓去黑皮各一兩升麻二兩上粗搗篩每服五錢水一盞半棗三枚擘破生薑三片同煎數沸次下竹葉七片更煎三兩沸去滓取一盞空心溫服日再服檳榔散出聖惠方治乳石發動煩熱心膈痞滿大腸氣壅腹痛不思飲食檳榔赤芍藥木香各半兩川大黃一兩半微銼炒枳實麩炒微黃赤茯苓芎藭各三兩甘草炙微赤銼一分上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時溫服大腹皮出聖惠方治乳石發動心膈痞滿喘息微促腹脅妨悶痛疼大腹皮一兩銼木香枳殼去瓤麩炒赤芍藥甘草炙銼各半兩前胡去蘆頭赤茯苓去黑皮陳橘皮去白焙各三分上粗搗篩每服三錢水一盞生薑一片大棗二枚拍碎煎至七分去滓溫服不計時半夏湯出聖濟總録治乳石發動體黃瘦不能飲食心腹痞結起居腰背急痛嗜臥半夏湯浸七次焙黃芩去黑心木瓜根各二兩枳殼去瓤麩炒桂去粗皮白朮各一兩赤茯苓去黑皮三兩上粗搗篩每服五錢水二盞生薑一棗大拍碎煎至一盞去滓空心溫服日再枳實湯出聖惠方治乳石發動因服冷藥大過致心膈痞滿腹內疼痛不思飲食日漸羸瘦枳實麩炒赤芍藥當歸切炒大腹皮各三分白朮半兩前胡去蘆頭一兩青橘皮湯浸去白焙三分上粗搗篩每服五錢水一盞生薑一片大棗三枚擘煎至八分去滓溫服不拘時大黃湯出聖惠方治乳石發動大腸壅滯心膈痞滿腹痛煩熱川大黃三分銼碎微炒前胡去蘆當歸銼碎微炒枳殼麩炒微黃去瓤生薑各半兩蔥白二七寸切豉一合許上細銼和勻每服半兩以水一盞煎至六分去滓不計時候溫服治癖猶不消惡食畏冷者更下之出肘後方大黃末芒硝各半升甘草二兩半夏黃芩芫花各一分上為散藏密器中欲服以水八升先煮大棗二十枚使爛取四升去棗仍納藥五方寸匕攪和著火上三上三下畢分三服但一服便利者亦可停若不快更一服下候即灑粥食二升次作水餐進之不可不即食胃中虛空得熱入便殺人矣桔梗湯出聖惠方治乳石發動心膈痞滿腹內妨痛不思飲食桔梗銼炒枳實麩炒白朮各二兩梔子仁一兩甘草炙銼半兩上粗搗篩每服五錢水一盞半生薑一片棗大拍碎煎至八分去滓不計時候溫服訶黎勒散出聖惠方治乳石發動頭痛煩悶心膈痞滿腹內妨痛訶黎勒三分煨用皮川大黃一兩半銼碎微炒前胡去蘆枳實麩炒各三分甘草半兩炙微赤銼碎上為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服若腹內有結堅熱癖使衆疾者急下之出肘後方用梔子十四枚豉五合水二升煮取一升頓服之熱甚已發瘡者加黃芩二兩
