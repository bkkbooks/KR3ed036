body:
  text: 卷二百六十乳石門總論夫金石之性堅剛而急烈又性清淨而惡滓穢凡服乳石訖即須以意消息尋檢舊法不可無備忌也況人性或冷或熱或寬或急皆須量性將衛不可輕有犯觸大凡乳石一服之後常在腸胃若人氣力衰石氣強即發動若人氣力盛石氣安即強健謹按古法皆令五十以上始服乳石殊謂不然今驗所見年少服者得力速兼無病患何以言者年少筋力滿盛飲食飽飫彌益精明壯健終無發理年歲晚暮氣候衰竭飲食失宜此石氣勝人無不發動歷觀得失莫過於此夫人年少縱不吃飯食血氣自強年老力微縱肉精細猶不可健以此言之足明古法疏矣凡人身血脈經行不絶如血脈微有滯處便於其處發瘡或發熱神氣昏悶必欲防之每朝及暮溫一兩盞清酒或可以生薑刮碎和少茱萸飲之令遍體熱重重又作熱羹粥啜之使腸胃通利即石氣流行其初服石一二百日猶宜作此將息是古法服石不取夏月即取冬月所以然者石有發動與服時皆背此又殊乖通論今驗服石飲食失時勞役過度立即發動豈待背時今歷見將衛得宜並不發動復見名醫平章服石之人常見作熱將息倘發調適乃易耳脫若石氣發動暫須宜泄服少冷藥便得轉瀉若得暢通熱氣併除若作冷將息脫若石氣發動用冷藥便作得轉此一曲之說今姑存之但欲廣聞見耳其將息皆須自量本性冷熱為候務取安穩不可拘執古論捨己從人庶通幽君子以此為意也細按本草石鐘乳味甘溫無毒主咳逆上氣明目益精安五臟通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子不煉食之令人淋一名公乳一名爐石一名夏石生少室山谷及太山採無時蛇床子為之使惡牡丹玄石牡蒙畏紫石蓑草少室猶連嵩山也今第一齣吳興而江陵及東境名山石洞亦皆有之唯通中輕薄如鵝翎管碎之如爪甲中無雁無光明者為善長挺乃有三尺者黃色以苦酒洗刷則白仙經用之少俗法所重亦甚貴之謹按鍾乳第一吳興其次廣連澧朗柳等州者雖厚而光潤可愛餌之並佳今峽州清溪房州三洞出者亞於吳興自余非其土地不可輕服多發淋渴只可搗篩白練裹之合諸草藥酒浸服之耳陶云鍾乳三尺者謬說也乳者陽中之陰石者陰中之陽乳石從來陰陽精體處至陰之裡有正陽伏其中正陽之中覆在至陰之裡故陽生十一月甲子後服乳陰生五月甲子後服石陰陽發萌互相為用而服之皆理於內不泄於外也夫人膚虛皆帶風氣處人全軀常經含象理之有法則禍害不生乖於時候則危瘵立至竊覽古法皆云四月服石此謂浮學不曉由來按聞承開服石僉曰四月雖開而未平六月謂得氣之節他皆仿此常以不全實其腑不全虛其臟即八風之道無所滯焉或有藥觸成疴飲食發疹今並倫次詳而行之本草經曰白石英味甘辛微溫無毒主消渴陰痿不足咳逆胸膈間久寒益氣除風濕痹療肺痿下氣利小便補五臟通日月光明久服輕身長年耐寒熱生華陰山谷及泰山大如指長二三寸六面如削白徹有光芒其端黃稜名黃石英赤端名赤石英青端名青石英黑端名黑石英二月採亦無時惡馬目毒公今醫家用新安所出極細長白徹者壽陽八公山多大者不正用之仙經大小並有用唯須精白無瑕雜者如此說則大者為佳其四色英今不復用謹按白石英所在皆有今澤州虢州洛州山中俱出虢州者乃大徑三寸長五六寸者今通以澤州所出為勝又云紫石英味甘辛溫無毒主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定悸安魂魄填下焦止渴除胃久中寒散癰腫令人悅澤久服溫中輕身延年生太山山谷採無時長石為之使得茯苓人參芍藥共療心中結氣得天雄菖蒲共療霍亂畏冬青附子不欲鮀甲黃連麥勾姜今第一用太山石色重徹下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黑不明又有林邑石腹裡心有一物如眼吳興石四面才有紫色無光澤會稽諸暨石形色如石榴子先時並雜用今散家採擇唯太山最余處可作丸酒耳仙經不正用而為俗法所重也採時依此研煉服餌鍾乳研煉服餌石英服乳石後禁忌附論凡服乳石後藥菜等有不可食者有通食而無益人者有益人利石者有常宜收貯備急者及五乖七急八不可三無疑等法服石之人若能依此可以蠲旦夕之暴庶免發動也今列於後法凡菜不可食者並可通食者出聖惠方不可食者油脂其性滑腸而令人不能食縱吃勿遣多也蕪荑能生瘡兼發石氣薺苨發石亦云損石芥子芥菜皆能發石發熱蔓菁菜發氣又觸石葵菜滑而且壅亦不可食凡不可食者勿食為佳若欲食者皆須泡煉雜以蔥椒然後可通食者酥其物潤腹而能行石氣冬瓜龍葵此二物甚壓石服石人亦多食熱服蔓菁作黃俎和肉作羹始可少食亦須雜以蔥椒食之葵不可空吃腹胃燥澀可取三五葉入肉時食一頓也凡藥石發宜浴浴便得解浴訖不瘥者乃可余療若浴不瘥即得依後服蔥白麻黃等湯諸隨身備急藥目今附於後紫雪金石凌甘草葳蕤黃芩大黃白狗糞朴硝芒硝蘆根香豉石膏麥門冬犀角胡頭露蜂房白鴨通大麥奴上以上諸藥皆乳石所要常用隨身備急服寒食諸法須明節度明節度則愈疾失節度則生疾愚者不可強強必失身智者詳而服之審而理之凡服石人常宜收貯藥等人參朴硝苦竹瀝大黃梔子好豉大麥面薺苨黃連升麻石膏荊瀝黃芩露蜂房豬膏葛根並粉酥蜜紫蘇子白鴨通粳米前胡冬葵子生薑冬瓜大豆車前地榆五加皮大小麥奴天門冬蔥白葳蕤麥門冬生地黃蘆根紅雪紫雪五乖出聖惠方重衣更寒一乖凡人寒衣即暖服石人宜薄衣若重衣即寒經云熱極生寒故云一乖飢則生臭二乖平人飲食不消作生食氣服石人忍飢失食即有生食氣與常人殊故云二乖極則自勞三乖平人有所疲極即須消息恬養服石人夕坐久坐疲極須自勞適散石氣即暢故云三乖溫即泄利四乖平人因冷乃利得暖便愈服石人溫則泄冷則瘥故云四乖飲食欲寒五乖平人食溫暖則五內調和服石人食飲欲寒乃得安穩故云五乖千金翼方一名六反云腫瘡水洗六反也余同此但此五條故云五乖也七急出聖惠方當洗勿失時一急若覺身體暖疼關節強直翕翕發熱憒憒心悶即須洗浴若初寒先用冷水後用熱水若初熱先用暖水後用冷水既用冷水浴訖可以三二升冷水淋頭故云一急當食勿飢二急須食即食不得忍飢故云二急酒必淳清令溫三急無問冬夏常須飲多少任性熱飲尤佳故云三急衣溫便脫四急食必極冷五急臥必榻薄六急食必壓多七急八不可出聖惠方冬寒欲火一不可飲食欲熱二不可當診自疑三不可凡服石常須消息節度覺不安將息須依法不得自生狐疑畏避風濕四不可乍覺頭風熱憒憒悶心煩則宜當風梳頭以水洗手面即好與尋常風濕不同極不欲行五不可若久坐久臥有所疲極必須行役自勞飲食畏多六不可居貪厚席七不可所欲從意八不可不用從意所達石性將息節度尤佳三無疑出聖惠方務遣常理一無疑委心棄本二無疑寢處必寒三無疑服石後將息補餌附論飲酒則石勢敷行經絡氣力強溢腎氣堅旺即頓為陽事陽事過多則腎虛上熱熱盛則心下滿口乾燥飲隨嘔吐胃府不和宜服葛根飲安穀神除熱嘔吐止渴也且石酒相得遽相為用若石勢不行則須少飲如石氣調和不復須飲料量亦與石性同方雞心酸棗湯療飲後陽多腎虛發熱積熱不食胃中虛熱飲食不已氣入百脈心臟虛甚令人失常雞心十枚酸棗半斤人參一兩茯神芍藥各二兩白薇枳實炙知母甘草炙栝蔞各二兩生地黃八兩上切以水一斗煮藥半熟納雞心煮取三升冷分三服黃芩飲若覺大熱者可服紫雪或金石凌或絳雪或白雪等但溫半大升水取次研一大兩香湯浴後頓服之候一兩利熱乃退矣凡此救急紫雪為上如不得通泄宜服之黃芩一兩梔子仁二七枚乾薑二兩芒硝半兩上切以水三大升煮取軟一大升絞去滓下芒硝調之分溫兩服快利即瘥麥門冬飲若覺食不下兼嘔宜服之麥門冬一兩去心甜竹葉一大握生薑半兩切小麥四合淘去土並秕上以水三升煮取一升半分溫兩服秦艽湯若熱盛充滿經絡心腹少脹心下疒畐疒畐不消或時聚如堅隨復消者宜服此湯得利便瘥秦艽三兩牛乳一斤上切細以牛乳煮取一小升去滓頓服之得利即瘥若老弱可量氣力進之其飲食亦宜清冷不得濁熱濁熱則石勢壅塞不行喜嘔吐病堅結也亦能發黃或小便赤心堅痛者亦宜服之得溏泄瘥熱氣散後黃色縱徹皮膚是瘥候勿候熱後栗栗寒顫若因顫黃後出外者是謂餘熱欲散也厚覆但使肌膚中少寒顫良蔥根葛豉湯若覺四肢筋強背脊重或頭痛如刺眼睛欲脫者宜以香湯浴須虛靜大屋內適寒溫先以湯淋大椎及囟上三五十碗然後乃浴勿令見風浴訖覆被安臥擬取汗仍須吃此粥蔥根三大握乾葛一兩切豉三合蔥白一大握擘生薑少許切取汁椒十五顆上先以水五大升煮蔥根減半去滓下葛及鼓煮取二大升去滓細研少米作稀粥並著蔥白等煮熟乘熱啜訖依前覆被取汗訖使婦人以粉遍身揩摩使孔合半日許始可出外其病立瘥不瘥可重服羹法服石之後一二百日內須吃精細飲食羹粥酒等使血脈通利取獐鹿兔雉鵝鴨肉等以水淨洗切如指大於鐺中炒令欲熟即多下蔥白少下椒鹽熬令香即下少水煮次下粳米糝次下豉清醬汁調鹹酸適口每欲食先須啜十數口羹汁令胃口開通皮膚津潤然後進諸食縱啖炙肉亦無所慮作此將養食多且健縱啖餺飥亦須多啜臛汁鮮鯽鱠若不下食體弱乏氣力即酒食之取鮮鯽魚剝去鱗破去腸血勿洗之用新布一二尺淨拭令血脈斷依常法作鱠羹作蒜齏勿食瓜果等醬尤益人下食亦療氣痢赤痢水穀痢食後仍須白粥量事吃之即得瘥薯蕷餺飥若覺體氣沉滯石氣不行慎勿吃麵若覺虛惙任餌之取大薯蕷刮去皮薄切曝乾承潤挼作粉不粉者更暴依前法挼粉訖下篩以暖湯及鹽如面細切作餺飥肉造臛如前羹法用澆餺飥任食此法補益強筋骨止渴生薑酒若少覺不下食服此酒生薑汁一合白蜜一匙清酒倍生薑汁上相和溫頓服之半日乃效甚佳若飲熱歇後石勢虛損飲食入口自覺諸脈中澀澀如冷水入者是酒石俱退經絡空虛故也宜積日調冷食兼進豬蹄羹通諸脈自瘥止若頭眩耳聞空中有人語心怯恐懼兼憂悸不安四肢如痹或起眠則輒驚如被虎狼所逐威武所懾者服竹瀝一二升乃至三升止即瘥亦可進白薇湯下之消息稍令飲粥常令有食力時進雞心酸棗湯常令美言相悅慎勿以惡事驚之若酒熱歇石熱亦不復行心下熱結已消黃縱未歇亦無所苦但冷飲食勿進辛辣菜及熱補食若不欲進清冷者可和暖餌勿令大熱若欲知體實而壅者先看腳拇指甲肉滿及肉色赤是實也實即畏熱發當須服藥微瀉若發熱但依法次第將息及服藥後得微汗微利為佳不要多利利多即反損石勢又加虛人服丹石人食之取利關節故也採榆葉生服一兩頓佳又榆白皮為末和菜菹食之甚美令人能食仙家常服之服石後解散藥勢附論凡服五石散及鍾乳諸石丹藥既瘥節度觸動多端髮狀雖殊將攝相似比來人遇其證專執而療之或取定古法則與本性有違或取決庸醫則昧於時候皆為自忤遂推石過深原其理未曰合宜每尋古醫互相晦見直言沐浴實未探微寒溫適情蓋須自度隨時之義易所通焉故陶貞白雲昔有人寒服此散檢古法以冷隨時之義易所通焉故陶貞白雲昔有人寒服此散檢古法以冷水淋身滿二百罐登時僵斃人有取汗乃於狹室中四角安火須臾則殞據茲將息豈不由人追之昔事守株何甚寒食藥得節度者有輒解或二十日解溫不甚寒即已解之候也其失節度者或頭痛欲裂為服藥食溫作癖急下之今人多服單乳石或兼草藥服之雖非五石至於將息慎忌發動病由消息增益亦是五石之例或見單石不稱意便輕之唯以諸石散及至發動乃致困危若能明於節度則疾無不愈矣凡五石散皆名寒食散者言宜寒冷食及水洗取寒惟酒欲清熱飲之不爾即生百病也方麥門冬膏療石氣在皮膚重熱生麥門冬去心葳蕤鼠李皮石膏碎凝水石沙參各一兩青葙子露蜂房各一兩竹瀝一大合牛酥五大兩杏仁油二大合生地黃汁三合上銼納牛酥油瀝中微火煎令魚眼沸一炊久膏成覺有熱處即摩之瘥梔子湯若小便稠數者為熱食及啖諸熱餅肉之屬故也宜冷水洗腹兼服此湯梔子仁二兩甘草炙芒硝湯澄下黃芩各二兩上切以水五升煮取二升分溫二服取利即瘥若手足卒患頑癖者為犯熱經久故也急與冷水洗飲熱清酒進冷食即止一法飲冷清酒亦止若惡食臭如死物氣者為食溫作癖故也宜急以三黃湯下之若不下終不瘥若胸脅滿氣上嘔逆者為飢而不食藥氣上衝故也出聖濟總録速與冷水洗食冷飯止若寒栗頭掉不自支持者為食少藥氣溢於肌膚五臟失守百脈搖動與正氣相兢故也出聖濟總録宜強飲熱酒以和其脈強食冷食以定其臟強行以調其關節強洗以宣其壅滯即瘥若失氣不可禁止者為犯溫不時洗故也但冷水洗之即瘥若遺糞不自覺者為熱氣入胃大腸不禁故也出聖濟總録當用冷水洗之即瘥若關節強直不可屈伸為久停息不自勞泄藥氣不散漸浸筋脈故也出聖濟總録宜出力使溫冷水洗即瘥若飲酒不解食不得下乍熱乍寒不便洗熱洗之復寒甚者數十日輕者數日晝夜不得寢寐愁悲恚怒自驚跳悸恍惚忘誤者為犯溫積久寢處失節食熱作癖內熱與藥並行寒熱交爭雖以法救之終不可解也用三黃湯服之瘥昔有人曾餌石每發即欲自刑強令飲食熱漸除縱家有寒熱藥發急皆忘雖素聰明發皆頑嚚告令難喻為茲斃者不可勝數遂合此湯服之大下便瘥若齒齦腫唇爛牙齒搖痛頰車噤為坐犯熱故也宜時救之可當風張口使冷氣入咽漱寒水即瘥若大便稠數為坐久失節度將死之候也可與大黃黃芩梔子芒硝湯下之尚十有一生耳可為必死之療不可不利致死令人恨也若食患冷不可下者為久冷食口中不知味故也出聖濟總録當作白酒糜多著酥熱食一兩頓若小悶者還令冷飲食即瘥止若下部臭爛者為坐薦席厚熱故也出聖濟總録當坐冷水中即瘥若鼻中有氣如爛雞子臭者為著衣溫故也或陰囊臭爛為坐熱故也宜入冷水中及脫衣洗浴即自瘥若卒目暗無見者為飲食居處太溫故也但脫衣冷洗冷食須臾即瘥若身肉處處疼痛無常處如遊風者為犯熱所作非風冷故也出聖濟總録宜冷洗以冷石尉之自瘥若嗜寐不覺者為久坐熱悶故也宜冷洗冷食即瘥若肌膚堅如石不可屈伸為熱食溫臥作癖五臟隔閉血脈不通故也急服三黃湯下之食冷食飲熱酒自勞即瘥若臂腳偏急痛苦者為久坐臥溫熱不自移轉氣入肺脾胃故也又云熱入腹附骨故也出聖濟總録宜勤以二布巾淹冷水搭之覺溫則易如此不過三日即瘥若脈洪實或斷絶不足似死脈或細數弦駛其所犯非一此脈無醫不識也熱多則弦駛有癖則洪實急痛則斷絶出聖濟總録但宜寒食自無所苦非死唯勤節度為妙蓋熱發率常如此若人已困而脈不絶為藥氣盛行於百脈人之真氣已盡藥氣尚自行故不絶非生氣也死後體溫因如生人肌腹中雷鳴顏色不變一兩宿乃作死人也壓丹石藥出本草以蜆糟煮服之良壓丹石出本草取白冬瓜一顆和桐葉與豬肉食之壓丹石出本草取獼猴桃搗汁和生薑汁服之佳壓丹石熱出本草以苦瓜食之石泉公王方慶嶺南方服乳石補壅法云南方養生治病無過丹砂遂著此方出本草用升麻末三兩研煉了光明砂一兩二物相合蜜丸如梧桐子大每日食後服三丸壓丹石毒出本草以蚌肉食之治石藥過劑者出本草以白鴨屎末和水調服之瘥乳石將適失度附論夫服餌藥劑皆有常式戒慎將適每務周至矧乳石剽悍尤當謹畏煉食之後宜如何哉飲食衣服居處勞佚溫熱寒涼之度所當究圖者無慮數十一失其度疾疢之孽速於影響蓋精明非華他審知非仲景輕信服食棄是從非動發急難不知解救則有能消息節度專意候察者亦庶幾免於困斃也方治乳石發動咽痛鼻塞清涕出者此為衣溫近火方出聖濟總録宜速脫衣當風取冷以冷石尉咽鼻即瘥治乳石發動輒安臥不與人語者此為熱盛食少失性方出聖濟總録宜與熱酒冷洗冷食自勞即瘥治乳石發動耳鳴如風聲又有汗出者此為自勞過度陽事不節氣上方出聖濟總録宜數飲食補之節禁陽事即瘥治乳石發動服藥心悶亂者此為服溫藥與疾爭力方出聖濟總録當大吐或不吐病當困斃若吐不絶者可冷食飲即瘥若絶不識人口不開者亦當琢齒以熱酒灌之入咽吐出者更當與之但得酒氣下通不半日即蘇治乳石發動似傷寒溫瘧者此為犯熱方出聖濟總録宜以常治傷寒溫瘧藥救之但勿服熱藥耳其傷寒藥等皆除破癖不與寒食相妨故通服也凡服寒食雖已熱解而更病者要先以寒食救之終不中冷治乳石發動脫衣便寒著衣便熱此為脫著失度方出聖濟總録小寒自可著衣小溫便可脫衣及冷水洗之即爽應洗勿疑若忍之則病成矣治乳石發動夜不得睡者此為食少熱在內方出聖濟總録當服大黃黃芩梔子三黃湯數進冷食自得睡也治乳石發動眩暈欲倒者此為衣厚犯熱方出聖濟總録宜冷水淋頭並洗之即瘥治乳石發動百節痠疼者此為臥處太厚又蓋覆被衣溫厚腳疼欲折方出聖濟總録當單床薄被衣勿怠行役或以冷水洗勿著故垢衣雖冬寒亦須散發受風仍以冷石尉其衣勿繫帶若犯此煩悶者急大冷水浴勿忍病而畏冷也乳石發動附論內經謂石藥性悍非性緩心和人不可服夫聖人垂訓深矣世之服乳石者至於輕生傷性恃毫髮所得不戒夫毒烈之過夭於中道十有七八夫豈知大冶範形精全神固和理均足初無加損也能者養以取福則全生盡年若乃情竇一開嗜欲滋甚方且資剛暴勇猛之劑以靳補養積之畎澮泄之尾閭果何所賴耶說者以益氣補精安五臟通百節利九竅延年益壽利人如此其多謂不可不食其食也乃分稚強壯之先後又以石精石滓分上士下士所服之優劣夫以其有益於人必欲資是以祛沉疴痼疾可也當氣體調和榮衛流通亦何必區區於煉餌哉胡不考服石之後將護多端一失其度發作異態飲食之細則有或熱或溫之過衣服坐臥則有溫衣久坐久停之患其他六反七急八不可三無疑又欲謹畏而力行倘有不慎疾不旋踵與其服食失度自詒伊戚曷若清淨恬淡克保沖和今敘疾病之由庶幾無輕餌神農桐君深達藥性相制相反畏惡備於本草而江左有道制散對治云鍾乳動術令人頭痛目眶疼術動鍾乳則胸塞氣短海蛤動鍾乳則目疼短氣雖患不同其源一矣其五石散自後入發動將療亦非古法乃云鍾乳與術更互相動本草雖無正文而經方備載今故存焉方術香丸療天行丹石發動上下壅隔不通頭痛口苦不食青木香紫葛紫參玄參丹參苦參人參石膏代赭石細辛桂心獨活蓯蓉乾薑齊鹽吳藍各一分巴豆二分去皮熟用上搗篩蜜為丸如梧子大有患丈夫服三丸強者服五丸余即量與之以飲下得快利三兩行即瘥忌如常法薺苨湯治石毒卒發栗栗如寒或欲飲食或不欲飲食若紫石英發動亦熱悶惛惛喜臥少起無力或寒皆臟腑氣不和薺苨二兩甘草炙微赤銼藍子赤茯苓赤芍藥黃芩各半兩蔓荊子一兩上為粗散每服四錢以水一中盞煎至六分去滓不計時候溫服治五石發動熱氣上衝心神煩燥口乾昏悶麥門冬去心薺苨各一兩豉一合蔥白二七寸去須黃芩甘草生用各半兩上細銼以水五大盞煎至半去滓分溫五服人參湯出聖惠方治礜石發令人心急口噤骨節疼強或時即體熱生瘡以冷水洗浴然後卻用生熱湯淋之數遍畢宜吃少暖食飲一中盞稍熱酒行百餘步即服此湯人參去蘆甘草炙微赤銼麻黃去根節各半兩豉二合蔥白去須八莖切麥門冬一兩去心上以水二大盞煮取一盞半去滓分溫三服覆暖衣汗出瘥蔥白豉湯出聖惠方鍾乳對術又對栝蔞其治主肺上通頭胸術動鍾乳胸寒短氣鍾乳動術頭疼目痛又鍾乳雖不對海蛤海蛤能動鍾乳鍾乳動則目疼短氣有時術動鍾乳直頭痛胸塞然鍾乳與術為患不過此也雖所患不同其治一矣發動之始要有所由始覺體中有異與上患相應宜速服之蔥白半斤豉二升甘草三兩人參吳茱萸一升上㕮咀先以水一斗五升煮蔥白作湯澄取八升納藥煮取三升分三服才服便使人按摩搖動口中嚼物然後仰臥覆以暖衣汗出去衣湯熱歇即便冷淘飯燥脯而已若服此不解復服甘草湯出千金方甘草三兩桂心二兩豉二升蔥白半斤上合服如上法若服此已解肺家猶有客熱餘氣復服桂心湯聖惠方名甘草湯一名麥門冬湯桂心二兩麥門冬五兩人參一兩半甘草三兩炙豉二升蔥白半斤上細銼以水三大盞煮取一盞半去滓分溫三服杜仲湯出聖惠方硫黃對防風又對細辛其治主脾通主腰腳防風動硫黃煩熱腳疼腰痛或嗔忿無常或下利不禁防風細辛能動硫黃而硫黃不能動彼始覺發便服此方杜仲三兩枳實一方作枳殼炒黃去瓤甘草李核仁各二兩香豉二升梔子仁十四枚上合服如上法若不解復服大麥奴湯出聖惠方大麥奴四兩甘草人參芒硝桂心各二兩麥門冬半斤上合服如上法若服此已解脾腎猶有餘熱氣或冷者宜復服人參湯出千金方人參乾薑甘草當歸各一兩附子一枚上合服如上法生麥門冬湯出聖惠方白石英對附子其治主胃通主脾腎附子動白石英煩熱腹脹白石英動附子嘔逆不得食或口噤不開或言語難手腳疼痛始覺發宜服此方生麥門冬四兩甘草炙麻黃各二兩豉二升上合服如上法不解更服大黃湯出聖惠方大黃三兩甘草二兩豉二升梔子仁二十枚上合服如上法頓服得下便止不下服盡若熱勢未除視瞻高而患渴復服後方栝蔞根湯若煩加細辛五兩栝蔞根湯出聖惠方栝蔞根一方作瓜蔞大麥奴四兩甘草二兩蔥白半斤豉二升上合服如上法稍稍一兩合服之約得一升許便可食少糜動口若已解胃中有餘熱復服芒硝湯出千金方芒硝桂心各二兩通草甘草白朮一兩大棗二十枚李核仁二十枚上合服如上法若腹脹去芒硝用人參二兩人參湯出聖惠方紫石英對人參其治主心肝通主於腎治腰腳人參動紫石英外臺云細辛人參動紫石英心急而痛或驚悸不得睡臥恍惚忘誤失性發狂昏昏欲眠或憒憒喜嗔或瘥或劇乍寒乍熱若耳聾目暗又防風雖不對紫石英紫石英猶動防風巢源云防風雖不對紫石英而能動紫石英為藥中亦有人參緣防風動人參轉相發動令人面赤心痛煩熱頭項強始覺服此方人參白朮各三兩甘草外臺無此味桂心各一兩細辛一兩豉三升上合服如上法若嗔盛加大黃黃芩梔子各三兩若忘誤狂發猶未除服後方生麥門冬湯出聖惠方外臺祕要云此方治礜石發生麥門冬蔥白各半斤甘草三兩人參一兩豉二升上合服如上法溫床暖覆床下著火口中嚼物使身稍汗一日便解若心有餘熱更服人參湯出千金方人參防風甘草各三兩桂心二兩生薑一兩白朮一兩上合服如上法大黃黃芩湯一名大黃湯出千金方桔梗對赤石脂又對茯苓又對牡蠣桔梗發則頭痛目赤身體壯熱解與赤石脂同茯苓發則壯熱煩悶宜服此方大黃黃芩梔子仁各三兩蔥白切一升豉一升上㕮咀以水五升煮取二升半分三服栝蔞根湯出聖惠方海蛤對栝蔞海蛤先發則手足煩熱栝蔞先發則噤寒清涕出宜服此方栝蔞根一方作瓜蔞甘草各二兩大黃一兩梔子仁十四枚上合服如解鍾乳法蔥白豉湯一名香豉飲治困失食發及飲酒過醉發理中湯出千金方服前湯不解者宜服此方人參甘草白朮各三兩乾薑二兩上㕮咀以水六升煮取二升半分三服人參湯出千金方治因嗔怒太過發者方千金翼方云主散發氣卒心腹絞痛不得氣息命在轉燭者人參枳實甘草各九分白朮乾薑栝蔞根各六分上㕮咀以水九升煮取三升分三服若短氣者稍稍數服之蔥白豉湯出千金方礜石無所偏對其治主胃發則令人心急口噤骨節疼強或節節生瘡始覺發即服此方蔥白半斤甘草二兩豉二升上以水六升煮取二升半分三服若散發身體卒生瘡宜服梔子豉湯出千金方治食宿飯陳臭肉及羹宿菜發者方梔子三七枚香豉三升甘草三兩上㕮咀以水八升煎取三升分三服亦可加人參蔥白露蜂房散出聖惠方治丹石發動令人體熱煩疼心燥口乾露蜂房一兩薺苨甘草生用各一兩上為散每服四錢以水一中盞煎至六分去滓不計時候溫服大黃丸治乳石發大黃五兩搗末大麻子五兩炒勿令焦待冷裝簸箕中挼去皮取入研如膏上合治令勻以蜜和丸如梧子大以湯飲下十丸至二十丸以宣利為度此方通暢壅祕服之尤良忌如常法烏梅湯出聖惠方治疏黃時令人背膊疼悶眼暗漠漠烏梅肉一兩微破沙糖半兩上以漿水一大盞煎至七分時時溫呷大麥麨方出聖惠方赤石脂對桔梗其治主心痛主胸背桔梗動石脂心痛寒噤手腳逆冷心中煩悶赤石脂動桔梗頭痛目赤身體壯熱始覺發宜溫清酒飲之隨能使動搖勢行則解亦可服此方及前蔥白豉湯用大麥炒令汗出燥止勿令太焦舂去皮細搗絹篩以冷水和服之又方云搗去皮淨淘蒸令熟曝乾炒香為末蜜水調日三服一作米麨姜蜜飲出千金方治服散忽發動方用乾薑五兩㕮咀以水五升煮取三升去滓納蜜一合和絞頓服不瘥重作壓丹石發方用杏仁一百枚去皮尖以水二升於盆中研之絞取汁令盡以白麵二升用杏仁汁搜作餺飥還以杏仁汁煮務令極熟量性多少啖之令盡又美酒數升煮十餘沸候熱訖飲之徐令盡蓋覆妥初覺心悶須臾間四體輕虛一服三年不發胡豆汁方出聖濟總録治一切石發用胡豆半升以水五盞同研生絹絞取汁每服半盞不拘時服虛弱人以意量之胡荽飲出聖惠方治乳石熱氣結滯經年數發用胡荽半斤五月五日採預收陰乾春夏採葉秋冬採根以水七升煮取一升半去滓每服一盞不計時候日三治硫黃髮遍身熱出聖惠方以大麻油二合煎熟放溫以銅匙抄少許啜之日三五服效治硫黃忽發氣悶方出聖惠方以羊血一合服之效治丹石發出聖濟總録用河中石一兩燒令通赤投於童子小便內候溫去石飲一盞良治一切丹石發出聖濟總録用黃連去須二兩為細末以水三盞浸經一宿漉去滓每服半盞時飲之治一切石發出聖濟總録以冬瓜生去皮研爛四兩以水五升煮取二升去滓分溫三服早晨日午近晚各一服治乳石發出聖濟總録用枸杞白皮半斤銼碎以水五升煮取三升空心任意服之又方出聖濟總録用薺苨半斤細銼以水五升煮取三升空心飲之術對鍾乳術發則頭痛目疼或舉身壯熱食解如鍾乳法附子對白石英亦對赤石脂附子發則嘔逆手足疼體堅強骨節痛或項強面目紅腫發者出聖惠方飲酒服麨自愈若不愈與白石英同解宜服大黃黃芩湯方見本類桔梗對赤石脂下人參對紫石英人參發則煩熱頭項強與紫石英同解赤石脂對牡蠣發則四肢壯熱心腹煩悶極渴解與赤石脂同乾薑無所偏對白石英發先腹脹後發熱石硫黃髮通身熱兼腰膝痛礜石發遍身發熱兼口噤茯苓發直頭痛桔梗發頭面熱牡蠣發頭痛而煩滿熱海蛤發則心中發熱以上除海蛤外宜浴法紫石發乍寒熱赤石脂發心噤身熱頭目赤以上二味宜酒又云赤石脂紫石英發宜飲酒得酒即解凡藥發或有宜冷或有宜飲酒不可一概也石硫黃礜石發及桔梗牡蠣茯苓發宜浴白石英亦可小浴飲不宜浴礜石發宜用生熟湯茯苓發熱多攻頭即以冷水洗身浴法初熱先用暖水後用冷水浴時慎不可洗頭垂浴可以二三升灌之凡藥宜浴便解即佳不瘥可余治之又法寒食散發者由草藥氣力易盡石性沉滯獨主胃中故令數發欲服之時以絹袋盛散一匕作四合酒中塞其口一宿後飲盡之其酒用多少荷御節度自如舊法此則藥石之勢俱用石不住胃中何由而發事甚驗也治發動數患熱因壓藥下之方用豬腎脂一具不令中水以火炙承取汁適寒溫一服三合每日夜五六服多至五六升二日稍隨大便下又方用肥豬肉臛一升調如常法空腹頓服之令盡少時腹中雷鳴鳴定藥下隨下以器盛取用水淘得石不盡更作如前服療能石發熱盛甘草二兩炙生犀角一兩半屑葳蕤三兩上切以水四升煮取一升半分服效常防備發熱法麥門冬三兩去心甘草一兩人參三兩上搗篩蜜和丸如彈丸大日服三丸良治藥發熱因千金翼云凡散數發熱無賴下去之又云諸丹及金石等用同之用黍米三升作糜以煎成豬脂一斤和令調宿不食旦食之空心服令飽晚當下藥神良不盡熱發更合服之治乳石發動忽大熱多欲就臥冷地人不得食諸熱面熱酒方用五加木根葉皮銼暴二兩粗搗篩每服四錢水一盞煎至七分去滓溫服蜂房湯治乳石發熱服此下石用露蜂房三兩炙銼碎以水三盞煎至一盞去滓頓服若不定隔三五日再服其石當從小便中下如細砂砂盡即住服朴硝丸治金石發熱及諸熱用朴硝一味煉成半斤研粉煉蜜丸如梧桐子大每服三十丸食後蜜水下服金石經年覺身中少熱即以此丸壓之每夜臥時服三十丸至四十丸取胸膈涼為度若有時患及發者取朴硝粉一匙空心水調服之以利為度凡朴硝取色白而不著風者佳色黃者傷治丹石發熱以菰根和鯽魚煮作羹食之三兩頓即瘥若發急遍身熱如湯火或氣結不識人時倒地口噤不開不自覺知者以熱酒隨其性灌之卒不得下者當折齒灌之咽中寒盛酒入必還出但灌勿止半日許以酒下氣徹乃蘇酒卒不下者難可救矣治服散卒發動困篤凡服五石護命更生散及鍾乳寒食散失將和節度皆致發動其病無所不為若發起倉卒不以漸而致者皆以散勢也宜及時救解之若四段身外有一切痛違常者用冷水洗數百遍熱有所沖水漬布巾隨以拓之又水漬冷石以尉之須飲暖酒逍遙起行將冷太過發則多壯熱以冷水洗浴然後用生熱湯五六石浴之已食少暖食飲少熱酒行止省勞將熱太過發則多心悶時食少冷食瘥若夏月太熱時散發動多起於渴飲所致以水和少面服不瘥復作以瘥為度治藥發熱因用肥豬肉五斤入蔥白半斤薤半斤合煮如治食法宿不食旦服之令盡不盡明日更服療丹石發動以含水藤中水飲之治服丹石人發動舌乾咳嗽出本草用冬月葵菹汁每食後飲一盞便臥少時治大人丹石發動出本草以雪水小溫服之治藥石發動熱氣奔犯出本草用緑豆生研絞汁服服赤石脂發則心痛飲熱酒不解治之出本草用蔥豉綿裹水煮飲之治服丹石人熱法出本草用桑耳和蔥豉作羹服之治丹石發動不下食出本草用罌粟子和竹瀝煮作粥食之極美主金石藥發出本草以麥門冬去心六兩人參四兩甘草二兩炙三物下篩蜜丸如梧桐子大每服一十九丸日再飲之
