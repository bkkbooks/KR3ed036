body:
  text: 卷一百十七寒暑濕門中寒附論夫諸寒收引皆屬於腎腎者少陰也少陰者至陰也至者為極也少陰者冬脈所旺居北而屬水為寒為歸藏為周密寒中收引拘縮寒之用也其病上下所出水澄徹清冷清者不濁其氣寒冷水穀不消化吐利清冷為病寒則如天氣寒水自清也素問云太陽受寒血凝為瘕太陰受寒氣聚為疝但脈急而寒之象也急主於痛故緊急也又內經云數則為熱遲則為寒諸陽為熱諸陰為寒脈當遲緩寒毒內郁洪數為熱所養心之脈也寒氣生清就於濕故下利清白此乃腸胃寒則化物不常熱則壅澀不通寒勝則火衰火衰金旺吐痢腥穢腥者金肺之臭也熱則喜酸寒則水腥只如四肢逆冷堅痞腹滿屈伸不便禁固戰栗謂陰水主之舒捲不便診其脈沉伏而遲病之證也若身涼不渴而寒踡足而臥惡聞人聲不欲言皆陰證也陰陽停則和偏則病如陽氣暴絶陰氣獨勝則為寒證陰氣暴絶陽氣獨勝則為熱證經云陽盛陰虛汗之而死陰盛陽虛下之而死若陽實外熱陰虛內寒陰實內熱陽虛外寒陽實伐其陽當涼膈散承氣湯主之陰實伐其陰當白朮散四逆湯主之寒者嚴凝殺厲之氣也人以腎氣為根本惟腎則受寒惟寒則傷腎腎氣一虛寒邪交作急痛拘攣戰掉強直昏迷厥冷口噤失音或翕然發熱面赤多汗此中寒也無汗惡寒頭疼面慘發熱拘急手足微寒此傷寒也霍亂轉筋洞泄下痢乾嘔吐逆積飲停痰此寒邪入腸胃也以至為咳嗽為虛勞為疝瘕為腳氣為痔漏為遺精為痎瘧為諸痛寒亦主之人惟腎氣不充疏於謹護非特霜凝冰結之謂寒或者炎天暑月當風取涼臥地受冷使寒邪之氣自皮膚而達經絡自經絡而入臟腑如前數證皆得以恣睢四出矣溫腎禦寒如乾薑附子川烏天雄輩佐之以養正靈砂此固藥籠中物然寒傷榮氣徒知溫腎而不知溫血恐未必有十全之功是則官桂當歸又溫血之上藥也素問曰冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光此去寒就溫之意也不善調攝則為寒所中大抵中寒脈必遲緊挾風則脈浮眩暈不仁兼濕則脈濡腫滿疼痛治之之法切不可妄下妄吐惟當溫散之否則舌卷囊縮難治六脈中之下得弦細而澀按之無力腹中時痛心胃控睪陰陰而痛或大便泄鼻不聞香臭清濁涕不止目中泣出喘渴痰嗽唾出白沫腰沉沉苦痛項背胸皆時作痛目中流火口鼻惡寒時頭痛目眩若振寒不止或嗽或吐或嘔或噦則發躁蒸蒸而熱如坐甑中必得去衣居寒處或飲寒水則便過其振寒傷至氣短促胸中滿悶而痛必有膈咽不通欲絶之狀甚則目瞪聲聞於外而淚涕痰涎大作方過其發躁須臾而已振寒復至或面白而不澤者脫血也悲愁不樂情慘慘意悲悲健忘或善嚏間出此風熱大損寒水燥金之復也如六脈細弦而澀按之空虛此大寒證亦傷精氣以辛甘溫甘熱滑潤之劑大瀉西方北方則愈夫大寒在外留而補之針所不為灸之所宜黃帝針經曰大寒在外留而補之入於中者從合瀉之針所不為灸之所宜陰陽皆虛火自當之厥而寒甚膝廉陷下寒過於膝下陵三里經陷下者火自當之結絡堅緊火所治之夫大寒在外留而補之云外者天外也大寒者北方寒化也中於人則言大寒在外乃皮毛之上也故曰寒甚則浮是足太陽膀胱寒氣中其本經乃方以類聚故頂項額為之先病治在風府穴久留針謂手太陽小腸內熱當傳送足太陽膀胱寒經其經復受外來客邪況皮毛者陽分也大惡陰寒經曰寒病久留針則為熱補者補內熱也補陽也令陰消鑠而邪退也留而補之者以火伐之又解寒入於中者灸之所宜云謂左右寸脈皆少不稱尺脈者言地之陰陽脈盛也若弦緊之脈更浮於上按之則洪大脈盛於下是地下陰火亦伏藏也況天地之陰陽已不足於外是上下之陽皆伏匿矣故曰陷下者灸之正謂此也故經云厥在於足宗氣不下脈中之血凝而留止非火調弗能取之刺有五節黃帝問於岐伯曰余聞刺有五節奈何岐伯對曰固有五一曰振埃二曰發蒙三曰去爪四曰徹衣五曰解惑黃帝曰夫子言五節餘未知其意岐論曰振埃者刺外經去陽病也發蒙者刺腑腧去腑病也去爪者刺關節支絡也徹衣者盡刺諸陽之奇腧也解惑者盡知調陰陽補瀉有餘不足相傾移也其論發蒙一法云刺腑腧去腑病也蒙者天外陽邪也陽者無形也天外者陰病在陽故從陽引陰治在背腧背腧腑穴是也若五臟病有形之證皮肉筋骨血脈病是也若絶於內者故曰陰病在陽乃從陽引陰邪在天外也其法取穴在背上五臟之腧假令皮病內絶治在天外針灸肺腧是也假令血脈內絶不得周流故曰是亦陰病在陽其穴則背之心腧是也餘三臟有形病內絶依此皆治在臟腧黃帝針經曰上熱下寒視其虛絡而陷下於經絡者取之氣下乃止此所謂引而下之者也辨云聖人以上熱下寒是謂有春夏秋冬也當從天外陽下降入地中乃天上群陰中火熾而反助六陽不能衰退先於六陽中決血絡出血使陰氣下降雖力微而能墜六陽下行陰血自降故也亦可謂老陽變陰之象也故經云上熱下寒視其虛脈陷下於經絡者取之此所謂引而下之者是也但言絡脈皆是病大者以三稜針決血去陰之熱熱者手太陽小腸中血絡有火熱之邪致此老陽不肯退化為陰而下降故先決手太陽之血熱使三陰得時之用而降下以行秋令奉收道下入地中而奉藏者也乃瀉重陽在天下不肯退化行陰道者也至元戊辰春豫應詔赴都中書參政楊公正卿年逾七十病面顏郁赤若飲酒狀痰稠黏時眩暈如在風雲中一日會都堂此證忽來仍加目視不明遂歸余診之兩寸脈洪大尺脈弦細無力此上熱下寒明矣欲藥之寒涼為年高氣弱不任記先師所論凡治上熱譬猶鳥集高巔射而取之即以三稜針於前巔眉際疾刺二十餘出紫黑血約二合許時覺頭目清利諸苦皆去自後亦不復作矣凡人中寒者喜缺其人清涕出發熱色和者善嚏凡覘病者未診脈望之口燥清涕出善嚏缺此人中寒其人下利以裡虛故也欲嚏不能此人腹中痛凡寒脈沉弦脈雙弦者寒也弦脈狀如張弓弦按之不移脈數弦者當下其寒脈雙弦而遲者心下堅脈大而緊者陽中有陰可下之若右手寸口脈弦者即脅下拘急而痛其人澀澀惡寒師曰遲者為寒澀為無血寸口脈微及中緊而澀緊即為寒微即為虛澀即為血不足故知發汗而復下之大露宿丸主寒冷百病方神聖復氣湯出濟生拔粹方治人腹氣乘冬足太陽寒氣足少陰腎水之旺子能令母實手太陰肺氣實反來侮土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻中流涕或如息肉不聞香臭咳嗽痰沫上熱如火下寒如冰頭作陳痛目中流水視物䀮䀮耳鳴耳聾頭並口鼻或惡風寒喜日陽夜臥不安常覺痰塞膈咽不通口失味兩脅縮急而痛牙齒動搖不能嚼物陰汗前陰冷行步欹側起居艱難掌中寒風痹麻木小便數而晝多夜頻而缺氣短喘喝少氣不足以息卒遺失無度婦人白帶陰戶中大痛牽心而痛黧黑失色男子控睪牽心腹陰陰而痛面如赭色食少大小便不調煩心霍亂逆氣裡急而腹皮色白後出餘氣腹不能努或腸鳴膝下筋急肩髀大痛皆此寒水來復土之讎柴胡一錢銼藁本八分防風五分銼羌活一錢銼人參五分乾薑炮為末一錢三分甘草升麻七分銼半夏湯洗七次七分白葵花五朵去心細剪當歸身六分酒洗銼郁李仁五分另研泥黑附子炮裂去皮臍一分用水五盞同煎至二盞入黃耆草豆蔻仁麵裹燒熟去皮各一錢橘紅五分入在內再煎至一盞再入下項藥黃柏酒浸三分黃連酒浸三分枳殼三分生地黃酒洗三分以上四味預一日另用新水浸又以華細辛根川芎細末蔓荊子各三分上預一日用新水半大盞分作二處浸此三味並黃柏等煎正藥作一大盞不去滓入此浸者藥再上火煎至一大盞去滓稍熱服空心服又能治齧頰齧唇齧舌舌根強硬等證如神忌肉湯宜食肉不助經絡中火邪也如無上證婦人白帶臍下寒男子二丸冷牽引心痛腹中痛手心或寒兩尺脈弦細按之不鼓小便遺失或數而缺大便多燥澀不通或大便軟溺色或變氣短不足以息額寒鼻不聞香臭鼻端紅腫善嚏多悲多愁心神不樂健忘多怒寢汗憎風小便滑數後有遺失臍下冷痛中風風寒汗出腰脊強痛皮急或腹皮白或黑或鼻流清涕目中淚下不止精神不爽宜服之不必諸證悉具大抵腎與膀胱經中有寒元氣不足者並宜服之於月生月滿時隔三五日吃一服如病急不拘時候即宜治之一方有桃仁無甘草除風濕羌活湯出濟生拔粹方夫痿者濕熱乘腎肝也當急去之不然則下焦元氣竭盡而成軟癱必腰下不能動心煩冤而不止也若身重減氣不短小便如常及濕熱之令退時或所增之病氣退者不用五味子澤瀉茯苓黃柏豬苓知母蒼朮白朮之藥只依本病中證候加減常服藥亦須用酒黃柏二分或三分如更時令清燥之氣大行卻加辛溫瀉之若濕氣勝風證不退眩暈麻木不已羌活一兩防風去蘆一錢柴胡五分藁本三分獨活五分茯苓二分澤瀉二一分豬苓去皮二分黃耆一錢炙甘草五分橘皮三分黃柏三分黃連一分蒼朮湯浸去皮稱一錢升麻七分川芎三分上㕮咀每服稱三錢或五錢水二盞煎至一盞去滓稍熱服虛實施用如有不盡證候依方加減法用之附子理中湯出醫方大成治五臟中寒中濕咽逆虛弱亦治口噤四肢強直失音不語昔有武夫申邊大雪出帳外觀瞻忽然暈倒時林繼作隨行官醫灌以此藥兩劑遂醒兼治胃脘停痰冷氣刺痛人參白朮乾薑炮熟附子各一兩甘草炒五錢上㕮咀每服三錢姜五片食前煎服血少加當歸口噤則斡開灌之一方無姜用水煎服無時四五七湯治感寒頭眩惡寒口眼喎斜耳聾大附子三兩炮去皮臍山茱萸五兩山藥七兩上為末每服二錢酒調服或㕮咀每服四大錢水盞半姜五片棗一個煎七分去滓服養胃湯出和劑方治外感寒邪內傷生冷憎寒壯熱頭目昏痛肢體拘急風寒二證俱治先蓋被連進此令四肢微汗未汗以薄粥助之先有汗則勿服亦須溫潤和解或有餘熱參蘇飲調之兼治飲食傷脾發為痰瘧闢山嵐瘴氣四時瘟疫蒼朮炒厚朴制半夏曲各一兩人參茯苓草果藿香各半兩橘紅七錢半甘草半兩上銼為末每服三錢加桂半錢姜七片烏梅半個水二盞煎至一盞去滓服熱盛者加乾葛三分姜附湯出直指方治中寒口噤四肢強直失音不語或卒然暈倒口吐涎沫狀如暗風手足厥冷或腹煩躁兼治陰證傷寒大便自利而發熱者邪氣未解表證不見乾薑熟附子各二兩上㕮咀每服四錢水一盞半煎至七分去滓溫服或慮此藥太燥即以附子理中湯相繼服餌姜附本治傷寒經下之後又復發汗內外俱虛身無大熱晝則煩躁夜則安靜不嘔不渴六脈沉伏並宜服此不知脈者更須審之兼治中脘虛寒久積痰水心腹疼痛霍亂轉筋四肢厥逆入肝加木瓜入肺加桑白皮入脾加白朮入心加茯苓隨證加之挾風加防風兼濕多加白朮筋脈牽急加木瓜肢節疼痛加桂心人參白朮各等分一方附子湯以生用者名白通湯加白朮倍之甘草減半名生附白朮湯治中風濕昏悶恍惚腹滿身重手足緩縱漐漐自汗失音不語便利不禁一方有甘草用生薑煎服白朮調中湯出宣明論治中寒痞悶急痛寒濕相搏吐瀉腹痛上下所出水液澄徹清冷穀不化小便清白不澀身涼不渴本末不經有見陽熱證其脈遲者是也此因飲食冷物過多陰勝陽衰而為中寒也或冷熱相擊而反陽氣怫鬱不能宣散怫熱內作以成熱證者不可亦言為冷當以脈證別之夫濕熱吐瀉常見陽脈若亡液氣虛亦能反見諸陰脈也當以標本明之不可妄治或熱證誤服此白朮調中湯溫藥亦能開發陽氣宣通而愈別無加害寒熱久新並宜服之可或有口瘡目疾孕婦等吐瀉以煨乾姜官桂不宜服白朮茯苓去皮澤瀉各半兩紅皮去白半兩乾薑炮官桂去皮縮砂仁藿香各一分羅淨甘草一兩上為末白湯化蜜少許調下二錢日三服或煉蜜和就每兩作十丸名白朮調中丸小兒一服分三服人參白朮散出宣明論此方證同調中湯治法服人參白朮茯苓甘草橘皮葛根澤瀉滑石藿香以上各半兩上為末每服三錢水一盞煎至六分解利妊婦加蒼朮三五片熱服沉香桂附丸出濟生拔粹方治中寒心腹冷痛霍亂轉筋等證與前姜附湯通用沉香附子炮去皮臍乾薑炮良薑銼炒官桂去皮茴香炒川烏炮去皮臍銼作小塊子如豆大微炒令黃用吳茱萸湯浸洗去苦炒上各一兩為細末用好醋煮麵糊為丸如梧桐子大每服五七十丸熟米飲送下空腹食前日進二服忌生冷硬物薑桂散出直指方溫中散寒生乾薑良薑各半兩辣桂木香半夏曲甘草制各二錢半上銼散每服三錢姜五片棗二個煎服沉附湯出直指方治虛寒無陽胃弱乾嘔熟附子乾薑炮各半兩沉香白朮各一分甘草炒一錢半上銼每服三錢姜五片煎食前服通經湯出御藥院方治陰陽升降失常暴感寒邪真氣不足手足厥冷囊縮或小腹急痛並皆治之蛇床子左顧牡蠣為末浮萍各三兩草香附子二兩為末磁石十兩針試有力者杵碎如豆用絹袋盛煎十遍勿用上用向陽仰泉水一斗同上件藥煎至七升濾滓貯於瓶中臨臥陰器貯於瓶中提地戶三七遍熏浸少時傾於盆子中通手淋洗尉法治三陰中寒一切虛冷厥逆嘔噦陰盛陽虛之證及陰毒傷寒四肢厥冷臍腹痛咽喉疼嘔吐下痢身背強自汗脈沉細或唇青面黑諸虛冷證皆宜用之肥蔥細切銼麥麩各三大升滄鹽二兩上三件入水一大盞同和拌勻濕分作二次於鐺鍋內同炒極熱用重絹縫作二囊包裹尉病人臍周下連陰部前後兩股陰間往來不住尉之一包將冷更易一包蔥包既冷再用鹽水拌濕炒焦熱依前用之至糜爛不用別取蔥麩日夜不住相續之至身體溫熱脈壯陽氣復來而止守氣養之和之又方治陰證傷寒腹痛吐痢唇青面黑身背強四肢冷脈沉細咽喉不利用滄鹽一斤炒焦大熱布絹二重作囊包裹盛之尉陰臍間亦同蔥尉法尤妙生料五積散出醫方集成治感冒寒邪頭疼身痛項背拘急惡寒嘔吐或有腹痛又治傷寒發熱頭疼惡風無問內傷生冷外感風寒及寒濕客於經絡腰腳痠疼及婦人經血不調或難産並治之白芷三兩陳皮去白六兩厚朴去皮薑製四兩桔梗去蘆十二兩枳殼去瓤麩炒六兩川芎甘草炙茯苓各三兩蒼朮米泔浸去皮二十四兩當歸去蘆三兩麻黃去節六兩肉桂去皮芍藥各三兩乾薑四兩半夏湯洗三兩上㕮咀每服四錢水一盞姜三片蔥白三根煎七分熱服冒寒用煨姜挾氣則加茱萸婦人調經催産則入艾醋大橘皮丸出楊氏家藏方治中寒氣痞飲食不下陳橘皮去白一斤生薑洗淨不去皮切焙乾一斤丁香人參去蘆頭甘草炙以上三味各四兩神麯微炒二兩麥糵微炒二兩上件為細末煉蜜為丸每一兩作一十丸每服一丸煎生薑橘皮湯化下食前空心服溫中降氣丸出楊氏家藏方治中寒氣痞脾胃不和飲食進退臍腹虛冷及中酒吐逆胸膈不利附子去皮臍銼如半棗大稱一兩用生薑自然汁半斤銀石器內慢火煮薑汁盡為度薄切焙乾生薑二兩去皮用白朮人參去蘆頭陳皮去白神麯炒黃半夏湯浸七次白附子炮當歸洗焙天南星炮高良薑煨切油炒丁香木香沉香胡椒肉桂去粗皮各一兩上為細末用生薑自然汁煮麵糊為丸如梧桐子大每服五十丸生薑湯下不拘時候副師大忒木官人年六十八戊午秋征南豫從之過揚州千里仲冬病自利完穀不化臍腹冷痛足胻寒以手撥之不覺痛癢常燒石溫之亦不得暖其脈沉細而微豫思之年高氣弱深入敵境軍事煩冗朝暮形寒飲食失節渴飲乳酪履於卑濕陽不能外固由是清濕襲虛則病起於下故胻寒而逆內經云感於寒則受病微則為咳甚則為瀉為痛此乃寒濕相合而為病也法當急退寒濕之邪峻補其陽非灸則不能已以大艾炷先於氣海穴灸百壯補下焦陽虛次灸三里二穴各三七壯治胻寒而逆且接引陽氣下行又灸三陰交二穴以散足受寒濕之邪也遂處方云寒淫所勝治以辛熱濕淫於外平以苦熱以苦發之以附子大辛熱助陽退陰溫經散寒故以為君乾薑官桂辛甘大熱亦除寒濕白朮半夏苦辛溫而燥脾熱故以為臣草豆蔻炙甘草人參甘辛大溫溫中益氣生薑辛大溫能散清濕之邪蔥白辛溫以通上焦陽氣故以為佐又云補下治下制以急急則氣味厚故大作湯劑投之不數服瀉止痛減足胻漸溫調飲食逾十日平復明年秋八月過襄陽值霖雨閲旬余前證復再作矣再灸陽輔二穴三七壯投以前服藥數服良愈由是副帥以醫道為重待豫彌厚加減白通湯出衛生家寶方治形寒飲冷大便自利完穀不化臍腹冷痛足胻寒而逆附子炮去皮臍一兩乾薑炮一兩官桂五錢白朮五錢炙甘草五錢草豆蔻麵裹煨熟三錢人參五錢半夏湯洗七次上㕮咀每服一兩水二盞半生薑五片蔥白五莖煎至一盞三分去滓空心服宿食消盡溫服之氣海一穴在臍下一寸五分任脈所發三里在膝下三寸胻外肷兩節間當舉足取之足陽脈之所入也為人可灸三壯針入五分三陰交二穴在足內踝上三寸骨下陷中足太陰厥陰少陰之交會可灸三壯針入三分髓會絶骨針經曰腦髓消脛酸耳鳴又曰脛酸髓冷絶骨外踝上附骨下當脛中是也髓會之處也潔古老人云頭熱如火足寒如冰可灸輔陽穴輔陽二穴火也在足外踝上四寸輔骨前絶骨端如前三分去邱墟七寸足少陽脈之所行也欲不畏寒出本草取天門冬茯苓為末服方寸匕日再服大寒時單衣汗出中暑附論夫傷暑者乃夏至前後各三十日有奇少陽相火用事之時也炎熱大行爍石流金草萎河涸人或傷之則發熱自汗面垢背寒倦怠少氣以暑消氣氣消血散與傷寒相類此是夏間即病非冬傷寒至夏發為熱病也當以脈別之傷暑脈虛無力蓋因氣血消散致血虛弱傷寒則血泣而閉脈緊而有力大不同也傷暑病者身熱惡寒頭痛或往來寒熱如瘧煩躁渴甚眩暈嘔吐泄瀉昏悶不清其脈陰陽俱虛緩而微弱皆由傷暑之所致也暑者六經氣之一能與風濕併合為病循經流入諸臟但與寒不相得故有暑濕風溫之證暑濕者惡寒反熱自汗關節盡痛頭目昏眩手足倦怠不自勝持此並傷暑濕所致也風溫者頭痛身熱常汗出體重喘息四肢不收默默欲眠此由先傷風后傷暑所致也風濕溫病者煩渴引飲心腹冷痛燥悶口乾面垢惡寒風飢不能食眩暈嘔噦此伏暑中風濕所致也中暑所以脈虛者蓋熱傷氣而不傷形也且暑者在天為熱在地為火在人臟為心是以暑喜傷心令人身熱頭痛狀類傷寒但背惡寒面垢此為異耳甚則昏悶不知人事手足微冷煩渴口噤或吐或瀉或喘或滿此皆暑氣所為也暑氣入肝則眩暈頑痹入脾則昏睡不覺入肺則喘滿痿痹入腎則消渴小便不利若發其汗則惡寒甚加溫針則發熱甚下之則淋甚傷暑中暍其實一病但輕重不同耳中暑背寒面垢其面如塗油類纂云面垢者陽證也一名面塵若塵埃之著面手足微冷煩渴口燥但覺倦怠四肢卻不痛重其脈微弱按之無力白虎湯主之痰逆惡寒者橘皮湯主之不惡寒者竹葉湯主之頭痛惡心煩躁心下不快者五苓散最妙問中暑何故灑灑然毛聳惡寒答曰經云四時八風之中人也因有寒暑寒則皮膚急腠理閉暑則皮膚緩腠理開則灑然寒閉則熱而悶近人多不明中暑或作熱病法治之復用溫熱藥必致發黃斑出更為蓄血尤宜戒之四時之內惟夏一季是人脫精神之時最難調攝心旺腎衰腎化為水至秋漸凝及冬始堅當此之際正宜溫藥補助飲食亦當稍熱飲冷食生皆致病之因也況暑毒多從口鼻入凝於牙甲遠行作勞人遇止息須嗽口勿咽如覺入咽寧嘔去之蓋夏月伏陰在內腸胃冷滑易於傷動暑毒一入遍於五臟六腑為病最急夏月小有感冒無問風寒暑濕頭痛寒熱煩躁昏悶霍亂瘧痢皆當先服五苓散然後隨證以他藥主之其實豬苓茯苓利水道白朮肉桂有實表之功若用以治病無有不愈其或正當隆暑之時無病以五苓散例為夏間常服之藥但知可以解暑除煩而不知內有澤瀉最能伐人腎氣腎者人之根本當根本不充之時輕進是藥將以為利適以為害可不謹哉瑣碎録云隔年五苓散不可服服之殺人良以此也一時昏中者切不可便與冷水並臥濕地上法當以熱湯先灌及用布衣蘸熱湯尉臍下及氣海續續以湯淋布上令暖氣透徹臍腹候其蘇省以溫熱水化蘇合香丸灌之進以黃連香薷散五苓散若體虛者冷香飲子霍亂吐瀉來復丹二氣丹夾食則用胃苓湯若挾風則其脈沉而浮證有搐搦當於黃連香薷散內加羌活煎服卻不可作驚癇治之多致不救若途中卒然暈倒急扶在陰涼處掬道上熱土於臍上撥開作竅令人尿於其中以待求熱湯並生薑或蒜各一塊嚼爛以湯送下立醒或生蔥一二莖亦可或灸兩乳頭各七壯或令人口噓心前令熱湯人噓皆備急之法也夏月炎熱人冒涉途路熱毒入內與五臟相併客邪熾盛郁瘀不宣致陰氣卒絶陽氣暴壅經絡不通故奄然悶絶謂之暍然此乃外邪所擊真臟未壞若便遇救療氣宣則蘇也夫熱暍不得太冷將息得冷即困此謂外卒以冷觸其熱熱毒蘊積於內不得宣發故悶絶而死也方御愛姜蘇丸出傳信適用方治中暑噁心頭疼煩躁生津止渴紫蘇葉五兩揀淨烏頭肉二兩切炒甘草生三分桂心半兩去粗皮香薷葉半兩揀淨生薑切洗焙乾一分木瓜乾者二兩生去皮瓤切焙檀香半兩銼屑上為細末煉蜜為丸如櫻桃大服一丸細嚼熟水送下縮脾飲一名香薷縮脾飲出和劑方治解伏熱除煩渴消暑毒飲食生冷過多致霍亂吐瀉者吐利霍亂後服熱藥太多致煩躁者並宜服之縮砂仁草果仁煨去皮烏梅肉淨粉草炙各四兩白扁豆炒去皮乾葛各二兩銼上㕮咀每服四錢水一大碗煎至八分去滓以水浸冷旋旋服以解煩欲熱欲溫任意高年人加附子二兩煎如前法暑月以此代熟水飲之極妙名增損縮脾飲一方用乾薑炮一兩㕮咀煎澄清汁服治脾弱胃寒不思飲食口舌乾燥不生津液功效如神一方有生薑無粉草一方有香薷傷暑發熱頭目痛用以吞消暑丸一方無干姜一方無白扁豆潔古云轉筋吐瀉不止者其病出中焦陰陽交而不加發而為痛也此最為急病也不可與分毫粥飲穀氣入胃則必死也治有兩種渴欲飲水者是為陽氣多五苓散主之不欲飲水為陰多理中湯主之解暑三白散出和劑方治冒暑伏熱引飲過多陰陽氣逆霍亂嘔吐小便不利臟腑不調噁心頭暈並皆治之澤瀉白朮白茯苓各等分上㕮咀每服一貼水一盞姜五片燈心十莖煎八分去滓服不拘時每貼重半兩清暑益氣湯出濟生拔粹方治氣虛身熱得之傷暑熱傷氣故也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則舍於腎腎者水藏也今水不能勝火則骨枯髓虛足不任身發為骨痿者生於大熱也此濕熱成痿令人骨乏無力故治痿獨取於陽明時當長夏濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣高而喘身熱而煩心下膨閉小便黃而數大便溏而頻或痢出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲遲病雖互換少瘥其天暑濕令則一也宜以清燥之劑治之陽氣者衛外而為固也多則氣泄今暑邪干衛故身熱自汗以黃耆甘溫補之為君人參橘皮當歸甘草甘微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根甘苦平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏苦寒借甘味瀉熱補水虛者滋其化源以人參五味子麥門冬酸者微寒救夫暑之傷於庚金為佐黃耆一錢汗少減半錢人參半錢升麻一錢澤瀉半錢蒼朮泔浸一錢炙甘草三分葛根二分五味子九個白朮半錢神麯炒半錢麥門冬去心三分黃柏酒洗三分當歸身三分橘皮半錢青皮去白二分半上同㕮咀都作一服水二大盞煎至一盞去滓大溫服食遠劑之多少臨臥斟酌得病皆由飲食勞倦損其脾胃乘天暑而作病也但藥中犯澤瀉豬苓茯苓燈草通草木通淡滲利小便之類皆從時令之旺氣以瀉脾胃之客邪而補金水之不及也此正方已是從權而立之若於無病時濕熱脾旺之證或小便已數腎肝不受邪者誤用之必大瀉真陰竭絶腎水先損兩目也復立變證加減法於後心火乘脾乃血受火邪而不能外發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以益真陰脾胃不足之證須少用升麻乃足陽明太陰引經之藥也使行陽道自脾胃中右遷少陽行春令生萬化之根蒂也更少加柴胡使諸經右遷生髮陰陽之氣以滋春之和氣也脾虛緣心火亢甚而乘其土也其次肺氣受邪為熱所傷必須用黃耆最多甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損其元氣也上喘氣短懶語須用人參補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣甘草最少恐資滿也若脾胃之急痛並脾胃大虛腹中急縮腹皮急縮者卻宜多用之若從權加升麻以引之恐左遷之邪堅盛卒不肯退反行陰道故使引陽道上行若中滿者去甘草咳甚者去人參如口乾嗌乾者加葛根血虛以人參補之陽旺則能生陰血也更加當歸和血又宜加黃柏以救腎水蓋甘寒瀉熱火火減則心氣平安如煩亂猶不能止少加黃連以去之如氣浮心亂則以硃砂安神丸鎮固之如心下痞亦少加黃連氣亂於胸為清濁相干故以橘皮理之能助陽氣之升又助甘辛為用也夫長夏濕土客邪大旺可從權加蒼朮白朮澤瀉上下分消其濕熱之氣濕氣太勝主食不消化故食減不知穀味加炒曲以消之復加五味子麥門冬人參瀉火益肺氣助秋損也此三伏中長夏正旺之時藥也凡暑月間忽有男女老幼昏悶不省人事手足搐搦或角弓反張如小兒驚風之狀或上吐下瀉其熱如火皆因伏暑兼感風而得此證當服枇杷葉散如鄉村僻地無問藥處只以枇杷葉炙去毛為末用西瓜一個搗汁調葉末灌之醒然無事誤投他藥十有九死近俗治沙證不問感冒暑濕風寒飲食所傷凡覺頭疼渾身壯熱手足指末微厥冷先以艾煎湯試如吐即是其證及有腹痛手足冷者亦是出經驗良方用五月蠶蛻紙碎剪安碗中以碟蓋之以百沸湯泡半碗許仍以別紙封碟縫良久乘熱飲之就臥以厚被蓋之汗出愈又近時人多看頭額上及胸前兩邊有小紅點在於皮膚者卻用紙捻成條微蘸清油於清油燈上點燒紙捻於紅點上淬爆者是名水沙卻用樟木煎湯服汗出愈如腹痛不止又用針於兩手指甲梢針出血愈又有用青麻蘸水於頸項兩肘臂等處戛掠見得血凝皮膚中紅點如粟粒狀然後蓋覆衣被飲食粥湯或蔥頭湯或清油生蔥茶得汗即愈此皆使皮膚腠理開發鬆利誠不藥之良法也白朮茯苓乾薑湯出三因方治伏暑中風濕煩渴引飲心腹疼燥悶口乾面垢灑灑惡寒淅淅惡風微汗飢不能食青金散出楊氏家藏方治中暑煩躁大渴吐瀉不止生硫黃寒水石火煅玄精石焰硝青黛上等分為細末每服一錢新汲水調下不拘時候加減十味香薷湯出經驗良方夏月常服清頭目去暑濕順氣清神理脾香薷穗四兩白扁豆炒厚朴薑製茯神去皮木紫蘇葉甘草陳皮去白各二兩檀香一兩乾木瓜二兩丁香半兩上為細末百沸湯調服治秋用青蒿二兩木瓜半夏生薑各半兩同煎八分濾過用錫器盛於井水中浸極冷不拘時任意服秦艽散出傳信適用方治中暑秦艽去土當歸去蘆桔梗黃連去須烏梅去核甘草炙青皮去瓤柴胡去蘆乾薑炮芍藥上各等分為細末解暑濃煎燈心湯下心痛煎菖蒲湯下瀉痢米飲下常服熟水下骨熱地骨皮湯下二錢十味香薷飲出醫方大成治脾胃不和乘冒暑氣心腹膨悶飲食無味嘔噦噁心五心潮熱力乏體倦常服消暑健脾進飲食香薷葉一兩人參去蘆白朮陳皮溫湯浸去白白茯苓黃耆去蘆厚朴去粗皮銼碎生薑自然汁拌和炒至黑色乾木瓜白扁豆炒去殼甘草炙以上各半兩上為粗末每服三錢水一盞棗一枚煎七分去滓不拘時服一方為細末熱湯或冷水調下亦可廣順散出楊氏家藏方治中暑煩渴甘草三兩半炙肉桂去粗皮一兩乾薑一兩炮紫蘇葉半兩烏梅肉一兩半焙乾上為末每服二錢冷水調下沸湯調服亦得大黃龍丸一名清暑丸出仁齊直指方治中暑身熱頭疼狀如脾寒或半熱半寒或寒熱往來或煩渴嘔泄昏悶不省或不能飲食此方曾治暑甚妙嘗有中暍已昏欲死者灌之立蘇舶上硫黃硝石各一兩白礬雄黃滑石各半兩白麵四兩飛羅者上為細末入面在內滴水為丸如梧桐子大每服十丸至二三十丸新汲水下小兒黍米大如無硝石以盆硝代之來復黃龍大抵性溫道途中暑昏僕即扶起以手巾蘸熱湯暖其臍腹即漸蘇醒次以來復丹為末井水調下無藥則以大蒜細研新水調與之仍以蒜少許置鼻中或謂中暑最忌得冷來復黃龍並蒜以水調下者何蓋其藥性溫因寒而發用也同盧祖常糾繆謂有李昭文患渴疾盧診之曰暮暑月得疾否李曰然盧煎參湯候冷咽下玉壺丸遂愈龍鬚散一名甘草散治冒暑伏熱心膈燥悶飲水過度不知人事及霍亂作瀉作渴衄血吐血小便下血頭旋目暈五倍子一作五味子烏梅去仁各二兩甘草炙一兩半飛羅面二兩一方用清明日面尤佳白礬枯一兩一方並生用上為細末每服二大錢新汲水調下一服即愈亦解諸毒物雖平日不飲冷者服之亦有奇效一方加訶子肉滴水為丸謂之龍涎丸仍以水調下翟公巽參政易名濯熱散陰乾水下五物香薷湯調榮衛治飲食不節飢飽失時或冷物過多或硬物壅駐或食畢便睡或驚憂恚或勞役動氣便欲飲食致令脾胃不和三脘痞滯內感風冷外受寒邪憎寒壯熱遍體疼痛胸膈滿悶霍亂嘔吐脾疼翻胃中酒不醒四時傷寒頭痛並進三服得汗即痊常服益脾溫胃散宿痰停飲能進食闢風寒霧露之氣大能驅暑香薷三兩白扁豆薑製厚朴薑製白茯苓各一兩半甘草三分上銼每服三錢水煎溫服入鹽點亦得不拘時一方用茯神玉壺丸治中暑有起死功舶上硫黃焰硝滑石白礬各一兩上為細末入上等白麵六兩拌和令勻用新汲水為丸如梧桐子大每服二十丸新汲水吞下如悶亂欲死者以水調灌之立蘇其效如神昔李昭文何判院徐監倉皆抱渴疾服此而俱效蓋此藥治因暑患渴疾功效不可具述香薷散治臟腑冷熱不調飲食不節或食腥膾生冷過度起居不節或露臥濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷不能消化米穀致令諸邪相干腸胃虛弱飲食變亂於腸胃之間致吐利心腹疼痛霍亂氣逆有心痛而先吐者有腹痛而先利者有吐利俱發者有發熱頭痛體痛而復吐利虛煩者或但吐利心腹刺痛者或轉筋拘急疼痛或但嘔而無物出或四肢逆冷而脈欲絶或煩悶昏塞而欲死者此藥悉能主之香薷去土四兩厚朴去粗皮切碎薑汁炒令黃白扁豆各二兩上銼散每服五錢水一盞酒一分同煎七分去滓水中沉冷連吃二服立效不拘時候一方加黃連煎治中暑復傷風搐搦不省心胸煩躁只依本方宜清煎並冷服暑月潮瀉亦加烏梅車前子一錢陳米一撮暑月虛人腹痛嘔泄加丁香白朮炮附子木瓜各半錢生薑五片亦名六和湯傷暑單有頭痛正方加山茵陳多服取效以上並熱服常服消暑健脾或為末煉蜜為膏酒服亦妙一方無白扁豆黃連香薷散治陰陽不順清濁相干氣射中焦名為霍亂由飽食腥膾復啖乳酪海陸百品無所不食多飲寒漿眠臥冷席風冷之氣傷於脾胃諸食結而不消陰陽二氣壅而不反陽氣欲降陰氣欲升陰陽交錯變成吐利不已百脈昏亂榮衛俱虛冷搏於筋正宜服之香薷穗一兩半厚朴去皮黃連各二兩銼入生薑四兩同研勻炒紫色上粗散每服三錢水一盞酒半盞銀石器內慢火同煎至七分去滓用新汲水頻頻浸換令極冷頓服之冷則效速也又非時吐利霍亂腹中撮痛大渴煩躁四肢逆冷冷汗自出兩腳轉筋疼痛不可忍者須井水浸冷頓服極效消暑丸一名消毒丸一名黃龍丸治傷暑發熱頭痛脾胃不和煩渴暈眩寒熱半夏醋五升煮乾甘草炙茯苓去皮各半斤上為末生薑汁作薄糊為丸如梧桐子大每服五十丸水下此藥合時須用好醋煎煮半夏薑汁作糊無見生水臻至修合用之神效中暑為患藥下即蘇傷暑發熱頭疼用之尤驗夏日常服止渴利便雖多飲水亦不為害應是暑藥皆不及此若痰飲停積並用薑湯咽下入夏以後不可缺此丸細嚼尤好勝五苓散者以五苓有豬苓澤瀉赤茯苓能瀉腎經兼有目疾者不宜服秋深亦非宜也一方以蜜為丸脾虛感暑嘔吐不食宜以局方枇杷葉散作生料煎煮吞下六七十丸立效暑中食生冷等物過多或胸膈痞塞嘔吐清水或乾嘔者宜以生薑鹽湯調下小烏沉湯吞下即瘥江湖聞有消暑丸用醋煮半夏酒煮黃連各半枳殼淨炒茯苓各四兩為丸任意吞下臟腑不調服之多驗地仙散治傷寒後伏暑煩熱不安及煩熱虛勞地骨皮去木二兩防風去蘆一兩甘草炙半兩上銼散每服三錢水一盞半生薑五片煎不以時溫服桂苓甘露飲一名桂苓白朮散出宣明論治傷寒中暑冒風飲冷內外一切所傷傳受濕熱內甚頭痛口乾吐瀉煩渴不利兼小便赤澀大便急痛濕熱霍亂吐下腹滿痛悶及小兒吐瀉驚風並宜服茯苓去皮澤瀉各一兩甘草炙寒水石石膏各二兩滑石四兩白朮桂去皮豬苓各半兩上為細末每服三錢溫湯調下新水亦可生薑湯尤良小兒每服一錢同上法此藥下神金丸止瀉利無不驗也並解內外諸邪所傷劉庭瑞方卻不用豬苓或日三服不計時候桂苓丸出和劑方治大解暑毒煩渴飲水過多心腹脹滿小便赤少肉桂去粗皮不見火茯苓去皮各等分上為細末煉蜜為丸每兩作八丸每服一丸用新汲水或熟水嚼化下治中暑不拘老少一名黑散子出危氏方上用不蚛皂莢不計多少刮出黑皮燒煙欲盡用盆合於地上周回用土遮縫勿令透煙每一兩皂莢灰用甘草末六錢每服一錢新汲水調下氣虛人溫漿水調下昏迷不省者不過兩服吳內翰備急方用皂莢五斤去皮弦炙焦存性甘草五兩蓋中暑人痰塞關竅皂莢能疏利去痰故也一方米飲下清暑散出楊氏家藏方治伏暑傷熱燥渴冒悶嘔噦噁心或發霍亂硫黃二兩蛤粉四兩上同研勻每服一錢新汲水調下不拘時候治中暑甚妙出傳信適用方上用上等重羅細面以薑汁及水和成餅子曝乾卻碾末收之每用二三錢新汲水調下治夏月大熱因飢中暑暈倒昏塞者出傳信適用方上急煎米飲徐徐灌之候漸省只與大順散及溫氣藥服或大燥吐悶亂不止急取本人汗頭巾或頭髮挼汁一盞入青黛一錢調灌須臾吐出惡毒涎水定省後以溫粥飲投之愈去暑方海上名方以平胃散用大蒜搗爛為丸服之治伏暑悶絶用香附子為細末冷水調服救生散出肘後方治暑毒用新胡麻一升炒令黑色取出攤干碾末新汲水調三錢或丸如彈子大新水化下凡著熱外不得以冷物逼外得冷即死解人中大熱方取烏古瓦煎湯服六合湯出和劑方治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胸膈痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食婦人胎前産後並宜服之縮砂仁半夏湯泡七次杏仁去皮尖人參去蘆甘草炙各一兩赤茯苓去皮藿香葉拂去塵白扁豆薑汁略炒木瓜各二兩香薷厚朴薑汁製各四兩上銼每服四錢水一盞半生薑三片棗子一枚煎至八分去滓不時服內傷生冷通用枇杷葉散出和劑方治冒暑伏熱引飲過多脾胃傷冷飲食不化胸膈痞悶嘔噦噁心頭目昏眩口乾煩渴肢體困倦全不思食或陰陽不和致成霍亂吐利轉筋煩躁引飲枇杷葉去毛炙陳皮湯去白焙丁香各半兩厚朴去皮塗薑汁炙四兩白茅根麥門冬去心焙乾木瓜甘草炙各一兩香薷三二分上搗羅為末每服二錢水一盞入生薑二片煎至七分一盞溫服溫水調下亦得如煩躁用新汲水調下不計時候小兒三歲以下可服半錢更量大小加減香薷丸出和劑方治大人小兒傷暑伏熱煩渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之香薷去土紫蘇去莖粗梗乾木瓜各一兩丁香茯神去木檀香銼藿香葉甘草炙各五錢上為細末煉蜜和丸每兩作三十丸每服一丸至二丸細嚼溫湯下或新汲水化下亦得小兒每服半丸不計時候冷香湯出醫方大成治夏秋暑濕恣食生冷遂成霍亂陰陽相干臍腹刺痛脅肋脹滿煩躁引飲無度良薑二兩檀香二兩甘草炙令赤二兩丁香二錢附子炮裂去皮臍二兩川薑三分炮草豆蔻五個去皮面裹煨上為細末每用藥末五錢水二升煎十數沸貯瓶內沉井底作熟水服大能消暑止渴服之永無霍亂疾來復丹出仁齊直指方均平陰陽治中暑昏迷霍亂瀉如水上盛下虛裡寒外熱伏暑透明硫黃一兩玄精石一兩研細水飛陳橘皮去白硝石各一兩併為細末入定碟內以微微火慢炒用柳篦不住手攪令陰陽氣相入再研極細五靈脂五臺山者水澄去砂石日乾青橘皮去白各二兩上靈脂二橘皮為細末次入玄精末及硫黃硝石末和畢以好醋打糊丸豌豆大每服五十丸空心米飲下或五苓散下或水研灌亦得此藥可冷可熱治法當與養正丹黑錫丹相類但體輕不能鎮墜耳然硝石既寒佐以橘皮其性疏快硫黃且能利人若作暖藥用以止瀉誤矣但霍亂一證吐利交作蓋由飲啖生冷或冒暑熱之氣中脘節閉揮霍變亂此藥通利三焦分理陰陽服之最驗兼治反胃嘔吐其效尤著中暑昏亂此藥最為切當小兒驚風用亦有驗蓋以上證候皆由涎飲中節有以致之此藥溫利涎飲既去則諸證悉除若男子婦人心腹作痛服疏利之劑得效者未應遽補當以藥徐徐服之令大便常通則痛不復作矣嘔吐用之其意亦然不可不知腎厥頭疼亦宜服之老人寒祕悉能主之一法治老人並虛損之人寒氣入腹大小便不通者用生薑半兩連根葉和泥蔥一莖鹽一捻豆豉五十粒爛研略炒盦臍中心作兩劑更易用之以利為度亦良法也大順散出和劑方治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂嘔吐臟腑不調甘草銼寸長三十斤杏仁去皮尖炒肉桂去粗皮乾薑各四斤上先將甘草用白砂炒及八分黃熟次入乾薑同炒令姜裂次入杏仁又同炒候杏仁不作聲為度用篩隔淨後入肉桂一處搗羅為散每服二錢水一中盞煎至七分去滓溫服如煩躁井花水調下不計時候以沸湯點服亦得桂苓甘露散出劉先生直格方治痰涎止咳嗽調臟腑寒熱嘔吐流濕煩躁服之令人遍身氣液宣平及療水腫瀉痢不止官桂半兩人參半兩藿香半兩茯苓白朮甘草葛根澤瀉石膏寒水石以上各一兩滑石二兩木香一分上為細末每服三錢白湯點下新汲水或薑湯亦可一方無石膏白虎湯出儒門事親知母一二兩半去皮甘草一兩粳米一合石膏四兩亂絞者另為末上銼如麻豆大粳米拌勻用水一盞煎至六分去滓溫服無時日三四服或眩嘔者加半夏半兩薑製如伏暑作寒熱未解宜和五苓散同煎服伏熱後或冷水沐浴或吃冷物清氣在脾不覺解令日作寒慘壯熱渾身灑淅宜加桂煎服出汗便解玉露散出儒門事親治暑寒水石滑石石膏栝蔞根以上各四兩甘草二兩上為細末每服五錢新汲水調下石膏散出儒門事親石膏一兩人參去蘆甘草炙以上各半兩上為細末新汲水蜜水調三錢生薑湯亦可人參散出宣明論治身熱頭痛積熱黃瘦肌熱惡寒蓄熱發戰膈熱嘔吐煩渴濕熱瀉利或目赤口瘡咽喉腫痛或風昏眩虛汗肺痿勞嗽不已者石膏甘草以上各一兩滑石四兩寒水石二兩人參半兩上為末每服二錢溫水調下食後兼服梔子金花丸一名既濟解毒丸黃龍丸出和劑方治丈夫婦人伏暑發熱作渴嘔吐噁心年深暑毒不瘥者黃連一斤去須銼碎酒二升半浸黃連稍過用火煮乾上為細末麵糊丸如梧桐子大每服三十丸熟水下傷酒過多臟毒下血大便泄瀉溫米飲下食前二服當盛夏於道途間為暑氣所中悶倒不省人事者急扶在陰涼處切不可與冷水當以布巾衣物等項熱湯尉臍下及丹田氣海續以湯淋布上令徹臍腹溫溫即漸蘇醒如若商賈及工雇之人倉卒無湯掬路中熱土於臍上仍撥開作竅令人便尿其中更以大蒜爛研水調灌下一用道中熱土與大蒜等分爛研水調服仍以大蒜少許置鼻中氣透即蘇凡覺中暑急嚼姜冷水一大碗咽下暑氣中人謹不可搵以冷水不宜單用冷水灌之來復丹消暑丸皆可用也中暑證面垢六脈沉伏冷汗自出昏不知人先以湯巾如前法尉臍腹次用來復為末冷調灌之仍用白虎湯竹葉石膏湯服之此一定之法不可改易多有病家無主病人親故問疾各立一說各傳一方皆謂屢經作效來者既衆議論紛然不知孰是猶豫之間遂致困篤莫若參以外證確意服藥無信浮言以貽後悔水瓢丸出仁存方治冒暑毒解煩渴烏梅肉四兩甘草青鹽各二兩乾木瓜檀香白茯苓各一兩麝香二錢半蜜煉過隨藥加減使上除麝香別研余併為細末煉蜜為丸每兩作三十丸每服一丸含化或新汲水溫水嚼下不拘時候一方有人參水葫蘆丸出百一選方川百藥煎三兩人參三錢甘草麥門冬烏梅肉白梅肉乾葛以上各半兩上為細末麵糊為丸如雞頭大每服一丸含化夏月出行一丸可度一日治傷暑潮熱煩渴小便不利上以通苓散每服三錢水一盞半燈心二十莖麥門冬二十粒去心淡竹葉十片車前穗五莖煎不拘時候服渴甚晚禾根少許白茅根五莖枇杷葉二片去白毛蜜塗微炙煎用桂苓丸出仁存方治中暑煩渴消痰飲寬胸膈桂心白朮各二兩赤茯苓二兩烏梅肉二兩半乾生薑一兩甘草半兩上為末蜜丸如彈子大每服一丸細嚼熟水下或至二丸五苓散出宣明論治傷暑煩渴引飲無度兼治傷寒溫熱表裡未解煩渴引水水入即吐或小便不利及汗出表解煩渴不止又治霍亂吐利及瘟疫瘴瘧煩渴小便赤澀澤瀉二兩半桂心一兩豬苓去皮赤茯苓去皮白朮去蘆各一兩半上為末每服二錢沸湯調下不拘時候服訖多飲熱湯汗出即愈溫熱病加甘草一兩炙瘀熱在裡身發黃疸濃煎茵陳湯食前服疸病發渴及中暑引飲白水調服小兒加白朮末或糖少許發虛熱每料綿黃耆人參麥門冬去心各一兩分陰陽退寒熱山茵陳車前草每服各二根止瀉加紫蘇陳米各少許薑汁半匕久痢加肉豆蔻五錢每服鹽梅一枚赤痢烏梅一枚栗殼二枚去蒂赤膜醋炒白痢栗殼二枚制同上粟米一撮腹痛南木香半錢渴烏梅一個枇杷葉二片去白毛糯米一撮伏暑鼻衄白茅花一握小便血以生料者每服加梔子三個車前子一撮煩熱心神恍惚硃砂一字燈心二十莖麥門冬二十粒去心淡竹葉十片車前草二根傷暑吐血白茅花一握熱瀉車前子一撮麥門冬二十粒去心暑濕瀉紫蘇五葉木瓜三片車前子一撮傷暑頭痛濃煎蔥白湯大便水瀉小便不利加真車前子末少許不省人事者宜先服蘇合香丸候其蘇省卻以此藥加黃連羌活各一錢暑濕腫滿香蘇散合和加生薑三片木瓜二片車前草二根伏暑頭疼小便澀濁加山茵陳車前草各二根霍亂吐利加木瓜二片藿香少許生薑三片傷暑腹痛加陳大蓼三寸陳壁土一指頭大木瓜二片臟腑有熱便血加黃連厚朴枳殼烏梅各一錢小便血瞿麥穗一錢車前子一撮燈心二十莖並加之感暑濕手足繾痛痹冷合和香蘇散每服四錢姜三片木瓜三片陳大蓼三寸煎服留滓再加蔥葉橘葉椒葉陳大蓼各一握水一斗煮七分先熏後洗立效腳氣作痛行步艱辛每料加木瓜羌活炒蒼朮枳殼去瓤陳皮半夏甘草各一兩成十二味每服加生薑三片蔥白二根脾胃不和嘔逆噁心冒暑心腹脹滿去羌活加藿香烏梅各一錢壯熱大渴肚皮熱或五心熱加燈心二十莖麥門冬去心白茅根各一錢淡竹葉十片晚禾根淨洗一握四時感冒嘔泄亦合和香蘇散每服四錢加生薑五片木瓜二片諸熱毒小便赤濁每服四錢加車前子黃連去須各一錢則清利以上皆溫服暑月煩躁潮熱甚加茵陳車前草各二莖苦竹葉七片山梔子三枚擘破又方治燥渴去桂心加人參謂之春澤湯濕瀉身痛加蒼朮少許秋多淫雨人患瘟疫在冬時服之效尤妙一方加辰砂瘀熱心煩醫說戴宅崇甫因母病孝誠感於北辰夢授此藥但五苓散用桂小柴胡用人參正氣用厚朴備急丸用乾薑之類欲其剛柔相濟亦是攻守之意故方書謂五苓散無桂及隔年者俱不可用近日鋪家有去桂五苓散不知者為其所誤若去桂而入參卻謂之春澤湯彭宅祕傳良方又謂五苓散可用生薑汁為丸如雞頭大煎五苓散服道途間亦可胃苓湯一名胃苓散出仁存方治傷暑煩渴引飲所下如水五苓散平胃散上二藥相合每服二錢紫蘇烏梅煎湯下未效加木香縮砂白朮丁香煎服來復丹亦可冷香飲子出濟生方治老人虛人伏暑煩躁引飲無度噁心疲倦服涼藥不得者此方主之夏宜常服草果仁三兩附子炮去皮臍橘紅各一兩甘草炙半兩上㕮咀每服一兩水二碗生薑十片煎至半碗去滓沉冷旋旋服不拘時候一方無生薑煎服潑火散一名地榆散出百一選方治傷暑煩躁發渴口苦舌乾頭痛惡心不思飲食昏迷不省人事欲死者及治血痢婦人熱崩青皮去白赤芍藥黃連去須地榆各等分上為細末每服三錢冷水調下如蓄熱而氣血妄行加甘草等分一方漿水調服治血痢水一盞煎服黃龍丸出百一選方治冒暑毒解煩渴頭疼嘔逆半夏半斤釅醋一斗浸三日入銀器中慢火熬醋盡取出新汲水洗曬乾為度甘草一兩上為末生薑自然汁丸梧桐子大食後新汲水下三五十丸二陳湯出仁齊直指方治傷暑復感冷及內傷生冷半夏制橘紅各五兩茯苓三兩甘草炙二一兩上㕮咀每服三錢姜七片小烏梅一枚煎服感冷更添生薑水浸丹出和劑方治伏暑傷冷冷熱不調霍亂吐利口乾煩渴飲食積聚並宜服之巴豆大者二十五個去皮心膜研取油盡如粉黃丹炒研羅過取一兩一分上同研勻用黃蠟熔作汁和為丸梧桐子大每服五丸以水浸少頃別以新汲水吞下不拘時候一方有輕粉一錢此藥經伏時方過取下所積之物即安糜粥自養稍不將攝恣其所欲而食病即復矣二氣丹出濟生方治伏暑傷冷二氣交錯中脘痞悶或頭痛惡心並皆治之硝石硫黃等分上為末於銀石器內文武火上炒令鵝黃色再研細用糯米糊為丸如梧桐子大每服四十丸新汲水送下不拘時候一方水丸如指大每一丸細嚼臘茶下冰黃散一名卻暑散出和劑方治冒暑伏熱頭目昏暈嘔吐瀉痢口乾煩渴背寒面垢赤茯苓去皮甘草生各四兩寒食麵生薑切碎搜面勻日乾各一斤上為細末每服二錢新汲水或冷水熱水調下不拘時候通草散出經驗濟世方治伏暑下血如久痢崇寧二年自太府出為發運自夏及秋患痢兩月一日一夜三四十次然血多白少名醫皆曰此痢也聞泗州青陽鎮李中和助教善醫即遣人召之中和至看脈即曰此非痢也始甚怒之徐叩之李曰血多白少小便澀少即非痢其言中余之病心已神之乃是舊因伏暑小便傳導入大腸由心經而過遂化為血由大腸而下故其狀似痢而非痢也但令大小便各歸其本即安木通通草各半兩澤瀉一分竹茹二錢少用不妨老人減半上銼如大米粒或為細末就銼時即每服稱三錢水一盞煎至七分溫服細末即每服抄二錢依前法煎食後中夜臥各一服便住信知天下有如此妙醫余家數婢患久痢服之皆安故記傳後益元散出經驗良方治身熱嘔吐泄瀉腸澼下痢赤白濁癃閉淋痛利小便偏主腸胃中積聚寒熱益精氣通九竅六腑津液去留結消蓄水止渴利中除煩熱心燥治腹脹痛補益五臟大養脾胃之氣理內傷陰痿安魂定魄補五勞七傷一切虛損主癇痓驚悸健忘止煩滿短氣臟傷咳嗽療飲食不下肌肉疼痛治口瘡牙齒疳蝕明耳目壯筋骨通血脈和氣血消水穀保真元解百藥酒食邪毒耐勞役飢渴寒熱闢中外諸邪所傷久服強志輕身駐顏延壽及解中暑傷寒疫癘飢飽勞損憂愁思慮恚怒驚恐傳染並汗後遺熱勞復諸疾並解兩感傷寒能令遍身結滯宣通氣和而愈及婦人下乳催生併産後損液血衰陰虛熱甚一切熱證並宜服之兼才患方發吹乳或已覺吹乳癤頻服即愈乃神驗之妙藥惟有孕婦人不得服恐滑胎也膩白滑石六兩甘草一兩炙上為極細末每服三錢蜜少許溫水調下無蜜亦得日三服欲冷新汲水調下發汗煎蔥白豆豉湯並三四服此藥解散熱甚多服無害有益穀神散出仁存方治中暑泄瀉陳倉米一升乾薑一兩甘草一兩楮實青者蒸曬一升上為細末飯飲調下二錢食前服二黃丸出經效濟世方治伏暑狂燥及下血痢泄瀉等凡因暑而得疾者皆治黃連去須黃柏去粗皮各二兩肉豆蔻二個乾薑一分炮上為細末水麵糊為丸如梧子大再曝乾每服三十丸溫熱水下患痢甘草湯下水瀉米飲下治伏暑暴瀉兼去暑毒一名枇杷葉散出鮑氏方枇杷葉去毛生薑濕稱罌粟殼去瓤蒂各三錢上細銼用水二大盞蜜一合粟米百餘粒酒半合同煎至一盞以下溫服一服即愈暑天有初感便渴或赤或白小便不利煩躁而嘔此由暑而得當用五苓散六和湯未止用此方有嘔者勿用玉壺丹出經效濟世方硫黃一兩焰硝二兩或二兩半緑豆細末四兩或五兩上各生用為末以緑豆粉糊為丸如櫻桃大每服一丸同油麻薄荷嚼新水下或嚼生薑亦佳或丸如梧桐子大新水吞數十丸亦可異功敵暑丸出仁存方治伏暑或吐或瀉有效黃連一斤淨陳倉米二升水一碗拌濕上於鍋內如罨飯法米熟為度曬乾為末以水為丸如梧桐子大每服三五十丸飯湯下不拘時治伏暑吐瀉陰陽不分一名防己湯出楊氏家藏方防己白芷各等分上為細末每服一錢新汲水調下不拘時檀香丸一名含化丸出十便良方解暑毒檀香末一錢杏仁去皮二錢半烏梅肉二兩紫蘇葉一兩茴香三二錢半百藥煎二錢半甘草一兩半上為細末煉蜜為丸如彈子大非時含化香薷銼散出仁齊直指方治解暑毒止霍亂香薷二兩厚朴制一兩茯苓陳皮甘草炙各半兩良薑三錢上銼細末二錢半作一服鹽一捻水煎服一方有乾薑無良薑解一切暑毒欲死者使服之立蘇出本事方半夏四兩醋一升半煮盡醋焙乾甘草一兩桂一半兩赤茯苓二兩白茯苓一兩上為末用生薑汁作麵糊為丸如小豆大每服五十丸熱水下若身大熱背微惡寒心中煩悶時時欲嘔渴不能飲頭目昏痛惡見日光遇涼稍清起居如故此由飲食失宜胃中空虛熱留胃口其脈虛大數謂之中暑治熱暍心悶方一名橘皮甘草湯出聖惠方用飲熱湯亦可內少乾薑橘皮甘草煮飲之稍稍咽勿頓使飽但以熱土及熬灰土壅臍上佳一方無干姜有生薑鎮靈丹一名降氣丹出楊氏家藏方治中暍冰雪不能解者陰陽交錯中脘痞塞頭疼噁心太陰玄精石硫黃盆硝以上各一兩上細研入銀器內炒令鵝黃色候冷入輕粉一錢同再研極細宿蒸餅水浸過細干搜和丸如雞頭肉大凌辰井花水面北叩齒七遍吞下一兩丸一方無輕粉治熱暍方一名蒜漿治暑渴逡巡悶絶不救取道上熱塵土以壅心上少冷即易氣通止又以熱土壅臍上令人尿之臍中溫即愈一方以大蒜二瓣研爛水和服之石林避暑録云親治一御馬之僕立蘇又方出聖惠方治夏月中熱暍死用濃煮蓼取汁三升飲之即愈不瘥更灌又方出千金方以使人噓其心令暖易人為之又方出千金方用抱狗子若雞著心上尉之又方出聖惠方用灌地漿一盞即愈如人行路中旋以利器掘開一穴入水其中搗之卻取爛漿以飲死者即愈又方出聖惠方用黃連半兩去須水一大盞煎至五分去滓溫服之又方出聖惠方用地黃汁一盞服之又方出聖惠方用水半升和麵一大抄攪服之治夏月中熱暍死出聖濟總録以搗菖蒲汁飲一二升又方出千金方取屋上南畔熱瓦尉心涼易之中熱不能食用生薑搗汁和蜜服治暑渴方出海上名方用百藥煎臘茶為末烏梅肉丸如雞頭大含化名為水瓢丸白梅湯治中熱五心煩躁霍亂嘔吐口乾煩渴津液不通白梅二十九斤檀香十兩甘草十三斤半鹽炒十五斤上為末每服一錢搽生薑新水下酒後乾噦噁心話澀如茶吃竹葉石膏湯出仁齊直指方治伏暑內外熱熾煩躁大渴不可攻者石膏半斤半夏湯洗七次焙一兩二錢半麥門冬去心二兩七錢半人參甘草炒各一兩上為末每服二錢姜五片青竹葉七片粳米百粒水煎服滌煩丸出楊氏家藏方治積年伏暑遇夏頭昏肢體倦怠不進飲食煩渴多困茴香一兩炒檳榔一枚大黃一兩濕紙裹煨上為細末用白麵與藥末等分滴水和為丸如梧桐子大每服五丸臨臥爛嚼溫酒送下五聖湯出楊氏家藏方治暑積年深每遇夏月不進飲食疲倦少力見日色則頭目昏痛噁心多睡貫衆黃連去須皮甘草微炙吳茱萸湯洗七次白茯苓去皮五味並生用各半兩上㕮咀平分二服每服用水一碗半煎至一碗去滓放冷候日午時先取香熟甜瓜一枚切去皮作十二片先嚼瓜一片呷藥一二呷送下了再如前嚼瓜一片呷藥一二呷看吃得幾片以藥汁盡為度不損脾胃不動臟腑須是覺大煩躁方可服之茅根散出楊氏家藏方治伏熱傷冷心神恍惚大渴不止腸鳴腹痛不思飲食白茅根一兩人參去蘆頭一兩厚朴去粗皮半兩薑製香薷一兩去土上為細末每服二錢水一盞入酒半盞同煎至一盞水中沉冷服不拘時候橘皮湯出永類鈐方治傷暑痰逆惡寒若不惡寒宜竹皮湯甘草半兩人參一分橘皮去白二兩上㕮咀每服二三錢加竹茹一塊姜四片棗一枚煎熱服玉壺丸出廣南衛生方治中暑伏熱昏困不省人事白麵四兩白者白礬半兩生用硫黃半兩生用上為末拌勻新水丸如梧桐子大每服三五十丸新水下不拘時候續傳信方造桂漿法治中暑毒夏月飲之解煩渴益氣清痰桂末二大兩白蜜一升斤以水二斗先煎取一斗待冷入新垍瓶中後下二物攪二三百轉令勻先以油單一重蓋加紙七重以繩封之每日去紙一重七日開之藥成氣香味美格韻絶高今人亦多作故並著其法宜換冷水浸瓶底蠟梅丸出十便良方治止渴生津蠟梅花末乾薑末甘草末枇杷葉百藥煎烏梅肉末各一兩蠟五兩上熔蠟開投蜜二兩和上件藥搗二三百下丸如雞頭大夏月長途一日服一丸妙十全飲子出十便良方治傷暑病瘧中暑等疾人參白茯苓乾山藥白扁豆紫蘇葉香薷葉甘草厚朴半夏白朮各等分上為粗末每服二錢水一盞姜三片煎七分去滓以新汲水沉冷服妙若覺煩躁方可沉冷服如脾胃弱只溫如常服黃耆湯出十便良方治暑月口乾煩躁渴不思食黃耆地黃芍藥五味子麥門冬茯苓各半兩甘草一分上為粗散每服三錢以水一大盞生薑三片棗二個烏梅一個煎服無時四君子湯出鮑氏方治怯弱人用暑藥太過脈虛而熱不退或微渴冷熱藥皆難投只用此加陳皮徐徐調之或瀉入生薑或白姜少許人參白朮茯苓甘草各等分上為散每服四錢煎服治中暑迷悶欲死出傳信適用方上取蒜一瓣生嚼以新水送下或不能嚼水研灌之並可救熱死人切勿便與冷水及臥冷地正如凍死人須先與冷水若遽近火即死一法行路暍死人唯得置日中或令近火以熱湯灌之即活一方爛嚼蒜三兩瓣溫水送下二香散出如宜方治夏月得病頭疼身熱伏暑傷寒疑惑之間香薷散香蘇散上等分水煎腦痛加蓮鬚蔥煎又方二香散對藿香正氣散名正氣二香散若先飲冷後傷暑五苓散主之此必下痞濃煎生薑湯調服佳出濟生拔粹方蒲黃三錢滑石五錢生甘草一錢上為細末熱水調下橘皮半夏湯出衛生家寶方治中暑伏暑及痰在胸膈服此大有神效陳橘皮六兩去瓤白朮三兩去蘆頭白茯苓三兩人參一兩枳殼一兩去瓤麩炒當歸一兩去蘆頭半夏三兩湯洗七次銼如米甘草三分炙上除半夏外㕮咀同拌勻每服三大錢生薑六片棗二枚水一盞煎至七分去滓溫服不拘時候飲靈丸出衛生家寶方治中暑神效牛膽制天南星無以法制半夏代人參茯苓桔梗乾葛麥門冬不去心桂去皮紫蘇葉極香者甘草炒以上各一兩烏梅肉余甘子去核二味各一兩半無餘甘以百藥煎代上為末以夾絹篩過煉硬蜜和勻入臼杵數百下先以酥塗臼杵丸如櫻桃大生硃砂為衣常用一丸含化舌下靈液濈濈湧出此藥大去水息除煩下氣老人虛熱宜服此藥若燥渴嚼二三丸麥門冬水送下此藥仍無藥石氣味水瓢丸出衛生家寶方消暑毒丁香枝杖一兩甘草半斤炙白梅肉三兩為末烏梅肉一斤紫蘇葉去土三兩檀香半兩麝香一字上為細末蒸熟藥木瓜兩枚同蜜拌和為丸如彈子大溫熟水嚼下不拘時候每服一丸金露解毒丸出衛生家寶方大治暑毒用舶上明淨硫黃蛤粉以上各一斤上為末用連皮生薑作片子取自然汁為丸如彈子大陰乾每服一丸生薑薄荷研細入蜜一小匙新水調下玉壺丸出衛生家寶方治暑氣硫黃一分寒水石石膏煅盆硝甘草緑豆粉各一兩半太陰玄精石一兩上為細末蒸餅丸如彈子大與生薑同嚼新水下良薑香薷湯出淡寮方治伏暑傷冷致作霍亂陳皮去白藿香葉香薷葉甘草炒生薑和皮良薑炒棗子去核紫蘇葉木瓜去瓤上銼散每服三錢重煎服一方用木瓜香薷高良薑等分煎服一方用藿香葉良薑木瓜各半兩水二盞煎一盞服一方用胡椒緑豆粉各四十粒研破水煎服或為末研木瓜湯調一方以平胃散五苓散等分和為一處熱湯點服若因暑霍亂煩躁發渴隨意飲浸冷香薷散或縮脾飲病去藥除不宜過多服陽明主宗筋屬胃與夫大腸今暴下暴吐津液頓亡外傷四氣內積七情飲食甜膩攻開諸脈枯削於筋宗筋失養必致攣急甚則卵縮舌卷為難治之滑石甘桔湯出鮑氏方治臟腑蘊熱氣實燥渴心神煩躁口苦唇焦咽膈不快至於腫痛小便祕澀大便亦實感暑煩渴滑石五兩甘草一兩桔梗一兩上為末每服二錢煎八分食前旋利愈病在膈上食後服一方去桔梗名滑石六一湯凡中暍死不可使得冷得冷便死療之方出金匱方屈草帶繞暍人臍使三兩人溺其中令溫亦可用熱泥和屈草亦可扣瓦碗底按及車缸以著暍人取令溺須得流去此謂道路窮途卒無湯當令溺其中欲使多人溺取令溫若湯便可與之不可泥及車缸恐此物冷暍既在夏月得熱泥土暖車缸亦可用也人參益氣湯出試效方商人杜彥達五月間兩手指麻木四肢困倦怠惰嗜臥乃熱傷元氣也黃耆八錢生甘草半兩炙甘草二錢人參半兩升麻二三錢白芍藥三錢五味子百四十個柴胡八二錢半上㕮咀分作四服每服水二盞煎至一盞去滓稍熱服食遠神效暑毒連脾濕熱在腳不泄不終則為瘧獨煉雄黃蒸餅和卻甘草作湯服之安樂若作別治醫家大錯於丞相夢中韻語出永類鈐方治熱暍方出千金方張死人口令通以暖湯徐徐灌口中少舉死人頭令湯入腹須臾即蘇主胸中伏熱下氣消痰化食出本草以橘皮半兩微熬作末如茶法煎呷之治暑氣出本草用甜瓜暑月服之永不中暑氣治傷暑出本草以建茶煎飲之治夏月熱煩悶不止出本草搗小薊葉取汁半升服之立瘥一方用苗生絞汁服去熱出本草以櫸樹皮削取里皮去上甲煎夏日作飲服之治煩熱少睡多渴出本草用小麥作飯水淘食之療熱止渴出本草以芋蒸煮冷啖之除熱病出本草以天名精搗汁夏月服之良水沉散出楊氏家藏方治伏暑傷冷霍亂轉筋虛煩燥渴心腹撮痛吐利交作四肢逆冷香薷葉三兩白茯苓一兩去皮厚朴去粗皮蘸生薑汁炙令紫色稱二兩白扁豆一兩丁香半兩甘草半兩炙上件為細末每服三錢水一盞入好酒半盞同煎至一盞水中沉冷服不拘時候治時暫伏暑上用香附子手中捻去皮入薑汁炒香熟為末入沙糖丸如龍眼大先嚼油麻少許次嚼藥冷水送下當時便覺清涼又方上用薑汁沙糖丸不炒同前治人中大熱用芹菜作虀葅食之或煮食亦得
