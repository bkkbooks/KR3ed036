不食者三月心中煩悶時已十月予謂必心經有伏熱與此藥令服十五粒溫水下越二日不料來謝云當日二服渴止及次日三服飲食如故此本治淋用以治渴信知用藥要在變通也人參散出聖惠方治下焦壅熱氣逆不續嘔吐不禁名曰走哺宜服和氣止嘔人參去蘆頭蘆根銼梔子仁陳橘皮湯浸去白瓤焙葳蕤黃芩知母赤茯苓麥門冬去心石膏各二兩上為散每服五錢水一盞煎至五分去滓不拘時候溫服一方有白朮無麥門冬三焦散出王氏博濟方治三焦不和營衛不調肢體煩倦頭目昏疼飲食無味多困少力寒熱痰壅頭旋前胡去苗蘆柴胡去苗桔梗羌活獨活人參枳殼去瓤麩炒鱉甲去裙襴醋浸炙黃各一兩旋覆花一兩半甘草炙半兩石膏一分如頭疼旋入上為細末每服一錢半至二錢水一盞煎七分溫服解傷寒發汗入麻黃一兩去節同杵為末如上焦多壅熱入地骨皮一兩半人參荊芥散出王氏博濟方治上焦壅滯頭目昏眩涕唾稠黏心胸煩滿人參柴胡羌活荊芥旋覆花甘菊桑白皮各等分上七味為末每服二錢水一盞煎至七分食後臨臥溫服利膈散出王氏博濟方治上焦風壅多患咽喉胸膈不利荊芥穗四兩青幹好者鼠黏子四兩白牽牛二兩炒令香熟為度甘草炙三分上為末每服一錢入鹽點兼治風牙疼以三錢末入川椒一百粒鹽二錢煎熟熱含冷吐出白蒺藜散出王氏博濟方治上焦虛熱頭目昏疼或眼赤腫心胸煩悶地骨皮去土白蒺藜去刺旋覆花山茵陳白菊花各半兩鼠黏子石膏各二兩上七味為末每服一錢食後茶清調下日可三服麥門冬飲出王氏博濟方治三焦不利心肺多壅痰涎並積口舌乾燥咽嗌腫痛肌體黃瘁氣血不調麥門冬去心半兩桔梗半夏各一分赤芍藥半兩菊花一分甘草半兩蔓荊子一分前胡防風各半兩桑白皮京款冬花各半兩杏仁一分五味子一分白朮一分貝母半兩升麻半兩上件一十六味各洗令淨焙乾杵羅為末食後夜臥各進一服每服末二錢水七分生薑一片同煎至三分去滓溫服大益心肺木通川芎丸出家藏經驗方治上焦熱壅口舌生瘡聲嗄眼澀祛風避毒老幼皆可服冬間常宜服之木通八錢川芎三二錢半白朮一兩七錢杏仁二兩半桔梗二三兩龍腦二三錢薄荷葉十二兩官桂四兩錢縮砂四錢附子七錢生去皮臍薄片密炙黃色上九味為細末煉蜜為丸如彈子大每服半丸細嚼溫熟水送下食後服臨臥服亦得都下潘防禦家貨此方藥先公晚年常服有效桔梗湯出衛生家寶方治中上焦不和氣道隘塞水飲不利楊吉老傳前胡去蘆赤茯苓人參去蘆枳殼炒去瓤甘草炙以上各一兩半夏切作片子薑汁浸兩宿焙桔梗去蘆陳橘皮去白以上各半兩上為粗末每服二錢水一大盞生薑五片煎至六分去滓帶熱服日二三服不拘時候加味神功丸出余居士選奇方治三焦氣壅心腹痞悶六腑風熱大便不通腰腿疼痛肩背沉重頭昏面熱口苦咽乾心胸煩躁睡臥不安及治腳氣並素有風人大便結燥木香一兩人參二兩去蘆頭大麻仁二兩別研如膏枳實桃仁各二兩訶黎勒皮四兩大黃錦文者四兩面裹煨去面上為細末入麻仁搗研令勻煉蜜丸如梧桐子大每服二十丸溫水下或溫米飲下皆可食後臨臥服如大便不通可加丸數以利為度神功丸出活人書治三焦熱壅心腹痞悶六腑風熱大便不通津液內枯大腸乾澀裡急後重或下鮮血痰唾稠黏風氣下流腰疼腳重臍下脹痛溺赤如金大黃三兩人參半兩麻子仁五兩另研訶子皮炮取二兩上杵研為細末煉蜜丸如梧桐子大每服二十丸溫水下日三服以通為度婦人產後大便秘米飲下十丸大三脘散出活人書治三焦氣逆胸膈虛痞兩脅氣痛面手浮腫大便秘澀兼治腳氣獨活一兩白朮三兩分乾木瓜切焙一兩沉香一兩木香三分陳橘皮三分川芎三分檳榔三分麵裹煨熟甘草微炙三分紫蘇一兩大腹皮一兩上十一味同一處杵為粗散每服秤一錢水二盞同煎至一盞去滓分二三服徐徐溫服取便利為度如能臨晚常進半劑依法煎服即腹臟調和風氣人多秘澀宜服之未通不利者依法煎再服此藥極不虛人氣經驗多矣腳氣心腹氣悶大便秘澀者最良利膈丸出本草治三焦氣不順胸膈壅塞頭昏目眩涕唾痰涎精神不爽用牽牛子四兩半生半熟不蛀皂莢塗酥炙二兩為末生薑自然汁煮糊丸如梧桐子大每服一十丸荊芥湯送下三焦虛寒附論夫上焦虛則引氣於肺中焦虛則生寒腹痛洞泄便利霍亂下焦虛則大小便不止津液氣絕寒則補於腎然三焦者水穀之道路氣之所終始也其虛雖異其原則一故有俱虛之病上焦如霧其氣起於胃上口並咽已上貫膈其氣虛寒則令人精神不守引氣於肺咳嗽語聲不出膈寒之病生焉中焦如漚者以其在胃中脘不上不下主腐熟水穀本胃脘之陽氣溫乃能腐化水穀之精灌養周身若寒客中焦則胃中冷胃中冷則飲食不化腹痛飧泄霍亂吐利治法宜溫補之下焦如瀆其氣起於胃下脘別迴腸注於膀胱主出而不內以傳導也其氣虛寒則津液不固大小便利不止小腹痛不欲聞人言治宜溫之方姜樸丸一名厚朴煎丸出楊氏家藏方治三焦俱虛和脾胃進飲食強中逐寒大去冷痰兼止吐瀉厚朴去粗皮一斤擘作十六片肥生薑一斤捶碎鍋內添湯煮至姜味淡取出厚朴焙乾薑半斤以甘草半斤捶碎煮至甘草味淡取出乾薑切作片子焙甘草半斤附子炮裂去皮臍四兩上為末熟棗肉為丸如梧桐子大每服二十丸米飲下食前服穀神散治三焦氣虛心胸痞悶兩脅脹滿不思飲食四肢少力或多痰涎咽喉不利或上喘促頭目昏眩心腹疼痛又治中滿下虛久服和補脾元調適寒溫順四時之胃氣大能進飲食通流津液止煩渴安神養氣枇杷葉淨刷去毛塗棗汁炙香熟一兩石槲細銼用酒拌和微炒三分