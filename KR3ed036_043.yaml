也蓋三焦之氣以胃氣為本水穀之道路氣之所終始也今咳而久者以寒氣蘊結周播胃中故致腹滿不食氣逆上行涕唾多而面目虛浮也方藿香湯治久咳傳三焦腹滿不欲食藿香葉人參赤茯苓去黑皮青橘皮湯浸去瓤焙細辛去苗葉益智子去皮微炒縮砂仁陳橘皮湯浸去白焙甘草炙各一兩木香白芷微炒各半兩上為散每服三錢水一盞入生薑木瓜各三片同煎至七分去滓稍熱服不拘時候黃耆湯調脾肺養氣治三焦咳嗽減食息高黃耆銼人參白朮當歸切焙各三分赤茯苓去黑皮百合糯米桔梗銼炒桑根白皮銼各一兩枳殼去瓤麩炒一兩半上為散每服三錢水一盞紫蘇五葉同煎至七分去滓食後稍熱服半夏湯治三焦咳腹滿不欲飲食半夏湯洗七遍去滑焙木通銼各四兩前胡去蘆頭白朮赤茯苓去黑皮陳橘皮湯浸去白焙檳榔銼各一兩半桂去粗皮枳殼去瓤麩炒旋覆花去萼各一兩一分上為散每服三錢水一大盞生薑三片煎至八分去滓溫服不拘時候乾薑湯治三焦咳腹滿心胸不利不思食乾薑炮裂桂去粗皮款冬花各半兩細辛去苗葉白朮甘草炙銼五味子炒木香各三分附子炮裂去皮臍一兩上銼如麻豆每服三錢水一盞入棗二枚擘破煎至七分去滓溫服日三胡椒理中丸治三焦咳肺胃虛寒咳逆嘔吐腹脅脹滿不能飲食人參湯治三焦咳心胸滯悶四肢不和人參一兩杏仁湯浸去皮尖雙仁麩炒麻黃去根節煮去沫焙乾桂去粗皮乾薑炮甘草炙銼紫菀去苗土五味子炒陳橘皮湯浸去白焙各三分上為散每服四錢水一盞半棗二枚擘破煎至七分去滓溫服日三半夏湯治三焦咳腹滿不欲食紫蘇子湯治三焦咳心胸不利不思飲食紫蘇子微炒陳橘皮湯浸去白焙各一兩甘草炙半兩乾薑炮桔梗銼炒杏仁湯洗去皮尖雙仁炒各三分上為散每服四錢水一盞半入棗二枚擘破煎至七分去滓溫服日三五味子丸治三焦咳腹滿不欲食順氣五味子炒覆盆子去蒂仙靈脾各一兩上為末煉蜜和丸如梧桐子大每服二十丸生薑臘茶下加至三十丸空心食前服玉液散治久咳傳三焦腹滿不思飲食及胃虛有痰半夏湯浸去滑七遍焙一兩生薑去皮切焙陳粟米揀淨各二兩上為散每服一錢水一盞煎至六分溫服三焦約附論黃帝三部針灸經言小腹腫痛不得小便邪在三焦病名曰三焦約內閉發不得大小便夫三焦者水穀之道路氣之所終始也上焦如霧中焦如漚下焦如瀆三焦乃行氣之道營衛致養則腐熟水穀分別清濁以時而下無復滯留若營衛不調風邪入客則決瀆之官約而不通所以不得大小便也刺法取足少陰太陰之經輔以湯劑則三焦疏通清濁分別矣方順氣丸治三焦約小腹腫痛不得大小便木香二兩青橘皮湯浸去白焙一兩人參二兩赤茯苓去黑皮一兩郁李仁半斤大戟用河水煮去皮焙一兩麻仁半兩與大戟郁李仁各別研細入藥內甘遂麩炒微煙生覆於地上候冷出盡火毒六兩訶黎勒皮半兩大黃銼炒二兩上除別研三味外搗羅為末卻入三味拌和再羅煉蜜和丸如豌豆大每服十丸煎車前子湯下不拘時服郁李仁丸治三焦約通導大小便郁李仁湯浸去皮研大黃銼炒各一兩赤茯苓去黑皮澤瀉銼葶藶隔紙上炒各三二兩大麻仁一兩半研檳榔二三兩銼杏仁去皮尖雙仁麩炒半兩研上搗研了和拌勻再研極細煉蜜和丸如梧桐子大每服三十丸空心用甘草湯下日三炒鹽湯下酒下亦得枳殼丸出宣明論調順三焦平勻氣脈消痰滯利胸膈祛風利大小便枳殼去瓤麩炒二兩牽牛子揀擇四兩一半生一半炒搗羅取粉一兩半余者不用檳榔半兩銼陳橘皮湯浸去白焙一兩木香一分上搗羅四味為末與牽牛粉拌勻再羅過煉蜜和丸如梧桐子大每服十五丸至二十丸食後生薑湯下欲利加丸數枳殼散治三焦約大小便不通枳殼湯浸去瓤切作片子焙乾五兩厚朴去粗皮塗生薑汁炙二兩滑石研細一兩桂二兩去粗皮上四味搗研拌和每一兩藥末更入膩粉半錢和勻每服一錢用冷米飲調下腹空時服更量老少虛實加減疏風散治三焦約大小便不通牽牛子微炒一兩大黃銼炒一兩檳榔銼半兩陳橘皮湯浸去白焙一兩上為散每服二錢生薑蜜水調下食後良久服皂莢散治三焦約大小便不通豬牙皂莢酥炙去皮子白蒺藜各等分上為末如大腸不通用鹽湯茶湯調下一錢小便不通用溫酒調下一錢淮南五柔丸出活人書治三焦不調大小便秘澀和營衛利臟腑大黃銼炒一斤前胡去蘆頭二兩赤茯苓去黑皮細辛去苗葉半夏湯洗切焙肉蓯蓉酒浸去皺皮切焙葶藶隔紙炒當歸切焙芍藥各一兩上為末煉蜜和攪再搗千杵丸如梧桐子大每服五丸食後溫水下日三稍增之
