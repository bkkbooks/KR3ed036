body:
  text: 卷四十三三焦腑門總論夫三焦有名無形主持諸氣以象三才之用故呼吸升降水穀往來皆待此以通達是以上焦在心下主內而不出中焦在胃脘主腐熟水穀下焦在臍下主分別清濁出而不納統而論之三者之用又本於中焦中焦者胃脘也天五之沖氣陰陽清濁自此而分十二經絡所自始或不得其平則有寒熱偏勝虛實不同營衛滯澀清濁不分而生諸病矣故曰氣會三焦手少陽脈通於膻中膻中臣使之官為氣之海審此則知三焦者乃沖和之本古人謂左腎為腎臟其腑膀胱右腎為命門其腑三焦三焦者有脂膜如手大正與膀胱相對有二白脈自中出夾脊而上貫於腦所以經云丈夫藏精女子系胞以理推之三焦當如上說有形可見為是扁鵲乃云三焦有位無形其意以為上中二焦如漚如露下焦如瀆不可遍見故曰有位無形而王叔和輩失其旨意遽云無狀空有名俾後輩承謬不已且實以招名無實奚招若果是無形尚何以藏精系胞為哉其所謂三焦者何也上焦在膻中內應心中焦在中脘內應脾下焦在臍下即腎間動氣分布人身有上中下之異方人湛寂欲想不興則精氣散在三焦榮華百脈及其想念一起欲火熾然翕撮三焦精氣流溢並命門輸瀉而去故號此腑為三焦耳夫三焦者一名三關也上焦名三管反射中焦名霍亂下焦名走哺合而為一有名無形主五臟六腑往還神道周身貫體可聞不可見和利精氣決通水道息氣脾胃之間不可不知也三焦名中清之腑別號玉海水道出屬膀胱合者雖合而不同上中下三焦同號為孤之腑也而營出中焦衛出上焦營者是絡脈之氣道衛者是經脈之氣道也上焦如霧起於胃上管並咽以上貫膈布胸中走腋循足太陰之分而行還注手陽明上至舌下注足陽明常與營衛俱行於陽二十五度行於陰二十五度為一周日夜五十周身周而復始大會於手太陰也主手少陽心肺之病納而不出人有熱則飲食下胃其氣未定汗則出或出於面或出於背身中皆熱不循衛氣之道而者何蓋此外傷於風內開腠理衛氣走之固不得循其道此氣剽悍滑疾見開而出故不得從其道名曰漏氣其病則肘攣痛食先吐而後下其氣不續膈間厭悶所以飲食先吐而後下也寒則精神不守泄下便痢語聲不出若實則上絕於心若虛則引氣於肺也中焦如漚起於胃中管在上焦之後此受氣者主化水穀之味泌糟粕蒸津液化其精微上注於肺脈乃化而為血奉以生身莫貴於此故獨得行於經隧名曰榮氣主足陽明陽明之別號曰豐隆在外踝上去踝八寸別走太陰絡諸經之脈上下絡太倉主腐熟五穀不吐不下實則生熱熱則閉塞不通上下隔絕虛則生寒寒則腹痛洞泄便痢霍亂主脾胃之病夫血與氣異形而同類衛氣是精榮氣是神故血與氣異形同類焉而脫血者無汗此是神氣奪汗者無血此是精氣故人有兩死而無兩生也猶精神之氣隔絕也若虛則補於胃實則瀉於脾調其中和其源萬不遺一也下焦如瀆起胃下管別迴腸注於膀胱而滲入焉故水穀常並居於胃中成糟粕而俱下於大腸主足太陽灌滲津液合膀胱主出不主入別於清濁主肝腎之病也若實則大小便不通利氣逆不續嘔吐不禁故曰走哺若虛則大小便不止津液氣絕人飲酒亦入胃谷未熟而小便獨先下者何也蓋酒者熟谷之液也其氣悍以滑故後谷入而先谷出也所以熱則瀉於肝寒則補於腎三焦病者腹脹氣滿小腹尤堅不得小便窘急溢則為水留則為脹候在足太陽之外大絡在太陽少陽之間亦見於脈取委陽小腹病腫痛不得小便邪在三焦約取太陽大絡視其結脈與厥陰小絡結而血者腫上及胃管取三里三焦脹者氣滿在皮膚殼殼然而不堅疼嘗觀周子太極圖曰無極而太極至哉斯言也天地混沌此無極也天地既判陰陽始分此太極也太極動靜而生陰陽有天地有夫婦有男女矣人身亦與天地同人生之始受氣於無動靜往來然後為有父母交合之始陽精陰血未至之時此無極也陰陽交媾陽施陰受此太極也自此天真之氣至所謂天一生水水腎也則綴而為根元漸次生長則成為二二生三三生萬物五臟百骸皆由此而成且有三焦一經此經叔和以命門配越人以手心主配千載之賢哲固不敢以孰是孰非議要之手心主則十二經之一而命門於十二經無所與焉且手心主厥陰之經屬心包而絡三焦手少陽三焦經則屬三焦而絡心包表裡互相屬絡而三焦經則未嘗絡命門如此則越人為是手心主其經則手厥陰起於胸中出屬心包下膈歷絡三焦然後循脅腋而下肘至臂自小指次指出其端手少陽三焦之經起於小指次指終耳前過客主人穴名夾頰至目銳眥而出其端此二經絡之始終也三十一難曰上焦在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦在胃中脘不上不下主腐熟水穀其治在臍傍下焦在臍下當膀胱上口主分別清濁出而不納以傳道也其治在臍下二寸故名曰三焦素問六節臟象論亦曰膽胃大腸小腸膀胱三焦者倉廩之本營之居也能化糟粕轉味而出者也五臟別論亦曰夫胃大腸小腸膀胱三焦此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之腑由是論之聖人且以三焦為有形矣至陳無擇作三因方且曰三焦有脂膜如掌大正與膀胱相對有二白脈自中出夾脊而上貫於腦及觀漁隱叢話後集引龍川略志曰有徐遁者在齊時大飢群盜相臠割肉而食其中有一人皮肉盡而骨脈全遁以學醫故往觀其五臟見右腎下有脂膜如手大正與膀胱相對有二白脈自其中出夾脊而上貫於腦意無擇蓋本於此前所謂十二經脈互相屬絡一臟則曰屬臟而絡腑一腑則曰屬腑而絡臟皆有形也不然則手厥陰經何以偏曰屬心包而絡三焦手少陽三焦經何以偏曰屬三焦而絡心包惟有形而後可以屬之絡之無形安可以屬之絡之十二經者既有始起之所又有出其端之所謂之無形亦難矣若以三焦列為倉廩之腑言之則又難於執著所以梁丘子注黃庭經尚且曰三焦自古無的說三焦自叔和謂無狀空有名之後後世紛紛議論不一而三因方及徐遁之說則在臟腑之外別是一物而不與臟腑相聯屬且與經中所謂納而不出出而不納之說異矣至於周賢與權注難經曰三焦有名而形隱前賢又曰二經為虛臟虛腑諸如此說使人則念越人豈妄稱納而不出出而不納之論以垂後世耶惟其有物可以容納出入而後為經之旨或者難曰如子之言則二十五難曰心主與三焦為表裡俱有名而無形謂何愚曰彼子之言固如此而周氏所注曰膻中為三焦之所會原氣封藏於其下胃氣營周於其中聯屬貫通為水穀之道路氣之所始終所謂無形於義未安所以修之曰俱有名而形隱亦斯意也但尚欠發明耳偶因閱蔡西山脈經其間有論三焦一篇後引禮運記曰上焦若竅中焦若編下焦若瀆然終不曾指何為竅何為瀆何為編愚得竅編瀆三字之後三複細思似有可推許者且上焦若竅竅者竅漏之義可以通達食物莫是胃之管也所以經曰上焦在胃之上口主納而不出此豈非胃之管乎中焦若編編者編絡之義如有物編包之象此乃胃之外有脂如網包羅在胃之上以其能磨化飲食叔和脈訣曰膏凝散半斤者此是也正是脾之大絡故經曰主腐熟水穀是也下焦若瀆瀆者溝瀆之義可以決瀆可以傳導乃是小腸之下曰闌門泌別水穀此為分別清濁之所故經曰在膀胱之上口主瀉而不藏又曰主出而不納又曰下焦為傳化之腑此豈非出而不納傳道之府乎又曰三焦者水穀之道路氣之所終始也蓋水穀之所入者自上而中自中而下至於糟粕轉輸傳導而下一無底滯如此尤可表其為形明矣愚謂形者非謂臟腑外別生一物不過指其所而為形耳愚今為發明納而不出出而不納之奧旨表而出之於千百年之後又如手心主經謂之心包絡人之心為君主之官不受邪氣凌犯其所以致病者心包絡也故經曰真心不受邪者此也愚未免臆度一說曰心包絡亦必有所指今觀諸獸之心上有黃脂縵包在其上似脂非脂似肉非肉外則有細筋膜如絲與心肺相連者此則心包絡也諸獸之內景大概亦與人同觀其心形亦可見矣三焦熱用藥大例上焦中焦下焦上焦中焦下焦三焦實熱附論上焦在心下其氣起於胃上口並咽貫膈有熱則喉舌乾燥口氣穢濁面赤胸膈否滿之病生焉中焦者在胃中脘不上不下主腐熟水穀其氣和平能傳糟粕蒸津液變精微上注於肺通行營衛仲景曰熱在中焦則為堅故其氣實則閉塞不通上下隔絕熱則身重目黃口甘脾癉之證生焉下焦者在臍下當膀胱上口主分別清濁出而不納以傳導也又下焦如瀆司決壅也其氣實而有熱則津液內燥傳導不利由是有氣逆便難胃脹嘔噦之證方潤焦湯出三因方治三焦實熱目銳眥急痛腰脅熱脊背連膻中煩悶飲食未定頭面汗出關格不通不吐不下或氣逆不續走哺不禁或泄瀉溺澀遺瀝地骨皮半夏湯洗七次柴胡去土苗澤瀉各五兩茯苓麥門冬去心甘草炙人參各一兩上銼散每服四錢水二盞姜五片竹茹一撮如指大煎七分去滓空心服犀角丸治三焦邪熱一切風氣又治風盛痰實頭目昏重肢體拘急腸胃燥澀大小便難犀角黃連各一兩人參黑牽牛各二兩大黃八兩上為末蜜丸如梧桐子大每服十五丸臨臥溫水送下量虛實加減用三黃丸出三因方治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不美飲食下焦有熱小便赤澀大便閉結五臟俱熱即生瘍癤瘡痍及治五般痔疾糞門腫疼或下鮮血勝冰丹出和劑方治三焦壅盛上衝頭目赤熱疼痛口舌生瘡咽喉不利咽物有礙神思昏悶並皆治之白藥子一兩半山豆根紅內消黃藥子甘草炙黃連各三二兩麝香另研龍腦另研各二錢分上為末用建盞盛於飯上蒸候冷入腦麝令勻煉蜜丸如雞頭米大每一丸含化及用津吐於指甲上磨少許點赤眼立效三黃湯出直指方治積熱蘊隆三焦皆熱大小便閉黃連去須黃芩大黃等分濕紙煨上銼細每服三錢姜三片慢火略煎食後服清氣散出本事方調營衛順三焦治風壅消痰涎退煩熱前胡柴胡去蘆川芎枳殼白朮青皮羌活獨活甘草炙茯苓去皮人參各等分上為末每服二錢水一盞荊芥一穗煎七分食後服此方敗毒散中去桔梗加白朮青皮增損亦有理用之良牛黃散出濟生拔萃治上焦熱臟腑秘結大黃一兩白牽牛頭末五錢上為細末有厥冷用酒下三錢無厥冷而手足煩者蜜湯下大三黃丸出危氏方治上焦壅熱咽喉腫閉心膈煩躁小便赤澀口舌生瘡目赤睛疼燥渴心煩齒痛大黃黃連皮山豆根黃芩各四錢滑石二錢黃柏四錢硼砂三二錢腦子麝香甘草各一錢百草霜四錢上為末新汲井花水丸如小指頭大每服一丸口噙化旋旋嚥下治上焦虛熱口乾頭頂煩熱出聖惠方龍膽三錢去蘆頭茅根一兩半銼麥門冬去心玄參梔子仁木通銼赤芍藥各一兩上為散每服四錢水一中盞煎至五分去滓入生地黃汁生藕汁各半合和勻服之治上焦虛熱咽乾口苦不欲飲食出聖惠方赤茯苓麥門冬去心甘草炙微赤銼各一兩生地黃二兩上四味搗三味為散入地黃合搗曝乾搗細羅為散不拘時候以溫水調下一錢日三服菊花散出聖惠方治上焦壅滯頭面風熱甘菊花半兩人參半兩去蘆頭赤茯苓半兩麥門冬半兩去心犀角屑半兩甘草炙半兩炙微赤銼防風半兩去蘆頭羌活半兩地骨皮半兩羚羊角屑半兩蔓荊子半兩川升麻半兩上為散每服四錢以水一中盞入生薑半分煎至六分去