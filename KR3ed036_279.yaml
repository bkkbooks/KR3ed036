body:
  text: 卷二百七十九諸瘡腫門毒腫附論毒腫之病風毒結腫於皮膚肌肉之中亦有根於虛軟處邪氣不出入人腹中乃至不救古方謂與風腫不殊蓋以同受於風特輕重之異耳今人壯熱憎寒此風腫之證不止為虛浮而已時疫胳瘩腫毒病者古方書所論不見其說古人無此病故無此說惟正隆楊公集極濟方內言自天眷皇統間生於嶺北次於太原後於燕薊山野頗罹此患至今不絕互相傳染多至死亡至有不保其家者狀似雷頭腫連咽頸攻內則喉嚨堵塞水藥難通攻外則頭面如牛眼耳穴盈視聽俱非杜絕聞見病惡命危汗之益深疏利頗瘥初見憎寒稍欲飲水脈沉不可溫辛發汗急以大黃芒硝之類苦泄寒涼之劑加倍並服得快利方為可救毒氣稍退漸減涼藥理之咽堵食藥不下先灌生油半盞自然能通後於本方選而用之方消毒湯出外科精要治一切毒腫獨活防風細辛藁本川芎枸杞子荊芥漏蘆大黃黃芩去腐官桂苦參威靈仙丹參黃耆當歸芍藥茯苓黃連無心草黃柏麻黃葛根蒴藋菊花杜仲地骨皮秦皮繭草甘草甘松藿香白芷露蜂房升麻零陵香各一兩蒼朮三兩菖蒲半斤朴硝五兩上為粗末每用藥半兩水二升蔥三莖槐柳枝各一握同煎十餘沸去滓熱淋洗浴此藥用之如神百雜瘡腫悉能內消犀角丸出聖濟總錄治一切毒腫服之腫化為水犀角鎊二兩升麻去黑心黃芩去黑心防風去尖人參銼當歸銼焙黃耆銼乾薑炮蓼藍焙黃連去須甘草炙梔子仁各四兩大黃銼三分巴豆三十枚去皮心膜炒黃上研巴豆令極細末入余藥併為細末與巴豆和勻煉蜜和丸如梧桐子大每服五丸米飲下加至十丸以利為度得利以溫漿水粥助之常服即減丸數腫消即止玉龍膏出聖濟總錄治一切毒腫疼痛摩風止痛栝蔞大者一枚去瓤細研爛為度零陵香芍藥藿香葉甘草炙黃耆杏仁湯浸去皮尖雙仁各一兩香白芷半兩清油十兩黃蠟一兩半麝香一分研當歸一兩生薑一兩切烏蛇酒浸取焙半兩上除黃蠟麝香外細銼如麻豆大以酒浸於銀石器內慢火養一日次日添火熬令黃色用綿濾去滓後入黃蠟攪勻看硬軟欲凝方可下麝香傾在瓷瓦罐內候冷貼腫處五香連翹湯出聖濟總錄治毒熱腫初結膿血未潰攻發疼痛連翹射干升麻獨活去蘆頭桑寄生木通沉香木香薰陸香研一方乳香麝香研各二兩丁香二兩大黃炒三兩上㕮咀十味如麻豆大再入研藥和勻每服五錢水一盞半煎至一盞入竹瀝三分再煎一沸去渣溫服以利為度一方有甘草一兩大五香湯出聖濟總錄治毒氣攻肌肉腫痛寒熱心中煩悶木香雞舌香沉香銼藿香葉犀角銼薰陸香各一兩甘草炙升麻細辛去苗葉麻黃去根節桂去粗皮吳茱萸湯浸去涎炒各半兩上粗搗篩每服四錢用水一盞半煎至一盞去滓溫服不拘時候漏蘆散出聖惠方治毒腫疼痛心神煩熱大腸秘澀漏蘆白蘞黃芩麻黃去根節知母枳實炙炒微黃升麻犀角梢赤芍藥各一兩甘草炙微赤銼川芒硝川大黃二兩銼碎微炒上為散每服三錢水一中盞煎至五分去渣不拘時候溫服崔氏五香湯出聖惠方療毒腫麝香研青木香雞舌香藿香薰陸香當歸黃芩升麻芒硝各三分大黃五分上切以水六升煮取二升去渣入芒硝令烊分為二服相去六七里久亦療諸猝中毒惡氣也治諸毒腫膏方亦治熱瘡出肘後方升麻白蘞漏蘆去蘆頭連翹芒硝各二兩黃芩去黑心蛇銜草各三兩蒴藋根四兩山梔子仁二十枚上搗碎酒浸半月以豬膏二升煎之候氣歇膏成濾去渣磁瓦器盛塗貼腫處外臺秘要有枳實大黃散出聖惠方治毒腫恐惡氣入腹服此疏利毒氣川大黃二兩生用木香一兩丁香半兩獨活一兩桑寄生射干各一兩甘草半兩生用麝香一分細研上為散入麝香研令勻每服五錢水一大盞煎至五分去渣食前溫服犀角湯出聖惠方薰陸香青木香雞舌香藿香犀角鎊各二分沉香二分升麻七分上切以水六升煮取二升半去滓分三服其間消息以意量之毒腫不治殺人也麻子小豆湯出千金方治毒腫無定處或赤色惡寒或心腹刺痛煩悶者此是毒氣深重所致也麻子赤小豆各半升生商陸二升附子二兩射干三兩升麻四兩上㕮咀以水四升先煮四味取二升半去滓次研麻子碎和汁煮一沸濾去滓取汁爛煮豆其汁每服五合日二夜一當利小便為度腫退則瘥並食豆消腫木香散出御藥院方治濕毒腫皮肉色不變木香當歸射干莽草大黃黃柏另為末各等分上為細末每用藥一大匙入白麵一匙頭淡醋調稀慢火上熬令稠攤在紙花子上貼患處勿令大干則換新藥一日四五次消毒散治諸瘡毒腫大力子黃芩連翹大黃升麻玄參各等分上水煎三五錢去滓無時服沉香散出聖惠方治毒腫入腹心悶腹脹不欲飲食沉香木香丁香薰陸香各一兩麝香一分細研川大黃三兩銼碎微炒上為散每服四錢水一中盞煎至六分去渣不計時候溫服大黃丸出聖濟總錄治風毒熱結日夜疼痛心煩懊悶大黃切作小塊灑散微炒三兩甘草炙三兩杏仁去皮尖並雙仁研如膏四兩訶梨勒破取皮三兩芒硝研五兩上先將三味搗羅為末後入芒硝末杏仁膏同和入煉蜜為丸如梧桐子大每服十五丸溫酒下初服未利加二十丸臟腑實則三十丸量虛實服之以效為度莽草散出聖濟總錄治惡毒風腫不消結成堅核莽草銼附子去皮臍生銼木香白蘞桂生去粗皮各一兩上為細末別以榆根銼搗絞取汁調藥於故帛上貼干則易之開一小竅子出毒射干散出聖惠方治腫毒無定處或振慄惡寒或心腹刺痛射干附子炮焙去皮臍各三兩商陸根薄切二兩赤小豆炒三合麻子一升半上㕮咀以水五升先煮麻子取三升去滓研麻子令破以麻子汁煮藥以豆熟為度去滓取二升分溫空腹四服日夜令盡小便利即毒腫消外臺秘要有升麻葛根牛蒡子湯出外科精要治時毒大頭病是也葛根貫眾甘草鹽豉牛蒡子各一兩上細末每服三錢用水調下此病近代患者傳染多致夭枉治之者不得其法只云大熱使然殊不知亦有虛實表裡治之者詳其汗下吐之不同大抵與傷寒頗類其中亦有可針鐮砭射出血者亦有久而敗爛出膿者其間變易百端不可不慎也繁柳散出聖濟總錄治腫毒繁柳焙乾燒灰二兩白蘞一兩赤小豆一合大黃銼一兩上為細散以新水調和如糊塗貼腫上干即易以瘥為度大黃敷方出聖惠方治初覺腫痛令消大黃銼炒一兩木通銼葶藶紙上炒莽草各一兩上為末以水和之敷干即易一方無莽草洗毒湯出外科精要苦參防風甘草炙露蜂房上各等分㕮咀水煮濃洗瘡腫蕓薹子散出聖惠方治毒腫不消時有疼痛蕓薹子三兩桑葉一兩龍葵一兩牛蒡子半兩上為末用漿水調塗腫處干即易之檀香飲出聖濟總錄解惡毒風腫白檀香沉香一塊重二兩檳榔一枚上各於沙盆中以水三盞磨取盡濾去渣銀石銚內煎沸候溫分作三服追風消毒散附子去尖皮臍銼石硫黃研天南星生各半兩上為細末醋調塗向腫處干即易之消毒散消胳瘩腫毒大黃牙硝青黛各等分上為細末水調鵝翎掃立消消毒丸出濟生拔粹治時毒胳瘩惡證大黃牡蠣燒白殭蠶炒各一兩上為細末煉蜜為丸彈子大新水化下一丸無時內加桔梗黍黏子湯尤妙內消膏出聖惠方治熱毒腫肥皂莢二梃以好酒一盅浸挼取汁青鹽硝石各一分上相和熬成膏塗於腫上日二易之大黃散出聖惠方治毒腫惡瘡治毒腫不問軟硬方蜀葵根茄子根冬瓜根各五兩上並燒候煙絕即出勿令作灰細研以生麻油調塗於故帛上貼之如膿未出當便內消膿已出即便撮合內消毒散出聖惠方白蘞白芷白芨各二兩上為細散研生薑汁調塗干即更塗鹿角散出聖惠方治毒腫痛不可忍鹿角一兩磨刀粗石爛者二兩白蘞一兩上為末以醋塗於腫上干即更塗蔥熨方出聖濟總錄治惡毒風腫白虎風痛釅醋五斤蔥白切三升上相合煮沸漉去蔥用絹布帛熱裹當腫上熨之冷即便煮依前熨以瘥為度保救膏出聖濟總錄治諸腫毒及熱毒氣腫楸葉五升馬莧菜連根三斤洗淨切焙上用水五斗慢火煮時時柳木棍攪至一斗許住火放冷濾去渣將汁再熬令濃以新瓷罐子盛用時以雞翎掃藥如瘡腫痛以軟帛貼之一方用自然汁治熱毒腫方出聖惠方蔓荊根蕓薹苗葉各三兩上為散以雞子清和貼熁干即換治項側少陽經中胳瘩不辨肉色不問大小及日月深淺或赤硬腫痛出濟生拔粹生山藥一梃去皮蓖麻子一個上搗爛攤在帛上貼之如神蘹香草飲出千金方解惡毒風腫或著人陰或著一邊疼痛攣急牽引小腹悶亂難忍以生蘹香草不拘多少搗絞取汁每服一合用酒三合同煎令沸空心晚食前溫服一方無酒渣敷腫上冬月缺生者根亦可此是外國神方用之起死回生神效治一切毒腫不問軟硬出聖惠方以胡蔥熟搗和生油調塗之即瘥灶土塗方出聖濟總錄治毒腫取釜底黃土以醋研和塗腫上日三五度治一切毒腫以鹽搗生大豆塗之治毒腫以生搗秫米和以雞子白敷之良又方以粳米久陳者蒸作飯和醋封毒腫立瘥又北人炊之甕中水浸酸食之緩五臟六腑氣治背上忽腫漸如碟子不識名者用水中圓石一兩拘燒令極熱瀉入清水中沸定後洗腫處立瘥治腫大如斗取雞翅毛一孔生兩毛佳右腫取左翅左取右翅雙腫取兩邊翅並燒灰研飲服之治氣腫毒起急痛出肘後方用蕪菁根大者削去上皮熟搗苦酒和如泥煮三沸急攪之出敷腫上帛裹之日再三易用子亦良治毒腫出肘後方用決明子末水調塗之治腳腫向上至腹即殺人者出千金方用赤小豆以水三升煮令爛出豆以汁浸腳至膝每日一度瘥止若已竟入腹不須浸但煮豆食之忌鹽菜米麵等如渴飲汁瘥乃止治一切毒腫疼痛不可忍者出千金方用丹麻子熟搗敷之即瘥李兵部手集方出外科精要療毒瘡腫號叫臥不得人不識者以獨頭大蒜二顆細搗以麻油和研敷瘡上干即易之瘥治毒腫出肘後方以雞腸草敷之治毒攻手足腫痛欲絕者出肘後方以豬蹄一具和蔥煮去渣內鹽少許以敷之治毒腫痛取松枝燒研為細末塗以帛裹其上良治毒腫入腹疼痛或牽小腹及腰胯痛方出聖惠方用桃仁二合湯浸去皮尖雙仁研如膏每服以暖酒調下小彈子大日三四服治熱毒腫不消疼痛出聖惠方桑花五兩為末生蜜調塗敷腫上又方出聖惠方用葵菜根和鹽搗敷之又方出聖惠方用益母草二握去兩頭以酒三升煎取一升去滓頻服又方出聖惠方用雞子清封腫上熱即易之又方出聖惠方用地松搗汁每服一小盞日四五服又方出聖惠方用狗舌草一斤去兩頭以水五升於銅器中煮汁二升去滓搜面作羹粥食之治毒腫醋磨大黃塗患處即消此方得林庇民云嘗試易效治毒腫出本草以蕕草葉搗敷治毒腫出本草用石蒜搗敷貼治毒腫出本草以生瓜菜搗貼療毒腫不問硬軟出本草取楸葉十重敷腫上即以舊帛裹之日三易當重重有毒氣為水流在葉中如冬月取干葉鹽浸良久用之或取根皮銼爛搗敷之皆效主毒腫結熱出本草以油腳用苦酒摩塗腫處效治腫毒出本草用地蜈蚣水摩塗治腫毒出本草用芙蓉葉搗敷貼治毒腫出聖惠方以甕近下鑽一孔盛水注於腫上丹毒附論夫諸痛癢瘡皆屬心心虛寒則癢心實熱則痛丹毒之病由心實熱也生血主於脈血熱則肌浮陰滯於陽即發丹毒方論有云以其色赤如丹砂塗故得丹名然亦有水丹白丹五色油丹豈專以赤為名也又有赤流天火殃火尿灶廢灶野火等方以為小兒出入遊行觸犯所致此因容或有之若小兒在襁褓中未能出入亦患此者是豈因犯即病乎大率皆血氣之所為也凡火丹者肉中忽赤如丹塗之色痛癢不定甚至遍身白丹者肉中腫起癢而腹痛微虛腫如吹狀雞冠丹者亦名茱萸丹肉上粟粟如雞冠肌理水丹者遍身熱起遇水搏之結丹晃晃黃赤色如水在皮中五色油丹亦名油腫赤流丹腫熱赤色流入四肢以上皆不問大小如天火灶火殃火尿灶火朱田野火等丹多著少小但自腹內生出四肢者則易愈自四肢生入腹者則難治治丹毒方千金外臺甚多無出於用冷物治之凡冷物無過藻菜如有患丹毒熱腫等證取渠中藻菜細切熟搗敷丹上厚三分干則易之最良熱毒之氣暴發於皮膚間不得外出則血為丹毒熱氣剽悍其發無常處大則如掌甚則周流四體不急治或至壞爛出腫血發熱於骨肉之間則肢斷如截毒氣入腹則能殺人治法用針鐮砭割明不可緩治也少陽客氣勝丹疹外發又曰諸痛癢瘡瘍皆屬於心火主太關又謂百端之起皆自心生豈可便用辛溫發散致熱勢增劇漸成臟毒下血咬牙發搐大熱明矣夫時毒者四時邪毒之氣感之於人也其後發於鼻面耳項咽喉赤腫無頭或結核有瘡令人憎寒發熱頭痛肢體痛甚恍惚不寧咽喉閉塞人不識者將謂傷寒便服解藥一二日腫起增益方悟始召瘡醫原夫此疾並無方論世俗通為丹瘤病家惡言時毒切恐傳染考之於經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為謂之丹瘤與夫時毒特不同耳蓋時毒者感四時不正之氣初發狀如傷寒五七日之間乃能殺人治之宜精辨之先切其脈滑數浮洪沉緊弦澀皆其候也蓋浮數者邪氣在表也沉澀者邪氣深入也感四時毒氣壯實之人急服化毒丹以攻之熱實以五利大黃湯下之其有表證者解毒升麻湯以發之或氣軟者五香連翹湯主之久於鼻內㗜通氣散取十餘嚏作效若㗜藥不嚏不可治之如嚏出膿血者治之必愈如左右看病之人日日用㗜藥嚏之必不傳染切須記之其病人每日用此藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之服犀角散連翹散之類至七八日大小便通利頭面腫起高赤者可服托裡散黃耆散宜針鐮砭割出血泄其毒氣十日外不治自愈也此病若五日以前精神昏亂咽喉閉塞語聲不出頭面不腫者即死之候然而此疾有陰有陽有可汗有不可下嘗見粗工但云熱毒則用寒藥殊不知病有微甚治有逆從不可不審矣方烏蛇膏出和劑方治風邪毒氣外客皮膚熏發成腫所起不定遊走往來時發癢痛或風毒熱盛攻注成瘡焮赤多膿瘡邊緊急但是風腫並皆治之吳茱萸藁本獨活白殭蠶去絲嘴炒細辛漢椒出目炒半夏防風赤芍藥當歸桂心川芎香白芷各半兩烏蛇黃蠟各二兩乾蠍附子去皮尖各一兩上細銼以煉臘月豬脂二斤文火煎候白芷赤黑色為度帛濾去滓下蠟入瓷器內盛每用取少許摩之令熱日三升麻膏出聖惠方治丹疹煩熱疼痛不止升麻白薇肘後作白蘞漏蘆蒴藋四兩連翹梔子四個炒黃芩各一兩蛇銜枳實各三兩上搗碎以水三升浸半日以豬膏五升煎令水氣盡去渣膏成敷上諸丹皆用之及熱瘡腫上日三經心錄無枳實以治諸腫毒硼砂丸出聖濟總錄治丹毒遊走及魚臍瘡硼砂研鳩雀屎桂去粗皮獺膽去膜砒黃丹砂研細各一分麝香研一錢白蠟一兩半天南星三分山慈菇半兩上除蠟外搗研為細末先將蠟於瓷器內慢火上溶下藥調為丸如梧桐子大先用針撥破瘡口入一丸醋調面塗故帛貼兩宿痛止即揭去收藥丸可再用漏蘆湯出聖濟總錄治丹毒遊走拓洗後服漏蘆去蘆頭白蘞黃芩去黑心麻黃去根節湯煮掠去沫升麻白薇芍藥大黃銼甘草炙各一兩上粗搗篩每服五錢用水一盞半煎至八分去渣食後溫服至晚再服以瘥為度吳藍湯出聖濟總錄拓洗丹毒吳藍一兩生地黃升麻石膏黃芩去黑心犀角鎊白蘞梔子仁大黃各半兩上細銼每用半兩以竹瀝一盞水七盞同煎至四盞去滓以故帛浸拓患處日五七次黃芩湯出聖濟總錄拓洗丹毒癰疽始發焮熱浸淫長大黃芩去黑心升麻各一兩半黃連去須芎藭各一兩甘草炙銼當歸去蘆焙羚羊角鎊各半兩上細銼每用一兩以水五盞煎至三盞去滓下芒硝半兩攪勻以故帛三兩重浸藥汁溫拓患處數十遍早晚用以瘥為度金花散出三因方治一切丹毒鬱金黃芩甘草山梔大黃黃連糯米上各一兩生為末蜜和冷水調以鵝毛上患處升麻湯一名漏蘆湯出千金方治毒方及丹疹毒氣不消時發疼痛升麻一兩漏蘆芒硝各二兩黃芩三兩蒴藋五兩梔子二十枚上㕮咀以水一斗浸良久煮取七升冷以故帛染汁拓諸丹毒上常令濕拓後須服飲子並漏蘆湯方並見前癰腫條中服之立瘥小品用治丹疹諸毒腫聖濟方內不用蒴藋一方無黃芩胡粉塗敷方出聖濟總錄治風丹胡粉赤小豆糯米黃連去須各一兩水銀半兩山茱萸一兩上除水銀外搗羅為散生油調如糊後取水銀於掌中以津唾研如泥入藥內研勻先以熱湯洗丹上拭乾用藥塗敷日三兩遍牛黃散治腫丹毒鬱金甘草桔梗天花粉蛤粉等分上為末每服一錢薄荷湯入蜜水調服四順清涼飲子治一切丹毒積熱熱壅熱滯咽喉腫痛當歸甘草芍藥大黃上等分㕮咀每服一錢水一盞半煎至七分去渣食後溫服金花散出聖惠方治一切丹毒熱焮疼痛鬱金一兩黃連一兩黃芩一兩糯米二合上為細散每用蜜水調令稀稠得所用雞翎掃丹上干即便塗又方出聖濟總錄治赤黑丹豉一兩香薷蓼葉各半兩上為末和入酒少許細研成膏塗患處干即易又方出聖濟總錄治丹毒遍身赤腫茺蔚草蛇銜草慎火草各一兩上銼搗令熱調敷患處數遍治丹毒新附淋草半斤蛇蛻皮一條露蜂房一兩上以水一斗煮取四升以帛拓洗之隨手消神效治一切丹毒惡氣攻刺身體赤腫疼痛不可忍方出聖惠方車前子益母草地膽草上爛研塗之干即更塗又方出聖惠方治火丹赤小豆一升羊角一對上同燒存性為末和蜜塗之一方以雞子白和塗之如無羊角單用小豆亦良白玉石散治赤遊丹毒腫白玉寒水石各一兩上為末米醋調敷患處或腫至外腎有破肌用水調掃又方出千金方治一切丹疹毒以水苔搗爛敷之又方出聖惠方以生地黃搗汁塗之熱即易小豆亦佳又方出千金方以生水菘菜搗爛敷之又方出千金方以五葉藤搗為末水調敷之又方出聖惠方以五葉草搗爛塗之又方出聖惠方以浮萍草搗爛塗之又方出百一選方用大黃為末水和敷之又方出百一選方治火丹毒以梔子仁為末水和塗之又方名拔毒膏出千金方治丹毒凡天下極冷無過藻菜但有患熱腫毒並丹等取渠中藻菜細切熟搗敷之厚三分干即易之治諸丹神驗方出千金方以蕓薹菜熟搗厚封之隨手即消如餘熱氣未愈但以三日內封使醒醒好瘥止也然縱干亦封之勿歇以絕本昔有人飲多至夜睡中覺四體骨肉疼痛比至曉頭疼目眩額左角上如彈丸大腫痛不得近手至午時至於右角至夜諸處皆到其眼遂閉合不得開幾至殞斃以種種藥治不瘥經七日余自處此方其驗如神故留之以傳來世云耳治五色油丹方出千金方俗名油腫若犯者多致死不可輕之用縛母諸枕頭臥甚良治赤流腫丹毒一方云治五色油丹俗名油腫犯者多致死不可輕之出聖惠方取榆根白皮為末雞子白和敷之千金翼云雞子白和蒲席灰敷又方出千金方搗大麻子水和敷之又方出聖濟總錄治丹毒流移不定以煎羊脂摩之得青羊脂最良集驗方云治人面目身體猝赤黑丹起如疥狀不治日劇遍身即殺人或用生豬肉切片貼之牛肉亦可香欒皮方出三因方治諸腫丹毒發於四肢腹背頭面或赤或白或癢或痛或寒或熱者以欒皮一兩水一大碗同煎取半碗以翎毛刷患處神效伏龍肝散出三因方治少小諸腫丹毒用伏龍肝不拘多少為末以雞子白和敷之日三次赤小豆塗敷方出十便良方治丹毒如手掌大身體發赤痛微癢或生瘡取赤小豆搗羅為末以雞子白調如糊塗丹上干即易先用枸杞根煎湯洗後敷藥瘡如痛用水潤之又方出聖濟總錄治赤黑丹兼治惡瘡亦治小兒白丹以豬屎燒灰細研為散以雞子白旋調如糊塗丹上日三五次治丹毒遍身赤腫出聖濟總錄用蘿藦一味搗絞取汁調丹上日三五次又方出聖濟總錄以惡實根五兩取時勿令見風及雞犬銼搗令熟水調敷患處干即愈外臺秘要兼絞汁飲之佳治諸丹毒方出聖濟總錄取蕓薹汁入大黃末芒硝生鐵衣相和塗之佳雞蘇塗方出聖濟總錄治火丹熱毒之氣五色無定宜先塗敷然後用藥搗生雞蘇厚塗又方出肘後方治火丹亦療白丹研豉和屋塵等分以苦酒調敷之又方出聖濟總錄取連錢草以鹽挼敷之纏蛇丹方雄黃為末水調塗兼用酒調服治丹毒五色無常者一名鹿角散出肘後方燒鹿角為末和豬脂敷之一云治面目赤黑丹如疥不急治遍身即死治中繁丹走皮中浸淫一名火丹及諸瘡疼痛出聖惠方取蠐螬搗敷之糞中者尤佳一方用研以雞子清調塗之干即再塗治丹毒惡瘡五色無常者出肘後方煮慄皮有刺者洗之佳又方出聖惠方治發足及一切丹毒惡氣五色無常痛不可忍若壞及膚則出膿血或發骨節解即斷入四肢此蓋疽之類也搗蒜厚敷干即易大小蒜皆可治丹毒發作恐其入腹一時無藥秘方急以針於紅點處刺出惡血使毒氣於此而散纏蛇丹方用紫背草老鴉草擂搗爛塗之愈治天火瘡用柏子燒灰敷之愈治螢火丹從頭起出千金方以醋調塗之消治火丹方出聖惠方用黃芩為末水調塗上治丹者惡毒之氣結成五色無定出肘後方以蜜和乾薑末塗之驗又方治丹毒煮慄取濃汁以洗之妙又方出肘後方治火丹取曲蟮糞水和如泥塗之療面目身體猝得赤斑或黑斑如瘡狀或癢搔了腫起不即療之甚殺人方出十便良方用羚羊角或羖羊角屑三兩水一大盞濃煎磨之數百遍若無羊角用羊脂及豬及候冷磨有毒氣者皆可用磨務令分散毒氣或水磨羚羊角塗之一方燒灰三兩細研以雞子白調敷又方以豬槽下土泥塗之又以豬肉灼熨之即瘥療白丹方出聖惠方病原白丹者初發癢痛微煩腫如吹起不痛不赤而白色由挾風冷故然色白也以豉為末和酒塗之搗香薷葉苦蓼敷之一方單用豉為末水調塗之又方以酸模草五葉草煮汁飲之又以滓合丹以薺心塗亦佳治白丹水丹著人足趺及腨脛間者作黃色如火丹狀經久變紫色不療皆成骨瘡也無毒非殺人疾若成骨瘡即難瘥也經言風邪客於肌中肌虛真氣發散又被寒氣外搏皮膚發腠理開毫毛淫氣妄行則為癢也所以有風疹之疾皆由於此有赤疹者忽起於蚊蚤吮煩癢劇者重沓壟起搔之隨手起有白胗者亦有此療之皆如療丹法也療之方搗白瓷器屑以豬脂和塗之療丹毒或發背及諸腫遍身赤者搗鯽魚敷數易之良或但以生魚皮鮮燒搗末以雞子白和塗之治風丹以苕帚子慎火草葉土朱三件中遇便者擂碎冷水澄濾服之效又方蜜調土朱入酒少許服並搽疹上治一切丹毒出傳信適用方用芭蕉根搗自然汁塗及灶中黃土以水調塗又方用黃柏朴硝為末水調塗之治火焰丹纏腰丹用生鐵為末豬膽汁為膏調即可治白丹出聖惠方燒雞屎雞子白和塗之或以雞糞汁拭之治天母丹用陳壁泥炒出火毒以雞子清調塗又用絲瓜水雞毛蘸刷之或用文腦稂草搗汁刷之又方出肘後方治天母丹以苧根三斤小豆四升水二斗煮以浴之一方無小豆每日仍塗之又方出肘後方以生魚血塗之若走行皮中浸廣者名火丹至復殺人或用魚膽和鹽敷之干即易又方出聖惠方治一切丹毒流腫用鼠黏草根勿使見風洗去土搗爛貼之絞取汁飲之亦良治一切丹毒遍身方出聖惠方以蕓薹子一兩酒一大盞和研去滓煎至七沸不時候溫服一合莽草膏出聖惠方療身體赤癮疹而癢搔之隨手腫莽草二分當歸芎藭躑躅花大戟細辛芍藥芫花附子炮椒各四分豬脂二斤半上切以豬膏和煎之候附子色黃膏成濾去滓收貯以敷病日三以瘥為度一方無椒延年療赤白二疹丸白朮一斤蔓荊子四分防風四分附子三分炮桂心二分上搗篩蜜和為丸如梧桐子大酒服十丸日二服稍加至十五丸若能作散服一錢禁食桃李雀肉青魚鮓豬肉冷水生蔥此療風疹正方凡風皆由舊來有風氣所以方中不得用桂心附子白朮既用一斤附子只有三分復有防風其防風即能斷附子毒所以一物毒亦無所至伏聽進止療丹癮疹出肘後方病原丹疹者肉色不變又不熱但起癮疹相連而微癢故謂之丹疹以酪和鹽煮熱以摩之手下消也又方出聖惠方以白芷根葉煮汁洗之效又方出聖惠方以慎火葉爛搗封之神良一方作護火草治凡赤疹熱時發冷即止白疹天陰冷即發方出聖惠方以酒煮石南拭之極效又方出百一選方以酒煮蒴藋拭之良一方用葉搗塗之又方出聖惠方以白朮末酒服方寸匕三日盡五斤忌桃李蒜青魚鮓雀肉又方忌丹疹及燥瘑淋石灰汁漬之及洗之一方以石灰和醋調塗又方出聖惠方取芥子末以酢漿水服方寸匕日三服瘥又方出聖惠方療身體赤癮疹而癢搔之隨手腫以礬石二兩酒三斤漬令煬拭上立瘥或但以水煮白礬汁又其赤疹心家稍虛熱氣相搏其色赤宜作芒硝湯拭之出千金方以芒硝三兩用湯一升納芒硝令消散以帛沾取拭疹即漸除湯盡更合以前二件赤白疹方一方治丹毒以芒硝細研為末水調塗之夫赤疹由冷濕搏於肌中甚即為熱成赤疹也得天熱則劇取冷則減此方療之及治一切丹毒出聖惠方取生蛇銜草搗極爛以塗之最驗白疹者由風氣搏於肌中之熱熱與風相搏遂為白疹也得天陰雨則劇出風中亦劇得晴暖則減著衣身暖亦瘥此方療之出聖惠方以水煮枳實拭之佳又搗末熬青布裹熨之又用雞腸草生搗爛如泥封上用五六次效亦可生食煮作菜食之益人去脂膏毒氣治丹毒出百一選方用豆葉搗塗之治五色遊毒出千金方用牛糞塗之干即易治丹毒出肘後方搗松葉塗之愈十二件單方出十便良方療丹毒或得一物瘥方水苔生地黃生松葉蒴藋葉慎火草浮萍草豆豉水和大黃水和梔子水和黃芩水和硝豆葉上十二味但得一物搗以貼之即瘥赤小豆末和雞子塗之無雞子水和用之治纏腰丹毒出家藏經驗方先用麻油搽次用糯米同韭擂成膏塗治積年久疹有時發動用乾地黃十分甘草五分乾漆五分水五分桂一尺搗篩酒服一匕日三服療熒火丹從頭起出本草方以慎火草搗和苦酒塗之療灶丹從兩腳赤如火燒出本草用五加葉根燒灰五兩取煅鐵家火槽中水塗之治丹毒煩熱出本草用綠豆生研絞汁服治火丹瘡出本草用龍葵和土搗敷之良療野火丹從背上兩脅起出本草用白殭蠶二七枚和慎火草搗塗之治大人小兒風疹出本草以吳茱萸一升酒五升煮取一升帛染拭之治熱丹赤腫出本草用栝蔞為末二兩釅醋調塗之治熱丹毒癰腫出本草以陳白芨磨敷瘡上治熱腫丹毒出本草以積雪草搗敷之療煙火丹發從背起或兩脅及足赤如火出本草以景天草真珠末一兩搗和如泥塗之治丹毒瘤出本草以蜈蚣一條幹者白礬皂子大雷丸一個百部二錢秤同為末醋調搽夫大人小兒瘡腫丹毒發熱疼痛不止一法面北端想北海雪浪滔天冰山無際大寒嚴冷之氣取此氣一口吹在瘡腫處立止用法之人大忌五辛之菜五厭之肉所病之人切忌雞豬魚兔酒醋濕面等物無藥之處可用此法救人出儒門事親疥癬附論夫疥與癬風毒客於肌膚所致也風毒之浮淺者為疥風毒之沉深者為癬疥則多因風毒挾熱得之癬多因風毒挾濕熱得之疥發於手足或至於遍身癬則肌肉癮疹或圓或斜或如苔莓走散內藏汁而外有框二者莫不均有蟲也亦莫不易為之染觸也焮赤癢痛作瘡有膿曰大瘡隱起帶根搔不知痛曰馬疥㾦癗含漿抓破出水曰水疥癢而搔之皮起干痂曰乾疥薄皮小瘡常常淫汁曰濕疥此疥之名目然也乾癬則搔出白屑索然凋枯濕癬則淫如蟲行搔之多汁風癬則爪擦痹頭不知痛癢牛癬則狀如牛領皮厚而堅其有時則微癢白點相連是之謂狗癬輪郭全無縱橫不定是之謂刀癬此癬之種類然也疥癬治法驅風殺蟲固已然殺蟲於其外亦須以硫黃輕粉蠟礬圓輩服鉺而內濟之庶絕其根矣若夫腫而濕者有熱槁而乾者無熱用藥加減又當權沖方加減八風散出聖濟總錄治風毒疥癬獨活去蘆頭四兩防風去叉黃耆銼甘草炙令赤色銼各一兩一分玄參苦參芎藭秦艽去苗各一兩白朮炒令紫色松脂各一兩一分蛇床子三分黃連去須芥子天門冬去心焙各一兩丹參人參防己芍藥白蘞細辛去苗葉桂去粗皮蒴藋各一兩蒺藜子炒乾去尖楓香脂各一兩一分麻黃去根節杏仁去皮尖雙仁炒木通銼甘菊花白芷各一兩山茱萸一兩一分生乾地黃焙二兩地骨皮菖蒲各一兩一分遠志去心一兩磁石三兩以火燒通赤入酒中淬十次上為散每服二錢空心用生薑蜜湯調下晚再服漸加至三服䕡茹膏出千金方治一切惡瘡疥癬疽漏瘑䕡茹狼牙青葙地榆藜蘆當歸萹蓄羊蹄根各二兩蛇床子白蘞各六分漏蘆二分上搗以苦酒浸一宿明旦以煎成豬膏四升煎至三上三下膏成絞去滓加後藥雄黃雌黃硫黃礬石胡粉松枝各二兩水銀三兩上細研著水銀散盡即傾前件膏中以十隻箸攪之百遍止用瓷器密貯封勿令泄氣煎膏法必微火敷藥不可近目及陰先研雄黃等令細候膏小冷即和敷之瘡藥如神膏黃芩黃柏黃連當歸鬚川芎白芷玄參殭蠶防風斑蝥十枚全蠍十枚紫草荊芥蛇床子花椒檳榔巴豆十粒上㕮咀入香油半碗浸藥春秋五日夏三冬七熬黑色為度再下烏桕油一小碗半寸斷柳槐條一握及用槐柳枝條攪令勻濾淨再下硫黃雄黃黃丹輕粉隨多少再下明礬一錢為率先用乳香研細下急攪勻候冷只將油敷瘡瘡藥方出外科精要治諸般疥癬小兒眉臉盛風並皆治之輕粉一錢雄黃一錢大風子肉三錢蛇床子半升膽礬一錢半芒硝二錢半明礬一錢半信一錢半上為末用黃龍骨青龍皮龍鬚各一兩半納香油六盅熬枯去渣又加入黃蠟硫黃各一兩半同藥末和膏於瓦瓶內收貯用之佳烏蛇散一名五參散出聖惠方治疥癬久不瘥遍身頭面皆生皮膚瘙癢烏蛇酒浸炙黃色去皮骨三兩漏蘆去蘆頭一兩半大黃銼碎炒令香羌活去蘆頭丹參沙參去蘆頭玄參五加皮甘草炙赤色銼白殭蠶炒乾蠍炒去土各一兩麻黃去根節二兩附子炮製去皮臍半兩上為散每服食後薄荷湯調下二錢至晚再服以瘥為度一方無干蠍天麻膏出外科精要治疥癬赤禿手足癬皮剝起瘑瘙疳瘡浸蝕癢痛膿汁浸淫淫蔓經久不瘥者草烏頭釣藤鉤木鱉子用仁天麻藜蘆川芎狼毒輕粉各二分粉霜二分另研黃蠟六兩臘豬脂二兩油一斤上細銼如麻豆大於油內煎至焦紫色令冷濾去渣上火入黃蠟豬脂熔開再重綿濾過入輕粉粉霜攪凝瓷盒內收貯用以塗之黃耆丸出瘡科精要治腎臟風虛攻注手足頭面麻痹痛癢或生疥癬腫焮黃耆烏藥茴香炒地龍去土川椒去目防風川楝子炒赤小豆白蒺藜去刺海桐皮威靈仙陳皮等分上為細末酒糊為丸如梧桐子大每服三十丸空心溫酒送下天麻散出外科精要治白禿甜瘡及風毒疥癬藜蘆天麻狼毒白芷菌草釣藤鉤草烏頭貫眾細辛各半兩輕粉一錢雄黃二錢上為細末每用藥半兩紙一重綿裹入油三兩浸經三日外蘸指搽患處如稍干更添油二兩添至三兩止換藥其效如神疥癬藥方輕粉一錢雄黃一錢大風子三錢蛇床子半升膽礬明礬信各一錢半芒硝二錢半硫黃一兩半以上為細末黃蠟一兩半香油六兩上用槐條柳皮各一兩蔥須二兩二味下清油熬枯不用濾出下黃蠟熔化次下前藥再攪少時為度除濕散治一切風毒疥癬瘙癢狀如風癩苦參何首烏荊芥穗蔓荊子薄荷各一兩白芷天麻川芎防風並生用烏蛇酒浸二宿焙乾各半兩上為細末每服三錢茶酒下無時日進三服六日一浴令汗出血氣宣通一月膚澤如故苦參丸出聖惠方治遍身瘙癢癬疥瘍瘡苦參四兩玄參黃連去須枳殼去瓤麩炒獨活去蘆頭大黃銼碎炒香熟防風各二兩去尖黃芩去黑心梔子菊花各一兩上為細末煉蜜為丸搗千下丸如梧桐子大每服三十丸漿水下食後日進三服茶酒送下亦得如聖散治疥風瘡癬蛇床子四兩黃柏苦參䕡茹各二兩白礬狗脊藜蘆剪草各一兩輕粉胡粉各半兩上為細末清油調搽治疥疽諸瘡方出千金方水銀胡粉各六分黃連黃柏各八分薑黃十分礬石附子苦參蛇床子各三分上水銀胡粉另研如泥余為末以煎成豬膏合和研令勻調以敷之一方無薑黃丹砂膏出聖惠方治久疥癬瘡瘙癢不止宜用此殺蟲丹砂雄黃雌黃乳發洗淨松脂白蜜䕡茹三兩豬脂二斤巴豆十四枚去皮心細研上先以豬脂煎發消盡納松脂蜜三上三下去滓內諸末中更一沸下以敷之一方用蠟不用蜜散塗方出聖濟總錄治諸疥癬久不瘥者苦參附子生去皮臍吳茱萸燒焙乾炒旱連子細辛石硫黃菖蒲半夏生用上等分搗羅為散先以油煎蔥白色黃將油和藥末塗仍先以湯浴了手足並用被覆更將大桶子安被內蓋令熱汗自瘥大黃膏治惡疥癬瘡信一錢半巴豆仁雄黃各一錢大黃黃芩黃連硫黃各二錢黃柏四錢上用好酒煮巴豆焦黑去巴豆不用入黃蠟四錢作面入油量稀稠擦塗八仙散出外科精要治遊風腫癢疥癬瘡或因洗頭遊風瘙癢生瘡細辛荊芥白芷川芎黃芩防風甘草地骨皮各等分上為末每用藥二兩水二碗煎十沸去渣熱溻患處何首烏散出和濟方治脾肺風毒攻衝遍身疥癬瘙癢或生癮疹搔之成瘡眉背拘攣肌肉頑痹手足皸裂風氣上攻頭面生瘡及治紫瘢白癜頑癬荊芥穗蔓荊子去白皮蚵蚾草去土威靈仙洗淨何首烏去蘆叉防風去叉甘草炙上各五升搗羅為末每服一錢食後酒調下沸湯亦得祛風丸出聖濟總錄治一切疥癬癩瘡槐芽焙乾皂莢芽焙乾各半斤苦參三兩防風去叉羌活去蘆頭各三兩三分烏蛇一條酒炙去皮骨使君子一兩半上為末煉蜜和丸梧桐子大每服三十丸空心酒下夜蜜湯下水銀膏治瘑瘡疥癬無名惡瘡但是手足瘡疥浸淫多汁久而蟲生塗之黃蠟一兩䕡茹一兩銼蛇床銼微炒白礬枯水銀各二兩黃連銼二兩上為蠟豬脂七兩熬開下三件銼藥煮至焦紫色去滓再入蠟熔開出火稍凝下水銀礬石攪勻每用塗摩如意散出直指方治疥癬無時痛癢愈發有時不以久新者吳茱萸牛蒡子荊芥各二兩牡蠣半兩輕粉半錢信砒二分上為細末研勻每服臨臥抄一錢油調遍身搽摩上一半如後有癢不止更少旋塗之股髀之間聞香悉愈海桐散治疥癬海桐皮䕡茹黑狗脊蛇床子硫黃各半兩輕粉一錢上為細末油調搽疥癬上熏鼻中一掃散治疥癬荊芥防風地骨皮薄荷甘草苦參上各等分為細末蜜為丸空心茶清送下或用散涼蜜水下不過三五服即痊可大人用每服三錢苦參丸治疥癬苦參荊芥何首烏威靈仙胡麻子蔓荊子各等分上為細末水糊為丸如梧桐子大每服三十丸茶湯送下食後治疥癬硫黃井泉石鵝管石白礬黃柏雄黃各等分上為末香油調搽治疥癬雄黃盆硝雌黃半錢舶上硫黃半錢人言少許斑蝥少許上為末用黃蠟小油少許和為一塊外用小油化開搽之治遍身瘙癢明目爽神威靈甘草石菖蒲苦參胡麻何首烏藥末二兩酒一碗渾身瘙癢一時無樺皮散出和濟方治肺臟風毒遍身瘡疥及癮疹瘙癢搔之成瘡又治面上風刺及婦人粉刺杏仁去皮尖用水一碗於銀勺內熬候水減一半以來取出放冷干荊芥穗各二兩枳殼去瓤用炭火燒存性取出於濕紙上令冷樺皮燒成灰各四兩甘草炙半兩上除杏仁外余藥都搗羅為末卻將杏仁另研令極細次用諸藥末旋旋入研令勻每服二錢食後溫酒調下日進三服瘡疥甚者每日頻進大檳榔散出瘡科精要治乾溼疥癬輕粉一錢硫黃一錢黑狗脊半兩紅娘子一個大檳榔一個上為細末每用藥半錢放手掌中臨臥時油調如糊兩手搽摩極熱鼻內聞之及摩搓疥上隔日再用甚者不過三上治久疥癬方出聖惠方白礬半兩搗為末亂髮兩塊雞子大上用清麻油一盞煎如稀餳輕粉四兩研入塗上立效又方出聖惠方燕子糞微炒斑蝥燒灰上等分搗為末油調塗之治一切風癬疥癩腎濕下注風瘡成片經年不瘥者臁瘡等疾亦治之羊蹄根五塊用乾地上獨行赤色者佳近水黑根不可用肥皂莢白礬少許生薑一塊明硫黃少許上用搗爛極細丸如彈子大先以溫漿水淋洗瘡去膿血痂靨以軟帛搵干然後用藥丸滾搽瘡上停一時辰再用淡漿水不犯手淋洗淨須臾間瘡上追出紅血絲網為度此係瘡內風蟲也見此即瘥如不愈隔一二日再如此上藥治之三二次必愈如藥丸幹了以蜜和開再丸之瘡生過腳面以軟乾柿薄切片子拓上即瘥防風羌活散治疥癬風瘡防風羌活全蠍薄荷荊芥各一兩上為細末每服三錢酒調服茶清亦可無時服治久疥癬水銀礬石黃連一作雄黃蛇床子各一兩上為末以豬脂七合和攪不見水銀為熟敷之一方加藜蘆一兩又加䕡茹一兩療諸瘡神驗無比雄黃散治疥癬石膏牡蠣燒各一兩雄黃一錢硫黃三錢上為細末好油一盞內巴豆仁十個熬紫焦去巴豆調藥末搽疥癬防風丸治一切風瘡疥癬皮膚瘙癢成癮疹防風去叉蟬殼各一兩半豬牙皂莢酥炙去皮十一兩半天麻二兩上搗為細末用精羊肉煮熟搗爛以酒熬為膏丸如綠豆大每服三十丸荊芥或酒茶湯下四生散治腎臟風疥癬等瘡及眼目昏花視物不見此藥主之一名四聖散白附子下注生瘡用黑附子沙苑蒺藜黃耆羌活各二兩上為細末每服二錢鹽酒湯下空腹若於豬腰子切開夾藥在內合定拴住紙裹煨熟尤妙又有患赤眼睛痛不可忍臨臥一服目反大痛至二鼓時乃得睡更三四服乃愈再有頑癬經年服藥貼藥俱不效後得此藥三四服盡除此方治人腎臟風及眼疾頑癬無不效治疥癬方用藜蘆細搗為末以生油調敷之治疥癬膿泡以五倍子燒存性為末柏油調塗治疥癬風瘡用狗舌草為末和塗之即瘥四月五日採莖曝乾防風散祛諸疥癬防風去叉天麻各二兩陳橘皮湯浸去白焙二兩上為細散每服三錢空心酒調服治脾肺風毒攻衝生瘡癬方升麻桃白皮苦參各半兩上細銼用水二斗煮取一斗去滓候溫洗之治諸瘡疥癬久不瘥者水銀一斤臘月豬脂五斤上以鐵器中壘灶用馬通火七日七夜勿住火出之停冷取膏去水銀不妨別用以膏敷一切瘡無不應手立瘥一方又用水銀粉和豬脂塗之又方牡牛尿一用乳牛尿一升羊蹄根半斤切上以牛尿漬蹄根一宿日曝乾復內尿中取盡止作末敷諸瘡一方和豬脂用更精滑肌散治風邪客於肌中渾身瘙癢至生瘡疥脾肺風毒攻衝遍身瘡疥皴裂乾溼發瘡日久不瘥皆治之剪草七兩忌見火輕粉一錢上為細末瘡濕用藥乾摻瘡乾用麻油調敷之烏龍丸治遍身風瘡瘙癢疥癬等疾服之清風熱利膈化痰唾治肺氣不和此藥推陳致新去腸垢治證甚多要能用度皂角肥者不以多少刮去皮弦捶碎甜水橘煮取濃汁去滓銀器內熬成膏立放黑牽牛不以多少微炒令香熟碾取頭末上將藥末與皂角膏和丸如桐子大每服三五十丸氣血虛者一二十丸食後溫水送下無病氣實人一兩個月一服取利三五行不傷正氣身體輕健肌膚光澤永無風痰疥癬之疾一方用酒下治疥癬諸瘡治肺受邪毒運如四肢久而不散以生內蠹硫黃舶上白礬枯各半兩上為細末乾者香油調敷濕者乾摻蒼朮丸蒼朮米泔浸去皮何首烏半斤上為細末酒糊為丸如梧桐子大每服六七十丸空心酒下疥癬惡瘡方以滿尺不蛀皂角三條炙去弦核為末米醋二大盞煮如熔膠濾清汁入黃連末半兩輕粉二錢調抹候癬發時惡水出便可先以楮樹白皮搔破後塗藥三兩上便瘥凡諸瘡癬初生時或始痛瘥即以後各單方救之出肘後方用鹽嚼塗之又以谷汁敷之又以蒜墨和敷之千金翼蒜作酥又以薑黃敷之又以鯉魚鮓糝敷之又以牛李子汁敷之若不瘥以前諸大方治之如聖散出瘡科精要治渾身瘙癢抓之成瘡及癮疹之類上以蠶砂一升水二斗煎至一斗濾去滓夜臥避風處淋洗水冷即拭乾便眠治久疥癬出濟生拔粹方以臘豬脂不以多少同生白礬杏仁少加輕粉搗爛搽之治疥癬有汁以松脂末入輕粉先用油塗卻摻上松脂一二次即安頑者三兩度瘥療頑癬久不瘥者用防風通聖散一帖全料依方法煎熟乘熱於浴堂內服之次先合下藜蘆荊芥各等分為細末每用一抄就於浴堂內乘熱用手揉揩藥於瘡患處如燥豆候藥在身上良久然後再交湯婆子用手不住揉揩為妙次用溫湯豁去展拭乾出最妙山梔子散出聖濟總錄治一切疥癬搗山梔子為細末炒過以蜜蒸三五度了五更酒湯下一匙許疥藥神效散出德生堂治乾溼膿窠諸腫疥癬等證有效檳榔一兩全蠍半兩蛇床子一兩倭硫黃一兩半上化開硫黃入荊芥穗末滾數沸候冷再加輕粉二錢再加碾末加板油半兩妙上為細末先將小油滾過候冷調藥搽瘡上仍以兩手搓藥開氣神效一方用荊芥末三錢附子膏出聖惠方治一切疥癬惡瘡不瘥附子一枚銼搗為末鯽魚一條長五寸亂髮如雞子大豬脂四兩上先以豬脂煎魚亂髮令消濾去渣入附子末熟攪膏成旋取塗之四聖膏治風疳疥癬或痛經年不效者及一切惡瘡清油半斤巴豆去皮三錢當歸半兩輕粉一錢上將油慢火熬次下巴豆當歸熬至黑焦去滓又下黃蠟輕粉熔開冷定盆子盛每用量瘡搽之臭黃膏出聖惠方治風瘡疥癬久不瘥臭黃研亂髮燒灰蕪荑各半兩硫黃一分細研杏仁半兩湯浸去皮尖雙仁研吳茱萸半兩粉腳半兩細研上為細末以生麻油調塗於兩手心合手於股內夾藥一宿如未痊者次夜更塗兼吃蜜酒使醉神效水銀膏出聖惠方治疥癬瘡經年不瘥水銀白礬蛇床子雄黃䕡茹以上各一兩上入煉好豬脂半斤都研候水銀星盡便用敷之日三兩上兼治小兒頭瘡浴遍身瘡疥及厲風癬以滾鹽水浴之極妙治癬及惡瘡疥蜘蛛咬者用生鐵同蒜磨生油敷並得治疥癬滿身作瘡不可治者出肘後方用何首烏以水煎令濃於盆中洗之甚能解痛生肌一方有艾等分治白癜癧瘍及風惡瘡癬用絡石木連藤取汁敷瘡上治久疥癬方出聖惠方用川烏頭七枚生用搗碎以水三大盞煎一大盞去滓溫洗之神效療熱瘡疥癬癢痛不可忍者先用泔清洗瘡去痂拭乾看瘡大小研硝石末和生麻油如麵糊以塗瘡上三兩度瘥治一切疥癬方出聖惠方取巴豆四五粒細研以油一合半用慢火熬一食久先吃山梔子湯一碗夜塗此藥一兩上瘡痂干剝落神效三黃膏出楊氏家藏方治瘡癬疥癆紫白癜風雄黃另研雌黃另研砒另研三味各半分白礬另研蛇床子取末䕡茹四味各一兩白膠香一錢另研輕粉黃丹上件用麻油四兩入巴豆四枚煎黃色去巴豆入各種藥又入黃蠟少許熬成膏子先用荊芥湯洗後用藥摻之麝香䕡茹散出楊氏家藏方治疥癬麝香另研三錢水銀一分白錫一分結沙子上件䕡茹末同研勻每用三錢生麻油調成膏抓破瘡疥搽之日三兩次苦參丸出御藥院方治肺毒邪熱頭面生瘡疥癬並宜服之苦參上為細末粟米和飯丸如梧桐子大每服三十丸空心米飲送下柏脂膏出濟生拔粹方治乾溼疥癬柏油一斤黃蠟半斤杏仁四十五個銼碎朴硝一抄上研巴豆令極細余併為末入巴豆和勻煉蜜和丸如梧桐子治疥癬出本草方粉霜雄黃雌黃末各一錢半藜蘆末一兩汞二錢摩風膏半兩上打和蔥煎清油調搽又方出永類鈐方以夜臥醒不語津搽甚良又方出永類鈐方用醋磨上鏽鐵水兼沙過青鹽白礬搽之又方出永類鈐方刮東向見日壁摩搽良又方出永類鈐方以雞子殼燒灰油調搽一上散出誠效方治諸般疥癬必效雄黃通明可用五錢熟硫黃半兩斑蝥三斤去翅足研碎黑狗脊五錢寒水石六錢蛇床子半兩炒上另研雄黃硫黃寒水石如粉次入斑蝥和勻蛇床子黑狗脊另為細末同研勻先用湯洗疥癬去痂油調手中擦熱鼻中嗅三兩次搽上可一上即愈也如痛甚腫滿高起者加寒水石一倍如不苦癢只加狗脊如微癢只加蛇床子如瘡孔中有蟲加雄黃如喜火炙湯燙者加硫黃即嗅不止亦愈治一切男女人渾身疥癬一家染易經年搔癢不效者出護命方百部四兩粹切亂髮木香碎切檳榔捶碎苦參各一分碎切南椒三錢鯽魚一斤不要見水切成片上以油五斤煎令得所去藥卻用麝香一分膩粉一錢硫黃一兩半雄黃半兩同研令勻入在油內更煎攪五七沸器盛之非時使也三神丸出十便良方治一切疥癬地龍二條蠍稍三枚去毒白殭蠶二十四枚炒去絲嘴上件藥研令極細分作二服小兒作五服溫酒調下服藥了然後浴五龍膏出十便良方治疥癬硫黃白礬白芷川椒吳茱萸上五味等分搗羅為細末煎油調塗之去風瘙疥癬出本草方用碧海水煮浴之治䘌蝕疥癬瘻蟲咬出本草方以鹽膽水敷之瘡有血者不可敷治瘡痍風瘙癢疥癬出本草方以鈞樟皮煎湯洗之治乾溼癬疥出本草方以胡粉一分粉之即瘥治瘡疥癬出本草方取野芋根醋摩敷之除疳䘌疥癬出本草方以海桐皮水煮服治風疹疥癬出本草方以積雪草用鹽挼汁敷之又方出本草方取柳白皮細切以豬脂煎取汁敷之治疥癬出本草方取礬石和桃仁蔥湯浴之可出汗也治疥癬出本草方以百部根火炙浸酒空腹飲之治蟲瘡疥癬出本草方用剪草浸酒服之治疥癬出本草方以槐葉煎湯服皮莖同用治疥癬蟲瘡毒腫出本草方以甕盛桐子瀝入油摩敷瘡上治疥癬殺蟲出本草方以硫黃生研敷之治疥癬惡瘡出本草方以天南星搗敷之治風瘡疥癬出本草方用鬼皂莢作湯浴之治疥癬風瘙出本草方用蒴藋作湯浴之良治惡瘡疥癬用石灰淋汁洗之又方用菖蒲根搗為末油調塗之又方用鴛鴦肉以酒浸炙令熱敷瘡上冷更易其肉不可食即棄之又方用羊蹄根搗絞取汁入膩粉少許調如膏塗癬上三五遍即瘥如干即豬脂調和敷之
