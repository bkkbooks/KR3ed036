body:
  text: 卷二百八泄痢門諸瀉附論夫有脾瀉有腎瀉脾瀉者肢體重著中脘有妨面色虛黃腹肚微滿腎泄者膚腠怯冷腰膂痠疼上咳面黧臍腹疼痛治脾瀉用蒼朮白朮厚朴乾薑木香生豆蔻治腎泄用補骨脂及安腎丸震靈丹輩方參連丸治腸胃虛弱冷熱不調泄瀉腸鳴日夜無度艾葉用糯米糊拌勻焙取細末稱二兩半乾薑炮取末二兩用艾末米醋一升半慢火熬成膏訶子煨去核一兩宣連一兩半銼如麻豆大用吳茱萸一兩半同黃連炒色紫揀去茱萸不用人參去蘆白朮木香一兩半別用黃連一兩為粗末將木香浸水一升慢火煮盡水去黃連不用切焙乾烏梅去核焙乾稱百草霜別研白茯苓去皮酸石榴皮炒當歸洗焙各一兩半赤石脂一兩三分龍骨一兩三分炙煅地榆一兩半阿膠二兩拌粉炒罌粟二兩蜜炙上為末將前項艾膏和為丸如梧桐子大每五六十丸陳米飲下斂腸丸治久瀉木香丁香附子炮去皮臍縮砂仁訶子皮罌粟殼炒去頂瓤川薑炮沒石子梓州厚朴薑製白龍骨赤石脂肉豆蔻麵包煨禹餘糧醋淬七次以上各一兩上為細末麵糊丸如桐子大每服七十丸米飲下空心食前豆蔻燥腸丸治沈寒痼冷泄瀉冷痢腹疼後重附子炮去皮赤石脂各一兩肉豆蔻麵裹煨良薑炮舶上硫黃各半兩上為細末醋糊為丸如梧桐子大每服三十丸米飲下太聖散治脾胃積寒心腹疼悶臟腑泄瀉腸鳴絞痛益智三兩連皮炒川烏頭炮製去皮臍陳皮湯浸去白各一兩乾薑炮製半兩茴香七錢半炒甘草二錢半炙上為細末每服二錢水一盞入鹽一捻同煎至七分去滓食前熱服訶子四桂散治臟腑虛怯本氣弱脾胃不快不進飲食時加溲痢晝夜不息人參去蘆白茯苓去皮附子炮去皮臍各一兩木香紙包煨過訶子濕紙包取皮用半兩上為細末每服二錢棗一枚生薑三片煎至六分溫服一方加豆蔻一方有白朮真陽耗散兩耳常鳴臍腹疼痛頭旋目暈四肢急倦脾胃不和晝夜泄瀉痢小便滑數止泄瀉暖脾去憊散寒以陳廩米作湯食之肉豆蔻散治脾胃氣虛腹脅脹滿水穀不消臟腑滑瀉腹內虛鳴困倦少力口苦舌乾不思飲食日漸瘦弱蒼朮米泔浸一宿去皮尖八兩茴香炒肉桂去粗皮川烏炮去皮臍訶子皮各二兩乾薑厚朴去粗皮姜炒陳皮去白甘草爁肉豆蔻麵裹煨各四兩上為末每服水一盞生薑三片棗一枚煎至七分溫服實腸散出直指方治泄瀉不止肉豆蔻訶子炮縮砂陳皮蒼朮炒茯苓各一兩木香半兩甘草四錢厚朴制一兩半上㕮咀每服三錢薑棗煎服手足冷者加炒乾姜九寶飲子出醫方集成治分利水穀止泄瀉罌粟殼蜜炙青皮陳皮木通各一兩二錢赤茯苓去皮黃耆微炒厚朴薑製粉草車前子略炒各三錢半上㕮咀每服三錢水一盞煎至七分溫服蓽茇丸出一百選方治滑泄妙甚附子炮去皮臍蓽茇川薑丁香不見火吳茱萸炒良薑胡椒以上各一兩山茱萸去核草豆蔻去皮半兩上為末棗肉丸梧桐子大每服五十丸食前陳米飲下日五服廬州知録周汝功嘉禾人乃尊守永嘉時每苦滑泄服此藥果有效其方董發運問有序多不復録下一方亦周所傳也如瀉日三服下補脾丸出百一選方治滑泄不禁白朮赤石脂肉豆蔻麵裹煨川厚朴去粗皮薑汁塗炙川白姜炮各一兩蓽茇炒神麯炒附子炮去皮臍麥糵炒各半兩上為細末醋糊為丸如梧桐子大早晚食前各五十丸陳米飲下縮砂丸出御藥院方治大便泄瀉米穀不化腹中疼痛不思飲食縮砂仁黃連去須微炒附子炮去皮臍吳茱萸湯洗七次焙乾微炒訶子皮肉豆蔻各二兩乾薑炮木香各半兩上為細末水煮麵糊丸如梧桐子大每服五七十丸食前米飲下肉豆蔻丸出和劑方治泄瀉療脾胃氣虛弱飲食減少訶黎勒皮龍骨木香各三分丁香三兩肉豆蔻縮砂仁各一兩赤石脂白礬枯各半兩上藥搗羅為末粟米飲和溲丸如梧桐子大每服二十丸米飲下不拘時厚腸丸出百一選方治泄瀉不止白龍骨乾薑炮附子炮去皮臍厚朴薑製訶子炮去核肉豆蔻麵裹煨陳皮上等分為末酒糊丸如梧桐子大每服五十丸米飲下羊肉扶羸丸出三因方治脾胃不和不進飲食臟腑虛滑老人虛人尤宜服精羊肉一斤半微斷血脈焙乾取末四兩川椒去目炒出汗肉豆蔻煨各一兩白姜炮一兩木香一分附子炮去皮臍神麯炒半兩上為末煮粟米飲為丸梧桐子大食前米湯下五十丸豆蔻分氣散出三因方治臟腑虛寒泄瀉瘦極及婦人産後洞泄危篤者藿香葉草豆蔻仁青皮各四兩甘草炙丁香各半兩肉豆蔻炮十兩烏梅五十枚去仁上銼散每服四錢水二盞糯米一撮煎七分去渣空心服治大瀉後腹中空竭胸中虛滿不下飲食芍藥甘草半夏各一兩厚朴當歸桂心各三兩生薑五兩上㕮咀以水八升煮取三升分三服服二劑最佳豆蔻固腸丸出御藥院方治脾胃虛弱臟腑頻滑不思飲食腸鳴腹痛木香赤石脂乾薑縮砂厚朴生薑制肉豆蔻麵裹煨去面各一兩上為細末麵糊為丸如梧桐子大每服六十丸食前米飲下曲術丸出衛生寶鑑治時暑暴瀉壯脾溫胃進美飲食及療飲食所傷胸膈痞悶等症服此取效神麯炒蒼朮米泔浸一宿焙乾各等分為末上為細末麵糊為丸如梧桐子大每服四十丸不拘時米飲下神麯丸一名斷下丸出百一選方治暴瀉不止神麯二兩炒茱萸半兩湯泡七次卻炒乾上為末用醋糊丸如梧桐子大每服四十丸米飲下食前服通苓散出危氏方分利水穀解煩熱止泄瀉豬苓白朮澤瀉赤茯苓去皮木通茵陳瞿麥車前子上銼散每服四錢水一盞半燈心麥門冬煎服木香散出危氏方治脾胃俱虛泄瀉肉豆蔻麵裹紙煨破故紙炒白朮木香甘草白茯苓各半兩上銼散每服三錢生薑三片棗二枚食前溫服百粒丸治遠近便瀉大腸滑神效紅椒胡椒附子丁香乾薑麥糵上各等分為細末醋煮大蒜為丸每服百粒用米飲湯下椒紅固腸丸出瑞竹堂方治脾胃積冷腸鳴大便滑泄腹痛神麯六兩作小塊炒香熟白朮一兩銼炒乾肉豆蔻三兩面裹煨川薑去皮炮三兩厚朴去粗皮姜炙一兩川椒去肉炒去汗取乾淨一兩半上為細末別用蒜不拘多少濕紙裹煨香熟剝淨研如泥熱湯化開濾去滓少入面打糊和藥丸如梧桐子大每服七八十丸空心米飲湯送下日進二服立效散治瀉烏梅肉御米殼白礬甘草炙夜叉頭上各等分為末每服二錢半米飲湯調空心服治瀉出百一選方人參去蘆茯苓肉豆蔻麵裹煨訶子肉等分木香減半上為末丸如梧桐子大每服三五十丸米飲湯下小兒服丸如黍米大量大小加減服之治脾泄多年老人腎虛謂之水土同化出存仁方用吳茱萸簸淨不拘多少白水煎去渣盞內入鹽少許通口服蓋茱萸能暖膀胱水道既清大腸自固余藥雖熱不能分解清濁也健脾散一名養婆湯出三因方治五泄或青白五色雜下休作無時亦治脾胃虛損臟腑泄瀉不進飲食寒中洞泄及年高久泄不止烏頭炮去皮尖三錢厚朴去皮銼薑製炒甘草炙乾薑炮一兩上為末每服二錢水一盞姜五片棗二枚煎至七分熱服一方無棗煎四神丸出醫方集方治脾泄腎泄肉豆蔻生二兩破故紙炒四兩木香半兩不見火茴香炒一兩上為末生薑煮棗肉丸如梧桐子大鹽湯下一方去木香茴香入神麯麥糵如前作丸木香煮散出百一選方治瀉不止木香二兩甘草半兩炙茱萸二兩去枝梗罌粟殼去頂蒂膜蜜炙四兩上㕮咀每服三錢水一盞半煎至一盞去滓食前稍溫服桃花丸治男子婦人泄瀉不止良薑赤石脂乾薑五靈脂上等分為末醋糊為丸如梧桐子大每服三四十丸米飲湯下豆蔻飲一名豆蔻散出百一選方治滑泄神效陳米一兩肉豆蔻麵裹煨五味子赤石脂研各半兩上為末每服二錢粟米湯飲調下日進三服曲藭丸出危氏方治脾胃中風臟腑泄滑不止芎藭神麯炒白朮附子炮去皮臍尖各等分上為細末用糊丸如梧桐子大每服三五十丸空心米飲下左氏述楚子為蕭將潰無社告申叔展曰有曲麥乎有山曲窮乎曲窮芎藭也意欲令逃水中以避禍是知芎藭能除濕豫嘗加朮附以制方治脾濕而泄者無不中此藥亦治飧泄素問曰春傷於風夏生飧泄者食穀不化蓋春木旺時肝生風邪淫於脾經至夏飲冷當風故多飧泄此藥尤宜朝真丹治腸胃虛弱內受風冷或飲食生冷內傷脾腸鳴腹痛不進飲食漸至羸瘦並宜服之硫黃生研細三十兩硃砂研為末三兩一錢白礬煅七兩半上研勻水浸蒸餅丸如梧桐子大用硃砂為衣每服三十丸溫米飲下不計時夏月宜備急棗肉丸出濟生方治脾胃虛寒或腸鳴泄瀉腹脅虛脹或膈不快食不化破故紙四兩炒木香不見火稱一兩肉豆蔻三兩面裹煨香去面不用上為細末燈心煮棗為丸如梧桐子大每服七十丸用生薑湯下空心食前服如神丸出三因方止瀉治臟腑虛寒脾胃受濕泄瀉無度胃泄瀉暴下日夜無度腹鳴腹痛手足厥冷川烏頭四兩米泔浸軟去皮切作片子用鹽四兩炒黃去鹽不用半夏湯洗七次去滑蒼朮米泔浸淨洗各半斤上為末薑汁糊為丸如梧桐子大每服五六十丸空心米湯下戊己丸一名苦散海上名方治冷熱不調泄瀉不止米穀不化臍腹刺痛脾受濕氣黃連去須芍藥吳茱萸去梗湯浸各等分上將黃連芍藥微炒黃次下茱萸炒深黃色為末水糊丸如梧桐子大每服三十丸米飲下日二三服不拘時一方水浸蒸餅為丸良方作散末用水煎治痢疾一方面糊為丸一方醋糊為丸一方粥飲調下香茸丸出危氏方治飲多遂或灑泄骨立不能食但再飲一二盞泄作幾年矣嫩鹿茸以火燎去毛酥炙黃肉豆蔻火煨生麝香別研上為末白陳米飲為丸如梧桐子大每服五十丸空腹米飲下熱者酒蒸黃連丸固腸丸一名茱連丸出百一選方治臟腑滑泄晝夜無度吳茱萸揀淨黃連去須罌粟殼去瓤蒂三味各等分上為末醋糊丸如梧桐子大每服三十丸空心米飲下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下乳豆丸出瑞竹堂方治臟腑泄瀉不調滑泄不止諸藥不效乳香一兩別研肉豆蔻二兩面裹煨熟取豆蔻切碎另研為末上為細末相和用陳米粉糊為丸如梧桐子大每服五七十丸空心米飲湯下一方乳香用肉豆蔻大一枚剜小竅入乳香三分塊麵裹煨熟去面為末米飲下一方以茶末對烹之肉附丸一名豆附散出百一選方治腹瀉不止肉豆蔻一兩一錢麵裹煨附子一個重七錢者炮去皮臍上為細末打糊為丸如梧桐子大候乾每服五六十丸米湯吞下不拘時立效一方姜五片煎服空心下神授丸出百一選方治臟腑滑瀉南木香一錢半肉豆蔻一兩面裹煨上為末煮棗為丸如梧桐子大每服三五十丸米飲下不拘時香姜散治晨泄久患脾泄兼治下痢一名委姜散一名薑黃散生薑四兩切如豆大黃連二兩銼上一處淹一宿慢火炒姜紫色去姜不用將黃連為末每服二錢用臘茶清調一劑而愈或姜作末米飲酒調治白痢一方羅勻水五升煮一升頓服不拘時候若欲速效一料只作兩服常有患此兩服愈肉豆蔻丸治腎泄久不愈脈沉細無力者及脾胃虛弱泄瀉不止全不進飲食一名二神丸破故紙炒肉豆蔻麵裹煨各等分上為末棗肉為丸如梧桐子大每服五七十丸米飲下空心服一方用肥棗四十九個生薑四兩切片同煮爛去姜取棗去皮核研如膏入藥同杵丸鹽湯下弱甚加茯苓二兩木香一兩有人全不進食服補脾藥皆不效豫授此方服之頓然便能食此病不可全作脾虛蓋腎氣怯虧弱真元衰劣自是不能消化飲食譬如鼎釜之中置諸米穀不有火力雖終日米穀不熟其何能化黃魯直嘗記服菟絲子淨淘酒浸曝乾日炒數匙酒下十日分飲啖如湯沃雪亦如此理也香蘇湯治下後煩氣暴上生蘇一把各用蘇子三兩重香豉五兩上以水五升煮取二升頓服之治臟腑滑瀉用鷹爪黃連不拘多少碾為細末煨熟去皮大蒜丸如梧桐子大每服三十丸或五十丸米飲下火鍁丸治風氣行於腸胃泄瀉用火鍁草一味為末醋糊丸每服三十丸空心下治瀉久治無效者老人尤宜服一名護命方用大附子一個炮去皮臍以韭菜根研爛絞取汁丸如梧桐子大曬乾每服三十丸米飲湯下不效加麻仁一方治一切冷痛積久頻仍面無顏色不思飲食杵為末以一錢煮粥一碗空心食椒附湯治驟腹疼注下或滑腸頻並多有冷沫川椒去目乾薑生用附子去皮臍生用三味各等分上為粗末每服三錢水二盞煎至八分溫服不拘時治夏秋暑瀉不止以理中湯下駐車丸胃苓散治瀉傷暑煩渴引飲所下如水用平胃散五苓散各二錢水一盞棗二枚姜三片煎至七分嚼薑棗和渣咽服少刻又服辰砂五苓散亦可用來復丹亦可或寒濕水泄正胃散理中湯蘇梅米湯調下一方入鹽煎藿香正氣散治飲食中憂怒傷脾腸腹內膨滿泄瀉頻並或作晨泄加丁香縮砂良薑南木香各半錢生薑三片紅棗二枚煎服效治泄瀉用雞蛋一個去尖頂用白礬些少火上飛干入於雞子內銀叉攪勻將濕紙裹著火上煨熟服之治泄瀉不止腿腳無力行步艱難宜服丁香五套丸立止治泄瀉用敗毒散加陳糯米五十粒煎服亦治噤口痢熱毒衝心不進飲食噤口蓋有熱加蓮肉治泄瀉臟寒不進飲食氣體倦怠名豬臟丸用吳茱萸不拘多少揀淨用獖豬腸一兩條以茱萸實滿扎定兩頭熟炭煮令極爛研細丸如梧桐子大早晚食前各以飲吞下五十丸棗附丸治臟腑寒滑泄不思飲食用正生大附子一個干棗半斤內銀石器中慢火煮上留水兩指未乾旋添湯煮兩三時取出切作薄片半個再煮候至干棗丸如梧桐子大空心米飲下三四十丸患滑泄垂死者皆效治夏月脾胃厥冷滑腸泄瀉肚痛及霍亂吐瀉不止用胡椒不拘多少為末研爛飯搜和手心揉勻丸如梧桐子大每服三四十丸陳米飲吞下炙肝散一名豬肝散治久患脾泄不愈及瀉不止白朮白芷白芍藥各半兩桔梗一分上各生為細末以不入水獖豬肝五兩作小片子或塊子藥一十五錢細切蔥白二寸鹽一錢同拌肝令勻以竹籤子作串慢火炙香熟啖之米飲送下空心食前各一服渴勿吃冷水半月必安朴附丸出危氏方治脾元虛弱久患脾泄冷瀉不止及翻胃噁心臟腑滑泄痢下厚朴去粗皮薑汁製一兩綿附子炮去皮臍淨一兩神麯炒三錢乾薑炮三兩一用生薑六兩取汁上為末酒煮麵糊丸如梧桐子大每服三十丸空心食前米飲或薑湯下一方無神麯用橘紅加味治中湯出危氏方治脾胃不足飲食不節過食生冷腸鳴切痛泄瀉注下身體怯寒乾薑炮白朮青皮縮砂各一兩用仁人參去蘆甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片棗一枚煎至七分去滓溫服不拘時或進感應丸粟殼丸出危氏方治暴瀉肉豆蔻炮罌殼去臉蒂萼淨炙上為末醋糊丸如梧桐子大空心服米湯下三十丸訶黎勒散出聖惠方治老人瀉不止訶黎勒三分煨用皮白礬一兩燒灰上搗細羅為散每服不計時候以粥飲調下二錢穀神散出百一選方治夏月暴瀉甘草炙乾薑各一兩陳倉米一升楮實青者蒸一次曬乾用一斤上為細末飯飲調下朴附丸治脾胃久虛鼓腸滑泄臍腹絞痛腸鳴泄瀉肢體無力此藥補益脾胃止心腹撮痛溫胃進食厚朴五兩去粗皮銼塊子附子一兩半銼大塊去皮臍生薑五兩不去皮淨洗切片子青州棗一百枚先將四味用水五升一處煮候水盡揀出棗子外將其餘三味焙乾與後藥同末乾薑炮去皮一兩訶子一兩炮肉豆蔻一兩人參一兩上為末將棗去皮核和藥為丸如梧桐子大每服三十丸早晚食前用陳米飲下訶子丸出本草方治脾胃不和泄瀉不止諸藥不效訶子皮川薑肉豆蔻龍骨木香赤石脂各等分上為細末糊丸如梧桐子大每服四十丸水飲下一方有附子吳茱萸丸出御藥院方治一切積冷脾胃不和心腹疼痛嘔吐泄瀉腹內絞痛吳茱萸洗七次焙乾半兩良薑銼研乾薑炮各五兩上各修制畢搗羅為細末醋打麵糊為丸如梧桐子大每服五十丸空心食前溫粥飲下三宜湯出和劑方治冒暑引飲冷熱不調泄瀉多渴心腹煩悶痢下赤白腹痛後重桂心四斤四兩乾薑炮炒四斤甘草沙炒三十斤杏仁去皮尖砂炒四斤四兩另研上為末每服一錢沸湯點服如傷暑煩渴新汲水調下不計時來復丹出醫方集成治伏暑泄瀉理中湯出醫方集成治臟腑停寒泄瀉不止方見脾臟門兼理脾胃類案原方人參乾薑炮白朮甘草炒各一兩上㕮咀每服三錢水盞半煎取一盞去滓空心腹傷胃吐血服如本方過啖熱食迫血上行發為鼻衄加川芎能理中脘分利陰陽安定血脈用之特效停痰留飲加茯苓半夏導利去之調理停飲心脾氣痛加炮過吳茱萸三十粒腎氣發動繞臍築痛去朮加桂半兩腎惡燥故去朮恐作奔豚故加桂以泄之小腸氣痛加桂枝川楝子四肢痹麻加附子天麻各四分之一霍亂後轉筋加煅石膏若誤服附子中毒者正用本方或止用乾薑甘草等分煎服仍以黑豆煎湯佐之寒濕所中昏暈緩弱腰背強急心腹滿脹胸膈痞塞吐利交作加附子等分名附子理中湯是齊於本方中甘草但用四分之一更作細末每服二錢入燒鹽點服若欲祛氣添入橘皮半兩名加減理中湯若虛寒泄瀉者加茯苓陳皮等分名補中湯若溏泄不已補中湯內加附子一兩若水穀不化食少翻胃更加縮砂半兩名附子理中湯若干霍亂心腹作痛先以鹽湯少許頻服俟吐出令透即進此藥若霍亂吐下心腹作痛手足逆冷於本方中去朮加熟附名四順湯若渴者加瓜蔞根枳實茯苓名枳實理中湯若悸多者加茯苓一兩若腹滿去白朮加附子一兩若渴欲飲水者添加朮半兩若苦寒者添加乾薑半兩藿香正氣散出醫方集成治感濕泄南白膠香散出衛生家寶治脾寒虛滑腸久瀉臍脹無休粟殼去須蒂四兩醋炒南白膠香龍骨各三分甘草炙七錢乾薑半兩炮上為粗末每服五錢水一盞半煎一盞去渣溫服金鎖正元丹出醫方集成治腎虛泄瀉小便頻數盜汗遺精虛冷之症並宜治之五倍子茯苓各八兩龍骨煅別研硃砂別研各三兩紫巴戟去心十六齒補骨脂酒浸炒十兩肉蓯蓉洗焙葫蘆巴炒研各一升上為末入研細令勻酒糊丸如桐子大每服三十丸空心溫酒鹽湯任下白朮丸出楊氏家藏方治泄瀉吐嘔脾胃不和痰多氣逆白朮半夏曲乾薑炮人參去蘆頭四兩各四味丁香半兩高良薑油炒半兩上件為細末生薑汁煮麵糊為丸如梧桐子大每服五十丸溫米飲食前下治腸丸治腸胃虛濕泄瀉頻並米穀不化腹脹腸鳴臍腹痛腸滑洞下黃連去須乾薑炮肉豆蔻麵裹煨香赤石脂龍骨吳茱萸湯微炒以上六味各半兩訶子煨去核一兩半上為細末粳米飯為丸如梧桐子大每服三十丸米飲下空心食前服茱萸已寒丸治臟腑久弱腸胃宿寒泄瀉頻並青橘皮去皮二兩陳橘皮去皮二兩附子炮去皮臍川烏頭炮去皮臍尖乾薑炮高良薑吳茱萸炒黃肉桂去粗皮以上六味各一兩上為細末醋煮麵糊為丸如梧桐子大每服三十丸至五十丸米飲下實腸丸治腸胃虛弱腹脹泄瀉時時刺痛黃連一兩去須肉豆蔻麵裹煨香丁香乾薑炮白茯苓去皮當歸洗焙乾訶子去核六味各半兩木香一分上件同為細末用豬膽汁煮麵糊為丸如梧桐子大每服五十丸食空米飲下養臟丸治腸胃虛寒泄瀉無度不進飲食生硫黃四兩研粉乾薑炮附子炮去皮臍山藥鹿角霜肉豆蔻麵裹煨香以上五味各三兩上為細末以麵糊為丸如梧桐子大每服三十丸漸加至五十丸空心食前溫米飲下黃連烏梅丸治飲食不節營衛不和風邪進襲腑臟之間致腸胃虛弱泄瀉腸鳴腹脅膨脹裡急後重口目頻並不思飲食黃連去須阿膠蛤粉炒成珠子當歸洗淨三味各二兩人參去蘆頭龍骨煅紅赤石脂乾薑炮白茯苓去皮烏梅肉焙乾陳橘皮去白訶子煨去皮臍肉豆蔻麵裹煨香木香罌粟殼蜜炙以上味各一兩白礬枯半兩上為末醋煮麵糊為丸如梧桐子大每服五十丸米飲下如腹痛煎當歸湯下下血煎地榆湯下食前服訶黎勒丸出楊氏家藏方治脾胃虛弱泄瀉不止腹臍㽲痛肉豆蔻麵裹煨香草豆蔻去殼訶黎勒煨去核以上三味各二兩赤石脂三兩高良薑三兩乾薑三兩以上二姜同好醋一斤同煮醋盡曬乾入別味上為細末粳米飯為丸如梧桐子大每服五十丸米飲送下食前服抵聖散出楊氏家藏方治脾胃虛弱泄瀉不止腹痛腸鳴水穀不化不思飲食肉豆蔻八枚麵裹煨香人參去蘆頭陳橘皮去白木香白茯苓去皮以上四味各半兩肉桂去粗皮一兩附子炮去皮臍一兩甘草炙七錢半訶子一十六枚煨去核上為細末每服三錢水一盞半生薑三片棗一枚煎一盞空心食前去渣溫服煨肝散出楊氏家藏方治臟腑久虛挾寒滑泄全不入食口生白瘡川椒去目出汗茴香炒縮砂仁丁香木香肉豆蔻麵裹煨香以上六味各半兩附子炮去皮臍白朮以上二味各一兩入生薑四兩用醋煮十數沸焙乾上為細末每服三錢用獖豬肝或羊肝二兩切作片子批開摻藥末在內更用好紙三兩重裹慢火煨候肝熟取出細嚼溫酒送下茱萸湯治腸胃虛寒泄瀉不止當歸洗焙三錢乾薑炮三錢肉桂去粗皮二兩附子炮去皮臍一兩吳茱萸一兩湯洗七次上為粗末每服四錢水一盞煎七分去滓溫服蓽茇丸治脾胃冷心腹㽲痛腸鳴泄瀉不思飲食人參去蘆胡椒肉桂去粗皮訶子煨去核以上四味各三兩蓽茇白茯苓去皮乾薑炮三味各半兩上為細末煉蜜為丸如梧桐子大每服五十丸米飲送下空心食前人參散治瀉無比橡斗皮四兩去子蜜炒人參七錢木香三錢甘草四錢黃橘皮半兩訶子四個藿香三錢上為細末煉蜜為丸如彈子大每服一粒嚼細煎艾湯下每兩作十丸將後五件同入在內亦佳立春後芒種前加白朮半兩立夏後秋分前加芍藥茯苓各三分立秋後加縮砂半兩如瘀血吐血下血加當歸半兩治瀉鬥肚丸出十便良方木瓜厚朴訶子肉蒼朮赤石脂各一兩茯苓二兩附子半兩上為末飯丸如梧桐子大非時米飲下五十丸木瓜煎丸出十便良方治瀉不止以木瓜一個切去蓋子入艾葉一兩椒子四十九個蓋定簽之入瓷器內以醋好者一升煮乾去艾並椒研木瓜為糊用和乾薑炮附子各等分末丸如梧桐子大每服七十丸姜附末不拘多少姜附丸出楊氏家藏方逐寒去濕溫脾胃止泄瀉白朮四兩乾薑二兩炮附子二枚七錢重者炮去皮臍上為細末麵糊為丸如梧桐子大每服三十丸食前溫米飲下理中丸出淡療方人參乾薑煨白朮炒各一兩甘草炙半兩上為細末煉蜜為丸如彈子大每服一丸生薑湯嚼下一方加炮熟川附子一兩如前制服治中寒嘔泄等症名附子理中丸或如梧子大亦可食前空心服附龍丸出淡療方治男子婦人臟寒滑泄或去小兒吐瀉亦效附子炮去皮臍伏龍肝少用肉豆蔻生用上為細末研飯為丸空心飯飲吞下每服三十至五十粒禹餘糧丸出同前主腸胃虛寒滑泄不禁禹餘糧煅赤石脂煅龍骨生用蓽茇訶子麵裹煨乾薑炮肉豆蔻生用附子炮去皮臍上等分為細末醋糊為丸如梧桐子大服七十丸米飲送下食前固腸丸出朱氏集驗方治泄瀉附子去皮炮切一兩白茯苓一兩乾薑炮半兩大黃去須打碎木香切片各半兩上水二碗煮乾曬為末麵糊丸每服百粒米飲下療二十種雜下江夏太守用此法療盡愈出肘後方黃芩黃柏熟艾附子炮甘草炙一兩烏梅二十枚取肉炙乾薑二兩上七味各搗下蜜丸如梧桐子大服十丸漸至二十丸日三服忌肥肉生冷一方無甘草附子黃芩一方除甘草附子車前散出危氏方治暴瀉不止小便不通亦治水瀉以車前子為末每服二錢米飲調根葉亦可立效昔歐陽文忠公嘗得暴下國醫一帖甚效公曰吾輩臟腑不與市人同不可服夫人買訖國醫雜藥進一服而愈後公知之召賣藥者厚遺之問其方久之乃肯說云此藥利水道而不動氣水道利則清濁分谷臟自止矣來復丹出仁存方治臟腑虛滑心腹疼痛泄瀉不止可冷可熱可緩可急不問男婦長幼危急之症但有胃氣無不獲安硫黃同硝石納入定碟內微炒用柳木篾子擾令陰陽氣相入不可火太過忌傷藥力再研極細二味各一兩五靈脂去砂石陳皮青皮各去白二兩元精石一兩煅紅酒淬上為細末研勻用醋糊為丸如豌豆大每服三四十丸空心米粥湯飲下小兒三五粒若慢驚風吐痢不止虛風搐搦者非風也胃氣不續故也應夢如神飲子出家藏經效方治陰陽不和冷熱相干肚腹脹膨不時作痛五更寒痛溏瀉及白痢赤痢並治一切不正之氣綿姜一兩炮製陳橘皮一兩半去瓤稱木香半兩揀甘草一兩炙黃茯苓一兩訶子一兩火炮去核稱御米殼二兩去頂梗並子及內隔皮炒上㕮咀每服四錢至五錢水一盞半棗二枚煎至七分去滓溫服不拘時候腹痛加乳香少許白痢加乾薑大棗兩服滓並作一服血痢加黃連木香半錢血少加烏梅一個近日有言運干二女病幾月母夢老僧告曰何不贖此藥既覺買服之立效溫腎丸治五臟寒痛小便多便泄瀉川烏炮乾薑官桂三稜炮青皮硫黃各等分上為末酒糊丸如梧桐子大每服三十丸酒送下泄瀉乾薑湯下白朮附子湯出濟生方治腸胃虛濕腸鳴泄瀉或自盜汗白朮二兩附子炮茯苓去皮各一兩上羅勻每服四錢水一盞半生薑七片棗一枚煎七分去滓溫服不拘時候斷下丸出家藏經驗方治泄瀉無度枯白礬二兩華陰細辛一兩半去枝葉土淨稱訶子皮二兩乾薑三兩炒銼龍骨去舌緊者三兩赤石脂三兩桃花色者火煅黑附子炮裂去皮尖嘗不辣方入藥稱一兩石榴皮用好醋浸軟炒令乾須用酸石榴皮二兩牡蠣用鹽泥固濟火煅通赤為度二兩上為細末麵糊為丸如梧桐子大每服一百丸食前濃煎陳米飲下姜粟散出家經藏驗方治暴瀉罌粟殼去蓋子淨洗甘草陳皮淨去瓤乾薑上等分炭火上炒乾薑黃色為細末每服三錢陳米煎稠飲調下全在米濃有汁溫服有效治氣七寶丹出十便良方陳橘皮附子當歸乾薑各一兩厚朴胡椒各半兩舶上硫黃一分為細末吳茱萸半兩上七味細銼用慢火暖過搗羅為末與硫黃末同拌和一處煎米醋和作兩劑又以白麵半斤和令得所亦分足兩劑用裹藥如燒餅法用文武火煨令面熟為度去卻面於臼中搗三百下丸如梧桐子大如患諸般泄痢以米湯下二十丸空心日午服如患氣痛及宿食不消以薑湯下二十丸並無所忌如久患瀉痢服此無不瘥效如神若老人及脾胃泄滑大宜服此藥換腸丸出御藥院方治劇泄瀉不止並諸下痢之疾御米殼去隔蒂碎微炒淨稱二兩木香訶子皮白芍藥甘草炒當歸去蘆頭炒人參各一兩白茯苓去皮白朮各一兩半上為生薑絲鹽各少許拌勻紙裹好用文武火煨熟用生薑粥下食前日進二服乳豆丸出濟生方治大腸虛寒滑泄不止鍾乳粉一兩肉豆蔻半兩面裹煨香去面不用上為細末煮棗肉杵和為丸如梧桐子大每服七十丸空心食前用米飲下姜連丸治元臟久冷滑泄不止飲食不進漸至危困乾薑炮黃連去須赤石脂白枯礬龍骨上等分為末粟米粥丸如梧桐子大每服三十丸溫米飲下日三五服不拘時豬臟丸治元臟久冷滑泄不止飲食不進漸至危困硫黃二兩為末豬臟一斤洗淨入硫黃於內以線縛兩頭用米醋五升入瓷瓶以鹽泥固濟用炭火一稱煅俟醋乾為度取出入後藥吳茱萸二兩炒厚朴一斤去皮姜炒上為末先研臟細入葉末一處同研勻丸如梧桐子大每服三十丸空心鹽湯鹽酒下朮附湯濕症泄瀉白朮二兩甘草炙一兩附子炮七錢半上㕮咀為末三錢以姜七片水煎空心溫服姜附湯治冷症泄瀉附子炮乾薑炮各等分上㕮咀為末三錢以水煎空心溫服訶黎勒丸大腸虛冷泄瀉不止腹脅引痛飲食不化訶子麵煨附子炮肉豆蔻麵煨木香吳茱萸炒龍骨生白茯苓蓽茇上為細末姜煮糊丸梧桐子大每服七十丸以米飲下茯苓湯治濕瀉白朮一兩茯苓去皮七錢半上㕮咀水煎一兩食前服食入而瀉謂胃中有宿谷也當加枳實五錢酒入而瀉濕熱瀉也加黃芩五錢硃砂丸無問大人小兒或上格吐逆下注泄瀉枯白礬黃丹各等分硃砂為衣上為細末棗肉為丸如大豆大每服三四丸以針扎藥丸燈上燒熟研爛涼米泔水調下瀉者食前吐者無時候平胃散治傷濕泄瀉橘紅厚朴制各三兩半蒼朮炒五兩半甘草炙一兩上銼細每服三錢姜煎服又方以生料五苓散對夾平胃散用陳米煎暑瀉食積滯諸症皆效益胃湯治頭疼昏悶勞動則微痛不喜飲食四肢怠惰燥熱短氣口不知味腹鳴大便微溏黃色覺渴不喜冷物黃耆二分人參三分甘草二分黃芩三分蒼朮一錢半陳皮五皮當歸梢三分升麻半錢柴胡二分紅花少許半夏三分益智二分白朮三分上都作一服水二盞煎至一盞去渣稍熱服之食前一婦人年四十餘歲因內傷服藥犯牽牛大黃服藥致泄痢五七行以升陽補胃治之和胃湯升麻半錢柴胡半錢當歸身二錢草豆蔻半錢半夏三分乾薑七分甘草七分紅硝七分黃耆半錢上都作一服水二盞煎至一盞去滓稍熱服兩飯間飲之溫中湯治老人吐瀉不止揀參白朮白茯苓乾薑炮各一分上為細末每服二錢鹽湯米飲調服空心食前蓋乾薑溫中茯苓利水平三焦也癸卯歲冬十月小雪薄冰天令應時白樞判家一老僕面塵脫色神氣特弱病脫肛日久服藥未效近日復下赤白膿痢作裡急後重白多赤少不勝其苦先師料曰此非肉食膏粱必多蔬食或飲食不節天氣應時衣蓋猶薄寒侵形體乃寒滑氣泄不固故形質下脫也當以澀去其脫而除其滑微酸之氣固氣上收去其下脫以大熱之劑除寒補陽以補氣之藥升陽益氣是的對其症訶子皮散治腸胃虛寒泄瀉米穀不化腸鳴腹痛脫肛或作膿血日夜無度罌粟殼去蒂蓋蜜炒半錢訶子去核七分煨乾薑泡六分橘皮半錢本草十劑云澀可去脫以粟殼之酸微澀上收能固氣去脫主用為君也以訶子皮之微酸上收固血治其形脫橘皮微苦溫益真氣升陽為之使以乾薑大辛熱之劑除寒為臣上為細末分作三服二盞水煎至一盞和滓熱空心再服全愈扶脾丸治脾胃虛寒腹中痛溏瀉無度飲食不化白朮茯苓橘皮各二錢大麥糵四錢半炙甘草三錢肉桂半錢半夏二錢乾生薑半錢訶子皮二錢紅豆一錢乾薑一錢炒曲四錢藿香一錢烏梅二錢上為細末以荷葉燒飯為丸如梧桐子大每服五十丸食前溫水下黃耆補胃丸治一日大便三四次溏而不多有時作泄腹中鳴小便黃黃耆二分炙甘草二錢升麻六分橘皮三分當歸身三分益智三分柴胡三分紅花少許上㕮咀分作二服水二大盞煎至一盞去滓稍熱服食前升陽除濕湯自上而下引而去之升麻半錢柴胡半錢羌活半錢蒼朮一錢炙甘草三分神麯半錢豬苓半錢陳皮三分大麥糵面三分防風半錢澤瀉半錢如胃寒腸鳴加益智仁半錢半夏半錢生薑棗同煎非腸鳴不得用上都作一服水二盞煎至一盞去滓早飯後稍熱服煮朴丸治脾胃不足停寒留飲泄瀉無時厚朴一斤制天南星去皮黃泥煨熱四兩棗肉去核十五個生薑一斤半和皮洗切作片入大蒜十枚同煮以上用水五升同煮上四味於銀器中煮令乾略炒姜不用卻後入藥乾薑炮茴香炒各四兩青鹽一兩煅甘草一兩半同前藥煮乾去草不用附子炮川椒揀去閉口並目炒白茯苓各一兩上為細末神麯糊為丸如梧桐子大每服五十丸加至七十丸空心米飲下桂香丸治臟腑寒為風濕寒所搏冷滑注下不禁老人虛人危篤纍效附子泡去皮臍肉豆蔻白茯苓各一兩桂心白姜炮木香炮各半兩丁香一分上為末糊梧桐子大米飲下空心服金鎖丹治寒冷滑泄上以辰砂一兩研令極細以水丸作一球放干次用陽起石一兩研令細以水和作餅裹前辰砂放干復用龍齒一兩作末水和作餅裹前藥復用牡蠣一兩作細末以水和作餅裹前藥令乾外用六一泥固濟作球直待透干方用醋灰半鬥許丸之五斤炭煅先下三斤候將盡再下二斤火盡候冷打開去泥並牡蠣存留三件一處研令極細以棗肉丸如桐子大空心鹽湯下三五丸太固真元才覺固則休服及治臟腑滑泄以米湯下五粒婦人宮血不調米湯下三五粒丈夫諸般虛憊亦不過三五粒功效非常藥比也煨肝散治脾元虛冷滑泄不止口內生瘡腹中冷不思飲食暖胃消食止瀉蒼朮三兩縮砂去皮柴胡去苗桔梗厚朴薑汁炙去皮各一兩蕪荑三分桂心三分去皮陳橘皮去白遠志去心北紫菀各半兩胡椒一分上件杵為末以細絹篩為散每服獖豬肝四兩切作三片每片用末一二錢許摻於肝上入蔥白蒔蘿鹽等令有滋味一重布面片裹之煻炭火內煨令通熟面焦黃色即得去面取肝空腹食之其面可細切作片或以散拌加皂角子如常炒熟食亦得薄米飲下忌生冷益智火煮散治脾腎風虛脾元冷憊虛滑不止飲食不進青木香半分舶上茴香一分青橘皮一兩乾薑半兩烏梅二兩生用益智一兩生用上為末每服二錢水二盞棗五枚同煎至八分先吃棗後藥食前服之過熱不妨小草還丹補脾腎虛冷止大腸滑泄地黃半斤銼炒黃色茱萸青橘皮去白萆薢乾薑石榴皮各炙二兩厚朴一兩薑汁炙令黃香為度上為末醋糊為丸如梧桐子大每服空心米飲下三十丸或嚼破生薑米飲下滲腸丸出楊氏家藏方治泄瀉不止久痢不瘥不問赤白膿血並皆治之附子炮去皮臍阿膠蛤粉炒白米訶子煨去核白龍骨赤石脂乾薑炒上各等分上為細末煮麵糊為丸如梧桐子大每服五七十丸溫米飲空心下治脾瀉蓋脾惡濕則濡弱而困困則不能制水經曰濕勝則濡泄出本草方以生薑碎之半夏湯洗與大棗各三十枚水一升瓷瓶中慢火燒為熟水時呷數日便已今人惟知半夏去痰不言益脾蓋能分水故也昔有一男子夜數如廁或教以此方服遂愈治久患脾瀉臟腑虛滑不進飲食上用青州棗子去核以木香擘破如棗核大置棗中十數枚以水一盞煮俟軟熟溫嚼吃以所煮汁送下甚者不過一二劑水瀉附論夫脾與胃為表裡脾主運化胃為水穀之海其精氣化為氣血以養臟腑其糟粕傳於大腸也若脾胃虛弱受於寒氣或飲食生冷傷於脾胃水穀不消大腸虛寒故成水瀉也內經謂諸病水液澄沏清冷皆屬於寒暴注下迫皆屬於熱蓋為冷熱不調氣不相濟也脾胃怯弱水穀不分濕飲流滯水走腸間禁固不能故令人腸脹不下痢有如注水之狀謂之注泄世為水瀉方訶黎勒丸出聖濟總録治水瀉吐噦遍身疼痛訶黎勒煨去核鹿茸酥炙去毛桑根白皮銼地榆赤石脂天雄炮裂去皮臍龍骨各一兩半白芷黃連去須桂去粗皮白茅根厚朴去粗皮塗生薑汁炙當歸切焙各一兩黃芩去黑心乾薑炮各半兩肉豆蔻去殼四五枚上為末爛飯丸如梧桐子大每服三十丸溫米飲下白芷黃連湯治因傷水飲後變成暴泄白芷一兩半黃連去須一兩地榆一兩半當歸銼焙一兩木香一兩赤石脂一兩半黃芩去黑心半兩芎藭一兩半訶黎勒皮煨一兩肉豆蔻一枚煨去殼白朮一兩附子炮裂去皮臍一兩半桂皮去粗皮一兩上銼如麻豆大每服五錢水一盞半入生薑五片煎至八分去滓空心溫服日三正氣散出聖濟總録治水瀉日夜不止縮砂蜜炙