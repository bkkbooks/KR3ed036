一名硃砂丸巴豆一枚去皮膜杏仁一枚去皮尖二味皆針桃上火燎存性上細研約三百轉入大豆末一字再研一百轉麵糊和丸如針頭大每服一丸新汲水下一方以蒸棗肉為丸芥子大硃砂為衣倒流水下一丸食前服白堊丸治水瀉米穀不化晝夜不止白堊一兩火煅過乾薑炮一兩楮葉二兩生研細上研為末米糊和丸如緑豆大空心米飲下二十丸黃蠟丸治水瀉不止傷冷虛極用硫黃一兩研細先用黃蠟熔化即入硫黃末和勻丸如梧桐子大每服五丸新汲水下備急朝真丹治氣虛傷冷暴作水瀉日夜二三十行腹痛不止硫黃二兩牛角炙研令極細枯白礬各半兩上同細研水浸蒸餅去水攪和丸如桐子大硃砂為衣每服十五丸溫米飲或鹽湯下如聖丸治水瀉赤白痢烏頭端正大者炮製去皮臍緑豆上等分為末新汲水和丸緑豆大以丹砂為衣每服五丸白痢乾薑湯下赤痢甘草湯下赤白痢煎乾姜甘草湯下水瀉用新汲水下小兒一二丸不拘時候硫黃丸治水瀉不止腹臟久冷不思飲食硫黃一兩白礬三兩燒令汁盡上都細研為末以粳米飯和丸每服十丸不計時候以粥飲下硫黃散治暴瀉所下如破水生硫黃白滑石上為末溫水調下立止干棗方治水瀉用青州干棗十枚去核入莨菪子填滿以麻纏卻用炭火燒令煙盡研細每服一錢半煎陳粟米飲調下治水瀉多時不瘥取羖羊角一枚用白礬末填滿燒為灰研為散每食前新汲水調下二錢針頭丸出危氏方治夏月水瀉不止以大巴豆一粒去殼針刺定燈上燒存性研細用蠟如小豆大蘸此亦燈上炙令熔丸巴豆灰作一丸倒流水吞服食前一服效治水瀉無度用乾薑末粥飲調下立效治暴水瀉不止出海上方用肉豆蔻三枚用濕麵裹定慢火內煨令面焦去面研為末只作一服陳米飲調下食前服之神效治水瀉用生薑一塊連皮切作二片入明礬一銅錢大將紙包裹以文火煨熟沸湯井水合一盞嚼爛姜湯送下一方服理中湯加肉豆蔻良薑水一盞半姜三片煎至七分食前服之肚蒜丸出危氏方治水瀉丁必卿雲渠每遇五更必水瀉一次百藥無效服此遂安用獖豬肚一枚淨洗去脂膜入大蒜在內肚滿為度煮之自晨至晚肚蒜糜爛為度杵成膏子入平胃散同杵丸桐子大每服三十丸鹽湯或米飲空腹服玉霜丸一名縛虎丸出聖濟總録治水瀉小腹疼痛茱萸丸一名茱萸湯治水瀉不止如神散治白痢如神麻葉五月五日採陰乾乃今人用作布者之麻上杵細羅為末每服二錢冷水半盞調下空心服不要吃熱物令人閃倒只吃冷涼物也若大人病重者服二錢半此方治白痢大效梅棗湯出護命方治水瀉不止棗子大者十枚罌粟谷一枚烏梅十個上銼為粗末每服二錢以水一盞煎七分去滓溫服不拘時候治水瀉並赤白痢出十便良方草烏大者一兩半上將一半燒灰一半生用為末醋糊為丸如緑豆大每服七丸赤痢甘草湯下白痢乾薑湯下水瀉井花水下並宜服後忌腥臊熱膩生冷之物針頭丸出楊氏家藏方治水瀉積痢杏仁四十枚去皮尖燒留性巴豆四十粒去殼燒存性此二字別研草烏頭二錢燒留性百草霜四錢上為細末酒煮蠟一兩和丸芥子大每服五丸小兒三丸赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下水瀉米飲下食前服茯苓湯試驗方治因傷冷飯水泄一夜約走十行變作白痢次日其痢赤白腹中㽲痛減食熱躁四體困倦無力以動茯苓六分澤瀉一錢當歸身四分蒼朮二分生薑二錢肉桂五分豬苓六分甘草半錢炙升麻二錢芍藥一錢半黃芩三分生用柴胡二分上㕮咀分作二服每服水二大盞煎至一盞去滓稍熱服食前治水瀉腸虛煩熱出本草方以林擒實生食之飧泄附論夫內經曰清氣在下則生飧泄又曰久風為飧泄夫脾胃土也其氣衝和以化為事今清濁交錯風邪之氣得以干胃故沖氣不能化而食物完出夕食謂之飧以食之難化者尤在於夕故食不化而泄出則謂飧泄此俗所謂水穀痢也脾胃交濟所以有水穀之分脾氣雖強而胃氣不足故飲食下咽而大腑之飧泄也治法用二神丸破故紙肉豆蔻修合或不換金正氣散吞安腎丸主之蓋脾胃之氣交通則水穀自然克化此所謂妙合而凝者也方紅豆丸出瑞竹堂治臟腑泄瀉名為飧泄麥糵炒半夏湯洗七次砂仁神麯各一兩半炒硇砂醋化甘草青皮去瓤陳皮鬱金紅豆藿香棠球炒蓬朮各三兩煨良薑蓽茇各二兩丁香半兩不見火上為末水煮麵糊為丸如梧桐子大每服一百丸每清晨空心下病甚者日進三服桂心丸出聖濟總録治脾胃氣虛飧泄不止飲食不消腹鳴腹內㽲痛桂去粗皮赤茯苓去黑皮赤石脂各三兩黃連去須一兩麥糵炒神麯炒石斛去根乾薑人參當歸切焙附子炮裂去皮臍蜀椒去目併合口炒出汗龍骨各半兩上為末煉蜜丸如梧桐子大每服三十丸空心暖酒下日午再服高良薑湯出聖濟總録治脾胃寒氣久為飧泄下痢嘔逆腹內㽲痛高良薑木香赤茯苓去黑皮檳榔銼人參各三分肉豆蔻去殼吳茱萸湯浸焙炒陳橘皮湯浸去白炒各半兩乾薑炮一分縮砂蜜去皮半兩上搗篩每服四錢水一盞半煎八分去滓不拘時日三服乾薑丸出聖濟總録治飧泄色白食不消化乾薑炮黃連去須炒各一兩半上為末先以酒一升微火煎候可丸即丸如桐子大空心米飲下三十丸日午再服一方治氣痢瀉裡急後重為末空心酒調服蓽茇散出聖濟總録治飧泄氣脹滿不下食蓽茇一兩肉豆蔻去殼半生半煨一兩乾薑炮半兩白朮三分甘草半生半炙銼半兩木香半生半炒一兩訶黎勒半生半炮去核一兩上為散每服二錢空心米飲調下日晚再服木香散出聖濟總録治腸胃冷氣飧泄不止木香阿膠炙燥訶黎勒泡去核黃連去須炒半兩乾薑炮吳茱萸湯浸焙炒龍骨各一分上為散每服三錢空心米飲調下日晚再服地榆湯出聖濟總録治腸胃寒氣飧泄無度或下黃水腹痛地榆厚朴去粗皮生薑汁炙當歸切焙各三分艾葉炒吳茱萸湯浸炒高良薑各半兩上搗羅每服四錢水一盞半煎八分去滓空心日午溫服姜米散出聖濟總録治脾胃氣虛腹脹飧泄困劣暖藥即嘔逆食飲不下陳米一升用生薑二片取汁浸米焙搗篩為末炒令黃草豆蔻十枚煨去皮甘草銼炙肉豆蔻十枚去殼陳橘皮去白炒燒鹽各一兩炒上研散每服二錢沸湯點服不拘時候雞舌香散出直指方治飧泄生冷久為冷積良薑辣桂香附淨洗天台烏藥益智仁各一兩甘草炙兩半上為末每服二錢入炒鹽沸湯點吞感應丸白朮湯出宣明論治風冷入中飧泄不止脈虛而細日夜數行口舌乾燥肚腹疼痛飧泄症主冷清氣在下則生飧泄清濁交錯食不化而清穀矣白朮厚朴去粗皮銼薑汁炙當歸切焙龍骨各一兩熟艾炒各半兩上搗篩每服四錢水一盞入姜兩片同煎七分去滓空心日晚溫服乾薑丸出聖濟總録治腸胃風冷飧泄注下腹痛不止乾薑炮厚朴去粗皮薑汁炙當歸切焙各三分阿膠炙燥龍骨各一兩上為末煉蜜丸如梧桐子大每服三十丸空心棗湯下豆蔻散出聖濟總録治飧泄水穀不分溫脾止腹痛進食草豆蔻去皮乾薑甘草陳橘皮湯浸去白高良薑上等分銼碎都作一處用胡餅劑裹煻炭內炮令黃熟取出面搗為散每服二錢陳米飲調下食前服茯苓湯出聖濟總録治飧泄水穀完出赤茯苓去黑皮黃連去須炒厚朴去粗皮生薑汁炙各一兩乾薑炮半兩上搗篩每服四錢水一盞半煎八分去滓空心日午溫服治飧泄滑痢不止一名茯苓木香散出百一選方白茯苓二兩南木香半兩紙裹炮上為末紫蘇木瓜煎湯調二錢茱萸湯出聖惠方治飧泄水穀不化及諸色痢亦治水瀉腹痛腸鳴吳茱萸湯浸焙乾炒黃連去須炒等分上搗篩每服四錢水一盞半煎至八分去滓空心溫服不止再服一方飯和丸粥飲下三十丸防風芍藥湯治泄痢飧泄身熱脈弦腹痛頭痛而微汗法云瀉有虛實寒熱虛則無力拈衣不及便已泄出為不能禁固也實則數至圊而不能便俗云虛坐努責是也裡急後重皆依前法進退大承氣湯主之一說素問曰春傷於風夏生飧泄又云久風為飧泄飧泄者乃水穀不化而完出非水入胃而成此症不飲水而谷完出故名飧泄治法於後先以宣風散寒導之使出錢氏方四味者是也後服蒼朮防風湯蒼朮去皮四兩麻黃去根節四兩防風去蘆頭五錢上為粗末每服一兩生薑七片水二盞煎一盞去滓溫服泄止後服椒術丸椒術丸蒼朮二兩小椒一兩去口炒上為細末醋糊丸如桐子大每服二三十丸食前溫水下一法惡痢久不愈者彌佳如小兒病丸如黍米大木香散內經曰清氣在下則生飧泄又曰久風入中則為腸氣飧泄夫脾胃土也其氣衝和以化為事今清氣下降不升則風邪久而干胃是木賊土也故沖和之氣不能化令物完出所謂飧泄者或飲食太過腸胃致傷因而水穀不化此俗呼之水穀痢也法當下舉而消克之以加減木香散主之木香良薑升麻去黑腐檳榔人參各七錢半肉豆蔻煨吳茱萸湯洗陳皮砂仁各半錢神麯炒二錢乾薑洗去灰炒半錢上同為末每服四錢水一盞半煎一盞去渣服溫食前
