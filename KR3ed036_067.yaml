body:
  text: 卷六十七牙齒門齒𧈟附論夫齒𧈟謂如疳𧈟蟲蝕之證齒根宣露壞爛膿血俱出口內氣息蓋緣臟腑壅滯熏發上焦攻衝齒牙又有嗜肥甘過多或宿食在齒根不能漱腐臭之氣淹漬而成者蓋牙齒雖為骨之所終髓之所養得齦肉而固濟可以堅牢今血氣不足揩理無方風邪襲虛客於此間則肌寒血弱齦肉宿落漸至宣露永不附著齒根也方附子散治𧈟齒齒紫黑皴癢臭爛附子炮裂去皮臍升麻桂去粗皮細辛去苗葉麻黃去根節人參乾薑炮黃芩去黑心甘草炙銼當歸切焙各一分上藥搗羅為細散每用少許貼於齒患齦處每日三五遍止或咽津不妨治齒𧈟方用苦參三兩銼以水三中盞煎至一盞去滓熱含冷吐莨菪子散出聖惠方治齒𧈟作孔有蟲疼痛莨菪一分水淘去浮者微炒細辛鯽魚燒灰黃連各一分人糞灰一兩甘草半兩干蝦蟆半兩燒灰石膽半兩細研麝香半兩細研上搗羅為散每取少許以綿裹納蛀孔中日三度換之即瘥麝香散出聖濟總録治齒𧈟麝香研白礬研蒲黃細辛去苗葉丁香各半兩附子炮裂去皮臍一分青黛一兩上為散綿裹一錢於患處咬之咽津不妨日三五遍白礬散出聖濟總録治風𧈟口瘡白礬研灰燒半兩升麻一兩細辛去苗葉一兩丹砂研一兩麝香研半錢甘草炙銼一分上為散以鹽漿水洗漱後用熱水調藥雞毛塗之日三五遍細辛散出聖惠方治齒𧈟齒根腐爛動搖細辛二兩川升麻二兩地骨皮二兩角蒿二兩牛膝三兩去苗生地黃五兩上燒為灰細研每夜臨臥敷齒根或以蠟紙上貼之至旦即去一為末先荊芥鹽湯漱口良久揩疼處熱有涎吐每早辰夜臥用薔薇根膏治齒𧈟薔薇根二兩地骨皮一兩蔥根一兩胡粉一兩蠟一分上銼以水二大盞煎至半盞以重抄紙半張浸之曝乾更浸汁盡為度幹了以粉蠟塗之於上煎作條子夜臥貼之神效黃礬散出聖濟總録治疳𧈟齒根宣露黃礬燒研一分麝香干蛤殼燒灰研一分防風去皮獨活去蘆頭各一兩上羅為末再和勻以暖漿水漱口後用藥貼齒根上有涎即吐出日再貼即瘥敷𧈟齒方出肘後方細辛當歸甘草炙蛇床子各一兩青葙子上搗以綿裹如大豆著齒上日三勿咽汁瘥止皂角散出聖濟總録治齒疳風𧈟皂莢不蚛者二兩凝水石搗末二兩升麻一兩同皂莢瓶子內固濟留一孔燒令煙絶取出細研之杏仁去皮尖雙仁研一兩上研勻每用一錢患處貼之細辛散出聖濟總録治齒𧈟細辛去苗葉葉膽酥炙乾瓜蒂黃連去須各一兩上為末每用一錢塗貼齒齦上日三五度藜蘆散出聖惠方治齒風𧈟疼痛不止藜蘆去蘆頭蜀椒去目並閉口炒出汗附子炮裂去皮臍各一分麝香研一錢上為末次入麝香和勻用一錢綿裹置患處有涎吐之一方為末消黃蠟和丸如粟米大每用一丸納蟲孔中有津則吐治療齒痛不問蟲風者及𧈟齒大黃一兩莽草一兩臘肉羊脂蜀葵莖兩枝上搗大黃等二味為末消羊脂以葵莖蘸脂點藥末注齒痛處孔中日三五度每令葵莖熱用之良葶藶煎出聖惠方治齒𧈟苦葶藶末地龍末各一分麝香半錢研細臘月豬脂三兩上先煎豬脂令化去滓次入諸藥煎十餘沸於瓷閣中盛以柳枝點藥於火上炙令熱烙牙齒縫中千餘度日三五遍如此烙之即瘥青黛散出聖惠方治齒𧈟日夜疼痛不止青黛一兩柑子皮一兩干蝦蟆一枚五月五日燒灰上為細末以生地黃汁調貼齦上日二換之一方用石黛無地黃汁苦參湯出聖濟總録治齒疳及口生瘡眼澀體重蟲食臟腑苦參切桃白皮切槐白皮切各一兩上搗篩每用五錢以水二盞煎十餘沸去滓熱含漱冷吐日三五度治齒𧈟尉烙方出聖惠方臭黃半錢細研豬脂一兩槐枝五莖上煎豬脂入臭黃末及熱以綿裹槐枝點取藥尉烙齒齦縫上治齒𧈟宣露出聖惠方角蒿灰胡桐律各一兩麝香一錢上都細研令勻夜後敷於齒根令滿來日早以鹽湯漱口白礬散出聖惠方治齒齦腫有膿血出白礬杏仁二七枚湯浸去皮尖研蚺蛇膽一錢上細研先以青布揩齒齦令血出嗍令血盡即用散摻於濕紙上在患處貼之日三兩上以瘥為度白礬散出聖惠方治疳𧈟齒根血出白礬燒灰研三分蚺蛇膽研一錢上研勻先以布揩齒令血盡每用半錢摻於患處勿咽津治齒𧈟揩齒藥方雄黃一分白礬一兩上相和銚子中熬令黃煙盡研為末每日未洗面先捻少許揩齒含著洗面畢即漱口又方出聖惠方豬牙皂莢一兩燒灰麝香一錢研細上相和細研將用揩齒夜臥時即貼於齦上治𧈟齒蟲齒積年不瘥從少至老出千金方用雀麥草一名杜姥草似牛毛草以苦瓠葉四十枝淨洗露一宿平旦取草銼長二寸廣一寸厚五分以瓠葉縛之作五六十裹之取三年釅醋浸之至日中取兩裹納火中炮令極熱納中齒外邊尉之冷則易之取銅器以水中解裹於水中洗之得蟲長三分老者黃黑色少者白色多者得三四十枚少者得一二十枚一方用醋同前蝸牛方出聖惠方治齒𧈟並有蟲用蝸牛殼三十枚燒灰細研每用揩牙良治口臭及𧈟齒腫痛出肘後方用細辛煮取濃汁熱含冷吐瘥一方常用剔牙治𧈟齒及口瘡蟲食取紫藍燒作灰以敷塗之日三五度取瘥治疳𧈟食口齒及下部飛廉蒿燒灰搗篩為末以兩錢著痛處甚痛忍之若不痛非疳也下部蟲如馬尾大拘纏出無數十日瘥平復硫黃烙方出聖惠方治𧈟生瘡用硫黃一分以舊針鏵頭一枝於炭火中燒令赤捻硫黃著上更入少許豬脂相和熬令沸以柳枝子綿裹頭搵藥承熱烙之齒縫三五遍即愈治𧈟齒出永類鈐方桔梗薏苡仁上等分為末點服小兒亦可用白芷川芎末蜜丸食後噙化生銀杏食後嚼一二個治口齒風𧈟腫疼牙根浮爛惡臭熱毒膿血出本草以蜀升麻水煎綿沾拭瘡上治牙齒𧈟痛出本草以留師蜜食之治𧈟齒出本草以鼠李根煮濃汁含之治𧈟齒脊骨有疳蟲出本草以牛李煮汁濃含之更空服一盞可灌此汁於有蟲處治齒𧈟疳瘡出本草用灰藋燒為灰口含及納齒孔中殺蟲瘥治𧈟齒出本草以杏仁燒令煙盡細研如綿急納𧈟齒孔中良急疳附論夫急疳者由風熱蘊積脾肺壅滯火毒之氣沖注口齒遂成疳也其候唇忽變青白齦腫滿膿血俱出朽爛疼痛頰邊有赤白色或有黑暈即須針卻惡血不然烙之若不早療死於旬日故名急疳也方黃礬散出聖惠方治急疳蝕齒齦唇口壞爛腫痛黃礬青礬白礬洗令汁盡白狗糞灰莽草雄黃細研各半兩石膽細研莨菪子炒令黑色乾地龍微炒人糞灰各一分麝香一錢研細上為末都研勻先以鹽漿水漱口三兩度於上貼之日三用有涎勿咽蝦蟆灰散出聖惠方治急疳齒齦腫痛有蟲朽爛疼痛蝦蟆灰細研青黛細研柑子皮細辛白雞糞麝香細研乾薑薰陸香以上各一分上為末都研令勻以綿裹如杏仁大安於腫處日三換之神效有涎旋旋吐卻地龍散出聖惠方治急疳蟲蝕牙齒連牙床骨損壞疼痛乾地龍燒灰黃礬白礬洗令汁盡青礬石膽巴豆去皮心研紙壓去油人糞灰細研各一分上為散以綿裹少許納於蚛孔中如孔中小以針納藥一日一度換之待惡物碎骨出盡為度麝香錠子治急疳牙齦腐爛惡肉血臭牙落信砒青黛粉霜各二錢川銅緑雄黃各一錢輕粉一字上細研煮麵胳𦞂冷劑為錠子用綿拭去惡血淨食後用米許上蝕處神效雄黃散出聖惠方治急疳齒根唇頰額上瘡出漸多雄黃一分石膽半兩亂髮半兩燒灰人糞灰一分麝香一錢一方無鯽魚三寸魚肚內鋪著鹽燒灰上細研為散先用鹽湯漱三五口後於瘡上貼之有涎即旋旋吐卻一方用甘草湯洗瘡後敷麝香散出聖惠方治急疳口中及齒齦腫並口鼻有瘡麝香一分細研雄黃一分細研人乳一合白礬半兩燒令汁盡石膽蓮子大細研川升麻一分末上都研令勻以綿裹如杏仁大含之如有腫爛處塗之藥綿方出聖惠方治走馬疳蝕落牙齒齦腫有膿水麝香一錢砒霜少許莽草末半錢蛤粉一兩蟾酥一字螺字青黛一字上都研為末別用故綿半分剪長一寸碎擘以藥摻在綿內時入少許相和操令勻陰乾有患者用鹽漿水揩漱三五度用少許藥綿塞在牙根以針按綿子入齒縫中三兩度膝金散治走馬牙疳腫爛人中白五錢火煅雄黃四錢輕粉二錢枯白礬五錢麝香半錢上為細末用少許於患處貼之一方無枯白礬青金膏治走馬牙疳蝕損腐爛青黛二錢砒一錢粉霜輕粉各半錢麝少許上研為細末旋入小油研如稀糊塗之於夾紙上重疊砑之每用量患大小剪貼之仍以白紙封護乾蟾散出聖惠方治牙齒走馬疳乾蟾一枚燒灰龍柏花地骨皮沒藥各一分麝香一錢上為散每有齒疳瘡蝕破者先以硝石少許摻之相次以此藥半錢敷於患處日三二度麝膽散治走馬牙疳危惡候銅緑半兩生白礬一分膽礬一錢麝香少許上為細末研勻上牙蝕處乳香丸出衛生寶鑑治走馬疳如神乳香輕粉各半錢麝香少許砒半錢研上先將乳香研細入輕粉麝砒再共研用薄紙一韭葉闊藥內按過撏紙少許丸如黃米大臨臥將藥填在疳處至明愈一方忌漿醋鹽三日柳緑散青黛蒲黃雄黃枯白礬各等分上為細末患處貼之慢牙疳敷此藥少加信一方有五倍子無雄黃青礬散出聖惠方治急疳蟲蝕牙齒徹骨碎青礬黃礬石膽乾地龍燒灰各一分上為末以綿裹納在蛀孔中每日一度換之惡血及碎骨出盡為度三礬散出聖惠方治急疳青礬黃礬各半錢白礬灰一分麝香上同研如粉每用半錢敷於瘡上有涎即吐麝香散治急疳惡蝕肉損枯白礬二兩黃丹一錢炒半兩麝香一字上為細末研勻乾摻牙病處三停散治大人小兒走馬牙疳硃砂另研硫黃滴水研細麝香另細各一錢上為一處拌勻量瘡大小用生蜜調攤於綿花子上臨臥貼之忌油膩暈腥惡物石膽散出聖惠方治急疳唇口赤瘡出者石膽半兩鯽魚一枚長三寸者開肚滿填鹽燒魚焦雄黃一分上研如面先以疳湯洗口及瘡上用散貼之每日三五上夜後漱口復貼之其瘡便愈石膽散出聖惠方治急疳牛膝燒灰石膽麝香各一分上同研如粉臨臥時先漱口後摻藥於牙縫上不過三兩上雄緑散治惡牙疳蝕腐臭雄黃銅緑各半兩一方加五倍子半兩麝香一字研勻荊芥水洗淨止之青金散治走馬惡疳牙疳蝕損唇舌肉腐牙落臭爛其效如神信砒銅緑各一分上研為細末攤紙上塗疳蝕處治沉腫牙疳不上不急者斗子鹽白麵上為末三捻吹入鼻中立效治急疳出聖惠方天靈蓋一分末羊齊花一分乾者搗為末上同研令細先以綿拭去膿水然後摻之以瘥為度紅礬散治走馬牙疳用緑礬不拘多少相礬色鮮明者入乾鍋用炭火燒鍋赤傾出以好酒拌勻再入鍋如此數遍色紅研作細末入麝香少許先以溫漿水漱淨用指蘸藥有疳處擦之治大人小兒走馬牙疳用壁蟲兒人中白各燒灰相合為末貼之治男女走馬疳瘡生於口上牙床等處用大天南星一個剜去心卻以雄黃一粒入天南星內仍以剜下南星片掩了以麵裹煨以折為度為細末干用清油調塗濕乾擦三日全愈治走馬牙疳用北棗去核入信棗內燒灰擦於腫處立效又方用白礬裝在壺兒內燈火燒過黃丹野人肝燒灰各等分停先用熱湯洗之就濕摻擦之一方用麝香少許金鞭散治腮穿牙落緊牙疳病證用抱退雞子軟白皮兒包活土狗兒一個放入大活蝦蟆口內用草縛四足泥團固濟用火燒過成灰去其泥蝦蟆研為細末貼患處治鼻疳牙疳用五倍子燒存性為末貼治急疳出聖惠方用砒霜半兩以醋調稀如糊於茶碗子內慢火熬攪令不著底待醋乾即刮下每用如粟米大用綿裹安齒縫內來日取出有蟲自死久患者不過三上麝香散出衛生家寶方治牙疳麝香一錢銅緑五錢白芨二錢五分白蘞三錢五分白礬二錢五分上為細末每用少許貼牙患處療齒根爛瘡出本草以羅勒燒為細末干貼齒上良羅勒即蘭香也除疳瘡出本草以蚺蛇肉作膾食之治急疳蝕口鼻數日盡欲死用文蛤燒灰臘脂和塗之文蛤即海蛤也生東海表有文取無時風疳附論夫風疳之病其候槽之齦虛腫牙齒搖動侵蝕齒根腐臭脫落上攻齦頰損爛膿血俱出者是也蓋緣手足陽明之經氣虛風邪熱毒在胃蘊積日久上熏胸間攻發口齒故成斯疾夫風疳者由臟腑壅滯久積風熱脾肺不利心胸痰飲毒之氣沖注上焦熏蒸牙齒則令齒齦浮腫動搖脫落損爛膿血俱出蟲蝕齒根口內常臭面色青黃唇頰腫痛者則是風疳之候也方青黛散出聖惠方治齒疳蝕頰骨破及下部有痔亦主之青黛研二兩雄黃研青礬燒研白礬燒研莨菪子熬令香附子炮裂去皮臍苦參細辛去苗葉藜蘆去蘆頭麝香研甘草炙各一兩上為細散更研如面以綿裹貼齒若痔病綿裹納下部中若下部有蟲浸甘草苦參各一兩煎為湯和散半錢灌之便止雄黃散出聖散方治牙齒風疳齦爛齒痛雄黃細研麝香細研熊膽天雄生去皮臍細辛當歸附子生去皮臍乾薑銼苦參銼生乾地黃蘆薈甘草銼以上各一分上搗細為散同研令勻以綿裹一錢安於齒根含之汁勿咽沉香散出聖濟總録治風疳齦爛牙齒浮腫沉香一分銼麝香研半兩地骨皮一兩當歸切焙升麻防風去皮各半兩芎藭三分桂去粗皮一分凝水石研一兩甘草炙銼黃柏去粗皮蜜炙各半兩上為散合研令勻每用一錢敷齒根或以綿裹如彈子大令化咽津牛酥膏出聖濟總録治齒齦虛軟而無膿血又口𧈟其齒齦觸著即膿血出又口疳其齒齦不觸自然膿血出又口瘻其齒齦有小孔如蜂窠形又齒疳其骨脆爛其齒齦唇口吻變作白色或作青紫黑色者是急疳之狀死不過旬日宜急救之先看唇頰邊有赤白黑脈處即須以針針去惡血便燒鐵篦烙之如此一變即定或附齒有黃色物如爛骨狀名為食床翼纏著齒者亦須細看之爾其齒齦永不附著齒根也病狀如前後方自有委曲也又雄黃膏療齒中疳瘡𧈟痿蟲蝕牙齒口裡之節皆療之其膏以十二月合即年得用難久停好牛酥五大兩黃臘半兩雄黃一小兩研硃砂二分研藁本半錢藜蘆二分杏仁去皮尖四分芎藭白芷鰻鱺魚升麻各三錢分上以酥中煎諸藥魚令黃色去魚煎三上三下入臘煎盡膏成收器中攪勿停手凝定以本方即諸藥併為末不去滓甚良每用少許塗患處一方無鰻鱺魚有白蜜硃砂散出聖惠方治牙齒風疳及一切疳蟲硃砂半兩細研雄黃半兩細研乾薑一分炮裂銼晚蠶子紙一張莨菪子一兩炒令黑黃色蜘蛛七枚乾者麝香半兩豬脂如雞子煉了者麻仁脂三二合犁鏵上鐵皮為末半兩甘草半兩上除脂油外搗為末後用豬脂油等和勻旋取塗於瘡上宿即瘥一月不得食醋又有內疳者夜含半棗大細嚼咽之青黛散出聖惠方治牙齒風疳齒及齦朽爛欲盡根出有蟲疼痛不可忍青黛細辛棘針微炒當歸香附子木香青葙子各半兩菖蒲乾薑炮裂銼胡桐律麝香細研各一分上為散每用半錢以綿裹含日四五度夜二度此無毒兼宜以溫水調一錢服之升麻散一名地骨皮散出十便良方治風疳蟲蝕齒痛極妙升麻當歸切焙防風去皮各一兩藁本去苗土一作木香甘草炙銼白芷細辛一兩芎藭一兩地骨皮一兩獨活一兩上為散每用五錢以水二大盞煎至一盞去滓熱含冷吐乾薑散出聖濟總録治風疳動搖挺出隱痛蟲蝕地薑炮白礬燒蛇床子微炒甘草炙銼細辛去苗葉蜀椒去目並閉口炒令汗附子炮裂去皮臍防風去叉各一兩藜蘆去蘆頭一分上為散每用一錢熱酒調熱漱冷吐日三度一方有白朮治牙齒風疳疼痛頰腫𧈟腐口臭方出聖惠方附子炮裂去皮臍莽草當歸獨活芎藭防風去蘆頭細辛李樹根皮各半兩川椒一百粒去目上為銼勻每用半兩以水二大盞煎至一盞去滓熱含冷吐芡實散出聖濟總録治風疳宣露出血不止脫落口臭雞頭實乾者桑條銼槐枝銼柳枝銼鹽豬牙皂角銼各一升生乾地黃焙地骨皮各一斤上盛新瓦罐中以碗蓋口紙裹鹽泥固濟令密曝乾炭灰燒通赤候冷取出搗羅為末旋入麝香少許揩之溫水漱早晨日午臨臥用八仙散治牙疳防風荊芥白芷川芎細辛地骨皮甘草羌活各等分上為粗末淋洗患處獨活湯出聖濟總録治風疳獨活去蘆頭當歸切焙藁本去苗土杏仁湯浸去皮尖雙仁炒生乾地黃焙各一分甘草炙銼細辛去苗葉各半兩上搗篩每用一錢水一盞煎十餘沸熱漱冷吐揩齒散出聖惠方治牙齒風疳血出疼痛細辛半兩白蒺藜半兩微炒川升麻半兩露蜂房半兩微炒黃柏半兩銼槐柳枝如筋粗者長三寸各七莖燒勿令過火白礬一兩一半燒令汁盡一半生用研令細上為細散研令勻用瓷盒盛用時先以熱鹽水漱口三五度後一如揩牙藥用之揩齦上微覺痛則止有津即吐之又方防風去叉羌活去蘆頭槐白皮黃芩去黑心地骨皮當歸切焙各三分升麻一兩上為散每三錢水一盞鹽少許煎三五沸熱漱冷吐升麻細辛散出聖濟總録治風疳癢痛侵蝕齦爛升麻細辛去苗葉藁本去苗土防風去叉芎藭凝水石研各一兩甘草炙銼半兩上為散取少許貼齒癢處又取一錢綿裹含化咽津常令藥味相接為佳皂莢散出聖濟總録治風疳宣露口臭皂莢去皮炙一鋌硇砂研白礬熬令汁枯甘松細辛去苗葉各一分鹽花研槐白皮銼各半兩上為散先用鹽揩齒後用散一錢敷患處麝香生肌散治大人小兒牙疳麝香青黛各一錢半乳香輕粉各一錢五色龍骨重研一兩苦葫蘆瓤一兩上為細末用時先用溫水漱口然後用藥臨臥用麝香散出直指方治疳𧈟齦爛口臭白礬煅青黛胡黃連蘆薈各一分麝香一字蝦蟆炙焦半兩上為末每服半錢敷患處治牙齒風疳疼痛不止出聖惠方李樹根白皮柳枝各二兩川椒去目棠藜枝郁李仁槐枝各一兩上細銼和勻分為八度每度用水二碗煎至一碗去滓熱含冷吐鶴蝨散出聖惠方治牙齒風疳膿血出根有蟲鶴蝨半兩細辛半兩露蜂房半兩燒灰膩粉一分麝香一分細研上為細末後入麝香膩粉在前藥中研令勻每臨臥時剪紙如柳枝葉樣塗藥貼於所患處一方濕帛子摻藥五分患處貼之紅玉縫子出宣明論治一切牙疳砒霜一塊皂子大黃丹少許魯土二錢葵子茯苓去黑皮各等分上為末每服四錢水一盞煎三沸食前一方無葵子茯苓用糊餅水浸和作劑子紝於牙縫治牙疳出神效方米二停鹽二停盆硝二停麝香少許白礬一停上相和水拌勻紙包裹燒黑焦為末貼瘡上立止治牙齒風疳及有蛀孔疼痛不止出聖惠方藜蘆一分去蘆頭川椒半兩去目附子半分去皮臍麝香細研雄黃細研各半兩上為散敷於齦上若有蛀孔疼痛即綿裹於孔中砒霜散出聖惠方治牙齒風疳骨槽風及口氣砒霜一錢麝香川升麻末訶黎勒皮末干蝦蟆灰各半錢上細研以皂莢五梃水浸透取汁熬成膏調散子塗於紙上剪作片子貼之吐中惡涎立效甘鬆散出聖濟總録治風疳蟲蝕肉盡甘松一分豬腎薄批炙乾一銼蘆薈研半兩膩粉研一分上為散臨臥時先漿水漱口後藥貼患處有涎即吐之牢牙散出聖濟總録治風熱出血及牙齒浮皂莢五錠燒存性小者用十錠附子一枚生乳香研半兩麝香研少許上為散如常揩齒良久漱之頻用為妙枸杞湯出聖惠方治風疳齒肉相離疼痛不得食枸杞細銼槐枝細銼柳枝細銼各一握黑豆粗搗三合上同於鐺中微炒令黃每用五錢酒一盞同煎十餘沸去滓熱漱冷吐鹽緑散出聖惠方治齒疳蟲蝕牙齒成片自落鹽緑研黃連麝香研各一分石膽研半分上研極細用綿裹齒孔痛處咬之瘥不過十遍一方為散每用一字摻於濕紙片子上貼之三兩度不過十日即痊若患口瘡者綿裹半錢含之牙疳藥治大人小兒牙疳揀信青黛輕粉各一錢麝香半錢上同為末用小油調薄攤紙上用木錘錘實收起每用臨臥以漿水洗淨即干可瘡口大小以藥紙封之至曉去藥紙漱淨勿令咽下大者不過三上必效升麻散出海上方治牙疳急宣露石辛散出海上方治如前寒水石十分細辛五分蓽茇三文荊芥三分上搗為末摻之止血血竭散血竭二錢龍骨二錢半食鹽不拘多少多年石灰不拘多少上為末貼牙疳芎藭湯治風沖牙齒搖動芎藭銼一兩半細辛去苗葉半兩防風去叉一兩薏苡仁一兩上搗篩每用五錢以水三盞煎至三十沸去滓熱含冷吐咽津無妨砒霜散出聖惠方治牙齒風疳膿血出根有蟲干膽一枚燒灰胡桃十枚燒灰砒霜一分蕎麥麵三合燒灰上同研令細每用一字於患處摻牛膝散出聖濟總録治齒癢風疳牛膝燒灰細辛去苗葉各一兩丁香三分上為散更研令細每一錢可患處貼之日三膽礬散治牙疳生肌散一兩爐甘石三錢膽礬半錢上為末貼之治牙疳出本事方川烏阿魏硃砂各等分上將阿魏醋浸入蒸餅搜作糰子切片焙乾同二味為末敷牙齦上不可漱口良久或咽下亦不妨藥消盡再用其效如神牙疳藥輕粉一錢黃連二兩上為細末搽牙患處玉粉錠治牙疳蝕損宣爛臭穢錠粉二錢信一字上研勻細煮白麵胳𦞂冷淘了劑為錠子如綿陰乾為黃末貼疳處後用麝香散治之麝香散黃連二錢銅緑一錢麝香少許上為細末貼疳蝕處蓋前藥牙疳臭方出直指方用蜘蛛殼為末入豬脂麝敷之或用大蜘蛛一枚以濕紙裹又用荷葉外包煅令焦存性為末入少麝研敷又蠶蛻紙燒入麝亦治牙疳香附可為齒藥治牙齒風疳膿血出牙根有蟲出肘後方用皂角莢去黑皮塗酥炙為末用半錢敷患處入少麝香亦得又以皂莢為末揩之一法用鹽等分燒為末揩疼處良又方出聖惠方用蚺蛇膽敷之效又方出聖惠方用硫黃三錢水三大盞以石鍋內煎稀錫入墨汁三合攪勻攤向好紙上漱淨口夜剪作片子貼之治牙疳用橄欖灰如無以黃丹代之麝香輕粉各少許同為細末用貼疳處信效散宣明論方治風熱上客陽明之經牙齒疳蝕齦宣腐臭血出色黃氣腐注悶動搖疼痛發作有時兼解中金石一切毒藥信砒一錢黃丹二錢千年石灰如無但以陳久者炒細研四錢上研細入青鹽一分麝香少許如無此二味亦得每上炒二兩大豆許先洗漱淨蘸藥搽上下牙齒齦瀝涎勿咽之須臾漱淨或有蛀處再上少許日三四次常用如意上以頻為妙或服金石藥致病便一日三四上更不上牙齒神效或以上牙齒者敷之即愈或平人常用頗能清利頭目寬膈美食使髭發遲白久用亦能因牙齒遲落考人氣於面而手足陽明經絡貫注憂思則氣結而血液不行燥炥鬱而血衰不能榮養髭發故早蒼黃而斑白也此藥能使陽明氣血宣通故效能然也又方使龍骨不用石炭治牙齒疳𧈟蛀牙出本草方取啄木鳥一隻燒為末納牙齒孔中不過三數齒漏疳附論夫手陽明支脈入於齒風邪客於經脈流滯齒根腫膿汁出愈而更發謂之齒漏疳也方棘刺散出聖惠方治齒漏疳膿血出齒齦宣露氣臭不能飲食棘刺半兩燒灰青葙子三兩當歸乾薑炮炙銼香附子雞舌香細辛川升麻以上各一兩上為散每用半錢以綿裹於患處咬之咽津以瘥為度青黛散出百選方治齒露疳出膿水不止青黛胡桐淚胡黃連蘆薈各半兩蝦蟆一枚燒灰麝香一分上同為末研勻每用半錢敷於患處麝香散出百一選方治齒漏疳蟲蝕齒齦臭爛麝香青礬燒赤黃礬燒枯各一分蘆薈半兩上同於乳鉢內細研為散先以綿拭齦上惡血出即用濕紙片子摻藥貼之富次律有女年數歲齒上忽生黑點後數日齦爛成走馬疳用前方即愈自後屢有奇效丁香散出聖惠方治齒露疳宣露及骨槽風膿血不止丁香一分生地黃五兩以竹刀子切於銅器內令黑色干蝦蟆一分炙莨菪子半兩炒黑麝香一錢細研上為散每至夜間用濕紙片子上摻藥可齒齦患處大小貼之有涎即吐以瘥為度銅青散出聖惠方治齒露疳銅青兩字穀精草末二錢砒霜半錢馬齒莧灰二字上於乳鉢內研令細臨臥時先以熱漿水漱口三五度後以手指取藥少許揩於齒齦上便合口候良久滿口津即吐之依前漱三五度又揩藥每日夜三五度用之以瘥為度鯽魚散出聖惠方治齒漏疳宣露膿血出大鯽魚一枚砒霜一分乾地黃末一兩上將割破鯽魚腹去腸入砒霜及地黃末以紙裹魚入火燒煙絶取出去其紙灰更入白礬灰麝香少許細研為散每用半錢摻濕紙片子上貼患處神功丸出東垣蘭室方治多食肉人口臭不可近牙疳蝕牙齒肉將脫牙齒落血不止黃連去須擇淨稱一兩酒洗縮砂仁半錢生甘草三錢藿香葉一錢木香一錢生地黃酒洗三錢當歸身一錢升麻二錢蘭香葉如無藿香代之上同為細末水浸蒸餅為丸如緑豆大每服一百丸或加至二百丸止白湯下食遠兼治血痢及血崩及血下不止血下褐色或紫黑色及腸癖下血空心服米湯下其脈洪大而緩者及治麻木厥氣衝逆氣上行妄見者齒齲附論夫手陽明之支脈入於齒足太陽脈有入於頰遍於齒者其經虛風氣客之絡縛齒間與血氣相乘則齦腫熱氣加之膿汁出而臭侵蝕齒齦謂之齲齒亦曰風齲方細辛湯出十便良方治牙齒齲腫痛膿汁不止細辛去苗葉附子去皮臍生用各半兩芎藭一兩上銼如麻豆每服五錢水二盞煎十餘沸去滓熱漱冷吐蝦蟆散出聖惠方治齒齲疼痛干蝦蟆一枚五月五日取者燒焦灰麝香研半錢柑皮細辛去苗葉各半兩白雞屎燒灰青黛研一作石黛乾薑炮雄黃研各一分上為散綿裹如黍米大納蟲孔中無蟲孔者貼一字於患處有涎即吐治牙齒風齲出聖惠方郁李根白皮切四兩細辛一兩鹽一合上切以水四升煮取二升半去滓納鹽含之取瘥柳枝湯出聖惠方治牙齒風齲隱痛動搖齒齦宣露柳枝一握銼地骨皮細辛防風去蘆頭生地黃銼蔓荊子杏仁各一兩湯浸去皮尖雙仁鹽半兩上銼如麻豆和勻每用一兩水一盞半同煎至一盞去滓熱含就於患處良久倦即吐之含盡為度日二盡此一劑永瘥更不再發酒水各一盞煎亦佳蜀椒湯治牙齒風齲疼痛蜀椒去目並閉口炒出汗芎藭細辛去苗葉升麻莽草防風去叉黃芩去黑心各一分上搗篩每用五錢水二盞煎三五沸去滓熱漱冷吐白礬散出聖惠方治齲齒腫出膿汁白礬枯一分蟾酥半分麝香雄黃熊膽俱各半分干蝦蟆一枚燒灰上研勻令極細每用半錢敷齒根藜蘆散出肘後方治牙齒齦宣露疼痛疳𧈟藜蘆去蘆頭莽草各半兩細辛去苗葉垣衣東牆上取鹽各一兩棘刺四十九枚有鉤者上搗末水調成劑以蕎麥麵四兩和作餅子裹之燒令通赤於醋中蘸焙乾搗羅為散用柳枝咬頭令軟搵散置齒間良久溫水漱早晨臨臥用之一法用炭灰火燒令煙盡又以薄醋淋過重二三遍勿令作灰每日揩牙齒淨漱口麝香散治牙齒風齲疼痛麝香研硇砂研各半分細辛去苗葉青黛研升麻各一分上為散先以針撥開蟲處點藥於蟲孔中藥行痛即止白附子散出千金方治牙齒齲疼痛亦治口氣白附子一分生用甘草細辛芎藭高良薑各一分銼上為散以綿裹少許於齲齒上有津出勿咽一日兩度含之一方無細辛用知母雄黃煎治牙齒風齲疼痛作臭出膿雄黃研葶藶紙上炒為末各一兩麝香研半錢蘆薈研半分先以臘月豬脂三兩煎化去滓次下葶藶末煎少頃次三味研藥搗勿住手候成煎瓷盒盛先刮齒令淨針去惡血以綿拭乾塗之仍用鐵篦子尉烙三兩度次用後方芎藭升麻藁本去苗土各半兩獨活去蘆細辛去苗葉各一分上搗羅為末量患處貼之松脂湯出聖惠方治牙齒風齲疼痛松脂二兩一作松節皂莢炙去皮子一梃鹽一分上銼每服五錢水二盞煎五七沸去滓熱漱冷吐烏頭湯出聖惠方治牙齒風齲疼痛烏頭乾裂去皮臍獨活去蘆郁李仁湯去皮各半兩一方用根上銼如麻豆每用五錢好酒一升綿裹藥於酒中浸一宿煎十餘沸熱漱冷吐治療牙齒風齲出聖惠方用鼠黏子四兩煮取二升半濾去滓適寒溫含之冷吐別含瘥治齲齒出肘後方用松枝鋭如錐任齲齒孔內須臾齲蟲緣松枝出一方取松枝少許漱之蟲自死烏頭丸治牙齒齲疼痛烏頭炮裂去皮臍半兩五靈脂一兩上為末以醋一升煮大棗二十枚醋盡為度取棗肉和藥丸如緑豆大用綿裹一丸於痛處咬勿咽津茱萸丸治牙齒風齲吳茱萸湯洗焙乾炒夜明沙炒各一分上為末以蟾酥丸如麻子大綿裹一丸痛處咬勿咽津治療齒有孔附子二分炮分皮蜜蠟五分上相和為丸塞齒孔中即瘥忌冷水油膩治齲齒及蟲痛方出千金方用切白馬懸蹄如米許以綿裹著痛處孔中不過三度一方出聖惠方治齲齒疼痛用葫蘆子半升水五升煮三升去滓含漱吐之莖葉亦可不過三劑瘥治風齲齒用柳枝銼一升大豆一升合炒豆炮盡於瓷器成之清酒三升漬之經三日含之頻吐治齲齒出肘後方用郁李根白皮以水煮濃汁含之冷即吐出蟲一方用李根白皮治齲齒痛有蟲出聖惠方用雄雀糞用綿裹塞孔中日一二易之治齲齒出十便良方用雞舌香煮汁含之瘥治牙齒風齲用薏苡根四根水四升煮取二升含冷易之扣齒法養生方云朝夕扣齒齒不齲又云食畢當漱口數過不爾使人病齲齒治齲齒出本草以苦參作湯日漱三次出入慎風五六日愈昔淳于意醫齊中大夫病此灸左手陽明並服此藥愈齲齒方出本草搗皂角去皮炙為末塗齒上吐之
