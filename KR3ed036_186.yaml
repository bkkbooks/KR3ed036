body:
  text: 卷一百八十六諸痹門風濕痹身體手足不遂附論夫風濕寒三氣合而成痹其氣來時亦有偏多偏少而風濕之氣偏多者名為風濕痹也凡人腠理虛者則風濕氣傷之搏於氣血氣血不行則不得宣通真邪相擊在肌肉之間故其肌膚盡痛或皮膚癮疹然諸陽之經宣行陽氣通於身體風濕客於肌膚合而為痹傷諸陽之經則陽氣之行遲緩而機關弛縱筋脈不收若風濕痹而遍於身體故手足不得遂也方仙靈脾丸出聖濟總録治風濕痹肢節疼痛身體手足不遂仙靈脾三分防風去皮半兩羌活去蘆白附子炮犀角屑羚羊角屑乳香細研虎脛骨酥炙黃附子炮去皮當歸切焙牛膝酒浸切焙鹿茸酥炙去毛石斛去根苗銼海桐皮細銼各三分乾蠍炒半兩烏蛇酒浸去皮骨炙二兩麝香研一兩桂去粗皮半兩檳榔銼半兩木香半兩天麻一兩天南星炮半兩白薑半兩上為末與研者拌令勻煉蜜搗五七百杵丸如梧桐子大每服三十丸食前溫酒下當歸散出聖惠方治風濕痹嚲曳或手足不遂或風入五臟恍恍惚惚多語喜忘又時恐怖或肢節疼痛頭眩煩悶或腰脊強直腹滿不食當歸一兩炒升麻半兩川烏頭半兩炮去皮五味子半兩天門冬一兩去心焙赤芍藥半兩遠志半兩去心獨活半兩麻黃一兩去根節防風半兩去蘆芎藭半兩乾薑一兩炮銼秦艽一兩去苗桂心半兩大豆一合炒熟石斛半兩去根甘草三分炙銼人參半兩去蘆白茯苓二兩紫菀半兩去苗土石膏一兩黃耆半兩杏仁浸去皮尖及雙仁麵炒上銼為散每服四錢水一盞煎至五分去滓入酒一合更煎一兩沸不計時候溫服萆薢丸出聖惠方治風濕痹身體手足收攝不遂肢節疼痛言語謇澀萆薢薏苡仁天雄炮去皮臍牛膝去苗各一兩當歸銼微炒莽草炙天麻天南星炮白附子炮芎藭川烏頭各半兩炮去皮海桐皮羌活躑躅花各三分醋拌炒乾乾蠍炒蟬殼各一分上為末煉蜜和搗三五百杵丸如桐子大每食前豆淋酒下二十丸防風湯出聖惠方治風寒濕痹筋脈攣急及偏風身體手足不遂防風去皮薏苡仁三兩麻黃去根節煮焙乾四兩白朮芎藭細辛去苗葉羌活去蘆茵芋去粗皮狗脊去毛牛膝酒浸焙萆薢側子炮去皮臍杏仁去皮雙仁炒黃赤箭桂去粗皮各一兩上銼如麻豆每服四錢水一盞生薑三片同煎至八分去滓溫服不拘時候木瓜虎骨丸出瑞竹堂方治風寒濕客於營衛合而成痹腳重不仁疼痛少力足下隱痛不能踏地腰膝筋攣不能屈伸及項背拘急手臂無力耳內蟬鳴頭旋目眩及腳氣諸證行步艱難並宜服之木瓜麒麟竭研沒藥研虎脛骨塗酒炙木香自然銅醋淬七次楓香脂骨碎補去毛當歸切焙甜瓜子敗龜酥炙去裙襴桂各一兩安息香一兩湯酒入藥乳香研半兩地龍去土二兩上除研藥外為細末拌勻酒麵糊為丸如梧桐子大每服三十丸空心木瓜湯下溫酒亦得漸加至五十丸忌食冷物濕面諸血等物換腿丸出直指方治足三陰經虛為風寒暑濕進襲攣痹緩弱上攻胸脅背下注腳膝疼痛漸成風濕腳氣行步艱辛手足如火上氣喘急飢不思食薏苡仁炒石南葉石斛牛膝去苗酒浸萆薢炒天南星炒羌活去蘆防風去蘆黃耆去蘆蜜炙當歸去苗酒浸天麻去苗續斷各一兩半檳榔二兩半木瓜四兩上為末酒煮麵糊為丸如梧桐子大每服五十丸溫酒湯下一方加蒼朮川芎各一兩橘皮湯下天麻散出聖惠方治諸痹身體痛麻或多搔癢筋脈拘急言語謇澀手足不遂天麻白附子炮羌活去蘆防風去皮芎藭獨活去蘆當歸切炮桂去粗皮各半兩牛膝酒浸焙白殭蠶炒各三分乾蠍炒麻黃去根節各一兩萆薢三分上為散每服二錢暖竹瀝酒調下不計時候烏頭湯出本事方治風冷濕痹留於筋脈拘攣不得轉側亦治腳氣大烏頭細辛川椒甘草秦艽附子官桂白芍藥各七分乾薑白茯苓防風當歸各一兩川蜀椒一兩三錢半上為粗末每服三錢水一盞半棗二枚同煎至八分去滓空心食前服若熱毒少多服蓋如類中用續命排風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此疾積習已久非一日所能攻皆大劑久而取效唐書載王太后中風喑默不語醫者蒸黃耆數斛以熏之得瘥皆此類也今人服三五盞求效責醫也亦速矣孟子曰七年之病求三年之艾久而後知爾防風飲出聖濟總録治風寒濕痹半身不遂不能言語四肢麻木或不知痛癢防風去皮一兩麻黃去節湯煮焙一兩半石膏黃芩去黑心芎藭當歸炒焙各半兩桂去粗皮一兩杏仁去皮炒二十枚熟地黃焙甘草炙各半兩上搗篩每服五錢水二盞煎取一盞去滓空心食前溫服日二夜一巴戟天湯治風寒濕痹腳膝疼痛行履不得羌活湯出聖濟總録治風濕身體手足不遂疼痛羌活去蘆三分防風去皮一兩五加皮銼半兩薏苡仁炒半兩赤芍藥一兩羚羊角半兩檳榔二枚煨銼磁石醋煅二兩半上搗篩每服六錢水二盞入生薑五片煎取一盞去滓空心食前溫服日二夜一菖蒲散一名六生散治風寒濕痹手足不遂五痹湯出和劑方治風寒濕邪客留肌體手足緩弱麻痹不仁或氣血濕鬱痹滯不仁並皆治之片子薑黃洗去灰土羌活白朮防己各一兩甘草炒半兩上㕮咀每服四錢水一盞半生薑一片煎至八分去滓病在上食後服病在下空心食前服一方用防風不用防己加海桐皮亦治腳疼牛膝散出聖濟總録治風寒濕痹肢體腰膝冷痛疼痹滯不相通牛膝去苗酒浸焙半兩桂去皮一分山茱萸半兩上為散每服二錢溫酒調下空心食前日再海上方一名木瓜丸治風濕客搏手足腰膝不能舉動治風濕痹身體手足收攝不遂肢節疼痛言語謇澀出聖惠方上用躑躅花不限多少以酒拌蒸一炊久取出晾乾為末牛乳一合酒二合令熱調下一錢排風湯出治風經驗方治風疾身體拘攣麻痹精神錯亂心多怔忡獨活白茯苓麻黃去節各一兩半白蘚皮川芎當歸切焙桂去皮不見火甘草炙杏仁去皮炒各一兩上搗篩為粗末每服五錢水一盞半生薑四片煎至一盞濾去滓通口服空心食前日進三服治腰腳不隨出本草取虎腰脊一具細銼訖以斧於石上更捶碎又取前兩腳如前細捶之兩件並於鐵床上以大炭火翻轉炙勻候待脂出投濃美無灰酒中密封春夏一七秋冬三七空腹隨性飲多則多飲少則少飲未飯前三度溫飲之大戶以酒六七斗止小戶二斗止患十年以上者不過三劑七年以下者一劑必瘥又一方虎脛骨五六寸以來盡刮去肉膜等塗酥炙令極黃熟細搗絹袋子盛以酒一斗置絹袋子於瓷瓶中用粳火微煎至七日後任情吃之當微利便瘥治賊風手枯足痹四肢拘攣茵芋酒主之熱痹附論內經於痹論有云其熱者陽氣多陰氣少陽遭陰故為熱痹蓋臟腑壅熱復遇風寒濕之雜至客於經絡留而不行陽遭其陰故𤸷痹熻熱而悶也防風丸治熱痹防風去皮羌活去蘆茯苓去木牛膝酒浸焙桂去粗皮參枳殼去瓤麩炒五加皮銼芍藥丹參薏苡仁玄參麥門冬去心焙生地黃焙一兩磁石煨醋淬四兩檳榔銼二兩松子仁大黃銼炒木香各半兩上為末煉蜜為丸如桐子大每服溫酒下三十丸加至四十丸空心食前石南散治熱痹肌肉熱極體上如鼠走唇口反縱皮膚色變兼治諸風石南葉濃醋炒山芋各一兩黃耆銼三分天雄炮去皮臍一兩山茱萸一兩半石膏另研升麻各二兩葳蕤銼一兩甘草炙銼三分丹砂一分另研仍末一處石膏同研桃花生用菊花未開者各三分珍珠別研一分上為末次入所研藥拌勻每服一錢空心溫服酒調下日二夜一漸加至二錢升麻湯治熱痹升麻湯治熱痹肌肉熱極體上如鼠走唇口反縱皮膚色變及諸風皆治之升麻三兩茯神去木人參防風犀角鎊羌活各一兩官桂去皮半兩上銼散每服四錢水二盞薑二片竹瀝少許同煎至一盞不拘時候溫服生地黃湯治熱痹生地黃研取汁竹瀝荊瀝各一升羌活去蘆三兩防風去蘆三兩附子一枚重者炮去皮臍拍破之上除前三味外餘三味銼如麻豆每服三錢水一盞半地黃汁竹瀝荊瀝各少許同煎數沸去滓取一盞不拘時候溫服治熱痹腹中極熱細劈鱉肉五味煮食之當微泄去一切毒氣除熱痹腹中淋露下淋血散五臟結積內熱用大豆煮飲服之肝痹附論內經謂風寒濕三氣雜至合而為痹又曰以春遇此者為筋痹又曰筋痹不已復感於邪內舍於肝蓋五臟皆有合病久而不去者內舍於其合肝之合筋也故筋痹不已復感於邪則舍於肝也其證夜臥則驚悸小便數上為引如懷者是也人參散治肝痹氣逆胸脅引痛眠臥多驚筋脈攣急鎮肝去邪人參二兩酸棗仁炒杜仲去皮炒黃耆蜜炙茯神去木各一兩五味子熟地黃芎藭細辛去苗秦艽去苗羌活去蘆丹砂飛研各半兩上除丹砂外同為散入丹砂研勻每服一錢溫酒調下不拘時候日三細辛湯治肝痹氣虛兩脅脹筋脈拘急不得喘急四肢少力眼目不明細辛去苗葉防風去皮白茯苓去黑皮柏子仁研山茱萸桃仁水浸去皮尖雙仁麵炒令黃甘草炙各二分蔓荊子半兩木瓜一兩枳殼麵炒半兩萆薢五加皮各一兩上銼如麻豆每服三錢水一盞大棗三枚劈破同煎數沸去滓取七分溫服防風湯治肝痹頭目昏塞四肢不利胸膈氣煩防風去皮一兩芎藭黃耆銼五味子人參茯神去木獨活去蘆羚羊角鎊前胡去蘆各三兩細辛去苗葉酸棗仁炒甘草炙各半兩上搗篩每服三錢水一盞大棗三枚劈破同煎取七分去滓溫服不計時候補肝湯治肝痹兩脅下滿筋急不得太息疝瘕四逆搶心腹疼目不明白茯苓去皮一兩二錢山茱萸烏頭四枚去皮臍柏子仁研薏苡仁獨活各半兩附子三枚炮去皮臍桂去皮各三分甘草炙銼半兩防風去皮細辛去苗葉各二兩上銼如麻豆入研藥拌勻每服五錢水一盞半大棗二枚擘破同煎數沸去滓取一盞服不計時候牛膝湯治肝痹筋攣肢體不遂薏苡仁湯治肝痹筋不利拘攣急痛夜臥多驚上氣煩滿薏苡仁羌活去蘆蔓荊子荊芥穗各二兩白朮木瓜去核防風去皮牛膝酒浸焙甘草炙各一兩上銼如麻豆每服四錢水一盞半入薑五片煎至一盞去滓稍熱服茯神散出聖濟總録治肝痹多驚悸神思不安茯神去木酸棗仁炒黃耆人參各一兩遠志去心熟地黃焙五味子各半兩白茯苓去皮一兩丹砂另研半兩上除丹砂外為散入丹砂末再研每服一錢以溫酒調下不拘時候萆薢丸出聖濟總録治肝痹筋脈緩去邪毒調營衛萆薢羌活去蘆天麻酒浸焙各一兩附子炮去皮半兩沒藥研乳香研各一分上為末入沒藥乳香同研勻煉蜜為丸如彈子大每服一丸空心溫酒下日再補肝湯出聖濟總録治肝痹兩脅下滿筋急不得太息疝瘕四逆搶心腹痛目不明白茯苓去皮一兩二錢烏頭四枚去皮臍蕤仁研柏子仁研防風去梢細辛去苗葉各二兩山茱萸桂去皮各三分甘草炙銼半兩上銼如麻豆大入研藥拌勻每服五錢水一盞半入大棗二枚同煎數沸去滓取一盞服不計時候心痹附論內經言風寒濕三氣雜至合而為痹又曰以夏遇此為脈痹脈痹不已復感於邪內舍於心是為心痹其狀脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐蓋淫氣憂思痹聚在心經所謂諸痹不已亦益內者如此聖惠方云心虛而邪乘愊愊如滿隱隱而痛謂之心痹則怠於飲食診其脈弦而強是其候也方犀角散出聖濟總録治心痹精神恍惚恐畏悶亂不得眠臥志氣不定言語錯誤犀角屑牛黃另研麝香另研羚羊角屑各一分丹砂另研半兩防風天麻獨活去蘆龍齒各一分人參茯神去木沙參去蘆天竺黃另研升麻麥門冬去心焙半兩白蘚皮一分遠志一分龍腦另研甘草炒一分上除別研者外為散同研藥一處拌勻再細研每服二錢煎麥門冬湯