參當歸切焙杜仲去皮各一兩肉蓯蓉酒浸切焙一兩半磁石煨醋碎細研水飛一兩上為細末煉蜜和勻搗三五百杵丸如桐子大每服二十丸加至三十丸空心及晚食前溫酒下乾漆丸出指南方治骨痹皮肉寒鹿茸乾地黃各四兩乾漆半兩上為末煉蜜丸如梧桐子大每服三十丸空心溫酒下血痹附論夫血痹之狀形體肌膚如被微風所吹者是也蓋血為陰邪入於血而痹故謂之血痹先針引陽氣後以藥治之聖惠方云風血痹者由體虛故陰邪入於血經故也入於血經而為痹故為風血痹也其狀形體如被微風所吹此由攸樂之人骨弱肌膚充盛因痹勞汗出膚腠易開為風寒所侵故也診其脈自微而澀在寸口關上小緊者為風血痹也急針引陽氣令脈和則愈方黃耆湯一名小黃耆酒出鮑氏方治血痹及諸痹甚者四肢不遂風濕寒痹舉體腫疼痛不仁兼治風虛痰癖四肢偏枯兩腳弱手不能上頭或小腹縮痛脅下攣急心下有伏梁脅下有留飲夜夢悲愁不樂恍惚善忘由風虛五臟受邪所致或久座腰痛耳聾卒起眼眩頭重或舉體脹痛疼痛飲食不思畏寒冷胸中痰滿心下氣塞及婦人産後余疾風虛積冷不除者大黃銼生一兩山茱萸二兩乾薑炮三兩半黃耆獨活去蘆防風去皮甘草炙白朮蜀椒去目並閉口者炒出汗附子炮去皮臍牛膝芎藭細辛去苗葉各二兩當歸切焙桂去皮二兩半葛根秦艽去苗土烏頭炮裂去皮臍以上三味各二兩上銼如麻豆用夾絹袋盛貯以清酒一斗浸之春夏五日秋冬三日初服三合日再夜一漸增以知為度虛弱者加蓯蓉二兩下利者加女薑三兩多忘加石斛菖蒲紫石英各二兩心虛加茯苓人參各二兩山藥三兩酒儘可更以酒二斗重漬服之不爾可曝滓搗下篩酒服方寸匕不知少增之服一劑得力令人耐寒冷補虛治諸風冷神妙壯人服無熬煉老弱人微熬之乾地黃丸出聖濟總録治血痹去邪益心悅顏色壯筋力生乾地黃焙二兩半五味子桂去粗皮秦艽去苗土獨活去蘆附子炮去皮臍石斛去根各二兩半遠志去心一兩萆薢炒肉蓯蓉酒浸切焙菟絲子酒浸另搗蛇床子炒牛膝酒浸切焙狗脊去毛各一兩半訶黎勒皮檳榔銼各三兩半桃仁去皮尖雙仁炒兩半上為細末煉蜜和丸如桐子大每日空心食前溫酒下二十丸萆薢酒出聖濟總録治血痹及五臟六腑皮膚骨髓肌肉筋脈等疾不問新久萆薢防風去皮菟絲子杜仲去粗皮銼炒黃耆菊花天雄炮去皮臍石斛去根生乾地黃焙地骨皮續斷金牙煨醋碎石南肉蓯蓉酒浸切焙蜀椒去目閉口者出汗各一兩上㕮咀夾絹袋盛貯以無灰酒五升浸二七日每次量性服候減一升即旋添酒一升藥薄即別制年老人亦可服萆薢丸出千金方治血痹手足𤸷麻不仁遊走無定風痹等證萆薢炒山芋牛膝酒浸切焙各一兩白朮半兩地膚子炒半兩乾漆炒令煙出蠐螬天雄炮去皮臍各三分澤瀉一兩熟乾地黃焙一兩茵芋去皮莖一錢狗脊去毛半兩山茱萸一兩車前子炒三分上除蠐螬研入外搗羅為末和令勻煉蜜和丸如梧桐子大空心食前溫酒下十丸至十五丸日二夜一地黃丸治風寒痹走無定處及諸風痹方見乾地黃丸茵芋酒出聖濟總録治風血痹肌體手足痿弱四肢拘攣茵芋去粗皮附子炮去皮臍天雄炮去皮臍烏頭去皮臍秦艽去土女萎防風去梢羊躑躅防己石南細辛去苗葉桂去粗皮各一兩上㕮咀如麻豆夾絹袋盛貯以清酒五升浸之冬七日夏三日秋五日春五日初服一合日三漸增萆薢丸治風邪遊走無定處名曰血痹防風湯出醫方大成治風血痹皮膚不仁防風去皮半兩甘草炙銼半兩獨活去蘆三分赤茯苓去皮當歸秦艽去苗土各一兩茵芋去粗蒸半兩桂去粗皮三分杏仁湯去皮尖雙仁麵炒半兩上搗篩每服四錢水酒各七分入生薑五片煎至八分去滓溫服不計時候一方有赤芍藥黃芩各一兩無茵芋芍藥湯一名側子散出聖惠方治風血痹身體不仁肉冷赤芍藥側子炮去皮臍桂去粗皮麻黃去根節萆薢炒當歸切焙丹砂各一兩細辛去苗葉甘草炙銼各半兩上銼如麻豆每服三錢水一盞入生薑五片同煎至六分去滓溫服不計時候麻黃散出聖惠方治風血痹肌膚不仁四肢緩弱麻黃三分去根節烏蛇二兩酒浸炙令黃去皮骨白朮防風去蘆桂心當歸各三分銼微炒蛜𧌴一分微炒去足附子一兩炮去皮臍上為細散每服不計時候以豆淋酒調下一錢茵芋散出聖惠方治風血痹體虛風邪入血肌膚頑痹茵芋天雄炮去皮臍石南附子炮去皮臍桂心秦艽去苗防風各一兩去蘆川烏頭半兩去皮臍躑躅花半兩醋拌勻炒乾上為末每服不計時候以溫酒調下一錢黃耆湯出千金方治血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風狀者蜀黃耆人參芍藥桂心各二兩生薑六兩大棗十二枚上㕮咀以水六升煮取二升服七合三服令盡黃耆五物湯出三因方治骨弱肌重困疲勞汗出臥不時動搖加以微風遂作血痹脈當陰陽俱微尺中小緊身體如風痹狀黃耆芍藥桂心各等分上銼散每服四錢水二盞薑五片棗三枚煎至七分去滓食前服日三一方有人參腸痹附論內經曰腸痹者數飲而出不得中氣喘爭時發飧泄夫大腸者傳導之官其所以傳導者皆沖和之氣今風寒濕三氣乘虛客於腸間則邪留而和氣閉矣故其證數飲而氣不得出中氣喘爭時發飧泄大小腸氣痹水道不通故雖多飲而不得溲便氣並於大腸使糟粕不化故中氣喘爭時發飧泄也方木香丸出聖濟總録治腸痹腹脹滿痛時復飧泄食不消化小便祕澀木香白朮桂去粗皮蕪荑高良薑銼各一兩訶黎勒煨用皮一兩半乾薑炮三分附子炮去皮臍一兩肉豆蔻去殼半兩甘草炙各半兩厚朴去皮生薑汁炙過二兩上為末以曲末煎作糊和搗三二百杵丸如梧桐子大食前生薑棗湯下二十丸吳茱萸散治腸痹寒濕內搏腹腸滿氣急大便飧泄吳茱萸湯洗焙乾炒肉豆蔻仁乾薑炮甘草炙各半兩陳橘皮湯去白焙高良薑厚朴去粗皮生薑汁炙各二兩縮砂仁白朮各一兩上為散每服一錢稀粥飲調下食前服草豆蔻散出聖濟方治腸痹寒濕內攻腹痛飧泄草豆蔻陳橘皮湯浸去白各一兩桂去皮木香白朮當歸切焙白豆蔻仁高良薑各三錢上為散每服一錢煎生薑棗湯調下食前服訶黎勒湯出聖濟録治腸痹飧泄腹脹氣痛飲食不化訶黎勒煨用皮一兩半附子炮去皮臍一兩木香半兩當歸切焙三分桔梗炒半兩肉豆蔻去殼三分吳茱萸湯浸七次焙乾炒一分陳橘皮湯浸去白三分甘草炙銼一分上搗篩每服三錢水一中盞入生薑半分棗二枚煎至七分去滓食前稍熱服木香散出聖濟録治腸痹腹脹飧泄小便不利杏仁三兩訶黎勒焙皮半兩附子炮去皮臍一兩乾薑炮一兩厚朴去粗皮生薑汁炙二兩甘草炙半兩枳實去瓤麵炒一兩赤茯苓去皮一兩當歸炒一兩上為末每服二錢粥飲調下食前赤茯苓丸出聖濟録治腸痹腹滿喘急小便不利大便飧泄赤茯苓去黑皮白朮桂去粗皮各二兩訶黎勒煨去木香陳橘皮湯去白焙厚朴薑汁炙各一兩上為末煉蜜為丸如梧桐子大每服三十丸米飲下空心食前日二次服訶黎勒丸出聖濟録治腸痹飧泄腹脅脹滿訶黎勒煨用皮當歸微炒黃連去須白朮厚朴去皮薑汁炙各一兩乾薑炮三分木香三分上為末煉蜜和搗三二百下丸如梧桐子大每服三十丸粥飲下不拘時候胞痹附論內經謂胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出矣今風寒濕邪入於胞中則氣閉不能化出也故胞滿而水道不通其證少腹膀胱按之內痛若沃以湯澀於小便以足太陽經氣閉故熱而痛也上為清涕以足太陽經其直者從顛入絡腦腦氣下灌出於鼻竅則為清涕矣方治胞痹臍腹疼痛小水不利山芋附子炮去皮臍續斷各一兩杜仲去皮酥炒巴戟天去心一兩半桑螵蛸焙切以面令炒黑色為度一兩遠志去心三分石斛去瓤各三分鹿茸酥炙去毛龍骨菟絲子酒浸一宿另搗三錢五味子山茱萸桂去皮各三錢生乾地黃焙另於木臼內搗肉蓯蓉酒浸去皮切焙各一兩上為細末別搗者相和令勻煉蜜為丸如梧桐子大每服空心溫酒下三十丸黃耆湯治胞痹少腹膀胱按之內痛黃耆銼當歸切焙甘草炙黃芩去黑心遠志去心焙五味子芍藥人參赤茯苓去黑心麥門冬去心焙澤瀉生乾地黃焙桂去皮防風各一兩乾薑半兩上搗篩每服五錢水二盞半入羊腎一隻細切大棗二枚擘破同煎至一盞去滓空心服秦艽酒一名牛膝湯治胞痹人參湯治胞痹小便不利人參芍藥麥門冬去心焙當歸切焙生乾地黃酒浸去土焙甘草炙芎藭遠志去心赤茯苓去黑皮五味子各一兩黃芩去心半兩桂去粗皮三兩乾薑炮一兩上搗篩每服五錢先用水二盞煮羊腎一隻至盞半除腎下藥末大棗三枚擘破同煎至一盞去滓空心溫服日二茯苓丸一名防風丸治胞痹少腹內痛腎瀝湯治胞痹小腹極痛小便赤澀桑螵蛸十枚切破炙令黃犀角屑麥門冬去心焙五加皮各兩半杜仲去皮酥炙木通桔梗炒各一兩赤芍藥三分上搗篩每服五錢水一盞半入羊腎一隻去脂膜切竹瀝少許同煎至一盞去滓空服日再一方用桑白皮無桑螵蛸百合飲治胞痹補益生百合三兩赤茯苓去黑皮二兩麋角屑三兩麥門冬去心焙肉蓯蓉酒浸切各一兩半黃耆一兩薏苡仁三合上銼如麻豆大每服五錢水一盞半煎至八分去滓溫服空心日再溫腎湯治胞痹小便不利腰脊疼腹背拘急絞痛赤茯苓去黑皮白朮澤瀉乾薑炮各四兩腎著湯出宣明論治胞痹小便不利赤茯苓去黑皮白朮各四兩乾薑炮二兩甘草炙三兩上㕮咀每服四錢水二盞煎至一盞去滓溫服空心食前各一服
