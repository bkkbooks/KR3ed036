為末每服二錢溫酒調湯服尤好童子小便亦得療胞衣不出令胞爛澤瀉葉三兩滑石五兩屑生麻油二合上以水一升半煮澤瀉取七合去滓內滑石生麻油頓服之療衣不出方當戶燒黍穰即出治胎衣不下用香油一盞熬熟即下黃蠟一兩重服之立下治胎下血不止取桃樹上幹不落桃子燒作灰和水服即瘥治胞衣不下欲死者用燈心為球送入竹筒內打實用火燒灰為末用無根倒流水送下治産後胞不時出方取井中黃土丸如梧桐子大水吞之立出井水和服亦治小兒不出滑石湯治胞不出腹內疼痛不可忍心頭妨悶四肢昏沉不欲言語滑石瞿麥桂心赤芍藥石葦檳榔甘草炙微赤葵子赤茯苓地榆銼各一兩上件藥都銼以水一大盞半煎一盞入酒一小盞更煎三五沸去滓分溫三服又方用蔥白十莖並須以銅盆中熱水烹之候冷熱得所令産婦就上坐以蔥氣熏須臾即下又方取生地黃汁一大盞同酒暖分三服立效治胎衣不下惡血湊心其證心頭迷悶胎衣逆上衝心須臾不治則其母即亡大附子一枚炮去皮臍為末乾漆半兩為末上用大黃為末半兩酒醋熬干卻入前二味為丸如梧桐子大每服三丸淡醋湯吞下須臾又進二服胎衣立下此藥可預先合下如無前藥用赤小豆一升炒過用水三升煮取二升去豆取汁溫服其胎衣立下又無赤小豆用婦人自己手足指甲燒灰酒調下須臾又進一服更令有力婦人抱起徐徐將竹筒於心上趕下為妙蒺藜子散一名貝母散治産困乏腹痛目有所見兒及衣俱不下又方取炊箄當戶前燒為末每服四錢以水一盞煎六分去滓溫服治産後衣未下催衣方官桂去皮一兩半牛膝木通草川芎各一分上為細末每服四錢蔥湯半盞童子小便半盞下藥末煎一兩沸和滓熱服未下再服治衣不下用萆麻子研細敷足心急洗去不爾腸出即用此膏塗頂腸當自入又方治胎不下用葵根淨洗研絞取汁飲又方用草鞋鼻繩路上拾洗淨燒灰童便和酒調服孫真人方産母頭髮刺喉中取吐即下集驗方用穿山甲炮為末調酒一錢服治胞中血物困極者螻蛄一枚煮取汁灌入口即下治産難後胞衣不出及余血搶心脹欲死者以兔皮和毛燒灰為末以酒調方寸匕服之即産衣不下者服之即下治胞衣不出以貝母七粒為末酒下又方以婦裩覆井口立下取本婦人者佳治難産胎衣不出以烏芋搗汁一升治胎不出以真珠末一兩苦酒調服産後胎衣不下以蓮房蓮葉酒煮服之治産後胞衣不出以蟪蛄腦煮汁服之盤腸産附論昔趙都運恭人每臨産則子腸先出産子衣下之後其腸不收甚以為苦名曰盤腸産不能療偶在建昌得一坐婆施之一法而收之其法遇産後子腸不收之時以醋半盞新汲冷水七分碗調停一噀一縮三噀收盡此良法也方療盤腸生産不能者用東行芙蓉根去上粗皮用內白皮嫩者去木爛擂水用鵝翎毛拂上即自入如不然以試豬母即見驗治盤腸獻花産者醫書不述其事然亦可驚有臨分娩産腸先出兒即隨産俗用冷水噀産母面其産腸自收此法虛弱之人切不可用恐驚怯成病或即脫絶舊法以萆麻子四十九粒研爛塗腦頂自然收上如收了即以水洗去頂上萆麻又有久而腸為風吹乾不能收者以磨刀水少許火上溫過以潤盤腸煎好磁石湯一杯令産母服自然收治推腸生方又名盤腸産以半夏為末搐鼻中則腸上矣又方以大紙捻以麻油潤了點燈吹滅以煙燻産婦鼻中腸即上矣樗枝散治産後子腸下出不能收拾不論年深者皆治之用樗枝取皮焙乾一握水五升連根蔥五莖漢椒一撮同煎三升去滓傾在盆內乘熱裹候通手淋洗傾入五升瓶內再煎一沸依前用一服可五度用洗了睡少時忌鹽藏鮓醬熱面發風毒物及用心力房勞等事治産後腸出不收用枳殼煎湯溫浸良久即入一方用二兩去瓤治産後脫腸不收用麻油五斤煉熟以盆盛候溫卻令産母坐油盆中約一頓飯久用皂刺炙令脆去粗皮為末少許吹入鼻中令作噎立瘥神效敗龜散治婦人産後腸出不收紫浮萍草陰乾半兩敗龜半兩醋炙酥上為末每服二錢溫酒或湯調下空心服立驗甚者不過數服治婦人産後腸出不收兼小兒脫肛紫浮萍草陰乾晚蠶砂炒各等分上為末每服二錢沸湯或溫酒調下立驗又方山慈菰末摻腸上仍以皂角末搐取噴嚏數聲其腸自入兒袋脫出名突河荷葉以麻油挼炙乾為末先用荷葉朴硝湯浸出者塊肉令暖次以前末挼入以縮砂仁末二錢點服再不入或遇熱出以葛根湯洗訖用萆麻子糯米浸過研為末安頂上即收上急洗去家傳方取麥面內疏布袋中置熱湯盆內擺洗候湯溫令産母坐其上腸浸其中頻擺麥面袋動其水須臾自收海上方細辛麝香上為末搐鼻中得噴嚏則腸收矣一方云凡通關藥皆可用葉氏方用朴硝煎湯浸腸令暖自然收縮連氏方白礬末一兩調米醋一碗入淨小桶以硬炭火置內急令産母坐其上熏之千金方鱉頭燒灰敷臍上仍用水調服又方羌活酒煎韓都事方蛇床子韶腦胡椒紫菀梢上等分為末每服五錢煎湯熏洗又方全蠍細末口含水以藥搐鼻立效沈氏方卷柏半兩銼碎瓷瓶水煎熱熏溫洗治産後腸出不收白扁豆花山豆根花上等分為末每服四錢溫紅花酒調下立收平復又方枳殼荊芥煎湯熏洗五倍子末粉腸上又方令婦人坐臼上研萆麻子膏塗頂心密令以水噴其面倏然一忍抬身振動腸已收矣謝氏方血竭乳香上燒煙燻即入千金翼方海螵蛸硫黃上為末粉腸上催生附論夫五行論命以年月日時支幹所遇五行所屬相生相值以推人之貴賤其間最切要者時也若林開命書以年為父母為己身月為兄弟僚友日為妻妾上官時為子孫帝座蓋人之生也得其時則終身富貴失其時則終身貧賤信乎人生之時不可忽也然則人生之時正危急之時是知人有諸生産之難若産起坐既久勞力困倦又宜急趁以救其危當此之時又何暇論其時耶設夫妊娠行年法若行年有與本命相值産室內當求鞍轡仍鋪馬皮於灰草上令妊婦臨産時踐之手攀鞍轡頭則易生之醫者便以此等物為産臥所需之物誠謬論也其所以然者謂娠婦行年偶遇本命相值於所産歲月慮有諸般艱難之厄故以此厭禳之取其快速之意耳如或不值則無用矣方石竹花湯石竹花三錢木通滑石葵子榆白皮各五錢枳殼五錢百草霜一錢上為末清油少許沸湯調服久而未生再服即下龍蛻散催生祕傳蟬蛻一兩燒存性大蛇蛻火燒存性一條滑石半兩葵子一兩微炒上為末每服一錢順流水微溫暖調下不可使熱湯催生大聖丹片腦麝香母丁香臘月兔腦子上用兔腦子搗和為丸如無鮮腦米飲搗和用金箔為衣丸如梧桐子大臨産時用酒或羹湯米飲咽下男左女右手握出萬不失一最驗催生草藥用牆基邊煮銀酸草一大握取順流水以砂盆順擂四十九轉以酒和汁與産婦食即降朱雄丸催生貼臍法一名萬金不傳遇仙方一名遇仙雄黃丹雄黃硃砂各一錢萆麻子十四粒去皮蛇蛻一尺上為細末漿水飯和丸如彈子大臨産時先以椒湯淋洗臍下次以藥安於臍中用油紙數重敷藥上以帛系之須臾即生急取下一方用蠟紙亦可一名金彈丸産畢將藥候乾再研細用飯丸每丸救三人治橫生倒生或胎死不出凡産難證候方書所不療者悉皆治之催生之藥如五芩五積如神如聖常用皆驗倘一時取藥不及即用此丸最效如聖散黃蜀花三錢焙乾無花用子爛研少半好當歸二錢焙乾上為末每服二錢熱酒調下如不飲酒用湯服必效伏龍肝散催生伏龍肝石燕上等分為細末研令極細每服二錢煎當歸湯調下入雞子清一個尤妙亦下死胎糖油飲治催生橫逆死胎皆可一名二仙膏真麻油蜂糖各一兩上用新碗二隻各煎令沸又傾作一碗再煎令沸候溫作一服未産再服催生藥方暑月熱可用蜀葵子半合煎湯調五芩散冬月冷可用蜀葵子一撮煎生料五積散服千里馬散一名神驗散拾路上草鞋一隻燒灰淋汁用碗覆之飲其水效一方用鼻繩小耳燒灰溫酒調服或木香湯調下三錢如得左足者男右足者女覆者兒死側者有驚自然理也似非切要之藥催生極驗蜾䲸散是人家壁上祝兒蜂做底窠兒尋之泡湯以飲逢單則陽逢雙則陰是驗催生方用天仙子不以多少取梧桐根皮以順流水煎湯吞下立産此藥生於江村近水處生青熟黑八九月採又方用初生黃牛犢生下便剝取黃蹄焙為細末水煮薄糊為丸硃砂為衣順流水吞下日月餅治催生用杏仁一個和皮劈破作兩片寫日月兩字復合用菜葉包以酒吞下催生方用赤馬皮臨産鋪之令産婦坐上催生丹用兔頭二個臘月內取頭中髓塗於紙上令吹乾通明乳香二兩碎入前干兔頭髓同研須臘月修合合時候夜星宿下安棹子上設果香茶同一處排定須是潔淨齋戒焚香望北帝拜告云大道弟子某修合救世上難生婦人藥願降威靈助祐此藥速令生産禱訖再拜用紙帖同露之即次燒香至朔日日未出時以豬肉和丸如雞頭子大用紙袋盛貯透風懸每服一丸醋湯下良久未産更用冷酒下一丸即産催生方隨其便而用之以蛇含石火煅醋淬七次為末每服一錢醋湯調下催生方用蜀葵子四十九粒滑石白芷百草霜各三錢為末雞心炒酒調空心二服如人行五里即下催生極效真祕方用千人踏即路旁邊東廁上兩足所踏板上泥土以竹篦颳起研篩去沙加麝香少許擂早米飲丸如櫻桃大瓦罐封收候産婦坐草時痛至盛順取長流水送下不可服藥太早催生方取老鴉酸草生用不以多少臨産時砂盆內搗爛不可擂布帛絞取汁半盞順流水半盞相和火上溫過如五月五日採陰乾為末收起臨産調服又方用乳香燈心同研細不用燈心卻用蚌粉炒去粉二味不以多少以豬心血為丸如雞頭大硃砂為衣每服一丸冷酒磨下服之一名乳朱丸催生方用好京墨新汲水濃磨服之墨水裹兒立出效又方豬脂一兩臘月者蔥白一寸切上同熬成油去滓通口服一方熱酒調下一錢催生兔血散以臘月兔血蒸餅切作片子蘸之紙袋盛挂當風處陰乾為末煎乳香調下二錢又方以臘月兔腦髓塗於一張薄紙上更用一張紙合拓以稱錘捶三五十下每遇難生看大小書天生兩字作符以醋湯調下一方用叉股夾定燒灰丁香酒調下催生神妙乳珠丹一名催生乳香膏上將乳香研細用豬心血為丸如梧桐子大以硃砂為衣曬乾每服一粒如大段難産時以蓮葉心蒂七枚水二盞煎至一盞放溫化下一粒良久未下可再服此藥靈驗如神無有不下者如胞漿先破惡水來多胎幹不得下須先與四物湯及通真丸補養血氣次更濃煎蔥湯放冷令坐婆洗産戶須是款曲洗令氣上下通暢仍更用酥調滑石末塗産戶里次服前催生藥則萬全矣如死胎不下者用黑豆三合好酒半升煮令豆爛取汁一盞化下藥一粒須臾便下矣萬一未下亦可再服如胎下胞衣未下者服此亦便下也若胎橫逆不順即先服如意黑神散再服此藥催之此方修合藥時用五月五日午時極妙或七月七日三月三日及月初上辰日修合亦得一云乳香為末豬心血為丸硃砂為衣如催生冷酒化下良久未下再服一粒一方用母豬血和入硃砂為丸催生用藥法腎為慳臟以慳祕為事一催生多用滑利迅速之藥如兔腦筆頭灰弩弦蛇皮等是也二催生若是水血先下子道乾澀不能下者如豬脂蜜油酒蔥白葵子牛乳榆白皮滑石等是也三催生若稽停勞動已久風冷乘虛挾於胞胎使氣血凝滯而不下者如牛膝蔥桂五積散加順元散之類是也四催生有觸犯禁忌如腦月兔腦硃砂乳香之類是也應急方催生隨其便而用之用清油同蜜少許湯調頓服小品方令易産以飛生一枚槐子故弩箭羽各十四枚合搗丸桐子大以酒服二丸令易産也滑胎散催生滑胎冬葵子肉桂去皮澤瀉榆白皮上件各等分為㕮咀每服三錢水一盞生薑三片煎七分去滓燒熱食前服催生如聖散黃蜀葵子去蒂萼蘆葵子尤妙上焙散為細末溫酒調服熱湯亦可若曾漏血臟連吃三服覺腹中氣寬一方用順流水溫暖調亦下死胎又方治催生槐子炒麥糵炒當歸炮貝母炒滑石各等分上件五味同為細末每於産月十日前每日空心用酒調下二錢凡生産第一於産前服滑胎散牽牛子一兩赤土二兩上件二味研令極細初覺痛陳頻時煎榆白皮湯調下五積散治催生陳皮制六兩麻黃三兩枳殼六兩白芍藥川芎當歸甘草炙茯苓半夏制肉桂白芷各三兩厚朴乾薑各四兩桔梗十三兩蒼朮二十四兩上㕮咀慢炒令色轉續入肉桂枳殼薑蔥煎去麻黃名和氣飲如催生加杏仁南星阿膠酒水煎催生雲母粉澄過研細一塊如雞子大須服酒即順生治婦人臨産渾身痛漿破血下未得分解催生方須是漿破血下然後可吃若孕婦漿未破血未下但覺渾身痛甚腰痛及疼經數日身體困重亦可進服凡渾身痛必是腰痛方是欲産也若未是正産誤吃此藥即損母性命須是産不下方可吃也官桂二兩去皮牡丹皮去心當歸牛膝木通草滑石冬葵子各半兩上為細末每服六錢水一盞半蔥五根煎一盞三分空心和滓吃如人行一里再吃未下更吃以兒生為度治産婦令易産以鼺鼠皮毛與産婦臨蓐持之令兒易生令孕易産用冬葵子葉煮孕婦臨産食之則胎滑易産催生方以乳香一分黃明者細研為末取母豬血和令勻丸如梧桐子大每服五丸溫酒下令孕易産以飛生蟲角臨時執之亦可燒末服少許令易産以蓮花一葉書人字吞之立産令易産以文鯉魚令産婦臨時帶之則易産亦可臨時燒為黑末酒調一錢匕令産婦易生取鸕鷀令産婦臨蓐時執之則易産令子易生取鼠屎燒末以井花水服方寸匕日三服治婦人易産取市門上土臨月帶之又臨月産時取一錢匕末酒服之易産令母帶獺皮易産用大蒜而多瓣有葷氣謂之蓧子宜煮汁與蓐婦飲之令易産以粳燒末服方寸匕催生用古鑑鼻燒酒淬服之治臨産催生方以黃蜀葵子焙乾為末井花水下三錢匕如無子以根細切煎汁令濃滑待冷服之又方黃蜀葵子四十九粒研爛用溫水酒服良久産催生方用萆麻子研敷産人手足心産後拭去催生以鼠四足燒食之治婦妊娠臨月令産極易取榆白皮焙乾為末服方寸匕日三産下兒身上皆塗之信其驗也令易産以羚羊角一枚刮光為末酒調方寸匕催生落胞併産後余血不下以兔頭骨和毛髓燒灰為丸酒服孫真人催産方以鐵器燒赤淬酒吃便令分解令易産以銅弩牙燒令赤投醋三合良久頓服立産治孕婦令易産用酸漿水和水少許頓服立産催生及下胎以石蟹熟水磨服令易産大麻根三莖水一升煎取半頓服立産衣不下服之亦下催生方欲産時取井花水半升酒一升服令子易産燒龜甲末酒服方寸匕易産以五月五日採莧菜和馬齒莧為末等分調與妊婦服之易産催生方以蒲黃地龍陳橘皮等分地龍洗去土於新瓦上焙令微黃各為末三處貼之如經日不産各抄一錢匕新汲水調服立産當用之甚效治婦人斷産方蠶子故紙方一尺燒為灰末酒服之終身不産又方油煎水銀一日勿息空肚服棗大一枚永斷不損人療妊娠去之並斷産方栝蔞桂心各二兩豉一升上三味切以水四升煮取一升半分服之又方附子三枚為末以醇苦酒和塗右足去之大良主令婦人斷産無子以有印處故紙剪之燒灰服之一錢匕神效
