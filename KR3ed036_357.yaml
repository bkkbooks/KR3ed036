body:
  text: 卷三百五十七産難門橫産附論夫橫産者由初覺腹痛時胎未轉動早已驚慌便用力産之故令橫也或觸犯禁忌所為將産坐臥處須順四時方面並避五行禁忌若有觸犯多致災禍也方貝母丸一名千金丸治橫産或顛倒胞衣不出毀傷不出産後余病汗出煩滿不止少氣滿逆貝母煨黃甘草炙秦椒去目及閉口去汗乾薑炮桂心粳米石膏細研黃芩大豆黃卷石斛去頭各一兩當歸半兩上為末用棗肉和丸如彈子大不計時候以溫酒調一丸服金液丸治將産忽見橫倒者因不能忌口恣情多食五臟氣滯六腑不和胎氣既肥或用力太早胎受驚觸急服此藥兒身自順生矣飛生毛火燒如腋下毛加半錢血餘用男子發燒灰公母羊糞燒灰各半錢灶中心土一兩硃砂半錢別研黑鉛三錢用水銚子火上熔投水銀半錢攪成砂傾出細研上為細末用粽子和為丸如緑豆大遇難産急難以倒流水吞下五丸兒身自順則正産子母活矣一方五月五日合尤妙勿令雞犬婦人見滑石散治橫生逆生危急方葵子二合滑石末各一兩上為末每服五錢至一兩煎蠶蛻灰湯調下治橫倒生者或先出手足者明阿膠炒一方用酥滑石末各一兩葵子二合上取水二盞煎一盞去滓分二服一方加味治橫産及手足先出者取梁上塵灶突墨酒服之又方取車釭中脂書出字於兒腳下及掌中一方畫腋下及掌心催生鉛丹治橫逆難産以黑鉛一錢用小銚子火上熔投水銀二錢急攪成砂子傾出用熟絹瀝出汁汗衫角紐作丸子如緑豆大臨蓐香水吞下二丸一云胎前數證危急産後亦然此藥可預為備急龍蛇散治橫生逆産以蛇蛻皮罐子內鹽泥固濟燒存性為細末每服二錢榆白皮煎湯調下凡産不順手足先見者溫酒一錢仍用敷兒手足即順又治吹乳療橫産及側手足先出右可持粗針刺兒手足入二分許兒得痛驚轉即縮自當順生治橫生逆産如小兒手足先出將父名書腳心上隨即順生又將兒腳心抓搔亦妙治橫倒生手足先出法以水牛屎塗母腹上即便順生又方以三姓雞卵各一枚三姓鹽各一錢三姓水共一大盞相和煮五七沸分二服令母面向東服之妙又方用瞿麥二兩銼以水一大盞煎至六分去滓分二服又方燒錢二七文令赤投一杯酒中候冷飲之倒産法橫倒逆産條目雖分方藥之類可參酌相當隨意救之若兒先出腳即以湯和鹽塗之並塗母腹塗兒腳後急以手搔之兒生手出取母雞血塗於手掌上良天制順此三字相連成一符應産不如常者朱書服上並書紙上水吞之治難産及不順生立效方上乞取三家飯著手中即順生甚效治産婦橫生用萆麻子三十個研爛婦人頂上剃去發少許藥塗之須臾覺腹中提正便刮去藥卻於腳心塗之自然順生也治倒産難生方用原蠶子燒末飲服三錢治橫生不可出用車前子末酒服二錢治婦人橫生用鐵杵無杵即用利斧燒令通赤乘熱投酒中服之須臾即順生矣治橫生倒産用葵花子為末溫酒服之治橫生以菟絲子為末酒調下一錢匕米飲調亦得治橫産不可出用梁上塵以酒服方寸匕亦治倒生治婦人倒産以麻子吞二七枚即正治倒生手足冷口噤以冬葵子炒令黃搗末酒服二錢匕則順産難子死腹中附論夫産難子死腹中者多因驚動太早或觸犯禁忌致令産難皆因穢汙先下産時未到穢露已盡而胎枯燥故子死腹中其後産母舌青黑及舌上冷者子已死也故産處坐臥須順四時方面並避五行禁忌若有觸犯多招災禍也胞衣未出急於胎之未降子死腹中危於胞之未下蓋胞胎未下子與母通其呼吸若子死腹中胞臟氣寒胎血凝聚由於子死氣不升降所以難産不觀古之方論多以行血順氣之藥及硝石水銀硇砂之類蓋胎死則血凝氣聚不能轉動再服至寒之藥不惟無益而害母命者有矣然古人用藥不能無意但後覺不分爾子死理有二端用藥寒溫各從其宜有妊娠崩漏血儘子死者有緣顛撲內傷子死者有緣久病胎萎子死者若此之類遂令坐人提挈妊婦使身體平正仍以裀褥自腰抵定令仰坐開足向地如欲産勢便進附子湯三服方見於後即以衣裹溫瓦數片三二人不住手自臍腹腰脅左右周圍尉之使胞臟溫暖凝血流動蓋附子湯內能破寒墮胎服之少頃覺腹內痛陳連作惡血漸動良久必産此用溫藥之意也有妊婦因傷寒熱病溫瘧之類胎受寒邪熱毒氣內外攻逼因致死胎不即下留於胞臟古人慮胎受毒氣必致貽害故能使死胎化成腐爛隨惡血行下此用寒藥之意也臨産更令坐人以手墊體後胎有橫有逆有死有生以意治之庶免留難凡生産之理胎活則所生之子日月已周臍系不牢所以自下猶實果既熟不候剪伐若胎死日月未足臍系尚固猶之果實未熟本質雖枯不折不離所以難治行之有法用之有度斯無虞矣凡審死胎當宜熟辨有妊婦緣病胎隱伏不動難認存亡者宜先令坐人以暖手就臍下款款按至胎處覺冷應是胎已死稍溫即非更看妊婦外證面青舌冷舌下脈青黑者皆子死之候也方真珠湯熟真珠一兩榆白皮切一升上二味以苦酒三升煮取一升頓服之死胎立出治妊娠未足月胎卒死不出産母欲死方以苦酒濃煮大豆每服一升胎立出不能頓服一用醇酒煮大豆亦治積聚成瘕治胎死腹中苦母病欲下之方取榆白皮細切煮濃三升服之即下難生者亦佳瞿麥散治妊娠三五個月胎死在腹內不出大腹皮赤芍藥榆白皮各三兩當歸一兩炒滑石末二分瞿麥葵子炒茯苓粉草子芩各半兩上為粗末每服四錢水一盞煎七分去滓不拘時候溫服又須詳母虛實冷熱用之母患熱病熏蒸至此可用療死胎腹內不出母已危殆不得已者立驗方水銀半兩桂末一錢上只作一服溫酒調下粥飲亦可一方故鞋底熱炙尉小腹上下又方以利斧煅赤置酒中待溫飲之其子便下錫粉丸治妊娠胎死腹中其母面赤者宜用此方水銀錫粉各一錢上同研不覺水銀為度以棗肉和丸豌豆大煎瞿麥湯下十全博救療胎死腹中以好辰砂一兩水煮數沸研令細酒調服二錢又方以雞子黃一枚用薑汁一合調雞子黃令勻頓服分娩後吃蕓薹粥良一方先用酒三分盞醋二分盞同煎沸入薑汁三分盞又煎令沸傾出用雞子黃一枚乘熱打轉稍熱服之須臾未下盡此三服下死胎方桂心末三錢麝香當門子一個上同研溫酒服須臾如手推下比之用水銀等藥不損血氣一方無麝香用桂末二錢痛陳密時溫童子小便調下名觀音救生散治産難及橫生倒生一方名桂香散又方治子死腹中用水銀如彈子大以棗肉勻和丸如大豆許水吞下立出朴硝散療死胎不出以朴硝為末每服二錢溫童子小便調下即出一云朴硝入砂同研如有産婦子死腹中號哭不已令用此藥灌之即下後用此方以救人無不驗也治死胎不下其證指甲青舌青脹悶甚者口中作屎臭先以平胃散一貼作兩服每服酒水各一盞同煎至一盞卻投朴硝半兩研細再煎三五沸傾出候微溫服盡其胎即化血水而下一方童子小便調服進賢魯宰以此與貓及牛皆下死胎奪命散治胎死腹中危甚以白扁豆生去皮為末米飲調下一錢未下煎數服亦可治胎死腹中因打撲傷損所致上以局方至寶丹極妙然須自合者方效治胎死腹中因打撲傷損所致其證指甲頭青悶脹舌青甚者口中作屎以栝蔞焙乾為末每服二錢倒流水調下一服取效仍先備防暈藥治生産不下死胎在腹橫生倒生胞衣不下一切危急者以蛇蛻一條全者斷者不可用以火箸挑起令直用麻油紙燃從尾燒上以乳鉢接貯研細羅過又蠮螉窠一個泥須通透出過子者研細和勻作一服以無灰酒半盞暖熱再以童子小便半盞浸平之服下即便分娩蛇蛻須是雄牆頭籬上者是一方蛇蛻皮一條燒灰存性以榆白皮煎湯調下治妊娠胎死腹中若胎衣不下上搶心者以雀麥一把水五升煮汁二升服烏金散治産難熱病胎死腹中或因顛仆或從高墜下或房室驚搐或臨産驚動太早觸犯禁忌産時未到經血先下惡露已盡致胎乾子死不能自出但視産婦面舌赤青是其候也若是面青舌赤母死子活唇青吐沫子母俱斃又有雙懷或一死一活其候猶難須知臨期觀變熟地黃酒浸真蒲黃歸身交趾桂楊芍藥軍薑去皮粉草各一兩小黑豆四兩百草霜五錢上為末每服二錢半醋半合沸湯六七合溫服如疑二之際且進佛手散酒水合煎三二服探之若未死子母俱安若胎已死立便逐下的知其胎死進此藥後更進香桂散須臾如手推下常用催生更加好滑石末半兩葵子五十粒捶碎黃柞葉七八片蔥白二寸順流水煎湯調下蓋滑石能利小便黃柞葉行氣逐血蔥白內通陽氣氣盛血行即産此藥療多功效硇砂散治胎死腹中不下硇砂細研當歸各一兩上二味當歸研極細另研硇砂為細末只分作二服用溫酒調下無時服如重車行五里不下再一服立效治子死腹中不出方以牛屎塗母腹上立出極佳又方治橫逆不順子死腹中取灶下黃土三指撮酒服之立出土當著兒頭亦治逆生橫生不出手足先見者一方水調服之又方服水銀三兩立出又方取夫屎二升煮令沸飲之又方用水吞槐子二七枚亦治逆生一方有蒲黃又方用瞿麥一升以水八升煮取二升一服一升不出再服又方以酢二升拗口開灌之一字神散治子死胎不下胞破不生此方纍有效救人萬數用鬼臼不拘多寡黃色者去毛碾為末以指捻之粉極細每服二錢用無灰酒一盞煎八分通口服立效牡丹丸治小産下血至多子死腹中其人憎寒手指唇口爪甲青白面色黃黑或胎上搶心悶絶欲死冷汗自出喘滿不食或食毒物或誤服草藥傷動胎氣下血不止胎尚未損服之可安胎已死服之可下一名奪命丹牡丹皮去骨白茯苓去黑皮桂心去粗皮赤芍藥桃仁湯浸去皮尖雙仁麩炒上等分為末蜜丸彈子大每服一丸細嚼淡醋湯送下連進二丸一方奪命丸治胎腐爛腹中危甚者亦出治子死腹中胞衣不出欲搶心方取灶突中墨三指撮許以水苦酒調服立出當著兒頭生又方取炊蔽當戶前燒服之亦治胞衣不出牛膝丸治産數日子死不出母氣欲絶杜牛膝五升紫金藤十錢厚肉桂二錢土當歸四錢葵根一兩麝香半錢上為末米飲為丸如梧桐子大硃砂為衣每服五十丸乳香湯下治子死腹中不出用雄雞糞二十枚水二升煎取五合下米作粥食即出一方用雌雞糞治子死腹中用黃明乳香以端午日午時或歲除夜取豬心血相和研為丸如雞頭實大以紅絲袋盛挂於門上如串心者冷酒磨下一丸養正丹治難産子死腹中昏沉脈微水銀黑錫去沙淨稱與水銀結沙子硫黃研細硃砂研細各一兩上用黑盞一隻火上熔黑錫成汁次下水銀以柳杖子攪勻次下硃砂攪令不見星子放下少時入硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研如粉極細用糯米粉煮糊丸緑豆大每服一百二十粒濃煎乳香湯服兩手更把石燕子各一枚即當胎下人活或只用朴硝末每服二錢童便好酒調下效治胎死腹中身體如藍舌稍紅大劑芎歸湯多加肉桂牛膝葵子每服半服制三服每服水二盞煎一大盞服之又云産難母子生死之候若母面赤舌青者母活子死母面青舌赤口沫出子活母死母唇口皆青口兩邊沫出身重寒熱舌下青黑反唇上冷遇此證者子母俱死不可治者而不藥也治胎死腹中乾燥者葵子一升阿膠五兩上二味以水五升煮取二升頻服之未出再煮服治妊娠胎死腹中若子生胞衣不出腹中引腰背痛方甘草一尺筒桂四寸雞子一枚蒲黃二合香豉二升上以水六升煮取二升頓服之胎胞穢惡盡去大良附子湯治子死腹中桂去粗皮不得見火烏頭大者炮去皮臍各一兩上銼每服二錢水一盞煎七分去滓溫服須臾連三服粉霜散治子死腹中漸成脹滿粉霜硝石各半兩蛇蛻灰二錢上各研細和勻每服二錢匕溫酒下醋湯亦得漸漸連並三兩服如更未下即服丹砂散地黃酒治妊娠因漏血傷胎子死未下用生地黃二斤洗淨切搗取自然汁每服用七分酒三分水同煎稍熱便服未下再服牛膝湯治子死腹中氣血凝結致子難下牛膝酒浸去苗朴硝研各三分生乾地黃一兩半桂去皮芎藭大黃炒蒲黃各半兩上為散每服三錢以水一盞煎七分去滓溫服連三五服未下再服牛膝湯治子死腹中滑氣血破胞胎或死子已久壞爛母欲悶絶者牛膝去苗一兩生地黃汁一盞當歸桂炒各三分芎藭蒲黃各半兩瞿麥去根硝石研各三分上除地黃汁外搗為粗末每服五錢水一盞半煎至一盞去滓再煎入地黃汁三分盞打轉煎沸稍熱服三兩服惡露下也子出免生他病地黃湯治妊娠五六月子死腹中不出生地黃焙一兩牛膝去苗芎藭桂去皮朴硝各三分當歸蒲黃研各半兩上粗搗篩每服三錢匕水酒各半盞煎七分去滓溫服連三五服豬脂湯治子死腹中氣血凝滯不下豬脂一兩切白蜜半盞酒一盞半上三味相和同煎沸分作三服未下再依前法制服甘草湯治妊娠顛撲內傷致子死腹中速服滑氣血甘草炙銼桂去皮各一兩上粗搗篩每服三錢匕水一盞煎七分去滓溫服連三五服未下再服甘草湯治子死腹中不下甘草炙桂去皮半兩香豉炒二兩上為末每服五錢匕水一盞半煎一盞去滓用雞子一枚取清打轉入藥內再煎七分稍熱服須臾未下再作服芎藭湯治子死腹中不下芎藭當歸各一兩生切瞿麥去根三分上為散每服三錢匕水一盞醋少許同煎七分去滓連三二服必下黑豆湯治子死腹中溫氣滑血黑豆搗碎半升生薑細切四兩上以童子小便三碗同煎取二碗去滓每服一盞連二三盞未下再服龜甲湯治産難或子死腹中不下龜甲酒炙當歸各半兩亂髮一塊雞子大取産多者婦人發於瓦上燒灰上先細研發灰次入當歸末水一盞半煎八分然後下龜甲末煎五七沸分為三服後如人行四五里更服水銀丸治妊娠子死腹中不出水銀半兩硫黃一分與水銀結為砂子白礬灰半兩硇砂半兩上搗研令細煮棗肉為丸緑豆大煎榆白皮酒下五丸如覺腹痛即便子下又方水銀一分以大棗肉研令星盡硃砂一分雄黃一分上同研令細煮棗肉和丸緑豆大不計時候以槐子湯送下五丸治妊娠子死腹內不下方皂子黃四兩米醋三升多年為妙上用五升瓶盛文火煨熟用紙蓋瓶口將向婦人面前去紙取氣熏少時即下又方蘇枋木一片細捶綿裹水銀一兩上以水五盞煎蘇木一大盞每服取二分下水銀一分如人行三五里再服死胎當化水下下後三日須食暖物若食冷物即惡血不盡治胎死不出方用赤小豆一升醋煮冷熱分二服死兒立出療妊身熱病子死腹中欲出之用烏豆一枚細搗水三升煮取二升稍稍摩臍下至陰下當立出療婦人傷娠及胎死腹中胞衣不出産後疾病及諸困欲死刺取羊血及熱飲之不能者人含吐與之能多益善不能咽啖少鹽又水噀其面治胎死腹中若母病欲之下方用生地汁一升苦酒三合令熱服之不能頓服分再服亦可一方治血乾胎死為末以溫酒下煎亦可治婦人腹中有死胎麵皮黑欲死不思飲食三個紅娘半個剛更加硼砂共棗釀依方修合等分兩頭明恰似宰豬羊上為細末三五棗兒裝巴豆紙裹燒看虛減服之如緑豆大空心服治胎死腹中方用郁臭草搗以少許暖酒和絞取汁頓服又葵子一大升水三升煮取二升一服立下治子死腹中若衣不出欲上搶心方急取蟻蛭三升熬令熱囊盛尉心下令胎不得搶心良牛膝散治妊娠經五六個月胎橫死在腹中不出牛膝一兩去苗蒲黃半兩當歸三分雄鼠糞半兩炒芎藭二分生乾地黃三分上為粗散每服三錢以水酒各半盞煎五分去滓不計時候溫服牡丹散治死胎下墜有敗血衝心悶絶上氣不停牡丹赤芍藥青皮湯去白荷葉當歸炒蒲黃乾薑川大黃以上各一兩上為散不計時候以溫酒調下二錢治妊娠胎死在腹無計可為宜用此方萆麻子三枚鼠黏子一分上為散以醋麵糊調塗於心上以紙貼之即生治妊娠胎死腹內不下方榆白皮三錢硃砂半兩細研右以酒一盞煎榆白皮至六分去滓分為二服每服調下硃砂一分又方麒麟竭一兩蒲黃三分赤芍藥三分上為散每服以溫酒調下二錢半頻服即下治子死腹中不出方鹽半合雞子一枚上相和頓服立效治子死腹中若衣不出欲上搶心用取夫內衣蓋井上立出治子死腹中不出方用三家雞卵各一枚三家鹽各一撮三家水各一升合煮之令産婦向東飲之立出黑神散治熱病胎死腹中者何答曰因母患熱病至六七日以後臟腑燥熱熏煮其胎是以致死緣兒身死冷不能自出但服黑神散熱藥暖其胎須臾胎氣暖即自出何以知其胎之已死但看産婦舌青者是其候也桂心不見火川當歸芍藥甘草乾薑炮生乾地黃黑豆去皮各一錢黑附子半錢炮上為細末作四服空心溫酒調下一方無干薑治胎死腹中半産不下官桂去皮一兩牡丹皮去心川芎葵子各一分上細搗羅為末每服五錢濃煎蔥湯調下川芎散墜高胎死用川芎為細末每服二錢酒下鱉甲湯下死胎至妙鱉二兩先取半兩火燒過淬醋過如此二度餘一兩半隻生用為末斧頭三個鐵稱錘亦得燒紅投酒中令聲絶去斧頭上每服用藥末三錢酒一盞蔥芽三個細切放溫調下難産者無不便下覺心頭迷悶更以柳枝煎湯洗産母心頭或衣不下者服烏金散即下龍肝散治子死腹中母氣欲絶用伏龍肝為末熟水調下童子小便調尤妙其土當兒頭上戴出至妙川芎蒲黃黑神散地黃蒸曝九次或二十一次如黑角色不可經冷水稱一兩生者蒸取半兩當歸酒浸火焙稱一兩一分肉桂去粗皮不見火一兩一分乾薑一兩一分白芍藥一兩甘草炙半兩真蒲黃白紙上焙一兩附子炮二錢黑豆一兩半炒去皮川芎一兩上十味為細末每服三錢半並用小便調下若胎已死腹中四肢冷口出沫爪青黑溫酒調服須臾胎暖自下及衣帶斷者但服此藥逐去惡血即下若血暈醫者不識呼為暗風服此即愈若乍寒乍熱或誤呼為瘧疾當服此藥若血崩不止取艾一團如雞子大濃煎湯調下若嘔逆噁心人參陳皮湯調下若中風牽搐加荊芥末半錢仍煎荊芥湯調下若血漏不止加蒲黃煎葛根湯調下若心腹刺痛加玄胡索末溫酒調下昨有永嘉法曹司馬逑正坐倉受納閣中分娩亟贖黑神散三貼傳歸與服惡血稍多進第二服其血如傾扶策登床耳聞如鼓聲者數百二三婢重手按其頭稍定急服當歸鹿茸二物湯夜以繼日而鼓聲漸遠半月平復則知黑神散亦未易猛進也此盧祖常易簡糾繆中載然愚謂産後自不可以易用藥況市中黑神散安可不辨其精粗真偽也曾有婦人熱而大便祕脈實子死腹中以致昏不知人醫用備急丸胎下人活催生並死胎不出用萆麻三個巴豆四個乳鉢研細入麝香少許貼臍心上須臾間便見神效治死胎腹中不下須是分明知是死胎方下此藥水銀一分官桂一分為末麝香少許上以官桂末麝香相滾用乳鉢內投水銀令相滾成末濃煎牛膝湯下催生湯蒼朮二兩桔梗一兩陳皮六錢白芷桂心甘草各三錢當歸烏藥乾薑厚朴芍藥半夏茯苓附子各三錢南星川芎各一錢半枳殼炒木香一錢杏仁阿膠各一錢半上為末每服一大盞酒下或熱悶用溫水調蜜服之治子死腹中不下用懸鉤根皮濃煎服之治女子因熱病胎死腹中搗益母草令熟以少許暖水和絞取汁頓服良治胎死腹中以紅藍花酒煮服之療子死腹中方以真珠二兩為末酒調服盡立出治子死腹中取天鼠屎灰酒服方寸匕治子死腹中搗茺蔚莖汁服之即下治妊娠子死腹中以雄鼠屎取二七枚以水三升煮取一升去滓取汁以作粥食之胎即下治倒産子死腹中用艾葉半斤酒四升煮取一升服治小兒死腹中用冬葵子末酒服方寸匕若口噤不開格口灌之藥下即活治倒産子死腹中以當歸末酒服方寸匕胞衣不出附論夫有産兒出胞衣不落者世謂之息胞由産婦初時用力太過兒出而體已疲憊不能更用力産胞停頓之間而外冷氣乘之則血道痞澀故胞衣不出須急以方藥救治不爾害於兒所以爾者胞系連兒臍胞不出則不得以時斷臍浴洗冷氣傷兒則成病也舊方胞衣久不出恐損兒者依法截臍而已産處隨順四時方面並避五行禁忌若有觸犯多令産婦難産雖腹痛者未産也必腹痛連腰痛甚者即産也所以然者腎候於腰胞系腎故也診其脈轉急如切繩無殊者即産也郭稽中論曰胎衣不下者何答曰母生子訖血流入衣中衣為血所脹是故不得下治之稍緩脹滿腹中漸次上衝心胸疼痛喘急者但服奪命丹以逐去衣中之血血散脹消胎衣自下而無所患更有牛膝湯等用之甚效録以附之欲産之時用力太過産罷覆被風寒冷氣所侵血氣凝澀乏力運用以致持久不惟有妨兒臍兼亦致害母命即須提挈産婦使形體平正息氣少時可以運動及以壯氣益血湯散助之俾氣血滑利其胞可下矣兼初生産婦未能諳練見胞衣未下恐妨兒體輒剪臍或誤牽斷或執之不固其胞直上掩心使不盡天年者多矣昔人剪臍之法必欲慣熟坐人先備金銀銅鐵稱錘之類用軟熟衣帶一條就一頭綰定仍留一頭才下臍即將臍帶與衣帶相聯結定以緊牢為度所貴胞不上掩心也方壯氣益血湯治産後胎衣不下或被風寒所侵血氣凝澀或氣力疲乏不能運動胞衣停息宜服生乾地黃焙人參切當歸切焙各一兩代赭別研半兩木香一分上五味粗搗篩每服五錢匕水一盞半生薑三片棗一枚擘破同煎七分去滓不拘時溫服以胞下為度又方取敗簸箕舌燒作灰細研每服三錢酒服之治胞衣不下法用小豆溫水或酒吞下如生男者一七枚生女者二七枚丹砂散治胞衣不出令胞爛葵子阿膠炒牛膝酒浸當歸切焙各三分上為散每服五錢溫酒調下治胞衣不出取小麥合小豆煮令濃飲其汁立出亦治橫逆生者用米麥亦得又方取瓜瓣二七枚服之立出良又方取水煮弓弩弦飲五合即出亦可燒灰酒和服又方取宅中所埋柱掘出取坎底當柱下土大如雞子酒和服之良牛膝湯治胎衣不出臍腹堅脹急痛即殺人服此藥胞即爛下凡胎及子死腹中不得出宜服之牛膝瞿麥各四兩當歸三兩滑石半斤通草六兩一方作木通一方用莽草葵子五兩上細切以水九升煮取三升分三服衣即爛出也一方用桂心二兩一方無通草用甘草一方有赤小豆若胞衣不出若腹脹則殺人及治未足月死胎以黑豆一合炒令熟入醋一盞煎三五沸去豆分三服酒煮亦可或取鞋底炙熱尉小腹上下蒲黃散治胎死腹中若子已出胞衣不下腰背痛蒲黃微炒甘草炙陳皮湯去白焙桂去皮各三分牛膝酒浸去苗切焙一兩上為散每服二錢溫酒調下不拘時以下為度松葉散治胞衣不下氣血衝心迷悶欲絶松葉炙墨細研紫葛各半兩上為散每服二錢溫水調下不拘時芎藭散治胞衣不出芎藭當歸切焙各半兩榆白皮銼一兩上為散每服三錢用生地黃汁溫調下未下再服以下為度香墨丸治産難胞衣不下心腹痛香墨麝香各一錢同研細上二味以臘月兔腦丸如梧桐子大每服三丸以溫酒下不拘時候以下為度蔥油方治胎衣不出蔥白三莖麻油半合上先研蔥白汁少許入油相和服之未下再一服伏龍肝散治胎衣不出伏龍肝蒲黃炒各一兩上為散每服二錢溫酒調下不拘時以下為度牛膝散治胎衣不出胞爛取牛膝去苗一兩細銼以水三盞煎盞半去滓分三服