一服先須用奪命散逐下痰涎或用吐法次服之此藥大有神效蓋癇病皆心血不足此物有守宮其血與心之血類也取下如童女血服之於心故能補也心全則病瘥矣醉紅散治風癇日夜癲蔓陀羅花半兩硃砂四錢乳香四錢天南星四錢汁制上為細末抄三錢酒一盞半煎至一盞溫服無時靈烏散治風癇多驚手足顫掉口吐涎沫烏鴉一雙臘月收藏於瓶內盛以鹽泥固濟令乾用炭火煅存性候冷取出去肚腸研細辛去苗葉二兩乾蠍全者十四枚炒上將二味搗末與別研二味同羅每服半錢匕午前用溫酒調下龍齒丸治因驚成癇狂言妄語龍齒研鐵粉研凝水石研各一兩茯神去木一兩半上為末煉蜜丸如梧桐子大每服二十丸溫米飲下不拘時半夏丸出十便良方治風癇痰盛瘛瘲口吐涎沫半夏湯洗去滑生為末五兩白礬生為末二兩丹砂研鉛丹研各一兩上同研勻以粟米飯為丸如梧桐子大每服食後生薑湯下二十丸一方治積痰不散上衝心臟變為風癇不問長幼以人參湯下二十丸所用白礬燒令汁盡大聖丹一名烏龍丸出百一選方治風癇暗風癱瘓風手足嚲曳口眼喎斜語澀步難川烏去皮臍尖切作片子五靈脂生用新者各五兩上為細末入腦麝少許滴水搜和如彈子大每一丸年五十以上者分作四分有年紀人作六服取薑汁隔宿浸軟手調開用薄荷酒化仍再入腦麝少許合時以三月三日五月五日六月六日或辰時勿令孕婦雞犬見丸就以米篩先鋪穰草將丸子攤在上有風處蔭令自干收之不得罨損以紗絹袋懸之拈此藥了不得以手搽眼服後須忌兩時熱物治男子婦人中風半身不遂言語謇澀行步不正諸藥不效或久遠鶴膝風暗風無不治服之三十日去根小兒分作八服一方無腦子是齋弟曾患暗風十餘年得此藥安一方以暖酒調服之一日兩服空心食前服之只三粒定醫一人才服五七丸覺抬得手移得腳服十粒可以梳頭凡初中風一月內未得緊藥先且化涎消滯和胃順氣道以風乘虛未有所歸多誤投湯藥卻言無功此藥治半年以上者必不相誤神藥治棗兒出德生堂治諸風種癇危急之證得此方用之多所存活皂角一斤去皮弦銼碎麻黃去節三分肥棗一升好京墨三錢上用大砂鍋一個可盛水二斗者以皂角麻黃京墨三藥入砂鍋內熬煎水至五六碗濾去渣再將藥水熬成膏二碗卻下棗在膏內慢火熬令乾則藥味皆入棗中用瓦瓶盛紙蓋瓶上每日取出吃棗一枚至三個五個為度吃後次早風痰涎皆從大便中下其應也治風癇發作項強直視不省人事此證乃肝經有熱如病發者宜服此藥輕粉白礬丁頭代赭石各等分上為末以發過米飲調服銀末丸出聖惠方治風癇積年不瘥發時迷悶吐沫或作牛聲銀末半兩鐵粉一兩黑貓兒糞一兩炒黃丹二兩上相和熱研令勻以醋飯和丸如緑豆大如患五年服十五丸患十年服二十丸患十五年服三十丸初服時即於食前以熱酒下如服五丸不吐不瀉即第六服用水一大盞加黃耆末二錢煎至五分溫溫下丸藥須臾吐黏痰每日空心服之不絶半月其疾永不發動陽起石丸出聖惠方治風癇有積痰在胸膈不散發時心躁惡叫迷悶吐沫瘛瘲陽起石一兩硫黃一兩與水銀結為砂子水銀一兩黃丹一兩上都研令細固濟瓷瓶子鹽匱中以文火養三日後以五斤火煅之候冷取出火毒細研以粟米飯和丸如緑豆大每服不拘時候以粥飯下五丸又方出聖惠方硃砂一兩細研水飛過鉛霜一兩鐵粉一兩馬牙硝一兩上都細研如粉以棗肉和丸如緑豆大每服不拘時候以熱水下七丸密陀僧丸出聖惠方治風癇發時眼前暗黑迷悶吐沫不識人密陀僧三兩細研硃砂三兩細研水飛過臘月鴉一雙燒灰細研豬牙皂莢六兩三兩去黑皮塗酥炙令焦黃去子三兩去皮子生用上皂角搗羅為末以米醋二升熬成膏入硃砂等三味和丸如緑豆大每服不拘時候以溫水下十丸雄黃丸出聖惠方治風癇發作不定雄黃一兩龍齒一兩鐵粉半兩黃丹半兩與雄黃同炒轉色上同研如粉以粳米飯和丸如緑豆大每服不拘時候以牛乳下五丸鴟頭丸出濟生方治風癇不問長幼發作漸頻嘔吐沫涎飛鴟頭一枚燒灰虢丹五錢細研皂角五錠醋炙上為細末用糯米糊為丸如緑豆大每服十五丸加至二十丸以粥飯送下不拘時候參朱丸出濟生拔粹治風癇大有效人參蛤粉硃砂上等分為細末用獖豬心血為丸桐子大每服三十丸金銀水送下食遠辰砂散出十便良方治風邪諸癇狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫帶白魂魄不守醫禁不治顆塊硃砂四錢研細酸棗仁二錢乳香一錢研上為末勻量病人飲酒幾何先須恣飲令沉醉但勿令吐靜室中以前藥都為一服溫酒一盞調頓服令盡服藥訖便安置床枕令睡如飲酒素多但隨其量病淺一兩日深者三五日睡不覺令家人密伺之覺即神魂定矣謹勿驚觸著才動更不復治上樞正肅吳公少時心病服此一劑三日方寤遂瘥雌黃丸出聖惠方治風癇欲發即精神不足眼目不明瘛瘲惡聲嚼舌吐沫雌黃一兩細研炒令褐色黃丹一兩炒令褐色麝香一錢細研上相和研令勻用牛乳一升慢火熬成膏候可丸即丸如梧桐子大每服不拘時候以溫酒下七丸又方出聖惠方鐵粉二兩雌黃一兩葉子者黃丹二兩與雌黃同略炒過上都細研為末以粳米飯和丸如緑豆大每服不計時候以牛乳下五丸如無牛乳溫水下亦得硃砂散出聖惠方治風癇心神狂亂時吐涎沫叫呼不識人硃砂二兩光明者逐塊以金箔裹磁石三兩搗為末黑鉛二兩以水銀二兩炒作砂子細研上先固濟一瓷瓶子候乾先入磁石末次安硃砂後以黑鉛末覆之以文火養七日後以火五斤煅令通赤便住候冷取出都細研為散每服不拘時候以馬牙硝半分煎湯調半錢服之治風癇發作不定出聖惠方鉛二兩水銀一兩硫黃一兩細研上先將水銀硫黃二味於銚子中慢火熬不住手研待硫黃煙氣似定入鉛同炒候少時將出細研為末以粟米飯和丸如梧桐子大每服不拘時候以茶下三丸乳香散出聖惠方治風癇時久不瘥先吐痰沫乳香半兩真降香一兩石膽一分上為散每服一錢以真黃牛乳一小盞熱暖空心調下如人行三二里再服如此三服以吐為度壽星丸治暗風百日內者龍鱗丸治風癇頻作青州白丸子末一兩大青魚鱗糯米炒黃研為末一兩上和勻以薑汁糊丸如梧桐子大每服五十丸薑湯送下不以時鮎魚丸一名朱粉散治五種癇疾硃砂半兩研輕粉一錢上用大鮎魚一尾將輕粉塗在鮎魚上少時括取涎用硃砂末為丸如緑豆大每服二丸以溫水吞下食後冷水亦得神效散治心邪狂走癇病風涎穀精草一錢滑石二錢上為細末每用一字口含水嗅入鼻內吐了水口咬竹箸底頭吐出涎為妙金蟬丸一名鬱金丸治一切癇病久不愈者安息香丸出聖濟總録治男子婦人暗風癇病安息香通明無砂石者良鉛丹各一兩上為細末入黑羊心中血研勻丸如梧桐子大每服十丸空心溫水下神聖散出聖濟總録治風癇涎潮等疾雌黃鉛丹各一兩上研細以醋一升熬稠丸如梧桐子大與惡實末同收每服十丸臨臥煎惡實末湯下驅風散一名驅風丸治風癇治風癇瘛瘲不省出聖惠方虎糞曝極干野豬骨並蹄炙各不拘多少上搗研為末每日空心酒調下二錢匕忌一切有頭足之物一方用虎糞內骨酥炙微黃並糞熬干為末酒調溫下服之並良神效方出聖濟總録治風癇發歇有時雄雀糞尖者是二百八十粒巴豆十粒去皮不出油上細研以赤小豆煮糊為丸一料分作十丸每服用馬牙硝之末一錢藥一丸溫水一茶盞浸透同用匙柄研破北極下焚香露一宿早不得洗手面漱口更添溫水少許服之良久自然口內出涎一兩碗相次下青黑涎一兩碗相次更有白末一兩碗便安十年以下者半月可再服病新者只可一服取瘥神應丸出危氏方治風癇暗風好臘茶半兩白礬一兩生用上為細末蜜丸如梧桐子大每服三十丸臘茶湯下取涎自大便出極妙保安丸治風癇不問久遠草烏去皮五靈脂上等分為細末以豬心血丸如雞頭子大每服一丸薄荷生薑浸湯食後服一方治癱瘓以六月六日合不用豬血以薄荷酒磨下覺麻為度治豬癇出百一選方用獖豬心血於新瓦上爆干研為細末入麝香拌勻酒糊丸如梧桐子大每服七丸麝香酒下或調服一錢亦可星神散出濟生方治驚癇潮作仆地不省口吐涎沫用雄鴟梟一枚用瓷罐盛以黃泥固濟炭火煅令通赤研為細末每服二錢入麝香少許溫酒調服熟水亦得不拘時候一作竹筒盛救急療癇老少增減方竹茹一握衣中白魚七頭上以酒一升煎取二合頓服之黃丹丸出聖惠方治諸風癇發作漸頻嘔吐涎沫不問長幼豬牙皂角炒二錢黃丹炒黑五錢上為末蒸餅為丸每服二三十丸溫酒下以吐為度一方治風癇發作漸頻嘔吐涎沫以糯米粥和丸每服粥飲下十丸太陰玄精丸治風癇精神不守惡叫煩悶吐沫嚼舌四肢抽掣太陰玄精三兩鐵粉三兩上都研令細以真牛乳一大盞相和用文火煎令乳干取出研令極細煉蜜和丸如梧桐子大每服不拘時候以薄荷湯下二十丸蜜粟子丸一名蛇黃丸出聖惠方治一切癇疾不問長幼是風痰衝心所為用蜜粟子小蛇黃是也狀如大楊梅者取一十五枚以檞木汁拌勻入火內煅令通赤取出淨地上出火毒後細研用豺狗膽一枚細研和粟米飯為丸如芥子大每日空心以暖酒下十五丸服三五日後吐出惡痰是疾退之候也年深者只三二百粒效一方治暗風用蛇黃不拘多少米醋燒淬七次為末溫酒服之一方用狗膽辰砂丸出危氏方治暗風年深日近發搐不省人事極好辰砂半兩好雄黃二錢各研極細一處研上用烏雞心血和丸如梧桐子大每服十丸以煮獖豬湯送下如不省人事則灌下仍灸百會穴九壯一方治暗風癇病上等分為末用獖豬心血同漿水相和共半盞溫動入藥末二錢調服不拘時候一年一服十年者十服治諸癇方採刺木藤心一二寸者須於端午日並伏內取出不計多少洗淨日曬乾為末比及服此藥者先用蘇合香丸遇夜細嚼以薑湯咽青州白丸子如此服月十日後方用刺母藤末每日早飯後茶調一服午用酒調一服其病愈服豬肉亦無妨治癇用夜貓兒一個去尾開肚子用糯米與平胃散一處裝肚內去腸留心肝等用線縫住用帶骨羊肉一塊水一盞酒一盞一處煮熟一將肉與病人吃夜貓骨羊骨於新瓦上焙乾研細為末空心溫酒服治癇疾出傳信適用方用凌霄花為末每服三錢溫酒調下空心服每服藥時解開頭髮用木梳不住手梳以冷水一大碗在側含水口中溫即換以碗水盡即住梳如此四十九日必絶根不以受病淺深皆愈仍百無所忌治暗風倒地不省人事嗅鼻散出危氏方用細辛不拘多少洗焙為末挑一字吹鼻中治暗風用穀精為末口噙水以蘆筒吹入兩鼻細辛末亦可治暗風發用枸杞枝上蜂窩燒灰酒調下除根不發雄朱丹一名雄黃丹砂丸治風癇失性倒臥惡聲吐沫口噤龍齒丸出指南方治癇晝發者牛黃麝香硃砂龍骨各半兩羚羊角羊齒火煅龍齒蛇蛻炒各一分上為末蜜丸如梧桐子大空心米飲下五丸紫菀湯一名硝石丸出指南方治癇夜發者硝石赤石脂等分上為末面和丸如梧桐子大米飲下三十丸升陽湯東垣祕藏方治陽蹺癇積足太陽寒恐則氣下行宜升陽氣麻黃八錢不去節羌活一兩半防風八錢炙甘草半兩每服稱五錢水五盞煎至一盞去滓腹空服之藥後避風寒一兩時辰乃大效辰砂丹出衛生寶鑑治心經熱癇邪上用雄豬心一個破作兩片去心內血用好辰砂塞滿為度以布線縫合外合燈心包裹以麻線縱橫纏定以溏砂罐一個入井水一半河水一半令十分滿用文武火煮一復時出去豬心將硃砂細棗肉為丸如緑豆大入茯苓二兩半焙乾甘草半兩炒令赤色為細末每用一大錢沸湯點咽三粒至五粒日進二服百無所忌驅風散出衛生家寶治暗風癇疾涎潮不省人事手足搐搦又小兒驚風等疾服一料永除根防風四兩去蘆白砂蜜半斤硃砂一兩水飛研令極細薄荷四兩苗兒紫心者蝸牛七個瓦上炒去殼細研形如蜒蚰皆負殼者皂角十條不蛀者去邊寸銼先用水浸三日去元浸水卻以一碗挼取濃汁去滓入銀石器內熬去五六分天麻四兩上件為末入硃砂蝸牛先以皂角膏子和勻卻旋入蜜拌為丸如桐子大每服三十丸至五十丸臘茶清送下日進三服忌豬雞魚面動風物斷癇丹治因驚成癇瘥而復作連綿不除方黃耆三錢蜜炙防風二錢鉤藤三錢細辛去土三錢甘草二錢蟬蛻二錢露蜂房二錢石菖蒲三錢桂心去粗皮二錢遠志去心二錢人參二錢杏仁二錢半去皮尖半夏泡三錢天南星泡三錢上為細末煉蜜為丸如梧桐子大用硃砂少許麝香為衣每服二十丸煎棗湯送下一日二服臨臥一服烏龍丸出衛生寶鑑治五風癇病川烏頭草烏頭天仙子五靈脂各二兩黑豆一升上為細末滴水為丸如梧子大每服五七丸溫水下如中風加附子半兩神應丹出衛生寶鑑治諸風心癇病狐肝一具烏鴉一隻鴟梟一個白礬一兩生用生犀角一兩為末野貍一個去肚腸皮毛入瓦罐內黃泥固濟用炭火煅令焦黃色上為細末用酒打麵糊為丸如皂角子大硃砂為衣每服一丸溫酒送下不拘時候治癇病心風病出衛生寶鑑皂角三挺捶破挼濾汁如稀麵糊攤紙上曬乾取兩葉如小錢大用溫漿水浸洗下去紙注於兩鼻孔各一蜆殼許須臾涎下絞瀝涎盡入後藥代赭石一兩生用白礬二兩生上為細末稀麵糊為丸如桐子大每服三十丸冷水送下不計時候以效為度治風癇病墜痰丸出衛生寶鑑上用九蒸九曝天南星為末薑汁糊為丸如桐子大每服二十丸煎人參湯送下若菖蒲麥門冬煎湯下亦得硃砂辰砂丹出衛生寶鑑薯蕷人參防風紫石英茯神遠志虎骨虎睛龍齒五味子丹參石菖蒲細辛以上十三味各二錢半珠子末四分上件為細末水打麵糊為丸如桐子大用硃砂二錢研細為衣每服三五十丸煎金銀湯送下日進三服忌魚肉溫面動風之物治風癇年久病癲狂羊聲倒地不省人事或狂走持刃宜摧伏肝邪出如宜方用蛇含石火煅九次醋淬至酥研令極細取狗膽汁丸以龍眼大發時用一粒人參煎湯磨下每一服男子用雄狗膽女子用雌狗膽治心熱風癇用爛龍角濃研汁食前服二合日再服治風癇病不能愈者依厚朴丸宜春秋加添外於每一料中加出保命集人參菖蒲茯神去木各一兩半上依厚朴丸春秋加添法和劑服餌厚朴丸方在吐論中風癇抵住丸出永類鈐方皂角燒存性蒼耳根莖葉日乾四兩密陀僧一兩上為細末糊丸硃砂為衣三四十丸棗湯下日二服稍退作二十丸斷癇丸出永類鈐方紫石英醋淬煅七次二兩白礬飛過二兩上作末酒糊丸白湯下二十丸法煮萆麻子出衛生寶鑑治諸癇病不問年深日近萆麻子去皮枝取仁二兩黃連去須銼如豆大一兩上用銀器水一碗慢火熬水盡即添水三夜兩夜為度取去黃連只用萆麻子仁不得見日竹刀將萆麻子每枚切作四段計五粒作一服用荊芥湯食後日進二服龍齒丹楊氏家藏方治因驚神志恍惚久而成癇時發時止紫蘇子一兩龍齒石菖蒲遠志鐵粉別研木香白殭蠶炒去絲嘴白花蛇酒浸一宿取肉焙乾稱炙黃橘紅硃砂別研留少許為衣麻黃去根節天麻去苗酒浸一宿焙天南星湯浸薄切片子生薑汁浸一宿人參去蘆頭以上十三味各半兩全蠍一分去毒炒龍腦半錢別研麝香一錢別研上件為細末次入研者藥勻和煉蜜為丸每一兩作一十五丸每服一丸薄荷湯化下食空四聖散楊氏家藏方治心經蘊蓄發熱癲癇潮作熱盛隔食涎多大便祕澀白礬川甘硝寒水石盆硝以上四味各等分上入甘鍋子內揭口用炭火煅令煙盡取出候冷研為末每服一錢新汲水調下食後日三服此藥非特治癇尋常上焦壅盛膈熱痰多亦可服來蘇膏治遠年近日風癇心恙風狂中風涎沫潮閉牙關不開破傷風搐並皆治之用將皂角一個好肥者無蟲蛀去皮弦切碎用漿水一大碗春秋三四日冬浸七日夏浸一二日揉取淨漿浸透皂角汁入銀器或沙鍋以文武慢火熬用柳條槐枝攪熬似膏藥取出攤在夾紙上陰乾收頓如遇病人取手掌大一片用溫漿水化下在盞內用竹筒兒盛藥水將病人扶坐定頭微抬起將藥吹入左右鼻孔中良久扶起涎出為愈欲要涎止將溫鹽湯令病人服一二口便止忌雞魚生硬溫面等物治癇病出本草以象齒屑為末炙令黃飲下止熱狂驚癇出本草以菩薩石用水磨服之治暗風癇疾涎作暈悶欲倒者出本草以芭蕉油飲之得吐便瘥極有奇效取之用竹筒插皮中如取漆法治馬癇動發無時筋脈不收周痹肌肉不仁出本草以野馬肉一斤細切於豉汁中煮著五味蔥白調和作醃臘食之作羹粥及白煮吃妙治大人小兒久患風癇纏喉風咳嗽遍身風疹急中涎潮等此藥不大吐逆只出涎水出本草用瓜蒂不限多少細研為末小兒壯年服一字十五以下老怯半字早晨井花水下一食頃含沙糖一塊良久涎如水出年深涎盡有一塊如涎布水上如鑑矣涎盡食粥一兩日如吐多困甚即咽麝香湯一盞即止矣麝細研溫水調下昔天平尚書覺昏眩即服之取涎有效治心熱風癇出本草以黑驢乳食前暖服一大合日再服驅風散出本草治風癇鉛丹二兩白礬二兩上為末用三角磚相鬥以七寸紙鋪磚上先以丹鋪紙上次以礬鋪丹上然後用紙包卻將十斤柳木柴燒過為度出細研每服二錢溫酒下治猝得癇出本草用鉤藤甘草炙各二分水五合煮取二合服如小棗大日五夜三大良治癇疾金銀花根似蒜者一個以茶清研如泥令患者日中臥茶清調下仍且臥日中良久吐出雞子大物永不發如不吐即以熱茶投之
