body:
  text: 卷一百諸風門癇附論夫風癇病者皆由臟腑壅熱風邪干於心也心主於血故血壅而不行則榮衛氣澀血脈既亂神氣不定故發癇也凡少小有斯病者亦由五脈不流六氣逆行乳食不調風邪所中或先身熱瘛瘲驚啼而後發作其脈浮洪者病在於六腑及肌膚中則易治之若身冷不啼掣不驚叫病發時脈沉者病在於五臟若入於骨髓則難療也其候口鼻乾燥大小便不利眼視不明耳後青色眠臥不安腰直目眄青筋生頭髮豎時時作聲口不噤吐白沫渾身煩熱頭上汗出恆多驚悸手足顫掉夢中叫喚目瞳子大是發癇之狀也凡人患風癇者只在一二年間則可治久則頑痰入心則難治矣治之之法先以吐痰為急次灸四際左右手大指去爪甲角如韭葉兩足大指亦如之各七壯或五壯漸服化痰鎮心藥如尋常十日一發服藥後漸退至半月一發則是已效半年可愈記一婦人心恙一年一發為灸勞宮二穴間使二穴陽谷二穴百會一穴自此竟不發方妙功十一丸出神效方治癇疾丁香木香沉香乳香麝香京三稜炮莪朮炮黑牽牛微炒黃連雷丸炒鶴蝨炒胡黃連黃芩大黃焙陳皮青皮雄黃熊膽甘草炙各半兩赤小豆三百六十粒煮用白丁香直尖者三百六十粒輕粉四錢巴豆七個上為細末赤小豆爛煮研泥同蕎麵打糊作十一丸硃砂為衣陰乾服時水浸一宿化一丸大便出隨病各有形狀取下為驗或作化一番不可再服曾經火炙者不治遠年愈妙天麻烏蛇丸出聖濟總録治風癇心驚身熱瘛瘲搖頭口噤多吐涎沫不自知覺天麻酒浸一宿切炒烏蛇酒浸一宿去皮骨炙各一兩天南星將水浸一宿切焙二兩半夏將水煮過切焙半兩藿香葉烏頭去皮臍生用一兩白附子生用膩粉研各一分仙靈脾用葉半兩雄黃研鉛白霜研丁香各一兩犀角鎊屑人參各半兩麝香研龍腦研各一錢乾蠍全者去土炒一枚丹砂研半兩槐膠一分桑螵蛸二十枚炙用蛇黃燒醋淬七次研二分上為細末入研藥六味拌勻煉蜜和丸如梧桐子大每服十丸溫酒下食後臨臥服鉤藤皮湯救急療癇老少增減方鉤藤皮麻黃去節各二分龍齒六分研綿裹銀一斤寒水石梔子劈知母石膏碎綿裹杏仁去兩仁皮尖研各十二分升麻十分子芩十四分蛇蛻皮七寸炙蚱蟬四枚去足翅炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黃如大豆粒十枚煎成研下之上㕮咀以水六升淡竹瀝二升合煮取二升四合絞去滓內杏仁脂葛汁蜜於微火煎攪不停手令餘二升三合成三四歲一服二合五六歲一服二合半日再服稍增兒若大便澀者加大黃十分慎熱面炙肉魚蒜黏食油膩冷水龍齒丸出聖濟總録治風癇發即卒倒口吐涎沫手足俱搐一無所覺蘇而復發龍齒半兩細研虎睛一對微炙赤茯苓半兩鐵精三分人參半兩去蘆頭川大黃二兩銼碎微炒獨活一兩遠志半兩去心細辛半兩貫衆半兩鬼箭羽半兩天雄三分炮裂去皮臍露蜂房半兩微炒桂心三分鉤藤皮半兩蚱蟬七枚微炙衣中白魚三七枚川升麻半兩石膏一兩細研上為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大不拘時候以荊芥湯下二十丸神應丸出聖濟總録治風癇吐涎沫手足瘛瘲心神不定狐肝二具烏鴉二隻去嘴足腸並鴉肚共狐肝入瓶內燒作灰蒺藜子炒去角天麻白附子桑螵蛸炒金箔研各五十片乾蠍去土炒白殭蠶炒各二兩銀箔天南星炮麝香研犀角鎊蟬蛻炒龍腦研各一分牛黃研烏蛇酒浸去皮骨炙二兩丹砂研各半兩上為細末煉蜜丸如桐子大每服五十丸溫酒下不拘時候或煎荊芥人參湯下日二服丹砂丸出聖濟總録治五種風癇丹砂研膩粉研蛇蛻炙兒頭垢銅青研硇砂水少許浸去石各一分古字錢三文燒赤投於硇砂水中滓盡至水盡搗白礬熬令汁枯研龍骨研老鴉灰研鹽花研鉛丹研各半兩虎睛炙搗一對虎牙炙搗一對發灰研半分金箔研銀箔研各五片上將四味搗羅為末與別研十三味和勻再羅用豬血丸如櫻桃大每服二丸發時及晚間溫酒嚼下麻黃飲出聖濟總録治風癇卒倒吐沫口噤手足瘛瘲麻黃去根節煎掠沫去焙大黃銼炒牡蠣熬黃芩去黑心各二兩凝水石碎石膏碎赤芍藥滑石研紫石英白石脂俱碎各四兩人參桂去粗皮各一兩蛇蛻炙半兩龍齒研三兩甘草炙半兩上粗搗篩用絹囊盛懸於透空處每服五錢匕水一盞半煎至八分去滓食後久服銅青丸出千金方治風癇銅青與水銀同炒不盡更入少許硫黃同炒研水銀曾青研一作空青東門上雞頭亦謂之雞棲木醋炒搗各半兩硫黃研三分犀角鎊一作鳥羽卷柏去土各一分雄黃研一兩半石長生研白茯苓去黑皮白芷豬苓去黑皮白薇白蘞生用人參各一兩上將九味搗羅為末與別六味和勻重羅用青牛膽相拌入銅器內先布豆五升於甑中置藥器於上蒸之豆熟藥成丸如麻子大每服二十丸加至三十丸食後溫酒化下日再夜一牛黃丸出聖惠方治風癇病精神不全常有痰在胸膈嘔吐不出煩悶氣壅者牛黃半兩細研龍齒二兩虎睛一對酒浸一宿微炒安息香一兩入胡桃仁搗熟硃砂二兩細研水飛過犀角屑二兩鐵粉二兩人參一兩去蘆頭獨活一兩蜣螂去頭足翅微炒麝香半兩細研茯神一兩遠志一兩去心防風一兩半去蘆頭甘草一兩炙微赤銼上為末入研了藥令勻煉蜜和搗五七百杵丸如梧桐子大每服不拘時候以荊芥湯下三十丸治風癇因心臟積熱痰毒所為發即吐沫嚼舌出聖惠方水銀一兩鉛二兩與水銀結為砂子細研牛黃一分細研銀箔五十片細碎犀角屑三分熊膽半兩硃砂一兩細研水飛過麝香一分細研羚羊角三分馬牙硝龍齒各二兩白殭蠶三分微炒白附子三分炮裂乾蠍三分微炒上為散都研令勻每服不拘時候以防風湯溫調下二錢鉛霜丸出聖惠方治風癇久不瘥發時吐涎沫作惡聲音不識人鉛霜二兩細研金箔細研銀箔各一百片細研人參去蘆頭茯神遠志去心細辛菖蒲苦參黃芩梔子仁犀角屑各一兩龍齒二兩細研硃砂一兩細研水飛過上為末入研了藥更研令勻煉蜜和搗三五百杵丸如梧桐子大每服不拘時候以薄荷湯下三十丸虎睛丸出聖惠方治風癇積年不瘥發即昏昏欲睡良久方醒虎睛一對酒浸一宿微炙鐵粉二兩細研黃丹二兩麥門冬一兩半去心焙人參去蘆頭玄參沙參去蘆頭苦參各一兩銼金箔銀箔各一百片細研牛黃半兩細研馬牙硝黑鉛水銀一兩與鉛二味結為砂子細研上為末都研令勻煉蜜和搗三五百杵丸如梧桐子大每服不計時候以溫酒下三十丸勝金丸治風熱驚駭不時旋運潮搐口吐痰沫或卒然倒死不省人事名曰癇病天南星白殭蠶細辛烏蛇真者好酒浸去骨川烏頭生皂角炙黃白礬枯桔梗威靈仙何首烏草烏頭各一兩荊芥穗川芎各二兩上為末酒麵糊為丸如梧桐子大每服十丸食後溫酒下紫石散治大人風引小兒驚癇瘛瘲日數十發醫所不療一名風引湯紫石英滑石白石脂凝水石赤石脂石膏各五兩甘草桂心牡蠣各五兩大黃龍骨乾薑各四兩上為粗散盛以葦囊懸於高涼處欲用取三指撮以新汲井水三升煮取一升二合大人頓服未百日兒服一合未能服者綿沾著口中熱多者日四五服以意消息深師方只龍骨乾薑牡蠣滑石白石脂五味沉香天麻湯治癇瘛筋攣沉香一錢天麻三錢羌活五錢防風三錢益智仁一錢當歸一錢半獨活四錢半夏三錢湯洗川烏頭二錢炮炙甘草一錢半薑屑一錢半黑附子三錢炮去皮臍上㕮咀每服五錢生薑三片水煎魏敬甫云豫四歲一長老摩頂授記衆僧念咒因而大驚痰涎壅塞目白項背強喉中有聲一時方省後每見衣皂之人輒發多服朱犀龍麝鎮墜之藥四年餘前證仍在又添行步動作神思如癡手診其脈沉弦而急黃帝針經云心脈滿大癇瘛筋攣又肝脈小急癇瘛筋攣蓋小兒血氣未定神氣尚弱因而驚恐神無所依又動於肝肝主筋故癇瘛筋攣病久氣小兒易為虛實多服鎮墜寒涼之劑復損其氣故動作如癡內經云暴攣癇眩足不任身取天柱穴是也天柱穴足太陽脈氣所發陽蹺附而行也又癲癇瘛瘲不知所苦兩蹺男陽女陰又云晝發治陽蹺申脈穴在外踝下陷中容爪甲白肉際是也夜發治陰蹺照海二穴在於足內踝下陷中是也先灸兩蹻各二七壯然後服前藥鉤藤丸治少小癇病至大不除發即百脈攣縮行步不正口面喎戾言語無度鉤藤鉛丹研茵芋葉石膏各研杜蘅防葵秦艽去土甘草炙各一兩菖蒲九節者去節焙黃芩去黑心各一兩半松羅炒蜣螂去翅足炒各半兩上將十味搗羅為末與別研二味和勻重羅煉蜜丸如小豆大每食後良久服五歲以下五丸十歲以下七丸至十丸十五歲以上及長年並十五丸以意加減用金銀湯下鐵粉烏鴉散治積年癇病烏鴉去腸肚及嘴足鉛丹黑鉛鐵粉研各二兩丹砂一兩研先將鐵粉並研丹入鐵器內熟炒次入黑鉛一處結成沙子併入烏鴉腹內縫合以罐子盛用物蓋定鉛泥固濟收乾用熱火一稱煅令通赤取出搗為細末入丹砂更研如粉後入七味天麻羌活獨活去蘆頭防風去叉芎藭乾蠍去土炒天南星各二兩上為細散入麝香少許再研令勻每服半錢匕臨臥冷酒調服之牛黃丸治風癇瘛瘲口噤吐涎不知人牛黃麝香輕粉粉霜研各半兩金箔研銀箔各一百片研雄黃研細水飛丹砂研石緑研細水飛過蛇黃以下三味各煅醋淬九次研磁石石燕子各一兩上各研成粉拌勻以酒煮麵糊為丸如雞頭實大急風癱瘓並五種癇疾每服一丸薄荷酒磨下老人半丸十歲以下一丸分四服四歲以下分五服未滿一歲分七服並蜜水下或髮直面如桃花色口目俱開喉中作聲汗出如油汗出不流下多瀉泄便血等惡候勿治惟口噤目開者下藥立愈羌活大風丸治男子婦人一切癇疾涎潮搐搦及中風涎壅語言謇澀手足不遂小兒急慢驚亦治一名羌活丸防風去蘆天麻浸一宿焙乾用明者全蠍去毒炒獨活羌活白芍藥一作白茯苓青黛各一錢半另研人參去蘆各三兩麝香各二錢川芎一錢半龍腦別研一錢水銀一錢入硫黃一錢同研結砂子上為末煉蜜丸每服分作二十丸硃砂為衣大人服二丸小兒服一丸一歲以下半丸煎荊芥湯下食後臨臥發病時不以時候服茯神湯治風癇發驚掣無時茯神去木龍齒研防風去叉杏仁去皮尖雙仁炒羌活去蘆頭芎藭人參麥門冬去心焙大黃銼炒鉤藤甘草炙銼各一兩上將一十味粗搗篩與龍齒拌勻每服六錢匕水二盞煎至一盞去滓空心溫服得利兩三行即止之銀液菖蒲丸治風癇涎盛精神減耗菖蒲人參黑錫各三兩同水銀結成砂子遠志去心羌活各一兩水銀同黑錫結成砂子白茯苓去黑心天南星炮一兩半蟬蛻炒細辛去苗葉各半兩半夏湯洗七次二兩上為細末煉蜜丸如梧桐子大每服七丸生薑湯下不拘時候銀箔丸治癇病積年不瘥得熱即發風痰漸多銀箔五十片研龍齒研麥門冬去心炒烏蛇去皮骨酒炙鐵精一作鐵粉人參防風去叉黃芩去黑心升麻各一兩半熊膽研半兩生乾地黃焙一兩半上為末煉蜜丸如梧桐子大每服後煎水下三十丸日二服一方無銀箔用水銀八分每服三十丸驢乳汁下一方無黃芩有犀角屑治暴得驚癇效方鉤藤皮茯神黃芩升麻白蘚皮沙參各二兩龍齒三兩石膏八兩蚱蟬七枚去翅足研湯成用寒水石六兩碎研裹甘竹瀝二升湯熟內之上㕮咀以水九升煮取三升溫分三服相去如人行六七里久若小兒患藥各減量取多少細細飲之立瘥忌酸物水銀丸治風癇纍年不瘥痰毒轉甚精神減耗時時發動水銀三兩鉛三兩與水銀結為砂子細研遠志去心人參去蘆頭菖蒲茯神各一兩蟬