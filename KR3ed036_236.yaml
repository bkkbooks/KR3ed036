治骨蒸及腳氣每至晚間憎寒壯熱面頰赤不下食日漸羸瘦生地黃切細二兩甘草炙銼半兩蔥白細切二莖童子小便一升上四味同煎至半升去滓溫分三服相去一時許服之治骨蒸勞瘦方見地黃粥方治骨蒸熱積漸黃瘦上黃連四分碎切以童子小便用三大合浸經宿微煎三四沸去滓食前分二服如人行四五里再服治丈夫婦人勞瘦上用青蒿細銼水三斗童子小便五升同煎二升半去滓入器中熬成膏丸如梧桐子大空心服臨臥以溫湯吞下二十丸治諸結節筋骨煩熱甘草十分上搗為末每日取小便三合甘草末一錢攪令為散服之紫菀散出聖惠方治傳屍骨蒸復連殗殜肺氣嗽咳一名紫菀湯紫菀去苗土桑根白皮炙銼桔梗炒續斷各一兩半赤小豆一合甘草炙銼五味子各一兩生乾地黃酒洗切焙一兩半上八味粗搗篩每服五錢以水一盞半入青竹茹彈子大煎至一盞去滓食後溫服良久再服若熱甚加麥門冬去心一兩石膏一兩半天門冬丸出聖惠方治骨蒸勞氣潤心肺止咳嗽天門冬去心焙三兩半桑根白皮銼炒白茯苓去黑皮各三分杏仁湯浸去皮尖雙仁麵炒甘草炙貝母去心炒各一兩上六味搗羅為末煉蜜為丸如彈子大每服一丸綿裹含化津咽煎麥門冬湯嚼下亦得不拘時候服治骨蒸勞瘦出經效良方及久咳不愈者常服直至取效為度石膏一斤不用方解石者以細絞如棗針者良打碎粉甘草一兩上為細末重羅過如面溫湯調服日夜三四服之
