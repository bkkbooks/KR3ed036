body:
  text: 卷二百三十六勞瘵門骨蒸附論夫骨蒸病有五種一曰骨蒸其根在腎早起則體涼日晚則熱燥四肢不安飲食無味小便赤黃忽忽煩亂喘促無力腰背多疼兩足逆冷手心長熱蒸盛過傷則內變為疳蝕人五臟二曰脈蒸其根在心日增煩悶擲手出足翕翕思水多唾白沫睡即浪言驚恐不安其脈浮數蒸盛之時或變為疳臍下脹痛或利不止三曰皮蒸其根在肺大喘短氣鼻口俱干舌上色白小便如血蒸盛之時胸滿注熱兩脅下脹咳嗽胸背疼痛眠臥不安蒸毒傷肺即唾血也四曰肉蒸其根在脾體熱如火煩躁無汗心腹脹臌食即欲嘔小便如血大便秘澀蒸盛之時或身腫目赤眠臥不安五曰內蒸亦名血蒸所名內蒸者必外寒而內熱以手拊骨而內熱者其根在五臟六腑其人必因熱病後得之骨肉自消飲食無味或皮燥而無光蒸盛之時四肢無力足踵腫起又有二十三蒸者一胞蒸小便黃赤二玉房蒸男則遺瀝漏精女則月候不調三腦蒸頭眩悶熱四髓蒸髓沸熱心昏五骨蒸齒黑六筋蒸甲焦七血潛發焦八脈蒸緩急不顧九肝蒸或時飢前昏眩十心蒸舌乾十一脾蒸肉焦十二肺蒸鼻乾十三腎蒸兩耳乾焦十四膀胱蒸右耳偏焦十五膽蒸眼白色無事常驚十六胃蒸舌下痛十七小腸蒸下焦熱尿即痛十八大腸蒸鼻右孔痛十九三焦蒸生病乍熱乍寒二十肉蒸肌肉消瘦二十一氣蒸即喘息氣二十二皮蒸在筋皮蒸即筋皮攣縮二十三遍身蒸體氣熱凡語諸蒸患多因熱病後食牛羊肉油膩或酒或房事觸犯而成此疾久蒸不除多致危篤必須早療也方治五蒸方夫蒸者乃附蒸熱毒之氣皆是死之漸庸醫不識熱毒形狀或妄稱神祟以相疑惑致使蒸盛變為疳而致斃者今具各方於後一曰骨蒸出千金方用芒硝水服早晚每日再服亦可搗苦參蜜和為丸如梧子大一服七丸日再以米飲送之無忌以體輕涼為度二曰脈蒸苦參青葙各二兩艾葉甘草各一兩炙上切以水四升煮取一升半分為三分用羊胞盛之以葦筒灌下部中若不利取芒硝一兩許和冷水合和服之再服忌海藻菘菜三曰皮蒸急與芒硝一兩以水一升半和分為三服三日服止訖以冷水浸手以熨脅間及腋下並胸上及痛處亦可舉臂指炙側腋下第三肋間腋下穴中七壯立止四曰肉蒸用大黃一兩半切如小豆大以水一升浸一宿明旦絞取汁服五合許微利即止若熱不定亦可服芒硝一兩許每日三以涼體為度五曰內蒸出肘後方所以言內者以外寒內熱附骨也其根在五臟六腑之中必因患後得之骨肉自消飲食無味或皮燥而無光蒸作之時四肢漸細足踵腫者用石膏十兩研如乳粉法用和服早晚每日再以體涼為度加減青蒿丸治男子女人一切勞疾骨蒸風氣此藥有七名一名杏仁丸治瘦二名木香丸能治屍注鬼氣九種心痛三種蟲咬心痛三名犀角丸治時行熱疾瘟疫四名龍腦丸治小兒無辜痞痢五名萬病丸治一切虛傷六名丹砂丸治毒邪痃癖氣等七名青蒿丸治男子女人一切勞氣若常帶行山林曠野坑阱塚墓前後鬼神不敢近若被毒蛇惡物所傷爛嚼一丸敷之即效青蒿心三枚細切童子小便三大斗生地黃三挺竹刀切搗東引桃枝半握細搗碎一二兩甘草四兩炙以上五味用新甕子一口以小便浸七日和小便並前件藥煮三五百沸漉出藥曬乾搗羅為末然後將小便清入釜中以桑柴火煉之以篦攪勿住手三斗小便煉至三升用不津器盛將和後藥杏仁桃仁並去雙仁及皮尖炒令黃桔梗葳蕤枳殼麩炒去瓤大黃焙升麻蒼朮炒一方用白朮白茯苓去黑皮地骨皮甘草炙天靈蓋酥炙一兩無虎骨代貝母去心蕪荑炒當歸切焙黃耆銼桂去粗皮橘皮去白焙厚朴去粗皮薑汁炙防風去瓤檳榔不得近鐵器吳茱萸湯浸炒丹砂別研麝香別研各一兩木香二兩半犀角屑一兩半羚羊角屑二兩一分上為細末用前小便煎和勻入臼搗五百下如末黏可入煉蜜和丸如梧桐子大每食後溫水下三十丸疾重日再服通三焦安五臟四時常服永無虛勞之疾時行瘴瘧常不能害上氣咳嗽無問涕唾並干嗽嗽後有血此名肺熱熱毒壅轉成鼻塞聲破胸中結痛若不速除當成肺痿勞瘦服此藥五兩其病乃平手足熱如火口生瘡舌爛夜夢不祥口中䘌齒牙痛咽痹服五兩瀝子根本從大腸出如朽筋爛肉又如蝦蟆衣櫻桃結異腥臭者上瘰癧當法不治根本必攻五臟狀如藤蘿繞木榮枯不相舍令頸項破損必死服此八兩當效若患時氣頭痛欲死身熱大小便秘澀復不識人不下食新汲水下五十丸即瘥丈夫婦人曾服熱藥過度近雖藥盡氣力猶有往往發來沖人頭面致眼痛昏熱心胃燥煩口臭生瘡溫水下二丸不過一二兩嬰孩無辜病與大人勞病同為在胎中傷精血致令唇口焦乾或瀉或利腹中漸結眼中生膜服之可愈若孩子漸不准大人例服之女人月經不均或前或後多少不定青色雜或凝或散漸成勞瘦服一二兩當愈春加龍膽龍骨柴胡去苗黃連去須略炒各一分夏加知母石菖蒲麥門冬去心白茯苓去黑皮各一兩秋加訶黎勒皮秦艽旋覆花各一兩龍膽丸治骨蒸熱病諸勞瘴毒多痰氣促頭痛口乾目澀少食漸漸羸瘦龍膽三兩柴胡去苗秦艽去苗土葳蕤升麻百部枳實去瓤麩炒玄胡旋覆花馬兜鈴百合紫菀射干木香防風去皮黃芩去黑心梔子仁大黃銼炒栝蔞實沙參貝母去心硝石研凝水石茵陳蒿石膏知母切焙青蒿款冬花麥門冬去心各一兩焙上為末煉蜜丸如梧桐子大每服三十丸米飲或酒下亦得生地黃煎丸出聖惠方治骨蒸勞疾煩熱口乾頰赤咳嗽寒熱盜汗四肢乾瘦宜服牛膝四兩去苗生乾地黃汁一升青蒿一升汁生薑汁一合童子小便三升生乾地黃四兩桃仁三兩去皮尖研如膏同煎藥六味於石鍋子內慢火熬令爛研取汁去滓入蜜半斤更熬如膏川大黃一兩銼碎微炒鱉甲二兩塗醋炙令熬黃去裙襴赤茯苓三分胡黃連三分犀角屑知母枳殼麩炒微黃去瓤龍膽去蘆頭木香黃芩地骨皮桔梗去蘆頭桑根白皮銼赤芍藥當歸各二分麝香半兩細研秦艽一兩去苗柴胡一兩去苗上為末入麝香令勻用前搗和五七百杵丸如桐子大每服食前以溫酒下三十丸清粥飲下亦得忌炙爆油膩面莧菜鱉甲湯治男子女人骨蒸皮肉消瘦面色痿黃不思飲食夜多咳嗽涕唾稠黏骨節疼痛憎寒壯熱心腹氣脹坐臥不安發如瘧狀女人血氣一切勞疾鱉甲去裙襴醋炙令黃三兩秦艽去苗土三兩紫菀去土兩半柴胡去苗三兩訶黎勒皮煨一兩半牡蠣煅麻黃去根節犀角屑知母切焙升麻甘草炙梔子仁檳榔銼木香當歸切焙桔梗炒桑根白皮銼大黃炒黃連去須桃仁炒人參桂去粗皮葳蕤芎藭各一兩上粗搗篩每服三錢水一盞棗一枚擘烏梅一個生薑三片同煎三五沸去滓稍熱服不拘時候獺肝丸出聖惠方治骨蒸勞熱體瘦煩疼宜服獺肝一兩微炙麝香一兩細研犀角屑半兩牛黃一分細研鱉甲一兩塗酥炙微黃去裙襴天靈蓋三分塗酥炙令微黃阿魏一兩麩裹煨面熟為度雄黃三分細研木香半兩龍膽半兩去蘆頭黃連三分知母三分柴胡一兩去苗地骨皮三分赤芍藥半兩麥門冬一兩半去心焙甘草半兩生用白朮半兩黃芩半兩赤茯苓三分川升麻半兩硃砂三分細研檳榔三分上為末研了藥令均煉蜜和搗二三百杵丸如梧桐子大每服不計時候以清粥飲下三十丸忌莧菜青蒿丸治童子室女骨蒸熱成勞不思飲食食即無味身體苦疼陽熱傳盛面色多赤青蒿銼四兩甘草銼一兩桃仁杏仁各二兩去皮尖雙仁以上用童子小便五升瓷瓶盛入藥於內磚支其底以糠頭火燒一夜取出桃杏仁別研如泥別入芍藥知母天靈蓋炙車前子紫菀去土各一分葳蕤當歸切焙枳殼去瓤麩炒生地黃焙檳榔銼黃連去須秦艽去苗土京三稜煨銼柴胡去苗續斷各一分獺肝炙半兩麝香犀角生用屑一兩上除前四味外為末和桃杏仁同搗一二十下旋入所煎小便濕搗一二千杵如硬入熟蜜一兩半更搗眾手為丸如梧桐子大不計時候每日熟水下三十丸咳嗽加貝母半兩婦人月候不通加牡丹延胡索各一分五心煩躁加地骨皮茯神羚羊角初患未傳諸藏酒下四服即愈腹中有塊及痃癖惡寒頭痛面黃色毛髮焦枯服畢便愈豬肚黃連丸出聖濟總錄治骨蒸虛勞傳屍肺痿咳嗽不止困重羸瘦壯熱或即憎寒腹內冷腹四肢煩疼飲食無味頭疼口乾涕稠唾黏渴不止者獖豬肚一具童子小便煮令熟細切搗為末知母蕪荑仁炒各二兩紫菀去苗二兩百部銼焙令乾檳榔煨桔梗炒蒼朮米泔浸切焙大黃炒微炒鱉甲去裙襴醋浸炙黃芩去黑心人參貝母去心柴胡去苗地骨皮龍膽去蘆頭白茯苓去黑皮黃耆銼各一兩黃連去須上一十九味搗羅為末煉蜜為丸如梧桐子大每服空腹溫酒送下二十丸加減黃耆建中湯出經效方治男子婦人五勞骨蒸者試用神效白朮白茯苓桔梗各三錢人參錢半秦艽北柴胡防風白芍藥甘草當歸去尾澤瀉生地黃熟地黃地骨皮肉豆蔻煨檳榔縮砂仁各五錢豬苓四錢黃耆上為散每服三錢水一盞半煎溫服不拘時候老人更加黃耆一兩或為末蜜湯調服臨期斟酌鱉甲煎丸一名青蒿鱉甲煎丸出王氏博濟方治虛勞骨蒸早晚煩熱寢食不安五心熱悶百節痠疼鱉甲去裙襴醋炙柴胡去苗各二兩甘草炙銼杏仁去皮尖雙仁炒桔梗當歸切焙地骨皮人參赤芍藥各一兩木香桂去粗皮各半兩黃連胡黃連各一分麝香另研二錢酥三兩蜜三兩上一十六味除麝香酥蜜外搗羅為末用青蒿一斤童子小便五升好酒一升熬青蒿至二升去蒿入酥蜜再熬成膏候冷入藥末麝香同和丸如梧桐子大每服十五丸至二十丸溫酒或米飲下日三服治骨蒸癘疾瘟疫出聖濟總錄寒熱瘧病五屍九注心腹絞如刺盡毒鬼魅一切熱毒腳氣悶亂攻衝煩熱口中生瘡狂易叫走及解諸毒兼金石草藥熱毒發黃燥熱疼痛一切熱病方金十五兩銀十五兩寒水石石膏磁石滑石各三斤以上四石藥同搗碎後以金銀共六味一處以水一石煮取一斗去金銀並石滓入後藥末木香一兩犀角鎊五兩丁香四兩沉香五兩甘草炙八兩升麻玄參各一兩上除前六味外用水三斗煮取一斗絞去滓淨與前藥汁相合即納蜀硝五升細研入藥汁慢火同煎手不住攪之可有一斗余即投於盆器內盛欲凝納水飛丹朱末三兩麝香末一兩一分同研如粉和均蓋覆之二日成霜雪曝乾以新合或瓶內密封盛貯之有病即取強人服一錢冷水和服以意隨人強弱增損之腳氣病或曾服金石藥發動毒悶者水和服半錢服訖即仰臥以物墊腰令高使藥向胸腹間若患眼赤熱痛者以冷水和之點於大小眥初著微微痛少時淚出自定日三五次夜用亦如之無不效口內生熱瘡含如杏核許令消細細嚥之乃止治骨蒸有蟲相傳不絕宜服此方出聖惠方蓬莪朮三分鱉甲三兩塗酥炙微黃去裙柴胡一兩半去苗紫菀三分去苗土桂心一兩當歸一兩蜈蚣一枚赤足者炙黃去頭足蜥蜴一枚炙黃去頭足斑蝥二十枚糯米拌炒令黃去翅足桃仁四十九枚湯浸去皮尖雙仁麩炒微黃川大黃一兩銼碎微炒檳榔一兩上細羅為散每服空腹以清粥飲下一錢服後穩臥將息小便中赤有病根下或蟲物出如未應隔日再服忌莧菜麥門冬湯治心中煩熱唯欲露體覆之即煩悶驚悸心忪面無顏色忘前失後婦人患血風氣者多成此疾乃心蒸之狀麥門冬去心焙龍齒遠志去心茯神去木防風去叉地骨皮去土各三兩人參甘草炙黃羚羊角石膏各三兩紫石英一兩上各銼如麻豆大每服三錢以水一盞半入棗兩枚煎取半盞去滓溫服未瘥再服以瘥為度甚益心力曾經吐血者服之尤佳若畏石藥不用紫石英茯苓湯治心蒸若心驚悚慄男子因讀書損心氣傷思慮過損心吐血心煩多忘失精神或體癢瘙風癬或胸中氣滿白茯苓去黑皮麥門冬去心焙款冬花獨活去蘆頭檳榔銼各六兩桂去粗皮防風去叉防己各五兩甘草炙四兩枳殼去瓤麩炒四兩地骨皮去土十兩上銼如麻豆大每服五錢以水二盞先煎山澤銀取水一盞半入藥並生薑半分切大棗三枚擘破同煎取一盞去滓服早晚各一服烏梅丸治諸骨蒸久不瘥烏梅肉炒知母焙各一兩雞舌香紫菀去苗土赤芍藥大黃蒸三度焙黃芩去心細辛去苗葉各一兩一分桂去粗皮白礬枯栝蔞根焙各半兩上為末煉蜜丸如梧桐子大每服空腹米飲下二十丸日二一方有雞骨無雞舌香犀角丸出聖惠方治骨蒸勞疾羸瘦晚即面赤手足痠疼口乾肚熱犀角屑一兩獺肝一兩微炒柴胡一兩去蘆頭地骨皮一兩鱉甲一兩塗酥炙令黃去裙襴枳殼一兩麩炒微黃去瓤人參一兩去蘆頭柏脂一兩黃耆一兩銼甘草一兩生用天靈蓋一兩半塗酥炙令黃上為末煉蜜和搗三二百杵丸如梧桐子大每服食前以溫童子小便下三十丸忌炙爆熱面莧菜麥煎散治少男室女骨蒸婦人血風攻注四肢口臭肚熱盜汗赤茯苓當歸乾漆生鱉甲酥炙常山大黃煨柴胡白朮生地黃石膏各一兩甘草半兩上為末每服三錢小麥五十粒水煎食後臥時服若有虛汗加麻黃根一兩骨蒸之候男子因五勞七傷或因肺壅或因瘴瘧之後宿患痃癖婦人因產後虛勞漏汗寒熱或月閉不通無問男子婦人病後餘熱不除或為勞復小兒閃癖其病並緣此十候所致因漸瘦損初著盜汗即寒熱往來漸加咳嗽後面色白兩頰赤如胭脂色團團如錢許大左臥即右出若唇口非常鮮赤則熱重若加吐痢百無一生服此仍得不著後人青葙子六月六日採知母黃連去毛大黃梔子仁栝蔞常山葳蕤苦參皮各二分甘草炙蜀漆各五分洗上搗篩蜜和為丸如梧桐子大飲服五丸漸加至十五丸日再以知為度因至和忌豬肉熱面蔥蒜生菜海藻菘菜龍膽丸治骨蒸熱勞羸瘦面色痿黃嘔逆上氣煩悶短氣喘急日晚便劇不能飲食柴胡湯治骨蒸熱勞柴胡去苗一兩胡黃連半兩紫菀去土知母各三分鱉甲小者半斤小便浸一宿醋炙天靈蓋醋炙一兩秦艽去苗土一兩甘草炙黃半兩杏仁去皮尖雙仁炒一兩地骨皮三分上粗搗篩每服二錢水一盞入青蒿少許同煎至七分露天處安一夜平旦去滓空腹溫服龍膽丸治骨蒸身熱手足煩心中躁羸瘦漸漸不食龍膽一兩一分黃連去須黃柏去粗皮炙大黃銼微炒赤芍藥人參山梔子仁甘草炙各一兩黃芩去黑心三分上為末煉蜜丸如梧桐子大食後米飲下十五丸日午再服一方無大黃麥門冬飲治心蒸心中煩躁手足熱疼欲露其體驚悸怵惕咽乾虛渴面色痿黃失前忘後婦人血氣衰弱傳此疾麥門冬去心焙乾二兩白茯苓去黑皮人參龍腦遠志去心各二兩甘草炙一兩防風去叉地骨皮去土各三兩羚羊角鎊末一兩上銼如麻豆大每服五錢以水二盞入山澤銀一分棗二枚擘破同煎取一盞取滓分溫二服若大患煩熱燥渴者入淡竹瀝一合煎服若曾經吐血亦治天靈蓋飲子出聖惠方治骨蒸四肢疼痛筋脈拘急寒熱進退發作如瘧日漸痿黃不能飲食宜服天靈蓋半兩塗酥炙微黃搗為末鱉甲半兩塗炙醋微黃去裙襴搗為末知母半兩桃仁一十枚去皮尖雙仁湯浸麩炒微黃柴胡半兩去苗青蒿半兩甘草一分生用豉心半合蔥白二莖並須上細銼拌勻用童子小便三大盞從午浸至日入五更煎取一盞去滓食前分溫二服服訖衣蓋臥至日出良久審著手十指節間有毛如藕絲燒之極臭毛色白者必瘥黑者難救忌莧菜生地黃飲子出聖惠方治骨蒸身勞煩熱四肢疼痛小便赤黃宜服生地黃二兩柴胡一兩去苗蔥白五寸切香豉半兩甘草半兩生用生薑半兩杏仁半兩湯浸去皮尖雙仁麩炒微黃地骨皮半兩赤芍藥半兩上細銼和勻每服五錢以童子小便一大盞入桃柳嫩枝各一握長七莖散豉五十粒生薑半分蔥白三莖煎至七分去滓食前分為二服忌莧菜桃枝飲子出聖惠方治骨蒸勞瘦體痛煩熱宜服嫩桃枝一握長莖七寸柳枝一握長莖七寸豉心半合甘草三分生用生薑半兩蔥白一寸七韭白三莖青蒿二兩上細銼以童子小便二大盞煎至一大盞三分去滓不計時候分溫三服鐵粉丸出聖惠方治骨蒸勞體瘦寒熱宜服鐵粉二兩獺肝一具微炙安息香三分鬼督郵一兩白朮三分木香二分柴胡一兩去苗胡黃連二分上為末煉蜜和搗三二百杵丸如梧桐子大每於食前以粥飲下二十丸鱉甲豬肚丸治骨蒸唇紅頰赤氣粗口乾遍身壯熱或多虛汗大腸秘澀小便赤黃飲食全少麥門冬煎出聖惠方治骨蒸勞身體常熱羸瘦皮毛乾枯生麥門冬汁青蒿汁生地黃汁各二升童子小便三升桃仁大者二兩湯浸去皮尖雙仁麝香一錢細研硃砂一錢細研上以三味汁與小便用慢火同煎稍稠即下研了桃仁麝香硃砂等更熬令稀稠得所如膏每服不計時候以清粥飲下一匙忌羊血柴胡煎丸出聖惠方治骨蒸勞頰赤口乾心神煩悶體瘦發渴寒熱童子小便三升甘草一尺二寸雄鼠糞四十九粒桃柳枝各一握長三寸豉心半升糯米一合蔥韭白各一握上細銼入小便內煎至三升去滓更煎如稀餳以柴胡一斤搗羅為末入前藥煎中和搗三二百杵丸如梧桐子大每於食前以溫酒下三丸溫水下亦得地黃煎主婦人丈夫血氣勞骨蒸日漸瘦悴生地黃汁三升甘草三兩炙末豉豆一升蔥白切一焙牛酥半斤藕汁二升白蜜一升上以小便六升煮蔥豉等取二升絞滓次下地黃藕汁更煎取三五服下酥蜜攪勿住手候似稀餳以器貯之每服一匙漸至三匙成煎桑枝熬湯調和服之尤妙桃仁湯亦良地骨皮湯治五蒸地骨皮白茯苓去黑皮麥門冬去心焙柴胡去苗各一兩半赤芍藥甘草炙令赤各一兩上粗搗篩每服五錢水一盞半煎至一盞去滓食後分溫二服鱉甲湯治男子婦人骨蒸勞氣肌體羸瘦四肢無力頰赤面黃五心煩躁困倦心忪或多盜汗腹脅有塊不欲飲食鱉甲去裙襴醋炙柴胡去苗各三分桔梗炒甘草炙黃各二兩半秦艽去苗土一兩青蒿二兩用童子小便浸一宿焙乾微炒上粗搗篩每服三錢水一盞入烏梅一個拍破同煎至六分去滓食後溫服治骨蒸熱出千金方取人屎乾者燒令外黑水中澄清每旦服一小升薄晚小便服一小升以瘥為度既常服新作大坑燒二升夜以水三升漬之稍稍減服小便用童子者佳一方以人尿灰酒服亦可青蒿煎出聖惠方治骨蒸勞氣四肢羸瘦疼痛青蒿切一半童子小便一斗麝香二錢細研阿魏一兩面裹煨令面熟為度細研桃仁五兩去皮尖雙仁湯浸麵炒微黃細研天靈蓋二兩塗酥炙微黃搗末上先將青蒿於小便中煮取五升研絞去滓即下諸藥熬成膏瓷閤中盛每於食前以清粥飲調下半匙天靈蓋丸出聖惠方治骨蒸勞神效天靈蓋一兩半以童子小便一升煮令小便盡炙乾地骨皮一兩半麥門冬二兩半去心焙鐵粉二兩赤茯苓一兩半黃連二兩去須上為末煉蜜和搗三二百杵丸如梧桐子大每服於食前煎麥門冬湯下二十丸團魚丸出經效良方治骨蒸潮熱咳嗽貝母前胡知母杏仁柴胡各等分團魚二斤上前藥同團魚煮候魚熟提起團魚除去魚頭不用取肉連汁食之卻將前藥焙乾為末就用團魚裙甲及骨更煮一盞和藥為丸如梧子大每服三十丸煎黃耆湯空心下病安仍服局方黃耆益損湯補理須用市店中自死團魚阿魏散出聖惠方治骨蒸勞熱四肢煩疼大便秘澀無問遠近宜服阿魏一分麵裹煨面熟為末川大黃半兩銼碎微炒檳榔一兩木香一分桃仁三分湯浸去皮尖雙仁麵炒微黃上細羅末散研麝香一錢和桃仁更研令勻每服食前用青蒿汁半合生薑汁半合童子小便三合都攪過調下二錢每於食前服以溏利為度黃連煎出聖惠方治骨蒸勞熱心神煩躁口乾眼澀咳嗽宜服黃連一兩去須紫菀一兩洗去苗土甘草三分炙微赤銼青葙子一兩天靈蓋二兩半塗酥炙勻微黃上細羅為散以童子小便五大盞浸一宿慢火熬煎每服不計時候以粥飲調下一茶匙忌豬肉地骨皮散出仁存方治骨蒸地骨皮黃耆人參鱉甲酒浸炙生用甘草各等分上羅勻每服三錢以水一盞生薑三片棗子一個煎至七分去滓空心臥時服地仙散出經驗方治骨蒸肌熱一切虛煩北地骨皮防風各一兩人參雞蘇甘草各二錢半上為細末每服二錢水一盞生薑三片淡竹葉三五葉一同煎至七分去滓溫服青蒿散治虛勞骨蒸咳嗽聲嗄皮毛乾枯四肢倦怠夜多盜汗時作潮熱飲食減少日漸瘦弱天仙藤鱉甲醋炙香附子炒去毛桔梗去蘆前胡去苗秦艽青蒿各一兩烏藥半兩甘草一兩川芎二錢半上為末每服二錢水一盞姜三片棗一枚煎食後服柴胡梅連散一名前胡散出瑞竹堂方治骨蒸勞久而不痊三服除根其效如神及五勞七傷虛弱皆治胡黃連柴胡前胡烏梅各三枚上羅勻每服八錢童子小便二盞豬膽一個豬骨髓一條韭白半錢煎至一盞去滓無時服治骨蒸出危氏方有人患勞瘵兩年諸藥不效一日無肉味其腹痛不可忍又恐傳染移在空房候其自終經二三日病者腹痛氣息將絕思肉味之美忽有人惠雞子三枚其病人俯仰取火低頭取瓦銚煎熟吹火屢燃屢滅鼻中如有礙將熟間忽嚏噴一聲有紅線一條自鼻中出牽抽約二尺長趍下瓦銚中病人知是怪物即用碗覆銚盡力燒火不住其銚欲裂方住火開銚視之乃是小蟲一條頭目皆具已煅死如鐵線樣即以示其家人後棄之於江其病即安地仙散出危氏方治骨蒸肌熱一切虛勞煩躁生津液地骨皮二兩防風去蘆一兩甘草半兩麥門冬去心一兩上銼散每服三錢水一盞生薑五片煎不拘時候服香豉飲出聖清細錄治骨蒸腫氣每至日晚即惡寒壯熱頰色赤不下食日漸瘦香豉一分生地黃一兩蔥白三莖上細銼相和以童子小便二盞半浸一宿平旦煎至八分去滓分溫二服空腹日午服一方有甘草炙二兩青蒿丸出聖惠方治骨蒸體熱發渴寒熱宜服青蒿一斤取葉曝乾搗羅為末桃仁一斤湯浸去皮尖麩炒令黃研爛甘草五兩生搗羅為末上以童子小便三斗於瓷甕中盛於糠火上煎令如稀餳卻傾於銅器中下諸藥又於糠火上煎以柳木枝攪之看稀稠得所候可丸即丸如梧桐子大以粗疏布袋盛之每日空心溫童子小便下三十丸日晚再服大黃丸出聖惠方治骨蒸勞兩脅下有閃癖漸上攻心食少或不消化腹內積聚不散黃瘦久困作痢或大便秘澀小便赤黃宜服川大黃二兩銼碎鱉甲三兩塗醋炙令黃去裙上為末以釃醋二升入鐺中先煎令稠下藥末更煎之以柳木枝攪勿住手候可丸即丸如梧桐子大宜空腹及晚食前以粥飲下九丸漸加至十丸以溏利下膿血爛肉為度唯得食煮飯蔥煎汁下生薑而已此外不得食之老小以意加減忌莧菜治骨蒸勞心煩不得眠臥出本草用酸棗仁二兩水二大盞半研絞取汁下米二合煮粥候熟下地黃汁一合煎煮過不計時候食之天靈蓋丸出聖惠方治骨蒸勞顏色憔悴不思飲食四肢急強翕翕發熱宜服此方人頭骨三大兩炙射干一小兩上搗篩和更搗一千杵丸如梧子大一服七丸日再服以粥飲下若胸前青筋出者以針刺看血色未變黑者服藥七日必瘥每日午時更服後丸一服皂莢丸出聖惠方治骨蒸傳屍鬼氣取皂莢並樹白皮及棘刺五七片各燒為末水淋取汁更於灰上再淋如此三五遍即煎霜成取二兩入麝香三分同研用軟飯和丸如小豆大每服空心以溫酒下七丸瀉下勞蟲即愈如未利即加丸數服