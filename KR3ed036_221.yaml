body:
  text: 卷二百二十一諸虛門補虛治小腸附論夫腎與膀胱俱虛其氣盛有餘則病小腸痼二經俱虛則寒邪乘之久而不愈傳為小腸之疾補虛之法去腎間寒邪嘗須溫暖蓋為此也故令補虛又參以治小腸之藥方蘹香子丸出聖濟總録治小腸虛寒撮痛蘹香子炒蜀椒去目合口者炒取紅附子炮裂去皮臍巴戟去心木香青桔皮湯浸去白焙青鹽別研楝實銼炒蓯蓉酒浸切焙阿魏醋化麩和作餅炙乾蠍去土炒蓽澄茄補骨脂炒葫蘆巴大戟各一兩肉豆蔻去殼三枚硫黃舶上者研一兩上為末用白羊腎四對去筋膜沙盆內研如面將藥一處木臼中更入煉蜜杵千百下丸如桐子大每服溫酒下二十丸元氣虛蔥白熱酒下三十丸空心食前葫蘆巴散出聖濟總録一名補骨脂丸治腎臟虛憊腰膝痛小腸膀胱等氣攻衝內固丸出聖濟總録治下元虛冷臍撮痛及小腸氣疼丹砂研一兩硇砂水飛研一分蘹香子炒芫花醋化煮炒焦黃色玄胡索研海蛤楝實取肉麵炒半夏湯洗七次葫蘆巴蕓薹子研海桐皮銼各半兩沒藥研乳香研紅娘子糯米別研炒各一兩良薑半兩上為末酒煮糊和丸如桐子大每服十五丸炒薑湯鹽酒溫下食前楝實散治小腸撮痛楝實銼炒莪朮煨銼三稜煨銼芎藭補骨脂炒菟絲子酒浸另搗各半兩木香葫蘆巴桂去皮蘹香子炒蓽澄茄陳皮丁香各一分上為散每服二錢許熱酒或生薑湯調下食前服蘹香附子丸治積年傷憊小腸久冷及痃氣附子炮去皮臍桂去皮葫蘆巴馬藺花炒蘹香子炒青皮去白焙楝實取肉炒乾薑炮巴戟去心補骨脂炒各半兩上為末酒煮糊和丸如桐子大每服空心鹽湯酒下二十丸木香丸治下元虛冷臍腹撮疼及膀胱小腸氣痛木香半兩乾蠍去土炒阿魏醋化面作餅炙各一兩蘹香子炒天麻酒浸切焙海蛤牛膝葫蘆巴炒銀礦醋末細研各半兩上為末粟米飲丸如芡實大每服一丸炒姜鹽酒化下食前服玉蕊丸治元陽虛憊臍腹冷疼面黃肌瘦多困少力腰膝痠疼飲食減少膀胱小腸氣疼脾虛滑泄木香三分茴香子炒蠍梢各半兩附子炮去皮臍一兩白礬燒令汁枯一分陽起石煅硫黃研各半兩硇砂飛研一分上為末湯煮糊為丸如桐子大每服二十丸溫酒下小腸膀胱氣痛燒綿灰熱湯陰陽二毒傷寒甘草湯泄痢虛滑不止腹內撮痛煎艾葉湯下婦人赤白帶下沒藥湯脾胃虛弱米穀不化溫酒送下並食前服吳茱萸散治小腸虛冷氣痞腹如刀刺或繞臍結痛冷汗宜服吳茱萸一分湯泡焙乾微炒厚朴半兩去皮塗薑汁炙芎藭半兩乾薑半兩炮銼附子三分炮裂去皮臍甘草半兩炙微赤銼上為散每服三錢水一盞煎至八分去滓不拘時稍熱服鹿茸丸治小腸虛冷小便數多鹿茸一兩去毛酥炙微黃白龍骨一兩燒過桑螵蛸三分微炒附子一兩半泡去皮臍椒紅一兩炒山茱萸半兩上為末煉蜜搗一二百杵丸如桐子大每服空心鹽湯下二十丸芍藥湯治小腸虛冷時發搐痛不思飲食或時乾噦補虛臟腑芍藥牡丹皮莎草根炒去皮高良薑各一兩木香附子炮去皮臍各半兩上銼如麻豆每服三錢許水一盞生薑三片棗二枚同煎七分去滓溫服青鹽丸治下元積冷傷憊筋骨無力小腸氣痛並腎臟風毒腰膝乏力沉重青鹽研一兩天雄炮去皮臍茴香子炒青皮湯泡去白炒附子炮去皮臍各一兩牡蠣研三兩同青鹽入小瓷盒內以鹽泥固濟令乾燒通赤出候冷再研勻上除前二味外搗羅為末再同研勻酒煮糊和丸如桐子大每服二十丸溫酒鹽湯任下不拘時服膃肭臍散治下元久冷虛氣攻刺心脾小腸冷疼不可忍膃肭臍切焙吳茱萸洗焙炒甘松焙洗陳皮浸去白良薑各一分上為末先用豬白肚一個去脂膏入蔥白三莖椒十四粒鹽一捻同細銼銀石器中炒入無灰酒三盞煮令乾去滓每服七分盞調藥二錢匕日三正元煮散補虛治小腸氣楝實取肉炒木香桂去皮各半兩甘草炙一兩茴香子炒一分上為散每服三錢水一盞煎七分臨熟入鹽少許溫服溫酒調服亦得巴戟煎丸治小腸積冷飲食減少面多虛黃手足常冷巴戟一兩另研末去心舶上茴香二兩炒川楝子二兩面炒馬藺二兩醋炒紫色牛膝一兩酒浸三日去苗焙乾黑附子一兩炮去皮臍蓯蓉二兩去土酒浸三日焙乾破故紙一兩蕓薹子二兩炒上件九味搗羅為末將巴戟末以好酒二升入白麩少許同熬成膏拌衆藥勻再杵三五百下丸如桐子大每服十五丸至二十丸空心鹽湯下補虛益髭發附論夫手陽明經其支絡主髭足少陽經其榮在鬢足少陰經其華在發三者經絡所屬雖不同然所稟血氣則一也故血氣內充則能上榮於發須若本臟虛損沖督衰弱精血不榮骨髓枯竭則髭鬚斑白甚者墮落治宜補精益血之劑則可變白反黑間有揩齒以烏髭鬚者蓋齒者骨之餘髓之養也方復老還童丸出德生堂補下元烏髭鬚蓯蓉酒浸菟絲子酒浸巴戟酒浸去心牛膝去蘆酒浸各一兩山藥川楝子鹽炒蛇床子炒茯神八角茴香黃芩五味子續斷人參枳實檳榔乾薑各一兩丁香母者佳乳香木香沉香白檀各半兩上為細末煉蜜為丸先入井華水一盞和藥杵一千餘下方丸如桐子大每服三十五丸空心溫酒下地黃煎丸出聖濟總録治諸虛損調順營衛補填骨髓續筋脈助真元肌肉滑駐顏色益氣烏髭發地黃二十斤好者淨洗陰乾令水脈盡木臼杵絞汁余滓更入法酒五升重杵再熬與前汁相和於銀石器內慢火煎柳木篦子攪膏放冷更烏雞子清十一枚大麻油五合攪勻次入諸藥山芋四兩鹿角膠炒燥三兩山茱萸焙一兩牛膝酒浸切焙蓯蓉去皮酒浸切焙菟絲子酒浸一宿搗爛拍作餅子巴戟去心茯苓去皮虎骨酥炙附子乾漆炒牡丹皮銼焙澤瀉炮續斷各二兩生地黃焙木臼內搗熟地黃焙木臼內搗甘草炙銼各四兩上除地黃外搗羅為末入煎和木臼搗千數丸如桐子大早晨日午空心溫酒或鹽湯下四十丸加至六十丸初服擇日齊潔服藥後忌房事百日甚有神效忌蔥蘿蔔蒜熱者亦得養壽丹出御藥院方補五臟散麻痛駐容顏黑髭發壯筋骨久服不老遠志去心菖蒲巴戟去心白朮茯苓地骨皮續斷枸杞子菊花細辛地黃車前子何首烏牛膝蓯蓉菟絲子三味酒浸覆盆子各半兩上為細末煉蜜和丸就復臼千杵丸如桐子大每日服二十丸空心酒下神仙六子丸出御藥方治男子血氣衰敗未及年五十之上髭發斑白或年少人髭發蒼黃若服此藥百日內變黃白色如黑漆菟絲子酒浸一宿焙金鈴子枸杞子覆盆子五味子焙蛇床子炒何首烏酒浸一宿切焙各一兩地骨皮牛膝酒浸一宿焙各三兩熟地黃三兩焙舶上茴香鹽炒二兩上為末用前項藥酒浸菟絲子酒澄清作麵糊為丸如桐子大每服五十丸空心食前溫酒送下日進一服如要疾黑前件藥內加人參茯苓菖蒲各一兩若服此藥大忌蔥白韭薤蒜之物常服養精神氣血壯筋骨補腎水滑肌膚駐容顏黑髭發此藥效驗烏金丸一名神仙苣蕂丸治滋血氣壯元陽髭發反黑真人換白丸出御藥院方治血氣不榮髭發衰白白芷甘菊花桂去皮苣蕂子茯苓去皮各三分牛膝酒浸切焙蓽澄茄各半兩覆盆子一分蓮子草一兩上為末煉蜜和丸如桐子大每服空心溫酒下三十丸晚食前再服二十丸飲少酒行藥力兼治風疾一名烏金丸用溫麵糊為丸太乙護命丸治元臟虛損兼實臟腑變白反黑滿骨髓令風邪不能侵久服除百病益精血延年卻老甘菊花麥門冬去心焙枸杞子焙白朮人參白茯苓遠志菖蒲石上者桂去皮各六兩生地黃上擇開成日搗羅為粗末取春採生地黃五十斤絞取汁同藥末於銀石器內逐旋入地黃汁微炒候入盡汁焙乾再搗為末煉蜜和丸更入酥少許同搗三千下丸如桐子大每服空心食前清酒下二十丸漸加至五十丸復漸減至二十丸周而復始覆盆子丸出御藥院方壯筋骨益精明目黑髭發覆盆子去萼遠志去心杜仲炒去絲地膚子炒香各一兩枸杞子焙乾破故紙鹽炒山茱萸取肉山藥另取末柏子仁炒香另研各二兩胡桃肉去皮一兩另研上為細末將山藥末同白麵酒糊丸如桐子大每服四五十丸空心酒下加減仙茅丸出御藥院方強筋骨益精神明目黑鬚鬢仙茅二斤米泔浸五日去赤水用銅刀子去皮用刀銼碎夏月止浸三日陰乾不見日稱一斤蒼朮二斤米泔浸五日或二日亦得去皮焙乾一斤車前子十二兩枸杞子一斤柏子仁微炒黃搗茯苓去皮茴香炒香各八兩生地黃焙乾熟地黃焙乾各四兩上為末酒煮糊和丸如桐子大每服五六十丸食前溫酒下日二服漸加至七八十丸木香丸滋陰養正補腎祕真堅固骨髓調營衛悅顏色黑髭發山茱萸不去核蓮花蕊各一兩白茯苓木香各二兩破故紙菟絲子酒浸三日焙乾各五兩胡桃肉半斤微去油研爛上為末煉蜜和丸如桐子大每服七十丸溫酒送下空心每日一服仙茅丸出御藥院方治男子真氣不足常服強筋骨益精神明目黑髭發仙茅二斤糯米泔浸五日去赤水用銅刀去皮同刀銼取一斤夏日止浸三日陰乾不見日舶上茴香半兩蒼朮二斤米泔浸五日或三日去皮焙乾取一斤馬藺花柏子仁各半兩椒紅二斤醋炒取紅一斤熟地黃一斤焙乾半斤上為細末醋煮糊為丸如桐子大酒亦得每服三十丸至四十丸或五十丸食前溫酒下日二服漸加至七八十丸草還丹出聖濟總録治氣血虛瘁髭發變白牛膝酒浸切焙熟地黃焙枳殼去瓤麵炒地骨皮各一兩菟絲子二兩酒浸一宿時研爛入諸藥上為末煉蜜和木臼再杵千下丸如桐子大每服三十丸溫酒下空心食前一方鹽湯下草還丹出聖濟總録治氣血虛瘁髭發變白生地淨洗石菖蒲節密細者牛膝酒浸切焙地骨皮菟絲子入鹽少許乘熱取末肉蓯蓉酒浸一宿細研切焙各等分上為末煉蜜和丸如桐子大每服以丹砂為衣空心溫酒下四十丸日午再服二十丸一月內百疾俱退一年白髮俱黑身體有力顏色如童睡少欲薄十年之後預知前事延壽丸一名平補乾地黃丸出聖濟總録治諸虛及虛風烏髭發牛膝酒浸切焙乾地黃焙枳殼去瓤麩炒地骨皮各一兩菟絲子二兩酒浸一宿研爛入諸藥末上為末煉蜜和木臼中再杵千下丸如緑豆大每服三十丸溫酒下空心食前一方鹽湯下五精酒治萬病發白反黑齒去更生黃精四兩天門冬三斤去心松葉六斤白朮四斤枸杞子五斤洗上皆用生者納釜中以水三石煮之一日去滓取汁漬曲如家釀法酒熟取清任性飲之一劑常年補養忌鯉魚桃李雀肉等青蛾丸一名杜仲丸出御藥院方治黑髮去風長年及肝腎虛腰腳腿重痛腳氣常服壯筋骨補虛損益精髓反老還童方見青蛾丸益發令黑出本草以椰子漿塗頭南燭煎出本草益發髭及容顏兼補暖方以三月三日採南燭葉並蕊子入大淨瓶中干盛以童子小便浸滿瓶固濟其口直閉處經一周年取開每日一二次溫酒服之每酒一盞調煎一匕極有神效靈芝丸出聖濟總録治氣血不榮變白返黑三葉酸一斤陰乾黑桑椹一斤曝乾上為末煉蜜和丸如彈子大每服溫酒化下一丸日再枸杞酒出聖濟總録治精血虛損變白輕身枸杞子三斤生地黃汁三升上每以十月壬癸日面東採枸杞子先以好酒二升於瓷瓶內浸二十日了開封再入地黃汁不犯生水者同浸勿攪之卻以紙三重封頭至立春前三十日開瓶空心暖飲一杯至立春後髭發黑勿食蕪荑蔥何首烏丸一名二多丹補暖臟腑祛逐風冷利腰膝強筋骨黑鬢髮駐容顏白朮酒治萬病黑髭發以白朮二十五斤洗淨以東流水二石五斗於不津器中漬之二十日去滓納汁於大盆中夜候流星過時抄己姓名置盆內如是五夜汁當變如血取以漬曲如家醞法造酒熟取清任性飲之十