前酒下何首烏丸治腳膝壯筋骨烏須鬢理風虛悅顏色補益四倍丸補益壯腰腳蜀椒去目合口者炒出汗一兩菟絲子酒浸三日別搗二兩萆薢酒浸三日另搗四兩牛膝洗焙八兩上同為末煉蜜和丸搗五百杵丸如桐子大每服三十丸至五十丸早晚鹽湯或酒任下服之一年行如奔馬香茸丸治精耗血少陽氣衰調營和腰腳鹿茸麝香沉香山茱萸上等分為末入麝香研勻煉蜜和丸如桐子大每服空心溫酒鹽湯任下三十丸杜仲丸一名青蛾丸補下元烏須壯腳膝進食悅色治腰疼羊腎丸治下焦虛冷腳膝無力虛弱並能補益以羊腎一個煮熟和煉成拌乳粉半大兩空腹食之鹿角丸出王氏博濟方治風冷補暖壯腰膝明耳目駐顏容不老用煮成角一斤或麋角或鹿角須是殺者不用自死者角每對須要重十斤以上者去腦角寸寸截每五斤以東流水浸四十九日或三七日刷去水積令淨入大鍋內研大丹大五升取汁黃蠟半斤青鹽四兩並碎銼以甜水滿鍋勻沸煮兩伏時如湯耗續添溫湯不得入冷水卻須常另煎一鍋湯添只候角軟如薯蕷取出卻刷洗令淨卻著絹袋子盛扭干杵為末取煮角汁漉去滓慢火熬成膏充和藥末附子二兩炮去皮臍川巴戟一兩去心用糯米炒牛膝二兩酒浸切焙海桐皮二兩炒破故紙一兩淨淘去浮者炒白殭蠶一兩炒官桂一兩去皮天麻一兩上件八味同為末入一斤角霜同拌更入青鹽二兩研令勻用白蜜一斤半角膏一斤同爛勻令蜜熟和為丸再入臼杵二千下仍以半兩真酥塗杵臼候熟衆手丸如桐子大每日空心溫酒下五十丸日午再服烏頭煎丸出王氏博濟方補元臟虛冷腰膝無力行步難吃食少筋骨拘急疼痛駐顏益氣川烏頭一斤以大豆煮二伏時以竹刀切作片子焙乾去大豆不用杵為末青鹽四兩化用成水相和淋成片熬成膏次入下項藥沉香一兩半破故紙一兩虎骨一兩醋炙天麻一兩牛膝一兩炙海桐皮一兩肉豆蔻四枚去殼木香半兩羌活巴戟二兩炒令黃上件十味杵羅為末入膏搜和丸如桐子大每日空心溫酒下二十丸妙又一方不用木香羌活卻入舶上茴香炒檳榔各一兩甘草半兩仍更加桐皮牛膝各添一兩天麻加半兩全即煎法尤更佳也硇砂丸出王氏博濟方補元臟虛冷腳膝無力生瘡腫壯筋骨進食硇砂一合去石以好酒一合拌浸去滓熬用大附子半分炒牛膝半兩乾薑二分炮苦參半生吳茱萸生各半兩桃仁一兩去皮雙仁尖木香半兩川楝子一分炒上件九味並杵為末將硇砂膏並桃仁同拌和別以爛蒸木瓜去皮碎研搜成劑為丸如桐子大每日空心酒下三十丸要行氣疾去附子牛膝卻入郁李仁牽牛各半兩生為末如要補即依原法用之神仙方出本草治腰膝去風久服延年以菟絲子一斗酒一斗浸良久漉出曝乾再浸以酒浸盡為度每服二錢溫酒下日二服吃後以飯壓之至三七日加至三錢許服之令人光澤三年老變為少主一切風虛理腰腳輕身變白不老出本草用放杖木浸酒服之老人服之一月放杖故以為名也補腰腳令健出本草取女貞皮以浸酒服補虛強腳益腎出本草以零餘子食之虎骨酒養肝腎調順血氣補虛排邪理腰膝風痹皮膚不仁或下注步履艱難久服去健忘益心氣清頭目定神魂虎脛骨一兩酥炙黃耆銼桔梗炒酸棗仁炒茯神去木羌活去蘆石菖蒲遠志去心芎藭牛膝酒浸一宿切焙熟地黃焙萆薢蓯蓉酒浸一宿切焙附子生去皮臍以新汲水浸半日又破作二片換水浸一日焙乾石斛去根各一兩防風去叉羚羊角鎊各半兩上銼細以生絹袋盛入醇酒一斗浸之密封瓶口春夏三日秋冬七日每服溫飲一盞日二如服盡添酒五升浸之又服盡取渣焙乾為末每服一錢酒調下或以蜜丸如桐子大每服三十丸空心溫酒下萆薢丸治風冷壯腰膝暖臟腑利血氣補脾腎益氣力萆薢銼牛膝去苗杜仲去皮炒微黃銼酸棗仁炒柏子仁防風去叉蘆天麻肉蓯蓉酒浸一宿去皮炙乾桂心補骨脂炒附子炮去皮臍五味子磁石燒醋淬七次搗碎細研水飛過鹿茸熟地黃石斛去根銼巴戟各一兩上為末入磁石研勻煉蜜和搗三二百杵丸如桐子大每日空心以溫酒下三十丸木瓜丸治腰膝無力四肢倦困腹肋冷疼壯筋力和氣血補暖木瓜宣州者二枚去瓤剜作頂子硇砂半兩上絹袋貯在木瓜內羊腎一對研以上用好酒四升銀器內浸候硇砂盡去袋子熬成膏雄雀一對去毛嘴爪腸肚骨研蓯蓉酒浸一宿切焙二兩附子沉香銼木香蘹香子炒楝實銼炒椒紅青皮去白焙巴戟天葫蘆巴檳榔銼桂去皮各一兩上搗羅一十二味為末以前四味膏和丸如桐子大每三十丸空心鹽酒下熟乾地黃丸治下元虛冷腰腳無力益顏色黑髭鬢補虛損乾地黃二兩牛膝去苗遠志去心巴戟石斛去根銼桂心車前子覆盆子菟絲子酒浸二日曝另搗為末天門冬去心焙何首烏白茯苓黃耆銼鹿茸去毛塗酥炙黃附子炮裂去皮臍上為末煉蜜和搗三五百杵丸如桐子大每日空心溫酒下五十丸烏頭煎丸治下元風冷流注腰膝行步不能狀似軟風補益陽氣一名牛膝煎丸烏頭五兩水洗令透軟去皮臍細切用好酒三升熬爛更細研成膏木瓜三枚下面剜去瓤核將艾搗末入在瓜內填實熬令熟爛研牛膝去苗酒浸切焙乾羌活巴戟去心蓯蓉酒浸切焙各一兩半青鹽研青皮去白焙蘹香子炒狗脊去毛萆薢各二兩上搗羅十味為末入前二味膏中和勻丸如桐子大每服三十丸空心溫酒鹽湯任下巴戟丸治骨髓虛憊腰膝無力巴戟去心三分黃耆銼一兩遠志去心牛膝去根酒浸焙乾地黃焙山芋各三分桂心去皮五味子附子炮去皮臍各半兩豬腎一對去脂膜破開入椒四十九粒鹽花少許拌勻濕紙裹煨去核細切如糊和諸藥上搗羅九味為末以豬腎和丸如桐子大每服二三十丸溫酒下腎附丸治水臟風冷滯氣耐寒暑暖腰膝羊腎五對附子五兩炮去皮臍鍾乳粉二兩桂心二兩訶黎勒皮二兩赤箭二兩山茱萸二兩薯蕷二兩肉蓯蓉二兩酒浸一宿去皮焙乾菟絲子二兩酒浸三日炮干另研為末上件為末取羊腎去筋膜批作片子每一片上鋪藥末一重如此重重相隔以盡為度用濕紙裹數重了更用鹽泥重裹入煻煨三炊後久候火氣過透亦不得令焦出藥看作紫黑色即住如腎未熟即重封更煨候得所即搗三五百杵入少水浸蒸餅更搗候可丸即丸如桐子大每日空心服以溫酒下三十丸晚食前再服三日後已覺水臟溫暖麋角丸補暖下元壯腰膝治虛冷氣麋角屑一斤入乳拌勻用銀石器內盛封以大麥六斗蓋各蒸一伏時肉蓯蓉二兩酒浸一宿去皮炙乾蘹香子二兩桂心二兩蓽茇二兩木香二兩附子二兩炮去皮臍柏子仁二兩肉豆蔻二兩去殼檳榔三兩上為末煉蜜為丸如桐子大每服空心以溫酒下三十丸羊腎煎丸治下注傷憊腰膝無力四肢無力筋骨疼痛行步艱難羊脊骨一條去截附子炮去皮臍檳榔銼黃耆枳殼去白炒各一兩沉香銼蜀椒去目合口者炒去汗桂去粗皮木香各半兩上搗羅為末用硇砂二兩飛過法酒米醋各一升同羊脊骨入銀器內文武火熬令酒醋焙燥杵羅為末別用酒作麵糊同前八味藥末和搗丸如桐子大每服二十丸至三十丸空心夜臥溫酒或鹽湯下八神散治四肢沉重腳膝無力骨髓冷疼壯筋骨明耳目附子去皮臍一兩烏頭去皮臍草烏各二兩並每個銼作三段同鹽二兩慢火煮一日焙乾用防風半斤以上四味並銼令塊子相似蛇床子莨菪子馬藺子吳茱萸各三兩上同用慢火炒令煙出急傾在淨地上揀取附子防風烏頭等四味杵羅為末散以次磁盒盛每服一錢空心取井華水面東調下日後漸加至三錢補五臟理腰膝腳氣益陽事能消食除腹中冷氣消痃癖出本草以淡菜燒令汁沸出食之多令煩悶目暗可微利即止菟絲子出十便良方治腰膝無力壯氣祛風黃魯直說服此藥後若覺小壅當以少菊末和湯點服之但菟絲子久服令人思欲事切宜戒慎菟絲子楝去淨不以多少先入臼如舂穀然後簸去塵稗淨用水淘五次去浮者並底沙石曬乾酒浸夏五日冬十餘日控了焙乾上於大碾中碾羅為末取生山藥去皮磨為膏酒煮成糊搜和為丸如豌豆大焙乾每一服空心酒下一百丸無所忌李侍郎服之年七十六如四五十歲人朝中最強健屢見服菟絲子人得力始知藥有功也
