body:
  text: 卷一百五十四身體門總論凡人百骸四體肌肉皮膚關節脈絡總而謂之身風淫濕滯血刺痰攻背能作痛至於骨之痠疼或熱入髓徹骨則倍蓰千萬大不侔焉蓋骨為髓之藏髓者飲食五味之實秀也髓虛勢所必至矣痛在於身風之證以走注知之濕之證以重作驗之血有筋脈鑽刺之證痰有眩暈咳唾之證驅風除濕行血豁痰對證一投猶冀可以旦暮起病入於骨此勞極損傷之不可救藥者也然則身痛之與骨痛毫釐千里之差於此不可以無辨然醫家之辨多為項腫臂痛蓋熱在上焦不能清利則醞釀日久生痰涎聚飲氣流入於項臂之間不腫則痛耳然而曰痰曰涎曰飲又有理一分殊之別伏於包絡隨氣上浮客肺壅嗽而發動者痰也聚於脾元隨氣上溢口角流出而不禁者涎也惟飲生於胃腑為嘔為吐此則胃家之病學者不可不知身體胸膈隱熱隱疼拘急足冷此血之為病也以其飲酒嗜欲伏熱受暑得之惟熱毒暑酒毒為能傷血瘀血未去新血不榮身體所以隱痛拘急其裡熱足冷者血之證也用柴胡黃芩青皮枳殼靈脂桃仁木通甘草作劑多入大黃以利之俟其流利已盡小腹略無結急即以當歸川芎一兩橘皮半夏枳殼桔梗木通甘草半之調其氣血於是有瘳血屬於心木通通心心竅既通經絡之流行可知矣胸脅痛引背上頭面兩手浮腫腎虛不能納氣歸元氣逆而上奔則胸膈滿痛以手摩挲痛走背上又從背摩挲則其氣循泄於後分而痛不作矣此氣之為病固也奈何腎虛又不能行水故隨氣奔上乘於肺頭面兩手浮腫氣短而喘由是血化為水與之俱沉滯其人舊來有風曰水曰血曰氣四者合而為病其痛非常如沉香木香烏藥檳榔之類能施其巧治法將何如曰先以二十四味流氣飲加獨活枳殼靈脂炒牽牛入姜蜜烏梅同煎咽下養正丹二十粒雄黃升降水火引導大便次用桑皮紫蘇木通阿膠當歸桃仁青皮桔梗芫花大黃作劑依煎以姜蜜烏梅取盡大便黑物即收全功肚皮疼腎虛不能得水加之酒面無度後輒睡酒與水交聚於腹中而面毒復纏滯其氣是以水滲於肚皮而作痛矣治法錢氏宣風散用蜜水煎咽下神效俟其大便流行然後以青木香丸一分安腎丸倍之用二陳湯入少鹽並生薑同煎空心咽下脾腎氣復自然平安胸膛氣隔有肺經伏熱而氣隔者有痰水在上而氣隔者大概以茯苓半夏枳殼桔梗為治法其肺熱者如聖湯加桑白皮佐之心下水氣者小半夏茯苓湯效胸煩活人書用山梔子身體疼痛附論夫身體疼痛非濕則痰固也人有挾刀鋸之驚而又餒在其中為風寒水濕所傷致使心竅凝滯於是經絡壅閉血不流行腸肉骨節為之刺痛治法當歸川芎芍藥白芷靈脂大黃甘草利下黑物小片而不甚痛可瘳方治背痛方出海上名方用當歸二三兩切作薄片酒浸三日飲其酒酒盡別換當歸浸服三兩日即愈流氣飲子出指南方治背痛外連肌肉牽引背脾時發時止此由榮衛之氣循行失度流滯經絡與正氣相搏其發則有似癱瘓紫蘇葉青皮苦梗當歸芍藥烏藥茯苓枳殼去瓤麩炒一作枳實黃耆川芎防風各半兩甘草炙橘皮各三分陳皮二兩大腹子二兩銼薑汁炒木香二兩上銼散每服水二盞姜三片棗二枚煎至一盞去滓服一方治腰臂痛有大黃橘皮拈痛散出御藥院方澡浴藥當歸去蘆頭防風去蘆頭黑狗脊骨碎補並去毛藁本去土細辛去苗土赤芍藥自然銅酒淬七遍桂去粗皮萆薢以上各一兩上為粗末每二兩用手帕包定上用熱鹽包納在痛處尉之枳殼煮散出簡易方治悲哀煩惱肝氣至兩腋骨痛筋脈拘急腰腳滯重兩股筋急兩脅牽痛四肢不能舉漸致背攣急大治脅痛防風川芎細辛枳殼桔梗各四錢甘草二錢乾葛錢半上為㕮咀每服四錢水一盞姜三片煎七分空心服白芥子散出危氏方治背痛外連肌肉牽引背脾時發時止皆榮衛之氣循行失度流滯經絡與正氣相搏其發則似癱瘓真白芥子木鱉子去皮各二兩沒藥桂心木香各半兩上為末入研藥令勻每服一錢溫酒調下栝蔞實丸出濟生方治胸痞胸中痛徹背脅喘急妨悶栝蔞實別研枳殼去瓤麩炒半夏湯炮七次桔梗去蘆頭各一兩上為細末薑汁打糊丸如桐子大每服五十丸食後用淡薑湯下控涎丹出危氏方凡人忽患背手腳腰胯隱痛不可忍連筋骨牽引釣痛坐臥不寧時走易不定俗醫不曉謂之走注便用風藥及針灸皆無益又是風毒結聚欲為癰疽亂以藥貼亦非也此乃是痰涎伏在心膈上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠黏夜間喉中如鋸聲多流睡涎手腳重腫冷痹氣脈不通誤認為癱瘓亦非也凡有此疾但以是藥不過數服其疾如失甘遂去心紫大戟去皮白芥子真者各等分上為末煮糊丸如梧子大曬乾食後臨睡薑湯或熱水下五七丸至十丸如疾猛氣實加丸數不妨其效如神治頭身無不痛顛倒煩滿欲死方取頭垢如大豆大服之並囊貯大豆蒸熟逐痛處尉之作兩囊更番為佳若無豆蒸鼠壤土尉亦可治諸處皮膚裡面痛上用何首烏為末生薑自然汁調成膏敷痛處以絹帛裹之用火炙鞋底尉之神效虎骨酒法出本草治腎經疼痛不得屈伸走注痛苦不問淺深用虎脛骨新芍藥二兩以無灰酒浸春夏七日秋冬二七日浸後須以銀石器盛於慢火上溫養三日兩日即得服一方有黃羚羊角一大兩貼藥芫花散出經驗良方治臂腿間忽一兩點痛著骨不可忍者芫花根一把上研為末米醋調隨大小敷之如痛不止以紙花覆其上用綿帛扎定此方曾治一婦人産後而得此疾者良驗治臂痛出經驗良方用桑枝細切一升炒香以水三升煎取二升日服數次安治手足煩疼出肘後方用地膚子草三兩水四升煮二升半分作三服日一劑一方取六七月者陰乾服舒筋散出直指方治風淫血刺身體疼痛四肢拘攣延胡索炒辣桂去粗皮當歸等分上為末每二錢調酒下延胡索活血除風理氣葛根湯出千金方治四肢緩弱身體疼痛不遂婦人産後中柔風及氣滿方葛根芍藥桂心乾地黃乾薑各三兩麻黃甘草各二兩生薑六兩上八味以清酒三升水五升煮取三升溫服五合日三三皮散出朱氏集驗方治風毒濕氣流注腳膝四肢攣拳筋脈不伸腳足疼痛步履艱難用此藥酒斷根不問三二十年者皆有效海桐皮去皮五加皮新採者桑白皮川獨活各二兩生乾地黃六升半制杜仲各一兩黑附子炮去皮斟酌多少薏苡仁生用二兩川牛膝一兩上為粗末用綿裹作一包以無灰好酒一斗許春浸七日秋冬二七日夏三五日撈起藥空心溫服一盞一日三五次服如服藥酒時卻飲它酒常令酒氣相接勿令大醉重者不過兩劑服此藥後旬日兩腿必發大疹漸漸破出紫黑血候乾貼磨風膏脂瘡上自然好也日逐腳上如數百條蛇自足而出此其效驗如患足疾之人腳後有條筋直湊腎囊疼痛拘攣用妙香散一貼分作三二服空心食前溫酒鹽湯下自然伸也拈痛散出御藥院方治肢節疼痛尉烙藥羌活去蘆頭獨活去蘆頭細辛去苗肉桂去粗皮防風去蘆白朮川烏生去皮臍良薑銼麻黃不去節天麻去苗吳茱萸生用葛根乳香另研川椒去子並閉口者全蠍生用當歸各一兩去苗川薑生用半兩上為粗末入乳香勻炒一兩痛甚者加至一兩半同細鹽一處炒令極熱用絹袋內貯藥尉烙痛處不拘早晚頻用為效如藥冷即再炒一次用畢其炒藥不用薏苡仁散治濕傷腎不養肝肝自生風遂成風濕流注四肢筋骨或入左肩髃肌肉疼痛漸入左指中薏苡仁一兩當歸酒浸人參川烏炮去皮臍川芎白朮炒羌活桂心防風去蘆茵芋炒麻黃去根節乾薑炮獨活甘草炙各半兩上為細末每服二錢空心臨臥酒調下日三服徐神翁神效地仙丹治筋節疼痛打撲傷損仙術湯送下除寒濕進飲食神效川烏一個炮裂草烏五個炮製白芥去根半兩蒼朮一兩浸一宿炒白芷半兩自然銅一字研地龍沒藥各半兩研乳香半錢研萵苣種黃瓜種稍瓜種木鱉子各一錢半兩錢二文上為末散糊丸如桐子大每服十丸食後溫酒送下虎骨丸治經絡凝澀骨節疼痛筋脈攣急遇陰寒愈痛南乳香別研沒藥另研赤芍藥熟地黃虎脛骨酥炙黃當歸各一兩血竭五錢上為細末木瓜一枚切破去子入乳香在內以麻縷札定勿令透氣好酒二升煮至酒盡取木瓜去皮研如泥更入熟蜜少許杵和為丸如桐子大每服三十丸至五十丸病在上食後在下食前溫酒下治骨節疼痛煩不得屈伸近之則痛短氣得汗出或欲腫者桂四兩術三兩甘草二兩上用水六升煮取三升分三服汗出愈治卒得胸痛瘥而復發者取薤根五升搗絞汁飲之立止加減當歸飲子治肩忽痛防風當歸柴胡生地黃大黃各一兩半芍藥人參黃芩各一兩甘草一兩二錢黃連五錢滑石六兩上為散白水煎服無時活絡湯治風濕臂痛諸藥不效者此方專主之白朮薄切一兩當歸淨洗薄切干稱羌活淨洗去蘆切焙獨活淨洗甘草炙川芎各半兩上銼散每服酒三大盞水一盞半姜五片慢火煎至一盞去滓溫服不拘時候一方用蒼朮切炒川白芷各二兩為末每服二錢酒調趁痛丸治腰臂痛五靈脂赤芍藥各半兩川烏一個沒藥四錢麝香一錢上為末酒糊丸空心溫酒送下葉氏方十味銼散治中風血弱臂痛連筋及骨舉動艱難此藥以補心益血氣養筋生力附子三兩炮去臍皮當歸去土洗切黃耆炙白芍藥各二兩川芎不見火防風去蘆白朮各一兩半肉桂去粗皮一兩不見火茯苓熟地黃洗淨用少酒熬干焙之各七錢半上修制了再稱㕮咀每四錢水一大盞姜八片棗三枚擘開煎七分去滓通口服食後臨睡日三服溫覆厚衣將養去黃耆熟地黃用當歸去蘆洗淨干焙白芍藥川芎白朮人參附子白茯苓桂心川獨活防風甘草細銼每三錢姜八片水一盞半煎八分去滓食前服除寒邪益氣血名川獨活湯制地黃法須洗淨以好酒浸令乾焙之五靈脂散治臂髀痛五靈脂荊芥穗防風羌活獨活甘草節穿山甲骨碎補草烏各五錢麝少許上為末用溫酒調下臨睡服如渾身損傷加沒藥木香酒調空心下芎活湯治水飲停蓄注於脾脈發為臂痛皆因脾土有虧平日多飲水漿不能傳化所致川芎半夏湯洗白茯苓獨活陳皮枳殼去瓤炒各半兩白朮甘草各一分上為散每服三錢水一盞半生薑五片同煎去滓食後少停溫服舒經湯一名五痹湯出淡寮方治臂痛不能舉有人常苦左臂痛或以為飲或以為風為濕諸藥悉投繼以針艾俱不效得此方而愈蓋是氣血凝滯經絡不行所致非風飲非濕腰以下食前服腰以上食後服片子薑黃四兩無則用嫩莪朮代甘草一兩炙羌活一兩海桐皮去粗皮當歸赤芍藥白朮各二兩上㕮咀每服三錢水一鍾半生薑三片磨沉香水少許同煎服之陳氏經驗方云沈自聞嘗苦此臂痛或以為飲或以為風濕諸藥悉投繼以針艾俱不效一日見陳君卿雲亦常患此德清尉傳一方云可三服而愈蓋是血氣流滯經絡不行所致非風非飲非濕非氣但其方只前四味只能治腰以上疾若腰以下則不及也後見王伯舉因話及此伯舉云吾有方謂之五痹湯又添後三味腰以下疾則食前服腰以上疾食後服一名白朮薑湯獨活湯治病人胸背相引而痛者此為衛不和也獨活四兩葛根桂枝芍藥防風甘草乾薑各二兩上為㕮咀以水一斗先煮葛根減三升去上沫納諸藥煮取二升去滓溫服一升覆取微汗若病止宜消散者服湯則無汗而解若咽痛而渴加栝蔞二兩或咳或嘔者加半夏二兩惡熱藥者去乾薑面赤齦痛者加雞蘇二兩水增二升治皮肉癢痛用酒二升水五升茱萸子半升煎取三升去滓微暖洗立止治關節疼痛蒲黃八兩附子一兩炮上為末服一錢匕日三稍增至方寸匕茯苓丸出仁存方若臂痛不能舉手或左或右時復輸移由伏痰在中內脘氣滯脾氣不流行上與氣搏四肢屬脾氣滯而不下上行攻臂其脈沉細者是後人謂此臂痛乃痰證也作痰治無效者白茯苓一兩半夏二兩枳實一作枳殼風化朴硝各半兩上為末薑汁糊為丸如梧桐子大每服三十丸薑湯下食後服纍有人為痰所苦夜間兩臂常若有人抽撁兩手戰掉至於茶盞亦不能舉只以此藥治之皆隨服隨愈世間所謂痰藥未有如此之神妙也調氣丸出指南方牽牛末一兩陳皮半兩青皮一分上為細末麵糊丸如桐子大每服十丸薑湯下理氣湯出指南方半夏五兩橘皮四兩官桂三兩人參二兩甘草一兩上為粗末服五錢水三盞姜十片煎一盞去滓服柏子仁丸出指南方柏子仁炒黃耆茯苓楮實五味子覆盆子附子石斛鹿茸炙去毛酸棗仁枳實官桂沉香地黃等分上為細末煉蜜為丸如桐子大每服三十丸米飲下天麻除濕湯一名白朮散出楊氏家藏方治濕留肢節身體煩疼手足腫痛或時麻木白朮四兩天麻三兩人參去蘆頭三兩乾薑二兩全蠍二兩用糯米一盞炒黃色去糯米用附子生去皮臍開取生薑自然汁一盞浸一宿取出炙盡元浸薑汁為度薄切稱二兩上件為細末每服三錢空心溫酒調下食前天仙散出楊氏家藏方治遍身麻木腰腳疼痛節急骨疼天仙子草烏頭生去皮臍蛇床子牡蠣煨乾薑炮以上五味各半兩上件㕮咀平分作兩次每用水五升煎五七沸淋泄以被蓋之汗出是驗臂痛多曰風其脈濡而來反急明其濕用出永類鈐方蒼朮附子各等分木香一分姜煎帛蓋屋上露星一宿次日重湯暖服愈麻黃湯煎出東垣試效方治陰濕中汗出懶語四肢困倦無力走注疼痛乃下焦伏火而不得伸浮而躁熱汗出一身盡痛蓋氣濕相搏也以升陽發汗漸漸發之在經者亦宜發汗如正值季春之月脈緩而遲尤宜發汗令風濕去而陽生以此困倦乃退氣血俱得生旺也麻黃二錢去節微搗不令作末水五六盞煎令沸去沫煎至三盞入下項藥再煎黃耆白朮半錢杏仁三枚去皮人參半錢甘草三錢羌活一錢柴胡根半錢防風半錢黃柏一錢生地黃半錢一方無白朮人參甘草羌活上銼如麻豆大都作一服入麻黃湯煎至一盞臨臥服之勿令食飽取漸次有汗則效治背氣發作攻背並兩臂兩脅忽攻腰坐臥不安出護命方枳殼二兩去瓤巴豆半兩去皮膜上件於鐺內熬炒令香熟去巴豆不使卻入沉香甘草各一分同杵為末空心蔥湯調下半錢不轉第二度加服一錢治一切男子女人忽然身體勞倦四肢百節疼痛大腑祕熱小便黃赤出護命方升麻山梔黃芩麥門冬去心柴胡去苗牡丹皮去心貝母去心虎杖山茵陳木香大黃杏仁去皮麻黃去根各一兩上為細末每服二錢水一盞煎一服後臥和滓徐熱吃沉香鱉甲散出直指方治勞倦身痛沉香人參牛膝茯苓秦艽木香黃耆微炙熟附子辣桂去粗皮鱉甲浸去裙襴醋炙黃各一兩柴胡荊芥各半兩巴戟去心當歸半夏制羌活熟地黃酒洗煎蒸各七錢半全蠍三錢半大肉豆蔻四個上為末每二錢蔥白二寸姜三片棗二枚食前煎服溫酒調下尤妙治渾身走疰疼痛及顛撲閃肭痛出衛生家寶方每用晚蠶砂一升分二處每用鹽二兩各炒熱上用物帛包尉痛處冷即易之昔楊惜患背腫馬嗣明以煉石塗之便瘥煉石法以粗黃色石如鵝鴨卵大猛火燒令赤納醇醋中自有石屑落頻燒至石盡取屑曝乾搗篩醋和塗腫上無不愈出淡寮方治氣滯風壅手臂腳膝痛出本草以醋糖裹之兩易當瘥百一選方云治臂腿之間忽一兩點痛著骨不可忍者芫花根一味研為細末米醋調隨大小敷之立止盧州郭醫云此是陶成一醫者方曾治一婦人産後而得此疾者良驗但敷貼不住須以紙花覆其上用絹綿系定也治身體手足腫出本草用驢脂和鹽敷之治臂腕痛出本草取死蝮蛇一條以水煮取濃汁浸腫冷痛易之治四肢疼痛出本草用山龍膽草根細銼用生薑自然汁浸之一宿去其性烘乾搗水煎一盞許溫服之治身體手足腫卒大出本草用醋和蚯蚓屎敷之治身腳痠疼兼微腫出本草用搗蒼耳敷之立效春用心冬用子治身體手足卒痛腫出本草以烏麻五升熬碎之酒一升浸一宿隨多少飲之腰痛附論凡腰痛有五一曰少陰少陰腎也十月萬物陽氣皆衰是以腰痛二曰風痹風寒著腰是以腰痛三曰腎虛役用傷腎是以腰痛四曰腎腰墜墮傷腰是以腰痛五曰取寒服地氣所傷是以腰痛痛不止引牽腰脊皆痛大抵腰痛之脈皆沉弦而緊者寒弦而浮者風沉弦而濡者濕又有墜墮閃肭氣血凝滯而痛者脈多沉弦而實蓋諸經皆貫於腎而絡於腰脊腎氣一虛凡衝風受濕傷冷蓄熱血瀝氣滯水積墮傷與夫失志作勞種種腰痛疊見而層出矣衝風者汗出乘風風邪風毒之胚胎也受濕者踐雨臥濕重著腫滯之萌櫱也腰間如水為傷冷發渴便閉為蓄熱血瀝則轉側如錐之所刺氣滯則鬱悶而不伸積水沉重則小腸不得宣通墜損傷則瘀血為之凝結閃銼失志者腎之𢦤舉是數證腎家之感受如此腰安得而不為痛乎內經曰腰者腎之府轉搖不能臥將憊矣審如是則痛在少陰必究其受病之源而處之為得然宗筋聚於陰器肝者腎之同系也五臟取氣於谷脾者腎之倉廩也鬱怒傷肝則諸筋縱弛憂思傷脾則胃氣不行二者又能為腰痛之寇太陽腰痛引項脊尻背如重狀陽明腰痛不可以顧顧如有見者善悲少陽腰痛如以針刺其皮循循然不可俯仰不可以顧太陰腰痛煩熱腰下如有橫木居其中甚則羸瘦少陰腰痛痛引脊內廉厥陰腰痛腰中如張弩弦狀此舉六經以為外因治備大抵太陰少陰多中寒少陽厥陰多中風熱太陰陽明多燥濕以數推之當隨脈別其病如經中有解脈散脈同陰會陰陽維衡絡直陽飛陽肉裡尻交等腰痛皆不出六經流注但別行各有所主不欲繁引請尋內經刺腰痛論以備明之准此從外所因汗下施治失志傷腎鬱怒傷肝憂思傷脾皆致腰痛者以肝腎同系脾胃表裡脾滯胃閉最致腰痛其證虛羸不足面目黧黑不能遠行久立失志所為也腹急脅脹目視䀮䀮所祈不得意淫於外宗筋弛縱及為白淫鬱怒所為也肌肉削弱痹而不仁飲食不化腸胃脹滿閉墜腰脅憂思所為也准此從內所因調理施治腎著腰冷如水身重不渴小便自利食飲如故腰以下冷重如帶五千錢因作勞汗出身衣里冷濕久久得之䐴腰痛者傴僂腫重因致脅痛因於墜墮惡血流滯及房勞疲力耗竭精氣致腰疼痛准此從不內外因補瀉施治夫腰痛者屬乎腎也多因勞後傷腎臟氣空虛風寒冷濕得以襲之鬱怒憂思得以傷之皆致腰痛但墜墮閃肭血氣凝滯而痛者未有藥也威靈仙丸主之今人每患腰痛不問虛實多進牽牛之藥殊不知牽牛之為性能傷腎氣服之未見其效腎氣先有虧損矣倘的是氣滯腰痛進三服即可如服之不效用橘核入鹽炒浸酒帶溫送下小七香丸最佳自有奇功萬一腎虛腰痛牽牛豈宜服也謹之謹之一男子六十餘病腰尻脊胯背痛數載不愈晝靜夜躁大痛往來屢求自盡天且夕其痛作必令人以手捶擊至五更雞鳴則漸減向曙則痛止左右主病者皆作鬼神陰譴白虎齧朝禱暮祝覡巫僧道禁師至則其痛以減又夢鬼神戰鬥相擊山川神廟無不致祭者淹延歲月肉瘦皮枯飲食減少暴怒日增惟候一死有書生曰既云鬼神虎齧陰譴之禍如此禱祈何無一應聞陳郡有張戴人精於醫可以問其鬼神白虎與病乎彼若術窮可以委命其家從之戴人診其兩手脈皆沉滯堅徑力如張弦謂之曰病雖瘦難於食然腰尻脊胯皆痛者必大便堅燥其左右曰有五七日或八九日見燥糞一兩塊如彈丸結硬不可言必令人剜取之強下一兩塊渾身燥癢皮膚揭破枯澀如麩片戴人既得病之虛實陰用大承氣湯以薑棗煎之加牽牛頭末三錢不敢書是瀉劑蓋病者聞暖則悅聞寒則懼說補則從說瀉則逆此蔽非一日也及煎成使稍熱咽之從少至多纍至三日天且晚臟腑下泄四五行約半盆以燈視之皆燥糞碎塊及瘀血雜腥穢不可近須臾痛減九分昏睡鼻息如常人睡至明日將夕覺飢而索粥食溫涼與之又困睡一二日其痛盡去次令飲食調養日服導飲丸甘露散滑利便溺之藥四十餘日乃復舊靈樞經謂利與汙雖久猶可拔而雪結與閇雖久猶可解而決夫腰脊胯痛者足太陽膀胱經也胯痛足少陽膽經之所過也難經曰諸痛為實內經曰諸痛癢瘡疾皆屬火注曰心寂則痛微心燥則痛甚人見覡巫僧道禁師至則痛稍去者心寂也然去其末者終不去其本也古稱痛隨利減不利則痛何由去病者既痊乃壽八十歲故凡燥證皆三陽病也北人衛德新因之析津冬月飲寒致冷病腰常直不能屈伸兩足沉重難於行步塗中以床舁遞程問醫皆云腎虛凡蓯蓉巴戟附子鹿茸皆用之大便反祕潮熱上周將經歲矣乃求拯於戴人曰此疾十日可效衛曰效則不慮遲戴人曰是太陽經血多病則腰似折膕如結腨如裂太陽所致為屈伸不利況腰者腎之府也身中之大關節今既強直而不利宜咸以耎之數服則柔和矣難經曰強力入房則腎傷而髓枯則鬲胃乃壞而不用與此正同今君之證太陽為寒所逼血隨下滯腰間當必有積血非腎虛也節次用藥利數十行約去血一二升次以四面玲瓏灶蒸之汗出三五次而愈初蒸時至五日問曰腹中鳴否德新曰未也至六日覺鳴七日而起已能揖人戴人曰病有熱者勿蒸蒸則損人目也今子病腰腎久衰視聽半失此陰氣乘陽而上氣短精神不足且脈弦皆陽氣衰弱伏匿於陰中故爾癸卯歲六七月間因雨陰寒逾月不止時人多病泄利乃濕多成五泄故也一日體重肢節疼痛大便泄並下者三而小便閉塞黝黑內經云在下者引而竭之是先利小便也又云諸瀉而小便不利先分利又云治濕不利小便非其治也皆當利其小便必用淡滲之劑以利之下其法也今客邪寒濕之勝自外入里而甚暴若以淡滲之劑以舒之病雖即已是降之又降復益其陰而重竭其陽也則陽氣愈削而精神愈短矣陰重強而陽重衰也茲以升陽之藥是為宜爾羌活獨活升麻各一錢防風炙甘草各半兩同㕮咀水三盞煎至一盞去滓熱服一服乃愈夫經云寒濕之勝助風以平之又曰下者舉之此得陽之升勝故愈也是因曲為直也夫聖人之法可以類推舉一則可以知百矣方專治腰痛方香白芷紅曲各二錢半上為末空心溫酒調服麻子方治風水腹大臍腰重痛不可轉動用冬麻子半升碎水研濾取汁米二合以麻子汁煮作稀粥著蔥椒姜豉空心食之萆薢湯治腰痛動轉艱難似有氣注萆薢一兩半當歸切焙一兩桔梗炒一兩半牡丹皮一兩黃連去須一兩杏仁湯浸去皮尖雙仁炒十枚附子炮裂去皮臍二兩代赭石一兩半桑白皮銼炒一兩半貫衆一兩大腹皮一兩半桂去粗皮白茯苓去黑皮覆盆子去梗黃芩去黑心各一兩吳茱萸先焙炒半兩草豆蔻去皮一枚桃仁炒去皮尖雙仁十枚蛇床子炒一兩半乾薑炮半兩木瓜去皮子焙乾一兩上銼如麻豆大每五錢匕水一盞半煎一盞去滓空心溫服杜仲酒出聖惠方治腎脈逆小於寸口膀胱虛寒腰痛胸中動四時通用之方通治五種腰痛杜仲乾薑各四兩一云乾地黃萆薢羌活天雄蜀椒桂心芎藭防風秦艽烏頭細辛各半兩五加皮石斛各五兩栝蔞根地骨皮續斷桔梗甘草各一兩上㕮咀以酒四斗浸四宿初服五合加至七八合日再通治五種腰痛獨活寄生湯出和劑方夫腰痛皆由腎氣虛弱臥冷濕地當風所得不得過治善流入腳膝為偏枯冷痹緩弱疼重或腰痛腳攣重痹弱或皮肉紫破有瘡者宜服之秦艽去土茯苓去皮白芍藥桂心不見火杜仲裂炒斷絲桑寄生録驗用續斷無寄生細辛去苗土洗牛膝酒浸去蘆防風去蘆各二兩甘草半兩人參熟地黃當歸各二兩獨活三兩上為散每服四大錢水二盞煎七分去滓空心服氣虛不利或中脘不快者除地黃加生薑婦人新産腹痛不得動轉及腰腳攣痛痹弱不得屈伸此湯最除風消血肘後方有附子一枚無寄生人參甘草當歸近人將治歷節風並腳氣流注甚效一方有生薑煎服湯取蒴藋葉火燎厚安席上及熱眠上冷復燎之冬月取根春取莖燎火臥之佳其餘薄尉不及蒴藋蒸為愈也諸處風濕亦用此法獨活湯出試效方因勞役得腰痛如折沉重如山羌活防風獨活肉桂煨大黃澤瀉各三錢桃仁五十個當歸梢連翹各半兩甘草炙二錢防己黃連各一兩一方用柏酒製無黃連上㕮咀每服半兩酒半盞水一盞半同煎去滓熱服立愈巴戟丸治諸腰痛或腎虛冷腰疼痛陰痿乾漆熬煙絶巴戟天去心杜仲牛膝各十二分桂心狗脊獨活各八分五加皮山茱萸干薯蕷各十分防風六分附子四分上煉蜜為丸如梧桐子大空心酒下二十丸再加減以止為度調肝散出直指方治鬱怒傷肝發為腰痛半夏制三分辣桂宣木瓜當歸川芎牛膝細辛各二分石菖蒲酸棗仁湯浸去皮微炒甘草炙各一分上銼細每三錢姜五片棗二枚煎服牛膝丸牛膝酒浸萆薢杜仲銼炒蓯蓉酒浸菟絲子防風葫蘆巴炒桂減半破故紙沙苑白蒺藜等分上為末酒煮豬腰子為丸每服五七十丸空心溫酒下如腰痛不起者甚效神應膏藥治貼腰痛川烏馬藺子官桂乾薑杜仲木鱉子去殼絲油另研五錢沒藥五錢另研乳香三錢另研破故紙炒五錢上細末醋糊調藥末敷貼腰上紙蓋綿帛拴住日換三二次牛膝酒一名海桐皮酒出醫方大成治腰膝痛不可忍庸醫以腎傷風毒攻刺治之步履漸重均州刺史王紹顏云余患腰痛不可忍醫以腎臟風毒攻刺諸藥莫療因服此劑便減五分步履便輕牛膝川芎羌活地骨皮五加皮薏苡仁各一兩甘草生地黃半兩海桐皮二兩上銼散帛裹入無灰酒二斗浸冬二七日夏七日數服旋浸三五宿每服一杯日三四杯常令酒氣不絶為佳一法加杜仲一兩炒絲斷用之尤妙合時不用添減禁毒食木香丸治腰痛沉重腹肚不能轉動木香半兩檳榔銼桂去粗皮附子炮裂去皮臍萆薢芍藥郁李仁去皮別研如膏各二錢上為末煉蜜丸如梧桐子大每服二十丸溫酒下空心日午夜臥服微利為效小七香丸出危氏方治鬱怒憂思氣滯腰痛因閃顛撲甘松炒一十兩甘草炒十五兩香附子炒去毛十五兩丁香皮十五兩蓬莪朮煨乘熱碎二兩半縮砂仁二兩半益智仁炒二一兩半上為丸每服五十丸橘皮一錢鹽少許煎湯空心服或用沉香降氣湯打和勻氣散服治腰痛牽引足膝腳膕痿如神出經驗良方杜仲薑汁炒去絲續斷黑牽牛破故紙炒桃仁炒去皮尖玄胡索各等分上為細末酒煮麵糊丸如梧桐子大每服五七十丸湯酒任下加胡桃肉同丸為妙治腰痛穿山甲一錢火煅花錫一錢研末水銀一錢乳香一錢萆麻子七枚麝香少許上各研為細末用榖樹漿合成小銅錢大貼之治氣滯腰痛出經驗良方陳赤曲生薑焙乾骨碎補薄切去毛大茴香各等分上為末每服二錢空心熱酒調下治腰痛不得立方出千金方甘遂桂心一作附子杜仲人參各二錢上為末以方寸匕納羊腎中炙令熟服之治腰疼痛用轉下膿水黑牽牛炒白朮各一分桑白皮一兩木通半兩上為細末每服三錢茶清調下四更時服轉了粥補寄生散治腰痛桑寄生切炒牡丹皮鹿茸酒浸炙各半兩桂去粗皮半兩上為細末每服二錢溫酒調下空心日午夜臥服一方出海上方治腰痛金毛狗脊生鱉甲醋炙赤牛膝草根葉下莖赤紅長生不死草各等分上㕮咀以水同煎服威靈仙丸一名定痛丸出經驗良方治氣滯腰痛威靈仙去土半兩金櫻子去核一兩銼碎炒焦舶上茴香半兩川烏炮去皮臍一兩上為細末酒煮麵糊為丸如梧桐子大每服二十丸空心溫酒下食前二服為效治血瀝腰痛用續斷牛膝桃仁炒煎湯磨沉麝丸下白朮散出十便良方治腰痛陰然以熱物著痛處即少寬此由久處卑濕復感風邪傷於足太陽之經與血氣相搏診其脈緩澀並宜服之白朮二兩芍藥三兩官桂一兩半附子半兩上為細末每服二錢空心酒調服療腰疼痛下膿水石鹽一方作食鹽乾薑杏仁去尖醬瓣各等分上為末以錦裹導之六七過下膿水腰下疼痛瘥止一方無醬瓣牛膝散療腰腎病膿水並治停水腰痛牛膝六分檳榔仁十枚防己六分牽牛子八分炒上為散空心以酒下三錢以宣瀉即瘥如利三五行即少投醋於散內止之慎生冷油膩蒜等物後以補腎氣湯丸投之可治腰痛不可忍者出海上方蕓薹菴䕡子橘子仁各等分上為細末每服二錢酒一盞煎至七分空心熱服治腰痛方出德生堂官桂玄胡索杜仲去皮炒絲斷各等分上為細末每服三錢空心熱調下杜仲酒治腰痛杜仲去粗皮丹參各八兩芎藭五兩上細銼用酒一斗五升浸五日為滿隨性多少溫服當歸丸出仁存方治腰痛不可轉側如錐刀所刺大便黑小便赤澀或黑此血汗滯於腰間謂之血瀝腰痛診其脈弦者是也當歸三兩水蛭三十個炒去足桃仁三十個去皮尖上為細末酒糊丸如梧桐子大每服十五丸漸加至三十丸酒下食前服速效散出經驗良方治男女腰痛不可忍者川楝子取肉巴豆五粒去殼同炒赤去巴豆茴香各一兩半鹽炒熟破故紙炒一兩上為細末每服一錢熱酒調下神應散一名如神湯出家藏經驗方治腰痛神效亦治閃肭滯牽引足膝不能行動玄胡索一兩桂心當歸各半兩上為末酒調三錢食前服一方用豬腰子一隻批開操藥在內濕紙煨熟五更細嚼熱酒下名舒筋散陳氏經驗方云談人滕珂云此方得於徽之祁門老醫真是如神故以名之葫蘆芭散葫蘆芭杜仲胡椒分停上為細末每服二錢光嚼胡桃二個食前酒調服治腰疼痛降真香節檀香節沉香節共一兩重上用煎湯空心服腰便不痛治腰如神出德生堂杜仲炒去絲木香官桂各一兩上為細末每服二錢溫酒調下空心此藥活血化氣第一品藥也治腰痛方胡桃肉四兩杜仲四兩補骨脂四兩上㕮咀水煎服尉法延年療腰痛菊花二升芫花二升羊躑躅二升上以醋拌冷濕潤分為兩劑二布囊中蒸之如炊一斗米許頃適寒溫隔衣尉之冷即易尉痛處定即瘥出集驗方治腰疼方草烏頭火燒香五靈脂上用蔥心同搗爛丸如小指面大臨臥涼酒下治腰痛單方出百一選方威靈仙橘核各等分上為細末熱酒調下一方以豬腰子煮食豬肚亦可服藥後忌茶飯菟絲子丸出百一選方治腰痛極有驗效兼治腎虛威靈仙菟絲子酒浸杜仲去皮炒斷絲各等分上為細末以山藥糊丸如梧桐子大每服五十丸鹽酒或鹽湯下亦得鹿茸丸出百一選方治腰痛鹿茸去毛酥炙微黃附子炮裂去皮臍上各二兩鹽花三分同為細末煮棗肉丸如梧桐子大每服三十丸空心溫酒食前下日再服附牛丸一名趁痛丸出仁存方治腰痛亦治閃肭腰痛不可轉側痛不可忍此由勞役用動傷經絡或因從高墜下氣滯於足太陽之經留而不得行為正氣動擊而致傷痛附子半兩炮黑牽牛炒止取一頭末上為末酒煮麵糊丸如梧桐子大每服三十丸空心溫酒下半邊痛各半生半熟並去皮一方鹽湯下立安散出醫方大成治腰痛杜仲炒去絲臭橘子核各等分上㕮咀用好酒浸春秋三日夏二日冬五日空心溫酒令酒熱連藥嚼服或為末麵糊丸梧桐子大溫酒下三十丸空心服日三服一方為末入鹽少許酒調服食前茸角丸出千金方治腰痛鹿角去上尖取白者熬令黃鹿茸新者良陳者不佳上為末酒服方寸匕日三服特禁生魚余不忌一方用鹿角屑熬黃酒服無鹿茸單用角亦得透骨丸治男女腰痛腿冷婦人胎冷小腸疼痛不止針砂一兩硇砂半兩上先將硇砂為細末次後共針砂相和一處用冷水拌勻候少痛時用好夾綿紙重包前藥如熱透於痛冷處尉之用罷就攤藥干治腰痛青木香乳香各二錢上為無灰酒放藥在碗內用酒浸藥於飯甑內蒸得乳香化溫服三日即愈倉卒散治氣目腰腹間攣急疼痛不可屈伸腹中冷重如石痛難忍自汗如洗手足冰冷久不瘥垂死方山梔子四十九個連皮燒過半附子一枚去皮臍炮上為末每服二錢酒一小盞入鹽少許煎七分溫服又治胸痞切痛白蒺藜散出御藥院方治腰痛白蒺藜上不拘多少為細末每服三錢溫酒調下空心食前服皂角膏出試效方上用干酒三大碗皂角一斤去皮弦搗碎熬至一半濾去滓再用前汁入石器熬為膏子隨痛處貼之散滯丸出衛生家寶方治腰痛不可忍者上牽牛不拘多少碾取頭末去滓不用取大蒜每一瓣入巴豆肉一粒在內用濕紙裹定煨令蒜熟去巴豆將蒜研細和牽牛為丸如梧桐子大每服五丸醋茶湯空心食前量虛實服一方無巴豆硃砂為衣每服二十丸酒下只一服便安治腰痛單方出百一選方用生橘核炒香研入酒除去滓下青木香丸治腰痛不可忍者出經驗良方上用破故紙一兩好酒浸一宿去酒入麥麩炒令焦黃黑去麩為末入杏仁桃仁各半兩並去皮尖爛研後用浸藥酒拌麵糊為丸如梧桐子大每服二十丸空心鹽湯或酒下治感寒濕與脾氣敝腰痛出海上方五積散加桃仁煎空心食前服陽臟人不可服五積散神麯酒出續易簡方治挫閃著腰痛不能轉側陳久神麯一大塊燒通紅淬老酒去神麯通口吞青蛾丸兩服頓愈一方不用青蛾丸服後仰臥片時效再服治腰痛方風濕轉動不得出十便良方用蒴藋葉火燎厚鋪床上趁熱臥眠於上冷復易之冬月取根舂碎熬及熱准前用並治風濕冷痹及産婦患傷冷腰痛不得動亦用之治腰疼氣痛五靈脂上不拘多少為末好酒送下婦人加當歸煎酒調下一二分姜附湯出直指方治體虛傷冷腰痛加當歸制杜仲各五錢食前服治腰重疼出肘後方用檳榔為末酒下八錢或五錢治腰痛出外臺祕要方取黃狗皮炙裹腰痛處取暖徹為度頻即瘥也治反腰有血痛方出肘後方用搗杜仲三升許以苦酒和塗痛上干復塗並灸足踵白肉際三壯杜仲酒出風科集驗方治腰背痛用杜仲半斤去皮酒二升浸七日每日三度服之甚妙宋明帝宮人患腰痛牽心發則氣絶徐文伯視之曰發瘕以油灌之吐物如發引長二尺頭已成蛇能動搖懸之滴唯一發病即瘥治腰痛用皺面草研細好酒調下即愈治一切腰痛以安胎飲下保生丸青蛾丸亦妙一方以炒鹽下又方以菴䕡紅曲擂爛好熱酒調下又方以紅曲末熱酒服又方出直指方以茴香根同紅曲擂爛好熱酒調服妙一方只用茴香根擂爛好酒調下立愈雪溪傳甚妙一方八角茴香炒末食前溫酒調下又方以蒼朮紙裹入小火內煨過待冷刮去皮為末每服三錢酒一盞調服之療腰痛大豆方出聖惠方用大豆六升拌令勻炒令熟以布裹隔一重衣尉痛處令暖氣徹冷即易之切須避風仍取白楊皮濃煎汁洗濯之甚佳治氣滯腰痛出直指方用烏藥順氣散加五加皮少入甘草煎湯調下或用木香流氣飲立效治腎虛腰痛橘皮鹽煎湯吞加萆薢尤佳獨活續斷湯療腰痛腎氣虛弱臥冷濕地當風所得不時瘥久久流腳膝冷痹疼弱重滯或偏枯腰腳疼攣腳重急痛獨活三兩續斷二兩杜仲二兩桂心二兩防風二兩芎藭二兩牛膝二兩細辛二兩秦艽三兩茯苓二兩人參二兩當歸二兩芍藥二兩白者乾地黃甘草各三兩炙上以水一斗煮取三升分三服溫服將息勿取冷宜用蒴藋葉火燎厚安床上及熱臥上冷即易之冬月取根搗用亦須熬之忌蕪荑生蔥生菜海藻菘菜酢物肘後方有附子無續斷甘草牛膝人參當歸止十二味神仙磨腰丹駱沖虛傳頭丹腰下如火二丹知血脈流通三丹骨髓盈實十丹永無非橫之患修合之時宜於淨室中切忌婦人雞犬見婦人不生子者十丹則血臟暖成胎孕附子炮去皮白礬燒灰丁香研硃砂研硫黃研陳皮去白乾薑炮為末吳茱萸為末杏仁去皮尖木香為末麝香一錢別研膩粉一錢另研上除麝香膩粉外各淨稱一兩為末併入乳鉢內為末粉麝一處研入極細蜜為丹如中指大每一丹丸用生薑稱七錢取自然汁於銀石器煎五沸傾於盞內投藥良久以手指研極細勿令有砂用手蘸磨腰間逡巡為火熱以盡為度便將軟熟裹肚上下系定隔日不須解善療男子婦人水臟久虛五勞七傷衰弱鬢髮早白腰膝疼痛婦人水臟久虛血散子宮耳聾目暗穢惡之病風勞等證並治之療男子患腰腎疼痛髀膝有風冷耳鳴飲食無味並有冷氣方乾地黃四兩茯苓三兩白朮二兩澤瀉三兩山茱萸三兩蓯蓉二兩五味子三兩桂心二兩石斛二兩巴戟天三兩防風二兩人參二兩磁石二兩研上為末蜜丸如梧桐子大酒下二十丸日再服忌桃李雀肉生蔥酢物蕪荑治腎虛氣衰腰脊痛疼或當風臥濕冷入頭中不速治流入腿膝為偏枯冷痹緩弱宜速治之方出肘後方獨活四分附子一枚大者炮杜仲茯苓桂心各八分牛膝秦艽防風芎藭芍藥各六分細辛五分乾地黃十分切上水九升煎取三升空腹分三服如人行八九里進一服忌如前項服三劑三至丸出淡寮方治老人虛弱人腎氣虛損腰痛不可屈伸鹿角鎊三兩麋角鎊二兩附子炮去皮臍桂心不見火補骨脂炒各一兩杜仲去皮銼炒斷絲一兩鹿茸酒蒸焙一兩青鹽另研半兩上為末酒糊丸如梧桐子大每服七十丸空心用胡桃肉細嚼以鹽酒湯任下惡熱藥去附子加肉蓯蓉一兩酒浸微炙乾用療腰痛少氣陰弱寒冷小便清冷瀝滴陰下濕癢少腹急無子息方甘草十四分炙續斷三分麥門冬三分薯蕷三分附子三分炮乾薑三分棘刺四分上為末酒服方寸匕日三忌豬肉冷水海藻菘菜必效一方無干姜木瓜丸出御藥院方治腰痛補益壯筋骨牛膝二兩溫酒浸切焙木瓜一枚去頂瓤入艾葉一兩蒸熟巴戟去心茴香炒木香各一兩桂心半兩去皮上為細末入熟木瓜並艾同杵千下如硬更下蜜丸如梧桐子大每服二十丸空心鹽湯下腎氣丸主短氣腰痛身重調中補筋脈不足方乾地黃續斷人參各五錢萆薢阿膠炙各三分上為末蜜和丸如梧桐子大每以酒下十丸加至二十丸日再服忌蕪荑生冷杜仲丸出千金方補方杜仲一兩石斛二分乾薑乾地黃各三分上為末蜜丸如梧桐子大每服二十丸日再酒送下萆薢散出千金方治腎虛腰痛萆薢桂心白朮各三分牡丹皮三分上為末酒服方寸匕日三服亦可作湯服之甚良一方入鹽少許杜仲散出德生堂治腎虛腰痛疼俯仰惙惙短氣此由腎氣虛弱勞傷過度杜仲一兩去皮杵令爛以名酒浸一宿焙乾肉桂牡丹皮各半兩上為細末每服二錢溫酒下治腎虛腰痛方出聖惠方附子二分桂心牡丹皮各一兩上為末酒服一方無桂亦驗寄生散療腎氣腰痛桑寄生鹿茸炙杜仲各一分上為散酒服方寸匕日三服青蛾丸出醫方大成治腎氣腰痛益精助陽烏鬚髮去風濕腳氣常服壯筋補虛破故紙四兩炒香杜仲去粗皮銼四兩用上為細末用胡桃肉三十枚研膏入少熟蜜丸如梧桐子大每服五十丸每日服食前下青蛾丸出如宜方治腎虛勞力腰疼益精助陽烏髭健腳神效破故紙四兩炒香杜仲去粗皮切薑汁拌炒去絲八兩上為末用胡桃肉五十個大蒜二十個研膏丸如梧桐子大每服三十五丸鹽湯服虛極人十補湯吞服一方加川續斷桃仁去皮尖玄胡索黑牽牛炒酌量入十補湯鹿茸丸出百一選方治腎氣虛弱腰痛鹿茸三兩切作片子酥炙黃上為細末酒糊為丸如梧桐子大每服三十丸鹽湯下食後摩腰膏治老壯一切腰痛痼冷腿腳寒濕此治之大壯筋骨助元陽極有補益用之自見陳皮一兩去白陽起石五錢乾薑沉香官桂去粗皮舶上硫黃吳茱萸雄黃蛇床子以上各五錢枯白礬一兩杏仁一兩去皮尖輕粉一錢麝香一錢半附子一個須一兩者炮去皮臍母丁香一兩硃砂一錢二分上除輕粉硃砂麝香另研外余藥併為細末後入上三味和勻煉蜜丸如彈子大臨用時取生薑自然汁煎濃後入藥一丸良久浸化研之令人手蘸藥塗於腰肚上摩之以盡為度須用綿裹肚腰上其熱如火每日一次用之極有奇功薏苡仁丸出醫方大成治腰脅疼痛手足枯瘁薏苡仁一兩石斛用細者七錢半附子半兩牛膝桃仁各一分一作椒仁生乾地黃各二分細辛人參甘草枳殼柏子仁川芎當歸各半兩上為細末煉蜜丸如梧桐子大每服四十丸酒吞下空心日三服芎葛湯出本事方治脅下疼痛不可忍者桂枝川芎細辛乾葛防風各半兩芍藥枳殼麻黃人參甘草各一兩分上㕮咀每服五錢水一盞姜三片煎七分溫服枳實散出醫方大成治兩脅疼痛肝氣不足枳實一錢白芍藥炒雀腦芎人參各半兩上為末空心薑棗湯調服二錢酒亦可一方姜鹽湯服推氣散出危氏方治右脅疼痛腹滿不下食枳殼炒半兩桂片姜各半分甘草三錢上為末每服二錢薑棗湯調酒亦可不拘時枳芎散出醫方大成治左脅刺痛不可忍枳實炒川芎半兩甘草二錢半上為末每服二錢薑棗湯下不拘時酒調亦可治一切走疰疼痛氣攻腰腳攣急者出經驗濟世方黑五虎脂大香附子各等分上為末醋糊丸蠶豆大每服十二丸丈夫鹽湯婦人醋湯下桃仁酒出經驗良方治腎虛風勞傷腫牽引小腹連腰痛用桃仁一味麩炒去皮尖研細每服四錢熱酒調下得汗愈順氣丸出如宜方治腰膝無力大腸閉則痛發膝下似水冷大黃五兩半生半熟車前子檳榔麻仁炒牛膝酒浸郁李仁湯去皮菟絲子酒浸蒸山藥山茱萸防風枳殼獨活各二兩上為末蜜丸如梧桐子大茶酒米湯任下此藥補益通利疏風順氣又方出海上方治腰痛難忍遍身痠疼者金橘子仁炒令黃色去殼為末每服三錢溫酒調下不拘時服治腰脊善痛不遂方出千金方用大豆三升熬一升煮蒸一斗酒以六斗甕一口蒸令極熱蒸豆亦熱納甕中封閉口秋冬二七日於甕中作孔出取服五合日夜二三服見效一方用生大豆二升酒三升煮取二升頓服佳又方出千金方用地黃花為末酒服方寸匕日三又方出千金方用三月三日收桃花取一斗一升井花水三斗曲六升依數用之同入米六斗炊之一時釀熟去糟每服一升日三服若作食飲用河水治急引腰脊痛出本草用蒺藜子為末蜜和丸酒服如胡豆大二丸日三服封臍艾治腰膝痛臍腹冷痛老弱人婦人小兒泄瀉並宜用之每日尉烙為效海艾蛇床子各半兩木鱉子二對生用去殼上為細末與艾三味相和勻作一紙圈於內可以容尉斗將藥用綿包裹定安在紙圈內於臍上用尉斗尉之治腰臍坎痛用豬腎一對研著胡椒橘皮鹽醬椒末等搜面似常法作餛飩煮熟空腹與兩碗瘥專治腰痛方阿膠乳香菖蒲達達茴香各五錢乾薑五錢上為末煉蜜為丸如梧桐子大每服六十丸好酒空心送下熟雞蛋壓之便食飲忌醋治腰痛方出海上方方見萆薢酒治腰痛神妙出本草用破故紙為末溫酒下三錢治積年久病腰痛有時發動脅疼如打出肘後方六月七日取地膚子乾末酒服方寸匕日五六服療腰痛出本草以鹿角屑熬令黃赤研酒服方寸匕日五六服二香五子三茱丸出永類鈐方治腰痛青木香半兩大腹子一兩川楝子肉三兩香附子炒一兩蘿蔔子炒二兩黑牽牛三兩半生半熟八角茴香半兩炒去子吳茱萸食茱萸山茱萸去核各三兩上為末酒糊丸空心溫酒鹽湯下補髓膏出衛生家寶方治腰痛破故紙一兩鍋內炒令八分熟再入麻油半兩同炒以麻油香為度上放冷入胡桃肉同煎藥並油麻爛嚼鹽酒或鹽湯送下五加皮散出衛生家寶方治腰痛五加皮杜仲炒上等分為末酒糊丸如梧桐子大每服三十丸溫酒下內補散出衛生家寶方治遠年近日腰疼丈夫婦人腎臟久虛腰疼不可忍者青皮去瓤稱破故紙炒威靈仙去蘆洗焙以上三味各一兩黑牽牛三兩上為細末每服二錢溫酒調下空心食前川烏丸出朱氏集驗方治男女腰腳滯重川烏當歸杜仲骨碎補五靈脂上等分酒糊為丸空心酒下牽牛散出朱氏集驗方治腰痛神妙黑牽牛不拘多少炒熱瓦上勻鋪不可撥動蓋欲半生半熟上為末酒調加茴香尤佳又方出朱氏集驗方治風腰痛最妙小續命湯加桃仁七粒炒去皮尖煎服川芎肉桂湯出試效方治腰痛丁未冬曹通甫自河南來有役夫小翟靈君臥寒濕地腰痛不能轉側兩脅搐急作痛已經月餘不愈矣腰痛論中說皆為足太陽足少陰血絡中有凝血作痛間有一二證屬少陽膽經外絡脈病皆去血絡之凝乃愈其內經有云冬三月禁不得用針只用服藥通其經絡破其血絡敗血羌活一錢半獨活半錢柴胡肉桂桃仁去皮尖研當歸尾蒼朮甘草炙各一錢炒曲半錢防風三錢漢防己酒製三分川芎五分上㕮咀作一服好酒三盞煎一盞去滓溫服早飯前數服良愈宜溫暖處服之一方無川芎羌活湯一名暖筋湯出試效方治兩目如火腫痛兩足及伏兔骨筋疼痛膝胻少力身重腰疼夜惡寒痰嗽項筋皆急目外眵目系急食不下羌活三錢麻黃三錢甘草二分炙生甘草二分升麻廣皮酒製草豆蔻當歸黃芩各三分柴胡二分生地黃三分藁本三分蘇木二分熟地黃一分蒼朮半分獨活二分紅花二分上件㕮咀如麻豆大都作一服水二大盞煎至一盞去滓稍熱服每食遠服地龍散出試效方治腰脊痛或打撲傷損從高墜下惡血在太陽經中令人腰脊或脛腨臂中痛不可忍鼻壅塞不通官桂四分桃仁六枚羌活二分獨活一錢黃柏一錢麻黃半錢當歸尾地龍四分甘草一錢蘇木六分上件㕮咀每服五錢水二盞煎至一盞去滓溫服克效餅子出衛生寶鑑方治腰疼及腱膝纍得神效甘遂一兩麩炒黃色黑牽牛揀淨四兩半生半熟頭末二兩半蕎麥二兩上三味為末每服三錢夜臥滴水和成餅子漫火燒黃色取出氣實者都一服爛嚼後煎半生半熟蔥白酒送下如氣虛作兩服先嚼一多半蔥白酒送下至明取動又嚼一半生一半熟蔥白酒送下取利一行婦人有胎不可服仙靈丸出余居士選奇方治遠年近日腰痛威靈仙沒藥乳香玄胡索黑牽牛破故紙各一分炒黃陳皮巴豆一粒去殼入蒜內紙包慢火煨熟去巴豆用蒜上用前件為末酒煮糊丸如梧桐子大每服三錢五更初茶清送下蒼朮湯出試效方治濕熱腰腿疼痛蒼朮去濕止痛三錢柴胡二錢行經黃柏一錢始得之時寒也久不愈寒化為熱除濕止痛防風一錢風勝濕上件為一服水二盞去滓稍熱服空心食前一方無防風麻黃蒼朮湯出試效方治濕寒頭風身體沉重腰痛面色痿黃不澤麻黃一錢桂枝半錢杏仁十個草豆蔻半錢半夏半錢炒麵一錢蒼朮二錢橘皮一錢澤瀉一錢白茯苓一錢豬苓半錢黃耆三分炙甘草二分上件㕮咀如麻豆大作一服水二盞煎至一盞去滓稍熱服食前烏藥順氣散出如宜方治氣滯腰疼或俯仰趖閃白殭蠶制川芎白芷枳殼桔梗甘草炙各一錢麻黃制陳皮制烏藥各二兩乾薑半兩上為末加姜酒煎或頭疼加蔥白煎又宜炒桃仁溫酒服五積散出如宜方治寒濕傷腎氣滯腰疼不可俯仰陳皮制六兩甘草炙茯苓半夏制肉桂麻黃三兩枳殼六兩白芍藥川芎白芷厚朴乾薑各四兩桔梗十二兩蒼朮制二十四兩上㕮咀慢火炒令色轉入肉桂枳殼薑蔥加桃仁煎固真丹出如宜方治寒濕及腎氣蒼朮一斤米泔浸逐日換春五日夏三日秋七日冬十日漉出切作片子焙乾分為四處四兩好醋酒各半升一處煮三十沸出焙乾四兩川椒去目併合者一兩破故紙一兩同炒術黃為度四兩用茴香一兩鹽一兩同炒術黃為度四兩川烏一兩制去皮臍作片子川楝一兩去皮核劈開炒黃為度上共為末煮藥酒打糊丸如梧桐子大每服三十丸溫酒鹽湯下補腎湯出本草治主腰痛以杜仲一大斤五味子半大升二物細切分十四劑每夜取一劑以水一大升浸至五更煎三分減一濾取汁以羊腎三四枚切下之再煮三五沸如法作羹空腹頓服用鹽酢和之亦得崔方不用五味子治腰痛腎冷出本草用芥子和生薑研微暖塗貼王方平通靈玉粉散治腰膝暖水臟益顏色其功不可具載硫黃半斤上用桑柴灰五斗淋取汁煮三伏時以鐵匙抄於火上試之伏火即止候乾以大火煅之如未伏更煮以伏為度煅了研為散穿地坑一尺二寸投水於中待水清取水和硫黃末水不得多於鍋中煎熬令如膏及用鐵鍋一面不著火止以細砂隔紙慢炒將硫黃於紙上滴之自然如玉色光彩射人此號為玉粉散細研要丸以飲丸如麻子大空心每日鹽湯下十丸散服以鹽湯調兩字極有效驗余鄉人王昭遂合服之年九十顏貌如童夜讀字倍常人導引法凡學將息人先須正坐並膝頭足初坐先足指相對足跟外於坐上少欲安穩須兩足跟向內相對坐上足指外入覺悶痛漸漸舉身似款便坐足上待共內坐相似不痛始雙立足跟向上坐上足指並及向外每坐常學去膀胱內冷風膝冷足疼上氣腰疼儘自消釋又法出危氏方治腰䐴痛正東坐手抱心一人於前據躡其兩膝一人後捧其頭徐牽令偃臥頭倒地三起三臥便瘥一法治男子婦人腰痛不可忍者用左右帶研索於朝太陽長伸臥地以紙研如左用右研入鼻中如右用左以涕為驗便安適即起行步
