腦甘草炙微赤銼各一兩麝香一錢細研犀角屑羚羊角屑硃砂細研水飛過黃芩川升麻各一兩上搗羅為末入前研了藥更研令勻以煉蜜和搗三二百杵丸如梧桐子大每服不計時候以溫水嚼下十五丸治陽毒傷寒煩熱大便不通川大黃一兩銼碎微炒川芒硝半兩上搗篩以水一大盞煎至七分去滓不計時候分溫二服如人行五七里再服當利下惡物治陽毒傷寒毒氣在臟狂言妄語欲走起者宜服此方龍膽一兩去蘆頭鐵粉二兩上件藥搗細羅為散每服不計時候以磨刀水調下一錢升麻散出活人書治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言或走見鬼或下利脈浮大數面赤斑紋如錦咽喉痛出膿血五日可治七日不可治升麻犀角鎊射干黃芩去黑皮人參甘草炙銼各一分上六味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服食頃再服溫覆出汗未汗再服甚者大承氣湯除厚朴加木通甘草大腹皮桃仁各一兩以利為效瀉心湯出聖濟總錄治陽毒傷寒頭痛壯熱狂言妄語似見鬼神石膏一兩芍藥葛根銼黃芩去黑心各半兩大黃黃連去須各三分上粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服日二不拘時升麻湯出聖濟總錄治陽毒傷寒腰背疼痛煩悶面赤狂言妄走或見鬼下利無常赤斑如錦紋咽喉痛唾膿血升麻雄黃醋煮研各半兩當歸切焙桂去粗皮各一兩甘草炙銼二三分鱉甲醋炙去裙襴一兩上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服日二不拘時候大青湯出聖濟總錄治陽毒傷寒煩躁不解或下利危困大青二兩秦艽去苗土一兩犀角鎊山梔子仁甘草炙銼黃連去須各半兩上粗搗篩每服五錢匕水一盞半入豉一百粒薤白七寸煎至八分去滓食前溫服解陽湯出聖濟總錄治陽毒傷寒口舌乾燥麻黃去根節人參赤茯苓去黑皮桂去粗皮各半兩麥門冬去心焙葛根銼各三分杏仁湯浸去皮尖雙仁炒甘草炙銼各一兩上粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服不拘時五解湯出聖濟總錄治陽毒傷寒發熱煩躁山梔子仁黃芩去黑皮甘草炙銼大黃銼醋炒各一分朴硝二錢上粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服犀角湯出聖濟總錄治陽毒傷寒初得身體大熱眼赤小便黃心悶頭痛煩渴不止四肢痠痛心中悶絕言語錯亂睡中多驚犀角鎊一兩人參三分赤茯苓去黑皮茵陳蒿細辛去苗葉陳橘皮湯浸去白炒麻黃去根節甘草炙銼各半兩上粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服葛根湯出聖濟總錄治陽毒傷寒頭痛壯熱未解身體疼痛葛根銼龍膽大青各三分桂去粗皮葳蕤芍藥黃芩去黑心升麻石膏碎麻黃去根節甘草炙銼各半兩上粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓不拘時候溫服葛根散出聖濟總錄治陽毒傷寒身熱如火頭痛燥渴咽喉痠痛葛根銼三炒山梔子仁黃芩去黑心大黃銼醋炒甘草炙銼各半兩朴硝一兩上搗羅為散每服二錢匕不拘時溫服熟水調下秦艽湯出聖濟總錄治陽毒傷寒心躁悶亂煩熱狂語口乾不止秦艽去苗土黃芩去黑心甘草炙銼木通枳殼去瓤麩炒玄參各半兩芍藥桔梗炒吳藍山梔子仁各半分一枇杷葉三分拭去毛薑汁炙上粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時候清涼散出聖濟總錄治陽毒傷寒口乾煩躁大渴發汗葛根銼二兩大黃銼炒黃芩去黑心朴硝麻黃去根節甘草炙銼各一兩桂去粗皮三分上搗羅為散每服二錢匕新汲水調下琥珀丸出聖濟總錄治陽毒傷寒六七日間服熱藥過度致使陽氣內伏身體微熱眼目爪甲盡黃心下硬痛語澀舌乾昏躁琥珀研一分黃連去須黃柏去粗皮大黃煨銼各半兩巴豆去皮心膜出油取霜二錢上搗羅四味為細末與巴豆霜拌勻煮薄麵糊和丸如綠豆大每服一十丸柳枝湯下不拘時妙應湯出聖濟總錄治陽毒傷寒遍身壯熱大喘上氣躁悶甘草炙銼人參赤茯苓去黑皮各一兩大黃煨銼山梔子去皮麻黃去根節各半兩陳橘皮去白炒木香各一分上粗搗篩每服三錢匕水一盞入蜜一匙生薑汁少許煎至八分去滓冷服不拘時鐵粉散出聖濟總錄治陽毒傷寒發狂走者鐵粉朴硝各一兩天竺黃半兩龍腦一分右四味研令勻細每服二錢匕雞清水調下不拘時水漬法出活人書治陽毒壯盛內外結熱煩躁以新汲水漬疊布數重搭於胸上須臾蒸熱再浸再搭數換新水浸之此良法也治陽毒傷寒壯熱頭痛心神煩躁利胸膈出肘後方用生瓜菜搗取自然汁飲之葉生搗貼腫毒升麻湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒身重腰背疼痛煩悶不安狂言或走或見鬼神或吐血下利其脈浮大數面赤斑斑如錦紋咽喉痛唾膿血五日可療至七日不可療也宜服升麻湯肘後陽毒升麻湯治證同無梔子鱉甲升麻二分當歸二分蜀椒出汗一分雄黃研梔子桂心各一分甘草三二分炙鱉甲大如手一片炙上件藥切以水五升煮取二升半分三服如人行五里久再服溫覆手足毒出則汗汗出則解不解重作服亦取得吐佳陰毒去雄黃忌海藻菘菜生蔥莧菜張仲景方無梔子桂心陰毒去雄黃蜀椒治陽毒傷寒昏憒不知藥食隔斷者出經驗良方將早晚白米用新汲水爛研作漿頻頻灌之能解諸毒續穀氣陽毒梔子湯一名梔子仁湯出濟生拔粹方治陽毒傷寒壯熱百節疼痛升麻梔子仁黃芩芍藥石膏知母甘草杏仁柴胡各等分上為粗末每服五錢生薑五片豉百粒水煎服一方有大青治陽毒傷寒面赤頭痛身上熱如火心神躁眼赤睛迸露頭目昏眩項背強直坐臥不安大腹秘熱脈氣洪大麻黃去根杏仁去尖山梔黃芩柴胡前胡各去毛大黃白朮桔梗通草羌活秦艽乾葛牡丹皮去心荊芥穗各一分牽牛一兩半夏四銖黃連細辛各三錢上搗羅為末每服五錢匕水一碗生薑三片蔥三枝同煎一兩沸食後熱服浴腸湯治陽厥發狂將成疸大黃四兩濕紙裹大青一兩梔子一兩甘草一兩炙上水五升煎至二升納朴硝五合再熬去一升分四服量虛實與之治陽毒入胃下血頻疼痛不可忍用鬱金五個大者牛黃一皂莢子大別細研二味同為散每服用醋漿一盞同煎三沸溫服
