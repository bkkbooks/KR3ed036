body:
  text: 卷一百三十五傷寒門陰陽毒附論夫陰氣盛而陽暴絕則為陰毒若陽氣盛而陰暴絕則為陽毒大凡陰陽離絕非大汗不能復其正氣也六脈俱洪大或沉取之大而不甚疾者非陰證也陽毒其脈當弦而洪數陰毒其脈沉細而疾陽病則身熱而無汗陰病則身冷而有汗岐伯云陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱陰勝則身寒汗出數慄而寒寒則厥此證不可以常法治之金匱論陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治陰毒之為病面目青身疼狀如被打咽喉痛死生與陽毒同三因云病者頭重頸直皮肉強痹或蘊而結核起於喉頸之側布熱毒於皮膚分肉之中上散入髮際下貫顳顬隱隱而熱不相斷離病名黃肉隨以四季各十八戊己日其病從太陰陽明相格寒濕不調關節格滯若腑虛則皮肉強痹若臟實則布毒熱於皮膚又云病者裡熱外寒意欲守火而反引飲腰痛欲折或胸脅切痛類如刀刺不得轉動熱彭彭服冷多則洞瀉病名黑骨溫以冬三月源從足太陽少陰相搏蘊積壅塞若腑虛為陰毒所傷則裡熱外寒若臟實為陽毒所損則彭彭發熱又云病者發熱腰痛強急腳縮不伸胻中欲折目中生花或澀澀憎寒復熱頸中雙筋牽不得屈伸項直背強眼赤黃欲轉動合身回側病名青筋牽者由春三月其源從厥陰涉足少陽少陽之氣始發少陰之氣始衰陰陽怫鬱於腠理腑臟受厲而生若腑虛則為陰邪所傷故發熱若臟實則為陽毒所傷故憎寒又云病者脈促身顫掉不能禁或肉熱口乾舌破咽塞聲嘶病名赤脈㩌者以夏三月其病從少陰太陽之氣相搏而停則榮衛不通皮肉痛起太陽發動少陰淫邪之氣因而作厲則臟腑隨時受疫病也若腑虛為陰邪所傷則寒戰若臟實為陽毒所侵則肉熱矣方治青筋牽三因方肝腑臟溫病陰陽毒膽腑虛為陰邪所傷腰脅強急腳縮不伸胻中欲折目中生花色蒼蒼者柴胡去苗五兩茯苓梔子仁半夏湯洗大青各三兩桂心竹茹香豉甘草炙各一兩上㕮咀每服五錢水二盞姜五片煎七分去滓空心溫服又方三因方肝腑臟溫病陰陽毒肝臟實為陽毒所傷澀澀惡寒翕翕發熱頸外雙筋牽不得屈伸項直背強眼赤黃轉動則合身回側色蒼蒼者玄參一兩細辛二兩梔子仁黃芩升麻芒硝各三兩石膏煅八兩上銼散每服五錢水二盞入車前草三葉淡竹葉七片煎七分去滓空心服治赤脈㩌三因方心腑臟溫病陰陽毒若腑虛為陰邪所勝脈促身顫掉不能禁色昏赤者茯苓人參桔梗各三分甘草一兩半白芷青皮各一兩乾薑炮半兩上銼散每服五錢水二盞煎七分去滓食前服又方三因方心腑臟溫病陰陽毒心臟實則為陽毒所傷內熱口乾舌破咽塞聲嘶色焦赤者天門冬去心麥門冬去心車前子炒梔子仁黃芩升麻甘草炙寒水石煅各等分上銼散每服五錢水二盞煎七分去滓食前服治黃肉隨三因方脾腑臟溫病陰陽毒胃腑虛則為陰邪所傷頭重頸直皮肉強痹䐜脹色黃黑者厚朴薑製炒一兩半白朮陳皮各一半乾薑炮紫蘇甘草炙半夏湯洗各三分上銼散每服五錢水二盞煎七分去滓食前服又方三因方脾腑臟溫病陰陽毒脾臟實為陽毒所傷蘊熱結核起於喉頸之側布毒氣於皮膚分肉之中散入髮際下貫顳顬蓄熱不散色黃者葛根蒼朮泔浸升麻白芷桔梗青皮各一兩大黃半兩上銼散每服五錢水二盞煎七分去滓食前服治白氣貍三因方肺腑臟溫病陰陽毒太陽腑虛為陰邪所傷寒熱互作上氣咳逆大腸飧泄色皓皓白者白朮人參各一兩乾薑炮麥糵炒各三分白茯苓五味子肉豆蔻草果烏梅甘草炙各半兩上銼散每服五錢水二盞半煎七分去滓食前服又方三因方肺腑臟溫病陰陽毒肺臟實為陽毒所傷體熱肌膚髮斑氣喘引飲色昏白者紫菀茸一兩梔子仁升麻前胡各三分石膏煅半兩葶藶炒一分杏仁去皮尖甘草炙各半兩上銼散每服五錢水二盞煎七分去滓食前服治黑骨溫三因方腎腑臟溫病陰陽毒膀胱腑虛為陰邪所傷裡熱外寒煩渴引飲反喜守火或腰脅滿痛小便赤黃而與腳俱黑附子炮去皮臍茯苓各一兩山茱萸細辛山藥澤瀉各半兩麻黃三分杏仁去皮尖一分上銼散每服五錢水二盞煎七分去滓食前服又方三因方腎腑臟溫病陰陽毒腎臟實為陽毒所傷腰脅切痛不得轉動大小便秘澀小腹脹食冷則洞泄色燻黑者吳茱萸黑牽牛炒桃仁去皮尖萆薢杜仲去皮銼薑汁製炒絲斷大黃蒸各等分上銼散每服五錢水二盞煎七分去滓食前服治肝腑臟溫病陰陽毒頸背雙筋牽先寒後熱腰強急縮目中生花出千金方桂心一兩白朮芒硝大青梔子各三兩柴胡五兩石膏生薑各八兩生地黃香豉各一升上㕮咀以水九升煮取三升分三服治心腑臟溫病陰陽毒戰掉不定驚動出千金方大青黃芩梔子知母芒硝各三兩麻黃四兩玄參六兩石膏生葛根各八兩生地黃切一升上㕮咀以水九升煮取三升去滓下芒硝分三服治脾腑臟溫病陰陽毒頭重頸直皮肉痹結核隱起出千金方大青羚羊角升麻射干芒硝各三兩梔子四兩寒水石六兩玄參八兩上㕮咀以水七升煮取三升分三服治肺腑臟溫病陰陽毒咳嗽連續聲不絕嘔逆出千金方麻黃梔子紫菀大青玄參葛根各三兩桂心甘草杏仁前胡各四兩石膏八兩上㕮咀以水九升煮取三升分三服治腎腑臟溫病身面如刺腰中欲折熱毒內傷出千金方茵陳蒿梔子芒硝各三兩苦參生葛各四兩生地黃石膏各八兩蔥白豉一升上㕮咀以水九升煮取二升半下硝分三服大交泰丹治陰陽二毒傷寒或因下早亡陽或致結伏胸膈四肢厥冷脈息俱無心燥如火或因冷物傷脾夾臍注痛生硬入胃中滿痞塞及發潮熱並治翻胃噦逆霍亂吐瀉小腸痃癖脅肋氣痛但是陰陽不順惡候傷寒並治之每服一粒炭火內煅通赤良久取出放冷細研如粉米飲一盞煎至七分溫服不拘時隔半時辰再服甚效兼治小兒瘡疹倒壓依法服半粒丹愈金星石銀星石代赭石太陰玄精石雲母石白色成片子者禹餘糧石桂府滑石各一兩寒水石吉州者一兩半不灰木色青黑性軟者一兩上同入瓷瓶子內炭火半秤煅火耗一半取出放冷研為細末糯米粥為丸如彈子大候乾依前法服寒水石南人謂之軟石膏一方加麥飯石一兩歸魂散聖濟總錄治陰陽二毒不省人事石膏八兩寒水石四兩附子炮裂去皮臍三兩陽起石三兩同石膏寒水石三味搗細研為末和入新罐內煅一伏時以紙鋪地出火毒入四味藥乾薑炮麻黃去節各一兩杏仁二七枚去皮尖雙仁炒研上搗研令勻瓷盒盛冷水調下二錢匕霹靂散一名黑散子治陰格陽煩躁不飲水用附子一枚炮熟取出用冷灰焙細研入真臘茶二大錢和勻為細末每服分作二服水一盞煎至六分臨熟入蜜半匙放溫或冷服之須臾燥止得睡汗出即瘥黑龍丹治陰陽二毒傷寒用舶上硫黃一兩以柳木槌研三兩日巴豆一兩和殼記個數用二升鐺子一口先安硫黃鋪鐺底次安巴豆又以硫黃蓋之釅醋半斤以來澆之盞子蓋合令緊蜜更以濕紙周迴固濟縫勿令透氣縫紙干更以醋濕之文武火熬常著人守之候裡面巴豆作聲數已半為度急將鐺子離火便入臼中急搗令細再以少米醋並蒸餅少許再搗令冷可丸如雞頭大若是陰毒用椒四十九粒蔥白二莖水一盞煎至六分服一丸陽毒用豆豉四十九粒蔥白二莖水一盞同煎吞一丸不得嚼破患經五六日方可服之食前吃切在度其病勢可下即與雖及日數病未傳入或未及其日病先在臟亦不可拘執矣有孕婦人亦許服或吐或瀉為候不可吃熱食或覺心頭空以溫白粥或服調氣湯散補之欲辨陰陽二毒之病者但始得病惟看手足指冷者是陰不冷氣和者是陽若冷至指節二三寸者病輕若冷至肘膝為病難理陰陽毒病亦無常也或初病便有毒或服藥經五六日以上或十餘日後不瘥變成其毒者其候身重背強咽喉痛飲食不下毒氣攻心心腹煩疼氣促四肢厥逆嘔吐體如被打面目青而體冷者陰證也陽毒則不然面目赤身壯熱或便膿血喉疼生斑點如錦紋是也合時忌婦人貓狗見破證奪命湯治陰陽二毒傷寒證候不明下藥錯誤致患人困重垂死七日以後十日以來可服此傳者云千不失一只一服不逾時見效汗自鼻上出盡是應方見破證奪命散丹砂丸出活人書治傷寒陰陽二毒相伏危惡形證硝石半兩太陽石舶上硫黃水銀太陰石玄精石各一兩上為末先用無油銚子以文武火炒下諸藥末令一如灰色研如粉面生薑自然汁浸蒸餅為丸如綠豆大每服五丸龍腦牛黃生薑蜜水下壓躁也若陽毒棗湯下陰毒任湯下不得於屋底炒一方無太陽石奪命丹出王氏博濟方治陰陽二毒氣衝心硃砂二兩金箔八十片膩粉半兩巴豆八十個紙裹出油黃蠟二兩上為末煉蠟為丸如雞頭大如有患者以膩粉一錢米飲一盞調下如人行一里以來其藥動下惡物如藥在其中取出掘一地坑埋三伏時取出除卻上面黑物以麝香裹養之如更用時擘為兩處重為丸一粒可療五七人神聖之功卒難敘述青蒿散治陰陽二毒傷寒及肢體疼倦上用青蒿八九月候成實多采去枝梗以童子小便浸三兩日漉起酢干日曬為末每服三錢水一盞烏梅一個同煎七分溫服陰毒附論夫陰氣獨盛陽氣暴衰陽為陰所勝內外皆陰故成陰毒傷寒有初得病便成陰毒者有服湯藥經五六日以上不瘥變成陰毒者以病本屬陰因服寒藥過多或臟腑內外受寒陰氣轉盛陽氣不復所致其候四肢逆冷臍腹築痛身如被擊嘔吐下利其脈沉細而疾者是也陰毒已深疾勢困重六脈附骨取之有按之即無一息八至以上或不可數宜用蔥熨法灼艾法傷寒初病一二日便結成陰毒或服藥六七日以上至十日變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息躁渴虛汗或時鄭聲嘔逆下利身如被杖唇青面黑四肢厥冷其脈沉細緊數仲景云此陰毒之候五日可治至六七日不可治也陰毒甘草湯主之始得陰毒云陰毒本因腎氣虛寒因欲事或食冷物後傷風內既伏陰外又感寒或先感外寒而伏內陰內外皆陰則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失三二日間或可起行不甚覺重診之則六脈俱沉細而疾尺部短小寸口或大關脈浮大或沉取之大而不甚疾者非陰證也若服涼藥過多則渴轉甚燥轉急有此病證者急服還陽退陰二藥即安惟補虛和氣而已宜服正元散退陰散五勝散陰證不宜發汗如氣正脈大身熱而未瘥用藥出汗無妨陰毒為病手足冷腰背強臍腹築痛咽喉痛嘔吐下利身如被杖脈細欲絕此由腎氣虛寒外傷風冷或因冷物傷脾蓋脾為太陰內外皆陰則陽氣不守遂成陰毒四肢逆冷額上手背冷汗不止或多煩渴精神如失故岐伯曰陰勝則身寒汗出身常清數慄而寒寒則厥宜服溫藥以復其陽氣或於氣海關元灸之又陰毒漸深候云積陰感於下則微陽消於上故其候沉重四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬躁渴虛汗不止或時狂言指甲面色青黑六脈沉細而一息七至以來有此證者速宜於氣海或關元二穴灸三四百壯以手足和暖為效仍服金液丹來蘇丹玉女散還陽散退陰散又陰毒沉困候云沉困之候與前漸深之候皆同而更加困重六脈附骨取之方有按之即無一息八至以上或不可數也至此則藥餌難為工矣但中灼艾如半棗大三百壯以來手足不和暖者不可治也偶復和暖則以前硫黃及熱藥助之若陰氣散陽氣來即漸減熱藥而和治之以取瘥也詩曰陰毒傷寒身體重背強眼痛不堪任小腹急痛口青黑毒氣衝心轉不禁四肢厥然惟思吐咽喉不利脈細沉若能速灸臍輪下六日看過見喜神陰毒身如擊撲然疾沉汗渴痛臍咽身斑面赤多煩躁陽毒狂言洪數弦陰氣獨盛陽氣暴絕則為陰毒身冷有汗其脈沉細而疾是也沉而不疾者非初病遽然而成者有服藥數日變而成者蓋以腎氣極損生冷傷脾內已伏陰外又感寒或先感外寒後伏陰於內內外皆陰陽氣不守故爾陽氣獨勝陰氣暴絕則為陽毒身熱無汗其脈弦洪促數是也有初病遽然成者蓋酒面過多丹砂僭燥腸胃極熱致之或病證屬陽誤投溫藥助熱為邪內外皆陽陰氣不守故爾陰陽二毒皆有頭疼微利之證抑陰用熱抑陽用寒固有條例然此二毒隨氣逆上結伏於胸中皆令人心下痛硬非常法所能通也當急作規摹以泄之陰毒泄則陽氣復陽毒泄則陰氣復陰陽升降榮衛流行自然大汗而解矣若心下已結延至六七日間斷不可活外證治法詳於後篇陰毒外證面目唇爪青黑口開氣短咽喉不利手足厥冷身不甚熱痛重如打撲或數慄而寒頭目俱疼腰重背強毒氣攻心心下堅悶腹中絞痛外腎並臍下冷硬額上及手背間冷汗不止嘔吐不利煩渴陰極發燥精神恍惚言語醒醒聲音鄭重舌上黑色陰病回陽服藥未透亦須外借火氣但勿迫熁也生薑並良薑皆能散寒邪發越陽氣亦要藥也陰毒脈沉細而其疾身冷有汗可與之陰毒甘草湯及白朮附子散正陽散肉桂散回陽丹返陰丹天雄散正原散退陰散金液丹皆可選而用之則陽氣復而大汗解矣醫之能精於此用藥療證則無不愈矣大師陳北山方訣治陰毒心下結伏按之極痛大小便秘澀累日用藥不下但出氣稍暖亦可療治急取巴豆肉十粒研爛入面一錢許捻作一餅堅實安頓臍心立小艾炷灸五七壯覺腹中鳴良久自通利其次用蔥白一束緊扎切作數餅炙令溫熱貼於臍下以熨斗盛火熨其上續又易之漸覺體溫即以五積散二錢附子末一錢姜七片棗二枚鹽少許水一大盞煎七分溫服連並二三劑即汗出而瘥又法以大蒜一枚搗研捏作餅子炙熱置於臍心灸十壯大小便即通陰毒已深則灸氣海關元二穴以手足和為效仍以前項藥濟之若六脈附骨疾勢困甚者臍中用先艾後蔥法方訣詳具於前凡治陰毒得陽氣乍復復者皆生煩燥切勿誤投涼藥燥甚與返陰丹輩陰證太陰少陰厥陰皆屬陰證也太陰者脾也少陰者腎也厥陰者肝也何謂太陰證太陰脾之經主胸膈䐜脹甲乙經云邪生於陽者得之風雨寒暑邪中於陰者得之飲食居處陰陽喜怒又曰賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入腑陰受之則入臟入六腑則身熱不時上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼何謂少陰證少陰腎之經主脈微細心煩但欲寐或自利而渴又問經云一二日少陰病者何也謂初中病時腠理寒便入陰經不經三陽也傷寒雖是三陰三陽大抵發於陽則太陽也發於陰則少陰也此二經為表裡其受病最為多陽明太陰受病頗稀至於少陽厥陰肝膽之經又加少焉凡病一日至十二三日太陽證不罷者但治太陽有初得病便見少陰證者直攻少陰亦不必先自太陽次傳而至蓋寒氣入太陽即發熱而惡寒入少陰經只惡寒而不發熱也三陰中寒微則理中湯稍厥或中寒下利即乾薑湯手足指頭微寒冷謂之清病有此未可吃四逆蓋疾輕故也只可服理中乾薑之類大段重者用四逆湯無脈者用通脈四逆湯也何謂厥陰證厥陰肝之經主消渴氣上衝心中疼熱飢不欲食食則吐蛔下之利不止也若陰氣獨盛陽氣暴絕則為陰毒其證四肢逆冷臍腹築痛身如被杖脈沉疾或吐或利當急灸臍下服以辛熱之藥令陽氣復而大汗解矣古人云辛甘發散為陽謂桂枝甘草乾薑附子之類能復其陽氣也微用辛甘甚則用辛苦陰極發躁陰證似陽學者當以脈別之方附子散一名桂附散治陰毒傷寒唇青面黑身重背強四肢逆冷或因服冷藥過度心腹脹滿昏沉不識人附子三分炮裂去皮臍桂心白朮當歸銼微炒各半兩半夏湯洗七次去滑乾薑炮裂銼天南星炮裂木香各一分上搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候熱服衣覆取汗如人行十里未有汗再服治陰毒傷寒四肢逆冷身體疼痛或時心頭結硬宜服此方附子炮裂去皮臍白朮甘草炙微赤銼麻黃去根節以上各一兩桂心半兩木香三分上搗篩為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服衣覆取汗如人行十里未有汗再服烏頭散治陰毒傷寒四肢厥冷脈候沉細心腹脹滿腹中㽲痛咽喉不利遍身疼痛川烏頭一兩炮裂去皮臍白朮赤芍藥各三分麻黃去根節桂心枳殼麩炒微黃去瓤當歸銼微炒川椒去目及閉口者微炒去汗乾薑炮裂銼以上各半兩上搗粗羅為散每服五錢以水一大盞入生薑半分煎至五分去滓不計時候熱服衣覆取汗如人行十里未有汗再服麻黃散出聖惠方治陰毒傷寒二三日不得汗煩躁麻黃去根節防風去蘆頭各一兩乾薑炮裂銼桂心川烏頭炮裂去皮臍各半兩上搗細羅為散每服不計時候以熱酒調下二錢衣覆取汗如人行十里未有汗再服回陽散出聖惠方治陰毒傷寒川烏頭炮裂去皮臍益智子青橘皮湯浸去白瓤焙桂心乾薑炮裂銼各半兩麻黃一兩去根節上搗散每服三錢以水一中盞入生薑半分煎至六分去滓不計時候稍熱服衣覆取汗如人行十里未有汗再服白朮散出聖惠方治陰毒傷寒心胸滿悶喘促四肢厥逆白朮前胡去蘆頭附子炮裂去皮臍訶黎勒皮厚朴去粗皮塗生薑汁炙令香熟各一兩桂心三分甘草炙微赤銼五味子乾薑炮裂細銼各半兩上搗粗羅每服四錢以水一中盞煎至六分去滓不計時候稍熱服如人行十里未有汗