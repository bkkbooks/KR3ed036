散寒氣然後熱氣上行而汗出乃愈又方出肘後方治陰毒傷寒口鼻冷者乾薑桂各一分溫酒三合服之當大熱瘥凡陰陽二毒不但初得便爾或一二日變作者皆以冷藥治之得此病多死治熱病不解而下痢困篤欲死者服此大青湯方大青四兩甘草三兩膠二兩豉八合赤石脂三兩上以水一斗煮取三升分三服盡更作日夜兩劑愈又方出肘後方用梔子十四枚薤白一把水五升煮取三升半分為三服又方出肘後方用龍骨半斤搗碎以水一斗煮取五升使極冷稍稍飲至得汗即愈矣又方出肘後方用黃連二兩熟艾如鴨卵大以水二升煮取一升頓服立止天行諸痢悉主之又方出肘後方天行諸痢悉主之黃連三兩黃柏當歸龍骨各二兩上以水六升煮取二升去滓入蜜七合又火煎取一升半分為三服效又方治陰毒傷寒及重感冒風寒頭痛拘急用口嚼生薑一大塊用二三錢熱酒調服一大盞涎吐汗出即愈又方治陰證用黑豆一合炒焦酒浸熱飲一碗豆不用被蓋汗出愈老君神白散出余居士選奇方治傷寒陰證白朮附子各二兩桔梗細辛甘草各一兩上為細末白湯點服陰毒熏法出活人書治陰毒逆冷囊縮者用大豆三升炒令極熱先以淨盆桶內置熱醋三升旋扶病人坐桶上熏少時卻以熱豆傾桶中熏之有頃囊下卻以陰證藥服之回陽丹出衛生寶鑑治陰毒傷寒手足厥冷牡蠣燒不灰木燒良薑切炒川烏頭炮白芍藥各二錢麝香少許上為細末每用一錢男病女唾津調塗外腎女病男唾津調塗乳上手陽丹出衛生寶鑑治陰毒傷寒手足厥冷指甲青色體冷脈沉細而微神效上用憨蔥四五枝陳蜂窠四五個燒存性為細末用憨蔥搗如泥丸如桐子大手心內握定用手帕緊繫定須臾汗出以綿被覆蓋如手心熱甚休教解開如服藥時先服升麻湯五錢出子連須蔥三枝生薑五片水二大盞去滓溫服以被覆之汗出愈海藏已寒丸出濟生拔粹方治陰證服四逆背胸中發躁而煩渴者或數日大便秘小便澀赤服此上不躁大小便自利肉桂茯苓各五錢良薑烏頭炮各七錢附子炮乾薑炮芍藥茴香炒各一兩上為細末糊為丸桐子大溫酒下空腹食前五七十丸八九十丸亦得酒醋為糊俱可麻黃升麻湯出濟生拔粹方治傷寒陰結不大便六七日大下之結去脈當浮則愈反寸脈沉而遲手足厥冷寸脈沉而遲者少陰本脈故主咽喉不利唾膿血四肢厥者為厥陰利不止為太陰為難治溫之則咽中痛不可溫也麻黃二半兩升麻當歸各一兩一分知母三分麥門冬一分去心黃芩三分乾薑芍藥桔梗石膏茯苓甘草白朮各一分上㕮咀每服五錢水煎相次一服汗出止一法出濟生拔粹方治陰諸證藥不效並湯水不下身冷脈絕氣息不知人丁香蓽茇乾薑牡蠣各等分燒粉用手心中以唾津調如泥以手掩其陰至暖汗出為度溫內玉抱肚出衛生寶鑑方治陰毒傷寒川烏細辛良薑天仙子肉桂牡蠣胡椒乾薑各等分上為細末醋糊調塗臍下以綿覆之破棺丹出華佗中藏經方治厥陰面目俱青心下硬四肢冷脈細而欲絕硫黃一兩酒煮三日硃砂一兩研上為末酒糊丸雞頭大入室中勿令人知同病人掘一坑深一尺入粟稈火燒坑子極熱醋五升沃令氣出衣被鋪坑以酒化一丸服之後令病人坑上臥少時汗出愈治傷寒陰證脫陽或因大吐大瀉之後四肢逆冷元氣不接不醒人事或傷寒新瘥懼與婦人交其證小腹緊痛外腎搐縮面黑氣喘冷汗自出亦是脫陽證須臾不治即不救出衛生家寶方蔥白炒令熱熨臍下次用附子白朮半兩乾薑半兩木香一錢上銼碎用水兩碗煎至八分去滓放冷灌與服須臾又進一服兩服滓再作一服如無前件藥只用單方用桂皮二兩好酒二升煎至一升候溫分作二服灌與如無桂皮只用連須蔥白三七莖細銼就砂盆中研細用酒五升煮至二升分作三服灌陽氣即回先更用炒鹽熨臍下氣海之所勿令氣冷為妙治陰毒傷寒煩躁迷悶不治誤人急者出本草用大附子一個可半兩者立劈作四片生薑一大塊立劈作五片如中指長糯米一撮三味以水一升煎取六合去滓如人體溫頓服厚衣覆之或汗出或不出候心神定即別服水解散太白通關散之類不得與冷水如渴更將滓煎與服今人多用有效故詳著之陽毒附論夫陽氣獨盛陰氣暴衰陰為陽所勝內外皆陽故為陽毒傷寒有初得病便成陽毒者有服湯藥經五六日以上不瘥變成陽毒者以病本屬陽或以火劫發其汗或因灸𤋲陽氣轉盛陰氣內消所致其候面赤發躁狂走妄言發斑如錦紋咽喉疼痛涕唾膿血或下利黃赤其脈洪實滑促是也歌括陽毒已深脈洪大內外結熱舌焦黑鼻中如煙煤宜用水漬法傷寒一二日便成陽毒或服藥吐下後變成陽毒身重腰背痛煩悶不安狂言或走或見鬼或吐血下利赤黃其脈浮大而數面赤斑斑如錦紋咽喉疼痛唾膿血五六日可治至六七日不可治陽毒升麻湯主之咽痛玄參升麻湯甚者或有逾垣上屋陽毒脈弦洪促數身熱無汗陽毒升麻湯葶藶苦酒湯苦酒即醋大黃湯梔子仁湯黑奴丸太乙牛黃膏用竹葉湯調下或研生地龍大者三條入生薑汁薄荷汁生蜜腦子各少許新汲水調灌下可選用之令陰氣復而大汗解矣陽毒大熱煩渴譫語赤斑衄血不止白虎湯一服效陽毒已深脈洪大內外結熱舌卷黑鼻中如煙煤用新汲水浸濕布數重搭於胸上續又換新水浸布漬冷熱勢才減已之本事方灸結胸巴豆肉七粒黃連七寸搗細津唾調膏安於臍艾灸其上不拘壯數以腹中有聲為效灸畢即以湯蘸軟帛拭之恐成瘡爛此方與集驗神功散一同陰陽二毒但有微氣者皆可灸臍間有聲即得汗解尚藥孫用和破結丹治陰陽伏逆變為結胸五六日大便結攻之不及達之不可以此主之用錦辰砂銀青礞石北亭脂肉豆蔻木香官桂牽牛生黑附炮巴豆肉不去油